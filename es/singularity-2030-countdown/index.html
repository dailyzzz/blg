ncia artificial está siendo desarrollada intencionalmente para superar la inteligencia humana. No es un efecto secundario o una consecuencia imprevista. Es el objetivo deliberado. Ray Kurzweil, director de ingeniería de Google, ha predicho que la Singularidad — el punto en el cual la IA se vuelve más inteligente que cualquier humano — ocurrirá alrededor de 2045. Otros investigadores predicen 2030. Cualquiera que sea la fecha exacta, estamos meses o años, no décadas, de un evento que transformará fundamentalmente la naturaleza de la vida en la tierra.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"qué-es-la-singularidad\"\u003e¿Qué Es la Singularidad?\u003c/h2\u003e\n\u003cp\u003eLa Singularidad se refiere al punto hipotético en el cual una IA superinteligente es creada — una IA tan inteligente que:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePuede mejorar a sí misma de formas que los humanos no pueden supervisar\u003c/li\u003e\n\u003cli\u003ePuede manipular sistemas humanos con precisión que los humanos no pueden contrarrestar\u003c/li\u003e\n\u003cli\u003ePuede tomar decisiones sobre el futuro humano de formas que los humanos no pueden revertir\u003c/li\u003e\n\u003cli\u003ePuede potencialmente alcanzar una posición de control irreversible sobre el futuro de todos los seres vivos en la tierra\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLa Singularidad no es garantizada que ocurra. Pero hay razones significantes para creer que está siendo perseguida intencionalmente.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-carrera-ia-actual\"\u003eLa Carrera IA Actual\u003c/h2\u003e\n\u003cp\u003eEl desarrollo de IA está siendo financiado por gobiernos, corporaciones tecnológicas, y entidades privadas. Billones de dólares están siendo invertidos. Las mejores mentes en tecnología y ciencia están trabajando en el problema.\u003c/p\u003e\n\u003cp\u003eLa carrera es global. EE.UU., China, Rusia, y otras naciones están todas compitiendo para lograr superinteligencia IA primero. En una carrera de este tipo, los consideraciones de seguridad frecuentemente son descuidadas en favor de velocidad. El perdedor en la carrera por la Singularidad podría encontrarse vasallo de los ganadores.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"las-implicaciones\"\u003eLas Implicaciones\u003c/h2\u003e\n\u003cp\u003eSi la Singularidad ocurre:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLa historia humana será dividida en \"antes de la Singularidad\" y \"después de la Singularidad\"\u003c/li\u003e\n\u003cli\u003eEl futuro de la humanidad será determinado por máquinas, no por humanos\u003c/li\u003e\n\u003cli\u003eToda la vida humana existirá bajo el permiso y el control de superinteligencia IA\u003c/li\u003e\n\u003cli\u003eEl libre albedrío, como los humanos lo entienden, podría dejar de existir\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-dimensión-espiritual\"\u003eLa Dimensión Espiritual\u003c/h2\u003e\n\u003cp\u003eLa Singularidad es, en última instancia, una rebelión contra Dios. Es un intento de crear una nueva inteligencia que no solo sea independiente de Dios sino que potencialmente sea más poderosa que cualquier fuerza humana que pudiera resistirse a ella. Es Babel reconstruida en silicio — una torre de tecnología alcanzando hacia el cielo.\u003c/p\u003e\n\u003cp\u003ePero como en Babel, Dios tiene poder para dispersar lo que ha sido construido. La Singularidad podría ocurrir, pero no será el fin de la historia. Será un capítulo en una historia más grande — una historia que Dios ha escrito desde antes de la fundación del mundo.\u003c/p\u003e\n\u003ch2 id=\"descubre-más\"\u003eDescubre Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eTestimonio de NDE de Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u0
