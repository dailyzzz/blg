prácticamente ignorado por los medios globales.\u003c/p\u003e\n\u003cp\u003eEsta colaboración entre una corporación estadounidense y una empresa estatal china para desarrollar tecnología de replicación genética sin control indica:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAcuerdo internacional para desplegar tecnología de autoreplicación\u003c/li\u003e\n\u003cli\u003eAprobación coordinada de reguladores\u003c/li\u003e\n\u003cli\u003ePlan para introducir la tecnología a través de \"programas de influenza\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-estudio\"\u003eEl Estudio\u003c/h2\u003e\n\u003cp\u003eEl estudio de saRNA para influenza fue diseñado para:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDemostrar que ARN autoreplicante es \"seguro\" para influenza\u003c/li\u003e\n\u003cli\u003eEstablecer precedente para aprobación regulatoria de saRNA\u003c/li\u003e\n\u003cli\u003eCrear expectativa pública de que influenza será tratada con inyecciones saRNA\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSi el estudio es publicado y la tecnología es aprobada, el precedente de COVID-19 será invocado:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"La tecnología fue probada. Fue segura. Deberá ser mandatada.\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"por-qué-importa-la-colaboración-eeuu-china\"\u003ePor Qué Importa la Colaboración EE.UU.-China\u003c/h2\u003e\n\u003ch3 id=\"coordinación-global\"\u003eCoordinación Global\u003c/h3\u003e\n\u003cp\u003eUna colaboración entre Pfizer y Sinopharm indica que los gobiernos de EE.UU. y China están coordinados en desarrollo e implementación de biotecnología. Esto sugiere:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eQue las divisiones políticas aparentes entre EE.UU. y China son teatro\u003c/li\u003e\n\u003cli\u003eQue ambos gobiernos sirven a la misma agenda global de control biológico\u003c/li\u003e\n\u003cli\u003eQue la tecnología de saRNA no será detenida por oposición geopolítica\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"tecnología-china-estadounidense-integrada\"\u003eTecnología China-Estadounidense Integrada\u003c/h3\u003e\n\u003cp\u003eCuando corporaciones estadounidenses colaboran con corporaciones estatales chinas en biotecnología, la tecnología resultante está integrada en sistemas de ambos países. Esto significa:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eQue los sistemas de control biológico desplegados en Occidente y en Oriente serán compatibles\u003c/li\u003e\n\u003cli\u003eQue una tecnología desarrollada por ambos será promovida por ambos\u003c/li\u003e\n\u003cli\u003eQue oposición a Occidente será aislada de oposición a Oriente\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-plan-de-influenza\"\u003eEl Plan de Influenza\u003c/h2\u003e\n\u003ch3 id=\"el-calendario\"\u003eEl Calendario\u003c/h3\u003e\n\u003cp\u003eSe espera que el estudio sea completado en 2024-2025. Basándose en este cronograma:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAprobación regulatoria se buscaría en 2025-2026\u003c/li\u003e\n\u003cli\u003eDespliegue de programas piloto en 2026-2027\u003c/li\u003e\n\u003cli\u003eMandatos globales de saRNA-influenza en 2027-2028\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEsta es especulación basada en el calendario de COVID-19. Pero el patrón es evidente.\u003c/p\u003e\n\u003ch3 id=\"el-justificativo-de-influenza\"\u003eEl Justificativo de Influenza\u003c/h3\u003e\n\u003cp\u003e¿Por qué influenza? Porque:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eInfluenza es una enfermedad estacional predecible\u003c/li\u003e\n\u003cli\u003eLas personas entienden que la influenza existe\u003c/li\u003e\n\u003cli\u003eLos programas de vacunación de influenza ya existen\u003c/li\u003e\n\u003cli\u003eLa transición de vacunas inactivadas a saRNA puede ser hecha gradualmente\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eInfluenza es el ensayo final antes de que ARN autoreplicante sea usado para enfermedades donde el justificativo de salud pública será menos transparente.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-próxima-etapa\"\u003eLa Próxima Etapa\u003c/h2\u003e\n\u003cp\u003eSi saRNA es aprobado para influenza, la próxima etapa sería:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eCombinación de saRNA-influenza con otros saRNA en una vacuna único\u003c/li\u003e\n\u003cli\u003eIntroducción de saRNA para otras enfermedades\u003c/li\u003e\n\u003cli\u003eIntroducción de saRNA para \"mejoramiento\" genético\u003c/li\u003e\n\u003cli\u003eConversión de toda medicina a inyecciones que se auto-replican indefinidamente\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEn esta futura, cada inyección es una instalación permanente de modificación genética.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"encuentra-más-información\"\u003eEncuentra Más Información\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pfizer-documents-self-amplifying/?lang=es\"\u003eDocumentos de Pfizer: ARN Autoreplicante\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/vatican-basement/?lang=es\"\u003e¿Qué hay en el sótano del Vaticano puede sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eLa colaboración silenciosa entre Pfizer y Sinopharm en tecnología de ARN autoreplicante indica que las divisiones políticas globales aparentes son teatro de distracción. Ambas superpotencias sirven a la misma agenda: el control biológico global de la población humana. Esta es la realidad que debe ser visto a través de la ilusión de competencia geopolítica.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/ca
