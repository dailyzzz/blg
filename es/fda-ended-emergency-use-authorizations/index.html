ee: for thy merchants were the great men of the earth; for by thy sorceries were all nations deceived.\" — Revelation 18:23\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Greek word translated as \"sorceries\" in Revelation 18:23 is \u003cem\u003epharmakeia\u003c/em\u003e — the root of our modern word \"pharmaceutical.\" Scripture prophesied that in the last days, the nations of the earth would be deceived by pharmaceutical sorcery. Not by crude potions mixed in cauldrons, but by the polished instruments of an industry cloaked in the language of science and the authority of government approval.\u003c/p\u003e\n\u003cp\u003eAs the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e reveals, the curse that began in Eden has threaded through every generation, manifesting in systems that promise healing while delivering bondage. The Emergency Use Authorization was one such instrument — a legal mechanism that bypassed every safety standard designed to protect human life, all under the banner of urgency and necessity.\u003c/p\u003e\n\u003cp\u003eNow the FDA has ended these authorizations. But the question that demands an answer is not whether they ended — it is why they existed in the first place, what they enabled, and whether the damage they unleashed can ever be undone.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-emergency-use-authorization-a-legal-weapon\"\u003eThe Emergency Use Authorization: A Legal Weapon\u003c/h2\u003e\n\u003cp\u003eThe Emergency Use Authorization (EUA) is codified under Section 564 of the Federal Food, Drug, and Cosmetic Act. Under normal circumstances, any pharmaceutical product must undergo years of rigorous clinical trials — Phase I, Phase II, Phase III — before the FDA will consider granting approval. These trials test for safety, efficacy, dosing, side effects, long-term consequences, and interactions with other drugs. The process typically takes 10 to 15 years and exists for a single reason: to protect human beings from being used as unwitting test subjects.\u003c/p\u003e\n\u003cp\u003eThe EUA obliterates this process. When the Secretary of Health and Human Services declares a public health emergency, the FDA Commissioner gains the authority to authorize unapproved medical products for emergency use. The legal threshold is breathtakingly low: the product must \"may be effective\" — not proven effective, not demonstrated to be safe, merely plausibly useful based on whatever data the manufacturer provides.\u003c/p\u003e\n\u003cp\u003eDuring the COVID-19 pandemic, this mechanism was invoked to authorize the Pfizer-BioNTech, Moderna, and Johnson \u0026#x26; Johnson COVID-19 injections. These products had not completed standard Phase III clinical trials. Pfizer's own clinical trial was designed to last until 2023, yet the EUA was granted in December 2020 — three years before the trial would conclude. The control group was eliminated within months when unblinded participants in the placebo arm were offered the injection, destroying the possibility of long-term comparative safety data.\u003c/p\u003e\n\u003cp\u003eKaren Kingston, biotech analyst and former Pfizer consultant, has documented extensively in The Kingston Report (karenkingston.substack.com) that the EUA framework was not merely a shortcut — it was a legal shield. Under the PREP Act (Public Readiness and Emergency Preparedness Act), products authorized under EUA are exempt from liability. Manufacturers cannot be sued for injuries or deaths caused by their products. Healthcare providers who administer the products are similarly shielded. The only legal remedy available to injured individuals is the Countermeasures Injury Compensation Program (CICP), which has historically denied the vast majority of claims and offers no right to legal representation, no discovery process, and no judicial review.\u003c/p\u003e\n\u003cp\u003eKingston has stated plainly: \"The EUA was never about saving lives. It was about deploying a product without accountability. The entire legal architecture was designed to ensure that no one — not the manufacturer, not the government, not the administering physician — could ever be held responsible for what happened.\"\u003c/p\u003e\n\u003ch3 id=\"the-scale-of-deployment\"\u003eThe Scale of Deployment\u003c/h3\u003e\n\u003cp\u003eUnder the EUA framework, more than 670 million doses of COVID-19 injections were administered in the United States alone. Globally, the number exceeds 13 billion. These injections were administered to children as young as six months old. They were mandated by employers, universities, and branches of the U.S. military. Service members who refused were court-martialed. Healthcare workers who declined were terminated. Students who resisted were expelled. The unvaccinated were barred from restaurants, gyms, concerts, and houses of worship.\u003c/p\u003e\n\u003cp\u003eAll of this was made possible by a single legal instrument: the Emergency Use Authorization.\u003c/p\u003e\n\u003ch3 id=\"the-products-themselves\"\u003eThe Products Themselves\u003c/h3\u003e\n\u003cp\u003eKaren Kingston's research has further documented that the COVID-19 mRNA injections were not traditional vaccines by any prior definition. They did not contain an attenuated or inactivated virus. They did not stimulate the immune system in the manner of conventional vaccines. Instead, they delivered synthetic messenger RNA wrapped in lipid nanoparticles — a technology that had never before been authorized for use in humans at scale.\u003c/p\u003e\n\u003cp\u003eThe lipid nanoparticles were designed to evade the body's immune defenses and deliver their payload into human cells, instructing those cells to manufacture the SARS-CoV-2 spike protein. The body's immune system would then mount a response against its own cells — a mechanism that critics, including Kingston, have described as functionally autoimmune.\u003c/p\u003e\n\u003cp\u003ePfizer's own biodistribution study, obtained through a Japanese regulatory FOIA request, revealed that the lipid nanoparticles did not remain at the injection site as publicly claimed. They distributed throughout the body, concentrating in the liver, spleen, adrenal glands, ovaries, and bone marrow. This data was available to regulators before the EUA was granted. It was not disclosed to the public.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-announcement-eua-termination\"\u003eThe Announcement: EUA Termination\u003c/h2\u003e\n\u003cp\u003eThe FDA's announcement terminating all COVID-19 Emergency Use Authorizations represents an official acknowledgment that the declared public health emergency no longer exists and that the legal basis for bypassing standard approval processes has expired. The implications are far-reaching.\u003c/p\u003e\n\u003cp\u003eFirst, any COVID-19 injection product that relied solely on EUA status — and did not receive full FDA approval (Biologics License Application, or BLA) — can no longer be legally distributed in the United States. This distinction matters because the fully approved product (Comirnaty, in the case of Pfizer) was never widely distributed in the U.S. market. The vast majority of doses administered were the EUA-authorized version, which is legally distinct from the BLA-approved product.\u003c/p\u003e\n\u003cp\u003eSecond, the termination of the EUA removes the PREP Act liability shield for any future administration of these products under emergency authorization. While existing liability protections for doses already administered remain a subject of legal debate, the elimination of the EUA framework going forward means that any future COVID-19 injection program would need to proceed under standard FDA approval — with full liability exposure for manufacturers.\u003c/p\u003e\n\u003cp\u003eThird, the EUA termination undercuts the legal foundation for any future COVID-19 vaccine mandates. Mandates were legally justified on the basis of the emergency authorization. Without the EUA, there is no emergency authorization, and without emergency authorization, the legal basis for compulsory vaccination dissolves.\u003c/p\u003e\n\u003ch3 id=\"what-the-fda-did-not-say\"\u003eWhat the FDA Did Not Say\u003c/h3\u003e\n\u003cp\u003eThe FDA's announcement was careful in its language. It did not acknowledge harm. It did not reference the hundreds of thousands of adverse event reports filed with VAERS (the Vaccine Adverse Event Reporting System). It did not address the myocarditis signal in young males. It did not reference the excess mortality data that has confounded actuaries and insurance executives since 2021. It did not acknowledge the fertility concerns, the neurological injuries, the cardiac events, or the cancer signals that have been documented by researchers worldwide.\u003c/p\u003e\n\u003cp\u003eThe FDA ended the EUA the way it began it — silently, bureaucratically, without accountability.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prep-act-the-shield-that-remains\"\u003eThe PREP Act: The Shield That Remains\u003c/h2\u003e\n\u003cp\u003eEven with the EUA terminated, the PREP Act liability shield remains the most significant legal obstacle to justice for those injured by the COVID-19 injections. The PREP Act, signed into law in 2005 and invoked by HHS Secretary Alex Azar on February 4, 2020 — weeks before any COVID-19 case was confirmed in the United States — provides blanket immunity to manufacturers, distributors, program planners, and qualified persons involved in the administration of covered countermeasures.\u003c/p\u003e\n\u003cp\u003eKaren Kingston has identified the PREP Act as the linchpin of the entire operation. In multiple reports published on The Kingston Report, she has detailed how the PREP Act was specifically designed to create a legal environment in which experimental products could be deployed to the entire population without any possibility of legal recourse. The Act was not a response to COVID-19 — it was written 15 years before COVID-19 and was sitting on the shelf, ready to be activated the moment a public health emergency was declared.\u003c/p\u003e\n\u003cp\u003eKingston has noted: \"The PREP Act is not a shield — it is a weapon. It was designed to ensure that pharmaceutical companies could inject experimental products into billions of people without facing a single lawsuit. That is not public health. That is military-grade legal warfare against civilians.\"\u003c/p\u003e\n\u003cp\u003eThe effort by over 100,000 doctors and medical professionals to vacate PREP Act immunity — documented in our companion article — represents the most significant legal challenge to this framework since its inception.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-biometric-beast-system\"\u003eThe Biometric Beast System\u003c/h2\u003e\n\u003cp\u003eThe EUA framework did not operate in isolation. It was one component of a larger system that the ZZZ Daily track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/109-Biometric_Beast_System.mp4\"\u003eBiometric Beast System\u003c/a\u003e exposes — a system in which medical compliance becomes the gateway to participation in society.\u003c/p\u003e\n\u003cp\u003eDuring the COVID-19 pandemic, vaccine passports were deployed in cities across America and in nations worldwide. Citizens were required to present proof of injection to enter businesses, board planes, keep their jobs, and attend school. The injection was not merely a medical product — it was an access credential. Those who accepted it gained entry to society. Those who refused were excluded.\u003c/p\u003e\n\u003cp\u003eThis is the architecture of the Beast System described in Revelation 13: \"And that no man might buy or sell, save he that had the mark, or the name of the beast, or the number of his name\" (Revelation 13:17). The vaccine passport system was a prototype — a proof of concept demonstrating that modern technology could restrict economic participation based on compliance with a centralized authority.\u003c/p\u003e\n\u003cp\u003eThe EUA provided the product. The PREP Act provided the legal cover. The mandate infrastructure provided the enforcement. The vaccine passport provided the exclusion mechanism. Together, they constituted a complete system of control — one that could be reactivated at any time, with any product, under any declared emergency.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prophetic-significance\"\u003eThe Prophetic Significance\u003c/h2\u003e\n\u003cp\u003eScripture warns repeatedly that the last days will be characterized by deception on a scale previously unimaginable. The Apostle Paul wrote to the Thessalonians: \"And for this cause God shall send them strong delusion, that they should believe a lie: That they all might be damned who believed not the truth, but had pleasure in unrighteousness\" (2 Thessalonians 2:11-12).\u003c/p\u003e\n\u003cp\u003eThe EUA was a mechanism of delusion. It convinced billions of people that an untested, experimental product was \"safe and effective\" — a phrase repeated so relentlessly that it became a mantra, a catechism, a confession of faith in the Church of Science. Those who questioned it were not engaged in debate — they were excommunicated. Banned. Silenced. Labeled as threats to public health.\u003c/p\u003e\n\u003cp\u003eThe delusion was so complete that parents injected their own children with a product for which no long-term safety data existed, against a disease that posed virtually zero statistical risk to children. The delusion was so thorough that healthcare workers — people trained to evaluate medical evidence — lined up for injections whose clinical trial data they had not read, from companies with histories of criminal fraud, under a legal framework that explicitly removed their right to seek compensation if harmed.\u003c/p\u003e\n\u003cp\u003eThis is the pharmakeia of Revelation 18:23. It is not ancient. It is not metaphorical. It is operational. And it has been deployed.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-happens-now\"\u003eWhat Happens Now\u003c/h2\u003e\n\u003cp\u003eThe termination of the COVID-19 EUA is not the end of the story. It is, at best, the closing of one chapter. The legal framework that enabled the EUA remains intact. The PREP Act remains on the books. The Public Health Emergency declaration authority remains with the HHS Secretary. The WHO's International Health Regulations remain in force for member nations that have not withdrawn. The pharmaceutical companies retain their patents, their profits, and their political connections.\u003c/p\u003e\n\u003cp\u003eKaren Kingston's ongoing research documents the next phase: the deployment of self-amplifying mRNA (sa-mRNA) technology, the expansion of mRNA platforms into influenza, RSV, cancer, and other applications, and the construction of international pandemic surveillance infrastructure that would enable future lockdowns and mandates at the direction of supranational organizations.\u003c/p\u003e\n\u003cp\u003eThe EUA may be over. The system that created it is not.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eFDA.gov — Emergency Use Authorization Archive\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Karen Kingston's ongoing documentation of pharmaceutical regulatory frameworks, PREP Act analysis, and mRNA technology research\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePREP Act — 42 U.S.C. Section 247d-6d\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFederal Food, Drug, and Cosmetic Act — Section 564 (EUA statute)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePfizer-BioNTech EUA Fact Sheet — FDA.gov archives\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eVAERS (Vaccine Adverse Event Reporting System) — vaers.hhs.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eRevelation 18:23, 2 Thessalonians 2:11-12 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u rse\u003c/a\u003e — The curse that began in Eden and threads through every institution of man\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers' Lies\u003c/a\u003e — How the nations are deceived by those who promise healing\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/rfk-cleans-house-cdc/?lang=es\"\u003eRFK Jr. Cleans House at the CDC\u003c/a\u003e — The dismantling of captured regulatory agencies\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/doctors-vacate-prep-act/?lang=es\"\u003eOver 100,000 Doctors Pave Way to Vacate PREP Act Immunity\u003c/a\u003e — The legal challenge to pharmaceutical liability shields\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/florida-ends-vaccine-mandates/?lang=es\"\u003eFlorida Surgeon General Announces End to ALL Vaccine Mandates\u003c/a\u003e — State-level resistance to the federal injection apparatus\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/federal-government-pfizer-data-fraud/?lang=es\"\u003eIs It a Crime? Federal Government Assisted Pfizer in Data Fraud\u003c/a\u003e — The government's role in concealing clinical trial irregularities\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThe FDA has closed the door on Emergency Use Authorizations, but the framework that opened that door remains standing. The pharmakeia of Revelation 18:23 was not a single product or a single crisis — it is a system, and systems persist long after any individual emergency expires. The watchman's duty is not to celebrate the closing of one chapter but to warn of what the next chapter contains. \"Be sober, be vigilant; because your adversary the devil, as a roaring lion, walketh about, seeking whom he may devour\" (1 Peter 5:8). The EUA is over. The spiritual war is not.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,
