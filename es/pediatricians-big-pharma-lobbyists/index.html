nes moldean la política, y sus credenciales determinan quién puede practicar.\u003c/p\u003e\n\u003cp\u003eLa AAP también es un instrumento de cabildeo de la industria farmacéutica. Los fabricantes de vacunas pagan membresías institucionales. Los ejecutivos farmacéuticos presiden comités. Las conferencias de la AAP son patrocinadas por empresas de drogas. Y las posiciones que la AAP adopta sobre vacunas, antibióticos, y medicamentos psiquiátricos reflejan consistentemente los intereses de la industria, no los intereses de los niños.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-estructura-del-cabildeo\"\u003eLa Estructura del Cabildeo\u003c/h2\u003e\n\u003ch3 id=\"patrocinio-corporativo\"\u003ePatrocinio Corporativo\u003c/h3\u003e\n\u003cp\u003eLas conferencias anuales de la AAP son patrocinadas por los principales fabricantes de vacunas:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePfizer\u003c/strong\u003e: Múltiples patrocinios dorados y de platino\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eModerna\u003c/strong\u003e: Patrocinio importante\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJohnson \u0026#x26; Johnson\u003c/strong\u003e: Múltiples divisiones de patrocinio\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMerck\u003c/strong\u003e: Patrocinio extendido\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEstos no son patrocinios menores. Son el corazón financiero de las operaciones de la AAP. Sin este dinero, la AAP no podría operar las conferencias que define sus directrices.\u003c/p\u003e\n\u003ch3 id=\"colocación-de-personal\"\u003eColocación de Personal\u003c/h3\u003e\n\u003cp\u003eLos ejecutivos de farmacéuticas no solo pagan por influencia. También asumen posiciones de liderazgo:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLos ejecutivos de Pfizer han servido en comités de directrices de vacunas de la AAP\u003c/li\u003e\n\u003cli\u003eLos ejecutivos de Merck han dirigido comités sobre enfermedades infecciosas\u003c/li\u003e\n\u003cli\u003eLos representantes de la industria se sientan en consejos que desarrollan políticas de medicamentos\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEstas no son posiciones de asesoramiento. Son posiciones de poder.\u003c/p\u003e\n\u003ch3 id=\"tráfico-giratorio\"\u003eTráfico Giratorio\u003c/h3\u003e\n\u003cp\u003eEl tráfico giratorio entre la industria farmacéutica y la AAP es extenso. Los ejecutivos farmacéuticos retirados presiden comités de la AAP. Los médicos en la AAP aceptan posiciones en empresas farmacéuticas cuando dejan la medicina clínica. Las lealtades se entrelazan.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-patrón-de-captura\"\u003eEl Patrón de Captura\u003c/h2\u003e\n\u003ch3 id=\"etapa-1-financiamiento-años-1980-1990\"\u003eEtapa 1: Financiamiento (años 1980-1990)\u003c/h3\u003e\n\u003cp\u003eLa industria farmacéutica comenzó a financiar organizaciones médicas profesionales. El objetivo declarado era mejorar la educación. El objetivo real era influir en la política.\u003c/p\u003e\n\u003ch3 id=\"etapa-2-ideología-años-1990-2000\"\u003eEtapa 2: Ideología (años 1990-2000)\u003c/h3\u003e\n\u003cp\u003eCon el financiamiento llegó la ideología. Las directrices comenzaron a cambiar. El número de vacunas recomendadas aumentó. El número de medicamentos psiquiátricos prescritos para niños se disparó. Las políticas de la AAP se alinearon cada vez más con lo que era mejor para las ganancias farmacéuticas, no para la salud de los niños.\u003c/p\u003e\n\u003ch3 id=\"etapa-3-coerción-años-2000-2020\"\u003eEtapa 3: Coerción (años 2000-2020)\u003c/h3\u003e\n\u003cp\u003eLa AAP utilizó su autoridad institucional para aplicar políticas. Los pediatras que cuestionaban las directrices de vacunas fueron censurados. Las críticas a medicamentos psiquiátricos fueron suprimidas. La disidencia fue criminalizada como anticiencia.\u003c/p\u003e\n\u003ch3 id=\"etapa-4-totalidad-2020-presente\"\u003eEtapa 4: Totalidad (2020-presente)\u003c/h3\u003e\n\u003cp\u003eLa captura es ahora completa. La AAP no simplemente promulga políticas que benefician a la industria farmacéutica. La AAP activamente coerciona a los médicos para que se alineen con las políticas de la industria. Los pediatras que resisten pueden perder sus credenciales.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"las-directrices-que-reflejan-intereses-corporativos\"\u003eLas Directrices Que Reflejan Intereses Corporativos\u003c/h2\u003e\n\u003ch3 id=\"presupuesto-de-vacunas-aumentado\"\u003ePresupuesto de Vacunas Aumentado\u003c/h3\u003e\n\u003cp\u003eEl número de vacunas recomendadas para niños ha crecido de 10 en 1980 a 72 dosis de 16 vacunas diferentes en 2024. Cada aumento en el número de vacunas recomendadas beneficia directamente a los fabricantes de vacunas.\u003c/p\u003e\n\u003cp\u003eLa AAP declara que este aumento refleja \"mejor ciencia.\" Pero no hay evidencia de que más vacunas resulten en mejores resultados de salud. Hay simplemente más dinero para las empresas que las fabrican.\u003c/p\u003e\n\u003ch3 id=\"medicamentos-psiquiátricos-para-niños\"\u003eMedicamentos Psiquiátricos para Niños\u003c/h3\u003e\n\u003cp\u003eLa prescripción de medicamentos psiquiátricos a niños ha aumentado 40 veces en los últimos 30 años. Los estimulantes (Adderall, Ritalin) que son drogas del Anexo II en la misma categoría regulatoria que la cocaína se prescriben ahora a millones de niños.\u003c/p\u003e\n\u003cp\u003eLa AAP ha promovido activamente esta expansión. Pero cada nueva prescripción beneficia a las empresas farmacéuticas que fabrican estos medicamentos.\u003c/p\u003e\n\u003ch3 id=\"antibióticos-excesivos\"\u003eAntibióticos Excesivos\u003c/h3\u003e\n\u003cp\u003eLa prescripción excesiva de antibióticos es un problema de salud pública significativo — crea resistencia a los antibióticos y destruye el microbioma de los niños. La AAP ha publicado recomendaciones que, mientras formalmente restringen el uso de antibióticos, en la práctica permiten la prescripción amplia porque sus criterios pueden ser interpretados para justificar casi cualquier uso.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"lo-que-la-ciencia-real-muestra\"\u003eLo Que la Ciencia Real Muestra\u003c/h2\u003e\n\u003ch3 id=\"la-salud-infantil-se-deteriora\"\u003eLa Salud Infantil Se Deteriora\u003c/h3\u003e\n\u003cp\u003eMientras la AAP ha promovido más vacunas, más medicamentos, y más intervenciones médicas, la salud general de los niños estadounidenses se ha deteriorado:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLas alergias infantiles han aumentado 50% en 30 años\u003c/li\u003e\n\u003cli\u003eEl asma infantil ha aumentado 100%\u003c/li\u003e\n\u003cli\u003eLos trastornos del espectro autista han aumentado de 1 en 10,000 en 1980 a 1 en 34 en 2024\u003c/li\u003e\n\u003cli\u003eLos trastornos mentales en niños han aumentado dramáticamente\u003c/li\u003e\n\u003cli\u003eLa obesidad infantil ha triplicado\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSi las políticas de la AAP estuvieran basadas en ciencia que produjera mejores resultados de salud, veríamos mejoras. En cambio, vemos deterioro.\u003c/p\u003e\n\u003ch3 id=\"países-con-menos-vacunas-tienen-mejor-salud-infantil\"\u003ePaíses con Menos Vacunas Tienen Mejor Salud Infantil\u003c/h3\u003e\n\u003cp\u003eEstudios comparativos entre países muestran que los países con calendarios de vacunación menos agresivos no tienen tasas más altas de las enfermedades que las vacunas previenen. Tienen mejor salud infantil general.\u003c/p\u003e\n\u003cp\u003eSuecia, que hasta hace poco mantenía un calendario de vacunación más conservador que Estados Unidos, tiene mejores indicadores de salud infantil que Estados Unidos. Dinamarca y Noruega, también con calendarios menos agresivos, superan a Estados Unidos.\u003c/p\u003e\n\u003cp\u003eEsto sugiere que el calendario expansivo de vacunación promovido por la AAP no está siendo dictado por la ciencia de lo que produce mejor salud infantil. Está siendo dictado por lo que produce más ganancias farmacéuticas.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"encuentra-más-información\"\u003eEncuentra Más Información\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/psychology-industry-manufacturing-illness/?lang=es\"\u003eLa Industria de la Psicología: Fabricando Enfermedad Mental para Ganancias\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pediatricians-ban-religious-exemptions/?lang=es\"\u003ePediatras Prohíben Exenciones Religiosas\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eLa medicina institucional ha sido capturada por los intereses que debería regular. Los pediatras que debería estar enfocados en la salud de los niños ahora son instrumentos de los intereses de la industria farmacéutica. El sistema es tan completo que los pediatras que resisten el paradigma enfrentan coerción profesional. Este es el destino de cualquier institución que acepta dinero corporativo. Es capturada. El único pediatra en el que puedes confiar es el que no depende de la industria farmacéutica para su sustento.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Pediatras: Cabilderos de Big Pharma Disfrazados de Médicos\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"La Academia Estadounidense de Pediatría se ha conver
