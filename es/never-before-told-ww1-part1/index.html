inst nation, and kingdom against kingdom.\"\u003c/em\u003e — Matthew 24:6-7\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eChrist warned His disciples that the last days would be marked by wars and rumors of wars — not as random acts of human violence, but as orchestrated events driven by spiritual forces operating behind the veil of the physical world. World War I was not caused by the assassination of Archduke Franz Ferdinand, nor by the alliance systems that supposedly locked Europe into automatic conflict. It was caused by the deliberate, calculated action of the Jesuit order and its network of secret societies, who needed a global war to accomplish what could not be accomplished in peace: the destruction of the remaining Protestant monarchies, the elimination of the Ottoman Caliphate, the creation of new financial instruments of control, and the reshaping of the world map according to the Vatican's design.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, founded by Ignatius Loyola as a military organization masquerading as a religious order, had been working toward a general European war since the Congress of Vienna in 1815. Michelangelo Tamburini, the 14th Superior General, boasted that from his chamber he governed \"not only to Paris but to China, not only to China but to all the world.\" By 1914, that boast had become literal reality. The Jesuits controlled the intelligence services, the banking systems, the diplomatic networks, and the secret societies of every major European power.\u003c/p\u003e\n\u003cp\u003eAs \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e declares, the hosts of darkness work through human institutions — armies, governments, banks — to accomplish the adversary's will. And \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e reveals that the enemy is never external; he sits in the throne room, the cabinet meeting, and the general staff, guiding nations toward destruction while wearing the uniform of patriotism.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-real-causes-of-the-war\"\u003eThe Real Causes of the War\u003c/h2\u003e\n\u003ch3 id=\"the-jesuit-target-list\"\u003eThe Jesuit Target List\u003c/h3\u003e\n\u003cp\u003eTo understand World War I, you must understand what the Jesuits wanted to destroy:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. The German Empire\u003c/strong\u003e — Protestant Prussia had been the Jesuits' enemy since the Reformation. The unified German Empire, created in 1871, was the most powerful Protestant nation in the world. Its destruction was a Jesuit priority.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. The Austro-Hungarian Empire\u003c/strong\u003e — Although nominally Catholic, Austria-Hungary was a multi-ethnic state that resisted Jesuit centralization. The Hapsburg dynasty had periodically challenged papal authority, and the Empire's tolerance of diverse religious and ethnic groups was an obstacle to the monolithic control the Jesuits required.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. The Ottoman Empire\u003c/strong\u003e — The Ottoman Caliphate controlled the Holy Land, including Jerusalem. The Vatican had been trying to reclaim Jerusalem since the Crusades, and the destruction of the Ottoman Empire was a prerequisite for establishing a Vatican-aligned presence in Palestine.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e4. The Russian Empire\u003c/strong\u003e — Orthodox Russia was the Jesuits' oldest and most implacable enemy. The Romanov dynasty had expelled the Jesuits multiple times, and Russia's Orthodox Christianity represented a rival to Roman Catholic authority. The Bolshevik Revolution of 1917, which destroyed the Romanov dynasty and established atheistic communism, was the Jesuit solution to the Russian problem.\u003c/p\u003e\n\u003ch3 id=\"the-assassination-as-trigger\"\u003eThe Assassination as Trigger\u003c/h3\u003e\n\u003cp\u003eThe assassination of Archduke Franz Ferdinand on June 28, 1914, was not the act of a lone nationalist. Gavrilo Princip, the assassin, was a member of the Black Hand, a Serbian secret society with connections to military intelligence. The Black Hand, in turn, was connected to the broader network of European secret societies that operated under the ultimate authority of the Jesuit order.\u003c/p\u003e\n\u003cp\u003eThe assassination was a false flag operation — a carefully planned trigger designed to activate the alliance systems and plunge Europe into war. The Jesuits knew that the alliance systems they had helped construct (through decades of diplomatic manipulation) would transform a local conflict into a global one. All that was needed was the right spark in the right location.\u003c/p\u003e\n\u003cp\u003eSarajevo was chosen with care. Bosnia-Herzegovina, recently annexed by Austria-Hungary, was a flashpoint where Slavic nationalism, Austrian imperialism, and Serbian ambition intersected. The assassination guaranteed that Austria would demand satisfaction from Serbia, that Russia would mobilize in Serbia's defense, that Germany would mobilize in Austria's defense, and that France and Britain would mobilize against Germany. The entire sequence was as predictable as a line of dominoes — and the Jesuits had spent decades setting up the dominoes.\u003c/p\u003e\n\u003ch2 id=\"the-hidden-financial-architecture\"\u003eThe Hidden Financial Architecture\u003c/h2\u003e\n\u003ch3 id=\"the-banks-behind-the-war\"\u003eThe Banks Behind the War\u003c/h3\u003e\n\u003cp\u003eWars are not fought with ideology; they are fought with money. And the money for World War I came from the same banking network that had engineered the Panic of 1893, the Panic of 1907, and the creation of the Federal Reserve in 1913.\u003c/p\u003e\n\u003cp\u003eThe Federal Reserve Act was passed on December 23, 1913 — just seven months before the start of World War I. This timing was not coincidental. The Federal Reserve gave the banking elite the ability to create money from nothing, lend it to governments at interest, and profit from both sides of the coming conflict. Without the Federal Reserve, the United States could not have financed its eventual entry into the war — and without American financing, the war would have ended in a stalemate by 1916.\u003c/p\u003e\n\u003cp\u003eThe key figures in this financial architecture were:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eJ.P. Morgan\u003c/strong\u003e, whose bank served as the primary financial agent for the British and French governments in the United States. Morgan's bank arranged billions of dollars in loans to the Allies, ensuring that American financial interests were aligned with an Allied victory.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003ePaul Warburg\u003c/strong\u003e, a German-born banker who was one of the principal architects of the Federal Reserve. Warburg's brother Max sat on the board of the German Reichsbank. The Warburg family thus had financial interests on both sides of the conflict — a position that guaranteed profit regardless of outcome.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eJacob Schiff\u003c/strong\u003e, a partner at Kuhn, Loeb \u0026#x26; Co., who financed the Japanese war against Russia in 1904-1905 and later financed the Bolshevik Revolution. Schiff's financial network connected Wall Street to the revolutionary movements that would destroy the Russian Empire from within.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAll of these figures were connected to the broader network of banking families — the Rothschilds, the Barings, the Warburgs, the Schiffs — that served as the Vatican's financial arm. The Rothschilds had been the Vatican's official bankers since the 19th century, and their global network provided the infrastructure for financing a global war.\u003c/p\u003e\n\u003ch3 id=\"the-federal-reserve-the-war-machine\"\u003eThe Federal Reserve: The War Machine\u003c/h3\u003e\n\u003cp\u003eThe creation of the Federal Reserve in 1913 was the single most important prerequisite for World War I. Without a central bank capable of creating unlimited credit, the United States government could not have:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLoaned billions of dollars to the Allied powers before American entry into the war\u003c/li\u003e\n\u003cli\u003eFinanced its own military buildup after entering the war in 1917\u003c/li\u003e\n\u003cli\u003eIssued the Liberty Bonds that extracted wealth from ordinary Americans to fund the war\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Federal Reserve was designed by bankers, for bankers, to serve the interests of the Jesuit-controlled financial elite. Its creation in December 1913 — just months before the start of the war that would make it indispensable — is one of the most transparent examples of pre-planning in modern history.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/97-Income_Tax_Is_Slavery.mp4\"\u003eIncome Tax Is Slavery\u003c/a\u003e connects the Federal Reserve to the income tax system established the same year — the 16th Amendment, ratified in February 1913, gave the government the power to tax income directly, providing the revenue stream to service the debt created by the Federal Reserve's money creation.\u003c/p\u003e\n\u003ch2 id=\"the-secret-society-network\"\u003eThe Secret Society Network\u003c/h2\u003e\n\u003ch3 id=\"freemasonry-and-the-war\"\u003eFreemasonry and the War\u003c/h3\u003e\n\u003cp\u003eFreemasonry played a central role in the diplomatic and military decisions that led to World War I. The Masonic lodges of Europe served as the channels through which the Jesuit strategy was communicated and coordinated:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe \u003cstrong\u003eGrand Orient de France\u003c/strong\u003e, the most powerful Masonic body in continental Europe, was staunchly anti-clerical in its public posture but served Jesuit interests by promoting the secularist agenda that weakened Protestant and Orthodox institutions.\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003eUnited Grand Lodge of England\u003c/strong\u003e connected the British aristocracy to the continental lodge system and provided the social framework within which diplomatic decisions were made informally, outside the scrutiny of parliaments and publics.\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003eScottish Rite\u003c/strong\u003e lodges in the United States and Europe provided the hierarchical structure through which the most sensitive operations were planned and executed.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe overlap between Masonic membership and political/military leadership in pre-war Europe was near-total. Kings, prime ministers, generals, and admirals on all sides of the conflict were Masons, bound by oaths of secrecy and mutual obligation that transcended national loyalties. This is how a global war could be planned, coordinated, and triggered without the knowledge of the populations who would fight and die in it.\u003c/p\u003e\n\u003cp\u003eAs Howard Pittman's near-death experience revealed, the spiritual war described in Ephesians 6:12 operates through principalities, powers, and rulers of darkness who govern from the second heaven. The Masonic lodge system was — and is — the earthly counterpart of this demonic hierarchy: a layered system of authority in which each level knows only what the level above it chooses to reveal. The rank-and-file Mason knows nothing of the Jesuit control at the top; he simply follows instructions and receives rewards. This is the structure that planned and executed World War I. Watch Pittman's testimony: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eThe documentary \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e exposes the Jesuit oath and strategy in full detail, and the research of \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 on Substack\u003c/a\u003e has uncovered extensive documentation of the financial networks that funded both sides of the Great War.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/97-Income_Tax_Is_Slavery.mp4\"\u003eIncome Tax Is Slavery\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/31-Satans_Hosts.mp4\"\u003eSatan's H
