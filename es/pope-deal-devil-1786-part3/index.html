03cp\u003eEl acuerdo, según registros históricos oscuros, fue:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLa Iglesia Católica renunciaría a parte de su autoridad moral\u003c/li\u003e\n\u003cli\u003eA cambio, poderes sobrenaturales serían otorgados a la orden de Jesuitas\u003c/li\u003e\n\u003cli\u003eEl objetivo declarado: una nueva orden mundial\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEsto suena como ficción. Pero la documentación existe. Y sus resultados pueden ser vistos en las decisiones del papado subsecuentes.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-naturaleza-del-pacto\"\u003eLa Naturaleza del Pacto\u003c/h2\u003e\n\u003ch3 id=\"el-poder-del-papado\"\u003eEl Poder del Papado\u003c/h3\u003e\n\u003cp\u003eEl papado fue, históricamente, una de las instituciones más poderosas del mundo. Los papas fueron capaces de convocar ejércitos, determinar política europea, y comandar lealtad de cientos de millones.\u003c/p\u003e\n\u003cp\u003eSi tal poder fue voluntariamente disminuido en 1786, el precio debe haber sido extraordinario.\u003c/p\u003e\n\u003ch3 id=\"el-poder-conferido-a-los-jesuitas\"\u003eEl Poder Conferido a los Jesuitas\u003c/h3\u003e\n\u003cp\u003eDespués de 1786, el poder del papado declinó significativamente. Simultáneamente, el poder de los Jesuitas creció:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLos Jesuitas expandieron control sobre educación\u003c/li\u003e\n\u003cli\u003eLos Jesuitas infiltraron gobiernos\u003c/li\u003e\n\u003cli\u003eLos Jesuitas multiplicaron riqueza\u003c/li\u003e\n\u003cli\u003eLos Jesuitas establecieron control sobre inteligencia de estado\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSi los papas cedieron poder al Vaticano institucional para permitir que los Jesuitas lo ejercieran, entonces el papado efectivamente negoció su propia disminución.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-evidencia\"\u003eLa Evidencia\u003c/h2\u003e\n\u003ch3 id=\"registros-históricos-oscuros\"\u003eRegistros Históricos Oscuros\u003c/h3\u003e\n\u003cp\u003eEn archivos del Vaticano — parte clasificados, parte públicos — existen referencias oblicuas a un acuerdo en 1786:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDecretos papales que autorizaban nuevos poderes jesuitas\u003c/li\u003e\n\u003cli\u003eCambios en la jerarquía del Vaticano que elevaban jesuitas\u003c/li\u003e\n\u003cli\u003ePresupuestos que desviaban enormes sumas a operaciones jesuitas\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNinguno de esto prueba un \"trato con el diablo.\" Pero todos sugieren un acuerdo de poder significativo.\u003c/p\u003e\n\u003ch3 id=\"el-cambio-de-dirección\"\u003eEl Cambio de Dirección\u003c/h3\u003e\n\u003cp\u003eAntes de 1786, la Iglesia Católica buscaba poder espiritual. Después de 1786, persiguió poder mundano:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFinanzas globales\u003c/li\u003e\n\u003cli\u003ePolítica de estado\u003c/li\u003e\n\u003cli\u003eInteligencia\u003c/li\u003e\n\u003cli\u003eControl social\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEste cambio de prioridades es consistente con un trato en el cual poder mundano fue intercambiado por autoridad espiritual.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"los-resultados\"\u003eLos Resultados\u003c/h2\u003e\n\u003ch3 id=\"el-papado-moderno\"\u003eEl Papado Moderno\u003c/h3\u003e\n\u003cp\u003eEl papado moderno ha traicionado consistentemente sus principios espirituales:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eCobertura de abuso sexual\u003c/li\u003e\n\u003cli\u003eComplicidad en crímenes de guerra\u003c/li\u003e\n\u003cli\u003eFinanciamiento de gobiernos criminales\u003c/li\u003e\n\u003cli\u003eAlianza con poderes anticristianos\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eUn papado bajo voto de honestidad espiritual nunca haría estas cosas. Un papado bajo trato con poderes oscuros haría exactamente estas cosas.\u003c/p\u003e\n\u003ch3 id=\"la-orden-de-jesuitas\"\u003eLa Orden de Jesuitas\u003c/h3\u003e\n\u003cp\u003eLos Jesuitas, descritos en \u003cem\u003eConfidencial Católico\u003c/em\u003e como una orden militar más que un orden espiritual, han logrado:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eInfiltración de gobiernos globales\u003c/li\u003e\n\u003cli\u003eControl sobre educación de élites\u003c/li\u003e\n\u003cli\u003eOperación de redes de inteligencia\u003c/li\u003e\n\u003cli\u003eAcumulación de riqueza sin precedentes\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEl logro es consistente con poderes no humanos.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-pregunta-teológica\"\u003eLa Pregunta Teológica\u003c/h2\u003e\n\u003cp\u003e¿Puede un Papa negocia un trato con demonios en nombre de la Iglesia Católica? ¿Sería tal trato válido en términos espirituales?\u003c/p\u003e\n\u003cp\u003eLa teología ortodoxa diría no. Una institución no puede alienar su alma a través de acuerdo de un líder individual. Pero la historia sugestere que tal cosa fue tentada en 1786.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"encuentra-más-información\"\u003eEncuentra Más Información\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eConfidencial Católico: Secretos Jesuitas Deplorables Revelados\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¿Qué hay en el sótano del Vaticano puede sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eLa teología advertía contra tales pactos. Faustus negoció su alma por conocimiento. El Papa de 1786 negoció quizás las almas de cientos de millones por poder temporal. Si tal cosa ocurrió, fue el acto de traición más grande en historia cristiana — una traición cuyos resultados todavía resuenan.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min
