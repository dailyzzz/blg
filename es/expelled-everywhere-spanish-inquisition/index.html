eople's faces. You yourselves do not enter, nor will you let those enter who are trying to.\"\u003c/em\u003e — Matthew 23:13\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eJesus Christ reserved His harshest condemnation not for sinners but for the religious elite who used their authority to control, exploit, and destroy. The Pharisees of His day wore the robes of righteousness while serving the prince of darkness. Two thousand years later, nothing has changed. The Spanish Inquisition, established in 1478 by papal decree, was presented as a tool of religious purity — a necessary measure to root out heresy and protect the faith. In reality, it was a mechanism of total social control, operated by a Church that had long since been infiltrated by Satanic forces.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, founded by Ignatius Loyola in 1534, became the intellectual and operational engine of the Inquisition's later phases. Michelangelo Tamburini, the 14th Superior General of the Jesuits, boasted: \u003cem\u003e\"From this chamber I govern not only to Paris but to China, not only to China but to all the world.\"\u003c/em\u003e This was not hyperbole. Through the Inquisition, the Jesuits and their Vatican masters established a template for totalitarian control that would be replicated in every subsequent police state — from Revolutionary France to Soviet Russia to modern surveillance societies.\u003c/p\u003e\n\u003cp\u003eSatan himself orchestrated this machinery of persecution through his earthly agents in the Catholic Church and its secret society appendages. The track \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e captures the nature of this infiltration: the enemy does not attack from outside; he wears the vestments of the priest and speaks with the authority of God while serving the Father of Lies. And as \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e declares, the lies of the deceiver have been woven into the fabric of recorded history itself.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-origins-of-the-inquisition\"\u003eThe Origins of the Inquisition\u003c/h2\u003e\n\u003ch3 id=\"the-papal-power-grab\"\u003eThe Papal Power Grab\u003c/h3\u003e\n\u003cp\u003eThe Spanish Inquisition was established on November 1, 1478, by Pope Sixtus IV through the papal bull \u003cem\u003eExigit Sincerae Devotionis Affectus\u003c/em\u003e. While earlier inquisitions had existed since the 12th century (the Medieval Inquisition targeted Cathars, Waldensians, and other groups who challenged papal authority), the Spanish Inquisition represented something new: a permanent institution with its own bureaucracy, its own prisons, its own intelligence network, and its own sources of revenue.\u003c/p\u003e\n\u003cp\u003eThe official justification was the detection of \"false converts\" — Jews and Muslims who had publicly converted to Christianity but allegedly continued to practice their original faiths in private. But the real targets were far broader. The Inquisition investigated, prosecuted, and punished anyone who threatened the established order: intellectuals, scientists, political dissidents, wealthy merchants whose property could be confiscated, and anyone who dared to read, think, or speak outside the boundaries set by the Church.\u003c/p\u003e\n\u003cp\u003eAt its height, the Spanish Inquisition maintained tribunals in every major city in Spain, plus satellite operations in the Spanish colonies — Mexico, Peru, Colombia, the Philippines. Its reach was global, and its methods were totalitarian. Every citizen was encouraged to inform on their neighbors. Anonymous accusations were accepted. The accused were presumed guilty and denied access to the evidence against them. Torture was standard practice.\u003c/p\u003e\n\u003ch3 id=\"the-economic-engine-of-persecution\"\u003eThe Economic Engine of Persecution\u003c/h3\u003e\n\u003cp\u003eOne of the least discussed aspects of the Inquisition is its economic function. The property of convicted heretics was confiscated by the Inquisition — split between the Church, the Crown, and the institution itself. This created a perverse financial incentive: the more \"heretics\" the Inquisition convicted, the wealthier it became.\u003c/p\u003e\n\u003cp\u003eWealthy merchants and financiers were particularly attractive targets. A single conviction could yield more revenue than years of ordinary taxation. The expulsion of Jews from Spain in 1492 — the same year Columbus sailed — resulted in the transfer of enormous wealth from the expelled community to the Crown and the Church.\u003c/p\u003e\n\u003cp\u003eThis was not religious zeal; it was organized theft carried out under the banner of faith. The same pattern would be repeated centuries later by every totalitarian regime that used ideological purity as a pretext for the confiscation of wealth — from the French Revolution to the Bolshevik seizure of Russian assets to the Nazi Aryanization of Jewish property. In every case, the template was the Spanish Inquisition.\u003c/p\u003e\n\u003ch2 id=\"the-expulsion-pattern\"\u003eThe Expulsion Pattern\u003c/h2\u003e\n\u003ch3 id=\"spain-1492\"\u003eSpain, 1492\u003c/h3\u003e\n\u003cp\u003eThe Alhambra Decree of March 31, 1492, ordered the expulsion of all practicing Jews from Spain. An estimated 200,000 people were forced to leave within four months, abandoning their homes, businesses, and most of their property. Those who remained were forced to convert — and even converts (conversos) remained under permanent suspicion, subject to investigation by the Inquisition at any time.\u003c/p\u003e\n\u003cp\u003eThe timing of the Alhambra Decree — issued just months before Columbus's first voyage — is not coincidental. The expulsion was part of a coordinated strategy to consolidate Spanish wealth, eliminate rival power centers, and fund the conquest of the Americas. The confiscated property of the expelled community provided a significant portion of the capital used to finance Columbus's expedition.\u003c/p\u003e\n\u003ch3 id=\"portugal-1497\"\u003ePortugal, 1497\u003c/h3\u003e\n\u003cp\u003ePortugal followed Spain's example in 1497, ordering the expulsion or forced conversion of its Jewish population. King Manuel I, who had initially welcomed the refugees from Spain, reversed course under pressure from the Spanish Crown (his marriage to Isabella and Ferdinand's daughter was conditional on the expulsion). The Portuguese Inquisition, formally established in 1536, would become one of the most brutal in Europe.\u003c/p\u003e\n\u003ch3 id=\"england-france-and-the-pattern-across-europe\"\u003eEngland, France, and the Pattern Across Europe\u003c/h3\u003e\n\u003cp\u003eThe expulsion from Spain was not an isolated event but the culmination of a pattern that had been repeating across Europe for centuries. England expelled its Jewish population in 1290. France did the same in 1306, 1322, and 1394. Various German principalities, Italian city-states, and Eastern European kingdoms followed suit at different times.\u003c/p\u003e\n\u003cp\u003eIn every case, the pattern was the same: welcome a community, allow them to build wealth, then expel them and confiscate their assets. This cycle of invitation and expulsion was not driven by popular sentiment alone — it was orchestrated by ruling elites who used religious prejudice as a tool for economic extraction.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-role-in-the-inquisition\"\u003eThe Jesuit Role in the Inquisition\u003c/h3\u003e\n\u003cp\u003eWhile the Jesuit order was not formally founded until 1534 — over fifty years after the establishment of the Spanish Inquisition — the Jesuits quickly became the Inquisition's most effective operators. Their training in logic, rhetoric, and psychological manipulation made them ideal interrogators. Their global intelligence network provided information that the Inquisition's own agents could not gather. And their absolute obedience to the Pope (\"I will believe that the white I see is black if the hierarchical church so defines it\") made them the perfect instruments of papal authority.\u003c/p\u003e\n\u003cp\u003eIgnatius Loyola himself was investigated by the Inquisition multiple times before founding the Jesuit order — a fact that has led some researchers to suggest that Loyola was recruited by the Inquisition during these encounters and that the Jesuit order was created, at least in part, as a more sophisticated version of the Inquisition's intelligence apparatus.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' involvement in the Inquisition extended beyond Spain. In Portuguese India, Jesuit-led inquisitions at Goa (1561-1812) were notorious for their cruelty, targeting Hindus and local Christians who failed to conform to Roman Catholic orthodoxy. In South America, Jesuit missionaries established \"reductions\" — essentially prison colonies — where indigenous peoples were confined, controlled, and forced to labor under the pretext of religious instruction.\u003c/p\u003e\n\u003ch2 id=\"the-methods-of-control\"\u003eThe Methods of Control\u003c/h2\u003e\n\u003ch3 id=\"torture-as-technology\"\u003eTorture as Technology\u003c/h3\u003e\n\u003cp\u003eThe Inquisition's torture methods were not random acts of sadism — they were carefully designed technologies of information extraction and social control. The strappado (hoisting the victim by their bound wrists), the rack (stretching the body until joints dislocated), waterboarding (pouring water over a cloth placed on the face), and the use of heated irons were all standardized procedures documented in the Inquisition's own manuals.\u003c/p\u003e\n\u003cp\u003eThese manuals were classified documents, available only to trained inquisitors. They represented centuries of accumulated knowledge about the human body's breaking points — knowledge that would later be inherited by modern intelligence agencies. The CIA's \"enhanced interrogation techniques,\" revealed in the Senate Intelligence Committee's report, bear a striking resemblance to Inquisition methods. This is not coincidence; it is lineage.\u003c/p\u003e\n\u003ch3 id=\"the-auto-da-fe-public-ritual-of-control\"\u003eThe Auto-da-Fe: Public Ritual of Control\u003c/h3\u003e\n\u003cp\u003eThe auto-da-fe (\"act of faith\") was the Inquisition's public ceremony of judgment and punishment. Convicted heretics were paraded through the streets in penitential garments, their sentences read aloud before crowds of thousands. Those condemned to death were burned at the stake — often alive, if they refused to confess at the last moment.\u003c/p\u003e\n\u003cp\u003eThese were not merely punishments; they were theatrical productions designed to terrorize the population into obedience. The auto-da-fe was a Satanic ritual masquerading as a religious ceremony — a public sacrifice to the false god of institutional power. The crowd was not a witness but a participant, conditioned to associate obedience with survival and dissent with agonizing death.\u003c/p\u003e\n\u003cp\u003eAs Howard Pittman learned during his near-death experience, the demonic hierarchy maintains its power through fear and deception. The auto-da-fe was the physical manifestation of this spiritual principle — a demonstration of the consequences of stepping outside the boundaries set by the rulers of darkness. Pittman testified that words are spiritual (Matthew 12:36-37), and the words pronounced at the auto-da-fe — the sentences of death, the declarations of heresy — carried spiritual weight that extended far beyond their immediate physical consequences. Watch his full testimony: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"the-legacy-of-the-inquisition\"\u003eThe Legacy of the Inquisition\u003c/h2\u003e\n\u003ch3 id=\"the-blueprint-for-modern-surveillance\"\u003eThe Blueprint for Modern Surveillance\u003c/h3\u003e\n\u003cp\u003eThe Inquisition created the first modern surveillance state. Its network of informants, its system of files and dossiers, its centralized database of suspects, and its procedures for investigation and interrogation would be recognizable to any modern intelligence professional. The NSA, the FSB, and China's social credit system are all descendants — whether consciously or unconsciously — of the system perfected by the Inquisition in 15th-century Spain.\u003c/p\u003e\n\u003cp\u003eThe Inquisition also pioneered the concept of \"thought crime\" — the idea that one's private beliefs, rather than one's public actions, could be grounds for prosecution. This concept, which George Orwell would later immortalize in \u003cem\u003e1984\u003c/em\u003e, was not a 20th-century invention. It was a 15th-century Inquisition innovation, designed to ensure that no space — not even the interior of a person's mind — was beyond the reach of institutional authority.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-continuation\"\u003eThe Jesuit Continuation\u003c/h3\u003e\n\u003cp\u003eThe Spanish Inquisition was not formally abolished until 1834, but its methods and its organizational structure lived on in the Jesuit order. Pope Clement XIV suppressed the Jesuits in 1773, recognizing the existential threat they posed to every government in Europe. But Clement was poisoned shortly after issuing the suppression — almost certainly by Jesuit agents — and the order was restored by Pope Pius VII in 1814.\u003c/p\u003e\n\u003cp\u003eDuring the forty years of their \"suppression,\" the Jesuits simply went underground, operating through front organizations, infiltrating other religious orders, and maintaining their intelligence networks. As documented in \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e, the Jesuit oath requires every member to sacrifice everything — including their conscience — for the society. \"Every species of vice finds its patronage in them,\" as one contemporary observer noted.\u003c/p\u003e\n\u003cp\u003eFor comprehensive documentation of these patterns, visit \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e, which traces the lineage of institutional control from the Inquisition through modern intelligence operations.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e reveals how the Inquisition's methods of psychological torture evolved into the CIA's mind control programs — a direct lineage from 15th-century Spain to 20th-century America.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/127-Operation_Midnight_Climax.mp4\"\u003eOperation Midnight Climax\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/105-Freemason_Jesters.mp4\"\u003eFreemason Jesters\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/christopher-columbus-devil-hero/?lang=es\"\u003eChristopher Columbus: The Devil in a Hero Suit\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pope-stole-world/?lang=es\"\u003eSex, Murder, and Scheme: How the Pope Stole the World\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/knights-templar-conspiracy-part1/?lang=es\"\u003eThe Knights Templar CONSPIRACY That Changed the World Part 1\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe Spanish Inquisition did not end in 1834. It evolved. The methods refined over three centuries of persecution — surveillance, torture, thought control, economic confiscation — became the foundation for every modern system of institutional control. The Jesuits who ran it were never disbanded; they simply changed their names and their methods. The Inquisition is alive today in every intelligence agency, every social media algorithm, every fact-checker that tells you what you are allowed to think. The question is not whether the Inquisition ended — it is whether you will submit to its modern incarnation.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\"
