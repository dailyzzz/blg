<!DOCTYPE html><!--1SCAkP9FwT0rta0r4lLXo--><html lang="en"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="/_next/static/css/91e093b7a73c5956.css" data-precedence="next"/><link rel="preload" as="script" fetchPriority="low" href="/_next/static/chunks/webpack-f1ed66bbfd105ed8.js"/><script src="/_next/static/chunks/4bd1b696-f785427dddbba9fb.js" async=""></script><script src="/_next/static/chunks/1255-e9e68aae815f4730.js" async=""></script><script src="/_next/static/chunks/main-app-55680528af95a8bc.js" async=""></script><script src="/_next/static/chunks/2221-7e6c4e32da135429.js" async=""></script><script src="/_next/static/chunks/app/layout-566ab9571eddcabf.js" async=""></script><script src="/_next/static/chunks/app/%5Blang%5D/%5Bslug%5D/page-a424dc1babd9b142.js" async=""></script><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/><link rel="alternate" type="application/rss+xml" title="ZZZ Daily Blog RSS" href="/rss.xml"/><title>OGM: La modificación genética de tu suministro de alimentos | ZZZ Daily Blog | ZZZ Daily Blog</title><meta name="description" content="Los organismos genéticamente modificados han infiltrado el suministro global de alimentos bajo la protección de reguladores capturados y afirmaciones falsas de seguridad. Desde las semillas Roundup Ready de Monsanto hasta la saturación de glifosato, los OGM representan el control corporativo de la necesidad humana más fundamental: la comida misma."/><meta name="author" content="zzzdaily-team"/><meta name="keywords" content="GMO, Monsanto, glyphosate, Roundup, genetic-modification"/><meta name="robots" content="index, follow"/><meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"/><link rel="canonical" href="https://blog.zzzdaily.com/es/gmo-genetic-modification-food/"/><link rel="alternate" hr  tierra'; y así fue.\" — Génesis 1:11\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLa frase \"según su género\" aparece diez veces en Génesis 1. No es un detalle casual, es un principio fundamental de la creación. Dios diseñó cada ser viviente para reproducirse según su propio género, con su semilla en sí mismo. La semilla era soberana. La semilla era libre. La semilla pertenecía a la planta, al agricultor y finalmente a Dios.\u003c/p\u003e\n\u003cp\u003eLo que la industria de modificación genética ha hecho es apoderarse de la semilla, reescribir su código, patentar su biología y transformar el elemento más fundamental del suministro de alimentos en propiedad intelectual corporativa. Esto no es agricultura. Esta es conquista biológica.\u003c/p\u003e\n\u003cp\u003eLa canción \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/47-The_Transgression.mp4\"\u003eLa transgresión\u003c/a\u003e del álbum Confliction habla sobre el cruce de límites que Dios estableció en la creación: límites entre géneros, entre lo natural y lo diseñado, entre lo que pertenece al Creador y lo que el hombre no tiene derecho a reclamar.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"qué-es-la-modificación-genética\"\u003e¿Qué es la modificación genética?\u003c/h2\u003e\n\u003cp\u003eLa modificación genética es el proceso de insertar artificialmente material genético de un organismo en otro para producir rasgos que no ocurren naturalmente. A diferencia de la reproducción tradicional, que funciona dentro de los límites reproductivos de una especie, la modificación genética cruza esos límites completamente.\u003c/p\u003e\n\u003cp\u003eGenes de bacterias se insertan en maíz. Genes de virus se insertan en soja. Genes de peces han sido insertados en tomates. La tecnología no respeta los límites de \"género\", los borra.\u003c/p\u003e\n\u003cp\u003eEl primer cultivo OGM cultivado comercialmente fue el tomate Flavr Savr, aprobado por la FDA en 1994. Fue un fracaso comercial. Pero la tecnología que siguió, particularmente las plataformas Roundup Ready y Bt de Monsanto, transformó la agricultura global en una sola generación.\u003c/p\u003e\n\u003cp\u003ePara 2023, más de 190 millones de hectáreas de cultivos OGM fueron plantados en todo el mundo. En los Estados Unidos, más del 90% de soja, maíz, algodón, canola y remolacha azucarera son genéticamente modificados.\u003c/p\u003e\n\u003cp\u003eLas dos tecnologías OGM dominantes son la tolerancia herbicida y la resistencia a insectos. Los cultivos Roundup Ready están diseñados para sobrevivir siendo rociados con el herbicida glifosato de Monsanto (Roundup), permitiendo a los agricultores rociar campos completos con herbicida sin matar la cosecha.\u003c/p\u003e\n\u003cp\u003eLos cultivos Bt están diseñados para producir su propio insecticida, una toxina derivada de la bacteria Bacillus thuringiensis, en cada célula de la planta, incluyendo las partes que los humanos y animales comen.\u003c/p\u003e\n\u003cp\u003eAmbas tecnologías fueron comercializadas como mejoras: menos malezas, menos insectos, mayores rendimientos, menos uso químico. Cada una de estas afirmaciones ha demostrado ser engañosa o falsa a largo plazo.\u003c/p\u003e\n\u003cp\u003eLa resistencia a herbicidas ha explotado. La resistencia a insectos está emergiendo. Los aumentos de rendimiento son marginales comparados con la reproducción convencional. Y el uso químico total ha aumentado, no disminuido, ya que los agricultores rocían más herbicida para combatir malezas resistentes.\u003c/p\u003e\n\u003cp\u003eUn informe de 2016 de las Academias Nacionales de Ciencias, Ingeniería y Medicina, una institución difícilmente radical anti-OGM, no encontró evidencia de que los cultivos OGM hubieran aumentado la tasa de mejora de rendimiento más allá de lo que la reproducción convencional ya había logrado. El informe reconoció que las malezas resistentes a herbicidas se estaban proliferando y que los beneficios ambientales de los cultivos OGM fueron, en el mejor de los casos, mixtos.\u003c/p\u003e\n\u003cp\u003eLas promesas que vendieron los OGM al mundo, mayores rendimientos, menos químicos, mejor nutrición, no se han materializado. Lo que se ha materializado es el control corporativo del suministro de semillas, la saturación química del sistema alimentario y la destrucción sistemática de la biodiversidad agrícola.\u003c/p\u003e\n\u003ch2 id=\"monsanto-la-corporación-que-era-dueña-de-la-comida\"\u003eMonsanto: la corporación que era dueña de la comida\u003c/h2\u003e\n\u003cp\u003ePara entender los OGM, debes entender Monsanto. Fundada en 1901 en San Luis, Misuri, el historial de Monsanto parece un catálogo de guerra química contra la vida misma.\u003c/p\u003e\n\u003cp\u003eAntes de entrar en el sector agrícola, Monsanto era un fabricante líder de bifenilos policlorados (PCB), que fueron prohibidos en 1979 como toxinas ambientales persistentes. Monsanto produjo el Agente Naranja, el desfoliante utilizado en la Guerra de Vietnam, que causó cáncer, defectos de nacimiento y devastación ambiental que persiste hasta hoy.\u003c/p\u003e\n\u003cp\u003eMonsanto produjo la hormona de crecimiento bovino (rBGH), que fue inyectada en vacas lecheras para aumentar la producción de leche a pesar de la evidencia de efectos en la salud tanto en vacas como en humanos.\u003c/p\u003e\n\u003cp\u003eCuando Monsanto entró en el negocio de semillas en los años 90, lo hizo con la misma estrategia agresiva y monopolística que caracterizó sus operaciones químicas. La empresa compró empresas de semillas en todo el mundo, adquiriendo la genética de variedades de cultivos que los agricultores habían desarrollado durante siglos.\u003c/p\u003e\n\u003cp\u003eLuego patentó versiones genéticamente modificadas de estos cultivos y utilizó sus derechos de propiedad intelectual para controlar cómo los agricultores podrían usar sus propias semillas.\u003c/p\u003e\n\u003cp\u003eBajo el régimen de patentes de Monsanto, los agricultores que plantaban semillas Roundup Ready fueron obligados a firmar acuerdos de tecnología que les prohibían guardar semillas para replantarlas, una práctica que había sido la base de la agricultura desde el comienzo de la civilización.\u003c/p\u003e\n\u003cp\u003eLos agricultores que violaban estos acuerdos, o que se encontraba que tenían la genética patentada de Monsanto en sus campos debido a la polinización cruzada, fueron demandados. Entre 1997 y 2010, Monsanto presentó 147 demandas contra agricultores estadounidenses y resolvió 700 casos adicionales fuera de los tribunales.\u003c/p\u003e\n\u003cp\u003eMonsanto mantenía una división de cumplimiento que incluía investigadores privados que vigilaban a agricultores sospechosos de guardar semillas. Los agricultores reportaron ser visitados por agentes de Monsanto que exigían acceso a sus campos y registros. La atmósfera en las comunidades rurales fue descrita por el Centro para la Seguridad Alimentaria como una de \"intimidación y miedo.\"\u003c/p\u003e\n\u003cp\u003eEl caso de Percy Schmeiser, un agricultor canadiense de canola, se convirtió en un símbolo global del exceso corporativo. Los campos de Schmeiser fueron contaminados con canola Roundup Ready a través del polen llevado por el viento de granjas vecinas. Monsanto lo demandó por infracción de patente.\u003c/p\u003e\n\u003cp\u003eLa Corte Suprema de Canadá falló a favor de Monsanto, estableciendo el precedente legal de que una corporación puede ser dueña de la genética de un organismo viviente incluso cuando ese organismo contamina el campo de un agricultor sin su consentimiento.\u003c/p\u003e\n\u003cp\u003eEl caso Schmeiser estableció un principio legal con implicaciones aterradoras: la contaminación genética fluye en una sola dirección. Cuando el polen de Monsanto se deriva al campo de un agricultor, el agricultor es culpable de infracción de patente. Pero cuando el cultivo orgánico del agricultor está contaminado por polen OGM, destruyendo su certificación orgánica y su valor de mercado, Monsanto no tiene responsabilidad.\u003c/p\u003e\n\u003cp\u003eLa asimetría es absoluta. La contaminación de la corporación crea derechos corporativos. La contaminación del agricultor crea responsabilidad corporativa. La ley protege al titular de la patente, no al agricultor. La ley protege al contaminador, no a los contaminados.\u003c/p\u003e\n\u003cp\u003eEn los Estados Unidos, la Asociación de Productores y Comerciantes de Semillas Orgánicas presentó una demanda preventiva en 2011 buscando una declaración de corte de que los agricultores que fueron inadvertidamente contaminados por los rasgos OGM de Monsanto no podrían ser demandados por infracción de patente. El caso fue desestimado y la desestimación fue confirmada en apelación. La corte reconoció la \"garantía vinculante\" de Monsanto de no demandar a agricultores con contaminación de rastro, pero se negó a proporcionar cualquier protección legal más allá de la promesa voluntaria de la corporación.\u003c/p\u003e\n\u003ch2 id=\"glifosato-el-socio-químico\"\u003eGlifosato: el socio químico\u003c/h2\u003e\n\u003cp\u003eLos cultivos OGM no existen aislados. Existen como parte de un sistema químico. Los cultivos Roundup Ready están diseñados para ser saturados de glifosato, y lo son. Desde la introducción de cultivos Roundup Ready en 1996, el uso global de glifosato ha aumentado aproximadamente 1,500%.\u003c/p\u003e\n\u003cp\u003eSolo en los Estados Unidos, se aplican más de 300 millones de libras de glifosato anualmente.\u003c/p\u003e\n\u003cp\u003eEl glifosato no es meramente un herbicida. Fue originalmente patentado como un quelante de minerales (uniendo minerales esenciales y haciéndolos indisponibles para las plantas), y después patentado como un antibiótico.\u003c/p\u003e\n\u003cp\u003eCuando se aplica al suelo, mata microorganismos beneficiosos, quelata minerales esenciales e interrumpe los procesos biológicos que hacen fértil el suelo. Cuando es consumido por humanos, interrumpe el microbioma intestinal, quelata minerales en el tracto digestivo y ha sido clasificado por la Agencia Internacional para la Investigación del Cáncer (IARC) como \"probablemente carcinógeno para humanos.\"\u003c/p\u003e\n\u003cp\u003eLa saturación del suministro de alimentos con glifosato es ahora total. Las pruebas han encontrado glifosato en pan, cereal, avena, miel, cerveza, vino, fórmula infantil, leche materna y orina humana.\u003c/p\u003e\n\u003cp\u003eUn estudio de 2022 publicado en Environmental Health encontró niveles detectables de glifosato en más del 80% de muestras de orina de estadounidenses probados. No eliges consumir glifosato. Está en el suministro de alimentos, en el agua y en tu cuerpo si consientes o no.\u003c/p\u003e\n\u003cp\u003eEl uso de glifosato como un desecante pre-cosecha, rociado directamente en trigo, avena, cebada y otros cultivos días antes de la cosecha para acelerar el secado, significa que los residuos de glifosato más altos se encuentran en los alimentos a base de granos que las directrices dietéticas de la USDA les dicen a los estadounidenses que coman 6-11 porciones por día.\u003c/p\u003e\n\u003cp\u003eEl sistema es internamente consistente: recomendar los alimentos que contienen el más veneno.\u003c/p\u003e\n\u003ch2 id=\"la-mentira-de-la-seguridad\"\u003eLa mentira de la seguridad\u003c/h2\u003e\n\u003cp\u003eLa FDA aprobó alimentos OGM en 1992 bajo una política de \"equivalencia sustancial\", la afirmación de que los alimentos genéticamente modificados son sustancialmente equivalentes a sus contrapartes convencionales y por lo tanto no requieren pruebas de seguridad especiales, etiquetado o regulación.\u003c/p\u003e\n\u003cp\u003eEsta política fue redactada bajo la dirección de Michael Taylor, quien se desempeñó simultáneamente como Comisionado Adjunto de la FDA y Vicepresidente de Monsanto para la Política Pública. El conflicto de intereses no fue ocultado, fue celebrado como \"asociación público-privada.\"\u003c/p\u003e\n\u003cp\u003eLa doctrina de equivalencia sustancial no es un hallazgo científico. Es una decisión política que exime alimentos OGM de las pruebas de seguridad requeridas de aditivos alimentarios, drogas y cualquier otra sustancia novel introducida en el cuerpo humano.\u003c/p\u003e\n\u003cp\u003eNo se requirieron estudios de alimentación humanos a largo plazo antes de que los cultivos OGM fueran aprobados. No se realizaron evaluaciones de seguridad independientes. Los datos de seguridad en los que se basó la FDA provenían casi en su totalidad de las empresas que buscaban aprobación, principalmente Monsanto.\u003c/p\u003e\n\u003cp\u003eLos documentos internos de la FDA, liberados a través de una demanda presentada por la Alianza para la Integridad Biológica, revelaron que los científicos de la agencia habían advertido que los alimentos OGM podrían producir toxinas inesperadas, alérgenos y cambios nutricionales. Estas advertencias fueron anuladas por designados políticos y la política de equivalencia sustancial fue adoptada sin el consenso científico que la FDA afirmaba públicamente.\u003c/p\u003e\n\u003cp\u003eCuando los investigadores independientes intentaron realizar estudios de seguridad, fueron encontrados con obstrucción sistemática.\u003c/p\u003e\n\u003cp\u003eEl Dr. Arpad Pusztai, un investigador del Instituto Rowett en Escocia, realizó estudios de alimentación mostrando que las ratas alimentadas con papas genéticamente modificadas desarrollaron crecimiento de células precancerosas, cerebros más pequeños y sistemas inmunológicos dañados. Cuando reportó sus hallazgos en la televisión británica en 1998, fue despedido de su puesto dentro de 48 horas, su equipo de investigación fue disuelto y sus datos fueron incautados.\u003c/p\u003e\n\u003cp\u003eEl estudio de alimentación de dos años del Profesor Gilles-Eric Seralini, publicado en 2012, encontró mayores tasas de tumores y daño de órganos en ratas alimentadas con maíz Roundup Ready. El estudio fue atacado por una campaña coordinada que incluyó a un exempleado de Monsanto sirviendo como editor de la revista que retractó el documento.\u003c/p\u003e\n\u003cp\u003eLa retracción fue posteriormente revertida cuando el estudio fue republicado después de revisión independiente, pero el daño a la reputación de Seralini y el efecto congelador en otros investigadores, ya había sido logrado.\u003c/p\u003e\n\u003ch2 id=\"la-batalla-de-etiquetado\"\u003eLa batalla de etiquetado\u003c/h2\u003e\n\u003cp\u003eDurante dos décadas, la industria biotecnológica luchó para prevenir el etiquetado obligatorio de alimentos OGM. La industria gastó más de 700 millones de dólares entre 2012 y 2016 solamente para derrotar iniciativas de etiquetado de OGM a nivel estatal en California, Washington, Oregón y Colorado.\u003c/p\u003e\n\u003cp\u003eEl argumento fue revelador: si los alimentos OGM son seguros y sustancialmente equivalentes, ¿por qué gastar 700 millones de dólares para prevenir que los consumidores sepan que los contienen?\u003c/p\u003e\n\u003cp\u003eEn 2016, el Congreso aprobó la Norma Nacional de Divulgación de Alimentos Bioingeniería, una ley de etiquetado federal que anuló requisitos de etiquetado estatal más fuertes. La ley fue ampliamente criticada por usar el término oscuro \"bioingeniería\" en lugar de \"OGM\", por permitir a las empresas divulgar contenido OGM a través de códigos QR en lugar de etiquetas en el paquete (desventajando a los consumidores sin teléfonos inteligentes), y por eximir ingredientes altamente procesados (como jarabe de maíz de alta fructosa derivado de maíz OGM) de divulgación.\u003c/p\u003e\n\u003cp\u003eLa ley de etiquetado fue diseñada para parecer responsiva a la demanda del consumidor mientras proporcionaba la transparencia mínima posible. Fue una victoria para la industria biotecnológica, no para los consumidores.\u003c/p\u003e\n\u003cp\u003eMás de 60 países en todo el mundo han implementado requisitos de etiquetado obligatorio de OGM. Los Estados Unidos, el productor mundial más grande de cultivos OGM, tiene el régimen de etiquetado más débil entre naciones desarrolladas. La correlación entre el poder de cabildeo de la industria y la indulgencia reguladora no es coincidencial.\u003c/p\u003e\n\u003cp\u003eLos consumidores que desean evitar OGM deben navegar un sistema de etiquetado diseñado para oscurecer en lugar de informar. La etiqueta \"Non-GMO Project Verified\", una certificación privada, se ha convertido en el medio principal por el cual los consumidores estadounidenses identifican productos sin OGM. Que una organización privada deba llenar la brecha dejada por el fracaso del gobierno te dice todo lo que necesitas saber sobre cuyos intereses sirve el gobierno.\u003c/p\u003e\n\u003ch2 id=\"patentes-de-semillas-y-soberanía-alimentaria\"\u003ePatentes de semillas y soberanía alimentaria\u003c/h2\u003e\n\u003cp\u003eLa patente de semillas es quizás la dimensión más consecuente y menos entendida de la revolución OGM. Cuando Monsanto patenta una semilla genéticamente modificada, no es meramente dueña de un producto. Es dueña de una forma de vida, y cada reproducción de esa forma de vida.\u003c/p\u003e\n\u003cp\u003eLa semilla no puede reproducirse libremente, como Dios la diseñó. Se reproduce bajo licencia, con pagos de regalías, sujeta a términos y condiciones corporativos.\u003c/p\u003e\n\u003cp\u003eEsto no es una technicidad legal menor. Es la privatización de los bienes comunes biológicos, la transformación de la semilla, que ha sido el patrimonio compartido de la humanidad desde el comienzo de la agricultura, en propiedad intelectual corporativa.\u003c/p\u003e\n\u003cp\u003eCuando una corporación es dueña de la semilla, es dueña de la comida. Cuando es dueña de la comida, es dueña de las personas que dependen de esa comida para sobrevivir.\u003c/p\u003e\n\u003cp\u003eLas implicaciones para la soberanía alimentaria global son devastadoras. En India, la introducción de semillas de algodón Bt de Monsanto en 2002 creó un ciclo de deuda y dependencia que contribuyó a una ola de suicidios de agricultores.\u003c/p\u003e\n\u003cp\u003eLos agricultores que compraron las semillas patentadas costosas y los insumos químicos que requerían se encontraron atrapados en deuda cuando las cosechas fallaron o los precios cayeron. Entre 1995 y 2018, más de 300,000 agricultores indios cometieron suicidio, una crisis ampliamente vinculada a las presiones económicas de la agricultura industrial y la dependencia de semillas.\u003c/p\u003e\n\u003cp\u003eComo documenta nuestro artículo sobre \u003ca href=\"/seed-vault-control-food-future/?lang=es\"\u003eLa bóveda de semillas: ¿Quién controla el futuro de la comida?\u003c/a\u003e, las corporaciones y multimillonarios que promueven OGM están simultáneamente recopilando y almacenando la genética de semillas naturales del mundo en instalaciones como la Bóveda Global de Semillas de Svalbard, preservando los originales naturales mientras los reemplazan con modificaciones patentadas en los campos del mundo.\u003c/p\u003e\n\u003ch2 id=\"las-consecuencias-ambientales\"\u003eLas consecuencias ambientales\u003c/h2\u003e\n\u003cp\u003eLas consecuencias ambientales de la agricultura OGM se extienden mucho más allá de los campos donde se plantan cultivos modificados. La polinización cruzada disemina genética OGM a poblaciones de plantas silvestres y granjas orgánicas.\u003c/p\u003e\n\u003cp\u003eLas malezas resistentes a herbicidas, \"supermalezas\", han evolucionado en respuesta a la saturación de glifosato, con más de 50 especies de malezas ahora documentadas como resistentes al glifosato en todo el mundo. Estas supermalezas requieren herbicidas cada vez más tóxicos para controlar, incluyendo 2,4-D (un componente del Agente Naranja) y dicamba, que se deriva de campos tratados y daña cultivos vecinos.\u003c/p\u003e\n\u003cp\u003eLa crisis de deriva de dicamba ha causado millones de dólares en daño a granjas sin OGM en todo el Medio Oeste y Sur. Los agricultores que no plantaban semillas tolerantes a dicamba encontraron sus cultivos destruidos por herbicida derivando de campos vecinos, una ironía amarga en la cual el sistema OGM castiga a aquellos que se niegan a participar en él.\u003c/p\u003e\n\u003cp\u003eEl impacto en los polinizadores ha sido devastador, como se documenta en nuestro artículo sobre \u003ca href=\"/bee-colony-collapse-food-chain/?lang=es\"\u003eColapso de la colonia de abejas\u003c/a\u003e. La toxina Bt producida por cultivos OGM mata insectos beneficiosos junto con plagas objetivo. El glifosato destruye los hábitats de flores silvestres de los cuales los polinizadores dependen.\u003c/p\u003e\n\u003cp\u003eLa salud del suelo, la base de toda agricultura, está siendo degradada sistemáticamente por el sistema químico OGM. El glifosato mata hongos del suelo, bacterias y lombrices. Los fertilizantes sintéticos, aplicados para compensar la esterilidad biológica creada por la agricultura química, degradan aún más la estructura del suelo y la capacidad de retención de agua.\u003c/p\u003e\n\u003cp\u003eComo documenta nuestro artículo sobre \u003ca href=\"/organic-farming-under-attack/?lang=es\"\u003eAgricultura orgánica bajo ataque\u003c/a\u003e, la alternativa a esta destrucción, agricultura orgánica y regenerativa, está bajo asalto regulatorio sistemático por los mismos intereses que promueven OGM.\u003c/p\u003e\n\u003ch2 id=\"edición-de-genes-la-próxima-generación-de-control\"\u003eEdición de genes: la próxima generación de control\u003c/h2\u003e\n\u003cp\u003eLa industria OGM ha cambiado de marca. Reconociendo la resistencia pública a los \"organismos genéticamente modificados\", el sector biotecnológico ha desplazado su enfoque a tecnologías de edición de genes, particularmente CRISPR-Cas9, que comercializa como fundamentalmente diferente de los OGM tradicionales.\u003c/p\u003e\n\u003cp\u003eEl argumento es que la edición de genes modifica genes existentes en lugar de insertar ADN extranjero. El cultivo sigue siendo \"la misma especie\", afirma la industria, y por lo tanto no debe ser regulado como un OGM.\u003c/p\u003e\n\u003cp\u003eEsta distinción es en gran parte semántica. La edición de genes aún implica manipulación humana deliberada del código genético a un nivel de precisión que no tiene precedente en la naturaleza. Las mutaciones fuera del objetivo, cambios no intencionados en el genoma, han sido documentadas en organismos editados por genes. Las consecuencias ecológicas a largo plazo de liberar organismos editados por genes en el ambiente son tan desconocidas como lo fueron para los OGM de primera generación.\u003c/p\u003e\n\u003cp\u003eLas implicaciones regulatorias son profundas. En 2018, la USDA declaró que no regularía cultivos editados por genes que podrían haber sido desarrollados a través de reproducción convencional, exentando efectivamente la mayoría de organismos editados por genes de cualquier supervisión.\u003c/p\u003e\n\u003cp\u003eLa Corte de Justicia Europea tomó la posición opuesta en 2018, fallando que los organismos editados por genes deben ser regulados bajo el marco OGM existente de la UE. Pero la decisión ha sido impugnada por la industria y la Comisión Europea ha propuesto nuevas regulaciones que aflojarían significativamente las restricciones en cultivos editados por genes.\u003c/p\u003e\n\u003cp\u003eEl patrón es familiar: una tecnología novel con riesgos desconocidos es introducida con regulación mínima, comercializada como una mejora sobre su predecesor y presentada al público como segura basada en evaluaciones financiadas por la industria.\u003c/p\u003e\n\u003cp\u003eLa diferencia es que los organismos editados por genes pueden ser aún más difíciles de detectar que los OGM tradicionales, porque no necesariamente contienen ADN extranjero. Esto significa que el etiquetado, pruebas y regulación se vuelven prácticamente imposibles. El derecho del consumidor a saber qué hay en su comida desaparece, no porque la información sea retenida, sino porque la modificación misma es invisible para los métodos de detección existentes.\u003c/p\u003e\n\u003cp\u003eLa edición de genes representa la próxima generación de control biológico, más precisa, más poderosa y más difícil de resistir que la tecnología OGM que está diseñada para reemplazar.\u003c/p\u003e\n\u003ch2 id=\"la-puerta-giratoria\"\u003eLa puerta giratoria\u003c/h2\u003e\n\u003cp\u003eLa captura regulatoria que permitió la aprobación de OGM no es un artefacto histórico. Es una característica estructural en curso de la relación entre la industria biotecnológica y las agencias que la regulan.\u003c/p\u003e\n\u003cp\u003eMichael Taylor se mudó de la FDA a Monsanto y de vuelta a la FDA. Margaret Miller, una exinvestigadora de Monsanto, se convirtió en Directora Adjunta de la Oficina de Drogas Animales Nuevas de la FDA. Linda Fisher se mudó de la EPA a la vicepresidencia de Monsanto y de vuelta a la EPA.\u003c/p\u003e\n\u003cp\u003eIslam Siddiqui, un excabildero para CropLife America (el grupo comercial de pesticidas e industria biotecnológica), fue designado como el Negociador Agrícola Principal de la USDA, donde promovió la adopción de OGM en acuerdos comerciales internacionales.\u003c/p\u003e\n\u003cp\u003eLa puerta giratoria asegura que las personas que toman decisiones regulatorias sobre la seguridad de OGM sean las mismas personas que se beneficiaron de las ventas de OGM, o que se beneficiarán de ellas después de dejar el servicio gubernamental.\u003c/p\u003e\n\u003cp\u003eEsto no es teoría de conspiración. Es historial de carrera documentado, disponible en registros públicos, y explica por qué el marco regulador para OGM en los Estados Unidos ha permanecido fundamentalmente sin cambios desde 1992, a pesar de treinta años de evidencia acumulada de que los supuestos de seguridad original fueron inadecuados.\u003c/p\u003e\n\u003ch2 id=\"reflexión-bíblica\"\u003eReflexión bíblica\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"No se engañen, Dios no es burlado; porque todo lo que el hombre siembre, eso también cosechará.\" — Gálatas 6:7\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLa modificación genética de comida es la expresión última de una civilización que ha decidido que puede mejorar el diseño de Dios. La semilla que Dios hizo, perfecta en su género, llevando vida dentro de sí misma, libre para reproducirse y multiplicarse, ha sido reescrita, patentada y puesta bajo control corporativo.\u003c/p\u003e\n\u003cp\u003eLa creación que Dios llamó \"muy buena\" ha sido declarada insuficiente por hombres cuya calificación principal es el deseo de ganancia y el poder para hacerlo cumplir.\u003c/p\u003e\n\u003cp\u003ePero Dios no es burlado. Lo que es sembrado en transgresión es cosechado en consecuencia. Las supermalezas que desafían el glifosato, los polinizadores que colapsan bajo asalto químico, el suelo que muere bajo manejo sintético, los agricultores que no pueden permitirse las semillas que alguna vez guardaban libremente, estas son la cosecha de un sistema que plantó rebelión contra el orden creado y la llamó progreso.\u003c/p\u003e\n\u003cp\u003eLa promesa de Génesis fue semilla dentro de sí misma, vida reproduciendo vida, libremente, abundantemente, según su género. La promesa de Monsanto es semilla bajo patente, vida reproduciendo ganancia, restringida, modificada, según especificación corporativa.\u003c/p\u003e\n\u003cp\u003eEstas dos visiones de la semilla no pueden coexistir. Una es de Dios. La otra es del espíritu que siempre ha buscado suplantarlo.\u003c/p\u003e\n\u003cp\u003eEl orden creado no fue un borrador. No fue un prototipo que los ingenieros humanos sean llamados a mejorar. Fue declarado \"muy bueno\" por el Creador Mismo, completo, funcional y suficiente para todos los tiempos. La modificación genética de ese orden no es mejora. Es profanación. Y las consecuencias, suelo envenenado, polinizadores desaparecidos, agricultores dependientes, comida contaminada, son el fruto inevitable de un árbol que nunca debería haber sido plantado.\u003c/p\u003e\n\u003cp\u003eLa semilla fue dada libremente. La semilla pertenece a todos. Y aquellos que la han robado, modificado, patentado y vendido de vuelta a las personas a quienes fue dada descubrirán que no puedes mejorar el trabajo de Dios sin heredar las consecuencias del intento.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"descubre-más\"\u003eDescubre más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Testimonio de experiencia cercana a la muerte — Advertencia del fin del tiempo que Dios le dio\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Secretos deplorable jesuitas revelados\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide y Pharmakeia — La hechicería de la medicina moderna\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¡Lo que puede haber en el sótano del Vaticano podría sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"escucha-mientras-lees\"\u003eEscucha mientras lees\u003c/h2\u003e\n\u003cp\u003eEstas pistas del Diario ZZZ exploran los temas en este artículo:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/135-Food_Price_Shadow_Industry.mp4\"\u003eIndustria sombra de precios de alimentos\u003c/a\u003e — La modificación genética del suministro de alimentos\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/61-Synthetic_Biology.mp4\"\u003eBiología sintética\u003c/a\u003e — Reescribiendo el código de la vida\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explora-más\"\u003eExplora más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/seed-vault-control-food-future/?lang=es\"\u003eLa bóveda de semillas: ¿Quién controla el futuro de la comida?\u003c/a\u003e — Los multimillonarios y corporaciones almacenando semillas naturales mientras las reemplazan con OGM\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/organic-farming-under-attack/?lang=es\"\u003eAgricultura orgánica bajo ataque: La guerra contra la comida natural\u003c/a\u003e — Cómo los reguladores dirigen la única alternativa a la agricultura química\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/bee-colony-collapse-food-chain/?lang=es\"\u003eColapso de la colonia de abejas: Cuando la cadena alimentaria se rompe\u003c/a\u003e — La crisis de polinizadores impulsada por el sistema químico OGM\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eLa semilla fue el regalo de Dios a la humanidad, vida envuelta en una cáscara, llevando el plano de su género, lista para multiplicarse y llenar la tierra de abundancia. Lo que Monsanto hizo a la semilla es lo que la serpiente hizo en Edén: tomó lo que Dios dio libremente y puso condiciones en ello. Le dijo a los agricultores que podrían tener la semilla, pero solo en términos corporativos, solo con químicos corporativos y solo si nunca guardaban una semilla para el próximo año. La transgresión de Génesis fue comer lo que fue prohibido. La transgresión de la modificación genética es prohibir lo que Dios hizo libre. La semilla pertenece a Dios. Siempre ha sido así. Y aquellos que la han robado responderán por lo que han sembrado.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8
