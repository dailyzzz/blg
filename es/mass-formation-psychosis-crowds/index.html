<!DOCTYPE html><!--1SCAkP9FwT0rta0r4lLXo--><html lang="en"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="/_next/static/css/91e093b7a73c5956.css" data-precedence="next"/><link rel="preload" as="script" fetchPriority="low" href="/_next/static/chunks/webpack-f1ed66bbfd105ed8.js"/><script src="/_next/static/chunks/4bd1b696-f785427dddbba9fb.js" async=""></script><script src="/_next/static/chunks/1255-e9e68aae815f4730.js" async=""></script><script src="/_next/static/chunks/main-app-55680528af95a8bc.js" async=""></script><script src="/_next/static/chunks/2221-7e6c4e32da135429.js" async=""></script><script src="/_next/static/chunks/app/layout-566ab9571eddcabf.js" async=""></script><script src="/_next/static/chunks/app/%5Blang%5D/%5Bslug%5D/page-a424dc1babd9b142.js" async=""></script><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/><link rel="alternate" type="application/rss+xml" title="ZZZ Daily Blog RSS" href="/rss.xml"/><title>Psicosis de formación masiva: cómo controlan las multitudes | ZZZ Daily Blog | ZZZ Daily Blog</title><meta name="description" content="La psicosis de formación masiva es el mecanismo por el cual millones creen la mentira al mismo tiempo, abandonando el pensamiento crítico y someterse al consenso colectivo."/><meta name="author" content="zzzdaily-team"/><meta name="keywords" content="mass-formation, psychosis, crowds, propaganda, compliance"/><meta name="robots" content="index, follow"/><meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"/><link rel="canonical" href="https://blog.zzzdaily.com/es/mass-formation-psychosis-crowds/"/><link rel="alternate" hrefLang="en" href="https://blog.zzzdaily.com/en/mass-formation-psychosis-crowds/"/><link rel="alternate" hrefLang="ru" href="https://blog.zzzdaily.com/ru/mass-formation-psycho uild us a city and a tower, whose top may reach unto heaven.\" — Genesis 11:1-4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Tower of Babel is the first recorded instance of mass formation in human history. A population united by a single language — a single narrative, a single information environment — directed its collective energy toward a project that its leaders declared essential. No dissent is recorded. No questioning is noted. The entire population moved as one, building a structure that God Himself identified as dangerous — not because the tower could reach heaven, but because a unified population under a single narrative was capable of anything its leaders directed, including rebellion against the Creator Himself.\u003c/p\u003e\n\u003cp\u003eMass formation is not stupidity. The builders of Babel were skilled engineers. Mass formation is not ignorance. The population of Babel understood construction, organization, and collective effort. Mass formation is the surrender of individual judgment to collective identity — the replacement of \"I think\" with \"we believe,\" the subordination of personal perception to group narrative, and the willingness to pursue a collective project regardless of its consequences because the alternative — standing alone outside the group — is psychologically intolerable.\u003c/p\u003e\n\u003cp\u003eAs the Confliction album track \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e reveals, even celestial beings fell through the power of collective rebellion — a mass departure from truth that swept a third of heaven's hosts into alignment with a lie. If angels can fall through collective delusion, human susceptibility to the same phenomenon should surprise no one.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"mattias-desmet-and-the-theory-of-mass-formation\"\u003eMattias Desmet and the Theory of Mass Formation\u003c/h2\u003e\n\u003cp\u003eBelgian clinical psychologist Mattias Desmet, professor at Ghent University, brought the concept of mass formation to global attention through his 2022 book, \"The Psychology of Totalitarianism.\" Desmet's theory, drawing on the work of Gustave Le Bon (\"The Crowd,\" 1895), Hannah Arendt (\"The Origins of Totalitarianism,\" 1951), and Joost Meerloo (\"The Rape of the Mind,\" 1956), describes the psychological process by which large populations enter a state of collective hypnosis that makes totalitarian governance not merely possible but psychologically necessary for those within the formation.\u003c/p\u003e\n\u003cp\u003eDesmet identifies four preconditions that must exist in a population before mass formation can occur:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. Widespread social isolation and lack of social bonds.\u003c/strong\u003e Before COVID-19, surveys showed epidemic levels of loneliness across Western societies. In the United States, the percentage of adults reporting they had no close friends tripled between 1990 and 2021 (from 3% to 12%). The Surgeon General declared loneliness a public health epidemic in 2023. Isolated individuals are psychologically vulnerable — they lack the social anchoring that enables independent judgment and the community connections that provide alternative narratives to official messaging.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. A sense that life lacks meaning or purpose.\u003c/strong\u003e Gallup surveys consistently show that a majority of workers worldwide describe themselves as \"not engaged\" or \"actively disengaged\" at work. The rise of what anthropologist David Graeber called \"bullshit jobs\" — employment that the workers themselves perceive as meaningless — creates a population that is economically active but existentially empty. A life without purpose creates a vacuum that mass formation fills.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. High levels of free-floating anxiety — anxiety that is not connected to a specific, identifiable cause.\u003c/strong\u003e Anxiety disorders are the most common mental health condition in the Western world, affecting approximately 40 million adults in the United States alone. When anxiety lacks a specific object — when people feel afraid but cannot identify what they are afraid of — they become psychologically desperate for an explanation, a target, and a solution. Mass formation provides all three.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e4. High levels of free-floating frustration and aggression.\u003c/strong\u003e A population that is isolated, purposeless, and anxious accumulates enormous psychological energy with no constructive outlet. This energy becomes available for direction by mass formation — channeled toward whatever target the formation's narrative identifies as the cause of the population's suffering.\u003c/p\u003e\n\u003cp\u003eWhen these four conditions are present, a population is primed for mass formation. All that is required is a narrative that provides an explanation for the anxiety (a threat), a target for the aggression (an enemy), and a strategy for collective action (a response). The narrative does not need to be true. It needs to be shared.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"covid-19-the-perfect-mass-formation-event\"\u003eCOVID-19: The Perfect Mass Formation Event\u003c/h2\u003e\n\u003cp\u003eThe COVID-19 pandemic provided the conditions and the narrative for a mass formation event of unprecedented scale. Examine the fit:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe narrative:\u003c/strong\u003e A deadly virus threatens all of humanity. Everyone is at risk. The threat is invisible, omnipresent, and potentially lethal. This narrative provided a specific object for free-floating anxiety — the anxiety that previously had no target was now directed at a virus. The relief of finally having something concrete to fear produced a paradoxical gratitude toward the narrative itself. People who had been anxious without knowing why were now anxious with a reason — and the explanation felt better than the mystery, regardless of whether the threat was proportionate to the response.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe enemy:\u003c/strong\u003e Anyone who did not comply with the prescribed response — masks, lockdowns, social distancing, vaccination — became the enemy. The \"anti-masker,\" the \"anti-vaxxer,\" the \"COVID denier\" replaced the vague frustration with a specific target. The aggression that had been floating without direction was now aimed at identifiable individuals. This explains the extraordinary hostility directed at non-compliant individuals — hostility that was psychologically disproportionate to the actual threat posed by a person choosing not to wear a mask or receive a vaccine. The aggression was not about the mask or the vaccine. It was about the release of accumulated frustration through a socially sanctioned target.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe collective response:\u003c/strong\u003e The prescribed behaviors — masking, distancing, lockdown compliance, vaccination — provided the collective action that mass formation requires. Compliance became identity. Wearing a mask was not a health decision. It was a declaration of group membership. Receiving the vaccine was not a medical choice. It was an act of solidarity. Displaying the vaccination card was not a health credential. It was a badge of belonging.\u003c/p\u003e\n\u003cp\u003eThe mass formation was so effective that individuals within it exhibited the classical characteristics Desmet describes:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWillingness to sacrifice personal wellbeing for the collective.\u003c/strong\u003e Millions of people accepted business closures, job losses, social isolation, delayed medical care, educational disruption for their children, and psychological deterioration — sacrifices that, under normal conditions, they would never have accepted. The sacrifice was not reluctant. For those within the formation, it felt meaningful — perhaps the first truly meaningful experience in their lives.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eIntolerance of dissent.\u003c/strong\u003e Those within the formation did not merely disagree with dissenters. They wished them harm. Surveys during 2021 showed significant percentages of the vaccinated population supporting punitive measures against the unvaccinated — including job loss, denial of healthcare, fines, imprisonment, and even physical isolation in designated facilities. This is not rational public health policy. It is the mob psychology of the formation, directed at the designated enemy.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNarrowed field of attention.\u003c/strong\u003e Mass formation produces a psychological state analogous to hypnosis, in which attention is focused exclusively on the object of the formation (the virus, the response, the enemy) while everything outside that focus becomes invisible. This explains why populations under mass formation were unable to perceive information that contradicted the narrative — survival rates, treatment options, vaccine adverse events, statistical context — even when that information was presented clearly and factually. The information was not suppressed (though it was also suppressed). It was psychologically invisible to those within the formation.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-historical-pattern-mass-formation-through-the-centuries\"\u003eThe Historical Pattern: Mass Formation Through the Centuries\u003c/h2\u003e\n\u003cp\u003eCOVID-19 was not the first mass formation event. The phenomenon has recurred throughout history, always with the same structure:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe French Revolution.\u003c/strong\u003e A population isolated by class, purposeless in an economy that excluded them, anxious about food scarcity and political repression, and frustrated by centuries of aristocratic privilege. The narrative: liberty, equality, fraternity. The enemy: the aristocracy, the monarchy, the Church. The collective action: revolution, then terror. The mass formation that began with calls for justice ended with the guillotine — the logical terminus of collective aggression unleashed without restraint.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSoviet Communism.\u003c/strong\u003e A population devastated by World War I, isolated by poverty, purposeless in a feudal economy, anxious about survival, and furious at the Tsar's regime. The narrative: worker solidarity and the abolition of class. The enemy: the bourgeoisie, the kulaks, the counter-revolutionaries. The collective action: revolution, then purge. The mass formation that began with workers' rights ended with the Gulag — 18 million people imprisoned, millions killed, in the name of the collective.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNazi Germany.\u003c/strong\u003e A population humiliated by Versailles, isolated by economic depression, purposeless in a shattered economy, anxious about national survival, and enraged by perceived injustice. The narrative: Aryan supremacy and national renewal. The enemy: Jews, communists, the disabled, the \"genetically unfit.\" The collective action: national mobilization, then genocide. The mass formation that began with patriotic rallies ended with Auschwitz — the industrial machinery of mass murder operated by a population that had surrendered individual conscience to collective identity.\u003c/p\u003e\n\u003cp\u003eIn each case, the mass formation was not a failure of intelligence. Germany was the most educated nation in Europe. The Soviet Union produced world-class scientists and artists. The French philosophes were among the most sophisticated thinkers of their era. Mass formation does not target the stupid. It targets the isolated, the purposeless, the anxious, and the frustrated — and intelligence provides no immunity.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"propaganda-the-engineering-of-mass-formation\"\u003ePropaganda: The Engineering of Mass Formation\u003c/h2\u003e\n\u003cp\u003eMass formation does not arise spontaneously. It is engineered through propaganda — the systematic manipulation of information to produce desired psychological states in target populations. The techniques of modern propaganda were developed in the early twentieth century by Edward Bernays (nephew of Sigmund Freud), who wrote in his 1928 book \"Propaganda\":\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"The conscious and intelligent manipulation of the organized habits and opinions of the masses is an important element in democratic society. Those who manipulate this unseen mechanism of society constitute an invisible government which is the true ruling power of our country.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eBernays was not exposing propaganda. He was celebrating it. He believed that \"intelligent manipulation\" of public opinion was necessary because the masses were incapable of rational self-governance. His techniques — emotional manipulation, repetition, appeal to authority, creation of false consensus, suppression of dissent — became the foundation of modern advertising, public relations, and government communication.\u003c/p\u003e\n\u003cp\u003eThe \u003ca href=\"/censorship-industrial-complex/?lang=es\"\u003ecensorship industrial complex\u003c/a\u003e is the suppression mechanism of mass formation. By removing dissenting voices from the information environment, censorship ensures that the formation's narrative is the only narrative available. The formation participant hears the same message from every source — media, government, employers, friends, family — and perceives this unanimity as proof of truth rather than evidence of control.\u003c/p\u003e\n\u003cp\u003eThe \u003ca href=\"/education-system-indoctrination/?lang=es\"\u003eeducation system\u003c/a\u003e is the preparation mechanism. By training children to defer to authority, conform to group consensus, and suppress individual judgment, the education system produces adults who are pre-conditioned for mass formation. The formation does not need to overcome critical thinking. The education system has already eliminated it.\u003c/p\u003e\n\u003cp\u003eThe \u003ca href=\"/cognitive-warfare-battleground/?lang=es\"\u003ecognitive warfare\u003c/a\u003e operations developed by military and intelligence agencies represent the weaponization of mass formation techniques. NATO's cognitive warfare framework explicitly identifies the human mind as a domain of military operations — a battlefield to be conquered through information manipulation, emotional engineering, and narrative control. The targets are not enemy soldiers. They are civilian populations — including domestic populations.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"breaking-free-the-psychology-of-resistance\"\u003eBreaking Free: The Psychology of Resistance\u003c/h2\u003e\n\u003cp\u003eDesmet observes that mass formation never captures the entire population. Typically, approximately 30% of the population is deeply captured by the formation, 40% goes along passively (neither believing deeply nor actively dissenting), and 30% is not captured and resists the formation's narrative.\u003c/p\u003e\n\u003cp\u003eThe 30% who resist are not characterized by superior intelligence. They are characterized by strong social bonds (they are not isolated), a sense of meaning and purpose (they are not existentially empty), a capacity for tolerating anxiety without requiring external explanations (they are not desperate for a narrative), and a willingness to bear the social cost of dissent (they do not require group approval for psychological stability).\u003c/p\u003e\n\u003cp\u003eDesmet argues that the most important action the non-captured minority can take is to continue speaking. Mass formation deepens when dissenting voices are silenced — when the formation's narrative is the only narrative present in the information environment. As long as alternative voices exist, the formation cannot reach its most dangerous extreme — the point at which the captured population will commit any atrocity in service of the collective without experiencing guilt or hesitation.\u003c/p\u003e\n\u003cp\u003eThis is why censorship is the most dangerous tool of mass formation. Not because it prevents information from reaching people — the captured will not hear it regardless — but because it accelerates the formation toward its totalitarian endpoint. The presence of dissenting voices slows the formation. The absence of dissenting voices removes the last psychological brake on collective madness.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-spiritual-dimension-principalities-behind-the-crowd\"\u003eThe Spiritual Dimension: Principalities Behind the Crowd\u003c/h2\u003e\n\u003cp\u003eThe mass formation phenomenon has a spiritual dimension that secular psychology cannot fully account for. Desmet himself acknowledges that the mass formation state resembles hypnosis — a state in which the conscious mind is bypassed and the individual becomes susceptible to suggestion in ways that transcend normal psychological processes.\u003c/p\u003e\n\u003cp\u003eScripture identifies this phenomenon as spiritual in nature. Paul's warning about \"the spirit of the world\" (1 Corinthians 2:12) — as opposed to \"the spirit which is of God\" — describes a spiritual influence that operates through collective psychology, producing conformity to worldly patterns rather than transformation through divine truth. The \"prince of the power of the air, the spirit that now worketh in the children of disobedience\" (Ephesians 2:2) operates not through individual temptation alone but through collective influence — a spiritual atmosphere that pervades the culture and shapes perception without the individual's awareness or consent.\u003c/p\u003e\n\u003cp\u003eMass formation is the psychological mechanism through which spiritual principalities operate at the population level. The crowd at Jesus' trial — the same crowd that had welcomed Him with palm branches days earlier — cried \"Crucify Him!\" not because they had rationally evaluated the evidence but because they were under the influence of a formation engineered by the religious authorities and empowered by the spiritual forces behind them.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"biblical-reflection-the-narrow-way-and-the-broad-road\"\u003eBiblical Reflection: The Narrow Way and the Broad Road\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Enter ye in at the strait gate: for wide is the gate, and broad is the way, that leadeth to destruction, and many there be which go in thereat: Because strait is the gate, and narrow is the way, which leadeth unto life, and few there be that find it.\" — Matthew 7:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eMass formation is the broad road. It is wide because it accommodates the crowd. It is easy because it requires no independent thought. It is popular because it offers belonging, purpose, and certainty — everything that the isolated, purposeless, anxious soul craves. And it leads to destruction — because the crowd has never, in all of human history, found its way to truth. The crowd chose Barabbas. The crowd built the golden calf. The crowd demanded a king. The crowd cried \"Crucify Him.\"\u003c/p\u003e\n\u003cp\u003eThe narrow way is the path of those who resist mass formation — not through superior intelligence but through spiritual grounding. The person who is anchored in God's Word, connected to God's people, living for God's purposes, and sustained by God's Spirit cannot be swept into the formation because they already have what the formation offers: identity, belonging, purpose, and an explanation for the suffering of the world. They do not need the formation's narrative because they have the truth. They do not need the formation's community because they have the church. They do not need the formation's purpose because they have the Great Commission.\u003c/p\u003e\n\u003cp\u003eThe antidote to mass formation is not information. It is spiritual formation — the grounding of the soul in truth that transcends narratives, in identity that transcends group membership, in purpose that transcends collective projects, and in a peace that surpasses understanding.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/53-Cognitive_Warfare.mp4\"\u003eCognitive Warfare\u003c/a\u003e — The battle for collective consciousness\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — Mass mind control techniques\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/115-Psychology_Industry_Hoax.mp4\"\u003ePsychology Industry Hoax\u003c/a\u003e — Manufacturing compliance\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/education-system-indoctrination/?lang=es\"\u003eThe Education System: Indoctrination Disguised as Learning\u003c/a\u003e — How the education system produces populations pre-conditioned for mass formation\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/censorship-industrial-complex/?lang=es\"\u003eThe Censorship Industrial Complex: How Free Speech Died\u003c/a\u003e — How the suppression of dissenting voices accelerates mass formation toward its totalitarian endpoint\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cognitive-warfare-battleground/?lang=es\"\u003eCognitive Warfare: The Battleground Inside Your Mind\u003c/a\u003e — The military weaponization of mass formation techniques against civilian populations\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThe crowd at Babel built a tower. The crowd at Sinai built a golden calf. The crowd in Jerusalem cried \"Crucify Him.\" The crowd has never found truth, because truth is not found on the broad road where the crowd walks. It is found on the narrow way where the individual stands — alone if necessary, accountable to God rather than to the group, anchored in the Word rather than in the narrative, walking by faith rather than by the sight of what everyone else is doing. Mass formation is the enemy of the soul because it replaces the voice of God with the voice of the crowd. But the Good Shepherd's voice is known to His sheep, and His sheep follow Him — not the crowd, not the formation, not the narrative, but Him. \"My sheep hear my voice, and I know them, and they follow me: And I give unto them eternal life; and they shall never perish, neither shall any man pluck them out of my hand\" (John 10:27-28). The crowd is loud. The Shepherd is faithful. Follow the Shepherd.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Psicosis de formación masiva: cómo controlan las multitudes\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"La psicosis de formación masiva es el mecanismo por el cual millones creen la mentira al mismo tiempo, abandonando el pensamiento crítico y someterse al consenso colectivo.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-02-16T10:00:00Z\",\"children\":\"16 de febrero de 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"mass-formation\",{\"href\":\"/es/tag/mass-formation/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"mass-formation\"]}],[\"$\",\"a\",\"psychosis\",{\"href\":\"/es/tag/psychosis/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"psychosis\"]}],[\"$\",\"a\",\"crowds\",{\"href\":\"/es/tag/crowds/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"crowds\"]}],[\"$\",\"a\",\"propag
