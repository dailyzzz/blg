estes atención al hombre detrás de la cortina. Este es el mensaje central de la novela de 1900 de L. Frank Baum y su adaptación cinematográfica icónica de 1939 — un mensaje tan subversivo, tan revelador, tan peligroso para la estructura de poder que tuvo que ser disfrazado como un cuento de hadas. El Mago de Oz no es un cuento de hadas. Es un plano para entender cómo el mundo realmente funciona: a través del miedo, la ilusión, y la supresión sistemática del poder innato del individuo.\u003c/p\u003e\n\u003cp\u003eHoward Pittman, durante su experiencia cercana a la muerte, vio detrás de la cortina del reino espiritual. Tres cielos. Jerarquía demoníaca en el segundo. 97,5 por ciento de los cristianos rechazados — nunca me hicieron Señor. Pittman presenció al hombre detrás de la cortina: un vasto sistema organizado de engaño que opera a través del miedo, la jerarquía, y la ilusión del poder abrumador. El Mago de Oz describe el mismo sistema en términos alegóricos.\u003c/p\u003e\n\u003cp\u003eLos jesuitas son los magos del mundo real. La organización militar de Loyola que ejerce el \"poder absoluto\" de Napoleón. La \"condenación eterna\" de Adams. Tamburini gobernando \"todo el mundo\" desde detrás de una cortina — literalmente, desde una sola habitación. Clemente XIV envenenado cuando abrió la cortina. \u003cem\u003eCatholic Confidential\u003c/em\u003e revela el método: infiltración \"vestida de astucia,\" obediencia ciega, \"toda especie de vicio.\" Los jesuitas operan exactamente como el Mago opera: proyectando poder aterrador mientras esconden su verdadera naturaleza detrás de una cortina de autoridad institucional.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/es/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eLas Mentiras del Engañador — del álbum Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/es/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eLa Maldición de la Serpiente — del álbum Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-camino-de-ladrillos-amarillos-el-camino-del-oro\"\u003eEl Camino de Ladrillos Amarillos: El Camino del Oro\u003c/h2\u003e\n\u003ch3 id=\"siguiendo-el-dinero\"\u003eSiguiendo el Dinero\u003c/h3\u003e\n\u003cp\u003eA Dorothy se le dice que siga el Camino de Ladrillos Amarillos para llegar a la Ciudad Esmeralda. Los ladrillos amarillos son ladrillos de oro. El camino al poder, en el mundo real, está pavimentado de oro — dinero, finanzas, y el control de la moneda. L. Frank Baum escribió \u003cem\u003eEl Maravilloso Mago de Oz\u003c/em\u003e durante un período de intenso debate sobre el estándar de oro en América, y muchos eruditos han interpretado la historia como una alegoría monetaria.\u003c/p\u003e\n\u003cp\u003eLa Ciudad Esmeralda es verde — el color del dinero, el color del billete de la Reserva Federal. Para entrar, los visitantes deben usar gafas de tinte verde, que hacen que todo parezca de color esmeralda. Esta es la metáfora más poderosa de la historia: la ilusión de valor se mantiene forzando a todos a ver el mundo a través de la misma lente. Quítate las gafas, y la ciudad es ordinaria. Quítate la programación, y el sistema financiero se revela como el fraude que es.\u003c/p\u003e\n\u003cp\u003eLa conexión de los jesuitas con las finanzas globales es profunda. Las familias bancarias que crearon el sistema de la Reserva Federal tienen conexiones documentadas con redes educadas por los jesuitas. El sistema financiero — que mantiene a la población en esclavitud de deuda a través de hipotecas (promesas de muerte), tarjetas de crédito, y préstamos para estudiantes — es el Camino de Ladrillos Amarillos. Promete liberación. Entrega a la ciudad del Mago.\u003c/p\u003e\n\u003cp\u003eAgent131711 documenta en Substack (agent131711.substack.com) cómo el sistema financiero funciona como un mecanismo de control, extrayendo trabajo de la población mientras dirige la riqueza a las instituciones que administran el sistema. El Camino de Ladrillos Amarillos no conduce a la libertad. Conduce al Mago — y el Mago es un fraude.\u003c/p\u003e\n\u003ch3 id=\"las-zapatillas-de-plata\"\u003eLas Zapatillas de Plata\u003c/h3\u003e\n\u003cp\u003eEn la novela original de Baum, las zapatillas de Dorothy son de plata, no de rubí. Esto es significativo en la alegoría monetaria: el oro y la plata eran los dos metales en el centro del debate de moneda. Las zapatillas de plata — que representan el estándar de plata, el dinero del pueblo — tenían el poder de transportar a Dorothy a casa en cualquier momento. Pero ella no lo sabía.\u003c/p\u003e\n\u003cp\u003eEsta es la revelación central: ya tienes el poder. El sistema — el Mago, los jesuitas, la arquitectura financiera, la iglesia institucional — depende de que no lo sepas. Mientras sigas el Camino de Ladrillos Amarillos, buscando salvación del Mago, permaneces bajo control. En el momento en que miras hacia abajo a tus propios pies, el hechizo se rompe.\u003c/p\u003e\n\u003ch2 id=\"los-cuatro-compañeros-lo-que-el-sistema-quita\"\u003eLos Cuatro Compañeros: Lo Que el Sistema Quita\u003c/h2\u003e\n\u003ch3 id=\"el-espantapájaros-la-mente\"\u003eEl Espantapájaros: La Mente\u003c/h3\u003e\n\u003cp\u003eEl Espantapájaros cree que no tiene cerebro. Busca inteligencia del Mago. Pero a lo largo del viaje, el Espantapájaros es el miembro más inteligente del grupo — resolviendo problemas, diseñando planes, pensando creativamente. Tenía un cerebro todo el tiempo. Simplemente no lo creyó.\u003c/p\u003e\n\u003cp\u003eEl sistema educativo — diseñado en gran medida por los jesuitas a través de su \u003cem\u003eRatio Studiorum\u003c/em\u003e — produce Espantapájaros. Entrena a las personas para creer que no pueden pensar sin credenciales, sin títulos, sin validación institucional. El birrete (cubo de Saturno, como se discute en la Parte 4 de la serie de Saturno) corona al graduado como un pensador oficial — implicando que antes de la graduación, el pensamiento no estaba autorizado.\u003c/p\u003e\n\u003cp\u003eLa experiencia de Howard Pittman revela que el discernimiento espiritual — la forma más elevada de inteligencia — no requiere credencial institucional. El 97,5 por ciento que fue rechazado había pasado por el sistema. Tenían sus diplomas, sus doctrinas, sus afiliaciones denominacionales. Nada de eso importaba. Lo que importaba era si podían pensar por sí mismos — si podían discernir la verdad de la fabricación institucional que los rodeaba.\u003c/p\u003e\n\u003ch3 id=\"el-hombre-de-hojalata-el-corazón\"\u003eEl Hombre de Hojalata: El Corazón\u003c/h3\u003e\n\u003cp\u003eEl Hombre de Hojalata cree que no tiene corazón. Busca emoción del Mago. Pero a lo largo del viaje, el Hombre de Hojalata es el miembro más compasivo del grupo — llorando sobre escarabajos aplastados, lamentando árboles caídos, cuidando profundamente a sus compañeros. Tenía un corazón todo el tiempo.\u003c/p\u003e\n\u003cp\u003eEl sistema industrial — el cubículo, la fábrica, la jerarquía corporativa — produce Hombres de Hojalata. Despoja a las personas de la conexión emocional, reduciéndolas a unidades funcionales en una máquina productiva. Los jesuitas, con su énfasis en la obediencia institucional sobre el sentimiento personal, crearon la plantilla para esta deshumanización. La orden exige que los miembros supriman el sentimiento personal a favor de la lealtad institucional — obediencia ciega que anula el corazón.\u003c/p\u003e\n\u003ch3 id=\"el-león-cobarde-el-coraje\"\u003eEl León Cobarde: El Coraje\u003c/h3\u003e\n\u003cp\u003eEl León cree que no tiene coraje. Busca valentía del Mago. Pero a lo largo del viaje, el León enfrenta cada peligro, protege a sus compañeros, y persevera a pesar de su miedo. Tenía coraje todo el tiempo.\u003c/p\u003e\n\u003cp\u003eEl sistema de miedo — terrorismo, pandemia, colapso económico, catástrofe climática, condenación eterna — produce Leones Cobardes. Convence a la población de que no pueden enfrentar el mundo sin la protección de la institución. El gobierno, el ejército, la iglesia, la corporación — todos se presentan a sí mismos como escudos necesarios contra un mundo aterrador. Sin ellos, estás desprotegido. Con ellos, estás seguro. Esta es la ilusión del León.\u003c/p\u003e\n\u003cp\u003eEl documental \u003cem\u003eCatholic Confidential\u003c/em\u003e revela cómo los jesuitas usan el miedo deliberadamente: el miedo al infierno, el miedo a la excomunión, el miedo al ostracismo social. Estos miedos no son naturales. Están manufacturados — herramientas de control diseñadas para mantener a la población dependiente de la institución.\u003c/p\u003e\n\u003ch3 id=\"dorothy-el-alma\"\u003eDorothy: El Alma\u003c/h3\u003e\n\u003cp\u003eDorothy quiere volver a casa. Cree que el Mago puede llevarla allí. Pero el Mago no puede. Solo Dorothy puede llevarse a sí misma a casa, usando el poder que ya posee — las zapatillas de plata en sus propios pies.\u003c/p\u003e\n\u003cp\u003eDorothy representa el alma humana, atrapada en Oz (el mundo material), buscando liberación de una autoridad externa (el Mago/institución/sistema de Saturno). Su viaje le enseña que el poder estaba siempre dentro de ella — que nunca necesitó al Mago, el camino, o la Ciudad Esmeralda. Solo necesitaba reconocer su propia capacidad y actuar sobre ella.\u003c/p\u003e\n\u003cp\u003eEste es el mensaje que los jesuitas, las sociedades secretas, y el sistema de Saturno no pueden tolerar. Si las personas se dieran cuenta de que ya poseen todo lo que necesitan — que ninguna institución, ritual, o jerarquía es necesaria para la liberación espiritual — todo el sistema de control colapsaría. El Mago sería revelado como el pequeño hombre detrás de la cortina. La Ciudad Esmeralda perdería su tinte verde. Y la población clickearía sus talones e iría a casa.\u003c/p\u003e\n\u003ch2 id=\"la-bruja-la-máquina-de-miedo\"\u003eLa Bruja: La Máquina de Miedo\u003c/h2\u003e\n\u003ch3 id=\"la-bruja-malvada-del-oeste\"\u003eLa Bruja Malvada del Oeste\u003c/h3\u003e\n\u003cp\u003eLa Bruja representa el miedo mismo — el arma que la estructura de poder usa para mantener el control. Comanda monos voladores (agentes de vigilancia), controla un ejército (fuerza militar), y aterroriza la tierra desde su castillo (la institución). Su poder parece abrumador.\u003c/p\u003e\n\u003cp\u003ePero su debilidad es el agua. Se derrite cuando Dorothy le lanza agua. El agua, en las escrituras, representa la verdad, la purificación, la palabra de Dios. La máquina de miedo, sin importar cuán aterradora parezca, se disuelve cuando se aplica la verdad. Los jesuitas temen la verdad más que cualquier otra arma. Su toda operación — la infiltración, la astucia, la obediencia ciega, el vicio — existe porque la verdad los destruiría.\u003c/p\u003e\n\u003cp\u003eHoward Pittman aprendió que la jerarquía demoníaca opera a través del miedo. Los demonios que presenciaba en el segundo cielo usaban el miedo como su herramienta primaria — miedo a la muerte, miedo a la pérdida, miedo a lo desconocido. Pero Pittman también aprendió que estos demonios no tienen poder sobre aquellos que se paran en la verdad. La Bruja se derrite. Los demonios huyen. El Mago es expuesto.\u003c/p\u003e\n\u003ch3 id=\"el-tornado-el-gran-reinicio\"\u003eEl Tornado: El Gran Reinicio\u003c/h3\u003e\n\u003cp\u003eDorothy llega a Oz a través de un tornado — una disrupción violenta que la arranca de su vida normal y la deposita en un ambiente extraño y controlado. Esto se parece a los grandes trastornos — guerras, respuestas a pandemias, reestructuraciones económicas — que la estructura de poder ingenieriza para remodelar la sociedad.\u003c/p\u003e\n\u003cp\u003eEl tornado no es un accidente. Es una herramienta. Cada gran reinicio — cada revolución, cada respuesta de pandemia, cada reestructuración económica — sirve para arrancar a la población de sus anclajes y depositarla en un nuevo ambiente donde las reglas son diferentes y el poder del Mago parece necesario. Los jesuitas han estado ingenierizando estos reinicios durante siglos, desde la Guerra de los Treinta Años hasta la Revolución Francesa hasta los eventos que dan forma a nuestro momento presente.\u003c/p\u003e\n\u003ch2 id=\"el-hombre-detrás-de-la-cortina\"\u003eEl Hombre Detrás de la Cortina\u003c/h2\u003e\n\u003ch3 id=\"exposición-y-sus-consecuencias\"\u003eExposición y Sus Consecuencias\u003c/h3\u003e\n\u003cp\u003eCuando Toto corre la cortina a un lado, el Mago es revelado como un hombre ordinario operando una máquina elaborada de ilusión. Su poder nunca fue real. Fue proyectado — amplificado por tecnología, sostenido por miedo, y dependiente de que nadie mirara demasiado de cerca.\u003c/p\u003e\n\u003cp\u003eEsta es la realidad de cada institución que reclama autoridad sobrenatural: el Vaticano, las sociedades secretas, las agencias de inteligencia, el sistema financiero. Detrás de la cortina, hay hombres — hombres ordinarios, falibles, mortales — operando máquinas de ilusión. El poder de los jesuitas no es sobrenatural. Es organizacional, financiero, y psicológico. Es impresionante, pero no es divino. Y como el poder del Mago, se evapora el momento en que suficiente gente lo ve a través.\u003c/p\u003e\n\u003cp\u003eEl trabajo de Agent131711 en Substack está dedicado a correr la cortina a un lado — a exponer a los hombres ordinarios detrás de las ilusiones extraordinarias. Cada artículo, cada investigación, cada conexión documentada entre lo visible y lo oculto es un tirón de la cortina. Y cada persona que lee, entiende, y comparte esta información es otro Toto, corriendo la cortina un poco más atrás.\u003c/p\u003e\n\u003ch2 id=\"el-poder-que-ya-tienes\"\u003eEl Poder Que Ya Tienes\u003c/h2\u003e\n\u003ch3 id=\"haciendo-clic-en-tus-talones\"\u003eHaciendo Clic en Tus Talones\u003c/h3\u003e\n\u003cp\u003eEl Mago de Oz termina con una revelación: Dorothy siempre tuvo el poder de volver a casa. Solo necesitaba hacer clic en sus talones tres veces y decir las palabras. El poder estaba en ella todo el tiempo.\u003c/p\u003e\n\u003cp\u003eEsto no es meramente un dispositivo narrativo. Es una verdad espiritual. El poder de romper libre del sistema de Saturno, la matriz jesuita, la prisión financiera, la máquina de miedo — este poder reside en cada individuo. Es el poder de la verdad, el discernimiento, y la negativa a participar en ilusiones.\u003c/p\u003e\n\u003cp\u003eEfesios 6:12 describe la batalla: no contra carne y sangre, sino contra principados y potestades. Las armas son espirituales — verdad, fe, la palabra de Dios. No la palabra institucional. No la palabra curada por los jesuitas. La palabra viviente que existe más allá de instituciones, más allá de textos, más allá de la cortina de autoridad humana.\u003c/p\u003e\n\u003cp\u003eHoward Pittman regresó del otro lado con un mensaje simple: despierta. Deja de servir al yo. Deja de confiar en el Mago. Haz clic en tus talones. Vuelve a casa.\u003c/p\u003e\n\u003cp\u003eEl 97,5 por ciento nunca clickeó. Se quedaron en Oz, siguiendo el Camino de Ladrillos Amarillos, usando las gafas verdes, creyendo las promesas del Mago. No cometas su error. El poder es tuyo. Siempre lo fue.\u003c/p\u003e\n\u003ch2 id=\"aprende-más\"\u003eAprende Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¿Qué Hay En El Sótano del Vaticano May Sorprenderte?\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eLa Firmamento, La Tierra, La Fundación — Cosmología Bíblica\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eLa Tierra y La Firmamento — Lo Que Las Escrituras Realmente Dicen\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https:/ on.zzzdaily.com/tracks/es/15-From_Dust_to_Glory.mp4\"\u003eDel Polvo a la Gloria\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/475-Dome_Dwellers_Awakening.mp4\"\u003eDome Dwellers Awakening\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/485-Firmament_Firewall.mp4\"\u003eFirmament Firewall\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/73-Suppressing_Truth.mp4\"\u003eSuprimiendo la Verdad\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explora-más\"\u003eExplora Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/christmas-new-world-order-part7/?lang=es\"\u003eNavidad y el Nuevo Orden Mundial: CAPÍTULO FINAL Parte 7\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/black-sun-part6/?lang=es\"\u003eEL SOL NEGRO: Orígenes Ocultos del Poder Mundial Parte 6\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cult-black-cube-part4/?lang=es\"\u003eEL CULTO DEL CUBO NEGRO Parte 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003ePresta atención al hombre detrás de la cortina. No es un mago. No es todopoderoso. Es un hombre — un hombre con una máquina, una máquina de miedo e ilusión. Y tú eres Dorothy, parada en zapatillas de plata que nunca supiste que tenías, con el poder de disolver cada bruja, exponer cada mago, y encontrar tu camino a casa. Haz clic. Haz clic. Haz clic.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}
