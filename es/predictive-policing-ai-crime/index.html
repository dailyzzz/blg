idad de cometer crímenes en el futuro. Estos individuos son entonces monitoreados intensamente, perseguidos, y frecuentemente arrestados por \"crímenes\" que aún no han cometido.\u003c/p\u003e\n\u003cp\u003eEl sistema ha sido implementado en ciudades de todo el mundo. Estados Unidos, Reino Unido, Europa, y otras jurisdicciones ahora utilizan algoritmos para determinar quiénes van a ser criminales.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-mecanismo\"\u003eEl Mecanismo\u003c/h2\u003e\n\u003ch3 id=\"el-entrenamiento-sesgado\"\u003eEl Entrenamiento Sesgado\u003c/h3\u003e\n\u003cp\u003eEl algoritmo es \"entrenado\" usando datos históricos de arrestos policiales. Pero arrestos históricos no representan crimen real — representan vigilancia policial histórica.\u003c/p\u003e\n\u003cp\u003eSi la policía ha monitorizado históricamente a comunidades negras más que comunidades blancas, entonces el algoritmo aprende que \"negro\" = \"criminal potential.\"\u003c/p\u003e\n\u003cp\u003eEl algoritmo codifica el sesgo histórico en forma matemática.\u003c/p\u003e\n\u003ch3 id=\"la-profecía-autocumplida\"\u003eLa Profecía Autocumplida\u003c/h3\u003e\n\u003cp\u003eUna vez entrenado en sesgo, el algoritmo:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eMarca individuos en comunidades históricamente vigiladas como \"alto riesgo\"\u003c/li\u003e\n\u003cli\u003eLa policía monitoriza más activamente estos individuos\u003c/li\u003e\n\u003cli\u003eLos individuos monitoreados más activamente son arrestados más\u003c/li\u003e\n\u003cli\u003eLos arrestos adicionales son utilizados como \"evidencia\" de que el algoritmo funcionó\u003c/li\u003e\n\u003cli\u003eEl algoritmo es refinado usando estos nuevos arrestos sesgados\u003c/li\u003e\n\u003cli\u003eEl sesgo se amplifica\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eLa profecía se cumple a sí misma. No porque la predicción fue precisa, sino porque la predicción causó el resultado.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-violación-de-derechos\"\u003eLa Violación de Derechos\u003c/h2\u003e\n\u003ch3 id=\"el-debido-proceso-eliminado\"\u003eEl Debido Proceso Eliminado\u003c/h3\u003e\n\u003cp\u003eBajo la ley tradicional, un individuo no puede ser castigado sin:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAcusación de un crimen específico\u003c/li\u003e\n\u003cli\u003ePrueba de culpabilidad más allá de toda duda razonable\u003c/li\u003e\n\u003cli\u003eDerecho a confrontar el acusador\u003c/li\u003e\n\u003cli\u003eDerecho a defensa legal\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBajo policía predictiva, un individuo es castigado porque:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eUn algoritmo dice que probablemente cometerá un crimen\u003c/li\u003e\n\u003cli\u003eNo hay crimen específico acusado\u003c/li\u003e\n\u003cli\u003eEl individuo no puede confrontar al algoritmo\u003c/li\u003e\n\u003cli\u003eNo hay defensa contra predicción estadística\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEl debido proceso está abolido.\u003c/p\u003e\n\u003ch3 id=\"la-presunción-de-inocencia-eliminada\"\u003eLa Presunción de Inocencia Eliminada\u003c/h3\u003e\n\u003cp\u003eBajo la ley tradicional, una persona es presunta inocente hasta ser probada culpable.\u003c/p\u003e\n\u003cp\u003eBajo policía predictiva, una persona es presunta delincuente basándose en algoritmo. Ser marcado por el algoritmo invierte la presunción.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-patrón-de-sesgo\"\u003eEl Patrón de Sesgo\u003c/h2\u003e\n\u003ch3 id=\"sesgo-racial\"\u003eSesgo Racial\u003c/h3\u003e\n\u003cp\u003eLos sistemas de policía predictiva han demostrado consistentemente sesgo racial:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIndividuos de color son marcados como \"alto riesgo\" desproporcionadamente\u003c/li\u003e\n\u003cli\u003eLa vigilancia intensificada de individuos de color resulta en arrestos aumentados\u003c/li\u003e\n\u003cli\u003eLos arrestos aumentados son utilizados como evidencia de que el algoritmo era preciso\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-sistema-de-control\"\u003eEl Sistema de Control\u003c/h2\u003e\n\u003cp\u003ePolicía predictiva es uno de los componentes del sistema de control total descrito en \u003ca href=\"/project-archimedes-launched/?lang=es\"\u003eProyecto Archimedes\u003c/a\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eVigilancia\u003c/strong\u003e: El algoritmo identifica objetivos\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMonitoreo\u003c/strong\u003e: La policía monitoriza intensamente objetivos identificados\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eControl\u003c/strong\u003e: La amenaza de arresto mantiene a objetivos conformes\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePunición\u003c/strong\u003e: Los arrestos basados en predicción se aplican a aquellos que se resisten\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEl sistema requiere vigilancia total, análisis de datos total, y autoridad policial total.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"encuentra-más-información\"\u003eEncuentra Más Información\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/project-archimedes-launched/?lang=es\"\u003eProyecto Archimedes Lanzado\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sick-of-it-combat-censorship/?lang=es\"\u003eEstamos Enfermos de Esto: Cómo Combatir la Censura y Pelear de Vuelta\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eLa IA predictiva reemplaza la justicia con algoritmo. Reemplaza prueba con estadística. Reemplaza debido proceso con automatización. Y en el proceso, crea sistemas de opresión tan sofisticados que la opresión es asumida como neutral — simplemente \"lo que el algoritmo dijo.\" Pero los algoritmos no son neutrales. Son codificaciones de prejudicio. Y cuando se aplican sin supervisión humana, crean injusticia sistemática.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f
