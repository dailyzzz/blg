e al Altísimo.\" -- Isaías 14:12-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eEl deseo de trascender las limitaciones humanas y ser como Dios no es una filosofía moderna. Es el pecado original. Es la caída de Lucifer. Es la tentación en el Edén. Y ahora es un partido político registrado en los Estados Unidos de América. El Partido Transhumanista de Estados Unidos ha traído la ambición de Lucifer al sistema político estadounidense, abogando por la transformación tecnológica de la humanidad en algo más allá de lo humano -- algo poshumano -- algo que reemplaza el diseño de Dios con la ampliación engineered.\u003c/p\u003e\n\u003cp\u003eEl movimiento poshumanista político no está ocultando su agenda. Declara abiertamente lo que las agencias de inteligencia, las compañías farmacéuticas y los programas de investigación militar persiguen encubiertamente: la alteración fundamental de la especie humana a través de la tecnología.\u003c/p\u003e\n\u003cp\u003eComo \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/73-The_Fallen_Angels.mp4\"\u003eLos Ángeles Caídos\u003c/a\u003e del álbum Confliction declara, el deseo de ascender más allá de su estación designada es la característica definitoria de la rebelión. Y como \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/01-Cast_Out_of_Paradise.mp4\"\u003eExpulsado del Paraíso\u003c/a\u003e nos recuerda, las consecuencias de buscar la divinidad a través de medios prohibidos son el exilio, la corrupción y la muerte.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-partido-transhumanista-de-estados-unidos\"\u003eEl Partido Transhumanista de Estados Unidos\u003c/h2\u003e\n\u003ch3 id=\"plataforma-y-objetivos\"\u003ePlataforma y Objetivos\u003c/h3\u003e\n\u003cp\u003eEl Partido Transhumanista de Estados Unidos, fundado en 2014 por Zoltan Istvan, es un partido político que aboga explícitamente por:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eExtensión Radical de la Vida\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eLa eliminación de la muerte a través de medios tecnológicos, incluyendo modificación genética, reemplazo de órganos, carga de cerebro y reparación celular basada en nanotecnología. El partido ve la muerte biológica como un problema a ser resuelto en lugar de un aspecto ordenado de la condición humana.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAmpliación Humana\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eEl mejoramiento de las capacidades físicas y cognitivas humanas a través de:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eImplantes neurales para mejora cognitiva\u003c/li\u003e\n\u003cli\u003eModificación genética para mejora física\u003c/li\u003e\n\u003cli\u003eNanotecnología para reparación y mejora celular\u003c/li\u003e\n\u003cli\u003eIntegración cibernética para ampliación sensorial y física\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eLibertad Morfológica\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eEl derecho a modificar el cuerpo de uno de cualquier forma deseada, incluida la modificación a formas no humanas. Esto incluye:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eModificación de género (que el partido apoya como un subconjunto de derechos morfológicos más amplios)\u003c/li\u003e\n\u003cli\u003eModificación de especies (el derecho a añadir características no humanas)\u003c/li\u003e\n\u003cli\u003eModificación cibernética (el derecho a reemplazar componentes biológicos con tecnológicos)\u003c/li\u003e\n\u003cli\u003eEncarnación digital (el derecho a cargar la conciencia en sistemas digitales)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eDerechos Tecnológicos\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eEl establecimiento de marcos legales que reconozcan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEl derecho de los sistemas de IA a la personalidad legal\u003c/li\u003e\n\u003cli\u003eEl derecho a la mejora cognitiva sin restricción\u003c/li\u003e\n\u003cli\u003eEl derecho a la modificación genética sin barreras regulatorias\u003c/li\u003e\n\u003cli\u003eEl derecho a la inmortalidad tecnológica\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"la-estrategia-política\"\u003eLa Estrategia Política\u003c/h3\u003e\n\u003cp\u003eLa estrategia política transhumanista opera en múltiples niveles:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePolítica Electoral\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eLos candidatos transhumanistas han presentado candidaturas para presidente, gobernador y cargos locales, usando campañas como plataformas para promover ideas transhumanistas. Aunque el éxito electoral ha sido limitado, las campañas generan cobertura mediática que normaliza conceptos transhumanistas.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDefensa de Políticas\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eEl partido aboga por cambios de políticas específicos:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAumento de financiamiento gubernamental para investigación de longevidad\u003c/li\u003e\n\u003cli\u003eDesregulación de la modificación genética y la nanotecnología\u003c/li\u003e\n\u003cli\u003eReconocimiento legal de personas digitales y derechos de IA\u003c/li\u003e\n\u003cli\u003eAcceso universal a la tecnología de ampliación\u003c/li\u003e\n\u003cli\u003eEliminación de regulaciones que restrinjan la experimentación humana\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eInfluencia Cultural\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eLas ideas transhumanistas se promueven a través de medios de entretenimiento, periodismo tecnológico, conferencias académicas y cultura de Silicon Valley. La normalización de conceptos transhumanistas en la cultura popular -- a través de películas, televisión, videojuegos y redes sociales -- es la programación predictiva que prepara a la población para aceptar lo que el partido aboga políticamente.\u003c/p\u003e\n\u003ch2 id=\"el-análisis-espiritual\"\u003eEl Análisis Espiritual\u003c/h2\u003e\n\u003ch3 id=\"la-plantilla-luciferina\"\u003eLa Plantilla Luciferina\u003c/h3\u003e\n\u003cp\u003eLa plataforma transhumanista sigue la plantilla luciferina descrita en Isaías 14 con precisión:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e\"Subiré al cielo\"\u003c/strong\u003e = tecnología de extensión de vida e inmortalidad\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Enalteceré mi trono sobre las estrellas de Dios\"\u003c/strong\u003e = mejora cognitiva más allá de los límites naturales\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Me sentaré en el monte de la congregación\"\u003c/strong\u003e = poder político para imponer políticas transhumanistas\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Subiré sobre las alturas de las nubes\"\u003c/strong\u003e = trascendencia de limitaciones físicas\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Seré semejante al Altísimo\"\u003c/strong\u003e = el objetivo explícito del transhumanismo: ser como Dios a través de la tecnología\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEl partido transhumanista no meramente persigue objetivos políticos. Persigue el objetivo espiritual de la rebelión original: reemplazar el diseño de Dios con la evolución autodeterminada, lograr la divinidad a través de la tecnología en lugar de a través de la relación con el Creador.\u003c/p\u003e\n\u003ch3 id=\"génesis-6-repetido\"\u003eGénesis 6 Repetido\u003c/h3\u003e\n\u003cp\u003eLa agenda transhumanista es una formalización política de la corrupción de Génesis 6. En Génesis 6, los hijos de Dios cruzaron la frontera entre lo sobrenatural y lo natural, produciendo seres híbridos (Nephilim) que eran una abominación para el Creador. El transhumanismo cruza la frontera entre lo humano y lo tecnológico, produciendo seres híbridos (cyborgs, humanos mejorados, mentes digitales) que violan la imagen de Dios.\u003c/p\u003e\n\u003cp\u003eLa legitimización política de este cruzamiento a través de un partido político registrado representa la normalización de lo que Dios juzgó con un diluvio. El partido transhumanista pide al público que vote por su propia corrupción genética, biológica y espiritual -- para aprobar democráticamente la agenda de Génesis 6.\u003c/p\u003e\n\u003cp\u003eAna Mihalcea, MD, PhD, ha documentado en su Substack (anamihalceamdphd.substack.com) cómo la nanotecnología ahora encontrada en la sangre humana es la implementación encubierta de la agenda transhumanista que el Partido Transhumanista de Estados Unidos aboga abiertamente. Lo que el partido busca a través de canales políticos ya se está logrando a través de canales farmacéuticos -- sin el consentimiento o conocimiento de la población siendo transformada.\u003c/p\u003e\n\u003ch3 id=\"la-cúpula-y-el-engaño\"\u003eLa Cúpula y el Engaño\u003c/h3\u003e\n\u003cp\u003eEl sueño transhumanista de colonización espacial, inmortalidad digital y trascendencia evolutiva choca con la realidad del firmamento -- la cúpula que Dios colocó sobre la tierra en Génesis 1:6-8. Bajo esta cúpula, la humanidad existe en su lugar designado. Los ángeles caídos están encarcelados bajo esta cúpula. Y el sueño transhumanista de escapar las limitaciones humanas es, en términos espirituales, el sueño de escapar la cúpula -- de trascender los límites que Dios estableció.\u003c/p\u003e\n\u003cp\u003ePero la cúpula se mantiene. El firmamento perdura. Y el transhumanista que sueña con cargar la conciencia para escapar el cuerpo aún vive bajo la cúpula, en la placa de la tierra, dentro de los límites que Dios estableció en la creación. Ninguna cantidad de nanotecnología, modificación genética o carga digital puede romper el firmamento. La única forma a través de la cúpula es la forma que Dios ordenó: muerte y resurrección a través de Jesucristo. Todo otro camino es una ilusión -- un engaño promovido por seres caídos que están ellos mismos encarcelados bajo la cúpula que no pueden escapar.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"la-advertencia-de-1-samuel-8\"\u003eLa Advertencia de 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Y Jehová dijo a Samuel: Oye la voz del pueblo en todo lo que te digan; porque no te han desechado a ti, sino a mí me han desechado, para que no reine sobre ellos.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=RVR1960\"\u003e1 Samuel 8:7 (RVR1960)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLa advertencia antigua de 1 Samuel 8 resuena a través de cada pasillo del gobierno hoy. Cuando Israel demandó un rey como las otras naciones, Dios les advirtió exactamente qué pasaría -- sus hijos tomados para la guerra, sus hijas para servicio, sus campos y viñas confiscados, un décimo de todo confiscado. Eligieron el gobierno humano sobre el reinado de Dios, y la tiranía siguió exactamente como fue prometida. Nada ha cambiado. El sistema político moderno es dos alas del mismo pájaro -- izquierda y derecha, republicano y demócrata -- todo sirviendo a la misma estructura de poder oculta. Votar por cualquiera de los dos lados es elegir cuál ala aletea siguiente mientras el pájaro vuela en la misma dirección. El poder real nunca ha estado en ninguna boleta.\u003c/p\u003e\n\u003ch2 id=\"referencias-de-fuentes\"\u003eReferencias de Fuentes\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eDocumentación de plataforma y política del Partido Transhumanista de Estados Unidos\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eIstvan, Z., \"The Transhumanist Wager,\" 2013\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMore, M. and Vita-More, N., \"The Transhumanist Reader,\" 2013\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eAna Mihalcea, MD, PhD, anamihalceamdphd.substack.com, transhumanismo encubierto a través de nanotecnología\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=RVR1960\"\u003e1 Samuel 8 — La Advertencia Contra Reyes Terrenales (RVR1960)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"entérate-más\"\u003eEntérate Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eTestimonio de Experiencia Cercana a la Muerte de Howard Pittman — Advertencia de Fin de Tiempos que Dios le Dio\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eConfidencial Católico: Secretos Deplorables de los Jesuitas Revelados\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¡Lo que Hay en el Sótano del Vaticano Puede Sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"escucha-mientras-lees\"\u003eEscucha Mientras Lees\u003c/h2\u003e\n\u003cp\u003eEstas pistas del Álbum ZZZ Daily exploran los temas en este artículo:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/339-The_New_Man.mp4\"\u003eEl Nuevo Hombre\u003c/a\u003e -- El rediseño transhumanista de la humanidad\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/447-Modded_Humans.mp4\"\u003eHumanos Modificados\u003c/a\u003e -- El humano ampliado como objetivo político\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/489-Nephilim_Nanobots.mp4\"\u003eNanobots Nephilim\u003c/a\u003e -- El patrón de Génesis 6 en nanotecnología\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/487-Mark_Of_The_Nanobot.mp4\"\u003eMarca del Nanobot\u003c/a\u003e -- El sistema de marca tecnológica\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDel álbum Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/73-The_Fallen_Angels.mp4\"\u003eLos Ángeles Caídos\u003c/a\u003e -- La rebelión que impulsa el transhumanismo\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/01-Cast_Out_of_Paradise.mp4\"\u003eExpulsado del Paraíso\u003c/a\u003e -- Las consecuencias de buscar la divinidad\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explora-más\"\u003eExplora Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/cyborg-dawn-military-augmentation/?lang=es\"\u003eCyborg Dawn: Uso Militar de la Tecnología de Ampliación Humana\u003c/a\u003e -- La implementación militar de objetivos transhumanistas\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/europeans-augmentation-mandatory/?lang=es\"\u003eEuropeos Cuidado: La Ampliación Humana Se Vuelve Obligatoria\u003c/a\u003e -- La implementación obligatoria de tecnología transhumanista\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/beast-land-transhumanism-synthetic/?lang=es\"\u003eLa BESTIA de la TIERRA: Transhumanismo y Futuros Sintéticos\u003c/a\u003e -- El estado final de la agenda transhumanista\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eEl deseo de ser como Dios a través de medios prohibidos no es una plataforma política. Es el pecado original. El Partido Transhumanista de Estados Unidos ha formalizado la ambición luciferina en una entidad política registrada, completa con candidatos, políticas y donaciones de campaña. Piden a los votantes que aprueben lo que Dios juzgó con un diluvio. Piden al público que financie lo que los ángeles caídos enseñaron antes del diluvio. Piden a la humanidad que vote por su propia transformación en algo que ya no está hecho a la imagen de Dios. Pero la imagen de Dios no está sujeta a una votación. No es modificada por la legislación. No es mejorada por la tecnología. Es dada por el Creador, sostenida por el Espíritu, y perfeccionada solo a través de la transformación que Cristo proporciona -- una transformación no del genoma, sino del corazón.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"El Partido Transhumanista de Estados Unidos y el Poshumanismo Político\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"El Partido Transhumanista de Estados Unidos aboga abiertamente por la ampliación humana, la extensión de la vida y la evolución poshumana a través de canales políticos y marcos de políticas públicas.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-04-03T10:00:00Z\",\"children\":\"3 de abril de 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"transhumanist-party\",{\"href\":\"/es/tag
