re las fuentes de las aguas; Y el nombre de la estrella es llamado Ajenjo: y la tercera parte de las aguas se convirtió en ajenjo; y muchos hombres murieron por las aguas, porque se hicieron amargas.\" — Apocalipsis 8:10-11\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLas Escrituras profetizan que en los últimos días, las aguas serán envenenadas. La estrella Ajenjo cae sobre los ríos y las fuentes, y las aguas se vuelven amargas — tóxicas — y muchos mueren por beberlas. La profecía no es metafórica. Describe la contaminación del suministro de agua — el recurso fundamental del cual depende toda la vida humana.\u003c/p\u003e\n\u003cp\u003eComo revela la pista de Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/47-The_Transgression.mp4\"\u003eLa Transgresión\u003c/a\u003e, la violación de los límites de Dios se manifiesta en la corrupción de Su creación — el envenenamiento del aire, el suelo, los alimentos, y el agua que Él diseñó para sustentar la vida. El fluoruro en el agua potable es una transgresión contra el orden creado — la adición deliberada de un producto de desecho industrial al suministro de agua bajo la afirmación de que previene la caries dental, mientras la evidencia del daño neurológico se acumula década tras década.\u003c/p\u003e\n\u003cp\u003eLa CDC ha revertido su recomendación. El Ajenjo está siendo identificado — si no todavía removido.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-historia-de-la-fluoración-del-agua\"\u003eLa Historia de la Fluoración del Agua\u003c/h2\u003e\n\u003cp\u003eLa fluoración del agua en Estados Unidos comenzó en 1945, cuando Grand Rapids, Michigan se convirtió en la primera ciudad en agregar fluoruro a su suministro público de agua. La CDC posteriormente respaldó la fluoración del agua como una medida de salud pública, y para 2020, aproximadamente el 73% de la población estadounidense servida por sistemas de agua comunitarios recibía agua fluorada.\u003c/p\u003e\n\u003cp\u003eLa CDC ha llamado a la fluoración del agua uno de los \"diez grandes logros de salud pública del siglo XX.\" La Asociación Dental Americana, la Asociación Médica Americana, y la Organización Mundial de la Salud han respaldado todas la práctica. El nivel de fluoruro recomendado fue establecido en 0.7 miligramos por litro (mg/L) por el Servicio de Salud Pública de Estados Unidos en 2015, reducido del rango anterior de 0.7-1.2 mg/L.\u003c/p\u003e\n\u003cp\u003eSin embargo, la evidencia científica que desafía la fluoración ha crecido constantemente durante las últimas dos décadas:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNeurotoxicidad:\u003c/strong\u003e Un informe histórico de 2024 del Programa Nacional de Toxicología (NTP), después de años de supresión y revisión, concluyó que la exposición a fluoruro a niveles consistentes con la fluoración del agua está asociada con reducción de CI en niños. El informe revisó más de 70 estudios humanos y encontró una asociación consistente entre la exposición a fluoruro y daño neurodesarrollista.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDisrupción endocrina:\u003c/strong\u003e El informe de 2006 del Consejo Nacional de Investigación identificó el fluoruro como un disruptor endocrino, señalando efectos en la función tiroidea, metabolismo óseo, y salud reproductiva a niveles que se superponen con los producidos por la fluoración del agua.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReducción de caries dentales:\u003c/strong\u003e El beneficio dental afirmado de la fluoración del agua ha sido cada vez más cuestionado. Grandes estudios epidemiológicos comparando comunidades fluoradas y no fluoradas han encontrado diferencias mínimas en las tasas de caries dentales — sugiriendo que el uso generalizado de pasta de dientes fluorada ha hecho que la fluoración del agua sea innecesaria para la salud dental.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFluorosis dental:\u003c/strong\u003e La fluoración del agua es la causa principal de fluorosis dental — una condición causada por ingesta excesiva de fluoruro durante el desarrollo dental, resultando en decoloración y daño estructural del esmalte de los dientes. Los datos de la CDC muestran que aproximadamente el 65% de los adolescentes estadounidenses ahora exhiben algún grado de fluorosis dental — un aumento dramático desde la tasa de prevalencia del 10% cuando se introdujo la fluoración.\u003c/p\u003e\n\u003cp\u003eKaren Kingston ha documentado en El Informe Kingston (karenkingston.substack.com): \"La fluoración del agua es el programa de medicación masiva más exitoso en la historia humana. Fue implementado sin consentimiento individual, mantenido sin monitoreo de seguridad adecuado, y defendido sin compromiso honesto con la evidencia acumulada del daño. La reversión de la CDC no es una actualización científica — es una confesión de que la agencia ha estado equivocada durante 80 años mientras rechazaba a los científicos que intentaban advertirla.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-sentencia-de-la-corte-federal\"\u003eLa Sentencia de la Corte Federal\u003c/h2\u003e\n\u003cp\u003eLa reversión de política de la CDC sigue una sentencia de corte federal histórica en el caso de \u003cem\u003eFood \u0026#x26; Water Watch et al. v. EPA\u003c/em\u003e, en el cual el Juez Edward Chen del Distrito Norte de California falló que la fluoración del agua a niveles actuales plantea un riesgo irrazonable de daño neurotóxico, particularmente a niños. La sentencia ordenó a la EPA tomar acciones regulatorias para abordar el riesgo.\u003c/p\u003e\n\u003cp\u003eLa sentencia del Juez Chen se basó en testimonio experto extenso y el informe del NTP, que el juez encontró ser la revisión más comprehensiva de neurotoxicidad de fluoruro jamás realizada. La sentencia notó que la propia evaluación de riesgo de la EPA no había explicado adecuadamente los efectos neurodesarrollistas y que la agencia había fallado en aplicar el principio de precaución a una sustancia administrada involuntariamente a toda la población.\u003c/p\u003e\n\u003cp\u003eLa reversión de la CDC de su recomendación de fluoración efectivamente elimina el respaldo del gobierno federal de la práctica — aunque la decisión de fluorar permanece con gobiernos municipales y estatales individuales.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-problema-más-profundo-medicación-masiva-sin-consentimiento\"\u003eEl Problema Más Profundo: Medicación Masiva Sin Consentimiento\u003c/h2\u003e\n\u003cp\u003eLa fluoración del agua es medicación masiva. Implica la adición de una sustancia farmacológicamente activa al suministro de agua pública con el propósito de producir un efecto terapéutico (la prevención de caries dentales) en la población que consume el agua. La sustancia es administrada:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSin consentimiento individual\u003c/li\u003e\n\u003cli\u003eSin control de dosis individual (el consumo varía según la ingesta de agua)\u003c/li\u003e\n\u003cli\u003eSin evaluación médica individual\u003c/li\u003e\n\u003cli\u003eSin monitoreo individual de efectos adversos\u003c/li\u003e\n\u003cli\u003eSin la capacidad de individuos para optar por no participar (aparte de comprar sistemas de filtración o fuentes alternativas de agua)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEsta es una violación fundamental de la ética médica, que requiere consentimiento informado para cualquier intervención médica. El Código de Nuremberg, la Declaración de Helsinki, y principios establecidos de bioética todos requieren que las intervenciones médicas sean voluntarias, consentidas individualmente, y sujetas al derecho de retirarse.\u003c/p\u003e\n\u003cp\u003eLa pista \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/109-Biometric_Beast_System.mp4\"\u003eSistema Bestia Biométrico\u003c/a\u003e documenta cómo los sistemas de intervención médica de población amplia — desde fluoración hasta mandatos de vacunación — erosionan el principio de consentimiento individual y establecen el precedente de que el estado puede administrar tratamientos médicos a toda la población sin permiso individual.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-significancia-profética\"\u003eLa Significancia Profética\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Y me mostró un río limpio de agua de vida, resplandeciente como cristal, que salía del trono de Dios y del Cordero.\" — Apocalipsis 22:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eEl diseño de Dios para el agua es pureza — el río de vida, claro como el cristal. La contaminación del agua es la corrupción del diseño de Dios — la transformación de un regalo que sustenta la vida en un vehículo para la toxicidad. El respaldo de décadas de la CDC de la fluoración del agua fue una participación en esta corrupción — la bendición institucional de una práctica que introdujo un producto de desecho industrial en el agua que Dios diseñó para sustentar la vida.\u003c/p\u003e\n\u003cp\u003eLa reversión comienza el proceso de restauración. Pero la restauración requiere acción en cada nivel — federal, estatal, y municipal. La recomendación de la CDC ha terminado, pero el fluoruro en el agua permanece hasta que las autoridades locales actúen para removerlo.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"la-advertencia-de-1-samuel-8\"\u003eLa Advertencia de 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Y dijo Jehová a Samuel: Oye la voz del pueblo en todo lo que te digan; porque no te han desechado a ti, sino a mí me han desechado, para que no reine sobre ellos.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=RVR1960\"\u003e1 Samuel 8:7 (RVR1960)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLa advertencia antigua de 1 Samuel 8 resuena a través de cada pasillo de gobierno hoy. Cuando Israel demandó un rey como las otras naciones, Dios les advirtió exactamente lo que sucedería — sus hijos tomados para la guerra, sus hijas para el servicio, sus campos y viñas confiscados, una décima parte de todo incautado. Eligieron el gobierno humano sobre el reinado de Dios, y la tiranía siguió exactamente como fue prometido. Nada ha cambiado. El sistema político moderno es dos alas del mismo pájaro — izquierda y derecha, Republicano y Demócrata — todos sirviendo la misma estructura de poder oculta. Votar por cualquiera de los lados es elegir cuál ala aletea a continuación mientras el pájaro vuela en la misma dirección. El poder real nunca ha estado en ninguna papeleta.\u003c/p\u003e\n\u003ch2 id=\"fuentes\"\u003eFuentes\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eCDC — Reversión de recomendación de fluoración del agua\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eEl Informe Kingston (karenkingston.substack.com) — Análisis de Karen Kingston del historial de fluoración del agua, supresión del informe del NTP, y ética de medicación masiva\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePrograma Nacional de Toxicología — Informe de neurotoxicidad de fluoruro\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFood \u0026#x26; Water Watch et al. v. EPA — Sentencia de corte federal\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eConsejo Nacional de Investigación — \"Fluoruro en Agua Potable: Una Revisión Científica de los Estándares de la EPA\" (2006)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eApocalipsis 8:10-11, Apocalipsis 22:1 (RVR1960)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=RVR1960\"\u003e1 Samuel 8 — La Advertencia Contra Reyes Terrenales (RVR1960)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"descubre-más\"\u003eDescubre Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eTestimonio de la Experiencia Cercana a la Muerte de Howard Pittman — Advertencia del Fin de los Tiempos Que Dios Le Dio\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eConfidencial Católico: Secretos Deplorables de los Jesuitas Revelados\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¡Lo Que Podría Estar en el Sótano del Vaticano Puede Sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"escucha-mientras-lees\"\u003eEscucha Mientras Lees\u003c/h2\u003e\n\u003cp\u003eEstas pistas de ZZZ Daily exploran los temas en este artículo:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/109-Biometric_Beast_System.mp4\"\u003eSistema Bestia Biométrico\u003c/a\u003e — Intervención médica de población amplia sin consentimiento individual\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Nunca Terminó\u003c/a\u003e — Programas del gobierno tratando la población como sujetos experimentales\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/285-Lockstep_With_The_Beast.mp4\"\u003eMarchando en Sincronía Con La Bestia\u003c/a\u003e — Unanimidad institucional defendiendo una práctica dañina durante décadas\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDel álbum Confliction (La Cueva de Tesoros):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/47-The_Transgression.mp4\"\u003eLa Transgresión\u003c/a\u003e — La corrupción del orden creado de Dios a través del envenenamiento del agua\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/07-The_Serpents_Curse.mp4\"\u003eLa Maldición de la Serpiente\u003c/a\u003e — La maldición manifestada en la contaminación del sustento más básico de la vida\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explora-más\"\u003eExplora Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/hhs-maha-transformation/?lang=es\"\u003eHHS Anuncia Transformación MAHA de la Atención Médica\u003c/a\u003e — Agua limpia como pilar de la iniciativa MAHA\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/rfk-cleans-house-cdc/?lang=es\"\u003eRFK Jr. Limpia la Casa en la CDC\u003c/a\u003e — Reformando la agencia que respaldó la fluoración durante 80 años\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/fda-ended-emergency-use-authorizations/?lang=es\"\u003eFDA Acaba de Terminar Autorizaciones de Uso de Emergencia para COVID-19\u003c/a\u003e — Revirtiendo política farmacéutica construida en evidencia inadecuada\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/rfk-worldwide-cause-autism/?lang=es\"\u003eRFK Jr. Anuncia Esfuerzo Mundial para Determinar la Causa del Autismo\u003c/a\u003e — Investigando neurotoxinas ambientales incluyendo fluoruro\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eLas aguas de América han sido contaminadas durante 80 años bajo el respaldo de la CDC — un producto de desecho industrial agregado al suministro de agua de 200 millones de personas sin consentimiento, sin pruebas de seguridad adecuadas, y a pesar de la evidencia acumulada del daño neurológico. La reversión de la CDC es un comienzo — pero solo un comienzo. El fluoruro permanece en el agua hasta que cada municipio actúe para removerlo. \"El que tiene oídos para oír, que oiga\" (Mateo 11:15). La CDC ha hablado. La ciencia ha hablado. Los tribunales han hablado. Ahora la pregunta recae en cada ciudad, cada condado, y cada distrito de agua: ¿continuarás envenenando el agua, o la restaurarás a la pureza que Dios diseñó?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"La CDC Dejará de Recomendar la Adición de Fluoruro al Agua Potable\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"La CDC revierte décadas de política al terminar su recomendación para la adición de fluoruro al agua potable pública, citando evidencia de neurotoxicidad y reducción de CI.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-27T10:00:00Z\",\"children\":\"27 de mayo de 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"CDC\",{\"href\":\"/es/tag/CDC/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"CDC\"]}],[\"$\",\"a\",\"fluoride\",{\"href\":\"/es/tag/fluoride/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"fluoride\"]}],[\"$\"
