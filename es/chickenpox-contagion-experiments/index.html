\u003c/blockquote\u003e\n\u003cp\u003eTodos saben que la varicela es contagiosa. Los niños la contraen de otros niños. Se propaga a través de escuelas como fuego. Un niño la contraen, y pronto toda la clase sigue. Este es conocimiento común — aceptado, sin cuestionar, y completamente sin examinar por la vasta mayoría de personas que lo creen.\u003c/p\u003e\n\u003cp\u003ePero ¿qué si los experimentos diseñados para probar el contagio de la varicela realmente fallaron? ¿Qué si la ciencia fundacional — la evidencia de laboratorio real — no respalda la creencia de que la varicela se propaga de persona a persona a través de transmisión viral?\u003c/p\u003e\n\u003cp\u003eEsto no es especulación. Esto es un asunto de registro histórico. Los experimentos de contagio para la varicela, conducidos en el principios a mediados del siglo XX, consistentemente fallaron en producir los resultados esperados. Los investigadores no pudieron hacer confiablemente que personas sanas enfermaran exponiéndolos a personas enfermas. La narrativa viral fue mantenida no porque la evidencia la respaldara, sino porque el establecimiento médico necesitaba que fuera verdad — necesitaba justificar vacunas, drogas antivirales, y todo el marco de la teoría de gérmenes sobre el cual depende la medicina moderna.\u003c/p\u003e\n\u003cp\u003eHoward Pittman fue testigo durante su ECC de las jerarquías organizadas del reino demónico. Le fue dicho que el 97.5% de cristianos estaban fallando, que el 95% sirven \"a sí mismo\" en lugar de Dios, y que la guerra espiritual descrita en Efesios 6:12 es más real que el mundo físico que vemos. La narrativa de la teoría de gérmenes es un arma en esta guerra — una mentira tan profundamente incrustada en la consciencia humana que cuestionarla se siente como locura. Pero la verdad requiere valor, y el valor requiere fe.\u003c/p\u003e\n\u003cp\u003eLos Jesuitas, que se infiltran \"cubiertos de astucia\" y practican \"toda especie de vicio,\" se han incrustado en la educación médica, instituciones científicas, y organizaciones de salud pública mundialmente. La observación de Napoleón sobre su \"poder absoluto\" y la advertencia de John Adams de \"condenación eterna\" para la \"Sociedad de los Loyolas\" permanecen tan relevantes hoy como cuando fueron habladas.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"los-experimentos-de-contagio-fallados\"\u003eLos Experimentos de Contagio Fallados\u003c/h2\u003e\n\u003ch3 id=\"el-registro-histórico\"\u003eEl Registro Histórico\u003c/h3\u003e\n\u003cp\u003eA principios del siglo XX, en el apogeo de la revolución de la teoría de gérmenes, los investigadores se propusieron probar que la varicela (varicela) era contagiosa — que podía ser transmitida de una persona enferma a una sana a través de contacto directo o exposición por aire. Los experimentos que condujeron cuentan una historia muy diferente a la enseñada en las escuelas médicas.\u003c/p\u003e\n\u003ch3 id=\"los-experimentos-gruenberg\"\u003eLos Experimentos Gruenberg\u003c/h3\u003e\n\u003cp\u003eAlgunos de los experimentos de contagio de varicela más reveladores fueron conducidos por investigadores que intentaron transmitir la enfermedad tomando material de ampollas de varicela — el líquido vesicular rebosando de lo que se creía era el virus de la varicela — e aplicándolo directamente a la piel o membranas mucosas de sujetos sanos.\u003c/p\u003e\n\u003cp\u003eLos resultados fueron asombrosos en su fracaso:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInoculación directa\u003c/strong\u003e de líquido vesicular en la piel de sujetos sanos no produjo enfermedad en la mayoría de los casos\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEscarificación\u003c/strong\u003e (rasguñar la piel e aplicar material infectado) produjo resultados inconsistentes — algunos sujetos desarrollaron reacciones locales leves, pero la varicela de plano era raramente producida\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAplicación intranasal\u003c/strong\u003e de líquido vesicular falló en producir enfermedad confiablemente\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExperimentos de contacto cercano\u003c/strong\u003e — colocando sujetos sanos en contacto directo, prolongado con pacientes activamente infectados — produjeron resultados muy por debajo de la tasa de transmisión del casi-100% que el modelo de contagio predice\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"el-problema-de-tasas-de-ataque\"\u003eEl Problema de \"Tasas de Ataque\"\u003c/h3\u003e\n\u003cp\u003eLos epidemiólogos usan el concepto de \"tasas de ataque\" para describir cómo efectivamente una enfermedad se propaga a través de una población. Se afirma que la varicela tiene una de las tasas de ataque más altas de cualquier enfermedad — supuestamente más de 90% para contactos domésticos susceptibles.\u003c/p\u003e\n\u003cp\u003ePero esta cifra se deriva de \u003cstrong\u003eestudios observacionales\u003c/strong\u003e, no de experimentos controlados. En estudios observacionales, cuando un niño en un hogar desarrolla varicela y hermanos posteriormente la desarrollan, la suposición es que el primer niño transmitió la enfermedad a los hermanos. Pero esta suposición es precisamente lo que necesita ser probado — y los experimentos controlados diseñados para probarlo consistentemente fallaron en hacerlo.\u003c/p\u003e\n\u003cp\u003e¿Qué si los hermanos desarrollan varicela alrededor del mismo tiempo no porque uno transmitió a otro, sino porque comparten el mismo ambiente — el mismo alimento, la misma agua, la misma calidad del aire, la misma exposición a toxinas, las mismas deficiencias nutricionales? ¿Qué si la varicela no es contagiosa en absoluto, sino que es más bien la respuesta del cuerpo a las condiciones ambientales y nutricionales que múltiples personas en el mismo hogar comparten?\u003c/p\u003e\n\u003ch3 id=\"el-problema-del-patrón-estacional\"\u003eEl Problema del Patrón Estacional\u003c/h3\u003e\n\u003cp\u003eLa varicela sigue un patrón estacional — alcanza su pico a finales de invierno y principios de primavera. La explicación de la teoría de gérmenes es que el virus se propaga más fácilmente en condiciones interiores abarrotadas durante meses más fríos. Pero esta explicación levanta sus propias preguntas:\u003c/p\u003e\n\u003cp\u003eSi la varicela es causada por un virus que se propaga a través de contacto directo y gotitas respiratorias, ¿por qué tendría un patrón estacional en absoluto? Los virus no saben qué mes es. Las personas están en contacto cercano durante todo el año en escuelas, oficinas, y espacios públicos.\u003c/p\u003e\n\u003cp\u003eLa explicación de la teoría del terreno es mucho más coherente: a finales de invierno, después de meses de luz solar reducida, actividad física reducida, consumo reducido de alimento fresco, y exposición aumentada a contaminantes interiores (vapores de calefacción, aire recirculado, moho), la vitalidad del cuerpo está en su punto más bajo. Esto es cuando el cuerpo es más probable que inicie una respuesta de desintoxicación — que es lo que enfermedades como la varicela realmente representan.\u003c/p\u003e\n\u003cp\u003eEl sarpullido de varicela, en el modelo del terreno, es toxinas siendo expulsadas a través de la piel — el órgano de eliminación más grande del cuerpo. La fiebre es el cuerpo elevando su temperatura para acelerar procesos metabólicos. La fatiga es el cuerpo redirigiendo energía desde actividad externa hacia curación interna. La pérdida de apetito da al sistema digestivo un descanso para que la energía se dirija hacia desintoxicación.\u003c/p\u003e\n\u003cp\u003eEste proceso ocurre en ondas, en patrones estacionales, y en clusters — no por contagio, sino porque personas en el mismo ambiente se exponen a las mismas toxinas y experimentan la misma declinación estacional en vitalidad.\u003c/p\u003e\n\u003ch2 id=\"la-vacuna-de-varicela-solución-a-un-problema-inexistente\"\u003eLa Vacuna de Varicela: Solución a un Problema Inexistente\u003c/h2\u003e\n\u003ch3 id=\"la-vacuna-llega\"\u003eLa Vacuna Llega\u003c/h3\u003e\n\u003cp\u003eEn 1995, la vacuna de varicela (Varivax) fue agregada al programa de inmunización de la infancia de EE.UU. Antes de la vacuna, la varicela era considerada una enfermedad normal de la infancia — incómoda pero raramente peligrosa. Virtualmente cada niño la contraía, y virtualmente cada niño se recuperaba con inmunidad de por vida.\u003c/p\u003e\n\u003cp\u003eLa vacuna transformó la varicela de un rito de paso normal de la infancia a una \"enfermedad infecciosa peligrosa\" requiriendo intervención farmacéutica. Esta transformación requería una campaña de relaciones públicas masiva para convencer a los padres que una enfermedad que habían experimentado ellos mismos como niños — y se recuperaron sin incidente — era realmente una amenaza seria requiriendo vacunación.\u003c/p\u003e\n\u003ch3 id=\"la-consecuencia-de-herpes-zóster\"\u003eLa Consecuencia de Herpes Zóster\u003c/h3\u003e\n\u003cp\u003eUna de las consecuencias más devastadoras de la vacuna de varicela ha sido la explosión de casos de herpes zóster en adultos. Antes de la vacuna, los adultos eran regularmente expuestos a niños con varicela, y esta exposición ampliaba su respuesta inmunológica al virus varicela-zóster que yace dormido en su sistema nervioso. Esta amplificación natural prevenía la reactivación del virus como herpes zóster.\u003c/p\u003e\n\u003cp\u003eCon la vacuna de varicela reduciendo dramáticamente el número de niños con varicela activa, los adultos perdieron este efecto de amplificación natural. Las tasas de herpes zóster han escalado dramáticamente desde 1995 — y la solución de la industria farmacéutica es, por supuesto, otra vacuna: Shingrix, que cuesta aproximadamente $300 por la serie de dos dosis y genera miles de millones en ingresos anuales para GlaxoSmithKline.\u003c/p\u003e\n\u003cp\u003eEl patrón es inconfundible: crea el problema (elimina la exposición natural de varicela), luego vende la solución (vacuna de herpes zóster). Este es el modelo de Rockefeller perfeccionado — el mismo modelo que crea deficiencias nutricionales y luego vende suplementos de vitaminas, que contamina el ambiente y luego vende drogas para el cáncer.\u003c/p\u003e\n\u003ch3 id=\"las-lesiones-de-la-vacuna-barridas-bajo-la-alfombra\"\u003eLas Lesiones de la Vacuna Barridas Bajo la Alfombra\u003c/h3\u003e\n\u003cp\u003eLa base de datos VAERS (Sistema de Reportes de Eventos Adversos de Vacunas) contiene miles de reportes de eventos adversos tras la vacunación de varicela, incluyendo:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eConvulsiones\u003c/li\u003e\n\u003cli\u003eEncefalitis (inflamación del cerebro)\u003c/li\u003e\n\u003cli\u003eTrombocitopenia (trastornos de coagulación de sangre)\u003c/li\u003e\n\u003cli\u003eInfección de varicela desde la vacuna misma (varicela de cepa vacunal)\u003c/li\u003e\n\u003cli\u003eMuerte\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eUn estudio de Harvard Pilgrim estimó que menos del 1% de eventos adversos de vacunas son reportados a VAERS, lo que significa que el número verdadero de lesiones es probablemente órdenes de magnitud más alto que el conteo oficial.\u003c/p\u003e\n\u003ch2 id=\"el-patrón-más-profundo-la-teoría-de-contagio-como-control-social\"\u003eEl Patrón Más Profundo: La Teoría de Contagio Como Control Social\u003c/h2\u003e\n\u003ch3 id=\"por-qué-el-mito-de-contagio-importa\"\u003ePor Qué el Mito de Contagio Importa\u003c/h3\u003e\n\u003cp\u003eLa creencia de que las enfermedades son contagiosas — que la enfermedad puede saltar de persona a persona a través de agentes invisibles — es una de las herramientas más poderosas de control social jamás inventadas. Justifica:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePoderes de cuarentena y cierre\u003c/strong\u003e: Los gobiernos pueden restringir la libertad de movimiento basada en la afirmación de que las personas enfermas propagan enfermedad\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVacunación obligatoria\u003c/strong\u003e: Si las enfermedades son contagiosas, todos deben ser vacunados para proteger la \"manada\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVigilancia y rastreo\u003c/strong\u003e: El rastreo de contacto, pasaportes de salud, y sistemas de monitoreo digital se justifican por la teoría de contagio\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAislamiento social\u003c/strong\u003e: El miedo al contagio rompe los vínculos sociales, crea desconfianza entre personas, y hace que poblaciones sean más fáciles de controlar\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDependencia médica\u003c/strong\u003e: Si la enfermedad viene de afuera, necesitas intervenciones externas (drogas, vacunas) para combatirla\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSin el mito de contagio, todo el aparato de salud pública — la OMS, la CDC, el NIH, y sus equivalentes mundialmente — perderían su justificación primaria para existencia. Billones de dólares en ingresos farmacéuticos se evaporarían. El poder de cerrar sociedades, mandar procedimientos médicos, y rastrear poblaciones desaparecería.\u003c/p\u003e\n\u003cp\u003eEsto es por qué el mito de contagio es defendido tan ferozmente. No es sobre ciencia — es sobre poder. Y el poder, como los Jesuitas entendieron siglos atrás, es el objetivo final. Napoleón lo vio claramente: \"poder absoluto, poder universal, poder para controlar el mundo por la volición de un solo hombre.\"\u003c/p\u003e\n\u003ch3 id=\"la-dimensión-espiritual-del-miedo-al-contagio\"\u003eLa Dimensión Espiritual del Miedo al Contagio\u003c/h3\u003e\n\u003cp\u003eHoward Pittman fue mostrado que las palabras tienen poder espiritual. Cuando el establecimiento médico declara que la varicela es \"altamente contagiosa,\" esa declaración crea miedo — y el miedo es una de las armas más efectivas de Satanás. El miedo a la enfermedad mantiene a las personas en esclavitud al sistema médico. El miedo al contagio mantiene a las personas aisladas unas de otras. El miedo a lo invisible mantiene a las personas mirando en la dirección equivocada para la fuente de su sufrimiento.\u003c/p\u003e\n\u003cp\u003eLa Biblia dice \"no teman\" 365 veces — una para cada día del año. El establecimiento médico dice \"tenga miedo\" cada día. Una voz es de Dios; la otra no.\u003c/p\u003e\n\u003cp\u003eLa orden Jesuita, operando a través de la Iglesia Católica y sus instituciones aliadas, siempre ha usado el miedo como una herramienta de control. Miedo al infierno, miedo a la excomunión, miedo a la Inquisición — estas eran las herramientas del control religioso. Miedo a la enfermedad, miedo al contagio, miedo a la pandemia — estas son las herramientas del control médico. El mecanismo es el mismo; solo el vocabulario ha cambiado.\u003c/p\u003e\n\u003ch2 id=\"lo-que-la-evidencia-realmente-muestra\"\u003eLo Que la Evidencia Realmente Muestra\u003c/h2\u003e\n\u003ch3 id=\"desintoxicación-no-infección\"\u003eDesintoxicación, No Infección\u003c/h3\u003e\n\u003cp\u003eLos síntomas de varicela — sarpullido, fiebre, fatiga, pérdida de apetito — son idénticos a los síntomas de desintoxicación. Cuando el cuerpo está sobrecargado con toxinas — de alimento procesado, químicos ambientales, drogas farmacéuticas, o simplemente el desecho metabólico que se acumula durante períodos de baja vitalidad — inicia una respuesta de limpieza.\u003c/p\u003e\n\u003cp\u003eEl sarpullido es toxinas siendo expulsadas a través de la piel. La fiebre acelera procesos metabólicos y estimula mecanismos de curación del cuerpo. La fatiga redirige energía desde actividad externa hacia curación interna. La pérdida de apetito da al sistema digestivo un descanso para que la energía se dirija hacia desintoxicación.\u003c/p\u003e\n\u003cp\u003eEste proceso ocurre en ondas, en patrones estacionales, y en clusters — no por contagio, sino porque personas en el mismo ambiente se exponen a las mismas toxinas y experimentan la misma declinación estacional en vitalidad.\u003c/p\u003e\n\u003ch3 id=\"las-implicaciones\"\u003eLas Implicaciones\u003c/h3\u003e\n\u003cp\u003eSi la varicela no es contagiosa, entonces:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLa vacuna de varicela es innecesaria y dañina\u003c/li\u003e\n\u003cli\u003eLa epidemia de herpes zóster fue creada por la vacuna, no por el virus\u003c/li\u003e\n\u003cli\u003eEl modelo de contagio de enfermedad es fundamentalmente defectuoso\u003c/li\u003e\n\u003cli\u003eTodo el aparato de salud pública construido en la teoría de contagio es ilegítimo\u003c/li\u003e\n\u003cli\u003eLa libertad de movimiento, autonomía corporal, y libertad personal no pueden ser restringidas basadas en afirmaciones de transmisión de enfermedad\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEstas implicaciones son tan radicales, tan amenazantes al orden establecido, que explican por qué los experimentos de contagio fallados fueron enterrados, por qué el modelo del terreno fue suprimido, y por qué cualquiera que cuestione la teoría de gérmenes es inmediatamente etiquetado un crank peligroso.\u003c/p\u003e\n\u003ch2 id=\"descubre-más\"\u003eDescubre Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eSubstack de Agent131711\u003c/a\u003e — análisis detallado de experimentos de contagio fallados y teoría del terreno\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eTestimonio de ECC de Howard Pittman\u003c/a\u003e — la dimensión de guerra espiritual\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eConfidencial Católico: Secretos Deplorables de los Jesuitas Revelados\u003c/a\u003e — mecanismos de control Jesuita\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicidio y Pharmakeia — La Brujería de la Medicina Moderna\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¡Lo Que Podría Estar en el Sótano del Vaticano Puede Sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"escucha-mientras-lees\"\u003eEscucha Mientras Lees\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/41-Shedding_Proof.mp4\"\u003ePrueba de Desprendimiento\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/179-Engineering_Contagion.mp4\"\u003eIngeniería de Contagio\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/255-Vaccine_Of_The_Beast.mp4\"\u003eVacuna De La Bestia\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/07-The_Serpents_Curse.mp4\"\u003eLa Maldición de la Serpiente\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/09-Satans_Disguise.mp4\"\u003eEl Disfraz de Satanás\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explora-más\"\u003eExplora Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/big-fat-tuberculosis-lie/?lang=es\"\u003eLa GRAN GORDA Mentira de la Tuberculosis Sobre la Que Construyeron la Medicina Moderna\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/immune-system-hoax/?lang=es\"\u003eLA FARSA DEL SISTEMA INMUNOLÓGICO: Lo Que Nunca Te Dijeron\u003c/
