 is unique in the annals of suppressed free energy. Unlike most free energy devices, which are demonstrated to small audiences and then vanished by shadowy forces, the Garabed generator was brought before the United States Congress. A special congressional resolution (H. Res. 642) was introduced to investigate the device. The US Navy examined it. Multiple government officials witnessed its operation. And then — like every other free energy device that has ever threatened the energy monopoly — it disappeared.\u003c/p\u003e\n\u003cp\u003eThe Garabed story proves that free energy suppression is not a fringe conspiracy — it is a matter of public record, documented in congressional proceedings and government correspondence. The device was real enough to warrant congressional attention. It was examined by the most powerful government on Earth. And it was still suppressed.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the demonic hierarchy operates through institutional power. The principalities and powers of Ephesians 6:12 do not merely tempt individuals — they control institutions. When the institution of the US Congress investigated a free energy device and nothing came of it, institutional power — not natural law — was the cause. The 97.5% who are failing trust institutions. But the institutions serve a different master.\u003c/p\u003e\n\u003cp\u003eNapoleon's Jesuits pursue \"absolute power\" — and Congress itself is not immune to their influence. Adams warned of their \"eternal damnation.\" Tambulini governed \"half the world.\" The Catholic Confidential documentary reveals infiltration \"cloaked with cunning\" and \"every species of vice.\" The Garabed suppression demonstrates that even congressional investigation cannot overcome Jesuit-level institutional control.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-garabed-story\"\u003eThe Garabed Story\u003c/h2\u003e\n\u003ch3 id=\"garabed-tk-giragossian\"\u003eGarabed T.K. Giragossian\u003c/h3\u003e\n\u003cp\u003eGarabed T.K. Giragossian was an Armenian-American inventor who, in the early 1900s, developed what he called the \"Garabed\" — an energy device that he claimed could extract usable energy from the natural forces of the universe. Giragossian spent years developing and refining the device, eventually seeking government support for a full-scale demonstration.\u003c/p\u003e\n\u003ch3 id=\"the-congressional-resolution\"\u003eThe Congressional Resolution\u003c/h3\u003e\n\u003cp\u003eGiragossian's persistence and the apparent merit of his claims led to an extraordinary event: on December 15, 1918, Congressman Lathrop Brown of New York introduced House Resolution 642, directing the Secretary of the Interior to investigate the Garabed invention.\u003c/p\u003e\n\u003cp\u003eThe resolution stated that Giragossian had \"invented a method of securing available energy from an inexhaustible natural source\" and that the invention warranted government investigation. The resolution passed, and a committee was appointed to examine the device.\u003c/p\u003e\n\u003cp\u003eThis is remarkable. A member of the United States Congress formally requested government investigation of a free energy device. The resolution passed through the political process, meaning that enough representatives considered the claim credible to warrant official action. This was not a fringe event — it was an act of government.\u003c/p\u003e\n\u003ch3 id=\"the-navy-examination\"\u003eThe Navy Examination\u003c/h3\u003e\n\u003cp\u003eThe US Navy was tasked with examining the Garabed device. Navy engineers tested the device and, according to available records, acknowledged that it operated as described — producing energy output that exceeded the apparent input.\u003c/p\u003e\n\u003cp\u003eHowever, the Navy's report included a caveat that proved fatal to the investigation: the engineers could not explain how the device worked within the framework of accepted physics. Because they could not identify the energy source, they concluded that they must be missing something — rather than concluding that the device worked through principles not yet understood by conventional physics.\u003c/p\u003e\n\u003cp\u003eThis is the institutional catch-22 that kills every free energy device: if the device cannot be explained by current physics, it is dismissed — even if it demonstrably works. The evidence of operation is trumped by the absence of a theoretical explanation. This is not science — it is ideology masquerading as science.\u003c/p\u003e\n\u003ch3 id=\"the-disappearance\"\u003eThe Disappearance\u003c/h3\u003e\n\u003cp\u003eAfter the Navy examination, the Garabed investigation stalled. The device did not receive government support. Giragossian continued to advocate for his invention but was unable to overcome institutional resistance. The Garabed generator — like so many free energy devices before and after — faded from the public record.\u003c/p\u003e\n\u003cp\u003eWhat happened to the device itself is unclear. Whether it was confiscated, destroyed, or simply abandoned without support, the result was the same: a working free energy device, examined by the US government, was suppressed.\u003c/p\u003e\n\u003ch2 id=\"why-free-energy-threatens-the-power-structure\"\u003eWhy Free Energy Threatens the Power Structure\u003c/h2\u003e\n\u003ch3 id=\"energy-as-control\"\u003eEnergy as Control\u003c/h3\u003e\n\u003cp\u003eThe energy industry is not merely an economic sector — it is a control system. Every aspect of modern life depends on energy: transportation, food production, manufacturing, communication, heating, cooling, lighting. Control energy, and you control civilization.\u003c/p\u003e\n\u003cp\u003eThe current energy system is centralized: energy is produced at large facilities (power plants, refineries) and distributed to consumers through networks (power grids, pipelines, gas stations) controlled by corporations. This centralization creates dependency — every person, every business, every government depends on the energy corporations for their survival.\u003c/p\u003e\n\u003cp\u003eFree energy would decentralize this system. If every home, every business, every vehicle could generate its own energy, the centralized control would collapse. The energy corporations would lose their monopoly. The governments that tax energy would lose revenue. The intelligence agencies that use energy infrastructure for surveillance would lose their platform. And the secret societies that profit from energy scarcity would lose their primary source of wealth and power.\u003c/p\u003e\n\u003cp\u003eThis is why free energy is suppressed with such ferocity. It is not about physics — it is about power. And the people who hold power will do anything to keep it.\u003c/p\u003e\n\u003ch3 id=\"the-rockefeller-jesuit-energy-axis\"\u003eThe Rockefeller-Jesuit Energy Axis\u003c/h3\u003e\n\u003cp\u003eThe Rockefeller dynasty built its fortune on petroleum. The Jesuit order built its power on institutional control. Together, they form an axis of energy suppression that has operated for over a century:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRockefeller money\u003c/strong\u003e funds the universities that teach physics in ways that make free energy seem impossible\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJesuit universities\u003c/strong\u003e train the physicists who enforce this orthodoxy\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIntelligence agencies\u003c/strong\u003e (connected to both Rockefeller and Jesuit networks) suppress inventors who challenge the orthodoxy\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMedia organizations\u003c/strong\u003e (also connected to both networks) ridicule free energy research\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGovernment agencies\u003c/strong\u003e (captured by both networks) refuse to investigate or support free energy\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Garabed generator penetrated one layer of this suppression — it reached Congress. But the deeper layers held. The Navy examination was inconclusive by design. The institutional momentum stalled the investigation. And the device disappeared into the same void that has swallowed every free energy breakthrough for over a century.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"light-in-the-darkness\"\u003eLight in the Darkness\u003c/h3\u003e\n\u003cp\u003eThe Gospel of John declares that \"the light shineth in darkness; and the darkness comprehended it not.\" Free energy is a form of light — the light of God's provision, the light of truth about the abundant energy embedded in creation. And the darkness of the energy monopoly has not comprehended it — not because it cannot, but because it will not.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the demonic hierarchy is organized to steal God's provision from humanity. Free energy is the ultimate provision — energy sufficient for all human needs, freely available in creation, requiring only the knowledge and technology to access it. The suppression of this provision is the theft of a divine gift — a theft perpetrated by human agents serving spiritual masters.\u003c/p\u003e\n\u003cp\u003eThe 97.5% who are failing pay for energy they do not need to buy. They accept scarcity that does not exist. They trust institutions that are designed to exploit them. And they do so because they have \"never made Jesus Lord\" — they have never sought God's truth about His creation, His provision, and His plan for human flourishing.\u003c/p\u003e\n\u003ch3 id=\"the-promise-of-freedom\"\u003eThe Promise of Freedom\u003c/h3\u003e\n\u003cp\u003eThe truth about free energy will eventually prevail. No suppression lasts forever. No lie endures against the truth. The Garabed generator may have been suppressed, but the energy it tapped still flows. The Earth's magnetic field still radiates. The quantum vacuum still fluctuates. The sun still shines. God's provision is inexhaustible, and man's suppression is temporary.\u003c/p\u003e\n\u003cp\u003eWhen free energy breaks through — and it will — the energy monopoly will collapse, and with it the control system that has enslaved humanity for generations. This is not wishful thinking — it is faith in God's promise that truth prevails and that His creation is sufficient for His children.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — Garabed generator documentation and congressional records research\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — God's provision and the theft of blessings\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit institutional control and energy suppression\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003
