u003eGod despises false witnesses — yet the entire machinery of modern warfare runs on false testimony. Every major American war of the past 150 years has been initiated by a staged event, a manipulated narrative, or an outright lie. World War I was no exception. The entry of the United States into the Great War was secured through a series of false flag operations and propaganda campaigns so brazen that their architects had to impose the strictest censorship regime in American history to prevent the truth from reaching the public.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, operating through their network of intelligence operatives, politicians, and media controllers, understood that the American people would not willingly send their sons to die in a European war. The public had to be manipulated, and the tools of manipulation were false flags and censorship. As John Adams warned: \u003cem\u003e\"If ever there were a body of men who merited eternal damnation on earth and in hell, it is this society of Loyolas.\"\u003c/em\u003e The Jesuit willingness to sacrifice any number of innocent lives for the advancement of their agenda is the defining characteristic of the order — and the false flags of World War I demonstrate this willingness in horrifying detail.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e captures the essence of this deception — lies layered upon lies, each one requiring the next to maintain the structure. And as \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e reminds us, the greatest lies are told in the name of the greatest causes: freedom, democracy, national honor.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"false-flag-1-the-sinking-of-the-lusitania\"\u003eFalse Flag #1: The Sinking of the Lusitania\u003c/h2\u003e\n\u003ch3 id=\"the-setup\"\u003eThe Setup\u003c/h3\u003e\n\u003cp\u003eOn May 7, 1915, the British ocean liner RMS Lusitania was torpedoed by a German U-boat off the coast of Ireland. The ship sank in 18 minutes, killing 1,198 people, including 128 Americans. The sinking was immediately used as propaganda to push the United States toward entering the war.\u003c/p\u003e\n\u003cp\u003eBut the official story conceals critical facts:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Lusitania was carrying munitions.\u003c/strong\u003e Despite being classified as a passenger vessel, the Lusitania's cargo included 4.2 million rounds of rifle ammunition, 1,248 cases of shrapnel shells, and 18 cases of non-explosive fuses. This was a violation of the rules governing neutral shipping and made the Lusitania a legitimate military target under international law. The British Admiralty knew this. The American government knew this. The passengers did not.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe German government warned American travelers.\u003c/strong\u003e The German Embassy in Washington placed advertisements in 50 American newspapers warning that vessels flying the British flag in the war zone were liable to destruction. The Imperial German Embassy's notice ran alongside Cunard's own advertisement for the Lusitania's voyage. American travelers were explicitly warned — and the U.S. government did nothing to prevent them from boarding.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe British Admiralty withdrew the Lusitania's naval escort.\u003c/strong\u003e The cruiser HMS Juno, which had been assigned to escort the Lusitania through the U-boat danger zone, was recalled to port just before the liner entered the area. Winston Churchill, then First Lord of the Admiralty, was responsible for naval dispositions. The withdrawal of the escort left the Lusitania defenseless — as if by design.\u003c/p\u003e\n\u003ch3 id=\"the-coverup\"\u003eThe Coverup\u003c/h3\u003e\n\u003cp\u003eA British investigation, led by Lord Mersey, concluded that the Lusitania was not carrying contraband and that the German attack was unprovoked. Lord Mersey, after delivering his findings, resigned from public service and reportedly told a friend: \"The Lusitania case was a damned dirty business.\"\u003c/p\u003e\n\u003cp\u003eThe truth about the Lusitania's cargo was suppressed for decades. Only in 2008, when divers discovered munitions in the wreck, was the full extent of the deception confirmed. But by then, the lie had served its purpose: the sinking of the Lusitania had shifted American public opinion toward intervention, setting the stage for the U.S. entry into the war two years later.\u003c/p\u003e\n\u003ch2 id=\"false-flag-2-the-zimmermann-telegram\"\u003eFalse Flag #2: The Zimmermann Telegram\u003c/h2\u003e\n\u003ch3 id=\"the-intercept\"\u003eThe Intercept\u003c/h3\u003e\n\u003cp\u003eIn January 1917, British intelligence intercepted a telegram from German Foreign Secretary Arthur Zimmermann to the German Ambassador in Mexico. The telegram proposed a German-Mexican alliance in the event of American entry into the war: Germany would support Mexico in recovering Texas, New Mexico, and Arizona from the United States.\u003c/p\u003e\n\u003cp\u003eThe Zimmermann Telegram was presented to the American public as proof of German hostility — a direct threat to American territory. President Wilson, who had won re-election in 1916 on the slogan \"He Kept Us Out of War,\" used the telegram to justify a reversal of his position and a request to Congress for a declaration of war.\u003c/p\u003e\n\u003ch3 id=\"the-questions-nobody-asked\"\u003eThe Questions Nobody Asked\u003c/h3\u003e\n\u003cp\u003eSeveral aspects of the Zimmermann Telegram have never been adequately explained:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHow did British intelligence intercept it?\u003c/strong\u003e The telegram was sent through secure diplomatic channels, including a cable that passed through a relay station controlled by the United States. The British interception of this cable suggests either that the British were tapping American communications (a hostile act against a neutral nation) or that the Americans allowed the interception (indicating foreknowledge and collaboration).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhy did Zimmermann confirm its authenticity?\u003c/strong\u003e When confronted, Zimmermann admitted that the telegram was genuine — a bizarre decision for a diplomat caught in a potential war-triggering scandal. Some researchers have suggested that Zimmermann was a double agent, or that he was instructed to confirm the telegram by forces that wanted the United States to enter the war.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWho benefited?\u003c/strong\u003e The Zimmermann Telegram provided exactly the pretext that the war party in Washington needed. Its timing — revealed to the public just weeks before Wilson asked Congress for a declaration of war — was suspiciously perfect. The British, who had been desperately trying to bring America into the war since 1914, had the most obvious motive for either fabricating or facilitating the telegram's \"discovery.\"\u003c/p\u003e\n\u003ch2 id=\"false-flag-3-the-unrestricted-submarine-warfare-declaration\"\u003eFalse Flag #3: The Unrestricted Submarine Warfare Declaration\u003c/h2\u003e\n\u003ch3 id=\"the-german-decision\"\u003eThe German \"Decision\"\u003c/h3\u003e\n\u003cp\u003eIn February 1917, Germany announced that it would resume unrestricted submarine warfare — attacking any vessel, including neutral shipping, in the waters around Britain and France. This decision, which virtually guaranteed American entry into the war, has been presented by historians as a desperate German gamble.\u003c/p\u003e\n\u003cp\u003eBut the decision makes no strategic sense from a German perspective. Germany knew that unrestricted submarine warfare would bring the United States into the war — an outcome that would doom Germany's already strained war effort. The German high command was not stupid; they understood the consequences.\u003c/p\u003e\n\u003cp\u003eSo why did they make this decision?\u003c/p\u003e\n\u003cp\u003eThe answer lies in the infiltration of the German government by Jesuit-connected agents. The German intelligence service, the Abteilung IIIb, had been penetrated by operatives connected to the Vatican's intelligence network. Key decisions — including the resumption of unrestricted submarine warfare — were influenced by advisors whose true loyalty was not to Germany but to the broader Jesuit plan for the war's outcome.\u003c/p\u003e\n\u003cp\u003eThe Jesuit plan required American entry into the war to ensure an Allied victory — and more importantly, to ensure that America would be a full participant in the post-war settlement. Without American involvement, the Jesuits could not reshape the world map according to their design. The unrestricted submarine warfare \"decision\" was the mechanism by which the Jesuits, operating through their agents in the German government, ensured that America would join the war.\u003c/p\u003e\n\u003ch2 id=\"the-no-photos-policy\"\u003eThe No Photos Policy\u003c/h2\u003e\n\u003ch3 id=\"total-information-control\"\u003eTotal Information Control\u003c/h3\u003e\n\u003cp\u003eWorld War I was the first war in which the combatant governments imposed comprehensive censorship on photographic documentation. On the Western Front, photography by soldiers was prohibited. Journalists were initially banned from the front lines entirely, and when correspondents were eventually allowed limited access, their reports and photographs were subjected to rigorous military censorship.\u003c/p\u003e\n\u003cp\u003eThe official explanation for this censorship was \"operational security\" — the need to prevent the enemy from gaining intelligence through published photographs. But the real purpose was far more sinister: to prevent the public from seeing the true nature of the war.\u003c/p\u003e\n\u003ch3 id=\"what-they-were-hiding\"\u003eWhat They Were Hiding\u003c/h3\u003e\n\u003cp\u003eThe photographs that did survive — often taken in defiance of orders, smuggled out by soldiers, or released years after the war — reveal a conflict that bears little resemblance to the heroic narrative presented by the propagandists:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTrenches\u003c/strong\u003e that looked nothing like the clean, organized positions depicted in official photographs, but rather like muddy, corpse-filled ditches where men lived in conditions worse than any prison.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCasualties\u003c/strong\u003e on a scale that defied comprehension — entire battalions wiped out in minutes during futile attacks on entrenched positions.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGas attacks\u003c/strong\u003e that left soldiers blinded, choking, and dying in agony — attacks that violated every principle of civilized warfare and that were used by both sides despite official denials.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShell shock\u003c/strong\u003e victims — men reduced to trembling, incoherent wrecks by the relentless bombardment — who were then court-martialed and sometimes executed for \"cowardice.\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIf the American public had seen these images before Congress voted on the declaration of war, there would have been no declaration. The false flags would have been insufficient without the censorship to prevent the public from understanding what they were being asked to support.\u003c/p\u003e\n\u003ch3 id=\"the-propaganda-machine\"\u003eThe Propaganda Machine\u003c/h3\u003e\n\u003cp\u003eIn place of truth, the governments of all combatant nations substituted propaganda. In the United States, the Committee on Public Information (the Creel Committee), established by President Wilson in April 1917, became the most sophisticated propaganda apparatus the world had ever seen.\u003c/p\u003e\n\u003cp\u003eThe Creel Committee employed artists, writers, filmmakers, and speakers to create a narrative of the war that bore no relationship to reality. German soldiers were depicted as bayonet-wielding monsters. The Allied cause was framed as a crusade for democracy and freedom. The economic motivations behind the war — the banking interests, the arms contracts, the territorial ambitions — were buried under a flood of patriotic imagery.\u003c/p\u003e\n\u003cp\u003eThis propaganda machine was the direct ancestor of modern media control. The techniques developed by the Creel Committee — emotional manipulation, demonization of the enemy, suppression of dissenting voices — are still in use today. Edward Bernays, who worked for the Creel Committee, went on to write \u003cem\u003ePropaganda\u003c/em\u003e (1928), the foundational text of modern public relations, in which he openly described how the \"intelligent manipulation of the organized habits and opinions of the masses\" was the key to controlling democratic societies.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e traces the lineage from WWI propaganda through MKUltra to modern mind control programs.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony emphasizes that words are spiritual (Matthew 12:36-37). The propaganda of World War I was not merely political communication — it was a form of spiritual warfare, using words and images to deceive millions into supporting a war that served Satan's agenda of destruction. The 97.5% who walk the wide road to destruction (Matthew 7:13-14) include those who accept the lies of the propagandist without discernment. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eFor detailed documentation of WWI false flags, see \u003ca href
