re de pecado, el hijo de perdición.\" — 2 Tesalonicenses 2:3\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLa energía es poder. Quien controla la energía controla la civilización. Durante más de cien años, las corporaciones petroleras y energéticas han mantenido un monopolio sobre el suministro energético global. Este monopolio ha permitido a un pequeño grupo de corporaciones gobernar la economía mundial.\u003c/p\u003e\n\u003cp\u003eLa amenaza más grande a este monopolio es la tecnología de energía libre — dispositivos que pueden producir más energía de la que consumen, utilizando principios de carga/descarga asimétrica u otros mecanismos que escapan a la comprensión convencional de la termodinámica.\u003c/p\u003e\n\u003cp\u003eJohn Perrigo fue un inventor que desarrolló tal dispositivo. Su invención amenazó el monopolio de la energía. Su invención fue suprimida.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"john-perrigo-y-el-dispositivo-de-energía-libre\"\u003eJohn Perrigo y el Dispositivo de Energía Libre\u003c/h2\u003e\n\u003ch3 id=\"la-invención\"\u003eLa Invención\u003c/h3\u003e\n\u003cp\u003eEn los 1990s, John Perrigo desarrolló un dispositivo basado en un principio simple: que la energía podría ser extraída del ambiente usando circuitos especialmente diseñados de carga y descarga asimétrica. El dispositivo no violaba las leyes de la termodinámica, según Perrigo, porque operaba en un dominio que la física convencional no había adecuadamente explicado.\u003c/p\u003e\n\u003cp\u003ePerrigo construyó prototipos. Los prototipos funcionaban. Producían más energía de la que consumían.\u003c/p\u003e\n\u003ch3 id=\"los-esfuerzos-de-patente\"\u003eLos Esfuerzos de Patente\u003c/h3\u003e\n\u003cp\u003ePerrigo intentó patentar su invención. El Oficina de Patentes de EE.UU. rechazó su solicitud. Rechazó múltiples solicitudes. El razonamiento oficial fue que la invención violaba la ley de conservación de energía.\u003c/p\u003e\n\u003cp\u003ePero las leyes de la física no cambian basándose en lo que es conveniente para las corporaciones de energía. Si el dispositivo de Perrigo funcionaba, funcionaba porque operaba dentro de principios físicos válidos que aún no habían sido completamente entendidos por la física convencional.\u003c/p\u003e\n\u003ch3 id=\"la-supresión\"\u003eLa Supresión\u003c/h3\u003e\n\u003cp\u003eDespués de los esfuerzos fallidos de patentes, Perrigo intentó publicar sus hallazgos. Las revistas científicas rechazaron su trabajo. Cuando otros científicos intentaron reproducir sus resultados, sus laboratorios fueron visitados por agentes federales. Los equipos fueron confiscados. Los registros fueron decomisados.\u003c/p\u003e\n\u003cp\u003ePerrigo fue marginado de la comunidad científica. Sus asociados fueron presionados para distanciarse de su trabajo. Sus fondos fueron cortados.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-patrón-de-supresión-de-energía-libre\"\u003eEl Patrón de Supresión de Energía Libre\u003c/h2\u003e\n\u003cp\u003eEl destino de Perrigo no es único. Es parte de un patrón de más de cien años de supresión de tecnología de energía libre:\u003c/p\u003e\n\u003ch3 id=\"nikola-tesla\"\u003eNikola Tesla\u003c/h3\u003e\n\u003cp\u003eNikola Tesla desarrolló tecnología para transmitir energía de forma inalámbrica — energía libre del aire, extraída del ambiente. Su laboratorio fue incendiado. Sus notas fueron confiscadas. Su legado fue ocultado bajo una narrativa de \"genio loco.\"\u003c/p\u003e\n\u003ch3 id=\"tom-bearden\"\u003eTom Bearden\u003c/h3\u003e\n\u003cp\u003eTom Bearden, un oficial retirado del ejército, desarrolló teorías sobre cómo extraer energía del vacuum cuántico. Sus trabajos fueron rechazados por revistas científicas convencionales. Sus publicaciones independientes fueron suprimidas.\u003c/p\u003e\n\u003ch3 id=\"stefan-marinov\"\u003eStefan Marinov\u003c/h3\u003e\n\u003cp\u003eStefan Marinov fue un inventor búlgaro que demostró dispositivos de movimiento perpetuo. Fue perseguido por gobiernos. Sus laboratorios fueron destruidos. Murió en circunstancias sospechosas.\u003c/p\u003e\n\u003ch3 id=\"bruce-depalma\"\u003eBruce DePalma\u003c/h3\u003e\n\u003cp\u003eBruce DePalma inventó el \"N-Machine\" — un dispositivo que producía energía mediante rotación específicamente diseñada. Sus patentes fueron rechazadas. Su trabajo fue descartado como pseudociencia.\u003c/p\u003e\n\u003cp\u003eEl patrón es claro: la tecnología de energía libre es sistemáticamente suprimida por:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eRechazos de patentes\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCensura académica\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDesacreditación de investigadores\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConfiscación de equipos\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIntimidación de financiadores\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersecución de inventores\u003c/strong\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"por-qué-importa\"\u003ePor Qué Importa\u003c/h2\u003e\n\u003ch3 id=\"el-monopolio-de-energía\"\u003eEl Monopolio de Energía\u003c/h3\u003e\n\u003cp\u003eLas corporaciones de energía — petroleras, nucleares, de electricidad — generan trillones en ingresos anuales. Este ingreso se basa en el monopolio sobre la producción de energía. Si la energía libre fuera disponible, el monopolio se colapsaría.\u003c/p\u003e\n\u003cp\u003eLos gobiernos, que dependen de los impuestos sobre la energía y de la cooperación de las corporaciones de energía, tienen incentivo a suprimirla. Las corporaciones militares, que dependen del petróleo para combustible, tienen incentivo a suprimirla. El sistema financiero global, que está construido sobre el costo económico de la energía, tiene incentivo a suprimirla.\u003c/p\u003e\n\u003ch3 id=\"la-pobreza-por-diseño\"\u003eLa Pobreza por Diseño\u003c/h3\u003e\n\u003cp\u003eLa pobreza global está fundamentada en el costo de la energía. Poblaciones enteras permanecen en pobreza porque no pueden pagar la energía. La energía libre eliminaría esta justificación para la pobreza.\u003c/p\u003e\n\u003cp\u003eLas corporaciones que generan ganancias de la pobreza — incluyendo las corporaciones de energía, las corporaciones farmacéuticas que dependen de poblaciones débiles para mercados cautivos, y las corporaciones financieras que dependen de deuda relacionada con energía — tienen incentivo directo a suprimir la energía libre.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"encuentra-más-información\"\u003eEncuentra Más Información\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman testimonio de ECD - Advertencia de fin de los tiempos de Dios\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¿Qué hay en el sótano del Vaticano puede sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eLa tecnología de energía libre existe. Ha existido durante más de cien años. Ha sido sistemáticamente suprimida porque amenaza los monopolios de poder que gobiernan el mundo. Pero hay Una Fuente de energía que ninguna corporación puede controlar, ningún gobierno puede monopolizar, y ningún inventor puede suprimir: la energía de la creación misma, fluida del Espíritu de Dios que sostiene todas las cosas. Esa energía es infinita, gratuita, y disponible para los que creen.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href
