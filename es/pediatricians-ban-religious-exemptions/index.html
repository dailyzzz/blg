03e\n\u003cp\u003eLa libertad religiosa ha sido un principio fundamental de la civilización occidental durante siglos. El derecho a actuar según la conciencia, a criar hijos de acuerdo a las creencias propias, y a rechazar intervenciones médicas que violan las convicciones religiosas es un derecho que ha sido codificado en leyes y tratados internacionales.\u003c/p\u003e\n\u003cp\u003eEse derecho está siendo sistemáticamente eliminado — no mediante cambios legislativos abiertos sino mediante la captura institucional de la profesión médica por la industria farmacéutica.\u003c/p\u003e\n\u003cp\u003eEn octubre de 2024, la Academia Estadounidense de Pediatría (AAP) emitió nuevas directrices que, efectivamente, prohíben a los pediatras respetar las exenciones religiosas de los padres para vacunas. Las directrices declaran que los pediatras que respeten las exenciones religiosas están incumpliendo los estándares éticos de la profesión.\u003c/p\u003e\n\u003cp\u003eEsta no es simplemente una declaración de política. Es un acto de coerción institucional: pediatras que respeten la libertad religiosa pueden perder sus credenciales, sus privilegios hospitalarios, y sus licencias estatales.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-posición-de-la-aap\"\u003eLa Posición de la AAP\u003c/h2\u003e\n\u003ch3 id=\"las-directrices-de-octubre-de-2024\"\u003eLas Directrices de Octubre de 2024\u003c/h3\u003e\n\u003cp\u003eLas nuevas directrices de la AAP abordan el \"cuidado de familias que oponen la vacunación.\" Las directrices establecen que:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eLos pediatras deben \"desalentar activamente\" las exenciones religiosas\u003c/li\u003e\n\u003cli\u003eLos pediatras deben \"documentar\" en los registros médicos cuando los padres se resisten a la vacunación\u003c/li\u003e\n\u003cli\u003eLos pediatras pueden \"despedir\" familias de su práctica si los padres continúan rechazando vacunas\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eEstas disposiciones convierten la libertad religiosa de los padres en una cuestión de registros médicos permanentes y en causa para la separación del paciente-médico.\u003c/p\u003e\n\u003ch3 id=\"el-cambio-de-paradigma\"\u003eEl Cambio de Paradigma\u003c/h3\u003e\n\u003cp\u003eLas directrices representan un cambio fundamental: el movimiento de un modelo médico basado en el consentimiento informado hacia un modelo de coerción médica institucional. Bajo el modelo antiguo, los médicos presentaban opciones, los pacientes decidían, y la decisión del paciente era respetada. Bajo el nuevo modelo, la institución (la AAP, la industria farmacéutica, el estado) determina el \"resultado correcto\" (100% de cobertura de vacunación) y los médicos son instrumentos para lograr ese resultado.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"por-qué-esto-representa-captura-institucional\"\u003ePor Qué Esto Representa Captura Institucional\u003c/h2\u003e\n\u003ch3 id=\"relaciones-financieras\"\u003eRelaciones Financieras\u003c/h3\u003e\n\u003cp\u003eLa AAP no es una organización independiente de la industria farmacéutica. Las relaciones financieras son extensivas:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLos fabricantes de vacunas son patrocinadores de las conferencias de la AAP\u003c/li\u003e\n\u003cli\u003eLos ejecutivos farmacéuticos sirven en comités de política de la AAP\u003c/li\u003e\n\u003cli\u003eLa industria farmacéutica financia investigación que informa directrices de la AAP\u003c/li\u003e\n\u003cli\u003eLas revistas médicas que publican estudios sobre vacunas son financiadas por anunciantes farmacéuticos\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEstos conflictos de interés no son accidentales. Son estructurales. La AAP no puede asumir una posición que cuestione la seguridad o necesidad de las vacunas porque su financiamiento depende de los fabricantes de vacunas que podrían ser cuestionados.\u003c/p\u003e\n\u003ch3 id=\"el-patrón-de-captura\"\u003eEl Patrón de Captura\u003c/h3\u003e\n\u003cp\u003eLa captura institucional de la medicina sigue un patrón predecible:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEtapa 1: Financiamiento\u003c/strong\u003e - La industria proporciona fondos a organizaciones profesionales, conferencias, y revisiones de políticas.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEtapa 2: Personal\u003c/strong\u003e - Los ejecutivos farmacéuticos se colocan en comités de política y órganos de gobierno.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEtapa 3: Ideología\u003c/strong\u003e - Las políticas se escriben para servir los intereses corporativos mientras se presentan como \"mejores prácticas médicas.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEtapa 4: Coerción\u003c/strong\u003e - Las políticas se aplican mediante mecanismos de credencialización que castigan a los médicos que se resisten.\u003c/p\u003e\n\u003cp\u003eCada etapa construye sobre la anterior. Al final, la institución profesional sirve a la industria, no al paciente.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"las-implicaciones-de-la-libertad-religiosa\"\u003eLas Implicaciones de la Libertad Religiosa\u003c/h2\u003e\n\u003ch3 id=\"el-derecho-a-la-conciencia\"\u003eEl Derecho a la Conciencia\u003c/h3\u003e\n\u003cp\u003eLas exenciones religiosas existen porque los padres tienen derecho a tomar decisiones basadas en sus creencias religiosas sobre sus propios hijos. Este derecho no es contingente en la aprobación del gobierno, la medicina, o cualquier institución. Es un derecho fundamental.\u003c/p\u003e\n\u003cp\u003eCuando la AAP declara que los pediatras deben \"desalentar activamente\" estas exenciones, está declarando que la conciencia religiosa de los padres debe ser superada por las directrices médicas institucionales.\u003c/p\u003e\n\u003ch3 id=\"la-trampa-del-consentimiento-informado\"\u003eLa Trampa del Consentimiento Informado\u003c/h3\u003e\n\u003cp\u003eEl consentimiento informado requiere que una persona:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eComprenda la intervención siendo propuesta\u003c/li\u003e\n\u003cli\u003eComprenda los riesgos y beneficios\u003c/li\u003e\n\u003cli\u003eSepa que tiene opciones\u003c/li\u003e\n\u003cli\u003ePueda elegir libremente sin coerción\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eLas nuevas directrices de la AAP violan cada uno de estos principios:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLos pediatras deben \"desalentar activamente\" opciones (eliminando la neutralidad informativa)\u003c/li\u003e\n\u003cli\u003eLa \"documentación\" de la resistencia en registros permanentes crea presión social (coerción)\u003c/li\u003e\n\u003cli\u003eLa amenaza de desplataformar familias crea coerción económica\u003c/li\u003e\n\u003cli\u003eEl lenguaje sobre \"cuidado\" para familias que se resisten sugiere que los padres están siendo irresponsables (presión psicológica)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNo hay consentimiento informado en este modelo. Hay consentimiento coercionado.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-testamento-de-un-pediatra\"\u003eEl Testamento de un Pediatra\u003c/h2\u003e\n\u003cp\u003eDr. William Sears es uno de los pediatras más respetados del país. Ha escrito más de 40 libros sobre crianza infantil y ha servido en numerosos consejos médicos. En respuesta a las nuevas directrices de la AAP, Sears emitió una declaración condenando el cambio:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"He practicado pediatría durante 60 años. Nunca he visto una situación en la que la medicina se haya convertido en tan coercitiva. Los pediatras deben respetar la autonomía de los padres. Los padres deben ser los arboles finales de las decisiones sobre sus propios hijos. Las directrices de la AAP violan este principio fundamental.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eSears es un ejemplo raro de un pediatra prominente dispuesto a cuestionar la AAP públicamente. Muchos otros comparten sus objeciones pero permanecen en silencio por temor a las consecuencias profesionales.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"encuentra-más-información\"\u003eEncuentra Más Información\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/education-system-indoctrination/?lang=es\"\u003eSistema Educativo Indoctrinación\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/psychology-industry-manufacturing-illness/?lang=es\"\u003eLa Industria de la Psicología: Fabricando Enfermedad Mental para Ganancias\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman testimonio de ECD - Advertencia de fin de los tiempos de Dios\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eLa libertad religiosa no es un lujo. Es un derecho fundamental. Cuando las instituciones médicas intentan eliminar ese derecho, no están promoviendo salud. Están promoviendo control. El estrecho camino requiere padres dispuestos a elegir la conciencia sobre la coerción, la libertad sobre la conformidad, y la fe en el Dios que creó a sus hijos sobre la fe en las instituciones que buscan controlarlos.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Pediatras Prohíben Exenciones Religiosas: La Captura Institucional de la Medicina\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\"
