eDe todas las historias de energía libre suprimida, la de Lester Hendershot puede ser la más bien documentada y la más frustrante. Hendershot construyó un motor sin combustible — un dispositivo que generaba energía eléctrica sin ninguna fuente de combustible externa — y lo demostró a múltiples testigos, incluyendo funcionarios militares y reporteros de periódicos. El dispositivo fue examinado, probado, y confirmado que operaba. Y entonces Hendershot fue desacreditado, su dispositivo fue confiscado, y la historia fue enterrada.\u003c/p\u003e\n\u003cp\u003ePero a diferencia de muchas historias de energía libre, el caso Hendershot dejó un rastro de papel significativo: artículos de periódicos, correspondencia militar, testimonio de testigos, y solicitudes de patentes. Esta evidencia no puede ser descartada como rumor o fantasía. Es historia documentada — historia que ha sido sistemáticamente suprimida porque prueba que la energía libre es posible y que el establecimiento de energía ha estado mintiendo a la humanidad durante más de un siglo.\u003c/p\u003e\n\u003cp\u003eHoward Pittman fue contado durante su experiencia cercana a la muerte que la verdad es eterna y las mentiras son temporales. La historia de Hendershot es verdad que ha sido temporalmente suprimida por mentiras. La jerarquía demoníaca que Pittman vio en el segundo cielo — organizada, despiadada, y dedicada a robar la provisión de Dios de la humanidad — opera a través de agentes humanos que suprimen la energía libre para mantener el monopolio de energía que esclaviza al mundo.\u003c/p\u003e\n\u003cp\u003eEl \"poder absoluto\" de los Jesuitas (Napoleón) depende del control de energía. Su infiltración \"encubierta con astucia\" (Catholic Confidential) se extiende al sector de energía, al militar, y a las instituciones académicas que definen qué es físicamente posible. La \"condenación eterna\" de Adams se aplica a aquellos que suprimen los regalos de Dios por ganancia. El gobierno de Tambulini \"de mitad del mundo\" incluye gobierno sobre la energía que la potencia.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-historia-de-hendershot\"\u003eLa Historia de Hendershot\u003c/h2\u003e\n\u003ch3 id=\"el-inventor\"\u003eEl Inventor\u003c/h3\u003e\n\u003cp\u003eLester Jennings Hendershot era un inventor estadounidense quien, en los últimos 1920s, construyó un dispositivo que llamó el \"Motor sin Combustible de Hendershot\" o \"Generador Hendershot.\" El dispositivo fue descrito como un generador electromagnético que extraía energía del campo magnético de la Tierra — convirtiendo la energía magnética ambiental en potencia eléctrica usable.\u003c/p\u003e\n\u003cp\u003eHendershot no era un físico o ingeniero entrenado. Era un inventor práctico — un experimentador que construía cosas basadas en intuición, experimentación, y lo que funcionaba. Su falta de credenciales académicas fue usada para desacreditarlo, pero también significaba que no estaba restringido por la ortodoxia académica que declara imposible la energía libre.\u003c/p\u003e\n\u003ch3 id=\"las-demostraciones-de-1928\"\u003eLas Demostraciones de 1928\u003c/h3\u003e\n\u003cp\u003eEn febrero de 1928, Hendershot demostró su dispositivo en Selfridge Field, una base aérea militar cerca de Detroit, Michigan. La demostración fue presenciada por:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMayor Thomas Lanphier\u003c/strong\u003e — un oficial distinguido del Army Air Corps e padre del piloto que después derribó el avión del Almirante Yamamoto en la Segunda Guerra Mundial\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVarios oficiales del Ejército\u003c/strong\u003e y personal técnico\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eReporteros de periódicos\u003c/strong\u003e del Detroit Free Press y otras publicaciones\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLos testigos reportaron que el dispositivo:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGeneró corriente eléctrica suficiente para potenciar luces, receptores de radio, y un motor de máquina de coser pequeña\u003c/li\u003e\n\u003cli\u003eOperó sin ninguna fuente de potencia externa visible — sin baterías, sin combustible, sin conexión eléctrica\u003c/li\u003e\n\u003cli\u003eContenía bobinas, imanes, y capacitores arreglados en una configuración específica\u003c/li\u003e\n\u003cli\u003eFuncionó durante períodos extendidos durante pruebas\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEl Mayor Lanphier fue suficientemente impresionado para abogar por mayor investigación militar del dispositivo. La historia recibió cobertura significativa de periódico, con titulares reportando en el \"motor sin combustible\" y su potencial para revolucionar la producción de energía.\u003c/p\u003e\n\u003ch3 id=\"la-supresión\"\u003eLa Supresión\u003c/h3\u003e\n\u003cp\u003eLo que ocurrió después sigue el patrón de toda supresión de energía libre:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDesacreditación\u003c/strong\u003e: Después de la cobertura positiva inicial, una narrativa contraria emergió. Hendershot fue acusado de fraude — supuestamente escondiendo baterías dentro del dispositivo. Esta acusación nunca fue probada, pero fue amplificada por los medios y usada para desacreditar toda la demostración.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAtaque físico\u003c/strong\u003e: Hendershot reportadamente recibió un choque eléctrico mientras trabajaba en su dispositivo — un incidente que algunos investigadores creen que no fue accidental sino una advertencia de partes que querían que el trabajo parara.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEncarcelamiento psiquiátrico\u003c/strong\u003e: Hendershot fue en un momento encarcelado en una institución psiquiátrica — el método estándar de neutralizar inventores problemáticos. El diagnóstico proporcionó una explicación conveniente para sus reclamos \"delirantes\" sobre energía libre.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eConfiscación de dispositivo\u003c/strong\u003e: Los dispositivos que Hendershot construyó ya desaparecieron o fueron confiscados. Ningún generador Hendershot funcionando sobrevive — o si uno lo hace, está en posesión de partes que no tienen interés en hacerlo público.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMuerte\u003c/strong\u003e: Hendershot murió en 1961 bajo circunstancias que han plantado preguntas entre investigadores. La causa oficial fue listada como muerte natural, pero el patrón de muertes de inventor asociadas con tecnología de energía libre sugiere una posibilidad más oscura.\u003c/p\u003e\n\u003ch3 id=\"la-evidencia-que-sobrevive\"\u003eLa Evidencia Que Sobrevive\u003c/h3\u003e\n\u003cp\u003eA pesar de la supresión, evidencia significativa del dispositivo Hendershot sobrevive:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eArtículos de periódicos\u003c/strong\u003e de 1928 describiendo las demostraciones y nombrando los testigos militares\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCorrespondencia militar\u003c/strong\u003e referenciando el dispositivo y su potencial\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSolicitudes de patentes\u003c/strong\u003e presentadas por Hendershot describiendo la construcción del dispositivo\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTestimonio de testigos\u003c/strong\u003e de múltiples observadores independientes\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIntentos de reconstrucción\u003c/strong\u003e por investigadores que han construido dispositivos basados en descripciones de Hendershot, algunos reclamando éxito parcial\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEsta evidencia es más que suficiente para justificar investigación científica seria. Pero investigación científica seria de energía libre es exactamente lo que el establecimiento de energía previene — a través del control de financiamiento, portería académica, y ridículo de cualquiera quien toma el tema seriamente.\u003c/p\u003e\n\u003ch2 id=\"el-patrón-de-supresión-de-energía-libre\"\u003eEl Patrón de Supresión de Energía Libre\u003c/h2\u003e\n\u003ch3 id=\"el-plantilla\"\u003eEl Plantilla\u003c/h3\u003e\n\u003cp\u003eEl caso Hendershot ilustra la plantilla usada para suprimir la energía libre:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eRidículo\u003c/strong\u003e: Etiqueta al inventor como un fraude, un excéntrico, o mentalmente enfermo\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConfiscación\u003c/strong\u003e: Incauta el dispositivo, ya sea a través de procedimientos legales u acción encubierta\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAmenaza\u003c/strong\u003e: Aplica presión legal, financiera, o física al inventor\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInstitucionalización\u003c/strong\u003e: Si ridículo y amenazas fallan, compromete al inventor en una instalación psiquiátrica\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEliminación\u003c/strong\u003e: Si todo lo demás falla, el inventor encuentra un fin prematuro\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBorrado\u003c/strong\u003e: Remueve la historia del registro histórico\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eEsta plantilla ha sido aplicada a docenas de inventores durante el último siglo. La consistencia del patrón — a través de diferentes países, diferentes tecnologías, y diferentes décadas — prueba que no es orgánico. Es una campaña coordinada, sistemática de supresión dirigida por el monopolio de energía y sus aliados de inteligencia/militar.\u003c/p\u003e\n\u003ch3 id=\"otros-inventores-suprimidos\"\u003eOtros Inventores Suprimidos\u003c/h3\u003e\n\u003cp\u003eLa historia de Hendershot no está aislada. Otros inventores quienes reclamaron desarrollar dispositivos de energía libre y fueron subsecuentemente suprimidos incluyen:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNikola Tesla\u003c/strong\u003e: Torre Wardenclyffe demolida después que financiamiento fue retirado\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eT. Henry Moray\u003c/strong\u003e: Dispositivo de energía radiante destruido por un saboteador en su laboratorio\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJohn Keely\u003c/strong\u003e: Motor demostrado a miles; murió misteriosamente\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStanley Meyer\u003c/strong\u003e: Inventor de celda de combustible de agua; murió repentinamente en una reunión de restaurante con inversionistas\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEugene Mallove\u003c/strong\u003e: Investigador de fusión fría; asesinado en 2004\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eH.E. Perrigo\u003c/strong\u003e: Dispositivo e inventor desaparecieron del registro\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGarabed Giragossian\u003c/strong\u003e: Generador examinado por el Congreso; suprimido\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEl número y consistencia de estos casos elimina coincidencia como una explicación. Algo está sistemáticamente previniendo que la energía libre alcance al público.\u003c/p\u003e\n\u003ch2 id=\"la-dimensión-espiritual\"\u003eLa Dimensión Espiritual\u003c/h2\u003e\n\u003ch3 id=\"la-energía-de-dios\"\u003eLa Energía de Dios\u003c/h3\u003e\n\u003cp\u003eEl universo está lleno de energía. El campo magnético de la Tierra, radiación solar, potencial gravitatorio, energía de punto cero, y innumerables otros fenómenos representan vastos depósitos de energía que Dios incrustó en la creación para el uso de la humanidad.\u003c/p\u003e\n\u003cp\u003eLa supresión de tecnología de energía libre es el robo de la provisión de Dios. Fuerza a la humanidad a pagar por lo que Dios dio libremente. Enriquece a una pequeña élite a expensas de la raza humana entera. Y sirve la misma agenda espiritual que Howard Pittman fue mostrado en el segundo cielo: la separación de la humanidad de las bendiciones de Dios.\u003c/p\u003e\n\u003cp\u003eEl 97.5% quienes está fracasando, quienes \"nunca hizo a Jesús Señor,\" pagan sus facturas de energía sin pregunta. Aceptan la mentira de escasez de energía porque han sido enseñados a confiar en la autoridad institucional. Sirven \"a sí mismos\" — consumiendo energía producida por un sistema que los esclaviza — en lugar de buscar la provisión de Dios a través de la energía abundante que Él colocó en la creación.\u003c/p\u003e\n\u003ch3 id=\"la-agenda-de-energía-jesuita\"\u003eLa Agenda de Energía Jesuita\u003c/h3\u003e\n\u003cp\u003eEl compromiso de la orden jesuita al \"poder absoluto\" requiere control de energía. La energía es la fundación de civilización — sin energía, nada funciona. Controla la energía, y controlas todo.\u003c/p\u003e\n\u003cp\u003eLos Jesuitas gobiernan el mundo a través de redes de universidades que enseñan la física que declara imposible la energía libre. Sus conexiones de inteligencia suprimen inventores quienes prueban lo contrario. Su imperio financiero se lucra del monopolio de energía. Y su agenda espiritual — el reemplazo de la autoridad de Dios con la autoridad institucional — es servida por un sistema que hace a cada persona dependiente de energía corporativa para su supervivencia.\u003c/p\u003e\n\u003cp\u003eLa energía libre destruiría esta dependencia. Liberaría a la humanidad del monopolio de energía, descentralizaría potencia (en ambos sentidos), y probaría que la provisión de Dios es suficiente. Esto es por qué es suprimida — no porque no funcione, sino porque funciona demasiado bien.\u003c/p\u003e\n\u003ch2 id=\"descubre-más\"\u003eDescubre Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eSubstack de Agent131711\u003c/a\u003e — Documentación del motor sin combustible de Hendershot e investigación de supresión de energía libre\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eTestimonio de Experiencia Cercana a la Muerte de Howard Pittman\u003c/a\u003e — La provisión de Dios y el robo de bendiciones\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Secretos Deplorables de los Jesuitas Revelados\u003c/a\u003e — Control jesuita de energía y ciencia\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicidio y Pharmakeia — La Hechicería de la Medicina Moderna\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¡Lo Que Hay en el Sótano del Vaticano Puede Conmocionarte!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eArchivos de periódicos de 1928 documentando demostraciones de Hendershot\u003c/li\u003e\n\u003cli\u003eCorrespondencia militar desde Selfridge Field\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"escucha-mientras-lees\"\u003eEscucha Mientras Lees\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/111-Free_Energy_Murdered.mp4\"\u003eEnergía Libre Asesinada\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/49-Smart_City_Prison.mp4\"\u003ePrisión de la Ciudad Inteligente\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/63-Bluetooth_Bodies.mp4\"\u003eCuerpos Bluetooth\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/67-The_Enemy_Within.mp4\"\u003eEl Enemigo Dentro\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/13-The_Word_of_God.mp4\"\u003eThe Word of God\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explora-más\"\u003eExplora Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/perrigo-free-energy-device/?lang=es\"\u003eLa Historia Peculiar del Dispositivo de Energía Libre de H.E. Perrigo\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/garabed-free-energy-generator/?lang=es\"\u003eEl Generador de Energía Libre de Garabed Que Desapareció\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/space-rockets-helium-balloons/?lang=es\"\u003e¿Son Realmente los Cohetes Espaciales Globos de HELIO: La Evidencia\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eLester Hendershot construyó un motor que corría sobre nada sino el campo magnético de la Tierra. Funcionarios militares lo vieron funcionar. Reporteros escribieron sobre él. Y entonces fue quitado de él, fue silenciado, y el mundo olvidó. Pero el campo magnético de la Tierra no ha cambiado. La energía sigue ahí. La verdad sigue ahí. Y algún día, los supresores perderán su agarre — y el mundo finalmente será libre.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/technology/\",\"className\":\"category-badge\",\"children\":\"technology\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Motor sin Combustible de Lester Hendershot: Energía Libre Suprimida\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Lester Hendershot construyó un motor sin combustible presenciado por funcionarios militares. El dispositivo funcionó, Hendershot fue silenciado, y la energía libre fue suprimida de nuevo.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-12-27T10:00:00Z\",\"children\":\"27 de diciembre de 2025
