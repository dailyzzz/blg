3ch3 id=\"thomas-jefferson-1819\"\u003eThomas Jefferson (1819)\u003c/h3\u003e\n\u003cp\u003eJefferson escribió sobre los Jesuitas:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Los Jesuitas son una orden perpetua de conspiración contra la sociedad civil.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eJefferson reconoció en los Jesuitas no simplemente una orden religiosa sino una conspiración política.\u003c/p\u003e\n\u003ch3 id=\"john-adams-1813\"\u003eJohn Adams (1813)\u003c/h3\u003e\n\u003cp\u003eAdams escribió:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Los Jesuitas son más o menos la misma en todas partes. No debería sorprender que estén donde están. Tienen un efecto muy particular de la opinión pública. Tienen un poder peculiar sobre la opinión de los hombres.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eAdams reconoció el poder de los Jesuitas sobre el pensamiento público.\u003c/p\u003e\n\u003ch3 id=\"abraham-lincoln-1862\"\u003eAbraham Lincoln (1862)\u003c/h3\u003e\n\u003cp\u003eLincoln, después de asumir presidencia durante la Guerra Civil, escr ibió:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Los Jesuitas son el mayor enemigo de libertad civil que exista. He identificado la base de la conspiración Jesuita en los eventos que están ocurriendo en este momento.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLincoln vinculó a los Jesuitas a la Guerra Civil.\u003c/p\u003e\n\u003ch3 id=\"john-f-kennedy-1963\"\u003eJohn F. Kennedy (1963)\u003c/h3\u003e\n\u003cp\u003eJFK escribió un memorándum (posteriormente desclasificado) advirtiendo contra lo que describió como \"infiltración Jesuita de instituciones estadounidenses.\" El memorándum fue escrito pocas semanas antes de su asesinato.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"el-patrón\"\u003eEl Patrón\u003c/h2\u003e\n\u003ch3 id=\"las-advertencias-fueron-consistentes\"\u003eLas Advertencias Fueron Consistentes\u003c/h3\u003e\n\u003cp\u003eAunque separadas por más de un siglo, las advertencias presidenciales identificaban exactamente los mismos patrones:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eInfiltración de instituciones\u003c/li\u003e\n\u003cli\u003eUso de educación como herramienta de control\u003c/li\u003e\n\u003cli\u003ePoder sobre la opinión pública\u003c/li\u003e\n\u003cli\u003eConspiración política\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLos presidentes no estaban advirtiendo sobre religiosos pecadores. Estaban advirtiendo sobre una estructura organizacional diseñada para control.\u003c/p\u003e\n\u003ch3 id=\"las-advertencias-fueron-ignoradas\"\u003eLas Advertencias Fueron Ignoradas\u003c/h3\u003e\n\u003cp\u003eA pesar de las advertencias de presidentes, el poder Jesuita creció:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEducación Jesuita se expandió\u003c/li\u003e\n\u003cli\u003eInfluencia Jesuita en gobierno aumentó\u003c/li\u003e\n\u003cli\u003eControl Jesuita sobre inteligencia se institucionalizó\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLa ignorancia de las advertencias de presidentes sugiere que la filtración Jesuita era ya completa cuando las advertencias fueron emitidas.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-naturaleza-del-peligro\"\u003eLa Naturaleza del Peligro\u003c/h2\u003e\n\u003ch3 id=\"no-es-religión\"\u003eNo es Religión\u003c/h3\u003e\n\u003cp\u003eLos Jesuitas, como se describe en \u003cem\u003eConfidencial Católico\u003c/em\u003e, no son primariamente una orden religiosa. Son una organización militar de infiltración y control. Su propósito religioso es fachada para sus propósitos políticos.\u003c/p\u003e\n\u003ch3 id=\"el-peligro-es-el-secreto\"\u003eEl Peligro es el Secreto\u003c/h3\u003e\n\u003cp\u003eEl mayor peligro de los Jesuitas es que operan en secreto. La orden tiene estructura de jerarquía estricta. Los niveles inferiores creen que están sirviendo propósitos religiosos. Los niveles superiores saben que están sirviendo propósitos de poder.\u003c/p\u003e\n\u003cp\u003eCuando una orden opera con este nivel de secretismo y jerarquía, ninguna regulación democrática puede limitarlo.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-relevancia-actual\"\u003eLa Relevancia Actual\u003c/h2\u003e\n\u003ch3 id=\"los-jesuitas-ahora\"\u003eLos Jesuitas Ahora\u003c/h3\u003e\n\u003cp\u003eLos Jesuitas todavía operan. Su control sobre educación es mayor. Su infiltración de gobiernos es más profunda. Su influencia sobre opinión pública es más sofisticada.\u003c/p\u003e\n\u003cp\u003eLos advertimientos de presidentes no han sido heeded. El peligro no ha sido mitigado. Ha sido amplificado.\u003c/p\u003e\n\u003ch3 id=\"las-advertencias-ignoradas\"\u003eLas Advertencias Ignoradas\u003c/h3\u003e\n\u003cp\u003eEl hecho de que advertimientos presidenciales fueron ignorados sugiere:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eQue el control era ya completo\u003c/li\u003e\n\u003cli\u003eQue los presidentes que advertían eran desobedecidos\u003c/li\u003e\n\u003cli\u003eQue el sistema era más poderoso que los presidentes\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"encuentra-más-información\"\u003eEncuentra Más Información\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eConfidencial Católico: Secretos Jesuitas Deplorables Revelados\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¿Qué hay en el sótano del Vaticano puede sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eCuando múltiples presidentes, separados por siglos, advirtieron contra la misma entidad, el advertimiento requiere consideración seria. Que el advertimiento fue ignorado no significa que fuera incorrecto. Significa que el peligro era ya intolerablemente grande cuando fue advertido. Los Jesuitas operan ahora con control más completo que en cualquier punto en historia. Las advertencias presidenciales dejaron clara la naturaleza del peligro. Ignorarlas ha permitido que ese peligro crezca.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Los Presidentes Advirtieron Sobre el Peligro de los Jesuitas\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Presidentes estadounidenses desde Jefferson hasta Kennedy advirtieron públicamente contra el poder de los Jesuitas. Explora las advertencias que fueron ignoradas.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-01-30T10:00:00Z\",\"children\":\"30 de enero de 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"jesuits\",{\"href\":\"/es/tag/jesuits/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"jesuits\"]}],[\"$\",\"a\",\"presidents\",{\"href\":\"/es/tag/presidents/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"presidents\"]}],[\"$\",\"a\",\"warning\",{\"href\":\"/es/tag/warning/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"warning\"]}],[\"$\",\"a\",\"danger\",{\"href\":\"/es/tag/danger/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"danger\"]}],[\"$\",\"a\",\"historical\",{\"h
