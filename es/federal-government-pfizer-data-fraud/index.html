03cp\u003eIn ancient Israel, merchants were commanded to use honest weights and measures. A false balance — a scale deliberately calibrated to deceive — was not merely fraud. It was an abomination, a word reserved in Scripture for acts that violate the fundamental moral order God established for human society. The merchant who sold a pound of grain using a rigged scale did not merely cheat his customer — he corrupted the system of trust upon which all commerce depends.\u003c/p\u003e\n\u003cp\u003eAs the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers' Lies\u003c/a\u003e reveals, the most devastating deceptions are not those told by strangers in the night but by authorities in the light of day — institutions clothed in the language of science, credentialed by government, and trusted by a population that has been trained since childhood to defer to expert consensus.\u003c/p\u003e\n\u003cp\u003ePfizer's clinical trial data was the scale upon which the health of billions was weighed. The federal government held that scale. And the evidence now emerging suggests that both the company and the government knew the scale was false.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-pfizer-clinical-trial-what-was-promised\"\u003eThe Pfizer Clinical Trial: What Was Promised\u003c/h2\u003e\n\u003cp\u003ePfizer's COVID-19 vaccine clinical trial — formally designated C4591001 — was presented to the American people as the gold standard of pharmaceutical science. The trial enrolled approximately 44,000 participants, randomized into vaccine and placebo groups, and was designed to measure the vaccine's efficacy and safety over a two-year period extending to 2023.\u003c/p\u003e\n\u003cp\u003eThe results announced in November 2020 claimed 95% efficacy in preventing symptomatic COVID-19 infection. These numbers were broadcast across every media platform on Earth. They formed the basis for the FDA's Emergency Use Authorization granted on December 11, 2020. They were cited by employers, universities, and government agencies as justification for mandating the injection. They were the foundation upon which the entire global vaccination campaign was built.\u003c/p\u003e\n\u003cp\u003eBut the trial was not what it appeared to be.\u003c/p\u003e\n\u003ch3 id=\"the-ventavia-whistleblower\"\u003eThe Ventavia Whistleblower\u003c/h3\u003e\n\u003cp\u003eIn September 2021, Brook Jackson, a regional director at Ventavia Research Group — one of Pfizer's clinical trial subcontractors — filed a complaint with the FDA alleging systemic data integrity problems at three Ventavia trial sites in Texas. Jackson's allegations included:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFalsification of data on case report forms\u003c/li\u003e\n\u003cli\u003eFailure to follow up on adverse events reported by trial participants\u003c/li\u003e\n\u003cli\u003eUnblinding of trial participants (revealing who received the vaccine vs. placebo)\u003c/li\u003e\n\u003cli\u003eInadequate training of vaccine administrators\u003c/li\u003e\n\u003cli\u003eFailure to maintain proper cold chain storage for the vaccine\u003c/li\u003e\n\u003cli\u003eRetaliation against employees who raised concerns about data quality\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJackson was fired from Ventavia within hours of raising these concerns internally. She subsequently filed a False Claims Act lawsuit against Pfizer in January 2021.\u003c/p\u003e\n\u003cp\u003eThe FDA's response to Jackson's complaint was documented through FOIA requests: the agency did not inspect the Ventavia trial sites for months after receiving her report, and when an inspection was eventually conducted, it was limited in scope and resulted in no enforcement action. The FDA concluded that the data integrity problems at Ventavia did not affect the overall trial results — a conclusion reached without conducting the comprehensive audit that would be necessary to make such a determination.\u003c/p\u003e\n\u003cp\u003eKaren Kingston has analyzed the Ventavia situation extensively in The Kingston Report (karenkingston.substack.com), noting that the FDA's failure to act on Jackson's complaint was not merely negligent — it was structurally necessary. \"If the FDA had conducted a proper investigation and found that Ventavia's data was compromised, it would have been forced to revoke the EUA,\" Kingston has written. \"The entire global vaccination campaign would have been called into question. The political, economic, and institutional consequences would have been catastrophic. The FDA chose to preserve the narrative rather than protect the public.\"\u003c/p\u003e\n\u003ch3 id=\"the-elimination-of-the-control-group\"\u003eThe Elimination of the Control Group\u003c/h3\u003e\n\u003cp\u003ePerhaps the most consequential decision in the Pfizer trial was the elimination of the placebo control group. Within months of the EUA being granted, Pfizer unblinded the trial and offered the vaccine to participants who had received the placebo. Approximately 93% of placebo recipients crossed over to the vaccine arm.\u003c/p\u003e\n\u003cp\u003eThis decision destroyed the possibility of long-term comparative safety data. Without an intact control group, it became impossible to determine whether health outcomes in vaccinated participants — including deaths, serious adverse events, and chronic conditions — occurred at rates higher than would be expected in an unvaccinated population.\u003c/p\u003e\n\u003cp\u003eThe elimination of the control group was not a scientific decision. It was a political one. Pfizer argued that it would be \"unethical\" to withhold the vaccine from placebo participants once the EUA was granted. But the trial was designed to run until 2023 precisely because long-term safety data requires long-term observation. By eliminating the control group less than six months into a two-year trial, Pfizer ensured that the long-term safety questions could never be answered using trial data.\u003c/p\u003e\n\u003cp\u003eKingston has noted: \"The destruction of the control group was deliberate. It was the single most important decision Pfizer made after the EUA, because it guaranteed that no one could ever use the trial data to prove the vaccines caused harm. Without a control group, there is no comparison. Without comparison, there is no proof. Without proof, there is no liability.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-federal-governments-role\"\u003eThe Federal Government's Role\u003c/h2\u003e\n\u003cp\u003eThe federal government did not merely fail to prevent Pfizer's data irregularities — evidence suggests it actively facilitated them.\u003c/p\u003e\n\u003ch3 id=\"operation-warp-speed\"\u003eOperation Warp Speed\u003c/h3\u003e\n\u003cp\u003eThe COVID-19 vaccines were developed under Operation Warp Speed (OWS), a public-private partnership between the U.S. Department of Defense, HHS, and pharmaceutical companies. Under OWS, the federal government committed over $18 billion in taxpayer money to vaccine development, manufacturing, and distribution before any safety data existed.\u003c/p\u003e\n\u003cp\u003eThe contracts governing this relationship were executed under Other Transaction Authority (OTA) — military procurement agreements that exempt the products from standard pharmaceutical regulations, including the Federal Acquisition Regulation and its quality assurance requirements. Kingston has documented that under OTA contracts, the COVID-19 injections were classified as \"prototype\" countermeasures, not pharmaceutical products — a legal distinction that removed them from the FDA's standard regulatory oversight.\u003c/p\u003e\n\u003cp\u003e\"The federal government did not purchase vaccines from Pfizer,\" Kingston has stated. \"It contracted for the development and delivery of military countermeasures under defense procurement authority. The FDA's role was ceremonial — the products were never subject to standard pharmaceutical regulation because they were never legally classified as pharmaceutical products.\"\u003c/p\u003e\n\u003ch3 id=\"the-75-year-foia-delay\"\u003eThe 75-Year FOIA Delay\u003c/h3\u003e\n\u003cp\u003eWhen a group of scientists and medical professionals (Public Health and Medical Professionals for Transparency) filed a FOIA request for the complete Pfizer clinical trial data that the FDA used to authorize the vaccine, the FDA asked a federal court for permission to release the documents over a 75-year period — approximately 500 pages per month.\u003c/p\u003e\n\u003cp\u003eThe request was extraordinary. The FDA was asking to keep the data upon which the most consequential public health decision in modern history was based hidden from the public until the year 2096. Every person who received the vaccine, every person who administered it, every person who mandated it — all would be dead before the full data was available.\u003c/p\u003e\n\u003cp\u003eA federal judge rejected the FDA's request and ordered the agency to produce the documents on an accelerated timeline. The documents that have been released since then have revealed previously undisclosed adverse events, discrepancies between the data Pfizer presented publicly and the data it submitted to regulators, and evidence that both Pfizer and the FDA were aware of safety signals that were not communicated to the public.\u003c/p\u003e\n\u003ch3 id=\"the-suppression-of-early-treatment\"\u003eThe Suppression of Early Treatment\u003c/h3\u003e\n\u003cp\u003eThe federal government's assistance to Pfizer extended beyond data management to market protection. Under FDA regulations, an Emergency Use Authorization can only be granted when \"there are no adequate, approved, and available alternatives.\" If an approved treatment for COVID-19 existed, the EUA for the vaccines could not have been issued.\u003c/p\u003e\n\u003cp\u003eThis created a direct institutional incentive to suppress evidence that early treatments — including ivermectin, hydroxychloroquine, and other repurposed drugs — were effective against COVID-19. The FDA issued public warnings against ivermectin use, characterizing it as a veterinary drug despite decades of human use and a Nobel Prize in Medicine for its developers. The agency posted a now-infamous social media message: \"You are not a horse. You are not a cow. Seriously, y'all. Stop it.\"\u003c/p\u003e\n\u003cp\u003ePhysicians who prescribed early treatments were investigated by state medical boards, stripped of their licenses, and subjected to professional sanctions. Pharmacies refused to fill prescriptions. Hospitals prohibited the administration of treatments that attending physicians had ordered.\u003c/p\u003e\n\u003cp\u003eKingston has documented that this suppression was not incidental — it was essential to the legal framework. \"The EUA required that no adequate alternative existed. The government ensured that no adequate alternative existed — not by proving these treatments didn't work, but by preventing doctors from using them and preventing researchers from studying them. The absence of approved alternatives was manufactured, not discovered.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-criminal-question\"\u003eThe Criminal Question\u003c/h2\u003e\n\u003cp\u003eThe title of this article asks whether the government's assistance constitutes a crime. The answer depends on the legal framework applied.\u003c/p\u003e\n\u003cp\u003eUnder the False Claims Act (31 U.S.C. Section 3729-3733), any person who knowingly submits false claims to the federal government — or causes false claims to be submitted — is liable for treble damages and penalties. Brook Jackson's lawsuit alleges that Pfizer submitted false clinical trial data to the FDA in connection with contracts funded by taxpayer money, constituting a false claim.\u003c/p\u003e\n\u003cp\u003eUnder federal fraud statutes (18 U.S.C. Section 1001), making materially false statements to the federal government is a criminal offense carrying up to five years in prison. If Pfizer's clinical trial data contained knowing falsehoods, and if those falsehoods were material to the FDA's authorization decision, the submission of that data constituted a federal crime.\u003c/p\u003e\n\u003cp\u003eBut the more difficult legal question involves the government's own conduct. If federal officials knew about data irregularities and chose not to act — or actively suppressed investigation of those irregularities — their conduct potentially constitutes conspiracy to commit fraud (18 U.S.C. Section 371), obstruction of justice (18 U.S.C. Section 1505), and misprision of felony (18 U.S.C. Section 4).\u003c/p\u003e\n\u003cp\u003eThe ZZZ Daily track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e exposes the architecture of institutional corruption — a system in which every participant is compromised, every institution is captured, and accountability is structurally impossible because the entities responsible for enforcement are themselves complicit.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prophetic-lens\"\u003eThe Prophetic Lens\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Shall the throne of iniquity have fellowship with thee, which frameth mischief by a law?\" — Psalm 94:20\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Psalmist asks whether God will align Himself with rulers who craft evil through legislation — who use the machinery of law to commit injustice. The EUA was such a law. The PREP Act was such a law. The OTA procurement framework was such a law. Each was crafted in advance, positioned in the legal code, and activated at the appointed moment to enable the deployment of products that had not been proven safe, to populations that had not been warned of the risks, under conditions that made accountability impossible.\u003c/p\u003e\n\u003cp\u003eThis is not governance. This is the Beast System described in Revelation 13 — a system in which authority is exercised not for the protection of the governed but for the consolidation of power by the governing. The government did not assist Pfizer in data fraud because it was deceived. It assisted because it was invested — financially, politically, and structurally — in the outcome.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eBrook Jackson v. Ventavia Research Group et al. — U.S. District Court, Eastern District of Texas\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Karen Kingston's analysis of OTA contracts, EUA legal framework, clinical trial data integrity, and government complicity\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePublic Health and Medical Professionals for Transparency v. FDA — FOIA litigation records\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePfizer C4591001 Clinical Trial Protocol and Amendments — FDA.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFDA Emergency Use Authorization Decision Memoranda — FDA.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePsalm 94:20, Proverbs 11:1 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e — The architecture of institutional corruption where every participant is compromised\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — Synchronized institutional obedience to a corrupted system\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/165-Event_201_Came_True.mp4\"\u003eEvent 201 Came True\u003c/a\u003e — The pandemic simulation that became reality\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFrom the Confliction album (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers' Lies\u003c/a\u003e — Authorities in the light of day telling lies that shape the fate of nations\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e — Orchestrated deception planned and executed with precision\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pfizer-case-government-not-interested/?lang=es\"\u003eCourt Filing in Pfizer Case: Government NOT Interested in Justice\u003c/a\u003e — The legal system's refusal to hold Pfizer accountable\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/florida-criminal-charges-pfizer/?lang=es\"\u003eHow Florida Residents Can Bring Criminal Charges Against Pfizer\u003c/a\u003e — State-level legal strategies for accountability\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/government-fraud-biopharma/?lang=es\"\u003eIs it Legal for the US Government to Commit Fraud with BioPharma\u003c/a\u003e — The broader legal questions surrounding government-pharma collusion\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/fda-ended-emergency-use-authorizations/?lang=es\"\u003eFDA Just Ended Emergency Use Authorizations for COVID-19\u003c/a\u003e — The end of the legal instrument that enabled the fraud\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eA false balance is an abomination. The scale upon which the health of billions was weighed — the Pfizer clinical trial — was held by a government that knew the weights were tampered. The merchants who sold the product and the regulators who certified it operated not in opposition but in partnership, united by financial interest, political necessity, and legal architecture designed from the foundation to prevent accountability. \"He that justifieth the wicked, and he that condemneth the just, even they both are abomination to the LORD\" (Proverbs 17:15). The question is not whether it was a crime. The question is whether there remains any institution with the authority and the will to call it one.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Is It a Crime? Fede
