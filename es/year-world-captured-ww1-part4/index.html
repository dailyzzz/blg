mío.\"\u003c/em\u003e — Oseas 4:6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eEl pueblo de Dios es destruido no por la fuerza sino por la ignorancia — y la mayor ignorancia es la ignorancia deliberadamente impuesta. El año 1913 fue el año más consecuente en la historia moderna, pero la mayoría de los estadounidenses no saben nada acerca de lo que sucedió ese año más allá de la inauguración de Woodrow Wilson. En 1913, la infraestructura financiera, legal, y política para el control global permanente fue establecida en una serie de movimientos cuidadosamente coordinados que transformó los Estados Unidos de una república soberana en una colonia de deuda poseída y operada por el cártel bancario controlado por los jesuitas.\u003c/p\u003e\n\u003cp\u003eLa Sociedad de Jesús, la orden militar de Ignacio de Loyola, había estado maniobra hacia este momento durante más de un siglo. La jactancia de Tamburini de gobernar el mundo desde su cámara se convirtió en realidad operacional en 1913. Los jesuitas no necesitaban ejércitos para capturar el mundo — necesitaban tres documentos: la Enmienda 16, la Enmienda 17, y la Ley de la Reserva Federal. Con estos tres instrumentos, capturaron la nación más poderosa del mundo y, a través de ella, el mundo.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/07-The_Serpents_Curse.mp4\"\u003eLa Maldición de la Serpiente\u003c/a\u003e habla de esta maldición antigua de esclavitud — las cadenas forjadas no en hierro sino en papel, en legislación, en la letra pequeña de los instrumentos financieros. Y \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/31-Satans_Hosts.mp4\"\u003eLos Anfitriones de Satanás\u003c/a\u003e identifica los servidores dispuestos que llevaron a cabo esta captura — los políticos, los banqueros, los abogados que vendieron su nación por treinta monedas de plata.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"las-tres-capturas-de-1913\"\u003eLas Tres Capturas de 1913\u003c/h2\u003e\n\u003ch3 id=\"la-enmienda-16-el-impuesto-a-la-renta\"\u003eLa Enmienda 16: El Impuesto a la Renta\u003c/h3\u003e\n\u003cp\u003eLa Enmienda 16 a la Constitución de los Estados Unidos, ratificada el 3 de febrero de 1913, le dio al Congreso el poder de recaudar un impuesto a la renta sin distribuirlo entre los estados. Este cambio aparentemente técnico tenía implicaciones revolucionarias: por primera vez, el gobierno federal podría llegar directamente a los bolsillos de cada ciudadano estadounidense y extraer una porción de su labor.\u003c/p\u003e\n\u003cp\u003eAntes de la Enmienda 16, el gobierno federal fue financiado principalmente por aranceles e impuestos especiales — impuestos sobre bienes, no sobre personas. El impuesto a la renta transformó la relación entre el ciudadano y el estado de una de obligación limitada a una de extracción ilimitada. No hay límite al impuesto a la renta; la tasa puede ser establecida a cualquier nivel que el Congreso elija. En teoría (y en práctica durante tiempos de guerra), el gobierno puede tomar el 90% o más de los ingresos de un ciudadano.\u003c/p\u003e\n\u003cp\u003eEl impuesto a la renta fue necesario para servir la deuda que la Reserva Federal crearía. Sin un mecanismo para gravar a los ciudadanos directamente, el gobierno no podría garantizar el reembolso de los bonos y notas emitidos por el sistema de la Reserva Federal. El impuesto a la renta no era una medida de ingresos — era un mecanismo de servicio de deuda, diseñado para asegurar que la élite bancaria siempre fuera reembolsada.\u003c/p\u003e\n\u003cp\u003eLa ratificación de la Enmienda 16 en sí misma está envuelta en controversia. La investigación del investigador legal William Benson, documentada en \u003cem\u003eThe Law That Never Was\u003c/em\u003e, presenta evidencia de que la enmienda nunca fue adecuadamente ratificada por el número requerido de estados. Si la investigación de Benson es correcta, todo el sistema de impuesto federal a la renta descansa sobre una base fraudulenta — lo cual sería completamente consistente con el modus operandi jesuita de construir poder sobre el engaño.\u003c/p\u003e\n\u003ch3 id=\"la-enmienda-17-la-captura-del-senado\"\u003eLa Enmienda 17: La Captura del Senado\u003c/h3\u003e\n\u003cp\u003eLa Enmienda 17, ratificada el 8 de abril de 1913, cambió el método de elegir Senadores de los Estados Unidos de ser nombrados por legislaturas estatales a ser elegidos directamente por votación popular. Este cambio fue presentado como una reforma democrática — dándole \"al pueblo\" una voz directa en la elección de sus senadores.\u003c/p\u003e\n\u003cp\u003eEn realidad, la Enmienda 17 destruyó la última salvaguardia estructural contra el exceso federal. Bajo la Constitución original, los senadores fueron elegidos por legislaturas estatales y sirvieron como representantes de gobiernos estatales en el sistema federal. Esto le dio a los estados un control directo sobre el poder federal: si el gobierno federal se excedía en sus límites, las legislaturas estatales podrían revocar o reemplazar a sus senadores.\u003c/p\u003e\n\u003cp\u003eLa elección directa cortó esta conexión. Los senadores ya no respondían a gobiernos estatales; respondían al electorado — lo cual significaba, en la práctica, que respondían a quienquiera que controlara los medios, la financiación de campañas, y la maquinaria de partido. ¿Y quién controló estos? Los mismos intereses bancarios y corporativos que controlaban la Reserva Federal.\u003c/p\u003e\n\u003cp\u003eLa Enmienda 17 así completó la centralización del poder en Washington mediante la remoción de la única representación directa de los estados en el gobierno federal. Combinada con el impuesto a la renta (que le dio al gobierno federal ingresos ilimitados) y la Reserva Federal (que le dio a la élite bancaria control sobre la oferta de dinero), la Enmienda 17 creó un sistema de gobierno en el cual las personas creían que eran libres mientras siendo, de hecho, sujetos de una oligarquía financiera.\u003c/p\u003e\n\u003ch3 id=\"la-ley-de-la-reserva-federal-la-captura-del-dinero\"\u003eLa Ley de la Reserva Federal: La Captura del Dinero\u003c/h3\u003e\n\u003cp\u003eEl 23 de diciembre de 1913, el Presidente Woodrow Wilson firmó la Ley de la Reserva Federal en la ley. Esta Ley creó el Sistema de la Reserva Federal — una red de doce bancos regionales controlados por una Junta de Gobernadores en Washington, que a su vez fue controlada por los intereses bancarios privados que poseían acciones en los bancos regionales.\u003c/p\u003e\n\u003cp\u003eLa Reserva Federal fue presentada como una institución pública diseñada para estabilizar el sistema bancario y prevenir pánicos financieros. En realidad, fue un cártel bancario privado que fue dado el poder de:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCrear dinero de la nada\u003c/strong\u003e a través del mecanismo de préstamos de reserva fraccionada\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEstablecer tasas de interés\u003c/strong\u003e que determinaron el costo del crédito en toda la economía\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eComprar bonos del gobierno\u003c/strong\u003e usando dinero recién creado, así prestando al gobierno con interés\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRegular el sistema bancario\u003c/strong\u003e — significando que los bancos se regulaban a sí mismos\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLa Ley de la Reserva Federal fue la piedra angular de un plan que había estado en desarrollo desde al menos el Pánico de 1907, que había sido deliberadamente ingenierizado por J.P. Morgan para crear demanda pública de un banco central. La Ley fue redactada en secreto en una reunión en Jekyll Island, Georgia, en noviembre de 1910 — una reunión asistida por representantes de los intereses bancarios Morgan, Rockefeller, y Rothschild.\u003c/p\u003e\n\u003cp\u003eLos Rothschild, como los agentes financieros de larga data del Vaticano, proporcionaron el vínculo entre la élite bancaria estadounidense y la estructura de poder jesuita. La Reserva Federal no era meramente una institución estadounidense; era un nodo en una red financiera global controlada desde el Vaticano a través de la dinastía bancaria Rothschild.\u003c/p\u003e\n\u003ch2 id=\"la-captura-completa\"\u003eLa Captura Completa\u003c/h2\u003e\n\u003ch3 id=\"el-arrepentimiento-de-wilson\"\u003eEl Arrepentimiento de Wilson\u003c/h3\u003e\n\u003cp\u003eWoodrow Wilson, quien firmó la Ley de la Reserva Federal y el impuesto a la renta en la ley, reportadamente expresó arrepentimiento tardiamente en su vida. Es ampliamente citado diciendo: \"Soy un hombre más desgraciado. He arruinado sin saberlo mi país.\" Mientras que la proveniencia exacta de esta cita es debatida, la correspondencia y los discursos de Wilson de sus años posteriores sí revelan una conciencia creciente de que había sido manipulado.\u003c/p\u003e\n\u003cp\u003eWilson fue un producto del sistema educativo jesuita — fue educado en Princeton, que, aunque de origen presbiteriano, había sido profundamente infiltrado por académicos conectados con los jesuitas para principios del siglo 20. Su asesor, el Coronel Edward Mandell House, fue un operativo conectado con los jesuitas que sirvió como vínculo de Wilson con la red bancaria internacional. La novela de House \u003cem\u003ePhilip Dru: Administrator\u003c/em\u003e (publicada en 1912, el año antes de que Wilson tomara cargo) describió una América futura gobernada por un dictador benevolente que establece un banco central y un impuesto a la renta graduado — precisamente el programa que Wilson implementaría.\u003c/p\u003e\n\u003ch3 id=\"la-máquina-de-guerra-activada\"\u003eLa Máquina de Guerra Activada\u003c/h3\u003e\n\u003cp\u003eCon el impuesto a la renta proporcionando ingresos ilimitados, la Reserva Federal proporcionando crédito ilimitado, y el Senado bajo el control de los intereses bancarios, los Estados Unidos estaban listos para la guerra. La arquitectura financiera creada en 1913 fue activada en 1917, cuando América entró en la Primera Guerra Mundial y el programa Liberty Bond comenzó a extraer riqueza de la población estadounidense a escala industrial.\u003c/p\u003e\n\u003cp\u003eLa secuencia es inconfundible:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e1913\u003c/strong\u003e: Crear la infraestructura financiera (Reserva Federal, impuesto a la renta)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1914-1916\u003c/strong\u003e: Usar la infraestructura para financiar los Aliados a través de préstamos\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1917\u003c/strong\u003e: Entrar en la guerra oficialmente y activar el programa Liberty Bond\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1918-1919\u003c/strong\u003e: Ganar la guerra, remodelar el mapa mundial, y cobrar las deudas\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eCada paso fue planeado, coordinado, y ejecutado por la red bancaria controlada por los jesuitas. La guerra no fue una respuesta al asesinato de un archiduque; fue el propósito para el cual la infraestructura financiera de 1913 había sido creada.\u003c/p\u003e\n\u003cp\u003eLa pista \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e revela cómo el marco constitucional fue sistemáticamente desmantelado para permitir esta captura, y \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e traza las conexiones de sociedades secretas que dieron forma al sistema estadounidense desde su inicio.\u003c/p\u003e\n\u003cp\u003eEl testimonio de la experiencia cercana a la muerte de Howard Pittman describe un gobierno jerárquico demoníaco operando desde el segundo cielo — un gobierno que refleja las estructuras terrenales de control establecidas en 1913. La Reserva Federal es el brazo financiero de esta jerarquía demoníaca; el impuesto a la renta es su mecanismo de ejecución; y el Senado capturado es su cuerpo legislativo. Como Pittman fue dicho: \"Me llamas Señor pero nunca me hiciste Señor.\" América se llamó a sí misma libre en 1913 mientras se sometía a la esclavitud financiera permanente. Mira: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eTestimonio de la Experiencia Cercana a la Muerte de Howard Pittman\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eMira también \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e y \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e para documentación integral.\u003c/p\u003e\n\u003ch2 id=\"aprende-más\"\u003eAprende Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¿Qué Hay En El Sótano del Vaticano Puede Sorprenderte?\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"escúchalo-mientras-lees\"\u003eEscúchalo Mientras Lees\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/97-Income_Tax_Is_Slavery.mp4\"\u003eEl Impuesto a la Renta Es Esclavitud\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/145-Constitution_Constitutor_Trap.mp4\"\u003eConsti ue el pueblo de Dios es destruido por falta de conocimiento. En 1913, el conocimiento fue deliberadamente retenido — y la destrucción comenzó.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/history/\",\"className\":\"category-badge\",\"children\":\"history\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"EL AÑO QUE EL MUNDO FUE CAPTURADO: Parte 4 de la Primera Guerra Mundial\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"1913 fue el año en que el mundo fue capturado. La Reserva Federal, el impuesto a la renta, y las maquinaciones jesuitas prepararon el escenario para la Primera Guerra Mundial y el control global permanente.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-08-31T10:00:00Z\",\"children\":\"31 de agosto de 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"1913\",{\"href\":\"/es/tag/1913/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"1913\"]}],[\"$\",\"a\",\"reserva federal\",{\"href\":\"/es/tag/reserva federal/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"reserva federal\"]}],[\"$\",\"a\",\"impuesto a la renta\",{\"href\":\"/es/tag/impuesto a la renta/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"impuesto a la renta\"]}],[\"$\",\"a\",\
