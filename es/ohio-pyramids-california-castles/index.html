of the darkness of this world, against spiritual wickedness in high places.\"\u003c/em\u003e — Ephesians 6:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Bible makes it clear that a spiritual war rages behind the scenes of human history. What we see in the physical realm — the buried structures, the erased civilizations, the rewritten textbooks — is merely the visible residue of that invisible conflict. The rulers of darkness spoken of by the Apostle Paul have always operated through earthly proxies: secret societies, corrupt religious institutions, and shadowy brotherhoods whose goal is nothing less than total control over what humanity is allowed to know about its own past.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, founded by Ignatius Loyola as a military organization masquerading as a religious order, have served as the Vatican's intelligence arm for centuries. Napoleon himself warned: \u003cem\u003e\"The Jesuits are a military organization, not a religious order... the aim is power.\"\u003c/em\u003e It was Jesuit missionaries who accompanied the earliest European expeditions into the American interior. They mapped the land, catalogued its wonders, and then ensured that certain discoveries would never reach the public. As the track \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e reminds us, the greatest trick of the adversary is convincing the world he does not exist — and that the civilization before us never existed either.\u003c/p\u003e\n\u003cp\u003eThe Catholic Church, operating under Satanic influence at its highest levels, has systematically destroyed, buried, and reclassified evidence of a previous world order that would shatter the narrative upon which its power depends. From the suppression of the Gnostic texts to the burning of the Library of Alexandria, the pattern is always the same: erase the past to control the future. The structures buried beneath Ohio and California are not anomalies — they are evidence of a grand deception orchestrated by the same forces that have controlled the flow of information for centuries. As \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e lays bare, the web of deception is far older and far deeper than most people dare to imagine.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-ohio-pyramids-americas-forbidden-monuments\"\u003eThe Ohio Pyramids: America's Forbidden Monuments\u003c/h2\u003e\n\u003ch3 id=\"the-newark-earthworks-and-beyond\"\u003eThe Newark Earthworks and Beyond\u003c/h3\u003e\n\u003cp\u003eIn the rolling hills of central Ohio lies one of the most significant — and most deliberately ignored — archaeological complexes in the Western Hemisphere. The Newark Earthworks, spanning over four square miles, feature geometric precision that rivals the Great Pyramid of Giza. Perfect circles, squares, and octagonal enclosures were constructed with mathematical relationships that modern surveyors struggle to replicate. Yet mainstream academia dismisses these as simple \"burial mounds\" built by primitive hunter-gatherers.\u003c/p\u003e\n\u003cp\u003eThe Great Circle Earthwork in Newark measures exactly 1,200 feet in diameter with walls 8 to 14 feet high. The Octagon Earthwork connects to a perfect circle and aligns with the 18.6-year lunar cycle with such precision that archaeoastronomer Ray Hively and philosopher Robert Horn of Earlham College confirmed the alignments in the 1980s — only to see their findings buried in obscure academic journals, never reaching public consciousness.\u003c/p\u003e\n\u003cp\u003eBut the earthworks at Newark are only the beginning. Throughout Ohio, pyramidal mounds dot the landscape in patterns that suggest a unified civilization of enormous sophistication. The Miamisburg Mound, standing 65 feet tall, is the largest conical mound in Ohio. The Serpent Mound in Adams County stretches over 1,300 feet and aligns with astronomical events that presuppose advanced knowledge of celestial mechanics. These are not the works of scattered tribes; they are the remnants of an organized civilization that the establishment has worked tirelessly to erase.\u003c/p\u003e\n\u003ch3 id=\"the-smithsonian-cover-up\"\u003eThe Smithsonian Cover-Up\u003c/h3\u003e\n\u003cp\u003eThe Smithsonian Institution has been implicated repeatedly in the destruction and suppression of giant skeletal remains and advanced artifacts found in and around Ohio's mound complexes. In the 19th century, newspapers across the Midwest reported the discovery of giant human skeletons — some exceeding seven feet, others reportedly reaching nine feet or more — inside these mounds. The Smithsonian collected many of these finds. They were never seen again.\u003c/p\u003e\n\u003cp\u003eIn 2014, a satirical article about the Smithsonian admitting to destroying giant skeletons went viral — but the underlying pattern is well-documented. The Powell Doctrine, named after John Wesley Powell (director of the Bureau of Ethnology under the Smithsonian), explicitly sought to minimize the achievements of pre-Columbian civilizations in North America. The goal was clear: if the American continent could be presented as a virgin wilderness before European contact, then the narrative of \"discovery\" and \"manifest destiny\" would remain intact.\u003c/p\u003e\n\u003cp\u003eThis is not merely academic politics. The Jesuits, who held enormous influence over the early American scientific establishment through Georgetown University and their network of Catholic institutions, had a vested interest in ensuring that no pre-Columbian civilization could challenge the Church's narrative of world history. The idea that an advanced civilization existed in North America — potentially one with knowledge of astronomy, engineering, and mathematics that rivaled or surpassed medieval Europe — was a direct threat to the Jesuit-controlled historical timeline.\u003c/p\u003e\n\u003ch3 id=\"pyramid-structures-in-plain-sight\"\u003ePyramid Structures in Plain Sight\u003c/h3\u003e\n\u003cp\u003eThe Cahokia Mounds in Illinois (just across the Ohio River cultural sphere) feature Monks Mound, a structure covering more ground area than the Great Pyramid of Giza. The name itself is telling — \"Monks Mound\" was named for the Trappist monks who farmed its terraces in the early 1800s. But who built it? The official narrative claims the \"Mississippian culture\" constructed it between 900 and 1100 AD, but the engineering required — including sophisticated drainage systems and carefully selected clay layers — suggests a far older and more advanced origin.\u003c/p\u003e\n\u003cp\u003eThroughout southern Ohio, truncated pyramids and platform mounds form a network that, when mapped, reveals geometric relationships spanning hundreds of miles. This is not the work of isolated communities; it is the infrastructure of a civilization. The fact that this civilization has been written out of history is not an accident. It is a deliberate act of suppression by the same forces that have controlled the narrative for centuries.\u003c/p\u003e\n\u003cp\u003eAs the track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/121-The_Mud_Flood_Cover_Up.mp4\"\u003eThe Mud Flood Cover Up\u003c/a\u003e details, the erasure of previous civilizations is a recurring theme in human history — one that always benefits the same shadowy controllers.\u003c/p\u003e\n\u003ch2 id=\"californias-buried-castles-underground-secrets-of-the-west-coast\"\u003eCalifornia's Buried Castles: Underground Secrets of the West Coast\u003c/h2\u003e\n\u003ch3 id=\"the-subterranean-anomalies-of-san-francisco\"\u003eThe Subterranean Anomalies of San Francisco\u003c/h3\u003e\n\u003cp\u003eSan Francisco is built on secrets — literally. Beneath the streets of the modern city lie structures that should not exist according to the official timeline. During construction projects throughout the 20th and 21st centuries, workers have repeatedly uncovered brick archways, elaborate tunnel systems, and architectural remnants that predate the supposed founding of the city.\u003c/p\u003e\n\u003cp\u003eThe official narrative tells us that San Francisco was a small settlement of a few hundred people before the Gold Rush of 1849. Yet the infrastructure found beneath the city tells a very different story. Multi-story brick structures, sophisticated drainage systems, and ornate architectural details have been found buried 10 to 20 feet below the current street level. These are not the simple structures of a frontier settlement; they are the remnants of an advanced urban center.\u003c/p\u003e\n\u003cp\u003eThe 1906 earthquake and subsequent fires are often cited as the explanation for San Francisco's buried architecture. But the depth at which these structures are found, and the manner in which they are buried — uniformly covered in a layer of clay-like sediment — suggests a different cause. This pattern is consistent with the mud flood hypothesis: the theory that a catastrophic event (or series of events) in the relatively recent past buried entire cities under layers of mud and sediment.\u003c/p\u003e\n\u003ch3 id=\"sacramentos-first-floors-become-basements\"\u003eSacramento's First Floors Become Basements\u003c/h3\u003e\n\u003cp\u003eSacramento, California, provides perhaps the clearest evidence of buried architecture in the American West. In the 1860s and 1870s, the city undertook a massive project to raise its street level by 10 to 15 feet. The official explanation is flood control — the city's low-lying position made it vulnerable to seasonal flooding from the Sacramento River. But the scale and sophistication of the \"raising\" project raises profound questions.\u003c/p\u003e\n\u003cp\u003eEntire city blocks were lifted or, more often, simply buried. First-floor shops and residences became basements overnight. New sidewalks were built at the raised street level, and the old ground floors were simply sealed off. Today, you can tour the Sacramento Underground — a network of buried sidewalks and storefronts that once served as the city's main commercial district.\u003c/p\u003e\n\u003cp\u003eThe official story frames this as a practical response to flooding. But the same pattern — cities with buried first floors, streets raised by 10 to 20 feet, sophisticated architecture found below the current ground level — is found in cities across the world, from Edinburgh to Istanbul to Portland, Oregon. This is not a local flood-control measure; it is evidence of a global event that the powers that be have worked tirelessly to conceal.\u003c/p\u003e\n\u003ch3 id=\"the-castles-of-the-california-coast\"\u003eThe Castles of the California Coast\u003c/h3\u003e\n\u003cp\u003eAlong the California coast, from San Diego to Humboldt County, explorers and researchers have documented structures that defy the official timeline. Elaborate stone foundations, carved granite blocks, and architectural remnants that resemble European castle construction have been found in remote coastal areas — places where, according to mainstream history, only indigenous peoples lived before the arrival of Spanish missionaries in the 18th century.\u003c/p\u003e\n\u003cp\u003eThe Jesuit missions of California, traditionally presented as humble religious outposts, may in fact have been built atop (and from the ruins of) a far older civilization. The missions' sophisticated stone construction, their strategic placement along the coast, and their unusually advanced water systems all suggest that the Jesuits did not build from scratch but rather repurposed existing infrastructure.\u003c/p\u003e\n\u003cp\u003eThis would not be without precedent. Throughout Central and South America, Jesuit missions were built directly on top of pre-existing structures. The Jesuits' standard operating procedure was to appropriate the architecture, knowledge, and resources of the civilizations they encountered — and then to erase those civilizations from the historical record. As \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e reminds us, the infiltrator does not announce himself; he simply rewrites the story and claims the credit.\u003c/p\u003e\n\u003ch2 id=\"the-mud-flood-connection\"\u003eThe Mud Flood Connection\u003c/h2\u003e\n\u003ch3 id=\"a-global-pattern-of-burial\"\u003eA Global Pattern of Burial\u003c/h3\u003e\n\u003cp\u003eThe buried structures of Ohio and California are not isolated phenomena. They are part of a global pattern that researchers have been piecing together for over a decade. From the buried first floors of European cities to the half-submerged cathedrals of Russia, from the inexplicable depth of Roman ruins to the underground cities of Turkey, the evidence points to a catastrophic event — or series of events — that buried a previous civilization beneath layers of mud and sediment.\u003c/p\u003e\n\u003cp\u003eThe term \"mud flood\" has become the shorthand for this hypothesis, but the reality may be far more complex. The burial pattern is consistent across continents, suggesting a global cause rather than local flooding. Some researchers point to a pole shift; others suggest a massive solar event or a deliberate act of destruction. Whatever the cause, the cover-up is unmistakable.\u003c/p\u003e\n\u003cp\u003eThe timeline manipulation required to conceal this event is staggering. It would require the rewriting of centuries of history, the destruction of records, and the systematic suppression of archaeological evidence. This is precisely the kind of operation that the Jesuit order was designed to execute. With their network spanning every continent, their presence in every major university, and their influence over the Catholic Church's vast archival system, the Jesuits possessed both the means and the motive to orchestrate such a cover-up.\u003c/p\u003e\n\u003ch3 id=\"who-benefits-from-the-lie\"\u003eWho Benefits from the Lie?\u003c/h3\u003e\n\u003cp\u003eThe suppression of America's true architectural heritage serves multiple purposes for the ruling elite. First, it maintains the myth of European superiority — the idea that civilization flows from East to West, from the Old World to the New. If advanced civilizations existed in North America before European contact, then the entire justification for colonization collapses.\u003c/p\u003e\n\u003cp\u003eSecond, it protects the religious narrative controlled by the Vatican. The Catholic Church's authority depends on its claim to be the custodian of human history from the time of Christ to the present. A civilization that predates or contradicts the Church's timeline threatens that authority at its foundation.\u003c/p\u003e\n\u003cp\u003eThird, it prevents the public from asking the most dangerous question of all: \u003cem\u003eWhat else have they lied about?\u003c/em\u003e Once a person realizes that the history they learned in school is a carefully constructed fiction, they begin to question everything — and that is the one thing the controllers cannot allow.\u003c/p\u003e\n\u003cp\u003eAs Howard Pittman learned during his near-death experience, the demonic hierarchy that governs the second heaven operates through deception above all else. The physical world is a battlefield, and the weapons are lies. Every buried structure, every suppressed artifact, every rewritten textbook is a brick in the wall of deception that separates humanity from the truth. As Pittman testified, the rulers of darkness maintain their power not through force but through the manipulation of information — and the suppression of America's true history is one of their greatest achievements. Watch the full testimony here: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"the-evidence-they-cannot-hide\"\u003eThe Evidence They Cannot Hide\u003c/h2\u003e\n\u003ch3 id=\"photographic-and-survey-records\"\u003ePhotographic and Survey Records\u003c/h3\u003e\n\u003cp\u003eDespite the best efforts of the suppression apparatus, evidence continues to surface. 19th-century photographs of Ohio's mound complexes show structures far more elaborate than anything described in modern textbooks. Survey records from the General Land Office document earthworks that have since been plowed under, built over, or simply removed from the maps.\u003c/p\u003e\n\u003cp\u003eIn California, historical photographs from the 1860s and 1870s show buildings with architectural details — Corinthian columns, Gothic arches, ornate stonework — that are wildly inconsistent with the frontier settlement narrative. These photographs, many of which are held in state archives, are rarely displayed and even more rarely discussed.\u003c/p\u003e\n\u003cp\u003eThe work of independent researchers, including the invaluable investigations published by \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 on Substack\u003c/a\u003e, has brought much of this evidence to light. Through painstaking analysis of historical records, photographs, and maps, these researchers have assembled a compelling case that the official history of the American landscape is fundamentally false.\u003c/p\u003e\n\u003ch3 id=\"modern-discoveries\"\u003eModern Discoveries\u003c/h3\u003e\n\u003cp\u003eConstruction projects continue to unearth anomalous structures. In 2019, a highway expansion project in Ohio uncovered a previously unknown earthwork complex that was immediately classified and fenced off. In San Francisco, every major construction project in the downtown area encounters buried structures that are quietly documented and then sealed over.\u003c/p\u003e\n\u003cp\u003eThe pattern is always the same: discover, classify, suppress, deny. This is the protocol that has been in place since the Smithsonian first began collecting — and losing — anomalous artifacts in the 19th century. It is the same protocol used by the Jesuits when they encountered advanced civilizations in the Americas: document everything for the Vatican archives, destroy or bury everything for the public.\u003c/p\u003e\n\u003cp\u003eFor a deeper examination of how the World Fairs were used to reset the narrative of these very structures, see \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/143-World_Fairs_Reset.mp4\"\u003eWorld Fairs Reset\u003c/a\u003e and the documentary \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a
