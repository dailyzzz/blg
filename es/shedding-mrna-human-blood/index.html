a ilustra repetidamente que la proximidad a la corrupción produce contaminación. Cuando Adán cayó, toda la creación cayó con él — no porque los árboles y los animales eligieran la rebelión, sino porque existían dentro de la esfera del que tenía dominio. Cuando Acán pecó en Jericó, todo el campamento de Israel soportó las consecuencias. Cuando un miembro del cuerpo está enfermo, todo el cuerpo sufre. Este es un principio tejido en la tela de la creación misma: la contaminación se propaga. No respeta límites individuales. No honra elecciones personales. Fluye hacia afuera de su fuente como veneno en agua, afectando a todos los que están aguas abajo.\u003c/p\u003e\n\u003cp\u003eLas inyecciones de ARNm fueron presentadas al mundo como una elección médica personal — tómalo o déjalo, y tu decisión afecta solo a ti. Esto era una mentira. La investigación ahora confirma lo que científicos independientes advirtieron desde el principio: ARNm sintético y sus componentes asociados se derraman de individuos inyectados a no inyectados a través de múltiples vías. El fuego tomado en el seno de una persona está quemando la ropa de aquellos que están cerca.\u003c/p\u003e\n\u003cp\u003eLa pista de Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/67-The_Enemy_Within.mp4\"\u003eEl Enemigo Dentro\u003c/a\u003e habla de la naturaleza de un adversario que se infiltra silenciosamente — y el derrame es exactamente esto: una transmisión invisible que cruza el límite de la elección personal. Y como \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/97-Rivers_of_Living_Water.mp4\"\u003eRíos de Agua Viva\u003c/a\u003e describe el flujo de vida del Espíritu de Dios, el río del derrame representa una inversión oscura — un flujo de biología sintética de lo corrupto a lo no corrupto.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"la-evidencia-del-derrame\"\u003eLa Evidencia del Derrame\u003c/h2\u003e\n\u003cp\u003eEl término \"derrame\" se refiere a la transmisión de componentes de vacunas — incluyendo proteína de espícula, nanopartículas lipídicas, y ARNm sintético — de individuos vacunados a individuos no vacunados a través del contacto cercano. Este fenómeno fue predicho por escépticos de vacunas, negado por autoridades de salud pública, reconocido en los propios protocolos de ensayos clínicos de Pfizer, y ahora confirmado por evidencia de laboratorio.\u003c/p\u003e\n\u003ch3 id=\"el-protocolo-propio-de-pfizer-reconoció-el-riesgo\"\u003eEl Protocolo Propio de Pfizer Reconoció el Riesgo\u003c/h3\u003e\n\u003cp\u003eEl protocolo de ensayo clínico Fase 1/2/3 de Pfizer (documento C4591001) incluyó provisiones específicas para reportar lo que denominó \"Exposición Ambiental Durante el Embarazo o Lactancia.\" Estas provisiones describieron escenarios en los cuales un individuo no vacunado podría ser expuesto a la vacuna a través de:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInhalación\u003c/strong\u003e — respirar aire en proximidad a un individuo vacunado\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eContacto de piel\u003c/strong\u003e — tocar a un individuo vacunado\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEl protocolo requería que estos eventos de exposición fueran reportados al sistema de monitoreo de seguridad de Pfizer. La mera existencia de este requisito de reporte en un ensayo clínico para un producto descrito como \"no-transmisible\" constituye una admisión de que la transmisión fue anticipada y considerada una preocupación de seguridad.\u003c/p\u003e\n\u003cp\u003eSi el producto no podía derramarse, ¿por qué el fabricante incluyó un protocolo para monitorear eventos de derrame? La respuesta es auto-evidente.\u003c/p\u003e\n\u003ch3 id=\"detección-de-arnm-en-sangre-no-vacunada\"\u003eDetección de ARNm en Sangre No Vacunada\u003c/h3\u003e\n\u003cp\u003eLa investigación publicada por múltiples laboratorios independientes ha ahora detectado ARNm sintético — el ARNm de nucleósido modificado usado en las inyecciones de Pfizer y Moderna — en muestras de sangre de individuos que nunca recibieron ninguna inyección de ARNm. Estos hallazgos han sido confirmados usando prueba de reacción en cadena de la polimerasa (PCR) y PCR de transcripción inversa (RT-PCR), los métodos de oro estándar para detectar secuencias de ARN específicas.\u003c/p\u003e\n\u003cp\u003eLa presencia de ARNm sintético en sangre no vacunada solo puede ser explicada por transmisión de individuos vacunados. Esto no es virus de tipo salvaje ARN. Esto no es ARN de mensajero naturalmente ocurrente. Esta es una secuencia de ARN sintética de laboratorio, nucleósido-modificada que no existe en la naturaleza y solo puede originarse de los productos farmacéuticos en los cuales fue manufacturado.\u003c/p\u003e\n\u003ch3 id=\"documentación-de-darkfield-de-ana-mihalcea\"\u003eDocumentación de Darkfield de Ana Mihalcea\u003c/h3\u003e\n\u003cp\u003eAna Mihalcea, MD, PhD ha documentado extensivamente en su Substack (\u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e) que individuos no vacunados muestran las mismas categorías de anormalidades de sangre — estructuras nanométricas auto-ensamblables, filamentos polímeros, formación de rouleaux, y nanopartículas luminiscentes — como individuos vacunados, aunque frecuentemente en concentraciones algo menores. Su trabajo de microscopía de darkfield antes y después en pacientes no vacunados muestra que estos individuos cargan una carga de nanotecnología que solo podría haber sido adquirida a través de exposición ambiental, incluyendo derrame.\u003c/p\u003e\n\u003cp\u003eEl trabajo de la Dra. Mihalcea demuestra que la contaminación no es limitada al ARNm mismo. El sistema de entrega de nanopartículas lipídicas — la cáscara lipídica sintética que encapsula el ARNm — aparenta ser transmisible también. Esto es crítico porque la plataforma de nanopartículas lipídicas es en sí misma un sistema de nanotecnología con propiedades (auto-ensamblaje, capacidad de respuesta electromagnética, penetración celular) que extienden mucho más allá de la simple entrega de ARNm.\u003c/p\u003e\n\u003ch2 id=\"mecanismos-del-derrame\"\u003eMecanismos del Derrame\u003c/h2\u003e\n\u003ch3 id=\"transmisión-respiratoria\"\u003eTransmisión Respiratoria\u003c/h3\u003e\n\u003cp\u003eLa investigación ha demostrado que individuos vacunados exhalan proteína de espícula y potencialmente otros componentes de vacuna en su aliento. Un estudio publicado en Enfermedades Infecciosas Clínicas confirmó que la proteína de espícula fue detectable en el aliento exhalado de individuos vacunados durante períodos extendidos después de la inyección.\u003c/p\u003e\n\u003cp\u003eLa ruta respiratoria es la vía de transmisión más eficiente porque requiere solo proximidad — compartir aire en un espacio cerrado. Esto significa que individuos no vacunados viviendo con miembros de familia vacunados, trabajando en oficinas de mayoría vacunada, o viajando en transporte público cerrado están continuamente expuestos.\u003c/p\u003e\n\u003ch3 id=\"transmisión-de-contacto-de-piel\"\u003eTransmisión de Contacto de Piel\u003c/h3\u003e\n\u003cp\u003eLa piel es tanto un órgano excretorio como un órgano absorbente. Individuos vacunados excretan a través de perspiral, e individuos no vacunados absorben a través del contacto de piel. El propio protocolo de Pfizer reconoció el contacto de piel como una ruta de transmisión, y reportes clínicos de individuos no vacunados describen síntomas (irregularidades menstruales, dolores de cabeza, hemorragias nasales, reacciones de piel) después del contacto de piel con personas recientemente vacunadas.\u003c/p\u003e\n\u003ch3 id=\"transmisión-sexual\"\u003eTransmisión Sexual\u003c/h3\u003e\n\u003cp\u003eLa proteína de espícula ha sido detectada en semen. El contacto sexual entre individuos vacunados y no vacunados representa una ruta de transmisión de intercambio de fluido directo para componentes de vacuna.\u003c/p\u003e\n\u003ch3 id=\"transmisión-por-leche-materna\"\u003eTransmisión por Leche Materna\u003c/h3\u003e\n\u003cp\u003eMúltiples estudios han confirmado la presencia de ARNm sintético en leche materna después de la vacunación. Los CDC inicialmente negaron esto, luego lo reconocieron pero alegaron que los niveles eran \"seguros.\" No hay un nivel seguro establecido de ARNm sintético en leche materna, porque ningún estudio a largo plazo fue conducido sobre los efectos de ingestión infantil de ARNm de nucleósido modificado.\u003c/p\u003e\n\u003cp\u003eLas madres lactantes que recibieron inyecciones transmitieron componentes de vacuna directamente a sus infantes a través del intercambio biológico más íntimo — la alimentación de un niño del cuerpo de la madre. Se reportó que algunos infantes experimentaron eventos adversos después de la vacunación de sus madres, incluyendo una muerte documentada de un infante lactante.\u003c/p\u003e\n\u003ch2 id=\"la-corrupción-de-toda-carne\"\u003eLa Corrupción de Toda Carne\u003c/h2\u003e\n\u003cp\u003eGénesis 6:12 declara: \"Y miró Dios la tierra, y he aquí que estaba corrompida; porque toda carne había corrompido su camino sobre la tierra.\" Esta corrupción — la contaminación de toda carne, no meramente alguna carne — fue la razón declarada para el juicio de diluvio. Cuando toda carne fue corrupta, Dios respondió con el acto más comprensivo de destrucción en la historia humana.\u003c/p\u003e\n\u003cp\u003eEl fenómeno del derrame recrea esta dinámica en términos modernos. Las inyecciones de ARNm no fueron limitadas en su efecto a los individuos que las recibieron. A través del derrame, la biología sintética se ha propagado a los no vacunados — a aquellos que explícitamente eligieron no participar. La contaminación de sangre y biología se está convirtiendo universal, afectando a \"toda carne\" sin importar el consentimiento individual.\u003c/p\u003e\n\u003cp\u003eEsto no es meramente una preocupación médica. Es una preocupación de pacto. La sangre lleva la vida de la carne (Levítico 17:11), y la sangre es la sustancia de pacto a través de la cual Dios se ata a sí mismo a la humanidad. Cuando ARNm sintético se encuentra en la sangre de una persona no vacunada — una persona que hizo una elección consciente de preservar la integridad de su sangre — el espacio de pacto ha sido invadido sin consentimiento.\u003c/p\u003e\n\u003cp\u003eLa gran delusion de 2 Tesalonicenses 2:9-12 abarca no solo el engaño que llevó a miles de millones a aceptar las inyecciones, sino el engaño que dijo al resto que eran seguros si se rehusaban. Nadie está seguro. El derrame asegura que la corrupción llega a todos, así como Génesis 6 describe una corrupción que tocó toda carne.\u003c/p\u003e\n\u003cp\u003eBajo el firmamento — la cúpula que Génesis 1 describe como separando las aguas de arriba de las aguas de abajo — no hay escape de lo que ha sido liberado. Los ángeles caídos que ingeniaron esta corrupción a través de sus instrumentos humanos conocen los límites del sistema cerrado en el cual la humanidad vive. Conocen que lo que es liberado en el aire, el agua, y los cuerpos de miles de millones eventualmente llegará a todos. El domo asegura que nada escapa. El derrame asegura que nada está contenido.\u003c/p\u003e\n\u003ch2 id=\"la-evidencia-de-sangre-bajo-microscopía\"\u003eLa Evidencia de Sangre Bajo Microscopía\u003c/h2\u003e\n\u003cp\u003eLa evidencia de microscopía de darkfield del derrame de contaminación es extensa y creciente.\u003c/p\u003e\n\u003ch3 id=\"formación-de-rouleaux-en-sangre-no-vacunada\"\u003eFormación de Rouleaux en Sangre No Vacunada\u003c/h3\u003e\n\u003cp\u003eLa formación de rouleaux — el apilamiento de glóbulos rojos en rollos como monedas — es un sello distintivo de sangre contaminada con sustancias que disrupting electromagnéticamente. Esta formación fue inicialmente observada principalmente en individuos vacunados pero ahora está siendo documentada con frecuencia cada vez mayor en la población no vacunada. La Dra. Mihalcea ha publicado numerosas imágenes antes y después mostrando rouleaux en pacientes no vacunados que viven o trabajan con individuos vacunados.\u003c/p\u003e\n\u003ch3 id=\"estructuras-auto-ensamblables-en-sangre-no-vacunada\"\u003eEstructuras Auto-ensamblables en Sangre No Vacunada\u003c/h3\u003e\n\u003cp\u003eLas mismas categorías de estructuras nanométricas auto-ensamblables documentadas en sangre vacunada — filamentos, formaciones cristalinas, estructuras ribbon-like, nanopartículas luminiscentes — están apareciendo en sangre no vacunada. La morfología es idéntica; solo la concentración difiere.\u003c/p\u003e\n\u003ch3 id=\"evidencia-de-curso-de-tiempo\"\u003eEvidencia de Curso de Tiempo\u003c/h3\u003e\n\u003cp\u003eAlgunos investigadores han documentado la contaminación progresiva de individuos no vacunados sobre tiempo. Muestras de sangre tomadas de los mismos individuos no vacunados en intervalos de meses muestran densidad de nanopartículas creciente y complejidad creciente de estructuras auto-ensamblables. Esta progresión es consistente con exposición continua y cumulativa a través del derrame y contaminación ambiental.\u003c/p\u003e\n\u003ch2 id=\"medidas-protectoras-para-los-no-vacunados\"\u003eMedidas Protectoras para los No Vacunados\u003c/h2\u003e\n\u003cp\u003ePara aquellos que eligieron no recibir las inyecciones, el descubrimiento de contaminación de derrame en su sangre es profundamente angustioso. Sin embargo, las mismas intervenciones que ayudan individuos vacunados pueden ayudar a los no vacunados también.\u003c/p\u003e\n\u003ch3 id=\"quelación-edta\"\u003eQuelación EDTA\u003c/h3\u003e\n\u003cp\u003eLa quelación EDTA intravenosa ha sido documentada por la Dra. Mihalcea de reducir densidad de nanopartículas y disolver estructuras auto-ensamblables en sangre tanto vacunada como no vacunada. Porque la contaminación es continua, tratamientos periódicos de quelación son recomendados en lugar de un curso único.\u003c/p\u003e\n\u003ch3 id=\"protocolos-de-desintoxicación\"\u003eProtocolos de Desintoxicación\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eVitamina C de dosis alta (intravenosa cuando sea posible, oral como mantenimiento)\u003c/li\u003e\n\u003cli\u003eN-acetilcisteína (NAC) para apoyar producción de glutatión\u003c/li\u003e\n\u003cli\u003eAzul de metileno bajo supervisión médica\u003c/li\u003e\n\u003cli\u003eNattokinasa y bromelain para apoyar actividad fibrinolítica y reducir formación de microcúmulos\u003c/li\u003e\n\u003cli\u003eQuercetina como anti-inflamatorio e ionóforo de zinc\u003c/li\u003e\n\u003cli\u003eTé de agujas de pino, tradicionalmente usado para apoyo respiratorio\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"protección-electromagnética\"\u003eProtección Electromagnética\u003c/h3\u003e\n\u003cp\u003eDada la capacidad de respuesta electromagnética de las estructuras nanométricas auto-ensamblables documentadas en sangre, reducir exposición a radiación electromagnética — particularmente de infraestructura de telecomunicaciones 4G/5G, routers Wi-Fi, y dispositivos electrónicos personales — puede desacelerar la tasa de auto-ensamblaje. Aunque esto es difícil de lograr completamente en ambientes modernos, medidas simples como mantener teléfonos lejos del cuerpo, deshabilitar Wi-Fi en la noche, y pasar tiempo en naturaleza pueden reducir exposición.\u003c/p\u003e\n\u003ch3 id=\"protección-espiritual\"\u003eProtección Espiritual\u003c/h3\u003e\n\u003cp\u003eSobre todo, la sangre de Jesucristo permanece como la única protección completa contra la corrupción de sangre humana. Ninguna nanotecnología puede sobrescribir el pacto sellado en el Calvario. Ningún derrame puede contaminar lo que Dios ha reclamado. Las intervenciones físicas listadas arriba abordan el cuerpo; la cobertura espiritual de la sangre del Cordero aborda el alma, el espíritu, y el destino eterno que ninguna corrupción terrenal puede tocar.\u003c/p\u003e\n\u003ch2 id=\"referencias-de-fuente\"\u003eReferencias de Fuente\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eProtocolo de Ensayo Clínico de Pfizer C4591001 — Provisiones de Exposición Ambiental Durante Embarazo\u003c/li\u003e\n\u003cli\u003eAna Mihalcea, MD, PhD — Publicaciones de investigación de Substack: \u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eHanna N, et al. \"Biodistribución de vacunas de ARNm COVID-19 en leche materna humana.\" JAMA Pediatría, 2022\u003c/li\u003e\n\u003cli\u003eFertig TE, et al. \"El ARNm de Vacuna Puede Ser Detectado en Sangre a 15 Días Post-Vacunación.\" Biomedicinas, 2022\u003c/li\u003e\n\u003cli\u003eEl Blog de Profecía de La Voz del Maestro: \u003ca href=\"https://themastersvoice.wordpress.com\"\u003ethemastersvoice.wordpress.com\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"descubre-más\"\u003eDescubre Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eTestimonio de Experiencia Cercana a la Muerte de Howard Pittman — Advertencia de Fin de los Tiempos que Dios Le Dio\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eConfidencial Católico: Secretos Jesuitas Deplorables Revelados\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicidio y Pharmakeia — La Brujería de la Medicina Moderna\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¡Lo Que Podría Estar en el Sótano del Vaticano Te Puede Conmocionar!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"escucha-mientras-lees\"\u003eEscucha Mientras Lees\u003c/h2\u003e\n\u003cp\u003eLas pistas de ZZZ Daily exploran los temas en este artículo:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/41-Shedding_Proof.mp4\"\u003ePrueba de Derrame\u003c/a\u003e — La evidencia documentada de transmisión de ARNm de vacunado a no vacunado\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/179-Engineering_Contagion.mp4\"\u003eIngeniería de Contagio\u003c/a\u003e — Cómo la contaminación es diseñada para propagarse más allá de sus objetivos iniciales\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/47-Nanobot_Swarms.mp4\"\u003eEnjambres de Nanobots\u003c/a\u003e — Tecnología auto-ensamblable que se propaga a través de sistemas biológicos\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/61-Synthetic_Biology.mp4\"\u003eBiología Sintética\u003c/a\u003e — La fusión de sistemas sintéticos y biológicos\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDel álbum Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/67-The_Enemy_Within.mp4\"\u003eEl Enemigo Dentro\u003c/a\u003e — La infiltración silenciosa que no respeta límites\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/97-Rivers_of_Living_Water.mp4\"\u003eRíos de Agua Viva\u003c/a\u003e — El río verdadero de vida que ninguna corrupción puede contaminar\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explora-más\"\u003eExplora Más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/darkfield-microscopy-self-assembly/?lang=es\"\u003eMicroscopía de Darkfield Muestra Auto-ensamblaje de Nanotecnología en Sangre Humana\u003c/a\u003e — La evidencia visual de lo que el derrame deja atrás\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/darkfield-covid-unvaccinated/?lang=es\"\u003eAnálisis de Sangre Viva de Darkfield de Individuos COVID-19 No Vacunados\u003c/a\u003e — Lo que la microscopía revela en aquellos que nunca recibieron inyecciones\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/vaccinated-amyloid-microclots/?lang=es\"\u003eTODOS los Vacunados con C19 Tienen Microcúmulos Amiloides en Su Sangre\u003c/a\u003e — La evidencia de coagulación en sangre vacunada que puede estar derrameándose\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eEl fuego se ha propagado más allá de aquellos que eligieron llevarlo. El ARNm sintético ahora fluye en la sangre de lo no-inyectado — la gente que dijo no, que se mantuvo firme, que soportó la presión y el aislamiento y la condenación. Su elección fue anulada no por mandato sino por biología misma, armas para llevar la corrupción de cuerpo a cuerpo como un río que no reconoce límites. Pero Dios, quien ve cada molécula en cada gota de sangre, no está sorprendido. Él sabía antes de la fundación del mundo que esta hora vendría, y la sangre que derramó en el Calvario fue derramada en avance de cada corrupción que el enemigo alguna vez idearía. El derrame de la invención del hombre no puede abrumar el derrame de la sangre de Dios. Y esa sangre aún habla, aún limpia, aún cubre — para todos los que clamen en el nombre del Señor.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/ca
