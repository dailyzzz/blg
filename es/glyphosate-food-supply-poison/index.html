dán y Eva cayeron, la tierra misma fue maldita. Lo que alguna vez produjo alimento libremente ahora requería trabajo, lucha y sufrimiento. Pero incluso la tierra maldita era todavía la tierra de Dios: todavía producía comida real, nutrida por un suelo real, gobernada por procesos biológicos reales. Lo que Monsanto ha hecho con el glifosato es algo completamente diferente: el envenenamiento deliberado del suelo mismo, la destrucción sistemática de la biología del suelo que hace que la comida sea nutritiva, y la saturación del suministro de alimentos con una sustancia química que ataca el cuerpo humano a nivel celular. Esto no es una maldición sobre la tierra. Esta es una guerra contra la tierra, y contra todo lo viviente que depende de ella.\u003c/p\u003e\n\u003cp\u003eComo lamenta la canción \u003ca href=\"https://confliction.zzzdaily.com/tracks/es/43-Hunger_and_Thirst.mp4\"\u003eHambre y Sed\u003c/a\u003e del álbum Confliction, lo que Dios proporcionó como sustento ha sido corrompido en veneno. La provisión permanece, pero ha sido contaminada por fuerzas que se benefician de la corrupción y niegan sus consecuencias.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"qué-es-el-glifosato\"\u003e¿Qué es el glifosato?\u003c/h2\u003e\n\u003cp\u003eEl glifosato es el ingrediente activo en Roundup, el herbicida más ampliamente utilizado en el mundo. Fue patentado por primera vez por Monsanto en 1974 como un matahierbas. Su mecanismo de acción es engañosamente simple: el glifosato inhibe la vía del shikimato, un proceso enzimático esencial para el crecimiento de las plantas. Dado que esta vía existe en las plantas pero no en los mamíferos, Monsanto comercializó Roundup como inofensivo para los humanos y los animales.\u003c/p\u003e\n\u003cp\u003eEsta afirmación fue la base de una campaña de marketing global de cuatro décadas que haría que Roundup sea el químico agrícola más comercialmente exitoso de la historia. Para 2014, se estaban aplicando más de 826 millones de kilogramos de glifosato anualmente en todo el mundo, lo suficiente para rociar casi media libra en cada acre cultivado de tierra en la Tierra.\u003c/p\u003e\n\u003cp\u003ePero la afirmación de que el glifosato es inofensivo para los humanos porque los humanos carecen de la vía del shikimato contenía una omisión crítica: los billones de bacterias en el intestino humano (el microbioma) sí poseen la vía del shikimato. El glifosato no mata a los humanos directamente. Mata a las bacterias que mantienen a los humanos vivos.\u003c/p\u003e\n\u003cp\u003eEl microbioma humano no es meramente una ayuda digestiva. Es un sistema fundamental que regula la función inmunológica, produce neurotransmisores (incluyendo aproximadamente el 90% de la serotonina del cuerpo), sintetiza vitaminas, mantiene la barrera intestinal y modula la expresión génica. Cuando el glifosato interrumpe el microbioma intestinal, no produce un síntoma único. Produce una cascada de disfunción sistémica que se manifiesta como enfermedad autoinmune, deterioro neurológico, disrupción hormonal y cáncer.\u003c/p\u003e\n\u003ch2 id=\"los-papeles-de-monsanto\"\u003eLos Papeles de Monsanto\u003c/h2\u003e\n\u003cp\u003eEn 2017, como parte del litigio contra Monsanto (ahora propiedad de Bayer), los documentos internos de la empresa fueron liberados a través del descubrimiento legal. Estos documentos, conocidos como los Papeles de Monsanto, revelaron lo que la empresa sabía sobre los efectos en la salud del glifosato y lo que hizo para suprimir ese conocimiento.\u003c/p\u003e\n\u003cp\u003eLos documentos revelaron que:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMonsanto escribió ghostwriting de estudios científicos.\u003c/strong\u003e Los correos electrónicos internos mostraban que los empleados de Monsanto redactaban estudios que luego eran publicados con los nombres de científicos académicos, dando a la investigación financiada por la industria la apariencia de validación independiente. Un correo electrónico de un toxicólogo de Monsanto afirmaba: \"Mantendríamos los costos bajos haciéndolo nosotros escribiendo.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMonsanto atacó a investigadores independientes.\u003c/strong\u003e Los científicos que publicaron hallazgos que vinculaban el glifosato con problemas de salud fueron objetivo de campañas coordinadas para desacreditar su trabajo, defundir sus laboratorios y destruir sus carreras. El profesor Gilles-Eric Seralini, cuyo estudio de 2012 mostró tumores en ratas alimentadas con maíz transgénico rociado con Roundup, fue sometido a una campaña sistemática que resultó en la retracción de su documento, una retracción que luego fue revertida cuando el documento fue republicado en una revista diferente después de que la revisión independiente confirmó sus hallazgos.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMonsanto influyó en las agencias reguladoras.\u003c/strong\u003e Los documentos mostraron que un funcionario senior de la EPA, Jess Rowland, trabajó para suprimir una revisión del glifosato por la Agencia para Sustancias Tóxicas y el Registro de Enfermedades (ATSDR), diciéndole a Monsanto: \"Si puedo matar esto, debería recibir una medalla.\" Rowland se jubiló poco después de que estas comunicaciones fueran expuestas.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMonsanto sabía que el glifosato causaba cáncer.\u003c/strong\u003e Los documentos internos revelaron que los propios toxicólogos de Monsanto tenían preocupaciones sobre el potencial carcinógeno del glifosato ya en los años 80, pero eligieron suprimir e reinterpretar los datos en lugar de reconocer el riesgo.\u003c/p\u003e\n\u003cp\u003eEn 2015, la Agencia Internacional para la Investigación del Cáncer (IARC), una división de la Organización Mundial de la Salud, clasificó el glifosato como \"probablemente carcinógeno para los humanos\" basándose en una revisión exhaustiva de la evidencia científica. Monsanto inmediatamente lanzó una campaña para desacreditar el hallazgo de la IARC, gastando millones en cabilderos, firmas de relaciones públicas y aliados académicos para defender su producto.\u003c/p\u003e\n\u003cp\u003ePara 2024, Bayer (que adquirió Monsanto en 2018 por 63 mil millones de dólares) había pagado más de 11 mil millones de dólares para resolver más de 100,000 demandas de individuos que afirmaban que Roundup causó su linfoma no-Hodgkin. Bayer resolvió mientras negaba oficialmente que Roundup cause cáncer, una maniobra legal que permitió a la empresa evitar un fallo judicial definitivo mientras reconocía la realidad práctica de que los jurados consistentemente fallaron en su contra.\u003c/p\u003e\n\u003ch2 id=\"glifosato-como-desecante-rociado-directamente-en-tu-comida\"\u003eGlifosato como desecante: rociado directamente en tu comida\u003c/h2\u003e\n\u003cp\u003eLa mayoría de las personas asumen que el glifosato se rocía sobre las malezas alrededor de las cosechas. Esto es solo parte de la historia. Desde finales de los años 90, el glifosato ha sido utilizado cada vez más como un desecante pre-cosecha, rociado directamente sobre las cosechas de alimentos poco antes de la cosecha para acelerar el secado y hacer que la cosecha sea más uniforme.\u003c/p\u003e\n\u003cp\u003eEsta práctica significa que el glifosato se aplica al trigo, la avena, la cebada, las lentejas, los frijoles, los garbanzos, la caña de azúcar y numerosas otras cosechas en el punto de máxima absorción, solo días antes de que sean cosechadas, procesadas y convertidas en la comida en tu plato.\u003c/p\u003e\n\u003cp\u003eLas pruebas realizadas por la Agencia de Inspección de Alimentos de Canadá encontraron residuos de glifosato en aproximadamente el 30% de los productos alimenticios probados, con los niveles más altos encontrados en productos basados en granos. El Grupo de Trabajo Ambiental encontró glifosato en 43 de 45 productos a base de avena convencionales probados, incluyendo cereales populares para niños y barras de granola. Un estudio publicado en la revista Environmental Health encontró niveles detectables de glifosato en la orina del 93% de los participantes probados, con los niños teniendo los niveles más altos.\u003c/p\u003e\n\u003cp\u003eNo estás accidentalmente expuesto al glifosato. Sistemáticamente te alimentan con glifosato, y el sistema que te lo alimenta lo llama seguro.\u003c/p\u003e\n\u003ch2 id=\"la-vía-de-la-destrucción-intestinal\"\u003eLa vía de la destrucción intestinal\u003c/h2\u003e\n\u003cp\u003eLa Dra. Stephanie Seneff del MIT ha publicado extensamente sobre los mecanismos por los cuales el glifosato daña la salud humana. Su investigación, compilada en el libro \"Toxic Legacy\", identifica múltiples vías de daño:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDestrucción del microbioma.\u003c/strong\u003e El glifosato mata preferentemente las bacterias intestinales beneficiosas (Lactobacillus, Bifidobacterium) mientras deja las bacterias patógenas (Clostridium, Salmonella) relativamente ilesas. Esta disbiosis está vinculada a la enfermedad inflamatoria del intestino, las condiciones autoinmunes, la depresión y la obesidad.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDisrupción de aminoácidos.\u003c/strong\u003e La vía del shikimato que el glifosato inhibe en las plantas y las bacterias produce aminoácidos aromáticos, triptófano, tirosina y fenilalanina, que son precursores de la serotonina, dopamina, melanina y hormonas tiroideas. Al interrumpir la producción microbiana de estos aminoácidos, el glifosato contribuye a la depresión, la disfunción neurológica, la enfermedad tiroidea y el desequilibrio hormonal.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQuelación de minerales.\u003c/strong\u003e El glifosato fue originalmente patentado como un quelante de metales, una sustancia química que se une a minerales y los hace unavailable. En el suelo, se une al manganeso, zinc, hierro y cobalto, reduciendo el contenido mineral de las cosechas. En el cuerpo humano, se une a los mismos minerales esenciales, contribuyendo a la deficiencia nutricional incluso cuando la ingesta dietética parece adecuada.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDisrupción endocrina.\u003c/strong\u003e Los estudios publicados en Toxicological Sciences y Environmental Health Perspectives han mostrado que el glifosato interrumpe los receptores de estrógeno en concentraciones muy por debajo de las encontradas en el suministro de alimentos. Esta disrupción endocrina está vinculada a trastornos reproductivos, pubertad temprana y cánceres dependientes de hormonas.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGlifosato y enfermedad celíaca.\u003c/strong\u003e La investigación publicada en la revista Interdisciplinary Toxicology encontró una correlación sorprendente entre el aumento de la enfermedad celíaca y el uso cada vez mayor del glifosato en el trigo como desecante. El documento hipotetizó que el glifosato daña el revestimiento intestinal, interrumpe la función de las enzimas digestivas y afecta la capacidad del cuerpo para procesar el gluten, sugiriendo que la \"epidemia de gluten\" puede ser, en parte significativa, una epidemia de glifosato.\u003c/p\u003e\n\u003ch2 id=\"la-conexión-de-los-gmo\"\u003eLa conexión de los GMO\u003c/h2\u003e\n\u003cp\u003eLa dominancia del mercado del glifosato es inseparable de los organismos genéticamente modificados. Como se detalla en nuestro artículo sobre \u003ca href=\"/gmo-genetic-modification-food/?lang=es\"\u003eOGM: Modificación genética del suministro de alimentos\u003c/a\u003e, Monsanto creó cultivos \"Roundup Ready\", soja, maíz, algodón, canola, remolacha azucarera y alfalfa genéticamente diseñados para sobrevivir siendo rociados con Roundup.\u003c/p\u003e\n\u003cp\u003eEsto creó un ecosistema comercial cerrado: los agricultores compraban las semillas patentadas de Monsanto y el herbicida patentado de Monsanto juntos. Cuantos más cultivos OGM se plantaban, más Roundup se vendía. Cuanto más Roundup se vendía, más dependientes se volvían los agricultores de las semillas OGM. Para 2014, más del 90% de la soja y el 89% del maíz plantado en los Estados Unidos eran variedades Roundup Ready.\u003c/p\u003e\n\u003cp\u003eLas consecuencias ambientales han sido catastróficas. Las especies de malezas han evolucionado resistencia al glifosato, creando \"supermalezas\" que requieren aplicaciones cada vez mayores de herbicida, o la adición de químicos aún más tóxicos como 2,4-D (un componente del Agente Naranja) a la mezcla. La biología del suelo que sustenta la agricultura está siendo sistemáticamente destruida. Los polinizadores que la producción alimentaria depende de, abejas, mariposas, insectos beneficiosos, están colapsando bajo el peso de la exposición química, como se documenta en nuestro artículo sobre \u003ca href=\"/bee-colony-collapse-food-chain/?lang=es\"\u003eColapso de la colonia de abejas\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"captura-regulatoria-y-la-puerta-giratoria\"\u003eCaptura regulatoria y la puerta giratoria\u003c/h2\u003e\n\u003cp\u003eLas agencias reguladoras encargadas de proteger al público de químicos tóxicos han sido sistemáticamente capturadas por las empresas que regulan. La puerta giratoria entre Monsanto y la EPA, FDA y USDA no es una metáfora, es un conducto de personal documentado:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMichael Taylor\u003c/strong\u003e se desempeñó como Comisionado Adjunto de la FDA para la Política mientras mantenía simultáneamente una posición como Vicepresidente de Monsanto para la Política Pública. Bajo su influencia, la FDA adoptó una política de \"equivalencia sustancial\" que trataba los alimentos OGM como idénticos a los alimentos convencionales, eximiéndolos de pruebas de seguridad.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClarence Thomas\u003c/strong\u003e, el Juez de la Corte Suprema que escribió la opinión mayoritaria en el caso hito que permitió el patentamiento de organismos genéticamente modificados, fue anteriormente un abogado de Monsanto.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMargaret Miller\u003c/strong\u003e, quien trabajó para Monsanto desarrollando la hormona de crecimiento bovino, fue designada a la FDA donde aprobó su propia investigación.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEsto no es supervisión que ocasionalmente falla. Este es un sistema diseñado para asegurar que la industria escriba sus propias reglas, revise sus propios datos de seguridad y apruebe sus propios productos, con la autoridad completa del gobierno de los Estados Unidos detrás de ello.\u003c/p\u003e\n\u003cp\u003eComo documenta nuestro artículo sobre \u003ca href=\"/organic-farming-under-attack/?lang=es\"\u003eAgricultura orgánica bajo ataque\u003c/a\u003e, el mismo aparato regulador que protege el glifosato ataca activamente las alternativas. Los agricultores orgánicos enfrentan cargas regulatorias, costos de certificación y amenazas legales de las cuales la agricultura química convencional está exenta. El sistema está amañado para proteger el veneno y penalizar la pureza.\u003c/p\u003e\n\u003ch2 id=\"descubre-más\"\u003eDescubre más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Testimonio de experiencia cercana a la muerte — Advertencia del fin del tiempo que Dios le dio\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Secretos deplorable jesuitas revelados\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003e¡Lo que puede haber en el sótano del Vaticano podría sorprenderte!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions en YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"escucha-mientras-lees\"\u003eEscucha mientras lees\u003c/h2\u003e\n\u003cp\u003eEstas pistas del Diario ZZZ exploran los temas en este artículo:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/191-Rockefeller_Medicine.mp4\"\u003eMedicina Rockefeller\u003c/a\u003e — La captura corporativa de la salud se extiende desde el hospital a la granja\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/55-Extinction_Code-AI_Will_Kill_Us_All.mp4\"\u003eCódigo de extinción\u003c/a\u003e — La destrucción sistemática de los sistemas biológicos que sustentan la vida\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDel álbum Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/es/43-Hunger_and_Thirst.mp4\"\u003eHambre y Sed\u003c/a\u003e — La provisión de Dios corrompida en veneno, sustento convertido en enfermedad\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/es/441-Peanut_Butter.mp4\"\u003eMantequilla de maní\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explora-más\"\u003eExplora más\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/gmo-genetic-modification-food/?lang=es\"\u003eOGM: Modificación genética del suministro de alimentos\u003c/a\u003e — Los cultivos genéticamente diseñados que hicieron de Roundup el herbicida más utilizado del mundo\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/heavy-metals-food-supply/?lang=es\"\u003eMetales pesados en el suministro de alimentos: Lo que revelan las pruebas\u003c/a\u003e — El glifosato es una capa de contaminación en un sistema alimentario múltiplemente envenenado\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/organic-farming-under-attack/?lang=es\"\u003eAgricultura orgánica bajo ataque: La guerra contra la comida limpia\u003c/a\u003e — La guerra regulatoria contra la única alternativa a la agricultura química\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/bee-colony-collapse-food-chain/?lang=es\"\u003eColapso de la colonia de abejas: La cadena alimentaria bajo ataque\u003c/a\u003e — El papel del glifosato en el colapso de las poblaciones polinizadoras\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eComo fue en el Jardín, así es en el campo. La serpiente no solo tentó a Eva a comer la fruta equivocada, corrompió la relación entre la humanidad y la tierra misma. El glifosato es la expresión moderna de esa corrupción: una sustancia química que envenena el suelo, mata a los microbios, contamina la comida y enferma a las personas que la comen, todo mientras las autoridades que la aprobaron te dicen que es segura. Satanás sigue siendo un mentiroso. La fruta sigue viéndose bien. Y las personas que la comen siguen muriendo.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/es/category/food-environment/\",\"className\":\"category-badge\",\"children\":\"food-environment\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Glifosato en el suministro de alimentos: Roundup en tu plato\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Cómo el herbicida Roundup de Monsanto saturó el suministro mundial de alimentos con glifosato, un probable carcinógeno vinculado a la destrucción del intestino, la disrupción endocrina y el colapso de la biología del suelo, y por qué las agencias reguladoras miraban hacia otro lado.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-09-10T10:00:00Z\",\"children\":\"10 de septiembre de 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"glyphosate\",{\"href\":\"/es/tag/glyphosate/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"glyphosate\"]}],[\"$\",\"a\",\"Roundup\",{\"href\":\"/es/tag/Roundup/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"Roundup\"]}],[\"$\",\"a\",\"Monsanto\",{\"href\":\"/es/tag/Monsanto/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"Monsanto\"]}],[\"$\",\"a\",\"food-contamination\",{\"href\":\"/es/tag/food-contamination/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"food-contamination\"]}]]}]]}],[\"$\",\"div\",null,{\"className\":\"article-content\",\"dangerouslySetInnerHTML\":{\"__html\":\"$15\"}}],\"$L16\"]}],\"$L17\"]}],\"$L18\"]\n"])</script><script>self.__next_f.push([1,"19:I[2340,[\"2185\",\"static/chunks/app/%5Blang%5D/%5Bslug%5D/page-a424dc1babd9b142.js\"],\"default\"]\n16:[\"$\",\"footer\",null,{\"className\":\"mt-12 pt-6\",\"style\":{\"borderTop\":\"1px solid var(--hr-color)\"},\"children\":[\"$\",\"a\",null,{\"href\":\"/es/\",\"style\":{\"color\":\"var(--accent-link)\"},\"children\":\"← Back to all articles\"}]}]\n17:[\"$\",\"div\",null,{\"className\":\"hidden lg:block w-72 flex-shrink-0\",\"children\":[\"$\",\"$L19\",null,{\"url\":\"https://blog.zzzdaily.com/es/glyp strucción del intestino, la disrupción endocrina y el colapso de la biología del suelo, y por qué las agencias reguladoras miraban hacia otro lado.\"}],[\"$\",\"meta\",\"26\",{\"name\":\"twitter:image\",\"content\":\"https://blog.zzzdaily.com/images/articles/glyphosate-food-supply-poison.png\"}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"13:\"$f:metadata\"\n"])</script></body></html>
