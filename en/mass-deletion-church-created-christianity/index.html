selves, and them that were entering in ye hindered.\"\u003c/em\u003e — Luke 11:52\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eChristianity did not evolve naturally. It was engineered. The version practiced by billions today is not the original — it is what remained after centuries of systematic deletion. Texts were burned. Communities were destroyed. Believers were tortured and killed. And when the smoke cleared, only one version survived: the version that served the institution.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed the consequences. Three heavens. Demonic hierarchy in the second. 97.5 percent of Christians rejected. \"Never made Me Lord.\" Ninety-five percent serve \"self.\" Every word judged (Matthew 12:36-37). If the Christianity these people practiced was a deliberately constructed version — a version designed by the institution to serve the institution — then the rejection makes perfect sense. They followed a religion built by men, not by God.\u003c/p\u003e\n\u003cp\u003eThe Jesuits perfected the deletion process. Loyola's military organization wielding Napoleon's \"absolute power.\" Adams's \"eternal damnation.\" Tamburini governing \"all the world.\" Clement XIV poisoned. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals the method: infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The Jesuits did not merely defend the institutional version of Christianity. They deleted the alternatives.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-deleted-texts\"\u003eThe Deleted Texts\u003c/h2\u003e\n\u003ch3 id=\"what-we-lost\"\u003eWhat We Lost\u003c/h3\u003e\n\u003cp\u003eThe institutional church did not merely exclude texts from the canon. It destroyed them. Entire libraries were burned. Manuscripts were confiscated and lost. Communities that preserved alternative texts were declared heretical and destroyed. The scope of the deletion is staggering.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Library of Alexandria\u003c/strong\u003e: The greatest library of the ancient world was destroyed over several centuries. Christian mobs, encouraged by Bishop Theophilus and later by Bishop Cyril, targeted pagan and heterodox texts. The Serapeum, the library's last major repository, was destroyed in 391 AD by a Christian mob. The knowledge of the ancient world — including early Christian texts that did not conform to the emerging orthodoxy — was lost forever.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gnostic Libraries\u003c/strong\u003e: Until the 1945 discovery at Nag Hammadi, the Gnostic texts were known only through the polemics of their opponents — church fathers who quoted them only to refute them. The institutional church had so thoroughly destroyed Gnostic literature that entire theological systems were known only through the distorted lens of their enemies.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Marcionite Canon\u003c/strong\u003e: Marcion's collection of Pauline letters and his edited Luke was systematically destroyed. We know what it contained only through Tertullian's response to it. The first Christian canon — the first attempt to define scripture — was deleted by the institution that claimed the right to make that definition.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Didache\u003c/strong\u003e: This early Christian manual of practice, possibly dating to the first century, was lost for over a thousand years until its rediscovery in 1873. It presents a form of Christianity focused on ethical practice rather than doctrinal belief — a version that the institutional church found inconvenient.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack (agent131711.substack.com) documents the full scope of this deletion, showing that what we call \"Christianity\" today is not the original but the survivor — the version that the institution allowed to live after killing all the alternatives.\u003c/p\u003e\n\u003ch3 id=\"what-we-almost-lost\"\u003eWhat We Almost Lost\u003c/h3\u003e\n\u003cp\u003eSome texts survived despite the institution's efforts:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Book of Enoch\u003c/strong\u003e: Quoted in Jude, known to early Christians, excluded from the Western canon. It survived only because the Ethiopian Church preserved it. Its detailed descriptions of fallen angels, the Watchers, and the structure of the heavens did not fit the institutional framework.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Dead Sea Scrolls\u003c/strong\u003e: Hidden in caves near Qumran around 70 AD, these texts were preserved by accident — by the dry desert climate and the sealed jars that contained them. Their discovery in 1947 revealed a Judaism far more diverse than the institutional version suggested.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Nag Hammadi Library\u003c/strong\u003e: Buried in a sealed jar in the Egyptian desert, probably around the time the institutional church was destroying Gnostic texts elsewhere. Their survival was accidental. The institution's attempt to erase them nearly succeeded.\u003c/p\u003e\n\u003cp\u003eThese survivals are accidents of geography and climate. They represent a tiny fraction of what was lost. For every text that survived, dozens — perhaps hundreds — were destroyed. The institutional church's deletion was not partial. It was comprehensive.\u003c/p\u003e\n\u003ch2 id=\"the-deleted-beliefs\"\u003eThe Deleted Beliefs\u003c/h2\u003e\n\u003ch3 id=\"reincarnation\"\u003eReincarnation\u003c/h3\u003e\n\u003cp\u003eEarly Christians held diverse views on the fate of the soul. Some — including, according to several church fathers, Origen of Alexandria, one of the most brilliant early theologians — believed in the pre-existence of souls and the possibility of multiple lifetimes.\u003c/p\u003e\n\u003cp\u003eThe Second Council of Constantinople (553 AD) condemned Origen's teachings, including (by later interpretation) the concept of reincarnation. Emperor Justinian convened this council specifically to suppress Origen's influence. The Pope at the time, Vigilius, initially refused to attend and later cooperated only under imperial pressure.\u003c/p\u003e\n\u003cp\u003eThe deletion of reincarnation from Christian theology had enormous consequences. If souls have one chance, the institution's role becomes essential — only the institution can ensure you make the right choice. If souls have multiple opportunities, the institution's urgency diminishes. The deletion served the institution, not the truth.\u003c/p\u003e\n\u003ch3 id=\"direct-knowledge-of-god\"\u003eDirect Knowledge of God\u003c/h3\u003e\n\u003cp\u003eThe Gnostic traditions emphasized \u003cem\u003egnosis\u003c/em\u003e — direct, experiential knowledge of God that required no intermediary. This is the most dangerous idea for any institution, because it makes the institution unnecessary. If you can know God directly, you do not need a priest, a church, a sacrament, or a tithe.\u003c/p\u003e\n\u003cp\u003eThe institutional church declared gnosis heretical and destroyed the communities that practiced it. It replaced direct knowledge with faith — specifically, faith in the institution's teachings. You did not need to experience God yourself. You needed to believe what the church told you about God. This shift from experience to belief is the foundation of institutional Christianity.\u003c/p\u003e\n\u003cp\u003eThe Jesuits perfected this shift. Their educational system trains believers to accept institutional doctrine rather than seek direct experience. Their spiritual exercises — Loyola's famous \u003cem\u003eExercitia Spiritualia\u003c/em\u003e — appear to offer personal spiritual experience but actually channel that experience through institutional frameworks, ensuring that whatever a person encounters is interpreted according to Jesuit theology.\u003c/p\u003e\n\u003ch3 id=\"the-feminine-divine\"\u003eThe Feminine Divine\u003c/h3\u003e\n\u003cp\u003eEarly Christianity included feminine imagery for God and prominent roles for women. The Gospel of Mary presents Mary Magdalene as a privileged disciple who received special teachings. The Gospel of Philip describes her as Jesus's companion (the exact meaning is debated, but the intimacy is clear). Paul's letters mention women deacons, prophets, and teachers.\u003c/p\u003e\n\u003cp\u003eThe institutional church systematically deleted the feminine from its theology and practice. Women were excluded from leadership. The divine feminine was suppressed. Mary Magdalene was reimagined as a reformed prostitute (a tradition with no scriptural basis, invented by Pope Gregory I in 591 AD). The result was a masculine institution worshipping a masculine God through masculine rituals — a deletion of half the divine image.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, an all-male order, continued this suppression. Their educational institutions were male-only for centuries. Their theology emphasized obedience, hierarchy, and authority — masculine archetypes that reflect a deliberately incomplete understanding of the divine.\u003c/p\u003e\n\u003ch2 id=\"the-deleted-communities\"\u003eThe Deleted Communities\u003c/h2\u003e\n\u003ch3 id=\"the-human-cost\"\u003eThe Human Cost\u003c/h3\u003e\n\u003cp\u003eThe mass deletion was not merely literary. It was human. Communities that practiced alternative forms of Christianity were destroyed through violence:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Cathars\u003c/strong\u003e: A dualist Christian movement in southern France, declared heretical in the 12th century. Pope Innocent III launched the Albigensian Crusade against them in 1209. The siege of Beziers resulted in the massacre of approximately 20,000 people. The papal legate Arnaud Amalric reportedly said: \"Kill them all. God will know his own.\" The Cathar community was effectively exterminated.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Waldensians\u003c/strong\u003e: Founded by Peter Waldo in the 12th century, the Waldensians emphasized poverty, scripture reading, and lay preaching. They were persecuted for centuries. The Piedmont Easter of 1655 saw Catholic troops massacre thousands of Waldensian men, women, and children.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Hussites\u003c/strong\u003e: Followers of Jan Hus, burned at the stake in 1415 despite a promise of safe conduct. The Hussite Wars (1419-1434) were the Catholic Church's response to a movement that challenged papal authority and demanded scripture in the common language.\u003c/p\u003e\n\u003cp\u003eEach of these deletions removed a version of Christianity that challenged the institutional monopoly. The Cathars rejected the material world (threatening the institution's material power). The Waldensians read scripture for themselves (threatening the institution's interpretive monopoly). The Hussites challenged papal authority directly. All were destroyed.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's revelation that 97.5 percent of Christians are rejected suggests that the version of Christianity that survived the deletions — the institutional version — may be precisely the wrong version. The deleted versions, which emphasized direct experience, scriptural literacy, and challenge to authority, may have been closer to the truth. But we will never know, because the institution destroyed them.\u003c/p\u003e\n\u003ch2 id=\"the-ongoing-deletion\"\u003eThe Ongoing Deletion\u003c/h2\u003e\n\u003ch3 id=\"modern-suppression\"\u003eModern Suppression\u003c/h3\u003e\n\u003cp\u003eThe mass deletion is not merely historical. It continues today, through subtler methods:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSeminary Education\u003c/strong\u003e: Pastors are taught the historical-critical scholarship that reveals the Bible's human construction — but they are also taught not to share this with congregations. The deletion of scholarly knowledge from the pew is systematic.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMedia Control\u003c/strong\u003e: Alternative perspectives on Christianity are marginalized in mainstream media. The History Channel's documentaries on early Christianity are carefully balanced to avoid challenging institutional narratives. Social media platforms suppress content that questions religious orthodoxy.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSocial Pressure\u003c/strong\u003e: Questioning institutional Christianity results in social ostracism, family conflict, and loss of community. This social pressure serves the same function as the Inquisition — it punishes dissent and enforces conformity.\u003c/p\u003e\n\u003cp\u003eThe Jesuits continue to operate through all of these channels. Their universities produce the scholars. Their graduates populate the media. Their institutions shape the social norms that enforce compliance. The mass deletion continues, every day, through a thousand channels that most people never see.\u003c/p\u003e\n\u003ch2 id=\"the-way-forward\"\u003eThe Way Forward\u003c/h2\u003e\n\u003ch3 id=\"recovery-not-rejection\"\u003eRecovery, Not Rejection\u003c/h3\u003e\n\u003cp\u003eThe appropriate response to the mass deletion is not the rejection of Christianity but the recovery of what was deleted. The texts that survived — the Nag Hammadi library, the Dead Sea Scrolls, the Book of Enoch, the Didache — offer windows into the diverse, vibrant, multifaceted movement that the institution reduced to a single, controlled narrative.\u003c/p\u003e\n\u003cp\u003eReading these texts alongside the canonical Bible reveals a richer, more complex, more challenging Christianity than the institution permits. It reveals a faith that requires direct engagement rather than passive belief, personal experience rather than institutional mediation, and honest inquiry rather than blind obedience.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's message is clear: the institutional version is failing. 97.5 percent rejection. 95 percent self-service. The mass deletion created a Christianity that produces these results — a Christianity of ritual without reality, belief without experience, tradition without truth.\u003c/p\u003e\n\u003cp\u003eThe deleted versions may hold the keys to the narrow path. The institution destroyed them because they threatened its power. That very fact suggests they contained something genuine — something worth recovering, studying, and living.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — The full scope of the Church's mass deletion documented\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Why the institutional version fails 97.5 percent of its adherents\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit role in maintaining the deletion\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/01-Cast_Out_of_Paradise.mp4\"\u003eCast Out of Paradise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/35-The_Tree_of_Life.mp4\"\u003eThe Tree of Life\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/83-Ancient_Documents.mp4\"\u003eAncient Documents\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/87-From_Darkness_Into_Light.mp4\"\u003eFrom Darkness Into Light\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/untold-history-constructing-new-testament-part5/?lang=en\"\u003eThe UNTOLD HISTORY of Constructing the New Testament Part 5\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/who-wrote-bible-part4/?lang=en\"\u003eWho Really Wrote the Bible Part 4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/questioning-religion-part1/?lang=en\"\u003eQuestioning My Religion: Where the Journey Begins Part 1\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eWhat was deleted was not defeated. It was hidden — in desert caves, in mountain communities, in the stubborn memories of people who refused to forget. The institutional church won the battle for the canon, but the truth has a way of resurfacing. The Nag Hammadi texts waited seventeen centuries. The Dead Sea Scrolls waited nineteen. What else waits, buried by the institution, waiting to be found by those brave enough to dig?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"The Mass Deletion: How the Church Created Its Own Version of Christianity\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Discover the mass deletion of texts and beliefs that created institu
