03c/em\u003e — Matthew 7:15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eJesus Christ Himself gave the clearest possible warning about the method of spiritual subversion: the enemy does not announce himself. He does not come wearing the uniform of the adversary. He comes in sheep's clothing. He looks like a shepherd. He sounds like a teacher. He occupies the pulpit, leads the worship, and counsels the faithful. The sheep see one of their own. The wolf sees dinner.\u003c/p\u003e\n\u003cp\u003eThis warning was not abstract. It was operational intelligence from the Son of God about a specific strategy that would be deployed against His church for as long as the church exists. The infiltration of the church by its enemies — not through external attack but through internal disguise — is the defining pattern of spiritual warfare. And no organization in history has executed this strategy more thoroughly, more patiently, or more effectively than the Society of Jesus.\u003c/p\u003e\n\u003cp\u003eThe documentary \u003cem\u003eCatholic Confidential\u003c/em\u003e documents how the Jesuits infiltrated not only the Catholic Church but every Protestant denomination, using methods of disguise so sophisticated that even the most discerning observers were often fooled. The men who saw through the disguise — Samuel Morse, Charles Spurgeon, and others — left warnings that are as urgent today as when they were written.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Enemy Within — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"samuel-morse-the-man-who-saw-everything\"\u003eSamuel Morse: The Man Who Saw Everything\u003c/h2\u003e\n\u003ch3 id=\"the-inventor-who-decoded-the-real-message\"\u003eThe Inventor Who Decoded the Real Message\u003c/h3\u003e\n\u003cp\u003eSamuel Morse is remembered as the inventor of the telegraph and the Morse code — the man who revolutionized global communication. What is not remembered is that Morse was also one of the most perceptive analysts of the Jesuit infiltration strategy in American history. His observations, published in the 1830s and 1840s, describe a system of infiltration so comprehensive that it anticipates modern intelligence operations by more than a century.\u003c/p\u003e\n\u003cp\u003eMorse wrote with the precision of an engineer and the passion of a patriot:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"They are Jesuits. This society of men, after exerting their tyranny for upwards of 200 years, at length became so formidable to the world, threatening the entire subversion of all social order, that even the pope, whose devoted subjects they are, was compelled to dissolve them.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eMorse begins with the fundamental fact: the Jesuits became so dangerous that even the pope — their own supreme authority — was forced to dissolve them. This is the fact that should end every debate about whether the Jesuit threat is real. When the head of the organization that created the Jesuits concludes that they must be destroyed, the question of their danger is settled.\u003c/p\u003e\n\u003cp\u003eBut Morse's most important contribution was his analysis of the Jesuit method of disguise:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"They are a secret society, a sort of Masonic order with super-added features of revolting odiousness and a thousand times more dangerous.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe comparison to Freemasonry is significant. Morse recognized that the Jesuits operated as a secret society — not merely a religious order with some private practices but a fully secret society with hidden membership, hidden objectives, and hidden methods. The \"super-added features of revolting odiousness\" refer to the Jesuit willingness to use any means — including assassination, deception, and moral corruption — to achieve their goals. And \"a thousand times more dangerous\" because the Jesuits had something the Masons did not: the cover of the most powerful religious institution in the world.\u003c/p\u003e\n\u003ch3 id=\"the-invisible-army\"\u003eThe Invisible Army\u003c/h3\u003e\n\u003cp\u003eMorse then described the specific mechanism of infiltration with a clarity that should be studied by every intelligence analyst:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"They are not merely priests. They are merchants and lawyers and editors and men of any profession, having no outward badge by which to be recognized.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThis is the critical insight. The Jesuits are not identifiable by their dress, their profession, or their public identity. They can be anyone. The merchant who sells you goods. The lawyer who handles your case. The editor who shapes your newspaper. The teacher who educates your children. There is \"no outward badge\" — no way to identify them by external observation.\u003c/p\u003e\n\u003cp\u003eThis invisibility is not accidental. It is by design. The Jesuit system deliberately creates agents who are indistinguishable from the general population. A Jesuit priest in a Roman collar is visible. A Jesuit operating as a lawyer, a journalist, or a professor is invisible. And the invisible Jesuits are far more numerous — and far more dangerous — than the visible ones.\u003c/p\u003e\n\u003cp\u003eMorse completed his analysis with a description of the Jesuits' operational flexibility:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"They can assume any character, that of angels of light or ministers of darkness, to accomplish their one great end.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eAngels of light or ministers of darkness. The Jesuit can appear as the most devout Christian or the most committed secularist. He can lead a Bible study or edit a skeptical magazine. He can counsel a king toward war or a rebel toward peace. His character is not fixed. It is assumed — adopted for the mission, discarded when the mission changes. The only constant is \"their one great end\" — the expansion of Jesuit power.\u003c/p\u003e\n\u003ch2 id=\"the-naked-sword-of-rome\"\u003eThe Naked Sword of Rome\u003c/h2\u003e\n\u003ch3 id=\"dupres-metaphor-of-invisible-power\"\u003eDupre's Metaphor of Invisible Power\u003c/h3\u003e\n\u003cp\u003eThe French statesman Dupre captured the Jesuit strategy in a single, devastating metaphor:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"The Jesuits are a naked sword whose hilt is at Rome but its blade is everywhere, invisible until its stroke is felt.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThis metaphor deserves careful analysis. The hilt — the control mechanism — is in Rome. The blade — the cutting edge of power — is everywhere. And the blade is invisible until it strikes. You do not see the Jesuit influence in your government, your school, your church, or your media. You do not feel the blade until it cuts. And by the time you feel the cut, it is too late — the damage is done, the institution is compromised, and the Jesuit agent has already moved on to the next target.\u003c/p\u003e\n\u003cp\u003eThe invisibility of the blade is the key to the Jesuits' success. An enemy you can see, you can fight. An enemy you can identify, you can resist. But an enemy whose blade is invisible until its stroke is felt — that enemy is almost impossible to defeat, because by the time you know you are under attack, the attack has already succeeded.\u003c/p\u003e\n\u003ch2 id=\"margaret-cusk-and-the-universal-monarchy\"\u003eMargaret Cusk and the Universal Monarchy\u003c/h2\u003e\n\u003ch3 id=\"the-nun-who-understood-the-goal\"\u003eThe Nun Who Understood the Goal\u003c/h3\u003e\n\u003cp\u003eMargaret Cusk, a converted nun who had seen the Jesuit system from the inside, provided a perspective that outsiders could only guess at:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"The great idea of the Jesuit has always been a universal spiritual and temporal monarchy. When the Jesuit is expelled from one place, he is not slow to find another.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eTwo elements of this statement are critical. First, the goal: \"a universal spiritual and temporal monarchy.\" Not merely spiritual power (control over religious belief) or merely temporal power (control over governments and economies), but both. The Jesuits seek total power — power over what people believe and power over how they live. A universal monarchy that controls both the soul and the body, both the church and the state, both the inner life and the outer life of every human being on earth.\u003c/p\u003e\n\u003cp\u003eSecond, the resilience: \"When the Jesuit is expelled from one place, he is not slow to find another.\" The Jesuits have been expelled from more than eighty countries and territories throughout their history. Not one expulsion has been permanent. Not one has succeeded in eliminating Jesuit influence. They are expelled from Portugal and move to Spain. They are expelled from Spain and move to France. They are expelled from France and move to England. They are expelled from Europe and move to the Americas. They are expelled from the Americas and return to Europe. The organization is hydra-headed — cut off one manifestation and another appears instantly.\u003c/p\u003e\n\u003ch2 id=\"spurgeon-no-peace-with-rome\"\u003eSpurgeon: \"No Peace With Rome\"\u003c/h2\u003e\n\u003ch3 id=\"the-prince-of-preachers-warning\"\u003eThe Prince of Preachers' Warning\u003c/h3\u003e\n\u003cp\u003eCharles Haddon Spurgeon, the great Baptist preacher of Victorian England, known as the \"Prince of Preachers,\" was one of the most influential Protestant voices of the nineteenth century. His sermons were published weekly, read by millions, and shaped the thinking of an entire generation of English-speaking Christians. His assessment of the Jesuit threat was unambiguous:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Our ancient enemies have small belief in our common sense if they imagine we shall ever be able to trust them after having so often beheld the depths of Jesuitical cunning and duplicity.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eSpurgeon's phrase \"the depths of Jesuitical cunning and duplicity\" deserves emphasis. He did not describe the Jesuits as misguided or overzealous. He described them as cunning and duplicitous — deliberately deceptive, strategically dishonest, systematically untrustworthy. And he noted that this duplicity had been witnessed \"so often\" that any trust in the Jesuits would be a sign of stupidity, not charity.\u003c/p\u003e\n\u003cp\u003eHis conclusion was equally forceful:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"No peace with Rome is the motto of reason as well as of religion.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThis is not sectarian bigotry. This is the conclusion of one of the most brilliant and compassionate men in the history of Christianity — a man who was known for his generosity, his humor, and his genuine love for all people. Spurgeon's opposition to Rome was not based on hatred. It was based on evidence. He had \"beheld the depths of Jesuitical cunning\" and concluded that peace with such an organization was impossible — not because of prejudice but because of reason.\u003c/p\u003e\n\u003ch2 id=\"the-brownson-prophecy\"\u003eThe Brownson Prophecy\u003c/h2\u003e\n\u003ch3 id=\"the-catholic-converts-warning\"\u003eThe Catholic Convert's Warning\u003c/h3\u003e\n\u003cp\u003eOrestes Brownson was himself a Catholic convert — a man who had embraced Catholicism after years of spiritual searching. His warning about Jesuit ambitions is particularly significant because it came from inside the Catholic world:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Undoubtedly it is the intention of the Pope to possess this country. If the Catholic Church becomes predominant here, Protestants will all be exterminated.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eA Catholic convert warning that the Catholic Church intends to \"possess this country\" and that Protestants will be \"exterminated\" if it succeeds — this is not anti-Catholic propaganda. This is an insider's assessment, offered with the authority of someone who had seen the system from within and understood its ultimate objectives.\u003c/p\u003e\n\u003cp\u003eBrownson's use of the word \"exterminated\" is significant. He did not say Protestants would be converted or marginalized or outvoted. He said they would be exterminated. This is the language of the Inquisition, the St. Bartholomew's Day Massacre, and the Albigensian Crusade — all historical precedents for the Catholic Church's treatment of those who resist its authority.\u003c/p\u003e\n\u003ch2 id=\"the-infiltration-of-every-denomination\"\u003eThe Infiltration of Every Denomination\u003c/h2\u003e\n\u003ch3 id=\"the-strategy-of-educational-conquest\"\u003eThe Strategy of Educational Conquest\u003c/h3\u003e\n\u003cp\u003eThe Jesuit infiltration of Protestant denominations follows a specific pattern, repeated across centuries and continents. The first target is always education. The Jesuits understood from the beginning that whoever controls education controls the future. If you can shape the minds of the next generation of pastors, teachers, and leaders, you can reshape the institution they will lead.\u003c/p\u003e\n\u003cp\u003eThe Jesuit Ratio Studiorum — their educational plan — was the most sophisticated educational system in the sixteenth century. It produced graduates who were better educated, more articulate, and more intellectually capable than the products of any other system. Protestant families, seeking the best education for their children, sent them to Jesuit schools. Those children returned to their Protestant communities carrying ideas, assumptions, and loyalties that had been shaped by their Jesuit educators.\u003c/p\u003e\n\u003cp\u003eOver time, this strategy produced a gradual convergence. Protestant seminaries adopted Jesuit educational methods. Protestant theologians engaged with Jesuit scholarship. Protestant churches adopted practices and perspectives that had their origins in Jesuit thinking. The convergence was so gradual that most Protestants never noticed it was happening. Each small step seemed natural, reasonable, even progressive. The cumulative effect was the transformation of Protestant Christianity into something that would have been unrecognizable to Luther, Calvin, or Knox.\u003c/p\u003e\n\u003ch3 id=\"the-seminaries-capturing-the-source\"\u003eThe Seminaries: Capturing the Source\u003c/h3\u003e\n\u003cp\u003eThe most critical point of infiltration was the seminary — the institution where pastors are trained. Control the seminary and you control the pastors. Control the pastors and you control the churches. Control the churches and you control the beliefs and behavior of millions.\u003c/p\u003e\n\u003cp\u003eThe Jesuit strategy for seminary infiltration followed the pattern described in their instructions: \"Immediately upon the death of any person of post, let them take timely care to get some friend of our society preferred in his room.\" When a seminary professor retired or died, Jesuit-aligned candidates were positioned to fill the vacancy. When a seminary dean stepped down, a candidate sympathetic to Jesuit objectives was promoted. Over decades, this patient replacement transformed seminary faculties from bastions of Protestant orthodoxy into centers of theological liberalism, ecumenism, and accommodation with Rome.\u003c/p\u003e\n\u003cp\u003eThe results are visible today. Mainline Protestant seminaries teach theology that is virtually indistinguishable from progressive Catholic theology. The distinctive Protestant doctrines — sola scriptura, sola fide, the priesthood of all believers — have been marginalized or abandoned. The Reformation, which was fought specifically against the claims of Rome, is now treated in many Protestant seminaries as an unfortunate misunderstanding that should be healed through dialogue and reconciliation.\u003c/p\u003e\n\u003ch3 id=\"the-ecumenical-movement-unity-under-rome\"\u003eThe Ecumenical Movement: Unity Under Rome\u003c/h3\u003e\n\u003cp\u003eThe ecumenical movement — the effort to unite all Christian denominations — is the crowning achievement of the Jesuit infiltration strategy. On the surface, Christian unity is an admirable goal. Who could oppose Christians coming together in love and fellowship? But the ecumenical movement, as implemented, has consistently moved in one direction: toward Rome.\u003c/p\u003e\n\u003cp\u003eThe World Council of Churches, founded in 1948, has progressively adopted positions that align with Catholic social teaching while abandoning distinctive Protestant positions. Individual Protestant denominations have entered into formal dialogue with the Catholic Church, producing documents that minimize or eliminate the theological differences that justified the Reformation. The Anglican-Roman Catholic International Commission, the Lutheran-Catholic Joint Declaration on the Doctrine of Justification, and dozens of similar dialogues have all moved in the same direction — toward a reconciliation that effectively nullifies the Protestant Reformation.\u003c/p\u003e\n\u003cp\u003eThis is not unity. This is surrender. The ecumenical movement does not bring Rome toward Protestant positions. It brings Protestant positions toward Rome. And the Jesuits, who have been involved in ecumenical dialogue from the beginning, have ensured that the movement serves their ancient goal of universal spiritual monarchy.\u003c/p\u003e\n\u003ch2 id=\"pope-francis-the-culmination\"\u003ePope Francis: The Culmination\u003c/h2\u003e\n\u003ch3 id=\"the-first-jesuit-pope\"\u003eThe First Jesuit Pope\u003c/h3\u003e\n\u003cp\u003eIn 2013, Jorge Mario Bergoglio became Pope Francis — the first Jesuit pope in the history of the Catholic Church. This event was unprecedented. For nearly five centuries, the Jesuits had operated as a force within the Church, serving the papacy while simultaneously pursuing their own agenda. Now, for the first time, a Jesuit occupied the papal throne itself.\u003c/p\u003e\n\u003cp\u003eThe significance of this event cannot be overstated. The organization that even popes had feared — the organization that Clement XIV suppressed and was murdered for suppressing — now controlled the papacy directly. The power behind the throne had become the power on the throne. The general of an army that had operated in the shadows for centuries had emerged into the light, wearing the white robes of the Bishop of Rome.\u003c/p\u003e\n\u003cp\u003ePope Francis has pursued policies that align precisely with the Jesuit agenda described by the historical witnesses compiled in \u003cem\u003eCatholic Confidential\u003c/em\u003e. He has advanced ecumenical dialogue toward unprecedented levels of Catholic-Protestant convergence. He has engaged in inter-religious dialogue that positions the Catholic Church as the center of a universal spiritual framework. He has addressed global political issues — climate change, immigration, economic inequality — in ways that expand papal influence over secular governance.\u003c/p\u003e\n\u003ch3 id=\"the-strategy-fulfilled\"\u003eThe Strategy Fulfilled\u003c/h3\u003e\n\u003cp\u003eThe election of a Jesuit pope represents the fulfillment of the strategy described by Loyola in the sixteenth century. The Jesuits were told to \"gain the ascendant over princes\" and to ensure that their friends were \"preferred\" to every position of power. For five centuries, the Jesuits applied this strategy to kings, presidents, and prime ministers. In 2013, they applied it to the papacy itself.\u003c/p\u003e\n\u003cp\u003eThe man who sits in the chair of Peter is a member of the organization that Napoleon described as seeking \"power to control the world by the volition of a single man.\" The \"single man\" who controls the Jesuits now also controls the Catholic Church. The hilt and the blade have been united in one hand.\u003c/p\u003e\n\u003ch2 id=\"the-method-applied-to-every-church\"\u003eThe Method Applied to Every Church\u003c/h2\u003e\n\u003ch3 id=\"baptist-methodist-presbyterian-anglican\"\u003eBaptist, Methodist, Presbyterian, Anglican\u003c/h3\u003e\n\u003cp\u003eThe Jesuit infiltration is not limited to mainline denominations. Every branch of Christianity has been targeted. Baptist churches that once preached fierce independence from Rome now participate in ecumenical dialogues. Methodist churches that were born in revival now teach a social gospel indistinguishable from Catholic social teaching. Presbyterian churches founded on the sovereignty of God now defer to human institutions. Anglican churches that were created specifically to break free from papal authority now seek reunion with Rome.\u003c/p\u003e\n\u003cp\u003eIn each case, the pattern is the same: infiltrate the seminaries, replace the leadership, shift the theology, and gradually bring the denomination into alignment with Rome. The process takes generations, which is why it is so effective — no single generation sees enough change to sound the alarm. Each generation inherits a slightly different denomination and assumes that what it received is what has always been.\u003c/p\u003e\n\u003ch3 id=\"the-megachurch-movement\"\u003eThe Megachurch Movement\u003c/h3\u003e\n\u003cp\u003eEven the megachurch movement — which presents itself as non-denominational and independent — has been shaped by Jesuit influence. The seeker-sensitive approach, which prioritizes the comfort of the audience over the demands of the gospel, produces a Christianity that is spiritually inert — a Christianity that neither challenges Rome nor resists Jesuit infiltration. A church that has abandoned doctrinal distinctives has no basis for identifying or resisting infiltration. It is already infiltrated by default, because it has no immune system capable of detecting the virus.\u003c/p\u003e\n\u003cp\u003eThe removal of doctrine from the megachurch has been the Jesuits' greatest victory in American Protestantism. A church with no doctrine cannot identify false doctrine. A church that celebrates ambiguity cannot detect deception. A church that prizes unity above truth will unite with anything — including Rome.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-reality\"\u003eThe Spiritual Reality\u003c/h2\u003e\n\u003ch3 id=\"wolves-in-every-flock\"\u003eWolves in Every Flock\u003c/h3\u003e\n\u003cp\u003eJesus' warning about wolves in sheep's clothing is not a metaphor. It is a description of reality. There are wolves in every flock — in every denomination, every church, every Bible study, every seminary. Some of these wolves are conscious agents of an organization. Some are unconscious products of a system that shaped their thinking without their knowledge. All are dangerous.\u003c/p\u003e\n\u003cp\u003eThe solution is not suspicion but discernment — the ability to test every spirit, every teaching, every leader against the standard of Scripture. \"By their fruits ye shall know them\" (Matthew 7:20). The fruit of Jesuit infiltration is the weakening of Protestant distinctives, the movement toward Rome, the replacement of biblical authority with institutional authority, and the substitution of human tradition for divine revelation.\u003c/p\u003e\n\u003cp\u003eAny church, denomination, or movement that displays this fruit — regardless of its name, its history, or its public identity — has been touched by the infiltration that Samuel Morse described, that Spurgeon warned against, and that Jesus Himself predicted.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Enemy Within — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Hosts — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Darkness Into Light — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Fallen Angels — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/jesuit-oath-obedience-unto-death/?lang=en\"\u003eThe Jesuit Oath: \"I Will Believe White Is Black If the Church Defines It\"\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/mass-deletion-church-created-christianity/?lang=en\"\u003eThe Mass Deletion: How the Church Created Its Own Version of Christianity\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/why-satan-doesnt-fear-most-christians/?lang=en\"\u003eWhy Satan Does Not Fear Most Christians\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/illuminati-1666-part1/?lang=en\"\u003eThe Jews, Jesus, and the Illuminati of 1666 Part 1\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe wolf does not need to defeat the shepherd. He only needs to become the shepherd. When the man at the pulpit was trained by the wolves, when the seminary that formed him was captured by the wolves, when the denomination that ordained him was redirected by the wolves — then the flock follows the wolf willingly, gratefully, and never knows it has been led to the slaughter. The infiltration is complete not when the church falls but when it can no longer tell the difference between the shepherd's voice and the wolf's.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/history/\",\"className\":\"category-badge\",\"children\":\"history\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbit
