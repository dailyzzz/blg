roverbs 12:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eFor decades, American public schools have required children to dissect animals — frogs, fetal pigs, cats, rats, and other creatures — as part of their \"science education.\" This practice, presented as a harmless educational exercise, is in fact a carefully designed desensitization program that teaches children to suppress their natural empathy, obey institutional authority without question, and treat living beings as objects to be cut apart for the sake of \"knowledge.\"\u003c/p\u003e\n\u003cp\u003eThe vivisection programs in public schools were not developed by compassionate educators seeking to inspire a love of biology. They were developed by the same Rockefeller-funded educational establishment that restructured American schooling to produce compliant workers and obedient consumers. The dissection requirement teaches children that authority figures can compel them to perform acts that violate their conscience — and that resisting this compulsion will be punished with bad grades, social ostracism, and institutional disapproval.\u003c/p\u003e\n\u003cp\u003eHoward Pittman learned during his NDE that the demonic hierarchy operates through systems that appear benign but serve darkness. The 97.5% of Christians who were failing had \"never made Jesus Lord\" — they had surrendered their moral authority to earthly institutions. The school dissection requirement is one of the earliest and most powerful moments of this surrender: a child is told to cut open a living or recently killed creature, the child's conscience protests, and the child is taught that institutional authority overrides conscience.\u003c/p\u003e\n\u003cp\u003eThis is the Jesuit method, applied to children: infiltration \"cloaked with cunning,\" the pursuit of \"absolute power\" through education, and the practice of \"every species of vice\" when it serves the order's goals. Napoleon and Adams both recognized the Jesuits' unique threat. General Tambulini governed from his room. Pope Clement XIV was poisoned for defying them.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-history-of-school-dissection\"\u003eThe History of School Dissection\u003c/h2\u003e\n\u003ch3 id=\"how-it-began\"\u003eHow It Began\u003c/h3\u003e\n\u003cp\u003eAnimal dissection entered American schools in the early 20th century as part of the broader restructuring of public education along industrial lines. The same era that produced the Flexner Report (which restructured medical education) also produced the transformation of public schooling from classical education to industrial training.\u003c/p\u003e\n\u003cp\u003eThe General Education Board — founded by John D. Rockefeller in 1903 — explicitly stated its goal: \"In our dream, we have limitless resources, and the people yield themselves with perfect docility to our molding hand.\" The Board funded the restructuring of American education, replacing classical learning with vocational training, critical thinking with rote obedience, and moral education with \"scientific\" materialism.\u003c/p\u003e\n\u003cp\u003eAnimal dissection was introduced as part of this materialist agenda. By teaching children to view living creatures as mechanisms — assemblies of organs, tissues, and systems to be examined and catalogued — the school system replaced the biblical understanding of creation (that animals are living beings placed under human stewardship) with the Darwinian-materialist view (that animals are biological machines produced by random mutation and natural selection).\u003c/p\u003e\n\u003ch3 id=\"the-expansion-of-dissection-programs\"\u003eThe Expansion of Dissection Programs\u003c/h3\u003e\n\u003cp\u003eBy the mid-20th century, animal dissection was a standard component of American biology education. Millions of animals were killed annually for school dissection:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e6 million frogs\u003c/strong\u003e per year\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1 million fetal pigs\u003c/strong\u003e per year\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e170,000 cats\u003c/strong\u003e per year (many sourced from animal shelters)\u003c/li\u003e\n\u003cli\u003eHundreds of thousands of rats, earthworms, crayfish, fish, and other animals\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe supply chain for this industry is disturbing. Biological supply companies like Carolina Biological, Ward's Science, and Fisher Scientific maintain vast operations to source, kill, preserve, and distribute animals to schools. Frogs are wild-caught from ecosystems where their removal causes ecological damage. Cats are procured from animal shelters — the same shelters where families surrender pets they can no longer care for, trusting that the animals will be humanely euthanized, not sold for dissection.\u003c/p\u003e\n\u003cp\u003eFetal pigs are harvested from the uteruses of pregnant sows at slaughterhouses. The sow is killed, the uterus is opened, and the unborn piglets are extracted, injected with preservative, and shipped to schools. This process is performed on an industrial scale, with millions of fetal pigs distributed annually.\u003c/p\u003e\n\u003ch2 id=\"the-desensitization-effect\"\u003eThe Desensitization Effect\u003c/h2\u003e\n\u003ch3 id=\"what-the-research-shows\"\u003eWhat the Research Shows\u003c/h3\u003e\n\u003cp\u003ePsychological research on the effects of animal dissection on children reveals a disturbing pattern:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSuppression of Empathy\u003c/strong\u003e: Children who are required to dissect animals report feelings of disgust, sadness, and moral conflict — all of which are healthy emotional responses to the infliction of harm on another creature. When these feelings are overridden by institutional pressure (grades, peer pressure, teacher authority), the child learns to suppress empathetic responses in the presence of authority figures. This is the foundational lesson of obedience training: your feelings don't matter; authority does.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNormalization of Violence\u003c/strong\u003e: Repeated exposure to the cutting, probing, and handling of dead animal tissue normalizes the sight and sensation of violence. Children who initially feel revulsion gradually become habituated, as the brain's natural alarm responses are systematically dulled through repetition.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAuthority Compliance\u003c/strong\u003e: The dissection requirement teaches children that institutional authority can compel them to perform acts that violate their personal moral code. Children who refuse to dissect are penalized with lower grades, sent to the principal's office, or socially isolated. The lesson is clear: obey authority or suffer consequences.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eObjectification of Living Beings\u003c/strong\u003e: By treating animals as objects to be disassembled, dissection teaches children to view living beings through a purely materialist lens. This mindset extends naturally to human beings — if animals are machines, then humans are merely more complex machines, to be managed, manipulated, and disposed of by those with the authority to do so.\u003c/p\u003e\n\u003ch3 id=\"the-serial-killer-connection\"\u003eThe Serial Killer Connection\u003c/h3\u003e\n\u003cp\u003eFBI behavioral profiling has long identified animal cruelty as one of the key predictors of future violence against humans. The \"triad\" of serial killer warning signs includes animal cruelty, fire-setting, and bed-wetting. While school dissection is not the same as spontaneous animal cruelty, the psychological mechanism is similar: both involve the suppression of empathy in the context of causing harm to a living creature.\u003c/p\u003e\n\u003cp\u003eThis is not to say that every child who dissects a frog becomes a serial killer. The point is that the institutional requirement to harm animals as a condition of academic success creates a template for moral compromise that can be exploited throughout life. The child who learns to suppress empathy in the dissection lab may later suppress empathy in the boardroom, the military, the operating room, or the government office.\u003c/p\u003e\n\u003ch2 id=\"the-rockefeller-educational-agenda\"\u003eThe Rockefeller Educational Agenda\u003c/h2\u003e\n\u003ch3 id=\"schools-as-factories\"\u003eSchools as Factories\u003c/h3\u003e\n\u003cp\u003eThe Rockefeller educational model treats schools as factories that produce workers. The General Education Board's explicit goal was to create a population that would \"yield themselves with perfect docility to our molding hand.\" Animal dissection is one of the molding tools.\u003c/p\u003e\n\u003cp\u003eIn a factory, workers must perform assigned tasks without moral objection. They must follow instructions, meet quotas, and suppress personal feelings that might interfere with productivity. The dissection requirement trains children for this role: perform the assigned task, suppress your feelings, and accept the grade. It is vocational training disguised as science education.\u003c/p\u003e\n\u003ch3 id=\"the-false-choice-of-science\"\u003eThe False Choice of \"Science\"\u003c/h3\u003e\n\u003cp\u003eThe dissection requirement is justified as necessary for science education. But this justification is false on multiple levels:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAlternative Methods Exist\u003c/strong\u003e: Virtual dissection software, detailed anatomical models, videos, and interactive simulations provide equal or superior educational outcomes without killing animals. Multiple studies have shown that students who use alternatives perform as well or better on anatomy exams than students who dissect real animals.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDissection Doesn't Teach Science\u003c/strong\u003e: Cutting open a dead animal teaches anatomy, not biology. Biology is the study of living systems — how they function, interact, and adapt. You cannot study life by destroying it. Dissection teaches the geography of death, not the processes of life.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReal Scientists Don't Dissect in Training\u003c/strong\u003e: The claim that future doctors and scientists need school dissection experience is false. Medical schools use cadavers, surgical simulations, and clinical rotations — not frog dissection. No medical school has ever required previous animal dissection experience for admission.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"stewardship-vs-domination\"\u003eStewardship vs. Domination\u003c/h3\u003e\n\u003cp\u003eScripture teaches that humans are stewards of God's creation — not owners, not exploiters, but caretakers. Genesis 1:26-28 grants dominion, which is not the same as domination. Dominion implies responsibility, care, and wisdom. Domination implies exploitation, cruelty, and control.\u003c/p\u003e\n\u003cp\u003eThe dissection requirement teaches domination: the animal exists for your use, your education, your grade. This is the Satanic inversion of the biblical principle: instead of caring for creation, you destroy it — and you call the destruction \"learning.\"\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the spiritual realm is more real than the physical. When a child suppresses their God-given conscience to obey institutional authority, something happens in the spiritual realm. A door opens. A connection is weakened. The voice of the Holy Spirit — which speaks through conscience — is taught to be irrelevant. This is exactly what the demonic hierarchy wants: people who cannot hear God's voice because they have been trained to ignore it.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-educational-method\"\u003eThe Jesuit Educational Method\u003c/h3\u003e\n\u003cp\u003eThe Jesuit order has historically been one of the most powerful forces in global education. Their network of schools and universities spans every continent. The Jesuit educational method emphasizes obedience to authority, intellectual formation shaped by institutional goals, and the subordination of personal conscience to the order's mission.\u003c/p\u003e\n\u003cp\u003eThe public school dissection requirement reflects this same method, secularized and stripped of its religious language. The authority figure is the teacher, not the priest. The institution is the school, not the Church. The demand for obedience is the same.\u003c/p\u003e\n\u003cp\u003ePope Clement XIV was poisoned for defying the Jesuits. Children who defy the dissection requirement are merely given failing grades. The mechanism of control is the same; only the severity differs.\u003c/p\u003e\n\u003ch2 id=\"what-parents-can-do\"\u003eWhat Parents Can Do\u003c/h2\u003e\n\u003ch3 id=\"know-your-rights\"\u003eKnow Your Rights\u003c/h3\u003e\n\u003cp\u003eEvery US state allows students to opt out of dissection on moral, ethical, or religious grounds, though the specific protections vary by state. Several states — including California, Florida, Illinois, and New York — have specific laws protecting students' right to refuse dissection.\u003c/p\u003e\n\u003cp\u003eParents should:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eResearch their state's dissection opt-out laws\u003c/li\u003e\n\u003cli\u003eCommunicate with teachers and administrators before the dissection unit begins\u003c/li\u003e\n\u003cli\u003eRequest alternative assignments that provide equivalent educational content\u003c/li\u003e\n\u003cli\u003eSupport their children's moral development by affirming that conscience matters more than grades\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"the-bigger-picture\"\u003eThe Bigger Picture\u003c/h3\u003e\n\u003cp\u003eThe dissection issue is a microcosm of the larger battle for the souls of our children. Every time a child is taught to suppress conscience and obey institutional authority, the spiritual foundation of that child's life is weakened. Every time a parent supports their child's moral instincts against institutional pressure, that foundation is strengthened.\u003c/p\u003e\n\u003cp\u003eThis is the spiritual warfare Ephesians 6:12 describes — not a battle fought with swords and shields, but with truth and lies, conscience and compliance, faith and fear.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — research on educational system manipulation and Rockefeller influence\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — spiritual warfare and the suppression of conscience\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit educational methods and institutional control\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Pro
