\u003eThe Scriptures describe the wicked as those who borrow without intention to repay — who take what is not theirs and structure arrangements to ensure they never have to return it. The Great Taking, as documented by researcher David Rogers Webb, reveals that this ancient pattern has been codified into modern law. Through decades of quiet legal changes, the financial system has been restructured so that the securities you believe you own — your stocks, bonds, mutual funds, retirement accounts — are no longer legally yours. You hold an \"entitlement\" to them, and in a financial crisis, that entitlement is subordinate to the claims of secured creditors. Your assets have already been pledged as collateral for debts you never agreed to guarantee.\u003c/p\u003e\n\u003cp\u003eThis is not speculation. It is statute. The legal framework has been built over decades, tested in court, and harmonized across jurisdictions. The taking has not yet occurred, but the mechanism is complete. The Confliction album track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e illuminates this hidden reality — the fire that burns unseen, the danger that exists in the darkness where few think to look, the destruction that is prepared in secret before it emerges into the light.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"david-rogers-webb-the-researcher\"\u003eDavid Rogers Webb: The Researcher\u003c/h2\u003e\n\u003cp\u003eDavid Rogers Webb is a former hedge fund manager and financial industry insider who spent decades working within the global financial system before turning his expertise to investigating its architecture. His book and documentary, both titled \"The Great Taking,\" present a detailed legal and historical analysis of how the ownership of securities has been systematically undermined.\u003c/p\u003e\n\u003cp\u003eWebb's credentials are not those of an outsider looking in. He managed money at the highest levels. He understood derivatives, clearing systems, and securities law from the inside. His work is not based on conjecture — it is based on a meticulous examination of legal texts, UCC revisions, regulatory changes, and the structure of the modern securities holding system.\u003c/p\u003e\n\u003cp\u003eHis central thesis is devastating in its simplicity: the legal changes that have been implemented over the past fifty years have converted securities ownership into a subordinated claim — an \"entitlement\" that is inferior to the claims of secured creditors. In the event of a systemic financial failure, the secured creditors (primarily derivatives counterparties and large financial institutions) will have first claim on all securities, including those in your brokerage account, your 401(k), and your IRA.\u003c/p\u003e\n\u003ch2 id=\"the-ucc-article-8-revolution\"\u003eThe UCC Article 8 Revolution\u003c/h2\u003e\n\u003cp\u003eThe mechanism of the Great Taking is rooted in changes to Article 8 of the Uniform Commercial Code (UCC) — the body of law that governs commercial transactions in the United States and has been harmonized internationally through similar frameworks.\u003c/p\u003e\n\u003cp\u003ePrior to the revisions, when you purchased a stock or bond, you held a direct property interest in that security. You were the owner, in the same legal sense that you own your house or your car. Your brokerage held the security on your behalf, but the ownership was yours — a direct property right that could not be taken without due process.\u003c/p\u003e\n\u003cp\u003eThe revised Article 8, adopted in the 1990s, introduced a new category: the \"securities entitlement.\" Under this framework, when you purchase a security through a broker, you do not receive a direct property interest. Instead, you receive an \"entitlement\" — a claim against your broker for the value of the security. The broker, in turn, holds the security (or an entitlement to it) at the Depository Trust Company (DTC), the central clearinghouse for virtually all securities in the United States.\u003c/p\u003e\n\u003cp\u003eThe distinction between ownership and entitlement is legally critical. A property owner has a direct claim on the property itself. An entitlement holder has a claim against an intermediary — and that claim is subordinate to the claims of the intermediary's secured creditors. If the intermediary fails, the entitlement holder stands behind the secured creditors in the bankruptcy queue.\u003c/p\u003e\n\u003ch2 id=\"the-depository-trust-company\"\u003eThe Depository Trust Company\u003c/h2\u003e\n\u003cp\u003eThe Depository Trust Company (DTC) is the entity that holds virtually all publicly traded securities in the United States. When you buy stock through your broker, the shares are not registered in your name. They are registered in the name of \"Cede \u0026#x26; Co.\" — the nominee name of the DTC. Your broker has an entitlement from the DTC. You have an entitlement from your broker. The actual ownership — the direct property right — belongs to Cede \u0026#x26; Co.\u003c/p\u003e\n\u003cp\u003eThis structure was implemented ostensibly for efficiency. Moving physical stock certificates between parties with every trade was cumbersome and slow. The DTC centralized the holding of securities, enabling electronic settlement. But the efficiency came at a cost that was never explained to investors: the transfer of ownership from individual investors to a centralized entity.\u003c/p\u003e\n\u003cp\u003eYou are not the owner of your stocks. Cede \u0026#x26; Co. is. You hold a chain of entitlements — a claim against your broker, who holds a claim against the DTC, which holds the actual securities. In a system functioning normally, this distinction is invisible. In a systemic crisis, it becomes the difference between having assets and having nothing.\u003c/p\u003e\n\u003ch2 id=\"rehypothecation-your-assets-their-collateral\"\u003eRehypothecation: Your Assets, Their Collateral\u003c/h2\u003e\n\u003cp\u003eThe entitlement structure enables a practice called rehypothecation — the use of client assets as collateral for the broker's own borrowing and trading activities. When your broker holds your securities as entitlements rather than direct property, it can legally pledge those securities as collateral for its own derivatives positions, margin loans, and other financial obligations.\u003c/p\u003e\n\u003cp\u003eThis is not a fringe practice. It is the standard operating procedure of the global financial system. Broker-dealer agreements — the fine print you accept when opening a brokerage account — typically include provisions allowing the broker to rehypothecate your securities. Your stocks are being used to back bets you never made, in markets you have never heard of, with counterparties you will never know.\u003c/p\u003e\n\u003cp\u003eWhen the broker fails — and in a systemic crisis, multiple brokers will fail — the secured creditors who hold your rehypothecated securities as collateral have first claim. Your entitlement is subordinate. The assets you thought you owned will be used to settle the broker's debts, and you will receive whatever remains — which, in a systemic failure, will be nothing.\u003c/p\u003e\n\u003ch2 id=\"safe-harbor-the-legal-shield\"\u003eSafe Harbor: The Legal Shield\u003c/h2\u003e\n\u003cp\u003eThe framework is reinforced by \"safe harbor\" provisions in bankruptcy law that protect derivatives counterparties from the normal process of bankruptcy proceedings. Under these provisions, derivatives counterparties can seize collateral immediately — without waiting for bankruptcy court approval, without the \"automatic stay\" that normally protects assets in bankruptcy.\u003c/p\u003e\n\u003cp\u003eThis means that in a bank or broker failure, derivatives counterparties will seize their collateral — including your rehypothecated securities — before the bankruptcy process even begins. By the time a court adjudicates your entitlement claim, the assets will be gone. Legally and irreversibly gone.\u003c/p\u003e\n\u003cp\u003eWebb documents how these safe harbor provisions were expanded over decades, through legislation including the Bankruptcy Abuse Prevention and Consumer Protection Act of 2005 — passed, ironically, just three years before the derivatives-driven 2008 crisis that demonstrated exactly how dangerous these instruments were.\u003c/p\u003e\n\u003ch2 id=\"international-harmonization\"\u003eInternational Harmonization\u003c/h2\u003e\n\u003cp\u003eThe Great Taking is not an American phenomenon. The legal framework has been harmonized across jurisdictions through international agreements and model laws. The EU's Settlement Finality Directive, Financial Collateral Directive, and the Hague Convention on the Law Applicable to Certain Rights in Respect of Securities Held with an Intermediary all establish similar frameworks that subordinate entitlement holders to secured creditors.\u003c/p\u003e\n\u003cp\u003eThis harmonization ensures that the Great Taking can operate globally. Securities held in any major financial market — New York, London, Frankfurt, Tokyo, Hong Kong — are subject to the same entitlement structure and the same subordination to secured creditors. There is no jurisdiction shopping. The legal framework is universal.\u003c/p\u003e\n\u003cp\u003eThe harmonization was not accidental. It was coordinated through international bodies including the BIS, IOSCO (International Organization of Securities Commissions), and UNIDROIT (International Institute for the Unification of Private Law). The entities that coordinated global CBDC development are the same entities that coordinated the legal framework for asset seizure. The consistency of agenda is unmistakable.\u003c/p\u003e\n\u003ch2 id=\"the-trigger-scenario\"\u003eThe Trigger Scenario\u003c/h2\u003e\n\u003cp\u003eWebb describes a specific scenario in which the Great Taking would be executed:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eA derivatives-driven financial crisis triggers the failure of multiple major financial institutions simultaneously — as nearly happened in 2008 and as documented in \u003ca href=\"/derivatives-weapons-mass-destruction/?lang=en\"\u003eDerivatives: Weapons of Mass Financial Destruction\u003c/a\u003e.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSafe harbor provisions allow derivatives counterparties to immediately seize collateral — including rehypothecated client securities — without court authorization.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eRemaining client securities held at the DTC are subject to claims by secured creditors of the failed brokers and clearing entities.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eEntitlement holders (individual investors, pension funds, retirement accounts) find that their \"assets\" have been used to settle obligations they never authorized.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe bail-in framework — detailed in \u003ca href=\"/bail-ins-your-money-is-not-yours/?lang=en\"\u003eBail-Ins: Your Money Is Not Yours\u003c/a\u003e — converts remaining depositor and creditor claims into equity in the restructured institutions.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe CBDC system — described in \u003ca href=\"/cbdc-chains-programmable-money/?lang=en\"\u003eCBDC Chains: The Programmable Money That Controls You\u003c/a\u003e — is deployed as the replacement financial infrastructure, with direct central bank control over all money.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThe sequence is not speculative. Each component exists in law and regulation today. The scenario requires only the trigger — a systemic derivatives failure — to set the entire sequence in motion.\u003c/p\u003e\n\u003ch2 id=\"what-you-can-do\"\u003eWhat You Can Do\u003c/h2\u003e\n\u003cp\u003eWebb's work is not merely diagnostic — it is intended to provoke action. His recommendations include:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDirect registration.\u003c/strong\u003e Removing your securities from the entitlement chain by requesting direct registration (DRS) through the transfer agent of each company whose shares you own. Direct-registered shares are held in your name, not in the name of Cede \u0026#x26; Co., and are not subject to the entitlement structure.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePhysical possession.\u003c/strong\u003e For bonds and other instruments, requesting physical certificates where available. Physical possession establishes direct property rights.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLegislative action.\u003c/strong\u003e Demanding that state and federal legislators reverse the UCC Article 8 changes and restore direct property rights for securities holders.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAwareness.\u003c/strong\u003e The Great Taking depends on obscurity. The legal changes were made quietly, over decades, without public awareness or debate. The most important defense is understanding — knowing what has been done and demanding that it be undone.\u003c/p\u003e\n\u003ch2 id=\"biblical-reflection\"\u003eBiblical Reflection\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"The thief cometh not, but for to steal, and to kill, and to destroy: I am come that they might have life, and that they might have it more abundantly.\" — John 10:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe thief does not announce himself. He comes quietly, in the dark, when the household is sleeping. The Great Taking has been constructed in precisely this manner — not through dramatic seizure but through the quiet revision of legal texts that most people never read and fewer understand. The property rights that generations of investors assumed they held have been replaced with subordinated entitlements through changes so technical that they escaped public notice entirely. The thief has already been in the house. He has already replaced the locks. He is simply waiting for the right moment to close the door.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/229-Digital_Dollar_Dragnet.mp4\"\u003eDigital Dollar Dragnet\u003c/a\u003e — The planned seizure of financial assets\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/161-CBDC_Chains.mp4\"\u003eCBDC Chains\u003c/a\u003e — The programmable money trap\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/bail-ins-your-money-is-not-yours/?lang=en\"\u003eBail-Ins: Your Money Is Not Yours\u003c/a\u003e — The companion mechanism for seizing bank deposits during financial crisis\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/derivatives-weapons-mass-destruction/?lang=en\"\u003eDerivatives: Weapons of Mass Financial Destruction\u003c/a\u003e — The trigger mechanism that will set the Great Taking in motion\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cbdc-chains-programmable-money/?lang=en\"\u003eCBDC Chains: The Programmable Money That Controls You\u003c/a\u003e — The replacement financial system waiting in the wings\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThey did not take your assets by force. They took them by law — by rewriting the legal definition of ownership so quietly that you never noticed the change. Your brokerage statement still shows the same numbers. Your retirement account still displays the same balance. But the legal reality beneath those numbers has been transformed. You hold entitlements, not property. Claims, not assets. Promises, not possessions. And when the system that made those promises fails, the promises will be the first thing that disappears. The thief has already been in the house. He is simply waiting for the crisis to close the door behind him.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/finance/\",\"className\":\"category-badge\",\"children\":\"finance\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"The Great Taking: How They'll Seize Your Financial Assets\"}],[\
