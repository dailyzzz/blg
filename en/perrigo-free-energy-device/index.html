]}],[\"$\",\"$La\",null,{}]]}]}]]}]}]]}]]}],{\"children\":[[\"lang\",\"en\",\"d\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L8\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L9\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[[\"slug\",\"perrigo-free-energy-device\",\"d\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L8\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L9\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$Lb\",null,[\"$\",\"$Lc\",null,{\"children\":[\"$Ld\",[\"$\",\"$Le\",null,{\"promise\":\"$@f\"}]]}]]}],{},null,false]},null,false]},null,false]},null,false],[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L10\",null,{\"children\":\"$L11\"}],null],[\"$\",\"$L12\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$4\",null,{\"fallback\":null,\"children\":\"$L13\"}]}]}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$14\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"15:T3179,"])</script><script>self.__next_f.push([1,"\u003ch1 id=\"the-peculiar-story-of-he-perrigos-free-energy-device\"\u003eThe Peculiar Story of H.E. Perrigo's FREE ENERGY Device\u003c/h1\u003e\n\u003ch2 id=\"the-ancient-pattern\"\u003eThe Ancient Pattern\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"For the love of money is the root of all evil: which while some coveted after, they have erred from the faith, and pierced themselves through with many sorrows.\"\u003c/em\u003e — 1 Timothy 6:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eIn the forgotten corners of American history, there are stories of inventors who built devices that generated energy from seemingly nothing — devices that threatened to overthrow the petroleum-based energy monopoly and liberate humanity from its dependence on fossil fuels. These inventors were silenced. Their devices vanished. Their names were erased from history. And the energy monopoly continued, decade after decade, charging the world for something that should have been free.\u003c/p\u003e\n\u003cp\u003eH.E. Perrigo is one such inventor. His story — brief, mysterious, and ultimately tragic — illustrates the fate that awaits anyone who challenges the energy establishment. Perrigo built a device. The device apparently worked. Then Perrigo and his device disappeared from the historical record, leaving behind only fragments of evidence that something remarkable was created and something terrible was done to suppress it.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown during his NDE that the demonic hierarchy organizes to steal, kill, and destroy. The suppression of free energy technology is theft on a cosmic scale — the theft of humanity's birthright, the theft of God's provision through the natural energies of creation, the theft of freedom itself. The 97.5% who are failing pay their electric bills, fill their gas tanks, and heat their homes without ever knowing that the energy they pay for could be free.\u003c/p\u003e\n\u003cp\u003eNapoleon called the Jesuits \"a military organization\" pursuing \"absolute power.\" Control of energy is control of civilization. The Jesuits and their allied secret societies — working through the Rockefeller energy empire and its successors — have ensured that free energy technology remains suppressed, its inventors silenced, and its history erased. Pope Clement XIV was poisoned for defying them. Free energy inventors have met similar fates.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-perrigo-device\"\u003eThe Perrigo Device\u003c/h2\u003e\n\u003ch3 id=\"what-we-know\"\u003eWhat We Know\u003c/h3\u003e\n\u003cp\u003eH.E. Perrigo reportedly developed an electromagnetic device in the early 20th century that generated more energy than it consumed — an apparent violation of the law of conservation of energy as conventionally understood. The device was described as:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eA \u003cstrong\u003eself-running electromagnetic motor/generator\u003c/strong\u003e that produced usable electrical output\u003c/li\u003e\n\u003cli\u003eBased on principles of \u003cstrong\u003eelectromagnetic resonance\u003c/strong\u003e and \u003cstrong\u003emagnetic flux manipulation\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eCapable of powering household equipment without external fuel or power source\u003c/li\u003e\n\u003cli\u003eDemonstrated to witnesses who confirmed its operation\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe details of Perrigo's device are sparse — which is itself significant. The historical record has been systematically stripped of information about free energy inventors, making research difficult by design. What remains are fragments: newspaper mentions, patent applications, correspondence, and the testimony of witnesses who saw the devices operate.\u003c/p\u003e\n\u003ch3 id=\"what-happened\"\u003eWhat Happened\u003c/h3\u003e\n\u003cp\u003eThe pattern that befell Perrigo is the same pattern that has befallen virtually every free energy inventor in history:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eInvention\u003c/strong\u003e: The inventor builds a working device\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDemonstration\u003c/strong\u003e: The device is shown to witnesses, investors, or the press\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAttention\u003c/strong\u003e: The demonstration attracts attention from powerful interests\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSuppression\u003c/strong\u003e: The inventor is bought off, threatened, discredited, or eliminated\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDisappearance\u003c/strong\u003e: The device vanishes — confiscated, destroyed, or hidden\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eErasure\u003c/strong\u003e: The inventor's story is removed from the historical record\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003ePerrigo's story follows this pattern. The device was built, it was demonstrated, and then both the device and its inventor faded from public awareness. The energy establishment continued unchallenged.\u003c/p\u003e\n\u003ch2 id=\"the-suppression-of-free-energy\"\u003eThe Suppression of Free Energy\u003c/h2\u003e\n\u003ch3 id=\"the-rockefeller-energy-monopoly\"\u003eThe Rockefeller Energy Monopoly\u003c/h3\u003e\n\u003cp\u003eThe suppression of free energy technology must be understood in the context of the Rockefeller energy monopoly. Standard Oil — John D. Rockefeller's company — controlled approximately 90% of American oil refining by the 1880s. Although Standard Oil was broken up by the Supreme Court in 1911, the successor companies (ExxonMobil, Chevron, etc.) continue to dominate the global energy industry.\u003c/p\u003e\n\u003cp\u003eThe Rockefeller dynasty's wealth and power depend on humanity's continued use of fossil fuels. Free energy technology — any technology that generates usable energy without fossil fuel consumption — is an existential threat to this empire. The Rockefellers have therefore invested heavily in suppressing free energy:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePatent acquisition\u003c/strong\u003e: Companies acquire free energy patents and shelve them\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRegulatory capture\u003c/strong\u003e: Energy regulations are written to exclude alternative technologies\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAcademic control\u003c/strong\u003e: Rockefeller-funded universities teach physics in ways that make free energy seem impossible\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMedia control\u003c/strong\u003e: Mainstream media dismisses free energy research as pseudoscience\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInventor suppression\u003c/strong\u003e: Individual inventors face legal, financial, and physical threats\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-physics-establishments-role\"\u003eThe Physics Establishment's Role\u003c/h3\u003e\n\u003cp\u003eThe academic physics establishment serves as a gatekeeper against free energy. Any researcher who claims to have developed a device that generates more energy than it consumes is immediately dismissed as a fraud or a crank, because the laws of thermodynamics \"prohibit\" such a device.\u003c/p\u003e\n\u003cp\u003eBut the laws of thermodynamics were formulated in the 19th century based on observations of heat engines — steam engines and their successors. They describe the behavior of closed systems in thermal equilibrium. They do not necessarily apply to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOpen systems\u003c/strong\u003e that draw energy from the ambient environment\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eElectromagnetic systems\u003c/strong\u003e that tap into zero-point energy or vacuum fluctuations\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResonant systems\u003c/strong\u003e that amplify energy through constructive interference\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNovel physical phenomena\u003c/strong\u003e not accounted for in 19th-century thermodynamics\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe physics establishment's blanket dismissal of free energy serves the same function as the \"tin foil hat\" meme: it prevents investigation by triggering automatic ridicule. And this dismissal is enforced by the same Rockefeller-funded institutions that benefit from the energy monopoly.\u003c/p\u003e\n\u003ch3 id=\"nikola-tesla-the-most-famous-suppression\"\u003eNikola Tesla: The Most Famous Suppression\u003c/h3\u003e\n\u003cp\u003eThe most famous free energy suppression involves Nikola Tesla, who claimed to have developed technology for wireless energy transmission and energy extraction from the ambient environment. Tesla's Wardenclyffe Tower — designed for wireless power transmission — was demolished after J.P. Morgan withdrew funding upon learning that Tesla's system could not be metered (and therefore could not be used to charge customers).\u003c/p\u003e\n\u003cp\u003eTesla's story establishes the template: energy that cannot be metered cannot be monetized, and energy that cannot be monetized cannot be allowed to exist. The energy monopoly is not about providing energy — it is about selling energy. Free energy eliminates the sale, and therefore must be eliminated.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"gods-provision-suppressed\"\u003eGod's Provision Suppressed\u003c/h3\u003e\n\u003cp\u003eGod created a universe filled with energy. The sun radiates more energy in one second than humanity uses in a year. The Earth's magnetic field contains vast energy. The quantum vacuum contains energy at every point in space. Energy is not scarce — it is abundant beyond human comprehension.\u003c/p\u003e\n\u003cp\u003eThe scarcity of energy is manufactured. It is a lie — maintained by the energy monopoly, enforced by the physics establishment, and protected by the intelligence agencies that serve the Rockefeller dynasty and its allied secret societies.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the demonic hierarchy's primary goal is to separate humanity from God's provision. The energy monopoly accomplishes this by inserting itself between humanity and the abundant energy God created. Instead of receiving energy freely from creation, humanity must purchase it from corporations — paying for what God gave freely.\u003c/p\u003e\n\u003cp\u003eThis is the pattern of the Rockefeller system: steal God's provision, repackage it, sell it back, and punish anyone who tries to access it directly. It applies to medicine (natural healing suppressed, drugs sold), food (organic farming suppressed, processed food sold), and energy (free energy suppressed, fossil fuels sold).\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-energy-connection\"\u003eThe Jesuit Energy Connection\u003c/h3\u003e\n\u003cp\u003eThe Jesuit order's involvement in the energy sector extends through their network of universities, their connections to the intelligence community, and their influence over the Vatican's vast financial empire. Jesuit-trained scientists staff the physics departments that declare free energy impossible. Jesuit-connected intelligence operatives suppress inventors who prove otherwise. And the Jesuit order's pursuit of \"absolute power\" is served by an energy system that makes every human being dependent on corporations for their survival.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — free energy suppression research and inventor histories\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — God's provision vs. manufactured scarcity\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit control of scientific institutions\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's
