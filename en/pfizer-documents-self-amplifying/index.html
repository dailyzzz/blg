<!DOCTYPE html><!--1SCAkP9FwT0rta0r4lLXo--><html lang="en"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="/_next/static/css/91e093b7a73c5956.css" data-precedence="next"/><link rel="preload" as="script" fetchPriority="low" href="/_next/static/chunks/webpack-f1ed66bbfd105ed8.js"/><script src="/_next/static/chunks/4bd1b696-f785427dddbba9fb.js" async=""></script><script src="/_next/static/chunks/1255-e9e68aae815f4730.js" async=""></script><script src="/_next/static/chunks/main-app-55680528af95a8bc.js" async=""></script><script src="/_next/static/chunks/2221-7e6c4e32da135429.js" async=""></script><script src="/_next/static/chunks/app/layout-566ab9571eddcabf.js" async=""></script><script src="/_next/static/chunks/app/%5Blang%5D/%5Bslug%5D/page-a424dc1babd9b142.js" async=""></script><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/><link rel="alternate" type="application/rss+xml" title="ZZZ Daily Blog RSS" href="/rss.xml"/><title>Pfizer Documents Confirm COVID-19 Shots Contained Self-Amplifying mRNA | ZZZ Daily Blog | ZZZ Daily Blog</title><meta name="description" content="Court-released Pfizer documents and patent filings reveal evidence that COVID-19 mRNA shots contained self-amplifying components that were never disclosed."/><meta name="author" content="zzzdaily-team"/><meta name="keywords" content="Pfizer, self-amplifying-mRNA, COVID-19-vaccines, patent-filings, informed-consent"/><meta name="robots" content="index, follow"/><meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"/><link rel="canonical" href="https://blog.zzzdaily.com/en/pfizer-documents-self-amplifying/"/><link rel="alternate" hrefLang="en" href="https://blog.zzzdaily.com/en/pfizer-documents-self-amplifying/"/><link rel="alternate" hrefLang="ru" href="https://blog.zzzdaily.com/ru/p  commandment prohibits false testimony. When Pfizer told regulators, healthcare providers, and the public that its COVID-19 product was a conventional mRNA vaccine — a product that would deliver instructions, produce protein, and degrade — it bore testimony about what was in the vial. If that testimony was false — if the product contained self-amplifying components that were not disclosed — then the ninth commandment was violated at civilizational scale. False witness was borne against billions of neighbors who trusted that testimony with their bodies.\u003c/p\u003e\n\u003cp\u003eThe Hebrew word for witness, \u003cem\u003eed\u003c/em\u003e, carries the weight of covenant. A witness in Israel stood before God as well as before men. To bear false witness was to invoke the curse of the covenant upon oneself. When a pharmaceutical corporation bears false witness about the contents of an injection administered to billions, the covenantal consequences are proportional to the scope of the deception.\u003c/p\u003e\n\u003cp\u003eThe Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e illuminates how truth locked in darkness eventually breaks free. And the ZZZ Daily track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/63-Bluetooth_Bodies.mp4\"\u003eBluetooth Bodies\u003c/a\u003e documents the technological signatures that reveal what was truly injected.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-documents-what-pfizer-filed\"\u003eThe Documents: What Pfizer Filed\u003c/h2\u003e\n\u003ch3 id=\"the-court-ordered-release\"\u003eThe Court-Ordered Release\u003c/h3\u003e\n\u003cp\u003eIn January 2022, a federal judge ordered the FDA to release the documents that Pfizer had submitted in support of its COVID-19 vaccine's Emergency Use Authorization — documents that the FDA and Pfizer initially sought to keep sealed for 75 years. The lawsuit, brought by Public Health and Medical Professionals for Transparency (PHMPT), resulted in the rolling release of hundreds of thousands of pages of internal Pfizer documents.\u003c/p\u003e\n\u003cp\u003eThese documents contain information that Pfizer never voluntarily disclosed to the public — information about adverse events, manufacturing processes, and, critically, the molecular composition of the product.\u003c/p\u003e\n\u003ch3 id=\"patent-filings-and-self-amplifying-language\"\u003ePatent Filings and Self-Amplifying Language\u003c/h3\u003e\n\u003cp\u003eKaren Kingston's analysis through \u003ca href=\"https://karenkingston.substack.com\"\u003eThe Kingston Report\u003c/a\u003e has focused on Pfizer and BioNTech patent filings — documents filed with the United States Patent and Trademark Office (USPTO) and international patent authorities that describe the company's mRNA technology in precise technical language.\u003c/p\u003e\n\u003cp\u003eKingston has identified patent language describing:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSelf-Replicating RNA Elements:\u003c/strong\u003e Patent filings describe mRNA constructs capable of \"self-replication\" — language that is consistent with self-amplifying mRNA technology. The patents describe RNA constructs containing sequences that encode RNA-dependent RNA polymerase (RdRp) activity — the enzyme that copies RNA and is the defining feature of self-amplifying mRNA.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAlphavirus-Derived Sequences:\u003c/strong\u003e Patents describe the use of alphavirus-derived nonstructural protein sequences — the same components used in acknowledged sa-mRNA products like ARCT-154. These sequences form the replicase complex that enables the RNA to copy itself inside human cells.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eModified Nucleoside Constructs with Replication Capacity:\u003c/strong\u003e Patent language describes modified nucleoside RNA (the same N1-methylpseudouridine technology used in Comirnaty) combined with elements that enable RNA amplification — suggesting that the modified mRNA in the commercial product may have self-amplifying properties that were not disclosed.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLipid Nanoparticle Formulations Designed for Self-Amplifying Constructs:\u003c/strong\u003e Patents describe LNP formulations specifically optimized for the delivery of self-amplifying RNA — formulations that are similar to or identical with the LNP formulations used in the commercial COVID-19 product.\u003c/p\u003e\n\u003ch3 id=\"manufacturing-process-documents\"\u003eManufacturing Process Documents\u003c/h3\u003e\n\u003cp\u003eDocuments related to Pfizer's manufacturing process reveal a detail that has generated significant concern: the transition from \u003cstrong\u003eProcess 1\u003c/strong\u003e to \u003cstrong\u003eProcess 2\u003c/strong\u003e during commercial production.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProcess 1\u003c/strong\u003e was used for the clinical trials. It produced mRNA through in vitro transcription using a linear DNA template — a high-fidelity method that produces relatively pure mRNA.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProcess 2\u003c/strong\u003e was used for commercial production — the product that was actually injected into billions of people. It used a bacterial plasmid amplification method — growing the DNA template in E. coli bacteria before using it for mRNA transcription. This method is faster and cheaper but introduces the risk of DNA contamination.\u003c/p\u003e\n\u003cp\u003eThe DNA contamination discovered by Kevin McKernan — including SV40 promoter sequences — came from Process 2. The commercial product was different from the clinical trial product. The public received a product that was never directly tested in the clinical trials as manufactured.\u003c/p\u003e\n\u003cp\u003eKingston has documented that the Process 2 manufacturing method, combined with the patent filings describing self-amplifying constructs, raises the possibility that the commercial product contained self-amplifying elements that were not present in the clinical trial product — or that were present but not disclosed.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-self-amplifying-components-would-mean\"\u003eWhat Self-Amplifying Components Would Mean\u003c/h2\u003e\n\u003ch3 id=\"if-the-covid-shots-contained-sa-mrna\"\u003eIf the COVID Shots Contained sa-mRNA\u003c/h3\u003e\n\u003cp\u003eIf Pfizer's COVID-19 product contained self-amplifying mRNA components — even partial or modified versions of sa-mRNA technology — the implications are:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBillions received self-replicating genetic constructs without consent.\u003c/strong\u003e Informed consent requires disclosure of the product's composition and mechanism of action. If the product self-amplifies and this was not disclosed, every injection was administered without valid consent.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe duration of spike protein production was longer than disclosed.\u003c/strong\u003e Pfizer and the CDC told the public that the mRNA would degrade within days. If the product contained self-amplifying components, spike protein production could continue for weeks or months — explaining the documented persistence of spike protein in vaccinated individuals far beyond the expected timeframe.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe dose experienced was higher than the dose injected.\u003c/strong\u003e If the mRNA amplifies, the actual amount of genetic material and protein produced in the body is far greater than the 30 micrograms per dose that was disclosed. The body manufactured additional doses internally.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eShedding potential was higher than acknowledged.\u003c/strong\u003e Self-amplifying constructs produce more protein, which means more potential shedding of spike protein to unvaccinated contacts.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAll adverse events may have been amplified.\u003c/strong\u003e Every documented adverse event — myocarditis, thrombosis, neurological damage, cancer, reproductive harm — would be amplified by self-replicating mRNA because the causative agent (spike protein) is produced in greater quantities for longer durations.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-historical-precedent-pfizers-record\"\u003eThe Historical Precedent: Pfizer's Record\u003c/h2\u003e\n\u003ch3 id=\"the-23-billion-criminal-settlement\"\u003eThe $2.3 Billion Criminal Settlement\u003c/h3\u003e\n\u003cp\u003eIn 2009, Pfizer paid $2.3 billion to settle criminal and civil charges — the largest healthcare fraud settlement in U.S. history at that time. The charges included:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFraudulent marketing of Bextra (a painkiller) for uses the FDA had specifically declined to approve\u003c/li\u003e\n\u003cli\u003ePaying kickbacks to healthcare professionals\u003c/li\u003e\n\u003cli\u003eMaking false claims about the safety and efficacy of multiple products\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis was not an isolated incident. Pfizer has paid billions in additional settlements for:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFraudulent marketing of Lipitor, Zoloft, and other drugs\u003c/li\u003e\n\u003cli\u003eSuppression of safety data for Celebrex and Bextra\u003c/li\u003e\n\u003cli\u003eEnvironmental violations\u003c/li\u003e\n\u003cli\u003eForeign bribery\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eA corporation that has paid billions in fines for lying about its products is now asking the world to trust its testimony about what was in the COVID-19 vials. The ninth commandment weighs heavily.\u003c/p\u003e\n\u003ch3 id=\"the-pattern-of-concealment\"\u003eThe Pattern of Concealment\u003c/h3\u003e\n\u003cp\u003ePfizer's documented pattern involves:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eMaking strong safety claims during product launch\u003c/li\u003e\n\u003cli\u003eSuppressing or minimizing adverse event data\u003c/li\u003e\n\u003cli\u003eFighting disclosure of internal documents\u003c/li\u003e\n\u003cli\u003eEventually being forced to disclose through litigation\u003c/li\u003e\n\u003cli\u003ePaying fines and continuing operations\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThe attempt to seal the COVID-19 vaccine documents for 75 years fits this pattern exactly. If the documents contained only evidence of safety and efficacy, there would be no reason to hide them. The request for 75 years of secrecy implies that the documents contain information that would damage the product, the company, or both.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-theological-dimension-the-sealed-scroll\"\u003eThe Theological Dimension: The Sealed Scroll\u003c/h2\u003e\n\u003ch3 id=\"the-scroll-that-no-man-could-open\"\u003eThe Scroll That No Man Could Open\u003c/h3\u003e\n\u003cp\u003eIn Revelation 5, John weeps because \"no man was found worthy to open and to read the book, neither to look thereon.\" The sealed scroll contained the destiny of creation — information too powerful to be accessed without the authority of the Lamb.\u003c/p\u003e\n\u003cp\u003ePfizer's attempt to seal its documents for 75 years is a dark mirror of this pattern — information sealed not by divine authority but by corporate power, not to protect the righteous but to protect the guilty. The documents were unsealed not by the Lamb but by a federal judge. But the principle is the same: sealed documents contain truth that powerful entities do not want revealed.\u003c/p\u003e\n\u003cp\u003eThe truth in Pfizer's documents — like the truth in the sealed scroll — has consequences. When the seals are broken, what was hidden reshapes the world's understanding of what happened. Billions of people may have received self-replicating genetic constructs without their knowledge or consent. That truth, once unsealed, cannot be resealed.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-individuals-should-know\"\u003eWhat Individuals Should Know\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003ePfizer's patent filings describe self-amplifying mRNA technology\u003c/strong\u003e in language consistent with the COVID-19 product.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe commercial product (Process 2) was different from the clinical trial product (Process 1).\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDNA contamination in the commercial product\u003c/strong\u003e includes SV40 promoter sequences.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePfizer attempted to seal these documents for 75 years.\u003c/strong\u003e They were released only through court order.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePfizer has a $4.7 billion criminal fraud record\u003c/strong\u003e and a documented pattern of suppressing safety data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe self-amplifying question remains officially unanswered\u003c/strong\u003e by regulators — they have neither confirmed nor denied the presence of sa-mRNA components in the commercial product.\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eKingston, Karen. \u003ca href=\"https://karenkingston.substack.com\"\u003eThe Kingston Report\u003c/a\u003e. Analysis of Pfizer patent filings and court-released documents.\u003c/li\u003e\n\u003cli\u003ePHMPT v. FDA court filings and released documents\u003c/li\u003e\n\u003cli\u003ePfizer/BioNTech USPTO patent filings\u003c/li\u003e\n\u003cli\u003eMcKernan, Kevin. DNA contamination analysis\u003c/li\u003e\n\u003cli\u003ePfizer DOJ settlement records (2009)\u003c/li\u003e\n\u003cli\u003ePfizer manufacturing process documentation\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"http
