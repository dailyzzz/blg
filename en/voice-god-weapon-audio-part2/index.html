 the earth.\"\u003c/em\u003e — Revelation 16:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eGod speaks with a voice that shakes the heavens. Satan mimics with technology that whispers into skulls. The Voice of God weapon — a classified military technology designed to transmit audio directly into a target's brain — represents the ultimate counterfeit of divine communication. It is a weapon that can make a person believe God is speaking to them, that angels are guiding them, or that demons are tormenting them — when in reality, a military operator at a computer console is the source.\u003c/p\u003e\n\u003cp\u003eThis is Part 2 of our 11-part series on V2K technology. In Part 1, we shared the personal experience of hearing music that wasn't there and introduced the technology. Now we go deeper — into the classified military programs that developed the Voice of God weapon, the wars in which it was deployed, and the implications for every person alive today.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was given a glimpse of the three heavens and the demonic hierarchies that operate in the second heaven. He was told that 97.5% of Christians are failing, that words have spiritual power, and that the spiritual realm is more real than the physical. The Voice of God weapon exploits the spiritual dimension — it mimics divine communication to control human behavior, and it does so with the full knowledge and blessing of the military-intelligence establishment that the Jesuits helped build.\u003c/p\u003e\n\u003cp\u003eNapoleon's \"absolute power,\" Adams's \"eternal damnation,\" Tambulini's global governance, and the Jesuit oath of infiltration \"cloaked with cunning\" — all converge in a weapon that literally speaks inside your mind.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-voice-of-god-weapon-history-and-development\"\u003eThe Voice of God Weapon: History and Development\u003c/h2\u003e\n\u003ch3 id=\"origins-in-the-frey-effect\"\u003eOrigins in the Frey Effect\u003c/h3\u003e\n\u003cp\u003eAs detailed in Part 1, Allan Frey's 1961 discovery of the microwave auditory effect established the scientific foundation for V2K technology. Frey demonstrated that pulsed microwave radiation could produce audible sensations inside the head.\u003c/p\u003e\n\u003cp\u003eThe military immediately recognized the potential. If you can make a person hear sounds that no one else can hear, you can:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDemoralize enemy troops\u003c/strong\u003e by transmitting threatening messages\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImpersonate divine authority\u003c/strong\u003e to influence religious populations\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCreate confusion and panic\u003c/strong\u003e on the battlefield\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInterrogate prisoners\u003c/strong\u003e by transmitting voices that seem to come from inside their own minds\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDiscredit dissidents\u003c/strong\u003e by driving them to report \"hearing voices\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-iraq-war-deployment\"\u003eThe Iraq War Deployment\u003c/h3\u003e\n\u003cp\u003eMultiple credible sources have reported that the Voice of God weapon was used during the Iraq War:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePsychological operations (PSYOP) teams\u003c/strong\u003e reportedly used directed audio technology to broadcast messages to Iraqi troops, claiming to be the voice of Allah commanding them to surrender\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClassified briefings\u003c/strong\u003e on \"non-lethal weapons\" included references to audio transmission technologies\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMilitary contractors\u003c/strong\u003e including Lockheed Martin and Raytheon developed directed energy weapons with audio transmission capabilities for military use\u003c/li\u003e\n\u003cli\u003eReports from the field describe Iraqi soldiers \u003cstrong\u003esurrendering en masse\u003c/strong\u003e after experiencing \"divine communications\" ordering them to lay down their weapons\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe exploitation of religious faith through technological mimicry of divine communication is perhaps the most morally repugnant application of military technology ever conceived. It takes the most sacred experience a human being can have — hearing the voice of God — and weaponizes it for military advantage.\u003c/p\u003e\n\u003ch3 id=\"medusa-and-beyond\"\u003eMEDUSA and Beyond\u003c/h3\u003e\n\u003cp\u003eThe \u003cstrong\u003eMEDUSA\u003c/strong\u003e (Mob Excess Deterrent Using Silent Audio) program was developed by Sierra Nevada Corporation for the US Navy. The device uses microwave pulses to create an auditory effect inside the target's head. The stated purpose is crowd control — transmitting uncomfortable sounds to disperse crowds without physical contact.\u003c/p\u003e\n\u003cp\u003eBut the technology has far broader applications:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eIndividual targeting\u003c/strong\u003e: Focusing the beam on a single person in a crowd\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCovert communication\u003c/strong\u003e: Transmitting messages to an agent without anyone else hearing\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInterrogation enhancement\u003c/strong\u003e: Adding audio stimulation to traditional interrogation methods\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBehavioral modification\u003c/strong\u003e: Transmitting commands or suggestions that the target believes are their own thoughts\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"darpas-silent-talk-program\"\u003eDARPA's Silent Talk Program\u003c/h3\u003e\n\u003cp\u003eDARPA (Defense Advanced Research Projects Agency) has funded the \u003cstrong\u003eSilent Talk\u003c/strong\u003e program, which aims to develop technology for \"direct communication between the brain and external hardware.\" While the stated goal is to allow soldiers to communicate silently, the same technology — reading and transmitting neural signals — is the foundation of two-way V2K: not just putting voices in, but reading thoughts out.\u003c/p\u003e\n\u003cp\u003eThe implications are staggering. If the military can both transmit voices into your head and read the thoughts that result, they have achieved complete access to the human mind. No prison is as confining. No surveillance is as total. No weapon is as powerful.\u003c/p\u003e\n\u003ch2 id=\"how-the-weapon-works\"\u003eHow the Weapon Works\u003c/h2\u003e\n\u003ch3 id=\"the-delivery-systems\"\u003eThe Delivery Systems\u003c/h3\u003e\n\u003cp\u003eV2K technology can be delivered through multiple platforms:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGround-based systems\u003c/strong\u003e: Truck-mounted or building-mounted microwave transmitters that can target individuals at ranges of hundreds of meters to several kilometers.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSatellite-based systems\u003c/strong\u003e: Microwave transmitters on surveillance satellites could theoretically target individuals anywhere on Earth. While this application remains classified, the satellite infrastructure and microwave technology both exist.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCell tower integration\u003c/strong\u003e: Cell towers transmit microwave radiation at frequencies compatible with the Frey effect. The existing cell tower infrastructure provides a ready-made delivery system for V2K technology (explored in detail in Part 9).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePortable devices\u003c/strong\u003e: Handheld or vehicle-mounted devices for close-range targeting during surveillance operations.\u003c/p\u003e\n\u003ch3 id=\"the-audio-spectrum\"\u003eThe Audio Spectrum\u003c/h3\u003e\n\u003cp\u003eV2K technology can transmit a range of audio:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSimple tones and clicks\u003c/strong\u003e: The most basic application, used for harassment or attention-getting\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMusic\u003c/strong\u003e: Structured audio patterns that can prevent sleep and cause psychological distress\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVoice/speech\u003c/strong\u003e: The most sophisticated application, capable of transmitting recognizable words, sentences, and conversations\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSubliminal audio\u003c/strong\u003e: Audio transmitted below the threshold of conscious perception, influencing thoughts and behavior without the target's awareness\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"the-spiritual-counterfeit\"\u003eThe Spiritual Counterfeit\u003c/h2\u003e\n\u003ch3 id=\"mimicking-gods-voice\"\u003eMimicking God's Voice\u003c/h3\u003e\n\u003cp\u003eThroughout Scripture, God communicates with His people through an inner voice — the \"still, small voice\" that spoke to Elijah (1 Kings 19:12), the voice that called Samuel (1 Samuel 3:4-10), the voice of the Holy Spirit that guides believers (John 16:13).\u003c/p\u003e\n\u003cp\u003eThe Voice of God weapon exploits this spiritual reality by technologically mimicking the experience of hearing a divine voice. The target cannot distinguish between:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGod's actual voice\u003c/li\u003e\n\u003cli\u003eA demonic counterfeit\u003c/li\u003e\n\u003cli\u003eA technological transmission\u003c/li\u003e\n\u003cli\u003eTheir own internal monologue\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis confusion is devastating for people of faith. It undermines the most fundamental aspect of spiritual life — the ability to hear and respond to God. If you cannot trust the voices in your head, you cannot trust your spiritual guidance. And if you cannot trust your spiritual guidance, you are adrift — exactly where the principalities and powers of Ephesians 6:12 want you.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-spiritual-exercises\"\u003eThe Jesuit Spiritual Exercises\u003c/h3\u003e\n\u003cp\u003eThe connection to the Jesuit order is particularly revealing. Ignatius of Loyola's Spiritual Exercises — the foundational Jesuit spiritual practice — involve extended meditation designed to produce inner visions and voices. Practitioners are guided through visual and auditory experiences that are meant to feel divinely inspired.\u003c/p\u003e\n\u003cp\u003eThe Jesuits have understood for nearly 500 years that controlling a person's inner experience — what they see, hear, and feel in the privacy of their own mind — is the most powerful form of control available. The Voice of God weapon is the technological implementation of the Jesuit principle: take control of the inner voice, and you take control of the person.\u003c/p\u003e\n\u003ch3 id=\"howard-pittmans-warning\"\u003eHoward Pittman's Warning\u003c/h3\u003e\n\u003cp\u003ePittman was told that the spiritual realm is more real than the physical. He was shown that demonic forces are organized with military precision and that their primary weapon is deception. The Voice of God weapon operates at this intersection — it is a physical weapon that targets the spiritual capacity of its victims.\u003c/p\u003e\n\u003cp\u003eThe 97.5% who are failing have never developed the discernment to distinguish God's voice from counterfeits. They are the most vulnerable to V2K targeting — because when a voice speaks inside their head, they have no framework for evaluation. They will either believe it is God (and obey), believe it is their own thought (and follow), or believe it is a sign of madness (and seek psychiatric treatment). All three responses serve the weapon's purpose.\u003c/p\u003e\n\u003ch2 id=\"the-implications\"\u003eThe Implications\u003c/h2\u003e\n\u003ch3 id=\"for-targeted-individuals\"\u003eFor Targeted Individuals\u003c/h3\u003e\n\u003cp\u003eIf you are experiencing V2K, understand that:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eYou are not insane\u003c/strong\u003e — the technology is real and documented\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eYou are not alone\u003c/strong\u003e — thousands of people report the same experience\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe psychiatric system is not your friend\u003c/strong\u003e — it is designed to label V2K targets as mentally ill\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSpiritual discernment is essential\u003c/strong\u003e — develop your relationship with God so you can distinguish His voice from counterfeits\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDocumentation is crucial\u003c/strong\u003e — record your experiences, note patterns, and connect with other targeted individuals\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"for-everyone-else\"\u003eFor Everyone Else\u003c/h3\u003e\n\u003cp\u003eEven if you are not currently targeted, V2K technology affects you:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe \u003cstrong\u003eexistence\u003c/strong\u003e of the weapon means that any person can be targeted at any time\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003einfrastructure\u003c/strong\u003e (cell towers, satellites, ground-based systems) is already in place\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003elegal framework\u003c/strong\u003e protecting citizens from V2K targeting does not exist\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003epsychiatric system\u003c/strong\u003e serves as a discrediting mechanism for anyone who reports the technology\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003espiritual implications\u003c/strong\u003e affect every person of faith who relies on inner guidance\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — V2K technology documentation and targeted individual research\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — divine communication vs. counterfeit voices\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit Spiritual Exercises and inner experience control\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- US military non-lethal weapons documentation\u003c/li\u003e\n\u003cli\u003eDARPA Silent Talk program records\u003c/li\u003e\n\u003cli\u003eAllan Frey's original microwave auditory effect research\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/215-Brain_Machine_Interface.mp4\"\u003eBrain Ma
