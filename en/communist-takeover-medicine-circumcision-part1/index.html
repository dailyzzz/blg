udiments of the world, and not after Christ.\"\u003c/em\u003e — Colossians 2:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe American medical system did not become the monstrosity it is today by accident. It was deliberately captured, reshaped, and weaponized by ideological forces that most Americans have never been taught to recognize. The communist infiltration of American institutions — documented by congressional investigations, defecting agents, and declassified intelligence files — extended deep into the medical profession. And one of the most revealing markers of this infiltration is the routine practice of infant circumcision.\u003c/p\u003e\n\u003cp\u003eIn America today, approximately 55-60% of newborn males are circumcised — a medical procedure performed without the patient's consent, without medical necessity, and without any credible evidence of benefit. The United States is virtually alone among developed nations in this practice. No European country routinely circumcises infants. No Asian country does. No South American country does. The question that demands an answer is: why does America?\u003c/p\u003e\n\u003cp\u003eThe answer traces back to the communist takeover of American medicine — a takeover that used ideological subversion, institutional capture, and the destruction of traditional values to reshape the most intimate aspects of human life.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was told during his NDE that 97.5% of Christians were failing, that they had \"never made Jesus Lord,\" that they served self. The medical establishment that mutilates infant boys serves itself — its ideology, its revenue, its power. Ephesians 6:12 warns us that the battle is \"against principalities, against powers, against the rulers of the darkness of this world.\" The circumcision industry is one such principality.\u003c/p\u003e\n\u003cp\u003eNapoleon recognized the Jesuit order as \"a military organization\" pursuing \"absolute power.\" The Catholic Confidential documentary reveals their infiltration \"cloaked with cunning.\" The communist infiltration of American medicine followed the same playbook: patient, systematic, invisible to those not trained to see it.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-communist-infiltration-of-american-institutions\"\u003eThe Communist Infiltration of American Institutions\u003c/h2\u003e\n\u003ch3 id=\"the-congressional-record\"\u003eThe Congressional Record\u003c/h3\u003e\n\u003cp\u003eIn 1963, Congressman Albert Herlong Jr. read into the Congressional Record a list of 45 Communist goals for America, derived from Cleon Skousen's book \u003cem\u003eThe Naked Communist\u003c/em\u003e. Among these goals:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGoal #3\u003c/strong\u003e: \"Develop the illusion that total disarmament by the United States would be a demonstration of moral strength.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoal #17\u003c/strong\u003e: \"Get control of the schools. Use them as transmission belts for socialism and current Communist propaganda.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoal #29\u003c/strong\u003e: \"Discredit the American Constitution by calling it inadequate, old-fashioned, out of step with modern needs.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoal #32\u003c/strong\u003e: \"Support any socialist movement to give centralized control over any part of the culture — education, social agencies, welfare programs, mental health clinics, etc.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoal #38\u003c/strong\u003e: \"Transfer some of the powers of arrest from the police to social agencies.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoal #39\u003c/strong\u003e: \"Dominate the psychiatric profession and use mental health laws as a means of gaining coercive control over those who oppose Communist goals.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoal #40\u003c/strong\u003e: \"Discredit the family as an institution.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoal #41\u003c/strong\u003e: \"Emphasize the need to raise children away from the negative influence of parents.\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe medical establishment was a primary target. By controlling medicine, the communist-influenced networks gained the power to define normalcy and deviance, to prescribe and prohibit behaviors, and to physically alter the bodies of citizens without their consent.\u003c/p\u003e\n\u003ch3 id=\"the-rockefeller-communist-connection\"\u003eThe Rockefeller-Communist Connection\u003c/h3\u003e\n\u003cp\u003eThe Rockefeller family's relationship with communist and socialist movements is extensively documented. The Rockefeller Foundation funded Soviet-connected researchers. The Chase Manhattan Bank, Rockefeller's financial institution, was one of the first American banks to open branches in the Soviet Union. David Rockefeller openly praised Mao Zedong's communist revolution.\u003c/p\u003e\n\u003cp\u003eThis was not ideological confusion. The Rockefeller dynasty — like the Jesuit order — transcends conventional political categories. Their goal is control, and they fund whatever movements advance that goal. Communism's emphasis on centralized state control over every aspect of life — including the body — aligned perfectly with the Rockefeller medical vision.\u003c/p\u003e\n\u003cp\u003eThe Flexner Report of 1910, funded by Rockefeller and Carnegie, centralized medical education and destroyed alternative healing traditions. This was a communist strategy applied to medicine: eliminate competition, centralize authority, and make the population dependent on a single, state-approved system.\u003c/p\u003e\n\u003ch2 id=\"the-history-of-american-circumcision\"\u003eThe History of American Circumcision\u003c/h2\u003e\n\u003ch3 id=\"not-a-jewish-or-christian-practice\"\u003eNot a Jewish or Christian Practice\u003c/h3\u003e\n\u003cp\u003eA common misconception is that American circumcision derives from Judeo-Christian religious tradition. This is false. Christianity explicitly rejected circumcision as a requirement for believers (Galatians 5:6, Acts 15). The vast majority of Christian nations — Europe, South America, most of Asia — do not practice routine infant circumcision.\u003c/p\u003e\n\u003cp\u003eAmerican circumcision has entirely secular origins. It was promoted in the late 19th century by medical professionals who believed it would prevent masturbation — a practice that Victorian-era doctors considered a cause of insanity, epilepsy, and moral degeneracy.\u003c/p\u003e\n\u003ch3 id=\"the-anti-pleasure-agenda\"\u003eThe Anti-Pleasure Agenda\u003c/h3\u003e\n\u003cp\u003eDr. John Harvey Kellogg — yes, the cereal magnate — was one of the most prominent promoters of circumcision as a cure for masturbation. In his 1888 book \u003cem\u003eTreatment for Self-Abuse and Its Effects\u003c/em\u003e, Kellogg wrote:\u003c/p\u003e\n\u003cp\u003e\"The operation should be performed by a surgeon without administering anesthetic, as the brief pain attending the operation will have a salutary effect upon the mind, especially if it be connected with the idea of punishment.\"\u003c/p\u003e\n\u003cp\u003eThis is not medicine. This is ritualized punishment of infant boys for a behavior they have not committed and cannot commit. It is abuse dressed in medical language — the same inversion of good and evil that characterizes Satanic operations throughout history.\u003c/p\u003e\n\u003ch3 id=\"the-medicalization-of-mutilation\"\u003eThe Medicalization of Mutilation\u003c/h3\u003e\n\u003cp\u003eBy the early 20th century, the anti-masturbation rationale had become embarrassingly outdated. The medical establishment needed new justifications for circumcision. Over the decades, a rotating series of medical claims was advanced:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e1900s-1930s\u003c/strong\u003e: Prevents masturbation and moral degeneracy\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1940s-1950s\u003c/strong\u003e: Prevents penile cancer\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1960s-1970s\u003c/strong\u003e: Improves hygiene\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1980s-1990s\u003c/strong\u003e: Prevents urinary tract infections\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e2000s-present\u003c/strong\u003e: Prevents HIV transmission\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEach claim was eventually debunked or shown to be vastly exaggerated, only to be replaced by a new claim. This pattern — shifting justifications for an unchanged practice — reveals that the practice is not driven by evidence but by something else entirely.\u003c/p\u003e\n\u003ch2 id=\"the-communist-medical-nexus\"\u003eThe Communist-Medical Nexus\u003c/h2\u003e\n\u003ch3 id=\"destroying-the-family-unit\"\u003eDestroying the Family Unit\u003c/h3\u003e\n\u003cp\u003eOne of communism's core goals is the destruction of the family unit. When a newborn boy is separated from his mother and subjected to surgical genital alteration within hours of birth, the mother-child bond is disrupted at its most vulnerable moment. The infant experiences extreme pain and trauma that studies have shown affects neurological development, pain perception, and trust.\u003c/p\u003e\n\u003cp\u003eThe mother, who instinctively wants to protect her baby, is told by medical authorities that the procedure is \"routine,\" \"beneficial,\" and \"nothing to worry about.\" She is trained to override her maternal instincts and defer to institutional authority — which is precisely the conditioning that communist systems require.\u003c/p\u003e\n\u003ch3 id=\"the-pain-studies-they-buried\"\u003eThe Pain Studies They Buried\u003c/h3\u003e\n\u003cp\u003eUntil the 1990s, many circumcisions were performed without any anesthesia at all, based on the medical claim that newborns \"don't feel pain.\" This claim was not merely wrong — it was monstrous. Newborns have a fully developed nervous system and experience pain acutely. Studies measuring cortisol levels, heart rate, and crying patterns in circumcised infants showed levels of physiological stress comparable to torture.\u003c/p\u003e\n\u003cp\u003eThe medical establishment's willingness to inflict unanesthetized surgery on helpless infants — while denying that those infants feel pain — reveals a profound disconnection from basic human empathy. This disconnection is characteristic of systems that have been captured by ideological forces that view human beings as resources to be managed rather than souls to be cherished.\u003c/p\u003e\n\u003ch3 id=\"profit-over-people\"\u003eProfit Over People\u003c/h3\u003e\n\u003cp\u003eCircumcision generates billions of dollars annually for the American medical system:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSurgical fees\u003c/strong\u003e: Each circumcision generates $200-$600 in direct surgical charges\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eComplications\u003c/strong\u003e: Circumcision complications generate additional medical revenue through corrective procedures, infection treatment, and emergency care\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eForeskin harvesting\u003c/strong\u003e: Infant foreskins are collected and sold to biotech companies for use in cosmetic products, skin grafts, and research materials. Companies like SkinMedica (now owned by Allergan) use infant foreskin-derived fibroblasts in anti-aging creams that sell for hundreds of dollars per jar.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe fact that infant body parts are harvested and sold for cosmetic products should be a national scandal. Instead, it is a routine business practice, hidden in plain sight — exactly as the Jesuit method operates: infiltration \"cloaked with cunning.\"\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"blood-ritual-or-medical-procedure\"\u003eBlood Ritual or Medical Procedure?\u003c/h3\u003e\n\u003cp\u003eThe removal of the foreskin of a newborn male involves:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe shedding of innocent blood\u003c/li\u003e\n\u003cli\u003eThe alteration of God's creation without the subject's consent\u003c/li\u003e\n\u003cli\u003eThe infliction of extreme pain on a helpless being\u003c/li\u003e\n\u003cli\u003eThe severing of sensitive tissue at the most intimate part of the body\u003c/li\u003e\n\u003cli\u003eThe collection and commodification of human flesh\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIf these elements were described without the medical context, most people would recognize them as characteristics of a blood ritual. The medicalization of circumcision provides cover for what is, at its core, a ritualistic practice with deeply disturbing spiritual implications.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that demonic forces operate through systems that appear benign. The 97.5% who are failing in their spiritual walk are failing precisely because they cannot see the spiritual reality behind the physical facade. A hospital operating room looks clean, sterile, and scientific. But the spiritual dimension of what happens when innocent blood is shed without consent is not visible to the physical eye.\u003c/p\u003e\n\u003ch3 id=\"the-covenant-question\"\u003eThe Covenant Question\u003c/h3\u003e\n\u003cp\u003eChristians who support circumcision often cite the Old Testament covenant. But the New Covenant in Christ explicitly supersedes the requirement for physical circumcision. Paul wrote in Galatians 5:2: \"If ye be circumcised, Christ shall profit you nothing.\" The circumcision that matters in the New Covenant is circumcision of the heart (Romans 2:29) — a spiritual transformation, not a physical mutilation.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, masters of scriptural manipulation, have long used selective Bible passages to justify practices that serve their institutional goals. The use of Old Testament circumcision to justify infant genital cutting in a Christian nation is a perfect example of this manipulation.\u003c/p\u003e\n\u003ch2 id=\"looking-ahead-to-part-2\"\u003eLooking Ahead to Part 2\u003c/h2\u003e\n\u003cp\u003eIn Part 2, we will examine the specific medical claims used to justify circumcision, debunk each one with clinical evidence, explore the psychological impact on circumcised males, and trace the institutional networks that keep this practice entrenched in American medicine despite the lack of medical justification.\u003c/p\u003e\n\u003cp\u003eThe communist takeover of American medicine is not just about circumcision — it is about the systematic capture of every institution that shapes human life, from birth to death. Circumcision is simply the most visible marker of this capture, because it is applied to the most vulnerable members of society at the most vulnerable moment of their lives.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — research on medical system corruption and circumcision history\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — spiritual warfare and demonic systems\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit infiltration methods\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003c
