life of every honest seeker when the questions can no longer be suppressed. The doubts that whisper at 3 AM. The contradictions that nag during the sermon. The gap between what the institution teaches and what the text actually says. This moment is not a crisis of faith. It is the birth of faith — real faith, tested faith, faith that has survived the fire of inquiry rather than the lukewarm bath of tradition.\u003c/p\u003e\n\u003cp\u003eHoward Pittman, during his near-death experience, was confronted with the most disturbing truth a religious person can face: the institution fails. Of the Christians who died during his experience, 97.5 percent were rejected. They had attended church, celebrated holidays, spoken the name of Jesus. But they had \"never made Me Lord.\" Pittman learned that 95 percent of professing Christians serve \"self\" rather than God. Their words, which carry spiritual weight according to Matthew 12:36-37, were the words the institution taught them — but those words did not save them.\u003c/p\u003e\n\u003cp\u003eThe Jesuits built the institution. Ignatius of Loyola's military organization, wielding Napoleon's \"absolute power,\" created the educational, liturgical, and theological framework within which most Christians worship. Adams warned of their \"eternal damnation.\" Tamburini governed \"all the world.\" Clement XIV was poisoned for opposing them. The religion you practice was shaped by men who, according to \u003cem\u003eCatholic Confidential\u003c/em\u003e, infiltrate \"cloaked with cunning\" and practice \"every species of vice.\"\u003c/p\u003e\n\u003cp\u003eThis is where the journey begins.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/15-From_Dust_to_Glory.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Dust to Glory — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/27-The_Promise_of_Salvation.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Promise of Salvation — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-first-question-who-taught-you\"\u003eThe First Question: Who Taught You?\u003c/h2\u003e\n\u003ch3 id=\"the-chain-of-transmission\"\u003eThe Chain of Transmission\u003c/h3\u003e\n\u003cp\u003eEvery belief you hold about God, Jesus, salvation, scripture, morality, and the afterlife was transmitted to you by someone. Your parents, your pastor, your Sunday school teacher, your denomination — each link in the chain shaped your understanding of spiritual reality. But who shaped theirs?\u003c/p\u003e\n\u003cp\u003eTrace any denomination back far enough and you arrive at an institution. The Catholic Church claims apostolic succession — an unbroken chain from Peter to the current Pope. Protestant denominations trace to the Reformation, which was a reaction against the Catholic Church but retained much of its theological framework. The creeds, the canon, the calendar, the concepts of heaven and hell, the structure of worship — all were established by institutions, specifically by councils of men who made decisions about what you would believe centuries before you were born.\u003c/p\u003e\n\u003cp\u003eThe Jesuits influenced these institutions more than any other single organization. Their educational system trained the clergy. Their theologians shaped the doctrines. Their missionaries established the churches. Their Ratio Studiorum became the template for seminary education. When you sit in a pew and hear a sermon, you are hearing the output of a system the Jesuits designed.\u003c/p\u003e\n\u003ch3 id=\"the-uncomfortable-implications\"\u003eThe Uncomfortable Implications\u003c/h3\u003e\n\u003cp\u003eThis does not mean everything you were taught is false. It means everything you were taught should be examined. Paul instructed the Thessalonians to \"prove all things\" — to test, to examine, to verify. The Bereans were praised in Acts 17:11 because \"they received the word with all readiness of mind, and searched the scriptures daily, whether those things were so.\"\u003c/p\u003e\n\u003cp\u003eThe institutional church discourages this behavior. It calls questioning \"doubt\" and treats doubt as sin. It demands faith — but faith in the institution, not faith in God. There is a vast difference between trusting God and trusting the men who claim to speak for God, especially when those men were trained by an organization that \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals operates through deception, blind obedience, and \"every species of vice.\"\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) how the institutional church has systematically discouraged independent scripture study throughout its history. For centuries, the Catholic Church kept the Bible in Latin, inaccessible to common people. When Wycliffe and Tyndale translated it into English, they were persecuted. The Jesuits burned Tyndale at the stake. The institution does not want you to read the text yourself, because the text contradicts the institution.\u003c/p\u003e\n\u003ch2 id=\"what-the-institution-added\"\u003eWhat the Institution Added\u003c/h2\u003e\n\u003ch3 id=\"traditions-not-found-in-scripture\"\u003eTraditions Not Found in Scripture\u003c/h3\u003e\n\u003cp\u003eThe list of institutional traditions that have no scriptural basis is longer than most Christians realize:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChristmas\u003c/strong\u003e: No scripture records the date of Jesus' birth. The December 25 date was adopted from pagan solar festivals. The Christmas tree, gift exchange, and Santa Claus are pagan additions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEaster\u003c/strong\u003e: The name derives from Ishtar/Eostre, pagan fertility goddesses. The eggs and rabbits are fertility symbols. The timing is based on the pagan lunar calendar.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSunday Worship\u003c/strong\u003e: The early church met on the Sabbath (Saturday). The shift to Sunday was a Catholic Church decision, not a scriptural command.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Trinity\u003c/strong\u003e: The word \"Trinity\" does not appear in scripture. The doctrine was formalized at the Council of Nicaea in 325 AD, under the direction of Emperor Constantine — a political leader, not a prophet.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInfant Baptism\u003c/strong\u003e: No scripture records the baptism of an infant. Baptism in scripture is consistently presented as a conscious, voluntary act.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Papacy\u003c/strong\u003e: No scripture establishes a single human leader of the church. The interpretation of Matthew 16:18 (\"upon this rock I will build my church\") as establishing papal authority is a Catholic tradition, not a textual certainty.\u003c/p\u003e\n\u003cp\u003eEach of these additions serves the institution. Christmas and Easter create mandatory participation events. Sunday worship differentiates Christianity from Judaism. The Trinity provides a theological framework for institutional authority. Infant baptism captures members before they can choose. The Papacy centralizes power.\u003c/p\u003e\n\u003ch3 id=\"traditions-that-contradict-scripture\"\u003eTraditions That Contradict Scripture\u003c/h3\u003e\n\u003cp\u003eSome institutional traditions do not merely add to scripture — they directly contradict it.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCalling clergy \"Father\"\u003c/strong\u003e: Jesus explicitly prohibited this in Matthew 23:9: \u003cem\u003e\"And call no man your father upon the earth: for one is your Father, which is in heaven.\"\u003c/em\u003e The Catholic Church ignores this command entirely.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRepetitive prayer\u003c/strong\u003e: Jesus warned against \"vain repetitions\" in Matthew 6:7. The Rosary, which repeats the same prayers dozens of times, is the definition of vain repetition.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eConfession to priests\u003c/strong\u003e: Scripture says there is \"one mediator between God and men, the man Christ Jesus\" (1 Timothy 2:5). The confessional, where priests claim authority to absolve sins, contradicts this directly.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePraying to saints\u003c/strong\u003e: The second commandment prohibits the creation and veneration of images. The Catholic practice of praying to saints and venerating their images violates this commandment.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, who serve as the intellectual elite of the Catholic Church, are fully aware of these contradictions. Their strategy, as revealed in \u003cem\u003eCatholic Confidential\u003c/em\u003e, is to maintain traditions that serve institutional power regardless of their scriptural basis. The blind obedience demanded by the Jesuit oath ensures that members enforce these traditions without question.\u003c/p\u003e\n\u003ch2 id=\"what-the-institution-removed\"\u003eWhat the Institution Removed\u003c/h2\u003e\n\u003ch3 id=\"the-lost-teachings\"\u003eThe Lost Teachings\u003c/h3\u003e\n\u003cp\u003eMore disturbing than what was added is what was removed. The institutional church edited the canon — the list of books considered \"scripture\" — through a series of councils that excluded texts the institution found inconvenient.\u003c/p\u003e\n\u003cp\u003eThe Book of Enoch, quoted in the epistle of Jude (Jude 1:14-15) and clearly known to the apostles, was excluded from the Western canon. Its detailed descriptions of fallen angels, the Nephilim, and the structure of the heavens did not serve the institution's theological framework.\u003c/p\u003e\n\u003cp\u003eThe Gospel of Thomas, a collection of sayings attributed to Jesus, was excluded. Many of its sayings emphasize direct, personal knowledge of God — gnosis — which undermines the institution's role as necessary intermediary.\u003c/p\u003e\n\u003cp\u003eNumerous other texts — the Shepherd of Hermas, the Didache, the Apocalypse of Peter — were included in early Christian canons and later removed. The institution decided what you could read and what you could not, what was \"inspired\" and what was not, based on criteria that served institutional power.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the spiritual realm operates on truth, not tradition. The texts that were removed may or may not be inspired, but the decision to remove them was made by men — men influenced by the same Jesuit-type institutional logic that has governed the church since Constantine's co-option of Christianity in the 4th century.\u003c/p\u003e\n\u003ch2 id=\"the-fear-of-questioning\"\u003eThe Fear of Questioning\u003c/h2\u003e\n\u003ch3 id=\"why-most-people-stop\"\u003eWhy Most People Stop\u003c/h3\u003e\n\u003cp\u003eMost people who begin questioning their religion stop before they get very far. The reasons are emotional, not intellectual:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFear of hell\u003c/strong\u003e: The institution has taught that questioning leads to damnation. This is the ultimate control mechanism — weaponized fear of eternal punishment.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFear of social loss\u003c/strong\u003e: Church communities provide friendship, support, and identity. Questioning risks losing all of that.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFear of meaninglessness\u003c/strong\u003e: If the institution is wrong, what is true? The void is terrifying.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFear of being wrong\u003c/strong\u003e: What if the institution is right and you are wrong? The cost of error seems infinite.\u003c/p\u003e\n\u003cp\u003eThese fears are by design. The Jesuit system depends on fear to maintain compliance. The \u003cem\u003eCatholic Confidential\u003c/em\u003e documentary shows how the order uses \"every species of vice\" — including psychological manipulation — to achieve its goals. The fear of questioning is the most powerful tool in the institution's arsenal, more effective than any Inquisition, any excommunication, any burning at the stake.\u003c/p\u003e\n\u003cp\u003eBut consider Howard Pittman's testimony. The 97.5 percent who were rejected did not question. They trusted the institution. They followed the traditions. They did not examine, test, or prove. And they were turned away. The fear of questioning did not save them. It damned them.\u003c/p\u003e\n\u003ch3 id=\"the-courage-to-begin\"\u003eThe Courage to Begin\u003c/h3\u003e\n\u003cp\u003eQuestioning does not mean rejecting. It means examining. It means taking Paul's instruction seriously: prove all things. It means reading the text yourself, without the filter of denominational interpretation. It means asking hard questions and accepting uncomfortable answers. It means being willing to discover that some of what you believed is true, some is false, and some is a mixture designed by men with agendas that are not God's agendas.\u003c/p\u003e\n\u003cp\u003eThis is Part 1 — the beginning of the journey. In the parts that follow, we will examine the specific claims of institutional Christianity: the crucifixion, the resurrection, the authorship of the Bible, the construction of the New Testament, and the mass deletions that created the version of Christianity most people practice today.\u003c/p\u003e\n\u003cp\u003eThe journey will not be comfortable. But as Pittman learned, comfort is not the path to truth. Self-service is not the path to God. And the institution that promised you salvation may be the very thing standing between you and the real thing.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Research on institutional religion and suppressed history\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — The devastating truth about institutional Christianity's failure\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — How the Jesuits built and control the institutional church\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/15-From_Dust_to_Glory.mp4\"\u003eFrom Dust to Glory\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/27-The_Promise_of_Salvation.mp4\"\u003eThe Promise of Salvation\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/83-Ancient_Documents.mp4\"\u003eAncient Documents\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/87-From_Darkness_Into_Light.mp4\"\u003eFrom Darkness Into Light\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/jesus-crucifixion-hoax-part2/?lang=en\"\u003eWas the Story of Jesus' Crucifixion a Hoax Part 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/resurrection-actually-happen-part3/?lang=en\"\u003eDid the Resurrection Actually Happen: Examining the Evidence Part 3\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/who-wrote-bible-part4/?lang=en\"\u003eWho Really Wrote the Bible Part 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe beginning is always the hardest step. Every institution, every tradition, every authority figure tells you not to take it. But scripture itself commands it: prove all things. If your faith cannot survive examination, it was never faith at all — it was programming. And programming, no matter how comforting, will not save your soul.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Questioning My Religion: Where the Journey Begins Part 1\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Part 1 of a five-part series questioning institutional religion. Discover how Jesuits shaped what you believe and why your soul depends on truth.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-04-13T10:00:00Z\",\"children\":\"April 13, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"religion\",{\"href\":\"/en/tag/religion/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"religion\"]}],[\"$\",\"a\",\"questioning\",{\"href\":\"/en/tag/questioning/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"questioning\"]}],[\"$\",\"a\",\"faith\",{\"href\":\"/en/tag/faith/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"faith\"]}],[\"$\",\"a\",\"jesuit\",{\"href\":\"/en/tag/jesuit/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"jesuit\"]}],[\"$\",\"a\",\"truth\",{\"href\":\"/en/tag/truth/\",\"className\":\"tag-pill\",\"children\"
