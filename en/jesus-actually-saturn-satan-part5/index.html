transformed into an angel of light.\"\u003c/em\u003e — 2 Corinthians 11:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThis is the question that will separate those who seek truth from those who defend comfort. It is the question that organized religion does not want asked, that clergy will not address, that denominations have spent centuries ensuring never reaches the pew. Is the Jesus worshipped in the institutional churches the Jesus of scripture — or is he a carefully constructed counterfeit, a Saturn-Satan figure dressed in Christian language?\u003c/p\u003e\n\u003cp\u003eHoward Pittman learned the answer during his near-death experience. When 97.5 percent of Christians were turned away, told they had \"never made Me Lord,\" Pittman was shown the devastating truth: the Jesus these people worshipped was not the Jesus who judged them. They had worshipped a version, a facsimile, an institution's product. Pittman witnessed that 95 percent serve \"self\" — and the self they serve is the self shaped by the church system, not by scripture.\u003c/p\u003e\n\u003cp\u003eThe Jesuits built this system. Loyola's military organization, wielding Napoleon's \"absolute power,\" has spent five centuries constructing a version of Christianity that serves Saturn while speaking Christ's name. John Adams understood: \"eternal damnation\" awaits the company of Loyola. Tamburini governed \"all the world.\" And Clement XIV, who dared to challenge them, was poisoned.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/27-The_Promise_of_Salvation.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Promise of Salvation — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-counterfeit-christ\"\u003eThe Counterfeit Christ\u003c/h2\u003e\n\u003ch3 id=\"what-the-churches-teach-vs-what-scripture-says\"\u003eWhat the Churches Teach vs. What Scripture Says\u003c/h3\u003e\n\u003cp\u003eThe institutional church presents a Jesus who is comfortable, safe, and affirming. This Jesus wants you to attend services, tithe your income, celebrate the holidays, and trust your pastor. This Jesus looks like the culture that worships him — European in European churches, African in African churches, Asian in Asian churches. This Jesus is marketed on merchandise, reduced to bumper stickers, and invoked at football games.\u003c/p\u003e\n\u003cp\u003eThe Jesus of scripture is none of these things. The Jesus of scripture overturned tables in the temple. He called the religious leaders \"whitewashed tombs\" and \"children of your father the devil\" (John 8:44). He said the path to life is narrow and \"few there be that find it\" (Matthew 7:14). He demanded the abandonment of family, wealth, and self. He promised persecution, suffering, and death to those who followed him.\u003c/p\u003e\n\u003cp\u003eThese two figures cannot be the same person. The church's Jesus and scripture's Jesus are incompatible. One of them is real, and the other is a construction — a Saturn figure wearing a Jesus mask.\u003c/p\u003e\n\u003ch3 id=\"the-sun-god-in-the-sanctuary\"\u003eThe Sun God in the Sanctuary\u003c/h3\u003e\n\u003cp\u003eThe Catholic Church's imagery betrays its origins. The monstrance — the golden vessel used to display the consecrated host — is shaped like a sunburst. The host itself is a circular disc — the sun. The mass is celebrated on Sunday — the day of the sun. The Vatican's St. Peter's Square features an Egyptian obelisk (a solar-phallic symbol) at its center, surrounded by an ellipse designed by Bernini to represent the sun's path.\u003c/p\u003e\n\u003cp\u003eThese are not Christian symbols. They are solar symbols, and the solar cult is inseparable from the Saturn cult. Saturn and Sol are complementary — the father and the son in the pagan pantheon, the dark and the light aspects of the same cosmic power. The Catholic Church, under Jesuit administration, worships both simultaneously: Saturn through its cube symbolism, calendar, and hierarchy, and Sol through its imagery, architecture, and liturgical timing.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack (agent131711.substack.com) documents this dual worship in extensive detail, showing how the institutional church functions as a two-faced system — Christian in vocabulary, pagan in practice. The Jesuit strategy, as revealed in \u003cem\u003eCatholic Confidential\u003c/em\u003e, is to infiltrate \"cloaked with cunning,\" appearing as what they are not. The church itself is the greatest example of this infiltration: an institution that appears Christian but operates as a Saturn-Sol temple.\u003c/p\u003e\n\u003ch3 id=\"the-halo-saturns-ring-on-christs-head\"\u003eThe Halo: Saturn's Ring on Christ's Head\u003c/h3\u003e\n\u003cp\u003eEvery depiction of Jesus in Catholic and Orthodox art features a halo — a golden ring around the head. This is not a biblical symbol. No scripture describes Jesus with a ring of light around his head. The halo derives from pagan art, where it represented the solar disc. It appears in depictions of Helios, Apollo, Mithras, and other sun gods long before it was applied to Christian figures.\u003c/p\u003e\n\u003cp\u003eBy placing Saturn's ring — the ring of binding — on the head of Christ, the artists of the church (many of whom were financed by Jesuit patrons) performed a visual incantation: they bound the image of Christ to the image of Saturn-Sol. Every church that displays these images, every Bible with these illustrations, every Christmas card with a haloed Jesus — all propagate the Saturn counterfeit.\u003c/p\u003e\n\u003ch2 id=\"the-name-manipulation\"\u003eThe Name Manipulation\u003c/h2\u003e\n\u003ch3 id=\"jesus-vs-yeshua\"\u003e\"Jesus\" vs. Yeshua\u003c/h3\u003e\n\u003cp\u003eThe name \"Jesus\" is a transliteration through multiple languages: from Hebrew Yeshua to Greek Iesous to Latin Iesus to English Jesus. The name itself is not the issue — transliteration is a normal linguistic process. The issue is what has been attached to the name.\u003c/p\u003e\n\u003cp\u003eIn the ancient world, names carried power. To know a being's true name was to have authority over it. The Saturn cult understood this. By attaching the name \"Jesus\" to a figure that combines solar imagery, Saturn symbolism, pagan ritual timing, and institutional hierarchy, the cult effectively hijacked the name — using it as a vessel for a different spiritual entity.\u003c/p\u003e\n\u003cp\u003eWhen Christians pray to \"Jesus\" while visualizing the haloed, European-featured figure of institutional art, while kneeling in a building designed according to pagan architectural principles, while celebrating festivals timed to the pagan calendar — are they actually reaching the Yeshua of Nazareth? Or are they connecting with the Saturn-Sol composite that the Jesuits have substituted in his place?\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony suggests the latter. The 97.5 percent rejection rate implies that the vast majority of Christians are praying to the wrong being, worshipping the wrong figure, following the wrong path. They believe they know Jesus, but as Pittman was told, they \"never made Me Lord.\" The \"Me\" they missed is not the church's Jesus. It is the real one.\u003c/p\u003e\n\u003ch3 id=\"the-cross-instrument-of-death-as-object-of-worship\"\u003eThe Cross: Instrument of Death as Object of Worship\u003c/h3\u003e\n\u003cp\u003eThe cross is the central symbol of Christianity. But consider what it represents: an instrument of torture and execution. Roman crucifixion was designed to be the most painful, humiliating death possible. The cross was not a religious symbol — it was a gallows, an electric chair, a lethal injection table.\u003c/p\u003e\n\u003cp\u003eIn occult symbolism, the cross has pre-Christian meanings. The tau cross (T-shape) was associated with Tammuz, the dying and rising god of Babylon. The ankh of Egypt — a cross with a loop — represented life through death, the cycle of sacrifice and renewal that Saturn governs. By placing the cross at the center of Christian worship, the church ensured that Christians would venerate death, sacrifice, and the Saturn cycle — all while believing they were honoring their Savior.\u003c/p\u003e\n\u003cp\u003eJesus said to take up your cross and follow him (Matthew 16:24). This was a call to self-denial and spiritual death to the world. The church transformed this metaphor into a literal object of worship, a golden ornament worn around the neck, a jeweled decoration on the altar — reversing the meaning from spiritual discipline to material idolatry. This is Saturn's trick: to take the spiritual and make it material, to take the living truth and fossilize it into dead ritual.\u003c/p\u003e\n\u003ch2 id=\"the-jesuit-construction-project\"\u003eThe Jesuit Construction Project\u003c/h2\u003e\n\u003ch3 id=\"building-the-false-church\"\u003eBuilding the False Church\u003c/h3\u003e\n\u003cp\u003eThe Jesuits did not create Christianity. They hijacked it. The process took centuries, but its outlines are clear to anyone willing to look.\u003c/p\u003e\n\u003cp\u003eStep one: Infiltrate the Catholic Church. The Jesuits were founded in 1540 and within decades had become the most powerful order in Catholicism. They controlled education, missions, diplomacy, and confession — the last being perhaps the most powerful tool, as it gave them access to the secrets of kings and nobles.\u003c/p\u003e\n\u003cp\u003eStep two: Standardize worship. The Council of Trent (1545-1563), heavily influenced by the Jesuits, standardized Catholic liturgy, theology, and practice. It codified the Mass, the calendar, the structure of worship. It ensured that every Catholic church worldwide would perform the same rituals, speak the same words, follow the same calendar — the Jesuit-designed calendar that is built on pagan timing.\u003c/p\u003e\n\u003cp\u003eStep three: Suppress alternatives. The Inquisition, which the Jesuits administered with particular zeal, eliminated anyone who questioned the standardized version of Christianity. Gnostics, Cathars, Waldensians, Hussites, and eventually Protestants were targeted. The Jesuits' willingness to practice \"every species of vice,\" as \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals, extended to torture, assassination, and the engineering of wars.\u003c/p\u003e\n\u003cp\u003eStep four: Infiltrate Protestantism. When the Reformation threatened to break the monopoly, the Jesuits deployed their most sophisticated strategy: they infiltrated Protestant movements. The Jesuit oath, documented in multiple sources, explicitly commands members to appear as Protestants, to join Protestant churches, to rise to positions of leadership within them. Over centuries, this infiltration has brought Protestant worship closer and closer to Catholic practice — the same holidays, the same imagery, the same institutional structure.\u003c/p\u003e\n\u003ch3 id=\"the-result-a-universal-saturn-church\"\u003eThe Result: A Universal Saturn Church\u003c/h3\u003e\n\u003cp\u003eThe result of five centuries of Jesuit work is a global Christianity that, across almost all denominations, worships on the solar calendar, celebrates pagan holidays, uses Saturn-Sol imagery, operates through hierarchical institutions, and teaches a version of Jesus that is functionally indistinguishable from a pagan deity.\u003c/p\u003e\n\u003cp\u003eThis is the Jesus of the churches: a Saturn-Sol figure wearing Christian names, preached from pulpits designed as pagan temples, celebrated on dates stolen from pagan festivals, depicted with pagan symbols, and worshipped through rituals that trace their lineage to Babylon, Rome, and the mystery schools.\u003c/p\u003e\n\u003cp\u003eAgent131711's research on Substack traces these connections in forensic detail, showing document by document, symbol by symbol, how the historical Jesus was replaced by the institutional Christ — a product as carefully manufactured as any consumer brand, and serving the same ultimate purpose: the harvesting of spiritual energy for entities that most people believe do not exist.\u003c/p\u003e\n\u003ch2 id=\"the-evidence-of-fruit\"\u003eThe Evidence of Fruit\u003c/h2\u003e\n\u003ch3 id=\"what-the-church-has-produced\"\u003eWhat the Church Has Produced\u003c/h3\u003e\n\u003cp\u003eJesus said: \u003cem\u003e\"By their fruits ye shall know them\"\u003c/em\u003e (Matthew 7:20). If the institutional church worships the real Jesus, its fruits should reflect his character: humility, truth, sacrifice, liberation.\u003c/p\u003e\n\u003cp\u003eInstead, the church has produced: the Crusades, the Inquisition, the witch trials, the slave trade (blessed by papal bulls), the residential school system (operated by Jesuits and other Catholic orders), the sexual abuse scandals that have consumed billions in settlements while thousands of victims received no justice, the accumulation of wealth on a scale that rivals secular empires, and the political alliances with every form of tyranny from monarchy to fascism.\u003c/p\u003e\n\u003cp\u003eThese are not the fruits of Christ. These are the fruits of Saturn — the god who devours his children. The church has devoured millions in its furnace of war, persecution, and institutional abuse. It has done so while speaking Christ's name, reading Christ's words, and displaying Christ's image — all of which serves to damn the name of Christ by association.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's 97.5 percent statistic makes sense in this light. If the institution itself is compromised — if the Jesus it worships is not the Jesus of scripture but a Saturn counterfeit — then the people who trust the institution are trusting a lie. They have never met the real Jesus because the institution has ensured they never will. They have met only the product, the brand, the carefully constructed idol that sits where Christ should be.\u003c/p\u003e\n\u003ch2 id=\"finding-the-real-jesus\"\u003eFinding the Real Jesus\u003c/h2\u003e\n\u003ch3 id=\"outside-the-institution\"\u003eOutside the Institution\u003c/h3\u003e\n\u003cp\u003eIf the institutional Jesus is a counterfeit, where is the real one? The answer, paradoxically, is in the scripture that the institution claims to follow but systematically contradicts. The real Jesus is found in the words he spoke — words that Matthew 12:36-37 tells us carry eternal weight. Not in buildings, not in rituals, not in holidays, not in institutional authority, but in the text itself.\u003c/p\u003e\n\u003cp\u003eThe real Jesus said: \u003cem\u003e\"God is a Spirit: and they that worship him must worship him in spirit and in truth\"\u003c/em\u003e (John 4:24). Spirit and truth. Not brick and mortar. Not ritual and calendar. Not hierarchy and obedience to men. Spirit — the invisible, immaterial reality that Saturn worship is designed to make you forget. And truth — the uncomfortable, tradition-shattering, institution-toppling truth that Pittman brought back from the other side.\u003c/p\u003e\n\u003cp\u003eThe 5 percent who truly serve God, according to Pittman's account, are those who have found the real Jesus outside the Saturn system. They may attend churches or they may not, but they do not confuse the institution with the Savior. They test everything against scripture. They reject traditions that contradict the text. They worship in spirit and truth, not in cubes and circles and rings.\u003c/p\u003e\n\u003ch3 id=\"the-narrow-path\"\u003eThe Narrow Path\u003c/h3\u003e\n\u003cp\u003eJesus said the path to life is narrow and few find it. The Saturn system — the institutional church with its holidays, its hierarchy, its imagery, its Jesuit architects — is the wide path. It is comfortable. It is popular. It is decorated with beautiful music, impressive architecture, and the warm glow of community. And it leads to the 97.5 percent rejection rate that Pittman witnessed.\u003c/p\u003e\n\u003cp\u003eThe narrow path requires leaving all of that behind. It requires questioning everything you were taught. It requires facing the possibility that your entire religious life has been a participation in a Saturn cult. This is not a comfortable realization. It is the most uncomfortable truth a person can face. But it is the truth, and only the truth sets free.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"
