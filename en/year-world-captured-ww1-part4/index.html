\u003eGod's people are destroyed not by force but by ignorance — and the greatest ignorance is the ignorance that is deliberately imposed. The year 1913 was the most consequential year in modern history, yet most Americans know nothing about what happened in that year beyond Woodrow Wilson's inauguration. In 1913, the financial, legal, and political infrastructure for permanent global control was established in a series of carefully coordinated moves that transformed the United States from a sovereign republic into a debt colony owned and operated by the Jesuit-controlled banking cartel.\u003c/p\u003e\n\u003cp\u003eThe Society of Jesus, Ignatius Loyola's military order, had been maneuvering toward this moment for over a century. Tamburini's boast of governing the world from his chamber became operational reality in 1913. The Jesuits did not need armies to capture the world — they needed three documents: the 16th Amendment, the 17th Amendment, and the Federal Reserve Act. With these three instruments, they captured the world's most powerful nation and, through it, the world.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\"\u003eThe Serpents Curse\u003c/a\u003e speaks to this ancient curse of bondage — the chains forged not in iron but in paper, in legislation, in the fine print of financial instruments. And \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e identifies the willing servants who carried out this capture — the politicians, the bankers, the lawyers who sold their nation for thirty pieces of silver.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-three-captures-of-1913\"\u003eThe Three Captures of 1913\u003c/h2\u003e\n\u003ch3 id=\"the-16th-amendment-the-income-tax\"\u003eThe 16th Amendment: The Income Tax\u003c/h3\u003e\n\u003cp\u003eThe 16th Amendment to the United States Constitution, ratified on February 3, 1913, gave Congress the power to levy an income tax without apportioning it among the states. This seemingly technical change had revolutionary implications: for the first time, the federal government could reach directly into the pockets of every American citizen and extract a portion of their labor.\u003c/p\u003e\n\u003cp\u003eBefore the 16th Amendment, the federal government was funded primarily by tariffs and excise taxes — taxes on goods, not on people. The income tax transformed the relationship between the citizen and the state from one of limited obligation to one of unlimited extraction. There is no cap on the income tax; the rate can be set at any level Congress chooses. In theory (and in practice during wartime), the government can take 90% or more of a citizen's income.\u003c/p\u003e\n\u003cp\u003eThe income tax was necessary to service the debt that the Federal Reserve would create. Without a mechanism for taxing citizens directly, the government could not guarantee repayment of the bonds and notes issued by the Federal Reserve system. The income tax was not a revenue measure — it was a debt service mechanism, designed to ensure that the banking elite would always be repaid.\u003c/p\u003e\n\u003cp\u003eThe ratification of the 16th Amendment is itself shrouded in controversy. Legal researcher William Benson's research, documented in \u003cem\u003eThe Law That Never Was\u003c/em\u003e, presents evidence that the amendment was never properly ratified by the required number of states. If Benson's research is correct, the entire federal income tax system rests on a fraudulent foundation — which would be entirely consistent with the Jesuit modus operandi of building power on deception.\u003c/p\u003e\n\u003ch3 id=\"the-17th-amendment-the-senate-capture\"\u003eThe 17th Amendment: The Senate Capture\u003c/h3\u003e\n\u003cp\u003eThe 17th Amendment, ratified on April 8, 1913, changed the method of electing United States Senators from appointment by state legislatures to direct popular election. This change was presented as a democratic reform — giving \"the people\" a direct voice in choosing their senators.\u003c/p\u003e\n\u003cp\u003eIn reality, the 17th Amendment destroyed the last structural safeguard against federal overreach. Under the original Constitution, senators were chosen by state legislatures and served as representatives of state governments in the federal system. This gave states a direct check on federal power: if the federal government overstepped its bounds, state legislatures could recall or replace their senators.\u003c/p\u003e\n\u003cp\u003eDirect election severed this connection. Senators no longer answered to state governments; they answered to the electorate — which meant, in practice, they answered to whoever controlled the media, the campaign financing, and the party machinery. And who controlled these? The same banking and corporate interests that controlled the Federal Reserve.\u003c/p\u003e\n\u003cp\u003eThe 17th Amendment thus completed the centralization of power in Washington by removing the states' only direct representation in the federal government. Combined with the income tax (which gave the federal government unlimited revenue) and the Federal Reserve (which gave the banking elite control over the money supply), the 17th Amendment created a system of governance in which the people believed they were free while being, in fact, subjects of a financial oligarchy.\u003c/p\u003e\n\u003ch3 id=\"the-federal-reserve-act-the-money-capture\"\u003eThe Federal Reserve Act: The Money Capture\u003c/h3\u003e\n\u003cp\u003eOn December 23, 1913, President Woodrow Wilson signed the Federal Reserve Act into law. This Act created the Federal Reserve System — a network of twelve regional banks controlled by a Board of Governors in Washington, which was in turn controlled by the private banking interests that owned stock in the regional banks.\u003c/p\u003e\n\u003cp\u003eThe Federal Reserve was presented as a public institution designed to stabilize the banking system and prevent financial panics. In reality, it was a private banking cartel that was given the power to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCreate money from nothing\u003c/strong\u003e through the mechanism of fractional reserve lending\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSet interest rates\u003c/strong\u003e that determined the cost of credit throughout the economy\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePurchase government bonds\u003c/strong\u003e using newly created money, thus lending to the government at interest\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRegulate the banking system\u003c/strong\u003e — meaning that the banks regulated themselves\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Federal Reserve Act was the capstone of a plan that had been in development since at least the Panic of 1907, which had been deliberately engineered by J.P. Morgan to create public demand for a central bank. The Act was drafted in secret at a meeting on Jekyll Island, Georgia, in November 1910 — a meeting attended by representatives of the Morgan, Rockefeller, and Rothschild banking interests.\u003c/p\u003e\n\u003cp\u003eThe Rothschilds, as the Vatican's long-standing financial agents, provided the link between the American banking elite and the Jesuit power structure. The Federal Reserve was not merely an American institution; it was a node in a global financial network controlled from the Vatican through the Rothschild banking dynasty.\u003c/p\u003e\n\u003ch2 id=\"the-capture-complete\"\u003eThe Capture Complete\u003c/h2\u003e\n\u003ch3 id=\"wilsons-regret\"\u003eWilson's Regret\u003c/h3\u003e\n\u003cp\u003eWoodrow Wilson, who signed the Federal Reserve Act and the income tax into law, reportedly expressed regret late in life. He is widely quoted as saying: \"I am a most unhappy man. I have unwittingly ruined my country.\" While the exact provenance of this quote is debated, Wilson's correspondence and speeches from his later years do reveal a growing awareness that he had been manipulated.\u003c/p\u003e\n\u003cp\u003eWilson was a product of the Jesuit educational system — he was educated at Princeton, which, while Presbyterian in origin, had been deeply infiltrated by Jesuit-connected academics by the early 20th century. His advisor, Colonel Edward Mandell House, was a Jesuit-connected operative who served as Wilson's link to the international banking network. House's novel \u003cem\u003ePhilip Dru: Administrator\u003c/em\u003e (published in 1912, the year before Wilson took office) described a future America governed by a benevolent dictator who establishes a central bank and a graduated income tax — precisely the program that Wilson would implement.\u003c/p\u003e\n\u003ch3 id=\"the-war-machine-activated\"\u003eThe War Machine Activated\u003c/h3\u003e\n\u003cp\u003eWith the income tax providing unlimited revenue, the Federal Reserve providing unlimited credit, and the Senate under the control of the banking interests, the United States was ready for war. The financial architecture created in 1913 was activated in 1917, when America entered World War I and the Liberty Bond program began extracting wealth from the American people on an industrial scale.\u003c/p\u003e\n\u003cp\u003eThe sequence is unmistakable:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e1913\u003c/strong\u003e: Create the financial infrastructure (Federal Reserve, income tax)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1914-1916\u003c/strong\u003e: Use the infrastructure to fund the Allies through loans\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1917\u003c/strong\u003e: Enter the war officially and activate the Liberty Bond program\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1918-1919\u003c/strong\u003e: Win the war, reshape the world map, and collect the debts\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eEvery step was planned, coordinated, and executed by the Jesuit-controlled banking network. The war was not a response to the assassination of an archduke; it was the purpose for which the financial infrastructure of 1913 had been created.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e reveals how the constitutional framework was systematically dismantled to enable this capture, and \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e traces the secret society connections that shaped the American system from its inception.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's near-death testimony describes a hierarchical demonic government operating from the second heaven — a government that mirrors the earthly structures of control established in 1913. The Federal Reserve is the financial arm of this demonic hierarchy; the income tax is its enforcement mechanism; and the captured Senate is its legislative body. As Pittman was told: \"You call me Lord but you never made me Lord.\" America called itself free in 1913 while submitting to permanent financial slavery. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eSee also \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e and \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e for comprehensive documentation.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetrut
