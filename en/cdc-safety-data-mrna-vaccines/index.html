ment. In ancient Israel, the merchant who used false weights — heavy on the buying side, light on the selling side — committed an abomination because he exploited the trust inherent in commerce. The buyer trusted that the merchant's scales were honest. When they were not, the entire system of exchange was corrupted.\u003c/p\u003e\n\u003cp\u003eThe CDC is the merchant of safety data. The public trusts that the CDC's measurements — its surveillance systems, its safety analyses, its reports — are conducted with honest scales. But when the safety monitoring system is designed to undercount adverse events, when signals are dismissed rather than investigated, and when the data is presented with euphemistic language designed to minimize alarm, the scales are dishonest. The weights are divers. The measurement is an abomination.\u003c/p\u003e\n\u003cp\u003eThe ZZZ Daily track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e documents how the medical establishment was captured by interests that do not serve human health. And the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/93-The_Great_Exchange.mp4\"\u003eThe Great Exchange\u003c/a\u003e reveals the substitution of truth for a lie — honest measurement for dishonest.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-safety-surveillance-system-how-it-works-and-doesnt\"\u003eThe Safety Surveillance System: How It Works (and Doesn't)\u003c/h2\u003e\n\u003ch3 id=\"vaers-the-voluntary-system\"\u003eVAERS: The Voluntary System\u003c/h3\u003e\n\u003cp\u003eThe Vaccine Adverse Event Reporting System (VAERS) is the primary passive surveillance system for vaccine adverse events in the United States. Key facts about VAERS:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eIt is passive.\u003c/strong\u003e Reports are submitted voluntarily by healthcare providers, patients, and family members. There is no automatic capture of adverse events.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIt is known to undercount.\u003c/strong\u003e Studies published by the CDC itself (the Lazarus Report, Harvard Pilgrim Healthcare study) have estimated that VAERS captures between 1% and 10% of actual adverse events.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIt was designed for signal detection, not causation.\u003c/strong\u003e VAERS is intended to identify safety signals that warrant further investigation — not to establish whether a vaccine caused a specific adverse event.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIt was overwhelmed by COVID-19 vaccine reports.\u003c/strong\u003e VAERS received more reports following COVID-19 vaccination than for all other vaccines combined over the previous 30 years.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"v-safe-the-active-system-that-was-suppressed\"\u003eV-safe: The Active System That Was Suppressed\u003c/h3\u003e\n\u003cp\u003eV-safe was a smartphone-based active surveillance system created specifically for COVID-19 vaccine safety monitoring. Unlike VAERS, V-safe actively solicited reports from participants through text-based health check-ins after vaccination.\u003c/p\u003e\n\u003cp\u003eV-safe data was not voluntarily released by the CDC. It was obtained through litigation — a lawsuit by the Informed Consent Action Network (ICAN) forced the CDC to release the V-safe data. When released, the data showed:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eApproximately 7.7% of V-safe participants reported needing medical care\u003c/strong\u003e after vaccination\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOver 25% reported being unable to perform normal daily activities\u003c/strong\u003e after vaccination\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApproximately 10% reported missing work or school\u003c/strong\u003e after vaccination\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese are extraordinary numbers for a product declared \"safe.\" If 7.7% of the estimated 270 million Americans who received at least one COVID-19 vaccine dose needed medical care, that represents approximately 20.8 million people — a number that dwarfs the adverse event reports in VAERS.\u003c/p\u003e\n\u003cp\u003eThe CDC did not voluntarily share this data. It had to be sued to release it.\u003c/p\u003e\n\u003ch3 id=\"the-proportional-reporting-ratio-prr-analysis\"\u003eThe Proportional Reporting Ratio (PRR) Analysis\u003c/h3\u003e\n\u003cp\u003eThe CDC was supposed to conduct Proportional Reporting Ratio (PRR) analyses — a standard pharmacovigilance method that compares the reporting frequency of specific adverse events for a particular vaccine against the reporting frequency for all other vaccines. If a specific vaccine shows a significantly higher proportion of a particular adverse event, the PRR signals a potential safety concern.\u003c/p\u003e\n\u003cp\u003eIn 2022, the CDC was caught in a contradiction. The agency initially claimed it was conducting PRR analyses but then admitted it had not been doing so. When PRR analyses were eventually conducted (under pressure), they revealed safety signals for hundreds of adverse event categories — far more than the limited signals the CDC had publicly acknowledged.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-updated-safety-data-what-the-numbers-show\"\u003eThe Updated Safety Data: What the Numbers Show\u003c/h2\u003e\n\u003ch3 id=\"cardiac-events\"\u003eCardiac Events\u003c/h3\u003e\n\u003cp\u003eThe updated CDC safety data shows persistent and significant signals for cardiac adverse events following mRNA vaccination:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMyocarditis/pericarditis\u003c/strong\u003e remains the most prominent cardiac signal, with highest rates in males aged 16-30 after the second dose\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCardiac arrest\u003c/strong\u003e reports following mRNA vaccination exceed background rates\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTroponin elevation\u003c/strong\u003e (indicating cardiac cell damage) has been detected in studies of vaccinated populations at rates suggesting subclinical cardiac injury is far more common than clinical myocarditis\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAtrial fibrillation\u003c/strong\u003e has emerged as a signal in older adult populations\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"neurological-events\"\u003eNeurological Events\u003c/h3\u003e\n\u003cp\u003eNeurological adverse events show consistent signals:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGuillain-Barre Syndrome (GBS)\u003c/strong\u003e — ascending paralysis affecting peripheral nerves\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBell's palsy\u003c/strong\u003e — facial nerve paralysis\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTransverse myelitis\u003c/strong\u003e — spinal cord inflammation\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSeizures\u003c/strong\u003e — including new-onset seizures in individuals with no seizure history\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTinnitus\u003c/strong\u003e — persistent ringing in the ears, reported at rates far above background\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSmall fiber neuropathy\u003c/strong\u003e — damage to small nerve fibers causing chronic pain and autonomic dysfunction\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"thrombotic-events\"\u003eThrombotic Events\u003c/h3\u003e\n\u003cp\u003eBlood clotting disorders continue to show safety signals:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePulmonary embolism\u003c/strong\u003e — blood clots in the lungs\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeep vein thrombosis\u003c/strong\u003e — blood clots in deep veins\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCerebral venous sinus thrombosis\u003c/strong\u003e — blood clots in brain drainage veins\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThrombocytopenia\u003c/strong\u003e — low platelet counts affecting blood clotting ability\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"autoimmune-events\"\u003eAutoimmune Events\u003c/h3\u003e\n\u003cp\u003eNew-onset autoimmune conditions are showing signals:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAutoimmune hepatitis\u003c/strong\u003e — immune attack on the liver\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImmune thrombocytopenia (ITP)\u003c/strong\u003e — immune destruction of platelets\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGraves' disease and other thyroid autoimmunity\u003c/strong\u003e — immune attack on the thyroid\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlopecia\u003c/strong\u003e — hair loss from immune attack on hair follicles\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLupus flares\u003c/strong\u003e — exacerbation of systemic lupus erythematosus\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"cancer-signals\"\u003eCancer Signals\u003c/h3\u003e\n\u003cp\u003eAs documented in our article on \u003ca href=\"/cdc-advisors-covid-shots-cancer/?lang=en\"\u003eCDC Advisors Disclose Links Between COVID-19 Shots and Cancer\u003c/a\u003e, cancer signals are emerging in the safety data — including signals for lymphoma, leukemia, and solid tumors.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-kingston-report-decoding-the-official-data\"\u003eThe Kingston Report: Decoding the Official Data\u003c/h2\u003e\n\u003cp\u003eKaren Kingston's analysis through \u003ca href=\"https://karenkingston.substack.com\"\u003eThe Kingston Report\u003c/a\u003e provides critical context for interpreting the CDC's safety data.\u003c/p\u003e\n\u003ch3 id=\"what-the-cdc-is-not-telling-you\"\u003eWhat the CDC Is Not Telling You\u003c/h3\u003e\n\u003cp\u003eKingston has documented the systematic ways in which the CDC's data presentation minimizes the apparent severity of the safety signals:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDenominator manipulation:\u003c/strong\u003e The CDC presents adverse event rates using the total number of doses administered as the denominator. Because hundreds of millions of doses were administered, even large absolute numbers of adverse events appear as tiny percentages. A 0.01% rate sounds reassuring until you calculate that 0.01% of 670 million doses (total U.S. doses administered) is 67,000 events.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTemporal filtering:\u003c/strong\u003e The CDC applies temporal windows to its safety analyses — for example, only counting myocarditis events that occur within 7 or 21 days of vaccination. Events occurring after the window are excluded, even if biologically related. This systematically undercounts events with delayed onset.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAttribution avoidance:\u003c/strong\u003e The CDC's language consistently avoids attributing adverse events to vaccination. Events are described as \"temporally associated\" or \"reported following vaccination\" — language that maintains plausible deniability while acknowledging the data exists.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eComparison to background rates:\u003c/strong\u003e The CDC compares post-vaccination adverse event rates to pre-pandemic \"background rates\" — rates established before the widespread distribution of a novel gene therapy product. But if the product is changing background rates (by causing more cardiac events, more neurological events, more autoimmune events in the general population), then comparing to pre-product background rates obscures the signal.\u003c/p\u003e\n\u003ch3 id=\"the-real-numbers\"\u003eThe Real Numbers\u003c/h3\u003e\n\u003cp\u003eKingston's analysis estimates that when corrected for underreporting (using the CDC's own established underreporting factors), the actual number of Americans who experienced significant adverse events following COVID-19 mRNA vaccination is likely in the millions — consistent with the V-safe data showing 7.7% of participants requiring medical care.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-biblical-standard-of-measurement\"\u003eThe Biblical Standard of Measurement\u003c/h2\u003e\n\u003ch3 id=\"honest-weights\"\u003eHonest Weights\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"A false balance is abomination to the LORD: but a just weight is his delight.\" — Proverbs 11:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe CDC's safety surveillance system is a false balance. It undercounts by design (passive reporting). It excludes by policy (temporal filtering). It minimizes by language (attribution avoidance). It obscures by mathematics (denominator manipulation).\u003c/p\u003e\n\u003cp\u003eGod delights in just weights — in honest measurement that reveals rather than conceals. The safety data, when measured honestly — when corrected for underreporting, when temporal windows are expanded, when denominator manipulation is removed — tells a story of harm at a scale unprecedented in the history of vaccination.\u003c/p\u003e\n\u003ch3 id=\"the-firmament-of-trust\"\u003eThe Firmament of Trust\u003c/h3\u003e\n\u003cp\u003eThe firmament God placed over the earth separates and protects. Trust is a social firmament — it separates reliable information from unreliable information and protects the public from harmful decisions based on false data. When the CDC corrupts its safety data through dishonest measurement, it breaches the firmament of trust. The public, unprotected by honest information, makes decisions that harm their bodies — the temples of the Holy Spirit.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-individuals-should-know\"\u003eWhat Individuals Should Know\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eVAERS captures only 1-10% of actual adverse events.\u003c/strong\u003e Multiply reported numbers by 10-100 for a more realistic estimate.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eV-safe data shows 7.7% of participants needed medical care\u003c/strong\u003e — data the CDC had to be sued to release.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePRR analyses reveal hundreds of safety signals\u003c/strong\u003e — far more than the CDC publicly acknowledged.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe CDC's data presentation systematically minimizes\u003c/strong\u003e the apparent severity of adverse events through denominator manipulation, temporal filtering, and attribution avoidance.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCardiac, neurological, thrombotic, autoimmune, and cancer signals\u003c/strong\u003e are all present in the updated data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe safety monitoring system is not designed to protect you.\u003c/strong\u003e It is designed to provide plausible deniability.\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eKingston, Karen. \u003ca href=\"https://karenkingston.substack.com\"\u003eThe Kingston Report\u003c/a\u003e. Analysis of CDC safety data and surveillance system limitations.\u003c/li\u003e\n\u003cli\u003eVAERS data (CDC/FDA co-managed database)\u003c/li\u003e\n\u003cli\u003eV-safe data (released via ICAN litigation)\u003c/li\u003e\n\u003cli\u003eCDC PRR analyses\u003c/li\u003e\n\u003cli\u003eLazarus Report on VAERS underreporting\u003c/li\u003e\n\u003cli\u003eHarvard Pilgrim Healthcare VAERS study\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u00
