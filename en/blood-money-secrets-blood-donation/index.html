re declares that the life of the flesh resides in the blood. Every major spiritual tradition recognizes the profound significance of blood — as the carrier of life, as the substance of covenant, as the medium of sacrifice. The blood of Christ redeems humanity. The blood of Abel cries out from the ground. Blood is not merely a biological fluid — it is a spiritual substance of the highest order.\u003c/p\u003e\n\u003cp\u003eAnd yet the modern blood donation industry treats blood as a commodity — collected for free from well-meaning donors, processed through industrial operations, and sold to hospitals at enormous profit. The industry that handles humanity's most sacred substance operates with the ethics of a pawn shop and the transparency of a classified military program.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown during his NDE the reality of spiritual warfare. The three heavens, the demonic hierarchies, the 97.5% failure rate — all point to a world in which the most sacred aspects of human existence have been captured and commodified by forces that serve darkness. Blood donation is one such captured domain. The 95% who serve \"self\" donate blood thinking they are saving lives — and they may be — but they do not know where their blood actually goes, who profits from it, or what is done with it.\u003c/p\u003e\n\u003cp\u003eThe Jesuits operate through \"every species of vice\" while appearing virtuous. Napoleon saw their \"absolute power.\" Adams warned of their \"eternal damnation.\" Tambulini governed from his room. The blood industry operates identically: appearing humanitarian while generating billions in profit from a substance donated freely by people who believe they are serving others.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-blood-business\"\u003eThe Blood Business\u003c/h2\u003e\n\u003ch3 id=\"the-numbers\"\u003eThe Numbers\u003c/h3\u003e\n\u003cp\u003eThe American Red Cross collects approximately \u003cstrong\u003e6.8 million units\u003c/strong\u003e of blood per year in the United States. The blood is donated for free by volunteers. It is then:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTested\u003c/strong\u003e for infectious diseases\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProcessed\u003c/strong\u003e into components (red cells, platelets, plasma, cryoprecipitate)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStored\u003c/strong\u003e in temperature-controlled facilities\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSold\u003c/strong\u003e to hospitals at prices ranging from \u003cstrong\u003e$150 to $300+ per unit\u003c/strong\u003e for red blood cells\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eA single donation can be separated into components that generate \u003cstrong\u003e$300-$500 in revenue\u003c/strong\u003e. Multiply that by 6.8 million donations, and the Red Cross blood operation alone generates \u003cstrong\u003eover $2 billion\u003c/strong\u003e in annual revenue.\u003c/p\u003e\n\u003cp\u003eThe donor receives nothing. The Red Cross — a \"nonprofit\" organization — generates billions. The hospitals mark up the blood products further before charging patients. A single unit of blood can cost a patient \u003cstrong\u003e$1,000 or more\u003c/strong\u003e on their hospital bill.\u003c/p\u003e\n\u003ch3 id=\"the-red-cross-not-what-you-think\"\u003eThe Red Cross: Not What You Think\u003c/h3\u003e\n\u003cp\u003eThe American Red Cross is perceived as a charitable organization staffed by volunteers doing good works. The reality is more complex:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe Red Cross CEO earns \u003cstrong\u003eover $700,000\u003c/strong\u003e annually\u003c/li\u003e\n\u003cli\u003eSenior executives earn \u003cstrong\u003esix-figure salaries\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eThe organization has been repeatedly criticized for \u003cstrong\u003efinancial mismanagement\u003c/strong\u003e and \u003cstrong\u003elack of transparency\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eDuring disaster relief operations, donations intended for victims have been diverted to \u003cstrong\u003egeneral operating expenses\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eBlood operations represent the Red Cross's \u003cstrong\u003elargest revenue source\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Red Cross was established with a charter from the US Congress, giving it a quasi-governmental status. It operates under the protection of the Geneva Conventions and enjoys tax-exempt status. This combination of governmental authority and private operation creates an accountability gap — the Red Cross is neither fully public (and thus subject to public oversight) nor fully private (and thus subject to market competition).\u003c/p\u003e\n\u003ch3 id=\"the-plasma-industry\"\u003eThe Plasma Industry\u003c/h3\u003e\n\u003cp\u003eThe plasma industry is even more revealing. Plasma — the liquid component of blood — is used to manufacture pharmaceutical products including immunoglobulins, clotting factors, and albumin. Unlike whole blood, plasma can be legally purchased from donors.\u003c/p\u003e\n\u003cp\u003eThe plasma industry is dominated by a handful of corporations:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGrifols\u003c/strong\u003e (Spain)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCSL Behring\u003c/strong\u003e (Australia)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTakeda\u003c/strong\u003e (Japan, formerly Shire/Baxter)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOctapharma\u003c/strong\u003e (Switzerland)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBPL\u003c/strong\u003e (UK)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese companies operate thousands of plasma collection centers across the United States, primarily in \u003cstrong\u003elow-income neighborhoods\u003c/strong\u003e. Donors are paid \u003cstrong\u003e$30-75 per donation\u003c/strong\u003e and can donate up to \u003cstrong\u003etwice per week\u003c/strong\u003e. The plasma collected from these donors is processed into products that sell for \u003cstrong\u003ethousands of dollars per dose\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eThe United States is the world's largest plasma exporter, supplying approximately \u003cstrong\u003e70% of the global plasma supply\u003c/strong\u003e. The country has become, in effect, a blood farm for the global pharmaceutical industry — with the poorest Americans serving as the livestock.\u003c/p\u003e\n\u003ch2 id=\"the-hidden-dangers\"\u003eThe Hidden Dangers\u003c/h2\u003e\n\u003ch3 id=\"contamination-history\"\u003eContamination History\u003c/h3\u003e\n\u003cp\u003eThe blood supply has a dark history of contamination:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe HIV Blood Scandal\u003c/strong\u003e: In the early 1980s, the blood supply was contaminated with HIV, infecting thousands of hemophiliacs and transfusion recipients. The blood industry was slow to implement screening tests, and some companies continued to sell contaminated blood products even after the risk was known. In some countries, government officials and blood company executives were criminally prosecuted. In the United States, no one was held accountable.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHepatitis C\u003c/strong\u003e: Before screening tests were available, the blood supply was widely contaminated with Hepatitis C. An estimated 300,000 Americans were infected with Hepatitis C through blood transfusions between 1970 and 1990.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePrion Diseases\u003c/strong\u003e: The blood supply cannot be effectively tested for prion diseases (such as Creutzfeldt-Jakob disease). Donors who lived in the UK during the BSE (\"mad cow disease\") epidemic are permanently deferred from donating blood — an acknowledgment that the blood supply is vulnerable to contaminants that cannot be detected.\u003c/p\u003e\n\u003ch3 id=\"what-donors-are-not-told\"\u003eWhat Donors Are Not Told\u003c/h3\u003e\n\u003cp\u003eBlood donors are not told:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe exact \u003cstrong\u003eprice their blood will be sold for\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eWhether their blood will be used for \u003cstrong\u003epatient care or pharmaceutical manufacturing\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eThat their blood may be \u003cstrong\u003eexported\u003c/strong\u003e to other countries\u003c/li\u003e\n\u003cli\u003eThat blood products have a \u003cstrong\u003esignificant rate of adverse reactions\u003c/strong\u003e in recipients\u003c/li\u003e\n\u003cli\u003eThat \u003cstrong\u003ealternatives to blood transfusion\u003c/strong\u003e exist and are used by some medical practitioners\u003c/li\u003e\n\u003cli\u003eThat the \u003cstrong\u003estorage process\u003c/strong\u003e degrades blood quality, and stored blood may be harmful to recipients\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-storage-problem\"\u003eThe Storage Problem\u003c/h3\u003e\n\u003cp\u003eResearch has revealed that stored blood deteriorates significantly over time:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRed blood cells lose their flexibility and ability to deliver oxygen\u003c/li\u003e\n\u003cli\u003eStored blood releases free hemoglobin, which can damage organs\u003c/li\u003e\n\u003cli\u003eStored blood has elevated potassium levels that can cause cardiac problems\u003c/li\u003e\n\u003cli\u003eStudies have shown that patients who receive older stored blood have \u003cstrong\u003eworse outcomes\u003c/strong\u003e than those who receive fresh blood or no transfusion at all\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDespite this evidence, blood banks routinely store blood for up to \u003cstrong\u003e42 days\u003c/strong\u003e and distribute it to hospitals without regard to storage age. The system is optimized for inventory management, not patient outcomes.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension-of-blood\"\u003eThe Spiritual Dimension of Blood\u003c/h2\u003e\n\u003ch3 id=\"blood-in-scripture\"\u003eBlood in Scripture\u003c/h3\u003e\n\u003cp\u003eThe Bible treats blood with extraordinary reverence:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLeviticus 17:11\u003c/strong\u003e: \"For the life of the flesh is in the blood\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLeviticus 17:14\u003c/strong\u003e: \"Ye shall eat the blood of no manner of flesh: for the life of all flesh is the blood thereof\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGenesis 9:4\u003c/strong\u003e: \"But flesh with the life thereof, which is the blood thereof, shall ye not eat\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eActs 15:20\u003c/strong\u003e: Gentile believers are instructed to abstain from blood\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese passages establish that blood is not merely a biological substance — it carries the essence of life itself. The prohibition against consuming blood extends, by spiritual principle, to the casual handling, commodification, and industrial processing of blood.\u003c/p\u003e\n\u003cp\u003eWhen blood is treated as a commodity — collected, processed, bought, and sold — its sacred nature is violated. The blood donation industry reduces the most sacred substance in the human body to a product on a shelf, with a barcode and an expiration date.\u003c/p\u003e\n\u003ch3 id=\"the-blood-covenant\"\u003eThe Blood Covenant\u003c/h3\u003e\n\u003cp\u003eThroughout Scripture, blood is the medium of covenant — the most solemn form of agreement between God and man. The blood of the Passover lamb protected Israel from the destroyer. The blood of Christ establishes the New Covenant. Blood is never casual in Scripture — it is always significant, always sacred, always consequential.\u003c/p\u003e\n\u003cp\u003eThe modern blood industry strips blood of its sacred significance and treats it as an industrial input. This desacralization is not accidental — it is a necessary step in the broader program of desacralizing human life itself. If blood is just a fluid, then the body is just a machine. If the body is just a machine, then human life has no inherent dignity. And if human life has no inherent dignity, then humans can be managed, manipulated, and exploited without moral consequence.\u003c/p\u003e\n\u003cp\u003eThis is the logical endpoint of the Rockefeller medical model — and it is the spiritual goal of the forces that Howard Pittman was shown in the second heaven. The demons do not need to possess every person. They only need to desacralize human life to the point where exploitation becomes routine, unremarkable, and profitable.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-connection\"\u003eThe Jesuit Connection\u003c/h3\u003e\n\u003cp\u003eThe Jesuit order, through its vast network of Catholic hospitals and charitable organizations, is deeply involved in the blood donation system. Catholic hospitals are among the largest consumers of blood products in the United States. The Jesuit commitment to institutional power — Napoleon's \"absolute power\" — finds expression in the control of the most fundamental substances of human life.\u003c/p\u003e\n\u003cp\u003ePope Clement XIV was poisoned — possibly with a substance delivered through the blood. The Jesuits' practice of \"every species of vice\" includes the commodification of sacred substances. Their infiltration \"cloaked with cunning\" ensures that the blood industry operates behind a facade of humanitarianism while generating billions in profit.\u003c/p\u003e\n\u003ch2 id=\"what-you-can-do\"\u003eWhat You Can Do\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eEducate yourself\u003c/strong\u003e about where your blood goes and who profits from it\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAsk questions\u003c/strong\u003e when asked to donate — demand transparency about how your blood will be used\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResearch alternatives\u003c/strong\u003e to blood transfusion for yourself and your family\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRecognize\u003c/strong\u003e that the blood donation industry is a business, not a charity\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePray for discernment\u003c/strong\u003e about the sacred nature of blood and its proper handling\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — research on the blood industry and its hidden economics\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — the sacred nature of blood and spiritual warfare\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit involvement in the medical-industrial complex\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions o
