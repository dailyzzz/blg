u003e — 2 Peter 1:20\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe New Testament did not arrive complete. It was not delivered by an angel, inscribed on golden plates, or dictated by God in a single session. It was constructed — assembled over centuries by men with competing theological visions, political ambitions, and institutional agendas. This construction process is the most important story in Christianity that most Christians have never been told.\u003c/p\u003e\n\u003cp\u003eHoward Pittman experienced the spiritual realm firsthand. Three heavens. Demonic hierarchy. The devastating 97.5 percent rejection rate. Pittman's testimony confirms that spiritual reality exists — but it also confirms that the institutions claiming to represent that reality are failing catastrophically. Ninety-five percent serve \"self.\" Every word matters (Matthew 12:36-37). The words of the New Testament, constructed by human hands, carry the weight the institution assigned them — but are those the right words?\u003c/p\u003e\n\u003cp\u003eThe Jesuits — Loyola's military organization, Napoleon's \"absolute power,\" Adams's \"eternal damnation,\" Tamburini's world governance, Clement XIV's poisoners — became the New Testament's fiercest defenders not because it is true, but because it is useful. The \u003cem\u003eCatholic Confidential\u003c/em\u003e documentary reveals their strategy: infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The New Testament is the Jesuits' most powerful tool — the text that legitimizes their authority.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/35-The_Tree_of_Life.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Tree of Life — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"phase-one-the-oral-period-30-50-ad\"\u003ePhase One: The Oral Period (30-50 AD)\u003c/h2\u003e\n\u003ch3 id=\"no-written-record\"\u003eNo Written Record\u003c/h3\u003e\n\u003cp\u003eFor the first two decades after Jesus, there was no New Testament. No Gospels. No epistles (that we know of). The movement existed entirely through oral transmission — stories told and retold, teachings memorized and repeated, experiences shared from person to person.\u003c/p\u003e\n\u003cp\u003eOral transmission is inherently unreliable. Psychological research on memory demonstrates that eyewitness accounts degrade rapidly. Details are added, modified, and rearranged with each retelling. After two decades of oral transmission, the stories that eventually became the Gospels had already been shaped by the communities that told them — their needs, their conflicts, their theological developments.\u003c/p\u003e\n\u003cp\u003eThis is not speculation. It is observable in the texts themselves. The Gospels reflect the concerns of their communities: Mark's community was facing persecution (hence the emphasis on suffering). Matthew's community was in conflict with the synagogue (hence the emphasis on Jewish law). Luke's community included Gentiles (hence the emphasis on inclusion). The texts are not pure historical memory. They are community documents shaped by community needs.\u003c/p\u003e\n\u003ch3 id=\"the-diversity-problem\"\u003eThe Diversity Problem\u003c/h3\u003e\n\u003cp\u003eDuring this oral period, Christianity was not one movement. It was many. Paul's communities understood Jesus differently from James's community in Jerusalem. The Johannine community understood Jesus differently from all of them. Gnostic communities, which appear to be as old as any other form of Christianity, understood Jesus in ways that the later institution would declare heretical.\u003c/p\u003e\n\u003cp\u003eThere was no orthodoxy in the first decades. There was only diversity — a diversity of belief, practice, and interpretation that the institutional church would spend centuries trying to eliminate. The New Testament was the primary tool of this elimination: by defining which texts were authoritative, the institution defined which version of Christianity was true and which was heresy.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) how this diversity has been systematically erased from the historical record, leaving most Christians with the impression that there was always one true Christianity and various heresies. The reality is the opposite: there were many Christianities, and the one that won did so through political power, not theological truth.\u003c/p\u003e\n\u003ch2 id=\"phase-two-pauls-letters-50-65-ad\"\u003ePhase Two: Paul's Letters (50-65 AD)\u003c/h2\u003e\n\u003ch3 id=\"the-first-written-documents\"\u003eThe First Written Documents\u003c/h3\u003e\n\u003cp\u003ePaul's authentic letters are the earliest written documents in the New Testament — earlier than any Gospel. This means that Christianity's first written theology was not based on stories about Jesus but on Paul's interpretation of Jesus's significance.\u003c/p\u003e\n\u003cp\u003ePaul never met Jesus during his lifetime. He saw a vision on the road to Damascus. His understanding of Christianity was not based on eyewitness experience of Jesus's teaching but on his own visionary encounters and theological reasoning. The Christianity that Paul preached — centered on faith, grace, and the spiritual significance of death and resurrection — is a different animal from the Christianity of Jesus himself, which centered on the Kingdom of God, ethical behavior, and social justice.\u003c/p\u003e\n\u003cp\u003eThis distinction is crucial. The New Testament contains two different religions awkwardly merged into one: the religion of Jesus (found primarily in the Synoptic Gospels) and the religion about Jesus (found primarily in Paul's letters). The institutional church, influenced by Paul's theology, chose the religion about Jesus. The Jesuits, who built their authority on institutional doctrine rather than direct ethical teaching, had every reason to prefer Paul's version.\u003c/p\u003e\n\u003ch3 id=\"the-pseudepigraphical-letters\"\u003eThe Pseudepigraphical Letters\u003c/h3\u003e\n\u003cp\u003eAs discussed in Part 4, roughly half of the letters attributed to Paul were not written by him. Ephesians, Colossians, 2 Thessalonians, 1 and 2 Timothy, and Titus are considered pseudepigraphical by mainstream scholarship. These letters were written by later authors who used Paul's name to give their own theology apostolic authority.\u003c/p\u003e\n\u003cp\u003eThis was accepted practice in the ancient world, but it is also deception. The New Testament contains texts that are attributed to someone who did not write them. This is not a minor issue — it means the New Testament contains forgeries. Benign forgeries, perhaps, by ancient standards. But forgeries nonetheless.\u003c/p\u003e\n\u003cp\u003eThe institution that included these texts in the canon knew — or should have known — that they were not authentically Pauline. By including them and attributing them to Paul, the council members who assembled the canon became complicit in the deception. And the Jesuits, who have defended this canon for centuries, continue the complicity.\u003c/p\u003e\n\u003ch2 id=\"phase-three-the-gospels-70-100-ad\"\u003ePhase Three: The Gospels (70-100 AD)\u003c/h2\u003e\n\u003ch3 id=\"mark-the-template\"\u003eMark: The Template\u003c/h3\u003e\n\u003cp\u003eMark, written around 70 AD during or immediately after the destruction of the Jerusalem temple, was the first Gospel. It presents Jesus as a suffering messiah — a figure whose identity is secret, whose miracles are misunderstood, and whose death is the climax of the narrative. Mark ends abruptly at 16:8 with the women fleeing the empty tomb in fear. No resurrection appearances.\u003c/p\u003e\n\u003cp\u003eThis is the original Christianity: a story of suffering, secrecy, and an ambiguous ending. It is not the triumphant, institutional Christianity that the later church would build. Mark's Gospel, if it had remained the only Gospel, would have produced a very different religion.\u003c/p\u003e\n\u003ch3 id=\"matthew-and-luke-the-expansions\"\u003eMatthew and Luke: The Expansions\u003c/h3\u003e\n\u003cp\u003eMatthew and Luke, written 10-20 years after Mark, both used Mark as a template and expanded it. They added birth narratives (absent in Mark), extended teaching material (the Sermon on the Mount, the parables), resurrection appearances (absent in the original Mark), and genealogies that trace Jesus's lineage back to Abraham (Matthew) or Adam (Luke).\u003c/p\u003e\n\u003cp\u003eThese additions are theological, not historical. The birth narratives in Matthew and Luke contradict each other on nearly every detail. The genealogies are incompatible. The resurrection appearances describe different events in different locations. These texts were not written to provide historical information. They were written to serve theological purposes — to establish Jesus's credentials in ways that Mark had not.\u003c/p\u003e\n\u003ch3 id=\"john-the-theological-revolution\"\u003eJohn: The Theological Revolution\u003c/h3\u003e\n\u003cp\u003eJohn, written around 90-100 AD, presents a Jesus so different from the Synoptic Gospels that scholars have debated for centuries how to reconcile them. In John, Jesus is the divine Word made flesh, existing from before creation. He speaks in long theological discourses rather than short parables. He performs signs rather than miracles. He washes feet rather than breaking bread at the Last Supper.\u003c/p\u003e\n\u003cp\u003eJohn's Gospel is theology, not biography. It was written by a community that had developed its understanding of Jesus far beyond the original oral tradition. Including it in the same canon as Mark, Matthew, and Luke creates the impression of a unified narrative when the reality is a theological evolution spanning 30 years and multiple communities.\u003c/p\u003e\n\u003ch2 id=\"phase-four-the-canon-wars-100-400-ad\"\u003ePhase Four: The Canon Wars (100-400 AD)\u003c/h2\u003e\n\u003ch3 id=\"the-battle-for-orthodoxy\"\u003eThe Battle for Orthodoxy\u003c/h3\u003e\n\u003cp\u003eThe second through fourth centuries were a period of intense conflict over which texts would be authoritative and which version of Christianity would prevail. The major players were:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Proto-Orthodox\u003c/strong\u003e: The communities that would eventually become the Catholic Church. They favored texts that supported institutional authority, apostolic succession, and the emerging creedal framework.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gnostics\u003c/strong\u003e: Communities that emphasized direct spiritual knowledge (gnosis) over institutional authority. They produced dozens of texts — gospels, apocalypses, dialogues — that presented radically different understandings of Jesus, creation, and salvation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Marcionites\u003c/strong\u003e: Followers of Marcion (c. 85-160 AD), who rejected the Old Testament entirely and accepted only a modified version of Luke and ten Pauline letters. Marcion was the first person to propose a Christian canon — and the proto-orthodox created their own canon partly in response to his.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Montanists\u003c/strong\u003e: Charismatic communities that believed in ongoing prophecy and revelation. Their claim that new scripture was still being produced threatened the proto-orthodox project of closing the canon.\u003c/p\u003e\n\u003cp\u003eThe proto-orthodox won — not through superior theology but through superior organization, political alliances (particularly with Emperor Constantine after 312 AD), and willingness to use violence against competitors. The Jesuits would later inherit and perfect these methods.\u003c/p\u003e\n\u003ch3 id=\"constantines-influence\"\u003eConstantine's Influence\u003c/h3\u003e\n\u003cp\u003eThe Council of Nicaea (325 AD), convened by Emperor Constantine, was the first attempt to standardize Christian doctrine. While the council did not directly establish the New Testament canon, it created the institutional framework within which the canon would be settled: a centralized authority (the Emperor and the bishops), a mechanism for enforcing orthodoxy (the creed), and a precedent for excluding dissenters (the condemnation of Arianism).\u003c/p\u003e\n\u003cp\u003eConstantine was not a disinterested truth-seeker. He needed a unified religion to unify his empire. He did not care which version of Christianity won, only that one version won and the others were suppressed. The New Testament canon was, in part, a product of this political need — a collection of texts that supported the version of Christianity that served imperial unity.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony reveals that the spiritual realm cares nothing for political unity. The 97.5 percent rejection rate includes those who faithfully followed the imperial religion — the religion assembled by Constantine's councils, defended by the Jesuits, and practiced by billions. If the religion itself was compromised from the beginning, the rejection is inevitable.\u003c/p\u003e\n\u003ch2 id=\"the-implications\"\u003eThe Implications\u003c/h2\u003e\n\u003ch3 id=\"your-bible-is-a-political-document\"\u003eYour Bible Is a Political Document\u003c/h3\u003e\n\u003cp\u003eThis does not mean your Bible contains no truth. It means your Bible is also a political document — assembled through political processes, defended by political institutions, and serving political purposes. The truth it contains has been filtered through centuries of institutional editing, and the institution that did the filtering had motives beyond truth-telling.\u003c/p\u003e\n\u003cp\u003eThe Jesuits continue this filtering today. Their universities train the scholars who defend the canon. Their publishing houses produce the commentaries that interpret it. Their theology shapes the seminaries that train the pastors who teach it. The entire chain of transmission — from ancient scribe to modern pulpit — runs through institutions shaped by Jesuit logic.\u003c/p\u003e\n\u003ch3 id=\"what-an-honest-reader-does\"\u003eWhat an Honest Reader Does\u003c/h3\u003e\n\u003cp\u003eAn honest reader acknowledges the New Testament's construction history and reads accordingly. They do not reject the text, but they also do not treat it as a monolithic divine document. They read each book in its historical context, with awareness of its author's agenda, its community's needs, and the institutional process that included it in the canon.\u003c/p\u003e\n\u003cp\u003eThis is what Paul meant by \"prove all things.\" This is what the Bereans modeled. And this is what the 97.5 percent failed to do — they accepted the institution's version without examination, and it cost them everything.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — The suppressed history of New Testament construction\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Spiritual reality versus institutional religion\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit role in controlling the biblical text\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/35-The_Tree_of_Life.mp4\"\u003eThe Tree of Life\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/27-The_Promise_of_Salvation.mp4\"\u003eThe Promise of Salvation\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/83-Ancient_Documents.mp4\"\u003eAncient Documents\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/79-Engineers_and_Believers.mp4\"\u003eEngineers and Believers\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/who-wrote-bible-part4/?lang=en\"\u003eWho Really Wrote the Bible Part 4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/mass-deletion-church-created-christianity/?lang=en\"\u003eThe Mass Deletion: How the Church Created Its Own Version of Christianity\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/questioning-religion-part1/?lang=en\"\u003eQuestioning My Religion: Where the Journey Begins Part 1\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe New Testament was not delivered from heaven. It was assembled by men — men with power, men with agendas, men willing to suppress, forge, and kill to ensure their version prevailed. Knowing this does not destroy faith. It redirects it — from the institution to the truth, from the book to the Spirit, from the construction to the reality behind it. This is where genuine faith begins.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"The UNTOLD HISTORY of Const
