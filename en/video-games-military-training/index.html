s simple: what you practice, you become. What you rehearse, you can perform. What you repeat, you internalize. Scripture applies this principle to righteous instruction — training children in the way they should go. The military-entertainment complex applies it to violence — training children in the way they should kill. Video games are not passive entertainment. They are interactive training systems that develop the hand-eye coordination, rapid target acquisition, tactical decision-making, and emotional desensitization required for military operations. This is not interpretation. It is the stated purpose of military-designed gaming programs.\u003c/p\u003e\n\u003cp\u003eThe connection between video games and military training is not a conspiracy theory. It is a documented, funded, publicly acknowledged program that has been operating for decades. The U.S. Army, Navy, Marines, and DARPA have all invested in video game technology — and have explicitly stated that the purpose is to develop skills, condition responses, and recruit personnel. The Confliction album track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/111-The_Final_Day.mp4\"\u003eThe Final Day\u003c/a\u003e describes the culmination of all preparation — the day when what was rehearsed becomes real. For a generation trained on virtual violence, the final day is not a distant abstraction. It is the transition from screen to reality that the training was designed to facilitate.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"americas-army-the-militarys-own-game\"\u003eAmerica's Army: The Military's Own Game\u003c/h2\u003e\n\u003cp\u003eIn 2002, the United States Army released \"America's Army\" — a first-person shooter video game designed, developed, and distributed by the U.S. Army as an official recruitment and training tool. The game was free to download and available to anyone with a computer, including children.\u003c/p\u003e\n\u003cp\u003eAmerica's Army was not a commercial product with military consulting. It was a military product distributed commercially. Developed by the MOVES Institute at the Naval Postgraduate School, the game was designed to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eRecruit.\u003c/strong\u003e The game included links to Army recruitment websites. Players who demonstrated proficiency were targeted for recruitment messaging. The Army explicitly described the game as a recruitment tool, budgeting it under recruitment spending.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eTrain.\u003c/strong\u003e The game incorporated realistic military tactics, weapon handling, squad coordination, and rules of engagement. Players learned real military procedures through gameplay.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDesensitize.\u003c/strong\u003e By presenting realistic combat scenarios in a game context, America's Army normalized the experience of combat for civilian players who had no military experience. The emotional impact of simulated killing was reduced through repetition in a consequence-free environment.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAmerica's Army was downloaded over 40 million times and was one of the most played online games of its era. The Army reported that it was the most effective recruitment tool in their arsenal — surpassing television advertising, print media, and personal recruiting in cost-effectiveness.\u003c/p\u003e\n\u003cp\u003eThe game was not an aberration. It was a prototype for the military-entertainment convergence that has since become the industry standard.\u003c/p\u003e\n\u003ch2 id=\"the-military-entertainment-complex\"\u003eThe Military-Entertainment Complex\u003c/h2\u003e\n\u003cp\u003eThe relationship between the military and the entertainment industry extends far beyond a single game. It is a systematic partnership — the \"military-entertainment complex\" — documented by researchers including Tim Lenoir, Luke Caldwell, Nick Turse, and Ed Halter.\u003c/p\u003e\n\u003cp\u003eKey connections include:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInstitute for Creative Technologies (ICT).\u003c/strong\u003e Founded in 1999 with a $45 million contract from the U.S. Army, ICT is located at the University of Southern California — in the heart of Hollywood. Its mission is to combine entertainment industry talent with military research to develop advanced training systems. ICT develops virtual reality environments, AI-driven characters, and immersive simulations for both military training and commercial entertainment. The same technology serves both purposes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDARPA funding for game technology.\u003c/strong\u003e DARPA has funded game engine development, AI for game characters, and virtual reality systems that are used in both military applications and commercial gaming. The technological pipeline flows in both directions: military-funded research becomes commercial game technology, and commercial game innovations are adopted for military training.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMilitary consultation on commercial games.\u003c/strong\u003e The Call of Duty franchise, one of the best-selling game series in history, has employed military consultants including Lt. Col. Oliver North (of Iran-Contra fame), former Navy SEALs, and active-duty military advisors. The goal is realism — ensuring that the virtual combat experience mirrors actual military operations as closely as possible.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMedal of Honor, Battlefield, Ghost Recon, ARMA.\u003c/strong\u003e These and numerous other franchises have military connections — either through direct consultation, military funding, or licensing agreements that give military organizations input on game content and design.\u003c/p\u003e\n\u003ch2 id=\"desensitization-the-core-function\"\u003eDesensitization: The Core Function\u003c/h2\u003e\n\u003cp\u003eThe most consequential effect of military-designed and military-influenced games is desensitization to violence — the gradual reduction of emotional and physiological response to the act of killing.\u003c/p\u003e\n\u003cp\u003eLt. Col. Dave Grossman, a former Army Ranger and West Point psychology professor, documented this process in his books \"On Killing\" (1995) and \"Stop Teaching Our Kids to Kill\" (1999). Grossman identified that the military's primary challenge in training soldiers is not teaching them to shoot accurately. It is overcoming their innate resistance to killing other human beings.\u003c/p\u003e\n\u003cp\u003eDuring World War II, studies by Brigadier General S.L.A. Marshall found that only 15-20% of soldiers actually fired their weapons at the enemy. The rest — the majority — could not bring themselves to kill, even in self-defense, even with training. The human resistance to killing members of one's own species is deeply embedded — a resistance that Grossman identifies as a gift from the Creator.\u003c/p\u003e\n\u003cp\u003eThe military developed training techniques to overcome this resistance:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTarget replacement.\u003c/strong\u003e Replacing bullseye targets with human-shaped silhouettes. This simple change increased firing rates from 20% in WWII to 55% in Korea and 90-95% in Vietnam.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOperant conditioning.\u003c/strong\u003e Training soldiers to shoot reflexively — responding to pop-up targets with immediate fire, without deliberation. The decision to kill is made automatic, bypassing conscious moral processing.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSimulation training.\u003c/strong\u003e Realistic combat simulations that replicate the sensory experience of killing — visual, auditory, and tactile — without the moral consequences. The soldier practices killing hundreds of times in simulation before ever facing a real enemy.\u003c/p\u003e\n\u003cp\u003eVideo games employ all three techniques. Human-shaped targets. Reflexive shooting mechanics. Realistic combat simulation. The difference is that military training is administered to selected adults who have consented to military service. Video games are administered to children as entertainment, without consent, without age restriction, and without any mechanism for processing the psychological effects.\u003c/p\u003e\n\u003ch2 id=\"the-recruitment-pipeline\"\u003eThe Recruitment Pipeline\u003c/h2\u003e\n\u003cp\u003eVideo games serve as the top of the military recruitment funnel. The pathway is documented and deliberate:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eExposure (ages 8-12).\u003c/strong\u003e Children begin playing military-themed games, developing familiarity with military equipment, tactics, and culture. The military is normalized as exciting, heroic, and cool.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSkill development (ages 12-16).\u003c/strong\u003e Adolescents develop hand-eye coordination, rapid decision-making, tactical awareness, and team coordination through competitive multiplayer games. These skills directly transfer to military applications.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eIdentity formation (ages 16-18).\u003c/strong\u003e Gaming communities and esports provide social identity and purpose. Military-sponsored esports teams and Twitch streams connect gaming identity to military identity. The U.S. Army, Navy, and Air Force have all operated official esports teams and gaming content channels.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRecruitment (ages 17-24).\u003c/strong\u003e Having been desensitized, skilled, and culturally aligned with military identity through years of gaming, the transition to enlistment feels natural. Military recruiters specifically target gamers, and gaming proficiency is recognized as a transferable skill for drone operations, cyber warfare, and remote weapons systems.\u003c/p\u003e\n\u003cp\u003eThe pipeline is not speculative. Military recruitment documents explicitly identify gaming as a recruitment pathway. The Army's esports team was created with the stated purpose of connecting with potential recruits \"where they are\" — which is online, playing games that the military helped design.\u003c/p\u003e\n\u003ch2 id=\"the-drone-operator-connection\"\u003eThe Drone Operator Connection\u003c/h2\u003e\n\u003cp\u003eThe convergence between gaming and military operations reached its most literal expression in drone warfare. Drone operators control unmanned aerial vehicles from ground stations that are, in form and function, nearly identical to gaming setups: screens, joysticks, keyboards, and real-time visual feeds.\u003c/p\u003e\n\u003cp\u003eFormer drone operators have described the experience as feeling \"like a video game\" — a sensation that is not accidental. The training pathway from commercial gaming to military drone operation is seamless: the interfaces are similar, the hand-eye coordination requirements are identical, and the psychological experience of killing through a screen has been rehearsed thousands of times through gaming.\u003c/p\u003e\n\u003cp\u003eThe emotional consequences, however, are real. Drone operators experience PTSD, moral injury, and psychological trauma — often years after their service. The gaming-conditioned expectation that killing through a screen is consequence-free collides with the reality that the targets are human beings, the explosions are real, and the deaths are permanent. The desensitization that gaming provided is sufficient to enable the killing but insufficient to prevent the psychological damage that follows.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003cp\u003eVideo game violence is not merely a behavioral issue. It is a spiritual one. The commandment \"Thou shalt not kill\" (Exodus 20:13) establishes the sanctity of human life as a divine principle. Every simulation of killing — every virtual headshot, every digital execution, every simulated massacre — rehearses the violation of this principle.\u003c/p\u003e\n\u003cp\u003eThe argument that \"it's just a game\" ignores the documented neurological reality: the brain does not fully distinguish between real and simulated experiences. Mirror neurons fire when watching violence. Stress hormones are released during intense gaming. Neural pathways associated with aggression are strengthened through repetition. The spirit knows what the mind dismisses — that rehearsing the taking of life, even in simulation, defiles something sacred.\u003c/p\u003e\n\u003cp\u003eAs explored in \u003ca href=\"/mkultra-never-ended/?lang=en\"\u003eMKUltra Never Ended\u003c/a\u003e, the techniques for conditioning human beings to perform acts they would naturally resist — including killing — have been refined over decades of research. Video games represent the mass deployment of these conditioning techniques to civilian populations, delivered as entertainment and consumed voluntarily by children.\u003c/p\u003e\n\u003cp\u003eThe connection to \u003ca href=\"/cognitive-warfare-battleground/?lang=en\"\u003eCognitive Warfare: Your Mind Is the Battleground\u003c/a\u003e is direct. A population conditioned through gaming is a population primed for manipulation. The same psychological mechanisms that make a player comfortable with virtual killing can be repurposed to make citizens comfortable with real violence — against enemies defined not by personal experience but by algorithmic narrative.\u003c/p\u003e\n\u003ch2 id=\"biblical-reflection\"\u003eBiblical Reflection\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Blessed are the peacemakers: for they shall be called the children of God.\" — Matthew 5:9\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe children of God are peacemakers. The children of the military-entertainment complex are war players. The training is opposite. The formation is inverse. Where God forms humans for peace, the system forms them for war — beginning in childhood, through games that teach the skills of killing and strip away the moral resistance that God placed in the human heart. The child who grows up making peace inherits the kingdom of God. The child who grows up making war inherits the kingdom that made the game.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — Military mind programming through gaming\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/53-Cognitive_Warfare.mp4\"\u003eCognitive Warfare\u003c/a\u003e — The weaponization of entertainment\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mkultra-never-ended/?lang=en\"\u003eMKUltra Never Ended\u003c/a\u003e — The mind control program whose conditioning techniques are deployed through gaming\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cognitive-warfare-battleground/?lang=en\"\u003eCognitive Warfare: Your Mind Is the Battleground\u003c/a\u003e — The military doctrine that video games implement as entertainment\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThey gave your children a controller and called it a toy. They built a game and called it entertainment. They trained a generation to aim, shoot, and kill without hesitation — and called it play. The military designed the game. The military funded the technology. The military operates recruitment teams inside the gaming community. And the children who spent their formative years rehearsing violence now sit at drone consoles, killing real people through the same screens they grew up playing on. Train up a child in the way he should go. They trained up a generation in the way they should kill. And when those children are old, they will not depart from it.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/media/\",\"className\":\"category-badge\",\"children\":\"media\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Video Games: Military Training for
