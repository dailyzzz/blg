rom us.\"\u003c/em\u003e — Psalm 2:2-3\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Bible identifies a conspiracy at the highest levels of earthly power — kings and rulers taking counsel together against the Lord. This is not metaphor; it is a description of reality. The world is not governed by the elected officials, democratic institutions, and constitutional frameworks that the public is taught to revere. It is governed by a network of secret societies, banking dynasties, and religious orders that operate behind the scenes, using governments, militaries, and media as instruments of their will.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order sits at the apex of this pyramid of power. Michelangelo Tamburini, the 14th Superior General, stated plainly: \u003cem\u003e\"From this chamber I govern not only to Paris but to China, not only to China but to all the world.\"\u003c/em\u003e This was not arrogance; it was an accurate description of the Jesuit system of global control — a system built over centuries through infiltration, assassination, financial manipulation, and the relentless suppression of truth. The Jesuits, the Satanists, and the Catholic Church form the inner circle. The secret societies — Freemasons, Skull and Bones, Bohemian Grove, the Council on Foreign Relations — form the outer circles. And at the center of it all sits Satan himself, the prince of this world, whose agents are as real as the air we breathe.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e identifies these willing servants of darkness, and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e reminds us that the conspiracy began not on Earth but in heaven, with the rebellion of Lucifer and the angels who followed him.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-inner-circle-the-jesuit-order\"\u003eThe Inner Circle: The Jesuit Order\u003c/h2\u003e\n\u003ch3 id=\"the-black-pope\"\u003eThe Black Pope\u003c/h3\u003e\n\u003cp\u003eThe Superior General of the Society of Jesus — commonly known as the \"Black Pope\" because of the black cassock he wears, in contrast to the white-clad Pope of Rome — is arguably the most powerful man in the world. Unlike the Pope, who is a public figure subject to media scrutiny, the Superior General operates in near-total secrecy. His identity is known, but his activities are not.\u003c/p\u003e\n\u003cp\u003eThe current Superior General, Arturo Sosa, a Venezuelan Jesuit, assumed office in 2016. Like his predecessors, Sosa controls a global network of approximately 15,000 Jesuit members operating in over 100 countries. This network includes:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUniversities\u003c/strong\u003e: Over 100 Jesuit universities worldwide, including Georgetown (the oldest Catholic university in America and the training ground for the CIA), Fordham, Boston College, Loyola (in multiple cities), and dozens more.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSchools\u003c/strong\u003e: Over 2,500 Jesuit schools educating millions of students worldwide.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMedia\u003c/strong\u003e: Jesuit publications, broadcasting networks, and digital platforms that shape public opinion across the globe.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eObservatories\u003c/strong\u003e: The Vatican Observatory, operated by Jesuits, conducts astronomical research and controls information about the cosmos.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-jesuit-oath\"\u003eThe Jesuit Oath\u003c/h3\u003e\n\u003cp\u003eThe Jesuit Extreme Oath of Induction, entered into the Congressional Record in 1913, reveals the true nature of the order:\u003c/p\u003e\n\u003cp\u003e\"I do further promise and declare that I will, when opportunity presents, make and wage relentless war, secretly and openly, against all heretics... that I will spare neither age, sex, nor condition... I will hang, waste, boil, flay, strangle, and bury alive these infamous heretics.\"\u003c/p\u003e\n\u003cp\u003eThis oath — whether one accepts its authenticity as literal or as a summary of the order's documented behavior — accurately describes the Jesuit operational methodology: total war, by any means, against any enemy, without mercy.\u003c/p\u003e\n\u003ch2 id=\"the-financial-circle-the-banking-dynasties\"\u003eThe Financial Circle: The Banking Dynasties\u003c/h2\u003e\n\u003ch3 id=\"the-rothschild-network\"\u003eThe Rothschild Network\u003c/h3\u003e\n\u003cp\u003eThe Rothschild banking dynasty, founded by Mayer Amschel Rothschild in Frankfurt in the late 18th century, has served as the Vatican's primary financial arm for over 200 years. The Rothschilds established banks in five European capitals — London, Paris, Frankfurt, Vienna, and Naples — creating a financial network that operated across national boundaries and above national laws.\u003c/p\u003e\n\u003cp\u003eThe Rothschilds' connection to the Vatican is documented and undeniable. They have served as the Vatican's official bankers since at least the 1820s, managing the Church's investments, handling its financial transactions, and providing the capital for Jesuit operations worldwide.\u003c/p\u003e\n\u003cp\u003eThe Rothschild family's influence extends to every major central bank in the world. The Bank of England, the Federal Reserve, the European Central Bank, and the Bank for International Settlements (the \"central bank of central banks\") are all part of a financial architecture that the Rothschild network built over two centuries.\u003c/p\u003e\n\u003ch3 id=\"the-morgan-rockefeller-axis\"\u003eThe Morgan-Rockefeller Axis\u003c/h3\u003e\n\u003cp\u003eIn the United States, the Rothschild interests were represented by the Morgan and Rockefeller families:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eJ.P. Morgan\u003c/strong\u003e — Morgan's bank served as the Rothschild's American agent, managing their investments and executing their financial strategies in the Western Hemisphere. Morgan's role in the Panic of 1907, the creation of the Federal Reserve, and the financing of World War I has been documented throughout this series.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eJohn D. Rockefeller\u003c/strong\u003e — The founder of Standard Oil built an industrial empire that extended into banking, education, medicine, and government. The Rockefeller Foundation, established in 1913, has been one of the most influential philanthropic organizations in the world — shaping public health policy, educational curricula, and foreign policy through its grants and programs.\u003c/p\u003e\n\u003cp\u003eThe Morgan-Rockefeller axis controlled American finance, industry, and politics throughout the 20th century. Their descendants and successors continue to wield enormous influence through the institutions they created: the Council on Foreign Relations, the Trilateral Commission, and the Bilderberg Group.\u003c/p\u003e\n\u003ch2 id=\"the-secret-society-circle\"\u003eThe Secret Society Circle\u003c/h2\u003e\n\u003ch3 id=\"skull-and-bones\"\u003eSkull and Bones\u003c/h3\u003e\n\u003cp\u003eThe Order of Skull and Bones, founded at Yale University in 1832, is America's most notorious secret society. Its membership reads like a roster of the American establishment: Presidents (both George H.W. Bush and George W. Bush), Senators, CIA directors, Supreme Court justices, and titans of industry.\u003c/p\u003e\n\u003cp\u003eSkull and Bones was founded by William Huntington Russell and Alphonso Taft (father of President William Howard Taft) after Russell's travels in Germany, where he was reportedly initiated into a German secret society with Jesuit connections. The order's rituals, which involve mock death and resurrection, skull worship, and oaths of absolute loyalty, are consistent with the Jesuit-influenced esoteric traditions of continental European secret societies.\u003c/p\u003e\n\u003ch3 id=\"the-bohemian-grove\"\u003eThe Bohemian Grove\u003c/h3\u003e\n\u003cp\u003eEvery July, the most powerful men in America — presidents, CEOs, media moguls, military leaders — gather at the Bohemian Grove, a 2,700-acre campground in Sonoma County, California, for two weeks of rituals, speeches, and planning. The centerpiece of the gathering is the \"Cremation of Care\" — a ritual in which a human effigy is burned before a 40-foot stone owl.\u003c/p\u003e\n\u003cp\u003eThe Bohemian Grove's membership list includes virtually every major power player in American politics and business. The Manhattan Project was reportedly conceived at the Grove, and major policy decisions — including the selection of presidential candidates — are made during its annual gathering. The Grove is not a social club; it is a governing body, operating outside the democratic process and accountable to no one but its members.\u003c/p\u003e\n\u003ch3 id=\"the-council-on-foreign-relations\"\u003eThe Council on Foreign Relations\u003c/h3\u003e\n\u003cp\u003eThe Council on Foreign Relations (CFR), founded in 1921, is the primary policy-planning organization of the American establishment. Its membership includes virtually every Secretary of State, Secretary of Defense, CIA director, and Federal Reserve chairman of the past century.\u003c/p\u003e\n\u003cp\u003eThe CFR was established after World War I to coordinate American foreign policy with the interests of the Anglo-American banking establishment. Its British counterpart, the Royal Institute of International Affairs (Chatham House), was established simultaneously. Together, these organizations ensure that British and American foreign policy serves the interests of the global financial elite — which is to say, the interests of the Jesuit-Vatican-Rothschild power structure.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-apex-satan-himself\"\u003eThe Spiritual Apex: Satan Himself\u003c/h2\u003e\n\u003ch3 id=\"the-prince-of-this-world\"\u003eThe Prince of This World\u003c/h3\u003e\n\u003cp\u003eAt the top of the pyramid sits not a human but a spiritual entity. Jesus Christ identified Satan as \"the prince of this world\" (John 12:31), and Paul described him as \"the god of this age\" (2 Corinthians 4:4). The conspiracy is not merely human; it is spiritual. The human players — the Jesuits, the bankers, the secret society members — are instruments of a spiritual war that has been raging since Lucifer's rebellion in heaven.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's near-death experience provides a first-hand account of this spiritual hierarchy. Pittman was shown the three heavens: the physical realm, the second heaven (where the demonic government operates), and the third heaven (God's throne room). In the second heaven, Pittman witnessed a demonic command structure that mirrors the earthly power structures described in this article — a hierarchy of princes, powers, and rulers of darkness that govern the affairs of nations through their human agents.\u003c/p\u003e\n\u003cp\u003ePittman's testimony confirms what Ephesians 6:12 declares: our struggle is not against flesh and blood but against principalities and powers. The Jesuits, the bankers, and the secret societies are not the ultimate enemy — they are the instruments of the ultimate enemy. Satan uses them as puppets, rewarding them with worldly power and wealth in exchange for their souls. The 95% of hell's inhabitants who serve \"self\" — as Pittman learned — includes the players in the game of world control, who serve their own ambition while unknowingly serving the adversary. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eThe full scope of Jesuit infiltration and control is documented in \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e, and detailed research is available at \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/105-Freemason_Jesters.mp4\"\u003eFreemason Jesters\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\
