003eEvery major event in modern history has two stories: the official narrative and the truth. The official narrative is delivered within hours, repeated endlessly by media, and hardened into accepted fact before any genuine investigation occurs. The truth takes longer — years, sometimes decades — because it must be extracted from suppressed documents, silenced witnesses, and institutional resistance. The Pulse nightclub event of June 12, 2016, is no exception.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed that the spiritual realm operates through systems of deception. Three heavens. Demonic hierarchy. 97.5 percent rejection. 95 percent self-service. Every word judged (Matthew 12:36-37). The media system that delivers official narratives operates within this deceptive hierarchy. The principalities and powers of Ephesians 6:12 use media events to shape public consciousness, manufacture consent for policy changes, and suppress the questions that would expose the truth.\u003c/p\u003e\n\u003cp\u003eThe Jesuits — Loyola's military organization, Napoleon's \"absolute power,\" Tamburini governing \"all the world\" — have historically used dramatic events to advance institutional agendas. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The pattern of manufactured events followed by pre-prepared policy responses is a Jesuit specialty — problem, reaction, solution — refined over centuries and deployed with increasing sophistication in the modern media age.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/05-The_First_Darkness.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe First Darkness — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-official-story\"\u003eThe Official Story\u003c/h2\u003e\n\u003ch3 id=\"what-you-were-told\"\u003eWhat You Were Told\u003c/h3\u003e\n\u003cp\u003eThe official narrative states that on June 12, 2016, a lone gunman entered Pulse nightclub in Orlando, Florida, during Latin Night and opened fire, killing 49 people and wounding 53 others before being killed by police approximately three hours later. The attacker was identified as Omar Mateen, a 29-year-old security guard who had been investigated by the FBI twice before the attack.\u003c/p\u003e\n\u003cp\u003eThis narrative was established within hours of the event. Within days, it was hardened into accepted fact. Within weeks, it was being used to advance gun control legislation, surveillance expansion, and counter-terrorism policy. Within months, it was memorialized as the deadliest mass shooting in American history at that time.\u003c/p\u003e\n\u003cp\u003eThe speed of narrative establishment is itself suspicious. Genuine investigations take time. The Warren Commission took ten months. The 9/11 Commission took twenty. Yet the Pulse narrative was complete before the bodies were identified.\u003c/p\u003e\n\u003ch3 id=\"the-questions-nobody-asked\"\u003eThe Questions Nobody Asked\u003c/h3\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) the questions that the media refused to ask:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eWhy was a man investigated twice by the FBI for potential terrorist ties still able to purchase weapons and maintain a security clearance?\u003c/li\u003e\n\u003cli\u003eWhy did it take police three hours to enter the building?\u003c/li\u003e\n\u003cli\u003eWhy were witnesses reporting multiple shooters in the immediate aftermath, before the single-shooter narrative was established?\u003c/li\u003e\n\u003cli\u003eWhy was the building demolished before independent investigators could examine the physical evidence?\u003c/li\u003e\n\u003cli\u003eHow did a single person achieve the reported casualty count in the reported timeframe with the reported weapons?\u003c/li\u003e\n\u003cli\u003eWhy were the 911 call transcripts initially redacted to remove references to the attacker's stated motivations?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEach of these questions has an institutional answer. None of the institutional answers are satisfactory. The investigation begins here — with the questions the system does not want asked.\u003c/p\u003e\n\u003ch2 id=\"the-fbi-connection\"\u003eThe FBI Connection\u003c/h2\u003e\n\u003ch3 id=\"two-prior-investigations\"\u003eTwo Prior Investigations\u003c/h3\u003e\n\u003cp\u003eThe FBI investigated Omar Mateen twice — in 2013 and 2014 — for potential terrorist connections. Both investigations were closed. After the Pulse event, the FBI claimed that the investigations found insufficient evidence to maintain surveillance.\u003c/p\u003e\n\u003cp\u003eThis pattern — the FBI investigating a subject who later commits a major attack — is not unique to Pulse. It has occurred in multiple high-profile events, creating a pattern that either represents catastrophic institutional failure or something more troubling: institutional awareness that failed to prevent (or was not intended to prevent) the event.\u003c/p\u003e\n\u003cp\u003eThe FBI's relationship with subjects of investigation is complicated by its extensive use of informants and undercover operatives. The Bureau has a documented history of facilitating the very plots it claims to disrupt — providing weapons, encouragement, and logistical support to individuals it is ostensibly investigating. Congressional hearings have documented cases where FBI informants provided everything needed for an attack, then arrested the subject just before execution.\u003c/p\u003e\n\u003cp\u003eWhether this pattern applies to Pulse is a question the investigation must explore. The institutional resistance to exploring it — the media's refusal to ask, the government's refusal to disclose — is itself evidence that the question is dangerous to the official narrative.\u003c/p\u003e\n\u003ch3 id=\"the-security-clearance-anomaly\"\u003eThe Security Clearance Anomaly\u003c/h3\u003e\n\u003cp\u003eMateen worked for G4S, one of the world's largest private security companies, with contracts across government and military sectors. He held a security clearance despite two FBI investigations. This anomaly has never been adequately explained.\u003c/p\u003e\n\u003cp\u003eIn the security industry, an FBI investigation is typically grounds for clearance revocation. The fact that Mateen retained his clearance through two investigations suggests either catastrophic bureaucratic failure or institutional decision-making that deemed his continued employment and access more valuable than the risk he posed.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony about institutional deception applies directly. The institutions tasked with protecting the public — the FBI, the security industry, the intelligence community — failed in ways that are either inexplicably incompetent or deliberately planned. The 97.5 percent rejection rate reflects a population that trusts institutions without examining their failures. The Pulse investigation examines those failures.\u003c/p\u003e\n\u003ch2 id=\"the-three-hour-gap\"\u003eThe Three-Hour Gap\u003c/h2\u003e\n\u003ch3 id=\"why-did-police-wait\"\u003eWhy Did Police Wait?\u003c/h3\u003e\n\u003cp\u003eThe attack began at approximately 2:02 AM. Police first made entry into the building at approximately 5:02 AM — a three-hour gap during which, according to the official timeline, the attacker had access to the victims inside the building.\u003c/p\u003e\n\u003cp\u003eDuring those three hours, wounded victims bled. Some bled to death. The three-hour gap is one of the most disturbing aspects of the Pulse event, and the institutional explanation — that police followed \"active shooter\" protocols that required assessment before entry — contradicts the \"active shooter\" protocols established after Columbine, which mandate immediate entry to stop the killing.\u003c/p\u003e\n\u003cp\u003eThe three-hour gap raises questions that this investigation will pursue in subsequent parts. What happened inside during those three hours? Why were the established protocols not followed? Who made the decision to wait, and on what authority?\u003c/p\u003e\n\u003ch2 id=\"what-this-investigation-will-cover\"\u003eWhat This Investigation Will Cover\u003c/h2\u003e\n\u003cp\u003eThis five-part investigation will examine:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePart 1\u003c/strong\u003e (this article): The official narrative, the questions nobody asked, and the FBI connection\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePart 2\u003c/strong\u003e: What you have never seen — suppressed evidence, witness testimony, and physical evidence\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePart 3\u003c/strong\u003e: Unexpected connections — the institutional links between the attacker, the security industry, and the intelligence community\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePart 4\u003c/strong\u003e: The two biggest mistakes in the investigation — the errors that reveal the truth\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePart 5\u003c/strong\u003e: Follow the money — the financial trail that leads to the truth behind the event\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis investigation does not claim to have all the answers. It claims to ask the right questions — the questions that the media, the government, and the institutional system have refused to ask. The truth, as Luke 12:2 promises, will be revealed. Nothing hidden will remain hidden. The Pulse investigation begins now.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Investigative research into the Pulse event\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Institutional deception and the spiritual stakes\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit pattern of manufactured events and institutional responses\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sources-and-references\"\u003eSources and References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eSecret Societies and the Catholic Church — The Hidden Hand Exposed\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/05-The_First_Darkness.mp4\"\u003eThe First Darkness\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/73-Suppressing_Truth.mp4\"\u003eSuppressing Truth\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/181-Ending_Anonymity.mp4\"\u003eEnding Anonymity\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/115-Psychology_Industry_Hoax.mp4\"\u003ePsychology Industry Hoax\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pulse-never-seen-part2/?lang=en\"\u003ePULSE: What You've NEVER SEEN Before Part 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pulse-unexpected-connections-part3/?lang=en\"\u003eUnexpected Connections: The PULSE Investigation Part 3\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sick-of-it-combat-censorship/?lang=en\"\u003eI'M SICK OF IT: How to Combat Censorship and Fight Back\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe investigation begins. Not with answers, but with questions — the questions that the system has spent years suppressing. Every suppressed question is a door. Every door conceals something the system does not want you to see. We will open every door. We will ask every question. And whatever we find, we will publish — because truth is not optional, and silence is complicity.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/media/\",\"className\":\"category-badge\",\"children\":\"media\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"PULSE Investigation Begins: What Really Happened Part 1\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Part 1 of the PULSE investigation begins. Discover the hidden facts, Jesuit connections, and Satanic patterns behind what really happen
