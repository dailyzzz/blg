<!DOCTYPE html><!--1SCAkP9FwT0rta0r4lLXo--><html lang="en"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="/_next/static/css/91e093b7a73c5956.css" data-precedence="next"/><link rel="preload" as="script" fetchPriority="low" href="/_next/static/chunks/webpack-f1ed66bbfd105ed8.js"/><script src="/_next/static/chunks/4bd1b696-f785427dddbba9fb.js" async=""></script><script src="/_next/static/chunks/1255-e9e68aae815f4730.js" async=""></script><script src="/_next/static/chunks/main-app-55680528af95a8bc.js" async=""></script><script src="/_next/static/chunks/2221-7e6c4e32da135429.js" async=""></script><script src="/_next/static/chunks/app/layout-566ab9571eddcabf.js" async=""></script><script src="/_next/static/chunks/app/%5Blang%5D/%5Bslug%5D/page-a424dc1babd9b142.js" async=""></script><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/><link rel="alternate" type="application/rss+xml" title="ZZZ Daily Blog RSS" href="/rss.xml"/><title>Do Satellites Really Exist? The Hidden Infrastructure of Communication | ZZZ Daily Blog | ZZZ Daily Blog</title><meta name="description" content="The dominant narrative that thousands of satellites orbit Earth enabling global communication, GPS navigation, and satellite television may obscure a simpler and more terrestrial reality. Undersea cables carry 97% of intercontinental data, high-altitude platforms and ground-based towers provide coverage attributed to satellites, and the actual evidence for orbital infrastructure raises more questions than answers."/><meta name="author" content="zzzdaily-team"/><meta name="keywords" content="satellites, communication, infrastructure, technology, deception"/><meta name="robots" content="index, follow"/><meta name="googlebot" content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"/><link rel="canonical" href="https://blog.zzzdaily.com/en/satellites-dont-exist/"/><link rel="alternate" hrefLang="en" href="https://blog.zzzdaily.com/en/satellites-dont-exist/"/><link rel="alternate" hrefLang="ru" href="https://blog.zzzdaily.com/ru/satellites-dont-exist/"/><link rel="alternate" hrefLang="es" href="https://blog.zzzdaily.com/es/satellites-dont-exist/"/><meta property="og:title" content="Do Satellites Really Exist? The Hidden Infrastructure of Communication"/><meta property="og:description" content="The dominant narrative that thousands of satellites orbit Earth enabling global communication, GPS navigation, and satellite television may obscure a simpler and more terrestrial reality. Undersea cables carry 97% of intercontinental data, high-altitude platforms and ground-based towers provide coverage attributed to satellites, and the actual evidence for orbital infrastructure raises more questions than answers."/><meta property="og:url" content="https://blog.zzzdaily.com/en/satellites-dont-exist/"/><meta property="og:site_name" content="ZZZ Daily Blog"/><meta property="og:locale" content="en_US"/><meta property="og:image" content="https://blog.zzzdaily.com/images/articles/satellites-dont-exist.png"/><meta property="og:image:width" content="1200"/><meta property="og:image:height" content="630"/><meta property="og:image:alt" content="Do Satellites Really Exist? The Hidden Infrastructure of Communication"/><meta property="og:image:type" content="image/png"/><meta property="og:type" content="article"/><meta name="twitter:card" content="summary_large_image"/><meta name="twitter:site" content="@zzzdaily"/><meta name="twitter:creator" content="@zzzdaily"/><meta name="twitter:title" content="Do Satellites Really Exist? The Hidden Infrastructure of Communication"/><meta name="twitter:description" content="The dominant narrative that thousands of satellites orbit Earth enabling global communication, GPS navigation, and satellite television may obscure a simpler and more terrestrial reality. le earth.\" — Genesis 11:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe builders of Babel sought to construct a tower reaching into the heavens — a monument to human ambition, a technological achievement that would unite humanity under a single system of communication and governance. God's response was swift and decisive: He confused their language and scattered them across the earth. The tower was not merely a construction project. It was an act of spiritual rebellion — an attempt to bridge the gap between earth and heaven through human technology rather than divine relationship.\u003c/p\u003e\n\u003cp\u003eThe modern narrative of satellite technology echoes the ambition of Babel. We are told that humanity has placed thousands of devices in the heavens — orbiting platforms that enable instant global communication, real-time surveillance, and precise navigation. These satellites, we are told, represent humanity's conquest of space — our successful construction of a technological infrastructure in the very heavens that the builders of Babel sought to reach.\u003c/p\u003e\n\u003cp\u003eBut what if the tower of Babel is not in orbit? What if the infrastructure that enables global communication is not floating above us but buried beneath us and standing around us? What if the heavens have not been conquered — and what if the narrative that they have serves purposes that have nothing to do with communication?\u003c/p\u003e\n\u003cp\u003eAs the Confliction album track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/19-The_Bright_Nature.mp4\"\u003eThe Bright Nature\u003c/a\u003e explores, the true nature of the world is often hidden behind a bright facade — a dazzling surface narrative that conceals a very different reality underneath.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"undersea-cables-the-real-internet\"\u003eUndersea Cables: The Real Internet\u003c/h2\u003e\n\u003cp\u003eThe foundational fact that undermines the satellite communication narrative is this: approximately 97% of all intercontinental data is carried by undersea fiber optic cables, not by satellites. This is not a disputed claim. It is acknowledged by the telecommunications industry, confirmed by government agencies, and verifiable through publicly available submarine cable maps.\u003c/p\u003e\n\u003cp\u003eAs of 2024, there are approximately 550 active and planned submarine cable systems spanning the world's oceans, with a total length exceeding 1.4 million kilometers. These cables carry the vast majority of international telephone calls, internet traffic, and financial data. The entire global financial system — trillions of dollars in transactions per day — depends on undersea cables, not on satellite links.\u003c/p\u003e\n\u003cp\u003eGoogle, Facebook (Meta), Microsoft, and Amazon have invested billions of dollars in undersea cable infrastructure. Google alone owns or has invested in approximately 18 submarine cable systems. These technology companies — which have access to the most advanced technology on earth — have chosen to invest overwhelmingly in terrestrial and submarine infrastructure rather than satellite infrastructure for their core data transmission needs.\u003c/p\u003e\n\u003cp\u003eThe telecommunications industry explanation is that fiber optic cables offer dramatically higher bandwidth and lower latency than satellite links. This is true. But it raises an obvious question: if satellites are the sophisticated, proven technology that the narrative claims, why does the global economy depend almost entirely on cables laid on the ocean floor — a technology whose basic principle dates to the nineteenth century?\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ground-based-infrastructure-towers-everywhere\"\u003eGround-Based Infrastructure: Towers Everywhere\u003c/h2\u003e\n\u003cp\u003eThe infrastructure that provides the communication services commonly attributed to satellites is, in most cases, ground-based. The services that the average person associates with \"satellite\" technology — television, radio, GPS, weather monitoring, internet access — can all be provided by ground-based infrastructure.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTelevision and Radio:\u003c/strong\u003e Over-the-air television and radio broadcasting uses ground-based transmission towers. Cable television uses fiber optic and coaxial cable networks. Streaming video uses internet infrastructure, which is carried primarily by undersea cables and terrestrial fiber networks. \"Satellite television\" — the service provided by companies like DirecTV and Dish Network — requires a dish antenna pointed at a fixed point in the sky. But a dish pointed at a fixed point in the sky could equally well be receiving signals from a high-altitude platform, a stratospheric relay, or a ground-based transmitter reflecting signals off the ionosphere.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGPS Navigation:\u003c/strong\u003e The Global Positioning System is presented as a constellation of 31 satellites orbiting at an altitude of approximately 20,200 kilometers. But ground-based positioning systems have existed for decades. LORAN (Long Range Navigation), developed during World War II, provided precise positioning using ground-based radio transmitters. eLORAN, the enhanced version, provides accuracy comparable to GPS using entirely ground-based infrastructure. The question is not whether ground-based positioning is possible — it is whether the systems attributed to orbital satellites could be provided by ground-based or atmospheric alternatives.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWeather Monitoring:\u003c/strong\u003e Weather observation can be conducted from ground-based radar systems, weather balloons (over 1,800 are launched daily worldwide), high-altitude aircraft, and terrestrial sensor networks. While weather \"satellites\" are credited with providing the imagery used in weather forecasting, similar imagery could potentially be obtained from high-altitude platforms operating at altitudes far below orbital altitude.\u003c/p\u003e\n\u003cp\u003eAs documented in our article on \u003ca href=\"/gwen-towers-not-5g/?lang=en\"\u003eGWEN Towers\u003c/a\u003e, the United States maintains an extensive network of ground-based transmission infrastructure that provides capabilities often attributed to orbital systems.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"high-altitude-platforms-the-space-between\"\u003eHigh-Altitude Platforms: The Space Between\u003c/h2\u003e\n\u003cp\u003eBetween ground-based infrastructure and orbital altitude exists a vast space — the stratosphere, extending from approximately 12 to 50 kilometers above the Earth's surface — where various platform technologies can operate for extended periods.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProject Loon (Google):\u003c/strong\u003e Between 2013 and 2021, Google operated Project Loon — a fleet of high-altitude balloons operating in the stratosphere at altitudes of approximately 18-25 kilometers. These balloons provided internet connectivity to regions without ground-based infrastructure by relaying signals between balloons and ground stations. The project demonstrated that stratospheric platforms could provide many of the communication services attributed to satellites — at a fraction of the cost and complexity of orbital systems.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStratospheric Drones:\u003c/strong\u003e Companies including Airbus (Zephyr), Facebook/Meta (Aquila), and various military contractors have developed solar-powered drones capable of operating in the stratosphere for extended periods — weeks or months at a time. These platforms can carry communications payloads, surveillance equipment, and sensing instruments at altitudes of 18-25 kilometers.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHigh-Altitude Airships:\u003c/strong\u003e The U.S. military has funded research into high-altitude airships — lighter-than-air platforms that can operate at stratospheric altitudes for extended periods. These platforms can carry significant payload and provide persistent coverage over large geographic areas.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRockoons and Suborbital Vehicles:\u003c/strong\u003e Various suborbital vehicle concepts have been developed that could provide temporary or semi-persistent coverage from high altitude without requiring orbital velocity or orbital mechanics.\u003c/p\u003e\n\u003cp\u003eThese platforms operate at altitudes far below the claimed orbital altitudes of satellites (160-36,000 kilometers) but far above the altitude at which ground-based observers could distinguish them from higher-altitude objects. A platform at 20 kilometers altitude would appear to ground-based observers as a point of light — indistinguishable from a platform at 200 or 20,000 kilometers.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-space-narrative-questions-without-answers\"\u003eThe Space Narrative: Questions Without Answers\u003c/h2\u003e\n\u003cp\u003eThe satellite narrative exists within a broader space narrative that raises fundamental questions when examined critically:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Van Allen Belts:\u003c/strong\u003e The Van Allen radiation belts — zones of intense radiation surrounding the Earth at altitudes between approximately 1,000 and 60,000 kilometers — pose a significant challenge to space operations. The radiation in these belts is intense enough to damage electronics and pose lethal hazards to biological organisms. While the official narrative holds that satellites operate within and beyond these belts with adequate radiation shielding, the engineering challenges of operating electronics reliably in such an environment are substantial.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSpace Debris:\u003c/strong\u003e The official count of space debris — over 30,000 tracked objects larger than 10 centimeters, and an estimated 130 million objects larger than 1 millimeter — raises questions about the operational viability of the claimed satellite constellations. At orbital velocities of 7-8 kilometers per second, even millimeter-sized debris carries the kinetic energy of a bullet. The operational environment described by space agencies appears extraordinarily hazardous for the thousands of satellites claimed to be operating reliably for years at a time.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSatellite Imagery:\u003c/strong\u003e The satellite imagery provided by Google Earth and similar services is, by the companies' own admission, a composite of multiple sources — including aerial photography, drone imagery, and processed data from various sensors. The resolution and quality of this imagery is often consistent with aerial photography from conventional aircraft rather than orbital platforms.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSpaceX Starlink:\u003c/strong\u003e SpaceX's Starlink constellation — currently numbering over 5,000 units — claims to provide internet connectivity from low Earth orbit. But the ground terminal equipment required for Starlink connectivity (the \"Dishy McFlatface\" antenna) requires clear line-of-sight to the sky and does not function through obstructions — characteristics consistent with receiving signals from any elevated platform, not exclusively from orbital altitude.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-financial-incentive-billions-in-space-budgets\"\u003eThe Financial Incentive: Billions in Space Budgets\u003c/h2\u003e\n\u003cp\u003eThe space industry represents an enormous financial ecosystem. NASA's annual budget exceeds $25 billion. The Department of Defense's space-related spending exceeds $30 billion. The commercial satellite industry is valued at over $280 billion annually. SpaceX, valued at over $180 billion, derives significant revenue from both government contracts and commercial satellite deployment.\u003c/p\u003e\n\u003cp\u003eThese budgets flow to a relatively small number of contractors, agencies, and corporations. The financial incentive to maintain the satellite narrative is enormous: if the services attributed to satellites can be provided by ground-based and atmospheric infrastructure at a fraction of the cost, then the justification for tens of billions of dollars in annual space spending collapses.\u003c/p\u003e\n\u003cp\u003eThe classified nature of much military space spending compounds the problem. The National Reconnaissance Office (NRO), the National Geospatial-Intelligence Agency (NGA), and the Space Force operate with significant portions of their budgets classified — meaning that the public cannot verify how the money is spent, what capabilities are actually deployed, or whether the officially described systems match the reality.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-we-can-verify-and-what-we-cannot\"\u003eWhat We Can Verify and What We Cannot\u003c/h2\u003e\n\u003cp\u003eIt is important to distinguish between what can be independently verified and what requires trust in institutional claims.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat can be verified:\u003c/strong\u003e Undersea cables exist and carry the vast majority of global data traffic. Ground-based towers exist and provide the majority of domestic communication services. High-altitude platforms (balloons, drones) have been demonstrated to provide communication services from the stratosphere. GPS-equivalent positioning can be achieved with ground-based systems. Weather observation can be conducted from ground-based and atmospheric platforms.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat requires institutional trust:\u003c/strong\u003e The existence of specific satellites at specific orbital altitudes. The functionality of claimed satellite systems. The actual source of signals received by satellite dishes and GPS receivers. The images and data attributed to orbital platforms. The trajectory and position of the International Space Station as described by NASA.\u003c/p\u003e\n\u003cp\u003eThe point is not to make a definitive claim about what does or does not exist in orbit. The point is to recognize that the satellite narrative is accepted by the public not on the basis of independent verification but on the basis of institutional trust — trust in NASA, the Department of Defense, SpaceX, and the telecommunications industry. Given the documented history of institutional deception across multiple domains — as explored throughout the ZZZ Daily archives — the question of whether that trust is warranted deserves serious consideration.\u003c/p\u003e\n\u003cp\u003eAs explored in our article on \u003ca href=\"/five-g-activation-frequencies/?lang=en\"\u003e5G Activation Frequencies\u003c/a\u003e, the telecommunications infrastructure deployed on the ground raises its own set of concerns about the intersection of communication technology and human health.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-biblical-firmament-what-is-above\"\u003eThe Biblical Firmament: What Is Above?\u003c/h2\u003e\n\u003cp\u003eThe biblical description of the sky — the firmament (raqia in Hebrew) — describes a solid expanse that separates the waters above from the waters below (Genesis 1:6-8). The Hebrew word raqia derives from a root meaning \"to spread out\" or \"to beat out\" — like a metalworker hammering a sheet of metal. This suggests a firm, structural barrier, not the endless void described by modern cosmology.\u003c/p\u003e\n\u003cp\u003eThe question of what the firmament is, whether it has a physical reality, and what exists beyond it are questions that Scripture raises but modern science dismisses. The mainstream narrative holds that the sky grades seamlessly into the vacuum of space, with no boundary or barrier. But the biblical text describes a firm structure — a dividing barrier placed by God between the terrestrial and celestial realms.\u003c/p\u003e\n\u003cp\u003eIf the firmament is a real structure, then the claim that thousands of devices have been placed beyond it in the vacuum of space requires scrutiny. The biblical worldview does not preclude human technological achievement — but it does establish boundaries. God placed the firmament. God named the sky \"Heaven.\" And the builders of Babel, who sought to breach heaven through technology, found that their ambition exceeded their authority.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"biblical-reflection-the-tower-that-does-not-reach\"\u003eBiblical Reflection: The Tower That Does Not Reach\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"The heaven, even the heavens, are the LORD's: but the earth hath he given to the children of men.\" — Psalm 115:16\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eScripture draws a clear boundary: the heavens belong to God; the earth is given to humanity. This is not a statement of limitation but of proper order. Humanity's domain is the earth — its stewardship, its cultivation, its governance under God. The heavens are God's domain — His throne, His dwelling, His realm of sovereignty.\u003c/p\u003e\n\u003cp\u003eThe satellite narrative claims that humanity has extended its domain into the heavens — that we have placed our devices in God's territory, orbiting His creation, surveilling His earth from His sky. This claim, whether literally true or not, represents the same spiritual posture as the Tower of Babel: the attempt to reach into heaven through human technology and make a name for ourselves.\u003c/p\u003e\n\u003cp\u003eThe earth has been given to the children of men. The infrastructure that enables human communication — the cables under the sea, the towers on the land, the platforms in the atmosphere — is earthly infrastructure, built within humanity's proper domain. Whether or not there are devices in orbit, the communication that sustains human society depends overwhelmingly on terrestrial systems. The heavens remain the Lord's. The question is whether we have truly reached them — or whether we have merely been told that we have.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/481-Fake_Stars_Real_Chains.mp4\"\u003eFake Stars Real Chains\u003c/a\u003e — What's really in the sky\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/485-Firmament_Firewall.mp4\"\u003eFirmament Firewall\u003c/a\u003e — The dome above and what it means\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/77-The_Dome_Above.mp4\"\u003eThe Dome Above\u003c/a\u003e — Questioning the official cosmology\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/101-NASA_Helium_Balloons.mp4\"\u003eNASA Helium Balloons\u003c/a\u003e — The space program deception\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/gwen-towers-not-5g/?lang=en\"\u003eGWEN Towers\u003c/a\u003e — The ground-based electromagnetic infrastructure that provides capabilities commonly attributed to orbital systems\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/five-g-activation-frequencies/?lang=en\"\u003e5G Activation Frequencies\u003c/a\u003e — The terrestrial communication infrastructure and its implications for human health\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThe builders of Babel sought to reach heaven through technology. God confused their language and scattered them across the earth. Today, we are told that a new generation of builders has succeeded where Babel failed — that thousands of devices orbit in the heavens, connecting all humanity through a technological infrastructure in the sky. But 97% of the world's data travels through cables on the ocean floor. The towers that carry our signals stand on solid ground. The balloons and drones that relay communications float in the atmosphere, not in orbit. The heavens, even the heavens, are the Lord's. The earth He has given to the children of men. Perhaps the tower still does not reach. Perhaps the heavens remain, as they have always been, the domain of God alone. And perhaps the communication infrastructure that actually connects us is far more terrestrial — and far less heavenly — than we have been led to believe.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 fl
