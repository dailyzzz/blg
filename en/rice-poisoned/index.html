billions, the foundation of diets across Asia, Africa, and the Americas. And it has been poisoned. Not metaphorically. Not speculatively. Measurably, documentedly, verifiably poisoned — with arsenic, heavy metals, microplastics, and agrochemicals that accumulate in the body with every serving.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the principalities and powers of Ephesians 6:12 operate through systems designed to steal, kill, and destroy. The poisoning of the world's most important food staple is not an accident. It is the logical product of a food system designed to maximize profit while minimizing human health — a system whose architects include the same institutional networks that govern finance, media, and religion.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, Loyola's military organization of \"absolute power\" (Napoleon), governing \"all the world\" (Tamburini), have always understood that control of food is control of population. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals their infiltration \"cloaked with cunning\" and their willingness to practice \"every species of vice.\" The poisoning of rice is not a Jesuit operation per se — but it is the product of the institutional system they helped build: a global network of corporations, regulators, and financiers that prioritizes profit over human life.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-arsenic-problem\"\u003eThe Arsenic Problem\u003c/h2\u003e\n\u003ch3 id=\"naturally-occurring-unnaturally-concentrated\"\u003eNaturally Occurring, Unnaturally Concentrated\u003c/h3\u003e\n\u003cp\u003eRice contains arsenic. This is not disputed. The FDA, the WHO, and independent laboratories worldwide have confirmed that rice absorbs arsenic from soil and water at rates significantly higher than other grains. Arsenic is a known carcinogen — it causes cancer of the bladder, lungs, skin, kidneys, and liver.\u003c/p\u003e\n\u003cp\u003eThe reason rice absorbs arsenic is its growth method: rice paddies are flooded, and arsenic in the soil dissolves in water, which the rice plant absorbs through its roots. This is a natural process, but it has been dramatically worsened by human activity. Decades of arsenic-based pesticide use, industrial contamination, and irresponsible agricultural practices have loaded the soil with arsenic that rice plants now absorb in dangerous quantities.\u003c/p\u003e\n\u003cp\u003eThe United States is a particularly problematic source. American rice — especially rice grown in the Southern states where cotton was historically farmed using lead arsenate pesticides — contains some of the highest arsenic levels in the world. The legacy of cotton-era pesticide use continues to contaminate rice grown on the same land over a century later.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) how the regulatory response to arsenic in rice has been deliberately inadequate. The FDA has set limits for arsenic in infant rice cereal but has not established limits for rice consumed by adults. This means that while the government acknowledges arsenic in rice is dangerous for babies, it maintains the legal fiction that the same arsenic is safe for everyone else.\u003c/p\u003e\n\u003ch3 id=\"the-dose-argument\"\u003eThe Dose Argument\u003c/h3\u003e\n\u003cp\u003eThe industry's defense is the classic toxicological argument: the dose makes the poison. At the levels found in rice, they argue, arsenic poses no significant health risk. But this argument ignores several critical factors:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCumulative exposure\u003c/strong\u003e: Arsenic accumulates in the body over time. Someone who eats rice daily — as billions of people do — is not exposed once. They are exposed with every meal, for decades.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSynergistic effects\u003c/strong\u003e: Arsenic does not exist in isolation. It interacts with other contaminants — heavy metals, pesticide residues, microplastics — in ways that are poorly understood but likely amplify toxicity.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVulnerable populations\u003c/strong\u003e: Children, pregnant women, the elderly, and the chronically ill are more susceptible to arsenic's effects. The dose that is \"safe\" for a healthy adult may be dangerous for these populations.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRegulatory capture\u003c/strong\u003e: The agencies that set \"safe\" levels are subject to the same regulatory capture described in Part 2 of this series. The revolving door between the rice industry and the regulatory agencies ensures that limits are set to protect industry profits, not consumer health.\u003c/p\u003e\n\u003ch2 id=\"heavy-metals-and-microplastics\"\u003eHeavy Metals and Microplastics\u003c/h2\u003e\n\u003ch3 id=\"the-complete-contamination-profile\"\u003eThe Complete Contamination Profile\u003c/h3\u003e\n\u003cp\u003eArsenic is not the only contaminant in rice. Independent testing has found elevated levels of cadmium, lead, and mercury in rice samples from multiple countries. These heavy metals, like arsenic, are carcinogens and neurotoxins that accumulate in the body over time.\u003c/p\u003e\n\u003cp\u003eMicroplastics — tiny fragments of plastic that pervade the environment — have been found in rice at alarming levels. A 2023 study published in the Journal of Hazardous Materials found that a single serving of instant rice can contain millions of microplastic particles. These particles carry their own contaminants — plasticizers, flame retardants, and other industrial chemicals — directly into the digestive system.\u003c/p\u003e\n\u003cp\u003eThe combination of arsenic, heavy metals, and microplastics creates a toxic cocktail that no regulatory agency has evaluated comprehensively. Each contaminant is studied in isolation, as if the body encounters them one at a time. In reality, the body encounters all of them simultaneously, with every serving of rice, and the combined effect is unknown — because no one with the authority to investigate has been willing to do so.\u003c/p\u003e\n\u003ch3 id=\"industrial-agricultures-legacy\"\u003eIndustrial Agriculture's Legacy\u003c/h3\u003e\n\u003cp\u003eThe contamination of rice is not a natural phenomenon. It is the product of industrial agriculture — a system designed to maximize yield and profit while externalizing health and environmental costs. The same system that sprayed arsenic-based pesticides on cotton fields in the early 20th century, that discharged heavy metals into waterways from factories, that produced the plastics that are now fragmenting into microplastics throughout the food supply — this system created the conditions for rice contamination.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' historical role in agricultural development — their missions controlled agriculture across three continents — established the model of centralized, institutional control of food production. The modern industrial agriculture system is the secular successor to the mission system: a centralized authority determining what is grown, how it is grown, and who profits from the growing. The contamination is not a failure of the system. It is a feature — an externalized cost that the system's architects accept as the price of profit.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's vision of the demonic hierarchy in the second heaven — organized, purposeful, extractive — describes the operating principle of industrial agriculture with disturbing accuracy. The system extracts nutrients from the soil, health from the consumer, and wealth from the population, redirecting all three to the institutional networks that govern the system. This is spiritual warfare expressed through agricultural policy.\u003c/p\u003e\n\u003ch2 id=\"what-you-can-do\"\u003eWhat You Can Do\u003c/h2\u003e\n\u003ch3 id=\"practical-protection\"\u003ePractical Protection\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eWash your rice\u003c/strong\u003e: Rinsing rice thoroughly before cooking removes some surface arsenic. Some researchers recommend soaking rice overnight and discarding the water.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eCook with excess water\u003c/strong\u003e: Cooking rice in a large amount of water (like pasta) and draining it can reduce arsenic content by up to 60 percent.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDiversify your grains\u003c/strong\u003e: Quinoa, millet, buckwheat, and amaranth are alternatives that absorb less arsenic than rice.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eChoose your source carefully\u003c/strong\u003e: Basmati rice from India and Pakistan tends to have lower arsenic levels than American-grown rice.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eGrow your own\u003c/strong\u003e: If possible, grow rice or alternative grains in clean soil with clean water.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eTest your food\u003c/strong\u003e: Independent testing services can analyze the contaminant profile of the foods you eat.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h3\u003e\n\u003cp\u003eFood is sacred. The first commandment in Genesis is dietary — God tells Adam what to eat and what not to eat. The poisoning of food is, in spiritual terms, a violation of the most fundamental divine provision. It is the serpent in the garden, offering fruit that appears good but carries death.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's warning — that 97.5 percent of Christians were rejected, that 95 percent serve \"self\" — applies to the food system as well. Serving \"self\" includes the institutional self that prioritizes profit over health, convenience over safety, and the wide path of industrial food over the narrow path of clean, local, self-grown sustenance.\u003c/p\u003e\n\u003cp\u003eEvery choice about what you eat is a spiritual act. Choose wisely.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Investigation into food supply contamination and regulatory failure\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — The s d indifferent to your health. The poison is measurable. The contamination is documented. And the solution begins in your kitchen, with a choice: accept what the system feeds you, or take control of what you eat. The narrow path leads through the garden, not the grocery store.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/food-environment/\",\"className\":\"category-badge\",\"children\":\"food-environment\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"RICE HAS BEEN POISONED: What You Need to Know\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Your rice has been poisoned with arsenic, microplastics, and hidden chemicals. Discover the Jesuit-connected food system contaminating staples.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-03T10:00:00Z\",\"children\":\"May 3, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"rice\",{\"href\":\"/en/tag/rice/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"rice\"]}],[\"$\",\"a\",\"poison\",{\"href\":\"/en/tag/poison/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"poison\"]}],[\"$\",\"a\",\"arsenic\",{\"href\":\"/en/tag/arsenic/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"arsenic\"]}],[\"$\",\"a\",\"food-saf
