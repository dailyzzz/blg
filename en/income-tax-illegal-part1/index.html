lockquote\u003e\n\u003cp\u003eJesus was asked about taxes and gave a response that has been interpreted for two millennia. But consider the full implication: render unto Caesar what is Caesar's. What if your labor — the work of your hands, the product of your mind, the time of your life — does not belong to Caesar? What if the income tax is not merely excessive but fundamentally illegitimate?\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed systems of bondage operating through the material world. Three heavens. Demonic hierarchy. 97.5 percent rejection. 95 percent self-service. Every word judged (Matthew 12:36-37). The income tax is one of the material bondage systems through which the principalities of Ephesians 6:12 extract human energy — not metaphorically, but literally. Your labor is your life force. Income tax takes a portion of that life force and redirects it to the institutional system.\u003c/p\u003e\n\u003cp\u003eThe Jesuits — Loyola's military organization, Napoleon's \"absolute power,\" Tamburini governing \"all the world\" — have always understood that financial control is the most effective form of governance. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The income tax system operates by the same principles: invisible authority (the IRS), mandatory compliance, and the elimination of dissenters.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-legal-arguments\"\u003eThe Legal Arguments\u003c/h2\u003e\n\u003ch3 id=\"the-16th-amendment-question\"\u003eThe 16th Amendment Question\u003c/h3\u003e\n\u003cp\u003eThe 16th Amendment to the U.S. Constitution, ratified in 1913, is the legal basis for the federal income tax. It reads: \"The Congress shall have power to lay and collect taxes on incomes, from whatever source derived, without apportionment among the several States.\"\u003c/p\u003e\n\u003cp\u003eThe legal arguments against the income tax center on several claims:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRatification irregularities\u003c/strong\u003e: Researcher Bill Benson spent years examining the ratification documents of all 48 states that existed in 1913. He documented numerous irregularities — states that altered the text, states whose legislatures did not achieve the required majority, states where the ratification process was procedurally flawed. His book \u003cem\u003eThe Law That Never Was\u003c/em\u003e argues that the 16th Amendment was never legally ratified.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVoluntary compliance\u003c/strong\u003e: The IRS itself has used the phrase \"voluntary compliance\" to describe the tax system. Tax protestors argue that this language indicates the income tax is voluntary, not mandatory. Courts have consistently rejected this interpretation, but the language itself is telling.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eIncome definition\u003c/strong\u003e: Some legal scholars argue that \"income\" as defined in the 16th Amendment means corporate profit, not individual wages. The Supreme Court in \u003cem\u003eEisner v. Macomber\u003c/em\u003e (1920) defined income as \"the gain derived from capital, from labor, or from both combined\" — but this definition has been expanded by subsequent rulings to encompass virtually all economic activity.\u003c/p\u003e\n\u003cp\u003eThese arguments have not succeeded in court. The legal system, which is itself part of the institutional structure, has consistently ruled in favor of the income tax. But the failure of legal arguments does not prove they lack merit. It proves that the system protects itself.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) the connections between the income tax, the Federal Reserve system, and the banking families that engineered both. The 16th Amendment and the Federal Reserve Act were both passed in 1913 — the same year, by the same Congress. This is not coincidental. The income tax provides the revenue stream that services the debt created by the Federal Reserve's fractional reserve lending. Without the income tax, the Federal Reserve system collapses. Without the Federal Reserve, the income tax has no purpose.\u003c/p\u003e\n\u003ch3 id=\"the-federal-reserve-connection\"\u003eThe Federal Reserve Connection\u003c/h3\u003e\n\u003cp\u003eThe Federal Reserve is not a government agency. It is a private banking cartel that creates money through debt. When the government needs money, it borrows from the Federal Reserve, which creates the money out of nothing and charges interest. The income tax exists primarily to pay the interest on this debt.\u003c/p\u003e\n\u003cp\u003eThis means that the income tax does not fund roads, schools, or hospitals. It funds interest payments to private bankers. Your labor, extracted through taxation, is funneled to the private owners of the Federal Reserve system — a system created in 1913 through a process that involved secret meetings on Jekyll Island, Georgia, attended by representatives of the Morgan, Rockefeller, and Rothschild banking interests.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' connection to these banking families is documented but rarely discussed. Jesuit-educated advisors have populated the boards of major banks, the Federal Reserve, and the Treasury Department for over a century. The financial system that extracts your labor through income tax was designed, in part, by men trained in Jesuit institutions — men who learned the Jesuit method of governance: invisible authority, institutional capture, and the extraction of compliance through systems that appear legitimate but serve hidden masters.\u003c/p\u003e\n\u003ch2 id=\"the-moral-case\"\u003eThe Moral Case\u003c/h2\u003e\n\u003ch3 id=\"taxation-as-slavery\"\u003eTaxation as Slavery\u003c/h3\u003e\n\u003cp\u003eThe moral case against income tax is simple: if another person claimed the right to take 30 percent of your income by force, you would call it robbery. If they claimed the right to take 30 percent of your labor, you would call it slavery. The only difference between the government and a robber is the government's claim of legitimacy — a claim that rests on the consent of the governed.\u003c/p\u003e\n\u003cp\u003eBut did you consent? Did you sign a contract agreeing to pay income tax? Were you given a choice? The social contract theory — the idea that by living in a society, you implicitly consent to its rules — is a philosophical construct, not a legal agreement. You were born into a system you did not create, raised to accept rules you did not write, and taxed on labor you did not volunteer.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's revelation that 95 percent serve \"self\" applies to the institutional self as much as the personal self. The government serves its own institutional interests — perpetuation, expansion, control — and the income tax is its primary fuel. The 97.5 percent who were rejected trusted institutional systems without examination. The income tax is one such system — accepted without question by a population trained from childhood to comply.\u003c/p\u003e\n\u003ch3 id=\"the-biblical-perspective\"\u003eThe Biblical Perspective\u003c/h3\u003e\n\u003cp\u003eThe Bible addresses taxation in several contexts. Joseph's taxation of Egypt (Genesis 47:24) took 20 percent — and this was presented as a heavy burden. The prophet Samuel warned Israel that a king would take a tenth of their produce and their servants, and declared: \"ye shall cry out in that day because of your king\" (1 Samuel 8:18).\u003c/p\u003e\n\u003cp\u003eModern income tax, combined with state taxes, property taxes, sales taxes, and regulatory fees, takes 40-60 percent of most Americans' total income. This is not the 10 percent tithe that God established. It is not even the 20 percent that Pharaoh demanded. It is a level of extraction that the Bible describes as tyranny — the very thing Samuel warned would happen when the people chose a king over God.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, who served as advisors to kings and ministers for centuries, helped design the modern tax state. Their influence on financial policy, documented through centuries of political history, contributed to the system that extracts more from the population than any pharaoh dared to demand.\u003c/p\u003e\n\u003ch2 id=\"what-you-need-to-know\"\u003eWhat You Need to Know\u003c/h2\u003e\n\u003ch3 id=\"the-systems-vulnerability\"\u003eThe System's Vulnerability\u003c/h3\u003e\n\u003cp\u003eThe income tax system depends on compliance — specifically, on the fear that non-compliance generates. The IRS enforces compliance through penalties, liens, levies, wage garnishment, and criminal prosecution. These tools create a climate of fear that ensures most people pay without questioning the system's legitimacy.\u003c/p\u003e\n\u003cp\u003eBut the system is more fragile than it appears. If a significant portion of the population simultaneously questioned the system's legitimacy, demanded proof of legal obligation, and organized politically to reform or abolish the income tax, the system would face a crisis it is not designed to handle.\u003c/p\u003e\n\u003cp\u003eThis is why the topic is suppressed. Media coverage of tax resistance is uniformly negative. Tax protestors are portrayed as cranks, criminals, or conspiracy theorists. The legal system punishes them harshly — not because their arguments are frivolous, but because their example is dangerous. A population that questions the income tax is a population that might question everything else.\u003c/p\u003e\n\u003cp\u003eAnd that is precisely the point. The narrow path requires questioning everything — every institution, every tradition, every system that claims authority over your life and labor. The income tax is one such system. In Part 2, we will examine how taxation became bondage and what the American slave empire looks like from the inside.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Investigation into the income tax system and Federal Reserve connections\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Material bondage systems and spiritual freedom\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtu
