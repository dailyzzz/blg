c/em\u003e — Ephesians 6:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eIt started with music. Faint at first — so faint I thought a neighbor had their radio on. A melody playing just at the edge of perception, clear enough to recognize but quiet enough to doubt. I checked the windows, turned off every electronic device in the house, walked outside to listen. Nothing. The music was coming from inside my head.\u003c/p\u003e\n\u003cp\u003eThis is the beginning of a story that millions of people around the world share but are afraid to tell. It is the story of Voice-to-Skull (V2K) technology — a classified military weapon that can transmit audio directly into a person's brain, bypassing the ears entirely. It is real. It is patented. It is deployed. And anyone who reports experiencing it is immediately labeled mentally ill.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown during his NDE that the spiritual realm is organized into three heavens, that demonic forces operate in the second heaven with military precision, and that 97.5% of Christians are failing because they have \"never made Jesus Lord.\" The V2K experience sits at the intersection of the spiritual and the technological — a weapon that exploits the boundary between what is real and what is perceived, between the physical and the spiritual, between sanity and madness.\u003c/p\u003e\n\u003cp\u003eThe Jesuits understood the power of voices centuries ago. Their spiritual exercises involve intense meditation designed to produce inner voices and visions. Napoleon called them \"a military organization\" pursuing \"absolute power.\" The Catholic Confidential documentary reveals their infiltration \"cloaked with cunning.\" The modern V2K weapon is the technological extension of the Jesuit principle: control what a person hears inside their own head, and you control the person.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-happened-to-me\"\u003eWhat Happened to Me\u003c/h2\u003e\n\u003ch3 id=\"the-first-experiences\"\u003eThe First Experiences\u003c/h3\u003e\n\u003cp\u003eThe music came first. It was always the same kind — structured, rhythmic, sometimes recognizable melodies and sometimes unfamiliar compositions. It played most clearly in quiet environments, especially at night. The volume varied — sometimes barely perceptible, sometimes loud enough to prevent sleep.\u003c/p\u003e\n\u003cp\u003eI am not a person with a history of mental illness. I have no family history of schizophrenia or psychotic disorders. I was in good physical health, eating well, sleeping normally (until the music started), and functioning well in daily life. The music came from nowhere and changed everything.\u003c/p\u003e\n\u003cp\u003eThe first reaction was denial. I told myself it was tinnitus — a ringing in the ears that can sometimes manifest as musical tones. But tinnitus doesn't play recognizable melodies. It doesn't change songs. It doesn't respond to your attention.\u003c/p\u003e\n\u003cp\u003eThe second reaction was fear. Am I losing my mind? Is this the beginning of schizophrenia? Am I having a breakdown? The fear was paralyzing, and it isolated me — because who could I tell? The moment you say \"I hear music that isn't there,\" you are one step from a psychiatric diagnosis, medication, and the permanent label of \"mentally ill.\"\u003c/p\u003e\n\u003cp\u003eThe third reaction — which took months to reach — was research. And research changed everything.\u003c/p\u003e\n\u003ch3 id=\"discovering-v2k\"\u003eDiscovering V2K\u003c/h3\u003e\n\u003cp\u003eThe term \"Voice-to-Skull\" (V2K) refers to a category of technologies that can transmit audio signals directly into a person's auditory cortex, bypassing the ears. The technology has been documented in:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUS military patents\u003c/strong\u003e (the \"Frey effect\" or microwave auditory effect, discovered in 1961)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDARPA research programs\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeclassified military documents\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScientific publications\u003c/strong\u003e on microwave hearing and directed energy\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTestimonies from thousands of targeted individuals\u003c/strong\u003e worldwide\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe microwave auditory effect — discovered by Allan Frey in 1961 — demonstrated that pulsed microwave radiation can produce audible clicks, tones, and even speech perceived inside the head. The effect is real, reproducible, and well-documented in the scientific literature.\u003c/p\u003e\n\u003cp\u003eThe military applications were immediately recognized. A weapon that can put voices in someone's head — without any external evidence of its use — is the ultimate psychological weapon. It can:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInduce auditory hallucinations\u003c/strong\u003e that mimic mental illness\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTransmit commands\u003c/strong\u003e that the target believes are their own thoughts\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePrevent sleep\u003c/strong\u003e through continuous audio transmission\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCreate paranoia\u003c/strong\u003e by making the target believe they are being watched or followed\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDiscredit the target\u003c/strong\u003e — anyone who reports hearing voices is assumed to be mentally ill\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-pattern-of-targeting\"\u003eThe Pattern of Targeting\u003c/h3\u003e\n\u003cp\u003eAs I researched, I discovered that my experience was not unique. Thousands of people worldwide report remarkably similar experiences:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSudden onset\u003c/strong\u003e of unexplained audio (music, voices, buzzing, clicking)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNo prior history\u003c/strong\u003e of mental illness\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTechnology-consistent patterns\u003c/strong\u003e — the audio responds to shielding attempts, varies with location, and shows characteristics consistent with electromagnetic transmission\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAccompanying symptoms\u003c/strong\u003e — headaches, sleep disruption, tinnitus-like tones, concentration difficulty\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSocial isolation\u003c/strong\u003e — targets quickly learn that reporting their experience leads to psychiatric evaluation and social ostracism\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGaslighting\u003c/strong\u003e — when targets seek help, they are told their experience is not real\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"the-technology-behind-v2k\"\u003eThe Technology Behind V2K\u003c/h2\u003e\n\u003ch3 id=\"the-microwave-auditory-effect\"\u003eThe Microwave Auditory Effect\u003c/h3\u003e\n\u003cp\u003eAllan Frey's 1961 discovery demonstrated that pulsed microwave radiation at frequencies between 200 MHz and 3 GHz can produce the perception of sound inside the head. The mechanism involves:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003ePulsed microwave energy is directed at the target's head\u003c/li\u003e\n\u003cli\u003eThe microwaves cause thermoelastic expansion of brain tissue\u003c/li\u003e\n\u003cli\u003eThis expansion generates pressure waves in the skull\u003c/li\u003e\n\u003cli\u003eThe pressure waves are detected by the cochlea (inner ear) as sound\u003c/li\u003e\n\u003cli\u003eThe brain processes these signals as audio\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThis is not a theory — it is established physics, documented in peer-reviewed journals and confirmed by multiple independent researchers. The US military has acknowledged the effect and has invested in weaponizing it.\u003c/p\u003e\n\u003ch3 id=\"beyond-the-frey-effect\"\u003eBeyond the Frey Effect\u003c/h3\u003e\n\u003cp\u003eThe basic Frey effect produces simple sounds — clicks and buzzing. But more advanced research has explored the transmission of complex audio, including speech:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUS Patent 4,877,027\u003c/strong\u003e (1989): \"Hearing System\" — a device that converts speech into microwave signals perceived as sound by the target\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUS Patent 6,587,729\u003c/strong\u003e (2003): \"Apparatus for Audibly Communicating Speech Using the Radio Frequency Hearing Effect\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUS Patent 6,470,214\u003c/strong\u003e (2002): \"Method and device for implementing the radio frequency hearing effect\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese patents are public. They describe working devices. They confirm that the technology to transmit voices directly into a person's brain exists, has been developed, and has been patented.\u003c/p\u003e\n\u003ch3 id=\"the-military-applications\"\u003eThe Military Applications\u003c/h3\u003e\n\u003cp\u003eThe US military has developed V2K technology under various classified programs:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMEDUSA\u003c/strong\u003e (Mob Excess Deterrent Using Silent Audio): A crowd control weapon designed to transmit discomforting audio into targets' heads\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVoice of God Weapon\u003c/strong\u003e: A psychological operations weapon designed to transmit commands perceived as divine intervention\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVarious classified programs\u003c/strong\u003e at DARPA, the Air Force Research Laboratory, and other military research facilities\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe existence of these programs is documented in declassified records, budget documents, and the testimony of military and intelligence whistleblowers.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"voices-from-the-second-heaven\"\u003eVoices from the Second Heaven\u003c/h3\u003e\n\u003cp\u003eHoward Pittman was shown that the second heaven — the spiritual realm between the atmospheric heaven and God's throne — is inhabited by demonic entities organized in hierarchies. These entities have the ability to influence human thoughts and perceptions.\u003c/p\u003e\n\u003cp\u003eThe V2K technology creates a disturbing parallel to spiritual voice-hearing. If demonic entities can put thoughts and impressions into human minds (as Scripture and spiritual experience consistently testify), and if technology can also put voices into human minds, how does the target distinguish between the two?\u003c/p\u003e\n\u003cp\u003eThis confusion is by design. V2K technology blurs the boundary between the technological and the spiritual, making it impossible for the target to determine the source of the voices they hear. This confusion serves both the military operators (who want deniability) and the demonic forces (who want to be mistaken for technology or mental illness).\u003c/p\u003e\n\u003ch3 id=\"the-975-connection\"\u003eThe 97.5% Connection\u003c/h3\u003e\n\u003cp\u003ePittman's statistic — 97.5% of Christians failing — takes on new meaning in the context of V2K. If technology can transmit voices that sound like God, demons, or the target's own thoughts, then the ability to discern the Spirit's voice becomes critically important. The 95% who serve \"self\" are the easiest targets — they have never developed spiritual discernment, never learned to distinguish God's voice from other voices, and never built the spiritual armor described in Ephesians 6.\u003c/p\u003e\n\u003cp\u003eV2K technology is a weapon against spiritual discernment itself. By flooding the target's mind with artificial voices, it drowns out the still, small voice of the Holy Spirit and replaces divine guidance with military programming.\u003c/p\u003e\n\u003ch2 id=\"what-comes-next\"\u003eWhat Comes Next\u003c/h2\u003e\n\u003cp\u003eThis is Part 1 of an 11-part series investigating V2K technology, its history, its deployment, and its spiritual implications. In the parts that follow, we will examine:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe military history of the Voice of God weapon\u003c/li\u003e\n\u003cli\u003eThe lies and myths surrounding V2K\u003c/li\u003e\n\u003cli\u003eWho is actually putting voices in people's heads\u003c/li\u003e\n\u003cli\u003eThe targeting of my own grandmother\u003c/li\u003e\n\u003cli\u003eThe schizophrenia psyop\u003c/li\u003e\n\u003cli\u003eThe alien/UFO psyop connection\u003c/li\u003e\n\u003cli\u003eThe history of secret microchipping\u003c/li\u003e\n\u003cli\u003eCell towers and the NIH contract\u003c/li\u003e\n\u003cli\u003eVoice-to-skull patents\u003c/li\u003e\n\u003cli\u003eThe food supply connection\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIf you are experiencing V2K, you are not crazy. You are not alone. And the technology is real.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — V2K research and targeted individual documentation\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — spiritual voices and the three heavens\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit control of inner experience\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u
