said unto them, Suffer the little children to come unto me, and forbid them not: for of such is the kingdom of God.\" — Mark 10:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eWhen children were brought to Jesus, the disciples tried to turn them away. They thought the Master's time was too important, His mission too grand, for the concerns of children. Jesus rebuked them. He declared that the kingdom of God belongs to children — and that anyone who prevents children from reaching Him faces His displeasure.\u003c/p\u003e\n\u003cp\u003eAs the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e reveals, the serpent's curse targets the most vulnerable — and children are the most vulnerable of all. An epidemic of neurological injury among children is not a mystery that defies investigation. It is a crime that has been protected from investigation by the institutions that should have investigated it decades ago.\u003c/p\u003e\n\u003cp\u003eRFK Jr. has announced a worldwide effort to determine the cause of autism. For the first time in history, a federal official with the authority and the will is demanding an answer to the question the medical establishment has refused to ask.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-autism-epidemic\"\u003eThe Autism Epidemic\u003c/h2\u003e\n\u003cp\u003eIn 1970, the prevalence of autism spectrum disorder (ASD) in the United States was estimated at approximately 1 in 10,000 children. By 2000, it had risen to 1 in 150. By 2010, 1 in 68. By 2020, 1 in 36. The most recent CDC estimates suggest the rate may now exceed 1 in 30 children.\u003c/p\u003e\n\u003cp\u003eThis is not a gradual increase. It is an exponential explosion — a more than 300-fold increase in five decades. No genetic change can produce a 300-fold increase in prevalence in two generations. The cause is environmental — something in the environment of American children has changed dramatically since 1970, and that change is producing neurological injury at epidemic scale.\u003c/p\u003e\n\u003cp\u003eThe medical establishment's response to this epidemic has been to deny its existence, attribute it to \"better diagnosis,\" and refuse to investigate environmental causes. The CDC, which is responsible for monitoring autism prevalence, has simultaneously:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDocumented the increasing rates\u003c/li\u003e\n\u003cli\u003eRefused to conduct comparative studies of vaccinated vs. unvaccinated children\u003c/li\u003e\n\u003cli\u003eFunded research focused on genetic factors rather than environmental exposures\u003c/li\u003e\n\u003cli\u003eActively suppressed research linking environmental exposures to autism\u003c/li\u003e\n\u003cli\u003eCharacterized anyone who questions environmental causes as \"anti-science\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKaren Kingston has documented in The Kingston Report (karenkingston.substack.com): \"The refusal to study the environmental causes of autism is the greatest scientific scandal in modern history. We have a 300-fold increase in a neurological condition affecting children. The CDC knows the rate is increasing. The CDC refuses to study why. The only logical explanation for this refusal is that the agency already knows — or suspects — that the answer implicates products it recommends, industries it protects, or policies it has implemented.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-investigation\"\u003eThe Investigation\u003c/h2\u003e\n\u003cp\u003eRFK Jr.'s worldwide investigation will pursue multiple lines of inquiry simultaneously:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVaccinated vs. unvaccinated comparisons:\u003c/strong\u003e The study the CDC has refused to conduct for decades — a comprehensive comparison of health outcomes, including autism rates, between fully vaccinated and completely unvaccinated children.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTemporal correlation analysis:\u003c/strong\u003e Detailed analysis of the correlation between the expansion of the childhood vaccination schedule, the introduction of specific vaccines, and the acceleration of autism prevalence.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEnvironmental toxin assessment:\u003c/strong\u003e Investigation of the cumulative effect of environmental exposures — including pesticides, heavy metals, food additives, endocrine disruptors, and pharmaceutical residues — on neurodevelopment.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAluminum adjuvant research:\u003c/strong\u003e Study of the neurological effects of aluminum adjuvants used in childhood vaccines, which have been documented to accumulate in brain tissue.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInternational comparisons:\u003c/strong\u003e Comparison of autism rates across nations with different vaccination schedules, environmental regulations, and dietary patterns to identify correlating factors.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRegression analysis:\u003c/strong\u003e Investigation of \"regressive autism\" — cases in which children develop normally and then lose language, social, and cognitive abilities — including temporal proximity to environmental exposures.\u003c/p\u003e\n\u003cp\u003eThe investigation will be conducted through international partnerships with research institutions independent of pharmaceutical industry funding — a critical distinction, as the majority of autism research conducted in the United States has been funded by institutions with pharmaceutical industry connections.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-cdc-whistleblower\"\u003eThe CDC Whistleblower\u003c/h2\u003e\n\u003cp\u003eIn 2014, Dr. William Thompson, a senior CDC scientist, disclosed to Congress that he and his colleagues at the CDC had committed research fraud in a 2004 study examining the relationship between the MMR vaccine and autism.\u003c/p\u003e\n\u003cp\u003eThompson alleged that the study's authors — including himself — had identified a statistically significant association between the MMR vaccine and autism in African American boys. Rather than report this finding, Thompson alleged, the authors met and agreed to exclude the data that produced the association. Thompson claimed he was instructed to destroy documents related to the original analysis, though he retained copies.\u003c/p\u003e\n\u003cp\u003eThompson's allegations were never investigated by the CDC. He was not called to testify before Congress despite offering to do so under oath. The original study remains in the literature, uncorrected. The data Thompson described has never been independently reviewed.\u003c/p\u003e\n\u003cp\u003eRFK Jr.'s investigation will include a review of the Thompson allegations and the original data — potentially providing the first independent analysis of the study that the CDC allegedly manipulated.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prophetic-imperative\"\u003eThe Prophetic Imperative\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"But whoso shall offend one of these little ones which believe in me, it were better for him that a millstone were hanged about his neck, and that he were drowned in the depth of the sea.\" — Matthew 18:6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe millstone warning is the most severe judgment Jesus pronounces in the Gospels. It is reserved for those who harm children — who offend, stumble, or injure the little ones entrusted to their care.\u003c/p\u003e\n\u003cp\u003eIf the autism epidemic is caused by environmental factors that institutions have identified but refused to address — because addressing them would implicate products they recommend, industries they protect, or policies they have implemented — then the millstone hangs over every official who knew, every researcher who was silenced, and every institution that chose revenue over the neurological integrity of a generation of children.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/91-The_Kinsey_Corruption.mp4\"\u003eThe Kinsey Corruption\u003c/a\u003e documents how corrupted science targeting children becomes institutional policy — how fraudulent research is embedded in regulatory frameworks and protected by the institutions that depend on it. The autism coverup, if it exists, follows the same pattern.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eHHS — RFK Jr. autism investigation announcement\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u0
