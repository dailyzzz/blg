wrote: \u003cem\u003e\"It is He who sits above the circle of the earth, and its inhabitants are like grasshoppers; who stretches out the heavens like a curtain, and spreads them like a tent to dwell in\"\u003c/em\u003e (Isaiah 40:22). The Hebrew word used here, \"chug,\" refers to a flat circle — not a sphere. Job 37:18 adds: \u003cem\u003e\"Can you, like Him, spread out the skies, hard as a cast metal mirror?\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe Confliction album captures this ancient tension between revealed truth and human rebellion in tracks like \u003cem\u003eThe First Darkness\u003c/em\u003e and \u003cem\u003eThe Bright Nature\u003c/em\u003e. Before the modern scientific establishment rewrote cosmology, cultures around the world described a stationary plane covered by a dome — a firmament of impenetrable, glass-like material. That understanding didn't disappear because it was disproven; it disappeared because it was suppressed.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"why-this-matters-now\"\u003eWhy This Matters Now\u003c/h2\u003e\n\u003cp\u003eIn classrooms around the world, children are taught a single model of the earth: a spinning globe hurtling through infinite space at thousands of miles per hour. This model is presented not as a theory but as an unquestionable fact. Yet when independent researchers conduct their own experiments — using lasers, cameras, and simple observation — the results often contradict what we've been told.\u003c/p\u003e\n\u003cp\u003eThis article examines several of these experiments in detail, drawing on research compiled by Agent131711 on Substack (agent131711.substack.com). These are not fringe thought experiments. They are repeatable, observable tests that anyone with the right equipment can perform. The question is not whether you believe the earth is flat or round — the question is whether you've ever been allowed to examine the evidence for yourself.\u003c/p\u003e\n\u003ch2 id=\"the-bedford-level-experiment\"\u003eThe Bedford Level Experiment\u003c/h2\u003e\n\u003ch3 id=\"the-original-test\"\u003eThe Original Test\u003c/h3\u003e\n\u003cp\u003eOne of the most famous earth-shape experiments in history took place in 1838 along the Old Bedford River in Norfolk, England. Samuel Birley Rowbotham waded into the river and used a telescope to observe a boat with a flag attached to a mast as it traveled six miles along the straight, calm canal.\u003c/p\u003e\n\u003cp\u003eAccording to the globe model, the surface of the earth curves at approximately 8 inches per mile squared. Over a six-mile distance, the boat should have disappeared below approximately 24 feet of curvature. Instead, Rowbotham observed the entire boat, mast, and flag for the full six miles. There was no detectable curvature.\u003c/p\u003e\n\u003ch3 id=\"modern-repetitions\"\u003eModern Repetitions\u003c/h3\u003e\n\u003cp\u003eThis experiment has been repeated numerous times with modern equipment. In the early 2000s, researchers used high-powered lasers across bodies of still water to measure deviation. Over distances of 10, 20, and even 30 miles, the laser beams remained level and visible — something that should be physically impossible on a globe with the stated radius of 3,959 miles.\u003c/p\u003e\n\u003cp\u003eCritics argue that atmospheric refraction accounts for these results. However, the degree of refraction required to bend light perfectly along the alleged curvature, consistently, under varying atmospheric conditions, would itself be an extraordinary claim requiring extraordinary evidence. The refraction explanation is often invoked but rarely demonstrated with the mathematical rigor it demands.\u003c/p\u003e\n\u003ch2 id=\"the-chicago-skyline-observation\"\u003eThe Chicago Skyline Observation\u003c/h2\u003e\n\u003ch3 id=\"what-should-be-impossible\"\u003eWhat Should Be Impossible\u003c/h3\u003e\n\u003cp\u003eFrom the opposite shore of Lake Michigan, roughly 60 miles away, the Chicago skyline has been photographed in stunning clarity from locations where, according to the globe model, it should be completely hidden below the horizon. At 60 miles, the expected drop due to curvature would be approximately 2,400 feet — far taller than any building in Chicago.\u003c/p\u003e\n\u003cp\u003eYet photographers have captured these images repeatedly, under various atmospheric conditions, often in the cool evening air when the \"superior mirage\" explanation is least plausible. As documented in Agent131711's research on Substack (agent131711.substack.com), these observations are not isolated anomalies. They represent a pattern that challenges the foundational claim of a curved surface.\u003c/p\u003e\n\u003ch3 id=\"the-mirage-defense\"\u003eThe \"Mirage\" Defense\u003c/h3\u003e\n\u003cp\u003eMainstream science typically dismisses these observations as \"superior mirages\" — a phenomenon where layers of air at different temperatures bend light to create an image of something that is technically below the line of sight. While mirages are real optical phenomena, the explanation requires increasingly specific conditions that conveniently appear every time the observation contradicts the model.\u003c/p\u003e\n\u003cp\u003eA genuine mirage distorts images significantly. It does not produce a crystal-clear, architecturally accurate reproduction of an entire city skyline. When you can identify individual buildings, windows, and structural details from 60 miles away, the mirage explanation strains credibility.\u003c/p\u003e\n\u003ch2 id=\"laser-tests-across-frozen-lakes\"\u003eLaser Tests Across Frozen Lakes\u003c/h2\u003e\n\u003ch3 id=\"the-setup\"\u003eThe Setup\u003c/h3\u003e\n\u003cp\u003eIndependent experimenters have conducted laser tests across frozen lakes in winter, when the air is cold, dry, and relatively uniform in temperature — conditions that minimize the possibility of atmospheric refraction. Using industrial-grade lasers mounted at known heights, researchers have measured the beam's position at various distances.\u003c/p\u003e\n\u003ch3 id=\"the-results\"\u003eThe Results\u003c/h3\u003e\n\u003cp\u003eOver distances of 5 to 15 miles, the laser beam consistently arrives at the expected height — the same height at which it was emitted. On a globe, the beam should arrive progressively higher as the surface curves away beneath it, or it should miss the target entirely as the target drops below the curvature.\u003c/p\u003e\n\u003cp\u003eThese experiments, documented with video evidence and precise measurements, show no detectable curvature. The surface of the frozen lake behaves as a flat plane over these distances.\u003c/p\u003e\n\u003ch2 id=\"high-altitude-balloon-footage\"\u003eHigh-Altitude Balloon Footage\u003c/h2\u003e\n\u003ch3 id=\"what-amateur-balloons-reveal\"\u003eWhat Amateur Balloons Reveal\u003c/h3\u003e\n\u003cp\u003eIn recent years, amateur weather balloons equipped with GoPro cameras and GPS trackers have reached altitudes of 100,000 feet or more. At these heights, conventional wisdom says the curvature of the earth should be clearly visible. And indeed, many balloon videos appear to show a curved horizon.\u003c/p\u003e\n\u003cp\u003eHowever, careful analysis reveals a critical detail: the GoPro cameras used in most of these flights use a fisheye lens — a wide-angle lens that introduces barrel distortion, making straight lines appear curved at the edges of the frame. When the camera tilts upward, the horizon appears to curve upward (concave). When it tilts downward, the horizon appears to curve downward (convex). At center frame, the horizon appears flat.\u003c/p\u003e\n\u003ch3 id=\"corrected-footage\"\u003eCorrected Footage\u003c/h3\u003e\n\u003cp\u003eWhen researchers use cameras with non-fisheye lenses — or when they apply distortion correction to GoPro footage — the horizon at 100,000 feet consistently appears flat and rises to eye level. This is significant because on a globe, the horizon should drop below eye level as altitude increases. The observer should have to look down to see the horizon, and the curvature should be unmistakable.\u003c/p\u003e\n\u003cp\u003eTrack 95 from the ZZZ Daily album, \u003cem\u003eFlat Earth Experiments\u003c/em\u003e, speaks directly to this kind of investigation — the willingness to test what we've been told rather than simply accepting it.\u003c/p\u003e\n\u003ch2 id=\"the-firmament-connection\"\u003eThe Firmament Connection\u003c/h2\u003e\n\u003ch3 id=\"genesis-and-the-dome-above\"\u003eGenesis and the Dome Above\u003c/h3\u003e\n\u003cp\u003eThese experiments don't exist in a vacuum. They connect to an ancient cosmological model described in Genesis 1:6-8: \u003cem\u003e\"And God said, 'Let there be a firmament in the midst of the waters, and let it divide the waters from the waters.' And God made the firmament, and divided the waters which were under the firmament from the waters which were above the firmament: and it was so.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe Hebrew word \"raqia\" — translated as \"firmament\" — describes something beaten out, hammered, solid. Job compared it to a cast metal mirror. The ancients understood the sky not as an infinite void but as a solid, dome-like structure — impenetrable clear glass-like material — placed over a stationary earth.\u003c/p\u003e\n\u003cp\u003eThis is the model that tracks like \u003cem\u003eThe Dome Above\u003c/em\u003e (Track 77) and \u003cem\u003eDome Dwellers Awakening\u003c/em\u003e (Track 475) from the ZZZ Daily album explore musically. The firmament is not a metaphor in the biblical text. It is described as a physical structure that holds back waters above and contains the lights — sun, moon, and stars — within it.\u003c/p\u003e\n\u003ch3 id=\"heavenly-bodies-in-their-courses\"\u003eHeavenly Bodies in Their Courses\u003c/h3\u003e\n\u003cp\u003eScripture describes the sun, moon, and stars as moving in set courses within the firmament, not as distant objects billions of miles away. Psalm 19:4-6 describes the sun as emerging from a chamber and running a circuit: \u003cem\u003e\"Its rising is from one end of heaven, and its circuit to the other end; and there is nothing hidden from its heat.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe Confliction track \u003cem\u003eThe Sun and the Moon\u003c/em\u003e (Track 23) reflects this understanding — luminaries placed within a structure, following ordained paths, not random celestial bodies in an infinite expanding universe.\u003c/p\u003e\n\u003ch2 id=\"the-nasa-question\"\u003eThe NASA Question\u003c/h2\u003e\n\u003ch3 id=\"helium-balloons-and-high-altitude-photography\"\u003eHelium Balloons and High-Altitude Photography\u003c/h3\u003e\n\u003cp\u003eOne of the most provocative areas of investigation involves NASA's own imaging practices. As explored in ZZZ Daily Track 101, \u003cem\u003eNASA Helium Balloons\u003c/em\u003e, there are documented instances of NASA and other space agencies using high-altitude balloons for observations that are presented to the public as space-based imagery.\u003c/p\u003e\n\u003cp\u003eThe question isn't whether balloons are used — they openly are — but whether the public is always told which images come from satellites and which come from balloon-mounted cameras at much lower altitudes. The distinction matters enormously when discussing what can and cannot be observed about the earth's shape from altitude.\u003c/p\u003e\n\u003ch3 id=\"composite-images\"\u003eComposite Images\u003c/h3\u003e\n\u003cp\u003eNASA has publicly acknowledged that many of its famous \"photos\" of the earth from space are actually composites — digitally assembled from multiple data sources. Robert Simmon, a NASA data visualizer, famously stated in an interview that the iconic \"Blue Marble\" images are \"photoshopped\" — his word, not ours. He explained that satellite data is mapped onto a sphere and color-corrected to produce the final image.\u003c/p\u003e\n\u003cp\u003eThis is not a conspiracy theory. It is a publicly acknowledged practice. The question it raises is straightforward: if we have thousands of satellites in orbit, why is it so difficult to produce a single, unaltered photograph of the entire earth?\u003c/p\u003e\n\u003ch2 id=\"water-always-finds-its-level\"\u003eWater Always Finds Its Level\u003c/h2\u003e\n\u003ch3 id=\"the-most-basic-experiment\"\u003eThe Most Basic Experiment\u003c/h3\u003e\n\u003cp\u003ePerhaps the simplest and most powerful observation is this: water always finds its level. Place water in any container of any shape, and its surface will be perfectly flat and level. This is not a theory — it is an observable, repeatable fact that forms the foundation of engineering, construction, and navigation.\u003c/p\u003e\n\u003cp\u003eIf the earth is a globe with a circumference of approximately 25,000 miles, then bodies of water must conform to its curvature. The surface of the ocean must curve at the same rate as the land beneath it. Yet every engineering project, every canal, every bridge, every railroad is built on the assumption of a flat, level surface over the working distance.\u003c/p\u003e\n\u003cp\u003eThe Suez Canal, for example, stretches over 100 miles without a single lock. It was engineered based on a flat-water assumption. If the earth curved as described, the center of the canal would be several hundred feet higher than its ends. No such adjustment was needed.\u003c/p\u003e\n\u003ch2 id=\"the-stars-dont-change\"\u003eThe Stars Don't Change\u003c/h2\u003e\n\u003ch3 id=\"polaris-and-the-southern-cross\"\u003ePolaris and the Southern Cross\u003c/h3\u003e\n\u003cp\u003eFor centuries, navigators have relied on Polaris — the North Star — remaining fixed in the sky above the north. On a spinning, orbiting, spiraling globe, the position of stars should shift perceptibly over time. Yet Polaris has remained in virtually the same position for as long as humans have recorded its location.\u003c/p\u003e\n\u003cp\u003eTrack 481, \u003cem\u003eFake Stars Real Chains\u003c/em\u003e, from the ZZZ Daily album, probes the question of what we actually know about the lights in the sky versus what we've been told to believe about them.\u003c/p\u003e\n\u003cp\u003eSimilarly, star trails photographed with long exposures show perfect circles around the celestial pole — consistent with lights rotating above a fixed plane, but requiring additional explanatory layers on a spinning globe model.\u003c/p\u003e\n\u003ch3 id=\"the-unchanging-constellations\"\u003eThe Unchanging Constellations\u003c/h3\u003e\n\u003cp\u003eThe constellations have maintained their configurations for thousands of years of recorded human history. If the sun were moving through the galaxy at 514,000 mph, and the galaxy were moving at millions of mph through expanding space, the relative positions of stars should have changed dramatically over recorded history. They haven't.\u003c/p\u003e\n\u003ch2 id=\"what-are-they-hiding\"\u003eWhat Are They Hiding?\u003c/h2\u003e\n\u003ch3 id=\"the-antarctic-treaty\"\u003eThe Antarctic Treaty\u003c/h3\u003e\n\u003cp\u003eAntarctica is the one place on earth that ordinary citizens are not free to explore independently. The Antarctic Treaty of 1959, signed by all major world powers during the height of the Cold War, restricts independent travel to the continent. Military enforcement ensures compliance.\u003c/p\u003e\n\u003cp\u003eOn a flat-earth model, Antarctica is not a continent at the \"bottom\" of a globe but an ice wall or ice ring surrounding the known landmasses. Independent exploration of this boundary could potentially confirm or deny the globe model — which may explain why such exploration is so tightly controlled.\u003c/p\u003e\n\u003ch3 id=\"operation-fishbowl\"\u003eOperation Fishbowl\u003c/h3\u003e\n\u003cp\u003eIn 1962, the United States conducted Operation Fishbowl — a series of high-altitude nuclear tests. The name itself is provocative. These tests detonated nuclear weapons at various heights in the upper atmosphere. What were they testing? The official explanation involves studying the effects of nuclear explosions at altitude, but the naming and the secrecy surrounding the full results have led researchers to ask whether these tests were probing the physical limits of the sky — the firmament itself.\u003c/p\u003e\n\u003cp\u003eTrack 485, \u003cem\u003eFirmament Firewall\u003c/em\u003e, from the ZZZ Daily album, explores this concept: the idea that the dome above is not merely a theological concept but a physical barrier that modern governments have encountered and concealed.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"why-cosmology-matters\"\u003eWhy Cosmology Matters\u003c/h3\u003e\n\u003cp\u003eIf the earth is enclosed under a firmament — a dome of impenetrable material — then everything changes. It means we are not random accidents on a pale blue dot lost in infinite space. It means we are contained, observed, created with purpose. It means there is a Creator who built this structure, placed the lights in the sky, and set boundaries that cannot be crossed.\u003c/p\u003e\n\u003cp\u003eThis is exactly what the establishment fears. A globe earth floating in infinite space produces existential insignificance. A flat, enclosed earth under a dome produces existential purpose. The cosmological model you accept shapes your entire worldview — your understanding of God, humanity, and meaning.\u003c/p\u003e\n\u003cp\u003eThe Confliction track \u003cem\u003eFrom Dust to Glory\u003c/em\u003e (Track 15) captures this trajectory: humanity formed with intention, placed in a created environment, given dignity and purpose by a God who is not distant but near — above the dome, watching, sovereign.\u003c/p\u003e\n\u003ch3 id=\"the-great-delusion\"\u003eThe Great Delusion\u003c/h3\u003e\n\u003cp\u003eSecond Thessalonians 2:9-12 warns of a coming \"great delusion\" that will deceive many. If humanity has been conditioned to believe in infinite space, alien life, and cosmic insignificance, what happens when a false sign appears in the sky? Track 477, \u003cem\u003eDome of Silicon\u003c/em\u003e, explores the technological capacity to project false images and create manufactured wonder.\u003c/p\u003e\n\u003cp\u003eThe dome theology connects directly to the warning about deception: what people call \"aliens\" or \"UFOs\" are, in the biblical framework, fallen angels — entities imprisoned under the firmament who will play a role in end-times deception. The entire space narrative may be preparation for this moment.\u003c/p\u003e\n\u003ch2 id=\"conducting-your-own-experiments\"\u003eConducting Your Own Experiments\u003c/h2\u003e\n\u003cp\u003eThe most powerful thing about the earth-shape question is that you don't need a PhD or a government grant to investigate it. You need a good camera, a clear day, a body of water, and the willingness to see what's actually there rather than what you've been told should be there.\u003c/p\u003e\n\u003cp\u003eHere are simple experiments anyone can conduct:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eThe Water Level Test\u003c/strong\u003e: Fill a long, transparent tube with water and observe the surface. It will be perfectly level at both ends. Scale this up to any body of water and the principle holds.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eThe Distant Object Test\u003c/strong\u003e: On a clear day, use a high-powered zoom camera to photograph a distant object across a body of water — an object that should be hidden below the curvature. Document your height, the distance, and the expected curvature drop using the 8 inches per mile squared formula.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eThe Star Trail Test\u003c/strong\u003e: Set up a camera for long-exposure night photography aimed at Polaris. Observe the perfect circular trails. Consider what model best explains this observation.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eThe Horizon Rise Test\u003c/strong\u003e: Observe the horizon from increasing altitudes. On a globe, the horizon should drop. On a flat plane, it rises to eye level regardless of altitude.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eAs explored on Agent131711's Substack (agent131711.substack.com), these experiments have been conducted by hundreds of independent researchers, and the results consistently challenge the globe model.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/95-Flat_Earth_Experiments.mp4\"\u003eFlat Earth Experiments\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/77-The_Dome_Above.mp4\"\u003eThe Dome Above\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/475-Dome_Dwellers_Awakening.mp4\"\u003eDome Dwellers Awakening\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/481-Fake_Stars_Real_Chains.mp4\"\u003eFake Stars Real Chains\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/05-The_First_Darkness.mp4\"\u003eThe First Darkness\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/23-The_Sun_and_the_Moon.mp4\"\u003eThe Sun and the Moon\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/untold-story-christmas-part1/?lang=en\"\u003eThe Untold Story of CHRISTMAS: Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/wizard-oz-power-of-fear/?lang=en\"\u003eThe Wizard of Oz and the Power of Fear\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/questioning-religion-part1/?lang=en\"\u003eQuestioning My Religion: A Personal Journey — Part 1\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe truth is not afraid of investigation. If the globe model is correct, it should withstand every test, every question, every experiment thrown at it. The fact that questioning it is met with ridicule rather than evidence should tell you everything you need to know. Look up. Look out. And ask the question they don't want you to ask: what if everything you were taught about where you live is wrong?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Curved or Flat? Fascinating Earth Shape Experiments They Don't Teach in School\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Discover suppressed earth shape experiments that challenge mainstream science. Independent tests reveal shocking results about curvature claims.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-11-21\",\"children\":\"November 20, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"flat-earth\",{\"href\":\"/en/tag meta\",\"16\",{\"property\":\"og:image:width\",\"content\":\"1200\"}],[\"$\",\"meta\",\"17\",{\"property\":\"og:image:height\",\"content\":\"630\"}],[\"$\",\"meta\",\"18\",{\"property\":\"og:image:alt\",\"content\":\"Curved or Flat? Fascinating Earth Shape Experiments They Don't Teach in School\"}],[\"$\",\"meta\",\"19\",{\"property\":\"og:image:type\",\"content\":\"image/png\"}],[\"$\",\"meta\",\"20\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"21\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"22\",{\"name\":\"twitter:site\",\"content\":\"@zzzdaily\"}],[\"$\",\"meta\",\"23\",{\"name\":\"twitter:creator\",\"content\":\"@zzzdaily\"}],[\"$\",\"meta\",\"24\",{\"name\":\"twitter:title\",\"content\":\"Curved or Flat? Fascinating Earth Shape Experiments They Don't Teach in School\"}],[\"$\",\"meta\",\"25\",{\"name\":\"twitter:description\",\"content\":\"Discover suppressed earth shape experiments that challenge mainstream science. Independent tests reveal shocking results about curvature claims.\"}],[\"$\",\"meta\",\"26\",{\"name\":\"twitter:image\",\"content\":\"https://blog.zzzdaily.com/images/articles/earth-shape-experiments.png\"}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"13:\"$f:metadata\"\n"])</script></body></html>
