ent. When institutions, individuals, and events are connected through financial, organizational, or operational links, those connections tell a story that the official narrative may not include. Part 3 of the Pulse investigation traces the unexpected connections — the links between the attacker, the security industry, the intelligence community, and the institutional network that managed the event and its aftermath.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed a connected hierarchy of deception. Three heavens. Demonic entities organized in ranks, assigned territories and functions, coordinated in purpose. 97.5 percent rejection. 95 percent self-service. Every word judged (Matthew 12:36-37). The connections in the Pulse event mirror this hierarchy: entities that appear independent but serve a unified purpose, actors that seem unrelated but share institutional DNA.\u003c/p\u003e\n\u003cp\u003eThe Jesuits are the masters of institutional connection. Loyola's military organization. Napoleon's \"absolute power.\" Tamburini governing \"all the world\" from a single room through a network of agents placed in every institution. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The connections in the Pulse event follow this pattern: individuals placed in institutions, institutions connected through contracts, contracts funded by government agencies, government agencies serving agendas that transcend any single event.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-g4s-connection\"\u003eThe G4S Connection\u003c/h2\u003e\n\u003ch3 id=\"the-worlds-largest-security-company\"\u003eThe World's Largest Security Company\u003c/h3\u003e\n\u003cp\u003eOmar Mateen was employed by G4S — formerly Group 4 Securicor — one of the world's largest private security companies. At the time of the Pulse event, G4S employed over 600,000 people worldwide and held contracts with government agencies, military installations, nuclear facilities, and critical infrastructure across dozens of countries.\u003c/p\u003e\n\u003cp\u003eG4S is not merely a security company. It is a component of the national security apparatus — a private entity that performs functions traditionally reserved for government agencies. Its contracts include prisoner transport, immigration detention, military base security, and the protection of classified facilities. The company operates in the space between private enterprise and state function, accountable to neither with the full transparency expected of either.\u003c/p\u003e\n\u003cp\u003eMateen's employment at G4S gave him a security clearance, access to firearms training, and familiarity with security protocols — all of which, according to the official narrative, he used in the Pulse attack. The fact that a man investigated twice by the FBI for terrorist connections was employed by a company with government security contracts raises questions about the institutional systems that vetted, employed, and cleared him.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) the broader pattern of security company employees involved in high-profile events. This pattern does not prove coordination, but it demonstrates that the security industry — which operates at the intersection of private enterprise and state intelligence — produces individuals with the training, access, and operational knowledge necessary for the events attributed to them.\u003c/p\u003e\n\u003ch3 id=\"the-intelligence-community-interface\"\u003eThe Intelligence Community Interface\u003c/h3\u003e\n\u003cp\u003eThe private security industry is not separate from the intelligence community. It is its commercial extension. Former CIA, FBI, NSA, and military intelligence officers populate the leadership of companies like G4S, Booz Allen Hamilton, SAIC, and Palantir. The revolving door between government intelligence and private security is one of the most consequential institutional connections in modern America.\u003c/p\u003e\n\u003cp\u003eThis revolving door means that companies like G4S are not merely following government contracts — they are integrated into the intelligence ecosystem. Their employees are vetted by government agencies. Their operations support government missions. Their institutional culture is shaped by intelligence community norms: secrecy, compartmentalization, and operational security.\u003c/p\u003e\n\u003cp\u003eMateen's position within this ecosystem — employed by a government-connected security company, investigated by the FBI, holding a security clearance — places him at the intersection of private security and state intelligence. This intersection is where the unexpected connections are found.\u003c/p\u003e\n\u003ch2 id=\"the-informant-question\"\u003eThe Informant Question\u003c/h2\u003e\n\u003ch3 id=\"the-fbis-informant-network\"\u003eThe FBI's Informant Network\u003c/h3\u003e\n\u003cp\u003eThe FBI operates the largest domestic intelligence network in America, employing an estimated 15,000 confidential informants at any given time. These informants are embedded in communities, organizations, and networks that the FBI considers potential threats. They report on activities, facilitate investigations, and sometimes participate in the very activities they are monitoring.\u003c/p\u003e\n\u003cp\u003eThe Bureau's use of informants has been extensively documented — and extensively criticized. Multiple investigations have revealed that FBI informants provided the weapons, the plans, and the encouragement for plots that the Bureau then claimed to have \"disrupted.\" The question of whether the FBI's informant network creates more threats than it prevents is one that congressional oversight has raised repeatedly.\u003c/p\u003e\n\u003cp\u003eWhether Mateen was an FBI informant, was in contact with informants, or was the subject of informant reporting is a question that the investigation has not definitively answered. The FBI's policy of protecting informant identities makes this investigation extremely difficult. But the pattern — the two prior investigations, the continued security clearance, the employment at a government-connected company — is consistent with the pattern observed in other cases where informant networks intersected with high-profile events.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's vision of the demonic hierarchy operating through assigned territories and functions describes an organizational model that mirrors the intelligence community's use of compartmentalized, territory-assigned informants. The earthly system mirrors the spiritual system — not by coincidence but by design. The principalities of Ephesians 6:12 operate through institutional structures, and the intelligence community is one of the most powerful institutional structures in the modern world.\u003c/p\u003e\n\u003ch2 id=\"the-political-connections\"\u003eThe Political Connections\u003c/h2\u003e\n\u003ch3 id=\"the-orlando-institutional-network\"\u003eThe Orlando Institutional Network\u003c/h3\u003e\n\u003cp\u003eOrlando is not a random city. It is a hub of defense contracting, simulation technology, theme park engineering, and intelligence community activity. Lockheed Martin, Northrop Grumman, L3 Technologies, and dozens of smaller defense contractors maintain significant operations in the Orlando area. The University of Central Florida hosts research programs with defense and intelligence applications.\u003c/p\u003e\n\u003cp\u003eThe Pulse event occurred in this institutional environment — a city where the lines between private industry, government agencies, and intelligence operations are blurred. The connections between the attacker, the security industry, the intelligence community, and the defense-contracting ecosystem are not isolated. They are contextual — embedded in an institutional environment where these connections are normal.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack research traces these institutional connections, showing how the Orlando ecosystem creates the conditions for events that serve institutional agendas. The defense industry benefits from events that justify increased security spending. The intelligence community benefits from events that justify expanded surveillance authority. The political system benefits from events that justify pre-prepared legislation.\u003c/p\u003e\n\u003cp\u003eThis does not prove that the Pulse event was orchestrated. It demonstrates that the institutional environment in which it occurred was one where powerful institutions benefited from the event's outcomes. When institutions benefit from events, the possibility that those institutions influenced those events must be investigated rather than assumed away.\u003c/p\u003e\n\u003ch2 id=\"the-international-dimension\"\u003eThe International Dimension\u003c/h2\u003e\n\u003ch3 id=\"the-foreign-connection-narrative\"\u003eThe Foreign Connection Narrative\u003c/h3\u003e\n\u003cp\u003eThe official narrative included elements connecting the attacker to international terrorism — specifically, claimed allegiance to ISIS made during 911 calls from inside the building. This connection justified federal jurisdiction, national security framing, and counter-terrorism policy responses.\u003c/p\u003e\n\u003cp\u003eHowever, the attacker's actual connections to international terrorist organizations were tenuous at best. The FBI's two prior investigations found insufficient evidence of operational connections. The claimed allegiance during the event may have been performative rather than operational — a distinction that the media did not make and the FBI did not emphasize.\u003c/p\u003e\n\u003cp\u003eThe foreign connection narrative served specific institutional purposes: it justified FBI leadership of the investigation (rather than local police), it justified national security classifications (which restrict public access to evidence), and it justified counter-terrorism policy responses (which expand federal surveillance authority). Each of these outcomes served institutional interests that have nothing to do with the actual events in Orlando.\u003c/p\u003e\n\u003cp\u003eThe Jesuits operated internationally — their missions spanned continents, their agents reported to Rome, their operations crossed borders that secular authorities could not. The modern intelligence community operates the same way: internationally, across borders, through networks invisible to the public. The foreign connection narrative, whether accurate or constructed, served to invoke this international apparatus — bringing the full weight of the national security state to bear on an event that might otherwise have been treated as a local crime.\u003c/p\u003e\n\u003ch2 id=\"what-the-connections-reveal\"\u003eWhat the Connections Reveal\u003c/h2\u003e\n\u003ch3 id=\"the-pattern\"\u003eThe Pattern\u003c/h3\u003e\n\u003cp\u003eThe connections documented in this part — G4S, the intelligence community, the informant network, the Orlando defense ecosystem, the foreign connection narrative — do not prove a conspiracy. They reveal a pattern: an institutional environment in which powerful entities benefit from events that the public experiences as tragedies.\u003c/p\u003e\n\u003cp\u003eThis pattern is not unique to Pulse. It appears in event after event, decade after decade: institutional connections to the actors, institutional benefit from the outcomes, institutional suppression of investigation. The pattern is the evidence — not evidence of a specific crime, but evidence of a systemic condition in which the institutions tasked with protecting the public are structurally incentivized to allow (or facilitate) the events from which they benefit.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's 97.5 percent were people who trusted these institutions. They accepted the official narratives. They did not trace the connections. They did not ask who benefited. They trusted — and they were rejected, because trust without examination is not faith. It is negligence.\u003c/p\u003e\n\u003cp\u003eThe investigation continues in Part 4, where we identify the two biggest mistakes in the Pulse investigation — the errors that, once exposed, unravel the official narrative.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Institutional connections in the Pulse event traced\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Hierarchical deception in the spiritual and material realms\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit model of institutional infiltration and connection\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sources-and-references\"\u003eSources and References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eSecret Societies and the Catholic Church — The Hidden Hand Exposed\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/73-Suppressing_Truth.mp4\"\u003eSuppressing Truth\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/115-Psychology_Industry_Hoax.mp4\"\u003ePsychology Industry Hoax\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/181-Ending_Anonymity.mp4\"\u003eEnding Anonymity\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pulse-never-seen-part2/?lang=en\"\u003ePULSE: What You've NEVER SEEN Before Part 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pulse-biggest-mistakes-part4/?lang=en\"\u003eTHE 2 BIGGEST MISTAKES in the Pulse Investigation Part 4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pulse-follow-money-part5/?lang=en\"\u003eFOLLOW THE MONEY: The Pulse Investigation Finale Part 5\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eConnections are not accusations. They are questions made visible. When the attacker worked for a government-connected security company, was investigated by the FBI, held a security clearance, and operated in a city saturated with intelligence and defense infrastructure — these connections demand investigation. Not assumption. Not dismissal. Investigation. The truth is found in the connections the system does not want you to trace.\u003c/em\u003e\u003
