03c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Apostle Paul warned of false apostles — men who wore the garments of Christ while serving the adversary. The Knights Templar, the Poor Fellow-Soldiers of Christ and of the Temple of Solomon, are history's most famous example of this principle. Founded in the aftermath of the First Crusade as protectors of Christian pilgrims, the Templars became within decades the wealthiest, most powerful, and most secretive organization in the medieval world — an organization whose true purpose had nothing to do with protecting pilgrims and everything to do with the accumulation of forbidden knowledge, occult power, and global financial control.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order, which would be founded two centuries after the Templar suppression, was the Templars' spiritual successor. Ignatius Loyola studied the Templar model and perfected it: where the Templars were overt, the Jesuits were covert; where the Templars were destroyed by a king, the Jesuits made themselves indispensable to kings. John Adams wrote: \u003cem\u003e\"If ever there were a body of men who merited eternal damnation on earth and in hell, it is this society of Loyolas.\"\u003c/em\u003e The same could be said of the Templars — but the Templars' damnation was temporal. The Jesuits learned to make theirs eternal.\u003c/p\u003e\n\u003cp\u003eAs \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e recounts, the conspiracy began with the fall of angels who brought forbidden knowledge to Earth. The Templars recovered that knowledge and used it to build an empire. \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e reveals that the greatest deception is the one that dresses evil in the clothing of holiness — exactly what the Templars achieved under their white mantles emblazoned with the red cross.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-founding-myth\"\u003eThe Founding Myth\u003c/h2\u003e\n\u003ch3 id=\"nine-knights-and-a-purpose\"\u003eNine Knights and a Purpose\u003c/h3\u003e\n\u003cp\u003eThe official history tells us that in 1119 AD, a French knight named Hugues de Payens and eight companions presented themselves to King Baldwin II of Jerusalem and offered to protect Christian pilgrims on the roads between the port of Jaffa and the holy city. Baldwin granted them quarters in the Al-Aqsa Mosque on the Temple Mount — directly above the ruins of Solomon's Temple.\u003c/p\u003e\n\u003cp\u003eThis story, repeated in every history textbook, does not survive scrutiny:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNine knights could not protect a road.\u003c/strong\u003e The route from Jaffa to Jerusalem was approximately 40 miles through hostile territory. Nine men could not have patrolled this road effectively. The Kingdom of Jerusalem had a standing army for this purpose; nine additional men were meaningless from a military standpoint.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Templars did not recruit for nine years.\u003c/strong\u003e If their mission was road protection, they would have needed to expand immediately. Instead, they spent nine years as a closed group of nine men, quartered on the Temple Mount, doing — what? The only logical explanation is that their true mission was not protection but excavation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBernard of Clairvaux's patronage.\u003c/strong\u003e The Templars' chief patron was Bernard of Clairvaux, the most powerful churchman in Europe and the founder of the Cistercian order. Bernard's support transformed the Templars from obscurity to prominence virtually overnight. His 1129 tract \u003cem\u003eIn Praise of the New Knighthood\u003c/em\u003e provided the theological justification for the order and secured papal endorsement. Bernard's connection to the Templars suggests high-level ecclesiastical backing for whatever the knights were doing on the Temple Mount.\u003c/p\u003e\n\u003ch3 id=\"the-council-of-troyes\"\u003eThe Council of Troyes\u003c/h3\u003e\n\u003cp\u003eIn 1129, the Templars received official recognition at the Council of Troyes, presided over by a papal legate and attended by Bernard of Clairvaux. The council gave the Templars a formal Rule (based on the Cistercian Rule) and authorized them to receive donations and recruit members.\u003c/p\u003e\n\u003cp\u003eThe timing is significant: 1129 was ten years after the Templars' founding — precisely the period they spent on the Temple Mount without recruiting or conducting military operations. Whatever they found during those ten years was sufficiently valuable to earn them the endorsement of the most powerful churchman in Europe and the official recognition of the papacy.\u003c/p\u003e\n\u003ch2 id=\"the-rise-to-power\"\u003eThe Rise to Power\u003c/h2\u003e\n\u003ch3 id=\"papal-privileges\"\u003ePapal Privileges\u003c/h3\u003e\n\u003cp\u003eIn 1139, Pope Innocent II issued the papal bull \u003cem\u003eOmne Datum Optimum\u003c/em\u003e, which granted the Templars extraordinary privileges:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eExemption from all authority except the Pope's\u003c/strong\u003e — The Templars answered to no king, no bishop, no local authority. They were a law unto themselves.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTax exemption\u003c/strong\u003e — The Templars paid no taxes to any secular or ecclesiastical authority.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFreedom to collect tithes\u003c/strong\u003e — The Templars could collect their own tithes and donations without interference.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFreedom to build their own churches\u003c/strong\u003e — The Templars could worship in their own facilities, independent of the local diocese.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese privileges made the Templars the most independent organization in medieval Christendom. They were, in effect, a sovereign entity operating within (but not subject to) the kingdoms of Europe. No organization before or since has enjoyed such comprehensive legal immunity — not until the Jesuit order received similar privileges from Pope Paul III in 1540.\u003c/p\u003e\n\u003ch3 id=\"the-financial-empire\"\u003eThe Financial Empire\u003c/h3\u003e\n\u003cp\u003eWith their legal privileges secured, the Templars built the most sophisticated financial network the world had ever seen. By the mid-13th century, the Templars:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eHeld over 870 castles, commanderies, and estates across Europe and the Holy Land\u003c/li\u003e\n\u003cli\u003eManaged the financial affairs of the French Crown and several other monarchies\u003c/li\u003e\n\u003cli\u003eOperated an international money transfer system that spanned the known world\u003c/li\u003e\n\u003cli\u003eEmployed thousands of soldiers, administrators, and workers\u003c/li\u003e\n\u003cli\u003eMaintained the largest private fleet in the Mediterranean\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Templar financial system was the prototype for modern international banking. Their letters of credit, their lending operations, and their trust management services created the infrastructure that later banking dynasties — the Medicis, the Fuggers, the Rothschilds — would build upon. The modern banking system is, in a very real sense, a Templar invention.\u003c/p\u003e\n\u003ch2 id=\"the-esoteric-dimension\"\u003eThe Esoteric Dimension\u003c/h2\u003e\n\u003ch3 id=\"solomons-knowledge\"\u003eSolomon's Knowledge\u003c/h3\u003e\n\u003cp\u003eThe Templars' name — the Poor Fellow-Soldiers of Christ and of the Temple of Solomon — points to their esoteric purpose. Solomon, in Jewish, Christian, and Islamic tradition, was not merely a wise king; he was a magician who commanded demons, possessed supernatural knowledge, and built the Temple using techniques that transcended ordinary human capability.\u003c/p\u003e\n\u003cp\u003eThe Templar excavations beneath the Temple Mount were a search for Solomon's knowledge — the technology and esoteric wisdom that Solomon had used to build the Temple, to command spirits, and to accumulate the greatest wealth in the ancient world. The books attributed to Solomon — the \u003cem\u003eKey of Solomon\u003c/em\u003e, the \u003cem\u003eLesser Key of Solomon\u003c/em\u003e, the \u003cem\u003eTestament of Solomon\u003c/em\u003e — describe a system of ceremonial magic that was well known in medieval esoteric circles. The Templars sought the original sources of this knowledge.\u003c/p\u003e\n\u003ch3 id=\"sacred-geometry-in-templar-architecture\"\u003eSacred Geometry in Templar Architecture\u003c/h3\u003e\n\u003cp\u003eThe Templars' architectural legacy reveals the esoteric knowledge they possessed. Templar churches and commanderies incorporate sacred geometric principles that are consistent with both Islamic geometric tradition and the ancient mysteries:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOctagonal plans\u003c/strong\u003e — The octagon, which represents the transition between the square (Earth) and the circle (Heaven), is a central motif in Templar architecture.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGolden ratio proportions\u003c/strong\u003e — Templar buildings incorporate the golden ratio (1:1.618) in their proportions, a mathematical relationship that was known in the ancient world but largely forgotten in medieval Europe.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAcoustic properties\u003c/strong\u003e — Templar churches are designed to amplify and shape sound in specific ways, suggesting knowledge of acoustics that exceeded the medieval European norm.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese architectural features suggest that the Templars possessed technical knowledge from a tradition older and more sophisticated than anything available in 12th-century Europe — knowledge that was almost certainly acquired during their excavations in the Holy Land.\u003c/p\u003e\n\u003ch2 id=\"the-friday-the-13th-arrest\"\u003eThe Friday the 13th Arrest\u003c/h2\u003e\n\u003ch3 id=\"the-fall-of-the-templars\"\u003eThe Fall of the Templars\u003c/h3\u003e\n\u003cp\u003eOn Friday, October 13, 1307, the Templars were arrested across France in a coordinated operation that gave us the superstition about Friday the 13th. King Philip IV ordered the arrests, charging the Templars with heresy, blasphemy, and sodomy.\u003c/p\u003e\n\u003cp\u003eThe charges, while extracted under torture, are remarkably consistent across hundreds of confessions taken in different locations by different inquisitors:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDenial of Christ\u003c/strong\u003e — Initiates were required to spit on the cross, deny Christ, and trample on a crucifix during their induction ceremony.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorship of Baphomet\u003c/strong\u003e — The Templars allegedly worshipped a head called Baphomet — a term whose etymology has never been satisfactorily explained but which has been linked to the Islamic prophet Muhammad (Mahomet), the Atbash cipher for Sophia (wisdom), and various demonic entities.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRitualistic practices\u003c/strong\u003e — The initiatory rituals reportedly included indecent kissing (on the mouth, navel, and base of the spine) and encouragement of homosexual relations.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWhether these charges reflected actual Templar practices or were fabricated by Philip's inquisitors remains debated. But the consistency of the confessions, and the Templars' documented connections to Islamic and esoteric traditions, suggest that at least some of the charges had a basis in reality.\u003c/p\u003e\n\u003cp\u003eThe Templar conspiracy changed the world by creating the template that every subsequent secret society would follow: accumulate forbidden knowledge, build a financial empire, infiltrate political power, and serve a hidden master while presenting a public face of piety and service. The Jesuits perfected this template, and they operate it today through the Catholic Church, the Vatican Bank, and the global network of secret societies that answers to the Black Pope.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the spiritual realm operates through principalities and powers that use human organizations as instruments of their will. The Templars were one such instrument; the Jesuits are another. The conspiracy did not end on Friday the 13th, 1307 — it simply changed its name and continued its mission under the banner of the Society of Jesus. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eFor more documentation, see \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e and \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube cy that changed the world is still changing it — through the same methods, the same structures, and the same Satanic master that the Templars served nine centuries ago.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/history/\",\"className\":\"category-badge\",\"children\":\"history\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"The Knights Templar CONSPIRACY That Changed the World Part 1\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"The Knights Templar conspiracy changed the world through banking, warfare, and esoteric knowledge. Discover the Jesuit connection in Part 1.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-09-12T10:00:00Z\",\"children\":\"September 12, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"knights templar\",{\"href\":\"/en/tag/knights templar/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"knights templar\"]}],[\"$\",\"a\",\"conspiracy\",{\"href\":\"/en/tag/conspiracy/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"conspiracy\"]}],[\"$\",\"a\",\"crusades\",{\"href\":\"/en/tag/crusades/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"crusades\"]}],[\"$\",\"a\",\"banking\",{\"href\":\"/en/tag/banking/\",\"className\":\"tag-pill\"
