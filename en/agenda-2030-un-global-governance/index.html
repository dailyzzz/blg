rth.\" — Genesis 11:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Tower of Babel was humanity's first attempt at global governance — a unified project to centralize all human activity under a single authority, reaching toward heaven itself. God's response was decisive: He scattered humanity and confused their languages, establishing the principle that no single human authority should govern the entire earth. Today, the United Nations' Agenda 2030 — officially titled \"Transforming Our World: The 2030 Agenda for Sustainable Development\" — is the most comprehensive attempt to reverse that divine decree since the Tower itself. Under the benevolent language of sustainability, poverty elimination, and environmental stewardship, Agenda 2030 lays out a framework for controlling every aspect of human life: what you eat, where you live, how you travel, what you learn, how you earn, and what you are permitted to own.\u003c/p\u003e\n\u003cp\u003eAs the ZZZ Daily album track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/495-Tower_Of_Babel_2.mp4\"\u003eTower of Babel 2.0\u003c/a\u003e warns, the ambition to build a unified world system did not end in ancient Mesopotamia. It merely changed its architectural plans.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-is-agenda-2030\"\u003eWhat Is Agenda 2030?\u003c/h2\u003e\n\u003cp\u003eOn September 25, 2015, all 193 member states of the United Nations adopted Resolution 70/1: \"Transforming Our World: The 2030 Agenda for Sustainable Development.\" The document contains 17 Sustainable Development Goals (SDGs), 169 targets, and 231 unique indicators designed to measure progress toward those targets.\u003c/p\u003e\n\u003cp\u003eThe preamble declares:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"This Agenda is a plan of action for people, planet and prosperity. It also seeks to strengthen universal peace in larger freedom... All countries and all stakeholders, acting in collaborative partnership, will implement this plan.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eRead at face value, the goals appear unobjectionable: end poverty, end hunger, ensure healthy lives, provide quality education, achieve gender equality, ensure clean water, provide affordable energy, promote economic growth, build infrastructure, reduce inequality, create sustainable cities, ensure responsible consumption, combat climate change, conserve oceans, protect ecosystems, promote justice, and strengthen partnerships.\u003c/p\u003e\n\u003cp\u003eWho could object to ending poverty and hunger?\u003c/p\u003e\n\u003cp\u003eThe answer becomes clear when you examine not what the goals say, but what the implementation framework requires.\u003c/p\u003e\n\u003ch2 id=\"the-masters-voice-the-warning-from-davos\"\u003eThe Master's Voice: The Warning from Davos\u003c/h2\u003e\n\u003cp\u003eThe prophetic voices warning about global governance have been remarkably specific. The Master's Voice prophecy blog has documented dreams and visions explicitly warning about the Davos agenda and the New World Order framework:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Prepare for the New World Order. This is not a conspiracy theory. This is a conspiracy fact. The governments of the world are aligning under a single banner, and the people will not be asked. They will be told.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe World Economic Forum, headquartered in Davos, Switzerland, serves as the coordinating body between the UN's Agenda 2030 framework and the corporate-governmental partnerships that implement it. Klaus Schwab, the WEF's founder, has stated explicitly:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"The pandemic represents a rare but narrow window of opportunity to reflect, reimagine, and reset our world.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThis is not the language of democratic governance. This is the language of architects who see global crisis as a construction opportunity.\u003c/p\u003e\n\u003ch2 id=\"decoding-the-17-goals\"\u003eDecoding the 17 Goals\u003c/h2\u003e\n\u003cp\u003eEach Sustainable Development Goal, when examined through its implementation mechanisms rather than its aspirational language, reveals a specific control architecture:\u003c/p\u003e\n\u003ch3 id=\"sdg-1-no-poverty\"\u003eSDG 1: No Poverty\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it says:\u003c/strong\u003e End poverty in all its forms everywhere.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it requires:\u003c/strong\u003e Universal social protection systems, equal rights to economic resources, land ownership, natural resources, and financial services. Building the resilience of the poor through \"appropriate new technology.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat this means in practice:\u003c/strong\u003e Universal basic income tied to digital identity and behavioral compliance. \"Equal rights to land ownership\" applied through international frameworks overrides national property law. \"Appropriate new technology\" means \u003ca href=\"/cbdc-chains-programmable-money/?lang=en\"\u003eCBDC (Central Bank Digital Currency)\u003c/a\u003e and digital ID systems that control access to resources.\u003c/p\u003e\n\u003ch3 id=\"sdg-2-zero-hunger\"\u003eSDG 2: Zero Hunger\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it says:\u003c/strong\u003e End hunger, achieve food security, improve nutrition, promote sustainable agriculture.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it requires:\u003c/strong\u003e \"Correct and prevent trade restrictions and distortions in world agricultural markets.\" Maintain \"genetic diversity of seeds\" through gene banks. Ensure \"sustainable food production systems.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat this means in practice:\u003c/strong\u003e Centralized control of the global food supply. International regulation of agriculture that overrides national food sovereignty. Corporate control of seed genetics through patent law. The replacement of traditional farming with \"sustainable\" practices defined by international bodies — including the promotion of insect protein and lab-grown meat as replacements for traditional animal agriculture.\u003c/p\u003e\n\u003cp\u003eThe Netherlands provides a preview: the Dutch government's 2022 plan to cut nitrogen emissions by 50% by 2030 required the closure of up to 30% of the nation's farms. Dutch farmers — among the most productive in the world — protested en masse. The policy was driven directly by UN sustainability targets.\u003c/p\u003e\n\u003ch3 id=\"sdg-3-good-health-and-well-being\"\u003eSDG 3: Good Health and Well-Being\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it says:\u003c/strong\u003e Ensure healthy lives and promote well-being for all at all ages.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it requires:\u003c/strong\u003e \"Achieve universal health coverage.\" \"Strengthen the capacity of all countries for early warning, risk reduction and management of national and global health risks.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat this means in practice:\u003c/strong\u003e The \u003ca href=\"/who-pandemic-treaty-sovereignty/?lang=en\"\u003eWHO Pandemic Treaty\u003c/a\u003e and International Health Regulations amendments that give an unelected international body authority over national health policy, including the power to mandate vaccines, impose lockdowns, and censor health information deemed \"misinformation.\"\u003c/p\u003e\n\u003ch3 id=\"sdg-4-quality-education\"\u003eSDG 4: Quality Education\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it says:\u003c/strong\u003e Ensure inclusive and equitable quality education.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it requires:\u003c/strong\u003e \"All learners acquire the knowledge and skills needed to promote sustainable development.\" Education for \"global citizenship.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat this means in practice:\u003c/strong\u003e Internationally standardized curricula that replace national educational traditions with globalist ideology. The concept of \"global citizenship\" explicitly supersedes national identity and loyalty. Children are educated not as citizens of sovereign nations but as subjects of a global system.\u003c/p\u003e\n\u003ch3 id=\"sdg-7-affordable-and-clean-energy\"\u003eSDG 7: Affordable and Clean Energy\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it says:\u003c/strong\u003e Ensure access to affordable, reliable, sustainable and modern energy for all.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it requires:\u003c/strong\u003e \"Substantially increase the share of renewable energy.\" \"Enhance international cooperation to facilitate access to clean energy research and technology.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat this means in practice:\u003c/strong\u003e The elimination of fossil fuels and nuclear energy in favor of renewable sources that are intermittent, land-intensive, and require massive government subsidy. Energy dependence — rather than energy independence — becomes the norm, with international bodies determining energy policy. As explored in our article on \u003ca href=\"/carbon-credit-coup-trading-air/?lang=en\"\u003eThe Carbon Credit Coup\u003c/a\u003e, the carbon credit trading system creates a new financial instrument controlled by the same institutions that control global finance.\u003c/p\u003e\n\u003ch3 id=\"sdg-11-sustainable-cities-and-communities\"\u003eSDG 11: Sustainable Cities and Communities\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it says:\u003c/strong\u003e Make cities and human settlements inclusive, safe, resilient and sustainable.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it requires:\u003c/strong\u003e \"Sustainable transport systems.\" \"Sustainable urbanization.\" \"Reduce the adverse per capita environmental impact of cities.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat this means in practice:\u003c/strong\u003e \u003ca href=\"/fifteen-minute-city-geofencing/?lang=en\"\u003e15-Minute Cities\u003c/a\u003e — urban redesign that confines residents to small geographic zones, restricting vehicle use, monitoring movement through digital surveillance, and penalizing travel beyond designated boundaries. The C40 Cities Climate Leadership Group — a network of 97 cities representing over 700 million people — has published targets including the elimination of private car ownership, the restriction of meat consumption to 0 kg per person per year by 2030, and the limitation of clothing purchases to 3 new items per person per year.\u003c/p\u003e\n\u003ch3 id=\"sdg-13-climate-action\"\u003eSDG 13: Climate Action\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it says:\u003c/strong\u003e Take urgent action to combat climate change and its impacts.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it requires:\u003c/strong\u003e \"Integrate climate change measures into national policies.\" \"Strengthen resilience and adaptive capacity.\" Fund climate action with \"$100 billion annually\" from developed nations.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat this means in practice:\u003c/strong\u003e The transfer of national sovereignty over environmental policy to international bodies. Carbon taxation that functions as a universal consumption tax controlled by global institutions. Climate emergency declarations that justify the suspension of normal democratic processes — just as pandemic emergency declarations justified the suspension of civil liberties in 2020.\u003c/p\u003e\n\u003ch3 id=\"sdg-16-peace-justice-and-strong-institutions\"\u003eSDG 16: Peace, Justice and Strong Institutions\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it says:\u003c/strong\u003e Promote peaceful and inclusive societies, provide access to justice for all, build effective, accountable and inclusive institutions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat it requires:\u003c/strong\u003e \"Provide legal identity for all, including birth registration.\" \"Ensure public access to information.\" \"Strengthen relevant national institutions.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat this means in practice:\u003c/strong\u003e \u003ca href=\"/digital-id-global-identity-prison/?lang=en\"\u003eUniversal digital identity\u003c/a\u003e — the technical infrastructure for a global surveillance and control system. \"Legal identity for all\" means biometric registration of every human being in a global database. \"Access to information\" means information that passes through approved channels. \"Strong institutions\" means institutions with the power to enforce compliance.\u003c/p\u003e\n\u003ch2 id=\"the-implementation-architecture\"\u003eThe Implementation Architecture\u003c/h2\u003e\n\u003cp\u003eAgenda 2030 does not implement itself. It requires an institutional architecture that has been built systematically over decades:\u003c/p\u003e\n\u003ch3 id=\"the-world-economic-forum-wef\"\u003eThe World Economic Forum (WEF)\u003c/h3\u003e\n\u003cp\u003eThe WEF functions as the liaison between the UN's goals and the corporate entities that implement them. Its \"Strategic Partners\" include virtually every major corporation in the world, from technology companies to pharmaceutical manufacturers to financial institutions. The WEF's \"Young Global Leaders\" program has placed its alumni in leadership positions across governments worldwide, including heads of state and cabinet ministers in multiple countries.\u003c/p\u003e\n\u003cp\u003eAs documented in our article on \u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=en\"\u003eThe Great Reset and the Fourth Industrial Revolution\u003c/a\u003e, Klaus Schwab's \"Great Reset\" initiative explicitly uses the COVID-19 pandemic as the catalyst for implementing Agenda 2030's goals on an accelerated timeline.\u003c/p\u003e\n\u003ch3 id=\"the-bank-for-international-settlements-bis\"\u003eThe Bank for International Settlements (BIS)\u003c/h3\u003e\n\u003cp\u003eThe BIS — the \"central bank of central banks\" — coordinates the financial architecture of global governance. Its Innovation Hub develops the technical standards for CBDCs, which provide the programmable money infrastructure for SDG 1 (no poverty through universal digital payments) and SDG 10 (reduced inequality through controlled wealth redistribution).\u003c/p\u003e\n\u003ch3 id=\"the-world-health-organization-who\"\u003eThe World Health Organization (WHO)\u003c/h3\u003e\n\u003cp\u003eThe WHO provides the health governance framework. Its proposed Pandemic Treaty and IHR amendments would give it authority over national health policy during declared health emergencies — which, under expanded definitions, could include climate change, mental health crises, or \"infodemics.\"\u003c/p\u003e\n\u003ch3 id=\"the-international-monetary-fund-imf-and-world-bank\"\u003eThe International Monetary Fund (IMF) and World Bank\u003c/h3\u003e\n\u003cp\u003eThese institutions provide the financial leverage. Developing nations that adopt Agenda 2030 frameworks receive loans, grants, and debt relief. Those that resist face financial isolation. The result is a system where compliance is purchased, not democratically chosen.\u003c/p\u003e\n\u003ch2 id=\"you-will-own-nothing-and-be-happy\"\u003e\"You Will Own Nothing and Be Happy\"\u003c/h2\u003e\n\u003cp\u003eIn 2016, the World Economic Forum published a video titled \"8 Predictions for the World in 2030.\" The first prediction:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"You'll own nothing. And you'll be happy. Whatever you want you'll rent. And it'll be delivered by drone.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThis prediction is not speculation — it is a policy goal. The implementation pathway includes:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThe transition from ownership to subscription\u003c/strong\u003e across all product categories — housing (subscription living), transportation (ride-sharing and autonomous vehicles), entertainment (streaming), software (cloud subscriptions), and eventually food and clothing\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe elimination of private property rights\u003c/strong\u003e through \"stakeholder capitalism,\" where corporate governance prioritizes \"stakeholders\" (defined by international bodies) over shareholders (actual owners)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe concentration of asset ownership\u003c/strong\u003e in institutional investors (BlackRock, Vanguard, State Street), which collectively own controlling stakes in virtually every major corporation and are systematically acquiring residential real estate\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\u003ca href=\"/smart-city-prison-15-minute-trap/?lang=en\"\u003eSmart City\u003c/a\u003e infrastructure\u003c/strong\u003e that provides services in exchange for compliance, eliminating the need for personal ownership\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe theological implications are profound. Private property is a biblical principle — \"Thou shalt not steal\" presupposes the legitimacy of ownership. A system that eliminates private property does not merely restructure economics — it restructures the moral order.\u003c/p\u003e\n\u003ch2 id=\"the-digital-id-foundation\"\u003eThe Digital ID Foundation\u003c/h2\u003e\n\u003cp\u003eEvery element of Agenda 2030 requires one foundational technology: universal digital identity. Without digital ID, there is no way to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDistribute universal basic income (SDG 1)\u003c/li\u003e\n\u003cli\u003eTrack food consumption and agricultural compliance (SDG 2)\u003c/li\u003e\n\u003cli\u003eEnforce vaccination and health mandates (SDG 3)\u003c/li\u003e\n\u003cli\u003eMonitor educational achievement of \"global citizenship\" standards (SDG 4)\u003c/li\u003e\n\u003cli\u003eControl energy consumption at the individual level (SDG 7)\u003c/li\u003e\n\u003cli\u003eEnforce 15-minute city movement restrictions (SDG 11)\u003c/li\u003e\n\u003cli\u003eCalculate individual carbon footprints (SDG 13)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAs documented in our article on \u003ca href=\"/digital-id-global-identity-prison/?lang=en\"\u003eDigital ID: The Global Identity Prison\u003c/a\u003e, the ID2020 Alliance — founded by Microsoft, the Rockefeller Foundation, Accenture, and Gavi (the Bill Gates-funded vaccine alliance) — explicitly ties digital identity to vaccination records, using immunization as the delivery mechanism for universal biometric registration.\u003c/p\u003e\n\u003cp\u003eSDG 16.9 states: \"By 2030, provide legal identity for all, including birth registration.\" This is the capstone of the system — the technical infrastructure without which none of the other goals can be enforced at the individual level.\u003c/p\u003e\n\u003ch2 id=\"national-sovereignty-vs-global-governance\"\u003eNational Sovereignty vs. Global Governance\u003c/h2\u003e\n\u003cp\u003eThe fundamental tension at the heart of Agenda 2030 is between national sovereignty and international authority. The document itself acknowledges this tension — and resolves it in favor of international authority:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"We reaffirm our unwavering commitment to achieving this Agenda and utilizing it to the full to transform our world for the better by 2030.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe word \"unwavering\" is significant. It does not say \"conditional on democratic approval.\" It does not say \"subject to national constitutional processes.\" It says \u003cem\u003eunwavering\u003c/em\u003e — a commitment that cannot be altered regardless of domestic political outcomes.\u003c/p\u003e\n\u003cp\u003eThis is why elections in Agenda 2030 signatory nations increasingly fail to change policy direction on issues covered by the SDGs. Whether the government is nominally left or right, the sustainability framework continues to be implemented because the commitment was made at the international level, above the reach of domestic democracy.\u003c/p\u003e\n\u003cp\u003eThe Dutch farmer protests, the Canadian trucker convoy, the French Yellow Vest movement, the Sri Lankan agricultural collapse — all are reactions to Agenda 2030 implementation policies, and all were met with state force rather than democratic accommodation.\u003c/p\u003e\n\u003ch2 id=\"the-religious-dimension\"\u003eThe Religious Dimension\u003c/h2\u003e\n\u003cp\u003ePope Francis' 2015 encyclical \u003cem\u003eLaudato Si'\u003c/em\u003e — published just months before the adoption of Agenda 2030 — explicitly endorses the sustainability framework and calls for a \"true world political authority\" to enforce it. The encyclical states:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Enforceable international agreements are urgently needed... a true world political authority... would need to be vested with the power to give this issue effective force.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThis alignment between the Vatican and the UN's governance framework is consistent with the prophetic warnings in Revelation about the convergence of religious and political power in the end times. When the world's largest religious institution endorses the need for a \"true world political authority,\" the distance between prophecy and policy shrinks to nothing.\u003c/p\u003e\n\u003ch2 id=\"what-you-can-do\"\u003eWhat You Can Do\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eRead the documents.\u003c/strong\u003e Agenda 2030 is publicly available. Read it — not summaries, not commentary, the actual document. The language is clear once you know what to look for.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnderstand the implementation.\u003c/strong\u003e The goals are aspirational. The implementation — digital ID, CBDC, 15-minute cities, carbon credits, pandemic treaties — is operational. Focus on implementation, not rhetoric.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSupport national sovereignty.\u003c/strong\u003e International agreements that override national constitutions are illegitimate regardless of their stated goals. Elected representatives who sign binding international commitments without democratic ratification betray their constituents.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eReject the digital infrastructure.\u003c/strong\u003e Every element of Agenda 2030 depends on digital ID and programmable money. Resistance to these technologies is resistance to the entire framework.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBuild local resilience.\u003c/strong\u003e Local food production, local community, local governance — the antidote to global control is local sovereignty. Grow food. Know your neighbors. Build relationships that do not depend on digital systems.\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/49-Smart_City_Prison-Surveillance_Grid_Complete.mp4\"\u003eSmart City Prison\u003c/a\u003e — The surveillance infrastructure disguis
