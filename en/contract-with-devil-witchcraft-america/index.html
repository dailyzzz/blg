 against flesh and blood, but against principalities, against powers, against the rulers of the darkness of this world, against spiritual wickedness in high places.\"\u003c/em\u003e — Ephesians 6:10-12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"There shall not be found among you any one that maketh his son or his daughter to pass through the fire, or that useth divination, or an observer of times, or an enchanter, or a witch, or a charmer, or a consulter with familiar spirits, or a wizard, or a necromancer. For all that do these things are an abomination unto the LORD.\"\u003c/em\u003e — Deuteronomy 18:10-12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eGod listed every category of occult practice and called them all an abomination. Not a mistake. Not a cultural curiosity. Not a harmless spiritual exploration. An abomination. The Hebrew word is \"toevah\" — something utterly detestable, something that provokes divine wrath, something so offensive to God's nature that it must be utterly separated from His people.\u003c/p\u003e\n\u003cp\u003eJohn Ramirez practiced every single one of these abominations. Divination. Enchantment. Witchcraft. Charming. Consulting familiar spirits. Wizardry. Necromancy. He did not practice them casually or experimentally. He practiced them professionally, systematically, and under the direct authority of principality demons. His testimony reveals that these ancient practices, listed by Moses over three thousand years ago, are alive and thriving in modern America — not in the shadows, but in the homes of doctors, lawyers, judges, and school principals.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's five-tier demonic hierarchy provides the organizational chart. The Jesuit infiltration documented in \u003cem\u003eCatholic Confidential\u003c/em\u003e provides the institutional framework. And John Ramirez provides the ground-level operational detail of how the devil's kingdom functions in America today.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Transgression — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"blood-rituals-the-currency-of-the-kingdom-of-darkness\"\u003eBlood Rituals: The Currency of the Kingdom of Darkness\u003c/h2\u003e\n\u003ch3 id=\"killing-animals-and-drinking-blood-every-week\"\u003eKilling Animals and Drinking Blood Every Week\u003c/h3\u003e\n\u003cp\u003eThe most visceral element of Ramirez's testimony is the blood. He killed animals and drank their blood EVERY WEEK. This was not occasional. This was not ceremonial in the way a church observes communion once a month. This was weekly — a regular, required practice in his service to the devil.\u003c/p\u003e\n\u003cp\u003eHe also cut himself and drank his own blood. The mixing of animal blood and human blood in ritual practice is as old as paganism itself. Leviticus 17:11 states: \"For the life of the flesh is in the blood.\" This is not merely a biological observation. It is a spiritual principle. Blood carries life force. Blood is the medium of covenants. God established the blood covenant with Abraham. God required blood sacrifice in the tabernacle. Jesus Christ shed His blood as the final, perfect sacrifice.\u003c/p\u003e\n\u003cp\u003eThe devil, who counterfeits everything God creates, requires blood as well. But where God's blood covenant leads to life, the devil's blood covenant leads to death. Where the blood of Jesus cleanses from sin, the blood demanded by the devil deepens the bondage of sin. Where the communion cup represents freedom, the drinking of blood in witchcraft represents enslavement.\u003c/p\u003e\n\u003cp\u003eEvery week. Animal blood. His own blood. For over two decades. This is the cost of serving the devil. He does not give power for free. He demands blood. And the blood he demands must flow continuously — because unlike the blood of Jesus, which was shed once for all (Hebrews 9:12), the devil's counterfeit covenant requires constant renewal. The bondage is never complete. The contract is never satisfied. The devil always demands more.\u003c/p\u003e\n\u003ch3 id=\"the-spiritual-economy-of-blood\"\u003eThe Spiritual Economy of Blood\u003c/h3\u003e\n\u003cp\u003eUnderstanding the blood rituals requires understanding the spiritual economy in which they operate. In God's economy, Jesus shed His blood once, and it is sufficient for all time, for all people, for all sins. The transaction is complete. \"It is finished\" (John 19:30).\u003c/p\u003e\n\u003cp\u003eIn the devil's economy, the blood must keep flowing. Every week, more animals must die. Every week, more cuts must be made. Every week, more blood must be consumed. This is because the devil has no creative power. He cannot generate spiritual currency. He can only steal it, counterfeit it, and consume it. The blood rituals are the devil's attempt to access the spiritual power that resides in blood — but without the authority that only God possesses to make that blood effective.\u003c/p\u003e\n\u003cp\u003eThis is why the blood of Jesus is so powerful against witchcraft. When Ramirez attempted to kill a Christian woman through twenty-one days of ritual and twenty-one black candles and a coffin box — and it failed — it failed because the blood of Jesus that covered that woman had more authority than the blood of every animal Ramirez had ever killed. The devil's blood economy cannot compete with God's blood covenant. It never could. It never will.\u003c/p\u003e\n\u003ch2 id=\"the-professionals-witchcraft-among-the-elite\"\u003eThe Professionals: Witchcraft Among the Elite\u003c/h2\u003e\n\u003ch3 id=\"doctors-lawyers-judges-police-officers-and-school-principals\"\u003eDoctors, Lawyers, Judges, Police Officers, and School Principals\u003c/h3\u003e\n\u003cp\u003eOne of the most disturbing revelations in Ramirez's testimony is the composition of his demonic circle. These were not marginalized people. These were not homeless drug addicts or mentally ill outcasts. His circle included doctors, lawyers, judges, police officers, school principals, and singers.\u003c/p\u003e\n\u003cp\u003e\"They were ALL into witchcraft.\"\u003c/p\u003e\n\u003cp\u003eThis statement demolishes the cultural assumption that witchcraft is the domain of the ignorant, the superstitious, or the desperate. The people Ramirez served alongside held positions of power and influence. They made medical decisions about patients. They rendered legal judgments in courtrooms. They enforced laws on the streets. They educated children in schools. And they served the devil.\u003c/p\u003e\n\u003cp\u003eThink about the implications. A judge who practices witchcraft sits in judgment over your family court case. A doctor who serves the devil treats your child in the hospital. A school principal who participates in blood rituals oversees your children's education. A police officer who answers to principality demons responds to your emergency call.\u003c/p\u003e\n\u003cp\u003eThis is not paranoia. This is the testimony of a man who was in the room with them. Who practiced alongside them. Who knew their names, their professions, and their demonic assignments. The infiltration of the occult into American professional life is not theoretical. It is testified to by someone who was part of it.\u003c/p\u003e\n\u003ch3 id=\"the-connection-to-jesuit-infiltration\"\u003eThe Connection to Jesuit Infiltration\u003c/h3\u003e\n\u003cp\u003eThe pattern Ramirez describes — occult practitioners embedded in positions of institutional power — mirrors exactly what \u003cem\u003eCatholic Confidential\u003c/em\u003e documents about the Jesuits. The Jesuits infiltrated \"disguised as painters, publishers, writers, schoolmasters.\" They positioned themselves in institutions of power and influence. They operated in secret while presenting a respectable public face.\u003c/p\u003e\n\u003cp\u003eThe witches and warlocks in Ramirez's circle did the same thing. By day, they were professionals — respected, trusted, authoritative. By night, they practiced blood rituals, consulted with demons, and executed assignments against the church and against individuals. The dual-life pattern is identical. The difference is merely the label: Jesuit or witch, the method is infiltration, and the master is the same.\u003c/p\u003e\n\u003ch2 id=\"the-demonic-book-only-three-copies-in-america\"\u003eThe Demonic Book: Only Three Copies in America\u003c/h2\u003e\n\u003ch3 id=\"symbols-of-demons-and-principalities\"\u003eSymbols of Demons and Principalities\u003c/h3\u003e\n\u003cp\u003eRamirez possessed something that only two other people in America had: a special demonic book containing the symbols of different demons and principalities. This book was not available in any occult bookshop. It was not sold on the internet. It was not something you could acquire through curiosity or casual involvement.\u003c/p\u003e\n\u003cp\u003eThe book had to be signed off by the devil himself. This means that the devil personally authorized each copy. The specificity of this authorization — only three copies in all of America — indicates the strategic value of this book and the level of trust required to possess it.\u003c/p\u003e\n\u003cp\u003eThe symbols in the book were not decorative. They were operational. Each symbol corresponded to a specific demon or principality. Each symbol functioned as an invocation — a way to summon, communicate with, or direct a specific entity. The book was, in effect, a command-and-control manual for demonic warfare.\u003c/p\u003e\n\u003cp\u003eCompare this to the Bible. The Bible contains the names and attributes of God. It contains the words of Christ. It functions as the believer's manual for spiritual life and warfare. The devil's book is the counterfeit — containing the names and symbols of his entities, functioning as the practitioner's manual for spiritual destruction.\u003c/p\u003e\n\u003cp\u003eOnly three people in America had this book. Ramirez was one of them. This tells us something about his rank in the devil's kingdom. He was not a foot soldier. He was not a mid-level operative. He was one of the most trusted and highly placed servants the devil had in the nation.\u003c/p\u003e\n\u003ch2 id=\"the-demonic-wedding-married-on-halloween\"\u003eThe Demonic Wedding: Married on Halloween\u003c/h2\u003e\n\u003ch3 id=\"a-wedding-attended-by-demons\"\u003eA Wedding Attended by Demons\u003c/h3\u003e\n\u003cp\u003eRamirez got married on Halloween — the night when the occult calendar reaches its peak, when the spiritual barriers between the natural and supernatural are believed to be thinnest, when the kingdom of darkness celebrates its highest holy day.\u003c/p\u003e\n\u003cp\u003eBut this was no ordinary wedding. The ceremony was attended by demons and principalities from around the world. No human beings were present. The bride was a witch. The groom was a devil worshipper. And the guests were the spiritual entities they served — fallen angels, principality spirits, and demons who had traveled from their territorial assignments across the globe to witness this union.\u003c/p\u003e\n\u003cp\u003eThis testimony reveals several things. First, that the demonic realm has ceremony. It has ritual. It has social structure. Demons attend events. They recognize marriages. They celebrate alliances. The kingdom of darkness is not chaos — it is organized, hierarchical, and ceremonial, mirroring the structure of heaven in a corrupted form.\u003c/p\u003e\n\u003cp\u003eSecond, that marriage in the demonic realm functions as a covenant — binding two practitioners together in shared service, shared power, and shared assignment. Ramirez was not merely marrying a woman. He was forming a strategic alliance between two high-ranking servants of the devil, combining their demonic authority and resources for greater effectiveness.\u003c/p\u003e\n\u003cp\u003eThird, that the scope was international. Demons and principalities came from around the world. This confirms Pittman's description of a globally organized demonic hierarchy. The devil's kingdom is not local. It is not regional. It is planetary. And its agents — both spiritual and human — operate in coordinated networks that span every nation.\u003c/p\u003e\n\u003ch3 id=\"training-the-next-generation\"\u003eTraining the Next Generation\u003c/h3\u003e\n\u003cp\u003eRamirez's wife was a witch. He was training his daughter to be one. The generational pattern that had enslaved his own family — his father's side all being witches and warlocks — was being deliberately replicated. This is how the kingdom of darkness perpetuates itself. Not merely through recruitment but through generational transmission.\u003c/p\u003e\n\u003cp\u003eJust as Abraham's covenant with God was passed to Isaac, then to Jacob, then to the twelve tribes — the devil's covenant is passed from parent to child, from generation to generation. The sins of the fathers visited upon the children to the third and fourth generation (Exodus 20:5). This is not a metaphor. It is a mechanism. Generational covenants — whether with God or with the devil — carry real spiritual authority and real spiritual consequences.\u003c/p\u003e\n\u003ch2 id=\"the-attempted-human-sacrifice\"\u003eThe Attempted Human Sacrifice\u003c/h2\u003e\n\u003ch3 id=\"the-devils-command-to-kill\"\u003eThe Devil's Command to Kill\u003c/h3\u003e\n\u003cp\u003eThe devil told Ramirez to kill a man on a rooftop. This was not a metaphorical assignment. This was a literal command to commit human sacrifice — the ultimate expression of devotion in the kingdom of darkness, the practice that God calls the most abominable of all abominations.\u003c/p\u003e\n\u003cp\u003eRamirez was equipped for the task. He had nine machetes and over one hundred pounds of weapons. He went to the rooftop. He found the man. He grabbed him.\u003c/p\u003e\n\u003cp\u003eAnd the man just disappeared.\u003c/p\u003e\n\u003cp\u003eVanished. Gone. The man was physically present one moment and gone the next. Ramirez could not complete the sacrifice because God intervened — not through a sermon, not through a tract, not through a prayer meeting, but through a direct supernatural act that removed the intended victim from the killer's hands.\u003c/p\u003e\n\u003cp\u003eThis event reveals the limit of the devil's power. He can command. He can assign. He can equip. He can motivate. But he cannot override God's sovereign protection. When God decides that a person will not die, no devil worshipper, no principality, and no number of machetes can change that outcome. \"No weapon that is formed against thee shall prosper\" (Isaiah 54:17) — not because the weapons are not real, but because the God who covers His people is greater than the enemy who attacks them.\u003c/p\u003e\n\u003ch2 id=\"failed-witchcraft-against-a-christian\"\u003eFailed Witchcraft Against a Christian\u003c/h2\u003e\n\u003ch3 id=\"twenty-one-days-of-ritual--and-it-failed\"\u003eTwenty-One Days of Ritual — And It Failed\u003c/h3\u003e\n\u003cp\u003eA woman came to Ramirez and asked him to kill another woman through witchcraft. He agreed. He bought a coffin box. He set twenty-one black candles. He performed the death ritual for twenty-one consecutive days. Every protocol was followed. Every demonic requirement was met. The ritual was executed with the precision of a man who had been practicing for decades.\u003c/p\u003e\n\u003cp\u003eThe target did not die.\u003c/p\u003e\n\u003cp\u003eShe was a CHRISTIAN. She was protected by Jesus Christ. The blood of Jesus covered her. The power of her relationship with God was greater than the power of twenty-one days of witchcraft, twenty-one black candles, a coffin box, and the demonic authority of one of the highest-ranking devil worshippers in America.\u003c/p\u003e\n\u003cp\u003eRamirez's own summary of this experience is devastating in its clarity: \"Whatever is not covered with Jesus Christ is an easy target to bring down.\"\u003c/p\u003e\n\u003cp\u003eRead that again. \"Whatever is NOT COVERED with Jesus Christ is an EASY TARGET to bring down.\" Not a difficult target. Not a challenging target. An EASY target. The only thing that makes a person difficult — or impossible — for the devil's servants to destroy is the covering of Jesus Christ. Without that covering, you are exposed. With it, you are untouchable.\u003c/p\u003e\n\u003cp\u003eThis is the same principle demonstrated by the wall of fire around Nicky Cruz's youth group. The same principle demonstrated by the man who disappeared from the rooftop. The same principle that runs through every spiritual warfare passage in scripture: the blood of Jesus is the believer's covering, and without it, there is no protection.\u003c/p\u003e\n\u003ch2 id=\"the-fathers-death-the-devil-as-daddy\"\u003eThe Father's Death: The Devil as \"Daddy\"\u003c/h2\u003e\n\u003ch3 id=\"praying-for-the-devil-to-kill-his-father\"\u003ePraying for the Devil to Kill His Father\u003c/h3\u003e\n\u003cp\u003eRamirez's father was shot in a nightclub at age thirty-three. This was not a random act of violence. Ramirez had prayed — prayed to the devil — for his father to be killed. And the devil obliged.\u003c/p\u003e\n\u003cp\u003eThe devil told Ramirez that he would \"replace the old.\" The father who had introduced him to the occult, who had worshipped the devil for hours in the family home, who had begun the generational transmission of the demonic covenant — that father was now dispensable. The devil had the son. The father was no longer needed.\u003c/p\u003e\n\u003cp\u003eAfter his father's death, the devil became Ramirez's \"daddy.\" This is perhaps the most revealing element of the entire testimony. The devil does not merely want worship. He does not merely want obedience. He wants to BE your father. He wants to fill the deepest human need — the need for a father's love, a father's protection, a father's guidance — with his own counterfeit presence.\u003c/p\u003e\n\u003cp\u003eJesus called God \"Abba\" — Father. The devil seeks the same title. He wants to be daddy. He wants the intimacy, the trust, the loyalty, and the dependence that a child gives to a father. And for twenty-five years, Ramirez gave it to him — because no one else in his life had filled that role.\u003c/p\u003e\n\u003cp\u003eThis is why the gospel must be more than information. It must be relationship. John Ramirez did not need to hear that God existed. He already knew the spiritual realm was real. He needed to experience the love of a Father who would never betray him, never discard him, and never demand his blood as the price of relationship. He needed what the devil could never give: genuine, unconditional, sacrificial love.\u003c/p\u003e\n\u003cp\u003eAnd when he found it — through Christians who demonstrated it, through the Holy Spirit who poured it into his heart — the devil's hold was broken. Because no contract can withstand the love of God. No covenant can override the blood of Jesus. And no principality can stand against the Father who comes to reclaim His child.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Transgression — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/51-The_Covenant_Blood.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Covenant Blood — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Darkness Into Light — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Enemy Within — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/devil-worshipper-john-ramirez-testimony/?lang=en\"\u003eFrom Devil Worshipper to Deliverance: The John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/why-satan-doesnt-fear-most-christians/?lang=en\"\u003eWhy Satan Doesn't Fear Most Christians: A Devil Worshipper's Confession\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/demonic-hierarchy-satans-military/?lang=en\"\u003eThe Demonic Hierarchy: Satan's Military Structure Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/wake-up-church-narrow-gate/?lang=en\"\u003eWake Up Church: The Narrow Gate Is Narrower Than You Think\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe witchcraft John Ramirez practiced is not ancient history. It is not a foreign phenomenon. It is operating in America today — in hospitals, courtrooms, schools, and police departments. The professionals who serve the devil walk among us in suits and scrubs and badges. They kill animals and drink blood every week. They have demonic books signed by the devil himself. They get married in ceremonies attended by principalities from around the world. And they target anyone who represents Jesus Christ — unless that person is covered by His blood. The contract with the devil is real. But the covenant with God is stronger. The question is: which one covers you?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading
