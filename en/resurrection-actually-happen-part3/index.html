\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003ePaul stated it plainly: if the resurrection did not happen, the entire faith collapses. This makes the resurrection the single most important claim in Christianity — and therefore the claim most in need of rigorous examination. Not emotional defense. Not institutional authority. Examination.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed that the spiritual realm is real. Pittman witnessed three heavens, demonic operations in the second heaven, and was told that 97.5 percent of Christians were rejected — they had \"never made Me Lord.\" This is critical context: Pittman confirmed that the spiritual dimension exists, that there is life after death, and that most Christians are deceived. The question is not whether the supernatural is real. The question is whether the specific claims of the institution — including the resurrection narrative as told — are accurate.\u003c/p\u003e\n\u003cp\u003eThe Jesuits have spent five centuries defending these claims with Napoleon's \"absolute power,\" Adams's \"eternal damnation,\" and the infiltration tactics documented in \u003cem\u003eCatholic Confidential\u003c/em\u003e: operating \"cloaked with cunning,\" practicing \"every species of vice,\" demanding blind obedience. Tamburini governed \"all the world.\" Clement XIV was poisoned. This is the organization that shaped your understanding of the resurrection. Examine accordingly.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/15-From_Dust_to_Glory.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Dust to Glory — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/27-The_Promise_of_Salvation.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Promise of Salvation — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-evidence-for\"\u003eThe Evidence For\u003c/h2\u003e\n\u003ch3 id=\"the-empty-tomb-argument\"\u003eThe Empty Tomb Argument\u003c/h3\u003e\n\u003cp\u003eThe most commonly cited evidence for the resurrection is the empty tomb. All four Gospels report that women went to the tomb on Sunday morning and found it empty. The institutional argument runs: if the resurrection did not happen, where is the body?\u003c/p\u003e\n\u003cp\u003eThis is a fair question, but it is not proof. An empty tomb proves only that a tomb is empty, not how it became empty. Multiple explanations exist beyond resurrection: the body was moved by the authorities to prevent the tomb from becoming a shrine; the body was moved by disciples (as Matthew 28:13 acknowledges was claimed by the Jewish authorities); the women went to the wrong tomb; the body was buried differently than described and was never in that specific tomb.\u003c/p\u003e\n\u003cp\u003eEach of these alternatives has weaknesses. But so does the resurrection explanation, which requires accepting a supernatural event on the testimony of documents written decades after the event by authors who were not eyewitnesses (more on this in Part 4).\u003c/p\u003e\n\u003ch3 id=\"the-post-resurrection-appearances\"\u003eThe Post-Resurrection Appearances\u003c/h3\u003e\n\u003cp\u003eThe Gospels and Paul's letters describe multiple post-resurrection appearances: to Mary Magdalene, to the disciples, to Thomas, to five hundred at once (1 Corinthians 15:6), to James, and to Paul himself.\u003c/p\u003e\n\u003cp\u003eThe five hundred witnesses are often cited as compelling evidence. But Paul, who mentions them, never names them. No other document corroborates this claim. And Paul's own \"appearance\" was not a physical encounter — Acts 9 describes a light and a voice, not a bodily person. If Paul's encounter counts as a resurrection appearance, then \"appearance\" means something very different from physical presence.\u003c/p\u003e\n\u003cp\u003eThe Gospel accounts of appearances differ significantly. In Matthew, Jesus appears in Galilee. In Luke, he appears exclusively in and around Jerusalem and explicitly tells the disciples to stay in the city. These are contradictory geographical claims. Both cannot be accurate.\u003c/p\u003e\n\u003ch3 id=\"the-disciples-willingness-to-die\"\u003eThe Disciples' Willingness to Die\u003c/h3\u003e\n\u003cp\u003eThe traditional argument states that the disciples would not have died for a lie — their willingness to face martyrdom proves they genuinely believed in the resurrection.\u003c/p\u003e\n\u003cp\u003eThis argument has several problems. First, the evidence for early apostolic martyrdom is thin. The deaths of most apostles are recorded not in scripture but in later church tradition — tradition produced by the institution that benefits from the narrative. Second, people die for sincerely held beliefs all the time. This does not make those beliefs true. Cult members, political radicals, and adherents of every religion have died for their convictions. Sincerity is not proof of accuracy.\u003c/p\u003e\n\u003cp\u003eThird, and most importantly, the argument assumes that the only reason someone would willingly die is for literal physical resurrection. But the early church was not monolithic. Early Christians held diverse views about what \"resurrection\" meant. Some may have believed in a spiritual resurrection, a metaphorical rising, a continuation of the movement. Dying for these beliefs does not require that a physical body walked out of a physical tomb.\u003c/p\u003e\n\u003ch2 id=\"the-evidence-against\"\u003eThe Evidence Against\u003c/h2\u003e\n\u003ch3 id=\"the-timing-problem\"\u003eThe Timing Problem\u003c/h3\u003e\n\u003cp\u003eThe earliest account of the resurrection is Paul's letter to the Corinthians, written approximately 20-25 years after the alleged events. The earliest Gospel, Mark, was written approximately 35-40 years after. Matthew and Luke came 45-55 years after. John came 60-70 years after.\u003c/p\u003e\n\u003cp\u003eNo written account of the resurrection exists from the time it allegedly happened. The earliest accounts are decades later, written by people who were not present, in a language (Greek) that Jesus and his Aramaic-speaking followers did not use as their primary language. This is not eyewitness testimony. It is second-hand or third-hand narrative, filtered through decades of oral transmission and theological development.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) how this timing gap allowed the narrative to evolve. Mark, the earliest Gospel, has no post-resurrection appearances in its original text (Mark 16:8 is the original ending; verses 9-20 were added later by scribes). Matthew adds appearances. Luke adds more detail. John adds the most elaborate accounts. The resurrection narrative grows more detailed and specific with each retelling, which is the pattern of legend, not history.\u003c/p\u003e\n\u003ch3 id=\"the-development-pattern\"\u003eThe Development Pattern\u003c/h3\u003e\n\u003cp\u003eCompare the resurrection accounts chronologically:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePaul (c. 55 AD)\u003c/strong\u003e: Jesus \"appeared\" to various people. No details about an empty tomb, no angels, no specific narratives. Paul uses the word \u003cem\u003eophthe\u003c/em\u003e, which can mean \"was seen\" or \"appeared\" in a visionary sense.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMark (c. 70 AD)\u003c/strong\u003e: Women find the tomb empty. A young man in white tells them Jesus has risen. They flee and tell no one. No appearances by Jesus. The original ending.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMatthew (c. 80-85 AD)\u003c/strong\u003e: Women find the tomb empty. An angel descends with an earthquake. Guards faint. Jesus appears to the women and then to the disciples in Galilee. New elements: earthquake, guards, angel descending.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLuke (c. 80-90 AD)\u003c/strong\u003e: Women find the tomb empty. Two men in shining garments appear. Jesus appears to disciples on the road to Emmaus and then in Jerusalem. New elements: Emmaus road, detailed dialogues, explicit physical eating.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eJohn (c. 90-100 AD)\u003c/strong\u003e: Mary Magdalene finds the tomb empty alone. Two angels appear. Jesus appears to Mary, then to disciples in a locked room, then to Thomas (with the \"doubting Thomas\" narrative), then at the Sea of Galilee. New elements: detailed personal encounters, dramatic narratives, theological discourses.\u003c/p\u003e\n\u003cp\u003eThis pattern — simple becoming elaborate, vague becoming specific, spiritual becoming physical — is the pattern of mythological development. It is the opposite of what we would expect from historical memory, which becomes less detailed over time, not more.\u003c/p\u003e\n\u003ch3 id=\"the-dying-and-rising-god-pattern\"\u003eThe Dying-and-Rising God Pattern\u003c/h3\u003e\n\u003cp\u003eThe resurrection of Jesus is not a unique claim in the ancient world. Numerous pre-Christian deities were said to die and rise again:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOsiris\u003c/strong\u003e (Egypt): Murdered by Set, resurrected by Isis, became lord of the underworld.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTammuz\u003c/strong\u003e (Mesopotamia): Died annually, descended to the underworld, rose again with the return of spring.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAttis\u003c/strong\u003e (Phrygia): Died under a pine tree (the Christmas tree?), was mourned for three days, and rose again.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDionysus\u003c/strong\u003e (Greece): Torn apart by Titans, reborn from his heart.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMithras\u003c/strong\u003e (Persia/Rome): Born from a rock, died, and rose again. His followers celebrated his resurrection at the spring equinox — the same timing as Easter.\u003c/p\u003e\n\u003cp\u003eThe institutional response is that these parallels are coincidental or that Satan created counterfeit dying-and-rising gods to preempt Christianity. But this argument is circular: it assumes Christianity is true and explains evidence against it by invoking the very being whose existence depends on Christianity being true.\u003c/p\u003e\n\u003cp\u003eA simpler explanation is that the early Christians, living in a world saturated with dying-and-rising god narratives, incorporated this pattern into their understanding of Jesus. This is exactly what the Jesuits' predecessors — the early institutional church — did with pagan holidays, as we documented in Parts 1 through 7 of the Saturn series.\u003c/p\u003e\n\u003ch2 id=\"the-jesuit-defense-machine\"\u003eThe Jesuit Defense Machine\u003c/h2\u003e\n\u003ch3 id=\"academic-capture\"\u003eAcademic Capture\u003c/h3\u003e\n\u003cp\u003eThe Jesuits control some of the world's most prestigious universities: Georgetown, Boston College, Fordham, Loyola, Gonzaga, and dozens more worldwide. These institutions produce the scholars who defend the resurrection in academic journals, textbooks, and public debates.\u003c/p\u003e\n\u003cp\u003eThis is not an ad hominem attack. It is an observation about institutional incentive. Scholars employed by Jesuit universities who publicly question the resurrection risk their careers, their funding, their social standing, and their community. The incentive structure ensures that the vast majority of research produced by these institutions supports the orthodox narrative.\u003c/p\u003e\n\u003cp\u003eThe \u003cem\u003eCatholic Confidential\u003c/em\u003e documentary reveals that the Jesuit oath demands obedience above all else. This obedience extends to intellectual output. Jesuit-trained scholars do not pursue truth wherever it leads. They pursue truth wherever the institution allows it to lead. Where the evidence points away from orthodoxy, the institution redirects, reinterprets, or suppresses.\u003c/p\u003e\n\u003ch3 id=\"the-emotional-shield\"\u003eThe Emotional Shield\u003c/h3\u003e\n\u003cp\u003eThe most effective Jesuit defense of the resurrection is not intellectual but emotional. Through centuries of art, music, liturgy, and storytelling, the institution has made the resurrection a lived emotional reality for billions of people. The Easter service, with its triumphant hymns and joyous declarations of \"He is risen!\" is an annual emotional event that reinforces the narrative more effectively than any argument.\u003c/p\u003e\n\u003cp\u003eTo question the resurrection after experiencing this emotional reality feels like betrayal — betrayal of the community, of the dead relatives who believed, of the children who have been taught. This emotional cost is the institution's greatest defense mechanism. It ensures that only the most determined truth-seekers will follow the evidence to its conclusion.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's experience confirms that emotion is not evidence. The 97.5 percent who were rejected felt strong emotions about their faith. Those emotions did not save them. What mattered was truth — whether they had actually made Christ Lord or merely felt like they had.\u003c/p\u003e\n\u003ch2 id=\"what-does-this-mean\"\u003eWhat Does This Mean?\u003c/h2\u003e\n\u003ch3 id=\"the-spiritual-is-real\"\u003eThe Spiritual Is Real\u003c/h3\u003e\n\u003cp\u003eNothing in this examination denies the reality of the spiritual realm. Pittman's testimony, the evidence of NDE research, the witness of scripture itself — all confirm that there is more to reality than the material world. The question is not whether the supernatural exists but whether the institutional narrative accurately describes it.\u003c/p\u003e\n\u003cp\u003eIt is possible that something extraordinary happened in the first century — something that the institutional church has both preserved and distorted, wrapping a genuine spiritual event in layers of pagan mythology, institutional theology, and Jesuit-managed dogma. The truth may be more subtle, more mysterious, and more challenging than either blind belief or flat rejection.\u003c/p\u003e\n\u003ch3 id=\"the-honest-position\"\u003eThe Honest Position\u003c/h3\u003e\n\u003cp\u003eThe honest position is uncertainty. The evidence does not prove the physical resurrection happened as described. Nor does it prove it did not. What the evidence shows is that the narrative developed over time, was shaped by institutional interests, was defended through violence and suppression, and contains elements common to pre-Christian mythology.\u003c/p\u003e\n\u003cp\u003eAn honest seeker acknowledges all of this — and continues seeking. The 97.5 percent stopped seeking when the institution told them to stop. They accepted the narrative, performed the rituals, and believed the emotional experience was equivalent to truth. Do not make their mistake.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Historical analysis of resurrection claims and mythological parallels\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Confirmation of spiritual reality independent of institutional narrative\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit academic defense apparatus exposed\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/15-From_Dust_to_Glory.mp4\"\u003eFrom Dust to Glory\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/27-The_Promise_of_Salvation.mp4\"\u003eThe Promise of Salvation\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/23-The_Sun_and_the_Moon.mp4\"\u003eThe Sun and the Moon\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/83-Ancient_Documents.mp4\"\u003eAncient Documents\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/87-From_Darkness_Into_Light.mp4\"\u003eFrom Darkness Into Light\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/jesus-crucifixion-hoax-part2/?lang=en\"\u003eWas the Story of Jesus' Crucifixion a Hoax Part 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/who-wrote-bible-part4/?lang=en\"\u003eWho Really Wrote the Bible Part 4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/untold-history-constructing-new-testament-part5/?lang=en\"\u003eThe UNTOLD HISTORY of Constructing the New Testament Part 5\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eIf the resurrection is true, your questions cannot destroy it. If it is not true, your silence cannot save it. Either way, examination is your duty and your right — a duty that 97.5 percent of Christians failed to fulfill. The narrow path runs through the hard questions, not around them.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Did the Resurrection Actually Happen: Examining the Evidence Part 3\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Part 3 examines the resurrection evidence with honest scrutiny. Explore how Jesuit institutions shaped this core belie
