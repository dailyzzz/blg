c/em\u003e — Psalm 37:14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThere is a pattern so consistent, so unmistakable, and so damning that once you see it, you cannot unsee it: major viral outbreaks consistently originate on or near military installations. The Spanish Flu of 1918 began at Fort Riley, Kansas. Numerous outbreaks have been traced to Fort Detrick, Maryland — the US military's primary bioweapons research facility. The pattern repeats across decades and across continents, yet the medical establishment insists that each new outbreak is a natural event.\u003c/p\u003e\n\u003cp\u003eThe probability that this pattern is coincidental is vanishingly small. The far more likely explanation is that these outbreaks are the result — whether intentional or accidental — of military bioweapons research. And the military-industrial complex, with its documented history of experimenting on civilian populations without consent, has every reason to conceal this connection.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the spiritual realm is organized for warfare. Ephesians 6:12 describes the battle \"against principalities, against powers, against the rulers of the darkness of this world.\" Military bioweapons programs are physical manifestations of this spiritual warfare — weapons designed not just to kill bodies but to create fear, dependency, and submission in entire populations. The 97.5% who are failing, who have \"never made Jesus Lord,\" are the perfect targets: they trust institutions, they obey authorities, and they never ask who benefits from their suffering.\u003c/p\u003e\n\u003cp\u003eNapoleon called the Jesuits \"a military organization\" — and the bioweapons programs are military operations with deep connections to the intelligence community, which itself has deep connections to the Jesuit network through institutions like Georgetown University. The Catholic Confidential documentary reveals infiltration \"cloaked with cunning\" and \"every species of vice.\" Biological warfare is perhaps the ultimate vice — and it is conducted with the utmost cunning.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-pattern-military-bases-and-viral-outbreaks\"\u003eThe Pattern: Military Bases and Viral Outbreaks\u003c/h2\u003e\n\u003ch3 id=\"the-spanish-flu-1918--fort-riley-kansas\"\u003eThe Spanish Flu (1918) — Fort Riley, Kansas\u003c/h3\u003e\n\u003cp\u003eThe most devastating pandemic in modern history — which killed an estimated 50-100 million people worldwide — began at Camp Funston, Fort Riley, Kansas, in March 1918. The first cases appeared among soldiers who had been subjected to experimental bacterial meningitis vaccinations developed by the Rockefeller Institute for Medical Research.\u003c/p\u003e\n\u003cp\u003eKey facts:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe outbreak began \u003cstrong\u003eamong vaccinated soldiers\u003c/strong\u003e, not in the general population\u003c/li\u003e\n\u003cli\u003eThe Rockefeller Institute had been conducting \u003cstrong\u003eexperimental vaccine trials\u003c/strong\u003e on military personnel at Fort Riley\u003c/li\u003e\n\u003cli\u003eThe disease spread from Fort Riley to \u003cstrong\u003eother military bases\u003c/strong\u003e before reaching civilian populations\u003c/li\u003e\n\u003cli\u003eThe disease was most deadly among \u003cstrong\u003eyoung, healthy adults\u003c/strong\u003e (ages 20-40) — the demographic most heavily vaccinated — rather than the elderly and very young\u003c/li\u003e\n\u003cli\u003eThe \"Spanish\" Flu did not originate in Spain; the name was an artifact of wartime censorship that suppressed outbreak reports in combatant nations while neutral Spain reported freely\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe evidence strongly suggests that the 1918 pandemic was caused by experimental vaccinations — not by a naturally occurring virus. The Rockefeller Institute's involvement, the military origin, and the demographic pattern all point to an iatrogenic (medically caused) catastrophe.\u003c/p\u003e\n\u003ch3 id=\"fort-detrick--americas-bioweapons-capital\"\u003eFort Detrick — America's Bioweapons Capital\u003c/h3\u003e\n\u003cp\u003eFort Detrick, located in Frederick, Maryland, has been the center of American biological weapons research since 1943. The facility has worked with:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAnthrax\u003c/li\u003e\n\u003cli\u003eBrucellosis\u003c/li\u003e\n\u003cli\u003eVenezuelan equine encephalitis\u003c/li\u003e\n\u003cli\u003eVarious weaponized bacteria and viruses\u003c/li\u003e\n\u003cli\u003eDelivery systems for biological agents\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAlthough the US officially terminated its offensive bioweapons program in 1969, Fort Detrick continues to operate as a \"defensive\" biodefense research facility under the US Army Medical Research Institute of Infectious Diseases (USAMRIID). The distinction between \"offensive\" and \"defensive\" bioweapons research is largely semantic — you must understand how to create biological weapons in order to defend against them.\u003c/p\u003e\n\u003cp\u003eFort Detrick has been linked to numerous suspicious outbreaks and incidents:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe \u003cstrong\u003e2001 anthrax attacks\u003c/strong\u003e were traced to anthrax from Fort Detrick's own stocks\u003c/li\u003e\n\u003cli\u003eA mysterious \u003cstrong\u003elab shutdown\u003c/strong\u003e in 2019 raised questions about what experiments had gone wrong\u003c/li\u003e\n\u003cli\u003eThe facility's proximity to Washington, D.C., makes it a strategic center for biological research with national security implications\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"additional-military-origin-outbreaks\"\u003eAdditional Military-Origin Outbreaks\u003c/h3\u003e\n\u003cp\u003eThe pattern extends far beyond Fort Riley and Fort Detrick:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eHantavirus\u003c/strong\u003e outbreaks have been linked to military facilities\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLegionnaires' Disease\u003c/strong\u003e (1976) first appeared at an American Legion convention in Philadelphia — the American Legion being a military veterans' organization\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHIV/AIDS\u003c/strong\u003e emerged in populations connected to military vaccine programs (the Hepatitis B vaccine trials among gay men in New York and San Francisco in the late 1970s were conducted through the CDC with military connections)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSwine Flu\u003c/strong\u003e outbreaks have military base connections\u003c/li\u003e\n\u003cli\u003eVarious outbreaks in developing countries have occurred near US military installations or following military vaccination campaigns\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"the-bioweapons-program-history\"\u003eThe Bioweapons Program History\u003c/h2\u003e\n\u003ch3 id=\"a-history-of-civilian-experimentation\"\u003eA History of Civilian Experimentation\u003c/h3\u003e\n\u003cp\u003eThe US military has a documented history of testing biological agents on civilian populations:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOperation Sea-Spray (1950)\u003c/strong\u003e: The US Navy sprayed Serratia marcescens bacteria over San Francisco, exposing 800,000 residents without their knowledge. At least one person died, and many developed respiratory infections.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOperation Big Buzz (1955)\u003c/strong\u003e: The military released 300,000 uninfected mosquitoes in Georgia to test whether mosquitoes could be used as biological weapons delivery systems.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOperation Drop Kick (1956)\u003c/strong\u003e: The military released infected mosquitoes in Savannah, Georgia, and Avon Park, Florida, to test their effectiveness as disease vectors.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProject 112 / Project SHAD (1962-1973)\u003c/strong\u003e: The military conducted biological and chemical warfare tests on thousands of US military personnel without their informed consent, exposing them to agents including VX nerve gas, sarin, and biological agents.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSt. Louis (1953-1954)\u003c/strong\u003e: The US Army sprayed zinc cadmium sulfide over low-income and minority neighborhoods in St. Louis, Missouri, to simulate biological weapons dispersal. Residents were not informed. Cancer rates in the affected neighborhoods subsequently increased.\u003c/p\u003e\n\u003cp\u003eThese are not allegations — they are documented in declassified government records, congressional investigations, and court proceedings. The US military has repeatedly demonstrated its willingness to use civilian populations as test subjects for biological agents.\u003c/p\u003e\n\u003ch2 id=\"the-germ-theory-connection\"\u003eThe Germ Theory Connection\u003c/h2\u003e\n\u003ch3 id=\"manufactured-diseases-for-a-manufactured-paradigm\"\u003eManufactured Diseases for a Manufactured Paradigm\u003c/h3\u003e\n\u003cp\u003eThe military-origin pattern raises a fundamental question: if diseases are naturally occurring, why do they so consistently appear first in military environments? The conventional explanation — that crowded military conditions facilitate disease transmission — is inadequate. Civilian environments (cities, schools, offices) are equally crowded, yet major outbreaks disproportionately originate in military settings.\u003c/p\u003e\n\u003cp\u003eThe more coherent explanation is that many diseases attributed to natural viral evolution are actually products of laboratory research — engineered or enhanced pathogens that escape (or are released from) military facilities. This explanation is consistent with:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe military origin pattern\u003c/li\u003e\n\u003cli\u003eThe documented history of bioweapons research\u003c/li\u003e\n\u003cli\u003eThe documented history of civilian experimentation\u003c/li\u003e\n\u003cli\u003eThe gain-of-function research programs that have been publicly acknowledged\u003c/li\u003e\n\u003cli\u003eThe consistent cover-up of military involvement in outbreak origins\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"the-spiritual-warfare-dimension\"\u003eThe Spiritual Warfare Dimension\u003c/h2\u003e\n\u003ch3 id=\"weapons-against-gods-creation\"\u003eWeapons Against God's Creation\u003c/h3\u003e\n\u003cp\u003eBiological weapons represent the ultimate perversion of God's creation. They take the biological processes that God designed for life — replication, adaptation, immune response — and weaponize them against the very beings they were designed to sustain. This is the Satanic inversion at its most extreme: using God's own creation to destroy God's children.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the demonic hierarchy is organized for exactly this kind of warfare. The principalities and powers of Ephesians 6:12 do not fight with physical weapons — they fight by corrupting creation, perverting truth, and turning God's gifts against His people. Bioweapons programs are the physical manifestation of this spiritual warfare.\u003c/p\u003e\n\u003cp\u003eThe 95% who serve \"self\" — Pittman's statistic — are the ones who accept government assurances without question, who submit to mandatory vaccinations without researching their origins, and who trust institutions that have repeatedly demonstrated their willingness to experiment on them.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-military-connection\"\u003eThe Jesuit Military Connection\u003c/h3\u003e\n\u003cp\u003eThe Jesuit order's connection to military operations extends back to its founding. Ignatius of Loyola was a soldier before he founded the Society of Jesus. The order was structured as a military organization from its inception — with a \"Superior General\" commanding absolute obedience from its members.\u003c/p\u003e\n\u003cp\u003eThe modern intelligence community — the CIA, MI6, Mossad, and their allies — maintains extensive connections to the Jesuit network. Georgetown University, the premier Jesuit institution in America, has produced more intelligence operatives than any other school. The bioweapons programs operated by these agencies reflect the Jesuit mindset: the end justifies the means, absolute obedience supersedes individual conscience, and \"every species of vice\" is permitted in service of the mission.\u003c/p\u003e\n\u003cp\u003eGeneral Tambulini's governance of \"half the world\" extends through these networks. Pope Clement XIV was poisoned for opposing them. John Adams warned that they merited \"eternal damnation.\" The bioweapons programs they influence represent perhaps the most damnable aspect of their operations — the weaponization of life itself against humanity.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — research on military bioweapons and outbreak origins\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — spiritual warfare and the weaponization of creation\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit military connections\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live
