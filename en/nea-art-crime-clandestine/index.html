 and creeping things.\" — Romans 1:22-23\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eFrom the golden calf at Sinai to the grotesque installations funded by the National Endowment for the Arts, the corruption of art has always been a weapon of spiritual warfare. God created human beings with the capacity for beauty, creativity, and artistic expression — and the adversary has worked relentlessly to corrupt that capacity, turning art from an instrument of worship into a vehicle for blasphemy, degradation, and occult programming. The modern art establishment, far from being a spontaneous expression of creative freedom, was deliberately engineered as a weapon of cultural destruction by intelligence agencies serving Jesuit-aligned interests.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony revealed that demons operate through every domain of human culture, assigned to specific territories and tasks. The realm of art and culture is a critical battleground because art shapes consciousness, defines beauty, and establishes the aesthetic framework through which human beings perceive reality. When art is corrupted, perception is corrupted — and corrupted perception leads to corrupted worship. The 95% who serve \"self\" rather than God, as Pittman was told, include the millions who have accepted the modern art establishment's definition of beauty and creativity without ever questioning who defined it or why.\u003c/p\u003e\n\u003cp\u003eThe Jesuits have historically understood the power of art as a propaganda tool. Jesuit churches were designed as overwhelming sensory experiences, using art, architecture, and music to create emotional submission. The modern inversion of this principle — using deliberately ugly, shocking, and blasphemous art to create cultural submission to degeneracy — is the same methodology applied in reverse. As explored in \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/49-Cain_and_Abel.mp4\"\u003eCain and Abel\u003c/a\u003e, the enemy's offerings always counterfeit what God has established, presenting corruption as sophistication and degradation as progress.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-cia-and-the-cultural-cold-war\"\u003eThe CIA and the Cultural Cold War\u003c/h2\u003e\n\u003ch3 id=\"abstract-expressionism-as-a-weapon\"\u003eAbstract Expressionism as a Weapon\u003c/h3\u003e\n\u003cp\u003eIn the late 1940s and 1950s, the Central Intelligence Agency embarked on one of the most ambitious cultural manipulation programs in history. Through front organizations, covert funding channels, and networks of compliant art critics and museum directors, the CIA promoted Abstract Expressionism as the premier art movement of the Western world. Artists like Jackson Pollock, Mark Rothko, and Willem de Kooning were elevated not because of the inherent merit of their work, but because their art served the CIA's strategic purposes.\u003c/p\u003e\n\u003cp\u003eThe program was documented extensively by journalist Frances Stonor Saunders in her work \"The Cultural Cold War.\" The CIA's Congress for Cultural Freedom, operating through dozens of front organizations across Europe and the Americas, funded exhibitions, publications, and cultural events that promoted American abstract art as the embodiment of Western freedom. The irony was staggering — a secretly government-funded propaganda operation was presented as the ultimate expression of artistic liberty.\u003c/p\u003e\n\u003cp\u003eThe deeper purpose, however, went beyond Cold War propaganda. The promotion of abstract and increasingly nihilistic art served to detach Western culture from its Christian foundations. Classical Western art had been rooted in the representation of beauty, truth, and the divine — the great works of the Renaissance and Baroque periods were explicitly Christian in their inspiration and execution. By replacing this tradition with abstract, meaningless, and eventually deliberately ugly art, the cultural engineers severed the connection between Western civilization and its spiritual heritage.\u003c/p\u003e\n\u003ch3 id=\"the-rockefeller-connection\"\u003eThe Rockefeller Connection\u003c/h3\u003e\n\u003cp\u003eNelson Rockefeller, who served as president of the Museum of Modern Art (MoMA) and later as Vice President of the United States, was one of the primary conduits between the intelligence community and the art establishment. The Rockefeller family's connections to both intelligence agencies and Jesuit-aligned institutions made them ideal intermediaries for the cultural warfare program.\u003c/p\u003e\n\u003cp\u003eMoMA served as the institutional home for the CIA's art program. Exhibitions were curated, tours were organized, and critical acclaim was manufactured through a network of compliant art critics who understood that their access to the establishment depended on their support for the approved artistic direction. Critics who challenged the new orthodoxy were marginalized; those who celebrated it were rewarded with prominence and influence.\u003c/p\u003e\n\u003cp\u003eThe Rockefeller Foundation's earlier funding of Alfred Kinsey's sex research established a pattern that the art program replicated: foundation money flowing to programs that served the agenda of cultural destruction while wearing the mask of progressive enlightenment. The track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e traces the networks of power that connect these seemingly disparate programs into a coherent strategy of civilizational subversion.\u003c/p\u003e\n\u003ch2 id=\"the-national-endowment-for-the-arts\"\u003eThe National Endowment for the Arts\u003c/h2\u003e\n\u003ch3 id=\"creation-and-purpose\"\u003eCreation and Purpose\u003c/h3\u003e\n\u003cp\u003eThe National Endowment for the Arts (NEA) was established by Congress in 1965 as an independent federal agency tasked with supporting the arts in the United States. Its creation represented the institutionalization of government involvement in art — and with it, the permanent embedding of the cultural warfare agenda within the federal bureaucracy.\u003c/p\u003e\n\u003cp\u003eThe NEA's founding was championed by figures connected to the same networks that had operated the CIA's cultural programs. The transition from covert CIA funding to overt federal funding was seamless — the same art, the same artists, the same critics, and the same institutional infrastructure simply acquired a new and more legitimate funding source. The cultural warfare program was no longer a secret operation; it had become official government policy.\u003c/p\u003e\n\u003cp\u003eThe NEA's grant-making process ensured that public funds would flow to artists and institutions aligned with the approved cultural direction. Peer review panels — composed of art world insiders selected by NEA administrators — evaluated applications and recommended funding. The result was a self-reinforcing system in which the art establishment funded itself through government money, maintaining its ideological direction while presenting itself as serving the public interest.\u003c/p\u003e\n\u003ch3 id=\"the-scandals-that-revealed-the-agenda\"\u003eThe Scandals That Revealed the Agenda\u003c/h3\u003e\n\u003cp\u003eThe true nature of NEA-funded art became publicly visible through a series of controversies in the late 1980s and early 1990s. Andres Serrano's \"Piss Christ\" — a photograph of a crucifix submerged in the artist's urine — received NEA funding in 1987. Robert Mapplethorpe's retrospective, partially funded by the NEA, included explicitly sadomasochistic and homoerotic images. Karen Finley's NEA-funded performances involved smearing her naked body with chocolate while delivering explicit monologues.\u003c/p\u003e\n\u003cp\u003eThese works were not aberrations — they were the logical culmination of a cultural program that had been systematically degrading Western art for four decades. The progression from abstraction to explicit blasphemy followed a predictable trajectory: once art was divorced from beauty and meaning, the only direction was toward increasingly extreme provocation. The Satanic dimension of this progression was unmistakable — art that explicitly desecrated Christian symbols while celebrating sexual deviance was not merely offensive, it was ritualistic.\u003c/p\u003e\n\u003cp\u003eThe public outcry that followed these revelations led to Congressional hearings and temporary restrictions on NEA funding. But the art establishment rallied to defend its prerogatives, framing any criticism as censorship and any questioning as philistinism. The controversy ultimately strengthened the establishment's position by creating a narrative in which the defenders of public decency were cast as enemies of artistic freedom.\u003c/p\u003e\n\u003ch2 id=\"the-occult-dimension-of-modern-art\"\u003eThe Occult Dimension of Modern Art\u003c/h2\u003e\n\u003ch3 id=\"art-as-ritual\"\u003eArt as Ritual\u003c/h3\u003e\n\u003cp\u003eThe connection between modern art and occult practice is well-documented but rarely discussed in mainstream contexts. Many of the founding figures of modern art were explicit practitioners of occultism. Wassily Kandinsky was deeply influenced by Theosophy. Piet Mondrian was a committed Theosophist. The Surrealists drew explicitly on occult and alchemical symbolism. The Bauhaus school incorporated mystical and occult principles into its teaching.\u003c/p\u003e\n\u003cp\u003eThis occult foundation was not incidental to modern art — it was constitutive. The rejection of representational art in favor of abstraction was, at its deepest level, a rejection of the created order in favor of esoteric, occult alternatives. When Kandinsky spoke of art as a spiritual practice, he was not referring to Christian spirituality — he was referring to Theosophical spirituality, which is fundamentally Luciferian in its orientation.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order's relationship with the occult is documented in Catholic Confidential and extends back to the order's founding. Ignatius Loyola's \"Spiritual Exercises\" share structural similarities with occult meditation practices, and the order's emphasis on obedience — \"blind obedience,\" as Catholic Confidential describes it — mirrors the hierarchical submission required in occult organizations. The modern art world's combination of occult inspiration and institutional hierarchy represents a convergence of Jesuit organizational principles and Luciferian spiritual practice.\u003c/p\u003e\n\u003ch3 id=\"performance-art-and-ritual-abuse\"\u003ePerformance Art and Ritual Abuse\u003c/h3\u003e\n\u003cp\u003eThe evolution of art from object-based to performance-based forms created new opportunities for the integration of occult ritual into the art world. Performance artists like Marina Abramovic have created works that explicitly reference occult and Satanic ritual — blood-letting, simulated cannibalism, invocations of spiritual entities — while being celebrated by the cultural establishment as cutting-edge artistic practice.\u003c/p\u003e\n\u003cp\u003eAbramovic's connections to political elites — her \"Spirit Cooking\" dinners with prominent political figures were exposed through leaked emails — reveal the intersection of occult art practice with political power. These are not separate domains; they are integrated components of a system in which artistic ritual, political power, and spiritual corruption reinforce one another. The track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e traces this corruption to its spiritual origin — the rebellion of angelic beings who chose to corrupt rather than serve.\u003c/p\u003e\n\u003ch2 id=\"the-money-laundering-function\"\u003eThe Money Laundering Function\u003c/h2\u003e\n\u003ch3 id=\"art-as-financial-crime\"\u003eArt as Financial Crime\u003c/h3\u003e\n\u003cp\u003eThe modern art market serves a function that extends beyond cultural warfare — it is one of the world's most effective money laundering mechanisms. The art market is largely unregulated, transactions can be conducted privately, values are subjective and easily manipulated, and the use of shell companies, offshore accounts, and free ports allows for the movement of enormous sums without transparency.\u003c/p\u003e\n\u003cp\u003eA painting with no intrinsic value — a canvas splattered with paint, a blank white surface, a banana taped to a wall — can be valued at millions of dollars through the agreement of a small network of dealers, collectors, and auction houses. This artificial valuation creates a vehicle for moving money across borders, evading taxes, and converting illicit funds into legitimate assets. The CIA's original involvement in the art world created the infrastructure for this financial exploitation, and that infrastructure has been continuously expanded by the networks that inherited it.\u003c/p\u003e\n\u003cp\u003eThe Jesuit banking tradition — the order was deeply involved in international finance from its earliest days — finds its modern expression in the art market's financial architecture. The same opacity, the same international reach, and the same combination of legitimate and illegitimate activity that characterized Jesuit banking operations characterizes the modern art market. The track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/171-Great_Reset_Rising.mp4\"\u003eGreat Reset Rising\u003c/a\u003e examines how financial systems are being restructured to serve the interests of the global elite.\u003c/p\u003e\n\u003ch3 id=\"the-tax-deduction-scheme\"\u003eThe Tax Deduction Scheme\u003c/h3\u003e\n\u003cp\u003eNEA funding represents only a fraction of the public subsidy for the art establishment. The tax deduction for charitable donations to art institutions means that every donation to a museum, gallery, or arts organization is subsidized by taxpayers. A wealthy collector can purchase art at inflated prices, donate it to a museum at the inflated valuation, and claim a tax deduction that exceeds the actual cost. The public subsidizes the collection, the museum receives the donated work, and the entire transaction serves to inflate the market value of similar works held by the donor and their associates.\u003c/p\u003e\n\u003cp\u003eThis system ensures that public money flows to the art establishment regardless of public support for the art it produces. The controversy over NEA funding obscured the much larger subsidy flowing through the tax code — a subsidy that benefits the wealthy collectors and dealers who control the market while providing nothing of value to the public whose tax revenue supports it.\u003c/p\u003e\n\u003ch2 id=\"the-destruction-of-beauty\"\u003eThe Destruction of Beauty\u003c/h2\u003e\n\u003ch3 id=\"what-was-lost\"\u003eWhat Was Lost\u003c/h3\u003e\n\u003cp\u003eThe cultural warfare program that created the modern art establishment destroyed something irreplaceable: the Western tradition of beauty. For centuries, Western art had pursued the transcendent — the representation of divine beauty through human craft. The great cathedrals, the paintings of the Renaissance, the music of Bach and Mozart all sought to make the invisible visible, to give form to the glory of God's creation.\u003c/p\u003e\n\u003cp\u003eThe replacement of this tradition with deliberate ugliness, nihilism, and blasphemy was not an evolution — it was an amputation. Western civilization was severed from its aesthetic roots, and with that severance came a profound spiritual disorientation. When a culture can no longer perceive beauty, it can no longer perceive God — because God reveals Himself through beauty. The destruction of the Western aesthetic tradition was, at its deepest level, the destruction of a pathway to God.\u003c/p\u003e\n\u003ch3 id=\"the-spiritual-consequence\"\u003eThe Spiritual Consequence\u003c/h3\u003e\n\u003cp\u003eIsaiah 5:20 warns of those who \"call evil good, and good evil; that put darkness for light, and light for darkness.\" The modern art establishment does precisely this — it celebrates ugliness as beauty, meaninglessness as profundity, and blasphemy as courage. This inversion is not merely aesthetic; it is spiritual. It conditions human beings to accept inversion as normal, preparing them for the ultimate inversion: the acceptance of the adversary as God.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's revelation that words are spiritual — that every utterance carries weight in the spiritual realm — extends to images and artistic expression. Every work of art that blasphemes God, celebrates vice, or degrades beauty is a spiritual utterance that empowers the demonic and weakens the divine order. The NEA's funding of such work with public money means that American taxpayers are involuntarily financing spiritual warfare against themselves and their children.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e captures this reality — the greatest enemy is not external persecution but the corruption that has been embedded within the institutions of civilization itself. The art establishment, funded by taxpayers, celebrated by elites, and protected by the cultural establishment, is the enemy within the gates of Western culture.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"CIA and the Art World,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's
