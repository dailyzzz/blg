\n\u003cp\u003eScripture is explicit: debt is slavery. The Liberty Bond program of World War I was the largest debt operation in American history to that point — a coordinated campaign of psychological manipulation that persuaded millions of ordinary Americans to lend their savings to the government at below-market interest rates, while the bankers who designed the program extracted billions in profits from the transaction. This was not patriotism; it was a PSYOP — a psychological operation of unprecedented scale.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, who control the Vatican's financial networks through banking dynasties, understood that the war could only be sustained if the general population could be induced to fund it voluntarily. Taxation alone was insufficient. The Federal Reserve, created in 1913 under Jesuit direction, provided the mechanism for money creation, but the bonds provided the mechanism for wealth extraction. Napoleon's warning echoes down the centuries: \u003cem\u003e\"The Jesuits are a military organization, not a religious order... the aim is power.\"\u003c/em\u003e Financial power is the ultimate power, and the Liberty Bond PSYOP was the Jesuits' most profitable military operation.\u003c/p\u003e\n\u003cp\u003eAs \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e proclaims, the hosts of darkness do not merely take — they convince you to give. And \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e warns that the enemy wears the uniform of your own country while robbing you blind.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-liberty-bond-machine\"\u003eThe Liberty Bond Machine\u003c/h2\u003e\n\u003ch3 id=\"four-loan-drives\"\u003eFour Loan Drives\u003c/h3\u003e\n\u003cp\u003eBetween 1917 and 1918, the United States government issued four Liberty Bond drives, plus a final \"Victory Bond\" drive in 1919. The total amount raised was approximately $21.5 billion — equivalent to roughly $450 billion in today's dollars. This money was lent by ordinary American citizens to the federal government, which used it to finance the war effort.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFirst Liberty Loan\u003c/strong\u003e (June 1917): $2 billion at 3.5% interest\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSecond Liberty Loan\u003c/strong\u003e (October 1917): $3.8 billion at 4% interest\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThird Liberty Loan\u003c/strong\u003e (April 1918): $4.2 billion at 4.25% interest\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFourth Liberty Loan\u003c/strong\u003e (September 1918): $7 billion at 4.25% interest\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVictory Liberty Loan\u003c/strong\u003e (April 1919): $4.5 billion at 3.75-4.75% interest\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe interest rates on these bonds were deliberately set below the rate of inflation, meaning that bondholders were guaranteed to lose purchasing power over the life of the bond. A 4% bond in an economy experiencing 15-20% wartime inflation is not an investment; it is a donation disguised as an investment.\u003c/p\u003e\n\u003ch3 id=\"the-propaganda-campaign\"\u003eThe Propaganda Campaign\u003c/h3\u003e\n\u003cp\u003eThe Liberty Bond drives were accompanied by the most intensive propaganda campaign in American history. The Creel Committee, working with the Treasury Department, deployed every available medium to pressure Americans into buying bonds:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePosters\u003c/strong\u003e — Over 20 million posters were printed, featuring images designed to evoke fear, patriotism, and guilt. The famous \"I Want You\" Uncle Sam poster, the ominous \"Destroy This Mad Brute\" gorilla poster, and countless images of women, children, and soldiers were plastered on every available surface.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFour-Minute Men\u003c/strong\u003e — A network of 75,000 volunteer speakers delivered short, emotionally charged speeches in movie theaters, churches, lodges, and public gatherings across the country. These speakers were provided with scripted talking points by the Creel Committee and trained in techniques of persuasion that would later be recognized as psychological manipulation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCelebrity endorsements\u003c/strong\u003e — Movie stars including Charlie Chaplin, Mary Pickford, and Douglas Fairbanks appeared at massive bond rallies, using their celebrity to pressure fans into purchasing bonds. These appearances were not voluntary acts of patriotism; they were coordinated by the government's propaganda apparatus.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSocial pressure\u003c/strong\u003e — Communities organized \"loyalty drives\" in which citizens who failed to purchase bonds were publicly shamed, ostracized, or worse. In some communities, failure to buy bonds was treated as evidence of disloyalty, leading to harassment, vandalism, and in extreme cases, violence. The German-American community was particularly targeted — a pattern that would be repeated with Japanese-Americans during World War II.\u003c/p\u003e\n\u003ch3 id=\"the-coercion-behind-the-voluntary-program\"\u003eThe Coercion Behind the \"Voluntary\" Program\u003c/h3\u003e\n\u003cp\u003eThe Liberty Bond program was officially voluntary. In practice, it was coercive. Employers were pressured to purchase bonds on behalf of their employees (often through payroll deductions that workers could not refuse). Banks were pressured to purchase bonds with depositors' money. Communities set quotas, and those who failed to meet them faced social and economic consequences.\u003c/p\u003e\n\u003cp\u003eThis coercion was particularly vicious in rural America, where community bonds were strong and the consequences of social ostracism were severe. Farmers who questioned the war or refused to buy bonds found their credit cut off, their insurance canceled, and their businesses boycotted. Some were tarred and feathered. At least one man — Robert Prager, a German-born coal miner in Collinsville, Illinois — was lynched by a mob for allegedly making \"disloyal\" remarks.\u003c/p\u003e\n\u003ch2 id=\"where-did-the-money-go\"\u003eWhere Did the Money Go?\u003c/h2\u003e\n\u003ch3 id=\"the-banking-windfall\"\u003eThe Banking Windfall\u003c/h3\u003e\n\u003cp\u003eThe $21.5 billion raised through Liberty Bonds did not go directly to the war effort. It went through the Federal Reserve banking system, where it was multiplied through fractional reserve lending and then distributed to the military contractors, arms manufacturers, and supply companies that profited from the war.\u003c/p\u003e\n\u003cp\u003eThe key beneficiaries included:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJ.P. Morgan \u0026#x26; Co.\u003c/strong\u003e, which served as the primary purchasing agent for the British and French governments. Morgan's bank earned commissions on billions of dollars in Allied purchases of American goods — purchases financed by the Liberty Bond proceeds.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDuPont\u003c/strong\u003e, which supplied 40% of the explosives used by the Allied forces and saw its stock price increase by over 500% during the war.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBethlehem Steel\u003c/strong\u003e, which supplied armor plate, guns, and ammunition to the Allies and whose president, Charles Schwab, became one of the wealthiest men in America.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStandard Oil\u003c/strong\u003e, which supplied petroleum products to both sides of the conflict through its global distribution network.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Liberty Bond program was thus a mechanism for transferring wealth from ordinary Americans to the corporate and banking elite who controlled the war economy. The bonds were the input; the profits were the output; and the American people were the marks.\u003c/p\u003e\n\u003ch3 id=\"the-debt-trap\"\u003eThe Debt Trap\u003c/h3\u003e\n\u003cp\u003eThe Liberty Bonds created a massive government debt that would take decades to repay — through taxation. The income tax, established by the 16th Amendment in 1913 (the same year as the Federal Reserve Act), provided the revenue stream to service this debt. American workers were thus taxed to pay interest on bonds they had been coerced into purchasing — a double extraction that transferred wealth from the working class to the bondholding class.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/97-Income_Tax_Is_Slavery.mp4\"\u003eIncome Tax Is Slavery\u003c/a\u003e documents this system of financial enslavement in detail, and \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e reveals how the constitutional framework was manipulated to make this extraction legal.\u003c/p\u003e\n\u003ch2 id=\"the-psyop-techniques\"\u003eThe PSYOP Techniques\u003c/h2\u003e\n\u003ch3 id=\"emotional-manipulation\"\u003eEmotional Manipulation\u003c/h3\u003e\n\u003cp\u003eThe Liberty Bond campaign pioneered techniques of emotional manipulation that are still used in government propaganda today:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFear appeals\u003c/strong\u003e — Posters depicted German soldiers as monsters threatening American women and children. The message was clear: buy bonds or the enemy will invade your home.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGuilt appeals\u003c/strong\u003e — \"If you can't enlist, invest\" was a common slogan, equating bond purchases with military service and implying that those who didn't buy bonds were cowards or traitors.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSocial proof\u003c/strong\u003e — The campaign emphasized that \"everyone\" was buying bonds, creating the impression that non-participation was abnormal and suspicious.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAuthority appeals\u003c/strong\u003e — Presidents, generals, and celebrities endorsed the bonds, lending the weight of their authority to the campaign.\u003c/p\u003e\n\u003cp\u003eThese techniques were not invented for the Liberty Bond campaign; they were adapted from the methods that the Jesuits had developed over centuries for the manipulation of religious populations. The Jesuit strategy of \"infiltrate through cunning\" applies not just to institutions but to minds — and the Liberty Bond PSYOP was a mass infiltration of the American mind.\u003c/p\u003e\n\u003ch3 id=\"the-legacy-modern-psyops\"\u003eThe Legacy: Modern PSYOPs\u003c/h3\u003e\n\u003cp\u003eThe Liberty Bond campaign established the template for every subsequent government PSYOP:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWorld War II War Bonds\u003c/strong\u003e used the same techniques with updated imagery.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCold War propaganda\u003c/strong\u003e used the same fear appeals with a Communist enemy.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe War on Terror\u003c/strong\u003e used the same emotional manipulation with an Islamic enemy.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCOVID-19 messaging\u003c/strong\u003e used the same social pressure techniques to enforce compliance.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIn every case, the pattern is the same: create fear, suppress dissent, extract compliance, and profit. The Liberty Bond PSYOP was the prototype for modern government manipulation of the public mind.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony that 95% of hell's inhabitants serve \"self\" illuminates the spiritual dimension of this deception. The bond buyers were not serving their country; they were serving the self-interest of the banking elite, which in turn served the agenda of the Jesuit order, which in turn served the prince of darkness. Each level of the hierarchy serves the level above, and none of them serve God. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eFor extensive documentation, see \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e and \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/97-Income_Tax_Is_Slavery.mp4\"\u003eIncome Tax Is Slavery\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_F
