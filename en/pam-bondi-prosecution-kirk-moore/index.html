roubled.\" — 1 Peter 3:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Hebrew midwives Shiphrah and Puah were ordered by Pharaoh to kill every male child born to the Israelites. They refused. They defied the direct command of the most powerful ruler on earth because they feared God more than they feared Pharaoh. Scripture records that \"God dealt well with the midwives\" (Exodus 1:20) — not because they obeyed the law, but because they obeyed a higher law.\u003c/p\u003e\n\u003cp\u003eAs the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e reveals, every generation faces the same choice: obey the commands of a corrupt system or obey the commands of conscience. The curse of the serpent operates through systems that demand compliance with evil — and the first casualties of those systems are always those who refuse to comply.\u003c/p\u003e\n\u003cp\u003eDr. Kirk Moore is accused of providing patients with saline injections instead of COVID-19 vaccines, issuing vaccination cards to individuals who did not receive the actual product. The government calls it fraud. The question this article explores is whether the greater fraud was committed by the doctor who saved his patients from an experimental injection — or by the government that mandated it.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-case-against-dr-kirk-moore\"\u003eThe Case Against Dr. Kirk Moore\u003c/h2\u003e\n\u003cp\u003eDr. Kirk Moore, a family practice physician, was charged with federal crimes related to his alleged participation in a scheme to provide patients with saline injections rather than COVID-19 vaccines while issuing CDC vaccination record cards indicating that the patients had been vaccinated.\u003c/p\u003e\n\u003cp\u003eThe charges include conspiracy to defraud the United States, making false statements, and aiding individuals in obtaining fraudulent COVID-19 vaccination cards. The government alleges that Moore's actions undermined the national vaccination program, violated federal record-keeping requirements, and constituted wire fraud in connection with federal healthcare programs.\u003c/p\u003e\n\u003cp\u003eAttorney General Pam Bondi's decision to order the prosecution is significant because it occurs within an administration that has simultaneously:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTerminated Emergency Use Authorizations for COVID-19 vaccines\u003c/li\u003e\n\u003cli\u003ePulled $500 million in mRNA research funding\u003c/li\u003e\n\u003cli\u003eBanned gain-of-function research\u003c/li\u003e\n\u003cli\u003eInitiated the removal of CDC officials connected to pharmaceutical industry conflicts\u003c/li\u003e\n\u003cli\u003eSupported legislative efforts to reform the childhood vaccination schedule\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe apparent contradiction — prosecuting a physician for helping patients avoid a product that the administration itself has moved to restrict — has generated significant debate within both the medical freedom community and the legal establishment.\u003c/p\u003e\n\u003ch3 id=\"the-governments-position\"\u003eThe Government's Position\u003c/h3\u003e\n\u003cp\u003eThe government's position is that regardless of the merits or risks of COVID-19 vaccination, Dr. Moore violated federal law by issuing false vaccination records. The government argues that the integrity of medical record-keeping is a foundational requirement of the healthcare system, and that any physician who falsifies records — for any reason — commits a prosecutable offense.\u003c/p\u003e\n\u003cp\u003eThis position has internal logic. Medical records are legal documents. Their accuracy is essential to patient care, public health surveillance, and the functioning of the healthcare system. A physician who records a vaccination that did not occur creates a false record that could have downstream consequences for the patient's care and for epidemiological data.\u003c/p\u003e\n\u003ch3 id=\"the-defense-position\"\u003eThe Defense Position\u003c/h3\u003e\n\u003cp\u003eDr. Moore's defenders argue that the prosecution constitutes selective enforcement of federal law against a physician who acted in the best interest of his patients. The defense position rests on several arguments:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInformed consent was violated by the mandate system.\u003c/strong\u003e COVID-19 vaccine mandates compelled individuals to receive an experimental product as a condition of employment, education, or military service. This compulsion violated the Nuremberg Code, the Declaration of Helsinki, and federal informed consent requirements that mandate voluntary participation in medical interventions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe physician's oath supersedes regulatory compliance.\u003c/strong\u003e The Hippocratic oath — \"first, do no harm\" — requires physicians to prioritize patient welfare above all other considerations, including regulatory mandates. If a physician believed in good faith that the COVID-19 injection posed a greater risk to a specific patient than the disease it purported to prevent, the oath required the physician to act on that judgment.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe products themselves were fraudulently represented.\u003c/strong\u003e If the COVID-19 mRNA injections were materially misrepresented to the public — regarding their safety, their efficacy, their mechanism of action, or their biodistribution — then the original fraud was committed not by Dr. Moore but by the manufacturers and regulators who misrepresented the products.\u003c/p\u003e\n\u003cp\u003eKaren Kingston has written in The Kingston Report (karenkingston.substack.com): \"Dr. Kirk Moore is being prosecuted for protecting his patients from a product that the government itself is now acknowledging was inadequately tested, that the FDA's own data shows distributed throughout the body contrary to public representations, and that has generated hundreds of thousands of adverse event reports. The government is prosecuting a physician for doing what the government itself is now admitting should have been done — protecting people from a dangerous product.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-broader-legal-question\"\u003eThe Broader Legal Question\u003c/h2\u003e\n\u003cp\u003eThe Moore prosecution raises a question that transcends the specifics of his case: when a government mandates a medical intervention that is later shown to have been inadequately tested, misrepresented to the public, and responsible for widespread harm — do physicians who helped their patients avoid that intervention deserve prosecution or commendation?\u003c/p\u003e\n\u003cp\u003eThis question has historical precedent. During the Nuremberg trials following World War II, the defense of \"following orders\" was explicitly rejected. The Nuremberg Code, developed in response to Nazi medical experiments, established that:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eThe voluntary consent of the human subject is absolutely essential\u003c/li\u003e\n\u003cli\u003eThe experiment should be such as to yield fruitful results for the good of society, unprocurable by other methods or means of study\u003c/li\u003e\n\u003cli\u003eThe experiment should be so conducted as to avoid all unnecessary physical and mental suffering and injury\u003c/li\u003e\n\u003cli\u003eNo experiment should be conducted where there is an a priori reason to believe that death or disabling injury will occur\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eCOVID-19 vaccine mandates violated each of these principles. Consent was not voluntary — it was coerced through threat of job loss, educational exclusion, and military discipline. The experiments (clinical trials) were incomplete when the products were deployed. The products caused documented physical suffering and injury. And there was a priori reason to believe injury could occur, given the novel mechanism of action and the absence of long-term safety data.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/127-Operation_Midnight_Climax.mp4\"\u003eOperation Midnight Climax\u003c/a\u003e documents the historical pattern of government medical experimentation on unwitting populations — from MKUltra to the Tuskegee experiments — and the legal and moral frameworks developed in response. The COVID-19 mandate apparatus violated every one of those frameworks.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prophetic-dimension\"\u003eThe Prophetic Dimension\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Blessed are they which are persecuted for righteousness' sake: for theirs is the kingdom of heaven.\" — Matthew 5:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eScripture does not promise that the righteous will escape persecution. It promises that they will be blessed in their persecution — not by the systems of the world, but by God. Dr. Moore faces the judgment of man's law. Whether he faces the judgment of God depends not on whether he complied with federal record-keeping requirements but on whether he acted to protect the lives entrusted to his care.\u003c/p\u003e\n\u003cp\u003eThe Hebrew midwives falsified their records. They told Pharaoh that the Hebrew women gave birth before the midwives arrived. Scripture does not condemn them for the deception. It records that \"God dealt well with the midwives: and the people multiplied, and waxed very mighty\" (Exodus 1:20).\u003c/p\u003e\n\u003cp\u003eThe parallel is not perfect. But the principle is consistent: when a system demands participation in harm, those who refuse — even through deception — may stand in a different light before God than those who comply.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eUnited States v. Kirk Moore — Federal court filings and charging documents\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Karen Kingston's analysis of prosecution context, informed consent violations, and PREP Act implications\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eNuremberg Code (1947)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eDeclaration of Helsinki — World Medical Association\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e1 Peter 3:13-14, Matthew 5:10, Exodus 1:20 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/127-Operation_Midnight_Climax.mp4\"\u003eOperation Midnight Climax\u003c/a\u003e — Government medical experimentation on unwitting populations\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — The continuity of government programs that treat citizens as test subjects\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — The system that demands compliance and punishes conscience\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFrom the Confliction album (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e — Systems that demand compliance with evil\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/101-Fight_of_Faith.mp4\"\u003eFight of Faith\u003c/a\u003e — The cost of standing against institutional corruption\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/florida-criminal-charges-pfizer/?lang=en\"\u003eHow Florida Residents Can Bring Criminal Charges Against Pfizer\u003c/a\u003e — Legal strategies for holding manufacturers accountable\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/doctors-vacate-prep-act/?lang=en\"\u003eOver 100,000 Doctors Pave Way to Vacate PREP Act Immunity\u003c/a\u003e — The broader physician movement against pharmaceutical immunity\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/federal-government-pfizer-data-fraud/?lang=en\"\u003eIs It a Crime? Federal Government Assisted Pfizer in Data Fraud\u003c/a\u003e — The government's own participation in fraud\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pfizer-case-government-not-interested/?lang=en\"\u003eCourt Filing in Pfizer Case: Government NOT Interested in Justice\u003c/a\u003e — Selective prosecution in the pharmaceutical context\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eDr. Kirk Moore stands accused of fraud for issuing false vaccination records. The government that mandated the injections he helped his patients avoid now acknowledges the products were inadequately tested. The administration prosecuting him is simultaneously dismantling the program he undermined. The Hebrew midwives defied Pharaoh and God blessed them. Whether the courts of man will show the same discernment remains to be seen. \"When the righteous are in authority, the people rejoice: but when the wicked beareth rule, the people mourn\" (Proverbs 29:2). Dr. Moore acted according to his oath and his conscience. The question is not whether he broke the law — it is whether the law he broke deserved to be obeyed.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Pam Bondi Ordered Prosecution of Dr. Kirk Moore\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Attorney General Pam Bondi orders federal prosecution of Dr. Kirk Moore, raising questions about whether saving patients from mandated injections is a crime.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-14T10:00:00Z\",\"children\":\"May 14, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"Pam-Bondi\",{\"href\":\"/en/tag/Pam-Bondi/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"Pam-Bondi\"
