n\u003cp\u003eThe control of knowledge is the control of reality. Those who determine what is known — what appears in encyclopedias, textbooks, curricula, and reference works — determine what is real in the minds of the population. Skull and Bones, the Yale University secret society founded in 1832, has served as one of the primary instruments through which the Masonic-Jesuit elite has corrupted the information systems of the Western world. From the Encyclopedia Britannica to the American educational establishment, Skull and Bones members have infiltrated every institution that shapes public knowledge, ensuring that the official version of reality serves the interests of the hidden government.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony about the precision of demonic operations directly applies to the control of information. The demons he witnessed in the second heaven do not merely tempt individuals — they manage entire systems of deception, ensuring that the lies necessary for their operations are institutionalized, normalized, and defended by the very structures that claim to pursue truth. The 97.5% who walk the broad road do so in part because the information environment they inhabit has been deliberately corrupted — the encyclopedia they consult, the textbook they study, the expert they trust have all been shaped by networks that serve the adversary. As Pittman learned, words carry spiritual weight, and an entire civilization built on corrupted words is a civilization built on corrupted spiritual foundations.\u003c/p\u003e\n\u003cp\u003eThe Jesuit educational tradition, which has shaped Western intellectual life for five centuries, provided the model for Skull and Bones' approach to information control. Catholic Confidential describes how the Jesuits operate \"cloaked with cunning\" through educational institutions. Skull and Bones adapted this model to the American context, creating a network of Yale graduates who would populate the most influential positions in publishing, media, intelligence, and academia. The tracks \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e expose the spiritual mechanics of institutionalized deception.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-order-of-skull-and-bones\"\u003eThe Order of Skull and Bones\u003c/h2\u003e\n\u003ch3 id=\"origins-and-structure\"\u003eOrigins and Structure\u003c/h3\u003e\n\u003cp\u003eSkull and Bones, officially known as \"The Order of Skull and Bones\" or simply \"The Order,\" was founded at Yale University in 1832 by William Huntington Russell and Alphonso Taft. Russell had recently returned from studies in Germany, where he had been exposed to German secret society traditions — including, researchers believe, the remnants of the Bavarian Illuminati, which had been suppressed just fifty years earlier.\u003c/p\u003e\n\u003cp\u003eThe society taps fifteen Yale seniors each year in a ceremony of selection that has been conducted for nearly two centuries. Members are drawn from the most prominent American families — Bushes, Bundys, Harrimans, Whitneys, Walkers, and others — creating a multigenerational network of elites bound by shared secrets and mutual obligation. The society's headquarters, a windowless building on the Yale campus known as \"The Tomb,\" serves as the site of initiation rituals that reportedly include a mock death and resurrection — the same symbolic journey that characterizes Masonic initiation and, before it, the ancient mystery school tradition.\u003c/p\u003e\n\u003cp\u003eThe fifteen members selected each year form a bond that supersedes all other loyalties — family, party, country, religion. This is the Jesuit model of \"blind obedience\" applied to the American elite: members of the Order owe their primary allegiance to the Order itself, and this allegiance determines their actions throughout their subsequent careers in government, finance, media, intelligence, and academia.\u003c/p\u003e\n\u003ch3 id=\"the-german-connection\"\u003eThe German Connection\u003c/h3\u003e\n\u003cp\u003eThe German origins of Skull and Bones are critical to understanding its place in the broader network of secret societies. Germany in the early nineteenth century was the center of both Illuminist activity (despite the Bavarian suppression) and the Hegelian philosophical tradition that provided the intellectual framework for the dialectical methodology of the secret society network.\u003c/p\u003e\n\u003cp\u003eRussell's exposure to German secret society traditions during his studies abroad, and his subsequent creation of an American chapter, represents the transplantation of Illuminist methodology to American soil. The Order's structure, its emphasis on secrecy, its multigenerational recruitment strategy, and its placement of members in positions of institutional power all reflect the Illuminati model — adapted, like everything else in the American system, for the specific conditions of the New World.\u003c/p\u003e\n\u003cp\u003eThe Jesuit connection to German academia in the early nineteenth century was deep. The Jesuit order, formally suppressed until 1814 but operationally active throughout, maintained significant influence in German universities through former members who had retained their networks and methodologies. The secret society traditions that Russell encountered in Germany were thus shaped by Jesuit influence, even if that influence was not explicitly acknowledged.\u003c/p\u003e\n\u003ch2 id=\"corrupting-the-encyclopedia\"\u003eCorrupting the Encyclopedia\u003c/h2\u003e\n\u003ch3 id=\"the-britannica-operation\"\u003eThe Britannica Operation\u003c/h3\u003e\n\u003cp\u003eThe Encyclopedia Britannica — for two centuries the most authoritative English-language reference work in the world — was systematically corrupted by networks connected to Skull and Bones and allied secret societies. The corruption took multiple forms: the selection of contributors with approved perspectives, the editorial suppression of information that challenged the approved narrative, and the deliberate omission of topics and events that the hidden government wished to keep out of public awareness.\u003c/p\u003e\n\u003cp\u003eThe Britannica's ownership history reveals its connections to the networks of control. The encyclopedia passed through various owners, eventually coming under the control of the University of Chicago, which was founded with Rockefeller money and has served as a center of establishment intellectual production. The editorial decisions that shaped what millions of readers understood as \"objective knowledge\" were made within institutional frameworks connected to the same financial, academic, and secret society networks that controlled the political system.\u003c/p\u003e\n\u003cp\u003eThe corruption of encyclopedias is not a minor matter — it is the corruption of the foundational knowledge upon which all other understanding is built. When the encyclopedia that defines terms, establishes facts, and provides historical narratives is itself compromised, every conclusion drawn from its contents is potentially flawed. The entire intellectual framework of Western civilization has been built, in part, on reference works shaped by the interests of those who controlled them.\u003c/p\u003e\n\u003ch3 id=\"the-textbook-pipeline\"\u003eThe Textbook Pipeline\u003c/h3\u003e\n\u003cp\u003eSkull and Bones' influence extended beyond encyclopedias into the textbook industry that shaped the education of millions of American students. Members of the Order and their networks occupied positions on publishing company boards, university faculties, and educational policy committees that determined what would be taught and how.\u003c/p\u003e\n\u003cp\u003eThe result was a system of education that systematically excluded information about the very networks that controlled it. Students learned about democracy without learning about its Masonic origins. They learned about the Constitution without learning about its hidden provisions. They learned about American history without learning about the secret societies that shaped it. The textbooks that formed their understanding of reality were designed to produce citizens who would accept the official narrative without question — the educational equivalent of the 95% who serve \"self\" without knowing it.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/211-Total_Information_Awareness.mp4\"\u003eTotal Information Awareness\u003c/a\u003e examines the modern evolution of this information control system — from print encyclopedias and textbooks to digital platforms that can adjust the informational environment in real time. The corruption of the encyclopedia was the analog precursor to the algorithmic manipulation of knowledge that characterizes the digital age.\u003c/p\u003e\n\u003ch2 id=\"the-intelligence-pipeline\"\u003eThe Intelligence Pipeline\u003c/h2\u003e\n\u003ch3 id=\"from-yale-to-langley\"\u003eFrom Yale to Langley\u003c/h3\u003e\n\u003cp\u003eSkull and Bones has been the primary feeder of personnel into the American intelligence community since the CIA's founding. The CIA itself was built on the foundation of the Office of Strategic Services (OSS), which recruited heavily from Yale and other Ivy League institutions during World War II. The culture, methodology, and personnel of the American intelligence community bear the unmistakable imprint of the Yale secret society network.\u003c/p\u003e\n\u003cp\u003eNotable Bonesmen in the intelligence community include:\u003c/p\u003e\n\u003cp\u003eJames Jesus Angleton, the legendary CIA counterintelligence chief whose paranoid management of the Agency shaped its culture for decades. George H.W. Bush, CIA Director and later President of the United States. William Bundy and McGeorge Bundy, who shaped American foreign policy during the Vietnam era. William Sloane Coffin, who served in the CIA before becoming a prominent clergyman. The list extends across decades and administrations, creating a continuity of secret society influence within the most powerful intelligence apparatus in the world.\u003c/p\u003e\n\u003cp\u003eThis pipeline ensures that the CIA's culture, priorities, and operational methodology align with the objectives of the Order and the broader network of secret societies it serves. Intelligence operations that might expose the network are suppressed. Operations that advance its objectives are prioritized. The Agency functions not as a servant of the American people but as an instrument of the Order — gathering intelligence, conducting covert operations, and managing the information environment in ways that serve the hidden government.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e documents intelligence programs that exemplify this relationship. MKUltra was not an aberration — it was the product of an intelligence culture shaped by secret society values, in which human beings are instruments to be used and the pursuit of power justifies any methodology.\u003c/p\u003e\n\u003ch3 id=\"the-media-pipeline\"\u003eThe Media Pipeline\u003c/h3\u003e\n\u003cp\u003eAlongside the intelligence pipeline, Skull and Bones maintained a media pipeline that ensured favorable coverage for members and suppression of unfavorable information about the Order and its activities. Bonesmen have occupied leadership positions at major media organizations, publishing houses, and broadcasting companies, creating a network of media control that parallels and reinforces the intelligence community's Operation Mockingbird.\u003c/p\u003e\n\u003cp\u003eThe media pipeline ensures that the official narrative — the version of reality approved by the Order — is consistently promoted across all major outlets. Dissenting voices are marginalized, discredited, or simply denied access to platforms. The result is an information environment that appears free and diverse but is actually carefully managed to maintain the illusion of open discourse while controlling its boundaries.\u003c/p\u003e\n\u003ch2 id=\"the-academic-network\"\u003eThe Academic Network\u003c/h2\u003e\n\u003ch3 id=\"shaping-the-minds-that-shape-the-world\"\u003eShaping the Minds That Shape the World\u003c/h3\u003e\n\u003cp\u003eSkull and Bones' most enduring influence has been through the academic institutions its members have shaped. Yale itself — one of the most prestigious universities in the world — has served as the Order's home base, producing the scholars, administrators, and public intellectuals who define the boundaries of acceptable discourse.\u003c/p\u003e\n\u003cp\u003eThe Order's influence extends beyond Yale to the broader network of elite universities that constitute the American academic establishment. Through funding, faculty appointments, editorial positions, and policy influence, Bonesmen and their allies have shaped the academic disciplines that define modern knowledge — history, political science, economics, psychology, and the natural sciences.\u003c/p\u003e\n\u003cp\u003eThe result is an academic establishment that treats the official narrative as objective knowledge while treating challenges to that narrative as conspiracy theory, pseudoscience, or extremism. The boundaries of acceptable academic discourse are policed not by evidence but by institutional power — and that institutional power is controlled by networks that include Skull and Bones as one of their most important nodes.\u003c/p\u003e\n\u003ch3 id=\"the-foundation-connection\"\u003eThe Foundation Connection\u003c/h3\u003e\n\u003cp\u003eThe major philanthropic foundations — Rockefeller, Ford, Carnegie, and others — have served as the funding mechanisms through which the academic establishment is controlled. These foundations, many of which were established by families connected to Skull and Bones and allied networks, direct billions of dollars to universities, research centers, and policy institutes. The conditions attached to this funding ensure that the research produced serves the interests of the funders — which are the interests of the hidden government.\u003c/p\u003e\n\u003cp\u003eThe Reece Committee, a Congressional investigation conducted in 1954, documented the systematic use of foundation funding to shape American education and academic research. The committee's findings — that major foundations were using their tax-exempt resources to promote specific political and social agendas — were suppressed and ignored. The foundations continued their operations unimpeded, and the academic establishment they fund continues to produce the \"knowledge\" that maintains the illusion.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"knowledge-as-power-and-weapon\"\u003eKnowledge as Power and Weapon\u003c/h3\u003e\n\u003cp\u003eThe corruption of knowledge is a spiritual act with spiritual consequences. Proverbs 1:7 declares that \"the fear of the Lord is the beginning of knowledge.\" When knowledge is divorced from the fear of the Lord — when it is constructed according to materialist, occult, or ideological principles rather than divine truth — it becomes not wisdom but foolishness, not illumination but deception.\u003c/p\u003e\n\u003cp\u003eThe encyclopedia, the textbook, the academic journal — these are the modern equivalents of the sacred texts of previous civilizations. They define what is true, what is real, and what is possible. When they are corrupted, the entire framework of understanding is corrupted. The civilization that builds on corrupted knowledge builds on sand, and when the storms come, it falls.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's revelation that words are spiritual — that every utterance carries weight in the spiritual realm — applies with particular force to the words published in reference works, textbooks, and academic publications. These words shape the consciousness of millions, and their corruption is not merely an intellectual crime but a spiritual one. Every false entry in an encyclopedia, every misleading chapter in a textbook, every ideologically driven academic paper is a spiritual weapon deployed against the souls of those who trust it.\u003c/p\u003e\n\u003cp\u003eMatthew 12:36-37 warns that every idle word will be judged. The words published by the corrupted information systems — the deliberate lies, the strategic omissions, the ideological distortions — will be judged as well. The Bonesmen who shaped these systems, the Jesuits who provided the model, and the demonic hierarchy that directed the operation will all give account for the corruption of knowledge that has led millions astray.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e reveals the spiritual methodology of information corruption — the disguising of lies as truth, the presentation of deception as knowledge, the transformation of spiritual poison into intellectual nourishment.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"Skull and Bones Exposed,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/211-Total_Information_Awareness.mp4\"\u003eTotal Information Awareness\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/jupiter-baphomet-washington-dc-part8/?lang=en\"\u003eJupiter, Baphomet, and THE RISE OF WASHINGTON DC Part 8\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/illuminati-final-chapter/?lang=en\"\u003eIlluminati: THE FINAL CHAPTER Part 10\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/illusion-illuminati-masons-part4/?lang=en\"\u003eWas It All AN ILLUSION: Illuminati and Masons Exposed Part 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eSkull and Bones did not merely corrupt an encyclopedia — they corrupted the entire framework of knowledge upon which Western civilization understands itself. From the textbooks that shape young minds to the intelligence agencies that shape national policy to the media outlets that shape public perception, the Order's influence extends through every institution that determines what is known and what is hidden. The corruption of knowledge is the ultimate instrument of control, because those who do not know are enslaved by their ignorance while believing themselves free. The bones in the tomb are not merely symbols — they are the remains of truth, buried by those who understood that controlling knowledge means controlling everything.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Skull and Bones: Corrupting the Encyclopedia and Beyond Part 9\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"How Skull and Bones corrupted academia, encyclopedias, and information systems to control public knowledge and advance Jesuit-aligned secret society goals.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTi
