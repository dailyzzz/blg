"\u003c/em\u003e (Luke 8:17, KJV). The buried buildings scattered across every inhabited continent serve as silent witnesses to a history that powerful institutions have labored to erase. Like the Confliction track \"The Deceivers Lies\" reminds us, the web of deception stretches far deeper than most dare to imagine, and the physical evidence lies beneath our very feet.\u003c/p\u003e\n\u003cp\u003eThe prophet Isaiah warned that entire civilizations would be brought low: \u003cem\u003e\"And thou shalt be brought down, and shalt speak out of the ground, and thy speech shall be low out of the dust\"\u003c/em\u003e (Isaiah 29:4). This is not merely poetic language. Across the globe, grand structures that once stood tall now speak from beneath layers of earth, sediment, and official denial. As \"The First Darkness\" from the Confliction album evokes, something was concealed at the very foundations of the world we think we know.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"introduction-when-the-ground-tells-a-different-story\"\u003eIntroduction: When the Ground Tells a Different Story\u003c/h2\u003e\n\u003cp\u003eWalk through any major European city and you will notice something peculiar if you pay attention. The ground-floor windows of older buildings are partially or entirely below street level. Doors that once served as main entrances now lead to basements. Ornate facades that were clearly designed to be admired from the street are half-swallowed by the earth. The official explanation is almost always the same: \"the street level was raised,\" or \"the building settled over time,\" or some variation of urban development theory.\u003c/p\u003e\n\u003cp\u003eBut when this phenomenon appears in Moscow, St. Petersburg, Edinburgh, Portland, Seattle, Rome, Istanbul, and hundreds of other cities simultaneously, the comfortable explanations begin to crumble. What kind of \"urban development\" buries first floors across multiple continents at roughly the same historical period? What force of nature or program of civic improvement could account for meters upon meters of sediment covering buildings that, by all architectural evidence, were designed to stand fully above ground?\u003c/p\u003e\n\u003cp\u003eThese are the questions that mainstream historians refuse to address honestly. And the answers, as documented extensively by researchers like Agent131711 on Substack (agent131711.substack.com), point to a catastrophic event, or series of events, that was systematically scrubbed from the historical record.\u003c/p\u003e\n\u003ch2 id=\"the-mud-flood-hypothesis-more-than-just-a-theory\"\u003eThe Mud Flood Hypothesis: More Than Just a Theory\u003c/h2\u003e\n\u003ch3 id=\"what-the-evidence-shows\"\u003eWhat the Evidence Shows\u003c/h3\u003e\n\u003cp\u003eThe term \"mud flood\" has become a catch-all for the phenomenon of buried architecture, but the reality is likely more complex than a single event. The evidence suggests massive deposits of fine sediment, sometimes mixed with clay, sometimes with volcanic-like material, covering structures that were clearly built to full height and designed to be seen.\u003c/p\u003e\n\u003cp\u003eIn city after city, the pattern repeats. When excavations are conducted for new construction, workers discover that what everyone assumed was the original ground floor is actually the second or third story. Below lies additional architecture, complete with windows, doors, decorative elements, and sometimes entire rooms that were never designed to be underground.\u003c/p\u003e\n\u003cp\u003eConsider the city of Portland, Oregon. The so-called \"Shanghai Tunnels\" beneath the city are presented to tourists as a network of underground passages used for kidnapping sailors in the 19th century. But a closer examination reveals something far more interesting. These \"tunnels\" include rooms with finished walls, proper doorways, and architectural details that make no sense for a hastily dug smuggling network. They appear to be the ground floors and basements of buildings that once stood at a much lower street level.\u003c/p\u003e\n\u003ch3 id=\"the-scale-of-the-phenomenon\"\u003eThe Scale of the Phenomenon\u003c/h3\u003e\n\u003cp\u003eWhat makes the buried building phenomenon so compelling is its global scope. This is not isolated to one region or one geological context. Researchers have documented partially buried structures on every inhabited continent:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRussia\u003c/strong\u003e: Entire neighborhoods in cities like Tobolsk, Kazan, and Omsk show clear evidence of buried first floors. In some cases, buildings have been excavated to reveal two or more stories below current ground level.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEurope\u003c/strong\u003e: From Edinburgh's underground city to Rome's layered archaeology, the pattern is unmistakable. Many medieval and Renaissance buildings across the continent show signs of significant burial.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNorth America\u003c/strong\u003e: Cities across the United States, from the East Coast to the West, contain buried architecture. The phenomenon is particularly well-documented in cities that experienced rapid \"rebuilding\" in the late 19th century.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTurkey and the Middle East\u003c/strong\u003e: Derinkuyu and other underground cities in Cappadocia, while often attributed to early Christians seeking refuge, display architectural sophistication that raises serious questions about their true origins.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"official-explanations-and-their-failures\"\u003eOfficial Explanations and Their Failures\u003c/h2\u003e\n\u003ch3 id=\"the-street-level-rising-defense\"\u003eThe \"Street Level Rising\" Defense\u003c/h3\u003e\n\u003cp\u003eThe most common official explanation for buried buildings is that cities deliberately raised their street levels over time. In some cases, like Seattle, this is presented as historical fact. After the Great Seattle Fire of 1889, the city did indeed raise the street level in certain areas. But this explanation only deepens the mystery rather than resolving it.\u003c/p\u003e\n\u003cp\u003eIf you raise the street level of a city, you are effectively burying the ground floors of all existing buildings. This is an enormously expensive and disruptive undertaking. Why would city after city, in different countries, speaking different languages, under different governments, all decide to do the same thing at roughly the same historical period? The standard answer involves sewage, flooding prevention, or modernization. But these explanations fail to account for the uniformity of the phenomenon across vastly different geographical and political contexts.\u003c/p\u003e\n\u003ch3 id=\"the-accumulated-debris-theory\"\u003eThe \"Accumulated Debris\" Theory\u003c/h3\u003e\n\u003cp\u003eAnother explanation offered is that centuries of human activity simply accumulate debris that gradually raises the ground level. Broken pottery, construction waste, organic matter, and dust are said to build up layer by layer until former ground floors become basements.\u003c/p\u003e\n\u003cp\u003eWhile there is some truth to the idea that human habitation creates debris layers, the rate of accumulation observed in archaeological contexts is typically measured in centimeters per century, not the meters of covering found on many buried buildings. A building buried under two or three meters of sediment would require thousands of years of gradual accumulation by this model, yet many of the buried structures date to periods well within the last few centuries.\u003c/p\u003e\n\u003ch3 id=\"what-they-cannot-explain\"\u003eWhat They Cannot Explain\u003c/h3\u003e\n\u003cp\u003eWhat no official theory adequately explains is the consistency of the sediment itself. In many locations, the material covering buried buildings is remarkably uniform: a fine, clay-like substance that does not match the expected composition of construction debris or natural soil accumulation. It looks, in many cases, far more like the kind of deposit left by a massive water-borne event, a flood carrying enormous quantities of fine sediment.\u003c/p\u003e\n\u003cp\u003eThe Book of Genesis, of course, records just such an event. While the biblical Flood is typically placed in the distant past, the physical evidence of buried buildings suggests that catastrophic flooding events may have occurred more recently than the official timeline allows. As Ecclesiastes 1:9 tells us: \u003cem\u003e\"The thing that hath been, it is that which shall be; and that which is done is that which shall be done: and there is no new thing under the sun.\"\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"case-studies-in-buried-architecture\"\u003eCase Studies in Buried Architecture\u003c/h2\u003e\n\u003ch3 id=\"the-tobolsk-kremlin-russia\"\u003eThe Tobolsk Kremlin, Russia\u003c/h3\u003e\n\u003cp\u003eThe Tobolsk Kremlin in Siberia is one of the most striking examples of buried architecture. This massive stone fortress, which officially dates to the late 17th and early 18th centuries, shows unmistakable signs of significant burial. Windows that were clearly designed to admit light and air now sit at or below ground level. Staircases lead down to what appear to be buried entrances. The official explanation attributes this to the natural settling of the building on soft Siberian soil, but the pattern is too consistent and too widespread to be explained by localized geological conditions.\u003c/p\u003e\n\u003ch3 id=\"edinburghs-underground-city\"\u003eEdinburgh's Underground City\u003c/h3\u003e\n\u003cp\u003eBeneath the streets of Edinburgh, Scotland, lies an extensive network of chambers, corridors, and rooms known as the South Bridge Vaults. Built in the late 18th century as part of the South Bridge construction, these spaces were officially used for storage and workshops before being \"abandoned\" and sealed. But the architectural quality of these underground spaces far exceeds what would be expected for mere storage. Vaulted ceilings, finished walls, and careful stonework suggest these were originally above-ground or at-grade structures that were subsequently buried.\u003c/p\u003e\n\u003ch3 id=\"the-cathedral-enigma\"\u003eThe Cathedral Enigma\u003c/h3\u003e\n\u003cp\u003ePerhaps the most provocative examples of buried architecture involve churches and cathedrals. Across Europe and beyond, researchers have documented numerous religious buildings whose original ground floors now lie meters below the current street level. In some cases, what tourists visit as the \"main floor\" of a cathedral was actually an upper story, with the original nave and sanctuary buried beneath.\u003c/p\u003e\n\u003cp\u003eThis pattern raises profound questions. If these buildings were constructed by the civilization we are told built them, using the methods we are told they used, why are they buried? Medieval and Renaissance builders were not amateurs. They understood foundations, drainage, and ground stability. They did not design grand cathedrals with the expectation that the ground floor would be swallowed by the earth within a few centuries.\u003c/p\u003e\n\u003ch2 id=\"the-reset-timeline\"\u003eThe Reset Timeline\u003c/h2\u003e\n\u003ch3 id=\"what-happened-and-when\"\u003eWhat Happened and When\u003c/h3\u003e\n\u003cp\u003eThe evidence of buried buildings, taken together with other anomalies in the historical record, suggests a major catastrophic event or series of events occurred sometime between the 17th and 19th centuries. This event deposited massive quantities of sediment across vast areas, partially or fully burying existing structures. Following this event, a concerted effort was made to either explain away the damage or simply build on top of the buried remains.\u003c/p\u003e\n\u003cp\u003eAgent131711's extensive research on Substack (agent131711.substack.com) has documented numerous instances where the official historical narrative contains gaps, contradictions, and impossibilities that align with the hypothesis of a deliberate cover-up. Buildings attributed to certain builders using certain methods at certain dates simply do not match the physical evidence.\u003c/p\u003e\n\u003ch3 id=\"the-rebuilding-narrative\"\u003eThe Rebuilding Narrative\u003c/h3\u003e\n\u003cp\u003eOne of the most suspicious aspects of the official history is the sheer volume of \"rebuilding\" that allegedly occurred in the 18th and 19th centuries. City after city has an official history that includes devastating fires, followed by rapid and impressive rebuilding campaigns. Chicago, San Francisco, London, Moscow, and dozens of other major cities all experienced catastrophic fires followed by seemingly miraculous reconstruction.\u003c/p\u003e\n\u003cp\u003eBut what if some of these cities were not \"rebuilt\" at all? What if they were excavated and repurposed? The buried architecture suggests that in many cases, the buildings were already there, covered by sediment from a catastrophic event. The \"rebuilding\" narrative would then serve as a convenient explanation for how these structures came to exist, obscuring their true, pre-catastrophe origins.\u003c/p\u003e\n\u003ch2 id=\"the-firmament-connection\"\u003eThe Firmament Connection\u003c/h2\u003e\n\u003cp\u003eThe biblical account of creation describes a firmament, a solid dome-like structure separating the waters above from the waters below (Genesis 1:6-8). This is not the vague, poetic metaphor that modern theologians try to make it. The Hebrew word \"raqia\" literally means something beaten out, hammered, spread firm. Job 37:18 asks: \u003cem\u003e\"Hast thou with him spread out the sky, which is strong, and as a molten looking glass?\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eIf the earth exists under a solid, dome-like firmament as Scripture describes, then the catastrophic flooding events that buried these buildings take on a different character entirely. Water contained within a closed system, whether from above the firmament or from the \"fountains of the great deep\" (Genesis 7:11), could produce exactly the kind of sediment-laden flooding that the physical evidence suggests.\u003c/p\u003e\n\u003cp\u003eThis understanding also connects to the broader pattern of deception that characterizes the modern era. The same institutions that promote a globe spinning through infinite space are the ones that control the historical narrative. If they lied about the shape and nature of the earth, why would they tell the truth about its history?\u003c/p\u003e\n\u003ch2 id=\"the-evidence-they-cannot-hide\"\u003eThe Evidence They Cannot Hide\u003c/h2\u003e\n\u003ch3 id=\"photographs-that-contradict-the-timeline\"\u003ePhotographs That Contradict the Timeline\u003c/h3\u003e\n\u003cp\u003eOne of the most powerful categories of evidence comes from early photography. Photographs from the mid-to-late 19th century frequently show buildings in states of partial burial that are difficult to reconcile with the official timeline. Buildings supposedly constructed just decades earlier appear to have their lower stories submerged in soil. Streets that were allegedly \"raised\" show no signs of the massive engineering projects that such an undertaking would require.\u003c/p\u003e\n\u003ch3 id=\"archaeological-discoveries\"\u003eArchaeological Discoveries\u003c/h3\u003e\n\u003cp\u003eDespite the best efforts of institutional gatekeepers, archaeological discoveries continue to reveal the extent of buried architecture. Every major construction project in an old city risks uncovering evidence that contradicts the accepted narrative. In most cases, such discoveries are quietly documented, attributed to some innocuous explanation, and forgotten. But the cumulative weight of these discoveries tells a story that cannot be ignored indefinitely.\u003c/p\u003e\n\u003ch3 id=\"the-architectural-evidence\"\u003eThe Architectural Evidence\u003c/h3\u003e\n\u003cp\u003eThe buildings themselves provide perhaps the strongest evidence. Architectural elements that were designed to be seen from street level now sit underground. Decorative facades face solid earth. Windows that were meant to admit light open onto dirt. These are not accidents of construction or natural settling. They are the signatures of a catastrophic event followed by a deliberate cover-up.\u003c/p\u003e\n\u003ch2 id=\"why-the-cover-up\"\u003eWhy the Cover-Up?\u003c/h2\u003e\n\u003cp\u003eThe question of why such a catastrophic event would be concealed is perhaps the most important question of all. The answer, like so many answers in hidden history, comes down to power and control.\u003c/p\u003e\n\u003cp\u003eA civilization that does not know its true history is a civilization that can be controlled. If the population understood that a great and sophisticated civilization existed before the current one, that it was destroyed by catastrophic events, and that the current power structure was built on its ruins, the entire framework of modern authority would be called into question.\u003c/p\u003e\n\u003cp\u003eAs the Proverbs tell us: \u003cem\u003e\"It is the glory of God to conceal a thing: but the honour of kings is to search out a matter\"\u003c/em\u003e (Proverbs 25:2). The buried buildings are a concealed truth, hidden in plain sight, waiting for those with eyes to see and the courage to investigate.\u003c/p\u003e\n\u003cp\u003eThe institutions that control the historical narrative, from universities to museums to government agencies, have a vested interest in maintaining the current version of events. Admitting that entire cities were buried by a catastrophic event within the last few centuries would unravel not just the historical timeline, but the authority of every institution that depends on that timeline for its legitimacy.\u003c/p\u003e\n\u003ch2 id=\"the-scriptural-framework\"\u003eThe Scriptural Framework\u003c/h2\u003e\n\u003cp\u003eScripture provides a framework for understanding not just what happened, but why it matters. The Bible records multiple instances of civilizations being destroyed by divine judgment: the Flood of Noah, the destruction of Sodom and Gomorrah, the plagues of Egypt. In each case, the destruction served a purpose: the judgment of wickedness and the preservation of a remnant.\u003c/p\u003e\n\u003cp\u003eThe buried buildings may represent evidence of a similar pattern: a great civilization brought low by catastrophic judgment, followed by a new order built on its ruins. The architects of this new order, rather than acknowledging the truth, chose to fabricate a history that served their interests and obscured their origins.\u003c/p\u003e\n\u003cp\u003eAs we approach what many believe to be the end of the current age, the truth is emerging from the ground, literally and figuratively. The buried buildings are speaking, just as Isaiah prophesied, from the dust. And their testimony contradicts everything we have been told.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThis article draws on research originally published by Agent131711 on Substack (agent131711.substack.com), as well as primary source documents, photographic evidence, and architectural analysis. The buried buildings phenomenon represents one of the most significant and under-investigated anomalies in the historical record.\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https
