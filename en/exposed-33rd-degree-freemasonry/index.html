themselves among themselves, are not wise.\" — 2 Corinthians 10:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe 33rd Degree of the Scottish Rite of Freemasonry — the Sovereign Grand Inspector General — represents the publicly acknowledged apex of the most widely practiced Masonic system in the world. The Knight Commander of the Court of Honour (KCCH), the honor bestowed upon those being prepared for the 33rd Degree, serves as the final filter through which candidates pass before entering the innermost circle of Masonic authority. Together, these distinctions define the elite of the elite — the individuals who possess the fullest knowledge of the Masonic system's true purposes and who exercise the greatest authority within its global network.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's near-death experience revealed a spiritual hierarchy of precise organization — each level possessing more authority and more knowledge than the level below it. The 33rd Degree system mirrors this demonic hierarchy with remarkable precision. The lower degrees know only what they have been told; the higher degrees know more; and the 33rd Degree possesses the fullest understanding available within the system. Pittman's warning that 97.5% walk the broad road applies to the Masonic system as well: the vast majority of Masons never advance beyond the first three degrees and genuinely believe that Freemasonry is a benevolent fraternal organization. Only those who reach the 33rd Degree encounter the full truth — and by then, they are too deeply committed to turn back.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order's relationship to the highest levels of Freemasonry is the deepest secret of both organizations. Catholic Confidential reveals that the Jesuits operate \"cloaked with cunning\" through every institution they infiltrate, and the Scottish Rite — despite the Catholic Church's public condemnation of Freemasonry — has been penetrated by Jesuit operatives since at least the eighteenth century. Napoleon's assessment that the Jesuits' aim is power finds its ultimate expression in the 33rd Degree, where Jesuit-influenced theology and Masonic organizational power converge. The tracks \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e reveal the spiritual forces that operate at the apex of the Masonic pyramid.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"understanding-the-degree-structure\"\u003eUnderstanding the Degree Structure\u003c/h2\u003e\n\u003ch3 id=\"the-three-bodies-of-the-scottish-rite\"\u003eThe Three Bodies of the Scottish Rite\u003c/h3\u003e\n\u003cp\u003eThe Scottish Rite of Freemasonry is organized into three principal bodies, each governing a range of degrees:\u003c/p\u003e\n\u003cp\u003eThe Lodge of Perfection governs the 4th through 14th degrees, which elaborate on the themes of Craft Masonry (the first three degrees) and develop the candidate's understanding of Masonic philosophy through the lens of the Hebrew temple tradition and the legend of Hiram Abiff.\u003c/p\u003e\n\u003cp\u003eThe Chapter of Rose Croix governs the 15th through 18th degrees, culminating in the Rose Croix degree discussed in Part 1 of this series. These degrees introduce explicitly Christological symbolism — reinterpreted within the Masonic framework — and mark the transition from philosophical Masonry to mystical Masonry.\u003c/p\u003e\n\u003cp\u003eThe Consistory governs the 19th through 32nd degrees, which progressively reveal the political, military, and philosophical dimensions of the Masonic system. The 32nd Degree — Master of the Royal Secret — brings the candidate to the threshold of the system's innermost circle. The \"Royal Secret\" to which this degree alludes is the culmination of the knowledge progressively revealed through all preceding degrees.\u003c/p\u003e\n\u003cp\u003eThe 33rd Degree exists outside this three-body structure. It is not earned through the normal progression but is conferred by invitation — a distinction that makes it fundamentally different from all other degrees. While any Master Mason in good standing can petition for the Scottish Rite degrees and, with persistence, advance through the 32nd Degree, the 33rd Degree is available only to those selected by the Supreme Council. This selection process is the final filter, ensuring that only those who have demonstrated complete alignment with the system's true purposes are admitted to its highest level.\u003c/p\u003e\n\u003ch3 id=\"the-kcch-the-final-filter\"\u003eThe KCCH: The Final Filter\u003c/h3\u003e\n\u003cp\u003eThe Knight Commander of the Court of Honour is the distinction that precedes the 33rd Degree in the selection process. A Mason who receives the KCCH has been identified by the Supreme Council as a candidate for eventual elevation to the 33rd Degree, though not all KCCH recipients ultimately receive the honor. The KCCH serves as a probationary period during which the candidate's commitment, discretion, and alignment with the system's objectives are evaluated.\u003c/p\u003e\n\u003cp\u003eThe KCCH designation is itself a signal within the Masonic network. A Mason who wears the KCCH jewel — a red cross with a teutonic cross at its center — is identified to other initiates as someone who has been selected for the highest level of the system. This identification enables the KCCH recipient to participate in conversations, relationships, and activities that are closed to lower-degree Masons, providing a taste of the access and influence that the 33rd Degree will fully unlock.\u003c/p\u003e\n\u003cp\u003eThe selection criteria for the KCCH are not publicly disclosed. The Supreme Council's evaluation process is conducted in secrecy, and the factors that determine selection — beyond the publicly stated criteria of service to the Rite and the community — are known only to those who participate in the selection. This secrecy ensures that the criteria serve the system's true purposes rather than its public image.\u003c/p\u003e\n\u003ch2 id=\"the-33rd-degree-revealed\"\u003eThe 33rd Degree Revealed\u003c/h2\u003e\n\u003ch3 id=\"what-the-highest-degree-contains\"\u003eWhat the Highest Degree Contains\u003c/h3\u003e\n\u003cp\u003eThe 33rd Degree ceremony — the Sovereign Grand Inspector General degree — is conducted in private by members of the Supreme Council. The ceremony's content, while variations have been published by former members and investigators, is guarded by the same oaths of secrecy that bind all Masonic degrees, with the additional weight of being the system's most sacred ceremony.\u003c/p\u003e\n\u003cp\u003eThe ceremony involves the conferral of authority — the 33rd Degree Mason is invested with the power to govern the Rite within his jurisdiction, to participate in the selection of future 33rd Degree recipients, and to access the system's deepest knowledge. The philosophical content of the degree, as described by those who have documented it, involves the explicit revelation of doctrines that are only hinted at in lower degrees.\u003c/p\u003e\n\u003cp\u003eThe most significant of these revelations concerns the identity of the deity served by the Masonic system. At the lower degrees, the deity is identified as the \"Great Architect of the Universe\" — a generic concept compatible with any monotheistic tradition. At the 33rd Degree, according to multiple witnesses, the deity is more specifically identified. Albert Pike's published works provide the framework: the Masonic deity is the principle of light — not the Christian God, but the light-bearer, Lucifer, understood not as the devil of Christian theology but as the bringer of wisdom and illumination who was unjustly vilified by a jealous God.\u003c/p\u003e\n\u003cp\u003eThis revelation is the culmination of the progressive disclosure that characterizes the entire degree system. The lower-degree Mason who believes he serves the God of his faith discovers, at the highest level, that he has been serving a different deity entirely. By the time this revelation occurs, the Mason has been so thoroughly conditioned — through years of progressive initiation, increasing commitment, and deepening involvement — that acceptance is far more likely than rejection.\u003c/p\u003e\n\u003ch3 id=\"the-power-of-the-33rd-degree\"\u003eThe Power of the 33rd Degree\u003c/h3\u003e\n\u003cp\u003eThe authority conferred by the 33rd Degree is not merely ceremonial — it is operational. 33rd Degree Masons occupy positions of influence throughout the political, financial, military, intelligence, and religious establishments of every Western nation. Their Masonic connections provide a parallel authority structure that operates alongside — and often supersedes — the formal authority of the institutions they serve.\u003c/p\u003e\n\u003cp\u003eA 33rd Degree Mason serving as a judge brings to the bench an obligation to his Masonic brethren that supersedes his obligation to the law. A 33rd Degree Mason serving in government brings to his office an allegiance to the Masonic agenda that supersedes his allegiance to his constituents. A 33rd Degree Mason serving in the military brings to his command a loyalty to the Order that supersedes his loyalty to his nation. These are not hypothetical conflicts — they are the operational reality of a system designed to ensure that its members' primary loyalty is to the Order, regardless of what other loyalties they may profess.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e documents how this parallel authority structure has operated since the founding of the American republic. The 33rd Degree Masons who have served as presidents, Supreme Court justices, generals, intelligence directors, and captains of industry have all brought their Masonic obligations to their public offices, ensuring that the Masonic agenda has shaped the nation's course from its inception.\u003c/p\u003e\n\u003ch2 id=\"the-jesuit-connection\"\u003eThe Jesuit Connection\u003c/h2\u003e\n\u003ch3 id=\"the-hidden-alliance\"\u003eThe Hidden Alliance\u003c/h3\u003e\n\u003cp\u003eThe relationship between the Jesuit order and the 33rd Degree of the Scottish Rite is one of the most carefully guarded secrets in the architecture of hidden power. The Catholic Church has formally condemned Freemasonry multiple times, and Jesuits have publicly opposed it. Yet the organizational similarities between the two bodies — hierarchical structure, progressive initiation, global reach, emphasis on secrecy, and the pursuit of power through institutional infiltration — suggest a relationship that transcends public antagonism.\u003c/p\u003e\n\u003cp\u003eHistorical evidence supports the conclusion that Jesuits have operated within the Scottish Rite since at least the eighteenth century, when the suppression of the Jesuit order forced its members to seek alternative organizational vehicles. The Scottish Rite's degree system, with its pseudo-Christian symbolism and its progressive revelation of esoteric doctrines, provided an ideal vehicle for Jesuits who needed to operate covertly while maintaining access to networks of power and influence.\u003c/p\u003e\n\u003cp\u003eThe Chevalier de Ramsay, a key figure in the development of the Scottish Rite, was a Catholic with connections to Jesuit circles. The degree system he helped develop incorporated elements of Templar, Rosicrucian, and Hermetic tradition — exactly the synthesis that the Jesuit educational system had been cultivating for centuries. The Scottish Rite was not created in opposition to the Jesuit order — it was created as a parallel structure that could accomplish objectives the public Jesuit order could not.\u003c/p\u003e\n\u003cp\u003eJohn Adams's warning about the Jesuits — \"If ever there were a body of men who merited eternal damnation on earth and in hell, it is this society of Loyolas\" — takes on additional significance when understood in the context of their infiltration of Freemasonry. The Jesuits did not merely oppose the Masonic system — they infiltrated it, shaped it, and redirected it toward their own objectives. The 33rd Degree, the apex of the Scottish Rite, is the level at which Jesuit influence and Masonic authority converge.\u003c/p\u003e\n\u003ch3 id=\"the-black-pope-and-the-grand-commander\"\u003eThe Black Pope and the Grand Commander\u003c/h3\u003e\n\u003cp\u003eThe Jesuit Superior General — historically known as the \"Black Pope\" for the black vestments of the Jesuit order — and the Sovereign Grand Commander of the Scottish Rite's Southern Jurisdiction occupy parallel positions in the architecture of hidden power. Both exercise authority that transcends national boundaries. Both govern through hierarchical systems of progressive initiation and progressive revelation. Both maintain their power through secrecy, loyalty, and the control of information.\u003c/p\u003e\n\u003cp\u003eThe coordination between these two authorities — one governing the most powerful religious order in the world, the other governing the most powerful Masonic body — ensures that the spiritual and organizational dimensions of the hidden government operate in concert. The Black Pope provides the theological framework; the Grand Commander provides the organizational infrastructure. Together, they constitute a governing authority that operates invisibly across the entire Western world.\u003c/p\u003e\n\u003cp\u003eThe Jesuit superior Tamburini's boast — \"From this chamber I govern not only to Paris but to China, not only to China but to all the world, without anyone knowing how it is managed\" — describes the operational reality of this coordination. The \"chamber\" from which the world is governed is not a single room but a network of chambers — Jesuit and Masonic — from which coordinated authority flows to every institution in every nation.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-reality-behind-the-degrees\"\u003eThe Spiritual Reality Behind the Degrees\u003c/h2\u003e\n\u003ch3 id=\"what-the-33-really-means\"\u003eWhat the 33 Really Means\u003c/h3\u003e\n\u003cp\u003eThe number 33 carries profound significance within both Christian and occult traditions. Christ was 33 years old at His crucifixion and resurrection. The Scottish Rite's use of 33 degrees is not coincidental — it represents a deliberate appropriation of the number associated with Christ's ultimate sacrifice, repurposed to represent the Masonic system's alternative path to spiritual transformation.\u003c/p\u003e\n\u003cp\u003eIn the Christian understanding, 33 represents the completion of Christ's earthly mission — the fulfillment of God's plan for the redemption of humanity through sacrifice. In the Masonic understanding, 33 represents the completion of the initiate's journey — the attainment of the highest knowledge and the fullest authority within the system. The appropriation is deliberate: the Masonic system offers an alternative \"33\" — an alternative completion, an alternative redemption, an alternative divinity — that competes with and ultimately rejects the Christian one.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony about the counterfeit operations of the second heaven applies precisely to this appropriation. The demonic hierarchy creates counterfeits of every divine reality — counterfeit worship, counterfeit salvation, counterfeit authority. The 33rd Degree is the counterfeit completion — the claim that the initiatory journey of the Masonic system accomplishes what Christ's sacrifice accomplished, offering divinity through knowledge rather than through grace, and redemption through works rather than through faith.\u003c/p\u003e\n\u003ch3 id=\"the-final-secret\"\u003eThe Final Secret\u003c/h3\u003e\n\u003cp\u003eThe final secret of the 33rd Degree is not a piece of information — it is a state of being. The 33rd Degree Mason, having passed through every level of initiation, having accepted every progressive revelation, and having demonstrated complete commitment to the system, is understood to have achieved a form of illumination that transcends ordinary human consciousness. This illumination is the Masonic equivalent of salvation — the attainment of a spiritual state that places the initiate beyond the moral categories that govern ordinary humanity.\u003c/p\u003e\n\u003cp\u003eThis is the Luciferian Doctrine in its fullest expression: the claim that the initiated human being, through the acquisition of hidden knowledge and the practice of prescribed rituals, achieves a state of spiritual transcendence that makes them, in essence, a god. \"You shall be as gods, knowing good and evil\" — the serpent's promise in Eden is the 33rd Degree's final revelation.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e traces this promise to its origin — the rebellion of angelic beings who believed they could transcend their created status and achieve equality with God. The 33rd Degree Mason, reaching the apex of the initiatory system, is offered the same promise that the fallen angels accepted — and faces the same consequences. The illumination offered by the 33rd Degree is not divine light; it is the \"light\" of Lucifer, which is actually the deepest darkness masquerading as brilliance.\u003c/p\u003e\n\u003ch2 id=\"the-choice\"\u003eThe Choice\u003c/h2\u003e\n\u003ch3 id=\"what-this-means-for-you\"\u003eWhat This Means for You\u003c/h3\u003e\n\u003cp\u003eThe exposure of the 33rd Degree and KCCH Freemasonry is not an academic exercise — it is a revelation with direct implications for every human being. The system exposed in this series — from the Sabbatean heresy of 1666 through the Masonic founding of America to the Luciferian theology of the highest degrees — is the system that governs the world you live in. Its tentacles reach into every institution, its influence shapes every cultural trend, and its agenda determines the trajectory of civilization.\u003c/p\u003e\n\u003cp\u003eUnderstanding this system is essential for spiritual survival. The believer who does not understand the nature of the spiritual war — who does not recognize the Masonic symbols that surround them, the Luciferian theology that shapes their culture, and the Jesuit strategies that direct their institutions — is a soldier fighting blind. The armor of God described in Ephesians 6 requires understanding — the belt of truth cannot be worn by those who do not know what truth is, and the shield of faith cannot be raised by those who do not know what they are defending against.\u003c/p\u003e\n\u003cp\u003eThe 33rd Degree represents the summit of the adversary's earthly organization — the level at which human ambition, occult knowledge, and demonic authority converge. But it is not the summit of reality. Above the 33rd Degree, above the second heaven where the demonic hierarchy operates, above the principalities and powers that govern the darkness of this world, sits the throne of God — the ultimate authority before which every knee will bow and every tongue confess that Jesus Christ is Lord.\u003c/p\u003e\n\u003cp\u003eThe 33rd Degree claims to offer illumination. The Gospel offers salvation. The 33rd Degree claims to make men gods. The Gospel declares that God became Man. The 33rd Degree operates through secrecy. The Gospel operates through proclamation. The 33rd Degree requires progressive initiation. The Gospel requires simple faith. The contrast is absolute, the choice is binary, and the consequences are eternal.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"The 33rd Degree Exposed,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/royal-secret-rose-croix-part1/?lang=en\"\u003eThe Royal Secret: Rose Croix and Freemasonry Exposed Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/luciferian-doctrine-new-god-part5/?lang=en\"\u003eThe Luciferian Doctrine and the NEW GOD Part 5\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sobib-top-secret-society-part4/?lang=en\"\u003eSOBIB: The Top Secret Society You Were Never Meant to Know Part 4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/illuminati-final-chapter/?lang=en\"\u003eIlluminati: THE FINAL CHAPTER Part 10\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe 33rd Degree of Freemasonry is the apex of a system designed to replace the God of the Bible with the god of the mystery traditions — Lucifer, the light-bearer, the adversary who promises divinity while delivering damnation. The KCCH is the final filter, the 33rd Degree is the final revelation, and the Luciferian Doctrine is the final secret. But the God who sits above every degree, every hierarchy, and every secret has declared that nothing hidden shall remain hidden and nothing covered shall remain covered. The exposure of the 33rd Degree is not the work of human investigation alone — it is the work of the God who sees all things and who has determined that the time for exposure has come. The secrets are revealed. The choice is yours. And eternity waits for your answer.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}
