9 crisis, hospital protocols — incentivized by federal payments, enforced by institutional authority, and protected by legal immunity — resulted in deaths that the evidence suggests were not COVID casualties but medical homicides. A case now heading to jury trial threatens to expose the entire system of hospital-based killing that operated under the cover of a pandemic.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, secret societies, Satanists, and the Catholic Church have historically used institutional authority to commit acts that would be criminal if committed by individuals. The Society of Jesus — Napoleon's \"military organization\" pursuing \"absolute power\" — operated through institutions (churches, schools, governments) that provided cover for actions serving the Society's agenda. The hospital system during COVID-19 functioned identically: institutional authority provided cover for protocols that killed patients while financial incentives ensured compliance. Satan orchestrates murder through institutional mechanisms because institutions cannot be imprisoned, cannot feel guilt, and cannot repent — making them perfect instruments for stealing souls and sending them to hell.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony about the demonic realm reveals that the enemy uses human systems to accomplish his purposes. The principalities of Ephesians 6:12 do not personally wield syringes or prescribe lethal drug combinations — they influence the systems that do. The hospital protocols that killed patients during COVID-19 were influenced by financial incentives, regulatory pressure, and institutional culture — all of which can be traced to decisions made by entities operating under spiritual darkness. Pittman warned that words are spiritual: every \"COVID-19 death\" label placed on a death caused by hospital protocols was a lie birthed into the spiritual realm. Listen to \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e — the enemy operated within the very institutions trusted to heal.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-case-going-to-trial\"\u003eThe Case Going to Trial\u003c/h2\u003e\n\u003ch3 id=\"what-happened\"\u003eWhat Happened\u003c/h3\u003e\n\u003cp\u003eThe case heading to jury trial involves a patient who entered a hospital with manageable symptoms and died after receiving a protocol that family members allege was lethal. The specifics include: administration of remdesivir (a drug with known kidney and liver toxicity), early intubation and ventilator placement (associated with high mortality rates), denial of family visitation (preventing advocacy and oversight), refusal of family-requested alternative treatments, and sedation that prevented the patient from communicating or advocating for themselves.\u003c/p\u003e\n\u003cp\u003eThe family alleges that these protocols — each individually questionable and collectively lethal — constituted medical murder labeled as a COVID-19 death. The death certificate listed COVID-19 as the cause of death, obscuring the role of hospital protocols in the patient's demise.\u003c/p\u003e\n\u003cp\u003eThis case is not unique. Thousands of families across the country report similar experiences: loved ones entering hospitals with manageable symptoms and dying after receiving standardized protocols that family members were powerless to prevent. The pattern is so consistent that advocacy groups have documented it as a systemic issue rather than isolated malpractice.\u003c/p\u003e\n\u003ch3 id=\"the-legal-significance\"\u003eThe Legal Significance\u003c/h3\u003e\n\u003cp\u003eThe fact that this case is proceeding to jury trial is itself remarkable. The legal framework established during COVID-19 — including the PREP Act, which provides broad immunity for medical countermeasures — was designed to prevent exactly this kind of accountability. The legal barriers to suing hospitals for COVID-19 protocol deaths are enormous: immunity shields, emergency declarations, and the difficulty of proving causation when the patient also tested positive for COVID-19.\u003c/p\u003e\n\u003cp\u003eThat a judge has allowed this case to proceed despite these barriers suggests that the evidence of wrongful death is compelling enough to overcome the legal protections designed to prevent scrutiny. If the jury finds in favor of the family, the precedent could open the floodgates for thousands of similar cases — threatening the entire edifice of COVID-19 legal immunity.\u003c/p\u003e\n\u003ch2 id=\"the-deadly-hospital-protocols\"\u003eThe Deadly Hospital Protocols\u003c/h2\u003e\n\u003ch3 id=\"remdesivir-the-drug-that-killed\"\u003eRemdesivir: The Drug That Killed\u003c/h3\u003e\n\u003cp\u003eRemdesivir — marketed as a COVID-19 treatment and financially incentivized by Medicare reimbursements — has been associated with severe kidney and liver toxicity. The WHO recommended against its use for COVID-19 based on evidence that it did not reduce mortality. Despite this, US hospital protocols mandated remdesivir as a first-line treatment, incentivized by Medicare payments of approximately $3,200 per remdesivir-treated patient.\u003c/p\u003e\n\u003cp\u003eThe combination of a toxic drug with organ-damaging side effects, administered to patients already weakened by illness, produced predictable results: organ failure, fluid accumulation, and death. These deaths were labeled as COVID-19 deaths, obscuring the iatrogenic (medically-caused) nature of the harm.\u003c/p\u003e\n\u003cp\u003eKaren Kingston has documented how remdesivir's approval and deployment followed the pharmaceutical industry's pattern of prioritizing revenue over safety. The drug generated billions in revenue while its toxicity was downplayed, its WHO rejection was ignored, and its financial incentivization ensured universal administration.\u003c/p\u003e\n\u003ch3 id=\"ventilators-the-protocol-of-last-resort-as-first-response\"\u003eVentilators: The Protocol of Last Resort as First Response\u003c/h3\u003e\n\u003cp\u003eEarly in the pandemic, hospitals placed COVID-19 patients on mechanical ventilators at rates far exceeding medical necessity. Ventilator use for COVID-19 patients carried mortality rates of 80-90% in some studies — meaning that the \"treatment\" was more lethal than the disease for most patients. Despite this data, ventilator protocols continued, driven by financial incentives (Medicare paid approximately $39,000 for ventilated COVID patients versus $13,000 for non-ventilated patients) and institutional inertia.\u003c/p\u003e\n\u003cp\u003eThe premature use of ventilators — placing patients on machines that required sedation, prevented communication, and carried extreme mortality risk — when less invasive interventions (supplemental oxygen, prone positioning, early anti-inflammatory treatment) could have been used, constitutes a failure of medical judgment so severe that it borders on negligence. The pattern across thousands of hospitals suggests not individual negligence but systemic protocol — a designed pathway that produced predictable deaths.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-reckoning\"\u003eThe Spiritual Reckoning\u003c/h2\u003e\n\u003ch3 id=\"institutional-sin-and-individual-judgment\"\u003eInstitutional Sin and Individual Judgment\u003c/h3\u003e\n\u003cp\u003eThe hospital protocols that killed patients represent institutional sin — wrongdoing embedded in systems rather than committed by identifiable individuals. The Jesuit model of institutional operation provides the template: individual actors follow protocols established by the institution, which follows guidance from regulatory bodies, which follow directives from pharmaceutical companies, which serve the globalist agenda. Responsibility is diffused through the chain until no individual feels personally accountable.\u003c/p\u003e\n\u003cp\u003eBut Scripture does not recognize institutional sin as an excuse for
