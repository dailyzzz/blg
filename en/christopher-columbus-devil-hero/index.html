— 2 Corinthians 11:14-15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Apostle Paul warned us that Satan's greatest weapon is disguise. The adversary does not appear in horns and flames — he appears as a hero, a liberator, a discoverer. No figure in Western history better exemplifies this principle than Christopher Columbus, a man celebrated as the greatest explorer in human history while in truth serving as an agent of destruction, enslavement, and Satanic conquest.\u003c/p\u003e\n\u003cp\u003eThe Catholic Church canonized Columbus as a \"Servant of God\" in 1882, beginning a process that could one day make this mass murderer a saint. This is not surprising when you understand that the Church has served as the earthly arm of a Satanic power structure since its corruption by infiltrators centuries ago. The Jesuits, founded by Ignatius Loyola as a military organization for the accumulation of absolute power, have long controlled the Church's narrative apparatus. Napoleon warned: \u003cem\u003e\"The Jesuits are a military organization, not a religious order... the aim is power.\"\u003c/em\u003e Columbus was an early prototype of the Jesuit agent — a military operative in religious clothing, carrying a cross in one hand and a sword in the other.\u003c/p\u003e\n\u003cp\u003eAs \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e makes clear, the entire structure of Western heroism is built on deception. Columbus did not \"discover\" anything — he was sent on a mission by powers that already knew exactly what lay across the Atlantic. And the track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e reminds us that the hosts of darkness work through willing human agents who exchange their souls for worldly power and glory.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-man-behind-the-myth\"\u003eThe Man Behind the Myth\u003c/h2\u003e\n\u003ch3 id=\"columbuss-true-background\"\u003eColumbus's True Background\u003c/h3\u003e\n\u003cp\u003eThe Christopher Columbus taught in American schools is a fiction. The real Cristobal Colon (his actual name) was not a humble Genoese weaver's son who dreamed of sailing west. Multiple lines of evidence suggest he was a member of the minor nobility with connections to secretive networks that spanned the Mediterranean.\u003c/p\u003e\n\u003cp\u003eHistorian Manuel Rosa's research, published in \u003cem\u003eColumbus: The Untold Story\u003c/em\u003e, presents evidence that Columbus was actually a Portuguese nobleman — possibly the son of a Polish king — who was trained in navigation and cartography by the finest minds of the Portuguese court. His marriage to Filipa Moniz Perestrelo connected him directly to the Knights of Christ, the Portuguese successor organization to the Knights Templar.\u003c/p\u003e\n\u003cp\u003eThe Knights of Christ were the inheritors of the Templar fleet, the Templar treasure, and most importantly, the Templar maps — maps that showed lands across the Atlantic that had been visited by Templar ships long before 1492. Columbus did not sail into the unknown. He sailed with maps, with knowledge, and with a mission that had nothing to do with \"discovery\" and everything to do with conquest.\u003c/p\u003e\n\u003ch3 id=\"the-templar-vatican-connection\"\u003eThe Templar-Vatican Connection\u003c/h3\u003e\n\u003cp\u003eThe red crosses on the sails of Columbus's ships were not generic Christian symbols — they were the specific cross pattee of the Knights Templar and their successor order, the Knights of Christ. This is not disputed by historians; it is simply never discussed. The sails of the Nina, Pinta, and Santa Maria bore the symbol of a secret military order that had been officially suppressed by Pope Clement V in 1312 but had simply reorganized under new names.\u003c/p\u003e\n\u003cp\u003eThe Vatican's relationship with the Templar successor orders was complex but strategically purposeful. While the Church had officially destroyed the Templars (under pressure from King Philip IV of France, who owed the Templars enormous debts), the knowledge and resources of the order were too valuable to lose. The Knights of Christ in Portugal, the Knights of Malta, and later the Jesuit order all inherited different aspects of the Templar legacy — and all served the Vatican's ultimate goal of global dominion.\u003c/p\u003e\n\u003cp\u003eColumbus's voyage was funded by the Spanish Crown, but the real backing came from a network of financiers and secret society members who understood exactly what was at stake. The \"New World\" was not new at all — it was a known quantity, and its conquest had been planned for decades, if not centuries.\u003c/p\u003e\n\u003ch2 id=\"the-atrocities-they-dont-teach\"\u003eThe Atrocities They Don't Teach\u003c/h2\u003e\n\u003ch3 id=\"the-enslavement-of-the-taino\"\u003eThe Enslavement of the Taino\u003c/h3\u003e\n\u003cp\u003eColumbus's own journals and the accounts of his contemporaries paint a picture of monstrous cruelty that makes his continued celebration as a hero an act of collective insanity — or collective mind control.\u003c/p\u003e\n\u003cp\u003eUpon arriving in the Caribbean, Columbus immediately noted the Taino people's gentleness, generosity, and lack of weapons. In his journal, he wrote: \"They would make fine servants... With fifty men we could subjugate them all and make them do whatever we want.\" This was not the observation of an explorer; it was the assessment of a military operative calculating the cost of conquest.\u003c/p\u003e\n\u003cp\u003eWithin two years of Columbus's arrival, the encomienda system was established — a system of forced labor that was slavery in all but name. Taino men were worked to death in gold mines. Women were distributed among the Spanish colonists. Children were taken from their families. Those who resisted were tortured, mutilated, or killed as examples.\u003c/p\u003e\n\u003cp\u003eBartolome de las Casas, a contemporary priest who witnessed the atrocities, wrote: \"Such inhumanities and barbarisms were committed in my sight as no age can parallel. My eyes have seen these acts so foreign to human nature that now I tremble as I write.\"\u003c/p\u003e\n\u003ch3 id=\"the-genocide-in-numbers\"\u003eThe Genocide in Numbers\u003c/h3\u003e\n\u003cp\u003eWhen Columbus arrived in 1492, the Taino population of Hispaniola was estimated at between 250,000 and several million (estimates vary widely). By 1514, the Spanish census recorded only 32,000 Taino. By 1542, barely 200 remained. This is not colonization; it is extermination — carried out under the banner of Christ and the authority of the Pope.\u003c/p\u003e\n\u003cp\u003eColumbus personally oversaw a tribute system that required every Taino over the age of 14 to deliver a hawk's bell full of gold dust every three months. Those who failed had their hands cut off and were left to bleed to death. Columbus's brother Bartolome, who served as governor in his absence, was equally brutal. The entire operation was a machine of extraction and death, sanctioned by papal bulls that granted Spain dominion over any lands not already held by a Christian ruler.\u003c/p\u003e\n\u003cp\u003eThe Papal Bull \u003cem\u003eInter Caetera\u003c/em\u003e, issued by Pope Alexander VI in 1493, granted Spain all lands west of a line drawn through the Atlantic. This single document — issued by a Pope notorious for corruption, murder, and alleged Satanic rituals — became the legal foundation for centuries of genocide, slavery, and exploitation across the Americas.\u003c/p\u003e\n\u003ch3 id=\"the-sex-trade\"\u003eThe Sex Trade\u003c/h3\u003e\n\u003cp\u003eAmong the least discussed aspects of Columbus's legacy is the systematic sexual exploitation that accompanied the conquest. Columbus himself wrote in a letter to a friend: \"A hundred castellanoes are as easily obtained for a woman as for a farm, and it is very general and there are plenty of dealers who go about looking for girls; those from nine to ten are now in demand.\"\u003c/p\u003e\n\u003cp\u003eThis is a direct quote from the man America celebrates with a federal holiday. Columbus was not just a conqueror; he was a trafficker in children. And the system he established — in which indigenous women and girls were treated as commodities to be bought, sold, and discarded — continued for centuries under the oversight of the Catholic Church.\u003c/p\u003e\n\u003ch2 id=\"the-secret-society-mission\"\u003eThe Secret Society Mission\u003c/h2\u003e\n\u003ch3 id=\"what-columbus-was-really-looking-for\"\u003eWhat Columbus Was Really Looking For\u003c/h3\u003e\n\u003cp\u003eGold was the stated objective, but the evidence suggests Columbus was searching for something far more valuable: the remnants of an advanced pre-Columbian civilization. The Templars, who had almost certainly reached the Americas before Columbus (as evidenced by the Newport Tower in Rhode Island, the Kensington Runestone in Minnesota, and Templar symbols found carved in stone across New England), had reported the existence of sophisticated cultures with advanced knowledge.\u003c/p\u003e\n\u003cp\u003eColumbus's later voyages focused obsessively on the mainland of Central and South America — precisely the regions where the most advanced pre-Columbian civilizations had flourished. He was not looking for a trade route to India; he was looking for the temples, libraries, and technology of a civilization that the Templar network had been tracking for centuries.\u003c/p\u003e\n\u003cp\u003eThe Jesuits who followed Columbus into the Americas continued this mission. They systematically destroyed the written records of Mesoamerican civilizations while privately copying everything of value for the Vatican archives. The burning of the Maya codices was not an act of religious zealotry; it was an intelligence operation designed to ensure that the knowledge of the previous civilization would be monopolized by the Church.\u003c/p\u003e\n\u003ch3 id=\"the-columbus-bloodline\"\u003eThe Columbus Bloodline\u003c/h3\u003e\n\u003cp\u003eColumbus's family maintained their power and privilege for centuries after his death. His descendants became some of the wealthiest and most influential families in the Spanish Empire. The Dukedom of Veragua, granted to Columbus's heirs, persists to this day. This is not the legacy of a humble explorer; it is the reward for a successful military operation.\u003c/p\u003e\n\u003cp\u003eThe Columbus family's coat of arms, granted by the Spanish Crown, contains symbols that researchers have linked to Kabbalistic and Templar traditions. The anchors, islands, and lions on the shield correspond to alchemical and esoteric symbols that would have been meaningful to initiates of the secret societies but invisible to the uninitiated public.\u003c/p\u003e\n\u003ch2 id=\"the-holiday-of-deception\"\u003eThe Holiday of Deception\u003c/h2\u003e\n\u003ch3 id=\"columbus-day-as-mass-programming\"\u003eColumbus Day as Mass Programming\u003c/h3\u003e\n\u003cp\u003eThe establishment of Columbus Day as a federal holiday in 1937 was the culmination of a decades-long campaign by the Knights of Columbus — a Catholic fraternal organization founded in 1882 that serves as one of the Vatican's most important instruments of influence in the United States.\u003c/p\u003e\n\u003cp\u003eThe Knights of Columbus lobbied state legislatures, funded Columbus statues and monuments, and promoted a sanitized version of Columbus's story in schools across America. Their goal was not merely to celebrate Italian-American heritage (though that was the public justification); it was to embed the Columbus mythology so deeply in American culture that it could never be questioned.\u003c/p\u003e\n\u003cp\u003eThis is the standard technique described in \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e: infiltrate through cunning, replace the truth with the society's narrative, and ensure that any challenge to the narrative is dismissed as extremism or conspiracy theory. The Jesuit strategy of \"I will believe that the white I see is black if the hierarchical church so defines it\" is not limited to the clergy — it is the programming installed in every schoolchild who is taught to celebrate Columbus as a hero.\u003c/p\u003e\n\u003ch3 id=\"the-ongoing-cover-up\"\u003eThe Ongoing Cover-Up\u003c/h3\u003e\n\u003cp\u003eEven as public awareness of Columbus's atrocities has grown, the resistance to removing his holiday and monuments has been fierce. Why? Because Columbus is not just a historical figure — he is a symbol of the entire system of deception that underlies Western civilization. To admit that Columbus was a monster is to admit that the system that created, funded, and celebrated him is monstrous. And that system — the Vatican-Jesuit-secret society network — cannot allow such an admission.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's near-death experience taught him that 95% of hell's inhabitants serve \"self\" — the false god of ego and ambition. Columbus was the embodiment of this principle: a man who served his own ambition, his masters' ambition, and Satan's ambition while draped in the symbols of Christ. As Pittman learned, God told him: \"You call me Lord but you never made me Lord.\" Columbus called himself a servant of Christ while serving the Prince of Darkness. Watch Pittman's full testimony: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eFor deeper research into the secret society networks behind the \"discovery\" of America, explore \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e, which has published extensive documentation of the Templar-Vatican connections that funded the conquest of the Americas.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e further reveals how the secret society mission that Columbus began was continued by the men who founded the United States.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disgu
