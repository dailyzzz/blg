 Revelation 12:9\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe smallpox vaccine is the founding myth of modern medicine. It is the story that validates every vaccine that followed, every pharmaceutical intervention, every public health mandate. The story goes like this: Edward Jenner discovered that milkmaids who had contracted cowpox were immune to smallpox, he tested his theory by inoculating a boy with cowpox material, the boy became immune, and vaccination was born — saving millions of lives and eventually eradicating smallpox from the face of the Earth.\u003c/p\u003e\n\u003cp\u003eIt is a beautiful story. It is also riddled with lies, omissions, and distortions so profound that the true history reads like a horror novel written by a sadist. The real story of the smallpox vaccine involves injecting children with animal pus, widespread death and disease caused by the vaccine itself, deliberate suppression of evidence showing the vaccine was ineffective and dangerous, and a coverup orchestrated by medical and political institutions with deep ties to the Jesuit order and secret societies.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown three heavens and told that 97.5% of Christians were failing. The smallpox vaccine mythology is one of the lies that keeps them failing — a false miracle that replaces faith in God with faith in medicine, and trust in divine healing with dependency on pharmaceutical products. Ephesians 6:12 describes warfare \"against principalities, against powers\" — and the smallpox narrative is a principality of the medical realm, an unquestionable dogma that demands faith and punishes heresy.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' \"absolute power\" (Napoleon), their \"eternal damnation\" (Adams), their governance of \"half the world\" (Tambulini) — all find expression in the vaccine mandate. The Catholic Confidential documentary reveals their infiltration \"cloaked with cunning\" and their use of \"every species of vice.\" Injecting children with diseased animal matter while claiming to protect them is vice of the highest order.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-real-edward-jenner\"\u003eThe Real Edward Jenner\u003c/h2\u003e\n\u003ch3 id=\"not-a-doctor-not-a-scientist\"\u003eNot a Doctor, Not a Scientist\u003c/h3\u003e\n\u003cp\u003eEdward Jenner was not a trained physician in the modern sense. He obtained his medical degree from the University of St Andrews in Scotland — a degree purchased for the sum of 15 guineas, without examination, without attending lectures, and without clinical experience. It was, by the standards of his own time, a bought credential.\u003c/p\u003e\n\u003cp\u003eJenner was a naturalist and a country surgeon. His interest in cowpox and smallpox was based on local folklore — the folk belief that milkmaids who had cowpox were immune to smallpox. He did not conduct rigorous scientific investigation. He collected anecdotes, performed a handful of crude experiments, and published his findings in a self-published pamphlet after the Royal Society rejected his paper.\u003c/p\u003e\n\u003ch3 id=\"the-experiment-on-james-phipps\"\u003eThe Experiment on James Phipps\u003c/h3\u003e\n\u003cp\u003eOn May 14, 1796, Jenner took material from a cowpox lesion on the hand of a milkmaid named Sarah Nelmes and scratched it into the arm of an eight-year-old boy named James Phipps — the son of Jenner's gardener. He later inoculated Phipps with smallpox material to test whether the boy was immune.\u003c/p\u003e\n\u003cp\u003eThis experiment was conducted:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOn a \u003cstrong\u003echild\u003c/strong\u003e who could not give informed consent\u003c/li\u003e\n\u003cli\u003eBy a man with a \u003cstrong\u003epurchased medical degree\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eUsing \u003cstrong\u003ediseased animal matter\u003c/strong\u003e scraped from a human lesion\u003c/li\u003e\n\u003cli\u003eWithout any understanding of \u003cstrong\u003egerm theory\u003c/strong\u003e, virology, or immunology\u003c/li\u003e\n\u003cli\u003eWith \u003cstrong\u003eno ethical oversight\u003c/strong\u003e, no peer review, and no safety protocols\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBy modern medical ethics standards, this experiment would be considered criminal. By the standards of its own time, it was considered reckless by many of Jenner's contemporaries. But the narrative it produced — the heroic doctor saving humanity from plague — was too useful to be questioned.\u003c/p\u003e\n\u003ch3 id=\"what-jenner-didnt-tell-you\"\u003eWhat Jenner Didn't Tell You\u003c/h3\u003e\n\u003cp\u003eJenner's published cases were selective and misleading:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSeveral of his original vaccine subjects \u003cstrong\u003econtracted smallpox\u003c/strong\u003e despite being vaccinated\u003c/li\u003e\n\u003cli\u003eHis own son, Edward Jenner Jr., was vaccinated and suffered \u003cstrong\u003echronic health problems\u003c/strong\u003e throughout his short life (he died at age 21)\u003c/li\u003e\n\u003cli\u003eJenner acknowledged that cowpox vaccination did \u003cstrong\u003enot provide permanent immunity\u003c/strong\u003e — a devastating admission that undermined his entire theory\u003c/li\u003e\n\u003cli\u003eCases of \"cowpox\" used for vaccination may have actually been \u003cstrong\u003ehorse grease\u003c/strong\u003e (horsepox) — a different disease entirely, raising questions about what was actually being injected into patients\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"the-horrors-of-19th-century-vaccination\"\u003eThe Horrors of 19th Century Vaccination\u003c/h2\u003e\n\u003ch3 id=\"arm-to-arm-vaccination\"\u003eArm-to-Arm Vaccination\u003c/h3\u003e\n\u003cp\u003eIn the decades following Jenner's work, vaccination was spread through \"arm-to-arm\" technique: material from a vaccinated person's lesion was scraped off and inoculated into the next person's arm. This created a chain of transmission that spread not just vaccine material but any blood-borne disease present in the chain.\u003c/p\u003e\n\u003cp\u003eThe result was the widespread transmission of:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSyphilis\u003c/strong\u003e: Documented cases of syphilis transmission through vaccination were reported throughout the 19th century\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTuberculosis\u003c/strong\u003e: Vaccine material contaminated with tuberculosis bacteria caused outbreaks\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eErysipelas\u003c/strong\u003e: A bacterial skin infection spread through contaminated vaccine material\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSepticemia\u003c/strong\u003e: Blood poisoning from unsterile vaccination procedures killed untold numbers\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEntire families were infected with syphilis through vaccination. Children developed oozing, necrotic lesions at vaccination sites. Death from vaccination-transmitted infections was common enough that the medical literature of the period is filled with case reports.\u003c/p\u003e\n\u003ch3 id=\"the-leicester-method\"\u003eThe Leicester Method\u003c/h3\u003e\n\u003cp\u003eThe town of Leicester, England, provides one of the most powerful pieces of evidence against the smallpox vaccine narrative. In the 1880s, after a severe outbreak of smallpox \u003cstrong\u003eamong vaccinated populations\u003c/strong\u003e, the citizens of Leicester rejected vaccination and instead implemented a program of:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eImmediate isolation of smallpox cases\u003c/li\u003e\n\u003cli\u003eThorough disinfection of affected homes\u003c/li\u003e\n\u003cli\u003eImproved sanitation and hygiene\u003c/li\u003e\n\u003cli\u003eBetter nutrition and living conditions\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe results were dramatic: Leicester's smallpox mortality rate dropped to the lowest in England — \u003cstrong\u003elower\u003c/strong\u003e than in heavily vaccinated towns and cities. The Leicester Method demonstrated that sanitation, not vaccination, was the key to preventing smallpox.\u003c/p\u003e\n\u003cp\u003eThe medical establishment dismissed the Leicester Method and continued to promote vaccination, because vaccination was profitable and sanitation reform was not. The Rockefeller medical model — create the problem, sell the solution — was already in operation, though Rockefeller himself was still a young man.\u003c/p\u003e\n\u003ch3 id=\"compulsory-vaccination-and-public-resistance\"\u003eCompulsory Vaccination and Public Resistance\u003c/h3\u003e\n\u003cp\u003eThroughout the 19th century, governments implemented compulsory vaccination laws, forcing citizens to submit to vaccination under penalty of fines, imprisonment, or the removal of their children. The resistance was massive:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAnti-vaccination leagues\u003c/strong\u003e formed in every major city\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMassive protests\u003c/strong\u003e drew tens of thousands of people\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCivil disobedience campaigns\u003c/strong\u003e saw citizens voluntarily submitting to imprisonment rather than vaccination\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMedical professionals\u003c/strong\u003e spoke out against vaccination, publishing evidence of its failures and harms\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe resistance was ultimately crushed — not by evidence, but by institutional power. The same pattern would repeat in the 20th and 21st centuries: evidence against vaccination is suppressed, dissenters are marginalized, and the population is forced to comply through mandates and social pressure.\u003c/p\u003e\n\u003ch2 id=\"the-eradication-myth\"\u003eThe Eradication Myth\u003c/h2\u003e\n\u003ch3 id=\"did-vaccination-eradicate-smallpox\"\u003eDid Vaccination Eradicate Smallpox?\u003c/h3\u003e\n\u003cp\u003eThe claim that vaccination eradicated smallpox is the pharmaceutical industry's most powerful weapon. It is cited every time someone questions vaccine efficacy or safety. \"But we eradicated smallpox!\" is the trump card that ends every debate.\u003c/p\u003e\n\u003cp\u003eBut the historical record tells a different story:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSmallpox declined before vaccination\u003c/strong\u003e: Like every major infectious disease of the 19th century, smallpox was declining before medical intervention. Improvements in sanitation, nutrition, living conditions, and water quality were reducing smallpox mortality throughout the period.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVaccinated populations still got smallpox\u003c/strong\u003e: Major smallpox outbreaks occurred in heavily vaccinated populations throughout the 19th and early 20th centuries. In the Philippines in 1918, a smallpox epidemic killed thousands despite a vaccination rate above 95%.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe WHO's eradication campaign used surveillance and containment, not mass vaccination\u003c/strong\u003e: The actual strategy that eliminated smallpox was the \"ring vaccination\" technique — identifying cases, isolating them, and vaccinating only their immediate contacts. This is essentially a sanitation strategy (identify and isolate) with vaccination added. The sanitation component was doing the heavy lifting.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDiagnostic reclassification\u003c/strong\u003e: As vaccination increased, diagnostic criteria for smallpox changed. Cases that would have been diagnosed as smallpox before vaccination became \"chickenpox,\" \"monkeypox,\" or other diagnoses. This reclassification artificially inflated the apparent effectiveness of vaccination.\u003c/p\u003e\n\u003ch2 id=\"the-satanic-dimension\"\u003eThe Satanic Dimension\u003c/h2\u003e\n\u003ch3 id=\"blood-rituals-disguised-as-medicine\"\u003eBlood Rituals Disguised as Medicine\u003c/h3\u003e\n\u003cp\u003eThe smallpox vaccine involves:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe \u003cstrong\u003ecutting of flesh\u003c/strong\u003e (scarification)\u003c/li\u003e\n\u003cli\u003eThe introduction of \u003cstrong\u003ediseased animal material\u003c/strong\u003e into the bloodstream\u003c/li\u003e\n\u003cli\u003eThe shedding of \u003cstrong\u003eblood\u003c/strong\u003e from an unwilling or unknowing subject\u003c/li\u003e\n\u003cli\u003eThe creation of a \u003cstrong\u003epermanent scar\u003c/strong\u003e (the vaccination mark)\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003ecompulsory\u003c/strong\u003e nature of the ritual — imposed by authority on the unwilling\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese are the characteristics of a blood ritual. The vaccination mark — the circular scar on the upper arm — is a brand. It marks the individual as property of the state, as a subject who has submitted to the medical authority's dominion over the body.\u003c/p\u003e\n\u003cp\u003eThe spiritual implications are profound. When the body — God's temple — is marked against the will of its inhabitant, a violation has occurred that extends beyond the physical. Howard Pittman was shown that the spiritual realm is the true reality. Physical marks have spiritual significance. The vaccination scar is not merely a physical artifact — it is a sign of submission to a system that opposes God's authority over the human body.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-vaccine-connection\"\u003eThe Jesuit Vaccine Connection\u003c/h3\u003e\n\u003cp\u003eThe Jesuits have been involved in vaccination programs since the earliest days of the practice. Jesuit missionaries distributed smallpox vaccine across Asia, Africa, and South America. The Vatican has endorsed vaccination programs throughout the 20th and 21st centuries. And Jesuit-run universities train the doctors and researchers who develop and administer vaccines.\u003c/p\u003e\n\u003cp\u003eThis involvement is consistent with the Jesuit method: embed agents within every beneficial-appearing institution and use that institution to advance the order's goals. Vaccination programs provide access to populations, create dependency on medical institutions, and establish the precedent that the state has authority over the individual body — a precedent that the Jesuits have always sought to establish, whether through religious sacraments or medical procedures.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — detailed history of smallpox vaccination and its failures\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — the spiritual dimensions of medical deception\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit involvement in global vaccination programs\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://ww
