e mighty men which were of old, men of renown.\" — Genesis 6:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Nephilim were not a myth. They were not a metaphor. They were not an exaggeration of tribal memory. They were the hybrid offspring of fallen angels and human women — beings of extraordinary size, strength, and appetite that corrupted the earth so thoroughly that God judged the entire world with a flood. And Genesis 6:4 contains a detail that most readers overlook: \"and also after that.\" The Nephilim existed before the Flood — and afterward.\u003c/p\u003e\n\u003cp\u003eThe presence of giants after the Flood is confirmed throughout the Old Testament. The Anakim. The Rephaim. The Emim. The Zamzummim. Og of Bashan, whose iron bed was thirteen and a half feet long. Goliath of Gath, who stood over nine feet tall. The spies who explored Canaan reported: \"we saw the giants, the sons of Anak, which come of the giants: and we were in our own sight as grasshoppers\" (Numbers 13:33).\u003c/p\u003e\n\u003cp\u003eThe Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/03-Cave_of_Treasures.mp4\"\u003eCave of Treasures\u003c/a\u003e alludes to the hidden history preserved in ancient texts — a history of corruption, hybridization, and divine judgment that the modern world has been trained to dismiss as fantasy. But the evidence does not support dismissal. It supports investigation.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-genesis-account-what-really-happened\"\u003eThe Genesis Account: What Really Happened\u003c/h2\u003e\n\u003cp\u003eGenesis 6:1-4 records the event that triggered the Flood. As explored in detail in \u003ca href=\"/fallen-angels-book-of-enoch/?lang=en\"\u003eFallen Angels and the Book of Enoch: The Forbidden History\u003c/a\u003e, the \"sons of God\" (\u003cem\u003ebene ha'elohim\u003c/em\u003e) — angelic beings — took human wives and produced hybrid offspring called Nephilim.\u003c/p\u003e\n\u003cp\u003eThe Hebrew word \u003cem\u003eNephilim\u003c/em\u003e is derived from the root \u003cem\u003enaphal\u003c/em\u003e — \"to fall.\" The Nephilim are the \"fallen ones\" — not because they fell from heaven themselves, but because they were the offspring of those who fell. They inherited the supernatural characteristics of their angelic fathers and the physical form of their human mothers, producing beings that were neither fully angelic nor fully human.\u003c/p\u003e\n\u003cp\u003eThe Book of Enoch provides specific details about their nature:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTheir stature was enormous — 1 Enoch describes them as three hundred cubits in height (though this may be hyperbolic or corrupted in transmission; even a fraction of this height would produce beings of twenty to thirty feet)\u003c/li\u003e\n\u003cli\u003eTheir appetites were insatiable — they consumed all the food humans could produce, then turned to consuming humans, then turned to consuming each other\u003c/li\u003e\n\u003cli\u003eTheir behavior was violent and depraved — \"they devoured mankind\" and \"began to sin against birds, and beasts, and reptiles, and fish\" (1 Enoch 7:5)\u003c/li\u003e\n\u003cli\u003eThey possessed supernatural knowledge inherited from their Watcher fathers — knowledge of weapons, sorcery, astrology, and genetic manipulation\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe corruption was not limited to the Nephilim themselves. Genesis 6:12 states: \"And God looked upon the earth, and, behold, it was corrupt; for all flesh had corrupted his way upon the earth.\" The phrase \"all flesh\" suggests a corruption that extended beyond humanity to the animal kingdom — genetic tampering, cross-species hybridization, and biological chaos on a scale that made the earth unsalvageable through any means short of total destruction.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"and-also-after-that-post-flood-giants\"\u003e\"And Also After That\": Post-Flood Giants\u003c/h2\u003e\n\u003cp\u003eIf the Flood destroyed all the Nephilim, how did giants appear after the Flood? Genesis 6:4 explicitly states: \"and also after that.\" Several explanations have been proposed:\u003c/p\u003e\n\u003ch3 id=\"a-second-incursion\"\u003eA Second Incursion\u003c/h3\u003e\n\u003cp\u003eThe most straightforward explanation is that another group of fallen angels repeated the sin of the Watchers after the Flood. The original two hundred Watchers were bound in chains (Jude 6), but not all fallen angels were among the original two hundred. A second wave of angelic incursion — perhaps smaller in scale — could have produced a new generation of Nephilim in the post-Flood world.\u003c/p\u003e\n\u003ch3 id=\"genetic-carriage-through-noahs-family\"\u003eGenetic Carriage Through Noah's Family\u003c/h3\u003e\n\u003cp\u003eNoah was \"perfect in his generations\" (\u003cem\u003etamim\u003c/em\u003e — without blemish in his genealogy), suggesting his bloodline was uncorrupted. But the text does not make this claim about his wife or his sons' wives. It is possible that Nephilim genetics were carried through the Flood in recessive form through the women of Noah's family, re-expressing in subsequent generations.\u003c/p\u003e\n\u003ch3 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h3\u003e\n\u003cp\u003eThe spirits of the Nephilim who died in the Flood are identified in Jewish tradition as the \"evil spirits\" or \"demons\" that roam the earth. 1 Enoch 15:8-10 describes this explicitly: the spirits of the giants, born of spiritual and physical parents, become disembodied spirits that afflict humanity. These spirits could have influenced or facilitated post-Flood attempts to recreate the pre-Flood corruption.\u003c/p\u003e\n\u003cp\u003eWhatever the mechanism, the biblical text is clear: giants existed after the Flood. They are documented extensively in the Old Testament:\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-biblical-record-of-post-flood-giants\"\u003eThe Biblical Record of Post-Flood Giants\u003c/h2\u003e\n\u003cp\u003eThe Old Testament contains numerous references to giant races and individual giants:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Anakim\u003c/strong\u003e — Descendants of Anak, who descended from Arba (Joshua 15:13). They inhabited Hebron and the hill country of Judah. The spies sent by Moses reported them as terrifyingly large. Caleb later conquered Hebron and drove out the Anakim (Joshua 15:14).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Rephaim\u003c/strong\u003e — An ancient race of giants inhabiting the land east of the Jordan. Genesis 14:5 records them being defeated by Chedorlaomer. They are referenced repeatedly in connection with the underworld — the Hebrew word \u003cem\u003erephaim\u003c/em\u003e also means \"shades\" or \"spirits of the dead,\" suggesting a connection between the giant race and the spiritual realm of the dead.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Emim\u003c/strong\u003e — Giants dwelling in the land later occupied by Moab. \"The Emims dwelt therein in times past, a people great, and many, and tall, as the Anakims; Which also were accounted giants, as the Anakims; but the Moabites called them Emims\" (Deuteronomy 2:10-11).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Zamzummim\u003c/strong\u003e — Giants dwelling in the land later occupied by Ammon. \"A people great, and many, and tall, as the Anakims; but the LORD destroyed them before them\" (Deuteronomy 2:21).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOg of Bashan\u003c/strong\u003e — King of Bashan, \"of the remnant of giants\" (Deuteronomy 3:11). His iron bed measured thirteen and a half feet long and six feet wide. If the bed was proportional to its occupant, Og stood at least twelve feet tall.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGoliath of Gath\u003c/strong\u003e — The most famous biblical giant, standing \"six cubits and a span\" — approximately nine feet nine inches (1 Samuel 17:4). Goliath had brothers who were also giants (2 Samuel 21:15-22), suggesting a clan or bloodline of oversized warriors.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eIshbi-Benob, Saph, and others\u003c/strong\u003e — 2 Samuel 21:15-22 records four Philistine warriors who were descendants of \"the giant\" (\u003cem\u003eharaphah\u003c/em\u003e), killed by David's men. One had six fingers on each hand and six toes on each foot — a genetic anomaly consistent with hybridization.\u003c/p\u003e\n\u003cp\u003eThe polydactyly (extra digits) is particularly significant. It occurs in the Philistine giants and is documented in Nephilim-related accounts across multiple ancient cultures. The consistent presence of this genetic anomaly in giant individuals across different populations and time periods suggests a common genetic origin — not random mutation but inherited characteristics from a non-human genetic source.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-archaeological-evidence\"\u003eThe Archaeological Evidence\u003c/h2\u003e\n\u003cp\u003eThe institutional archaeological establishment has systematically dismissed, suppressed, and destroyed evidence of giants. Despite this suppression, significant evidence persists:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNewspaper accounts.\u003c/strong\u003e Between 1850 and 1950, American newspapers published over 1,500 reports of giant skeletons discovered across North America. The \u003cem\u003eNew York Times\u003c/em\u003e, the \u003cem\u003eWashington Post\u003c/em\u003e, the \u003cem\u003eChicago Tribune\u003c/em\u003e, and hundreds of local papers reported skeletons ranging from seven to twelve feet in height, often found in burial mounds attributed to the \"Mound Builder\" civilization.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSmithsonian involvement.\u003c/strong\u003e Multiple reports from the 19th and early 20th centuries document giant skeletal remains being sent to the Smithsonian Institution — after which they disappeared. In 2014, a report circulated claiming that the Smithsonian had been ordered by a Supreme Court ruling to release documents about the destruction of giant skeletal remains. While mainstream fact-checkers dismiss this as satire, the pattern of disappearing giant remains sent to the Smithsonian is documented across dozens of independent newspaper accounts.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNative American oral traditions.\u003c/strong\u003e Indigenous peoples across North America, South America, and other continents preserve traditions of ancient giant races. The Paiute of Nevada describe the Si-Te-Cah — red-haired giants who were cannibalistic and warlike. The Paiute say their ancestors drove the giants into Lovelock Cave and burned them. Archaeological excavation of Lovelock Cave in 1911 discovered oversized human remains, red-haired mummies, and artifacts consistent with a large-bodied population.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGlobal traditions.\u003c/strong\u003e Giants appear in the traditions of virtually every ancient civilization: the Titans of Greek mythology, the Jotun of Norse mythology, the Fomorians of Irish mythology, the Daitya of Hindu tradition, the Quinametzin of Aztec tradition, and the Raphaim of Canaanite texts. The universality of giant traditions across unconnected civilizations suggests a common historical memory rather than independent mythological invention.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMegalithic construction.\u003c/strong\u003e Structures like Baalbek in Lebanon (with stones weighing 1,000+ tons), the cyclopean walls of ancient Mycenae, the massive constructions at Puma Punku in Bolivia, and the enormous stone platforms across the Pacific islands pose engineering questions that conventional archaeology struggles to answer. Ancient traditions consistently attribute these constructions to giants or to beings who possessed supernatural strength and knowledge.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-modern-parallel-genetic-engineering\"\u003eThe Modern Parallel: Genetic Engineering\u003c/h2\u003e\n\u003cp\u003eAs explored in \u003ca href=\"/ye-shall-be-as-gods-transhumanism/?lang=en\"\u003eYe Shall Be as Gods: The Ancient Lie Behind Transhumanism\u003c/a\u003e and \u003ca href=\"/tower-of-babel-two-rebuilding/?lang=en\"\u003eTower of Babel 2.0: Rebuilding the Gateway to Heaven\u003c/a\u003e, the modern era is witnessing a revival of the same activities that produced the Nephilim — the deliberate crossing of boundaries that God established between different orders of creation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCRISPR gene editing\u003c/strong\u003e — The ability to directly edit human DNA, inserting or removing genetic sequences at will. Scientists have already created human-animal chimeras — embryos containing both human and animal cells. In 2021, researchers at the Salk Institute created human-monkey chimeric embryos. In 2023, research was published on human-pig chimeras for organ growing.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSynthetic biology\u003c/strong\u003e — The creation of entirely new genetic sequences that do not exist in nature. Synthetic biologists have already created artificial organisms with synthetic DNA. The boundary between natural and artificial, between created and manufactured, is being deliberately erased.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHuman enhancement\u003c/strong\u003e — The transhumanist agenda explicitly aims to transcend the limitations of the human body through genetic modification, cybernetic enhancement, and pharmaceutical augmentation. The goal is to produce a \"post-human\" — a being that is more than human, enhanced beyond the specifications of the original creation.\u003c/p\u003e\n\u003cp\u003eThe parallel to Genesis 6 is exact. The Watchers crossed the boundary between angelic and human. Modern science crosses the boundary between human and animal, between biological and digital, between natural and synthetic. The result is the same: corruption of the created order, production of hybrid beings, and the destruction of the boundaries that God established to maintain the integrity of His creation.\u003c/p\u003e\n\u003cp\u003eJesus warned: \"But as the days of Noe were, so shall also the coming of the Son of man be\" (Matthew 24:37). The days of Noah were characterized by the Nephilim — by the crossing of genetic boundaries, the corruption of all flesh, and the violence that hybrid beings inflicted on the earth. If the last days are to be \"as the days of Noah,\" then the genetic corruption of the pre-Flood world must find its parallel in the end times. That parallel is emerging through genetic engineering, transhumanism, and the deliberate creation of hybrid organisms.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-spirits-of-the-giants\"\u003eThe Spirits of the Giants\u003c/h2\u003e\n\u003cp\u003eThe Nephilim who died in the Flood did not simply cease to exist. According to 1 Enoch 15:8-12, their spirits became the evil spirits that roam the earth:\u003c/p\u003e\n\u003cp\u003e\"And now, the giants, who are produced from the spirits and flesh, shall be called evil spirits upon the earth, and on the earth shall be their dwelling. Evil spirits have proceeded from their bodies; because they are born from men, and from the holy Watchers is their beginning and primal origin; they shall be evil spirits on earth, and evil spirits shall they be called.\"\u003c/p\u003e\n\u003cp\u003eThis provides a framework for understanding demonic activity. The demons that Jesus cast out, the evil spirits that afflict humanity, the principalities and powers that Paul describes — many of them may be the disembodied spirits of the Nephilim, seeking embodiment, seeking expression, seeking to reclaim the physical existence they lost in the Flood.\u003c/p\u003e\n\u003cp\u003eThis explains the consistent biblical connection between idolatry and demonic activity. The \"gods\" of the pagan nations were not mere imaginary figures. They were real spiritual beings — some of them the spirits of the Nephilim, some of them the fallen angels themselves — demanding worship, requiring sacrifice, and receiving power through human allegiance.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-return\"\u003eThe Return\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"As it was in the days of Noah, so shall it be at the coming of the Son of Man.\" — Matthew 24:37\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eIf the days of Noah were characterized by Nephilim, then the return of Christ will be preceded by the return of the Nephilim — or their modern equivalent. The crossing of genetic boundaries, the creation of hybrid organisms, the enhancement of human capabilities beyond natural limits, and the merging of human biology with artificial systems all point toward a new generation of beings that are \"mighty\" and \"of renown\" but fundamentally corrupted — no longer fully human as God created humanity.\u003c/p\u003e\n\u003cp\u003eThe Nephilim return is not a reappearance of literal ten-foot giants walking down city streets (though stranger things have happened in Scripture). It is the return of the principle that produced the Nephilim: the deliberate corruption of humanity's genetic integrity through the crossing of boundaries that God established at creation.\u003c/p\u003e\n\u003cp\u003eWhen CRISPR edits the human genome, when chimeric embryos combine human and animal DNA, when neural interfaces merge human consciousness with digital systems, when transhumanist enhancement transforms the human body into a hybrid of biological and synthetic components — this is the return of the Nephilim principle. Different tools. Same rebellion. Same corruption. Same judgment.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/489-Nephilim_Nanobots.mp4\"\u003eNephilim Nanobots\u003c/a\u003e — The return of the Nephilim through technology\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/447-Modded_Humans.mp4\"\u003eModded Humans\u003c/a\u003e — The modification of the human genome\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/fallen-angels-book-of-enoch/?lang=en\"\u003eFallen Angels and the Book of Enoch: The Forbidden History\u003c/a\u003e — The Watchers who fathered the Nephilim and the forbidden knowledge they taught\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/ye-shall-be-as-gods-transhumanism/?lang=en\"\u003eYe Shall Be as Gods: The Ancient Lie Behind Transhumanism\u003c/a\u003e — The modern iteration of the genetic corruption that produced the Nephilim\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/tower-of-babel-two-rebuilding/?lang=en\"\u003eTower of Babel 2.0: Rebuilding the Gateway to Heaven\u003c/a\u003e — The post-Flood continuation of the pre-Flood rebellion\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThey were giants. They were mighty. They were men of renown. And they were the product of a rebellion so severe that God drowned the world to end it. But Genesis says \"and also after that\" — the giants returned after the Flood, and they will return again before the end. Not as fairy tales. Not as mythology. Not as metaphor. As biology — corrupted, hybridized, enhanced beyond the boundaries that the Creator established. The spies who entered Canaan said, \"We were as grasshoppers in their sight.\" The scientists who edit the human genome today do not tremble at what they are creating. But they should. The days of Noah are returning. The boundaries are being crossed. The corruption is spreading. And the God who sent the Flood the first time has promised that He will not use water again — but He has not promised that He will not judge again. The fire is next. And the Nephilim principle — the corruption of all flesh — is the trigger that brings it.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"The Nephilim Return:
