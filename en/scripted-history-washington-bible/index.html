.\"\u003c/em\u003e — Psalm 127:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003ePsalm 127 warns that unless the Lord builds the house, the builders labor in vain. The United States of America was not built by the Lord — it was built by Freemasons, using Masonic rituals, Masonic symbolism, and a Masonic Bible. The foundation of America is not Christian; it is Masonic. And behind the Masonic foundation lies the Jesuit architecture that designed the entire system.\u003c/p\u003e\n\u003cp\u003eGeorge Washington's inauguration on April 30, 1789, was not a democratic ceremony — it was a Masonic consecration. The Bible upon which Washington swore his oath was not a family Bible or a church Bible; it was the Bible of St. John's Masonic Lodge No. 1 in New York City. This single detail, hiding in plain sight for over two centuries, reveals the true nature of the American founding: a Masonic ritual, scripted from beginning to end, designed to consecrate the new nation not to God but to the Great Architect of the Universe — the Masonic deity who is not the God of the Bible.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, who controlled European Freemasonry through the Bavarian Illuminati and the Scottish Rite, designed the American system as a vehicle for their global agenda. Napoleon warned: \u003cem\u003e\"The Jesuits are a military organization, not a religious order... the aim is power.\"\u003c/em\u003e Tamburini governed \"the whole world\" from his chamber. The American \"experiment in democracy\" was not an experiment — it was a deployment, and the Washington Bible was its consecration.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e reveals that the greatest deception is the one clothed in the symbols of holiness. And \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e warns that the lies of the deceiver are woven into the very foundation of the nations.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-washington-bible\"\u003eThe Washington Bible\u003c/h2\u003e\n\u003ch3 id=\"the-masonic-oath\"\u003eThe Masonic Oath\u003c/h3\u003e\n\u003cp\u003eOn April 30, 1789, George Washington stood on the balcony of Federal Hall in New York City to take the oath of office as the first President of the United States. The Bible upon which he placed his hand was not chosen at random — it was the altar Bible of St. John's Lodge No. 1, Ancient York Masons, one of the oldest Masonic lodges in America.\u003c/p\u003e\n\u003cp\u003eThis fact is not disputed by mainstream historians — it is simply never discussed in its full significance. The most important oath in American history — the oath that established the precedent for every subsequent presidential inauguration — was sworn on a Masonic Bible. The ceremony was attended by Masonic officials. The Bible was opened to a specific page (Genesis 49:13, \"Zebulun shall dwell at the haven of the sea\"), and after the oath, Washington reportedly kissed the Bible in accordance with Masonic ritual.\u003c/p\u003e\n\u003cp\u003eThe Washington Bible has been used in subsequent inaugurations — by Warren G. Harding (1921), Dwight D. Eisenhower (1953), Jimmy Carter (1977), and George H.W. Bush (1989) — all of whom had Masonic connections. The Bible is treated as a sacred relic of American democracy, but it is in fact a sacred relic of American Freemasonry — and the distinction matters enormously.\u003c/p\u003e\n\u003ch3 id=\"the-masonic-god\"\u003eThe Masonic God\u003c/h3\u003e\n\u003cp\u003eFreemasonry refers to God as \"the Great Architect of the Universe\" (GAOTU) — a deliberately vague title designed to encompass all religious traditions. Masons are required to believe in a \"Supreme Being\" but are not required to identify that being with the God of any specific religion. This means that the Masonic deity is, by design, not the God of the Bible — He is a generic, universalist concept that is compatible with Christianity, Islam, Hinduism, and even Luciferianism.\u003c/p\u003e\n\u003cp\u003eAlbert Pike, the Grand Commander of the Scottish Rite (Southern Jurisdiction) and the most influential Masonic philosopher of the 19th century, wrote in \u003cem\u003eMorals and Dogma\u003c/em\u003e: \"Lucifer, the Light-Bearer! Strange and mysterious name to give to the Spirit of Darkness! Lucifer, the Son of the Morning! Is it he who bears the Light... Doubt it not!\"\u003c/p\u003e\n\u003cp\u003eWhen Washington swore his oath on the Masonic Bible, he was not swearing to the God of Abraham, Isaac, and Jacob. He was swearing to the Great Architect — a deity whose identity, at the highest levels of Masonic initiation, is revealed to be Lucifer.\u003c/p\u003e\n\u003ch2 id=\"the-masonic-founding-fathers\"\u003eThe Masonic Founding Fathers\u003c/h2\u003e\n\u003ch3 id=\"the-lodge-membership\"\u003eThe Lodge Membership\u003c/h3\u003e\n\u003cp\u003eThe overlap between the American Founding Fathers and Freemasonry is near-total:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGeorge Washington\u003c/strong\u003e — Master Mason, Worshipful Master of Alexandria Lodge No. 22\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBenjamin Franklin\u003c/strong\u003e — Grand Master of the Grand Lodge of Pennsylvania\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJohn Hancock\u003c/strong\u003e — Member of St. Andrew's Lodge, Boston\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePaul Revere\u003c/strong\u003e — Grand Master of the Grand Lodge of Massachusetts\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJohn Paul Jones\u003c/strong\u003e — Member of Lodge St. Bernard, Nantes, France\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMarquis de Lafayette\u003c/strong\u003e — Member of multiple French and American lodges\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlexander Hamilton\u003c/strong\u003e — Associated with Masonic lodges in New York\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAt least 13 of the 39 signers of the Constitution were confirmed Freemasons, and many more were suspected members. The Constitutional Convention of 1787 was, in many respects, a Masonic convention — attended by lodge brothers who shared oaths, rituals, and allegiances that transcended their public political differences.\u003c/p\u003e\n\u003ch3 id=\"the-masonic-design-of-washington-dc\"\u003eThe Masonic Design of Washington, D.C.\u003c/h3\u003e\n\u003cp\u003eThe capital city of the United States was designed according to Masonic principles by Pierre Charles L'Enfant, a French engineer with deep Masonic connections. The city's layout incorporates:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe pentagram\u003c/strong\u003e — When viewed from above, the streets of Washington, D.C., form a pentagram (five-pointed star) centered on the White House. The pentagram is one of the most important symbols in both Masonic and occult tradition.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe square and compass\u003c/strong\u003e — The layout of the Capitol, the White House, and the Jefferson Memorial forms the Masonic square and compass when viewed from above.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe obelisk\u003c/strong\u003e — The Washington Monument, a 555-foot obelisk, is the most prominent phallic symbol in the world. The obelisk is an ancient Egyptian symbol associated with the sun god Ra (or, in the esoteric tradition, Lucifer). Its placement at the center of the nation's capital is not accidental.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe owl\u003c/strong\u003e — Visible in the street layout around the Capitol building, the owl is a symbol associated with Minerva (wisdom) in Roman tradition and with Moloch in the biblical tradition — the same Moloch whose effigy is burned at the Bohemian Grove.\u003c/p\u003e\n\u003ch3 id=\"the-cornerstone-rituals\"\u003eThe Cornerstone Rituals\u003c/h3\u003e\n\u003cp\u003eThe cornerstone of the United States Capitol was laid on September 18, 1793, in a full Masonic ceremony led by George Washington in his capacity as Grand Master. Washington wore his Masonic apron (a gift from Madame Lafayette), and the ceremony included the traditional Masonic elements: the application of corn, wine, and oil to the cornerstone, the use of Masonic tools (square, level, plumb), and Masonic prayers.\u003c/p\u003e\n\u003cp\u003eThis ritual was not merely symbolic — it was a consecration. In the Masonic tradition, the laying of a cornerstone with Masonic ritual consecrates the building (and, by extension, the institution it houses) to the Great Architect. The United States Capitol — the seat of American government — was literally consecrated to the Masonic deity through a ritual performed by the first President in his capacity as a Masonic Grand Master.\u003c/p\u003e\n\u003ch2 id=\"the-constitution-as-masonic-document\"\u003eThe Constitution as Masonic Document\u003c/h2\u003e\n\u003ch3 id=\"the-constitutional-design\"\u003eThe Constitutional Design\u003c/h3\u003e\n\u003cp\u003eThe Constitution of the United States, celebrated as the foundation of American freedom, was designed by Masons according to Masonic principles:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe separation of powers\u003c/strong\u003e — The division of government into three branches (executive, legislative, judicial) mirrors the Masonic triad of Wisdom, Strength, and Beauty — the three pillars that support the Masonic lodge.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe checks and balances\u003c/strong\u003e — The system of checks and balances, which prevents any single branch from exercising absolute power, reflects the Masonic principle of equilibrium — the balance of opposing forces that Masonry teaches is the secret of the universe.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Bill of Rights\u003c/strong\u003e — The first ten amendments, which e Scottish Rite's philosophical system, as elaborated by Albert Pike, draws heavily on Kabbalistic, Hermetic, and Rosicrucian traditions — all of which were cultivated and preserved by the Jesuit order.\u003c/p\u003e\n\u003cp\u003eThe American founding was thus a Jesuit operation, executed through Masonic instruments, and consecrated with a Masonic Bible. The nation that claims to be \"under God\" is in fact under the Great Architect — and the Great Architect, as Pike revealed, is Lucifer.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown during his near-death experience that the demonic hierarchy operates through institutions that humanity trusts — governments, churches, and the systems they create. The American system, built on Masonic foundations and consecrated to a Masonic deity, is one such institution. Pittman's revelation that \"you call me Lord but you never made me Lord\" applies to a nation that claims to be \"under God\" while worshipping at the altar of Masonic universalism. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eFor further documentation, see \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e and \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGre
