Peter 5:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Apostle Peter warned that Satan does not rest — he walks about, seeking to devour. The Knights Templar were, for nearly two centuries, the most powerful military and financial organization in the Western world. They served the Pope, but they also served something far older and far darker. The technology they discovered in the Holy Land, the financial systems they invented, and the knowledge they accumulated made them the most dangerous double agents in human history — agents who served the Vatican publicly while secretly serving the ancient mysteries that Satan had preserved since the fall.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, founded by Ignatius Loyola three centuries after the Templar suppression, inherited the Templar mission — but refined it. Where the Templars were overt in their power, the Jesuits were covert. Where the Templars held castles, the Jesuits held confessionals. Where the Templars were crushed by a jealous king, the Jesuits learned to be uncrusable. As Tamburini boasted, the Jesuit Superior General governed the entire world from his chamber. The Jesuits learned from the Templars' mistakes — and they never repeated them.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/75-The_Secret_of_the_Cave.mp4\"\u003eThe Secret of the Cave\u003c/a\u003e speaks to the hidden knowledge the Templars discovered beneath the Temple Mount, and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/03-Cave_of_Treasures.mp4\"\u003eCave of Treasures\u003c/a\u003e points to the ancient repositories of forbidden knowledge that predate even the Templars.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-temple-mount-excavations\"\u003eThe Temple Mount Excavations\u003c/h2\u003e\n\u003ch3 id=\"what-they-found-beneath-solomons-temple\"\u003eWhat They Found Beneath Solomon's Temple\u003c/h3\u003e\n\u003cp\u003eThe Knights Templar were founded in 1119 AD, ostensibly to protect Christian pilgrims traveling to the Holy Land. But from the very beginning, their true purpose was different. The nine original knights — led by Hugues de Payens — took up residence in the Al-Aqsa Mosque on the Temple Mount, which the Crusaders had converted into a palace. They claimed the space directly above the ruins of Solomon's Temple.\u003c/p\u003e\n\u003cp\u003eFor the first nine years of their existence, the Templars accepted no new members and undertook no military operations. What were they doing? According to multiple sources, including the Templar-connected Cistercian order (whose founder, Bernard of Clairvaux, was the Templars' chief patron), the nine knights spent those years excavating beneath the Temple Mount.\u003c/p\u003e\n\u003cp\u003eThe Temple Mount sits atop one of the largest and most complex underground complexes in the world. Solomon's Stables (a misnomer — they predate Solomon), a vast network of tunnels, cisterns, and chambers, extend beneath the platform. Some of these chambers have never been fully explored. The Templars, with nine years and no oversight, had ample time to conduct a thorough excavation.\u003c/p\u003e\n\u003cp\u003eWhat they found has been the subject of speculation for nine centuries. The possibilities include:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThe Ark of the Covenant\u003c/strong\u003e — the most sacred object in Judaism, believed to contain the tablets of the Ten Commandments and to possess supernatural power.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSolomon's treasure\u003c/strong\u003e — the gold, jewels, and precious objects accumulated by the wealthiest king in biblical history.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAncient texts\u003c/strong\u003e — scrolls and documents containing the technological and esoteric knowledge of the ancient world, including engineering, astronomy, medicine, and the manipulation of energy.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOccult artifacts\u003c/strong\u003e — objects associated with the pre-Flood civilization described in Genesis 6, including the forbidden knowledge brought to Earth by the fallen angels.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-explosion-of-templar-power\"\u003eThe Explosion of Templar Power\u003c/h3\u003e\n\u003cp\u003eWhatever the Templars found, it transformed them overnight from a small, obscure group of knights into the most powerful organization in Europe. Within a decade of their founding, the Templars had:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eReceived the endorsement of the Pope\u003c/li\u003e\n\u003cli\u003eBeen granted exemption from all local laws and taxes\u003c/li\u003e\n\u003cli\u003eReceived massive donations of land and wealth from the nobility of every European kingdom\u003c/li\u003e\n\u003cli\u003eEstablished a network of commanderies (military-religious communities) across Europe and the Middle East\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis transformation is inexplicable without the discovery of something of enormous value — either material wealth, forbidden knowledge, or both. The Templars used whatever they found to leverage power from the Pope, the kings of Europe, and the nobility, establishing themselves as an independent power answerable to no one but their own Grand Master and (nominally) the Pope.\u003c/p\u003e\n\u003ch2 id=\"the-templar-financial-system\"\u003eThe Templar Financial System\u003c/h2\u003e\n\u003ch3 id=\"inventors-of-modern-banking\"\u003eInventors of Modern Banking\u003c/h3\u003e\n\u003cp\u003eThe Templars invented the modern banking system. Their innovations included:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLetters of credit\u003c/strong\u003e — A pilgrim traveling to the Holy Land could deposit money at a Templar commandery in Europe and receive a letter of credit that could be redeemed at any Templar facility in the Holy Land. This eliminated the need to carry gold on dangerous roads — and it created the first international banking network.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFractional reserve lending\u003c/strong\u003e — The Templars lent money at interest (technically forbidden to Christians but permitted under various legal fictions), and they lent more than they held in deposits — the basic mechanism of fractional reserve banking that the modern banking system depends on.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTrust management\u003c/strong\u003e — The Templars held property, managed estates, and administered trusts for the European nobility, making them the first professional asset managers.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInternational money transfer\u003c/strong\u003e — The Templar network enabled the transfer of funds across borders without physically moving gold or silver — a capability that would not be replicated until the rise of the Rothschild banking dynasty in the 18th century.\u003c/p\u003e\n\u003cp\u003eThese financial innovations were not independent inventions — they were based on knowledge the Templars acquired in the East, possibly from the texts they discovered beneath the Temple Mount or from contact with Islamic and Jewish financial traditions that had preserved ancient economic knowledge.\u003c/p\u003e\n\u003ch2 id=\"the-double-agent-mission\"\u003eThe Double Agent Mission\u003c/h2\u003e\n\u003ch3 id=\"serving-two-masters\"\u003eServing Two Masters\u003c/h3\u003e\n\u003cp\u003eThe Templars' public mission was the defense of Christendom. Their private mission was the accumulation of knowledge and power for purposes that had nothing to do with Christianity. Evidence of this double mission includes:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eArchitectural knowledge\u003c/strong\u003e — The Templars built structures of extraordinary sophistication, incorporating sacred geometry, acoustic engineering, and energy-harvesting design principles that they could not have learned from the medieval European building tradition. Their round churches, modeled on the Church of the Holy Sepulchre, incorporate geometric ratios and acoustic properties that suggest an understanding of physics far beyond the medieval norm.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEsoteric practices\u003c/strong\u003e — During the Templar trials of 1307-1312, confessions (extracted under torture, and therefore unreliable individually but significant in their consistency) described Templar initiation rituals that included the denial of Christ, the worship of a head called \"Baphomet,\" and sexual practices inconsistent with their religious vows.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eIslamic connections\u003c/strong\u003e — The Templars maintained diplomatic and commercial relationships with Islamic rulers that went far beyond military necessity. They exchanged knowledge, traded goods, and in some cases formed alliances that contradicted their Crusader mission. The Islamic esoteric tradition — Sufism, alchemy, sacred geometry — influenced Templar practices in ways that the Catholic Church would later condemn.\u003c/p\u003e\n\u003ch3 id=\"the-suppression\"\u003eThe Suppression\u003c/h3\u003e\n\u003cp\u003eOn Friday, October 13, 1307, King Philip IV of France ordered the simultaneous arrest of every Templar in France. The operation — coordinated across the kingdom with sealed orders opened simultaneously at dawn — was one of the most sophisticated police operations of the medieval period.\u003c/p\u003e\n\u003cp\u003ePhilip's motives were financial (he owed the Templars enormous debts) and political (the Templars' power threatened his authority). But the timing suggests coordination with forces beyond France. Pope Clement V, who initially resisted Philip's demands, eventually issued the papal bull \u003cem\u003eVox in Excelso\u003c/em\u003e in 1312, formally dissolving the Templar order.\u003c/p\u003e\n\u003cp\u003eThe suppression was incomplete. The Templars had been warned — by whom remains disputed — and the fleet that had been stationed at the Templar port of La Rochelle vanished before the arrests. The Templar treasury, reportedly stored at the Paris Temple, was found to be empty when Philip's men arrived. The most valuable Templar assets — their knowledge, their fleet, and their treasure — escaped.\u003c/p\u003e\n\u003cp\u003eWhere did they go? Scotland (which did not enforce the papal suppression), Portugal (where the Templars simply reorganized as the Knights of Christ), and possibly the Americas (where Templar symbols and artifacts have been found from New England to South America).\u003c/p\u003e\n\u003cp\u003eThe Jesuits inherited the Templar mission when Loyola founded the Society of Jesus in 1534. The parallel between the two orders is striking: both were military organizations disguised as religious ones; both operated globally; both accumulated enormous wealth and power; both answered directly to the Pope while pursuing their own agendas; and both were eventually suppressed by the Pope (the Jesuits in 1773) only to survive and return stronger than before.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's near-death experience showed him that the spiritual realm operates through a hierarchy of principalities and powers — the same hierarchy that the Templars tapped into through their esoteric practices and that the Jesuits continued to serve through their own methods. The forbidden knowledge the Templars discovered was not merely human; it was demonic — technology and wisdom granted by the fallen angels described in Genesis 6 and preserved through the millennia for those who would serve Satan's purposes. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eSee also \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e and \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/111-Free_Energy_Murdered.mp4\"\u003eFree Energy Murdered\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/105-Freemason_Jesters.mp4\"\u003eFreemason Jesters\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/75-The_Secret_of_the_Cave.mp4\"\u003eThe Secret of the Cave\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/03-Cave_of_Treasures.mp4\"\u003eCave of Treasures\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/knights-templar-conspiracy-part1/?lang=en\"\u003eThe Knights Templar CONSPIRACY That Chang
