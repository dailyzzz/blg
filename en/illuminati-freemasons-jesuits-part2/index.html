w 7:15-16\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe founding of the United States of America is presented in public education as a triumph of Enlightenment ideals — liberty, democracy, and the rights of man prevailing over tyranny. The hidden history reveals a far more complex and disturbing reality. The men who shaped the American republic were deeply embedded in secret society networks — Freemasonry, Rosicrucianism, and organizations connected to the Illuminati — and the nation they built was designed according to principles that owed as much to occult tradition as to political philosophy. The founding was not merely a political act; it was a ritualistic one, conducted by initiates of mystery traditions with objectives that extended far beyond the establishment of a new government.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's revelation that the spiritual realm operates with military precision directly applies to the founding era. The principalities and powers of Ephesians 6:12 do not take centuries off — they are present at every pivotal moment in human history, influencing events through the human agents who have submitted to their authority. The 97.5% who walk the road to destruction include the millions who have been taught a sanitized version of American history that conceals the occult dimensions of the nation's founding. As Pittman learned, the deception is so thorough that even sincere believers are manipulated by narratives designed to obscure spiritual reality.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order's involvement in the founding era has been documented by researchers but systematically excluded from mainstream historical accounts. Catholic Confidential reveals the Jesuit method of operating \"cloaked with cunning,\" and no period in American history better illustrates this methodology than the founding. The tracks \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e expose the spiritual forces that operate through human instruments of deception.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-masonic-foundation\"\u003eThe Masonic Foundation\u003c/h2\u003e\n\u003ch3 id=\"freemasonry-in-colonial-america\"\u003eFreemasonry in Colonial America\u003c/h3\u003e\n\u003cp\u003eFreemasonry was the dominant secret society in colonial America, and its membership included a staggering proportion of the men who would lead the Revolution and shape the new republic. George Washington, Benjamin Franklin, John Hancock, Paul Revere, and dozens of other prominent figures were Freemasons. The Boston Tea Party was planned in Masonic lodges. The Declaration of Independence was signed by Masonic brethren. The Constitution was drafted by men who had sworn Masonic oaths before they swore their oaths of public office.\u003c/p\u003e\n\u003cp\u003eThe significance of this Masonic dominance has been systematically minimized by mainstream historians, who portray Freemasonry as a harmless fraternal organization — a social club with funny handshakes. This characterization ignores the theological, philosophical, and organizational dimensions of Freemasonry that made it a vehicle for the transmission of occult doctrines and the coordination of revolutionary activity.\u003c/p\u003e\n\u003cp\u003eFreemasonry operates through a system of degrees — progressive levels of initiation in which the candidate is gradually exposed to the order's deeper teachings. At the lower degrees, Freemasonry presents itself as a benevolent organization dedicated to moral improvement and charitable works. At the higher degrees, the philosophical content shifts dramatically toward explicitly occult and Luciferian themes. This graduated revelation ensures that the majority of Masons never encounter the order's true doctrines, while those who advance to the higher degrees have been thoroughly vetted and conditioned for acceptance.\u003c/p\u003e\n\u003ch3 id=\"the-masonic-theology\"\u003eThe Masonic Theology\u003c/h3\u003e\n\u003cp\u003eThe theological foundation of Freemasonry is syncretic — it draws from Christianity, Judaism, Hermeticism, Kabbalah, Egyptian mystery religion, and classical paganism to create a unified system that positions itself above all individual religions. The Masonic \"Great Architect of the Universe\" is explicitly not the God of the Bible — it is a generic deity that can be interpreted through any theological lens, which makes it compatible with every religion and identical to none.\u003c/p\u003e\n\u003cp\u003eThis theological neutrality is, in reality, a theological position — the position that all religions are equally valid paths to the same divine reality, and that the initiated Mason possesses a higher understanding that transcends sectarian distinctions. This is precisely the doctrine that Jesus rejected when He declared, \"I am the way, the truth, and the life: no man cometh unto the Father, but by me.\" Freemasonry's inclusive theology is an explicit denial of Christ's exclusive claim, dressed in the language of tolerance and enlightenment.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order's relationship with Freemasonry is complex and paradoxical. The Catholic Church has formally condemned Freemasonry multiple times, and the Jesuits have publicly opposed it. Yet the organizational similarities between the two orders — hierarchical degrees, secret initiation, global reach, and the pursuit of power through institutional infiltration — suggest a deeper relationship. As documented in numerous historical sources, the Jesuits have historically infiltrated organizations they publicly oppose, operating within them while using them to advance Jesuit objectives.\u003c/p\u003e\n\u003ch2 id=\"benjamin-franklin-the-quintessential-insider\"\u003eBenjamin Franklin: The Quintessential Insider\u003c/h2\u003e\n\u003ch3 id=\"diplomat-mason-and-operative\"\u003eDiplomat, Mason, and Operative\u003c/h3\u003e\n\u003cp\u003eBenjamin Franklin is perhaps the most revealing figure of the founding era. Celebrated as a scientist, diplomat, philosopher, and patriot, Franklin was also a high-ranking Freemason, a member of multiple secret societies, and a man whose activities in Europe connected him to the very networks that would become the Illuminati.\u003c/p\u003e\n\u003cp\u003eFranklin served as Grand Master of the Grand Lodge of Pennsylvania and was deeply involved in French Freemasonry during his years as American ambassador to France. He was a member of the Lodge of the Nine Sisters (Les Neuf Soeurs) in Paris, which counted among its members Voltaire, the Marquis de Lafayette, and other figures central to both the American and French Revolutions. The lodge was a nexus of revolutionary planning, and Franklin's position within it placed him at the intersection of Masonic, Illuminist, and Jesuit networks operating in pre-revolutionary France.\u003c/p\u003e\n\u003cp\u003eFranklin's participation in the Hellfire Club — a notorious society in England that engaged in blasphemous rituals and sexual excess — reveals a dimension of his character that patriotic hagiography has carefully concealed. The Hellfire Club met in caves beneath the ruins of a medieval monastery, conducting mock religious services and engaging in practices that were explicitly anti-Christian. Franklin's involvement with this group is documented in historical records but excluded from popular accounts of his life.\u003c/p\u003e\n\u003ch3 id=\"the-bodies-beneath-the-house\"\u003eThe Bodies Beneath the House\u003c/h3\u003e\n\u003cp\u003eIn 1998, during renovations to Benjamin Franklin's London residence at 36 Craven Street, workers discovered the remains of approximately fifteen hundred bones belonging to at least fifteen people, including six children. The bones showed signs of dissection and surgical experimentation. The official explanation attributed the bones to the anatomical research of William Hewson, a physician who rented part of Franklin's house. This explanation has satisfied mainstream historians, but the presence of children's remains and the signs of experimentation raise questions that the official account does not adequately address.\u003c/p\u003e\n\u003cp\u003eThe discovery at Craven Street illustrates a broader principle: the founding fathers were men of their time, operating within networks that engaged in activities that modern sensibilities would find abhorrent. The sanitized version of history that presents them as secular saints conceals the reality of their involvement in secret societies, occult practices, and activities that would disqualify them from public life if conducted today.\u003c/p\u003e\n\u003ch2 id=\"the-illuminati-connection\"\u003eThe Illuminati Connection\u003c/h2\u003e\n\u003ch3 id=\"adam-weishaupt-and-the-american-network\"\u003eAdam Weishaupt and the American Network\u003c/h3\u003e\n\u003cp\u003eThe Bavarian Illuminati, founded by Adam Weishaupt on May 1, 1776 — just two months before the American Declaration of Independence — was not an isolated Bavarian phenomenon. Its membership and influence extended across Europe and, through Masonic networks, into the American colonies. The timing of the Illuminati's founding relative to the American Revolution is suggestive, though the precise nature of the connection remains a matter of scholarly debate.\u003c/p\u003e\n\u003cp\u003eWhat is not debated is that Illuminati methodology influenced American Freemasonry. The Illuminati's technique of infiltrating existing organizations — lodges, universities, governments — and gradually directing them toward Illuminist objectives was adopted by Masonic networks on both sides of the Atlantic. George Washington himself acknowledged the existence of Illuminati influence in American Masonic lodges in a letter dated October 24, 1798, writing that he did \"not believe that the lodges of Freemasons in this Country have, as Societies, endeavoured to propagate the diabolical tenets of the first, or pernicious principles of the latter\" — a carefully worded statement that acknowledged the existence of such influence while denying its organizational nature.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e examines the specific connections between Illuminati networks and the men who shaped the American republic. These connections, documented in letters, lodge records, and organizational archives, reveal a founding generation far more deeply embedded in secret society networks than the public history acknowledges.\u003c/p\u003e\n\u003ch3 id=\"the-french-connection\"\u003eThe French Connection\u003c/h3\u003e\n\u003cp\u003eThe American Revolution could not have succeeded without French support, and French support was channeled largely through Masonic and Illuminist networks. The Marquis de Lafayette, who played a crucial role in the American victory, was a Freemason connected to the same Parisian lodges where Franklin operated. French financial and military support was arranged through networks that combined diplomatic, commercial, and fraternal connections — networks in which Masonic and Illuminist affiliation served as the basis of trust.\u003c/p\u003e\n\u003cp\u003eThe French Revolution that followed the American Revolution displayed far more overtly the revolutionary methodology of the Illuminati: the destruction of the established church, the execution of the monarch, the establishment of a \"Cult of Reason\" that replaced Christianity with secular worship, and the reign of terror that consumed its own children. The French Revolution was the Illuminati program executed without the restraints that American circumstances imposed — and its horrors revealed the true nature of the revolutionary ideology that American Masonry shared.\u003c/p\u003e\n\u003ch2 id=\"the-jesuit-hand\"\u003eThe Jesuit Hand\u003c/h2\u003e\n\u003ch3 id=\"the-suppression-and-its-consequences\"\u003eThe Suppression and Its Consequences\u003c/h3\u003e\n\u003cp\u003ePope Clement XIV suppressed the Jesuit order in 1773 — three years before both the Illuminati's founding and the American Declaration of Independence. This timing is critical. The suppression did not destroy the Jesuits — it drove them underground, forcing them to operate through the very secret society networks they had previously opposed publicly. The suppressed Jesuits found refuge in Protestant Prussia and Orthodox Russia, where they continued to operate openly, while in Catholic countries they went covert.\u003c/p\u003e\n\u003cp\u003eClement XIV's famous statement — \"I have signed my death warrant\" — proved prophetic. He was poisoned in 1774, almost certainly by Jesuit agents. His successor, Pius VI, did not reverse the suppression, and the Jesuits remained officially dissolved until 1814. During these forty-one years of formal suppression, the Jesuits operated through every available channel — Masonic lodges, royal courts, banking houses, and the networks of the Illuminati itself.\u003c/p\u003e\n\u003cp\u003eJohn Adams, who became the second President of the United States, wrote: \"If ever there were a body of men who merited eternal damnation on earth and in hell, it is this society of Loyolas.\" Adams understood the Jesuit threat because he had observed their operations firsthand during the founding era. His warning has been systematically ignored by historians who prefer to treat the Jesuits as a religious order rather than the military intelligence organization they actually are.\u003c/p\u003e\n\u003ch3 id=\"jesuit-influence-on-the-founding-documents\"\u003eJesuit Influence on the Founding Documents\u003c/h3\u003e\n\u003cp\u003eThe Jesuit influence on the American founding is subtler than the Masonic influence but no less significant. The Jesuit tradition of casuistry — the application of general moral principles to specific cases through detailed reasoning — influenced the legal and constitutional thinking of the founding era. The Jesuit-educated lawyers and diplomats who operated within the founding generation brought with them intellectual habits shaped by Jesuit pedagogy, whether or not they recognized the source.\u003c/p\u003e\n\u003cp\u003eThe Georgetown University connection is particularly significant. Georgetown, founded by Jesuits in 1789 — the same year the Constitution took effect — became the primary Jesuit institution in the new republic. Its location in the capital city and its role in educating the political class ensured that Jesuit influence would be embedded in American governance from the beginning. The Jesuit superior Tamburini's boast about governing \"not only to Paris but to China\" found its American expression in Georgetown's role as the training ground for diplomats, intelligence operatives, and political leaders.\u003c/p\u003e\n\u003ch2 id=\"the-occult-design\"\u003eThe Occult Design\u003c/h2\u003e\n\u003ch3 id=\"washington-dc-and-sacred-geometry\"\u003eWashington D.C. and Sacred Geometry\u003c/h3\u003e\n\u003cp\u003eThe design of Washington D.C. reflects Masonic and occult principles that have been extensively documented by researchers. The city's layout incorporates pentagonal, hexagonal, and other geometric forms associated with Masonic and Hermetic symbolism. The placement of key buildings — the Capitol, the White House, the Washington Monument — corresponds to astronomical alignments and geometric relationships that are meaningful within the Masonic-Hermetic tradition.\u003c/p\u003e\n\u003cp\u003ePierre Charles L'Enfant, the architect of Washington D.C., was a Freemason who designed the capital according to principles that combined civic planning with esoteric symbolism. The cornerstone of the Capitol was laid in a Masonic ceremony conducted by George Washington himself, wearing his Masonic regalia. The Washington Monument, the tallest structure in the capital, is an Egyptian obelisk — a symbol with profound significance in Masonic and Hermetic tradition, representing the generative principle and the connection between the earthly and the divine.\u003c/p\u003e\n\u003cp\u003eThese symbolic elements are not mere decorations. Within the Masonic-Hermetic worldview, symbols are operative — they channel spiritual forces and establish resonances with higher realities. The design of Washington D.C. was intended to create a sacred space — sacred not to the God of the Bible, but to the \"Great Architect\" of Masonic theology, which is a cipher for the spiritual forces that the Masonic tradition serves.\u003c/p\u003e\n\u003ch3 id=\"the-great-seal\"\u003eThe Great Seal\u003c/h3\u003e\n\u003cp\u003eThe Great Seal of the United States, adopted in 1782, contains symbolism that is explicitly Masonic and Illuminist. The reverse of the seal — reproduced on every dollar bill — features an unfinished pyramid surmounted by the All-Seeing Eye, with the Latin mottoes \"Annuit Coeptis\" (He approves our undertakings) and \"Novus Ordo Seclorum\" (New Order of the Ages). The thirteen steps of the pyramid, the Eye of Providence, and the Latin inscriptions all carry meanings within the Masonic-Illuminist tradition that extend far beyond their patriotic surface interpretation.\u003c/p\u003e\n\u003cp\u003eThe phrase \"Novus Ordo Seclorum\" is particularly significant. It announces not merely a new nation but a new age — a new order that transcends the old world and its established institutions. This is the language of revolution, and specifically the language of the kind of total revolution — political, religious, and spiritual — that the Illuminati program envisioned. The \"New Order of the Ages\" is the Illuminati's new world order, announced on the official seal of the nation that would serve as its primary instrument.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e traces the consequences of this founding compromise — a nation ostensibly dedicated to liberty but built on occult foundations that ensured its eventual subjugation to the very powers its founding mythology claims to oppose.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-reality\"\u003eThe Spiritual Reality\u003c/h2\u003e\n\u003ch3 id=\"what-the-founders-actually-built\"\u003eWhat the Founders Actually Built\u003c/h3\u003e\n\u003cp\u003eThe American founding is simultaneously one of the greatest political achievements in human history and one of the most sophisticated spiritual deceptions. The principles of the founding documents — individual liberty, limited government, the consent of the governed — are noble and, in many cases, genuinely derived from Christian political theology. But these principles were embedded within a framework of occult symbolism, secret society governance, and Illuminist ideology that would ultimately subvert them.\u003c/p\u003e\n\u003cp\u003eThe genius of the deception is its complexity. Because genuine goods are mixed with genuine evils, discernment becomes extraordinarily difficult. The founding fathers were not uniformly evil — many were sincere in their commitments to liberty and justice. But they operated within networks that served objectives beyond their individual intentions, and the framework they built was designed to accommodate those objectives even when they conflicted with the stated principles of the republic.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony about the 95% who serve \"self\" applies to the founding generation as thoroughly as to any other. The founding fathers served their own visions, their own ambitions, and their own understandings — and in doing so, they served purposes they did not fully comprehend. The principalities and powers that operate in the second heaven do not require conscious cooperation from their human agents. They require only that those agents pursue their own interests within a framework that has been designed to channel those interests toward demonic objectives.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"The Founding Fathers and Secret Societies,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/
