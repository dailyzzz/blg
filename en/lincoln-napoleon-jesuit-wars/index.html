003e\n\u003cp\u003eThe apostle Paul did not instruct believers to tolerate the works of darkness. He did not counsel accommodation, dialogue, or peaceful coexistence with evil. He commanded exposure. Reprove them. Shine the light. Name the darkness for what it is. The Christian's duty is not merely to avoid evil but to expose it — to drag it from the shadows into the light where it can be seen, identified, and resisted.\u003c/p\u003e\n\u003cp\u003eTwo of the most powerful leaders in modern history obeyed this command, whether they knew it or not. Abraham Lincoln, the sixteenth president of the United States, and Napoleon Bonaparte, the Emperor of the French, both identified the Society of Jesus as the hidden force behind the wars, revolutions, and assassinations that shaped their eras. They came from different nations, different centuries, and different political traditions. They agreed on almost nothing. But on the identity of the enemy operating in the shadows, they spoke with one voice.\u003c/p\u003e\n\u003cp\u003eThe documentary \u003cem\u003eCatholic Confidential\u003c/em\u003e compiles their testimony alongside the testimony of other witnesses who reached the same conclusion independently. The convergence of these independent witnesses — men who had no communication with each other, no shared agenda, no common prejudice — constitutes evidence of extraordinary weight. When a French emperor and an American president, separated by half a century, name the same enemy using nearly identical language, the rational response is not skepticism but attention.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/151-One_Nation_Under_Blackmail.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eOne Nation Under Blackmail — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"lincolns-war-the-jesuits-and-the-american-civil-war\"\u003eLincoln's War: The Jesuits and the American Civil War\u003c/h2\u003e\n\u003ch3 id=\"the-presidents-accusation\"\u003eThe President's Accusation\u003c/h3\u003e\n\u003cp\u003eAbraham Lincoln did not merely suggest Jesuit involvement in the Civil War. He stated it as a matter of fact, with the authority of a president who had access to the most comprehensive intelligence available to any person in America:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"This war, the American Civil War, would never have been possible without the sinister influence of the Jesuits. We owe it to Popery that we now see our land reddened with the blood of her noblest sons.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe Civil War killed over 600,000 Americans — more than all other American wars combined until the twentieth century. Lincoln attributed this catastrophe not to slavery alone, not to political disagreement, not to economic competition between North and South, but to \"the sinister influence of the Jesuits.\" He held \"Popery\" — the papal system and its Jesuit instrument — responsible for the blood that reddened American soil.\u003c/p\u003e\n\u003cp\u003eThis is not the language of casual suspicion. This is the formal accusation of the president of the United States, made during the most devastating war in American history, identifying a specific organization as the force that made the war possible. Lincoln had access to military intelligence, diplomatic correspondence, and counterintelligence reports. His accusation was not based on prejudice. It was based on evidence.\u003c/p\u003e\n\u003ch3 id=\"the-confederate-connection\"\u003eThe Confederate Connection\u003c/h3\u003e\n\u003cp\u003eLincoln was specific about the mechanism of Jesuit influence on the Confederacy:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Neither Jeff Davis nor any one of the leading men of the Confederacy would have dared to attack the North had they not relied on the promise of the Jesuits.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eJefferson Davis and the Confederate leadership, according to Lincoln, were not acting independently. They were relying on promises from the Jesuits — promises of support, promises of European intervention, promises of resources and assistance. The Confederacy did not wage war on its own initiative. It waged war because the Jesuits encouraged it, supported it, and promised it the backing it needed to succeed.\u003c/p\u003e\n\u003cp\u003eThe historical evidence supports Lincoln's assessment. The Confederacy desperately sought European recognition and intervention. The Catholic monarchies of Europe — France under Napoleon III and Austria under the Habsburgs, both deeply influenced by Jesuit advisors — were the most sympathetic to the Confederate cause. Napoleon III actually installed a Catholic emperor, Maximilian, in Mexico during the Civil War, creating a Catholic monarchy on America's southern border. This was not coincidence. It was coordination.\u003c/p\u003e\n\u003ch3 id=\"the-immigration-of-agents\"\u003eThe Immigration of Agents\u003c/h3\u003e\n\u003cp\u003eLincoln understood the broader context of the Jesuit strategy in America:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"The Protestants of both the North and South would surely unite to exterminate the priests and the Jesuits if they could learn how the priests, nuns, and monks which daily land on our shores, under the pretext of preaching their religion, are nothing else but the emissaries of the Pope, of Napoleon III, and the other despots of Europe, to undermine our institutions, alienate the hearts of our people from our Constitution and our laws, destroy our schools, and prepare a reign of anarchy.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eLincoln is describing a covert invasion. The \"priests, nuns, and monks\" arriving in America were not primarily missionaries. They were \"emissaries\" — agents of the Pope, Napoleon III, and European despotism. Their mission was not to preach the gospel but to \"undermine our institutions,\" \"alienate the hearts of our people from our Constitution,\" \"destroy our schools,\" and \"prepare a reign of anarchy.\"\u003c/p\u003e\n\u003cp\u003eEvery element of this description has been fulfilled. American institutions have been undermined — systematically, from within, over generations. The Constitution has been progressively reinterpreted to mean something its framers would not recognize. The public school system, which was designed to produce informed citizens capable of self-governance, has been transformed into a system that produces compliant consumers incapable of critical thought. And the anarchy that Lincoln predicted — the social disintegration, the cultural collapse, the loss of shared values and common purpose — is the defining reality of the contemporary American experience.\u003c/p\u003e\n\u003ch3 id=\"the-assassination-foretold\"\u003eThe Assassination Foretold\u003c/h3\u003e\n\u003cp\u003eLincoln's awareness of the personal danger he faced was constant and specific:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"New projects of assassination are detected almost every day, accompanied with such savage circumstances that they bring to my memory the massacre of St. Bartholomew and the Gunpowder Plot.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe reference to St. Bartholomew — the 1572 massacre of French Protestants orchestrated by Catholic forces — and the Gunpowder Plot — the 1605 Jesuit conspiracy to blow up the English Parliament — reveals Lincoln's understanding that the threats against him were not random but part of a historical pattern. The Jesuits had a centuries-long history of assassinating leaders who opposed them. Lincoln saw himself as the next target in that pattern.\u003c/p\u003e\n\u003cp\u003eHis assessment of the Jesuit character confirmed this understanding:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"I know that Jesuits never forget nor forsake.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eSeven words that serve as his own epitaph. The Jesuits never forget a target. They never abandon a mission. Lincoln had identified them publicly as the force behind the Civil War. He had named their strategy. He had warned the American people. And he knew — with the certainty of a man who understood his enemies — that they would never stop trying to silence him.\u003c/p\u003e\n\u003cp\u003eOn April 14, 1865, they succeeded. Abraham Lincoln was shot at Ford's Theatre by John Wilkes Booth. The official narrative treats the assassination as the act of a Confederate sympathizer. Lincoln's own testimony — the testimony of the man who was killed — identifies a different sponsor.\u003c/p\u003e\n\u003ch2 id=\"napoleons-analysis-the-most-absolute-of-despotisms\"\u003eNapoleon's Analysis: \"The Most Absolute of Despotisms\"\u003c/h2\u003e\n\u003ch3 id=\"the-emperors-military-assessment\"\u003eThe Emperor's Military Assessment\u003c/h3\u003e\n\u003cp\u003eNapoleon Bonaparte analyzed the Jesuits not as a theologian but as a military strategist — a man who understood power, organization, and the mechanics of conquest better than almost anyone in history:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Jesuitism is the most absolute of despotisms and at the same time the greatest and most enormous of abuses.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eNapoleon had encountered despotism in every form. He had fought against monarchies, republics, and empires. He had overthrown the French ancien regime and created his own empire. He had seen every form of political power that Europe could produce. And he concluded that Jesuitism was \"the most absolute of despotisms\" — more absolute than any monarchy, more complete than any dictatorship, more total than any political system he had encountered.\u003c/p\u003e\n\u003cp\u003eThe word \"abuse\" is equally significant. Jesuitism is not merely a despotism. It is \"the greatest and most enormous of abuses\" — an abuse of religion, an abuse of trust, an abuse of the human need for God. The Jesuits exploit the most sacred dimension of human experience — the desire for meaning, for salvation, for connection with the divine — as an instrument of earthly power. This is not merely political tyranny. It is spiritual tyranny — the worst form of abuse because it corrupts the deepest part of the human soul.\u003c/p\u003e\n\u003ch3 id=\"the-general-above-the-sovereign\"\u003eThe General Above the Sovereign\u003c/h3\u003e\n\u003cp\u003eNapoleon identified the specific mechanism of Jesuit political control:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"The general of the Jesuits insists on being master sovereign over the sovereign.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThis single sentence explains the Jesuit relationship to every government in history. The Jesuits do not seek to replace the sovereign. They seek to master the sovereign. The king remains on his throne. The president remains in his office. The prime minister remains in his chamber. But above each of them stands the Jesuit General — unseen, unnamed, unelected, and unaccountable — directing the decisions that the sovereign believes are his own.\u003c/p\u003e\n\u003cp\u003eNapoleon understood this because he had experienced it. Despite his enormous personal power, despite his military genius, despite his ability to reshape the map of Europe at will, Napoleon found the Jesuit influence to be a force he could not entirely control or eliminate. The Jesuits had been suppressed by the pope in 1773 — before Napoleon's rise — but they had survived in Russia and continued to operate through front organizations and allied networks throughout Napoleon's empire.\u003c/p\u003e\n\u003ch3 id=\"the-doctrine-of-meritorious-crime\"\u003eThe Doctrine of Meritorious Crime\u003c/h3\u003e\n\u003cp\u003eNapoleon identified the moral framework that makes the Jesuit system so dangerous:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Every act, every crime, however atrocious, is a meritorious work if committed for the interest of the Society of the Jesuits or by the order of the General.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThis is the doctrine that transforms a religious order into a criminal organization of unlimited scope. When the General commands murder, murder becomes a \"meritorious work.\" When the General commands treason, treason becomes an act of obedience to God. When the General commands the destruction of a nation, the destruction becomes a holy offering. There is no crime so atrocious that it cannot be sanctified by the General's order.\u003c/p\u003e\n\u003cp\u003eThis doctrine explains the Jesuit involvement in assassinations, wars, revolutions, and destabilization campaigns throughout their history. The agents who carry out these operations are not troubled by conscience because their conscience has been replaced by obedience. They do not experience guilt because guilt requires an independent moral judgment, and independent judgment has been abolished. They commit atrocities with the serene confidence of men performing religious duty — because that is exactly what they believe they are doing.\u003c/p\u003e\n\u003ch2 id=\"paolo-sarpi-the-plague-of-the-world\"\u003ePaolo Sarpi: \"The Plague of the World\"\u003c/h2\u003e\n\u003ch3 id=\"the-venetian-scholars-indictment\"\u003eThe Venetian Scholar's Indictment\u003c/h3\u003e\n\u003cp\u003ePaolo Sarpi, the great Venetian scholar and theologian of the sixteenth and seventeenth centuries, provided one of the most comprehensive indictments of the Jesuit system:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"They are a public plague and the plague of the world. From the Jesuit colleges there never is sent a pupil obedient to his father, devoted to his country, loyal to his prince. Every species of vice finds its patronage in them.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eSarpi's assessment strikes at the heart of the Jesuit educational project. The Jesuit colleges — which were among the finest educational institutions in Europe — did not produce good citizens. They produced Jesuit agents. A pupil who entered a Jesuit college obedient to his father left obedient to the Society. A pupil who entered devoted to his country left devoted to the Jesuit mission. A pupil who entered loyal to his prince left loyal to the General.\u003c/p\u003e\n\u003cp\u003eThe phrase \"every species of vice finds its patronage in them\" is a damning summary of the moral consequences of the Jesuit system. When obedience replaces conscience, when the General's command replaces God's law, when any crime becomes meritorious on the order of the Superior — then there is no vice that is not patronized, no sin that is not sanctioned, no evil that is not blessed by the institution.\u003c/p\u003e\n\u003ch2 id=\"general-harris-on-the-assassination-strategy\"\u003eGeneral Harris on the Assassination Strategy\u003c/h2\u003e\n\u003ch3 id=\"the-assassination-as-jesuit-policy\"\u003eThe Assassination as Jesuit Policy\u003c/h3\u003e\n\u003cp\u003eGeneral Harris provided a specific assessment of the Jesuit role in Lincoln's assassination:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"It would seem that the Jesuits had had it in mind from the beginning of the war to find an occasion for the taking off [assassination] of Mr. Abraham Lincoln. The favorite policy of the Jesuits is that of assassination.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\"The favorite policy\" — not an occasional resort, not a last-resort measure, but the favored method. Assassination is the Jesuit's preferred instrument of political change. When a leader opposes Jesuit interests, the first option is not negotiation, not compromise, not political pressure — it is assassination. The Jesuits kill their enemies. This is not speculation. This is the assessment of a military professional who studied their methods.\u003c/p\u003e\n\u003cp\u003eHarris places the decision to assassinate Lincoln at \"the beginning of the war\" — not as a response to Confederate defeat but as part of the original war plan. Lincoln was targeted not because the South was losing but because Lincoln was winning — and because his victory would expose the Jesuit role in starting the war. The assassination was not revenge. It was damage control.\u003c/p\u003e\n\u003ch2 id=\"charles-chiniquy-the-prophecy-fulfilled\"\u003eCharles Chiniquy: The Prophecy Fulfilled\u003c/h2\u003e\n\u003ch3 id=\"the-priest-who-warned-lincoln\"\u003eThe Priest Who Warned Lincoln\u003c/h3\u003e\n\u003cp\u003eCharles Chiniquy was a Catholic priest who left the Church and became one of the most vocal critics of Jesuit power in America. His personal relationship with Abraham Lincoln — whom he had known before Lincoln became president — gave him unique access to Lincoln's thinking about the Jesuit threat. Chiniquy recorded Lincoln's words and added his own prophetic assessment:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"The day is very near when the Jesuits will rule their country, from the magnificent White House at Washington to the humblest civil and military department of this vast republic.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThis prophecy, made in the nineteenth century, describes the twenty-first century with uncomfortable precision. Jesuit-educated individuals occupy positions at every level of American government — from the White House (multiple presidents have been Jesuit-educated or Jesuit-influenced) to \"the humblest civil and military department.\" The Jesuit educational network has produced a governing class that, whether consciously or unconsciously, serves the Jesuit agenda.\u003c/p\u003e\n\u003cp\u003eChiniquy's warning was not about distant future. He said \"the day is very near.\" And he was right. Within a generation of his warning, Jesuit institutions were established in every major American city. Within two generations, Jesuit-educated individuals were occupying positions of significant power. Within three generations, the Jesuit influence in American government, education, media, and culture was so pervasive that it was invisible — part of the background noise of American life, unnoticed because it was everywhere.\u003c/p\u003e\n\u003ch2 id=\"pope-clement-xiv-the-pope-who-paid-the-price\"\u003ePope Clement XIV: The Pope Who Paid the Price\u003c/h2\u003e\n\u003ch3 id=\"the-suppression-of-1773\"\u003eThe Suppression of 1773\u003c/h3\u003e\n\u003cp\u003eThe suppression of the Jesuit order by Pope Clement XIV in 1773 is one of the most significant events in modern history. The pope — the supreme authority of the Catholic Church, the man the Jesuits were theoretically sworn to obey — concluded that the Society of Jesus was so dangerous that it had to be dissolved entirely.\u003c/p\u003e\n\u003cp\u003eThe bull \u003cem\u003eDominus ac Redemptor\u003c/em\u003e was the product of years of pressure from the Catholic monarchs of Europe. Portugal had expelled the Jesuits in 1759. France had expelled them in 1764. Spain had expelled them in 1767. Every major Catholic kingdom had concluded, independently, that the Jesuits were a threat to national sovereignty and public order. Clement XIV, under enormous diplomatic pressure, finally agreed.\u003c/p\u003e\n\u003cp\u003eHis assessment was prescient: \u003cem\u003e\"The suppression is accomplished. I do not repent of it... But this suppression will be my death.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eOn September 22, 1774, Clement XIV was dead. The rapid decomposition of his body — a hallmark of poisoning in that era — pointed to foul play. The pope who suppressed the Jesuits was murdered by the organization he suppressed.\u003c/p\u003e\n\u003ch3 id=\"the-restoration-and-the-holy-alliance\"\u003eThe Restoration and the Holy Alliance\u003c/h3\u003e\n\u003cp\u003eThe Jesuit order was restored by Pope Pius VII in 1814 — forty-one years after its suppression. The restoration came in the aftermath of the Napoleonic Wars, during a period of political realignment that the Jesuits exploited masterfully.\u003c/p\u003e\n\u003cp\u003eThe Holy Alliance of 1815, formed by Russia, Austria, and Prussia after Napoleon's defeat, was ostensibly a pact to maintain Christian principles in European governance. In reality, it was a mechanism for suppressing democratic movements and maintaining the conservative order that served Jesuit interests. The Alliance committed its signatories to oppose revolution, democracy, and popular sovereignty — the very principles that threatened Jesuit control.\u003c/p\u003e\n\u003cp\u003eThe suppression had lasted only forty-one years. During that time, the Jesuits had survived in Russia under Catherine the Great's protection, maintained their networks through front organizations, and waited patiently for the political moment that would allow their restoration. When that moment came, they returned — stronger, wiser, and more determined than ever.\u003c/p\u003e\n\u003ch2 id=\"adam-weishaupt-and-the-illuminati-connection\"\u003eAdam Weishaupt and the Illuminati Connection\u003c/h2\u003e\n\u003ch3 id=\"the-jesuit-philosopher-who-founded-the-illuminati\"\u003eThe Jesuit Philosopher Who Founded the Illuminati\u003c/h3\u003e\n\u003cp\u003eAdam Weishaupt, the founder of the Bavarian Illuminati in 1776, was a former Jesuit student and professor of canon law at the Jesuit-founded University of Ingolstadt. His founding of the Illuminati was not a break with the Jesuit system. It was an extension of it — the application of Jesuit methods of secrecy, hierarchy, and infiltration to a secular organization with explicitly political goals.\u003c/p\u003e\n\u003cp\u003eThe historical record confirms the connection:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"The degree of power to which the representatives of the Society of Jesus had been able to attain in Bavaria was all but absolute.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eWeishaupt grew up in a Bavaria where Jesuit power was \"all but absolute.\" He was educated by Jesuits. He taught at a Jesuit university. He absorbed Jesuit methods — the cellular structure, the strict hierarchy, the absolute obedience, the invisible infiltration of existing institutions. When he founded the Illuminati, he simply adapted these methods to a new organization with a new cover story.\u003c/p\u003e\n\u003cp\u003eThe Illuminati's structure was a mirror image of the Jesuit system: grades of initiation, hidden leadership, compartmentalized information, the use of front organizations, the infiltration of existing institutions (Masonic lodges, universities, governments), and the cultivation of individuals in positions of power. Weishaupt even described his methods in language that echoes Loyola's instructions.\u003c/p\u003e\n\u003cp\u003eThe connection between the Jesuits and the Illuminati is not a conspiracy theory. It is a matter of documented historical fact. The man who founded the Illuminati was a product of the Jesuit system. The methods he used were Jesuit methods. The goals he pursued — the overthrow of existing authorities and the establishment of a new order — were goals that served the Jesuit agenda of universal dominion.\u003c/p\u003e\n\u003ch2 id=\"the-convergence-of-testimony\"\u003eThe Convergence of Testimony\u003c/h2\u003e\n\u003ch3 id=\"two-leaders-one-enemy\"\u003eTwo Leaders, One Enemy\u003c/h3\u003e\n\u003cp\u003eLincoln and Napoleon lived in different centuries, led different nations, faced different challenges, and held different political philosophies. Lincoln was a democratic republican who believed in popular sovereignty. Napoleon was an imperial autocrat who believed in his own destiny. They would have agreed on almost nothing — except the identity of the enemy operating in the shadows.\u003c/p\u003e\n\u003cp\u003eBoth named the Jesuits. Both described the same methods — infiltration, manipulation, the fomenting of division, the use of assassination. Both recognized that the Jesuit threat was not merely political but existential — a threat to the foundations of civilization itself. And both paid a price for their honesty — Lincoln with his life, Napoleon with his empire and ultimately his freedom.\u003c/p\u003e\n\u003cp\u003eThe convergence of their testimony is evidence that cannot be dismissed as prejudice, paranoia, or political convenience. These were the most powerful men of their respective eras. They had access to the best intelligence available. They had no motive to fabricate accusations against an organization that most people had never heard of. Their testimony stands as a warning across the centuries — a warning that the works of darkness described by Paul in Ephesians 5:11 are real, they are organized, and they must be reproved.\u003c/p\u003e\n\u003ch3 id=\"the-duty-to-expose\"\u003eThe Duty to Expose\u003c/h3\u003e\n\u003cp\u003ePaul's command in Ephesians 5:11 is not optional. \"Have no fellowship with the unfruitful works of darkness, but rather reprove them.\" The Christian is commanded to expose darkness — not to accommodate it, not to dialogue with it, not to make peace with it. Lincoln and Napoleon obeyed this command, whether they knew it or not. They reproved the works of darkness. They named the enemy. They shone the light.\u003c/p\u003e\n\u003cp\u003eThe question for our generation is whether we will do the same — or whether we will continue the tradition of willful ignorance that has allowed the Jesuit system to operate unchallenged for nearly five centuries.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/151-One_Nation_Under_Blackmail.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eOne Nation Under Blackmail — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eIlluminati Founding Fathers — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eMKUltra Never Ended — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Transgression — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/presidents-warned-jesuits-danger/?lang=en\"\u003eEvery President Who Warned About Jesuits Was Ignored — Or Killed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/black-pope-jesuit-general-rules-world/?lang=en\"\u003eThe Black Pope: \"From This Chamber I Govern the World\"\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/illuminati-1666-part1/?lang=en\"\u003eThe Jews, Jesus, and the Illuminati of 1666 Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pope-deal-devil-1786-part3/?lang=en\"\u003eThe Pope's Deal With the Devil Part 3\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eA French emperor and an American president. A man who conquered Europe and a man who preserved a republic. A Catholic by culture and a Protestant by conviction. They shared nothing — except the truth. Both saw the same hidden hand. Both named the same hidden enemy. Both described the same hidden methods. Napoleon lost his empire. Lincoln lost his life. The enemy they named has never been brought to justice, never been held accountable, and never been stopped. It operates today with more power, more reach, and more sophistication than either man could have imagined. The only thing that has changed is that fewer people are willing to say what Lincoln and Napoleon said — because the price of truth has only gone up since they paid it.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\
