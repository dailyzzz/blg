h go in thereat: Because strait is the gate, and narrow is the way, which leadeth unto life, and few there be that find it.\"\u003c/em\u003e — Matthew 7:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Strive to enter in at the strait gate: for many, I say unto you, will seek to enter in, and shall not be able.\"\u003c/em\u003e — Luke 13:24\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eJesus used two words that most Christians skip over. \"Few\" and \"many.\" Few find the narrow way. Many take the broad way to destruction. Many will seek to enter and shall not be able. These are not ambiguous words. They are precise. And they describe a ratio that should terrify every person who casually claims to be saved.\u003c/p\u003e\n\u003cp\u003eHoward Pittman did not theorize about this ratio. He was shown it. Standing before the throne of God on August 3, 1979, after his physical body had failed on the operating table, God gave him a number. Not a parable. Not a metaphor. A number: 97.5 percent. Ninety-seven and one-half percent of all professing Christians — rejected.\u003c/p\u003e\n\u003cp\u003eThe narrow gate is not narrow in the way most people imagine. It is almost sealed shut.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Transgression — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Darkness Into Light — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"august-3-1979\"\u003eAugust 3, 1979\u003c/h2\u003e\n\u003ch3 id=\"the-man\"\u003eThe Man\u003c/h3\u003e\n\u003cp\u003eHoward Pittman was not a casual believer. He was not a nominal Christian who attended church on Easter and Christmas. He was a Baptist minister — ordained, active, committed — for thirty-five years. Three and a half decades of sermons, Bible studies, pastoral visits, prayer meetings, funerals, weddings, baptisms, and counseling sessions. He had devoted his entire adult life to ministry.\u003c/p\u003e\n\u003cp\u003eBeyond the ministry, he was a retired New Orleans Police Department officer — a man who had walked the streets of one of America's most dangerous cities and survived. He lived on a sixty-one-acre farm in Mississippi. He was tough, practical, experienced, and deeply embedded in the institutional church.\u003c/p\u003e\n\u003cp\u003eThis is important because Pittman's testimony cannot be dismissed as the ravings of a fringe believer or an unstable personality. He was the very definition of an establishment Christian. Rooted. Respected. Reliable. And everything he thought he knew about Christianity was about to be dismantled.\u003c/p\u003e\n\u003ch3 id=\"the-death\"\u003eThe Death\u003c/h3\u003e\n\u003cp\u003eThe details of Pittman's physical crisis are medically documented. His main artery ruptured — a catastrophic internal hemorrhage that produced devastating blood loss. He was rushed to the hospital and admitted to the ICU around midnight. For hours, the medical team fought to stabilize him. By six in the morning, his vital signs failed. A seven-hour surgery followed.\u003c/p\u003e\n\u003cp\u003eDuring this crisis, as his physical body lay on the operating table, Howard Pittman prayed what he later described as \"a strange prayer.\" He asked God to allow him to appear before His throne. This was not a casual request. This was a dying man, a veteran minister, making a specific petition in his final moments.\u003c/p\u003e\n\u003cp\u003eAnd God granted it.\u003c/p\u003e\n\u003ch3 id=\"the-journey\"\u003eThe Journey\u003c/h3\u003e\n\u003cp\u003eAn angel came and lifted Pittman's spirit from his physical body. He was taken upward — through the first heaven (the physical realm), through the second heaven (the domain of Satan and his demons), and into the third heaven, the dwelling place of God Himself.\u003c/p\u003e\n\u003cp\u003eThe journey itself revealed realities that Pittman had never encountered in thirty-five years of ministry. The spirit realm was not a vague, cloudy, symbolic place. It was more real than the physical world. Communication happened through thought — not through mouth and ears, but through direct thought transmission. Travel happened at the speed of thought. Dimensional walls separated the realms, and flesh could not pass through them.\u003c/p\u003e\n\u003cp\u003eBut none of these revelations compared to what he was shown at the throne.\u003c/p\u003e\n\u003ch2 id=\"the-number\"\u003eThe Number\u003c/h2\u003e\n\u003ch3 id=\"what-god-revealed\"\u003eWhat God Revealed\u003c/h3\u003e\n\u003cp\u003eStanding before the throne of God — the Creator of the universe, the Alpha and Omega, the Beginning and the End — Howard Pittman was given a message. And the centerpiece of that message was a statistic so devastating that it has haunted everyone who has heard it since.\u003c/p\u003e\n\u003cp\u003eGod showed him that of all the people on earth who profess to be Christians — who call themselves believers, who attend church, who claim salvation, who declare Jesus as their Savior — only 2.5 percent are genuinely saved.\u003c/p\u003e\n\u003cp\u003e97.5 percent are rejected.\u003c/p\u003e\n\u003cp\u003eLet that number settle. Let it penetrate the comfortable assumptions. Let it dismantle the casual confidence.\u003c/p\u003e\n\u003cp\u003eIf a church has one thousand members, according to what God showed Pittman, only twenty-five of them are truly saved. Nine hundred and seventy-five are taking the placebo. They mouth the words. They perform the rituals. They believe they are saved. And they are not.\u003c/p\u003e\n\u003cp\u003eIf there are roughly 2.4 billion professing Christians on earth, this means that approximately 2.34 billion of them are deceived. They are mouth-professing Christians — confessing with their lips but never surrendering with their lives. And only about 60 million across the entire globe have genuinely passed through the narrow gate.\u003c/p\u003e\n\u003ch3 id=\"the-root-sin-serving-self\"\u003eThe Root Sin: Serving Self\u003c/h3\u003e\n\u003cp\u003eGod did not merely give Pittman a number. He showed him the reason. The root cause. The single, devastating explanation for why 97.5 percent fail.\u003c/p\u003e\n\u003cp\u003eThe answer is two words: serving self.\u003c/p\u003e\n\u003cp\u003eNinety-five percent of professing Christians — the vast, overwhelming majority — serve themselves. Not Satan. Not the world in any obvious way. Themselves. Their own desires. Their own comfort. Their own plans. Their own preferences. Their own will.\u003c/p\u003e\n\u003cp\u003eThis is the root sin. Not murder. Not adultery. Not theft. Not any of the dramatic sins that the church loves to preach against. The root sin is self. The self that sits on the throne where only Christ should sit. The self that says \"Lord, Lord\" while maintaining absolute control over its own life.\u003c/p\u003e\n\u003cp\u003eThey made Jesus Savior. They never made Him Lord.\u003c/p\u003e\n\u003cp\u003eThis distinction is everything. Savior means \"rescue me.\" Lord means \"rule me.\" Savior means \"save me from hell.\" Lord means \"take my life — all of it — and do with it what You will.\" Savior costs nothing. Lord costs everything.\u003c/p\u003e\n\u003cp\u003eThe placebo prescription offers the first without requiring the second. And 95 percent of professing Christians have swallowed it.\u003c/p\u003e\n\u003ch2 id=\"the-difference-between-profession-and-possession\"\u003eThe Difference Between Profession and Possession\u003c/h2\u003e\n\u003ch3 id=\"the-mouth-that-confesses\"\u003eThe Mouth That Confesses\u003c/h3\u003e\n\u003cp\u003eWords have power. Jesus Himself said so. In Matthew 12:36-37, He declared: \"But I say unto you, That every idle word that men shall speak, they shall give account thereof in the day of judgment. For by thy words thou shalt be justified, and by thy words thou shalt be condemned.\"\u003c/p\u003e\n\u003cp\u003eEvery idle word. Every careless declaration. Every unconsidered confession. Every \"praise the Lord\" spoken out of habit rather than genuine worship. Every \"I'm blessed\" offered as social currency rather than authentic testimony. Every \"Jesus is my Lord\" spoken by a mouth that belongs to a life that has never submitted to His lordship.\u003c/p\u003e\n\u003cp\u003eWords are not neutral. In the spiritual realm, words carry weight. They create reality. They establish covenants. They open doors. And they condemn.\u003c/p\u003e\n\u003cp\u003eThe mouth-professing Christian uses spiritual language like wallpaper — decorating a life that is fundamentally unchanged. He says \"born again\" but has never died. He says \"new creation\" but the old creation is still running the show. He says \"surrendered\" but has surrendered nothing except an hour on Sunday mornings.\u003c/p\u003e\n\u003cp\u003eAnd every one of these words will be accounted for. Not in some vague, future, theoretical sense. Literally. Specifically. Before the throne. Every word.\u003c/p\u003e\n\u003ch3 id=\"the-life-that-proves\"\u003eThe Life That Proves\u003c/h3\u003e\n\u003cp\u003eThe difference between mouth-professing faith and genuine salvation is not complicated. It is not a matter of theological sophistication or doctrinal precision. It is a matter of fruit.\u003c/p\u003e\n\u003cp\u003eJesus said it plainly: \"Ye shall know them by their fruits\" (Matthew 7:16). Not by their words. Not by their attendance records. Not by their emotional experiences. By their fruits.\u003c/p\u003e\n\u003cp\u003eWhat fruit does a life produce when self is on the throne? The fruit of self-service. The fruit of comfortable Christianity. The fruit of a faith that costs nothing and changes nothing. The fruit of religious activity that serves the ego — the reputation, the social standing, the self-image of being \"a good Christian.\"\u003c/p\u003e\n\u003cp\u003eWhat fruit does a life produce when Christ is on the throne? The fruit of sacrifice. The fruit of obedience that hurts. The fruit of decisions that make no sense to the natural mind — giving when you cannot afford it, forgiving when you have every right to hold the grudge, submitting when every fiber of your flesh screams to resist, going where He sends when you would rather stay.\u003c/p\u003e\n\u003cp\u003eThe first life is common. The second is rare. And the ratio between them is 97.5 to 2.5.\u003c/p\u003e\n\u003ch2 id=\"why-95-percent-serve-self\"\u003eWhy 95 Percent Serve Self\u003c/h2\u003e\n\u003ch3 id=\"the-throne-room-of-the-heart\"\u003eThe Throne Room of the Heart\u003c/h3\u003e\n\u003cp\u003eEvery human being has a throne room in their heart. Someone sits on that throne. Either self sits there, or Christ sits there. There is no third option. There is no shared throne. There is no power-sharing agreement.\u003c/p\u003e\n\u003cp\u003eThe placebo church teaches a version of Christianity that allows self to remain on the throne while adding Jesus to the cabinet. \"Accept Jesus as your Savior\" is the formula — and as far as it goes, it is true. But it is incomplete. Fatally incomplete. Because accepting Jesus as Savior does not require removing self from the throne. It merely adds another title to the administration.\u003c/p\u003e\n\u003cp\u003eThe genuine gospel demands something far more radical. It demands abdication. It demands that self step down — completely, permanently, unconditionally — and that Christ take the throne. Not as an advisor. Not as a counselor. Not as a co-regent. As Lord. Absolute, total, unchallenged Lord.\u003c/p\u003e\n\u003cp\u003eThis is what 95 percent of professing Christians have never done. They have added Jesus to their lives without subtracting themselves. They have accepted His salvation without submitting to His lordship. They have received the gift without paying the cost.\u003c/p\u003e\n\u003cp\u003eAnd the cost is everything. Jesus could not have been clearer: \"If any man will come after me, let him deny himself, and take up his cross, and follow me. For whosoever will save his life shall lose it: and whosoever will lose his life for my sake shall find it\" (Matthew 16:24-25).\u003c/p\u003e\n\u003cp\u003eDeny himself. Take up his cross. Lose his life. These are not suggestions. They are not optional add-ons for the super-spiritual. They are the entrance requirements for the narrow gate. And 97.5 percent of professing Christians have never met them.\u003c/p\u003e\n\u003ch3 id=\"the-comfortable-deception\"\u003eThe Comfortable Deception\u003c/h3\u003e\n\u003cp\u003eWhy do so many fail? Because the placebo is comfortable. Self on the throne is comfortable. You get to keep your plans. You get to maintain your lifestyle. You get to pursue your desires. You get to define your own terms of engagement with God.\u003c/p\u003e\n\u003cp\u003eThe genuine gospel is not comfortable. It is a crucifixion. You are nailed to a cross — your desires, your ambitions, your preferences, your rights, your will. All of it dies. And from that death, something new emerges. But the death comes first. Always the death comes first.\u003c/p\u003e\n\u003cp\u003eThe modern church has largely abandoned the language of death. It speaks instead of blessing, prosperity, purpose, fulfillment, destiny, breakthrough. These are not evil words. Some of them describe genuine spiritual realities. But they have been divorced from the cross. They are offered without the prerequisite of death. And without death, there is no resurrection. Without the cross, there is no crown.\u003c/p\u003e\n\u003cp\u003eThe 95 percent have been taught to skip the cross. They go straight from sin to salvation, from guilt to grace, from the altar call to the abundant life — without ever passing through death. They have been told they can have resurrection without crucifixion. And they believed it. Because the placebo is very, very convincing.\u003c/p\u003e\n\u003ch2 id=\"the-narrow-gate-in-numbers\"\u003eThe Narrow Gate in Numbers\u003c/h2\u003e\n\u003ch3 id=\"few-there-be-that-find-it\"\u003eFew There Be That Find It\u003c/h3\u003e\n\u003cp\u003eJesus said \"few.\" Not \"a significant minority.\" Not \"less than half.\" Few. The Greek word is \u003cem\u003eoligoi\u003c/em\u003e — a small number. A tiny number. And Pittman's testimony puts a number on \"few\": 2.5 percent.\u003c/p\u003e\n\u003cp\u003eThis aligns with the entire pattern of scripture. Noah and his family — eight people out of the entire population of the earth. Lot and his daughters — three people out of two cities. The Israelites who entered the Promised Land — two men (Joshua and Caleb) out of approximately 600,000 who left Egypt. Gideon's army — 300 out of 32,000.\u003c/p\u003e\n\u003cp\u003eGod has always worked with remnants. Small numbers. Tiny minorities. The pattern is consistent from Genesis to Revelation. And the pattern says: most who claim to belong to God do not truly belong to Him.\u003c/p\u003e\n\u003cp\u003eThis is not a popular message. It does not fill churches. It does not sell books. It does not generate tithes. And that is precisely why the placebo church avoids it. The placebo church preaches a wide gate — wide enough for everyone who says the right words, attends the right services, and writes the right checks. The genuine gospel preaches a narrow gate — so narrow that you cannot pass through it while carrying self.\u003c/p\u003e\n\u003ch3 id=\"strive-to-enter-in\"\u003eStrive to Enter In\u003c/h3\u003e\n\u003cp\u003eIn Luke 13:24, Jesus uses a word that the placebo church has all but eliminated from its vocabulary: \"strive.\" The Greek word is \u003cem\u003eagonizomai\u003c/em\u003e — from which we get \"agonize.\" It means to struggle, to fight, to exert oneself to the uttermost. It is the word used to describe an athlete in competition, a soldier in battle, a wrestler in a match.\u003c/p\u003e\n\u003cp\u003e\"Strive to enter in at the strait gate.\" Agonize to enter. Fight your way through. This is not a casual stroll through an open door. This is warfare. This is struggle. This is the most intense effort a human being can exert — directed not at earning salvation (which is impossible), but at surrendering self (which is required).\u003c/p\u003e\n\u003cp\u003eThe placebo church teaches that salvation is easy. \"Just accept Jesus.\" \"Just believe.\" \"Just say the prayer.\" And in one sense, grace IS free. But entering the narrow gate is not easy. It requires the death of the very thing that makes the broad way comfortable: self. And self does not die easily. Self fights. Self bargains. Self compromises. Self finds a thousand ways to remain on the throne while appearing to have abdicated.\u003c/p\u003e\n\u003cp\u003eThis is why Jesus says to strive. Because the battle against self is the hardest battle any human being will ever fight. It is harder than quitting an addiction. Harder than enduring persecution. Harder than facing death. Because self IS you. And dying to yourself is the ultimate agonizing.\u003c/p\u003e\n\u003ch2 id=\"gods-message-to-the-church\"\u003eGod's Message to the Church\u003c/h2\u003e\n\u003ch3 id=\"the-church-is-deceived\"\u003eThe Church Is Deceived\u003c/h3\u003e\n\u003cp\u003eThe message God gave Howard Pittman to bring back to the church is not complicated. It does not require a seminary education to understand. It can be summarized in four words: THE CHURCH IS DECEIVED.\u003c/p\u003e\n\u003cp\u003eNot the world. The church. Not pagans. Christians. Not atheists. Believers. The deception is not external. It is internal. The enemy is not outside the gates. He is inside the gates. He is prescribing medication from behind the pulpit. He is administering placebos through the worship team, the Sunday school curriculum, the small group study guide, and the bestselling Christian book.\u003c/p\u003e\n\u003cp\u003eGod showed Pittman that 97.5 percent of professing Christians are not truly saved. This is not Pittman's opinion. This is not his theological interpretation. This is what God showed him at the throne. And the message was clear: tell them. Tell the church. Tell the 97.5 percent. Wake them up. Sound the alarm.\u003c/p\u003e\n\u003ch3 id=\"the-urgency\"\u003eThe Urgency\u003c/h3\u003e\n\u003cp\u003eWhy did God send Pittman back? He could have kept him. Pittman had prayed to appear before the throne, and God granted the request. Why not let him stay?\u003c/p\u003e\n\u003cp\u003eBecause God has a message for the living. And the message is urgent. Not urgent in the casual, \"you should probably get around to this\" sense. Urgent in the eternal sense. Urgent because billions of people are walking toward the throne believing they are saved — and they are not. Urgent because the placebo is working. The patients are convinced. The deception is nearly total.\u003c/p\u003e\n\u003cp\u003eAnd the clock is ticking. Every day, people die. Every day, people stand before the throne. And every day, according to the ratio God revealed, 97.5 percent of professing Christians who die hear the words that no human being should ever hear: \"I never knew you.\"\u003c/p\u003e\n\u003cp\u003eThis is not theology. This is not denominational dispute. This is the testimony of a man who died, stood before God, received a message, and was sent back to deliver it. And the message is: WAKE UP.\u003c/p\u003e\n\u003ch3 id=\"what-must-change\"\u003eWhat Must Change\u003c/h3\u003e\n\u003cp\u003eThe response to this message is not complicated, but it is costly. It requires what the placebo has been preventing all along:\u003c/p\u003e\n\u003cp\u003eFirst: Honest self-examination. Not the superficial \"am I going to church?\" self-examination. The deep, painful, honest examination of the throne room. Who sits on the throne of your life? Whose desires govern your decisions? Whose comfort determines your course? If the answer is \"self,\" then the placebo is working.\u003c/p\u003e\n\u003cp\u003eSecond: Genuine repentance. Not the emotional altar-call repentance that fades by Monday morning. Repentance — \u003cem\u003emetanoia\u003c/em\u003e — means a complete change of mind. A fundamental reorientation. A 180-degree turn from self to God. This kind of repentance is not an event. It is a lifestyle. It is a daily dying to self and a daily rising in Christ.\u003c/p\u003e\n\u003cp\u003eThird: Absolute surrender. Not partial surrender. Not \"I'll give God this area but keep that area for myself.\" Not \"I'll surrender when it's convenient.\" Absolute, total, unconditional, permanent surrender of the throne. Christ as Lord — not in word only, but in every decision, every desire, every direction of your life.\u003c/p\u003e\n\u003cp\u003eThis is the narrow gate. This is the 2.5 percent. This is what few find.\u003c/p\u003e\n\u003cp\u003eAnd if 97.5 percent of professing Christians have not found it, then the question every reader must ask is not \"are they saved?\" but \"am I?\"\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSource: Howard Pittman's \u003cem\u003ePlacebo\u003c/em\u003e booklet, Lake Hamilton Bible Camp\u003c/p\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Transgression — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Darkness Into Light — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/95-The_Valley_of_Death.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Valley of Death — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/101-Fight_of_Faith.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFight of Faith — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/89-Metaphors_or_Reality.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eMetaphors or Reality — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/placebo-church-satan-false-religion/?lang=en\"\u003eThe Placebo Church: How Satan Administers False Religion to Billions\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/three-heavens-howard-pittman-nde/?lang=en\"\u003eThe Three Heavens: What Howard Pittman Saw When He Died\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/demonic-hierarchy-satans-military/?lang=en\"\u003eSatan's Military: The Demonic Hierarchy Howard Pittman Witnessed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/demon-possession-sovereign-will/?lang=en\"\u003eThe One Thing Demons Cannot Violate: Your Sovereign Will\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eHoward Pittman's testimony places a number on the words of Christ. \"Few there be that find it.\" How few? Two and a half percent. This is not opinion. This is not theology. This is what a man who stood before God's throne was told to bring back to the living. The question is not whether the number is accurate. The question is whether you are among the 2.5 percent — or the 97.5 percent who will hear the most terrifying words ever spoken: \"I never knew you.\"\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"97.5% Rejected: The Terrifying Statistic God Showed Howard Pittman\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"God showed Howard Pittman that 97.5% of professing Christians are not truly saved. The narrow gate is narrower than anyone imagined.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2026-01-03T10:00:00Z\",\"children\":\"January 3, 2026\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,
