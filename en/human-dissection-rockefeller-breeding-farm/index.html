u003e\n\u003cp\u003eThe Rockefeller family did not merely reshape American medicine — they reshaped the American body. Through eugenics programs, forced sterilization campaigns, human experimentation facilities, and what can only be described as breeding farms, the Rockefeller dynasty treated human beings as livestock to be managed, culled, and engineered according to their vision of the ideal society.\u003c/p\u003e\n\u003cp\u003eThis is not conspiracy theory. This is documented history — history that has been systematically scrubbed from public consciousness because it reveals the true nature of the forces that created modern medicine.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown during his NDE that the demonic realm operates through elaborate deception. The three heavens — atmospheric, demonic, and divine — represent the layered reality within which this war is fought. The 97.5% of Christians who were failing had \"never made Jesus Lord\" of their lives. They served self — and the Rockefeller eugenics movement is the ultimate expression of self-worship: the belief that a small elite has the right and the knowledge to determine who lives, who dies, and who reproduces.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, as Napoleon observed, constitute \"a military organization\" pursuing \"absolute power, universal power.\" John Adams warned of \"eternal damnation\" for the \"Society of Loyola's.\" General Tambulini governed \"half the world\" from his room. The Rockefeller eugenics programs were the application of this absolute power to the most fundamental aspect of human existence: reproduction itself.\u003c/p\u003e\n\u003cp\u003eThe Catholic Confidential documentary reveals the Jesuit commitment to infiltration \"cloaked with cunning\" and the permission of \"every species of vice.\" Human dissection for profit, forced sterilization of the \"unfit,\" and breeding programs for the \"superior\" — these are vices of the highest order, and they were perpetrated by institutions with deep Jesuit connections.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-rockefeller-eugenics-empire\"\u003eThe Rockefeller Eugenics Empire\u003c/h2\u003e\n\u003ch3 id=\"the-cold-spring-harbor-laboratory\"\u003eThe Cold Spring Harbor Laboratory\u003c/h3\u003e\n\u003cp\u003eIn 1904, Charles Davenport — a biologist with close ties to the Rockefeller family — established the Station for Experimental Evolution at Cold Spring Harbor, Long Island. This facility, funded by Carnegie and Rockefeller money, became the headquarters of the American eugenics movement.\u003c/p\u003e\n\u003cp\u003eCold Spring Harbor was not merely a research facility. It was the command center of a nationwide campaign to classify human beings by genetic \"fitness\" and to eliminate those deemed \"unfit\" through sterilization, institutionalization, and immigration restriction.\u003c/p\u003e\n\u003cp\u003eThe Eugenics Record Office, also at Cold Spring Harbor, collected family histories and genetic data on millions of Americans. Field workers were dispatched across the country to document family trees, identifying individuals and families deemed genetically inferior. This data was used to support forced sterilization laws in 32 states and to justify immigration restrictions targeting Southern and Eastern Europeans, Asians, and Africans.\u003c/p\u003e\n\u003ch3 id=\"the-rockefeller-foundation-and-nazi-eugenics\"\u003eThe Rockefeller Foundation and Nazi Eugenics\u003c/h3\u003e\n\u003cp\u003eThe Rockefeller Foundation's involvement in eugenics did not stop at American shores. In the 1920s and 1930s, the Foundation provided significant funding to German eugenics institutions, including:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe Kaiser Wilhelm Institute for Anthropology, Human Heredity, and Eugenics — directed by Eugen Fischer, who later became a Nazi racial scientist\u003c/li\u003e\n\u003cli\u003eThe Kaiser Wilhelm Institute for Psychiatry — which developed many of the theories and methods later used in Nazi extermination programs\u003c/li\u003e\n\u003cli\u003eJosef Mengele's own research institute received Rockefeller funding before Mengele became the \"Angel of Death\" at Auschwitz\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe connection between American eugenics and Nazi Germany is direct, documented, and undeniable. The Nazis explicitly cited American eugenics laws as inspiration for their own racial purity programs. The Nuremberg Laws of 1935 were modeled, in part, on American forced sterilization statutes.\u003c/p\u003e\n\u003cp\u003eAfter the war, the eugenics movement did not end — it simply changed its name. \"Eugenics\" became \"genetics.\" \"Racial hygiene\" became \"public health.\" \"Breeding programs\" became \"family planning.\" The Rockefeller Foundation pivoted seamlessly from supporting eugenics to supporting population control organizations like Planned Parenthood and the Population Council.\u003c/p\u003e\n\u003ch2 id=\"human-dissection-the-hidden-history\"\u003eHuman Dissection: The Hidden History\u003c/h2\u003e\n\u003ch3 id=\"the-body-snatching-trade\"\u003eThe Body Snatching Trade\u003c/h3\u003e\n\u003cp\u003eThe history of human dissection in America is far darker than most people realize. In the 19th century, the demand for cadavers for medical schools far exceeded the legal supply. This created a thriving black market in human bodies, operated by \"resurrection men\" who dug up fresh graves and sold the bodies to medical schools.\u003c/p\u003e\n\u003cp\u003eThe Rockefeller-funded medical schools were among the primary consumers of this trade. As the Flexner Report of 1910 consolidated medical education into a handful of elite institutions, the demand for cadavers increased. The body snatching trade evolved from grave robbery into something far worse: the murder of vulnerable people — the poor, the homeless, the mentally ill, minorities — for their bodies.\u003c/p\u003e\n\u003ch3 id=\"the-anatomical-gift-acts\"\u003eThe Anatomical Gift Acts\u003c/h3\u003e\n\u003cp\u003eBy the mid-20th century, the body trade was legalized through a series of Anatomical Gift Acts that allowed institutions to claim the bodies of the unclaimed dead — people who died in hospitals, prisons, and mental institutions without family to claim them. In practice, this meant that the bodies of the poorest and most marginalized members of society were funneled to medical schools and research institutions.\u003c/p\u003e\n\u003cp\u003eThe ethical implications are staggering. People who were already disadvantaged in life — denied adequate healthcare, nutrition, and social services — had their bodies claimed by the very institutions that had failed them. Their flesh became the raw material of medical education, their organs the subjects of research, their bones the specimens in anatomy museums.\u003c/p\u003e\n\u003ch3 id=\"modern-body-trafficking\"\u003eModern Body Trafficking\u003c/h3\u003e\n\u003cp\u003eThe trade in human bodies continues today, though it has been laundered through institutional processes. Companies like Science Care and Bio-Renewables operate as \"body brokers,\" procuring donated bodies and selling them — or their parts — to medical schools, pharmaceutical companies, and military research facilities.\u003c/p\u003e\n\u003cp\u003eInvestigations have revealed:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBodies donated for medical research being sold to military facilities for blast testing\u003c/li\u003e\n\u003cli\u003eBody parts mixed and distributed from multiple donors without proper tracking\u003c/li\u003e\n\u003cli\u003eBodies stored in unsanitary conditions, stacked in freezers and warehouses\u003c/li\u003e\n\u003cli\u003eFamilies deceived about how donated bodies would be used\u003c/li\u003e\n\u003cli\u003eProfitable resale of body parts that families believed were going to scientific research\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis is the Rockefeller medical model taken to its logical conclusion: the human body as commodity, bought and sold by institutions that view people as raw materials rather than creations of God.\u003c/p\u003e\n\u003ch2 id=\"the-breeding-programs\"\u003eThe Breeding Programs\u003c/h2\u003e\n\u003ch3 id=\"fitter-families-contests\"\u003eFitter Families Contests\u003c/h3\u003e\n\u003cp\u003eIn the 1920s and 1930s, the American eugenics movement sponsored \"Fitter Families\" contests at state fairs across the country. Families were evaluated on their physical characteristics, mental abilities, and family histories. Winners received medals inscribed with the motto: \"Yea, I have a goodly heritage.\"\u003c/p\u003e\n\u003cp\u003eThese contests were not innocent fun. They were propaganda tools designed to normalize the idea that some families were genetically superior and others were genetically inferior. They created a public consensus for the eugenics policies that followed: forced sterilization, institutionalization, and immigration restriction.\u003c/p\u003e\n\u003ch3 id=\"forced-sterilization\"\u003eForced Sterilization\u003c/h3\u003e\n\u003cp\u003eBetween 1907 and 1981, over 60,000 Americans were forcibly sterilized under state eugenics laws. The victims were disproportionately:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePoor women, especially women of color\u003c/li\u003e\n\u003cli\u003eInmates of mental institutions\u003c/li\u003e\n\u003cli\u003ePrisoners\u003c/li\u003e\n\u003cli\u003ePeople with physical or mental disabilities\u003c/li\u003e\n\u003cli\u003ePeople deemed \"morally deficient\" (which could mean anything from promiscuity to poverty)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Supreme Court upheld forced sterilization in the 1927 case Buck v. Bell, in which Justice Oliver Wendell Holmes Jr. infamously declared: \"Three generations of imbeciles are enough.\" Carrie Buck, the plaintiff, was a young woman who had been raped by her foster family's nephew and institutionalized to conceal the rape. She was not mentally deficient — she was a victim of abuse.\u003c/p\u003e\n\u003cp\u003eThe forced sterilization programs were administered through the same medical infrastructure that the Rockefeller Foundation had built through the Flexner Report. Hospitals, medical schools, and state health departments — all shaped by Rockefeller money and Rockefeller ideology — carried out the sterilizations.\u003c/p\u003e\n\u003ch3 id=\"the-population-council\"\u003eThe Population Council\u003c/h3\u003e\n\u003cp\u003eIn 1952, John D. Rockefeller III founded the Population Council, an organization dedicated to population control research and implementation. The Population Council developed and promoted:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIntrauterine devices (IUDs) for use in developing countries\u003c/li\u003e\n\u003cli\u003eHormonal contraceptives\u003c/li\u003e\n\u003cli\u003eSterilization techniques for mass deployment\u003c/li\u003e\n\u003cli\u003ePopulation control policies adopted by governments worldwide\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Population Council's work was presented as humanitarian aid — helping women in developing countries control their fertility. But the underlying ideology was the same eugenics ideology that had driven forced sterilization in America: the belief that certain populations were reproducing too much and needed to be controlled by a benevolent (Western, white, wealthy) elite.\u003c/p\u003e\n\u003ch2 id=\"the-jesuit-connection\"\u003eThe Jesuit Connection\u003c/h2\u003e\n\u003ch3 id=\"catholic-universities-and-medical-research\"\u003eCatholic Universities and Medical Research\u003c/h3\u003e\n\u003cp\u003eJesuit-run institutions play a significant role in American medical education and research. Georgetown University, Loyola University, Fordham University, and dozens of other Jesuit institutions train doctors, conduct research, and shape medical policy. The apparent contradiction between the Catholic Church's stated opposition to eugenics and the Jesuit order's involvement in the institutions that perpetrate it is resolved when you understand the Jesuit method: infiltration \"cloaked with cunning.\"\u003c/p\u003e\n\u003cp\u003eThe Jesuits do not oppose the power structure — they infiltrate and control it. By embedding their agents within every institution, including those that perpetrate eugenics under different names, they ensure that the power flows through channels they control, regardless of the moral character of the work being done.\u003c/p\u003e\n\u003ch3 id=\"the-vaticans-silence\"\u003eThe Vatican's Silence\u003c/h3\u003e\n\u003cp\u003eThe Vatican's response to the eugenics movement was notably muted. While individual Catholic bishops spoke against forced sterilization, the institutional Church — increasingly controlled by the Jesuit order — did not mount a sustained campaign against eugenics. The Vatican's 1930 encyclical Casti Connubii condemned eugenics in principle, but in practice, Catholic hospitals and institutions participated in the medical system that carried out eugenic policies.\u003c/p\u003e\n\u003cp\u003ePope Clement XIV's poisoning after attempting to suppress the Jesuits in 1773 demonstrates the cost of opposing the order. The Vatican learned its lesson: accommodate the Jesuits or pay the price.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-reality\"\u003eThe Spiritual Reality\u003c/h2\u003e\n\u003ch3 id=\"playing-god\"\u003ePlaying God\u003c/h3\u003e\n\u003cp\u003eThe eugenics movement is, at its core, a spiritual rebellion against God. It assumes that human beings have the right to determine who is fit to live and reproduce — a right that belongs to God alone. It treats human beings as animals to be bred, culled, and managed — denying the divine spark that makes every human life sacred.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the demonic hierarchy is organized around the theft of souls. The eugenics movement targets the body — but in doing so, it targets the temple of the soul. When you forcibly sterilize a woman, you don't just alter her body — you violate her divine purpose. When you dissect a human body for profit, you don't just cut flesh — you desecrate God's creation.\u003c/p\u003e\n\u003cp\u003eThe 97.5% failure rate Pittman was shown reflects a world in which the vast majority of people have surrendered their moral authority to institutions that view them as commodities. The Rockefeller breeding farms were not an aberration — they were the logical expression of a worldview that has replaced God with man, worship with management, and love with utility.\u003c/p\u003e\n\u003ch3 id=\"the-way-forward\"\u003eThe Way Forward\u003c/h3\u003e\n\u003cp\u003eUnderstanding this history is not enough. We must also understand that the forces behind it are still active. The eugenics movement did not end — it transformed. Genetic engineering, CRISPR technology, mRNA platforms, and transhumanist ideology are the modern expressions of the same impulse: to redesign God's creation according to man's specifications.\u003c/p\u003e\n\u003cp\u003eThe defense against this evil is the same as it has always been: faith in the Creator, reverence for His design, and the courage to resist institutions that claim authority over human life that belongs to God alone.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — research on Rockefeller eugenics and medical system history\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — spiritual warfare and the demonic hierarchy\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit infiltration and institutional control\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- Edwin Black, \u003cem\u003eWar Against the Weak: Eugenics and America's Campaign to Create a Master Race\u003c/em\u003e\u003c/li\u003e\n\u003cli\u003eCold Spring Harbor Laboratory Archives — Eugenics Record Office documents\u003c/li\u003e\n\u003cli\u003eBuck v. Bell, 274 U.S. 200 (1927)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/255-Vaccine_Of_The_Beast.mp4\"\u003eVaccine Of The Beast\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/61-Synthetic_Biology.mp4\"\u003eSynthetic Biology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/117-The_Burning_of_Sin.
