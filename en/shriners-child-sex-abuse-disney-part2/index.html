ned in the depth of the sea.\" — Matthew 18:6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Shriners — formally the Ancient Arabic Order of the Nobles of the Mystic Shrine — present themselves as one of America's most beloved fraternal organizations, famous for their hospitals, their parades, and their red fezzes. Behind this carefully cultivated image lies a Masonic order whose Islamic-themed rituals, documented patterns of criminal behavior, and connections to the entertainment industry reveal a far darker reality. When combined with the occult dimensions of the Walt Disney empire, the picture that emerges is one of a systematic targeting of children through institutions that present themselves as their champions.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's near-death experience revealed that demons operate through every institution of human culture, including those that present themselves as benevolent. The most effective deception is not the one that appears evil — it is the one that appears good. The Shriners' charitable hospitals, their children's outreach, and their public identity as fun-loving philanthropists constitute the perfect cover for operations that Scripture describes with devastating clarity in Matthew 18:6. The 97.5% who walk the broad road include the millions who trust institutions that have been designed to exploit the very populations they claim to serve.\u003c/p\u003e\n\u003cp\u003eThe Jesuit method of operating \"cloaked with cunning,\" as described in Catholic Confidential, finds expression in both the Shriners and the Disney empire. Both present smiling, family-friendly facades that conceal activities and connections that would horrify the families they target. Napoleon's observation that the Jesuits are a military organization whose aim is power applies equally to the networks that operate through children's entertainment and fraternal organizations. The tracks \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e expose the methodology of organizations that weaponize trust.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-shriners-exposed\"\u003eThe Shriners Exposed\u003c/h2\u003e\n\u003ch3 id=\"behind-the-fez\"\u003eBehind the Fez\u003c/h3\u003e\n\u003cp\u003eThe Ancient Arabic Order of the Nobles of the Mystic Shrine was founded in 1870 by Walter M. Fleming, a Mason, and William J. Florence, an actor. The order was created as an appendant body of Freemasonry — membership requires prior initiation as a Master Mason — and it adopted Islamic-themed rituals, costumes, and terminology that drew on Orientalist fantasies of the Arabian Nights. The red fez, the scimitar, the crescent moon and star — all are Islamic symbols adopted by a Western Masonic order for purposes that have nothing to do with Islam and everything to do with the mystery school tradition's appropriation of symbols from every culture.\u003c/p\u003e\n\u003cp\u003eThe Shriners' initiation rituals, as documented by investigators and former members, involve mock Islamic prayers, pledges to \"Allah,\" and ceremonies that combine Masonic ritualism with pseudo-Islamic elements. The use of Islamic symbolism by a Masonic order is theologically significant — it represents the syncretic approach to religion that characterizes the entire Masonic system, in which symbols from every tradition are appropriated and reinterpreted within the Hermetic framework.\u003c/p\u003e\n\u003cp\u003eThe requirement that Shriners be Master Masons means that every Shriner has already passed through the three degrees of Craft Masonry, accepting the Masonic worldview and swearing Masonic oaths. The Shrine adds additional layers of initiation and commitment, binding members to a brotherhood whose obligations supersede those of family, community, and faith. This layered obligation structure — borrowed from the Jesuit model of progressive commitment — ensures that members who advance far enough are thoroughly committed before they encounter the order's deeper operations.\u003c/p\u003e\n\u003ch3 id=\"the-criminal-pattern\"\u003eThe Criminal Pattern\u003c/h3\u003e\n\u003cp\u003eThe Shriners' public image as lovable philanthropists has been contradicted by a persistent pattern of criminal behavior documented across decades and jurisdictions. Investigations have revealed patterns of financial mismanagement in which charitable funds collected for children's hospitals were diverted to support members' entertainment, alcohol consumption, and personal expenses. The gap between funds raised and funds spent on charitable purposes has been documented by journalists and regulators, revealing an organization that uses children's health as a fundraising tool while directing significant portions of those funds to members' benefit.\u003c/p\u003e\n\u003cp\u003eMore disturbing than financial corruption are the documented cases of Shriners involved in sexual crimes against children. While no organization can be held responsible for every crime committed by an individual member, the pattern and the institutional response are revealing. Cases of Shriners convicted of sexual crimes against minors span multiple decades and jurisdictions. The institutional response has typically been to minimize, deny, and protect — the same pattern observed in the Catholic Church's response to clerical abuse and in every other institution where predators are protected by institutional power.\u003c/p\u003e\n\u003cp\u003eThe connection between an organization that targets children through charitable outreach and individual members who target children through sexual predation is not coincidental within the framework of this analysis. Organizations that provide access to vulnerable children attract predators; organizations with cultures of secrecy and fraternal loyalty protect them. The Shriners, as a secret society with extensive access to children through their hospitals and charitable programs, meet both criteria.\u003c/p\u003e\n\u003ch2 id=\"walt-disney-the-man-behind-the-magic\"\u003eWalt Disney: The Man Behind the Magic\u003c/h2\u003e\n\u003ch3 id=\"the-masonic-and-intelligence-connections\"\u003eThe Masonic and Intelligence Connections\u003c/h3\u003e\n\u003cp\u003eWalt Disney's connections to Freemasonry and the intelligence community are documented but systematically excluded from the sanitized corporate biography. Disney was associated with the DeMolay Order — the Masonic youth organization — from his teenage years, receiving the DeMolay Legion of Honor. The DeMolay Order, named after Jacques de Molay, the last Grand Master of the Knights Templar, functions as a Masonic feeder organization, introducing young men to Masonic principles and networks before they are eligible for lodge membership.\u003c/p\u003e\n\u003cp\u003eDisney's relationship with the FBI, and specifically with J. Edgar Hoover, has been documented through released FBI files. Disney served as an FBI informant, reporting on suspected communist sympathizers in the entertainment industry. This relationship placed Disney within the orbit of the intelligence community and established a pattern of cooperation between the Disney organization and government agencies that would continue after Disney's death.\u003c/p\u003e\n\u003cp\u003eThe CIA's involvement in the entertainment industry through Operation Mockingbird extended to the Disney empire. The Agency recognized the unique power of children's entertainment to shape consciousness at the most formative stage of development. A partnership between intelligence agencies and the world's premier children's entertainment company provided unprecedented access to the minds of the young — access that could be used for purposes far beyond entertainment.\u003c/p\u003e\n\u003ch3 id=\"occult-symbolism-in-disney-productions\"\u003eOccult Symbolism in Disney Productions\u003c/h3\u003e\n\u003cp\u003eResearchers have documented extensive occult symbolism throughout Disney productions, from the earliest animated features to the modern theme parks. While mainstream critics dismiss these observations as pareidolia — seeing patterns where none exist — the consistency, specificity, and volume of the occult references suggest intentional embedding rather than accidental occurrence.\u003c/p\u003e\n\u003cp\u003eThe use of transformation themes — from beast to prince, from mermaid to human, from servant to princess — mirrors the alchemical process of transmutation that is central to the mystery school tradition. The emphasis on magic as a positive force, the portrayal of witches and sorcerers as sympathetic or heroic figures, and the consistent messaging that extraordinary power is available to those who believe in themselves all serve to normalize occult concepts and condition young minds to accept spiritual frameworks that are fundamentally anti-Christian.\u003c/p\u003e\n\u003cp\u003eDisney's theme parks function as immersive ritual spaces. The architecture, the music, the carefully designed experiences, and the emotional manipulation techniques employed throughout the parks create altered states of consciousness in visitors — particularly children. The \"magic\" of Disney is not merely marketing language; within the framework of the mystery school tradition, it describes the operative use of symbol, sound, and environmental design to produce specific psychological and spiritual effects.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/91-The_Kinsey_Corruption.mp4\"\u003eThe Kinsey Corruption\u003c/a\u003e documents how the intellectual framework for the exploitation of children was constructed through corrupted science. Disney's entertainment empire provided the cultural delivery system — the mechanism through which children's minds were prepared to accept the messages that the corrupted intellectual framework authorized.\u003c/p\u003e\n\u003ch2 id=\"the-convergence-of-shriners-and-disney\"\u003eThe Convergence of Shriners and Disney\u003c/h2\u003e\n\u003ch3 id=\"targeting-the-same-population\"\u003eTargeting the Same Population\u003c/h3\u003e\n\u003cp\u003eThe Shriners and the Disney empire share a common target: children. The Shriners through their hospitals and charitable outreach; Disney through entertainment, theme parks, and media. Both organizations present themselves as champions of childhood — protectors and enrichers of young lives. Both organizations have documented connections to Masonic networks, intelligence agencies, and the broader architecture of the hidden government.\u003c/p\u003e\n\u003cp\u003eThe convergence is not coincidental. Organizations that target children are essential to the broader agenda documented throughout this series. The corruption of children — their minds, their innocence, their spiritual development — is the adversary's highest priority because children represent the future. A generation of children raised on occult programming, conditioned to trust institutions that serve the adversary, and separated from the spiritual heritage of their families is a generation lost to the broad road of destruction.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/93-Playboy_Shadow_Mansions.mp4\"\u003ePlayboy Shadow Mansions\u003c/a\u003e documents how the entertainment industry has historically served as a cover for exploitation operations. The pattern extends beyond Playboy to encompass the entire entertainment-industrial complex, including its children's divisions. The same networks, the same methodologies, and the same spiritual forces operate across all sectors of the entertainment industry — the only difference is the age of the target audience.\u003c/p\u003e\n\u003ch3 id=\"the-club-33-connection\"\u003eThe Club 33 Connection\u003c/h3\u003e\n\u003cp\u003eClub 33, the exclusive private club within Disneyland, provides a tangible connection between the Disney empire and the world of elite secret societies. The club, accessible only to members who pay substantial fees and endure years-long waiting lists, operates behind an unmarked door in New Orleans Square. The number 33 — the number of degrees in Scottish Rite Freemasonry — and the club's exclusivity, secrecy, and elite membership make it a Masonic meeting place within the world's most famous children's theme park.\u003c/p\u003e\n\u003cp\u003eThe official explanation for the name references the original 33 corporate sponsors of Disneyland. The esoteric interpretation — that the club references the 33 degrees of Scottish Rite Freemasonry — is consistent with the broader pattern of Masonic symbolism embedded throughout the Disney empire. The presence of an elite, secret club within a children's theme park is itself a statement: the hidden world exists within the visible one, the initiated operate unseen among the uninitiated, and the children who play in the park are surrounded by a structure they cannot perceive.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-warfare-against-children\"\u003eThe Spiritual Warfare Against Children\u003c/h2\u003e\n\u003ch3 id=\"why-children-are-targeted\"\u003eWhy Children Are Targeted\u003c/h3\u003e\n\u003cp\u003eThe targeting of children by the networks documented in this series is not merely criminal — it is spiritual. Scripture assigns children a unique spiritual significance. Jesus declared that the kingdom of heaven belongs to those who become like little children (Matthew 18:3) and pronounced the most severe judgment on those who would harm them (Matthew 18:6). The adversary, who seeks to steal what belongs to God, targets children precisely because of their spiritual significance.\u003c/p\u003e\n\u003cp\u003eThe corruption of a child's innocence is, in the spiritual economy of the second heaven, a transaction of immense value. It damages the child, it damages the family, it damages the community, and it damages the faith of everyone who encounters the reality and despairs. The demons that Howard Pittman witnessed in the second heaven understand this calculus perfectly — they assign their most powerful agents to operations that target children because the return on investment, measured in spiritual destruction, is the highest of any demonic operation.\u003c/p\u003e\n\u003cp\u003eThe Shriners, Disney, and the broader network of institutions that target children are instruments of this spiritual warfare. Whether their individual members and employees understand the spiritual dimensions of their activities is less relevant than the fact that the organizational structures they serve have been designed — at the highest levels — to advance the adversary's agenda against the most vulnerable members of the human family.\u003c/p\u003e\n\u003cp\u003eMatthew 12:36-37 warns that every idle word will be judged. Every children's program that normalizes the occult, every charitable organization that provides cover for predators, every entertainment product that conditions young minds to accept spiritual lies will be judged as a spiritual utterance — an utterance made against the children of God by the agents of His adversary.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"Shriners and Disney Exposed,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003 nic networks, intelligence agencies, and the spiritual forces that target the young for corruption. Behind the hospitals and the theme parks, behind the fezzes and the fairy tales, operates a system designed to capture children's trust and use it against them. The millstone that Jesus described is not metaphorical — it is the weight of divine judgment that awaits every institution and every individual that has harmed the little ones in His name. The magic kingdom is not magical — it is Masonic, and its true purpose is not to enchant but to enslave.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"THE SHRINERS: Child Sex Abuse and Walt Disney Part 2\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Exposing the Shriners' dark connections to child sex abuse, Walt Disney's occult ties, and the Jesuit-Masonic network behind children's entertainment.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-10-22T10:00:00Z\",\"children\":\"October 22, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"shriners\",{\"href\":\"/en/tag/shriners/\",\"className\":\"tag-pi
