iah 5:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe prophet Isaiah condemned those who accumulate all property, all wealth, all power unto themselves until they sit alone at the center of an empire built on theft. World War I was the greatest looting operation in human history to that point — a systematic extraction of wealth from the American people, funneled through the war machine, and deposited into the accounts of the Jesuit-connected banking and industrial elite. The war cost the United States over $30 billion (over $700 billion today). Where did the money go? Follow the money, and you will find the Jesuits.\u003c/p\u003e\n\u003cp\u003eIgnatius Loyola designed the Society of Jesus to accumulate power by any means necessary. The Jesuit oath, as documented in congressional records, requires members to employ \"poison, the strangulation cord, the steel of the poniard, or the leaden bullet\" in service of the society. But these physical weapons are crude compared to the Jesuits' preferred instrument of control: money. Through their banking proxies — the Rothschilds, the Morgans, the Warburgs — the Jesuits looted America during World War I with the precision of a military operation and the anonymity of a financial transaction.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e speaks to the internal rot that made this looting possible — a government infiltrated by agents of foreign powers, a financial system designed by private interests, and a public too deceived to recognize what was being done to them. And \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e reminds us that the greatest theft is the one the victim never realizes occurred.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-war-profiteers\"\u003eThe War Profiteers\u003c/h2\u003e\n\u003ch3 id=\"the-arms-manufacturers\"\u003eThe Arms Manufacturers\u003c/h3\u003e\n\u003cp\u003eWorld War I was the first fully industrialized war, and the industrial corporations that supplied the combatants reaped profits on a scale never before seen:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDuPont\u003c/strong\u003e — The Delaware-based chemical company supplied 40% of the explosives used by the Allied forces. DuPont's profits increased from $6 million in 1914 to $82 million in 1916 — a 1,300% increase in two years. The DuPont family, already one of the wealthiest in America, emerged from the war as an industrial dynasty whose wealth rivaled that of the Rockefellers.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBethlehem Steel\u003c/strong\u003e — Under the leadership of Charles Schwab, Bethlehem Steel became the primary supplier of armor plate, guns, and munitions to the Allied powers. Schwab personally traveled to London to negotiate contracts worth hundreds of millions of dollars — contracts financed by Liberty Bond proceeds. Bethlehem Steel's stock price increased by over 500% during the war years.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eU.S. Steel\u003c/strong\u003e — J.P. Morgan's creation, U.S. Steel, supplied steel for ships, tanks, artillery, and infrastructure. The company's profits tripled during the war years, and its executives were rewarded with bonuses and stock options that made them among the wealthiest men in America.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStandard Oil\u003c/strong\u003e — John D. Rockefeller's oil empire supplied petroleum products to both sides of the conflict. Standard Oil's subsidiaries in Germany continued to supply the German military throughout the war, even as the parent company's American operations supplied the Allies. This dual-supply arrangement, which violated the spirit (if not the letter) of neutrality laws, was possible because the Rockefeller network operated above national loyalties — serving the interests of the global financial elite rather than any single nation.\u003c/p\u003e\n\u003ch3 id=\"the-banking-profits\"\u003eThe Banking Profits\u003c/h3\u003e\n\u003cp\u003eThe banks did not merely facilitate the war — they profited from it at every level:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLoan commissions\u003c/strong\u003e — J.P. Morgan \u0026#x26; Co., as the primary purchasing agent for the British and French governments, earned commissions on approximately $3 billion in Allied purchases. At a standard commission rate of 1-2%, Morgan's take from this arrangement alone was $30-60 million.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBond underwriting\u003c/strong\u003e — The Federal Reserve banks and their affiliated commercial banks earned fees for distributing Liberty Bonds. These fees, while small on a per-bond basis, totaled hundreds of millions of dollars across $21.5 billion in bond sales.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInterest income\u003c/strong\u003e — The Federal Reserve itself earned interest on the government bonds it purchased with newly created money. This interest was paid by the taxpayers through the income tax — a system so elegant in its circularity that its designers must have admired their own work.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eForeign exchange\u003c/strong\u003e — The war created massive fluctuations in currency values, and the banks that controlled foreign exchange markets profited enormously from these fluctuations. The Rothschild banking network, with branches in every major financial center, was particularly well-positioned to profit from currency arbitrage during the war.\u003c/p\u003e\n\u003ch3 id=\"smedley-butlers-testimony\"\u003eSmedley Butler's Testimony\u003c/h3\u003e\n\u003cp\u003eMajor General Smedley Butler, the most decorated Marine in American history at the time of his death, wrote in \u003cem\u003eWar Is a Racket\u003c/em\u003e (1935):\u003c/p\u003e\n\u003cp\u003e\"I spent 33 years and four months in active military service... During that period, I spent most of my time as a high-class muscle man for Big Business, for Wall Street and the bankers. In short, I was a racketeer, a gangster for capitalism.\"\u003c/p\u003e\n\u003cp\u003eButler's testimony confirms what the financial evidence reveals: the American military was not fighting for freedom, democracy, or national defense. It was fighting for the financial interests of the banking elite — the same elite that controlled the Federal Reserve, the Liberty Bond program, and the arms industry. Butler specifically identified the corporate beneficiaries of the wars he fought, naming the very companies — DuPont, Standard Oil, U.S. Steel — that profited from World War I.\u003c/p\u003e\n\u003ch2 id=\"the-tax-extraction\"\u003eThe Tax Extraction\u003c/h2\u003e\n\u003ch3 id=\"the-income-tax-during-wartime\"\u003eThe Income Tax During Wartime\u003c/h3\u003e\n\u003cp\u003eThe income tax, established in 1913, was initially a modest levy on the wealthy: 1% on incomes over $3,000, with a maximum rate of 7% on incomes over $500,000. But the war provided the pretext for dramatic increases:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e1916\u003c/strong\u003e: Maximum rate raised to 15%\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1917\u003c/strong\u003e: Maximum rate raised to 67%\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1918\u003c/strong\u003e: Maximum rate raised to 77%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese rates applied to the highest income brackets, but the war also broadened the tax base dramatically. By 1918, millions of Americans who had never paid income tax were filing returns and paying taxes to fund the war.\u003c/p\u003e\n\u003cp\u003eThe income tax revenue went directly to debt service — paying interest on the bonds and loans that financed the war. The American taxpayer was thus paying twice: once through the purchase of Liberty Bonds (which paid below-market interest), and again through income taxes (which serviced the debt created by the bond program). The money flowed from the taxpayer to the government, from the government to the war contractors and the banks, and from the banks back to the Jesuit-controlled financial elite.\u003c/p\u003e\n\u003ch3 id=\"the-permanent-tax-state\"\u003eThe Permanent Tax State\u003c/h3\u003e\n\u003cp\u003eThe wartime income tax rates were supposed to be temporary. They were not. After the war, the rates were reduced but never eliminated. The income tax had become a permanent fixture of American life — a permanent mechanism for extracting wealth from the working population and transferring it to the financial elite through the medium of government debt.\u003c/p\u003e\n\u003cp\u003eThis was the Jesuit plan from the beginning. The 16th Amendment was not passed to fund the government; it was passed to fund the debt — and the debt was created by the Federal Reserve, which was controlled by the banking families, which were controlled by the Jesuit order. The income tax is the tribute that the conquered pay to their conquerors, and Americans have been paying it for over a century without ever understanding who they are paying or why.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/97-Income_Tax_Is_Slavery.mp4\"\u003eIncome Tax Is Slavery\u003c/a\u003e makes this connection explicit, and \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e reveals how the constitutional framework was subverted to make this slavery legal.\u003c/p\u003e\n\u003ch2 id=\"the-post-war-carve-up\"\u003eThe Post-War Carve-Up\u003c/h2\u003e\n\u003ch3 id=\"versailles-the-jesuit-peace\"\u003eVersailles: The Jesuit Peace\u003c/h3\u003e\n\u003cp\u003eThe Treaty of Versailles, signed in 1919, reshaped the world map according to the Jesuit design:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGermany\u003c/strong\u003e was dismembered, disarmed, and burdened with reparations that would cripple its economy for a generation — ensuring that it would never again challenge Jesuit power.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAustria-Hungary\u003c/strong\u003e was dissolved into a collection of small, weak states that could be easily controlled.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Ottoman Empire\u003c/strong\u003e was dismantled, and its territories distributed among the victorious powers — with the critical territory of Palestine placed under British mandate, setting the stage for the creation of Israel.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRussia\u003c/strong\u003e had already been neutralized by the Bolshevik Revolution — funded, as we have seen, by the same banking network that financed the war.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe League of Nations, established by the treaty, was the first step toward a global government under the control of the Jesuit-banking elite. Although the United States Senate rejected League membership, the infrastructure of global governance had been established, and it would evolve through the United Nations (1945), the World Bank, the International Monetary Fund, and the World Trade Organization into the system of global control that exists today.\u003c/p\u003e\n\u003cp\u003eHoward Pittman learned during his near-death experience that the demonic government operates from the second heaven in a hierarchical structure that mirrors earthly power structures. The post-Versailles world order is the physical manifestation of that demonic hierarchy: a system of global institutions, controlled by a financial elite, serving the interests of the Jesuit order, which serves the prince of darkness. The 97.5% who walk the wide road to destruction includes those who accept this system without question. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eFor comprehensive documentation, visit \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e and \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/97-Income_Tax_Is_Slavery.mp4\"\u003eIncome Tax Is Slavery\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/105-Freemason_Jesters.mp4\"\u003eFreemason Jesters\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies
