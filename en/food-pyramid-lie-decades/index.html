c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eGod told His people what to eat. The Scriptures are filled with references to the foods that sustain the body — meat, fish, bread made from whole grains, olive oil, butter, milk, honey, fruits, and vegetables. These are the foods that nourished humanity for thousands of years.\u003c/p\u003e\n\u003cp\u003eThey are the foods that our grandparents and great-grandparents ate without developing the epidemic rates of obesity, diabetes, heart disease, and cancer that define modern Western health. What changed was not the human body. What changed was the food — and the lies told about what food is good for you.\u003c/p\u003e\n\u003cp\u003eThe Confliction album track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e captures the essence of what happened to American nutrition: a deception so comprehensive, so institutionalized, and so profitable that it reshaped the diet of an entire civilization. The Food Pyramid was not science. It was sorcery — the manipulation of truth to serve power, wrapped in the language of health while delivering disease.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-origin-of-the-food-pyramid\"\u003eThe Origin of the Food Pyramid\u003c/h2\u003e\n\u003cp\u003eIn 1992, the United States Department of Agriculture (USDA) officially released the Food Guide Pyramid, a graphic dietary guideline that would be plastered on every cereal box, hung in every school cafeteria, and taught to every child in America for the next two decades.\u003c/p\u003e\n\u003cp\u003eAt the base of the pyramid — the foods Americans were told to eat the most of — were 6-11 servings of bread, cereal, rice, and pasta per day. Fats and oils were placed at the tiny apex, with the instruction to use them \"sparingly.\"\u003c/p\u003e\n\u003cp\u003eThis was not the result of objective nutritional science. It was the product of agricultural lobbying, political compromise, and decades of fraudulent research funded by industries that profited from the specific dietary recommendations the pyramid enshrined.\u003c/p\u003e\n\u003cp\u003eThe USDA is not a health agency. It is an agricultural promotion agency. Its primary statutory mission is to promote and support American agriculture — including the grain, dairy, and meat industries that generate billions in annual revenue. Asking the USDA to provide objective dietary advice is like asking a tobacco company to design anti-smoking campaigns. The conflict of interest is not incidental. It is structural.\u003c/p\u003e\n\u003cp\u003eThe agency that tells Americans what to eat is the same agency that subsidizes the production of wheat, corn, and soybeans — the raw materials of the processed food industry. The agency that warns against saturated fat is the same agency that runs the checkoff programs promoting cheese, butter, and beef through marketing campaigns like \"Got Milk?\" and \"Beef. It's What's for Dinner.\"\u003c/p\u003e\n\u003cp\u003eThe contradictions are not subtle. They are embedded in the institutional DNA of the USDA. And they explain why the dietary guidelines have always served agricultural commerce rather than public health.\u003c/p\u003e\n\u003cp\u003eWhen the USDA's first draft of the Food Pyramid was completed in 1991, it was immediately suppressed after the National Cattlemen's Beef Association and other industry groups objected to the placement of meat in a smaller category.\u003c/p\u003e\n\u003cp\u003eThe pyramid was redesigned, retested with \"consumer focus groups\" (industry-influenced), and released a year later with modifications that satisfied the lobbying interests.\u003c/p\u003e\n\u003cp\u003eLuise Light, the USDA nutritionist who led the original design team, later publicly stated that the pyramid released to the public bore little resemblance to the science-based version her team had created. According to Light, the original pyramid recommended only 3-4 servings of whole grains per day and emphasized vegetables, fruits, and lean protein. The grain industry's lobbying inflated the grain servings to 6-11 and shifted the emphasis to refined carbohydrates that would eventually drive the obesity epidemic.\u003c/p\u003e\n\u003ch2 id=\"ancel-keys-and-the-saturated-fat-fraud\"\u003eAncel Keys and the Saturated Fat Fraud\u003c/h2\u003e\n\u003cp\u003eThe intellectual foundation for the Food Pyramid's war on dietary fat was laid decades earlier by Ancel Keys, a University of Minnesota physiologist whose Seven Countries Study, published in 1970, became the most influential nutritional study of the twentieth century.\u003c/p\u003e\n\u003cp\u003eKeys claimed to demonstrate a direct correlation between saturated fat consumption and heart disease, establishing the \"diet-heart hypothesis\" that would dominate nutrition policy for fifty years.\u003c/p\u003e\n\u003cp\u003eThe problem is that Keys' study was fraudulent. He had data from 22 countries, not seven. He selected the seven countries whose data supported his hypothesis and excluded the fifteen countries whose data contradicted it.\u003c/p\u003e\n\u003cp\u003eCountries like France, which had high saturated fat consumption and low heart disease rates (the so-called \"French Paradox\"), were simply left out. When other researchers reanalyzed the full 22-country dataset, no significant correlation between saturated fat and heart disease was found.\u003c/p\u003e\n\u003cp\u003eKeys was not merely a biased researcher. He was an aggressive political operator who systematically destroyed the careers of scientists who challenged his hypothesis.\u003c/p\u003e\n\u003cp\u003eDr. John Yudkin, a British physiologist who published \"Pure, White and Deadly\" in 1972, argued that sugar — not fat — was the primary dietary driver of heart disease, obesity, and diabetes. Yudkin's research was rigorous, his conclusions prophetic, and his career was destroyed.\u003c/p\u003e\n\u003cp\u003eKeys used his influence to ridicule Yudkin publicly, block his access to funding and publishing, and ensure that the sugar hypothesis was buried while the fat hypothesis became official policy.\u003c/p\u003e\n\u003cp\u003eYudkin died in 1995, largely forgotten. His book went out of print. The low-fat dogma he fought against was enshrined as gospel. It would take another twenty years before researchers would rediscover his work and recognize that he had been right all along — while the man who destroyed him had been catastrophically wrong.\u003c/p\u003e\n\u003cp\u003eIn 2014, a meta-analysis published in the Annals of Internal Medicine, reviewing 72 studies involving over 600,000 participants, found no significant evidence that saturated fat consumption increases the risk of heart disease. The foundation on which fifty years of dietary policy had been built was revealed to be sand.\u003c/p\u003e\n\u003ch2 id=\"the-sugar-industry-payoff\"\u003eThe Sugar Industry Payoff\u003c/h2\u003e\n\u003cp\u003eIn 2016, researchers at the University of California, San Francisco, published a landmark paper in JAMA Internal Medicine that exposed one of the most consequential scientific frauds of the twentieth century.\u003c/p\u003e\n\u003cp\u003eThey discovered documents in the archives of the now-defunct Sugar Research Foundation (SRF) — the predecessor of today's Sugar Association — showing that the sugar industry had secretly paid Harvard scientists to produce research blaming fat, not sugar, for heart disease.\u003c/p\u003e\n\u003cp\u003eIn 1967, the SRF paid three Harvard researchers — including Dr. Mark Hegsted, who would later become the head of nutrition at the USDA — $50,000 (equivalent to approximately $400,000 today) to publish a review in the New England Journal of Medicine that downplayed the role of sugar in heart disease and shifted blame to saturated fat.\u003c/p\u003e\n\u003cp\u003eThe payment was never disclosed. The review was presented as independent academic research. Its conclusions became the foundation of American dietary policy for the next fifty years.\u003c/p\u003e\n\u003cp\u003eDr. Hegsted went on to draft the first Dietary Guidelines for Americans in 1977, which recommended reducing fat intake and increasing carbohydrate consumption — the exact prescription that the sugar industry had paid him to promote a decade earlier.\u003c/p\u003e\n\u003cp\u003eThe fox did not merely guard the henhouse. The fox designed the henhouse, hired the other foxes, and wrote the rules governing how many hens could be eaten per day.\u003c/p\u003e\n\u003cp\u003eThe consequences of this fraud are measured in millions of lives. The low-fat dietary guidelines triggered a massive shift in the American food supply. Food manufacturers removed fat from products and replaced it with sugar to maintain palatability.\u003c/p\u003e\n\u003cp\u003e\"Low-fat\" and \"fat-free\" products flooded supermarket shelves, each one loaded with added sugars and refined carbohydrates. Americans dutifully followed the guidelines, ate less fat, ate more carbohydrates, and got fatter, sicker, and more diabetic with every passing decade.\u003c/p\u003e\n\u003ch2 id=\"the-grain-industrys-golden-pyramid\"\u003eThe Grain Industry's Golden Pyramid\u003c/h2\u003e\n\u003cp\u003eThe placement of grains at the base of the Food Pyramid was not an accident of science. It was a triumph of agricultural economics. The American grain industry — corn, wheat, soybeans, and rice — is the most heavily subsidized sector of American agriculture.\u003c/p\u003e\n\u003cp\u003eBetween 1995 and 2020, the United States government paid over $400 billion in agricultural subsidies, with the vast majority going to commodity grain producers.\u003c/p\u003e\n\u003cp\u003eThese subsidies made grains artificially cheap, which made grain-based foods artificially cheap, which made 6-11 servings of bread, cereal, rice, and pasta per day seem like a reasonable dietary recommendation rather than a recipe for metabolic disaster.\u003c/p\u003e\n\u003cp\u003eThe Food Pyramid did not reflect what humans should eat. It reflected what American agriculture needed to sell.\u003c/p\u003e\n\u003cp\u003eThe grain industry's influence extended far beyond the pyramid itself. The American Dietetic Association (now the Academy of Nutrition and Dietetics), the professional organization that credentials registered dietitians and shapes nutrition education in universities, has been funded by food industry sponsors including Coca-Cola, PepsiCo, General Mills, and Kellogg's.\u003c/p\u003e\n\u003cp\u003eThe dietitians trained by this system are taught to promote the dietary guidelines created by the USDA, which were shaped by the industries that fund the professional organizations. The circularity is complete.\u003c/p\u003e\n\u003cp\u003eMeanwhile, traditional foods that sustained human health for millennia — animal fats, butter, eggs, organ meats, bone broth, fermented foods — were demonized as dangerous.\u003c/p\u003e\n\u003cp\u003eEggs were blamed for cholesterol. Butter was replaced with margarine (a trans-fat-laden industrial product that turned out to be far more harmful than the butter it replaced). Organ meats, the most nutrient-dense foods available, were dismissed as primitive.\u003c/p\u003e\n\u003cp\u003eThe diet of our ancestors was systematically dismantled and replaced with a diet of industrial grain products, seed oils, and sugar — the three pillars of modern chronic disease.\u003c/p\u003e\n\u003ch2 id=\"the-cholesterol-deception\"\u003eThe Cholesterol Deception\u003c/h2\u003e\n\u003cp\u003eThe war on dietary fat was accompanied by the war on cholesterol — a campaign that demonized one of the body's most essential molecules and created a multi-billion dollar pharmaceutical market for statin drugs.\u003c/p\u003e\n\u003cp\u003eCholesterol is a vital structural component of every cell membrane in the body. It is the precursor to vitamin D, cortisol, testosterone, estrogen, and progesterone. It is essential for brain function — the brain contains approximately 25% of the body's total cholesterol. Without cholesterol, the human body cannot survive.\u003c/p\u003e\n\u003cp\u003eThe dietary guidelines told Americans that dietary cholesterol (found in eggs, meat, and dairy) raised blood cholesterol, which caused heart disease. All three claims have been effectively disproven.\u003c/p\u003e\n\u003cp\u003eThe body produces approximately 80% of its cholesterol internally, and when dietary cholesterol increases, the body compensates by reducing its own production. For most people, eating cholesterol-rich foods has minimal effect on blood cholesterol levels.\u003c/p\u003e\n\u003cp\u003eMore fundamentally, the relationship between blood cholesterol and heart disease is far more complex than the simple \"cholesterol is bad\" narrative suggests. Large studies have found that approximately half of all heart attack patients have normal cholesterol levels, while many people with elevated cholesterol live long, healthy lives.\u003c/p\u003e\n\u003cp\u003eYet the dietary guidelines persisted, and the pharmaceutical industry built a statin empire on their foundation — $29 billion in annual statin sales worldwide, prescribed to millions of people to lower a number that may be largely irrelevant to their actual heart disease risk.\u003c/p\u003e\n\u003cp\u003eThe statin side effects — muscle pain, cognitive impairment, liver damage, increased diabetes risk, and sexual dysfunction — are experienced by a significant percentage of users. But these side effects generate their own pharmaceutical responses: pain medications for muscle pain, cognitive supplements for brain fog, diabetes drugs for the diabetes the statin caused.\u003c/p\u003e\n\u003cp\u003eEach pharmaceutical \"solution\" creates new problems that require new pharmaceutical solutions. The cascade begins with a dietary lie, produces a metabolic disease, generates a pharmaceutical intervention, and creates new iatrogenic conditions that require additional treatment. The profit multiplies at every step. The patient deteriorates at every step. And it all started with a pyramid.\u003c/p\u003e\n\u003ch2 id=\"the-obesity-and-diabetes-epidemic\"\u003eThe Obesity and Diabetes Epidemic\u003c/h2\u003e\n\u003cp\u003eThe results of the Food Pyramid experiment are not ambiguous. They are catastrophic. When the dietary guidelines were introduced in 1977, approximately 15% of American adults were obese. By 2020, that number had risen to 42%.\u003c/p\u003e\n\u003cp\u003eType 2 diabetes, which was rare enough in 1960 to be called \"adult-onset diabetes,\" now affects over 37 million Americans, including a rapidly growing number of children and adolescents. Heart disease — the very condition the low-fat guidelines were supposed to prevent — remains the leading cause of death in the United States.\u003c/p\u003e\n\u003cp\u003eThe timeline of the obesity epidemic maps directly onto the adoption of the dietary guidelines. Americans did what they were told. They reduced fat intake from approximately 40% of calories to 34%. They increased carbohydrate intake. They ate more grains, more sugar, and more processed food. And they got sick.\u003c/p\u003e\n\u003cp\u003eThis is not a correlation without a mechanism. The mechanism is well understood. When dietary fat is replaced with carbohydrates — particularly refined carbohydrates and sugars — the body produces more insulin.\u003c/p\u003e\n\u003cp\u003eChronically elevated insulin drives fat storage, promotes inflammation, triggers insulin resistance, and eventually leads to Type 2 diabetes, metabolic syndrome, and the cascade of chronic diseases that define modern American health.\u003c/p\u003e\n\u003cp\u003eDr. Robert Lustig, a pediatric endocrinologist at UCSF, has documented this mechanism extensively. His research demonstrates that fructose — the sugar found in table sugar and high-fructose corn syrup — is metabolized by the liver in a manner virtually identical to alcohol, producing the same metabolic damage: fatty liver disease, insulin resistance, elevated triglycerides, and visceral fat accumulation.\u003c/p\u003e\n\u003cp\u003eThe \"low-fat\" products that replaced dietary fat with sugar were, metabolically speaking, as damaging as replacing water with beer.\u003c/p\u003e\n\u003cp\u003eThe childhood obesity crisis is the most damning indictment of the dietary guidelines. Children born after 1980 — the first generation raised entirely under the Food Pyramid's influence — are the fattest, most metabolically diseased generation in American history. Over 20% of American children are now obese. Type 2 diabetes, once unheard of in children, is now diagnosed in adolescents at epidemic rates. Non-alcoholic fatty liver disease — a condition that barely existed in children before the dietary guidelines — now affects approximately 10% of American children.\u003c/p\u003e\n\u003cp\u003eThese children did not fail. The guidelines failed them. Their parents followed the rules, fed them \"healthy whole grains\" and \"low-fat\" dairy, packed their lunches with wheat bread and fruit juice, and watched their children develop the metabolic diseases of middle-aged adults before finishing high school.\u003c/p\u003e\n\u003ch2 id=\"the-cover-up-continues\"\u003eThe Cover-Up Continues\u003c/h2\u003e\n\u003cp\u003eDespite the mounting evidence that the dietary guidelines were built on fraud, the nutrition establishment has resisted revision with remarkable tenacity.\u003c/p\u003e\n\u003cp\u003eThe 2015 Dietary Guidelines Advisory Committee recommended removing the cap on dietary cholesterol, effectively admitting that fifty years of anti-egg, anti-cholesterol advice had been wrong. But the guidelines still promote low-fat dairy, still demonize saturated fat, and still recommend a grain-heavy diet.\u003c/p\u003e\n\u003cp\u003eThe seed oil industry — manufacturers of canola, soybean, corn, and sunflower oils — has stepped into the role once played by the sugar industry, funding research that promotes their products while suppressing evidence of harm, as detailed in our article on \u003ca href=\"/seed-oils-toxic-cooking/?lang=en\"\u003eSeed Oils: The Toxic Cooking Oil You Can't Escape\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eThe processed food industry continues to engineer products for maximum addictiveness while following the letter of the dietary guidelines, as documented in our article on \u003ca href=\"/processed-food-addiction-design/?lang=en\"\u003eProcessed Food: Engineered for Addiction\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eThe system is not broken. It is working exactly as designed: a dietary framework created by agricultural interests, validated by purchased science, promoted by captured professional organizations, and enforced by a government that profits from the resulting disease through pharmaceutical sales and healthcare revenue.\u003c/p\u003e\n\u003cp\u003eThe sicker Americans get, the more money the system makes. Health is not the product. Disease is the product. The Food Pyramid was the delivery mechanism.\u003c/p\u003e\n\u003ch2 id=\"the-myplate-rebranding\"\u003eThe MyPlate Rebranding\u003c/h2\u003e\n\u003cp\u003eIn 2011, the USDA replaced the Food Pyramid with MyPlate — a circular graphic divided into four sections (fruits, vegetables, grains, and protein) with a small circle for dairy on the side.\u003c/p\u003e\n\u003cp\u003eThe change was presented as a modernization — a simpler, clearer guide to healthy eating. In reality, it was a cosmetic rebranding of the same compromised framework.\u003c/p\u003e\n\u003cp\u003eGrains still occupied a full quarter of the plate. The grain industry's influence had not diminished — it had simply been redistributed into a new graphic format. The protein section was deliberately vague, allowing plant-based proteins, processed soy products, and legumes to be counted alongside animal protein — a concession to the emerging plant-based food industry that would spend the next decade marketing soy burgers and cricket flour as equivalent to beef.\u003c/p\u003e\n\u003cp\u003eThe dairy circle — positioned separately from the plate — was a concession to the dairy industry, which lobbied aggressively to maintain its presence in the guidelines despite growing evidence that many adults do not tolerate dairy well and that dairy consumption is not necessary for calcium intake.\u003c/p\u003e\n\u003cp\u003eMyPlate did not remove the influence of industry from dietary guidance. It perfected the art of presenting industry preferences as public health science.\u003c/p\u003e\n\u003cp\u003eThe fundamental problem remained unchanged: an agricultural promotion agency was telling Americans what to eat, and the foods it recommended were the foods its constituent industries needed to sell.\u003c/p\u003e\n\u003ch2 id=\"the-international-dimension\"\u003eThe International Dimension\u003c/h2\u003e\n\u003cp\u003eThe American dietary guidelines did not remain within American borders. Through international trade agreements, development programs, and the influence of American-trained nutritionists, the low-fat, high-carbohydrate dietary model was exported worldwide.\u003c/p\u003e\n\u003cp\u003eCountries that had traditional diets rich in animal fats, coconut oil, and locally produced foods were told by American-funded health organizations that they needed to adopt Western dietary patterns. Traditional fats were replaced with imported seed oils. Traditional grains were replaced with imported wheat and corn. Local food systems were dismantled and replaced with industrial food imports.\u003c/p\u003e\n\u003cp\u003eThe result was a global epidemic of chronic disease that followed the adoption of American dietary guidelines with striking consistency. Japan, which had one of the lowest heart disease rates in the world while eating a traditional diet high in fish, rice, and fermented foods, saw chronic disease rates increase as Western processed foods entered its market.\u003c/p\u003e\n\u003cp\u003ePacific Island nations that adopted Western diets now have some of the highest obesity and diabetes rates on earth. Nauru, which shifted from a traditional diet to imported processed foods, has a diabetes rate exceeding 30% of the adult population.\u003c/p\u003e\n\u003cp\u003eThe Food Pyramid was not merely an American failure. It was an exported catastrophe — a dietary model designed by American industrial interests, validated by American institutional science, and imposed on the world through the machinery of American economic and cultural influence.\u003c/p\u003e\n\u003cp\u003eThe nations that resisted — that maintained their traditional diets and food systems — remained healthier. The nations that complied got sicker. The evidence could not be clearer. And the guidelines have not been corrected.\u003c/p\u003e\n\u003ch2 id=\"biblical-reflection\"\u003eBiblical Reflection\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Woe to those who call evil good and good evil, who put darkness for light and light for darkness, who put bitter for sweet and sweet for bitter.\" — Isaiah 5:20\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Food Pyramid is a perfect expression of the inversion Isaiah warned about. What is good — animal fat, butter, eggs, the foods God provided — was called evil. What is evil — refined sugar, industrial seed oils, processed grains — was called good. Darkness was presented as light. Bitter was marketed as sweet.\u003c/p\u003e\n\u003cp\u003eAnd an entire civilization ate the lie and wondered why it was dying.\u003c/p\u003e\n\u003cp\u003eThis is not merely a matter of dietary preference. It is a spiritual pattern. The same spirit that told Eve \"you will not surely die\" is the spirit that told Americans \"eat more grains and less fat and you will be healthy.\" It is the spirit of deception — the ancient lie that what God said is wrong and what the serpent says is right.\u003c/p\u003e\n\u003cp\u003eThe results, in Eden and in America, are the same: disease, suffering, and death dressed up as wisdom and progress.\u003c/p\u003e\n\u003cp\u003eGod's provision has always been sufficient. The foods He created — the animals, the plants, the fats, the oils, the honey, the milk — are what the human body was designed to consume. The Food Pyramid was a rejection of that provision and an embrace of an industrial counterfeit.\u003c/p\u003e\n\u003cp\u003eReturning to the foods God made is not nostalgia. It is obedience.\u003c/p\u003e\n\u003cp\u003eThe first step away from the pyramid is the first step toward health. It begins with a question that fifty years of dietary propaganda has trained Americans not to ask: what if everything the government told me about food was wrong?\u003c/p\u003e\n\u003cp\u003eThe evidence says it was. The epidemic says it was. The graveyards say it was.\u003c/p\u003e\n\u003cp\u003eThe only people who say it was not are the ones who profit from your illness.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/135-Food_Price_Shadow_Industry.mp4\"\u003eFood Price Shadow Industry\u003c/a\u003e — The hidden forces behind dietary deception\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e — How industry captured nutrition science\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/seed-oils-toxic-cooking/?lang=en\"\u003eSeed Oils: The Toxic Cooking Oil You Can't Escape\u003c/a\u003e — How industrial seed oils replaced natural fats and destroyed public health\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/processed-food-addiction-design/?lang=en\"\u003eProcessed Food: Engineered for Addiction\u003c/a\u003e — The science of making food irresistible and the profits built on chronic disease\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eFor fifty years, Americans were told that the diseases killing them were caused by the foods that sustained their grandparents, and that salvation lay in the products of the industries funding the research. The Food Pyramid was not bad science. It was good business — for the grain industry, the sugar industry, the pharmaceutical industry, and every institution that profits when a nation eats itself to death. The lie is on the wall of every school cafeteria. The truth is in the epidemic of disease that followed its adoption. What God provides, the world corrupts. What the world promotes, God's people must learn to question.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_
