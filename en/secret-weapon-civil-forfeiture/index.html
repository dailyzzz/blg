y \"Thou shalt not steal, unless thou art a government.\" Yet the United States government, through a legal mechanism called civil asset forfeiture, steals billions of dollars in cash, property, and assets from its citizens every year — without charging them with a crime.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed that the spiritual realm operates on absolute principles. Three heavens. Demonic hierarchy. 97.5 percent rejection. 95 percent self-service. Every word judged (Matthew 12:36-37). The commandment against theft is absolute in the spiritual realm. In the material realm, the government has exempted itself — creating a legal fiction that allows it to steal while calling the theft \"forfeiture.\"\u003c/p\u003e\n\u003cp\u003eThe Jesuits — Loyola's military organization, Napoleon's \"absolute power,\" Tamburini governing \"all the world\" — built the legal and institutional frameworks through which modern governments operate. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" Civil forfeiture is the legal system's expression of these Jesuit principles: invisible authority, unquestionable power, and the elimination of anyone who resists.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"how-civil-forfeiture-works\"\u003eHow Civil Forfeiture Works\u003c/h2\u003e\n\u003ch3 id=\"the-government-vs-your-property\"\u003eThe Government vs. Your Property\u003c/h3\u003e\n\u003cp\u003eIn civil asset forfeiture, the government does not charge you with a crime. It charges your property. This is not a metaphor. The legal cases literally name the property as the defendant: \u003cem\u003eUnited States v. $124,700 in U.S. Currency\u003c/em\u003e. \u003cem\u003eUnited States v. One 2004 Chevrolet Silverado\u003c/em\u003e. \u003cem\u003eState of Texas v. One Gold Necklace\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eBecause the case is against the property, not the person, the constitutional protections that apply to criminal defendants — the presumption of innocence, the right to a speedy trial, the right to counsel — do not apply. The property is presumed guilty. The owner must prove their own innocence to recover it. The burden of proof is reversed.\u003c/p\u003e\n\u003cp\u003eThis legal fiction — that property can be guilty of a crime independently of its owner — is one of the most Orwellian constructs in American law. It was originally designed for maritime law and drug enforcement, but it has metastasized into a general tool of government enrichment.\u003c/p\u003e\n\u003ch3 id=\"the-scale-of-theft\"\u003eThe Scale of Theft\u003c/h3\u003e\n\u003cp\u003eThe Institute for Justice, a legal advocacy organization, has documented the scope of civil forfeiture in America:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIn 2014, civil forfeiture generated more revenue for the federal government than burglary generated for criminals. The government stole more than the burglars.\u003c/li\u003e\n\u003cli\u003eThe Department of Justice's Asset Forfeiture Fund held over $4 billion in 2019.\u003c/li\u003e\n\u003cli\u003eState and local law enforcement agencies seize billions more annually through state forfeiture laws.\u003c/li\u003e\n\u003cli\u003eMost seizures target small amounts of cash from individuals who cannot afford legal representation to challenge the seizure.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe victims are disproportionately poor, minority, and unable to navigate the legal system. The government targets those least able to fight back — the same populations that the Jesuits' missions targeted for \"conversion\" through control of resources, labor, and autonomy.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) how civil forfeiture has become a revenue stream for law enforcement agencies — a perverse incentive system in which police departments profit from seizures, creating a financial motivation to steal from citizens. This is not law enforcement. This is government-sponsored robbery, legalized through a legal system designed to protect the powerful at the expense of the powerless.\u003c/p\u003e\n\u003ch3 id=\"real-cases-real-victims\"\u003eReal Cases, Real Victims\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eEh Wah\u003c/strong\u003e, a Burmese immigrant and Christian rock band manager, was stopped in Oklahoma in 2016 while carrying $53,000 in cash — proceeds from a series of concerts intended for a Thai orphanage and a Christian college. The police seized the money through civil forfeiture. Wah was not charged with any crime. It took months of legal battle and national media attention to recover the funds.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMandrel Stuart\u003c/strong\u003e, a Virginia restaurant owner, was stopped for a minor traffic violation while carrying $17,550 in restaurant proceeds. The police seized the cash. Stuart was not charged with a crime. He spent over a year fighting to recover his money, during which time his restaurant went bankrupt.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Sourovelis family\u003c/strong\u003e of Philadelphia had their home seized by the government after their son was caught selling $40 worth of drugs outside. The parents were not involved. They were not charged. But their home — their entire life savings — was seized because the crime occurred on their property.\u003c/p\u003e\n\u003cp\u003eThese are not outliers. They are representative cases from a system that processes hundreds of thousands of seizures annually, most of which involve small amounts from people too poor to fight back.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"theft-as-spiritual-warfare\"\u003eTheft as Spiritual Warfare\u003c/h3\u003e\n\u003cp\u003eThe commandment \"Thou shalt not steal\" exists because property represents life — the time, labor, and creative energy that went into earning it. Theft is not merely the taking of objects. It is the taking of life — the time that can never be recovered, the labor that can never be unworked.\u003c/p\u003e\n\u003cp\u003eCivil forfeiture is institutional theft on a massive scale. It is the government — the entity tasked with protecting property rights — violating those rights systematically, legally, and profitably. This is Satanic inversion: the protector becomes the predator. The guardian becomes the thief. The law becomes the weapon.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's revelation that 97.5 percent of Christians were rejected — that the institutions they trusted failed them — applies to the legal system as perfectly as it applies to the church. The legal system promises justice and delivers theft. The church promises salvation and delivers ritual. Both institutions have been captured by the same principalities and powers that operate through every human system.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' infiltration \"cloaked with cunning\" extends to the legal system. Jesuit universities — Georgetown Law, Fordham Law, Loyola Law — train a significant percentage of America's lawyers and judges. The legal system's tolerance for civil forfeiture is a product of the institutional training that shaped its practitioners — training that prioritizes institutional authority over individual rights, obedience over justice, and power over truth.\u003c/p\u003e\n\u003ch3 id=\"render-unto-caesar\"\u003eRender Unto Caesar\u003c/h3\u003e\n\u003cp\u003eJesus's statement about rendering unto Caesar was not an endorsement of unlimited taxation or government authority. It was a challenge: identify what belongs to Caesar and what belongs to God. The implication is that God's claim supersedes Caesar's — that there are limits to what the government can rightfully demand.\u003c/p\u003e\n\u003cp\u003eCivil forfeiture recognizes no limits. It claims the right to take anything, from anyone, at any time, without accusation, without trial, without proof. This is not Caesar's due. This is tyranny — the absolute power that the Jesuits wield, the absolute power that Napoleon attributed to them, the absolute power that the principalities of Ephesians 6:12 exercise through earthly institutions.\u003c/p\u003e\n\u003ch2 id=\"fighting-back\"\u003eFighting Back\u003c/h2\u003e\n\u003ch3 id=\"legal-challenges\"\u003eLegal Challenges\u003c/h3\u003e\n\u003cp\u003eThe Institute for Justice and other organizations have challenged civil forfeiture laws in multiple states. Several states have reformed their laws, requiring a criminal conviction before forfeiture can occur or redirecting forfeiture proceeds away from law enforcement. The Supreme Court's 2019 decision in \u003cem\u003eTimbs v. Indiana\u003c/em\u003e ruled that excessive fines protections apply to the states, potentially limiting forfeiture.\u003c/p\u003e\n\u003cp\u003eBut reform is slow, and the incentive structure remains. As long as police departments profit from seizures, they will continue to seize. As long as the legal system treats property as guilty, citizens will lose their possessions. As long as the institutional architecture rewards theft, the government will steal.\u003c/p\u003e\n\u003ch3 id=\"what-you-can-do\"\u003eWhat You Can Do\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eKnow your rights\u003c/strong\u003e: You are not required to consent to searches. You have the right to remain silent about the contents of your vehicle or home.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDocument everything\u003c/strong\u003e: If your property is seized, document the seizure immediately — date, time, officers, amounts, circumstances.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eContact legal aid\u003c/strong\u003e: Organizations like the Institute for Justice provide free legal assistance for forfeiture cases.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCarry minimal cash\u003c/strong\u003e: The less cash you carry, the less the government can seize.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSupport reform\u003c/strong\u003e: Contact your representatives and demand civil forfeiture reform.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThe narrow path requires awareness of the systems designed to rob you — and the courage to resist them, challenge them, and expose them. The government's secret weapon is only secret as long as people do not know about it. Now you know.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com TRUTHFUL DECEPTION: How Governments and Corporations Lie Legally\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThou shalt not steal. The commandment is absolute. The government's exemption is self-granted. And the victims — poor, voiceless, unable to fight back — pay the price for a system that has legalized theft while criminalizing resistance. The secret weapon works only in secret. Expose it. Name it. Fight it. And never forget that the protector and the predator wear the same badge.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/finance/\",\"className\":\"category-badge\",\"children\":\"finance\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"THE SECRET WEAPON: Civil Forfeiture and Government Theft\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Civil forfeiture lets the government steal your property without charging you with a crime. The Jesuit-connected legal system's secret weapon.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-21T10:00:00Z\",\"children\":\"May 21, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"civil-forfeiture\",{\"href\":\"/en/tag/civil-forfeiture/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"civil-
