eYou notice it every week at the grocery store. The prices keep rising. The portions keep shrinking. The explanations — inflation, supply chain, climate, labor costs — keep coming. But none of them fully account for what you are experiencing. There is a shadow industry operating behind the visible economy, adding costs at every stage of food production, and its existence is one of the best-kept secrets in the modern world.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed invisible systems operating behind the visible. Demonic hierarchies in the second heaven. 97.5 percent of Christians rejected. 95 percent serving \"self.\" Every word carrying spiritual weight (Matthew 12:36-37). The financial system that governs your food supply is one of these invisible systems — a principality (Ephesians 6:12) that operates through mechanisms most people never see.\u003c/p\u003e\n\u003cp\u003eThe Jesuits — Loyola's military organization, Napoleon's \"absolute power,\" Tamburini's world governance — pioneered the model of invisible financial extraction. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals their infiltration \"cloaked with cunning.\" The shadow industry driving food prices operates by the same principles: invisible authority, hidden fees, and the systematic extraction of wealth from a population that does not know it is being taxed.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-layers-of-hidden-cost\"\u003eThe Layers of Hidden Cost\u003c/h2\u003e\n\u003ch3 id=\"layer-1-certification-fees\"\u003eLayer 1: Certification Fees\u003c/h3\u003e\n\u003cp\u003eAs documented in Part 1, kosher certification adds a hidden tax to virtually every packaged food product. But kosher is not the only certification. Halal certification, organic certification, non-GMO certification, fair trade certification, gluten-free certification — each adds its own layer of cost. Each requires inspections, fees, paperwork, and compliance that the manufacturer passes to the consumer.\u003c/p\u003e\n\u003cp\u003eThe certification industry has exploded in recent decades. What began as niche religious or health-conscious labels has become a sprawling bureaucracy of private organizations extracting fees from the food supply. The total cost of all certifications across the food industry runs into the tens of billions annually. And every dollar is paid by you.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) how the certification industry has been weaponized as a barrier to entry for small producers. A small farm that cannot afford kosher, organic, and non-GMO certification is excluded from the retail channels where these certifications are required. The shadow industry does not merely tax food. It controls who is allowed to produce it.\u003c/p\u003e\n\u003ch3 id=\"layer-2-commodity-speculation\"\u003eLayer 2: Commodity Speculation\u003c/h3\u003e\n\u003cp\u003eThe prices of basic food commodities — wheat, corn, rice, soybeans — are set on financial markets where speculators trade futures contracts. These speculators do not grow food. They do not process food. They do not sell food. They trade paper representing food, and their trading drives prices up.\u003c/p\u003e\n\u003cp\u003eA 2023 study by the United Nations Conference on Trade and Development found that speculative trading accounts for a significant portion of food price volatility. When a hedge fund bets that wheat prices will rise, their buying activity drives the price up — creating the very outcome they bet on. This is a self-fulfilling prophecy that enriches speculators at the expense of everyone who eats.\u003c/p\u003e\n\u003cp\u003eThe financial system that enables this speculation traces directly to the banking families that created the Federal Reserve, the same families connected to Jesuit educational networks and the secret societies that the Saturn series documented. The food market is not a free market. It is a managed market, managed by the same invisible hands that manage the calendar, the education system, and the institutional church.\u003c/p\u003e\n\u003ch3 id=\"layer-3-regulatory-capture\"\u003eLayer 3: Regulatory Capture\u003c/h3\u003e\n\u003cp\u003eGovernment agencies ostensibly exist to protect the food supply. In practice, they protect the food industry from competition. The FDA, USDA, and EPA are staffed by former industry executives who return to industry after their government service — the revolving door that ensures regulation serves corporate interests.\u003c/p\u003e\n\u003cp\u003eThis regulatory capture adds cost by mandating expensive compliance that only large corporations can afford. Small producers, unable to navigate the regulatory labyrinth, are driven out of business. The survivors — the mega-corporations that dominate the food supply — can charge higher prices because competition has been eliminated by regulation.\u003c/p\u003e\n\u003cp\u003eThe Jesuit model of institutional control is perfectly expressed in regulatory capture: an organization that appears to serve the public while actually serving the institution. The FDA appears to protect consumers while actually protecting the monopoly power of the corporations that fund political campaigns, employ former regulators, and lobby for the regulations that eliminate their competitors.\u003c/p\u003e\n\u003ch3 id=\"layer-4-supply-chain-consolidation\"\u003eLayer 4: Supply Chain Consolidation\u003c/h3\u003e\n\u003cp\u003eFour companies control over 80 percent of the American beef market. Four companies control over 60 percent of the pork market. A handful of corporations control the grain supply, the seed supply, the fertilizer supply, and the distribution networks. This consolidation eliminates competition, enables price-fixing, and creates a food system that is deliberately fragile — dependent on a small number of chokepoints that can be controlled by a small number of entities.\u003c/p\u003e\n\u003cp\u003eThis consolidation did not happen accidentally. It was engineered through decades of mergers, acquisitions, and regulatory decisions that favored large operators over small ones. Agent131711's research traces the ownership chains of these corporations to the same network of institutional investors, banks, and holding companies that populate the boards of the certifying agencies, the media companies, and the political action committees.\u003c/p\u003e\n\u003cp\u003eThe shadow industry is not one thing. It is a system — a network of interlocking mechanisms that work together to extract maximum wealth from the food supply while maintaining the illusion of a free market. Each layer — certification, speculation, regulation, consolidation — adds cost that the consumer bears without understanding.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-economics-of-food\"\u003eThe Spiritual Economics of Food\u003c/h2\u003e\n\u003ch3 id=\"food-as-a-weapon\"\u003eFood as a Weapon\u003c/h3\u003e\n\u003cp\u003eThroughout history, control of food has been the most effective weapon against populations. The Soviet Holodomor. The Irish famine. The Bengal famine. Each involved deliberate manipulation of the food supply to achieve political objectives. The modern shadow food industry achieves the same objective through economic rather than physical starvation: it ensures that the population spends an ever-increasing portion of its income on food, leaving less for savings, education, or independence.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the demonic hierarchy operates through systems that create dependency. A population dependent on a food system it does not understand, cannot influence, and cannot escape is a population under control. The spiritual dimension of food prices is not metaphorical. It is operational: the principalities and powers of Ephesians 6:12 work through economic systems to bind consciousness to material survival, leaving no energy for spiritual pursuit.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' missions always began with food — controlling agriculture, controlling diet, controlling the most basic human need. The modern food system continues this mission through corporate rather than missionary mechanisms, but the principle is identical: control food, control the population, control the soul.\u003c/p\u003e\n\u003ch3 id=\"breaking-the-system\"\u003eBreaking the System\u003c/h3\u003e\n\u003cp\u003eThe shadow industry's power depends on two things: invisibility and dependency. If consumers understood the layers of hidden cost in their food, they would demand change. If consumers were not dependent on the corporate food system, they could opt out.\u003c/p\u003e\n\u003cp\u003eBoth of these dependencies are being deliberately maintained. Media coverage of food prices focuses on superficial explanations (weather, shipping, wages) rather than structural ones (certification, speculation, capture, consolidation). And the regulatory system makes it increasingly difficult for individuals and small communities to produce their own food.\u003c/p\u003e\n\u003cp\u003eThe path forward is local, direct, and independent: grow what you can, buy from producers you know, and refuse to participate in the corporate food system wherever possible. This is not merely a practical strategy. It is a spiritual act — a withdrawal from the Saturn system of material control and a reclamation of the divine mandate to tend the garden.\u003c/p\u003e\n
