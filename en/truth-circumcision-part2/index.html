/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eIn Part 1, we examined the communist infiltration of American medicine and how circumcision became embedded in the medical system as a tool of ideological control. Now we go deeper — into the specific medical claims used to justify the procedure, the devastating psychological impact on circumcised males, and the institutional machinery that keeps this practice alive despite overwhelming evidence against it.\u003c/p\u003e\n\u003cp\u003eEvery claim used to justify routine infant circumcision has been debunked. Every European medical organization that has evaluated the practice has concluded it is not medically necessary. And yet it continues — because the forces that drive it are not medical but spiritual, ideological, and financial.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown during his NDE that the spiritual realm is the true reality and that the physical world is merely its shadow. The words spoken by medical authorities — \"it's routine,\" \"it's cleaner,\" \"it prevents disease\" — carry spiritual weight. They are incantations that override parental instinct, silence maternal intuition, and normalize the mutilation of God's creation. Pittman learned that 95% serve \"self\" rather than God, and the medical system that profits from infant circumcision serves self above all.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' practice of \"every species of vice\" in service of their order, their infiltration \"cloaked with cunning,\" their pursuit of what Napoleon called \"absolute power\" — all of these characteristics describe the circumcision industry with eerie precision. John Adams's warning about the \"Society of Loyola's\" deserving \"eternal damnation\" applies equally to institutions that profit from the suffering of newborns.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"debunking-the-medical-claims\"\u003eDebunking the Medical Claims\u003c/h2\u003e\n\u003ch3 id=\"claim-1-circumcision-prevents-penile-cancer\"\u003eClaim 1: Circumcision Prevents Penile Cancer\u003c/h3\u003e\n\u003cp\u003eThis was one of the earliest medical justifications and is still cited today. The claim is that circumcision reduces the risk of penile cancer. Here are the facts:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePenile cancer is \u003cstrong\u003eextremely rare\u003c/strong\u003e — it affects approximately 1 in 100,000 men annually in the United States\u003c/li\u003e\n\u003cli\u003eThe incidence of penile cancer in \u003cstrong\u003eDenmark\u003c/strong\u003e (where circumcision is virtually nonexistent) is \u003cstrong\u003elower\u003c/strong\u003e than in the United States\u003c/li\u003e\n\u003cli\u003eThe American Cancer Society has stated that circumcision should \u003cstrong\u003enot\u003c/strong\u003e be recommended as a prevention strategy for penile cancer\u003c/li\u003e\n\u003cli\u003eRisk factors for penile cancer include \u003cstrong\u003esmoking, HPV infection, phimosis\u003c/strong\u003e (which can be treated without circumcision), and \u003cstrong\u003epoor hygiene\u003c/strong\u003e — not the presence of a foreskin\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eUsing cancer prevention to justify routine infant surgery on a body part that develops cancer at a rate of 0.001% is like justifying the removal of all breast tissue from infant girls to prevent breast cancer — which has an incidence rate \u003cstrong\u003e140 times higher\u003c/strong\u003e than penile cancer.\u003c/p\u003e\n\u003ch3 id=\"claim-2-circumcision-prevents-utis\"\u003eClaim 2: Circumcision Prevents UTIs\u003c/h3\u003e\n\u003cp\u003eStudies have claimed that circumcised males have a lower risk of urinary tract infections in the first year of life. Even if this claim is accepted at face value:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe absolute risk reduction is approximately \u003cstrong\u003e1%\u003c/strong\u003e — from about 1.5% to 0.5%\u003c/li\u003e\n\u003cli\u003eUTIs in infant males are easily treated with \u003cstrong\u003eantibiotics\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGirls\u003c/strong\u003e have a much higher rate of UTIs than boys, and no one suggests surgically altering female anatomy to prevent them\u003c/li\u003e\n\u003cli\u003eThe studies showing UTI reduction have been criticized for \u003cstrong\u003emethodological flaws\u003c/strong\u003e, including failure to account for confounding variables like breastfeeding (which independently reduces UTI risk)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTo prevent one UTI, approximately \u003cstrong\u003e100 circumcisions\u003c/strong\u003e must be performed. This means 99 boys are subjected to unnecessary surgery — with its attendant risks of bleeding, infection, adhesions, scarring, and worse — to potentially prevent one easily treatable infection.\u003c/p\u003e\n\u003ch3 id=\"claim-3-circumcision-prevents-hiv\"\u003eClaim 3: Circumcision Prevents HIV\u003c/h3\u003e\n\u003cp\u003eThis is the most recent and most heavily promoted claim, based on three randomized controlled trials conducted in Africa between 2005 and 2007. These trials claimed that circumcision reduced female-to-male HIV transmission by approximately 60%.\u003c/p\u003e\n\u003cp\u003eThe problems with these studies are profound:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eEarly termination\u003c/strong\u003e: All three trials were stopped early, which is known to inflate effect sizes in clinical trials\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConfounding variables\u003c/strong\u003e: Circumcised men in the trials received medical care, condoms, and health education that uncircumcised men did not receive — making it impossible to isolate the effect of circumcision\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLead-time bias\u003c/strong\u003e: Circumcised men were told to abstain from sex during their recovery period (6-8 weeks), giving them less time at risk compared to the control group\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAbsolute vs. relative risk\u003c/strong\u003e: The \"60% reduction\" is a relative risk figure. The absolute risk reduction was approximately \u003cstrong\u003e1.3%\u003c/strong\u003e — from 2.5% to 1.2% over the study period\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNo protection for women\u003c/strong\u003e: Studies on female-to-male transmission do not apply to male-to-female transmission, and subsequent studies found \u003cstrong\u003eno protective effect\u003c/strong\u003e for women\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eContradicted by population data\u003c/strong\u003e: The United States has the highest circumcision rate in the developed world AND the highest HIV rate. If circumcision prevented HIV, the opposite should be true\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese African trials were funded by organizations with financial ties to the circumcision industry and were promoted by agencies seeking to justify mass circumcision programs in Africa — programs worth billions of dollars in international aid money.\u003c/p\u003e\n\u003ch3 id=\"claim-4-circumcision-is-hygienic\"\u003eClaim 4: Circumcision Is Hygienic\u003c/h3\u003e\n\u003cp\u003eThe hygiene argument is the most common justification cited by American parents. It is also the most easily debunked:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe foreskin is \u003cstrong\u003eself-cleaning\u003c/strong\u003e — it produces smegma, a natural lubricant that contains lysozyme (an antimicrobial enzyme) and serves a protective function\u003c/li\u003e\n\u003cli\u003eIntact males in Europe, Asia, and South America do not have higher rates of genital infections than circumcised American males\u003c/li\u003e\n\u003cli\u003eTeaching a boy to wash is \u003cstrong\u003esimpler, safer, and cheaper\u003c/strong\u003e than surgically removing a body part\u003c/li\u003e\n\u003cli\u003eThe hygiene argument could be applied to any body part — ears, belly buttons, between toes — and no one suggests removing those structures for cleanliness\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe hygiene argument is not medicine. It is cultural conditioning — the same cultural conditioning that once justified foot-binding, corsets, and other forms of body modification imposed on the young by the old.\u003c/p\u003e\n\u003ch2 id=\"the-foreskin-what-they-dont-tell-you\"\u003eThe Foreskin: What They Don't Tell You\u003c/h2\u003e\n\u003ch3 id=\"anatomy-and-function\"\u003eAnatomy and Function\u003c/h3\u003e\n\u003cp\u003eThe foreskin is not a vestigial remnant or a \"flap of skin.\" It is a complex, functional organ containing:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOver 20,000 nerve endings\u003c/strong\u003e — making it the most sensitive part of the male body\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMeissner's corpuscles\u003c/strong\u003e — fine-touch nerve receptors found in the fingertips and lips\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe frenulum\u003c/strong\u003e — one of the most erogenous zones of the male anatomy, often partially or completely removed during circumcision\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe ridged band\u003c/strong\u003e — a specialized structure at the tip of the foreskin with unique sensory properties\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImmunological tissue\u003c/strong\u003e — including Langerhans cells that play a role in the body's defense processes\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDartos muscle\u003c/strong\u003e — smooth muscle that allows the foreskin to expand and contract\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe foreskin serves multiple functions:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eProtection\u003c/strong\u003e: Keeps the glans (head) of the penis moist and sensitive throughout life\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSensation\u003c/strong\u003e: Provides a unique form of sensory feedback during intimate contact\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLubrication\u003c/strong\u003e: Facilitates natural lubrication, reducing friction\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImmunological function\u003c/strong\u003e: Produces antimicrobial compounds that protect against pathogens\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eRemoving the foreskin removes approximately \u003cstrong\u003e50% of the penile skin\u003c/strong\u003e, eliminates the most sensitive tissue, and exposes the glans to constant friction from clothing, causing progressive keratinization (thickening and drying) that reduces sensitivity over a lifetime.\u003c/p\u003e\n\u003ch3 id=\"what-circumcision-actually-removes\"\u003eWhat Circumcision Actually Removes\u003c/h3\u003e\n\u003cp\u003eThe average circumcision removes \u003cstrong\u003e15 square inches\u003c/strong\u003e of tissue from an adult male penis — tissue that would have contained over 20,000 specialized nerve endings. This is not a \"minor\" procedure. It is the amputation of a functional organ from a non-consenting patient.\u003c/p\u003e\n\u003ch2 id=\"the-psychological-impact\"\u003eThe Psychological Impact\u003c/h2\u003e\n\u003ch3 id=\"neonatal-trauma\"\u003eNeonatal Trauma\u003c/h3\u003e\n\u003cp\u003eResearch on neonatal circumcision has revealed disturbing effects on infant development:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAltered pain response\u003c/strong\u003e: Circumcised infants show heightened pain responses to subsequent medical procedures (such as vaccination), suggesting that the trauma alters neurological pain processing\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDisrupted breastfeeding\u003c/strong\u003e: Many infants have difficulty breastfeeding after circumcision due to pain, stress, and disrupted bonding\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSleep disruption\u003c/strong\u003e: Circumcised infants show altered sleep patterns in the days and weeks following the procedure\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCortisol spikes\u003c/strong\u003e: Cortisol levels during circumcision reach levels associated with extreme physiological stress\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePTSD-like responses\u003c/strong\u003e: Some researchers have identified behavioral patterns in circumcised infants consistent with post-traumatic stress responses\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"adult-psychological-effects\"\u003eAdult Psychological Effects\u003c/h3\u003e\n\u003cp\u003eA growing body of research documents psychological effects in adult men who become aware of their circumcision:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFeelings of violation, loss, and grief\u003c/li\u003e\n\u003cli\u003eAnger toward parents and the medical system\u003c/li\u003e\n\u003cli\u003eDifficulty with intimacy and trust\u003c/li\u003e\n\u003cli\u003eSense of bodily incompleteness\u003c/li\u003e\n\u003cli\u003eDepression and anxiety related to the loss\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese effects are dismissed by the medical establishment as \"psychological problems\" rather than legitimate responses to an irreversible bodily violation. This dismissal is itself a form of gaslighting — telling victims that their suffering is their own fault rather than the fault of the system that harmed them.\u003c/p\u003e\n\u003ch2 id=\"the-institutional-machinery\"\u003eThe Institutional Machinery\u003c/h2\u003e\n\u003ch3 id=\"the-aaps-conflicted-position\"\u003eThe AAP's Conflicted Position\u003c/h3\u003e\n\u003cp\u003eThe American Academy of Pediatrics (AAP) issued a policy statement in 2012 declaring that \"the health benefits of newborn male circumcision outweigh the risks.\" This statement was immediately condemned by medical organizations worldwide:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eA group of \u003cstrong\u003e38 European physicians\u003c/strong\u003e from 16 countries published a response calling the AAP statement \"culturally biased\" and noting that no European medical organization recommends routine circumcision\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003eRoyal Dutch Medical Association\u003c/strong\u003e called circumcision a \"violation of children's rights to autonomy and physical integrity\"\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003eBritish Medical Association\u003c/strong\u003e stated that circumcision is \"not generally justified on health grounds\"\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003eCanadian Paediatric Society\u003c/strong\u003e does not recommend routine circumcision\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe AAP's position is an outlier among developed nations — and the AAP has extensive financial ties to the medical industry that profits from circumcision. Members of the AAP task force that produced the 2012 statement included researchers with documented conflicts of interest.\u003c/p\u003e\n\u003ch3 id=\"the-insurance-industrys-role\"\u003eThe Insurance Industry's Role\u003c/h3\u003e\n\u003cp\u003eInsurance coverage drives medical practice in America. As long as insurance companies cover routine infant circumcision, hospitals will continue to offer it, doctors will continue to perform it, and parents will continue to accept it. Several states have removed Medicaid coverage of circumcision, and circumcision rates in those states have declined — demonstrating that the practice is driven more by financial accessibility than by medical demand.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-reality\"\u003eThe Spiritual Reality\u003c/h2\u003e\n\u003ch3 id=\"gods-design-is-not-a-mistake\"\u003eGod's Design Is Not a Mistake\u003c/h3\u003e\n\u003cp\u003eThe human body was designed by the Creator — \"fearfully and wonderfully made,\" as the Psalmist declares. The foreskin is part of that design. It is not a manufacturing defect. It is not a mistake that requires surgical correction. To claim that a healthy body part must be removed from every male infant is to claim that God's design is flawed — and that human surgeons know better than the Creator.\u003c/p\u003e\n\u003cp\u003eThis is the fundamental arrogance that drives the medical establishment: the belief that man can improve upon God. It is the same arrogance that drove Lucifer to rebel against Heaven, and it is the same arrogance that the Jesuit order embodies in its pursuit of \"absolute power\" over every aspect of human life.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was told that the spiritual realm is the true reality. The physical alteration of infant bodies has spiritual consequences that extend beyond what we can measure with medical instruments. When a society normalizes the mutilation of its children, it has crossed a spiritual threshold — it has accepted the principle that institutional authority supersedes divine design.\u003c/p\u003e\n\u003ch3 id=\"breaking-free\"\u003eBreaking Free\u003c/h3\u003e\n\u003cp\u003eThe path to freedom begins with awareness. If you are a parent, educate yourself before making an irreversible decision about your child's body. If you are a man who was circumcised without consent, know that your grief is valid and your anger is justified. If you are a medical professional, examine the evidence with honest eyes and ask whether you are serving your patients or your profession.\u003c/p\u003e\n\u003cp\u003eThe truth is clear: routine infant circumcision is not medically necessary, not supported by the evidence, and not consistent with basic medical ethics. It persists because of cultural momentum, institutional profit, and the spiritual blindness that prevents people from seeing the obvious.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — investigative research on circumcision and medical system corruption\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — spiritual warfare and divine design\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — institutional infiltration and control\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- AAP Policy Statement on Circumcision (2012) and international responses\u003c/li\u003e\n\u003cli\u003eAfrican HIV circumcision trials and critiques\u003c/li\u003e\n\u003cli\u003eNeonatal pain and trauma research\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/41-Shedding_Proof.mp4\"\u003eShedding Proof\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/487-Mark_Of_The_
