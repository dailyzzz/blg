ckquote\u003e\n\u003cp\u003eEveryone knows chickenpox is contagious. Children catch it from other children. It spreads through schools like wildfire. One child gets it, and soon the whole class follows. This is common knowledge — accepted, unquestioned, and completely unexamined by the vast majority of people who believe it.\u003c/p\u003e\n\u003cp\u003eBut what if the experiments designed to prove chickenpox contagion actually failed? What if the foundational science — the actual laboratory evidence — does not support the belief that chickenpox spreads from person to person through viral transmission?\u003c/p\u003e\n\u003cp\u003eThis is not speculation. This is a matter of historical record. The contagion experiments for chickenpox, conducted in the early-to-mid 20th century, consistently failed to produce the expected results. Researchers could not reliably make healthy people sick by exposing them to sick people. The virus narrative was maintained not because the evidence supported it, but because the medical establishment needed it to be true — needed it to justify vaccines, antiviral drugs, and the entire germ theory framework upon which modern medicine depends.\u003c/p\u003e\n\u003cp\u003eHoward Pittman witnessed during his NDE the organized hierarchies of the demonic realm. He was told that 97.5% of Christians were failing, that 95% serve \"self\" rather than God, and that the spiritual warfare described in Ephesians 6:12 is more real than the physical world we see. The germ theory narrative is a weapon in this warfare — a lie so deeply embedded in human consciousness that questioning it feels like madness. But truth requires courage, and courage requires faith.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, who infiltrate \"cloaked with cunning\" and practice \"every species of vice,\" have embedded themselves in medical education, scientific institutions, and public health organizations worldwide. Napoleon's observation about their \"absolute power\" and John Adams's warning of \"eternal damnation\" for the \"Society of Loyola's\" remain as relevant today as when they were spoken.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-failed-contagion-experiments\"\u003eThe Failed Contagion Experiments\u003c/h2\u003e\n\u003ch3 id=\"the-historical-record\"\u003eThe Historical Record\u003c/h3\u003e\n\u003cp\u003eIn the early 20th century, at the height of the germ theory revolution, researchers set out to prove that chickenpox (varicella) was contagious — that it could be transmitted from a sick person to a healthy person through direct contact or airborne exposure. The experiments they conducted tell a story very different from the one taught in medical schools.\u003c/p\u003e\n\u003ch3 id=\"the-gruenberg-experiments\"\u003eThe Gruenberg Experiments\u003c/h3\u003e\n\u003cp\u003eSome of the most revealing chickenpox contagion experiments were conducted by researchers who attempted to transmit the disease by taking material from chickenpox blisters — the vesicular fluid teeming with what was believed to be the varicella virus — and directly applying it to the skin or mucous membranes of healthy subjects.\u003c/p\u003e\n\u003cp\u003eThe results were astonishing in their failure:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDirect inoculation\u003c/strong\u003e of vesicular fluid onto the skin of healthy subjects produced no disease in the majority of cases\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScarification\u003c/strong\u003e (scratching the skin and applying infected material) produced inconsistent results — some subjects developed mild local reactions, but full-blown chickenpox was rarely produced\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIntranasal application\u003c/strong\u003e of vesicular fluid failed to produce disease reliably\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClose contact experiments\u003c/strong\u003e — placing healthy subjects in direct, prolonged contact with actively infected patients — produced results far below the near-100% transmission rate the contagion model would predict\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-problem-of-attack-rates\"\u003eThe Problem of \"Attack Rates\"\u003c/h3\u003e\n\u003cp\u003eEpidemiologists use the concept of \"attack rates\" to describe how effectively a disease spreads through a population. Chickenpox is claimed to have one of the highest attack rates of any disease — supposedly over 90% for susceptible household contacts.\u003c/p\u003e\n\u003cp\u003eBut this figure is derived from \u003cstrong\u003eobservational studies\u003c/strong\u003e, not from controlled experiments. In observational studies, when one child in a household develops chickenpox and siblings subsequently develop it, the assumption is that the first child transmitted the disease to the siblings. But this assumption is precisely what needs to be proven — and the controlled experiments designed to prove it consistently failed to do so.\u003c/p\u003e\n\u003cp\u003eWhat if siblings develop chickenpox around the same time not because one transmitted it to the other, but because they share the same environment — the same food, the same water, the same air quality, the same toxin exposure, the same nutritional deficiencies? What if chickenpox is not contagious at all, but is rather the body's response to environmental and nutritional conditions that multiple people in the same household share?\u003c/p\u003e\n\u003ch3 id=\"the-seasonal-pattern-problem\"\u003eThe Seasonal Pattern Problem\u003c/h3\u003e\n\u003cp\u003eChickenpox follows a seasonal pattern — it peaks in late winter and early spring. The germ theory explanation is that the virus spreads more easily in crowded indoor conditions during colder months. But this explanation raises its own questions:\u003c/p\u003e\n\u003cp\u003eIf chickenpox is caused by a virus that spreads through direct contact and airborne droplets, why would it have a seasonal pattern at all? Viruses don't know what month it is. People are in close contact year-round in schools, offices, and public spaces.\u003c/p\u003e\n\u003cp\u003eThe terrain theory explanation is far more coherent: in late winter, after months of reduced sunlight, reduced physical activity, reduced fresh food consumption, and increased exposure to indoor pollutants (heating fumes, recirculated air, mold), the body's vitality is at its lowest point. This is when the body is most likely to initiate a detoxification response — which is what diseases like chickenpox actually represent.\u003c/p\u003e\n\u003cp\u003eThe chickenpox rash, in the terrain model, is the body expelling toxins through the skin — the body's largest elimination organ. The fever is the body raising its temperature to accelerate metabolic processes. The fatigue is the body redirecting energy toward healing. These are not signs of infection — they are signs of healing.\u003c/p\u003e\n\u003ch2 id=\"the-varicella-vaccine-solution-to-a-non-problem\"\u003eThe Varicella Vaccine: Solution to a Non-Problem\u003c/h2\u003e\n\u003ch3 id=\"the-vaccine-arrives\"\u003eThe Vaccine Arrives\u003c/h3\u003e\n\u003cp\u003eIn 1995, the varicella vaccine (Varivax) was added to the US childhood immunization schedule. Before the vaccine, chickenpox was considered a normal childhood illness — uncomfortable but rarely dangerous. Virtually every child got it, and virtually every child recovered with lifelong immunity.\u003c/p\u003e\n\u003cp\u003eThe vaccine transformed chickenpox from a routine childhood rite of passage into a \"dangerous infectious disease\" requiring pharmaceutical intervention. This transformation required a massive public relations campaign to convince parents that a disease they had experienced themselves as children — and recovered from without incident — was actually a serious threat requiring vaccination.\u003c/p\u003e\n\u003ch3 id=\"the-shingles-consequence\"\u003eThe Shingles Consequence\u003c/h3\u003e\n\u003cp\u003eOne of the most devastating consequences of the chickenpox vaccine has been the explosion of shingles cases in adults. Before the vaccine, adults were regularly exposed to children with chickenpox, and this exposure boosted their immune response to the varicella-zoster virus that lies dormant in their nervous system. This natural boosting prevented the reactivation of the virus as shingles.\u003c/p\u003e\n\u003cp\u003eWith the chickenpox vaccine dramatically reducing the number of children with active chickenpox, adults lost this natural boosting effect. Shingles rates have climbed dramatically since 1995 — and the pharmaceutical industry's solution is, of course, another vaccine: Shingrix, which costs approximately $300 for the two-dose series and generates billions in annual revenue for GlaxoSmithKline.\u003c/p\u003e\n\u003cp\u003eThe pattern is unmistakable: create the problem (eliminate natural chickenpox exposure), then sell the solution (shingles vaccine). This is the Rockefeller model perfected — the same model that creates nutritional deficiencies and then sells vitamin supplements, that pollutes the environment and then sells cancer drugs.\u003c/p\u003e\n\u003ch3 id=\"vaccine-injuries-swept-under-the-rug\"\u003eVaccine Injuries Swept Under the Rug\u003c/h3\u003e\n\u003cp\u003eThe VAERS (Vaccine Adverse Event Reporting System) database contains thousands of reports of adverse events following varicella vaccination, including:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSeizures\u003c/li\u003e\n\u003cli\u003eEncephalitis (brain inflammation)\u003c/li\u003e\n\u003cli\u003eThrombocytopenia (blood clotting disorders)\u003c/li\u003e\n\u003cli\u003eChickenpox infection from the vaccine itself (vaccine-strain varicella)\u003c/li\u003e\n\u003cli\u003eDeath\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eA Harvard Pilgrim study estimated that fewer than 1% of vaccine adverse events are reported to VAERS, meaning the true number of injuries is likely orders of magnitude higher than the official count.\u003c/p\u003e\n\u003ch2 id=\"the-deeper-pattern-contagion-theory-as-social-control\"\u003eThe Deeper Pattern: Contagion Theory as Social Control\u003c/h2\u003e\n\u003ch3 id=\"why-the-contagion-myth-matters\"\u003eWhy the Contagion Myth Matters\u003c/h3\u003e\n\u003cp\u003eThe belief that diseases are contagious — that sickness can jump from person to person through invisible agents — is one of the most powerful tools of social control ever invented. It justifies:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eQuarantine and lockdown powers\u003c/strong\u003e: Governments can restrict freedom of movement based on the claim that sick people spread disease\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMandatory vaccination\u003c/strong\u003e: If diseases are contagious, everyone must be vaccinated to protect the \"herd\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSurveillance and tracking\u003c/strong\u003e: Contact tracing, health passports, and digital monitoring systems are justified by contagion theory\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSocial isolation\u003c/strong\u003e: Fear of contagion breaks social bonds, creates distrust between people, and makes populations easier to control\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMedical dependency\u003c/strong\u003e: If disease comes from outside, you need external interventions (drugs, vaccines) to fight it\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWithout the contagion myth, the entire public health apparatus — the WHO, the CDC, the NIH, and their equivalents worldwide — would lose their primary justification for existence. Trillions of dollars in pharmaceutical revenue would evaporate. The power to lock down societies, mandate medical procedures, and track populations would disappear.\u003c/p\u003e\n\u003cp\u003eThis is why the contagion myth is defended so ferociously. It is not about science — it is about power. And power, as the Jesuits understood centuries ago, is the ultimate goal. Napoleon saw it clearly: \"absolute power, universal power, power to control the world by the volition of a single man.\"\u003c/p\u003e\n\u003ch3 id=\"the-spiritual-dimension-of-contagion-fear\"\u003eThe Spiritual Dimension of Contagion Fear\u003c/h3\u003e\n\u003cp\u003eHoward Pittman was shown that words have spiritual power. When the medical establishment declares that chickenpox is \"highly contagious,\" that declaration creates fear — and fear is one of Satan's most effective weapons. Fear of disease keeps people in bondage to the medical system. Fear of contagion keeps people isolated from one another. Fear of the invisible keeps people looking in the wrong direction for the source of their suffering.\u003c/p\u003e\n\u003cp\u003eThe Bible says \"fear not\" 365 times — one for every day of the year. The medical establishment says \"be afraid\" every single day. One voice is God's; the other is not.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order, operating through the Catholic Church and its allied institutions, has always used fear as a tool of control. Fear of hell, fear of excommunication, fear of the Inquisition — these were the tools of religious control. Fear of disease, fear of contagion, fear of pandemic — these are the tools of medical control. The mechanism is the same; only the vocabulary has changed.\u003c/p\u003e\n\u003ch2 id=\"what-the-evidence-actually-shows\"\u003eWhat the Evidence Actually Shows\u003c/h2\u003e\n\u003ch3 id=\"detoxification-not-infection\"\u003eDetoxification, Not Infection\u003c/h3\u003e\n\u003cp\u003eThe symptoms of chickenpox — rash, fever, fatigue, loss of appetite — are identical to the symptoms of detoxification. When the body is overloaded with toxins — from processed food, environmental chemicals, pharmaceutical drugs, or simply the metabolic waste that accumulates during periods of low vitality — it initiates a cleansing response.\u003c/p\u003e\n\u003cp\u003eThe rash is toxins being expelled through the skin. The fever accelerates metabolic processes and stimulates the body's healing mechanisms. The fatigue redirects energy from external activity to internal healing. The loss of appetite gives the digestive system a rest so energy can be directed toward detoxification.\u003c/p\u003e\n\u003cp\u003eThis process happens in waves, in seasonal patterns, and in clusters — not because of contagion, but because people in the same environment are exposed to the same toxins and experience the same seasonal decline in vitality.\u003c/p\u003e\n\u003ch3 id=\"the-implications\"\u003eThe Implications\u003c/h3\u003e\n\u003cp\u003eIf chickenpox is not contagious, then:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe chickenpox vaccine is unnecessary and harmful\u003c/li\u003e\n\u003cli\u003eThe shingles epidemic was created by the vaccine, not by the virus\u003c/li\u003e\n\u003cli\u003eThe contagion model of disease is fundamentally flawed\u003c/li\u003e\n\u003cli\u003eThe entire public health apparatus built on contagion theory is illegitimate\u003c/li\u003e\n\u003cli\u003eFreedom of movement, bodily autonomy, and personal liberty cannot be restricted based on disease transmission claims\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese implications are so radical, so threatening to the established order, that they explain why the failed contagion experiments were buried, why the terrain model was suppressed, and why anyone who questions germ theory is immediately labeled a dangerous crank.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — detailed analysis of failed contagion experiments and terrain theory\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — the spiritual warfare dimension\u003c/li\u003e\n\u003cli\u003e\u0
