occult traditions speak of another sun — a Black Sun, an invisible source of power that illuminates not the physical world but the spiritual hierarchy that governs it. This is not metaphor to the secret societies. It is operational doctrine. The Black Sun is the central symbol of the power structure that has ruled from behind every throne, every altar, every parliament in human history.\u003c/p\u003e\n\u003cp\u003eHoward Pittman saw the second heaven during his NDE — a realm between earth and the throne of God, teeming with demonic entities organized in military precision. He was told that 97.5 percent of Christians were rejected, having \"never made Me Lord.\" Pittman learned that 95 percent serve \"self.\" The Black Sun illuminates this self-service — it is the light of Lucifer, the false illumination that the secret societies worship as enlightenment.\u003c/p\u003e\n\u003cp\u003eThe Jesuits are the Black Sun's earthly custodians. Loyola's military organization wields what Napoleon called \"absolute power.\" Adams warned of their \"eternal damnation.\" Tamburini governed \"all the world\" from a single room. Clement XIV was poisoned for opposing them. The Black Sun is the light they follow — not the light of Christ, but the dark light of Saturn, the hidden illumination that powers the machinery of global control.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/05-The_First_Darkness.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe First Darkness — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-is-the-black-sun\"\u003eWhat Is the Black Sun?\u003c/h2\u003e\n\u003ch3 id=\"the-invisible-illuminator\"\u003eThe Invisible Illuminator\u003c/h3\u003e\n\u003cp\u003eIn esoteric tradition, the Black Sun (\u003cem\u003eSchwarze Sonne\u003c/em\u003e in German, \u003cem\u003eSol Niger\u003c/em\u003e in Latin) represents a hidden source of energy and knowledge that is invisible to ordinary perception but accessible to initiates of the mystery schools. It is the anti-sun — not the absence of light but a different kind of light, one that reveals what the visible sun conceals.\u003c/p\u003e\n\u003cp\u003eThe concept appears across multiple traditions. In alchemy, the \u003cem\u003eSol Niger\u003c/em\u003e represents the \u003cem\u003enigredo\u003c/em\u003e — the blackening stage, the death of the old self that precedes spiritual transformation. In Hindu tradition, there are references to a dark star behind the visible sun. In Mesoamerican cosmology, the jaguar sun traveled through the underworld at night, representing the hidden aspect of solar power.\u003c/p\u003e\n\u003cp\u003eThe secret societies that have shaped Western civilization — the Knights Templar, the Rosicrucians, the Freemasons, the Illuminati, and above all, the Jesuits — all incorporate Black Sun symbolism into their doctrine, even when they do not use the term explicitly. The concept of hidden knowledge, of light accessible only to the initiated, of power that operates behind the visible order — this is the Black Sun principle.\u003c/p\u003e\n\u003ch3 id=\"the-wewelsburg-connection\"\u003eThe Wewelsburg Connection\u003c/h3\u003e\n\u003cp\u003eThe most notorious modern expression of Black Sun symbolism is the mosaic embedded in the floor of the North Tower of Wewelsburg Castle in Germany. This twelve-rayed sun wheel, sometimes called the \"Black Sun symbol,\" was installed during the Third Reich's renovation of the castle as a center for SS ideology.\u003c/p\u003e\n\u003cp\u003eThe SS was, in many ways, a modern recreation of the Jesuit order. Heinrich Himmler explicitly modeled the SS on Jesuit organizational principles — the absolute obedience, the hierarchical structure, the initiation rituals, the blend of military and spiritual discipline. This is documented historical fact, not speculation. The Jesuits' influence on totalitarian movements is one of the most under-examined aspects of modern history.\u003c/p\u003e\n\u003cp\u003eThe Black Sun of Wewelsburg represents the idea that behind the visible power structure — the government, the military, the economy — there exists an occult power structure that is the true source of authority. This is not unique to the Third Reich. It is the universal principle of the mystery schools: the exoteric (outer, public) hides the esoteric (inner, secret). The visible church hides the invisible cult. The visible government hides the invisible governance.\u003c/p\u003e\n\u003ch2 id=\"the-jesuit-black-sun\"\u003eThe Jesuit Black Sun\u003c/h2\u003e\n\u003ch3 id=\"the-ihs-and-the-solar-disc\"\u003eThe IHS and the Solar Disc\u003c/h3\u003e\n\u003cp\u003eThe Jesuit emblem features the letters IHS (a Christogram representing the name of Jesus in Greek) inside a solar disc with radiating rays. This is, officially, a Christian symbol. But examine it through the lens of the Black Sun doctrine: a hidden name inside a radiant sun. The outer sun is visible. The inner meaning is concealed. This is the Black Sun principle expressed in corporate logo form.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' own history reveals the dual nature of their symbolism. \u003cem\u003eCatholic Confidential\u003c/em\u003e documents how the order infiltrates \"cloaked with cunning,\" appearing as what it is not, practicing \"every species of vice\" while professing holiness. The IHS emblem is the visual expression of this duality — a Christian surface concealing an occult interior.\u003c/p\u003e\n\u003cp\u003eAgent131711's research on Substack (agent131711.substack.com) traces the Jesuit emblem's solar imagery to pre-Christian sun worship, showing how the Society of Jesus adopted solar symbolism that connects directly to the Sol Invictus cult of late Rome. The Jesuits did not abandon sun worship when they took Christian vows. They embedded it in their very insignia.\u003c/p\u003e\n\u003ch3 id=\"the-general-and-the-shadow\"\u003eThe General and the Shadow\u003c/h3\u003e\n\u003cp\u003eThe Superior General of the Jesuits has been called the \"Black Pope\" for centuries. This title is not merely because of the black cassock the General wears. It reflects the understanding that the Jesuit General is the shadow authority behind the visible papacy — the black sun behind the white sun, the hidden power behind the visible figurehead.\u003c/p\u003e\n\u003cp\u003eFather General Tamburini's boast — governing \"all the world\" from a single room — describes the Black Sun principle in action. The visible world is run by visible leaders: presidents, prime ministers, popes. But behind them, in the shadows, stands the Jesuit General, pulling strings that the public never sees. This is not conspiracy theory. It is the operational model that the Jesuits themselves describe, that their critics have documented for centuries, and that Pope Clement XIV died trying to dismantle.\u003c/p\u003e\n\u003cp\u003eThe Black Pope governs by the light of the Black Sun — invisible authority, hidden knowledge, occult power exercised through infiltration rather than overt command. Every government penetrated, every university shaped, every media outlet influenced — all done from the shadows, all invisible to the population that believes its leaders are sovereign.\u003c/p\u003e\n\u003ch2 id=\"the-black-sun-in-history\"\u003eThe Black Sun in History\u003c/h2\u003e\n\u003ch3 id=\"the-mystery-schools-of-antiquity\"\u003eThe Mystery Schools of Antiquity\u003c/h3\u003e\n\u003cp\u003eThe Black Sun doctrine originates in the mystery schools of the ancient world. The Egyptian mysteries, the Eleusinian mysteries of Greece, the Mithraic mysteries of Rome — all taught a version of the same principle: there is a hidden reality behind the visible world, accessible only to initiates who have undergone the proper rituals and attained the proper knowledge.\u003c/p\u003e\n\u003cp\u003eIn Egypt, the hidden sun was associated with Amen-Ra — the \"hidden\" (Amen) sun (Ra). The god's name literally means \"hidden light.\" When Christians say \"Amen\" at the end of prayers, they invoke — unknowingly — the name of the Egyptian hidden sun god. This is another example of the Jesuit strategy of absorption: take the pagan and dress it in Christian language, and the faithful will worship the old gods without knowing it.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed that the spiritual realm is structured in precisely the way the mystery schools describe: a hidden hierarchy behind the visible world, operating through principles that most humans cannot perceive. The difference is that Pittman identified this hierarchy as demonic, not divine. The \"illumination\" of the mystery schools is not enlightenment — it is deception. The Black Sun is not a source of truth. It is a source of lies dressed as wisdom.\u003c/p\u003e\n\u003ch3 id=\"the-knights-templar-and-the-hidden-sun\"\u003eThe Knights Templar and the Hidden Sun\u003c/h3\u003e\n\u003cp\u003eThe Knights Templar, founded in 1119, were ostensibly a Christian military order protecting pilgrims in the Holy Land. In reality, they became the first international banking system and the custodians of esoteric knowledge acquired during the Crusades.\u003c/p\u003e\n\u003cp\u003eWhen the Templars were suppressed in 1312, their knowledge and wealth did not disappear. It was absorbed by other orders, other institutions, other secret societies. The Jesuits, founded two centuries later, inherited much of the Templar tradition — the military structure, the financial acumen, the esoteric knowledge, and the Black Sun doctrine that the Templars had acquired from their contact with Middle Eastern mystery traditions.\u003c/p\u003e\n\u003cp\u003eThe Templar cross — a red cross on white background — is a solar symbol. The Jesuit IHS in its solar disc continues the same tradition. Both orders served as custodians of the Black Sun, maintaining the occult power structure through visible institutions that appeared Christian but operated according to principles far older than Christianity.\u003c/p\u003e\n\u003ch3 id=\"freemasonry-the-public-face-of-the-hidden-sun\"\u003eFreemasonry: The Public Face of the Hidden Sun\u003c/h3\u003e\n\u003cp\u003eFreemasonry, which emerged publicly in the 17th century, is the most widely known expression of the Black Sun tradition. Its rituals are structured around light and darkness. The initiate begins in darkness and progresses toward \"light\" through a series of degrees. This light is not Christ's light — it is the light of Lucifer, the light-bearer, the Morning Star whose name means \"bringer of light.\"\u003c/p\u003e\n\u003cp\u003eAlbert Pike, the 33rd-degree Mason and author of \u003cem\u003eMorals and Dogma\u003c/em\u003e, wrote: \"Lucifer, the Light-bearer! Strange and mysterious name to give to the Spirit of Darkness! Lucifer, the Son of the Morning! Is it he who bears the Light?\" Pike was not confused. He was describing the Black Sun — the dark light, the hidden illumination, the Luciferian enlightenment that Freemasonry offers its highest initiates.\u003c/p\u003e\n\u003cp\u003eThe Jesuits and the Freemasons have a complex relationship. Officially, the Catholic Church condemns Freemasonry. In practice, the two organizations share members, methods, and the Black Sun doctrine. The apparent conflict serves both organizations by creating the illusion of opposition while they work toward the same goals: the establishment of a global power structure governed by the initiated, illuminated by the hidden sun, and served by a population that remains in the outer darkness of ignorance.\u003c/p\u003e\n\u003ch2 id=\"the-black-sun-and-saturn\"\u003eThe Black Sun and Saturn\u003c/h2\u003e\n\u003ch3 id=\"the-dark-star\"\u003eThe Dark Star\u003c/h3\u003e\n\u003cp\u003eSaturn, the sixth planet from the sun, is the darkest of the visible planets. In ancient astrology, Saturn was the greater malefic — the planet of limitation, restriction, death, and time. Saturn's day is Saturday. Saturn's color is black. Saturn's metal is lead — the heaviest, densest, most earthbound of the traditional metals.\u003c/p\u003e\n\u003cp\u003eThe Black Sun and Saturn are intimately connected in the occult tradition. The Black Sun is Saturn's sun — the hidden star that illuminates the material prison, the occult source of power that governs the physical world. To worship the Black Sun is to worship Saturn's hidden aspect — not the visible planet but the invisible principle it represents: the confinement of spirit in matter, the rule of time over eternity, the supremacy of the material over the spiritual.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, as custodians of both the Saturn cult and the Black Sun tradition, bridge these two streams of occult symbolism. Their governance of \"all the world\" (Tamburini's boast) is Saturn governance — governance through limitation, control, and the binding of human consciousness to the material plane. Their hidden authority (the Black Pope behind the white) is Black Sun governance — governance through invisible power, occult knowledge, and the manipulation of visible institutions from the shadows.\u003c/p\u003e\n\u003ch3 id=\"the-saturn-matrix\"\u003eThe Saturn Matrix\u003c/h3\u003e\n\u003cp\u003eAgent131711's Substack research describes what might be called the Saturn Matrix — the total system of control that operates through every human institution: government, religion, education, media, finance. This system is illuminated by the Black Sun — powered by hidden knowledge, operated by hidden hands, serving hidden purposes.\u003c/p\u003e\n\u003cp\u003eThe average person lives entirely within this matrix. They are educated in Jesuit-designed institutions, informed by intelligence-linked media, governed by compromised politicians, employed in cube-shaped offices, entertained by Saturn-symbol-saturated media, and worshipping in churches that serve the institutional Christ rather than the scriptural one. At no point do they encounter the truth. The Black Sun illuminates everything they see, but since they do not know it exists, they believe they are seeing by ordinary light.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's message is that this matrix has eternal consequences. The 97.5 percent rejection rate is the harvest of the Saturn Matrix — the spiritual result of lives lived entirely within a system designed to prevent genuine connection with God. The words people speak (Matthew 12:36-37) within this system carry weight — and most of those words are shaped by the system itself, not by truth.\u003c/p\u003e\n\u003ch2 id=\"breaking-through\"\u003eBreaking Through\u003c/h2\u003e\n\u003ch3 id=\"recognizing-the-black-suns-light\"\u003eRecognizing the Black Sun's Light\u003c/h3\u003e\n\u003cp\u003eThe Black Sun's greatest trick is making its light appear natural. The information that shapes your worldview, the traditions that structure your year, the institutions that employ you, the entertainment that occupies your leisure — all are illuminated by the Black Sun, and all appear normal because you have never known anything else.\u003c/p\u003e\n\u003cp\u003eRecognition begins with anomaly. When something does not fit — when a holiday's symbolism contradicts its stated purpose, when an institution's behavior contradicts its stated values, when a tradition's origins contradict its claimed meaning — you have found a point where the Black Sun's light fails to conceal the truth. These anomalies are everywhere, for anyone willing to look.\u003c/p\u003e\n\u003ch3 id=\"the-true-light\"\u003eThe True Light\u003c/h3\u003e\n\u003cp\u003eAgainst the Black Sun stands the true light — not the institutional light of organized religion (which is itself part of the Black Sun system) but the spiritual light described in scripture: \u003cem\u003e\"In him was life; and the life was the light of men. And the light shineth in darkness; and the darkness comprehended it not\"\u003c/em\u003e (John 1:4-5).\u003c/p\u003e\n\u003cp\u003eThis light is not hidden. It is not reserved for initiates. It does not require degrees, rituals, or oaths. It requires only truth — the willingness to see what is there, to reject what is false, and to follow the narrow path regardless of where it leads and what it costs.\u003c/p\u003e\n\u003cp\u003eThe Black Sun system offers power, knowledge, and community — but at the cost of the soul. The true light offers nothing the world values — no power, no wealth, no prestige — but everything the soul needs. The choice between them is the choice that 97.5 percent fail to make correctly.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003e
