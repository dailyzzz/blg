eceive forgiveness of sins, and inheritance among them which are sanctified by faith that is in me.\"\u003c/em\u003e — Acts 26:18\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe apostle Paul received this commission directly from the risen Christ on the road to Damascus. The language is precise. It does not say \"to educate them\" or \"to reform them\" or \"to invite them to church.\" It says to OPEN THEIR EYES. To TURN them. From DARKNESS to LIGHT. From the POWER OF SATAN unto GOD. This is not metaphor. This is not religious poetry. This is the description of a transfer of allegiance — from one kingdom to another, from one master to another, from one spiritual reality to another.\u003c/p\u003e\n\u003cp\u003eJohn Ramirez lived on the dark side of that equation for over twenty-five years. He did not dabble in the occult. He did not experiment with Ouija boards at a slumber party. He was raised, trained, and commissioned as a high-ranking servant of Satan — a devil worshipper with a direct contract, operating under the authority of principality demons, executing assignments against the church, against families, against individuals who represented Jesus Christ. His testimony is not a cautionary tale about curiosity gone wrong. It is a firsthand intelligence report from behind enemy lines.\u003c/p\u003e\n\u003cp\u003eHoward Pittman saw the demonic hierarchy from above — five tiers of demons organized in military precision, principalities at the top, ordinary demons at the bottom. John Ramirez operated within that hierarchy from below. He answered to principalities. He carried out their orders. He was one of the weapons in their arsenal. When these two testimonies are laid side by side, the picture that emerges is terrifying in its consistency: the spiritual war is real, it is organized, and the church is losing.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Fallen Angels — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"born-into-darkness-the-south-bronx\"\u003eBorn Into Darkness: The South Bronx\u003c/h2\u003e\n\u003ch3 id=\"a-family-of-witches-and-warlocks\"\u003eA Family of Witches and Warlocks\u003c/h3\u003e\n\u003cp\u003eJohn Ramirez did not choose the occult. The occult chose him. He was born into it — literally. He grew up in the South Bronx, one of the most dangerous neighborhoods in America. Poverty, violence, drugs, and despair were the fabric of daily life. But beneath the visible decay of the streets, something far darker was at work.\u003c/p\u003e\n\u003cp\u003eHis ENTIRE father's side of the family consisted of witches and warlocks. This was not a casual interest. This was not folk religion or cultural superstition. They had what Ramirez describes as \"a direct contract with the devil himself.\" A generational covenant. A bloodline agreement. The family did not merely believe in the devil — they served him, worshipped him, and received power from him in exchange for their allegiance.\u003c/p\u003e\n\u003cp\u003eThis is a critical point that most Christians fail to understand. The devil does not operate on belief alone. He operates on contracts. On covenants. On binding agreements sealed in blood. When Ramirez says his family had a \"direct contract with the devil,\" he is describing a spiritual transaction — authority and power given in exchange for worship and obedience. The same transactional structure that God uses with His people, the devil counterfeits with his.\u003c/p\u003e\n\u003ch3 id=\"watching-his-father-worship-the-devil\"\u003eWatching His Father Worship the Devil\u003c/h3\u003e\n\u003cp\u003eAt eight or nine years old, John Ramirez witnessed something that would mark him for the rest of his life. He watched his father worship the devil in a room of the house — from 7 PM to 5 AM. Ten hours of unbroken demonic devotion.\u003c/p\u003e\n\u003cp\u003eHis father spoke in demonic tongues — not the tongues of the Holy Spirit described in Acts 2, but the counterfeit version, the language of fallen spirits. He pulled flowers. He lit candles. He poured water. Every action was ritualistic, deliberate, and saturated with demonic protocol. There was a specific order to the worship. Specific words. Specific gestures. The devil demands precision from his servants, just as God demanded precision in the tabernacle rituals of the Old Testament.\u003c/p\u003e\n\u003cp\u003eA child watching this would be marked in one of two directions — either repelled toward the light or drawn deeper into the darkness. For Ramirez, surrounded by a family that normalized this practice, immersed in a culture that provided no alternative, the path was set. He was being drawn in. He was being prepared. He was being groomed.\u003c/p\u003e\n\u003ch3 id=\"training-under-master-witches\"\u003eTraining Under Master Witches\u003c/h3\u003e\n\u003cp\u003eThe training began early and it was relentless. Ramirez was not learning from amateurs. The witches who trained him had been practicing for thirty, forty, fifty or more years. These were people who had spent decades perfecting their craft, deepening their relationship with demonic entities, and climbing the hierarchy of Satan's kingdom.\u003c/p\u003e\n\u003cp\u003eThe training was structured. It had levels. You did not begin by speaking to the devil. You had to earn the right. First, you learned to communicate with lower-ranking spirits. Then you progressed to more powerful entities. Then to principality spirits — the rulers of the demonic hierarchy that Pittman described. Only after years of proven service and demonstrated loyalty could you speak directly to the devil himself.\u003c/p\u003e\n\u003cp\u003eThis structure mirrors military training. A new recruit does not begin by meeting the general. He starts at the bottom, proves himself, advances through the ranks, and earns access to higher levels of authority. Satan's kingdom is organized. It is disciplined. It is hierarchical. And it takes the development of its soldiers far more seriously than most churches take the development of their believers.\u003c/p\u003e\n\u003ch2 id=\"the-first-contract-a-voodoo-necklace\"\u003eThe First Contract: A Voodoo Necklace\u003c/h2\u003e\n\u003ch3 id=\"age-ten--the-recruitment\"\u003eAge Ten — The Recruitment\u003c/h3\u003e\n\u003cp\u003eAt age ten, Ramirez found a voodoo necklace at school. This was not an accident. In the spiritual realm, there are no coincidences. That necklace was placed in his path by design — a demonic appointment orchestrated by the principalities that had been watching him since birth.\u003c/p\u003e\n\u003cp\u003eThis necklace became his \"first contract with the devil.\" The first personal covenant. The family covenant already existed through his bloodline, but this was his own agreement — his own step into the darkness, his own willingness to receive what the devil was offering.\u003c/p\u003e\n\u003cp\u003eA tarot card reader — a witch — saw him and declared: \"This boy, we want him.\" The word \"we\" is significant. She was not speaking for herself. She was not speaking for a group of humans. She was speaking for the demonic entities she served. The principalities had identified John Ramirez as a high-value recruit. They wanted him. They had plans for him. And they moved their human agents into position to acquire him.\u003c/p\u003e\n\u003ch3 id=\"five-principality-demons-assigned\"\u003eFive Principality Demons Assigned\u003c/h3\u003e\n\u003cp\u003eFive of the worst principality demons were placed on Ramirez as \"spiritual guides\" and \"guardian angels.\" This is the devil's counterfeit of the Holy Spirit's indwelling and the ministry of angels described in Hebrews 1:14. Where God sends the Holy Spirit to guide, comfort, and empower believers, Satan assigns principality demons to guide, empower, and control his servants.\u003c/p\u003e\n\u003cp\u003eThese were not low-ranking spirits. These were principalities — the top tier of the demonic hierarchy. Howard Pittman described this tier as the commanding level, the generals of Satan's army. For five of them to be assigned to a single ten-year-old boy indicates how valuable Ramirez was to the kingdom of darkness, and how significant his eventual defection would be.\u003c/p\u003e\n\u003cp\u003eThe demons functioned as constant companions. They informed him. They directed him. They gave him supernatural knowledge and ability. They were, in every functional sense, his \"spiritual life\" — the dark mirror of what the Holy Spirit is to a genuine believer. Where the Spirit leads into truth, these principalities led into deeper deception. Where the Spirit produces love, joy, and peace, these entities produced power, fear, and destruction.\u003c/p\u003e\n\u003ch2 id=\"astral-projection-and-spiritual-warfare\"\u003eAstral Projection and Spiritual Warfare\u003c/h2\u003e\n\u003ch3 id=\"leaving-the-body-to-curse-neighborhoods\"\u003eLeaving the Body to Curse Neighborhoods\u003c/h3\u003e\n\u003cp\u003eBy the time Ramirez was thirteen to sixteen years old, he was astral projecting — leaving his physical body and operating in the spiritual realm. This is not science fiction. This is not imagination. This is a spiritual reality that the Bible acknowledges. Paul himself described being caught up to the third heaven, \"whether in the body or out of the body, I do not know\" (2 Corinthians 12:2-3). The capacity to operate outside the physical body is real. The devil simply counterfeits it for his own purposes.\u003c/p\u003e\n\u003cp\u003eDuring these astral projections, Ramirez was not sightseeing. He was on assignment. He cursed entire neighborhoods. He placed spirits of prostitution on communities. Spirits of drug addiction. Spirits of homosexuality. Spirits of murder. Spirits of suicide. Each assignment was specific. Each spirit had a specific function. And each deployment was designed to destroy the people and communities that God loved.\u003c/p\u003e\n\u003cp\u003eThis is the reality behind what many people dismiss as \"social problems.\" When an entire neighborhood descends into violence, addiction, and sexual chaos, secular observers blame economics, education, or systemic inequality. But Ramirez reveals the invisible layer beneath the visible — the demonic operatives who are actively placing spirits of destruction on communities, families, and individuals. The social problems are real. But the cause is spiritual.\u003c/p\u003e\n\u003ch3 id=\"born-into-hospitals--placing-death-in-icu-rooms\"\u003eBorn Into Hospitals — Placing Death in ICU Rooms\u003c/h3\u003e\n\u003cp\u003eBy fifteen or sixteen, Ramirez had advanced to an even darker assignment. He describes being \"born into hospitals\" — entering medical facilities in the spirit to place death on patients. Specifically, he targeted ICU rooms, where the most vulnerable patients lay hovering between life and death.\u003c/p\u003e\n\u003cp\u003eThis testimony should shake every Christian who has ever prayed for a sick loved one. While you were praying for healing, a devil worshipper may have been in the spiritual realm placing death on your family member. While you were trusting God for a miracle, a servant of Satan was executing an assignment to ensure that miracle never came.\u003c/p\u003e\n\u003cp\u003eThe question is not whether this happens. Ramirez confirms that it does. The question is whether your prayers have enough power to overcome it. And the answer, for most Christians, according to both Ramirez and Pittman, is devastating: they do not. Because most Christians do not pray with authority. They pray with hope. And hope, without the power of a genuine relationship with Christ, is not enough to overcome a principality demon on assignment.\u003c/p\u003e\n\u003ch2 id=\"the-wall-of-fire-encountering-christians-who-were-real\"\u003eThe Wall of Fire: Encountering Christians Who Were Real\u003c/h2\u003e\n\u003ch3 id=\"nicky-cruzs-youth-group\"\u003eNicky Cruz's Youth Group\u003c/h3\u003e\n\u003cp\u003eIn the midst of his years of devil worship, Ramirez encountered something he could not explain and could not overcome. He came across a Christian youth group in a schoolyard — a group connected to the ministry of Nicky Cruz, the former gang leader whose conversion is documented in the book \"The Cross and the Switchblade.\"\u003c/p\u003e\n\u003cp\u003eRamirez attempted to attack them. He was a high-ranking servant of Satan, empowered by five principality demons, trained by master witches, experienced in spiritual warfare. These were just kids. Christian kids. They should have been easy targets.\u003c/p\u003e\n\u003cp\u003eBut there was a \"wall of fire\" protecting them. Something pushed Ramirez back. He could not touch them. He could not penetrate their spiritual covering. The power that protected those young Christians was greater than the power of the five principalities that empowered Ramirez.\u003c/p\u003e\n\u003cp\u003eThis is the critical distinction that runs through every testimony we have examined. There is a difference between Christians who have a REAL relationship with Jesus Christ and Christians who have a religious routine. The youth group was covered. They were protected. The wall of fire was real. Not every Christian has this covering. But these did. And even a high-ranking devil worshipper could not break through it.\u003c/p\u003e\n\u003ch3 id=\"the-power-of-genuine-love\"\u003eThe Power of Genuine Love\u003c/h3\u003e\n\u003cp\u003eWhat ultimately broke through Ramirez's defenses was not a theological argument. It was not a tract or a sermon or a worship song. It was love — genuine, unconditional, supernatural love. The kind of love he had never experienced in his entire life. Not from his family of witches and warlocks. Not from the devil who was his \"daddy.\" Not from the principality demons who were his \"spiritual guides.\"\u003c/p\u003e\n\u003cp\u003eThe love of Christ, flowing through genuine believers, reached a place in Ramirez that the devil had never been able to fill. For all the power the devil gave him — the astral projection, the ability to place spirits, the authority over demons — the devil never gave him love. The devil cannot give what he does not have. And love is the one currency of heaven that hell cannot counterfeit.\u003c/p\u003e\n\u003cp\u003eThis is why 1 Corinthians 13 places love above every other spiritual gift. Prophecy will cease. Tongues will cease. Knowledge will pass away. But love never fails. It was love that breached the walls of a devil worshipper's fortress. It was love that turned the darkness to light. And it was love that fulfilled the commission of Acts 26:18 — opening his eyes and turning him from the power of Satan unto God.\u003c/p\u003e\n\u003ch2 id=\"the-deliverance\"\u003eThe Deliverance\u003c/h2\u003e\n\u003ch3 id=\"coming-to-christ\"\u003eComing to Christ\u003c/h3\u003e\n\u003cp\u003eJohn Ramirez's conversion was not a casual decision. It was a war. When a high-ranking servant of Satan defects to the kingdom of God, the spiritual consequences are massive. Principalities that had invested decades in his development were not going to release him quietly. The battle for his soul was fought on multiple fronts — in the spiritual realm and in the physical, in his mind and in his body, in his relationships and in his circumstances.\u003c/p\u003e\n\u003cp\u003eBut the blood of Jesus Christ is sufficient. It is sufficient to break every contract. Every covenant. Every generational curse. Every demonic assignment. The blood that was shed on Calvary has authority over every principality, every power, every ruler of the darkness of this world, and every spiritual wickedness in high places (Ephesians 6:12). Ramirez discovered that the blood of Jesus did what decades of devil worship could not — it set him free.\u003c/p\u003e\n\u003cp\u003eHis deliverance was complete. The five principality demons that had served as his \"spiritual guides\" were cast out. The contracts were broken. The generational covenant was annulled. The man who had been born into darkness was born again into light. The fulfillment of Acts 26:18 — from darkness to light, from the power of Satan unto God.\u003c/p\u003e\n\u003ch3 id=\"the-intelligence-he-brought-with-him\"\u003eThe Intelligence He Brought With Him\u003c/h3\u003e\n\u003cp\u003eWhat makes Ramirez's testimony uniquely valuable is not merely the drama of his conversion but the intelligence he brought with him from the enemy's camp. He knows how the devil operates. He knows the hierarchy. He knows the assignments. He knows which Christians are vulnerable and which are protected. He knows why most churches are defenseless and why most believers are easy targets.\u003c/p\u003e\n\u003cp\u003eThis intelligence is not theoretical. It is operational. It comes from twenty-five years of service in the enemy's ranks. When Ramirez says that most Christians cannot pray for even one hour while he prayed to the devil all night long, he is not offering a spiritual opinion. He is reporting a tactical assessment from the front lines of a war that most Christians do not even know they are fighting.\u003c/p\u003e\n\u003cp\u003eThe church would do well to listen to this intelligence. Not to glorify the devil. Not to sensationalize the occult. But to understand the enemy, his methods, his organization, and his targets — so that the body of Christ can finally mount an effective defense and fulfill the commission that Jesus gave: to open eyes, to turn people from darkness to light, and to deliver them from the power of Satan unto God.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Fallen Angels — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Hosts — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/en/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Darkness Into Light — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/89-The_Serpent_Crusher.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent Crusher — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/church-asleep-three-witnesses-alarm/?lang=en\"\u003eThe Church Asleep: Three Witnesses Sound the Alarm\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/contract-with-devil-witchcraft-america/?lang=en\"\u003eA Contract With the Devil: How Witchcraft Operates in America Today\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/why-satan-doesnt-fear-most-christians/?lang=en\"\u003eWhy Satan Doesn't Fear Most Christians: A Devil Worshipper's Confession\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/placebo-church-satan-false-religion/?lang=en\"\u003ePLACEBO: How Satan Invented a Religion to Fool the Church\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eJohn Ramirez walked out of the deepest darkness the devil could construct and into the light of Jesus Christ. His testimony is not entertainment. It is evidence. Evidence that the spiritual realm is more real than the natural. Evidence that the devil recruits, trains, and deploys human agents against the church. Evidence that most Christians are unprotected. And evidence that the blood of Jesus Christ is still powerful enough to break every chain, cancel every contract, and deliver every soul — no matter how deeply entangled in the kingdom of darkness. The question is not whether the war is real. Ramirez settled that. The question is whether you are ready to fight it.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"c
