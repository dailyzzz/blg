ents one of the most disturbing intersections of cult activity, child exploitation, and government protection in American history. What began as a routine law enforcement encounter with disheveled children in a park led investigators into a labyrinth of intelligence connections, international trafficking networks, and a cover-up that reached the highest levels of the federal government. The case illustrates, with brutal clarity, the methods by which the principalities and powers of Ephesians 6:12 operate through human institutions to exploit the most vulnerable.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that demons work with terrifying organizational precision. Each demon is assigned a task, and each task serves a larger strategic objective. The Finders cult operated with exactly this kind of precision — a seemingly chaotic group that was, in reality, a tightly organized operation connected to intelligence networks spanning multiple countries. Pittman's revelation that 97.5% of humanity walks the broad road to destruction takes on specific meaning when we consider how many children were consumed by networks like The Finders while the institutions meant to protect them looked the other way — or actively facilitated the exploitation.\u003c/p\u003e\n\u003cp\u003eThe Jesuit model of operating through front organizations, maintaining strict internal hierarchy while presenting a benign external image, finds precise expression in The Finders. Catholic Confidential describes how the Jesuits operate \"cloaked with cunning,\" and The Finders were nothing if not cunning — a group that appeared to be an eccentric commune while functioning as something far more sinister. The tracks \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e reveal the spiritual architecture of deception that enables such operations.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-tallahassee-incident\"\u003eThe Tallahassee Incident\u003c/h2\u003e\n\u003ch3 id=\"two-men-and-six-children\"\u003eTwo Men and Six Children\u003c/h3\u003e\n\u003cp\u003eOn February 4, 1987, two well-dressed men were found in a park in Tallahassee, Florida with six disheveled, dirty children ranging in age from two to seven. The children showed signs of neglect — they were poorly clothed, hungry, and appeared unfamiliar with basic hygiene. Some showed signs of possible sexual abuse. The men, identified as Michael Houlihan and Douglas Ammerman, could not adequately explain their relationship to the children or why the children were in such condition.\u003c/p\u003e\n\u003cp\u003eTallahassee police took the men into custody and began an investigation. Initial inquiries revealed that the men were associated with a group called \"The Finders,\" based in Washington, D.C. The group was led by a man named Marion David Pettie, who had extensive connections to the intelligence community. The children's mothers were identified as members of The Finders community, but the circumstances of the children's transfer to Houlihan and Ammerman raised serious concerns about possible trafficking.\u003c/p\u003e\n\u003ch3 id=\"the-investigation-begins\"\u003eThe Investigation Begins\u003c/h3\u003e\n\u003cp\u003eThe Tallahassee police and the U.S. Customs Service initiated an investigation that would quickly encounter extraordinary resistance. Customs agent Ramon Martinez filed a detailed report documenting the investigation's findings and, more critically, the obstruction it faced. His report, classified for decades, was eventually released through Freedom of Information Act requests and confirmed what investigators had suspected: The Finders was connected to the Central Intelligence Agency, and the investigation was shut down on those grounds.\u003c/p\u003e\n\u003cp\u003eMartinez's report described the discovery of detailed instructions for obtaining children, including targeting women at specific locations, and documents relating to international travel with children. The investigation revealed connections to properties in multiple states and international locations. The scope of the operation far exceeded anything that could be attributed to a simple commune or alternative lifestyle group.\u003c/p\u003e\n\u003ch2 id=\"the-washington-dc-warehouse\"\u003eThe Washington D.C. Warehouse\u003c/h2\u003e\n\u003ch3 id=\"what-investigators-found\"\u003eWhat Investigators Found\u003c/h3\u003e\n\u003cp\u003eWhen investigators executed search warrants on Finders properties in Washington D.C., they discovered materials that transformed the investigation from a potential neglect case into something far more disturbing. Among the items found were:\u003c/p\u003e\n\u003cp\u003eDetailed records of international travel involving children to multiple countries. Photographs of adults and children participating in what appeared to be ritualistic activities, including the sacrifice of animals. Computer records containing detailed instructions for the procurement and management of children. Documents indicating connections to schools, daycare centers, and international organizations. Correspondence suggesting coordination with entities in multiple countries.\u003c/p\u003e\n\u003cp\u003eThe warehouse contained filing cabinets full of documents organized by topic, including files labeled with the names of various operations. The level of documentation was inconsistent with an informal commune — it was consistent with an organized intelligence operation maintaining detailed records of its activities.\u003c/p\u003e\n\u003ch3 id=\"the-customs-report\"\u003eThe Customs Report\u003c/h3\u003e\n\u003cp\u003eRamon Martinez's customs report, filed on February 7, 1987 and subsequently classified, described what investigators found and what happened next. According to the report, the investigation was progressing normally through law enforcement channels until the CIA connection was identified. At that point, the case was transferred from the U.S. Customs Service to the FBI — and effectively terminated.\u003c/p\u003e\n\u003cp\u003eMartinez wrote that he was told the case was \"a CIA internal matter\" and that the FBI would handle it from that point forward. The FBI's \"handling\" consisted of closing the investigation without prosecution. The children were returned to The Finders community. No charges were filed against any adult members of the group. The evidence gathered by Customs investigators was classified and sealed.\u003c/p\u003e\n\u003cp\u003eThe pattern was identical to every other investigation that encountered intelligence-connected child exploitation networks: initial discovery, rapid escalation, identification of intelligence connections, transfer to a compromised agency, and termination. The track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/127-Operation_Midnight_Climax.mp4\"\u003eOperation Midnight Climax\u003c/a\u003e documents how the CIA has historically used human exploitation as an operational tool, and The Finders case demonstrated that this methodology extended to the exploitation of children.\u003c/p\u003e\n\u003ch2 id=\"marion-david-pettie-the-man-behind-the-curtain\"\u003eMarion David Pettie: The Man Behind the Curtain\u003c/h2\u003e\n\u003ch3 id=\"intelligence-connections\"\u003eIntelligence Connections\u003c/h3\u003e\n\u003cp\u003eMarion David Pettie, the founder and leader of The Finders, had an intelligence background that stretched back decades. His connections to the CIA and military intelligence were not disputed — even his wife, who worked for the CIA, acknowledged the family's intelligence connections. Pettie himself described his group in terms that blurred the line between social experiment and intelligence operation.\u003c/p\u003e\n\u003cp\u003ePettie's father had intelligence connections, and Pettie himself had been involved with intelligence-adjacent organizations since the 1950s. The Finders' properties included a farm in rural Virginia where members lived communally and children were raised outside conventional structures. The farm's location, its isolation, and its organized security measures were more consistent with an intelligence facility than a hippie commune.\u003c/p\u003e\n\u003cp\u003ePettie's leadership style mirrored the Jesuit model of governance. He exercised absolute authority over The Finders community while maintaining a deliberately eccentric public persona. Members were assigned tasks, travels, and activities according to Pettie's directives. The group's resources — multiple properties in Washington D.C. and Virginia, extensive international travel capabilities, sophisticated communications equipment — exceeded what any genuine commune could sustain.\u003c/p\u003e\n\u003ch3 id=\"the-cult-structure\"\u003eThe Cult Structure\u003c/h3\u003e\n\u003cp\u003eThe Finders operated as a structured organization with clear hierarchy, assigned roles, and a philosophy that explicitly rejected conventional morality. Children within the group were not raised by their biological parents but were treated as communal property — raised collectively according to principles established by Pettie. This detachment of children from parental bonds is characteristic of cult programming and consistent with the conditioning techniques used in intelligence-related mind control programs.\u003c/p\u003e\n\u003cp\u003eFormer members described a group that controlled every aspect of members' lives — their work, their relationships, their finances, and their children. This total control is the hallmark of both destructive cults and intelligence operations, and in The Finders, the two were indistinguishable. The Jesuit requirement of blind obedience, documented in Catholic Confidential, found its secular expression in The Finders' demand for absolute submission to Pettie's authority.\u003c/p\u003e\n\u003ch2 id=\"declassified-documents-what-the-government-knew\"\u003eDeclassified Documents: What the Government Knew\u003c/h2\u003e\n\u003ch3 id=\"the-2019-release\"\u003eThe 2019 Release\u003c/h3\u003e\n\u003cp\u003eIn 2019, the FBI released a significant cache of documents related to The Finders through the FBI Vault. These documents, totaling hundreds of pages, confirmed much of what investigators and researchers had alleged for decades: that The Finders was connected to intelligence operations, that children within the group were subjected to abuse, and that the investigation was deliberately suppressed.\u003c/p\u003e\n\u003cp\u003eThe released documents included police reports, customs reports, internal FBI memoranda, and investigative summaries that painted a picture of a group operating with intelligence community protection. Photographs recovered during searches showed children in disturbing situations. Documents described rituals involving animals and children. Correspondence revealed connections to international organizations and foreign governments.\u003c/p\u003e\n\u003cp\u003eThe release of these documents decades after the events they described confirmed a pattern that Howard Pittman's testimony illuminates spiritually: the truth is suppressed not permanently but strategically, released when it can no longer threaten the operational networks it would have exposed. The demons Pittman witnessed operate on timelines that extend far beyond human perception — decades of suppression are merely tactical delays in a war that spans millennia.\u003c/p\u003e\n\u003ch3 id=\"what-was-still-redacted\"\u003eWhat Was Still Redacted\u003c/h3\u003e\n\u003cp\u003eDespite the 2019 release, significant portions of The Finders documents remained redacted. The names of CIA personnel connected to the group, specific operational details, and information about international connections were blacked out. The redactions themselves told a story — they identified the areas that remained sensitive enough to protect even decades after the investigation was closed.\u003c/p\u003e\n\u003cp\u003eThe selective nature of the release — enough to confirm the broad outlines of the story while protecting specific identities and operations — is characteristic of intelligence community document management. Information is released when it serves a purpose (often to defuse building pressure for full disclosure) and withheld when it threatens ongoing operations or living operatives. The track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/211-Total_Information_Awareness.mp4\"\u003eTotal Information Awareness\u003c/a\u003e explores how information itself is weaponized by those who control its flow.\u003c/p\u003e\n\u003ch2 id=\"the-international-dimension\"\u003eThe International Dimension\u003c/h2\u003e\n\u003ch3 id=\"global-network\"\u003eGlobal Network\u003c/h3\u003e\n\u003cp\u003eThe Finders' operations were not confined to the United States. Documents revealed connections to operations in multiple countries, including travel to China, Hong Kong, Japan, and various European nations. The group's international reach was inconsistent with its public profile as a small communal group and entirely consistent with its actual nature as an intelligence-connected operation.\u003c/p\u003e\n\u003cp\u003eThe international dimension of The Finders case parallels the global reach of other intelligence-connected exploitation networks. The same infrastructure that enables intelligence agencies to operate across national boundaries — diplomatic cover, secure communications, international financial networks, and cooperative relationships with foreign intelligence services — enables the exploitation networks that operate alongside them.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order's global presence provides the organizational template for these networks. Operating in every country on earth, maintaining communications and coordination across national boundaries, and exercising authority that transcends secular governance, the Jesuit order demonstrated centuries ago that global operations could be conducted from a single center of authority. Tamburini's boast about governing \"not only to Paris but to China\" described an operational capability that modern intelligence agencies replicated — and that exploitation networks exploited.\u003c/p\u003e\n\u003ch3 id=\"the-protection-mechanism\"\u003eThe Protection Mechanism\u003c/h3\u003e\n\u003cp\u003eThe Finders case demonstrated that the protection of intelligence-connected exploitation networks operates at an international level. When investigators in Tallahassee attempted to pursue the case, they encountered not only domestic obstruction but international barriers. Information about the group's overseas activities was classified under national security provisions, and cooperation with foreign law enforcement was blocked by intelligence community intervention.\u003c/p\u003e\n\u003cp\u003eThis international protection mechanism ensures that no single national investigation can fully expose a global network. Evidence gathered in one country is classified in another. Witnesses who cross borders can be silenced by different agencies in different jurisdictions. The compartmentalization that characterizes intelligence operations — need-to-know access, classified programs, interagency barriers — also protects exploitation networks by preventing any single investigator or agency from assembling the complete picture.\u003c/p\u003e\n\u003ch2 id=\"the-children-forgotten-victims\"\u003eThe Children: Forgotten Victims\u003c/h2\u003e\n\u003ch3 id=\"what-happened-to-them\"\u003eWhat Happened to Them\u003c/h3\u003e\n\u003cp\u003eThe most disturbing aspect of The Finders case is what happened — or did not happen — after the investigation was closed. The children found in Tallahassee were returned to The Finders community. No welfare check was mandated. No ongoing monitoring was established. The children who investigators believed had been abused were handed back to the group that had abused them, with the blessing of the federal government.\u003c/p\u003e\n\u003cp\u003eThe fate of these children and others associated with The Finders remains largely unknown. Some former members have come forward with accounts of their experiences, but the group's secrecy and the government's refusal to investigate have ensured that the full scope of what happened to children within The Finders has never been documented.\u003c/p\u003e\n\u003cp\u003eThis outcome — the return of children to their abusers with government approval — represents the most complete possible failure of every institution designed to protect children. Law enforcement identified abuse. The courts had jurisdiction. Social services had a mandate. And every institution failed because the intelligence community declared the matter to be its own. The children were sacrificed on the altar of national security — or, more accurately, on the altar of the networks that hide behind national security.\u003c/p\u003e\n\u003ch3 id=\"the-spiritual-significance\"\u003eThe Spiritual Significance\u003c/h3\u003e\n\u003cp\u003eThe sacrifice of children is not merely a crime — it is a spiritual act. Throughout Scripture, the sacrifice of children to false gods represents the most extreme form of apostasy. The modern version of this sacrifice — conducted not on stone altars but in warehouses, safe houses, and government-protected facilities — carries the same spiritual weight. Each child abused, each innocence destroyed, each life corrupted represents a transaction in the spiritual economy of the second heaven.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony makes clear that the spiritual realm records everything. The demons assigned to operations like The Finders do not merely observe — they participate, they empower, and they feed on the suffering produced. The human operators may not fully understand the spiritual dimensions of their activities, but the demonic hierarchy that directs those activities understands perfectly. The destruction of innocence is their currency, and operations like The Finders are their banks.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e traces the origin of this spiritual corruption — the first transgression that introduced evil into the created order and established the pattern of rebellion against God that every subsequent act of evil follows. The Finders case is not an isolated incident; it is one manifestation of a transgression that has been unfolding since the beginning of human history.\u003c/p\u003e\n\u003ch2 id=\"why-it-matters-now\"\u003eWhy It Matters Now\u003c/h2\u003e\n\u003ch3 id=\"the-pattern-continues\"\u003eThe Pattern Continues\u003c/h3\u003e\n\u003cp\u003eThe Finders case is not merely a historical curiosity. The patterns it revealed — intelligence-connected exploitation networks, government suppression of investigations, ritual abuse of children, international trafficking protected by national security classifications — continue to operate. The Jeffrey Epstein case, which surfaced decades later, displayed identical features: intelligence connections, international scope, protection of the operator for decades, and eventual exposure that was carefully managed to protect the network while sacrificing the individual.\u003c/p\u003e\n\u003cp\u003eUnderstanding The Finders is essential to understanding the present because the infrastructure that protected The Finders has not been dismantled. It has evolved, adapted to new technologies and new political environments, but its fundamental nature remains unchanged. The principalities and powers that empowered The Finders are the same principalities and powers that empower their successors.\u003c/p\u003e\n\u003cp\u003eJohn Adams's warning about the Jesuits — that they \"merited eternal damnation on earth and in hell\" — applies not merely to the religious order but to the entire system of control that operates through deception, exploitation, and the corruption of institutions. The Finders were one node in that system. Understanding them illuminates the whole.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"The Finders Exposed,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/127-Operation_Midnight_Climax.mp4\"\u003eOperation Midnight Climax\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/211-Total_Information_Awareness.mp4\"\u003eTotal Information Awareness\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pedophiles-infiltrated-government-part1/?lang=en\"\u003eHow Pedophiles Infiltrated the United States Government Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/evil-secrets-psychology-family-court/?lang=en\"\u003eEvil Secrets of the Psychology Industry and Family Court System\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/judges-presidents-priests-trafficking-part3/?lang=en\"\u003eJudges, Presidents, Priests: Human Trafficking Network Part 3\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe Finders were not a mystery cult — they were a government-connected exploitation operation that was shielded from investigation by the intelligence community. The declassified documents confirm what investigators knew from the beginning: children were being used, abused, and trafficked by a group that operated under CIA protection. The case was closed not because the evidence was insufficient but because the evidence led to places the government could not allow the public to see. Behind the cover-up stands the same spiritual architecture that has protected the exploitation of innocence since the beginning — the principalities and powers that rule in the darkness, operating through human institutions that have been surrendered to their control.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"chi
