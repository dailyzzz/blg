hoboam inherited the throne of Israel, the people came to him and asked that he lighten the heavy yoke his father Solomon had placed upon them. Rehoboam consulted the elders, who advised him to serve the people. He rejected their counsel. He consulted his young advisors, who told him to make the yoke heavier. He followed the young men's advice, declared that his little finger was thicker than his father's loins, and promised to add scorpions to the whips.\u003c/p\u003e\n\u003cp\u003eThe kingdom split in two. Ten tribes departed under Jeroboam, and only Judah and Benjamin remained loyal to Rehoboam. The king who rejected the counsel of the wise and doubled down on tyranny lost the majority of his kingdom.\u003c/p\u003e\n\u003cp\u003eAs the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e reveals, the adversary's most effective disguise is the appearance of moral authority — the claim to be protecting the people while oppressing them, the insistence on following \"the science\" while suppressing the scientists who disagree.\u003c/p\u003e\n\u003cp\u003eGavin Newsom has chosen to defy the CDC's updated guidance. He has chosen to make the yoke heavier. And the majority of Americans have chosen the other path.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"newsoms-defiance\"\u003eNewsom's Defiance\u003c/h2\u003e\n\u003cp\u003eCalifornia Governor Gavin Newsom announced that the state of California would not follow the CDC's updated guidance on COVID-19 vaccination and public health protocols. Instead, California would maintain its existing policies — policies that reflect the pre-reform CDC's recommendations and the pharmaceutical industry's preferred approach to public health.\u003c/p\u003e\n\u003cp\u003eNewsom's defiance encompasses several specific policy areas:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVaccination recommendations:\u003c/strong\u003e While the reformed CDC has updated its guidance to reflect new safety data and risk-benefit analyses, California continues to follow the prior recommendations, maintaining aggressive vaccination promotion for all age groups.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSchool vaccination requirements:\u003c/strong\u003e California maintains its stringent school-entry vaccination requirements, including provisions that were expanded during the COVID-19 pandemic.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHealthcare worker mandates:\u003c/strong\u003e California continues to enforce vaccination requirements for healthcare workers in state-regulated facilities.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePublic health messaging:\u003c/strong\u003e California's Department of Public Health continues to promote COVID-19 vaccination using messaging that reflects the pre-reform CDC's positions, including characterizations of updated federal guidance as \"politically motivated.\"\u003c/p\u003e\n\u003ch3 id=\"the-political-calculation\"\u003eThe Political Calculation\u003c/h3\u003e\n\u003cp\u003eNewsom's defiance is, at its foundation, a political calculation. California's pharmaceutical industry — headquartered in the biotech corridors of San Francisco, San Diego, and Los Angeles — represents one of the state's largest economic sectors and one of the governor's most significant donor constituencies.\u003c/p\u003e\n\u003cp\u003eKaren Kingston has documented in The Kingston Report (karenkingston.substack.com) that California's political leadership has the deepest financial ties to the pharmaceutical industry of any state government. \"California is not defying the CDC to protect public health,\" Kingston has written. \"It is defying the CDC to protect pharmaceutical revenue. The state's biotech industry — Gilead, Amgen, Genentech, Illumina, and dozens of smaller firms — depends on a regulatory environment that promotes pharmaceutical products without questioning their safety. Newsom's defiance is a service to his donors, not his constituents.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-americans-actually-think\"\u003eWhat Americans Actually Think\u003c/h2\u003e\n\u003cp\u003eThe most significant dimension of Newsom's defiance is that it contradicts the expressed views of the American public. Polling data consistently shows that the majority of Americans now support:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReform of federal health agencies:\u003c/strong\u003e Over 60% of Americans believe the CDC, FDA, and NIH need fundamental reform to address conflicts of interest and restore public trust.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTransparency in vaccine safety data:\u003c/strong\u003e Over 70% of Americans believe that all clinical trial data for vaccines should be publicly available, including data that pharmaceutical companies have sought to keep confidential.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAn end to vaccine mandates:\u003c/strong\u003e Over 55% of Americans oppose government or employer vaccine mandates, a dramatic shift from the pandemic period when slim majorities supported them.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInvestigation of COVID-19 origins:\u003c/strong\u003e Over 65% of Americans believe the federal government should fully investigate the origins of COVID-19, including the possibility of a laboratory leak.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAccountability for pharmaceutical companies:\u003c/strong\u003e Over 50% of Americans believe pharmaceutical companies should face legal accountability for COVID-19 vaccine injuries, including modification of the PREP Act liability shield.\u003c/p\u003e\n\u003cp\u003eThese numbers represent a seismic shift in American public opinion. During the height of the pandemic, the CDC was one of the most trusted institutions in American public life. Today, trust in the CDC has collapsed to historic lows — and the public overwhelmingly supports the reforms that Newsom opposes.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-state-vs-federal-conflict\"\u003eThe State vs. Federal Conflict\u003c/h2\u003e\n\u003cp\u003eNewsom's defiance sets up a constitutional conflict between state and federal health authority. Under the Tenth Amendment, states retain broad police powers over public health within their borders. However, the Supremacy Clause establishes that federal law — and the actions of federal agencies operating under federal statutory authority — supersedes conflicting state law.\u003c/p\u003e\n\u003cp\u003eThe resolution of this conflict depends on the specific mechanisms involved. The CDC's recommendations are not, in themselves, legally binding. They become binding when adopted by state legislatures, state health departments, or when tied to federal funding conditions. If the federal government conditions federal healthcare funding (Medicaid, Medicare, CHIP) on compliance with updated CDC guidance, California would face the choice between defiance and the loss of billions in federal healthcare dollars.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e documents how the tension between federal and state power has been a feature of the American system since its inception — and how that tension has consistently been exploited by powerful interests to maintain control regardless of which level of government they operate through.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-pharmakeia-state\"\u003eThe Pharmakeia State\u003c/h2\u003e\n\u003cp\u003eCalifornia's relationship with the pharmaceutical industry transcends normal political donation and lobbying patterns. The state has become, in effect, a subsidiary of the pharmaceutical industry:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSB 277 (2015):\u003c/strong\u003e California eliminated the personal belief exemption for childhood vaccination, becoming one of the strictest vaccination mandate states in the nation. The bill was championed by state senator Richard Pan, a physician who received significant campaign contributions from pharmaceutical companies.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAB 2098 (2022):\u003c/strong\u003e California passed a law designating the dissemination of \"misinformation\" about COVID-19 by licensed physicians as \"unprofessional conduct\" subject to disciplinary action, including license revocation. The law was later blocked by a federal court as a likely First Amendment violation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSB 866 (2022):\u003c/strong\u003e California allowed minors aged 12 and older to consent to vaccination without parental permission, removing one of the last safeguards between pharmaceutical companies and children.\u003c/p\u003e\n\u003cp\u003eKingston has characterized California as the \"Pharmakeia State\" — a jurisdiction in which pharmaceutical industry interests have been so thoroughly embedded in the legislative, regulatory, and political infrastructure that the state government functions as a pharmaceutical enforcement mechanism rather than a public health authority.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prophetic-parallel\"\u003eThe Prophetic Parallel\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Because thou sayest, I am rich, and increased with goods, and have need of nothing; and knowest not that thou art wretched, and miserable, and poor, and blind, and naked.\" — Revelation 3:17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe church at Laodicea believed it was prosperous and had need of nothing. Christ declared it wretched, miserable, poor, blind, and naked. The gap between self-perception and reality was total.\u003c/p\u003e\n\u003cp\u003eCalifornia, under Newsom's leadership, presents itself as the nation's leader in science, public health, and progressive governance. But the reality is a state captured by pharmaceutical interests, governed by politicians funded by those interests, and enforcing policies that prioritize pharmaceutical revenue over the health and liberty of its citizens.\u003c/p\u003e\n\u003cp\u003eThe majority of Americans see this clearly. Newsom does not — or chooses not to.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eCalifornia Governor's Office — Policy announcements and executive actions\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Karen Kingston's analysis of California's pharmaceutical industry ties, legislative capture, and state-level policy analysis\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePolling data — Public opinion on CDC reform, vaccine mandates, and pharmaceutical accountability\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSB 277, AB 2098, SB 866 — California Legislature records\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eProverbs 14:12, Revelation 3:17 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e — Power structures exploiting federal-state tensions\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — State-level compliance with the pharmaceutical beast system\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/91-The_Kinsey_Corruption.mp4\"\u003eThe Kinsey Corruption\u003c/a\u003e — How corrupted science becomes state policy\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFrom the Confliction album (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e — Moral authority as the adversary's most effective mask\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers' Lies\u003c/a\u003e — Leaders who claim to protect while they exploit\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/rfk-cleans-house-cdc/?lang=en\"\u003eRFK Jr. Cleans House at the CDC\u003c/a\u003e — The federal reforms Newsom opposes\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cdc-gone-media-exodus/?lang=en\"\u003eThe CDC is Gone: Media Reports Mass Exodus\u003c/a\u003e — The institutional transformation Newsom seeks to reverse\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/florida-ends-vaccine-mandates/?lang=en\"\u003eFlorida Surgeon General Announces End to ALL Vaccine Mandates\u003c/a\u003e — The opposite approach to state-level health policy\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cdc-updates-childhood-vaccine-reimbursement/?lang=en\"\u003eCDC Updates Government Reimbursement for Childhood Vaccines\u003c/a\u003e — The financial mechanisms driving vaccination policy\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eGavin Newsom has chosen to defy the CDC's reforms, clinging to the pharmaceutical industry's preferred policies while the majority of Americans move in the opposite direction. Rehoboam made the same choice — he doubled down on the heavy yoke while the people cried for relief. The result was a divided kingdom. California, under Newsom's pharmaceutical governance, is becoming a kingdom unto itself — rich in biotech revenue, poor in public trust, and blind to the reckoning that approaches. \"Pride goeth before destruction, and an haughty spirit before a fall\" (Proverbs 16:18). The polls have spoken. The people have moved. Whether California moves with them or falls alone is Newsom's choice — and his consequence.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Gavin Newsom Bucks the CDC While Majority of Americans Agree\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"California Governor Gavin Newsom defies updated CDC guidance as polling shows the majority of Americans support the agency's reform under new federal leadership.\"}],[\"$\",\"div\",null,{\"className\":\"flex ga
