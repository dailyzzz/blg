\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Vatican has presented itself for centuries as the earthly representative of Jesus Christ — the Vicar of Christ, the supreme spiritual authority of Christendom. Yet the history of the papacy reveals an institution that has, at critical moments, aligned itself not with the Savior it claims to represent but with the very forces of darkness that Scripture warns against. The events of 1786, when the papacy effectively capitulated to the Illuminati-Jesuit alliance, represent one of the most consequential of these alignments — a deal with the devil that reshaped the spiritual landscape of the Western world and continues to produce consequences to this day.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony about the three heavens and the organized demonic hierarchy provides the spiritual framework for understanding these events. The second heaven — the realm of demonic activity — operates through human institutions, and the Vatican has served as one of its primary instruments for centuries. Pittman's revelation that 97.5% of humanity walks the broad road to destruction takes on particular significance when we consider that the largest Christian institution in the world has been compromised from within by the very forces it claims to oppose. The 95% who serve \"self\" rather than God include the millions who place their trust in an institution that made its peace with Satan centuries ago.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order sits at the center of this betrayal. Suppressed by Pope Clement XIV in 1773 for their crimes and conspiracies, the Jesuits did not accept their dissolution — they plotted their restoration, and the events of 1786 represent a critical stage in that restoration. As Napoleon observed, \"The Jesuits are a military organization, not a religious order... the aim is power.\" The tracks \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e illuminate the spiritual forces that empowered the Jesuit return and the Vatican's capitulation.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-suppression-and-its-aftermath\"\u003eThe Suppression and Its Aftermath\u003c/h2\u003e\n\u003ch3 id=\"why-clement-xiv-acted\"\u003eWhy Clement XIV Acted\u003c/h3\u003e\n\u003cp\u003ePope Clement XIV issued the papal brief Dominus ac Redemptor on July 21, 1773, formally suppressing the Society of Jesus. This was not an impulsive act — it was the culmination of decades of pressure from Catholic monarchs across Europe who had experienced the destructive effects of Jesuit manipulation firsthand.\u003c/p\u003e\n\u003cp\u003ePortugal expelled the Jesuits in 1759 after discovering Jesuit involvement in an assassination attempt against King Joseph I. France dissolved the order in 1764 after financial scandals and political intrigue. Spain expelled them in 1767 under circumstances so secretive that the specific reasons were sealed in the royal archives. Naples, Parma, and other states followed. By 1773, the Jesuits had been expelled from virtually every Catholic country, and the pressure on the pope to act definitively was overwhelming.\u003c/p\u003e\n\u003cp\u003eClement XIV, aware of the danger he faced, was reported to have said upon signing the brief: \"I have signed my death warrant.\" Within fourteen months, he was dead — officially from illness, but widely believed to have been poisoned by Jesuit agents. His body decomposed with extraordinary rapidity, a detail noted by contemporaries as consistent with certain types of poisoning. The message was unmistakable: anyone who moved against the Jesuits would pay with their life.\u003c/p\u003e\n\u003ch3 id=\"the-underground-years\"\u003eThe Underground Years\u003c/h3\u003e\n\u003cp\u003eThe period between 1773 and 1814 — the forty-one years of official Jesuit suppression — was not a period of Jesuit absence but of Jesuit transformation. The order survived openly in Protestant Prussia under Frederick the Great and in Orthodox Russia under Catherine the Great — both of whom recognized the Jesuits' value as educators and administrators, and both of whom refused to promulgate the papal brief within their territories.\u003c/p\u003e\n\u003cp\u003eIn Catholic countries, former Jesuits operated through existing networks — Masonic lodges, academic institutions, banking houses, and other religious orders that they had infiltrated during their centuries of operation. The suppression forced the Jesuits to perfect the techniques of covert operation that would make them even more powerful upon their restoration. Unable to operate openly, they learned to operate invisibly — a capability that proved far more dangerous than their previous open activity.\u003c/p\u003e\n\u003cp\u003eJohn Adams recognized this reality when he wrote about the Jesuits: \"If ever there were a body of men who merited eternal damnation on earth and in hell, it is this society of Loyolas.\" Adams understood that suppression had not eliminated the Jesuit threat — it had amplified it by removing the visible target while leaving the operational network intact.\u003c/p\u003e\n\u003ch2 id=\"the-crisis-of-1786\"\u003eThe Crisis of 1786\u003c/h2\u003e\n\u003ch3 id=\"the-bavarian-illuminati-exposure\"\u003eThe Bavarian Illuminati Exposure\u003c/h3\u003e\n\u003cp\u003eIn 1785, the Bavarian government discovered and suppressed the Illuminati, seizing documents that revealed the organization's plans for the overthrow of all established governments and religions. The seized documents, published as \"Original Writings of the Order of the Illuminati,\" exposed a conspiracy of breathtaking ambition — the establishment of a new world order through the systematic destruction of existing institutions.\u003c/p\u003e\n\u003cp\u003eThe Illuminati documents revealed connections to Masonic networks across Europe and provided evidence that the Illuminati had successfully infiltrated lodges, universities, and governments. The publication of these documents created a crisis for every institution connected to the Illuminati network — including the Catholic Church, which faced the revelation that secret society networks had penetrated its own structures.\u003c/p\u003e\n\u003ch3 id=\"the-vaticans-dilemma\"\u003eThe Vatican's Dilemma\u003c/h3\u003e\n\u003cp\u003eBy 1786, the Vatican faced a dilemma of existential proportions. The suppressed Jesuits were operating through the very secret society networks that the Illuminati documents had exposed. The Masonic lodges that the Church had condemned were riddled with former Jesuits pursuing Jesuit objectives through Masonic channels. And the Illuminati program — the destruction of all established religion and government — threatened the Vatican's temporal and spiritual authority.\u003c/p\u003e\n\u003cp\u003eThe Vatican could have responded by fully exposing the network — revealing the Jesuit infiltration of Masonic lodges, cooperating with secular authorities to dismantle the conspiracy, and purging its own institutions of compromised elements. This would have been the righteous course — the course demanded by the Church's stated mission of defending truth against error.\u003c/p\u003e\n\u003cp\u003eInstead, the Vatican chose accommodation. Rather than destroying the network, the papacy sought to manage it — to redirect the forces of secret society power toward objectives compatible with Vatican interests. This accommodation was the \"deal with the devil\" that would define the relationship between the Vatican and the secret society network for centuries to come.\u003c/p\u003e\n\u003ch3 id=\"the-terms-of-the-accommodation\"\u003eThe Terms of the Accommodation\u003c/h3\u003e\n\u003cp\u003eThe specific terms of the Vatican's accommodation with the Illuminati-Jesuit network are not contained in any single published document — such arrangements are never committed to paper. They must be inferred from the pattern of events that followed: the gradual rehabilitation of the Jesuits, the Vatican's increasingly selective enforcement of its anti-Masonic decrees, and the emergence of a modus vivendi in which the Vatican and the secret society network pursued complementary rather than conflicting objectives.\u003c/p\u003e\n\u003cp\u003eThe practical effect was a division of spheres: the Vatican maintained its spiritual authority over the Catholic faithful, while the secret society network controlled the political, financial, and intelligence dimensions of global governance. The Vatican provided spiritual legitimacy; the network provided temporal power. Each needed the other, and their cooperation, while never publicly acknowledged, became the invisible architecture of Western governance.\u003c/p\u003e\n\u003cp\u003eThe Jesuit superior Tamburini's boast — \"From this chamber I govern not only to Paris but to China\" — described an operational reality that the Vatican's accommodation made permanent. The Jesuits, operating through their secret society networks, governed the temporal affairs of the world; the Vatican, under increasing Jesuit influence, provided spiritual cover for that governance.\u003c/p\u003e\n\u003ch2 id=\"the-restoration-of-the-jesuits\"\u003eThe Restoration of the Jesuits\u003c/h2\u003e\n\u003ch3 id=\"the-return\"\u003eThe Return\u003c/h3\u003e\n\u003cp\u003eOn August 7, 1814, Pope Pius VII issued the bull Sollicitudo omnium ecclesiarum, restoring the Society of Jesus. The restoration came at a moment of maximum Vatican vulnerability — Napoleon had imprisoned Pius VII, the Papal States had been dissolved, and the Church's temporal power was at its nadir. The Jesuits, who had maintained their organizational capability throughout the suppression, offered the desperate pope something he desperately needed: a disciplined, globally connected organization capable of defending Vatican interests.\u003c/p\u003e\n\u003cp\u003eThe terms of the restoration ensured that the restored Jesuits would be more powerful than the suppressed Jesuits had been. The order returned with decades of covert operational experience, with networks embedded in every major institution in the Western world, and with an understanding that their survival depended on making themselves indispensable to the Vatican rather than threatening to it.\u003c/p\u003e\n\u003cp\u003eThe restoration also confirmed the accommodation of 1786. The Vatican had chosen to work with the Jesuit-connected secret society network rather than against it, and the restoration formalized that choice. From 1814 forward, the Jesuits operated as the Vatican's most powerful instrument — but an instrument with its own agenda, its own networks, and its own understanding of what the Church should be and do.\u003c/p\u003e\n\u003ch3 id=\"the-consequences\"\u003eThe Consequences\u003c/h3\u003e\n\u003cp\u003eThe consequences of the Jesuit restoration were felt across the world within decades. Jesuit influence in European politics contributed to the revolutions of 1848. Jesuit educational institutions shaped the intellectual development of elites across the Western world. Jesuit missionaries extended Vatican influence into every corner of the globe. And Jesuit intelligence networks — the most sophisticated in the world — provided the Vatican with information and operational capabilities that rivaled those of any secular government.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e describes how institutional systems move in coordinated fashion toward common objectives. The Jesuit-Vatican-secret society network that was formalized in the late eighteenth century operates precisely this way — multiple institutions moving in lockstep toward objectives that are never publicly stated but consistently pursued.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-betrayal\"\u003eThe Spiritual Betrayal\u003c/h2\u003e\n\u003ch3 id=\"what-the-vatican-surrendered\"\u003eWhat the Vatican Surrendered\u003c/h3\u003e\n\u003cp\u003eThe Vatican's accommodation with the secret society network represented a spiritual betrayal of the most fundamental kind. The institution that claimed to represent Christ on earth chose to ally itself with organizations that explicitly served the adversary. The Masonic lodges that the Vatican tolerated were dedicated to the worship of the \"Great Architect\" — not the God of the Bible but the Luciferian principle that Masonic philosopher Albert Pike would later identify explicitly as Lucifer.\u003c/p\u003e\n\u003cp\u003eThis was not a theological subtlety — it was a fundamental choice between light and darkness. The Vatican chose to preserve its institutional power at the cost of its spiritual integrity. It chose temporal survival over spiritual faithfulness. It chose the deal with the devil over the cross of Christ.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony about the second heaven illuminates this betrayal. The demons he witnessed operate through institutional structures, corrupting organizations from within while maintaining their outward appearance. The Vatican, viewed through Pittman's spiritual lens, has served as one of the primary institutional vehicles for second-heaven operations — a nominally Christian institution through which anti-Christian forces operate with impunity.\u003c/p\u003e\n\u003ch3 id=\"the-satanic-mass\"\u003eThe Satanic Mass\u003c/h3\u003e\n\u003cp\u003eMultiple witnesses over centuries have reported the celebration of Satanic rituals within Vatican walls. These reports, dismissed by mainstream sources as anti-Catholic propaganda, are consistent with the spiritual reality of an institution that has been compromised at its highest levels by forces that serve the adversary. If the Vatican made its peace with Luciferian secret societies in the eighteenth century, the presence of Luciferian practice within the Vatican itself is not surprising — it is inevitable.\u003c/p\u003e\n\u003cp\u003eThe testimony of Malachi Martin, a former Jesuit priest who served in the Vatican, described a Satanic enthronement ceremony conducted within the Vatican in 1963. Martin's accounts, published in his novels and interviews, described the deliberate installation of Satanic authority within the Church's most sacred precincts. Whether Martin's specific accounts are taken literally or understood as symbolic descriptions of institutional corruption, they point to the same reality: the Vatican has been compromised by the forces it claims to oppose.\u003c/p\u003e\n\u003cp\u003eCatholic Confidential documents the Jesuit oath, which includes commitments to use any means necessary to advance the order's objectives. \"Every species of vice finds its patronage in them,\" the documentary reveals. When the Vatican allied itself with an order that patronizes every species of vice, it opened itself to every species of spiritual corruption — including the most extreme manifestations of Satanic practice.\u003c/p\u003e\n\u003ch2 id=\"the-modern-papacy\"\u003eThe Modern Papacy\u003c/h2\u003e\n\u003ch3 id=\"from-accommodation-to-submission\"\u003eFrom Accommodation to Submission\u003c/h3\u003e\n\u003cp\u003eThe trajectory from the accommodation of 1786 to the modern papacy traces a progressive surrender of Vatican independence to Jesuit control. Each successive pope has been more deeply embedded in the Jesuit-secret society network than his predecessor. The election of Pope Francis in 2013 — the first Jesuit pope in history — represents the culmination of this trajectory. The order that was suppressed in 1773 now occupies the papal throne itself.\u003c/p\u003e\n\u003cp\u003eThe significance of a Jesuit pope cannot be overstated. The Jesuit order swears obedience to the pope, but the Jesuit general — historically known as the \"Black Pope\" for the power he wields behind the scenes — has often been more powerful than the pope himself. When the Jesuit general and the pope are aligned — or when the pope is himself a Jesuit — the traditional checks on Jesuit power within the Church are eliminated.\u003c/p\u003e\n\u003cp\u003ePope Francis's papacy has been characterized by precisely the kind of doctrinal and political flexibility that Jesuit casuistry enables. His statements on divorce, homosexuality, climate change, and economic policy have consistently aligned with the progressive agenda that the secret society network has promoted for centuries. This is not coincidence — it is the fruit of the deal made in 1786, now fully matured after two and a half centuries.\u003c/p\u003e\n\u003ch3 id=\"the-globalist-agenda\"\u003eThe Globalist Agenda\u003c/h3\u003e\n\u003cp\u003eThe modern Vatican's alignment with globalist institutions — the United Nations, the World Economic Forum, international financial organizations — represents the final stage of the accommodation. The Vatican no longer merely tolerates the secular power structure that the secret society network controls; it actively promotes and legitimizes it. The papacy has become the spiritual wing of the new world order, providing religious endorsement for policies designed to centralize global governance.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/171-Great_Reset_Rising.mp4\"\u003eGreat Reset Rising\u003c/a\u003e examines the current phase of this agenda. The Great Reset — the World Economic Forum's program for restructuring the global economy and society — has received explicit Vatican support. This support is the logical consequence of the deal made in 1786: the Vatican provides spiritual legitimacy for the new world order in exchange for the preservation of its institutional position within that order.\u003c/p\u003e\n\u003ch2 id=\"the-call-to-discernment\"\u003eThe Call to Discernment\u003c/h2\u003e\n\u003ch3 id=\"seeing-through-the-disguise\"\u003eSeeing Through the Disguise\u003c/h3\u003e\n\u003cp\u003eUnderstanding the Vatican's deal with the devil is not an exercise in anti-Catholic bigotry — it is an exercise in spiritual discernment. The individual Catholic believer, sincere in faith and genuine in devotion, is as much a victim of this institutional corruption as anyone. The betrayal was committed by the hierarchy, not by the faithful, and exposing it serves the faithful by alerting them to the nature of the institution that claims their allegiance.\u003c/p\u003e\n\u003cp\u003eThe principle of Matthew 7:16 — \"Ye shall know them by their fruits\" — applies to institutions as thoroughly as to individuals. The Vatican's fruits over the past two centuries include the protection of abusive priests, the accumulation of enormous wealth while preaching poverty, the alignment with totalitarian regimes, and the progressive abandonment of orthodox Christian teaching. These fruits reveal the nature of the tree — a tree whose roots reach back to the deal made in 1786.\u003c/p\u003e\n\u003cp\u003eEvery believer must decide: will they place their trust in an institution that has been compromised by the adversary, or will they place their trust in the Christ that institution claims to represent? The answer determines everything. As Pittman was told, the question is not what you call Jesus — it is whether you have made Him Lord. No institution can make that decision for you, and no institution that has sold itself to the enemy can lead you to the One it has betrayed.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"The Vatican's Secret Deals,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u00 world-religion-takeover-part7/?lang=en\"\u003eThe One-World Religion Plot and the TAKEOVER Part 7\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe Pope's deal with the devil in 1786 was not a single dramatic event — it was the formalization of a relationship that had been developing for decades and that would continue to deepen for centuries. The Vatican, faced with the choice between faithfulness and survival, chose survival — and in doing so, surrendered its spiritual authority to the very forces it was meant to oppose. The consequences of that choice are visible in every Vatican pronouncement that aligns with the globalist agenda, every scandal that reveals institutional corruption, and every soul that places its trust in an institution that placed its trust in the adversary. The deal was made; the price is still being paid.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"The Pope's Deal with the Devil in 1786 Part 3\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"How the papacy struck a deal with Illuminati and Jesuit forces in 1786, betraying Christianity and empowering Satanic secret societies for centuries.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",
