e questions a person raised in Christianity can ask, this one cuts deepest. The crucifixion is the central event of the faith — the moment when, according to orthodox doctrine, the Son of God died for the sins of humanity. To question it feels like sacrilege. But to refuse to question it, when the evidence demands examination, is to choose comfort over truth. And comfort, as Howard Pittman learned during his NDE, is the wide path to rejection.\u003c/p\u003e\n\u003cp\u003ePittman was shown three heavens. He witnessed demonic operations in the second heaven. He was told that 97.5 percent of Christians were rejected at death. Ninety-five percent serve \"self.\" Every word carries spiritual weight (Matthew 12:36-37). The institution that told you not to question — the institution built by the Jesuits, Loyola's military organization of \"absolute power\" (Napoleon), \"eternal damnation\" (Adams), global governance (Tamburini), and assassination (Clement XIV) — that institution has the most to lose if you examine the crucifixion story honestly.\u003c/p\u003e\n\u003cp\u003eThe \u003cem\u003eCatholic Confidential\u003c/em\u003e documentary reveals that Jesuits infiltrate \"cloaked with cunning,\" demand blind obedience, and practice \"every species of vice.\" If they built the framework within which you understand the crucifixion, should you not at least examine that framework?\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/23-The_Sun_and_the_Moon.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Sun and the Moon — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-official-story\"\u003eThe Official Story\u003c/h2\u003e\n\u003ch3 id=\"what-you-were-taught\"\u003eWhat You Were Taught\u003c/h3\u003e\n\u003cp\u003eThe standard Christian narrative of the crucifixion runs as follows: Jesus of Nazareth was arrested in the Garden of Gethsemane, tried before the Sanhedrin and Pontius Pilate, sentenced to death by crucifixion, nailed to a cross at Golgotha, died after approximately six hours, and was buried in a tomb provided by Joseph of Arimathea. Three days later, the tomb was found empty, and Jesus appeared resurrected to his disciples.\u003c/p\u003e\n\u003cp\u003eThis narrative is taken primarily from the four canonical Gospels — Matthew, Mark, Luke, and John. These four accounts agree on the broad outlines but differ significantly on the details. These differences are important, and the institution has spent centuries explaining them away rather than honestly examining them.\u003c/p\u003e\n\u003ch3 id=\"the-differences-that-matter\"\u003eThe Differences That Matter\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eWho was at the tomb?\u003c/strong\u003e Matthew says Mary Magdalene and \"the other Mary.\" Mark says Mary Magdalene, Mary the mother of James, and Salome. Luke says the women who had come from Galilee. John says only Mary Magdalene.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat did they find?\u003c/strong\u003e Matthew says an angel sitting on the rolled-away stone. Mark says a young man in white sitting inside. Luke says two men in shining garments. John says the stone removed and the tomb empty, with two angels appearing later.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat happened next?\u003c/strong\u003e Matthew says Jesus met the women on their way back. Mark says they told no one because they were afraid (the original ending of Mark stops at 16:8 — the rest was added later). Luke says the disciples did not believe the women. John has an extended narrative involving Mary Magdalene alone.\u003c/p\u003e\n\u003cp\u003eThese are not minor discrepancies. They describe fundamentally different events. If four witnesses to a modern crime gave accounts this divergent, no court would accept any of them as reliable. The institution explains these differences as \"complementary perspectives.\" But this explanation requires special pleading — an assumption that the texts are true, applied before the evidence is examined.\u003c/p\u003e\n\u003ch2 id=\"the-problems-with-the-narrative\"\u003eThe Problems with the Narrative\u003c/h2\u003e\n\u003ch3 id=\"the-missing-contemporary-sources\"\u003eThe Missing Contemporary Sources\u003c/h3\u003e\n\u003cp\u003eThe crucifixion of Jesus, if it happened as described, would have been accompanied by extraordinary events: darkness covering the land for three hours, an earthquake, the veil of the temple torn in two, and according to Matthew 27:52-53, the graves of saints opening and dead people walking into Jerusalem.\u003c/p\u003e\n\u003cp\u003eThese events would have been noticed. Darkness over the land for three hours would have been recorded by Roman historians, astronomers, and administrators. An earthquake would appear in geological and administrative records. Dead people walking through Jerusalem would have been the most extraordinary event in human history.\u003c/p\u003e\n\u003cp\u003eYet no contemporary non-Christian source records any of these events. Josephus, the Jewish historian who documented the period in exhaustive detail, makes no mention of three hours of darkness, an earthquake, or a zombie invasion of Jerusalem. Roman records are silent. Not a single non-Christian source from the first century confirms the extraordinary events that Matthew describes accompanying the crucifixion.\u003c/p\u003e\n\u003cp\u003eAgent131711's research on Substack (agent131711.substack.com) examines the silence of contemporary sources in detail, noting that the argument from silence is not proof of absence but is certainly grounds for inquiry. When an event of this magnitude leaves no trace in the historical record outside the texts produced by the movement that benefits from the story, honest examination demands that we ask why.\u003c/p\u003e\n\u003ch3 id=\"the-josephus-problem\"\u003eThe Josephus Problem\u003c/h3\u003e\n\u003cp\u003eThe most commonly cited non-Christian reference to Jesus is the \u003cem\u003eTestimonium Flavianum\u003c/em\u003e in Josephus's \u003cem\u003eAntiquities of the Jews\u003c/em\u003e (Book 18, Chapter 3). This passage describes Jesus as \"a wise man, if it be lawful to call him a man,\" says he was \"the Christ,\" and mentions his crucifixion and resurrection.\u003c/p\u003e\n\u003cp\u003eHowever, the scholarly consensus — not fringe opinion, but mainstream academic scholarship — is that this passage was either entirely fabricated or substantially altered by later Christian scribes. The reasons are compelling:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eThe passage interrupts the surrounding text, which discusses completely unrelated events.\u003c/li\u003e\n\u003cli\u003eNo Christian writer before Eusebius (4th century) quotes or references this passage, despite its obvious apologetic value.\u003c/li\u003e\n\u003cli\u003eThe language is inconsistent with Josephus's style and beliefs — as a Jewish historian, he would not have called Jesus \"the Christ\" or declared the resurrection.\u003c/li\u003e\n\u003cli\u003eEusebius, who first cited the passage, was known for his willingness to use deception in the service of faith (he wrote: \"it is not possible to be saved without telling lies\").\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eIf the primary non-Christian historical reference to Jesus was fabricated or altered, this does not prove the crucifixion did not happen. But it demonstrates that the institution was willing to manufacture evidence — willing to lie, forge, and deceive in service of the narrative. This is precisely the behavior that \u003cem\u003eCatholic Confidential\u003c/em\u003e describes: infiltration \"cloaked with cunning,\" practiced by men who engage in \"every species of vice.\"\u003c/p\u003e\n\u003ch3 id=\"the-roman-execution-problem\"\u003eThe Roman Execution Problem\u003c/h3\u003e\n\u003cp\u003eRoman crucifixion was not a private affair. It was a public spectacle designed to terrorize the population into obedience. Crucifixion victims were left on their crosses for days, sometimes weeks, their bodies consumed by birds and dogs. They were not buried in private tombs. They were dumped in mass graves or left to rot as a public warning.\u003c/p\u003e\n\u003cp\u003eThe Gospel narrative of Jesus receiving a dignified burial in a rich man's private tomb contradicts everything known about Roman crucifixion practice. Pontius Pilate, described by the contemporary philosopher Philo as \"inflexible, merciless, and obstinate,\" would not have released the body of an executed criminal to a private individual. This simply did not happen in the Roman system.\u003c/p\u003e\n\u003cp\u003eThe institution explains this anomaly by appealing to divine providence — God arranged events to fulfill prophecy. But this explanation is circular: the text must be true because God ensured it, and we know God ensured it because the text says so.\u003c/p\u003e\n\u003ch2 id=\"the-jesuit-role\"\u003eThe Jesuit Role\u003c/h2\u003e\n\u003ch3 id=\"controlling-the-narrative\"\u003eControlling the Narrative\u003c/h3\u003e\n\u003cp\u003eThe Jesuits did not create the crucifixion narrative — it predates them by fifteen centuries. But they have served as its most aggressive defenders and its most sophisticated propagators. The Jesuit educational system, which trains theologians, historians, and apologists, produces generation after generation of scholars whose purpose is to defend the narrative, not examine it.\u003c/p\u003e\n\u003cp\u003eThe Jesuit approach to the crucifixion is the same as their approach to everything: present the desired conclusion as established fact, suppress alternative views, and punish questioners. The Index of Forbidden Books, which the Jesuits helped administer, banned any text that challenged the orthodox narrative. The Inquisition, which Jesuits administered with enthusiasm, tortured and killed those who publicly questioned church doctrine.\u003c/p\u003e\n\u003cp\u003eThese methods did not prove the crucifixion happened. They proved that the institution was willing to use violence to prevent examination of the question. Organizations that possess truth welcome examination. Organizations that possess lies fear it.\u003c/p\u003e\n\u003ch3 id=\"the-passion-play-tradition\"\u003eThe Passion Play Tradition\u003c/h3\u003e\n\u003cp\u003eThe Jesuits popularized the Passion Play — dramatic reenactments of the crucifixion performed during Holy Week. These performances served a crucial function: they made the narrative vivid, emotional, and real in the minds of audiences who could not read and had no access to alternative accounts.\u003c/p\u003e\n\u003cp\u003eThe Passion Play tradition transformed a historical claim into an emotional experience. Once people had wept over the suffering of Jesus, seen the nails driven in, witnessed the blood flow — even in staged form — the narrative became psychologically unquestionable. To doubt it felt like cruelty, like denying the suffering of someone you had witnessed being tortured.\u003c/p\u003e\n\u003cp\u003eThis is masterful psychological manipulation. The Jesuits understood that emotional investment prevents rational examination. By making the crucifixion a lived emotional experience rather than a historical claim to be evaluated, they made it effectively un-questionable.\u003c/p\u003e\n\u003ch2 id=\"the-deeper-questions\"\u003eThe Deeper Questions\u003c/h2\u003e\n\u003ch3 id=\"what-if-it-happened-differently\"\u003eWhat If It Happened Differently?\u003c/h3\u003e\n\u003cp\u003eQuestioning the crucifixion narrative does not require claiming it never happened at all. It may have happened — but differently from how the institution describes it. Early Christian groups held diverse views:\u003c/p\u003e\n\u003cp\u003eThe Docetists believed Jesus was a spiritual being who only appeared to have a physical body. His suffering and death were illusions.\u003c/p\u003e\n\u003cp\u003eThe Gnostics held various views, some believing that Simon of Cyrene (who carried the cross) was actually crucified in Jesus' place, while Jesus watched from a distance, laughing.\u003c/p\u003e\n\u003cp\u003eThe Islamic tradition (Quran 4:157) states: \"They did not kill him, nor did they crucify him, but it was made to appear so to them.\"\u003c/p\u003e\n\u003cp\u003eThese alternative views were suppressed by the institution through violence — not through evidence. The councils that established orthodox doctrine did so by majority vote, political pressure, and imperial enforcement, not by demonstrating that their version was historically accurate.\u003c/p\u003e\n\u003ch3 id=\"what-if-it-is-true\"\u003eWhat If It Is True?\u003c/h3\u003e\n\u003cp\u003eThe possibility that the crucifixion happened exactly as described must also be considered. The spiritual realm is real — Howard Pittman testified to this directly. If the spiritual realm is real, then supernatural events are possible, including the events described in the Gospels.\u003c/p\u003e\n\u003cp\u003eBut even if the crucifixion happened as described, the institution's interpretation of it — the theology of substitutionary atonement, the necessity of the Catholic Mass, the authority of the Pope — does not automatically follow. The event and the institution's interpretation of the event are separate things. The Jesuits have conflated them deliberately, so that questioning the institution feels like questioning Christ himself.\u003c/p\u003e\n\u003cp\u003eThis conflation is the institution's greatest weapon. \"Touch not mine anointed\" (1 Chronicles 16:22) is used to silence anyone who questions clergy. But the verse refers to God's anointed — not to the Jesuit-trained administrators of a human institution. The distinction matters, and the institution depends on you not making it.\u003c/p\u003e\n\u003ch2 id=\"the-path-of-honest-inquiry\"\u003eThe Path of Honest Inquiry\u003c/h2\u003e\n\u003ch3 id=\"what-honest-examination-requires\"\u003eWhat Honest Examination Requires\u003c/h3\u003e\n\u003cp\u003eExamining the crucifixion honestly requires separating what you know from what you were told. What you know is limited to the texts themselves and the archaeological evidence. What you were told includes centuries of institutional interpretation, emotional conditioning, and social pressure.\u003c/p\u003e\n\u003cp\u003eHonest examination requires reading the Gospel accounts side by side and acknowledging the contradictions rather than harmonizing them. It requires considering the absence of contemporary corroboration. It requires acknowledging that the institution that transmitted the narrative had motives beyond truth-telling.\u003c/p\u003e\n\u003cp\u003eMost importantly, it requires courage. The courage to face the possibility that you have been wrong. The courage to accept uncertainty. The courage to follow the evidence wherever it leads, even if it leads away from comfort and community.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's 97.5 percent were people who lacked this courage. They accepted the institution's narrative without examination. They made the institution Lord rather than making Christ Lord. And they were rejected — not for questioning, but for failing to question.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Historical analysis of the crucifixion narrative and institutional manipulation\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — The spiritual reality behind institutional religion's failures\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit methods of narrative control and suppression\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/01-Cast_Out_of_Paradise.mp4\"\u003eCast Out of Paradise\u003c/a\u0
