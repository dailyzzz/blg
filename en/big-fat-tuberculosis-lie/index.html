im. When he speaketh a lie, he speaketh of his own: for he is a liar, and the father of it.\"\u003c/em\u003e — John 8:44\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eModern medicine is built on lies, and the biggest lie of all may be tuberculosis. The entire edifice of germ theory — the idea that invisible organisms invade the body and cause disease — was cemented into scientific orthodoxy through the tuberculosis narrative. Robert Koch's 1882 announcement that he had discovered the \"tubercle bacillus\" was hailed as the greatest medical discovery of the century. It launched the germ theory revolution, created the pharmaceutical industry as we know it, and established the model of disease that persists to this day.\u003c/p\u003e\n\u003cp\u003eBut what if Koch was wrong? What if the evidence was fabricated, manipulated, or simply misinterpreted? What if tuberculosis — like so many diseases attributed to germs — was actually caused by the toxic living conditions of industrial civilization, and the \"bacillus\" was a consequence rather than a cause?\u003c/p\u003e\n\u003cp\u003eHoward Pittman, during his near-death experience, was told that the spiritual realm operates through hierarchies of deception. Demons do not simply attack — they construct elaborate systems of lies that humans maintain voluntarily. The germ theory of disease is one such system. It was constructed in the 19th century, funded by the same oligarchic families that would later create the Rockefeller medical empire, and maintained by the institutional inertia of a trillion-dollar industry.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order, as Napoleon observed, is \"a military organization... absolute power, universal power.\" The Jesuits infiltrated medical education through their network of Catholic universities and hospitals. The Catholic Confidential documentary reveals their oath: infiltration \"cloaked with cunning,\" blind obedience, and \"every species of vice\" permitted in service of the order's goals. The tuberculosis lie is one of their greatest achievements.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"robert-koch-and-the-tuberculosis-fraud\"\u003eRobert Koch and the Tuberculosis Fraud\u003c/h2\u003e\n\u003ch3 id=\"the-1882-announcement\"\u003eThe 1882 Announcement\u003c/h3\u003e\n\u003cp\u003eOn March 24, 1882, Robert Koch presented his findings to the Berlin Physiological Society, claiming to have identified the Mycobacterium tuberculosis as the cause of tuberculosis. The announcement made Koch an instant celebrity and is still celebrated as a landmark in medical history. The WHO even designates March 24 as \"World Tuberculosis Day.\"\u003c/p\u003e\n\u003cp\u003eBut Koch's evidence was far weaker than the mythology suggests.\u003c/p\u003e\n\u003ch3 id=\"kochs-postulates--his-own-rules-he-couldnt-follow\"\u003eKoch's Postulates — His Own Rules He Couldn't Follow\u003c/h3\u003e\n\u003cp\u003eKoch himself established four criteria (known as Koch's Postulates) that must be met to prove a microorganism causes a disease:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eThe microorganism must be found in all cases of the disease\u003c/li\u003e\n\u003cli\u003eIt must be isolated from the host and grown in pure culture\u003c/li\u003e\n\u003cli\u003eThe cultured microorganism must cause disease when introduced into a healthy host\u003c/li\u003e\n\u003cli\u003eThe microorganism must be re-isolated from the new host and shown to be identical\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eKoch \u003cstrong\u003efailed to satisfy his own postulates\u003c/strong\u003e for tuberculosis:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePostulate 1\u003c/strong\u003e: The tubercle bacillus was NOT found in all cases of tuberculosis. Many patients diagnosed with tuberculosis showed no evidence of the bacillus. Koch explained this away by claiming the bacillus was present but undetectable — a circular argument that would be laughed out of any honest scientific forum.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePostulate 3\u003c/strong\u003e: When Koch injected the cultured bacillus into animals, the results were inconsistent. Some animals developed lesions; others did not. The animals that did develop lesions were often already in poor health — malnourished, stressed, kept in terrible conditions. Koch's experiments proved that weakened animals can become sick when injected with foreign material — not that a specific bacillus causes a specific disease.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePostulate 4\u003c/strong\u003e: Re-isolation was inconsistent and plagued by contamination issues that Koch himself acknowledged but dismissed.\u003c/p\u003e\n\u003ch3 id=\"the-tuberculin-fraud\"\u003eThe Tuberculin Fraud\u003c/h3\u003e\n\u003cp\u003eKoch's credibility should have been permanently destroyed by the tuberculin scandal. In 1890, Koch announced that he had developed \"tuberculin\" — a substance that could cure tuberculosis. The announcement caused worldwide excitement. Patients flooded into Berlin seeking the miracle cure.\u003c/p\u003e\n\u003cp\u003eTuberculin was a disaster. Not only did it fail to cure tuberculosis, it actively harmed patients. Many patients given tuberculin experienced severe reactions and accelerated disease progression. Some died directly as a result of treatment. Koch was widely condemned, and an investigation revealed that he had financial interests in the tuberculin product — he was profiting from the sale of the very substance he was promoting as a cure.\u003c/p\u003e\n\u003cp\u003eDespite this catastrophic failure — a failure that would destroy any modern researcher's career — Koch's original claim about the tubercle bacillus was never seriously re-examined. The scientific establishment had already built too much on the foundation of Koch's 1882 announcement. Retracting it would have meant demolishing germ theory itself.\u003c/p\u003e\n\u003ch2 id=\"what-actually-caused-tuberculosis\"\u003eWhat Actually Caused Tuberculosis\u003c/h2\u003e\n\u003ch3 id=\"the-industrial-poisoning-theory\"\u003eThe Industrial Poisoning Theory\u003c/h3\u003e\n\u003cp\u003eTuberculosis epidemics coincided precisely with industrialization. The disease was virtually unknown in rural populations living traditional lifestyles. It exploded in the crowded, polluted, malnourished urban centers of 19th-century Europe and America.\u003c/p\u003e\n\u003cp\u003eThe actual conditions that produced tuberculosis:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOvercrowded housing\u003c/strong\u003e: Factory workers packed into tenements with no ventilation, no sunlight, and no sanitation\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIndustrial pollution\u003c/strong\u003e: Workers breathing coal dust, chemical fumes, and particulate matter for 12-16 hours a day\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMalnutrition\u003c/strong\u003e: Diets consisting of the cheapest possible food — white bread, sugar, tea, and occasionally meat scraps\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eToxic water\u003c/strong\u003e: Water supplies contaminated with industrial waste, sewage, and heavy metals\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExhaustion\u003c/strong\u003e: 12-16 hour workdays, six or seven days a week, with no rest or recovery time\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eChemical exposure\u003c/strong\u003e: Workers in specific industries — mining, textile manufacturing, metalwork — had dramatically higher rates of \"tuberculosis\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWhen these conditions improved — better housing, sanitation, nutrition, reduced working hours — tuberculosis declined \u003cstrong\u003ebefore\u003c/strong\u003e any medical intervention. The mortality rate from tuberculosis dropped by over 90% between the mid-1800s and the introduction of antibiotics in the 1940s. The cure for tuberculosis was not medicine — it was the end of the worst abuses of industrial capitalism.\u003c/p\u003e\n\u003ch3 id=\"the-terrain-theory-explanation\"\u003eThe Terrain Theory Explanation\u003c/h3\u003e\n\u003cp\u003eAntoine Bechamp, Koch's contemporary and rival, argued that disease was caused by the condition of the body's internal terrain, not by external invaders. Bechamp observed that microorganisms found in diseased tissue were the result of disease, not the cause. They appeared as part of the body's response to toxic conditions — much like maggots appear on rotting flesh but do not cause the rotting.\u003c/p\u003e\n\u003cp\u003eBechamp's terrain theory was suppressed because it was not profitable. If disease is caused by poor living conditions, the solution is social reform — better food, cleaner water, less pollution, humane working conditions. These solutions do not generate revenue for the pharmaceutical industry. Koch's germ theory, by contrast, opened the door to an endless stream of profitable products: drugs, vaccines, diagnostic tests, hospital equipment, and the entire apparatus of modern medicine.\u003c/p\u003e\n\u003cp\u003eThe Rockefeller Foundation understood this immediately and invested heavily in promoting germ theory and suppressing terrain theory. The Flexner Report of 1910 completed the job by closing every medical school that taught alternatives to the allopathic model.\u003c/p\u003e\n\u003ch2 id=\"the-bcg-vaccine-scandal\"\u003eThe BCG Vaccine Scandal\u003c/h2\u003e\n\u003ch3 id=\"a-vaccine-that-doesnt-work\"\u003eA Vaccine That Doesn't Work\u003c/h3\u003e\n\u003cp\u003eThe BCG (Bacillus Calmette-Guerin) vaccine, introduced in 1921, is supposedly the primary weapon against tuberculosis. It is one of the most widely administered vaccines in the world, given to over 100 million children annually.\u003c/p\u003e\n\u003cp\u003eThere is one significant problem: \u003cstrong\u003eit doesn't work\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eThe WHO's own data shows that the BCG vaccine provides, at best, inconsistent protection against pulmonary tuberculosis in adults. Large-scale trials have produced wildly different results:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eA 1968 trial in Chingleput, India — one of the largest vaccine trials ever conducted, with over 360,000 participants — showed \u003cstrong\u003ezero protection\u003c/strong\u003e. In fact, the vaccinated group had slightly \u003cstrong\u003ehigher\u003c/strong\u003e rates of tuberculosis than the unvaccinated group.\u003c/li\u003e\n\u003cli\u003eTrials in the UK showed moderate protection, but these were conducted in populations with dramatically different living conditions than those in the developing world where TB is most prevalent.\u003c/li\u003e\n\u003cli\u003eA 1994 meta-analysis concluded that BCG's effectiveness ranged from 0% to 80%, depending on the study — a range so wide as to be meaningless.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDespite this evidence, the BCG vaccine remains on the WHO's List of Essential Medicines, and it continues to be administered to billions of children. Why? Because the vaccine industry — like the vitamin industry, like the pharmaceutical industry — exists not to promote health but to generate revenue and maintain control.\u003c/p\u003e\n\u003ch3 id=\"the-lubeck-disaster\"\u003eThe Lubeck Disaster\u003c/h3\u003e\n\u003cp\u003eIn 1930, in the German city of Lubeck, 72 infants died after being given BCG vaccine that was contaminated with virulent tuberculosis bacteria. The disaster was attributed to laboratory error — a strain of virulent TB was accidentally mixed with the vaccine strain.\u003c/p\u003e\n\u003cp\u003eBut the deeper question was never asked: why were 72 infants being injected with a live bacterial vaccine in the first place? The Lubeck disaster revealed the fundamental recklessness of vaccine science — the willingness to experiment on the most vulnerable members of society in pursuit of ideological and commercial goals.\u003c/p\u003e\n\u003cp\u003eThe Jesuit oath, as revealed in Catholic Confidential, demands blind obedience to the order's goals and permits \"every species of vice\" in their pursuit. The vaccine industry operates on the same principle: any harm to individuals is acceptable if it serves the greater goal — and the greater goal is not health but control.\u003c/p\u003e\n\u003ch2 id=\"the-modern-tb-industry\"\u003eThe Modern TB Industry\u003c/h2\u003e\n\u003ch3 id=\"drug-resistant-tb-a-manufactured-crisis\"\u003eDrug-Resistant TB: A Manufactured Crisis\u003c/h3\u003e\n\u003cp\u003eThe emergence of \"drug-resistant\" and \"multi-drug-resistant\" tuberculosis has been used to justify billions of dollars in new research funding, new drug development, and expanded surveillance programs. But the concept of drug resistance is built on the same flawed foundation as germ theory itself.\u003c/p\u003e\n\u003cp\u003eIf tuberculosis is not caused by a bacterium but by toxic living conditions, then \"drug-resistant TB\" is simply tuberculosis in populations living in such degraded conditions that no drug can overcome the damage. The \"resistance\" is not in the bacterium — it's in the impossibility of drugging someone into health while they continue to live in poverty, breathe polluted air, drink contaminated water, and eat nutritionally empty food.\u003c/p\u003e\n\u003ch3 id=\"tb-and-hiv-the-dual-myth\"\u003eTB and HIV: The Dual Myth\u003c/h3\u003e\n\u003cp\u003eThe claim that tuberculosis and HIV are synergistic — that HIV weakens the immune system, making people more susceptible to TB — is built on two fraudulent premises. The HIV theory (which is another lie for another article) and germ theory reinforce each other in a circular loop of bad science. People in developing countries who are malnourished, overworked, and living in toxic conditions develop symptoms that are labeled as \"TB/HIV co-infection,\" and the solution offered is always the same: more drugs, more vaccines, more dependency on the pharmaceutical system.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"medicine-as-religion\"\u003eMedicine as Religion\u003c/h3\u003e\n\u003cp\u003eModern medicine functions as a religion. It has its priests (doctors), its temples (hospitals), its sacraments (vaccines and drugs), its scriptures (peer-reviewed journals), and its inquisition (the persecution of dissenting practitioners). Like all false religions, it demands unquestioning faith from its adherents and punishes heresy ruthlessly.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was told during his NDE that words have spiritual power and that the spiritual realm is more real than the physical one. When the medical establishment declares that tuberculosis is caused by a bacillus and can only be treated with their drugs and vaccines, those words create a spiritual bondage. Billions of people accept this narrative on faith — not because they have examined the evidence, but because they have been trained to trust the priests of the medical religion.\u003c/p\u003e\n\u003cp\u003eThis is precisely the mechanism of Jesuit control. The Society of Jesus does not need to control every individual — it only needs to control the institutions that shape belief. Control the universities, and you control what doctors believe. Control the journals, and you control what doctors read. Control the funding, and you control what researchers study. Control the WHO, and you control the health policies of every nation on Earth.\u003c/p\u003e\n\u003ch3 id=\"the-way-out\"\u003eThe Way Out\u003c/h3\u003e\n\u003cp\u003eThe path to freedom begins with questioning. Question the germ theory. Question the tuberculosis narrative. Question every foundational assumption of modern medicine. Not because questioning is destructive, but because truth can withstand any question, and lies cannot.\u003c/p\u003e\n\u003cp\u003eSeek the Lord's wisdom in all matters of health. Your body is His temple, and He has provided everything needed for its nourishment and healing — in whole foods, clean water, sunlight, rest, and the peace that surpasses understanding. The pharmaceutical system offers the opposite of all these things: synthetic chemicals, contaminated water, indoor living, overwork, and the anxiety of perpetual sickness.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — research on germ theory, terrain theory, and the tuberculosis fraud\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — the spiritual warfare behind institutional deception\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit infiltration of medical and scientific institutions\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- Koch's original 1882 presentation and subsequent tuberculin scandal records\u003c
