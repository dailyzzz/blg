 Luke 5:31-32\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eJesus came to heal the sick — freely, without condition, without confinement. The system that has governed public health in America since the 19th century operates on the opposite principle: identify the sick, isolate them, confine them, and use their illness as justification for stripping them of every constitutional right. The FEMA camps that have become a staple of modern conspiracy discourse are not a future threat — they are a historical reality. The infrastructure for mass detention under the pretext of public health has existed in the United States since before FEMA was created in 1979.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, operating through the Catholic hospital system and their influence over public health policy, have long understood that disease is the perfect pretext for control. Ignatius Loyola's military order requires absolute obedience — \"I will believe that the white I see is black if the hierarchical church so defines it.\" What better mechanism for enforcing obedience than the authority of the physician, who tells you what is healthy and what is sick, what is safe and what is dangerous, what is freedom and what is quarantine? Michelangelo Tamburini governed the world from his chamber, and the modern public health apparatus governs from the hospital, the laboratory, and the quarantine camp.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e identifies the internal betrayal that makes medical tyranny possible — a government that claims to protect its citizens while building the infrastructure to imprison them. And \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e reminds us that the hosts of darkness include the technocrats, doctors, and administrators who enforce the system while believing they are serving the public good.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-quarantine-camps-of-the-19th-century\"\u003eThe Quarantine Camps of the 19th Century\u003c/h2\u003e\n\u003ch3 id=\"lazarettos-and-pest-houses\"\u003eLazarettos and Pest Houses\u003c/h3\u003e\n\u003cp\u003eLong before FEMA, long before the CDC, and long before modern public health bureaucracy, the United States operated a network of quarantine facilities that functioned as detention camps for the sick, the suspected sick, and anyone the authorities chose to classify as a health risk.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLazarettos\u003c/strong\u003e — Named after the biblical Lazarus, lazarettos were quarantine stations established at ports of entry to detain immigrants and travelers suspected of carrying infectious diseases. The Philadelphia Lazaretto, established in 1799, was one of the oldest in the country. Detainees were held without trial, without legal representation, and without recourse. Their property was confiscated and often destroyed. Those who died in quarantine were buried in unmarked graves.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePest houses\u003c/strong\u003e — Nearly every American city maintained a \"pest house\" — a facility for the isolation of people with contagious diseases. These facilities ranged from converted buildings to purpose-built structures, and conditions within them were often appalling. Patients were confined against their will, denied visitors, and treated (or untreated) at the discretion of the attending physician. Death rates in pest houses were staggeringly high — not merely from the diseases themselves but from the conditions of confinement.\u003c/p\u003e\n\u003ch3 id=\"the-immigrant-detention-system\"\u003eThe Immigrant Detention System\u003c/h3\u003e\n\u003cp\u003eEllis Island, celebrated in American mythology as the \"gateway to freedom,\" was in reality a quarantine and detention facility where immigrants were examined, interrogated, and in many cases confined for weeks or months. Those deemed \"unfit\" — physically, mentally, or morally — were deported.\u003c/p\u003e\n\u003cp\u003eThe medical examinations at Ellis Island were conducted by Public Health Service physicians who wielded enormous power over the lives of incoming immigrants. A chalk mark on a person's clothing — \"H\" for heart problems, \"L\" for lameness, \"X\" for suspected mental illness — could condemn an individual to detention, further examination, or deportation. These physicians were not independent medical professionals; they were agents of the state, enforcing immigration policies that were shaped by the same eugenics ideology that would later produce forced sterilization programs and, in its most extreme form, the Nazi concentration camps.\u003c/p\u003e\n\u003ch2 id=\"the-typhoid-mary-precedent\"\u003eThe Typhoid Mary Precedent\u003c/h2\u003e\n\u003ch3 id=\"the-case-of-mary-mallon\"\u003eThe Case of Mary Mallon\u003c/h3\u003e\n\u003cp\u003eMary Mallon, known to history as \"Typhoid Mary,\" was an Irish-born cook who was identified as an asymptomatic carrier of typhoid fever in 1907. Mallon was forcibly quarantined — imprisoned — on North Brother Island in New York's East River from 1907 to 1910, then released on the condition that she never work as a cook again.\u003c/p\u003e\n\u003cp\u003eWhen Mallon was found cooking again in 1915 (using a false name), she was re-arrested and returned to North Brother Island, where she remained imprisoned for the rest of her life — 23 years — until her death in 1938.\u003c/p\u003e\n\u003cp\u003eThe Typhoid Mary case established a critical legal precedent: the government has the authority to imprison individuals who pose a public health risk, without trial, without time limit, and without the due process protections guaranteed by the Constitution. This precedent has been invoked repeatedly in the century since — and it forms the legal basis for the modern quarantine powers that FEMA and the CDC exercise today.\u003c/p\u003e\n\u003ch3 id=\"the-questions-nobody-asked\"\u003eThe Questions Nobody Asked\u003c/h3\u003e\n\u003cp\u003eSeveral aspects of the Typhoid Mary case deserve scrutiny:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eWhy was Mallon the only person imprisoned?\u003c/strong\u003e During the same period, there were dozens of identified typhoid carriers in New York City. None of them were imprisoned for life. Mallon was singled out because she was a poor, Irish, Catholic immigrant woman with no political connections — the perfect test case for establishing the principle of indefinite medical detention.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eWho benefited from the precedent?\u003c/strong\u003e The Typhoid Mary case gave the government a legal weapon that could be deployed against any individual or group classified as a \"health risk.\" This weapon would be used against Japanese-Americans during World War II (justified partly on public health grounds), against HIV-positive individuals in the 1980s, and most recently during the COVID-19 pandemic.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eWhere did the legal framework come from?\u003c/strong\u003e The quarantine powers exercised against Mallon originated in maritime law — the same body of law that governed the lazarettos and that, researchers have argued, forms the hidden legal basis for much of the government's emergency authority. This maritime law framework, as \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e documents, was designed to circumvent constitutional protections.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"the-internment-precedent\"\u003eThe Internment Precedent\u003c/h2\u003e\n\u003ch3 id=\"japanese-american-internment\"\u003eJapanese-American Internment\u003c/h3\u003e\n\u003cp\u003eOn February 19, 1942, President Franklin Roosevelt signed Executive Order 9066, authorizing the forced relocation and internment of approximately 120,000 Japanese-Americans. The internees — the majority of whom were American citizens — were stripped of their property, confined in camps surrounded by barbed wire and guard towers, and held for up to four years.\u003c/p\u003e\n\u003cp\u003eThe official justification was \"military necessity\" — the claim that Japanese-Americans posed a security risk. But public health language was also used to justify the internment: Japanese-Americans were described as a \"contamination\" and a \"disease\" that needed to be \"quarantined\" from the healthy body politic.\u003c/p\u003e\n\u003cp\u003eThe internment camps were, in every meaningful sense, FEMA camps before FEMA. They demonstrated that the United States government was willing and able to round up an entire ethnic group, confine them in camps, and strip them of their constitutional rights — all under the authority of executive order.\u003c/p\u003e\n\u003ch2 id=\"fema-and-continuity-of-government\"\u003eFEMA and Continuity of Government\u003c/h2\u003e\n\u003ch3 id=\"executive-orders-and-emergency-powers\"\u003eExecutive Orders and Emergency Powers\u003c/h3\u003e\n\u003cp\u003eFEMA, created by Executive Order 12127 in 1979, inherited the emergency powers that had been accumulating in the executive branch since the Civil War. These powers, codified in a series of executive orders, give FEMA extraordinary authority during a declared emergency:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eExecutive Order 10990\u003c/strong\u003e: Government can take over all modes of transportation\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExecutive Order 10995\u003c/strong\u003e: Government can seize communications media\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExecutive Order 10998\u003c/strong\u003e: Government can take over food resources and farms\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExecutive Order 11000\u003c/strong\u003e: Government can mobilize civilians into work brigades\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExecutive Order 11001\u003c/strong\u003e: Government can take over health, education, and welfare functions\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExecutive Order 11002\u003c/strong\u003e: The Postmaster General can conduct a national registration of all persons\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExecutive Order 11004\u003c/strong\u003e: Government can relocate communities and designate areas to be abandoned\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese executive orders, which can be activated by a presidential declaration of emergency, give the government the legal authority to do everything that a totalitarian regime would do — suspend civil liberties, confiscate property, conscript labor, and relocate populations. The only prerequisite is a declared emergency.\u003c/p\u003e\n\u003ch3 id=\"the-camps-exist\"\u003eThe Camps Exist\u003c/h3\u003e\n\u003cp\u003eNumerous researchers, journalists, and former government officials have documented the existence of FEMA camp infrastructure across the United States. These facilities include:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDecommissioned military bases that have been maintained in operational condition\u003c/li\u003e\n\u003cli\u003eRailroad facilities with platforms designed for loading and unloading large numbers of people\u003c/li\u003e\n\u003cli\u003eWarehouse and industrial facilities that have been retrofitted with fencing, guard posts, and detention infrastructure\u003c/li\u003e\n\u003cli\u003eThe massive underground facilities at Mount Weather, Virginia, and the Greenbrier resort in West Virginia, which serve as continuity-of-government bunkers\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe government does not deny the existence of these facilities; it simply denies that they are intended for the mass detention of American citizens. But the legal authority exists, the infrastructure exists, and the historical precedent — from lazarettos to Japanese internment — demonstrates that the government has used such authority before.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e connects the dots between government detention programs and mind control operations that use confined populations as experimental subjects.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony reveals that the demonic government operates through fear — the fear of disease, the fear of the enemy, the fear of social exclusion. Every quarantine camp, every detention facility, every emergency order is designed to exploit this fear, to make the population willingly surrender their freedom in exchange for the illusion of safety. As Pittman learned, 97.5% take the wide road to destruction (Matthew 7:13-14), and the wide road is paved with the good intentions of those who obey without question. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eFor documentation, see \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e and \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\
