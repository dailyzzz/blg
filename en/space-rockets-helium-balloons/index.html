3eNASA spends approximately $25 billion per year. SpaceX, Blue Origin, and other private space companies spend billions more. The space industry employs hundreds of thousands of people. Rocket launches are televised globally. Astronauts are celebrated as heroes. And the entire enterprise is built on a narrative that most people accept without question: that rockets carry humans and equipment into outer space.\u003c/p\u003e\n\u003cp\u003eBut what if the rockets are not what they appear to be? What if the massive columns of flame and smoke that accompany every launch serve not as propulsion but as spectacle — a distraction from the real mechanism of ascent? What if the payloads that \"reach orbit\" actually reach their destinations by simpler, cheaper, and more mundane means — including helium balloons?\u003c/p\u003e\n\u003cp\u003eThis is not a question asked lightly. It is a question demanded by evidence — evidence from NASA's own footage, from the behavior of \"spacecraft\" in flight, from the physics of the systems involved, and from the testimony of researchers who have examined the space program with the same skepticism they would apply to any other government claim.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the spiritual realm is the true reality and that the physical world we perceive is shaped by deception. The 97.5% who are failing accept the space narrative on faith — the same way they accept the germ theory narrative, the vitamin narrative, and every other institutional story. They have \"never made Jesus Lord\" — they have made NASA their lord, their source of truth about the cosmos, their replacement for the Creator who declares His glory through the heavens.\u003c/p\u003e\n\u003cp\u003eThe Jesuits have been deeply involved in astronomy and cosmology since the order's founding. Vatican Observatory is run by Jesuit astronomers. Jesuit universities house some of the world's most prominent astronomy departments. Napoleon's \"absolute power\" extends to power over what humanity believes about the cosmos. Adams's \"eternal damnation\" applies to those who deceive the world about creation. And Tambulini's governance of \"half the world\" includes governance over what that world believes about the sky above it.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-evidence\"\u003eThe Evidence\u003c/h2\u003e\n\u003ch3 id=\"the-balloon-connection\"\u003eThe Balloon Connection\u003c/h3\u003e\n\u003cp\u003eNASA has a long and documented history of using high-altitude balloons:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNASA's Scientific Balloon Program\u003c/strong\u003e launches approximately 10-15 large scientific balloons per year\u003c/li\u003e\n\u003cli\u003eThese balloons carry payloads of up to \u003cstrong\u003e8,000 pounds\u003c/strong\u003e to altitudes of \u003cstrong\u003e130,000 feet\u003c/strong\u003e (approximately 25 miles)\u003c/li\u003e\n\u003cli\u003eThe balloons are \u003cstrong\u003eenormous\u003c/strong\u003e — when fully inflated at altitude, they can be as large as a football stadium\u003c/li\u003e\n\u003cli\u003eNASA uses balloons for \u003cstrong\u003eastronomical observation, atmospheric research, and technology testing\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eSome balloon missions carry instruments that are later claimed to have been \"in space\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe existence of NASA's balloon program is not disputed — it is a matter of public record. The question is whether the balloon program is more extensive than publicly acknowledged, and whether some \"space missions\" are actually balloon missions rebranded for public consumption.\u003c/p\u003e\n\u003ch3 id=\"visual-evidence\"\u003eVisual Evidence\u003c/h3\u003e\n\u003cp\u003eCareful analysis of rocket launch footage and \"space\" footage has raised questions:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLaunch behavior\u003c/strong\u003e: After the initial phase of visible rocket propulsion, many launches enter a phase where the vehicle is no longer visible — it is \"above the clouds\" or \"out of camera range.\" What happens during this invisible phase cannot be independently verified.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTrajectory curves\u003c/strong\u003e: Some researchers have observed that rocket trajectories curve and eventually move horizontally rather than continuing upward — a behavior more consistent with reaching a buoyancy equilibrium (like a balloon) than with achieving escape velocity.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFootage anomalies\u003c/strong\u003e: NASA footage from \"space\" has been scrutinized for anomalies including:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBubbles visible in \"spacewalk\" footage, suggesting underwater filming\u003c/li\u003e\n\u003cli\u003eHarness systems visible on \"floating\" astronauts\u003c/li\u003e\n\u003cli\u003eGreen screen artifacts in ISS footage\u003c/li\u003e\n\u003cli\u003eInconsistent lighting and shadows\u003c/li\u003e\n\u003cli\u003eHair behavior inconsistent with zero gravity\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eBalloon sightings\u003c/strong\u003e: High-altitude balloons are occasionally visible from the ground and have been reported as \"UFOs.\" The relationship between balloon launches and UFO sightings has been documented by multiple researchers.\u003c/p\u003e\n\u003ch3 id=\"the-physics-questions\"\u003eThe Physics Questions\u003c/h3\u003e\n\u003ch4 id=\"rocket-fuel-and-payload\"\u003eRocket Fuel and Payload\u003c/h4\u003e\n\u003cp\u003eThe physics of rocketry involve a fundamental problem: the rocket must carry the fuel that will propel it, and carrying fuel requires more fuel to carry the fuel. This is the \"tyranny of the rocket equation,\" and it severely limits what rockets can actually accomplish.\u003c/p\u003e\n\u003cp\u003eAccording to NASA's own figures, the Saturn V rocket (which allegedly carried astronauts to the moon) had a gross weight of \u003cstrong\u003e6.5 million pounds\u003c/strong\u003e, of which approximately \u003cstrong\u003e6 million pounds\u003c/strong\u003e was fuel. The remaining \u003cstrong\u003e500,000 pounds\u003c/strong\u003e included the rocket structure and the payload — meaning that over 92% of the rocket's weight was fuel.\u003c/p\u003e\n\u003cp\u003eSome researchers have questioned whether a vehicle that is 92% fuel can actually achieve the velocities and distances claimed. The mathematics of the rocket equation are well-established, but the assumptions that feed into the equation — the efficiency of the engines, the energy density of the fuel, the trajectory parameters — are provided by NASA itself and cannot be independently verified.\u003c/p\u003e\n\u003ch4 id=\"the-van-allen-belts\"\u003eThe Van Allen Belts\u003c/h4\u003e\n\u003cp\u003eThe Van Allen radiation belts — zones of intense radiation surrounding the Earth — present a potentially lethal barrier to human space travel. NASA acknowledges the belts but claims that Apollo astronauts passed through them too quickly to receive dangerous radiation doses.\u003c/p\u003e\n\u003cp\u003eThis claim has been questioned by researchers who note:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe radiation levels in the belts are sufficient to damage electronic equipment and harm biological tissue\u003c/li\u003e\n\u003cli\u003eThe Apollo spacecraft's aluminum hull would have provided minimal radiation shielding\u003c/li\u003e\n\u003cli\u003eNASA's own contemporary documents expressed concern about Van Allen belt radiation\u003c/li\u003e\n\u003cli\u003eNo subsequent manned mission has traveled through the Van Allen belts since Apollo\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-financial-evidence\"\u003eThe Financial Evidence\u003c/h3\u003e\n\u003cp\u003eNASA's budget — $25 billion annually — represents an enormous flow of public money into an organization with minimal independent oversight. The money flows to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNASA facilities\u003c/strong\u003e across the country\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDefense contractors\u003c/strong\u003e (Boeing, Lockheed Martin, Northrop Grumman, SpaceX)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResearch institutions\u003c/strong\u003e and universities\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInternational partners\u003c/strong\u003e (ESA, JAXA, Roscosmos)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe financial incentive to maintain the space narrative is enormous. Thousands of jobs, billions in contracts, and national prestige depend on the public's belief that NASA is actually sending vehicles and people into space. Any disclosure that the program is less than what it claims would trigger financial and political consequences of unprecedented scale.\u003c/p\u003e\n\u003ch2 id=\"the-nasa-deception-pattern\"\u003eThe NASA Deception Pattern\u003c/h2\u003e\n\u003ch3 id=\"operation-paperclip-scientists\"\u003eOperation Paperclip Scientists\u003c/h3\u003e\n\u003cp\u003eNASA was founded in 1958, and its early leadership included numerous scientists recruited from Nazi Germany through Operation Paperclip. The most famous was \u003cstrong\u003eWernher von Braun\u003c/strong\u003e, the former SS officer who developed the V-2 rocket for Nazi Germany and became the director of NASA's Marshall Space Flight Center.\u003c/p\u003e\n\u003cp\u003eVon Braun and his colleagues were experts in propaganda as well as engineering. The Nazi regime used spectacle — massive rallies, dramatic displays of military power, theatrical leadership — to control public perception. NASA's rocket launches serve a similar function: they are spectacles designed to inspire awe, suppress questioning, and maintain public support for an enormously expensive program.\u003c/p\u003e\n\u003ch3 id=\"compartmentalization\"\u003eCompartmentalization\u003c/h3\u003e\n\u003cp\u003eThe space program operates on the principle of compartmentalization — each worker knows only their specific task and has no visibility into the larger operation. A technician who builds a specific component has no way of knowing whether that component is used as claimed. An engineer who designs a specific system cannot verify that the system performs as described in the classified mission profile.\u003c/p\u003e\n\u003cp\u003eThis compartmentalization means that the vast majority of NASA employees are genuine professionals doing genuine work — they simply have no way of knowing whether the work they do contributes to what the public is told it contributes to. Only those at the highest levels of the organization know the full picture.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"the-firmament\"\u003eThe Firmament\u003c/h3\u003e\n\u003cp\u003eThe Bible describes the heavens in terms that do not match the modern cosmological narrative:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGenesis 1:6-8\u003c/strong\u003e describes a \"firmament\" separating \"the waters which were under the firmament from the waters which were above the firmament\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGenesis 1:14-17\u003c/strong\u003e describes lights \"set in the firmament\" — not floating in infinite space\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePsalm 19:1\u003c/strong\u003e declares that \"the heavens declare the glory of God; and the firmament sheweth his handywork\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePsalm 104:2\u003c/strong\u003e describes God stretching \"out the heavens like a curtain\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIsaiah 40:22\u003c/strong\u003e describes God sitting \"upon the circle of the earth\" and stretching \"out the heavens as a curtain, and spreadeth them out as a tent to dwell in\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe biblical cosmology describes a created space — bounded, purposeful, and designed by God. The modern cosmological narrative describes an infinite, meaningless void in which Earth is an insignificant speck. These two views are irreconcilable, and the choice between them is ultimately a spiritual one.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-cosmological-agenda\"\u003eThe Jesuit Cosmological Agenda\u003c/h3\u003e\n\u003cp\u003eThe Jesuit order has been deeply involved in shaping modern cosmology. Jesuit astronomers:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRun the \u003cstrong\u003eVatican Observatory\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eContributed to the development of \u003cstrong\u003eBig Bang theory\u003c/strong\u003e (Georges Lemaitre, a Catholic priest)\u003c/li\u003e\n\u003cli\u003eOperate telescopes and research programs at Jesuit universities worldwide\u003c/li\u003e\n\u003cli\u003ePublished extensively on cosmology and the compatibility of faith with modern science\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Jesuit agenda in cosmology is the same as their agenda everywhere: control the narrative. By controlling what humanity believes about the cosmos — whether the universe is the purposeful creation of God or an accidental void of infinite emptiness — the Jesuits control humanity's relationship with its Creator.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown three heavens — not infinite empty space. The biblical model of creation places Earth at the center of God's purpose, with the heavens declaring His glory. The NASA model places Earth in a meaningless void, with the heavens declaring nothing. The choice between these models is the choice between faith and materialism — between God and the institutions that have replaced Him.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — NASA analysis, balloon program research, and space fraud investigation\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — the three heavens and the biblical cosmology\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit control of cosmological narrative\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- NASA Scientific Balloon Program documentation\u003c/li\u003e\n\u003cli\u003eOperation Paperclip historical records\u003c/li\u003e\n\u003cli\u003eVan Allen radiation belt research\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sources-and-references\"\u003eSources and References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space
