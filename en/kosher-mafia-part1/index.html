003c/blockquote\u003e\n\u003cp\u003eEvery product you buy at the grocery store carries a hidden tax you never voted for, never consented to, and probably never noticed. Look at the packaging of almost any food product in your pantry — cereal, canned goods, snacks, beverages — and you will find a small symbol: a U inside a circle, a K, a star-K, or one of dozens of similar marks. These are kosher certification symbols, and they represent a multi-billion-dollar industry that operates entirely outside public scrutiny.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed a spiritual realm governed by hierarchy and territory. Demons operate through systems — economic, religious, cultural — that harvest spiritual energy from an unaware population. Pittman was told that 97.5 percent of Christians were rejected at death, that 95 percent serve \"self,\" and that every word carries spiritual weight (Matthew 12:36-37). The kosher certification system is one of the economic systems through which the principalities and powers of Ephesians 6:12 exercise control — a system that taxes the food supply while hiding in plain sight.\u003c/p\u003e\n\u003cp\u003eThe Jesuits — Loyola's military organization of \"absolute power\" (Napoleon), governing \"all the world\" (Tamburini) — have historically operated through financial systems designed to extract wealth while maintaining institutional control. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals their infiltration \"cloaked with cunning\" and blind obedience. The kosher mafia operates by the same principles: invisible authority, mandatory compliance, and the elimination of those who resist.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-is-kosher-certification\"\u003eWhat Is Kosher Certification?\u003c/h2\u003e\n\u003ch3 id=\"the-symbols-you-never-noticed\"\u003eThe Symbols You Never Noticed\u003c/h3\u003e\n\u003cp\u003eKosher certification is a system by which food products are inspected and approved as conforming to Jewish dietary law (kashrut). The certification is performed by private organizations — not government agencies — that charge manufacturers fees for the inspection and the right to display the kosher symbol on their packaging.\u003c/p\u003e\n\u003cp\u003eThe largest certifying organizations include the Orthodox Union (OU), OK Kosher, Star-K, and Kof-K. Together, they certify over 80 percent of packaged food in the United States. This means that the vast majority of food products Americans buy have been subjected to a private religious inspection and carry the cost of that inspection in their price.\u003c/p\u003e\n\u003cp\u003eThe cost is passed to the consumer. Every kosher-certified product costs more than it would without certification — the fees paid by manufacturers are embedded in the price. This is, in effect, a religious tax on the food supply, paid by consumers of all faiths (and no faith) without their knowledge or consent.\u003c/p\u003e\n\u003cp\u003eAgent131711 has documented extensively on Substack (agent131711.substack.com) how this system operates as a shadow industry — generating billions in revenue while remaining invisible to the average consumer. The symbols are small. The fees are undisclosed. And the organizations that collect them operate with the opacity of intelligence agencies.\u003c/p\u003e\n\u003ch3 id=\"the-scale-of-the-operation\"\u003eThe Scale of the Operation\u003c/h3\u003e\n\u003cp\u003eConservative estimates place the kosher certification market at over $12 billion annually in the United States alone. This includes not only food products but cleaning supplies, pharmaceuticals, cosmetics, and even aluminum foil. The scope of kosher certification has expanded far beyond dietary law into a universal commercial regime that touches virtually every manufactured product.\u003c/p\u003e\n\u003cp\u003eJewish Americans constitute approximately 2 percent of the U.S. population. Of those, only a fraction strictly observes kashrut. Yet over 40 percent of packaged food products in the U.S. are kosher certified. The market being served is vastly larger than the community whose religious law the certification supposedly enforces.\u003c/p\u003e\n\u003cp\u003eThis disparity raises an obvious question: if kosher certification serves a small religious community, why does it cover the majority of the food supply? The answer lies in the certification industry's business model, which generates revenue not by serving consumers but by taxing manufacturers — who pass the cost to all consumers regardless of their faith.\u003c/p\u003e\n\u003ch2 id=\"how-the-system-works\"\u003eHow the System Works\u003c/h2\u003e\n\u003ch3 id=\"the-certification-process\"\u003eThe Certification Process\u003c/h3\u003e\n\u003cp\u003eA food manufacturer seeking kosher certification contacts a certifying agency. The agency sends a rabbi (mashgiach) to inspect the facility, the ingredients, the equipment, and the production processes. If everything meets kashrut standards, the agency grants certification and the manufacturer pays a fee — typically annual, but sometimes per-product.\u003c/p\u003e\n\u003cp\u003eThe fees vary enormously. Small companies may pay a few thousand dollars annually. Large corporations pay millions. The exact fees are almost never publicly disclosed — they are protected by non-disclosure agreements between the certifying agency and the manufacturer. This secrecy is itself significant: a religious tax on the food supply operates under the same confidentiality rules as classified intelligence operations.\u003c/p\u003e\n\u003cp\u003eThe manufacturer then displays the certifying agency's symbol on its packaging. This symbol is not legally required. No government mandate compels kosher certification. It is a private arrangement between private entities, imposed on the food supply by the gravitational pull of the certifying agencies' market power.\u003c/p\u003e\n\u003ch3 id=\"why-companies-comply\"\u003eWhy Companies Comply\u003c/h3\u003e\n\u003cp\u003eCompanies seek kosher certification not because consumers demand it but because retailers demand it. Major grocery chains prefer kosher-certified products because they simplify inventory management — a kosher-certified product can be sold to all consumers, including the kosher-observant minority. Manufacturers that refuse certification risk losing shelf space to competitors that comply.\u003c/p\u003e\n\u003cp\u003eThis creates a coercive dynamic that mirrors the Jesuit model of institutional control. The certifying agencies do not need to force anyone. The system's architecture creates compliance automatically. Just as the Jesuits governed \"all the world\" (Tamburini) without overt force — through education, confession, and institutional placement — the kosher certification system governs the food supply through market pressure, retailer requirements, and the threat of commercial exclusion.\u003c/p\u003e\n\u003ch2 id=\"the-financial-architecture\"\u003eThe Financial Architecture\u003c/h2\u003e\n\u003ch3 id=\"where-the-money-goes\"\u003eWhere the Money Goes\u003c/h3\u003e\n\u003cp\u003eThe billions generated by kosher certification flow to the certifying organizations, which are private religious entities. These organizations are not required to disclose their finances to the public. The Orthodox Union, the largest certifier, is a 501(c)(3) nonprofit organization, but its financial disclosures are limited.\u003c/p\u003e\n\u003cp\u003eThe question of where this money goes — which causes it supports, which institutions it funds, which agendas it advances — is one that the mainstream media has consistently refused to investigate. This is not surprising. The media industry itself is subject to the same institutional pressures that govern the food industry: questioning the kosher certification system is treated as an act of religious bigotry rather than legitimate consumer advocacy.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack work examines these financial flows in detail, tracing connections between the certifying organizations and larger institutional networks. The pattern that emerges is familiar: private religious authority extracting wealth from a secular population through mechanisms that operate outside democratic oversight.\u003c/p\u003e\n\u003ch3 id=\"the-hidden-tax-calculation\"\u003eThe Hidden Tax Calculation\u003c/h3\u003e\n\u003cp\u003eIf kosher certification adds even one cent to the price of a product, and if that product is purchased by 330 million Americans, the aggregate cost is $3.3 million per product per year. Multiply this across the tens of thousands of certified products, and the hidden tax reaches into the billions.\u003c/p\u003e\n\u003cp\u003eThis is not a tax levied by a government. It is not subject to democratic debate, legislative oversight, or voter approval. It is a private religious levy on the food supply of an entire nation, collected by organizations that operate with the secrecy of intelligence agencies and the authority of religious law.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was told that the spiritual realm operates through systems that most people cannot see. The kosher certification system is one such system — invisible to most consumers, accountable to no public authority, and generating wealth that flows through channels hidden from public view. The principalities and powers of Ephesians 6:12 operate through precisely these kinds of invisible systems.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"food-as-spiritual-territory\"\u003eFood as Spiritual Territory\u003c/h3\u003e\n\u003cp\u003eThe Bible teaches that food is spiritual territory. The first sin involved eating. The laws of kashrut are, at their origin, spiritual laws — they define the boundary between the clean and the unclean, the permissible and the forbidden. Control of food is control of the most basic human need, and whoever controls food controls the population.\u003c/p\u003e\n\u003cp\u003eThe Jesuits understood this. Their missions around the world always involved agriculture — controlling the food supply was a prerequisite for controlling the community. The kosher certification system operates on the same principle: by controlling the certification of food, the certifying agencies exercise authority over the most fundamental aspect of human existence.\u003c/p\u003e\n\u003cp\u003eThe Saturn system, as documented throughout this series, operates through material control — binding consciousness to the physical world through economic, social, and dietary mechanisms. The kosher certification system is one such mechanism: a religious authority claiming jurisdiction over material sustenance, extracting tribute from the population while remaining invisible to all but the most observant.\u003c/p\u003e\n\u003cp\u003eThis is Part 1. In Parts 2 and 3, we will examine the shadow industry driving food prices through the roof and follow the rabbi hole deeper into the kosher mafia's operations.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li
