03eWhen people claim that V2K technology doesn't exist, there is a simple, definitive response: \u003cstrong\u003ethe patents\u003c/strong\u003e. The United States Patent and Trademark Office has granted multiple patents for devices that transmit audio directly into the human brain using electromagnetic radiation. These patents are public records. They describe working technology. They name the inventors and the assignees. And they prove, beyond any reasonable doubt, that voice-to-skull technology is real.\u003c/p\u003e\n\u003cp\u003eThis is Part 10 of our V2K series. We have traced the technology from personal experience through military history, disinformation campaigns, intelligence networks, family targeting, psychiatric weaponization, the alien psyop, covert microchipping, and cell tower infrastructure. Now we present the most irrefutable evidence of all: the patents themselves.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was told that words have spiritual power and that truth endures forever. Patents are legal documents — words given the authority of law. The V2K patents are words of truth that endure in the public record, immune to the disinformation campaigns, the psychiatric dismissals, and the media blackouts that protect this technology. They are the lip of truth established forever — proof that cannot be gaslit away.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' infiltration \"cloaked with cunning\" relies on information control. But patents are designed to be public. The very system of intellectual property that the establishment uses to generate profit also generates evidence of its own weapons. Napoleon's \"absolute power\" is constrained by its own paperwork. And that paperwork proves everything we have been saying.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-key-patents\"\u003eThe Key Patents\u003c/h2\u003e\n\u003ch3 id=\"us-patent-4877027--hearing-system-1989\"\u003eUS Patent 4,877,027 — \"Hearing System\" (1989)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eInventor\u003c/strong\u003e: Wayne B. Brunkan\n\u003cstrong\u003eFiled\u003c/strong\u003e: August 10, 1987\n\u003cstrong\u003eGranted\u003c/strong\u003e: October 31, 1989\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAbstract\u003c/strong\u003e: \"Sound is induced in the head of a person by radiating the head with microwaves in the range of 100 megahertz to 10,000 megahertz that are modulated with a particular waveform.\"\u003c/p\u003e\n\u003cp\u003eThis patent describes a device that converts audio (speech, music, tones) into modulated microwave radiation and transmits it to a human target. The target hears the audio inside their head without any external speaker or earpiece.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKey claims\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe device transmits sound directly into the human head using microwave radiation\u003c/li\u003e\n\u003cli\u003eThe frequency range (100 MHz to 10 GHz) encompasses cell phone and cell tower frequencies\u003c/li\u003e\n\u003cli\u003eThe modulation waveform is specifically designed to produce the microwave auditory effect\u003c/li\u003e\n\u003cli\u003eThe invention can transmit intelligible speech\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis patent alone is sufficient to prove that V2K technology exists. It describes a complete system for transmitting audio into a person's brain via microwave radiation, and it was granted by the US Patent Office after examination — meaning the technology was demonstrated to work.\u003c/p\u003e\n\u003ch3 id=\"us-patent-6470214--method-and-device-for-implementing-the-radio-frequency-hearing-effect-2002\"\u003eUS Patent 6,470,214 — \"Method and Device for Implementing the Radio Frequency Hearing Effect\" (2002)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eInventor\u003c/strong\u003e: James P. O'Loughlin, Diana L. Loree\n\u003cstrong\u003eAssignee\u003c/strong\u003e: The United States of America as represented by the Secretary of the Air Force\n\u003cstrong\u003eFiled\u003c/strong\u003e: December 13, 1996\n\u003cstrong\u003eGranted\u003c/strong\u003e: October 22, 2002\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAbstract\u003c/strong\u003e: \"A modulation process with a fully suppressed carrier and input preprocessor filtering to produce an idealized representation of a desired sound.\"\u003c/p\u003e\n\u003cp\u003eThis patent is assigned to the \u003cstrong\u003eUS Air Force\u003c/strong\u003e — proving direct military involvement in V2K technology development. It describes improvements to the microwave auditory effect that allow the transmission of more complex audio, including intelligible speech.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKey significance\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe patent is assigned to the US military, confirming military development of V2K\u003c/li\u003e\n\u003cli\u003eIt describes a method for transmitting speech, not just tones or clicks\u003c/li\u003e\n\u003cli\u003eThe technology allows audio to be transmitted without any receiver device — the human brain is the receiver\u003c/li\u003e\n\u003cli\u003eThe filing date (1996) shows that this technology was operational at least 30 years ago\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"us-patent-6587729--apparatus-for-audibly-communicating-speech-using-the-radio-frequency-hearing-effect-2003\"\u003eUS Patent 6,587,729 — \"Apparatus for Audibly Communicating Speech Using the Radio Frequency Hearing Effect\" (2003)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eInventor\u003c/strong\u003e: James P. O'Loughlin, Diana L. Loree\n\u003cstrong\u003eAssignee\u003c/strong\u003e: The United States of America as represented by the Secretary of the Air Force\n\u003cstrong\u003eFiled\u003c/strong\u003e: April 24, 2002\n\u003cstrong\u003eGranted\u003c/strong\u003e: July 1, 2003\u003c/p\u003e\n\u003cp\u003eThis is a continuation of Patent 6,470,214, describing a specific apparatus for implementing the radio frequency hearing effect. Again assigned to the US Air Force, it provides additional technical details on the hardware implementation of V2K.\u003c/p\u003e\n\u003ch3 id=\"us-patent-3951134--apparatus-and-method-for-remotely-monitoring-and-altering-brain-waves-1976\"\u003eUS Patent 3,951,134 — \"Apparatus and Method for Remotely Monitoring and Altering Brain Waves\" (1976)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eInventor\u003c/strong\u003e: Robert G. Malech\n\u003cstrong\u003eFiled\u003c/strong\u003e: August 5, 1974\n\u003cstrong\u003eGranted\u003c/strong\u003e: April 20, 1976\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAbstract\u003c/strong\u003e: \"Apparatus for and method of sensing brain waves at a position remote from a subject whereby electromagnetic signals of different frequencies are simultaneously transmitted toward the subject.\"\u003c/p\u003e\n\u003cp\u003eThis patent goes beyond audio transmission — it describes a system for both \u003cstrong\u003emonitoring\u003c/strong\u003e and \u003cstrong\u003ealtering\u003c/strong\u003e brain waves remotely using electromagnetic radiation. This is two-way V2K: not just putting sounds in, but reading the brain's response.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKey significance\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRemote brain wave monitoring without physical contact\u003c/li\u003e\n\u003cli\u003eRemote brain wave alteration without physical contact\u003c/li\u003e\n\u003cli\u003eFiled in 1974 — over 50 years ago\u003c/li\u003e\n\u003cli\u003eThe technology for reading thoughts and modifying brain activity has existed for half a century\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"additional-patents\"\u003eAdditional Patents\u003c/h3\u003e\n\u003cp\u003eMultiple additional patents document related technologies:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUS Patent 5,159,703\u003c/strong\u003e (1992): \"Silent Subliminal Presentation System\" — a system for transmitting subliminal audio using silent frequencies\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUS Patent 4,858,612\u003c/strong\u003e (1989): \"Hearing Device\" — an alternative method for inducing sound perception\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUS Patent 6,011,991\u003c/strong\u003e (2000): \"Communication System and Method Including Brain Wave Analysis\" — brain-computer interface through electromagnetic means\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUS Patent 7,629,918\u003c/strong\u003e (2009): \"Multifunctional Radio Frequency Directed Energy System\" — a weapon system that includes audio transmission capability\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"what-the-patents-prove\"\u003eWhat the Patents Prove\u003c/h2\u003e\n\u003ch3 id=\"proof-of-existence\"\u003eProof of Existence\u003c/h3\u003e\n\u003cp\u003eThe patents prove that V2K technology:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eExists\u003c/strong\u003e — the US Patent Office granted patents for working devices\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIs military\u003c/strong\u003e — multiple patents are assigned to the US Air Force\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTransmits speech\u003c/strong\u003e — not just tones, but intelligible words and sentences\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorks without implants\u003c/strong\u003e — the human brain itself is the receiver\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHas been developing for decades\u003c/strong\u003e — patents date back to the 1970s\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIncludes two-way capability\u003c/strong\u003e — both transmitting audio in and reading brain activity out\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"proof-of-deployment\"\u003eProof of Deployment\u003c/h3\u003e\n\u003cp\u003eWhile the patents themselves do not prove deployment, the combination of:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePatented technology\u003c/li\u003e\n\u003cli\u003eMilitary assignment\u003c/li\u003e\n\u003cli\u003eClassified programs (MEDUSA, Voice of God weapon)\u003c/li\u003e\n\u003cli\u003eThousands of targeted individual reports\u003c/li\u003e\n\u003cli\u003eDocumented military use in Iraq\u003c/li\u003e\n\u003cli\u003eMassive defense contractor involvement\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e...creates an evidentiary chain that goes far beyond reasonable doubt. The technology exists, the military developed it, the military has used it, and civilians report being targeted by it. The patents are the keystone in this evidentiary arch.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-significance\"\u003eThe Spiritual Significance\u003c/h2\u003e\n\u003ch3 id=\"words-made-manifest\"\u003eWords Made Manifest\u003c/h3\u003e\n\u003cp\u003eHoward Pittman was told that words have spiritual power. The V2K patents are words made manifest — legal documents that testify to the existence of a weapon aimed at the human mind. These words cannot be unsaid, cannot be unpatented, cannot be retracted. They are permanent testimony in the public record.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' practice of deception \"cloaked with cunning\" is undermined by their own system. The patent system — designed to protect intellectual property and generate profit — also generates evidence. The weapons of control leave a paper trail. And that paper trail leads directly to the truth.\u003c/p\u003e\n\u003cp\u003eThe principalities and powers of Ephesians 6:12 operate through deception. But God ensures that the truth is preserved — in the Word of God, in the testimony of witnesses like Howard Pittman, and yes, in the public records of the US Patent Office. \"The lip of truth shall be established for ever.\"\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u00
