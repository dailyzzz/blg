t thou judge thy neighbour.\" — Leviticus 19:15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eWhen David sinned with Bathsheba and arranged the death of her husband Uriah, no human institution held him accountable. He was the king — above the law by earthly measure. But God sent the prophet Nathan, who told David a parable about a rich man who stole a poor man's only lamb. David pronounced judgment on the rich man, and Nathan declared: \"Thou art the man.\" The most powerful entity in the land was held accountable — not by an institution of greater power, but by truth spoken by one who feared God more than the king.\u003c/p\u003e\n\u003cp\u003eAs the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/101-Fight_of_Faith.mp4\"\u003eFight of Faith\u003c/a\u003e proclaims, the fight for justice requires courage — the willingness to confront the powerful, to name the crime, and to pursue accountability regardless of the odds. Pfizer is the richest pharmaceutical company on Earth. The PREP Act shields it from federal liability. But Florida's legal framework offers a path that bypasses the federal fortress.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prep-act-problem-and-the-state-solution\"\u003eThe PREP Act Problem and the State Solution\u003c/h2\u003e\n\u003cp\u003eThe PREP Act provides federal immunity to manufacturers of \"covered countermeasures\" during declared public health emergencies. This immunity has been the primary obstacle to holding Pfizer accountable for injuries caused by its COVID-19 injection.\u003c/p\u003e\n\u003cp\u003eHowever, legal scholars and Florida practitioners have identified potential state-law pathways that may not be preempted by the PREP Act:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eState criminal law is not preempted.\u003c/strong\u003e The PREP Act provides immunity from civil liability — lawsuits for monetary damages. It does not explicitly provide immunity from state criminal prosecution. If Pfizer's conduct constituted a violation of Florida criminal statutes — including fraud, battery, manslaughter, or racketeering — the PREP Act's civil immunity may not apply.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFraud vitiates immunity.\u003c/strong\u003e Legal doctrine holds that fraud vitiates (nullifies) all agreements, contracts, and legal protections obtained through fraud. If Pfizer obtained its EUA through fraudulent clinical trial data — as alleged by whistleblower Brook Jackson and documented through FOIA-released documents — then the legal protections associated with that EUA, including PREP Act immunity, may be voidable.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eState consumer protection laws.\u003c/strong\u003e Florida's Deceptive and Unfair Trade Practices Act (FDUTPA) provides protections against fraudulent business practices that may operate independently of federal preemption.\u003c/p\u003e\n\u003cp\u003eKaren Kingston has provided extensive legal analysis in The Kingston Report (karenkingston.substack.com): \"The PREP Act is a federal civil liability shield. It was never designed to — and constitutionally cannot — shield a corporation from state criminal prosecution. If Pfizer committed fraud in obtaining its EUA, if it knowingly distributed a product that caused harm without adequate warning, if it concealed safety data that would have changed the risk-benefit calculus for individual patients — these are criminal acts under Florida law, and the PREP Act does not provide immunity from criminal prosecution.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-criminal-pathways\"\u003eThe Criminal Pathways\u003c/h2\u003e\n\u003ch3 id=\"1-fraud-florida-statute-section-817\"\u003e1. Fraud (Florida Statute Section 817)\u003c/h3\u003e\n\u003cp\u003eFlorida's fraud statutes criminalize the knowing and intentional misrepresentation of material facts for the purpose of obtaining a benefit (including monetary benefit) or causing harm. If Pfizer:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMisrepresented clinical trial data to the FDA to obtain Emergency Use Authorization\u003c/li\u003e\n\u003cli\u003eMisrepresented the safety profile of its product to the public, healthcare providers, and patients\u003c/li\u003e\n\u003cli\u003eConcealed adverse event data that would have altered individual risk-benefit decisions\u003c/li\u003e\n\u003cli\u003eRepresented the product as a \"vaccine\" when it did not meet the traditional definition (preventing infection and transmission)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEach of these acts could constitute criminal fraud under Florida law.\u003c/p\u003e\n\u003ch3 id=\"2-aggravated-battery-florida-statute-section-784045\"\u003e2. Aggravated Battery (Florida Statute Section 784.045)\u003c/h3\u003e\n\u003cp\u003eUnder Florida law, battery is the intentional touching or striking of another person against their will, or the intentional causing of bodily harm. Aggravated battery involves the use of a deadly weapon or the intentional or knowing causation of great bodily harm.\u003c/p\u003e\n\u003cp\u003eIf Pfizer knowingly distributed a product that caused great bodily harm — and if the \"consent\" obtained from recipients was vitiated by material misrepresentations about the product's safety — then the administration of each dose could constitute a battery.\u003c/p\u003e\n\u003ch3 id=\"3-manslaughter-florida-statute-section-78207\"\u003e3. Manslaughter (Florida Statute Section 782.07)\u003c/h3\u003e\n\u003cp\u003eFlorida's manslaughter statute encompasses the killing of a human being by the act, procurement, or culpable negligence of another, without lawful justification. If Pfizer's product caused deaths, and if Pfizer's conduct in concealing safety data or misrepresenting the product constituted culpable negligence, criminal manslaughter charges could be pursued.\u003c/p\u003e\n\u003ch3 id=\"4-rico-florida-statute-section-895\"\u003e4. RICO (Florida Statute Section 895)\u003c/h3\u003e\n\u003cp\u003eFlorida's Racketeer Influenced and Corrupt Organizations (RICO) Act provides criminal penalties for conducting enterprise affairs through a pattern of racketeering activity. If Pfizer engaged in a pattern of fraudulent conduct — including clinical trial fraud, regulatory fraud, and consumer fraud — across its COVID-19 vaccination program, RICO charges could encompass the entire enterprise.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-process-for-florida-residents\"\u003eThe Process for Florida Residents\u003c/h2\u003e\n\u003cp\u003eFlorida residents seeking to bring criminal charges against Pfizer can pursue the following paths:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGrand jury petition:\u003c/strong\u003e Under Florida law, citizens can petition the court to convene a grand jury to investigate potential criminal conduct. A grand jury has subpoena power, can compel testimony, and can issue indictments.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eState Attorney complaint:\u003c/strong\u003e Florida residents can file criminal complaints with their local State Attorney's office, presenting evidence of criminal conduct and requesting investigation and prosecution.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAttorney General referral:\u003c/strong\u003e Complaints can be directed to the Florida Attorney General's office, which has statewide jurisdiction and the resources to pursue complex criminal cases against corporate defendants.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePrivate criminal prosecution:\u003c/strong\u003e Florida law permits private criminal prosecution in certain circumstances, allowing individuals to retain private attorneys to prosecute criminal cases with court approval.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prophetic-dimension\"\u003eThe Prophetic Dimension\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"The wicked walk on every side, when the vilest men are exalted.\" — Psalm 12:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe wicked walk freely when the justice system protects them from accountability. The PREP Act was designed to enable the wicked to walk freely — to inject experimental products into billions of people and face no consequence regardless of the harm caused.\u003c/p\u003e\n\u003cp\u003eFlorida's criminal law represents a different justice — one that the PREP Act was not designed to reach. The question is whether Florida's legal system possesses the courage and the integrity to apply its criminal statutes to the most powerful pharmaceutical company on Earth.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eFlorida Statutes — Sections 817 (Fraud), 784.045 (Aggravated Battery), 782.07 (Manslaughter), 895 (RICO)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Karen Kingston's legal analysis of state criminal pathways, PREP Act preemption limitations, and fraud vitiates immunity doctrine\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eBrook Jackson v. Pfizer — False Claims Act litigation documents\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePREP Act — 42 U.S.C. Section 247d-6d (civil immunity provisions)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eLeviticus 19:15, Psalm 12:8 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u sted in Justice\u003c/a\u003e — The federal system's refusal to pursue accountability\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/federal-government-pfizer-data-fraud/?lang=en\"\u003eIs It a Crime? Federal Government Assisted Pfizer in Data Fraud\u003c/a\u003e — The fraud that vitiates the immunity\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/florida-ends-vaccine-mandates/?lang=en\"\u003eFlorida Surgeon General Announces End to ALL Vaccine Mandates\u003c/a\u003e — Florida's broader rejection of the pharmaceutical apparatus\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNathan pointed at David and said, \"Thou art the man.\" The most powerful entity in the land was named, accused, and held accountable by one who feared God more than the king. Florida's criminal statutes offer a path that the PREP Act does not reach — a path through which Pfizer can be named, accused, and held accountable for conduct that the federal system has protected. \"The LORD executeth righteousness and judgment for all that are oppressed\" (Psalm 103:6). Whether Florida's legal system rises to this occasion will determine whether the justice system serves the oppressed — or continues to serve the oppressor.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"How Florida Residents Can Bring Criminal Charges Against Pfizer\"}],[\"$\",\"p\",null,{\"style\"
