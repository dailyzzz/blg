nous peoples have been subjected to biological warfare for centuries. From smallpox-infected blankets distributed to Native Americans in the 18th century to forced sterilization programs in the 20th century, the pattern of biological attack on indigenous populations is documented, acknowledged, and undeniable. The mRNA nanotechnology deployment represents the latest chapter in this centuries-old assault -- a biological agent deployed to indigenous populations worldwide under the cover of public health.\u003c/p\u003e\n\u003cp\u003eBut the oppressed are rising. Indigenous nations, drawing on centuries of experience with biological warfare and armed with the evidence of nanotechnology contamination now documented by researchers worldwide, are bringing international tribunal proceedings against those responsible for the latest bioweapon deployment.\u003c/p\u003e\n\u003cp\u003eAs \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/127-The_Overcoming.mp4\"\u003eThe Overcoming\u003c/a\u003e from the Confliction album declares, the promise of victory belongs to those who refuse to submit. And as \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/89-The_Serpent_Crusher.mp4\"\u003eThe Serpent Crusher\u003c/a\u003e proclaims, the Head that crushes the serpent fights on behalf of all who call upon His name.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"historical-context-biological-warfare-against-indigenous-peoples\"\u003eHistorical Context: Biological Warfare Against Indigenous Peoples\u003c/h2\u003e\n\u003ch3 id=\"the-pattern-of-assault\"\u003eThe Pattern of Assault\u003c/h3\u003e\n\u003cp\u003eThe biological targeting of indigenous peoples is among the most well-documented patterns of colonial violence:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSmallpox Distribution (18th-19th Century)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eBritish military commanders, including Lord Jeffrey Amherst, documented the deliberate distribution of smallpox-infected blankets to Native American populations during the French and Indian War. This biological warfare contributed to the decimation of indigenous populations across North America.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eForced Sterilization Programs (20th Century)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe United States government, through the Indian Health Service, forcibly sterilized an estimated 25-50% of Native American women of childbearing age between 1970 and 1976. This program, conducted without informed consent, constituted genocide under the UN Convention on the Prevention and Punishment of the Crime of Genocide.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eUranium Mining and Nuclear Testing\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eIndigenous lands were systematically used for uranium mining and nuclear testing, exposing indigenous populations to radiation levels that caused cancer, birth defects, and genetic damage. The Navajo Nation, Western Shoshone, Marshall Islanders, and Aboriginal Australians are among those most severely affected.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMedical Experimentation\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eIndigenous populations have been subjected to medical experimentation without consent throughout colonial history, including the Tuskegee Syphilis Study (which included Native Americans), nutritional experiments on Canadian First Nations children in residential schools, and pharmaceutical testing in indigenous communities across Latin America and Africa.\u003c/p\u003e\n\u003cp\u003eThe mRNA nanotechnology deployment follows this pattern precisely: a biological agent deployed to indigenous populations without adequate informed consent, without full disclosure of product components, and with institutional mechanisms designed to suppress evidence of harm.\u003c/p\u003e\n\u003ch2 id=\"the-tribunal\"\u003eThe Tribunal\u003c/h2\u003e\n\u003ch3 id=\"the-formation-of-the-alliance\"\u003eThe Formation of the Alliance\u003c/h3\u003e\n\u003cp\u003eIndigenous nations from multiple continents have formed an alliance to bring international tribunal proceedings against the perpetrators of the mRNA bioweapon deployment. The alliance includes:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFirst Nations of Canada and Native American nations of the United States\u003c/li\u003e\n\u003cli\u003eIndigenous peoples of Latin America, including Amazonian nations\u003c/li\u003e\n\u003cli\u003eAboriginal and Torres Strait Islander peoples of Australia\u003c/li\u003e\n\u003cli\u003eMaori people of Aotearoa (New Zealand)\u003c/li\u003e\n\u003cli\u003eIndigenous peoples of Africa\u003c/li\u003e\n\u003cli\u003eIndigenous peoples of the Pacific Islands\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese nations share a common legal framework: indigenous sovereignty. As sovereign nations with inherent rights predating colonial constitutions, indigenous peoples have standing to bring proceedings under international law independent of the nation-states that currently occupy their territories.\u003c/p\u003e\n\u003ch3 id=\"the-charges\"\u003eThe Charges\u003c/h3\u003e\n\u003cp\u003eThe tribunal charges include:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eGenocide\u003c/strong\u003e -- The deployment of biological agents (nanotechnology, SV40 DNA, self-amplifying mRNA) to indigenous populations without informed consent, causing death and serious bodily harm\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eViolation of the Biological Weapons Convention\u003c/strong\u003e -- The development and deployment of biological agents with no justified prophylactic purpose\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eViolation of the United Nations Declaration on the Rights of Indigenous Peoples\u003c/strong\u003e -- which guarantees indigenous peoples the right to free, prior, and informed consent regarding any medical intervention\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eViolation of the Nuremberg Code\u003c/strong\u003e -- Non-consensual medical experimentation on indigenous populations\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEnvironmental genocide\u003c/strong\u003e -- The contamination of indigenous lands, water, and food systems with nanotechnology through environmental vectors\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eAna Mihalcea, MD, PhD, has contributed scientific evidence to the tribunal proceedings through her extensive documentation on her Substack (anamihalceamdphd.substack.com), providing darkfield microscopy evidence from indigenous community members showing nanotechnology contamination consistent with findings in the general population.\u003c/p\u003e\n\u003ch3 id=\"the-evidence-base\"\u003eThe Evidence Base\u003c/h3\u003e\n\u003cp\u003eThe tribunal's evidence includes:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDarkfield microscopy documentation of nanotechnology in indigenous community members' blood\u003c/li\u003e\n\u003cli\u003eSpectroscopic analysis of vaccine vials administered in indigenous communities\u003c/li\u003e\n\u003cli\u003eEpidemiological data showing adverse event patterns in indigenous populations\u003c/li\u003e\n\u003cli\u003eHistorical documentation of biological warfare against indigenous peoples\u003c/li\u003e\n\u003cli\u003eExpert testimony from physicians, scientists, and bioweapons specialists\u003c/li\u003e\n\u003cli\u003eTraditional knowledge and prophecy from indigenous elders regarding the contamination of the blood\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"indigenous-prophecy-and-biblical-prophecy\"\u003eIndigenous Prophecy and Biblical Prophecy\u003c/h2\u003e\n\u003ch3 id=\"the-convergence-of-warnings\"\u003eThe Convergence of Warnings\u003c/h3\u003e\n\u003cp\u003eMany indigenous traditions contain prophecies that parallel biblical warnings about the contamination of the blood and the corruption of the earth in the last days:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eHopi prophecy\u003c/strong\u003e describes a time when \"the rivers will turn red\" and \"the air will be poisoned\" -- consistent with nanotechnology contamination of water systems and atmospheric geoengineering\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLakota prophecy\u003c/strong\u003e speaks of a time when \"the web of life is torn\" and \"all living things are connected to the sickness\" -- consistent with self-spreading nanotechnology that contamines the interconnected biological web\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAboriginal Dreamtime prophecy\u003c/strong\u003e describes disturbances in the land itself -- the earth being changed at a level deeper than the surface\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese indigenous prophetic traditions converge with the biblical warning of Revelation 18:23 -- that all nations would be deceived through pharmakeia. The indigenous nations, who have been the targets of pharmaceutical assault for centuries, recognized the deception early and are now leading the legal resistance.\u003c/p\u003e\n\u003ch3 id=\"the-firmament-in-indigenous-cosmology\"\u003eThe Firmament in Indigenous Cosmology\u003c/h3\u003e\n\u003cp\u003eMany indigenous cosmologies include a concept parallel to the biblical firmament -- a dome or canopy over the earth that defines the boundary of the created world:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe Hopi concept of the \"sky ceiling\"\u003c/li\u003e\n\u003cli\u003eThe Aboriginal concept of the sky as a solid vault\u003c/li\u003e\n\u003cli\u003eMultiple Native American traditions describing the sky as a dome or covering\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese cosmological understandings align with the biblical description of the firmament in Genesis 1:6-8 -- a solid expanse placed over the earth to separate and protect the created realm. The indigenous understanding of the world as a contained, protected space under a dome aligns with the biblical cosmology that modern materialist science has dismissed.\u003c/p\u003e\n\u003cp\u003eThe electromagnetic frequency grid being constructed within this dome -- the 5G towers, the satellites, the ground-based transmitters -- represents, in both indigenous and biblical cosmology, a violation of the sacred space. The dome was placed for protection. The frequency grid transforms it into a prison.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eUnited Nations Declaration on the Rights of Indigenous Peoples (UNDRIP), 2007\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eLawrence, J., \"The Indian Health Service and the Sterilization of Native American Women,\" American Indian Quarterly, 2000\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eVarious indigenous tribunal proceedings and alliance documentation\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eAna Mihalcea, MD, PhD, anamihalceamdphd.substack.com, indigenous community blood analysis\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cp\u003eThese tracks from ZZZ Daily explore the themes in this article:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/255-Vaccine_Of_The_Beast.mp4\"\u003eVaccine Of The Beast\u003c/a\u003e -- The biological weapon deployed on indigenous peoples\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e -- The global coordination targeting all nations\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/179-Engineering_Contagion.mp4\"\u003eEngineering Contagion\u003c/a\u003e -- The engineered agent crossing all borders\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/293-Arrows_In_The_Sky.mp4\"\u003eArrows In The Sky\u003c/a\u003e -- The atmospheric assault on indigenous lands\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFrom the Confliction album:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/127-The_Overcoming.mp4\"\u003eThe Overcoming\u003c/a\u003e -- Victory for those who refuse to submit\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/89-The_Serpent_Crusher.mp4\"\u003eThe Serpent Crusher\u003c/a\u003e -- The crushing of the serpent's biological weapons\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mrna-bioweapons-prohibition/?lang=en\"\u003eThe mRNA Bioweapons Prohibition Case\u003c/a\u003e -- The legal framework for bioweapon classification\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/victory-future-generation/?lang=en\"\u003eVictory For Our Future Generation Against Medical Tyranny\u003c/a\u003e -- The broader resistance movement\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/geoengineering-mitigation-experiment/?lang=en\"\u003eWorldwide Geoengineering Mitigation Intention Experiment\u003c/a\u003e -- Environmental contamination of indigenous lands\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThe indigenous peoples of the earth have endured centuries of biological warfare -- smallpox blankets, forced sterilization, nuclear contamination, and now nanotechnology injection. Each assault was accompanied by assurances of safety or denials of harm. Each assault was eventually documented as deliberate. And each assault has strengthened the resolve of nations that have survived everything the colonial system has deployed against them. The alliance of indigenous nations standing before the international tribunal carries not only legal arguments but the moral authority of peoples who have been the canaries in the coal mine of biological warfare for five hundred years. Their testimony is prophetic. Their courage is historic. And their God -- the Creator recognized by indigenous peoples long before missionaries arrived -- is the same God who executes righteousness and justice for all who are oppressed.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Alliance Of Indigenous Nations International Tribunal Against Bioweapons\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Indigenous nations worldwide unite to bring international tribunal proceedings against the deployment of mRNA bioweapons on their sovereign p
