cp\u003ePay no attention to the man behind the curtain. This is the central message of L. Frank Baum's 1900 novel and its iconic 1939 film adaptation — a message so subversive, so revelatory, so dangerous to the power structure that it had to be disguised as a children's story. The Wizard of Oz is not a fairy tale. It is a blueprint for understanding how the world actually works: through fear, illusion, and the systematic suppression of the individual's innate power.\u003c/p\u003e\n\u003cp\u003eHoward Pittman, during his near-death experience, saw behind the curtain of the spiritual realm. Three heavens. Demonic hierarchy in the second. 97.5 percent of Christians rejected — they had \"never made Me Lord.\" Pittman witnessed the man behind the curtain: a vast, organized system of deception that operates through fear, hierarchy, and the illusion of overwhelming power. The Wizard of Oz describes the same system in allegorical terms.\u003c/p\u003e\n\u003cp\u003eThe Jesuits are the wizards of the real world. Loyola's military organization wielding Napoleon's \"absolute power.\" Adams's \"eternal damnation.\" Tamburini governing \"all the world\" from behind a curtain — literally, from a single room. Clement XIV poisoned when he pulled the curtain aside. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals the method: infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The Jesuits operate exactly as the Wizard operates: projecting terrifying power while hiding their true nature behind a curtain of institutional authority.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-yellow-brick-road-the-path-of-gold\"\u003eThe Yellow Brick Road: The Path of Gold\u003c/h2\u003e\n\u003ch3 id=\"following-the-money\"\u003eFollowing the Money\u003c/h3\u003e\n\u003cp\u003eDorothy is told to follow the Yellow Brick Road to reach the Emerald City. Yellow bricks are gold bricks. The road to power, in the real world, is paved with gold — with money, finance, and the control of currency. L. Frank Baum wrote \u003cem\u003eThe Wonderful Wizard of Oz\u003c/em\u003e during a period of intense debate over the gold standard in America, and many scholars have interpreted the story as a monetary allegory.\u003c/p\u003e\n\u003cp\u003eThe Emerald City is green — the color of money, the color of the Federal Reserve note. To enter, visitors must wear green-tinted glasses, which make everything appear emerald-colored. This is the most powerful metaphor in the story: the illusion of value is maintained by forcing everyone to view the world through the same lens. Remove the glasses, and the city is ordinary. Remove the programming, and the financial system is revealed as the fraud it is.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' connection to global finance runs deep. The banking families that created the Federal Reserve system have documented connections to Jesuit-educated networks. The financial system — which keeps the population in debt bondage through mortgages (death pledges), credit cards, and student loans — is the Yellow Brick Road. It promises liberation. It delivers to the Wizard's city.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) how the financial system functions as a control mechanism, extracting labor from the population while directing wealth to the institutions that manage the system. The Yellow Brick Road does not lead to freedom. It leads to the Wizard — and the Wizard is a fraud.\u003c/p\u003e\n\u003ch3 id=\"the-silver-slippers\"\u003eThe Silver Slippers\u003c/h3\u003e\n\u003cp\u003eIn Baum's original novel, Dorothy's slippers are silver, not ruby. This is significant in the monetary allegory: gold and silver were the two metals at the center of the currency debate. The silver slippers — representing the silver standard, the people's money — had the power to transport Dorothy home at any time. But she did not know it.\u003c/p\u003e\n\u003cp\u003eThis is the central revelation: you already have the power. The system — the Wizard, the Jesuits, the financial architecture, the institutional church — depends on you not knowing this. As long as you follow the Yellow Brick Road, looking for salvation from the Wizard, you remain under control. The moment you look down at your own feet, the spell is broken.\u003c/p\u003e\n\u003ch2 id=\"the-four-companions-what-the-system-takes\"\u003eThe Four Companions: What the System Takes\u003c/h2\u003e\n\u003ch3 id=\"the-scarecrow-the-mind\"\u003eThe Scarecrow: The Mind\u003c/h3\u003e\n\u003cp\u003eThe Scarecrow believes he has no brain. He seeks intelligence from the Wizard. But throughout the journey, the Scarecrow is the most intelligent member of the group — solving problems, devising plans, thinking creatively. He had a brain all along. He simply did not believe it.\u003c/p\u003e\n\u003cp\u003eThe education system — designed in large part by the Jesuits through their \u003cem\u003eRatio Studiorum\u003c/em\u003e — produces Scarecrows. It trains people to believe they cannot think without credentials, without degrees, without institutional validation. The mortarboard (Saturn's cube, as discussed in Part 4 of the Saturn series) crowns the graduate as an official thinker — implying that before graduation, thinking was not authorized.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's experience reveals that spiritual discernment — the highest form of intelligence — requires no institutional credential. The 97.5 percent who were rejected had been through the system. They had their diplomas, their doctrines, their denominational affiliations. None of it mattered. What mattered was whether they could think for themselves — whether they could discern truth from the institutional fabrication that surrounded them.\u003c/p\u003e\n\u003ch3 id=\"the-tin-man-the-heart\"\u003eThe Tin Man: The Heart\u003c/h3\u003e\n\u003cp\u003eThe Tin Man believes he has no heart. He seeks emotion from the Wizard. But throughout the journey, the Tin Man is the most compassionate member of the group — weeping over crushed beetles, mourning fallen trees, caring deeply about his companions. He had a heart all along.\u003c/p\u003e\n\u003cp\u003eThe industrial system — the cubicle, the factory, the corporate hierarchy — produces Tin Men. It strips people of emotional connection, reducing them to functional units in a productive machine. The Jesuits, with their emphasis on institutional obedience over personal feeling, created the template for this dehumanization. The order demands that members suppress personal emotion in favor of institutional loyalty — blind obedience that overrides the heart.\u003c/p\u003e\n\u003ch3 id=\"the-cowardly-lion-the-courage\"\u003eThe Cowardly Lion: The Courage\u003c/h3\u003e\n\u003cp\u003eThe Lion believes he has no courage. He seeks bravery from the Wizard. But throughout the journey, the Lion faces every danger, protects his companions, and perseveres despite his fear. He had courage all along.\u003c/p\u003e\n\u003cp\u003eThe fear system — terrorism, pandemic, economic collapse, climate catastrophe, eternal damnation — produces Cowardly Lions. It convinces the population that they cannot face the world without the protection of the institution. The government, the military, the church, the corporation — all present themselves as necessary shields against a terrifying world. Without them, you are helpless. With them, you are safe. This is the Lion's delusion.\u003c/p\u003e\n\u003cp\u003eThe \u003cem\u003eCatholic Confidential\u003c/em\u003e documentary reveals how the Jesuits use fear deliberately: the fear of hell, the fear of excommunication, the fear of social ostracism. These fears are not natural. They are manufactured — tools of control designed to keep the population dependent on the institution.\u003c/p\u003e\n\u003ch3 id=\"dorothy-the-soul\"\u003eDorothy: The Soul\u003c/h3\u003e\n\u003cp\u003eDorothy wants to go home. She believes the Wizard can take her there. But the Wizard cannot. Only Dorothy can take herself home, using the power she already possesses — the silver slippers on her own feet.\u003c/p\u003e\n\u003cp\u003eDorothy represents the human soul, trapped in Oz (the material world), seeking liberation from an external authority (the Wizard/institution/Saturn system). Her journey teaches her that the power was always within her — that she never needed the Wizard, the road, or the Emerald City. She needed only to recognize her own capacity and act on it.\u003c/p\u003e\n\u003cp\u003eThis is the message that the Jesuits, the secret societies, and the Saturn system cannot tolerate. If people realized that they already possess everything they need — that no institution, no ritual, no hierarchy is necessary for spiritual liberation — the entire control system would collapse. The Wizard would be revealed as the little man behind the curtain. The Emerald City would lose its green tint. And the population would click their heels and go home.\u003c/p\u003e\n\u003ch2 id=\"the-witch-the-fear-machine\"\u003eThe Witch: The Fear Machine\u003c/h2\u003e\n\u003ch3 id=\"the-wicked-witch-of-the-west\"\u003eThe Wicked Witch of the West\u003c/h3\u003e\n\u003cp\u003eThe Witch represents fear itself — the weapon that the power structure uses to maintain control. She commands flying monkeys (surveillance agents), controls an army (military force), and terrorizes the land from her castle (the institution). Her power appears overwhelming.\u003c/p\u003e\n\u003cp\u003eBut her weakness is water. She melts when Dorothy throws water on her. Water, in scripture, represents truth, purification, the word of God. The fear machine, no matter how terrifying it appears, dissolves when truth is applied. The Jesuits fear truth more than any other weapon. Their entire operation — the infiltration, the cunning, the blind obedience, the vice — exists because truth would destroy them.\u003c/p\u003e\n\u003cp\u003eHoward Pittman learned that the demonic hierarchy operates through fear. The demons he witnessed in the second heaven used fear as their primary tool — fear of death, fear of loss, fear of the unknown. But Pittman also learned that these demons have no power over those who stand in truth. The Witch melts. The demons flee. The Wizard is exposed.\u003c/p\u003e\n\u003ch3 id=\"the-tornado-the-great-reset\"\u003eThe Tornado: The Great Reset\u003c/h3\u003e\n\u003cp\u003eDorothy arrives in Oz via tornado — a violent disruption that tears her from her normal life and deposits her in a strange, controlled environment. This parallels the great upheavals — wars, pandemics, economic collapses — that the power structure engineers to reshape society.\u003c/p\u003e\n\u003cp\u003eThe tornado is not an accident. It is a tool. Every great reset — every revolution, every pandemic response, every economic restructuring — serves to tear the population from its moorings and deposit it in a new environment where the rules are different and the Wizard's power appears necessary. The Jesuits have been engineering these resets for centuries, from the Thirty Years' War to the French Revolution to the events that shape our present moment.\u003c/p\u003e\n\u003ch2 id=\"the-man-behind-the-curtain\"\u003eThe Man Behind the Curtain\u003c/h2\u003e\n\u003ch3 id=\"exposure-and-its-consequences\"\u003eExposure and Its Consequences\u003c/h3\u003e\n\u003cp\u003eWhen Toto pulls the curtain aside, the Wizard is revealed as an ordinary man operating an elaborate machine of illusion. His power was never real. It was projected — amplified by technology, sustained by fear, and dependent on no one looking too closely.\u003c/p\u003e\n\u003cp\u003eThis is the reality of every institution that claims supernatural authority: the Vatican, the secret societies, the intelligence agencies, the financial system. Behind the curtain, there are men — ordinary, fallible, mortal men — operating machines of illusion. The Jesuits' power is not supernatural. It is organizational, financial, and psychological. It is impressive, but it is not divine. And like the Wizard's power, it evaporates the moment enough people see through it.\u003c/p\u003e\n\u003cp\u003eAgent131711's work on Substack is dedicated to pulling the curtain aside — to exposing the ordinary men behind the extraordinary illusions. Every article, every investigation, every documented connection between the visible and the hidden is a tug on the curtain. And every person who reads, understands, and shares this information is another Toto, pulling the curtain back a little further.\u003c/p\u003e\n\u003ch2 id=\"the-power-you-already-have\"\u003eThe Power You Already Have\u003c/h2\u003e\n\u003ch3 id=\"clicking-your-heels\"\u003eClicking Your Heels\u003c/h3\u003e\n\u003cp\u003eThe Wizard of Oz ends with a revelation: Dorothy always had the power to go home. She needed only to click her heels three times and say the words. The power was in her all along.\u003c/p\u003e\n\u003cp\u003eThis is not merely a storytelling device. It is a spiritual truth. The power to break free from the Saturn system, the Jesuit matrix, the financial prison, the fear machine — this power resides in every individual. It is the power of truth, discernment, and the refusal to participate in illusions.\u003c/p\u003e\n\u003cp\u003eEphesians 6:12 describes the battle: not against flesh and blood, but against principalities and powers. The weapons are spiritual — truth, faith, the word of God. Not the institutional word. Not the Jesuit-curated word. The living word that exists beyond institutions, beyond texts, beyond the curtain of human authority.\u003c/p\u003e\n\u003cp\u003eHoward Pittman returned from the other side with a simple message: wake up. Stop serving self. Stop trusting the Wizard. Click your heels. Go home.\u003c/p\u003e\n\u003cp\u003eThe 97.5 percent never clicked. They stayed in Oz, following the Yellow Brick Road, wearing the green glasses, believing the Wizard's promises. Do not make their mistake. The power is yours. It always was.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\ 003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/black-sun-part6/?lang=en\"\u003eTHE BLACK SUN: Occult Origins of World Power Part 6\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cult-black-cube-part4/?lang=en\"\u003eTHE CULT OF THE BLACK CUBE Part 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003ePay attention to the man behind the curtain. He is not a wizard. He is not all-powerful. He is a man — a man with a machine, a machine of fear and illusion. And you are Dorothy, standing in silver slippers you never knew you had, with the power to dissolve every witch, expose every wizard, and find your way home. Click. Click. Click.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"The Wizard of Oz: Unveiling the Power of Fear and Deception\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Decode The Wizard of Oz as an allegory of Jesuit deception and Satanic control. The man behind the curtain is real, and he rules through fear.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-04-25T10:00:00Z\",\"children\":\"April 25, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex
