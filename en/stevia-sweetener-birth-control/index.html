s to reproduce. Any force that undermines human fertility strikes at the most fundamental divine mandate. Stevia — the \"natural\" sweetener marketed as a healthy alternative to sugar and artificial sweeteners — has a documented history as a contraceptive. Indigenous peoples of South America used it for centuries to prevent pregnancy. And now it is in your food, your beverages, your children's snacks.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed a spiritual war of extraordinary scope. Demonic hierarchies in the second heaven. 97.5 percent rejection. 95 percent self-service. Every word judged (Matthew 12:36-37). The weaponization of the food supply against human fertility is not a conspiracy theory — it is a documented strategy that operates through the same institutional systems that the Jesuits built and the Saturn cult maintains.\u003c/p\u003e\n\u003cp\u003eLoyola's military organization. Napoleon's \"absolute power.\" Tamburini governing \"all the world.\" Clement XIV poisoned. \u003cem\u003eCatholic Confidential\u003c/em\u003e: infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The Jesuits have long been associated with depopulation strategies — the missions that decimated indigenous populations, the educational systems that delayed marriage and reduced family size, the institutional policies that prioritized control over procreation.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-contraceptive-history\"\u003eThe Contraceptive History\u003c/h2\u003e\n\u003ch3 id=\"indigenous-knowledge\"\u003eIndigenous Knowledge\u003c/h3\u003e\n\u003cp\u003eStevia rebaudiana is a plant native to Paraguay and Brazil. The Guarani people, who have used it for centuries, called it \u003cem\u003eka'a he'e\u003c/em\u003e — \"sweet herb.\" But the Guarani did not use stevia only as a sweetener. They used it as a medicinal plant — and one of its documented traditional uses was as a contraceptive.\u003c/p\u003e\n\u003cp\u003eThis is not fringe history. It is documented in ethnobotanical literature. The Guarani women used stevia preparations to prevent pregnancy and to regulate menstruation. The plant was recognized by indigenous peoples as having anti-fertility properties long before Western science examined it.\u003c/p\u003e\n\u003cp\u003eThe Jesuit missionaries who established missions (reducciones) among the Guarani in the 17th and 18th centuries would have known about stevia's traditional uses. The Jesuits were meticulous documentarians of indigenous knowledge — their reports to Rome included detailed botanical and medical information. The question of what the Jesuits did with this knowledge is one that institutional history has carefully avoided.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) the connection between Jesuit botanical knowledge and modern pharmaceutical development. The Jesuits collected plant specimens, medicinal recipes, and traditional knowledge from every continent they reached. This knowledge did not disappear when the missions closed. It entered the institutional network and has resurfaced in forms that serve institutional agendas.\u003c/p\u003e\n\u003ch3 id=\"the-scientific-evidence\"\u003eThe Scientific Evidence\u003c/h3\u003e\n\u003cp\u003eMultiple studies have examined stevia's effects on fertility:\u003c/p\u003e\n\u003cp\u003eA 1968 study published in the journal \u003cem\u003eEconomic Botany\u003c/em\u003e documented the Guarani's use of stevia as a contraceptive and noted that prolonged consumption reduced fertility in laboratory animals.\u003c/p\u003e\n\u003cp\u003eA 1999 study published in \u003cem\u003ePhytomedicine\u003c/em\u003e found that stevioside — stevia's active compound — reduced testosterone levels and sperm production in male rats at high doses.\u003c/p\u003e\n\u003cp\u003eA 2012 study found that stevia extract affected reproductive hormones in female rats, potentially disrupting ovulation.\u003c/p\u003e\n\u003cp\u003eThe industry response is predictable: the doses in these studies are higher than normal dietary consumption. The dose argument — the same argument used to defend arsenic in rice — ignores cumulative exposure, synergistic effects, and the reality that stevia is now present in thousands of products consumed daily by millions of people.\u003c/p\u003e\n\u003ch2 id=\"the-modern-stevia-explosion\"\u003eThe Modern Stevia Explosion\u003c/h2\u003e\n\u003ch3 id=\"from-niche-to-ubiquitous\"\u003eFrom Niche to Ubiquitous\u003c/h3\u003e\n\u003cp\u003eTwo decades ago, stevia was a niche product found in health food stores. Today, it is everywhere. Coca-Cola uses it (as Truvia). PepsiCo uses it (as PureVia). It appears in yogurt, protein bars, flavored water, chewing gum, toothpaste, children's vitamins, and thousands of other products.\u003c/p\u003e\n\u003cp\u003eThe speed of stevia's adoption is remarkable. In 2008, the FDA granted stevia GRAS (Generally Recognized As Safe) status. Within a decade, it had penetrated virtually every category of the food industry. This rapid adoption was not driven by consumer demand — it was driven by food manufacturers seeking a \"natural\" alternative to artificial sweeteners that were facing increasing public skepticism.\u003c/p\u003e\n\u003cp\u003eThe transition from a plant known by indigenous peoples as a contraceptive to a ubiquitous food additive consumed by billions is not a natural market evolution. It is an institutional decision — made by the same food corporations that control the global food supply, regulated by the same captured agencies that allow arsenic in rice, and promoted by the same media that suppresses inconvenient truths.\u003c/p\u003e\n\u003ch3 id=\"the-dosage-question\"\u003eThe Dosage Question\u003c/h3\u003e\n\u003cp\u003eHow much stevia does the average American consume? This is difficult to calculate because stevia appears in so many products. A person who drinks stevia-sweetened beverages, eats stevia-sweetened yogurt, chews stevia-sweetened gum, and takes stevia-sweetened supplements may be consuming far more stevioside than any individual product label suggests.\u003c/p\u003e\n\u003cp\u003eThe cumulative daily intake of stevia across all sources has not been comprehensively studied. The FDA's GRAS determination was based on individual product use, not cumulative exposure across the entire diet. This is a regulatory failure that mirrors the arsenic-in-rice situation: each product is evaluated in isolation, while the consumer's total exposure across all products is ignored.\u003c/p\u003e\n\u003ch2 id=\"the-depopulation-context\"\u003eThe Depopulation Context\u003c/h2\u003e\n\u003ch3 id=\"falling-fertility-rates\"\u003eFalling Fertility Rates\u003c/h3\u003e\n\u003cp\u003eGlobal fertility rates have been declining for decades. In developed nations, birth rates are below replacement level. In the United States, the fertility rate hit a historic low in 2023. The explanations offered — economic pressure, career priorities, cultural shifts — are real but incomplete. They do not account for the biological dimension: the documented decline in sperm counts, the increase in reproductive disorders, and the ubiquity of endocrine-disrupting chemicals in the food supply, water supply, and consumer products.\u003c/p\u003e\n\u003cp\u003eStevia is one of many substances in the modern diet with documented anti-fertility effects. BPA, phthalates, glyphosate, atrazine, and dozens of other chemicals are known endocrine disruptors. The cumulative effect of consuming all of these substances simultaneously, over a lifetime, has never been studied — because no institution with the power to conduct such a study has the incentive to reveal its results.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack research connects the declining fertility rates to a broader agenda documented in the writings of the global elite: the Club of Rome, the World Economic Forum, the United Nations Population Fund. These organizations have openly advocated for population reduction for decades. The question is not whether a depopulation agenda exists — it is documented. The question is what tools are being used to implement it.\u003c/p\u003e\n\u003ch3 id=\"the-spiritual-warfare-dimension\"\u003eThe Spiritual Warfare Dimension\u003c/h3\u003e\n\u003cp\u003eGod's first command was to be fruitful and multiply. Any force that undermines this command opposes God's design. The principalities and powers of Ephesians 6:12 operate through systems — and the food system, loaded with anti-fertility chemicals including stevia, is one such system.\u003c/p\u003e\n\u003cp\u003eHoward Pittman witnessed demonic entities organized for the destruction of humanity. The 97.5 percent rejection rate demonstrates the spiritual consequences of living within systems designed by these entities' earthly servants. The poisoning of the food supply with anti-fertility agents is not merely a health issue — it is a spiritual attack on God's first command.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, who have been involved in population management since their first missions, understand the power of subtle biological intervention. Their willingness to practice \"every species of vice\" (Catholic Confidential) extends to whatever methods serve the institutional agenda. The replacement of sugar with a known contraceptive plant extract in the global food supply is precisely the kind of subtle, deniable, system-wide intervention that characterizes Jesuit methodology.\u003c/p\u003e\n\u003ch2 id=\"protecting-yourself\"\u003eProtecting Yourself\u003c/h2\u003e\n\u003ch3 id=\"practical-steps\"\u003ePractical Steps\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eRead every label\u003c/strong\u003e: Stevia appears under many names — stevia extract, steviol glycosides, Reb A, Truvia, PureVia. Learn to identify them all.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eChoose whole foods\u003c/strong\u003e: The best way to avoid stevia is to eat foods that do not require sweetening — fresh fruits, vegetables, meats, and grains.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eUse raw honey or real sugar in moderation\u003c/strong\u003e: These natural sweeteners, while caloric, do not carry stevia's anti-fertility history.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eProtect your children\u003c/strong\u003e: Children's products are increasingly sweetened with stevia. Read labels for everything your children consume.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eSpread awareness\u003c/strong\u003e: Most people have never heard of stevia's contraceptive history. Share this information.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThe narrow path leads through informed choices — choices that reject the convenience of the industrial food system in favor of the difficult, deliberate work of eating what God provided rather than what the system engineered.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u
