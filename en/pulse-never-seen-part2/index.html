sed to ask. In Part 2, we present the evidence the media refused to show — the suppressed testimony, the contradictory timelines, the physical impossibilities, and the institutional behaviors that make sense only if the official narrative is incomplete.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE showed him that the visible world conceals an invisible architecture of deception. Three heavens. Demonic hierarchy. 97.5 percent rejection. 95 percent self-service. Every word judged (Matthew 12:36-37). The Pulse event conceals an invisible architecture too — one made of suppressed evidence, redirected investigations, and institutional silence that speaks louder than any press conference.\u003c/p\u003e\n\u003cp\u003eThe Jesuits built their global empire on the suppression of inconvenient evidence. Loyola's military organization. Napoleon's \"absolute power.\" Tamburini's world governance. Clement XIV poisoned for seeing too much. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The suppression of Pulse evidence follows the same institutional pattern: what threatens the narrative is hidden, discredited, or destroyed.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-suppressed-witness-testimony\"\u003eThe Suppressed Witness Testimony\u003c/h2\u003e\n\u003ch3 id=\"multiple-shooters\"\u003eMultiple Shooters\u003c/h3\u003e\n\u003cp\u003eIn the hours immediately following the event, multiple witnesses reported hearing gunfire from different locations within the building. Some reported seeing individuals other than the identified attacker carrying weapons. These early reports were broadcast on local media before the single-shooter narrative was established.\u003c/p\u003e\n\u003cp\u003eOnce the official narrative solidified, these early reports disappeared from coverage. Witnesses who spoke to local media in the immediate aftermath were not interviewed by national media. The contradiction between the initial reports and the final narrative was never addressed, never investigated, never explained.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) the pattern of early witness testimony contradicting final official narratives. This pattern appears in multiple high-profile events and follows a consistent trajectory: early reports are diverse, contradictory, and reflective of chaotic observation; the final narrative is unified, consistent, and reflective of institutional requirements. The gap between the two is filled with silence.\u003c/p\u003e\n\u003ch3 id=\"the-survivor-accounts\"\u003eThe Survivor Accounts\u003c/h3\u003e\n\u003cp\u003eSurvivor accounts reveal details that the official narrative omits or contradicts:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSurvivors described confusion about the direction of gunfire that is inconsistent with a single shooting position.\u003c/li\u003e\n\u003cli\u003eSurvivors described periods of silence during the three-hour gap that are inconsistent with an ongoing hostage situation.\u003c/li\u003e\n\u003cli\u003eSurvivors described interactions with law enforcement during the event that are inconsistent with the official timeline of police response.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese accounts are not easily dismissed. They come from people who were present, who experienced the event firsthand, and who have no institutional reason to contradict the official narrative. Their testimony deserves examination, not suppression.\u003c/p\u003e\n\u003ch2 id=\"the-physical-evidence\"\u003eThe Physical Evidence\u003c/h2\u003e\n\u003ch3 id=\"the-building-demolition\"\u003eThe Building Demolition\u003c/h3\u003e\n\u003cp\u003eThe Pulse nightclub building was demolished in 2016, shortly after the event. The site was designated for a memorial. This decision removed the primary physical evidence from any future investigation — the bullet trajectories, the structural damage, the forensic evidence that could confirm or contradict the official account.\u003c/p\u003e\n\u003cp\u003eDemolition of crime scenes is not standard practice. The Murrah Building in Oklahoma City was demolished after the 1995 bombing, and the steel from the World Trade Center was shipped overseas for recycling after 9/11 — both decisions that prevented independent forensic analysis. The pattern of demolishing evidence is itself evidence of institutional intent to prevent examination.\u003c/p\u003e\n\u003ch3 id=\"the-ballistic-questions\"\u003eThe Ballistic Questions\u003c/h3\u003e\n\u003cp\u003eThe official account states that a single individual, using a Sig Sauer MCX rifle and a Glock 17 handgun, inflicted 102 casualties (49 killed, 53 wounded) in a crowded nightclub. This casualty rate — in a confined, dark, chaotic environment — is extraordinary.\u003c/p\u003e\n\u003cp\u003eMilitary combat statistics suggest that even trained soldiers in controlled conditions achieve hit rates far below what the Pulse narrative implies. In civilian mass shooting events, the typical casualty-to-round ratio suggests that the reported outcome would require an extraordinary number of rounds fired with extraordinary accuracy in extraordinary conditions.\u003c/p\u003e\n\u003cp\u003eThese ballistic questions are not accusations. They are mathematical observations that demand investigation rather than assumption. The official narrative asks you to accept the outcome without examining the mechanics. An honest investigation examines the mechanics.\u003c/p\u003e\n\u003ch2 id=\"the-institutional-response\"\u003eThe Institutional Response\u003c/h2\u003e\n\u003ch3 id=\"the-immediate-narrative\"\u003eThe Immediate Narrative\u003c/h3\u003e\n\u003cp\u003eThe speed with which the official narrative was established is, as noted in Part 1, itself suspicious. Within hours, media was reporting a consistent, detailed account of the event — the attacker's identity, motivation, method, and timeline. This narrative was then repeated across all major media outlets simultaneously, with virtually no variation.\u003c/p\u003e\n\u003cp\u003eThis synchronization suggests pre-preparation. In genuine breaking news, different outlets report different details as information trickles in. In pre-prepared narratives, all outlets report the same details simultaneously because they are receiving the same information from the same source.\u003c/p\u003e\n\u003cp\u003eThe institutional source of this synchronized narrative was not independent journalism. It was the FBI — the same agency that had investigated the attacker twice, the same agency that employs informants in potential plots, the same agency whose institutional interests are served by the narrative that was established.\u003c/p\u003e\n\u003ch3 id=\"the-policy-response\"\u003eThe Policy Response\u003c/h3\u003e\n\u003cp\u003eWithin days of the Pulse event, pre-prepared legislation was introduced targeting gun ownership, expanding surveillance authority, and increasing counter-terrorism funding. The speed of the legislative response — detailed bills introduced within days of a complex event — suggests that the legislation was prepared before the event provided the justification for it.\u003c/p\u003e\n\u003cp\u003eThis is the Hegelian dialectic — problem, reaction, solution — that the Jesuits refined into an institutional methodology. Create or allow a problem. Manage the public reaction. Implement the pre-prepared solution. The problem is the event. The reaction is the public grief and outrage. The solution is the legislation that expands institutional power.\u003c/p\u003e\n\u003cp\u003eHoward Pittman witnessed demonic hierarchy operating with military precision and strategic purpose. The institutional response to Pulse demonstrates the same qualities: precise, strategic, pre-prepared, and serving purposes that extend far beyond the stated objectives of public safety.\u003c/p\u003e\n\u003ch2 id=\"what-you-have-never-seen\"\u003eWhat You Have Never Seen\u003c/h2\u003e\n\u003ch3 id=\"the-redacted-transcripts\"\u003eThe Redacted Transcripts\u003c/h3\u003e\n\u003cp\u003eThe 911 call transcripts from the Pulse event were initially released with significant redactions. The Department of Justice removed references to the attacker's stated motivations — statements that contradicted the emerging narrative. Public outcry forced the release of unredacted transcripts, but the initial redaction revealed the institutional impulse: control the narrative by controlling the evidence.\u003c/p\u003e\n\u003ch3 id=\"the-surveillance-footage\"\u003eThe Surveillance Footage\u003c/h3\u003e\n\u003cp\u003eIn a commercial district with extensive surveillance coverage, the footage from cameras in and around Pulse has never been publicly released. The public has never seen video evidence of the event as it unfolded — the approach, the entry, the police response, the three-hour gap. This footage exists. It has not been released. Its suppression invites the question: what does it show?\u003c/p\u003e\n\u003cp\u003eThe Jesuit model of information control — the Index of Forbidden Books, the Inquisition, the suppression of alternative texts — applies directly. Information that supports the narrative is released. Information that contradicts the narrative is suppressed. The suppressed information is, by definition, the most important information — because it is the information the institution fears.\u003c/p\u003e\n\u003cp\u003eThis investigation will continue in Part 3, where we trace the unexpected connections between the attacker, the security industry, and the intelligence community. The evidence presented here is the beginning, not the end. What you have never seen is what the system has hidden. And what the system has hidden is what matters most.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Suppressed evidence and witness testimony documented\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — The invisible architecture of deception\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit pattern of evidence suppression\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sources-and-references\"\u003eSources and References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eSecret Societies and the Catholic Church — The Hidden Hand Exposed\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/05-The_First_Darkness.mp4\"\u003eThe First Darkness\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/73-Suppressing_Truth.mp4\"\u003eSuppressing Truth\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/181-Ending_Anonymity.mp4\"\u003eEnding Anonymity\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pulse-investigation-part1/?lang=en\"\u003ePULSE Investigation Begins: What Really Happened Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pulse-unexpected-connections-part3/?lang=en\"\u003eUnexpected Connections: The PULSE Investigation Part 3\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pulse-biggest-mistakes-part4/?lang=en\"\u003eTHE 2 BIGGEST MISTAKES in the Pulse Investigation Part 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eWhat you have never seen is not what does not exist. It is what has been hidden — deliberately, systematically, institutionally. The suppressed evidence, the silenced witnesses, the demolished building, the unreleased footage — each absence is a presence, a shape defined by what surrounds it, a truth revealed by the effort required to conceal it. The light shines in darkness, and the darkness comprehends it not — but the darkness cannot extinguish it.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/media/\",\"className\":\"category-badge\",\"children\":\"media\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-
