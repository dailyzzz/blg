s, eight vertices. The cube. In mathematics, it is the simplest three-dimensional solid. In the occult, it is the most sacred symbol of Saturn — the god of time, limitation, and the material world. And it is everywhere. Once you see it, you will never stop seeing it.\u003c/p\u003e\n\u003cp\u003eHoward Pittman, during his near-death experience, was shown that the spiritual realm is governed by structure, hierarchy, and symbol. The demons he witnessed in the second heaven were not random. They operated according to precise organizational principles. Pittman learned that 97.5 percent of Christians were rejected at death — they had \"never made Me Lord.\" The spiritual realm operates on absolutes, not good intentions. Symbols matter. Rituals matter. What you worship matters — even when you do not know you are worshipping.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, Loyola's military organization wielding what Napoleon called \"absolute power,\" have served as the guardians of the Saturn cult for centuries. The Jesuit oath, exposed in \u003cem\u003eCatholic Confidential\u003c/em\u003e, requires members to infiltrate \"cloaked with cunning\" and to practice \"every species of vice\" in service of the order's goals. Their custodianship of Saturn's symbols is one of the most consequential aspects of their mission — a mission that extends, as Father General Tamburini boasted, to \"all the world.\"\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-black-cube-across-civilizations\"\u003eThe Black Cube Across Civilizations\u003c/h2\u003e\n\u003ch3 id=\"the-kaaba-islams-saturn-cube\"\u003eThe Kaaba: Islam's Saturn Cube\u003c/h3\u003e\n\u003cp\u003eThe most visited cube on earth stands in Mecca, Saudi Arabia. The Kaaba — from the Arabic word meaning \"cube\" — is the holiest site in Islam. Approximately two million Muslims perform the Hajj pilgrimage each year, circling the black-draped cube seven times counterclockwise. Seven circuits. Counterclockwise — the direction of reversal, of undoing, of time moving backward. Saturn is the god of time.\u003c/p\u003e\n\u003cp\u003eThe Black Stone embedded in the Kaaba's corner is kissed by pilgrims. According to Islamic tradition, it fell from heaven. In occult interpretation, it is a meteorite — a stone from the heavens, from Saturn's domain. The circling of the cube mirrors the rings of Saturn, those great bands of debris that encircle the ringed planet.\u003c/p\u003e\n\u003cp\u003eThis is not an attack on Islamic faith. It is an observation about the universality of Saturn symbolism. The Saturn cult predates Islam, predates Christianity, predates Judaism. It is the original religion of the material world, and its symbols appear in every subsequent religion because the same entities — the principalities and powers of Ephesians 6:12 — influence every human institution.\u003c/p\u003e\n\u003ch3 id=\"the-tefillin-judaisms-saturn-cubes\"\u003eThe Tefillin: Judaism's Saturn Cubes\u003c/h3\u003e\n\u003cp\u003eIn Orthodox Judaism, men bind small black leather cubes to their forehead and arm during morning prayers. These are tefillin (phylacteries), containing scrolls of Torah passages. The cube is bound to the body with leather straps wound seven times around the arm. Again: the cube, the binding, the number seven.\u003c/p\u003e\n\u003cp\u003eJesus criticized the Pharisees for their phylacteries in Matthew 23:5: \u003cem\u003e\"But all their works they do for to be seen of men: they make broad their phylacteries, and enlarge the borders of their garments.\"\u003c/em\u003e The critique was not merely about vanity. It was about the form of worship — the binding of Saturn's cube to the body, the physical yoking of the worshipper to the symbol of the material god.\u003c/p\u003e\n\u003ch3 id=\"the-graduation-cap-saturns-mortarboard\"\u003eThe Graduation Cap: Saturn's Mortarboard\u003c/h3\u003e\n\u003cp\u003eEvery graduate in the Western education system dons a black square cap — the mortarboard. A flat black cube worn on the head, the seat of consciousness. This ritual marks the completion of education — an education system designed, in large part, by the Jesuits, who established some of the first universities in Europe and whose \u003cem\u003eRatio Studiorum\u003c/em\u003e became the template for modern education.\u003c/p\u003e\n\u003cp\u003eThe graduate, having been shaped by the system, is literally crowned with Saturn's symbol. The tassel hangs from the cube, mimicking the rings. The gown is black — Saturn's color. The ceremony is a rite of passage: from student to servant of the system, crowned by the god of limitation and material bondage.\u003c/p\u003e\n\u003cp\u003eAgent131711 has documented extensively on Substack (agent131711.substack.com) how the education system serves as an initiation pipeline, moving individuals from ignorance to indoctrination while branding the process as \"enlightenment.\" The mortarboard is the final stamp — Saturn's seal on the mind of the newly minted worker.\u003c/p\u003e\n\u003ch2 id=\"the-corporate-cube\"\u003eThe Corporate Cube\u003c/h2\u003e\n\u003ch3 id=\"architecture-of-control\"\u003eArchitecture of Control\u003c/h3\u003e\n\u003cp\u003eThe corporate world worships the cube openly. Office buildings are cubes. Cubicles — literally small cubes — contain the workers. The Apple Store in New York City features a massive glass cube as its entrance. The Vessel at Hudson Yards is a cube-adjacent structure of interlocking staircases leading nowhere — a perfect metaphor for Saturn's domain: endless labor without transcendence.\u003c/p\u003e\n\u003cp\u003eThe World Trade Center memorial features two massive square voids — cubes of absence — where the Twin Towers once stood. Water cascades into these voids perpetually, symbolizing the endless descent into Saturn's underworld. Whatever one believes about the events of September 11, the memorial's symbolism is unmistakable to anyone literate in the occult language that the architects of these structures employ.\u003c/p\u003e\n\u003ch3 id=\"logos-and-branding\"\u003eLogos and Branding\u003c/h3\u003e\n\u003cp\u003eSaturn's cube appears in corporate logos with remarkable frequency. The most obvious is the television set — historically a cube-shaped device through which the population receives its programming (a word whose dual meaning is not accidental). People sit before the cube for hours each day, receiving images and narratives crafted by media corporations that trace their lineage to intelligence agencies that trace their lineage to secret societies that trace their lineage to the Saturn cult.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, as \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals, operate through \"blind obedience\" and total institutional loyalty. The corporate world mirrors this structure. Employees are expected to subordinate their individual identity to the corporate brand, to follow directives without question, to sacrifice their time — their life force — in exchange for currency (another Saturn symbol: currency flows, like time, and cannot be stopped).\u003c/p\u003e\n\u003ch2 id=\"saturn-in-the-heavens\"\u003eSaturn in the Heavens\u003c/h2\u003e\n\u003ch3 id=\"the-hexagonal-storm\"\u003eThe Hexagonal Storm\u003c/h3\u003e\n\u003cp\u003eIn 2006, NASA's Cassini spacecraft photographed a persistent hexagonal storm at Saturn's north pole. A hexagon is the two-dimensional projection of a cube. Saturn literally wears its symbol on its face. This is not a conspiracy theory. It is an observable astronomical phenomenon. A perfect geometric hexagon, approximately 30,000 kilometers in diameter, rotating at Saturn's north pole.\u003c/p\u003e\n\u003cp\u003eThe occult significance is profound. In sacred geometry, the hexagon contains the Star of David, the six-pointed star. It is also the foundational pattern of the honeycomb, the snowflake, and numerous crystal structures. Saturn's hexagonal storm suggests — to those who believe in the correspondence between heavenly and earthly patterns — that the cube is not merely a human symbol imposed on the cosmos but a cosmic reality reflected in human civilization.\u003c/p\u003e\n\u003cp\u003eAs above, so below. This is the foundational principle of Hermeticism, the occult philosophy that underlies the mystery religions, the secret societies, and the Jesuit order itself. The cube below mirrors the hexagon above. The temples of Saturn on earth mirror the reality of Saturn in the heavens.\u003c/p\u003e\n\u003ch3 id=\"the-rings-of-binding\"\u003eThe Rings of Binding\u003c/h3\u003e\n\u003cp\u003eSaturn's rings, as discussed in Part 3, represent binding. In the occult, a ring is a chain, a contract, an oath. The wedding ring binds spouses. The championship ring binds the athlete to the system of competition. The ring of power in Tolkien's mythology — \"one ring to rule them all\" — is a Saturn symbol describing the totalitarian nature of Saturn worship.\u003c/p\u003e\n\u003cp\u003eThe Jesuit oath is a ring of binding. Once taken, it cannot be broken. The member is bound to the order \"in life and in death,\" subject to the General's authority in all things. This is Saturn's governance: absolute, inescapable, eternal. The rings of Saturn are not decoration. They are chains.\u003c/p\u003e\n\u003ch2 id=\"the-cube-in-religious-architecture\"\u003eThe Cube in Religious Architecture\u003c/h2\u003e\n\u003ch3 id=\"st-peters-square-the-vatican-cube\"\u003eSt. Peter's Square: The Vatican Cube\u003c/h3\u003e\n\u003cp\u003eSt. Peter's Square in Vatican City is not actually square — it is an ellipse with a trapezoidal entrance. But the obelisk at its center stands on a cubic base, and the square (piazza) itself is named for its geometric association. The Vatican's architecture is a compendium of occult symbolism, from the Egyptian obelisk (a phallic solar symbol) to the keyhole shape visible from above (the key of authority) to the cubic forms that anchor the complex.\u003c/p\u003e\n\u003cp\u003eThe Catholic Church, which the Jesuits have controlled from within for centuries, is the primary institutional custodian of Saturn symbolism in the Western world. Every cathedral is an architectural encoding of occult principles. The nave represents the ship (a Saturn symbol — Saturn was associated with navigation). The altar represents the sacrificial table. The tabernacle — where the consecrated host is kept — is traditionally cube-shaped.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was told during his NDE that words carry spiritual weight (Matthew 12:36-37). Architecture carries spiritual weight too. Every building is a statement of intention in the material world, and the buildings of the Catholic Church state their intention clearly to anyone who can read the language: they are temples of Saturn, dressed in Christian vocabulary.\u003c/p\u003e\n\u003ch3 id=\"the-holy-of-holies\"\u003eThe Holy of Holies\u003c/h3\u003e\n\u003cp\u003eThe most sacred space in the Hebrew Temple — the Holy of Holies — was a perfect cube. Twenty cubits by twenty cubits by twenty cubits (1 Kings 6:20). The Ark of the Covenant resided within this cubic space. God's presence was said to dwell between the cherubim on the Ark's lid, within a cube.\u003c/p\u003e\n\u003cp\u003eThis presents a theological paradox. Is the cube sacred because God chose it, or did the Saturn cult appropriate a divine form for its own purposes? The answer may be that the enemy always counterfeits the genuine. Satan does not create — he corrupts. The cube may be a divine form that Saturn worship has inverted, turning a symbol of God's dwelling into a symbol of material imprisonment.\u003c/p\u003e\n\u003cp\u003eThis pattern of inversion is central to Satanic strategy. As Pittman witnessed, the demonic realm mimics the divine order. It has its own hierarchy, its own rituals, its own symbols. And the Jesuits, operating as the earthly extension of this mimicry, have ensured that the inverted symbols are the ones most widely propagated.\u003c/p\u003e\n\u003ch2 id=\"the-cube-and-time\"\u003eThe Cube and Time\u003c/h2\u003e\n\u003ch3 id=\"saturn-as-chronos\"\u003eSaturn as Chronos\u003c/h3\u003e\n\u003cp\u003eSaturn is Chronos — the personification of time. The word \"chronological\" derives from his name. Time is the ultimate cage. We are born into it, bound by it, consumed by it. Saturn devours his children, and time devours all things.\u003c/p\u003e\n\u003cp\u003eThe cube is the geometry of time made manifest. A clock face is two-dimensional, but time itself occupies three dimensions — past, present, future; length, width, depth. The cube contains all directions, all dimensions of the material world. To worship the cube is to worship the material prison, to submit to the limitations of physical existence rather than reaching for the spiritual reality beyond it.\u003c/p\u003e\n\u003cp\u003eThe Jesuits understand this profoundly. Their educational system, their calendar (the Gregorian calendar, designed by Jesuit Christopher Clavius), their system of spiritual exercises — all are mechanisms for binding consciousness to time, to schedule, to material discipline. The Jesuit motto is \u003cem\u003eAd Maiorem Dei Gloriam\u003c/em\u003e — \"For the Greater Glory of God.\" But which god? The God who exists beyond time, or Saturn, the god who is time?\u003c/p\u003e\n\u003ch3 id=\"the-work-week-six-days-in-the-cube\"\u003eThe Work Week: Six Days in the Cube\u003c/h3\u003e\n\u003cp\u003eThe work week consists of six days (for many, five, but the original pattern is six). Saturday — Saturn's Day — is the seventh day, the day of rest. In the Jewish tradition, the Sabbath (Saturday) is the holiest day. In the Christian tradition, Sunday replaced the Sabbath. In the secular world, Saturday is \"the weekend\" — the day of leisure, consumption, and entertainment.\u003c/p\u003e\n\u003cp\u003eSix days laboring in the cube (the cubicle, the office building, the factory floor) followed by a day dedicated to Saturn. This is the weekly rhythm of the Saturn system. Work produces currency. Currency is spent on Saturn's day. The cycle repeats until the worker is consumed — until Saturn devours his child.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack research details how the financial system reinforces this cycle of labor and consumption, ensuring that the population remains trapped in the material dimension, too exhausted and too distracted to seek spiritual truth. The cube is not just a symbol. It is the shape of the prison.\u003c/p\u003e\n\u003ch2 id=\"breaking-the-cube\"\u003eBreaking the Cube\u003c/h2\u003e\n\u003ch3 id=\"seeing-through-the-geometry\"\u003eSeeing Through the Geometry\u003c/h3\u003e\n\u003cp\u003eThe first step in breaking free from any prison is recognizing that you are in one. The cult of the Black Cube operates through invisibility — its symbols are so ubiquitous that they become invisible, like water to a fish. The mortarboard, the cubicle, the gift box, the television, the building, the temple — cubes everywhere, and nowhere recognized for what they are.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's message is urgent: 95 percent of professing Christians serve \"self\" rather than God. They are comfortable in the cube. They have decorated their cells and called them home. The 97.5 percent rejection rate is the natural consequence of a population that has chosen material comfort over spiritual truth.\u003c/p\u003e\n\u003cp\u003eThe Jesuit system depends on this comfort. As long as people do not question the symbols that surround them, the symbols do their work unimpeded. The cube binds. The ring constrains. The calendar controls. And the population, crowned with mortarboards and enclosed in cubicles, worships Saturn without knowing his name.\u003c/p\u003e\n\u003ch3 id=\"the-alternative-geometry\"\u003eThe Alternative Geometry\u003c/h3\u003e\n\u003cp\u003eIf the cube represents material limitation, what represents spiritual freedom? Scripture speaks of the \"new Jerusalem\" descending from heaven — and it, too, is described as a cube (Revelation 21:16). This returns us to the paradox: the cube may be a divine form that has been counterfeited. The solution is not to reject geometry but to understand whose service it is employed in.\u003c/p\u003e\n\u003cp\u003eThe choice, as always, is between masters. Serve Saturn — serve time, material, limitation, bondage — or serve the God who exists beyond time, beyond material, beyond the cube. The geometry is the same. The master makes the difference. And the Jesuits, who serve the wrong master while wearing the right vocabulary, are the living proof that symbols without truth are the most dangerous weapons in existence.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v
