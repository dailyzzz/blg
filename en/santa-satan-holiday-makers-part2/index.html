.\"\u003c/em\u003e — Ephesians 6:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe war for your soul did not begin yesterday. It began in the garden, when the serpent whispered the first lie, and it continues today through every institution, every tradition, every carefully crafted holiday that the masses celebrate without question. In Part 1, we began pulling at the thread. In Part 2, we tear the curtain wide open.\u003c/p\u003e\n\u003cp\u003eHoward Pittman, during his near-death experience, was shown the three heavens described in scripture. He witnessed the demonic realm operating in the second heaven and was told that 97.5 percent of Christians who died during his experience were turned away — told they had \"never made Me Lord.\" Pittman learned that 95 percent of professing Christians serve \"self\" rather than God, and that every word spoken carries spiritual weight, as confirmed in Matthew 12:36-37: \u003cem\u003e\"But I say unto you, That every idle word that men shall speak, they shall give account thereof in the day of judgment.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe Jesuits understood this spiritual architecture. Founded by Ignatius of Loyola as a military organization with absolute power, the Society of Jesus became the most sophisticated soul-harvesting operation the world has ever known. Napoleon himself declared of the Jesuits: \"The Jesuits are a military organization, not a religious order. Their chief is a general of an army, not the mere father abbot of a monastery. And the aim of this organization is power — power in its most despotic exercise — absolute power, universal power, power to control the world.\" John Adams wrote: \"If ever any congregation of men could merit eternal damnation on earth and in hell, it is the company of Loyola.\"\u003c/p\u003e\n\u003cp\u003eThe holiday system is one of their masterworks — a calendar of rituals disguised as celebration, each one a portal to Saturn worship hidden behind tinsel, candy, and tradition.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-rearranged-letters-santa-and-satan\"\u003eThe Rearranged Letters: Santa and Satan\u003c/h2\u003e\n\u003ch3 id=\"a-name-hidden-in-plain-sight\"\u003eA Name Hidden in Plain Sight\u003c/h3\u003e\n\u003cp\u003eIt has been observed by researchers for decades, yet it remains one of those truths that people dismiss with nervous laughter: the name \"Santa\" is an anagram of \"Satan.\" This is not a coincidence. The occult elite, the secret societies that have shaped Western civilization from behind the curtain, operate through symbolism. They believe that by placing the truth in plain sight, they absolve themselves of karmic responsibility. The victim, having been shown the truth and having failed to recognize it, becomes complicit in their own deception.\u003c/p\u003e\n\u003cp\u003eThe figure we know as Santa Claus is a composite character, assembled from fragments of pagan deities over centuries. His red suit, his association with the chimney and the fireplace, his omniscient knowledge of children's behavior, his flight through the sky on the winter solstice — each of these elements traces back to pre-Christian ritual practices associated with Saturn, Odin, and the horned god of the old religion.\u003c/p\u003e\n\u003cp\u003eThe Catholic Church, under Jesuit influence, did not eliminate these pagan figures. Instead, it absorbed them. The Jesuit oath, as revealed in the documentary \u003cem\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/em\u003e, describes an organization that infiltrates \"cloaked with cunning,\" demanding blind obedience and willing to engage in \"every species of vice\" to achieve its goals. The absorption of pagan deities into Christian holidays was not an accident of cultural synthesis — it was a deliberate strategy of spiritual subversion.\u003c/p\u003e\n\u003ch3 id=\"the-chimney-portal-and-fireplace-rituals\"\u003eThe Chimney Portal and Fireplace Rituals\u003c/h3\u003e\n\u003cp\u003eWhy does Santa enter through the chimney? In ancient pagan practice, the hearth was considered a portal between worlds. The fireplace was sacred to the household gods — the lares and penates of Roman religion, which itself was a continuation of Babylonian mystery religion. When families gather around the fireplace on Christmas Eve, waiting for a supernatural being to descend through the chimney bearing gifts, they are reenacting a summoning ritual that predates Christianity by millennia.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, who served as the intellectual architects of the Counter-Reformation, understood the power of ritual. Father General Tamburini boasted: \"See, my lord, from this room I govern not only to Paris, but to China, not only to China, but to all the world, without any one to know how I do it.\" This governance extended to the very rituals that families perform in their living rooms, believing them to be innocent tradition.\u003c/p\u003e\n\u003ch3 id=\"the-elves-demonic-servants-reimagined\"\u003eThe Elves: Demonic Servants Reimagined\u003c/h3\u003e\n\u003cp\u003eIn Norse mythology, elves were supernatural beings associated with the spirit world. Some were benign, but many were tricksters, shapeshifters, beings that could curse or bless at their choosing. The transformation of these entities into Santa's cheerful workshop helpers is another example of the occult practice of domesticating demonic imagery. Children are taught from infancy to welcome these beings into their imagination, to write letters requesting favors from an all-seeing entity who rewards and punishes — a grotesque parody of prayer.\u003c/p\u003e\n\u003cp\u003eHoward Pittman described the demons he witnessed as being organized in a strict hierarchy, each with specific roles and territories. The concept of Santa's workshop — a vast operation of supernatural beings laboring to fulfill desires — mirrors the demonic hierarchy that Pittman was shown operating in the second heaven. The parallel is not accidental. The architects of these traditions understood spiritual reality far better than the masses who celebrate them.\u003c/p\u003e\n\u003ch2 id=\"the-saturn-connection\"\u003eThe Saturn Connection\u003c/h2\u003e\n\u003ch3 id=\"saturn-lord-of-the-golden-age\"\u003eSaturn: Lord of the Golden Age\u003c/h3\u003e\n\u003cp\u003eSaturn was the Roman god of time, harvest, and dissolution. His Greek equivalent was Kronos, the titan who devoured his own children. The festival of Saturnalia, celebrated from December 17-23 in ancient Rome, was a period of role reversal, gift-giving, feasting, and moral license. Slaves were temporarily freed, social norms were inverted, and excess was not merely permitted but encouraged.\u003c/p\u003e\n\u003cp\u003eThe timing is not coincidental. Christmas, placed on December 25 by the Catholic Church, falls immediately after Saturnalia. The early church did not know the date of Christ's birth — no scripture records it. The placement of Christmas at the end of Saturnalia was a deliberate act of syncretism, designed to allow pagan converts to continue their Saturn worship under a Christian veneer.\u003c/p\u003e\n\u003cp\u003eAgent131711 has documented extensively on Substack (agent131711.substack.com) how these ancient patterns persist in modern culture, noting that the symbols of Saturn — the cube, the ring, the scythe of time — appear throughout corporate logos, religious architecture, and government buildings. The Saturn cult did not die. It went underground, and the Jesuits became its most effective custodians.\u003c/p\u003e\n\u003ch3 id=\"the-gift-exchange-an-offering-to-saturn\"\u003eThe Gift Exchange: An Offering to Saturn\u003c/h3\u003e\n\u003cp\u003eDuring Saturnalia, Romans exchanged gifts called \u003cem\u003esigillaria\u003c/em\u003e — small figurines, often of clay or wax. These were not merely tokens of affection. They were substitute offerings, stand-ins for the human sacrifices that had once been offered to Saturn in more ancient times. When modern families exchange gifts on Christmas morning, they are participating in a ritual whose original purpose was the appeasement of a deity who demanded the blood of children.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order, which Pope Clement XIV attempted to suppress before being poisoned for his trouble, ensured that these rituals survived. Clement's suppression brief of 1773 dissolved the order, but the Jesuits had already embedded themselves so deeply into the fabric of Western civilization that their influence could not be extracted. They returned officially in 1814, but in truth, they had never left.\u003c/p\u003e\n\u003ch3 id=\"the-christmas-tree-axis-mundi-of-the-saturn-cult\"\u003eThe Christmas Tree: Axis Mundi of the Saturn Cult\u003c/h3\u003e\n\u003cp\u003eThe Christmas tree, far from being a Christian symbol, represents the \u003cem\u003eaxis mundi\u003c/em\u003e — the world tree of pagan cosmology. In Norse tradition, it was Yggdrasil. In Babylonian tradition, it was associated with Tammuz, the dying and rising god whose worship the prophet Ezekiel condemned. Jeremiah 10:2-4 describes the practice explicitly: \u003cem\u003e\"For the customs of the people are vain: for one cutteth a tree out of the forest, the work of the hands of the workman, with the axe. They deck it with silver and with gold; they fasten it with nails and with hammers, that it move not.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe placement of a star or angel atop the tree represents the capstone of the pyramid, the all-seeing eye, the Luciferian light that the secret societies venerate. Every ornament, every light, every strand of tinsel is a piece of a ritual puzzle that families assemble each December without understanding what they are constructing.\u003c/p\u003e\n\u003ch2 id=\"the-jesuit-holiday-calendar\"\u003eThe Jesuit Holiday Calendar\u003c/h2\u003e\n\u003ch3 id=\"a-year-of-stolen-worship\"\u003eA Year of Stolen Worship\u003c/h3\u003e\n\u003cp\u003eChristmas is not the only holiday that the Jesuits repurposed. Easter, with its eggs and rabbits — both fertility symbols of the goddess Ishtar — continues the Babylonian mystery religion under Christian branding. Halloween, which the Catholic Church attempted to Christianize as All Saints' Eve, remains what it always was: a night when the veil between worlds thins and the dead are honored. Valentine's Day traces to the Roman festival of Lupercalia, a fertility rite involving animal sacrifice and ritualized coupling.\u003c/p\u003e\n\u003cp\u003eEach of these holidays serves the same purpose: to maintain the population in a state of unconscious ritual participation, feeding spiritual energy to entities that most people do not believe exist. As Pittman was told during his NDE, the spiritual realm is more real than the physical. Every ritual performed, every word spoken, every intention directed has consequences in the unseen world.\u003c/p\u003e\n\u003cp\u003eThe \u003cem\u003eCatholic Confidential\u003c/em\u003e documentary reveals how the Jesuit oath requires members to infiltrate every institution, to appear as whatever they need to appear — Protestant, atheist, agnostic — to achieve the order's goals. The holiday calendar is one such infiltration. It has penetrated every home, every school, every workplace. You cannot escape it. You can only understand it.\u003c/p\u003e\n\u003ch3 id=\"the-commercialization-not-an-accident\"\u003eThe Commercialization: Not an Accident\u003c/h3\u003e\n\u003cp\u003eMany Christians complain that Christmas has been \"commercialized,\" as though the materialism is a corruption of something pure. But the commercialization is the point. Saturn is the god of materialism, of the physical world, of time that devours all things. The frenzied consumption of Christmas — the maxed-out credit cards, the fought-over toys, the gluttony, the stress — is not a deviation from the holiday's purpose. It is its fulfillment. Every dollar spent in Saturn's season is an offering. Every family argument at the dinner table feeds the entities that Pittman saw operating in the second heaven.\u003c/p\u003e\n\u003cp\u003eThe Federal Reserve system, itself created through secret meetings orchestrated by banking families with deep Jesuit connections, ensures that the Christmas spending cycle keeps the population in debt — in bondage. The word \"mortgage\" literally means \"death pledge.\" The financial system and the holiday system work in concert, both serving the same master.\u003c/p\u003e\n\u003ch2 id=\"the-children-primary-targets\"\u003eThe Children: Primary Targets\u003c/h2\u003e\n\u003ch3 id=\"training-the-next-generation\"\u003eTraining the Next Generation\u003c/h3\u003e\n\u003cp\u003eThe most insidious aspect of the Santa mythology is its targeting of children. From their earliest years, children are taught to believe in an omniscient, omnipresent being who watches their every action, knows their every thought, and rewards or punishes accordingly. This is a deliberate parody of God — a false deity installed in the child's consciousness before they are old enough to exercise discernment.\u003c/p\u003e\n\u003cp\u003eWhen children eventually discover that Santa is not real, something breaks inside them. The first great authority figures in their lives — their parents — are revealed as liars. This creates a template of distrust that extends to all authority, including spiritual authority. Many adults trace their skepticism about God to the moment they learned the truth about Santa. This is by design. The Santa myth is an inoculation against faith.\u003c/p\u003e\n\u003cp\u003eAs documented by Agent131711 on Substack, the systematic targeting of children extends far beyond holiday mythology. The education system, the entertainment industry, the food supply — every vector of influence has been weaponized against the youngest and most vulnerable. The Jesuits famously declared: \"Give me the child for the first seven years and I will give you the man.\" The Santa myth is delivered during precisely those years.\u003c/p\u003e\n\u003ch3 id=\"the-lap-of-the-stranger\"\u003eThe Lap of the Stranger\u003c/h3\u003e\n\u003cp\u003eConsider the ritual of placing children on Santa's lap. A stranger, wearing a disguise, in a public place, invites children to sit on his lap and whisper their deepest desires. Parents not only permit this but encourage it, photograph it, celebrate it. In any other context, this behavior would be recognized as predatory. But because it is wrapped in tradition, it is normalized.\u003c/p\u003e\n\u003cp\u003eThe normalization of the abnormal is a hallmark of Satanic inversion. What is sacred is profaned. What is dangerous is presented as safe. What is a lie is presented as truth. The entire Santa system operates on this principle of inversion — the same principle that governs the secret societies that designed it.\u003c/p\u003e\n\u003ch2 id=\"breaking-free\"\u003eBreaking Free\u003c/h2\u003e\n\u003ch3 id=\"recognizing-the-pattern\"\u003eRecognizing the Pattern\u003c/h3\u003e\n\u003cp\u003eThe first step to freedom is recognition. Once you see the pattern, you cannot unsee it. The holidays are not what they appear. They are a sophisticated system of spiritual manipulation, designed by men who understood the invisible world far better than the average churchgoer, and maintained by institutions — particularly the Jesuit order — that have spent centuries perfecting the art of deception.\u003c/p\u003e\n\u003cp\u003eThis does not mean that gathering with family is evil, or that generosity is wrong. But the rituals themselves — the trees, the gifts, the stockings, the cookies left for Santa, the lies told to children — carry spiritual weight. Every word matters. Every ritual matters. Matthew 12:36-37 is not metaphorical.\u003c/p\u003e\n\u003ch3 id=\"the-choice-before-you\"\u003eThe Choice Before You\u003c/h3\u003e\n\u003cp\u003eHoward Pittman was sent back to deliver a message: the church is failing. Christians are playing at religion while the enemy operates with military precision. The Jesuits are a military organization. The demonic hierarchy is a military organization. The only defense is truth — spoken, lived, and embedded in every aspect of life, including how we celebrate and what traditions we pass to our children.\u003c/p\u003e\n\u003cp\u003eThe choice is yours. Continue participating in rituals whose origins and purposes have been hidden from you, or begin the difficult work of separating truth from tradition, light from the carefully crafted darkness that masquerades as celebration.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest
