3e\n\u003c/blockquote\u003e\n\u003cp\u003eThe year 1666 stands as one of the most consequential in the hidden history of the world. While the Great Fire of London captured public attention and the plague ravaged Europe, a spiritual revolution was taking place that would reshape the secret power structures of the West for centuries to come. The rise of Sabbatai Zevi as a false messiah, the subsequent Sabbatean movement, and the Jesuit manipulation of these events created a counterfeit spiritual order that persists in the shadows to this day. Understanding 1666 is essential to understanding the Illuminati, the secret societies, and the invisible government that controls the modern world.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's near-death experience revealed a spiritual hierarchy of extraordinary complexity — three heavens, organized demonic forces, and a system of deception so thorough that 97.5% of humanity walks the broad road to destruction without ever perceiving the forces directing their steps. The events of 1666 represent a pivotal moment in this spiritual war — a moment when the adversary deployed one of his most ambitious deceptions, creating a counterfeit messianic movement that would produce a permanent infrastructure of spiritual subversion. As Pittman was told, \"You call me Lord but you never made me Lord\" — and the Sabbatean heresy created an entire theological framework for calling evil \"Lord\" while serving the adversary.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order, already a century old by 1666, played a critical role in manipulating these events. Napoleon's assessment — \"The Jesuits are a military organization, not a religious order... the aim is power\" — explains their interest in every major spiritual and political upheaval. The Jesuits recognized in the Sabbatean movement an opportunity to advance their own agenda of global control, and their manipulation of the crisis would produce consequences that reverberate to the present day. The Confliction tracks \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e illuminate the spiritual dynamics that made these events possible.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-world-of-1666\"\u003eThe World of 1666\u003c/h2\u003e\n\u003ch3 id=\"a-civilization-in-crisis\"\u003eA Civilization in Crisis\u003c/h3\u003e\n\u003cp\u003eThe seventeenth century was a period of extraordinary upheaval in Western civilization. The Thirty Years' War (1618-1648) had devastated central Europe, killing an estimated eight million people and leaving entire regions depopulated. The English Civil War had overthrown and executed a king. The plague swept through Europe repeatedly, killing millions more. The Great Fire of London in 1666 destroyed much of the greatest city in the English-speaking world.\u003c/p\u003e\n\u003cp\u003eFor Jewish communities across Europe and the Ottoman Empire, the situation was especially dire. Centuries of persecution, expulsions, and violence had created a population desperate for deliverance. The Inquisition, operated by the Catholic Church with Jesuit participation, had forced millions of Jews to convert or face torture and death. Many converted outwardly while maintaining their faith secretly — a practice known as crypto-Judaism. This experience of forced outward conformity while maintaining hidden inner truth would profoundly shape the Sabbatean movement and its legacy.\u003c/p\u003e\n\u003cp\u003eThe convergence of catastrophe and desperation created the conditions for a messianic explosion. The Jewish mystical tradition held that 1666 — corresponding to certain kabbalistic calculations — would be the year of redemption. When a charismatic figure emerged claiming to be the Messiah, the response was overwhelming.\u003c/p\u003e\n\u003ch3 id=\"the-kabbalistic-context\"\u003eThe Kabbalistic Context\u003c/h3\u003e\n\u003cp\u003eThe Kabbalah, the Jewish mystical tradition, had experienced a profound renaissance in the sixteenth century through the teachings of Isaac Luria in Safed. Lurianic Kabbalah taught that the divine creation had suffered a catastrophic shattering — the \"breaking of the vessels\" — that scattered divine sparks throughout the material world. The process of redemption involved gathering these sparks and restoring the divine order through mystical practice and righteous action.\u003c/p\u003e\n\u003cp\u003eThis framework created a theological expectation that the Messiah would accomplish a cosmic restoration — not merely a political liberation but a transformation of the very nature of reality. The expectations placed on the coming Messiah were thus infinite in scope, which made the deception all the more devastating when it came.\u003c/p\u003e\n\u003ch2 id=\"sabbatai-zevi-the-false-messiah\"\u003eSabbatai Zevi: The False Messiah\u003c/h2\u003e\n\u003ch3 id=\"the-man-and-the-movement\"\u003eThe Man and the Movement\u003c/h3\u003e\n\u003cp\u003eSabbatai Zevi was born in Smyrna (modern Izmir, Turkey) in 1626. From his youth, he displayed both brilliance and instability — deep knowledge of kabbalistic texts combined with behavior that alternated between ecstatic inspiration and dark depression. Modern scholars have suggested he suffered from bipolar disorder; a spiritual analysis suggests he was under the influence of spiritual forces that used his instability as a doorway for extraordinary deception.\u003c/p\u003e\n\u003cp\u003eIn 1665, Zevi was proclaimed the Messiah by Nathan of Gaza, a young kabbalist who provided the theological framework for Zevi's messianic claims. Nathan's role was critical — he was the theologian to Zevi's prophet, providing intellectual legitimacy to claims that might otherwise have been dismissed as the ravings of a disturbed mind. The partnership between a charismatic figure and an intellectual enabler follows a pattern that would repeat throughout the history of subversive movements.\u003c/p\u003e\n\u003cp\u003eThe response to Zevi's proclamation was staggering in its scope. Jewish communities from Italy to Poland, from Amsterdam to Yemen, embraced Zevi as the long-awaited Messiah. Trade was abandoned, businesses were closed, and preparations were made for the imminent redemption. In some communities, Torah scrolls were burned in anticipation of the new law that the Messiah would establish. The fervor was so widespread that even many Christian observers took notice, with some interpreting the movement through their own eschatological frameworks.\u003c/p\u003e\n\u003ch3 id=\"the-apostasy\"\u003eThe Apostasy\u003c/h3\u003e\n\u003cp\u003eIn September 1666, Sabbatai Zevi was brought before the Ottoman Sultan and given a choice: convert to Islam or die. Zevi chose conversion, donning the turban and taking the name Aziz Mehmed Effendi. For most of his followers, this was the end — a devastating disillusionment that confirmed the worst fears of his critics.\u003c/p\u003e\n\u003cp\u003eBut for a significant minority, the apostasy was not a defeat but a revelation. Nathan of Gaza and other Sabbatean theologians developed an extraordinary doctrinal response: the Messiah's descent into the realm of evil was a necessary step in the process of redemption. Just as the divine sparks were scattered in the impure shells of the material world, the Messiah had to descend into the darkest realms to gather the sparks trapped there. Conversion to Islam — the embrace of what appeared to be evil — was actually the highest form of holiness.\u003c/p\u003e\n\u003cp\u003eThis doctrine — that the sacred is achieved through the violation of the sacred, that redemption comes through sin, that the Messiah serves God by appearing to serve evil — was the most dangerous theological innovation in modern history. It provided a framework for the systematic inversion of morality: what God calls evil becomes good when performed in service to the \"higher\" purpose of cosmic redemption.\u003c/p\u003e\n\u003ch2 id=\"the-frankist-inheritance\"\u003eThe Frankist Inheritance\u003c/h2\u003e\n\u003ch3 id=\"jacob-frank-and-the-doctrine-of-sacred-sin\"\u003eJacob Frank and the Doctrine of Sacred Sin\u003c/h3\u003e\n\u003cp\u003eA century after Sabbatai Zevi, Jacob Frank (1726-1791) revived and radicalized the Sabbatean doctrine. Frank proclaimed himself the reincarnation of Zevi and the incarnation of God. His theology took the Sabbatean inversion to its logical extreme: all traditional law must be violated, all conventional morality must be overthrown, and the path to redemption runs through the deliberate embrace of transgression.\u003c/p\u003e\n\u003cp\u003eFrank's movement, known as Frankism, practiced ritual sexual transgression, including orgies and incest, as religious sacraments. The violation of sexual norms was not merely permitted — it was required as a spiritual practice. This theological framework created a permanent template for the sacralization of perversion that would influence secret societies for centuries.\u003c/p\u003e\n\u003cp\u003eFrank eventually converted to Catholicism, presenting himself to the Catholic Church as a sincere convert who could bring his followers into the fold. The Church, and particularly the Jesuits, saw an opportunity in Frank's conversion. Here was a man who could deliver thousands of Jewish converts — a prize that the Jesuits, with their missionary ambitions, valued highly.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-frankist-alliance\"\u003eThe Jesuit-Frankist Alliance\u003c/h3\u003e\n\u003cp\u003eThe relationship between Frank's movement and the Jesuit order represents one of the most significant and least understood alliances in modern history. The Jesuits facilitated Frank's conversion and provided institutional support for his movement's integration into Catholic society. Frank and many of his followers entered Catholic aristocratic circles, intermarried with noble families, and established themselves within the power structures of European society.\u003c/p\u003e\n\u003cp\u003eThe Jesuit interest in the Frankists was strategic. A movement that practiced blind obedience to its leader, maintained strict secrecy, and operated through a hidden internal structure was a natural ally for an order that operated on identical principles. Catholic Confidential reveals that the Jesuits require \"blind obedience\" and that \"every species of vice finds its patronage in them\" — a description that applies equally to the Frankist movement.\u003c/p\u003e\n\u003cp\u003eThe alliance created a hybrid network that combined Jesuit organizational discipline with Frankist theological nihilism. Members of this network could operate within Catholic society while maintaining hidden beliefs and practices that were antithetical to Catholic teaching. This model of outward conformity with hidden inner practice — rooted in the crypto-Jewish experience of the Inquisition era — became the operational template for the secret societies that would emerge in the eighteenth century.\u003c/p\u003e\n\u003ch2 id=\"the-road-to-the-illuminati\"\u003eThe Road to the Illuminati\u003c/h2\u003e\n\u003ch3 id=\"from-1666-to-1776\"\u003eFrom 1666 to 1776\u003c/h3\u003e\n\u003cp\u003eThe century between Sabbatai Zevi's apostasy and the founding of the Bavarian Illuminati in 1776 was the incubation period for the most ambitious conspiracy in human history. During this period, the Sabbatean-Frankist movement merged with existing secret society networks — Freemasonry, Rosicrucianism, and various Hermetic orders — to create an infrastructure of subversion that would eventually challenge the established order of Europe and the world.\u003c/p\u003e\n\u003cp\u003eThe connection between these movements was not theoretical — it was personal. Individuals connected to Sabbatean-Frankist networks were among the founders and early members of Masonic lodges across Europe. The Masonic emphasis on secrecy, hierarchical initiation, and hidden knowledge aligned perfectly with the Sabbatean model of outward conformity concealing inner transgression.\u003c/p\u003e\n\u003cp\u003eThe Jesuit order, which had been suppressed by Pope Clement XIV in 1773 — just three years before the Illuminati's founding — had the most powerful motivation of any organization to operate through secret society networks. Clement XIV, who declared \"I have signed my death warrant\" after issuing the brief of suppression, was indeed poisoned within a year. The suppressed Jesuits did not disappear — they went underground, operating through the very secret society networks they had helped to create.\u003c/p\u003e\n\u003ch3 id=\"adam-weishaupt-and-the-jesuit-connection\"\u003eAdam Weishaupt and the Jesuit Connection\u003c/h3\u003e\n\u003cp\u003eAdam Weishaupt, the founder of the Bavarian Illuminati, was educated by Jesuits and held a position at the University of Ingolstadt that had previously been held by Jesuits. His organization's structure, with its hierarchical degrees, its emphasis on obedience, its practice of surveillance over members, and its long-term strategic planning, bore the unmistakable imprint of Jesuit organizational methodology.\u003c/p\u003e\n\u003cp\u003eWhether Weishaupt was a Jesuit agent, a Jesuit rebel, or an independent operator who absorbed Jesuit methods through his education is debated among researchers. What is not debated is the structural similarity between the Illuminati and the Jesuit order. Both operated through hidden membership in public institutions. Both required absolute obedience to superiors. Both pursued global ambitions through long-term strategic planning. Both viewed the manipulation of governments and institutions as legitimate means to their ends.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e traces the connections between the Illuminati and the founding of the American republic — connections that reveal how deeply these networks penetrated the political structures of the Western world from their earliest days.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-architecture-of-deception\"\u003eThe Spiritual Architecture of Deception\u003c/h2\u003e\n\u003ch3 id=\"inversion-as-method\"\u003eInversion as Method\u003c/h3\u003e\n\u003cp\u003eThe Sabbatean doctrine of \"redemption through sin\" established a spiritual methodology that persists in every subsequent manifestation of the Illuminati tradition. The inversion of moral categories — calling evil good and good evil, as Isaiah warned — is not merely a philosophical position. It is an operational method that enables those who practice it to engage in any activity while maintaining the belief that they are serving a higher purpose.\u003c/p\u003e\n\u003cp\u003eThis methodology explains the persistence of ritual practices within secret societies that appear incompatible with their stated purposes. When morality is inverted, every transgression becomes a sacrament. The abuse of children becomes a ritual of power. The practice of deception becomes a service to \"truth.\" The pursuit of total control becomes an act of \"liberation.\" The language of virtue is maintained while its meaning is precisely reversed.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony illuminates the spiritual reality behind this inversion. The demons he witnessed in the second heaven do not present themselves as evil — they present themselves as servants of a higher reality that transcends conventional morality. The lie is always the same: \"You shall be as gods, knowing good and evil.\" The Sabbatean-Frankist-Illuminati tradition is the institutional expression of this primordial lie, preserved and transmitted through centuries of organized deception.\u003c/p\u003e\n\u003ch3 id=\"the-three-heavens-and-the-counterfeit-kingdom\"\u003eThe Three Heavens and the Counterfeit Kingdom\u003c/h3\u003e\n\u003cp\u003ePittman's description of the three heavens — the first heaven (the physical sky), the second heaven (the realm of demonic activity), and the third heaven (the presence of God) — provides the framework for understanding the Sabbatean deception. The Sabbatean claim that the Messiah must descend into evil to redeem it is a counterfeit version of the genuine Christian doctrine that Christ descended into death to conquer it. The critical difference is that Christ's descent was a sacrifice that defeated evil, while the Sabbatean \"descent\" is a celebration that empowers evil.\u003c/p\u003e\n\u003cp\u003eThe counterfeit is always close enough to the truth to deceive. The Sabbatean movement drew on genuine kabbalistic concepts, genuine messianic expectations, and genuine spiritual hunger to create a system that directed all of that spiritual energy toward the adversary rather than toward God. This is the methodology of the second heaven — the realm where demonic forces create counterfeit spiritual experiences that feel real, appear divine, and lead to destruction.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e reveals the origin of this counterfeit system — the angelic rebellion that introduced the principle of inversion into the created order. The events of 1666 were not the beginning of this war; they were a critical battle in a war that has been fought since before human history began.\u003c/p\u003e\n\u003ch2 id=\"the-legacy-that-persists\"\u003eThe Legacy That Persists\u003c/h2\u003e\n\u003ch3 id=\"from-1666-to-the-present\"\u003eFrom 1666 to the Present\u003c/h3\u003e\n\u003cp\u003eThe Sabbatean-Frankist-Illuminati tradition did not end with the suppression of the Bavarian Illuminati in 1785. It continued through Masonic networks, through banking dynasties, through political movements, and through the institutional infrastructure that these networks built over centuries. The French Revolution, which erupted just four years after the Illuminati's supposed destruction, bore all the hallmarks of Illuminati methodology: the overthrow of established authority, the destruction of religious institutions, and the establishment of a new order based on rationalist principles that concealed an inner core of occult practice.\u003c/p\u003e\n\u003cp\u003eEach subsequent revolution — political, cultural, sexual, technological — has followed the pattern established in 1666: the counterfeit promise of liberation that delivers enslavement, the inversion of moral categories, and the destruction of the institutions that connect human beings to God. The continuity of this pattern is not coincidental. It reflects the continuity of the spiritual forces that drive it and the organizational networks that execute it.\u003c/p\u003e\n\u003cp\u003eUnderstanding 1666 is not an exercise in historical curiosity. It is the key to understanding the present — the secret societies that govern from the shadows, the moral inversions that define modern culture, and the spiritual deceptions that lead 97.5% of humanity toward destruction. In the parts that follow, we will trace this legacy through the founding of the American republic, through the Masonic and Jesuit networks that shaped its institutions, and through the ongoing spiritual war that determines the destiny of every human soul.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"The Illuminati of 1666,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u0 ns Exposed Part 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe year 1666 was not merely a historical date — it was a turning point in the spiritual war for humanity. The false messiah, the doctrine of redemption through sin, and the alliance between Sabbatean nihilism and Jesuit discipline created the organizational and theological foundation for the secret societies that govern the modern world. From 1666 to the present, the same pattern repeats: the adversary offers enlightenment while delivering bondage, promises liberation while constructing chains, and presents himself as an angel of light while dragging souls into darkness. Understanding this pattern is the first step toward escaping it.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"The Jews, Jesus, and the Illuminati of 1666 Part 1\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Tracing the origins of the Illuminati to 1666, the Sabbatean movement, and Jesuit infiltration that created a counterfeit spiritual revolution.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-09-30T10:00:00Z\",\"children\":\"September 30, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdai
