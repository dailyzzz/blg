3cp\u003eYou were told the Bible is the Word of God — inspired, inerrant, and authoritative. You were not told who actually wrote it, when they wrote it, why they wrote it, or who decided which texts would be included and which would be excluded. These are not minor details. They are the foundation upon which your entire faith rests — or collapses.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed that the spiritual realm operates on truth, not tradition. The 97.5 percent of Christians rejected at death had trusted the institution's version of truth rather than seeking truth themselves. Pittman learned that 95 percent serve \"self\" and that every word carries spiritual weight (Matthew 12:36-37). If the words of the Bible were written, edited, and curated by men with institutional agendas, the spiritual weight of those words depends on whether they transmit genuine truth or institutional fabrication.\u003c/p\u003e\n\u003cp\u003eThe Jesuits — Loyola's military organization of \"absolute power\" (Napoleon), \"eternal damnation\" (Adams), global governance (Tamburini) — have been the Bible's most aggressive gatekeepers. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals their infiltration \"cloaked with cunning,\" blind obedience, and \"every species of vice.\" These are the men who determined what you read when you open your Bible. Clement XIV was poisoned for crossing them. What chance did the text have?\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/35-The_Tree_of_Life.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Tree of Life — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/23-The_Sun_and_the_Moon.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Sun and the Moon — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-traditional-claims\"\u003eThe Traditional Claims\u003c/h2\u003e\n\u003ch3 id=\"what-the-institution-teaches\"\u003eWhat the Institution Teaches\u003c/h3\u003e\n\u003cp\u003eThe traditional teaching is straightforward: Moses wrote the first five books (the Pentateuch). David wrote the Psalms. Solomon wrote Proverbs, Ecclesiastes, and Song of Solomon. The prophets wrote the prophetic books. Matthew, Mark, Luke, and John wrote the Gospels bearing their names. Paul wrote thirteen epistles. And all of it was \"inspired\" by God — the human authors were vessels through which divine truth flowed.\u003c/p\u003e\n\u003cp\u003eThis teaching is convenient for the institution. It places the Bible's authority beyond question — if God wrote it, who are you to doubt it? It also gives the institution the exclusive right to interpret it — if the text is divine, only trained clergy can understand it properly.\u003c/p\u003e\n\u003cp\u003eBoth claims serve institutional power. Both should be examined.\u003c/p\u003e\n\u003ch3 id=\"what-scholarship-reveals\"\u003eWhat Scholarship Reveals\u003c/h3\u003e\n\u003cp\u003eModern biblical scholarship — not atheist polemics, but mainstream academic research, much of it conducted by believing Christians — has demonstrated that the traditional authorship claims are largely unsupported.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Pentateuch\u003c/strong\u003e: Moses did not write the first five books of the Bible. The Documentary Hypothesis, developed over two centuries of scholarship, identifies at least four distinct source documents (J, E, D, and P) woven together by later editors. These sources date from approximately 950 BCE to 500 BCE — hundreds of years apart. The final editing occurred after the Babylonian exile, at least 800 years after Moses allegedly lived.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gospels\u003c/strong\u003e: The four Gospels are anonymous. The names Matthew, Mark, Luke, and John were assigned to them in the second century. None of the Gospels identify their authors internally. The earliest Gospel, Mark, was written approximately 70 AD — 40 years after Jesus — by someone who was not an eyewitness. Matthew and Luke copied extensively from Mark and from another lost source called \"Q.\" John was written latest and differs dramatically from the other three.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePaul's Letters\u003c/strong\u003e: Of the thirteen letters attributed to Paul, mainstream scholarship considers only seven to be authentically Pauline (Romans, 1 and 2 Corinthians, Galatians, Philippians, 1 Thessalonians, and Philemon). The remaining six are considered pseudepigraphical — written by later authors using Paul's name, a common practice in the ancient world.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack (agent131711.substack.com) documents how these scholarly findings have been systematically suppressed from the general Christian public. Seminaries teach them to pastors, who then choose not to share them with congregations. The result is a massive information gap between what clergy know and what laypeople believe.\u003c/p\u003e\n\u003ch2 id=\"the-editing-process\"\u003eThe Editing Process\u003c/h2\u003e\n\u003ch3 id=\"scribes-and-alterations\"\u003eScribes and Alterations\u003c/h3\u003e\n\u003cp\u003eThe Bible was transmitted by hand copying for over a thousand years before the printing press. During this period, scribes introduced thousands of changes — some accidental, some deliberate. Bart Ehrman's research has documented over 400,000 textual variants among existing New Testament manuscripts. The majority are minor (spelling differences, word order), but some are significant:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Johannine Comma (1 John 5:7-8)\u003c/strong\u003e: The explicit Trinitarian statement \"For there are three that bear record in heaven, the Father, the Word, and the Holy Ghost: and these three are one\" does not appear in any Greek manuscript before the 16th century. It was added by scribes to support the doctrine of the Trinity. Modern translations remove it, but the King James Version — used by millions — still includes it.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Woman Caught in Adultery (John 7:53-8:11)\u003c/strong\u003e: This famous story is not in the earliest manuscripts of John. It was added by scribes, probably in the 5th century. It is a beautiful story, but it was not part of the original text.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMark's Ending (Mark 16:9-20)\u003c/strong\u003e: As discussed in Part 3, the original ending of Mark stops at 16:8. The resurrection appearances in Mark were added by later scribes who were uncomfortable with the original abrupt ending.\u003c/p\u003e\n\u003cp\u003eThese are not disputed points. They are the consensus of textual scholarship, confirmed by examination of the oldest manuscripts. The Bible you hold has been edited by human hands over centuries, and some of those edits changed the theological content of the text.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-vulgate\"\u003eThe Jesuit Vulgate\u003c/h3\u003e\n\u003cp\u003eThe Catholic Church's official Bible for over a millennium was the Latin Vulgate, translated by Jerome in the late 4th century. Jerome himself noted translation difficulties and editorial choices in his letters. The Vulgate became the standard through institutional authority, not through demonstrated accuracy.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, after the Reformation, championed the Vulgate against Protestant translations. The Council of Trent (1546), heavily influenced by the Jesuits, declared the Vulgate to be \"authentic\" — meaning it was the authoritative version for doctrine and practice. This was a political decision, not a scholarly one. It ensured that the Catholic Church controlled the text of scripture and, through it, the beliefs of the faithful.\u003c/p\u003e\n\u003cp\u003eWhen scholars later demonstrated that the Vulgate contained errors — mistranslations, additions, omissions — the institution resisted correction. The truth of the text was less important than the authority of the institution that controlled it. This is the Jesuit method documented in \u003cem\u003eCatholic Confidential\u003c/em\u003e: blind obedience to institutional authority, regardless of evidence.\u003c/p\u003e\n\u003ch2 id=\"the-canon-who-decided\"\u003eThe Canon: Who Decided?\u003c/h2\u003e\n\u003ch3 id=\"the-selection-process\"\u003eThe Selection Process\u003c/h3\u003e\n\u003cp\u003eThe New Testament canon — the 27 books that constitute the Christian Bible — was not established by Jesus, the apostles, or divine decree. It was established by a series of church councils over several centuries, through a process of debate, negotiation, and political pressure.\u003c/p\u003e\n\u003cp\u003eThe first list matching the modern 27-book New Testament appears in Athanasius's Easter letter of 367 AD — over 300 years after Jesus. The councils of Hippo (393 AD) and Carthage (397 AD) ratified this selection. But the process was contentious. Books that some communities considered scripture — the Shepherd of Hermas, the Didache, the Epistle of Barnabas, 1 Clement — were excluded. Books that some communities rejected — Revelation, 2 Peter, Jude, 2 and 3 John — were included.\u003c/p\u003e\n\u003cp\u003eThe criteria for inclusion were not clearly defined. General guidelines included apostolic origin, orthodoxy, widespread use, and edification. But these criteria were applied inconsistently: Hebrews was included despite uncertain authorship; Revelation was included despite widespread early opposition; 2 Peter was included despite near-universal scholarly agreement that it is pseudepigraphical.\u003c/p\u003e\n\u003ch3 id=\"political-not-divine\"\u003ePolitical, Not Divine\u003c/h3\u003e\n\u003cp\u003eThe canon was assembled by men with political agendas. Constantine, who convened the Council of Nicaea in 325 AD, was not a theologian — he was an emperor seeking to unify his empire under a single religion. The bishops who attended these councils were politicians as much as pastors, jockeying for influence, protecting their communities' preferred texts, and forging compromises.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the spiritual realm operates on truth, not institutional compromise. If the canon was assembled through political negotiation, it may contain truth — but its authority rests on human decision, not divine command. The institution has spent centuries papering over this fact, presenting the canon as divinely guided while suppressing the messy, political reality of its creation.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, who came later, inherited this canon and defended it with their characteristic ferocity. Any challenge to the canon was a challenge to institutional authority, and institutional authority was the Jesuits' primary product. Their universities, their seminaries, their publishing houses — all serve to maintain the canon as an unquestionable foundation, despite the historical evidence that its creation was entirely human.\u003c/p\u003e\n\u003ch2 id=\"the-lost-books\"\u003eThe Lost Books\u003c/h2\u003e\n\u003ch3 id=\"what-was-excluded\"\u003eWhat Was Excluded\u003c/h3\u003e\n\u003cp\u003eThe texts excluded from the canon are as revealing as the texts included. The Nag Hammadi library, discovered in Egypt in 1945, contains dozens of early Christian texts that were systematically suppressed by the institutional church:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gospel of Thomas\u003c/strong\u003e: A collection of 114 sayings attributed to Jesus, emphasizing direct knowledge of God rather than institutional mediation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gospel of Philip\u003c/strong\u003e: Explores the concept of sacred marriage and spiritual transformation in ways that challenge orthodox theology.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gospel of Truth\u003c/strong\u003e: A Valentinian text presenting a radically different understanding of creation, fall, and redemption.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Apocryphon of John\u003c/strong\u003e: A detailed cosmological text describing the origin of the material world as the product of a fallen deity.\u003c/p\u003e\n\u003cp\u003eThese texts were not rejected because they were proven false. They were rejected because they undermined institutional authority. The Gospel of Thomas, for example, requires no church, no priest, no sacrament — only the individual's direct encounter with truth. This is intolerable to an institution that derives its power from being the necessary intermediary between God and humanity.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack research traces the suppression of these texts to the same institutional logic that drives the Jesuits: control the narrative, control the population. By determining what is and is not \"scripture,\" the institution determines what is and is not possible for God to say. This is the ultimate power — the power to put words in God's mouth and to silence any text that contradicts those words.\u003c/p\u003e\n\u003ch2 id=\"implications-for-faith\"\u003eImplications for Faith\u003c/h2\u003e\n\u003ch3 id=\"the-bible-is-not-what-you-were-told\"\u003eThe Bible Is Not What You Were Told\u003c/h3\u003e\n\u003cp\u003eThis does not mean the Bible is worthless. Many of its texts transmit profound spiritual truth. But it means the Bible is not what the institution told you it is — a single, unified, divinely authored document that fell from heaven intact.\u003c/p\u003e\n\u003cp\u003eIt is a collection of texts written by multiple authors over centuries, edited by scribes, selected by councils, defended by institutions, and transmitted through a process that introduced thousands of changes. It contains genuine wisdom alongside political theology, authentic spiritual insight alongside institutional propaganda.\u003c/p\u003e\n\u003cp\u003eThe honest reader acknowledges all of this and reads accordingly: testing everything, holding fast to what is good, and refusing to elevate human institutional decisions to the level of divine command.\u003c/p\u003e\n\u003ch3 id=\"what-pittmans-experience-tells-us\"\u003eWhat Pittman's Experience Tells Us\u003c/h3\u003e\n\u003cp\u003eHoward Pittman's NDE confirms that spiritual reality exists and that most Christians are deceived. The deception is not necessarily in the text itself but in the framework the institution has built around the text — the framework that says \"do not question,\" \"do not examine,\" \"trust the institution.\"\u003c/p\u003e\n\u003cp\u003eThe Bible commands the opposite: prove all things. Search the scriptures daily. Test the spirits. The institution built on the Bible contradicts the Bible. This paradox is the key to understanding the entire system — and to breaking free from it.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Research on Bible authorship, canon formation, and suppressed texts\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Spiritual reality versus institutional religion\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — Jesuit control of scripture and theological narrative\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/35-The_Tree_of_Life.mp4\"\u003eThe Tree of Life\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/23-The_Sun_and_the_Moon.mp4\"\u003eThe Sun and the Moon\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/15-From_Dust_to_Glory.mp4\"\u003eFrom Dust to Glory\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/83-Ancient_Documents.mp4\"\u003eAncient Documents\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/77-The_Dome_Above.mp4\"\u003eThe Dome Above\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/resurrection-actually-happen-part3/?lang=en\"\u003eDid the Resurrection Actually Happen: Examining the Evidence Part 3\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/untold-history-constructing-new-testament-part5/?lang=en\"\u003eThe UNTOLD HISTORY of Constructing the New Testament Part 5\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/mass-deletion-church-created-christianity/?lang=en\"\u003eThe Mass Deletion: How the Church Created Its Own Version of Christianity\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe Bible is not fragile. Truth is not fragile. Only lies are fragile — and the institutional framework built around the Bible is full of lies. Examine the text. Question the institution. And trust that genuine truth, wherever it is found, does not need an army of Jesuits to defend it.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Who Really Wrote the Bible Part 4\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Part 4 investigates true Bible authorship. Discover how Jesuit institutions shaped the canon and what was hidden from you about scripture.\"}],[\"$\",\"di
