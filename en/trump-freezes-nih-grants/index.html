iah returned to Jerusalem and discovered that the Levites had been driven from the Temple because the tithes had been diverted, he did not merely restore the tithes. He confronted the officials who had allowed the diversion, purified the chambers, and established new oversight. The money had been misallocated — not to external enemies, but by internal corruption. The same funds meant to sustain the house of God had been redirected to serve private interests.\u003c/p\u003e\n\u003cp\u003eAs the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e reveals, forbidden knowledge always carries a price — and the price is always paid by those who did not choose to pursue it. The NIH's research grant system has spent decades funneling taxpayer money into research programs that advanced pharmaceutical industry interests while neglecting the fundamental questions about public health that the agency was created to answer.\u003c/p\u003e\n\u003cp\u003eThe freeze has come. The tithes have been stopped. And the officials who diverted them are demanding to know why.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-nih-grant-machine\"\u003eThe NIH Grant Machine\u003c/h2\u003e\n\u003cp\u003eThe National Institutes of Health is the largest public funder of biomedical research in the world, with an annual budget exceeding $47 billion. The vast majority of this budget — approximately $32 billion — is distributed through research grants to universities, medical schools, research institutions, and individual scientists across the country and around the world.\u003c/p\u003e\n\u003cp\u003eThe NIH grant system shapes American biomedical research in its entirety. Research topics that receive NIH funding are pursued. Topics that do not receive NIH funding are abandoned. Scientists who align their research with NIH priorities receive funding, tenure, and prestige. Scientists who pursue questions outside NIH priorities face career stagnation.\u003c/p\u003e\n\u003cp\u003eThis system gives the NIH — and by extension, the officials who control NIH funding priorities — effective veto power over the direction of American biomedical science. If the NIH decides that a question should not be studied, it will not be studied. If the NIH decides that a research approach should be prioritized, it will be prioritized. The agency does not merely fund science — it directs it.\u003c/p\u003e\n\u003cp\u003eKaren Kingston has documented in The Kingston Report (karenkingston.substack.com) that the NIH's funding priorities have been systematically aligned with pharmaceutical industry interests: \"The NIH does not fund research that threatens pharmaceutical revenue. It does not fund comparative studies of vaccinated vs. unvaccinated populations. It does not fund research into natural immunity. It does not fund investigations into the root causes of chronic disease that might implicate pharmaceutical products. It funds research that supports the development, marketing, and deployment of pharmaceutical products — because the officials who set funding priorities are connected to the industry that profits from them.\"\u003c/p\u003e\n\u003ch3 id=\"the-royalty-problem\"\u003eThe Royalty Problem\u003c/h3\u003e\n\u003cp\u003eA critical and underreported aspect of NIH corruption is the royalty system. NIH scientists — including those in leadership positions who influence funding decisions — are entitled to receive personal royalty payments from pharmaceutical companies that commercialize technologies developed with NIH support.\u003c/p\u003e\n\u003cp\u003eBetween 2010 and 2020, NIH scientists received an estimated $350 million in royalty payments from pharmaceutical and biotech companies. These payments were made to individual scientists — not to the agency — and were not publicly disclosed until forced through FOIA litigation.\u003c/p\u003e\n\u003cp\u003eThe conflict of interest is staggering. NIH scientists who receive royalties from pharmaceutical companies are the same scientists who:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSet research funding priorities\u003c/li\u003e\n\u003cli\u003eReview grant applications from other researchers\u003c/li\u003e\n\u003cli\u003eServe on advisory committees that influence drug and vaccine policy\u003c/li\u003e\n\u003cli\u003eMake decisions about which research questions are worth pursuing\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eA scientist receiving personal royalties from Moderna has a financial interest in research that supports Moderna's products — and a financial disincentive to fund research that might question them.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-freeze\"\u003eThe Freeze\u003c/h2\u003e\n\u003cp\u003ePresident Trump's freeze on NIH grant approvals and research funding halts the flow of taxpayer money through a system that has been documented to operate with pervasive conflicts of interest and inadequate oversight. The freeze encompasses:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNew grant approvals:\u003c/strong\u003e No new NIH research grants will be approved during the freeze period.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGrant renewals:\u003c/strong\u003e Existing grants will not be renewed until a comprehensive review of NIH funding priorities and conflict-of-interest policies is completed.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eIntramural research:\u003c/strong\u003e Research conducted within NIH's own laboratories is subject to review for alignment with reformed agency priorities.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInternational grants:\u003c/strong\u003e NIH funding flowing to international research institutions — including institutions involved in gain-of-function research — is frozen pending review.\u003c/p\u003e\n\u003cp\u003eThe freeze does not affect grants that have already been disbursed or research that is currently being conducted under existing funding. It affects the pipeline — the next round of grants, renewals, and approvals.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-response\"\u003eThe Response\u003c/h2\u003e\n\u003cp\u003eThe scientific establishment has responded with unprecedented alarm. University administrators warn of laboratory closures. Department chairs warn of researcher departures. Scientific journals publish editorials decrying the \"politicization of science.\" Nobel laureates sign open letters demanding the restoration of funding.\u003c/p\u003e\n\u003cp\u003eBut the alarm is selective. The same scientific establishment that now demands the restoration of taxpayer funding:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDid not raise alarm when NIH funding priorities were aligned with pharmaceutical industry interests\u003c/li\u003e\n\u003cli\u003eDid not demand transparency when NIH scientists received hundreds of millions in personal royalties from the companies they were supposed to oversee\u003c/li\u003e\n\u003cli\u003eDid not object when NIH-funded research supported the development of products deployed under Emergency Use Authorization without completed clinical trials\u003c/li\u003e\n\u003cli\u003eDid not protest when NIH funding was used to support gain-of-function research at foreign laboratories\u003c/li\u003e\n\u003cli\u003eDid not demand accountability when the NIH suppressed early treatment research that threatened the EUA framework\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u003c/a\u003e documents how the funding streams connecting federal agencies, defense contractors, and pharmaceutical companies create a self-sustaining ecosystem in which the same money cycles through the same institutions, producing the same outcomes, regardless of the public interest.\u003c/p\u003e\n\u003cp\u003eKingston has observed: \"The scientific establishment is not alarmed because research will stop. It is alarmed because the money will stop. The NIH grant system is not merely a funding mechanism — it is a patronage system. Universities depend on NIH overhead (indirect cost) payments that fund their administration, their buildings, and their expansion. Researchers depend on NIH grants for their salaries, their tenure, and their prestige. The freeze threatens not scientific progress but institutional revenue.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prophetic-lens\"\u003eThe Prophetic Lens\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Will a man rob God? Yet ye have robbed me. But ye say, Wherein have we robbed thee? In tithes and offerings.\" — Malachi 3:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe NIH was created to serve the American people — to use taxpayer funds to advance knowledge that protects and improves human health. Instead, the agency has served the pharmaceutical industry — using taxpayer funds to develop products that generate private profit while leaving the public to bear the costs and the consequences.\u003c/p\u003e\n\u003cp\u003eThis is a form of robbery. The tithes of the American people — their tax dollars — were offered for the purpose of health. They were diverted to the purpose of profit. The freeze is an attempt to restore the original purpose of the offering.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eNIH.gov — Budget, grant program documentation, and funding statistics\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Karen Kingston's analysis of NIH funding conflicts, royalty payment documentation, and institutional capture through the grant system\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eOpen The Books — NIH royalty payment disclosures obtained through FOIA\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eNIH Office of Extramural Research — Grant management policies\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eLuke 16:10, Malachi 3:8 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003c e funded by stolen tithes\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e — Crossing the boundary between public service and private profit\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/hhs-pulls-mrna-research-funding/?lang=en\"\u003eHHS Pulls $500 Million in mRNA Research Funding\u003c/a\u003e — The mRNA-specific funding cuts\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/trump-bans-gain-of-function/?lang=en\"\u003eTrump Executive Order Bans Gain-of-Function Research\u003c/a\u003e — Banning the research the NIH funded abroad\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/hhs-maha-transformation/?lang=en\"\u003eHHS Announces MAHA Transformation of Healthcare\u003c/a\u003e — The broader reform vision\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/fauci-covid-emails-disclosed/?lang=en\"\u003eWill Fauci's COVID-19 Emails Finally Be Disclosed\u003c/a\u003e — The communications trail from NIH leadership\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNehemiah found that the tithes meant for the Temple had been diverted to private interests, the Levites had been driven away, and the house of God stood neglected. The NIH's $47 billion annual budget — funded by the tithes of the American taxpayer — has been diverted to pharmaceutical industry profit, genuine safety research has been driven away, and the house of public health stands neglected. The freeze is Nehemiah's confrontation — a demand that the money return to its intended purpose. \"Bring ye all the tithes into the storehouse, that there may be meat in mine house, and prove me now herewith, saith the LORD of hosts, if I will not open you the windows of heaven\" (Malachi 3:10). The tithes have been misdirected for decades. The freeze demands their restoration.\u003c/em\u003e\u003c/p\u003e"]
