\n\u003cp\u003eIn the first three parts of this series, we established that V2K technology is real, that it has been weaponized by the military, and that a sophisticated disinformation campaign protects it from public scrutiny. Now comes the question that every targeted individual asks — and that the establishment desperately wants to prevent you from answering: \u003cstrong\u003eWho is doing this?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe answer is not a single person or a single agency. It is a network — a web of intelligence agencies, military contractors, research institutions, and secret societies that operates across national boundaries and outside democratic oversight. This network has roots in the Jesuit order's centuries-old infrastructure of global control, it has been technologically empowered by the military-industrial complex, and it is spiritually animated by the principalities and powers described in Ephesians 6:12.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the second heaven is organized with military precision — ranks, hierarchies, chains of command. The earthly V2K network mirrors this spiritual structure: it has commanders, operators, analysts, and support staff. It operates within classified programs that are shielded from congressional oversight, public accountability, and legal challenge. And it targets civilians with impunity, because the legal and medical systems have been designed to make V2K targeting invisible and its victims voiceless.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-intelligence-agencies\"\u003eThe Intelligence Agencies\u003c/h2\u003e\n\u003ch3 id=\"the-cia\"\u003eThe CIA\u003c/h3\u003e\n\u003cp\u003eThe Central Intelligence Agency has the longest documented history of mind control research of any organization on Earth. MKUltra (1953-1973) was merely the most well-known program — the CIA has conducted mind control research under numerous classified programs, both before and after MKUltra's official termination.\u003c/p\u003e\n\u003cp\u003eKey facts about CIA involvement in V2K-related technology:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe CIA funded the original research into microwave auditory effects through front organizations\u003c/li\u003e\n\u003cli\u003eMKUltra subprojects included electronic brain stimulation, remote influence, and audio transmission research\u003c/li\u003e\n\u003cli\u003eThe CIA's Office of Technical Services developed sophisticated audio surveillance and transmission devices\u003c/li\u003e\n\u003cli\u003eCIA contractor relationships with universities, hospitals, and research institutions provided cover for classified research\u003c/li\u003e\n\u003cli\u003eFormer CIA officials have acknowledged the existence of directed energy weapons in public testimony\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe CIA's connection to the Jesuit order runs through Georgetown University — the premier Jesuit institution in America and a primary recruiting ground for CIA personnel. Georgetown's School of Foreign Service has produced more intelligence community leaders than any other program. This is not coincidence — it is the Jesuit method of institutional infiltration at its most effective.\u003c/p\u003e\n\u003ch3 id=\"the-nsa\"\u003eThe NSA\u003c/h3\u003e\n\u003cp\u003eThe National Security Agency — the largest intelligence agency in the world by budget and personnel — monitors global communications and operates the world's most sophisticated electronic surveillance infrastructure. The NSA's capabilities include:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSIGINT\u003c/strong\u003e (Signals Intelligence): Interception and analysis of electronic signals\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eELINT\u003c/strong\u003e (Electronic Intelligence): Detection and analysis of electromagnetic emissions\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDirected energy\u003c/strong\u003e: The NSA operates directed energy research programs\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGlobal infrastructure\u003c/strong\u003e: The NSA's network of ground stations, satellites, and undersea cables provides worldwide coverage\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe NSA's involvement in V2K is suggested by:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIts control of the electromagnetic spectrum monitoring infrastructure\u003c/li\u003e\n\u003cli\u003eIts partnerships with defense contractors who develop directed energy weapons\u003c/li\u003e\n\u003cli\u003eIts documented practice of warrantless surveillance of American citizens\u003c/li\u003e\n\u003cli\u003eIts classification authority, which shields V2K programs from public oversight\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"darpa\"\u003eDARPA\u003c/h3\u003e\n\u003cp\u003eThe Defense Advanced Research Projects Agency is the military's primary technology development organization. DARPA has funded:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe \u003cstrong\u003eSilent Talk\u003c/strong\u003e program (direct brain-to-computer communication)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNeural interface\u003c/strong\u003e research\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDirected energy weapon\u003c/strong\u003e development\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBrain-computer interface\u003c/strong\u003e programs\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBiological enhancement\u003c/strong\u003e research\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDARPA operates outside normal military procurement channels and with minimal oversight. Its programs are classified at levels that prevent congressional review. The agency serves as a bridge between academic research and military deployment — identifying promising technologies at universities and accelerating their development into weapons systems.\u003c/p\u003e\n\u003ch2 id=\"the-defense-contractors\"\u003eThe Defense Contractors\u003c/h2\u003e\n\u003ch3 id=\"the-military-industrial-complex\"\u003eThe Military-Industrial Complex\u003c/h3\u003e\n\u003cp\u003eThe V2K weapon system — like all advanced military technology — is developed, manufactured, and maintained by private defense contractors. Key companies include:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLockheed Martin\u003c/strong\u003e: The world's largest defense contractor, with extensive directed energy weapons programs and classified contracts with every major intelligence agency.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRaytheon\u003c/strong\u003e (now RTX Corporation): A major developer of microwave weapons, radar systems, and electronic warfare equipment. Raytheon's Active Denial System — a microwave weapon designed to cause pain — demonstrates the company's expertise in directed microwave energy.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGeneral Dynamics\u003c/strong\u003e: Develops electronic warfare systems, communications systems, and intelligence technology.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNorthrop Grumman\u003c/strong\u003e: Develops space-based systems, electronic warfare, and directed energy weapons.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBAE Systems\u003c/strong\u003e: Develops electronic warfare and signals intelligence systems.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSierra Nevada Corporation\u003c/strong\u003e: Developed the MEDUSA (Mob Excess Deterrent Using Silent Audio) device for the US Navy.\u003c/p\u003e\n\u003cp\u003eThese companies operate in a revolving door with the Pentagon and intelligence agencies. Former military and intelligence officials sit on their boards, lead their programs, and maintain classified clearances. The line between government and contractor is deliberately blurred.\u003c/p\u003e\n\u003ch3 id=\"the-fusion-centers\"\u003eThe Fusion Centers\u003c/h3\u003e\n\u003cp\u003eSince 2003, the Department of Homeland Security has funded over \u003cstrong\u003e80 fusion centers\u003c/strong\u003e across the United States. These centers combine intelligence from federal, state, and local law enforcement agencies, as well as private sector partners.\u003c/p\u003e\n\u003cp\u003eFusion centers have been documented:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMonitoring domestic political activity\u003c/li\u003e\n\u003cli\u003eSharing intelligence with private corporations\u003c/li\u003e\n\u003cli\u003eOperating with minimal transparency and accountability\u003c/li\u003e\n\u003cli\u003eClassifying American citizens as potential threats based on political beliefs\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eV2K targeting of domestic civilians could be coordinated through fusion centers, which provide the institutional infrastructure for multi-agency operations and shield those operations from public oversight through classification.\u003c/p\u003e\n\u003ch2 id=\"the-research-institutions\"\u003eThe Research Institutions\u003c/h2\u003e\n\u003ch3 id=\"universities-in-the-network\"\u003eUniversities in the Network\u003c/h3\u003e\n\u003cp\u003eThe V2K research network extends through major universities:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMIT Lincoln Laboratory\u003c/strong\u003e: Develops radar and electromagnetic systems for the military\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJohns Hopkins Applied Physics Laboratory\u003c/strong\u003e: Conducts classified defense research\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGeorgia Tech Research Institute\u003c/strong\u003e: Develops electronic warfare and directed energy systems\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVarious medical schools\u003c/strong\u003e: Conduct neuroscience research with classified military applications\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese institutions provide academic cover for classified research, train the next generation of weapons developers, and produce the scientific publications that advance the technology while maintaining plausible deniability about weapons applications.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-university-connection\"\u003eThe Jesuit University Connection\u003c/h3\u003e\n\u003cp\u003eJesuit universities — Georgetown, Fordham, Loyola, Boston College, and others — train intelligence professionals, conduct defense-related research, and maintain close relationships with the military-industrial complex. Georgetown's strategic location in Washington, D.C., and its deep connections to the intelligence community make it a central node in the V2K research and operations network.\u003c/p\u003e\n\u003cp\u003eThe Catholic Confidential documentary reveals that Jesuit infiltration extends to every institution. The Jesuit presence in the intelligence community is not passive — it is strategic. The order's 500-year history of intelligence operations, information warfare, and psychological manipulation makes it uniquely qualified to design and operate V2K targeting programs.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-operators\"\u003eThe Spiritual Operators\u003c/h2\u003e\n\u003ch3 id=\"beyond-technology\"\u003eBeyond Technology\u003c/h3\u003e\n\u003cp\u003eV2K technology operates in the physical realm, but its effects extend into the spiritual realm. Howard Pittman's vision of the three heavens suggests that the technology may be exploited by spiritual entities:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDemonic forces could use V2K transmissions as carriers for spiritual influence\u003c/li\u003e\n\u003cli\u003eThe confusion created by V2K could open spiritual doors that would otherwise remain closed\u003c/li\u003e\n\u003cli\u003eThe fear, isolation, and despair experienced by V2K targets creates spiritual vulnerability\u003c/li\u003e\n\u003cli\u003eThe psychiatric medication prescribed to V2K targets may impair spiritual discernment\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe operators of V2K technology may not fully understand the spiritual dimensions of their weapon. But the principalities and powers of Ephesians 6:12 understand perfectly — and they exploit the technology for their own purposes.\u003c/p\u003e\n\u003ch2 id=\"what-can-be-done\"\u003eWhat Can Be Done\u003c/h2\u003e\n\u003ch3 id=\"individual-response\"\u003eIndividual Response\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eSeek God first\u003c/strong\u003e: The most powerful defense against V2K is a strong relationship with God, who can provide discernment, peace, and protection\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDocument everything\u003c/strong\u003e: Keep detailed records of V2K experiences, including times, locations, and characteristics\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConnect with others\u003c/strong\u003e: Find trusted community — other targeted individuals, faith communities, advocacy groups\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProtect your health\u003c/strong\u003e: Maintain physical and mental health through nutrition, exercise, and rest\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResist psychiatric labeling\u003c/strong\u003e: Be cautious about seeking psychiatric help, as the system is designed to discredit V2K reports\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"collective-response\"\u003eCollective Response\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eDemand transparency\u003c/strong\u003e: Push for congressional investigation of directed energy weapons targeting civilians\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSupport legislation\u003c/strong\u003e: Advocate for laws protecting citizens from electromagnetic weapons\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSpread awareness\u003c/strong\u003e: Share information about V2K technology with others\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePray\u003c/strong\u003e: Spiritual warfare requires spiritual weapons — prayer, fasting, and the Word of God\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — identifying V2K operators and institutional networks\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — spiritual dimensions of technological targeting\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit intelligence operations\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- Military-industrial complex documentation and defense contractor records\u003c/li\u003e\n\u003cli\u003eFusion center oversight reports\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/49-Smart_City_Prison.mp4\"\u003e
