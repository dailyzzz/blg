t contain exceptions for public health emergencies, government directives, or institutional policies. When the state issues a policy that results in the death of those it is sworn to protect — the elderly, the vulnerable, the defenseless — the moral weight of that commandment falls upon every official who authored, implemented, and defended that policy.\u003c/p\u003e\n\u003cp\u003eAs the Confliction track \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e reveals, the curse works through systems that transform protectors into predators — systems in which the institutions entrusted with the care of the vulnerable become the instruments of their destruction.\u003c/p\u003e\n\u003cp\u003eNew York's COVID-19 nursing home policy directed the placement of COVID-positive patients into nursing homes — facilities housing the population most vulnerable to the disease. The result was a catastrophic death toll among the elderly. House Republicans are now demanding accountability for what may be one of the most consequential policy failures in American history.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-new-york-nursing-home-directive\"\u003eThe New York Nursing Home Directive\u003c/h2\u003e\n\u003cp\u003eOn March 25, 2020, the New York State Department of Health issued a directive requiring nursing homes to accept patients who had tested positive for COVID-19 or were suspected of having COVID-19. The directive stated: \"No resident shall be denied re-admission or admission to the NH solely based on a confirmed or suspected diagnosis of COVID-19.\"\u003c/p\u003e\n\u003cp\u003eThe directive was issued at the direction of Governor Andrew Cuomo's administration, which justified the policy as necessary to preserve hospital capacity. Hospitals were treating COVID-19 patients and needed beds. Nursing homes, the reasoning went, were the appropriate setting for patients who were stable enough to leave the hospital but not yet cleared of the virus.\u003c/p\u003e\n\u003cp\u003eThe consequence was predictable and predicted. Medical experts warned that placing COVID-positive patients in nursing homes — enclosed environments housing elderly residents with multiple comorbidities and weakened immune systems — would cause mass death. They were right.\u003c/p\u003e\n\u003cp\u003eAn estimated 15,000 or more nursing home residents in New York died of COVID-19 during the pandemic's first year. The actual number remains disputed because the Cuomo administration was later found to have undercounted nursing home deaths by as much as 50%, excluding residents who were transferred to hospitals before dying from the count of \"nursing home deaths.\"\u003c/p\u003e\n\u003cp\u003eKaren Kingston has analyzed the nursing home disaster in The Kingston Report (karenkingston.substack.com): \"The nursing home directive was not a policy error. It was a policy that was predictable in its consequences, warned against by medical professionals, implemented over objections, and then concealed when those consequences materialized. The question is not whether officials made a mistake — the question is whether they committed a crime.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-cover-up\"\u003eThe Cover-Up\u003c/h2\u003e\n\u003cp\u003eThe Cuomo administration did not merely implement a deadly policy — it concealed the results. The New York Attorney General's office issued a report in January 2021 finding that the Cuomo administration had undercounted COVID-19 deaths among nursing home residents by approximately 50%.\u003c/p\u003e\n\u003cp\u003eThe undercount was not accidental. It was achieved by excluding from the nursing home death count any resident who was transferred from a nursing home to a hospital before dying. By this accounting method, a nursing home resident who contracted COVID-19 in the nursing home, was transferred to a hospital, and died in the hospital was not counted as a nursing home death — even though the infection was acquired in the nursing home as a direct result of the placement policy.\u003c/p\u003e\n\u003cp\u003eThis accounting manipulation served a political purpose: it concealed the scale of the disaster and protected the governor from accountability. Cuomo used the artificially low nursing home death numbers to argue that his policies had been effective and to write a book celebrating his pandemic leadership.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-congressional-investigation\"\u003eThe Congressional Investigation\u003c/h2\u003e\n\u003cp\u003eHouse Republicans have launched a formal investigation into New York's COVID-19 nursing home policies. The investigation seeks:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDocuments:\u003c/strong\u003e All communications between the Governor's office, the New York Department of Health, nursing home administrators, and federal agencies related to the nursing home placement directive.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTestimony:\u003c/strong\u003e Sworn testimony from state officials involved in the creation, implementation, and concealment of the nursing home policy.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eData:\u003c/strong\u003e Accurate, unmanipulated data on nursing home deaths, including residents who were transferred to hospitals before dying.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAccountability:\u003c/strong\u003e Identification of individuals responsible for the directive, the undercount, and any obstruction of prior investigations.\u003c/p\u003e\n\u003cp\u003eThe investigation faces significant legal and political challenges. New York state officials have historically resisted federal oversight of state health policies, invoking federalism and state sovereignty. However, federal jurisdiction is established by the use of federal Medicaid funding — nursing homes receiving Medicaid payments are subject to federal oversight, and the mismanagement of Medicaid-funded facilities creates federal accountability.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-national-pattern\"\u003eThe National Pattern\u003c/h2\u003e\n\u003cp\u003eNew York was not alone. At least five states — New York, New Jersey, Michigan, Pennsylvania, and California — implemented similar nursing home placement directives during the early months of the pandemic. Each state experienced elevated nursing home death tolls. The combined death toll across these states represents a significant proportion of total U.S. COVID-19 deaths during 2020.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e documents the historical pattern of government programs that treat vulnerable populations as expendable — from medical experiments on prisoners and minority communities to pandemic policies that sacrificed the elderly to preserve hospital capacity and political narratives.\u003c/p\u003e\n\u003cp\u003eKingston has observed: \"The nursing home directives were not accidents. They were implemented in multiple states simultaneously, using similar language, during the same time period. This suggests coordination — either formal or through shared institutional assumptions about the expendability of elderly nursing home residents. The investigation must determine not only what happened in New York but whether the policy was coordinated across states and, if so, by whom.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-prophetic-dimension\"\u003eThe Prophetic Dimension\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Cursed be he that removeth his neighbour's landmark. And all the people shall say, Amen. Cursed be he that maketh the blind to wander out of the way. And all the people shall say, Amen.\" — Deuteronomy 27:17-18\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eScripture places a special curse upon those who exploit the vulnerable — those who remove the blind from safety, who deprive the defenseless of protection, who use their authority to harm those who cannot resist. The nursing home residents of New York were among the most vulnerable people in American society — elderly, frail, dependent on institutional care, unable to advocate for themselves or flee the danger placed in their midst.\u003c/p\u003e\n\u003cp\u003eThe officials who directed COVID-positive patients into their homes wielded the authority of the state. The officials who concealed the death toll wielded the authority of data. Neither authority will stand before the judgment of God.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"sources\"\u003eSources\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eHouse Republican investigation — Congressional hearing records and subpoena documentation\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Karen Kingston's analysis of nursing home directives, multi-state coordination, and data manipulation\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eNew York Attorney General — Report on nursing home death undercounting\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eNew York Department of Health — March 25, 2020 directive\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eExodus 20:13, Deuteronomy 27:17-18 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www. ernment complicity in concealing harm\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/doctors-vacate-prep-act/?lang=en\"\u003eOver 100,000 Doctors Pave Way to Vacate PREP Act Immunity\u003c/a\u003e — The medical profession demanding accountability\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/fda-ended-emergency-use-authorizations/?lang=en\"\u003eFDA Just Ended Emergency Use Authorizations for COVID-19\u003c/a\u003e — The end of the emergency framework that enabled these policies\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eFifteen thousand elderly souls perished in New York's nursing homes — placed in harm's way by the officials sworn to protect them, their deaths concealed by the data manipulators who served political interests above human life. \"The LORD shall judge his people\" (Hebrews 10:30). The congressional investigation seeks the judgment of man's law. But the judgment that matters — the judgment that no political maneuvering, no data manipulation, and no institutional protection can evade — is the judgment of the One who sees all, knows all, and will hold every official accountable for every life entrusted to their care and lost through their negligence, their arrogance, and their willingness to sacrifice the vulnerable for the preservation of the powerful.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"House Re
