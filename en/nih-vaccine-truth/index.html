stitutes of Health — the largest biomedical research agency in the world, with an annual budget exceeding $45 billion — has known for decades that vaccines carry risks far greater than what the public has been told. Internal documents, buried studies, and the testimony of whistleblowers reveal a pattern of deliberate concealment that constitutes one of the greatest public health frauds in history.\u003c/p\u003e\n\u003cp\u003eThe NIH is not a neutral scientific institution. It is a government agency with deep financial ties to the pharmaceutical industry, institutional incentives to promote vaccination, and a bureaucratic culture that punishes dissent and rewards conformity. The truth about vaccines was not lost — it was buried, deliberately, by people who knew what they were doing and why.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was told during his NDE that 97.5% of Christians were failing in their walk. They had \"never made Jesus Lord.\" They served \"self.\" The NIH serves itself — its budget, its reputation, its institutional survival — and in doing so, it serves the pharmaceutical industry that funds much of its research, staffs its advisory committees, and employs its former officials.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' infiltration \"cloaked with cunning\" extends to every institution that governs human life. Napoleon's \"absolute power,\" Adams's \"eternal damnation,\" Tambulini's governance of \"half the world\" — these describe the reality of institutional control that the NIH represents. The Catholic Confidential documentary exposed how blind obedience and \"every species of vice\" characterize the Jesuit method. The NIH operates on the same principles.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"what-the-nih-knew--and-when-they-knew-it\"\u003eWhat the NIH Knew — and When They Knew It\u003c/h2\u003e\n\u003ch3 id=\"the-sv40-contamination\"\u003eThe SV40 Contamination\u003c/h3\u003e\n\u003cp\u003eBetween 1955 and 1963, an estimated 98 million Americans received polio vaccines contaminated with Simian Virus 40 (SV40), a virus found in the monkey kidney cells used to produce the vaccine. The NIH knew about the contamination as early as 1960.\u003c/p\u003e\n\u003cp\u003eSV40 is a known oncogenic virus — it causes cancer in laboratory animals. Research has found SV40 DNA in human cancers, including:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBrain tumors (mesotheliomas)\u003c/li\u003e\n\u003cli\u003eBone cancers (osteosarcomas)\u003c/li\u003e\n\u003cli\u003eLymphomas\u003c/li\u003e\n\u003cli\u003eLung cancers\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe NIH's response to this contamination was not to alert the public, not to recall the contaminated vaccines, and not to investigate the potential cancer link. Instead, they:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eQuietly switched to SV40-free vaccine production\u003c/li\u003e\n\u003cli\u003eSuppressed research linking SV40 to human cancers\u003c/li\u003e\n\u003cli\u003eFunded studies designed to find no connection between SV40 and cancer\u003c/li\u003e\n\u003cli\u003eAllowed the contaminated vaccine to be used until existing stocks were exhausted\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNinety-eight million Americans were injected with a cancer-causing virus, and the NIH covered it up. This is not speculation — it is documented in congressional testimony, internal NIH communications, and peer-reviewed research that the mainstream medical establishment has spent decades trying to discredit.\u003c/p\u003e\n\u003ch3 id=\"the-simpsonwood-conference\"\u003eThe Simpsonwood Conference\u003c/h3\u003e\n\u003cp\u003eIn June 2000, the CDC convened a secret meeting at the Simpsonwood Conference Center in Norcross, Georgia. The meeting brought together 52 attendees from the CDC, FDA, NIH, vaccine manufacturers, and the WHO to discuss a study by CDC epidemiologist Thomas Verstraeten.\u003c/p\u003e\n\u003cp\u003eVerstraeten's study, using the Vaccine Safety Datalink (a database of millions of children's medical records), had found a statistically significant association between thimerosal-containing vaccines and neurological disorders, including autism.\u003c/p\u003e\n\u003cp\u003eThe Simpsonwood transcripts — obtained through the Freedom of Information Act — reveal that the attendees were more concerned with protecting the vaccine program than with protecting children:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eParticipants discussed how to \u003cstrong\u003emanipulate the data\u003c/strong\u003e to eliminate the association\u003c/li\u003e\n\u003cli\u003eThey discussed the \u003cstrong\u003elegal implications\u003c/strong\u003e of the findings\u003c/li\u003e\n\u003cli\u003eThey discussed how to \u003cstrong\u003eprevent the data from being accessed\u003c/strong\u003e by outside researchers\u003c/li\u003e\n\u003cli\u003eOne participant stated he would not want to give thimerosal-containing vaccines to his own grandchild\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAfter the meeting, Verstraeten's study was reworked — using different statistical methods and different data sets — until the association between thimerosal and autism disappeared. The final published version showed no association. The original data showing the association was not made public.\u003c/p\u003e\n\u003ch3 id=\"the-thompson-confession\"\u003eThe Thompson Confession\u003c/h3\u003e\n\u003cp\u003eIn 2014, CDC senior scientist William Thompson contacted journalist and researcher Brian Hooker and confessed that the CDC had committed scientific fraud in a landmark 2004 study on the MMR vaccine and autism.\u003c/p\u003e\n\u003cp\u003eThompson stated that the study's authors had found a statistically significant association between early MMR vaccination and autism in African American boys. Rather than report this finding, the authors:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMet in a conference room\u003c/li\u003e\n\u003cli\u003eBrought the relevant data printouts\u003c/li\u003e\n\u003cli\u003eThrew them in a \u003cstrong\u003egarbage can\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eRe-analyzed the data without the subgroup that showed the association\u003c/li\u003e\n\u003cli\u003ePublished the fraudulent results\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThompson retained copies of the original documents and turned them over to Congressman Bill Posey. Despite Thompson's confession and the documentary evidence of fraud, no investigation was conducted, no researchers were disciplined, and the fraudulent study remains in the published literature.\u003c/p\u003e\n\u003ch2 id=\"the-financial-conflicts\"\u003eThe Financial Conflicts\u003c/h2\u003e\n\u003ch3 id=\"nih-scientists-royalties\"\u003eNIH Scientists' Royalties\u003c/h3\u003e\n\u003cp\u003eA 2005 investigation by the Associated Press revealed that NIH scientists had been collecting royalty payments from pharmaceutical companies for products they helped develop — including vaccines. The investigation found:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eNIH scientists received \u003cstrong\u003e$8.9 million\u003c/strong\u003e in royalties between 1991 and 2002\u003c/li\u003e\n\u003cli\u003eIndividual scientists received up to \u003cstrong\u003e$150,000 per year\u003c/strong\u003e from companies whose products they were evaluating\u003c/li\u003e\n\u003cli\u003eThe royalty payments were \u003cstrong\u003enot disclosed\u003c/strong\u003e to the public or to the advisory committees that evaluated the products\u003c/li\u003e\n\u003cli\u003eNIH leadership actively resisted disclosure requirements\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis means that NIH scientists who sat on advisory committees recommending vaccines were simultaneously receiving payments from the companies that manufactured those vaccines. The conflict of interest is so egregious that it would disqualify a judge, a journalist, or virtually any other professional — but in the NIH, it was standard operating procedure.\u003c/p\u003e\n\u003ch3 id=\"the-revolving-door\"\u003eThe Revolving Door\u003c/h3\u003e\n\u003cp\u003eThe revolving door between the NIH, the CDC, the FDA, and the pharmaceutical industry ensures that the agencies tasked with regulating vaccines are controlled by the industry they are supposed to regulate:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJulie Gerberding\u003c/strong\u003e, CDC Director during the Thompson fraud, left to become President of Merck's vaccine division\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScott Gottlieb\u003c/strong\u003e, FDA Commissioner, had extensive pharmaceutical industry ties before and after his tenure\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAnthony Fauci\u003c/strong\u003e, NIH/NIAID Director for 38 years, oversaw billions in grants to pharmaceutical companies while helping to set vaccine policy\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe pattern is unmistakable: government officials set policies that benefit pharmaceutical companies, then leave government to work for those companies. This is not public service — it is corporate capture.\u003c/p\u003e\n\u003ch2 id=\"the-suppressed-research\"\u003eThe Suppressed Research\u003c/h2\u003e\n\u003ch3 id=\"studies-that-disappeared\"\u003eStudies That Disappeared\u003c/h3\u003e\n\u003cp\u003eOver the decades, numerous studies showing vaccine risks have been suppressed, retracted, defunded, or simply ignored:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eStudies linking vaccines to \u003cstrong\u003eautoimmune disorders\u003c/strong\u003e have been defunded\u003c/li\u003e\n\u003cli\u003eStudies showing \u003cstrong\u003ealuminum adjuvant toxicity\u003c/strong\u003e have been attacked and marginalized\u003c/li\u003e\n\u003cli\u003eStudies documenting \u003cstrong\u003evaccine-strain viral shedding\u003c/strong\u003e have been suppressed\u003c/li\u003e\n\u003cli\u003eStudies linking \u003cstrong\u003echildhood vaccines to chronic disease\u003c/strong\u003e have been ridiculed\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe suppression is systematic. It operates through funding control (don't fund studies that might produce unwanted results), peer review manipulation (reject papers that threaten the consensus), and career destruction (ruin researchers who publish inconvenient findings).\u003c/p\u003e\n\u003ch3 id=\"the-vaccine-court\"\u003eThe Vaccine Court\u003c/h3\u003e\n\u003cp\u003eThe National Childhood Vaccine Injury Act of 1986 created the Vaccine Injury Compensation Program (VICP) — a special court that adjudicates vaccine injury claims. This court has paid out over \u003cstrong\u003e$4.7 billion\u003c/strong\u003e in compensation to vaccine-injured individuals.\u003c/p\u003e\n\u003cp\u003eThe existence of the Vaccine Court is itself an admission that vaccines cause injury. If vaccines were as safe as claimed, no special court would be necessary. The creation of the court — which simultaneously protects vaccine manufacturers from lawsuits — reveals the government's priorities: protect the vaccine program and its manufacturers, compensate the injured quietly, and maintain public confidence.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-warfare\"\u003eThe Spiritual Warfare\u003c/h2\u003e\n\u003ch3 id=\"the-nih-as-false-authority\"\u003eThe NIH as False Authority\u003c/h3\u003e\n\u003cp\u003eHoward Pittman was shown that demonic forces operate through institutions that claim authority they do not legitimately possess. The NIH claims the authority to determine what is safe for your body — an authority that belongs to you, to your doctor (in consultation with you), and ultimately to God.\u003c/p\u003e\n\u003cp\u003eWhen the NIH declares a vaccine \"safe and effective,\" those words carry spiritual weight. They create a reality that billions of people accept on faith. But Pittman was told that 95% serve \"self\" — and the NIH serves its institutional self-interest above all.\u003c/p\u003e\n\u003cp\u003eThe Jesuits perfected the art of institutional authority. Their universities, their hospitals, their publishing houses — all exist to establish and maintain the authority of the order. The NIH operates on the same model: its authority is self-referential, self-reinforcing, and designed to be unquestionable.\u003c/p\u003e\n\u003cp\u003eThe way out is the same as it always is: question the authority, examine the evidence, seek the truth, and trust in God rather than in institutions that have repeatedly demonstrated their willingness to deceive.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — extensive documentation of NIH vaccine fraud\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — spiritual warfare and false institutional authority\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — the Jesuit model of institutional control\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtub
