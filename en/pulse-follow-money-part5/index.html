rinciple of investigative journalism — the principle that, when followed honestly, reveals more truth than any witness testimony, any document leak, or any institutional confession. Money does not lie. Money does not forget. Money creates trails that, unlike buildings, cannot be demolished.\u003c/p\u003e\n\u003cp\u003eIn Parts 1 through 4 of this investigation, we asked the questions the media refused to ask, presented the evidence the media refused to show, traced the connections the media refused to explore, and identified the mistakes that expose fracture lines in the official narrative. In this final part, we follow the money — and the money leads where the truth always leads: to the institutions that benefited from the event.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's NDE revealed that the spiritual realm operates through material systems. Three heavens. Demonic hierarchy. 97.5 percent rejection. 95 percent self-service. Every word judged (Matthew 12:36-37). The principalities of Ephesians 6:12 operate through financial systems — through the flow of money that funds agendas, rewards compliance, and punishes dissent. Follow the money, and you follow the principalities to their earthly operations.\u003c/p\u003e\n\u003cp\u003eThe Jesuits have always followed the money — and controlled it. Loyola's military organization. Napoleon's \"absolute power.\" Tamburini governing \"all the world.\" Clement XIV poisoned. \u003cem\u003eCatholic Confidential\u003c/em\u003e reveals infiltration \"cloaked with cunning,\" blind obedience, \"every species of vice.\" The Jesuits built financial empires through their missions, their banking relationships, and their institutional placements. The money trail in the Pulse investigation passes through the same institutional territory.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/en/35-The_Tree_of_Life.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Tree of Life — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-money-flows\"\u003eThe Money Flows\u003c/h2\u003e\n\u003ch3 id=\"security-industry-revenue\"\u003eSecurity Industry Revenue\u003c/h3\u003e\n\u003cp\u003eIn the aftermath of the Pulse event, the private security industry experienced a significant revenue increase. Businesses, entertainment venues, government buildings, and public spaces expanded their security contracts. G4S — the attacker's employer — reported increased demand for its services.\u003c/p\u003e\n\u003cp\u003eThis is the most direct financial consequence: the company that employed the attacker benefited from the event he committed. The security industry's business model depends on insecurity. When people feel unsafe, they buy more security. When high-profile events occur, the demand for security services increases. The industry profits from the very events it fails to prevent.\u003c/p\u003e\n\u003cp\u003eThis structural incentive does not prove that G4S or any other security company facilitated the Pulse event. It demonstrates that the industry is structurally incentivized to benefit from such events — a moral hazard that should, at minimum, disqualify the industry from participating in the investigation of events from which it profits.\u003c/p\u003e\n\u003cp\u003eAgent131711 documents on Substack (agent131711.substack.com) the financial flows between the security industry and government agencies in the Pulse aftermath, showing how the event's consequences enriched the very institutions connected to the attacker. This is not conspiracy. It is structural analysis — the examination of financial incentives that create conditions for specific outcomes.\u003c/p\u003e\n\u003ch3 id=\"surveillance-spending\"\u003eSurveillance Spending\u003c/h3\u003e\n\u003cp\u003eThe Pulse event was used to justify expanded surveillance authority and funding. In the months following, government agencies received increased budgets for counter-terrorism, domestic surveillance, and intelligence operations. The Technology companies that provide surveillance infrastructure — data analytics, facial recognition, communications monitoring — received increased government contracts.\u003c/p\u003e\n\u003cp\u003eThe financial magnitude of post-Pulse surveillance expansion is difficult to quantify precisely because much of it is classified. But the trend is clear: every high-profile event generates increased surveillance spending, which flows to the technology companies and intelligence agencies that comprise the surveillance-industrial complex.\u003c/p\u003e\n\u003cp\u003eThe biometric identification requirements discussed in Article 28 of this series (Substack's biometric scans) are part of this same financial ecosystem. Each expansion of surveillance creates revenue for the companies that provide surveillance technology. Each high-profile event justifies the next expansion. The cycle is self-sustaining — and self-enriching.\u003c/p\u003e\n\u003ch3 id=\"political-fundraising\"\u003ePolitical Fundraising\u003c/h3\u003e\n\u003cp\u003eHigh-profile events generate massive political fundraising on all sides of the resulting policy debates. Gun control advocates raised millions in the Pulse aftermath. Gun rights advocates raised millions in response. Counter-terrorism advocates raised millions. Civil liberties advocates raised millions. Every political position generated revenue from the event.\u003c/p\u003e\n\u003cp\u003eThis political fundraising ecosystem is itself a financial flow that incentivizes high-profile events. Organizations that depend on donation spikes triggered by dramatic events are structurally incentivized to ensure that such events continue to occur — not by causing them, necessarily, but by failing to prevent them, by amplifying them when they occur, and by using them as fundraising catalysts.\u003c/p\u003e\n\u003cp\u003eThe Jesuits understood political fundraising before the term existed. Their missions were funded by donations from wealthy patrons who were motivated by religious zeal — zeal that the Jesuits cultivated through dramatic accounts of spiritual warfare in distant lands. The modern political fundraising ecosystem operates on the same principle: dramatic events motivate donations, which fund institutions that benefit from the continuation of dramatic events.\u003c/p\u003e\n\u003ch3 id=\"the-memorial-economy\"\u003eThe Memorial Economy\u003c/h3\u003e\n\u003cp\u003eThe Pulse site was designated for a memorial — a $45 million National Pulse Memorial and Museum. This memorial, funded by a combination of public money and private donations, will generate ongoing revenue through tourism, events, and fundraising.\u003c/p\u003e\n\u003cp\u003eMemorials serve important cultural functions. But they also serve financial functions — generating revenue for the organizations that manage them and the communities that host them. The financial incentive to memorialize creates a secondary incentive to maintain the official narrative that the memorial commemorates. Questioning the narrative threatens the memorial. Questioning the memorial threatens the revenue. The financial system protects the narrative by creating economic dependence on it.\u003c/p\u003e\n\u003ch2 id=\"the-bigger-picture\"\u003eThe Bigger Picture\u003c/h2\u003e\n\u003ch3 id=\"the-event-economy\"\u003eThe Event Economy\u003c/h3\u003e\n\u003cp\u003eThe Pulse investigation reveals something larger than any single event: it reveals the event economy — the financial ecosystem that transforms dramatic events into revenue streams for security companies, surveillance contractors, political organizations, media companies, and memorial institutions.\u003c/p\u003e\n\u003cp\u003eThis event economy creates structural incentives that run counter to public safety:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSecurity companies\u003c/strong\u003e benefit from insecurity\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSurveillance contractors\u003c/strong\u003e benefit from fear\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePolitical organizations\u003c/strong\u003e benefit from outrage\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMedia companies\u003c/strong\u003e benefit from drama\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMemorial institutions\u003c/strong\u003e benefit from tragedy\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNone of these entities would consciously cause a tragedy for profit. But collectively, they create an institutional environment in which tragedies generate profit — an environment that, at minimum, fails to prevent them and, at maximum, creates conditions that facilitate them.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's vision of the demonic hierarchy — organized, purposeful, coordinated — describes this institutional environment with spiritual accuracy. The demons he witnessed did not operate randomly. They operated through systems — financial, institutional, organizational systems that channeled human activity toward spiritual destruction. The event economy is one such system: a financial apparatus that transforms human suffering into institutional profit.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-connection\"\u003eThe Jesuit Connection\u003c/h3\u003e\n\u003cp\u003eThe Jesuits are relevant not because they orchestrated the Pulse event but because they designed the institutional model that the event economy follows. The Jesuit mission system — which combined religious authority with financial extraction, military discipline with community control, and spiritual messaging with material profit — is the template for the modern institutional model.\u003c/p\u003e\n\u003cp\u003eAgent131711's research on Substack traces the institutional lineages that connect the Jesuit model to the modern event economy: the educational institutions that train the analysts, the financial institutions that fund the operations, the media institutions that manage the narratives, and the political institutions that implement the policies. These lineages are not direct — the Jesuits did not create G4S or the surveillance-industrial complex. But they created the institutional culture of invisible governance, financial extraction, and narrative management that these modern entities embody.\u003c/p\u003e\n\u003ch2 id=\"conclusion-the-investigations-findings\"\u003eConclusion: The Investigation's Findings\u003c/h2\u003e\n\u003ch3 id=\"what-we-found\"\u003eWhat We Found\u003c/h3\u003e\n\u003cp\u003eAcross five parts, this investigation has found:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eQuestions the media refused to ask\u003c/strong\u003e — questions about the FBI connection, the three-hour gap, and the speed of narrative establishment\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEvidence the media refused to show\u003c/strong\u003e — suppressed witness testimony, contradictory timelines, and demolished physical evidence\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConnections the media refused to trace\u003c/strong\u003e — links between the attacker, the security industry, the intelligence community, and the defense-contracting ecosystem\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMistakes that expose the narrative\u003c/strong\u003e — timeline contradictions and systematic evidence destruction\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMoney trails that reveal incentives\u003c/strong\u003e — financial flows that enriched the very institutions connected to the event\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThese findings do not prove a specific conspiracy. They prove something more important: they prove that the institutional systems tasked with investigating, reporting, and adjudicating the Pulse event are structurally compromised — connected to the event's participants, enriched by the event's consequences, and incentivized to maintain the event's official narrative.\u003c/p\u003e\n\u003ch3 id=\"what-this-means\"\u003eWhat This Means\u003c/h3\u003e\n\u003cp\u003eIt means the official narrative cannot be trusted — not because it is necessarily false, but because it was produced by institutions that cannot be trusted. The same agencies that investigated the attacker before the event investigated the event after it. The same companies that employed the attacker profited from the event. The same media that reported the event used it to generate revenue. The same politicians that responded to the event used it to fundraise.\u003c/p\u003e\n\u003cp\u003eIn a system where every institution profits from the narrative, the narrative becomes the product — and the truth becomes the externality. The Pulse investigation, like the Saturn series, the food series, the finance series, and the media series before it, reveals the same fundamental reality: the institutional system serves itself, not truth, and the population that trusts it is being harvested.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's 97.5 percent were people who trusted institutional narratives — about God, about salvation, about the world. Their trust was misplaced. The narrow path requires the courage to distrust what the system tells you, to follow the money where it leads, to trace the connections that the system hides, and to accept the uncomfortable truth that the institutions you depend on may be the greatest threat to the truth you seek.\u003c/p\u003e\n\u003cp\u003eThe investigation is complete. The truth — the full truth, which only God possesses — remains beyond our reach. But the questions have been asked. The evidence has been presented. The connections have been traced. The money has been followed. And the choice, as always, is yours.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — The complete Pulse investigation and financial analysis\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — The spiritual dimension of institutional deception\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit model of institutional control and financial extraction\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sources-and-references\"\u003eSources and References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eSecret Societies and the Catholic Church — The Hidden Hand Exposed\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/35-The_Tree_of_Life.mp4\"\u003eThe Tree of Life\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/73-Suppressing_Truth.mp4\"\u003eSuppressing Truth\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/181-Ending_Anonymity.mp4\"\u003eEnding Anonymity\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/115-Psychology_Industry_Hoax.mp4\"\u003ePsychology Industry Hoax\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pulse-biggest-mistakes-part4/?lang=en\"\u003eTHE 2 BIGGEST MISTAKES in the Pulse Investigation Part 4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pulse-investigation-part1/?lang=en\"\u003ePULSE Investigation Begins: What Really Happened Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sick-of-it-combat-censorship/?lang=en\"\u003eI'M SICK OF IT: How to Combat Censorship and Fight Back\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/substack-biometric-scans-identity/?lang=en\"\u003eSubstack Demands BIOMETRIC SCANS: The New US Identity Requirements\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eFollow the money. It does not lie. It does not forget. It does not care about narratives, reputations, or institutional authority. It flows where power directs it, and it accumulates where power resides. The money trail in the Pulse investigation leads to the same place every money trail leads: to the institutions that profit from the system that produced the event. The narrow path follows the money too — but in the opposite direction: away from the institutions, away from the system, and toward the truth that no amount of money can buy or suppress.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"childre
