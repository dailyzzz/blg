p\u003eThis is the most personal installment in this series. In Parts 1 through 4, we established the reality of V2K technology, its military origins, the disinformation campaign protecting it, and the network of agencies operating it. Now I must tell a story that is closer to home — the story of my grandmother, who experienced what I now recognize as V2K targeting decades before the technology was publicly known.\u003c/p\u003e\n\u003cp\u003eMy grandmother heard voices. She told family members about them. She was dismissed, pitied, and eventually medicated. She spent years of her life under the shadow of a psychiatric diagnosis that may have been completely wrong — not because she was imagining things, but because she was experiencing a technology that her doctors did not know existed and her family did not believe was possible.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was shown that the demonic hierarchy targets individuals and families across generations. The 97.5% who are failing include those who dismiss the experiences of their loved ones because those experiences don't fit within the accepted framework of reality. My family failed my grandmother — not out of malice, but out of ignorance. We accepted the psychiatric establishment's explanation because we didn't know there was another one.\u003c/p\u003e\n\u003cp\u003eThe Jesuits' infiltration \"cloaked with cunning\" extends to the family unit itself. By controlling the medical system that diagnoses and treats voice-hearing, they ensure that families become instruments of their own members' oppression. The family that pressures a targeted individual to take medication, to stop talking about voices, to accept the psychiatric label — that family is doing the Jesuits' work without knowing it.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"my-grandmothers-story\"\u003eMy Grandmother's Story\u003c/h2\u003e\n\u003ch3 id=\"the-voices-began\"\u003eThe Voices Began\u003c/h3\u003e\n\u003cp\u003eMy grandmother began reporting voices in her middle years. She described hearing conversations, music, and sometimes commands or comments directed at her. The experiences were vivid, persistent, and deeply distressing.\u003c/p\u003e\n\u003cp\u003eShe was a woman of faith — a churchgoer, a prayer warrior, a person who took spiritual matters seriously. When the voices began, she initially interpreted them through a spiritual lens. She prayed about them. She sought counsel from her pastor. She tried to discern whether the voices were from God, from demons, or from somewhere else entirely.\u003c/p\u003e\n\u003ch3 id=\"the-medical-response\"\u003eThe Medical Response\u003c/h3\u003e\n\u003cp\u003eEventually, the family insisted she see a doctor. The doctor listened to her symptoms, noted the absence of other psychotic features (she was oriented, coherent, and functional), and nevertheless diagnosed her with a psychiatric condition. She was prescribed antipsychotic medication.\u003c/p\u003e\n\u003cp\u003eThe medication changed her. The woman who had been sharp, engaged, and spiritually active became dulled, withdrawn, and passive. The voices may have diminished — or she may have simply stopped reporting them, having learned that reporting them led to more medication and more pity.\u003c/p\u003e\n\u003cp\u003eShe spent years on psychiatric medication. The family believed the doctors. The doctors followed their training. And no one — not the family, not the doctors, not the pastors — considered the possibility that the voices had a technological source.\u003c/p\u003e\n\u003ch3 id=\"what-i-know-now\"\u003eWhat I Know Now\u003c/h3\u003e\n\u003cp\u003eLooking back with the knowledge I now have about V2K technology, the pattern is unmistakable:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSudden onset\u003c/strong\u003e in a previously healthy individual with no psychiatric history\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCoherent audio\u003c/strong\u003e — not the disorganized hallucinations typical of schizophrenia, but structured voices and music\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePreserved functioning\u003c/strong\u003e — she remained oriented, capable, and rational in all other aspects of her life\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSpiritual sensitivity\u003c/strong\u003e — she was a person of faith, which may have made her both more aware of the voices and more vulnerable to targeting\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFamily pattern\u003c/strong\u003e — as I discovered my own V2K experience (described in Part 1), I realized that multiple family members across generations had reported similar experiences\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"the-generational-pattern\"\u003eThe Generational Pattern\u003c/h3\u003e\n\u003cp\u003eV2K targeting may run in families — not because of genetics (as the psychiatric establishment would claim), but because:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eSurveillance infrastructure\u003c/strong\u003e is associated with locations, and families tend to live in the same areas across generations\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIntelligence files\u003c/strong\u003e may flag family members of known targets for monitoring\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCell tower coverage\u003c/strong\u003e in specific neighborhoods may facilitate targeting of all residents\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResearch programs\u003c/strong\u003e may deliberately target families across generations to study long-term effects\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSpiritual targeting\u003c/strong\u003e — demonic forces, as Pittman described, may target family lines\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eMy grandmother, my parent, and I all experienced voice-hearing. The psychiatric establishment calls this \"genetic predisposition to schizophrenia.\" I call it generational targeting by a technology that was invisible to my grandmother's generation, barely visible to my parent's generation, and finally identifiable to mine.\u003c/p\u003e\n\u003ch2 id=\"the-failure-of-the-medical-system\"\u003eThe Failure of the Medical System\u003c/h2\u003e\n\u003ch3 id=\"misdiagnosis-as-standard-practice\"\u003eMisdiagnosis as Standard Practice\u003c/h3\u003e\n\u003cp\u003eMy grandmother's misdiagnosis was not unusual. It is standard practice. Every person who reports hearing voices is evaluated through a psychiatric framework that assumes the voices are internally generated. The possibility of external, technological sources is never considered because:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePsychiatrists are not trained\u003c/strong\u003e in electromagnetic technology\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe DSM\u003c/strong\u003e (Diagnostic and Statistical Manual) does not include technology-induced hearing as a diagnostic category\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePharmaceutical protocols\u003c/strong\u003e default to antipsychotic medication for all voice-hearing\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInsurance reimbursement\u003c/strong\u003e rewards psychiatric diagnosis and medication management, not investigation of alternative causes\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe result is that every V2K target who seeks medical help receives the same diagnosis, the same medication, and the same dismissal. The medical system functions as a machine for discrediting V2K targets — and it does so not through malice (in most cases) but through institutional design.\u003c/p\u003e\n\u003ch3 id=\"the-damage-of-mismedication\"\u003eThe Damage of Mismedication\u003c/h3\u003e\n\u003cp\u003eAntipsychotic medications are among the most powerful drugs in the pharmacopoeia. They alter brain chemistry, suppress dopamine receptors, and produce a range of debilitating side effects:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTardive dyskinesia\u003c/strong\u003e: Involuntary muscle movements that can become permanent\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMetabolic syndrome\u003c/strong\u003e: Weight gain, diabetes, cardiovascular disease\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCognitive dulling\u003c/strong\u003e: Reduced mental clarity, impaired memory, decreased motivation\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEmotional blunting\u003c/strong\u003e: Reduced ability to experience pleasure, love, or spiritual connection\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNeuroleptic malignant syndrome\u003c/strong\u003e: A potentially fatal reaction to the medication\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWhen these drugs are given to a person who does not have a psychiatric disorder — a person whose voices have a technological source — the harm is compounded. Not only does the medication fail to address the actual cause, it damages the person's brain, body, and spirit in ways that may be irreversible.\u003c/p\u003e\n\u003cp\u003eMy grandmother spent years taking medications she didn't need, experiencing side effects she shouldn't have endured, and living under a diagnostic label she didn't deserve — all because the medical system could not conceive of a technological explanation for her experience.\u003c/p\u003e\n\u003ch2 id=\"the-investigation\"\u003eThe Investigation\u003c/h2\u003e\n\u003ch3 id=\"what-i-found\"\u003eWhat I Found\u003c/h3\u003e\n\u003cp\u003eWhen I began investigating my grandmother's targeting, I discovered:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLocation patterns\u003c/strong\u003e: My grandmother lived in an area with high cell tower density and proximity to military installations. The infrastructure for V2K targeting was present.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTimeline correlations\u003c/strong\u003e: The onset of her symptoms corresponded with periods of expanded surveillance infrastructure in her area — new tower installations, changes in telecommunications technology, and expansion of government monitoring programs.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCommunity patterns\u003c/strong\u003e: Other residents in her neighborhood reported similar experiences — hearing voices, music, or tones with no apparent source. These reports were scattered and isolated because each person who reported them was individually diagnosed and medicated.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFamily connections\u003c/strong\u003e: Tracing the family history revealed that voice-hearing experiences appeared to follow geographic and temporal patterns consistent with technology deployment rather than genetic inheritance.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-dimension\"\u003eThe Spiritual Dimension\u003c/h2\u003e\n\u003ch3 id=\"what-my-grandmother-knew\"\u003eWhat My Grandmother Knew\u003c/h3\u003e\n\u003cp\u003eMy grandmother was a woman of deep faith. She understood spiritual warfare before the term was fashionable. She prayed, she fasted, she read her Bible, and she took seriously the reality of the spiritual realm.\u003c/p\u003e\n\u003cp\u003eWhen the voices came, her first response was spiritual — she sought God's guidance. This was the right response. But the family and the medical system pulled her away from her spiritual discernment and into the pharmaceutical system. They replaced her prayers with pills and her faith with a diagnosis.\u003c/p\u003e\n\u003cp\u003eHoward Pittman was told that 95% serve \"self.\" My grandmother was among the 5% who genuinely sought God. And the system targeted her for it — because a person of genuine spiritual discernment is the most dangerous enemy of the powers and principalities. Such a person can see through the deception, can identify the source of the voices, and can resist the targeting through spiritual weapons.\u003c/p\u003e\n\u003cp\u003eThe medication dulled her discernment. The diagnosis silenced her testimony. The family's well-meaning intervention cut her off from the very spiritual resources that might have protected her. This is how the system works: it uses love against itself, turning families into instruments of their own members' destruction.\u003c/p\u003e\n\u003ch3 id=\"a-prayer-for-the-targeted\"\u003eA Prayer for the Targeted\u003c/h3\u003e\n\u003cp\u003eLord, we pray for every grandmother, every mother, every father, every child who has been targeted by this technology and silenced by the medical system. We pray for the families who didn't know, who couldn't see, who did what the doctors told them because they didn't know what else to do. We pray for restoration — of minds, of families, of faith. And we pray for justice — against the systems and the forces, both human and spiritual, that target the innocent and call it medicine. In Jesus' name.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — generational targeting research and V2K documentation\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — generational spiritual warfare\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — institutional control through medicine\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- Antipsychotic medication side effect documentation\u003c/li\u003e\n\u003cli\u003eCell tower infrastructure deployment records\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/215-Brain_Machine_Interface.mp4\"\u003eBrain Machine Interface\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/49-Smart_City_Prison.mp4\"\u003eSmart City Prison\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/27-The_Promise_of_Salvation.mp4\"\u003eThe Promise of Salvation\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/13-The_Word_of_God.mp4\"\u003eThe Word of God\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/who-putting-voices-heads-part4/?lang=en\"\u003eWho Is Really Putting Voices in People's Heads Part 4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/schizophrenia-mental-illness-psyop-part6/?lang=en\"\u003eSchizophrenia: The Mental Illness PSYOP Part 6\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cell-towers-nih-contract-part9/?lang=en\"\u003eCell Towers and the NIH CONTRACT You Were Never Told About Part 9\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThis one is for you, Grandma. You weren't crazy. You were targeted. And the system that was supposed to help you was designed to silence you. I'm sorry we didn't know. I'm sorry we believed the doctors instead of you. But now we know. And now we speak — for you, and for every targeted individual whose family didn't understand.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/technology/\",\"className\":\"category-badge\",\"children\":\"technology\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"An Investigation Into My Grandma's Targeting Part 5\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Part 5 of the V2K series: a personal investigation into the targeting of a family member reveals patterns spanning decades and generations.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-12-11T10:00:00Z\",\"children\":\"December 11, 2025\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"V2K\",{\"href\":\"/en/tag/V2K/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"V2K\"]}],[\"$\",\"a\",\"targeted-individuals\",{\"href\":\"/en/tag/targeted-individuals/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"targeted-individuals\"]
