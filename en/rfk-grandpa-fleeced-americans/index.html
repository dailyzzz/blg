seph P. Kennedy Sr. is the story of a man who gained the whole world — wealth, power, political dynasty — through methods so corrupt, so ruthless, and so deeply connected to the Jesuit-Catholic power structure that his legacy should serve as a warning rather than an inspiration. Yet the Kennedy family is venerated in American culture as political royalty, their scandals forgiven, their crimes forgotten, their Jesuit connections ignored.\u003c/p\u003e\n\u003cp\u003eJoseph P. Kennedy Sr. was the product of the Boston Irish Catholic establishment — an establishment controlled by the Jesuit order through Boston College, Holy Cross, and the network of Catholic parishes and political organizations that dominated Massachusetts politics. The Jesuits shaped Kennedy's worldview, connected him to the financial networks he would exploit, and protected him from the consequences of his actions. As Napoleon warned, the Jesuits are \"a military organization, not a religious order... the aim is power.\" Kennedy was their agent in the world of American finance and politics.\u003c/p\u003e\n\u003cp\u003eAs \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e reveals, the adversary cloaks himself in respectability — in family values, in public service, in charitable giving. And \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e reminds us that the most dangerous enemy is the one who presents himself as a friend of the people while robbing them blind.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-bootlegging-fortune\"\u003eThe Bootlegging Fortune\u003c/h2\u003e\n\u003ch3 id=\"prohibition-and-the-catholic-connection\"\u003eProhibition and the Catholic Connection\u003c/h3\u003e\n\u003cp\u003eProhibition (1920-1933) was one of the most profitable periods in American criminal history — and Joseph Kennedy was at the center of it. While the exact nature and extent of Kennedy's bootlegging operations remain debated (the family has spent decades suppressing the evidence), multiple credible sources confirm that Kennedy imported and distributed illegal liquor on a massive scale during the 1920s.\u003c/p\u003e\n\u003cp\u003eKennedy's liquor connections were established well before Prohibition. His father, P.J. Kennedy, was a Boston saloon owner and political boss with deep connections to the Irish Catholic underworld. When Prohibition began, Joseph Kennedy was uniquely positioned to exploit the situation: he had the family connections to the liquor trade, the financial resources to organize large-scale smuggling operations, and the political protection to operate with impunity.\u003c/p\u003e\n\u003cp\u003eThe connection between Prohibition and the Catholic Church is rarely discussed but critical. The Temperance movement that led to Prohibition was overwhelmingly Protestant, and it was explicitly anti-Catholic in many of its manifestations. Catholic immigrants — Irish, Italian, German — were disproportionately targeted by Prohibition enforcement. Yet the Catholic establishment profited enormously from Prohibition through the bootlegging networks that it controlled.\u003c/p\u003e\n\u003cp\u003eThis is the classic Jesuit strategy: create a conflict, position yourself on both sides, and profit regardless of the outcome. The Jesuits supported Prohibition through their influence on the Progressive movement (which overlapped significantly with the Temperance movement), while simultaneously profiting from the illegal liquor trade through their Catholic network. Joseph Kennedy was the point man for this operation in the Northeast.\u003c/p\u003e\n\u003ch3 id=\"the-liquor-licensing-windfall\"\u003eThe Liquor Licensing Windfall\u003c/h3\u003e\n\u003cp\u003eWhen Prohibition ended in 1933, Kennedy was positioned to profit again. He had already secured exclusive import licenses for Scotch whisky and British gin — licenses that he obtained through his connections to the British establishment (including, reportedly, Winston Churchill). These licenses, granted before Prohibition was officially repealed, ensured that Kennedy would dominate the legal liquor market from day one.\u003c/p\u003e\n\u003cp\u003eThe company Kennedy established, Somerset Importers, became one of the largest liquor distributors in the United States. The fortune Kennedy made from legal liquor sales dwarfed whatever he had earned from bootlegging — and it was all made possible by advance knowledge of Prohibition's repeal, knowledge that was available only to the politically connected elite.\u003c/p\u003e\n\u003ch2 id=\"the-wall-street-manipulation\"\u003eThe Wall Street Manipulation\u003c/h2\u003e\n\u003ch3 id=\"insider-trading-and-pool-operations\"\u003eInsider Trading and Pool Operations\u003c/h3\u003e\n\u003cp\u003eIn the 1920s, Joseph Kennedy became one of the most successful stock market operators in America — through methods that would be considered criminal today. Kennedy participated in \"stock pools\" — coordinated operations in which a group of insiders would artificially inflate the price of a stock, attract outside investors, and then sell at the peak, leaving the outside investors holding worthless shares.\u003c/p\u003e\n\u003cp\u003eKennedy's most famous pool operation involved Yellow Cab Company stock. Working with a group of insiders, Kennedy manipulated the stock price through coordinated buying, planted news stories, and false tips to outside investors. When the price reached the target level, the pool sold out, pocketing millions while the outside investors were wiped out.\u003c/p\u003e\n\u003cp\u003eThese operations were perfectly legal in the 1920s — there were no laws against insider trading or market manipulation. But they were morally indefensible, and they contributed directly to the speculative bubble that led to the 1929 crash. Kennedy, who had exited the market before the crash (reportedly after a shoeshine boy offered him stock tips, which Kennedy took as a sign that the market was overheated), emerged from the Depression wealthier than ever while millions of Americans lost everything.\u003c/p\u003e\n\u003ch3 id=\"the-sec-the-fox-guarding-the-henhouse\"\u003eThe SEC: The Fox Guarding the Henhouse\u003c/h3\u003e\n\u003cp\u003eIn 1934, President Franklin Roosevelt appointed Joseph Kennedy as the first chairman of the Securities and Exchange Commission — the agency created to regulate the very practices that had made Kennedy rich. Roosevelt reportedly justified the appointment by saying: \"Set a thief to catch a thief.\"\u003c/p\u003e\n\u003cp\u003eKennedy's appointment to the SEC was the ultimate expression of the Jesuit strategy of infiltration. By placing an insider trader in charge of regulating insider trading, the financial elite ensured that the new regulations would be designed to eliminate their competition while preserving their own ability to profit. Kennedy served as SEC chairman for just over a year, during which he established the framework of securities regulation that remains largely intact today — a framework that regulates small operators while leaving the biggest players untouched.\u003c/p\u003e\n\u003ch2 id=\"the-political-dynasty\"\u003eThe Political Dynasty\u003c/h2\u003e\n\u003ch3 id=\"ambassador-to-britain\"\u003eAmbassador to Britain\u003c/h3\u003e\n\u003cp\u003eIn 1938, Roosevelt appointed Kennedy as Ambassador to the United Kingdom. Kennedy used this position to advance his own financial interests, his family's political ambitions, and the agenda of the Catholic establishment.\u003c/p\u003e\n\u003cp\u003eKennedy's ambassadorship was marked by his sympathy for Nazi Germany and his opposition to American entry into World War II. Kennedy's isolationism was not driven by pacifism; it was driven by his financial interests. Kennedy had investments in Germany and saw the Nazi government as a bulwark against communism — which, despite being funded by the same banking network that funded the Jesuits, was nevertheless a rival power center that threatened Catholic interests in Europe.\u003c/p\u003e\n\u003cp\u003eKennedy's recall from London in 1940, after he publicly predicted that \"democracy is finished in England,\" ended his diplomatic career but not his political ambitions. He simply transferred those ambitions to his sons — first Joe Jr. (who was killed in World War II), then John, Robert, and Edward.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-education-pipeline\"\u003eThe Jesuit Education Pipeline\u003c/h3\u003e\n\u003cp\u003eThe Kennedy family's connection to the Jesuit order was not incidental; it was structural. Kennedy's sons were educated at Jesuit-connected institutions:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJohn F. Kennedy\u003c/strong\u003e attended Choate (an elite prep school with Jesuit connections) and Harvard (which, while not Jesuit, was deeply connected to the power networks the Jesuits controlled).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRobert F. Kennedy\u003c/strong\u003e attended Milton Academy and Harvard, following the same power pipeline.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEdward Kennedy\u003c/strong\u003e attended Harvard and the University of Virginia Law School.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe Jesuit educational system served as the pipeline through which the Kennedy dynasty was trained, connected, and launched into American political life. The dynasty's Catholic identity was not merely cultural — it was operational, connecting the Kennedys to the global network of Catholic power that the Jesuits controlled.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e traces the secret society connections that have shaped American political dynasties from the beginning, and \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/105-Freemason_Jesters.mp4\"\u003eFreemason Jesters\u003c/a\u003e reveals how the elite mock the public they claim to serve.\u003c/p\u003e\n\u003ch2 id=\"the-fleecing-legacy\"\u003eThe Fleecing Legacy\u003c/h2\u003e\n\u003ch3 id=\"what-kennedy-took\"\u003eWhat Kennedy Took\u003c/h3\u003e\n\u003cp\u003eJoseph P. Kennedy's wealth — estimated at $300-400 million at the time of his death (equivalent to several billion today) — was extracted from the American people through:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBootlegging\u003c/strong\u003e during Prohibition\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStock manipulation\u003c/strong\u003e during the 1920s\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdvance knowledge\u003c/strong\u003e of regulatory changes and policy shifts\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePolitical connections\u003c/strong\u003e that provided exclusive business opportunities\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInsider access\u003c/strong\u003e to information that was unavailable to ordinary citizens\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eEvery dollar of Kennedy's fortune represents a dollar taken from someone else — a farmer who lost his savings in a manipulated stock, a small business owner who was undercut by Kennedy's monopoly on liquor imports, a taxpayer who funded the government programs that Kennedy's family exploited.\u003c/p\u003e\n\u003ch3 id=\"the-dynasty-continues\"\u003eThe Dynasty Continues\u003c/h3\u003e\n\u003cp\u003eThe Kennedy family's wealth and political power have persisted for four generations. The family continues to hold political offices, control charitable foundations, and influence American policy. The mythology of \"Camelot\" — the idealized Kennedy presidency — continues to captivate the American public, obscuring the corrupt foundations upon which the dynasty was built.\u003c/p\u003e\n\u003cp\u003eRobert F. Kennedy Jr., the grandson of Joseph P. Kennedy Sr., carries the family name and the family legacy into a new generation. Whether he carries the family's connections to the Jesuit-Catholic power structure is a question that every informed citizen should ask.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony that \"you call me Lord but you never made me Lord\" applies directly to political dynasties like the Kennedys, who present themselves as public servants while serving their own interests and the interests of the power structure that created them. The 95% of hell's inhabitants who serve \"self\" includes those who build dynasties on the exploitation of their fellow citizens. Watch: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eFor further research, see \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e and \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u0
