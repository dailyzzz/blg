 knowledge to them that know understanding.\" — Daniel 2:21\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe Constitution of the United States is revered as the supreme law of the land — a divinely inspired document that established a republic of free people governing themselves through elected representatives. The hidden history reveals a document that was far more complex in its origins and far more deceptive in its purposes than the patriotic narrative acknowledges. The Constitution was not merely a political framework — it was a legal architecture designed by men steeped in Masonic and Jesuit jurisprudence, embedding within its carefully crafted language provisions that would enable the very centralized control the document appeared to prevent.\u003c/p\u003e\n\u003cp\u003eHoward Pittman's testimony reveals a fundamental truth about deception: the most effective lies contain genuine truth. The Constitution contains genuine protections for individual liberty — the Bill of Rights, the separation of powers, the mechanisms of representative government. These genuine elements are what make the deception effective. They provide the truth that makes the lie believable, the sugar that makes the poison palatable. The 97.5% who walk the road to destruction include the patriots who worship the Constitution without understanding the hidden provisions that subvert its stated purpose.\u003c/p\u003e\n\u003cp\u003eThe Jesuits, whose legal tradition of casuistry perfected the art of saying one thing while meaning another, provided the intellectual framework for a document that could simultaneously proclaim liberty and enable tyranny. Napoleon recognized: \"The Jesuits are a military organization, not a religious order... the aim is power.\" That power was embedded in America's founding document through language so carefully crafted that its true implications would not be understood for generations. The tracks \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e and \u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e reveal how deception operates from within the very structures meant to protect against it.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-constitutional-convention-a-coup\"\u003eThe Constitutional Convention: A Coup\u003c/h2\u003e\n\u003ch3 id=\"what-really-happened-in-philadelphia\"\u003eWhat Really Happened in Philadelphia\u003c/h3\u003e\n\u003cp\u003eThe Constitutional Convention of 1787 was convened ostensibly to revise the Articles of Confederation — the existing governing framework of the United States. The delegates were authorized to propose amendments to the Articles, not to replace them entirely. What happened instead was a complete overthrow of the existing government — conducted in secret, behind locked doors, with sentries posted to prevent any unauthorized observation.\u003c/p\u003e\n\u003cp\u003eThe Convention's proceedings were kept secret for decades. James Madison's notes, the most complete record of the debates, were not published until 1840 — more than fifty years after the Convention and four years after Madison's death. The secrecy was not incidental; it was essential. The delegates knew that they were exceeding their authority, and they knew that public awareness of their proceedings would have generated opposition that might have prevented the Constitution's ratification.\u003c/p\u003e\n\u003cp\u003eThe Convention was dominated by Freemasons and men connected to Masonic-Illuminist networks. George Washington, the Convention's president, was a Freemason. Benjamin Franklin, the Convention's elder statesman, was a high-ranking Mason with connections to European secret society networks. Alexander Hamilton, who championed the strongest possible central government, had connections to financial networks that would later prove instrumental in establishing the control systems the Constitution enabled.\u003c/p\u003e\n\u003ch3 id=\"the-anti-federalist-warning\"\u003eThe Anti-Federalist Warning\u003c/h3\u003e\n\u003cp\u003eThe opponents of the Constitution — the Anti-Federalists — recognized the danger that the proposed document represented. Patrick Henry, who had refused to attend the Convention because he \"smelt a rat,\" warned that the Constitution would create a consolidated government that would destroy the sovereignty of the states and the liberty of the people. George Mason, who attended the Convention but refused to sign the document, objected to the absence of a bill of rights and the broad powers granted to the federal government.\u003c/p\u003e\n\u003cp\u003eThe Anti-Federalists' warnings proved prophetic. Every expansion of federal power that has occurred since ratification — from the Alien and Sedition Acts of 1798 to the Patriot Act of 2001 — has been accomplished through provisions embedded in the Constitution's carefully crafted language. The \"elastic clause\" (Article I, Section 8, Clause 18), which grants Congress power to make \"all Laws which shall be necessary and proper\" for executing its enumerated powers, provided the legal foundation for virtually unlimited federal authority. The \"supremacy clause\" (Article VI, Clause 2), which establishes the Constitution and federal law as \"the supreme Law of the Land,\" ensured that federal power would always prevail over state resistance.\u003c/p\u003e\n\u003ch2 id=\"the-hidden-legal-framework\"\u003eThe Hidden Legal Framework\u003c/h2\u003e\n\u003ch3 id=\"maritime-law-and-the-corporate-fiction\"\u003eMaritime Law and the Corporate Fiction\u003c/h3\u003e\n\u003cp\u003eResearchers have documented that the legal framework of the United States operates under principles of maritime law (admiralty law) rather than common law — a distinction that has profound implications for the relationship between the government and the governed. Maritime law is the law of commerce, contracts, and corporate entities. Under maritime law, individuals are treated not as sovereign beings with inherent rights but as corporate entities — legal fictions defined and governed by the state.\u003c/p\u003e\n\u003cp\u003eThe evidence for this interpretation includes the consistent use of capital letters in the rendering of citizens' names on government documents — a convention associated with the identification of corporate entities rather than natural persons. Birth certificates, which register individuals with the state and assign them identification numbers, function as instruments of maritime law, creating a legal fiction (the corporate \"person\") that is subject to government jurisdiction in ways that a natural person, under common law, would not be.\u003c/p\u003e\n\u003cp\u003eThis legal framework was not accidental. The men who drafted the Constitution were lawyers trained in legal traditions that distinguished between different forms of law and understood the implications of each. The choice to establish a system that could be operated under maritime principles — enabling the government to treat its citizens as corporate entities subject to commercial regulation — was deliberate, and it was consistent with the Masonic-Jesuit objective of creating a system that appeared to guarantee liberty while providing the legal mechanisms for its eventual elimination.\u003c/p\u003e\n\u003ch3 id=\"the-act-of-1871\"\u003eThe Act of 1871\u003c/h3\u003e\n\u003cp\u003eThe Act of 1871, passed by the 41st Congress, created a corporate government for the District of Columbia. Researchers have argued that this act effectively transformed the United States from a constitutional republic into a corporation — the UNITED STATES OF AMERICA — legally distinct from the Republic established by the Constitution. Under this interpretation, the \"United States\" that governs from Washington D.C. is not the country established by the founders but a corporate entity that operates under corporate law, with citizens serving not as sovereign individuals but as corporate assets.\u003c/p\u003e\n\u003cp\u003eThis interpretation is contested by mainstream legal scholars, but the Act of 1871 is a matter of public record, and its language supports the assertion that a fundamental legal transformation occurred. The creation of a corporate structure for the District of Columbia, combined with the subsequent consolidation of financial control through the Federal Reserve Act of 1913 and the administrative state apparatus that grew throughout the twentieth century, created a governing structure that bears little resemblance to the republic described in public school civics classes.\u003c/p\u003e\n\u003cp\u003eThe Jesuit superior Tamburini's boast — \"From this chamber I govern not only to Paris but to China, not only to China but to all the world, without anyone knowing how it is managed\" — perfectly describes the system created by the hidden constitutional framework. The visible government operates as a democratic republic; the hidden government operates as a corporate entity controlled by financial interests connected to the same networks that drafted the original document.\u003c/p\u003e\n\u003ch2 id=\"the-financial-constitution\"\u003eThe Financial Constitution\u003c/h2\u003e\n\u003ch3 id=\"the-bank-of-the-united-states\"\u003eThe Bank of the United States\u003c/h3\u003e\n\u003cp\u003eThe most consequential battle of the early American republic was not fought on any battlefield — it was fought in the halls of Congress over the establishment of a national bank. Alexander Hamilton, whose connections to European banking interests were well-documented, championed the creation of the Bank of the United States, modeled on the Bank of England. Thomas Jefferson and James Madison opposed it, arguing that the Constitution granted no authority for such an institution.\u003c/p\u003e\n\u003cp\u003eHamilton prevailed, and the First Bank of the United States was chartered in 1791. This was not merely a financial institution — it was the mechanism through which the financial elite, connected to European banking dynasties and Jesuit-aligned interests, established control over the American money supply. The bank's shareholders included European investors whose identities were kept secret — a provision that ensured that the true controllers of American finance would remain hidden.\u003c/p\u003e\n\u003cp\u003eAndrew Jackson destroyed the Second Bank of the United States in the 1830s, recognizing it as an instrument of foreign control. His famous declaration — \"The bank is trying to kill me, but I will kill it\" — reflected his understanding that the struggle was existential. Jackson survived an assassination attempt in 1835, the first against a sitting American president — an event that he publicly attributed to the bank's supporters.\u003c/p\u003e\n\u003ch3 id=\"the-federal-reserve\"\u003eThe Federal Reserve\u003c/h3\u003e\n\u003cp\u003eThe Federal Reserve System, established in 1913, accomplished what Hamilton's bank and its successors had attempted: the permanent transfer of monetary control from the elected government to a private banking cartel. The Federal Reserve is not a government agency — it is a consortium of private banks that controls the money supply, sets interest rates, and operates with minimal government oversight. Its creation was engineered through a secret meeting on Jekyll Island, Georgia, in 1910, attended by representatives of the Morgan, Rockefeller, and Warburg banking interests.\u003c/p\u003e\n\u003cp\u003eThe Federal Reserve Act was passed during Christmas recess, when many opponents were absent from Congress. The timing was deliberate — the financial establishment that drafted the legislation understood that its passage required the minimum possible scrutiny. The result was a system that has transferred trillions of dollars of wealth from the American people to the banking cartel over more than a century, while maintaining the illusion of a free market economy.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e traces the financial control systems that emerged from the Federal Reserve and their connection to the intelligence and secret society networks that govern from behind the constitutional facade. The financial constitution — the hidden structure of monetary control — is the most powerful of all the hidden constitutions, because whoever controls the money controls everything else.\u003c/p\u003e\n\u003ch2 id=\"the-administrative-constitution\"\u003eThe Administrative Constitution\u003c/h2\u003e\n\u003ch3 id=\"the-fourth-branch-of-government\"\u003eThe Fourth Branch of Government\u003c/h3\u003e\n\u003cp\u003eThe Constitution establishes three branches of government: legislative, executive, and judicial. The actual governing structure of the United States includes a fourth branch that the Constitution does not mention: the administrative state — the vast bureaucracy of federal agencies, departments, and commissions that creates and enforces the majority of the regulations that govern American life.\u003c/p\u003e\n\u003cp\u003eThe administrative state operates with legislative power (creating regulations), executive power (enforcing them), and judicial power (adjudicating violations) — combining all three governmental powers in a single branch that is not elected, not accountable, and not mentioned in the Constitution. This concentration of power is precisely what the Constitution's separation of powers was designed to prevent — yet it has been accomplished through the Constitution's own provisions, specifically the delegation doctrine that allows Congress to transfer its legislative authority to executive agencies.\u003c/p\u003e\n\u003cp\u003eThe growth of the administrative state was not an unintended consequence of constitutional governance — it was the intended destination. The Constitution's framers, schooled in Masonic-Jesuit strategy, understood that a document designed to limit government power could also be designed to enable its expansion through provisions that would be activated as circumstances permitted. The administrative state represents the activation of those hidden provisions — the revelation of the secret constitution that was always embedded within the public one.\u003c/p\u003e\n\u003ch3 id=\"the-intelligence-constitution\"\u003eThe Intelligence Constitution\u003c/h3\u003e\n\u003cp\u003eThe intelligence community — the CIA, the NSA, the FBI, and the constellation of agencies that constitute the national security apparatus — operates under what amounts to a separate constitution: a body of classified executive orders, secret legal opinions, and covert authorities that are unknown to the public and largely unknown even to Congress. This intelligence constitution grants powers that would be unconstitutional under the public constitution: warrantless surveillance, extrajudicial killing, covert regime change, and the manipulation of domestic media and politics.\u003c/p\u003e\n\u003cp\u003eThe intelligence constitution is the most recent layer of the hidden constitutional structure, but it is in many ways the most powerful. It provides the mechanisms through which the secret government exercises its most extreme powers, and its classification ensures that neither the public nor their elected representatives can meaningfully oversee or constrain those powers.\u003c/p\u003e\n\u003cp\u003eThe track \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e documents how intelligence community programs that were publicly terminated continued to operate under new classifications and new names. The intelligence constitution ensures that no program is ever truly ended — it is merely reclassified, relocated, and continued under new authority. The public promise of reform is always an illusion; the hidden reality of continued operation is always the truth.\u003c/p\u003e\n\u003ch2 id=\"the-spiritual-constitution\"\u003eThe Spiritual Constitution\u003c/h2\u003e\n\u003ch3 id=\"what-governs-the-governors\"\u003eWhat Governs the Governors\u003c/h3\u003e\n\u003cp\u003eBehind the visible constitution, the financial constitution, the administrative constitution, and the intelligence constitution lies the deepest layer: the spiritual constitution — the demonic authority structure described in Ephesians 6:12 that governs the governors, rules the rulers, and directs the directors. The principalities and powers that Howard Pittman witnessed operate through every layer of human governance, using the visible structures as instruments of purposes that most human participants never perceive.\u003c/p\u003e\n\u003cp\u003eThe spiritual constitution is the one that truly governs. Every provision in every human constitution — visible or hidden — operates within the framework established by the spiritual war between God and the adversary. The human architects of the American system — Masons, Illuminists, Jesuits — were themselves instruments of spiritual forces that directed their work toward objectives that transcended their individual comprehension.\u003c/p\u003e\n\u003cp\u003eMatthew 12:36-37 reminds us that every word carries spiritual significance. The words of the Constitution — every clause, every provision, every carefully crafted ambiguity — are spiritual utterances that carry weight in the second heaven. The legal framework they created is not merely a political structure; it is a spiritual structure, and its effects extend beyond the material realm into the eternal dimensions of human destiny.\u003c/p\u003e\n\u003cp\u003eUnderstanding the secret constitution is not an exercise in political disillusionment — it is an exercise in spiritual discernment. The believer who understands the hidden architecture of governance is better equipped to navigate it without being enslaved by it, to render unto Caesar what is Caesar's while keeping what belongs to God firmly in God's possession.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-warning-of-1-samuel-8\"\u003eThe Warning of 1 Samuel 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"And the LORD said unto Samuel, Hearken unto the voice of the people in all that they say unto thee: for they have not rejected thee, but they have rejected me, that I should not reign over them.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe ancient warning of 1 Samuel 8 echoes through every government corridor today. When Israel demanded a king like the other nations, God warned them exactly what would happen — their sons taken for war, their daughters for service, their fields and vineyards seized, a tenth of everything confiscated. They chose human government over God's reign, and the tyranny followed exactly as promised. Nothing has changed. The modern political system is two wings of the same bird — left and right, Republican and Democrat — all serving the same hidden power structure. Voting for either side is choosing which wing flaps next while the bird flies in the same direction. The real power has never been on any ballot.\u003c/p\u003e\n\u003ch2 id=\"source-references\"\u003eSource References\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"The Secret Constitution,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/en/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/en/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/illuminati-freemasons-jesuits-part2/?lang=en\"\u003eIlluminati, Freemasons, Jesuits: The FOUNDING FATHERS Part 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/selling-america-perverted-power-part6/?lang=en\"\u003eSELLING AMERICA: PERVERTED POWER and the PENTAGRAM Part 6\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/illusion-illuminati-masons-part4/?lang=en\"\u003eWas It All AN ILLUSION: Illuminati and Masons Exposed Part 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eThe Constitution they taught you in school is not the only constitution that governs America. Behind the visible document lies a hidden architecture of financial control, administrative power, intelligence authority, and spiritual governance that operates according to principles the public document was designed to conceal. The CON in Constitution is not a word — it is a description. The most successful confidence scheme in history created a nation that believed itself free while constructing, within its own founding document, the mechanisms of its eventual enslavement. Understanding the secret constitution is the first step toward genuine freedom — not the illusory freedom granted by a document, but the real freedom granted by the truth.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/en/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}
