еческого внимания, коррупции человеческого восприятия и перенаправления человеческого преданного. Голливуд — это наиболее мощное такое устройство, когда-либо построенное. Это не промышленность, которая случается содержать оккультные элементы. Это оккультная промышленность, которая использует развлечение как ее механизм доставки. Символизм не случаен. Ритуалы не совпадении. Предсказательное программирование не воображение. Голливуд — это машина, разработанная для программирования коллективного сознания человечества — и это работало с полной емкостью более столетия.\u003c/p\u003e\n\u003cp\u003eСамо имя \"Hollywood\" несет оккультное значение. Древесина holly была деревом, используемым друидами для создания палочек магии — инструменты для броска чаров и направления энергии. Соединение может казаться поверхностным, но основатели промышленности были пропитаны оккультизмом, масонством и эзотерическими традициями. Чары просто были обновлены: вместо палочек, они используют камеры; вместо заклинаний, они используют сценарии; вместо малых собраний, они трансляцируют миллиардов. Трек альбома Confliction \"Маска сатаны\" (Satan's Disguise) раскрывает метод — противник, который маскируется как ангел света, как развлечение, как искусство, как фабрика мечты, которая обещает побег, при этом доставляя порабощение.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"оккультные-основания\"\u003eОккультные основания\u003c/h2\u003e\n\u003cp\u003eСвязь Голливуда с оккультизмом не является современной теорией заговора. Это задокументированная история.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВлияние Aleister Crowley.\u003c/strong\u003e Crowley — самообозванный \"Великий зверь 666\" и наиболее влиятельный оккультист 20-го века — имел прямые и косвенные соединения к Голливуду. Его ученик Kenneth Anger был пионерским кинорежиссером, чья работа явно объединила кино и оккультный ритуал. \"Inauguration of the Pleasure Dome\" (1954) и \"Lucifer Rising\" (1972) продемонстрировали, как кино могло служить ритуальным средством. Bobby Beausoleil, кто оценил \"Lucifer Rising,\" был членом семьи Manson.\u003c/p\u003e\n\u003cp\u003eФилософия Crowley — \"Do what thou wilt shall be the whole of the law\" — стала операционной этикой творческого класса Голливуда. Его концепции магии как манипуляции сознания через символическое воображение предоставили теоретическую рамку для промышленности, построенной в точности на этом: манипуляция сознания через символическое воображение, проектируемое на экранах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eJack Parsons.\u003c/strong\u003e Основатель Jet Propulsion Laboratory и преданный последователь Crowley, Parsons проводил разработанные оккультные ритуалы в Pasadena в 1940х — \"Babalon Working\" — наряду с L. Ron Hubbard, который позже основал Scientology, которое имеет глубокие корни в Голливуде. Географическая и идеологическая близость аэрокосмической промышленности, оккультизма и развлекательной промышленности в полвека, южная Калифорния была не совпадением.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWalt Disney.\u003c/strong\u003e Связь Disney с оккультным символизмом, агентствами разведки и масонством была обширно задокументирована. Фильмы Disney насыщены оккультными символами — пентаграммы, все-видящие глаза, скрытое сексуальное воображение и сюжетные линии, взятые из оккультной мифологии. Концепция \"магии Disney\" — не просто маркетинговый слоган — это отражает преднамеренное использование промышленностью методов очарования для программирования молодых разумов во время их наиболее впечатляющих лет.\u003c/p\u003e\n\u003ch2 id=\"символизм-язык-оккультного\"\u003eСимволизм: язык оккультного\u003c/h2\u003e\n\u003cp\u003eКинофильмы Голливуда, музыкальные видео, церемонии награждения и промо-материалы насыщены оккультным символизмом. Этот символизм не декоративный. В оккультной традиции, символы функциональны — они передают энергию, кодируют значение и программируют подсознательный разум. Ключевые повторяющиеся символы включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВсе-видящий глаз.\u003c/strong\u003e Глаз Horus, глаз в пирамиде, жест одного глаза — появляется постоянно в Голливуд воображении. Актеры, музыканты и публичные фигуры фотографируются, закрывая один глаз. Плакаты фильмов, обложки альбомов и материалы промо избирательности показывают одиночный глаз выдающимся образом. В оккультной традиции, все-видящий глаз представляет глаз Люцифера — светоносца, кто претензии видеть все и знать все.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПирамида.\u003c/strong\u003e Пирамидальная структура — представляющая иерархическую власть с просвещенным капстоуном выше основания — появляется в наборах конструкции, корпоративных логотипах, музыкальном воображении видео и награде церемонии постановке. Это представляет власть структуру оккультной элиты, с посвященными на вершине и непосвященными на основании.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШахматная доска пол.\u003c/strong\u003e Черно-белая проверенная образец — центральная особенность масонского пола залов — появляется повторно в производстве Голливуда. Это представляет двойственность, слияние противоположностей и масонское концепция балансирования света и тьмы.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBaphomet.\u003c/strong\u003e Гермафродитическая коз-главная фигура — связанная с Knights Templar и принята Eliphas Levi и позже Crowley — появляется в все более явных формах в развлечении. От тонких жестов рогов к прямым депикциям, Baphomet представляет инверсию божественного — поклонение созданного, чем Творца.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМонарх бабочка.\u003c/strong\u003e Связанная с программой контроля разума MKUltra \"Monarch Programming,\" воображение бабочки появляется на бесчисленных знаменитостях, в музыкальных видео и в моде. Это представляет fractured психе контролируемого разума-индивидуума — превращение от человеческого существа в программированный актив.\u003c/p\u003e\n\u003cp\u003eЭти символы появляются с частотой и последовательностью, которая не может быть объяснена эстетическим предпочтением или совпадением. Они визуальный язык оккультной системы, общающейся через самый мощный трансляционный средство когда-либо создавался.\u003c/p\u003e\n\u003ch2 id=\"церемонии-награждения-публичные-ритуалы\"\u003eЦеремонии награждения: публичные ритуалы\u003c/h2\u003e\n\u003cp\u003eЦеремонии награждения Голливуда — Oscars, Grammys, MTV Awards — функция как массовые публичные ритуалы. Элементы последовательны:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭтап как алтарь.\u003c/strong\u003e Награда этапы церемонии разработаны с преднамеренным символической архитектурой — пирамиды, колонны, арки и оккультные геометрии, которые зеркало конструкции храма.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПроизводство как invocation.\u003c/strong\u003e Музыкальное производство в крупных церемониях награждения все более включает явное оккультное воображение: огонь, демонические фигуры, ритуальная хореография и нарративы смерти и rebirth. Это не художественные выборы. Это ритуальные enactments трансляции сотнями миллионов зрителей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗнаменитость как священник.\u003c/strong\u003e Получатели награды доставляют эмоциональные речи, которые функция как свидетельства — объявления благодарности неназванным силам, выражения посвященности неназванным причинам и приглашения аудитории поделить в эмоциональном опыте. Аудитория участвует через внимание — валюту ритуала.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМассовое участие.\u003c/strong\u003e Ключевой элемент оккультного ритуала — это участие — аудитория должна быть занята, эмоционально инвестирована и внимательна. Сотни миллионов зрителей, наблюдающих трансляцию ритуала, составляют самое большое ритуальное собрание в истории человечества. Они не знают, что они участвуют. Это то, что делает его эффективным.\u003c/p\u003e\n\u003ch2 id=\"предсказательное-программирование\"\u003eПредсказательное программирование\u003c/h2\u003e\n\u003cp\u003eКак исследуется в деталях в Predictive Programming: How Entertainment Programs Your Future, Голливуд систематически депикты будущих событий перед их появлением в реальности. Эта практика служит многим функциям:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDesensitization.\u003c/strong\u003e Путем depiction катастрофических событий в fiction перед их появлением в reality, население desensitized к реальному событию, когда это прибывает. Эмоциональный шок уменьшен, потому что \"мы видели это раньше\" — даже если только в фильме.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодразумеваемое согласие.\u003c/strong\u003e В оккультной философии, вселенная работает на согласие. Путем показа населению, что спланировано и получения отсутствие возражение (потому что это представлено как fiction), практикующие оккультные считают согласие было дано. Это темная инверсия информированного согласия — раскрытие без понимания.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодсознательное программирование.\u003c/strong\u003e События depicted в fiction становятся нормализованными в подсознательном разуме. Когда они происходят в reality, они чувствуют неизбежными, нежели engineered — \"жизнь имитирует искусство\" вместо \"искусства раскрывая план.\"\u003c/p\u003e\n\u003cp\u003eОбразец Голливуда depicting события перед ними происходящими — из сценария пандемии к террористическим атакам к технологическим развитиям — является одним из наиболее последовательных и demonstrable образцов в современных медиа.\u003c/p\u003e\n\u003ch2 id=\"темная-сторона-промышленности\"\u003eТемная сторона промышленности\u003c/h2\u003e\n\u003cp\u003eЗа пределами символизма и программирования, Голливуд работает как система эксплуатации и контроля:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДиваны casting и эксплуатация.\u003c/strong\u003e Движение #MeToo разоблачило систематическую сексуальную эксплуатацию в промышленности развлечений. Осуждение Harvey Weinstein был вершиной айсберга, который расширяется намного глубже. Структура власти промышленности — где горсть руководителей контролирует доступ к знаменитости и состояние — создает присущую уязвимость к эксплуатации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭксплуатация ребенка.\u003c/strong\u003e Бывшие детские звезды последовательно сообщили о наказании, манипулировании и эксплуатации. Corey Feldman, Elijah Wood и другие описали культуру педофилии в промышленности, которая работает с impunity. Соединение к более широким сетям шантажа, описанным в Epstein Island: The Blackmail Network, не спекулятивно — это задокументировано через перекрывающиеся социальные сети, финансовые связи и институциональные отношения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПсихическое разрушение.\u003c/strong\u003e Толл Голливуда на его участниках видим в промышленности необыкновенном проценте психического болезни, наркотической злоупотребления и преждевременной смерти. Звезды, которые начинают как vibrant индивиды, систематически разломаны — их личности fractured, их границы разрушены, их человечество потреблено машиной. Этот образец последователен с trauma-based программированием, задокументированным в MKUltra Never Ended.\u003c/p\u003e\n\u003ch2 id=\"фабрика-мечты\"\u003eФабрика мечты\u003c/h2\u003e\n\u003cp\u003eНаиболее фундаментальная функция Голливуда — производство мечты — создание альтернативной реальности, которая более vivid, более эмоционально compelling и более постоянно перезагружена, чем actual реальность. Через фильмы, телевидение, потоковое содержание и социальные СМИ, Голливуд constructs общее imaginative пространство, что миллиарды человеческих людей занимают для часов каждый день.\u003c/p\u003e\n\u003cp\u003eЭто manufactured dreamscape определяет:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eЧто нормально и что девиант\u003c/li\u003e\n\u003cli\u003eЧто желаемо и что стыдно\u003c/li\u003e\n\u003cli\u003eЧто возможно и что невозможно\u003c/li\u003e\n\u003cli\u003eКакие угрозы реальны и какие угрозы воображаемы\u003c/li\u003e\n\u003cli\u003eКакие авторитеты trustworthy и какие questioners опасные\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЛичность, которая потребляет Голливуд содержание для четырех часов день потратила больше времени в manufactured dreamscape чем в genuine человеческое взаимодействие. Их восприятия, ценности и ожидания более сформированы сценаристами, чем lived опытом. Голливуд не отражает культуру — это создает ее. И культура, которую это создает, служит интересам тех, кто владеет машиной.\u003c/p\u003e\n\u003ch2 id=\"библейское-отражение\"\u003eБиблейское отражение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И это не удивительно, ибо сам сатана принимает вид ангела света.\" — 2 Коринфянам 11:14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПервичная стратегия противника не ужас, но glamour — не repulsion но attraction. Голливуд — это ангел света, сделанный корпоративным: красивый, compelling, эмоционально мощный и насыщенный тьмой, замаскированной как развлечение. Экран светит с светом, который mesmerizes, и внутри света, символы делать их работу — программирование разумов, нормализирование зла и перенаправления поклонения от Творца к созданию. Машина не просит вас вознестись. Это просит вас наблюдать. И наблюдение достаточно.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\
