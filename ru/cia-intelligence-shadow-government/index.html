воим ученикам, когда посылал их в мир, управляемый скрытыми силами -- римское завоевание, поддерживаемое разведывательными сетями, религиозные власти с тайными советами и политические правители, чья истинная повестка дня совершенно не походила на их публичные заявления. Две тысячи лет спустя, то же самое динамическое явление управляет современным миром: избранные официальные лица служат видимым лицом власти, в то время как истинная структура управления действует в тени, позади стен классификации, в секционированных программах и через разведывательные агентства, которые не отвечают ни одной избранной власти.\u003c/p\u003e\n\u003cp\u003eКевин Шипп — один из немногих людей, кто видел обе стороны этой стены. Как украшенный офицер ЦРУ, служивший в нескольких высокорисковых заданиях, Шипп имел прямой доступ к внутреннему функционированию американского разведывательного сообщества. То, что он видел, вынудило его стать разоблачителем, рискуя всем, чтобы разоблачить теневое правительство, которое действует позади конституционной республики, в которую верят американцы.\u003c/p\u003e\n\u003cp\u003eКак предупреждает \u003cem\u003eThe Deceivers Lies\u003c/em\u003e из альбома Confliction, самый эффективный обман — это тот, который заменяет реальность убедительной иллюзией. И как объявляет \u003cem\u003eSatans Disguise\u003c/em\u003e, наиболее мощное оружие противника — это появление как чего-то надёжного, пока действуя ради разрушения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кевин-шипп-разоблачитель\"\u003eКевин Шипп: разоблачитель\u003c/h2\u003e\n\u003ch3 id=\"предыстория\"\u003eПредыстория\u003c/h3\u003e\n\u003cp\u003eКевин Шипп служил офицером ЦРУ в течение нескольких десятилетий в должностях, включая защиту разведки, контрразведку и офицера центра борьбы с терроризмом. Он был украшен за свою службу и имел высокоуровневые допуски безопасности, которые дали ему доступ к засекреченным программам и оперативной разведке.\u003c/p\u003e\n\u003cp\u003eПосле ухода из ЦРУ Шипп стал одним из самых откровенных разоблачителей в разведывательном сообществе, описывая свой опыт и структурную коррупцию, которую он видел в книгах, лекциях и публичных выступлениях. Его личный рассказ предоставляет внутреннюю перспективу теневого правительства, которую академический анализ и журналистское расследование могут только наблюдать извне.\u003c/p\u003e\n\u003ch3 id=\"теневое-правительство-против-глубокого-государства\"\u003eТеневое правительство против глубокого государства\u003c/h3\u003e\n\u003cp\u003eШипп проводит критическое различие между \"теневым правительством\" и \"глубоким государством\" -- термины, которые часто используются взаимозаменяемо, но описывают разные компоненты одной и той же системы:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТеневое правительство\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eТеневое правительство состоит из разведывательных агентств и связанных с ними программ, которые действуют над законом и вне досягаемости демократического надзора. Ключевые компоненты включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЦРУ\u003c/strong\u003e -- Центральное разведывательное управление, которое проводит тайные программы на территории страны и за границей с минимальным наблюдением конгресса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАНБ\u003c/strong\u003e -- Агентство национальной безопасности, которое проводит массовое наблюдение глобального населения и поддерживает наиболее обширный аппарат сбора данных в истории\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНРО\u003c/strong\u003e -- Национальное разведывательное управление, которое управляет шпионскими спутниками и системами наблюдения на основе космоса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДИА\u003c/strong\u003e -- Агентство оборонной разведки, которое предоставляет военную разведку и управляет тайными программами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРазведывательное сообщество (РС) в целом\u003c/strong\u003e -- 17 разведывательных агентств, которые вместе формируют параллельное правительство, работающее позади стен классификации\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВласть теневого правительства вытекает из трёх источников:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eПолномочие классификации\u003c/strong\u003e -- возможность классифицировать любую информацию как секретную, предотвращая доступ к ней публики или конгресса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПолномочие тайной деятельности\u003c/strong\u003e -- возможность проводить операции (включая убийства, перевороты и смену режима) без публичного знания или демократической авторизации\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНепрозрачность бюджета\u003c/strong\u003e -- бюджеты разведки — это \"чёрные бюджеты\", которые освобождены от нормального конгрессного надзора над ассигнованиями\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003eГлубокое государство\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eГлубокое государство шире теневого правительства. Оно охватывает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eТеневое правительство (разведывательные агентства)\u003c/li\u003e\n\u003cli\u003eВоенно-промышленный комплекс (подрядчики по обороне, производители вооружений)\u003c/li\u003e\n\u003cli\u003eУолл-стрит и крупные финансовые учреждения\u003c/li\u003e\n\u003cli\u003eКонгломераты массовых медиа\u003c/li\u003e\n\u003cli\u003eКорпорации технологии Кремниевой долины\u003c/li\u003e\n\u003cli\u003eКрупные фармацевтические компании\u003c/li\u003e\n\u003cli\u003eКлючевые элементы судебной системы и правоохранительных органов\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eГлубокое государство — это экосистема, которая поддерживает, финансирует, защищает и извлекает прибыль из операций теневого правительства. Это видимый слой, который взаимодействует с публикой, служа интересам скрытого слоя.\u003c/p\u003e\n\u003ch2 id=\"конституционное-нарушение\"\u003eКонституционное нарушение\u003c/h2\u003e\n\u003ch3 id=\"правление-классификацией\"\u003eПравление классификацией\u003c/h3\u003e\n\u003cp\u003eНаиболее осуждающим откровением Шиппа является то, что система классификации -- первоначально разработанная для защиты законных секретов национальной безопасности -- была использована как оружие для создания параллельного правительства, работающего вне конституционных ограничений.\u003c/p\u003e\n\u003cp\u003eПо Конституции, вся правительственная власть вытекает из согласия управляемых. Граждане избирают представителей, которые издают законы, авторизуют программы и ассигнуют средства. Система классификации подрывает этот процесс, делая целые категории правительственной деятельности невидимыми для публики и даже для большинства избранных официальных лиц.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСекционированные программы\u003c/strong\u003e доступны только физическим лицам с конкретными допусками и авторизацией необходимости. Большинство членов конгресса не имеют доступа к наиболее чувствительным секционированным программам.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСпециальные программы доступа (САП)\u003c/strong\u003e действуют при ещё более строгом контроле доступа, с некоторыми программами, известными только горстке людей. Эти \"отклоненные\" или \"не признанные\" САП не раскрываются даже разведывательным комитетам конгресса.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСам президент\u003c/strong\u003e может не иметь полного доступа ко всем засекреченным программам. Система классификации была разработана разведывательными агентствами, и они контролируют доступ к своим собственным секретам.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eРезультат — правительство внутри правительства -- засекреченное государство, которое проводит операции, тратит деньги, разрабатывает технологию и принимает решения по политике без знания или согласия демократической системы, которой оно якобы служит.\u003c/p\u003e\n\u003ch3 id=\"цру-и-внутренние-операции\"\u003eЦРУ и внутренние операции\u003c/h3\u003e\n\u003cp\u003eНесмотря на юридические запреты на внутренние операции разведки (устав ЦРУ ограничивает его иностранной разведкой), Шипп документирует обширную внутреннюю деятельность ЦРУ:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eМанипуляция медиа\u003c/strong\u003e -- операция \"Попугай\" и её наследницы, через которые ЦРУ поддерживало влияние на крупные медиа-организации, высаживая истории, подавляя расследования и формируя общественное мнение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнфильтрация академии\u003c/strong\u003e -- финансирование ЦРУ академических исследований и размещение активов в университетах для влияния на академический дискурс и вербовки активов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнтеграция корпоративная\u003c/strong\u003e -- глубокие отношения между ЦРУ и крупными корпорациями, включая технологические компании, фармацевтические компании и финансовые учреждения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВнутреннее наблюдение\u003c/strong\u003e -- несмотря на юридические запреты, ЦРУ собирает разведку об американских граждан через партнёрства с АНБ, ФБР и иностранными разведывательными сервисами\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eАна Михалча, врач, доктор философии, связала на её Substack (anamihalceamdphd.substack.com) документированные программы разведывательного сообщества по человеческим экспериментам -- МКУльтра, операция \"Полночь\" и другие -- с текущим развёртыванием нанотехнологии через фармацевтические продукты. Д-р Михалча утверждает, что фармацевтический-разведывательный nexus, выявленный Шиппом, предоставляет институциональный механизм, через который нанотехнология была разработана, протестирована и развёрнута глобальному населению.\u003c/p\u003e\n\u003ch2 id=\"разведывательно-фармацевтический-комплекс\"\u003eРазведывательно-фармацевтический комплекс\u003c/h2\u003e\n\u003ch3 id=\"операция-скрепка-и-нацистский-фундамент\"\u003eОперация \"Скрепка\" и нацистский фундамент\u003c/h3\u003e\n\u003cp\u003eУчастие американского разведывательного сообщества в фармацевтических экспериментах восходит к операции \"Скрепка\" -- программе после Второй мировой войны, которая привела более 1600 нацистских учёных, инженеров и техников в Соединённые Штаты. Среди них были учёные, которые проводили человеческие эксперименты в концентрационных лагерях, включая исследование:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eХимического и биологического оружия\u003c/li\u003e\n\u003cli\u003eКонтроля сознания и изменения поведения\u003c/li\u003e\n\u003cli\u003eЧеловеческой выносливости и биологических лимитов\u003c/li\u003e\n\u003cli\u003eФармацевтических эффектов на нежелательных человеческих субъектах\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти учёные были интегрированы в американские военные, разведывательные и фармацевтические программы, привнеся с собой как техническую экспертизу, так и этическую базу нацистских экспериментов. Непрерывность от нацистских человеческих экспериментов к программам ЦРУ, таким как МКУльтра, не спекулятивна -- она документирована в рассекреченных записях.\u003c/p\u003e\n\u003ch3 id=\"современный-фармацевтический-разведывательный-nexus\"\u003eСовременный фармацевтический-разведывательный nexus\u003c/h3\u003e\n\u003cp\u003eОтношения между разведывательным сообществом и фармацевтической промышленностью углубились на протяжении десятилетий:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDARPA финансирует фармацевтические исследования\u003c/strong\u003e через программы, которые разрабатывают инъекционные технологии для военного и гражданского применения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВенчурная столица ЦРУ, In-Q-Tel\u003c/strong\u003e, инвестирует в фармацевтические и биотехнологические компании, включая компании, разрабатывающие нанотехнологию и биосенсорные платформы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКадры разведывательного сообщества ротируют через фармацевтические компании\u003c/strong\u003e, создавая вращающуюся дверь экспертизы и верности между правительственной разведкой и частным фармацевтическим производством\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКаркас срочной авторизации\u003c/strong\u003e -- который обошёл нормальное тестирование безопасности вакцин COVID-19 -- был разработан под органами национальной безопасности, а не органами общественного здоровья. Министерство обороны, а не Министерство здравоохранения и социальных служб, разместило заказы на вакцины COVID-19.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭтот разведывательно-фармацевтический nexus является институциональной структурой, через которую нанотехнология была разработана, скрыта в фармацевтических продуктах и развёрнута глобальному населению. Теневое правительство, которое описывает Кевин Шипп, является структурой управления, которая авторизовала, финансировала и защищала это развёртывание.\u003c/p\u003e\n\u003ch2 id=\"пророческое-измерение\"\u003eПророческое измерение\u003c/h2\u003e\n\u003ch3 id=\"правители-тьмы\"\u003eПравители тьмы\u003c/h3\u003e\n\u003cp\u003eЕфесянам 6:12 описывает духовную войну против \"правителей тьмы этого века.\" Теневое правительство является временным проявлением этой духовной реальности -- система скрытого правления, которая действует через тьму (классификация), обман (манипуляция медиа) и силу (тайная деятельность).\u003c/p\u003e\n\u003cp\u003eНавязчивость разведывательного сообщества к секретности отражает духовную динамику, описанную по всему писанию: царство тьмы действует через утаивание, тогда как царство Бога действует через откровение. \"Тайное принадлежит Господу Богу нашему, а открытое нам и сынам нашим навеки\" (Второзаконие 29:29).\u003c/p\u003e\n\u003cp\u003eРазоблачение теневого правительства разоблачителями, такими как Кевин Шипп, сам по себе пророческий акт -- приведение скрытых вещей на свет, исполнение обещания Иисуса, что ничто закрытое не останется неоткрытым. Каждая засекреченная программа, каждая секционированная операция, каждый пункт чёрного бюджета будет разоблачена -- не просто человеческими разоблачителями, но Богом, который видит каждый секрет и судит каждое скрытое дело.\u003c/p\u003e\n\u003cp\u003eТвердь небес содержит всё это -- теневое правительство, разведывательные агентства, фармацевтический комплекс и нанотехнологию, которую они развернули. Всё это действует под твердью, которую Бог разместил, в пределах границ, которые Бог установил, и под властью, которой обладает только Бог. Теневое правительство может быть скрыто от публики, но оно не скрыто от Бога. И его разоблачение грядёт.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-из-1-царств-8\"\u003eПредупреждение из 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: слушай голоса народа во всём, что они говорят тебе; ибо не тебя они отвергли, а отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (КЖВ)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение из 1 Царств 8 звучит в каждом правительственном коридоре сегодня. Когда Израиль потребовал царя, как другие народы, Бог предупредил их ровно то, что произойдёт -- их сыновей возьмут на войну, их дочерей на служение, их поля и виноградники захватят, десятину всего конфискуют. Они выбрали человеческое правление над царством Бога, и тирания последовала точно как обещано. Ничего не изменилось. Современная политическая система — две крыла одной птицы — левая и правая, республиканцы и демократы — всё служит одной и той же скрытой структуре власти. Голосование за любую сторону — это выбор, какое крыло взмахивается следующим, пока птица летит в том же направлении. Реальная власть никогда не была на баллотировке.\u003c/p\u003e\n\u003ch2 id=\"справочные-источники\"\u003eСправочные источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eShipp, K., \"From the Company of Shadows,\" публичные выступления и документация, 2017-настоящее\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eU.S. Senate Select Committee on Intelligence, различные отчёты надзора\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eChurch Committee Report, \"Final Report of the Select Committee to Study Governmental Operations with Respect to Intelligence Activities,\" 1976\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eJacobsen, A., \"Operation Paperclip: The Secret Intelligence Program that Brought Nazi Scientists to America,\" 2014\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eAna Mihalcea, MD, PhD, anamihalceamdphd.substack.com, анализ разведывательно-фармацевтического nexus\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (КЖВ)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство близкой смертельной опасности Хоуарда Питтмана — Предупреждение о конце времён, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто находится в подвале Ватикана может вас потрясти!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/
