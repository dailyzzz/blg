003cp\u003eТри амбиции. Одно восстание. Строители Вавилона хотели город (централизированное управление), башню, достигающую небес (доступ к божественной области без Божественного разрешения), и имя (идентичность и наследие в стороне от Бога). Они хотели единства, возвышения и постоянства — на своих условиях, своей силой, в отличии от Божественного повеления \"наполнять земль\" (Бытие 9:1).\u003c/p\u003e\n\u003cp\u003eБожественный ответ был быстрым и решительным: он смешивал их язык и рассеивал их через земь. Проект был заброшен. Башня развалилась. Единство было разбито. Но амбиция не была уничтожена. Она пошла в подполье. Она путешествовала через Вавилон, через Египет, через Грецию, через Рим, через школы мистерии, через тайные общества, через Просвещение, через промышленную революцию, и она появилась в 21-м веке с большей силой и большей технологией, чем первоначальные строители могли даже воображать.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/45-The_Strange_Land.mp4\"\u003eСтранная земля\u003c/a\u003e захватывает смещение, которое Вавилон создал — рассеивание, смешивание, потерю единства, которую Бог наложил как суд. Но потомки строителей Вавилона никогда не приняли рассеивание. Они потратили тысячелетия, пытаясь обратить его — восстановить башню, переобъединить язык и завершить проект, который Бог прерывал.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"первоначальный-вавилон-что-они-действительно-строили\"\u003eПервоначальный Вавилон: Что они действительно строили\u003c/h2\u003e\n\u003cp\u003eОбычное чтение Бытия 11 представляет Вавилон как примитивный строительный проект — древние люди, укладывающие кирпичи, чтобы достичь физического неба. Это чтение неправильно понимает текст полностью.\u003c/p\u003e\n\u003cp\u003eЕврейская фраза, переведённая \"чьи вершина может достичь неба\" — это \u003cem\u003erosh bashamayim\u003c/em\u003e — буквально \"её голова в небесах.\" Это не архитектурная гипербола. Древние месопотамские зиккураты не были разработаны, чтобы физически достичь неба. Они были разработаны как порталы — врата между земными и небесными областями. Зиккурат был посадочной платформой для богов, структурой, которая облегчала коммуникацию между человеческим и божественным областями.\u003c/p\u003e\n\u003cp\u003eСлово \"Вавилон\" само является поучительным. На аккадском языке, \u003cem\u003eBab-ilu\u003c/em\u003e означает \"Врата Бога.\" Строители не пытались построить высокое здание. Они пытались построить врата — портал к божественной области, который дал бы человечеству прямой доступ к небесной силе без подмены к Божественному авторитету.\u003c/p\u003e\n\u003cp\u003eЭто точно то, что описывает Книга Ясира (текст, упоминаемый в Иисусе Навина 10:13 и 2 Самуила 1:18): строители Вавилона намеревались вести войну против Бога на небесах. Башня не была строительством. Это было вторжение. Амбиция не была архитектурной. Это была космическая.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"три-амбиции-тогда-и-теперь\"\u003eТри амбиции: тогда и теперь\u003c/h2\u003e\n\u003ch3 id=\"амбиция-1-построим-себе-город--централизованное-глобальное-управление\"\u003eАмбиция 1: \"Построим себе город\" — централизованное глобальное управление\u003c/h3\u003e\n\u003cp\u003eГород Вавилона была первым попытка централизованного мирового управления. Всё человечество, говоря на одном языке, работающем под одним авторитетом, строящем один проект. Это видение глобалиста:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбъединённые Нации\u003c/strong\u003e — Основанные в 1945 году, ООН является наиболее видимым выражением видения одно-мировых управления. Его устав направлен \"поддерживать международный мир и безопасность\" и \"достичь международного сотрудничества.\" Его агентства — WHO, UNESCO, UNICEF, WFP и десятки других — управляют здоровьем, образованием, культурой, пищей и развитием через 193 страны-члены.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВсемирный экономический форум\u003c/strong\u003e — Как задокументировано в \u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eВеликий сброс: четвёртая промышленная революция\u003c/a\u003e, повестка WEF явно глобалистская: \"Великий сброс\" глобальной экономической системы, четвёртая промышленная революция, объединяющая физические, цифровые и биологические идентичности, и модель капитализма заинтересованных сторон, которая передает управление от избранных должностных лиц к корпоративным и институциональным элитам.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЕвропейский Союз\u003c/strong\u003e — Наиболее продвинутый эксперимент наднационального управления, в котором суверенные нации сдают законодательный, судебный и денежный авторитет централизованной бюрократии в Брюсселе. Флаг ЕС — двенадцать звёзд в круге — был связан некоторыми исследователями с символизмом Откровения 12, хотя ЕС претендует, что звёзды представляют единство и совершенство.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWHO Договор о пандемии\u003c/strong\u003e — Предложенное международное соглашение, которое будет дарует WHO авторитет над национальной политикой здравоохранения во время объявленных чрезвычайных ситуаций здравоохранения, эффективно создавая глобальную структуру управления здравоохранением, которая превосходит национальный суверенитет.\u003c/p\u003e\n\u003cp\u003eГород восстанавливается. Структура централизованного управления более полна, чем в любое время с Вавилона. Язык может быть различным — \"международное сотрудничество,\" \"многосторонний основу,\" \"основанный на правилах порядок\" — но амбиция идентична: один авторитет, одна система, один город.\u003c/p\u003e\n\u003ch3 id=\"амбиция-2-башня-чьи-вершина-может-достичь-неба--трансгуманистическое-возвышение\"\u003eАмбиция 2: \"Башня, чьи вершина может достичь неба\" — трансгуманистическое возвышение\u003c/h3\u003e\n\u003cp\u003eБашня была врата на небеса — попытка доступа к божественной силе через человеческую инженерию, скорее, чем через божественное приглашение. Как исследовано в \u003ca href=\"/ye-shall-be-as-gods-transhumanism/?lang=ru\"\u003eВы будете как боги: древняя ложь позади трансгуманизма\u003c/a\u003e, это трансгуманистическая амбиция:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнтерфейсы мозг-компьютер\u003c/strong\u003e — Neuralink и конкуренты строят буквальный интерфейс между человеческим сознанием и цифровой областью. Башня на небеса — это теперь нейронный кабель к облаку.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГенетическая инженерия\u003c/strong\u003e — CRISPR и технологии редактирования генов позволяют переписание человеческого генома. Башня на небеса — это теперь двойная спираль, изменённая, чтобы произвести существа, которые превышают спецификации оригинального творения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИскусственный интеллект\u003c/strong\u003e — системы ИИ, которые приближаются и могут быть превышены человеческий интеллект, представляют попытку создать искусственные разумы — репликировать божественную способность мысли, творения и управления без участия Бога.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРасширение жизни\u003c/strong\u003e — Calico (жизненные науки Alphabet/Google компании), Altos Labs (спонсируемый Jeff Bezos) и другие предприятия инвестируют миллиарды в расширение человеческой жизни — потенциально неопределённо. Башня на небеса — это теперь проект биотехнологии, нацеленный на поражение смерти без воскресения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКолонизация пространства\u003c/strong\u003e — SpaceX, Blue Origin и национальные программы пространства направлены на установление человеческого присутствия на луне, Марсе и дальше. Башня на небеса — это теперь ракета. Амбиция \"достичь неба\" через человеческую инженерию никогда не была более буквальной.\u003c/p\u003e\n\u003cp\u003eКаждый из этих проектов направлен на превышение границ Бог установил для человечества — граница смертности, граница тела, граница разума, граница земли. Каждый — кирпич в новой башне. Каждый представляет человечество, достигающее неба собственной силой, на собственных условиях, в отличии от дизайна Создателя.\u003c/p\u003e\n\u003ch3 id=\"амбиция-3-сделаем-себе-имя--идентичность-в-стороне-от-бога\"\u003eАмбиция 3: \"Сделаем себе имя\" — идентичность в стороне от Бога\u003c/h3\u003e\n\u003cp\u003eСтроители Вавилона хотели имя — идентичность, наследие, репутация, построенная на собственных достижениях, скорее, чем на отношении с Богом. Это современный культ достижения:\u003c/p\u003e\n\u003cp\u003eСлоган трансгуманиста — это \"Humanity+\" — человечество улучшено, улучшено, обновлено. Имя, которое человечество делает для себя, больше не укоренено в сотворении в образе Бога. Это укоренено в само-творении, само-модификации, само-трансцендентности. Мы больше не дети Бога. Мы инженеры нашей собственной эволюции.\u003c/p\u003e\n\u003cp\u003eЭра социальных сетей буквально литерализировала \"создание имени.\" Каждая платформа — стадия для само-продвижения, само-бренда и построения публичной идентичности, отделённой от любой духовной реальности. \"Имя\" — это теперь профиль, бренд, последователь, приборная панель метрик человеческого значения, измеряемая в лайках, акциях и подписчиках.\u003c/p\u003e\n\u003cp\u003eКорпоративная элита делает имена для себя через фундации, инициативы и проекты наследия. The Bill \u0026#x26; Melinda Gates Foundation. Фонд Рокфеллера. Открытые общества фундации Сороса. Эти современные зиккураты — памятники человеческой амбиции, скрытой как благотворительность, каждая, носящая имя её строителя.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"зданиями-парламента-ес-архитектурное-признание\"\u003eЗданиями парламента ЕС: архитектурное признание\u003c/h2\u003e\n\u003cp\u003eЗдание парламента Европейской комиссии в Страсбурге, Франция, разработано, чтобы напоминать незавершённую башню. Её архитекторы явно заявили, что дизайн был вдохновлен картиной Питера Бройгеля Старшего 1563 года \"Вавилонская башня.\" Здание преднамеренно разработано, чтобы выглядеть как вавилонская башня — незавершённая, всё ещё под строительством, ожидающая завершения.\u003c/p\u003e\n\u003cp\u003eРекламный постер ЕП от 1992 года изображал вавилонскую башню со слоганом \"Европа: многие языки, один голос.\" Плакат изображал звёзды, расставленные в перевёрнутой пентаграмме паттерн выше башни.\u003c/p\u003e\n\u003cp\u003eЭто не тонкий символизм. Это архитектурное и рекламное признание. Европейский Союз — наиболее продвинутый проект наднационального управления на земле — моделирует его парламент после вавилонской башни и рекламирует себя как обращение смешивания языков. Строители рассказывают вам, что они строят. Они используют библейский шаблон открыто. И они делают это с гордостью, не стыдом.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"отмена-языков-цифровой-переводный-и-ии\"\u003eОтмена языков: цифровой переводный и ИИ\u003c/h2\u003e\n\u003cp\u003eБожественный суд на Вавилоне был смешивание языков — разбиение лингвистического единства, которое сделало централизованное управление невозможным. Человечество было рассеяно неспособностью коммуницировать через языковые барьеры.\u003c/p\u003e\n\u003cp\u003eИИ обратный этот суд.\u003c/p\u003e\n\u003cp\u003eGoogle Translate обрабатывает более 100 миллиардов слов в день через 133 языков. DeepL, Meta и другие компании ИИ разрабатывают системы реального времени перевода, которые позволяют бесшумную коммуникацию через языковые барьеры. Наушники с питанием ИИ могут перевести разговор в реальном времени. Видео дубляж генерирования ИИ заменяет оригинальный звук переводом версий, которые соответствуют движениям губ.\u003c/p\u003e\n\u003cp\u003eСмешивание вавилонской башни было обращено технологией. Лингвистические барьеры, которые Бог наложил, чтобы предотвратить унифицированное восстание, демонтируются алгоритмами. Мир возвращается в государство функционального лингвистического единства — не через общий язык, а через машинный перевод, который делает языковые барьеры неважными.\u003c/p\u003e\n\u003cp\u003eКогда каждый человек на земле может коммуницировать с каждым другим человеком в реальном времени независимо от языка, состояние, которое существовало перед Вавилоном — \"вся земля была одного языка и одной речи\" (Бытие 11:1) — функционально восстановлено. И амбиции, которые это единство позволило — централизованное управление, коллективное восстание, проект башни — становятся возможными снова.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"интернет-цифровая-башня\"\u003eИнтернет: цифровая башня\u003c/h2\u003e\n\u003cp\u003eИнтернет — это новая башня. Это соединяет каждый узел на земле в единую сеть. Это позволяет коммуникацию, торговлю, управление, развлечение, образование и войну через земной шар без физического движения. Это инфраструктура, которая делает глобальное единство оперативно возможным.\u003c/p\u003e\n\u003cp\u003eМировая широкая паутина была создана в CERN — европейской организации для ядерного исследования, дома большого адрона коллайдера. ЛОГОТИП CERN содержит переплетённый дизайн, который некоторые исследователи отметили, напоминает число 666. Статуя Шивы, индийского бога разрушения, стоит вне штаб-квартиры CERN — дар от индийского правительства. Собственные рекламные видео CERN изображали мок оккультные ритуалы, выполняемые перед статуей Шивы.\u003c/p\u003e\n\u003cp\u003eВоплощаются ли эти символы преднамеренными сигналами или совпадающей эстетикой, функциональная реальность ясна: интернет соединяет человечество в унифицированный цифровой организм, который превосходит географические, лингвистические и политические границы. Башня, которая была построена с кирпичами в Бытии, строится с волокнистыми оптическими кабелями, спутниковыми ссылками и серверными фермами в 21-м веке.\u003c/p\u003e\n\u003cp\u003eИнтернет — это не просто инструмент коммуникации. Это основание новейшего Вавилона — инфраструктура, которая делает один-мировое управление, один-мировую торговлю, один-мировое наблюдение и один-мировой контроль мысли оперативно достижимым.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дух-нимрода\"\u003eДух Нимрода\u003c/h2\u003e\n\u003cp\u003eДух позади Вавилона не умер с башней заброшения. Он персистировал через каждую империю, которая попыталась установить универсальное господство:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВавилон\u003c/strong\u003e — золотое изображение Навуходоносора потребовало универсального поклонения (Даниил 3)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПерсия\u003c/strong\u003e — указ Дария объявил его авторитет над всеми народами (Даниил 6)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГреция\u003c/strong\u003e — Александр стремился эллинизировать мир под единственной культурой\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРим\u003c/strong\u003e — Цезарь потребовал поклонения как бог через всю империю\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eкатолическая церковь\u003c/strong\u003e — заявили универсальный духовный авторитет над всем Христианством\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБританская Империя\u003c/strong\u003e — \"солнце никогда не устанавливает\" на доминиона империи\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоединённые Штаты\u003c/strong\u003e — Pax Americana как гарант мирового порядка\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eновый мировой порядок\u003c/strong\u003e — явная цель унифицированной системы глобального управления\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждая попытка была частичной. Каждый не прошёл или терпит неудачу. Но амбиция персист потому, что дух позади неё не человеческий. Это дух противника — тот, который сказал \"я буду как Вышний\" (Исайя 14:14). Нимрод был первым сосудом после наводнения для этого духа. Он не будет последним. Антихрист завершит то, что Нимрод начал — и он будет использовать цифровые инструменты, что Нимрод не мог даже воображать.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"бог-будет-вмешиваться-снова\"\u003eБог будет вмешиваться снова\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И сказал Господь: вот, один народ, и у всех один язык; и вот, что начали они делать, и не отстанут они от того, что задумали делать.\" — Бытие 11:6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБожественное утверждение о Вавилоне необычайно: \"ничего не будет невозможно для них.\" Когда человечество объединяется в восстании, потенциал для коррупции безграничен. Первоначальный Вавилон был прерван потому, что неограниченное человеческое единство в стороне от Бога ведёт к неограниченному человеческому злу.\u003c/p\u003e\n\u003cp\u003eНовый Вавилон приближается к тому же пороговому. ИИ устраняет языковой барьер. Интернет предоставляет инфраструктуру коммуникации. Цифровое управление предоставляет политическую основу. Трансгуманизм предоставляет проект возвышения. Условия, которые подсказал Божественное вмешательство в Бытии 11, воссоздаются с экспоненциально большей способностью.\u003c/p\u003e\n\u003cp\u003eБог вмешался в Вавилоне путём смешивания языков и рассеивания народов. Он вмешается снова — не с смешиванием, а с судом. Семь печатей, семь труб и семь чаш, описанные в Откровении, — это суд на последней башне. Камень, вырубленный без рук, который поражает статую в Даниил 2, является божественным ответом на последнюю попытку человечества достичь неба на собственных условиях. Как исследовано в \u003ca href=\"/nephilim-return-giants-genesis/?lang=ru\"\u003eНефилим возвращаются: гиганты Бытия и современной эпохи\u003c/a\u003e, коррупция до потопа мира воссоздается — и суд до потопа мира будет воссоздан также.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/495-Tower_Of_Babel_2.mp4\"\u003eTower Of Babel 2\u003c/a\u003e — Восстановление врата на небеса\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/339-The_New_Man.mp4\"\u003eThe New Man\u003c/a\u003e — трансгуманистическая вавилонская башня\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eThe Great Reset: The Fourth Industrial Revolution\u003c/a\u003e — современный чертёж для централизованного управления Вавилона\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/ye-shall-be-as-gods-transhumanism/?lang=ru\"\u003eYe Shall Be as Gods: The Ancient Lie Behind Transhumanism\u003c/a\u003e — проект возвышения башни в современной форме\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/nephilim-return-giants-genesis/?lang=ru\"\u003eThe Nephilim Return: Giants of Genesis and the Modern Era\u003c/a\u003e — до-потопная коррупция, воссоздаваемая в современной эпохе\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОни восстанавливают башню снова. Кирпичи цифровые. Раствор данные. Город глобальный. Язык код. И амбиция — та же, что была на равнине Шинар шесть тысяч лет назад: достичь неба без Бога, построить имя без Создателя, объединить человечество под человеческим авторитетом, скорее, чем божественного суверенитета. Европейский парламент выглядит как вавилонская башня, потому что это вавилонская башня — тот же проект, тот же дух, то же восстание, переупаковано для цифровой эпохи. ИИ обращает смешивание языков. Интернет соединяет рассеяны народы. Трансгуманизм строит лестницу на небеса. И Бог, который пришёл вниз, чтобы видеть первую башню, смотрит на вторую. Он рассеял их однажды с смешиванием. Он будет судить их снова с огнём. Башня восстанавливается. Но камень идёт. И каждая башня, которую человечество когда-либо построило — Вавилон, Вавилон, Рим, Брюсселя, Силиконовая долина — будет обломки, когда камень поражает землю и царство Бога наполняет весь мир. Они никогда не учатся. Башня всегда падает.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Вавилонская башня 2.0: Восстановление врата на небеса\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Бытие 11 записывает первое попытку человечества в унифицированный мировой порядок — Вавилонскую башню. Совреме
