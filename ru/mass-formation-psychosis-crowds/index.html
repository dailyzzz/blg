4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВавилонская башня — это первый зарегистрированный случай массового формирования в истории человечества. Население, объединенное одним языком — одним нарративом, одной информационной средой — направило свою коллективную энергию на проект, который его лидеры объявили необходимым. Не зафиксировано никакого несогласия. Не отмечено никаких вопросов. Все население двигалось как единое целое, строя сооружение, которое Сам Бог определил как опасное — не потому, что башня могла достичь небес, а потому, что объединенное население под единым нарративом было способно на все, что направляли его лидеры, включая восстание против Самого Творца.\u003c/p\u003e\n\u003cp\u003eМассовое формирование — это не глупость. Строители Вавилона были квалифицированными инженерами. Массовое формирование — это не невежество. Население Вавилона понимало строительство, организацию и коллективные усилия. Массовое формирование — это отказ от индивидуального суждения в пользу коллективной идентичности — замена «я думаю» на «мы верим», подчинение личного восприятия групповому нарративу и готовность продолжать коллективный проект независимо от его последствий, потому что альтернатива — стоять в одиночестве вне группы — психологически невыносима.\u003c/p\u003e\n\u003cp\u003eКак показывает трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eПадшие ангелы\u003c/a\u003e, даже небесные существа пали через силу коллективного восстания — массовый уход от истины, который увлек треть небесного воинства в согласие с ложью. Если ангелы могут пасть через коллективное заблуждение, восприимчивость человека к тому же феномену не должна удивлять.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"маттиас-десмет-и-теория-массового-формирования\"\u003eМаттиас Десмет и теория массового формирования\u003c/h2\u003e\n\u003cp\u003eБельгийский клинический психолог Маттиас Десмет, профессор Гентского университета, привлек глобальное внимание к концепции массового формирования через свою книгу 2022 года «Психология тоталитаризма». Теория Десмета, основанная на работах Гюстава Ле Бона («Толпа», 1895), Ханны Арендт («Истоки тоталитаризма», 1951) и Йоста Меерлоо («Изнасилование разума», 1956), описывает психологический процесс, посредством которого большие популяции входят в состояние коллективного гипноза, делающего тоталитарное управление не просто возможным, но психологически необходимым для тех, кто находится внутри формирования.\u003c/p\u003e\n\u003cp\u003eДесмет выделяет четыре предварительных условия, которые должны существовать в популяции до того, как может произойти массовое формирование:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. Широкая социальная изоляция и отсутствие социальных связей.\u003c/strong\u003e До COVID-19 опросы показывали эпидемические уровни одиночества в западных обществах. В Соединенных Штатах процент взрослых, сообщающих об отсутствии близких друзей, утроился с 1990 по 2021 год (с 3% до 12%). Генеральный хирург объявил одиночество проблемой общественного здравоохранения в 2023 году. Изолированные люди психологически уязвимы — им не хватает социальной привязки, которая обеспечивает независимое суждение, и общественных связей, которые предоставляют альтернативные нарративы официальным сообщениям.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. Ощущение, что жизнь лишена смысла или цели.\u003c/strong\u003e Опросы Gallup постоянно показывают, что большинство работников во всем мире описывают себя как «не вовлеченных» или «активно не вовлеченных» в работу. Рост того, что антрополог Дэвид Гребер назвал «бессмысленной работой» — занятости, которую сами работники воспринимают как бессмысленную — создает популяцию, которая экономически активна, но экзистенциально пуста. Жизнь без цели создает вакуум, который заполняет массовое формирование.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. Высокие уровни свободно плавающей тревоги — тревоги, не связанной с конкретной, идентифицируемой причиной.\u003c/strong\u003e Тревожные расстройства являются наиболее распространенным состоянием психического здоровья в западном мире, затрагивая примерно 40 миллионов взрослых только в Соединенных Штатах. Когда тревога лишена конкретного объекта — когда люди чувствуют страх, но не могут определить, чего они боятся — они становятся психологически отчаянно нуждающимися в объяснении, цели и решении. Массовое формирование предоставляет все три.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e4. Высокие уровни свободно плавающей фрустрации и агрессии.\u003c/strong\u003e Популяция, которая изолирована, лишена цели и тревожна, накапливает огромную психологическую энергию без конструктивного выхода. Эта энергия становится доступной для направления массовым формированием — направляется на любую цель, которую нарратив формирования идентифицирует как причину страданий популяции.\u003c/p\u003e\n\u003cp\u003eКогда эти четыре условия присутствуют, популяция готова к массовому формированию. Все, что требуется, — это нарратив, который дает объяснение тревоги (угрозу), цель для агрессии (врага) и стратегию коллективного действия (ответ). Нарратив не должен быть истинным. Он должен быть общим.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"covid-19-идеальное-событие-массового-формирования\"\u003eCOVID-19: Идеальное событие массового формирования\u003c/h2\u003e\n\u003cp\u003eПандемия COVID-19 предоставила условия и нарратив для события массового формирования беспрецедентного масштаба. Рассмотрите соответствие:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарратив:\u003c/strong\u003e Смертельный вирус угрожает всему человечеству. Все находятся в опасности. Угроза невидима, вездесуща и потенциально смертельна. Этот нарратив предоставил конкретный объект для свободно плавающей тревоги — тревога, которая раньше не имела цели, теперь была направлена на вирус. Облегчение от наконец-то наличия чего-то конкретного для страха вызвало парадоксальную благодарность самому нарративу. Люди, которые были тревожны, не зная почему, теперь были тревожны с причиной — и объяснение казалось лучше, чем тайна, независимо от того, была ли угроза пропорциональна ответу.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВраг:\u003c/strong\u003e Любой, кто не соблюдал предписанный ответ — маски, карантины, социальное дистанцирование, вакцинация — становился врагом. «Противник масок», «антиваксер», «отрицатель COVID» заменили расплывчатую фрустрацию конкретной целью. Агрессия, которая плавала без направления, теперь была нацелена на идентифицируемых людей. Это объясняет экстраординарную враждебность, направленную на несоответствующих людей — враждебность, которая была психологически непропорциональна реальной угрозе, исходящей от человека, выбравшего не носить маску или не получать вакцину. Агрессия была не о маске или вакцине. Она была о высвобождении накопленной фрустрации через социально санкционированную цель.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКоллективный ответ:\u003c/strong\u003e Предписанные поведения — ношение масок, дистанцирование, соблюдение карантина, вакцинация — предоставили коллективное действие, которое требует массовое формирование. Соответствие стало идентичностью. Ношение маски было не решением о здоровье. Это была декларация групповой принадлежности. Получение вакцины было не медицинским выбором. Это был акт солидарности. Демонстрация карты вакцинации была не медицинским свидетельством. Это был значок принадлежности.\u003c/p\u003e\n\u003cp\u003eМассовое формирование было настолько эффективным, что люди внутри него проявляли классические характеристики, описанные Десметом:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГотовность жертвовать личным благополучием ради коллектива.\u003c/strong\u003e Миллионы людей приняли закрытие бизнеса, потерю работы, социальную изоляцию, отсрочку медицинской помощи, нарушение образования для своих детей и психологическое ухудшение — жертвы, которые в нормальных условиях они никогда бы не приняли. Жертва была не нежеланной. Для тех, кто находится внутри формирования, она казалась значимой — возможно, первым действительно значимым опытом в их жизни.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНетерпимость к несогласию.\u003c/strong\u003e Те, кто находится внутри формирования, не просто не соглашались с диссидентами. Они желали им вреда. Опросы в 2021 году показали значительные проценты вакцинированной популяции, поддерживающей карательные меры против невакцинированных — включая потерю работы, отказ в медицинской помощи, штрафы, тюремное заключение и даже физическую изоляцию в специальных учреждениях. Это не рациональная политика общественного здравоохранения. Это психология толпы формирования, направленная на определенного врага.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСуженное поле внимания.\u003c/strong\u003e Массовое формирование производит психологическое состояние, аналогичное гипнозу, при котором внимание сосредоточено исключительно на объекте формирования (вирусе, ответе, враге), в то время как все за пределами этого фокуса становится невидимым. Это объясняет, почему популяции под массовым формированием не могли воспринимать информацию, противоречащую нарративу — показатели выживаемости, варианты лечения, неблагоприятные события вакцины, статистический контекст — даже когда эта информация представлялась ясно и фактически. Информация не подавлялась (хотя она также подавлялась). Она была психологически невидимой для тех, кто находится внутри формирования.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"исторический-образец-массовое-формирование-через-века\"\u003eИсторический образец: Массовое формирование через века\u003c/h2\u003e\n\u003cp\u003eCOVID-19 не был первым событием массового формирования. Феномен повторялся на протяжении истории, всегда с той же структурой:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФранцузская революция.\u003c/strong\u003e Популяция, изолированная классом, лишенная цели в экономике, которая их исключала, тревожная о нехватке продовольствия и политических репрессиях, и фрустрированная веками аристократических привилегий. Нарратив: свобода, равенство, братство. Враг: аристократия, монархия, Церковь. Коллективное действие: революция, затем террор. Массовое формирование, которое началось с призывов к справедливости, закончилось гильотиной — логическим финалом коллективной агрессии, развязанной без ограничений.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСоветский коммунизм.\u003c/strong\u003e Популяция, опустошенная Первой мировой войной, изолированная бедностью, лишенная цели в феодальной экономике, тревожная о выживании и яростная на режим царя. Нарратив: солидарность рабочих и отмена класса. Враг: буржуазия, кулаки, контрреволюционеры. Коллективное действие: революция, затем чистка. Массовое формирование, которое началось с прав рабочих, закончилось Гулагом — 18 миллионов людей заключены в тюрьму, миллионы убиты во имя коллектива.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНацистская Германия.\u003c/strong\u003e Популяция, униженная Версалем, изолированная экономической депрессией, лишенная цели в разрушенной экономике, тревожная о национальном выживании и в ярости от воспринимаемой несправедливости. Нарратив: арийское превосходство и национальное обновление. Враг: евреи, коммунисты, инвалиды, «генетически непригодные». Коллективное действие: национальная мобилизация, затем геноцид. Массовое формирование, которое началось с патриотических митингов, закончилось Освенцимом — промышленной машиной массового убийства, управляемой популяцией, которая отказалась от индивидуальной совести в пользу коллективной идентичности.\u003c/p\u003e\n\u003cp\u003eВ каждом случае массовое формирование не было провалом интеллекта. Германия была самой образованной нацией в Европе. Советский Союз производил ученых и художников мирового класса. Французские философы были среди самых изощренных мыслителей своей эры. Массовое формирование не нацелено на глупых. Оно нацелено на изолированных, лишенных цели, тревожных и фрустрированных — и интеллект не обеспечивает иммунитета.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пропаганда-инженерия-массового-формирования\"\u003eПропаганда: Инженерия массового формирования\u003c/h2\u003e\n\u003cp\u003eМассовое формирование не возникает спонтанно. Оно создается через пропаганду — систематическую манипуляцию информацией для производства желаемых психологических состояний в целевых популяциях. Техники современной пропаганды были разработаны в начале двадцатого века Эдвардом Бернейсом (племянником Зигмунда Фрейда), который написал в своей книге 1928 года «Пропаганда»:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Сознательная и интеллигентная манипуляция организованными привычками и мнениями масс является важным элементом демократического общества. Те, кто манипулирует этим невидимым механизмом общества, составляют невидимое правительство, которое является истинной правящей властью нашей страны.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБернейс не разоблачал пропаганду. Он праздновал ее. Он верил, что «интеллигентная манипуляция» общественным мнением была необходима, потому что массы были неспособны к рациональному самоуправлению. Его техники — эмоциональная манипуляция, повторение, обращение к авторитету, создание ложного консенсуса, подавление несогласия — стали основой современной рекламы, связей с общественностью и правительственной коммуникации.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"/?lang=ru\"\u003eЦензурный индустриальный комплекс\u003c/a\u003e является механизмом подавления массового формирования. Удаляя несогласные голоса из информационной среды, цензура гарантирует, что нарратив формирования является единственным доступным нарративом. Участник формирования слышит одно и то же сообщение из каждого источника — СМИ, правительства, работодателей, друзей, семьи — и воспринимает это единогласие как доказательство истины, а не свидетельство контроля.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"/?lang=ru\"\u003eОбразовательная система\u003c/a\u003e является механизмом подготовки. Обучая детей подчиняться авторитету, соответствовать групповому консенсусу и подавлять индивидуальное суждение, образовательная система производит взрослых, которые предварительно подготовлены к массовому формированию. Формирование не нужно преодолевать критическое мышление. Образовательная система уже устранила его.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"/?lang=ru\"\u003eОперации когнитивной войны\u003c/a\u003e, разработанные военными и разведывательными агентствами, представляют вооружение техник массового формирования. Структура когнитивной войны НАТО явно идентифицирует человеческий разум как область военных операций — поле битвы, которое нужно завоевать через манипуляцию информацией, эмоциональную инженерию и контроль нарратива. Целями являются не вражеские солдаты. Это гражданские популяции — включая домашние популяции.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"освобождение-психология-сопротивления\"\u003eОсвобождение: Психология сопротивления\u003c/h2\u003e\n\u003cp\u003eДесмет наблюдает, что массовое формирование никогда не захватывает всю популяцию. Обычно примерно 30% популяции глубоко захвачены формированием, 40% идут пассивно (ни веря глубоко, ни активно не сопротивляясь), и 30% не захвачены и сопротивляются нарративу формирования.\u003c/p\u003e\n\u003cp\u003e30%, которые сопротивляются, не характеризуются превосходным интеллектом. Они характеризуются сильными социальными связями (они не изолированы), чувством смысла и цели (они не экзистенциально пусты), способностью переносить тревогу без требования внешних объяснений (они не отчаянно нуждаются в нарративе) и готовностью нести социальную стоимость несогласия (им не требуется групповое одобрение для психологической стабильности).\u003c/p\u003e\n\u003cp\u003eДесмет утверждает, что самым важным действием, которое может предпринять незахваченное меньшинство, является продолжать говорить. Массовое формирование углубляется, когда несогласные голоса молчат — когда нарратив формирования является единственным нарративом, присутствующим в информационной среде. Пока существуют альтернативные голоса, формирование не может достичь своей самой опасной крайности — точки, в которой захваченная популяция совершит любое зверство в служении коллективу без переживания вины или колебания.\u003c/p\u003e\n\u003cp\u003eВот почему цензура является самым опасным инструментом массового формирования. Не потому, что она предотвращает достижение информации людьми — захваченные не услышат ее в любом случае — но потому, что она ускоряет формирование к его тоталитарной конечной точке. Присутствие несогласных голосов замедляет формирование. Отсутствие несогласных голосов убирает последний психологический тормоз коллективного безумия.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"духовное-измерение-духовные-силы-за-толпой\"\u003eДуховное измерение: Духовные силы за толпой\u003c/h2\u003e\n\u003cp\u003eФеномен массового формирования имеет духовное измерение, которое светская психология не может полностью объяснить. Сам Десмет признает, что состояние массового формирования напоминает гипноз — состояние, при котором сознательный разум обходится, и индивид становится восприимчивым к внушению способами, которые превосходят нормальные психологические процессы.\u003c/p\u003e\n\u003cp\u003eПисание идентифицирует этот феномен как духовный по природе. Предупреждение Павла о «духе мира» (1 Коринфянам 2:12) — в отличие от «духа, который от Бога» — описывает духовное влияние, которое действует через коллективную психологию, производя соответствие мирским образцам, а не преобразование через божественную истину. «Князь власти воздушной, дух, который ныне действует в сынах противления» (Ефесянам 2:2) действует не только через индивидуальное искушение, но через коллективное влияние — духовную атмосферу, которая пронизывает культуру и формирует восприятие без осознания или согласия индивида.\u003c/p\u003e\n\u003cp\u003eМассовое формирование является психологическим механизмом, через который духовные силы действуют на уровне популяции. Толпа на суде Иисуса — та же толпа, которая приветствовала Его пальмовыми ветвями днями ранее — кричала «Распни Его!» не потому, что они рационально оценили доказательства, но потому, что они были под влиянием формирования, созданного религиозными властями и усиленного духовными силами за ними.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-узкий-путь-и-широкая-дорога\"\u003eБиблейское размышление: Узкий путь и широкая дорога\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Входите тесными вратами, потому что широки врата и пространен путь, ведущие в погибель, и многие идут ими; потому что тесны врата и узок путь, ведущие в жизнь, и немногие находят их.\" — Матфея 7:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eМассовое формирование — это широкая дорога. Она широка, потому что вмещает толпу. Она легка, потому что не требует независимой мысли. Она популярна, потому что предлагает принадлежность, цель и уверенность — все, что жаждет изолированная, лишенная цели, тревожная душа. И она ведет к разрушению — потому что толпа никогда, во всей истории человечества, не нашла путь к истине. Толпа выбрала Варавву. Толпа построила золотого тельца. Толпа требовала царя. Толпа кричала «Распни Его».\u003c/p\u003e\n\u003cp\u003eУзкий путь — это путь тех, кто сопротивляется массовому формированию — не через превосходный интеллект, но через духовное заземление. Человек, который укоренен в Слове Божьем, связан с народом Божьим, живет для целей Божьих и поддерживается Духом Божьим, не может быть увлечен формированием, потому что он уже имеет то, что предлагает формирование: идентичность, принадлежность, цель и объяснение страданий мира. Им не нужен нарратив формирования, потому что у них есть истина. Им не нужно сообщество формирования, потому что у них есть церковь. Им не нужна цель формирования, потому что у них есть Великое Поручение.\u003c/p\u003e\n\u003cp\u003eПротивоядие от массового формирования — это не информация. Это духовное формирование — заземление души в истине, которая превосходит нарративы, в идентичности, которая превосходит групповую принадлежность, в цели, которая превосходит коллективные проекты, и в мире, который превосходит понимание.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство предсмертного опыта Говарда Питтмана — Предупреждение конца времен, которое Бог дал ему\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: раскрыты прискорбные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицина и фармакея — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто находится в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/53-Cognitive_Warfare.mp4\"\u003eКогнитивная война\u003c/a\u003e — Битва за коллективное сознание\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eМК-Ультра никогда не заканчивалась\u003c/a\u003e — Техники массового контроля сознания\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/115-Psychology_Industry_Hoax.mp4\"\u003eОбман индустрии психологии\u003c/a\u003e — Производство соответствия\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-далее\"\u003eИсследуйте далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eОбразовательная система: индоктринация под видом обучения\u003c/a\u003e — Как образовательная система производит популяции, предварительно подготовленные к массовому формированию\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eЦензурный индустриальный комплекс: как умерла свобода слова\u003c/a\u003e — Как подавление несогласных голосов ускоряет массовое формирование к его тоталитарной конечной точке\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eКогнитивная война: поле битвы внутри вашего разума\u003c/a\u003e — Военное вооружение техник массового формирования против гражданских популяций\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eТолпа у Вавилона строила башню. Толпа у Синая построила золотого тельца. Толпа в Иерусалиме кричала «Распни Его». Толпа никогда не находила истину, потому что истина не находится на широкой дороге, где ходит толпа. Она находится на узком пути, где стоит индивид — один, если необходимо, подотчетный Богу, а не группе, укорененный в Слове, а не в нарративе, идущий верой, а не видением того, что делают все остальные. Массовое формирование — враг души, потому что оно заменяет голос Бога голосом толпы. Но голос Доброго Пастыря известен Его овцам, и Его овцы следуют за Ним — не за толпой, не за формированием, не за нарративом, но за Ним. «Овцы Мои слушаются голоса Моего, и Я знаю их; и они идут за Мною. И Я даю им жизнь вечную, и не погибнут вовек; и никто не похитит их из руки Моей» (Иоанна 10:27-28). Толпа громкая. Пастырь верен. Следуйте за Пастырем.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\
