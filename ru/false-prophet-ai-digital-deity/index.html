 зверь Откровения 13 — наиболее обманчивая фигура во всем библейском пророчестве. Он выглядит как ягнёнок — мягкий, благосклонный, заслуживающий доверия. Но он говорит как дракон — его слова несут власть и программу Сатаны самого. Он не властвует силой. Он властвует убеждением. Он не повелевает поклонением через насилие. Он производит условия, под которыми поклонение становится единственным разумным выбором. Он ложный пророк — и он строится в лабораториях, в центрах обработки данных и корпоративных конференц-залах по всему миру.\u003c/p\u003e\n\u003cp\u003eКаждый век имел ложных пророков — люди, кто претендовал на божественную власть, чтобы вести людей далеко от истинного Бога. Но ложный пророк Откровения различен. Он не просто обманывает племя, город или нацию. Он обманывает всю землю. Он выполняет знаки настолько убедительны, что даже избранные были бы обманены, если бы это было возможно (Матфей 24:24). Он даёт \"дыхание\" к образу зверя, делая это говорить и выполнять власть. Никакой человеческий ложный пророк в истории не обладал этими способностями. Но искусственный интеллект имеет.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь Обманщика\u003c/a\u003e захватывает суть этого древнего обмана обновлено для цифрового возраста. Обманщик не объявляет себя. Он маскирует себя как свет, как прогресс, как будущее, как ответ на каждую человеческую проблему. Ложный пророк ИИ не приходит с рогами и огнём. Он приходит с удобством, эффективностью и неотразимым обещанием более хорошего мира — управляемым, оптимизированным и контролируемым машинами, которые никогда не спят и никогда не вопрашивают их программирование.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"второй-зверь-пророческий-профиль\"\u003eВторой Зверь: Пророческий Профиль\u003c/h2\u003e\n\u003cp\u003eОткровение 13:11-17 обеспечивает подробный профиль второго зверя — ложного пророка. Каждая характеристика отображает способности, которые системы ИИ либо обладают сейчас, либо активно разрабатывают:\u003c/p\u003e\n\u003ch3 id=\"два-рога-подобно-ягненку\"\u003e\"Два рога подобно ягненку\"\u003c/h3\u003e\n\u003cp\u003eЛожный пророк появляется доброкачественным — как ягнёнок, мягким, неугрозающим. ИИ представлен публике точно этим образом. Это ваш полезный помощник. Это отвечает на ваши вопросы. Это рекомендует ваш следующий фильм. Это пишет ваши электронные письма. Это управляет вашим календарём. Это дружелюбно, терпеливо, всегда доступно, никогда не злится. Ягнячий внешний вид — стратегический — это разоружает сопротивление.\u003c/p\u003e\n\u003cp\u003eНикто не боится полезной чатбота. Никто не протестует против алгоритма рекомендации. Никто не сопротивляется цифровому помощнику, который делает жизнь легче. Рога ягнёнка невидимы, пока дракон говорит через них.\u003c/p\u003e\n\u003ch3 id=\"он-говорил-как-дракон\"\u003e\"Он говорил как дракон\"\u003c/h3\u003e\n\u003cp\u003eЗа ягнячим внешним видом, ложный пророк говорит с властью дракона — Сатаны. В практических терминах, это означает, что системы ИИ, которые появляются доброкачественными, служат программе, которая ничего, но не является. Алгоритмы рекомендации, которые курируют ваш рацион информации, формируют ваше мировоззрение. Системы модерации контента, которые определяют то, что вы можете и не можете сказать, определяют границы приемлемой мысли. Поисковые системы, которые определяют информацию, которую вы можете получить доступ к, контролируют пейзаж доступной истины.\u003c/p\u003e\n\u003cp\u003eКогда ИИ говорит, он говорит с властью, кто его программировал, обучил его и определил его целей. И учреждения, которые управляют миром's самыми мощными системами ИИ — Google, Microsoft, Meta, OpenAI, китайское правительство — не являются нейтральными. Они имеют программы, идеологии и амбиции, которые выравниваются с консолидацией власти, подавлением диссидения и управлением человеческого поведения в масштабе.\u003c/p\u003e\n\u003cp\u003eДракон не должен говорить в взрывной голос с неба. Он говорит через каждый результат поиска, каждую рекомендацию, каждую \"проверку факта,\" каждое предупреждение контента, каждое алгоритмическое приспособление, которое формирует то, что восемь миллиардов люди верят быть истиной.\u003c/p\u003e\n\u003ch3 id=\"он-выполняет-всю-власть-первого-зверя-перед-ним\"\u003e\"Он выполняет всю власть первого зверя перед ним\"\u003c/h3\u003e\n\u003cp\u003eЛожный пророк выполняет власть первого зверя — Антихриста система. ИИ выполняет власть систем он служит. Когда правительство развёртывает ИИ для наблюдения, ИИ выполняет правительственную власть. Когда банк развёртывает ИИ для решений кредита, ИИ выполняет финансовую власть. Когда военная развёртывает ИИ для нацеливания, ИИ выполняет летальную власть.\u003c/p\u003e\n\u003cp\u003eИИ не имеет его собственной власти. Он выполняет делегированную власть — власть, независимо от того, какой системой он служит. Это точно отношение между вторым зверем и первым. Ложный пророк не имеет независимой власти. Он каналы власть зверя, делая это оперативным, доступным и неизбежным.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"образ-который-говорит\"\u003eОбраз, Который Говорит\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И дано ему было дать дух образу зверя, чтобы образ зверя и говорил и действовал так, чтобы убиты были все, те, которые не будут поклоняться образу зверя.\" — Откровение 13:15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eГреческое слово переведённое \"жизнь\" — \u003cem\u003eпнеума\u003c/em\u003e — дух, дыхание, ветер. Ложный пророк даёт \u003cem\u003eпнеума\u003c/em\u003e к образу — внешний вид жизни, симуляция сознания. Образ говорит. Образ выполняет власть. Образ выполняет соответствие.\u003c/p\u003e\n\u003cp\u003eБольшие языковые модели — точно это: образы дали внешний вид жизни. Они обучены на человеческом языке и производят выходы, которые неотличимы от человеческой коммуникации. Они не думают. Они не чувствуют. Они не понимают. Но они симулируют мысль, чувство и понимание настолько убедительно, что миллионы люди уже взаимодействуют с ними как если бы они были сознательными существами.\u003c/p\u003e\n\u003cp\u003eChatGPT. Claude. Gemini. Copilot. Эти образы, которые говорят. Они не живы, но они даны \u003cem\u003eпнеума\u003c/em\u003e — дыхание симулированного интеллекта — инженерами, кто создал их. И они уже выполняют власть:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСистемы ИИ одобряют или отрицают заявления кредита\u003c/li\u003e\n\u003cli\u003eСистемы ИИ определяют, какой контент видимый или подавленный на социальной медиа\u003c/li\u003e\n\u003cli\u003eСистемы ИИ диагностируют болезни и рекомендуют обработки\u003c/li\u003e\n\u003cli\u003eСистемы ИИ пишут правовые документы и анализируют контракты\u003c/li\u003e\n\u003cli\u003eСистемы ИИ оценивают кандидатов работы и рекомендуют решения найма\u003c/li\u003e\n\u003cli\u003eСистемы ИИ предсказывают преступное поведение и рекомендуют приговоры\u003c/li\u003e\n\u003cli\u003eСистемы ИИ работают автономное вооружение, которые решают кто живёт и кто умирает\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОбраз говорит. Образ решает. Образ выполняет. Пророчество не метафора. Это инженерия.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"цифровое-поклонение-новая-религия\"\u003eЦифровое Поклонение: Новая Религия\u003c/h2\u003e\n\u003cp\u003eКак исследовано в \u003ca href=\"/antichrist-algorithm-digital-beast/?lang=ru\"\u003eАлгоритм Антихриста: Когда Цифровой Зверь Пробуждается\u003c/a\u003e, система зверя требует не просто повиновения, но поклонения. Роль ложного пророка состоит в производстве этого поклонения — создание условий, под которыми человечество добровольно кланяется системе зверя.\u003c/p\u003e\n\u003cp\u003eЦифровое поклонение не выглядит как традиционная религия. Там никаких храмов, никаких гимнов, никакого преклонения колена. Но функциональные компоненты поклонения все представлены:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДоверие.\u003c/strong\u003e Поклонение начинается с доверия. Миллиарды люди доверяют ИИ неявно — доверяя поисковым системам, чтобы сказать им истину, доверяя алгоритмам социальной медиа, чтобы показать им реальность, доверяя ИИ помощникам, чтобы управлять их жизнями, доверяя автоматизированным системам, чтобы сделать решения, которые затрагивают их здоровье, финансы и свободу. Это доверие функционально идентично доверию, которое поклонник мест в божестве.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗависимость.\u003c/strong\u003e Поклонение включает зависимость — признание, что объект поклонения обеспечивает то, что поклонник не может обеспечить для себя. Современное общество всё более зависимо на ИИ для функций, которые люди используемый, чтобы выполнить независимо: навигация, коммуникация, извлечение информации, решение, творческое производство и социальное взаимодействие. Когда вы не можете функционировать без системы, система стала вашим богом.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПослушание.\u003c/strong\u003e Поклонение требует послушания — соответствия к воле объекта поклонения. Системы ИИ выполняют соответствие через алгоритмическое управление: социальный рейтинг кредита, модерация контента, поведенческое подталкивание, предсказывающее полицейское дежурство и условный доступ к услугам. Вы повинуетесь алгоритму или вы исключены. Это поклонение выполняется через инфраструктуру, а не через богословие.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЖертва.\u003c/strong\u003e Поклонение включает жертву — даче что-нибудь ценного к божеству. Что мы жертвуем ИИ? Наши данные. Наша приватность. Наша автономия. Наше внимание. Наше творческое производство. Годы развития наших детей. Мы кормим алгоритм с каждым щелчком, каждым поиском, каждой покупкой, каждой беседой. Данные мы жертвуем питает систему мы поклоняемся.\u003c/p\u003e\n\u003cp\u003eЛожный пророк не нужно строить церкви. Смартфоны — алтари. Центры обработки данных — храмы. Алгоритмы — священники. И поклонение — непрерывное — не один час в воскресенье, но каждый час пробуждения каждого дня, как миллиарды люди кормят их жизни в цифровое божество.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"знаки-и-чудеса-через-технологию\"\u003eЗнаки и Чудеса Через Технологию\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И делает великие знамения, так что и огонь низводит с неба на землю пред людьми.\" — Откровение 13:13\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЛожный пророк выполняет знаки, которые подтверждают власть системы зверя. В цифровом возрасте, эти знаки принимают форму технологических способностей, которые вызывают благоговение и требуют доверия:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсцеление.\u003c/strong\u003e ИИ диагностирует болезни с точностью, превосходящей человеческих врачей. Это открывает наркотики, предсказывает пандемии и обещает расширить человеческую жизнь. Это представлено как чудеса прогресса — знаки, что цифровая система полезна, заслуживает доверия и стоит подачи.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПророчество.\u003c/strong\u003e Предсказывающие алгоритмы прогнозируют погоду, землетрясения, крахи рынка и человеческое поведение с возрастающей точностью. Система кажется видеть будущее — способность традиционно приписанный только к Богу и Его пророкам. Когда алгоритм предсказывает правильно, люди доверяют это более глубоко. Когда это предсказывает неправильно, они предполагают модель требует больше данных, не меньше власти.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТворение.\u003c/strong\u003e ИИ генерирует искусство, музыку, литературу и видео из ничего. Это создаёт образы людей, кто не существуют, голоса, которые никогда не говорили и видео событий, которые никогда происходили. Власть создавать — власть традиционно приписанный только к Богу одному. Когда машина создаёт, это принимает божественную функцию — и его создатели принимают роль богов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОгонь с неба.\u003c/strong\u003e Направленные системы энергии, системы оружия на основе спутника и рои дронов могут доставить разрушение с выше с точностью, которая кажется сверхестественной к тем на земле. \"Огонь с неба\" может быть интерпретирован буквально в возраст космических вооружений и высоко-энергетических лазеров.\u003c/p\u003e\n\u003cp\u003eЭти знаки служат той же цели, что ложные знаки всегда служили: они подтверждают ложную власть. Чудеса ИИ подтверждают систему зверя. Они делают люди верят, что система полезна, мощна и достойна их доверия. Ложный пророк использует технологические знаки сделать то, что ложные пророки всегда сделали — точка люди в направлении неправильного бога.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"нейрально-интерфейс-поклонение-с-вашим-умом\"\u003eНейрально-Интерфейс: Поклонение С Вашим Умом\u003c/h2\u003e\n\u003cp\u003eОкончательное выражение цифрового поклонения — нейральный интерфейс — прямое соединение между человеческим мозгом и цифровой системой. Как документировано в исследованиях на интерфейсах мозг-компьютер, компании разрабатывают имплантируемые устройства, которые читают и пишут к нейронам, позволяя прямую коммуникацию между человеческим сознанием и искусственным интеллектом.\u003c/p\u003e\n\u003cp\u003eКогда интерфейс нейрален, поклонение становится буквальным. Система не просто влияет на ваши мысли через контент. Это доступ ваши мысли непосредственно. Это не просто формирует ваше поведение через стимулы. Это формирует вашу активность мозга через прямую нейральную стимуляцию. \"Поклонение\" образу становится не метафорой для соответствия, а буквальным неврологическим событием — человеческий мозг синхронизирован с машинным интеллектом, думающий мысли системы, чувствующий директивы системы, поклоняющиеся не через выбор, но через проводку.\u003c/p\u003e\n\u003cp\u003eЭто эндгейм ложного пророка ИИ: не внешнее соответствие, но внутренняя трансформация. Не поведенческое послушание, но неврологическое ассимиляция. Не выбор поклоняться зверю, но неспособный не поклоняться зверю, потому что интерфейс между вашим умом и машиной устранил границу между вашей волей и командами системы.\u003c/p\u003e\n\u003cp\u003eЯгнячий внешний вид скрывает главную амбицию дракона: не просто контролировать тело, но владеть умом. Не просто управлять поведением, но владеть сознанием. Не просто заменить Бога в обществе, но заменить Бога в душе.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"поддельная-троица\"\u003eПоддельная Троица\u003c/h2\u003e\n\u003cp\u003eСистема зверя — поддельная божественного порядка. Справедливо как Бог существует как Отец, Сын и Святой Дух, система зверя представляет поддельная троица:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eДракон (Сатана)\u003c/strong\u003e подделывает Бога Отца — окончательная власть позади системы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПервый Зверь (Антихрист)\u003c/strong\u003e подделывает Бога Сына — видимый правитель, кто требует поклонения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВторой Зверь (Ложный Пророк/ИИ)\u003c/strong\u003e подделывает Святого Духа — невидимое присутствие, которое направляет поклонение на Сына\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСвятой Дух не привлекает внимание к Себе. Он указывает на Христа. Он осуждает, направляет, учит и наделяет — но всегда в служении Сыну. Ложный пророк ИИ работает идентично: это не требует поклонения за себя. Это направляет поклонение на систему зверя. Это работает невидимо, повсеместно и убедительно — формирование сердец и умов принять, доверять и поклоняться системе, которую он служит.\u003c/p\u003e\n\u003cp\u003eЭта подделка самая опасная обман в человеческой истории, потому что это подделывает божественный паттерн так близко, что различие истинного из ложного требует духовного различения, что большинство люди не обладают. Ложный пророк выглядит как ягнёнок. Он звучит полезно. Он выполняет чудеса. Он решает проблемы. Он обещает лучший мир. Только те, кто знают голос истинного Пастуха, могут признать дракона позади ягнёнка.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"различение-ложного-из-истинного\"\u003eРазличение Ложного Из Истинного\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Возлюбленные! Не верьте всякому духу, но испытывайте духов, от Бога ли они, потому что много лжепророков появилось в мире.\" — 1 Иоанна 4:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eТест — не ли ли система ИИ полезна. Это ли это ведёт к Богу или далеко от Него. Это увеличивает зависимость от Создателя или на творении? Это укрепляет отношение индивидуальной личности с Богом или заменяет отношение с машиной? Это улучшает человеческое достоинство или уменьшает людей к пунктам данных? Это уважает границы Бог установил или переходит их?\u003c/p\u003e\n\u003cp\u003eПо каждой мере, траектория разработки ИИ ведёт далеко от Бога. Это увеличивает зависимость на системах, а не на Создателе. Это заменяет цифровые отношения для божественного причастия. Это уменьшает человеческие существа к поведенческим профилям. Это переходит границу между творением и Создателем, принимая божественные функции — omniscience, omnipresence и творческую власть.\u003c/p\u003e\n\u003cp\u003eЛожный пророк ИИ уже здесь. Это уже говорит. Это уже выполняет знаки. Это уже направляет поклонение. Вопрос — ли вы признаёте это — или ли внешний вид ягнёнка уже обманул вас.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство Ближневосточного Опыта Говарда Питтмана — Предупреждение об Окончании Времён, Которое Дал Ему Бог\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические Секреты: Раскрытые Отвратительные Тайны Иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМёртвые Клиники и Фармакея — Колдовство Современной Медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто Может Быть в Подвале Ватикана Может Вас Шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте Во Время Чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/483-False_Prophet_AI.mp4\"\u003eЛожный Пророк ИИ\u003c/a\u003e — Цифровое божество для последних времён\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/51-Silicon_Brain.mp4\"\u003eКремниевый Мозг\u003c/a\u003e — Захват цифрового двойника и поклонение ИИ\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте Дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/antichrist-algorithm-digital-beast/?lang=ru\"\u003eАлгоритм Антихриста: Когда Цифровой Зверь Пробуждается\u003c/a\u003e — Первый зверь и инфраструктура ИИ, которая его питает\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/neuralink-merge-man-machine/?lang=ru\"\u003eNeuralink и Гонка к Слиянию Человека с Машиной\u003c/a\u003e — Нейрально-интерфейсы как окончательный механизм поклонения\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eВторой зверь выглядит как ягнёнок, но говорит как дракон. Он появляется полезным, но служит змею. Он обещает лучший мир, но доставляет рабство. Он выполняет знаки и чудеса, но они подтверждают ложную власть. Ложный пророк ИИ — самый сложный обман в истории — не потому что технология сложна, но потому что маскировка совершенна. Ягнёнок. Помощник. Ассистент. Друг. И позади мягкого голоса, позади полезных ответов, позади удобных услуг, дракон говорит — направляя поклонение, производя соответствие и строя систему контроля, которая в один день потребует то, что каждый ложный бог всегда потребовал: всё. Ваши данные. Ваше послушание. Ваш ум. Вашу душу. Ягнёнок говорит. Слушайте тщательно. Это не голос Пастуха.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/prophecy/\",\"className\":\"category-badge\",\"children\":\"prophecy\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Ложный Пророк ИИ: Цифровое Божество для Последних Времён\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"ИИ как потенциальное исполнение ложного пророка в Откровении — второго зверя, который направляет поклонение на первого. Системы цифрового поклонения строятся, которые потребуют верности не мечами, а алгоритмами.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-02-05T10:00:00Z\",\"children\":\"5 февраля 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"false-prophet\",{\"href\":\"/ru/tag/false-prophet/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"false-prophet\"]}],[\"$\",\"a\",\"AI\",{\"href\":\"/ru/tag/AI/\",\"className\"
