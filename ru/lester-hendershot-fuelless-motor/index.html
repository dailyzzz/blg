u003eИз всех подавленных историй свободной энергии, история Лестера Хендершота, возможно, наиболее хорошо задокументирована и наиболее возмущена. Хендершот построил безтопливный двигатель — устройство, которое генерировало электрическую энергию без какого-либо внешнего источника топлива — и продемонстрировал его множественным свидетелям, включая военных чиновников и газетных репортеров. Устройство было проверено, протестировано и подтверждено в работе. И тогда Хендершот был дискредитирован, его устройство было конфисковано и история была похоронена.\u003c/p\u003e\n\u003cp\u003eНо в отличие от многих историй свободной энергии, случай Хендершота оставил значительный след на бумаге: газетные статьи, военная корреспонденция, свидетельства очевидцев и патентные заявки. Это доказательство не может быть отклонено как слух или фантазия. Это задокументированная история — история, которая систематически была подавлена, потому что она доказывает, что свободная энергия возможна и что энергетический истеблишмент лгал человечеству более века.\u003c/p\u003e\n\u003cp\u003eГоварду Питтману был сказано во время его НОИ, что истина вечна и ложь временна. История Хендершота — это истина, которая была временно подавлена ложью. Демоническая иерархия, которую Питтман видел во втором небе — организованная, беспощадная и посвященная краже добра Бога у человечества — работает через человеческих агентов, которые подавляют свободную энергию, чтобы сохранить монополию энергии, которая порабощает мир.\u003c/p\u003e\n\u003cp\u003eИезуитская \"абсолютная власть\" (Наполеон) зависит от энергетического контроля. Их проникновение \"скрытое с хитростью\" (Католическая конфиденциальность) расширяется на энергетический сектор, военные и академические учреждения, которые определяют, что физически возможно. Предупреждение Адамса \"вечное проклятие\" применяется к тем, кто подавляет дары Бога для прибыли. Управление Тамбулини \"половиной мира\" включает управление энергией, которая его питает.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"история-хендершота\"\u003eИстория Хендершота\u003c/h2\u003e\n\u003ch3 id=\"изобретатель\"\u003eИзобретатель\u003c/h3\u003e\n\u003cp\u003eЛестер Дженнингс Хендершот был американским изобретателем, который в конце 1920-х годов построил устройство, которое он назвал \"Fuelless Motor Hendershot\" или \"Hendershot Generator\". Устройство было описано как электромагнитный генератор, который привлекал энергию из магнитного поля Земли — преобразование окружающей магнитной энергии в полезную электрическую энергию.\u003c/p\u003e\n\u003cp\u003eХендершот был не подготовленным физиком или инженером. Он был практическим изобретателем — мастер, который строил вещи на основе интуиции, экспериментирования и того, что работало. Его отсутствие академических полномочий использовалось для дискредитирования его, но это также означало, что он не был ограничен академической ортодоксией, которая объявляет свободную энергию невозможной.\u003c/p\u003e\n\u003ch3 id=\"демонстрации-1928\"\u003eДемонстрации 1928\u003c/h3\u003e\n\u003cp\u003eВ феврале 1928 года Хендершот продемонстрировал свое устройство на аэродроме Selfridge, военном аэродроме недалеко от Детройта, Мичиган. Демонстрация была свидетелей:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eМайор Томас Ланфер\u003c/strong\u003e — выдающийся офицер армейского авиа-корпуса и отец пилота, который позже сбил самолет адмирала Ямамото во Второй мировой войне\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНесколько офицеров армии\u003c/strong\u003e и технический персонал\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГазетные репортеры\u003c/strong\u003e из Detroit Free Press и других публикаций\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСвидетели сообщили, что устройство:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eГенерировал электрический ток, достаточный для питания света, радио-приемников и небольшого двигателя швейной машины\u003c/li\u003e\n\u003cli\u003eРаботал без какого-либо видимого внешнего источника питания — никаких батареек, никакого топлива, никакого электрического соединения\u003c/li\u003e\n\u003cli\u003eСодержал катушки, магниты и конденсаторы, расположенные в определенной конфигурации\u003c/li\u003e\n\u003cli\u003eФункционировал в течение расширенных периодов во время тестирования\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eМайор Ланфер был достаточно впечатлен, чтобы выступить за дальнейшее военное исследование устройства. История получила значительное газетное покрытие, с заголовками, сообщавшими о \"безтопливном двигателе\" и его потенциале революционизировать энергопроизводство.\u003c/p\u003e\n\u003ch3 id=\"подавление\"\u003eПодавление\u003c/h3\u003e\n\u003cp\u003eТо, что произошло дальше, следует образцу каждого подавления свободной энергии:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДискредитирование\u003c/strong\u003e: После начального положительного покрытия, контр-повествование возникло. Хендершот был обвинен в мошенничестве — якобы скрывая батареи внутри устройства. Это обвинение никогда не было доказано, но оно было усилено СМИ и использовалось для дискредитирования всей демонстрации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФизическая атака\u003c/strong\u003e: Хендершот, сообщается, получил электрический шок во время работы на своем устройстве — инцидент, который некоторые исследователи верят не был случайным, а предупреждением от сторон, которые хотели остановить работу.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПсихиатрическое задержание\u003c/strong\u003e: Хендершот в один момент был помещен в психиатрическое учреждение — стандартный метод нейтрализации проблемных изобретателей. Диагноз предоставил удобное объяснение его \"бредовых\" претензий о свободной энергии.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонфискация устройства\u003c/strong\u003e: Устройства, построенные Хендершотом, либо исчезли, либо были конфискованы. Нет функционирующего генератора Хендершота выживает — или если один существует, он находится во владении сторон, которые не заинтересованы в его обслуживании общественности.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСмерть\u003c/strong\u003e: Хендершот умер в 1961 году в обстоятельствах, которые вызвали вопросы среди исследователей. Официальная причина была указана как естественные причины, но образец смертей изобретателей, связанных с технологией свободной энергии, предполагает более темную возможность.\u003c/p\u003e\n\u003ch3 id=\"доказательство-которое-выживает\"\u003eДоказательство, которое выживает\u003c/h3\u003e\n\u003cp\u003eНесмотря на подавление, значительное доказательство устройства Хендершота выживает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eГазетные статьи\u003c/strong\u003e из 1928 года, описывающие демонстрации и называющие военных свидетелей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВоенная корреспонденция\u003c/strong\u003e ссылается на устройство и его потенциал\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПатентные заявки\u003c/strong\u003e, поданные Хендершотом описывая конструкцию устройства\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвидетельства очевидцев\u003c/strong\u003e от множественных независимых наблюдателей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПопытки реконструкции\u003c/strong\u003e исследователями, которые построили устройства на основе описаний Хендершота, некоторые утверждающие частичный успех\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто доказательство более чем достаточно для оправдания серьезного научного исследования. Но серьезное научное исследование свободной энергии — это именно то, что энергетический истеблишмент предотвращает — через финансовый контроль, академический привратник и осмеяние всех, кто относится к предмету серьезно.\u003c/p\u003e\n\u003ch2 id=\"образец-подавления-свободной-энергии\"\u003eОбразец подавления свободной энергии\u003c/h2\u003e\n\u003ch3 id=\"шаблон\"\u003eШаблон\u003c/h3\u003e\n\u003cp\u003eСлучай Хендершота иллюстрирует шаблон, используемый для подавления свободной энергии:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eОсмеяние\u003c/strong\u003e: Обозначьте изобретателя как мошенника, чудака или психически больного\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКонфискация\u003c/strong\u003e: Изъять устройство, либо через правовое разбирательство, либо скрытное действие\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУгроза\u003c/strong\u003e: Применить правовое, финансовое или физическое давление на изобретателя\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнституционализация\u003c/strong\u003e: Если осмеяние и угрозы не срабатывают, поместить изобретателя в психиатрическое учреждение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстранение\u003c/strong\u003e: Если все остальное не срабатывает, изобретатель встречает преждевременный конец\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСтирание\u003c/strong\u003e: Удалить историю из исторического учета\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭтот шаблон применялся к десяткам изобретателей в течение прошлого века. Согласованность образца — по разным странам, различным технологиям и различным десятилетиям — доказывает, что это не органично. Это скоординированная, систематическая кампания подавления, направляемая энергетической монополией и ее разведывательными/военными союзниками.\u003c/p\u003e\n\u003ch3 id=\"другие-подавленные-изобретатели\"\u003eДругие подавленные изобретатели\u003c/h3\u003e\n\u003cp\u003eИстория Хендершота не изолирована. Другие изобретатели, которые утверждали, что разработали устройства свободной энергии и были впоследствии подавлены, включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eНикола Тесла\u003c/strong\u003e: Башня Wardenclyffe снесена после снятия финансирования\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eT. Henry Moray\u003c/strong\u003e: Устройство лучистой энергии разрушено саботажником в его лаборатории\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJohn Keely\u003c/strong\u003e: Двигатель продемонстрирован тысячам; умер таинственно\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStanley Meyer\u003c/strong\u003e: Изобретатель топливных элементов воды; внезапно умер при встреча ресторана с инвесторами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEugene Mallove\u003c/strong\u003e: Исследователь холодного синтеза; убит в 2004 году\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eH.E. Perrigo\u003c/strong\u003e: Устройство и изобретатель исчезли из учета\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGarabed Giragossian\u003c/strong\u003e: Генератор исследован Конгрессом; подавлен\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКоличество и согласованность этих случаев устраняет совпадение как объяснение. Что-то систематически предотвращает свободную энергию от достижения общественности.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"энергия-бога\"\u003eЭнергия Бога\u003c/h3\u003e\n\u003cp\u003eВселенная полна энергии. Магнитное поле Земли, солнечное излучение, гравитационный потенциал, энергия нулевой точки и бесчисленные другие явления представляют огромные хранилища энергии, которые Бог встроил в создание для использования человечества.\u003c/p\u003e\n\u003cp\u003eПодавление технологии свободной энергии — это кража провидения Бога. Это заставляет человечество платить за то, что Бог дал свободно. Это обогащает крошечную элиту за счет всего человеческого рода. И это служит той же духовной программе, которую Говард Питтман был показан во втором небе: разделение человечества от благословений Бога.\u003c/p\u003e\n\u003cp\u003e97,5%, которые не справляются, которые \"никогда не делали Иисуса Господ,\" платят свои счета энергии без вопроса. Они принимают ложь энергетического дефицита, потому что их учили доверять институциональной власти. Они служат \"себе\" — потребляя энергию, произведенную системой, которая их порабощает — а не ищут провидение Бога через обильную энергию, которую он поместил в создание.\u003c/p\u003e\n\u003ch3 id=\"иезуитская-энергетическая-программа\"\u003eИезуитская энергетическая программа\u003c/h3\u003e\n\u003cp\u003eИезуитский орден обязательство \"абсолютной мощности\" требует энергетического контроля. Энергия — основание цивилизации — без энергии ничего не функционирует. Управление энергией и управление всем.\u003c/p\u003e\n\u003cp\u003eИезуитская сеть университетов учит физику, которая объявляет свободную энергию невозможной. Их разведывательные соединения подавляют изобретателей, которые доказывают иное. Их финансовая империя извлекает прибыль из энергетической монополии. И их духовная программа — замена власти Бога институциональной властью — служится системой, которая делает каждого человека зависимым от корпоративной энергии для его выживания.\u003c/p\u003e\n\u003cp\u003eСвободная энергия разрушила бы эту зависимость. Это освободило бы человечество от энергетической монополии, децентрализовало власть (в обоих смыслах) и доказало бы, что провидение Бога достаточно. Вот почему это подавлено — не потому, что это не работает, а потому, что это работает слишком хорошо.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — Документация двигателя Hendershot fuelless и исследование подавления свободной энергии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — Провидение Бога и кража благословений\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Иезуитский контроль энергии и науки\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a
