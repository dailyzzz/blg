 говорили, что я могу сказать. Достаточно того, чтобы мне говорили, что я могу думать. Достаточно того, чтобы смотреть правды-сказателей молчат, отстраниваются, зарплату откачиваны и разрушены, пока лжецы амплифицируются, повышены и вознаграждены. Достаточно того, чтобы жить в мире, который называет цензуру \"руководящим принципом сообщества\" и наблюдение \"безопасностью\". Достаточно того, чтобы говорить истину наказана и распространение ложей прибыльно.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман был послан обратно с другой стороны с сообщением. Три небеса. Демоническая иерархия. 97,5 процентов отклонения. 95 процентов самопослужения. Каждое слово судимо (Матфей 12:36-37). Система цензуры существует, потому что истина — это наиболее опасное оружие против принципиальностей и властей Ефесянам 6:12. Если истина была безвредна, они не нуждались бы подавлять это. Само существование цензуры доказывает, что истина имеет власть — власть, которую система боится.\u003c/p\u003e\n\u003cp\u003eИезуиты совершенствовали цензуру. Их индекс запрещённых книг, поддерживаемый с 1559 по 1966, перечислил тысячи работ, которым католикам было запрещено читать. Их инквизиция наказала тех, кто обладал, распределял или обсуждал запрещённые идеи. Лойолы военная организация, власть Наполеона, всемирное управление Тамбулини — всё зависит от подавления информации. \u003cem\u003eCatholic Confidential\u003c/em\u003e раскрывает проникновение \"скрыто с хитростью\", слепое послушание, \"каждый вид порока\". Современная цензура — это цифровой индекс — и компании Big Tech — это новая инквизиция.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"машина-цензуры\"\u003eМашина цензуры\u003c/h2\u003e\n\u003ch3 id=\"как-это-работает\"\u003eКак это работает\u003c/h3\u003e\n\u003cp\u003eСовременная цензура работает через сотрудничество между государственными органами, технологическими компаниями, организациями средств массовой информации и академическими учреждениями. Это не теория. Это задокументировано через судебные дела, слушания конгресса, утечку сообщений и показания информаторов.\u003c/p\u003e\n\u003cp\u003eПравительство идентифицирует повествования, которые оно хочет подавить. Оно сообщает эти приоритеты к технологическим компаниям через формальные и неформальные каналы. Технологические компании внедряют подавление через алгоритмическое переносило, скрытый запрет, удаление содержания, подвеска счёта и деплатформинг. Академические учреждения обеспечивают интеллектуальную основу, которая оправдывает цензуру как \"борющийся дезинформацию\". Организации средств массовой информации амплифицируют одобренные повествования и дискредитируют подавляемые.\u003c/p\u003e\n\u003cp\u003eЭта четырёхкомпонентная машина цензуры — правительство, технология, академия, средства массовой информации — работает как объединённая система, несмотря на состояние из номинально независимых сущностей. Agent131711 документирует на Substack (agent131711.substack.com) как эта система функционирует на практике, прослеживая поток директив цензуры от государственных органов через технологические компании к подавлению специфических создателей содержания и специфических идей.\u003c/p\u003e\n\u003ch3 id=\"что-получает-цензурировано\"\u003eЧто получает цензурировано\u003c/h3\u003e\n\u003cp\u003eЦензурированные темы раскрывают. Они не случайны — они следуют паттерну:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eИнформация здоровья\u003c/strong\u003e, которая противоречит фармацевтическим интересам\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФинансовая информация\u003c/strong\u003e, которая вызывает банковские и налоговые повествования\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсторическая информация\u003c/strong\u003e, которая вызывает институциональные повествования\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРелигиозная информация\u003c/strong\u003e, которая вызывает институциональное христианство\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПолитическая информация\u003c/strong\u003e, которая вызывает двух-партийную систему\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНаучная информация\u003c/strong\u003e, которая вызывает установленные парадигмы\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОбщая нить — институциональная власть. Содержание цензурировано, когда это угрожает власти, доходу или легитимности мощных учреждений. Содержание, которое поддерживает эти учреждения, амплифицировано. Это не \"борющийся дезинформацию\". Это защита институциональной власти из общественного исследования.\u003c/p\u003e\n\u003cp\u003eМасонский индекс запрещённых книг следовал же логике. Книги были запрещены, не потому что они были ложны, но потому что они были опасны — опасны к власти церкви, опасны к влиянию иезуитов, опасны к институциональному порядку, который общество Иисуса поддерживало. Современная машина цензуры работает на идентичных принципах, нацеливаясь идентичные угрозы, служа идентичные хозяева.\u003c/p\u003e\n\u003ch2 id=\"сражаться-обратно\"\u003eСражаться обратно\u003c/h2\u003e\n\u003ch3 id=\"оружие-сопротивления\"\u003eОружие сопротивления\u003c/h3\u003e\n\u003cp\u003eЦензура мощна, но не всемогуща. Это имеет уязвимости, которые могут быть использованы кем-то, готовым сражаться:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. Децентрализованные платформы\u003c/strong\u003e: Платформы, которые не могут контролироваться одной компанией — децентрализованные средства социальной информации, сетям пиринг-к-пиринг, издание основанное блокчейном — сопротивление цензуре по дизайну. Когда содержание существует на тысячах независимых узлов, а не единого корпоративного сервера, никакая власть не может удалить это.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. Прямая коммуникация\u003c/strong\u003e: Списки электронной почты, информационные бюллетени, личные вебсайты и автономные сети обходят платформу цензуру полностью. Построение прямых отношений с вашей аудиторией — а не сдачи в аренду доступа через платформу — это единственный наиболее важный шаг любой правды-сказатель может взять.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. Физические средства массовой информации\u003c/strong\u003e: Книги, памфлеты, DVD и USB диски не могут быть алгоритмически подавлены. Физические средства массовой информации распределяет информацию через каналы, которые цифровая машина цензуры не может достичь.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e4. Шифрование\u003c/strong\u003e: Конец-к-концу зашифрованные коммуникации предотвращают наблюдение частных разговоров. Signal, ProtonMail и подобные услуги защищают содержание коммуникаций из правительства и корпоративного контроля.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e5. Архивирование\u003c/strong\u003e: Содержание, которое цензурировано с одной платформы, может быть архивировано на других. Интернет-архив, системы распределённого хранения и личные стратегии резервного копирования гарантируют, что удалённое содержание выживает.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e6. Сообщество\u003c/strong\u003e: Наиболее мощное оружие против цензуры — это сообщество — люди, которые разделяют информацию, поддерживают правды-сказателей и отказываются быть молчаны. Сообщество правды-ищущих — более трудное подавлять, чем любое отдельное лицо.\u003c/p\u003e\n\u003ch3 id=\"что-вы-можете-делать-сегодня\"\u003eЧто вы можете делать сегодня\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eПодпишитесь прямо\u003c/strong\u003e на независимые создатели через электронную почту, не через платформы.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСохраните и разделите\u003c/strong\u003e важное содержание прежде, чем это цензурировано.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИспользуйте альтернативные платформы\u003c/strong\u003e, которые не цензурируют основанное на содержании.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗашифруйте ваши коммуникации\u003c/strong\u003e с кем-то обсуждающим чувствительные темы.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПоддерживают независимые средства массовой информации\u003c/strong\u003e финансово — они зависят от финансирования аудитории, не корпоративной рекламы.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГоворите вверх\u003c/strong\u003e — каждый голос, поднятый против цензуры, делает следующий голос более лёгким.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"духовное-измерение-боевого-участвует\"\u003eДуховное измерение боевого участвует\u003c/h3\u003e\n\u003cp\u003eЦензура — это духовная война. Ефесянам 6:12 идентифицирует врага как \"принципиальности, мощь, властители тьмы этого века\". Тьма требует подавления света. Цензура — это подавление света — преднамеренное предотвращение истины из достижения людей, которые нуждаются в этом.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман был говорен, что 97,5 процентов христиан были отклонены, потому что они \"никогда не делали Меня Господом\". Цензура способствует непосредственно к этому отказу, подавляя информацию, которая помогла бы людям видеть сквозь институциональное обман и найти подлинную истину. Машина цензуры — это машина кража душ — предотвращение истины из достижения ушей тех, кто слушал это, и гарантирование, что институциональная ложь, которая ведёт к 97,5 процентам отклонению остаётся вызванным.\u003c/p\u003e\n\u003cp\u003eИезуиты понимали это. Их индекс существовал, не защищать людей из ошибки, но предотвращать их от встречи истины — истины, которая подорвала бы институциональную власть и индивидуальную зависимость. Современная машина цензуры служит том же цели. Это не защищает вас из дезинформации. Это предотвращает вас от встречи информации, которая освободила бы вас из системы.\u003c/p\u003e\n\u003cp\u003eКаждое слово, разделённое в неповиновение цензуре, — это духовный акт. Каждая истина сказанная, несмотря на риск деплатформинга, — это акт боевого участвующего против принципиальностей. Каждое лицо, которое отказывается быть само-цензурировано — то, что говорит то, что они знают быть истинным, несмотря на последствия — боется битвы, которую Ефесянам описывает. Это не метафора. Это реальность.\u003c/p\u003e\n\u003ch2 id=\"путь-вперед\"\u003eПуть вперед\u003c/h2\u003e\n\u003ch3 id=\"стоимость-и-вознаграждение\"\u003eСтоимость и вознаграждение\u003c/h3\u003e\n\u003cp\u003eСражающийся цензура имеет стоимости. Деплатформинг означает потерянные аудитории, потерянный доход, потерянный общественный стоящей. Говорящий истину в лежащем мире означает изоляцию, уметь и профессиональные последствия. Система разработана, чтобы создать стоимость истины выше стоимости молчания.\u003c/p\u003e\n\u003cp\u003eНо вознаграждение — это вечно. Матфей 12:36-37 предупреждает, что каждое слово будет судимо — включая слова не сказанные, истины не разделённые, информация не прошла вдоль, потому что стоимость показалась слишком высока. Узкие ворота проход через риск говорящего истину. Широкий путь проход через комфорт молчания.\u003c/p\u003e\n\u003cp\u003eЯ достаточно широкого пути. Я достаточно смотреть истину похороненная под алгоритмами и \"руководящей принципом сообщества\". Я достаточно система, которая вознаграждает ложь и наказывает истину. И я не буду молчать об этом.\u003c/p\u003e\n\u003cp\u003eВы не должны быть, либо.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\
