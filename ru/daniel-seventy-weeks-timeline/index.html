ведена была праведность вечная, и запечатаны были видение и пророк, и помазан был Святой святых.\" — Даниил 9:24\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНикакое пророчество в Писании не более математически точное, чем семьдесят недель Даниила. Данное Даниилу ангелом Гавриилом около 538 BC, во время вавилонского плена, это пророчество предоставляет точную временную линию из декрета для перестройки Иерусалима к приходу мессии — и за пределы, к финальному периоду скорби, который закрывает человеческую историю, как мы её знаем.\u003c/p\u003e\n\u003cp\u003eТочность — это пункт. Бог не говорит в неопределённых обобщениях когда он выбирает раскрыть его временную линию. Он даёт числа. Он даёт начальные пункты. Он даёт последовательности. И когда вы их вычисляете — используя исторический рекорд, еврейский календарь и пророческий принцип дня, представляющего год — числа приземляются с разрушительной точностью на событиях, которые уже произошли и событиях, которые ещё предстоят.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/13-The_Word_of_God.mp4\"\u003eThe Word of God\u003c/a\u003e напоминает нам, что Писание не сборник древних мнений. Это живое, активное слово Бога, который объявляет конец из начала. Семьдесят недель Даниила — доказательство. Никакой человеческий интеллект не мог вычислить эти даты пять веков перед событиями, которые они предсказали. Точность указывает на автора, который существует вне времени и видит всю историю как единственный развивающийся лист.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"текст-даниил-924-27\"\u003eТекст: Даниил 9:24-27\u003c/h2\u003e\n\u003cp\u003eПеред декодированием временной линии, мы должны осмотреть текст с точностью:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтих 24:\u003c/strong\u003e \"Семьдесят седмин определены для народа твоего и святого города твоего, чтобы покрыто было преступление, запечатаны были грехи и заглажена была неправда, и чтобы введена была праведность вечная, и запечатаны были видение и пророк, и помазан был Святой святых.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтих 25:\u003c/strong\u003e \"Итак знай и разумей: с того времени, как выйдет повеление о восстановлении Иерусалима, до Мессии Князя семь седмин и шестьдесят две седмины; и возстроятся улица и стена, и то в трудные времена.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтих 26:\u003c/strong\u003e \"И по истечении шестидесяти двух седмин предан будет смерти Мессия, и не будет; а город и святилище разрушены будут народом князя, который придёт, и конец его будет как наводнение; и до конца войны будут опустошения.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтих 27:\u003c/strong\u003e \"И утвердит завет для многих одна седмина, а в половине седмины прекратится жертва и приношение, и на крыле святилища будет мерзость запустения, и до конца определённого времени пойдёт опустошение на опустошающего.\"\u003c/p\u003e\n\u003cp\u003eШесть целей. Три периода времени. Два принца. Одна временная линия, которая охватывает из древней Персии к концу века.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческий-ключ-день-для-года\"\u003eПророческий ключ: День для года\u003c/h2\u003e\n\u003cp\u003eЕврейское слово, переводимое как \"недели\", является \u003cem\u003eshabuim\u003c/em\u003e — буквально \"семёрки.\" Семьдесят семёрок. Вопрос — семёрки чего? Дней? Месяцев? Лет?\u003c/p\u003e\n\u003cp\u003eПророческий принцип дня, представляющего год, установлен в другом месте в Писании:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЧисла 14:34\u003c/strong\u003e — \"По числу дней, в которые вы осматривали землю, сорок дней, день за год, сорок лет будете нести наказание за грехи ваши.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИезекииль 4:6\u003c/strong\u003e — \"Я определил тебе день за год.\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПрименяя этот принцип, семьдесят недель (семьдесят семёрок) = 70 x 7 = \u003cstrong\u003e490 пророческих лет\u003c/strong\u003e. Это полная длительность пророчества — 490 лет, определённые на народе Даниила (Израиль) и его святой город (Иерусалим).\u003c/p\u003e\n\u003cp\u003eЭти 490 лет разделены на три сегмента:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eСемь недель (49 лет)\u003c/strong\u003e — период перестройки Иерусалима\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eШестьдесят две недели (434 года)\u003c/strong\u003e — период из перестройки к мессии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОдна неделя (7 лет)\u003c/strong\u003e — финальный период, часто называемый скорбью\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eИтого: 7 + 62 + 1 = 70 недель. 49 + 434 + 7 = 490 лет.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"начальный-пункт-декрет-для-перестройки\"\u003eНачальный пункт: Декрет для перестройки\u003c/h2\u003e\n\u003cp\u003eПророчество начинает с \"выхода повеления для восстановления и перестройки Иерусалима.\" Это начальный пистолет — исторический событие, который запускает пророческие часы.\u003c/p\u003e\n\u003cp\u003eЕсть четыре возможных персидских декрета, которые могли служить этим начальным пункт:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eДекрет Cyrus (539 BC)\u003c/strong\u003e — Ездра 1:1-4. Этот декрет авторизовал перестройку храма, не города Иерусалима.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДекрет Darius I (519 BC)\u003c/strong\u003e — Ездра 6:1-12. Это переаффирмировало декрет Cyrus храма.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДекрет Artaxerxes к Ездре (458 BC)\u003c/strong\u003e — Ездра 7:11-26. Это авторизовало религиозные реформы и служение храма, но не строительство города.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДекрет Artaxerxes к Nehemiah (445 BC)\u003c/strong\u003e — Nehemiah 2:1-8. Это специфично авторизовало перестройку стен Иерусалима и города — точно что Даниил 9:25 описывает.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eДекрет к Nehemiah в 445 BC — наиболее точный матч. Это специфично адресует восстановление Иерусалима как города — \"восстановление и перестройка Иерусалима\" — не просто храма. Это датировано месяцем Nisan в двадцатом году Artaxerxes I, который историки датируют к марту-апрелю 445 BC.\u003c/p\u003e\n\u003cp\u003eЭто наш начальный пункт.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"первые-шестьдесят-девять-недель-к-мессии-принца\"\u003eПервые шестьдесят девять недель: К мессии принца\u003c/h2\u003e\n\u003cp\u003eДаниил 9:25 заявляет: \"из того времени, как выйдет повеление о восстановлении Иерусалима, до Мессии Князя семь седмин и шестьдесят две седмины.\"\u003c/p\u003e\n\u003cp\u003eСемь недель + шестьдесят две недели = шестьдесят девять недель = 69 x 7 = \u003cstrong\u003e483 пророческих года\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eТеперь мы должны рассчитать. Пророческий год в библейском календаре — 360 дней (основано на 30-дневном месяце, используемом в Бытие 7:11, 7:24, 8:3-4 и Откровение 11:2-3, 12:6, 13:5). Так:\u003c/p\u003e\n\u003cp\u003e483 пророческих года x 360 дней за год = \u003cstrong\u003e173,880 дней\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eНачиная с Nisan 1, 445 BC и подсчитывая 173,880 дней вперед:\u003c/p\u003e\n\u003cp\u003e173,880 дней ÷ 365.2421897 (солнечные дни в год) = 476 солнечных лет и 24 дней.\u003c/p\u003e\n\u003cp\u003e445 BC + 476 лет = AD 32 (объясняя отсутствие нулевого года между 1 BC и AD 1, что добавляет один год, приносящий нас к AD 32).\u003c/p\u003e\n\u003cp\u003eДобавление оставшихся 24 дней к Nisan 1 (приблизительно 14 марта в юлианском календаре) приносит нас к приблизительно \u003cstrong\u003e6 апреля, AD 32\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eЧто произошло на той дате? Согласно многочисленным хронологическим реконструкциям — включая работу Sir Robert Anderson в его книге 1894 \u003cem\u003eThe Coming Prince\u003c/em\u003e и позже уточненный Harold Hoehner — 6 апреля, AD 32 соответствует \u003cstrong\u003eNisan 10\u003c/strong\u003e в еврейском календаре того года. Nisan 10 — дата, предписанная в Exodus 12:3 для выбора Passover ягнёнка.\u003c/p\u003e\n\u003cp\u003eЭто дата, на которой Иисус из Назарета вошёл Иерусалим, едущий на осле — торжественный вход — представляя себя публично как мессия для первого и единственного времени, к радостям толпы, кричащей \"Осанна сыну Давида.\"\u003c/p\u003e\n\u003cp\u003eПророчество, данное Даниилу более 500 лет более ранний, предсказало точный день мессии представил бы себя Израилю. Не приблизительное десятилетие. Не генеральная эра. Точный день. 173,880 дней из декрета Artaxerxes к торжественному входу Иисуса Христа в Иерусалим.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"мессия-отрезан-распятие\"\u003eМессия отрезан: Распятие\u003c/h2\u003e\n\u003cp\u003eДаниил 9:26 продолжает: \"И по истечении шестидесяти двух седмин предан будет смерти Мессия, и не будет.\"\u003c/p\u003e\n\u003cp\u003e\"После\" шестьдесят девятой недели — но прежде семидесятой — мессия — \"отрезан.\" Еврейское слово \u003cem\u003ekarath\u003c/em\u003e — разрез, разрушение, выполнение. Это слово, используемое для разрезания завета (завет \"резан\" кровью проливаемой) и для казни капиталу.\u003c/p\u003e\n\u003cp\u003e\"Но не для себя.\" Мессия выполнен, но не для его собственных преступлений. Он умирает viciously — для других. Это распятие, описанное с судебно-медицинской точностью пять веков прежде это произошло.\u003c/p\u003e\n\u003cp\u003eИисус был распят на Nisan 14, AD 32 — четыре дня после торжественного входа. Он был \"отрезан\" точно, как Даниил предсказал: после шестьдесят девятой недели, но не для себя. Он умер как Passover ягненок — выбран на Nisan 10 (торжественный вход), осмотрен в течение четырех дней (конфронтации с религиозными лидерами, зафиксированными в евангелиях), и пожертвован на Nisan 14 (распятие).\u003c/p\u003e\n\u003cp\u003eПророчество затем добавляет: \"и город и святилище разрушены будут народом князя, который придёт.\" Это ссылается на разрушение Иерусалима и храма римлянами в AD 70. \"Люди князя, который придёт,\" — римляне — и \"князь, который придёт,\" — будущая фигура, антихрист, который возникнет из возрожденной римской системы. Как исследовано в \u003ca href=\"/antichrist-algorithm-digital-beast/?lang=ru\"\u003eThe Antichrist Algorithm: When the Digital Beast Awakens\u003c/a\u003e, этот принц возникает из одного и того же имперского происхождения, которое разрушило Иерусалим.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"промежуток-церковь-век\"\u003eПромежуток: Церковь век\u003c/h2\u003e\n\u003cp\u003eМежду шестьдесят девятой неделей и семидесятой неделей, есть промежуток — неопределённый период, во время которого пророческие часы для Израиля останавливаются. Этот промежуток — Церковь Век, период, в который мы в настоящее время живём.\u003c/p\u003e\n\u003cp\u003eЭто понятие не произвольно. Это укоренено в самом тексте. Даниил 9:26 описывает события, которые происходят \"после\" шестьдесят девятой недели, но прежде семидесятой: распятие и разрушение Иерусалима. Эти события охватывают, по крайней мере 38 лет (AD 32 к AD 70). Семидесятая неделя не начиналась, потому что её конкретные события — описанные в стихе 27 — не произошли.\u003c/p\u003e\n\u003cp\u003eПромежуток также согласован с пророческим образцом \"близкого и далекого\" исполнения, видимого по всему старому завету. Исайя 61:1-2 — которую Иисус прочитал в синагоге в Назарете (Лука 4:18-19) — описывает его оба первого прихода (\"провозглашать приемлемый год ГОСПОДА\") и его второго прихода (\"и день мести Бога нашего\"). Иисус остановил чтение в середине стиха, потому что день мести не был ещё. Промежуток между двумя предложениями единственного стиха длился более две тысячи лет.\u003c/p\u003e\n\u003cp\u003eПодобным образом, промежуток между семидесятыми неделями Даниила длился более две тысячи лет — и подсчитывает. Пророческие часы для Израиля остановились, когда Израиль отклонил мессию и был рассеян среди наций. Это перезагрузится, когда события семидесятой недели начнут.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"семидесятая-неделя-финальные-семь-лет\"\u003eСемидесятая неделя: Финальные семь лет\u003c/h2\u003e\n\u003cp\u003eДаниил 9:27 описывает семидесятую неделю — финальные семь лет пророческой временной линии:\u003c/p\u003e\n\u003cp\u003e\"И утвердит завет для многих одна седмина, а в половине седмины прекратится жертва и приношение, и на крыле святилища будет мерзость запустения, и до конца определённого времени пойдёт опустошение на опустошающего.\"\u003c/p\u003e\n\u003cp\u003e\"Он\" ссылается назад к \"князю, который придёт,\" из стиха 26 — антихристу. События семидесятой недели включают:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПодтверждение завета для многих в течение одной недели (7 лет).\u003c/strong\u003e Антихрист устанавливает договор или соглашение — вероятно вовлекая Израиль и многочисленные другие стороны (\"многие\"). Этот завет вероятно вовлекает гарантии мира, доступ храма и политические договорённости.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВ половине недели (3.5 года в), он нарушает завет.\u003c/strong\u003e Он причины жертва и облатка, чтобы прекратиться — означая что услуги храма, которые были восстановлены, прекращаются. Это требует перестройки храма в Иерусалиме, предмет интенсивной современной дискуссии.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eМерзость уничтожения.\u003c/strong\u003e Антихрист устанавливает что-то омерзительное в святом месте — акт осквернения, который Иисус специфично предупредил о в Матфей 24:15: \"Когда же увидите мерзость запустения, реченную через пророка Даниила, стоящую на святом месте, — читающий да разумеет.\"\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eУничтожение до consummation.\u003c/strong\u003e Осквернение продолжается до предопределённого конца — возврат Христа, поражение антихриста и установка мессианского королевства.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eСемидесятая неделя соответствует периоду скорби, описанному в Откровении, в частности главы 6-19. Первая половина (3.5 года) — период ложного мира. Вторая половина (3.5 года) — Большая скорбь — период беспрецедентного суда и преследования. Как исследовано в \u003ca href=\"/seven-seals-seven-trumpets/?lang=ru\"\u003eThe Seven Seals and Seven Trumpets: Revelation's Timeline of Judgment\u003c/a\u003e, события семидесятой недели Даниила развёртываются в точной последовательности посредством печатей, труб и чаш Откровения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"шесть-целей-что-семьдесят-недель-достигают\"\u003eШесть целей: Что семьдесят недель достигают\u003c/h2\u003e\n\u003cp\u003eДаниил 9:24 списки шесть целей, что семьдесят недель достигнут:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eПокрыть преступление\u003c/strong\u003e — национальное преступление Израиля против Бога будет завершено и рассмотрено.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСделать конец грехов\u003c/strong\u003e — грех сам будет судим и прекращен.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСделать примирение для неправды\u003c/strong\u003e — искупление будет сделано. Это было достигнуто в Cross, но будет национально признано Израилем при втором пришествии (Zechariah 12:10).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПривести в вечную праведность\u003c/strong\u003e — мессианское королевство будет установлено, где праведность правит постоянно.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗапечатать видение и пророчество\u003c/strong\u003e — все пророческое откровение будет исполнено. Никакое больше пророчество не будет нужно, потому что пророчествованные события будут произойти.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПомазать наиболее святого\u003c/strong\u003e — мессия будет воспетствован и храма освящена в миллениальном королевстве.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eТри из этих целей были достигнуты при первом пришествии Христа (примирение за неправду и основание за завершение преступления и заканчивающихся грехов). Три остаются быть достигнутыми при его втором пришествии (вечная праведность, запечатывание пророчества и помазание наиболее святого). Промежуток между шестьдесят девятой и семидесятыми неделями — промежуток между этими двумя множествами три — между крестом и корoной.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"точность-которая-требует-ответ\"\u003eТочность, которая требует ответ\u003c/h2\u003e\n\u003cp\u003eМатематическая точность семидесяти недель Даниила исключает совпадение как объяснение. Пророчество имена начальное событие (декрет для перестройки), определяет длительность (69 недель года = 173,880 дней) и определяет конец событие (мессия представляющий себя). Когда вы рассчитываете из исторической даты декрета Artaxerxes, вы прибываете в точную дату торжественного входа Христа.\u003c/p\u003e\n\u003cp\u003eНикакой человеческий в 538 BC не мог предсказать события в AD 32 с этой точностью. Никакая статистическая модель, никакой политический анализ, никакая образованная догадка не мог производить пятивековой прогноз точный к дню. Это не человеческое знание. Это божественное откровение — и это было проверено историей.\u003c/p\u003e\n\u003cp\u003eЕсли первые шестьдесят девять недель были исполнены с математической точностью, какая основа мы имеем для сомнения, что семидесятая неделя будет исполнена с равной точностью? Тот же Бог, который рассчитал 173,880 дней из декрета к мессии, рассчитал финальные семь лет с тем же exactness. Скорбь — не неопределённая будущая возможность. Это mathematically определённое завершение временной линии, которая уже доказала его точность.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ничего-новое-под-солнцем\"\u003eНичего новое под солнцем\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Помните древнее: Я Бог, и нет иного Бога, и ничего не подобно Мне. Я возвещаю от начала конец, и от древних времён то, что ещё не сделано, говоря: мой совет состоится, и всё, что Мне угодно, Я сделаю.\" — Исайя 46:9-10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eСемьдесят недель Даниила демонстрируют, что Бог не реагирует на историю. Он направляет это. Декрет персидского короля, перестройка города, вход человека на осле, распятие на римском кресте, разрушение храма римскими легионами — каждое событие было известно, предсказано и исполнено по расписанию.\u003c/p\u003e\n\u003cp\u003eОставшиеся события — завет, мерзость, скорбь, возврат — на одном и том же расписании. Тот же автор написал их. Та же точность управляет ими. Та же определённость гарантирует их.\u003c/p\u003e\n\u003cp\u003eМы живём в промежутке. Шестьдесят девятая неделя была исполнена. Семидесятая неделя не началась. Но пророческие часы, которые остановились, перезагрузятся — и когда они это делают, финальные семь лет развернут с той же математической определённостью, которая управляла первыми 483 года. Вопрос — не даст ли это происходить. Вопрос — узнаёте ли вы это, когда оно начинает.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily изучают темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/347-The_Abomination_Of_Desolation.mp4\"\u003eThe Abomination Of Desolation\u003c/a\u003e — Пророческая временная линия развёртывается\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/497-Tribulation_Tech.mp4\"\u003eTribulation Tech\u003c/a\u003e — Технология и пророчество конца времени\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучайте-дальше\"\u003eИзучайте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/seven-seals-seven-trumpets/?lang=ru\"\u003eThe Seven Seals and Seven Trumpets: Revelation's Timeline of Judgment\u003c/a\u003e — Детальное развёртывание событий во время семидесятой недели Даниила\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/antichrist-algorithm-digital-beast/?lang=ru\"\u003eThe Antichrist Algorithm: When the Digital Beast Awakens\u003c/a\u003e — Принц, который придёт и его цифровая инфраструктура\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eПятьсот лет перед этим произошло, Бог сказал Даниилу точный день мессия ехал в Иерусалим. Декрет был выдан. Дни были подсчитаны. Король прибыл по расписанию. И затем он был отрезан — не для себя, но для нас. Первые шестьдесят девять недель доказали, что Бог держит его встречи к дню. Семидесятая неделя будет никак иначе. Завет будет подтверждён. Мерзость будет стоять. Скорбь развернётся. И в consummation — в конце финальной недели — сын Давида, который ехал на осле в Иерусалим в первый раз, вернётся на белом коне с армиями неба. Математика точна. Бог позади математики верен. И временная линия, которую он установил
