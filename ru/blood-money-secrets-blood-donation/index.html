и в крови. Каждая основная духовная традиция признаёт глубокую значимость крови — как носителя жизни, как вещества завета, как среды жертвы. Кровь Христа искупает человечество. Кровь Авеля вопиёт из земли. Кровь — это не просто биологическая жидкость — это духовное вещество наивысшего порядка.\u003c/p\u003e\n\u003cp\u003eИ всё же современная индустрия переливания крови обращается с кровью как с товаром — собирается бесплатно от благосклонных донаторов, обрабатывается через индустриальные операции и продаётся в больницы за огромную прибыль. Индустрия, которая обращается с человечеством самой священной веществом, работает с этикой лавки залога и прозрачностью классифицированной военной программы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кровавый-бизнес\"\u003eКровавый бизнес\u003c/h2\u003e\n\u003ch3 id=\"цифры\"\u003eЦифры\u003c/h3\u003e\n\u003cp\u003eАмериканский Red Cross собирает приблизительно \u003cstrong\u003e6.8 миллиона единиц\u003c/strong\u003e крови в год в Соединённых Штатах. Кровь пожертвована безвозмездно добровольцами. Затем она:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eТестируется\u003c/strong\u003e на инфекционные заболевания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбрабатывается\u003c/strong\u003e на компоненты (красные клетки, тромбоциты, плазма, криопреципитат)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eХранится\u003c/strong\u003e в контролируемых по температуре объектах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПродаётся\u003c/strong\u003e в больницы по цене от \u003cstrong\u003e$150 до $300+\u003c/strong\u003e за единицу красных кровяных телец\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЕдинственное пожертвование может быть разделено на компоненты, которые генерируют \u003cstrong\u003e$300-$500 в доходе\u003c/strong\u003e. Умножьте это на 6.8 миллиона пожертвований, и операция Red Cross крови одна генерирует \u003cstrong\u003eболее $2 миллиардов в годовой доход\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eДонатор получает ничего. Red Cross — \"некоммерческая\" организация — генерирует миллиарды. Больницы добавляют надбавку на кровный продукты далее перед тем, как заряжать пациентов. Единственная единица крови может обойтись пациенту \u003cstrong\u003e$1,000 или больше\u003c/strong\u003e на их счете больницы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"the-spiritual-dimension-of-blood\"\u003eThe Spiritual Dimension of Blood\u003c/h2\u003e\n\u003ch3 id=\"blood-in-scripture\"\u003eBlood in Scripture\u003c/h3\u003e\n\u003cp\u003eБиблия обращается с кровью с необычной почтительностью:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЛевит 17:11\u003c/strong\u003e: \"Ибо душа плоти в крови\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЛевит 17:14\u003c/strong\u003e: \"Не ешьте крови никакого животного\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБытие 9:4\u003c/strong\u003e: \"Только плоти не ешьте с душою её, с кровью её\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДеяния 15:20\u003c/strong\u003e: Языческих верующих поучают воздерживаться от крови\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти отрывки устанавливают, что кровь — это не просто биологическое вещество — она несёт сущность самой жизни. Запрет против потребления крови расширяет, по духовному принципу, к случайному обращению, коммодификации и индустриальной обработке крови.\u003c/p\u003e\n\u003cp\u003eКогда кровь обращается как товар — собирается, обрабатывается, покупается и продаётся — её священная природа нарушена. Индустрия переливания крови уменьшает самую священную вещество в человеческом теле к продукту на полке, с штрих-кодом и датой истечения срока действия.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — research on the blood industry and its hidden economics\u003c/li\u003e\n\u003cli\u003e\u003ca
