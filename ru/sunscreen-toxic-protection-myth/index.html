лять ритмами дня и ночи, и обеспечивать энергию, которая приводит в движение практически все биологические процессы на Земле. Солнце производит витамин D в коже человека, регулирует циркадные ритмы, стимулирует производство серотонина, укрепляет иммунную систему и обеспечивает свет, который дает возможность видеть. Современное демонизирование солнца и продвижение химических солнцезащитных кремов как ежедневной защиты от него — это инверсия божественного замысла: объявление творения Бога опасным и продажа химического щита против него, который более токсичен, чем воздействие, которое он претендует предотвратить.\u003c/p\u003e\n\u003cp\u003eКак отмечается в музыкальном треке Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eThe Sun and the Moon\u003c/a\u003e, небесные тела, помещенные Богом на небо, свидетельствуют о Его творческом порядке. Кампания, чтобы заставить людей бояться солнца, — это кампания, чтобы отделить человечество от наиболее видимого и постоянного выражения божественного провидения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"индустрия-солнцезащитных-кремов\"\u003eИндустрия солнцезащитных кремов\u003c/h2\u003e\n\u003cp\u003eГлобальный рынок солнцезащитных кремов оценивается примерно в 14 миллиардов долларов и, по прогнозам, достигнет 22 миллиардов долларов к 2030 году. Дерматологический истеблишмент, косметическая промышленность и агентства общественного здравоохранения потратили десятилетия на продвижение единого, унифицированного сообщения: солнце вызывает рак кожи, и солнцезащитный крем — это необходимая ежедневная защита.\u003c/p\u003e\n\u003cp\u003eЭто сообщение было замечательно эффективным. Использование солнцезащитного крема стало одним из наиболее универсально принятых видов поведения в области здравоохранения в развитых странах. Дерматологи рекомендуют наносить солнцезащитный крем на всю открытую кожу каждый день, независимо от индекса УФ, времени года или продолжительности воздействия солнца. Детей мажут солнцезащитным кремом перед перерывом. Офисные работники, которые весь день проводят в помещении, наносят солнцезащитный крем, чтобы дойти до своих автомобилей.\u003c/p\u003e\n\u003cp\u003eОднако доказательства того, что ежедневное использование солнцезащитного крема предотвращает рак кожи, гораздо менее ясны, чем предполагает сообщение, и доказательства того, что сами химические вещества в солнцезащитном креме представляют риски для здоровья, гораздо более тревожны, чем признает дерматологический истеблишмент.\u003c/p\u003e\n\u003ch2 id=\"что-находится-в-вашем-солнцезащитном-креме\"\u003eЧто находится в вашем солнцезащитном креме?\u003c/h2\u003e\n\u003cp\u003eХимические солнцезащитные средства — наиболее часто используемый тип — работают, поглощая УФ-излучение через органические химические соединения, которые подвергаются фотохимическим реакциям на коже. Наиболее распространенные активные ингредиенты включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОксибензон (бензофенон-3).\u003c/strong\u003e Наиболее широко используемое солнцезащитное химическое вещество в Америке. Исследование FDA 2020 года показало, что оксибензон поглощается в кровоток после одного применения на уровнях, которые превышают пороговое значение безопасности FDA примерно в 180 раз. Оксибензон — задокументированный эндокринный разрушитель, который имитирует эстроген, блокирует андроген и нарушает гормоны щитовидной железы. Он связан с эндометриозом у женщин, низким тестостероном у мужчин и ранним половым созреванием у детей. Исследование 2008 года выявило оксибензон в моче 97% протестированных американцев. Гавайи и Палау запретили солнцезащитные кремы, содержащие оксибензон, из-за их разрушительного воздействия на коралловые рифы — химическое вещество вызывает отбеливание кораллов при концентрациях всего 62 триллионные доли.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОктинокс (этилгексил метоксициннамат).\u003c/strong\u003e Еще один широко используемый химический фильтр, который поглощается в кровоток и действует как эндокринный разрушитель. Исследования показали, что октинокс влияет на активность рецепторов эстрогена и функцию щитовидной железы. Он также токсичен для коралловых рифов и был запрещен вместе с оксибензоном на Гавайях.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГомосалат.\u003c/strong\u003e Поглощается в кровоток на уровнях, превышающих пороги безопасности FDA. Научный комитет Европейской Комиссии по безопасности потребителей выразил озабоченность по поводу потенциала гомосалата нарушать эндокринную систему и рекомендует ограничить его концентрацию в косметических продуктах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОктокрилен.\u003c/strong\u003e УФ-фильтр, который со временем разлагается на бензофенон — подозреваемый канцероген. Исследование 2021 года, опубликованное в Chemical Research in Toxicology, показало, что концентрация бензофенона в солнцезащитных продуктах значительно увеличивается с возрастом, что означает, что старый солнцезащитный крем становится более канцерогенным с течением времени.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАвобензон.\u003c/strong\u003e Хотя обычно считается более стабильным, чем другие химические фильтры, авобензон разлагается под воздействием УФ-излучения (условие, которое он предназначен защищать против), производя свободные радикалы, которые могут повредить ДНК и клетки кожи.\u003c/p\u003e\n\u003cp\u003eFDA предложил обновленные нормативы солнцезащитных средств в 2019 году, которые классифицировали только два ингредиента солнцезащитного крема — оксид цинка и диоксид титана (минеральные фильтры) — как \"общепризнанные как безопасные и эффективные\" (GRASE). Двенадцать химических ингредиентов солнцезащитных средств, включая оксибензон и октинокс, были классифицированы как требующие дополнительных данных о безопасности — данные, которые индустрия не предоставила спустя годы.\u003c/p\u003e\n\u003ch2 id=\"парадокс-витамина-d\"\u003eПарадокс витамина D\u003c/h2\u003e\n\u003cp\u003eНаиболее серьезным следствием универсального продвижения солнцезащитного крема является массовое подавление синтеза витамина D — одной из наиболее критических биологических функций солнца.\u003c/p\u003e\n\u003cp\u003eКогда УФ-В излучение попадает на кожу, оно преобразует 7-дегидрохолестерин в коже в витамин D3 (холекальциферол). Это основной источник витамина D в организме — вещество, подобное гормону, необходимое для:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЗдоровья костей\u003c/strong\u003e — витамин D регулирует поглощение кальция\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИммунной функции\u003c/strong\u003e — витамин D активирует Т-клетки и другие механизмы иммунитета\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПрофилактики рака\u003c/strong\u003e — исследования постоянно показывают, что более высокие уровни витамина D связаны с более низкими показателями нескольких видов рака\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСердечно-сосудистого здоровья\u003c/strong\u003e — дефицит витамина D связан с повышенным сердечно-сосудистым риском\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПсихического здоровья\u003c/strong\u003e — дефицит витамина D связан с депрессией, тревогой и сезонным аффективным расстройством\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРегулирования аутоиммунитета\u003c/strong\u003e — витамин D модулирует иммунную систему, чтобы предотвратить атаку на собственные ткани организма\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСолнцезащитный крем с SPF 30 снижает синтез витамина D на приблизительно 95-99%. Ежедневное использование солнцезащитного крема, как рекомендуется дерматологами, фактически исключает способность кожи производить витамин D из солнечного света.\u003c/p\u003e\n\u003cp\u003eРезультат: приблизительно 42% американских взрослых испытывают дефицит витамина D — цифра, которая возрастает до 82% среди афроамериканцев, чей более высокий уровень меланина уже снижает УФ-индуцированный синтез витамина D. Дефицит витамина D связан с каждым крупным хроническим заболеванием, включая рак, болезнь, которую солнцезащитный крем должен предотвращать.\u003c/p\u003e\n\u003cp\u003eОтвет дерматологического истеблишмента на кризис витамина D, который он создал, — это рекомендация синтетических добавок витамина D — производимых фармацевтическими компаниями и принимаемых в форме, которая, как задокументировано в нашей статье о \u003ca href=\"/synthetic-vitamins-natural-fraud/?lang=ru\"\u003eСинтетические витамины: мошенничество в области естественного здоровья\u003c/a\u003e, не идентична витамину D, который организм естественным образом производит из солнечного света.\u003c/p\u003e\n\u003ch2 id=\"нарратив-о-раке-кожи\"\u003eНарратив о раке кожи\u003c/h2\u003e\n\u003cp\u003eЦентральное утверждение индустрии солнцезащитных средств состоит в том, что воздействие УФ вызывает рак кожи и что солнцезащитный крем его предотвращает. Реальность более нюансирована, чем признает индустрия:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПоказатели меланомы увеличились, несмотря на увеличенное использование солнцезащитного крема.\u003c/strong\u003e С 1970-х годов, когда солнцезащитный крем стал широко используемым, заболеваемость меланомой увеличилась на 320% в Соединенных Штатах. Если солнцезащитный крем предотвращает меланому, наиболее смертельную форму рака кожи, показатели должны были снизиться с увеличением использования солнцезащитного крема. Они сделали противоположное.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРаботники в помещении имеют более высокие показатели меланомы, чем работники на открытом воздухе.\u003c/strong\u003e Множество исследований обнаружили, что люди, работающие в помещении — получающие меньше общего воздействия солнца — имеют более высокие показатели меланомы, чем люди, работающие на открытом воздухе. Это открытие противоречит упрощенному нарративу, что больше солнца означает больше рака.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПериодическое, чрезмерное воздействие — не общее воздействие солнца — связано с меланомой.\u003c/strong\u003e Фактор риска меланомы — это не общее воздействие солнца, а периодическое, интенсивное воздействие, вызывающее солнечный ожог — особенно в детстве. Обычное, умеренное воздействие солнца (того вида, которое получают работники на открытом воздухе) кажется защитным, а не вредным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСолнцезащитный крем может способствовать меланоме.\u003c/strong\u003e Химические солнцезащитные средства избирательно фильтруют УФ-излучение, часто более эффективно блокируя УВ-излучение (которое вызывает ожоги и синтез витамина D), чем УФ-А излучение (которое проникает глубже в кожу и более сильно связано с меланомой). Это означает, что солнцезащитный крем позволяет людям проводить продолжительное время на солнце, не получая ожогов — при этом все еще получая более глубоко проникающее УФ-А излучение, которое способствует меланоме. Солнцезащитный крем может увеличить риск меланомы, позволяя продолжительное воздействие УФ-А без сигнала об ожоге предупреждения.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в \u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eРокфеллеровская медицина: как здравоохранение было захвачено\u003c/a\u003e, паттерн создания проблемы со здоровьем и последующей продажи решения — это основная бизнес-модель фармацевтической и косметической промышленности. Бойтесь солнца. Покупайте химический щит. Становитесь дефицитным в витамине D. Покупайте добавку. Получайте рак в любом случае. Покупайте лечение.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в \u003ca href=\"/two-hundred-years-insanity-medicine/?lang=ru\"\u003eДвести лет безумия в медицине\u003c/a\u003e, медицинский истеблишмент имеет долгую историю продвижения практик, которые причиняют больше вреда, чем состояния, которые они претендуют лечить.\u003c/p\u003e\n\u003ch2 id=\"экологическое-уничтожение\"\u003eЭкологическое уничтожение\u003c/h2\u003e\n\u003cp\u003eХимические вещества в солнцезащитном креме не остаются на вашей коже. Когда вы плывете, принимаете душ или потеете, химические вещества солнцезащитного крема попадают в водоснабжение. Приблизительно 14 000 тонн солнцезащитного крема попадают в мировые океаны каждый год.\u003c/p\u003e\n\u003cp\u003eВоздействие на морские экосистемы разрушительно:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eОксибензон вызывает отбеливание кораллов при концентрациях 62 триллионные доли\u003c/li\u003e\n\u003cli\u003eХимические вещества солнцезащитного крема обнаружены в рыбе, дельфинах и морских млекопитающих\u003c/li\u003e\n\u003cli\u003eХимические вещества УФ-фильтра нарушают репродуктивные системы рыб и других морских организмов\u003c/li\u003e\n\u003cli\u003eЗагрязнение солнцезащитным кремом обнаружено в отдаленных морских средах, далеко от пляжей\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОтвет индустрии был включить в портфель \"безопасные для рифов\" составы — многие из которых все еще содержат химические вещества, вредные для морской жизни, и для которых \"безопасно для рифов\" является немаркированным маркетинговым термином без юридического определения.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@they
