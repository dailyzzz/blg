ественный атрибут. Только Бог знает ум. Только Бог читает мысли. Только Бог общается дух с духом без посредничества слов, жестов или физических сигналов. Когда люди предполагают узнать ум другого, Писание называет это гаданием -- практика явно запрещена в Второзаконии 18:10-12 наряду с колдовством, магией и консультацией с мертвыми.\u003c/p\u003e\n\u003cp\u003eТелекинез -- способность двигать физические объекты посредством команды ума -- это божественная сила. Бог говорил вселенную в существование. Его Слово движет материалью. Его воля формирует действительность. Когда люди пытаются двигать материю через ум один, они входят в область сверхъестественного -- область, которую Писание зарезервирует для Бога и предупреждает против человеческого нарушения.\u003c/p\u003e\n\u003cp\u003eНазвания продуктов Neuralink -- это Телепатия и Телекинез. Не метафорически. Буквально. Первый продукт позволяет связь от мысли к устройству. Продукт следующего поколения нацелен на движение физического контролера мыслью. Илон Маск строит технологическую инфраструктуру для воспроизведения божественных атрибутов и распределения их посредством коммерческих продуктов.\u003c/p\u003e\n\u003cp\u003eЭто комплекс Бога, сделанный буквальным. Это Бытие 3:5 с картой дорог продукта.\u003c/p\u003e\n\u003cp\u003eКак объявляет трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e, первоначальный грех достигал за божественное знание и силу. \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/105-The_Second_Adam.mp4\"\u003eThe Second Adam\u003c/a\u003e пришел не захватить божественную силу, а подчиниться божественной воле -- противоположность того, что представляет Neuralink.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"телепатия-чтение-и-передача-мысли\"\u003eТелепатия: чтение и передача мысли\u003c/h2\u003e\n\u003cp\u003eNeuralink назвал свой первый коммерческий продукт \"Телепатия\". Название не является маркетинговой гиперболой. Он описывает функцию: чип читает сигналы мозга, связанные с предполагаемой коммуникацией и переводит их в цифровой вывод. Пользователь думает, и устройство передает.\u003c/p\u003e\n\u003ch3 id=\"текущая-возможность\"\u003eТекущая возможность\u003c/h3\u003e\n\u003cp\u003eВ человеческих испытаниях устройство Telepathy Neuralink продемонстрировало:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУправление курсором посредством мысли.\u003c/strong\u003e Пользователи думают о перемещении курсора, и курсор движется. Никакое физическое ввода требуется.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГенерирование текста посредством мысли.\u003c/strong\u003e Пользователи сочиняют сообщения, думая о буквах или словах, которые устройство переводит в напечатанный текст.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУправление приложением.\u003c/strong\u003e Пользователи навигируют операционными системами, просматривают интернет и взаимодействуют с программным обеспечением посредством нейральных команд.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСкорость коммуникации, превосходящая физический ввод.\u003c/strong\u003e Парализованные пользователи общаются посредством телепатии быстрее, чем они могли бы посредством любой предыдущей вспомогательной технологии.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"траектория-к-истинной-телепатии\"\u003eТраектория к истинной телепатии\u003c/h3\u003e\n\u003cp\u003eТекущий продукт телепатии -- это однонаправленный: мозг к устройству. Мысли пользователя читаются и переводятся в цифровой вывод. Но Маск явно заявил, что главная цель -- коммуникация мозг к мозгу -- истинная телепатия, где мысли одного человека передаются непосредственно в мозг другого человека посредством соединения Neuralink к Neuralink.\u003c/p\u003e\n\u003cp\u003eТехнические требования для этого:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eВысокопропускной способности чтения мозга.\u003c/strong\u003e Электроды N1's 1,024 должны расширяться до десятков тысяч (N2 стремится к 16,000+) для захвата мысли с достаточным разрешением для значимой коммуникации.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДвунаправленный интерфейс.\u003c/strong\u003e Чип должен читать и писать нейральные сигналы -- прием переданных мыслей и стимуляция нейронов приемника для создания соответствующего психического опыта.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКодирование/декодирование нейрала.\u003c/strong\u003e Система должна разработать универсальный \"язык\" для нейральных сигналов -- переводя образцы мысли одного человека в нейральную архитектуру другого человека, через индивидуальные разные различия в структуре мозга и связности.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНизко-задержка сеть.\u003c/strong\u003e Связь мысли в реальном времени требует близко-нулевая задержка -- скорости передачи, которые делают разговор ощущаться мгновенным.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eКаждый из этих требований находится в активном разработке. Коммуникация мозг к мозгу была уже продемонстрирована в лабораторных установках на рудиментарных уровнях -- команды просто были переданы между мозгами, используя ЭЭГ и трансчерепную магнитную стимуляцию (TMS) в исследовательских командах в Университете Вашингтона и других учреждениях.\u003c/p\u003e\n\u003cp\u003eТехнология Neuralink, с ее драматически более высокой числовой электрода и разрешением, представляет квантовый скачок за пределы этих ранних демонстраций. Истинная телепатия -- два ума общающиеся без слов, без звука, без какого-либо физического средства -- не фантазия. Это таблица инженеринга.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"телекинез-перемещение-материи-с-ума\"\u003eТелекинез: перемещение материи с ума\u003c/h2\u003e\n\u003cp\u003eВторой продукт Neuralink, объявленный как \"Blindsight\" для восстановления видения, но с более широким телекинетическим стремлением, стремится дать пользователям способность контролировать физические объекты посредством мысли один.\u003c/p\u003e\n\u003ch3 id=\"путь-от-курсора-к-объекту\"\u003eПуть от курсора к объекту\u003c/h3\u003e\n\u003cp\u003eЕсли мозговой чип может двигать курсор на экране, он может двигать что-либо, подключенное к той же цифровой инфраструктуре. Прогрессия прямолинейная:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eЦифровой телекинез.\u003c/strong\u003e Перемещение курсоров, управление программным обеспечением, навигация виртуальных окружений -- уже продемонстрировано.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРоботический телекинез.\u003c/strong\u003e Управление роботическими рукавами, дронами, автомобилями и машинами посредством мысли. Продемонстрировано в лабораторных установках с более ранними интерфейсами мозг-компьютер; драматически улучшено разрешением Neuralink.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТелекинез окружающей среды.\u003c/strong\u003e Управление умными домашними устройствами, промышленным оборудованием и инфраструктурными системами посредством мысли. Когда все подключено к интернету вещей, все управляемо посредством чипа мозга.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТелекинез гуманоидного робота.\u003c/strong\u003e Управление роботами Tesla Optimus посредством Neuralink -- дающий пользователю удаленное тело, которое ходит, захватывает, поднимает и взаимодействует с физическим миром полностью посредством команды ума.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭто не перемещение объектов силой. Это перемещение объектов посредством цифровой инфраструктуры, которая соединяет мозг чип с всем. Но опыту пользователя, опыт неотличим от телекинеза: думаю, и мир движется.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"комплекс-бога-воспроизведение-божественных-атрибутов\"\u003eКомплекс Бога: воспроизведение божественных атрибутов\u003c/h2\u003e\n\u003ch3 id=\"телепатия--всеведение\"\u003eТелепатия = Всеведение\u003c/h3\u003e\n\u003cp\u003eИстинная телепатия -- способность узнать мысли другого -- это форма всеведения. Если коммуникация мозг к мозгу становится вездесущей (как видит Маск), каждый человек с чипом Neuralink становится частью коллективного сознания, где мысли разделены, где умы сетевиеся, где приватность мысли прекращается.\u003c/p\u003e\n\u003cp\u003eЭто не просто конец когнитивной свободы. Это технологическое моделирование божественного всеведения -- знающий все мысли, во всех умах, в реальном времени. Это Hive Mind, и это представляется как особенность, не угроза.\u003c/p\u003e\n\u003ch3 id=\"телекинез--всемогущество\"\u003eТелекинез = Всемогущество\u003c/h3\u003e\n\u003cp\u003eУправление физическое манипуляцией посредством команду ума -- перемещение объектов, управление машинами, управления инфраструктурой посредством мысли команда -- это форма всемогущества. Если цифровая инфраструктура соединяет мозг со всем, то мысль управляет всем. Воля становится исполнимой. Воображение становится физической.\u003c/p\u003e\n\u003cp\u003e\"Ничто не будет воздержано от них, что они замыслили\" (Бытие 11:6). Оценка Бога Вавилона применяется точно к видению Neuralink: воображение сделано физической, воля сделана исполнимой, мысль переводится непосредственно в действие. Это сила, Бог определил как опасный -- и рассеял строителей для предотвращения.\u003c/p\u003e\n\u003ch3 id=\"бессмертие--вечная-жизнь\"\u003eБессмертие = Вечная жизнь\u003c/h3\u003e\n\u003cp\u003eМаск и Куртцвейль оба выступают за цифровое сознание -- загрузка ума на компьютер, спасение памяти в облаке, достижение бессмертия посредством технологии. Это третий божественный атрибут трансгуманисты стремятся воспроизвести: вечная жизнь.\u003c/p\u003e\n\u003cp\u003eТелепатия, телекинез и бессмертие. Всеведение, всемогущество и вечная жизнь. Триунские атрибуты Бога, воспроизведенные в кремнии и маркетированные как потребительские продукты. Это не тонко. Это комплекс Бога, объявленный явно его собственными архитекторами.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/35-Neuralink_Telepathy.mp4\"\u003eNeuralink Telepathy\u003c/a\u003e -- Продукт, названный в честь божественного атрибута\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/215-Brain_Machine_Interface.mp4\"\u003eBrain Machine Interface\u003c/a\u003e -- Оборудование комплекса Бога\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/67-Hive_Mind.mp4\"\u003eHive Mind\u003c/a\u003e -- Когда телепатия становится коллективным сознанием\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/43-Singularity_2030.mp4\"\u003eSingularity 2030\u003c/a\u003e -- Расписание к слиянию\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/495-Tower_Of_Babel_2.mp4\"\u003eTower Of Babel 2\u003c/a\u003e -- Древнее стремление перестроено\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e -- Достижение за божественность\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/105-The_Second_Adam.mp4\"\u003eThe Second Adam\u003c/a\u003e -- Тот, кто пришел не захватить, а служить\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"дальнейшие-исследования\"\u003eДальнейшие исследования\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/neuralink-brain-chips-exponential/?lang=ru\"\u003eElon Musk's Neuralink Brain Chips Goes Exponential\u003c/a\u003e -- Экспоненциальное ускорение технологии мозговых чипов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/kurzweil-merging-humans-ai/?lang=ru\"\u003eRay Kurzweil MIT Speech: Merging Humans With AI by 2030\u003c/a\u003e -- Идеологическая структура за комплексом Бога\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/att-patent-surveil-brain/?lang=ru\"\u003eAT\u0026#x26;T Patent To Surveil and Hack Your Brain Waves\u003c/a\u003e -- Корпоративные претензии на когнитивный суверенитет\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/hive-mind-collective-consciousness/?lang=ru\"\u003eHive Mind: The End of Individual Consciousness\u003c/a\u003e -- Коллективное сознание, которое Neuralink позволяет\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eБог всеведущ. Neuralink предлагает телепатию. Бог всемогущ. Neuralink предлагает телекинез. Бог вечен. Трансгуманизм предлагает цифровое бессмертие. Образец неоспорим: каждый божественный атрибут технологически контрфактически и продан как продукт. \"Б
