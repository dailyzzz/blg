лоти, но против начальств, против властей, против мироправителей тьмы века сего, против духов злобы поднебесных.\"\u003c/em\u003e — Ефесянам 6:10-12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Не должно находиться у тебя никого, кто проводил бы сына своего или дочь свою чрез огонь, прорицателя, гадателя, ворожея или чародея, и вызывателя мертвецов. Ибо мерзок пред Господом всякий, делающий это.\"\u003c/em\u003e — Второзаконие 18:10-12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБог перечислил каждую категорию оккультной практики и назвал их всех мерзостью. Не ошибка. Не культурная любопытство. Не безвредное духовное исследование. Мерзость. Еврейское слово — \"toevah\" — что-то совершенно мерзостное, что-то, что провоцирует божественный гнев, что-то такое грехопадческое к природе бога, что это должно быть полностью отделено от его народа.\u003c/p\u003e\n\u003cp\u003eДжон Рамирез практиковал каждый единственный из этих мерзостей. Прорицание. Чарование. Колдовство. Шармирование. Консультирование знакомых духов. Волшебство. Некромантия. Он не практиковал их случайно или экспериментально. Он практиковал их профессионально, систематически и под прямой авторизацией духов-принципальностей. Его свидетельство раскрывает, что эти древние практики, перечисленные Мойсеем более трёх тысяч лет назад, живы и процветают в современной Америке — не в теньях, но в домах докторов, адвокатов, судей и школьных главных.\u003c/p\u003e\n\u003cp\u003eСвидетельство Хоуарда Питтмана о пятиярусной демонической иерархии предоставляет организационную схему. Иезуитская инфильтрация, документированная в \u003cem\u003eCatholic Confidential\u003c/em\u003e, предоставляет институциональный каркас. И Джон Рамирез предоставляет оперативную деталь, как царство дьявола функционирует в Америке сегодня.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Transgression — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ритуалы-крови-валюта-царства-тьмы\"\u003eРитуалы крови: валюта царства тьмы\u003c/h2\u003e\n\u003ch3 id=\"убийство-животных-и-питие-крови-каждую-неделю\"\u003eУбийство животных и питие крови каждую неделю\u003c/h3\u003e\n\u003cp\u003eНаиболее вязкий элемент свидетельства Рамиреза — кровь. Он убивал животных и пил их кровь КАЖДУЮ НЕДЕЛЮ. Это не было случайным. Это не было церемониальным, как церковь соблюдает причастие один раз месяц. Это было еженедельно — обычная, требуемая практика в его служении дьяволу.\u003c/p\u003e\n\u003cp\u003eОн также разрезал себя и пил собственную кровь. Смешивание крови животного и человеческой крови в ритуальной практике — старо, как язычество. Левит 17:11 указывает: \"Ибо жизнь плоти в крови.\" Это — не просто биологическое наблюдение. Это духовный принцип. Кровь несёт силу жизни. Кровь — средство заветов. Бог установил завет крови с Авраамом. Бог требовал кровное жертву в скинии. Иисус Христос пролил свою кровь как финальное, совершенное жертво.\u003c/p\u003e\n\u003cp\u003eДьявол, который подделывает всё, что бог создаёт, также требует крови. Но где завет крови бога ведёт к жизни, завет крови дьявола ведёт к смерти. Где кровь Иисуса очищает от греха, кровь, требуемая дьяволом, углубляет порабощение греха. Где чаша причастия представляет свободу, питие крови в колдовстве представляет порабощение.\u003c/p\u003e\n\u003cp\u003eКаждую неделю. Кровь животного. Собственная кровь. За более чем два десятилетия. Это цена служения дьяволу. Он не даёт власть бесплатно. Он требует кровь. И кровь, которую он требует, должна течь непрерывно — потому что, в отличие от крови Иисуса, которая была пролита один раз за всё (Евреям 9:12), подделка завета дьявола требует постоянного обновления. Порабощение никогда не завершено. Контракт никогда не удовлетворён. Дьявол всегда требует больше.\u003c/p\u003e\n\u003ch3 id=\"духовная-экономика-крови\"\u003eДуховная экономика крови\u003c/h3\u003e\n\u003cp\u003eПонимание ритуалов крови требует понимания духовной экономики, в которой они действуют. В экономике бога, Иисус пролил свою кровь один раз и это достаточно для всех времён, для всех людей, для всех грехов. Транзакция завершена. \"Совершилось\" (Иоанн 19:30).\u003c/p\u003e\n\u003cp\u003eВ экономике дьявола, кровь должна продолжать течь. Каждую неделю, больше животных должны быть убиты. Каждую неделю, больше разрезов должны быть сделаны. Каждую неделю, больше крови должны быть потребления. Это потому, что дьявол не имеет творческой силы. Он не может произвести духовную валюту. Он может только украсть её, подделать её и потребить её. Ритуалы крови — это попытка дьявола получить доступ к духовной силе, которая находится в крови — но без авторитета, который только бог обладает, чтобы сделать эту кровь эффективной.\u003c/p\u003e\n\u003cp\u003eЭто почему кровь Иисуса столь мощна против колдовства. Когда Рамирез попытался убить женщину-христианку через двадцать один день ритуала и двадцать один чёрных свечи и коробку гроба — и это не удалось — это не удалось потому, что кровь Иисуса, которая покрывала ту женщину, имела больше авторитета, чем кровь каждого животного Рамирез когда-либо убивал. Кровная экономия дьявола не может конкурировать с кровным заветом бога. Она никогда не могла. Она никогда не будет.\u003c/p\u003e\n\u003ch2 id=\"профессионалы-колдовство-между-элитой\"\u003eПрофессионалы: колдовство между элитой\u003c/h2\u003e\n\u003ch3 id=\"доктора-адвокаты-судьи-полицейские-офицеры-и-школьные-главные\"\u003eДоктора, адвокаты, судьи, полицейские офицеры и школьные главные\u003c/h3\u003e\n\u003cp\u003eОдно из наиболее тревожащих откровений в свидетельстве Рамиреза — состав его демонического круга. Это были не маргинализированные люди. Это были не бездомные наркоманы или психически больные отверженцы. Его круг включал докторов, адвокатов, судей, полицейских офицеров, школьных главных и певцов.\u003c/p\u003e\n\u003cp\u003e\"Они все были в колдовство.\"\u003c/p\u003e\n\u003cp\u003eЭто высказывание разрушает культурное предположение, что колдовство — это область невежественного, суеверного или отчаянного. Люди, которых служил рядом Рамирез, имели позиции власти и влияния. Они сделали медицинские решения об пациентов. Они воспроизводили юридические судьба в залах суда. Они применили законы на улицах. Они образовали детей в школах. И они служили дьяволу.\u003c/p\u003e\n\u003cp\u003eДумайте о последствиях. Судья, который практикует колдовство, сидит в суде над вашим семейным делом. Доктор, который служит дьяволу, рассматривает вашего ребёнка в больнице. Школьный главный, который участвует в ритуалах крови, надзирает образование ваших детей. Полицейский офицер, который отвечает принципальным демонам, реагирует на ваш срочный вызов.\u003c/p\u003e\n\u003cp\u003eЭто не паранойя. Это свидетельство человека, который был в комнате с ними. Который практиковал рядом с ними. Который знал их имена, их профессии и их демонические назначения. Инфильтрация оккультного в американскую профессиональную жизнь — не теоретическая. Это свидетельствовано кем-то, который был частью этого.\u003c/p\u003e\n\u003ch3 id=\"связь-к-иезуитской-инфильтрации\"\u003eСвязь к иезуитской инфильтрации\u003c/h3\u003e\n\u003cp\u003eПаттерн, который описывает Рамирез — оккультные практики встроены в позиции институциональной власти — отражает точно то, что \u003cem\u003eCatholic Confidential\u003c/em\u003e документирует о иезуитах. Иезуиты инфильтрировали \"замаскированные как художники, издатели, писатели, школьные учителя.\" Они позиционировали себя в учреждения власти и влияния. Они действовали в тайне, в то время как предоставляя уважаемый публичный фасад.\u003c/p\u003e\n\u003cp\u003eВедьмы и волшебники в круге Рамиреза сделали то же самое. День, они были профессионалы — уважаемые, доверенные, авторитетные. Ночь, они практиковали ритуалы крови, консультировались с демонами и выполняли задачи против церкви и против людей. Двойной образ жизни паттерн идентичный. Разница просто в ярлыке: иезуит или ведьма, метод — инфильтрация, и мастер — то же самое.\u003c/p\u003e\n\u003ch2 id=\"демоническая-книга-только-три-копии-в-америке\"\u003eДемоническая книга: только три копии в Америке\u003c/h2\u003e\n\u003ch3 id=\"символы-демонов-и-принципальностей\"\u003eСимволы демонов и принципальностей\u003c/h3\u003e\n\u003cp\u003eРамирез обладал чем-то, что только два других человека в Америке имели: специальной демонической книгой, содержащей символы различных демонов и принципальностей. Эта книга не была доступна в любом оккультном книжном магазине. Она не была продана в интернете. Это было не что-то вы могли приобрести через любопытство или случайное участие.\u003c/p\u003e\n\u003cp\u003eКнига должна была быть подписана самим дьяволом. Это означает, что дьявол личного авторизировал каждую копию. Специфичность этой авторизации — только три копии во всей Америке — указывает стратегическую ценность этой книги и уровень доверия, требуемого для обладания ей.\u003c/p\u003e\n\u003cp\u003eСимволы в книге не были декоративные. Они были оперативные. Каждый символ соответствовал определённому демону или принципальности. Каждый символ функционировал как призыв — способ вызвать, общаться с или направить определённого объекта. Книга была, в действительности, команда и управленческим руководством для демонической войны.\u003c/p\u003e\n\u003cp\u003eСравните это к библии. Библия содержит имена и атрибуты бога. Она содержит слова Христа. Она функционирует как руководство верующего для духовной жизни и войны. Книга дьявола — это подделка — содержащая имена и символы его объектов, функционирующие как руководство практика для духовного разрушения.\u003c/p\u003e\n\u003cp\u003eТолько три человека в Америке имели эту книгу. Рамирез был один из них. Это говорит нам что-то о его рангу в царстве дьявола. Он не был рядовым. Он не был среднеуровневым оперативником. Он был одним из наиболее доверенных и высоко разместённых слуг, который дьявол имел в нации.\u003c/p\u003e\n\u003ch2 id=\"демонический-свадьба-женат-на-хеллоуин\"\u003eДемонический свадьба: женат на Хеллоуин\u003c/h2\u003e\n\u003ch3 id=\"свадьба-посещённая-демонами\"\u003eСвадьба, посещённая демонами\u003c/h3\u003e\n\u003cp\u003eРамирез женился на Хеллоуин — ночь, когда оккультный календарь достигает своего пика, когда духовные барьеры между природным и сверхъестественным предполагаются быть тончайшем, когда царство тьмы праздники её наиболее святой день.\u003c/p\u003e\n\u003cp\u003eНо это была не обычная свадьба. Церемония была посещена демонами и принципальностями со всего мира. Никакие человеческие существа не присутствовали. Невеста была ведьмой. Жених был поклонником дьявола. И гости были духовными объектами, которые они служили — падшие ангелы, принципальные духи и демоны, которые путешествовали от их территориальных назначений по всему земному шару, чтобы свидетельствовать это единство.\u003c/p\u003e\n\u003cp\u003eЭто свидетельство раскрывает несколько вещей. Во-первых, что демоническое царство имеет церемонию. Это имеет ритуал. Это имеет социальную структуру. Демоны посещают события. Они признают браки. Они отмечают альянсы. Царство тьмы не хаос — это организованный, иерархический и церемониальный, отражающий структуру неба в коррумпированной форме.\u003c/p\u003e\n\u003cp\u003eВо-вторых, что брак в демоническом царстве функционирует как завет — связующие два практика вместе в общем служении, общей силе и общем назначении. Рамирез не был просто женат на женщине. Он образовал стратегический альянс между двумя высокоранговыми слугами дьявола, комбинирующими их демонический авторитет и ресурсы для большей эффективности.\u003c/p\u003e\n\u003cp\u003eВ-третьих, что область была международной. Демоны и принципальности прибыли со всего мира. Это подтверждает описание Питтманом глобально организованной демонической иерархии. Царство дьявола не локально. Это не региональное. Это планетарное. И его агенты — как духовные так и человеческие — действуют в скоординированных сетях, которые охватывают каждую нацию.\u003c/p\u003e\n\u003ch3 id=\"обучение-следующего-поколения\"\u003eОбучение следующего поколения\u003c/h3\u003e\n\u003cp\u003eЖена Рамиреза была ведьмой. Он тренировал его дочь, чтобы быть одной. Генеральный паттерн, который порабощал его семью — его отец-сторона все существующие ведьмы и волшебники — было быть умышленно воспроизводимо. Это как царство тьмы держит себя. Не просто через вербовку, но через генеральную передачу.\u003c/p\u003e\n\u003cp\u003eТолько как завет Авраама с богом был перейден Исааку, тогда к Джейкобу, тогда к двенадцати племенам — завет дьявола перейден от родителя к ребёнку, от поколения к поколению. Грехи отцов посещены на детей к третьему и четвёртому поколению (выход 20:5). Это не метафора. Это механизм. Генеральные заветы — ли с богом или с дьяволом — носят реальный духовный авторитет и реальные духовные последствия.\u003c/p\u003e\n\u003ch2 id=\"попытанное-человеческое-жертво\"\u003eПопытанное человеческое жертво\u003c/h2\u003e\n\u003ch3 id=\"команда-дьявола-убить\"\u003eКоманда дьявола убить\u003c/h3\u003e\n\u003cp\u003eДьявол сказал Рамирезу убить человека на крыше. Это не было метафорическим назначением. Это была буквальная команда совершить человеческое жертво — окончательное выражение преданности в царстве тьмы, практика, которая бог называет наиболее мерзостным из всех мерзостей.\u003c/p\u003e\n\u003cp\u003eРамирез был оборудован для задачи. Он имел девять мачете и больше чем сто фунтов оружия. Он пошёл на крышу. Он нашёл человека. Он схватил его.\u003c/p\u003e\n\u003cp\u003eИ человек просто исчез.\u003c/p\u003e\n\u003cp\u003eИсчезнул. Ушёл. Человек был физически присутствен один момент и ушёл следующему. Рамирез не мог завершить жертво, потому что бог вмешался — не через проповедь, не через тракт, не через молитвенное совещание, но через прямой сверхъестественный акт, который удалил предусмотренную жертву из рук убийцы.\u003c/p\u003e\n\u003cp\u003eЭто событие раскрывает предел власти дьявола. Он может командовать. Он может назначить. Он может оборудовать. Он может мотивировать. Но он не может переопределить защиту бога. Когда бог решает, что человек не умрёт, никакой поклонник дьявола, никакая принципальность и никакое количество мачете не могут изменить этот результат. \"Никакое оружие, которое образовано против тебя, не преуспеет\" (исайя 54:17) — не потому, что оружие не реально, но потому, что бог, который покрывает его людей, больше, чем враг, который атакует их.\u003c/p\u003e\n\u003ch2 id=\"неудачное-колдовство-против-христианина\"\u003eНеудачное колдовство против христианина\u003c/h2\u003e\n\u003ch3 id=\"двадцать-один-день-ритуала--и-это-не-удалось\"\u003eДвадцать один день ритуала — и это не удалось\u003c/h3\u003e\n\u003cp\u003eЖенщина пришла к Рамирезу и просила его убить другую женщину через колдовство. Он согласился. Он купил коробку гроба. Он установил двадцать один чёрный свечи. Он выполнил ритуал смерти за двадцать один последовательный день. Каждый протокол был следован. Каждо требование демона было встречено. Ритуал был выполнен с точностью человека, который был практиковать десятилетия.\u003c/p\u003e\n\u003cp\u003eЦель не умерла.\u003c/p\u003e\n\u003cp\u003eОна была ХРИСТИАНИН. Она была защищена Иисусом Христом. Кровь Иисуса покрывала её. Мощь её отношений с богом была больше, чем мощь двадцати одного дня колдовства, двадцати одного чёрного свечи, коробки гроба и демонического авторитета одного из наиболее высоко-ранговых поклонников дьявола в Америке.\u003c/p\u003e\n\u003cp\u003eРезюме Рамиреза из этого опыта является разрушительным в его ясности: \"Что угодно, что не покрыто Иисусом Христом, легко быть сняте вниз.\"\u003c/p\u003e\n\u003cp\u003eПрочитайте это снова. \"Что угодно, что НЕ ПОКРЫТО Иисусом Христом, является ЛЕГКИМ ЦЕЛЕВЫМ, чтобы быть принесено вниз.\" Не трудное целевое. Не вызывающее целевое. ЛЕГКОЕ целевое. Единственное, что делает человека трудным — или невозможным — для слуг дьявола разрушить, — это покрытие Иисуса Христа. Без этого покрытия, вы открыты. С ним, вы неприкасаемы.\u003c/p\u003e\n\u003cp\u003eЭто то же самое принцип, продемонстрированный стеной огня около молодёжной группы Никки Крус. То же самое принцип, продемонстрированный человеком, который исчез с крыши. То же самое принцип, который бежит через каждое духовное военное прохождение в писании: кровь Иисуса — это покрытие верующего, и без это, есть никакая защита.\u003c/p\u003e\n\u003ch2 id=\"смерть-отца-дьявол-как-папа\"\u003eСмерть отца: дьявол как \"папа\"\u003c/h2\u003e\n\u003ch3 id=\"молится-дьяволу-убить-его-отца\"\u003eМолится дьяволу убить его отца\u003c/h3\u003e\n\u003cp\u003eОтец Рамиреза был застрелена в ночном клубе в возрасте тридцати трёх. Это не была случайная акт насилия. Рамирез молился — молился дьяволу — для его отца быть убитым. И дьявол одобрил.\u003c/p\u003e\n\u003cp\u003eДьявол сказал Рамирезу, что он \"заменит старого.\" Отец, который вводил его в оккультное, который поклонялся дьяволу часами в семейном доме, который начал генеральную передачу демонического завета — тот отец был теперь расходовым. Дьявол имел сын. Отец уже был не нужен.\u003c/p\u003e\n\u003cp\u003eПосле смерти его отца, дьявол стал \"папой\" Рамиреза. Это, возможно, наиболее раскрывающий элемент всего свидетельства. Дьявол не просто хочет поклонения. Он не просто хочет послушания. Он хочет быть вашим отцом. Он хочет заполнять наиболее глубокую человеческую потребность — потребность в отце-любви, отца-защиты, отца-руководства — с его собственным подделанным присутствием.\u003c/p\u003e\n\u003cp\u003eИисус назвал бога \"абба\" — отец. Дьявол ищет тот же ярлык. Он хочет быть папой. Он хочет близость, доверие, верность и зависимость, которую ребёнок дарует отцу. И за двадцать пять лет, Рамирез дал её ему — потому что никто ещё в его жизни не заполнил эту роль.\u003c/p\u003e\n\u003cp\u003eЭто почему евангелие должна быть больше, чем информация. Это должна быть отношения. Джон Рамирез не нуждался слышать, что бог существовал. Он уже знал, что духовное царство было реально. Он нуждался испытывать любовь отца, который никогда не выдаст его, никогда не отбросит его и никогда не потребует его кровь как цена отношений. Он нуждался том, что дьявол никогда не могу дать: подлинная, безусловная, жертвенная любовь.\u003c/p\u003e\n\u003cp\u003eИ когда он нашёл это — через христиан, которые продемонстрировали это, через святого духа, который изливал это в его сердце — удержание дьявола было разбито. Потому что никакой контракт не может выстоять против любви бога. Никакой завет не может переопределить кровь Иисуса. И никакая принципальность не может стоять против отца, который приходит требовать свой ребёнок назад.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003eПЛАЦЕБО: Проснитесь, церковь! Хоуард Питтман\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eСвидетельство бывшего поклонника Сатаны Джона Рамиреза\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Transgression — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/51-The_Covenant_Blood.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Covenant Blood — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Darkness Into Light — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Enemy Within — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/devil-worshipper-john-ramirez-testimony/?lang=ru\"\u003eОт поклонника дьявола к спасению: свидетельство Джона Рамиреза\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/why-satan-doesnt-fear-most-christians/?lang=ru\"\u003eПочему сатана не боится большинства христиан: исповедь поклонника дьявола\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/demonic-hierarchy-satans-military/?lang=ru\"\u003eДемоническая иерархия: демонская военная структура сатаны раскрыта\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/wake-up-church-narrow-gate/?lang=ru\"\u003eПроснитесь, церковь: узкие ворота уже, чем вы думаете\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eКолдовство, которое практиковал Джон Рамирез, не является древней историей. Это не иностранное явление. Это действует в Америке сегодня — в больницах, залах суда, школах и полицейских отделениях. Профессионалы, которые служат дьяволу, идут среди нас в костюмах и робах и значках. Они убивают животных и пьют кровь каждую неделю. Они имеют демонические книги, подписанные самим дьяволом. Они входят в брак в церемониях, посещённых принципальностями со всего мира. И они целью каждого, кто представляет Иисуса Христа — если только тот человек не покрыт его кровью. Контракт с дьяволом реален. Но завет с богом сильнее. Вопрос — какой покрывает вас?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Контракт с дьяволом: как колдовство работает в Америке сегодня\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Бывший поклонник сатаны Джон Рамирез раскрывает, как колдовство действует в Америке — ритуалы крови, демонические книги и профессионалы, которые служат дьяволу.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2
