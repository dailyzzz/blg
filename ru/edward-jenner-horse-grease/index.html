003cp\u003eИстория Эдварда Дженнера и вакцины коровьей оспы — это миф происхождения современной медицины. Но что если сам миф ещё более мошеннический, чем нам говорили? Что если материал, который Дженнер использовал для \"вакцинации\" Джеймса Фиппса в 1796 году, был вовсе не коровьей оспой — но конской мазью, нагноившейся болезнью лошадей, не имеющей никакого отношения к аккуратному нарративу дойных дев и иммунитета?\u003c/p\u003e\n\u003cp\u003eСвязь конской мази не является фringeной теорией. Она исходит из собственных писаний Дженнера, из наблюдений его современников и из исторического рекорда, который медицинское учреждение очень усердно работало, чтобы затемнить. Когда вы следуете за этой нитью, весь основной нарратив вакцинации распутывается — раскрывая не момент научного гения, а мошенничество, построенное на путанице, загрязнении и умышленной обмане.\u003c/p\u003e\n\u003cp\u003eГовард Питман был сказано во время его NDE, что обман является основным оружием демонической иерархии. Три неба — атмосферное, демоническое и божественное — составляют духовную архитектуру, в которой эта война развёртывается. Миф вакцинации находится в демоническом царстве: он появляется как свет (исцеление, защита, прогресс), но служит тьме (контроль, прибыль, нарушение тела). 97,5% терпящих неудачу и 95% служащих \"себе\" поддерживаются в их неудаче мифами, подобными этому.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов с его \"абсолютной властью\" (Наполеон), его инфильтрацией \"завуалированной хитрости\" (Catholic Confidential) и его практикой \"каждого вида порока\", предоставляет организационный шаблон для вакцинной промышленности. Папа Климент XIV был отравлен за противодействие им. Джон Адамс предупредил об их \"вечном проклятии.\" Нарратив вакцины, который они помогли построить, отравил миллиарды.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"проблема-конской-мази\"\u003eПроблема конской мази\u003c/h2\u003e\n\u003ch3 id=\"собственное-признание-дженнера\"\u003eСобственное признание Дженнера\u003c/h3\u003e\n\u003cp\u003eВ своих оригинальных писаниях Эдвард Дженнер не утверждал, что коровья оспа одна обеспечивала иммунитет к оспе. Он писал обширно о \"мази\" — болезни лошадей, характеризующейся сочащимися, пустулярными поражениями на пятах лошадей. Дженнер верил, что мазь была передана от лошадей к коровам (через руки фермеров), где она становилась коровьей оспой, которая затем обеспечивала иммунитет к оспе.\u003c/p\u003e\n\u003cp\u003eЭта цепь — конская мазь к коровьей оспе к иммунитету оспе — была фактической теорией Дженнера. Это не был аккуратный \"дойная дева имела коровью оспу, коровья оспа предотвращает оспу\" нарратив, преподаваемый в школах. Конь был центральным в мышлении Дженнера, и материал, который он использовал для вакцинации, возможно, пришёл непосредственно от лошадей, а не от поражений коровьей оспы у доярок.\u003c/p\u003e\n\u003ch3 id=\"что-такое-конская-мазь\"\u003eЧто такое конская мазь?\u003c/h3\u003e\n\u003cp\u003eКонская мазь (более правильно называемая \"чесотка пятки\" или \"обморозы\") — это дерматологическое состояние, поражающее нижние ноги лошадей. Оно производит:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСочащиеся, нагноившиеся поражения\u003c/li\u003e\n\u003cli\u003eКорковидная, грубая ткань\u003c/li\u003e\n\u003cli\u003eЗловонные выделения\u003c/li\u003e\n\u003cli\u003eБоль и хромота\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСостояние вызывается комбинацией бактериальной инфекции, грибковой инфекции и плохой гигиены в конюшне окружающей среды. Оно не вызывается конкретным вирусом. Материал из поражений мази содержал бы сложный микс бактерий, грибов, мёртвой ткани и воспалительной жидкости — не одного вирусного агента.\u003c/p\u003e\n\u003cp\u003eКогда Дженнер или его последователи использовали этот материал для вакцинации, они инъецировали пациентов с коктейлем конских патогенов и воспалительного материала. Любой \"иммунный ответ\", производимый такой инъекцией, был бы ответом на сам инородный материал — не целенаправленный ответ на конкретный вирус.\u003c/p\u003e\n\u003ch3 id=\"цепь-загрязнения\"\u003eЦепь загрязнения\u003c/h3\u003e\n\u003cp\u003eИсторический рекорд раскрывает, что ранний вакцинный материал был запутанным беспорядком:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОригинальный источник неясен\u003c/strong\u003e: Был ли материал из лошадей (мази), коров (коровьей оспы) или какого-то другого источника, часто было неясно. Разные практикующие использовали разные материалы и называли их все \"вакциной.\"\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПерекрестное загрязнение неизбежно\u003c/strong\u003e: Материал был передан от руки к руке через десятки или сотни людей, накапливая бактериальные и вирусные загрязнители на каждом шаге. Оригинальный исходный материал — что бы это ни было — был быстро перекрыт накопленными загрязнителями.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЗагрязнение сифилисом\u003c/strong\u003e: Техника от руки к руке передавала сифилис вместе с вакцинным материалом. Задокументированные сифилисные вспышки от вакцинации произошли на протяжении девятнадцатого века.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eНикакого контроля качества\u003c/strong\u003e: Не было стандартов для производства вакцины, никакого тестирования на чистоту, и никакого способа проверить, что материал, используемый, был тем, как он утверждался.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"современники-дженнера-знали\"\u003eСовременники Дженнера знали\u003c/h3\u003e\n\u003cp\u003eСвязь конской мази Дженнера не была скрыта — она была открыто обсуждена и критикована его современниками:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eД-р Джордж Липском\u003c/strong\u003e заметил, что теория Дженнера требовала маловероятной цепи передачи от лошади к корове к человеку\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eД-р Чарльз Крайтон\u003c/strong\u003e, один из наиболее уважаемых эпидемиологов девятнадцатого века, писал обширно о путанице между коровьей оспой, конской мазью и другими условиями в работе Дженнера\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАльфред Рассел Уоллес\u003c/strong\u003e, открыватель естественного отбора, опубликовал детальные критики вакцинации, показывающие, что её предполагаемые преимущества были иллюзорными\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти критики не были нелюбимыми научными чудаками. Они были уважаемыми медицинскими профессионалами и учёными, которые изучили доказательства Дженнера и нашли их неадекватными. Они были подавлены, отмаршированы и в конечном итоге стёрты из истории медицины — потому что их критики угрожали нарративу вакцины, который стал слишком прибыльным и слишком политически полезным, чтобы быть отброшенным.\u003c/p\u003e\n\u003ch2 id=\"машина-мифотворчества\"\u003eМашина мифотворчества\u003c/h2\u003e\n\u003ch3 id=\"как-был-конструирован-нарратив\"\u003eКак был конструирован нарратив\u003c/h3\u003e\n\u003cp\u003eТрансформация неясных, противоречивых и в конечном итоге неудачных экспериментов Дженнера в героическую историю происхождения современной медицины требовала десятилетий умышленного мифотворчества:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 1: Упростите историю\u003c/strong\u003e. Связь конской мази была тихо отброшена из общественного нарратива. История была упрощена до: дойная дева имела коровью оспу, Дженнер вакцинировал мальчика, оспа была покорена. Простая, запоминающаяся, вдохновляющая — и ложная.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 2: Подавьте неудачи\u003c/strong\u003e. Случаи Дженнера включали неудачи — вакцинированные субъекты, которые заразились оспой. Эти случаи были объяснены, минимизированы или просто не упомянуты в популяризированных рассказах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 3: Замешивайте корреляцию с причинностью\u003c/strong\u003e. Оспа была в упадке из-за улучшенной санитарии, питания и условий жизни. Вакцинация была введена во время упадка и получила честь за упадок. Это классический post hoc ergo propter hoc — логическая ошибка предположения, что потому что B следовал за A, A вызвал B.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 4: Криминализируйте несогласие\u003c/strong\u003e. Законы об обязательной вакцинации сделали отказ уголовным преступлением. Антивакцинные общества были демонизированы. Медицинские профессионалы, которые оспаривали вакцинацию, были остракизированы. Нарратив был принудительно не через доказательства, а через власть.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 5: Установите прецедент\u003c/strong\u003e. Как только общественность приняла, что государство могло требовать вакцинацию для оспы, прецедент был установлен для всех будущих мандатов. Каждая последующая вакцина — неважно, как плохо тестируемая, как ненужная или как опасная — могла быть мандирована, цитируя прецедент оспы.\u003c/p\u003e\n\u003ch2 id=\"духовное-архитектура\"\u003eДуховное архитектура\u003c/h2\u003e\n\u003ch3 id=\"принцип-инверсии\"\u003eПринцип инверсии\u003c/h3\u003e\n\u003cp\u003eСатана работает через инверсию: добро становится злом, истина становится ложью, исцеление становится вредом. Нарратив вакцины оспы — это совершенная инверсия:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЗагрязненный животный гной\u003c/strong\u003e называется \"медициной\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПередача болезни\u003c/strong\u003e через вакцинацию называется \"профилактикой\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПринудительное нарушение тела\u003c/strong\u003e называется \"общественным здоровьем\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПриобретённый медицинский диплом\u003c/strong\u003e становится \"научным гением\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНеудачные эксперименты\u003c/strong\u003e становятся \"чудесным открытием\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eГовард Питман видел, что демоническое царство организовано вокруг этих инверсий. Духовные силы, которые противостоят Богу, не создают — они развращают. Они берут дизайн Бога (человеческое тело, целое и полное) и развращают его (инъецируя его болезненным животным веществом и называя это здоровьем).\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — детальное исследование связи конской мази Дженнера и происхождения вакцины\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — духовная война и принцип инверсии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Иезуитские глобальные миссионерские и медицинские сети\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- Эдвард Дженнер, \u003cem\u003eAn Inquiry into the Causes and Effects of the Variolae Vaccinae\u003c/em\u003e (1798
