\u003c/blockquote\u003e\n\u003cp\u003eПисание говорит нам, что мудрость начинается с готовностью слушать — получать совет, учиться у тех, кто видел больше, обращать внимание на предупреждения опытных. Но что происходит, когда самые мудрые люди своего времени выпускают предупреждения и вся цивилизация отказывается их слушать? Что происходит, когда президенты, генералы, императоры и даже папы определяют одну и ту же угрозу, описывают ее в почти идентичных терминах, и мир игнорирует каждого из них?\u003c/p\u003e\n\u003cp\u003eИстория иезуитских предупреждений — это история намеренной глухоты. С восемнадцатого века дальше самые мощные и наиболее информированные люди западного мира — люди с доступом к разведывательным сетям, дипломатической корреспонденции и внутренним работам правительства — определили Общество Иисуса как наиболее опасную организацию на земле. Они не шептали эти предупреждения в частном порядке. Они писали их в письма, говорили их в открытом, и в некоторых случаях ставили свои репутации и жизни на правду того, что они сказали. И каждый из них был проигнорирован. Некоторые были убиты.\u003c/p\u003e\n\u003cp\u003eДокументальный фильм \u003cem\u003eCatholic Confidential\u003c/em\u003e составляет эти предупреждения в опустошающий портрет организации, которая была определена, выставлена и предупреждена самыми доверенными свидетелями в истории — и которая пережила каждое разоблачение, потому что мир отказывается верить тому, что его собственные лидеры рассказали ему.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eIlluminati Founding Fathers — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"джон-адамс-вечное-осуждение-на-земле-и-в-аду\"\u003eДжон Адамс: \"Вечное осуждение на земле и в аду\"\u003c/h2\u003e\n\u003ch3 id=\"предупреждение-отца-основателя\"\u003eПредупреждение отца-основателя\u003c/h3\u003e\n\u003cp\u003eДжон Адамс, второй президент Соединенных Штатов, был одним из самых ученых людей в американской истории. Юрист, дипломат и политический философ, Адамс посвятил свою жизнь изучению правительства, власти и сил, которые угрожают свободе. Его личная переписка раскрывает человека, который понимал угрозу иезуитов с необыкновенной ясностью.\u003c/p\u003e\n\u003cp\u003eВ письме 1816 года Томасу Джефферсону — письмо между двумя бывшими президентами, двумя людьми, которые возглавляли американскую революцию и сформировали новую республику — Адамс писал с срочностью, которая все еще поражает два столетия спустя:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Моя история иезуитов не написана красноречиво, но она поддерживается неоспоримыми авторитетами, является очень подробной и очень ужасной. Их восстановление действительно является шагом к темноте, жестокости, деспотизму, смерти.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eАдамс ссылался на восстановление иезуитского ордена Папой Пием VII в 1814 году, всего два года перед этим письмом. Орден был подавлен Папой Климентом XIV в 1773 году — подавлен самим папой, человеком, который должен был быть его верховным авторитетом. И теперь это было восстановлено. Адамс увидел это восстановление не как незначительный церковный ход, а как цивилизационную катастрофу — \"шаг к темноте, жестокости, деспотизму, смерти.\"\u003c/p\u003e\n\u003cp\u003eЕго оценка самих иезуитов была еще более разрушительной:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Мне не нравится внешний вид иезуитов. Если когда-либо было тело мужчин, которые заслуживали вечного осуждения на земле и в аду, это Общество Лойолы.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЭто не язык сектантского предубеждения. Это рассмотренное суждение одного из самых осторожных умов в американской истории, человека, который взвешивал его слова с юридической точностью. Адамс не сказал, что иезуиты были неправильно направлены. Он не сказал, что они были чрезмерно энтузиастичны. Он сказал, что они заслуживают вечного осуждения — на земле и в аду. Он использовал самый сильный возможный язык, потому что верил, что угроза оправдывала это.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"наполеон-бонапарт-власть-контролировать-мир\"\u003eНаполеон Бонапарт: \"Власть контролировать мир\"\u003c/h2\u003e\n\u003ch3 id=\"оценка-императора\"\u003eОценка императора\u003c/h3\u003e\n\u003cp\u003eНаполеон Бонапарт не был теологом. Он был военным гением, политическим стратегом и хозяином империи, которая простиралась от Испании до России. Его оценка иезуитов не была основана на религиозном предубеждении, а на военном анализе — анализе человека, который понимал власть лучше, чем почти кто-либо, кто когда-либо жил:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Иезуиты — это военная организация, а не религиозный орден. Их главой является генерал армии, а не просто отец-аббат монастыря. И целью этой организации является власть — абсолютная власть, универсальная власть, власть контролировать мир волей одного человека.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eНаполеон понимал то, что большинство людей пропускают: Общество Иисуса не является в первую очередь религиозной организацией. Это военная организация, которая использует религию как свое прикрытие. Его структура является военной — генерал, командующий офицерами, командующими солдатами. Его дисциплина является военной — абсолютное послушание, беспрекословное выполнение приказов. Его стратегия военная — инфильтрация, сбор разведки, манипуляция противников и терпеливое накопление решающего преимущества.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"авраам-линкольн-зловещее-влияние-иезуитов\"\u003eАвраам Линкольн: \"Зловещее влияние иезуитов\"\u003c/h2\u003e\n\u003ch3 id=\"президент-назвавший-своих-убийц\"\u003eПрезидент, назвавший своих убийц\u003c/h3\u003e\n\u003cp\u003eАвраам Линкольн запомнен как президент, который сохранил Союз и освободил рабов. То, что не запомнено — что было систематически подавлено — так это то, что Линкольн определил иезуитов как силу, стоящую за гражданской войной, и предсказал свое собственное убийство в их руках.\u003c/p\u003e\n\u003cp\u003eСлова Линкольна, как задокументировано в \u003cem\u003eCatholic Confidential\u003c/em\u003e и сохранено в исторических записях, неоспоримы:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Эта война никогда не была бы возможна без зловещего влияния иезуитов.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eГражданская война в Америке — кровавейший конфликт в американской истории, война, убившая более 600 000 мужчин — была не, по словам сидящего президента Соединенных Штатов, естественным результатом политического разногласия. Она была спроектирована. Она была сделана возможной \"зловещим влиянием\" конкретной организации. Линкольн не приписал войну одному рабству, или праве штатов, или экономическим различиям между Севером и Югом. Он приписал это преднамеренным махинациям Общества Иисуса.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"маркиз-де-лафайет-самые-коварные-опасные-враги\"\u003eМаркиз де Лафайет: \"Самые коварные, опасные враги\"\u003c/h2\u003e\n\u003ch3 id=\"предупреждение-французского-героя\"\u003eПредупреждение французского героя\u003c/h3\u003e\n\u003cp\u003eМаркиз де Лафайет, французский герой американской революции, человек, который сражался рядом с Вашингтоном для установления американской свободы, издал собственное предупреждение об угрозе иезуитов этой свободе:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Если свободы этой страны уничтожены, это будет по тонкости католического священника-иезуита, ибо они — самые коварные, опасные враги гражданской и религиозной свободы.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЛафайет не сказал, что свободы Америки \u003cem\u003eмогут\u003c/em\u003e быть уничтожены иезуитами. Он сказал, что если они уничтожены, это будет иезуитами. Он определил их как единственную наиболее опасную угрозу всему, что американская революция достигла — более опасную, чем любая иностранная армия, более опасную, чем любая внутренняя фракция, более опасную, чем любое политическое движение.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"папа-климент-xiv-это-подавление-будет-моей-смертью\"\u003eПапа Климент XIV: \"Это подавление будет моей смертью\"\u003c/h2\u003e\n\u003ch3 id=\"когда-даже-папа-не-был-в-безопасности\"\u003eКогда даже папа не был в безопасности\u003c/h3\u003e\n\u003cp\u003eНаиболее экстраординарный свидетель против иезуитов — это папа, который попытался их остановить. Папа Климент XIV, после лет давления со стороны католических монархов Европы — все из которых уже изгнали иезуитов из своих территорий — подписал папскую булу \u003cem\u003eDominus ac Redemptor\u003c/em\u003e 21 июля 1773 года, официально подавляя Общество Иисуса.\u003c/p\u003e\n\u003cp\u003eЭто было наиболее драматическим актом папского авторитета в современной истории. Папа — верховный главе католической церкви — объявил, что орден, основанный для служения папству, стал столь опасным, что его нужно растворить полностью. Каждый иезуитский дом должен быть закрыт. Каждый иезуит должен быть освобожден от его обетов. Общество Иисуса должно перестать существовать.\u003c/p\u003e\n\u003cp\u003eКлимент знал, что этот акт будет его стоить. Он сказал:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Подавление достигнуто. Я не раскаялся в этом... Но это подавление будет моей смертью.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eОн был прав. 22 сентября 1774 года Папа Климент XIV умер. Обстоятельства его смерти указывали на отравление. Его тело разлагалось с необычной скоростью — признак, в то время, отравления. Человек, который осмелился подавить иезуитов, заплатил за свою смелость с его жизнью.\u003c/p\u003e\n\u003cp\u003eПодумайте о том, что это означает. Папа — человек, иезуиты были теоретически поклялись повиноваться — был убит организацией, которую он попытался растворить. Викарий Христа, верховный понтифик, Епископ Рима — убитый потому, что бросил вызов власти Общества Иисуса. Если папа сам не был в безопасности от иезуитов, кто?\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"образец-молчания\"\u003eОбразец молчания\u003c/h2\u003e\n\u003ch3 id=\"почему-предупреждения-были-проигнорированы\"\u003eПочему предупреждения были проигнорированы\u003c/h3\u003e\n\u003cp\u003eНаиболее возмущающий аспект этой истории — это не сами предупреждения, а молчание, которое последовало за ними. Джон Адамс предупредил, и Америка продолжала приветствовать иезуитские учреждения. Наполеон предупредил, и Европа продолжала размещать иезуитские сети. Линкольн предупредил и был застрелен. Лафайет предупредил и был забыт. Климент XIV предупредил и был отравлен.\u003c/p\u003e\n\u003cp\u003eПочему? Как самые доверенные свидетели в истории могут издать самые срочные предупреждения и иметь эти предупреждения полностью проигнорированы?\u003c/p\u003e\n\u003cp\u003eОтвет лежит в самом иезуитском методе. Организация, которая работает через невидимую инфильтрацию, гарантирует, что учреждения, ответственные за коммуникацию предупреждений — средства массовой информации, университеты, издательства — уже находятся под ее влиянием. Предупреждение не может быть услышано, потому что каналы коммуникации уже были захвачены. Тревога не может быть звучена, потому что система тревоги уже была отключена.\u003c/p\u003e\n\u003cp\u003eЭто гений иезуитской стратегии. Они не просто инфильтрируют учреждения власти. Они инфильтрируют учреждения информации. Они контролируют не только то, что происходит, но и то, что людям разрешено знать о том, что происходит. Каждый президент, который предупредил об иезуитах, говорил общественности, которая уже была обусловлена — иезуитским образованием, средствами массовой информации и культурой — отклонить такие предупреждения как теория заговора, антикатолический предрассудок или историческая паранойя.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: выявленные позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eIlluminati Founding Fathers — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eOne Nation Under Blackmail — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Fallen Angels — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eMKUltra Never Ended — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/jesuit-oath-obedience-unto-death/?lang=ru\"\u003eThe Jesuit Oath: \"I Will Believe White Is Black If the Church Defines It\"\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/lincoln-napoleon-jesuit-wars/?lang=ru\"\u003eLincoln and Napoleon Both Named the Same Enemy — The Jesuits\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/black-pope-jesuit-general-rules-world/?lang=ru\"\u003eThe Black Pope: \"From This Chamber I Govern the World\"\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/constitution-secret-constitution-part5/?lang=ru\"\u003eThe Constitution and the Secret Constitution Part 5\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eАдамс написал это. Наполеон это сказал. Линкольн это объявил. Лафайет это предсказал. Климент XIV умер за это. Пять самых мощных и наиболее информированных людей в истории западного мира пришли к одному и тому же заключению об одной и той же организации — и мир закопал их свидетельство под двумя столетиями изготовленного молчания. Предупреждения не скрыты. Они находятся в письмах, речах, официальных записях. Проблема была никогда не отсутствием доказательств. Проблема — отсутствие смелости слышать то, что говорят доказательства.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/history/\",\"className\":\"catego
