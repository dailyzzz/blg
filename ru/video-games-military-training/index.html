то, что вы практикуете, вы становитесь. То, что вы репетируете, вы можете выполнить. То, что вы повторяете, вы интернализируете. Писание применяет этот принцип к праведному наставлению — обучение детей пути, по которому они должны идти. Военно-развлекательный комплекс применяет его к насилию — обучение детей пути, которым они должны убить. Видеоигры — не пассивные развлечения. Они — интерактивные системы обучения, которые развивают зрительно-моторную координацию, быстрое приобретение цели, тактическое принятие решений и эмоциональную десенсибилизацию, требуемую для военных операций. Это не интерпретация. Это указанная цель программ военно-проектируемого игрока.\u003c/p\u003e\n\u003cp\u003eСвязь между видеоиграми и военной подготовкой — не теория заговора. Это задокументированная, финансируемая, публично признанная программа, которая работает в течение десятилетий. Армия США, флот, морские пехотинцы и DARPA все инвестировали в технологию видеоигр — и явно заявили, что цель — развивать навыки, условия ответы и набирать персонал. Трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/111-The_Final_Day.mp4\"\u003eThe Final Day\u003c/a\u003e описывает кульминацию всей подготовки — день, когда то, что было репетировано, становится реальным. Для поколения, подготовленного на виртуальном насилии, финальный день — не далёкая абстракция. Это переход от экрана к реальности, что подготовка была разработана облегчить.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"армия-америки-своя-собственная-игра-военного\"\u003eАрмия Америки: своя собственная игра военного\u003c/h2\u003e\n\u003cp\u003eВ 2002 году Армия США выпустила \"America's Army\" — первый видеоигрок стрелялок, спроектированный, разработанный и распределённый Армией США как официальный инструмент набора и обучения. Игра была свободна скачать и доступна каждому с компьютером, включая детей.\u003c/p\u003e\n\u003cp\u003eAmerica's Army не была коммерческим продуктом с военным консультированием. Это был военный продукт, распределённый коммерчески. Разработанный MOVES Institute в Naval Postgraduate School, игра была спроектирована:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eНабирать.\u003c/strong\u003e Игра включала ссылки на сайты набора Армии. Игроки, которые продемонстрировали мастерство, были целены для посланий набора. Армия явно описала игру как инструмент набора, бюджетирующий её под расходами набора.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОбучать.\u003c/strong\u003e Игра включала реалистичную военную тактику, обращение оружием, координацию отряда и правила взаимодействия. Игроки узнали реальные военные процедуры через игровой процесс.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eДесенсибилизировать.\u003c/strong\u003e Представляя реалистичные сценарии боевых действий в игровом контексте, America's Army нормализовал опыт боевых действий для гражданских игроков, которые имели никакого военного опыта. Эмоциональное воздействие имитационного убийства было сокращено через повторение в среде без последствий.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAmerica's Army был загружен более 40 миллионов раз и был одной из наиболее игранных онлайн-игр её эры. Армия сообщила, что это был наиболее эффективный инструмент набора в её арсенале — превосходящий телевизионную рекламу, печатные средства массовой информации и личный набор в рентабельности затрат.\u003c/p\u003e\n\u003cp\u003eИгра не была аномалией. Это был прототип для военно-развлекательного сочетания, которое с тех пор стало стандартом отрасли.\u003c/p\u003e\n\u003ch2 id=\"военно-развлекательный-комплекс\"\u003eВоенно-развлекательный комплекс\u003c/h2\u003e\n\u003cp\u003eОтношение между военным и развлекательной промышленностью расширяет далеко за пределы одной игры. Это систематическое партнёрство — \"военно-развлекательный комплекс\" — задокументированный исследователями, включая Tim Lenoir, Luke Caldwell, Nick Turse и Ed Halter.\u003c/p\u003e\n\u003cp\u003eКлючевые связи включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнститут для творческих технологий (ICT).\u003c/strong\u003e Основано в 1999 году с контрактом $45 млн от Армии США, ICT располагается в Университете Южной Калифорнии — в сердце Голливуда. Его миссия — совмещать таланты развлекательной промышленности с военными исследованиями для развития продвинутых систем обучения. ICT разрабатывает среду виртуальной реальности, персонажи ИИ и погружённые имитации для обоих военного обучения и коммерческого развлечения. Те же технология служит обеим целям.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФинансирование DARPA для технологии игры.\u003c/strong\u003e DARPA финансировала разработку движка игры, ИИ для символов игры и системы виртуальной реальности, которые использованы в обоих военном применении и коммерческой игре. Технологический трубопровод течет в обоих направлениях: военное финансируемое исследование становится коммерческой технологией игры, и коммерческие инновации игры принимаются для военного обучения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВоенное консультирование на коммерческих играх.\u003c/strong\u003e Франшиза Call of Duty, одна из лучших продаваемых серии игр в истории, использовала военных консультантов, включая Lt. Col. Oliver North (скандала Iran-Contra), бывших Navy SEALs и активные военные адвизеры. Цель — реализм — обеспечение того, что виртуальный опыт боевых действий зеркалирует реальные военные операции так близко, как возможно.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMedal of Honor, Battlefield, Ghost Recon, ARMA.\u003c/strong\u003e Эти и многочисленные другие франшизы имеют военные связи — либо через прямое консультирование, военное финансирование, либо соглашения лицензирования, которые дают военным организациям вход на содержание и дизайн игры.\u003c/p\u003e\n\u003ch2 id=\"десенсибилизация-основная-функция\"\u003eДесенсибилизация: основная функция\u003c/h2\u003e\n\u003cp\u003eНаиболее значительный эффект военно-проектируемых и военно-влиятельных игр — десенсибилизация к насилию — постепенное снижение эмоционального и физиологического ответа действия убийства.\u003c/p\u003e\n\u003cp\u003eLt. Col. Dave Grossman, бывший Army Ranger и профессор психологии West Point, задокументировал этот процесс в его книги \"On Killing\" (1995) и \"Stop Teaching Our Kids to Kill\" (1999). Grossman определил, что первичный вызов армии при подготовке солдат не преподаёт их стрелять точно. Это — преодоление их врожденного сопротивления убийству других человеческих существ.\u003c/p\u003e\n\u003cp\u003eВо время Второй мировой войны, исследования Brigadier General S.L.A. Marshall найдены, что только 15-20% солдат фактически выстрелили их оружием в врага. Остаток — большинство — не смог принести себя убить, даже в самооборане, даже с подготовкой. Человеческое сопротивление убийству члена своего собственного вида глубоко встроено — сопротивление, которое Grossman определяет как дар от Создателя.\u003c/p\u003e\n\u003cp\u003eАрмия разработала техники подготовки, чтобы преодолеть это сопротивление:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗамена цели.\u003c/strong\u003e Замена цели бычий глаз человеческими фигурами. Это простое изменение увеличило уровни огня от 20% в WWII к 55% в Корее и 90-95% во Вьетнаме.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОперативное условие.\u003c/strong\u003e Подготовка солдат стрелять рефлексивно — отвечая всплывающим целям с немедленным огнём, без размышления. Решение убить сделано автоматический, обходящий сознательный моральный обработанный.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИмитационная подготовка.\u003c/strong\u003e Реалистичные имитации боевых действий, которые воспроизводят сенсорный опыт убийства — визуальный, слуховой и осязаемый — без моральных последствий. Солдат практикует убийство сотни раз в имитации перед когда-либо сталкиваясь реальному врагу.\u003c/p\u003e\n\u003cp\u003eВидеоигры используют все три техники. Человеческие фигуры. Рефлексивная механика стрельбы. Реалистичная имитация боевых действий. Разница состояние в том, что военная подготовка администрируется к избранным взрослым, которые согласились военному услугу. Видеоигры администрируются к детям как развлечение, без согласия, без возрастного ограничения и без любого механизма для обработки психологических эффектов.\u003c/p\u003e\n\u003ch2 id=\"трубопровод-набора\"\u003eТрубопровод набора\u003c/h2\u003e\n\u003cp\u003eВидеоигры служат вершина военного трубопровода набора. Путь задокументирован и намеренный:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОблучение (возраст 8-12).\u003c/strong\u003e Дети начинают играть военно-тематические игры, развивающие узнаваемость с военным оборудованием, тактикой и культурой. Военный нормализирован как волнующий, геройский и охлаждающий.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазвитие умения (возраст 12-16).\u003c/strong\u003e Подростки развивают зрительно-моторную координацию, быстрое принятие решений, тактическую ясность и координацию команды через конкурентные игры множественного игрока. Эти навыки непосредственно трансферат военному применению.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФормирование личности (возраст 16-18).\u003c/strong\u003e Сообщества игры и esports предоставляют социальную идентичность и цель. Военно-спонсируемые команды esports и потоки Twitch соединяют игровую идентичность к военной идентичности. Армия США, флот и воздушные силы все работали официальные команды esports и каналы игрового содержания.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНабор (возраст 17-24).\u003c/strong\u003e Имея был десенсибилизирован, квалифицирован и культурно выравнен с военной идентичностью через годы игры, переход к зачислению ощущает естественным. Военные рекрутеры специально целевые игроки, и мастерство игры узнано как передаваемый навык для операций дрона, кибервойны и систем дистанционного оружия.\u003c/p\u003e\n\u003cp\u003eТрубопровод не спеклулятивен. Военные документы набора явно определяют игру как путь набора. Команда Армии esports была создана со своей цели соединения с потенциальными рекрутерами \"где они — \" который является онлайн, играя в игры, что военный помог разработать.\u003c/p\u003e\n\u003ch2 id=\"связь-оператора-дрона\"\u003eСвязь оператора дрона\u003c/h2\u003e\n\u003cp\u003eСочетание между игрой и военными операциями достигало наиболее буквального выражения в дроне войне. Операторы дрона контролируют беспилотные воздушные транспортные средства из станций земли, которые находятся, в форме и функции, почти идентичный установкам игры: экраны, джойстики, клавиатуры и реальная трансляция видео.\u003c/p\u003e\n\u003cp\u003eБывшие операторы дрона описали опыт как чувство \"как видеоигра\" — восприятие, которое не является несчастливо. Обучающий путь от коммерческой игры к военной операции дрона — бесшовный: интерфейсы подобны, требования координации зрительно-моторные идентичны и психологический опыт убийства через экран был репетирован тысячи раз через игру.\u003c/p\u003e\n\u003cp\u003eЭмоциональные последствия, однако, реальны. Операторы дрона опыт ПТСР, моральной травмы и психологической травмы — часто годы после их услуги. Готовность, кондиционируемая игрой, что убийство через экран — следствие-свободное, толкновение сталкивается с реальностью, что цели — человеческие существа, взрывы реальны и смерти постоянны. Десенсибилизация, что игра предоставила, достаточна включить убийство, но недостаточна предотвратить психологический повреждение, который следует.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003cp\u003eНасилие видеоигры не просто поведенческое проблема. Это духовное. Указание \"Не убий\" (Исход 20:13) устанавливает святость человеческой жизни как божественный принцип. Каждая имитация убийства — каждый виртуальный выстрел в голову, каждое цифровое выполнение, каждое имитационное массовое убийство — репетирует нарушение этого принципа.\u003c/p\u003e\n\u003cp\u003eАргумент, что \"это просто игра\" игнорирует задокументированную неврологическую реальность: мозг не полностью отличается между реальным и имитационным опытом. Нейроны зеркала огонь, наблюдая насилие. Гормоны стресса выпущены во время интенсивной игры. Нейральные пути, связанные с агрессией, укреплены через повторение. Дух знает то, что ум отклоняет — что репетирование взятия жизни, даже в имитации, осквернит что-то священное.\u003c/p\u003e\n\u003cp\u003eКак исследовано в \u003ca href=\"/mkultra-never-ended/?lang=ru\"\u003eMKUltra Never Ended\u003c/a\u003e, техники для кондиционирования человеческих существ выполнить деяния они естественно сопротивлялись бы — включая убийство — были рафинированы над десятилетиями исследования. Видеоигры представляют массовое развёртывание этих техник кондиционирования гражданским популяциям, поставляемым как развлечение и добровольно потреблён детьми.\u003c/p\u003e\n\u003cp\u003eСвязь к \u003ca href=\"/cognitive-warfare-battleground/?lang=ru\"\u003eCognitive Warfare: Your Mind Is the Battleground\u003c/a\u003e прямая. Популяция, кондиционируемая через игру, популяция подготовленная к манипуляции. Те же психологические механизмы, что заставляют игрока удобным с виртуальным убийством, могут быть переустановлены заставляют граждан удобным с реальным насилием — против врагов определены не личным опытом, но алгоритмичным повествованием.\u003c/p\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Блаженны миротворцы: ибо они названы сынами Бога.\" — Матфей 5:9\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДети Бога — миротворцы. Дети военно-развлекательного комплекса — игроки войны. Подготовка противоположна. Формирование — инверсно. Где Бог формирует людей для мира, система формирует их для войны — начинающей в детстве, через игры, которые преподают навыки убийства и полосую моральное сопротивление, что Бог помещал в человеческое сердце. Ребёнок, который растёт, создавая мир, наследует царство Бога. Ребёнок, который растёт, создавая войну, наследует царство, которое создало игру.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о близком столкновении с смертью Говарда Питтмана — предупреждение о конце времён, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — военное программирование ума через игру\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/53-Cognitive_Warfare.mp4\"\u003eCognitive Warfare\u003c/a\u003e — оружие развлечения\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mkultra-never-ended/?lang=ru\"\u003eMKUltra Never Ended\u003c/a\u003e — программа контроля разума, чьи техники кондиционирования развёрнуты через игру\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cognitive-warfare-battleground/?lang=ru\"\u003eCognitive Warfare: Your Mind Is the Battleground\u003c/a\u003e — военная доктрина, которую видеоигры реализуют как развлечение\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОни дали вашим детям контроллер и назвали это игрушкой. Они построили игру и назвали это развлечением. Они подготовили поколение целиться, стрелять и убить без колебания — и назвали это игрой. Военный спроектировал игру. Военный финансировал технологию. Военный работает команды набора внутри сообщества игры. И дети, которые провели их формирующие годы репетируя насилие, сейчас сидят в консолях дрона, убивающие реальных людей через те же экраны они выросли играя на. Воспитай дитя по требуемому для него пути. Они воспитали поколение в пути они должны убить. И когда те дети состарятся, они не отступят от неё.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/media/\",\"className\":\"category-badge\",\"children\":\"media\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Видеоигры: военная подготовка для гражданской молодёжи\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Военно-развлекательный комплекс — не метафора. Военно-морской флот США напрямую финансировал, разработал и разве
