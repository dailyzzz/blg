гие из людей умерли от вод, потому что они сделались горьки.\" — Откровение 8:10-11\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПисание пророчествует, что в последние дни воды будут отравлены. Звезда Полынь падает на реки и источники, и воды становятся горькими — токсичными — и многие умирают, пив из них. Пророчество не метафорично. Оно описывает загрязнение водоснабжения — фундаментального ресурса, от которого зависит вся человеческая жизнь.\u003c/p\u003e\n\u003cp\u003eКак раскрывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e, пересечение границ Бога проявляется в загрязнении Его создания — отравлении воздуха, почвы, пищи и воды, которую Он разработал для поддержки жизни. Фторид в питьевой воде — это нарушение установленного порядка — преднамеренное добавление промышленного отходного продукта в водоснабжение под предлогом предотвращения кариеса, в то время как доказательства неврологического вреда накапливаются десятилетие за десятилетием.\u003c/p\u003e\n\u003cp\u003eCDC отменил свою рекомендацию. Полынь идентифицируется — если пока не удаляется.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"история-фторирования-воды\"\u003eИстория фторирования воды\u003c/h2\u003e\n\u003cp\u003eФторирование воды в Соединенных Штатах началось в 1945 году, когда Гранд-Рапидс, штат Мичиган, стал первым городом, добавившим фторид в свое общественное водоснабжение. CDC впоследствии одобрил фторирование общественной воды как меру общественного здравоохранения, и к 2020 году примерно 73% населения США, обслуживаемого системами общественного водоснабжения, получали фторированную воду.\u003c/p\u003e\n\u003cp\u003eCDC назвал фторирование воды одним из \"десяти великих достижений общественного здравоохранения XX века\". Американская ассоциация стоматологов, Американская ассоциация медицины и Всемирная организация здравоохранения все одобрили эту практику. Рекомендуемый уровень фторида был установлен в размере 0,7 миллиграмма на литр (мг/л) U.S. Службой общественного здравоохранения в 2015 году, снизившись с предыдущего диапазона 0,7-1,2 мг/л.\u003c/p\u003e\n\u003cp\u003eОднако научные доказательства, оспаривающие фторирование, неуклонно растут за последние два десятилетия:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНейротоксичность:\u003c/strong\u003e Знаковый отчет Национальной программы токсикологии (NTP) 2024 года, после лет подавления и пересмотра, пришел к выводу, что воздействие фторида на уровнях, соответствующих фторированию воды, связано со снижением IQ у детей. Отчет рассмотрел более 70 исследований на людях и обнаружил постоянную связь между воздействием фторида и нейродевелопментальным вредом.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарушение эндокринной системы:\u003c/strong\u003e Отчет Национального совета по исследованиям 2006 года идентифицировал фторид как дезрегулятор эндокринной системы, отметив эффекты на функцию щитовидной железы, метаболизм костей и репродуктивное здоровье на уровнях, которые перекрываются с теми, которые производятся фторированием воды.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСнижение кариеса зубов:\u003c/strong\u003e Утверждаемое стоматологическое преимущество фторирования воды все больше оспаривается. Крупномасштабные эпидемиологические исследования, сравнивающие фторированные и не фторированные сообщества, обнаружили минимальные различия в показателях кариеса зубов — что предполагает, что широкое использование фторированной зубной пасты сделало фторирование воды ненужным для здоровья зубов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФлюороз зубов:\u003c/strong\u003e Фторирование воды является первичной причиной флюороза зубов — состояния, вызванного чрезмерным поступлением фторида во время развития зубов, приводящего к обесцвечиванию и структурному повреждению зубной эмали. Данные CDC показывают, что примерно 65% американских подростков теперь проявляют ту или иную степень флюороза зубов — резкое увеличение по сравнению с показателем распространенности 10%, когда была введена фторидация.\u003c/p\u003e\n\u003cp\u003eKaren Kingston задокументировала в The Kingston Report (karenkingston.substack.com): \"Фторирование воды — самая успешная программа массового лечения в истории человечества. Она была реализована без индивидуального согласия, поддерживалась без надлежащего мониторинга безопасности и защищалась без честного взаимодействия с накапливающимися доказательствами вреда. Отмена CDC — это не научное обновление — это признание того, что агентство было неправильным в течение 80 лет, пока оно отклоняло ученых, которые пытались его предупредить.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"федеральное-судебное-решение\"\u003eФедеральное судебное решение\u003c/h2\u003e\n\u003cp\u003eОтмена политики CDC следует знаковому федеральному судебному решению в деле \u003cem\u003eFood \u0026#x26; Water Watch et al. v. EPA\u003c/em\u003e, в котором судья Edward Chen Северного района Калифорнии постановил, что фторирование воды на текущих уровнях представляет необоснованный риск нейротоксического вреда, особенно для детей. Решение приказало EPA принять нормативные меры для решения этого риска.\u003c/p\u003e\n\u003cp\u003eРешение судьи Chen было основано на обширных экспертных показаниях и отчете NTP, который судья счел наиболее полным обзором нейротоксичности фторида когда-либо проведенным. Решение отметило, что собственная оценка риска EPA недостаточно учитывала нейродевелопментальные эффекты и что агентство не применило принцип предосторожности к веществу, добровольно вводимому всему населению.\u003c/p\u003e\n\u003cp\u003eОтмена CDC своей рекомендации фторирования эффективно убирает федеральное одобрение практики — хотя решение фторирования остается с отдельными муниципалитетами и правительствами штатов.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"более-глубокая-проблема-массовое-лечение-без-согласия\"\u003eБолее глубокая проблема: массовое лечение без согласия\u003c/h2\u003e\n\u003cp\u003eФторирование воды — это массовое лечение. Оно предполагает добавление фармакологически активного вещества в общественное водоснабжение с целью производства терапевтического эффекта (предотвращение кариеса зубов) в популяции, которая потребляет воду. Вещество вводится:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eБез индивидуального согласия\u003c/li\u003e\n\u003cli\u003eБез контроля индивидуальной дозировки (потребление зависит от потребления воды)\u003c/li\u003e\n\u003cli\u003eБез индивидуальной медицинской оценки\u003c/li\u003e\n\u003cli\u003eБез индивидуального мониторинга неблагоприятных эффектов\u003c/li\u003e\n\u003cli\u003eБез способности людей отказаться от участия (кроме как приобретение систем фильтрации или альтернативных источников воды)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто фундаментальное нарушение медицинской этики, которая требует информированного согласия на любое медицинское вмешательство. Нюрнбергский кодекс, Декларация Хельсинки и установленные принципы биоэтики все требуют, чтобы медицинские вмешательства были добровольными, индивидуально согласованными и подлежали праву на отзыв.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/109-Biometric_Beast_System.mp4\"\u003eBiometric Beast System\u003c/a\u003e описывает, как системы медицинского вмешательства в масштабе населения — от фторирования до мандатов вакцинации — подрывают принцип индивидуального согласия и устанавливают прецедент, что государство может вводить медицинское лечение всему населению без индивидуального разрешения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческое-значение\"\u003eПророческое значение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И показал мне чистую реку воды жизни, блистающую, как кристалл, исходящую от престола Бога и Агнца.\" — Откровение 22:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДизайн Бога для воды — чистота — река жизни, ясная как кристалл. Загрязнение воды — это коррупция дизайна Бога — преобразование дара, поддерживающего жизнь, в средство токсичности. Одобрение CDC на протяжении десятилетий фторирования воды было участием в этой коррупции — институциональное благословение практики, которая вводила промышленный отходный продукт в воду, которую Бог разработал для поддержки жизни.\u003c/p\u003e\n\u003cp\u003eОтмена начинает процесс восстановления. Но восстановление требует действия на каждом уровне — федеральном, государственном и муниципальном. Рекомендация CDC отменена, но фторид в воде остается до тех пор, пока местные органы власти не примут меры по его удалению.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушай голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, а отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 звучит через каждый коридор правительства сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их точно, что будет происходить — их сыновья взяты на войну, их дочери на службу, их поля и виноградники захвачены, одна десятая всего конфискована. Они выбрали человеческое правительство над царством Бога, и тирания последовала ровно так, как было обещано. Ничего не изменилось. Современная политическая система — это две крыла одной птицы — левая и правая, республиканская и демократическая — все служат одной и той же скрытой силовой структуре. Голосование за любую сторону — это выбор того, какое крыло взмахнет дальше, пока птица летит в одном и том же направлении. Реальная власть никогда не была на каком-либо избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eCDC — отмена рекомендации по фторированию воды\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — анализ Kingston истории фторирования воды, подавления отчета NTP и этики массового лечения\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eНациональная программа токсикологии — отчет о нейротоксичности фторида\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFood \u0026#x26; Water Watch et al. v. EPA — федеральное судебное решение\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eНациональный совет по исследованиям — \"Фторид в питьевой воде: научный обзор стандартов EPA\" (2006)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eОткровение 8:10-11, Откровение 22:1 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных королей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство ближайшего смертельного опыта Говарда Питтмана — предупреждение о конце времени, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Раскрытые позорные тайны иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/109-Biometric_Beast_System.mp4\"\u003eBiometric Beast System\u003c/a\u003e — вмешательство на уровне населения без индивидуального согласия\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — программы правительства, рассматривающие население как подопытные объекты\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — институциональное единогласие, защищающее вредную практику в течение десятилетий\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e — коррупция установленного Богом порядка посредством отравления воды\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e — проклятие, проявляющееся в загрязнении основного средства существования\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-подробнее\"\u003eУзнать подробнее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/hhs-maha-transformation/?lang=ru\"\u003eHHS объявляет о трансформации здравоохранения MAHA\u003c/a\u003e — чистая вода как опора инициативы MAHA\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/rfk-cleans-house-cdc/?lang=ru\"\u003eRFK Jr. Cleans House at the CDC\u003c/a\u003e — реформирование агентства, которое одобрило фторирование в течение 80 лет\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/fda-ended-emergency-use-authorizations/?lang=ru\"\u003eFDA Just Ended Emergency Use Authorizations for COVID-19\u003c/a\u003e — отмена фармацевтической политики, построенной на неадекватных доказательствах\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/rfk-worldwide-cause-autism/?lang=ru\"\u003eRFK Jr. объявляет о всемирных усилиях по определению причины аутизма\u003c/a\u003e — исследование экологических нейротоксинов, включая фторид\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eВоды Америки были загрязнены в течение 80 лет под одобрением CDC — промышленный отходный продукт, добавленный в водоснабжение 200 миллионов человек без согласия, без надлежащих испытаний безопасности и несмотря на накопившиеся доказательства неврологического вреда. Отмена CDC — это начало — но только начало. Фторид остается в воде до тех пор, пока каждый муниципалитет не примет меры по его удалению. \"Кто имеет уши слышать, да слышит\" (Матфей 11:15). CDC говорит. Наука говорит. Суды говорят. Теперь вопрос переходит к каждому городу, каждому округу и каждому водному округу: продолжите ли вы отравлять воду или восстановите ее к чистоте, которую Бог разработал?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"governmen
