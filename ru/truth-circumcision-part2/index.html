ссмотрели коммунистическую инфильтрацию американской медицины и то, как обрезание укоренилось в медицинской системе как инструмент идеологического контроля. Теперь мы идем глубже — в конкретные медицинские утверждения, используемые для оправдания процедуры, разрушительное психологическое воздействие на обрезанных мужчин и институциональный механизм, поддерживающий эту практику, несмотря на подавляющие доказательства против нее.\u003c/p\u003e\n\u003cp\u003eКаждое утверждение, используемое для оправдания рутинного обрезания младенцев, было опровергнуто. Каждая европейская медицинская организация, оценивавшая эту практику, пришла к выводу, что она не является медицински необходимой. И все же она продолжается — потому что силы, движущие ею, не медицинские, а духовные, идеологические и финансовые.\u003c/p\u003e\n\u003cp\u003eГоварду Питтману было показано во время его околосмертного опыта, что духовное царство является истинной реальностью, а физический мир — лишь его тенью. Слова, произносимые медицинскими авторитетами — \"это рутинно\", \"это чище\", \"это предотвращает болезни\" — несут духовный вес. Это заклинания, которые перекрывают родительский инстинкт, заглушают материнскую интуицию и нормализуют калечение Божьего творения. Питтман узнал, что 95% служат \"себе\", а не Богу, и медицинская система, получающая прибыль от обрезания младенцев, служит прежде всего себе.\u003c/p\u003e\n\u003cp\u003eПрактика иезуитов \"всех видов порока\" на службе своему ордену, их инфильтрация \"облаченная в хитрость\", их стремление к тому, что Наполеон называл \"абсолютной властью\" — все эти характеристики описывают индустрию обрезания с жуткой точностью. Предупреждение Джона Адамса о том, что \"Общество Лойолы\" заслуживает \"вечного проклятия\", в равной степени применимо к институтам, получающим прибыль от страданий новорожденных.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"опровержение-медицинских-утверждений\"\u003eОпровержение медицинских утверждений\u003c/h2\u003e\n\u003ch3 id=\"утверждение-1-обрезание-предотвращает-рак-полового-члена\"\u003eУтверждение 1: Обрезание предотвращает рак полового члена\u003c/h3\u003e\n\u003cp\u003eЭто было одно из самых ранних медицинских оправданий и до сих пор цитируется. Утверждается, что обрезание снижает риск рака полового члена. Вот факты:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРак полового члена \u003cstrong\u003eкрайне редок\u003c/strong\u003e — он поражает примерно 1 из 100 000 мужчин ежегодно в Соединенных Штатах\u003c/li\u003e\n\u003cli\u003eЧастота рака полового члена в \u003cstrong\u003eДании\u003c/strong\u003e (где обрезание практически отсутствует) \u003cstrong\u003eниже\u003c/strong\u003e, чем в Соединенных Штатах\u003c/li\u003e\n\u003cli\u003eАмериканское онкологическое общество заявило, что обрезание \u003cstrong\u003eне следует\u003c/strong\u003e рекомендовать как стратегию профилактики рака полового члена\u003c/li\u003e\n\u003cli\u003eФакторы риска рака полового члена включают \u003cstrong\u003eкурение, инфекцию ВПЧ, фимоз\u003c/strong\u003e (который можно лечить без обрезания) и \u003cstrong\u003eплохую гигиену\u003c/strong\u003e — а не наличие крайней плоти\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИспользование профилактики рака для оправдания рутинной хирургии младенцев на части тела, которая развивает рак со скоростью 0,001%, это как оправдание удаления всей ткани груди у девочек-младенцев для предотвращения рака груди — который имеет частоту заболеваемости \u003cstrong\u003eв 140 раз выше\u003c/strong\u003e, чем рак полового члена.\u003c/p\u003e\n\u003ch3 id=\"утверждение-2-обрезание-предотвращает-инфекции-мочевыводящих-путей\"\u003eУтверждение 2: Обрезание предотвращает инфекции мочевыводящих путей\u003c/h3\u003e\n\u003cp\u003eИсследования утверждали, что обрезанные мужчины имеют более низкий риск инфекций мочевыводящих путей в первый год жизни. Даже если принять это утверждение за чистую монету:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eАбсолютное снижение риска составляет примерно \u003cstrong\u003e1%\u003c/strong\u003e — примерно с 1,5% до 0,5%\u003c/li\u003e\n\u003cli\u003eИнфекции мочевыводящих путей у младенцев-мальчиков легко лечатся \u003cstrong\u003eантибиотиками\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДевочки\u003c/strong\u003e имеют гораздо более высокий уровень инфекций мочевыводящих путей, чем мальчики, и никто не предлагает хирургически изменять женскую анатомию для их предотвращения\u003c/li\u003e\n\u003cli\u003eИсследования, показывающие снижение инфекций мочевыводящих путей, были подвергнуты критике за \u003cstrong\u003eметодологические недостатки\u003c/strong\u003e, включая неучет смешивающих переменных, таких как грудное вскармливание (которое независимо снижает риск инфекций мочевыводящих путей)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЧтобы предотвратить одну инфекцию мочевыводящих путей, необходимо выполнить примерно \u003cstrong\u003e100 обрезаний\u003c/strong\u003e. Это означает, что 99 мальчиков подвергаются ненужной операции — с сопутствующими рисками кровотечения, инфекции, спаек, рубцов и хуже — чтобы потенциально предотвратить одну легко поддающуюся лечению инфекцию.\u003c/p\u003e\n\u003ch3 id=\"утверждение-3-обрезание-предотвращает-вич\"\u003eУтверждение 3: Обрезание предотвращает ВИЧ\u003c/h3\u003e\n\u003cp\u003eЭто самое последнее и наиболее активно продвигаемое утверждение, основанное на трех рандомизированных контролируемых исследованиях, проведенных в Африке между 2005 и 2007 годами. Эти исследования утверждали, что обрезание снижает передачу ВИЧ от женщины к мужчине примерно на 60%.\u003c/p\u003e\n\u003cp\u003eПроблемы с этими исследованиями глубоки:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eДосрочное прекращение\u003c/strong\u003e: Все три исследования были остановлены досрочно, что, как известно, завышает размеры эффекта в клинических испытаниях\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСмешивающие переменные\u003c/strong\u003e: Обрезанные мужчины в исследованиях получали медицинскую помощь, презервативы и санитарное просвещение, которых не получали необрезанные мужчины — что делает невозможным изолировать эффект обрезания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСистематическая ошибка времени наблюдения\u003c/strong\u003e: Обрезанным мужчинам было сказано воздерживаться от секса в период восстановления (6-8 недель), что давало им меньше времени риска по сравнению с контрольной группой\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАбсолютный против относительного риска\u003c/strong\u003e: \"Снижение на 60%\" — это показатель относительного риска. Абсолютное снижение риска составило примерно \u003cstrong\u003e1,3%\u003c/strong\u003e — с 2,5% до 1,2% за период исследования\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНет защиты для женщин\u003c/strong\u003e: Исследования передачи от женщины к мужчине не применимы к передаче от мужчины к женщине, и последующие исследования не обнаружили \u003cstrong\u003eзащитного эффекта\u003c/strong\u003e для женщин\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПротиворечат данным населения\u003c/strong\u003e: Соединенные Штаты имеют самый высокий уровень обрезания в развитом мире И самый высокий уровень ВИЧ. Если бы обрезание предотвращало ВИЧ, должно было быть наоборот\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти африканские исследования финансировались организациями, имеющими финансовые связи с индустрией обрезания, и продвигались агентствами, стремящимися оправдать программы массового обрезания в Африке — программы стоимостью в миллиарды долларов международной помощи.\u003c/p\u003e\n\u003ch3 id=\"утверждение-4-обрезание-гигиенично\"\u003eУтверждение 4: Обрезание гигиенично\u003c/h3\u003e\n\u003cp\u003eАргумент гигиены — самое распространенное оправдание, цитируемое американскими родителями. Он также самый легко опровергаемый:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКрайняя плоть \u003cstrong\u003eсамоочищающаяся\u003c/strong\u003e — она производит смегму, натуральную смазку, которая содержит лизоцим (антимикробный фермент) и служит защитной функции\u003c/li\u003e\n\u003cli\u003eНеобрезанные мужчины в Европе, Азии и Южной Америке не имеют более высоких показателей генитальных инфекций, чем обрезанные американские мужчины\u003c/li\u003e\n\u003cli\u003eНаучить мальчика мыться \u003cstrong\u003eпроще, безопаснее и дешевле\u003c/strong\u003e, чем хирургически удалять часть тела\u003c/li\u003e\n\u003cli\u003eАргумент гигиены может применяться к любой части тела — ушам, пупкам, между пальцами ног — и никто не предлагает удалять эти структуры для чистоты\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eАргумент гигиены — это не медицина. Это культурное обусловливание — то же культурное обусловливание, которое когда-то оправдывало бинтование ног, корсеты и другие формы модификации тела, налагаемые на молодых старыми.\u003c/p\u003e\n\u003ch2 id=\"крайняя-плоть-что-вам-не-говорят\"\u003eКрайняя плоть: что вам не говорят\u003c/h2\u003e\n\u003ch3 id=\"анатомия-и-функция\"\u003eАнатомия и функция\u003c/h3\u003e\n\u003cp\u003eКрайняя плоть — это не рудиментарный остаток или \"лоскут кожи\". Это сложный функциональный орган, содержащий:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eБолее 20 000 нервных окончаний\u003c/strong\u003e — что делает ее самой чувствительной частью мужского тела\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТельца Мейснера\u003c/strong\u003e — рецепторы тонкого прикосновения, обнаруженные в кончиках пальцев и губах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУздечку\u003c/strong\u003e — одну из самых эрогенных зон мужской анатомии, часто частично или полностью удаляемую во время обрезания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРебристую ленту\u003c/strong\u003e — специализированную структуру на кончике крайней плоти с уникальными сенсорными свойствами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИммунологическую ткань\u003c/strong\u003e — включая клетки Лангерганса, которые играют роль в защитных процессах организма\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМышцу дартос\u003c/strong\u003e — гладкую мышцу, которая позволяет крайней плоти расширяться и сокращаться\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКрайняя плоть выполняет множество функций:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЗащита\u003c/strong\u003e: Сохраняет головку полового члена влажной и чувствительной на протяжении всей жизни\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОщущение\u003c/strong\u003e: Обеспечивает уникальную форму сенсорной обратной связи во время интимного контакта\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСмазка\u003c/strong\u003e: Способствует естественной смазке, уменьшая трение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИммунологическая функция\u003c/strong\u003e: Производит антимикробные соединения, защищающие от патогенов\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eУдаление крайней плоти удаляет примерно \u003cstrong\u003e50% кожи полового члена\u003c/strong\u003e, устраняет самую чувствительную ткань и подвергает головку постоянному трению от одежды, вызывая прогрессирующую кератинизацию (утолщение и высыхание), которая снижает чувствительность на протяжении всей жизни.\u003c/p\u003e\n\u003ch3 id=\"что-на-самом-деле-удаляет-обрезание\"\u003eЧто на самом деле удаляет обрезание\u003c/h3\u003e\n\u003cp\u003eСреднее обрезание удаляет \u003cstrong\u003e15 квадратных дюймов\u003c/strong\u003e ткани с полового члена взрослого мужчины — ткани, которая содержала бы более 20 000 специализированных нервных окончаний. Это не \"незначительная\" процедура. Это ампутация функционального органа у пациента, не дающего согласия.\u003c/p\u003e\n\u003ch2 id=\"психологическое-воздействие\"\u003eПсихологическое воздействие\u003c/h2\u003e\n\u003ch3 id=\"неонатальная-травма\"\u003eНеонатальная травма\u003c/h3\u003e\n\u003cp\u003eИсследования неонатального обрезания выявили тревожные эффекты на развитие младенца:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eИзмененная реакция на боль\u003c/strong\u003e: Обрезанные младенцы показывают повышенные реакции на боль при последующих медицинских процедурах (таких как вакцинация), что предполагает, что травма изменяет неврологическую обработку боли\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение грудного вскармливания\u003c/strong\u003e: Многие младенцы испытывают трудности с грудным вскармливанием после обрезания из-за боли, стресса и нарушенной связи\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение сна\u003c/strong\u003e: Обрезанные младенцы показывают измененные режимы сна в дни и недели после процедуры\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСкачки кортизола\u003c/strong\u003e: Уровни кортизола во время обрезания достигают уровней, связанных с экстремальным физиологическим стрессом\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПТСР-подобные реакции\u003c/strong\u003e: Некоторые исследователи выявили поведенческие паттерны у обрезанных младенцев, соответствующие посттравматическим стрессовым реакциям\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"психологические-эффекты-у-взрослых\"\u003eПсихологические эффекты у взрослых\u003c/h3\u003e\n\u003cp\u003eРастущее количество исследований документирует психологические эффекты у взрослых мужчин, которые осознают свое обрезание:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eЧувства нарушения, потери и горя\u003c/li\u003e\n\u003cli\u003eГнев по отношению к родителям и медицинской системе\u003c/li\u003e\n\u003cli\u003eТрудности с близостью и доверием\u003c/li\u003e\n\u003cli\u003eЧувство телесной неполноты\u003c/li\u003e\n\u003cli\u003eДепрессия и тревога, связанные с потерей\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти эффекты отклоняются медицинским истеблишментом как \"психологические проблемы\", а не законные ответы на необратимое телесное нарушение. Это отклонение само по себе является формой газлайтинга — говорить жертвам, что их страдание — их собственная вина, а не вина системы, которая причинила им вред.\u003c/p\u003e\n\u003ch2 id=\"институциональный-механизм\"\u003eИнституциональный механизм\u003c/h2\u003e\n\u003ch3 id=\"конфликтная-позиция-aap\"\u003eКонфликтная позиция AAP\u003c/h3\u003e\n\u003cp\u003eАмериканская академия педиатрии (AAP) выпустила программное заявление в 2012 году, объявляя, что \"преимущества для здоровья от обрезания новорожденных мальчиков перевешивают риски\". Это заявление было немедленно осуждено медицинскими организациями по всему миру:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eГруппа из \u003cstrong\u003e38 европейских врачей\u003c/strong\u003e из 16 стран опубликовала ответ, называющий заявление AAP \"культурно предвзятым\" и отмечающий, что ни одна европейская медицинская организация не рекомендует рутинное обрезание\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКоролевская голландская медицинская ассоциация\u003c/strong\u003e назвала обрезание \"нарушением прав детей на автономию и физическую целостность\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБританская медицинская ассоциация\u003c/strong\u003e заявила, что обрезание \"обычно не оправдано по соображениям здоровья\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКанадское педиатрическое общество\u003c/strong\u003e не рекомендует рутинное обрезание\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПозиция AAP — это выброс среди развитых стран — и AAP имеет обширные финансовые связи с медицинской индустрией, получающей прибыль от обрезания. Члены целевой группы AAP, которая подготовила заявление 2012 года, включали исследователей с задокументированными конфликтами интересов.\u003c/p\u003e\n\u003ch3 id=\"роль-страховой-индустрии\"\u003eРоль страховой индустрии\u003c/h3\u003e\n\u003cp\u003eСтраховое покрытие определяет медицинскую практику в Америке. Пока страховые компании покрывают рутинное обрезание младенцев, больницы будут продолжать предлагать его, врачи будут продолжать выполнять его, а родители будут продолжать принимать его. Несколько штатов отменили покрытие обрезания по Medicaid, и уровень обрезания в этих штатах снизился — демонстрируя, что практика определяется больше финансовой доступностью, чем медицинским спросом.\u003c/p\u003e\n\u003ch2 id=\"духовная-реальность\"\u003eДуховная реальность\u003c/h2\u003e\n\u003ch3 id=\"божий-замысел--не-ошибка\"\u003eБожий замысел — не ошибка\u003c/h3\u003e\n\u003cp\u003eЧеловеческое тело было создано Творцом — \"дивно устроено\", как заявляет Псалмопевец. Крайняя плоть — часть этого замысла. Это не производственный дефект. Это не ошибка, требующая хирургической коррекции. Утверждать, что здоровая часть тела должна быть удалена у каждого младенца-мальчика — значит утверждать, что Божий замысел ущербен — и что человеческие хирурги знают лучше, чем Творец.\u003c/p\u003e\n\u003cp\u003eЭто фундаментальная гордыня, которая движет медицинским истеблишментом: вера, что человек может улучшить Бога. Это та же гордыня, которая побудила Люцифера восстать против Небес, и это та же гордыня, которую воплощает Орден иезуитов в своем стремлении к \"абсолютной власти\" над каждым аспектом человеческой жизни.\u003c/p\u003e\n\u003cp\u003eГоварду Питтману было сказано, что духовное царство — истинная реальность. Физическое изменение тел младенцев имеет духовные последствия, выходящие за рамки того, что мы можем измерить медицинскими инструментами. Когда общество нормализует калечение своих детей, оно пересекло духовный порог — оно приняло принцип, что институциональная власть превосходит божественный замысел.\u003c/p\u003e\n\u003ch3 id=\"освобождение\"\u003eОсвобождение\u003c/h3\u003e\n\u003cp\u003eПуть к свободе начинается с осознания. Если вы родитель, просвещайтесь, прежде чем принимать необратимое решение о теле вашего ребенка. Если вы мужчина, который был обрезан без согласия, знайте, что ваше горе обоснованно, а ваш гнев оправдан. Если вы медицинский работник, изучите доказательства честными глазами и спросите себя, служите ли вы своим пациентам или своей профессии.\u003c/p\u003e\n\u003cp\u003eПравда ясна: рутинное обрезание младенцев не является медицински необходимым, не подтверждается доказательствами и не соответствует базовой медицинской этике. Оно продолжается из-за культурной инерции, институциональной прибыли и духовной слепоты, которая мешает людям видеть очевидное.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследовательская работа об обрезании и коррупции медицинской системы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — духовная война и божественный замысел\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — институциональная инфильтрация и контроль\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- AAP Policy Statement on Circumcision (2012) and international responses\u003c/li\u003e\n\u003
