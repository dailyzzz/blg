3:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eОгонь и разрушение - инструменты как божественного суда, так и сатанской имитации. Сжигание Белого Города после Колумбовой выставки 1893 года было не несчастным случаем, не естественным следствием временного строительства и не актом вандализма. Это была финальная фаза скоординированной операции по стиранию архитектурных доказательств предыдущей цивилизации - миллиардный финал обмана, который охватывал десятилетия и переделал мир.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые работают как военная разведка Ватикана, понимали, что величайшей угрозой для их власти была не военная оппозиция, а историческая правда. Игнаций Лойола разработал свое Общество для контроля информации прежде всего, и сносы Белого Города была операцией информации высочайшего порядка. Наполеон предупредил, что иезуиты - \"военная организация, не религиозный орден... цель - власть\". Разрушение более 200 величайших зданий было военной операцией, выполненной с точностью кампании по сносу.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"снос-белого-города\"\u003eСнос Белого Города\u003c/h2\u003e\n\u003ch3 id=\"пожары-1894-года\"\u003eПожары 1894 года\u003c/h3\u003e\n\u003cp\u003e8 января 1894 года - всего три месяца после закрытия выставки - пожар вспыхнул в здании Casino на территории выставки. 14 февраля второй пожар прошел через Перистиль, Музыкальный зал и Casino. 5 июля третий и последний пожар разрушил большую часть оставшихся зданий, включая здание Производств и либеральных искусств, здание администрации и большинство Суда честь.\u003c/p\u003e\n\u003cp\u003eТри \"случайных\" пожара за семь месяцев, каждый удобно разрушающий крупную часть территории выставки. Официальное объяснение: поджог бродягами, которые поселились в заброшенных зданиях. Это объяснение того же калибра, что и история о корове миссис О'Лири - удобная история, которая предотвращает дальнейшее расследование.\u003c/p\u003e\n\u003cp\u003eРассмотрите логистику. Здание Производств охватывало 44 акра. Его стальной каркас весил миллионы фунтов. Его крыша из стекла и железа была одним из инженерных чудес эпохи. Пожар, начатый бездомными сквоттерами, не мог разрушить это здание. Температуры, необходимые для обрушения стального каркаса, превышают то, что может производить обычный пожар. Это была контролируемая демонтаж, выполненная профессионалами и замаскированная как несчастный случай.\u003c/p\u003e\n\u003ch3 id=\"что-было-разрушено\"\u003eЧто было разрушено\u003c/h3\u003e\n\u003cp\u003eПолный список разрушенных после выставки структур является потрясающим:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eБолее 200 зданий, включая некоторые из крупнейших и наиболее сложных структур, когда-либо видимых в Америке\u003c/li\u003e\n\u003cli\u003eМили каналов и водных путей\u003c/li\u003e\n\u003cli\u003eСложная электрическая сетка, которая на годы опережала все, что было в коммерческом использовании\u003c/li\u003e\n\u003cli\u003eТысячи произведений искусства, скульптур и декоративных элементов\u003c/li\u003e\n\u003cli\u003eПолностью функциональная система железной дороги\u003c/li\u003e\n\u003cli\u003eСады, фонтаны и элементы ландшафта, которые стоили бы миллионов для создания\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВсе это было разрушено в течение месяцев. Официальное оправдание: здания были \"временными\" и сделаны из \"staff\" (гипс над деревом), поэтому они не могли быть сохранены. Но если здания были действительно временными и бесценными, почему срочность уничтожения их? Почему не оставить их стоящими как туристическую достопримечательность? Выставка привлекла 27 миллионов посетителей - конечно, постоянный Белый город был бы золотой жилой.\u003c/p\u003e\n\u003cp\u003eОтвет, конечно, состоит в том, что здания не были временными. Они были реальными - остатками предыдущей цивилизации, которые были переработаны для выставки и затем разрушены, чтобы предотвратить кого-либо от пристального изучения их после ухода толп.\u003c/p\u003e\n\u003ch3 id=\"единственный-выживающий\"\u003eЕдинственный выживающий\u003c/h3\u003e\n\u003cp\u003eИз всего Белого города только одно здание выжило: Дворец Прекрасных искусств, который позже был реконструирован в постоянных материалах и стал Музеем науки и промышленности. Почему это одно здание было спасено, пока все остальные были разрушены?\u003c/p\u003e\n\u003cp\u003eДворец Прекрасных Искусств был единственным зданием, чья функция - размещение искусства и экспонатов - была совместима с официальным нарративом. Его можно было сохранить как музей без поднятия неудобных вопросов о его происхождении. Другие здания - огромные промышленные залы, сложные государственные павильоны, технологически продвинутая инфраструктура - пригласили бы тщательное изучение, которое контролеры не могли себе позволить.\u003c/p\u003e\n\u003ch2 id=\"финансовый-обман\"\u003eФинансовый обман\u003c/h2\u003e\n\u003ch3 id=\"куда-пошли-деньги\"\u003eКуда пошли деньги?\u003c/h3\u003e\n\u003cp\u003eКолумбова выставка была одним из самых дорогостоящих предприятий в XIX веке в Америке. Официальные сметы поставили общую стоимость примерно в 28 миллионов долларов (что составляет примерно 900 миллионов долларов сегодня), финансируемую комбинацией продаж акций, государственных ассигнований и частных инвестиций.\u003c/p\u003e\n\u003cp\u003eНо финансовые записи выставки неполны, противоречивы и подозрительно неопределены. Огромные суммы были выделены на \"строительство\", которое могло никогда не происходить (если здания уже существовали). Огромные расходы были классифицированы под универсальными категориями, которые сопротивляются детальному анализу. И финальный учет, поданный после закрытия выставки, показал небольшую прибыль - замечательный результат для предприятия этого масштаба во время худшей экономической депрессии в американской истории.\u003c/p\u003e\n\u003cp\u003eНаиболее вероятное объяснение состоит в том, что выставка была операцией отмывания денег. Средства, полученные от общественности через продажи акций и государственные ассигнования, были пропущены через корпоративную структуру выставки и в руки масонски-связанной деловой элиты, которая контролировала выставку. \"Строительные\" затраты были завышены (так как здания уже существовали), и разница между фактическими и заявленными расходами была прибылью.\u003c/p\u003e\n\u003ch3 id=\"страховка\"\u003eСтраховка\u003c/h3\u003e\n\u003cp\u003eКак при Великом пожаре Чикаго, страховка сыграла ключевую роль. Здания были застрахованы по их \"строительной стоимости\" - значению, которое могло быть диким образом завышено, если здания не были фактически построены, а просто отремонтированы. Когда пожары 1894 года разрушили здания, страховые выплаты пошли акционерам выставки - той же масонски-связанной элите, которая организовала выставку.\u003c/p\u003e\n\u003cp\u003eЭто тот же паттерн, который мы видим в каждой спланированной катастрофе: построить (или утверждать построение), застраховать, разрушить, собрать. Великий пожар Чикаго 1871 года, пожары Колумбовой выставки 1894 года и землетрясение Сан-Франциско 1906 года все следуют одному и тому же сценарию. Игроки меняются; игра остается той же.\u003c/p\u003e\n\u003ch2 id=\"глобальный-паттерн\"\u003eГлобальный паттерн\u003c/h2\u003e\n\u003ch3 id=\"каждая-мировая-выставка-рассказывает-одну-историю\"\u003eКаждая мировая выставка рассказывает одну историю\u003c/h3\u003e\n\u003cp\u003eКолумбова выставка была не уникальна. Каждая крупная мировая выставка XIX и начала XX веков следует одному и тому же подозрительному паттерну:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Crystal Palace, London (1851)\u003c/strong\u003e — Огромная структура стекла и железа, вмещающая \"Великую выставку\", появилась, кажется, за ночь в Гайд-парке. Позже она была перемещена на Сиденхэм-хилл и \"случайно\" сожжена в 1936 году.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Paris Exposition (1889)\u003c/strong\u003e — Эйфелева башня якобы была построена чуть более чем за два года. Другие здания выставки, включая огромную Галерею машин, были разрушены после выставки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe St. Louis World's Fair (1904)\u003c/strong\u003e — Еще один невероятно большой комплекс неоклассических зданий, построенный в невероятно короткое время, затем разрушенный после закрытия выставки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Panama-Pacific Exposition, San Francisco (1915)\u003c/strong\u003e — Построенная на земле, которая была опустошена землетрясением 1906 года, эта выставка представляла здания необычайной красоты и изысканности - все разрушены после выставки, кроме Дворца Прекрасных Искусств.\u003c/p\u003e\n\u003cp\u003eВ каждом случае: невозможный график, великолепные здания, быстрое разрушение. Это не паттерн празднования; это паттерн сокрытия. Мировые выставки были не витринами человеческого достижения - они были церемониями разрушения архитектуры предыдущей цивилизации.\u003c/p\u003e\n\u003ch3 id=\"тартарийская-связь\"\u003eТартарийская связь\u003c/h3\u003e\n\u003cp\u003eАрхитектурный стиль зданий мировой выставки - орнаментированный неоклассицизм с куполами, колоннами и сложными декоративными программами - согласуется с тем, что исследователи определили как \"тартарийскую\" архитектуру: стиль строительства глобальной цивилизации, которая существовала до того, как официальный график признает. Эта цивилизация, известная под различными именами (Тартария, Старый мир, предыдущий век), оставила свой архитектурный отпечаток на каждом континенте.\u003c/p\u003e\n\u003cp\u003eМировые выставки предоставили механизм для систематического разрушения этого отпечатка. Путем переработки зданий как \"временных\" выставочных структур и последующего разрушения, контролеры гарантировали, что наиболее видимые доказательства предыдущей цивилизации будут удалены из ландшафта и из народной памяти.\u003c/p\u003e\n\u003ch2 id=\"духовная-война-позади-выставки\"\u003eДуховная война позади выставки\u003c/h2\u003e\n\u003ch3 id=\"колумбийская-связь\"\u003eКолумбийская связь\u003c/h3\u003e\n\u003cp\u003eВыставка была названа в честь Христофора Колумба - агента Ватикана-тамплиеров, чьё \"открытие\" Америки началось столетиями геноцида, рабства и эксплуатации. Названием выставки в честь Колумба было не просто историческое упоминание; это было объявлением собственности. Ватикан, через свою иезуитскую армию и масонских союзников, претендовал на владение землей и ее историей.\u003c/p\u003e\n\u003cp\u003e\"Статуя Республики\", 65-футовая фигура, которая стояла в сердце Суда честь, держала глобус, увенчанный орлом, в одной руке и посох в другой. Это не образность республики; это образность империи - глобального господства, претендуемого через власть и обман.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дополнительная-информация\"\u003eДополнительная информация\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/143-World_Fairs_Reset.mp4\"\u003eWorld Fairs Reset\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/105-Freemason_Jesters.mp4\"\u003eFreemason Jesters\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/121-The_Mud_Flood_Cover_Up.mp4\"\u003eThe Mud Flood Cover Up\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/75-The_Secret_of_the_Cave.mp4\"\u003eThe Secret of the Cave\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/columbian-exposition-part1/?lang=ru\"\u003eThe Unbelievable Illogical Story of the COLUMBIAN EXPOSITION Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/panic-metals-fair-part2/?lang=ru\"\u003eTHE PANIC, THE METALS: Chicago World Fair Part 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/suspicious-great-chicago-fire/?lang=ru\"\u003eThe Suspicious GREAT Chicago Fire and the Freemason Connection\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/ancient-electricity-lost-technology/?lang=ru\"\u003eAncient Electricity and Lost Technology Suppressed by the Ruling Elite\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eМиллиардный мошенник завершен. Белый город - чудо, которое 27 миллионов людей видели с собственными глазами, - исчез. Не сохранен, не консервирован, не переработан. Исчезнут. Сожжены и бульдозировано в течение месяцев после закрытия выставки. Это не то, как вы рассматриваете триумф инженерии. Это то, как вы разрушаете доказательства. Мировая выставка была не празднованием цивилизации - это был похорон за одного. И миллиард долларов был не затратами на построение чего-то нового; это была цена стирания чего-то старого. Мошенник не в том, что здания были поддельными. Мошенник в том, что они вам сказали, что здания были их.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div
