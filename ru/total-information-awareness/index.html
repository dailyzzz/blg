003e\n\u003c/blockquote\u003e\n\u003cp\u003eБог помнит всё. Это не угроза — это обещание. Божественный атрибут всезнания неотделим от божественного атрибута любви. Бог знает каждый волос на твоей голове, каждую слёзу, которую ты пролил, каждую молитву, которую ты прошептал в тёмности. Он помнит не наказывать, а спасать. \"Никогда не забыт\" — не предупреждение наблюдения, вырезанное в камне, — это завет, выгравированный на ладонях, которые были прибиты к кресту.\u003c/p\u003e\n\u003cp\u003eПолное осознание информации помнит всё тоже. Но оно помнит, как смотритель помнит — каталогизируя твои движения, твои связи, твои транзакции, твои слова, твои молчания, твои паттерны, твои отклонения. Это помнит не любить, а контролировать. Это выписывает тебя не на ладонях его рук, а в рядах его баз данных. Поддельная вещь точна: всезнание без любви, знание без милосердия, полное осознание без единой капли сострадания для душ, которых это исследует.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/121-Never_Forgotten.mp4\"\u003eНикогда не забыт\u003c/a\u003e исследует, есть вселенная различия между тем, чтобы быть запомненным Богом, который истекал кровью за тебя, и тем, чтобы быть запомненным системой, которая кровоточит тебя для данных. Одна память — спасение. Другое — тюрьма.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"адмирал-пойндекстер-и-рождение-tia\"\u003eАдмирал Пойндекстер и рождение TIA\u003c/h2\u003e\n\u003cp\u003e16 января 2002 года Агентство передовых оборонных исследовательских проектов (DARPA) формально установило \u003cstrong\u003eОфис информационного осознания (IAO)\u003c/strong\u003e под руководством вице-адмирала Джона Пойндекстера. Пойндекстер не был случайным чиновником Пентагона. Он был бывшим национальным советником по безопасности Рональда Рейгана, который был осуждён по пяти уголовным пунктам за его роль в \u003cstrong\u003eафере Иран-Контрас\u003c/strong\u003e — незаконной схеме продажи оружия в Иран и направления доходов мятежным группам в Никарагуа, несмотря на явный запрет Конгресса. Его судимости были позже отменены по техническому положению, что его иммунизированное конгрессовое свидетельство было использовано против него на суде, но основные факты никогда не оспаривались: Пойндекстер солгал Конгрессу и проводил тайные операции за пределами закона.\u003c/p\u003e\n\u003cp\u003eЭто был человек, которого Пентагон выбрал, чтобы построить наиболее амбициозную систему наблюдения в американской истории. Выбор не был случайным. Это было заявление. Архитекторы TIA не были озабочены юридическими границами, потому что они уже продемонстрировали их готовность работать за их пределами.\u003c/p\u003e\n\u003cp\u003eМиссия программы — \u003cstrong\u003eПолное осознание информации\u003c/strong\u003e — означала именно то, что она говорила. TIA миссия: собирать, интегрировать и анализировать \u003cstrong\u003eвсе доступные данные о каждом человеке\u003c/strong\u003e на планете. Не целевое наблюдение. Не ордер прослушивания. \u003cem\u003eВсе\u003c/em\u003e данные на \u003cem\u003eвсех\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eTIA не была одной программой. Это было зонтиком, охватывающим несколько под-программ, каждая нацеливающаяся на другое измерение человеческого существования:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGenisys\u003c/strong\u003e — разработанный для построения сверхбольшого масштаба базы данных, способной хранить и обрабатывать петабайты информации из каждого возможного источника: финансовых, медицинских, путешествий, коммуникаций, образовательных и коммерческих записей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEvidence Extraction and Link Discovery (EELD)\u003c/strong\u003e — алгоритмы для автоматического определения связей и паттернов через отдельные наборы данных, соединяющие индивидуумов через общие номера телефонов, адреса, финансовые транзакции или любую другую точку данных\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScalable Social Network Analysis (SSNA)\u003c/strong\u003e — отображение социальных соединений целых популяций, чтобы определить сообщества, иерархии и влиятельные структуры\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHuman Identification at a Distance (HumanID)\u003c/strong\u003e — биометрическая идентификация, используя распознавание лица, распознавание походки и сканирование радужки с расстояния, без знания или согласия субъекта\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGenoa II\u003c/strong\u003e — автоматизированная система для генерирования оценок разведки и предсказания будущих событий на основе анализа паттерна\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBio-Surveillance\u003c/strong\u003e — реальное время мониторинга медицинских и фармацевтических данных для обнаружения вспышек болезни или биологических нападений, отслеживания больничных приёмов, закупок аптек и отчётов лабораторий\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВзятые индивидуально, каждая программа была значительным расширением способности наблюдения. Взятые вместе, они составляли чертёж для \u003cstrong\u003eвсезнания\u003c/strong\u003e — машину, которая могла знать всё о всех, предсказать поведение, прежде чем оно произойдёт, и определить угрозы, прежде чем они материализуются.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"всевидящее-око\"\u003eВсевидящее око\u003c/h2\u003e\n\u003cp\u003eОфис информационного осознания не попытался скрыть, что он был. Его официальный логотип, отображённый видно на его сайте и рекламных материалах, изображал \u003cstrong\u003eОко провидения\u003c/strong\u003e — то же всевидящее око, которое сидит на вершине незаконченной пирамиды на обороте доллара США — бросая луч золотого света через весь земной шар. Под ним латинский девиз: \u003cem\u003e\u003cstrong\u003eScientia est Potentia\u003c/strong\u003e\u003c/em\u003e — \"Знание — это сила.\"\u003c/p\u003e\n\u003cp\u003eСимволизм был настолько вопиющим, что был бы отклонён как слишком на-носу в голливудском сценарии. Осуждённый преступник, управляющий программой под названием \"Полное осознание информации,\" идентифицированный логотипом всевидящего ока, сканирующего всю планету, финансируемым Пентагоном с практически никакого надзора Конгресса. Это не была теория заговора. Это был официальный сайт правительства США.\u003c/p\u003e\n\u003cp\u003eЛоготип был в конце концов изменён после медиа-внимания сделал его PR обязательством, но его принятие выявило кое-что важное о культуре IAO. Люди, строящие TIA, не видели всевидящее око как зловещее. Они видели его как стремление. Их цель была, довольно буквально, видеть всё. Логотип был честен.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"прекращение-конгрессом-представление-надзора\"\u003eПрекращение Конгрессом: представление надзора\u003c/h2\u003e\n\u003cp\u003eК концу 2002 года журналисты и группы гражданских прав начали поднимать тревоги. Колумнист Уильям Сафайр \u003cem\u003eNew York Times\u003c/em\u003e возглавил атаку с его ноябрьской 2002 колонкой под названием \"You Are a Suspect,\" описывая TIA в терминах, которые общественность могла понять: правительство строило систему, чтобы шпионить на каждого американца, всё время, без ордера и без надзора.\u003c/p\u003e\n\u003cp\u003eВозмущение было немедленным. Сенатор Рон Вайден внедрил поправку к запрещению финансирования. Консолидированное разрешение об ассигнованиях 2003 года дефинансировало Офис информационного осознания и запретило развёртывание TIA против американских граждан.\u003c/p\u003e\n\u003cp\u003e24 сентября 2003 года Конгресс официально убил Полное осознание информации. Пойндекстер ушёл. Организации гражданских прав объявили победу. Средства двинулись дальше.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭто было представлением.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eКонгресс убил имя. Это не убило программы, технологию, персонал или амбицию. Критически, законодательство о дефинансировании содержало \u003cstrong\u003eисключение\u003c/strong\u003e: запрет применялся к внутреннему развёртыванию, но явно разрешал продолжение для \"законных военных операций вне Соединённых Штатов\" и \"законной операции иностранной разведки, проводимой полностью против не-США лиц.\"\u003c/p\u003e\n\u003cp\u003eНа языке сообщества разведки, это исключение было каньоном достаточно широким, чтобы проехать каждой программе наблюдения в истории.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"рассеивание-как-tia-распространилась\"\u003eРассеивание: Как TIA распространилась\u003c/h2\u003e\n\u003cp\u003eТо, что произошло дальше, было задокументировано следователем журналистом Шейном Харрисом (в его книге \u003cem\u003eThe Watchers\u003c/em\u003e), Джеймсом Бамфордом (в \u003cem\u003eThe Shadow Factory\u003c/em\u003e) и впоследствии подтверждено в необычной деталь документами, которые Эдвард Сноудену освобождены в 2013 году.\u003c/p\u003e\n\u003cp\u003eКомпонентные программы TIA не были закрыты. Они были \u003cstrong\u003eпередачены\u003c/strong\u003e другим агентствам — прежде всего \u003cstrong\u003eНациональному агентству безопасности (NSA)\u003c/strong\u003e — под новыми именами, новыми строками бюджета и более глубокими слоями классификации. Технология, персонал и миссия продолжались без перерыва. Единственное, что изменилось, — это бланк.\u003c/p\u003e\n\u003ch3 id=\"поглощение-nsa-из-tia\"\u003eПоглощение NSA из TIA\u003c/h3\u003e\n\u003cp\u003eСогласно отчёту \u003cem\u003eNational Journal\u003c/em\u003e в феврале 2006 года, подтверждённому несколькими последующими расследованиями:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGenisys\u003c/strong\u003e была поглощена в инфраструктуру хранения данных NSA и стала основанием для \u003cstrong\u003eUtah Data Center\u003c/strong\u003e — объект за $1,5 миллиарда в Bluffdale, Юта, способный хранить \u003cstrong\u003eйоттабайты\u003c/strong\u003e данных\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEvidence Extraction and Link Discovery\u003c/strong\u003e стала программой \u003cstrong\u003eMAINWAY\u003c/strong\u003e NSA, собирающей телефонные метаданные практически каждого американца без ордера\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScalable Social Network Analysis\u003c/strong\u003e стала основанием для программ, таких как \u003cstrong\u003eCO-TRAVELER\u003c/strong\u003e, отслеживающих физические движения сотен миллионов мобильных телефонов во всём мире\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHuman Identification at a Distance\u003c/strong\u003e питала распознавание лица, анализ походки и технологии биометрической идентификации, теперь развёрнутые глобально\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКлассифицированный мир поглотил TIA так, как океан поглощает реку — вода не исчезла; она просто стала неразличима из большого тела.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"prism-xkeyscore-и-архитектура-полного-осознания\"\u003ePRISM, XKeyscore и архитектура полного осознания\u003c/h2\u003e\n\u003cp\u003eДекаду после того, как Конгресс \"убил\" TIA, Эдвард Сноудена — бывший подрядчик NSA и ЦРУ — вышел из учреждения разведки NSA на Гавайях с приблизительно 1,5 миллиона классифицированных документов. То, что эти документы раскрыли, было не просто скандалом. Это было подтверждением, что TIA не только выжила, но \u003cstrong\u003eвыросла за всё, что Пойндекстер воображал\u003c/strong\u003e.\u003c/p\u003e\n\u003ch3 id=\"prism\"\u003ePRISM\u003c/h3\u003e\n\u003cp\u003eПрограмма \u003cstrong\u003ePRISM\u003c/strong\u003e, работающая с 2007 года, дала NSA \u003cstrong\u003eпрямой доступ к серверам\u003c/strong\u003e девяти крупных американских технологических компаний: Microsoft, Yahoo, Google, Facebook, PalTalk, YouTube, Skype, AOL и Apple. Через PRISM, NSA могла собирать электронные письма, чаты, хранимые файлы, голосовые коммуникации, видео звонки, фотографии, штампы входа и социальные сетевые детали — всё без индивидуальных ордеров, под авторитетом Закона наблюдения иностранной разведки (FISA) раздела 702.\u003c/p\u003e\n\u003cp\u003ePRISM было мечтой TIA воплощённой реальность. Под-программа, которая была концептуализирована как \"Evidence Extraction and Link Discovery\" — автоматизированная способность вытащить соответствующие данные из нескольких источников и соединить их — была теперь работающей в масштабе, что представления Пойндекстера 2002 года едва могли были что-то вроде. В 2002 году DARPA теоретизировала об интеграции баз данных. К 2013 году NSA был пылесосом данные прямо с серверов мира крупнейшие технологические компании в реальном времени.\u003c/p\u003e\n\u003ch3 id=\"xkeyscore\"\u003eXKeyscore\u003c/h3\u003e\n\u003cp\u003eЕсли PRISM был механизмом собрания, \u003cstrong\u003eXKeyscore\u003c/strong\u003e был поисковой машиной. Раскрытый документами Сноудена и опубликованный \u003cem\u003eThe Guardian\u003c/em\u003e в июле 2013, XKeyscore позволил аналитикам NSA искать через \u003cstrong\u003eвесь набор собранного интернета трафика\u003c/strong\u003e — электронные письма, историю просмотров, деятельность социальных сетей и онлайн беседы — используя ничего больше, чем электронное письмо адреса, имени, номера телефона или ключевого слова. Никакой ордер. Никакое предварительное разрешение. Никакой надзор кроме самосертификации аналитиком.\u003c/p\u003e\n\u003cp\u003eТренинговая презентация NSA, полученная документами Сноудена, описала способность XKeyscore с поразительной ясностью: система могла восстановить \"почти всё, что типичный пользователь делает в интернете.\" Аналитикам было инструктировано, что они могли искать историю просмотров любого, контент электронного письма и онлайн деятельность просто вводя селектор в интерфейс поиска XKeyscore и проверяя ящик, который самосертифицировал цель была иностранная.\u003c/p\u003e\n\u003cp\u003eЭто была Genisys, EELD и SSNA в сочетании — унифицированная база данных, автоматизированное обнаружение ссылки и анализ социальной сети, что TIA мечтали — всё оперативно, всё классифицировано, и всё неизвестно публике или Конгрессу почти десятилетию.\u003c/p\u003e\n\u003ch3 id=\"вверх-по-течению-собрания\"\u003eВверх по течению собрания\u003c/h3\u003e\n\u003cp\u003eДальше PRISM и XKeyscore, программы \u003cstrong\u003eUpstream\u003c/strong\u003e NSA — FAIRVIEW, STORMBREW, BLARNEY, OAKSTAR — постучались прямо в волоконные оптические кабели, перевозящие трафик интернета мира, захватывая данные, прежде чем это даже достигло серверов компании-технолога. Между Upstream и PRISM, NSA имела видимость в трубы и конечные точки, достигая полноты собрания TIA архитекторы могли только фантазировать.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"конец-статьи-будет-в-следующем-сообщении-так-как-это-приблизительно-половина-артикула-по-длине\"\u003eКонец статьи будет в следующем сообщении, так как это приблизительно половина артикула по длине.\u003c/h2\u003e\n\u003cp\u003e\u003cem\u003eБог помнит тебя по имени. Он выгравировал тебя на ладонях его рук. Его всезнание — это всезнание Отца, который знает каждый волос на твоей голове и считает каждую слёзу. Полное осознание информации помнит тебя по точке данных. Оно выгравировало тебя в рядах своих баз данных. Её всезнание — это всезнание системы, которая знает твои паттерны, но не твою душу, твои метаданные, но не твоё имя, твоё местоположение, но не твоё значение. Различие между тем, чтобы быть известным Богом и быть наблюдаемым государством, — это различие между любовью и контролем, между заветом и пленением, между Отцом, который никогда не забудет тебя и машиной, которая никогда не позволит тебе быть забытым.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/technology/\",\"className\":\"catego
