отиворечит истине — это иллюзия, которая полностью заменяет реальность. Система Иллюминатов и масонов, которая была установлена в восемнадцатом веке, стремилась не просто контролировать правительства, институты и население. Она стремилась построить альтернативную реальность — иллюзию настолько всеобъемлющую, что живущие в ней никогда не воспримут тюремные стены. Революции, конституции, демократические системы, возникшие из этого периода, были не тем, чем казались. Это были декорации, предназначенные для придания видимости свободы, скрывая при этом механизмы абсолютного контроля.\u003c/p\u003e\n\u003cp\u003eОколосмертный опыт Говарда Питтмана раскрыл, что духовное царство — истинная реальность — действует за завесой, которую большинство людей никогда не проникают. Три неба, которые он описал, представляют многослойную структуру самой реальности, и демоны второго неба специализируются на создании иллюзий, которые мешают людям воспринимать третье небо. Система Иллюминатов действует по этому же принципу: создание политической и культурной иллюзии, которая мешает ее подданным воспринимать истинную властную структуру. Питтман узнал, что 97,5% идут широкой дорогой к разрушению — и иллюзия является самой дорогой, тщательно вымощенной и привлекательно освещенной, чтобы замаскировать ее пункт назначения.\u003c/p\u003e\n\u003cp\u003eИезуиты, мастера театральной презентации со времен Контрреформации, предоставили экспертизу в искусстве иллюзий, которая требовалась системе Иллюминатов. «Католические тайны» документируют их метод действия «скрытого хитростью», и весь постпросвещенческий политический порядок — их величайшее покрывало. Как исследуется в \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь обманщика\u003c/a\u003e и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e, отец лжи также является отцом иллюзий — и его величайшая иллюзия — это сам современный мир.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"иллюзия-просвещения\"\u003eИллюзия Просвещения\u003c/h2\u003e\n\u003ch3 id=\"изготовленный-разум\"\u003eИзготовленный разум\u003c/h3\u003e\n\u003cp\u003eПросвещение — интеллектуальное движение, которое произвело философские основы современного мира — представляется как освобождение человечества от суеверий и тирании через применение разума. Скрытая история раскрывает движение, которое было изготовлено сетями тайных обществ для служения их стратегическим целям, используя язык разума для продвижения программы, которая была фундаментально иррациональной.\u003c/p\u003e\n\u003cp\u003eКлючевые фигуры Просвещения — Вольтер, Руссо, Дидро, д'Аламбер — были связаны с масонскими и иллюминатскими сетями. Вольтер был посвящен в масонство в Ложе девяти сестер в Париже, той же ложе, где действовал Бенджамин Франклин. Теория Руссо о «общей воле» предоставила теоретическое оправдание для тоталитаризма, замаскированного под демократию. Энциклопедия Дидро была оружием культурной войны, предназначенным для замены христианского мировоззрения материалистической философией.\u003c/p\u003e\n\u003cp\u003eПросвещение не было спонтанным интеллектуальным пробуждением — это была координированная кампания, финансируемая и направляемая сетями, которые понимали силу идей как инструментов социальной трансформации. Иезуиты, которые контролировали европейское образование в течение двух столетий, понимали лучше, чем кто-либо, что тот, кто формирует интеллект, формирует мир. Просвещение было их созданием — не в том смысле, что они соглашались с его публично заявленными принципами, но в том смысле, что они направляли сети тайных обществ, которые произвели его как инструмент для разрушения протестантского порядка, который угрожал иезуитской власти.\u003c/p\u003e\n\u003ch3 id=\"диалектический-метод\"\u003eДиалектический метод\u003c/h3\u003e\n\u003cp\u003eСистема Иллюминатов действует через диалектику — создание противоположных сил, которые тайно контролируются одной и той же скрытой рукой. Тезис и антитезис производят синтез, и синтез всегда движет мир ближе к цели Иллюминатов тотального централизованного контроля. Просвещение против Церкви, либерализм против консерватизма, капитализм против коммунизма — все являются диалектическими противоположностями, созданными и управляемыми для производства предопределенных результатов.\u003c/p\u003e\n\u003cp\u003eЭта методология была формализована Георгом Вильгельмом Фридрихом Гегелем, чья диалектическая философия предоставила интеллектуальную структуру как для марксизма, так и для фашизма. Система Гегеля — в которой противоположные идеи сталкиваются и производят высшие синтезы — была не просто философским наблюдением, но операционным планом. Система Иллюминатов создает противоположности, управляет конфликтами и собирает синтезы. Каждый политический конфликт, каждая культурная война, каждое социальное потрясение — это управляемый театр, производящий результаты, которые были определены до поднятия занавеса.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eПолная осведомленность об информации\u003c/a\u003e исследует современное проявление этого контроля — системы слежения, которые обеспечивают, что менеджеры диалектики всегда обладают большей информацией, чем любой из участников. Информационная асметрия — это основа иллюзии: те, кто контролирует информацию, контролируют восприятие, а те, кто контролирует восприятие, контролируют саму реальность.\u003c/p\u003e\n\u003ch2 id=\"иллюзия-демократии\"\u003eИллюзия демократии\u003c/h2\u003e\n\u003ch3 id=\"контролируемые-выборы\"\u003eКонтролируемые выборы\u003c/h3\u003e\n\u003cp\u003eДемократические системы, которые возникли из Просвещения и революционной эры, представляются как высшее выражение народного суверенитета — правление народа, народом, для народа. Скрытая реальность заключается в том, что демократические системы управлялись с момента их создания теми же сетями, которые их создали, обеспечивая, что избирательные результаты служат интересам скрытых контролеров, независимо от того, какой кандидат или партия победит.\u003c/p\u003e\n\u003cp\u003eМеханизм прост: контролируйте кандидатов, и вы контролируете результат независимо от голосования. Масонские и иллюминатские сети исторически обеспечивали, чтобы ключевые политические позиции оспаривались кандидатами, которые все связаны с сетью. Избиратели выбирают между вариантами, которые были предварительно отобраны теми, кто контролирует политическую систему. Иллюзия выбора поддерживается, в то время как реальность выбора устраняется.\u003c/p\u003e\n\u003cp\u003eЭто не современная разработка — это была операционная реальность западной демократии с момента ее создания. Отцы-основатели Соединенных Штатов были подавляющим образом масонами, и политическая система, которую они создали, обеспечила, что масонское влияние будет внедрено в каждое последующее поколение руководства. Двухпартийная система, которая возникла в течение десятилетия после ратификации Конституции, создала идеальную диалектическую структуру: две по-видимому противоположные партии, обе контролируемые одними и теми же сетями, создающие иллюзию политического конфликта, преследуя при этом одни и те же фундаментальные цели.\u003c/p\u003e\n\u003ch3 id=\"иллюзия-сми\"\u003eИллюзия СМИ\u003c/h3\u003e\n\u003cp\u003eСМИ, которые информируют демократическое население о выборах, которые они должны сделать, контролировались теми же сетями, которые контролируют политическую систему, с самых ранних дней массмедиа. Операция Mockingbird, программа ЦРУ, которая разместила разведывательные активы в крупных новостных организациях, не была инновацией — это была формализация отношений, которые существовали с рождения американской прессы.\u003c/p\u003e\n\u003cp\u003eБенджамин Франклин, основатель одной из первых крупных американских газет, был масоном и оперативником разведки. Традиция, которую он установил — владение и контроль СМИ членами тайных обществ — продолжалась непрерывно до настоящего дня. Консолидация владения СМИ в руках горстки корпораций, все связанных с теми же финансовыми и разведывательными сетями, обеспечивает, что информационная среда так же тщательно контролируется, как и политическая среда.\u003c/p\u003e\n\u003cp\u003eИллюзия зависит от восприятия разнообразия. Множество газет, множество телеканалов, множество веб-сайтов — видимость рынка идей. Реальность — это тщательно курируемая информационная среда, в которой разрешенные дебаты происходят в границах, установленных контролерами, и информация, которая угрожает иллюзии, систематически подавляется, дискредитируется или игнорируется. Трек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eОдна нация под шантажом\u003c/a\u003e прослеживает сети шантажа, которые обеспечивают соблюдение СМИ.\u003c/p\u003e\n\u003ch2 id=\"иллюзия-религиозной-свободы\"\u003eИллюзия религиозной свободы\u003c/h2\u003e\n\u003ch3 id=\"контролируемая-оппозиция\"\u003eКонтролируемая оппозиция\u003c/h3\u003e\n\u003cp\u003eАмериканская система религиозной свободы представляется как одно из ее величайших достижений — разделение церкви и государства, которое защищает право каждого человека поклоняться согласно совести. Скрытая реальность заключается в том, что религиозная свобода, как реализована в системе Иллюминатов, функционирует как механизм для нейтрализации духовной власти Церкви, создавая при этом видимость ее защиты.\u003c/p\u003e\n\u003cp\u003eУдаляя религию с публичной площади и ограничивая ее частной сферой, система религиозной свободы достигла того, чего не могли достичь столетия преследований: она сделала христианство политически нерелевантным. Христиане могли свободно поклоняться в своих церквях, читать свои Библии в своих домах и молиться своему Богу в своих комнатах — но они не могли принести свою веру для управления обществом. «Стена разделения» между церковью и государством была не защитой религии; это была структура сдерживания, предназначенная для предотвращения вмешательства религиозной истины в светскую властную структуру.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые действовали как политическая рука католической церкви на протяжении столетий, прекрасно понимали эту динамику. Система религиозной свободы, которую преимущественно масонские отцы-основатели установили, служила иезуитским интересам, ослабляя протестантское политическое влияние, создавая при этом среду, в которой учреждения, связанные с иезуитами — университеты, больницы, благотворительные организации — могли действовать и расширяться без ограничений, которые установленные протестантские церкви наложили бы.\u003c/p\u003e\n\u003ch3 id=\"замена-нью-эйдж\"\u003eЗамена Нью Эйдж\u003c/h3\u003e\n\u003cp\u003eРелигиозный вакуум, созданный нейтрализацией христианства, не был оставлен незаполненным. Те же сети, которые продвигали отказ Просвещения от традиционной религии, одновременно продвигали альтернативные духовные системы — теософию, спиритуализм, Новую мысль и в конечном итоге движение Нью Эйдж — которые черпали из тех же оккультных традиций, которые лежат в основе масонства и Иллюминатов.\u003c/p\u003e\n\u003cp\u003eЭти заменяющие религии разделяют общие характеристики: они отвергают исключительность Христа, они утверждают божественность человеческого я, они практикуют техники, происходящие из восточных и герметических традиций, и они продвигаются через сети, связанные с теми же разведывательными структурами и тайными обществами, которые контролируют политические и медийные системы. Движение Нью Эйдж — это не массовый духовный феномен — это управляемая духовная программа, предназначенная для направления духовного голода, который когда-то удовлетворяло христианство, к выходам, которые служат противнику.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана о 95%, которые служат «себе», а не Богу, определяет духовную динамику, которую эксплуатирует движение Нью Эйдж. Самопоклонение — убеждение, что божественное находится внутри индивидуального я, а не трансцендентно в Боге — является основополагающей доктриной Нью Эйдж, и это основополагающая доктрина люциферианства. Трек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eПреступление\u003c/a\u003e прослеживает это самопоклонение к его происхождению: обещание змея «вы будете как боги».\u003c/p\u003e\n\u003ch2 id=\"иллюзия-прогресса\"\u003eИллюзия прогресса\u003c/h2\u003e\n\u003ch3 id=\"управляемый-упадок\"\u003eУправляемый упадок\u003c/h3\u003e\n\u003cp\u003eНарратив прогресса — идея, что человечество продвигается к лучшему будущему через науку, технологию и социальную реформу — это самая мощная иллюзия в системе Иллюминатов. Она предоставляет структуру, в которой действует каждая другая иллюзия: демократический прогресс, научный прогресс, моральный прогресс, социальный прогресс. Реальность заключается в том, что то, что называется «прогрессом», более точно описывается как управляемый упадок — систематическое разрушение традиционных институтов, убеждений и социальных структур в подготовке к их замене централизованными, контролируемыми альтернативами.\u003c/p\u003e\n\u003cp\u003eКаждый этап «прогресса» произвел большую централизацию власти, большую слежку за населением, большую зависимость от институциональных систем и большее расстояние от Бога. «Прогресс» промышленной революции произвел урбанизацию, фабричный труд и разрушение сельскохозяйственных общин. «Прогресс» государства всеобщего благосостояния произвел зависимость, распад семьи и правительственный контроль. «Прогресс» цифровой революции произвел тотальную слежку, алгоритмическую манипуляцию и устранение конфиденциальности.\u003c/p\u003e\n\u003cp\u003eКаждая из этих разработок представлялась как освобождение, но функционировала как порабощение. Каждая продвигалась теми же сетями, финансировалась теми же финансовыми институтами и реализовывалась правительствами, укомплектованными теми же членами тайных обществ. Образец последователен, потому что планировщики последовательны — те же семьи, те же организации, и за ними те же начальства и власти.\u003c/p\u003e\n\u003ch3 id=\"технологическая-клетка\"\u003eТехнологическая клетка\u003c/h3\u003e\n\u003cp\u003eТехнологический прогресс, прославляемый современным обществом, строит самую всеобъемлющую систему контроля в человеческой истории. Цифровая слежка, биометрическая идентификация, безналичные финансовые системы, оценка социального кредита и искусственный интеллект создают инфраструктуру контроля, о которой предыдущие тоталитарные режимы могли только мечтать. Технология представляется как удобная, полезная и неизбежная — иллюзия, которая скрывает ее истинную цель как инструмента тотального контроля.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eПолная осведомленность об информации\u003c/a\u003e документирует развитие государства слежки от его истоков в программах разведывательного сообщества до его текущего проявления как всепроникающей, неизбежной системы мониторинга и контроля. Технологическая клетка строится по частям, каждое добавление представляется как полезная инновация, а не как звено в цепи.\u003c/p\u003e\n\u003ch2 id=\"разрушение-иллюзии\"\u003eРазрушение иллюзии\u003c/h2\u003e\n\u003ch3 id=\"духовное-зрение\"\u003eДуховное зрение\u003c/h3\u003e\n\u003cp\u003eИллюзия может быть разрушена только духовным зрением — способностью воспринимать духовную реальность за материальным внешним видом. Это не метафорическая или абстрактная концепция; это операционная реальность христианской духовной жизни. Заявление Павла во 2 Коринфянам 4:18 — «Когда мы смотрим не на видимое, но на невидимое: ибо видимое временно, а невидимое вечно» — описывает фундаментальный сдвиг в восприятии, который требуется для побега из иллюзии Иллюминатов.\u003c/p\u003e\n\u003cp\u003eОколосмертный опыт Говарда Питтмана был, по сути, опытом духовного зрения — временной способностью воспринимать духовные измерения реальности, которые обычно невидимы для людей. То, что он увидел — демоническая иерархия, организация зла, точность духовной войны — это реальность, которую иллюзия предназначена скрыть. Иллюзия функционирует, потому что людям не хватает духовного зрения; она рушится, когда духовное зрение восстанавливается.\u003c/p\u003e\n\u003cp\u003eВосстановление духовного зрения требует того, что Новый Завет называет metanoia — покаяние, фундаментальная трансформация ума. Это не просто изменение мнений; это полная переориентация сознания с материального на духовное, с временного на вечное, с себя на Бога. 95%, которые служат «себе», не хватает этой переориентации — они остаются в ловушке иллюзии, потому что они никогда не прошли трансформацию, которая позволила бы им увидеть сквозь нее.\u003c/p\u003e\n\u003ch3 id=\"цена-видения\"\u003eЦена видения\u003c/h3\u003e\n\u003cp\u003eВидение сквозь иллюзию имеет цену. Те, кто воспринимает духовную реальность за материальным фасадом, маргинализируются, высмеиваются и преследуются системой, предназначенной для поддержания иллюзии любой ценой. Ярлыки, применяемые к тем, кто ставит под сомнение официальный нарратив — «теоретик заговора», «экстремист», «опасный» — являются инструментами социального контроля, предназначенными для отговаривания от преследования истины.\u003c/p\u003e\n\u003cp\u003eНо цена отказа от видения гораздо больше. 97,5%, которые идут широкой дорогой к разрушению, делают это, потому что не могут видеть, куда ведет дорога. Иллюзия скрывает пункт назначения — вечное отделение от Бога, разрушение, которое ожидает тех, кто никогда не проникает за завесу, чтобы воспринять духовную реальность. Цена видения социальная; цена отказа от видения вечная.\u003c/p\u003e\n\u003cp\u003eТреки \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eВоинства Сатаны\u003c/a\u003e разоблачают силы, которые поддерживают иллюзию — силы, которые действуют как внутри внешних институтов общества, так и внутри внутреннего сознания людей, которые были обусловлены принять иллюзию как реальность. Освобождение требует противостояния обоим измерениям: внешней системе контроля и внутреннему программированию, которое ее поддерживает.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушай голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтоб Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (Синодальный)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 эхом отзывается в каждом правительственном коридоре сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их точно, что произойдет — их сыновья будут взяты на войну, их дочери на службу, их поля и виноградники изъяты, десятая часть всего конфискована. Они выбрали человеческое правление вместо царствования Бога, и тирания последовала точно так, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной и той же скрытой властной структуре. Голосование за любую сторону — это выбор, какое крыло махает следующим, в то время как птица летит в том же направлении. Реальная власть никогда не была ни в одном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eAgent131711, «Иллюзия Иллюминатов», \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство НДЕ Говарда Питтмана\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические тайны: Разоблачение достойных порицания секретов иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (Синодальный)\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eОтцы-основатели Иллюминатов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eОдна нация под шантажом\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eПолная осведомленность об информации\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь обманщика\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pope-deal-devil-1786-part3/?lang=ru\"\u003eСделка Папы с дьяволом в 1786 году Часть 3\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/constitution-secret-constitution-part5/?lang=ru\"\u003eКОНституция: СЕКРЕТНАЯ Конституция, которой вас никогда не учили Часть 5\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/selling-america-perverted-power-part6/?lang=ru\"\u003eПРОДАЖА АМЕРИКИ: ИЗВРАЩЕННАЯ ВЛАСТЬ и ПЕНТАГРАММА Часть 6\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eБыло ли это все иллюзией? Демократия, свобода, прогресс — каждый элемент современного мира, который должен был представлять триумф человечества над тиранией? Доказательства ошеломляющие: система Иллюминатов и масонов не создала свободу; она создала иллюзию свободы, строя при этом самую изощренную систему контроля в человеческой истории. За декорациями демократии, за театром политического конфликта, за нарративом прогресса та же скрытая рука направляет ту же древнюю программу. Иллюзия может быть разрушена — но только теми, кто готов увидеть, что за ней лежит, и принять цену этого зрения.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$
