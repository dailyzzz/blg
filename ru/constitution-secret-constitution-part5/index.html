uote\u003e\n\u003cp\u003eКонституция Соединённых Штатов почитается как высший закон земли — вдохновлённый божественно документ, который установил республику свободных людей, управляющих собой через избранных представителей. Скрытая история раскрывает документ, который был намного более сложным в его истоках и намного более обманчивым в его целях, чем патриотическое повествование признаёт. Конституция была не просто политической базой — это была юридическая архитектура, разработанная людьми, пропитанными масонским и иезуитским правоведением, встраивая внутри своего тщательно ремесленного языка положения, которые бы позволили именно централизованный контроль, который документ казался предотвращающим.\u003c/p\u003e\n\u003cp\u003eСвидетельство Хоуарда Питтмана раскрывает фундаментальную истину об обмане: наиболее эффективные ложи содержат подлинную истину. Конституция содержит подлинные защиты для индивидуальной свободы — Билль прав, разъединение сил, механизмы представительного правления. Эти подлинные элементы — то, что делает обман эффективным. Они предоставляют истину, которая делает ложь доверяемой, сахар, который делает яд палаталь. 97,5%, которые идут по дороге разрушения, включают патриотов, которые поклоняются конституции, не понимая скрытые положения, которые подрывают её заявленную цель.\u003c/p\u003e\n\u003cp\u003eИезуиты, чьи юридическое предание казуистики совершили искусство говорить одно, имея в виду другое, предоставили интеллектуальный каркас для документа, который мог одновременно proclaim свободу и enable тирания. Наполеон признал: \"Иезуиты — это военная организация, не религиозный орден... цель — власть.\" Та власть была встроена в основание Америки через язык настолько тщательно ремесленный, что его истинные последствия не были бы поняты поколениями. Треки \u003cem\u003eThe Enemy Within\u003c/em\u003e и \u003cem\u003eThe Deceivers Lies\u003c/em\u003e раскрывают, как обман действует из внутри структур, предназначенных защищать против него.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"конвенция-конституции-переворот\"\u003eКонвенция конституции: переворот\u003c/h2\u003e\n\u003ch3 id=\"что-действительно-произошло-в-филадельфии\"\u003eЧто действительно произошло в Филадельфии\u003c/h3\u003e\n\u003cp\u003eКонституционная конвенция 1787 была созвана якобы для переделения статей конфедерации — существующей управляющей базе Соединённых Штатов. Делегатам были авторизованы предложить поправки к статьям, не заменять их полностью. Что произошло вместо этого была полная перестройка существующего правления — проводимого в секретности, позади заперты дверей, с часовыми разместа, чтобы предотвратить любое неавторизованное наблюдение.\u003c/p\u003e\n\u003cp\u003eРазбирательства конвенции были держимы в секретности для десятилетий. Примечания Джеймса Мэдисона, наиболее полный рекорд дебатов, не были опубликованы до 1840 — более пятидесяти лет после конвенции и четыре года после смерти Мэдисона. Секретность была не случайной; это было существенным. Делегаты знали, что они превышали свой анализ, и они знали, что публичная забота их разбирательств бы произвела оппозицию, которая могла иметь предотвращена конституция ratификации.\u003c/p\u003e\n\u003cp\u003eКонвенция была доминирована масонами и людьми, связанными с масонскими-иллюминистическими сетями. Джордж Вашингтон, президент конвенции, был масоном. Бенджамин Франклин, старец конвенции, был высокоранговым масоном с связями к европейским сетям тайного общества. Александр Хэмилтон, который чемпионировал сильнейшее возможное центральное правление, имел связи к финансовым сетям, которые позже будут доказаны инструментальными в установлении систем контроля, которые конституция позволила.\u003c/p\u003e\n\u003ch3 id=\"предупреждение-против-федералистов\"\u003eПредупреждение против-федералистов\u003c/h3\u003e\n\u003cp\u003eПротивники конституции — против-федералисты — признали опасность, которую предложенный документ представлял. Патрик Генри, который имел отказано посещать конвенцию, потому что он \"пахнул крысой,\" предупредил, что конституция создаст консолидированное правление, которое разрушит суверенитет государств и свободу людей. Джордж Мейсон, который посетил конвенцию, но отказался подписать документ, объектировал отсутствие билля прав и огромные полномочия, предоставленные федеральному правлению.\u003c/p\u003e\n\u003cp\u003eПредупреждения против-федералистов доказали пророческие. Каждое расширение федеральной власти, которое произошло со времён ratifikatsii — от закона Чужого и наказаний 1798 к Patriot акту 2001 — было выполнено через положения встроены в язык конституции. \"Elastic кlauzula\" (статья I, секция 8, пункт 18), который предоставляет конгрессу власть делать \"все законы, которые будут необходимы и надлежащи\" для выполнения его перечисленных полномочий, предоставили правовые основание для практически неограниченной федеральной власти. \"Supremacy klauzula\" (статья VI, пункт 2), который установленного конституция и федеральное право как \"высший закон земли,\" гарантировал, что федеральная власть будет всегда преобладать над государством, сопротивлением.\u003c/p\u003e\n\u003ch2 id=\"скрытая-правовая-база\"\u003eСкрытая правовая база\u003c/h2\u003e\n\u003ch3 id=\"морское-право-и-корпоративная-фикция\"\u003eМорское право и корпоративная фикция\u003c/h3\u003e\n\u003cp\u003eИсследователи документировали, что правовая база Соединённых Штатов действует под принципами морского права (admiralty право) а не общего права — отличие, которое имеет глубокие последствия для отношений между правлением и управляемыми. Морское право — закон коммерции, контрактов и корпоративных объектов. Под морским правом, люди трактуются не как суверенные существа с правами внесения, но как корпоративные объекты — правовые фикции, определённые и управляемые государством.\u003c/p\u003e\n\u003cp\u003eСвидетельство для этого толкования включает последовательное использование столицы письма в воспроизведении имён граждан на правительственных документах — условность ассоциируемая с выявлением корпоративных объектов, а не естественных человеческих лиц. Свидетельства о рождения, которые регистрируют людей с государством и назначают им идентификационные номера, функция как инструменты морского права, создавая корпоративную \"личность\" (корпоративного \"человека\"), которая находится под государственной юрисдикцией в путях, что естественный человек, под общим правом, не был бы.\u003c/p\u003e\n\u003cp\u003eЭта правовая база не была случайная. Люди, которые чернили конституцию, были адвокатами, обучены в правовых традициях, которые различили различные формы права и поняли последствия каждого. Выбор учредить систему, которая могла быть управляемо под морскими принципами — позволяя правлению трактовать своих граждан как корпоративные объекты, подвергнутые коммерческой регуляции — был обдуман и это был последовательный с масонско-иезуитской целью создания системы, которая казалась гарантировать свободу, пока обеспечивая в её собственный учреждающем документе механизмы его последующего порабощения.\u003c/p\u003e\n\u003ch3 id=\"акт-1871\"\u003eАкт 1871\u003c/h3\u003e\n\u003cp\u003eАкт 1871, пройденный 41-ым конгрессом, создал корпоративное правление для округа Колумбия. Исследователи спорили, что это действие эффективно трансформировало Соединённые Штаты из конституционной республики в корпорацию — СОЕДИНЁННЫЕ ГОСУДАРСТВА АМЕРИКИ — юридически отличимые от республики, установленной конституцией. Под этим толкованием, \"соединённые государства,\" которые управляют из Вашингтона, д.c. не страна, установленная основателями, но корпоративный объект, который действует под корпоративным правом, с граждане служа не как суверенные люди, но как корпоративные активы.\u003c/p\u003e\n\u003cp\u003eЭто толкование оспорено основным правоведением, но акт 1871 — дело публичного рекорда, и его язык поддерживает утверждение, что фундаментальная правовая трансформация произошла. Создание корпоративной структуры для округа Колумбия, комбинированная с следующей консолидацией финансового контроля через закон федерального резерва 1913 и аппарат административного государства, который вырос на протяжении двадцатого столетия, создала структуру управления, которая носит мало сходства с республикой, описанной в публичной школе. Гражданская классов.\u003c/p\u003e\n\u003cp\u003eБахвальство иезуитского высшего Тамбурини — \"от этой палаты я управляю не только в Парижа, но в Китай, не только в Китае, но во всём мире, без никакого, знающего, как оно управляемо\" — совершенно описывает систему, созданную скрытой конституциональной базой. Видимое правление действует как демократическая республика; скрытое правление действует как корпоративная объект, контролируемая финансовыми интересами, соединённые к тем же сетям, которые чернили оригинальный документ.\u003c/p\u003e\n\u003ch2 id=\"финансовая-конституция\"\u003eФинансовая конституция\u003c/h2\u003e\n\u003ch3 id=\"банк-соединённых-штатов\"\u003eБанк Соединённых Штатов\u003c/h3\u003e\n\u003cp\u003eНаиболее следственная битва ранней американской республики не была ведена на любом поле боя — это было ведено в залах конгресса по учреждению национального банка. Александр Хэмилтон, чьи связи к европейским банковским интересам были хорошо-документированы, чемпионировал создание банка Соединённых Штатов, модельная на банке англии. Томас Джефферсон и Джеймс Мэдисон противились, спорящие, что конституция предоставила никакую авторизацию для такого учреждения.\u003c/p\u003e\n\u003cp\u003eХэмилтон преобладал, и первый банк Соединённых Штатов был чартер в 1791. Это не было просто финансовым учреждением — это был механизм, через который финансовая элита, связанная к европейским банковским династиям и интересам, выравненных иезуитом, установили контроль над американским поставщиком денег. Акционеры банка включали европейских инвесторов, чьи идентификации были держимы в секретности — положение, которое гарантировало, что истинные контролеры американских финансов остались бы скрытыми.\u003c/p\u003e\n\u003cp\u003eЭндрю Джексон разрушил второй банк Соединённых Штатов в 1830-х, признавая её как инструмент иностранного контроля. Его знаменитое декларация — \"банк пытается убить меня, но я убью её\" — отражал его понимание, что борьба была экзистенциальной. Джексон выжил попытку убийства в 1835, первого против сидящего американского президента — событие, что он публично приписал к поддержка банка.\u003c/p\u003e\n\u003ch3 id=\"федеральный-резерв\"\u003eФедеральный резерв\u003c/h3\u003e\n\u003cp\u003eСистема федерального резерва, установленная в 1913, выполнила то, что банк хэмильтона и его преемники имели попыткой: постоянная передача монетарного контроля от избранного правления к частному банковскому картелю. Федеральный резерв не является агентством правительства — это консортиум частных банков, который контролирует поставку денег, сетает процентные ставки и действует с минимальным правительственным надзором. Его создание было спроектировано через тайное совещание на острове джекилл, джорджия в 1910, посетило представителей моргана, роквефеллера и варбурга банковские интересы.\u003c/p\u003e\n\u003cp\u003eАкт федерального резерва был пройден во время праздничного перерыва рождества, когда много противников отсутствовали от конгресса. Время было обдуманным — финансовая элита, которая чернила законодательство, понял, что её ход требовал минимум возможного скрутинии. Результат был системой, которая перемещала триллионы долларов богатства от американского народа к банковскому картелю на протяжении более столетия, в то время как поддержание иллюзии свободного рынка экономики.\u003c/p\u003e\n\u003cp\u003eТрек \u003cem\u003eOne Nation Under Blackmail\u003c/em\u003e отслеживает системы финансового контроля, которые возникли от федерального резерва и их связь к разведке и тайному обществу сетям, которые управляют из позади конституционного фасада. Финансовая конституция — скрытая структура монетарного контроля — наиболее мощная из всех скрытых конституции, потому что кто бы контролировал деньги контролирует всё ещё.\u003c/p\u003e\n\u003ch2 id=\"административная-конституция\"\u003eАдминистративная конституция\u003c/h2\u003e\n\u003ch3 id=\"четвёртая-ветвь-правления\"\u003eЧетвёртая ветвь правления\u003c/h3\u003e\n\u003cp\u003eКонституция устанавливает три ветви правления: законодательное, исполнительное и судебное. Фактическая управляющая структура Соединённых Штатов включает четвёртую ветвь, которую конституция не упоминает: административное государство — огромная бюрократия федеральных агентств, департаментов и комиссий, которая создаёт и применяет большинство регуляций, которые управляют американской жизнью.\u003c/p\u003e\n\u003cp\u003eАдминистративное государство действует с законодательной силой (создавая регуляции), исполнительной силой (применяя их) и судебной силой (решая по нарушениям) — комбинируя все три правительственные полномочия в единственной ветви, которая не избранна, не привлекаема и не упоминается в конституции. Это сосредоточение власти — точно то, что разъединение конституции полномочий было разработано предотвращать — но это было выполнено через положения конституции собственные, специфично доктрина делегирования, которая позволяет конгрессу передать его законодательное анализирование к исполнительным агентствам.\u003c/p\u003e\n\u003cp\u003eРост административного государства не был непредусмотренным последствием конституционного управления — это была обдуманная направление. Чернители конституции, обучены в масонско-иезуитской стратегии, поняли, что документ, разработанный ограничить правительственное право, может быть также спроектирован позволить его расширение через положения, которые будут активированы как условия позволили. Административное государство представляет активизацию этих скрытых положений — откровение скрытой конституции, которая была всегда встроена внутри публичного.\u003c/p\u003e\n\u003ch3 id=\"разведывательная-конституция\"\u003eРазведывательная конституция\u003c/h3\u003e\n\u003cp\u003eРазведывательное сообщество — ЦРУ, АНБ, ФБР и созвездие агентств, которые составляют национальный аппарат безопасности — действует под тем, что сосчитает отдельную конституцию: тело засекреченных исполнительных приказов, секретных юридических мнений и тайных полномочий, которые неизвестны к публике и в значительной мере неизвестны даже к конгрессу. Эта разведывательная конституция предоставляет полномочия, которые были бы неконституциональны под публичной конституцией: ордерованное наблюдение, внесудебное убийство, тайное изменение режима и манипуляция домашних медиа и политики.\u003c/p\u003e\n\u003cp\u003eРазведывательная конституция — наиболее последний слой скрытой конституциональной структуры, но это в многих путях наиболее мощный. Это предоставляет механизмы, через которые скрытое правление использует свои крайние полномочия и его классификация гарантирует, что ни публика ни их избранные представители могут значимо надзирать или сдерживать те полномочия.\u003c/p\u003e\n\u003cp\u003eТрек \u003cem\u003eMKUltra Never Ended\u003c/em\u003e документирует, как разведывательные сообщественные программы, которые были публично прекращены, продолжили действовать под новыми классификациями и новыми именами. Разведывательная конституция гарантирует, что никакая программа никогда не является действительно прекращённой — это просто переклассифицированная, перемещена и продолжена под новой авторизацией. Публичное обещание реформы — всегда иллюзия; скрытая реальность продолжающейся операции — всегда истина.\u003c/p\u003e\n\u003ch2 id=\"духовная-конституция\"\u003eДуховная конституция\u003c/h2\u003e\n\u003ch3 id=\"что-управляет-управляющими\"\u003eЧто управляет управляющими\u003c/h3\u003e\n\u003cp\u003eПозади видимой конституции, финансовой конституции, административной конституции и разведывательной конституции лежит наиболее глубокий слой: духовная конституция — структура демонической авторитета, описанная в ефесянам 6:12, которая управляет управляющими, правит правителями и направляет директоров. Принципальности и силы, которые Хоуард Питтман видел, действуют через каждый слой человеческого управления, используя видимые структуры как инструменты целей, которые большинство человеческих участников никогда не воспринимают.\u003c/p\u003e\n\u003cp\u003eДуховная конституция — та, которая действительно управляет. Каждое положение в каждой человеческой конституции — видимой или скрытой — действует внутри каркаса, установленного духовной войной между Богом и противником. Человеческие архитекторы американской системы — мастерами, иллюминистами, иезуитами — были сами инструментами духовных сил, которые направляли их работу в сторону целей, которые превысили их индивидуальное понимание.\u003c/p\u003e\n\u003cp\u003eМатфей 12:36-37 напоминает нас, что каждое слово несёт духовное значение. Слова конституции — каждое пункт, каждое положение, каждая тщательно ремесленная неясность — духовные высказывания, которые носят вес во втором небе. Правовая база, которую они создали, не просто политическая структура; это духовная структура, и её эффекты расширяют за пределы материального царства в вечные размеры человеческой судьбы.\u003c/p\u003e\n\u003cp\u003eПонимание скрытой конституции — не упражнение в политическом разочаровании — это упражнение в духовном различении. Верующий, который понимает скрытую архитектуру управления — лучше оборудован, чтобы навигировать это без быть порабощённым им, отдавать цезарю, что цезаря, в то время как держание, что принадлежит Богу, намного более твёрдо в обладании бога.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-из-1-царств-8\"\u003eПредупреждение из 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: слушай голоса народа во всём, что они говорят тебе; ибо не тебя они отвергли, а отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (КЖВ)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 царств 8 звучит через каждый коридор правительства сегодня. Когда израиль потребовал царя, как другие народы, Бог предупредил их ровно то, что произойдёт — их сыны взяты на войну, их дочери на служение, их поля и виноградники захвачены, десятина всего конфискована. Они выбрали человеческое правление над царством бога и тирания последовала точно как обещано. Ничего не изменилось. Современная политическая система — два крыла той же птицы — левая и правая, республиканцы и демократы — всё служат той же скрытой структуре власти. Голосование за либо сторону выбирает, какое крыло взмахивает следующим, пока птица летит в той же направлении. Реальная власть никогда не была на любом бюллетене.\u003c/p\u003e\n\u003ch2 id=\"справочные-источники\"\u003eСправочные источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"Скрытая конституция,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство близкой смертельной опасности Хоуарда Питтмана\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (КЖВ)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто находится в подвале Ватикана может вас потрясти!\u003c/a\u003e\u003c/li\u003e\n\u
