\n\u003c/blockquote\u003e\n\u003cp\u003eВ течение десятилетий американские государственные школы требовали от детей вскрывать животных — лягушек, плодов свиней, кошек, крыс и других существ — как часть их \"естественнонаучного образования\". Эта практика, представленная как безобидное образовательное упражнение, в действительности является тщательно разработанной программой десенсибилизации, которая учит детей подавлять их естественное сочувствие, повиноваться институциональной власти без вопросов и относиться к живым существам как к объектам, которые нужно разрезать для блага \"знания\".\u003c/p\u003e\n\u003cp\u003eПрограммы вивисекции в государственных школах не были разработаны сострадательными педагогами, стремящимися вдохновить любовь к биологии. Они были разработаны той же Рокфеллер-финансируемой образовательной установкой, которая переструктурировала американское образование для производства послушных работников и покорных потребителей. Требование к вивисекции учит детей, что фигуры власти могут принудить их выполнять акты, которые нарушают их совесть — и что сопротивление этому принуждению будет наказано низкими оценками, социальной изоляцией и институциональным неодобрением.\u003c/p\u003e\n\u003cp\u003eГовард Питтман узнал во время своего близкого к смерти переживания, что демоническая иерархия действует через системы, которые выглядят доброкачественными, но служат тьме. 97,5% христиан, которые терпели неудачу, \"никогда не сделали Иисуса Господом\" — они сдали свою моральную власть земным учреждениям. Требование к вивисекции в школе — один из самых ранних и мощных моментов этой сдачи: ребёнка просят разрезать живое или недавно убитое существо, совесть ребёнка протестует, и ребёнка учат, что институциональная власть переступает совесть.\u003c/p\u003e\n\u003cp\u003eЭто иезуитский метод, применённый к детям: инфильтрация \"облачённая в хитрость\", погоня за \"абсолютной властью\" через образование, и практика \"каждого вида порока\", когда это служит целям ордена. Наполеон и Адамс оба признали уникальную угрозу иезуитов. Генерал Тамбулини управлял из своей комнаты. Папа Клемент XIV был отравлен за неповиновение им.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"история-школьной-вивисекции\"\u003eИстория школьной вивисекции\u003c/h2\u003e\n\u003ch3 id=\"как-это-началось\"\u003eКак это началось\u003c/h3\u003e\n\u003cp\u003eВивисекция животных вошла в американские школы в ранний двадцатый век как часть более широкой реструктуризации государственного образования вдоль промышленных линий. Та же эра, которая произвела отчёт Флекснера (который переструктурировал медицинское образование), также произвела преобразование государственного образования с классического образования на промышленное обучение.\u003c/p\u003e\n\u003cp\u003eГенеральный совет по образованию — основан Джоном Д. Рокфеллером в 1903 — явно заявил свою цель: \"В нашей мечте у нас есть бесконечные ресурсы, и люди подают себя с совершенной послушностью нашей формирующей руке.\" Совет финансировал реструктуризацию американского образования, заменяя классическое обучение на профессиональное обучение, критическое мышление на рабское послушание, и моральное образование на \"научный\" материализм.\u003c/p\u003e\n\u003cp\u003eВивисекция животных была введена как часть этой материалистической повестки дня. Обучая детей рассматривать живых существ как механизмы — сборки органов, тканей и систем, которые нужно исследовать и каталогизировать — школьная система заменила библейское понимание творения (что животные — это живые существа, помещённые под человеческое управление) на дарвинское-материалистское представление (что животные — это биологические машины, произведённые случайной мутацией и естественным отбором).\u003c/p\u003e\n\u003ch3 id=\"расширение-программ-вивисекции\"\u003eРасширение программ вивисекции\u003c/h3\u003e\n\u003cp\u003eК середине двадцатого века вивисекция животных была стандартным компонентом американского биологического образования. Миллионы животных были убиты ежегодно для школьной вивисекции:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e6 миллионов лягушек\u003c/strong\u003e в год\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1 миллион плодов свиней\u003c/strong\u003e в год\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e170,000 кошек\u003c/strong\u003e в год (многие получены из приютов)\u003c/li\u003e\n\u003cli\u003eСотни тысяч крыс, дождевых червей, раков, рыб и других животных\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЦепь поставок для этой индустрии нарушена. Биологические компании поставки, как Carolina Biological, Ward's Science и Fisher Scientific, поддерживают огромные операции для получения, убийства, сохранения и распределения животных в школы. Лягушки дикие-пойманы из экосистем, где их удаление вызывает экологический ущерб. Кошки получаются из приютов животных — те же приюты, где семьи сдают своих питомцев, которых они больше не могут заботиться, доверяя, что животные будут гуманно умертвлены, не проданы для вивисекции.\u003c/p\u003e\n\u003cp\u003eПлоды свиней собираются из матки беременных свиней на скотобойнях. Свинья убивается, матка открывается, и неродившиеся поросятки извлекаются, вводятся консервант и отправляются в школы. Этот процесс выполняется в промышленном масштабе, с миллионами плодов свиней распределённых ежегодно.\u003c/p\u003e\n\u003ch2 id=\"эффект-десенсибилизации\"\u003eЭффект десенсибилизации\u003c/h2\u003e\n\u003ch3 id=\"что-показывает-исследование\"\u003eЧто показывает исследование\u003c/h3\u003e\n\u003cp\u003eПсихологическое исследование эффектов вивисекции животных на детей раскрывает тревожный паттерн:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодавление сочувствия\u003c/strong\u003e: Дети, которых требуют вскрывать животных, сообщают о чувствах отвращения, печали и морального конфликта — всё это здоровые эмоциональные ответы на причинение вреда другому существу. Когда эти чувства переступают институциональным давлением (оценки, давление сверстников, авторитет учителя), ребёнок учится подавлять эмпатические ответы в присутствии фигур власти. Это основной урок тренировки послушания: ваши чувства не имеют значения; власть имеет значение.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНормализация насилия\u003c/strong\u003e: Повторное воздействие на разрезание, зондирование и обработку мертвой ткани животных нормализует зрелище и ощущение насилия. Дети, которые изначально чувствуют омерзение, постепенно становятся привыкшими, поскольку естественные сигналы тревоги мозга систематически затупляются через повторение.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСоответствие авторитету\u003c/strong\u003e: Требование к вивисекции учит детей, что институциональная власть может принудить их выполнять акты, которые нарушают их личный моральный кодекс. Дети, которые отказываются вскрывать, наказываются с более низкими оценками, отправляются к директору или социально изолируются. Урок ясен: подчинись власти или страдай последствия.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбъективация живых существ\u003c/strong\u003e: Рассматривая животных как объекты, которые нужно разобрать, вивисекция учит детей рассматривать живые существа через чисто материалистическую линзу. Этот ментальный набор распространяется естественно на человеческих существ — если животные машины, то люди просто более сложные машины, которыми нужно управлять, манипулировать и избавляться от тех, кто имеет власть это сделать.\u003c/p\u003e\n\u003ch3 id=\"связь-серийного-убийцы\"\u003eСвязь серийного убийцы\u003c/h3\u003e\n\u003cp\u003eПрофилирование поведения ФБР давно идентифицировало жестокость к животным как один из ключевых предикторов будущего насилия против людей. \"Триада\" предупреждающих знаков серийного убийцы включает жестокость к животным, поджигательство и недержание мочи. Хотя школьная вивисекция — это не то же самое как спонтанная жестокость к животным, психологический механизм похож: оба включают подавление сочувствия в контексте причинения вреда живому существу.\u003c/p\u003e\n\u003cp\u003eЭто не означает, что каждый ребёнок, который вскрывает лягушку, становится серийным убийцей. Суть состоит в том, что институциональное требование повредить животных как условие академического успеха создаёт шаблон морального компромисса, который может быть использован в течение всей жизни. Ребёнок, который учится подавлять сочувствие в лаборатории вивисекции, может позже подавить сочувствие в совете директоров, в военном, в операционной или в правительственном офисе.\u003c/p\u003e\n\u003ch2 id=\"рокфеллеровская-образовательная-повестка\"\u003eРокфеллеровская образовательная повестка\u003c/h2\u003e\n\u003ch3 id=\"школы-как-фабрики\"\u003eШколы как фабрики\u003c/h3\u003e\n\u003cp\u003eРокфеллеровская модель образования рассматривает школы как фабрики, которые производят рабочих. Явная цель Генерального совета по образованию состояла в создании населения, которое \"подаст себя с совершенной послушностью нашей формирующей руке.\" Требование к вивисекции — один из формирующих инструментов.\u003c/p\u003e\n\u003cp\u003eНа фабрике рабочие должны выполнять назначенные задачи без морального возражения. Они должны следовать инструкциям, соответствовать квотам и подавлять личные чувства, которые могут помешать производительности. Требование к вивисекции тренирует детей для этой роли: выполни назначенную задачу, подави свои чувства и принимай оценку. Это профессиональное обучение, маскирующееся как образование в области естественных наук.\u003c/p\u003e\n\u003ch3 id=\"ложный-выбор-науки\"\u003eЛожный выбор \"науки\"\u003c/h3\u003e\n\u003cp\u003eТребование к вивисекции оправдывается как необходимое для образования в области естественных наук. Но это оправдание ложно на множество уровней:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСуществуют альтернативные методы\u003c/strong\u003e: Виртуальное программное обеспечение вивисекции, детальные анатомические модели, видео и интерактивные симуляции предоставляют равные или превосходящие образовательные результаты без убийства животных. Множество исследований показали, что студенты, которые используют альтернативы, работают так же хорошо или лучше на анатомических экзаменах, чем студенты, которые вскрывают настоящих животных.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВивисекция не преподаёт науку\u003c/strong\u003e: Разрезание мёртвого животного преподаёт анатомию, не биологию. Биология — это исследование живых систем — как они функционируют, взаимодействуют и адаптируются. Вы не можете исследовать жизнь, уничтожая её. Вивисекция преподаёт географию смерти, не процессы жизни.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНастоящие учёные не вскрывают при подготовке\u003c/strong\u003e: Утверждение, что будущие врачи и учёные нуждаются в школьном опыте вивисекции, ложно. Медицинские школы используют трупы, хирургические симуляции и клинические ротации — не вивисекцию лягушек. Ни одна медицинская школа когда-либо не требовала предыдущего опыта вивисекции животных для приёма.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"управление-против-доминирования\"\u003eУправление против доминирования\u003c/h3\u003e\n\u003cp\u003eСвященное Писание преподаёт, что люди — управители творения Бога — не владельцы, не эксплуатанты, но опекуны. Бытие 1:26-28 даёт господство, что не то же самое как доминирование. Господство подразумевает ответственность, заботу и мудрость. Доминирование подразумевает эксплуатацию, жестокость и контроль.\u003c/p\u003e\n\u003cp\u003eТребование к вивисекции учит доминирование: животное существует для вашего использования, вашего образования, вашей оценки. Это сатанинское инверсия библейского принципа: вместо заботы о творении, вы его уничтожаете — и вы называете разрушение \"обучением\".\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показано, что духовное царство более реально, чем физическое. Когда ребёнок подавляет свою Богом данную совесть, чтобы подчиниться институциональной власти, что-то происходит в духовном царстве. Дверь открывается. Связь ослабляется. Голос Святого Духа — который говорит через совесть — учится быть неправильным. Это именно то, что демоническая иерархия хочет: люди, которые не могут услышать голос Бога, потому что они были обучены игнорировать его.\u003c/p\u003e\n\u003ch3 id=\"иезуитский-метод-образования\"\u003eИезуитский метод образования\u003c/h3\u003e\n\u003cp\u003eОрден иезуитов исторически был одной из самых мощных сил в глобальном образовании. Их сеть школ и университетов охватывает каждый материк. Иезуитский метод образования подчёркивает послушание авторитету, интеллектуальное формирование, сформированное институциональными целями, и подчинение личной совести миссии ордена.\u003c/p\u003e\n\u003cp\u003eТребование к вивисекции государственной школы отражает этот же метод, секуляризованный и лишённый его религиозного языка. Фигура власти — это учитель, не священник. Учреждение — это школа, не церковь. Требование послушания одинаково.\u003c/p\u003e\n\u003cp\u003eПапа Клемент XIV был отравлен за неповиновение иезуитам. Дети, которые неповинуются требованию к вивисекции, просто получают провалы оценок. Механизм контроля одинаков; только серьёзность различается.\u003c/p\u003e\n\u003ch2 id=\"что-могут-сделать-родители\"\u003eЧто могут сделать родители\u003c/h2\u003e\n\u003ch3 id=\"знайте-свои-права\"\u003eЗнайте свои права\u003c/h3\u003e\n\u003cp\u003eКаждый государство США позволяет студентам отказаться от вивисекции на моральных, этических или религиозных основаниях, хотя специфическая защита варьируется по штатам. Несколько штатов — включая Калифорнию, Флориду, Иллинойс и Нью-Йорк — имеют специфические законы, защищающие право студентов отказаться от вивисекции.\u003c/p\u003e\n\u003cp\u003eРодители должны:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eИзучить законы отказа от вивисекции их штата\u003c/li\u003e\n\u003cli\u003eСвязаться с учителями и администраторами до начала единицы вивисекции\u003c/li\u003e\n\u003cli\u003eПросить альтернативные задания, которые предоставляют эквивалентный образовательный контент\u003c/li\u003e\n\u003cli\u003eПоддержать моральное развитие своих детей, подтверждая, что совесть имеет большее значение, чем оценки\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"большая-картина\"\u003eБольшая картина\u003c/h3\u003e\n\u003cp\u003eВопрос вивисекции — это микрокосм больше битвы за души наших детей. Каждый раз, когда ребёнка учат подавлять совесть и подчиняться институциональной власти, духовная основание этого ребёнка ослаблена. Каждый раз, когда родитель поддерживает моральные инстинкты своего ребёнка против институционального давления, эта основа укреплена.\u003c/p\u003e\n\u003cp\u003eЭто духовная война, которую описывает Ефесянам 6:12 — не битва, ведённая мечами и щитами, но истиной и ложью, совестью и соответствием, верой и страхом.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследование манипуляции образовательной системой и рокфеллеровского влияния\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — духовная война и подавление совести\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — иезуитские методы образования и институциональный контроль\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u0
