 В частях 1-4 мы установили реальность технологии V2K, её военное происхождение, дезинформационную кампанию её защищающую и сеть агентств, её эксплуатирующих. Теперь я должен рассказать историю, более близкую к дому — историю о моей бабушке, которая испытала то, что я теперь признаю как целенаправленное воздействие V2K десятилетиями раньше, чем эта технология стала известна публике.\u003c/p\u003e\n\u003cp\u003eМоя бабушка слышала голоса. Она рассказывала членам семьи об этом. Её отвергали, жалели и в конечном итоге лечили медикаментозно. Она провела годы жизни в тени психиатрического диагноза, который, возможно, был совершенно неправильным — не потому, что она что-то воображала, а потому, что она испытывала воздействие технологии, о которой её врачи не знали и в которую её семья не верила, что она возможна.\u003c/p\u003e\n\u003cp\u003eГовард Питтман узнал, что демоническая иерархия направляет воздействие на отдельных лиц и семьи в течение поколений. 97,5%, которые терпят неудачу, включают тех, кто отвергает опыт своих близких, потому что этот опыт не соответствует признанной картине мира. Моя семья подвела мою бабушку — не из злобы, а из невежества. Мы приняли объяснение психиатрического истеблишмента, потому что не знали, что есть другое.\u003c/p\u003e\n\u003cp\u003eИнфильтрация иезуитов \"замаскированная с хитростью\" распространяется на саму семейную единицу. Контролируя медицинскую систему, которая диагностирует и лечит слухоговорение, они обеспечивают, что семьи становятся инструментами угнетения собственных членов. Семья, которая давит на целевое лицо, чтобы оно принимало лекарства, переставало говорить о голосах, принимало психиатрический ярлык — эта семья выполняет работу иезуитов, не осознавая этого.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"история-моей-бабушки\"\u003eИстория моей бабушки\u003c/h2\u003e\n\u003ch3 id=\"начало-голосов\"\u003eНачало голосов\u003c/h3\u003e\n\u003cp\u003eМоя бабушка начала сообщать о голосах в среднем возрасте. Она описывала слышание разговоров, музыки и иногда команд или комментариев, направленных на неё. Опыт был яркий, настойчивый и глубоко расстраивающий.\u003c/p\u003e\n\u003cp\u003eОна была верующей женщиной — прихожанкой, молитвенным воином, человеком, который серьёзно относился к духовным вопросам. Когда появились голоса, она сначала интерпретировала их через духовную призму. Она молилась о них. Она искала совета у своего пастора. Она пыталась разобраться, исходили ли голоса от Бога, от демонов или откуда-то ещё.\u003c/p\u003e\n\u003ch3 id=\"медицинский-ответ\"\u003eМедицинский ответ\u003c/h3\u003e\n\u003cp\u003eВ конечном итоге семья настояла, чтобы она обратилась к врачу. Врач прослушал её симптомы, отметил отсутствие других психотических признаков (она была в ясном уме, связна и функциональна), и тем не менее диагностировал у неё психическое расстройство. Ей были назначены нейролептические препараты.\u003c/p\u003e\n\u003cp\u003eЛекарство изменило её. Женщина, которая была острой, активной и духовно деятельной, стала вялой, замкнутой и пассивной. Голоса могли уменьшиться — или она могла просто перестать сообщать о них, поняв, что их сообщение привело к большему количеству лекарств и большему сочувствию.\u003c/p\u003e\n\u003cp\u003eОна провела годы на психиатрических препаратах. Семья верила врачам. Врачи следовали своей подготовке. И никто — ни семья, ни врачи, ни пасторы — не считал возможным, что голоса имели технологический источник.\u003c/p\u003e\n\u003ch3 id=\"то-что-я-теперь-знаю\"\u003eТо, что я теперь знаю\u003c/h3\u003e\n\u003cp\u003eОглядываясь назад с полученными мною знаниями о технологии V2K, паттерн неоспоримо ясен:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВнезапное начало\u003c/strong\u003e у ранее здорового человека без истории психических болезней\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвязная речь\u003c/strong\u003e — не дезорганизованные галлюцинации, типичные для шизофрении, а структурированные голоса и музыка\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСохранённое функционирование\u003c/strong\u003e — она оставалась в здравом уме, способна и рациональна во всех других аспектах её жизни\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДуховная чувствительность\u003c/strong\u003e — она была верующей женщиной, что могло сделать её более осведомлённой о голосах и более уязвимой для воздействия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСемейный паттерн\u003c/strong\u003e — когда я обнаружил мой собственный опыт V2K (описанный в части 1), я понял, что члены семьи в разных поколениях сообщали о сходных опытах\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"поколенческий-паттерн\"\u003eПоколенческий паттерн\u003c/h3\u003e\n\u003cp\u003eВоздействие V2K может быть семейным — не из-за генетики (как утверждал бы психиатрический истеблишмент), а потому что:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eИнфраструктура наблюдения\u003c/strong\u003e связана с местоположением, а семьи имеют тенденцию жить в одних и тех же областях в течение поколений\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРазведывательные файлы\u003c/strong\u003e могут помечать членов семьи известных целей для мониторинга\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПокрытие сотовой башней\u003c/strong\u003e в определённых районах может облегчить воздействие на всех жителей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсследовательские программы\u003c/strong\u003e могут целенаправленно воздействовать на семьи в течение поколений, чтобы изучить долгосрочные эффекты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДуховное воздействие\u003c/strong\u003e — демонические силы, как описал Питтман, могут воздействовать на семейные линии\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eМоя бабушка, мой родитель и я все испытали слухоговорение. Психиатрический истеблишмент называет это \"генетической предрасположенностью к шизофрении\". Я называю это поколенческим воздействием технологией, которая была невидима для поколения моей бабушки, едва видима для поколения моего родителя и, наконец, идентифицируемой для моего.\u003c/p\u003e\n\u003ch2 id=\"отказ-медицинской-системы\"\u003eОтказ медицинской системы\u003c/h2\u003e\n\u003ch3 id=\"неправильный-диагноз-как-стандартная-практика\"\u003eНеправильный диагноз как стандартная практика\u003c/h3\u003e\n\u003cp\u003eНеправильный диагноз моей бабушки был необычен. Это стандартная практика. Каждое лицо, которое сообщает о слухоговорении, оценивается в рамках психиатрической парадигмы, которая предполагает, что голоса внутренне порождены. Возможность внешних, технологических источников никогда не рассматривается, потому что:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПсихиатры не обучены\u003c/strong\u003e электромагнитной технологии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDSM\u003c/strong\u003e (Руководство диагностическое и статистическое) не включает технологически индуцированное слухоговорение как диагностическую категорию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФармацевтические протоколы\u003c/strong\u003e по умолчанию используют нейролептические препараты для всех случаев слухоговорения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВозмещение страхования\u003c/strong\u003e вознаграждает психиатрический диагноз и управление медикаментами, а не исследование альтернативных причин\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eРезультатом является то, что каждая цель V2K, которая ищет медицинской помощи, получает одинаковый диагноз, одинаковое лекарство и одинаковое отвержение. Медицинская система функционирует как машина для дискредитации целей V2K — и она делает это не из-за злобы (в большинстве случаев), а из-за институционального дизайна.\u003c/p\u003e\n\u003ch3 id=\"вред-неправильного-лечения\"\u003eВред неправильного лечения\u003c/h3\u003e\n\u003cp\u003eНейролептические препараты — одни из самых мощных препаратов в фармакопее. Они изменяют химию мозга, подавляют рецепторы дофамина и производят ряд изнурительных побочных эффектов:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПоздняя дискинезия\u003c/strong\u003e: Непроизвольные движения мышц, которые могут стать постоянными\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМетаболический синдром\u003c/strong\u003e: Увеличение веса, диабет, сердечно-сосудистые заболевания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКогнитивное притупление\u003c/strong\u003e: Снижение ясности ума, нарушение памяти, сниженная мотивация\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭмоциональное оцепенение\u003c/strong\u003e: Сниженная способность испытывать удовольствие, любовь или духовную связь\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНейролептический злокачественный синдром\u003c/strong\u003e: Потенциально смертельная реакция на препарат\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКогда эти препараты даются лицу, которое не имеет психического расстройства — человеку, чьи голоса имеют технологический источник — вред усугубляется. Не только препарат не устраняет реальную причину, но он наносит ущерб мозгу, телу и духу человека способами, которые могут быть необратимыми.\u003c/p\u003e\n\u003cp\u003eМоя бабушка провела годы, принимая препараты, которые ей не были нужны, испытывая побочные эффекты, которые она не должна была терпеть, и живя под диагностическим ярлыком, который она не заслуживала — всё потому, что медицинская система не могла представить технологическое объяснение её опыта.\u003c/p\u003e\n\u003ch2 id=\"расследование\"\u003eРасследование\u003c/h2\u003e\n\u003ch3 id=\"что-я-обнаружил\"\u003eЧто я обнаружил\u003c/h3\u003e\n\u003cp\u003eКогда я начал расследовать воздействие на мою бабушку, я обнаружил:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПаттерны местоположения\u003c/strong\u003e: Моя бабушка жила в районе с высокой плотностью сотовых вышек и близостью к военным установкам. Инфраструктура для воздействия V2K была наличествующей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВременные корреляции\u003c/strong\u003e: Начало её симптомов совпадало с периодами расширения инфраструктуры наблюдения в её районе — новыми установками башен, изменениями в телекоммуникационной технологии и расширением государственных программ мониторинга.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбщественные паттерны\u003c/strong\u003e: Другие жители её района сообщали о сходных опытах — слухоговорение, музыка или тоны без видимого источника. Эти сообщения были разрозненными и изолированными, потому что каждое лицо, которое о них сообщало, индивидуально диагностировалось и лечилось.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСемейные связи\u003c/strong\u003e: Прослеживание семейной истории выявило, что опыты слухоговорения, похоже, следовали географическим и временным паттернам, согласующимся с развёртыванием технологии, а не с наследственностью.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"то-что-знала-моя-бабушка\"\u003eТо, что знала моя бабушка\u003c/h3\u003e\n\u003cp\u003eМоя бабушка была женщиной глубокой веры. Она понимала духовную войну раньше, чем этот термин стал популярным. Она молилась, она постилась, она читала свою Библию, и она серьёзно относилась к реальности духовного царства.\u003c/p\u003e\n\u003cp\u003eКогда пришли голоса, её первым ответом было духовное — она искала руководство Бога. Это был правильный ответ. Но семья и медицинская система оттянули её от её духовного различения в фармацевтическую систему. Они заменили её молитвы таблетками и её веру диагнозом.\u003c/p\u003e\n\u003cp\u003eГовард Питтман узнал, что 95% служат \"себе\". Моя бабушка была среди 5%, которые искали Бога. И система воздействовала на неё за это — потому что человек подлинного духовного различения — самый опасный враг властей и начальств. Такой человек может видеть сквозь обман, может идентифицировать источник голосов и может сопротивляться воздействию через духовное оружие.\u003c/p\u003e\n\u003cp\u003eПрепарат притупил её различение. Диагноз заглушил её свидетельство. Благонамеренное вмешательство семьи отрезало её от самых духовных ресурсов, которые могли бы её защитить. Вот как работает система: она использует любовь против самой себя, превращая семьи в инструменты собственного уничтожения своих членов.\u003c/p\u003e\n\u003ch3 id=\"молитва-за-целевых\"\u003eМолитва за целевых\u003c/h3\u003e\n\u003cp\u003eГосподи, мы молимся за каждую бабушку, за каждую мать, за каждого отца, за каждого ребёнка, кто был направлен этой технологией и заглушен медицинской системой. Мы молимся за семьи, которые не знали, которые не могли видеть, которые делали то, что врачи им говорили, потому что не знали, что делать. Мы молимся о восстановлении — ума, семей, веры. И мы молимся о справедливости — против систем и сил, и человеческих, и духовных, которые направляют невинных и называют это медициной. Во имя Иисуса.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eSubstack Агента131711\u003c/a\u003e — исследование поколенческого воздействия и документирование V2K\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство NDE Говарда Питтмана\u003c/a\u003e — поколенческая духовная война\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — институциональный контроль через медицину\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth н
