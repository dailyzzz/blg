\u003c/blockquote\u003e\n\u003cp\u003eОт золотого тельца в Синае к гротескным инсталляциям, финансируемым Национальным фондом поддержки искусств, коррупция искусства всегда была оружием духовной войны. Бог создал человеческие существа с способностью к красоте, творчеству и художественному выражению -- и противник работал неустанно, чтобы испортить эту способность, превращая искусство из инструмента поклонения в средство для богохульства, деградации и оккультного программирования. Современное художественное учреждение, далеко не спонтанное выражение творческой свободы, было намеренно инженеризировано как оружие культурного разрушения агентствами разведки, служащими интересам, связанным с иезуитами.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана раскрыло, что демоны работают через каждый домен человеческой культуры, назначенные на конкретные территории и задачи. Область искусства и культуры -- критическое поле битвы, потому что искусство формирует сознание, определяет красоту и устанавливает эстетическую основу, через которую человеческие существа воспринимают действительность. Когда искусство корруптировано, восприятие корруптировано -- и корруптированное восприятие ведет к корруптированному поклонению. 95% служащих \"себе\" вместо Бога, как сказали Питтману, включают миллионы, которые приняли определение красоты и творчества современного художественного учреждения без вопроса, кто это определил или почему.\u003c/p\u003e\n\u003cp\u003eИезуиты исторически понимали силу искусства как пропагандистского инструмента. Иезуитские церкви были разработаны как подавляющий сенсорный опыт, используя искусство, архитектуру и музыку для создания эмоциональной покорности. Современная инверсия этого принципа -- использование намеренно уродливого, шокирующего и богохульного искусства для создания культурной покорности деградации -- это одна и та же методология, применяемая в обратном. Как исследовано в \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/49-Cain_and_Abel.mp4\"\u003eCain and Abel\u003c/a\u003e, предложения врага всегда подделывают то, что Бог установил, представляя коррупцию как сложность и деградацию как прогресс.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"цру-и-культурная-холодная-война\"\u003eЦРУ и культурная холодная война\u003c/h2\u003e\n\u003ch3 id=\"абстрактный-экспрессионизм-как-оружие\"\u003eАбстрактный экспрессионизм как оружие\u003c/h3\u003e\n\u003cp\u003eВ конце 1940-х и 1950-х годах Центральное разведывательное управление приступило к одной из наиболее амбициозных программ манипуляции культурой в истории. Через фронтовые организации, скрытые каналы финансирования и сети сговорчивых искусствоведов и директоров музеев, ЦРУ продвигало абстрактный экспрессионизм как главное художественное движение западного мира. Художники, такие как Джексон Поллок, Марк Ротко и Виллем де Кунинг, были возвышены не потому, что их работа имела присущую добротность, а потому, что их искусство служило стратегическим целям ЦРУ.\u003c/p\u003e\n\u003cp\u003eПрограмма была обширно задокументирована журналистом Франсис Стонор Сондерс в ее работе \"The Cultural Cold War\". Конгресс ЦРУ за Культурную Свободу, работающий через дюжины фронтовых организаций в Европе и Америке, финансировал выставки, публикации и культурные события, которые продвигали американское абстрактное искусство как воплощение западной свободы. Ирония была поразительна -- тайная государственная фронтовая операция была представлена как предельное выражение художественной свободы.\u003c/p\u003e\n\u003cp\u003eОднако более глубокая цель выходила за пределы холодной войны. Продвижение абстрактного и все более нигилистического искусства служило отделению западной культуры от его христианского основания. Классическое западное искусство было укоренено в представлении красоты, правды и божественного -- великие произведения ренессансных и барочных периодов были явно христианскими по вдохновению и исполнению. Путем замены этой традиции абстрактным, бессмысленным и в конечном итоге намеренно уродливым искусством, культурные инженеры разорвали связь между западной цивилизацией и ее духовным наследием.\u003c/p\u003e\n\u003ch3 id=\"связь-рокфеллера\"\u003eСвязь Рокфеллера\u003c/h3\u003e\n\u003cp\u003eНельсон Рокфеллер, который служил президентом Музея современного искусства (MoMA) и позже вице-президентом Соединенных Штатов, был одним из основных каналов между разведывательным сообществом и художественным учреждением. Связи семьи Рокфеллера как с разведывательными агентствами, так и с учреждениями, связанными с иезуитами, сделали их идеальными посредниками для программы культурной войны.\u003c/p\u003e\n\u003cp\u003eMoMA служил институциональным домом для программы искусства ЦРУ. Выставки были куратором, туры организованы и критическое признание было изготовлено через сеть сговорчивых искусствоведов, которые понимали, что их доступ к учреждению зависел от их поддержки одобренного художественного направления. Критикующие новую ортодоксию были маргинализированы; те, кто ее праздновал, были вознаграждены известностью и влиянием.\u003c/p\u003e\n\u003cp\u003eБолее ранее финансирование Фонда Рокфеллера сексологических исследований Альфреда Кинси установило образец, который программа искусства воспроизводила: деньги фонда, текущие к программам, служившим повестке дня культурного разрушения, в то время как носили маску прогрессивного просвещения. Трек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e отслеживает сети власти, которые соединяют эти казалось бы разрозненные программы в связную стратегию цивилизационного подрыва.\u003c/p\u003e\n\u003ch2 id=\"национальный-фонд-поддержки-искусств\"\u003eНациональный фонд поддержки искусств\u003c/h2\u003e\n\u003ch3 id=\"создание-и-цель\"\u003eСоздание и цель\u003c/h3\u003e\n\u003cp\u003eНациональный фонд поддержки искусств (NEA) был установлен Конгрессом в 1965 году как независимое федеральное агентство, поручено поддерживать искусства в Соединенных Штатах. Его создание представляло институционализацию государственного вовлечения в искусство -- и с этим постоянное встраивание повестки дня культурной войны в федеральную бюрократию.\u003c/p\u003e\n\u003cp\u003eСоздание NEA было чемпионато фигурами, связанными с теми же сетями, которые управляли программами искусства ЦРУ. Переход от скрытого финансирования ЦРУ к открытому государственному финансированию был бесшовным -- то же искусство, те же художники, те же критики и то же институциональное инфраструктура просто приобрели новый и более законный источник финансирования. Программа культурной войны больше не была секретной операцией; она стала официальной государственной политикой.\u003c/p\u003e\n\u003cp\u003eПроцесс предоставления грантов NEA обеспечил, что государственные средства текли к художникам и учреждениям, согласованным с одобренным культурным направлением. Панели научного рецензирования -- состоящие из инсайдеров художественного мира, выбранных администраторами NEA -- оценили заявки и рекомендовали финансирование. Результатом была саморедилирующая система, в которой художественное учреждение финансировало себя через государственные деньги, поддерживая его идеологическое направление, представляя себя как служащее общественному интересу.\u003c/p\u003e\n\u003ch3 id=\"скандалы-которые-раскрыли-повестку-дня\"\u003eСкандалы, которые раскрыли повестку дня\u003c/h3\u003e\n\u003cp\u003eИстинная природа NEA-финансируемого искусства стала публично видимой через серию противоречий в конце 1980-х и начале 1990-х годов. \"Piss Christ\" Андреса Серрано -- фотография распятия, погруженного в мочу художника -- получила финансирование NEA в 1987 году. Ретроспектива Роберта Мэпплторпа, частично финансируемая NEA, включала явно садо-мазохистические и гомоэротические изображения. Выступления Карен Финли, финансируемые NEA, включали размазывание ее обнаженного тела шоколадом при произнесении явных монологов.\u003c/p\u003e\n\u003cp\u003eЭти произведения не были отклонениями -- они были логическим кульминацией культурной программы, которая систематически деградировала западное искусство в течение четырех десятилетий. Прогрессия от абстракции к явному богохульству следовала предсказуемой траектории: как только искусство было отделено от красоты и значения, единственное направление было к все более экстремальному провокационности. Сатанинское измерение этой прогрессии было неоспоримо -- искусство, которое явно осквернило христианские символы, в то время как праздновало сексуальное отклонение, было не просто оскорбительным, оно было ритуалистическим.\u003c/p\u003e\n\u003cp\u003eОбщественный протест, следовавший этим откровениям, привел к Конгрессовским слушаниям и временным ограничениям финансирования NEA. Но художественное учреждение объединилось в защиту своих прерогатив, обрамляя любую критику как цензуру и любой вопрос как филистинство. Противоречие в конечном итоге укрепило позицию учреждения, создав повествование, в котором защитники приличной публики были отброшены как враги художественной свободы.\u003c/p\u003e\n\u003ch2 id=\"оккультное-измерение-современного-искусства\"\u003eОккультное измерение современного искусства\u003c/h2\u003e\n\u003ch3 id=\"искусство-как-ритуал\"\u003eИскусство как ритуал\u003c/h3\u003e\n\u003cp\u003eСвязь между современным искусством и оккультной практикой хорошо задокументирована, но редко обсуждается в основных контекстах. Многие из основателей современного искусства были явными практикующими оккультизма. Василий Кандинский был глубоко под влиянием теософии. Пит Мондриан был преданным теософом. Сюрреалисты явно черпали из оккультной и алхимической символики. Школа Баухаус включала мистические и оккультные принципы в свое преподавание.\u003c/p\u003e\n\u003cp\u003eЭто оккультное основание было не случайным для современного искусства -- оно было конститутивным. Отказ от репрезентационного искусства в пользу абстракции был на его глубочайшем уровне отказом от созданного порядка в пользу эзотерических, оккультных альтернатив. Когда Кандинский говорил об искусстве как духовной практике, он не имел в виду христианскую духовность -- он имел в виду теософическую духовность, которая фундаментально люцифериана по ориентации.\u003c/p\u003e\n\u003cp\u003eОтношение иезуитского ордена с оккультизмом задокументировано в Catholic Confidential и возвращается к основанию ордена. \"Духовные упражнения\" Игнатия Лойолы разделяют структурное сходство с оккультной практикой медитации, и ударение ордена на послушании -- \"слепое послушание\", как описано в Catholic Confidential -- отражает иерархическую покорность, требуемую в оккультных организациях. Современный художественный мир с сочетанием оккультного вдохновения и институциональной иерархии представляет сходимость принципов организации иезуитов и люциферической духовной практики.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003
