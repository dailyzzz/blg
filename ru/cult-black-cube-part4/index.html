атематике это самое простое трёхмерное тело. В оккультизме это самый священный символ Сатурна — бога времени, ограничения и материального мира. И он везде. Как только вы это видите, вы никогда не перестанете это видеть.\u003c/p\u003e\n\u003cp\u003eХовард Питтман, во время своего опыта почти-смерти, был показан, что духовная сфера управляется структурой, иерархией и символом. Демоны, которых он видел во втором небе, не были случайными. Они работали согласно точным организационным принципам. Питтман узнал, что 97,5 процентов христиан были отклонены при смерти — они \"никогда не сделали Меня Господом\". Духовная сфера работает на абсолютах, не добрых намеренияx. Символы имеют значение. Ритуалы имеют значение. Что вы поклоняетесь имеет значение — даже когда вы не знаете, что вы поклоняетесь.\u003c/p\u003e\n\u003cp\u003eИезуиты, военная организация Лойолы, использующая то, что Наполеон назвал \"абсолютной властью\", служили хранителями культа Сатурна на протяжении столетий. Иезуитская клятва, разоблачённая в \u003cem\u003eCatholic Confidential\u003c/em\u003e, требует членам инфильтрироваться \"скрытые хитростью\" и практиковать \"любой вид порока\" в служении целям порядка. Их хранительство символов Сатурна — один из наиболее важных аспектов их миссии — миссия, которая расширяется, как хвастался генерал-отец Тамбурини, на \"весь мир\".\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"чёрный-куб-через-цивилизации\"\u003eЧёрный Куб через цивилизации\u003c/h2\u003e\n\u003ch3 id=\"кааба-куб-сатурна-ислама\"\u003eКааба: Куб Сатурна ислама\u003c/h3\u003e\n\u003cp\u003eНаиболее посещаемый куб на земле стоит в Мекке, Саудовская Аравия. Кааба — из арабского слова, означающего \"куб\" — самое священное место в исламе. Приблизительно два миллиона мусульман выполняют паломничество Хаджа каждый год, циркулируя чёрный куб, завёрнутый семь раз против часовой стрелки. Семь контуров. Против часовой стрелки — направление разворота, отмены, времени, движущегося в обратном направлении. Сатурн — бог времени.\u003c/p\u003e\n\u003cp\u003eЧёрный Камень, встроенный в угол Каабы, целуется паломниками. Согласно исламской традиции, он упал с небес. В оккультной интерпретации это метеорит — камень с небес, из доминиона Сатурна. Циркулирование куба зеркалирует кольца Сатурна, те великие полосы обломков, которые окружают кольцевую планету.\u003c/p\u003e\n\u003cp\u003eЭто не атака на исламскую веру. Это наблюдение о вселенности символизма Сатурна. Культ Сатурна предшествует исламу, предшествует христианству, предшествует иудаизму. Это оригинальная религия материального мира и его символы появляются в каждой последующей религии, потому что те же сущности — принципалы и силы Эфесянам 6:12 — влияют на каждое человеческое учреждение.\u003c/p\u003e\n\u003ch3 id=\"тефилин-кубы-сатурна-иудаизма\"\u003eТефилин: Кубы Сатурна иудаизма\u003c/h3\u003e\n\u003cp\u003eВ Ортодоксальном иудаизме мужчины связывают маленькие чёрные кожаные кубы на свой лоб и руку во время утренних молитв. Это тефилин (филактерии), содержащие свитки Торы с отрывками. Куб связана телу с кожаными ремешками, обвязанными семь раз вокруг рук. Снова: куб, связывающий, число семь.\u003c/p\u003e\n\u003cp\u003eИисус критиковал Фарисеев за их филактерии в Матфей 23:5: \u003cem\u003e\"Все же дела свои делают напоказ: расширяют хранилища свои и увеличивают кисти одежд своих.\"\u003c/em\u003e Критика была не просто о тщеславии. Это было о форме поклонения — связывании куба Сатурна к телу, физического ярма поклонника к символу материального бога.\u003c/p\u003e\n\u003ch3 id=\"выпускная-шапка-мортирная-доска-сатурна\"\u003eВыпускная шапка: Мортирная доска Сатурна\u003c/h3\u003e\n\u003cp\u003eКаждый выпускник в западной системе образования надевает чёрную квадратную шапку — мортирную доску. Плоский чёрный куб, надевается на голову, место сознания. Этот ритуал отмечает завершение образования — образовательная система, предназначенная, во многом, иезуитами, которые учреждали некоторые из первых университетов в Европе и чьи \u003cem\u003eRatio Studiorum\u003c/em\u003e стали шаблоном для современного образования.\u003c/p\u003e\n\u003cp\u003eВыпускник, сформированный системой, буквально коронован символом Сатурна. Кисть висит из куба, подражая кольцам. Мантия чёрная — цвет Сатурна. Церемония — ритуал прохода: от студента к слуге системы, коронованному богом ограничения и материальной порабощения.\u003c/p\u003e\n\u003cp\u003eAgent131711 документировала на Substack (agent131711.substack.com) как система образования служит инициатической трубопровод, перемещая индивидов от невежества к индоктринации, пока маркирует процесс как \"просвещение\". Мортирная доска — финальная печать — печать Сатурна на уме новоиспечённого рабочего.\u003c/p\u003e\n\u003ch2 id=\"корпоративный-куб\"\u003eКорпоративный куб\u003c/h2\u003e\n\u003ch3 id=\"архитектура-контроля\"\u003eАрхитектура контроля\u003c/h3\u003e\n\u003cp\u003eКорпоративный мир поклоняется кубу открыто. Офисные здания — кубы. Кубикулы — буквально маленькие кубы — содержат рабочих. Apple Store в Нью-Йорке имеет массивный стеклянный куб как свой вход. The Vessel на Hudson Yards — куб-смежная структура переплетающихся лестниц, ведущих к никуда — совершенная метафора для доминиона Сатурна: бесконечный труд без трансцендентности.\u003c/p\u003e\n\u003cp\u003eМемориал Всемирного торгового центра имеет две массивные квадратные пустоты — кубы отсутствия — где стояли Twin Towers. Вода каскадирует в эти пустоты вечно, символизируя бесконечное спускание в подземный мир Сатурна. Что бы вы ни верили о событиях 11 сентября, символизм мемориала ясен каждому, кто грамотен на оккультном языке, который архитекторы этих структур используют.\u003c/p\u003e\n\u003ch3 id=\"логотипы-и-брендинг\"\u003eЛоготипы и брендинг\u003c/h3\u003e\n\u003cp\u003eКуб Сатурна появляется в корпоративных логотипах с выразительной частотой. Наиболее очевидный — телевизионный набор — исторически куб-образное устройство, через которое население получает свою программу (слово, чьё двойное значение не случайно). Люди сидят перед кубом часами каждый день, получая образы и повествования, созданные корпорациями средств массовой информации, которые восходят к агентствам разведки, которые восходят к тайным обществам, которые восходят к культу Сатурна.\u003c/p\u003e\n\u003cp\u003eИезуиты, как \u003cem\u003eCatholic Confidential\u003c/em\u003e разоблачает, работают через \"слепое послушание\" и полную институциональную верность. Корпоративный мир зеркалирует эту структуру. Работникам ожидается подчинить свою индивидуальную идентичность корпоративному бренду, следовать директивам без вопроса, жертвовать своим временем — своей жизненной силой — в обмен на валюту (ещё один символ Сатурна: валюта течёт, как время, и не может быть остановлена).\u003c/p\u003e\n\u003ch2 id=\"сатурн-на-небесах\"\u003eСатурн на небесах\u003c/h2\u003e\n\u003ch3 id=\"шестиугольный-шторм\"\u003eШестиугольный шторм\u003c/h3\u003e\n\u003cp\u003eВ 2006 году космический аппарат Cassini НАСА сфотографировал постоянный шестиугольный шторм на северном полюсе Сатурна. Шестиугольник — двумерная проекция куба. Сатурн буквально носит свой символ на своём лице. Это не теория заговора. Это наблюдаемое астрономическое явление. Совершенный геометрический шестиугольник, приблизительно 30 000 километров в диаметре, вращающийся на северном полюсе Сатурна.\u003c/p\u003e\n\u003cp\u003eОккультное значение является глубоким. В священной геометрии шестиугольник содержит Звезду Давида, шести-точечную звезду. Он также является фундаментальным образцом соты, снежинки и многочисленных кристаллических структур. Шестиугольный шторм Сатурна предлагает — тем, кто верит в соответствие между небесными и земными образцами — что куб не просто человеческий символ, наложенный на космос, но космическая реальность, отражённая в человеческой цивилизации.\u003c/p\u003e\n\u003cp\u003eКак вверху, так внизу. Это фундаментальный принцип Герметизма, оккультной философии, которая лежит в основе мистерий религий, тайных обществ и самого иезуитского порядка. Куб ниже зеркалирует шестиугольник выше. Храмы Сатурна на земле зеркалируют реальность Сатурна в небесах.\u003c/p\u003e\n\u003ch3 id=\"кольца-связывания\"\u003eКольца связывания\u003c/h3\u003e\n\u003cp\u003eКольца Сатурна, как обсуждалось в Части 3, представляют связывание. В оккультизме кольцо — это цепь, контракт, клятва. Брачное кольцо связывает супругов. Кольцо чемпионата связывает спортсмена к системе конкурентности. Кольцо власти в мифологии Толкиена — \"одно кольцо, чтобы властвовать всеми\" — символ Сатурна, описывающий тоталитарную природу поклонения Сатурну.\u003c/p\u003e\n\u003cp\u003eИезуитская клятва — кольцо связывания. Как только это поднято, оно не может быть разорвано. Член связан к порядку \"в жизни и в смерти\", подчинённый авторитету Генерала во всех вещах. Это управление Сатурна: абсолютное, неизбежное, вечное. Кольца Сатурна не украшение. Это цепи.\u003c/p\u003e\n\u003ch2 id=\"куб-в-религиозной-архитектуре\"\u003eКуб в религиозной архитектуре\u003c/h2\u003e\n\u003ch3 id=\"площадь-святого-петра-куб-ватикана\"\u003eПлощадь Святого Петра: Куб Ватикана\u003c/h3\u003e\n\u003cp\u003eПлощадь Святого Петра в Ватикане на самом деле не квадратная — это эллипс с трапецоидальным входом. Но обелиск в его центре стоит на кубическом основании и сама площадь (piazza) названа для своей геометрической ассоциации. Архитектура Ватикана — сборник оккультного символизма, от египетского обелиска (фаллический солярный символ) до формы замочной скважины, видимой сверху (ключ авторитета) к кубическим формам, которые якорят комплекс.\u003c/p\u003e\n\u003cp\u003eКатолическая церковь, которую иезуиты контролировали изнутри на протяжении столетий, является первичным институциональным хранителем символизма Сатурна в западном мире. Каждый собор — архитектурное кодирование оккультных принципов. Неф представляет корабль (символ Сатурна — Сатурн был связан с навигацией). Алтарь представляет жертвенный стол. Табернакль — где хранится освящённый хлеб — традиционно кубически-образный.\u003c/p\u003e\n\u003cp\u003eХовард Питтман был сказан во время его NDE, что слова несут духовный вес (Матфей 12:36-37). Архитектура также несёт духовный вес. Каждое здание — заявление намерения в материальном мире, и здания католической церкви заявляют их намерение ясно каждому, кто может читать язык: они храмы Сатурна, одетые в христианский словарь.\u003c/p\u003e\n\u003ch3 id=\"святое-святых\"\u003eСвятое святых\u003c/h3\u003e\n\u003cp\u003eНаиболее священное пространство в Еврейском храме — Святое святых — было совершенным кубом. Двадцать локтей на двадцать локтей на двадцать локтей (1 Царств 6:20). Ковчег Завета пребывал в этом кубическом пространстве. Говорилось, что присутствие Бога пребывало между серафимами на крышке Ковчега, внутри куба.\u003c/p\u003e\n\u003cp\u003eЭто представляет теологический парадокс. Является ли куб священным, потому что Бог выбрал его, или культ Сатурна присвоил божественную форму для собственных целей? Ответ может быть в том, что враг всегда подделывает подлинное. Сатана не создаёт — он коррумпирует. Куб может быть божественной формой, которая поклонение Сатурну инвертировало, превратив символ обитания Бога в символ материальной тюрьмы.\u003c/p\u003e\n\u003cp\u003eЭтот образец инверсии является центральным для сатанической стратегии. Как видел Питтман, демоническая сфера подражает божественному порядку. У неё есть собственная иерархия, собственные ритуалы, собственные символы. И иезуиты, работающие как земное расширение этой подделки, обеспечили, что инвертированные символы — это те, которые наиболее широко распространены.\u003c/p\u003e\n\u003ch2 id=\"куб-и-время\"\u003eКуб и время\u003c/h2\u003e\n\u003ch3 id=\"сатурн-как-хронос\"\u003eСатурн как Хронос\u003c/h3\u003e\n\u003cp\u003eСатурн — Хронос — олицетворение времени. Слово \"хронологический\" происходит из его имени. Время — в конечном итоге клетка. Мы рождены в нём, связаны им, потреблены им. Сатурн пожирает своих детей, и время пожирает все вещи.\u003c/p\u003e\n\u003cp\u003eКуб — геометрия времени, сделанная явной. Часовой циферблат двумерный, но само время занимает три измерения — прошлое, настоящее, будущее; длина, ширина, глубина. Куб содержит все направления, все измерения материального мира. Поклоняться кубу — значит поклоняться материальной тюрьме, подчиняться ограничениям физического существования, скорее, чем доходить к духовной реальности за её пределами.\u003c/p\u003e\n\u003cp\u003eИезуиты понимают это глубоко. Их система образования, их календарь (Григорианский календарь, разработанный иезуитом Кристофером Клавиусом), их система духовных упражнений — все это механизмы для связывания сознания к времени, к расписанию, к материальной дисциплине. Иезуитский девиз — \u003cem\u003eAd Maiorem Dei Gloriam\u003c/em\u003e — \"Для большей славы Бога\". Но какого бога? Бога, который существует за пределами времени, или Сатурна, бога, который является временем?\u003c/p\u003e\n\u003ch3 id=\"рабочая-неделя-шесть-дней-в-кубе\"\u003eРабочая неделя: Шесть дней в кубе\u003c/h3\u003e\n\u003cp\u003eРабочая неделя состоит из шести дней (для многих пяти, но оригинальный образец — шесть). Суббота — день Сатурна — седьмой день, день отдыха. В еврейской традиции Суббота (суббота) — святейший день. В христианской традиции воскресенье заменило Субботу. В светском мире суббота — \"выходной\" — день отдыха, потребления и развлечений.\u003c/p\u003e\n\u003cp\u003eШесть дней, работающих в кубе (кубикул, офисное здание, фабрика пола), следуемых днём, посвящённым Сатурну. Это еженедельный ритм системы Сатурна. Работа производит валюту. Валюта тратится в день Сатурна. Цикл повторяется до тех пор, пока рабочий не будет потреблён — пока Сатурн пожирает своего ребёнка.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack исследование детально описывает, как финансовая система усиливает этот цикл труда и потребления, обеспечивая, что население остаётся в ловушке в материальном измерении, слишком истощённое и отвлечённое, чтобы искать духовную истину. Куб не просто символ. Это форма тюрьмы.\u003c/p\u003e\n\u003ch2 id=\"разрушение-куба\"\u003eРазрушение куба\u003c/h2\u003e\n\u003ch3 id=\"видение-сквозь-геометрию\"\u003eВидение сквозь геометрию\u003c/h3\u003e\n\u003cp\u003eПервый шаг в разрыве из любой тюрьмы — распознание, что вы находитесь в одной. Культ Чёрного куба работает через невидимость — его символы настолько вездесущи, что они становятся невидимыми, как вода для рыбы. Мортирная доска, кубикул, подарочная коробка, телевизор, здание, храм — кубы везде, и нигде не признавается за то, что они есть.\u003c/p\u003e\n\u003cp\u003eСообщение Ховарда Питтмана срочно: 95 процентов профессирующих христиан служат \"самому себе\", скорее, чем Богу. Они комфортны в кубе. Они украсили свои клетки и назвали их домом. 97,5-процентный уровень отклонения — естественное последствие популяции, которая выбрала материальный комфорт над духовной истиной.\u003c/p\u003e\n\u003cp\u003eСистема иезуитов зависит от этого комфорта. Пока люди не оспаривают символы, которые их окружают, символы выполняют свою работу беспрепятственно. Куб связывает. Кольцо сковывает. Календарь контролирует. И население, коронованное мортирными досками и заключённое в кубикулы, поклоняется Сатурну, не зная его имя.\u003c/p\u003e\n\u003ch3 id=\"альтернативная-геометрия\"\u003eАльтернативная геометрия\u003c/h3\u003e\n\u003cp\u003eЕсли куб представляет материальное ограничение, что представляет духовную свободу? Писание говорит о \"новом Иерусалиме\", спускающемся с небес — и это, также, описано как куб (Откровение 21:16). Это возвращает нас к парадоксу: куб может быть божественной формой, которая была подделана. Решение не в отклонении геометрии, но в понимании, чьему служению она используется в.\u003c/p\u003e\n\u003cp\u003eВыбор, как всегда, — между хозяевами. Служить Сатурну — служить времени, материалу, ограничению, порабощению — или служить Богу, который существует за пределами времени, за пределами материала, за пределами куба. Геометрия одна и та же. Хозяин создаёт различие. И иезуиты, которые служат неправильному хозяину, пока носят правильный словарь, являются живым доказательством того, что символы без истины — наиболее опасное оружие в существовании.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTu
