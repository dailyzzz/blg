\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИисус пришел исцелять больных — свободно, без условий, без заключения. Система, которая управляла общественным здравоохранением в Америке с 19-го века, работает по противоположному принципу: определите больного, изолируйте его, заключите его в конфинемент и используйте его болезнь как оправдание для лишения его каждого конституционного права. Лагеря FEMA, которые стали основным элементом современного дискурса о заговорах, не являются будущей угрозой — они являются исторической реальностью. Инфраструктура для массового заключения под предлогом общественного здравоохранения существует в Соединенных Штатах с момента создания FEMA в 1979 году.\u003c/p\u003e\n\u003cp\u003eИезуиты, работающие через систему католических больниц и их влияние на политику общественного здравоохранения, давно понимали, что болезнь — идеальный предлог для контроля. Военный порядок Игнатия Лойолы требует абсолютного послушания — \"Я поверю, что белое, которое я вижу, черное, если иерархическая церковь так определит это.\" Что может быть лучшим механизмом для обеспечения послушания, чем авторитет врача, который говорит вам, что здорово и что больно, что безопасно и опасно, что свобода и что карантин? Микеланджело Тамбурини управлял миром из своей комнаты, а современный аппарат общественного здравоохранения управляет из больницы, лаборатории и карантинного лагеря.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e определяет внутреннее предательство, которое делает возможной медицинскую тиранию — правительство, которое претендует защищать своих граждан при строительстве инфраструктуры для их заключения. И \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eХосты сатаны\u003c/a\u003e напоминает нам, что хосты тьмы включают технократов, врачей и администраторов, которые обеспечивают систему при убежденности, что они служат общественному благу.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"карантинные-лагеря-19-го-века\"\u003eКарантинные лагеря 19-го века\u003c/h2\u003e\n\u003ch3 id=\"лазаретто-и-дома-болезни\"\u003eЛазаретто и дома болезни\u003c/h3\u003e\n\u003cp\u003eЗадолго до FEMA, задолго до CDC и задолго до бюрократии современного общественного здравоохранения, Соединенные Штаты управляли сетью карантинных объектов, которые функционировали как лагеря заключения для больных, подозреваемых больных и любого, кого власти выбрали классифицировать как риск здоровья.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЛазаретто\u003c/strong\u003e — названные в честь библейского Лазаря, лазаретто были карантинными станциями, установленными в портах входа для заключения иммигрантов и путешественников, подозреваемых в переносе инфекционных болезней. Филадельфийское Лазаретто, установленное в 1799 году, было одним из старейших в стране. Заключенные удерживались без суда, без юридического представительства и без обращения. Их имущество было конфисковано и часто уничтожено. Те, кто умер в карантине, были захоронены в безымянных могилах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДома болезни\u003c/strong\u003e — почти каждый американский город поддерживал \"дом болезни\" — объект для изоляции людей с заразными болезнями. Эти объекты варьировались от переоборудованных зданий до специально построенных структур, и условия в них часто были ужасными. Пациенты были заключены вопреки их воле, лишены посетителей и обработаны (или необработаны) по усмотрению врача присутствия. Показатели смертности в домах болезни были поразительно высокими — не только от самих болезней, но от условий заключения.\u003c/p\u003e\n\u003ch3 id=\"система-иммигрантского-заключения\"\u003eСистема иммигрантского заключения\u003c/h3\u003e\n\u003cp\u003eОстров Эллис, отмеченный в американской мифологии как \"ворота свободы\", в реальности был карантинной и заключающей объект, где иммигранты были обследованы, допрошены и во многих случаях заключены на недели или месяцы. Те, кого считали \"неподходящими\" — физически, ментально или морально — были высланы.\u003c/p\u003e\n\u003cp\u003eМедицинские обследования на острове Эллис проводились врачами Службы общественного здравоохранения, которые имели огромную власть над жизнями входящих иммигрантов. Отметка мелом на одежде человека — \"H\" за проблемы с сердцем, \"L\" за хромоту, \"X\" за подозреваемое психическое заболевание — могла осудить человека на заключение, дальнейшее обследование или высылку. Эти врачи не были независимыми медицинскими профессионалами; они были государственными агентами, обеспечивающими политику иммиграции, которая была сформирована той же идеологией евгеники, которая позже произведет программы принудительной стерилизации и, в своей самой экстремальной форме, концлагеря нацистов.\u003c/p\u003e\n\u003ch2 id=\"прецедент-тифозная-мария\"\u003eПрецедент \"Тифозная Мария\"\u003c/h2\u003e\n\u003ch3 id=\"случай-мери-маллон\"\u003eСлучай Мери Маллон\u003c/h3\u003e\n\u003cp\u003eМери Маллон, известная истории как \"Тифозная Мария\", была ирландо-родившаяся кухарка, которая была определена как бессимптомная переносчица брюшного тифа в 1907 году. Маллон была насильственно помещена в карантин — заключена — на остров Северной сестры в Восточной реке Нью-Йорка с 1907 по 1910 год, затем освобождена при условии, что она никогда больше не работает кухарком.\u003c/p\u003e\n\u003cp\u003eКогда Маллон была обнаружена, она работает кухарком снова в 1915 году (используя ложное имя), она была повторно арестована и возвращена на остров Северной сестры, где она остается заключенной на остаток своей жизни — 23 года — до ее смерти в 1938 году.\u003c/p\u003e\n\u003cp\u003eСлучай \"Тифозной Мари\" установил критический юридический прецедент: правительство имеет власть заключить людей, которые представляют риск для здоровья, без суда, без ограничения времени и без процессуальных гарантий, гарантированных Конституцией. Этот прецедент был вызван повторно в столетии с тех пор — и он формирует юридическое основание для карантинных полномочий, которые FEMA и CDC осуществляют сегодня.\u003c/p\u003e\n\u003ch3 id=\"вопросы-которые-никто-не-задал\"\u003eВопросы, которые никто не задал\u003c/h3\u003e\n\u003cp\u003eНесколько аспектов случая \"Тифозная Мария\" заслуживают тщательного рассмотрения:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПочему Маллон была единственной заключенной?\u003c/strong\u003e В этот же период в Нью-Йорке было дюжины идентифицированных носителей брюшного тифа. Ни один из них не был заключен на всю жизнь. Маллон была выбрана, потому что она была бедной, ирландской, католической иммигрантской женщиной без политических связей — идеальный тестовый случай для установления принципа неограниченного медицинского заключения.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eКто выиграл от прецедента?\u003c/strong\u003e Случай \"Тифозная Мария\" дал правительству правовое оружие, которое могло быть развернуто против любого человека или группы, классифицированных как \"риск здоровья\". Это оружие было бы использовано против японско-американцев во время Второй мировой войны (частично оправданного на основания общественного здравоохранения), против ВИЧ-положительных лиц в 1980-х и совсем недавно во время пандемии COVID-19.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОткуда пришла юридическая рамка?\u003c/strong\u003e Карантинные полномочия, осуществляемые против Маллон, произошли из морского права — того же корпуса права, которая управляла лазаретто и которая, как утверждали исследователи, формирует скрытое юридическое основание большинства чрезвычайных полномочий правительства. Это рамка морского права, как \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/145-Constitution_Constitutor_Trap.mp4\"\u003eКонституционная ловушка\u003c/a\u003e документирует, была разработана для обхода конституционных гарантий.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"интернмент-прецедент\"\u003eИнтернмент-прецедент\u003c/h2\u003e\n\u003ch3 id=\"интернмент-японских-американцев\"\u003eИнтернмент японских американцев\u003c/h3\u003e\n\u003cp\u003e19 февраля 1942 года президент Франклин Рузвельт подписал исполнительный приказ 9066, разрешающий насильственное перемещение и интернмент примерно 120 000 японских американцев. Интернменты — большинство из которых были американскими гражданами — были лишены их имущества, заключены в лагеря, окруженные колючей проволокой и башнями охраны, и удерживались до четырех лет.\u003c/p\u003e\n\u003cp\u003eОфициальное оправдание было \"военной необходимостью\" — утверждение, что японские американцы представляли риск безопасности. Но язык общественного здравоохранения был также использован для оправдания интернмента: японские американцы были описаны как \"загрязнение\" и \"болезнь\", которая должна была быть \"помещена в карантин\" из здорового тела политики.\u003c/p\u003e\n\u003cp\u003eЛагеря интернмента были, в каждом значимом смысле, лагеря FEMA до FEMA. Они продемонстрировали, что правительство Соединенных Штатов было готово и способно окружить целую этническую группу, заключить их в лагеря и лишить их конституционных прав — все под властью исполнительного приказа.\u003c/p\u003e\n\u003ch2 id=\"fema-и-непрерывность-правительства\"\u003eFEMA и непрерывность правительства\u003c/h2\u003e\n\u003ch3 id=\"исполнительные-приказы-и-чрезвычайные-полномочия\"\u003eИсполнительные приказы и чрезвычайные полномочия\u003c/h3\u003e\n\u003cp\u003eFEMA, созданная исполнительным приказом 12127 в 1979 году, унаследовала чрезвычайные полномочия, которые накапливались в исполнительной ветви с момента Гражданской войны. Эти полномочия, закодированные в серии исполнительных приказов, предоставляют FEMA чрезвычайные полномочия при объявленной чрезвычайной ситуации:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eИсполнительный приказ 10990\u003c/strong\u003e: Правительство может захватить все способы транспортировки\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсполнительный приказ 10995\u003c/strong\u003e: Правительство может захватить средства связи\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсполнительный приказ 10998\u003c/strong\u003e: Правительство может захватить пищевые ресурсы и фермы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсполнительный приказ 11000\u003c/strong\u003e: Правительство может мобилизовать граждан в рабочие бригады\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсполнительный приказ 11001\u003c/strong\u003e: Правительство может захватить функции здравоохранения, образования и благосостояния\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсполнительный приказ 11002\u003c/strong\u003e: Главный почтмейстер может провести национальную регистрацию всех лиц\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсполнительный приказ 11004\u003c/strong\u003e: Правительство может переместить сообщества и обозначить области для отказа\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти исполнительные приказы, которые могут быть активированы президентским объявлением чрезвычайной ситуации, дают правительству юридический авторитет делать все, что делал бы тоталитарный режим — отменять гражданские свободы, конфисковать имущество, проводить принудительный труд и переселять население. Единственный предварительно необходимое условие — объявленная чрезвычайная ситуация.\u003c/p\u003e\n\u003ch3 id=\"лагеря-существуют\"\u003eЛагеря существуют\u003c/h3\u003e\n\u003cp\u003eМногочисленные исследователи, журналисты и бывшие государственные официальные лица задокументировали существование инфраструктуры лагеря FEMA по всем Соединенным Штатам. Эти объекты включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eВыведенные из эксплуатации военные базы, которые были поддержаны в действующем состоянии\u003c/li\u003e\n\u003cli\u003eЖелезнодорожные объекты с платформами, разработанными для погрузки и разгрузки большого количества людей\u003c/li\u003e\n\u003cli\u003eСкладские и промышленные объекты, которые были переоборудованы с ограждением, постами охраны и инфраструктурой заключения\u003c/li\u003e\n\u003cli\u003eМассивные подземные объекты на горе Погода, Вирджиния и Greenbrier курорт в Западной Вирджинии, которые служат бункерами непрерывности правительства\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПравительство не отрицает существование этих объектов; оно просто отрицает, что они предназначены для массового заключения американских граждан. Но юридический авторитет существует, инфраструктура существует, и исторический прецедент — от лазаретто к интернменту японцев — демонстрирует, что правительство использовало такой авторитет раньше.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra никогда не закончилась\u003c/a\u003e соединяет точки между государственными программами заключения и операциями контроля ума, которые используют закрытые население как экспериментальных субъектов.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана раскрывает, что демоническое правительство работает через страх — страх болезни, страх врага, страх социального исключения. Каждый карантинный лагерь, каждый заключающий объект, каждый приказ о чрезвычайной ситуации разработан для эксплуатации этого страха, для того чтобы заставить население добровольно сдать свою свободу в обмен на иллюзию безопасности. Как Питтман узнал, 97,5% принимают широкий путь к разрушению (Матфея 7:13-14), и широкий путь вымощен добрыми намерениями тех, кто подчиняется без вопросов. Смотрите: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о предсмертном опыте Говарда Питтмана\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля документации см. \u003ca href=\"https://agent131711.substack.com\"\u003eSubstack Agent131711\u003c/a\u003e и \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические конфиденциальные сведения: раскрытые постыдные секреты иезуитов\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra никогда не закончилась\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/127-Operation_Midnight_Climax.mp4\"\u003eОперация Полночь Кульминация\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/97-Income_Tax_Is_Slavery.mp4\"\u003eПодоходный налог это рабство\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eХосты сатаны\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/players-game-world-control/?lang=ru\"
