n\u003cp\u003eПисание признаёт то, что каждый правитель в истории понимал: формирование детей определяет будущее цивилизации. Кто контролирует образование детей, контролирует следующее поколение — его убеждения, его ценности, его способность к независимому мышлению и его готовность подчиняться власти. Бог поручил эту ответственность родителям и общине веры. Современное государство её захватило. Передача образовательной власти от семьи к учреждению представляет один из наиболее значительных сдвигов власти в человеческой истории — не заговор, осуществлённый в одном поколении, а систематический проект, охватывающий более века, финансируемый самыми богатыми фондами в мире и разработанный с явными целями, которые его архитекторы задокументировали в своих собственных писаниях.\u003c/p\u003e\n\u003cp\u003eСистема образования, которая существует сегодня, не была разработана для производства мыслителей. Она была разработана для производства рабочих. Она не была разработана для освобождения умов. Она была разработана для их стандартизации. Она не была разработана для обучения детей, как думать. Она была разработана для обучения их, что думать — и, что ещё важнее, что не оспаривать.\u003c/p\u003e\n\u003cp\u003eКак напоминает трек альбома Confliction \"The First Darkness\", первым актом обмана в Эдеме был акт образования — змей обучал Еву новому способу видеть мир, базе, которая противоречила Слову Бога и заменила божественную истину альтернативным нарративом. Современная система образования работает на том же принципе: она представляет альтернативную базу для понимания реальности — ту, в которой Бог отсутствует, власть институциональна, и истина определяется консенсусом, а не откровением.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"прусский-план-послушание-по-дизайну\"\u003eПрусский план: Послушание по дизайну\u003c/h2\u003e\n\u003cp\u003eСовременная система обязательного образования не эволюционировала органично из желания общества образовать своих детей. Она была спроектирована, и её инженеры были явны относительно их целей.\u003c/p\u003e\n\u003cp\u003eМодель, которая стала основой для системы образования по всему миру, была разработана в начале девятнадцатого века в Пруссии (современная Германия). Следуя унизительному поражению Пруссии от Наполеона при Йене в 1806 году, прусское правительство поручило философу Иоганну Готлибу Фихте разработать систему образования, которая предотвратит такое поражение в будущем. Решение Фихте, сформулированное в его \"Обращениях к немецкой нации\" (1808), было системой, которая произвела бы граждан, чья основная верность была государству, и чья способность к независимому мышлению была систематически ограничена.\u003c/p\u003e\n\u003cp\u003eПрусская система внесла несколько инноваций, которые остаются основой современного школьного образования: обязательная посещаемость, принудительная законом, разделение по возрасту, стандартизированная программа, определяемая государством, сертифицированные учителя, обученные государственными учреждениями, иерархическая структура власти (директор, учитель, ученик), и использование звонков для сигнализации переходов — обучение детей реагировать на внешние сигналы, а не на внутреннюю мотивацию.\u003c/p\u003e\n\u003cp\u003eСистема была явно разработана для производства трёх классов граждан: малого класса лидеров, обученных критическому мышлению и принятию решений (образованный в отдельных, элитных учреждениях); большего класса профессиональных рабочих, обученных конкретным навыкам, полезным государству и экономике; и массового класса послушных рабочих, обученных базовой грамотности и безоговорочному подчинению.\u003c/p\u003e\n\u003cp\u003eФихте был не тонок относительно целей системы:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Образование должно целиться на разрушение свободной воли, чтобы после того, как ученики таким образом были в школе, они были неспособны думать или действовать иначе, чем как их школьные мастера бы пожелали.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПрусская модель была импортирована в Соединённые Штаты в 1840-х годах Горацием Манном, который путешествовал в Пруссию специально для изучения её методов образования. Манн стал первым секретарём Совета образования Массачусетса и внедрил прусскую модель в качестве шаблона для американских государственных школ. К концу девятнадцатого века каждый штат в Союзе имел законы об обязательном образовании, моделированные на прусской системе.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"рокфеллер-и-карнеги-основы-контроля\"\u003eРокфеллер и Карнеги: Основы контроля\u003c/h2\u003e\n\u003cp\u003eИндустриализация американского образования в начале двадцатого века финансировалась и направлялась двумя фондами: Генеральным образовательным советом Рокфеллера (основан 1903) и Фондом Карнеги для развития преподавания (основан 1905). Это были не благотворительные организации, стремящиеся улучшить образование. Это были стратегические инвестиции в социальную инженерию самыми богатыми людьми в Америке.\u003c/p\u003e\n\u003cp\u003eГенеральный образовательный совет Джона Д. Рокфеллера опубликовал его \"Occasional Letter No. 1\" в 1906, который содержал это замечательное отрывок:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"В наших мечтах мы имеем безлимитные ресурсы и люди поддаются сами себе с совершенной покорностью нашим формирующимся рукам. Нынешние образовательные конвенции угасают из их умов, и не затрудняемые традицией, мы трудимся нашей собственной доброй волей на благодарный и отзывчивый сельский народ. Мы не будем пытаться сделать этих людей или любого из их детей в философов или людей обучения, или людей науки. Мы не имеем поднять из них авторов, редакторов, поэтов или людей букв. Мы не будем искать эмбрион отличных художников, художников, музыкантов, ни юристов, докторов, проповедников, политиков, государственных деятелей, из которых у нас есть достаточное снабжение. Задача, которую мы ставим перед собой, очень простая, а также очень прекрасная, чтобы обучить этих людей, как мы их находим, на совершенно идеальную жизнь прямо там, где они есть.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eОтрывок не выведена из контекста. Это утверждение образовательной философии: целью образования, как задумано его самыми богатыми спонсорами, было не развитие человеческого потенциала, а обучение людей оставаться \"прямо там, где они есть\" — для производства послушных рабочих, которые принимают свой статус и не стремятся к интеллектуальной независимости, которая могла бы привести их к оспариванию социального порядка, из которого Рокфеллеры и Карнеги вывели свою власть.\u003c/p\u003e\n\u003cp\u003eФонд Карнеги одновременно работал над стандартизацией высшего образования, устанавливая системы аккредитации, которые определяют, какие учреждения являются легитимными и какие нет. Контролируя аккредитацию, Фонд Карнеги контролировал то, что можно было преподавать — не через цензуру, а через институциональное исключение. Университеты, которые отклонялись от одобренной программы, теряли аккредитацию. Без аккредитации их выпускники не могли попасть в профессии. Без профессиональных перспектив студенты бы не посещали. Система была самоусиливающейся.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"практический-протокол-детоксикации-общего-образования\"\u003eПрактический протокол детоксикации общего образования\u003c/h2\u003e\n\u003cp\u003eФонды Карнеги и Рокфеллера также финансировали создание стандартизированного тестирования, начиная с College Board (1900) и Образовательной служба тестирования (1947). Стандартизированное тестирование преобразовало образование из процесса интеллектуального развития в процесс измерения и сортировки — определение того, какие студенты были направлены на роли лидерства и какие были направлены на труд. Оценки тестов не измеряли интеллект. Они измеряли соответствие системе, которая разработала тесты.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"духовное-измерение-удаление-бога-из-класса\"\u003eДуховное измерение: Удаление Бога из класса\u003c/h2\u003e\n\u003cp\u003eУдаление молитвы из американских государственных школ (Engel v. Vitale, 1962) и удаление чтения Библии (Abington School District v. Schempp, 1963) обычно обсуждаются как конституциональные вопросы о разделении церкви и государства. С духовной перспективы они представляют что-то намного более значительное: намеренное иссечение Бога из формирования детских умов.\u003c/p\u003e\n\u003cp\u003eПрусская модель, фонды Рокфеллера-Карнеги и движение прогрессивного образования все разделяют общую философскую основу: материализм. Мир материален. Человеческие существа — это биологические машины. Образование — это поведенческое кондиционирование. Бог — это иррелевант — не потому, что его существование было опровергнуто, но потому, что его существование неудобно для системы, разработанной для производства послушных рабочих, а не свободных душ.\u003c/p\u003e\n\u003cp\u003eКогда Бог удален из образования, что-то должно заполнить вакуум. То, что его заполняет, — это государство. Школа становится храмом. Учитель становится жрецом. Программа становится писанием. Тест становится таинством. И ценности, преподаваемые — релятивизм, материализм, коллективизм и власть институциональной экспертизы над индивидуальной совестью — это ценности системы, которая поместила себя в позицию Бога.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/115-Psychology_Industry_Hoax.mp4\"\u003ePsychology Industry Hoax\u003c/a\u003e — Производство подчинения через образование\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/53-Cognitive_Warfare.mp4\"\u003eCognitive Warfare\u003c/a\u003e — Вооружение обучения\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследовать-далее\"\u003eИсследовать далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mass-formation-psychosis-crowds/?lang=ru\"\u003eMass Formation Psychosis: How Crowds Lose Their Minds\u003c/a\u003e — Как психологическое кондиционирование системы образования создаёт популяции, восприимчивые к массовой манипуляции\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/psychology-industry-manufacturing-illness/?lang=ru\"\u003eThe Psychology Industry: Manufacturing Illness\u003c/a\u003e — Как учреждение ментального здоровья патологизирует независимое мышление, которое система образования была разработана для устранения\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eПервый акт змея в Эдеме был актом образования — предложение альтернативной базы для понимания реальности, ту, которая противоречила Слову Бога и заменила божественную истину обещанием автономного знания. \"Вы будете, как боги, ведая добро и зло.\" Современная система образования работает на той же посылке: что знание существует отдельно от Бога, что истина определяется человеческим консенсусом, и что целью обучения является не знание Создателя, а служение системе. Но страх Господа остаётся началом знания, и каждая система, построенная на другой основе — неважно, как изощрённа, неважно, как хорошо финансируема, неважно, как универсально внедрена — построена на песке. \"Каждый, кто слышит эти слова Мои и не исполняет их, будет похож на безумного человека, который построил свой дом на песке: и пошёл дождь, и пришли наводнения, и подул ветер, и бил на дом; и он упал: и падение его было велико\" (Матфей 7:26-27). Система образования упадёт. Слово Бога будет стоять.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Система образования: Идеологическое воспитание, замаскированное под обучение\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Как современная система образования была разработана не для образования, а для производства послушных рабочих и покорных граждан — от прусской модели к фондам Рокфеллера и Карнеги, от замаскированной программы обучения к стандартизированной посредственности Common Core.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2
