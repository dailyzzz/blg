003c/blockquote\u003e\n\u003cp\u003eПророк Исаия провозгласил горе тем, кто извращает нравственный порядок — называя зло добром, а добро злом, называя тьму светом, а свет тьмой. Ни один институт в современной истории не практиковал это извращение более последовательно, чем медицинский истеблишмент. На протяжении более двух веков процедуры, которые калечили, называли терапевтическими, вещества, которые отравляли, называли лекарствами, эксперименты над бессильными называли наукой, а систематическое разрушение человеческого здоровья называли прогрессом.\u003c/p\u003e\n\u003cp\u003eТемная история современной медицины — это не серия прискорбных ошибок благонамеренных практиков. Это паттерн — двухвековая летопись институционального насилия, корпоративной алчности и профессиональной высокомерности, которая причинила неисчислимые страдания, заворачиваясь в язык исцеления. От ртутного отравления девятнадцатого века до опиоидной эпидемии двадцать первого, паттерн последователен: навредить пациенту, получить прибыль от вреда, подавить доказательства, атаковать критиков и назвать это медициной.\u003c/p\u003e\n\u003cp\u003eКак напоминает нам трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/95-The_Valley_of_Death.mp4\"\u003eThe Valley of Death\u003c/a\u003e, долина тени смертной — это не просто поэтический образ. Это прожитая реальность для миллионов, которые прошли через медицинскую систему и вышли поврежденными, инвалидами или мертвыми — жертвами не болезни, а лечения, назначенного для ее излечения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"эра-ртути-отравление-как-стандарт-лечения-1800-е\"\u003eЭра ртути: Отравление как стандарт лечения (1800-е)\u003c/h2\u003e\n\u003cp\u003eВ девятнадцатом веке самым широко прописываемым веществом в американской медицине была ртуть — в частности каломель (хлорид ртути), токсичное соединение, вводимое орально как слабительное, мочегонное и общее \"лекарство от всех болезней\". Ртуть прописывалась практически для каждого недуга: лихорадок, инфекций, расстройств пищеварения, сифилиса и даже боли при прорезывании зубов у младенцев.\u003c/p\u003e\n\u003cp\u003eЭффекты отравления ртутью были серьезными и хорошо задокументированными даже в то время: расшатывание и потеря зубов, изъязвление рта и десен, чрезмерное слюноотделение (пациенты производили литры слюны в день), тремор, неврологические повреждения, почечная недостаточность и смерть. Эти симптомы не признавались отравлением врачами, вводящими лечение. Они интерпретировались как болезнь \"работающая над собой\" — доказательство того, что лечение было эффективным.\u003c/p\u003e\n\u003cp\u003eВрачи, которые ставили под сомнение лечение ртутью, подвергались атакам медицинского истеблишмента. Сэмюэл Томсон, ботанический врач, который выступал за травяные лекарства вместо минеральных ядов, был привлечен к суду и заключен в тюрьму за свою критику медицины на основе ртути. Эклектическое медицинское движение, которое отвергало ртуть и другие минеральные яды в пользу лечения на основе растений, было систематически маргинализировано аллопатическим истеблишментом, который позже станет AMA.\u003c/p\u003e\n\u003cp\u003eЭра ртути не закончилась потому, что медицинский истеблишмент признал свою ошибку. Она закончилась потому, что общественное давление в сочетании с подъемом конкурирующих медицинских традиций заставило постепенно отказаться от наиболее явно токсичных практик. Медицинская профессия никогда формально не признавала и не извинялась за миллионы пациентов, которых она отравила ртутью в течение более века стандартной практики.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"лоботомия-разрушение-мозга-для-спасения-разума-1930-1970-е\"\u003eЛоботомия: Разрушение мозга для спасения разума (1930-1970-е)\u003c/h2\u003e\n\u003cp\u003eВ 1936 году португальский невролог Эгаш Мониш разработал префронтальную лоботомию — хирургическую процедуру, которая включала разрыв связей в префронтальной коре мозга. Мониш утверждал, что процедура может вылечить психоз, депрессию и другие психические расстройства, разрушая мозговую ткань, ответственную за нарушенные эмоции. Он получил Нобелевскую премию по физиологии и медицине в 1949 году за это \"открытие\".\u003c/p\u003e\n\u003cp\u003eВ Америке доктор Уолтер Фриман стал самым восторженным сторонником лоботомии, разработав \"лоботомию ледорубом\" (трансорбитальную лейкотомию) — процедуру, которую можно было выполнить за минуты в кабинете врача, используя инструмент, напоминающий ледоруб, вставленный через глазницу в мозг. Фриман выполнил эту процедуру более чем на 3400 пациентах, путешествуя по стране в фургоне, который он называл \"лоботомобиль\".\u003c/p\u003e\n\u003cp\u003eПоследствия были разрушительными. Лоботомированные пациенты часто становились послушными, пассивными и эмоционально плоскими — что считалось \"успешным\" исходом, потому что они больше не были разрушительными. Многие потеряли способность функционировать независимо. Многие испытали серьезные изменения личности, когнитивные нарушения и судороги. Некоторые умерли от процедуры. Розмари Кеннеди, сестра президента Джона Ф. Кеннеди, была лоботомирована в 1941 году в возрасте 23 лет; процедура оставила ее постоянно недееспособной.\u003c/p\u003e\n\u003cp\u003eПо оценкам, 40 000-50 000 лоботомий было выполнено в Соединенных Штатах между 1930-ми и 1970-ми годами. Процедура непропорционально выполнялась на женщинах, меньшинствах и институционализированных пациентах — популяциях с наименьшей властью отказаться. Это не была медицинская наука. Это была медицинская резня, санкционированная высшими авторитетами в профессии, вознагражденная Нобелевской премией и практикуемая на самых уязвимых членах общества.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"принудительная-стерилизация-евгеническая-повестка-1907-1981\"\u003eПринудительная стерилизация: Евгеническая повестка (1907-1981)\u003c/h2\u003e\n\u003cp\u003eАмериканское евгеническое движение — вера в то, что человеческая раса может быть улучшена путем контроля размножения — не было маргинальной идеологией. Это была основная наука, одобренная ведущими университетами, финансируемая крупными фондами (включая Рокфеллеровский фонд и Институт Карнеги) и реализованная через закон штата.\u003c/p\u003e\n\u003cp\u003eНачиная с Индианы в 1907 году, тридцать два штата приняли законы о принудительной стерилизации, нацеленные на людей, сочтенных \"неподходящими\" для размножения. Категории \"неподходящести\" были обширными: психическая болезнь, умственная отсталость, эпилепсия, слепота, глухота, физическое уродство, алкоголизм и во многих случаях бедность и статус расового меньшинства. Процедуры выполнялись без значимого согласия, часто на институционализированных лицах, которые не имели юридического представительства и никакой способности отказаться.\u003c/p\u003e\n\u003cp\u003eПо оценкам, 60 000-70 000 американцев были принудительно стерилизованы в рамках этих программ. Верховный суд подтвердил конституционность принудительной стерилизации в деле Buck v. Bell (1927), в котором судья Оливер Венделл Холмс написал печально известное мнение, заявляющее, что \"трех поколений идиотов достаточно\". Решение никогда не было формально отменено.\u003c/p\u003e\n\u003cp\u003eАмериканское евгеническое движение напрямую повлияло на программы расовой гигиены нацистской Германии. Нацистские законы о стерилизации были смоделированы по американским уставам, а американские евгенисты поддерживали тесные отношения со своими немецкими коллегами в течение 1930-х годов. Рокфеллеровский фонд финансировал Институт кайзера Вильгельма по антропологии, человеческой наследственности и евгенике в Берлине, где проводились исследования, которые способствовали нацистской расовой политике. Когда Нюрнбергские трибуналы привлекали к суду нацистских врачей за принудительную стерилизацию, обвиняемые ссылались на американские евгенические программы в свою защиту.\u003c/p\u003e\n\u003cp\u003eПринудительная стерилизация в Соединенных Штатах не закончилась со Второй мировой войной. Евгеническая программа Северной Каролины продолжалась до 1977 года. Калифорния выполняла принудительные стерилизации заключенных тюрем еще в 2010 году. Практика не была исторической аберрацией — это была устойчивая институциональная программа, поддерживаемая медицинскими, юридическими и академическими истеблишментами большую часть века.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"эксперимент-таскиги-наблюдение-за-смертью-мужчин-ради-науки-1932-1972\"\u003eЭксперимент Таскиги: Наблюдение за смертью мужчин ради науки (1932-1972)\u003c/h2\u003e\n\u003cp\u003eИсследование сифилиса Таскиги, проведенное Службой общественного здравоохранения Соединенных Штатов с 1932 по 1972 год, является самым печально известным медицинским экспериментом в американской истории. Приблизительно 600 чернокожих мужчин в округе Мейкон, Алабама — 399 с сифилисом и 201 без — были зачислены в исследование, якобы предназначенное для наблюдения за естественной прогрессией нелеченного сифилиса.\u003c/p\u003e\n\u003cp\u003eМужчин не информировали, что у них сифилис. Им говорили, что они получают бесплатное лечение от \"плохой крови\", разговорного термина для множества недугов. В обмен на свое участие они получали бесплатные обеды, бесплатные медицинские осмотры и страховку на погребение. Они не получали лечение от сифилиса.\u003c/p\u003e\n\u003cp\u003eКогда пенициллин стал стандартным лечением сифилиса в 1940-х годах, исследователи Таскиги не предоставили его участникам исследования. Вместо этого они активно предотвращали получение мужчинами лечения — вмешиваясь, когда участники искали медицинскую помощь в другом месте, и обеспечивая, чтобы они оставались нелечеными, чтобы исследование могло продолжать наблюдать нелеченную прогрессию болезни. Исследователи наблюдали, как участники слепли, сходили с ума и умирали от болезни, которая была полностью излечимой.\u003c/p\u003e\n\u003cp\u003eИсследование продолжалось 40 лет, через несколько администраций, проверялось многочисленными медицинскими специалистами и публиковалось в рецензируемых журналах — без какого-либо участника, которому сообщили бы его истинный диагноз или предложили лечение. Оно не было прекращено потому, что медицинский истеблишмент признал этическое нарушение. Оно было прекращено потому, что Питер Бакстон, осведомитель Службы общественного здравоохранения, слил историю прессе в 1972 году.\u003c/p\u003e\n\u003cp\u003eК моменту окончания исследования 28 участников умерли непосредственно от сифилиса, 100 умерли от связанных осложнений, 40 жен были заражены, и 19 детей родились с врожденным сифилисом.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"талидомид-des-и-фармацевтический-счет-тел-1950-1970-е\"\u003eТалидомид, DES и фармацевтический счет тел (1950-1970-е)\u003c/h2\u003e\n\u003cp\u003eСередина двадцатого века произвела серию фармацевтических катастроф, которые продемонстрировали системный характер фармацевтического вреда:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТалидомид (1957-1962):\u003c/strong\u003e Продаваемый в Европе и других странах как безопасное седативное средство и средство от утренней тошноты для беременных женщин, талидомид вызвал катастрофические врожденные дефекты у более чем 10 000 детей по всему миру. Дети рождались с фокомелией — укороченными или отсутствующими конечностями — и другими серьезными деформациями. Препарат никогда не был одобрен в Соединенных Штатах, благодаря рецензенту FDA Фрэнсис Келси, которая сопротивлялась давлению индустрии одобрить его. Но катастрофа показала, что тестирование безопасности фармацевтической индустрии было грубо неадекватным и что мотив прибыли постоянно перевешивал соображения безопасности.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDES (Диэтилстильбэстрол) (1938-1971):\u003c/strong\u003e Этот синтетический эстроген прописывался миллионам беременных женщин для предотвращения выкидыша, несмотря на доказательства того, что он был неэффективен для этой цели. Позже было обнаружено, что DES вызывает редкий вагинальный рак у дочерей женщин, которые его принимали, а также репродуктивные аномалии, бесплодие и повышенный риск рака как у сыновей, так и у дочерей, подвергшихся воздействию в утробе. По оценкам, 5-10 миллионов женщин получили DES во время беременности до того, как он был изъят из использования у беременных женщин в 1971 году.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDalkon Shield (1971-1974):\u003c/strong\u003e Это внутриматочное устройство (ВМС), произведенное компанией A.H. Robins, вызвало воспалительное заболевание органов малого таза, сепсис, бесплодие и смерть у тысяч женщин. Компания знала о дефектах устройства, но продолжала его продавать. Более 300 000 женщин подали иски о вреде, и 18 смертей были приписаны устройству.\u003c/p\u003e\n\u003cp\u003eКаждая из этих катастроф следовала одному и тому же паттерну: продукт продавался на основе неадекватного тестирования безопасности, неблагоприятные события сообщались пациентами и врачами, производитель подавлял или минимизировал данные о безопасности, регулирующие агентства не действовали, и к моменту изъятия продукта десятки тысяч людей были повреждены.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"опиоидная-эпидемия-фармацевтическое-массовое-убийство-1996-настоящее-время\"\u003eОпиоидная эпидемия: Фармацевтическое массовое убийство (1996-настоящее время)\u003c/h2\u003e\n\u003cp\u003eОпиоидная эпидемия — самое летальное достижение фармацевтической индустрии. С 1999 года более 500 000 американцев умерли от передозировки опиоидами — число погибших, превышающее американские боевые потери в Первой мировой войне, Второй мировой войне, Корее и Вьетнаме вместе взятых.\u003c/p\u003e\n\u003cp\u003eЭпидемия была произведена. В 1996 году Purdue Pharma представила OxyContin, формулу оксикодона с замедленным высвобождением, продавая его как безопасное, не вызывающее привыкания болеутоляющее средство. Маркетинговые материалы компании утверждали, что риск зависимости составлял \"менее одного процента\" — утверждение, основанное на одном параграфе письма редактору, опубликованном в Медицинском журнале Новой Англии в 1980 году, в котором изучались госпитализированные пациенты, получающие контролируемое опиоидное лечение, и которое было названо одной из самых опасно неправильно использованных ссылок в медицинской истории.\u003c/p\u003e\n\u003cp\u003eТорговые представители Purdue были обучены преуменьшать риски зависимости и продвигать OxyContin для все более широких показаний — включая умеренную хроническую боль, рынок десятков миллионов пациентов. Компания финансировала организации по управлению болью, влияла на медицинское образование и создала маркетинговую экосистему, которая систематически искажала потенциал зависимости своего продукта.\u003c/p\u003e\n\u003cp\u003eКогда масштаб зависимости стал неоспоримым, фармацевтическая индустрия развернулась: те же компании, которые создали кризис зависимости, начали продавать лечение для него. Suboxone (бупренорфин/налоксон), лечение с помощью лекарств для опиоидной зависимости, стало еще одной миллиардной фармацевтической франшизой. Индустрия создала болезнь, а затем продала лечение — самую прибыльную бизнес-модель, которую можно представить.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в нашей статье о \u003ca href=\"/medical-history-rewritten/?lang=ru\"\u003eMedical History Rewritten\u003c/a\u003e, переписывание медицинской истории служит для затемнения этого паттерна фармацевтического вреда, представляя каждую катастрофу как изолированный инцидент, а не системный результат ориентированной на прибыль системы с неадекватной подотчетностью.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"радиационные-эксперименты-правительство-как-безумный-ученый-1940-1970-е\"\u003eРадиационные эксперименты: Правительство как безумный ученый (1940-1970-е)\u003c/h2\u003e\n\u003cp\u003eВо время холодной войны правительство Соединенных Штатов провело тысячи радиационных экспериментов на американских гражданах, часто без их ведома или согласия. Эти эксперименты финансировались Комиссией по атомной энергии, Министерством обороны и Национальными институтами здравоохранения, и они проводились в крупных больницах и университетах по всей стране.\u003c/p\u003e\n\u003cp\u003eПациентам в больницах вводили плутоний без их согласия. Заключенные подвергались облучению для изучения его влияния на тестикулярную функцию. Детям в государственной школе для умственно отсталых давали радиоактивные хлопья. Беременным женщинам давали радиоактивное железо для изучения плацентарного переноса. Больных раком подвергали облучению всего тела в дозах, далеко превышающих любую терапевтическую цель.\u003c/p\u003e\n\u003cp\u003eКонсультативный комитет по экспериментам над человеком с радиацией, назначенный президентом Клинтоном в 1994 году, задокументировал более 4000 спонсируемых правительством радиационных экспериментов, проведенных между 1940-ми и 1970-ми годами. Комитет установил, что подавляющее большинство этих экспериментов проводилось без информированного согласия субъектов, в нарушение существующих этических стандартов.\u003c/p\u003e\n\u003cp\u003eЭто не были мошеннические эксперименты, проведенные исследователями-индивидуалистами. Они финансировались федеральными агентствами, проводились в престижных институтах, контролировались врачами и учеными высокого профессионального статуса и проверялись институциональными комитетами. Вся инфраструктура американских медицинских исследований была соучастником систематического облучения американских граждан в экспериментальных целях.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"современная-эра-ятрогенная-смерть-как-третья-ведущая-причина\"\u003eСовременная эра: Ятрогенная смерть как третья ведущая причина\u003c/h2\u003e\n\u003cp\u003eИстория медицинского вреда не закончилась в двадцатом веке. Она продолжается сегодня в формах, которые менее драматичны, но более распространены, чем злодеяния прошлого.\u003c/p\u003e\n\u003cp\u003eЗнаковое исследование 2016 года Макари и Дэниела, опубликованное в \u003cem\u003eBMJ\u003c/em\u003e, оценило, что медицинские ошибки являются третьей ведущей причиной смерти в Соединенных Штатах, ответственной за приблизительно 250 000 смертей в год. Другие оценки варьируются выше — до 440 000 ежегодных смертей согласно исследованию 2013 года \u003cem\u003eJournal of Patient Safety\u003c/em\u003e Джеймса.\u003c/p\u003e\n\u003cp\u003eЭти цифры охватывают хирургические ошибки, лекарственные ошибки, внутрибольничные инфекции, неправильный диагноз и осложнения лечения. Они не включают смерти, вызванные правильно назначенными лекарствами, принимаемыми по назначению — фармацевтические неблагоприятные события, которые, хотя и не классифицируются как \"ошибки\", представляют предсказуемые последствия системы, которая рассматривает химическое вмешательство как реакцию по умолчанию на практически каждую жалобу на здоровье.\u003c/p\u003e\n\u003cp\u003eКогда включаются правильно назначенные лекарства, принимаемые по назначению, ежегодное число погибших от медицинской системы возрастает далее. Исследование 1998 года в JAMA Лазару и др. оценило, что неблагоприятные лекарственные реакции у госпитализированных пациентов вызывали более 100 000 смертей ежегодно в Соединенных Штатах — делая фармацевтические неблагоприятные события одной из ведущих причин смерти, даже когда препараты используются правильно.\u003c/p\u003e\n\u003cp\u003eКак исследовано в нашей статье о \u003ca href=\"/pharmakeia-sorcery-pharmaceuticals/?lang=ru\"\u003ePharmakeia: The Sorcery of Modern Pharmaceuticals\u003c/a\u003e, фармацевтическая система производит не здоровье, а зависимость — и эта зависимость несет число погибших, которое систематически недосчитывается, недооценивается и недопризнается.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-врач-который-истинно-исцеляет\"\u003eБиблейское размышление: Врач, Который истинно исцеляет\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И женщина, страдавшая кровотечением двенадцать лет, которая истратила на врачей все свое имение и ни одним не могла быть вылечена, подошла сзади и прикоснулась к краю одежды Его; и тотчас течение крови у нее остановилось.\" — Лука 8:43-44\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЖенщина с кровотечением истратила все свое имение на врачей и не была исцелена ни одним из них. Она стала хуже, а не лучше под их опекой. Это не просто анекдот первого века. Это пророческое описание современного медицинского опыта для миллионов: системы, которая забирает все, что у вас есть, и оставляет вас больнее, чем когда вы начали.\u003c/p\u003e\n\u003cp\u003eНо женщина сделала что-то радикальное. Она перестала полагаться на врачей и потянулась к краю одежды Христа. Она обошла институциональную систему и пошла прямо к истинному Исцелителю. И она была исцелена — не управлялась, не получала лекарства, не подвергалась еще одному экспериментальному лечению — исцелена. Немедленно. Полностью. Свободно.\u003c/p\u003e\n\u003cp\u003eДвести лет современной медицины произвели ошеломляющее число погибших: миллионы отравлены ртутью, десятки тысяч лоботомированы, сотни тысяч стерилизованы, миллионы повреждены фармацевтическими продуктами и система, которая остается по сей день третьей ведущей причиной смерти. История современной медицины — это не история исцеления. Это история институционального насилия, одетого в белые халаты. И средство то же сегодня, что и было две тысячи лет назад: протянуться мимо института, мимо рецепта, мимо белого халата и коснуться одежды Того, Кто истинно исцеляет.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e — 200 лет захваченной медицины\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/107-Stem_Cell_Harvesting.mp4\"\u003eStem Cell Harvesting\u003c/a\u003e — Темная история современной медицины\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/medical-history-rewritten/?lang=ru\"\u003eMedical History Rewritten\u003c/a\u003e — Как финансируемое Рокфеллером переписывание медицинской истории скрывает злодеяния, задокументированные в этой статье\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pharmakeia-sorcery-pharmaceuticals/?lang=ru\"\u003ePharmakeia: The Sorcery of Modern Pharmaceuticals\u003c/a\u003e — Библейское слово для колдовства — фармакия — корень слова \"фармацевтический\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eДва века отравления ртутью, лоботомий, принудительной стерилизации, радиационных экспериментов, фармацевтических катастроф и институциональной небрежности — все проводилось под знаменем науки, все вводилось аккредитованными специалистами, все проверялось институциональными комитетами и все производило число погибших, которое было бы названо военным преступлением в любом другом контексте. Женщина с кровотечением истратила все на врачей и не была исцелена ни одним. Она протянулась мимо института и коснулась одежды Христа. Двести лет медицинского безумия подтверждают мудрость ее выбора. Система, которая называет себя исцелением, — это система, о которой предупреждал Исаия — система, которая называет зло добром, а тьму светом, которая ставит горькое вместо сладкого, а сладкое вместо горького. Горе ей. И благословенны те, кто, как женщина, протягивается мимо института к Тому, Кто истинно исцеляет.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"200 лет безумия: Темная история современной медицины\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Всеобъемлющая двухвековая хронология медицинских злодеяний раскрывает паттерн вреда, замаскированного под исцеление — от дозирования ртутью и лоботомий до принудительной стерилизации, эксперимента Таскиги и фармацевтических опиоидных эпидемий. Темная история современной медицины — это не набор изолированных ошибок, а систематический паттерн институционального насилия.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color
