е.\" — Матфея 6:24\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИисус не просто предостерегал от жадности. Он определил маммону — систему богатства и материальной зависимости — как соперничающего господина, поддельного владыку, требующего той же преданности, которая принадлежит только Богу.\u003c/p\u003e\n\u003cp\u003eЦифровая валюта центрального банка — это усовершенствованная маммона. Это деньги, которые являются не просто средством обмена, но механизмом послушания — программируемые, условные, отменяемые и предназначенные для работы как операционная система человеческого поведения.\u003c/p\u003e\n\u003cp\u003eКогда ваши деньги могут быть проинструктированы, что покупать, когда истекать и кого исключать, маммона стала вашим господином в самом буквальном смысле.\u003c/p\u003e\n\u003cp\u003eПереход от физических денег к программируемой цифровой валюте — это не эволюция. Это революция — замена инструмента, который вы контролируете, на инструмент, который контролирует вас.\u003c/p\u003e\n\u003cp\u003eТрек с альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/51-The_Covenant_Blood.mp4\"\u003eКровь завета\u003c/a\u003e говорит об истинном завете — запечатанном не в цифровых токенах, а в крови Христа. Поддельный завет, который строится, требует не веры, а соответствия, не поклонения, а подчинения, и его валюта — не благодать, а программируемое послушание.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-cbdc\"\u003eЧто такое CBDC?\u003c/h2\u003e\n\u003cp\u003eЦифровая валюта центрального банка — это цифровая форма фиатной валюты нации, выпущенная и контролируемая непосредственно центральным банком.\u003c/p\u003e\n\u003cp\u003eКлючевые отличия:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eВ отличие от \u003cstrong\u003eдепозитов коммерческих банков\u003c/strong\u003e (которые являются обязательствами частных банков), CBDC является прямым обязательством самого центрального банка\u003c/li\u003e\n\u003cli\u003eВ отличие от \u003cstrong\u003eкриптовалюты\u003c/strong\u003e (которая децентрализована), CBDC полностью централизована — разработана, выпущена, контролируется и управляется институтом, который контролирует денежную политику\u003c/li\u003e\n\u003cli\u003eВ отличие от \u003cstrong\u003eналичных\u003c/strong\u003e (которые анонимны), CBDC отслеживается, программируется и отменяется\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПо состоянию на 2024 год более 130 стран, представляющих 98% мирового ВВП, изучали или разрабатывали CBDC. Банк международных расчётов (BIS) — центральный банк центральных банков — координирует разработку CBDC в разных юрисдикциях.\u003c/p\u003e\n\u003cp\u003eАктивные развёртывания и пилоты включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЦифровой юань Китая (e-CNY)\u003c/strong\u003e — более 260 миллионов кошельков, десятки пилотных городов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eeNaira Нигерии\u003c/strong\u003e — запущен в 2021 году\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSand Dollar Багамских островов\u003c/strong\u003e — запущен в 2020 году\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЕвропейский центральный банк\u003c/strong\u003e — разрабатывает цифровое евро\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБанк Англии\u003c/strong\u003e — разрабатывает цифровой фунт\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФедеральная резервная система\u003c/strong\u003e — опубликовала исследовательские работы о цифровом долларе\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не спекулятивная технология. Она находится в активной разработке и развёртывании по всему миру.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"оружие-программируемости\"\u003eОружие программируемости\u003c/h2\u003e\n\u003cp\u003eОпределяющая особенность CBDC — особенность, которая отличает её от каждой предыдущей формы денег — это \u003cstrong\u003eпрограммируемость\u003c/strong\u003e. CBDC — это не просто цифровые деньги. Это деньги с встроенным кодом — кодом, который определяет, как, когда, где и кем они могут использоваться.\u003c/p\u003e\n\u003cp\u003eКонсультационный документ Банка Англии 2023 года о цифровом фунте прямо обсуждал программируемость, различая между:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПрограммируемые деньги\u003c/strong\u003e — условия, встроенные в саму валюту\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПрограммируемые платежи\u003c/strong\u003e — условия, применяемые посредниками\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОба достигают одного и того же результата: деньги, которые подчиняются правилам, написанным кем-то другим, а не лицом, владеющим ими.\u003c/p\u003e\n\u003cp\u003eЗадокументированные и предложенные функции программируемости включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДаты истечения.\u003c/strong\u003e CBDC может быть запрограммирована на истечение после установленного периода. Пилот цифрового юаня Китая тестировал это, выпуская стимулирующие платежи, которые должны были быть потрачены в течение ограниченного времени. Это устраняет способность сберегать — фундаментальную экономическую свободу.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОграничения на траты.\u003c/strong\u003e CBDC может быть закодирована для разрешения или запрета определённых категорий покупок. Правительство могло бы запрограммировать CBDC для запрета алкоголя, табака, огнестрельного оружия, определённых продуктов питания или топлива сверх углеродной квоты. Сами деньги обеспечивают ограничение.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГеографические ограничения.\u003c/strong\u003e CBDC может быть ограничена определёнными областями. Ваши деньги могут работать только в пределах вашего города или 15-минутной зоны — как исследуется в \u003ca href=\"/smart-city-prison-15-minute-trap/?lang=ru\"\u003eТюрьма умного города: Ловушка 15 минут\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУсловный доступ.\u003c/strong\u003e Доступ к CBDC может быть обусловлен соответствием — статусом вакцинации, баллом социального кредита, налоговым соответствием, углеродной квотой. Система социального кредита Китая уже ограничивает покупки для граждан с низкими баллами. CBDC автоматизирует это.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОтрицательные процентные ставки.\u003c/strong\u003e Ваш баланс уменьшается со временем, заставляя тратить и предотвращая сбережение. Это спроектированная зависимость.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"слой-надзора\"\u003eСлой надзора\u003c/h2\u003e\n\u003cp\u003eКаждая транзакция CBDC по замыслу видима выпускающему центральному банку. В отличие от наличных — которые анонимны — CBDC даёт центральному банку представление о каждой транзакции в экономике в реальном времени.\u003c/p\u003e\n\u003cp\u003eЭто не побочный эффект. Это заявленная цель.\u003c/p\u003e\n\u003cp\u003eBIS опубликовал множество работ, описывающих \"возможности данных\", которые предоставляет CBDC. Рабочий документ BIS 2021 года отметил, что CBDC может позволить центральным банкам:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"Наблюдать поток денег в реальном времени\"\u003c/li\u003e\n\u003cli\u003e\"Реализовывать денежную политику на индивидуальном уровне\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПодумайте, что означает \"денежная политика на индивидуальном уровне\":\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРазные процентные ставки для разных людей на основе поведения\u003c/li\u003e\n\u003cli\u003eСтимулирование трат в определённых демографических группах путём более быстрого истечения их денег\u003c/li\u003e\n\u003cli\u003eОтговаривание определённых покупок путём снижения ценности денег для этих покупок\u003c/li\u003e\n\u003cli\u003eВознаграждение соответствующих граждан бонусами\u003c/li\u003e\n\u003cli\u003eНаказание несоответствующих вычетами\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не денежная политика. Это поведенческая инженерия, выполняемая через денежную массу.\u003c/p\u003e\n\u003cp\u003eНадзор выходит за рамки экономики. Данные транзакций CBDC раскрывают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКаждое пожертвование политической причине\u003c/li\u003e\n\u003cli\u003eКаждую покупку в оружейном магазине\u003c/li\u003e\n\u003cli\u003eКаждый платёж адвокату\u003c/li\u003e\n\u003cli\u003eКаждое посещение медицинского учреждения\u003c/li\u003e\n\u003cli\u003eКаждую подписку на медиа-канал\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВсё видимо в реальном времени центральному банку и любому правительственному агентству с доступом.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"китай-чертёж\"\u003eКитай: Чертёж\u003c/h2\u003e\n\u003cp\u003eЦифровой юань Китая предоставляет самую ясную картину CBDC как механизма контроля. Ключевые особенности:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eРегистрация по реальному имени\u003c/strong\u003e требуется для кошельков выше самого низкого уровня\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЛимиты транзакций\u003c/strong\u003e привязаны к уровню верификации идентичности\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОффлайн-возможность\u003c/strong\u003e, которая всё же записывает транзакции для последующей загрузки\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФункциональность смарт-контрактов\u003c/strong\u003e, обеспечивающая программируемые условия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнтеграция с баллами социального кредита\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКитайские граждане с низкими баллами социального кредита уже сталкиваются с:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНевозможностью покупать авиабилеты\u003c/li\u003e\n\u003cli\u003eНевозможностью покупать билеты первого класса на поезд\u003c/li\u003e\n\u003cli\u003eДросселированным доступом в интернет\u003c/li\u003e\n\u003cli\u003eОграниченными финансовыми услугами\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЦифровой юань систематизирует эти ограничения и делает их автоматическими. Никакой человеческий бюрократ не обрабатывает наказание. Код обеспечивает его.\u003c/p\u003e\n\u003cp\u003eКитайская модель не уникальна для Китая. Это шаблон.\u003c/p\u003e\n\u003cp\u003eBIS, МВФ и Всемирный банк опубликовали структуры CBDC, включающие верификацию идентичности, мониторинг транзакций и программируемость. Язык отличается — \"финансовая инклюзия\" вместо \"социального кредита\", \"защита потребителей\" вместо \"контроля поведения\" — но архитектура идентична.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"интеграция-с-цифровым-id\"\u003eИнтеграция с цифровым ID\u003c/h2\u003e\n\u003cp\u003eCBDC не может функционировать без цифровой идентичности. Каждая транзакция требует аутентификации — подтверждения того, кто её инициирует.\u003c/p\u003e\n\u003cp\u003eЭто связывает CBDC напрямую с инфраструктурой цифровой идентичности, как исследуется в \u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eЦифровой ID: Глобальная тюрьма идентичности\u003c/a\u003e и \u003ca href=\"/mark-of-the-beast-digital-id/?lang=ru\"\u003eНачертание зверя и цифровая идентичность\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eИнтеграция создаёт полную архитектуру Откровения 13:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСистема, требующая \u003cstrong\u003eпроверяемой идентичности\u003c/strong\u003e для покупки и продажи\u003c/li\u003e\n\u003cli\u003eИдентичность, связанная со \u003cstrong\u003eстатусом соответствия\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eНет идентичности = нет денег\u003c/li\u003e\n\u003cli\u003eНесоответствующая идентичность = нет денег\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНачертание — какую бы форму оно ни приняло — это механизм аутентификации, связывающий ваше тело с вашим кошельком CBDC и ваш кошелёк с системой соответствия.\u003c/p\u003e\n\u003cp\u003eЭто не интерпретация. Это опубликованная спецификация дизайна каждого крупного проекта CBDC.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"предпосылка-безналичного-общества\"\u003eПредпосылка безналичного общества\u003c/h2\u003e\n\u003cp\u003eКонтрольные функции CBDC эффективны только в безналичной среде. Пока существуют физические наличные, граждане могут отказаться.\u003c/p\u003e\n\u003cp\u003eСтремление устранить наличные — задокументированное в \u003ca href=\"/cashless-society-trap/?lang=ru\"\u003eЛовушка безналичного общества\u003c/a\u003e — поэтому является предпосылкой.\u003c/p\u003e\n\u003cp\u003eПоследовательность ясна и преднамеренна:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eСократить использование наличных\u003c/strong\u003e через стимулы удобства\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСтигматизировать наличные\u003c/strong\u003e как инструмент преступников\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВвести CBDC\u003c/strong\u003e как превосходную альтернативу\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстранить наличные\u003c/strong\u003e, как только CBDC достигнет критической массы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАктивировать программируемость\u003c/strong\u003e, как только наличные больше не доступны\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eКаждый шаг выглядит добровольным и безобидным в изоляции. Вместе они представляют собой строительство финансовой тюрьмы без выхода.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"глобальная-координация\"\u003eГлобальная координация\u003c/h2\u003e\n\u003cp\u003eРазработка CBDC координируется через международные институты:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБанк международных расчётов (BIS)\u003c/strong\u003e — управляет Инновационным хабом, координирующим исследования CBDC по всему миру. Проекты включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003emBridge\u003c/strong\u003e — трансграничный CBDC между Китаем, Гонконгом, Таиландом и ОАЭ\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProject Helvetia\u003c/strong\u003e — оптовый CBDC в Швейцарии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDunbar\u003c/strong\u003e — мульти-CBDC платформа для Сингапура, Малайзии, Австралии и Южной Африки\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eМеждународный валютный фонд (МВФ)\u003c/strong\u003e — опубликовал структуры для интероперабельности CBDC, выступая за CBDC для \"финансовой инклюзии\".\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВсемирный экономический форум (ВЭФ)\u003c/strong\u003e — созывает управляющих центральных банков, руководителей технологических компаний и политиков для структур управления CBDC.\u003c/p\u003e\n\u003cp\u003eКоординация обеспечивает, что когда CBDC полностью развёрнут, он будет интероперабельным через границы — глобальная финансовая система, где каждая транзакция видима и подчинена программируемым контролям.\u003c/p\u003e\n\u003cp\u003eСистема строится не как национальный проект, а как глобальная инфраструктура.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И он сделает то, что всем, малым и великим, богатым и нищим, свободным и рабам, положено будет начертание на правую руку их или на чело их, и что никому нельзя будет ни покупать, ни продавать, кроме того, кто имеет это начертание, или имя зверя, или число имени его.\" — Откровение 13:16-17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПророчество описывает систему с тремя характеристиками:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУниверсальное применение\u003c/strong\u003e — \"всем, малым и великим\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБиометрическая аутентификация\u003c/strong\u003e — \"начертание на правую руку их или на чело их\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТотальный коммерческий контроль\u003c/strong\u003e — \"никому нельзя будет ни покупать, ни продавать\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCBDC, интегрированный с цифровой идентичностью и развёрнутый в безналичной экономике, выполняет все три с инженерной точностью.\u003c/p\u003e\n\u003cp\u003eВопрос больше не в том, возможна ли такая система. Она строится.\u003c/p\u003e\n\u003cp\u003eВопрос больше не в том, будет ли она развёрнута. Она развёртывается.\u003c/p\u003e\n\u003cp\u003eЕдинственный вопрос, который остаётся, — примете ли вы условия новых денег, когда они потребуют вашего соответствия как цену участия.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/161-CBDC_Chains.mp4\"\u003eЦепи CBDC\u003c/a\u003e — Программируемые деньги, которые контролируют вас\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/229-Digital_Dollar_Dragnet.mp4\"\u003eОблава цифрового доллара\u003c/a\u003e — Облава цифровой валюты\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/cashless-society-trap/?lang=ru\"\u003eЛовушка безналичного общества: Когда наличные исчезают, умирает свобода\u003c/a\u003e — Предпосылочная повестка, которая делает контроль CBDC возможным\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eЦифровой ID: Глобальная тюрьма идентичности\u003c/a\u003e — Слой идентичности, который аутентифицирует транзакции CBDC\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/mark-of-the-beast-digital-id/?lang=ru\"\u003eНачертание зверя и цифровая идентичность\u003c/a\u003e — Пророческая структура для системы биометрической аутентификации\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eДеньги в вашем кармане подчиняются вам. Они идут туда, куда вы их отправляете, покупают то, что вы выбираете, и не задают вопросов. Деньги, которые они строят, подчиняются им. Они идут туда, куда они разрешают, покупают то, что они позволяют, и сообщают обо всём, что вы делаете. Это не улучшение. Это замена — вашего суверенитета их контролем, вашей свободы их кодом, ваших денег их цепями. Не можете служить Богу и маммоне. Но программируемая маммона не даёт вам выбора. Она служит себе.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/finance/\",\"className\":\"category-badge\",\"children\":\"finance\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Цепи CBDC: Программируемы
