0\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНовый Завет не прибыл завершенным. Он не был доставлен ангелом, начертан на золотых пластинах или продиктован Богом в одном сеансе. Он был создан — собран на протяжении веков людьми с конкурирующими теологическими видениями, политическими амбициями и институциональными повестками. Этот процесс создания — самая важная история в христианстве, которую большинство христиан никогда не слышали.\u003c/p\u003e\n\u003cp\u003eГовард Питтман испытал духовное царство из первых рук. Три неба. Демоническая иерархия. Разрушительный процент отказа 97,5. Свидетельство Питтмана подтверждает, что духовная реальность существует — но оно также подтверждает, что институты, заявляющие о представлении этой реальности, терпят катастрофический провал. Девяносто пять процентов служат \"себе\". Каждое слово имеет значение (Матфея 12:36-37). Слова Нового Завета, созданные человеческими руками, несут вес, который институт им присвоил — но являются ли это правильные слова?\u003c/p\u003e\n\u003cp\u003eИезуиты — военная организация Лойолы, \"абсолютная власть\" Наполеона, \"вечное проклятие\" Адамса, мировое управление Тамбурини, отравители Климента XIV — стали самыми яростными защитниками Нового Завета не потому, что он истинен, а потому, что он полезен. Документальный фильм \u003cem\u003eCatholic Confidential\u003c/em\u003e раскрывает их стратегию: инфильтрация \"облаченная в хитрость\", слепое послушание, \"все виды порока\". Новый Завет — самый мощный инструмент иезуитов — текст, легитимизирующий их власть.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eЛожь обманщика — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/35-The_Tree_of_Life.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eДерево жизни — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"фаза-первая-устный-период-30-50-нэ\"\u003eФаза первая: Устный период (30-50 н.э.)\u003c/h2\u003e\n\u003ch3 id=\"нет-письменных-записей\"\u003eНет письменных записей\u003c/h3\u003e\n\u003cp\u003eВ течение первых двух десятилетий после Иисуса не было Нового Завета. Никаких Евангелий. Никаких посланий (о которых мы знаем). Движение существовало полностью через устную передачу — рассказы, рассказываемые и пересказываемые, учения, запоминаемые и повторяемые, опыты, разделяемые от человека к человеку.\u003c/p\u003e\n\u003cp\u003eУстная передача по своей сути ненадежна. Психологические исследования памяти демонстрируют, что свидетельские показания быстро деградируют. Детали добавляются, модифицируются и переставляются с каждым пересказом. После двух десятилетий устной передачи истории, которые в конечном итоге стали Евангелиями, уже были сформированы сообществами, которые их рассказывали — их потребностями, их конфликтами, их теологическими развитиями.\u003c/p\u003e\n\u003cp\u003eЭто не спекуляция. Это наблюдается в самих текстах. Евангелия отражают заботы своих сообществ: сообщество Марка сталкивалось с преследованием (отсюда акцент на страдании). Сообщество Матфея находилось в конфликте с синагогой (отсюда акцент на еврейском законе). Сообщество Луки включало язычников (отсюда акцент на включении). Тексты не являются чистой исторической памятью. Они являются общинными документами, сформированными общинными потребностями.\u003c/p\u003e\n\u003ch3 id=\"проблема-разнообразия\"\u003eПроблема разнообразия\u003c/h3\u003e\n\u003cp\u003eВ течение этого устного периода христианство не было одним движением. Их было много. Сообщества Павла понимали Иисуса иначе, чем сообщество Иакова в Иерусалиме. Иоанновское сообщество понимало Иисуса иначе, чем все они. Гностические сообщества, которые, похоже, столь же древние, как и любая другая форма христианства, понимали Иисуса способами, которые позднейший институт объявит еретическими.\u003c/p\u003e\n\u003cp\u003eВ первые десятилетия не было православия. Было только разнообразие — разнообразие веры, практики и интерпретации, которое институциональная церковь потратит века, пытаясь устранить. Новый Завет был главным инструментом этого устранения: определяя, какие тексты авторитетны, институт определил, какая версия христианства истинна, а какая — ересь.\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует на Substack (agent131711.substack.com), как это разнообразие было систематически стерто из исторической записи, оставляя большинство христиан с впечатлением, что всегда было одно истинное христианство и различные ереси. Реальность противоположна: было много христианств, и то, которое победило, сделало это через политическую власть, а не теологическую истину.\u003c/p\u003e\n\u003ch2 id=\"фаза-вторая-письма-павла-50-65-нэ\"\u003eФаза вторая: Письма Павла (50-65 н.э.)\u003c/h2\u003e\n\u003ch3 id=\"первые-письменные-документы\"\u003eПервые письменные документы\u003c/h3\u003e\n\u003cp\u003eПодлинные письма Павла — самые ранние письменные документы в Новом Завете — раньше, чем любое Евангелие. Это означает, что первая письменная теология христианства была основана не на историях об Иисусе, а на интерпретации Павлом значения Иисуса.\u003c/p\u003e\n\u003cp\u003eПавел никогда не встречал Иисуса при его жизни. Он увидел видение на дороге в Дамаск. Его понимание христианства было основано не на свидетельском опыте учения Иисуса, а на его собственных визионерских встречах и теологическом рассуждении. Христианство, которое проповедовал Павел — сосредоточенное на вере, благодати и духовном значении смерти и воскресения — это другое животное от христианства самого Иисуса, которое сосредоточивалось на Царстве Божьем, этическом поведении и социальной справедливости.\u003c/p\u003e\n\u003cp\u003eЭто различие решающее. Новый Завет содержит две разные религии, неуклюже слитые в одну: религию Иисуса (найденную в основном в синоптических Евангелиях) и религию об Иисусе (найденную в основном в письмах Павла). Институциональная церковь, находящаяся под влиянием теологии Павла, выбрала религию об Иисусе. Иезуиты, которые построили свою власть на институциональной доктрине, а не на прямом этическом учении, имели все причины предпочесть версию Павла.\u003c/p\u003e\n\u003ch3 id=\"псевдоэпиграфические-письма\"\u003eПсевдоэпиграфические письма\u003c/h3\u003e\n\u003cp\u003eКак обсуждалось в Части 4, примерно половина писем, приписываемых Павлу, не была написана им. Ефесянам, Колоссянам, 2 Фессалоникийцам, 1 и 2 Тимофею и Титу считаются псевдоэпиграфическими основной наукой. Эти письма были написаны более поздними авторами, которые использовали имя Павла, чтобы придать своей собственной теологии апостольскую власть.\u003c/p\u003e\n\u003cp\u003eЭто была принятая практика в древнем мире, но это также обман. Новый Завет содержит тексты, которые приписываются кому-то, кто их не писал. Это не незначительная проблема — это означает, что Новый Завет содержит подделки. Доброжелательные подделки, возможно, по древним стандартам. Но подделки тем не менее.\u003c/p\u003e\n\u003cp\u003eИнститут, который включил эти тексты в канон, знал — или должен был знать — что они не подлинно павловские. Включая их и приписывая их Павлу, члены совета, которые собрали канон, стали соучастниками обмана. И иезуиты, которые защищают этот канон веками, продолжают соучастие.\u003c/p\u003e\n\u003ch2 id=\"фаза-третья-евангелия-70-100-нэ\"\u003eФаза третья: Евангелия (70-100 н.э.)\u003c/h2\u003e\n\u003ch3 id=\"марк-шаблон\"\u003eМарк: Шаблон\u003c/h3\u003e\n\u003cp\u003eМарк, написанный около 70 н.э. во время или сразу после разрушения иерусалимского храма, был первым Евангелием. Он представляет Иисуса как страдающего мессию — фигуру, чья личность секретна, чьи чудеса непоняты, и чья смерть — кульминация нарратива. Марк заканчивается резко на 16:8 с женщинами, бегущими из пустой гробницы в страхе. Никаких явлений воскресения.\u003c/p\u003e\n\u003cp\u003eЭто изначальное христианство: история страдания, секретности и неоднозначного конца. Это не триумфальное, институциональное христианство, которое построит позднейшая церковь. Евангелие Марка, если бы оно осталось единственным Евангелием, произвело бы очень другую религию.\u003c/p\u003e\n\u003ch3 id=\"матфей-и-лука-расширения\"\u003eМатфей и Лука: Расширения\u003c/h3\u003e\n\u003cp\u003eМатфей и Лука, написанные через 10-20 лет после Марка, оба использовали Марка как шаблон и расширили его. Они добавили нарративы рождения (отсутствующие в Марке), расширили учебный материал (Нагорная проповедь, притчи), явления воскресения (отсутствующие в оригинальном Марке) и родословные, прослеживающие родословную Иисуса до Авраама (Матфей) или Адама (Лука).\u003c/p\u003e\n\u003cp\u003eЭти добавления теологические, а не исторические. Нарративы рождения в Матфее и Луке противоречат друг другу практически в каждой детали. Родословные несовместимы. Явления воскресения описывают разные события в разных местах. Эти тексты были написаны не для предоставления исторической информации. Они были написаны для служения теологическим целям — для установления полномочий Иисуса способами, которых не было у Марка.\u003c/p\u003e\n\u003ch3 id=\"иоанн-теологическая-революция\"\u003eИоанн: Теологическая революция\u003c/h3\u003e\n\u003cp\u003eИоанн, написанный около 90-100 н.э., представляет Иисуса настолько отличного от синоптических Евангелий, что ученые веками обсуждали, как их примирить. В Иоанне Иисус — божественное Слово, ставшее плотью, существующее с до творения. Он говорит длинными теологическими рассуждениями, а не короткими притчами. Он совершает знамения, а не чудеса. Он моет ноги, а не преломляет хлеб на Тайной вечере.\u003c/p\u003e\n\u003cp\u003eЕвангелие Иоанна — это теология, а не биография. Оно было написано сообществом, которое развило свое понимание Иисуса далеко за пределы изначальной устной традиции. Включение его в тот же канон, что и Марк, Матфей и Лука, создает впечатление единого нарратива, когда реальность — это теологическая эволюция, охватывающая 30 лет и множественные сообщества.\u003c/p\u003e\n\u003ch2 id=\"фаза-четвертая-войны-канонов-100-400-нэ\"\u003eФаза четвертая: Войны канонов (100-400 н.э.)\u003c/h2\u003e\n\u003ch3 id=\"борьба-за-православие\"\u003eБорьба за православие\u003c/h3\u003e\n\u003cp\u003eВторой-четвертый века были периодом интенсивного конфликта о том, какие тексты будут авторитетными и какая версия христианства восторжествует. Основными игроками были:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПрото-православные\u003c/strong\u003e: Сообщества, которые в конечном итоге станут Католической церковью. Они отдавали предпочтение текстам, которые поддерживали институциональную власть, апостольскую преемственность и возникающую кредальную рамку.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГностики\u003c/strong\u003e: Сообщества, которые подчеркивали прямое духовное знание (гнозис) над институциональной властью. Они создали десятки текстов — евангелий, апокалипсисов, диалогов — которые представляли радикально иные понимания Иисуса, творения и спасения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМаркиониты\u003c/strong\u003e: Последователи Маркиона (ок. 85-160 н.э.), который полностью отвергал Ветхий Завет и принимал только модифицированную версию Луки и десять писем Павла. Маркион был первым человеком, предложившим христианский канон — и прото-православные создали свой собственный канон частично в ответ на его.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМонтанисты\u003c/strong\u003e: Харизматические сообщества, которые верили в продолжающееся пророчество и откровение. Их утверждение, что новое писание все еще производится, угрожало прото-православному проекту закрытия канона.\u003c/p\u003e\n\u003cp\u003eПрото-православные победили — не через превосходную теологию, а через превосходную организацию, политические союзы (особенно с императором Константином после 312 н.э.) и готовность использовать насилие против конкурентов. Иезуиты позже унаследуют и усовершенствуют эти методы.\u003c/p\u003e\n\u003ch3 id=\"влияние-константина\"\u003eВлияние Константина\u003c/h3\u003e\n\u003cp\u003eНикейский собор (325 н.э.), созванный императором Константином, был первой попыткой стандартизировать христианскую доктрину. Хотя собор не установил прямо канон Нового Завета, он создал институциональные рамки, в которых канон будет установлен: централизованная власть (император и епископы), механизм для обеспечения православия (кредо) и прецедент для исключения инакомыслящих (осуждение арианства).\u003c/p\u003e\n\u003cp\u003eКонстантин не был незаинтересованным искателем истины. Ему нужна была единая религия для объединения своей империи. Ему было все равно, какая версия христианства победит, только чтобы одна версия победила, а другие были подавлены. Канон Нового Завета был, частично, продуктом этой политической потребности — коллекция текстов, которая поддерживала версию христианства, служившую имперскому единству.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана раскрывает, что духовное царство ничего не заботит политическое единство. Процент отказа 97,5 включает тех, кто верно следовал имперской религии — религии, собранной соборами Константина, защищаемой иезуитами и практикуемой миллиардами. Если сама религия была скомпрометирована с самого начала, отказ неизбежен.\u003c/p\u003e\n\u003ch2 id=\"последствия\"\u003eПоследствия\u003c/h2\u003e\n\u003ch3 id=\"ваша-библия--политический-документ\"\u003eВаша Библия — политический документ\u003c/h3\u003e\n\u003cp\u003eЭто не означает, что ваша Библия не содержит истины. Это означает, что ваша Библия также является политическим документом — собранным через политические процессы, защищаемым политическими институтами и служащим политическим целям. Истина, которую она содержит, была отфильтрована через века институционального редактирования, и институт, который проводил фильтрацию, имел мотивы помимо правдоговорения.\u003c/p\u003e\n\u003cp\u003eИезуиты продолжают эту фильтрацию сегодня. Их университеты обучают ученых, которые защищают канон. Их издательства производят комментарии, которые его интерпретируют. Их теология формирует семинарии, которые обучают пасторов, которые его преподают. Вся цепочка передачи — от древнего писца до современной кафедры — проходит через институты, сформированные иезуитской логикой.\u003c/p\u003e\n\u003ch3 id=\"что-делает-честный-читатель\"\u003eЧто делает честный читатель\u003c/h3\u003e\n\u003cp\u003eЧестный читатель признает историю создания Нового Завета и читает соответственно. Они не отвергают текст, но они также не относятся к нему как к монолитному божественному документу. Они читают каждую книгу в ее историческом контексте, с осознанием повестки автора, потребностей сообщества и институционального процесса, который включил ее в канон.\u003c/p\u003e\n\u003cp\u003eЭто то, что Павел имел в виду под \"испытывайте все\". Это то, что моделировали верийцы. И это то, чего не смогли сделать 97,5 процента — они приняли версию института без экспертизы, и это стоило им всего.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — The suppressed history of New Testament construction\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Spiritual reality versus institutional religion\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit role in controlling the biblical text\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/35-The_Tree_of_Life.mp4\"\u003eThe Tree of Life\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/27-The_Promise_of_Salvation.mp4\"\u003eThe Promise of Salvation\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/83-Ancient_Documents.mp4\"\u003eAncient Documents\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u00
