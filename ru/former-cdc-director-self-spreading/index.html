ся язвам её\" — Откровение 18:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКогда лидер стражников поворачивается и даёт показания против города, который он был обязан защищать, свидетельство имеет необычный вес. Роберт Редфилд служил директором Центров контроля и профилактики заболеваний с 2018 по 2021 год — агентство, ответственное за защиту американцев от инфекционных заболеваний. Он был стражником на стене во время самого значительного события общественного здравоохранения века.\u003c/p\u003e\n\u003cp\u003eТеперь страж говорит. Его заявления о COVID-19 как о потенциальной самораспространяющейся вакцине не исходят из маргин. Они исходят от человека, который занимал высочайший пост надзора за болезнями в Соединённых Штатах во время самой пандемии. Когда бывший директор CDC предполагает, что COVID-19 может быть инженерной самораспространяющейся вакциной, значение переорганизирует всё, что публика была рассказана о пандемии.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"заявления-редфилда\"\u003eЗаявления Редфилда\u003c/h2\u003e\n\u003ch3 id=\"что-сказал-бывший-директор-cdc\"\u003eЧто сказал бывший директор CDC\u003c/h3\u003e\n\u003cp\u003eДоктор Роберт Редфилд, вирусолог по обучению и директор CDC во время первоначальной вспышки COVID-19, сделал несколько заявлений, которые в совокупности рисуют картину радикально отличающуюся от официального нарратива пандемии:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПроисхождение лаборатории:\u003c/strong\u003e Редфилд публично и неоднократно заявил, что он верит, SARS-CoV-2 появился в Институте вирусологии Ухани — не из события естественного пролива с рынка, а из инженерного патогена. Он заявил, что характеристики вируса — особенно его немедленная высокая трансмиссивность человеку — более совместимы с инженерным патогеном, чем естественным зоонотическим появлением.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсследование функции прироста:\u003c/strong\u003e Редфилд признал, что исследование функции прироста — преднамеренное улучшение способностей патогена — проводилось в Институте вирусологии Ухани с финансированием, которое прошло через американские государственные каналы, специально через гранты NIH EcoHealth Alliance.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонцепция самораспространяющейся вакцины:\u003c/strong\u003e Наиболее значительно, Редфилд сделал заявления, которые рамка COVID-19 сама потенциально функционирует как самораспространяющаяся вакцина — инженерный патоген, разработанный распространяться через популяцию, вызывая иммунные ответы, которые могли бы служить де facto вакцинацией против будущих, более смертоносных штаммов.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"значимость-источника\"\u003eЗначимость источника\u003c/h2\u003e\n\u003cp\u003eКогда исследователь заговора делает эти требования, они отклоняются. Когда бывший директор CDC делает эти требования, институциональная рамка дрожит. Редфилд — не посторонний. Он занимал одну из самых чувствительных позиций в американском государственном аппарате здравоохранения. У него был доступ к классифицированным брифингам разведки, внутренним данным CDC и прямому общению с военными и агентствами разведки относительно происхождения пандемии.\u003c/p\u003e\n\u003cp\u003eЕго готовность говорить предполагает либо:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eИстина слишком значительна, чтобы подавлять неопределённо\u003c/li\u003e\n\u003cli\u003eИнституциональные фракции ломают ряды\u003c/li\u003e\n\u003cli\u003eНарратив намеренно сдвигается по стратегическим причинам\u003c/li\u003e\n\u003cli\u003eВсё из вышеперечисленного\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"технология-самораспространяющейся-вакцины--опубликованная-наука\"\u003eТехнология самораспространяющейся вакцины — опубликованная наука\u003c/h2\u003e\n\u003cp\u003eРедфилд сделал заявления в рамках задокументированной рамки исследования самораспространяющейся вакцины. Технология самораспространяющейся вакцины была разработана на протяжении прошлых двух десятилетий через сеть программ, финансируемых государством.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПрограмма PREEMPT DARPA (2017-настоящее время):\u003c/strong\u003e Программа предотвращения вновь возникающих патогенных угроз финансирует разработку \"вмешательств, которые могут быть нацелены на резервуары животных, чтобы предотвратить пролив опасных патогенов людям\". Вмешательства включают трансмиссивные вакцины — вакцины, которые распространяются от животного к животному через естественную трансмиссию.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОтчёт Johns Hopkins Self-Spreading Vaccines (2018):\u003c/strong\u003e Редфилд выделил отчёт Johns Hopkins Center for Health Security, который явно обсуждает самораспространяющиеся вакцины как технологию для рассмотрения \"глобальных катастрофических биологических рисков\". Отчёт обсуждает как преимущества, так и риски вакцин, которые передаются от человека к человеку.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"конвергенция-доказательств\"\u003eКонвергенция доказательств\u003c/h2\u003e\n\u003ch3 id=\"множественные-линии-указывающие-в-одном-направлении\"\u003eМножественные линии, указывающие в одном направлении\u003c/h3\u003e\n\u003cp\u003eДоказательства, поддерживающие формирование Редфилда, сходятся из множественных независимых источников:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСайт расщепления фурина:\u003c/strong\u003e SARS-CoV-2 содержит сайт расщепления фурина, который никогда не был найден ни в одном естественно возникающем коронавирусе, связанном SARS. Эта особенность резко улучшает способность вируса заражать клетки человека. Сайт расщепления фурина, однако, является стандартной особенностью инженерных патогенов и хорошо документированной модификацией функции прироста.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНемедленная трансмиссивность человеку:\u003c/strong\u003e Естественные зоонотические вирусы обычно требуют нескольких событий адаптации до того, как они смогут эффективно передаваться между людьми. SARS-CoV-2 появился уже оптимизирован для человеческой трансмиссии — совместимо с лабораторной адаптацией через последовательный проход в гуманизированных мышей или человеческих клеточных культурах.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейская-рамка-инженерные-язвы\"\u003eБиблейская рамка: Инженерные язвы\u003c/h2\u003e\n\u003ch3 id=\"язвы-фараона-и-современные-язвы\"\u003eЯзвы Фараона и современные язвы\u003c/h3\u003e\n\u003cp\u003eЯзвы Египта (Исход 7-12) были божественными судами, доставленными нации, которая отказалась освободить людей Божьих. Каждая язва нацеливала конкретного египетского божества.\u003c/p\u003e\n\u003cp\u003eСовременная рамка язвы инвертирована. Вместо того, чтобы Бог отправлял язвы, чтобы освободить Его людей, человеческие учреждения разработали язвы, чтобы поработить популяции — создав страх, который ведёт соответствие, соответствие, которое позволяет инъекцию, и инъекцию, которая модифицирует биологию. Инженерная язва — цепь. Вакцина — замок.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-люди-должны-знать\"\u003eЧто люди должны знать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eБывший директор CDC верит COVID-19 произошёл в лаборатории\u003c/strong\u003e и имеет характеристики, совместимые с инженерным патогеном.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТехнология самораспространяющейся вакцины — опубликованная наука,\u003c/strong\u003e финансируемая DARPA, Johns Hopkins и агентствами американского государства.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПредложение DEFUSE\u003c/strong\u003e описывал вставку сайтов расщепления фурина в коронавирусы летучих мышей и развёртывание аэрозольных вакцин — соответствие характеристик SARS-CoV-2.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПандемия и вакцина могут представлять две фазы\u003c/strong\u003e единой программы биологической модификации.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗаявления Редфилда переносят институциональный вес\u003c/strong\u003e — он был директором CDC во время пандемии и имел доступ к классифицированной разведке.\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eEngineering Contagion\u003c/a\u003e — Инженерия болезни и ответа как одна система\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eVaccine Of The Beast\u003c/a\u003e — Инъекция как часть древней повестки\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eСтраж говорит. Человек, который сидел в кресле директора CDC во время пандемии, указал, что COVID-19 несёт отметки инженерии, и его характеристики совместимы с самораспространяющейся вакциной. Истина оставляет пещеру. \"Нет ничего скрытого, что не было бы открыто; ни тайного, что не было бы известно и не вышло бы наружу\" (Лука 8:17). Свидетельство бывшего стража потверждает то, что кровь уже подтвердила — язва была инженерной, и лечение было запланировано до того, как болезнь была выпущена.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children
