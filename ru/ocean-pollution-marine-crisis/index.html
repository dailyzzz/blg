о это хорошо.\" — Бытие 1:9-10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБог создал моря и назвал их хорошими. Воды были собраны по божественному повелению, океаны были установлены по божественному намерению, и морские экосистемы, которые их заполняют, были разработаны с той же творческой мудростью, что и звёзды. Море не было постфактум. Это была шедевр - обширная, взаимосвязанная система жизни, которая охватывает семьдесят процентов поверхности планеты, генерирует более половины кислорода мира, регулирует глобальную температуру и поддерживает пищевые цепи, которые кормят миллиарды.\u003c/p\u003e\n\u003cp\u003eЧто люди сделали с морями Бога - это акт осквернения в планетарном масштабе. Океаны были обработаны как свалка человечества - бездонный рецептакль для промышленных отходов, сельскохозяйственного стока, радиоактивного эффлюента, пластических обломков и фармацевтического загрязнения. Моря, которые Бог назвал хорошими, систематически отравляются, и последствия каскадируют через каждый экосистем на земле, включая человеческое тело.\u003c/p\u003e\n\u003cp\u003eКак провозглашает трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/97-Rivers_of_Living_Water.mp4\"\u003eРеки Живой Воды\u003c/a\u003e, дизайн Бога - это воды, которые дают жизнь - реки живой воды, текущие с трона Бога, поддерживающие всё творение. Загрязнение океанов - это инверсия этого божественного дизайна: реки смерти, текущие с фабрик и городов людей, загрязняющие всё творение.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"великий-тихоокеанский-мусорный-участок-континент-пластика\"\u003eВеликий Тихоокеанский мусорный участок: Континент Пластика\u003c/h2\u003e\n\u003cp\u003eВеликий Тихоокеанский мусорный участок - это массивное накопление морского мусора - в основном пластик - расположено в Северном Тихоокеанском субтропическом гиру, между Гавайями и Калифорнией. Оценки его размера варьируются, но оно обычно описывается как охватывающее площадь примерно 1,6 миллиона квадратных километров - примерно вдвое больше Техаса или трижды размер Франции.\u003c/p\u003e\n\u003cp\u003eУчасток - это не, как обычно представляется, твёрдый остров видимого пластического мусора. Он состоит в основном из микропластиков - фрагментов меньше пяти миллиметров - взвешенных в столбе воды на различных глубинах. Эти микропластики настолько плотны в некоторых областях, что сама вода была описана как \"пластический суп\". Концентрация микропластиков в участке оценивается в 1,8 триллиона штук, весив примерно 80 000 метрических тонн.\u003c/p\u003e\n\u003cp\u003eНо Великий Тихоокеанский мусорный участок - это только один из пяти основных океанских мусорных участков. Подобные накопления существуют в Северном Атлантике, Южном Атлантике, Южном Тихом океане и Индийском океане гирах. Вместе они представляют загрязнение планетарного масштаба морской среды синтетическими материалами, которые не биодеградируются, которые концентрируют токсичные химические вещества и которые входят в пищевую цепь на каждом уровне.\u003c/p\u003e\n\u003cp\u003eИсточники этого загрязнения пластиком разнообразны: неадекватное управление отходами в прибрежных регионах, промышленный выброс, морские перевозки, рыболовное снаряжение (призрачные сети, заброшенные ловушки, отброшенные линии) и рутинный смыв микропластиков из синтетической одежды, косметики и потребительских товаров через системы сточных вод. Предполагается, что 8-12 миллионов метрических тонн пластика входят в океаны каждый год - примерно эквивалентно сбросу мусорного грузовика пластика в океан каждую минуту.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"микропластики-в-пищевой-цепи-от-планктона-к-обеденному-столу\"\u003eМикропластики в Пищевой Цепи: От Планктона к Обеденному Столу\u003c/h2\u003e\n\u003cp\u003eМикропластики не просто плавают в океане. Они потребляются морскими организмами на каждом уровне пищевой цепи, от микроскопического планктона к верхним хищникам. Это биоаккумуляция означает, что загрязнение пластиком концентрируется по мере движения вверх по пищевой цепи - и на вершине этой пищевой цепи находятся человеческие существа.\u003c/p\u003e\n\u003cp\u003eИсследования обнаружили микропластики в тканях рыб, моллюсков, морских птиц, морских черепах, китов и практически всех морских видов, которые были изучены. Исследование 2021 года, опубликованное в \u003cem\u003eEnvironmental Science \u0026#x26; Technology\u003c/em\u003e, обнаружило микропластики в 100% образцов морской черепахи, протестированных. Исследование 2019 года обнаружило микропластики в 73% глубоководных рыб из Северо-западной Атлантики. Микропластики были найдены в морских осадках на глубинах, превышающих 10 000 метров - в самых глубоких траншеях океана.\u003c/p\u003e\n\u003cp\u003eДля человеческих потребителей морепродуктов последствия прямые. Исследования оценивают, что люди, которые регулярно потребляют моллюсков, потребляют до 11 000 частиц микропластика в год только из моллюсков. Микропластики были обнаружены в коммерческой столовой соли, водопроводной воде, бутилированной воде, пиве, мёде и многих других пищевых продуктах. Исследование 2019 года, заказанное Фондом дикой природы мира, оценило, что средний человек потребляет примерно пять граммов пластика в неделю - примерно вес кредитной карты.\u003c/p\u003e\n\u003cp\u003eПоследствия хронического потребления микропластиков всё ещё изучаются, но предварительные исследования указывают на то, что микропластики могут вызвать воспалительные реакции, клеточное повреждение, окислительный стресс и нарушение эндокринной системы. Микропластики также действуют как переносчики токсичных химических веществ: стойкие органические загрязнители (СОЗ), тяжёлые металлы и эндокринные дисхимические соединения адсорбируются на пластических поверхностях и высвобождаются, когда пластик потребляется живыми организмами.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в нашей статье о \u003ca href=\"/microplastics-everywhere-health/?lang=ru\"\u003eМикропластики Везде\u003c/a\u003e, кризис микропластиков распространяется далеко за пределы океана - он проникнул в воздух, почву, водоснабжение, человеческую кровь, плаценты и грудное молоко.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"фукусима-радиоактивный-океан\"\u003eФукусима: Радиоактивный Океан\u003c/h2\u003e\n\u003cp\u003e11 марта 2011 года землетрясение магнитудой 9,0 и последующее цунами обрушились на атомную электростанцию Фукусима-Дайити в Японии, вызвав катастрофическое плавление трёх ядерных реакторов. Катастрофа высвободила огромные количества радиоактивного материала в Тихий океан - включая цезий-134, цезий-137, стронций-90, тритий и йод-131.\u003c/p\u003e\n\u003cp\u003eВ непосредственном результате примерно 520 000 терабеккеррелей радиоактивного материала были выпущены в атмосферу и океан - сделав Фукусиму наибольшим случайным выпуском радиоактивного материала в океан в истории. Радиоактивная вода продолжала течь из повреждённого объекта в течение лет после первоначальной катастрофы, накапливаясь в более чем 1000 резервуарах хранения на месте завода.\u003c/p\u003e\n\u003cp\u003eВ августе 2023 года Япония начала планируемый выпуск более 1,3 миллиона метрических тонн обработанной радиоактивной сточной воды с объекта Фукусима в Тихий океан - процесс, ожидаемый, займёт примерно 30 лет. Вода была обработана с помощью Advanced Liquid Processing System (ALPS), которая удаляет большинство радиоактивных изотопов, но не может удалить тритий, радиоактивную форму водорода, которая связывается с молекулами воды и не может быть отделена от них.\u003c/p\u003e\n\u003cp\u003eЯпонское правительство и Международное агентство по атомной энергии (МААЕ) утверждают, что уровни трития в выпущенной воде ниже нормативных стандартов и не представляют значительного риска. Но эти уверения оспариваются учёными, организациями рыболовства и соседними странами - особенно Китай, Южная Корея и острова Тихого океана.\u003c/p\u003e\n\u003cp\u003eТритий при включении в молекулы воды может быть абсорбирован морскими организмами и войти в пищевую цепь. Хотя индивидуальное воздействие трития при низких концентрациях может представлять ограниченный риск, совокупный эффект выпуска 1,3 миллиона метрических тонн загрязнённой трием воды в морскую среду, уже напряжённую множественными источниками загрязнения, неизвестен. Никакое исследование не оценивало совокупное воздействие воздействия трития в сочетании с загрязнением микропластиками, загрязнением тяжёлыми металлами и другими факторами стресса, одновременно воздействующими на морские экосистемы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"мёртвые-зоны-где-океан-душит\"\u003eМёртвые Зоны: Где Океан Душит\u003c/h2\u003e\n\u003cp\u003eМёртвые зоны в океане - области воды с уровнями кислорода настолько низкими, что большинство морской жизни не могут выжить - представляют один из наиболее тревожных проявлений загрязнения океана. Количество мёртвых зон во всём мире увеличилось с примерно 10 в 1960 году до более 700 сегодня, с общей затронутой площадью, превышающей 245 000 квадратных километров.\u003c/p\u003e\n\u003cp\u003eПервичная причина мёртвых зон - это загрязнение питательными веществами - особенно избыток азота и фосфора из сельскохозяйственного стока, сброса сточных вод и промышленных отходов. Эти питательные вещества питают взрывной рост водорослей (цветение водорослей), которые затем умирают и разлагаются. Процесс разложения потребляет растворённый кислород, создавая гипоксические условия, которые душат рыб, моллюсков и других морских организмов.\u003c/p\u003e\n\u003cp\u003eМёртвая зона в Мексиканском заливе, созданная питательным стоком из бассейна реки Миссисипи - которая дренирует 41% континентальных Соединённых Штатов - является одной из самых крупных в мире, охватывая до 22 000 квадратных километров в пиковые годы. Удобрения, пестициды и животные отходы из сельскохозяйственного сердца Америки текут вниз Миссисипи и в залив, создавая годовой цикл цветения водорослей, истощения кислорода и морской смерти.\u003c/p\u003e\n\u003cp\u003eМёртвая зона Балтийского моря - это крупнейшая вызванная человеком мёртвая зона в мире, охватывая примерно 70 000 квадратных километров. Десятилетия сельскохозяйственного и промышленного загрязнения от девяти стран, окружающих Балтику, создали стойкие гипоксические условия на больших площадях морского дна.\u003c/p\u003e\n\u003cp\u003eМёртвые зоны - это не просто локальные экологические проблемы. Они представляют систематическое нарушение морского кислородного производства - процесс, от которого зависит вся наземная жизнь. Океан производит более 50% кислорода мира через фотосинтез фитопланктона. Когда мёртвые зоны убивают фитопланктон и нарушают морское кислородное производство, последствия распространяются далеко за пределы затронутых вод.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"фармацевтическое-загрязнение-отравление-океана\"\u003eФармацевтическое Загрязнение: Отравление Океана\u003c/h2\u003e\n\u003cp\u003eВозникающее и в значительной степени неизвестное измерение загрязнения океана - это фармацевтическое загрязнение. Лекарства, потребляемые человеческими популяциями - антидепрессанты, антибиотики, гормоны, обезболивающие, средства химиотерапии - выделяются в моче и фекалиях, проходят через очистные сооружения сточных вод (которые не были разработаны для удаления фармацевтических соединений) и входят в реки, озёра и в конечном итоге в океан.\u003c/p\u003e\n\u003cp\u003eИсследования обнаружили фармацевтические соединения в морских среде по всему миру:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eАнтидепрессанты\u003c/strong\u003e (флуоксетин, сертралин) были обнаружены в тканях рыб и моллюсков в прибрежных водах рядом с центрами населения. Исследования показали, что воздействие антидепрессивных соединений изменяет поведение морских организмов - делая рыб смелее, менее осторожных и более уязвимых для хищничества.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eСинтетические эстрогены\u003c/strong\u003e из противозачаточных таблеток и заместительной гормональной терапии были обнаружены в морской среде и связаны с феминизацией самцовой рыбы - явление, задокументированное в реках и прибрежных водах по всему миру. Самцовая рыба, подвергнутая воздействию эстрогенных соединений, развивает женские репродуктивные характеристики, включая производство яиц в тканях яичек.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eАнтибиотики\u003c/strong\u003e в морской среде способствуют развитию антибиотико-устойчивых бактерий - глобальный кризис здравоохранения, который Всемирная организация здравоохранения определила как одну из величайших угроз для человеческого здоровья. Океан становится питающей средой для антибиотико-устойчивых организмов, питаемых фармацевтическими отходами, которые текут в него из человеческих популяций.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИрония глубока: фармацевтическая промышленность загрязняет океан, который загрязняет морепродукты, которые потребляются самыми популяциями, которые назначены фармацевтических препаратов. Это циклическая система загрязнения, в которой загрязнение течёт из аптеки в туалет в океан на обеденный стол и обратно в тело.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"промышленный-сброс-преступления-под-волнами\"\u003eПромышленный Сброс: Преступления Под Волнами\u003c/h2\u003e\n\u003cp\u003eВ течение десятилетий промышленные отходы были намеренно сброшены в океан под предположением, что размер морей разбавит токсичные материалы до безвредных уровней. Это предположение было катастрофически неправильным.\u003c/p\u003e\n\u003cp\u003eМежду 1940-ми и 1970-ми годами американское военное учреждение сбросило примерно 64 миллиона фунтов химического оружия - включая горчичный газ, нервные агенты и другие токсичные вещества - в дюжины мест океанской утилизации у побережья Атлантики и Тихого океана и в Мексиканском заливе. Эти боеприпасы остаются на дне океана, корродируя и утекая их содержимое в морскую среду.\u003c/p\u003e\n\u003cp\u003eЯдерные отходы были сброшены в океан несколькими странами в течение десятилетий. Советский Союз сбросил радиоактивные отходы, включая целые ядерные реакторы, в Северный Ледовитый океан и Японское море. Соединённые Штаты сбросили радиоактивные отходы в несколько мест у побережья Калифорнии и восточного побережья. Соединённое Королевство сбросило радиоактивные отходы в Атлантический океан. Общее количество радиоактивного материала, сброшенного в мировые океаны, неизвестно, так как многие операции слива были классифицированы или плохо задокументированы.\u003c/p\u003e\n\u003cp\u003eПромышленные химические отходы - включая тяжёлые металлы, ПХД, ДДТ и другие стойкие органические загрязнители - были рутинно сброшены в прибрежные воды фабриками, нефтеочистительными заводами и химическими растениями. Катастрофа залива Минамата в Японии (1956), в которой промышленный сброс ртути вызвал массовое отравление и врождённые дефекты в окружающем населении, - это, возможно, наиболее печально известный пример - но подобное, менее рекламируемое загрязнение произошло на промышленных объектах по всему миру.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в нашей статье о \u003ca href=\"/bee-colony-collapse-food-chain/?lang=ru\"\u003eКоллапс Колонии Пчел и Пищевая Цепь\u003c/a\u003e, загрязнение океанов - это не изолированная экологическая проблема - это фундаментальное нарушение глобальной пищевой цепи, которая соединяет морские экосистемы с наземными экосистемами и в конечном итоге с пищевой цепью человека.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"коллапс-коралловых-рифов-тропические-леса-моря\"\u003eКоллапс Коралловых Рифов: Тропические Леса Моря\u003c/h2\u003e\n\u003cp\u003eКоралловые рифы - часто называемые тропическими лесами моря - поддерживают примерно 25% всех морских видов, несмотря на охват менее 1% морского дна. Они являются одними из наиболее биоразнообразных и продуктивных экосистем на земле, обеспечивая среду обитания, места размножения и источники пищи для тысяч видов.\u003c/p\u003e\n\u003cp\u003eКоралловые рифы по всему миру находятся в кризисе. По оценкам, 50% мировых коралловых рифов были потеряны с 1950 года, и учёные проектируют, что до 90% могут быть потеряны к 2050 году, если текущие тренды продолжатся. Причины включают потепление океана, закисление океана, наложение отложений от прибрежного развития, чрезмерный вылов рыбы и химическое загрязнение.\u003c/p\u003e\n\u003cp\u003eЗакисление океана - увеличение кислотности океана, вызванное абсорбцией углекислого газа из атмосферы - особенно разрушительно для коралла. По мере снижения pH океана, структуры карбоната кальция, которые образуют коралловые скелеты, растворяются, ослабляя существующие рифы и предотвращая новый рост коралла. Темп закисления океана беспрецедентен, по крайней мере, в течение последних 300 миллионов лет.\u003c/p\u003e\n\u003cp\u003eПотеря коралловых рифов была бы катастрофична для морского биоразнообразия, защиты берегов и сотен миллионов людей, которые зависят от экосистем рифов для пищи и средств к существованию. Это также представляло бы разрушение одного из самых величественных созданий Бога - живой архитектуры экстраординарной красоты, сложности и экологической важности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-отражение-море-плачет\"\u003eБиблейское Отражение: Море Плачет\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Его Господа, и Он его сделал: и руки Его основали сухую землю.\" — Псалом 95:5\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eМоре принадлежит Богу. Он создал его. Это его творение, его дело, его область. Когда люди отравляют море пластиком, радиацией, химическими веществами и фармацевтическим загрязнением, они осквернять то, что принадлежит Творцу. Они оскверняют дело его рук.\u003c/p\u003e\n\u003cp\u003eПисание записывает, что творение само стонет под весом человеческого греха (Римлянам 8:22). Умирающие коралловые рифы, душащие мёртвые зоны, рыба с животами, полными пластика, киты, выбрасываемые на берега, загрязнённые промышленными отходами - это стоны творения, которое было подвергнуто тщетности действиями существ, назначенных управлять им.\u003c/p\u003e\n\u003cp\u003eБог дал человечеству господство над рыбой морской (Бытие 1:28). Господство - это не эксплуатация. Это управление - ответственная забота о том, что принадлежит другому. Загрязнение океанов - это окончательный отказ управления: систематическое разрушение экосистемы, вверенной нашему попечению Творцом, который создал её и назвал её хорошей. Море плачет, и его плач достигает ушей Того, кто его создал.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство NDE Говарда Питтмана — Предупреждение Конца Времён, которое Ему Дал Бог\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолический Конфиденциально: Позорные Секреты Иезуитов Разоблачены\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедецид и Фармакея — Колдовство Современной Медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в Подвале Ватикана Может Вас Шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, Пока Читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/351-Broken_Weather.mp4\"\u003eСломанная Погода\u003c/a\u003e — Разрушение окружающей среды и манипулирование погодой\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте Дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/microplastics-everywhere-health/?lang=ru\"\u003eМикропластики Везде\u003c/a\u003e — Кризис микропластиков распространяется за пределы океана на человеческую кровь, плаценты и каждую экосистему на земле\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/bee-colony-collapse-food-chain/?lang=ru\"\u003eКоллапс Колонии Пчел и Пищевая Цепь\u003c/a\u003e — Как загрязнение морских и наземных экосистем угрожает всей глобальной пищевой цепи\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eБог создал моря и назвал их хорошими. Он наполнил их жизнью - от самого мелкого планктона к величайшему киту - и назначил человечество управляющим его морского творения. Что человечество сделало с этим управлением? Мы наполнили моря пластиком, отравили их химическими веществами, облучили их ядерными отходами, задушили их сельскохозяйственным стоком и отравили их фармацевтическим загрязнением. Моря, которые Бог создал, плачут под весом человеческого греха. Творение стонет. Коралл умирает. Рыба наполнена пластиком. И Бог, который создал море и назвал его хорошим, смотрит. Море его, и Он его создал. И то, что Он создал, Он когда-нибудь восстановит - новое небо и новую землю, где море отдаёт своих мёртвых и воды текут чистыми снова.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/food-environment/\",\"className\":\"category-badge\",\"children\":\"food-environment\"}],false]}],[\"$\",\"h1\",null
