ими.\" — Бытие 6:11-12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eРазвращение всех плотей не была метафора, когда Бог говорил это перед потопом, и это не метафора сейчас. Земля развращена — физически, материально, молекулярно. Каждая экосистема на планете загрязнена синтетическими полимерными частицами, которые не существовали до середины 20-го века. Каждое человеческое тело на земле теперь содержит микропластики. Каждый орган был проникнут. Каждый биологический процесс был затронут. Развращение всей плоти больше не является будущим пророчеством или древней памятью — это настоящая, измеримая, научная реальность.\u003c/p\u003e\n\u003cp\u003eНаука теперь раскрывает полный объём того, что микропластики делают с человеческим телом, и картина комплексна в его разрушении. Ни одна система органов не щадится. Ни один биологический процесс не затронут. Синтетические частицы, которые человечество создало и рассеяло в каждый уголок закрытого мира под твердью небесной, возвращаются в тела их создателей, развращая плоть, которую Бог сформировал из пыли земной.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/71-The_Garments_of_Skin.mp4\"\u003eThe Garments of Skin\u003c/a\u003e говорит о физическом покрытии, которое Бог дал человечеству — коже и плоти, теперь насыщенных пластиковыми частицами. \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/95-The_Valley_of_Death.mp4\"\u003eThe Valley of Death\u003c/a\u003e описывает тень, через которую ходит человечество — тень, отбрасываемую токсическим грузом, накапливающимся в каждом теле на земле.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"микропластики-краткий-обзор\"\u003eМикропластики: краткий обзор\u003c/h2\u003e\n\u003cp\u003eМикропластики — это пластические частицы размером менее 5 миллиметров. Нанопластики — это пластические частицы размером менее 1 микрометра (1000 нанометров). Вместе они представляют кризис загрязнения без прецедента в человеческой истории.\u003c/p\u003e\n\u003ch3 id=\"источники-воздействия\"\u003eИсточники воздействия\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПищевая продукция:\u003c/strong\u003e Пластиковая упаковка выщелачивает частицы в пищу, особенно при нагревании. Морепродукты содержат микропластики, поглощённые из загрязнения океана. Сельскохозяйственная почва, загрязнённая пластиковыми отходами, переносит частицы на культуры.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВода:\u003c/strong\u003e Вода в бутылках содержит сотни тысяч наночастиц пластика на литр. Водопроводная вода содержит микропластики, которые проходят через стандартную муниципальную фильтрацию.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВоздух:\u003c/strong\u003e Синтетические текстильные волокна, частицы износа шин и деградирующие пластиковые отходы выпускают микропластики в воздух, который постоянно вдыхается.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСредства личной гигиены:\u003c/strong\u003e Косметика, солнцезащитные кремы, зубная паста и средства по уходу за кожей содержат ингредиенты микропластика (полиэтиленовые микросферы, полимеры из кремния), которые поглощаются через кожу и слизистые оболочки.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМедицинские продукты:\u003c/strong\u003e Внутривенные жидкости, хранящиеся в пластиковых сумках, лекарства в пластиковых капсулах и медицинские устройства из пластика всё способствуют воздействию.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"масштаб-загрязнения\"\u003eМасштаб загрязнения\u003c/h3\u003e\n\u003cp\u003eТекущие оценки предполагают, что люди проглатывают, вдыхают и поглощают приблизительно 5 граммов пластика в неделю — примерно вес кредитной карты. За год это составляет более 250 граммов. На протяжении жизни совокупное воздействие измеряется в килограммах.\u003c/p\u003e\n\u003ch2 id=\"влияние-на-органы-по-одному\"\u003eВлияние на органы по одному\u003c/h2\u003e\n\u003ch3 id=\"сердечно-сосудистая-система\"\u003eСердечно-сосудистая система\u003c/h3\u003e\n\u003cp\u003eИсследование, опубликованное в New England Journal of Medicine в 2024 году, обнаружило, что пациенты с микропластиками, обнаруженными в их бляшке сонной артерии, имели в 4,5 раза выший риск сердечного приступа, инсульта или смерти по сравнению с пациентами без обнаруженных микропластиков. Это нахождение установило, впервые в крупном медицинском журнале, прямую связь между загрязнением микропластиками и сердечно-сосудистой смертностью.\u003c/p\u003e\n\u003cp\u003eМеханизмы включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВоспаление сосудов\u003c/strong\u003e — микропластики запускают воспалительные ответы в стенках кровеносных сосудов, способствуя атеросклерозу\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПовреждение эндотелия\u003c/strong\u003e — прямое физическое и химическое повреждение эндотелиальных клеток, выстилающих кровеносные сосуды\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДеградация качества крови\u003c/strong\u003e — как документирует Анна Михалча, доктор медицины, PhD на своём Substack (\u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e), микропластики способствуют образованию монетных столбиков, повышенной вязкости крови и нарушенной микроциркуляции\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСодействие образованию микросгустков\u003c/strong\u003e — микропластические частицы могут служить центрами зародышеобразования для аномального образования сгустков\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНакопление в сердечной ткани\u003c/strong\u003e — микропластики найдены в сердечной ткани, где они могут нарушить электрическую проводимость и сократительную функцию\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"репродуктивная-система\"\u003eРепродуктивная система\u003c/h3\u003e\n\u003cp\u003eВлияние микропластиков на репродукцию среди самых тревожных находок, с последствиями для будущего человеческой фертильности:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМужская фертильность:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eМикропластики обнаружены в ткани яичек человека и сперме\u003c/li\u003e\n\u003cli\u003eКоличество сперматозоидов снизилось более чем на 50% в западных странах с 1970-х годов — временная шкала, которая коррелирует с экспоненциальным увеличением производства пластика\u003c/li\u003e\n\u003cli\u003eРазрушители эндокринной системы, выщелачиваемые из микропластиков (BPA, фталаты), подавляют производство тестостерона и нарушают сперматогенез\u003c/li\u003e\n\u003cli\u003eИсследования на животных моделях показывают, что воздействие нанопластика снижает мобильность сперматозоидов, увеличивает фрагментацию ДНК и снижает фертильность\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eЖенская фертильность:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eМикропластики обнаружены в ткани яичников и фолликулярной жидкости\u003c/li\u003e\n\u003cli\u003eРазрушители эндокринной системы из пластиков вмешиваются в сигнализацию эстрогена, овуляцию и имплантацию\u003c/li\u003e\n\u003cli\u003eСнижение женской фертильности и увеличение состояний, таких как синдром поликистозных яичников (СПКЯ) и эндометриоз, коррелируют с увеличением пластического воздействия\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eБеременность и развитие плода:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eМикропластики обнаружены в плацентарной ткани на материнской и плодной сторонах\u003c/li\u003e\n\u003cli\u003eНанопластики пересекают плацентарный барьер, подвергая развивающийся плод воздействию\u003c/li\u003e\n\u003cli\u003eПренатальное воздействие пластика связано с изменённым ростом плода, риском преждевременных родов и развитием аномалий\u003c/li\u003e\n\u003cli\u003eМикропластики обнаружены в мекогии (первом стуле), подтверждающей пренатальное воздействие\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"желудочно-кишечная-система\"\u003eЖелудочно-кишечная система\u003c/h3\u003e\n\u003cp\u003eКишечник — основная точка входа для проглоченных микропластиков:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВоспаление кишечника\u003c/strong\u003e — микропластики запускают воспалительные ответы в кишечной оболочке\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение микробиома\u003c/strong\u003e — пластические частицы изменяют состав и функцию микробиома кишечника, который влияет на иммунитет, метаболизм и психическое здоровье\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДырявый кишечник\u003c/strong\u003e — повреждение плотных соединений кишечника, вызванное микропластиками, увеличивает проницаемость кишечника, позволяя бактериям, токсинам и непереваренным частицам пищи проникать в кровоток\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКолоректальный рак\u003c/strong\u003e — хроническое воспаление и нарушение эндокринной системы от воздействия пластика на уровне кишечника может способствовать растущей заболеваемости колоректальным раком, особенно у молодых людей\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"дыхательная-система\"\u003eДыхательная система\u003c/h3\u003e\n\u003cp\u003eВдыхаемые микропластики накапливаются в лёгочной ткани:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВоспаление лёгких\u003c/strong\u003e — постоянные воспалительные ответы на вдыхаемые частицы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСнижение дыхательной функции\u003c/strong\u003e — профессиональные исследования показывают, что рабочие в пластик-интенсивных окружениях имеют пониженную ёмкость лёгких\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЛёгочный фиброз\u003c/strong\u003e — хроническое воздействие пластических частиц может способствовать рубцеванию лёгочной ткани\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРиск рака\u003c/strong\u003e — длительная воспалительная стимуляция и химическое выщелачивание увеличивают риск рака лёгких\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"неврологическая-система\"\u003eНеврологическая система\u003c/h3\u003e\n\u003cp\u003eКак задокументировано в нашей статье о \u003ca href=\"/nano-microplastics-brains/?lang=ru\"\u003eмикропластиках в человеческих мозгах\u003c/a\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eМикропластики накапливаются в ткани мозга в возрастающих количествах\u003c/li\u003e\n\u003cli\u003eНейровоспаление, окислительный стресс и нарушение эндокринной системы в нейральной ткани\u003c/li\u003e\n\u003cli\u003eПотенциальный вклад в нейродегенеративное заболевание через содействие неправильному сворачиванию белков\u003c/li\u003e\n\u003cli\u003eНарушение гематоэнцефалического барьера, позволяющее дополнительным загрязнениям проникнуть\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"иммунная-система\"\u003eИммунная система\u003c/h3\u003e\n\u003cp\u003eМикропластики фундаментально изменяют иммунную функцию:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eХроническая иммунная активация\u003c/strong\u003e — иммунная система постоянно реагирует на пластические частицы, которые она не может устранить, создавая состояние хронического низкоуровневого воспаления\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИммунное подавление\u003c/strong\u003e — парадоксально, хроническая активация приводит к иммунному истощению, снижая способность тела бороться с инфекцией и обнаруживать рак\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАутоиммунитет\u003c/strong\u003e — молекулярная мимикрия между химическими веществами, полученными из пластика, и человеческими белками может запустить аутоиммунные ответы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСнижённый ответ вакцины\u003c/strong\u003e — иронично учитывая, что вакцины часто хранятся в пластиковых контейнерах, дисфункция иммунитета от пластического воздействия может снизить способность тела монтировать иммунные ответы\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"эндокринная-система\"\u003eЭндокринная система\u003c/h3\u003e\n\u003cp\u003eРазрушающие эндокринную систему свойства микропластиков влияют практически на все гормональные системы:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЩитовидная железа\u003c/strong\u003e — пластик-производные химические вещества вмешиваются в синтез гормона щитовидной железы, транспортировку и связывание рецепторов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНадпочечники\u003c/strong\u003e — регулирование кортизола нарушено ксеноэстрогенами и другими разрушителями эндокринной системы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПоджелудочная железа\u003c/strong\u003e — сигнализация инсулина затронута, способствуя метаболическому синдрому и диабету\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРепродуктивные гормоны\u003c/strong\u003e — как детализовано выше, тестостерон, эстроген и связанные гормоны нарушены\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГормон роста\u003c/strong\u003e — функция гипофиза может быть затронута разрушителями эндокринной системы, которые пересекают гематоэнцефалический барьер\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"печень-и-почки\"\u003eПечень и почки\u003c/h3\u003e\n\u003cp\u003eЭти органы несут основной груз попытки отфильтровать и устранить микропластики:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВоспаление печени и фиброз\u003c/strong\u003e — микропластики накапливаются в ткани печени и запускают воспалительные ответы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПовреждение почек\u003c/strong\u003e — нанопластики, проходящие через почечную фильтрацию, вызывают повреждение канальцев\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСнижённая способность дезинтоксикации\u003c/strong\u003e — органы, ответственные за устранение токсинов, сами повреждены токсином, создавая нисходящую спираль\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"синергическая-катастрофа\"\u003eСинергическая катастрофа\u003c/h2\u003e\n\u003cp\u003eПолное влияние микропластиков на здоровье не может быть понято в изоляции. Микропластики взаимодействуют синергически с другими загрязнениями:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eТяжёлые металлы, адсорбированные на поверхностях микропластиков,\u003c/strong\u003e доставляются в ткани при сконцентрированных дозах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСтойкие органические загрязнители\u003c/strong\u003e (ПХБ, диоксины, пестициды) связываются с микропластиками и переносятся в организм\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСамособирающаяся нанотехнология\u003c/strong\u003e, задокументированная доктором Михалча, может взаимодействовать с микропластическими частицами способами, которые полностью не поняты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭлектромагнитное излучение\u003c/strong\u003e от смартфонов и телекоммуникационной инфраструктуры может изменить поведение заряженных пластических частиц в ткани\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЧеловеческое тело не имеет дело с одним токсичным веществом. Оно имеет дело с коктейлем загрязнений, которые взаимодействуют, усиливают и усугубляют эффекты друг друга. Общий грузень больше, чем сумма его частей, и способность тела справляться, как кажется, подавляется.\u003c/p\u003e\n\u003ch2 id=\"развращение-всей-плоти-под-куполом\"\u003eРазвращение всей плоти под куполом\u003c/h2\u003e\n\u003cp\u003eБытие 6:12 описывает развращение всей плоти как условие, которое спровоцировало Божий суд посредством потопа. Развращение было универсально — не ограничено некоторыми организмами или некоторыми регионами, но распространяющееся на всю плоть на земле.\u003c/p\u003e\n\u003cp\u003eЗагрязнение микропластиками современного мира производит в точности это условие. Вся плоть развращена. Микропластики найдены в каждом испытанном виде — от глубоководных организмов до хищных птиц, от сельскохозяйственного скота к дикой жизни. Каждый испытанный человек содержит микропластики. Каждый испытанный орган содержит микропластики. Развращение универсально, и оно происходит под твердью — куполом, описанным в Бытии 1 — который обеспечивает, что ничто, выпущенное в окружающей среде, не убегает.\u003c/p\u003e\n\u003cp\u003eТвердь — \u003cem\u003eraqia\u003c/em\u003e, бита-наружу расширенность, прочная как отлитое металлическое зеркало (Иов 37:18) — это граница закрытой системы, в которой живёт человечество. Под этим куполом пластик, произведённый человеческой цивилизацией, циклирует без конца через биосферу: производится, используется, выбрасывается, деградирует во фрагменты, проглатывается, выделяется, переглатывается, накапливаясь поколение за поколением без пути выхода.\u003c/p\u003e\n\u003cp\u003eПадшие ангелы, заключённые под этим куполом, наблюдают развращение с удовлетворением. Они не могут напрямую развратить ДНК человека, как они сделали в Бытии 6 (хотя нанотехнология, задокументированная доктором Михалча, может представлять современный эквивалент). Но они могут работать через человеческие системы для производства и распределения материалов, которые развращают каждое тело на земле. Пластик — их идеальное оружие: вездесущее, стойкое, проникающее и разрушающее эндокринную систему — атакующее в точности гормональные системы, которые управляют воспроизведением, продолжением человеческого вида, созданного по образу Божию.\u003c/p\u003e\n\u003ch2 id=\"защитные-меры\"\u003eЗащитные меры\u003c/h2\u003e\n\u003cp\u003eХотя полное избежание микропластиков невозможно в современной среде, значительное сокращение достижимо:\u003c/p\u003e\n\u003ch3 id=\"снизьте-воздействие\"\u003eСнизьте воздействие\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eИсключите пластиковые пищевые контейнеры — используйте стекло, нержавеющую сталь, керамику\u003c/li\u003e\n\u003cli\u003eНикогда не нагревайте пищу в пластике (микроволновая печь, посудомойка)\u003c/li\u003e\n\u003cli\u003eОтфильтруйте воду с обратным осмосом или фильтрами высокого качества на гравитации\u003c/li\u003e\n\u003cli\u003eВыберите натуральные текстильные волокна для одежды\u003c/li\u003e\n\u003cli\u003eИзбегайте пластик-упакованные переработанные продукты\u003c/li\u003e\n\u003cli\u003eИспользуйте натуральные средства личной гигиены\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"поддержка-устранения\"\u003eПоддержка устранения\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eДиета, богатая волокном для связывания и устранения пластиков через пищеварительный тракт\u003c/li\u003e\n\u003cli\u003eПериодический пост для поддержки аутофагии\u003c/li\u003e\n\u003cli\u003eИнфракрасная сауна для улучшенного устранения через пот\u003c/li\u003e\n\u003cli\u003eЭДТА хелирование для решения сопутствующего загрязнения тяжелыми металлами\u003c/li\u003e\n\u003cli\u003eХлорелла и активированный уголь как связывающие агенты\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"поддержка-функции-органов\"\u003eПоддержка функции органов\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eПоддержка печени: расторопша, NAC, глутатион\u003c/li\u003e\n\u003cli\u003eПоддержка почек: адекватная гидратация чистой водой\u003c/li\u003e\n\u003cli\u003eПоддержка кишечника: пробиотики, ферментированные продукты, костный бульон\u003c/li\u003e\n\u003cli\u003eПоддержка мозга: жирные кислоты омега-3, куркумин, львиная грива\u003c/li\u003e\n\u003cli\u003eПоддержка иммунитета: витамин C, витамин D, цинк, селен\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"ссылки-на-источники\"\u003eСсылки на источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMarfella R, et al. \"Microplastics and Nanoplastics in Atheromas and Cardiovascular Events.\" New England Journal of Medicine, 2024\u003c/li\u003e\n\u003cli\u003eAna Mihalcea, MD, PhD — Research on environmental contamination and blood: \u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eRagusa A, et al. \"Plasticena: First evidence of microplastics in human placenta.\" Environment International, 2021\u003c/li\u003e\n\u003cli\u003eYan Z, et al
