что хотело бы умереть, ибо я не нахожу, чтобы дела твои были полны пред Богом моим. Вспомни же, как ты принял и слышал, и соблюдай и покайся. Если же не будешь бодрствовать, то Я найду на тебя, как вор, и ты не узнаешь, в который час найду на тебя.\"\u003c/em\u003e — Откровение 3:1-3\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЦерковь Сардиса. У неё было имя, будто жива — репутация, идентичность, общественный образ духовной активности. Здания, программы, влияние, видимость. Для каждого внешнего наблюдателя, церковь в Сардисе была живой. Активной. Функционирующей. Установленной.\u003c/p\u003e\n\u003cp\u003eИ Иисус сказал, что она была мёртва.\u003c/p\u003e\n\u003cp\u003eНе боровшейся. Не приходившей в упадок. Не нуждающейся в реформе. МЁРТВОЙ. Разрыв между самовосприятием Сардиса и оценкой Христа был полным. Церковь считала себя живой. Христос сказал, что она мёртва. Не было середины между этими двумя оценками. Одна была взглядом церкви на себя. Другая была взглядом Бога на церковь. И они были диаметрально противоположны.\u003c/p\u003e\n\u003cp\u003eЭто состояние современной церкви. И три независимых свидетеля — с трёх совершенно разных точек зрения — теперь подтвердили это с разрушительной согласованностью.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/79-Engineers_and_Believers.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eEngineers and Believers — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейский-стандарт-два-или-три-свидетеля\"\u003eБиблейский стандарт: два или три свидетеля\u003c/h2\u003e\n\u003ch3 id=\"установление-истины\"\u003eУстановление истины\u003c/h3\u003e\n\u003cp\u003eПринцип множественных свидетелей является фундаментальным для библейской юриспруденции. \"Одного свидетеля недостаточно против какого-либо человека за какой-либо грех или за какое-либо преступление: при словах двух или трёх свидетелей состоится дело\" (Второзаконие 19:15). Иисус подтвердил этот принцип: \"При словах двух или трёх свидетелей устанавливается всякое слово\" (Матфей 18:16). Павел ссылался на него: \"При словах двух или трёх свидетелей состоится дело\" (2 Коринфянам 13:1).\u003c/p\u003e\n\u003cp\u003eЭто не просто юридическая процедура. Это божественный принцип для установления истины. Бог не полагается на единое свидетельство для осуждения. Он предоставляет множественные, независимые свидетельства, чья сходящаяся показания устанавливают дело за пределами разумного сомнения.\u003c/p\u003e\n\u003cp\u003eУ нас теперь есть три свидетеля. Три независимых источника, с трёх совершенно разных перспектив, выносящие одно и то же заключение о современной церкви. Дело установлено. Доказательства подавляющие. Церковь спит — и три свидетеля подняли тревогу.\u003c/p\u003e\n\u003ch2 id=\"свидетель-первый-хоуард-питтман--вид-с-трона-бога\"\u003eСвидетель первый: Хоуард Питтман — вид с трона Бога\u003c/h2\u003e\n\u003ch3 id=\"крещенский-служитель-который-умер-и-стал-перед-богом\"\u003eКрещенский служитель, который умер и стал перед Богом\u003c/h3\u003e\n\u003cp\u003eХоуард Питтман служил крещенским служителем тридцать пять лет. Он был не маргинальной фигурой. Он был не духовным новичком. Он был квалифицированным, опытным, основным протестантским служителем, который посвятил свою жизнь служению Богу внутри институциональной церкви.\u003c/p\u003e\n\u003cp\u003eЗатем он умер. Его физическое тело перестало функционировать. И его дух стал перед троном Бога.\u003c/p\u003e\n\u003cp\u003eЧто Бог показал ему, было не утешительным. Это было катастрофическим.\u003c/p\u003e\n\u003ch3 id=\"975-отказ-верующих\"\u003e97,5% отказ верующих\u003c/h3\u003e\n\u003cp\u003eБог открыл Питтману, что 97,5% исповедующих себя христиан будут отклонены. Не язычников. Не атеистов. Не людей, которые никогда не слышали евангелие. ИСПОВЕДУЮЩИХ СЕБЯ ХРИСТИАН. Людей, которые называют себя верующими. Людей, которые посещают церковь. Людей, которые читают Библию. Людей, которые молятся (как бы кратко). Людей, которые считали себя спасёнными.\u003c/p\u003e\n\u003cp\u003e97,5% из них услышат: \"Я никогда не знал вас\" (Матфей 7:23).\u003c/p\u003e\n\u003cp\u003eПричина была не деталь. Это было не неудача выполнить правильные ритуалы или утвердить правильные доктрины. Причина была сказана ясно: \"Они никогда не сделали Меня Господом.\" Они приняли Иисуса как Спасителя — бесплатный дар, страховку от огня, билет в рай — но они никогда не подчинили Ему как Господу. Они никогда не отдали свою волю. Они никогда не умерли своей сущности. Они сохраняли контроль над своей жизнью, утверждая, что следуют Тому, кто требует полного самопожертвования.\u003c/p\u003e\n\u003cp\u003eДевяносто пять процентов этих отклонённых христиан служили \"я\". Они использовали христианство для служения своим целям — комфорту, общине, социальному статусу, эмоциональной безопасности, моральной идентичности — вместо того, чтобы покориться целям Христа. Их христианство было потребительским продуктом, а не договорным отношением.\u003c/p\u003e\n\u003ch3 id=\"плацебо\"\u003eПлацебо\u003c/h3\u003e\n\u003cp\u003eБог описал стратегию сатаны одним словом: ПЛАЦЕБО. Плацебо — это вещество, которое не имеет терапевтического эффекта, но дано пациенту, который верит, что это лекарство. Пациент чувствует себя лучше — не потому, что вещество работает, а потому, что пациент верит, что оно работает. Ощущение исцеления заменяет фактическое исцеление. Чувство здоровья маскирует реальность болезни.\u003c/p\u003e\n\u003cp\u003eСатана администрирует плацебо-религию. Она похожа на христианство. Она звучит как христианство. Она использует христианский словарь, христианскую музыку, христианские здания и христианские Библии. Но она не имеет духовной силы. Она не производит трансформацию. Она не соединяет душу с Богом. Она производит ОЩУЩЕНИЕ спасения без РЕАЛЬНОСТИ спасения.\u003c/p\u003e\n\u003cp\u003eОни могут это говорить. Они могут это преподавать. Они могут это проповедовать. Но они не могут это ЖИТЬ. Потому что плацебо не работает. Оно никогда не было разработано, чтобы работать. Оно было разработано, чтобы помешать пациенту искать фактическое лекарство. И оно преуспевает — в 97,5% случаев.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЦерковь думает, что она спасена. Она не спасена.\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 id=\"свидетель-второй-catholic-confidential--вид-инфильтраторов\"\u003eСвидетель второй: Catholic Confidential — вид инфильтраторов\u003c/h2\u003e\n\u003ch3 id=\"орден-иезуитов\"\u003eОрден иезуитов\u003c/h3\u003e\n\u003cp\u003eДокументальный фильм \u003cem\u003eCatholic Confidential\u003c/em\u003e раскрывает инфильтрацию христианства иезуитами с перспективы тех, кто спланировал и выполнил его. Это не теория заговора. Это документированная история, подтвержденная собственными записями иезуитов, их собственными конституциями и свидетельствами тех, кто изучал или отступил от ордена.\u003c/p\u003e\n\u003cp\u003eОбщество Иисуса — иезуиты — было основано в 1540 году Игнатием Лойолой с конкретной военной структурой и конкретной целью: \"универсальная духовная и мирская монархия.\" Не просто духовная власть. Мирская власть. Полный контроль как духовной, так и материальной сфер человеческого существования.\u003c/p\u003e\n\u003ch3 id=\"инфильтрация-замаскирована-хитростью\"\u003eИнфильтрация \"замаскирована хитростью\"\u003c/h3\u003e\n\u003cp\u003eИезуиты не достигли своей цели через открытую войну. Они достигли её через инфильтрацию. Они вложили себя в каждое учреждение, которое формирует человеческую мысль и поведение — \"замаскированные как художники, издатели, писатели, школьные учителя.\" Они вошли в протестантские семинарии. Они влияли на протестантскую теологию. Они сформировали протестантскую практику. Они расположили своих агентов в каждой деноминации, каждом университете, каждой медиа-организации и каждом правительстве.\u003c/p\u003e\n\u003cp\u003eМасштаб этой инфильтрации всеохватывающий. От первого иезуитского папы до богословия, преподаваемого в протестантских семинариях, иезуитское влияние пронизывает христианство на каждом уровне. Доктрины, которые большинство христиан принимает как библейскую истину, были отфильтрованы через иезуитское богословие. Практики, которые большинство церквей следуют, были сформированы иезуитским влиянием. Институциональные структуры, которые управляют жизнью церкви, отражают иезуитские организационные принципы.\u003c/p\u003e\n\u003ch3 id=\"абсолютное-послушание\"\u003eАбсолютное послушание\u003c/h3\u003e\n\u003cp\u003eОтличительная черта иезуитского ордена — абсолютное, безусловное послушание. Конституции иезуитов требуют послушание, которое превосходит разум, совесть и даже восприятие: \"Я поверю, что белое чёрно, если иерархическая церковь так это определяет.\" Это не образное выражение. Это буквальное требование ордена. Иезуит будет отрицать свидетельство своих собственных органов чувств, если его руководители этого требуют.\u003c/p\u003e\n\u003cp\u003eТакой уровень послушания производит агентов, которые будут выполнять любой приказ без вопросов. Это производит инфильтрационную силу, которая совершенно дисциплинирована, совершенно скоординирована и совершенно преданна своей миссии — независимо от того, что эта миссия требует. Когда такой орден поручен инфильтрировать христианство, результат не частичный или поверхностный. Это полный.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЦерковь думает, что она независима. Она не независима.\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 id=\"свидетель-третий-джон-рамирес--вид-врага\"\u003eСвидетель третий: Джон Рамирес — вид врага\u003c/h2\u003e\n\u003ch3 id=\"отступник-демонопоклонства-который-подтверждает-что-церковь-беззащитна\"\u003eОтступник демонопоклонства, который подтверждает, что церковь беззащитна\u003c/h3\u003e\n\u003cp\u003eДжон Рамирес служил дьяволу более двадцати пяти лет. Он был высокопоставленным оперативником в царстве тьмы, обучен мастерами-ведьмами, наделён пятью духами-принципальностями, один из трёх человек в Америке, обладающий демонической книгой, подписанной дьяволом. Он выполнял задачи против христиан, церквей и семей.\u003c/p\u003e\n\u003cp\u003eС этой позиции он наблюдал церковь. И его оценка разрушительна.\u003c/p\u003e\n\u003ch3 id=\"большинство-христиан-не-могут-молиться-один-час\"\u003eБольшинство христиан не могут молиться один час\u003c/h3\u003e\n\u003cp\u003eКогда Рамирес молился дьяволу всю ночь — устойчивое, сосредоточенное, интенсивное духовное общение — большинство христиан не могли поддерживать один час молитвы. Их молитвенная жизнь была спорадической, поверхностной и недисциплинированной. У них не было практики поста. У них не было подлинного духовного общения с Богом.\u003c/p\u003e\n\u003cp\u003eИисус попросил своих ближайших учеников молиться с ним один час и они заснули (Матфей 26:40). Две тысячи лет спустя, церковь всё ещё спит. Враг бодрствует. Враг молится. Враг развёртывает духовное оружие против церкви каждую ночь. И церковь не может справиться с шестьюдесятью минутами молитвы.\u003c/p\u003e\n\u003ch3 id=\"форма-благочестия-нет-силы\"\u003eФорма благочестия, нет силы\u003c/h3\u003e\n\u003cp\u003eРамирес описал наблюдаемых им христиан точными словами Павла: \"форма благочестия, но отрицающие его силу.\" У них была правильная внешность. Правильная одежда. Правильная Библия. Правильный словарь. Но они \"не имели связи с Иисусом Христом, потому что он был вне его воли, вне его обещаний, вне его божественной цели.\"\u003c/p\u003e\n\u003cp\u003eФорма была идеальной. Внешность была убедительной. Но за представлением не было духовной субстанции. Нет власти. Нет покрытия. Нет силы. Христиане, которых целил Рамирес, были беззащитны — не потому, что Бог их оставил, а потому, что они никогда не были подлинно связаны с ним.\u003c/p\u003e\n\u003ch3 id=\"пять-принципальностей-назначенные-управлять-церковью\"\u003eПять принципальностей, назначенные управлять церковью\u003c/h3\u003e\n\u003cp\u003eПять принципальностей — высшие по рангу демоны в иерархии сатаны — были специально назначены \"управлять церковью, срубать церковь и срубать возможность для людей\" сказать \"да\" Иисусу Христу. Эти демоны не пассивно противились церкви. Они активно УПРАВЛЯЛИ ею — влияя на её направление, её решения, её доктрину и её эффективность.\u003c/p\u003e\n\u003cp\u003eЭто означает, что сами церкви, где миллионы христиан собираются каждое воскресенье, находятся под влиянием принципальных демонов, чья задача — обеспечить, чтобы ничего подлинно духовного не происходило в этих стенах. Поклонение продолжается. Проповеди продолжаются. Программы продолжаются. Но духовная реальность управляется врагом, чтобы обеспечить, что максимальное количество людей останется в плацебо — форме благочестия без силы.\u003c/p\u003e\n\u003ch3 id=\"христиане-сломаны-через-колдовство\"\u003eХристиане сломаны через колдовство\u003c/h3\u003e\n\u003cp\u003eРамирес не просто наблюдал. Он атаковал. Он положил колдовство прямо на отдельных верующих. Он преследовал \"всё, что представляет Иисуса Христа.\" Он сломал христиан через целевую духовную войну.\u003c/p\u003e\n\u003cp\u003eЕдинственные, кого он не мог сломать, были те, кто имел \"подлинные отношения с Иисусом Христом.\" Те с подлинным духовным покрытием. Те, кто молились, постились и ходили в ежедневном послушании. Те, кто были покрыты кровью Иисуса — не как доктрина, а как живая духовная реальность.\u003c/p\u003e\n\u003cp\u003eВсе остальные были, по его словам, \"легко разрушить.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЦерковь думает, что она сильна. Она не сильна.\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 id=\"общая-нить-имеет-имя-что-жива-и-мертва\"\u003eОбщая нить: \"имеет имя, что жива, и мертва\"\u003c/h2\u003e\n\u003ch3 id=\"три-свидетеля-одно-заключение\"\u003eТри свидетеля, одно заключение\u003c/h3\u003e\n\u003cp\u003eСходимость полная. Три свидетеля с трёх совершенно разных точек зрения — трона Бога, архивов инфильтраторов и внутреннего круга врага — выносят одно и то же заключение:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eСвидетель\u003c/th\u003e\n\u003cth\u003eПерспектива\u003c/th\u003e\n\u003cth\u003eЗаключение\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eХоуард Питтман\u003c/td\u003e\n\u003ctd\u003eТронный зал Бога\u003c/td\u003e\n\u003ctd\u003e97,5% отклонены. Плацебо-религия. \"Никогда не сделали Меня Господом.\"\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eCatholic Confidential\u003c/td\u003e\n\u003ctd\u003eЗаписи инфильтраторов\u003c/td\u003e\n\u003ctd\u003eКаждая деноминация инфильтрирована. \"Я поверю, что белое чёрно.\" Универсальная монархия.\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eДжон Рамирес\u003c/td\u003e\n\u003ctd\u003eВнутренний круг врага\u003c/td\u003e\n\u003ctd\u003eБольшинство христиан беззащитны. Пять принципальностей управляют церковью. \"Форма благочестия, нет силы.\"\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eТри свидетеля. Одна истина. Церковь спит.\u003c/p\u003e\n\u003ch3 id=\"откровение-31--идеальное-исполнение\"\u003eОткровение 3:1 — идеальное исполнение\u003c/h3\u003e\n\u003cp\u003eЦерковь Сардиса имеет имя, что жива, и мертва. Современная церковь идеально исполняет это пророчество:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОна имеет ИМЯ, что жива.\u003c/strong\u003e Здания. Программы. Музыка. Посещаемость. Подписчики социальных медиа. Загрузки подкастов. Продажи книг. Схемы конференций. Телевизионные сети. Видимая инфраструктура христианства в Америке огромна. По каждой внешней метрике, церковь живая — активная, живая, растущая, влиятельная.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИ она МЕРТВА.\u003c/strong\u003e За инфраструктурой нет духовной силы. За программами нет подлинной трансформации. За музыкой нет подлинного поклонения. За цифрами посещаемости есть миллионы людей, сидящих в скамьях с плацебо в венах, верящих, что они спасены, пока принципальные демоны управляют их опытом.\u003c/p\u003e\n\u003cp\u003eЗдания не указывают на жизнь. Программы не указывают на жизнь. Музыка не указывает на жизнь. Посещаемость не указывает на жизнь. Только присутствие живого Бога указывает на жизнь — и три свидетеля подтвердили, что это присутствие отсутствует в подавляющем большинстве того, что называет себя церковью.\u003c/p\u003e\n\u003ch3 id=\"почему-церковь-не-может-видеть-своё-собственное-состояние\"\u003eПочему церковь не может видеть своё собственное состояние\u003c/h3\u003e\n\u003cp\u003eСамая опасная особенность условия Сардиса — неспособность церкви его воспринимать. Сардис не знал, что мёртв. Он верил, что жив. Плацебо работало — не в смысле производства духовного здоровья, а в смысле производства ложного восприятия духовного здоровья.\u003c/p\u003e\n\u003cp\u003eВот почему необходимы три внешних свидетеля. Церковь не может диагностировать себя. Пациент под анестезией не знает, что он без сознания. Человек в коме не знает, что он не отзывается. Церковь, седированная плацебо сатаны, не может точно оценить своё собственное духовное состояние. Это требует свидетелей из-за пределов её анестезированного сознания, чтобы доставить истину.\u003c/p\u003e\n\u003cp\u003eБог отправил Питтмана назад с трона комнаты с диагнозом: 97,5% отклонены. История сохранила документацию иезуитской инфильтрации для тех, кто готов её читать. И Рамирес дезертировал из врага лагеря с оперативной разведкой о том, как церковь была нейтрализована.\u003c/p\u003e\n\u003cp\u003eТри свидетеля. Три тревоги. И церковь спит дальше.\u003c/p\u003e\n\u003ch2 id=\"срочность-если-же-не-будешь-бодрствовать\"\u003eСрочность: \"Если же не будешь бодрствовать\"\u003c/h2\u003e\n\u003ch3 id=\"предупреждение-откровения-33\"\u003eПредупреждение Откровения 3:3\u003c/h3\u003e\n\u003cp\u003eИисус не просто диагностировал Сардис. Он предупредил их: \"Если же не будешь бодрствовать, то Я найду на тебя, как вор, и ты не узнаешь, в который час найду на тебя.\"\u003c/p\u003e\n\u003cp\u003eЭто предупреждение имеет два измерения. Во-первых, призыв бодрствовать — проснуться, стать бдительным, увидеть духовную реальность, которая вас окружает. Во-вторых, последствие неудачи бодрствовать — Христос придёт неожиданно, и вы не будете готовы.\u003c/p\u003e\n\u003cp\u003eБодрствование, которое требует Христос, не пассивное наблюдение. Это активное духовное участие. Это молитвенная жизнь, которую описывает Рамирес — устойчивое, сосредоточенное, интенсивное общение с Богом. Это пост, который отрицает плоть и укрепляет дух. Это различение, которое узнаёт плацебо за то, что оно есть, и отвергает его. Это послушание, которое подчиняет каждую область жизни к господству Христа — не в теории, а в ежедневной практике.\u003c/p\u003e\n\u003ch3 id=\"остаток--несколько-имён-в-сардисе\"\u003eОстаток — \"несколько имён в Сардисе\"\u003c/h3\u003e\n\u003cp\u003eДаже в Сардисе были исключения. \"Впрочем у тебя в Сардисе есть несколько человек, которые не осквернили одежд своих, и будут ходить со Мною в белых одеждах, ибо они достойны\" (Откровение 3:4).\u003c/p\u003e\n\u003cp\u003eНесколько. Не много. Не большинство. Несколько.\u003c/p\u003e\n\u003cp\u003e2,5% Питтмана. Христиане Рамирса за стеной огня. Женщина, которая выжила двадцать один день смертельного ритуала. Человек, который исчез с крыши, прежде чем убийца-сатанист мог его убить. Это \"несколько имён\", которые не осквернили свои одежды. Остаток в остатке. Подлинные верующие, скрытые в массе номинальных христиан.\u003c/p\u003e\n\u003cp\u003eОни существуют. Они реальны. Они защищены. Они имеют подлинную духовную власть. Но они немногие. И разрыв между немногими, которые подлинно живы, и многими, которые просто имеют \"имя, что живы,\" — это разрыв, который три свидетеля теперь документировали с трёх разных углов.\u003c/p\u003e\n\u003ch3 id=\"триединая-команда\"\u003eТриединая команда\u003c/h3\u003e\n\u003cp\u003eХристос даёт Сардису три команды:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Бодрствуй.\"\u003c/strong\u003e Проснись. Открой свои глаза. Видь духовную реальность, которую ты был слишком удобен, слишком отвлечён и слишком седирован, чтобы воспринимать. Принципальности управляют твоей церковью. Иезуиты инфильтрировали твою деноминацию. Плацебо в твоих венах. ПРОСНИСЬ.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Утверждай прочее, что хотело бы умереть.\"\u003c/strong\u003e Есть ещё что-то стоящее спасения. Подлинное семя евангелия ещё присутствует, однако похоронено под институциональной религией и демоническим управлением. Найди его. Накорми его. Защити его. Остаток мал, но он реален, и его нужно укреплять, прежде чем он полностью умрёт.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Вспомни же, как ты принял и слышал, и соблюдай и покайся.\"\u003c/strong\u003e Вернись к началу. Не к институциональному началу — не к советам и символам веры и деноминационным отличиям — но к ОРИГИНАЛЬНОМУ евангелию. Евангелие, которое проповедали апостолы. Евангелие, которое произвело книгу Деяния церкви. Евангелие, которое перевернуло Римскую империю вверх дном без единого здания, единой программы или единого аккаунта социальных медиа. Помни его. Держи его. И ПОКАЙСЯ — отвернись от плацебо и приди к подлинному.\u003c/p\u003e\n\u003ch2 id=\"стоимость-продолжающегося-сна\"\u003eСтоимость продолжающегося сна\u003c/h2\u003e\n\u003ch3 id=\"что-происходит-если-церковь-не-проснётся\"\u003eЧто происходит, если церковь не проснётся\u003c/h3\u003e\n\u003cp\u003eЕсли церковь не ответит на эти три свидетельства, последствия уже приходят в движение:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМиллионы умрут в своём плацебо.\u003c/strong\u003e Они будут стоять перед Богом, верящие, что они спасены, и услышат: \"Я никогда не знал вас.\" Питтман видел это. 97,5%. Цифры катастрофические.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВраг продолжит действовать без сопротивления.\u003c/strong\u003e Пять принципальностей управляют направлением церкви. Поклонники дьявола проклинают христиан каждую ночь. Колдовство положено на отдельных верующих, семьи и общины. Без молящейся, постящейся, духовно-бдительной церкви враг лицом к противлению.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнфильтрация углубится.\u003c/strong\u003e Иезуитское влияние, которое уже сформировало каждую деноминацию, продолжит консолидировать свой контроль. Богословие будет дрейфовать дальше от писания. Практики станут более мирскими. Различие между церковью и культурой полностью исчезнет.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУзкие ворота будут пропущены почти всеми.\u003c/strong\u003e Иисус сказал, что немногие их найдут (Матфей 7:14). Питтман сказал, что 2,5% пройдут через них. Три свидетеля подтверждают, что церковь в её нынешнем состоянии ведёт людей ОТ узких ворот, уверяя их, что они на правильном пути. Плацебо не просто не спасает — оно активно предотвращает спасение, создавая ложное чувство безопасности.\u003c/p\u003e\n\u003ch3 id=\"звук-тревоги\"\u003eЗвук тревоги\u003c/h3\u003e\n\u003cp\u003eТри свидетеля теперь подняли тревогу. С трона Бога. Из архивов инфильтраторов. Из лагеря врага. Диагноз единодушен. Доказательства подавляющие. Дело установлено.\u003c/p\u003e\n\u003cp\u003eЕдинственный оставшийся вопрос — услышит ли кто-нибудь.\u003c/p\u003e\n\u003cp\u003e\"Кто имеет ухо, да слышит, что Дух говорит церквам\" (Откровение 3:6).\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003eПЛАЦЕБО: Проснитесь, церковь! Хоуард Питтман\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eСвидетельство бывшего поклонника Сатаны Джона Рамиреза\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/79-Engineers_and_Believers.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eEngineers and Believers — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/95-The_Valley_of_Death.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Valley of Death — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/111-The_Final_Day.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Final Day — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/83-Ancient_Documents.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eAncient Documents — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/127-The_Overcoming.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Overcoming — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИссле
