 — Матфей 7:15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЗмей в Саду не представил себя хищником. Он представился советником — предлагая мудрость, знание и улучшение. \"Вы будете как боги, знающие добро и зло\" (Бытие 3:5). Обещание было сформулировано как усовершенствование. Реальность была разрушением.\u003c/p\u003e\n\u003cp\u003eКак выявляет трек Confliction \"Маска сатаны\" (Satan's Disguise), наиболее опасные операции противника — это те, что скрыты в языке выгоды. Программа, описываемая как превращение дикого вируса в мягкий, звучит защитно. Но при внимательном рассмотрении процесс преобразования дикого патогена в кандидата на \"мягкую\" вакцину включает ту же манипуляцию характеристик патогена, которая определяет исследование усиления функциональности — она просто применяет противоположный ярлык.\u003c/p\u003e\n\u003cp\u003eМинистерство здравоохранения приказало CDC остановить эту программу. Волки, скрывавшиеся в овечьей шкуре, были идентифицированы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"программа-дикий-слабый\"\u003eПрограмма 'дикий-слабый'\u003c/h2\u003e\n\u003cp\u003eПрограмма вакцины от гриппа 'дикий-слабый' CDC была разработана для получения циркулирующих в природе вирусов гриппа и их ослабления — снижения их вирулентности — для создания кандидатов в вакцины. Процесс включал серийный проход диких вирусов через культуры клеток, отбирающие варианты с пониженной патогенностью при сохранении иммунногенности.\u003c/p\u003e\n\u003cp\u003eХотя программа была позиционирована как разработка вакцины, критики — включая экспертов по биобезопасности и исследователей усиления функциональности — указывали, что манипуляция характеристиками патогена в лаборатории включает те же методы, те же учреждения и те же риски, что и исследование усиления функциональности. Различие между \"усилением\" патогена и \"ослаблением\" его — это различие намерения, а не методики. Обе включают преднамеренное изменение характеристик патогена через лабораторное манипулирование.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report, что \"программа 'дикий-слабый' работала в серой зоне между разработкой вакцины и исследованием усиления функциональности. Лабораторные методы идентичны. Риски биобезопасности идентичны. Единственное различие — в каком направлении вы толкаете патоген — к большей вирулентности или меньшей. Но лабораторная эволюция непредсказуема. Ослабленные вирусы могут вернуть вирулентность. Мутации могут произвести неожиданные фенотипы. Каждое лабораторное манипулирование патогеном создает риск, независимо от предполагаемого результата.\"\u003c/p\u003e\n\u003ch3 id=\"проблема-живой-ослабленной-вакцины\"\u003eПроблема живой ослабленной вакцины\u003c/h3\u003e\n\u003cp\u003eПродукты программы 'дикий-слабый' предназначались для использования в качестве живых ослабленных вакцин от гриппа (LAIВ) — вакцин, содержащих ослабленный, но живой вирус. LAIВ имеют известный риск, которого нет у традиционных инактивированных вакцин: ослабленный вирус может потенциально вернуть более вирулентную форму, особенно у иммунокомпрометированных лиц.\u003c/p\u003e\n\u003cp\u003eОральная полиомиелитная вакцина (OПВ), живая ослабленная вакцина, была снята с использования в Соединенных Штатах именно из-за этого риска. Полиомиелит, полученный от вакцины (ВДПВ) — полиомиелит, вызванный вернувшейся к вирулентности вакциной — стал более распространенной причиной параличного полиомиелита, чем дикий полиовирус. ВОЗ задокументировала сотни случаев полиомиелита, полученного от вакцины, во всем мире.\u003c/p\u003e\n\u003cp\u003eПрименение подобной живой аттенуированной технологии к гриппу — вирусу с гораздо большей генетической изменчивостью и скоростью эволюции, чем полиовирус — вызывает усиленные опасения по поводу реверсии и непредвиденной патогенной эволюции.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"приказ-и-его-последствия\"\u003eПриказ и его последствия\u003c/h2\u003e\n\u003cp\u003eПриказ Министерства здравоохранения об остановке программы 'дикий-слабый' соответствует более широкой политике администрации по ограничению лабораторного манипулирования опасными патогенами. Приказ:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПрекращает все исследовательские мероприятия CDC, связанные с программой\u003c/li\u003e\n\u003cli\u003eЗамораживает финансирование, выделенное на операции программы\u003c/li\u003e\n\u003cli\u003eТребует комплексной проверки деятельности программы, включая аудит всех патогенов, манипулируемых, хранившихся или распределяемых через программу\u003c/li\u003e\n\u003cli\u003eЗапрещает передачу материалов программы другим федеральным агентствам, академическим учреждениям или международным партнерам, пока идет проверка\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПоследствия приказа выходят за рамки конкретной программы. Он устанавливает прецедент, что любое лабораторное манипулирование характеристиками патогена — независимо от заявленного намерения — подпадает под запрет администрации на исследование усиления функциональности, если специально не исключено через процесс проверки, который еще не определен.\u003c/p\u003e\n\u003cp\u003eЭтот прецедент может повлиять на программы разработки вакцин по всему федеральному правительству, включая разработку вакцин от гриппа, исследования вакцин RSV и другие программы, включающие лабораторное манипулирование патогенами.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"более-широкий-образец\"\u003eБолее широкий образец\u003c/h2\u003e\n\u003cp\u003eПрограмма 'дикий-слабый' — один компонент более широкого образца, задокументированного в нескольких статьях этой серии: операции федерального правительства по исследовательским программам, которые размывают границу между защитой общественного здравоохранения и созданием биологической угрозы.\u003c/p\u003e\n\u003cp\u003eТрек DARPA Dark Winter задокументирует военное происхождение программ подготовки к пандемии. Трек Event 201 Came True задокументирует конвейер от симуляции к реальности. Трек Lockstep With The Beast задокументирует синхронизированное институциональное соответствие, которое позволяет этим программам работать без ответственности.\u003c/p\u003e\n\u003cp\u003eKingston связывает эти программы с бизнес-моделью фармацевтики: \"Биозащитное учреждение создает угрозы. Фармацевтическая промышленность продает противодействие. Органы регулирования одобряют продукты. Средства массовой информации продают страх. Цикл самоустойчив, потому что каждый узел зависит от других в финансировании, авторитете и оправдании своего существования. Разрыв одного звена — как это сделало Министерство здравоохранения с программой 'дикий-слабый' — нарушает всю цепь.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческое-предупреждение\"\u003eПророческое предупреждение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ибо они сеют ветер, и пожнут бурю.\" — Осия 8:7\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЛабораторное манипулирование патогенами — будь то усиление функциональности, ослабление или разработка вакцин — это сеяние ветра. Обещание — контроль — способность манипулировать природой для человеческой выгоды. Но природа, созданная Богом и управляемая Его законами, не подчиняется человеческому контролю. Ослабленные вирусы возвращают вирулентность. Лабораторные аварии высвобождают сконструированные патогены. Манипулируемые организмы эволюционируют непредсказуемыми путями.\u003c/p\u003e\n\u003cp\u003eПрограмма 'дикий-слабый' сеяла ветер. Министерство здравоохранения приказало остановить ее, прежде чем она пожнет бурю.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"предупреждение-из-1-царств-8\"\u003eПредупреждение из 1 Царств 8\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: слушайся голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отзывается в каждом правительственном коридоре сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил его точно, что произойдет — его сыновей возьмут на войну, его дочерей в услужение, его поля и виноградники отберут, десятину всего конфискуют. Они выбрали человеческое правительство вместо царства Божьего, и тирания последовала точно так, как было обещано. Ничего не изменилось. Современная политическая система — два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной скрытой структуре власти. Голосование за ту или другую сторону — это выбор, какое крыло будет махать дальше, пока птица летит в том же направлении. Реальная власть никогда не была на избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eМинистерство здравоохранения — приказ об остановке программы CDC 'дикий-слабый'\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — анализ Карен Кингстон методологии программы 'дикий-слабый', параллели усиления функциональности и проблемы биобезопасности\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eCDC — программы исследований вакцин от гриппа\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eВОЗ — документация по полиомиелиту, полученному от вакцины\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eМатфей 7:15, Осия 8:7 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u003c/a\u003e — Военное происхождение программ манипулирования патогенами\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/165-Event_201_Came_True.mp4\"\u003eEvent 201 Came True\u003c/a\u003e — Конвейер от симуляции к реальности\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — Институциональное соответствие, позволяющее опасным программам работать\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e — Опасные операции, скрытые в языке выгоды\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e — Запретное знание манипулирования патогенами\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/trump-bans-gain-of-function/?lang=ru\"\u003eTrump Executive Order Bans Gain-of-Function Research\u003c/a\u003e — Приказ, установивший рамки для этой остановки\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/trump-blow-bird-flu-surveillance/?lang=ru\"\u003eTrump Delivers Shocking Blow to Bird Flu Surveillance Program\u003c/a\u003e — Параллельный демонтаж инфраструктуры пандемии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/hhs-pulls-mrna-research-funding/?lang=ru\"\u003eHHS Pulls $500 Million in mRNA Research Funding\u003c/a\u003e — Разрыв финансовых каналов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/trump-obliterates-who-h5n1/?lang=ru\"\u003eTrump Obliterates WHO Plans for H5N1 Pandemic\u003c/a\u003e — Противодействие следующему нарративу о пандемии\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eЗмей в Саду предложил знание, одетое в выгоду. Программа 'дикий-слабый' предложила разработку вакцины, одетую в общественное здравоохранение — но методы были неразличимы от исследования усиления функциональности, риски были идентичны, и потенциальные последствия были катастрофичны. Министерство здравоохранения узнало волка под овечьей шкурой и приказало программе остановиться. \"Все испытывайте, хорошее держите\" (1 Фессалоникийцам 5:21). Программа была испытана и найдена недостаточной. То, что остается доказать, — может ли федеральное правительство постоянно сопротивляться институциональному давлению возобновить манипулирование патогенами под каким бы ни было новым ярлыком, который придумает следующее поколение колдунов.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Министерство здравоохранения приказывает CDC остановить программу вакцины от гриппа 'дикий-слабый'\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Министерство здравоохранения приказало CDC приостановить спорную программу вакцины от гриппа 'дикий-слабый', которую критики называли скрытой программой усиления функциональности под видом общественного здравоохранения.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-23T10:00:00Z\",\"children\":\"23 мая 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"HHS\",{\"href\":\"/ru/tag/HHS/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"HHS\"]}],[\"$\",\"a\",\"CDC\",{\"href\":\"/ru/tag/CDC/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"CDC\"]}],[\"$\",\"a\",\"flu-vaccine\",{\"href\":\"/ru/tag/flu-vaccine/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"flu-vaccine\"]}],[\"$\",\"a\",\"gain-of-function\",{\"href\":\"/ru/tag/gain-of-function/\",\"classNa
