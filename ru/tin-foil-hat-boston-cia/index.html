03c/blockquote\u003e\n\u003cp\u003e\"Оловянная шляпа\" — один из самых эффективных мемов когда-либо развёрнутых против критического мышления. Это стало универсальной стенографией для \"безумного человека\" — единственный образ, который дискредитирует любую озабоченность электромагнитным наблюдением, контролем разума или направленными оружиями энергии. В момент, когда кто-то поднимает эти темы, мем оловянной шляпы активируется, и разговор закончился.\u003c/p\u003e\n\u003cp\u003eНо что, если оловянная шляпа имеет реальное происхождение? Что, если пациенты в определённой больнице были даны металлические экранирующие исследователями, которые знали, что они были подвергнуты электромагнитным экспериментам? Что, если мем был преднамеренно создан и распространён, чтобы дискредитировать кого-либо, который открыл истину об электромагнитных оружиях?\u003c/p\u003e\n\u003cp\u003eЭто статья прослеживает соединение между Бостонской городской больницей, финансируемыми ЦРУ электромагнитными экспериментами и преднамеренной оружием мема оловянной шляпы против общественного осознания реальной технологии.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показан, что демонические силы работают через системы обмана, настолько распространённые, что даже указание их вызывает насмешку. Мем оловянной шляпы — такая система — она преобразует подлинную озабоченность в комедию, серьёзное исследование в пародию, и реальных жертв в шутки. 97,5%, которые не прошли, смеются над оловянной шляпой, потому что они были запрограммированы смеяться. И в смехе они гарантируют, что технология, нацеленная на них, остаётся скрытой.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"бостонская-городская-больница-и-цру\"\u003eБостонская городская больница и ЦРУ\u003c/h2\u003e\n\u003ch3 id=\"больничные-эксперименты\"\u003eБольничные эксперименты\u003c/h3\u003e\n\u003cp\u003eБостонская городская больница (теперь Бостонский медицинский центр) была одной из многочисленных медицинских учреждений, которые участвовали в финансируемых ЦРУ исследованиях во время холодной войны. Масштаб этих экспериментов включал:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЭффекты электромагнитного излучения\u003c/strong\u003e на человеческих субъектах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВведение лекарств\u003c/strong\u003e без информированного согласия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМодификация поведения\u003c/strong\u003e через физическое и психологическое манипулирование\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭлектросокровативная терапия\u003c/strong\u003e на экспериментальных параметрах\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПациенты в больнице — многие из них бедные, меньшинство или психиатрические пациенты, которые не могли отстаивать себя — были подвергнуты экспериментам, которые они не понимали и не согласились. Это была стандартная практика во время эры MKUltra: наиболее уязвимые члены общества были использованы как лабораторные животные самыми мощными учреждениями в Америке.\u003c/p\u003e\n\u003ch3 id=\"соединение-экранирования\"\u003eСоединение экранирования\u003c/h3\u003e\n\u003cp\u003eВо время электромагнитных экспериментов исследователи должны были бы установить исходные уровни — определение эффектов электромагнитного излучения на субъектов с и без экранирования. Металлическая фольга (алюминий или олово) — эффективный электромагнитный экран. Пациенты или субъекты, которым было предоставлено металлическое экранирование как часть экспериментальных протоколов, казалось бы, носили \"оловянные шляпы.\"\u003c/p\u003e\n\u003cp\u003eЕсли пациенты впоследствии сообщили, что металлическое экранирование снизило эффекты электромагнитного целевого назначения — которое это сделало бы, учитывая базовую физику — они были бы высмеяны за это претензию. Высмеивание металлического экранирования как \"безумия\" служило двойной цели дискредитирования свидетельства пациентов и отдельно других от попытки экранировать себя от электромагнитных оружий.\u003c/p\u003e\n\u003ch3 id=\"оружие-мема\"\u003eОружие мема\u003c/h3\u003e\n\u003cp\u003eПреднамеренное распространение мема оловянной шляпы следовало стандартной игровой книге сообщества разведки для дискредитирования нежелаемой информации:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eОпределить угрозу\u003c/strong\u003e: люди, открывающие, что электромагнитные оружия существуют и что металлическое экранирование обеспечивает защиту\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоздать мем\u003c/strong\u003e: привязать металлическое экранирование к безумию через СМИ, комедию и культурное повторение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРаспространить широко\u003c/strong\u003e: убедить, что мем пронизывает каждый уровень культуры — фильмы, телевидение, социальные сети, случайный разговор\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАвтоматическое дискредитирование\u003c/strong\u003e: любой человек, который обсуждает электромагнитные оружия, срабатывает мем, заканчивая разговор, прежде чем он начнется\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭтот игровой сценарий был разработан ЦРУ для COINTELPRO и связанных программ. Мем оловянной шляпы — один из его самых успешных продуктов — культурное оружие, которое защитило классифицированную технологию от общественного внимания на протяжении десятилетий.\u003c/p\u003e\n\u003ch2 id=\"наука-электромагнитного-экранирования\"\u003eНаука электромагнитного экранирования\u003c/h2\u003e\n\u003ch3 id=\"клетки-фарадея-реальны\"\u003eКлетки Фарадея реальны\u003c/h3\u003e\n\u003cp\u003eЭлектромагнитное экранирование — не псевдонаука. Это установленная физика, используемая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВоенные объекты\u003c/strong\u003e: Чувствительные компартиментированные информационные объекты (SCIFs) используют электромагнитное экранирование, чтобы предотвратить электронное наблюдение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАгентства разведки\u003c/strong\u003e: офисы ЦРУ и НСА используют клетки Фарадея, чтобы защитить от электромагнитного шпионажа\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКорпоративные исследовательские лаборатории\u003c/strong\u003e: компании используют электромагнитное экранирование, чтобы защитить собственную информацию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбъекты MRI\u003c/strong\u003e: комнаты MRI экранируются, чтобы предотвратить электромагнитное вмешательство\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭлектронное тестирование\u003c/strong\u003e: анэхойчные камеры используют электромагнитное экранирование для тестирования электронного оборудования\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКогда государственное учреждение использует электромагнитное экранирование, оно называется \"национальной безопасностью.\" Когда гражданин использует электромагнитное экранирование, он называется \"оловянной шляпой.\" Физика идентична. Социальная обработка противоположна.\u003c/p\u003e\n\u003ch3 id=\"что-экранирование-может-и-не-может-делать\"\u003eЧто экранирование может и не может делать\u003c/h3\u003e\n\u003cp\u003eАлюминиевая фольга обеспечивает некоторое электромагнитное экранирование, но его эффективность зависит:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЧастота сигнала\u003c/strong\u003e: фольга более эффективна против выше частот\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПокрытие\u003c/strong\u003e: частичное покрытие (шляпа) обеспечивает меньше защиты, чем полное замкнутое (клетка Фарадея)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗаземление\u003c/strong\u003e: надлежащее электромагнитное экранирование требует заземления — просто ношение фольги на голове менее эффективно, чем заземлённое замкнутое\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТолщина\u003c/strong\u003e: более толстый материал обеспечивает лучшее экранирование\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНадлежащая клетка Фарадея — полностью ограждённое, заземлённое металлическое замкнутое — обеспечивает отличное электромагнитное экранирование. Это почему чувствительные государственные и военные учреждения используют их. \"Оловянная шляпа\" — грубое приблизительное обеспечивающее ограниченную защиту — но принцип позади неё научно звук.\u003c/p\u003e\n\u003ch2 id=\"более-широкий-паттерн-оружие-насмешка\"\u003eБолее широкий паттерн: Оружие насмешка\u003c/h2\u003e\n\u003ch3 id=\"цру-и-культурная-манипуляция\"\u003eЦРУ и культурная манипуляция\u003c/h3\u003e\n\u003cp\u003eЦРУ имеет задокументированную историю культурной манипуляции:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOperation Mockingbird\u003c/strong\u003e: ЦРУ инфильтрировал основные СМИ организации и разместил активы в новостных редакциях, чтобы формировать общественные повествования\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMKUltra и Голливуд\u003c/strong\u003e: подключённые к ЦРУ продюсеры и авторы сформировали развлекательные повествования, которые высмеивали теории заговора и продвигали доверие правительству\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТермин \"теория заговора\"\u003c/strong\u003e: документ ЦРУ из 1967 года (распоряжение 1035-960) очертил стратегии дискредитирования критиков отчёта Комиссии Уоррена, включая продвижение использования термина \"теория заговора\", чтобы отклонить нежелаемые расследования\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eМем оловянной шляпы идеально подходит в эту историю. Это не было органическое культурное развитие — это был произведённый инструмент для дискредитирования кого-либо, кто открыл истину об электромагнитных оружиях.\u003c/p\u003e\n\u003ch3 id=\"как-насмешка-контролирует-поведение\"\u003eКак насмешка контролирует поведение\u003c/h3\u003e\n\u003cp\u003eНасмешка — один из наиболее мощных механизмов социального контроля:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСтрах перед насмешкой\u003c/strong\u003e предотвращает людей от исследования запретных тем\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУпреждающая насмешка\u003c/strong\u003e дискредитирует идеи, прежде чем они могут быть оценены\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоциальное применение\u003c/strong\u003e — сверстники, которые интернализировали насмешку, применяют её к другим\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСамоцензура\u003c/strong\u003e — люди, которые открывают истину, выбирают молчание над социальным остракизмом\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eМем оловянной шляпы активирует все эти механизмы одновременно. Просто мышление об электромагнитном экранировании срабатывает мем, который срабатывает страх перед насмешкой, который срабатывает самоцензура. Технология остаётся скрытой не потому, что это секретно, а потому, что любой, кто обсуждает его, автоматически дискредитирован.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"истина-против-насмешка\"\u003eИстина против насмешка\u003c/h3\u003e\n\u003cp\u003eГовард Питтман был рассказан, что духовная область — истинная реальность и что обман — первичное оружие демонической иерархии. Насмешка — форма обмана — она заменяет эмоциональный ответ на рациональную оценку. Мем оловянной шляпы предотвращает рациональную оценку электромагнитных оружий путём срабатывания эмоционального ответа (смех, презрение, смущение) перед доказательством, которое может быть рассмотрено.\u003c/p\u003e\n\u003cp\u003eПисание предупреждает против тех, кто \"скрывает свой замысел глубоко перед Господом.\" Электромагнитные программы оружия ЦРУ скрыты глубоко — позади классификации, дезинформации и мема оловянной шляпы. Но предупреждение Исайи применяется: Бог видит то, что они делают в тёмности. И истина, как был показан Питтман, в конечном итоге преобладает.\u003c/p\u003e\n\u003cp\u003eИезуитская практика \"каждого вида порока\" включает порок насмешки — использование насмешки, чтобы молчать истину. Их инфильтрация \"покрытая такой хитростью\" использует оловянную шляпу как одну из многих плащей. И 97,5%, которые не проходят, продолжают смеяться над мемом, который был разработан держать их порабощёнными.\u003c/p\u003e\n\u003cp\u003eНе боитесь насмешки. Боитесь невежества. Истина об электромагнитных оружиях задокументирована в патентах, военных записях, свидетельстве Конгресса и жизненном опыте тысяч целевых индивидуумов. Мем оловянной шляпы не может стирать эту истину. Это может только отсрочить его признание.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — Boston City Hospital CIA connection and tin foil hat origin research\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — truth vs. ridicule in spiritual warfare\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Jesuit use of ridicule as a control mechanism\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u0
