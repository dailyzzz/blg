омышление.\" — 2 Коринфянам 10:4-5\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eАпостол Павел понимал, что современные военные стратеги только недавно формализовали: решающая битва ведётся не за территорию, а в разуме. Твердыни, которые должны быть разрушены, — не крепости из камня, а твердыни мысли — воображения, системы убеждений и умственные каркасы, которые определяют, как человек воспринимает реальность. Павел описал захват мыслей как духовную операцию. НАТО описывает её как военную. Разница в том, что Павел стремился привести мысли в соответствие с истиной. Когнитивная война стремится привести мысли в соответствие с любым повествованием, которое служит власти.\u003c/p\u003e\n\u003cp\u003eИнновационный центр НАТО опубликовал основополагающий документ в 2020 году, озаглавленный \"Когнитивная война.\" Документ явно выявляет человеческий разум как новое поле боя — шестую область войны, следующую за сухопутной, морской, воздушной, космической и кибернетической. В отличие от традиционной войны, когнитивная война не стремится разрушить физическую способность врага. Она стремится разрушить способность врага ясно мыслить, сопротивляться манипуляции и различать истину от фабрикации. Трек альбома Confliction \u003cem\u003eThe Word of God\u003c/em\u003e стоит в прямой оппозиции этой повестке — это истина, которую никакое когнитивное оружие не может переопределить, твердыня, которую никакая информационная операция не может пробить, и меч Духа, который рассекает каждую ложь.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"шестая-область-войны\"\u003eШестая область войны\u003c/h2\u003e\n\u003cp\u003eТрадиционная военная доктрина признаёт пять областей войны: сухопутная, морская, воздушная, космическая и кибернетическая. Каждая область имеет физические или цифровые границы, измеримые способности и определённые театры операций. Шестая область — когнитивная область — не имеет физических границ. Она существует везде, где существует человеческий разум. И она всегда доступна.\u003c/p\u003e\n\u003cp\u003eДокумент инновационного центра НАТО, написанный Франсуа дю Клюзелем, гласит: \"Когнитивная война — это не просто борьба против того, что мы знаем, это борьба против того, как мы думаем... цель такой войны — не вести кинетическую войну, а влиять и изменять когнитивные процессы мозга.\"\u003c/p\u003e\n\u003cp\u003eПоследствия ошеломляющи. Когнитивная война ориентирована не на то, во что люди верят, а на то, как они обрабатывают информацию. Она атакует механизмы мысли — внимание, память, эмоцию, доверие, рассуждение и принятие решения. Население, чьи когнитивные процессы скомпрометированы, не может выстроить эффективное сопротивление никакой повестке дня, потому что оно не может точно воспринимать повестку дня. Оно не может различить друга от врага, истину от лжи или свободу от порабощения.\u003c/p\u003e\n\u003cp\u003eДокумент описывает когнитивную войну как:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eНепрерывная\u003c/strong\u003e — её ведут в мирное время и в военное время, без декларации и без прекращения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВсеохватывающая\u003c/strong\u003e — она ориентирована на каждого человека, а не просто на военный персонал или политических лидеров\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТехнологически-позволённая\u003c/strong\u003e — она использует социальные медиа, ИИ, нейронауку, поведенческую науку и информационные технологии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНиже порога обнаружения\u003c/strong\u003e — целевое население не должно знать, что оно находится под атакой\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭта последняя характеристика самая значительная. Когнитивная война разработана, чтобы быть невидимой. Целевое население не знает, что оно является целью. Манипуляция переживается как реальность — как \"то, как всё есть\", как \"здравый смысл\", как \"экспертный консенсус.\" Война выиграна, когда цель верит, что их манипулированные восприятия — их собственные подлинные мысли.\u003c/p\u003e\n\u003ch2 id=\"оружие-нейронаука-встречает-информационные-операции\"\u003eОружие: нейронаука встречает информационные операции\u003c/h2\u003e\n\u003cp\u003eКогнитивная война применяет вооружение на пересечении нейронауки, поведенческой психологии, науки о данных и информационных операций. Конкретное оружие включает:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонтроль повествования.\u003c/strong\u003e Конструирование и распространение повествований, которые определяют события, определяют приемлемый дискурс и маргинализируют несогласие. Повествование не должно быть истинным. Оно должно быть доминирующим. Повторение, эмоциональный резонанс и институциональное одобрение преобразуют любое повествование — истинное или ложное — в воспринимаемую реальность.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКогнитивная перегрузка.\u003c/strong\u003e Наводнение информационной среды противоречивыми, запутанными или подавляющими количествами информации, делая невозможным для людей точно обрабатывать реальность. Эта техника — иногда называемая \"брандспойт лжи\" — не целит убедить. Она целит утомить, парализовать и в конечном итоге вынудить цель полагаться на фигуры власти для интерпретации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМанипуляция эмоциями.\u003c/strong\u003e Ориентирование на страх, гнев, стыд и племенную идентичность для обхода рационального анализа. Эмоциональные ответы обрабатываются быстрее, чем рациональная мысль (миндалина реагирует до префронтальной коры). Контент, разработанный для срабатывания эмоциональных ответов, подключает аварийный выключатель критического мышления.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнженерия социального давления.\u003c/strong\u003e Производство появления консенсуса для использования ошибки соответствия. Исследования Соломона Аша в 1950-х годах продемонстрировали, что люди откажут от своего собственного точного восприятия, чтобы соответствовать группе, которая очевидно неправа. Социальные медиа усиливают этот эффект, делая \"консенсус\" видимым и немедленным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗахват внимания.\u003c/strong\u003e Контролирование того, на что люди обращают внимание, более мощно, чем контроль того, во что они верят. Если медиа фокусируют внимание на теме A, население не думает о теме B — независимо от того, какая тема более важна. Теория установления повестки дня демонстрирует, что медиа не говорят людям, о чём думать, но эффективно говорят им, о чём думать.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМанипуляция памятью.\u003c/strong\u003e Повторное воздействие на ложную информацию может изменить память — явление, называемое \"эффектом Манделы\" при наблюдении в популяциях и \"соответствием памяти\" при изучении в лабораториях. Когнитивная война может имплантировать ложные воспоминания в популяции, повторяя ложные претензии до тех пор, пока они не будут помниться как истинные.\u003c/p\u003e\n\u003ch2 id=\"мкультра-предшественник\"\u003eМКУльтра: предшественник\u003c/h2\u003e\n\u003cp\u003eСовременная когнитивная война не появилась из вакуума. Её интеллектуальные и операциональные основания были заложены программой МКУльтра ЦРУ — программой холодной войны контроля над разумом, которая использовала наркотики (особенно ЛСД), сенсорную депривацию, электрошок, гипноз и психологические пытки для разработки методов манипуляции человеческим познанием.\u003c/p\u003e\n\u003cp\u003eКак изучено в \u003cem\u003eMKUltra Never Ended\u003c/em\u003e, программа была официально прекращена в 1973 году, но её результаты исследований не были уничтожены. Методы, разработанные под МКУльтра — особенно те, которые вовлекают психологическую манипуляцию, основанное на травме кондиционирование и использование химических агентов для изменения познания — были поглощены военной и разведывательной доктриной.\u003c/p\u003e\n\u003cp\u003eКлючевой инсайт из МКУльтра был, что человеческий разум программируем. При правильных условиях — стресс, изоляция, повторение, химическое изменение и институциональная власть — убеждения, поведения и даже идентичность могут быть переписаны. Когнитивная война операционализирует этот инсайт в масштабе население, используя массовые медиа, социальные медиа и цифровые технологии для создания \"правильных условий\" для миллионов людей одновременно.\u003c/p\u003e\n\u003ch2 id=\"массовое-формирование-применение-масштаба-население\"\u003eМассовое формирование: применение масштаба население\u003c/h2\u003e\n\u003cp\u003eКонцепция массового формирования — детально изучена в \u003cem\u003eMass Formation Psychosis and the Madness of Crowds\u003c/em\u003e — описывает психологические условия, при которых большие популяции становятся уязвимыми к когнитивной войне.\u003c/p\u003e\n\u003cp\u003eД-р Маттиас Дезмет, профессор клинической психологии в Гентском университете, выявил четыре условия, которые предшествуют массовому формированию:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eСоциальная изоляция\u003c/strong\u003e — распространённое одиночество и разъединение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОтсутствие значения\u003c/strong\u003e — популяция, которая потеряла цель и нарративное согласование\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвободно плавающая тревога\u003c/strong\u003e — распространённая, нефокусированная тревога без выявленной причины\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвободно плавающая фрустрация\u003c/strong\u003e — распространённая фрустрация и агрессия без чёткой цели\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eКогда эти условия существуют, повествование, которое предоставляет объект тревоги (угроза) и стратегию для его обращения (коллективное действие), может связать популяцию в гипнотическое состояние массового формирования. В этом состоянии люди жертвуют критическим мышлением, терпят абсурдность и направляют чрезвычайную враждебность на любого, кто ставит под вопрос повествование.\u003c/p\u003e\n\u003cp\u003eОтвет COVID-19 на пандемию выставил каждую характеристику массового формирования. Популяции по всему миру приняли беспрецедентные ограничения на свободу, терпели логические противоречия (наружное маскирование, шестифутовое дистанцирование, важное против неважного), и направили чрезвычайную враждебность на тех, кто ставил под вопрос официальное повествование. Методы когнитивной войны — контроль повествования, манипуляция эмоциями, инженерия социального давления и когнитивная перегрузка — были развёрнуты в масштабе через медиа, социальные медиа и институциональное сообщение.\u003c/p\u003e\n\u003ch2 id=\"цифровое-поле-боя\"\u003eЦифровое поле боя\u003c/h2\u003e\n\u003cp\u003eПлатформы социальных медиа — это основная система доставки операций когнитивной войны. Характеристики социальных медиа делают их идеальным оружием:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАлгоритмическое усиление.\u003c/strong\u003e Контент, который срабатывает эмоциональными ответами, получает больше заинтересованности, который срабатывает больше алгоритмической дистрибуции. Гнев, страх и возмущение усиливаются. Нюанс, сложность и спокойный анализ подавляются. Алгоритм оптимизирует для заинтересованности, и заинтересованность соответствует эмоциональному возбуждению — именно то, что когнитивная война стремится производить.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКамеры эхо.\u003c/strong\u003e Алгоритмическое курирование создаёт информационные пузыри, где пользователи видят только контент, подтверждающий их существующие убеждения. Это поляризирует популяции, делая их более уязвимыми к племенной манипуляции и менее способными обрабатывать информацию, опровергающую их воззрения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРеальная обратная связь.\u003c/strong\u003e Социальные медиа предоставляют немедленную обратную связь по эффективности методов когнитивной войны. A/B тестирование повествований, сообщений и эмоциональных срабатываний может проводиться в реальном времени, позволяя операторам непрерывно оптимизировать их тактику.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСложность атрибуции.\u003c/strong\u003e Происхождение контента социальных медиа сложно проверить. Операции когнитивной войны, спонсируемые государством, могут проводиться через анонимные аккаунты, сети ботов и фасадные организации без атрибуции к фактическому оператору.\u003c/p\u003e\n\u003ch2 id=\"защита\"\u003eЗащита\u003c/h2\u003e\n\u003cp\u003eЗащита против когнитивной войны не технологична. Она духовна и когнитивна. Апостол Павел выявил защиту два тысячелетия назад: \"приводим в повиновение Христу всякое помышление.\" Дисциплинированный разум — один, который оценивает информацию против неизменяемого стандарта истины — устойчив к манипуляции повествованием, эмоциональному захвату и социальному давлению.\u003c/p\u003e\n\u003cp\u003eПрактические оборонительные меры включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eКритика источника\u003c/strong\u003e — оценка того, кто получает прибыль от каждого повествования\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭмоциональное осознание\u003c/strong\u003e — признание, когда контент разработан для срабатывания эмоциональных ответов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОтложенный ответ\u003c/strong\u003e — пауза перед реагированием на провокационную информацию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРазнообразная информация\u003c/strong\u003e — поиск множественных перспектив, а не полагание на курируемые ленты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПисание как основание\u003c/strong\u003e — использование Слова Божьего как неизменяемой ориентира, против которого все претензии измеряются\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Трезвитесь, бодрствуйте, ибо противник ваш, диавол, ходит, как рыкающий лев, ища кого поглотить.\" — 1 Петра 5:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c
