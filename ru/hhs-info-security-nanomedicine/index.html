u003e\n\u003cp\u003eАрхитекторы системы наблюдения наномедицины полагали их работу останется скрытой внутри бюрократической машины Департамента здравоохранения и людских услуг. Они похоронили их программы в офисах с невинными именами, финансировали их исследование через каналы, которые обходят общественное внимание и связали их платформы наномедицины к инфраструктуре информационной безопасности, которая никогда не была разработана для здравоохранения — она была разработана для наблюдения. Но Бог, кто видит в темноте, видит их совет, и то, что они скрыли в глубоком, приносится на поверхность.\u003c/p\u003e\n\u003cp\u003eСвязь между офисом HHS информационной безопасности и программами исследования наномедицины раскрывает беспокоящую истину: тот же департамент, ответственный за обеспечение информации здравоохранения одновременно разрабатывает технологию, чтобы собрать биологическую информацию непосредственно от внутри человеческого тела. Лиса не просто охраняет курятник. Лиса построила курятник.\u003c/p\u003e\n\u003cp\u003eКак \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e из альбома Confliction напоминает нам, обман работает наиболее эффективно в учреждениях доверия. И как \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e предупреждает, наиболее опасная угроза — это та, встроенная в систему, которая была предназначена для защиты вас.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"архитектура-информации-hhs\"\u003eАрхитектура информации HHS\u003c/h2\u003e\n\u003ch3 id=\"что-офис-информационной-безопасности\"\u003eЧто офис информационной безопасности?\u003c/h3\u003e\n\u003cp\u003eДепартамент здравоохранения и людских услуг (HHS) — федеральный департамент, ответственный за защиту здоровья всех американцев и предоставление необходимых людских услуг. Внутри HHS, офис информационной безопасности (OIS) назначен с:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eЗащищающая конфиденциальность, целостность и доступность систем HHS информации\u003c/li\u003e\n\u003cli\u003eРазвитие и исполнение политики кибербезопасности по агентствам HHS\u003c/li\u003e\n\u003cli\u003eУправление риском к информационной технологической инфраструктуре\u003c/li\u003e\n\u003cli\u003eКоординирование с другими федеральными агентствами на информационной безопасности имеет значение\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНа поверхности, это стандартная функция безопасности правительственного IT. Но область \"информации\" управляемая HHS простирается далеко за пределами административных баз данных и электронных почтовых серверов. HHS управляет:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eЗаписями здравоохранения каждого американца, кто взаимодействовал с системой здравоохранения\u003c/li\u003e\n\u003cli\u003eБазами данных безопасности фармацевтики (VAERS, система сообщения о побочных событиях вакцины)\u003c/li\u003e\n\u003cli\u003eДанными клинического испытания для каждого одобренного фармацевтического продукта\u003c/li\u003e\n\u003cli\u003eГеномными базами данных, содержащими последовательности ДНК миллионов человек\u003c/li\u003e\n\u003cli\u003eДанными биозащиты и бионаблюдения\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКогда этот мандат \"информационной безопасности\" связан к наномедицине — инъецируемой технологии, которая генерирует биологические данные от внутри человеческого тела — последствия преобразуют от административного к экзистенциальному.\u003c/p\u003e\n\u003ch3 id=\"связь-наномедицины\"\u003eСвязь наномедицины\u003c/h3\u003e\n\u003cp\u003eHHS работает несколькими агентствами с прямым участием в исследовании нанотехнологии и развертывании:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНациональные Институты здравоохранения (NIH)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eNIH, агентство HHS, — крупнейший финансист биомедицинского исследования в мире. NIH-финансируемое исследование нанотехнологии включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИнъецируемые нанос-масштабные системы доставки лекарств\u003c/li\u003e\n\u003cli\u003eПлатформы наносенсора для постоянного биологического мониторинга\u003c/li\u003e\n\u003cli\u003eСамо-собирающиеся нанос-структуры для диагностических и терапевтических применений\u003c/li\u003e\n\u003cli\u003eСистемы доставки наночастиц, основанные на наночастице (платформа липидной наночастицы, используемая в прививках мРНК)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNIBIB NAN, национальный институт биомедицинского формирования изображения и биоинженерии финансирует исследование в системы, основанные на нанотехнологии, разработанные для работы внутри человеческого тела.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАдминистрация продовольствия и лекарства (FDA)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eFDA, другое агентство HHS, управляет продуктами, основанными на нанотехнологии медицины. Целевая группа нанотехнологии FDA была установлена развивать подходы регулирования для продуктов нанотехнологии. Однако структура регулирования FDA повторно была критикована для:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНеполучения достаточного тестирования безопасности для нанос-масштабных материалов\u003c/li\u003e\n\u003cli\u003eНе требующей конкретного раскрытия компонентов наночастицы в одобренных продуктах\u003c/li\u003e\n\u003cli\u003eРазрешив продуктам нанотехнологии быть одобренным под структурами, разработанными для обычных фармацевтик\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eВласть биомедицинского передовища исследования и развития (BARDA)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eBARDA, дом в HHS, финансирует разработку и закупку медицинских контрмер против биологических угроз. BARDA финансировал разработку прививок мРНК посредством операции Warp Speed и продолжает финансировать передовую фармацевтическую технологию, включая платформы нанотехнологии.\u003c/p\u003e\n\u003cp\u003eСходимость этих агентств — все под куполом HHS, все связанным к офису информационной безопасности — создает институциональный трубопровод, который простирается от исследования наномедицины (NIH) через нормативное одобрение (FDA) к закупке и развертыванию (BARDA), с информационным управлением и безопасностью (OIS), контролирующим данные, произведенные на каждом этапе.\u003c/p\u003e\n\u003cp\u003eАна Михалча, MD, PhD задокументировала на ее Substack, как институциональная архитектура HHS облегчает сокрытие нанотехнологии в фармацевтических продуктах. Др. Михалча утверждает, что агентства, ответственные за одобрение и развертывание нанотехнологии, также ответственны за контроль информации об этом — создание институционального конфликта интереса, который делает прозрачность невозможной.\u003c/p\u003e\n\u003ch2 id=\"инфраструктура-сбора-данных\"\u003eИнфраструктура сбора данных\u003c/h2\u003e\n\u003ch3 id=\"от-тела-к-базе-данных\"\u003eОт тела к базе данных\u003c/h3\u003e\n\u003cp\u003eСистемы нанотехнологии, разрабатываемые и развертываемые посредством программ, финансируемых HHS, — это не просто терапевтические. Они информационные. Они генерируют данные — биологические данные, физиологические данные, геномные данные — от внутри человеческого тела и передают те данные к внешним системам.\u003c/p\u003e\n\u003cp\u003eАрхитектура потока данных выглядит так:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eНаносенсоры в теле\u003c/strong\u003e собирают биологические данные (жизненные показатели, химические концентрации, неврологическая деятельность, генетическое выражение)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВнутренние системы связи\u003c/strong\u003e (структуры антенны, задокументированные в образцах крови) передают эти данные электромагнитно\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВнешние приемники\u003c/strong\u003e (инфраструктура 5G, устройства IoT, преданные приемники) захватывают переданные данные\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСистемы обработки данных\u003c/strong\u003e (облачные вычисления, анализ AI) обработка биологических данных\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСистемы управления информацией\u003c/strong\u003e (инфраструктура безопасности информации HHS) хранят, защищают и контролируют доступ к обработанным данным\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eОфис информационной безопасности HHS сидит на конце этого трубопровода — управляя наиболее интимными данными когда-либо собранными о человеческих существах: информация биологии в реальном времени, собранная от внутри тела без знания или согласия человека.\u003c/p\u003e\n\u003cp\u003eЭто не забота здравоохранения. Это биологическое наблюдение. И учреждение, ответственное за \"защиту\" этой информации, — то же учреждение, которое авторизовало его сбор.\u003c/p\u003e\n\u003ch3 id=\"hipaa-как-щит\"\u003eHIPAA как щит\u003c/h3\u003e\n\u003cp\u003eЗакон о переносимости и ответственности здравоохранения (HIPAA) представлен общественности как защита конфиденциальности — закон, который предотвращает неавторизованный доступ к информации здравоохранения. Но в контексте наблюдения наномедицины, HIPAA служит противоположной функцией: она создает правовую структуру, которая определяет, кто может получить доступ к биологическим данным, собранным от внутри тела, эффективно узаконивая сбор, пока ограничивая доступ к авторизованным сторонам.\u003c/p\u003e\n\u003cp\u003eHIPAA не предотвращает правительство от сбора ваших биологических данных. Она определяет условия, в которых правительство может использовать это. Она не защищает вас от наблюдения. Она регулирует наблюдение — давая это правовую структуру и институциональную легитимность.\u003c/p\u003e\n\u003ch2 id=\"пророческая-структура\"\u003eПророческая структура\u003c/h2\u003e\n\u003ch3 id=\"всевидящая-система\"\u003eВсевидящая система\u003c/h3\u003e\n\u003cp\u003eСистема наблюдения, позволенная наномедициной, представляет попытку создать всевидящую, всеведущую систему — технологическая всеведение, которая имитирует атрибуты Бога. Система стремится знать, что происходит внутри каждого человеческого тела в каждый момент — жизненные показатели, химические состояния, неврологическая деятельность, место расположения и поведение.\u003c/p\u003e\n\u003cp\u003eЭта технологическая всеведение — подделка Бога подлинной всеведущести. Бог знает каждый волос на вашей голове (Матфей 10:30). Система HHS наномедицины стремится к такой же степени детали знания — но для целей контроля, а не любви.\u003c/p\u003e\n\u003cp\u003eСистема биометрических зверя, описанная в Revelation 13 — система, которая отслеживает каждого человека и контролирует их экономическое участие — требует ровно этого уровня биологического наблюдения. Инфраструктура, разработанная посредством программ HHS-финансируемой наномедицины, — основание этой системы.\u003c/p\u003e\n\u003cp\u003eКупол firmament содержит все эти системы. Бог разместил купол, чтобы определить границы создания. В этих границах враг строит его системы подделки — подделка всеведущести посредством наблюдения, подделка вездесущести посредством электромагнитной сетки и подделка всемогущества посредством оружия направленной энергии. Но подделка всегда менее чем оригинал. Система может быть построена, но она не может превышать власть Того, кто разместил купол.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отражается посредством каждого коридора правительства сегодня. Когда Израиль требовал царя подобно другим нациям, Бог предупредил их ровно то, что произойдет — их сыновья взяты на войну, их дочери для обслуживания, их поля и виноградники захвачены, десятина всего конфискована. Они выбрали человеческое правительство над управлением Бога, и тирания последовала ровно как обещано. Ничего не изменилось. Современная политическая система — два крыла того же самого птица — слева и справа, республиканцы и демократы — все служат скрытой силовой структуре. Голосование за одну сторону — это выбор того, какое крыло взмахнет дальше, пока птица летит в том же самом направлении. Подлинная власть никогда не была на любом избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"ссылки-источника\"\u003eСсылки источника\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eДокументация HHS офиса информационной безопасности, организационная документация и заявления миссии\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eПортфолио исследования нанотехнологии NIH национального института биомедицинского формирования изображения и биоинженерии\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eОтчеты целевой группы нанотехнологии FDA и нормативное руководство\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eBARDA, документация закупки операции Warp Speed\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eАна Михалча, MD, PhD, anamihalceamdphd.substack.com, анализ институциональной архитектуры\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"найти-больше-информации\"\u003eНайти больше информации\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003
