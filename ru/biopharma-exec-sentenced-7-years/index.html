te\u003e\n\u003cp\u003eКогда Аман построил виселицу, чтобы повесить Мордехая, он не ожидал, что он сам будет повешен на них. Инструмент разрушения, который он создал для праведников, стал инструментом его собственного суда. Принцип абсолютный: Бог не посмеивается. То, что мужчина сеет, он пожинает - и урожай приходит в установленное Богом время, не человеческое.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дело\"\u003eДело\u003c/h2\u003e\n\u003cp\u003eМинистерство юстиции США добилось приговора к семи годам федеральной тюрьмы для старшего руководителя биофармацевтической компании, осужденного по множеству обвинений в мошенничестве, связанном с разработкой, маркетингом и распределением фармацевтических продуктов.\u003c/p\u003e\n\u003cp\u003eОбвинения включили:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭлектронное мошенничество (18 U.S.C. Section 1343):\u003c/strong\u003e Руководитель использовал электронные коммуникации для осуществления плана обмана инвесторов, регуляторов и пациентов относительно безопасности и эффективности продуктов компании.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗаговор с целью совершения мошенничества (18 U.S.C. Section 371):\u003c/strong\u003e Руководитель участвовал в скоординированном усилии среди офицеров компании, консультантов нормативной базы и фирм маркетинга для неправильного представления данных клинического испытания, подавления отчетов о побочных действиях и завышения претензий эффективности.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВнесение ложных заявлений правительству (18 U.S.C. Section 1001):\u003c/strong\u003e Руководитель подал или направил подачу ложной информации в FDA в связи с нормативной подачей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМошенничество с ценными бумагами (15 U.S.C. Section 78j(b)):\u003c/strong\u003e Руководитель сделал материально вводящие в заблуждение заявления инвесторам относительно трубопровода продуктов компании и нормативных перспектив, искусственно завышая цену акций компании.\u003c/p\u003e\n\u003cp\u003eСудья по вынесению приговора охарактеризовал поведение руководителя как \"рассчитанную кампанию обмана, которая ставила прибыль выше безопасности человека\" и отметил, что мошенничество поставило под угрозу здоровье пациентов, которые полагались на неправильно представленные данные безопасности для принятия медицинских решений.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон наблюдала в The Kingston Report: \"Приговор в семь лет демонстрирует, что руководители фармацевтических компаний могут быть личностно привлечены к ответственности за мошенничество. Это значимо, потому что промышленность работала десятилетия под предположением, что штрафы корпорации - штрафы, согласия-декреты, отложенные соглашения о преследовании - являются максимальным последствием для фармацевтического мошенничества. Когда руководитель идет в тюрьму, расчет меняется. Другие руководители должны теперь принимать личную уголовную ответственность в их принятие решений.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"прецедент\"\u003eПрецедент\u003c/h2\u003e\n\u003cp\u003eБиофармацевтическая промышленность имеет давнюю историю уголовного мошенничества - но столь же долгую историю корпоративных урегулирований, которые защищают отдельных руководителей от личных последствий:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePfizer (2009):\u003c/strong\u003e Урегулирование в размере $2,3 миллиарда -- наибольший случай фармацевтического мошенничества в американской истории в то время -- за незаконный маркетинг лекарств для несанкционированного использования. Ни один отдельный руководитель не был заключен в тюрьму.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGlaxoSmithKline (2012):\u003c/strong\u003e Урегулирование в размере $3 миллиарда за мошеннический маркетинг, невозможность сообщить данные безопасности и рикошеты врачам. Ни один отдельный руководитель не был заключен в тюрьму.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eJohnson \u0026#x26; Johnson (2013):\u003c/strong\u003e Урегулирование в размере $2,2 миллиарда за маркетинг лекарств для несанкционированного использования и выплаты рикошетов. Ни один отдельный руководитель не был заключен в тюрьму.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePurdue Pharma (2020):\u003c/strong\u003e Урегулирование в размере $8,3 миллиарда за свою роль в кризисе опиоидов, который убил более 500 000 американцев. Члены семьи Sackler договорились о личном иммунитете от гражданских исков как часть урегулирования. Ни один член семьи не был заключен в тюрьму.\u003c/p\u003e\n\u003cp\u003eВ каждом случае корпоративная сущность платила штраф - часто дроби дохода, генерируемого мошенничеством - и отдельные руководители ходили свободно. Штрафы были поглощены как стоимость ведения бизнеса, и мошеннические практики продолжали под новыми названиями продуктов и новыми маркетинговыми стратегиями.\u003c/p\u003e\n\u003cp\u003eПриговор к семи годам тюрьмы нарушает этот паттерн. По первый раз в значительном случае руководитель фармацевтической компании сталкивается с личными последствиями - потеря свободы, не просто потеря корпоративного дохода.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"последствия-для-подотчетности-covid-19\"\u003eПоследствия для подотчетности COVID-19\u003c/h2\u003e\n\u003cp\u003eПриговор ведет себя с последствиями для обвинений в мошенничестве вакцины COVID-19, задокументированных во всей этой серии статей:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЛичная ответственность возможна.\u003c/strong\u003e Если руководители фармацевтических компаний могут быть осуждены и заключены в тюрьму за мошенничество, связанное с фармацевтическими продуктами, то же самое юридическое структура применяется к руководителям в Pfizer, Moderna и других компаний, вовлеченных в программу вакцинации COVID-19.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШтрафы корпорации - недостаточные сдерживающие факторы.\u003c/strong\u003e История фармацевтического мошенничества демонстрирует, что штрафы корпорации не меняют поведение корпорации. Только личная уголовная ответственность - перспектива отдельных руководителей, идущих в тюрьму, - создает подлинный сдерживающий фактор.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМинистерство юстиции может преследовать.\u003c/strong\u003e Успешное преследование министерства юстиции в этом случае демонстрирует, что Министерство обладает юридическими инструментами, исследовательской емкостью и институциональной волей преследовать руководителей фармацевтических компаний. Вопрос о том, будет ли оно применять эти инструменты к мошенничеству, связанному с COVID-19, политический, а не правовой.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческое-измерение\"\u003eПророческое измерение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Нет ничего скрытого, что не открылось бы; и ничто не было б тайно, чтобы не сделалось явным.\" — Марк 4:22\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eОсуждение руководителя демонстрирует, что скрытое мошенничество может быть раскрыто, преследуется и наказано. Система безнаказанности не непроницаема. Стены, которые защищают руководителей фармацевтических компаний от личных последствий, могут быть нарушены - если существует политическая воля, если доказательства собрано и если суды функционируют как инструменты правосудия, а не учреждения, защищающие учреждение.\u003c/p\u003e\n\u003cp\u003eСемь лет в тюрьме. Это не достаточно для масштаба фармацевтического мошенничества, которое было совершено против американского народа. Но это доказательство того, что система безнаказанности может быть сломана - что один руководитель в одном случае столкнулся с последствием, которое каждый мошеннический руководитель заслуживает.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-самуила-8\"\u003eПредупреждение 1 Самуила 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всем, что они говорят тебе; ибо они отвергли не тебя, а отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Самуила 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Самуила 8 отзывается через каждый коридор правительства сегодня. Когда Израиль требовал царя как другие нации, Бог предупредил их именно то, что произойдет - их сыновья взяты на войну, их дочери в сервис, их поля и виноградники захвачены, десятина всего конфискована. Они выбрали человеческое правительство над божественным правлением, и тирания следовала именно по мере обещания. Ничто не изменилось. Современная политическая система - две крылья одной и той же птицы - левая и правая, республиканская и демократическая - все служит той же скрытой силовой структуре. Голосование за любую сторону - это выбор, которое крыло взмахивает далее, пока птица летает в том же направлении. Подлинная власть никогда была на любом бюллетене.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дополнительная-информация\"\u003eДополнительная информация\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/213-Predictive_Policing.mp4\"\u003ePredictive Policing\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eАман построил виселицу для Мордехая и был повешен на них сам. Руководитель биофармацевтической компании, который построил карьеру на мошенничестве, был приговорен к семи годам в тюрьме, которую он никогда не ожидал видеть. \"Не обманывайтесь, Бог не посмеивается над собою\" (Галатам 6:7). Фармацевтическая промышленность работала десятилетия под предположением, что отдельные руководители иммунны от последствий корпоративного мошенничества. Это предположение было разрушено - одним случаем, одним осуждением, одним приговором. Виселица, которую промышленность построила для общественной подотчетности, заявила один из своих собственных. Может быть, это первая из многих.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Министерство Юстиции США приговорило руководителя BioPharma к 7 годам тюрьмы\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Министерство юстиции США добилось приговора к 7 годам тюремного заключения для руководителя биофармацевтической компании, осужденного за мошенничество, установив прецедент подотчетности фармацевтической компании.\"}],[\"$\",\"div\",null
