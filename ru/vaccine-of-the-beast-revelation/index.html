 Бога и в телах ваших и в душах ваших, которые суть Божии.\" — 1 Коринфянам 6:19-20\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eТело -- это не машина. Это не сосуд, чтобы быть улучшенным, модифицированным или переполненным по желанию правительств или корпораций. В соответствии с Писанием, тело верующего -- это храм Святого Духа -- священное жилище, разработанное Богом, куплено кровью Христа и принадлежащее Творцу. То, что входит в этот храм, имеет значение. Что искажает этот храм, имеет значение. Что оскверняет этот храм, имеет вечное значение.\u003c/p\u003e\n\u003cp\u003eДревний мир понимал, что волшебство и физические вещества были связаны. Греческое слово \u003cem\u003eфармакия\u003c/em\u003e -- из которого мы получаем \"аптека\" и \"фармацевтическая\" -- означает волшебство, использование препаратов и зелий в связи с оккультизмом. В Откровении фармакия перечисляется среди грехов, за которые судятся нации. Связь между веществами, инъецированными в тело, и духовной коррупцией -- это не современная теория заговора. Это библейская категория, установленная в оригинальных языках Писания.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/51-The_Covenant_Blood.mp4\"\u003eThe Covenant Blood\u003c/a\u003e говорит о святости крови -- и крови Христа, которая искупает, и крови человеческого тела, которая несет жизнь. \"Жизнь плоти в крови\" (Левит 17:11). Когда кровь искажена, жизнь искажена. Когда храм осквернен, присутствие Бога затрагивается. Это не метафора. Это богословие с биологическими последствиями.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"фармакия-библейская-категория\"\u003eФармакия: библейская категория\u003c/h2\u003e\n\u003cp\u003eСлово \u003cem\u003eфармакия\u003c/em\u003e появляется в Новом Завете в контекстах, которые связывают его непосредственно с обманом конца времен и судом:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГалатам 5:20\u003c/strong\u003e — \"Идолослужение, волшебство [\u003cem\u003eфармакия\u003c/em\u003e], вражда, распри, ревность, гневы, ссоры...\" Фармакия перечислена среди \"дел плоти\" -- грехов, которые предотвращают наследование царства Божьего.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОткровение 9:21\u003c/strong\u003e — \"И не раскаялись в убийствах своих, ни в волшебстве [\u003cem\u003eфармакия\u003c/em\u003e] своем, ни в блудодеянии своем, ни в татьбах своих.\" После шестой трубной казни, которая убивает одну треть человечества, выжившие все еще отказываются раскаяться в своей фармакии.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОткровение 18:23\u003c/strong\u003e — \"Ибо волшебством [\u003cem\u003eфармакия\u003c/em\u003e] твоим введены в прелесть все народы.\" Это говорится о Таинственном Вавилоне -- великой блуднице, чья фармакия обманула все нации. Не некоторые нации. Все нации. Как исследовано в \u003ca href=\"/mystery-babylon-burns-empire/?lang=ru\"\u003eMystery Babylon Burns: Identifying the End-Times Empire\u003c/a\u003e, это универсальное обманывание через фармакию -- одна из определяющих характеристик Таинственного Вавилона.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОткровение 21:8\u003c/strong\u003e — \"Боязливых же и неверных, и гнусных и убийц, и любодеев и чародеев [\u003cem\u003eфармакос\u003c/em\u003e], и идолослужителей и всех лжецов участь в озере, горящем огнем и серою.\" Те, кто практикуют фармакию, сталкиваются с озером огня.\u003c/p\u003e\n\u003cp\u003eБиблейская категория фармакии охватывает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИспользование препаратов и зелий для духовной манипуляции\u003c/li\u003e\n\u003cli\u003eСвязь между физическими веществами и демоническим влиянием\u003c/li\u003e\n\u003cli\u003eОбманывание наций через фармацевтические средства\u003c/li\u003e\n\u003cli\u003eКоррупцию тела через вещества, которые оскверняют храм\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"тело-как-поле-боя\"\u003eТело как поле боя\u003c/h2\u003e\n\u003cp\u003eТело всегда было полем боя духовной войны. Стратегия Змея в Эдеме нацелена на тело: \"ешьте плод.\" Результатом было физическое смерти, входящей в человеческое состояние. Стратегия Змея не изменилась. Он нацеливается на тело, потому что тело -- это храм.\u003c/p\u003e\n\u003cp\u003eРассмотрите прогрессию:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБытие 3\u003c/strong\u003e — Змей вводит вещество (запрещённый плод), которое искажает тело и отделяет человечество от Бога. Коррупция входит через потребление. Последствие смерти.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБытие 6\u003c/strong\u003e — Падшие ангелы искажают человеческое тело через генетическую гибридизацию. Физическая коррупция настолько серьезна, что Бог уничтожает землю потопом, сохраняя только семью Ноя -- чья генетическая линия была неискаженной (\u003cem\u003eтамим\u003c/em\u003e, \"совершенный в своих поколениях\").\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЛевит 11-15\u003c/strong\u003e — Бог устанавливает тщательные законы, регулирующие то, что входит в тело (диетические законы), что касается тела (законы чистоты), и что загрязняет тело (законы о болезни). Принцип: целостность тела имеет значение для Бога, потому что тело является сосудом духа.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДаниил 1\u003c/strong\u003e — Даниил отказывается от царской пищи и вина, предпочитая поддерживать чистоту тела в Вавилоне. Его отказ -- это не диетическое предпочтение. Это духовное сопротивление -- поддержание целостности храма перед давлением вавилонского давления к соответствию.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМатфей 15:11\u003c/strong\u003e — Иисус уточняет: \"Не то, что входит в уста, оскверняет человека; но то, что выходит из уст, то оскверняет человека.\" Это рассматривает моральное осквернение через речь и мысль. Это не отрицает принцип, что физические вещества могут искажать тело -- язык Павла о храме в 1 Коринфянам делает это ясным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1 Коринфянам 3:16-17\u003c/strong\u003e — \"Не знаете ли, что вы храм Божий и Дух Божий живет в вас? Если кто разорит храм Божий, того покарает Бог; ибо храм Божий свят; а этот храм -- вы.\" Оскверните храм, приносит разрушение. Предупреждение суровое.\u003c/p\u003e\n\u003cp\u003eТело является полем боя, потому что оно храм. И текущая эра произвела наиболее агрессивную атаку на целостность тела в истории человечества.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"современная-фармацевтическая-империя\"\u003eСовременная фармацевтическая империя\u003c/h2\u003e\n\u003cp\u003eГлобальная фармацевтическая промышленность генерирует более 1,5 триллиона долларов в годовом доходе. Это одна из самых мощных отраслей на земле -- влияние государственной политики, финансирование медицинских исследований, формирование нарративов общественного здравоохранения и определение, какие вещества входят в тела миллиардов людей.\u003c/p\u003e\n\u003cp\u003eИстория отрасли является поучительной:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМедицина Рокфеллера.\u003c/strong\u003e В начале 20-го века Фонд Рокфеллера и Фонд Карнеги систематически переструктурировали американское медицинское образование через Отчет Флексера 1910 года. Школы, которые преподавали лечение травами, гомеопатию, натуропатию и другие традиционные методы исцеления, были лишены финансирования и закрыты. Только школы, которые преподавали фармацевтическое лечение, основанное на аллопатической медицине, получали финансирование. Результатом была медицинская система, полностью зависящая от фармацевтических продуктов -- система, разработанная не для исцеления, но для создания пожизненных клиентов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОперация Скрепка.\u003c/strong\u003e После Второй мировой войны Соединенные Штаты импортировали более 1600 нацистских ученых, инженеров и техников -- многие из которых проводили медицинские эксперименты на узниках концентрационных лагерей. Эти ученые были интегрированы в американские фармацевтические, военные и разведывательные исследовательские программы. Развитие фармацевтической промышленности после войны было напрямую влияни учеными, которые экспериментировали на людях без согласия.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВращающаяся дверь.\u003c/strong\u003e Старшие руководители вращаются между фармацевтическими компаниями и нормативными органами (FDA, CDC, NIH, WHO) с регулярностью. Органы, уполномоченные защищать общественное здравоохранение от фармацевтического вреда, укомплектованы людьми, чьи карьеры, отношения и финансовые интересы встроены в фармацевтическую промышленность. Это не надзор. Это захват.\u003c/p\u003e\n\u003cp\u003eОтрасль, которая говорит вам, что инъецировать в ваше тело -- храм Святого Духа -- это отрасль, построенная на подавлении естественной медицины, под влиянием нацистских исследователей и управляемая нормативными органами, захваченными самой отраслью.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"платформа-мрнк-переписывание-чертежей\"\u003eПлатформа мРНК: переписывание чертежей\u003c/h2\u003e\n\u003cp\u003eПлатформа технологии мРНК, введенная в период COVID-19, представляет фундаментальное отклонение от традиционной вакцинации. Традиционные вакцины вводят ослабленные или инактивированные патогены для стимуляции иммунного ответа. Технология мРНК инструктирует собственные клетки организма производить иностранные белки.\u003c/p\u003e\n\u003cp\u003eЭто критическое различие. Традиционная вакцинация вводит вещество извне тела. Технология мРНК переполняет собственную машину организма производить вещество, которое организм не будет естественно производить. Тело становится фабрикой для инородного белка -- его собственные клетки со-выбраны для служения внешне определенной цели.\u003c/p\u003e\n\u003cp\u003eПоследствия являются теологическими, а также медицинскими:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eТело инструктируется делать что-то, что оно не было разработано для этого\u003c/li\u003e\n\u003cli\u003eГенетическая машина клетки руководится инженерным человеком кодом\u003c/li\u003e\n\u003cli\u003eХрам переполняется строителями Вавилона\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНезависимо от того, какой конкретный медицинский продукт составляет \"метку зверя,\" принцип, устанавливаемый, является ясным: внешние органы власти претендуют на право инструктировать клетки вашего тела производить вещества, которые служат их целям. Автономия вашего тела -- его целостность как храма Божьего -- подчинена авторитету фармацевтических и государственных систем.\u003c/p\u003e\n\u003cp\u003eКак исследовано в \u003ca href=\"/mark-of-the-beast-digital-id/?lang=ru\"\u003eThe Mark of the Beast: Digital ID and the End of Freedom\u003c/a\u003e, метка -- это механизм соответствия -- что-то, что должно быть принято для участия в обществе. Прецедент, установленный обязательными или вынужденными медицинскими вмешательствами -- где занятость, образование, путешествие и социальное участие условны на принятии фармацевтического продукта в ваше тело -- это точная модель, которую использует метка зверя.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"соответствие-через-медицину\"\u003eСоответствие через медицину\u003c/h2\u003e\n\u003cp\u003eПериод COVID-19 продемонстрировал, как фармацевтическое соответствие может быть использовано как инструмент социального контроля:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eМандаты занятости\u003c/strong\u003e — рабочие были обязаны принять инъекцию или потерять свои работы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОграничения путешествия\u003c/strong\u003e — международные и даже внутренние путешествия требовали доказательства инъекции\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбразовательные требования\u003c/strong\u003e — студентов требовали принять инъекцию для посещения занятий\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоциальное исключение\u003c/strong\u003e — рестораны, площадки и общественные пространства требовали доказательство инъекции для входа\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФинансовое давление\u003c/strong\u003e — страховые ставки, государственные пособия и финансовые услуги были привязаны к статусу инъекции\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоциальное стыдение\u003c/strong\u003e — те, кто отказался, были публично маркированы как опасные, эгоистичные и анти-научные\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не мера здравоохранения. Это модель соответствия -- одна и та же модель, описанная в Откровении 13:17: \"никто не может покупать или продавать, кроме того, кто имеет метку.\" Конкретное содержание инъекции менее значительно, чем устанавливаемый принцип: принимать то, что система ставит в ваше тело, или быть исключенным из общества.\u003c/p\u003e\n\u003cp\u003eИнфраструктура фармацевтического соответствия -- записи о цифровой вакцинации, проверка QR-кода, мандаты работодателей, ограничения путешествия -- является бета-тестом для метки зверя. Технология, политики, механизмы реализации и социальное кондиционирование все на месте. Следующая итерация должна добавить только постоянную идентификацию (биометрическую или имплант) и универсальный объем.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"коррупция-крови\"\u003eКоррупция крови\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ибо жизнь плоти в крови, и Я дал ее вам на жертвеннике для искупления душ ваших, ибо кровь есть жизнь.\" — Левит 17:11\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКровь является священной в Писании. Она несет жизнь. Она делает искупление. Она запечатывает заветы. Кровь Христа -- центральный элемент христианского спасения -- \"кровь Иисуса Христа, Сына Его, очищает нас от всякого греха\" (1 Иоанна 1:7).\u003c/p\u003e\n\u003cp\u003eИсследователи, исследующие образцы крови от лиц, которые получили инъекции мРНК, сообщили об аномалиях, включая необычные структуры свертывания, самоассемблирующиеся образования, похожие на нанотехнологию, и изменения в морфологии кровяных клеток, видимые под темнопольной микроскопией. Независимо от того, представляют ли эти наблюдения загрязнение, биологические реакции на спайк-белок или нечто более тревожное, изменение человеческой крови через фармацевтическое вмешательство повышает глубокие вопросы о святости самой священной жидкости организма.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в \u003ca href=\"/pharmakeia-sorcery-pharmaceuticals/?lang=ru\"\u003ePharmakeia: The Sorcery of Modern Medicine\u003c/a\u003e, изменение крови организма через фармацевтическую промышленность и биологию вписывается в библейскую категорию фармакии -- использование веществ для достижения результатов, которые обходят Божий замысел для человеческого тела. Кровь -- это не товар. Это жизнь плоти. И те, кто это искажает, вмешиваются в что-то, что Бог объявил священным.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"храм-и-мерзость\"\u003eХрам и мерзость\u003c/h2\u003e\n\u003cp\u003eДаниил 9:27 и Матфей 24:15 описывают \"мерзость запустения\" -- нечто помещенное в святое место, которое оскверняет храм и делает его пустым. На протяжении всей библейской истории храм был осквернен, когда что-то нечистое было принесено в его священное пространство:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eАнтиох Епифан принес в жертву свинью на алтаре и возвел статую Зевса в Храме (167 до н.э.)\u003c/li\u003e\n\u003cli\u003eРимские стандарты с языческими изображениями были принесены в Иерусалим (н.э. 70)\u003c/li\u003e\n\u003cli\u003eПророчествуемый Антихрист установит мерзость, которая делает запустение в восстановленном Храме\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЕсли тело верующего -- это храм Святого Духа, то \"мерзость запустения\" в теле было бы что-то помещенное в храм, которое его оскверняет и вызывает отход Духа. Это не утверждение, что какой-либо конкретный медицинский продукт является мерзостью запустения. Это признание того, что принцип осквернения храма применяется к телу, и что входит в тело, имеет духовное, а также физическое значение.\u003c/p\u003e\n\u003cp\u003eВопрос, который должен задать каждый верующий, -- это не просто \"это безопасно?\" но \"это почитает храм?\" Не просто \"это предотвратит болезнь?\" но \"это будет оскверняет жилище Святого Духа?\" Медицинское учреждение задает только первый вопрос. Писание требует обоих.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"различение-в-последние-дни\"\u003eРазличение в последние дни\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Возлюбленные! не всякому духу верьте, но испытывайте духов, от Бога ли они, потому что много лжепророков появилось в мире.\" — 1 Иоанна 4:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПоследние дни требуют необычайного различения. Обман изощрен, давление интенсивно, и последствия неправильного выбора вечны. Ответственность верующего состоит в:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЗнайте, что Писание говорит о теле.\u003c/strong\u003e Это храм Святого Духа. Он был куплен за цену. Он должен быть использован для прославления Бога. Оскверните это приносит разрушение.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПоймите категорию фармакии.\u003c/strong\u003e Фармацевтические продукты не являются духовно нейтральными. Библейская категория фармакии связывает физические вещества с духовной коррупцией. Не каждое лекарство является волшебством -- но система, которая производит и требует фармацевтического соответствия, работает в той же духовной структуре, о которой предупреждает Писание.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eУзнайте модель соответствия.\u003c/strong\u003e Образец \"принять это в ваше тело или быть исключенным из общества\" -- это образец метки. Конкретный продукт может измениться. Принцип не.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eСопротивляйтесь давлению.\u003c/strong\u003e Социальное давление, экономическое давление и государственное давление будут интенсивными. Система обучает население принимать соответствие тела как цена социального участия. Каждая итерация нормализует следующую.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eДоверяйте Божьему замыслу.\u003c/strong\u003e Человеческое тело было разработано Богом с иммунной системой, способностью исцеления и стойкостью, которая не требует фармацевтического вмешательства для функционирования. Доверие Божьему замыслу не является анти-научным. Это про-творение -- почитание Творца путем доверия телу, которое Он создал.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство Ховарда Питтмана о предсмертном опыте -- Предупреждение об конце времени, которое дал ему Бог\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические доверительные: раскрытые позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia -- The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eVaccine Of The Beast\u003c/a\u003e — Инъекция и библейское пророчество\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/317-The_Vaccination_Booths.mp4\"\u003eThe Vaccination Booths\u003c/a\u003e — Инфраструктура метки\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/487-Mark_Of_The_Nanobot.mp4\"\u003eMark Of The Nanobot\u003c/a\u003e — Нанотехнология и метка зверя\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mark-of-the-beast-digital-id/?lang=ru\"\u003eThe Mark of the Beast: Digital ID and the End of Freedom\u003c/a\u003e — Инфраструктура соответствия, которая соединяет фармацевтические мандаты с пророческим исполнением\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pharmakeia-sorcery-pharmaceuticals/?lang=ru\"\u003ePharmakeia: The Sorcery of Modern Medicine\u003c/a\u003e — Более глубокая история фармацевтического волшебства и его библейского контекста\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eВаше тело -- это храм Святого Духа. Он был разработан Богом, куплен Христом и обитаем Духом. То, что входит в этот храм, имеет значение -- не только медицинское, но духовное, не только физическое, но вечное. Нации обманываются фармакией. Система требует соответствия. Давление принять, что органы власти инъецируют в ваше тело, интенсивно возрастает с каждым прошедшим годом. Но Бог, который разработал храм, не оставил его. Он, который создал иммунную систему, не нуждается в фармацевтических добавках для защиты Его людей. И Он, который сказал \"выйди из нее, народ Мой,\" говорит с срочностью к поколению, которое сталкивается с выбором между телесным соответствием системе зверя и телесной целостностью перед Богом. Храм священен. Охраняйте его. Кровь -- это жизнь. Защитьте её. Тело -- это не ваше для капитуляции любой системе, которая претендует на авторитет над тем, чт
