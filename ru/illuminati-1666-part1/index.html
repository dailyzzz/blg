 является одним из самых судьбоносных в скрытой истории мира. В то время как Великий пожар Лондона привлек внимание общественности, а чума опустошала Европу, происходила духовная революция, которая перестроит тайные властные структуры Запада на столетия вперед. Возвышение Шабтая Цви как лжемессии, последующее саббатианское движение и иезуитские манипуляции этими событиями создали поддельный духовный порядок, который сохраняется в тени до сих пор. Понимание 1666 года необходимо для понимания Иллюминатов, тайных обществ и невидимого правительства, которое контролирует современный мир.\u003c/p\u003e\n\u003cp\u003eОколосмертный опыт Говарда Питтмана раскрыл духовную иерархию необычайной сложности — три неба, организованные демонические силы и систему обмана настолько тщательную, что 97,5% человечества идет широкой дорогой к разрушению, никогда не воспринимая силы, направляющие их шаги. События 1666 года представляют собой поворотный момент в этой духовной войне — момент, когда противник развернул один из своих самых амбициозных обманов, создав поддельное мессианское движение, которое создаст постоянную инфраструктуру духовной подрывной деятельности. Как было сказано Питтману, «Вы называете меня Господом, но вы никогда не делали меня Господом» — и саббатианская ересь создала целую богословскую структуру для называния зла «Господом», служа противнику.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов, уже столетний к 1666 году, сыграл критическую роль в манипулировании этими событиями. Оценка Наполеона — «Иезуиты — это военная организация, а не религиозный орден... цель — власть» — объясняет их интерес к каждому крупному духовному и политическому потрясению. Иезуиты увидели в саббатианском движении возможность продвинуть свою собственную программу глобального контроля, и их манипуляция кризисом произведет последствия, которые отзываются до наших дней. Треки Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e освещают духовную динамику, которая сделала эти события возможными.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"мир-1666-года\"\u003eМир 1666 года\u003c/h2\u003e\n\u003ch3 id=\"цивилизация-в-кризисе\"\u003eЦивилизация в кризисе\u003c/h3\u003e\n\u003cp\u003eСемнадцатый век был периодом необычайных потрясений в западной цивилизации. Тридцатилетняя война (1618-1648) опустошила Центральную Европу, убив около восьми миллионов человек и оставив целые регионы обезлюдевшими. Английская гражданская война свергла и казнила короля. Чума неоднократно прокатывалась по Европе, убив еще миллионы. Великий пожар Лондона в 1666 году уничтожил большую часть величайшего города в англоязычном мире.\u003c/p\u003e\n\u003cp\u003eДля еврейских общин по всей Европе и Османской империи ситуация была особенно тяжелой. Столетия преследований, изгнаний и насилия создали население, отчаянно жаждущее избавления. Инквизиция, осуществляемая католической церковью с участием иезуитов, заставила миллионы евреев обратиться или столкнуться с пытками и смертью. Многие обратились внешне, сохраняя свою веру втайне — практика, известная как крипто-иудаизм. Этот опыт принудительной внешней конформности при сохранении скрытой внутренней истины глубоко сформирует саббатианское движение и его наследие.\u003c/p\u003e\n\u003cp\u003eСовпадение катастрофы и отчаяния создало условия для мессианского взрыва. Еврейская мистическая традиция утверждала, что 1666 год — соответствующий определенным каббалистическим вычислениям — будет годом искупления. Когда появилась харизматичная фигура, заявляющая, что он Мессия, ответ был ошеломляющим.\u003c/p\u003e\n\u003ch3 id=\"каббалистический-контекст\"\u003eКаббалистический контекст\u003c/h3\u003e\n\u003cp\u003eКаббала, еврейская мистическая традиция, пережила глубокий ренессанс в шестнадцатом веке благодаря учениям Исаака Лурии в Цфате. Лурианская Каббала учила, что божественное творение претерпело катастрофическое разрушение — «разбивание сосудов» — которое рассеяло божественные искры по всему материальному миру. Процесс искупления включал сбор этих искр и восстановление божественного порядка через мистическую практику и праведное действие.\u003c/p\u003e\n\u003cp\u003eЭта структура создала богословское ожидание, что Мессия совершит космическое восстановление — не просто политическое освобождение, но трансформацию самой природы реальности. Ожидания, возложенные на грядущего Мессию, были, таким образом, бесконечны по объему, что сделало обман еще более разрушительным, когда он пришел.\u003c/p\u003e\n\u003ch2 id=\"шабтай-цви-лжемессия\"\u003eШабтай Цви: Лжемессия\u003c/h2\u003e\n\u003ch3 id=\"человек-и-движение\"\u003eЧеловек и движение\u003c/h3\u003e\n\u003cp\u003eШабтай Цви родился в Смирне (современный Измир, Турция) в 1626 году. С юности он проявлял как блеск, так и нестабильность — глубокое знание каббалистических текстов в сочетании с поведением, которое чередовалось между экстатическим вдохновением и темной депрессией. Современные ученые предполагают, что он страдал биполярным расстройством; духовный анализ предполагает, что он был под влиянием духовных сил, которые использовали его нестабильность как дверь для необычайного обмана.\u003c/p\u003e\n\u003cp\u003eВ 1665 году Цви был провозглашен Мессией Натаном из Газы, молодым каббалистом, который обеспечил богословскую структуру для мессианских претензий Цви. Роль Натана была критической — он был богословом для пророка Цви, предоставляя интеллектуальную легитимность претензиям, которые в противном случае могли бы быть отклонены как бред больного ума. Партнерство между харизматичной фигурой и интеллектуальным помощником следует образцу, который будет повторяться на протяжении всей истории подрывных движений.\u003c/p\u003e\n\u003cp\u003eОтвет на провозглашение Цви был ошеломляющим по своему масштабу. Еврейские общины от Италии до Польши, от Амстердама до Йемена, приняли Цви как долгожданного Мессию. Торговля была заброшена, предприятия были закрыты, и были сделаны приготовления к неминуемому искуплению. В некоторых общинах свитки Торы были сожжены в ожидании нового закона, который установит Мессия. Пылкость была настолько распространенной, что даже многие христианские наблюдатели обратили внимание, и некоторые интерпретировали движение через свои собственные эсхатологические рамки.\u003c/p\u003e\n\u003ch3 id=\"вероотступничество\"\u003eВероотступничество\u003c/h3\u003e\n\u003cp\u003eВ сентябре 1666 года Шабтай Цви был доставлен к османскому султану и получил выбор: обратиться в ислам или умереть. Цви выбрал обращение, надев тюрбан и взяв имя Азиз Мехмед Эффенди. Для большинства его последователей это был конец — разрушительное разочарование, которое подтвердило худшие опасения его критиков.\u003c/p\u003e\n\u003cp\u003eНо для значительного меньшинства вероотступничество было не поражением, а откровением. Натан из Газы и другие саббатианские богословы разработали необычайный доктринальный ответ: нисхождение Мессии в царство зла было необходимым шагом в процессе искупления. Так же, как божественные искры были рассеяны в нечистых оболочках материального мира, Мессия должен был спуститься в самые темные царства, чтобы собрать искры, застрявшие там. Обращение в ислам — принятие того, что казалось злом — на самом деле было высшей формой святости.\u003c/p\u003e\n\u003cp\u003eЭта доктрина — что священное достигается через нарушение священного, что искупление приходит через грех, что Мессия служит Богу, кажущимся служащим злу — была самой опасной богословской инновацией в современной истории. Она обеспечила структуру для систематического переворачивания морали: то, что Бог называет злом, становится добром, когда совершается на службе «высшей» цели космического искупления.\u003c/p\u003e\n\u003ch2 id=\"франкистское-наследие\"\u003eФранкистское наследие\u003c/h2\u003e\n\u003ch3 id=\"яков-франк-и-доктрина-священного-греха\"\u003eЯков Франк и доктрина священного греха\u003c/h3\u003e\n\u003cp\u003eСтолетие спустя после Шабтая Цви Яков Франк (1726-1791) возродил и радикализировал саббатианскую доктрину. Франк провозгласил себя реинкарнацией Цви и воплощением Бога. Его богословие довело саббатианское переворачивание до его логической крайности: весь традиционный закон должен быть нарушен, вся условная мораль должна быть свергнута, и путь к искуплению проходит через намеренное принятие преступления.\u003c/p\u003e\n\u003cp\u003eДвижение Франка, известное как франкизм, практиковало ритуальные сексуальные преступления, включая оргии и инцест, как религиозные таинства. Нарушение сексуальных норм было не просто разрешено — оно требовалось как духовная практика. Эта богословская структура создала постоянный шаблон для сакрализации извращения, который будет влиять на тайные общества на протяжении столетий.\u003c/p\u003e\n\u003cp\u003eФранк в конечном итоге обратился в католичество, представляя себя католической церкви как искренний обращенный, который может привести своих последователей в лоно. Церковь, и особенно иезуиты, увидели возможность в обращении Франка. Вот был человек, который мог доставить тысячи еврейских обращенных — приз, который иезуиты с их миссионерскими амбициями ценили высоко.\u003c/p\u003e\n\u003ch3 id=\"альянс-иезуитов-и-франкистов\"\u003eАльянс иезуитов и франкистов\u003c/h3\u003e\n\u003cp\u003eОтношения между движением Франка и орденом иезуитов представляют собой один из самых значительных и наименее понятых альянсов в современной истории. Иезуиты облегчили обращение Франка и предоставили институциональную поддержку интеграции его движения в католическое общество. Франк и многие из его последователей вошли в католические аристократические круги, вступили в браки с благородными семьями и утвердились в властных структурах европейского общества.\u003c/p\u003e\n\u003cp\u003eИнтерес иезуитов к франкистам был стратегическим. Движение, которое практиковало слепое послушание своему лидеру, сохраняло строгую секретность и действовало через скрытую внутреннюю структуру, было естественным союзником для ордена, который действовал на идентичных принципах. «Католические тайны» раскрывают, что иезуиты требуют «слепого послушания» и что «каждый вид порока находит в них покровительство» — описание, которое в равной степени применимо к франкистскому движению.\u003c/p\u003e\n\u003cp\u003eАльянс создал гибридную сеть, которая объединила организационную дисциплину иезуитов с богословским нигилизмом франкистов. Члены этой сети могли действовать в католическом обществе, сохраняя при этом скрытые убеждения и практики, которые были антитетичны католическому учению. Эта модель внешней конформности со скрытой внутренней практикой — укорененная в крипто-еврейском опыте эпохи инквизиции — стала операционным шаблоном для тайных обществ, которые появятся в восемнадцатом веке.\u003c/p\u003e\n\u003ch2 id=\"дорога-к-иллюминатам\"\u003eДорога к Иллюминатам\u003c/h2\u003e\n\u003ch3 id=\"с-1666-по-1776\"\u003eС 1666 по 1776\u003c/h3\u003e\n\u003cp\u003eСтолетие между вероотступничеством Шабтая Цви и основанием Баварских Иллюминатов в 1776 году было инкубационным периодом для самого амбициозного заговора в человеческой истории. В этот период саббатианско-франкистское движение слилось с существующими сетями тайных обществ — масонством, розенкрейцерством и различными герметическими орденами — чтобы создать инфраструктуру подрывной деятельности, которая в конечном итоге бросит вызов установленному порядку Европы и мира.\u003c/p\u003e\n\u003cp\u003eСвязь между этими движениями была не теоретической — она была личной. Лица, связанные с саббатианско-франкистскими сетями, были среди основателей и ранних членов масонских лож по всей Европе. Масонский акцент на секретности, иерархическом посвящении и скрытом знании идеально совпадал с саббатианской моделью внешней конформности, скрывающей внутреннее преступление.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов, который был подавлен Папой Климентом XIV в 1773 году — всего за три года до основания Иллюминатов — имел самую мощную мотивацию любой организации для действия через сети тайных обществ. Климент XIV, который заявил «Я подписал свой смертный приговор» после издания бреве о подавлении, действительно был отравлен в течение года. Подавленные иезуиты не исчезли — они ушли в подполье, действуя через те самые сети тайных обществ, которые они помогли создать.\u003c/p\u003e\n\u003ch3 id=\"адам-вейсгаупт-и-иезуитская-связь\"\u003eАдам Вейсгаупт и иезуитская связь\u003c/h3\u003e\n\u003cp\u003eАдам Вейсгаупт, основатель Баварских Иллюминатов, был обучен иезуитами и занимал должность в Университете Ингольштадта, которую ранее занимали иезуиты. Структура его организации, с ее иерархическими степенями, ее акцентом на послушании, ее практикой слежки за членами и ее долгосрочным стратегическим планированием, носила безошибочный отпечаток иезуитской организационной методологии.\u003c/p\u003e\n\u003cp\u003eБыл ли Вейсгаупт агентом иезуитов, иезуитским повстанцем или независимым оператором, который впитал иезуитские методы через свое образование, обсуждается среди исследователей. Что не обсуждается, так это структурное сходство между Иллюминатами и орденом иезуитов. Оба действовали через скрытое членство в публичных учреждениях. Оба требовали абсолютного послушания начальникам. Оба преследовали глобальные амбиции через долгосрочное стратегическое планирование. Оба рассматривали манипуляцию правительствами и учреждениями как законные средства для своих целей.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eОтцы-основатели Иллюминатов\u003c/a\u003e прослеживает связи между Иллюминатами и основанием Американской республики — связи, которые раскрывают, насколько глубоко эти сети проникли в политические структуры западного мира с самых ранних дней.\u003c/p\u003e\n\u003ch2 id=\"духовная-архитектура-обмана\"\u003eДуховная архитектура обмана\u003c/h2\u003e\n\u003ch3 id=\"переворачивание-как-метод\"\u003eПереворачивание как метод\u003c/h3\u003e\n\u003cp\u003eСаббатианская доктрина «искупления через грех» установила духовную методологию, которая сохраняется в каждом последующем проявлении традиции Иллюминатов. Переворачивание моральных категорий — называние зла добром и добра злом, как предупреждал Исайя — это не просто философская позиция. Это операционный метод, который позволяет тем, кто его практикует, заниматься любой деятельностью, сохраняя убеждение, что они служат высшей цели.\u003c/p\u003e\n\u003cp\u003eЭта методология объясняет сохранение ритуальных практик в тайных обществах, которые кажутся несовместимыми с их заявленными целями. Когда мораль перевернута, каждое преступление становится таинством. Жестокое обращение с детьми становится ритуалом власти. Практика обмана становится служением «истине». Стремление к полному контролю становится актом «освобождения». Язык добродетели сохраняется, в то время как его значение точно перевернуто.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана освещает духовную реальность, стоящую за этим переворачиванием. Демоны, которых он видел во втором небе, не представляют себя как зло — они представляют себя как служителей высшей реальности, которая превосходит условную мораль. Ложь всегда одна и та же: «Вы будете как боги, знающие добро и зло». Саббатианско-франкистско-иллюминатская традиция является институциональным выражением этой изначальной лжи, сохраненной и переданной через столетия организованного обмана.\u003c/p\u003e\n\u003ch3 id=\"три-неба-и-поддельное-царство\"\u003eТри неба и поддельное царство\u003c/h3\u003e\n\u003cp\u003eОписание Питтманом трех небес — первого неба (физическое небо), второго неба (царство демонической активности) и третьего неба (присутствие Бога) — предоставляет структуру для понимания саббатианского обмана. Саббатианское утверждение, что Мессия должен спуститься во зло, чтобы искупить его, является поддельной версией подлинной христианской доктрины, что Христос спустился в смерть, чтобы победить ее. Критическая разница в том, что нисхождение Христа было жертвой, которая победила зло, в то время как саббатианское «нисхождение» является празднованием, которое наделяет силой зло.\u003c/p\u003e\n\u003cp\u003eПодделка всегда достаточно близка к истине, чтобы обмануть. Саббатианское движение опиралось на подлинные каббалистические концепции, подлинные мессианские ожидания и подлинный духовный голод, чтобы создать систему, которая направляла всю эту духовную энергию к противнику, а не к Богу. Это методология второго неба — царства, где демонические силы создают поддельные духовные переживания, которые ощущаются как реальные, кажутся божественными и ведут к разрушению.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eПадшие ангелы\u003c/a\u003e раскрывает происхождение этой поддельной системы — ангельское восстание, которое внесло принцип переворачивания в созданный порядок. События 1666 года не были началом этой войны; они были критической битвой в войне, которая ведется с тех пор, как началась человеческая история.\u003c/p\u003e\n\u003ch2 id=\"наследие-которое-сохраняется\"\u003eНаследие, которое сохраняется\u003c/h2\u003e\n\u003ch3 id=\"с-1666-года-по-настоящее-время\"\u003eС 1666 года по настоящее время\u003c/h3\u003e\n\u003cp\u003eСаббатианско-франкистско-иллюминатская традиция не закончилась с подавлением Баварских Иллюминатов в 1785 году. Она продолжилась через масонские сети, через банковские династии, через политические движения и через институциональную инфраструктуру, которую эти сети строили веками. Французская революция, которая разразилась всего через четыре года после предполагаемого уничтожения Иллюминатов, несла все признаки методологии Иллюминатов: свержение установленной власти, разрушение религиозных учреждений и установление нового порядка, основанного на рационалистических принципах, которые скрывали внутреннее ядро оккультной практики.\u003c/p\u003e\n\u003cp\u003eКаждая последующая революция — политическая, культурная, сексуальная, технологическая — следовала образцу, установленному в 1666 году: поддельное обещание освобождения, которое приносит порабощение, переворачивание моральных категорий и разрушение учреждений, которые связывают людей с Богом. Непрерывность этого образца не случайна. Она отражает непрерывность духовных сил, которые его движут, и организационных сетей, которые его выполняют.\u003c/p\u003e\n\u003cp\u003eПонимание 1666 года — это не упражнение в исторической любознательности. Это ключ к пониманию настоящего — тайных обществ, которые управляют из тени, моральных переворачиваний, которые определяют современную культуру, и духовных обманов, которые ведут 97,5% человечества к разрушению. В частях, которые последуют, мы проследим это наследие через основание Американской республики, через масонские и иезуитские сети, которые сформировали ее учреждения, и через продолжающуюся духовную войну, которая определяет судьбу каждой человеческой души.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушай голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтоб Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (Синодальный)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 эхом отзывается в каждом правительственном коридоре сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их точно, что произойдет — их сыновья будут взяты на войну, их дочери на службу, их поля и виноградники изъяты, десятая часть всего конфискована. Они выбрали человеческое правление вместо царствования Бога, и тирания последовала точно так, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной и той же скрытой властной структуре. Голосование за любую сторону — это выбор, какое крыло махает следующим, в то время как птица летит в том же направлении. Реальная власть никогда не была ни в одном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eAgent131711, «Иллюминаты 1666 года», \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство НДЕ Говарда Питтмана\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические тайны: Разоблачение достойных порицания секретов иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (Синодальный)\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eОтцы-основатели Иллюминатов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eОдна нация под шантажом\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eПадшие ангелы\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/illuminati-freemasons-jesuits-part2/?lang=ru\"\u003eИллюминаты, масоны, иезуиты: ОТЦЫ-ОСНОВАТЕЛИ Часть 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pope-deal-devil-1786-part3/?lang=ru\"\u003eСделка Папы с дьяволом в 1786 году Часть 3\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/illusion-illuminati-masons-part4/?lang=ru\"\u003eБыло ли это все ИЛЛЮЗИЕЙ: Иллюминаты и масоны разоблачены Часть 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eГод 1666 был не просто исторической датой — это был поворотный момент в духовной войне за человечество. Лжемессия, доктрина искупления через грех и альянс между саббатианским нигилизмом и иезуитской дисциплиной создали организационную и богословскую основу для тайных обществ, которые управляют современным миром. С 1666 года по настоящее время тот же образец повторяется: противник предлагает просвещение, доставляя при этом рабство, обещает освобождение,
