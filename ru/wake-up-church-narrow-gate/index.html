 несколько есть что найти это.\"\u003c/em\u003e — Матфей 7:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"знаю тебя работа что ты ни холодный ни горячей: я хотела бы ты был холодный или горячей. так потом потому что ты теплый и ни холодный ни горячей я будет плевать ты выходить из мой рот. потому что ты сказать я богат и увеличено с товары и иметь нужда ничего; и ты не знаю что ты жалкий и жалкий и бедный и слепой и голый.\"\u003c/em\u003e — Откровение 3:15-17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"любимый верить не каждый дух но попытка дух ли они из Бога: потому что многой ложный пророк имел вышли в мир.\"\u003c/em\u003e — 1 Иоанна 4:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИисус не говорят \"многой.\" Он говорил несколько. несколько найти узкие ворота. несколько идти узкой путь. несколько войти в жизнь. слово \"несколько\" не двусмысленный. Это не означают \"значительный меньшинство.\" Это не означают \"меньше чем вы может надежда но всё ещё уважемый число.\" Это означают несколько. остаток. дробь. число так маленький что Иисус выбрал сильный контраст — многой на широкий дорога несколько на узкой.\u003c/p\u003e\n\u003cp\u003eLaodicean церковь думала это было богатый. Это думало это был увеличено с товары. Это думало это имел нужда ничего. Это был по его собственный оценка процветание. успешный. блаженный. И Иисус сказал это был жалкий несчастный бедный слепой и голый. промежуток между то что Laodicea верил о себя и то что Христ знал о это был абсолютный.\u003c/p\u003e\n\u003cp\u003eЭто современный церковь. И доказательство — из три независимый свидетель по три полностью другой вторичной точка — теперь подавляющее.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eогонь в пещера — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eиз тьма в свет — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"доказательство-быть-подавляющее\"\u003eДоказательство быть подавляющее\u003c/h2\u003e\n\u003ch3 id=\"конвергентный-свидетельство\"\u003eконвергентный свидетельство\u003c/h3\u003e\n\u003cp\u003eво время этот серия мы имели эксплуатационный три независимый свидетель кто доставить то же разрушающей вердикт на условие современный церковь. Доказательство не приходить из один источник. Это не остаток на один свидетельство. Это конвергирует из три полностью другой направления:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e97.5 процент из исповедующий христиане на сатана плацебо (Говард Питтман).\u003c/strong\u003e батист служитель за тридцать пять лет кто умер и стоял перед Божьего трон. Бог показал ему отклонение уровень. не из язычник. не из атеист. из исповедующий христиане. люди кто верил они была спасена. люди кто посещали церковь читай их Библия и звонили на имя Иисуса. 97.5 процент отклонено. \"они никогда не сделали Меня Господ.\" они приняли плацебо — подслащённый бессильный подделка подлинный христианность — и верили это был реальный.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eпять уровни демон организовано в военный иерархия противоположно вам (Питтман).\u003c/strong\u003e демоничный область не chaotic. это не случайный. это структурировано в пять уровни из растущий орган — из обычный демон в дно к принципалы в вершина. каждый уровень имел определённый функция. каждый уровень сообщения к тот выше это. организация зеркало военный команда структура с совершенный цепь команда четкий задание и дисциплинировано выполнение. Это что церковь вверх против. и большинство христиане не даже верить это существует.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eиезуит имели инфильтрировано каждый вероисповедание из внутри (Catholic Confidential).\u003c/strong\u003e общество Иисуса имел положено его агент в каждый христианский вероисповедание — католик и протестант в подобии. \"замаскировано как маляр издатель писатель schoolmaster.\" операционный с абсолютный послушание: \"я будет верить что белый белый чёрный.\" их объектив: \"универсальный духовный и временал монархия.\" богословие преподавано в большинство семинария практика следовано в большинство церковь и институциональный структура, что управляет церковь жизнь имели всё быть сформирована порядок кого allegiance не к Христ но их генерал — чёрный папа кто \"правила мир.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eсатана поклонник молятся противоположно ваш церковь каждый ночь в то время как вы не может молиться за один час (Иоанна Рамирес).\u003c/strong\u003e дьявол поклонник за больше чем двадцать пять лет кто молился дьяволу всю ночь каждый ночь. он наблюдавший что большинство христиане не может поддерживать даже один час молитва. никакая молитва жизнь. никакой пост. никакой подлинный отношение с Бог. \"форма из godliness но нет власть.\" он разломал христиане через колдовство. он преследовал всё что представлены Иисуса Христа. один кто он не мог касание был кто имел \"реальный отношение с Иисуса Христа.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eпять худший принципалы назначено к \"разрезать вниз церковь\" (Рамирес).\u003c/strong\u003e пять принципалы демон — самый высоко ранжирование объект в сатана иерархия — специфично назначено к \"работать церковь разрезать вниз церковь и разрезать вниз возможность для люди\" к сказать да к Иисуса. они не просто оппозиция церковь. они управлять это. они влияние его направление его доктрина его решение и его эффективность — обеспечивающей что максимум количество люди оставаться безопасно на плацебо.\u003c/p\u003e\n\u003cp\u003eЭто поле боя. Это ситуация отчёт. И церковь теряет.\u003c/p\u003e\n\u003ch2 id=\"что-плацебо-выглядит-как\"\u003eЧто плацебо выглядит как\u003c/h2\u003e\n\u003ch3 id=\"удобный-подделка\"\u003eудобный подделка\u003c/h3\u003e\n\u003cp\u003eсатана плацебо не выглядеть как обман. что гениус это. это выглядеть как христианность. это звук как христианность. это чувствовать как христианность. это использует все правой слова все правой ритуалы все правой символы. но это духовно инертный. это имел никакой власть спасти. это имел никакой власть трансформировать. это имел никакой власть соединить душа к Бог.\u003c/p\u003e\n\u003cp\u003eВот что плацебо выглядеть как в практика:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eидти к церковь.\u003c/strong\u003e показ вверх каждый воскресенье. сидение в скамейка. стояние когда говорено стоять. сидение когда говорено сидеть. прослушивание серьёзный. помещение деньги в предложение пластина. пожимание рук с люди вокруг вас. идти дома. повторение далее неделя.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eпение песни.\u003c/strong\u003e поклонение музика на воскресенье утро. поклонение музика в машина. поклонение плейлист на ваш телефон. эмоциональный опыт пения о Бог без духовной реальность знания Бог. музика что делает вы чувствовать что-то без требующей вы быть что-то.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eразмещение библия стих.\u003c/strong\u003e писание на социальный средства. вдохновляющий котировки с гора предпосылка. \"Бог хорошо всё время.\" раздел стих без живо их. транслирование веры без практикование это. цифровой религия за цифровой возраст.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eсказание \"Бог хорошо.\"\u003c/strong\u003e рефлекс христианский ответ к любой ситуация — хорошо или плохой. Бог хорошо когда вы получить работа. Бог хорошо когда вы теряю работа. Бог хорошо когда вы чувствовать хорошо. Бог хорошо когда вы чувствовать ничего. фраза имел стало устный тик общественный сигнал племя идентификатор — лишённый его богословской глубина и сокращены к автомобиль наклейка.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eплатежи.\u003c/strong\u003e дающей десять процент (или меньше) и верующей что финансовый взнос равняет духовной приверженность. институциональный церковь имела поднята платеж к первичный признак учеников — потому что учреждение нужна деньги фонд его здание программа и штат. но платеж без отказ не поклонение. это операция. и дьявол совершенно счастлив за вас платить вашу церковь налоги так долго как вы никогда истинно дают Бог ваш жизнь.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eпосещение малый группа.\u003c/strong\u003e еженедельный встречание где христиане обсудить предварительно упакованный учебный план доля молитва запрос о физический нужда и построить социальной отношение что подставить за подлинный духовной сообщество. малый группа имел стало церковь ответ к нужда за подлинный общение — но слишком часто это производит социальной соединение без духовной трансформация.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eиметь рыба бампер наклейка.\u003c/strong\u003e внешний идентификация из христианства без внутренний реальность. символ без вещество. имя без жизнь.\u003c/p\u003e\n\u003cp\u003eвсё из этот может быть выполнено без подлинный отношение с Иисуса Христа.\u003c/p\u003e\n\u003cp\u003eкаждый один предмет на этот список может быть выполнено человек кто имел никогда сдался Христ никогда был рожден снова никогда получено святой дух и никогда вошли подлинный завет отношение с живой Бог. сатана позволить всё из это. он поощрить всё из это. он спроектировано плацебо включать всё из это — потому что всё из это создаёт восприятие христианность без реальность.\u003c/p\u003e\n\u003cp\u003eОдин что сатана не позволить: фактически проживание сдался жизнь. фактически умирание к себе. фактически берущей вверх крест. фактически следующей Иисуса — не в удобный скамейка на воскресенье утро но в дикий из послушание пустыня из пост сад из agonizing молитва и ежедневный распятие плоти.\u003c/p\u003e\n\u003ch2 id=\"что-реальный-отношение-выглядеть-как\"\u003eЧто реальный отношение выглядеть как\u003c/h2\u003e\n\u003ch3 id=\"знак-из-подлинный-веря\"\u003eзнак из подлинный веря\u003c/h3\u003e\n\u003cp\u003eесли плацебо подделка что выглядеть как подлинный предмет? три свидетель вместе взяты окраска четкий картина:\u003c/p\u003e\n\u003ch3 id=\"молитва--не-пять-минут-но-часа\"\u003eмолитва — не пять минут но часа\u003c/h3\u003e\n\u003cp\u003eРамирес молился дьяволу всю ночь. христиане он не мог разломать молился к Бог для часа. есть прямой корреляция между молитва и духовной органа. верующей кто молится пять минут день имел почти никакой духовной органа. верующей кто молится для часа имел органа что принципалы демон не может преодолеть.\u003c/p\u003e\n\u003cp\u003eЭто не о заработок Божьего благосклонность через длительность. это о глубина из отношение что дополненный молитва производит. вы не потрачу часа с кто-то вы едва знают. вы потрачу часа с кто-то вы любить глубоко — кто присутствие трансформирует вы кто слова переделал ваш мышление кто общество — наиболее ценный что в ваш жизнь.\u003c/p\u003e\n\u003cp\u003eмолитва не религиозный долг. это первичный выражение из живой отношение с Бог. когда то отношение подлинный молитва течение естественно — не как обязательство но как желание. верующей кто не может молиться за более чем пять минут не иметь время управление проблема. он имел отношение проблема.\u003c/p\u003e\n\u003ch3 id=\"пост--отрицание-плоть-к-укреплять-дух\"\u003eпост — отрицание плоть к укреплять дух\u003c/h3\u003e\n\u003cp\u003eИисуса сказал \"когда вы пост\" — не \"если вы пост\" (Матфей 6:16-18). он предполагавший что его последователи будут пост. ранний церковь пост (деяния 13:2-3 14:23). старый завет будучи насыщенный с пост — Моисей давайте Илия Эстер даниил иоиль. практика отрицание физический организм чтобы заострить духовное восприятие и увеличить духовную органа вышиванка по всему писание.\u003c/p\u003e\n\u003cp\u003eсовременный церковь имела почти полностью оставленный пост. это слишком неудобно. слишком inconvenient. слишком требования. плоть не хочет быть отрицание. и церковь что служит плоть — плацебо церковь — не будет практикование ровно дисциплина что ослабляет плоть захват и укреплять дух органа.\u003c/p\u003e\n\u003cp\u003eдьявол поклонник пост. Рамирез подтверждает это. служитель сатана понимать что духовная власть требует физический жертва. они отрицают их плоть к потенциат их дух — для разрушение. как много больше должен служитель Христа отрицать их плоть к потенциат их дух — для жизнь?\u003c/p\u003e\n\u003ch3 id=\"послушание--не-к-учреждение-но-к-святой-дух\"\u003eпослушание — не к учреждение но к святой дух\u003c/h3\u003e\n\u003cp\u003eиезуит требовать абсолютный послушание их человек генерал. институциональный церковь требовать послушание его доктрина традиция и руководство структура. но библичный послушание не к учреждение. это к святой дух.\u003c/p\u003e\n\u003cp\u003e\"так многой как направлены по дух Бога они сын Бога\" (римляне 8:14). сынство определён по дух-ведомый послушание. не институциональный соответствие. не доктринальный согласие. не культурный conformity. дух Бога ведущей и ребёнок Бога следующей — момент к моменту решение к решение шаг к шаг.\u003c/p\u003e\n\u003cp\u003eэто тип послушание неудобный для учреждение потому что это не может быть контролировано. дух ведёт где Он будет (Иоанна 3:8). Он не подчиняется деноминационный руководство. Он не следуют институциональный протокол. Он не спросить разрешение из пастырский штат. церковь полный из дух-ведомый верующей было церковь что никакое учреждение может управлять — и никакой принципала может контроль.\u003c/p\u003e\n\u003ch3 id=\"различение--знающей-дух\"\u003eразличение — знающей дух\u003c/h3\u003e\n\u003cp\u003e\"любимый верить не каждый дух но попытка дух ли они из Бог: потому что многой ложный пророк имел вышли в мир\" (1 Иоанна 4:1).\u003c/p\u003e\n\u003cp\u003eэтот команда предполагает что дух являются активный. это предполагает что ложный пророк являются подарок. это предполагает что обман явно норма чем исключение. и это местоположение ответственность за духовной различение на каждый верующей — не на пастор не на старейшина не на вероисповедание но на вы.\u003c/p\u003e\n\u003cp\u003eразличение способность различаюте между дух Бога и дух обман. это духовной факультет что обнаруживает плацебо. это радар система что идентифицирует враг операция внутри церковь. и это почти полностью отсутствуя из современный церковь — потому что плацебо не производить это. плацебо производить удобство. различение производить неудобство. плацебо сказать \"всё ладный.\" различение сказать \"что-то неправильный.\" плацебо церковь не хочет различение. это хочет мир. и мир это имел выбрано мир анестезировано пациент кто не чувствовать рак растущей внутри он.\u003c/p\u003e\n\u003ch3 id=\"органа--власти-над-всё-демон\"\u003eоргана — власти над всё демон\u003c/h3\u003e\n\u003cp\u003e\"смотри я давать к вы власти к шаг на змей и скорпион и больше всё власти из враг: и ничего будет по любой путь ранить вы\" (Лука 10:19).\u003c/p\u003e\n\u003cp\u003eИисуса дал его последователи органа выше всё власти враг. не немного это. всё это. каждый демон. каждый принципала. каждый духовной оружие враг обладает. верующей кто прогулка в подлинный отношение с Христ имели органа что превосходит любой дьявол поклонник любой ведьма любой warlock и любой принципала демон.\u003c/p\u003e\n\u003cp\u003eРамирез встреченный этот органа в христиане он не мог разломать. огонь стена вокруг молодёжный группа. женщина кто выжил двадцать один день смерти ритуал. человек кто исчезнул из крыша. эти верующей были упражнение — сознательно или неправильно — органа что Иисуса дал к каждый подлинный последователь.\u003c/p\u003e\n\u003cp\u003eно органа что не было упражнение органа что было потерян. солдат с оружие он никогда огонь никакое угроза к враг. верующей с органа он никогда использование никакое угроза к царство тьма. и современный церковь сидение на величайшей арсенал из духовной оружие когда-либо собран никакое угроза к принципалы что управлять это — потому что это не использование что это имеет быть дано.\u003c/p\u003e\n\u003ch3 id=\"кровь-иисуса-как-покрытие\"\u003eкровь Иисуса как покрытие\u003c/h3\u003e\n\u003cp\u003eкаждый элемент подлинный духовной жизнь течение из один источник: кровь Иисуса Христа. кровь покрытие. кровь органа. кровь завет. кровь оружие что никакой демон может противостоять никакой принципала может преодолеть никакой дьявол поклонник может проникновение.\u003c/p\u003e\n\u003cp\u003eРамирез двадцать один день смерти ритуал провалился потому что мишень был покрыт кровью Иисуса. его попытка атака молодёжный группа провалился потому что они был покрыт кровью Иисуса. кровь не метафора. это не богословской концепция. это духовной реальность с операционной власти в невидимой область.\u003c/p\u003e\n\u003cp\u003eно кровь покрывает те кто являются в подлинный завет отношение с Христ. это не покрыть те кто просто требовать имя. это не покрыть те кто посещают церковь но имел никогда сдались. это не покрыть те на плацебо. \"что угодно не покрыто с Иисуса Христа легкий мишень прибыть вниз.\" этот дьявол поклонник оценка. и это должен террифай каждый христианин кто полагается на церковь членство а не кровь завет за их духовной защита.\u003c/p\u003e\n\u003ch2 id=\"узкие-ворота\"\u003eузкие ворота\u003c/h2\u003e\n\u003ch3 id=\"несколько-есть-что-найти-это\"\u003e\"несколько есть что найти это\"\u003c/h3\u003e\n\u003cp\u003eИисуса сказал ворота прямой и путь узкой. Он сказал несколько найти это. Это прямой неоспоримый утверждение сын Бога о пропорция из люди кто будет войти вечный жизнь.\u003c/p\u003e\n\u003cp\u003eне многой. несколько.\u003c/p\u003e\n\u003cp\u003eсовременный церковь имела инвертирован это утверждение. Это проповеди широкий ворота и широкой путь. Это говорит люди что спасение лёгкий — просто сказать молитва прогулка проход получить крещен присоединиться церковь. Это наполнение стадион с люди кто поднять их изводить вязкий ответ в Христ — не печаль видения Его люди терпят неудачу но отвращение дегустация что-то что требовать быть один что фактический другой. теплый вода что требовать быть горячей. плацебо что требовать быть медицина. церковь что требовать быть живой и было мёртвый.\u003c/p\u003e\n\u003cp\u003eLaodicean церковь сказал: \"я богатый и увеличено с товары и я имел нужда ничего.\" это видел себя как блаженный процветающей и самостоятельный. это имел всё это нужна — или так это верил.\u003c/p\u003e\n\u003cp\u003eи Иисуса сказал это было \"жалкий и жалкий и бедный и слепой и голый.\"\u003c/p\u003e\n\u003cp\u003eжалкий. жалкий. бедный. слепой. голый. пять прилагательное из полный духовной банкротство применяется к церковь что верил само к быть процветание. промежуток между самовосприятие и реальность не могло быть шире. плацебо не могло быть более эффективный. обман не могло быть более полно.\u003c/p\u003e\n\u003cp\u003eЭто современный церковь. mega-здание. мультимиллион долларов бюджет. профессионал поклонение группа. знаменитость пастор. бестселлер книга. упакованный аудиториум. и Иисуса говорит: жалкий жалкий бедный слепой голый.\u003c/p\u003e\n\u003ch2 id=\"вызов-к-действие\"\u003eвызов к действие\u003c/h2\u003e\n\u003ch3 id=\"что-должно-изменить\"\u003eчто должно изменить\u003c/h3\u003e\n\u003cp\u003eДоказательство в. свидетель имели свидетельствовано. вердикт является единодушно. вопрос теперь: что вы будете выполнить с этот информация?\u003c/p\u003e\n\u003cp\u003eОтвет не сложный. это не лёгкий но это простой. Иисуса дал это Себя к Laodicean церковь: \"я рекомендовать вы к купить из Меня золото опробовано в огонь так что вы может быть богатый; и белый раймент так что вы может быть одетый и что позор из ваш наготу не кажутся; и мазь ваш глаз с eyesalve так что вы может видеть\" (откровение 3:18).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eзолото опробовано в огонь\u003c/strong\u003e — подлинный веря тестировано и рафинировано через страдание жертва и сдача. не лёгкий believerism из современный евангелиум. не удобный христианность из плацебо церковь. веря что имел быть через огонь и появился чистый.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eбелый раймент\u003c/strong\u003e — праведность Христа получено не через церковь членство или хорошо работы но через подлинный отношение и сдача. покрытие крови. одеяние что никакой принципала может разорвать и никакое колдовство может пятно.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eeyesalve\u003c/strong\u003e — духовной видение. различение. способность видеть что церковь в его слепота не может видеть: принципалы что работают это инфильтраторы что форма это плацебо что седировать это и узкие ворота что это упустил.\u003c/p\u003e\n\u003ch3 id=\"смотри-я-стоять-в-дверь-и-стучать\"\u003e\"смотри я стоять в дверь и стучать\"\u003c/h3\u003e\n\u003cp\u003eНаиболее преследующий стих в откровение 3 является стих 20: \"смотри я стоять в дверь и стучать: если любой человек услышать мой голос и открыть дверь я будет прибыть в к нему и будет есть супер с Ним и Ему со Мной.\"\u003c/p\u003e\n\u003cp\u003eИисуса является стояние снаружи церковь стучание. Он не внутри ведущей это. Он не на трон в центр это. Он снаружи стучание дверь спрашивать быть позволить в к Его собственный церковь. церковь что медведь его имя. церковь что требовать поклоняться Ему. церковь что думает это живой.\u003c/p\u003e\n\u003cp\u003eОн снаружи. стучание. ожидание. и церковь слишком занят его программе его музика его социальной средства его посещение число и его удобный плацебо услышать стучание.\u003c/p\u003e\n\u003cp\u003eно обещание все ещё стоит: \"если любой человек услышать мой голос и открыть дверь я будет прибыть в.\" не если любой церковь. не если любой вероисповедание. не если любой доктринальный утверждение. если любой человек — любой индивидуум любой один человек готовый услышать стучание готовый открыть дверь готовый отказать плацебо и обнять живой Христ.\u003c/p\u003e\n\u003cp\u003eЭто узкие вор
