\u003eБог различает между своими секретами — которые праведны и будут открыты в его время — и секретами людей, которые хранятся для защиты злодеев. Закодированные сообщения, встроенные в газеты на протяжении 19-го и 20-го веков, принадлежат второй категории: коммуникация между членами тайных обществ, разведывательными оперативниками и правящей элитой, спрятанная у всех на виду среди классифицированных объявлений, личных объявлений и редакционных страниц самых газет, которые публика читала каждое утро.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов является мастером тайной коммуникации со времён его основания. Игнатий Лойола, который спроектировал Общество Иисуса как военную разведывательную организацию, понимал, что безопасная коммуникация была основой эффективного заговора. Джон Адамс осудил общество: \u003cem\u003e\"Если когда-либо была группа людей, которые заслуживали вечного проклятия на земле и в аду, это общество Лойолы.\"\u003c/em\u003e Иезуиты разработали системы шифрования, стеганографические методы и протоколы коммуникации, которые предшествовали современным разведывательным агентствам на века — и они встраивали эти коммуникации в газеты, которые они контролировали.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eThe Deceivers Lies\u003c/em\u003e говорит о многоуровневой природе обмана — сообщения в сообщениях, истины, скрытые за ложью, сигналы, видимые только инициированным. И \u003cem\u003eThe Secret of the Cave\u003c/em\u003e напоминает нам, что наиболее важное знание всегда скрыто от непосвящённых и зарезервировано для тех, кто знает, где искать.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"сеть-классифицированных-объявлений\"\u003eСеть классифицированных объявлений\u003c/h2\u003e\n\u003ch3 id=\"как-это-работало\"\u003eКак это работало\u003c/h3\u003e\n\u003cp\u003eДо эпохи электронной коммуникации газеты служили первичным массовым средством — читаемые практически всеми, доступные в каждом городе и публикуемые ежедневно. Это сделало их идеальным средством для тайной коммуникации. Сообщение, размещённое в разделе классифицированных объявлений крупной газеты, могло быть прочитано оперативниками на большой географической территории без возбуждения подозрения.\u003c/p\u003e\n\u003cp\u003eТехника была проста в концепции, но сложна в выполнении:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eОтправитель\u003c/strong\u003e будет составлять сообщение, используя предварительно согласованный код — шифр, систему ключевых слов или набор обычных фраз со скрытыми значениями.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСообщение\u003c/strong\u003e будет размещено как классифицированное объявление, личное объявление или письмо редактору, появляющееся как обычная коммуникация.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПолучатель\u003c/strong\u003e, который знал код, прочитал бы скрытое сообщение и действовал соответственно.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПублика\u003c/strong\u003e, неосведомлённая о коде, видела бы не что иное, как обычное объявление или объявление.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭта система имела несколько преимуществ перед прямой коммуникацией: она не оставляла отслеживаемую переписку между отправителем и получателем, она могла охватить нескольких получателей одновременно, она была отрицаема (сообщение казалось невинным на своей поверхности) и оно было заархивировано в файлах газеты, предоставляя постоянный рекорд, доступный тем, кто знал, как его читать.\u003c/p\u003e\n\u003ch3 id=\"исторические-примеры\"\u003eИсторические примеры\u003c/h3\u003e\n\u003cp\u003eИспользование закодированных газетных сообщений хорошо документировано в истории разведки:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГражданская война\u003c/strong\u003e — Как Союз, так и Конфедеративные разведывательные службы использовали газетные объявления для коммуникации с агентами позади линий врага. Газеты Ричмонда несли закодированные сообщения от конфедеративных агентов в Вашингтоне, в то время как северные газеты несли сообщения от Союзных шпионов на юге.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБратство фениев\u003c/strong\u003e — ирландские национальные организации 19-го века использовали закодированные газетные объявления для координации деятельности через Атлантику. Иезуиты, которые имели сложные отношения с ирландскими национальными движениями (как поддерживая, так и инфильтрируя их), были знакомы с этими методами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПервая и вторая мировые войны\u003c/strong\u003e — все крупные разведывательные сервисы использовали газетные объявления для тайной коммуникации. британская SOE, американская OSS и немецкий Abwehr все поддерживали классифицированные сети объявлений в нейтральных газетах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eХолодная война\u003c/strong\u003e — операторы ЦРУ и КГБ использовали газетные личные колонки для координации \"мёртвых ящиков\", сигнализации агентов и аварийной коммуникации на протяжении периода холодной войны.\u003c/p\u003e\n\u003ch2 id=\"масонская-система-коммуникации\"\u003eМасонская система коммуникации\u003c/h2\u003e\n\u003ch3 id=\"коммуникация-ложа-к-ложе\"\u003eКоммуникация ложа-к-ложе\u003c/h3\u003e\n\u003cp\u003eМасонство, которое действует через сеть лож, охватывающих каждую страну в западном мире, разработало сложные системы коммуникации задолго до того, как разведывательные агентства приняли похожие методы. Масонская коммуникация использовала несколько каналов:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСимволический язык\u003c/strong\u003e — масонские символы (квадрат и компасы, всевидящее око, столбы и т.д.) могут быть встроены в газетные объявления, логотипы компаний и публичные объявления в качестве сигналов инициированным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРитуальные фразы\u003c/strong\u003e — масонский ритуал содержит конкретные фразы и ответы, которые служат кодами идентификации. Эти фразы, когда встроены в кажущееся обычное текста, могли сигнализировать масонскую принадлежность отправителя и срочность сообщения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКоды даты и номера\u003c/strong\u003e — масонская нумерология назначает значение определённым числам (3, 7, 13, 33 и т.д.). Размещение объявлений на конкретные даты, по конкретным ценам или с конкретными числовыми ссылками, могло передавать информацию масонским читателям.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЛичные колонки\u003c/strong\u003e — личные колонки крупных газет были основным каналом масонской коммуникации. Сообщения, адресованные конкретным инициалам, используя конкретные фразы, в конкретные даты, образовывали сеть коммуникации, работающую у всех на виду.\u003c/p\u003e\n\u003ch3 id=\"владельцы-газет\"\u003eВладельцы газет\u003c/h3\u003e\n\u003cp\u003eЭффективность системы закодированных сообщений зависела от кооперации — или по крайней мере невежества — издателей газет. Во многих случаях кооперация была активной: крупные владельцы газет в 19-м и 20-м веках подавляющим большинством были масонами или членами связанных с ними тайных обществ.\u003c/p\u003e\n\u003cp\u003eКонцентрация медиа-собственности в руках небольшого числа семей — Хёрстов, Пулитцеров, Сульцбергеров, Грэмов — гарантировала, что каналы коммуникации оставались открытыми и что любое расследование закодированных сообщений было подавлено. Медиа, которым публика доверяла как источнику объективной информации, в действительности была сетью коммуникации для системы тайного общества.\u003c/p\u003e\n\u003ch2 id=\"расшифровка-сообщений\"\u003eРасшифровка сообщений\u003c/h2\u003e\n\u003ch3 id=\"распознавание-паттернов\"\u003eРаспознавание паттернов\u003c/h3\u003e\n\u003cp\u003eИсследователи, которые изучили закодированные газетные сообщения, выявили несколько паттернов, которые отличают тайную коммуникацию от обычных объявлений:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНеобычная специфичность\u003c/strong\u003e — сообщения, которые содержат странно специфичные числа, даты или местоположения, которые не служат видимой коммерческой цели, могут передавать закодированную информацию.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПовторяющиеся паттерны\u003c/strong\u003e — сообщения, которые появляются через регулярные интервалы, используя похожий язык или форматирование, предполагают протокол коммуникации, а не одноразовое объявление.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСимволический язык\u003c/strong\u003e — ссылки на цвета, животных, геометрические формы или мифологические фигуры, которые кажутся неуместными в коммерческом контексте, могут быть масонскими или эзотерическими кодами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВременные корреляции\u003c/strong\u003e — сообщения, которые появляются вскоре после или перед значительными событиями (финансовыми крахами, политическими убийствами, военными операциями), могут быть сигналами координации.\u003c/p\u003e\n\u003ch3 id=\"agony-column\"\u003eAgony Column\u003c/h3\u003e\n\u003cp\u003e\"Agony Column\" — раздел личного объявления крупных газет — был наиболее распространённым местоположением для закодированных сообщений. Сам термин предполагает ангст тех, кто использовал этот канал для секретной коммуникации: агенты в ожидании приказов, операторы сигнализирующие об опасности, заговорщики координирующие действия, которые будут формировать судьбу наций.\u003c/p\u003e\n\u003cp\u003eЛондонская Times, Нью-йоркский Herald, чикагский Tribune и другие крупные газеты все поддерживали Agony Columns, которые служили коммуникационными узлами для сети тайного общества. Артур Конан Дойл, который был масоном и мог быть участником разведки, часто использовал закодированные газетные сообщения как сюжетные приёмы в своих рассказах о Шерлоке Холмсе — деталь, которая может отражать его прямое знание практики.\u003c/p\u003e\n\u003cp\u003eТрек \u003cem\u003eFreemason Jesters\u003c/em\u003e улавливает насмешку, встроенную в эти скрытые коммуникации — элита, смеющаяся над публикой, которая читает те же газеты каждый день, не подозревая никогда, что секретные сообщения скрыты в самых страницах, которые они держат.\u003c/p\u003e\n\u003ch2 id=\"современная-эволюция\"\u003eСовременная эволюция\u003c/h2\u003e\n\u003ch3 id=\"от-газет-к-цифровым\"\u003eОт газет к цифровым\u003c/h3\u003e\n\u003cp\u003eЗакодированное газетное сообщение развивалось, но не исчезло. Современные эквиваленты включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСигналы социальных медиа\u003c/strong\u003e — посты, содержащие конкретные хэштэги, изображения или фразы, служат той же функции, что и классифицированные объявления: открытые каналы коммуникации, которые видны всем, но значимы только для тех, кто знает код.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКорпоративные коммуникации\u003c/strong\u003e — годовые отчёты, пресс-релизы и вызовы по результатам содержат язык, который передаёт разные значения инсайдерам и посторонним. Финансовые рынки, по сути, представляют собой гигантскую кодированную систему коммуникации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазвлекательные медиа\u003c/strong\u003e — кинофильмы, телешоу, музыкальные клипы и видеоигры содержат символический контент, который общается инициированным системы тайного общества. Распространённость масонской и эзотерической символики в популярных развлечениях не является случайностью; это канал коммуникации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНовостное покрытие\u003c/strong\u003e — выбор, кадрирование и время новостных историй может служить сигналами. Конкретная история, появляющаяся в конкретную дату в конкретном выходе, может передавать сообщение тем, кто знает, как его читать.\u003c/p\u003e\n\u003cp\u003eЭволюция от закодированных газетных сообщений к цифровой коммуникации сделала систему более сложной, но не фундаментально другой. Принцип остаётся тем же: спрячьте сообщение у всех на виду, в среде, которую публика потребляет ежедневно, без подозрения, что оно содержит вторичный слой значения.\u003c/p\u003e\n\u003cp\u003eСвидетельство Хоуарда Питтмана о трёх небесах — физическом царстве, демоническом правительстве и тронном зале Бога — предоставляет духовный каркас для понимания закодированных коммуникаций. Секретные сообщения — это не просто человеческие заговоры; они являются физическим проявлением сети демонической коммуникации, которая действует из второго неба. Правители тьмы координируют свои земные операции через те же каналы, которые публика использует для развлечения и информации. Слова духовны (Матфей 12:36-37), и закодированные слова вдвойне так — они несут как поверхностное значение, так и скрытое значение, служа целям принципальностей и сил, о которых предупреждает Ефесянам 6:12. Посмотрите: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля обширной документации закодированной газетной коммуникации, смотрите \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e и \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто находится в подвале Ватикана может вас потрясти!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\
