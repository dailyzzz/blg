 глупцы будут ненавидеть знание?\" — Притчи 1:22\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКогда Понтий Пилат вымыл руки перед толпой, он не объявил Иисуса невиновным. Он объявил себя незаинтересованным в справедливости. Он знал, что обвинения были ложны, он знал, что обвиняемый был невиновен, и он обладал полномочиями освободить Его. Вместо этого он вымыл руки — публичная демонстрация того, что самый мощный римский чиновник в Иудее выбрал политическое удобство над праведным судом.\u003c/p\u003e\n\u003cp\u003eКак показывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers' Lies\u003c/a\u003e, наиболее наносящие ущерб лжи — это не те, которые рассказываются обвиняемыми, но теми от властей, которые отказываются их преследовать. Когда сама система юстиции отказывается преследовать справедливость, система становится сообщником.\u003c/p\u003e\n\u003cp\u003eФедеральное правительство подало судебный документ, указывающий, что оно не заинтересовано в вмешательстве в дело об осведомителе Pfizer. Правительство вымыло свои руки.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дело-brook-jackson\"\u003eДело Brook Jackson\u003c/h2\u003e\n\u003cp\u003eBrook Jackson, бывший региональный директор в Ventavia Research Group — подрядчик клинических испытаний для испытания вакцины COVID-19 Pfizer — подала иск в соответствии с Законом о ложных исках против Pfizer в январе 2021 года. Иск утверждает, что Pfizer подала ложные иски на федеральное правительство в связи с клиническим испытанием вакцины COVID-19 от Pfizer.\u003c/p\u003e\n\u003cp\u003eОбвинения Джексон включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eФальсификацию данных клинического испытания\u003c/li\u003e\n\u003cli\u003eНеспособность следовать надлежащим процедурам отчетности о неблагоприятных событиях\u003c/li\u003e\n\u003cli\u003eРазблокировка участников испытания\u003c/li\u003e\n\u003cli\u003eНеадекватная подготовка администраторов вакцины\u003c/li\u003e\n\u003cli\u003eНеспособность поддерживать надлежащее хранилище холодной цепи\u003c/li\u003e\n\u003cli\u003eВозмездие против сотрудников, которые сообщили о проблемах целостности данных\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВ соответствии с Законом о ложных исках федеральное правительство имеет право вмешаться в дела об осведомителях — принимая на себя прокурорскую деятельность, привлекая федеральные ресурсы и значительно увеличивая вероятность успешного результата. Вмешательство правительства — это мощный сигнал о том, что правительство верит, что обвинения имеют достоинство и привержено преследованию подотчетности.\u003c/p\u003e\n\u003cp\u003eРешение правительства не вмешаться посылает противоположный сигнал: независимо от доказательств, независимо от обвинений, федеральное правительство не желает преследовать это дело.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон проанализировала подачу в The Kingston Report (karenkingston.substack.com): \"Отказ правительства вмешаться в дело Jackson — это не нейтральный акт. Это сознательный выбор защитить Pfizer от подотчетности. Закон о ложных исках существует специально, чтобы привлечь главных государственных контрактников к подотчетности за мошенничество. Отказ правительства использовать его против самого крупного государственного подрядчика в истории пандемии говорит все о том, чьи интересы служит правительство.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"юридические-последствия\"\u003eЮридические последствия\u003c/h2\u003e\n\u003cp\u003eНеучастие правительства не увольняет дело — Jackson может продолжать преследовать его как частный истец. Однако неучастие резко снижает шансы дела на успех:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРесурсы:\u003c/strong\u003e Как частный истец, Jackson должна финансировать судебное разбирательство против Pfizer — компании с эффективно неограниченными юридическими ресурсами — из её собственных ресурсов и ресурсов её юридической команды.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбнаружение:\u003c/strong\u003e Без участия правительства, процесс обнаружения ограничивается тем, что частный истец может принудить через суд. Вмешательство правительства привело бы полную следственную мощь Министерства юстиции, включая доступ к засекреченным документам, полномочиям большого жюри и межведомственной координации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKredibilité:\u003c/strong\u003e Восприятие присяжных влияет на участие правительства. Дело, осуществленное Министерством юстиции, несет вес одобрения федерального правительства. Дело, которое ведет частный осведомитель, должно преодолеть подразумеваемое сообщение о том, что правительство считало обвинения достойными преследования.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗащита Pfizer:\u003c/strong\u003e Правовая стратегия Pfizer опиралась в значительной степени на аргумент, что правительство полностью знало о поведении клинического испытания и было доволено его результатами — защита \"знания правительства\". Неучастие правительства предположительно усилит эту защиту, предполагая согласие с позицией Pfizer.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"конфликт-интересов-правительства\"\u003eКонфликт интересов правительства\u003c/h2\u003e\n\u003cp\u003eРешение правительства не вмешаться не может быть оценено без признания конфликтов интересов самого правительства:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравительство совместно разработало вакцину.\u003c/strong\u003e NIH совместно разработал технологию белка шипа, используемую в вакцине Moderna, и держит патентные интересы в связанной технологии. Правительство имеет финансовый интерес в успехе платформы mRNA.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравительство приобрело вакцины.\u003c/strong\u003e Согласно Operation Warp Speed, правительство обязалось более $18 миллиардов на разработку вакцины и закупку. Признание мошенничества в продукте подрывает решения по закупкам самого правительства.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравительство обязало вакцины.\u003c/strong\u003e Федеральные агентства, военные и примыкающие к правительству учреждения обязали вакцину COVID-19 для миллионов американцев. Признание вреда, причиненного продуктом, подвергает правительство массивной ответственности за последствия его мандатов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДолжностные лица правительства лицо личного воздействия.\u003c/strong\u003e Если мошенничество в клиническом испытании доказано, должностные лица правительства, которые знали о нарушениях данных и выбрали не действовать, сталкиваются с потенциальной уголовной ответственностью за заговор, препятствование и упущение по отношению к преступлению.\u003c/p\u003e\n\u003cp\u003eПравительство не является нейтральной стороной, оценивающей достоинства исков осведомителя. Это соучастник, оценивающий, преследовать ли своего собственного партнера.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e документирует, как институциональные компромиссы создают сети взаимной защиты — где воздействие каждого участника гарантирует, что никакой участник не будет преследовать подотчетность против любого другого.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческое-предупреждение\"\u003eПророческое предупреждение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Если ты видишь угнетение бедного, и насильственное лишение правосудия и справедливости в провинции, не дивись делу; ибо выше высокого смотрит Высший, и есть выше их.\" — Екклесиаст 5:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eСоломон предупреждает, что извращение справедливости в человеческих судах не должно удивлять верующих — потому что есть Один выше, чем наивысший человеческий орган, и Он замечает все вещи.\u003c/p\u003e\n\u003cp\u003eОтказ правительства преследовать справедливость против Pfizer — это \"насильственное извращение суда и справедливости,\" которое описывает Соломон. Но неудача земного суда не предотвращает суд небесного суда. Доказательства существуют. Травмы задокументированы. Осведомитель говорил. И Бог, который видит все вещи, отметил решение правительства вымыть свои руки.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: слушай голос народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отзывается через каждый коридор правительства сегодня. Когда Израиль потребовал царя, как у других наций, Бог предупредил их ровно о том, что произойдет — их сыновья будут взяты на войну, их дочери в служение, их поля и виноградники захвачены, десятина всего конфискована. Они выбрали человеческое правительство над правлением Бога, и тирания последовала ровно обещанному. Ничего не изменилось. Современная политическая система — два крыла одной птицы — левое и правое, республиканское и демократическое — все служат одной скрытой структуре власти. Голосование за любую сторону — это выбор, какое крыло взмахивается дальше, пока птица летит в том же направлении. Реальная власть никогда не была на бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eBrook Jackson v. Pfizer et al. — Судебные разбирательства и уведомления о неучастии правительства\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Анализ Карен Кингстон последствий неучастия правительства, процедуры Закона о ложных исках и документирование конфликтов интересов правительства\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eЗакон о ложных исках — 31 U.S.C. Разделы 3729-3733\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eПритчи 1:22, Екклесиаст 5:8 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство НБО Ховарда Питмана — Предупреждение об окончании времени, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e — Сети взаимной защиты, предотвращающие подотчетность\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — Правительство и фарма, марширующие в согласованной безнаказанности\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e — Системы правосудия, разработанные для защиты могущественных\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers' Lies\u003c/a\u003e — Институциональный отказ преследовать истину\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e — Координируемая институциональная защита операций противника\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/federal-government-pfizer-data-fraud/?lang=ru\"\u003eIs It a Crime? Federal Government Assisted Pfizer in Data Fraud\u003c/a\u003e — Активная роль правительства в мошенничестве, которое оно отказывается преследовать\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/florida-criminal-charges-pfizer/?lang=ru\"\u003eHow Florida Residents Can Bring Criminal Charges Against Pfizer\u003c/a\u003e — Альтернативы на уровне штата федеральному неприследованию\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/government-fraud-biopharma/?lang=ru\"\u003eIs it Legal for the US Government to Commit Fraud with BioPharma\u003c/a\u003e — Правовая основа, позволяющая взаимную защиту\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/doctors-vacate-prep-act/?lang=ru\"\u003eOver 100,000 Doctors Pave Way to Vacate PREP Act Immunity\u003c/a\u003e — Нарушение щита ответственности извне правительства\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eПилат вымыл свои руки. Правительство подало уведомление о неучастии. Наиболее следственное дело об осведомителе в истории фармацевтики будет продолжаться без поддержки правительства, которое покупало, обязало и получало прибыль от продукта в вопросе. \"Камень, который отвергли строители, тот же стал главным углом\" (Матфей 21:42). Brook Jackson и доказательства, которые она несет, были отвергнуты строителями фармацевтическо-правительственного комплекса. Но истина, которую она говорит, не требует одобрения правительства. Она требует только один честный суд, один справедливый судья и двенадцать граждан, готовых взвесить доказательства без мытья рук.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Судебное разбирательство в деле Pfizer: Правительство НЕ заинтересовано в справедливости\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Сенсационное судебное разбирательство раскрывает, что федеральное правительство отказалось вмешаться в дело об осведомителе Pfizer, сигнализируя отказ преследовать подотчетность.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-mut
