в Америке XIX века в один и тот же момент: \"торговец змеиным маслом\", который продавал мошеннические чудо-лекарства, и \"охотник за костями динозавров\", который утверждал, что обнаружил останки огромных древних рептилий, которых никто никогда не видел живыми. Оба явления были продуктами одного культурного момента — момента, когда наука становилась инструментом социального контроля, когда учреждения создавались для производства консенсусной реальности, и когда империя Рокфеллера начинала свой столетний проект переделки мира по своему образу.\u003c/p\u003e\n\u003cp\u003eТорговец змеиным маслом помнят как афериста — мошенника, который продавал бесценные зелья доверчивым простакам. Но палеонтолог, который \"открыл\" кости динозавра на американском Западе, делал то же самое в большем масштабе: продавал непроверяемую историю публике, жаждущей верить в авторитет науки. Разница в том, что торговца змеиным маслом разоблачили и высмеяли, а палеонтолога возвысили и прославили. Оба служили одной функции: они учили публику принимать утверждения \"экспертов\" без требования проверяемых доказательств.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман узнал во время своего опыта близкого столкновения со смертью, что демонический мир работает через сложные системы обмана. 97,5% тех, кто потерпел неудачу, приняли версию реальности, сконструированную силами, которых они не видят. Нарратив о динозаврах и нарратив о фармацевтике — две ветви одного дерева — дерева, уходящего корнями в ложь о том, что знание человека превосходит откровение Божье.\u003c/p\u003e\n\u003cp\u003eИезуиты, мастера образования и контроля информации, понимали за столетия до этого, что тот, кто контролирует историю, контролирует мир. Наполеон видел их \"абсолютную власть\". Адамс предупреждал об их \"вечном осуждении\". Тамбурини правил \"половиной мира\". История динозавров и история современной медицины служат одному хозяину.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"костяные-войны-и-рождение-палеонтологии\"\u003eКостяные войны и рождение палеонтологии\u003c/h2\u003e\n\u003ch3 id=\"отниэль-чарльз-марш-и-эдвард-дринкер-коп\"\u003eОтниэль Чарльз Марш и Эдвард Дринкер Коп\u003c/h3\u003e\n\u003cp\u003e\"Костяные войны\" 1870-1890-х годов противопоставляли двух соперничающих палеонтологов — Отниэля Чарльза Марша из Йеля и Эдварда Дринкера Копа из Академии естественных наук — в лихорадочном соревновании по открытию и названию новых видов динозавров. Соперничество характеризовалось:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eМошенничеством\u003c/strong\u003e: Оба мужчины обвинялись в подделке, неправильном определении и манипулировании ископаемыми свидетельствами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСаботажем\u003c/strong\u003e: Они уничтожали друг другу места раскопок, крали окаменелости и подкупали рабочих\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБезрассудным названием видов\u003c/strong\u003e: За время Костяных войн было названо более 130 новых видов, многие из которых позже оказались дубликатами, неправильными определениями или подделками\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФинансовой поддержкой\u003c/strong\u003e: Марш финансировался Йелем (который получал деньги Рокфеллера), тогда как Коп был независимо богат, но в конце концов разорился\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКостяные войны не были наукой. Они были спектаклем — публичным развлечением, которое случайно произвело нарратив, служивший мощным интересам. Нарратив был таков: Земле миллионы лет, огромные рептилии когда-то правили планетой, и только аккредитованные ученые из элитных учреждений могут интерпретировать доказательства.\u003c/p\u003e\n\u003ch3 id=\"связь-с-рокфеллером\"\u003eСвязь с Рокфеллером\u003c/h3\u003e\n\u003cp\u003eСвязь династии Рокфеллеров с палеонтологией глубока. Американский музей естественной истории — учреждение, в наибольшей степени ответственное за популяризацию динозавров — получал значительное финансирование от семьи Рокфеллеров. Залы динозавров музея, его экспедиционные программы и инициативы общественного образования — все финансировалось деньгами Рокфеллера.\u003c/p\u003e\n\u003cp\u003eПочему нефтяной магнат финансировал исследования динозавров? Ответ — нефть. Если общественность верит, что Земле сотни миллионов лет и что огромные органические существа жили и умирали в огромных количествах в течение тех эонов, то существование нефти — якобы образованной из разложившихся останков древних организмов — имеет смысл. Нарратив о динозаврах поддерживает нарратив о \"ископаемом топливе\", который поддерживает нефтяную империю Рокфеллера.\u003c/p\u003e\n\u003cp\u003eСам термин \"ископаемое топливо\" предполагает, что нефть образуется из древних биологических останков. Но эта теория — биогенная теория происхождения нефти — не является универсально принятой. Абиогенная теория утверждает, что нефть образуется через геологические процессы глубоко в недрах Земли, из первобытного углерода, присутствовавшего с момента образования планеты. Если нефть не является \"окаменевшим\" биологическим материалом, то весь нарратив о \"ископаемом топливе\" — и модель дефицита, оправдывающая высокие цены на нефть — рушится.\u003c/p\u003e\n\u003cp\u003eМиф о динозаврах поддерживает миф о нефти. Миф о нефти поддерживает прибыли Рокфеллера. Прибыли Рокфеллера финансируют учреждения, которые perpetuируют оба мифа. Это замкнутый цикл взаимно усиливающихся лжей.\u003c/p\u003e\n\u003ch2 id=\"связь-со-змеиным-маслом\"\u003eСвязь со змеиным маслом\u003c/h2\u003e\n\u003ch3 id=\"что-на-самом-деле-было-змеиным-маслом\"\u003eЧто на самом деле было змеиным маслом\u003c/h3\u003e\n\u003cp\u003eТермин \"змеиное масло\" стал синонимом мошенничества, но оригинальное змеиное масло было законной китайской медициной. Китайские рабочие, которые строили Трансконтинентальную железную дорогу в 1860-х годах, использовали масло, полученное из китайских водяных змей, для лечения боли в суставах и воспаления. Масло было богато омега-3 жирными кислотами и обладало подлинными противовоспалительными свойствами.\u003c/p\u003e\n\u003cp\u003eАмериканские \"торговцы змеиным маслом\" скопировали концепцию, но заменили подлинный продукт минеральным маслом, скипидаром и другими дешевыми ингредиентами. Они путешествовали от города к городу, продавая свои мошеннические продукты с театральными представлениями, которые имитировали авторитет науки без ее субстанции.\u003c/p\u003e\n\u003cp\u003eПараллель с современным фармацевтическим маркетингом точна:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПодлинное естественное средство\u003c/strong\u003e существует\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПромышленная имитация\u003c/strong\u003e создается, которая дешевле в производстве\u003c/li\u003e\n\u003cli\u003eИмитация продается с \u003cstrong\u003eтеатральным авторитетом\u003c/strong\u003e (белые халаты вместо скоморохов, рецензируемые журналы вместо карнавальных зазывал)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПодлинное средство подавляется и высмеивается\u003c/strong\u003e (естественная медицина становится \"шарлатанством\")\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПромышленная имитация становится единственным легальным вариантом\u003c/strong\u003e (регулирование FDA, требования рецепта)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"захват-медицины-рокфеллером\"\u003eЗахват медицины Рокфеллером\u003c/h3\u003e\n\u003cp\u003eПреобразование от змеиного масла к фармацевтической медицине не было эволюцией — это была революция, разработанная Фондом Рокфеллера. Отчет Флекснера 1910 года классифицировал естественную медицину, гомеопатию и травяное исцеление как \"шарлатанство\" и закрыл школы, которые их преподавали. На их место финансируемые Рокфеллером медицинские школы ввели аллопатическую медицину — медицину, основанную на фармацевтических препаратах, полученных из нефти и химических процессов.\u003c/p\u003e\n\u003cp\u003eТорговец змеиным маслом был заменен фармацевтическим представителем. Скоморошеское шоу было заменено медицинской конференцией. Нерегулируемое патентованное лекарство было заменено одобренным FDA препаратом. Но фундаментальная динамика осталась той же: промышленный продукт, продаваемый с авторитетом, продаваемый публике, которую учили доверять продавцу.\u003c/p\u003e\n\u003ch2 id=\"миф-о-динозаврах-более-глубокий-взгляд\"\u003eМиф о динозаврах: более глубокий взгляд\u003c/h2\u003e\n\u003ch3 id=\"что-на-самом-деле-было-найдено\"\u003eЧто на самом деле было найдено\u003c/h3\u003e\n\u003cp\u003eНесмотря на популярный образ полных скелетов динозавров, стоящих в залах музеев, реальность палеонтологических доказательств гораздо менее впечатляюща:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eБольшинство видов динозавров\u003c/strong\u003e известны только из фрагментарных останков — нескольких костей, зубов или костных фрагментов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПолные скелеты\u003c/strong\u003e чрезвычайно редки; музейные экспозиции в основном являются реконструкциями, с настоящими костями, дополненными (или полностью замененными) гипсовыми слепками и скульптурными репликами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМягкие ткани\u003c/strong\u003e не должны выживать в течение миллионов лет, однако палеонтологи утверждали, что нашли мягкие ткани в костях динозавров — невозможность согласно общепринятой хронологии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНаходки костей динозавров\u003c/strong\u003e сосредоточены в нескольких географических районах и контролируются небольшим количеством учреждений с финансовыми интересами в сохранении нарратива о динозаврах\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"проблема-реконструкции\"\u003eПроблема реконструкции\u003c/h3\u003e\n\u003cp\u003eКогда палеонтолог находит несколько костей и конструирует из них целое животное, этот процесс включает огромное количество спекуляций. Форма животного, его размер, его окраска, его поведение — все это изобретается, а не наблюдается. Несколько фрагментов костей становятся грозным Тираннозавром через применение воображения, художественного мастерства и институционального консенсуса.\u003c/p\u003e\n\u003cp\u003eЭтот процесс реконструкции представляется публике как наука. Дети посещают музеи естественной истории и видят то, что они верят, что это настоящие скелеты динозавров. На самом деле они часто видят гипсовые слепки, скульптурные реплики и реконструкции, построенные из фрагментов, дополненные обоснованными предположениями.\u003c/p\u003e\n\u003ch3 id=\"финансовый-стимул\"\u003eФинансовый стимул\u003c/h3\u003e\n\u003cp\u003eПалеонтология — дисциплина, зависящая от финансирования. Исследователи зависят от грантов, учреждения зависят от пожертвований, музеи зависят от продажи билетов. Динозавры — главная достопримечательность в естественной истории — они продают билеты, генерируют медиа-освещение и оправдывают просьбы финансирования.\u003c/p\u003e\n\u003cp\u003eЭто создает мощный стимул к поиску новых видов, выдвижению драматических претензий и сохранению нарратива о динозаврах. Палеонтолог, который ставит под сомнение парадигму динозавров, рискует профессиональным разрушением. Музей, который преуменьшает динозавров, рискует финансовым крахом. Нарратив самовоспроизводится, потому что люди, которые его сохраняют, — это люди, которые от него получают прибыль.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"почему-миф-о-динозаврах-имеет-духовное-значение\"\u003eПочему миф о динозаврах имеет духовное значение\u003c/h3\u003e\n\u003cp\u003eНарратив о динозаврах служит определенной духовной функции: он поддерживает эволюционную мировоззрение, которое противоречит библейскому рассказу о сотворении. Если динозавры жили миллионы лет назад и эволюционировали через естественные процессы, то Бытие — миф, сотворение — выдумка, и Бог не нужен.\u003c/p\u003e\n\u003cp\u003eЭто конечная цель нарратива о динозаврах — не образовывать, не продвигать науку, а заменить Творца творением, заменить божественный дизайн случайностью, заменить веру материализмом.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман увидел, что духовный мир — истинная реальность. Миф о динозаврах работает полностью в материальном царстве — это чисто материалистический нарратив, который отрицает духовное измерение существования. Обучая детей тому, что вселенной миллиарды лет и что жизнь эволюционировала через случайные мутации, система образования разрывает связь детей с их Творцом до того, как они станут достаточно старыми, чтобы понять, что они теряют.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов сыграл сложную роль в дебате эволюции. Хотя Католическая церковь официально принимает эволюцию (с оговорками), орден иезуитов был инструментальным в формировании интеллектуальной базы, которая вмещает как религию, так и дарвиновскую эволюцию — базы, которая фактически нейтрализует библейский рассказ о сотворении, отнеся его к метафоре.\u003c/p\u003e\n\u003cp\u003eЭто классическая иезуитская стратегия: инфильтрировать обе стороны дебата и убедиться, что результат служит целям ордена. Верите ли вы в буквальное сотворение или теистическую эволюцию, система иезуитского образования сформировала основу, в которой вы думаете о вопросе.\u003c/p\u003e\n\u003ch2 id=\"сходимость\"\u003eСходимость\u003c/h2\u003e\n\u003ch3 id=\"змеиное-масло--динозавры--современный-контроль\"\u003eЗмеиное масло + динозавры = современный контроль\u003c/h3\u003e\n\u003cp\u003eЭра змеиного масла и эра динозавров сошлись в начале XX века, чтобы произвести современную систему контроля:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eРокфеллеровская медицина\u003c/strong\u003e заменила естественное исцеление фармацевтическими препаратами (змеиное масло в промышленном масштабе)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФинансируемая Рокфеллером палеонтология\u003c/strong\u003e заменила библейское сотворение эволюционным материализмом (миф о динозаврах, институционализированный)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРокфеллеровское образование\u003c/strong\u003e обучало общественность принимать авторитет экспертов без вопросов (Отчет Флекснера + реформа государственных школ)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРокфеллеровские медиа\u003c/strong\u003e контролировали нарративы, которые формировали убеждения общественности (владение газетами, позже вещание)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eРезультат — население, которое принимает фармацевтические продукты на веру, верит в динозавров по авторитету и доверяет институциональной науке как безошибочной — тогда как сами учреждения служат повестке дня, которая не имеет ничего общего с общественной пользой и все имеет общего с силой, прибылью и духовной повесткой дня сил, которые их контролируют.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследования о нарративе динозавров и контроле Рокфеллера над наукой\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство ОСД Хоуарда Питтмана\u003c/a\u003e — духовные последствия материалистических нарративов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая тайна: раскрытие позорящих иезуитских секретов\u003c/a\u003e — влияние иезуитов на образование и интеллектуальные основы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и Фармакия — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e- Исторические записи Костяных войн и американской палеонтологии\u003c/li\u003e\n\u003cli\u003eИсследования теории абиогенного происхождения нефти\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eРокфеллеровская медицина\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eИнженерирование заразы\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/61-Synthetic_Biology.mp4\"\u003eСинтетическая биология\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/13-The_Word_of_God.mp4\"\u003eСлово Божье\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/history-vitamin-discoveries/?lang=ru\"\u003eБеспокойная история так называемых открытий витаминов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/immune-system-hoax/?lang=ru\"\u003eМОШЕННИЧЕСТВО ИММУННОЙ СИСТЕМЫ: что они вам никогда не говорили\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/space-rockets-helium-balloons/?lang=ru\"\u003eЯвляются ли космические ракеты на самом деле ГЕЛИЕВЫМИ ШАРАМИ: доказательства\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eТорговца змеиным маслом прогнали из города. Палеонтолога дали музей. Оба продавали выдумки. Оба служили одной системе. Единственное различие — масштаб. Сомневайтесь во всем — особенно в историях, которые они учат ваших детей как факту.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Змеиное масло и миф о возвышении динозавров\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Миф о динозаврах и эра змеиного масла имеют общее происхождение: финансируемая Рокфеллером наука, создающая прибыльные выдумки для контроля систем публичного убеждения.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-11-29T10:00:00Z\",\"children\":\"29 ноября 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"динозавры\",{\"href\":\"/ru/tag/динозавры/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"динозавры\"]}],[\"$\",\"a\",\"змеиное-масло\",{\"href\":\"/ru/tag/змеиное-масло/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"змеиное-масло\"]}],[\"$\",\"a\",\"рокфеллер\",{\"hre
