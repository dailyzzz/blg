003e\n\u003cp\u003eПлач Рахили отзывается через века. Горе матери, которая потеряла своего ребенка, — это наиболее острое страдание в человеческом опыте — страдание настолько глубокое, что пророк Иеремия, и позже Евангелие Матфея (2:18), использовали его для описания убийства невинных детей государственной властью. Рахиль плачет, потому что ее дети \"не были\" — они существовали, а затем они не существовали. Потеря абсолютна.\u003c/p\u003e\n\u003cp\u003eМамы плачут сегодня. Их младенцы получили вакцину против кори — продукт, который им сказали, что он необходим, безопасен и ответственный выбор — и их дети умерли. Горе этих мам — это горе Рахили. Институциональная система, которая уверила их в безопасности, — это система Фараона, обещающая уход, но доставляющая вред.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eВакцина зверя\u003c/a\u003e говорит о древнем паттерне нацеливания детей через медицинскую систему. И трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/95-The_Valley_of_Death.mp4\"\u003eДолина смерти\u003c/a\u003e дает голос путешествию через тень, которое прошли эти семьи.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вакцина-против-кори-что-мамам-говорят\"\u003eВакцина против кори: Что мамам говорят\u003c/h2\u003e\n\u003ch3 id=\"официальное-повествование\"\u003eОфициальное повествование\u003c/h3\u003e\n\u003cp\u003eМамам говорят:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКорь — опасное заболевание, которое может вызвать серьезные осложнения и смерть\u003c/li\u003e\n\u003cli\u003eВакцина MMR (корь, паротит, краснуха) безопасна и эффективна\u003c/li\u003e\n\u003cli\u003eСерьезные побочные эффекты \"чрезвычайно редки\"\u003c/li\u003e\n\u003cli\u003eВыгода от вакцинации намного превышает риски\u003c/li\u003e\n\u003cli\u003eВсе дети должны получить две дозы (первая в 12-15 месяцев, вторая в 4-6 лет)\u003c/li\u003e\n\u003cli\u003eОтказ от вакцинации ставит под угрозу не только вашего ребенка, но и других детей (\"коллективный иммунитет\")\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто повествование доставляется педиатрами, CDC, Американской академией педиатрии, школьными системами и кампаниями по общественному здравоохранению. Это представляется как установленная наука, не подлежащая обсуждению, и мамы, которые ставят под сомнение его, часто называются \"антивакцинаторами\" — термин, предназначенный для прекращения исследования.\u003c/p\u003e\n\u003ch3 id=\"что-мамам-не-говорят\"\u003eЧто мамам не говорят\u003c/h3\u003e\n\u003cp\u003eМамам обычно не говорят:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВакцина MMR имеет задокументированную историю вызывания серьезных нежелательных явлений, включая смерть.\u003c/strong\u003e Вкладыш пакета вакцины список смерти как сообщенное нежелательное событие. VAERS содержит тысячи отчетов о серьезных нежелательных событиях после вакцинации MMR, включая отчеты о смерти младенца.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСмертность от кори снизилась на более чем 98% ДО введения вакцины против кори.\u003c/strong\u003e В Соединенных Штатах смертность от кори в 1963 году (год, когда первая вакцина против кори была лицензирована) составляла приблизительно 0,2 на 100,000 — драматическое снижение с доиндустриального времени, достигнутое через улучшение питания, санитарии и здравоохранения, а не вакцинацию.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВакцина MMR никогда не была протестирована против истинного плацебо.\u003c/strong\u003e Клинические испытания, которые привели к одобрению MMR, сравнили вакцину против других вакцин или реактивных компонентов, а не против инертного физиологического раствора. Базовая линия безопасности была никогда не установлена против истинного неактивного контроля.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВакцина MMR содержит живые аттенуированные вирусы\u003c/strong\u003e, которые могут и вызывают инфекцию у некоторых получателей. Вакцинный штамм кори был обнаружен у детей, которые развили болезнь, подобную кори, после вакцинации. Вакцина не инертна — она содержит живые биологические агенты.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVAERS захватывает только фракцию нежелательных событий.\u003c/strong\u003e Собственные данные CDC предполагают, что VAERS захватывает 1-10% фактических событий. Это означает, что каждый отчет VAERS о смерти или серьезной травме после вакцинации MMR представляет 10-100 фактических событий.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"отчеты-о-смертях-что-показывает-vaers\"\u003eОтчеты о смертях: Что показывает VAERS\u003c/h2\u003e\n\u003ch3 id=\"отчеты-о-смертях-в-vaers-после-вакцин-против-кориmmr\"\u003eОтчеты о смертях в VAERS после вакцин против кори/MMR\u003c/h3\u003e\n\u003cp\u003eСистема отчета о нежелательных явлениях вакцин содержит отчеты о смертях младенцев после вакцин, содержащих корь. Эти отчеты включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСмерти, произошедшие в течение часов - дней после вакцинации\u003c/li\u003e\n\u003cli\u003eСмерти у ранее здоровых младенцев без известных факторов риска\u003c/li\u003e\n\u003cli\u003eСмерти, сопровождаемые припадками, высокой лихорадкой или энцефалитной реакцией\u003c/li\u003e\n\u003cli\u003eСмерти, приписываемые судебными медиками СДВР (Синдром внезапной детской смерти) — медицинского диагноза \"ловушка\" для необъясненной детской смерти\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВременная ассоциация — смерть, произошедшая вскоре после вакцинации у ранее здорового младенца — является мощным доказательством, которое требует расследования. В любом другом контексте, если ребенок проглотил вещество и умер в течение часов, это вещество было бы исследовано как причина. Но когда вещество — вакцина, предположение по умолчанию — совпадение.\u003c/p\u003e\n\u003ch3 id=\"связь-сдвр\"\u003eСвязь СДВР\u003c/h3\u003e\n\u003cp\u003eЗначительное количество детских смертей, о которых сообщается в VAERS после вакцинации, классифицируются как СДВР — Синдром внезапной детской смерти. СДВР не является причиной смерти. Это ярлык, применяемый, когда причина смерти не может быть определена. Это, по определению, диагноз невежества.\u003c/p\u003e\n\u003cp\u003eИсследование задокументировало временную кластеризацию смертей СДВР вокруг дат вакцинации — особенно в дни, сразу следующие за вакцинацией. Эта кластеризация предполагает, что, по крайней мере, некоторая доля смертей СДВР связана с вакциной, при этом классификация \"неизвестная причина\" служит для сокрытия временной ассоциации с вакцинацией.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"отчет-kingston-подавленная-история\"\u003eОтчет Kingston: Подавленная история\u003c/h2\u003e\n\u003cp\u003eАнализ Карен Кингстон через \u003ca href=\"https://karenkingston.substack.com\"\u003eThe Kingston Report\u003c/a\u003e документирует подавленную историю вреда от вакцины против кори, включая институциональные механизмы, которые предотвращают признание смертей, вызванных вакциной.\u003c/p\u003e\n\u003ch3 id=\"закон-о-национальной-вакцине-для-детей-1986\"\u003eЗакон о национальной вакцине для детей (1986)\u003c/h3\u003e\n\u003cp\u003eKingston задокументировала правовую структуру, которая защищает производителей вакцин от ответственности: Закон о национальной вакцине для детей (NCVIA) 1986 года. Этот закон:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУдалил право родителей подавать в суд на производителей вакцин\u003c/strong\u003e за травмы или смерти, вызванные вакцинами в расписании CDC\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоздал Программу компенсации травм от вакцин (VICP)\u003c/strong\u003e — беспроигрышную систему, которая компенсирует некоторые травмы от вакцин без привлечения производителей к ответственности\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстановил систему отчета о нежелательных явлениях вакцин (VAERS)\u003c/strong\u003e — пассивную систему отчета, которая по замыслу захватывает только фракцию событий\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСтимулировала расширение расписания вакцин\u003c/strong\u003e — потому что производители столкнулись с отсутствием ответственности, коммерческий стимул добавлять больше вакцин в расписание увеличился\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNCVIA была принята, потому что производители вакцин угрожали прекратить производство детских вакцин, если они не получат защиту от ответственности. Позиция индустрии была, по сути: \"Продукты, которые мы производим, вызывают достаточно травм, что мы не можем себе позволить иски. Защитите нас от ответственности или мы прекратим производство продуктов\".\u003c/p\u003e\n\u003cp\u003eЭто признание индустрией того, что ее продукты вызывают травмы. Защита ответственности не была создана, потому что вакцины безопасны — она была создана, потому что они НЕ достаточно безопасны, чтобы выдержать обычное судебное разбирательство о ответственности за продукт.\u003c/p\u003e\n\u003ch3 id=\"дело-thompson-как-информатора\"\u003eДело Thompson как информатора\u003c/h3\u003e\n\u003cp\u003eKingston выделил случай д-ра Уильяма Томпсона, старшего ученого CDC, который в 2014 году предоставил документы Конгрессу, утверждая, что CDC уничтожил данные, связывающие вакцину MMR с увеличением риска аутизма у афроамериканских мальчиков. Thompson заявил, что CDC провел исследование, найденное статистически значимую ассоциацию, и затем манипулировал анализом данных для устранения сигнала.\u003c/p\u003e\n\u003cp\u003eПретензии Thompson никогда не были формально исследованы Конгрессом. Документы, которые он предоставил, не были обнародованы через официальные каналы. СМИ отклонили историю. Но претензии Thompson — сделанные учеными CDC, сидящими с доступом к исходным данным — представляют внутреннее свидетельство о том, что CDC активно подавлял сигналы безопасности для вакцины MMR.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейская-перспектива-защита-маленьких\"\u003eБиблейская перспектива: Защита маленьких\u003c/h2\u003e\n\u003ch3 id=\"предупреждение-мельницы\"\u003eПредупреждение мельницы\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Но кто соблазнит одного из малых сих, верующих в Меня, тому лучше было бы, если бы повесили ему мельничный жернов на шею и потопили его в глубине морской.\" — Матфей 18:6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИисус произнес наиболее суровое предупреждение во всем Писании о тех, кто причиняет вред детям. Предупреждение мельницы — не предложение — это божественное провозглашение последствий для тех, кто соблазняет (причиняет вред, создает препятствие для) \"маленьких сих\".\u003c/p\u003e\n\u003cp\u003eКогда младенец умирает после вакцинации — когда родители доверяли учреждению, привели своего здорового ребенка к врачу, и этот ребенок умер — предупреждение мельницы применяется ко всем в цепи: производителю, который произвел продукт, регулятору, который одобрил его, педиатру, который ввел его, и учреждению, которое подавило данные о безопасности, которые могли бы привести родителей к другому решению.\u003c/p\u003e\n\u003ch3 id=\"кровь-невинных\"\u003eКровь невинных\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ибо шесть дел ненавидит Господь, даже семь мерзко Ему: очи гордые, язык лживый и руки, проливающие кровь невинную.\" — Притчи 6:16-17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПролитие невинной крови указано среди главных отвращений Бога. Никакая кровь не является более невинной, чем кровь младенца — существа, которое не совершило греха, не сделало врагов и вошло в мир полностью зависимым от взрослых, возложенных на его защиту. Когда этот младенец умирает от продукта, введенного этими защитниками по рекомендации учреждений, финансируемых производителем продукта, невинная кровь пролита через институциональную систему, которая сделала ответственность невозможной.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-мамы-должны-знать\"\u003eЧто мамы должны знать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eВкладыш пакета вакцины MMR указывает смерть как сообщенное нежелательное событие.\u003c/strong\u003e Это документ производителя.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVAERS содержит отчеты о смерти младенца после вакцинации против кори.\u003c/strong\u003e Эти отчеты захватывают только 1-10% фактических событий.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСмертность от кори снизилась на более чем 98% до того, как вакцина существовала.\u003c/strong\u003e Улучшение питания и санитарии, а не вакцинация, привели снижение.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВакцина MMR никогда не была протестирована против истинного плацебо.\u003c/strong\u003e Базовая линия безопасности неизвестна.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПроизводители вакцин имеют нулевую ответственность\u003c/strong\u003e за травмы, вызванные детскими вакцинами согласно NCVIA 1986 года.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСДВР — это не причина смерти\u003c/strong\u003e — это ярлык, применяемый, когда причина не определена, потенциально маскируя смерти, связанные с вакциной.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУченый CDC заявил, что агентство уничтожило данные\u003c/strong\u003e, связывающие MMR с неблагоприятными исходами.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВы имеете право отказать\u003c/strong\u003e любую вакцину для вашего ребенка. Знайте законы об исключении вашего штата.\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eKingston, Karen. \u003ca href=\"https://karenkingston.substack.com\"\u003eThe Kingston Report\u003c/a\u003e. Документирование нежелательных явлений от вакцины против кори и институционального подавления.\u003c/li\u003e\n\u003cli\u003eБаза данных VAERS (доступна на vaers.hhs.gov)\u003c/li\u003e\n\u003cli\u003eВкладыш пакета вакцины MMR (Merck — M-M-R II)\u003c/li\u003e\n\u003cli\u003eЗакон о национальной вакцине для детей 1986 года\u003c/li\u003e\n\u003cli\u003eThompson, William. Документы информатора CDC\u003c/li\u003e\n\u003cli\u003eИсторические данные о смертности от кори (CDC/NCHS)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство почти-смертельного опыта Ховарда Питтмана — Предупреждение о конце времен, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолический конфиденциал: раскрытые позорные иезуитские секреты\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и фармакея — Волшебство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eТо, что в подвале Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eВакцина зверя\u003c/a\u003e — Нацеливание детей через медицинскую систему\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eМедицина Рокфеллера\u003c/a\u003e — Захваченная система здравоохранения\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/317-The_Vaccination_Booths.mp4\"\u003eПрививочные кабины\u003c/a\u003e — Инфраструктура массовой инъекции\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/95-The_Valley_of_Death.mp4\"\u003eДолина смерти\u003c/a\u003e — Путешествие через горе и потерю\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/51-The_Covenant_Blood.mp4\"\u003eЗавет крови\u003c/a\u003e — Священная кровь невинных\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"исследовать-далее\"\u003eИсследовать далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/babies-injected-43-vaccine-viruses/?lang=ru\"\u003eМладенцы вводят до 43 вирусов вакцин к двум годам\u003c/a\u003e — Объем детской вакцинации\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/first-increase-infant-deaths-2022/?lang=ru\"\u003e2022 был первым увеличением детской смертности в десятилетиях\u003c/a\u003e — Растущая детская смертность\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/vaccines-infant-deaths-impossible/?lang=ru\"\u003eПочему невозможно для вакцин не вызвать смерти младенца\u003c/a\u003e — Иммунологическая невозможность\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cdc-childhood-vaccine-schedule-reduced/?lang=ru\"\u003eГрафик детской вакцины CDC сокращен: что изменилось\u003c/a\u003e — Отступление расписания\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eРахиль все еще плачет. Ее голос слышен не в Раме, но в больницах, в похоронных бюро, в пустых детских комнатах, где кроватки стоят неиспользованные. Она плачет за детьми, которые были доставлены к врачу здоровыми и пришли домой в гробу — или вообще не пришли домой. Она плачет, потому что учреждение сказало \"безопасно\", и учреждение солгало. Но Бог, который услышал плач Рахили, не изменился. \"Таким образом говорит Господь; удержи голос свой от плача и очи твои от слез; ибо есть награда за труд твой, говорит Господь\" (Иеремия 31:16). Награда идет. И расплата идет с ней.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Что мамы должны знать о смертях младенцев от вакцин против кори\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"То, что каждая мама должна знать о задокументированных смертях младенцев, связанных с вакцинами против кори, данные VAERS и подавленной истории нежелательных явлений MMR.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-04-26T10:00:00Z\",\"children\":\"26 апреля 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"measles-vaccine\",{\"href\":\"/ru/tag/measles-vaccine/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"measles-vaccine\"]}],[\"$\",\"a\",\"infant-deaths\",{\"href\":\"/ru/tag/infant-deaths/\",\"className\":\"tag-pill\",\"children\":[\"#\",
