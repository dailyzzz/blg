u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВойна за вашу душу не началась вчера. Она началась в саду, когда змей прошептал первую ложь, и она продолжается сегодня через каждый институт, каждую традицию, каждый тщательно разработанный праздник, который массы отмечают без вопроса. В части 1 мы начали тянуть нить. В части 2 мы разрываем завесу широко распахнутой.\u003c/p\u003e\n\u003cp\u003eВо время опыта клинической смерти Говард Питтман был показано трёх небес, описанных в писании. Он был свидетелем демонического царства, работающего во втором небе, и ему сказано, что 97,5 процентов христиан, которые умерли во время его опыта, были отвергнуты — сказали, что они \"никогда не сделали Меня Господом\". Питтман узнал, что 95 процентов исповедующих себя христианами служат \"себе\" вместо Бога, и что каждое слово, произнесённое, несёт духовный вес, подтвержденный Матфеем 12:36-37: \u003cem\u003e\"Говорю же вам, что за всякое слово, праздное, которое скажут люди, дадут они ответ в день суда.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eИезуиты понимали эту духовную архитектуру. Основанные Игнатием Лойолой как военная организация с абсолютной властью, Общество Иисуса стало наиболее успешной операцией сбора душ, которую когда-либо видел мир. Наполеон сам объявил об иезуитах: \"Иезуиты — это военная организация, а не религиозный орден. Их начальник — генерал армии, а не просто отец-аббат монастыря. И цель этой организации — власть — власть в её наиболее деспотическом выражении — абсолютная власть, универсальная власть, власть контролировать мир.\" Джон Адамс писал: \"Если когда-либо какая-либо конгрегация людей могла заслуживать вечного проклятия на земле и в аду, это компания Лойолы.\"\u003c/p\u003e\n\u003cp\u003eСистема праздника — это одна из их шедевров — календарь ритуалов, замаскированных под празднование, каждый — портал в поклонение Сатурну, скрытое позади мишуры, сладостей и традиции.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"переставленные-буквы-санта-и-сатана\"\u003eПереставленные буквы: Санта и Сатана\u003c/h2\u003e\n\u003ch3 id=\"имя-скрытое-на-открытом-месте\"\u003eИмя, скрытое на открытом месте\u003c/h3\u003e\n\u003cp\u003eЭто было замечено исследователями на протяжении десятилетий, но остаётся одной из тех истин, которые люди отвергают нервным смехом: имя \"Санта\" — это анаграмма \"Сатаны\". Это не совпадение. Оккультная элита, тайные общества, которые сформировали западную цивилизацию из-за завесы, работают через символизм. Они верят, что размещение истины на открытом месте, они освобождают себя от кармической ответственности. Жертва, которой была показана истина и которая не смогла её признать, становится соучастницей в их собственном обмане.\u003c/p\u003e\n\u003cp\u003eФигура, которую мы знаем как Санта-Клаус, — это композитный персонаж, собранный из фрагментов языческих божеств в течение столетий. Его красный костюм, его ассоциация с трубой и камином, его всезнающее знание поведения детей, его полёт через небо на зимнее солнцестояние — каждый из этих элементов восходит к языческим обрядовым практикам, связанным с Сатурном, Одином и рогатым богом старой религии.\u003c/p\u003e\n\u003cp\u003eКатолическая церковь, под влиянием иезуитов, не устранила эти языческие фигуры. Вместо этого она поглотила их. Иезуитский клятва, раскрытая в документальном фильме \"Католические тайны: Выявленные позорные секреты иезуитов\", описывает организацию, которая проникает \"скрытой хитростью\", требует слепого послушания и готова заниматься \"любым видом порока\", чтобы достичь своих целей. Поглощение языческих божеств в христианские праздники было не случайностью культурного синтеза — это была намеренная стратегия духовного подрыва.\u003c/p\u003e\n\u003ch3 id=\"портал-дымохода-и-ритуалы-камина\"\u003eПортал дымохода и ритуалы камина\u003c/h3\u003e\n\u003cp\u003eПочему Санта входит через дымоход? В древней языческой практике, очаг считался порталом между мирами. Камин был священен домашним богам — лярам и пенатам римской религии, которая сама была продолжением вавилонской мистической религии. Когда семьи собираются вокруг камина в канун Рождества, ожидая сверхъестественное существо спуститься сквозь дымоход с подарками, они reenacting вызывающий ритуал, который предваряет христианство на тысячелетия.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые служили интеллектуальными архитекторами Контр-Реформации, понимали силу ритуала. Отец-генерал Тамбурини похвалился: \"Видите ли, мой господин, из этой комнаты я управляю не только в Париж, но в Китай, не только в Китай, но со всем миром, без того, чтобы кто-либо знал, как я это делаю.\" Это управление расширилась на самые ритуалы, которые семьи совершают в своих гостиных, веря им быть невинной традицией.\u003c/p\u003e\n\u003ch3 id=\"эльфы-демонические-слуги-переосмыслены\"\u003eЭльфы: Демонические слуги переосмыслены\u003c/h3\u003e\n\u003cp\u003eВ скандинавской мифологии эльфы были сверхъестественными существами, связанными с духовным миром. Некоторые были благородны, но многие были обманщиками, оборотнями, существами, которые могли проклясть или благословить по их выбору. Трансформация этих существ в весёлых помощников мастерской Санты — это ещё один пример оккультной практики одомашивания демонического воображения. Дети учат с детства приветствовать этих существ в своё воображение, писать письма, запрашивающие благодеяния от всезнающего существа, который награждает и наказывает — гротескная пародия молитвы.\u003c/p\u003e\n\u003cp\u003eГовард Питтман описал демонов, которых он был свидетелем, как организованные в строгую иерархию, каждый с конкретными ролями и территориями. Концепция мастерской Санты — обширная операция сверхъестественных существ, труд для исполнения желаний — зеркалит демоническую иерархию, которую Питтман был показано работающей во втором небе. Параллель не случайна. Архитекторы этих традиций понимали духовную реальность намного лучше, чем массы, которые их отмечают.\u003c/p\u003e\n\u003ch2 id=\"соединение-сатурна\"\u003eСоединение Сатурна\u003c/h2\u003e\n\u003ch3 id=\"сатурн-господин-золотого-века\"\u003eСатурн: Господин золотого века\u003c/h3\u003e\n\u003cp\u003eСатурн был римским богом времени, урожая и растворения. Его греческим эквивалентом был Кронос, титан, который пожирал собственных детей. Фестиваль Сатурналии, отмечавшийся с 17-23 декабря в древнем Риме, был периодом инверсии роли, дарения, пиршества и морального позволения. Рабы были временно освобождены, социальные нормы были инвертированы, и излишество не только было допущено, но поощрялось.\u003c/p\u003e\n\u003cp\u003eСроки не случайны. Рождество, размещённое 25 декабря Католической Церковью, падает непосредственно после Сатурналии. Ранняя церковь не знала дату рождения Христа — ни один библейский отрывок это не записывает. Размещение Рождества в конце Сатурналии было намеренным актом синкретизма, разработанным, чтобы позволить языческим конвертам продолжить их поклонение Сатурну под христианской завесой.\u003c/p\u003e\n\u003cp\u003eAgent131711 документировал в Substack, как эти древние образцы сохраняются в современной культуре, отмечая, что символы Сатурна — куб, кольцо, коса времени — появляются по корпоративным логотипам, религиозной архитектуре и правительственным зданиям. Культ Сатурна не умер. Он ушёл в подполье, и иезуиты стали его наиболее эффективными хранителями.\u003c/p\u003e\n\u003ch3 id=\"обмен-подарками-предложение-сатурну\"\u003eОбмен подарками: Предложение Сатурну\u003c/h3\u003e\n\u003cp\u003eВо время Сатурналии, римляне обменивали подарки, называемые \u003cem\u003esigillaria\u003c/em\u003e — маленькие фигурки, часто из глины или воска. Они не были просто символами привязанности. Они были заместительными предложениями, заменителями человеческих жертв, которые когда-то были предложены Сатурну в более древние времена. Когда современные семьи обмениваются подарками в рождественское утро, они участвуют в ритуале, чей исходный целью было умиротворение божества, который требовал крови детей.\u003c/p\u003e\n\u003cp\u003eИезуитский орден, который Папа Климент XIV попытался подавить перед тем как быть отравлен за его беспокойство, обеспечил, что эти ритуалы выжили. Бриф подавления Климента 1773 года распустил орден, но иезуиты уже внедрили себя столь глубоко в структуру западной цивилизации, что их влияние не могло быть удалено. Они официально вернулись в 1814 году, но в истине они никогда не уходили.\u003c/p\u003e\n\u003ch2 id=\"нарушение-свободы\"\u003eНарушение свободы\u003c/h2\u003e\n\u003ch3 id=\"распознание-образца\"\u003eРаспознание образца\u003c/h3\u003e\n\u003cp\u003eПервый шаг к свободе — это распознание. Однажды вы видите образец, вы не можете его не видеть. Праздники — это не то, чем они кажутся. Они — сложная система духовной манипуляции, разработанная мужчинами, которые понимали невидимый мир намного лучше, чем обычный прихожанин, и поддерживаемая институциями — особенно иезуитским орденом — которые потратили столетия совершенствования искусства обмана.\u003c/p\u003e\n\u003cp\u003eЭто не означает, что сбор семей — зло или щедрость неправильна. Но сами ритуалы — деревья, подарки, чулки, печенье, оставленное для Санты, ложи, рассказанные детям — несут духовный вес. Каждое слово имеет значение. Каждый ритуал имеет значение. Матфей 12:36-37 — не метафорический.\u003c/p\u003e\n\u003ch3 id=\"выбор-перед-вами\"\u003eВыбор перед вами\u003c/h3\u003e\n\u003cp\u003eГовард Питтман был послан обратно доставить послание: церковь терпит неудачу. Христиане играют в религию, в то время как враг действует с военной точностью. Иезуиты — это военная организация. Демоническая иерархия — это военная организация. Единственная защита — это истина — произнесённая, прожитая и внедрённая в каждый аспект жизни, включая то, как мы отмечаем и какие традиции мы передаём нашим детям.\u003c/p\u003e\n\u003cp\u003eВыбор ваш. Продолжайте участвовать в ритуалах, чьи происхождения и целей были скрыты от вас, или начните трудную работу отделения истины от традиции, света от тщательно разработанной темноты, которая маскируется под праздник.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eТвердь, Земля, Основание — Библейская космология\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eЗемля и твердь — Что Писание действительно говорит\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eПлоская земля, наука и НАСА — Плейлист документального фильма\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eНАСА и космос — Величайший плейлист о космическом обмане\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https:
