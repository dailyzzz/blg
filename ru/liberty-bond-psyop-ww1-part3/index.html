u003e\n\u003cp\u003eПисание явно: долг — это рабство. Программа Liberty Bond Первой мировой войны была крупнейшей долговой операцией в американской истории до этого момента — скоординированной кампанией психологического манипулирования, которая убедила миллионы обычных американцев ссудить свои сбережения правительству по ставкам ниже рыночных, в то время как банкиры, которые спроектировали программу, извлекли миллиарды в прибыль из транзакции. Это не был патриотизм; это была психологическая операция — психологическая операция беспрецедентного масштаба.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые контролируют финансовые сети Ватикана через банковские династии, понимали, что войну можно было поддерживать только если генеральная население могла быть побуждена финансировать ее добровольно. Налогообложение в одиночестве было недостаточным. Федеральный резерв, созданный в 1913 году под иезуитским направлением, предоставил механизм для создания денег, но облигации предоставили механизм для извлечения богатства. Предупреждение Наполеона отзывается через столетия: \u003cem\u003e\"Иезуиты — это военная организация, а не религиозный орден... цель — мощь.\"\u003c/em\u003e Финансовая мощь — это высшая мощь, и психологическая операция Liberty Bond была наиболее прибыльной военной операцией иезуитов.\u003c/p\u003e\n\u003cp\u003eТак как \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e провозглашает, хосты тьмы не просто берут — они убеждают вас дать. И \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e предупреждает, что враг носит единообразие вашей собственной страны, пока грабит вас слепо.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"машина-liberty-bond\"\u003eМашина Liberty Bond\u003c/h2\u003e\n\u003ch3 id=\"четыре-кредитных-привода\"\u003eЧетыре кредитных привода\u003c/h3\u003e\n\u003cp\u003eМежду 1917 и 1918 годами правительство Соединенных Штатов выдало четыре привода Liberty Bond, плюс последний привод \"Victory Bond\" в 1919 году. Общая сумма, собранная, составляла примерно 21,5 миллиард долларов — эквивалент примерно 450 миллиардов долларов в сегодняшних долларах. Эти деньги были одолжены обычными американскими гражданами федеральному правительству, которое использовало его для финансирования военных действий.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFirst Liberty Loan\u003c/strong\u003e (июнь 1917 г.): 2 миллиарда долларов под 3,5% годовых\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSecond Liberty Loan\u003c/strong\u003e (октябрь 1917 г.): 3,8 миллиарда долларов под 4% годовых\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThird Liberty Loan\u003c/strong\u003e (апрель 1918 г.): 4,2 миллиарда долларов под 4,25% годовых\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFourth Liberty Loan\u003c/strong\u003e (сентябрь 1918 г.): 7 миллиардов долларов под 4,25% годовых\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVictory Liberty Loan\u003c/strong\u003e (апрель 1919 г.): 4,5 миллиарда долларов под 3,75-4,75% годовых\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПроцентные ставки по этим облигациям были умышленно установлены ниже темпа инфляции, означая, что держатели облигаций гарантированно потеряют покупательную способность в течение жизни облигации. Облигация в 4% в экономике, переживающей инфляцию в размере 15-20% в военное время, — это не инвестиция; это пожертвование, замаскированное как инвестиция.\u003c/p\u003e\n\u003ch3 id=\"кампания-пропаганды\"\u003eКампания пропаганды\u003c/h3\u003e\n\u003cp\u003eПривлечение Liberty Bond сопровождалось наиболее интенсивной пропагандистской кампанией в американской истории. Комитет Крила, работающий с министерством казначейства, развернул все доступные средства, чтобы побудить американцев покупать облигации:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПлакаты\u003c/strong\u003e — более 20 миллионов плакатов были напечатаны, показывающие изображения, предназначенные для вызова страха, патриотизма и вины. Знаменитый \"I Want You\" плакат Uncle Sam, зловещий \"Destroy This Mad Brute\" плакат гориллы и бесчисленные изображения женщин, детей и солдат были наклеены на каждую доступную поверхность.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЧетыре минутных человека\u003c/strong\u003e — сеть из 75 000 добровольных спикеров произносили короткие, эмоционально заряженные речи в кинотеатрах, церквях, ложах и публичных собраниях по стране. Этим спикерам предоставлены сценарий разговора от Комитета Крила и обучение в технике убеждения, которые позже будут признаны как психологическое манипулирование.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОдобрения знаменитостей\u003c/strong\u003e — звезды кино, включая Чарли Чаплина, Мэри Пикфорд и Дугласа Фэрбенкса, появились на массивных облигационных митингах, используя их известность, чтобы давить на поклонников на покупку облигаций. Эти появления были не добровольными актами патриотизма; они были скоординированы пропагандным аппаратом правительства.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСоциальное давление\u003c/strong\u003e — сообщества организовали \"привлечение лояльности,\" в котором граждане, которые не покупали облигации, были публично стыдить, остракизированы или хуже. В некоторых сообществах, неудача покупать облигации рассматривалась как доказательство нелояльности, ведущее к преследованию, вандализму и в экстремальных случаях насилию. Немецко-американское сообщество было особенно ориентировано — образец, который был бы повторен с японо-американцами во Второй мировой войне.\u003c/p\u003e\n\u003ch3 id=\"принуждение-за-добровольным-программом\"\u003eПринуждение за \"добровольным\" программом\u003c/h3\u003e\n\u003cp\u003eПрограмма Liberty Bond была официально добровольной. На практике это было принуждением. Работодателей побудили покупать облигации от имени их сотрудников (часто через удержание из зарплаты, которое рабочие не могли отказать). Банков побудили покупать облигации с депозитов вкладчиков. Сообщества устанавливали квоты, и те, кто не соответствовал им, столкнулся с социальными и экономическими последствиями.\u003c/p\u003e\n\u003cp\u003eЭто принуждение было особенно порочным в сельской Америке, где связи сообщества были сильными и последствия социального остракизма были серьезными. Фермеры, которые ставили под сомнение войну или отказывались покупать облигации, находили свой кредит отрезанным, их страховку отмененной и их деловых бойкотированной. Некоторые были смолены и перепутаны. По крайней мере один человек — Роберт Прагер, немецко-рожденный шахтер в Collinsville, Illinois — был линчан толпой за предполагаемые \"неверные\" замечания.\u003c/p\u003e\n\u003ch2 id=\"куда-пошли-деньги\"\u003eКуда пошли деньги?\u003c/h2\u003e\n\u003ch3 id=\"банковский-выигрыш\"\u003eБанковский выигрыш\u003c/h3\u003e\n\u003cp\u003e21,5 миллиардов долларов, собранные через Liberty Bonds, не пошли непосредственно на военные действия. Это пошло через систему Федерального резерва банкинга, где он был умножен через кредиты с фракционным резервом, а затем распределен среди военных подрядчиков, производителей оружия и компаний поставки, которые получали прибыль от войны.\u003c/p\u003e\n\u003cp\u003eКлючевые получатели включали:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJ.P. Morgan \u0026#x26; Co.\u003c/strong\u003e, который служил первичным закупочным агентом для британского и французского правительств. Банк Моргана заработал комиссии на миллиардах долларов в союзных закупках американских товаров — закупки, финансируемые доходами Liberty Bond.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDuPont\u003c/strong\u003e, которая поставляла 40% взрывчатых веществ, используемых союзными силами и чьей цена акции увеличилась более чем на 500% во время войны.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBethlehem Steel\u003c/strong\u003e, которая поставляла броневую плиту, пушки и боеприпасы союзникам и чьим президентом, Charles Schwab, стал одним из самых богатых людей в Америке.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStandard Oil\u003c/strong\u003e, которая снабжала нефтепродукты обе стороны конфликта через свою глобальную сеть распределения.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПрограмма Liberty Bond была, таким образом, механизмом передачи богатства от обычных американцев корпоративной и банковской элите, которые контролировали военную экономику. Облигации были входом; прибыль была выход; и американский народ были отмечены.\u003c/p\u003e\n\u003ch3 id=\"ловушка-долга\"\u003eЛовушка долга\u003c/h3\u003e\n\u003cp\u003eLiberty Bonds создали массивный государственный долг, который потребовал бы десятилетия для погашения — через налогообложение. Подоходный налог, установленный 16-й поправкой в 1913 году (тем же годом, как Закон Федерального резерва), предоставил доход ручей для обслуживания этого долга. Американские работники были, таким образом, обложены налогом для оплаты процентов по облигациям они были вынуждены купить — двойное извлечение, которое передало богатство от рабочего класса к классу держателей облигаций.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/97-Income_Tax_Is_Slavery.mp4\"\u003eIncome Tax Is Slavery\u003c/a\u003e задокументирует эту систему финансового порабощения подробно, и \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e раскрывает как конституциональная основа была манипулирована, чтобы сделать это извлечение законным.\u003c/p\u003e\n\u003ch2 id=\"техники-психологической-операции\"\u003eТехники психологической операции\u003c/h2\u003e\n\u003ch3 id=\"эмоциональное-манипулирование\"\u003eЭмоциональное манипулирование\u003c/h3\u003e\n\u003cp\u003eКампания Liberty Bond экспериментировала техники эмоционального манипулирования, которые все еще используются в государственной пропаганде сегодня:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAppeals страха\u003c/strong\u003e — Плакаты изображали немецких солдат как монстров, угрожающих американским женщинам и детям. Сообщение было ясным: покупать облигации или враг будет вторгаться в ваш дом.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAppeals вины\u003c/strong\u003e — \"Если вы не можете зарегистрироваться, инвестируйте\" был общей лозунг, приравнивая покупки облигаций военному обслуживанию и подразумевая, что те, кто не покупали облигации, были трусами или предателями.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСоциальное доказательство\u003c/strong\u003e — Кампания подчеркнула, что \"каждый\" покупал облигации, создав впечатление, что неучастие было ненормально и подозрительно.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAppeals власти\u003c/strong\u003e — Президенты, генералы и знаменитости поддержали облигации, предоставляя вес своей власти кампании.\u003c/p\u003e\n\u003cp\u003eЭти техники не были изобретены для кампании Liberty Bond; они были адаптированы из методов, которые иезуиты разработали на протяжении веков для манипуляции религиозными популяциями. Стратегия иезуитов \"проникновения через хитрость\" применяется не только к учреждениям, но к умам — и психологическая операция Liberty Bond была массовым проникновением американского ума.\u003c/p\u003e\n\u003ch3 id=\"наследие-современные-психологические-операции\"\u003eНаследие: современные психологические операции\u003c/h3\u003e\n\u003cp\u003eКампания Liberty Bond установила шаблон для каждой последующей государственной психологической операции:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОблигации Второй мировой войны\u003c/strong\u003e использовали те же техники с обновленной образностью.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eХолодная война пропаганда\u003c/strong\u003e использовала то же страх, обращается с коммунистическим врагом.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВойна с террором\u003c/strong\u003e
