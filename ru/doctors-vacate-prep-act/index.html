и Израиля развратились — брали взятки, извращали справедливость, оправдывали виноватых за награду — Бог осудил не только самих судей. Он призвал народ восстать и требовать справедливости. Долг искать справедливость принадлежит не только учреждениям. Когда учреждения дают осечку, бремя падает на отдельных людей, которые сохраняют моральное мужество действовать.\u003c/p\u003e\n\u003cp\u003eКак провозглашает трек Confliction \"Сокрушитель Змеи\", сокрушение головы змеи не достигается только через реформу учреждений, но через верные действия тех, кто отказывается быть сообщником зла.\u003c/p\u003e\n\u003cp\u003eБолее 100 000 врачей объединились, чтобы оспорить PREP Act — юридическую крепость, которая защищала фармацевтические компании от ответственности за травмы, вызванные инъекциями COVID-19. Эти врачи дали клятву не причинять вреда. Теперь они требуют, чтобы те, кто причинил вред, несли последствия.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"prep-act-крепость-иммунитета\"\u003ePREP Act: Крепость иммунитета\u003c/h2\u003e\n\u003cp\u003eЗакон о готовности и чрезвычайной подготовке (PREP Act), подписанный в 2005 году, предоставляет общий иммунитет от ответственности производителям, дистрибьюторам, координаторам программ и квалифицированным лицам, участвующим в администрировании \"охватываемых защитных мер\" во время объявленного чрезвычайного положения в области здравоохранения.\u003c/p\u003e\n\u003cp\u003e4 февраля 2020 года — до того, как в Соединённых Штатах было подтверждено ни одного случая COVID-19 через общее распространение — секретарь HHS Алекс Азар издал декларацию PREP Act, охватывающую защитные меры COVID-19. Эта декларация была впоследствии многократно поправлена, чтобы расширить её охват, распространив иммунитет на производителей вакцин, аптеки, поставщиков медицинских услуг и государственных чиновников, участвующих в программе вакцинации.\u003c/p\u003e\n\u003cp\u003eИммунитет в соответствии с PREP Act почти абсолютен. Его можно преодолеть только в случае \"умышленного проступка\" — правовой стандарт, настолько высокий, что он никогда не был успешно достигнут ни в одном деле PREP Act. Определение умышленного проступка в соответствии с законом требует доказательства того, что охватываемое лицо действовало \"умышленно для достижения неправомерной цели\" с \"знанием того, что акт незаконен\" и в \"пренебрежении известным или явным риском, настолько большим, чтобы сделать весьма вероятным, что вред перевесит пользу\".\u003c/p\u003e\n\u003cp\u003eЕдинственным механизмом компенсации для тех, кто пострадал от охватываемых защитных мер, является Программа компенсации травм от защитных мер (CICP), администрируемая HHS. CICP не имеет судебного пересмотра, процесса обнаружения, права на судебное представительство, права на апелляцию и одного года для подачи требования. По состоянию на 2024 год, CICP рассмотрела тысячи исков о травмах от вакцин COVID-19 — и компенсировала менее дюжины.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон задокументировала в \"The Kingston Report\" (karenkingston.substack.com), что PREP Act был необходимым предварительным условием для всей программы инъекций COVID-19. \"Без PREP Act ни один производитель не согласился бы производить вакцины, ни одна аптека не согласилась бы их вводить, ни один работодатель не согласился бы их требовать\", — писала Кингстон. \"PREP Act — это не просто щит от ответственности — это основание, на котором был построен весь аппарат принудительной инъекции. Удалите PREP Act, и аппарат рухнет.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вызов-врачей\"\u003eВызов врачей\u003c/h2\u003e\n\u003cp\u003eБолее 100 000 врачей подписались на законные и законодательные усилия по отмене положений об иммунитете PREP Act в отношении защитных мер COVID-19. Усилия развиваются по нескольким фронтам:\u003c/p\u003e\n\u003ch3 id=\"конституционный-вызов\"\u003eКонституционный вызов\u003c/h3\u003e\n\u003cp\u003eВрачи утверждают, что PREP Act, применяемый к вакцинам COVID-19, нарушает право Седьмой поправки на судебное разбирательство перед присяжными в гражданском деле. Седьмая поправка гарантирует: \"В исках по общему праву, когда предмет спора превышает двадцать долларов, право на разбирательство перед присяжными сохраняется.\" PREP Act полностью исключает это право для лиц, пострадавших от охватываемых защитных мер, заменяя судебное разбирательство административной программой компенсации, которая не предусматривает судебного пересмотра.\u003c/p\u003e\n\u003cp\u003eКонституционный вызов также ссылается на положение о надлежащей процедуре Пятой поправки, утверждая, что PREP Act лишает пострадавших лиц их свободы и имущества (включая их право на судебный процесс для получения компенсации) без надлежащей процедуры.\u003c/p\u003e\n\u003ch3 id=\"законодательный-вызов\"\u003eЗаконодательный вызов\u003c/h3\u003e\n\u003cp\u003eВрачи утверждают, что иммунитет PREP Act не должен применяться к инъекциям мРНК COVID-19, потому что продукты были существенно неправильно представлены общественности. PREP Act защищает \"охватываемые защитные меры\" — но врачи утверждают, что введённые продукты не были такими, как они были представлены.\u003c/p\u003e\n\u003cp\u003eВ частности, врачи утверждают, что инъекции мРНК были представлены как \"вакцины\" — продукты, которые предотвращают инфекцию и передачу — тогда как на самом деле они не предотвращали инфекцию или передачу. Продукты были представлены как \"безопасные и эффективные\", когда данные клинических испытаний были неполными, контрольная группа была исключена, а сигналы безопасности подавлялись. Продукты были представлены как оставляющиеся в месте инъекции, когда данные биораспределения показывали, что они распространяются по всему телу.\u003c/p\u003e\n\u003cp\u003eЕсли продукты были существенно неправильно представлены, аргумент гласит, то иммунитет PREP Act не применяется, потому что охватываемая защитная мера, которая фактически была введена, не была охватываемой защитной мерой, описанной в разрешении.\u003c/p\u003e\n\u003ch3 id=\"законодательные-усилия\"\u003eЗаконодательные усилия\u003c/h3\u003e\n\u003cp\u003eПараллельно с законными вызовами врачи добиваются действий Конгресса по изменению или отмене PREP Act. Законодательные усилия сосредоточены на:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИсключении или значительном снижении стандарта \"умышленного проступка\"\u003c/li\u003e\n\u003cli\u003eПредоставлении пострадавшим лицам права на судебное разбирательство перед присяжными в гражданском деле\u003c/li\u003e\n\u003cli\u003eУчреждении независимого трибунала по компенсации с судебным пересмотром\u003c/li\u003e\n\u003cli\u003eТребовании производителям поддерживать страховку ответственности как условие разрешения EUA\u003c/li\u003e\n\u003cli\u003eВнедрении положения об истечении срока, которое ограничивает иммунитет PREP Act продолжительностью объявленного чрезвычайного положения\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"значение-100-000-врачей\"\u003eЗначение 100 000 врачей\u003c/h2\u003e\n\u003cp\u003eЭто число значимо не просто по масштабам, но по тому, что оно представляет. Это лицензированные врачи — люди, которые окончили медицинский институт, прошли обучение в ординатуре и получили сертификацию совета. Они обладают учётными данными, которые медицинское учреждение использует для охраны авторитета. Их нельзя отклонить как \"антиваксеров\" или \"теоретиков заговора\" без подрыва доверия к всей системе аккредитации.\u003c/p\u003e\n\u003cp\u003e100 000 врачей представляют примерно 10% от работающего врачебного персонала в Соединённых Штатах. Они включают врачей общей практики, терапевтов, кардиологов, неврологов, онкологов, педиатров, врачей скорой помощи и хирургов. Они практикуют в каждом штате, в каждой системе здравоохранения, в каждой клинической специальности.\u003c/p\u003e\n\u003cp\u003eИх единый вызов PREP Act представляет наиболее значительное разногласие внутри медицинской профессии со времён начала пандемии COVID-19. Это демонстрирует, что нарратив о единодушном медицинском консенсусе, поддерживающем программу вакцинации, был всегда ложным — поддерживается не подлинным согласием, а угрозой профессиональных последствий за разногласие.\u003c/p\u003e\n\u003cp\u003eКингстон заметила: \"100 000 врачей, которые оспаривают PREP Act, представляют совесть американской медицины. Это врачи, которые видели травмы, сообщили о нежелательных явлениях и им было приказано молчать. Это врачи, которые задали вопросы и были наказаны. Это медицинские работники, которые поставили свою клятву выше своей карьеры — и они больше не готовы принимать юридическую базу, которая препятствует их пациентам добиваться справедливости.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"травмы-за-цифрами\"\u003eТравмы за цифрами\u003c/h2\u003e\n\u003cp\u003ePREP Act существует не в вакууме. Он защищает производителей и администраторов от ответственности за реальные травмы, полученные реальными людьми.\u003c/p\u003e\n\u003cp\u003eVAERS — Система регистрации нежелательных явлений вакцины, совместно управляемая CDC и FDA, — получила более 1,6 миллиона отчётов о нежелательных явлениях, связанных с вакцинами COVID-19, включая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eБолее 37 000 отчётов о смертях\u003c/li\u003e\n\u003cli\u003eБолее 68 000 отчётов о постоянной инвалидности\u003c/li\u003e\n\u003cli\u003eБолее 213 000 отчётов о госпитализации\u003c/li\u003e\n\u003cli\u003eБолее 172 000 отчётов о посещениях скорой помощи\u003c/li\u003e\n\u003cli\u003eБолее 21 000 отчётов о миокардите/перикардите\u003c/li\u003e\n\u003cli\u003eБолее 16 000 отчётов об инфаркте миокарда\u003c/li\u003e\n\u003cli\u003eБолее 56 000 отчётов о тяжелой аллергической реакции\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти цифры широко признаны — даже CDC — как представляющие значительное занижение данных. Исследование Harvard Pilgrim Healthcare, заказанное HHS, показало, что менее 1% побочных эффектов вакцин сообщаются в VAERS, что предполагает, что фактическое количество нежелательных явлений на порядки выше, чем указанные цифры.\u003c/p\u003e\n\u003cp\u003ePREP Act гарантирует, что ни один из этих людей — или их семьи в случае смертей — не может подать в суд на производителей продуктов, которые их ранили. 100 000 врачей, оспаривающих PREP Act, борются за восстановление юридического права этих пострадавших американцев добиваться справедливости через судебную систему.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"система-зверя-и-щит-иммунитета\"\u003eСистема зверя и щит иммунитета\u003c/h2\u003e\n\u003cp\u003eТрек ZZZ Daily \"Система биометрического зверя\" документирует архитектуру системы, в которой соответствие является принудительным, а ответственность невозможна. PREP Act — это юридическое воплощение этой архитектуры — закон, который требует участия (через мандаты), одновременно исключая возможность возмещения (через иммунитет).\u003c/p\u003e\n\u003cp\u003eЭто суть системы зверя, описанной в Откровении 13: система, которая осуществляет полную власть над телами и экономическим участием населения, оставаясь неподотчётной за последствия осуществления этой власти.\u003c/p\u003e\n\u003cp\u003e100 000 врачей, оспаривающих PREP Act, пытаются разбить щит иммунитета — восстановить ответственность в системе, созданной для функционирования без неё.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всём, что он говорит тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 звучит в коридорах каждого правительства сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их ровно о том, что произойдёт — их сыновей возьмут на войну, их дочерей на служение, их поля и виноградники отберут, десятину всего конфискуют. Они выбрали человеческое правление над царством Бога, и тирания последовала ровно, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной скрытой структуре власти. Голосование за одну из сторон — это выбор того, какое крыло взмахнёт далее, пока птица летит в том же направлении. Настоящая власть никогда не была в избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003ePREP Act — 42 U.S.C. Section 247d-6d\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — анализ Карен Кингстон архитектуры закона PREP Act, стандарта умышленного проступка и отказов программы CICP\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eVAERS (Vaccine Adverse Event Reporting System) — vaers.hhs.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eHarvard Pilgrim Healthcare — \"Electronic Support for Public Health–Vaccine Adverse Event Reporting System (ESP:VAERS)\"\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSeventh Amendment, U.S. Constitution\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eИсаия 1:17 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e
