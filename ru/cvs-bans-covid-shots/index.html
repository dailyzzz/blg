 ожесточено, он не отпустил израильтян, потому что это было правильно. Он отпустил их, потому что казни сделали стоимость удержания их непереносимой. Его соответствие было не раскаянием — это был расчёт. И в момент, когда давление уменьшилось, он преследовал их к Красному морю.\u003c/p\u003e\n\u003cp\u003eКак трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/127-The_Overcoming.mp4\"\u003eThe Overcoming\u003c/a\u003e разоблачает, битва между добром и злом не выиграна через добровольное соответствие нечестивых, но через подавляющую силу истины, которая делает продолжение лжи ненесущей. CVS не запретила выстрелы COVID, потому что обнаружила совесть. Она запретила их, потому что земля под программой инъекции COVID-19 переместилась — юридически, политически и коммерчески — и стоимость продолжения начала превышать стоимость остановки.\u003c/p\u003e\n\u003cp\u003eВопрос не в том, почему CVS остановилась. Вопрос в том, почему это заняло столько времени — и сколько миллионов инъекций были введены, пока компания знала, или должна была знать, что продукты, которые она отпускала, не были подвергнуты адекватной проверке безопасности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"аптека-как-канал-распределения\"\u003eАптека как канал распределения\u003c/h2\u003e\n\u003cp\u003eВо время пандемии COVID-19 аптеки стали первичным каналом распределения для инъекций COVID-19 в Соединённых Штатах. CVS Health, крупнейшая сеть аптек страны, с более чем 9 900 местоположениями, вводила десятки миллионов доз COVID-19 через свои розничные аптеки и местоположения MinuteClinic.\u003c/p\u003e\n\u003cp\u003eПрограмма Федеральной розничной аптеки для вакцинации COVID-19 — партнёрство между федеральным правительством и сетями аптек — была объявлена в ноябре 2020 года, перед тем, как какая-либо вакцина получила Emergency Use Authorization. Программа зачислила CVS, Walgreens, Walmart, Rite Aid и другие основные сети аптек как узлы распределения в национальной кампании вакцинации.\u003c/p\u003e\n\u003cp\u003eПо этой программе аптеки получили дозы вакцины COVID-19 прямо от федерального правительства без стоимости. Аптекам была произведена компенсация за сборы администрирования — приблизительно $40 за дозу — через Medicare, Medicaid и частное страхование, а также через программу HRSA COVID-19 Uninsured для пациентов без страхования. В масштабе эти сборы администрирования генерировали миллиарды в доход для сетей аптек.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report (karenkingston.substack.com), что модель распределения аптеки служила определённой стратегической цели: она минует традиционные отношения врач-пациент. \"Когда вы получаете вакцину в офисе вашего доктора, ваш врач обзор вашей медицинской истории, оценивает ваши факторы риска, обсуждает риски и выгоды и делает индивидуальную рекомендацию,\" написала Кингстон. \"Когда вы получаете вакцину в аптеке, фармацевт или техник аптеки вводит её согласно протоколу — никаких обзор медицинской истории, никаких индивидуальных оценок риска, никакого надзора врача. Модель аптеки была разработана для максимизации пропускной способности, не безопасности.\"\u003c/p\u003e\n\u003ch3 id=\"щит-prep-act-в-прилавке-аптеки\"\u003eЩит PREP Act в прилавке аптеки\u003c/h3\u003e\n\u003cp\u003eФармацевты и техники аптеки, которые вводили инъекции COVID-19, были покрыты щитом ответственности PREP Act. Это означало, что даже если фармацевт вводил дозу пациенту с известными противопоказаниями, даже если фармацевт не смог проверить аллергии или медицинские условия, даже если фармацевт вводил неправильную дозу или использовал истекший флакон — фармацевт, аптека и производитель были все защищены от ответственности.\u003c/p\u003e\n\u003cp\u003eЭтот щит ответственности удалил единственный механизм, который обычно стимулирует осторожность в медицинской практике: страх последствий за небрежность. С устранённой ответственностью, структура стимулов была полностью однонаправленной — больше доз введено означало больше дохода, с нулевым юридическим риском.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"запрет-что-произошло\"\u003eЗапрет: Что произошло\u003c/h2\u003e\n\u003cp\u003eCVS Health объявила об немедленном прекращении услуг вакцинации COVID-19 в отдельных местоположениях аптеки. Объявление указало множественные факторы:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСнижение спроса:\u003c/strong\u003e Общественный приём выстрелов COVID-19 бустера упал с пандемии-эры максимумов. Наиболее недавняя кампания бустера достигла уровня приём ниже 20% от приемлемого населения — драматическое падение из начальной кампании вакцинации, которая достигла более 70% взрослых.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНормативная неуверенность:\u003c/strong\u003e С прекращением FDA Emergency Use Authorizations и руководством HHS открыто оспаривающим безопасность технологии mRNA, нормативный ландшафт для инъекций COVID-19 стал нестабильным. Аптеки, которые продолжают вводить эти продукты, столкнуться с потенциальной будущей экспозицией ответственности, если щит PREP Act модифицирован или отменён.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУправление инвентарём:\u003c/strong\u003e Дозы вакцины COVID-19 имеют ограниченный срок хранения и требуют специализированного хранилища холодной цепи. С снижающимся спросом, аптеки отбросили значительные количества истекших доз — представляя как отходы, так и риск репутации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБеспокойства персонала:\u003c/strong\u003e Работники аптеки — включая фармацевтов и техников — всё больше выражали беспокойство администрировании продуктов, чей профиль безопасности находится под активной проверкой федеральными органами здравоохранения. Несколько организаций работников аптеки вызвали право отклонить администрирование без профессиональных последствий.\u003c/p\u003e\n\u003ch3 id=\"что-cvs-не-сказала\"\u003eЧто CVS не сказала\u003c/h3\u003e\n\u003cp\u003eCVS не признала беспокойства безопасностью, которые привели к падению общественного спроса. Компания не ссылалась на данные VAERS, документирующие сотни тысяч докладов неблагоприятного события. Она не ссылалась на сигнал миокардита у молодых самцов. Она не ссылалась на данные избыточной смертности. Она не ссылалась на растущее тело рецензируемого исследования, документирующего неблагоприятные эффекты инъекций mRNA COVID-19.\u003c/p\u003e\n\u003cp\u003eКомпания завёрнула своё решение как ответ на условия рынка — спрос упал, и бизнес-случай для поддержания услуг вакцинации COVID-19 во всех местоположениях больше не существует. Эта завёртка позволяет CVS оттянуть от программы вакцинации без признания, что продукты, которые она вводила миллионам американцев, могли вызвать вред.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"машина-дохода\"\u003eМашина дохода\u003c/h2\u003e\n\u003cp\u003eЧтобы понять решение CVS, нужно понимать масштаб дохода, который компания генерировала из вакцинации COVID-19.\u003c/p\u003e\n\u003cp\u003eCVS Health докладывала более $11 млрд в COVID-19-связанном доходе во всех 2021-2023, охватывающем сборы администрирования вакцинации, услуги тестирования COVID-19 и связанные продажи аптеки. Компания вводила более 59 миллионов вакцины COVID-19 и доз бустера в течение этого периода.\u003c/p\u003e\n\u003cp\u003eПри приблизительно $40 за дозу в сборах администрирования — умножено по 59 миллионам доз — программа вакцинации генерировала приблизительно $2,36 миллиарда в одних только сборах администрирования. Это не рассчитывает дополнительный доход из тестирования COVID-19, связанных покупок аптеки и стоимости приобретения клиента миллионов новых пациентов, которые вошли в местоположения CVS для услуг вакцинации.\u003c/p\u003e\n\u003cp\u003eКингстон наблюдала: \"CVS не вводила 59 миллионов доз, потому что забота о общественном здравоохранении. Она вводила 59 миллионов доз, потому что каждая доза генерировала $40 в доходе администрирования под структурой юридического свободного от ответственности. В момент, когда возможность дохода падает и ландшафт ответственности смещается, 'миссия' общественного здравоохранения испаряется. Это говорит вам всё, что вам нужно знать о том, что мотивировало программу.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"фармацевтская-дилемма\"\u003eФармацевтская дилемма\u003c/h2\u003e\n\u003cp\u003eФармацевты занимают уникальное положение в системе здравоохранения. Они лицензированные профессионалы с докторским образованием в фармакологии, взаимодействии лекарств и безопасности пациентов. Они берут клятву приоритизировать благоустройство пациентов. Но во время пандемии COVID-19 фармацевты были помещены в невозможное положение.\u003c/p\u003e\n\u003cp\u003eПротоколы, управляющие вакцинацией COVID-19 в аптеках, были установлены не независимым профессиональным судом фармацевта, но федеральными и корпоративными директивами. Фармацевтов инструктировали вводить инъекции каждому приемлемому пациенту, который запросил их. Протоколы скрининга были минимальны — краткий опросник об аллергиях и текущем заболевании, без обзора полной медицинской истории пациента.\u003c/p\u003e\n\u003cp\u003eФармацевты, которые выражали беспокойства о продуктах — которые оспаривали их безопасность, которые докладывали неблагоприятные события, которые рекомендовали осторожность для конкретных популяций пациентов — сталкивались с профессиональными последствиями. Государственные советы по фармацевтике, руководимые позициями CDC и FDA, рассматривали любое отклонение от рекомендуемых протоколов вакцинации как потенциальные основания для дисциплинарного действия.\u003c/p\u003e\n\u003cp\u003eКингстон задокументировала случаи, в которых фармацевты, которые отказались вводить инъекции COVID-19 — на основании их профессионального судья, что продукты представляли неприемлемые риски для конкретных пациентов — были прекращены, заявлены к советам лицензирования и подчинены профессиональному исследованию. \"Клятва фармацевта 'делать нет вреда' была функционально приостановлена во время COVID-19,\" заявила Кингстон. \"Любой фармацевт, который действовал на эту клятву — кто отклонил введение продукта, который они верили был вредным — был наказан. Система требовала соответствие, не профессиональное судье.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческий-образец\"\u003eПророческий образец\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Корень всех зол — сребролюбие; увлекаясь им, некоторые уклонились от веры и подвергли себя многим скорбям.\" — 1 Тимофею 6:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eРешение CVS остановить инъекции COVID-19 в некоторых местоположениях движимо той же силой, которая движила её вводить 59 миллионов доз: финансовый расчёт. Компания начала, потому что доход был огромен и ответственность была нулевой. Она останавливается, потому что доход упал и ландшафт ответственности смещается.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e документирует, как коммерческие интересы были внедрены в структуры управления нации с её начала — как торговцы и правители всегда были переплетены и как язык государственной службы всегда служил как прикрытие для частной прибыли.\u003c/p\u003e\n\u003cp\u003eВ никаком пункте в этой дуге — от начала участия CVS в программе вакцинации к её частичному отказу — была движущей мотивацией здоровье и безопасность пациентов, которые прошли через её двери. Мотивация была, есть и останется финансовой. Леопард не изменил своих пятен. Он просто переместился для следующей коммерческой возможности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушай голос народа во всём, что он говорит тебе; потому что не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 эхо звучит через коридоры каждого правительства сегодня. Когда Израиль требовал короля, как другие нации, Бог предупредил их точно, что произойдёт — их сыны взяты для войны, их дочери для служения, их поля и виноградники захвачены, десятая часть всего конфискована. Они выбрали человеческое правление над царством Бога и тирания последовала точно, как обещано. Ничего не изменилось. Современная политическая система — два крыла одной птицы — левое и правое, республиканское и демократическое — всё служение той же скрытой структуре власти. Голосование за оба стороны выбирает, какое крыло хлопает дальше, пока птица летит в том же направлении. Подлинная власть никогда не была на любом бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eCVS Health — Corporate announcements and SEC filings\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Karen Kingston's analysis of pharmacy distribution models, PREP Act liability shields, and pharmaceutical revenue structures\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFederal Retail Pharmacy Program for COVID-19 Vaccination — CDC.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eVAERS (Vaccine Adverse Event Reporting System) — vaers.hhs.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eИеремия 13:23, 1 Тимофею 6:10 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — The Warning Against Earthly Kings (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать боль
