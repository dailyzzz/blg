о свидетелей изменяет историю. В Писании свидетельство несет завет вес — свидетель говорит то, что они видели, и их слова стоят как доказательство перед Богом и человеком. Участники испытания са-mRNA гриппа Pfizer — это свидетели. Их тела несут свидетельство того, что делает са-mRNA внутри человеческих существ. Их неблагоприятные события, их госпитализации, их исходы — это свидетельства, написанные не в словах, а в плоти и крови.\u003c/p\u003e\n\u003cp\u003eФармацевтическая промышленность предпочитала бы, чтобы эти свидетельства оставались запечатанными в базах данных клинических испытаний, резюмированные в статистических аннотациях и затемненные за эвфемизмами, такими как \"неблагоприятные события, представляющие особый интерес.\" Но кровь кричит из земли (Бытие 4:10). Свидетельство тела не может быть молчано.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eEngineering Contagion\u003c/a\u003e раскрывает, как болезнь и её лечение сконструированы как часть единой системы. И трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/95-The_Valley_of_Death.mp4\"\u003eThe Valley of Death\u003c/a\u003e говорит о пути тех, кто прошел в тень экспериментальной медицины.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"исследование-фон\"\u003eИсследование: фон\u003c/h2\u003e\n\u003ch3 id=\"программа-са-mrna-против-гриппа-pfizer\"\u003eПрограмма са-mRNA против гриппа Pfizer\u003c/h3\u003e\n\u003cp\u003ePfizer, в партнерстве с BioNTech, разрабатывала кандидаты на вакцину са-mRNA против гриппа в рамках более широкой стратегии замены традиционных вакцин продуктами на основе mRNA. Программа са-mRNA против гриппа представляет одно из первых применений технологии самоусиливающегося к болезни за пределами COVID-19.\u003c/p\u003e\n\u003cp\u003eРационал, представленный Pfizer, простой:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eТекущие вакцины против гриппа относительно неэффективны на лучшее (обычно 40-60% эффективности в хороший год)\u003c/li\u003e\n\u003cli\u003eТехнология mRNA позволяет быстрое обновление штаммов вакцины\u003c/li\u003e\n\u003cli\u003eСамоусиливающийся характер sa-mRNA означает нижние дозы и потенциально более сильные иммунные ответы\u003c/li\u003e\n\u003cli\u003eУспешная вакцина sa-mRNA против гриппа захватила бы массивный годовой рынок (сотни миллионов доз глобально)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"дизайн-исследования\"\u003eДизайн исследования\u003c/h3\u003e\n\u003cp\u003eИсследование са-mRNA гриппа Pfizer привлекло участников через многочисленные клинические сайты. Исследование оценило:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eБезопасность и переносимость при различных уровнях доз\u003c/li\u003e\n\u003cli\u003eИммуногенность (антительный ответ) против штаммов гриппа\u003c/li\u003e\n\u003cli\u003eРеактогенность (немедленные побочные эффекты, такие как боль, лихорадка, усталость)\u003c/li\u003e\n\u003cli\u003eНеблагоприятные события, представляющие особый интерес\u003c/li\u003e\n\u003cli\u003eСерьёзные неблагоприятные события\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eУчастники были взрослыми добровольцами, которые согласились получить экспериментальный самоусиливающийся конструкт mRNA — генетическую программу, разработанную для репликации внутри их клеток и производства поверхностных белков гриппа.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-произошло-с-участниками\"\u003eЧто произошло с участниками\u003c/h2\u003e\n\u003ch3 id=\"реактогенность-немедленные-ответы\"\u003eРеактогенность: Немедленные ответы\u003c/h3\u003e\n\u003cp\u003eУчастники исследования са-mRNA гриппа испытали значительно более высокие темпы реактогенности в сравнении с традиционными вакцинами против гриппа:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЛихорадка:\u003c/strong\u003e Существенный процент участников разработал лихорадку после инъекции — темпы выше, чем те, которые видны с традиционными вакцинами mRNA и резко выше, чем традиционные прививки от гриппа\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУсталость:\u003c/strong\u003e Тяжелая усталость, длящаяся несколько дней, была обычно сообщена\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБоль в месте инъекции:\u003c/strong\u003e Более интенсивная и длительная продолжительность, чем традиционные вакцины\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМиалгия (мышечная боль):\u003c/strong\u003e Распространенные боли в теле, превышающие то, что видно со стандартной вакцинацией против гриппа\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГоловная боль:\u003c/strong\u003e Тяжелые головные боли, требующие лекарства\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОзноб и дрожь:\u003c/strong\u003e Встряхивающие озноб согласно значительному системному воспалительному ответу\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти симптомы указывают на более интенсивную иммунную активизацию, чем традиционные вакцины производят — согласующийся с самоусиливающимся конструктом, генерирующим более высокие уровни антигена в течение более продолжительного периода.\u003c/p\u003e\n\u003ch3 id=\"неблагоприятные-события-представляющие-особый-интерес\"\u003eНеблагоприятные события, представляющие особый интерес\u003c/h3\u003e\n\u003cp\u003eЗа пределами стандартной реактогенности, исследование сообщило о неблагоприятных событиях, которые поднимают серьёзные проблемы безопасности:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСердечные события:\u003c/strong\u003e Отчеты боли в груди, сердцебиения и сердечных симптомов среди участников. Учитывая задокументированную связь между белком шипа и миокардитом (и тот факт, что поверхностные белки гриппа, производимые са-mRNA, могут запустить сходное повреждение миокарда, опосредованное иммунитетом), сердечные события в испытании вакцины от гриппа являются тревожными.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНеврологические симптомы:\u003c/strong\u003e Участники сообщили о неврологических симптомах, включая тяжелые головные боли, головокружение, парестезию (пощипывание и онемение) и когнитивные сложности. Эти симптомы параллельны неврологическим неблагоприятным событиям, задокументированным с вакцинами COVID-19 mRNA, и предполагают, что сама платформа са-mRNA — не просто белок шипа — может способствовать неврологическому вреду.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПродолжительные симптомы:\u003c/strong\u003e Некоторые участники испытали симптомы, длящиеся неделями — далеко дольше, чем \"1-3 дня,\" обычно связанные с реактогенностью вакцины. Продолжительность симптома согласуется с самоусиливающейся природой конструкта: потому что mRNA продолжает репликироваться и производить белок, иммунный ответ продолжает быть стимулированным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗависимость от доз Эффективность:\u003c/strong\u003e Неблагоприятные события были более тяжелы на более высоких уровнях доз — паттерн согласующийся с большей начальной трансфекцией, ведущей к большему усилению и большему производству белка. Однако даже группы нижних доз испытали значительные неблагоприятные события, предполагая, что механизм усиления делает даже малые дозы биологически мощными.\u003c/p\u003e\n\u003ch3 id=\"серьёзные-неблагоприятные-события\"\u003eСерьёзные неблагоприятные события\u003c/h3\u003e\n\u003cp\u003eИсследование записало серьёзные неблагоприятные события (SAEs) — события, требующие госпитализации, приводящие к инвалидности или считающиеся жизнеугрожающими. Хотя точные детали и количество SAEs подлежит тому, что Pfizer выбирает раскрытие и способ, который регуляторы их классифицируют, появление SAEs в здоровой взрослой популяции, получающей вакцину от гриппа, это красный флаг, который требует проверки.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"отчет-kingston-соединение-точек\"\u003eОтчет Kingston: Соединение точек\u003c/h2\u003e\n\u003cp\u003eАнализ Карен Кингстон через \u003ca href=\"https://karenkingston.substack.com\"\u003eThe Kingston Report\u003c/a\u003e соединяет исходы исследования са-mRNA гриппа Pfizer с более широким паттерном риска технологии са-mRNA.\u003c/p\u003e\n\u003ch3 id=\"проблема-усиления\"\u003eПроблема усиления\u003c/h3\u003e\n\u003cp\u003eКингстон задокументировала, что фундаментальная проблема са-mRNA — это не антиген (независимо от того, белок ли шипа или гемагглютинин гриппа), но сам механизм самоусиливающегося:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНеконтролируемое усиление:\u003c/strong\u003e Конструкт репликирует внутри организма без какого-либо внешнего контроля над тем, сколько копий производится. Индивидуальная вариация в клеточной поглощении, статусе иммунитета и эффективности репликазы означает, что фактический опыт дозы варьируется дико среди индивидов. Один человек может производить умеренное количество белка; другой может производить порядки величин больше.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСмерть клетки от перепроизводства:\u003c/strong\u003e Клетки, которые производят чрезмерные количества инородного белка, могут подвергаться апоптозу (программированной смерти клетки) или некрозу (неконтролируемой смерти клетки). Когда это происходит в мышечной ткани, это вызывает миалгию. Когда это происходит в сердечной ткани, это вызывает миокардит. Когда это происходит в нервной ткани, это вызывает неврологические симптомы. Механизм самоусиливающегося увеличивает риск перегрузки клеток через все типы тканей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИммунное истощение:\u003c/strong\u003e Расширенная продолжительность производства антигена может привести к истощению иммунитета — истощению Т-клеточных популяций, которые постоянно активированы. Иммунное истощение связано с хроническими инфекциями и раком и представляет фундаментально нездоровое иммунное состояние.\u003c/p\u003e\n\u003ch3 id=\"что-исследование-гриппа-раскрывает-о-продукте-covid\"\u003eЧто исследование гриппа раскрывает о продукте COVID\u003c/h3\u003e\n\u003cp\u003eКингстон нарисовала критическую связь: если вакцина са-mRNA гриппа Pfizer — продукт явно разработанный с технологией самоусиливающегося — вызывает эти неблагоприятные события, и если продукт COVID-19 содержал компоненты самоусиливающегося (как предложено патентными заявками и документами производства), то профиль неблагоприятных событий продукта COVID может быть ведомым, по крайней мере, отчасти, самоусилением, которое было никогда не раскрыто.\u003c/p\u003e\n\u003cp\u003eИсследование гриппа, в действительности, обеспечивает контролируемый взгляд на то, что делает самоусиление — и результаты согласуются с тем, что было наблюдено в неконтролируемой, развернутой на массу кампании вакцинации COVID.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"этика-экспериментирования-человека-самоусиливающегося\"\u003eЭтика экспериментирования человека самоусиливающегося\u003c/h2\u003e\n\u003ch3 id=\"кодекс-нюрнберга\"\u003eКодекс Нюрнберга\u003c/h3\u003e\n\u003cp\u003eКодекс Нюрнберга (1947) — установлен после медицинских экспериментов нацистов — устанавливает принципы для этического человеческого экспериментирования. Принцип 1 состояние: \"Добровольное согласие человеческого субъекта абсолютно существенно.\" Принцип 4 состояние: \"Эксперимент должен быть проводимым, чтобы избежать всех неопираемых физических и психических страданий и травм.\"\u003c/p\u003e\n\u003cp\u003eТехнология самоусиливающейся mRNA, по своей природе, создает условия, которые вызывают вызов этим принципам:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСогласие скомпрометировано\u003c/strong\u003e, потому что участник не может знать фактическую дозу, которую они испытают (так как конструкт усиливает непредсказуемо)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСтрадание внутренне\u003c/strong\u003e, потому что механизм усиления производит более высокие уровни антигена и более интенсивные иммунные ответы, чем традиционные подходы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭксперимент не может быть остановлен\u003c/strong\u003e однажды инъекция администрирована — нет пути остановить процесс самоусиливающегося\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"участники-испытания-как-канарейки\"\u003eУчастники испытания как Канарейки\u003c/h3\u003e\n\u003cp\u003eУчастники исследования са-mRNA гриппа Pfizer — это канарейки в угольной шахте. Их опыты предпросмотр того, что произойдет, если самоусиливающейся mRNA стане стандартной платформой для годовой вакцинации. Если здоровые взрослые в контролируемом испытании испытали значительные неблагоприятные события, что произойдет, когда:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПожилые люди со слабыми иммунными системами получают са-mRNA?\u003c/li\u003e\n\u003cli\u003eДети с развивающимися иммунными системами получают са-mRNA?\u003c/li\u003e\n\u003cli\u003eИммунокомпрометированные люди получают са-mRNA?\u003c/li\u003e\n\u003cli\u003eБеременные женщины получают са-mRNA?\u003c/li\u003e\n\u003cli\u003eОбщая популяция получает са-mRNA ежегодно, с кумулятивным воздействием год за годом?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-предупреждение\"\u003eБиблейское предупреждение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Мой народ гибнет за недостаток знания.\" — Осия 4:6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eУчастники исследования Pfizer добровольно участвовали. Они подписали формы согласия. Они поверили, что они содействовали медицинскому прогрессу. Но какое знание было им дано? Был ли им сказан, что конструкт будет репликираться внутри их клеток? Был ли им сказан, что процесс усиления не может быть остановлен? Был ли им сказан, что долгосрочные эффекты самокопирующихся генетических конструктов в человеческих телах полностью неизвестны?\u003c/p\u003e\n\u003cp\u003eРазрушение, о котором Осия предупреждал, приходит от отсутствия знания — не из отсутствия добрых намерений. Участники могли иметь лучшие намерения. Но без полного знания того, что они получали, их согласие было построено на неполной истине.\u003c/p\u003e\n\u003cp\u003eТвердь — защитный купол, который Бог поместил над землей — существует, чтобы разделить то, что выше, от того, что ниже, чтобы защитить творение от разрушительных сил. Иммунная система служит той же функции в организме. Самоусиливающейся mRNA нарушает эту биологическую твердь, вводя самокопирующийся процесс, который защиты организма не могут контролировать или выключить.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-люди-должны-знать\"\u003eЧто люди должны знать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eУчастники исследования за-mRNA гриппа испытали значительно более хуже неблагоприятные события\u003c/strong\u003e чем получатели традиционной вакцины от гриппа.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНеблагоприятные события были зависимы от дозы\u003c/strong\u003e, но произошли даже при низких дозах из-за механизма усиления.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПродолжительные симптомы\u003c/strong\u003e согласуются с расширенной продолжительностью производства белка из самоусиливающихся конструктов.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСерьёзные неблагоприятные события были записаны\u003c/strong\u003e в здоровых взрослых, получающих прививку от гриппа.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМеханизм самоусиливающегося — это основной фактор риска\u003c/strong\u003e — изменение антигена от белка шипа к гемагглютинину гриппа не исключает риски, внутренние для платформы.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГодовые вакцины са-mRNA гриппа разрабатываются для массового рынка.\u003c/strong\u003e Опыт участников испытания — это предпросмотр того, что может стать годовым медицинским событием для общей популяции.\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eKingston, Karen. \u003ca href=\"https://karenkingston.substack.com\"\u003eThe Kingston Report\u003c/a\u003e. Анализ исходов клинического испытания са-mRNA.\u003c/li\u003e\n\u003cli\u003eДанные клинического испытания вакцины са-mRNA гриппа Pfizer\u003c/li\u003e\n\u003cli\u003eПубликации платформы BioNTech са-mRNA\u003c/li\u003e\n\u003cli\u003eКлинические данные Arcturus Therapeutics ARCT-154\u003c/li\u003e\n\u003cli\u003eКодекс Нюрнберга (1947)\u003c/li\u003e\n\u003cli\u003eОпубликованное исследование иммунологии самоусиливающейся РНК\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство НБО Ховарда Питмана — Предупреждение об окончании времени, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u00
