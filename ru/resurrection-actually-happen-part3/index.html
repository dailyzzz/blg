 ясно: если воскресение не произошло, вся вера рушится. Это делает воскресение самым важным утверждением в христианстве — и поэтому утверждением, которое больше всего нуждается в строгом анализе. Не в эмоциональной защите. Не в институциональном авторитете. В анализе.\u003c/p\u003e\n\u003cp\u003eОпыт клинической смерти Говарда Питтмана раскрыл, что духовная сфера реальна. Питтман был свидетелем трёх небес, демонических операций во втором небе, и ему сказали, что 97,5 процента христиан были отвергнуты — они \"никогда не сделали Меня Господом\". Это критический контекст: Питтман подтвердил, что сверхъестественное измерение существует, что есть жизнь после смерти, и что большинство христиан обмануты. Вопрос в том, верны ли конкретные утверждения институции — включая нарративный рассказ о воскресении.\u003c/p\u003e\n\u003cp\u003eИезуиты провели пять столетий в защите этих утверждений с \"абсолютной властью\" Наполеона, \"вечным проклятием\" Адамса и тактиками инфильтрации, документированными в \"Католических тайнах\": работа \"скрытой хитростью\", практика \"любого вида порока\", требование слепого послушания. Тамбурини управлял \"всем миром\". Климент XIV был отравлен. Это организация, которая сформировала ваше понимание воскресения. Анализируйте соответственно.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/15-From_Dust_to_Glory.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Dust to Glory — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/27-The_Promise_of_Salvation.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Promise of Salvation — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"доказательства-в-пользу\"\u003eДоказательства в пользу\u003c/h2\u003e\n\u003ch3 id=\"аргумент-о-пустой-гробнице\"\u003eАргумент о пустой гробнице\u003c/h3\u003e\n\u003cp\u003eНаиболее часто приводимое доказательство воскресения — это пустая гробница. Все четыре Евангелия сообщают, что женщины пошли к гробнице в воскресенье утром и нашли её пустой. Институциональный аргумент гласит: если воскресение не произошло, где тело?\u003c/p\u003e\n\u003cp\u003eЭто справедливый вопрос, но это не доказательство. Пустая гробница доказывает только, что гробница пуста, а не как она стала пуста. Существуют множественные объяснения, выходящие за пределы воскресения: тело было перемещено властями, чтобы предотвратить превращение гробницы в святилище; тело было перемещено учениками (как признаёт Матфей 28:13, заявляя иудейские власти); женщины пошли в неправильную гробницу; тело было похоронено не так, как описано, и никогда не было в этой конкретной гробнице.\u003c/p\u003e\n\u003cp\u003eКаждое из этих альтернативных объяснений имеет слабости. Но то же самое и с объяснением воскресения, которое требует принятия сверхъестественного события на основе свидетельства документов, написанных десятилетия после события людьми, которые не были очевидцами.\u003c/p\u003e\n\u003ch3 id=\"явления-после-воскресения\"\u003eЯвления после воскресения\u003c/h3\u003e\n\u003cp\u003eЕвангелия и послания Павла описывают множественные явления после воскресения: Марии Магдалине, ученикам, Фоме, пятистам одновременно (1 Коринфянам 15:6), Иакову и Павлу.\u003c/p\u003e\n\u003cp\u003eПятьсот свидетелей часто приводятся как убедительное доказательство. Но Павел, который упоминает их, никогда их не называет. Ни один другой документ не подтверждает это утверждение. И его собственное \"явление\" не было физической встречей — в Деяниях 9 описывается свет и голос, а не телесный человек. Если явление Павла считается явлением воскресения, то \"явление\" означает нечто совсем иное, чем физическое присутствие.\u003c/p\u003e\n\u003cp\u003eОписания явлений в Евангелиях значительно отличаются. В Матфее Иисус является в Галилее. В Луке он является исключительно в Иерусалиме и его окрестностях и явно велит ученикам оставаться в городе. Это противоречивые географические утверждения. Оба не могут быть точными.\u003c/p\u003e\n\u003ch3 id=\"готовность-учеников-умереть\"\u003eГотовность учеников умереть\u003c/h3\u003e\n\u003cp\u003eТрадиционный аргумент гласит, что ученики не умерли бы за ложь — их готовность встретить мученичество доказывает, что они искренне верили в воскресение.\u003c/p\u003e\n\u003cp\u003eЭтот аргумент имеет несколько проблем. Во-первых, доказательства ранних апостольских мучеников тонкие. Смерти большинства апостолов записаны не в писании, а в позднейшей церковной традиции — традиции, произведённой институцией, которая выигрывает от этого нарратива. Во-вторых, люди умирают за искренне почитаемые убеждения все время. Это не делает эти убеждения верными. Члены культов, политические радикалы и адепты всех религий умирали за свои убеждения. Искренность — это не доказательство точности.\u003c/p\u003e\n\u003cp\u003eВ-третьих, и что самое важно, аргумент предполагает, что единственная причина, по которой кто-то добровольно умрёт, — это буквальное физическое воскресение. Но ранняя церковь не была монолитной. Ранние христиане придерживались различных взглядов на то, что означало \"воскресение\". Некоторые могли верить в духовное воскресение, метафорическое восстание, продолжение движения. Умирание ради этих убеждений не требует, чтобы физическое тело вышло из физической гробницы.\u003c/p\u003e\n\u003ch2 id=\"доказательства-против\"\u003eДоказательства против\u003c/h2\u003e\n\u003ch3 id=\"проблема-времени\"\u003eПроблема времени\u003c/h3\u003e\n\u003cp\u003eСамое раннее описание воскресения — это письмо Павла к коринфянам, написанное примерно через 20-25 лет после предполагаемых событий. Самое раннее Евангелие, Марк, было написано примерно через 35-40 лет. Матфей и Лука пришли через 45-55 лет. Иоанн пришёл через 60-70 лет.\u003c/p\u003e\n\u003cp\u003eНи один письменный рассказ о воскресении не существует из времени, когда оно якобы произошло. Самые ранние рассказы — десятилетия спустя, написанные людьми, которые не присутствовали, на языке (греческом), который говорившие по-арамейски последователи Иисуса не использовали в качестве своего основного языка. Это не очевидческое свидетельство. Это вторичный или третичный нарратив, отфильтрованный через десятилетия устной передачи и богословского развития.\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует в Substack, как этот временной промежуток позволил нарративу развиваться. Марк, самое раннее Евангелие, не имеет явлений после воскресения в его исходном тексте (Марк 16:8 — исходный конец; стихи 9-20 были добавлены позже переписчиками). Матфей добавляет явления. Лука добавляет больше деталей. Иоанн добавляет самые сложные рассказы. Нарратив о воскресении становится более детальным и специфичным с каждым переповествованием, что является образцом легенды, а не истории.\u003c/p\u003e\n\u003ch3 id=\"образец-развития\"\u003eОбразец развития\u003c/h3\u003e\n\u003cp\u003eСравните рассказы о воскресении хронологически:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПавел (около 55 года н.э.)\u003c/strong\u003e: Иисус \"явился\" различным людям. Нет деталей о пустой гробнице, нет ангелов, нет конкретных нарративов. Павел использует слово \u003cem\u003eophthe\u003c/em\u003e, которое может означать \"был виден\" или \"явился\" в визионерском смысле.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМарк (около 70 года н.э.)\u003c/strong\u003e: Женщины находят гробницу пустой. Молодой человек в белом говорит им, что Иисус воскрес. Они бегут и никому не говорят. Нет явлений Иисуса. Исходный конец.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМатфей (около 80-85 года н.э.)\u003c/strong\u003e: Женщины находят гробницу пустой. Ангел нисходит с землетрясением. Охранники теряют сознание. Иисус является женщинам, а затем ученикам в Галилее. Новые элементы: землетрясение, охранники, нисходящий ангел.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЛука (около 80-90 года н.э.)\u003c/strong\u003e: Женщины находят гробницу пустой. Два человека в сияющих одеждах являются. Иисус является ученикам на дороге в Эммаус, а затем в Иерусалиме. Новые элементы: дорога в Эммаус, детальные диалоги, явное физическое питание.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИоанн (около 90-100 года н.э.)\u003c/strong\u003e: Мария Магдалина одна находит гробницу пустой. Два ангела являются. Иисус является Марии, затем ученикам в запертой комнате, затем Фоме (с нарративом \"сомневающегося Фомы\"), затем у Моря Галилейского. Новые элементы: детальные личные встречи, драматические нарративы, богословские дискурсы.\u003c/p\u003e\n\u003cp\u003eЭтот образец — простое становится сложным, неясное становится конкретным, духовное становится физическим — это образец мифологического развития. Это противоположность тому, что мы ожидаем от исторической памяти, которая с течением времени становится менее детальной, а не более.\u003c/p\u003e\n\u003ch3 id=\"образец-умирающего-и-воскресающего-бога\"\u003eОбразец умирающего и воскресающего бога\u003c/h3\u003e\n\u003cp\u003eВоскресение Иисуса — это не уникальное утверждение в древнем мире. Многие до-христианские божества, как говорили, умирали и воскресали:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОсирис\u003c/strong\u003e (Египет): Убит Сетом, воскрешён Исидой, стал господом подземного мира.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТаммуз\u003c/strong\u003e (Месопотамия): Ежегодно умирал, нисходил в подземный мир, воскресал с возвращением весны.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАттис\u003c/strong\u003e (Фригия): Умер под сосной, был оплакан в течение трёх дней и воскрес.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДионис\u003c/strong\u003e (Греция): Разорван титанами, переродился из своего сердца.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМитра\u003c/strong\u003e (Персия/Рим): Рожден из скалы, умер и воскрес. Его последователи отмечали его воскресение в весеннее равноденствие — то же время, что и Пасха.\u003c/p\u003e\n\u003cp\u003eИнституциональный ответ состоит в том, что эти параллели совпадение или что Сатана создал подделки, чтобы предать Христианство. Но этот аргумент циклен: он предполагает, что Христианство верно и объясняет доказательства против этого, ссылаясь на существование самого существа, чьё существование зависит от того, что Христианство верно.\u003c/p\u003e\n\u003cp\u003eБолее простое объяснение состоит в том, что ранние христиане, живущие в мире, насыщенном нарративами о умирающих и воскресающих богах, включили этот образец в своё понимание Иисуса. Это именно то, что сделали предшественники иезуитов — ранняя институциональная церковь — с языческими праздниками, как мы документировали в частях 1-7 серии Сатурна.\u003c/p\u003e\n\u003ch2 id=\"защитные-механизмы-иезуитов\"\u003eЗащитные механизмы иезуитов\u003c/h2\u003e\n\u003ch3 id=\"академическое-захватывание\"\u003eАкадемическое захватывание\u003c/h3\u003e\n\u003cp\u003eИезуиты контролируют некоторые из самых престижных университетов мира: Джорджтаун, Бостонский колледж, Фордхэм, Лойола, Гонзага и многие другие во всём мире. Эти учреждения производят учёных, которые защищают воскресение в академических журналах, учебниках и публичных дебатах.\u003c/p\u003e\n\u003cp\u003eЭто не нападение ad hominem. Это наблюдение об институциональном стимуле. Учёные, работающие в иезуитских университетах, которые публично ставят под сомнение воскресение, рискуют своей карьерой, финансированием, социальным статусом и сообществом. Структура стимулов гарантирует, что подавляющее большинство исследований, производимых этими учреждениями, поддерживает ортодоксальный нарратив.\u003c/p\u003e\n\u003cp\u003eФильм \"Католические тайны\" показывает, что иезуитский клятва требует послушания выше всего остального. Это послушание распространяется на интеллектуальный результат. Иезуит-обученные учёные не преследуют истину, где бы она ни вела. Они преследуют истину, где бы институция позволила ей вести. Где доказательства указывают в сторону от ортодоксии, институция перенаправляет, переинтерпретирует или подавляет.\u003c/p\u003e\n\u003ch3 id=\"эмоциональный-щит\"\u003eЭмоциональный щит\u003c/h3\u003e\n\u003cp\u003eСамая эффективная иезуитская защита воскресения — это не интеллектуальная, а эмоциональная. Через столетия искусства, музыки, литургии и рассказывания истории институция сделала воскресение прожитой эмоциональной реальностью для миллиардов людей. Пасхальная служба, с её торжествующими гимнами и радостными объявлениями \"Он воскрес!\", — это ежегодное эмоциональное событие, которое усиливает нарратив более эффективно, чем любой аргумент.\u003c/p\u003e\n\u003cp\u003eСтавить под сомнение воскресение после переживания этой эмоциональной реальности кажется предательством — предательством сообщества, умерших родственников, которые верили, детей, которым учили. Эта эмоциональная стоимость — величайший защитный механизм институции. Это гарантирует, что только самые решительные искатели истины последуют доказательствам к их заключению.\u003c/p\u003e\n\u003cp\u003eОпыт Говарда Питтмана подтверждает, что эмоция — это не доказательство. 97,5 процентов, которые были отвергнуты, чувствовали сильные эмоции о своей вере. Эти эмоции не спасли их. Что имело значение, так это истина — сделали ли они действительно Христа Господом или просто чувствовали, что сделали.\u003c/p\u003e\n\u003ch2 id=\"что-это-означает\"\u003eЧто это означает?\u003c/h2\u003e\n\u003ch3 id=\"духовное-реально\"\u003eДуховное реально\u003c/h3\u003e\n\u003cp\u003eНичего в этом анализе не отрицает реальность духовной сферы. Свидетельство Питтмана, доказательства исследования опыта клинической смерти, свидетельство самого писания — всё подтверждает, что есть большее к реальности, чем материальный мир. Вопрос — это не то, существует ли сверхъестественное, а то, точно ли институциональный нарратив его описывает.\u003c/p\u003e\n\u003cp\u003eВозможно, что-то необычайное произошло в первом столетии — что-то, что институциональная церковь как сохранила, так и исказила, обёртывая подлинное духовное событие в слои языческой мифологии, институциональной теологии и управляемой иезуитами догмы. Истина может быть более тонкой, более таинственной и более сложной, чем либо слепая вера, либо плоское отрицание.\u003c/p\u003e\n\u003ch3 id=\"честная-позиция\"\u003eЧестная позиция\u003c/h3\u003e\n\u003cp\u003eЧестная позиция — это неопределённость. Доказательства не доказывают, что физическое воскресение произошло, как описано. Они также не доказывают, что это не произошло. То, что показывают доказательства, — это то, что нарратив развивался с течением времени, был сформирован институциональными интересами, был защищён через насилие и подавление и содержит элементы, общие для до-христианской мифологии.\u003c/p\u003e\n\u003cp\u003eЧестный искатель признаёт всё это — и продолжает искать. 97,5 процента остановились в поиске, когда институция сказала им остановиться. Они приняли нарратив, совершили ритуалы, и поверили, что эмоциональный опыт эквивалентен истине. Не совершайте их ошибку.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eТвердь, Земля, Основание — Библейская космология\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eЗемля и твердь — Что Писание действительно говорит\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eПлоская земля, наука и НАСА — Плейлист документального фильма\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/l
