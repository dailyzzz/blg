ациям. Не правительствам. Не финансовым биржам. Однако система углеродных кредитов представляет собой самый дерзкий акт кражи в истории человечества — приватизацию самой атмосферы.\u003c/p\u003e\n\u003cp\u003eСоздавая финансовый инструмент, который присваивает денежную стоимость выбросам углекислого газа, архитекторы этой системы фактически заявили права собственности на воздух. Каждый выдох содержит углекислый газ. Каждый огонь, который вы разжигаете, каждая миля, которую вы проезжаете, каждый приём пищи, который вы готовите — всё производит молекулу, которую они решили обложить налогом, продать и контролировать.\u003c/p\u003e\n\u003cp\u003eЭто не защита окружающей среды. Это финансиализация существования. Те же институты, которые хищнически эксплуатировали землю, загрязнили океаны и отравили продовольственное снабжение, теперь заявляют о моральном праве ограничивать ваши углеродные выбросы, торгуя углеродными кредитами стоимостью в миллиарды на биржах, которыми они владеют. Трек с альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь обманщика\u003c/a\u003e прекрасно передаёт это — обманщик оборачивает свои цепи в язык спасения, убеждая узника, что оковы для его собственной защиты.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"происхождение-торговли-углеродом\"\u003eПроисхождение торговли углеродом\u003c/h2\u003e\n\u003cp\u003eКонцепция торговли углеродом возникла из Киотского протокола 1997 года, который установил первую международную основу для сокращения выбросов парниковых газов через рыночные механизмы.\u003c/p\u003e\n\u003cp\u003eИдея была обманчиво простой: установить измеримый лимит на выбросы углерода, выдать разрешения (кредиты) на право выброса и позволить этим разрешениям торговаться на открытых рынках.\u003c/p\u003e\n\u003cp\u003eИнтеллектуальная архитектура пришла от экономистов, которые считали, что рыночные механизмы более эффективны, чем прямое регулирование. Если компания могла дёшево сократить выбросы, она бы это делала и продавала свои излишние кредиты. Если компания не могла дёшево сократить выбросы, она бы покупала кредиты у тех, кто мог.\u003c/p\u003e\n\u003cp\u003eНа самом деле произошло совершенно другое.\u003c/p\u003e\n\u003cp\u003eТорговля углеродом создала новый класс финансовых активов — на котором можно было спекулировать, вокруг которого можно было строить деривативы и на котором можно было делать состояния, не удалив ни одной молекулы углекислого газа из атмосферы.\u003c/p\u003e\n\u003cp\u003eУглеродный рынок стал казино, и дом всегда выигрывает.\u003c/p\u003e\n\u003cp\u003eЕвропейская система торговли выбросами (EU ETS), запущенная в 2005 году, стала крупнейшим углеродным рынком в мире. В первые годы её преследовали:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eМошеннические схемы стоимостью в миллиарды евро\u003c/li\u003e\n\u003cli\u003eДраматические обвалы цен\u003c/li\u003e\n\u003cli\u003eИзбыточное распределение кредитов загрязняющим отраслям\u003c/li\u003e\n\u003cli\u003eКомпании получали бесплатные кредиты, продавали их с прибылью и продолжали выбрасывать на тех же уровнях\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТорговцы углеродом заработали миллиарды. Выбросы едва сдвинулись. Планета не получила никакой выгоды. Финансисты получили огромные прибыли.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"триллионный-рынок\"\u003eТриллионный рынок\u003c/h2\u003e\n\u003cp\u003eК 2023 году мировой углеродный рынок оценивался примерно в 950 миллиардов долларов и быстро рос. Прогнозы предполагают, что он превысит 2,4 триллиона долларов к 2027 году.\u003c/p\u003e\n\u003cp\u003eЭто не маргинальная экономическая деятельность. Это новый столп глобальной финансовой системы, растущий быстрее любого другого класса активов.\u003c/p\u003e\n\u003cp\u003eОсновными бенефициарами являются не экологические организации или сообщества, затронутые загрязнением. Это банки, хедж-фонды и финансовые институты:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGoldman Sachs\u003c/strong\u003e — специализированный отдел торговли углеродом\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMorgan Stanley\u003c/strong\u003e — крупный участник углеродного рынка\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJPMorgan Chase\u003c/strong\u003e — операции с углеродными деривативами и торговлей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBarclays\u003c/strong\u003e — торговля и консультирование по углеродным кредитам\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBlackRock — крупнейший в мире управляющий активами — позиционировал углерод как основной компонент своей инвестиционной стратегии, как задокументировано в \u003ca href=\"/esg-scores-corporate-social-credit/?lang=ru\"\u003eESG-рейтинги: Корпоративный социальный кредит под другим именем\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДобровольный углеродный рынок — где компании и частные лица покупают кредиты для \"компенсации\" своих выбросов — ещё более непрозрачен.\u003c/p\u003e\n\u003cp\u003eРасследования The Guardian, Bloomberg и академических исследователей неоднократно обнаруживали, что подавляющее большинство кредитов на компенсацию углерода представляют собой \u003cstrong\u003eфантомные сокращения\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРасследование 2023 года показало, что более \u003cstrong\u003e90% компенсаций углерода тропических лесов\u003c/strong\u003e, одобренных Verra, ведущим сертификатором в мире, были бесполезны\u003c/li\u003e\n\u003cli\u003eДеревья, которые якобы были спасены, никогда не были в опасности\u003c/li\u003e\n\u003cli\u003eЗаявленные сокращения выбросов никогда не материализовались\u003c/li\u003e\n\u003cli\u003eНо кредиты были проданы, деньги перешли из рук в руки, и система расширилась\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"личные-углеродные-квоты-индивидуальная-контрольная-сетка\"\u003eЛичные углеродные квоты: Индивидуальная контрольная сетка\u003c/h2\u003e\n\u003cp\u003eСистема углеродных кредитов не ограничивается корпорациями. Архитектура личных углеродных квот — индивидуальных углеродных бюджетов, назначенных каждому гражданину — разрабатывалась в академических работах, правительственных отчётах и политических предложениях более двух десятилетий.\u003c/p\u003e\n\u003cp\u003eКонцепция проста:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eКаждому человеку выделяется фиксированное количество углеродных кредитов в год\u003c/li\u003e\n\u003cli\u003eКаждая покупка, каждая поездка, каждое использование энергии вычитается из этой квоты\u003c/li\u003e\n\u003cli\u003eКогда ваша квота исчерпана, вы должны либо прекратить потребление, либо купить дополнительные кредиты\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eРабота 2021 года, опубликованная в Nature Sustainability, прямо призывала к личным углеродным квотам как инструменту управления изменением климата. Работа признавала, что предыдущие попытки были политически неосуществимы, но утверждала, что технологические разработки — особенно отслеживание через смартфоны, цифровые платежи и ИИ — сделали их практичными.\u003c/p\u003e\n\u003cp\u003eВсемирный экономический форум опубликовал множество предложений по индивидуальному отслеживанию углерода. В 2022 году президент Alibaba Дж. Майкл Эванс объявил в Давосе, что компания разрабатывает \"трекер индивидуального углеродного следа\" для отслеживания:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eЧто вы едите\u003c/li\u003e\n\u003cli\u003eКак вы путешествуете\u003c/li\u003e\n\u003cli\u003eЧто вы покупаете\u003c/li\u003e\n\u003cli\u003eСколько энергии вы потребляете\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВ сочетании с цифровыми валютами центральных банков — как исследуется в \u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eЦепи CBDC: Программируемые деньги, которые контролируют вас\u003c/a\u003e — личные углеродные квоты становятся принудительными в точке продажи. Ваш кошелёк CBDC может быть запрограммирован на отклонение транзакций, превышающих ваш углеродный бюджет.\u003c/p\u003e\n\u003cp\u003eНе требуется законодательство. Не нужно полицейское принуждение. Сами деньги становятся механизмом принуждения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"углеродный-налог-налогообложение-без-представительства\"\u003eУглеродный налог: Налогообложение без представительства\u003c/h2\u003e\n\u003cp\u003eУглеродные налоги представляют собой самую прямую реализацию углеродной контрольной повестки. В отличие от систем \"кэп-энд-трейд\", которые создают рынки, углеродные налоги просто налагают стоимость на каждую единицу выброшенного углекислого газа.\u003c/p\u003e\n\u003cp\u003eБолее 40 стран и многочисленные субнациональные юрисдикции внедрили ту или иную форму углеродного ценообразования.\u003c/p\u003e\n\u003cp\u003eЭкономическое воздействие непропорционально ложится на бедных:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eУглеродные налоги увеличивают стоимость \u003cstrong\u003eэнергии, транспорта, отопления и продуктов питания\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eЭто основные потребности, которые потребляют больший процент дохода домохозяйств с низким доходом\u003c/li\u003e\n\u003cli\u003eХотя богатые могут поглотить углеродную цену в 50 долларов за тонну без изменения образа жизни, рабочий класс не может\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eУглеродное налогообложение на практике является регрессивным налогом, который наказывает бедность, доставляя неудобства богатству.\u003c/p\u003e\n\u003cp\u003eДоходы от углеродных налогов редко направляются на экологическую реабилитацию. Они направляются на:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eОбщие государственные фонды\u003c/li\u003e\n\u003cli\u003eСубсидии отраслям, которым покровительствуют политики\u003c/li\u003e\n\u003cli\u003eАдминистративный аппарат, который управляет самой углеродной системой\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНалог создаёт постоянный поток доходов, от которого правительства становятся зависимыми — это означает, что у них есть финансовый стимул \u003cstrong\u003eподдерживать\u003c/strong\u003e углеродную проблему, а не решать её. Если углеродные выбросы действительно достигнут нуля, доходы исчезнут.\u003c/p\u003e\n\u003cp\u003eКанадский углеродный налог был особенно показательным. Несмотря на заявления правительства о том, что налог будет \"нейтральным по доходам\" с возвратом гражданам, анализ постоянно показывает, что экономические издержки превышают возвраты для большинства домохозяйств.\u003c/p\u003e\n\u003cp\u003eНалог поднял издержки на продукты питания, топливо и отопление, производя незначительное измеримое воздействие на национальные выбросы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кто-выигрывает-следите-за-деньгами\"\u003eКто выигрывает: Следите за деньгами\u003c/h2\u003e\n\u003cp\u003eБенефициары системы углеродных кредитов нетрудно идентифицировать. Это те же институты, которые выигрывают от каждой финансиализированной контрольной системы:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнвестиционные банки\u003c/strong\u003e получают прибыль от торговли углеродными кредитами, структурирования углеродных деривативов и консультирования компаний по углеродной стратегии. Торговые отделы углеродом стали значительными центрами прибыли.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУправляющие активами\u003c/strong\u003e, такие как BlackRock и Vanguard, используют углеродные метрики для направления потоков капитала, вознаграждая соответствующие компании и наказывая несоответствующие — как подробно описано в \u003ca href=\"/esg-scores-corporate-social-credit/?lang=ru\"\u003eESG-рейтинги: Корпоративный социальный кредит под другим именем\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТехнологические компании\u003c/strong\u003e получают прибыль от инфраструктуры мониторинга, отслеживания и верификации, которую требуют углеродные рынки — спутниковый мониторинг, верификация блокчейна, датчики IoT и анализ ИИ.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазработчики углеродных компенсаций\u003c/strong\u003e получают прибыль от создания кредитов — часто сомнительной ценности — которые продаются корпорациям и частным лицам, стремящимся откупиться от чувства вины за выбросы.\u003c/p\u003e\n\u003cp\u003eРынок компенсаций по сути является \u003cstrong\u003eсистемой индульгенций\u003c/strong\u003e: заплати деньги, получи отпущение, ничего не меняй.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравительства\u003c/strong\u003e получают прибыль от доходов от углеродных налогов и от регулирующих полномочий, которые обеспечивает углеродный контроль. Способность регулировать углерод — это способность регулировать всю человеческую деятельность, поскольку практически вся деятельность производит углеродные выбросы.\u003c/p\u003e\n\u003cp\u003eЛюди, которые не выигрывают, — это обычные граждане, которые платят более высокие цены за энергию, продукты питания и транспорт, наблюдая, как их свободы ограничиваются системой, которая обогащает и без того богатых.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"связь-с-великой-перезагрузкой\"\u003eСвязь с Великой перезагрузкой\u003c/h2\u003e\n\u003cp\u003eСистема углеродных кредитов является основным компонентом повестки Великой перезагрузки, продвигаемой Всемирным экономическим форумом, как исследуется в \u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eВеликая перезагрузка: Четвёртая промышленная революция\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eВидение Клауса Шваба \"капитализма заинтересованных сторон\" прямо включает углеродные метрики как фундаментальную меру экономической деятельности.\u003c/p\u003e\n\u003cp\u003eПовестка ВЭФ \"Нулевой углерод\" — достижение нулевых чистых выбросов углерода к 2050 году — требует полной реструктуризации глобальной экономики:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКаждая отрасль должна быть включена в углеродную учётную структуру\u003c/li\u003e\n\u003cli\u003eКаждая цепочка поставок должна быть подвергнута углеродному аудиту\u003c/li\u003e\n\u003cli\u003eКаждое домохозяйство должно отслеживаться по углероду\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭта реструктуризация сдвигает экономическую власть от производителей и потребителей к институтам, которые определяют, измеряют и обеспечивают соблюдение углеродной отчётности.\u003c/p\u003e\n\u003cp\u003eФраза \"Восстановить лучше\", принятая правительствами по всему миру во время пандемии COVID-19, была прямо связана с климатическими целями. Пандемия была описана как \"возможность\" реструктурировать экономики по углеродно-нейтральным линиям.\u003c/p\u003e\n\u003cp\u003eКризис стал катализатором. Углеродная система стала архитектурой \"новой нормальности\".\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"мошенничество-в-масштабе\"\u003eМошенничество в масштабе\u003c/h2\u003e\n\u003cp\u003eМногочисленные расследования задокументировали системное мошенничество на углеродных рынках:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКарусельное мошенничество EU ETS.\u003c/strong\u003e Преступники использовали правила НДС для кражи приблизительно \u003cstrong\u003e5 миллиардов евро\u003c/strong\u003e у европейских правительств через торговлю углеродными кредитами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМеханизм чистого развития (CDM).\u003c/strong\u003e Тысячи проектов в развивающихся странах заявили о сокращении выбросов. Расследования показали, что многие были обычными деловыми операциями, переупакованными как сокращения выбросов. Кредиты были реальны. Сокращения были воображаемыми.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДобровольный рынок.\u003c/strong\u003e Сертификация компенсаций углерода была описана исследователями как \"в значительной степени фикция\". Компании, такие как Disney, Shell и Gucci, покупали компенсации, чтобы заявить об углеродной нейтральности, в то время как их фактические выбросы продолжались без изменений.\u003c/p\u003e\n\u003cp\u003eВся система торговли углеродом в своей основе является механизмом \u003cstrong\u003eпродажи разрешения загрязнять\u003c/strong\u003e. Она не сокращает загрязнение. Она монетизирует его.\u003c/p\u003e\n\u003cp\u003eОна создаёт рынок, где право выбрасывать углекислый газ — побочный продукт практически всей человеческой деятельности — становится товаром, которым владеют, торгуют и контролируют финансовые институты.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Горе тем, которые прибавляют дом к дому, присоединяют поле к полю, так что другим не остаётся места, как будто они одни поселены на земле.\" — Исаия 5:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПророк Исаия предупреждал о тех, кто будет накапливать собственность на всё — землю, ресурсы, саму землю — пока они одни не будут контролировать всё.\u003c/p\u003e\n\u003cp\u003eСистема углеродных кредитов представляет собой конечное расширение этой древней алчности: приватизацию атмосферы. Когда вы можете владеть правом выбрасывать молекулу, которую выдыхает каждое живое существо, вы заявили права собственности на саму жизнь.\u003c/p\u003e\n\u003cp\u003eЗемля принадлежит Господу, а не углеродным биржам. Воздух принадлежит Создателю, а не Goldman Sachs. Попытка финансиализировать атмосферу — это не защита окружающей среды — это идолопоклонство высшего порядка, помещающее человеческие финансовые системы в положение Бога как арбитра того, кто может свободно дышать, а кто должен платить за эту привилегию.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/163-Carbon_Credit_Coup.mp4\"\u003eУглеродный переворот\u003c/a\u003e — Торговля воздухом, которым вы дышите\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/223-Sustainable_Development_Trap.mp4\"\u003eЛовушка устойчивого развития\u003c/a\u003e — Скрытые цепи зелёной повестки\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/esg-scores-corporate-social-credit/?lang=ru\"\u003eESG-рейтинги: Корпоративный социальный кредит под другим именем\u003c/a\u003e — Как метрики ESG обеспечивают соблюдение углеродной отчётности через финансовое принуждение\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eВеликая перезагрузка: Четвёртая промышленная революция\u003c/a\u003e — Более широкая повестка, которой служат углеродные кредиты\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОни взяли воздух, который Бог дал свободно, и превратили его в товар. Они измерили дыхание каждого существа и назначили ему цену. Они построили биржи для торговли разрешением выдыхать и назвали это прогрессом. Но земля принадлежит Господу и всё, что наполняет её. Никакой углеродный кредит не может купить то, что Создатель дал свободно, и никакой торговый стол не может владеть тем, что принадлежит Тому, кто сформировал атмосферу словом. Воздух, которым вы дышите, не их, чтобы продавать. Никогда не был.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/finance/\",\"className\":\"category-badge\",\"children\":\"finance\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Углеродный переворот: Торговля воздухом, которым вы дышите\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Углеродные кредиты — это не спасение планеты. Это финансовый инструмент, предназначенный для превращения самого воздуха в товар, создавая новый класс активов, контролируемый теми же институтами, которые вызвали экологическое разрушение, которое они якобы пытаются решить.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-01-23T10:00:00Z\",\"children\":\"23 января 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"carbon-credits\",{\"href\":\"/ru/tag/carbon-credits/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"carbon-credits\"]}],[\"$\",\"a\",\"climate\",{\"hre
