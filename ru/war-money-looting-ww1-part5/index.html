ни посредине земли!\"\u003c/em\u003e — Исаия 5:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПророк Исаия осуждал тех, кто накапливал всю собственность, всё богатство, всю власть в себе, пока они сидели в одиночестве в центре империи, построенной на краже. Первая мировая война была величайшей грабительской операцией в истории человечества на того момента — систематическое извлечение богатства у американского народа, пропущенное через военную машину и отложенное на счета иезуитско-связанных банковских и промышленных элит. Война обошлась США более чем в 30 миллиардов долларов (более 700 миллиардов в современных деньгах). Куда делись деньги? Следите за деньгами, и вы найдёте иезуитов.\u003c/p\u003e\n\u003cp\u003eИгнатий Лойола разработал Общество Иисуса для накопления власти любыми средствами. Иезуитская клятва, задокументированная в отчётах конгресса, требует от членов использования \"яда, кровавого шнура, стали кинжала или свинцовой пули\" на службе обществу. Но эти физические оружия являются примитивными по сравнению с предпочитаемым иезуитами инструментом контроля: деньги. Через своих банковских посредников — Ротшильдов, Морганов, Варбургов — иезуиты разграбили Америку во время Первой мировой войны с точностью военной операции и анонимностью финансовой сделки.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e говорит о внутреннем разложении, которое сделало это разграбление возможным — правительстве, инфильтрированном агентами иностранных держав, финансовой системе, спроектированной частными интересами, и публике, слишком обманутой, чтобы осознать, что с ней делается. И \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь обманщиков\u003c/a\u003e напоминает нам, что величайшая кража — это та, которую жертва никогда не осознавала.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дельцы-войны\"\u003eДельцы войны\u003c/h2\u003e\n\u003ch3 id=\"производители-вооружения\"\u003eПроизводители вооружения\u003c/h3\u003e\n\u003cp\u003eПервая мировая война была первой полностью индустриализированной войной, и промышленные корпорации, поставлявшие боевые стороны, получали прибыли в масштабах, невиданных ранее:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDuPont\u003c/strong\u003e — химическая компания, базирующаяся в Делавэре, поставила 40% взрывчатых веществ, используемых союзными силами. Прибыль DuPont увеличилась с 6 миллионов долларов в 1914 году до 82 миллионов в 1916 году — увеличение на 1300% за два года. Семья DuPont, уже одна из самых богатых в Америке, вышла из войны как промышленная династия, богатство которой соперничало с богатством Рокфеллеров.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBethlehem Steel\u003c/strong\u003e — под руководством Чарльза Шваба Bethlehem Steel стала основным поставщиком броневых пластин, орудий и боеприпасов для союзных держав. Шваб лично путешествовал в Лондон для переговоров по контрактам стоимостью сотни миллионов долларов — контрактам, финансируемым доходами от займов Свободы. Цена акций Bethlehem Steel увеличилась более чем на 500% в годы войны.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eU.S. Steel\u003c/strong\u003e — творение Дж.П. Моргана, U.S. Steel поставляла сталь для кораблей, танков, артиллерии и инфраструктуры. Прибыль компании утроилась в годы войны, а её руководители были вознаграждены бонусами и опционами на акции, которые сделали их одними из самых богатых людей в Америке.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStandard Oil\u003c/strong\u003e — нефтяная империя Джона Рокфеллера поставляла нефтепродукты обеим сторонам конфликта. Дочерние компании Standard Oil в Германии продолжали снабжать немецкую армию на протяжении войны, даже когда материнская американская компания снабжала союзников. Это двойное снабжение, которое нарушало дух (если не букву) законов нейтралитета, было возможным, потому что сеть Рокфеллера действовала выше национальной лояльности — служа интересам глобальной финансовой элиты, а не какой-либо отдельной нации.\u003c/p\u003e\n\u003ch3 id=\"банковские-прибыли\"\u003eБанковские прибыли\u003c/h3\u003e\n\u003cp\u003eБанки не просто облегчили войну — они получили прибыль от неё на каждом уровне:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКомиссии по кредитам\u003c/strong\u003e — J.P. Morgan \u0026#x26; Co., как основной закупочный агент для британского и французского правительств, получала комиссии примерно на 3 миллиарда долларов союзных закупок. При стандартной комиссионной ставке 1-2%, доля Morgan от этого соглашения одного было 30-60 миллионов долларов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодписка облигаций\u003c/strong\u003e — Федеральные резервные банки и их аффилированные коммерческие банки получали сборы за распределение займов Свободы. Эти сборы, хотя и небольшие в расчете на одну облигацию, составили сотни миллионов долларов на 21,5 миллиарда долларов продаж облигаций.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДоход от процентов\u003c/strong\u003e — Сама Федеральная резервная система получала проценты по государственным облигациям, которые она купила на вновь созданные деньги. Эти проценты были оплачены налогоплательщиками через подоходный налог — система настолько элегантная в своей циклич­ности, что её разработчики должны были восхищаться собственной работой.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИностранный обмен\u003c/strong\u003e — война создала массивные колебания в значениях валют, и банки, которые контролировали рынки иностранного обмена, получили огромные прибыли от этих колебаний. Банковская сеть Ротшильда, с отделениями в каждом крупном финансовом центре, была особенно хорошо позиционирована для получения прибыли от валютного арбитража во время войны.\u003c/p\u003e\n\u003ch3 id=\"свидетельства-генерала-смедли-батлера\"\u003eСвидетельства генерала Смедли Батлера\u003c/h3\u003e\n\u003cp\u003eГенерал-майор Смедли Батлер, самый украшенный морской пехотинец в американской истории на момент его смерти, написал в \u003cem\u003e\"Война это рэкет\"\u003c/em\u003e (1935):\u003c/p\u003e\n\u003cp\u003e\"Я провёл 33 года и четыре месяца в активной военной службе... За этот период я большую часть времени работал мышцами высокого класса для Большого Бизнеса, для Уолл-стрита и банкиров. Короче говоря, я был рэкетиром, гангстером капитализма.\"\u003c/p\u003e\n\u003cp\u003eСвидетельство Батлера подтверждает то, что раскрывают финансовые доказательства: американская армия не сражалась за свободу, демократию или национальную оборону. Она сражалась за финансовые интересы банковской элиты — той же элиты, которая контролировала Федеральную резервную систему, программу займов Свободы и оружейную промышленность. Батлер конкретно определил корпоративных бенефициаров войн, в которых он сражался, назвав компании — DuPont, Standard Oil, U.S. Steel — которые получили прибыль от Первой мировой войны.\u003c/p\u003e\n\u003ch2 id=\"налоговое-извлечение\"\u003eНалоговое извлечение\u003c/h2\u003e\n\u003ch3 id=\"подоходный-налог-во-время-войны\"\u003eПодоходный налог во время войны\u003c/h3\u003e\n\u003cp\u003eПодоходный налог, установленный в 1913 году, был первоначально скромным сбором на богатых: 1% на доходы свыше 3000 долларов, с максимальной ставкой 7% на доходы свыше 500000 долларов. Но война обеспечила предлог для драматического увеличения:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e1916\u003c/strong\u003e: Максимальная ставка повышена до 15%\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1917\u003c/strong\u003e: Максимальная ставка повышена до 67%\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1918\u003c/strong\u003e: Максимальная ставка повышена до 77%\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти ставки применялись к наивысшим группам доходов, но война также резко расширила налоговую базу. К 1918 году миллионы американцев, которые никогда не платили подоходный налог, подавали декларации и платили налоги для финансирования войны.\u003c/p\u003e\n\u003cp\u003eДоход подоходного налога шёл непосредственно на обслуживание долга — выплату процентов по облигациям и кредитам, финансировавшим войну. Американский налогоплательщик платил дважды: один раз через покупку займов Свободы (которые платили ниже рыночные проценты), и снова через подоходные налоги (которые обслуживали долг, созданный программой займов). Деньги текли от налогоплательщика к правительству, от правительства к подрядчикам войны и банкам, и от банков обратно к иезуитско-контролируемой финансовой элите.\u003c/p\u003e\n\u003ch3 id=\"постоянное-налоговое-государство\"\u003eПостоянное налоговое государство\u003c/h3\u003e\n\u003cp\u003eВоенные ставки подоходного налога должны были быть временными. Они не были. После войны ставки были снижены, но никогда не исключены. Подоходный налог стал постоянным элементом американской жизни — постоянным механизмом для извлечения богатства из трудящегося населения и его передачи финансовой элите через посредство государственного долга.\u003c/p\u003e\n\u003cp\u003eЭто был план иезуитов с самого начала. 16-я поправка была принята не для финансирования правительства; она была принята для финансирования долга — и долг был создан Федеральной резервной системой, которая контролировалась банковскими семьями, которые контролировались иезуитским орденом. Подоходный налог — это дань, которую завоёванные платят своим завоевателям, и американцы платили её более века, не понимая, кому они платят и почему.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/97-Income_Tax_Is_Slavery.mp4\"\u003eПодоходный налог это рабство\u003c/a\u003e делает эту связь явной, и \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/145-Constitution_Constitutor_Trap.mp4\"\u003eЛовушка конституции и конституирующего\u003c/a\u003e раскрывает, как конституционная структура была подорвана, чтобы сделать это рабство законным.\u003c/p\u003e\n\u003ch2 id=\"послевоенный-раздел\"\u003eПослевоенный раздел\u003c/h2\u003e\n\u003ch3 id=\"версаль-иезуитский-мир\"\u003eВерсаль: Иезуитский мир\u003c/h3\u003e\n\u003cp\u003eВерсальский договор, подписанный в 1919 году, переформировал мировую карту в соответствии с иезуитским дизайном:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eГермания\u003c/strong\u003e была расчленена, разоружена и обременена репарациями, которые парализовали её экономику на поколение — обеспечив, что она никогда больше не будет оспаривать иезуитскую власть.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАвстро-Венгрия\u003c/strong\u003e была распущена на коллекцию небольших слабых государств, которыми можно было легко манипулировать.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОсманская империя\u003c/strong\u003e была демонтирована, и её территории распределены между победоносными державами — с критической территорией Палестины, размещённой под британским мандатом, подготавливая сцену для создания Израиля.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРоссия\u003c/strong\u003e уже была нейтрализована Большевистской революцией — финансируемой, как мы видели, тем же банковским сетям, которые финансировали войну.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЛига Наций, установленная договором, была первым шагом к мировому правительству под контролем иезуитско-банковской элиты. Хотя Сенат Соединённых Штатов отклонил членство в Лиге, инфраструктура мирового управления была установлена, и она будет развиваться через Организацию Объединённых Наций (1945), Всемирный банк, Международный валютный фонд и Всемирную торговую организацию в систему глобального контроля, которая существует сегодня.\u003c/p\u003e\n\u003cp\u003eГовард Питтман узнал во время своего близкого опыта смерти, что демоническое правительство функционирует из второго неба в иерархической структуре, которая отражает земные структуры власти. Мировой порядок после Версаля — это физическое проявление той демонической иерархии: система глобальных институтов, контролируемых финансовой элитой, служащих интересам иезуитского ордена, который служит князю тьмы. 97,5%, идущие по широкому пути к разрушению, включают тех, кто принимает эту систему без вопросов. Смотрите: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство НСО Говарда Питтмана\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля полной документации посетите \u003ca href=\"https://agent131711.substack.com\"\u003eSubstack агента131711\u003c/a\u003e и \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическое конфиденциально: раскрытые позорные иезуитские тайны\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может находиться в подвале Ватикана может шокировать вас!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/97-Income_Tax_Is_Slavery.mp4\"\u003eПодоходный налог это рабство\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eИллюминаты основатели\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/105-Freemason_J
