blockquote\u003e\n\u003cp\u003eВ части 1 мы раскрыли систему кошерной сертификации как скрытый налог. В части 2 мы раскрыли слои теневой индустрии, поднимающие цены на продукты. Теперь, в части 3, мы спускаемся в кроличью нору раввина — следуя за деньгами, отслеживая связи и раскрывая полный масштаб сети, которая работает с неуязвимостью суверенного государства и секретностью разведывательного агентства.\u003c/p\u003e\n\u003cp\u003eВидение Говарда Питтмана выявило, что невидимые иерархии управляют видимым миром. Три небеса. Демоническая структура во втором. 97,5 процента христиан отвергнуты. 95 процентов служат \"себе\". Каждое слово несёт суд (Матфей 12:36-37). Кошерная мафия — одна из земных иерархий, через которые начальства Ефесян 6:12 осуществляют господство над материальным миром — конкретно над продовольственным снабжением, которое поддерживает человеческую жизнь.\u003c/p\u003e\n\u003cp\u003eИезуиты работают по той же модели. Военная организация Лойолы. \"Абсолютная власть\" Наполеона. Глобальное управление Тамбурини без видимых следов. Убийство Климента XIV. \"Католические тайны\": проникновение \"скрытой хитростью\", слепое послушание, \"любой вид порока\". Кошерная мафия и иезуитский орден — параллельные структуры — обе невидимы, обе авторитетны, обе извлекают послушание у населения, которое не знает, что им управляют.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"следуя-за-деньгами\"\u003eСледуя за деньгами\u003c/h2\u003e\n\u003ch3 id=\"поток-доходов-от-сертификации\"\u003eПоток доходов от сертификации\u003c/h3\u003e\n\u003cp\u003eОртодоксальный союз (OU), крупнейший в мире орган кошерной сертификации, сертифицирует более одного миллиона продуктов более чем в 100 странах. Его годовой доход только от сборов за сертификацию оценивается в сотни миллионов долларов. Точная цифра неизвестна, потому что OU, как организация, раскрывает только агрегированную финансовую информацию.\u003c/p\u003e\n\u003cp\u003eOK Kosher Certification, Star-K, Kof-K и Чикагский раввинский совет вместе сертифицируют десятки тысяч дополнительных продуктов. Каждый взимает сборы, различающиеся в зависимости от сложности продукта, размера помещения и объёма производства. Общий доход индустрии кошерной сертификации консервативно оценивается в 2-4 миллиарда долларов ежегодно в виде прямых сборов — не включая косвенные затраты на соответствие (выделенные производственные линии, замены ингредиентов, изменения расписания).\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует финансовую архитектуру этих организаций, прослеживая поток доходов сертификации к связанным организациям: синагогам, школам, благотворительным организациям и группам политического лоббирования. Система кошерной сертификации — это не просто религиозный сервис. Это финансовая экосистема, которая финансирует всю институциональную сеть через скрытый налог на продовольственное снабжение.\u003c/p\u003e\n\u003ch3 id=\"механизм-принуждения\"\u003eМеханизм принуждения\u003c/h3\u003e\n\u003cp\u003eЧто происходит с производителем, который отказывается от кошерной сертификации? Здесь сравнение с \"мафией\" становится больше, чем метафора. Производители, которые пытались отказаться от сертификации, сообщают о давлении со многих сторон: розничные торговцы угрожают сократить полочное пространство; дистрибьюторы ставят под сомнение их приверженность \"качеству\"; кампании в социальных сетях ставят под сомнение их ценности.\u003c/p\u003e\n\u003cp\u003eОрганы сертификации не нуждаются в явных угрозах. Архитектура системы создаёт послушание автоматически. Производитель, который отказывается от сертификации, теряет доступ к потребителям, соблюдающим кошерное, мусульманским потребителям, которые используют кошерные символы как заменитель халяльного, потребителям, сознательно относящимся к здоровью, которые связывают кошерное с качеством, и розничным торговцам, которые предпочитают сертифицированные продукты для простоты учёта.\u003c/p\u003e\n\u003cp\u003eЭто многостороннее давление гарантирует, что когда производитель входит в систему кошерной сертификации, выход чрезвычайно затруднён. Это идентично иезуитской модели институционального захвата: когда вы внутри системы, стоимость выхода превышает стоимость остаться. Слепое послушание становится рациональным выбором.\u003c/p\u003e\n\u003ch3 id=\"политическое-измерение\"\u003eПолитическое измерение\u003c/h3\u003e\n\u003cp\u003eОрганы кошерной сертификации связаны с организациями политического лоббирования, которые проводят кампании за политику, благоприятную для индустрии сертификации. Эти связи не являются тайной, но редко обсуждаются. Доход сертификации финансирует институции, которые проводят кампании за государственную политику — сельскохозяйственное регулирование, стандарты импорта, требования к маркировке — которые усиливают необходимость системы сертификации.\u003c/p\u003e\n\u003cp\u003eЭто создаёт самоусиливающийся цикл: доход сертификации финансирует политическое лоббирование, которое создаёт регулирование, требующее соответствия, которое генерирует больше дохода от сертификации. Цикл работает независимо от спроса потребителей. Потребители не просили кошерную сертификацию на своей алюминиевой фольге. Система создала требование, и потребители платят стоимость.\u003c/p\u003e\n\u003ch2 id=\"раскрытие-сети\"\u003eРаскрытие сети\u003c/h2\u003e\n\u003ch3 id=\"переплетающиеся-директораты\"\u003eПереплетающиеся директораты\u003c/h3\u003e\n\u003cp\u003eСоветы крупнейших органов кошерной сертификации перекрываются с советами финансовых учреждений, медиакомпаний, образовательных организаций и групп политического лоббирования. Это не необычно — институциональные сети всегда делят руководство. Но образец показывает, что система кошерной сертификации — это не изолированный религиозный сервис. Это узел в более крупной сети институциональной власти.\u003c/p\u003e\n\u003cp\u003eИсследования Agent131711 в Substack прослеживают эти связи в деталях, показывая, как органы сертификации, финансовые учреждения, медиакомпании и политические организации формируют последовательную систему — систему, которая контролирует пищу, деньги, информацию и политику одновременно. Это определение системной власти: не власть над одним, но власть над всем.\u003c/p\u003e\n\u003cp\u003eИезуиты работают через ту же модель переплетающегося институционального контроля. Их члены сидят в советах университетов, медиакомпаний, государственных учреждений и финансовых учреждений. Две системы — иезуитская и кошерная сертификация — не обязательно координируются, но работают по одним и тем же принципам: невидимая власть, институциональный захват и системная экстракция.\u003c/p\u003e\n\u003ch3 id=\"международное-измерение\"\u003eМеждународное измерение\u003c/h3\u003e\n\u003cp\u003eКошерная сертификация не ограничена Соединёнными Штатами. Она работает глобально, с органами сертификации в Европе, Азии, Южной Америке и Африке. Продукты, произведённые в Китае, Индии и Бразилии, сертифицируются американскими органами, добавляя затраты на сертификацию к глобальному продовольственному снабжению.\u003c/p\u003e\n\u003cp\u003eЭтот международный охват означает, что система кошерной сертификации функционирует как частная глобальная нормативно-правовая база — набор стандартов, наложенных на продовольственное снабжение всего мира организациями, не подотчётными ни какому правительству, ни какому электорату, ни какой публичной власти. Это управление без согласия — тот же принцип, который определяет претензию иезуитского ордена на управление \"всем миром\" из одной комнаты Тамбурини.\u003c/p\u003e\n\u003cp\u003eОткровение Говарда Питтмана о демонической иерархии, работающей в трёх небесах, описывает именно этот вид глобального, невидимого управления. Духовные силы не уважают национальные границы. Ни система кошерной сертификации.\u003c/p\u003e\n\u003ch2 id=\"позиция-потребителя\"\u003eПозиция потребителя\u003c/h2\u003e\n\u003ch3 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h3\u003e\n\u003cp\u003eПотребитель не бессилен, несмотря на дизайн системы. Несколько действий могут начать смещать баланс:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЧитайте этикетки\u003c/strong\u003e: Осведомлённость — первый шаг. Выявите кошерные символы на продуктах, которые вы покупаете. Поймите, что каждый символ представляет сбор, который был добавлен к вашей стоимости.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПокупайте местное\u003c/strong\u003e: Местные фермеры и малые производители менее вероятно будут иметь кошерную сертификацию. Покупка непосредственно у этих производителей обходит налог на сертификацию.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗадавайте вопросы\u003c/strong\u003e: Свяжитесь с производителями и спросите об их расходах на сертификацию. Спросите розничных торговцев, почему они требуют сертификации. Система зависит от молчания. Вопросы нарушают молчание.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПоддерживайте прозрачность\u003c/strong\u003e: Выступайте за законодательство, требующее раскрытия сборов за сертификацию — точно так же, как требуются списки ингредиентов и информация о питательной ценности. Если бы потребители знали стоимость сертификации, они могли бы принять обоснованный выбор.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВыращивайте свои собственные\u003c/strong\u003e: Окончательный акт пищевой независимости — выращивание собственной пищи. Каждый помидор из вашего сада — это помидор, свободный от скрытых налогов теневой индустрии.\u003c/p\u003e\n\u003ch3 id=\"духовное-измерение-пищевой-независимости\"\u003eДуховное измерение пищевой независимости\u003c/h3\u003e\n\u003cp\u003eВыращивание собственной пищи — это не просто практическая стратегия. Это духовный акт — восстановление первоначального мандата, данного в Бытии: ухаживать за садом. Зависимость от пищи — это наиболее фундаментальная форма материального рабства. Разрыв этой зависимости — это наиболее фундаментальная форма духовного освобождения.\u003c/p\u003e\n\u003cp\u003eПослание Говарда Питтмана — что 95 процентов служат \"себе\" — включает \"я\", служащее удобством, готовой едой, комфортным принятием системы, которая кормит вас, извлекая ваше богатство и агентство. Узкий путь (Матфей 7:14) может вести через сад — через грязную, трудную, освобождающую работу выращивания собственного пропитания, свободного от невидимого захвата теневой индустрии.\u003c/p\u003e\n\u003cp\u003eИезуиты и система Сатурна не могут управлять тем, что они не контролируют. Каждый сад, каждая местная ферма, каждая прямая транзакция между производителем и потребителем — это пространство вне их юрисдикции. Эти пространства малы, но растут. И каждый человек, который входит в одно, — это человек, который начал ходить по узкому пути.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на
