 6:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНефилимы были не мифом. Они не были метафорой. Они не были преувеличением племенной памяти. Они были гибридным потомством падших ангелов и человеческих женщин -- существа необычайного размера, силы и аппетита, которые испортили землю столь тщательно, что Бог судил целый мир потопом. И Бытие 6:4 содержит деталь, которую большинство читателей упускают: \"и также после того\". Нефилимы существовали до Потопа -- и после.\u003c/p\u003e\n\u003cp\u003eПрисутствие гигантов после Потопа подтверждается по всему Ветхому Завету. Анаким. Рефаим. Эмим. Замзуммим. Ог Васанский, чья железная кровать была длиной тринадцать с половиной футов. Голиаф Гафский, который стоял над девятью футов в высоту. Шпионы, которые исследовали Ханаан, доложили: \"Мы видели там исполинов, сыновей Ануковых, из рода исполинов; и в глазах наших мы были как саранча\" (Числа 13:33).\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/03-Cave_of_Treasures.mp4\"\u003eCave of Treasures\u003c/a\u003e намекает на скрытую историю, сохраняемую в древних текстах -- историю коррупции, гибридизации и божественного суда, которой современный мир был обучен отклонять как фантазия. Но доказательства не поддерживают отклонение. Они поддерживают исследование.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"аккаунт-бытия-что-действительно-произошло\"\u003eАккаунт Бытия: что действительно произошло\u003c/h2\u003e\n\u003cp\u003eБытие 6:1-4 записывает событие, которое запустило Потоп. Как исследовано в деталях в \u003ca href=\"/fallen-angels-book-of-enoch/?lang=ru\"\u003eFallen Angels and the Book of Enoch: The Forbidden History\u003c/a\u003e, \"сыны Божьи\" (\u003cem\u003ebene ha'elohim\u003c/em\u003e) -- ангелические существа -- взяли человеческих жен и произвели гибридное потомство, названное нефилимами.\u003c/p\u003e\n\u003cp\u003eЕврейское слово \u003cem\u003eнефилимы\u003c/em\u003e происходит от корня \u003cem\u003eнафал\u003c/em\u003e -- \"падать\". Нефилимы -- это \"падшие\" -- не потому, что они сами упали с небес, а потому что они были потомством тех, кто упал. Они наследовали сверхъестественные характеристики своих ангелических отцов и физическую форму своих человеческих матерей, производя существа, которые были ни полностью ангельскими, ни полностью человеческими.\u003c/p\u003e\n\u003cp\u003eКнига Еноха предоставляет специфичные детали о их природе:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИх рост был огромным -- 1 Енох описывает их как высокие триста локтей (хотя это может быть гиперболичным или поврежденным при передаче; даже доля этой высоты произвела бы существ двадцати-тридцати футов)\u003c/li\u003e\n\u003cli\u003eИх аппетиты были ненасытными -- они потребляли всю пищу, которую люди могли произвести, затем повернулись к потреблению людей, затем повернулись к потреблению друг друга\u003c/li\u003e\n\u003cli\u003eИх поведение было насильственным и развратным -- \"они пожирали человечество\" и \"начали грешить против птиц, зверей, пресмыкающихся и рыб\" (1 Енох 7:5)\u003c/li\u003e\n\u003cli\u003eОни обладали сверхъестественным знанием, унаследованным от своих отцов-Наблюдателей -- знанием оружия, колдовства, астрологии и генетической манипуляции\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКоррупция была ограничена не только самими нефилимами. Бытие 6:12 гласит: \"И посмотрел Бог на землю, и вот, она растлена; ибо развратилась всякая плоть на земле\". Фраза \"всякая плоть\" предполагает коррупцию, которая распространялась за пределы человечества на животное царство -- генетическое манипулирование, гибридизация между видами и биологический хаос на масштабе, который сделал землю неспасаемой какими-либо средствами, кроме полного разрушения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"и-также-после-того-гиганты-после-потопа\"\u003e\"И также после того\": Гиганты после Потопа\u003c/h2\u003e\n\u003cp\u003eЕсли Потоп уничтожил всех нефилимов, как гиганты появились после Потопа? Бытие 6:4 явно гласит: \"и также после того\". Несколько объяснений были предложены:\u003c/p\u003e\n\u003ch3 id=\"второе-вторжение\"\u003eВторое вторжение\u003c/h3\u003e\n\u003cp\u003eНаиболее прямолинейное объяснение заключается в том, что еще одна группа падших ангелов повторила грех Наблюдателей после Потопа. Исходные двести Наблюдателей были связаны цепями (Иуда 6), но не все падшие ангелы были среди исходных двухсот. Вторая волна ангелического вторжения -- возможно меньшего масштаба -- могла произвести новое поколение нефилимов в пост-потопном мире.\u003c/p\u003e\n\u003ch3 id=\"генетическое-переноса-через-семью-ноя\"\u003eГенетическое переноса через семью Ноя\u003c/h3\u003e\n\u003cp\u003eНой был \"совершен в своих родах\" (\u003cem\u003eтамим\u003c/em\u003e -- без пятна в своей генеалогии), предполагая его кровная линия была непоколебимой. Но текст не делает это утверждение о его жене или жен его сыновей. Возможно, генетика нефилимов была перенесена через Потоп в рецессивной форме через женщин семьи Ноя, переиздаваясь в последующих поколениях.\u003c/p\u003e\n\u003ch3 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h3\u003e\n\u003cp\u003eДухи нефилимов, которые умерли в Потопе, определены в еврейской традиции как \"злые духи\" или \"демоны\", которые бродят по земле. 1 Енох 15:8-10 описывает это явно: духи гигантов, рожденные от духовных и физических родителей, становятся бесплотными духами, которые мучают человечество. Эти духи могли повлиять или облегчить попотопные попытки пересоздать до-потопную коррупцию.\u003c/p\u003e\n\u003cp\u003eНезависимо от механизма, библейский текст ясен: гиганты существовали после Потопа. Они обширно задокументированы в Ветхом Завете:\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейский-отчет-о-гигантах-после-потопа\"\u003eБиблейский отчет о гигантах после Потопа\u003c/h2\u003e\n\u003cp\u003eВетхий Завет содержит многочисленные ссылки на расы гигантов и отдельных гигантов:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАнаким\u003c/strong\u003e -- Потомки Анака, который произошел от Арба (Иошуа 15:13). Они населяли Хеврон и холмистую страну Иудеи. Шпионы, отправленные Моисеем, доложили о них как о ужасающе больших. Калев позже завоевал Хеврон и выгнал анакимов (Иошуа 15:14).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРефаим\u003c/strong\u003e -- Древняя раса гигантов, населяющих землю к востоку от Иордана. Бытие 14:5 записывает их поражение Кедорлаомером. Они многократно упоминаются в связи с подземным миром -- еврейское слово \u003cem\u003eрефаим\u003c/em\u003e также означает \"тени\" или \"духи мертвых\", предполагая связь между расой гигантов и духовной областью мертвых.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭмим\u003c/strong\u003e -- Гиганты, проживающие в земле, позже занятой Моавом. \"Эмимы жили там в старые времена, народ великий и многочисленный и высокий, как анакимы; и они также считались рефаимами, как анакимы; но моавитяне называли их эмимами\" (Второзаконие 2:10-11).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗамзуммим\u003c/strong\u003e -- Гиганты, проживающие в земле, позже занятой Аммоном. \"Народ великий и многочисленный и высокий, как анакимы; но Господь уничтожил их перед ними\" (Второзаконие 2:21).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОг Васанский\u003c/strong\u003e -- Король Васана, \"из остатка гигантов\" (Второзаконие 3:11). Его железная кровать измеряла тринадцать с половиной футов в длину и шесть футов в ширину. Если кровать была пропорциональна ее жильцу, Ог стоял минимум двенадцать футов в высоту.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГолиаф Гафский\u003c/strong\u003e -- Самый известный библейский гигант, стоящий \"шесть локтей и пядь\" -- примерно девять футов девять дюймов (1 Царств 17:4). Голиаф имел братьев, которые также были гигантами (2 Царств 21:15-22), предполагая клан или кровную линию сверхразмерных воинов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИшби-Ванов, Саф и другие\u003c/strong\u003e -- 2 Царств 21:15-22 записывает четырех филистимских воинов, которые были потомками \"гиганта\" (\u003cem\u003eхарафа\u003c/em\u003e), убитого людьми Давида. Один имел шесть пальцев на каждой руке и шесть пальцев на каждой ноге -- генетическая аномалия, согласная с гибридизацией.\u003c/p\u003e\n\u003cp\u003eПолидактилия (дополнительные цифры) особенно значима. Она происходит в филистимских гигантах и задокументирована в аккаунтах, связанных с нефилимами, во множественных древних культурах. Последовательное присутствие этой генетической аномалии в больших отдельных людях через различные популяции и временные периоды предполагает общее генетическое происхождение -- не случайную мутацию, а унаследованные характеристики из негеманической генетической исток.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дальнейшие-исследования\"\u003eДальнейшие исследования\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/fallen-angels-book-of-enoch/?lang=ru\"\u003eFallen Angels and the Book of Enoch: The Forbidden History\u003c/a\u003e -- Наблюдатели, которые отцовствовали нефилимов и запретное знание, которое они учили\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/ye-shall-be-as-gods-transhumanism/?lang=ru\"\u003eYe Shall Be as Gods: The Ancient Lie Behind Transhumanism\u003c/a\u003e -- Современная итерация генетической коррупции, которая произвела нефилимов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/tower-of-babel-two-rebuilding/?lang=ru\"\u003eTower of Babel 2.0: Rebuilding the Gateway to Heaven\u003c/a\u003e -- Пост-потопное продолжение до-потопного восстания\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/489-Nephilim_Nanobots.mp4\"\u003eNephilim Nanobots\u003c/a\u003e -- Возвращение нефилимов через технологию\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/447-Modded_Humans.mp4\"\u003eModded Humans\u003c/a\u003e -- Модификация человеческого генома\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОни были гиганты. Они были могучие. Они были люди славные. И они были продуктом восстания столь серьезного, что Бог утопил мир, чтобы окончить это. Но Бытие говорит \"и также после того\" -- гиганты вернулись после Потопа, и они вернутся снова перед концом. Не как сказки. Не как мифология. Не как метафора. Как биология -- поврежденная, гибридная, расширенная за пределы границ, которые Создатель установил. Шпионы, которые вошли в Ханаан, сказали: \"Мы были как саранча в их глазах\". Ученые, которые редактируют человеческий геном сегодня, не трепещут перед тем, что они создают. Но они должны. Дни Ноя возвращаются. Границы пересекаются. Коррупция распространяется. И Бог, который послал Потоп в первый раз, обещал, что Он не будет использовать воду с
