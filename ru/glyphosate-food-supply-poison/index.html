али, сама земля была проклята. Что когда-то производило пищу свободно теперь требовало труда, борьбы и страданий. Но даже проклятая земля была всё ещё землёй Бога — она всё ещё производила реальную пищу, питаемую реальной почвой, управляемую реальными биологическими процессами. То, что Монсанто сделала с глифосатом, это что-то совершенно иное: преднамеренное отравление самой земли, систематическое разрушение почвенной биологии, которая делает пищу питательной, и насыщение продовольственного снабжения химическим веществом, которое атакует человеческое тело на клеточном уровне. Это не проклятие земли. Это война против земли — и против каждого живого существа, которое от неё зависит.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/43-Hunger_and_Thirst.mp4\"\u003eHunger and Thirst\u003c/a\u003e сетует, то, что Бог предоставил как средство поддержания, было развращено в яд. Поддержание остаётся, но оно было загрязнено силами, которые получают прибыль от развращения и отрицают его последствия.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-глифосат\"\u003eЧто такое глифосат?\u003c/h2\u003e\n\u003cp\u003eГлифосат — активный ингредиент в Roundup, наиболее широко используемом гербициде в мире. Он был впервые запатентован Монсанто в 1974 году как убийца сорняков. Его механизм действия обманчиво прост: глифосат подавляет путь шикиомата, энзиматический процесс, существенный для роста растений. Так как этот путь существует в растениях, но не в млекопитающих, Монсанто продвигала Roundup как безвредный для людей и животных.\u003c/p\u003e\n\u003cp\u003eЭто утверждение было основой четырёхдесятилетней глобальной маркетинговой кампании, которая стала бы самым коммерчески успешным сельскохозяйственным химикалом в истории. К 2014 году более 826 миллионов килограммов глифосата применялись ежегодно во всём мире — достаточно, чтобы распылить почти полкилограмма на каждый возделанный акр земли на Земле.\u003c/p\u003e\n\u003cp\u003eНо утверждение, что глифосат безвреден для людей, потому что люди не имеют пути шикиомата, содержало критическое пропущение: триллионы бактерий в человеческом кишечнике — микробиом — действительно обладают путём шикиомата. Глифосат не убивает людей прямо. Он убивает бактерии, которые держат людей живыми.\u003c/p\u003e\n\u003cp\u003eЧеловеческий микробиом — это не просто вспомогательное средство пищеварения. Это фундаментальная система, которая регулирует функцию иммунной системы, производит нейротрансмиттеры (включая примерно 90% серотонина тела), синтезирует витамины, поддерживает кишечный барьер и модулирует выражение генов. Когда глифосат нарушает микробиом кишечника, он не производит одного симптома. Он производит каскад системной дисфункции, которая проявляется как аутоиммунное заболевание, неврологическое нарушение, гормональное нарушение и рак.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"бумаги-монсанто\"\u003eБумаги Монсанто\u003c/h2\u003e\n\u003cp\u003eВ 2017 году, как часть судебного разбирательства против Монсанто (теперь принадлежащей Bayer), внутренние документы компании были выпущены через юридическое раскрытие. Эти документы — известные как бумаги Монсанто — раскрыли то, что компания знала об эффектах глифосата на здоровье и что она сделала для подавления этого знания.\u003c/p\u003e\n\u003cp\u003eДокументы раскрыли, что:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМонсанто подделала научные исследования.\u003c/strong\u003e Внутренние электронные письма показали, что сотрудники Монсанто составляли исследования, которые затем были опубликованы под именами академических учёных, давая финансируемому промышленностью исследованию внешний вид независимой валидации. Одно электронное письмо от токсиколога Монсанто заявило: \"Мы держали бы затраты вниз, нам делая письма.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМонсанто атаковала независимых исследователей.\u003c/strong\u003e Учёные, которые опубликовали находки, связывающие глифосат с проблемами здоровья, были целевыми скоординированными кампаниями для дискредитации их работы, снятия финансирования их лабораторий и разрушения их карьер. Профессор Жиль-Эрик Сералини, чьё исследование 2012 года показало опухоли у крыс, питавшихся ГМО кукурузой, распыляемой Roundup, был предметом систематической кампании, которая привела к отзыву его статьи — отзыву позже отменённому, когда статья была переопубликована в другом журнале после независимого рассмотрения, подтвердившего свои находки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМонсанто влияла на нормативные агентства.\u003c/strong\u003e Документы показали, что старший должностной лицо EPA, Jess Rowland, работал для подавления рассмотрения глифосата Агентством токсичных веществ и болезней Реестра (ATSDR), говоря Монсанто: \"Если я могу убить это, я должен получить медаль.\" Роуленд вышел в отставку вскоре после того, как эти коммуникации были выставлены.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМонсанто знала, что глифосат вызывал рак.\u003c/strong\u003e Внутренние документы раскрыли, что токсикологи Монсанто имели озабоченность по канцерогенному потенциалу глифосата уже в 1980-х годах, но выбрали подавить и переинтерпретировать данные, а не признать риск.\u003c/p\u003e\n\u003cp\u003eВ 2015 году Международное агентство по исследованию рака (IARC), подразделение Всемирной организации здравоохранения, классифицировало глифосат как \"вероятно канцерогенный для людей\", основываясь на всеобъемлющем рассмотрении научных доказательств. Монсанто немедленно запустила кампанию для дискредитации находки IARC, потратив миллионы на лоббистов, PR фирмы и академических союзников для защиты своего продукта.\u003c/p\u003e\n\u003cp\u003eК 2024 году Bayer (который приобрёл Монсанто в 2018 году за $63 миллиарда) выплатила более $11 миллиардов для урегулирования более чем 100 000 судебных исков от людей, которые утверждали, что Roundup вызвал их неходжкинскую лимфому. Bayer урегулировала, официально отрицая, что Roundup вызывает рак — юридический манёвр, который позволил компании избежать определительного судебного постановления, одновременно признав практическую реальность, что присяжные последовательно находили против них.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"глифосат-как-высушивающий-агент-распыляемый-прямо-на-вашу-пищу\"\u003eГлифосат как высушивающий агент: распыляемый прямо на вашу пищу\u003c/h2\u003e\n\u003cp\u003eБольшинство людей предполагают, что глифосат распыляется на сорняки вокруг культур. Это только часть истории. С конца 1990-х годов глифосат всё больше используется как предсбойный высушивающий агент — распыляемый прямо на пищевые культуры вскоре перед жатвой для ускорения сушки и делает жатву более однородной.\u003c/p\u003e\n\u003cp\u003eЭта практика означает, что глифосат применяется к пшенице, овсу, ячменю, чечевице, бобам, нуту, сахарному тростнику и многочисленным другим культурам в точке максимального абсорбции — просто дни, прежде чем они собраны, обработаны и превращены в пищу на вашей тарелке.\u003c/p\u003e\n\u003cp\u003eТестирование Канадского продовольственного агентства инспекции нашло остатки глифосата примерно в 30% протестированных продовольственных продуктов, с наибольшими уровнями, найденными в зёрно-основанных продуктах. Рабочая группа по окружающей среде нашла глифосат в 43 из 45 протестированных традиционных продуктов на основе овсяной муки, включая популярные детские кашибы и гранолы. Исследование, опубликованное в журнале Environmental Health, нашло поддающиеся обнаружению уровни глифосата в моче 93% протестированных участников, с детьми, имеющими наибольшие уровни.\u003c/p\u003e\n\u003cp\u003eВы случайно не подвергаетесь воздействию глифосата. Вам систематически кормят глифосатом, и система, которая питает вас им, называет это безопасным.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"путь-разрушения-кишечника\"\u003eПуть разрушения кишечника\u003c/h2\u003e\n\u003cp\u003eДоктор Stephenie Seneff из MIT опубликовала обширные статьи о механизмах, посредством которых глифосат наносит ущерб здоровью человека. Её исследование, собранное в книге \"Toxic Legacy\", определяет несколько путей вреда:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазрушение микробиома:\u003c/strong\u003e Глифосат предпочтительно убивает полезные кишечные бактерии (Lactobacillus, Bifidobacterium), пока оставляет патогенные бактерии (Clostridium, Salmonella) относительно невредимыми. Эта дисбиоз связана с воспалительным заболеванием кишечника, аутоиммунными состояниями, депрессией и ожирением.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарушение аминокислот:\u003c/strong\u003e Путь шикиомата, который глифосат подавляет в растениях и бактериях, производит ароматические аминокислоты — триптофан, тирозин и фенилаланин — которые являются предшественниками серотонина, дофамина, меланина и гормонов щитовидной железы. Путём нарушения микробного производства этих аминокислот, глифосат способствует депрессии, неврологической дисфункции, заболеванию щитовидной железы и гормональному нарушению.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eХелирование минералов:\u003c/strong\u003e Глифосат был первоначально запатентован как металлический хелирующий агент — химический, который связывает минералы и делает их недоступными. В почве он связывает марганец, цинк, железо и кобальт, снижая содержание минералов в культурах. В человеческом теле он связывает те же существенные минералы, способствуя недостаточности питания даже когда пищевой состав кажется адекватным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарушение эндокрина:\u003c/strong\u003e Исследования, опубликованные в Токсикологических науках и Environmental Health Perspectives, показали, что глифосат нарушает рецепторы эстрогена в концентрациях, намного ниже тех, что найдены в продовольственном снабжении. Это нарушение эндокрина связано с репродуктивными нарушениями, ранним половым созреванием и гормонозависимыми раками.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГлифосат и целиакия:\u003c/strong\u003e Исследование, опубликованное в журнале Interdisciplinary Toxicology, нашло поразительную корреляцию между ростом целиакии и повышенным использованием глифосата на пшенице как высушивающего агента. Документ выдвинул гипотезу, что глифосат повреждает кишечный барьер, нарушает функцию пищеварительного фермента и ухудшает способность тела обрабатывать глютен — предлагая, что \"глютеновая эпидемия\" может быть, значительно, глифосатной эпидемией.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"тестирование-показывает-насыщение-продовольственного-снабжения\"\u003eТестирование показывает насыщение продовольственного снабжения\u003c/h2\u003e\n\u003cp\u003eНезависимое лабораторное тестирование образцов дождевой воды, снега, почвы и поверхностной воды со всего мира неоднократно обнаружило повышенные концентрации глифосата, совместимых с известными программами гербицидов и несовместимых с естественными фоновыми уровнями.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/191-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e — Корпоративный захват здоровья расширяется от больницы до фермы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/55-Extinction_Code-AI_Will_Kill_Us_All.mp4\"\u003eExtinction Code\u003c/a\u003e — Систематическое разрушение биологических систем, которые поддерживают жизнь\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/43-Hunger_and_Thirst.mp4\"\u003eHunger and Thirst\u003c/a\u003e — Поддержка Бога развращена в яд, средство поддержания превращено в болезнь\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/441-Peanut_Butter.mp4\"\u003ePeanut Butter\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучи-дальше\"\u003eИзучи дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/gmo-genetic-modification-food/?lang=ru\"\u003eGMOs: Genetic Modification of the Food Supply\u003c/a\u003e — Генетически инженерные культуры, которые сделали Roundup гербицидом наиболее используемым в мире\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/heavy-metals-food-supply/?lang=ru\"\u003eHeavy Metals in the Food Supply: What Testing Reveals\u003c/a\u003e — Глифосат — один слой загрязнения в множественно отравленной пищевой системе\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/organic-farming-under-attack/?lang=ru\"\u003eOrganic Farming Under Attack: The War on Clean Food\u003c/a\u003e — Нормативная война против единственной альтернативы химической сельскохозяйству\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/bee-colony-collapse-food-chain/?lang=ru\"\u003eBee Colony Collapse: The Food Chain Under Attack\u003c/a\u003e — Роль глифосата в коллапсе популяций опылителей\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eТак же, как в саду, так это в поле. Змей не просто искушал Еву съесть неправильный плод — он развращал отношение между человечеством и самой землёй. Глифосат — это современное выражение этого развращения: химикал, который отравляет почву, убивает микробы, загрязняет пищу и делает больных людей, которые едят её, пока авторитеты, которые её одобрили, говорят вам, что это безопасно. Сатана всё ещё лжец. Плод по-прежнему выглядит хорошо. И люди, которые едят его, по-прежнему умирают.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/food-environment/\",\"className\":\"category-badge\",\"children\":\"food-environment\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Глифосат в продовольственном снабжении: раундап на вашей тарелке\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Как гербицид Roundup компании Монсанто насытил глобальное продовольственное снабжение глифосатом — вероятным канцерогеном, связанным с разрушением кишечника, нарушением эндокринов и коллапсом почвенной биологии — и почему нормативные
