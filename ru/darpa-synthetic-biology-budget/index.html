и, и над птицами небесными, и над скотом, и над всею землею, и над всеми гадами, пресмыкающимися по земле.\" — Бытие 1:26\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБог создал жизнь. Он сказал это в бытие, и только Он держит патент на живые системы. Но в нашем поколении военное агентство выделило миллиарды долларов на задачу переписания кода жизни самой — переделки организмов, инженерии синтетических биологических систем и слияния живого с машиной. Это не научная фантастика. Это статья расходов в бюджете Defense Advanced Research Projects Agency.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpents Curse\u003c/a\u003e повторяет древнее предупреждение: змей обещал человечеству, что оно может стать \"как боги\", и это обещание никогда не было более буквально преследовано, чем в лабораториях, финансируемых отделом синтетической биологии DARPA. Когда люди пытаются создавать жизнь, они не инновируют — они повторяют первоначальное нарушение, достигая божества через технологию, а не послушание.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-программа-синтетической-биологии-darpa\"\u003eЧто такое программа синтетической биологии DARPA?\u003c/h2\u003e\n\u003cp\u003eDefense Advanced Research Projects Agency работает под Министерством обороны США. Его заявленная миссия — разработать появляющиеся технологии для военного использования. С момента его основания в 1958 году DARPA дал миру интернет, GPS и самолеты-невидимки. Но в последние два десятилетия его внимание резко сместилось в направлении биологии. Не просто учиться биологии — инженерии ее.\u003c/p\u003e\n\u003cp\u003eПортфель синтетической биологии DARPA теперь превышает 4,1 миллиарда долларов в выделенных и прогнозируемых расходах. Этот показатель, составленный из открытых бюджетных документов, свидетельств конгресса и исследовательских отчетов — включая подробный анализ, опубликованный на Substack Карен Кингстон (karenkingston.substack.com) — представляет беспрецедентные инвестиции в способность проектировать, строить и развертывать живые системы для военных целей.\u003c/p\u003e\n\u003ch3 id=\"the-biological-technologies-office\"\u003eThe Biological Technologies Office\u003c/h3\u003e\n\u003cp\u003eВ 2014 году DARPA установила Biological Technologies Office (BTO), выделенное подразделение, сосредоточенное на пересечении биологии и технологии. Это было не незначительное переорганизирование. Это сигнализировало о стратегическом повороте: биология больше не была вторичным интересом, но первичным театром военного развития.\u003c/p\u003e\n\u003cp\u003eBTO контролирует программы в:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСинтетическая биология\u003c/strong\u003e — проектирование организмов с новыми функциями\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРедактирование генов\u003c/strong\u003e — использование CRISPR и связанных технологий для изменения генетического кода\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНейротехнология\u003c/strong\u003e — интерфейс человеческого мозга с машинами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБиологическое наблюдение\u003c/strong\u003e — обнаружение биологических угроз в реальном времени\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБиопроизводство\u003c/strong\u003e — производство материалов и химикатов с использованием спроектированных организмов\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждая из этих категорий получила сотни миллионов долларов в финансировании, и каждая поднимает глубокие этические, духовные и экзистенциальные вопросы.\u003c/p\u003e\n\u003ch3 id=\"ключевые-программы-и-их-бюджеты\"\u003eКлючевые программы и их бюджеты\u003c/h3\u003e\n\u003cp\u003eНесколько конкретных программ DARPA проясняют масштаб инвестиций:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLiving Foundries\u003c/strong\u003e — Эта программа, запущенная в 2011 году, нацелена на то, чтобы сделать биологию \"более легкой инженерии, чем электроника\". Его целью является создание библиотеки стандартизированных биологических частей, которые могут быть собраны в новые организмы, как электронные компоненты собраны в цепи. Бюджет только для Living Foundries превысил 100 миллионов долларов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSafe Genes\u003c/strong\u003e — Объявлено в 2016 году, Safe Genes финансирует исследования контроля, противодействия и даже обращения эффектов редактирования генов. Хотя представлено как программа безопасности, она также разрабатывает инструменты для развертывания gene drives — генетических изменений, которые распространяются через целые популяции диких организмов. Последствия для биологической войны ошеломляют.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInsect Allies\u003c/strong\u003e — Возможно, наиболее противоречивая программа, Insect Allies предлагает использовать насекомых для доставки генетически модифицированных вирусов культур в поле. Заявленная цель является агропроизводством защиты, но коалиция европейских ученых опубликовала статью в журнале Science, предупреждая, что программа может легко быть вооружена. Насекомые, несущие вирусы редактирования генов, могут опустошить сельскохозяйственные культуры врага без выстрела из единого пулемета.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePandemic Prevention Platform (P3)\u003c/strong\u003e — Эта программа нацелена на разработку возможности остановить пандемию в течение 60 дней после вспышки. Она полагается на быстрое развертывание медицинских контрмер, включая терапевтику на основе мРНК. Технология, разработанная в рамках P3, непосредственно информировала ответ COVID-19, поднимая вопросы о том, была ли лечение разработана вместе с болезнью — или даже до болезни.\u003c/p\u003e\n\u003ch2 id=\"теологическая-проблема-создание-жизни\"\u003eТеологическая проблема: создание жизни\u003c/h2\u003e\n\u003ch3 id=\"играть-в-бога--не-метафора\"\u003eИграть в Бога — не метафора\u003c/h3\u003e\n\u003cp\u003eКогда писание говорит, что Бог \"сформировал человека из праха земного и вдунул в его ноздри дыхание жизни\" (Бытие 2:7), это устанавливает фундаментальный принцип: жизнь — это область Бога. Акт создания живых систем — инженерия организмов, которые никогда не существовали в природе — это не просто научное достижение. Это претензия на божественное преимущество.\u003c/p\u003e\n\u003cp\u003eПрограммы DARPA не просто изучают жизнь. Они стремятся создать ее. Программа Living Foundries явно нацелена на то, чтобы сделать проектирование новых организмов столь же рутинным, как проектирование нового программного обеспечения. Язык их собственной документации является раскрывающим: они говорят о \"программировании\" биологии, \"отладке\" организмов и \"компиляции\" генетического кода. Это язык создания, очищенный от благоговения и завернутый в инженерную терминологию.\u003c/p\u003e\n\u003cp\u003eКак трек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/61-Synthetic_Biology.mp4\"\u003eSynthetic Biology\u003c/a\u003e предупреждает, слияние технологии и биологии производит что-то, что не полностью естественно и не полностью искусственно — категория существа, которую писание не уполномочивает и которую природа не произвела.\u003c/p\u003e\n\u003ch3 id=\"параллель-нефилимов\"\u003eПараллель Нефилимов\u003c/h3\u003e\n\u003cp\u003eБытие 6 записывает период, когда границы между видами были нарушены — когда \"сыны Божии пришли к дочерям человеческим, и они заразили им — детей\" (Бытие 6:4). Результатом были Нефилимы, существа, которые были ни полностью человеческими, ни полностью ангельскими, а гибридной мерзостью, которая провоцировала Бога уничтожить мир наводнением.\u003c/p\u003e\n\u003cp\u003eПрограмма синтетической биологии DARPA действует на том же принципе нарушения границ. Инженерия организмов, которые никогда не существовали, слияние человеческих клеток с синтетическими компонентами, проектирование биологических систем, которые размывают линию между живым и машиной — это не инновации. Это трансгрессии. Они пересекают границы, которые Бог установил при создании, когда Он создал каждое живое существо \"после его вида\" (Бытие 1:24-25).\u003c/p\u003e\n\u003cp\u003eТрек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e напоминает нам, что падшие научили человечество запретному знанию — технологиям войны, обмана и манипуляции. Программы DARPA могут представлять современное продолжение этого древнего инструктажа.\u003c/p\u003e\n\u003ch2 id=\"вопрос-о-биологическом-оружии\"\u003eВопрос о биологическом оружии\u003c/h2\u003e\n\u003ch3 id=\"двойной-парадокс-использования\"\u003eДвойной парадокс использования\u003c/h3\u003e\n\u003cp\u003eКаждая технология синтетической биологии по своей сути \"двойного использования\" — она может быть применена как для оборонительных, так и для наступательных целей. Тот же инструмент редактирования генов, который мог бы вылечить генетическое заболевание, может также создать целевое биологическое оружие. Тот же синтетический организм, спроектированный для очистки разливов нефти, может быть спроектирован для атаки на человеческую ткань.\u003c/p\u003e\n\u003cp\u003eDARPA признает эту реальность, но говорит все свои программы как защитные. Программа Safe Genes, например, представлена как способ защиты от rogue redактирования генов. Но разработка способности \"обратить\" редактирование генов требует сначала разработки способности развернуть это. Вы не можете построить щит без понимания меча.\u003c/p\u003e\n\u003cp\u003eОбширные исследования Карен Кингстон, опубликованные на ее Substack (karenkingston.substack.com), задокументировали, как технологии, финансируемые DARPA, были развернуты не как защитные инструменты, а как компоненты наступательных биологических систем. Платформа мРНК, система доставки липидных наночастиц и сам спайковый белок — все они имеют корни в программах исследований, финансируемых DARPA.\u003c/p\u003e\n\u003ch3 id=\"conexión-о-функциях-усиления\"\u003eConexión о функциях усиления\u003c/h3\u003e\n\u003cp\u003eВзаимосвязь DARPA с исследованиями усиления функции — преднамеренное улучшение возможностей патогенов — хорошо задокументирована. Хотя DARPA публично дистанцировалась себя от наиболее спорных экспериментов с усилением функции, ее финансирование в потоке через посредников в лабораториях, проводящих именно эту работу.\u003c/p\u003e\n\u003cp\u003eПрограмма PREEMPT (Preventing Emerging Pathogenic Threats), например, финансировала исследования того, как вирусы прыгают от животных к людям. Понимание зоонотического пролива ценно для защиты, но то же самое исследование обеспечивает дорожную карту для инженерии вируса, который может сделать это прыгать более эффективно.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/47-Nanobot_Swarms.mp4\"\u003eNanobot Swarms\u003c/a\u003e захватывает неприятную реальность само-репликирующихся, автономных биологических агентов — будь то наномасштабные машины или спроектированные организмы, эффект одинаков: развертывание систем, которые могут действовать независимо один раз выпущены в мир.\u003c/p\u003e\n\u003ch2 id=\"трансгуманистский-повестка-дня\"\u003eТрансгуманистский повестка дня\u003c/h2\u003e\n\u003ch3 id=\"слияние-солдата-и-машины\"\u003eСлияние солдата и машины\u003c/h3\u003e\n\u003cp\u003eИнтерес DARPA к синтетической биологии не ограничен внешним оружием. Значительная часть бюджета направлена на усиление человеческого боевого комбинезона — сделать солдат быстрее, сильнее, более устойчивым и менее человеческим.\u003c/p\u003e\n\u003cp\u003eПрограммы в этой категории включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNeural Engineering System Design (NESD)\u003c/strong\u003e — разработка имплантируемых интерфейсов мозг-компьютер для солдат\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBiochronicity\u003c/strong\u003e — понимание и манипуляция человеческие биологические часы для исключения необходимости сна\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTargeted Neuroplasticity Training (TNT)\u003c/strong\u003e — использование стимуляции периферийного нерва для ускорения обучения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eElectRx\u003c/strong\u003e — разработка миниатюризированных, беспроводных устройств, которые интерфейсируются с периферийной нервной системой для регулирования телесных функций\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти программы не рассматривают человеческое тело как творение, которое должно быть уважаемо, а как платформу, которая должна быть обновлена. Солдат будущего, в видении DARPA, не полностью человеческий — он является биологической машиной, улучшенной синтетическими компонентами, контролируемой AI и соединенной с командной сетью.\u003c/p\u003e\n\u003cp\u003eТреки ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/447-Modded_Humans.mp4\"\u003eModded Humans\u003c/a\u003e и \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/339-The_New_Man.mp4\"\u003eThe New Man\u003c/a\u003e оба рассматривают этот повестка дня напрямую: создание нового вида существа, инженерного для послушания и оптимизированного для войны.\u003c/p\u003e\n\u003ch3 id=\"конец-информированного-согласия\"\u003eКонец информированного согласия\u003c/h3\u003e\n\u003cp\u003eКогда биологические технологии развиваются под военной классификацией, информированное согласие становится невозможным. Солдат может быть требуется принять улучшения как условие обслуживания. Гражданские лица могут быть подвергнуты воздействию синтетических биологических агентов через развертывание окружающей среды — рассмотрим программу Insect Allies — без знания или согласия.\u003c/p\u003e\n\u003cp\u003eЭто не гипотетический. История биологических экспериментов U.S. military на неосведомленных предметах обширна и задокументирована, от экспериментов с сифилисом Tuskegee к Operation Sea-Spray, когда Navy распыляла биологические агенты над Сан-Франциско для проверки моделей распределения.\u003c/p\u003e\n\u003ch2 id=\"профетическое-измерение\"\u003eПрофетическое измерение\u003c/h2\u003e\n\u003ch3 id=\"технология-в-конце-времен\"\u003eТехнология в конце времен\u003c/h3\u003e\n\u003cp\u003eПисание предупреждает о периоде, когда возможности системы Антихриста будут включать власть над человеческими телами и биологией. Откровение 13:16-17 описывает метку, помещенную \"в\" правую руку или лоб, которая контролирует экономическое участие. Откровение 16:2 описывает \"шумное и тяжелое ранение\", которое падает на тех, кто имеет метку. Эти описания предполагают биологический компонент системы зверя — не просто внешней метки, а внутренней модификации, которая изменяет тело.\u003c/p\u003e\n\u003cp\u003eПрограммы синтетической биологии DARPA обеспечивают технологическую основу для такой системы. Спроектированные организмы, системы доставки наномасштаба, интерфейсы мозг-компьютер и инструменты редактирования генов — вместе они представляют инфраструктуру для системы биологического контроля, которую предыдущие поколения не могли представить.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/497-Tribulation_Tech.mp4\"\u003eTribulation Tech\u003c/a\u003e делает эту связь явной: технологии, разрабатываемые сегодня, являются инструментами завтрашней скорби.\u003c/p\u003e\n\u003ch3 id=\"the-dome-и-обман\"\u003eThe Dome и обман\u003c/h3\u003e\n\u003cp\u003eСогласно Бытию 1, Бог устанавливал твердь — твердый простор — над землей, разделяя воды выше от вод ниже. Этот купол, эта граница, представляет не просто физическую структуру, а божественный порядок. Сущности, заключенные под этим куполом — падшие — исторически общались запретным знанием человечеству через оккультные каналы. Взрыв знания синтетической биологии в последние два десятилетия зеркалирует внезапный приток запретного знания, описанного в Книге Еноха.\u003c/p\u003e\n\u003cp\u003eТехнология инженерии жизни не была открыта посредством медленного, естественного научного прогресса. Он прибыл внезапно, экспоненциально и подозрительно — как будто загружено из источника вне обычной человеческой способности.\u003c/p\u003e\n\u003ch2 id=\"что-раскрывает-бюджет\"\u003eЧто раскрывает бюджет\u003c/h2\u003e\n\u003ch3 id=\"следуйте-за-деньгами\"\u003eСледуйте за деньгами\u003c/h3\u003e\n\u003cp\u003eЦифра в 4,1 миллиарда долларов ошеломляет, но она вероятно представляет только дробь общих расходов. Бюджет классификации DARPA — \"черный бюджет\" — не подлежит государственному надзору. Программы, считавшиеся слишком чувствительными для государственного раскрытия, получают финансирование через каналы, невидимые для Конгресса и американского народа.\u003c/p\u003e\n\u003cp\u003eКогда U.S. military выделяет больше денег на инженерию жизни, чем много наций тратят на всю защиту, приоритеты понятны. Биология — это новое поле боя. Человеческое тело — это новая территория, которая должна быть завоевана. И инструменты, разрабатываемые, не будут оставаться в военных руках — они будут в конечном итоге развернуты на гражданских популяциях, как и каждая большая военная технология, в конечном итоге, является.\u003c/p\u003e\n\u003ch3 id=\"коммерческий-трубопровод\"\u003eКоммерческий трубопровод\u003c/h3\u003e\n\u003cp\u003eDARPA не держит свои технологии в доме. Это разрабатывает их и передает коммерческим партнерам для массового производства и развертывания. Платформа мРНК является самым ясным примером: разработана с финансированием DARPA через программы, как P3, затем передана фармацевтическим компаниям для глобального развертывания во время COVID-19.\u003c/p\u003e\n\u003cp\u003eТот же трубопровод существует для каждой другой технологии синтетической биологии в портфеле DARPA. Сегодняшнее секретное военное исследование — это завтрашний потребительский продукт — или обязательное медицинское вмешательство.\u003c/p\u003e\n\u003ch2 id=\"христианский-ответ\"\u003eХристианский ответ\u003c/h2\u003e\n\u003ch3 id=\"разборчивость-и-сопротивление\"\u003eРазборчивость и сопротивление\u003c/h3\u003e\n\u003cp\u003eВерующим призвано быть \"мудрыми как змеи и чистыми как голуби\" (Матфей 10:16). Это означает понимание этих технологий — не игнорирование их — при отказе участвовать в системах, которые нарушают божественный дизайн человеческой биологии.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/13-The_Word_of_God.mp4\"\u003eThe Word of God\u003c/a\u003e напоминает нам, что слово Бога является высшей властью, не провозглашениями военных агентств или инновациями синтетических биологов. Когда человеческая технология противодействует божественному дизайну, верующей приверженность понятна.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлуша a-nanoparticle-sars2/?lang=ru\"\u003eChina Needed mRNA Nanoparticle Technology to Create SARS-2\u003c/a\u003e — Связь биологического оружия с синтетической биологией\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/covid-act-war-against-humanity/?lang=ru\"\u003eCOVID-19: An Act of War Against Humanity Based on Scientific Fraud\u003c/a\u003e — Как технологии, финансируемые DARPA, были развернуты во всем мире\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eКогда Министерство обороны тратит 4,1 миллиарда долларов, чтобы узнать, как инженерия жизни, это не инвестирует в здравоохранение или сельское хозяйство или очистку окружающей среды. Это инвестирует в власть — власть переделать человеческое существо, власть создавать организмы, которые служат военным целям, власть пересечь границы, которые сам Бог установил при создании. Бюджет рассказывает историю, которую пресс-релизы никогда не будут. И история такова: U.S. military строит биологическую инфраструктуру для мира, в котором человеческие существа больше не сделаны в образе Бога, а в образе их инженеров. Те, у которых есть уши для слушания, пусть они слушают.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/technology/\",\"className\":\"category-badge\",\"children\":\"technology\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Бюджет синтетической биологии DARPA в размере 4,1 млрд долларов: инженерия жизни как оружие\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"
