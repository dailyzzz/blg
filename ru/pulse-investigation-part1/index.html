\u003eКаждое крупное событие в современной истории имеет две истории: официальный нарратив и истину. Официальный нарратив доставляется в течение часов, повторяется бесконечно СМИ и укрепляется в принятой факте до любого истинного расследования происходит. Истина требует дольше - годы, иногда десятилетия - потому что она должна быть извлечена из подавленных документов, молчаливых свидетелей и институциональном сопротивлении. Событие ночного клуба PULSE 12 июня 2016 года не исключение.\u003c/p\u003e\n\u003cp\u003eNDE Говарда Питтмана выявило, что духовный царств работает через системы обмана. Три неба. Демонической иерархия. 97,5 процентов отказа. 95 процентов самообслуживания. Каждое слово судится (Матфей 12:36-37). Система СМИ, которая доставляет официальные нарративы, работает в этой обманчивой иерархии. Власти и силы Ефесян 6:12 используют события СМИ для формирования общественного сознания, производства согласия для политики изменения и подавления вопросов, которые выявили бы истину.\u003c/p\u003e\n\u003cp\u003eИезуиты - военная организация Лойолы, \"абсолютная власть\" Наполеона, Тамбурини правил \"всем миром\" - исторически использовали драматические события для продвижения институциональных повесток дня. \u003cem\u003eCatholic Confidential\u003c/em\u003e выявляет инфильтрацию \"скрытую хитростью\", слепое послушание, \"каждый вид порока\". Образец производимых событий, сопровождаемых предготовленными ответами политики, является иезуитской специальностью - проблема, реакция, решение - уточненного в течение столетий и развёрнутого с увеличивающейся утончённостью в современном СМИ возраста.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"официальная-история\"\u003eОфициальная история\u003c/h2\u003e\n\u003ch3 id=\"что-вам-было-рассказано\"\u003eЧто вам было рассказано\u003c/h3\u003e\n\u003cp\u003eОфициальный нарратив говорит, что 12 июня 2016 года одного стрелка входил в ночной клуб Pulse в Орландо, Флорида, во время Латинской ночи и открывал огонь, убивая 49 людей и ранив 53 других до быть убитого полицией примерно три часа позже. Нападающий был определён как Омар Матин, 29-летний охранник, который был исследован FBI дважды до атаки.\u003c/p\u003e\n\u003cp\u003eЭтот нарратив был установлен в течение часов события. В течение дней он был укреплён в принятый факт. В течение недель он был используемый для продвижения законодательства контроля оружия, расширения надзора и политики контр-терроризма. В течение месяцев он был мемориализирован как самое смертоносное массовое расстреливание в американской истории в то время.\u003c/p\u003e\n\u003cp\u003eСкорость нарратива установления сама по себе подозрительна. Истинные расследования требуют времени. Комиссия Warren требовала десяти месяцев. 9/11 комиссия требовала двадцати. Однако нарратив PULSE был завершён до трупов были идентифицированы.\u003c/p\u003e\n\u003ch3 id=\"вопросы-никто-не-задал\"\u003eВопросы никто не задал\u003c/h3\u003e\n\u003cp\u003eAgent131711 задокументирует на Substack (agent131711.substack.com) вопросы, которые СМИ отказались задать:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПочему человек, исследованный дважды FBI для потенциальных связей террориста, был всё ещё способен покупать оружие и поддерживать разрешение безопасности?\u003c/li\u003e\n\u003cli\u003eПочему это требовало трёх часов полиции войти в здание?\u003c/li\u003e\n\u003cli\u003eПочему выжившие сообщали о множественных стрелках в немедленном последствии, до одного-стрелка нарратив был установлен?\u003c/li\u003e\n\u003cli\u003eПочему здание было снесено до независимых следователей могли исследовать физическое доказательство?\u003c/li\u003e\n\u003cli\u003eКак человек достиг сообщённого подсчёта потерь в сообщённом таймфрейме с сообщённым оружием?\u003c/li\u003e\n\u003cli\u003eПочему 911 вызовите транскрипции были первоначально redacted удаление ссылок на заявленные мотивы нападающего?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждый из этих вопросов имеет институциональный ответ. Ни один из институциональных ответов не удовлетворительные.\u003c/p\u003e\n\u003ch2 id=\"начало-расследования\"\u003eНачало расследования\u003c/h2\u003e\n\u003cp\u003eЭто пять-часовой расследование будет исследовать:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЧасть 1\u003c/strong\u003e (эта статья): официальный нарратив, вопросы, которые никто не задал\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧасть 2\u003c/strong\u003e: что вы никогда не видели - подавленное доказательство и свидетельство\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧасть 3\u003c/strong\u003e: неожиданные связи - институциональные связи между нападающим, индустрией безопасности и разведслужбой\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧасть 4\u003c/strong\u003e: две самые большие ошибки - ошибки, которые раскрывают истину\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧасть 5\u003c/strong\u003e: следуйте деньги - денежный путь к истине позади события\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNDE свидетельство Говарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eсмотреть на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКатолический конфиденциально\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eсмотреть на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь обманщиков\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/05-The_First_Darkness.mp4\"\u003eПервая тьма\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/73-Suppressing_Truth.mp4\"\u003eПодавление истины\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучите-дальше\"\u003eИзучите дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pulse-never-seen-part2/?lang=ru\"\u003ePULSE: что вы никогда не видели Часть 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pulse-unexpected-connections-part3/?lang=ru\"\u003eНеожиданные связи: расследование PULSE Часть 3\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eРасследование начинается. Не с ответами, но с вопросов - вопросов, которые система потратила годы на подавление.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/media/\",\"className\":\"category-badge\",\"children\":\"media\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"PULSE расследование начинается: что действительно произошло Часть 1\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Часть 1 расследования PULSE начинается. Откройте для себя скрытые факты, иезуитские связи и сатанинские образцы позади того, что действительно произошло.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-29T10:00:00Z\",\"children\":\
