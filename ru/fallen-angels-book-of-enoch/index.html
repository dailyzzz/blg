т история, которая была намеренно подавлена — удалена из церковных канонов, похоронена в запыленных архивах, отклонена как мифология. Это история Наблюдателей: ангельских существ, которые отказались от своего небесного назначения, спустились на землю и развратили человечество запрещённым знанием и запрещёнными союзами. Эта история записана в Бытии 6, упомянута в Послании Иуды, отозвана в 2 Петра, и подробно описана в Книге Еноха — тексте, который считался Писанием ранними церковными отцами, но позже был исключён из западного библейского канона.\u003c/p\u003e\n\u003cp\u003eВопрос не в том, неудобна ли эта история. Вопрос в том, правда ли это. И доказательство — из Писания, из Книги Еноха, из древних цивилизаций по всему миру и из аномалий археологического рекорда — указывает подавляющим образом на вывод, который институциональная церковь провела столетия, пытаясь избежать: падшие ангелы физически вмешались в человеческую историю, учили человечество знанию, которое никогда не было предназначено для смертных умов, и произвели гибридное потомство, которое развратило землю настолько полностью, что Бог судил весь мир потопом.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eПадшие Ангелы\u003c/a\u003e рассказывает эту историю в музыке — спуск, развращение и суд. Это история, которая освещает всё: происхождение оккультизма, источник запрещённых технологий, войны родословных Бытия и духовную тьму, которая сохраняется до сего дня.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"бытие-6-библейское-основание\"\u003eБытие 6: Библейское Основание\u003c/h2\u003e\n\u003cp\u003eКанонические Писания обеспечивают основание:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И случилось, когда люди начали умножаться на земле и родились у них дочери, Что сыны Божии увидели дочерей человеческих, что они красивы, и брали себе в жёны, кого выбирали.\" — Бытие 6:1-2\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"В то время были на земле исполины, особенно же со времени, когда сыны Божии стали входить к дочерям человеческим, и они рождали им: это были сильные люди, издревле славные люди.\" — Бытие 6:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eФраза \"сыны Божии\" — \u003cem\u003eбене элохим\u003c/em\u003e на иврите — появляется в Ветхом Завете исключительно в ссылке на ангельские существа. В Иова 1:6, 2:1 и 38:7 \"сыны Божии\" явно ангелы, которые представляют себя перед тронов Бога. Септуагинта (греческий перевод еврейской Библии, используемый ранней церковью) переводит \u003cem\u003eбене элохим\u003c/em\u003e как \u003cem\u003eангелои ту теу\u003c/em\u003e — \"ангелы Бога\" — в Бытии 6.\u003c/p\u003e\n\u003cp\u003eРанние церковные отцы — Джастин Мученик, Ириней, Клемент Александрийский, Тертуллиан, Лактанций и другие — единогласно интерпретировали Бытие 6 как описание ангельских существ, которые взяли человеческих жён. Это была доминирующая интерпретация в течение первых трёх столетий христианства. Альтернативная \"сифитская\" интерпретация — что \"сыны Божии\" относится к благочестивой линии Сифа — не возникла до Августина в 4-м столетии, и она была мотивирована философическим дискомфортом с последствиями ангельской интерпретации, а не текстуальными доказательствами.\u003c/p\u003e\n\u003cp\u003eНовый Завет подтверждает ангельскую интерпретацию. Иуда 6-7 описывает ангелов, которые \"не сохранили своего достоинства\" и сравнивает их грех с Содомом и Гоморрой — \"предавшись блуду и пошедшие в странный огонь.\" Греческая фраза \u003cem\u003eсаркос гетерас\u003c/em\u003e — \"различная плоть\" — относится к половым отношениям между существами различной природы. Ангелы преследовали человеческую плоть. Содом преследовал ангельскую плоть (Бытие 19). Оба были осуждены за ту же категорию греха: пересечение границы между небесным и земным.\u003c/p\u003e\n\u003cp\u003e2 Петра 2:4-5 помещает грех ангелов в прямое соединение с Потопом: \"Ибо если Бог ангелов, согрешивших, не пощадил, но, связав их узами адова мрака, предал их для суда на хранение; и если не пощадил первого мира, но в восьми лицах сохранил Ноя, проповедника правды, — то ясно, что Он знает, как спасать благочестивых в день испытания и нечестивых оставлять для наказания в день судный.\"\u003c/p\u003e\n\u003cp\u003eПоследовательность явна: ангелы согрешили, Бог их заключил, и Бог потопил мир. Ангельский грех и Потоп причинно связаны.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"книга-еноха-подробный-рассказ\"\u003eКнига Еноха: Подробный Рассказ\u003c/h2\u003e\n\u003cp\u003eКнига 1 Еноха расширяет рассказ Бытия 6 с чрезвычайной детальностью. Написанная на арамейском, фрагменты которой были найдены среди свитков Мёртвого моря в Кумране (датируемые 3-м столетием до нашей эры), Книга Еноха была широко прочитана и уважаема во втором храме иудаизма и ранней христианской церковью. Иуда прямо цитирует 1 Еноха 1:9 в Иуде 14-15 — рассматривая это как пророческое Писание.\u003c/p\u003e\n\u003cp\u003eРелевантные разделы — Книга Наблюдателей (главы 1-36) — описывают следующее:\u003c/p\u003e\n\u003ch3 id=\"спуск\"\u003eСпуск\u003c/h3\u003e\n\u003cp\u003eДвести ангелов, возглавляемых главой по имени Семьяза (также Шемихаза), дали клятву на горе Ермон спуститься на землю и взять человеческих жён. Имя \"Ермон\" связано с еврейским словом \u003cem\u003eгерем\u003c/em\u003e — значит \"посвящён разрушению\" или \"проклят.\" Ангелы связали себя взаимными клятвами, зная, что их действия будут приносить суд.\u003c/p\u003e\n\u003cp\u003eДругие названные лидеры включают Azazel, Araqiel, Rameel, Kokabiel, Tamiel, Asael, Baraqiel и других — каждый связан со специфическими развращениями, которые они ввели человечеству.\u003c/p\u003e\n\u003ch3 id=\"запрещённое-знание\"\u003eЗапрещённое Знание\u003c/h3\u003e\n\u003cp\u003eНаблюдатели не просто взяли жён. Они учили человечество знанию, которое никогда не было предназначено для смертных существ:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eAzazel\u003c/strong\u003e учил металлургии — изготовлению мечей, ножей, щитов и нагрудников (оружие войны) и также искусству изготовления браслетов, украшений и косметики (тщеславие и обольщение). \"И произошло много нечестия, и они совершали прелюбодеяние, и они были введены в заблуждение, и стали развратными во всех своих путях\" (1 Енох 8:2).\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eСемьяза\u003c/strong\u003e учил заклинаниям и срезанию корней — колдовству и фармакологии. Соединение между падшей ангельской инструкцией и \u003cem\u003eфармакея\u003c/em\u003e (колдовство через наркотики) прямое и основоположное.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eAraqiel\u003c/strong\u003e учил знакам земли (геомантия, земная дивинация).\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eKokabiel\u003c/strong\u003e учил созвездиям — не астрономии как наблюдению, но астрологии как дивинации, оккультному чтению звёзд для определения судьбы и руководства решениями помимо Бога.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eTamiel\u003c/strong\u003e учил астрономии, смешанной с астральной религией.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eBaraqiel\u003c/strong\u003e учил астрологии конкретно.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eAsael\u003c/strong\u003e учил искусству обмана.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждая основная категория оккультного знания — колдовство, дивинация, астрология, заклинание, производство оружия, косметическое обольщение и манипуляция фармакологией — отслеживается в Енохе прямой к инструкции падших ангелов. Оккультизм — это не человеческое изобретение. Это учебный план — учит существами, которые имели доступ к небесному знанию и использовали его, чтобы развратить землю.\u003c/p\u003e\n\u003ch3 id=\"потомство\"\u003eПотомство\u003c/h3\u003e\n\u003cp\u003eСоюзы между Наблюдателями и человеческими женами произвели Нефилимов — гибридные существа, описанные в Бытии 6:4 как \"исполины\" и \"сильные люди старины, люди славные.\" Как исследовано в \u003ca href=\"/nephilim-return-giants-genesis/?lang=ru\"\u003eВозвращение Нефилимов: Исполины Бытия и современная Эра\u003c/a\u003e, эти существа были не просто большими. Они были чудовищными — потребляя производство человечества, затем потребляя человечество само, и наконец потребляя друг друга.\u003c/p\u003e\n\u003cp\u003e1 Енох 7:3-5 описывает прогрессию: \"И женщины, зачав, рождали исполинов, рост которых был в триста локтей. Они пожирали всё добытое людьми. И когда люди более уже не могли прокормить их, исполины восстали на людей и стали пожирать их. И они начали грешить против птиц и зверей, и пресмыкающихся, и рыб, и пожирали друг друга's плоть, и пили кровь.\"\u003c/p\u003e\n\u003cp\u003eРазвращение было не ограничено генетикой. Это была экологическая, моральная и духовная. Весь допотопный мир был потребляем последствиями ангельского вторжения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"суд-цепи-мрака\"\u003eСуд: Цепи Мрака\u003c/h2\u003e\n\u003cp\u003eОтвет Бога на восстание Наблюдателей был суровым и специфическим:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eК Azazel\u003c/strong\u003e (1 Енох 10:4-6): \"Свяжи Azazel руки и ноги, и низринь его во мрак: и сделай отверстие в пустыне, которая в Dudael, и низринь его туда. И положи на него грубые и зубчатые камни, и покрой его мраком, и пусть остаётся там навсегда, и покрой его лицо, чтобы он не видел света.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eК Семьяза и другим лидерам\u003c/strong\u003e (1 Енох 10:11-12): \"Иди, свяжи Семьязу и его товарищей, которые соединились с женами, чтобы осквернить себя со всеми их нечистотами. И когда их сыновья истребят друг друга, и они увидят разрушение своих любимых, свяжи их крепко на семьдесят поколений в долинах земли, до дня их суда и их совершения.\"\u003c/p\u003e\n\u003cp\u003eЗаключённые Наблюдатели содержатся до окончательного суда. Они ангелы в \"вечных цепях во мраке,\" описанные в Иуде 6, и ангелы в \"цепях мрака,\" описанные в 2 Петра 2:4. Их тюремное заключение временно — они зарезервированы для суда в конце возраста, когда они столкнутся со своим окончательным приговором.\u003c/p\u003e\n\u003cp\u003eПотоп последовал — разрушая развратный мир, устраняя Нефилимов с поверхности земли и спасая семью Ноя. Бытие 6:9 описывает Ноя как \"совершенного в своих поколениях\" — еврейское слово \u003cem\u003eтамим\u003c/em\u003e означает \"полный, целый, без пятна.\" Многие учёные интерпретируют это как указание, что генеалогия Ноя была неразвращена Нефилимским родословными — он был генетически чист в своей линии от Адама.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"почему-книга-еноха-была-подавлена\"\u003eПочему Книга Еноха Была Подавлена\u003c/h2\u003e\n\u003cp\u003eЕсли Книга Еноха была цитирована как Писание Иудой, признана ранними церковными отцами, сохранена среди свитков Мёртвого моря и предоставляет существенный контекст для понимания Бытия 6, 2 Петра и Иуды — почему она была исключена из западного канона?\u003c/p\u003e\n\u003cp\u003eПодавление произошло постепенно. Когда христианство стало государственной религией Рима под Константином и его преемниками, богословская установа стала всё более неудовлетворённой последствиями литературы Еноха:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eАнгельская интерпретация оспорила греко-римскую философию.\u003c/strong\u003e Августин и более поздние богословы были влияны неоплатонической философией, которая утверждала, что духовные существа не могли взаимодействовать физически с материальным миром. Идея ангелов, принимающих физическую форму и производящих потомство, была философически оскорбительна греко-влияниям богословской установе.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eУчение Наблюдателей о запрещённом знании оспорило церковную власть.\u003c/strong\u003e Если оккультизм происходил из падшей ангельской инструкции, то церковь должна была примириться с фактом, что большая часть её собственного принятого знания — от греческой философии к римским структурам управления — может отследить назад к тому же развращенному источнику.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПовествование Нефилимов оспорило постпотопный порядок.\u003c/strong\u003e Если исполины существовали до Потопа и (как Бытие 6:4 утверждает) \"также после того,\" то Нефилимское родословная выжила Потоп — поднимая вопросы о чистоте постпотопных цивилизаций, которая институциональная церковь не была подготовлена адресовать.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭфиопская Православная Церковь сохранила Книгу Еноха как канонические Писания во всей её истории. Это из эфиопского манускрипта, что текст был переинтродуцирован западному миру в 18-м столетии. Открытия свитков Мёртвого моря в 20-м столетии подтвердили, что эфиопский текст был верен древнему арамейскому оригиналу.\u003c/p\u003e\n\u003cp\u003eПодавление Еноха не сделало его содержание ложным. Это сделало его содержание опасным — опасным для институциональных повествований, которые зависят от сохранения полной картины скрытой. Как исследовано в \u003ca href=\"/tower-of-babel-two-rebuilding/?lang=ru\"\u003eБашня Вавилона 2.0: Восстановление Врата на Небо\u003c/a\u003e, паттерн запрещённого знания и амбиции достичь небо никогда не остановился. Это только изменило свой словарь.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"наследие-наблюдателей\"\u003eНаследие Наблюдателей\u003c/h2\u003e\n\u003cp\u003eЗапрещённое знание, учимое Наблюдателями, не исчезло с Потопом. Оно было сохранено — через устную традицию, через потомков Хама, через школы тайны Вавилона, Египта, Греции и Рима, и через эзотерические традиции, которые сохранились к настоящему дню.\u003c/p\u003e\n\u003cp\u003eРассмотрите параллели:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eМеталлургия и оружие\u003c/strong\u003e — учение Azazel. Оружейная промышленность — самая прибыльная промышленность в человеческой истории, и каждая война ведётся с наследием этой запрещённой инструкции.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eКолдовство и фармакея\u003c/strong\u003e — учение Семьязы. Фармацевтическая промышленность — \u003cem\u003eфармакея\u003c/em\u003e по-гречески — является прямым лингвистическим и духовным потомком колдовства, учимого Наблюдателями. Слово не изменилось. Практика не изменилась. Только упаковка изменилась.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eАстрология и дивинация\u003c/strong\u003e — учение Kokabiel и Baraqiel. Астрология остаётся одной из наиболее широко практикуемых оккультных искусств на земле, с гороскопами потребляемыми сотнями миллионов ежедневно. Инструкция Наблюдателей в чтении звёзд для скрытого знания сохраняется неизменённой после тысячелетий.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eКосметика и обольщение\u003c/strong\u003e — учение Azazel. Глобальная индустрия красоты генерирует свыше 500 миллиардов долларов ежегодно. Искусства физического украшения и сексуального соблазна, которые учил Azazel, остаются краеугольными камнями современной культуры.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЗаклинание и манипуляция\u003c/strong\u003e — более широкая категория психологической и духовной манипуляции, учимой Наблюдателями, видна в современной рекламе, пропаганде, исследованиях контроля ума (MKUltra, Monarch) и умышленном использовании оккультной символики развлекательной промышленностью.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНаблюдатели в цепях. Их учения нет. Знание, которое они выпустили в человеческую сферу, размножилось, эволюционировало и распространилось в каждое поколение. Оккультизм — от вавилонских мистериальных религий к египетским жречествам к греческим школам тайны к римскому Миснраизму к средневековой алхимии к франкмасонству к современной Новой Эры духовности — отслеживает его родословную на гору Ермон, где двести ангелов поклялись клятвой развратить землю.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"современное-возрождение\"\u003eСовременное Возрождение\u003c/h2\u003e\n\u003cp\u003eКнига Еноха испытала драматическое возрождение интереса в 21-м столетии. Это не случайность. Как конец возраста приближается, запечатанное знание отпечатывается. Даниил 12:4 пророчил: \"но ты, Даниил, сокрой слова сии и запечатай книгу сию до времени конца; многие будут ходить туда и сюда, и умножится ведение.\"\u003c/p\u003e\n\u003cp\u003eЗапрещённая история Наблюдателей релевантна сегодня, потому что паттерн повторяется. Как исследовано в \u003ca href=\"/ye-shall-be-as-gods-transhumanism/?lang=ru\"\u003eВы Будете как Боги: Древняя Ложь Позади Трансгуманизма\u003c/a\u003e, то же обещание, которое сделали Наблюдатели — \"мы будем дать вам знание, которое делает вас как божество\" — делается сегодня через трансгуманизм, генетическую инженерию и искусственный интеллект. То же запрещённые категории знания — манипуляция генетики, улучшение тела за пределами его созданного дизайна, слияние человека с не-человеком — преследуются с триллионами долларов финансирования и энтузиастической поддержкой мира's самых мощных учреждений.\u003c/p\u003e\n\u003cp\u003eНаблюдатели учили человечество пересекать границы, которые Бог установил. Сегодня's учёные, технологи и трансгуманисты делают то же самое — пересекая генетические границы, пересекая видовые границы, пересекая границу между биологическим и цифровым, пересекая границу между человеком и машиной. Словарь различен. Амбиция идентична. И суд будет том же.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"связанный-до-окончательного-дня\"\u003eСвязанный до Окончательного Дня\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И видел я Ангела, сходящего с неба, который имел ключ бездны и большую цепь в руке своей. Он взял дракона, старого змия, который есть диавол и сатана, и связал его на тысячу лет.\" — Откровение 20:1-2\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНаблюдатели в цепях ждут суда. Их лидер — змей, дракон — всё ещё активен, всё ещё работает через человеческих агентов, всё ещё учит запрещённое знание через современные каналы. Но его время измерено. Том же Бог, который связал Наблюдателей, свяжет их хозяина. Цепи, которые держат падших ангелов во мраке, будут держать Сатану сам.\u003c/p\u003e\n\u003cp\u003eКнига Еноха — запрещённая история — но это не забытая история. Это ключ к пониманию, почему мир до Потопа был разрушен, почему оккультизм сохраняется, почему запрещённое знание продолжает появляться и почему окончательный суд необходим. Наблюдатели открыли дверь. Они учили человечество восстать против Создателя через собственное украденное знание Создателя. И дверь, которую они открыли, никогда не была полностью закрыта — она будет закрыта только, когда Тот, кто держит все ключи, закроет её навсегда.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство Ближневосточного Опыта Говарда Питтмана — Предупреждение об Окончании Времён, Которое Дал Ему Бог\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические Секреты: Раскрытые Отвратительные Тайны Иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМёртвые Клиники и Фармакея — Колдовство Современной Медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто Может Быть в Подвале Ватикана Может Вас Шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте Во Время Чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/489-Nephilim_Nanobots.mp4\"\u003eНефилимские Нанороботы\u003c/a\u003e — Древний паттерн запрещённого знания\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте Дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/nephilim-return-giants-genesis/?lang=ru\"\u003eВозвращение Нефилимов: Исполины Бытия и современная Эра\u003c/a\u003e — Гибридное потомство Наблюдателей и их современные параллели\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/tower-of-babel-two-rebuilding/?lang=ru\"\u003eБашня Вавилона 2.0: Восстановление Врата на Небо\u003c/a\u003e — Постпотопное продолжение восстания Наблюдателей\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eДвести ангелов спустились на гору Ермон и поклялись клятвой развратить землю. Они учили человечество колдовству, оружию, астрологии, заклинанию и генетической манипуляции. Они взяли человеческих жён и произвели чудовищное потомство. Они были судимы — связаны в цепях мрака до окончательного дня. Но их учения выжили. Оккультизм, фармакея, оружие войны, генетическая манипуляция, запрещённое знание — всё это отслеживается назад на Ермон, на клятву, на восстание. Наблюдатели в цепях. Их учебный план всё ещё учится. И том же Бог, кто судил ангелов, которые оставили свой первый сан, будет судить каждого человека, кто следует их пути. Книга Еноха была подавлена, потому что истина, которую она содержит, слишком опасна для тех, кто прибыльности от наследия Наблюдателей. Но истина не требует разрешения быть истинной. Это требует только быть сказанной.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Падшие Ангелы и Книга Еноха: Запрещённая История\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Наблюдатели, Книга Еноха и падшие ангелы, которые учили запрещённому знанию человечества. Эта подавленная история объясняет происхождение оккультизма, коррупцию человеческих родословных и духовную войну, которая бушует по сей день.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-01-29T10:00:00Z\",\"children\":\"29 января 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"fallen-angels\",{\"href\":\"/ru/tag/fallen-angels/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"fallen-angels\"]}],[\"$\",\"a\",\"enoch\",{\"href\":\"/ru/tag/enoch/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"enoch\"]}],[\"$\",\"a\",\"watchers\",{\"href\":\"/ru/tag/watchers/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"watchers\"]}],[\"$\",\"a\",\"nephi
