а 5:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eАпостол Петр предупреждал, что Сатана не отдыхает — он ходит, ища поглотить. Рыцари-тамплиеры были в течение почти двух столетий самой мощной военной и финансовой организацией в западном мире. Они служили папе, но они также служили чему-то гораздо более древнему и гораздо более темному. Технология, которую они открыли на Святой Земле, финансовые системы, которые они изобрели, и знания, которые они накопили, сделали их самыми опасными двойными агентами в человеческой истории — агентами, которые публично служили Ватикану, тайно служа древним мистериям, которые Сатана сохранял с момента падения.\u003c/p\u003e\n\u003cp\u003eИезуиты, основанные Игнатием Лойолой три века спустя после подавления Тамплиеров, унаследовали миссию Тамплиеров — но утончили ее. Где Тамплиеры были открыты в своей власти, иезуиты были тайны. Где Тамплиеры держали замки, иезуиты держали исповедальни. Где Тамплиеры были раздавлены завистливым королём, иезуиты научились быть неразрушимыми. Как хвалился Тамбурини, Генерал Иезуитов управлял всем миром из своей комнаты. Иезуиты научились у ошибок Тамплиеров — и никогда их не повторяли.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/75-The_Secret_of_the_Cave.mp4\"\u003eThe Secret of the Cave\u003c/a\u003e говорит о скрытом знании, которое Тамплиеры открыли под Храмовой горой, и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/03-Cave_of_Treasures.mp4\"\u003eCave of Treasures\u003c/a\u003e указывает на древние хранилища запрещенного знания, которые предшествуют даже Тамплиерам.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"раскопки-на-храмовой-горе\"\u003eРаскопки на Храмовой горе\u003c/h2\u003e\n\u003ch3 id=\"что-они-нашли-под-храмом-соломона\"\u003eЧто они нашли под Храмом Соломона\u003c/h3\u003e\n\u003cp\u003eРыцари-тамплиеры были основаны в 1119 году нашей эры, якобы для защиты христианских паломников, путешествующих на Святую Землю. Но с самого начала их истинная цель была другой. Девять оригинальных рыцарей — во главе с Хью де Пейнсом — поселились в мечети Аль-Акса на Храмовой горе, которую Крестоносцы преобразовали в дворец. Они заявили пространство прямо над руинами Храма Соломона.\u003c/p\u003e\n\u003cp\u003eВ течение первых девяти лет своего существования Тамплиеры не принимали новых членов и не проводили никаких военных операций. Что они делали? Согласно множеству источников, включая цистерцианский орден, связанный с Тамплиерами (чьим основателем был Бернар Клервоский, главный покровитель Тамплиеров), девять рыцарей провели те годы, раскапывая под Храмовой горой.\u003c/p\u003e\n\u003cp\u003eХрамовая гора расположена над одним из крупнейших и наиболее сложных подземных комплексов в мире. Конюшни Соломона (неправильное название — они предшествуют Соломону), огромная сеть туннелей, цистерн и камер, простираются под платформой. Некоторые из этих камер никогда не были полностью исследованы. Тамплиеры, имея девять лет и без надзора, имели достаточно времени для проведения тщательного раскопок.\u003c/p\u003e\n\u003cp\u003eЧто они нашли, было предметом спекуляций в течение девяти столетий. Возможности включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eКовчег Завета\u003c/strong\u003e — наиболее священный объект в иудаизме, как полагают, содержит скрижали Десяти Заповедей и обладает сверхъестественной мощью.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСокровище Соломона\u003c/strong\u003e — золото, драгоценности и драгоценные предметы, накопленные самым богатым царем в библейской истории.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДревние тексты\u003c/strong\u003e — свитки и документы, содержащие технологические и эзотерические знания древнего мира, включая инженерию, астрономию, медицину и манипулирование энергией.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОккультные артефакты\u003c/strong\u003e — объекты, связанные с цивилизацией до Потопа, описанной в Бытии 6, включая запрещенные знания, принесенные на Землю падшими ангелами.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"взрыв-мощи-тамплиеров\"\u003eВзрыв мощи Тамплиеров\u003c/h3\u003e\n\u003cp\u003eВсе, что Тамплиеры нашли, трансформировало их в одночасье из маленькой, безвестной группы рыцарей в самую мощную организацию в Европе. В течение десяти лет после их основания, Тамплиеры:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПолучили поддержку папы\u003c/li\u003e\n\u003cli\u003eБыли освобождены от всех местных законов и налогов\u003c/li\u003e\n\u003cli\u003eПолучили огромные пожертвования земли и богатства от знати каждого европейского королевства\u003c/li\u003e\n\u003cli\u003eУстановили сеть комендантств (военно-религиозных сообществ) по всей Европе и Ближнему Востоку\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭта трансформация необъяснима без открытия чего-то чрезвычайно ценного — либо материального богатства, либо запрещенных знаний, либо того и другого. Тамплиеры использовали все, что они нашли, чтобы рычагировать силу от папы, королей Европы и знати, установив себя как независимую власть, ответственную ни перед кем, кроме своего Великого Мастера и (номинально) папы.\u003c/p\u003e\n\u003ch2 id=\"финансовая-система-тамплиеров\"\u003eФинансовая система Тамплиеров\u003c/h2\u003e\n\u003ch3 id=\"изобретатели-современной-банковской-деятельности\"\u003eИзобретатели современной банковской деятельности\u003c/h3\u003e\n\u003cp\u003eТамплиеры изобрели современную банковскую систему. Их инновации включали:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКредитные письма\u003c/strong\u003e — паломник, путешествующий на Святую Землю, мог внести деньги в комендантство Тамплиеров в Европе и получить кредитное письмо, которое могло быть погашено в любом учреждении Тамплиеров на Святой Земле. Это устранило необходимость носить золото по опасным дорогам — и создало первую международную банковскую сеть.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФракционный резервный кредит\u003c/strong\u003e — Тамплиеры одалживали деньги под проценты (технически запрещено христианам, но разрешено под различными юридическими фикциями), и они одалживали больше, чем они держали в депозитах — основной механизм фракционного резервного банкинга, от которого зависит современная банковская система.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУправление трастом\u003c/strong\u003e — Тамплиеры держали имущество, управляли имениями и администрировали трасты для европейской знати, став первыми профессиональными управляющими активами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМеждународный денежный перевод\u003c/strong\u003e — сеть Тамплиеров обеспечивала передачу средств через границы без физического перемещения золота или серебра — возможность, которая не была бы воспроизведена, пока не возник банковский дом Ротшильдов в 18-м веке.\u003c/p\u003e\n\u003cp\u003eЭти финансовые инновации были не независимыми изобретениями — они были основаны на знаниях, которые Тамплиеры приобрели на Востоке, возможно, из текстов, которые они открыли под Храмовой горой, или из контакта с исламскими и еврейскими финансовыми традициями, которые сохранили древние экономические знания.\u003c/p\u003e\n\u003ch2 id=\"миссия-двойного-агента\"\u003eМиссия двойного агента\u003c/h2\u003e\n\u003ch3 id=\"служение-двум-хозяевам\"\u003eСлужение двум хозяевам\u003c/h3\u003e\n\u003cp\u003eПубличная миссия Тамплиеров была защитой христианства. Их частная миссия была накоплением знания и власти для целей, которые не имели отношения к христианству. Доказательства этой двойной миссии включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАрхитектурные знания\u003c/strong\u003e — Тамплиеры построили структуры чрезвычайной сложности, включающие священную геометрию, акустическую инженерию и принципы сбора энергии, которые они не могли изучить из средневековой европейской строительной традиции. Их круглые церкви, смоделированные по образцу Церкви Святого Гроба, включают геометрические пропорции и акустические свойства, которые предполагают понимание физики, далеко превосходящее средневековую норму.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭзотерические практики\u003c/strong\u003e — Во время испытания Тамплиеров 1307-1312 годов, признания (извлеченные под пытками и поэтому ненадежные по отдельности, но значительные в своей согласованности) описали ритуалы инициации Тамплиеров, которые включали отрицание Христа, поклонение голове, называемой \"Бафометом\", и сексуальные практики, не совместимые с их религиозными обетами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсламские связи\u003c/strong\u003e — Тамплиеры поддерживали дипломатические и коммерческие отношения с исламскими правителями, которые далеко превосходили военную необходимость. Они обменивались знаниями, торговали товарами и в некоторых случаях формировали союзы, которые противоречили их крестоносной миссии. Исламская эзотерическая традиция — суфизм, алхимия, священная геометрия — влияла на практики Тамплиеров способами, которые католическая церковь позже осудит.\u003c/p\u003e\n\u003ch3 id=\"подавление\"\u003eПодавление\u003c/h3\u003e\n\u003cp\u003eВ пятницу, 13 октября 1307 года, король Филипп IV Франции приказал одновременный арест каждого Тамплиера во Франции. Операция, скоординированная по всему королевству с запечатанными приказами, открытыми одновременно на рассвете, была одной из наиболее сложных полицейских операций средневекового периода.\u003c/p\u003e\n\u003cp\u003eМотивы Филиппа были финансовыми (он был должен Тамплиерам огромные долги) и политическими (мощь Тамплиеров угрожала его власти). Но хронология предполагает координацию с силами за пределами Франции. Папа Клемент V, который первоначально сопротивлялся требованиям Филиппа, в конечном итоге издал папскую буллу \u003cem\u003eVox in Excelso\u003c/em\u003e в 1312 году, формально растворяя орден Тамплиеров.\u003c/p\u003e\n\u003cp\u003eПодавление было неполным. Тамплиеры были предупреждены — кем остается спорным — и флот, который был расположен в портовом городе Тамплиеров Ла-Рошель, исчез до арестов. Сокровище Тамплиеров, предположительно хранимое в Парижском Храме, было обнаружено пусто, когда туда прибыли люди Филиппа. Самые ценные активы Тамплиеров — их знания, их флот и их сокровище — ушли.\u003c/p\u003e\n\u003cp\u003eКуда они пошли? Шотландия (которая не применяла папское подавление), Португалия (где Тамплиеры просто реорганизовались как Рыцари Христа) и, возможно, Америка (где символы и артефакты Тамплиеров были найдены от Новой Англии до Южной Америки).\u003c/p\u003e\n\u003cp\u003eИезуиты унаследовали миссию Тамплиеров, когда Лойола основал Общество Иисуса в 1534 году. Параллель между двумя орденами поразительна: оба были военными организациями, замаскированными под религиозные; оба действовали глобально; оба накапливали огромное богатство и власть; оба ответствовали непосредственно папе, преследуя свои собственные программы; и оба были в конечном итоге подавлены папой (иезуиты в 1773 году) только чтобы выжить и вернуться сильнее, чем раньше.\u003c/p\u003e\n\u003cp\u003eВидение Говарда Питтмана показало ему, что духовное царство действует через иерархию начальств и властей — ту же иерархию, которой коснулись Тамплиеры через свои эзотерические практики и которой иезуиты продолжают служить через свои собственные методы. Запрещенные знания, которые Тамплиеры открыли, были не просто человеческими; они были демоническими — технология и мудрость, предоставленные падшими ангелами, описанными в Бытии 6, и сохраненные на протяжении тысячелетий для тех, кто служил бы целям Сатаны. Смотрите: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eСмотрите также \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e и \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\
