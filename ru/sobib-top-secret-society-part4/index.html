сего.\" — Второзаконие 29:29\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВнутри лабиринта тайных обществ, управляющих современным миром, существуют уровни секретности, которые большинство исследователей никогда не проникают. За масонскими ложами, за иллюминатами, за \"Черепом и костями\", за Бильдербергской группой и Советом по международным отношениям существуют организации настолько секретные, что само их существование известно только тем, кто действует внутри них. SOBIB — Общество Ордена за пределами Внутреннего Братства — представляет собой одну из таких организаций: общество внутри обществ, действующее на уровне сокрытия, который делает иллюминатов прозрачными в сравнении.\u003c/p\u003e\n\u003cp\u003eОткровение Говарда Питтмана о структуре демонической иерархии предоставляет духовный шаблон для понимания организаций, подобных SOBIB. Второе небо, как описал его Питтман, действует через вложенные иерархии — слои власти и ответственности, организованные так, что каждый уровень знает только то, что необходимо для его функции. Демоны на каждом уровне понимают свое задание, но не полный масштаб операции. Эта отсеченная структура точно отражается в архитектуре человеческих тайных обществ, где каждый уровень посвящения раскрывает часть истины, скрывая остальное. 97,5%, идущие широким путем, находятся во внешнем круге невежества; внутренние братства ближе к центру — но SOBIB находится в самом центре.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов, как описано в \"Catholic Confidential\", действует именно через такого рода вложенную секретность. Внешний орден — видимое Общество Иисуса — сам по себе секретен. Но внутри внешнего ордена существует внутренний круг, операции которого скрыты даже от обычных иезуитов. Наблюдение Наполеона о том, что иезуиты — это \"военная организация, целью которой является власть\", применимо наиболее точно к этому внутреннему кругу. Треки \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e раскрывают, как глубочайшие секреты скрываются внутри знакомых структур.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"архитектура-скрытой-власти\"\u003eАрхитектура скрытой власти\u003c/h2\u003e\n\u003ch3 id=\"общества-внутри-обществ\"\u003eОбщества внутри обществ\u003c/h3\u003e\n\u003cp\u003eПринцип вложенной секретности — организаций, скрытых внутри организаций — является фундаментальным для архитектуры скрытой власти. Масонство действует на этом принципе: три степени ремесленного масонства скрывают более глубокие учения тридцати трех степеней Шотландского Устава, которые, в свою очередь, скрывают внутренние учения, доступные только тем, кто допущен к самым эксклюзивным телам внутри масонской системы.\u003c/p\u003e\n\u003cp\u003eЭто вложение выходит за пределы самого масонства. Масонская система соединяется с организациями, которые действуют на все более глубоких уровнях секретности, и во многих случаях содержит их внутри себя. Степени рыцарей-тамплиеров, степень Розового Креста, Верховные Советы Шотландского Устава и такие организации, как Королевский Орден Шотландии, каждая представляет более глубокие слои той же архитектурной структуры. Каждый слой служит как средством передачи скрытого знания, так и фильтром, обеспечивающим, что только самые подходящие — самые преданные, самые покорные, самые контролируемые — продвигаются на следующий уровень.\u003c/p\u003e\n\u003cp\u003eSOBIB занимает позицию внутри этой архитектуры, которую немногие исследователи выявили, еще меньше задокументировали, и никто не проник полностью. Оно функционирует как координирующий орган, который соединяет различные нити сети тайных обществ — масонские, розенкрейцерские, тамплиерские, иезуитские — в единую операционную структуру. Хотя каждая из этих традиций поддерживает свою собственную иерархию, ритуалы и членство, SOBIB обеспечивает невидимую архитектуру, гарантирующую, что все они служат одной конечной программе.\u003c/p\u003e\n\u003ch3 id=\"внутреннее-братство\"\u003eВнутреннее братство\u003c/h3\u003e\n\u003cp\u003e\"Внутреннее братство\" — уровень организации, от которого SOBIB получает свое название — относится к ядру посвященных адептов, которые обладают наиболее полным пониманием истинных доктрин и целей секретной традиции. Это люди, прошедшие через каждый уровень посвящения, продемонстрировавшие свою приверженность десятилетиями служения и признанные способными получить и использовать глубочайшее знание.\u003c/p\u003e\n\u003cp\u003eВнутреннее братство — это не одна организация, а класс людей, распределенных по множеству организаций. Член Внутреннего братства может иметь высокие степени в масонстве, членство в Розовом Кресте, связи с иезуитскими сетями и должности во множестве публичных институтов. Их власть исходит не из какого-то одного членства, а из конвергенции множественных членств, каждое из которых предоставляет различное измерение влияния и власти.\u003c/p\u003e\n\u003cp\u003eSOBIB действует \"за пределами\" этого Внутреннего братства — на уровне, где управляется координация всей сети. Если Внутреннее братство представляет генералов скрытой армии, SOBIB представляет объединенный штаб — уровень, на котором определяется стратегия, устанавливаются цели и координируются действия всех подчиненных органов к общим целям.\u003c/p\u003e\n\u003ch2 id=\"историческая-нить\"\u003eИсторическая нить\u003c/h2\u003e\n\u003ch3 id=\"прослеживание-родословной\"\u003eПрослеживание родословной\u003c/h3\u003e\n\u003cp\u003eИсторическая родословная организаций, подобных SOBIB, намеренно затемнена. В отличие от публичных организаций с задокументированными датами основания и опубликованными уставами, глубочайшие тайные общества поддерживают свою секретность через намеренное уничтожение или сокрытие записей. Их история может быть прослежена только через умозаключения — через паттерны скоординированной деятельности, которые раскрывают существование координирующих органов, даже когда сами эти органы остаются невидимыми.\u003c/p\u003e\n\u003cp\u003eПаттерн координации между масонскими, розенкрейцерскими, тамплиерскими и иезуитскими сетями задокументирован по крайней мере с восемнадцатого века. Бесшовный переход иезуитских оперативников в масонские ложи в период подавления иезуитов (1773-1814) демонстрирует уровень координации, который не мог произойти спонтанно. Одновременное основание иллюминатов и Американской республики в 1776 году, оба связанные с одними и теми же сетями, демонстрирует скоординированное планирование, которое превосходит любую единичную организацию.\u003c/p\u003e\n\u003cp\u003eПохвальба иезуитского настоятеля Тамбурини — \"Из этой комнаты я правлю не только Парижем, но и Китаем, не только Китаем, но и всем миром, без того чтобы кто-либо знал, как это управляется\" — описывает именно тот вид невидимой координации, которую представляет SOBIB. Тамбурини описывал не публичное Общество Иисуса, а скрытую властную структуру, которая действует через него и за его пределами. \"Комната\", из которой он правил, была не иезуитским кабинетом, а внутренним святилищем координирующего органа, который направлял всю деятельность сети тайных обществ.\u003c/p\u003e\n\u003ch3 id=\"связь-с-саббатианством\"\u003eСвязь с саббатианством\u003c/h3\u003e\n\u003cp\u003eСаббатианско-франкистская традиция, задокументированная в Части 1 этой серии, предоставляет критическую связь в понимании SOBIB. Доктрина \"искупления через грех\" — вера в то, что священное достигается через нарушение священного — создала теологическую основу, оправдывающую самые крайние формы трансгрессии как духовную практику. Эта основа была не просто философской; она была операционной, предоставляя духовную авторизацию для действий, которые обычное моральное рассуждение запретило бы.\u003c/p\u003e\n\u003cp\u003eЛюди, которые действовали на уровне SOBIB, были теми, кто полностью интернализировал эту доктрину — кто понимал, что преследование власти через трансгрессию было не просто разрешено, но требовалось. Ритуалы, связанные с глубочайшими уровнями посвящения тайных обществ, как сообщается, включают акты трансгрессии, которые связывают посвященного с организацией через общую вину и взаимную уязвимость. Эти ритуалы не символичны — они функциональны, создавая связи, которые не могут быть разорваны без катастрофических последствий для человека.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eТрансгрессия\u003c/a\u003e прослеживает этот принцип до его духовного происхождения — первоначальную трансгрессию в Эдеме, которая ввела принцип мятежа против божественной власти. Каждая последующая трансгрессия — от саббатианского отступничества до ритуалов Внутреннего братства — следует паттерну, установленному в том первозданном акте. SOBIB представляет институциональное сохранение принципа трансгрессии, обеспечивая его передачу из поколения в поколение.\u003c/p\u003e\n\u003ch2 id=\"операционная-реальность\"\u003eОперационная реальность\u003c/h2\u003e\n\u003ch3 id=\"как-функционирует-sobib\"\u003eКак функционирует SOBIB\u003c/h3\u003e\n\u003cp\u003eSOBIB функционирует не через собрания, протоколы и формальные процедуры, но через сети личных отношений, общих обязательств и координированных действий. Его члены не носят опознавательных знаков и не собираются в специальных помещениях. Они действуют внутри структур своих публичных организаций — правительственных агентств, финансовых институтов, религиозных органов, разведывательных служб — осуществляя координированную программу, сохраняя при этом видимость независимых действий.\u003c/p\u003e\n\u003cp\u003eКоординация достигается через несколько механизмов. Во-первых, общее посвящение: члены, прошедшие через одни и те же процессы посвящения, разделяют общее мировоззрение, общие обязательства и общие уязвимости. Во-вторых, личные отношения: сети доверия, соединяющие членов Внутреннего братства, обеспечивают, что координация может происходить через личное общение, а не через институциональные каналы. В-третьих, символическая коммуникация: использование знаков, символов и кодированного языка позволяет членам идентифицировать друг друга и сообщать намерения без явного обсуждения.\u003c/p\u003e\n\u003cp\u003eЭти механизмы производят форму координации, которая практически невидима для посторонних. Нет документов для утечки, нет собраний для наблюдения, нет коммуникаций для перехвата. Координация происходит через общее сознание людей, которые были сформированы одними и теми же процессами посвящения для преследования одних и тех же целей. Вот почему расследования влияния тайных обществ постоянно не могут предоставить \"дымящееся ружье\" доказательств, которые требуют скептики — механизм координации не документальный, но психологический и духовный.\u003c/p\u003e\n\u003ch3 id=\"процесс-принятия-решений\"\u003eПроцесс принятия решений\u003c/h3\u003e\n\u003cp\u003eРешения, которые формируют мир — какие правительства поднимаются и падают, какие экономики процветают и рушатся, какие войны ведутся и какие предотвращаются — в конечном счете принимаются на уровне организаций, подобных SOBIB. Видимые лица, принимающие решения — президенты, премьер-министры, главы центральных банков, военные командиры — реализуют решения, которые были приняты выше них в скрытой иерархии. Они могут полагать, что принимают независимые решения, но варианты, доступные им, были предварительно выбраны координирующим органом, обеспечивая, что любой выбор, который они сделают, служит целям сети.\u003c/p\u003e\n\u003cp\u003eЭто глубочайший секрет современного управления: видимое правительство подчинено невидимому правительству, а невидимое правительство само подчинено духовному правительству — началам и властям Ефесянам 6:12, которые действуют через второе небо. SOBIB представляет стык между человеческим и демоническим — уровень, на котором человеческое принятие решений пересекается с духовным направлением, производя результаты, которые служат программе противника, при этом кажась служащими человеческим интересам.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eПолное информационное осведомление\u003c/a\u003e исследует информационную архитектуру, которая обеспечивает эту координацию. Способность отслеживать каждую коммуникацию, отслеживать каждую финансовую транзакцию и наблюдать за каждым человеком предоставляет координирующему органу разведку, необходимую ему для направления глобальных событий. Информация — это валюта власти, и те, кто обладает полной информацией, обладают полной властью.\u003c/p\u003e\n\u003ch2 id=\"духовное-ядро\"\u003eДуховное ядро\u003c/h2\u003e\n\u003ch3 id=\"чему-в-конечном-счете-служит-sobib\"\u003eЧему в конечном счете служит SOBIB\u003c/h3\u003e\n\u003cp\u003eНа своем глубочайшем уровне SOBIB — это не человеческая организация — это духовная. Ее истинные директора — это не человеческие посвященные, которые занимают ее внутренний круг, но демонические сущности, которым служат эти посвященные. Ритуалы посвящения, клятвы верности и акты трансгрессии, которые связывают членов с организацией, на своем глубочайшем уровне являются актами подчинения демонической власти. Человеческие члены SOBIB — это инструменты — мощные, влиятельные и опасные инструменты, но тем не менее инструменты — начал и властей, которые действуют во втором небе.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана об организации демонического царства делает это ясным. Демоны, которых он наблюдал, действуют через именно такого рода вложенные иерархии, которые реплицируют человеческие тайные общества. Соответствие не случайно — оно причинно. Человеческие организации спроектированы служить транспортными средствами демонического влияния, и их организационные структуры отражают демоническую иерархию, потому что они смоделированы на ней.\u003c/p\u003e\n\u003cp\u003eКонечная цель SOBIB и организаций, которые оно координирует, — это не политическая власть, финансовое богатство или глобальное управление — хотя они преследуются как средства к цели. Конечная цель — духовная, описанная в Писании: максимально возможная жатва человеческих душ для противника. Каждая политическая программа, каждая финансовая схема, каждая разведывательная операция и каждый религиозный обман, задокументированные в этой серии, служат этой единственной цели. SOBIB координирует эти разнообразные действия к их общей духовной цели — исполнению войны противника против Бога путем захвата наибольшего возможного числа человеческих душ.\u003c/p\u003e\n\u003ch3 id=\"пределы-скрытой-власти\"\u003eПределы скрытой власти\u003c/h3\u003e\n\u003cp\u003eНесмотря на необычайный масштаб и сложность организаций, подобных SOBIB, их власть ограничена фундаментальным ограничением: они действуют внутри творения, управляемого суверенным Богом, чьи цели не могут быть в конечном счете расстроены. Книга Откровения описывает кажущийся триумф системы Зверя — кульминацию всего, что строило SOBIB — за которым следует ее полное и постоянное уничтожение при возвращении Христа.\u003c/p\u003e\n\u003cp\u003eЭто конечный секрет, который SOBIB скрывает даже от своих собственных членов: они строят систему, которая предназначена для уничтожения. Демоническая иерархия, которая направляет их действия, знает это — Писание указывает, что демоны понимают свою собственную конечную судьбу — но человеческие участники могут не знать. Они преследуют власть, полагая, что она постоянна, не понимая, что царство, которое они строят, будет сметено в один час (Откровение 18:10).\u003c/p\u003e\n\u003cp\u003eВерующий, который понимает это — кто видит и масштаб скрытого правительства, и уверенность в его уничтожении — занимает позицию духовного преимущества, которому никакое количество мирской власти не может соответствовать. Секрет, который принадлежит Богу (Второзаконие 29:29), больше любого секрета, хранимого SOBIB: что история заканчивается не триумфом тьмы, но триумфом света, и что каждая душа, которая полагает свое доверие Христу, а не скрытому правительству, будет участвовать в этом триумфе.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-из-1-царств-8\"\u003eПредупреждение из 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушай голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтоб Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=RST\"\u003e1 Царств 8:7 (Синод.)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение из 1 Царств 8 эхом отдается через каждый правительственный коридор сегодня. Когда Израиль потребовал царя, подобного другим народам, Бог предупредил их точно, что произойдет — их сыновья будут взяты на войну, их дочери для службы, их поля и виноградники захвачены, десятая часть всего конфискована. Они выбрали человеческое правительство вместо Божьего правления, и тирания последовала точно как обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной скрытой властной структуре. Голосование за любую сторону — это выбор того, какое крыло махнет следующим, пока птица летит в одном направлении. Настоящая власть никогда не была в избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"The Secret Societies Within Secret Societies,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство околосмертного опыта Говарда Питтмана\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=RST\"\u003e1 Царств 8 — Предупреждение против земных царей (Синод.)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eПолное информационное осведомление\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eОдна нация под шантажом\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eВ ногу со Зверем\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u
