ожественного источника для поддержания жизни, незагрязненная, немедикаментозная и свободная. Первое, что Бог обеспечил после создания человека, — это сад, и первая инфраструктура этого сада — вода; чистая, дающая жизнь вода, которая не требовала обработки, не требовала добавок и не требовала одобрения правительства. Фторирование воды представляет собой инверсию этого дизайна: преднамеренное добавление промышленного химиката в общественное водоснабжение, вводимое каждому мужчине, женщине, ребёнку и младенцу без их знания, согласия или возможности отказаться. Это массовая медикаментозная обработка через инфраструктуру — наиболее эффективная система доставки вещества, которое большинство развитых стран мира отклонили.\u003c/p\u003e\n\u003cp\u003eКак объявляет трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/97-Rivers_of_Living_Water.mp4\"\u003eРеки живой воды\u003c/a\u003e, вода жизни течёт из престола Бога, чистая и неоскверненная. Фторированная вода, вытекающая из американских кранов, не является ни чистой, ни неоскверненной — она содержит промышленный побочный продукт, классифицированный как опасные отходы, доставляемые населению как мера общественного здравоохранения, без согласия, которое требует медицинская этика.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"история-происхождения-которую-не-преподают\"\u003eИстория происхождения, которую не преподают\u003c/h2\u003e\n\u003cp\u003eОфициальное повествование фторирования воды простое и успокаивающее: в 1930-х и 1940-х годах учёные обнаружили, что сообщества с естественным содержанием фтора в их воде имели более низкие показатели кариеса зубов. Это привело к рекомендации добавлять фтор в общественное водоснабжение для улучшения здоровья зубов. Гранд-Рапидс, Мичиган, стал первым городом, который фторировал свою воду в 1945 году, и практика распространилась по Америке как триумф профилактического общественного здравоохранения.\u003c/p\u003e\n\u003cp\u003eНеофициальная история значительно мрачнее.\u003c/p\u003e\n\u003cp\u003eФтор — в частности, соединения фтора, добавляемые в водоснабжение — не является фармацевтическим веществом. Это побочный продукт промышленности фосфатных удобрений. Гидрофторкремниевая кислота, соединение, наиболее часто используемое при фторировании воды, захватывается из дымовых труб заводов фосфатных удобрений. Прежде чем быть проданным муниципалитетам как добавка для воды, он был классифицирован как токсичные промышленные отходы, которые компании должны были оплачивать для утилизации.\u003c/p\u003e\n\u003cp\u003eПреобразование промышленных отходов в государственную политику здравоохранения произошло не благодаря научному открытию. Это было экономическим решением проблемы утилизации, облачённым в язык здоровья зубов.\u003c/p\u003e\n\u003cp\u003eВ 1930-х и 1940-х годах производящие фтор промышленности — производители алюминия (ALCOA), компании фосфатных удобрений и программа ядерного оружия (которая использовала огромные количества фтора) — сталкивались с растущими исками фермеров и сообществ, чьи урожаи, скот и здоровье были повреждены загрязнением фтором. Выбросы фтора из промышленных растений убивали скот, портили урожаи и делали больных рабочих.\u003c/p\u003e\n\u003cp\u003eВместо очистки своих процессов эти промышленности финансировали исследования, чтобы переосмыслить фтор как благо для здоровья. Если бы фтор можно было установить как благополезный — необходимый, даже — для здоровья человека, то иски потеряли бы свою основу, проблема утилизации была бы решена (муниципалитеты платили бы за то, чтобы взять отходы с рук промышленности), и обязательство стало бы потоком доходов.\u003c/p\u003e\n\u003ch2 id=\"связь-alcoa-mellon\"\u003eСвязь ALCOA-Mellon\u003c/h2\u003e\n\u003cp\u003eНаиболее ранний и агрессивный сторонник фторирования воды был Mellon Institute, исследовательское учреждение, финансируемое семьей Mellon — той же семьей, которая владела Aluminum Company of America (ALCOA), крупнейшим производителем алюминия в мире и одним из крупнейших генераторов фторных отходов.\u003c/p\u003e\n\u003cp\u003eДжеральд Кокс, исследователь из Mellon Institute, был первым, кто предложил добавлять фтор в общественное водоснабжение в 1939 году. Он пришёл к этому предложению не через независимое стоматологическое исследование. Он пришёл к этому через его работу в учреждении, финансируемом компанией, которая получила бы наибольшую выгоду от переосмысления отходов фтора как необходимости общественного здравоохранения.\u003c/p\u003e\n\u003cp\u003eГарольд Ходж, главный токсиколог Манхэттенского проекта — программы, которая разработала атомную бомбу и потребовала огромного количества фтора — стал одним из главных сторонников фторирования воды. Ходж имел первостепенное знание о токсичности фтора (Манхэттенский проект проводил засекреченные исследования о воздействии фтора на здоровье рабочих), но публично поддерживал его добавление в водоснабжение.\u003c/p\u003e\n\u003cp\u003eРассекреченные документы, полученные через запросы в соответствии с Законом о свободе информации в 1990-х годах, раскрыли, что Манхэттенский проект заказал исследования о воздействии фтора на здоровье не для определения его безопасности для потребления, а для подготовки защиты от потенциальных исков от сообществ и рабочих, пострадавших от выбросов фтора из ядерных объектов.\u003c/p\u003e\n\u003cp\u003eЭто основание американского фторирования воды: переработка промышленных отходов как государственная политика здравоохранения, поддерживаемая промышленностью, которая производила отходы, и военными программами, которым требовалось правовое прикрытие для вреда здоровью, вызванного выбросами фтора.\u003c/p\u003e\n\u003ch2 id=\"согласие-которое-никогда-не-было-запрошено\"\u003eСогласие, которое никогда не было запрошено\u003c/h2\u003e\n\u003cp\u003eОсновополагающий принцип медицинской этики — информированное согласие — право каждого человека понять, что делается с его телом, и согласиться или отказаться. Этот принцип, кодифицированный в Нюрнбергском кодексе 1947 года (написанном в ответ на нацистские медицинские эксперименты), Декларации Хельсинки и Отчёте Белмонта, применяется ко всем медицинским вмешательствам.\u003c/p\u003e\n\u003cp\u003eФторирование воды абсолютно нарушает этот принцип. Ни один человек не дал согласия на фторирование. Ни один человек не может контролировать свою дозу (рабочий, который пьёт два галлона воды в день, получает гораздо больше фтора, чем офисный работник, который пьёт два стакана). Ни один человек не может отказаться без установки дорогостоящих систем фильтрации или покупки альтернативных источников воды. Младенцы — наиболее уязвимые к воздействию фтора — получают наибольшую дозу относительно веса тела, когда смесь смешивается с фторированной водой.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в нашей статье о \u003ca href=\"/informed-consent-destroyed/?lang=ru\"\u003eРазрушенном информированном согласии\u003c/a\u003e, принцип информированного согласия систематически подрывался в медицинском учреждении. Фторирование воды, пожалуй, самый экстремальный пример: медицинское вмешательство, вводимое всему населению через государственную водную систему, без согласия, без контроля дозы и без способности отказаться.\u003c/p\u003e\n\u003cp\u003eАргумент о том, что фторирование не является \"медицинским вмешательством\", а \"мерой общественного здравоохранения\", является семантическим уклончиванием. Если вещество добавляется в воду с целью предотвращения заболевания у людей, которые её пьют, это лекарство — независимо от того, является ли система доставки таблеткой или муниципальной трубой. Европейский суд справедливости подтвердил это в решении 2005 года, выяснив, что фтор является лекарством при использовании для предотвращения заболевания.\u003c/p\u003e\n\u003cp\u003eБольшинство Европы согласны. По состоянию на 2024 год 97% Западной Европы не фторирует свою воду. Германия, Франция, Италия, Бельгия, Австрия, Швеция, Норвегия, Дания, Финляндия, Нидерланды и Япония отклонили фторирование воды — либо прямо запретив его, либо выбрав не внедрять его. Результаты их здоровья зубов сопоставимы или лучше, чем в фторированных странах.\u003c/p\u003e\n\u003cp\u003eСоединённые Штаты, наряду с Соединённым Королевством, Австралией, Канадой и Ирландией, продолжают фторировать — не потому, что наука её поддерживает, а потому, что институциональный импульс, промышленные интересы и политическое смущение от отмены десятилетий политики делают почти невозможным её остановить.\u003c/p\u003e\n\u003ch2 id=\"что-фтор-делает-с-телом\"\u003eЧто фтор делает с телом\u003c/h2\u003e\n\u003cp\u003eВоздействие на здоровье от хронического, низкодозированного воздействия фтора выходит далеко за пределы зубов:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКальцификация шишковидной железы.\u003c/strong\u003e Как подробно описано в нашей статье о \u003ca href=\"/fluoride-calcification-pineal/?lang=ru\"\u003eФторе и шишковидной железе\u003c/a\u003e, шишковидная железа накапливает больше фтора, чем любая другая ткань в организме. Фторидные отложения кальцифицируют шишковидную железу, снижая её функцию. Шишковидная железа производит мелатонин (регулирует сон и циркадный ритм) и с древности была связана с духовным восприятием и сознанием. Систематическая кальцификация этой железы через муниципальное водоснабжение является, в минимальном случае, отказом в общественном здравоохранении и, в худшем случае, преднамеренным нападением на человеческое сознание.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНейротоксичность.\u003c/strong\u003e В 2006 году Национальный совет по исследованиям опубликовал \"Фтор в питьевой воде\", в котором пришли к выводу, что фтор на уровнях, присутствующих в некоторых водоснабжениях США, представляет риски для развития мозга. С тех пор более 60 исследований обнаружили ассоциации между воздействием фтора и снижением IQ у детей. Исследование 2017 года, опубликованное в Environmental Health Perspectives — финансируемое NIH и проведённое исследователями из нескольких университетов — выяснило, что пренатальное воздействие фтора было связано с более низкими показателями IQ у детей, с видимыми эффектами при уровнях воздействия, обычных в фторированных сообществах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарушение щитовидной железы.\u003c/strong\u003e Фтор был использован как лекарство, подавляющее щитовидную железу в середине двадцатого века. Исследования выяснили, что популяции в фторированных областях имеют более высокие показатели гипотиреоза. Исследование 2018 года, опубликованное в журнале Scientific Reports, выяснило, что фторированная вода была связана со значительно более высокой распространённостью диагностированного гипотиреоза.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСкелетный флюороз.\u003c/strong\u003e Хроническое воздействие фтора вызывает накопление фтора в костях, что приводит к скелетному флюорозу — состоянию, характеризующемуся болью, скованностью и структурным повреждением костей и суставов. Хотя тяжёлый скелетный флюороз более распространён в регионах с естественным высоким уровнем фтора, ранний скелетный флюороз имитирует артрит и редко диагностируется в фторированных странах, потому что врачи не обучены на него смотреть.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗубной флюороз.\u003c/strong\u003e Парадоксальным образом фтор — вещество, добавляемое в воду для защиты зубов — также их повреждает. Зубной флюороз, вызванный чрезмерным потреблением фтора во время развития зубов, производит белые пятна, коричневое пятнистое окрашивание и структурное ослабление эмали зубов. CDC сообщает, что 65% американских подростков теперь имеют какую-то степень зубного флюороза — вверх с 22% в начале 1980-х годов, когда фторирование было менее широко распространено.\u003c/p\u003e\n\u003ch2 id=\"решение-федерального-суда-2024-года\"\u003eРешение федерального суда 2024 года\u003c/h2\u003e\n\u003cp\u003eВ сентябре 2024 года федеральный судья в Северном округе Калифорнии постановил в деле Fluoride Action Network против EPA, что EPA не надлежащим образом рассмотрел нейротоксические риски фторирования воды. Судья Эдвард Чэнь, рассмотрев обширные научные доказательства, включая систематический обзор NTP (Национальной программы токсикологии), выяснил, что фтор на уровнях, используемых при фторировании воды, представляет неоправданный риск вреда здоровью — в частности, нейроразвития детей.\u003c/p\u003e\n\u003cp\u003eЭто постановление — которое потребовало EPA предпринять нормативные действия для решения риска — было первым случаем, когда американский суд признал нейротоксичный потенциал фтора на уровнях, обнаруженных в американской водопроводной воде. Это было продуктом десятилетий работы исследователей, активистов и правозащитников, которые были отклонены как теоретики заговора за то, что они ставили под сомнение безопасность практики, одобренной Американской ассоциацией стоматологов, CDC и практически каждым учреждением общественного здравоохранения в Америке.\u003c/p\u003e\n\u003cp\u003eПостановление подтвердило то, что критики утверждали десятилетиями: безопасность фторирования воды никогда не была установлена через тщательное научное рассмотрение. Она была установлена через институциональный консенсус — тот же механизм, через который безопасность свинцовых труб, асбестовой изоляции и ДДТ была когда-то \"установлена\".\u003c/p\u003e\n\u003ch2 id=\"сеть-рокфеллеров-медицины\"\u003eСеть Рокфеллеров-медицины\u003c/h2\u003e\n\u003cp\u003eКак исследовано в нашей статье о \u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eМедицине Рокфеллеров: как здравоохранение было захвачено\u003c/a\u003e, Фонд Рокфеллера сформировал структуру американской медицины в начале двадцатого века. Та же институциональная инфраструктура, которая продвигала медицину на основе лекарств, подавляла натуропатические и гомеопатические альтернативы и учредила AMA в качестве привратника медицинской практики, также продвигала фторирование воды как меру общественного здравоохранения.\u003c/p\u003e\n\u003cp\u003eАмериканская стоматологическая ассоциация, Американская медицинская ассоциация и Служба общественного здравоохранения США — все учреждения, сформированные финансированием и влиянием Рокфеллеров — одобрили фторирование и напали на его критиков как невежественных, параноидальных или антинаучных. Этот образец институционального одобрения, сопровождаемого убийством характера критиков, идентичен образцу, используемому для защиты ДДТ, табака, Оксиконтина и, совсем недавно, новых генных терапий.\u003c/p\u003e\n\u003cp\u003eИнституциональный консенсус никогда не был о науке. Это была о власти — власти учреждений, финансируемых промышленностью, говорить публике, что безопасно, что необходимо и какие вопросы не могут быть задающены.\u003c/p\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о ближайшем опыте смерти Говарда Питтмана — предупреждение о конце времён, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическое конфиденциально: раскрытые позорные иезуитские тайны\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и фармакея — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может находиться в подвале Ватикана может шокировать вас!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/191-Rockefeller_Medicine.mp4\"\u003eМедицина Рокфеллеров\u003c/a\u003e — Институциональный захват, который превратил промышленные отходы в государственную политику здравоохранения\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/53-Cognitive_Warfare-Battle_For_The_Brain.mp4\"\u003eКогнитивная война\u003c/a\u003e — Когда оружие находится в воде, война незаметна\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/97-Rivers_of_Living_Water.mp4\"\u003eРеки живой воды\u003c/a\u003e — Вода жизни, повреждённая в источнике\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуй-далее\"\u003eИсследуй далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/fluoride-calcification-pineal/?lang=ru\"\u003eФтор и шишковидная железа: кальцифицирование вашего третьего глаза\u003c/a\u003e — Как фтор нацеливается на наиболее духовно значимый орган тела\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/tap-water-contaminants-truth/?lang=ru\"\u003eВодопроводная вода: загрязнители, которые они не тестируют\u003c/a\u003e — Фтор — лишь один из многих загрязнителей в муниципальной воде\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/informed-consent-destroyed/?lang=ru\"\u003eИнформированное согласие разрушено\u003c/a\u003e — Систематическое разрушение медицинского выбора в Америке\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eМедицина Рокфеллеров: как здравоохранение было захвачено\u003c/a\u003e — Институциональная сеть за политикой фторирования\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eКак это было в Раю, так и на кране. Бог обеспечил воду, чистую и свободную, для поддержания жизни. Система змеи берёт эту воду и добавляет в неё — промышленный химикат, вводимый без согласия, который кальцифицирует железу, связанную с духовным восприятием, и повреждает развивающиеся мозги детей. Обещание — здоровье. Результат — вред. Образец не изменился со времён Сада: власть говорит вам, что это хорошо для вас, и люди, которые доверяют власти, — это те, кто страдает. Сатана всё ещё лжец, и ложь теперь течёт через каждую трубу в Америке.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/food-environment/\",\"className\":\"category-badge\",\"children\":\"food-environment\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Фторирование воды: Массовая медикаментозная обработка без согласия\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"История фторирования воды в Америке — от происхождения в промышленных отходах до внедрения как государственной политики здравоохранения — и как массовая медикаментозная обработка без информированного согласия была нормализована во имя здоровья зубов.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\"
