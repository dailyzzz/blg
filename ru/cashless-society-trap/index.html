\u003e\n\u003cp\u003eЛюбовь к деньгам всегда была механизмом, через который власть консолидируется, а свобода разрушается. Но Писание описывает нечто более точное, чем просто жадность — оно описывает систему, в которой сами деньги становятся инструментом контроля.\u003c/p\u003e\n\u003cp\u003eВ Откровении 13 никто не может покупать или продавать без печати. Это пророчество требует денежной системы, в которой каждая транзакция видима, контролируема и отменяема. Физические наличные делают эту систему невозможной. Цифровые деньги делают её неизбежной.\u003c/p\u003e\n\u003cp\u003eВойна против наличных — это война против последнего рубежа финансовой свободы. Каждая монета в вашем кармане и каждая банкнота в вашем кошельке представляет собой транзакцию, которую ни одно правительство не может отследить, ни один алгоритм не может проанализировать и ни один орган власти не может предотвратить.\u003c/p\u003e\n\u003cp\u003eСтремление устранить наличные — это не вопрос эффективности или предотвращения преступлений — это закрытие последней лазейки в экономике надзора. Трек с альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка сатаны\u003c/a\u003e раскрывает образец: противник всегда упаковывает рабство как выгоду, цепи как удобство и тюрьмы как прогресс.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"швеция-безналичная-лаборатория\"\u003eШвеция: Безналичная лаборатория\u003c/h2\u003e\n\u003cp\u003eШвеция — самое продвинутое безналичное общество в мире, и она служит лабораторией для глобальной повестки. Наличные транзакции составляют менее 1% ВВП Швеции.\u003c/p\u003e\n\u003cp\u003eТрансформация была драматической:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eМногие банки больше не работают с наличными\u003c/li\u003e\n\u003cli\u003eАвтобусы и розничные продавцы стали безналичными\u003c/li\u003e\n\u003cli\u003eДаже церкви принимают только цифровые платежи\u003c/li\u003e\n\u003cli\u003eRiksbank разработал цифровую валюту e-krona CBDC как финальный шаг\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТрансформация не была вызвана потребительским спросом. Она была спроектирована через институциональную политику:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eШведские банки начали удалять наличные услуги из филиалов\u003c/li\u003e\n\u003cli\u003eСети банкоматов систематически сокращались\u003c/li\u003e\n\u003cli\u003eРозничные продавцы стимулировались переходить на безналичный расчёт через более низкие комиссии за обработку\u003c/li\u003e\n\u003cli\u003eНарратив об удобстве был изготовлен: наличные грязные, наличные медленные, наличные для преступников\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНо последствия были серьёзными.\u003c/p\u003e\n\u003cp\u003eПожилое население Швеции — те, кто меньше всего комфортен с цифровыми технологиями — было систематически исключено из экономики. Сельские общины, где доступ к интернету ненадёжен, были отрезаны от базовой коммерции. Уличные торговцы, мелкие фермеры и работники неформальной экономики, которые зависят от наличных транзакций, были отодвинуты на обочину.\u003c/p\u003e\n\u003cp\u003eБолее критично, каждая транзакция в Швеции теперь отслеживается. Каждая покупка, каждое пожертвование, каждый перевод оставляет цифровой след, доступный банкам, платёжным процессорам и — через судебный запрос или утечку данных — правительственным агентствам и хакерам.\u003c/p\u003e\n\u003cp\u003eШведский народ обменял свою финансовую конфиденциальность на удобство касания карты. Они не могут вернуть её обратно.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"индия-демонетизация-как-оружие\"\u003eИндия: Демонетизация как оружие\u003c/h2\u003e\n\u003cp\u003e8 ноября 2016 года премьер-министр Индии Нарендра Моди объявил, что все банкноты номиналом 500 и 1000 рупий — представляющие \u003cstrong\u003e86% всех наличных в обращении\u003c/strong\u003e — немедленно демонетизируются.\u003c/p\u003e\n\u003cp\u003eУ граждан было ограниченное окно для обмена старых банкнот на новые в банках. Заявленными причинами были борьба с коррупцией, подделками и уклонением от уплаты налогов.\u003c/p\u003e\n\u003cp\u003eРеальность была катастрофической:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСотни миллионов индийцев без банковских счетов были ввергнуты в хаос\u003c/li\u003e\n\u003cli\u003eМалый бизнес рухнул за одну ночь\u003c/li\u003e\n\u003cli\u003eРабочие-мигранты не могли заплатить за еду или транспорт\u003c/li\u003e\n\u003cli\u003eСельскохозяйственный сектор был опустошён, поскольку фермеры не могли покупать семена или продавать урожай\u003c/li\u003e\n\u003cli\u003eПриблизительно 100 смертей были прямо связаны с кризисом демонетизации\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОбещанные выгоды никогда не материализовались.\u003c/p\u003e\n\u003cp\u003eИсследования Резервного банка Индии показали, что \u003cstrong\u003e99,3% демонетизированной валюты в конечном итоге вернулось\u003c/strong\u003e в банковскую систему — это означает, что чёрные деньги, которые политика должна была вымыть, просто не существовали в заявленных количествах.\u003c/p\u003e\n\u003cp\u003eНалоговая отчётность значительно не улучшилась. Подделки не были устранены. Коррупция продолжалась.\u003c/p\u003e\n\u003cp\u003eТо, что демонетизация достигла, — это принуждение сотен миллионов индийцев к системе цифровых платежей. Paytm, Google Pay и другие платформы увидели взрывной рост. Система биометрической идентификации Aadhaar расширила свой охват.\u003c/p\u003e\n\u003cp\u003eНаселение Индии было вытеснено силой и кризисом из независимости наличных в зависимость от цифровых.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"война-против-наличных-на-западе\"\u003eВойна против наличных на Западе\u003c/h2\u003e\n\u003cp\u003eАтака на наличные в западных странах более тонкая, но столь же решительная:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСокращение приёма наличных.\u003c/strong\u003e Крупные розничные продавцы, авиакомпании и поставщики услуг всё чаще отказываются от наличных. Во время COVID-19 многие предприятия ссылались на гигиенические опасения для оправдания отказа от наличных — несмотря на заявления ВОЗ о том, что риск передачи вируса через банкноты был незначительным. Пандемия нормализовала безналичную коммерцию способами, которые не были отменены.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУстранение крупных номиналов.\u003c/strong\u003e Европейский центральный банк прекратил производство банкноты в 500 евро в 2019 году. Предложения об устранении банкноты в 100 долларов и 50 фунтов циркулируют годами. Бывший министр финансов Лоуренс Саммерс и экономист Кеннет Рогофф оба выступали за устранение банкнот крупного номинала. Удаление крупных банкнот делает наличные непрактичными для значительных транзакций.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТребования отчётности о транзакциях.\u003c/strong\u003e В Соединённых Штатах банки должны подавать Отчёты о валютных транзакциях для наличных транзакций свыше 10 000 долларов и Отчёты о подозрительной активности для любого необычного образца. Администрация Байдена предложила снизить порог отчётности до 600 долларов — мера, которая поставит почти всю экономическую деятельность под надзор.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСокращение сети банкоматов.\u003c/strong\u003e Сети банкоматов сокращались по всему развитому миру:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eВ Великобритании бесплатные для использования банкоматы сократились более чем на 25% с 2018 года\u003c/li\u003e\n\u003cli\u003eВ Австралии крупные банки закрыли тысячи филиалов и банкоматов\u003c/li\u003e\n\u003cli\u003eПо мере уменьшения доступа к наличным зависимость от цифровых платежей увеличивается — не по выбору, а по замыслу\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"архитектура-надзора\"\u003eАрхитектура надзора\u003c/h2\u003e\n\u003cp\u003eУстранение наличных создаёт архитектуру надзора необычайной мощности. В безналичной системе каждая финансовая транзакция генерирует точку данных, которая раскрывает:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЧто вы покупаете\u003c/strong\u003e — каждый товар, каждую услугу, каждую подписку. Ваша история покупок раскрывает вашу диету, состояние здоровья, политические склонности, религиозные принадлежности, пороки, отношения и ежедневную рутину.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКуда вы идёте\u003c/strong\u003e — каждый платёж геолоцируется. Ваша история транзакций — это карта ваших движений в реальном времени. GPS-трекер не требуется.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eС кем вы общаетесь\u003c/strong\u003e — одноранговые платежи, совместные счета, повторяющиеся переводы. Ваши финансовые связи отображают вашу социальную сеть более точно, чем любая платформа социальных медиа.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВо что вы верите\u003c/strong\u003e — пожертвования церквям, политическим организациям, правозащитным группам и медиа-каналам. В безналичной системе каждый акт финансовой поддержки записывается и потенциально используется против вас.\u003c/p\u003e\n\u003cp\u003eЭто не гипотетический надзор. Это существующая реальность для каждого человека, который использует цифровые платежи.\u003c/p\u003e\n\u003cp\u003eРазница между текущей системой и полностью безналичной системой в том, что сегодня вы можете отказаться, используя наличные. В безналичной системе нет отказа. Каждая транзакция, без исключения, захватывается.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в \u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eЦепи CBDC: Программируемые деньги, которые контролируют вас\u003c/a\u003e, цифровые валюты центральных банков добавят программируемость к этому надзору — способность не просто наблюдать транзакции, но контролировать их.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"миф-о-предотвращении-преступлений\"\u003eМиф о предотвращении преступлений\u003c/h2\u003e\n\u003cp\u003eНаиболее распространённое оправдание устранения наличных — предотвращение преступлений. Наличные, нам говорят, способствуют торговле наркотиками, отмыванию денег, уклонению от уплаты налогов и терроризму.\u003c/p\u003e\n\u003cp\u003eЭтот аргумент рушится при проверке:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eHSBC\u003c/strong\u003e был оштрафован на 1,9 миллиарда долларов за отмывание денег для мексиканских наркокартелей — через цифровые банковские переводы, а не чемоданы с наличными\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeutsche Bank\u003c/strong\u003e отмыл приблизительно 10 миллиардов долларов для российских олигархов — через электронные зеркальные сделки\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПанамские документы\u003c/strong\u003e и \u003cstrong\u003eДокументы Пандоры\u003c/strong\u003e раскрыли триллионы скрытых оффшорных богатств через подставные компании и цифровой банкинг — не банкноты\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКрупнейшие финансовые преступления в истории были совершены полностью через цифровую банковскую систему.\u003c/p\u003e\n\u003cp\u003eНаличные транзакции подавляюще законны: уличные торговцы, фермерские рынки, чаевые, малый бизнес, гаражные распродажи, благотворительные пожертвования, межличностное кредитование — ежедневная наличная экономика — это экономика обычных людей.\u003c/p\u003e\n\u003cp\u003eУстранение наличных наказывает невиновных, чтобы теоретически создать неудобства преступникам, в то время как преступники уже освоили цифровую систему.\u003c/p\u003e\n\u003cp\u003eИстинная цель устранения наличных — не предотвращение преступлений. Это предотвращение автономии. Наличные — это последняя форма денег, которая не требует разрешения от посредника.\u003c/p\u003e\n\u003cp\u003eНаличная транзакция между двумя людьми требует:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНикакого одобрения банка\u003c/li\u003e\n\u003cli\u003eНикакой верификации платёжного процессора\u003c/li\u003e\n\u003cli\u003eНикакого правительственного надзора\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОна прямая, немедленная и суверенная. Эту суверенность и стремится уничтожить безналичная повестка.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"связь-с-цифровым-id\"\u003eСвязь с цифровым ID\u003c/h2\u003e\n\u003cp\u003eБезналичное общество не может функционировать без цифровой идентичности, как исследуется в \u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eЦифровой ID: Глобальная тюрьма идентичности\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eКаждая цифровая транзакция требует аутентификации — система должна подтвердить, что вы тот, за кого себя выдаёте. В наличной транзакции ваша идентичность не имеет значения. В цифровой транзакции ваша идентичность — это всё.\u003c/p\u003e\n\u003cp\u003eСближение безналичной коммерции и цифровой идентичности создаёт инфраструктуру, описанную в Откровении 13 — систему, в которой покупка и продажа требуют проверяемой идентичности, связанной со статусом соответствия.\u003c/p\u003e\n\u003cp\u003eНет цифрового ID — нет транзакции. Несоответствующий цифровой ID — нет транзакции.\u003c/p\u003e\n\u003cp\u003eПечать — это не метафора. Это слой аутентификации безналичной экономики.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-происходит-когда-наличные-умирают\"\u003eЧто происходит, когда наличные умирают\u003c/h2\u003e\n\u003cp\u003eПоследствия полностью безналичного общества выходят за рамки надзора:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФинансовое исключение становится систематическим.\u003c/strong\u003e Приблизительно 1,4 миллиарда взрослых по всему миру не имеют банковского счёта. Небанкированные, пожилые, инвалиды, бездомные — все исключаются из экономики по замыслу.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСбои системы становятся экзистенциальными.\u003c/strong\u003e Отключения электроэнергии, перебои в интернете, кибератаки и сбои программного обеспечения делают всю экономику нефункциональной. В системе, основанной на наличных, коммерция продолжается, когда электричество отключается. В безналичной системе она полностью останавливается.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОтрицательные процентные ставки становятся принудительными.\u003c/strong\u003e Центральные банки могут взимать с вас плату за хранение денег, а не за их трату. С наличными вкладчики могут просто снять деньги. Без наличных нет выхода. Ваш баланс автоматически сокращается.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПолитическое инакомыслие становится финансово невозможным.\u003c/strong\u003e Любое дело или лицо, считающееся неприемлемым, может быть полностью отрезано. Это уже произошло:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКанадские дальнобойщики заморозили банковские счета во время Конвоя Свободы\u003c/li\u003e\n\u003cli\u003eWikiLeaks был отрезан от платёжных процессоров\u003c/li\u003e\n\u003cli\u003ePayPal, Visa и Mastercard удалили с платформы лиц по политическим причинам\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВ безналичной системе нет альтернативы. Нет наличных. Нет анонимных пожертвований. Нет финансового существования вне системы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И он сделает то, что всем, малым и великим, богатым и нищим, свободным и рабам, положено будет начертание на правую руку их или на чело их, и что никому нельзя будет ни покупать, ни продавать, кроме того, кто имеет это начертание, или имя зверя, или число имени его.\" — Откровение 13:16-17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНа протяжении двух тысяч лет это пророчество было технически невозможным. Как могла любая власть предотвратить все покупки и продажи? Физическая валюта течёт между людьми без посредника. Рынки формируются спонтанно. Бартер не требует разрешения.\u003c/p\u003e\n\u003cp\u003eТотальный контроль коммерции, описанный в Откровении, требовал технологии, которая не существовала до цифровой эры.\u003c/p\u003e\n\u003cp\u003eБезналичное общество — это та технология. Это предпосылка для печати — система, которая делает печать необходимой, и печать, которая делает систему завершённой.\u003c/p\u003e\n\u003cp\u003eУстранение наличных — это не финансовая политика. Это пророческое исполнение. Когда последняя физическая монета будет переплавлена и последняя бумажная банкнота будет уничтожена, инфраструктура Откровения 13 будет функциональной.\u003c/p\u003e\n\u003cp\u003eКаждая транзакция потребует разрешения. Каждая покупка потребует аутентификации. Каждый акт коммерции потребует соответствия тому, что требует система.\u003c/p\u003e\n\u003cp\u003eЭто не интерпретация. Это инжиниринг.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/161-CBDC_Chains.mp4\"\u003eЦепи CBDC\u003c/a\u003e — Контрольная сетка программируемых денег\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/229-Digital_Dollar_Dragnet.mp4\"\u003eОблава цифрового доллара\u003c/a\u003e — Когда наличные исчезают\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eЦепи CBDC: Программируемые деньги, которые контролируют вас\u003c/a\u003e — Следующий шаг после устранения наличных — программируемая цифровая валюта\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eЦифровой ID: Глобальная тюрьма идентичности\u003c/a\u003e — Слой аутентификации, который превращает безналичную коммерцию в контрольную сетку\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eКогда последняя монета будет изъята из обращения, а последняя банкнота объявлена недействительной, транзакция между двумя свободными людьми — ненаблюдаемая, незаписанная, несанкционированная — станет невозможной. Это цель. Не удобство. Не безопасность. Не эффективность. Контроль. Тотальный, абсолютный, неизбежный контроль над каждым актом коммерции на земле. Пророчество Откровения 13 не требует сверхъестественной технологии. Оно требует устранения наличных. И это устранение продолжается.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/finance/\",\"className\":\"category-badge\",\"children\":\"finance\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-ser :\"Глобальная война против наличных — это не вопрос удобства или борьбы с преступностью. Это устранение последней формы денег, которая позволяет анонимные, неотслеживаемые, нецензурируемые транзакции — и замена её системой тотального финансового надзора.\"}],[\"$\",\"meta\",\"26\",{\"name\":\"twitter:image\",\"content\":\"https://blog.zzzdaily.com/images/articles/cashless-society-trap.png\"}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"13:\"$f:metadata\"\n"])</script></body></html>
