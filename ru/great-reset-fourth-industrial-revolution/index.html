тие 11:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eСтроители Вавилона стремились построить единую цивилизацию под централизованной властью — один язык, один проект, одна структура управления, которая достигла бы до неба и заменила необходимость в Боге. Их амбиция была полной интеграцией: каждый человек, каждый ресурс, каждое усилие направлено к единой системе, контролируемой единой властью. Ответ Бога был децентрализацией — рассеянием народов, умножением языков, установлением наций как отдельных суверенных сущностей.\u003c/p\u003e\n\u003cp\u003eВеликая перезагрузка — это современный Вавилон. Клаус Шваб и Всемирный экономический форум строят единую глобальную систему, которая стремится интегрировать каждый аспект человеческого существования — экономический, биологический, цифровой и социальный — под централизованной техократической властью. Язык изменился с кирпичей и раствора на алгоритмы и блокчейны, но амбиция идентична: единая система, единая власть, единое видение, навязанное всему человечеству.\u003c/p\u003e\n\u003cp\u003eКак раскрывает трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/20-The_Great_Exchange.mp4\"\u003eThe Great Exchange\u003c/a\u003e, образец врага всегда — обмен — торговля за дизайном Бога на подделку змея, торговля свободы за безопасность, торговля суверенитета за интеграцию, торговля порядка Творца на амбицию созданного.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"клаус-шваб-и-всемирный-экономический-форум\"\u003eКлаус Шваб и Всемирный экономический форум\u003c/h2\u003e\n\u003cp\u003eКлаус Шваб основал Всемирный экономический форум в 1971 году как Европейский форум управления, ежегодное собрание европейских бизнес-лидеров в Давосе, Швейцария. На протяжении пяти десятилетий Шваб трансформировал организацию из деловой конференции в наиболее влиятельное негосударственное учреждение в мире — координирующий орган, который собирает главы государств, генеральных директоров крупнейших мировых корпораций, центральных банкиров, технологических лидеров, руководителей средств массовой информации и академических элит.\u003c/p\u003e\n\u003cp\u003eВЭФ не просто проводит обсуждения. Он формирует политику. Его \"Стратегические партнеры\" включают более 100 крупнейших мировых корпораций — Apple, Microsoft, Google, Amazon, Facebook (Meta), BlackRock, JPMorgan Chase, Goldman Sachs, Pfizer, Johnson \u0026#x26; Johnson и многие другие. Эти корпорации платят годовые членские взносы, начинающиеся примерно с 600 000 долларов, при статусе \"Стратегический партнер\", что стоит значительно больше. В обмен они получают доступ к сети, которая формирует глобальную политику.\u003c/p\u003e\n\u003cp\u003eНаиболее влиятельная программа ВЭФ — это инициатива Young Global Leaders (YGL), основанная в 2004 году как преемница более ранней программы Global Leaders for Tomorrow (основана в 1993 году). Программа YGL выбирает примерно 100 человек в возрасте до 40 лет каждый год для пятилетней программы подготовки в глобальном лидерстве. Шваб открыто хвастался проникновением программы в национальные правительства:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Мы проникаем в кабинеты. Так вчера я был на приеме для премьер-министра Трюдо, и я знаю, что половина его кабинета, или даже более половины его кабинета, на самом деле молодые глобальные лидеры.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЗадокументированные выпускники YGL включают: Эммануэля Макрона (президент Франции), Джастина Трюдо (премьер-министр Канады), Джасинду Ардерна (бывший премьер-министр Новой Зеландии), Александра де Кроо (премьер-министр Бельгии), Сан-Марина Маррина (бывший премьер-министр Финляндии), Карлос Алварадо Кесада (бывший президент Коста-Рики), Пит Буттиджидж (секретарь транспорта США), Талси Габбард, Иванка Трамп, Марка Цукерберга (Meta), Сергея Брина (Google), Ларри Пейджа (Google), Джеффа Безоса (Amazon), Джека Ма (Alibaba), Джимми Уэлса (Wikipedia) и сотни других глав государств, министров кабинета, руководителей корпораций и деятелей средств массовой информации.\u003c/p\u003e\n\u003cp\u003eВЭФ не является правительством. Он не выбран. Он не подотчетен какому-либо населению. Но его выпускники управляют нациями, управляют корпорациями, контролируют платформы средств массовой информации и формируют политику, которая определяет, как восемь миллиардов людей живут. Это управление без согласия — самое полное обойтиание демократического процесса в современной истории.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"четвертая-промышленная-революция-слияние-человека-и-машины\"\u003eЧетвертая промышленная революция: слияние человека и машины\u003c/h2\u003e\n\u003cp\u003eКнига Шваба 2016 года, \"Четвертая промышленная революция\", описывает технологическую трансформацию, которая выходит за пределы любой предыдущей промышленной революции. В то время как первая революция использовала пар, вторая использовала электричество, третья использовала компьютеры, четвертая характеризуется \"слиянием технологий, которое размывает границы между физическими, цифровыми и биологическими сферами\".\u003c/p\u003e\n\u003cp\u003eКлючевая фраза — \"размывание границ между физическими, цифровыми и биологическими\". Шваб описывает — с очевидным энтузиазмом — интеграцию человеческой биологии с цифровой технологией. Это не метафорический язык. Он относится к конкретным технологиям: интерфейсы мозг-компьютер, генетическая инженерия (CRISPR), синтетическая биология, нанотехнология, управляемая искусственным интеллектом биологическая манипуляция и Интернет тел — подключение человеческого тела к цифровым сетям как узел Интернета вещей.\u003c/p\u003e\n\u003cp\u003eШваб заявил в интервью 2016 года:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Четвертая промышленная революция не только меняет то, что мы делаем. Она меняет нас. Она меняет того, кто мы такие.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИ в своей книге:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Технологии четвертой промышленной революции не остановятся на том, чтобы стать частью физического мира вокруг нас — они станут частью нас. Действительно, некоторые из нас уже чувствуют, что наши смартфоны стали продолжением себя. Сегодняшние внешние устройства — от носимых компьютеров до шлемов виртуальной реальности — почти наверняка станут имплантируемыми в наши тела и наши мозги.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЧетвертая промышленная революция — это не просто экономическое или технологическое понятие. Это трансгуманистическая повестка дня — слияние человеческих существ с технологией, переопределение того, что означает быть человеком, и создание нового вида, который частично биологический и частично цифровой. Это исполнение первоначального обещания змея: \"Вы будете как боги\" — не через духовную трансформацию, а через технологическое увеличение.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ты-не-будешь-ничего-владеть-и-будешь-счастлив\"\u003e\"Ты не будешь ничего владеть и будешь счастлив\"\u003c/h2\u003e\n\u003cp\u003eВ ноябре 2016 года ВЭФ опубликовал видео под названием \"8 предсказаний для мира в 2030 году\". Первое предсказание, произнесенное на фоне изображений улыбающихся людей в стерильных окружающих:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ты не будешь ничего владеть. И ты будешь счастлив. Все, что ты захочешь, ты будешь арендовать. И это будет доставлено дроном.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВидео позже было удалено с каналов социальных сетей ВЭФ после того, как оно стало громоотводом для критики. Но предсказание — это не случайное замечание. Оно описывает комплексную экономическую трансформацию:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодписная экономика\u003c/strong\u003e заменяет владение во всех категориях. Жилье становится сдачей в аренду или подпиской. Транспорт становится совместным использованием и автономными транспортными средствами. Программное обеспечение уже только подписка (Adobe, Microsoft 365). Развлечения — подписка (Netflix, Spotify). Услуги доставки пищи заменяют домашнее приготовление. Владение физическими товарами заменяется доступом к услугам — доступ, который может быть отозван поставщиком услуги в любое время, по любой причине.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКапитализм заинтересованных сторон\u003c/strong\u003e заменяет капитализм акционеров. При капитализме акционеров компания существует для генерирования возвратов для своих владельцев. При капитализме заинтересованных сторон — модель, которую Шваб продвигает — компания существует для служения \"заинтересованным сторонам\", включая сотрудников, сообщества, правительства и \"окружающую среду\". На практике \"заинтересованная сторона\" означает тех, кого система обозначает — и система обозначает себя. Оценка ESG (Environmental, Social, and Governance) — это механизм принуждения: компании, которые не соответствуют критериям капитализма заинтересованных сторон, понижаются рейтинговыми агентствами, лишаются финансирования банками и исключаются из портфелей инвестиций.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонцентрация институционального владения\u003c/strong\u003e ускоряется. BlackRock, Vanguard и State Street вместе управляют более чем 22 триллионами долларов активов и владеют контрольными пакетами в почти всех крупных корпорациях мира. Эти фирмы одновременно являются крупнейшими домовладельцами в нескольких странах, приобретая жилую недвижимость в масштабе, который удаляет жилье с рынка владения полностью. Когда учреждения владеют всем и отдельные люди арендуют от учреждений, экономическая структура — неофеодализм — система, в которой небольшой класс владельцев контролирует все активы, а большой класс арендаторов получает доступ к этим активам на условиях, установленных владельцами.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eСистема цифровой идентичности\u003c/a\u003e предоставляет уровень аутентификации. \u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eСистема CBDC\u003c/a\u003e предоставляет уровень платежей. Система социального кредита предоставляет уровень соответствия. Вместе они создают экономику, в которой доступ ко всему — жилью, транспорту, пище, здравоохранению, образованию, развлечениям — обусловлен соответствием требованиям системы. Ты не владеешь. Ты имеешь доступ. И доступ может быть отозван.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"covid-19-кризис-возможности\"\u003eCOVID-19: Кризис возможности\u003c/h2\u003e\n\u003cp\u003eКлаус Шваб опубликовал \"COVID-19: Великая перезагрузка\" в июле 2020 года, менее чем через четыре месяца после того, как Всемирная организация здравоохранения объявила глобальную пандемию. Скорость публикации предполагает, что книга — и описанная в ней повестка дня — была подготовлена заранее, ожидая кризиса для оправдания его выпуска.\u003c/p\u003e\n\u003cp\u003eШваб написал:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Пандемия представляет редкое, но узкое окно возможности для размышления, воображения и перезагрузки нашего мира.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЯзык раскрывает. \"Окно возможности\" — это не язык ответа на кризис. Это язык эксплуатации — видение катастрофы как шанса внедрить изменения, которые были бы невозможны при нормальных условиях. Великая перезагрузка — это не ответ на COVID-19. COVID-19 — это катализатор для Великой перезагрузки — кризис, который оправдывает трансформацию.\u003c/p\u003e\n\u003cp\u003eПандемия предоставила испытательный полигон для каждого компонента Великой перезагрузки:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЦифровые учетные данные здоровья\u003c/strong\u003e — паспорта вакцинации, пропуска здоровья, системы проверки QR-кода — продемонстрировали, что население принимает требования цифровой идентификации для доступа к основным услугам. Инфраструктура, построенная для проверки вакцинации, — это та же инфраструктура, которая будет использоваться для проверки цифровой идентичности во всех контекстах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУдаленная работа и цифровая экономика\u003c/strong\u003e — локауты ускорили переход к цифровым платформам для работы, торговли, образования и социального взаимодействия. Физические предприятия были уничтожены, в то время как цифровые платформы (Amazon, Zoom, Google, Netflix) захватили экономическую активность. Результатом является экономика, все более зависящая от цифровой инфраструктуры, контролируемой небольшим числом корпораций.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВмешательство центрального банка\u003c/strong\u003e — экономическое разрушение, вызванное локаутами, было встречено беспрецедентной печатью денег и стимулированием центрального банка. Это вмешательство увеличило государственный долг, увеличило цены активов (принося пользу институциональным владельцам) и создало условия для введения CBDC как \"решения\" финансовой нестабильности, которую само вмешательство создало.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПрецеденты социального контроля\u003c/strong\u003e — локауты, мандаты на маски, мандаты на вакцинацию, ограничения на поездки, закрытие предприятий и \u003ca href=\"/censorship-industrial-complex/?lang=ru\"\u003eцензура инакомыслящих голосов\u003c/a\u003e установили прецеденты для государственного контроля над индивидуальным поведением, которые были бы немыслимы до 2020 года. Каждый прецедент нормализует следующий. Каждое чрезвычайное полномочие, раз осуществленное, становится доступным для следующего чрезвычайного положения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"повестка-дня-давоса-глобальное-управление-без-демократии\"\u003eПовестка дня Давоса: глобальное управление без демократии\u003c/h2\u003e\n\u003cp\u003eЕжегодное собрание Давоса функционирует как теневое правительство — собрание, где глобальная политика согласована между правительствами, корпорациями и международными организациями без демократического участия или ответственности. Политика, обсуждаемая и согласованная в Давосе, впоследствии реализуется правительствами, чьи лидеры являются членами или выпускниками ВЭФ.\u003c/p\u003e\n\u003cp\u003eМодель управления Давоса явно антидемократична. Она работает на принципе, что сложные глобальные вызовы не могут быть решены посредством демократических процессов — что избранные должностные лица, подотчетные своему населению, неспособны принять \"сложные решения\", которые требует глобальное управление. Модель \"мультисторонних заинтересованных сторон\" ВЭФ заменяет демократическую ответственность корпоративно-государственными партнерствами, которые работают вне избирательной политики.\u003c/p\u003e\n\u003cp\u003eЭто не скрыто. Шваб открыто писал об неадекватности демократического управления:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Правительства, предприятия и гражданское общество... должны демонстрировать, что они могут эффективно управлять вызовами, которые представляет четвертая промышленная революция.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eСлово \"управлять\" значительно. При демократическом управлении народ управляет. При техническом управлении элиты управляют. Великая перезагрузка заменяет самоуправление управлением — администрированием человеческих популяций классом экспертов, которые знают лучше, чем управляемые, что хорошо для них. Это не демократия. Это техократия — правление технически компетентными, как определено технически компетентными самими по себе.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"/depopulation-agenda-documents/?lang=ru\"\u003eПовестка дня депопуляции\u003c/a\u003e пересекается с Великой перезагрузкой на уровне управления ресурсами. Если вы верите, что планета не может выдержать ее текущее население при текущих уровнях потребления, то логика управления требует либо сокращения населения, либо снижения потребления — и Великая перезагрузка предоставляет основу для обоих.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"экономика-заинтересованных-сторон-esg-как-социальный-кредит-для-корпораций\"\u003eЭкономика заинтересованных сторон: ESG как социальный кредит для корпораций\u003c/h2\u003e\n\u003cp\u003eОценка окружающей среды, социального и управления (ESG) — это механизм внедрения капитализма заинтересованных сторон. Оценки ESG, назначаемые рейтинговыми агентствами (MSCI, Sustainalytics, Bloomberg), оценивают корпорации по критериям, включающим выбросы углерода, показатели разнообразия, состав совета директоров, практику цепи поставок и политическое выравнивание.\u003c/p\u003e\n\u003cp\u003eКомпании с низкими оценками ESG сталкиваются с: сокращенным доступом к рынкам капитала (банки и фонды отказываются инвестировать), более высокими затратами на заимствование, исключением из портфелей институциональных инвестиций (BlackRock, Vanguard и State Street вместе контролируют достаточно активов для определения корпоративного выживания), негативным охватом средств массовой информации и нормативным контролем.\u003c/p\u003e\n\u003cp\u003eОценка ESG — это корпоративный социальный кредит. Это делает для компаний то, что система социального кредита Китая делает для людей — присваивает оценку на основе соответствия критериям, определенным системой, и использует эту оценку для определения доступа к экономическому участию. Критерии не устанавливаются рынками, потребителями или акционерами. Они устанавливаются теми же учреждениями, которые управляют Великой перезагрузкой: ВЭФ, Организацией Объединенных Наций (через Принципы ответственного инвестирования) и рейтинговыми агентствами, которые служат обоим.\u003c/p\u003e\n\u003cp\u003eРезультатом является система, в которой корпоративное поведение определяется не спросом потребителей или интересом акционеров, а целями социальной инженерии небольшой группы учреждений. Компании, которые сопротивляются соответствию ESG, финансово штрафуются. Компании, которые его приветствуют, получают награду. Свободный рынок не устанавливает правила. ВЭФ устанавливает правила, а рынок их применяет.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-царство-которое-заменяет-все-царства\"\u003eБиблейское размышление: Царство, которое заменяет все царства\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И во дни царей тех Бог небесный воздвигнет царство, которое вовеки не разрушится, и царство это не будет передано другому народу; оно сокрушит и разрушит все царства, а само будет стоять вечно.\" — Даниил 2:44\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВеликая перезагрузка — это последняя в последовательности человеческих попыток построить универсальное царство — глобальную структуру управления, которая объединяет все человечество под единственной властью. Вавилон попробовал. Персия попробовала. Греция попробовала. Рим попробовал. Святая Римская империя попробовала. Британская империя попробовала. Лига наций попробовала. Организация Объединенных Наций пытается все еще. Каждая попытка не удается, потому что господство над всей землей принадлежит не человеческим планировщикам, а Тому, кто создал землю и доверил ее управление человечеству под Его властью.\u003c/p\u003e\n\u003cp\u003eВидение Даниила раскрывает конец всех человеческих царств — не через реформу или революцию, а через установление царства Божьего, которое \"сокрушит и разрушит все царства\". Великая перезагрузка не преуспеет. Не потому, что ее архитекторам не хватает ресурсов (они имеют неограниченные ресурсы) или потому что сопротивление их преодолеет (одного человеческого сопротивления недостаточно), а потому что царство Божие — это единственное царство, которое выдерживает, и каждое царство, которое встает против цели Божьей, предназначено для падения. \u003ca href=\"/who-pandemic-treaty-sovereignty/?lang=ru\"\u003eДоговор о пандемии ВОЗ\u003c/a\u003e стремится к глобальному управлению здравоохранением. Великая перезагрузка стремится к глобальному управлению экономикой. Город, отстоящий на 15 минут, стремится к глобальному управлению движением. Вместе они составляют наиболее амбициозную попытку унифицированного глобального контроля в истории человечества — и они встретят такой же конец, как и каждая предыдущая попытка. Камень, вырезанный не руками, разбит статую, и царство Всевышнего наполнит землю.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"найти-больше-информации\"\u003eНайти больше информации\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/171-Great_Reset_Rising.mp4\"\u003eGreat Reset Rising\u003c/a\u003e — План Клауса Шваба для будущего\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — Скоординированная глобальная повестка дня\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eDigital ID: The Global Identity Prison\u003c/a\u003e — Уровень аутентификации, требуемый для цифровой экономики Великой перезагрузки\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eCBDC Chains: The End of Financial Freedom\u003c/a\u003e — Система программируемых денег, которая применяет видение экономики Великой перезагрузки\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/depopulation-agenda-documents/?lang=ru\"\u003eThe Depopulation Agenda: Documents They Don't Want You to Read\u003c/a\u003e — Компонент сокращения населения в структе управления ресурсами\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eСтроители Вавилона сказали: \"Давайте создадим себе имя\". Клаус Шваб говорит: \"Давайте перезагрузим мир\". Амбиция идентична — единая система под централизованной властью, которая достигает до неба и заменяет необходимость в Боге. Но Бог смешал языки в Вавилоне, потому что ни одна человеческая власть не предназначена для управления всем человечеством. Великая перезагрузка будет рассеяна, как был рассеян Вавилон — не просто человеческим противостоянием, а суверенным действием Бога, который не будет делить свой трон с алгоритмами, его власть с техократами или его царство со строителями подделанных утопий. \"Почему мятутся народы, и племена замышляют тщетное? Восстают цари земли, и князья совещаются между собою против Господа и против Помазанника Его... Но Сидящий на небесах посмеется; Господь поругается над ними\" (Псалом 2:1-4). Великая перезагрузка — это тщетная вещь. Царство Божие — это единственная перезагрузка, которая выдерживает.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\
