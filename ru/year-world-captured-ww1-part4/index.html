лы, а от невежества — и величайшее невежество — это невежество, которое намеренно налагается. Год 1913 был наиболее важным годом в современной истории, однако большинство американцев не знают ничего о том, что произошло в этом году, кроме инаугурации Вудро Вильсона. В 1913 году финансовая, правовая и политическая инфраструктура постоянного глобального контроля была установлена в серии тщательно скоординированных ходов, которые трансформировали Соединённые Штаты из суверенной республики в долговую колонию, принадлежащую и управляемую контролируемым иезуитами банковским картелем.\u003c/p\u003e\n\u003cp\u003eОбщество Иисуса, военный орден Игнатия Лойолы, маневрировал к этому моменту более столетия. Хвастовство Тамбурини о управлении миром из его комнаты стало операционной реальностью в 1913 году. Иезуитам не нужны были армии, чтобы захватить мир — им нужны были три документа: 16-я поправка, 17-я поправка и Закон о Федеральном резерве. С этими тремя инструментами они захватили самую могущественную нацию в мире и, через неё, мир.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpents Curse\u003c/a\u003e говорит о древнем проклятии рабства — цепях, закованных не в железе, а в бумаге, в законодательстве, в мелком шрифте финансовых инструментов. И \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e определяет готовых слуг, которые провели этот захват — политиков, банкиров, адвокатов, которые продали свою нацию за тридцать сребреников.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"три-захвата-1913-года\"\u003eТри захвата 1913 года\u003c/h2\u003e\n\u003ch3 id=\"16-я-поправка-подоходный-налог\"\u003e16-я поправка: подоходный налог\u003c/h3\u003e\n\u003cp\u003e16-я поправка к Конституции Соединённых Штатов, ратифицированная 3 февраля 1913 года, дала Конгрессу право на взимание подоходного налога без апортировки между штатами. Это кажущееся техническое изменение имело революционные последствия: впервые федеральное правительство могло напрямую дотянуться до карманов каждого американца и извлечь часть его труда.\u003c/p\u003e\n\u003cp\u003eДо 16-й поправки федеральное правительство финансировалось в основном из тарифов и акцизных налогов — налогов на товары, не на людей. Подоходный налог трансформировал отношение между гражданином и государством от ограниченного обязательства к неограниченному извлечению. Нет предела подоходному налогу; ставка может быть установлена на любом уровне, который выбирает Конгресс. В теории (и на практике во время войны) правительство может взять 90% или более дохода гражданина.\u003c/p\u003e\n\u003cp\u003eПодоходный налог был необходим для обслуживания долга, который создаст Федеральный резерв. Без механизма прямого налогообложения граждан правительство не могло гарантировать возврат облигаций и банкнот, выпущенных системой Федерального резерва. Подоходный налог был не мерой доходов — это был механизм обслуживания долга, разработанный, чтобы гарантировать, что банковская элита всегда будет погашена.\u003c/p\u003e\n\u003cp\u003eРатификация 16-й поправки сама по себе окутана противоречиями. Исследование правового исследователя Уильяма Бенсона, задокументированное в \u003cem\u003eThe Law That Never Was\u003c/em\u003e, представляет доказательства того, что поправка никогда не была надлежащим образом ратифицирована требуемым количеством штатов. Если исследование Бенсона верно, вся система федерального подоходного налога покоится на мошеннической основе — что будет полностью согласуется с методом иезуитов строить мощь на обмане.\u003c/p\u003e\n\u003ch3 id=\"17-я-поправка-захват-сената\"\u003e17-я поправка: захват Сената\u003c/h3\u003e\n\u003cp\u003e17-я поправка, ратифицированная 8 апреля 1913 года, изменила способ избрания сенаторов Соединённых Штатов с назначения законодательными собраниями штатов на прямые народные выборы. Это изменение было представлено как демократическая реформа — дав \"людям\" прямой голос в выборе их сенаторов.\u003c/p\u003e\n\u003cp\u003eВ действительности, 17-я поправка уничтожила последний структурный сдерживающий фактор против федерального превышения полномочий. По исходной Конституции сенаторы выбирались законодательными собраниями штатов и служили представителями государственных правительств в федеральной системе. Это дало штатам прямое сдерживание федеральной мощи: если федеральное правительство превысило свои полномочия, законодательные собрания штатов могли отозвать или заменить своих сенаторов.\u003c/p\u003e\n\u003cp\u003eПрямые выборы разорвали эту связь. Сенаторы больше не отвечают государственным правительствам; они отвечают электорату — что означало, на практике, они отвечали тому, кто контролировал СМИ, финансирование кампании и машинерию партии. И кто это контролировал? Те же банковские и корпоративные интересы, которые контролировали Федеральный резерв.\u003c/p\u003e\n\u003cp\u003e17-я поправка, таким образом, завершила централизацию мощи в Вашингтоне, удалив единственное прямое представительство штатов в федеральном правительстве. В сочетании с подоходным налогом (который дал федеральному правительству неограниченный доход) и Федеральным резервом (который дал банковской элите контроль над денежным предложением), 17-я поправка создала систему управления, в которой люди верили, что они свободны, пока были, на самом деле, подданными финансовой олигархии.\u003c/p\u003e\n\u003ch3 id=\"закон-о-федеральном-резерве-захват-денег\"\u003eЗакон о Федеральном резерве: Захват денег\u003c/h3\u003e\n\u003cp\u003e23 декабря 1913 года президент Вудро Вильсон подписал Закон о Федеральном резерве в закон. Этот закон создал систему Федерального резерва — сеть из двенадцати региональных банков, контролируемых Советом управляющих в Вашингтоне, который, в свою очередь, контролировался частными банковскими интересами, которые владели акциями в региональных банках.\u003c/p\u003e\n\u003cp\u003eФедеральный резерв был представлен как государственное учреждение, разработанное для стабилизации банковской системы и предотвращения финансовых паник. В действительности, это был частный банковский картель, которому была предоставлена мощь:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСоздавать деньги из ничего\u003c/strong\u003e через механизм фракционного резервного кредитования\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстанавливать процентные ставки\u003c/strong\u003e, которые определили стоимость кредитования по всей экономике\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПокупать государственные облигации\u003c/strong\u003e, используя вновь созданные деньги, таким образом предоставляя кредит правительству под проценты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРегулировать банковскую систему\u003c/strong\u003e — что означало, что банки регулировали себя\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЗакон о Федеральном резерве был краеугольным камнем плана, находящегося в разработке с момента Паники 1907 года, которая была намеренно инженерна Дж. П. Морганом, чтобы создать общественный спрос на центральный банк. Закон был составлен в секрете на встречу на острове Джекил, Джорджия, в ноябре 1910 года — встречу, на которой присутствовали представители банковских интересов Морган, Рокфеллер и Ротшильд.\u003c/p\u003e\n\u003cp\u003eРотшильды, как давно стоящие финансовые агенты Ватикана, предоставили ссылку между американской банковской элитой и иезуитской структурой мощи. Федеральный резерв был не просто американским учреждением; это был узел в глобальной финансовой сети, контролируемой от Ватикана через банковскую династию Ротшильдов.\u003c/p\u003e\n\u003ch2 id=\"захват-завершен\"\u003eЗахват завершен\u003c/h2\u003e\n\u003ch3 id=\"сожаление-вильсона\"\u003eСожаление Вильсона\u003c/h3\u003e\n\u003cp\u003eВудро Вильсон, который подписал Закон о Федеральном резерве и подоходный налог в закон, предположительно выразил сожаление позже в жизни. Он широко цитируется как говорящий: \"Я самый несчастный человек. Я невольно разрушил мою страну\". Хотя точное происхождение этой цитаты оспаривается, переписка и выступления Вильсона с его последних лет действительно раскрывают растущее осознание, что он был манипулирован.\u003c/p\u003e\n\u003cp\u003eВильсон был продуктом иезуитской системы образования — он был образован в Принстоне, который, хотя и имел пресвитеровское происхождение, был глубоко инфильтрирован учёными, связанными с иезуитами, к ранней 20 веке. Его советник, полковник Эдвард Мандель Хаус, был иезуитским операционным работником, который служил ссылкой Вильсона на международную банковскую сеть. Роман Хауса \u003cem\u003ePhilip Dru: Administrator\u003c/em\u003e (опубликованный в 1912 году, за год до того, как Вильсон вступил в должность), описал будущую Америку, управляемую благодетельным диктатором, который устанавливает центральный банк и прогрессивный подоходный налог — именно программу, которую Вильсон бы реализовал.\u003c/p\u003e\n\u003ch3 id=\"машина-войны-активирована\"\u003eМашина войны активирована\u003c/h3\u003e\n\u003cp\u003eС подоходным налогом, обеспечивающим неограниченный доход, Федеральным резервом, обеспечивающим неограниченный кредит, и Сенатом под контролем банковских интересов, Соединённые Штаты были готовы к войне. Финансовая архитектура, созданная в 1913 году, была активирована в 1917 году, когда Америка вступила в Первую мировую войну и программа Liberty Bond начала извлекать богатство из американского народа в индустриальном масштабе.\u003c/p\u003e\n\u003cp\u003eПоследовательность неподвижна:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003e1913\u003c/strong\u003e: Создайте финансовую инфраструктуру (Федеральный резерв, подоходный налог)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1914-1916\u003c/strong\u003e: Используйте инфраструктуру для финансирования Союзников через кредиты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1917\u003c/strong\u003e: Официально вступите в войну и активируйте программу Liberty Bond\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1918-1919\u003c/strong\u003e: Выиграйте войну, переформатируйте мировую карту и соберите долги\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eКаждый шаг был спланирован, скоординирован и выполнен иезуитской контролируемой банковской сетью. Война была не ответом на убийство эрцгерцога; она была целью, для которой финансовая инфраструктура 1913 года была создана.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e раскрывает, как конституционная структура была систематически разобрана, чтобы позволить этот захват, и \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e прослеживает соединения тайного общества, которые сформировали американскую систему с её создания.\u003c/p\u003e\n\u003cp\u003eСвидетельство околосмертного переживания Хауарда Питтмана описывает иерархическое демоническое правительство, работающее из второго небеса — правительство, которое отражает земные структуры контроля, установленные в 1913 году. Федеральный резерв — это финансовое крыло этой демонической иерархии; подоходный налог — это его механизм правоприменения; и захваченный Сенат — его законодательный орган. Как Питтман был сказано: \"Ты зовёшь Меня Господом, но ты никогда не делал Меня Господом\". Америка называла себя свободной в 1913 году, пока подчинялась постоянному финансовому рабству. Смотрите: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eСм. также \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e и \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e для комплексной документации.\u003c/p 3e\n\u003cli\u003e\u003ca href=\"/war-money-looting-ww1-part5/?lang=ru\"\u003eWAR MONEY: Looting American Taxpayers During WWI Part 5\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/never-before-told-ww1-part1/?lang=ru\"\u003eThe NEVER BEFORE TOLD True History of World War 1 Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/rfk-grandpa-fleeced-americans/?lang=ru\"\u003eHow RFK's GRANDPA Fleeced American Citizens\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003e1913 был год, когда мир был захвачен. Не армиями, не вторжением, не завоеванием — но бумагой. Три документа, подписанные в закон в единственном календарном году, трансформировали самую мощную нацию на Земле в долговую колонию, принадлежащую картелю, контролируемому иезуитским орденом. Подоходный налог взял ваш труд. Федеральный резерв взял ваши деньги. 17-я поправка взяла вашу репрезентацию. И к времени, когда люди осознали, что произошло, цепи уже были заперты. Осия 4:6 предупредил, что народ Божий уничтожается из-за недостатка ведения. В 1913 году ведение было намеренно удержано — и уничтожение началось.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/history/\",\"className\":\"category-badge\",\"children\":\"history\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"ГОД, КОГДА МИР БЫЛ ЗАХВАЧЕН: ПМВ Часть 4\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"1913 — год, когда мир был зах
