e\u003e\n\u003cp\u003eВаш дом должен быть вашим убежищем. Вместо этого это герметичный ящик, заполненный токсичными химическими веществами. Строительные материалы, мебель, краска, ковер, чистящие средства — каждый элемент современного дома выделяет химические вещества, которые накапливаются в воздухе, который вы дышите восемь-шестнадцать часов каждый день. Качество воздуха в помещении в среднем в два-пять раз хуже, чем качество воздуха на открытом воздухе. В некоторых домах оно в сто раз хуже.\u003c/p\u003e\n\u003cp\u003eОткровение Ховарда Питтмана об NDE раскрыло духовное царство, где системы разрушения действуют невидимо. Три неба. Демоническая иерархия. 97,5 процента христиан отвергнуты. 95 процентов служат \"себе\". Каждое слово имеет значение (Матфей 12:36-37). Токсификация дома — наиболее интимного человеческого пространства — это один из невидимых способов, через которые начальства и силы Ефесянам 6:12 ведут войну против здоровья и сознания человека.\u003c/p\u003e\n\u003cp\u003eИезуиты — \"военная организация\" Лойолы \"абсолютной власти\" (Наполеон), управляющая \"всем миром\" (Тамбурини) — исторически понимали, что контроль над окружением контролирует население. \u003cem\u003eCatholic Confidential\u003c/em\u003e раскрывает их инфильтрацию \"замаскированную хитростью\". Токсификация домов — это не иезуитский заговор в прямом смысле, но она является продуктом институциональной промышленной системы, основы которой иезуиты помогли заложить — системы, которая приоритизирует прибыль, контроль и материальное рабство над человеческим благополучием.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eЛожь обманщика — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"химический-коктейль\"\u003eХимический коктейль\u003c/h2\u003e\n\u003ch3 id=\"формальдегид-химический-консервант-в-ваших-стенах\"\u003eФормальдегид: химический консервант в ваших стенах\u003c/h3\u003e\n\u003cp\u003eФормальдегид — это известный канцероген, классифицированный Всемирной организацией здравоохранения как канцероген для человека группы 1. Это также одно из наиболее распространенных химических веществ в строительных материалах. Фанера, ДСП, МДФ, ламинированные полы, изоляция и клеи содержат смолы на основе формальдегида, которые выделяются в дом в течение лет после установки.\u003c/p\u003e\n\u003cp\u003eНовые дома особенно опасны. \"Запах новенького дома\", который нравится многим домовладельцам, в значительной степени является формальдегидом и другими летучими органическими соединениями (ЛОС), выделяющимися из недавно установленных материалов. Это выделение наиболее интенсивно в первый год, но продолжается на более низких уровнях до десяти лет.\u003c/p\u003e\n\u003cp\u003eEPA оценивает, что средний американец проводит 90 процентов своего времени в помещении. Это означает, что средний американец дышит воздухом, загрязненным формальдегидом, примерно 22 часа в день. Кумулятивное воздействие в течение жизни — десятилетия дыхания известного канцерогена в месте, где вы чувствуете себя в безопасности — потрясающе.\u003c/p\u003e\n\u003ch3 id=\"огнетушащие-средства-тихий-нарушитель\"\u003eОгнетушащие средства: тихий нарушитель\u003c/h3\u003e\n\u003cp\u003eОгнетушащие химические вещества встроены в поролон мебели, матрасы, прокладки ковров, электронику и детские товары. Эти химические вещества — в первую очередь ПБДЭ (полибромированные дифениловые эфиры) и органофосфатные огнетушащие средства — являются нарушителями эндокринной системы, связанные с проблемами щитовидной железы, неврологическими повреждениями, репродуктивными проблемами и раком.\u003c/p\u003e\n\u003cp\u003eПромышленность огнетушащих средств была построена на лжи. В 1970-х годах табачная промышленность финансировала исследования, чтобы отвлечь внимание от сигарет как причины домашних пожаров. Вместо решения реального риска пожара (сигареты), промышленность лоббировала требования огнетушащих средств в мебели — создав огромный рынок для производителей химических веществ, заполнив дома токсичными соединениями, которые мигрируют из продуктов в домашнюю пыль.\u003c/p\u003e\n\u003cp\u003eДети, которые играют на полах и кладут предметы в рот, имеют наибольшее воздействие огнетушащих средств. Исследования обнаружили метаболиты огнетушащих средств в моче практически каждого протестированного американского ребенка. Долгосрочные последствия для здоровья этого универсального детского воздействия все еще открываются.\u003c/p\u003e\n\u003cp\u003eДокументы Agent131711 на Substack (agent131711.substack.com) показывают, как химическая промышленность, табачная промышленность и регуляторные органы сформировали альянс, который приоритизировал коммерческие интересы перед общественным здоровьем. Этот альянс — учебный пример захвата учреждений, который характеризует систему Сатурна — обеспечил, что дома заполнялись токсичными химическими веществами в течение десятилетий.\u003c/p\u003e\n\u003ch3 id=\"лос-невидимое-облако\"\u003eЛОС: невидимое облако\u003c/h3\u003e\n\u003cp\u003eЛетучие органические соединения (ЛОС) выделяются краской, чистящими средствами, освежителями воздуха, новой мебелью, химически чищенной одеждой, средствами личной гигиены и десятками других предметов домашнего обихода. Обычные ЛОС включают бензол (канцероген), толуол (нейротоксин), ксилол (вызывает повреждение дыхательных путей) и этиленгликоль (вызывает повреждение почек).\u003c/p\u003e\n\u003cp\u003eСредний дом содержит сотни источников ЛОС. Комбинированное выделение всех этих источников создает невидимое химическое облако, которое постоянно дышат жители дома. Современные дома, построенные для энергоэффективности, герметичны — что задерживает ЛОС внутри, создавая концентрации намного выше, чем в естественно вентилируемом здании.\u003c/p\u003e\n\u003cp\u003e\"Синдром больного здания\", выявленный в 1980-х годах, не ограничивается офисными зданиями. Дома — это больные здания тоже. Симптомы — головные боли, усталость, проблемы с дыханием, когнитивные нарушения, хроническое заболевание — принимаются как нормальные населением, которое не понимает, что его дом — это причина.\u003c/p\u003e\n\u003ch2 id=\"как-дома-стали-токсичными\"\u003eКак дома стали токсичными\u003c/h2\u003e\n\u003ch3 id=\"наследие-промышленной-революции\"\u003eНаследие промышленной революции\u003c/h3\u003e\n\u003cp\u003eДоиндустриальные дома строились из натуральных материалов: дерева, камня, глины, соломы, известковой штукатурки. Эти материалы не выделяют токсичные химические вещества. Они дышат — позволяя влаге и воздуху двигаться через стены, поддерживая естественное равновесие, которое современные герметичные дома не могут достичь.\u003c/p\u003e\n\u003cp\u003eПромышленная революция представила синтетические материалы: пластики, нефтехимические клеи, химически обработанную древесину, синтетическую изоляцию, нефтехимические краски. Каждое новшество было маркетировано как улучшение — более прочное, дешевле, долговечнее. Токсикологические последствия либо не были известны, либо игнорировались.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые помогли индустриализировать образовательную систему через свой \u003cem\u003eRatio Studiorum\u003c/em\u003e, способствовали интеллектуальной базе, которая приоритизировала технологический прогресс перед благополучием человека. Просвещение, которое иезуиты и продвигали, и со-выбирали, учило, что природа — это ресурс, подлежащий эксплуатации, а не система, которую следует уважать. Эта философия произвела промышленный дом — машину для жизни, как назвал его Ле Корбюзье — которая теперь отравляет его жильцов.\u003c/p\u003e\n\u003ch3 id=\"неудача-регулирования\"\u003eНеудача регулирования\u003c/h3\u003e\n\u003cp\u003eЗакон о контроле токсичных веществ (TSCA) 1976 года — основной закон США, регулирующий химические вещества — внес на полпути более 60 000 химических веществ без требования испытаний безопасности. Из примерно 85 000 химических веществ, находящихся в коммерческом использовании, менее 1 процента были тщательно протестированы на воздействие на здоровье.\u003c/p\u003e\n\u003cp\u003eЭто означает, что химические вещества в вашем доме — в ваших стенах, вашей мебели, вашем воздухе — никогда не были доказаны как безопасные. Они используются, потому что никогда не были доказаны опасными в соответствии с требованиями нормативной системы, предназначенной для защиты промышленности, а не потребителей.\u003c/p\u003e\n\u003cp\u003e97,5 процента Питтмана, отвергнувшие, отражают население, которое доверяет системе — которое дышит тем, что система предоставляет, ест то, что система подает, и верит тому, что система учит — без вопроса, служит ли система их интересам или своим собственным.\u003c/p\u003e\n\u003ch2 id=\"детоксификация-вашего-дома\"\u003eДетоксификация вашего дома\u003c/h2\u003e\n\u003ch3 id=\"практические-шаги\"\u003eПрактические шаги\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВентилируйте\u003c/strong\u003e: Открывайте окна регулярно, даже зимой. Перекрестная вентиляция резко снижает концентрацию ЛОС в помещении.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВыбирайте натуральные материалы\u003c/strong\u003e: При строительстве или ремонте используйте массивную древесину, натуральный камень, глиняную штукатурку и краски с нулевым содержанием ЛОС.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eУдалите ковер\u003c/strong\u003e: Ковер задерживает пыль, огнетушащие средства и ЛОС. Замените на твёрдые полы.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eИсключите освежители воздуха\u003c/strong\u003e: Синтетические ароматизаторы — один из наиболее концентрированных источников ЛОС в доме.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eИспользуйте натуральные чистящие средства\u003c/strong\u003e: Уксус, пищевая сода и кастильское мыло заменяют подавляющее большинство химических чистящих средств.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОчистка воздуха\u003c/strong\u003e: Фильтры HEPA и активированные угольные фильтры удаляют твердые частицы и некоторые ЛОС из воздуха в помещении.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eКомнатные растения\u003c/strong\u003e: Некоторые растения — паукообразные растения, лилии мира, змеиные растения — доказали, что поглощают формальдегид и другие ЛОС.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h3\u003e\n\u003cp\u003eВаш дом — это ваш храм. В писании тело называется храмом Святого Духа (1 Коринфянам 6:19), а дом — храмом тела. Токсичный дом производит токсичное тело, которое влияет на дух. Загрязнение домашнего пространства, в духовном смысле, является осквернением храма — актом войны начальствами и силами, которые стремятся уничтожить человечество через каждый доступный механизм.\u003c/p\u003e\n\u003cp\u003eДетоксификация вашего дома — это духовный акт. Это возвращение священного пространства от промышленной системы, которая его оскверняла. Каждый выбранный натуральный материал, каждое исключенное химическое вещество, каждое открытое окно — это акт сопротивления программе системы Сатурна материального рабства и физической деградации.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Исследование внутренней токсичности и промышленного химического воздействия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвидетельство NDE Ховарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСмотреть на YouTube\u003c/a\u003e — Духовное измерение загрязнения окружающей среды\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eСмотреть на YouTube\u003c/a\u003e — Институциональные системы экологического контроля\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\"\u003eCast Out of Paradise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/65-Smart_Dust.mp4\"\u003eSmart Dust\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/351-Broken_Weather.mp4\"\u003eBroken Weather\u003c/a\u003e\u0
