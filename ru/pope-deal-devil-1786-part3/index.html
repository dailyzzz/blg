03cp\u003eВатикан представлял себя на протяжении столетий как земной представитель Иисуса Христа — Викарий Христа, верховный духовный авторитет Христианства. Однако история папства раскрывает учреждение, которое в критические моменты выравнивалось не со Спасителем, которого оно претендует представлять, а с самыми силами тьмы, о которых Писание предупреждает. События 1786 года, когда папство эффективно капитулировало перед альянсом Иллюминатов-иезуитов, представляют одно из наиболее важных из этих выравниваний — сделку с дьяволом, которая переформировала духовный ландшафт западного мира и продолжает производить последствия до сегодня.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана о трех небесах и организованной демонической иерархии предоставляет духовную структуру для понимания этих событий. Второе небо — область демонической активности — работает через человеческие учреждения, и Ватикан служил одним из его основных инструментов на протяжении столетий. Откровение Питтмана о том, что 97,5% человечества идет на широкую дорогу к разрушению, приобретает особое значение, когда мы рассматриваем, что крупнейшее христианское учреждение в мире было скомпрометировано изнутри самыми силами, которые оно претендует противостоять.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов сидит в центре этого предательства. Подавленные Папой Климентом XIV в 1773 году за их преступления и заговоры, иезуиты не приняли свой роспуск — они заговорили свое восстановление, и события 1786 года представляют критический этап в этом восстановлении. Как заметил Наполеон: \"Иезуиты — это военная организация, а не религиозный орден... цель — власть.\" Треки \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e освещают духовные силы, которые наделили возвращение иезуитов и капитуляцию Ватикана.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"подавление-и-его-последствия\"\u003eПодавление и его последствия\u003c/h2\u003e\n\u003ch3 id=\"почему-климент-xiv-действовал\"\u003eПочему Климент XIV действовал\u003c/h3\u003e\n\u003cp\u003eПапа Климент XIV издал папскую бреве Dominus ac Redemptor 21 июля 1773 года, официально подавляя Общество Иисуса. Это было не импульсивное действие — это было кульминацией десятилетий давления от католических монархов по всей Европе, которые испытали разрушительные эффекты иезуитской манипуляции на первый перевод.\u003c/p\u003e\n\u003cp\u003eПортугалия изгнала иезуитов в 1759 году после обнаружения иезуитского участия в попытке убийства короля Иосифа I. Франция растворила орден в 1764 году после финансовых скандалов и политических интриг. Испания изгнала их в 1767 году при обстоятельствах настолько секретных, что конкретные причины были запечатаны в королевских архивах. Неаполь, Парма и другие государства последовали. К 1773 году иезуиты были изгнаны из практически каждой католической страны, и давление на папу действовать решительно было ошеломляющим.\u003c/p\u003e\n\u003cp\u003eКлимент XIV, осознавая опасность, с которой он сталкивался, как сообщается, сказал при подписании бреве: \"Я подписал свой смертный приговор.\" В течение четырнадцати месяцев он был мертв — официально от болезни, но широко считалось отравленным агентами иезуитов. Его тело разлагалось с необычной скоростью, деталь, отмеченная современниками, как согласованная с определенными типами отравления. Сообщение было неприятным: каждый, кто выступал против иезуитов, будет платить своей жизнью.\u003c/p\u003e\n\u003ch3 id=\"подпольные-годы\"\u003eПодпольные годы\u003c/h3\u003e\n\u003cp\u003eПериод между 1773 и 1814 годами — сорок один год официального подавления иезуитов — был периодом не иезуитского отсутствия, а иезуитской трансформации. Орден пережил открыто в протестантской Пруссии под Фредериком Великим и в православной России под Екатериной Великой — обе из которых признали ценность иезуитов как образователей и администраторов и обе из которых отказались обнародовать папскую бреве на своих территориях.\u003c/p\u003e\n\u003cp\u003eВ католических странах бывшие иезуиты работали через существующие сети — масонские ложи, академические учреждения, банковские дома и другие религиозные ордены, которые они инфильтрировали за столетия своей работы. Подавление заставило иезуитов совершенствовать методы скрытой работы, которые сделали бы их еще более опасными после их восстановления. Неспособные работать открыто, они научились работать невидимо — способность, которая доказала себя гораздо более опасной, чем их предыдущая открытая деятельность.\u003c/p\u003e\n\u003ch2 id=\"кризис-1786-года\"\u003eКризис 1786 года\u003c/h2\u003e\n\u003ch3 id=\"раскрытие-баварских-иллюминатов\"\u003eРаскрытие баварских иллюминатов\u003c/h3\u003e\n\u003cp\u003eВ 1785 году баварское правительство обнаружило и подавило иллюминатов, захватив документы, которые раскрыли планы организации по свержению всех установленных правительств и религий. Захваченные документы, опубликованные как \"Оригинальные письмена Ордена Иллюминатов\", выявили заговор поистине амбициозного масштаба — установление нового мирового порядка через систематическое разрушение существующих учреждений.\u003c/p\u003e\n\u003cp\u003eДокументы иллюминатов раскрыли связи с масонскими сетями по всей Европе и предоставили доказательства того, что иллюминаты успешно инфильтрировали ложи, университеты и правительства. Публикация этих документов создала кризис для каждого учреждения, связанного с иллюминатской сетью — включая католическую церковь, которая столкнулась с откровением того, что сети тайных обществ проникли в его собственные структуры.\u003c/p\u003e\n\u003ch3 id=\"дилемма-ватикана\"\u003eДилемма Ватикана\u003c/h3\u003e\n\u003cp\u003eК 1786 году Ватикан столкнулся с дилеммой экзистенциального масштаба. Подавленные иезуиты работали через те самые сети тайных обществ, которые документы иллюминатов раскрыли. Масонские ложи, которые Церковь осудила, были усеяны бывшими иезуитами, преследующими иезуитские цели через масонские каналы. И программа иллюминатов — разрушение всех установленных религий и правительств — угрожала временной и духовной авторитете Ватикана.\u003c/p\u003e\n\u003cp\u003eВатикан мог бы ответить, полностью выявив сеть — раскрыв иезуитскую инфильтрацию масонских лож, сотрудничая со светскими властями для разборки заговора и очищая свои собственные учреждения от скомпрометированных элементов. Это было бы правдивым курсом — курсом, требуемым заявленной миссией Церкви защищать истину против ошибки.\u003c/p\u003e\n\u003cp\u003eВместо этого Ватикан выбрал приспособление. Вместо того чтобы уничтожить сеть, папство стремилось управлять ей — перенаправить силы сетевой общественной власти на цели, совместимые с интересами Ватикана. Это приспособление была \"сделка с дьяволом\", которая определяла бы отношения между Ватиканом и сетью тайных обществ на столетия.\u003c/p\u003e\n\u003ch2 id=\"восстановление-иезуитов\"\u003eВосстановление иезуитов\u003c/h2\u003e\n\u003ch3 id=\"возврат\"\u003eВозврат\u003c/h3\u003e\n\u003cp\u003e7 августа 1814 года Папа Пий VII издал булу Sollicitudo omnium ecclesiarum, восстанавливающую Общество Иисуса. Восстановление пришло в момент максимальной уязвимости Ватикана — Наполеон заключил в тюрьму Пия VII, Папские штаты были растворены, и временная власть Церкви была на своем минимуме. Иезуиты, которые поддерживали свою организационную способность на протяжении подавления, предложили отчаянному папе что-то, в чем он отчаянно нуждался: дисциплинированная, глобально связанная организация, способная защищать интересы Ватикана.\u003c/p\u003e\n\u003cp\u003eУсловия восстановления гарантировали, что восстановленные иезуиты будут более мощными, чем подавленные иезуиты были. Орден вернулся с десятилетиями скрытого операционного опыта, с сетями, встроенными в каждое крупное учреждение западного мира, и с пониманием того, что их выживание зависело от того, чтобы сделать себя незаменимыми для Ватикана, а не угрожать ему.\u003c/p\u003e\n\u003cp\u003eВосстановление также подтвердило приспособление 1786 года. Ватикан выбрал работать с иезуитской сетью тайных обществ, связанных с иезуитами, а не против нее, и восстановление формализовало этот выбор. С 1814 года вперед иезуиты работали как самый мощный инструмент Ватикана — но инструмент со своей собственной повесткой дня, своими собственными сетями и своим собственным пониманием того, какой должна быть Церковь и что она должна делать.\u003c/p\u003e\n\u003ch2 id=\"духовное-предательство\"\u003eДуховное предательство\u003c/h2\u003e\n\u003ch3 id=\"что-ватикан-поздал\"\u003eЧто Ватикан поздал\u003c/h3\u003e\n\u003cp\u003eПриспособление Ватикана с сетью тайных обществ представляло духовное предательство самого фундаментального рода. Учреждение, которое претендовало представлять Христа на земле, выбрало выравнивание себя с организациями, которые явно служили врагу. Масонские ложи, которые Ватикан терпел, были посвящены поклонению \"Великому Архитектору\" — не Богу Библии, а люцифальному принципу, который масонский философ Альберт Пайк позже явно определил как Люцифер.\u003c/p\u003e\n\u003cp\u003eЭто была не богословская тонкость — это был фундаментальный выбор между светом и тьмой. Ватикан выбрал сохранение своей институциональной власти за счет своей духовной честности. Он выбрал временное выживание над духовной верностью. Он выбрал сделку с дьяволом над крестом Христа.\u003c/p\u003e\n\u003ch2 id=\"современное-папство\"\u003eСовременное папство\u003c/h2\u003e\n\u003ch3 id=\"от-приспособления-к-подчинению\"\u003eОт приспособления к подчинению\u003c/h3\u003e\n\u003cp\u003eТраектория от приспособления 1786 года до современного папства отслеживает прогрессивную сдачу независимости Ватикана контролю иезуитов. Каждый последующий папа был более глубоко встроен в иезуитско-тайную сетевую сеть, чем его предшественник. Избрание Папы Франциска в 2013 году — первый иезуитский папа в истории — представляет кульминацию этой траектории. Орден, который был подавлен в 1773 году, теперь занимает папский престол сам.\u003c/p\u003e\n\u003cp\u003eЗначение иезуитского папы не может быть переоценено. Орден иезуитов клянется послушанием папе, но генерал иезуитов — исторически известный как \"Черный Папа\" по власти, которую он оказывает за кулисами — часто был более могущественен, чем сам папа. Когда генерал иезуитов и папа выравниваются — или когда сам папа является иезуитом — традиционные проверки на иезуитской власти в Церкви устраняются.\u003c/p\u003e\n\u003cp\u003eПапство Папы Франциска было характеризовано как раз такого рода доктринальной и политической гибкостью, которую позволяет иезуитская казуистика. Его заявления о разводе, гомосексуальности, изменении климата и экономической политике последовательно выравниваются с прогрессивной программой, которую сеть тайных обществ продвигала на протяжении столетий. Это не совпадение — это плод сделки, заключенной в 1786 году, теперь полностью созревший после двух с половиной столетий.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство ближайшего смертельного опыта Говарда Питтмана — предупреждение об Конце времени, которое Бог дал ему\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: выявленные позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может находиться в подвале Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/171-Great_Reset_Rising.mp4\"\u003eGreat Reset Rising\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/illuminati-1666-part1/?lang=ru\"\u003eThe Jews, Jesus, and the Illuminati of 1666 Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/illusion-illuminati-masons-part4/?lang=ru\"\u003eWas It All AN ILLUSION: Illuminati and Masons Exposed Part 4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/one-world-religion-takeover-part7/?lang=ru\"\u003eThe One-World Religion Plot and the TAKEOVER Part 7\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eСделка Папы с дьяволом в 1786 году была не одним драматическим событием — это была формализация отношений, которые развивались на протяжении десятилетий и которые продолжали углубляться на протяж
