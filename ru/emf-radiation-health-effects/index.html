eСилы, которые нападают на человечество в этот век, невидимы. Вы не видите радиоволну. Вы не слышите импульс микроволны. Вы не ощущаете электромагнитное поле, генерируемое маршрутизатором Wi-Fi в вашем доме, сотовой башней за вашим окном или умным счётчиком на вашей стене - не сознательно. Но ваши клетки это ощущают. Ваши митохондрии на это реагируют. Ваши управляемые напряжением кальциевые каналы открываются под его влиянием. Ваши разрывы ДНК накапливаются из-за этого. Невидимый кризис здоровья ЭМИ излучения - это современное выражение древней истины: наиболее опасные силы в этом мире - это те, которых вы не видите, работающие против вас через механизмы, которые вам говорят, не существуют.\u003c/p\u003e\n\u003cp\u003eКак предупреждает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e, огонь может просвещать или разрушать - и наиболее опасный огонь - это тот, который горит без пламени, без дыма, без каких-либо видимых признаков того, что воздух сам стал враждебным. ЭМИ излучение - это именно такой огонь: энергетический вред человеческому телу, который не производит никаких немедленных ощущений, но накапливает ущерб во времени, и чьи эффекты систематически отрицаются отраслями, которые извлекают прибыль из этого.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"электромагнитная-среда\"\u003eЭлектромагнитная среда\u003c/h2\u003e\n\u003cp\u003eЛюди эволюционировали в электромагнитной среде, определяемой естественным магнитным полем Земли (резонансом Шумана, приблизительно 7,83 Гц) и видимым световым спектром солнца. На протяжении всей истории человечества до конца девятнадцатого века это были единственные значительные электромагнитные частоты, с которыми сталкивалось человеческое тело.\u003c/p\u003e\n\u003cp\u003eЗа последние 130 лет - и подавляющим образом в последние 30 - электромагнитная среда была преобразована, не оставляя никаких узнаваемых черт:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСотовые башни\u003c/strong\u003e непрерывно транслируют радиочастотное излучение (ЭМИ) по урбанистическим и пригородным ландшафтам\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWi-Fi маршрутизаторы\u003c/strong\u003e излучают микроволновое излучение практически в каждом доме, офисе, школе и общественном месте\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСмартфоны\u003c/strong\u003e передают и получают сигналы ЭМИ в дюймах от мозга и репродуктивных органов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУмные счётчики\u003c/strong\u003e излучают импульсы микроволнового излучения в домах с интервалом от секунд до минут\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнфраструктура 5G\u003c/strong\u003e вводит миллиметровые волны частот в городские среды беспрецедентной плотности, как задокументировано в \u003ca href=\"/five-g-activation-frequencies/?lang=ru\"\u003e5G Activation: What Frequencies Do to Living Cells\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстройства Bluetooth\u003c/strong\u003e - наушники, часы, фитнес-трекеры - передают радиосигналы прямо на кожу и внутрь слухового канала\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЛинии электропередач и электрическая проводка\u003c/strong\u003e генерируют чрезвычайно низкочастотные (СНЧ) магнитные поля по всему занимаемому помещению\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОбщее электромагнитное воздействие современного человека оценивается в квинтиллионы раз выше естественного электромагнитного фона, в котором эволюционировала человеческая биология. Это не дополнительное изменение. Это преобразование окружающей среды масштаба, сравнимого с введением промышленных химикатов в пищевое и водоснабжение - за исключением того, что ЭМИ излучение невидимо, не имеет запаха и не имеет вкуса, делая его идеальным оружием для отрицания.\u003c/p\u003e\n\u003ch2 id=\"наука-которую-они-подавляют\"\u003eНаука, которую они подавляют\u003c/h2\u003e\n\u003cp\u003eПозиция телекоммуникационной промышленности - поддерживаемая регуляторными органами по всему миру - состоит в том, что нетепловое излучение (радиоволны, микроволны) не может вызвать биологический вред на уровнях ниже теплового порога (точка, при которой ткань нагревается). Эта позиция основана на стандартах безопасности, установленных FCC в 1996 году, с использованием исследований 1980-х годов, и не была обновлена, чтобы отразить более 25 лет последующих научных находок.\u003c/p\u003e\n\u003cp\u003eРеальность, задокументированная в рецензируемой литературе, резко отличается:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe BioInitiative Report\u003c/strong\u003e (2007, обновлено 2012) — комплексный обзор более 3800 научных исследований международной рабочей группы учёных, исследователей и специалистов в области общественного здравоохранения — пришёл к выводу, что существующие стандарты безопасности недостаточны для защиты здоровья человека и что биологические эффекты происходят на уровнях воздействия намного ниже установленных пределов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсследование Национальной программы токсикологии (NTP)\u003c/strong\u003e (2018) — наиболее комплексное исследование на животных радиации сотовых телефонов, стоившее 30 миллионов долларов и охватившее 10 лет — обнаружило \"чистые доказательства\" того, что радиочастотное излучение вызывает рак у самцов крыс, конкретно злокачественные шванномы сердца и глиомы мозга. Те же типы опухолей были обнаружены в эпидемиологических исследованиях активных пользователей сотовых телефонов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсследование Ramazzini Institute\u003c/strong\u003e (2018) — проведённое независимо в Италии — воспроизвело находки NTP на уровнях воздействия, эквивалентных тем, которые испытывают люди, живущие рядом с сотовыми башнями, подтверждая, что эффекты рака происходили на уровнях намного ниже стандартов безопасности.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПроект REFLEX\u003c/strong\u003e (2004) — финансируемое Европейским союзом исследование, включившее 12 исследовательских групп в семи странах — обнаружило, что излучение ЭМИ на нетепловых уровнях вызывает разрывы цепей ДНК в человеческих клетках, эффект, который ранее считалось невозможным с нетепловым излучением.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсследование Interphone\u003c/strong\u003e (2010) — крупнейшее исследование случай-контроль использования сотовых телефонов и опухолей мозга, проведённое в 13 странах — обнаружило 40% повышенный риск глиомы (наиболее смертельной формы рака мозга) среди наиболее активных пользователей сотовых телефонов, с опухолями, возникающими преимущественно на стороне головы, где держался телефон.\u003c/p\u003e\n\u003cp\u003eЭто не периферийные исследования. Это крупнейшие, самые дорогостоящие и наиболее методологически строгие исследования последствий ЭМИ для здоровья, когда-либо проводившиеся. И их находки систематически игнорируются, преуменьшаются или атакуются отраслью и регуляторами, которых она поймала в ловушку.\u003c/p\u003e\n\u003ch2 id=\"механизм-управляемые-напряжением-кальциевые-каналы\"\u003eМеханизм: Управляемые напряжением кальциевые каналы\u003c/h2\u003e\n\u003cp\u003eЗащита промышленности на протяжении десятилетий зависела от утверждения, что существует правдоподобный биологический механизм, посредством которого нетепловое излучение могло вызвать вред ниже теплового порога. Это утверждение было разрушено работой Dr. Martin Pall, Professor Emeritus of Biochemistry в Washington State University.\u003c/p\u003e\n\u003cp\u003eИсследование Pall, опубликованное в рецензируемых журналах, включая Journal of Cellular and Molecular Medicine, продемонстрировало, что ЭМИ излучение активирует управляемые напряжением кальциевые каналы (VGCCs) в мембранах клеток. Эти каналы, которые регулируют поток ионов кальция в и из клеток, исключительно чувствительны к электромагнитным силам - приблизительно в 7,2 миллионов раз более чувствительны, чем тепловые эффекты, на которых основаны стандарты безопасности.\u003c/p\u003e\n\u003cp\u003eКогда VGCC активируются ЭМИ воздействием, они позволяют избыточному кальцию проникнуть в клетки, триггируя каскад биологических эффектов, включая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОкислительный стресс\u003c/strong\u003e — производство активных форм кислорода и азота, которые повреждают ДНК, белки и липиды\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПовреждение ДНК\u003c/strong\u003e — как одноцепочечные, так и двухцепочечные разрывы, последние наиболее вероятно ведущие к раку\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОтвет клеточного стресса\u003c/strong\u003e — активация белков теплового шока и других маркеров стресса на нетепловых уровнях\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение гематоэнцефалического барьера\u003c/strong\u003e — позволяя токсинам, патогенам и другим веществам проникать в мозг, которые в норме были бы исключены\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНеврологические эффекты\u003c/strong\u003e — включая нарушенный сон, нарушенное познание, головные боли и изменённую функцию нейротрансмиттеров\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСниженное производство мелатонина\u003c/strong\u003e — способствуя нарушениям сна и удаляя первичный эндогенный антиоксидант организма\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВред репродуктивной системе\u003c/strong\u003e — сниженное количество, подвижность и жизнеспособность сперматозоидов; повышенное повреждение ДНК в сперме; изменённые уровни гормонов\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eМеханизм VGCC объясняет, почему биологические эффекты происходят на уровнях в миллионы раз ниже теплового порога, почему стандарты безопасности промышленности научно устарели и почему паттерн проблем со здоровьем, о которых сообщают люди, живущие рядом с сотовыми башнями — бессонница, головные боли, усталость, нарушение познания, сердечные перебои — соответствует дисрегуляции кальциевого канала.\u003c/p\u003e\n\u003ch2 id=\"проблема-умных-счётчиков\"\u003eПроблема умных счётчиков\u003c/h2\u003e\n\u003cp\u003eКак подробно описано в нашей статье \u003ca href=\"/smart-meters-surveillance-home/?lang=ru\"\u003eSmart Meters: Surveillance Inside Your Home\u003c/a\u003e, умные счётчики, установленные в домах и зданиях, излучают импульсы микроволнового излучения с интервалами от нескольких секунд до нескольких минут. В отличие от использования сотовых телефонов, которое периодично и добровольно, воздействие умного счётчика непрерывно, непроизвольно и происходит по всему дому - включая спальни, где люди спят.\u003c/p\u003e\n\u003cp\u003eУстановки умных счётчиков были связаны с широко распространенными сообщениями о симптомах здоровья, включая бессонницу, головные боли, звон в ушах, сердечные перебои, усталость, нарушение познания и кровотечения из носа. Несколько муниципалитетов задокументировали скачки жалоб на здоровье после развёртывания умного счётчика.\u003c/p\u003e\n\u003cp\u003eУмный счётчик - это не просто опасность для здоровья. Как задокументировано в нашей статье, это устройство наблюдения, которое контролирует потребление энергии в реальном времени, раскрывая, когда жители дома, когда они спят, какие приборы они используют и как они живут - информация, которая передаётся беспроводным способом коммунальным компаниям и потенциально совместно используется третьими сторонами.\u003c/p\u003e\n\u003ch2 id=\"эскалация-5g\"\u003eЭскалация 5G\u003c/h2\u003e\n\u003cp\u003eРазвёртывание технологии 5G представляет экспоненциальную эскалацию электромагнитной окружающей среды. Как задокументировано в \u003ca href=\"/five-g-activation-frequencies/?lang=ru\"\u003e5G Activation: What Frequencies Do to Living Cells\u003c/a\u003e, 5G работает на значительно более высоких частотах, чем предыдущие поколения (включая миллиметровые волны в диапазоне 24-100 ГГц) и требует намного более плотной сети малых сотовых антенн - одна на каждые 100-300 метров в городских районах.\u003c/p\u003e\n\u003cp\u003eЭто означает, что расстояние между радиочастотными передатчиками и человеческими телами резко сокращается, количество одновременных воздействий увеличивается, и частоты, используемые в взаимодействии с человеческим телом, изучены минимально. Развёртывание 5G было освобождено от проверки окружающей среды согласно приказу FCC, изданному в 2018 году - то есть наиболее драматичное преобразование электромагнитной окружающей среды в истории человечества было развёрнуто без какой-либо оценки его воздействия на окружающую среду или здоровье.\u003c/p\u003e\n\u003cp\u003eОтвет телекоммуникационной отрасли на проблемы безопасности следует тому же сценарию, используемому табачной, фармацевтической и химической отраслями: финансируйте благоприятные исследования, атакуйте неблагоприятные исследования, поймайте регуляторные органы и повторяйте мантру, что \"наука решена\", систематически предотвращая проведение науки.\u003c/p\u003e\n\u003ch2 id=\"gwen-башни-и-военная-инфраструктура\"\u003eGWEN Башни и военная инфраструктура\u003c/h2\u003e\n\u003cp\u003eКак исследовано в нашей статье \u003ca href=\"/gwen-towers-not-5g/?lang=ru\"\u003eGWEN Towers: What If They're NOT 5G Towers?\u003c/a\u003e, электромагнитная инфраструктура, которая одеяет Соединённые Штаты, не ограничивается коммерческой телекоммуникацией. Ground Wave Emergency Network (GWEN) и её преемники представляют военную коммуникационную инфраструктуру, возможности которой выходят за рамки того, что открыто раскрывается.\u003c/p\u003e\n\u003cp\u003eРазличие между гражданской и военной электромагнитной инфраструктурой было размыто до точки стирания. Сотовые башни несут оборудование военной связи. Спутники служат как коммерческим, так и военным функциям. Электромагнитная окружающая среда, которая окружает каждого американца, - это двойного назначения инфраструктура - построенная для коммерческого удобства и одновременно для военной возможности.\u003c/p\u003e\n\u003cp\u003eКак предупреждает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e, огонь, который наполняет пещеру, невидим для тех, кто в ней живёт. Электромагнитное излучение, которое наполняет каждый дом, школу и рабочее место, - это современный эквивалент - невидимый вред, который жители не видят, не ощущают и о котором им говорят, что он не существует.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/63-Bluetooth_Bodies-MAC_Address_Humans.mp4\"\u003eBluetooth Bodies\u003c/a\u003e — Цифровые сигналы, исходя
