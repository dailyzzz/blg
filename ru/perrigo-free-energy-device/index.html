03c/blockquote\u003e\n\u003cp\u003eВ забытых углах американской истории есть истории об изобретателях, которые построили устройства, генерирующие энергию как бы из ничего — устройства, которые угрожали свергнуть нефтяную энергетическую монополию и освободить человечество от его зависимости от ископаемого топлива. Эти изобретатели были замолчаны. Их устройства исчезли. Их имена были стерты из истории. И энергетическая монополия продолжалась, десятилетие за десятилетием, взимая плату с мира за то, что должно было быть свободным.\u003c/p\u003e\n\u003cp\u003eХ.Е. Перриго — один такой изобретатель. Его история — краткая, таинственная и в конце концов трагическая — иллюстрирует судьбу, ожидающую любого, кто вызывает вызов энергетическому учреждению. Перриго построил устройство. Устройство, видимо, работало. Затем Перриго и его устройство исчезли из исторической записи, оставляя позади только фрагменты доказательств того, что что-то замечательное было создано и что-то ужасное было сделано, чтобы это подавить.\u003c/p\u003e\n\u003cp\u003eХовард Питман видел во время своего НБО, что демоническая иерархия организуется, чтобы красть, убивать и разрушать. Подавление технологии свободной энергии — кража в космическом масштабе — кража наследия человечества, кража божественного обеспечения через природные энергии творения, кража самой свободы. 97,5% из тех, кто терпит неудачу, платят свои счета за электричество, заполняют свои бензиновые баки и отапливают свои дома, не зная никогда, что энергия, которую они платят, может быть свободной.\u003c/p\u003e\n\u003cp\u003eНаполеон назвал иезуитов \"военной организацией\", преследующей \"абсолютную власть\". Контроль энергии — это контроль цивилизации. Иезуиты и их союзные тайные общества — работающие через энергетическую империю Рокфеллера и ее преемников — обеспечили, что технология свободной энергии остается подавленной, её изобретатели молчат, и её история стирается. Папа Климент XIV был отравлен за неповиновение им. Изобретатели свободной энергии встретили аналогичные судьбы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"устройство-перриго\"\u003eУстройство Перриго\u003c/h2\u003e\n\u003ch3 id=\"что-мы-знаем\"\u003eЧто мы знаем\u003c/h3\u003e\n\u003cp\u003eХ.Е. Перриго, как сообщается, разработал электромагнитное устройство в начале 20-го века, которое генерировало больше энергии, чем потребляло — очевидное нарушение закона сохранения энергии, как обычно понимается. Устройство было описано как:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСамоходный электромагнитный мотор/генератор\u003c/strong\u003e, который производил полезный электрический выход\u003c/li\u003e\n\u003cli\u003eНа основе принципов \u003cstrong\u003eэлектромагнитного резонанса\u003c/strong\u003e и \u003cstrong\u003eманипуляции магнитным потоком\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eСпособный питать бытовое оборудование без внешнего топлива или источника питания\u003c/li\u003e\n\u003cli\u003eПродемонстрированный свидетелям, которые подтвердили его работу\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eДетали устройства Перриго скудны — что само по себе значительно. Историческая запись была систематически лишена информации об изобретателях свободной энергии, что делает исследование сложным по замыслу. Остаются фрагменты: упоминания в газетах, заявки на патенты, переписка и свидетельства свидетелей, видевших работающие устройства.\u003c/p\u003e\n\u003ch3 id=\"что-произошло\"\u003eЧто произошло\u003c/h3\u003e\n\u003cp\u003eПаттерн, постигший Перриго, — это тот же паттерн, который постиг практически каждого изобретателя свободной энергии в истории:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eИзобретение\u003c/strong\u003e: Изобретатель строит работающее устройство\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДемонстрация\u003c/strong\u003e: Устройство показывается свидетелям, инвесторам или прессе\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВнимание\u003c/strong\u003e: Демонстрация привлекает внимание влиятельных интересов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПодавление\u003c/strong\u003e: Изобретатель куплен, угрожается, дискредитирован или устранен\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсчезновение\u003c/strong\u003e: Устройство исчезает — конфисковано, уничтожено или спрятано\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСтирание\u003c/strong\u003e: История изобретателя удалена из исторической записи\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eИстория Перриго следует этому паттерну. Устройство было построено, оно было продемонстрировано, и затем оба устройство и его изобретатель исчезли из публичного осведомления. Энергетическое учреждение продолжало беспрепятственно.\u003c/p\u003e\n\u003ch2 id=\"подавление-свободной-энергии\"\u003eПодавление свободной энергии\u003c/h2\u003e\n\u003ch3 id=\"энергетическая-монополия-рокфеллера\"\u003eЭнергетическая монополия Рокфеллера\u003c/h3\u003e\n\u003cp\u003eПодавление технологии свободной энергии должно быть понято в контексте энергетической монополии Рокфеллера. Standard Oil — компания Джона Д. Рокфеллера — контролировала примерно 90% американского нефтяного рафинирования к 1880-м годам. Хотя Standard Oil была разделена Верховным судом в 1911 году, компании-преемники (ExxonMobil, Chevron и т.д.) продолжают доминировать в глобальной энергетической промышленности.\u003c/p\u003e\n\u003cp\u003eБогатство и власть династии Рокфеллеров зависят от постоянного использования человечеством ископаемого топлива. Технология свободной энергии — любая технология, которая генерирует полезную энергию без потребления ископаемого топлива — является экзистенциальной угрозой для этой империи. Рокфеллеры поэтому интенсивно инвестировали в подавление свободной энергии:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПриобретение патентов\u003c/strong\u003e: Компании приобретают патенты на свободную энергию и снимают их с производства\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРегуляторный захват\u003c/strong\u003e: Энергетические положения написаны так, чтобы исключить альтернативные технологии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКонтроль академии\u003c/strong\u003e: Финансируемые Рокфеллером университеты преподают физику так, чтобы свободная энергия казалась невозможной\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКонтроль СМИ\u003c/strong\u003e: Основные СМИ отвергают исследования свободной энергии как лженауку\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПодавление изобретателя\u003c/strong\u003e: Отдельные изобретатели сталкиваются с правовыми, финансовыми и физическими угрозами\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"роль-физического-учреждения\"\u003eРоль физического учреждения\u003c/h3\u003e\n\u003cp\u003eАкадемическое физическое учреждение служит вратником против свободной энергии. Любой исследователь, который утверждает, что разработал устройство, генерирующее больше энергии, чем потребляет, немедленно отвергается как мошенник или чудак, потому что законы термодинамики \"запрещают\" такое устройство.\u003c/p\u003e\n\u003cp\u003eНо законы термодинамики были сформулированы в 19-м веке на основе наблюдений тепловых двигателей — паровых двигателей и их преемников. Они описывают поведение закрытых систем в тепловом равновесии. Они не обязательно применяются к:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОткрытые системы\u003c/strong\u003e, которые рисуют энергию из окружающей среды\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭлектромагнитные системы\u003c/strong\u003e, которые используют нулевую точку энергии или колебания вакуума\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРезонансные системы\u003c/strong\u003e, которые усиливают энергию через конструктивную интерференцию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНовые физические явления\u003c/strong\u003e, не объясненные в 19-м веке термодинамике\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПолное отвержение физическим учреждением свободной энергии служит той же функции, что и мем \"оловянной шляпы\": оно предотвращает расследование, запуская автоматический слом. И это отвержение принудительно то же самыми финансируемыми Рокфеллером учреждениями, которые получают выгоду от энергетической монополии.\u003c/p\u003e\n\u003ch3 id=\"никола-тесла-наиболее-известное-подавление\"\u003eНикола Тесла: наиболее известное подавление\u003c/h3\u003e\n\u003cp\u003eНаиболее известное подавление свободной энергии включает Николу Тесла, который утверждал, что разработал технологию для беспроводной передачи энергии и извлечения энергии из окружающей среды. Башня Wardenclyffe Тесла — разработанная для беспроводной передачи мощности — была снесена после того, как Дж.П. Морган отозвал финансирование, узнав, что система Тесла не могла быть измерена (и, таким образом, не могла быть использована для взимания платы с клиентов).\u003c/p\u003e\n\u003cp\u003eИстория Тесла устанавливает шаблон: энергия, которая не может быть измерена, не может быть монетизирована, и энергия, которая не может быть монетизирована, не может быть разрешена существовать. Энергетическая монополия — это не о предоставлении энергии — это о продаже энергии. Свободная энергия устраняет продажу, и, таким образом, должна быть устранена.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"божественное-обеспечение-подавленное\"\u003eБожественное обеспечение, подавленное\u003c/h3\u003e\n\u003cp\u003eБог создал вселенную, наполненную энергией. Солнце излучает больше энергии за одну секунду, чем человечество использует в году. Магнитное поле земли содержит обширную энергию. Квантовый вакуум содержит энергию в каждой точке пространства. Энергия не редка — она обильна за пределами человеческого понимания.\u003c/p\u003e\n\u003cp\u003eРедкость энергии создана искусственно. Это ложь — поддерживаемая энергетической монополией, принудительная физическим учреждением и защищенная разведывательными агентствами, которые служат династии Рокфеллера и ее союзным тайным обществам.\u003c/p\u003e\n\u003cp\u003eХовард Питман видел, что основная цель демонической иерархии — разделить человечество от божественного обеспечения. Энергетическая монополия достигает этого, вставляя себя между человечеством и обильной энергией, которую Бог создал. Вместо получения энергии свободно от творения, человечество должно купить это у корпораций — платить за то, что Бог дал свободно.\u003c/p\u003e\n\u003cp\u003eЭто паттерн системы Рокфеллера: украсть божественное обеспечение, переупаковать его, продать его назад, и наказать любого, кто пытается получить доступ к нему напрямую. Это применяется к медицине (естественное исцеление подавлено, лекарства проданы), еде (органическое сельское хозяйство подавлено, переработанная пища продана) и энергии (свободная энергия подавлена, ископаемое топливо продано).\u003c/p\u003e\n\u003ch3 id=\"иезуитская-энергетическая-связь\"\u003eИезуитская энергетическая связь\u003c/h3\u003e\n\u003cp\u003eУчастие иезуитского ордена в энергетическом секторе распространяется через их сеть университетов, их связи с разведывательным сообществом и их влияние над обширной финансовой империей Ватикана. Иезуитски-обученные ученые работают в физических отделах, которые объявляют свободную энергию невозможной. Иезуитски-связанные разведывательные оперативники подавляют изобретателей, которые доказывают иное. И стремление иезуитского ордена к \"абсолютной власти\" служится энергетической системой, которая делает каждое человеческое существо зависимым от корпораций для их выживания.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследование подавления свободной энергии и истории изобретателей\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство НБО Ховарда Питмана\u003c/a\u003e
