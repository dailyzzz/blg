u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНет более суровое предупреждение во всем Писании, чем то, которое Христос произносит относительно вреда детям. Приговор с мельничным жерновом — смерть утопления с камнем на шее — предоставляется не как максимальный штраф, но как предпочтительная альтернатива фактическим последствиям, которые ожидают тех, кто вредит малым. Если Сын Бога зарезервирует Его самый пугающий язык для защиты детей, то преднамеренное загрязнение пищи, которая поддерживает жизнь новорожденного, это акт, который вызывает суд, выходящий за пределы человеческого понимания.\u003c/p\u003e\n\u003cp\u003eТестирование штата Флорида подтвердило, что независимые исследователи предупреждали годами: коммерческие детские смеси — единственный источник питания для миллионов младенцев, которые не вскармливаются грудью — содержат мышьяк, ртуть и свинец. Это не незначительные загрязнители на пренебрежимо низких уровнях. Это нейротоксины, присутствующие в продуктах, специально производимых для потребления развивающимися мозгами, которые во много раз более уязвимы к токсическому воздействию, чем взрослые мозги.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/93-The_Great_Exchange.mp4\"\u003eВеликий обмен\u003c/a\u003e говорит о космической сделке в сердце искупления — жизнь обменена на смерть, невинность на вину. То, что происходит с младенцами через загрязненную смесь, это инверсия этого священного обмена: невинность отравляется, и корпорации, ответственные, обмениваются здоровьем детей на прибыль. И \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/105-The_Second_Adam.mp4\"\u003eВторой Адам\u003c/a\u003e напоминает нам, что Христос пришел восстановить то, что первый Адам потерял — включая защиту невинного.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"находки-флориды\"\u003eНаходки Флориды\u003c/h2\u003e\n\u003cp\u003eШтат Флорида провел тестирование коммерчески доступных продуктов детской смеси как часть расширенной инициативы безопасности пищи. Результаты подтвердили наличие множественных тяжелых металлов в продуктах, продаваемых на полках магазинов по всему штату — и по расширению, по всей стране, так как это национально распределяемые бренды.\u003c/p\u003e\n\u003ch3 id=\"мышьяк\"\u003eМышьяк\u003c/h3\u003e\n\u003cp\u003eМышьяк — карциноген группы 1, классифицированный Международным агентством исследования рака (IARC) — был обнаружен в образцах детской смеси. Воздействие мышьяка у младенцев связано с нейродevelopmental повреждением, дисфункцией иммунной системы, повышенным риском рака и нарушением гормональных систем. Нет известного безопасного уровня воздействия мышьяка для младенцев.\u003c/p\u003e\n\u003cp\u003eОсновной путь загрязнения мышьяком в детской смеси — через ингредиенты на основе рисовой муки. Рис поглощает мышьяк из почвы и воды более эффективно, чем любое другое обычное зерно, а рисовая мука, рисовый сироп и крахмал рисовой крупы — обычные ингредиенты в продуктах детской смеси. Загрязнение — это не случайность — это предсказуемое следствие использования культуры, известной концентрирующей мышьяк, в качестве основного ингредиента в младенческой пище.\u003c/p\u003e\n\u003ch3 id=\"ртуть\"\u003eРтуть\u003c/h3\u003e\n\u003cp\u003eРтуть была обнаружена в образцах смеси. Ртуть — один из самых мощных нейротоксинов, известных науке, и развивающийся младенческий мозг чрезвычайно чувствителен к его эффектам. Даже нанограммовые количества ртути могут нарушить нейродevelopmental процессы в критические первые месяцы жизни, когда нейральные соединения формируются со скоростью свыше одного миллиона в секунду.\u003c/p\u003e\n\u003cp\u003eЗагрязнение ртутью в детской смеси может исходить из множественных источников: загрязненная вода, используемая при производстве, оборудование для обработки, содержащее ртуть, экологическое загрязнение источников ингредиентов и глобальное распределение ртути через атмосферное осаждение от промышленных процессов. Тот факт, что ртуть обнаруживается в продукте, потребляемом новорожденными, является обвинением каждого регуляторного органа, который одобрил эти продукты как безопасные.\u003c/p\u003e\n\u003ch3 id=\"свинец\"\u003eСвинец\u003c/h3\u003e\n\u003cp\u003eСвинец был обнаружен в образцах смеси. Как и ртуть и мышьяк, свинец — мощный нейротоксин без известного безопасного уровня воздействия. CDC явно указал, что нет безопасного уровня свинца в крови у детей. Воздействие свинца в младенчестве связано с постоянным снижением когнитивных функций, поведенческими расстройствами, сниженным IQ и повышенным риском преступного поведения позже в жизни. Ущерб необратим.\u003c/p\u003e\n\u003cp\u003eЗагрязнение свинцом в детской смеси может исходить из загрязнения почвы сельскохозяйственных ингредиентов, оборудования для обработки, материалов упаковки и систем водоснабжения. Несмотря на десятилетия регуляторного внимания, свинец продолжает появляться в продовольственной цепи — и продолжает появляться в одном продукте питания, где его наличие наиболее важно.\u003c/p\u003e\n\u003ch2 id=\"масштаб-проблемы\"\u003eМасштаб проблемы\u003c/h2\u003e\n\u003cp\u003eНаходки Флориды — это не изолированная аномалия. Они согласуются с более широкими расследованиями загрязнения тяжелыми металлами продуктов для младенцев и детского питания.\u003c/p\u003e\n\u003ch3 id=\"выводы-конгрессионального-расследования\"\u003eВыводы конгрессионального расследования\u003c/h3\u003e\n\u003cp\u003eРасследование Конгресса США 2021 года, возглавляемое Подкомитетом по экономической политике и защите потребителей, рассмотрело внутренние документы крупных производителей детского питания и обнаружило:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЗначительные уровни мышьяка, свинца, кадмия и ртути\u003c/strong\u003e в продуктах из множества крупных брендов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВнутреннее тестирование компаний\u003c/strong\u003e, показывающее уровни тяжелых металлов, которые значительно превышали уровни, которые компании сами считали безопасными\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПреднамеренные решения\u003c/strong\u003e некоторых компаний продавать продукты, которые они знали, содержали повышенные уровни тяжелых металлов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОтсутствие регуляторного принудительного исполнения\u003c/strong\u003e — FDA не установила максимально допустимые уровни для большинства тяжелых металлов в детском питании\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОтчет Конгресса назывался \"Детское питание загрязнено опасными уровнями мышьяка, свинца, кадмия и ртути\", и его выводы вызвали возмущение — но привели к минимальному регуляторному действию. Продукты, определенные как загрязненные, остаются на полках магазинов.\u003c/p\u003e\n\u003ch3 id=\"масштаб-воздействия-младенцев\"\u003eМасштаб воздействия младенцев\u003c/h3\u003e\n\u003cp\u003eПриблизительно 75% младенцев в Соединенных Штатах потребляют детскую смесь в какой-то момент в течение их первого года жизни. Для младенцев, которые исключительно на детской смеси, смесь является их единственным источником пищи в течение первых четырех-шести месяцев — периода беспрецедентного мозгового развития.\u003c/p\u003e\n\u003cp\u003eПитаемый смесью младенец, потребляющий загрязненный продукт, получает воздействие тяжелых металлов при каждом кормлении, многократно в день, в течение наиболее неврологически уязвимого периода развития человека. Совокупный эффект этого повторного воздействия не адекватно захватывается одноразовым тестированием. То, что имеет значение, это общее бремя тела, накопленное в течение недель и месяцев исключительного потребления.\u003c/p\u003e\n\u003ch2 id=\"загрязнение-крови-и-завет\"\u003eЗагрязнение крови и завет\u003c/h2\u003e\n\u003cp\u003eДоктор Ана Михалцеа, доктор философии, задокументировала на своем Substack (\u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e) как тяжелые металлы в крови служат не только как токсикаты, но как структурные компоненты для самосборной нанотехнологии. Металлы, такие как алюминий, железо и барий, были идентифицированы в структурах, формирующихся в крови под темнопольной микроскопией. Тяжелые металлы, которые питаются младенцам через загрязненную смесь, не только отравляют развивающиеся мозги — они могут быть посеяны развивающейся кровью с сырыми материалами для технологической сборки.\u003c/p\u003e\n\u003cp\u003eКровь младенца — самая чистая кровь на земле. Это вновь произведенная, вновь текущая кровь, несущая жизненную силу, которую Бог вдохнул в новую душу. Левит 17:11 объявляет, что жизнь плоти в крови — и для младенца, эта кровь — основание, на котором будет построена вся человеческая жизнь. Загрязнить эту кровь тяжелыми металлами с самого первого кормления — это порвать основание жизни до того, как она даже начнет.\u003c/p\u003e\n\u003cp\u003eЭто не неосторожность. Неосторожность подразумевает невежество в отношении вреда. Производители знают. Регуляторы знают. Конгрессионального расследование доказало, что они знают. Они продолжают, потому что система, управляющая производством пищи, производством фармацевтики и регуляторным надзором, не разработана для защиты детей. Она разработана для защиты прибыли, и она работает под влиянием духа, который Писание определяет явно.\u003c/p\u003e\n\u003cp\u003eОткровение 18:23 предупреждает, что фармакею — колдовством через фармацевтические и химические манипуляции — все народы были обмануты. Обман начинается при рождении, в бутылке, в смеси, в тяжелых металлах, которые входят в кровь младенца до того, как этот младенец может произнести слово или сделать выбор. Это загрязнение самой невинной крови, и оно имеет последствия, которые выходят за пределы медицины в духовное царство.\u003c/p\u003e\n\u003ch2 id=\"твердь-и-падшая-повестка\"\u003eТвердь и падшая повестка\u003c/h2\u003e\n\u003cp\u003eЗагрязнение детского питания — это не изолированный отказ контроля качества. Это существует в рамках более широкого образца коррупции, которая расширяется от физического к духовному.\u003c/p\u003e\n\u003cp\u003eПисание говорит нам, что небо выше не бесконечное пространство, но твердь — купол непроницаемого материала, описанный в Иове 37:18 как сильный, как отлитое металлом зеркало. Под этим куполом ведется война за коррупцию человечества. Падшие ангелы, заключенные под этим куполом, не могут атаковать Бога напрямую, поэтому они атакуют то, что Бог любит — Его творение, созданное по Его образу.\u003c/p\u003e\n\u003cp\u003eКоррупция младенческой крови через загрязнение тяжелыми металлами — это целевой штурм на образ Бога на его самой уязвимой стадии. Бытие 6 описывает коррупцию всей плоти как триггер для суда Бога через наводнение. Когда вся плоть была коррупта — когда ДНК и кровь человечества были смешаны с тем, что никогда не было предназначено быть там — Бог ответил с полным разрушением и новым началом через неповрежденную кровь Ноя.\u003c/p\u003e\n\u003cp\u003eМы живем в время, когда коррупция всей плоти предпринимается снова. Не через прямое смешивание ангельского и человеческого ДНК, как в Бытии 6, но через химическое и технологическое загрязнение человеческой крови и биологии с самых ранних моментов жизни. Тяжелые металлы в детской смеси — один вектор среди многих — но они, пожалуй, наиболее раскрывают интенцию врага, потому что они нацелены на новорожденного, невинного, того, которого сам Христос поместил под наиболее суровую защиту.\u003c/p\u003e\n\u003ch2 id=\"что-родители-могут-делать\"\u003eЧто родители могут делать\u003c/h2\u003e\n\u003ch3 id=\"выберите-грудное-вскармливание-если-возможно\"\u003eВыберите грудное вскармливание, если возможно\u003c/h3\u003e\n\u003cp\u003eЧеловеческое грудное молоко — это пища, которую Бог разработал для человеческих младенцев. Оно содержит не только идеальное питание, но и иммунные факторы, полезные бактерии и развивающиеся сигналы, которые не может воспроизвести никакая смесь. Хотя грудное молоко не защищено от экологического загрязнения (тяжелые металлы и микропластики были обнаружены в грудном молоке), общее токсическое бремя значительно ниже, чем в смеси, и грудное молоко обеспечивает защитные факторы, которые противодействуют токсическому воздействию.\u003c/p\u003e\n\u003ch3 id=\"если-необходима-смесь\"\u003eЕсли необходима смесь\u003c/h3\u003e\n\u003cp\u003eДля родителей, которые должны использовать смесь, несколько шагов могут снизить воздействие тяжелых металлов:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИсследуйте бренды, которые проводят и публикуют независимое тестирование тяжелых металлов\u003c/li\u003e\n\u003cli\u003eИзбегайте смесей на основе риса, которые наиболее вероятно содержат мышьяк\u003c/li\u003e\n\u003cli\u003eИспользуйте фильтрованную воду (обратный осмос или дистиллированную) для приготовления смеси — муниципальная водопроводная вода — сама по себе источник тяжелых металлов\u003c/li\u003e\n\u003cli\u003eРассмотрите европейские смеси брендов, которые производятся в соответствии с более строгими нормами, чем продукты в США\u003c/li\u003e\n\u003cli\u003eТестируйте уровень свинца в крови вашего ребенка при регулярных интервалах через вашего педиатра\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"поддержка-детоксификации\"\u003eПоддержка детоксификации\u003c/h3\u003e\n\u003cp\u003eДля младенцев, которые были подвергнуты воздействию тяжелых металлов через смесь:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРаботайте с квалифицированным натуропатическим или интегративным медицинским практиком, опытным в детской детоксификации\u003c/li\u003e\n\u003cli\u003eПоддерживайте производство глутатиона через вмешательства питания, соответствующие возрасту\u003c/li\u003e\n\u003cli\u003eОбеспечьте адекватное потребление цинка, селена и других минералов, которые конкурируют с тяжелыми металлами за сайты связывания\u003c/li\u003e\n\u003cli\u003eРассмотрите мягкие протоколы хелирования под медицинским контролем по мере роста ребенка\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"регуляторный-отказ\"\u003eРегуляторный отказ\u003c/h2\u003e\n\u003cp\u003eFDA не установила максимально допустимые уровни для большинства тяжелых металлов в детской смеси. Это не является неправильным — это регуляторная структура, разработанная для защиты промышленности, а не потребителя. Тот же FDA, который требует суровое тестирование для определенных веществ, оставил дверь широко открытой для загрязнения тяжелыми металлами наиболее критичного продукта питания в человеческой продовольственной цепи.\u003c/p\u003e\n\u003cp\u003eЭтот регуляторный отказ отражает более широкий образец, задокументированный исследователями модели рокфеллеровской медицины — система, в которой регуляторные агентства захвачены промышленностью, которую они должны регулировать, и решения общественного здравоохранения управляются корпоративными интересами, а не научными доказательствами. Результат — система, которая позволяет младенцам быть отравленными при одновременном сохранении видимости безопасности через бюрократические рамки, которые никогда не были разработаны для функционирования.\u003c/p\u003e\n\u003ch2 id=\"ссылки-на-источники\"\u003eСсылки на источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eU.S. House of Representatives, Subcommittee on Economic and Consumer Policy — \"Baby Foods Are Tainted with Dangerous Levels of Arsenic, Lead, Cadmium, and Mercury\" (2021)\u003c/li\u003e\n\u003cli\u003eAna Mihalcea, MD, PhD — Исследование тяжелых металлов и загрязнения крови: \u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eFlorida Department of Agriculture — Infant formula testing results\u003c/li\u003e\n\u003cli\u003eCDC — \"No Safe Blood Lead Level in Children\"\u003c/li\u003e\n\u003cli\u003eThe Master's Voice Prophecy Blog: \u003ca href=\"https://themastersvoice.wordpress.com\"\u003ethemastersvoice.wordpress.com\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о предсмертном опыте Говарда Питтмана — предупреждение об окончательных временах, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические конфиденциальные сведения: раскрытые постыдные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eУбийство и фармакея — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eМедицина Рокфеллера\u003c/a\u003e — система, которая приоритизирует прибыль над здоровьем младенца\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eВакцина зверя\u003c/a\u003e — фармацевтическое колдовство, нацеленное на наиболее уязвимых\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/107-Stem_Cell_Harvesting.mp4\"\u003eСбор стволовых клеток\u003c/a\u003e — эксплуатация человеческой биологии с самых ранних стадий\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/93-The_Great_Exchange.mp4\"\u003eВеликий обмен\u003c/a\u003e — священная сделка, инвертированная теми, кто торгует здоровьем детей на прибыль\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/105-The_Second_Adam.mp4\"\u003eВторой Адам\u003c/a\u003e — восстановление Христом всего, что было потеряно, включая защиту невинного\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/heavy-metals-microplastics-toxicity/?lang=ru\"\u003eТяжелые металлы и микропластики: синергическая токсичность, разрушающая здоровье человека\u003c/a\u003e — как тяжелые металлы объединяются с другими загрязнителями для умножения вреда\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/nano-microplastics-brains/?lang=ru\"\u003eНевероятные количества нано микропластики, найденные в человеческих мозгах\u003c/a\u003e — загрязнение мозга начинается в самые ранние возрасты\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/human-blood-destroyed-nanotech/?lang=ru\"\u003eЧеловеческая кровь разрушается для интеграции нанотехнологии\u003c/a\u003e — более широкая повестка дня, стоящая за загрязнением крови\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОни отравляют детей. Они вкладывают мышьяк, ртуть и свинец в бутылки, которые питают новорожденные рты, и они делают это с полным знанием последствий. Приговор с мельничным жерновом, который Христ произнес над теми, кто вредит малым, не является предложением — это приговор, и он ждет исполнения. Но до этого дня кровь Агнца покрывает каждого ребенка, который ему принадлежит, и никакой загрязнитель в любой смеси не может коснуться душу, которую Бог требует. Тела могут быть отравлены, но завет держит. Малые — Его, и Он не теряет то, что принадлежит Ему.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Флорида находит мышьяк, ртуть и свинец в детских смесях\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Тестирование штата Флорида выявило мышьяк, ртуть и свинец в коммерческих детских смесях, подвергая новорожденных загрязнению тяжелыми металлами во время критического развития.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-02-18T10:00:00Z\",\"children\":\"18 февраля 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"infant-formula\",{\"href\":\"/ru/tag/infant-formula/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"infant-formula\"]}],[\"$\",\"a\",\"heavy-metals\",{\"href\":\"/ru/tag/heavy-metals/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"heavy-metals\"]}],[\"$\",\"a\",\"arsenic\",{\"href\":\"/ru/tag/arsenic/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"arsenic\"]}],[\"$\",\"a\",\"mercury\",{\"href\":\"/
