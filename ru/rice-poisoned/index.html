]]}]}]]}]}]]}]]}],{\"children\":[[\"lang\",\"ru\",\"d\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L8\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L9\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[[\"slug\",\"rice-poisoned\",\"d\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L8\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L9\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$Lb\",null,[\"$\",\"$Lc\",null,{\"children\":[\"$Ld\",[\"$\",\"$Le\",null,{\"promise\":\"$@f\"}]]}]]}],{},null,false]},null,false]},null,false]},null,false],[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L10\",null,{\"children\":\"$L11\"}],null],[\"$\",\"$L12\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$4\",null,{\"fallback\":null,\"children\":\"$L13\"}]}]}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$14\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"15:T52b3,"])</script><script>self.__next_f.push([1,"\u003ch1 id=\"рис-был-отравлен-что-вам-нужно-знать\"\u003eРИС БЫЛ ОТРАВЛЕН: Что вам нужно знать\u003c/h1\u003e\n\u003ch2 id=\"древний-образец\"\u003eДревний образец\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Вор приходит только для того, чтобы украсть, убить и погубить.\"\u003c/em\u003e — Иоанн 10:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eРис кормит более половины населения мира. Это основной продукт питания миллиардов, основа рационов в Азии, Африке и Америке. И он был отравлен. Не метафорически. Не предположительно. Измеримо, документировано, проверяемо отравлен — мышьяком, тяжёлыми металлами, микропластиком и агрохимикатами, которые накапливаются в теле с каждым приёмом пищи.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показано, что начальства и власти Ефесян 6:12 действуют через системы, предназначенные для воровства, убийства и уничтожения. Отравление мировой наиболее важной продовольственной культуры — это не случайность. Это логичный продукт пищевой системы, разработанной для максимизации прибыли при минимизации здоровья человека — системы, архитекторами которой являются те же институциональные сети, которые управляют финансами, медиа и религией.\u003c/p\u003e\n\u003cp\u003eИезуиты, военная организация Лойолы с \"абсолютной властью\" (Наполеон), управляющая \"всем миром\" (Тамбурини), всегда понимали, что контроль над пищей — это контроль над населением. \"Католические тайны\" раскрывают их инфильтрацию \"скрытой хитростью\" и их готовность практиковать \"любой вид порока\". Отравление риса — это не иезуитская операция как таковая — но это продукт институциональной системы, которую они помогли построить: глобальная сеть корпораций, регуляторов и финансистов, которая приоритизирует прибыль над человеческой жизнью.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Serpent's Curse — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"проблема-мышьяка\"\u003eПроблема мышьяка\u003c/h2\u003e\n\u003ch3 id=\"естественное-происхождение-неестественная-концентрация\"\u003eЕстественное происхождение, неестественная концентрация\u003c/h3\u003e\n\u003cp\u003eРис содержит мышьяк. Это не оспаривается. FDA, ВОЗ и независимые лаборатории во всём мире подтвердили, что рис поглощает мышьяк из почвы и воды на уровне значительно выше, чем другие зёрна. Мышьяк — известный канцероген — вызывает рак мочевого пузыря, лёгких, кожи, почек и печени.\u003c/p\u003e\n\u003cp\u003eПричина, по которой рис поглощает мышьяк, — это его способ выращивания: рисовые поля заливаются, и мышьяк в почве растворяется в воде, которую растение риса поглощает через корни. Это естественный процесс, но он был резко ухудшен человеческой деятельностью. Десятилетия использования пестицидов на основе мышьяка, промышленного загрязнения и безответственных сельскохозяйственных практик загрузили почву мышьяком, который теперь поглощается растениями риса в опасных количествах.\u003c/p\u003e\n\u003cp\u003eСоединённые Штаты — особенно проблемный источник. Американский рис — особенно рис, выращиваемый в южных штатах, где хлопок исторически выращивался с использованием свинцово-арсенитных пестицидов — содержит одни из самых высоких уровней мышьяка в мире. Наследие пестицидов эпохи хлопка продолжает загрязнять рис, выращиваемый на той же земле, более века спустя.\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует в Substack, как нормативный ответ на мышьяк в рисе был преднамеренно неадекватен. FDA установил пределы для мышьяка в детской рисовой каше, но не установил пределы для риса, потребляемого взрослыми. Это означает, что, в то время как правительство признаёт, что мышьяк в рисе опасен для младенцев, оно поддерживает юридическую фикцию, что тот же мышьяк безопасен для всех остальных.\u003c/p\u003e\n\u003ch3 id=\"аргумент-о-дозе\"\u003eАргумент о дозе\u003c/h3\u003e\n\u003cp\u003eЗащита индустрии — это классический токсикологический аргумент: доза делает яд. На уровнях, обнаруженных в рисе, они утверждают, мышьяк не представляет значительного риска для здоровья. Но этот аргумент игнорирует несколько критических факторов:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКумулятивное воздействие\u003c/strong\u003e: Мышьяк накапливается в теле с течением времени. Тот, кто ест рис ежедневно — как миллиарды людей — подвергается воздействию не один раз. Они подвергаются воздействию с каждым приёмом пищи, в течение десятилетий.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСинергические эффекты\u003c/strong\u003e: Мышьяк не существует в изоляции. Он взаимодействует с другими загрязнениями — тяжёлыми металлами, остатками пестицидов, микропластиком — способами, которые плохо понимаются, но вероятно усиливают токсичность.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУязвимые популяции\u003c/strong\u003e: Дети, беременные женщины, пожилые люди и хронически больные более восприимчивы к воздействию мышьяка. Доза, которая \"безопасна\" для здорового взрослого, может быть опасна для этих групп населения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРегуляторный захват\u003c/strong\u003e: Агентства, которые устанавливают \"безопасные\" уровни, подвергаются тому же регуляторному захвату, описанному в части 2 этой серии. Вращающаяся дверь между рисовой индустрией и нормативными агентствами гарантирует, что пределы устанавливаются для защиты прибыли индустрии, а не здоровья потребителя.\u003c/p\u003e\n\u003ch2 id=\"тяжёлые-металлы-и-микропластик\"\u003eТяжёлые металлы и микропластик\u003c/h2\u003e\n\u003ch3 id=\"полный-профиль-загрязнения\"\u003eПолный профиль загрязнения\u003c/h3\u003e\n\u003cp\u003eМышьяк — это не единственный загрязнитель в рисе. Независимое тестирование обнаружило повышенные уровни кадмия, свинца и ртути в образцах риса из нескольких стран. Эти тяжёлые металлы, как и мышьяк, — канцерогены и нейротоксины, которые накапливаются в теле с течением времени.\u003c/p\u003e\n\u003cp\u003eМикропластик — крошечные фрагменты пластика, которые проникают в окружающую среду — обнаружены в рисе в тревожных количествах. Исследование 2023 года, опубликованное в Journal of Hazardous Materials, обнаружило, что одна порция быстрого риса может содержать миллионы частиц микропластика. Эти частицы переносят свои собственные загрязнители — пластификаторы, огнестойкие вещества и другие промышленные химикаты — непосредственно в пищеварительную систему.\u003c/p\u003e\n\u003cp\u003eКомбинация мышьяка, тяжёлых металлов и микропластика создаёт токсичный коктейль, который ни один нормативный орган не оценил всесторонне. Каждый загрязнитель изучается в изоляции, как будто тело встречает их по одному. На самом деле, тело встречает их одновременно с каждой порцией риса, и комбинированный эффект неизвестен — потому что никто с авторитетом расследовать это не был готов это сделать.\u003c/p\u003e\n\u003ch3 id=\"наследие-промышленного-сельского-хозяйства\"\u003eНаследие промышленного сельского хозяйства\u003c/h3\u003e\n\u003cp\u003eЗагрязнение риса — это не природное явление. Это продукт промышленного сельского хозяйства — системы, разработанной для максимизации урожая и прибыли при экстернализации затрат на здоровье и окружающую среду. Та же система, которая опрыскивала содержащие мышьяк пестициды на хлопковые поля в начале 20 века, которая выбрасывала тяжёлые металлы в реки с фабрик, которая произвела пластики, которые теперь фрагментируются в микропластик по всей пищевой цепи — эта система создала условия для загрязнения риса.\u003c/p\u003e\n\u003cp\u003eИсторическая роль иезуитов в развитии сельского хозяйства — их миссии контролировали сельское хозяйство на трёх континентах — установили модель централизованного, институционального контроля производства пищи. Современная система промышленного сельского хозяйства — это секулярный преемник системы миссий: централизованный орган, определяющий, что выращивается, как оно выращивается и кто извлекает выгоду из выращивания. Загрязнение — это не отказ системы. Это особенность — экстернализованная стоимость, которую архитекторы системы принимают как цена прибыли.\u003c/p\u003e\n\u003cp\u003eВидение Говарда Питтмана о демонической иерархии во втором небе — организованной, целеустремлённой, экстракционной — описывает принцип работы промышленного сельского хозяйства с тревожной точностью. Система извлекает питательные вещества из почвы, здоровье из потребителя и богатство из населения, перенаправляя всё три в институциональные сети, которые управляют системой. Это духовная война, выраженная через сельскохозяйственную политику.\u003c/p\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003ch3 id=\"практическая-защита\"\u003eПрактическая защита\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПомойте ваш рис\u003c/strong\u003e: Тщательное полоскание риса перед приготовлением удаляет часть поверхностного мышьяка. Некоторые исследователи рекомендуют замачивать рис на ночь и выливать воду.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВарите с избыточной водой\u003c/strong\u003e: Варка риса в большом количестве воды (как макароны) и его слив может уменьшить содержание мышьяка на 60 процентов.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eРазнообразьте ваши зёрна\u003c/strong\u003e: Киноа, просо, гречка и амарант — это альтернативы, которые поглощают мышьяк меньше, чем рис.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВыбирайте источник тщательно\u003c/strong\u003e: Басмати-рис из Индии и Пакистана имеет тенденцию иметь более низкие уровни мышьяка, чем американский рис.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВыращивайте ваш собственный\u003c/strong\u003e: Если возможно, выращивайте рис или альтернативные зёрна в чистой почве с чистой водой.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eТестируйте вашу пищу\u003c/strong\u003e: Независимые услуги тестирования могут анализировать профиль загрязнения пищи, которую вы едите.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h3\u003e\n\u003cp\u003eПища священна. Первая заповедь в Бытии — это диетическая — Бог говорит Адаму, что есть и что не есть. Отравление пищи — в духовном смысле — это нарушение самого фундаментального божественного обеспечения. Это змей в саду, предлагающий фрукт, который выглядит хорошо, но несёт смерть.\u003c/p\u003e\n\u003cp\u003eПредупреждение Говарда Питтмана — что 97,5 процентов христиан были отвергнуты, что 95 процентов служат \"себе\" — применимо и к пищевой системе. Служение \"себе\" включает институциональное \"я\", которое приоритизирует прибыль над здоровьем, удобство над безопасностью и широкий путь промышленной пищи над узким путём чистого, локального, самовыращиваемого пропитания.\u003c/p\u003e\n\u003cp\u003eКаждый выбор о том, что вы едите, — это духовный акт. Выбирайте мудро.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Расследование загрязнения пищевого снабжения и нормативного отказа\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвидетельство опыта клинической смерти Говарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСмотрите на YouTube\u003c/a\u003e — Духовное измерение материальных систем\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКатолические тайны: Выявленные позорные секреты иезуитов\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eСмотрите на YouTube\u003c/a\u003e — Институциональный контроль сельского хозяйства и пищевых систем\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\"\u003eCast Out of Paradise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/135-Food_Price_Shadow_Industry.mp4\"\u003eFood Price Shadow Industry\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/351-Broken_Weather.mp4\"\u003eBroken Weather\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/65-Smart_Dust.mp4\"\u003eSmart Dust\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучите-дальше\"\u003eИзучите дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/food-industry-hidden-dangers/?lang=ru\"\u003eСкрытые опасности пищевой промышленности: Что действительно в вашей пище\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/stevia-sweetener-birth-control/?lang=ru\"\u003eСтевия: Подсластитель, используемый как средство контроля рождаемости\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/water-supply-contamination-cover-up/?lang=ru\"\u003eРаскрытие прикрытия загрязнения водоснабжения\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eВаш рис был отравлен. Не злодеем в лаборатории, а системой — промышленной, финансовой, нормативной системой, разработанной для извлечения выгоды из вашей зависимости и равнодушной к вашему здоровью. Яд поддаётся измерению. Загрязнение документировано. И решение начинается в вашей кухне, с выбора: принять то, что система вас кормит, или взять контроль над тем, что вы едите. Узкий путь ведёт через сад, а не через продуктовый магазин.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/food-environment/\",\"className\":\"category-badge\",\"children\":\"food-environment\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"РИС БЫЛ ОТРАВЛЕН: Что вам нужно знать\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Ваш рис был отравлен мышьяком, микропластиком и скрытыми химикатами. Откройте для себя связанную с иезуитами пищевую систему, контаминирующую продукты.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-03T10:00:00Z\",\"children\":\"3 мая 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"rice\",{\"href\":\"/ru/tag/rice/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"rice\"]}],[\"$\",\"a\",\"poison\"
