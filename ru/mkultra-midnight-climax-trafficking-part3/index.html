. В книге Даниила король Навуходоносор попытался контролировать умы и верность еврейских пленников через индоктринацию, переименование, пищевые изменения и культурное погружение (Даниил 1:3-7). Но Даниил и его товарищи сопротивлялись, доказывая, что человеческий дух, выравненный с Богом, не может быть полностью сломан человеческими системами.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003cem\u003eThe Fallen Angels\u003c/em\u003e говорит о происхождении запрещённого знания — технологиях манипуляции, которые никогда не были предназначены для человеческих рук. Книга Еноха описывает, как Наблюдатели научили человечество искусствам колдовства, чар и манипуляции. MKUltra, в этом свете, — это не современное изобретение, но повторное открытие древнего запрещённого знания — \u003cem\u003epharmakeia\u003c/em\u003e (колдовство через наркотики), осуждённое в Галатам 5:20 и Откровении 18:23.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise\u003c/em\u003e напоминает нам, что эти программы никогда не представляют себя, что они в действительности. MKUltra была одета как научное исследование. \"Операция Midnight Climax\" была одета как национальная безопасность. Торговля человеческими существами была одета как цена свободы. Но под каждой одеждой находится то же древнее зло — желание разрушить образ Божий в человечестве путём сокращения людей к объектам контроля.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"mkultra-задокументированная-реальность\"\u003eMKUltra: задокументированная реальность\u003c/h2\u003e\n\u003ch3 id=\"что-раскрывают-рассекреченные-файлы\"\u003eЧто раскрывают рассекреченные файлы\u003c/h3\u003e\n\u003cp\u003eMKUltra — это не теория заговора — это задокументированная программа ЦРУ, которая была официально признана правительством США. Инициирована в 1953 году и официально прекращена в 1973 году, MKUltra была основной программой ЦРУ для исследования контроля над умом, модификации поведения и психологической манипуляции.\u003c/p\u003e\n\u003cp\u003eПрограмма была выяснена через комбинацию investigative журналистики, расследований Конгресса и запроса Закона о свободе информации 1977 года, который обнаружил приблизительно 20000 документов, которые выжили приказом разрушения 1973 года директора ЦРУ Richard Helms. Эти документы, в совокупности с показаниями от Комитета Church и последующих слушаний Конгресса, установили вне спора, что ЦРУ провела обширные экспериментирования на человеческих субъектах без их знания или согласия.\u003c/p\u003e\n\u003cp\u003eЗадокументированный объём MKUltra поражает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e149 подпроектов\u003c/strong\u003e простирающихся университеты, больницы, тюрьмы, фармацевтические компании и фронт организации\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭкспериментирования включая LSD, мескалин, героин, барбитураты, метамфетамин и дюжины других веществ\u003c/strong\u003e введённые неведущим субъектам\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГипноз, сенсорная депривация, изоляция, словесное и сексуальное оскорбление и различные формы пыток\u003c/strong\u003e использованное как экспериментальные методы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСубъекты включая заключённых, психически пациентов, наркомана наркотиков, рабочих сексуального труда и членов общей публики\u003c/strong\u003e которые были экспериментированы без согласия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПо меньшей мере два задокументированные смерти\u003c/strong\u003e прямо атрибутированные MKUltra экспериментированию, с credible обвинениями много больше\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсследование на Agent131711 Substack (agent131711.substack.com) метически скомпилировало рассекреченные документы и кросс-ссылка их с показаниями очевидца, раскрывая, что официальный счёт представляет только дробь истинного объёма программы.\u003c/p\u003e\n\u003ch3 id=\"масштаб-разрушения\"\u003eМасштаб разрушения\u003c/h3\u003e\n\u003cp\u003eДиректор ЦРУ Helms приказал разрушение MKUltra файлов в 1973 году как скандал Watergate угрожал выяснить множество незаконных государственных программ. 20000 документов, которые выжили, так делали только потому, что они были неправильно подано в архиве финансовых записей, скорее чем операционных файлов, которые были разрушены.\u003c/p\u003e\n\u003cp\u003eЭто означает, что задокументированные ужасы MKUltra — которые они сами глубоко беспокойны — представляют только маленькую фракцию деятельности полной программы. Исследователи оценивают, что десятки тысяч субъектов были экспериментированы в течение двух десятилетий официального срока программы, с неизвестными числами страдающих постоянного психологического ущерба, привычки, institutionalization, или смерти.\u003c/p\u003e\n\u003cp\u003eРазрушение доказательств само — это преступление, ещё никакой официальное лицо ЦРУ не было когда-либо преследовано за это. Директор Helms получил приостановленный предложение и штраф за ложь Конгрессу о программе — наказание, которое составляет институциональное одобрение прикрытия.\u003c/p\u003e\n\u003ch2 id=\"операция-midnight-climax\"\u003eОперация Midnight Climax\u003c/h2\u003e\n\u003ch3 id=\"притоны-цру-сан-франциско\"\u003eПритоны ЦРУ Сан-Франциско\u003c/h3\u003e\n\u003cp\u003e\"Операция Midnight Climax\" была подпроектом MKUltra, которая представляет, возможно, самое явное пересечение операций разведки, торговли человеком и сексуальной эксплуатации в задокументированной американской истории.\u003c/p\u003e\n\u003cp\u003eУстановленный в 1954 году под направлением офицера ЦРУ George Hunter White, операция Midnight Climax управляемые безопасные дома в Сан-Франциско, Нью-Йорке и Марине County, Калифорния. Эти безопасные дома были установлены как притоны, где офицеры ЦРУ могли наблюдать эффекты LSD и других психоактивных веществ на неведущих субъектах.\u003c/p\u003e\n\u003cp\u003eМодель операций была непосредственна: проститутки рекрутированные ЦРУ бы соблазнить мужчин к безопасным домам, где их напитки бы тайно дозировались с LSD или другими психоактивными веществами. Офицеры ЦРУ бы тогда наблюдать реакции субъектов через одностороннее зеркала, записывая их поведение для целей исследования.\u003c/p\u003e\n\u003cp\u003eGeorge Hunter White, кто управлял Сан-Францискскими операциями, описал программу в его личном дневнике с примечательной откровенностью: \"Я трудолюбиво работал в винограднике, потому что это было забава, забава, забава. Где ещё красный-кровь американские мальчик мог лежать, убить, обмануть, украсть, изнасилование и мародёрство с санкции и благословения самого Всевышнего?\"\u003c/p\u003e\n\u003cp\u003eЭтот цитат, из действительного офицера ЦРУ, раскрывает менталитет, который пропитал операции MKUltra — полное отпущение моральной сдержанности оправданной институциональной властью.\u003c/p\u003e\n\u003ch3 id=\"размерность-торговли\"\u003eРазмерность торговли\u003c/h3\u003e\n\u003cp\u003eЖенщины, которые служили как операторы в Midnight Climax, были сами жертвами эксплуатации. Пока официальные счета описывают их как \"проституток\", которые добровольно участвовали, реальность была значительно более сложна. Много были наркотик-зависимые женщины, которые были контролируемы через их зависимость. Другие были рекрутированы через принуждение или обман. Некоторые были торговали из других местоположений специфически для программы.\u003c/p\u003e\n\u003cp\u003eДокументы ЦРУ раскрывают, что эти женщины не были просто соблазняющие цели — они сами были субъектами экспериментирования. Им были даны LSD и другие вещества, подчинены гипнозу и поведенческой кондиции и использованы как морские свинки для методов, которые позже были развёрнуты в более крупных операциях разведки.\u003c/p\u003e\n\u003cp\u003eМужчины, которые были нацелены Midnight Climax, были аналогично жертвами. Дозированные без их знания, сексуально скомпрометированные и находящиеся под наблюдением, они стали неведущими тестовыми субъектами для методов контроля над умом. Некоторые страдали сильные психологические реакции к LSD, и там credible обвинения, что некоторые умерли как результат экспериментирования.\u003c/p\u003e\n\u003ch3 id=\"безопасные-дома-сан-франциско\"\u003eБезопасные дома Сан-Франциско\u003c/h3\u003e\n\u003cp\u003eБезопасные дома Сан-Франциска были украшены казаться обычными квартиры, хотя с некоторыми отличительными особенностями. Стены были покрыты фотографиями женщин в различных состояниях раздёнутости — эстетический выбор, который служил оба к помещению целей в комфорт и предоставить визуальную стимуляцию, которая могла быть изучена вместе с эффектов психоактивных наркотиков.\u003c/p\u003e\n\u003cp\u003eЗа стенами, офицеры ЦРУ наблюдали через одностороннее зеркала, принимая ноты и работающих оборудование записи. Сцены они очевидны и задокументированные включили не только интендированного наркотика экспериментирования, но сексуальную эксплуатацию женщин включённых — эксплуатация, которая была санкционирована, финансирована и организована Соединённого государства правительства.\u003c/p\u003e\n\u003cp\u003eБезопасные дома работали для приблизительно декаду перед заключением в 1965, хотя там доказательство предлагающее, что подобные операции продолжались под различными кодовыми наименованиями и организационными структурами.\u003c/p\u003e\n\u003ch2 id=\"связь-с-операциями-playboy\"\u003eСвязь с операциями Playboy\u003c/h2\u003e\n\u003ch3 id=\"общие-методы-общие-цели\"\u003eОбщие методы, общие цели\u003c/h3\u003e\n\u003cp\u003eОперационные параллели между \"Операцией Midnight Climax\" и операциями наблюдения за особняком Playboy, описанными в частях 1 и 2 этого серии, не поддерживаются контроля:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eОба используемые сексуальные ситуации компрометировать цели\u003c/li\u003e\n\u003cli\u003eОба используемые скрытое оборудование наблюдения для документа компрометирующего поведения\u003c/li\u003e\n\u003cli\u003eОба полагались на женщин, которые служили и операторам и жертвам\u003c/li\u003e\n\u003cli\u003eОба были соединены с более широкими целями разведки ЦРУ\u003c/li\u003e\n\u003cli\u003eОба работали в открытом виде, одетые как законные социальные или коммерческие деятельности\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВременная шкала также значительная. Midnight Climax управлял из 1954 к приблизительно 1965. Первый особняк Playboy начал операции в 1959. Перекрытие предлагает не просто параллельные операции, но координированные — различные отрасли того же дерева разведки.\u003c/p\u003e\n\u003cp\u003eИсследование на Agent131711 Substack задокументировал связи персонала между операциями Midnight Climax и сетью Playboy, предлагающей, что операции особняка могут иметь представленный развитие и расширение методов пионировавшихся в безопасных домах. Где Midnight Climax нацелил случайные люди для экспериментальных целей, операции Playboy нацелили определённые фигуры силы для оперативного контроля.\u003c/p\u003e\n\u003ch3 id=\"из-эксперимента-к-развёртыванию\"\u003eИз эксперимента к развёртыванию\u003c/h3\u003e\n\u003cp\u003eПодпроекты MKUltra следовали исследованию-к-развёртыванию трубопроводу. Методы были первый протестирован на расходуемые субъекты — заключённые, addicts, психически больные — и затем отрафинирован для оперативного использования против целей значение выше. \"Операция Midnight Climax\" служила как тестовой площадке для медов ловушка методов, которые были последовательно развёрнуты в более сложных установках.\u003c/p\u003e\n\u003cp\u003eПрогрессирование из грязного Сан-Францискского безопасного дома к блеск особняку Playboy представляет этот трубопровод в действии. Основной концепт остался то же самое — наркотики, секс, наблюдение — но исполнение было поднято соответствовать статусу предполагаемых целей. Сенатор или CEO корпорации никогда не бы введены грязное квартире со улицы проститутки, но они охотно бы принял приглашение к особняку Playboy.\u003c/p\u003e\n\u003ch2 id=\"торговля-человеком-как-разведка-инфраструктура\"\u003eТорговля человеком как разведка инфраструктура\u003c/h2\u003e\n\u003ch3 id=\"трубопровод-приобретения\"\u003eТрубопровод приобретения\u003c/h3\u003e\n\u003cp\u003eОба операции Midnight Climax и более широкие операции разведки особняка Playboy полагались на постоянное снабжение человеческими существами — женщинами и, как задокументировано в части 2, детьми — кто служил как оперативные инструменты сообщества разведки. Это снабжение требовало сетей приобретения, которые непрерывно работали, идентифицирование, рекрутирование, подготовка и поставка человеческих существ к местоположениям, где они будут эксплуатированы.\u003c/p\u003e\n\u003cp\u003eЭти сети приобретения представляют форму торговли человеком, которая редко признана как таковая, потому что она была проведена под государственной властью. Женщины рекрутированные для Midnight Climax, модели привнесённые в систему Playboy и дети поставленные компрометировать сетей, задокументированные в части 2, были всеми жертвами торговли — перемещённый, эксплуатированный и контролируемый для выгоды институциональной силы.\u003c/p\u003e\n\u003cp\u003eРазличие между торговлей, санкционированной государством и преступной торговлей, является правовым вымыслом. Жертвы испытывают то же самое эксплуатацию, то же самое травму и то же самое разрушение, независимо от того, несёт ли их эксплуатирующее государственный герб или работает в преступном подземелье.\u003c/p\u003e\n\u003ch3 id=\"расходуемое-человеческое-существо\"\u003eРасходуемое человеческое существо\u003c/h3\u003e\n\u003cp\u003eФундаментальная посыл MKUltra и его соответствующих программ была, что отдельные человеческие существа расходуемы ресурсы, которые могли быть использованы и выброшены в обслуживание институциональных целей. Эта посыл — это точный инверс библейского принципа, что каждое человеческое существо создаётся по образу Божию (Бытие 1:27) и обладает врождённым достоинством, которое никакое учреждение имеет авторитет нарушить.\u003c/p\u003e\n\u003cp\u003eФайлы MKUltra задокументируют случаи люди, кто были постоянно повреждены экспериментированием — покидал психотический, привычка, institutionalized или умирающий. В нет случае были те ответственные люди удержаны подотчётны. Расчёт учреждения был простой: ценность разведки получены перевесила стоимость человеческих жизней разрушена.\u003c/p\u003e\n\u003cp\u003eЭтот расчёт продолжает управлять сегодня. То же самое логика, которая оправдала дозирование неведущих субъектов с LSD оправдывает каждое последующее форму эксплуатации человека, проведённой под раскрывая национальной безопасности. Война на ужасе, массовое наблюдение, чрезвычайное рендировка и усиленное допрашивание — это все потомки MKUltra менталитета — вера, что государства цели оправдывают любые средства.\u003c/p\u003e\n\u003ch2 id=\"mkultra-никогда-не-заканчивался\"\u003eMKUltra никогда не заканчивался\u003c/h2\u003e\n\u003ch3 id=\"официальное-прекращение-оперативное-продолжение\"\u003eОфициальное прекращение, оперативное продолжение\u003c/h3\u003e\n\u003cp\u003eЦРУ утверждает, что MKUltra прекратилась в 1973. Это утверждение заслуживает того же скептицизма применил к каждому другому утверждению ЦРУ о его собственной деятельности. Учреждение, которое лгало относительно существования MKUltra в течение двух десятилетий, разрушило доказательство предотвращение его выяснения и препятствовало расследованиям Конгресса в свои деятельности имеет никакой credibility, когда утверждение, что программа просто заканчивалась.\u003c/p\u003e\n\u003cp\u003eМетоды разработанные под MKUltra — травма-базированное программирование, наркотик-облегченная манипуляция, гипнотическое кондиционирование и сексуальное компромисс — представляют способности, которые никакое учреждение разведки бы добровольно не отказалось. Инвестиция двух десятилетий исследования и миллиардов долларов финансирования произведённо оперативные инструменты из необычайной силы. Идея, которая эти инструменты были просто полки закрывается наивное.\u003c/p\u003e\n\u003cp\u003eДоказательство, которое исследование ума контроля продолжалось после 1973 включает:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнституциональная непрерывность.\u003c/strong\u003e Персонал, подрядчики, академические учреждения и исследовательские программы, которые составили MKUltra, не исчезли в 1973. Они продолжали свою работу под различными программными названиями, различными потоками финансирования и более глубокой классификацией уровнями. Люди, кто провела исследование MKUltra, продолжали их карьеры в академии, частном сектора и сообществе разведки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТехнологическое продвижение.\u003c/strong\u003e Методы доступные для контроля над умом расширили огромно с 1973. Нейронаука, психофармакология, электромагнитная стимуляция, optogenetics, AI-управляемая поведенческая модификация и манипуляция социальных медиа предоставляют способности, которая MKUltra исследователи могли только мечтать. Идея, которая сообщество разведки разработал эти способности и затем выбрал не применять их к целям контроля над умом это преследовало в течение двадцати лет отказывает институциональной логике.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗадокументированные программы преемника.\u003c/strong\u003e MKSEARCH, MKNAOMI, Проект OFTEN и другие программы управляемые одновременно с или преуспел MKUltra. Глубокое государство постоянное правительство не отменяет программы, которые производят результаты. Это переименует их, переклассифицирует их и продолжит их.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eДля задокументирования MKUltra, \"Операции Midnight Climax\" и их связей к текущим операциям разведки, включая рассекреченные документы ЦРУ и показание Конгресса, смотреть всеобъемлющее исследование в Agent131711 Substack (agent131711.substack.com). Духовный контекст для понимания этих программ исследован в блоге пророчества The Master's Voice.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-сэмуэля-8\"\u003eПредупреждение 1 Сэмуэля 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Сэмуэлю: послушай голоса народа во всём, что они говорят тебе; ибо не тебя они отверглись, но отверглись Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Сэмуэль 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Сэмуэля 8 отскочивает через каждый коридор правительства сегодня. Когда Израиль требуемые король, подобный другим нациям, Бог предупредил их в точности, что произойдёт — их сыны взяты для войны, их дочери для услуги, их поля и виноградники отобраны, десять всего конфисковано. Они выбрали человеческое правительство над Божественной корейстью и тирания следовала в точности, как обещано. Ничто не изменилась. Современная политическая система два крыла того же самого птицы — слева и право, республиканец и демократ — всё обслуживание то же самое скрытое структуру силы. Голосованием за каждый сторона является выбор, какое крыло взмах далее, пока птица летает в том же самом направлении. Истинная силу никогда была на любом балотка.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthav
