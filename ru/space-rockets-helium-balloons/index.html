te\u003e\n\u003cp\u003eНАСА тратит примерно 25 миллиардов долларов в год. SpaceX, Blue Origin и другие частные космические компании тратят еще миллиарды. Космическая индустрия нанимает сотни тысяч людей. Запуски ракет транслируются по всему миру. Астронавты прославляются как герои. И вся деятельность построена на нарративе, который большинство людей принимает без вопросов: что ракеты доставляют людей и оборудование в космос.\u003c/p\u003e\n\u003cp\u003eНо что если ракеты не то, чем они кажутся? Что если массивные столбы пламени и дыма, сопровождающие каждый запуск, служат не как движение, а как спектакль — отвлечение от истинного механизма подъема? Что если грузы, которые \"достигают орбиты\", на самом деле достигают своих пунктов назначения более простыми, дешевыми и мирскими средствами — включая гелиевые шары?\u003c/p\u003e\n\u003cp\u003eЭто не вопрос, задаваемый легкомысленно. Это вопрос, требуемый доказательствами — доказательствами из собственных кадров НАСА, из поведения \"космических аппаратов\" в полете, из физики задействованных систем и из свидетельств исследователей, которые изучали космическую программу со скептицизмом, который они применили бы к любому другому правительственному заявлению.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман получил откровение, что духовная сфера является истинной реальностью и что физический мир, который мы воспринимаем, сформирован обманом. 97,5% тех, кто терпит неудачу, принимают космический нарратив на веру — так же, как они принимают нарратив о теории микробов, нарратив о витаминах и любую другую институциональную историю. Они \"никогда не сделали Иисуса Господом\" — они сделали НАСА своим господом, своим источником истины о космосе, своей заменой Творцу, который объявляет Свою славу через небеса.\u003c/p\u003e\n\u003cp\u003eИезуиты глубоко вовлечены в астрономию и космологию со времени основания ордена. Ватиканскую обсерваторию управляют иезуитские астрономы. Иезуитские университеты располагают некоторыми из самых известных в мире отделений астрономии. \"Абсолютная власть\" Наполеона распространяется на власть над тем, что человечество верит о космосе. \"Вечное осуждение\" Адамса применяется к тем, кто обманывает мир о творении. И управление \"половиной мира\" Тамбурини включает управление тем, что этот мир верит о небе над ним.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"доказательства\"\u003eДоказательства\u003c/h2\u003e\n\u003ch3 id=\"связь-с-шарами\"\u003eСвязь с шарами\u003c/h3\u003e\n\u003cp\u003eНАСА имеет длинную и задокументированную историю использования высокотехнологичных воздушных шаров:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eНаучная программа воздушных шаров НАСА\u003c/strong\u003e запускает примерно 10-15 крупных научных воздушных шаров в год\u003c/li\u003e\n\u003cli\u003eЭти шары переносят грузы до \u003cstrong\u003e8 000 фунтов\u003c/strong\u003e на высоту \u003cstrong\u003e130 000 футов\u003c/strong\u003e (примерно 25 миль)\u003c/li\u003e\n\u003cli\u003eШары \u003cstrong\u003eогромны\u003c/strong\u003e — когда полностью надуты на высоте, они могут быть размером с футбольный стадион\u003c/li\u003e\n\u003cli\u003eНАСА использует шары для \u003cstrong\u003eастрономических наблюдений, атмосферных исследований и испытания технологии\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eНекоторые миссии шаров несут инструменты, которые позже утверждаются, что были \"в космосе\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСуществование программы воздушных шаров НАСА не оспаривается — это общеизвестный факт. Вопрос в том, более ли программа воздушных шаров обширна, чем публично признано, и пересчитываются ли некоторые \"космические миссии\" как миссии воздушных шаров для публичного потребления.\u003c/p\u003e\n\u003ch3 id=\"визуальные-доказательства\"\u003eВизуальные доказательства\u003c/h3\u003e\n\u003cp\u003eТщательный анализ кадров запуска ракет и \"космических\" кадров вызвал вопросы:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПоведение при запуске\u003c/strong\u003e: После первоначальной фазы видимого ракетного движения многие запуски входят в фазу, в которой аппарат больше не видимым — он \"над облаками\" или \"вне диапазона камеры\". Что происходит в этой невидимой фазе, нельзя независимо проверить.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКривые траектории\u003c/strong\u003e: Некоторые исследователи наблюдали, что траектории ракет изгибаются и в конце концов движутся горизонтально, а не продолжают двигаться вверх — поведение, более согласованное с достижением равновесия плавучести (как шар), чем с достижением скорости убегания.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАномалии в кадрах\u003c/strong\u003e: Кадры НАСА из \"космоса\" были тщательно проанализированы на предмет аномалий, включая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПузырьки, видимые в кадрах \"выхода в космос\", предлагающие подводное снятие\u003c/li\u003e\n\u003cli\u003eВидимые системы привязей на \"плавающих\" астронавтах\u003c/li\u003e\n\u003cli\u003eАртефакты зеленого экрана на кадрах МКС\u003c/li\u003e\n\u003cli\u003eНесогласованное освещение и тени\u003c/li\u003e\n\u003cli\u003eПоведение волос, несогласованное с невесомостью\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eНаблюдения шаров\u003c/strong\u003e: Высокотехнологичные шары иногда видимы с земли и были зарегистрированы как \"НЛО\". Связь между запусками шаров и наблюдениями НЛО задокументирована несколькими исследователями.\u003c/p\u003e\n\u003ch3 id=\"вопросы-физики\"\u003eВопросы физики\u003c/h3\u003e\n\u003ch4 id=\"ракетное-топливо-и-груз\"\u003eРакетное топливо и груз\u003c/h4\u003e\n\u003cp\u003eФизика ракетной техники включает фундаментальную проблему: ракета должна переносить топливо, которое ее движит, и перенос топлива требует большего топлива для перенесения топлива. Это \"тирания ракетного уравнения\", и это серьезно ограничивает то, что ракеты могут действительно достичь.\u003c/p\u003e\n\u003cp\u003eСогласно собственным цифрам НАСА, ракета Сатурн V (которая якобы доставила астронавтов на Луну) имела общий вес \u003cstrong\u003e6,5 миллиона фунтов\u003c/strong\u003e, из чего примерно \u003cstrong\u003e6 миллионов фунтов\u003c/strong\u003e было топливом. Оставшиеся \u003cstrong\u003e500 000 фунтов\u003c/strong\u003e включали конструкцию ракеты и груз — что означает, что более 92% веса ракеты было топливом.\u003c/p\u003e\n\u003cp\u003eНекоторые исследователи поставили под сомнение, может ли аппарат, на 92% состоящий из топлива, действительно достичь скоростей и расстояний, которые утверждает НАСА. Математика ракетного уравнения хорошо установлена, но предположения, которые входят в уравнение — эффективность двигателей, плотность энергии топлива, параметры траектории — предоставляются самой НАСА и не могут быть независимо проверены.\u003c/p\u003e\n\u003ch4 id=\"радиационные-пояса-ван-аллена\"\u003eРадиационные пояса Ван Аллена\u003c/h4\u003e\n\u003cp\u003eРадиационные пояса Ван Аллена — зоны интенсивной радиации, окружающие Землю — представляют потенциально смертельный барьер для пилотируемого космического путешествия. НАСА признает пояса, но утверждает, что астронавты \"Аполлона\" прошли через них слишком быстро, чтобы получить опасные дозы радиации.\u003c/p\u003e\n\u003cp\u003eЭто утверждение было оспорено исследователями, которые отмечают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eУровни радиации в поясах достаточны для повреждения электронного оборудования и вреда биологической ткани\u003c/li\u003e\n\u003cli\u003eАлюминиевый корпус космического аппарата \"Аполлона\" обеспечил бы минимальную защиту от радиации\u003c/li\u003e\n\u003cli\u003eСобственные современные документы НАСА выражали озабоченность радиацией поясов Ван Аллена\u003c/li\u003e\n\u003cli\u003eНи одна последующая пилотируемая миссия не прошла через пояса Ван Аллена с момента \"Аполлона\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"финансовые-доказательства\"\u003eФинансовые доказательства\u003c/h3\u003e\n\u003cp\u003eБюджет НАСА — 25 миллиардов долларов в год — представляет огромный поток государственных денег в организацию с минимальным независимым надзором. Деньги идут на:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОбъекты НАСА\u003c/strong\u003e по всей стране\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОборонные подрядчики\u003c/strong\u003e (Boeing, Lockheed Martin, Northrop Grumman, SpaceX)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсследовательские учреждения\u003c/strong\u003e и университеты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМеждународные партнеры\u003c/strong\u003e (ESA, JAXA, Roscosmos)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eФинансовый стимул для сохранения космического нарратива огромен. Тысячи рабочих мест, миллиарды в контрактах и национальный престиж зависят от веры публики в то, что НАСА действительно отправляет аппараты и людей в космос. Любое раскрытие того, что программа менее того, чем она утверждает, вызовет финансовые и политические последствия беспрецедентного масштаба.\u003c/p\u003e\n\u003ch2 id=\"паттерн-обмана-наса\"\u003eПаттерн обмана НАСА\u003c/h2\u003e\n\u003ch3 id=\"ученые-операции-скрепка\"\u003eУченые операции \"Скрепка\"\u003c/h3\u003e\n\u003cp\u003eНАСА было основано в 1958 году, и его раннее руководство включало многих ученых, набранных из нацистской Германии через операцию \"Скрепка\". Самым известным был \u003cstrong\u003eВернхер фон Браун\u003c/strong\u003e, бывший офицер СС, который разработал ракету V-2 для нацистской Германии и стал директором Центра космических полетов имени Маршалла НАСА.\u003c/p\u003e\n\u003cp\u003eФон Браун и его коллеги были экспертами в пропаганде, а также в инженерной деятельности. Нацистский режим использовал спектакль — массовые митинги, драматические проявления военной мощи, театральное лидерство — для контроля общественного восприятия. Запуски ракет НАСА служат похожей функции: они спектакли, предназначенные для вызывания благоговения, подавления вопросов и сохранения общественной поддержки чрезвычайно дорогой программы.\u003c/p\u003e\n\u003ch3 id=\"компартментализация\"\u003eКомпартментализация\u003c/h3\u003e\n\u003cp\u003eКосмическая программа работает по принципу компартментализации — каждый рабочий знает только свою конкретную задачу и не имеет видимости в более крупную операцию. Техник, который строит конкретный компонент, не имеет способа узнать, использован ли этот компонент так, как утверждается. Инженер, который проектирует конкретную систему, не может проверить, что система работает так, как описано в классифицированном профиле миссии.\u003c/p\u003e\n\u003cp\u003eЭта компартментализация означает, что подавляющее большинство сотрудников НАСА — подлинные профессионалы, выполняющие подлинную работу — они просто не имеют способа узнать, способствует ли работа, которую они выполняют, тому, что публике говорят о ней. Только те, кто находится на самых высоких уровнях организации, знают полную картину.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"твердь\"\u003eТвердь\u003c/h3\u003e\n\u003cp\u003eБиблия описывает небеса в терминах, которые не совпадают с современным космологическим нарративом:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eБытие 1:6-8\u003c/strong\u003e описывает \"твердь\", отделяющую \"воды, которые под твердью, от вод, которые над твердью\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБытие 1:14-17\u003c/strong\u003e описывает огни \"установленные на тверди\" — не парящие в бесконечном космосе\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПсалом 19:1\u003c/strong\u003e объявляет, что \"небеса поведают о славе Божьей; и о делах рук Его вещает твердь\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПсалом 104:2\u003c/strong\u003e описывает Бога, растягивающего \"небеса как завесу\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИсаия 40:22\u003c/strong\u003e описывает Бога, восседающего \"на круге земли\" и растягивающего \"небеса как завесу, и распростирающего их как шатер для жилища\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eБиблейская космология описывает созданное пространство — ограниченное, целенаправленное и разработанное Богом. Современный космологический нарратив описывает бесконечную, бессмысленную пустоту, в которой Земля — незначительное пятнышко. Эти два взгляда несовместимы, и выбор между ними в конечном итоге является духовным.\u003c/p\u003e\n\u003ch3 id=\"иезуитская-космологическая-повестка\"\u003eИезуитская космологическая повестка\u003c/h3\u003e\n\u003cp\u003eОрден иезуитов глубоко вовлечен в формирование современной космологии. Иезуитские астрономы:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eУправляют \u003cstrong\u003eВатиканской обсерваторией\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eСпособствовали развитию \u003cstrong\u003eтеории Большого взрыва\u003c/strong\u003e (Жорж Лемэтр, католический священник)\u003c/li\u003e\n\u003cli\u003eУправляют телескопами и исследовательскими программами в иезуитских университетах по всему миру\u003c/li\u003e\n\u003cli\u003eОпубликовали обширные исследования о космологии и совместимости веры с современной наукой\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИезуитская повестка дня в космологии такая же, как и везде: контролировать нарратив. Контролируя то, что человечество верит о космосе — является ли вселенная целенаправленным творением Бога или случайной пустотой бесконечной пустоты — иезуиты контролируют связь человечества с его Творцом.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман получил откровение о трех небесах — не бесконечном пустом пространстве. Библейская модель творения помещает Землю в центр Божественной цели, с небесами, объявляющими Его славу. Модель НАСА помещает Землю в бессмысленную пустоту, с небесами, не объявляющими ничего. Выбор между этими моделями — это выбор между верой и материализмом — между Богом и учреждениями, которые Его заменили.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — анализ НАСА, исследования программы воздушных шаров и расследование космического мошенничества\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство ОСД Хоуарда Питтмана\u003c/a\u003e — три небеса и библейская космология\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая тайна: раскрытие позорящих иезуитских секретов\u003c/a\u003e — иезуитский контроль над космологическим нарративом\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и Фармакия — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e- Документация Научной программы воздушных шаров НАСА\u003c/li\u003e\n\u003cli\u003eИсторические записи операции \"Скрепка\"\u003c/li\u003e\n\u003cli\u003eИсследование радиации радиационных поясов Ван Аллена\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"источники-и-ссылки\"\u003eИсточники и ссылки\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eПлоская Земля,
