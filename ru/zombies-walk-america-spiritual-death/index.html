" — Ефесянам 2:1-2\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЗомби — не современное изобретение. Писание описало это состояние за три тысячи лет до того, как Голливуд сделал из этого развлечение. Духовно мертвые ходят. Они движутся по миру, они едят, они работают, они говорят, они размножаются — но они мертвы. Мертвы по преступлениям и грехам. Мертвы для Бога. Мертвы для истины. Мертвы для реальности своего собственного состояния. Они ходят \"по обычаю мира сего\" — следуя по пути, который они не выбирали, контролируемые \"князем, господствующим в воздухе\", движимые \"духом, действующим ныне в сынах противления\".\u003c/p\u003e\n\u003cp\u003eЭто не метафора. Это диагноз. Павел описывает состояние, которое узнаваемо на каждой американской улице, в каждом американском учреждении, на каждом американском экране. Миллионы людей проходят через жизнь без духовного осознания, без морального различения, без связи с Создателем, который создал их — потребляя то, что помещено перед ними, веря тому, что им говорят, повинуясь системам, которых они не понимают, и никогда не подвергая сомнению невидимую силу, которая направляет их шаги.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/05-The_First_Darkness.mp4\"\u003eПервая тьма\u003c/a\u003e говорит об этом изначальном состоянии — тьме, которая существовала до того, как Бог изрек свет в бытие. Духовная смерть — это возвращение к той тьме. Это не просто отсутствие знания. Это отсутствие способности принимать знание. Мертвые не могут слышать. Слепые не могут видеть. И духовно мертвые не могут воспринимать реальность, в которой они существуют.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ходячие-мертвецы-духовный-диагноз\"\u003eХодячие мертвецы: Духовный диагноз\u003c/h2\u003e\n\u003cp\u003eЖанр зомби — от \"Ночи живых мертвецов\" Джорджа Ромеро (1968) до \"Ходячих мертвецов\" (2010-2022) — доминирует в американских развлечениях уже десятилетиями. Жанр резонирует не потому, что зомби реальны в биологическом смысле, а потому, что состояние, которое они представляют, реально в духовном смысле. Американцы узнают ходячих мертвецов, потому что они окружены ими — и многие находятся среди них.\u003c/p\u003e\n\u003cp\u003eХарактеристики голливудского зомби точно соответствуют характеристикам духовно мертвых:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОтсутствие самосознания.\u003c/strong\u003e Зомби не знают, что они мертвы. Духовно мертвые не знают, что они мертвы. Они считают себя живыми, функционирующими, здоровыми. \"Ибо ты говоришь: 'я богат, разбогател и ни в чем не имею нужды'; а не знаешь, что ты несчастен, и жалок, и нищ, и слеп, и наг\" (Откровение 3:17). Самое мертвое состояние — это то, которое не признает свою собственную смерть.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБессмысленное потребление.\u003c/strong\u003e Зомби потребляют без цели — движимые голодом, который они не могут удовлетворить. Духовно мертвые потребляют без цели — развлечения, еду, продукты, информацию, опыт — движимые голодом, который никакое количество потребления не может удовлетворить. Американская потребительская культура — это культура зомби: бесконечное, бессмысленное потребление вещей, которые не питают, не удовлетворяют и не дают жизни.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтадное поведение.\u003c/strong\u003e Зомби движутся ордами — следуя друг за другом, роятся в одном направлении, неспособные к независимым действиям. Духовно мертвые следуют трендам, следуют за инфлюенсерами, следуют за алгоритмами, следуют за толпой — неспособные к независимому мышлению, двигаясь в том направлении, куда движется стадо. Как исследуется в \u003ca href=\"/mass-formation-psychosis-crowds/?lang=ru\"\u003eМассовый психоз формирования и психология толп\u003c/a\u003e, стадное поведение духовно мертвых было изучено, превращено в оружие и развернуто теми, кто понимает, как направлять орду.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАгрессия к живым.\u003c/strong\u003e В зомби-фантастике мертвые атакуют живых — привлеченные к жизни, которую они чувствуют, но не могут обладать. В духовной реальности мертвые атакуют живых — те, кто демонстрирует духовное осознание, кто говорит правду, кто сопротивляется системе, кто отказывается идти со стадом, становятся мишенями, подвергаются нападкам, остракизму и заглушаются. Духовно мертвые враждебны к духовной жизни, потому что жизнь — это упрек смерти.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗаразность.\u003c/strong\u003e В зомби-фантастике укус мертвых превращает живых в мертвых. В духовной реальности контакт с духовной смертью заразен — ценности мертвых распространяются через культуру, СМИ, образование и социальное давление. Как документировано в \u003ca href=\"/education-system-indoctrination/?lang=ru\"\u003eСистема образования и индоктринация\u003c/a\u003e, институциональное преобразование живых в мертвых начинается в детстве и продолжается через каждую систему, которая формирует сознание.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"как-умерла-америка-пять-векторов-духовной-смерти\"\u003eКак умерла Америка: Пять векторов духовной смерти\u003c/h2\u003e\n\u003cp\u003eДуховная смерть Америки не произошла за одну ночь. Это было систематично — скоординированное нападение на духовную жизнь нации через пять основных векторов:\u003c/p\u003e\n\u003ch3 id=\"вектор-1-смерть-церкви\"\u003eВектор 1: Смерть церкви\u003c/h3\u003e\n\u003cp\u003eАмериканская церковь в значительной степени перестала функционировать как источник духовной жизни. Она стала социальным клубом, развлекательной площадкой, семинаром по самопомощи и политическим инструментом — чем угодно, кроме тела Христова, наделенного силой Святого Духа для проповеди Евангелия, изгнания демонов, исцеления больных и воскрешения мертвых.\u003c/p\u003e\n\u003cp\u003eДвижение ориентированное на ищущих заменило Евангелие психологией. Евангелие процветания заменило веру материализмом. Евангелие социальной справедливости заменило спасение активизмом. Прогрессивная церковь заменила Писание культурой. Каждый отход от библейского христианства высасывал больше жизни из учреждения, которое должно было быть духовной иммунной системой нации.\u003c/p\u003e\n\u003cp\u003eКогда церковь умирает, нация умирает. \"Вы — соль земли. Если же соль потеряет силу, то чем сделаешь ее соленою?\" (Матфея 5:13). Американское христианство в значительной степени потеряло свою силу. Оно ничего не сохраняет. Оно ничего не исцеляет. Оно ничему не бросает вызов. Оно идет со стадом.\u003c/p\u003e\n\u003ch3 id=\"вектор-2-смерть-образования\"\u003eВектор 2: Смерть образования\u003c/h3\u003e\n\u003cp\u003eАмериканская система образования была систематически преобразована из средства интеллектуального развития в инструмент идеологической индоктринации. Удаление молитвы из государственных школ (1962-63), удаление библейской грамотности из учебной программы, введение прояснения ценностей и морального релятивизма, замена критического мышления стандартизированным тестированием и насыщение университетов постмодернистской философией — все это способствовало производству поколений, которые могут обрабатывать информацию, но не могут мыслить, которые могут цитировать факты, но не могут различать истину, которые могут сдавать тесты, но не могут распознавать ложь.\u003c/p\u003e\n\u003cp\u003eПродукт современной системы образования — это не образованный гражданин. Это послушный потребитель — обученный принимать власть, поглощать информацию, не подвергая сомнению ее источник, и участвовать в системах, не понимая их цели. Это производство зомби.\u003c/p\u003e\n\u003ch3 id=\"вектор-3-смерть-сми\"\u003eВектор 3: Смерть СМИ\u003c/h3\u003e\n\u003cp\u003eАмериканская система СМИ — новости, развлечения, социальные сети и реклама — стала основным вектором духовной смерти. Средний американец проводит более семи часов в день, потребляя медиа. Это не потребление информации. Это формирование сознания. СМИ не просто сообщают о реальности. Они конструируют реальность. Они определяют, что реально, что важно, что истинно и что разрешено.\u003c/p\u003e\n\u003cp\u003eНовостные СМИ производят страх, разделение и замешательство. Развлекательные СМИ нормализуют грех, празднуют бунт и гламуризируют тьму. Социальные сети разрушают внимание, атомизируют сообщество и заменяют реальные отношения цифровыми симуляциями. Реклама создает искусственные желания, производит неуверенность и движет потреблением.\u003c/p\u003e\n\u003cp\u003eРезультат — население, сознание которого полностью сформировано внешними входами — население, которое не мыслит своими собственными мыслями, но обрабатывает мысли, имплантированные системой СМИ. Это не жизнь. Это программирование. И запрограммированные люди — это ходячие мертвецы.\u003c/p\u003e\n\u003ch3 id=\"вектор-4-смерть-еды\"\u003eВектор 4: Смерть еды\u003c/h3\u003e\n\u003cp\u003e\"Не ешь\" было первоначальным запретом. Первое нападение змея было через пищу. Современное нападение продолжается через тот же вектор.\u003c/p\u003e\n\u003cp\u003eАмериканские продовольственные запасы были систематически испорчены:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОбработанные продукты\u003c/strong\u003e — Насыщенные химикатами, лишенные питательности продукты, которые составляют большинство американского калорийного потребления\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПестициды\u003c/strong\u003e — Глифосат и другие химикаты, насыщающие урожай и входящие в пищевую цепь\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГМО\u003c/strong\u003e — Генетически модифицированные организмы, долгосрочное воздействие которых на здоровье человека неизвестно\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФторированная вода\u003c/strong\u003e — Нейротоксин, добавленный в муниципальные водоснабжения под видом стоматологического здоровья\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИскусственные добавки\u003c/strong\u003e — Красители, ароматизаторы, консерванты и эмульгаторы, связанные с поведенческими расстройствами, аллергическими реакциями и хроническими заболеваниями\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНаселение, которое физически больно, умственно затуманено и хронически воспалено, — это население, неспособное ясно мыслить, эффективно бороться или духовно сопротивляться. Порча пищи — это порча храма — и испорченный храм не может эффективно вмещать Святого Духа.\u003c/p\u003e\n\u003ch3 id=\"вектор-5-смерть-фармакологии\"\u003eВектор 5: Смерть фармакологии\u003c/h3\u003e\n\u003cp\u003eСоединенные Штаты потребляют больше фармацевтических продуктов на душу населения, чем любая нация на земле. Более 70% американцев принимают по крайней мере одно лекарство по рецепту. Более 50% принимают два или более. Антидепрессанты, противотревожные лекарства, опиоиды, стимуляторы и стабилизаторы настроения назначаются с такой частотой, которая предполагает не здоровое население, находящееся на поддержании, а больное население, находящееся под управлением.\u003c/p\u003e\n\u003cp\u003eГреческое слово \u003cem\u003epharmakeia\u003c/em\u003e означает колдовство — использование наркотиков для манипулирования сознанием и духовным состоянием. Население, насыщенное фармацевтическими веществами, — это население, духовное восприятие которого химически изменено. Ходячие мертвецы Америки не просто духовно обмануты. Многие фармацевтически притуплены — их способность к духовному осознанию химически подавлена теми самыми веществами, которые назначены, чтобы \"помочь\" им.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"анатомия-духовной-слепоты\"\u003eАнатомия духовной слепоты\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Для неверующих, у которых бог века сего ослепил умы, чтобы для них не воссиял свет благовествования о славе Христа, Который есть образ Бога невидимого.\" — 2 Коринфянам 4:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДуховная слепота — это не просто невежество. Это активное состояние — преднамеренное ослепление, выполняемое \"богом века сего\" (Сатаной), чтобы предотвратить видение истины людьми. Слепота не случайна. Она стратегична. Враг ослепляет умы специально, чтобы предотвратить принятие Евангелия.\u003c/p\u003e\n\u003cp\u003eЭто означает, что духовная смерть Америки — это не естественный упадок. Это действие врага. Векторы смерти — порча церкви, образования, СМИ, пищи и фармакологии — это не случайные неудачи. Это скоординированные нападения на духовную жизненность нации, выполняемые врагом, который понимает, что духовно живая Америка будет сопротивляться его повестке, а духовно мертвая Америка будет подчиняться ей.\u003c/p\u003e\n\u003cp\u003eОрда зомби не сопротивляется. Она не задает вопросов. Она не различает. Она следует. Она потребляет. Она атакует живых. Это идеальное население для системы зверя — население, которое примет цифровой ID, CBDC, социальный кредит, наблюдение, фармацевтические мандаты и в конечном итоге начертание зверя без сопротивления, потому что они мертвы, а мертвые не сопротивляются.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"воскресение-единственное-лекарство\"\u003eВоскресение: Единственное лекарство\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И вас, мертвых по преступлениям и грехам вашим, оживил.\" — Ефесянам 2:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЛекарство от духовной смерти — это не образование. Это не информация. Это не осознание. Это воскресение — сверхъестественный акт Бога, который поднимает мертвых к жизни. \"Оживил\" означает \"сделал живым\" — та же сила, которая воскресила Христа из мертвых, — это сила, которая поднимает духовно мертвых к духовной жизни.\u003c/p\u003e\n\u003cp\u003eВот почему Евангелие — единственное решение. Никакое политическое движение, никакая инициатива реформы, никакая информационная кампания не могут поднять мертвых. Только Дух Божий, действующий через слово Божье, может проникнуть через слепоту, разорвать цепи и вдохнуть жизнь в духовно мертвых. \"Дух дышит, где хочет, и голос его слышишь, а не знаешь, откуда приходит и куда уходит: так бывает со всяким, рожденным от Духа\" (Иоанна 3:8).\u003c/p\u003e\n\u003cp\u003eОпыт рождения свыше — это не религиозная концепция. Это биологически-духовное событие — передача божественной жизни в мертвый дух. Мертвый человек становится живым. Слепой человек видит. Глухой человек слышит. Зомби снова становится человеком — не через самостоятельное усилие, а через силу Божью.\u003c/p\u003e\n\u003cp\u003eВот почему враг нацеливается на Евангелие прежде всего. Он будет терпеть религию. Он будет терпеть мораль. Он будет терпеть духовность. То, что он не может терпеть, — это воскресение — сила Божья, которая поднимает мертвых и создает живые души, которые могут видеть сквозь его обманы, сопротивляться его системам и противостоять его повестке.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"остаток-живые-среди-мертвых\"\u003eОстаток: Живые среди мертвых\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Впрочем, Я соблюл между Израильтянами семь тысяч [мужей]; всех сих колени не преклонялись перед Ваалом.\" — 3 Царств 19:18\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВ каждом поколении Бог сохраняет остаток — народ, который жив, когда все вокруг них мертвы. Илия думал, что он единственный живой пророк в Израиле. Бог сказал ему, что их семь тысяч. Остаток всегда меньше, чем ожидает мир, и больше, чем верит остаток.\u003c/p\u003e\n\u003cp\u003eВ зомби-Америке остаток — это духовно живые — те, кто был оживлен Духом, кто может видеть сквозь обманы, кто отказывается идти со стадом, кто говорит правду в мире лжи, кто поклоняется Создателю в культуре идолопоклонства и кто стоит в вере, когда каждая система давит на них, чтобы подчиниться.\u003c/p\u003e\n\u003cp\u003eОстатку некомфортно. Жить среди мертвых нелегко. Живые в меньшинстве, непоняты, высмеяны, маргинализированы и все больше преследуемы. Но они живы. И потому что они живы, они несут единственное, что может спасти мертвых: Евангелие Иисуса Христа — силу Божью ко спасению для всех, кто верит.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"предупреждение-и-надежда\"\u003eПредупреждение и надежда\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Встань, спящий, и воскресни из мертвых, и осветит тебя Христос.\" — Ефесянам 5:14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПредупреждение суровое: Америка — ходячие мертвецы. Нация, которая была основана с большим доступом к Евангелию, чем любая нация в истории, стала зомби-пустошью — духовно мертвой, морально слепой, интеллектуально скомпрометированной, физически испорченной и фармацевтически притупленной. Векторы смерти сделали свою работу. Орда шаркает вперед.\u003c/p\u003e\n\u003cp\u003eНо надежда больше, чем предупреждение. Христос дает свет. Мертвые могут быть воскрешены. Слепые могут видеть. Спящие могут проснуться. Зомби может снова стать человеком — действительно человеком, каким задумал Бог, несущим Его образ, наполненным Его Духом, живым в мире смерти.\u003c/p\u003e\n\u003cp\u003eЛекарство не политическое. Оно не образовательное. Оно не информационное. Оно духовное. Это Евангелие. Это сила Божья. И оно доступно для каждого мертвого мужчины и женщины, которые воззовут к живому Богу о воскресении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/263-Zombies_Walk_America.mp4\"\u003eЗомби ходят по Америке\u003c/a\u003e — Духовная смерть нации\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/5-5G_Zombie_Slaves.mp4\"\u003e5G зомби-рабы\u003c/a\u003e — Ходячие мертвецы цифровой эры\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mass-formation-psychosis-crowds/?lang=ru\"\u003eМассовый психоз формирования и психология толп\u003c/a\u003e — Психологические механизмы, которые создают и контролируют орду\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/education-system-indoctrination/?lang=ru\"\u003eСистема образования и индоктринация\u003c/a\u003e — Как фабрика зомби обрабатывает следующее поколение\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОни ходят. Они едят. Они потребляют. Они повинуются. Они не спрашивают. Они не сопротивляются. Они не молятся. Они мертвы — и они не знают, что они мертвы. Это Америка в 21-м веке: нация ходячих мертвецов, духовно убитая испорченными церквями, отравленной пищей, фармацевтическим колдовством, программированием СМИ и образовательной индоктринацией. Апокалипсис зомби — это не фантастика. Это диагноз. Но есть лекарство. Всегда было лекарство. \"Встань, спящий, и воскресни из мертвых, и осветит тебя Христос\". Свет все еще сияет. Сила все еще работает. Бог, который воскрешает мертвых, не вышел на
