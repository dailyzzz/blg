ждый продукт, который вы покупаете в магазине, несет скрытый налог, за который вы никогда не голосовали, никогда не согласились, и вероятно, никогда не заметили. Посмотрите на упаковку почти любого пищевого продукта в вашей кладовой — хлопья, консервированные товары, закуски, напитки — и вы найдете небольшой символ: U в круге, К, звезду-К или один из десятков похожих символов. Это символы кошерной сертификации, и они представляют многомиллиардную промышленность, которая работает полностью вне общественного контроля.\u003c/p\u003e\n\u003cp\u003eВидение Говарда Питтмана в НОИ показало духовное царство, управляемое иерархией и территорией. Демоны действуют через системы — экономические, религиозные, культурные — которые собирают духовную энергию от неосведомленного населения. Питтман был сказано, что 97,5 процента христиан были отвергнуты при смерти, что 95 процентов служат \"себе\", и что каждое слово несет духовный вес (Матфей 12:36-37). Система кошерной сертификации — одна из экономических систем, через которую начальства и власти Ефесян 6:12 осуществляют контроль — система, которая облагает налогом пищевое снабжение, скрываясь в простоте.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПроклятие Змея — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eЛожь обманщика — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-кошерная-сертификация\"\u003eЧто такое кошерная сертификация?\u003c/h2\u003e\n\u003ch3 id=\"символы-которые-вы-никогда-не-заметили\"\u003eСимволы, которые вы никогда не заметили\u003c/h3\u003e\n\u003cp\u003eКошерная сертификация — это система, в соответствии с которой пищевые продукты инспектируются и одобряются как соответствующие еврейскому диетическому закону (кашруту). Сертификация проводится частными организациями — не государственными органами — которые взимают плату с производителей за проверку и право отображать кошерный символ на их упаковке.\u003c/p\u003e\n\u003cp\u003eКрупнейшие сертифицирующие организации включают Orthodox Union (OU), OK Kosher, Star-K и Kof-K. Вместе они сертифицируют более 80 процентов упакованных продуктов в Соединенных Штатах. Это означает, что подавляющее большинство пищевых продуктов, которые покупают американцы, были подвергнуты частной религиозной проверке и несут стоимость этой проверки в цене.\u003c/p\u003e\n\u003cp\u003eСтоимость передается потребителю. Каждый кошер-сертифицированный продукт стоит больше, чем он был бы без сертификации — плата, уплачиваемая производителями, встроена в цену. Это, по сути, религиозный налог на пищевое снабжение, уплаченный потребителями всех вер (и без веры) без их знания или согласия.\u003c/p\u003e\n\u003cp\u003eAgent131711 обширно задокументировал на Substack (agent131711.substack.com) как эта система работает как теневая промышленность — генерирующая миллиарды в доходе, пока остается невидимой для среднего потребителя. Символы малы. Сборы не раскрыты. И организации, которые их собирают, работают с непрозрачностью разведывательных агентств.\u003c/p\u003e\n\u003ch3 id=\"масштаб-операции\"\u003eМасштаб операции\u003c/h3\u003e\n\u003cp\u003eКонсервативные оценки размещают рынок кошерной сертификации на более чем 12 миллиардах долларов ежегодно в Соединенных Штатах. Это включает не только пищевые продукты, но также чистящие средства, фармацевтические препараты, косметику и даже алюминиевую фольгу. Объем кошерной сертификации расширился далеко за рамки диетического права в универсальный коммерческий режим, который касается практически каждого произведенного продукта.\u003c/p\u003e\n\u003cp\u003eЕврейские американцы составляют примерно 2 процента населения США. Из них, только часть строго соблюдает кашрут. Однако более 40 процентов упакованных пищевых продуктов в США сертифицированы как кошер. Рынок, обслуживаемый, значительно больше, чем сообщество, чьи религиозные права сертификация якобы применяет.\u003c/p\u003e\n\u003cp\u003eЭто несоответствие повышает очевидный вопрос: если кошерная сертификация служит маленькому религиозному сообществу, почему она охватывает большинство пищевого снабжения? Ответ лежит в бизнес-модели сертификационной промышленности, которая генерирует доход не путем обслуживания потребителей, а путем облагации налогом производителей — которые передают стоимость всем потребителям независимо от их веры.\u003c/p\u003e\n\u003ch2 id=\"как-система-работает\"\u003eКак система работает\u003c/h2\u003e\n\u003ch3 id=\"процесс-сертификации\"\u003eПроцесс сертификации\u003c/h3\u003e\n\u003cp\u003eПроизводитель пищи, ищущий кошерную сертификацию, связывается с сертифицирующим агентством. Агентство отправляет раввина (машгиаха) для проверки учреждения, ингредиентов, оборудования и производственных процессов. Если все соответствует стандартам кашру, агентство предоставляет сертификацию, и производитель платит плату — как правило, ежегодно, но иногда за продукт.\u003c/p\u003e\n\u003cp\u003eПлата сильно варьируется. Небольшие компании могут платить несколько тысяч долларов ежегодно. Крупные корпорации платят миллионы. Точные платежи почти никогда не разглашаются открыто — они защищены соглашениями о неразглашении между сертифицирующим агентством и производителем. Эта секретность сама по себе значительна: религиозный налог на пищевое снабжение работает под теми же правилами конфиденциальности, что и классифицированные операции разведки.\u003c/p\u003e\n\u003cp\u003eПроизводитель затем отображает символ сертифицирующего агентства на упаковке. Этот символ не требуется по закону. Никакой государственный мандат не обязывает кошерную сертификацию. Это частное расположение между частными сущностями, налагаемое на пищевое снабжение гравитационным притяжением рыночной мощи сертифицирующих агентств.\u003c/p\u003e\n\u003ch3 id=\"почему-компании-соблюдают\"\u003eПочему компании соблюдают\u003c/h3\u003e\n\u003cp\u003eКомпании ищут кошерную сертификацию не потому, что потребители требуют это, а потому, что розничные торговцы требуют это. Основные сети продуктовых магазинов предпочитают сертифицированные кошером продукты, потому что они упрощают управление запасами — кошер-сертифицированный продукт может быть продан всем потребителям, включая соблюдающие кашрут меньшинства. Производители, которые отказываются от сертификации, рискуют потерять полочное пространство конкурентам, которые соблюдают.\u003c/p\u003e\n\u003cp\u003eЭто создает принудительную динамику, которая зеркально отражает иезуитскую модель институционального контроля. Сертифицирующие агентства не должны кого-либо заставлять. Архитектура системы создает соответствие автоматически. Так же, как иезуиты управляли \"всем миром\" (Тамбурини) без явной силы — через образование, исповедь и институциональное размещение — система кошерной сертификации управляет пищевым снабжением через рыночное давление, требования розничных торговцев и угрозу коммерческого исключения.\u003c/p\u003e\n\u003ch2 id=\"финансовая-архитектура\"\u003eФинансовая архитектура\u003c/h2\u003e\n\u003ch3 id=\"куда-идут-деньги\"\u003eКуда идут деньги\u003c/h3\u003e\n\u003cp\u003eМиллиарды, генерируемые кошерной сертификацией, текут к сертифицирующим организациям, которые являются частными религиозными сущностями. Эти организации не обязаны разглашать свои финансы публике. Orthodox Union, крупнейший сертификатор, является 501(c)(3) организацией, освобожденной от налогов, но ее финансовые раскрытия ограничены.\u003c/p\u003e\n\u003cp\u003eВопрос о том, куда идут эти деньги — какие причины они поддерживают, какие учреждения они финансируют, какие программы они поддерживают — это вопрос, который традиционные СМИ последовательно отказывались исследовать. Это не удивительно. Сама медиа-промышленность подвергается тем же институциональным давлениям, которые управляют пищевой промышленностью: ставить под сомнение систему кошерной сертификации рассматривается как акт религиозной предвзятости, а не законной защиты прав потребителей.\u003c/p\u003e\n\u003cp\u003eРабота Agent131711 на Substack изучает эти финансовые потоки подробно, отслеживая связи между сертифицирующими организациями и более крупными институциональными сетями. Возникающая картина знакома: частная религиозная власть, извлекающая богатство из светского населения через механизмы, работающие вне демократического надзора.\u003c/p\u003e\n\u003ch3 id=\"расчет-скрытого-налога\"\u003eРасчет скрытого налога\u003c/h3\u003e\n\u003cp\u003eЕсли кошерная сертификация добавляет даже один цент к цене продукта, и если этот продукт покупают 330 миллионов американцев, совокупная стоимость составляет 3,3 миллиона долларов за продукт в год. Умножьте это на десятки тысяч сертифицированных продуктов, и скрытый налог достигает миллиардов.\u003c/p\u003e\n\u003cp\u003eЭто не налог, взимаемый правительством. Он не подлежит демократическому обсуждению, законодательному надзору или одобрению избирателей. Это частный религиозный сбор на пищевое снабжение целой нации, собираемый организациями, которые работают с секретностью разведывательных агентств и авторитетом религиозного права.\u003c/p\u003e\n\u003cp\u003eГоварду Питтману было сказано, что духовное царство работает через системы, которые большинство людей не может видеть. Система кошерной сертификации — одна такая система — невидимая для большинства потребителей, не подотчетная никакому общественному органу и генерирующая богатство, текущее по каналам, скрытым от общественного взгляда. Начальства и власти Ефесян 6:12 действуют ровно через такие невидимые системы.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"пища-как-духовная-территория\"\u003eПища как духовная территория\u003c/h3\u003e\n\u003cp\u003eБиблия учит, что пища — это духовная территория. Первый грех включал еду. Законы кашру — это, по их происхождению, духовные законы — они определяют границу между чистым и нечистым, дозволенным и запрещенным. Контроль пищи — это контроль наиболее основной человеческой потребности, и тот, кто контролирует пищу, контролирует население.\u003c/p\u003e\n\u003cp\u003eИезуиты понимали это. Их миссии по всему миру всегда включали сельское хозяйство — контроль пищевого снабжения был предпосылкой для контроля сообщества. Система кошерной сертификации работает на том же принципе: контролируя сертификацию пищи, сертифицирующие агентства осуществляют власть над наиболее фундаментальным аспектом человеческого существования.\u003c/p\u003e\n\u003cp\u003eСистема Сатурна, как задокументировано в этой серии, работает через материальный контроль — связывая сознание с физическим миром через экономические, социальные и диетические механизмы. Система кошерной сертификации — один такой механизм: религиозная власть, претендующая на юрисдикцию над материальным пропитанием, извлекающая дань из населения, пока оставаясь невидимой для всех, кроме наиболее внимательных.\u003c/p\u003e\n\u003cp\u003eЭто Часть 1. В Частях 2 и 3 мы будем исследовать теневую промышленность, которая повышает цены на продукты питания через крышу, и следовать за кроличьей норой глубже в операции мафии кошерной пищи.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry
