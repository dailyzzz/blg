га человечеству была размножаться. Любая сила, которая подрывает человеческую плодовитость, наносит удар по наиболее фундаментальному божественному мандату. Стевия — \"естественный\" подсластитель, продаваемый как здоровая альтернатива сахару и искусственным подсластителям — имеет задокументированную историю в качестве противозачаточного. Коренные народы Южной Америки использовали его в течение столетий для предотвращения беременности. И теперь он находится в вашей пище, вашем напитке, закусках ваших детей.\u003c/p\u003e\n\u003cp\u003eОпыт близкого столкновения со смертью Хоуарда Питтмана раскрыл духовную войну экстраординарного масштаба. Демонические иерархии на втором небе. 97,5% отвержения. 95% самообслуживания. Каждое слово судится (Матфей 12:36-37). Оружие пищевого снабжения против человеческой плодовитости — это не теория заговора — это задокументированная стратегия, которая работает через те же институциональные системы, которые иезуиты построили и культ Сатурна поддерживает.\u003c/p\u003e\n\u003cp\u003eВоенная организация Лойолы. \"Абсолютная власть\" Наполеона. Тамбурини управляет \"всем миром\". Климент XIV отравлен. \u003cem\u003eКатолическая тайна\u003c/em\u003e: инфильтрация \"скрытая хитростью\", слепое повиновение, \"каждый вид порока\". Иезуиты давно ассоциируются со стратегиями депопуляции — миссиями, которые разрушили коренные популяции, системами образования, которые отсрочили брак и снизили размер семьи, институциональной политикой, которая приоритизирует контроль над воспроизводством.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПроклятие Змея — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМаскировка Сатаны — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"история-противозачаточного\"\u003eИстория противозачаточного\u003c/h2\u003e\n\u003ch3 id=\"коренное-знание\"\u003eКоренное знание\u003c/h3\u003e\n\u003cp\u003eСтевия ребаудиана — растение, родное из Парагвая и Бразилии. Гарани люди, которые использовали его в течение столетий, называли его \u003cem\u003eka'a he'e\u003c/em\u003e — \"сладкую траву\". Но гарани не использовали стевию только как подсластитель. Они использовали её как лечебное растение — и одно из его задокументированных традиционных использований было как противозачаточное.\u003c/p\u003e\n\u003cp\u003eЭто не краевая история. Это задокументировано в этноботанической литературе. Женщины гарани использовали препараты стевии для предотвращения беременности и регулирования менструации. Растение было признано коренными народами как имеющее анти-плодовитые свойства задолго до того, как западная наука исследовала его.\u003c/p\u003e\n\u003cp\u003eИезуитские миссионеры, которые установили миссии (редукции) среди гарани в 17-18 веках, знали бы о традиционных использованиях стевии. Иезуиты были меркантильными документаторами коренного знания — их отчёты в Рим включали подробную ботаническую и медицинскую информацию. Вопрос о том, что иезуиты делали с этим знанием, — это вопрос, который институциональная история осторожно избегала.\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует на Substack (agent131711.substack.com) связь между иезуитским ботаническим знанием и современным фармацевтическим развитием. Иезуиты собирали образцы растений, рецепты лечения и традиционное знание с каждого континента, который они достигали. Это знание не исчезло, когда миссии закрылись. Оно вошло в институциональную сеть и всплыло в формах, которые служат институциональным повесткам дня.\u003c/p\u003e\n\u003ch3 id=\"научные-доказательства\"\u003eНаучные доказательства\u003c/h3\u003e\n\u003cp\u003eМножество исследований исследовали эффекты стевии на плодовитость:\u003c/p\u003e\n\u003cp\u003eИсследование 1968 года, опубликованное в журнале \u003cem\u003eEconomic Botany\u003c/em\u003e, задокументировало использование стевии гарани как противозачаточного и отметило, что продолжительное потребление снизило плодовитость в лабораторных животных.\u003c/p\u003e\n\u003cp\u003eИсследование 1999 года, опубликованное в \u003cem\u003ePhytomedicine\u003c/em\u003e, обнаружило, что стевиозид — активное соединение стевии — снизило уровни тестостерона и производство спермы в мужских крысах при высоких дозах.\u003c/p\u003e\n\u003cp\u003eИсследование 2012 года обнаружило, что экстракт стевии влиял на репродуктивные гормоны у женских крыс, потенциально нарушая овуляцию.\u003c/p\u003e\n\u003cp\u003eОтвет индустрии предсказуем: дозы в этих исследованиях выше нормального потребления пищи. Аргумент о дозе — тот же аргумент, используемый для защиты мышьяка в рисе — игнорирует накопленное воздействие, синергические эффекты и реальность, что стевия теперь присутствует в тысячах продуктов, потребляемых ежедневно миллионами людей.\u003c/p\u003e\n\u003ch2 id=\"современный-взрыв-стевии\"\u003eСовременный взрыв стевии\u003c/h2\u003e\n\u003ch3 id=\"от-нишевого-к-вездесущему\"\u003eОт нишевого к вездесущему\u003c/h3\u003e\n\u003cp\u003eДве декады назад стевия была нишевым продуктом, найденным в магазинах здоровой пищи. Сегодня она повсюду. Coca-Cola использует её (как Truvia). PepsiCo использует её (как PureVia). Она появляется в йогурте, протеиновых батончиках, ароматизированной воде, жевательной резинке, зубной пасте, детских витаминах и тысячах других продуктов.\u003c/p\u003e\n\u003cp\u003eСкорость принятия стевии была замечательной. В 2008 году FDA предоставило стевии статус GRAS (Generally Recognized As Safe). В течение десятилетия она проникла в практически каждую категорию пищевой индустрии. Это быстрое принятие не было вызвано спросом потребителей — оно было вызвано производителями пищевых продуктов, ищущими \"естественную\" альтернативу искусственным подсластителям, которые сталкивались с растущим общественным скептицизмом.\u003c/p\u003e\n\u003cp\u003eПереход от растения, известного коренными народами как противозачаточное, к вездесущему добавку в пищу, потребляемой миллиардами, — это не естественная эволюция рынка. Это институциональное решение — сделанное теми же корпорациями питания, которые контролируют глобальное пищевое снабжение, регулируемое теми же захваченными органами, которые позволяют мышьяку в рисе, и поднято тем же средством, который подавляет неудобные истины.\u003c/p\u003e\n\u003ch3 id=\"вопрос-о-дозировке\"\u003eВопрос о дозировке\u003c/h3\u003e\n\u003cp\u003eСколько стевии потребляет средний американец? Это трудно рассчитать, потому что стевия появляется во многих продуктах. Человек, который пьёт подслащенные стевией напитки, ест подслащенный стевией йогурт, жует подслащенную стевией жвачку и принимает подслащенные стевией добавки, может потреблять гораздо больше стевиозида, чем предполагают любые отдельные метки продукта.\u003c/p\u003e\n\u003cp\u003eСовокупное ежедневное потребление стевии во всех источниках не было всесторонне изучено. Определение GRAS FDA было основано на использовании отдельного продукта, а не на совокупном воздействии во всей диете. Это нормативный отказ, который отражает ситуацию с мышьяком в рисе: каждый продукт оценивается в изоляции, в то время как общее воздействие потребителя на все продукты игнорируется.\u003c/p\u003e\n\u003ch2 id=\"контекст-депопуляции\"\u003eКонтекст депопуляции\u003c/h2\u003e\n\u003ch3 id=\"падающие-уровни-плодовитости\"\u003eПадающие уровни плодовитости\u003c/h3\u003e\n\u003cp\u003eГлобальные уровни плодовитости падают в течение десятилетий. В развитых странах рождаемость ниже уровня замещения. В Соединённых Штатах, уровень плодовитости упал до исторического минимума в 2023 году. Предоставленные объяснения — экономическое давление, приоритеты карьеры, культурные сдвиги — реальны, но неполны. Они не рассчитывают на биологическое измерение: задокументированное снижение количества сперматозоидов, увеличение репродуктивных расстройств и вездесущность химических веществ, нарушающих эндокринную систему в пищевом снабжении, водоснабжении и потребительских продуктах.\u003c/p\u003e\n\u003cp\u003eСтевия — одна из многих веществ в современной диете с задокументированными анти-плодовитыми эффектами. BPA, фталаты, глифосат, атразин и дюжины других химических веществ — известные эндокринные разрушители. Совокупный эффект потребления всех этих веществ одновременно, в течение жизни, никогда не было изучено — потому что ни одно учреждение с силой проводить такое исследование не имеет стимула раскрыть его результаты.\u003c/p\u003e\n\u003cp\u003eИсследование Agent131711 на Substack связывает падающие уровни плодовитости с более широкой повесткой дня, задокументированной в написаниях глобальной элиты: Club of Rome, World Economic Forum, United Nations Population Fund. Эти организации открыто выступают за сокращение населения в течение десятилетий. Вопрос не в том, существует ли повестка дня депопуляции — она задокументирована. Вопрос в том, какие инструменты используются для её реализации.\u003c/p\u003e\n\u003ch3 id=\"измерение-духовной-войны\"\u003eИзмерение духовной войны\u003c/h3\u003e\n\u003cp\u003eПервой командой Бога была плодовитость и размножение. Любая сила, которая подрывает эту команду, противоположна Божественной цели. Principalities and powers из Эфесян 6:12 работают через системы — и пищевая система, загруженная химическими веществами, подавляющими плодовитость, включая стевию, является одной из таких систем.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман был свидетелем демонических сущностей, организованных для разрушения человечества. Уровень 97,5% отвержения демонстрирует духовные последствия жизни в системах, разработанных слугами этих сущностей. Отравление пищевого снабжения веществами, подавляющими плодовитость, — это не просто вопрос здоровья — это духовная атака на первую команду Бога.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые были вовлечены в управление населением со своих первых миссий, понимают силу тонкого биологического вмешательства. Их готовность практиковать \"каждый вид порока\" (Католическая тайна) распространяется на любые методы, которые служат институциональной повестке дня. Замена сахара известным противозачаточным растительным экстрактом в глобальном пищевом снабжении — это точно то, что характеризирует иезуитскую методологию: тонкая, отрицаемая, системно-широкая вмешательство.\u003c/p\u003e\n\u003ch2 id=\"защита-себя\"\u003eЗащита себя\u003c/h2\u003e\n\u003ch3 id=\"практические-шаги\"\u003eПрактические шаги\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЧитайте каждый ярлык\u003c/strong\u003e: Стевия появляется под многими именами — экстракт стевии, гликозиды стевиола, Reb A, Truvia, PureVia. Выучите идентифицировать их все.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВыбирайте целые продукты\u003c/strong\u003e: Лучший способ избежать стевии — есть продукты, которые не требуют подслащивания — свежие фрукты, овощи, мясо и зерна.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eИспользуйте сырой мед или реальный сахар в модерации\u003c/strong\u003e: Эти естественные подсластители, хотя калорийные, не несут историю подавления плодовитости стевии.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЗащитите ваших детей\u003c/strong\u003e: Детские продукты все чаще подслащиваются стевией. Читайте ярлыки на всём, что потребляют ваши дети.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eРаспространяйте осведомленность\u003c/strong\u003e: Большинство людей никогда не слышали об истории противозачаточного стевии. Поделитесь этой информацией.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eУзкий путь ведёт через информированные выборы — выборы, которые отвергают удобство промышленной пищевой системы в пользу трудной, целеустремленной работы поедания того, что Бог предоставил, а не того, что система разработала.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Исследование истории противозачаточного стевии и повестки дня депопуляции\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвидетельство ОСД Хоуарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСмотрите на YouTube\u003c/a\u003e — Духовная война через материальные системы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКатолическая тайна: раскрытие позорящих иезуитских секретов\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eСмотрите на YouTube\u003c/a\u003e — Иезуитские методы управления населением\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eПроклятие Змея\u003c/a\u003e\
