е нельзя подавлять. Сомнения, что шепчут в три утра. Противоречия, которые грызут во время проповеди. Разрыв между тем, чему учит институция, и тем, что действительно говорит текст. Этот момент — не кризис веры. Это рождение веры — настоящей веры, проверенной веры, веры, пережившей огонь расследования, а не теплую ванну традиции.\u003c/p\u003e\n\u003cp\u003eГовард Питтман во время своего опыта клинической смерти столкнулся с самой тревожной истиной, с которой может столкнуться верующий: институция терпит неудачу. Из христиан, которые умерли во время его опыта, 97,5 процента были отвергнуты. Они посещали церковь, отмечали праздники, произносили имя Иисуса. Но они \"никогда не сделали Меня Господом\". Питтман узнал, что 95 процентов исповедующих себя христианами служат \"себе\", а не Богу. Их слова, которые несут духовный вес согласно Матфею 12:36-37, были словами, которые учила их институция — но эти слова не спасли их.\u003c/p\u003e\n\u003cp\u003eИезуиты построили институцию. Военная организация Игнатия Лойолы, владеющая \"абсолютной властью\" Наполеона, создала образовательную, литургическую и богословскую структуру, в которой поклоняется большинство христиан. Адамс предупреждал об их \"вечном проклятии\". Тамбурини управлял \"всем миром\". Климент XIV был отравлен за то, что противился им. Религия, которую вы практикуете, была сформирована людьми, которые, согласно фильму \"Католические тайны\", проникают \"скрытно хитростью\" и практикуют \"любой вид порока\".\u003c/p\u003e\n\u003cp\u003eВот где начинается путь.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/15-From_Dust_to_Glory.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Dust to Glory — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/27-The_Promise_of_Salvation.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Promise of Salvation — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"первый-вопрос-кто-вас-учил\"\u003eПервый вопрос: Кто вас учил?\u003c/h2\u003e\n\u003ch3 id=\"цепь-передачи\"\u003eЦепь передачи\u003c/h3\u003e\n\u003cp\u003eКаждое убеждение, которое вы держите о Боге, Иисусе, спасении, писании, морали и загробной жизни, было передано вам кем-то. Ваши родители, ваш пастор, ваш учитель воскресной школы, ваша конфессия — каждое звено в цепи сформировало ваше понимание духовной реальности. Но кто сформировал их?\u003c/p\u003e\n\u003cp\u003eПроследите любую конфессию достаточно далеко назад, и вы придете к институции. Католическая церковь утверждает апостольскую преемственность — непрерывную цепь от Петра до нынешнего Папы. Протестантские конфессии восходят к Реформации, которая была реакцией против Католической Церкви, но сохранила большую часть её богословской структуры. Вероучения, канон, календарь, концепции рая и ада, структура богослужения — всё это было установлено институциями, конкретно советами людей, которые приняли решения о том, что вы будете верить, за века до вашего рождения.\u003c/p\u003e\n\u003cp\u003eИезуиты повлияли на эти институции больше, чем любая другая организация. Их образовательная система обучала духовенство. Их богословы формировали доктрины. Их миссионеры основывали церкви. Их Ratio Studiorum стал шаблоном для семинарского образования. Когда вы сидите на скамье и слушаете проповедь, вы слушаете результат системы, которую иезуиты разработали.\u003c/p\u003e\n\u003ch3 id=\"неудобные-последствия\"\u003eНеудобные последствия\u003c/h3\u003e\n\u003cp\u003eЭто не означает, что всё, чему вас учили, ложно. Это означает, что всё, чему вас учили, должно быть проверено. Павел велел фессалоникийцам \"испытать всё\" — проверить, изучить, убедиться. Беряне были похвалены в Деяниях 17:11 за то, что \"с охотой выслушали слово и ежедневно разбирали писания, исследуя, точно ли это так\".\u003c/p\u003e\n\u003cp\u003eИнституциональная церковь отговаривает такое поведение. Она называет сомнения \"сомнениями\" и относится к сомнению как к греху. Она требует веры — но веры в институцию, а не веры в Бога. Есть огромная разница между доверием Богу и доверием людям, которые претендуют говорить от его имени, особенно когда эти люди были обучены организацией, которая, согласно фильму \"Католические тайны\", работает через обман, слепое повиновение и \"любой вид порока\".\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует в Substack, как институциональная церковь систематически отговаривала независимое изучение писания на протяжении всей своей истории. На протяжении веков Католическая Церковь держала Библию на латыни, недоступной для обычных людей. Когда Виклиф и Тиндейл переводили её на английский, их преследовали. Иезуиты сожгли Тиндейла на костре. Институция не хочет, чтобы вы читали текст сами, потому что текст противоречит институции.\u003c/p\u003e\n\u003ch2 id=\"что-добавила-институция\"\u003eЧто добавила институция\u003c/h2\u003e\n\u003ch3 id=\"традиции-не-найденные-в-писании\"\u003eТрадиции, не найденные в писании\u003c/h3\u003e\n\u003cp\u003eСписок институциональных традиций, не имеющих основания в писании, длиннее, чем предполагают большинство христиан:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРождество\u003c/strong\u003e: Ни один текст писания не записывает дату рождения Иисуса. Дата 25 декабря была принята из языческих солнечных фестивалей. Рождественская ёлка, обмен подарками и Санта-Клаус — языческие дополнения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПасха\u003c/strong\u003e: Название происходит от Иштар/Эостр, языческих богинь плодородия. Яйца и кролики — символы плодородия. Время определяется языческим лунным календарем.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБогослужение в воскресенье\u003c/strong\u003e: Ранняя церковь встречалась в субботу. Переход на воскресенье был решением Католической Церкви, а не библейской командой.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТроица\u003c/strong\u003e: Слово \"Троица\" не появляется в писании. Доктрина была формализована на Никейском соборе в 325 году нашей эры под руководством императора Константина — политического лидера, а не пророка.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКрещение младенцев\u003c/strong\u003e: Ни один текст писания не записывает крещение младенца. Крещение в писании постоянно представляется как сознательный, добровольный акт.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПапство\u003c/strong\u003e: Ни один текст писания не устанавливает единого человеческого лидера церкви. Интерпретация Матфея 16:18 (\"на этом камне я создам мою церковь\") как установления папской власти — это католическая традиция, а не текстовая определённость.\u003c/p\u003e\n\u003cp\u003eКаждое из этих дополнений служит институции. Рождество и Пасха создают обязательные события участия. Богослужение в воскресенье отличает христианство от иудаизма. Троица обеспечивает богословскую основу для институциональной власти. Крещение младенцев захватывает членов до того, как они могут выбрать. Папство централизует власть.\u003c/p\u003e\n\u003ch3 id=\"традиции-которые-противоречат-писанию\"\u003eТрадиции, которые противоречат писанию\u003c/h3\u003e\n\u003cp\u003eНекоторые институциональные традиции не просто добавляют к писанию — они напрямую противоречат ему.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНазывать духовенство \"отцом\"\u003c/strong\u003e: Иисус явно запретил это в Матфее 23:9: \u003cem\u003e\"И не называйте никого на земле отцом вашим; один у вас Отец, Который на небесах.\"\u003c/em\u003e Католическая Церковь полностью игнорирует эту команду.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПовторяющаяся молитва\u003c/strong\u003e: Иисус предупредил о \"пустых повторениях\" в Матфее 6:7. Чётки, которые повторяют одни и те же молитвы десятки раз, — это определение пустой повторяющейся молитвы.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсповедание священникам\u003c/strong\u003e: Писание говорит: \"один Посредник между Богом и людьми, человек Христос Иисус\" (1 Тимофею 2:5). Исповедь, где священники претендуют на власть отпускать грехи, напрямую противоречит этому.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМолитва святым\u003c/strong\u003e: Вторая заповедь запрещает создание и почитание изображений. Католическая практика молитвы святым и почитания их изображений нарушает эту заповедь.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые служат интеллектуальной элитой Католической Церкви, полностью осознают эти противоречия. Их стратегия, раскрытая в фильме \"Католические тайны\", состоит в том, чтобы сохранять традиции, служащие институциональной власти, независимо от их библейского основания. Слепое послушание, требуемое иезуитским клятвой, гарантирует, что члены соблюдают эти традиции без вопросов.\u003c/p\u003e\n\u003ch2 id=\"что-институция-удалила\"\u003eЧто институция удалила\u003c/h2\u003e\n\u003ch3 id=\"утраченные-учения\"\u003eУтраченные учения\u003c/h3\u003e\n\u003cp\u003eБолее тревожно, чем то, что было добавлено, — это то, что было удалено. Институциональная церковь отредактировала канон — список книг, считаемых \"писанием\" — посредством серии советов, которые исключили тексты, неудобные для институции.\u003c/p\u003e\n\u003cp\u003eКнига Еноха, цитируемая в послании Иуды (Иуда 1:14-15) и явно известная апостолам, была исключена из западного канона. Её детальное описание павших ангелов, нефилимов и структуры небес не соответствовали богословской структуре институции.\u003c/p\u003e\n\u003cp\u003eЕвангелие от Фомы, коллекция изречений, приписываемых Иисусу, была исключена. Многие из его изречений подчеркивают прямое, личное знание Бога — гнозис — что подрывает роль институции как необходимого посредника.\u003c/p\u003e\n\u003cp\u003eМногочисленные другие тексты — \"Пастырь Ермы\", \"Дидахе\", \"Апокалипсис Петра\" — включались в ранние христианские каноны и позже были удалены. Институция решила, что вы могли читать, а что нет, что было \"вдохновлено\", а что нет, на основе критериев, служивших институциональной власти.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показано, что духовная сфера работает на истине, а не на традиции. Тексты, которые были удалены, могут или не быть вдохновлены, но решение удалить их было принято людьми — людьми, под влиянием той же иезуитской логики, которая управляла церковью с того момента, когда Константин присвоил христианство в 4 веке.\u003c/p\u003e\n\u003ch2 id=\"страх-перед-сомнением\"\u003eСтрах перед сомнением\u003c/h2\u003e\n\u003ch3 id=\"почему-большинство-людей-останавливаются\"\u003eПочему большинство людей останавливаются\u003c/h3\u003e\n\u003cp\u003eБольшинство людей, которые начинают сомневаться в своей религии, останавливаются, прежде чем продвинуться далеко. Причины эмоциональные, а не интеллектуальные:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтрах перед адом\u003c/strong\u003e: Институция учит, что сомнение ведёт к проклятию. Это механизм абсолютного контроля — оружие страха перед вечным наказанием.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтрах потери социума\u003c/strong\u003e: Церковные сообщества обеспечивают дружбу, поддержку и идентичность. Сомнение рискует потерять всё это.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтрах перед бессмысленностью\u003c/strong\u003e: Если институция неправа, что истинно? Пустота ужасна.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтрах быть неправым\u003c/strong\u003e: Что если институция права, а вы неправы? Стоимость ошибки кажется бесконечной.\u003c/p\u003e\n\u003cp\u003eЭти страхи специально спроектированы. Иезуитская система зависит от страха для поддержания послушания. Фильм \"Католические тайны\" показывает, как орден использует \"любой вид порока\" — включая психологическую манипуляцию — для достижения своих целей. Страх перед сомнением — самый мощный инструмент в арсенале институции, более эффективный, чем любая инквизиция, любое отлучение, любое сожжение на костре.\u003c/p\u003e\n\u003cp\u003eНо рассмотрите свидетельство Говарда Питтмана. 97,5 процента, которые были отвергнуты, не сомневались. Они доверяли институции. Они следовали традициям. Они не изучали, не испытывали, не доказывали. И они были отвергнуты. Страх перед сомнением не спасил их. Он проклял их.\u003c/p\u003e\n\u003ch3 id=\"смелость-начать\"\u003eСмелость начать\u003c/h3\u003e\n\u003cp\u003eСомнение не означает отвергать. Это означает изучать. Это означает серьёзно отнестись к инструкции Павла: испытать всё. Это означает читать текст самостоятельно, без фильтра конфессионального толкования. Это означает задавать трудные вопросы и принимать неудобные ответы. Это означает быть готовым обнаружить, что часть того, во что вы верили, верна, часть ложна, и часть — смесь, спроектированная людьми, чьи повестки дня — не повестки Бога.\u003c/p\u003e\n\u003cp\u003eЭто первая часть — начало пути. В следующих частях мы будем изучать конкретные утверждения институционального христианства: распятие, воскресение, авторство Библии, построение Нового Завета и массовые удаления, которые создали версию христианства, которую практикует большинство людей сегодня.\u003c/p\u003e\n\u003cp\u003eПуть не будет комфортным. Но, как узнал Питтман, комфорт — это не путь к истине. Служение себе — это не путь к Богу. И институция, которая обещала вам спасение, может быть именно тем, что стоит между вами и реальностью.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eПлоская земля, наука и НАСА — Плейлист документального фильма\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eНАСА и космос — Величайший плейлист о космическом обмане\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eТвердь, Земля, Основание — Библейская космология\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eЗемля и твердь — Что Писание действительно говорит\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Исследование институциональной религии и подавленной истории\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвидетельство опыта клинической смерти Говарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСмотрите на YouTube\u003c/a\u003e — Разрушительная правда об отказе институционального христианства\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКатолические тайны: Выявленные позорные секреты иезуитов\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eСмотрите на YouTube\u003c/a\u003e — Как иезуиты построили и контролируют институциональную церковь\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/15-From_Dust_to_Glory.mp4\"\u003eFrom Dust to Glory\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/27-The_Promise_of_Salvation.mp4\"\u003eThe Promise of Salvation\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/83-Ancient_Documents.mp4\"\u003eAncient Documents\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/87-From_Darkness_Into_Light.mp4\"\u003eFrom Darkness Into Light\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучите-дальше\"\u003eИзучите дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/jesus-crucifixion-hoax-part2/?lang=ru\"\u003eБыла ли история распятия Иисуса обманом? Часть 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/resurrection-actually-happen-part3/?lang=ru\"\u003eПроизошло ли воскресение? Анализ доказательств, Часть 3\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/who-wrote-bible-part4/?lang=ru\"\u003eКто действительно написал Библию? Часть 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eНачало — это всегда самый сложный шаг. Каждая институция, каждая традиция, каждый авторитет говорит вам не делать это. Но само писание это требует: испытайте всё. Если ваша вера не может пережить изучение, это никогда не была вера — это была программирование. И программирование, как бы утешительно оно ни было, не спасёт вашу душу.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"ch
