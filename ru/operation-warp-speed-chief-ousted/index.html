аза, и велел оковать его медными оковами, чтобы отвести его в Вавилон, и посадил его в дом стражи до дня смерти его.» — Иеремия 52:10-11\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКогда предстали перед судом вожди Иудеи, суд пал на архитекторов гибели народа — не на рядовых солдат, не на простой народ, а на князей и царя, которые привели народ к катастрофе. Седекия видел смерть своих сыновей прежде, чем ему выкололи глаза — последнее, что он увидел, было следствием его руководства. Суд был пропорционален власти — те, кто обладал наибольшей властью, несли наибольшую ответственность.\u003c/p\u003e\n\u003cp\u003eКак показывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eВоинство сатаны\u003c/a\u003e, операциями противника руководят командиры, а не рядовые солдаты. Архитектор операции несёт большую ответственность, чем её исполнители. Руководитель программы вакцинации операции Warp Speed был архитектором самого быстрого и масштабного развёртывания экспериментальных медицинских продуктов в истории человечества. Его отстранение от федеральной службы представляет собой подотчётность, которую требует Писание от обладающих властью.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"операция-warp-speed-архитектура\"\u003eОперация Warp Speed: архитектура\u003c/h2\u003e\n\u003cp\u003eОперация Warp Speed (OWS) была государственно-частным партнёрством, запущенным в мае 2020 года, объединившим Министерство здравоохранения и социальных служб, Министерство обороны и фармацевтические компании для ускорения разработки, производства и распространения вакцин против COVID-19.\u003c/p\u003e\n\u003cp\u003eЗаявленной целью программы была поставка 300 миллионов доз безопасных, эффективных вакцин к январю 2021 года — сжатие графика разработки, который обычно занимает 10-15 лет, до менее чем 12 месяцев. Программа выделила более $18 миллиардов налогоплательщиков, распределённых по:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eРазработка вакцин:\u003c/strong\u003e Миллиарды авансового финансирования Pfizer, Moderna, Johnson \u0026#x26; Johnson, AstraZeneca, Novavax и Sanofi/GSK для исследований вакцин, клинических испытаний и масштабирования производства.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПроизводство:\u003c/strong\u003e Миллиарды инвестиций в производство «с риском» — финансирование производства доз вакцин до завершения клинических испытаний, принимая риск того, что продукты могут не получиться и инвестиции будут потеряны.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eРаспространение:\u003c/strong\u003e Военная логистическая инфраструктура, развёрнутая через Министерство обороны для распространения вакцин в каждый уголок страны в течение нескольких недель после разрешения.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЗакупки:\u003c/strong\u003e Соглашения о предварительных закупках, обязывающие правительство покупать сотни миллионов доз по согласованным ценам.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report (karenkingston.substack.com), что операция Warp Speed не была программой общественного здравоохранения — это была военная операция: «OWS возглавлял четырёхзвёздный генерал (Густав Перна) и руководитель фармацевтической индустрии. Она финансировалась через Министерство обороны. Она осуществлялась с использованием военной логистики. Она закупалась в рамках полномочий по другим сделкам — военных соглашений о закупках. Вакцины были классифицированы как \"контрмеры\", а не фармацевтические продукты. Это было развёртывание военной контрмеры для гражданского населения, управляемое через военную командную структуру и защищённое юридической защитой военного уровня».\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"роль-главного-специалиста-по-вакцинам\"\u003eРоль главного специалиста по вакцинам\u003c/h2\u003e\n\u003cp\u003eГлавный специалист по вакцинам операции Warp Speed служил основным координатором программы между федеральным правительством и фармацевтическими компаниями, разрабатывающими вакцины против COVID-19. Эта роль включала:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВыбор производителей:\u003c/strong\u003e Определение того, какие компании получали федеральное финансирование и в каких объёмах, фактически выбирая, какие кандидаты на вакцины будут продвигаться, а какие будут отложены в сторону.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУстановление графиков разработки:\u003c/strong\u003e Установление ускоренных графиков, которые сжали годы разработки до месяцев, включая решения о том, какие требования к тестированию безопасности будут сокращены или исключены.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВедение переговоров по контрактам:\u003c/strong\u003e Структурирование контрактов OTA, в рамках которых продвигалась разработка вакцин, включая условия, освобождающие продукты от стандартных фармацевтических правил.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКоординация с регуляторами:\u003c/strong\u003e Связь с FDA для обеспечения того, чтобы регуляторный путь — включая разрешение на экстренное использование — соответствовал графику развёртывания программы.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУправление распространением:\u003c/strong\u003e Надзор за военной логистической операцией, которая распространяла вакцины по пунктам оказания помощи по всей стране.\u003c/p\u003e\n\u003cp\u003eГлавный специалист по вакцинам обладал большим влиянием на программу вакцинации против COVID-19, чем кто-либо другой — больше, чем комиссар FDA, больше, чем директор CDC, больше, чем любой отдельный руководитель фармацевтической компании. Дизайн программы, её графики, её регуляторный путь и её стратегия распространения — всё проходило через эту роль.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"отстранение\"\u003eОтстранение\u003c/h2\u003e\n\u003cp\u003eОтстранение главного специалиста по вакцинам OWS от федеральной службы представляет собой окончательный разрыв между нынешней администрацией и аппаратом инъекций эпохи пандемии. Отстранение передаёт несколько сообщений:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодотчётность начинается с верхушки.\u003c/strong\u003e Отстранение архитектора программы — а не нижестоящих функционеров — устанавливает, что подотчётность за реагирование на пандемию распространяется на тех, кто принимал самые важные решения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНаследие программы пересматривается.\u003c/strong\u003e Отстраняя её главного архитектора, администрация сигнализирует, что операция Warp Speed — это не наследие, которое нужно праздновать, а операция, которую нужно изучать, ставить под вопрос и потенциально преследовать в судебном порядке.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВоенно-фармацевтическая связь разрывается.\u003c/strong\u003e Главный специалист по вакцинам представлял человеческую связь между Министерством обороны, HHS и фармацевтической индустрией. Его отстранение разрывает эту связь на самом высоком кадровом уровне.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБудущие операции сдерживаются.\u003c/strong\u003e Отстранение устанавливает, что будущие должностные лица, участвующие в военно-фармацевтических операциях, которые развёртывают экспериментальные продукты для гражданского населения, могут столкнуться с последствиями, прерывающими карьеру.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вопросы-которые-остаются\"\u003eВопросы, которые остаются\u003c/h2\u003e\n\u003cp\u003eОтстранение поднимает вопросы, требующие ответов:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗнал ли главный специалист по вакцинам о нарушениях в клинических испытаниях?\u003c/strong\u003e Если обвинения информатора Ventavia точны, и если главному специалисту по вакцинам сообщили о проблемах с целостностью данных в процессе клинических испытаний, его бездействие представляет собой нарушение долга, которое может иметь уголовные последствия.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодавлял ли главный специалист по вакцинам альтернативные методы лечения?\u003c/strong\u003e Сохранение полномочий EUA требовало отсутствия адекватных одобренных альтернатив. Если главный специалист по вакцинам участвовал в решениях по подавлению доказательств эффективности раннего лечения — прямо или через влияние программы на решения FDA — это представляет собой форму манипулирования рынком, которая подвергала опасности пациентов, которые могли быть вылечены.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗнал ли главный специалист по вакцинам о неблагоприятных событиях?\u003c/strong\u003e Будучи координатором программы, главный специалист по вакцинам находился в положении, позволяющем получать ранние сообщения о неблагоприятных событиях после вакцинации. Если он получал такие сообщения и не предпринял действий по изменению стратегии развёртывания программы, его бездействие может представлять собой как минимум халатность, а в худшем случае — безрассудство.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКаковы были финансовые конфликты?\u003c/strong\u003e Финансовые отношения главного специалиста по вакцинам — предыдущая работа, консультационные соглашения, владение акциями, перспективы будущей работы — с фармацевтическими компаниями, которые он финансировал и с которыми координировался через OWS, должны быть полностью раскрыты и изучены.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/127-Operation_Midnight_Climax.mp4\"\u003eОперация Midnight Climax\u003c/a\u003e документирует историческую закономерность правительственных чиновников, которые разрабатывают и осуществляют программы с катастрофическими последствиями для гражданского населения — и которые в прошлых поколениях не несли никакой ответственности. Отстранение главного специалиста по вакцинам OWS представляет собой разрыв с этой закономерностью — утверждение, что архитекторы сомнительных программ столкнутся с последствиями.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческий-вывод\"\u003eПророческий вывод\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«Ибо всякое дело Бог приведёт на суд, и всё тайное, хорошо ли оно, или худо.» — Екклесиаст 12:14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eОтстранение — это земной суд — последствие для карьеры, а не уголовный приговор. Последует ли уголовная ответственность, зависит от ведущихся расследований, доказательств, которые они предоставят, и политической воли к судебному преследованию.\u003c/p\u003e\n\u003cp\u003eНо отстранение устанавливает принцип, которому фармацевтическая индустрия и её правительственные партнёры сопротивлялись десятилетиями: архитекторы программ, причиняющих вред общественности, будут привлечены к ответственности — если не в этой администрации, то в следующей; если не в этом суде, то в финальном.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/181-Ending_Anonymity.mp4\"\u003eПрекращение анонимности\u003c/a\u003e документирует конец анонимного управления — требование, чтобы те, кто принимает решения, затрагивающие миллиарды людей, были известны, названы и привлечены к ответственности за последствия своих решений.\u003c/p\u003e\n\u003cp\u003eГлавный специалист по вакцинам операции Warp Speed был назван, отстранён и подвергнут проверке, которой он пытался избежать. Операция, которую он разработал, развернула более 670 миллионов доз экспериментальных продуктов для американского населения. Последствия этого развёртывания всё ещё разворачиваются.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-из-1-царств-8\"\u003eПредупреждение из 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e«И сказал Господь Самуилу: послушай голоса народа во всём, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтоб Я не царствовал над ними.»\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (Синодальный перевод)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение из 1 Царств 8 отдаётся эхом в каждом правительственном коридоре сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их в точности о том, что произойдёт — их сыновья будут взяты на войну, их дочери на службу, их поля и виноградники захвачены, десятая часть всего конфискована. Они выбрали человеческое правительство вместо правления Бога, и тирания последовала в точности так, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной и той же скрытой властной структуре. Голосование за любую сторону — это выбор того, какое крыло машет следующим, пока птица летит в том же направлении. Настоящая власть никогда не была ни в одном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eDOD / HHS — Документация программы операции Warp Speed и кадровые записи\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Анализ Карен Кингстон структуры программы OWS, архитектуры контрактов OTA, военно-фармацевтической связи и документации роли главного специалиста по вакцинам\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eОперация Warp Speed — Контрактные и финансовые записи\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eИеремия 52:10-11, Екклесиаст 12:14 (Синодальный перевод)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (Синодальный перевод)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u
