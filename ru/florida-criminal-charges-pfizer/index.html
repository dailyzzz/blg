ote\u003e\n\u003cp\u003eКогда Давид согрешил с Вирсавией и организовал смерть её мужа Урии, ни одна человеческая институция не привлекла его к ответственности. Он был царём — выше закона по земным меркам. Но Бог послал пророка Нафана, который рассказал Давиду притчу о богатом человеке, который украл единственного ягнёнка бедняка. Давид вынес приговор богачу, и Нафан заявил: \"Ты — тот человек.\" Самая могущественная личность в стране была привлечена к ответственности — не институцией большей власти, а истиной, произнесённой тем, кто боялся Бога больше, чем царя.\u003c/p\u003e\n\u003cp\u003eКак провозглашает трек из альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/101-Fight_of_Faith.mp4\"\u003eБорьба Веры\u003c/a\u003e, борьба за справедливость требует мужества — готовности противостоять могущественным, назвать преступление и добиваться ответственности независимо от шансов. Pfizer — самая богатая фармацевтическая компания на Земле. PREP Act защищает её от федеральной ответственности. Но правовая структура Флориды предлагает путь, который обходит федеральную крепость.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"проблема-prep-act-и-решение-штата\"\u003eПроблема PREP Act и Решение Штата\u003c/h2\u003e\n\u003cp\u003ePREP Act предоставляет федеральный иммунитет производителям \"покрытых контрмер\" во время объявленных чрезвычайных ситуаций в области общественного здравоохранения. Этот иммунитет был основным препятствием для привлечения Pfizer к ответственности за травмы, причинённые её инъекцией COVID-19.\u003c/p\u003e\n\u003cp\u003eОднако юридические учёные и практики Флориды выявили потенциальные пути в соответствии с законодательством штата, которые могут не быть отменены PREP Act:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУголовное законодательство штата не отменено.\u003c/strong\u003e PREP Act предоставляет иммунитет от гражданской ответственности — судебных исков о денежной компенсации. Он явно не предоставляет иммунитет от уголовного преследования штата. Если поведение Pfizer составило нарушение уголовных статутов Флориды — включая мошенничество, нанесение побоев, непредумышленное убийство или рэкет — гражданский иммунитет PREP Act может не применяться.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМошенничество аннулирует иммунитет.\u003c/strong\u003e Юридическая доктрина гласит, что мошенничество аннулирует (делает недействительными) все соглашения, контракты и правовые защиты, полученные через мошенничество. Если Pfizer получила своё EUA через мошеннические данные клинических испытаний — как утверждает информатор Брук Джексон и задокументировано через документы, выпущенные FOIA — тогда правовые защиты, связанные с этим EUA, включая иммунитет PREP Act, могут быть аннулированы.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗаконы о защите потребителей штата.\u003c/strong\u003e Закон Флориды о недобросовестных и обманных торговых практиках (FDUTPA) предоставляет защиту от мошеннических деловых практик, которые могут действовать независимо от федеральной отмены.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон предоставила обширный юридический анализ в The Kingston Report (karenkingston.substack.com): \"PREP Act — это федеральный щит гражданской ответственности. Он никогда не был разработан для — и конституционно не может — защиты корпорации от уголовного преследования штата. Если Pfizer совершила мошенничество при получении своего EUA, если она сознательно распространяла продукт, который причинял вред без адекватного предупреждения, если она скрывала данные о безопасности, которые изменили бы расчёт риска и пользы для отдельных пациентов — это уголовные деяния по законодательству Флориды, и PREP Act не предоставляет иммунитет от уголовного преследования.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"уголовные-пути\"\u003eУголовные Пути\u003c/h2\u003e\n\u003ch3 id=\"1-мошенничество-статут-флориды-раздел-817\"\u003e1. Мошенничество (Статут Флориды Раздел 817)\u003c/h3\u003e\n\u003cp\u003eСтатуты Флориды о мошенничестве криминализируют сознательное и преднамеренное искажение существенных фактов с целью получения выгоды (включая денежную выгоду) или причинения вреда. Если Pfizer:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИсказила данные клинических испытаний для FDA для получения разрешения на экстренное использование\u003c/li\u003e\n\u003cli\u003eИсказила профиль безопасности своего продукта для общественности, медицинских работников и пациентов\u003c/li\u003e\n\u003cli\u003eСкрыла данные о неблагоприятных событиях, которые изменили бы индивидуальные решения о риске и пользе\u003c/li\u003e\n\u003cli\u003eПредставила продукт как \"вакцину\", когда он не соответствовал традиционному определению (предотвращение инфекции и передачи)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждое из этих действий может составлять уголовное мошенничество по законодательству Флориды.\u003c/p\u003e\n\u003ch3 id=\"2-тяжкие-побои-статут-флориды-раздел-784045\"\u003e2. Тяжкие Побои (Статут Флориды Раздел 784.045)\u003c/h3\u003e\n\u003cp\u003eПо законодательству Флориды побои — это преднамеренное прикосновение или нанесение удара другому человеку против его воли, или преднамеренное причинение телесного вреда. Тяжкие побои включают использование смертельного оружия или преднамеренное или сознательное причинение тяжкого телесного вреда.\u003c/p\u003e\n\u003cp\u003eЕсли Pfizer сознательно распространяла продукт, который причинял тяжкий телесный вред — и если \"согласие\", полученное от получателей, было аннулировано существенными искажениями о безопасности продукта — тогда введение каждой дозы может составлять побои.\u003c/p\u003e\n\u003ch3 id=\"3-непредумышленное-убийство-статут-флориды-раздел-78207\"\u003e3. Непредумышленное Убийство (Статут Флориды Раздел 782.07)\u003c/h3\u003e\n\u003cp\u003eСтатут Флориды о непредумышленном убийстве охватывает убийство человека актом, обеспечением или виновной небрежностью другого лица, без законного обоснования. Если продукт Pfizer причинил смерти, и если поведение Pfizer в сокрытии данных о безопасности или искажении продукта составило виновную небрежность, могут быть предъявлены обвинения в уголовном непредумышленном убийстве.\u003c/p\u003e\n\u003ch3 id=\"4-rico-статут-флориды-раздел-895\"\u003e4. RICO (Статут Флориды Раздел 895)\u003c/h3\u003e\n\u003cp\u003eЗакон Флориды о организациях, подверженных влиянию рэкетиров и коррупции (RICO), предусматривает уголовные наказания за ведение дел предприятия через паттерн рэкетирской деятельности. Если Pfizer участвовала в паттерне мошеннического поведения — включая мошенничество в клинических испытаниях, нормативное мошенничество и мошенничество с потребителями — по всей своей программе вакцинации от COVID-19, обвинения RICO могут охватывать всё предприятие.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"процесс-для-жителей-флориды\"\u003eПроцесс для Жителей Флориды\u003c/h2\u003e\n\u003cp\u003eЖители Флориды, стремящиеся предъявить уголовные обвинения против Pfizer, могут следовать следующим путям:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПетиция большого жюри:\u003c/strong\u003e По законодательству Флориды граждане могут подать петицию в суд для созыва большого жюри для расследования потенциального преступного поведения. Большое жюри имеет полномочия повестки, может принуждать к показаниям и может выдавать обвинительные заключения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЖалоба прокурору штата:\u003c/strong\u003e Жители Флориды могут подать уголовные жалобы в офис своего местного прокурора штата, представляя доказательства преступного поведения и требуя расследования и судебного преследования.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНаправление генеральному прокурору:\u003c/strong\u003e Жалобы могут быть направлены в офис генерального прокурора Флориды, который имеет юрисдикцию по всему штату и ресурсы для преследования сложных уголовных дел против корпоративных ответчиков.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЧастное уголовное преследование:\u003c/strong\u003e Законодательство Флориды разрешает частное уголовное преследование при определённых обстоятельствах, позволяя отдельным лицам привлекать частных адвокатов для преследования уголовных дел с одобрения суда.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческое-измерение\"\u003eПророческое Измерение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Повсюду ходят нечестивые, когда ничтожные из сынов человеческих возносятся.\" — Псалом 12:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНечестивые ходят свободно, когда система правосудия защищает их от ответственности. PREP Act был разработан, чтобы позволить нечестивым ходить свободно — вводить экспериментальные продукты миллиардам людей и не сталкиваться с последствиями независимо от причинённого вреда.\u003c/p\u003e\n\u003cp\u003eУголовное законодательство Флориды представляет иную справедливость — такую, которую PREP Act не был разработан достигать. Вопрос в том, обладает ли правовая система Флориды мужеством и честностью применить свои уголовные статуты к самой могущественной фармацевтической компании на Земле.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-из-1-царств-8\"\u003eПредупреждение из 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушай голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтоб Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (SYNO)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение из 1 Царств 8 эхом отдаётся в каждом правительственном коридоре сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их точно, что произойдёт — их сыновья будут взяты на войну, их дочери на службу, их поля и виноградники конфискованы, десятая часть всего изъята. Они выбрали человеческое правительство вместо царствования Бога, и тирания последовала точно так, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной и той же птицы — левое и правое, республиканцы и демократы — все служат одной и той же скрытой структуре власти. Голосование за любую сторону — это выбор, какое крыло взмахнёт следующим, пока птица летит в том же направлении. Настоящая власть никогда не была ни в одном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eСтатуты Флориды — Разделы 817 (Мошенничество), 784.045 (Тяжкие побои), 782.07 (Непредумышленное убийство), 895 (RICO)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Юридический анализ Карен Кингстон государственных уголовных путей, ограничений отмены PREP Act и доктрины аннулирования иммунитета мошенничеством\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eBrook Jackson v. Pfizer — Документы судебного процесса по Закону о ложных требованиях\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePREP Act — 42 U.S.C. Раздел 247d-6d (положения о гражданском иммунитете)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eЛевит 19:15, Псалом 12:8 (SYNO)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение Против Земных Царей (SYNO)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте Пока Читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e — Корпоративный иммунитет, защищённый захваченными правовыми структурами\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — Правовые системы маршируют в защиту корпораций\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e — Правовые структуры, разработанные для защиты могущественных\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (Пещера Сокровищ):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/101-Fight_of_Faith.mp4\"\u003eFight of Faith\u003c/a\u003e — Мужество противостоять корпоративному Голиафу\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/89-The_Serpent_Crusher.mp4\"\u003eThe Serpent Crusher\u003c/a\u003e — Разрушение правовых защит, которые оберегают змея\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте Дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/doctors-vacate-prep-act/?lang=ru\"\u003eБолее 100 000 Врачей Прокладывают Путь к Отмене Иммунитета PREP Act\u003c/a\u003e — Национальные усилия по разрушению федерального щита ответственности\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pfizer-case-government-not-interested/?lang=ru\"\u003eСудебная Подача в Деле Pfizer: Правительство НЕ Заинтересовано в Справедливости\u003c/a\u003e — Отказ федеральной системы от преследования ответственности\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/federal-government-pfizer-data-fraud/?lang=ru\"\u003eЭто Преступление? Федеральное Правительство Помогло Pfizer в Мошенничестве с Данными\u003c/a\u003e — Мошенничество, которое аннулирует иммунитет\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/florida-ends-vaccine-mandates/?lang=ru\"\u003eГлавный Хирург Флориды Объявляет Конец ВСЕХ Мандатов на Вакцинацию\u003c/a\u003e — Более широкое отвержение Флоридой фармацевтического аппарата\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eНафан указал на Давида и сказал: \"Ты — тот человек.\" Самая могущественная личность в стране была названа, обвинена и привлечена к ответственности тем, кто боялся Бога больше, чем царя. Уголовные статуты Флориды предлагают путь, которого PREP Act не достигает — путь, через который Pfizer может быть названа, обвинена и привлечена к ответственности за поведение, которое федеральная система защищала. \"Господь творит правду и суд всем обиженным\" (Псалом 103:6). Поднимется ли правовая система Флориды к этому случаю, определит, служит ли система правосудия угнетённым — или продолжает служить угнетателю.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null
