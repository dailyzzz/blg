сами себя подвергли многим скорбям.\" — 1 Тимофею 6:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВ дни Вавилона люди пытались построить башню, достигающую неба — не для прославления Бога, а для создания себе имени и для противления границам, которые Он установил между творением и Творцом. Проект финансировался коллективными амбициями и строился с использованием новейших технологий того времени. Это был не дом поклонения. Это был двигатель восстания — памятник убеждению человека, что он может превзойти свою природу, переписать порядок творения и стать как боги.\u003c/p\u003e\n\u003cp\u003eБог рассеял их и смешал их языки. Башня никогда не была завершена.\u003c/p\u003e\n\u003cp\u003eКак выявляет трек Confliction \"Преступление\" (The Transgression), грех преступления — это не простое непослушание — это попытка пересечь границу, установленную Богом. Изменить человеческий геном, переписать код самой жизни, впрыскивать синтетические инструкции в клетки миллиардов людей — это не медицина. Это преступление. И финансирование, которое это поддерживает, является раствором современного Вавилона.\u003c/p\u003e\n\u003cp\u003eМинистерство здравоохранения вынула 500 миллионов долларов из башни. Вопрос в том, остановятся ли строители.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"империя-мрнк-как-мы-сюда-пришли\"\u003eИмперия мРНК: как мы сюда пришли\u003c/h2\u003e\n\u003cp\u003eТехнологическая платформа мРНК не появилась в результате пандемии COVID-19. Она разрабатывалась десятилетиями, финансируемая в основном Министерством обороны США через DARPA и Национальными институтами здравоохранения (NIH) через Национальный институт аллергии и инфекционных заболеваний (NIAID), возглавляемый почти четыре десятилетия д-ром Энтони Фаучи.\u003c/p\u003e\n\u003cp\u003eDARPA's Pandemic Prevention Platform (P3), запущенная в 2017 году, была направлена на разработку способности производить средства защиты на основе нуклеиновых кислот — включая мРНК-терапии — в течение 60 дней от идентификации патогена. Платформа мРНК Moderna была разработана с прямым финансированием от DARPA в рамках этой программы. Само название компании — \u003cstrong\u003eMo\u003c/strong\u003edified \u003cstrong\u003eRNA\u003c/strong\u003e — описывает ее технологическую основу.\u003c/p\u003e\n\u003cp\u003eNIH совместно разработала конструкцию спайкового белка, используемую в инъекции COVID-19 от Moderna. Эта совместная разработка означала, что U.S. правительство имело прямой финансовый интерес к продукту — оно должно было получать выплаты роялти от его коммерциализации. Ученые NIH, включая работающих под руководством Фаучи, получали личные выплаты роялти от фармацевтических компаний за технологии, которые они помогали разработать в качестве государственных служащих.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report финансовую архитектуру платформы мРНК. Согласно исследованиям Kingston, инъекции мРНК COVID-19 были разработаны не по стандартным фармацевтическим нормативным путям, а по контрактам Other Transaction Authority (OTA) — контрактам на военные закупки, которые освобождают продукты от стандартных нормативов FDA для фармацевтических препаратов. Это означает, что продукты никогда не требовали соответствия стандартам безопасности и эффективности обычных лекарств. Они были классифицированы как \"противодействия\" — военные активы, развернутые в объявленной чрезвычайной ситуации.\u003c/p\u003e\n\u003cp\u003e\"Платформа мРНК была финансирована военными, разработана по военным контрактам, развернута под военным руководством и защищена от ответственности военными правовыми защитами,\" заявила Kingston. \"Тот факт, что она была введена в аптеках и кабинетах врачей, не меняет то, что это такое. Это оборонная технология, а не медицинский продукт.\"\u003c/p\u003e\n\u003ch3 id=\"трубопровод-на-500-миллионов-долларов\"\u003eТрубопровод на 500 миллионов долларов\u003c/h3\u003e\n\u003cp\u003e500 миллионов долларов финансирования исследований мРНК, которые сейчас прекращены Министерством здравоохранения, представляет трубопровод — следующее поколение продуктов мРНК, разрабатываемых для гриппа, RSV, рака, аутоиммунных заболеваний, редких генетических нарушений и широкой категории приложений \"подготовки к пандемии\". Это финансирование поддерживало исследования в университетах, биотехнологических компаниях и федеральных лабораториях по всей стране.\u003c/p\u003e\n\u003cp\u003eТрубопровод включал:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eРевакцинирующие вакцины COVID-19 следующего поколения\u003c/strong\u003e, предназначенные для нацеливания на развивающиеся варианты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВакцины от гриппа на основе мРНК\u003c/strong\u003e, предназначенные для замены традиционных вакцин от гриппа на основе яиц\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСамоусиливающаяся технология мРНК (sa-mRNA)\u003c/strong\u003e, которая инструктирует клетки не только производить целевой белок, но и воспроизводить саму мРНК, теоретически продлевая длительность и величину иммунного ответа\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВакцины от рака на основе мРНК\u003c/strong\u003e, персонализированные для профилей опухолей отдельных пациентов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКомбинированные платформы мРНК\u003c/strong\u003e, доставляющие несколько вакцин в одной инъекции\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждое из этих приложений было построено на одной и той же фундаментальной технологии, развернутой во время COVID-19 — синтетическая мРНК, обернутая в липидные наночастицы, доставляемые в клетки человека для инструктирования этих клеток производить белки. Та же технология, которая создала сотни тысяч сообщений о нежелательных явлениях, которая распределялась по всему телу вопреки первоначальным утверждениям, которая концентрировалась в органах, включая яичники и печень, и которая была развернута под правовыми рамками, специально предназначенными для предотвращения ответственности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"финансовая-сеть\"\u003eФинансовая сеть\u003c/h2\u003e\n\u003cp\u003eФинансирование исследований мРНК не текло по прямой линии от Министерства здравоохранения к исследователям и обратно. Оно проходило через сеть грантов, контрактов, субконтрактов и партнерства государственного и частного сектора, которые связывали федеральные агентства, фармацевтические компании, университеты и неправительственные организации в финансовую экосистему, предназначенную для затемнения ответственности и максимизации прибыли.\u003c/p\u003e\n\u003cp\u003eКарен Kingston подробно нанесла эту финансовую сеть. Ключевые узлы включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBiomedical Advanced Research and Development Authority (BARDA)\u003c/strong\u003e — агентство Министерства здравоохранения, которое предоставило миллиарды в финансировании для противодействия COVID-19 и продолжает финансировать разработку платформы мРНК. BARDA работает с необычной секретностью, так как многие ее контракты классифицированы или подлежат ограниченным требованиям раскрытия.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCoalition for Epidemic Preparedness Innovations (CEPI)\u003c/strong\u003e — основана в 2017 году на ежегодном совещании Всемирного экономического форума в Давосе, финансируется Фондом Билла и Мелинды Гейтс, Wellcome Trust, Норвегией, Германией, Японией и Европейской комиссией. CEPI финансировала разработку вакцин мРНК для подготовки к пандемии и играла центральную роль в глобальной программе распределения вакцин COVAX.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНациональный центр продвижения трансляционных наук (NCATS) NIH\u003c/strong\u003e — который финансирует трансляцию базовых исследований в клинические приложения, включая мРНК-терапевтику.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУниверситетские исследовательские программы\u003c/strong\u003e, получающие гранты NIH и DARPA для исследований, связанных с мРНК, многие из которых имеют лицензионные соглашения с фармацевтическими компаниями, которые дают университету (и отдельным исследователям) право на выплаты роялти от коммерциализированных продуктов.\u003c/p\u003e\n\u003cp\u003eОтзыв 500 миллионов долларов из этой сети нарушает не просто отдельные исследовательские проекты, но финансовые отношения, которые связывают федеральные агентства, фармацевтические компании и академические учреждения в саморазвивающийся цикл взаимной прибыли.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"самоусиливающаяся-мрнк-следующий-рубеж\"\u003eСамоусиливающаяся мРНК: следующий рубеж\u003c/h2\u003e\n\u003cp\u003eСреди наиболее тревожных технологий в дефинансированном трубопроводе находится самоусиливающаяся мРНК (sa-mRNA). В отличие от обычной мРНК, которая доставляет конечный набор инструкций, которые деградируют со временем, sa-mRNA включает дополнительную генетическую последовательность — полученную из альфавирусов — которая позволяет мРНК самовоспроизводиться внутри клеток человека.\u003c/p\u003e\n\u003cp\u003eЭто означает, что после инъекции sa-mRNA производит копии самой себя, каждая копия инструктирует клетку производить больше целевого белка. Процесс продолжается до тех пор, пока клеточная машинерия не деградирует самоусиливающиеся инструкции — но временная шкала для этой деградации полностью не понята, и общее количество белка, производимого самоусиливающейся конструкцией, на много порядков больше, чем обычная мРНК.\u003c/p\u003e\n\u003cp\u003eЯпония одобрила первую в мире вакцину sa-mRNA (ARCT-154, разработанную Arcturus Therapeutics и произведенную CSL Seqirus) для COVID-19 в ноябре 2023 года. Одобрение было предоставлено с ограниченными данными клинических испытаний и вызвало значительные опасения среди ученых и врачей относительно потенциала неконтролируемого производства белка, чрезмерной стимуляции иммунной системы и неизвестных долгосрочных эффектов.\u003c/p\u003e\n\u003cp\u003eKingston определила sa-mRNA как критическую эскалацию в технологической траектории: \"Самоусиливающаяся мРНК — это не вакцина. Это синтетическая генетическая программа, которая, попав в ваши клетки, работает автономно. Вы не можете остановить ее. Вы не можете удалить ее. Вы не контролируете, сколько белка она производит и как долго. Это не медицина. Это самовоспроизводящаяся генетическая технология, развернутая внутри человеческого тела.\"\u003c/p\u003e\n\u003cp\u003eДефинансирование исследований sa-mRNA представляет одно из наиболее значительных последствий решения Министерства здравоохранения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"теологическое-измерение-переписание-кода-жизни\"\u003eТеологическое измерение: переписание кода жизни\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Итак, Бог создал человека по образу Своему, по образу Божию создал его; мужчину и женщину создал их.\" — Бытие 1:27\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЧеловеческий геном — это не просто биологическая машинерия. Писание объявляет, что человеческие существа созданы по образу Божьему — образу Божьему (\u003cem\u003eimago Dei\u003c/em\u003e). Код, который управляет человеческой биологией, не случайный. Это написано. Он несет подпись своего Творца.\u003c/p\u003e\n\u003cp\u003eПлатформа мРНК не лечит болезнь в традиционном смысле. Она не удаляет патоген и не восстанавливает поврежденный орган. Она инструктирует клетки человека производить то, что они никогда не были предназначены производить. Она вводит синтетические генетические инструкции в систему, написанную Богом, приказывая этой системе выполнять код, написанный человеком.\u003c/p\u003e\n\u003cp\u003eЭто преступление, описанное в Писании — пересечение границы между установленным Богом порядком и амбициями тех, кто хотел бы его улучшить. Оригинальное обещание змея — \"вы будете как боги\" (Бытие 3:5) — находит его современное выражение в языке генетической инженерии: мы можем переписать код, оптимизировать конструкцию и превзойти ограничения тела, как его создал Бог.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \"Great Reset Rising\" задокументирует сходимость технологической амбиции и духовного восстания — построение системы, которая обещает совершенствовать человечество через технологию, отрывая человечество от его Творца.\u003c/p\u003e\n\u003cp\u003eДефинансирование в 500 миллионов долларов — это кирпич, удаленный из этой башни. Но чертеж остается, и строители не испытывают недостатка в альтернативных источниках финансирования.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-означает-дефинансирование--и-что-оно-не-означает\"\u003eЧто означает дефинансирование — и что оно не означает\u003c/h2\u003e\n\u003cp\u003eРешение Министерства здравоохранения отзвать 500 миллионов долларов финансирования исследований мРНК значительно по нескольким причинам:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭто нарушает трубопровод.\u003c/strong\u003e Без федерального финансирования многие программы исследований мРНК замерзнут или полностью остановятся. Университетские лаборатории, зависящие от грантов NIH, потеряют свои источники финансирования. Ранние биотехнологические компании без доходов будут испытывать экзистенциальное финансовое давление. Временная линия для продуктов мРНК следующего поколения будет продлена.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОн отправляет политический сигнал.\u003c/strong\u003e Дефинансирование сообщает, что нынешняя администрация относится скептически, а не с энтузиазмом к платформе мРНК. Этот сигнал влияет на поведение регуляторов, исследователей и инвесторов в биомедицинской экосистеме.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОн создает пространство для ответственности.\u003c/strong\u003e До тех пор, пока платформа мРНК расширялась и создавала доход, не было институционального стимула для проверки ее безопасности. Дефинансирование создает паузу — и в этой паузе вопросы могут быть заданы, данные могут быть проанализированы, и пострадавшие могут быть услышаны.\u003c/p\u003e\n\u003cp\u003eОднако дефинансирование не:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВлияет на существующие продукты.\u003c/strong\u003e Инъекции мRNA COVID-19, уже находящиеся на рынке (с полным одобрением FDA), не отзываются и не выводятся с рынка этим действием. Pfizer и Moderna сохраняют свои существующие одобрения и могут продолжать производство и распределение своих текущих продуктов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбращение ответственности.\u003c/strong\u003e Щит ответственности PREP Act остается в силе. Производители остаются защищены от исков, связанных с противодействием COVID-19, введенным во время объявленной чрезвычайной ситуации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсключить частное финансирование.\u003c/strong\u003e Фармацевтические компании, фирмы венчурного капитала и международные организации (включая CEPI, Фонд Гейтса и Wellcome Trust) продолжают финансировать исследования мРНК независимо от федеральных ассигнований. Технология будет продолжать разрабатываться — вопрос в том, будет ли она разрабатываться с или без федерального надзора и требований безопасности.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОтменить ущерб.\u003c/strong\u003e Сотни миллионов доз уже введенных не могут быть отозваны из тел тех, кто их получил. Любые эффекты, которые производят инъекции мРНК — в краткосрочной перспективе или на протяжении десятилетий — будут проявляться независимо от будущих решений по финансированию.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"предупреждение-из-1-царств-8\"\u003eПредупреждение из 1 Царств 8\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: слушайся голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отзывается в каждом правительственном коридоре сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил его точно, что произойдет — его сыновей возьмут на войну, его дочерей в услужение, его поля и виноградники отберут, десятину всего конфискуют. Они выбрали человеческое правительство вместо царства Божьего, и тирания последовала точно так, как было обещано. Ничего не изменилось. Современная политическая система — два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной скрытой структуре власти. Голосование за ту или другую сторону — это выбор, какое крыло будет махать дальше, пока птица летит в том же направлении. Реальная власть никогда не была на избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eHHS.gov — объявления бюджета и финансирования\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — документация Karen Kingston по разработке платформы мРНК, финансирование DARPA, контракты OTA и анализ технологии sa-mRNA\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eDARPA Pandemic Prevention Platform (P3) — документация программы\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eBARDA — записи контрактов Biomedical Advanced Research and Development Authority\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eCEPI — документы учреждения Coalition for Epidemic Preparedness Innovations и источники финансирования\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eБытие 1:27, 1 Тимофею 6:10 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/171-Great_Reset_Rising.mp4\"\u003eGreat Reset Rising\u003c/a\u003e — Сходимость технологической амбиции и духовного восстания\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u003c/a\u003e — Военное происхождение технологии пандемии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/165-Event_201_Came_True.mp4\"\u003eEvent 201 Came True\u003c/a\u003e — Как симуляции пандемий стали реальностью пандемий\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e — Пересечение границ, установленных Богом между творением и Творцом\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e — Проклятие, протягивающееся через технологию восстания каждого поколения\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/trump-bans-gain-of-function/?lang=ru\"\u003eTrump Executive Order Bans Gain-of-Function Research\u003c/a\u003e — Исполнительное действие против исследования, создающего угрозы, которые оно претендует защищать\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/fda-ended-emergency-use-authorizations/?lang=ru\"\u003eFDA Just Ended Emergency Use Authorizations for COVID-19\u003c/a\u003e — Прекращение правовой базы, которая развернула технологию мРНК в масштабе\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/trump-freezes-nih-grants/?lang=ru\"\u003eTrump Freezes NIH Approvals and Research Grants\u003c/a\u003e — Более широкий замораживание финансирования федеральных исследований\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/government-fraud-biopharma/?lang=ru\"\u003eIs it Legal for the US Government to Commit Fraud with BioPharma\u003c/a\u003e — Юридические вопросы, окружающие сговор правительства и промышленности\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eПолмиллиарда долларов было выведено из башни Вавилона, которую строит современная биотехнология. Но архитекторы башни не отказались от своих чертежей, и дух, который движет строительством — \"вы будете как боги\" — не был изгнан из лабораторий, залов заседаний или коридоров власти. Дефинансирование — это отсрочка, а не победа. \"Если Господь не созиждет дом, то напрасно трудятся строящие его\" (Псалом 127:1). Платформа мРНК не была построена Господом. Вопрос в том, разберет ли человек то, что человек построил, или Бог сделает это за него.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Министерство здравоохранения прекращает финансирование исследований мРНК на 500 миллионов долларов\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Министерство здравоохранения отзывает полмиллиарда долларов на финансирование исследований мРНК, нанося удар по финансовому двигателю, питающему следующее поколение экспериментальной генной терапии.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-05T10:00:00Z\",\"children\":\"5 мая 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"HHS\",{\"href\":\"/ru/tag/HHS/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"HHS\"]}],[\"$\",\"a\",\"mRNA\",{\"href\":\"/ru/tag/mRNA/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"mRNA\"]}],[\"$\",\"a\",\"research-funding\",{\"href\":\"/ru/tag/research-funding/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"research-funding\"]}],[\"$\",\"a\",
