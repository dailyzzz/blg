c/blockquote\u003e\n\u003cp\u003eБог сказал Своему народу, что есть. Писания переполнены ссылками на пищу, которая питает тело — мясо, рыбу, хлеб из целых зёрен, оливковое масло, масло, молоко, мёд, фрукты и овощи. Это продукты, которые питали человечество на протяжении тысяч лет.\u003c/p\u003e\n\u003cp\u003eЭто продукты, которыми питались наши деды и прадеды без развития эпидемических показателей ожирения, диабета, сердечных заболеваний и рака, которые определяют современное западное здравоохранение. Что изменилось, так это не человеческое тело. Что изменилось, так это пища — и ложи, рассказанные о том, какая пища хороша для вас.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"происхождение-пищевой-пирамиды\"\u003eПроисхождение пищевой пирамиды\u003c/h2\u003e\n\u003cp\u003eВ 1992 году Министерство сельского хозяйства Соединённых Штатов официально выпустило Пищевую пирамиду, графическое диетическое руководство, которое будет помещено на каждую коробку хлопьев, повешено в каждой школьной столовой и преподано каждому ребёнку в Америке на протяжении следующих двух десятилетий.\u003c/p\u003e\n\u003cp\u003eВ основании пирамиды — продукты, которым рекомендовалось есть больше всего — было 6-11 порций хлеба, каши, риса и макаронных изделий в день. Жиры и масла были помещены на крошечную вершину с инструкцией использовать их \"экономно\".\u003c/p\u003e\n\u003cp\u003eЭто было не результатом объективной пищевой науки. Это было произведением лоббирования сельского хозяйства, политического компромисса и десятилетий мошеннического исследования, финансированного промышленностями, которые профитировали от конкретных диетических рекомендаций, которые пирамида воплотила.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"анселя-киза-и-мошенничество-с-насыщенным-жиром\"\u003eАнселя Киза и мошенничество с насыщенным жиром\u003c/h2\u003e\n\u003cp\u003eИнтеллектуальный фундамент войны пищевой пирамиды против пищевого жира был заложен десятилетиями ранее Анселем Кизом, физиологом из Университета Миннесоты, чьё исследование \"Семь стран\", опубликованное в 1970 году, стало самым влиятельным пищевым исследованием ХХ века.\u003c/p\u003e\n\u003cp\u003eКиз утверждал, что продемонстрировал прямую корреляцию между потреблением насыщенного жира и болезнью сердца, устанавливая \"гипотезу диета-сердце\", которая будет господствовать политике питания на протяжении пятидесяти лет.\u003c/p\u003e\n\u003cp\u003eПроблема в том, что исследование Киза было мошеническим. У него было данные из 22 стран, а не семи. Он выбрал семь стран, чьи данные поддерживали его гипотезу, и исключил пятнадцать стран, чьи данные противоречили ей.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"эпидемия-ожирения-и-диабета\"\u003eЭпидемия ожирения и диабета\u003c/h2\u003e\n\u003cp\u003eРезультаты эксперимента пищевой пирамиды не двусмысленны. Они катастрофичны. Когда диетические рекомендации были введены в 1977 году, примерно 15% взрослых американцев были страдают ожирением. К 2020 году это число выросло до 42%.\u003c/p\u003e\n\u003cp\u003eДиабет 2 типа, который был достаточно редким в 1960 году, чтобы его называли \"диабетом взрослого возраста\", теперь поражает более 37 миллионов американцев, включая быстро растущее количество детей и подростков. Болезнь сердца — именно то состояние, которое низкожировые рекомендации должны были предотвратить — остаётся ведущей причиной смерти в Соединённых Штатах.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Горе тем, которые называют зло добром, и добро — злом, которые тьму почитают светом, и свет — тьмой, которые горькое почитают сладким, и сладкое — горьким.\" — Исаия 5:20\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПищевая пирамида — идеальное выражение инверсии, о которой предупреждал Исаия. То, что хорошо — животный жир, масло, яйца, пища, которую дал Бог — было названо злом. То, что зло — рафинированный сахар, промышленные растительные масла, обработанные зёрна — было названо хорошим. Тьма была представлена как свет. Горькое было маркетировано как сладкое.\u003c/p\u003e\n\u003cp\u003eИ вся цивилизация ела ложь и задавалась вопросом, почему она умирает.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/135-Food_Price_Shadow_Industry.mp4\"\u003eFood Price Shadow Industry\u003c/a\u003e — Скрытые силы пищевого обмана\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eНа протяжении пятидесяти лет американцам говорили, что болезни, которые их убивали, были вызваны пищей, которая питала их дедов, и что спасение лежит в продуктах промышленности, финансирующей исследования. Пищевая пирамида была не плохой наукой. Это был хороший бизнес — для зерновой промышленности, сахарной промышленности, фармацевтической промышленности и каждого учреждения, которое профитирует, когда нация ест себя до смерти. Ложь на стене каждой школьной столовой. Истина — в эпидемии болезни, которая последовала принятию пирамиды. То, что Бог предоставляет, мир развращает. То, что мир продвигает, люди Божьи должны научиться ставить под сомнение.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"c
