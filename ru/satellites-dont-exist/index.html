e\u003e\n\u003cp\u003eСтроители Вавилона стремились построить башню, достигающую небес — памятник человеческим амбициям, технологическое достижение, которое объединило бы человечество под одной системой коммуникации и управления. Ответ Бога был быстр и решителен: Он спутал их язык и рассеял их по земле. Башня была не просто строительным проектом. Это было актом духовного восстания — попыткой мостить пропасть между землёй и небом через человеческую технологию, а не божественные отношения.\u003c/p\u003e\n\u003cp\u003eСовременный нарратив спутниковой технологии эхо амбиции Вавилона. Нам сказано, что человечество поместило тысячи устройств в небеса — орбитальные платформы, которые включают мгновенную глобальную коммуникацию, наблюдение в реальном времени и точную навигацию. Эти спутники, нам сказано, представляют завоевание человечеством космоса — нашу успешную конструкцию технологической инфраструктуры в самых небесах, которые строители Вавилона стремились достичь.\u003c/p\u003e\n\u003cp\u003eНо что если башня Вавилона не на орбите? Что если инфраструктура, которая включает глобальную коммуникацию, не плавает над нами, а зарывается под нами и стоит вокруг нас? Что если небеса не были завоеваны — и что если нарратив, что они были, служит целям, которые имеют ничего общего с коммуникацией?\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"подводные-кабели-реальный-интернет\"\u003eПодводные кабели: Реальный интернет\u003c/h2\u003e\n\u003cp\u003eОсновополагающий факт, который подрывает нарратив спутниковой коммуникации, это: приблизительно 97% всех интерконтинентальных данных переносятся подводными кабелями оптоволокна, а не спутниками. Это не оспаривается утверждение. Это признаётся телекоммуникационной индустрией, подтверждается государственными агентствами и проверяется через общедоступные карты подводных кабелей.\u003c/p\u003e\n\u003cp\u003eПо состоянию на 2024 год, существует приблизительно 550 активных и планируемых подводных кабельных систем, охватывающих мировые океаны, с общей длиной превышающей 1,4 миллиона километров. Эти кабели переносят огромное большинство международных телефонных вызовов, трафика интернета и финансовых данных. Вся глобальная финансовая система — триллионы долларов транзакций в день — зависит от подводных кабелей, а не спутниковых ссылок.\u003c/p\u003e\n\u003cp\u003eGoogle, Facebook (Meta), Microsoft и Amazon вложили миллиарды долларов в подводную кабельную инфраструктуру. Google сам владеет или инвестировал в приблизительно 18 подводных кабельных систем. Эти технологические компании — которые имеют доступ к наиболее продвинутой технологии на земле — выбрали инвестировать подавляющее большинство в земную и подводную инфраструктуру, а не спутниковую инфраструктуру для их основных потребностей передачи данных.\u003c/p\u003e\n\u003cp\u003eОбъяснение телекоммуникационной индустрии состоит в том, что кабели оптоволокна предлагают резко выше полосу пропускания и меньше задержку, чем спутниковые ссылки. Это верно. Но это поднимает очевидный вопрос: если спутники — это продвинутая, доказанная технология, которую утверждает нарратив, почему глобальная экономика зависит почти полностью от кабелей, лежащих на морском дне — технология, чьё основное принцип восходит к девятнадцатому веку?\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"основанная-на-земле-инфраструктура-башни-везде\"\u003eОснованная на земле инфраструктура: Башни везде\u003c/h2\u003e\n\u003cp\u003eИнфраструктура, которая обеспечивает коммуникационные сервисы, обычно приписанные спутникам, в большинстве случаев основана на земле. Сервисы, которые обычный человек связывает со \"спутниковой\" технологией — телевизия, радио, GPS, мониторинг погоды, доступ в интернет — всё могут быть обеспечены основанной на земле инфраструктурой.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТелевизия и радио:\u003c/strong\u003e Над воздухом телевидение и радиовещание использует наземные передающие башни. Кабельное телевидение использует сети оптоволокна и коаксиального кабеля. Потоковое видео использует интернет-инфраструктуру, которая переносится в основном подводными кабелями и земной сетью оптоволокна. \"Спутниковое телевидение\" — сервис, обеспеченный компаниями, как DirecTV и Dish Network — требует антенну с блюдо, направленную на фиксированную точку в небе. Но блюдо, направленное на фиксированную точку в небе, могло бы одинаково хорошо получать сигналы от высокоалтитудной платформы, стратосферного реле или наземного передатчика, отражающего сигналы от ионосферы.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGPS навигация:\u003c/strong\u003e Глобальная система позиционирования представлена как созвездие 31 спутника, вращающихся на высоте приблизительно 20 200 километров. Но основанные на земле системы позиционирования существовали на протяжении десятилетий. LORAN (Long Range Navigation), разработанный во Вторую мировую войну, обеспеченный точное позиционирование используя наземные радио-передатчики. eLORAN, улучшенная версия, обеспечивает точность, сравнимую с GPS, используя полностью основанную на земле инфраструктуру. Вопрос — не что ли основанное на земле позиционирование возможно — это что ли системы, приписанные орбитальным спутникам, могли быть обеспечены основанными на земле или атмосферными альтернативами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМониторинг погоды:\u003c/strong\u003e Наблюдение за погодой может быть проведено от основанных на земле радарных систем, воздушных шаров погоды (более 1 800 запущены ежедневно по всему миру), высокоалтитудных самолётов и земных сетей датчика. Хотя \"спутники погоды\" кредитуются с обеспечением воображения, используемого в предвещании погоды, подобное воображение потенциально могло быть получено от высокоалтитудных платформ, работающих на высотах, далеко ниже орбитальной высоты.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"высокоалтитудные-платформы-пространство-между\"\u003eВысокоалтитудные платформы: Пространство между\u003c/h2\u003e\n\u003cp\u003eМежду основанной на земле инфраструктурой и орбитальной высотой существует огромное пространство — стратосфера, расширяющаяся от приблизительно 12 до 50 километров над поверхностью земли — где различные технологии платформы могут работать в течение расширенных периодов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProject Loon (Google):\u003c/strong\u003e От 2013 до 2021, Google работал Project Loon — флот высокоалтитудных воздушных шаров, работающих в стратосфере на высотах приблизительно 18-25 километров. Эти воздушные шары обеспеченного соединения интернета к областям без основанной на земле инфраструктуры, ретранслируя сигналы между воздушными шарами и наземными станциями. Проект продемонстрировал, что стратосферные платформы могли обеспечить многие коммуникационные сервисы, приписанные спутникам — по дроби стоимости и сложности орбитальных систем.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтратосферные дроны:\u003c/strong\u003e Компании, включая Airbus (Zephyr), Facebook/Meta (Aquila) и различные военные подрядчики, разработали солнечно-приведённые дроны, способные к работе в стратосфере для расширенных периодов — недель или месяцев в то время. Эти платформы могли переносить коммуникационные нагрузки, оборудование наблюдения и инструменты датчика на высотах 18-25 километров.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eСпросьте вопросы.\u003c/strong\u003e Если спутники обеспечивают 97% глобального интернета-трафика, почему глобальная экономика может работать в течение часов если подводные кабели отказывают?\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eИсследуйте альтернативы.\u003c/strong\u003e Узнайте о LORAN, стратосферных платформах и наземных технологиях, которые могут обеспечить коммуникационные сервисы, без орбитальной инфраструктуры.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eСледуйте деньгам.\u003c/strong\u003e Если системы, приписанные спутникам, могли быть обеспечены земной инфраструктурой на дробной цене, почему десятки миллиардов долларов ежегодно течения в космические программы?\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство опыта клинической смерти Говарда Питтмана — Предупреждение о конце времени\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические тайны: Выявленные позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и Фармакея — Колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/481-Fake_Stars_Real_Chains.mp4\"\u003eFake Stars Real Chains\u003c/a\u003e — Что действительно в небе\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/485-Firmament_Firewall.mp4\"\u003eFirmament Firewall\u003c/a\u003e — Купол выше и что это означает\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/77-The_Dome_Above.mp4\"\u003eThe Dome Above\u003c/a\u003e — Ставящий под сомнение официальную космологию\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/101-NASA_Helium_Balloons.mp4\"\u003eNASA Helium Balloons\u003c/a\u003e — Обман космической программы\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eСтроители Вавилона стремились достичь небес через технологию. Бог спутал их язык и рассеял их по земле. Сегодня нам сказано, что новое поколение строителей преуспело где Вавилон отказал — что тысячи устройств вращаются в небесах, соединяя всё человечество через технологическую инфраструктуру в небе. Но 97% мировых данных путешествует через кабели на морском дне. Башни, которые переносят наши сигналы, стоят на твёрдой земле. Воздушные шары и дроны, которые ретранслируют коммуникации, плавают в атмосфере, а не на орбите. Небеса, даже небеса, — господство Господа. Земля он дал детям людей. Возможно, башня всё ещё не достигает. Возможно, небеса остаются, как они всегда были, областью один только Бога. И возможно инфраструктура коммуникации, которая действительно соединяет нас, — это намного более земная — и намного менее небесная — чем нам было сказано верить.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/science/\",\"className\":\"category-badge\",\"children\":\"science\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Спутники действительно существуют? Скрытая инфраструктура коммуникации\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"chil
