на чело их; и чтобы никому нельзя было ни покупать, ни продавать, кроме того, кто имеет начертание, или имя зверя, или число имени его.\"\u003c/em\u003e — Откровение 13:16-17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЗнак зверя больше не будущее пророчество. Это текущая реальность в развитии — развёртываться постепенно, платформа по платформе, требование за требованием, пока участие в цифровой экономике требует биометрической идентификации. Substack, когда-то праздновавшийся как оплот свободного слова и независимой журналистики, начал требовать биометрические сканы от создателей на основе США. Это не является мерой безопасности. Это следующий шаг в строительстве универсальной системы цифровой идентификации.\u003c/p\u003e\n\u003cp\u003eОпыт близкого столкновения со смертью Хоуарда Питтмана раскрыл, что духовный мир работает через системы контроля. Три небеса. Демоническая иерархия. 97,5% отвержения. 95% самообслуживания. Каждое слово судится (Матфей 12:36-37). Система биометрической идентификации — это материальное выражение духовной маркировки — система, которая идентифицирует, отслеживает и контролирует каждого человека, который участвует.\u003c/p\u003e\n\u003cp\u003eИезуиты — военная организация Лойолы, \"абсолютная власть\" Наполеона, Тамбурини, правящий \"всем миром\" — всегда искали универсальные системы идентификации и контроля. \u003cem\u003eКатолическая тайна\u003c/em\u003e раскрывает инфильтрацию \"скрытую хитростью\", слепое повиновение, \"каждый вид порока\". Система цифровой идентификации — это технологическое совершенство иезуитской модели: полное знание каждого индивидуума, полный контроль каждой транзакции, полное наблюдение каждой коммуникации.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eЛожи обманщиков — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМаскировка Сатаны — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-происходит\"\u003eЧто происходит\u003c/h2\u003e\n\u003ch3 id=\"требование-substack\"\u003eТребование Substack\u003c/h3\u003e\n\u003cp\u003eSubstack начал требовать от создателей на основе США, которые зарабатывают деньги через платформу, подать биометрическую проверку — конкретно, сканы лица, проверенные против удостоверений личности, выданных государством. Заявленная причина — соответствие финансовым нормативам, законам против отмывания денег и требованиям \"Знайте вашего клиента\" (KYC).\u003c/p\u003e\n\u003cp\u003eНо последствия выходят далеко за пределы нормативного соответствия. Биометрический скан создает постоянную, неотзывную связь между лицом человека и его цифровой идентичностью. В отличие от пароля, который может быть изменён, или удостоверения личности, которое может быть заменено, биометрические данные постоянны. Ваше лицо, ваши отпечатки пальцев, ваши радужные оболочки — эти не могут быть переустановлены. Однажды захваченные, они принадлежат тому, кто держит базу данных.\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует на Substack (agent131711.substack.com) парадокс платформы свободного слова, требующей биометрической идентификации для участия. Платформа, которая обещала независимую журналистику, теперь требует, чтобы её создатели подвергались той же инфраструктуре надзора, которую независимая журналистика существует для противодействия.\u003c/p\u003e\n\u003ch3 id=\"более-широкий-паттерн\"\u003eБолее широкий паттерн\u003c/h3\u003e\n\u003cp\u003eSubstack — не одиночный. Требование биометрической идентификации распространяется по цифровой экономике:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПлатформы социальных медиа\u003c/strong\u003e все чаще требуют проверку удостоверения личности государства для поддержания учётных записей или доступа к определённым функциям.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФинансовые приложения\u003c/strong\u003e требуют биометрической аутентификации для транзакций.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбмены криптовалют\u003c/strong\u003e требуют распознавание лица для соответствия KYC.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГосударственные услуги\u003c/strong\u003e переходят к биометрической аутентификации для пособий, идентификации и путешествия.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждое отдельное требование кажется разумным в изоляции. Каждое оправдано безопасностью, соответствием или удобством. Но кумулятивный эффект — строительство универсальной системы биометрической идентификации — система, в которой каждая цифровая деятельность связана с физическим телом, отслеживаема, поддающаяся аудиту и контролируемая.\u003c/p\u003e\n\u003ch2 id=\"повестка-дня-цифровой-идентификации\"\u003eПовестка дня цифровой идентификации\u003c/h2\u003e\n\u003ch3 id=\"план-всемирного-экономического-форума\"\u003eПлан Всемирного экономического форума\u003c/h3\u003e\n\u003cp\u003eВсемирный экономический форум открыто выступает за системы цифровой идентификации, которые связывают биометрические данные с финансовой деятельностью, записями здоровья, историей путешествий, присутствием в социальных медиа и многим ещё. Их проект \"Known Traveller Digital Identity\" предвосхищает мир, в котором ваши биометрические данные следуют вам везде — через аэропорты, банки, больницы и онлайн платформы.\u003c/p\u003e\n\u003cp\u003eЭто не теория заговора. Это опубликованная политика, доступная на сайте WEF, продвигаемая в Давосе и финансируемая крупнейшими технологиями и финансовыми компаниями мира. Цель — одна цифровая идентичность для каждого человека на земле — идентичность, связанная с их телом, их данными, их финансовой деятельностью и их социальным поведением.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые построили первую глобальную институциональную сеть через свои миссии, университеты и дипломатические каналы, заложили концептуальный фундамент для этой системы. Управление Тамбурини \"всем миром\" из одной комнаты было 18-вековой версией того, что WEF предвосхищает: централизованный, всезнающий контроль, работающий через институциональные сети, охватывающие земной шар.\u003c/p\u003e\n\u003ch3 id=\"предупреждение-откровения\"\u003eПредупреждение Откровения\u003c/h3\u003e\n\u003cp\u003eПараллели к Откровению 13:16-17 невыразимы. Система, в которой никто не может покупать или продавать без знака — уникального идентификатора, связанного с их телом. Знак — это не обязательно физический имплантант (хотя эта технология существует). Это может быть биометрические данные, хранящиеся в базе данных, доступной через скан, требуемый для каждой транзакции.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман был показан структуру организации демонической иерархии. Знак зверя — это окончательный организационный инструмент — финальная интеграция каждого индивидуума в одну, контролируемую, полностью наблюдаемую систему. Требование Substack об биометрической проверке — это один маленький шаг в этой интеграции. Каждый шаг представляется как разумный. Каждый шаг движется ближе к системе, которую Откровение описывает.\u003c/p\u003e\n\u003cp\u003e97,5% тех, кто был отвергнут, доверял учреждениям, которые строили эту систему. Они видели каждое требование как безвредное, каждую технологию как нейтральную, каждую платформу как заслуживающую доверия. Они не видели паттерн, потому что не искали его. Они подвергались каждому требованию отдельно, никогда не признавая, что они интегрировались в систему, разработанную для полного контроля над ними.\u003c/p\u003e\n\u003ch2 id=\"экономика-наблюдения\"\u003eЭкономика наблюдения\u003c/h2\u003e\n\u003ch3 id=\"ваше-лицо--продукт\"\u003eВаше лицо — продукт\u003c/h3\u003e\n\u003cp\u003eБиометрические данные — это наиболее ценные данные в экономике наблюдения. В отличие от поведенческих данных (которые предсказывают, что вы можете делать), биометрические данные идентифицируют, кто вы — постоянно, уникально, безвозвратно. Компании, которые захватывают биометрические данные, получают способность идентифицировать любого индивидуума в любом контексте: на уличной камере, в толпе, на протесте, в частной беседе.\u003c/p\u003e\n\u003cp\u003eБиометрические базы данных, собираемые платформами, как Substack, компаниями социальных медиа, финансовыми учреждениями и государственными органами, в конечном итоге будут интегрированы — либо через официальные соглашения о совместном использовании данных, либо через неизбежные взломы баз данных, которые раскрывают базы данных разведывательным агентствам, преступным предприятиям и другим субъектам.\u003c/p\u003e\n\u003cp\u003eОднажды ваши биометрические данные находятся в системе, они не могут быть отозваны. Вы не можете изменить своё лицо. Вы не можете изменить ваши отпечатки пальцев. Данные постоянны, и система, которая их держит, имеет постоянную власть над вашей идентичностью.\u003c/p\u003e\n\u003ch3 id=\"конец-анонимности\"\u003eКонец анонимности\u003c/h3\u003e\n\u003cp\u003eСистема биометрической идентификации означает конец анонимности. Каждый кусочек контента, который вы создаёте, каждая транзакция, которую вы делаете, каждое пространство, которое вы входите — всё связано с вашим физическим телом через биометрические данные, которые не могут быть замаскированы или отброшены.\u003c/p\u003e\n\u003cp\u003eАнонимность была основанием для инакомыслия на протяжении истории. Анонимные памфлеты разожгли американскую революцию. Анонимные источники раскрывают коррупцию. Анонимные разоблачители защищают публику. Конец анонимности — это конец ответственности для мощных и конец защиты для уязвимых.\u003c/p\u003e\n\u003cp\u003eИезуиты понимали это. Их стратегия инфильтрации зависит от секретности — от способности работать анонимно внутри враждебных учреждений. Всё же система, которую они помогли построить, требует, чтобы население сдало анонимность, в то время как учреждения её сохраняют. Государственные органы работают в тайне. Службы разведки классифицированы. Корпоративные советы встречаются за закрытыми дверями. Но вы должны подать ваше лицо в базу данных, чтобы опубликовать новостную рассылку. Асимметрия — это цель.\u003c/p\u003e\n\u003ch2 id=\"сопротивление-и-альтернативы\"\u003eСопротивление и альтернативы\u003c/h2\u003e\n\u003ch3 id=\"что-вы-можете-делать\"\u003eЧто вы можете делать\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eМинимизировать биометрическую сдачу\u003c/strong\u003e: Где возможно, отказать биометрической проверке. Используйте платформы, которые это не требуют.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПоддерживать альтернативы\u003c/strong\u003e: Независимые платформы, которые приоритизируют приватность, заслуживают вашей поддержки и вашего контента.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eШифровать всё\u003c/strong\u003e: Используйте зашифрованные коммуникации, зашифрованное хранилище и зашифрованные транзакции, где законно.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФизические альтернативы\u003c/strong\u003e: Наличные транзакции, встреч лицом к лицу, документы на бумаге — всё оставляет никакой биометрический след.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПоднимайте осведомленность\u003c/strong\u003e: Большинство людей подают биометрические данные, не понимая последствий. Поделитесь этой информацией.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eУзкий путь в цифровом возрасте — это путь минимального цифрового следа — путь, который сохраняет анонимность, приватность и автономию, которые система наблюдения разработана для исключения. Каждый биометрический скан, поданный, — это сдача. Каждая альтернатива, выбранная, — это акт сопротивления.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — повестка дня биометрической идентификации и цифровой надзор\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвидетельство ОСД Хоуарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСмотрите на YouTube\u003c/a\u003e — духовное измерение систем идентификации и контроля\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКатолическая тайна: раскрытие позорящих иезуитских секретов\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eСмотрите на YouTube\u003c/a\u003e — иезуитский чертёж универсального наблюдения\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожи обманщиков\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/181-Ending_Anonymity.mp4\"\u003eЗавершение анонимности\u00
