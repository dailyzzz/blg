ебя оковы их.\" — Псалом 2:1-3\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПравители земли всегда стремились консолидировать власть выше суверенитета наций и власти Бога. От Вавилонской башни Нимрода к золотому изображению Навуходоносора к требованию Цезаря о поклонении, образец повторяется: человеческая власть собирает себя в единую структуру и требует подчинения, которое принадлежит только Богу. Договор ВОЗ о пандемии — это новейшее выражение этой древней амбиции — передача суверенной власти над здоровьем и телесной автономией миллиардов людей невыбранному, неподотчётному международному органу.\u003c/p\u003e\n\u003cp\u003eМеханизм — это здоровье. Обоснование — чрезвычайная ситуация. Результат — капитуляция национального самоуправления институту глобалиста, финансируемому фармацевтическими компаниями и частными фондами, возглавляемому генеральным директором, который не является врачом, и не подотчётному ни одному электорату на земле.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/51-The_Covenant_Blood.mp4\"\u003eКровь завета\u003c/a\u003e провозглашает, существует один завет, который превосходит все человеческие договоры — завет между Богом и Его народом, запечатанный не дипломатическими переговорами, а кровью Ягнёнка. Ни один договор о пандемии не может переопределить то, что Бог установил, и ни один международный орган не может претендовать на власть над телами, которые принадлежат их Создателю.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"договор-о-пандемии-что-предлагается\"\u003eДоговор о пандемии: что предлагается\u003c/h2\u003e\n\u003cp\u003eВ декабре 2021 года Всемирная ассамблея здравоохранения — решающий орган ВОЗ, состоящий из 194 государств-членов — согласилась начать переговоры о новом международном инструменте для подготовки к пандемии и реагирования. Этот инструмент, обычно называемый \"договор о пандемии\", был разработан Межправительственным переговорным органом (INB), учреждённым специально для этой цели.\u003c/p\u003e\n\u003cp\u003eОдновременно и отдельно ВОЗ стремилась к изменениям Международных медико-санитарных правил (IHR) — существующей юридически обязательной основе, которая управляет международными чрезвычайными ситуациями здравоохранения. Изменения IHR, предложенные в первую очередь Соединёнными Штатами и Европейским союзом, стремились расширить власть ВОЗ во время объявленных чрезвычайных ситуаций здравоохранения.\u003c/p\u003e\n\u003cp\u003eДва инструмента — договор и изменения IHR — работают вместе. Договор устанавливает основу. Изменения IHR обеспечивают механизм обеспечения. Вместе они создают комплексную передачу власти управления здравоохранением от национальных правительств к ВОЗ.\u003c/p\u003e\n\u003cp\u003eКлючевые положения предложенного договора и изменений IHR включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРасширенная власть объявления чрезвычайной ситуации.\u003c/strong\u003e Генеральный директор ВОЗ в настоящее время имеет власть объявлять о чрезвычайной ситуации в области общественного здравоохранения международного значения (PHEIC). Предложенные изменения расширяют это на включение \"пандемийных чрезвычайных ситуаций\" и \"промежуточных предупреждений о здоровье\" — расширение категорий событий, которые запускают расширенную власть ВОЗ. Объявление генерального директора не подлежит голосованию, ратификации или вето государствами-членами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбязательства по соблюдению.\u003c/strong\u003e При текущих IHR рекомендации ВОЗ не являются обязательными — государства-члены ожидают соблюдения, но сохраняют суверенное усмотрение. Предложенные изменения изменяют \"должны\" на \"будут\" в нескольких положениях, преобразуя рекомендации в обязательные обязательства. Государства-члены \"будут\" внедрять рекомендации ВОЗ во время объявленных чрезвычайных ситуаций, а не просто их рассматривать.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВласть цензуры.\u003c/strong\u003e Статья 44 предложенных изменений IHR требует от государств-членов \"противодействовать дезинформации и дезинформации\" во время чрезвычайных ситуаций здравоохранения — фактически обязывая государственную цензуру речи, которая противоречит официальным позициям ВОЗ. Проект договора включает положения для \"инфодемического управления\" — термин ВОЗ для контроля информационной среды во время кризисов здравоохранения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНаблюдение и обмен данными.\u003c/strong\u003e Договор требует от государств-членов устанавливать и финансировать сети наблюдения за патогенами, которые обмениваются данными с ВОЗ в реальном времени. Это включает наблюдение за геномом, наблюдение за сточными водами и обмен цифровыми данными о здоровье — создание глобальной инфраструктуры наблюдения за здоровьем под координацией ВОЗ.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонтроль цепи поставок.\u003c/strong\u003e Договор устанавливает координируемую ВОЗ систему \"доступа к патогенам и совместного использования преимуществ\", дающую ВОЗ власть над распределением вакцин, терапевтических средств и диагностических средств во время пандемий. Это включает положения для обязательного выделения 20% продуктов, связанных с пандемией, ВОЗ для распределения — фактически дающих ВОЗ контроль над национальными цепями поставок здравоохранения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"изменения-ihr-суверенитет-в-деталях\"\u003eИзменения IHR: Суверенитет в деталях\u003c/h2\u003e\n\u003cp\u003eМеждународные медико-санитарные правила, принятые в 2005 году, уже составляют юридически обязательную основу для 196 стран. Предложенные изменения значительно расширяют власть ВОЗ способами, о которых большинство национальных популяций не знают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУдаление языка \"не обязательно\".\u003c/strong\u003e Оригинальная статья 1 IHR определила рекомендации ВОЗ как \"необязательные советы.\" Предложенные изменения удаляют \"необязательные\", преобразуя советы в обязательства. Это единое слово меняет природу власти ВОЗ с рекомендательной на директивную.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРасширенная область видения за пределы здравоохранения.\u003c/strong\u003e Предложенные изменения расширяют определение чрезвычайных ситуаций здравоохранения для включения \"всех рисков с потенциалом воздействия на общественное здравоохранение.\" Этот язык достаточно широк, чтобы охватить изменение климата, продовольственную безопасность, экономическое нарушение, социальные волнения и практически любое состояние, которое власти определяют как имеющее последствия для здравоохранения. В соответствии с этим расширенным определением, чрезвычайная власть ВОЗ могла быть запущена событиями, далеко выходящими за рамки традиционных вспышек инфекционных заболеваний.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЦифровые учётные данные о здравоохранении.\u003c/strong\u003e Статья 36 предложенных изменений требует от государств-членов разработки цифровых документов о здравоохранении — включая записи о вакцинации, результаты тестов и сертификаты профилактики — в форматах, указанных ВОЗ. Это создаёт инфраструктуру для системы глобального цифрового паспорта здоровья, координируемой ВОЗ и необходимой для международных путешествий.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОценка соблюдения.\u003c/strong\u003e Предложенные изменения устанавливают \"комитет по соответствию\" с властью оценивать, соответствуют ли государства-члены своим обязательствам. Государства, найденные несоответствующими, могли бы столкнуться с дипломатическими, экономическими или институциональными последствиями — хотя конкретные механизмы обеспечения остаются предметом переговоров.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВременная шкала чрезвычайных полномочий.\u003c/strong\u003e Предложенные изменения позволяют объявленным чрезвычайным ситуациям сохраняться в неопределённое время, без автоматического истечения и без требования ратификации государством-членом для продолжения. COVID-19 PHEIC продолжался более трёх лет (январь 2020 — май 2023 года). В соответствии с расширенной структурой, будущие объявления о чрезвычайных ситуациях могли бы сохраняться ещё дольше, с расширенной властью ВОЗ в действии на протяжении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кто-контролирует-воз\"\u003eКто контролирует ВОЗ?\u003c/h2\u003e\n\u003cp\u003eВопрос о власти ВОЗ неотделим от вопроса о том, кто контролирует ВОЗ. Структура управления организации и модель финансирования раскрывают, что это не независимый орган общественного здравоохранения, а учреждение, подверженное значительному влиянию частных интересов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФинансирование.\u003c/strong\u003e Бюджет ВОЗ составляет примерно 6,7 миллиарда долларов на период 2024-2025 гг. Только 16% поступает из установленных взносов государств-членов (обязательные взносы). Оставшиеся 84% поступают из \"добровольных взносов\" — пожертвований от правительств, частных фондов и корпораций, которые обычно предназначены для определённых программ. Эта структура финансирования означает, что доноры эффективно определяют приоритеты ВОЗ. Крупнейшие добровольные участники включают Соединённые Штаты, Фонд Билла и Мелинды Гейтс, Германию, Gavi (альянс вакцин, финансируемый Фондом Гейтс) и Европейскую комиссию.\u003c/p\u003e\n\u003cp\u003eФонд Билла и Мелинды Гейтс является вторым по величине финансистом ВОЗ в целом и крупнейшим финансистом, не являющимся государством. Взносы фонда сосредоточены в программах вакцинации и инфекционных заболеваний — обеспечение того, чтобы действия ВОЗ по подготовке к пандемии согласовались с приоритетами фонда. Когда ВОЗ рекомендует массовую вакцинацию как основной ответ на пандемию, она рекомендует продукт, который её крупнейший частный финансист разрабатывает и распределяет.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРуководство.\u003c/strong\u003e Генеральный директор ВОЗ Тедрос Адханом Гебрейесус был избран в 2017 году — первый не-врач на этом посту. Избрание Тедроса было поддержано Китаем, и его обращение с пандемией COVID-19 включало похвалу для ответа Китая, противодействие ограничениям на путешествия из Китая и задержку объявления PHEIC, которая, по мнению критиков, стоила критических недель времени подготовки. Тедрос ранее служил министром здравоохранения и министром иностранных дел Эфиопии в период, когда его политическая партия (Фронт освобождения Тиграя) была обвинена в авторитарном управлении и нарушениях прав человека.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВлияние фармацевтической промышленности.\u003c/strong\u003e Консультативные комитеты ВОЗ включают лиц с финансовыми связями с фармацевтическими компаниями, продукты которых ВОЗ рекомендует. Во время пандемии H1N1 2009 года ВОЗ объявила пандемию на основе совета экспертов, которые не раскрыли финансовые отношения с производителями вакцин. Расследование Британского медицинского журнала и Бюро журналистских расследований раскрыло эти конфликты интересов и пришло к выводу, что объявление пандемии получало производителям вакцин за счёт миллиардов долларов государственных расходов на вакцины, которые были в значительной степени ненужными.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРеволюционная дверь.\u003c/strong\u003e Персонал движется между ВОЗ, национальными агентствами здравоохранения, фармацевтическими компаниями и Фондом Гейтса — создавая сеть общих интересов, которые превосходят институциональные границы. ВОЗ не является независимым арбитром глобального здравоохранения. Это узел в сети учреждений с согласованными финансовыми и идеологическими интересами.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"предшественник-covid-19-что-они-делали-с-существующей-властью\"\u003eПредшественник COVID-19: Что они делали с существующей властью\u003c/h2\u003e\n\u003cp\u003eДоговор ВОЗ о пандемии должен быть понят в контексте того, что ВОЗ и национальные правительства делали с существующей властью во время COVID-19 — властью, которая была намного более ограничена, чем то, что договор предлагает:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБлокировки.\u003c/strong\u003e Правительства во всём мире наложили беспрецедентные ограничения на движение, торговлю и социальное взаимодействие на основе рекомендаций ВОЗ. Школы были закрыты более чем на год во многих странах. Бизнес был разрушен. Религиозные услуги были запрещены. Похороны были ограничены. Экономический и социальный ущерб были катастрофическими — и собственные данные ВОЗ показали, что блокировки имели минимальное влияние на смертность от COVID-19, в то время как они вызывали огромный побочный ущерб.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМандаты вакцины.\u003c/strong\u003e Несмотря на экспериментальный характер мРНК вакцин (авторизованных по чрезвычайной авторизации, а не полной одобрению), правительства наложили мандаты, требующие вакцинацию как условие трудоустройства, образования, путешествия и доступа в общественные места. Люди, которые отказались, были уволены, исключены, исключены и стигматизированы — на основе рекомендаций ВОЗ о том, что вакцинация была \"безопасной и эффективной\" и что мандаты были надлежащей мерой общественного здравоохранения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЦензура.\u003c/strong\u003e ВОЗ работала непосредственно с платформами социальных медиа для подавления информации о побочных эффектах вакцин, естественном иммунитете, протоколах раннего лечения и гипотезе утечки из лаборатории. Программа \"инфодемического управления\" ВОЗ координировала с правительствами и платформами, чтобы обеспечить, что только одобренная ВОЗ информация была доступна в общественной информационной среде.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодавление раннего лечения.\u003c/strong\u003e Рекомендация ВОЗ против использования ивермектина и гидроксихлорохина для лечения COVID-19 — несмотря на клинические доказательства и опыт врача, предполагающие эффективность — предотвратили миллионы людей от доступа к потенциально спасающему жизнь лечению. Власть ВОЗ была использована не для расширения вариантов лечения, а для их ограничения на один путь: вакцинацию продуктами, производимыми компаниями, которые финансируют ВОЗ.\u003c/p\u003e\n\u003cp\u003eЕсли это то, что ВОЗ достигла с рекомендательной, необязательной властью, что она достигнет с обязательной, обеспечиваемой властью в соответствии с предложенным договором и изменениями IHR?\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"национальный-суверенитет-что-действительно-поставлено-на-кон\"\u003eНациональный суверенитет: что действительно поставлено на кон\u003c/h2\u003e\n\u003cp\u003eДоговор ВОЗ о пандемии не просто создаёт механизм координации международного здравоохранения. Он создаёт правовую основу, в которой решения, влияющие на наиболее фундаментальные аспекты национального управления — здоровье граждан, свобода движения, контроль информации, управление экономикой — принимаются международным органом, который не избирается, не подотчётен и не может быть контролируем гражданами, чьи жизни он управляет.\u003c/p\u003e\n\u003cp\u003eКонцепция национального суверенитета — принцип, что граждане нации, через своих избранных представителей, имеют окончательную власть над своим собственным управлением — является основой современного политического порядка. Вестфальская система, установленная в 1648 году, положила конец эре, в которой трансграничные власти (католическая церковь, Священная Римская империя) претендовали на власть управления над суверенными нациями. Договор ВОЗ о пандемии обращает этот принцип вспять, устанавливая трансграничную власть с властью управления над суверенными нациями в вопросах здравоохранения — категорию, которая, в соответствии с расширенными определениями, может охватывать практически любой аспект человеческой жизни.\u003c/p\u003e\n\u003cp\u003eДоговор не требует ратификации национальных законодательств как внутреннего права. По международному праву, договоры, ратифицированные исполнительной ветвью нации, становятся обязательными обязательствами, которые превосходят внутреннее законодательство. Президент или премьер-министр может обязать свою нацию на власть ВОЗ без голосования законодательства. Граждане никогда не консультируются. Их представители могут никогда не проголосовать. Но обязательство обязательно.\u003c/p\u003e\n\u003cp\u003eНесколько наций выразили оппозицию. Африканские нации выразили озабоченность по поводу капитуляции суверенитета. Некоторые европейские нации поставили под сомнение объём предложенных изменений. Но институциональный импульс — движимый ВОЗ, WEF, Фондом Гейтса и администрацией Байдена (которая предложила многие из наиболее агрессивных изменений IHR) — мощный. Структура \u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eВеликого переустройства\u003c/a\u003e явно определяет глобальное управление здравоохранением как ключный столп нового мирового порядка, и договор о пандемии — это механизм для его доставки.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-нет-короля-кроме-цезаря--или-христа\"\u003eБиблейское размышление: Нет короля, кроме Цезаря — или Христа\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Иисус ответил: Царство Мое не от мира сего; если бы Царство Мое было от мира сего, то служители Мои подвизались бы за Меня, чтобы Я не был отдан Иудеям; но ныне Царство Мое не отсюда.\" — Иоанн 18:36\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eРелигиозные лидеры, которые потребовали распятия Иисуса, объявили Пилату: \"У нас нет короля, кроме Цезаря\" (Иоанн 19:15). В этом объявлении они сдали свой суверенитет — суверенитет избранного Богом народа — иностранной власти. Они отклонили Царя царей в пользу земного правительства, которое они верили защитит их интересы.\u003c/p\u003e\n\u003cp\u003eДоговор ВОЗ о пандемии требует аналогичной капитуляции. Нации, которые ратифицируют договор, объявляют, в сущности: \"У нас нет авторитета здравоохранения, кроме ВОЗ.\" Они сдают суверенную власть своего народа над своим собственным здоровьем, своими собственными телами и своей собственной информационной средой международной организации, которую они не избирали, не могут контролировать и не могут нести ответственным.\u003c/p\u003e\n\u003cp\u003eПисание последовательно подтверждает принцип национального суверенитета. Бог \"из одной крови произвёл весь род человеческий для обитания по всему лицу земли, назначив предопределённые времена и границы их habitation\" (Деяния 17:26). Бог установил нации с границами — божественный порядок, который структуры глобального управления стремятся растворить. Договор ВОЗ о пандемии не является инструментом здравоохранения. Это инструмент суверенитета — механизм для передачи власти от наций к глобальному телу в подготовке к системе, которую Откровение описывает: единая власть, которая управляет \"всеми племенами, и языками, и нациями\" (Откровение 13:7).\u003c/p\u003e\n\u003cp\u003eОтвет верующего не политический, а духовный: наши тела принадлежат Богу, а не ВОЗ. Наше здоровье находится в Его руках, а не в протоколах генерального директора. Наш суверенитет исходит от Создателя, а не от международных договоров. \"Вы куплены дорогой ценой: посему прославляйте Бога в телах ваших и в духах ваших, которые суть Божии\" (1 Коринфяне 6:20).\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о ближайшем опыте смерти Говарда Питтмана — предупреждение о конце времён, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическое конфиденциально: раскрытые позорные иезуитские тайны\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и фармакея — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может находиться в подвале Ватикана может шокировать вас!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep с зверем\u003c/a\u003e — Глобальное управление в lockstep\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/453-Dinner_At_The_UN.mp4\"\u003eУжин в ООН\u003c/a\u003e — Захват власти ВОЗ в Организации Объединённых Наций\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eРазработка контагиона\u003c/a\u003e — Разработка власти пандемии\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуй-далее\"\u003eИсследуй далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eВеликое переустройство: четвёртая промышленная революция\u003c/a\u003e — Более широкая структура управления, в которой договор ВОЗ о пандемии функционирует как столп управления здравоохранением\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/depopulation-agenda-documents/?lang=ru\"\u003eПовестка дня депопуляции: документы, которые они не хотят, чтобы вы читали\u003c/a\u003e — Задокументированные цели депопуляции учреждений, управляющих договором о пандемии\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eРелигиозные лидеры Иерусалима сдали свой суверенитет пятью словами: \"У нас нет короля, кроме Цезаря.\" Это объявление их не спасило. В течение поколения армии Цезаря разрушили их храм, снесли их город и рассеяли их людей. Суверенитет, сданный человеческой власти — это суверенитет потерянный — не временно, а постоянно, не отчасти, а полностью. Договор ВОЗ о пандемии просит нации земли сделать то же самое объявление: \"У нас нет авторитета здравоохранения, кроме ВОЗ.\" Результат будет тем же — не защита здоровья, а разрушение свободы, не предотвращение болезни, а наложение контроля. \"Лучше уповать на Господа, чем надеяться на князей\" (Псалом 118:9). ВОЗ не является вашим врачом. Бог — ваш целитель. Договор о пандемии не является вашей защитой. Кровь Христа — ваше покрытие. \"Его ранами мы исцелены\" (Исаия 53:5) — не международными протоколами, не объявлениями о чрезвычайной ситуации, не властью любого человеческого учреждения, а законченным трудом Того, кто нёс наши болезни и взял на Себя наши болезни на кресте.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Договор ВОЗ о пандемии: Конец национального суверенитета\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Как договор ВОЗ о подготовке к пандемии и изменения к Международным медико-санитарным правилам предназначены для передачи национального суверенитета над политикой здравоохранения невыбранному международному органу — позво
