 слоями намеренной дезинформации, посаженных мифов и оружейных заблуждений. Это не случайно -- это изощренная кампания информационной войны, разработанная, чтобы гарантировать, что технология V2K остается в тени, что его жертвы остаются дискредитированными, и что общественность остается невежественной об одном из самых мощных оружий, когда-либо созданных.\u003c/p\u003e\n\u003cp\u003eВ частях 1 и 2 мы поделились личным свидетельством и исследовали оружие Voice of God. Теперь в части 3 мы сталкиваемся с ложью лицом к лицу -- отделяя документированные факты от посаженного вымысла, раскрывая агентов дезинформации, которые мутят воды, и оснащая вас правдой, которая вам нужна для навигации по этой сложной и опасной теме.\u003c/p\u003e\n\u003cp\u003eХоварду Питтману было сказано, что 97,5% христиан терпят неудачу, потому что они не могут различать правду от обмана. Кампания дезинформации V2K -- мастер-класс в обмане -- разработанный разведывательными агентствами, обученными методу иезуитов инфильтрации \"скрытой с коварством.\" \"Абсолютная власть\" Наполеона требует абсолютного контроля над информацией. \"Вечное проклятие\" Адамса применяется к тем, кто создает и распространяет эту ложь. Управление \"половиной мира\" Тамбулини включает управление тем, что этот мир верит о своем собственном порабощении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ложь-которую-они-рассказывают\"\u003eЛожь, которую они рассказывают\u003c/h2\u003e\n\u003ch3 id=\"ложь-1-v2k----это-научная-фантастика\"\u003eЛожь #1: \"V2K -- это научная фантастика\"\u003c/h3\u003e\n\u003cp\u003eНаиболее распространенная ложь -- это то, что технология V2K не существует -- что это продукт параноидных воображений и фильмов научной фантастики. Эта ложь поддерживается:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОсновными СМИ\u003c/strong\u003e, которые отказываются расследовать претензии V2K\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПсихиатрами\u003c/strong\u003e, которые диагностируют каждого докладчика V2K как шизофреника\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРазвенчивателями\u003c/strong\u003e, которые отклоняют патенты, военные документы и научные статьи как нерелевантные\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАлгоритмами социальных сетей\u003c/strong\u003e, которые подавляют контент V2K\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПравда: V2K задокументирован в рецензируемой научной литературе начиная с 1961 года. Это описано в нескольких патентах США. Это было разработано в соответствии с классифицированными военными программами. Его развертывание было сообщено надежными военными и разведывательными источниками.\u003c/p\u003e\n\u003ch3 id=\"ложь-2-каждый-кто-слышит-голоса-психически-болен\"\u003eЛожь #2: \"Каждый, кто слышит голоса, психически болен\"\u003c/h3\u003e\n\u003cp\u003eЭто, пожалуй, самая опасная ложь, потому что она предотвращает жертв от поиска помощи и обеспечивает, что их свидетельство автоматически дискредитировано. Психиатрическое учреждение было оружейным против целевых объектов V2K -- каждый, кто сообщает о технологии, диагностируется с шизофренией, назначены антипсихотические лекарства и постоянно маркируется как психически больной.\u003c/p\u003e\n\u003cp\u003eПравда: Хотя подлинное психическое заболевание существует, общее предположение, что все слышание голосов психиатрическое по происхождению, игнорирует документированное существование технологии, которая может производить точно такие же симптомы. Компетентный диагностический процесс рассмотрит технологические причины рядом с психиатрическими. Отказ сделать это не наука -- это институциональное соучастие.\u003c/p\u003e\n\u003ch3 id=\"ложь-3-оловянные-фольг-шапки----это-сумасшествие\"\u003eЛожь #3: \"Оловянные фольг Шапки -- это сумасшествие\"\u003c/h3\u003e\n\u003cp\u003eМем \"оловянной фольги\" -- образ параноидного человека в алюминиевой фольге на голове -- был намеренно создан и распространен, чтобы дискредитировать любого, обеспокоенного электромагнитным оружием. Мем связывает озабоченность по электромагнитной технологии с безумием, делая социально невозможным серьезно обсуждать тему.\u003c/p\u003e\n\u003cp\u003eПравда: Электромагнитное экранирование -- это законная инженерная дисциплина. Военные объекты, разведывательные агентства и корпоративные исследовательские лаборатории все используют электромагнитное экранирование (клетки Фарадея) для защиты от электронного наблюдения и электромагнитного вмешательства. Принцип является обоснованным -- высмеивание -- это оружие.\u003c/p\u003e\n\u003ch3 id=\"ложь-4-v2k-работает-только-на-близком-расстоянии\"\u003eЛожь #4: \"V2K работает только на близком расстоянии\"\u003c/h3\u003e\n\u003cp\u003eНекоторые ограниченные источники утечки информации признают, что технология микроволновой слуха существует, но утверждают, что она работает только на очень близком расстоянии -- несколько метров максимум. Это утверждение разработано, чтобы сделать V2K неэффективным как оружие.\u003c/p\u003e\n\u003cp\u003eПравда: Эффективный диапазон технологии V2K зависит от мощности передатчика, частоты, используемой, и конструкции антенны. Военные системы могут работать на расстояниях сотен метров до километров. Системы на основе спутников теоретически могли бы иметь глобальный охват. Инфраструктура сотовых башен обеспечивает национальное покрытие на частотах, совместимых с микроволновым слуховым эффектом.\u003c/p\u003e\n\u003ch3 id=\"ложь-5-целевые-индивидуалы----все-психически-больные\"\u003eЛожь #5: \"Целевые индивидуалы -- все психически больные\"\u003c/h3\u003e\n\u003cp\u003eЯрлык \"целевой индивидуал\" был намеренно связан с психическим заболеванием посредством скоординированной кампании, которая включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПосаженные агенты дезинформации\u003c/strong\u003e в сообществе целевых индивидов, которые продвигают возмутительные утверждения, разработанные для дискредитирования всей группы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПсихиатрическая литература\u003c/strong\u003e, которая классифицирует веру в то, что быть целевым, как бредовое расстройство\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМедийное освещение\u003c/strong\u003e, которое изображает целевых индивидов как параноидных и опасных\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМанипуляция социальными сетями\u003c/strong\u003e, которая усиливает самые экстремальные утверждения при подавлении надежного свидетельства\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПравда: Хотя некоторые люди, которые утверждают, что целевые, могут действительно иметь психиатрические условия, общее отклонение всех целевых индивидов как психически больных интеллектуально нечестно и служит интересам тех, кто развертывает технологию.\u003c/p\u003e\n\u003ch2 id=\"мифы-которые-они-распространяют\"\u003eМифы, которые они распространяют\u003c/h2\u003e\n\u003ch3 id=\"миф-1-v2k-требует-имплантата\"\u003eМиф #1: \"V2K требует имплантата\"\u003c/h3\u003e\n\u003cp\u003eНекоторые источники утверждают, что технология V2K требует физического имплантата в тело целевого объекта. Этот миф служит двум целям: он делает V2K более сложным и трудным для развертывания, чем на самом деле, и отвлекает исследование в сторону обнаружения имплантата, а не обнаружения передачи электромагнитного.\u003c/p\u003e\n\u003cp\u003eПравда: Микроволновый слуховой эффект работает без любого имплантата. Он эксплуатирует естественные термоупругие свойства мозговой ткани. Имплантат не требуется. Однако имплантаты (исследованные в части 8) могут улучшить эффект и обеспечить дополнительные возможности.\u003c/p\u003e\n\u003ch3 id=\"миф-2-только-правительство-имеет-v2k\"\u003eМиф #2: \"Только правительство имеет V2K\"\u003c/h3\u003e\n\u003cp\u003eЭтот миф предполагает, что только государственные акторы имеют доступ к технологии V2K. Это служит для сужения объема расследования и предотвращения людей от рассмотрения других возможных операторов.\u003c/p\u003e\n\u003cp\u003eПравда: Основная технология -- микроволновая передача на определенных частотах и схемах импульсов -- находится в пределах достижения любой хорошо финансируемой организации или технически опытного индивида. Поскольку технология становится лучше понимаемой и электронные компоненты становятся дешевле, барьер для входа продолжает падать.\u003c/p\u003e\n\u003ch3 id=\"миф-3-передачи-v2k-могут-быть-легко-обнаружены\"\u003eМиф #3: \"Передачи V2K могут быть легко обнаружены\"\u003c/h3\u003e\n\u003cp\u003eНекоторые источники предлагают, что передачи V2K могут быть обнаружены с помощью детекторов электромагнитного поля (ЭМЗ) потребительского уровня. Этот миф отправляет целевые объекты в разочаровывающий и бесплодный поиск сигналов с неадекватным оборудованием.\u003c/p\u003e\n\u003cp\u003eПравда: Передачи V2K работают на частотах и уровнях мощности, которые могут не быть обнаружены с помощью потребительских ЭМЗ-счетчиков. Необходимо спектральное оборудование военного уровня и специализированное оборудование обнаружения. Военно-морской флот вложил тяжело в то, чтобы сделать передачи V2K трудными для обнаружения -- это фундаментальное требование проекта скрытого оружия.\u003c/p\u003e\n\u003ch2 id=\"заблуждения-которые-они-эксплуатируют\"\u003eЗаблуждения, которые они эксплуатируют\u003c/h2\u003e\n\u003ch3 id=\"заблуждение-1-v2k--симптомы-шизофрении\"\u003eЗаблуждение #1: \"V2K = симптомы шизофрении\"\u003c/h3\u003e\n\u003cp\u003eПерекрытие между симптомами V2K и симптомами шизофрении не является совпадением -- технология V2K была разработана для производства симптомов, неотличимых от психического заболевания. Это делает оружие отрицаемым: каждый, кто сообщает о нем, автоматически предполагается, что психически болен.\u003c/p\u003e\n\u003cp\u003eНо есть различия:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eНачало V2K\u003c/strong\u003e обычно внезапное, у ранее здоровых индивидов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНачало шизофрении\u003c/strong\u003e обычно постепенное, с продромальными симптомами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eV2K звук\u003c/strong\u003e часто имеет технологические характеристики (электронные тоны, структурированные образцы)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eШизофренические галлюцинации\u003c/strong\u003e обычно более разнообразны и дезорганизованы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eV2K реагирует\u003c/strong\u003e на изменения местоположения и попытки экранирования\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eШизофренические галлюцинации\u003c/strong\u003e не реагируют на изменения физической среды\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"заблуждение-2-все-электронное-домогательство----это-v2k\"\u003eЗаблуждение #2: \"Все электронное домогательство -- это V2K\"\u003c/h3\u003e\n\u003cp\u003eV2K -- это одна категория электронного домогательства, но не единственная. Другие технологии включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОружие направленной энергии\u003c/strong\u003e (DEW), которое вызывает боль, ожоги или повреждение ткани\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭлектромагнитное вмешательство\u003c/strong\u003e, которое нарушает электронные устройства\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТехнологии наблюдения\u003c/strong\u003e, которые контролируют целевые объекты без передачи звука\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОрганизованное преследование\u003c/strong\u003e, используя человеческих агентов вместо технологии\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКонфакция всех этих технологий под ярлыком V2K создает путаницу и делает расследование более трудным.\u003c/p\u003e\n\u003ch2 id=\"кампания-информационной-войны\"\u003eКампания информационной войны\u003c/h2\u003e\n\u003ch3 id=\"cointelpro-20\"\u003eCOINTELPRO 2.0\u003c/h3\u003e\n\u003cp\u003eКампания дезинформации против осведомленности V2K следует игровой книге COINTELPRO -- программе FBI для разрушения и дискредитирования внутренних организаций:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eИнфильтрация\u003c/strong\u003e: Агенты посаживаются в сообществах целевых индивидов для распространения дезинформации, продвижения раздоров и дискредитирования надежных голосов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПсихологическая война\u003c/strong\u003e: Целевые объекты подвергаются gaslight медицинскими работниками, правоохранительными органами и членами семьи, которые были подготовлены рассматривать претензии V2K как психическое заболевание\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСудебное домогательство\u003c/strong\u003e: Целевые объекты, которые говорят открыто, подлежат психиатрическим удержаниям, вызовам по опеке и другим судебным действиям, разработанным для их молчания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМанипуляция медиа\u003c/strong\u003e: Основные СМИ отказываются охватывать технологию V2K, одновременно продвигая повествования, которые связывают слышание голоса исключительно с психическим заболеванием\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"роль-психиатрического-учреждения\"\u003eРоль психиатрического учреждения\u003c/h3\u003e\n\u003cp\u003eПсихиатрическое учреждение функционирует как страж против раскрытия V2K. Посредством классификации всех слышание голоса как психиатрического заболевания, система психического здоровья гарантирует, что целевые объекты V2K:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЛекарства\u003c/strong\u003e (антипсихотические препараты, которые нарушают когнитивную функцию)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМаркированы\u003c/strong\u003e (постоянный психиатрический диагноз, который дискредитирует все будущие свидетельства)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИзолированы\u003c/strong\u003e (социальное клеймо, связанное с психическим заболеванием)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМолчаливы\u003c/strong\u003e (кто поверит \"шизофренику\", который утверждает, что правительство вставляет голоса в их голову?)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не случайная функция психиатрии -- это разработанная характеристика. Программа MKUltra ЦРУ тесно сотрудничала с психиатрами для разработки методов психологического контроля. Психиатрическое учреждение было инфильтровано десятилетия назад, и оно продолжает служить инструментом социального контроля.\u003c/p\u003e\n\u003ch2 id=\"компонент-духовной-войны\"\u003eКомпонент духовной войны\u003c/h2\u003e\n\u003cp\u003eОткровение Ховарда Питтмана о трех небесах и 97,5% уровне отказа среди христиан напрямую относится к кампании дезинформации V2K. Ложь, мифы и заблуждения -- это не просто светская пропаганда -- они являются духовным оружием, разработанным для предотвращения людей от признания и сопротивления технологии, которая нацелена на ум и душу.\u003c/p\u003e\n\u003cp\u003eМетод иезуитов инфильтрации \"скрытой с коварством\" виден по всей этой кампании. Каждое учреждение, которое могло бы раскрыть V2K -- СМИ, академии, медицина, правоохранительные органы -- были инфильтрованы и со-выбраны. \"Каждый вид порока\" используется для поддержания крышки. И население, неспособное различать правду от обмана, остается захваченным в 97,5% -- терпит неудачу, обманывается и контролируется.\u003c/p\u003e\n\u003cp\u003eПуть вперед -- это различение -- сначала духовное различение, а затем технологическое понимание. Тестируйте духов. Тестируйте голоса. Тестируйте информацию. И никогда, никогда не принимайте повествование консенсуса без критического анализа.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — Анализ дезинформации V2K и исследование контрразведки\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство Ховарда Питтмана о предсмертном опыте\u003c/a\u003e — Духовное различение в век т
