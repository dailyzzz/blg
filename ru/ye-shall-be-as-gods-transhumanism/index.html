Пять слов изменили ход человеческой истории: \"вы будете как боги\". Обещание змея было не просто искушением поесть плода. Это было философским предложением — полной альтернативой замыслу Творца. Бог сделал вас ограниченными. Змей предлагает вам неограниченность. Бог сделал вас зависимыми. Змей предлагает вам независимость. Бог сделал вас человеком. Змей предлагает вам божественность.\u003c/p\u003e\n\u003cp\u003eЭто первоначальный трансгуманистический манифест.\u003c/p\u003e\n\u003cp\u003eКаждое последующее восстание против Бога — каждая империя, каждая философия, каждая технология, используемая в нарушении божественных границ — восходит к этому моменту. Обещание меняет форму, но никогда не меняет сущность. В Эдеме это было яблоко. В Вавилоне это была башня. В Египте это была божественность фараона. В Греции это была философия. В Риме это было поклонение императору. В 21 веке это трансгуманизм — явный, финансируемый, институциональный проект по превосхождению человеческого состояния через технологию.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003cem\u003eThe Serpent's Curse\u003c/em\u003e напоминает нам, что змей, сделавший это обещание, был проклят за его сделал. Обещание было ложью. Адам и Ева не стали богами. Они пали — стыдились, боялись, отделились от Бога, образ которого они носили. Ложь произвела смерть, не божественность. И такая же ложь, переупакованная в кремний и генетику, произведёт тот же результат.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"первоначальное-искушение-трёхчастная-ложь\"\u003eПервоначальное искушение: трёхчастная ложь\u003c/h2\u003e\n\u003cp\u003eИскушение змея в Бытии 3:1-5 следует трёхчастной структуре, которая точно соответствует трансгуманистической повестке:\u003c/p\u003e\n\u003ch3 id=\"часть-1-действительно-ли-бог-сказал--поставьте-под-сомнение-авторитет-творца\"\u003eЧасть 1: \"Действительно ли Бог сказал?\" — Поставьте под сомнение авторитет Творца\u003c/h3\u003e\n\u003cp\u003eПервый шаг змея был поставить под сомнение слово Бога: \"Подлинно ли Бог сказал: не ешьте ни от какого дерева в саду?\" Это деконструкция власти — предположение, что повеления Бога не абсолютны, не разумны, не в вашем интересе.\u003c/p\u003e\n\u003cp\u003eТрансгуманизм начинается с того же вопроса: действительно ли Бог спроектировал человеческое тело как конечный продукт? Действительно ли человеческое состояние — предполагаемый результат Творца? Действительно ли ограничения смертности, старения, болезни и когнитивной границы — это спецификация проекта — или они ошибки, которые должны быть исправлены человеческой инженерией?\u003c/p\u003e\n\u003cp\u003eТрансгуманистический ответ заключается в том, что человеческое тело — это \"первый черновик\" — отправная точка для улучшения, не готовая работа. Ограничения — это баги, не характеристики. Границы — это проблемы, не дизайн. Это напрямую противоречит Бытию 1:31: \"И увидел Бог всё, что Он создал, и вот, хорошо весьма.\" Бог объявил творение — включая человеческое тело — \"хорошо весьма\". Змей говорит: \"Недостаточно хорошо\".\u003c/p\u003e\n\u003ch3 id=\"часть-2-вы-не-умрёте--отрицайте-последствия\"\u003eЧасть 2: \"Вы не умрёте\" — Отрицайте последствия\u003c/h3\u003e\n\u003cp\u003eПредупреждение Бога было ясным: \"в день, в который вы вкусите от неё, смертью умрёте\" (Бытие 2:17). Змей напрямую противоречит Богу: \"Вы не умрёте\". Это отрицание последствий — обещание, что нарушение не имеет штрафа, что пересечение границ Бога не имеет стоимости.\u003c/p\u003e\n\u003cp\u003eТрансгуманизм делает то же обещание. Смерть — это не божественное назначение. Это технический вопрос, который должен быть решён. Старение — это не естественное прогрессирование смертного тела. Это болезнь, которую нужно вылечить. Ограничения человеческого состояния — это не следствия Падения. Это инженерные вызовы, которые нужно преодолеть.\u003c/p\u003e\n\u003cp\u003eРэй Курцвейл, директор инженерной разработки Google и крёстный отец современного трансгуманизма, предсказывает, что люди достигнут цифровой бессмертности к 2045 году — загрузив сознание в цифровые субстраты, которые не стареют, не разлагаются и не умирают. Джефф Безос инвестировал более $3 миллиардов в Altos Labs, биотехнологическую компанию, сосредоточенную на обновлении клеток. Calico компании Google (California Life Company) имеет явную миссию решить проблему смерти.\u003c/p\u003e\n\u003cp\u003e\"Вы не умрёте\". Змей обещал это в Эдеме. Кремниевая долина обещает это венчурным капиталом. Ложь одна и та же. Ложь всегда одна и та же.\u003c/p\u003e\n\u003ch3 id=\"часть-3-вы-будете-как-боги--замените-творца\"\u003eЧасть 3: \"Вы будете как боги\" — Замените Творца\u003c/h3\u003e\n\u003cp\u003eКульминация искушения: вы будете божественными. Ваши глаза будут открыты. Вы будете знать добро и зло. Вы превзойдёте человеческое состояние и станете чем-то большим — чем-то, равным Богу.\u003c/p\u003e\n\u003cp\u003eЯвная цель трансгуманизма — создание \"постлюдей\" — существ, которые превзошли биологические ограничения \u003cem\u003eHomo sapiens\u003c/em\u003e через генетическую модификацию, кибернетическое улучшение, когнитивное расширение и цифровую интеграцию. Заявленная цель — не просто улучшить здоровье человека. Это создание нового вида — \u003cem\u003eHomo deus\u003c/em\u003e, в названии книги Юваля Ноя Харари 2016 года. Человек становится богом. Обещание змея сделано буквальным.\u003c/p\u003e\n\u003cp\u003eХарари, старший советник Всемирного экономического форума, открыто пишет о приближающемся превосхождении человечества: \"Homo sapiens, как мы их знаем, исчезнут примерно через столетие... Мы, вероятно, одно из последних поколений Homo sapiens. В течение столетия или двух земля будет доминирована существами, которые больше отличаются от нас, чем мы отличаемся от неандертальцев или шимпанзе\".\u003c/p\u003e\n\u003cp\u003eЭто не нейтральное наблюдение. Это манифест змея, обновлённый для схемы TED Talk.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пять-столпов-трансгуманистического-восхождения\"\u003eПять столпов трансгуманистического восхождения\u003c/h2\u003e\n\u003cp\u003eТрансгуманистический проект стоит на пяти столпах, каждый из которых представляет специфичное отрицание замысла Бога:\u003c/p\u003e\n\u003ch3 id=\"столп-1-генетическое-улучшение\"\u003eСтолп 1: Генетическое улучшение\u003c/h3\u003e\n\u003cp\u003eРедактирование генов CRISPR позволяет прямую модификацию человеческого генома. Учёные могут добавлять, удалять или изменять гены с возрастающей точностью. Заявленные медицинские применения — устранение генетических болезней — это входной пункт. Траектория — это улучшение: расширение интеллекта, физическая оптимизация, устойчивость к болезням за пределами естественных параметров и в конечном итоге создание проектируемых людей, чей генетический код написан человеческими инженерами, а не Творцом.\u003c/p\u003e\n\u003cp\u003eКак исследовано в \u003ca href=\"/fallen-angels-book-of-enoch/?lang=ru\"\u003eFallen Angels and the Book of Enoch: The Forbidden History\u003c/a\u003e, генетическая манипуляция — это не новое. Стражи научили человечество запретным знаниям, которые включали коррупцию естественных генетических границ. Допотопный мир был уничтожен, потому что \"вся плоть развратила путь свой на земле\" (Бытие 6:12). CRISPR — это цифровая версия учения Стражей — технология переписания кода, который написал Бог.\u003c/p\u003e\n\u003ch3 id=\"столп-2-кибернетическое-улучшение\"\u003eСтолп 2: Кибернетическое улучшение\u003c/h3\u003e\n\u003cp\u003eНейронные интерфейсы, протезные конечности, кохлеарные имплантаты, ретинальные имплантаты, экзоскелеты — слияние биологического тела с механическими и цифровыми системами. Медицинские применения — это ворота. Траектория — это расширение: улучшенное зрение за пределами человеческого диапазона, улучшенный слух за пределами человеческой частоты, улучшенная сила за пределами человеческой мышцы и улучшенное познание через прямое подключение мозг-компьютер.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в исследованиях интерфейсов мозг-компьютер, Neuralink имплантировал свой прибор в пациентов-людей. Заявленная цель — восстановление функции парализованных людей. Фактическая траектория — открыто заявленная Илоном Маском — это симбиоз человека-ИИ: слияние человеческого сознания с искусственным интеллектом для создания \"третьего слоя\" познания вне биологического мозга.\u003c/p\u003e\n\u003ch3 id=\"столп-3-когнитивное-улучшение\"\u003eСтолп 3: Когнитивное улучшение\u003c/h3\u003e\n\u003cp\u003eНоотропики (когнитивно-улучшающие препараты), технологии стимуляции мозга, мышление, помощь ИИ и в конечном итоге прямое нейральное расширение направлены на один и тот же целевой — расширить человеческую когнитивную способность за пределы её естественных границ. Цель — не просто лечить когнитивное нарушение, но создать суперинтеллектуальных людей — существ, чьи когнитивные способности превосходят естественный человеческий диапазон.\u003c/p\u003e\n\u003cp\u003eПодразумеваемое утверждение состоит в том, что человеческий ум, как спроектирован Богом, недостаточен. Змей прошептал: \"ваши глаза будут открыты\". Трансгуманист обещает: \"ваш ум будет расширен\". Первоначальное искушение предлагало знание за пределами человеческого замысла. Современная итерация предлагает интеллект за пределами человеческих параметров. Обещание одно и то же: превосхождение через приобретение того, что не было дано.\u003c/p\u003e\n\u003ch3 id=\"столп-4-продление-жизни\"\u003eСтолп 4: Продление жизни\u003c/h3\u003e\n\u003cp\u003eСеноліти (препараты, очищающие старые клетки), терапия теломер, регенерация органов, крионика и загрузка цифрового сознания все нацелены на один и тот же целевой — поражение смерти. Медицинские применения — продление здорового срока жизни, снижение болезней, связанных со старением — опять же входной пункт. Траектория — бессмертие.\u003c/p\u003e\n\u003cp\u003e\"Вы не умрёте\". Змей обещал бессмертие через непослушание. Трансгуманизм обещает бессмертие через технологию. Ни один не доставляет то, что обещает. Плод змея принёс смерть. Технология принесёт другой вид смерти — смерть души, пойманной в синтетическом теле, которое Бог не спроектировал и Дух не будет обитать.\u003c/p\u003e\n\u003ch3 id=\"столп-5-цифровое-превосхождение\"\u003eСтолп 5: Цифровое превосхождение\u003c/h3\u003e\n\u003cp\u003eКонечная трансгуманистическая видение — \"загрузка ума\" — передача человеческого сознания из биологического мозга на цифровой субстрат. Если достигнута, это будет представлять полное отделение я от тела — бестелесное существование, которое Бог никогда не предполагал. Бог создал человечество как воплощённые существа — душа и тело объединены. Воскрешение — восстановление этого единства, а не его растворение.\u003c/p\u003e\n\u003cp\u003eЦифровое превосхождение — конечный контрафакт змея: вечное существование без тела, без Творца, без искупления. Это обратное воскрешение. Воскрешение восстанавливает тело к вечной славе. Цифровое превосхождение отказывает тело за вечную симуляцию. Один — это план Бога. Другой — имитация змея.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"башня-перестроена\"\u003eБашня перестроена\u003c/h2\u003e\n\u003cp\u003eКак исследовано в \u003ca href=\"/tower-of-babel-two-rebuilding/?lang=ru\"\u003eTower of Babel 2.0: Rebuilding the Gateway to Heaven\u003c/a\u003e, трансгуманизм — это проект восхождения нового Вавилона. Первоначальная башня была воротами на небеса — попыткой достичь божественного царства через человеческую инженерию. Трансгуманизм — это тот же проект с лучшими инструментами:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCRISPR\u003c/strong\u003e — кирпич — строительный материал генетической реконструкции\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНейронные интерфейсы\u003c/strong\u003e — лестница — подключение между человеческим и цифровым/божественным\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИИ\u003c/strong\u003e — архитектор — интеллект, который проектирует то, что человеческие умы не могут постичь\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПродление жизни\u003c/strong\u003e — раствор — связующее вещество, которое держит проект вместе, исключая крайний срок смерти\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦифровое превосхождение\u003c/strong\u003e — шпиль — финальное достижение \"небес\" через технологические средства\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eБог судил Вавилон, смешав язык и рассеяв строителей. Трансгуманистический проект столкнётся с тем же Судьёй — и суд будет пропорционален амбициям.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"образ-бога-против-образа-зверя\"\u003eОбраз Бога против Образа Зверя\u003c/h2\u003e\n\u003cp\u003eФундаментальный вопрос трансгуманизма — теологический: Что такое человеческое существо?\u003c/p\u003e\n\u003cp\u003eПисание отвечает: человеческое существо — это существо, сотворённое в образе Бога (Бытие 1:27), спроектированное с определёнными параметрами, наделённое душой, предназначенное для отношений с Творцом и предназначено либо для вечной жизни через искупление, либо для вечного отделения через отказ.\u003c/p\u003e\n\u003cp\u003eТрансгуманизм отвечает: человеческое существо — это биологическая машина — эволюционная случайность, которая может быть улучшена, обновлена, модифицирована и в конечном итоге превзойдена. Нет души. Нет Творца. Нет замысла. Есть только материал, который может быть спроектирован во что-то лучшее.\u003c/p\u003e\n\u003cp\u003eТрансгуманистическая видение — это образ зверя — существо, которое не имеет сходства с первоначальным замыслом Бога, чья идентичность определена технологией, а не Творцом, чья \"жизнь\" поддерживается машинами, а не дыханием Бога, и чья верность принадлежит системе, которая её улучшила, а не Богу, который её создал.\u003c/p\u003e\n\u003cp\u003eКогда человеческое существо генетически модифицировано за пределами признания, кибернетически расширено за пределы естественных параметров, когнитивно расширено за пределы человеческой способности и цифрово интегрировано в сетевую машину — это существо ещё человеческое? Это ещё создано в образе Бога? Может ли Святой Дух обитать в храме, который был кардинально переспроектирован человеческими инженерами?\u003c/p\u003e\n\u003cp\u003eЭто не академические вопросы. Это наиболее неотложные вопросы нашего поколения. И ответ определяет, являются ли существа, возникающие из трансгуманистического проекта, всё ещё искупаемыми — или они пересекли границу, от которой нет возврата.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"линия-которую-нельзя-пересекать\"\u003eЛиния, которую нельзя пересекать\u003c/h2\u003e\n\u003cp\u003eПисание устанавливает границы, которые Творец воспринимает серьёзно:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eГенетические границы\u003c/strong\u003e — \"по роду своему\" появляется десять раз в Бытии 1. Каждое существо воспроизводится в соответствии с его видом. Пересечение этих границ было грехом Стражей (Бытие 6, Иуда 6).\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eГраницы смертности\u003c/strong\u003e — \"Назначено человекам один раз умереть, а потом суд\" (Евреям 9:27). Смерть — это не баг. Это назначение. Попытка поразить смерть через технологию — попытка избежать божественного назначения.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eГраницы идентичности\u003c/strong\u003e — \"Мужчину и женщину создал их\" (Бытие 1:27). Человеческая идентичность определена Творцом, не существом. Переопределение идентичности через технологию — узурпация власти Творца.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eГраницы поклонения\u003c/strong\u003e — \"Да не будет у тебя других богов пред лицом Моим\" (Исход 20:3). Когда технология становится средством превосхождения — заменяя Бога как источник бессмертия, знания и силы — она стала богом. И поклонение ей — идолопоклонство.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТрансгуманизм пересекает каждую из этих границ. Он пересекает генетические границы через CRISPR. Он пересекает границы смертности через продление жизни. Он пересекает границы идентичности через когнитивное и физическое изменение. Он пересекает границы поклонения, помещая технологию в роль спасителя.\u003c/p\u003e\n\u003cp\u003eОбещание змея — \"вы будете как боги\" — это обещание пересечь каждую границу Бог установил. Следствие в Эдеме было смертью. Следствие в конце времён будет то же — но в масштабе цивилизации.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"истинное-превосхождение\"\u003eИстинное превосхождение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Вот, я открываю вам тайну: не все мы умрём, но все изменимся вдруг, во мгновение ока, при последней трубе; ибо вострубит, и мёртвые воскреснут нетленными, и мы изменимся.\" — 1 Коринфянам 15:51-52\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБог предлагает истинное превосхождение — не через технологию, но через воскрешение. Не через CRISPR, но через Христа. Не через загрузку сознания в облако, но через воскрешение в прославленном теле, которое никогда не будет стареть, никогда не будет разлагаться, никогда не умрёт.\u003c/p\u003e\n\u003cp\u003eТело воскрешения, описанное в 1 Коринфянам 15, это всё, что обещает трансгуманизм, но не может доставить:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eНетленное\u003c/strong\u003e — без старения, без болезни, без разложения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСлавное\u003c/strong\u003e — сияющее, прекрасное, совершенное\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМощное\u003c/strong\u003e — без слабости, без ограничения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДуховное\u003c/strong\u003e — оживлено Духом Бога, не биологическими процессами\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто истинное превосхождение. Это дано, не спроектировано. Это получено, не достигнуто. Это дар благодати, не продукт технологии. И это сохраняет образ Бога, а не заменяет его образом зверя.\u003c/p\u003e\n\u003cp\u003eЗмей предлагает контрафактное превосхождение — технология, которая обещает божественность, но доставляет рабство. Творец предлагает истинное превосхождение — воскрешение, которое преобразует смертность в бессмертие, коррупцию в нетленность и слабость в мощь. Выбор между трансгуманизмом и воскрешением — это выбор между обещанием змея и обещанием Бога. И только один из них имеет послужной список доставки.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/339-The_New_Man.mp4\"\u003eThe New Man\u003c/a\u003e — Трансгуманистическое обещание божественности\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/447-Modded_Humans.mp4\"\u003eModded Humans\u003c/a\u003e — Модифицированные люди и древняя ложь\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/449-Synthetics_Walk_Among_Us.mp4\"\u003eSynthetics Walk Among Us\u003c/a\u003e — Синтетическая эволюция человечества\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучите-дальше\"\u003eИзучите дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/neuralink-merge-man-machine/?lang=ru\"\u003eNeuralink and the Race to Merge Man with Machine\u003c/a\u003e — Интерфейс мозг-компьютер, который делает трансгуманистическое слияние операционным\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/fallen-angels-book-of-enoch/?lang=ru\"\u003eFallen Angels and the Book of Enoch: The Forbidden History\u003c/a\u003e — Первоначальное запретное знание, которое трансгуманизм воскрешает\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/tower-of-babel-two-rebuilding/?lang=ru\"\u003eTower of Babel 2.0: Rebuilding the Gateway to Heaven\u003c/a\u003e — Трансгуманизм как проект восхождения нового Вавилона\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\"Вы будете как боги\". Пять слов. Самая древняя ложь. Самое стойкое искушение. Самый разрушительный обман в истории человечества. Змей прошептал это в саду. Кремниевая долина кричит это со сцены конференции. Обещание всегда одно и то же: превосхождение ваших ограничений, обход вашего Творца, становление чем-то большим, чем вас сделали. И результат всегда один и тот же: не восхождение, а падение, не божественность, а коррупция, не жизнь, а смерть. Трансгуманизм — это Бытие 3:5 с триллионным бюджетом. Это обещание змея, промышленное, институализированное и продаваемое как следующая фаза человеческой эволюции. Но Бог, который проклял змея в Эдеме, не изменил своё мнение. Границы, которые он установил, — это не предложения. Замысл, который он воплотил, — не черновик. И суд, который он произнёс над теми, кто пересекает линию, не подлежит обсуждению. \"Вы будете
