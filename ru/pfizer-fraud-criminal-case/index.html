здоровье, безопасность и спокойствие ума. Он приходит завернут в язык науки, одобрен полномочиями и продвигается с полной силой мультимиллиардного рекламного аппарата. Но потом — после того, как пилюли проглочены, инъекции администрированы и прибыль забронирована — рот наполняется гравием. С неблагоприятными событиями. С травмами, которые были известны, но утаены. С данными, которые были манипулированы. С доверием, которое было предано.\u003c/p\u003e\n\u003cp\u003ePfizer Inc. — самая большая фармацевтическая компания в мире по выручке. Это также компания с самым крупным уголовным штрафом в истории американского корпоративного права. В 2009 году Pfizer согласилась выплатить $2.3 миллиарда для урегулирования уголовных и гражданских обвинений, связанных с мошеннической маркетингом нескольких лекарств. Это был не первый отказ. Это было не изолированным инцидентом. Это было последнее проявление десятилетнего паттерна корпоративного мошенничества, охватывающего континенты, лекарства и нормативные рамки.\u003c/p\u003e\n\u003cp\u003eТрек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/51-The_Covenant_Blood.mp4\"\u003eThe Covenant Blood\u003c/a\u003e говорит о святости завета — неразрывной связи истины между сторонами. Фармацевтическая компания, доверенная здоровьем миллиардов, работает под подразумеваемым заветом: что она будет честна о своих продуктах, прозрачна о рисках и честна в своем исследовании. Pfizer неоднократно, систематически и прибыльно нарушала этот завет. Кровь завета требует истины. Кровь истории корпорации Pfizer раскрывает обман.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"соглашение-о-уголовном-урегулировании-2009-года-23-миллиарда-в-мошенничестве\"\u003eСоглашение о уголовном урегулировании 2009 года: $2.3 миллиарда в мошенничестве\u003c/h2\u003e\n\u003cp\u003eВ сентябре 2009 года Pfizer согласилась выплатить $2.3 миллиарда — наибольшее соглашение о мошенничестве в сфере здравоохранения в то время — для решения уголовных и гражданских обвинений, поданных Департаментом юстиции США. Урегулирование охватывало уголовные штрафы, гражданские штрафы и положения об отступлении, связанные с незаконным маркетингом нескольких лекарств.\u003c/p\u003e\n\u003cp\u003eУголовное дело сосредоточилось на Pfizer пропаганде Bextra (валдекоксиб), анальгетика, который компания продвигала для использования, не одобренного FDA — практика, известная как \"внезаповедный маркетинг.\" Pfizer продвигала Bextra для боли после операции в дозировки, которые FDA специально отказалось одобрить из-за проблем безопасности. Компания использовала изощренную маркетинговую операцию, чтобы убедить врачей назначать лекарство для неодобренного использования, развертывая представителей продаж, медицинских наиболее и оплачиваемых консультантов для продвижения использования вне назначения.\u003c/p\u003e\n\u003cp\u003eДочернее подразделение Pfizer, Pharmacia \u0026#x26; Upjohn Company Inc., признала себя виновной в нарушении уголовного закона Федерального закона о пищевых продуктах, лекарствах и косметике за неправильное клеймение Bextra \"с намерением обмануть или ввести в заблуждение.\" Признание вины сопровождалось уголовным штрафом в размере $1.195 миллиарда — наибольший уголовный штраф, когда-либо наложенный на любую корпорацию за любое преступление в истории США.\u003c/p\u003e\n\u003cp\u003eГражданская часть урегулирования решала обвинения в том, что Pfizer также незаконно продвигала три другие лекарства — Geodon (антипсихотик), Zyvox (антибиотик) и Lyrica (лекарство от невропатической боли) — для неодобренного использования. Гражданские штрафы в целом составили дополнительный $1 миллиард. И Pfizer заключила Соглашение о корпоративной целостности с Департаментом здравоохранения и социальных услуг, обещая реформировать свои маркетинговые практики.\u003c/p\u003e\n\u003cp\u003eНо вот критический деталь, которую большинство отчетов пропустили: соглашение о $2.3 миллиарда было четвертым таким урегулированием Pfizer за десятилетие. Компания ранее урегулировала обвинения в мошенничестве в 2002, 2004 и 2007 годах. Каждый раз Pfizer платила штраф, подписала соглашение о целостности и продолжала то же поведение. Штрафы рассматривались не как наказания, а как рассчитанный расход, взвешенный против миллиардов в доходе, генерируемом мошенническими практиками.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"паттерн-мошенничества-полная-запись\"\u003eПаттерн мошенничества: Полная запись\u003c/h2\u003e\n\u003cp\u003eУрегулирование 2009 года было не исключением. Это было наиболее видимым проявлением корпоративной культуры, в которой мошенничество является систематическим, институциональным и прибыльным. Полная запись включает:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTrovan (trovafloxacin) — 1996:\u003c/strong\u003e Во время эпидемии менингита в Кано, Нигерия, Pfizer провела экспериментальное испытание своего антибиотика Trovan примерно на 200 детях. Согласно искам, поданным правительством Нигерии и семьями затронутых детей, Pfizer не получила надлежащее информированное согласие, не объяснила адекватно экспериментальный характер лечения и не предоставила надлежащее медицинское наблюдение. Одиннадцать детей умерли во время испытания, и десятки пострадали от серьёзных травм, включая отказ органов, повреждение мозга и паралич. Pfizer урегулировала с правительством Нигерии в 2009 году за $75 миллионов — доля претензионных убытков.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWarner-Lambert/Neurontin (габапентин) — 2004:\u003c/strong\u003e Pfizer приобрела Warner-Lambert в 2000 году, наследуя мощную схему внезаповедного маркетинга компании для Neurontin, лекарства от судорог. Warner-Lambert продвигала Neurontin для широкого спектра неодобренных состояний — включая биполярное расстройство, боль, мигрень и дефицит внимания — генерируя миллиарды внезаповедных продаж. Компания оплачивала врачам для продвижения лекарства на медицинских конференциях, публиковала призраки-написанные статьи в медицинских журналах и подавляла неблагоприятное исследование. В 2004 году Warner-Lambert (теперь дочернее подразделение Pfizer) признала себя виновной в двух уголовных подсчетах и выплатила $430 миллионов в уголовных штрафах и гражданских штрафах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProtonix (пантопразол) — 2013:\u003c/strong\u003e Дочернее подразделение Pfizer Wyeth (приобретено Pfizer в 2009) согласилось выплатить $491 миллион для решения обвинений в незаконной вне-этикетке продвижении Protonix, ингибитора протонного насоса. Правительство утверждало, что Wyeth продвигал Protonix для неодобренного использования и платил взятки работникам здравоохранения для назначения лекарства.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCelebrex и Bextra — Сокрытие риска сердечно-сосудистой системы:\u003c/strong\u003e Pfizer столкнулась с обвинениями в том, что она скрыла риски для сердечно-сосудистой системы, связанные с её лекарствами ингибитора COX-2, Celebrex и Bextra. Внутренние документы выявили, что Pfizer имела данные, предполагающие повышенный риск для сердечно-сосудистой системы, но продолжала агрессивно продвигать лекарства. Bextra в конце концов был выведен из рынка в 2005 году.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChantix (варениклин) — Психиатрические побочные эффекты:\u003c/strong\u003e Средство для отказа от курения Chantix от Pfizer был связан с серьёзными психиатрическими побочными эффектами, включая суицидальные идеи, психоз и агрессивное поведение. FDA выдала многочисленные предупреждения о безопасности, и Pfizer столкнулась с тысячами исков от пациентов, которые испытали серьёзные психиатрические события. В 2021 году Pfizer добровольно отозвала все партии Chantix из-за присутствия нитрозаминов — канцерогенных соединений — на уровнях выше приемлемых пределов.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"осведомители-люди-которые-сказали-правду\"\u003eОсведомители: Люди, которые сказали правду\u003c/h2\u003e\n\u003cp\u003eМошенничество у Pfizer не было обнаружено регуляторами. Это было обнаружено осведомителями — сотрудниками, которые стали свидетелями незаконной деятельности и выбрали сообщить об этом, часто с огромной личной ценой.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eJohn Kopchinski\u003c/strong\u003e, бывший представитель продаж Pfizer, был основным осведомителем в деле 2009 года Bextra. Копчинский сообщил, что Pfizer инструктировала свою силу продаж продвигать Bextra для неодобренного использования FDA, используя утвержденные разговорные пункты, разработанные для направления врачей к назначению вне этикетки. Когда Копчинский поднял озабоченность внутри компании, ему сказали следовать приказам. Он подал qu tam иск согласно Закону о ложных исках и в конце концов получил $51.5 миллионов в качестве его доли в восстановлении правительства.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШесть других осведомителей\u003c/strong\u003e участвовали в деле 2009 года, совместно получая более $100 миллионов в доле истцов. Их показания выявили корпоративную культуру, в которой незаконный маркетинг был не мошеннической деятельностью отдельных сотрудников, но систематической стратегией, направляемой руководством.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBrook Jackson\u003c/strong\u003e, менеджер сайта клинического испытания у Ventavia Research Group — подрядчик, проводящий испытание фазы III вакцины COVID-19 Pfizer — подала жалобу в FDA в сентябре 2020 года, утверждая о серьёзных нарушениях в проведении испытания. Джексон сообщила о фальсификации данных, нарушениях протокола ослепления, неадекватно обученных вакцинаторах, замедленном наблюдении за неблагоприятными событиями и неспособности поддерживать надлежащие лабораторные стандарты. Джексон была уволена Ventavia в тот же день, когда она связалась с FDA. Впоследствии она подала иск согласно Закону о ложных исках против Pfizer.\u003c/p\u003e\n\u003cp\u003eОбвинения Джексон особенно значимы, потому что они касаются клинического испытания, которое образовало основу для получения аварийного использования вакцины COVID-19 от Pfizer — продукта, введенного миллиардам людей во всем мире. Если целостность данных испытания была компрометирована даже на одном из 153 сайтов испытания, целостность всего набора данных называется в вопрос.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"манипуляция-данными-наука-обмана\"\u003eМанипуляция данными: Наука обмана\u003c/h2\u003e\n\u003cp\u003eМошенничество у Pfizer не было ограничено незаконным маркетингом. Компания имеет задокументированную историю манипуляции данными клинических испытаний, чтобы сделать свои продукты казались более безопасными и более эффективными, чем они являются.\u003c/p\u003e\n\u003cp\u003eПрактика выборочной публикации — проведение нескольких исследований и публикация только тех, где результаты благоприятны, в то время как подавление неблагоприятных исследований — была задокументирована во всей фармацевтической промышленности, и Pfizer не исключение. Анализ 2008 года, опубликованный в \u003cem\u003eNew England Journal of Medicine\u003c/em\u003e Тёрнер и др. изучили обзоры FDA испытаний антидепрессанта и обнаружили, что 94% опубликованных испытаний показали положительные результаты, в то время как собственный анализ FDA — который включал неопубликованные данные — показал, что только 51% всех испытаний были положительны. Промышленность систематически публиковала хорошие новости и похоронила плохие.\u003c/p\u003e\n\u003cp\u003eПрисвоение авторства — практика нанимания медицинских писателей для производства статей в журналах, которые затем приписываются известным академическим врачам — была задокументирована в маркетинге Pfizer нескольких продуктов. Внутренние документы, выявленные во время судебного разбирательства, показали, что Pfizer заключила контракты с медицинскими коммуникационными компаниями для черновиков статей, продвигающих свои лекарства, затем привлекла академических врачей, чтобы служить названными авторами. Врачи часто имели минимальное участие в исследовании или написании, но одолжили свой институциональный престиж тому, что были по существу корпоративными маркетинговыми документами, замаскированными под независимые научные публикации.\u003c/p\u003e\n\u003cp\u003eМанипуляция конечной точки — изменение критериев, по которым клиническое испытание измеряет успех, во время или после испытания — это еще одна задокументированная практика. Переопределяя, что считается положительным исходом, компания может преобразовать неудачное испытание в успешное. Эта практика сложно обнаружить без доступа к исходному протоколу испытания, почему растущий спрос на полную прозрачность клинического испытания так важен — и так отчаянно сопротивляется фармацевтической промышленностью.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вакцина-covid-19-доверие-и-проверка\"\u003eВакцина COVID-19: Доверие и проверка\u003c/h2\u003e\n\u003cp\u003eПротив этой задокументированной истории мошенничества общественности было предложено в 2020 году доверить Pfizer с самым важным фармацевтическим продуктом в современной истории — новой вакциной mRNA для введения миллиардам людей во всем мире, разработанной менее чем за год, авторизованной в соответствии с аварийным разрешением на использование и обязаной правительствами и работодателями как условие участия в обществе.\u003c/p\u003e\n\u003cp\u003eВопрос не в том, способна ли Pfizer производить безопасный и эффективный продукт. Вопрос в том, имеет ли общественность любую рациональную основу доверять утверждениям Pfizer о безопасности и эффективности любого продукта — особенно того, разработанного в условиях беспрецедентного давления времени, с огромными финансовыми стимулами и с юридическим иммунитетом от ответственности.\u003c/p\u003e\n\u003cp\u003eВакцина COVID-19 от Pfizer генерировала $36.8 миллиардов в доходе в 2021 году и $37.8 миллиардов в 2022 году — делая её самым прибыльным фармацевтическим продуктом в истории. Цена акции компании взлетела. Её руководители получили огромные бонусы. И весь ветер прибыли основывался на одном утверждении: что вакцина была безопасна и эффективна.\u003c/p\u003e\n\u003cp\u003eЕсли это утверждение окажется переувеличенным — если данные о безопасности были менее надежны, чем представлено, если эффективность затухала быстрее, чем раскрыто, если профиль неблагоприятных событий был более серьезным, чем признано — то кампания COVID-19 вакцины становится не просто медицинским вмешательством общественного здравоохранения, но наибольшим фармацевтическим мошенничеством в человеческой истории, совершенным компанией с задокументированной историей совершения ровно этого рода мошенничества.\u003c/p\u003e\n\u003cp\u003eДокументы Pfizer — 329,000+ страниц данных клинического испытания, которые Pfizer и FDA попытались хранить закрытыми на 75 лет, перед федеральный судья приказал их выпуска — сейчас анализируются независимыми исследователями. Как задокументировано в нашей статье об \u003ca href=\"/informed-consent-destroyed/?lang=ru\"\u003eInformed Consent Destroyed\u003c/a\u003e, информация, содержащаяся в этих документах, поднимает серьёзные вопросы об адекватности информированного согласия, предоставленного получателям вакцины.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"щит-ответственности-никаких-последствий-за-вред\"\u003eЩит ответственности: Никаких последствий за вред\u003c/h2\u003e\n\u003cp\u003eВозможно, наиболее тревожный аспект истории Pfizer — это полное отсутствие ответственности за травмы вакцины. Согласно PREP Act (Закон о готовности и чрезвычайных мерах общественного здравоохранения) и Национальному закону о травмах от детской вакцины (NCVIA), производители вакцин защищены от исков, связанных с травмами, вызванными их продуктами.\u003c/p\u003e\n\u003cp\u003eЭтот щит ответственности означает, что даже если вакцина COVID-19 от Pfizer вызывает серьёзные травмы — и база данных VAERS, система V-safe и многочисленные международные базы фармакологического надзора содержат сотни тысяч отчетов о неблагоприятных событиях — компания не сталкивается с финансовой ответственностью. Травмированные люди не могут судить Pfizer. Они могут только подать претензии в программу компенсации ущерба от контрмер (CICP), которая исторически отклонила огромное большинство претензий и не предоставляет механизм судебного пересмотра её решений.\u003c/p\u003e\n\u003cp\u003eКомпания с наибольшим уголовным штрафом в истории корпорации была дана наиболее прибыльный продукт в истории фармацевтики с нулевой ответственностью за вред. Это не рыночный стимул для безопасности. Это рыночный стимул для мошенничества — тот же вид мошенничества, который Pfizer была осуждена за совершение неоднократно, во многих лекарствах, на протяжении многих десятилетий.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"75-летняя-печать-что-они-не-хотели-чтобы-вы-видели\"\u003e75-летняя печать: Что они не хотели, чтобы вы видели\u003c/h2\u003e\n\u003cp\u003eКогда группа ученых и врачей подала запрос Закона о свободе информации, ищущих данные клинических испытаний Pfizer от FDA, агентство первоначально предложило выпустить документы со скоростью 500 страниц в месяц — график, который занял бы примерно 75 лет на завершение. Последствия были экстраординарны: FDA была подготовлена хранить данные, лежащие в основе наиболее широко администрируемого фармацевтического продукта в истории, скрытыми из общественного вида до тех пор, пока все вовлеченные были мертвы.\u003c/p\u003e\n\u003cp\u003eФедеральный судья Марк Питман из Северного района Техаса отклонил этот график, приказав FDA выпустить документы со скоростью 55,000 страниц в месяц. Полученные выпуски документов предоставили независимым исследователям беспрецедентный взгляд на процесс клинического испытания — и находки были глубоко тревожными.\u003c/p\u003e\n\u003cp\u003eДокументы выявили, что Pfizer определила более 1,200 категорий неблагоприятных событий в течение первых трех месяцев развертывания вакцины. Они выявили, что компания была осведома о снижающейся эффективности раньше, чем публично раскрыто. Они выявили проблемы качества производства, включая присутствие усеченных видов mRNA и примеси, связанные с процессом. И они выявили, что процесс пересмотра FDA был значительно менее строгим, чем общественность была поставлена на место, чтобы поверить.\u003c/p\u003e\n\u003cp\u003eКак наше расследование в \u003ca href=\"/mrna-shedding-transmission/?lang=ru\"\u003emRNA Shedding and Transmission\u003c/a\u003e документирует, собственный протокол испытания Pfizer предусматривал возможность того, что вакцина может быть передана от привитых к непривитым людям — возможность, которая никогда не была доведена до общественности во время кампании вакцинации.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-торговец-магией\"\u003eБиблейское размышление: Торговец магией\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И не будет светильник в тебе, и голос жениха и невесты не будет слышен в тебе; ибо твои купцы были вельможи земли; ибо твоею магией обманута была вся земля.\" — Откровение 18:23\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКнига Откровения описывает великую коммерческую систему — Вавилон — чьи купцы великие люди земли и чьи чары (pharmakeia на оригинальном греческом) обманули все нации. Слово переведено \"сорцери\" — слово, из которого мы получаем \"фармацевтический\". Это не совпадение. Это пророческое определение системы, которая использует фармацевтические продукты как инструменты обмана и контроля.\u003c/p\u003e\n\u003cp\u003ePfizer — самая большая фармацевтическая компания на земле. Её купцы — действительно среди великих людей земли — её руководители обедают с президентами, её лоббисты пишут законодательство, её продукты обязаны правительствами. И её история — одна из обмана: уголовное мошенничество, манипуляция данными, утаивание безопасности и систематическое молчание тех, кто говорит правду.\u003c/p\u003e\n\u003cp\u003eСвет свечи — свет истины — это ровно то, что Pfizer и её союзники стремились потушить: через 75-летние печати документов, через цензуру опасений о безопасности, через разрушение карьер осведомителей. Но свет истины не может быть постоянно потушен. Документы выпускаются. Данные анализируются. Истина появляется. И как Писание обещает, истина сделает нас свободными.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство НБО Ховарда Питмана — Предупреждение об окончании времени, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eVaccine Of The Beast\u003c/a\u003e — Фармацевтическое мошенничество разоблачено\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/317-The_Vaccination_Booths.mp4\"\u003eThe Vaccination Booths\u003c/a\u003e — Машинерия фармацевтического преступления\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/informed-consent-destroyed/?lang=ru\"\u003eInformed Consent Destroyed\u003c/a\u003e — Как систематическое подавление данных о безопасности сделало подлинное информированное согласие невозможным во время кампании вакцинации COVID-19\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/mrna-shedding-transmission/?lang=ru\"\u003emRNA Shedding and Transmission\u003c/a\u003e — Собственный протокол испытания Pfizer предусматривал сбрасывание вакцины через вдыхание и контакт кожи\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eХлеб обмана сладок человеку, но потом его рот наполняется гравием. Pfizer подал хлеб обмана миллиардам — сладкие обещания безопасности и эффективности, поддержанные историей уголовного мошенничества в $2.3 миллиарда, запечатанными документами, подавленными данными и уничтоженными осведомителями. Гравий приходит: неблагоприятные события, снижающаяся эффективность, документы, распечатанные по судебному приказу, истина, которая была похоронена, теперь восстающая на поверхность. Ибо ничто не покрыто, что не будет выявлено, и ничто скрыто, что не будет известно. Купцы Вавилона ответят за свои магии. Свет свечи, хотя они и стремились потушить его, снова будет светить.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Уголовное дело Pfizer: История мошенничес
