о мороз?\" — Псалтирь 147:15-17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПогода принадлежит Богу. Он посылает дождь. Он направляет ветер. Он мёрзлые капли выбрасывает. Сезоны, штормы, засухи и урожаи находятся под Его суверенным командованием. Вооружить погоду — это попытка захватить атрибут божественного суверенитета — взять контроль над тем, что Бог командует, и направить его против населений, которые Бог поддерживает.\u003c/p\u003e\n\u003cp\u003eМилитаризованная погодная война — это не теория заговора. Это задокументированная военная способность, финансируемая оборонными бюджетами, разрабатываемая в военных лабораториях и развёртываемая в военных операциях. Доказательства, представленные в этой статье, извлечены из рассекреченных военных документов, записей Конгресса и экологических исследований, которые демонстрируют вне разумного сомнения, что погода была вооружена.\u003c/p\u003e\n\u003cp\u003eКак \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eПроклятие Змея\u003c/a\u003e из альбома Confliction объявляет, проклятие на земле распространяется на небо. И как \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eПадшие Ангелы\u003c/a\u003e предупреждает, запрещённое знание, преподанное Наблюдателями, включало манипуляцию естественными системами.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"задокументированная-история\"\u003eЗадокументированная история\u003c/h2\u003e\n\u003ch3 id=\"операция-попай-1967-1972\"\u003eОперация Попай (1967-1972)\u003c/h3\u003e\n\u003cp\u003eСамая полностью задокументированная программа погодной войны в истории США — это \"Операция Попай\" — операция посева облаков, проведённая над Вьетнамом, Лаосом и Камбоджей во время войны во Вьетнаме. Целью операции было расширить сезон муссонов, смягчив поверхности дорог и вызвав оползни для нарушения линий снабжения противника вдоль Тропы Хо Ши Миня.\u003c/p\u003e\n\u003cp\u003e\"Операция Попай\" включала:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСамолёты C-130, оборудованные посевными аэрозолями облаков\u003c/li\u003e\n\u003cli\u003eЙодид серебра и йодид свинца, посевные агенты\u003c/li\u003e\n\u003cli\u003eБолее 2600 полётов посева облаков на протяжении пяти лет\u003c/li\u003e\n\u003cli\u003eЗадокументированные увеличения осадков на 30% или более в целевых областях\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОперация была классифицирована до тех пор, пока исследовательский журналист Джек Андерсон не разоблачил её в 1971 году. Последовало расследование Конгресса, и операция была цитирована как основная мотивация для Конвенции по изменению окружающей среды (ENMOD) 1978 года, которая запрещает военное использование методов изменения окружающей среды.\u003c/p\u003e\n\u003cp\u003eОднако ENMOD содержит пробелы, которые исключают \"мирное\" изменение окружающей среды, и механизмы обеспечения в основном отсутствуют. Договор запрещает погодную войну по названию, пока способность продолжает разрабатываться и развёртываться.\u003c/p\u003e\n\u003ch3 id=\"погода-как-множитель-силы-владеть-погодой-в-2025\"\u003e\"Погода как множитель силы: владеть погодой в 2025\"\u003c/h3\u003e\n\u003cp\u003eВ 1996 году ВВС США опубликовали исследовательский документ под названием \"Погода как множитель силы: владеть погодой в 2025\", который описал видение военных на возможности контроля погоды. Бумага предложила:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшение осадков и отказ\u003c/strong\u003e — управление местом, где идёт дождь, и местом, где он не идёт\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшение бури и модификация\u003c/strong\u003e — интенсификация или переадресация штормов для тактического преимущества\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМанипуляция туманом и облаком\u003c/strong\u003e — создание или очистка тумана и облаков для пользы военных операций\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМодификация космической погоды\u003c/strong\u003e — манипуляция ионосферой и магнитосферой\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eБумага пришла к заключению, что \"Соединённые Штаты должны инвестировать в технологию для 'владения' погодой к 2025\" и что модификация погоды предлагает \"огромную силу, которая может быть эксплуатирована на всём спектре боевой среды.\"\u003c/p\u003e\n\u003ch3 id=\"haarp-и-манипуляция-ионосферой\"\u003eHAARP и манипуляция ионосферой\u003c/h3\u003e\n\u003cp\u003eПрограмма активного аврорального исследования высокочастотной (HAARP), расположенная в Гаконе, Аляске, является исследовательским учреждением ионосферы, которое передаёт высокомощные радиоволны в ионосферу. Хотя официально описывается как исследовательская программа для изучения ионосферы, возможности HAARP включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНагревание определённых областей ионосферы для модификации её электрических свойств\u003c/li\u003e\n\u003cli\u003eСоздание искусственных магнитных нарушений\u003c/li\u003e\n\u003cli\u003eГенерирование чрезвычайно низкочастотных (ELF) сигналов, которые распространяются через землю и океан\u003c/li\u003e\n\u003cli\u003eМодификация атмосферных условий, которые влияют на модели погоды\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСвязь между ионосферным нагреванием и поверхностной погодой задокументирована в атмосферной науке. Ионосфера влияет на реактивный ток, и реактивный ток управляет поверхностными модели погоды. Путём модификации ионосферы, HAARP может потенциально переадресовать реактивный ток, создавая засухи в одном регионе и наводнения в другом.\u003c/p\u003e\n\u003ch2 id=\"текущие-операции\"\u003eТекущие операции\u003c/h2\u003e\n\u003ch3 id=\"инженерия-засухи\"\u003eИнженерия засухи\u003c/h3\u003e\n\u003cp\u003eМножество регионов по всему миру испытали беспрецедентные условия засухи, которые коррелируют с паттернами манипуляции атмосферой:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСтойкие хребты высокого давления, которые блокируют системы, переносящие влагу (согласованно с ионосферным нагреванием, создающим стойкие атмосферные блоки)\u003c/li\u003e\n\u003cli\u003eВнезапные переходы от засухи к наводнению (согласованно с выпуском атмосферных блоков)\u003c/li\u003e\n\u003cli\u003eЗасушливые паттерны, которые выравниваются с геополитическими целями (нехватка воды как инструмент экономического давления)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"направленная-энергия-и-пожар\"\u003eНаправленная энергия и пожар\u003c/h3\u003e\n\u003cp\u003eСвязь между оружиями направленной энергии и возгоранием лесного пожара стала всё более задокументирована:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПожары, которые начинаются одновременно в множестве местоположений без природного источника воспламенения\u003c/li\u003e\n\u003cli\u003eПожары, которые сгорают с температурами и паттернами неконсистентно с естественным поведением лесного пожара\u003c/li\u003e\n\u003cli\u003eИзбирательное разрушение — дома разрушены, пока соседние деревья остаются стоящими\u003c/li\u003e\n\u003cli\u003eМеталлический остаток в сайтах огня согласованный с горением, подобным термиту\u003c/li\u003e\n\u003cli\u003eЛазер-подобная точность в паттернах разрушения\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСходимость инженерии засухи (отрицание дождя) и возгорания направленной энергией (начало огня в подготовленных областях) создаёт систему погодной войны, которая может опустошить любой регион: первый, отрицает ему дождь; затем, установи его на огонь. Результат кажется \"естественным\" неинформированному наблюдателю, но в действительности является скоординированной атакой.\u003c/p\u003e\n\u003cp\u003eАнна Михалча, доктор медицины, PhD, соединила на своём Substack (anamihalceamdphd.substack.com) атмосферное металлическое загрязнение от геоинженерии с увеличенной воспламеняемостью растительности. Наночастицы алюминия, отложенные на растительности через атмосферное распыление, увеличивают горючесть растительного материала, преобразуя леса в трутовые коробки, которые оружия направленной энергии могут зажечь.\u003c/p\u003e\n\u003ch3 id=\"манипуляция-ураганом-и-штормом\"\u003eМанипуляция ураганом и штормом\u003c/h3\u003e\n\u003cp\u003eИсследование модификации урагана было проведено с Проекта Stormfury (1962-1983), и подозревается, что современные способности включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРуководство ураганами путём модификации дифференциалов атмосферного давления через ионосферное нагревание\u003c/li\u003e\n\u003cli\u003eИнтенсификация или ослабление штормов путём модификации температур поверхности моря через океаническое распыление\u003c/li\u003e\n\u003cli\u003eСоздание или рассеивание систем облаков через операции посева на крупномасштабе\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСпособность направлять ураган к определённой цели — городу, прибрежной инфраструктуре, сельскохозяйственному региону — представляет оружие массового разрушения, которое производит повреждение \"естественного бедствия,\" неотличимое от акта Божия.\u003c/p\u003e\n\u003ch2 id=\"пророческий-размер\"\u003eПророческий размер\u003c/h2\u003e\n\u003ch3 id=\"кто-командует-погодой\"\u003eКто командует погодой?\u003c/h3\u003e\n\u003cp\u003eПисание многократно атрибутирует погоду прямому Божественному командованию:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"Он повелевает солнцу восходить над злыми и добрыми, и посылает дождь на праведных и неправедных\" (Матфей 5:45)\u003c/li\u003e\n\u003cli\u003e\"Огонь, град, снег, и дымная пара, урагановый ветер, исполняющий Его слово\" (Псалтирь 148:8)\u003c/li\u003e\n\u003cli\u003eИисус \"укоризнял ветер и сказал морю: молчи, утихни\" (Марк 4:39)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eМилитаризация погоды — это попытка захватить божественный авторитет над элементами. Это технологический эквивалент объявления: \"Мы, а не Бог, будем решать, где идёт дождь, где оно горит и где оно замёрзнет.\" Это прямой вызов божественному суверенитету — тот же вызов, который Люцифер сделал, когда объявил: \"Я буду как Всевышний.\"\u003c/p\u003e\n\u003cp\u003eПод куполом твердежи, вся погода происходит в пределах пространства Бога определён. Дожди падают в пределах купола. Ветры дуют в пределах купола. И погодная война, проведённая военными учреждениями, работает в пределах купола — под Божественным авторитетом, признавают они её или нет. Купол удерживает. Божественный суверенитет над погодой длится. И оружия погодной войны, подобно всем оружиям, сформированным против Его людей, в конечном счёте не будут преуспевать.\u003c/p\u003e\n\u003ch2 id=\"ссылки-на-источники\"\u003eСсылки на источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eU.S. Senate, \"Weather Modification: Programs, Problems, Policy, and Potential,\" 1978\u003c/li\u003e\n\u003cli\u003eU.S. Air Force, \"Weather As a Force Multiplier: Owning the Weather in 2025,\" 1996\u003c/li\u003e\n\u003cli\u003eEnvironmental Modification Convention (ENMOD), United Nations, 1978\u003c/li\u003e\n\u003cli\u003eProject Stormfury documentation, NOAA\u003c/li\u003e\n\u003cli\u003eAna Mihalcea, MD, PhD, anamihalceamdphd.substack.com, atmospheric contamination and flammability analysis\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — T
