003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПророк Исайя предупредил о времени, когда сам язык был бы инвертирован - когда угнетение называлось бы справедливостью, когда контроль назывался бы ответственностью, когда идеология называлась бы наукой. Система оценки Environmental, Social, and Governance (ESG) - это предупреждение Исайи, ставшее корпоративной политикой. Под знаменем экологического управления, социальной справедливости и надлежащего управления, ESG стала наиболее мощным механизмом принуждения в глобальной экономике - системой, которая заставляет каждую публичную компанию на земле соответствовать идеологической структуре, определённой горсткой менеджеров активов, или столкнуться с финансовым разрушением.\u003c/p\u003e\n\u003cp\u003eЭто не о спасении планеты. Это о контроле. Те же учреждения, которые финансировали добычу ископаемых топлива в течение столетия, теперь читают лекции корпорациям о выбросах углерода. Те же менеджеры активов, которые получают прибыль от производителей оружия, оценивают компании по \"социальной ответственности.\" Те же фирмы, которые управляют триллионами в непрозрачных финансовых инструментах, оценивают других по \"управлению.\" Трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e описывает этот паттерн - противник, который работает не извне, а изнутри, нося маску добродетели, при этом навязывая соответствие повестке дня, которая служит только власти.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-esg\"\u003eЧто такое ESG?\u003c/h2\u003e\n\u003cp\u003eESG расшифровывается как Environmental, Social, and Governance - три категории метрик, используемые для оценки нефинансового исполнения компании. Оценки ESG рассчитываются рейтинговыми агентствами и используются инвесторами, менеджерами активов и регуляторами для оценки поведения корпорации.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEnvironmental\u003c/strong\u003e критерии включают выбросы углерода, энергоэффективность, управление отходами, использование воды и воздействие на биоразнообразие. Компании оценены на основе их экологического следа и их обязательства его снизить.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSocial\u003c/strong\u003e критерии включают трудовые практики, многообразие и включение, воздействие на сообщество, политику прав человека и управление цепочки поставок. Компании оцениваются на основе их социальной политики и результатов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGovernance\u003c/strong\u003e критерии включают состав совета директоров, компенсацию руководителей, права акционеров, прозрачность и политику против коррупции. Компании оценены на основе их структур управления и процессов.\u003c/p\u003e\n\u003cp\u003eНа бумаге ESG выглядит разумно - даже похвально. Кто противостоял бы экологической ответственности, социальной справедливости и надлежащему управлению? Но дьявол, как всегда, находится в деталях. Определение того, что представляет хорошее экологическое, социальное и управленческое исполнение, не определяется объективной наукой или универсальной этикой. Это определяется учреждениями, которые контролируют системы оценки - и эти учреждения имеют повестки дня, которые выходят далеко за пределы корпоративной ответственности.\u003c/p\u003e\n\u003ch2 id=\"большая-тройка-blackrock-vanguard-state-street\"\u003eБольшая тройка: BlackRock, Vanguard, State Street\u003c/h2\u003e\n\u003cp\u003eВласть ESG происходит не из государственного мандата, а из сосредоточенного владения глобальной экономикой горсткой менеджеров активов. \"Большая тройка\" - BlackRock, Vanguard и State Street - совместно управляют более чем 22 триллионами долларов активов. Они крупнейшие акционеры в почти каждой крупной публичной компании на земле.\u003c/p\u003e\n\u003cp\u003eОдин только BlackRock управляет более чем 10 триллионами долларов. Это крупнейший акционер в Apple, Microsoft, Amazon, ExxonMobil, JPMorgan Chase, Johnson \u0026#x26; Johnson и сотнях других компаний. Когда генеральный директор BlackRock Ларри Финк пишет свой ежегодный letter к генеральным директорам, требуя соответствия ESG, он не даёт предложение. Он отдаёт приказ от крупнейшего акционера компании.\u003c/p\u003e\n\u003cp\u003eПисьмо Финка 2020 года объявило, что \"климатический риск - это инвестиционный риск\" и что BlackRock сделает \"sustainability integral to portfolio construction and risk management.\" Переведено: компании, которые не соответствуют экологическим критериям BlackRock, столкнутся с инвестиционным отказом - выводом капитала, который может обрушить цены на акции, повысить затраты заимствования и угрожать корпоративному выживанию.\u003c/p\u003e\n\u003cp\u003eЭто не рыночная дисциплина. Это финансовое принуждение от учреждений, которые накопили доли владения настолько велики, что их предпочтения неотличимы от мандатов. Когда ваш крупнейший акционер говорит вам соответствовать или столкнуться с инвестиционным отказом, соответствие не добровольно.\u003c/p\u003e\n\u003ch2 id=\"как-работают-оценки-esg\"\u003eКак работают оценки ESG\u003c/h2\u003e\n\u003cp\u003eОценки ESG рассчитываются рейтинговыми агентствами - MSCI, S\u0026#x26;P Global, Sustainalytics, Moody's ESG Solutions и другими. Каждое агентство использует собственную методологию, которая взвешивает различные факторы по-разному, создавая оценки, которые могут резко варьироваться для одной и той же компании.\u003c/p\u003e\n\u003cp\u003eЭта непоследовательность - не дефект - это особенность. Поскольку оценки ESG субъективны и непрозрачны, они не могут быть объективно оспорены. Компания не может указать на специфичный метрик и сказать \"мы соответствуем стандарту\", потому что стандарт сдвигается в зависимости от того, какое агентство оценивает и какие факторы взвешиваются.\u003c/p\u003e\n\u003cp\u003eКомпании ответили, наняв ESG консультантов, создав позиции Chief Sustainability Officer, опубликовав отчёты об устойчивости и перестроив операции для улучшения своих оценок. Индустрия ESG соответствия - консультанты, аудиторы, поставщики данных и рейтинговые агентства - стала многомиллиардным бизнесом. Компании платят огромные суммы для удовлетворения системы оценки, которая не имеет юридического мандата, не имеет объективного стандарта и не имеет демократической подотчётности.\u003c/p\u003e\n\u003cp\u003eРезультат - система, в которой поведение корпорации формируется не законом, не спросом потребителя, не голосом акционеров, а предпочтениями рейтинговых агентств, финансируемых теми же менеджерами активов, которые требуют соответствия. Циклизм завершен: BlackRock требует ESG соответствия, финансирует рейтинговые агентства, которые измеряют ESG соответствие, и награждает или наказывает компании на основе оценок, которые эти агентства производят.\u003c/p\u003e\n\u003ch2 id=\"esg-как-социальный-кредит\"\u003eESG как социальный кредит\u003c/h2\u003e\n\u003cp\u003eПараллель между ESG и китайской системой социального кредита не риторична. Она структурна.\u003c/p\u003e\n\u003cp\u003eКитайская система социального кредита присваивает баллы индивидам и бизнесу на основе их соответствия определённому правительством стандартам поведения. Высокие баллы открывают привилегии. Низкие баллы запускают ограничения. Система работает через наблюдение, сбор данных и алгоритмическую оценку.\u003c/p\u003e\n\u003cp\u003eESG работает идентично на корпоративном уровне. Компании присваиваются оценки на основе их соответствия определённому инвестором стандартам поведения. Высокие оценки привлекают капитал. Низкие оценки запускают инвестиционный отказ. Система работает через сбор данных, требования отчётности и алгоритмическую оценку рейтинговыми агентствами.\u003c/p\u003e\n\u003cp\u003eОсновное различие состоит в том, что китайская система социального кредита работается правительством. ESG работается частными учреждениями - менеджерами активов и рейтинговыми агентствами, которые не подотчётны электорату и подлежат минимальному регулированию. В некоторых отношениях ESG более мощна, чем китайская система, потому что она работает глобально, по всем юрисдикциям, без необходимости какому-либо правительству проходить закон.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в \u003ca href=\"/social-credit-western-world/?lang=ru\"\u003eSocial Credit in the Western World\u003c/a\u003e, западная система социального кредита возникает не через государственный декрет, а через корпоративную политику. ESG - механизм, через который поведенческие стандарты налагаются на экономику без законодательных действий.\u003c/p\u003e\n\u003ch2 id=\"углеродная-связь\"\u003eУглеродная связь\u003c/h2\u003e\n\u003cp\u003eКомпонент ESG окружающей среды напрямую связан с системой углеродных кредитов, описанной в \u003ca href=\"/carbon-credit-coup-trading-air/?lang=ru\"\u003eCarbon Credit Coup: Trading the Air You Breathe\u003c/a\u003e. Компании с высокими выбросами углерода получают более низкие оценки окружающей среды, которые запускают инвестиционный отказ от ориентированных на ESG фондов, который повышает их стоимость капитала, который заставляет их снижать выбросы или столкнуться с финансовым снижением.\u003c/p\u003e\n\u003cp\u003eЭто создаёт механизм финансового принуждения для снижения углерода, который работает вне государственного регулирования. Компании не снижают выбросы, потому что закон это требует. Они снижают выбросы, потому что система оценки BlackRock это требует, и BlackRock владеет достаточно из их акций, чтобы сделать это требование принудительным.\u003c/p\u003e\n\u003cp\u003eЦели сокращения углерода, встроенные в рамки ESG, выстраиваются с повесткой дня Net Zero World Economic Forum и Great Reset, как исследовано в \u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eThe Great Reset: The Fourth Industrial Revolution\u003c/a\u003e. ESG - рука принуждения Great Reset - механизм, через который видение WEF stakeholder capitalism навязывается глобальной экономике без демократического согласия.\u003c/p\u003e\n\u003ch2 id=\"сопротивление-и-переименование\"\u003eСопротивление и переименование\u003c/h2\u003e\n\u003cp\u003eК 2023 году ESG столкнулся с значительным сопротивлением. США Republican-led штаты начали отзывать государственные пенсионные фонды от BlackRock и других ориентированных на ESG менеджеров. Texas, Florida, West Virginia и другие штаты прошли законодательство, ограничивающее инвестиционные решения, основанные на ESG, с государственными фондами. Ларри Финк сам прекратил использовать термин \"ESG\" в своём письме 2023 года, заявив, что фраза была \"оружейной\".\u003c/p\u003e\n\u003cp\u003eНо отступление было косметическим, а не существенным. BlackRock не отказалась от принципов ESG - она их переименовала. \"Transition investing,\" \"climate risk management\" и \"sustainable finance\" заменили метку ESG при сохранении одной и той же основной методологии. Системы оценки продолжались. Угрозы инвестиционного отказа продолжались. Требования соответствия продолжались.\u003c/p\u003e\n\u003cp\u003eПереименование иллюстрирует паттерн, общий для всех механизмов контроля: когда возникает сопротивление, язык меняется, но архитектура остаётся. ESG может быть названо что-то другое через пять лет. Система корпоративного социального кредита, которую она представляет, будет продолжать работать независимо от того, что она называется.\u003c/p\u003e\n\u003ch2 id=\"кто-контролирует-контролирующих\"\u003eКто контролирует контролирующих\u003c/h2\u003e\n\u003cp\u003eГлавный вопрос об ESG - подотчётность. Кто решает, что составляет хорошее экологическое исполнение? Кто определяет \"социальную\" ответственность? Кто определяет надлежащее управление? Ответ - неизбранные, неподотчётные менеджеры активов и рейтинговые агентства со своими собственными финансовыми интересами и идеологическими обязательствами.\u003c/p\u003e\n\u003cp\u003eНи один гражданин не голосовал за климатическую политику BlackRock. Ни один демократический процесс не одобрил методологию оценки MSCI. Ни один законодательный орган не обсуждал социальные критерии Sustainalytics. Эти учреждения присвоили себе полномочия определять корпоративную ответственность для всей глобальной экономики - и они осуществляют эту полномочия через финансовый рычаг, который их размер предоставляет.\u003c/p\u003e\n\u003cp\u003eЭто управление без правительства. Закон без законодательства. Принуждение без подотчётности. Это, в наиболее точном смысле, coup - передача управляющей полномочия от демократических учреждений к финансовым. И это было достигнуто не через силу, а через тихое накопление долей собственности до тех пор, пока владельцы не стали правителями.\u003c/p\u003e\n\u003ch2 id=\"библейское-отражение\"\u003eБиблейское отражение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ибо какая польза человеку, если он приобретет весь мир, а душе своей повредит?\" — Марк 8:36\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eСистема ESG просит корпоративную версию этого вопроса - и отвечает на него неправильно. Она обещает, что при соответствии её метрикам, компании приобретут одобрение мира: капитал, потребителей, репутацию, выживание. Но соответствие, которое она требует, не морально. Это идеологично. Душа компании - её миссия, её ценности, её суждение о том, как служить своему сообществу - подчинена системе оценки, определённой теми, чья единственная верность - это доходы и чей единственный бог - это рост. Оценка ESG стала корпоративной душой, и реальная душа была продана для достижения этого.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https: 003eОни называли это Environmental, Social, and Governance. Они могли назвать его тем, что это есть: оценка послушания для корпораций. Окружающая среда, которую они защищают, - это их собственная власть. Общество, которому они служат, - это их собственный класс. Управление, которое они навязывают, - это их собственная полномочия. Когда неизбранный менеджер активов может диктовать поведение каждой компании на земле через рычаг сосредоточенного владения, слово для этого - это не ответственность. Слово - это dominion. И dominion принадлежит Господу - не BlackRock.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/finance/\",\"className\":\"category-badge\",\"children\":\"finance\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Оценки ESG: Корпоративный социальный кредит под другим названием\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Оценка ESG - это не экологическая ответственность. Это корпоративная система социального кредита, используемая BlackRock, Vanguard и крупнейшими менеджерами активов мира для навязывания идеологического соответствия каждой публичной компании - и через них вам.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-02-04T10:00:00Z\",\"children\":\"4 февраля 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"classNa
