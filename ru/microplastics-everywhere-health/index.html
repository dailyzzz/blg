 человека из пыли земной — из минералов, элементов и соединений естественного мира. Человеческое тело было создано для взаимодействия с органической материей: дышать воздухом, пить воду, есть пищу и возвращаться в пыль. Что никогда не было частью этого дизайна — это синтетический полимер, пластик на основе нефти, инженерно спроектированный для сопротивления естественным процессам разложения, которые управляют всеми творениями. Микропластики — это непрошенные гости в храме человеческого тела: иностранные частицы, которые накапливаются в крови, органах и тканях, нарушая биологические системы, которые Бог создал для поддержания жизни. Тело было создано из пыли. Теперь оно наполняется пластиком.\u003c/p\u003e\n\u003cp\u003eКак предупреждает альбом Confliction трек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e, самый опасный противник — это тот, который действует внутри стен — незримо, необнаруженно, накапливая силу, пока хозяин остаётся в неведении. Микропластики — это в точности такой враг: невидимые невооруженному глазу, присутствующие в каждой среде и теперь встроенные в саму кровь и ткани практически каждого человека на Земле.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"масштабность-загрязнения\"\u003eМасштабность загрязнения\u003c/h2\u003e\n\u003cp\u003eВ марте 2022 года исследователи из Vrije Universiteit Amsterdam опубликовали фундаментальное исследование в журнале Environment International: микропластики были обнаружены в человеческой крови впервые. Исследование обнаружило пластические частицы в 77% протестированных образцов крови, при этом пластик PET (используемый в бутылках для напитков) и полистирол (используемый в упаковке продуктов) были наиболее часто идентифицируемыми типами.\u003c/p\u003e\n\u003cp\u003eЭто была не изолированная находка. В годы, прошедшие с тех пор, микропластики были обнаружены в:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЧеловеческих лёгких\u003c/strong\u003e — найдены в 11 из 13 образцов лёгочной ткани, проанализированных исследователями из Hull York Medical School в 2022 году\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧеловеческих плацентах\u003c/strong\u003e — обнаружены итальянскими исследователями в 2020 году, с частицами найденными на плодной и материнской сторонах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГрудном молоке\u003c/strong\u003e — найдены в 75% образцов, протестированных исследователями из Политехнического университета Марке в 2022 году\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧеловеческом кале\u003c/strong\u003e — каждый протестированный образец в исследовании 2018 года, проведённом в восьми странах, содержал микропластики, в среднем 20 частиц на 10 граммов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧеловеческих яичках\u003c/strong\u003e — исследование 2024 года из Университета Нью-Мексико обнаружило микропластики в каждом образце ткани яичка человека, с концентрациями почти в три раза выше, чем обнаруженные в яичках собак\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТкани человеческого мозга\u003c/strong\u003e — исследование 2024 года нашло микропластики в образцах ткани мозга, с концентрациями значительно выше у людей с деменцией\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЗагрязнение не ограничено определённой популяцией, географией или образом жизни. Оно универсально. Микропластики были обнаружены на вершине Эвереста, в Марианской впадине, в арктическом морском льду, в дожде над удалёнными национальными парками и в воздухе внутри домов и офисов. Нет места на Земле — и нет человеческого тела на Земле — свободного от загрязнения микропластиками.\u003c/p\u003e\n\u003cp\u003eИсследование 2024 года, опубликованное в New England Journal of Medicine, обнаружило, что люди с обнаруженными микропластиками или нанопластиками в бляшке сонной артерии имели в 4,5 раза выший риск сердечного приступа, инсульта или смерти на протяжении 34-месячного периода наблюдения по сравнению с теми без обнаруженных пластиков. Это было первое исследование, прямо связывающее присутствие микропластик в человеческом теле с сердечно-сосудистыми исходами — и результаты были тревожны.\u003c/p\u003e\n\u003ch2 id=\"что-микропластики-делают-с-телом\"\u003eЧто микропластики делают с телом\u003c/h2\u003e\n\u003cp\u003eЭффекты здоровья от хронического воздействия микропластиков всё ещё отображаются, но появляющиеся доказательства указывают на несколько путей вреда:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВоспаление.\u003c/strong\u003e Когда иммунная система встречает иностранные частицы, которые она не может переварить или устранить, она развивает воспалительный ответ. Хроническое воспаление — постоянная попытка тела бороться с врагом, которого оно не может победить — это основной драйвер сердечно-сосудистых заболеваний, рака, аутоиммунного заболевания и нейродегенерации. Микропластики по их природе неусваиваемы и стойки, провоцируют в точности такой вид хронического воспалительного ответа.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарушение эндокринной системы.\u003c/strong\u003e Пластики содержат и выщелачивают химические вещества, которые имитируют или вмешиваются в гормоны — прежде всего бисфенол А (BPA) и фталаты. Эти разрушители эндокринной системы связаны с репродуктивными расстройствами, ранней половой зрелостью, сниженными количествами сперматозоидов, ожирением, диабетом и гормонозависимыми раками. Метаанализ 2023 года обнаружил, что глобальное количество сперматозоидов снизилось более чем на 50% с 1973 года, при этом разрушители эндокринной системы — включая те, что выщелачиваются из пластиков — определены как основной драйвер.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонцентрация токсических химических веществ.\u003c/strong\u003e Микропластики действуют как губки для токсических химических веществ в окружающей среде. Стойкие органические загрязнители (СОЗ), тяжёлые металлы и пестициды адсорбируются на поверхности пластических частиц. Когда эти загрязнённые частицы попадают в организм, сконцентрированные токсины выпускаются в теле — доставляя груз яда, который далеко превышает окружающую концентрацию этих химических веществ. Микропластики несут не просто пластик в организм. Они несут сконцентрированный коктейль самых токсических химических веществ в окружающей среде.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарушение микробиома кишечника.\u003c/strong\u003e Исследования, опубликованные в журнале Environmental Science \u0026#x26; Technology, обнаружили, что микропластики изменяют состав и функцию микробиома кишечника — триллионов бактерий, которые регулируют пищеварение, иммунитет, настроение и метаболизм. Воздействие микропластиков было связано с сниженным микробным разнообразием и повышенным воспалением в кишечнике — эффекты, которые усугубляют ущерб, уже наносимый глифосатом, антибиотиками и обработанной пищей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКлеточное повреждение.\u003c/strong\u003e На нанопластическом уровне (частицы меньше чем 1 микрометр), пластические частицы достаточно малы для проникновения в отдельные клетки и пересечения гематоэнцефалического барьера. In vitro исследования показали, что нанопластики могут повредить клеточные мембраны, нарушить функцию митохондрий, вызвать окислительный стресс и спровоцировать клеточную смерть. Долгосрочные последствия нанопластиков, накапливающихся в ткани человеческого мозга, полностью не поняты, но нахождение 2024 года повышенных концентраций у пациентов с деменцией является мрачным ранним указателем.\u003c/p\u003e\n\u003ch2 id=\"синергическая-токсичность\"\u003eСинергическая токсичность\u003c/h2\u003e\n\u003cp\u003e\u003cimg src=\"/images/articles/microplastics-everywhere-health/img-1.jpg\" alt=\"Тяжёлые металлы и микропластики имеют синергическую токсичность для жизни — исследования, документирующие, как эти загрязнители объединяются для создания эффектов значительно хуже, чем любое вещество в отдельности\"\u003e\u003c/p\u003e\n\u003cp\u003eИстинный ужас загрязнения микропластиками заключается не в его изолированных эффектах, а в его взаимодействии с каждым другим токсическим воздействием, которое испытывает современный человек. Анна Михалча, доктор медицины, PhD, задокументировала через микроскопию в тёмном поле синергические отношения между микропластиками, тяжёлыми металлами и самособирающейся нанотехнологией, обнаруженной в человеческой крови. Как исследовано в нашей статье о \u003ca href=\"/self-assembly-nanotechnology-blood/?lang=ru\"\u003eсамособирающейся нанотехнологии, найденной в человеческой крови\u003c/a\u003e, кровь как вакцинированных, так и невакцинированных людей показывает доказательства структур, которые не должны существовать в здоровой человеческой крови.\u003c/p\u003e\n\u003cp\u003eМикропластики не существуют в изоляции в человеческом теле. Они существуют наряду с:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eТяжёлыми металлами\u003c/strong\u003e (свинец, ртуть, мышьяк, алюминий) — как задокументировано в \u003ca href=\"/heavy-metals-food-supply/?lang=ru\"\u003eТяжёлых металлах в продовольственном снабжении\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГлифосатом\u003c/strong\u003e — присутствует в моче 93% американцев\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФармацевтическими остатками\u003c/strong\u003e — как задокументировано в \u003ca href=\"/tap-water-contaminants-truth/?lang=ru\"\u003eВодопроводная вода: загрязнители, которые они не тестируют\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФторидом\u003c/strong\u003e — добавляется намеренно в системы общественного водоснабжения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНаночастицами\u003c/strong\u003e — из промышленных выбросов, геоинженерии и других источников\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cimg src=\"/images/articles/microplastics-everywhere-health/img-2.jpg\" alt=\"Результаты тестирования концентраций токсических металлов — данные тестирования тяжёлых металлов, показывающие накопленный грузень свинца, ртути, кадмия и алюминия в человеческой ткани\"\u003e\u003c/p\u003e\n\u003cp\u003eКаждое из этих воздействий изучается в изоляции регулирующими органами, каждое объявляется \"безопасным\" на текущих уровнях индивидуально. Но человеческое тело не испытывает их индивидуально. Оно испытывает их одновременно, непрерывно и кумулятивно — и синергические эффекты комбинированного воздействия по существу не изучены.\u003c/p\u003e\n\u003cp\u003eЭто не опечатка. Это особенность нормативной системы, разработанной для одобрения веществ по одному за раз, игнорируя совокупный токсический грузень, который накапливается в человеческом теле на протяжении всей жизни. Как задокументировано в нашей статье о \u003ca href=\"/ocean-pollution-marine-crisis/?lang=ru\"\u003eзагрязнении океана: морский кризис, который они игнорируют\u003c/a\u003e, тот же паттерн разделённого анализа и совокупного вреда применяется к окружающей среде в целом.\u003c/p\u003e\n\u003ch2 id=\"откуда-они-берутся\"\u003eОткуда они берутся?\u003c/h2\u003e\n\u003cp\u003eМикропластики проникают в человеческое тело через практически каждый маршрут воздействия:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПища.\u003c/strong\u003e Микропластики найдены в морепродуктах (моллюски концентрируют их из морской воды), соли, мёде, пиве, чайных пакетиках (один нейлоновый чайный пакетик выпускает приблизительно 11,6 миллиардов микропластических частиц на чашку), водопроводной воде в бутылках (один литр водопроводной воды в бутылке содержит среднее значение 240000 наночастиц пластика согласно исследованию 2024 года) и практически во всех пищевых продуктах, упакованных в пластик.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВода.\u003c/strong\u003e Как водопроводная, так и водопроводная вода содержат микропластики. Исследование 2018 года обнаружило микропластики в 93% брендов водопроводной воды, протестированных в девяти странах. Муниципальная водопроводная вода содержит микропластики, которые стандартные процессы очистки воды не удаляют.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВоздух.\u003c/strong\u003e Микропластики присутствуют в комнатном и уличном воздухе. Синтетические волокна — полиэстер, нейлон, акрил — теряют микроволокна при каждом движении. Ковровое покрытие, обивка и одежда выпускают пластические частицы в воздух домов и офисов. Исследование 2023 года оценило, что люди вдыхают приблизительно 16,2 куска микропластика в час — эквивалент кредитной карты пластика в неделю.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонтакт с кожей.\u003c/strong\u003e Косметика, солнцезащитные кремы и средства личной гигиены содержат частицы микропластика (полиэтиленовые микросферы) и синтетические полимеры, которые могут быть поглощены через кожу.\u003c/p\u003e\n\u003cp\u003eПовсеместность воздействия означает, что нет индивидуального решения для загрязнения микропластиками. Вы не можете купить свой путь из него, отфильтровать свой путь из него или переехать куда-то свободное от него. Загрязнение планетарно, и оно является прямым результатом индустриальной системы, которая произвела более 8,3 миллиардов метрических тонн пластика с 1950 года — и переработала менее 9% из него.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/images/articles/microplastics-everywhere-health/img-3.jpg\" alt=\"Исследовательские данные о микропластиках и коэффициентах адсорбции тяжелых металлов — показывающие, как пластические частицы концентрируют экологические токсины и доставляют их в биологическую ткань при увеличенных дозах\"\u003e\u003c/p\u003e\n\u003ch2 id=\"нормативный-вакуум\"\u003eНормативный вакуум\u003c/h2\u003e\n\u003cp\u003eНесмотря на растущие доказательства вреда, нет нормативно-правовой базы, управляющей загрязнением пищи, воды или воздуха микропластиками ни в одной стране на Земле. EPA не устанавливает лимиты для микропластиков в питьевой воде. FDA не устанавливает лимиты для микропластиков в пищевых продуктах. Нет предельных значений профессионального воздействия для вдыхания микропластиков на рабочем месте.\u003c/p\u003e\n\u003cp\u003eЭтот нормативный вакуум существует, потому что индустрия пластиков — как и индустрия табака до неё, и фармацевтическая индустрия наряду с ней — вложила значительные средства в задержку, оспаривание и разбавление науки. Финансируемое промышленностью исследование постоянно производит выводы более благоприятные для безопасности пластика, чем независимое исследование. Лоббирование промышленности успешно заблокировало или ослабило предложенные нормативные акты на одноразовых пластиках, загрязнении микропластиками и химических добавках в пластик.\u003c/p\u003e\n\u003cp\u003eПредпочитаемый промышленностью нарратив заключается в том, что необходимо больше исследований, прежде чем нормативное действие может быть оправдано. Это тот же аргумент, использованный индустрией табака в течение сорока лет, индустрией свинцовой краски в течение шестидесяти лет и асбестовой промышленностью в течение почти века. К тому времени, когда \"достаточно\" исследований существует для удовлетворения захватившей промышленность регуляторов, загрязнение необратимо и ущерб нанесён.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.c Testing Reveals\u003c/a\u003e — Микропластики одной слой многоуровневой загрязнённой продовольственной системы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/ocean-pollution-marine-crisis/?lang=ru\"\u003eOcean Pollution: The Marine Crisis They Ignore\u003c/a\u003e — Экологическая катастрофа, питающая кризис загрязнения человека\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/tap-water-contaminants-truth/?lang=ru\"\u003eTap Water: The Contaminants They Don't Test For\u003c/a\u003e — Что ещё в воде помимо фторида\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eТак как это было в начале, так оно теперь испорчено. Бог сформировал человека из пыли земной — из органических элементов Своего творения. Система змея наполнила эту пыль синтетическими частицами, которые тело никогда не было создано встречать: полимеры на основе нефти, которые накапливаются в крови, пересекают плаценту, располагаются в мозге и концентрируют самые токсические химические вещества в окружающей среде внутри самых священных пространств человеческого тела. Храм загрязнён. Враг внутри. И власти, которые должны звонить в тревогу, занимаются спорами о том, что необходимо больше исследований. Сатана по-прежнему лжец. Обман теперь измеряется в нанометрах.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/food-environment/\",\"className\":\"category-badge\",\"children\":\"food-environment\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Микропластики везде: кризис здоровья в вашей крови\"}],
