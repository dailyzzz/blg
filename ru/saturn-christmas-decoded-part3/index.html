не был забыт. Он был переименован. Бог, который пожирал собственных детей, просто сменил имя, сменил костюм и продолжил свой пир — теперь называемый Рождеством. В Части 2 мы разоблачили анаграмму Санта-Сатана и нацеливание на детей. В Части 3 мы раскодируем полную архитектуру системы Сатурн-Рождество.\u003c/p\u003e\n\u003cp\u003eОпыт Ховарда Питтмана при близкой смерти раскрыл три небес, как описано в Писании. На втором небе он был свидетелем демонической иерархии, работающей с ужасающей эффективностью. Ему сказали, что 97,5 процента христиан, умерших во время его опыта, были отвергнуты — они \"никогда не сделали Меня Господом\". Демоны, которых видел Питтман, были не хаотичными. Они были организованы, дисциплинированы, стратегичны. Они понимали, что величайшие победы завоёвываются не через прямое нападение, а через обман — через ритуалы, которые люди выполняют добровольно, даже радостно, не понимая их истинного назначения.\u003c/p\u003e\n\u003cp\u003eИезуиты совершенствовали эту стратегию на земле. Основанные Игнатием Лойолой как военная организация, Общество Иисуса действовало с тем, что Наполеон назвал \"абсолютной властью\". Джон Адамс предупреждал об их способности к \"вечному проклятию\". Отец Генерал Тамбурини управлял \"всем миром\" из одной комнаты. И когда Папа Климент XIV осмелился их запретить, его отравили. Иезуиты — земное зеркало демонической иерархии, которую видел Питтман — и поклонение Сатурну является одним из их самых эффективных орудий.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/05-The_First_Darkness.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПервая Тьма — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМаскировка Сатаны — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"сатурналии-первоначальное-рождество\"\u003eСатурналии: Первоначальное Рождество\u003c/h2\u003e\n\u003ch3 id=\"фестиваль-растворения\"\u003eФестиваль Растворения\u003c/h3\u003e\n\u003cp\u003eСатурналии были самым популярным фестивалем в древнем Риме. Проводился с 17 по 23 декабря, он почитал Сатурна — бога сельского хозяйства, времени и растворения. Во время Сатурналий обычный социальный порядок был перевёрнут. Рабы обедали с хозяевами. Азартные игры были разрешены. Суды были закрыты. Школы были закрыты. Издевательский король — \u003cem\u003eSaturnalicius princeps\u003c/em\u003e, Лорд Неправила — был назначен для управления хаосом.\u003c/p\u003e\n\u003cp\u003eПараллели с современным Рождеством не являются тонкими. Школы закрыты. Суды прерывают заседания. Рабочие места закрываются. Социальные нормы расслабляются. Излишество приветствуется. Фигура председательствует над всем — не Лорд Неправила, а Санта-Клаус, который, как мы установили в Части 2, является составной фигурой Сатурна в красном костюме Coca-Cola.\u003c/p\u003e\n\u003cp\u003eДарение подарков Сатурналий, пиры, свечи (теперь рождественские огни), украшение деревьев (практика, предшествующая христианству на века) — все эти элементы передались непосредственно от языческого фестиваля к христианскому празднику. Единственное, что изменилось, это имя.\u003c/p\u003e\n\u003ch3 id=\"размещение-25-декабря\"\u003eРазмещение 25 декабря\u003c/h3\u003e\n\u003cp\u003eНикакой серьёзный библейский учёный не утверждает, что Иисус родился 25 декабря. Пастухи \"стерегли стада свои ночью\" (Луки 2:8), что предполагает время между весной и ранней осенью — не разгар зимы. Дата 25 декабря была выбрана по одной причине: она совпадала с существующими языческими праздниками.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eDies Natalis Solis Invicti\u003c/em\u003e — День рождения Непобеждённого Солнца — праздновался 25 декабря. Это был праздничный день для Сол Инвиктуса, римского бога солнца, который поглотил атрибуты более ранних солярных божеств, включая Митру. Поместив Рождество на эту дату, Католическая Церковь не заменила поклонение солнцу. Она его поглотила. \"Сын\" заменил \"Солнце\" только по названию. Ритуалы, время, символизм — все остаются языческими.\u003c/p\u003e\n\u003cp\u003eАгент131711 задокументировал на Substack (agent131711.substack.com), как этот образец абсорбции является основной стратегией Католической Церкви. Она не разрушает конкурирующие религии. Она их потребляет, переваривает и представляет их останки как христианскую традицию. Иезуиты, как раскрыто в \u003cem\u003eCatholic Confidential\u003c/em\u003e, проникают \"коварно замаскированные\" — и это проникновение распространяется на сам календарь, по которому мир отсчитывает время.\u003c/p\u003e\n\u003ch2 id=\"куб-сатурна\"\u003eКуб Сатурна\u003c/h2\u003e\n\u003ch3 id=\"священная-геометрия-контроля\"\u003eСвященная геометрия контроля\u003c/h3\u003e\n\u003cp\u003eСимвол Сатурна в оккультной традиции — куб — трёхмерное представление числа шесть (шесть граней, шесть рёбер, встречающихся в каждом углу из трёх плоскостей). Чёрный куб появляется на протяжении всей человеческой цивилизации: Кааба в Мекке, филактерии иудаизма, головная доска выпускника, кубические здания корпоративных штаб-квартир по всему миру.\u003c/p\u003e\n\u003cp\u003eРождественские подарки упакованы в коробки — кубы. Они размещены под деревом, которое представляет \u003cem\u003eaxis mundi\u003c/em\u003e, мировой столб. Вся сцена — кубы, расположенные под космическим столпом, увенчанные звездой (пентаграмма) или ангелом (существом света, что буквально значит имя Люцифера) — это алтарь Сатурна, собранный в гостиной каждого участвующего домохозяйства.\u003c/p\u003e\n\u003cp\u003eЭто не интерпретация. Это описание. Символы — это то, чем они являются. Куб — это форма Сатурна. Дерево — мировая ось. Звезда — светоноситель. Что эти элементы сходятся на дате, украденной из фестиваля Сатурна, должно удивить только тех, кто не честно изучал этот вопрос.\u003c/p\u003e\n\u003ch3 id=\"кольца-сатурна\"\u003eКольца Сатурна\u003c/h3\u003e\n\u003cp\u003eСатурн — это планета с кольцами — единственная видимая невооружённым глазом планета, которая окружена кольцами. В оккультном символизме кольцо представляет связывание, контракт, клятву. Обручальное кольцо, надеваемое на \"безымянный палец\", который считали имеющим вену, идущую прямо к сердцу (\u003cem\u003evena amoris\u003c/em\u003e), является символом Сатурна. Кольцо связывает. Оно создаёт обязательство. Оно формализует контракт.\u003c/p\u003e\n\u003cp\u003eРождество также действует через обязательство. Социальное давление для участия, покупки подарков, посещения собраний, выполнения ритуалов — это связывание. Те, кто отказывается, подвергаются остракизму, называются Скруджами или Гринчами (оба вымышленные персонажи, созданные для стыдения диссидентов). Система Сатурна не просто приглашает участие. Она требует этого. И как кольца Сатурна, один раз находясь внутри системы, побег требует сознательного, преднамеренного усилия.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов действует по тому же принципу связывания. Иезуитская присяга, задокументированная в \u003cem\u003eCatholic Confidential\u003c/em\u003e, требует абсолютного, слепого послушания. Члены связаны с орденом более крепко, чем любой браком, любым контрактом, любым гражданским обязательством. Структура ордена зеркалит природу Сатурна: связывание, потребление, абсолют.\u003c/p\u003e\n\u003ch2 id=\"роль-католической-церкви\"\u003eРоль Католической Церкви\u003c/h2\u003e\n\u003ch3 id=\"от-рима-к-риму\"\u003eОт Рима к Риму\u003c/h3\u003e\n\u003cp\u003eРимская Империя не пала. Она трансформировалась. Политическая власть Цезарей была передана духовной власти Пап. Сенат стал Коллегией Кардиналов. Pontifex Maximus — верховный жрец римского язычества — стал титулом Папы. Легионы стали орденом иезуитов.\u003c/p\u003e\n\u003cp\u003eЭта передача сохранила всё. Языческие праздники, иерархическая структура, требование послушания, претензия на универсальную власть — всё выжило в переходе от политического Рима к религиозному Риму. Рождество — это Рим. Оно было Римом, когда его называли Сатурналиями, и оно остаётся Римом, сохранённое и распространяемое Римской Католической Церковью и её иезуитскими администраторами.\u003c/p\u003e\n\u003cp\u003eХовард Питтман был показан, что духовное царство действует через иерархию и территорию. Демоны, которых он видел, имели назначенные регионы, назначенные функции, назначенные цели. Католическая Церковь зеркалит эту структуру точно — диоцезы, приходы, ордены, каждый с назначенными территориями и функциями. Это не потому, что Церковь скопировала демоническую модель. Это потому, что обе служат одному хозяину, действуя через одинаковые организационные принципы.\u003c/p\u003e\n\u003ch3 id=\"массы-и-месса\"\u003eМассы и Месса\u003c/h3\u003e\n\u003cp\u003eСлово \"Рождество\" содержит слово \"Месса\" — центральный ритуал Католической Церкви. Месса, согласно католической теологии, является переподачей жертвы Христа. В протестантской теологии это считается богохульством — Христос был принесён в жертву раз и навсегда, и переприношение Его означает отрицание достаточности Его работы на кресте.\u003c/p\u003e\n\u003cp\u003eНо в оккультной теологии повторная жертва — это суть. Сатурн требует постоянной жертвы. Месса, повторяемая бесконечно, питает тот же духовный аппарат, который питали Сатурналии. Имя \"Христова-Месса\" — это составное: Христос-Спаситель запряжён к языческому ритуалу повторной жертвы. Это высшее выражение иезуитской стратегии — слияния священного и профанного до неразличимости.\u003c/p\u003e\n\u003ch2 id=\"расшифровка-символов\"\u003eРасшифровка символов\u003c/h2\u003e\n\u003ch3 id=\"полено-йоля\"\u003eПолено Йоля\u003c/h3\u003e\n\u003cp\u003e\"Йоль\" происходит от древнескандинавского \u003cem\u003ejol\u003c/em\u003e, зимнего фестиваля, предшествующего христианству. Полено Йоля сжигалось в жертву, чтобы обеспечить возврат солнца после зимнего солнцестояния. В современной практике полено Йоля стало шоколадным тортом, похожим на полено — жертва, сведённая к конфетам, ритуал — к десерту. Но духовное значение остаётся. Каждое сожжённое или потреблённое полено Йоля — это участие в солярном ритуале, который не имеет отношения к рождению Христа.\u003c/p\u003e\n\u003ch3 id=\"венок\"\u003eВенок\u003c/h3\u003e\n\u003cp\u003eКруглый венок представляет кольцо Сатурна, колесо времени, цикл смерти и возрождения, которым управляет Сатурн. Он вешается на дверь — порог, пограничное пространство между профанным снаружи и священным внутри. В языческой практике венок служил защитным амулетом и приглашением доброжелательным духам. На практике он отмечает домохозяйство как участника системы Сатурна.\u003c/p\u003e\n\u003ch3 id=\"цвета\"\u003eЦвета\u003c/h3\u003e\n\u003cp\u003eКрасный и зелёный — традиционные цвета Рождества. Красный — цвет жертвы, крови. Зелёный — цвет природы, плодородия, которым управляет сельскохозяйственный аспект Сатурна. Вместе они представляют цикл жертвы и обновления, который лежит в основе поклонения Сатурну. Золото, третий цвет Рождества, представляет солнце — Сол Инвиктуса, непобеждённое солнце, чьё рождение Рождество заменило.\u003c/p\u003e\n\u003ch3 id=\"омела-и-падуб\"\u003eОмела и Падуб\u003c/h3\u003e\n\u003cp\u003eОмела была священна для друидов, которые считали её универсальным лекарством и символом плодородия. Традиция целования под омелой — это ритуал плодородия, чистая и простая. Падуб с его красными ягодами и острыми листьями был связан с Королём Падуба — богом убывающего года, фигурой Сатурна, правящей с летнего солнцестояния до зимнего. Оба растения ядовиты. Оба приносятся в дом в сезон Сатурна. Символизм пишет сам себя.\u003c/p\u003e\n\u003ch2 id=\"иезуитская-машина-сохранения\"\u003eИезуитская машина сохранения\u003c/h2\u003e\n\u003ch3 id=\"почему-традиции-выживают\"\u003eПочему традиции выживают\u003c/h3\u003e\n\u003cp\u003eТрадиции выживают потому, что их сохраняют учреждения. Самое мощное учреждение в западном мире на протяжении последних пяти столетий — это орден иезуитов. Действуя внутри Католической Церкви, но подчиняясь только своему собственному Генералу, Общество Иисуса сформировало образование, науку, дипломатию и культуру в степени, которую большинство людей не может осмыслить.\u003c/p\u003e\n\u003cp\u003eХвастовство Отца Генерала Тамбурини — \"из этой комнаты я управляю не только Парижем, но и Китаем, не только Китаем, но всем миром\" — было не преувеличением. Иезуиты основали миссии на каждом континенте. Они спроектировали календарь, используемый миром (григорианский календарь, названный в честь Папы Григория XIII, был рассчитан иезуитским астрономом Кристофером Клавиусом). Они управляют датами. Они управляют фестивалями. Они управляют ритуалами, которые миллиарды выполняют без вопросов.\u003c/p\u003e\n\u003cp\u003eИсследования Агента131711 на Substack демонстрируют, как этот контроль распространяется на каждый аспект современной жизни. Система образования, СМИ, финансовая система — все несут отпечатки иезуитского дизайна. Рождество — это просто наиболее видимое выражение системы контроля, которая работает круглый год.\u003c/p\u003e\n\u003ch3 id=\"протестантский-провал\"\u003eПротестантский провал\u003c/h3\u003e\n\u003cp\u003eПротестантские реформаторы признавали языческую природу Рождества. Пуритане его запретили. В Массачусетсе Рождество было незаконным с 1659 по 1681 год. Шотландские пресвитериане отвергли его. Ранние баптисты, квакеры и конгрегационалисты все отказались его праздновать.\u003c/p\u003e\n\u003cp\u003eНо иезуиты, действуя через свою стратегию проникновения, описанную в \u003cem\u003eCatholic Confidential\u003c/em\u003e, постепенно переучредили Рождество в протестантской культуре. К 19 веку, под влиянием писателей, таких как Чарльз Диккенс, и коммерческих интересов растущей потребительской экономики, Рождество было полностью реабилитировано. Протестантское сопротивление было сломлено не теологией, а культурой — историями, песнями, неустанным давлением общества, которое было сформировано на каждом уровне иезуитским влиянием.\u003c/p\u003e\n\u003ch2 id=\"проблема-975-процента\"\u003eПроблема 97,5 процента\u003c/h2\u003e\n\u003ch3 id=\"почему-это-имеет-значение\"\u003eПочему это имеет значение\u003c/h3\u003e\n\u003cp\u003eОткровение Ховарда Питтмана о том, что 97,5 процента христиан были отвергнуты, — это самая ужасающая статистика в духовной истории. Это означает, что подавляющее большинство людей, которые верят, что они спасены, обманул. Они ходят в церковь. Они праздникуют Рождество. Они говорят правильные слова. Но они никогда не сделали Христа Господом. Они служат себе — своим традициям, своему комфорту, своему желанию вписаться — а не истине.\u003c/p\u003e\n\u003cp\u003eРождество — это высший тест этой динамики. Когда столкнулись с языческим происхождением праздника, большинство христиан реагируют гневом, а не любопытством. Они защищают традицию, а не исследуют её. Они выбирают комфорт над истиной. И делая это, они демонстрируют ровно то, что сказал Питтман: они служат себе, а не Богу. Их слова имеют духовный вес, как предупреждает Матфея 12:36-37, и каждое \"Весёлого Рождества\", произнесённое в защиту языческого фестиваля, имеет вес в духовном царстве.\u003c/p\u003e\n\u003cp\u003eИезуиты рассчитывают на эту реакцию. Вся их стратегия зависит от человеческой склонности к удобной лжи над неудобной истиной. Пока люди выбирают традицию над исследованием, система Сатурна остаётся целой, и сбор урожая душ продолжается.\u003c/p\u003e\n\u003ch2 id=\"путь-вперёд\"\u003eПуть вперёд\u003c/h2\u003e\n\u003ch3 id=\"расшифровка-недостаточна\"\u003eРасшифровка недостаточна\u003c/h3\u003e\n\u003cp\u003eПонимание связи Сатурн-Рождество необходимо, но недостаточно. Знание без действия — это просто тривиальность. Вопрос не в том \"Является ли Рождество языческим?\" — доказательства делают этот ответ очевидным. Вопрос в том \"Что вы будете с этим делать?\"\u003c/p\u003e\n\u003cp\u003e5 процентов христиан, которые, согласно учёту NDE Питтмана, действительно служат Богу, а не себе, — это те, кто готов быть неудобным, быть иным, быть отверженным. Это те, кто исследует каждую традицию, каждое слово, каждый ритуал против стандарта Писания, а не стандарта культуры.\u003c/p\u003e\n\u003cp\u003eЭто духовная война, и как ясно говорит Ефесянам 6:12, враг — не плоть и кровь, а начальства и власти. Система Сатурна — это одна из этих властей — древняя структура власти, которая действует через ритуал, символ и традицию, чтобы держать человечество в духовном рабстве. Прорыв требует той же военной дисциплины, которую иезуиты приносят в свою кампанию обмана. Разница в том, что наше оружие — истина, молитва и готовность стоять в одиночку, если необходимо.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavis
