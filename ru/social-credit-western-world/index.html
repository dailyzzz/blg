удят поведение через автоматизированные системы оценки, которые сводят бесконечную сложность человеческой жизни к числу. Система социального кредита представляет собой окончательную инверсию божественного суда: там, где Бог видит целого человека и судит с совершенным знанием, милосердием и справедливостью, алгоритм видит точки данных и судит с механической точностью, нулевым милосердием и без апелляции.\u003c/p\u003e\n\u003cp\u003eЖелание судить, ранжировать и сортировать людей не ново. Каждая иерархия в истории использовала системы оценки — от жреческих каст до феодальных рангов и академических оценок. Что ново, так это всеобъемлемость и автоматизация современной инфраструктуры оценки. Впервые в истории существует технология для оценки каждого действия, каждой транзакции, каждой коммуникации, каждого движения и каждой ассоциации каждого человека на земле — и для присвоения оценки, которая определяет их доступ к системам, поддерживающим современную жизнь.\u003c/p\u003e\n\u003cp\u003eКак отражает трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eТрансгрессия\u003c/a\u003e, трансгрессия в Эдеме была осуждена Богом непосредственно — с полным знанием, с объяснением, с последствием и с обещанием искупления. Система социального кредита судит трансгрессию алгоритмически — с частичным знанием, без объяснения, с автоматическим последствием и без обещания искупления. Это суд без благодати — антитеза евангелия.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"китайская-система-социального-кредита-план\"\u003eКитайская система социального кредита: план\u003c/h2\u003e\n\u003cp\u003eСистема социального кредита Китая (SCS) была официально объявлена в документе Государственного совета 2014 года \"План создания системы социального кредита\". Заявленной целью было построение \"культуры искренности\" и установление системы, в которой физические и юридические лица вознаграждаются за \"заслуживающее доверия\" поведение и наказываются за \"недостойное доверия\" поведение.\u003c/p\u003e\n\u003cp\u003eСистема работает через комбинацию правительственных баз данных, коммерческих платформ и ИИ-наблюдения:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравительственная оценка\u003c/strong\u003e агрегирует данные из судебных записей, налоговых записей, соблюдения нормативных требований и взаимодействий с правительством. Лица, признанные \"недостойными доверия\" — что может включать неуплату долгов, нарушение правил дорожного движения, высказывание \"неискренних\" заявлений в Интернете или ассоциацию с лицами с низкими оценками — попадают в черные списки, которые ограничивают их доступ к услугам.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКоммерческая оценка\u003c/strong\u003e через платформы, такие как Sesame Credit (разработанный Ant Financial, аффилированным с Alibaba), оценивает людей на основе покупательского поведения, социальных связей и активности на платформе. Высокая оценка Sesame Credit предоставляет доступ к преимуществам: ускоренная обработка виз, отмененные депозиты за аренду и услуги, предпочтительный доступ к платформам знакомств и повышенный социальный статус. Низкая оценка производит противоположное: ограниченный доступ, более высокие затраты и социальную стигму.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИИ-наблюдение\u003c/strong\u003e соединяет систему оценки с реальным поведением через самую обширную в мире сеть наблюдения. В Китае около 600 миллионов камер видеонаблюдения, оснащенных технологией распознавания лиц. Система может идентифицировать людей в общественных местах, отслеживать их движения, наблюдать за их поведением и передавать эти данные в алгоритмы оценки в режиме реального времени. Переход улицы на красный свет в Шэньчжэне приводит к автоматической идентификации, автоматическому штрафу и автоматической публикации фотографии нарушителя на публичных дисплеях.\u003c/p\u003e\n\u003cp\u003eПоследствия низкой оценки социального кредита в Китае серьезны и расширяются:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eБолее 20 миллионов авиабилетов и 6 миллионов железнодорожных билетов были отказаны \"дискредитированным\" лицам только в 2019 году\u003c/li\u003e\n\u003cli\u003eЛица с низкими оценками ограничены в покупке недвижимости, зачислении детей в предпочтительные школы и доступе к премиальным услугам\u003c/li\u003e\n\u003cli\u003eОценки друзей и членов семьи могут быть затронуты ассоциацией с лицами с низкими оценками — создавая социальное давление на остракизм диссидентов\u003c/li\u003e\n\u003cli\u003eКорпоративные оценки социального кредита определяют доступ к правительственным контрактам, регулятивному отношению и финансовым услугам\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНамерение системы не просто карательное. Оно формирующее — спроектировано для формирования поведения через постоянное осознание того, что каждое действие контролируется, оценивается и оценивается. Идеальный субъект системы социального кредита — это не тот, кто вынужден подчиняться, но тот, кто интернализировал подчинение — кто ведет себя \"правильно\" не потому, что боится наказания, но потому, что система оценки реструктурировала их психологию.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"западный-прототип-esg-оценка\"\u003eЗападный прототип: ESG-оценка\u003c/h2\u003e\n\u003cp\u003eЗападные страны не называют свои системы контроля поведения \"социальным кредитом\". Они называют их ESG-оценками, кредитными рейтингами, системами доверия и безопасности, метриками цифровой репутации и политиками модерации контента. Язык другой. Архитектура идентична.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"/esg-scores-corporate-social-credit/?lang=ru\"\u003eESG (Environmental, Social, and Governance) оценка\u003c/a\u003e — это социальный кредит для корпораций. Компании оцениваются по критериям, включая выбросы углерода, метрики разнообразия, состав правления, политическое соответствие и практики цепочки поставок. ESG-оценки присваиваются рейтинговыми агентствами (MSCI, Sustainalytics, Bloomberg ESG) и используются инвесторами, банками и регуляторами для определения доступа к капиталу.\u003c/p\u003e\n\u003cp\u003eСистема ESG функционирует идентично корпоративному социальному кредиту Китая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКомпании с высокими ESG-оценками получают предпочтительный доступ к рынкам капитала, более низкие затраты на заимствование и институциональные инвестиции (BlackRock, Vanguard и State Street коллективно контролируют более 22 триллионов долларов и явно используют критерии ESG в инвестиционных решениях)\u003c/li\u003e\n\u003cli\u003eКомпании с низкими ESG-оценками сталкиваются с более высокими затратами на капитал, исключением из институциональных портфелей, негативным освещением в СМИ и регуляторным контролем\u003c/li\u003e\n\u003cli\u003eКритерии устанавливаются не рынками или потребителями, но рейтинговыми агентствами и международными организациями (Принципы ООН по ответственным инвестициям, структура капитализма заинтересованных сторон ВЭФ)\u003c/li\u003e\n\u003cli\u003eКомпании стимулируются изменять поведение не потому, что клиенты этого требуют, но потому, что система оценки вознаграждает подчинение и наказывает отклонение\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПереход от корпоративного ESG к индивидуальному ESG уже идет. Mastercard объявил \"углеродный калькулятор\", который отслеживает углеродный след индивидуальных покупок. Шведская финтех-компания Doconomy разработала кредитную карту, которая блокирует покупки, когда держатель карты превышает свою личную квоту углерода. Банки в нескольких странах начали включать индивидуальные факторы ESG в кредитные решения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кредитные-оценки-существующая-инфраструктура\"\u003eКредитные оценки: существующая инфраструктура\u003c/h2\u003e\n\u003cp\u003eИнфраструктура западного социального кредита не гипотетична. Ее основа существует десятилетиями в форме кредитных оценок.\u003c/p\u003e\n\u003cp\u003eОценка FICO — используемая 90% кредиторов США — сводит финансовое поведение 200 миллионов американцев к трехзначному числу, которое определяет доступ к жилью, транспорту, занятости и финансовым услугам. Низкая оценка FICO может помешать вам снять квартиру, купить автомобиль, получить ипотеку, оформить страховку или даже получить работу (многие работодатели проверяют кредитные оценки как часть процесса найма).\u003c/p\u003e\n\u003cp\u003eСистема кредитных оценок демонстрирует каждую характеристику социального кредита:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОценка поведения.\u003c/strong\u003e Оценка основана на поведении — истории платежей, использовании кредита, типах счетов и длительности кредитной истории.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАвтоматизированная оценка.\u003c/strong\u003e Оценка вычисляется алгоритмами, а не человеческим суждением. Человек не имеет отношений с субъектом, который его судит.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПоследствующий доступ.\u003c/strong\u003e Оценка определяет доступ к основным услугам. Низкая оценка не просто указывает на финансовый риск — она ограничивает способность человека участвовать в нормальной экономической жизни.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНепрозрачность.\u003c/strong\u003e Алгоритмы оценки являются собственностью. Человек знает свою оценку, но не точно, как она вычисляется или как ее оптимизировать. Система требует прозрачности от оцениваемого, сохраняя непрозрачность для себя.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНеизбежность.\u003c/strong\u003e Отказ от системы кредитных оценок технически возможен, но практически невозможен. Без кредитной оценки доступ к жилью, транспорту и занятости серьезно ограничен.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСистема кредитных оценок была принята общественностью, потому что казалось, что она служит рациональной функции — позволяя кредиторам оценивать риск. Но установленная ею инфраструктура — универсальная оценка, оценка поведения, автоматизированные последствия, неизбежное участие — это та же инфраструктура, необходимая для комплексного социального кредита. Переход от финансовых кредитных оценок к поведенческим кредитным оценкам требует только расширения входных данных, а не построения новых систем.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"репутация-платформы-цифровой-социальный-кредит\"\u003eРепутация платформы: цифровой социальный кредит\u003c/h2\u003e\n\u003cp\u003eКаждая крупная цифровая платформа работает с системой оценки репутации, которая функционирует как социальный кредит в ее экосистеме:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eUber и Lyft\u003c/strong\u003e оценивают как водителей, так и пассажиров. Пассажирам с низкими рейтингами может быть трудно получить поездки. Водители с низкими рейтингами деактивируются с платформы — теряя средства к существованию на основе алгоритмической оценки субъективных отзывов клиентов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAirbnb\u003c/strong\u003e оценивает как хозяев, так и гостей. Гостям с низкими рейтингами отказывают в бронировании. Хозяева с низкими рейтингами исключаются из списка. Алгоритмическая оценка платформы определяет доступ к размещению.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAmazon\u003c/strong\u003e оценивает продавцов через сложный алгоритм, который учитывает отзывы клиентов, показатели возврата, скорость доставки и время ответа. Низкая оценка продавца Amazon может уничтожить бизнес в одночасье — не через рыночную конкуренцию, но через алгоритмическое понижение рейтинга.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПлатформы социальных сетей\u003c/strong\u003e присваивают невидимые оценки пользователям, которые определяют видимость контента. Внутренние оценки \"гражданской целостности\" Facebook оценивали надежность пользователей и соответственно настраивали распространение контента. Системы Twitter до приобретения присваивали метки \"черного списка поиска\" и \"черного списка трендов\" пользователям, делая их контент невидимым в результатах поиска и трендовых темах без ведома пользователей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePayPal, Venmo и финансовые платформы\u003c/strong\u003e исключили из платформы людей за политические высказывания, благотворительные пожертвования в неодобренные организации и ассоциацию с организациями, считающимися нежелательными. Потеря доступа к платежной обработке может быть экономически разрушительной — эквивалентна отказу в способности проводить финансовые транзакции.\u003c/p\u003e\n\u003cp\u003eСистема оценки каждой платформы работает независимо, но тенденция направлена на интеграцию. Совместное использование данных между платформами, требования проверки личности и совместимые системы репутации создают единую цифровую репутацию, которая следует за людьми через платформы. Нарушение на одной платформе влияет на статус на других. Платформы отрицают, что они работают с системой социального кредита. Они работают с множественными системами социального кредита, которые сходятся в одну.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"связь-с-цифровой-идентификацией\"\u003eСвязь с \u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eцифровой идентификацией\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eСоциальный кредит требует цифровой идентификации. Без постоянной, проверенной цифровой идентификации, связанной с конкретным человеком, системы оценки не могут функционировать — не было бы способа связать поведение через платформы, транзакции, места и контексты с одним человеком.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eИнфраструктура цифровой идентификации\u003c/a\u003e, создаваемая глобально — через Aadhaar, EU Digital Identity Wallet, ID2020 и World Bank ID4D — предоставляет основу для универсального социального кредита. Когда каждый человек имеет уникальную биометрическую цифровую идентификацию, которая аутентифицирует каждую транзакцию, каждое взаимодействие и каждое движение, данные, необходимые для комплексной поведенческой оценки, становятся автоматически доступными.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eСистема CBDC\u003c/a\u003e завершает финансовое измерение. Когда все деньги цифровые и все транзакции записываются, каждая покупка становится точкой данных в поведенческом профиле. Что вы покупаете, где вы это покупаете, когда вы это покупаете и сколько вы тратите — все приписывается вашей цифровой идентификации, все доступно для оценки.\u003c/p\u003e\n\u003cp\u003eИнтеграция цифровой идентификации + CBDC + поведенческой оценки = комплексная система социального кредита, в которой каждый аспект жизни человека контролируется, оценивается и оценивается — и оценка определяет доступ ко всему. Это не будущий сценарий. Каждый компонент существует. Интеграция идет.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"психология-оценки-интернализированное-подчинение\"\u003eПсихология оценки: интернализированное подчинение\u003c/h2\u003e\n\u003cp\u003eСамая коварная черта социального кредита — это не его наказание за несоответствие. Это его трансформация человеческой психики. Население, которое постоянно оценивается, не просто подчиняется внешне. Оно интернализирует подчинение — корректируя мысль, речь и поведение для оптимизации оценки без указания на это.\u003c/p\u003e\n\u003cp\u003eЭто совершенство контроля: система, которая не нуждается в выдаче команд, потому что субъекты командуют себе сами. Оцениваемый человек спрашивает перед каждым действием: \"Как это повлияет на мою оценку?\" Перед каждой покупкой: \"Одобрена ли эта покупка?\" Перед каждым заявлением: \"Безопасно ли это мнение?\" Перед каждой ассоциацией: \"Является ли этот человек риском?\" Система оценки становится внутренним голосом человека — заменяя совесть, заменяя суждение, заменяя голос Бога голосом алгоритма.\u003c/p\u003e\n\u003cp\u003eМишель Фуко описал это явление в своем анализе Паноптикона — тюрьмы, спроектированной так, что заключенные могли наблюдаться в любое время, но никогда не могли знать, когда за ними наблюдают. Результатом было то, что заключенные вели себя так, как будто за ними всегда наблюдают — интернализируя наблюдение и становясь своими собственными охранниками. Система социального кредита — это цифровой Паноптикон — инфраструктура наблюдения настолько всеобъемлющая, что субъект никогда не может знать, когда его оценивают, и поэтому ведет себя так, как будто его всегда оценивают.\u003c/p\u003e\n\u003cp\u003eДуховные последствия разрушительны. Голос совести — моральная способность, которую Бог имплантировал в каждого человека — заменяется голосом оценки. Человек больше не спрашивает \"Правильно ли это?\" Он спрашивает \"Соответствует ли это?\" Праведность заменяется подчинением. Совесть заменяется вычислением. Образ Бога заменяется образом алгоритма.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-судимы-богом-или-оцениваемы-системой\"\u003eБиблейское размышление: судимы Богом или оцениваемы системой\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ибо Господь будет судить народ Свой.\" — Второзаконие 32:36\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПисание резервирует суд только для Бога — единственного судьи с совершенным знанием, совершенной мудростью, совершенной справедливостью и совершенным милосердием. Каждая человеческая система суда по определению неполна — лишенная полного знания обстоятельств, намерений и скрытых измерений человеческого сердца, которые обладает только Бог. Система социального кредита претендует на власть суда, обладая ни одним из качеств, которые делают суд легитимным. Она судит без знания (она видит данные, а не человека). Она судит без мудрости (она применяет алгоритмы, а не понимание). Она судит без справедливости (ее критерии установлены теми, кто выигрывает от подчинения). И она судит без милосердия (в алгоритме нет благодати, в оценке нет прощения, в системе нет искупления).\u003c/p\u003e\n\u003cp\u003eЕвангелие — это антитеза социального кредита. Евангелие объявляет, что Божий суд основан не на поведенческой оценке, но на завершенной работе Христа. Евангелие говорит, что худшая оценка — полный провал человеческой праведности — покрыта благодатью, а не наказана системой. Евангелие предлагает то, что не может предложить ни одна система социального кредита: искупление, которое не заработано подчинением, но получено верой.\u003c/p\u003e\n\u003cp\u003eСистема социального кредита требует совершенства и наказывает неудачу. Евангелие признает неудачу и предлагает совершенство — не совершенство оцениваемого, но совершенство Спасителя, зачисленное на счет тех, кто доверяет Ему.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство околосмертного опыта Говарда Питтмана — Предупреждение конца времен, данное ему Богом\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/109-Biometric_Beast_System.mp4\"\u003eБиометрическая система Зверя\u003c/a\u003e — Оценка всего\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/223-Sustainable_Development_Trap.mp4\"\u003eЛовушка устойчивого развития\u003c/a\u003e — Социальный кредит под видом устойчивости\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/digital-id-global-identity-prison/?lang=ru\"\u003eЦифровой ID: Глобальная тюрьма идентичности\u003c/a\u003e — Инфраструктура цифровой идентификации, делающая универсальный социальный кредит технически возможным\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/esg-scores-corporate-social-credit/?lang=ru\"\u003eESG-оценки: Корпоративный социальный кредит\u003c/a\u003e — Как система оценки уже развернута против корпораций и расширяется на отдельных лиц\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eЦепи CBDC: Конец финансовой свободы\u003c/a\u003e — Система программируемых денег, предоставляющая финансовый слой принуждения социального кредита\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eБог не оценивает. Бог знает. Всеведущий Создатель, который \"испытывает сердца\" (Римлянам 8:27), не сводит Свое знание о вас к числу. Он знает мысль до того, как вы ее подумаете, слово до того, как вы его произнесете, дело до того, как вы его совершите — и Он судит с совершенной справедливостью, смягченной совершенным милосердием, через совершенную жертву Своего Сына. Система социального кредита — это подделка божественного суда — механическое приближение всеведения, которое видит все, но не понимает ничего, которое оценивает все, но ничего не искупает, которое наказывает все, но ничего не прощает. Система говорит: \"Ваша оценка определяет вашу ценность.\" Евангелие говорит: \"Ваша ценность была определена на к
