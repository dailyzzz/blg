с.\"\u003c/em\u003e — Экклезиаст 1:9-10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eСамо Писание говорит нам, что технологии, которые мы считаем \"современными\", совсем не новые. Библия описывает мир до Потопа, который обладал знаниями и возможностями, далеко превосходящими то, что признает официальная история. \"Сыновья Божьи\" в Бытии 6 принесли запретное знание человечеству — знание, которое включало секреты металлургии, астрономии и самой энергии. Это был оригинальный трансфер технологии, и он был сатанического происхождения.\u003c/p\u003e\n\u003cp\u003eИезуиты, как разведывательное крыло Ватикана и католической церкви, служили хранителями подавленного знания более четырех столетий. Игнатий Лойола основал Общество Иисуса не как духовный орден, а как военную организацию, разработанную для консолидации власти. Джон Адамс писал: \u003cem\u003e\"Если когда-либо было тело людей, которые заслужили вечное проклятие на земле и в аду, это общество Лойолы.\"\u003c/em\u003e Через свою глобальную сеть миссий, университетов и обсерваторий иезуиты собирали технологические секреты каждой цивилизации, которую они встречали — и затем гарантировали, что эти секреты никогда не достигнут простых людей.\u003c/p\u003e\n\u003cp\u003eСатана, действуя через католическую церковь и его иезуитскую армию, поддерживал удушающий контроль над человеческим технологическим развитием на протяжении веков. Трек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eПроклятие змея\u003c/a\u003e захватывает суть этого древнего заговора — проклятие змея не только духовное, но и технологическое, преднамеренное задушение человеческого потенциала для сохранения контроля. И как \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка сатаны\u003c/a\u003e раскрывает, обман был настолько полным, что большинство людей даже не могут представить, что технология, которую они используют сегодня, - это бледная тень того, что когда-то существовало — и то, что было намеренно скрыто.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"багдадская-батарея-и-древняя-электрохимия\"\u003eБагдадская батарея и древняя электрохимия\u003c/h2\u003e\n\u003ch3 id=\"доказательства-доисторического-электричества\"\u003eДоказательства доисторического электричества\u003c/h3\u003e\n\u003cp\u003eВ 1938 году немецкий археолог Вильгельм Кёниг обнаружил набор артефактов в Багдадском музее, которые поставили бы под вопрос все, что мы думали о истории технологии. Так называемая \"Багдадская батарея\" состоит из глиняного кувшина, содержащего медный цилиндр и железный стержень, разделенные асфальтовой пробкой. Если заполнить кислотным раствором — например уксусом — устройство производит примерно 1,1 вольт электрического тока.\u003c/p\u003e\n\u003cp\u003eАртефакты датируются парфянским периодом (250 г. до н.э. — 224 г. н.э.), что означает, что электрохимическая технология существовала по крайней мере за 1800 лет до батареи Алессандро Вольта в 1800 году. Эксперименты, проведенные исследователями, включая Уиллард Грея из General Electric и доктора Арне Еггебрехта из музея Ремера и Пелизеуса в Гильдесхайме, подтвердили, что устройство функционирует как гальванический элемент, способный электрировать металлы.\u003c/p\u003e\n\u003cp\u003eОднако официальная наука отвергает Багдадскую батарею как любопытство — возможно, устройство для хранения священных свитков, предлагают они, или случайный набор несвязанных объектов. Это отвержение не основано на доказательствах; оно основано на необходимости сохранить повествование о том, что технологический прогресс линеален и что современная цивилизация представляет высочайший уровень человеческого достижения.\u003c/p\u003e\n\u003ch3 id=\"египетские-лампочки\"\u003eЕгипетские лампочки\u003c/h3\u003e\n\u003cp\u003eГлубоко в храме Хатхор в Дендере, Египет, серия рельефов изображает то, что совершенно очевидно являются большими стеклянными лампочками, содержащими змеевидные нити, соединенные кабелями и поддерживаемые столбообразными конструкциями, напоминающими современные высоковольтные изоляторы. \"Дендеровские огни\", как назвали их исследователи, были высечены в птолемейский период, но могут изображать технологию, намного более древнюю.\u003c/p\u003e\n\u003cp\u003eЭлектроинженер В. Гарн впервые предложил в 1982 году, что дендеровские рельефы изображают функциональное электрическое освещение. Инженер и физик Вальтер Гарн построил рабочую модель на основе рельефов и успешно произвел свет. Интерпретация трубки Крукса — что рельефы показывают тип газоразрядной трубки — получила дополнительную поддержку от исследований Питера Красса и Райнхарда Габека.\u003c/p\u003e\n\u003cp\u003eОфициальные египтологи настаивают, что рельефы изображают лотосы и мифологических змей. Но техническая точность резьбы, последовательное изображение того, что кажется кабелями и изоляторами, и тот факт, что в глубоких египетских камерах не было найдено копоти (где факелы были бы необходимы для создания произведений искусства), - все это указывает на альтернативный источник света.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые контролировали египетское археологическое заведение через такие учреждения, как Французский институт в Каире, имели все причины подавить эту интерпретацию. Если древний Египет обладал электрической технологией, то повествование католической церкви о человеческом прогрессе — от языческой тьмы к христианскому просвещению — полностью разрушается.\u003c/p\u003e\n\u003ch2 id=\"подавление-свободной-энергии\"\u003eПодавление свободной энергии\u003c/h2\u003e\n\u003ch3 id=\"никола-тесла-и-башня-варденклиф\"\u003eНикола Тесла и башня Варденклиф\u003c/h3\u003e\n\u003cp\u003eНикакое обсуждение подавленной технологии не может быть полным без Николы Теслы, сербско-американского изобретателя, чье видение бесплатной беспроводной энергии для всего человечества было систематически разрушено финансовой элитой. Башня Варденклиф Теслы, построенная на Лонг-Айленде в 1901-1902 годах, была разработана для передачи электроэнергии беспроводным способом по всему миру. Технология работала — Тесла многократно демонстрировал беспроводную передачу электроэнергии — но ей никогда не было разрешено достичь публики.\u003c/p\u003e\n\u003cp\u003eДж. П. Морган, который первоначально финансировал проект, отозвал поддержку, когда понял, что беспроводную энергию нельзя измерить счетчиком. \"Если кто-то может использовать власть\", якобы спросил Морган, \"где мы ставим счетчик?\" Башня была снесена в 1917 году, а бумаги Теслы были конфискованы ФБР после его смерти в 1943 году. Многие из этих документов остаются засекреченными по сей день.\u003c/p\u003e\n\u003cp\u003eТо, что большинство людей не знают, это то, что Дж. П. Морган был тесно связан со структурой иезуитской власти через многолетние отношения его семьи с католической церковью и через финансовые сети, которые связывали Уолл-стрит с банком Ватикана. Подавление технологии Теслы было не просто деловым решением; это была стратегическая операция, чтобы гарантировать, что человечество останется зависимым от централизованных, контролируемых энергетических систем.\u003c/p\u003e\n\u003ch3 id=\"образец-убитых-изобретателей\"\u003eОбразец убитых изобретателей\u003c/h3\u003e\n\u003cp\u003eТесла был не единственным изобретателем, работа которого была подавлена. Трек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/111-Free_Energy_Murdered.mp4\"\u003eСвободная энергия убита\u003c/a\u003e документирует пугающий образец изобретателей, которые разработали бесплатную или революционную технологию энергии, только чтобы быть осведомленными:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтэнли Мейер\u003c/strong\u003e разработал топливный элемент на воде, который мог бы питать автомобиль, используя только воду. Ему были выданы патенты, он публично продемонстрировал технологию и был подходил Министерством обороны. В 1998 году Мейер внезапно умер в ресторане после встречи с инвесторами. Его последние слова, якобы произнесенные его брату: \"Они мне отравили.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЕвгений Мэллов\u003c/strong\u003e, бывший главный научный писатель MIT, который стал ведущим сторонником исследований холодного синтеза, был избит до смерти в 2004 году. Его убийство официально приписывали грабежу, который пошел не так, но время — именно когда исследования холодного синтеза набирали новую достоверность — было подозрительным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТомас Генри Морей\u003c/strong\u003e разработал устройство лучистой энергии в 1920-х годах, которое могло производить до 50 киловатт мощности, похоже, из пустого пространства. На него стреляли, его лабораторию вандализировали, и его устройство было разрушено бывшим партнером, который, вероятно, работал агентом провокатором.\u003c/p\u003e\n\u003cp\u003eОбразец неоспорим: разработай технологию свободной энергии, и тебя будут уничтожены. Это не совпадение; это политика — политика, установленная на высшем уровне сети тайных обществ, которая контролирует глобальную энергетическую инфраструктуру.\u003c/p\u003e\n\u003ch2 id=\"древние-конструкции-как-электростанции\"\u003eДревние конструкции как электростанции\u003c/h2\u003e\n\u003ch3 id=\"великая-пирамида-как-энергетическое-устройство\"\u003eВеликая пирамида как энергетическое устройство\u003c/h3\u003e\n\u003cp\u003eВеликая пирамида в Гизе, лишенная своей первоначальной белой известняковой облицовки и золотой вершины, почти несомненно не была гробницей. Ни одна мумия никогда не была обнаружена внутри. Внутренние камеры с их точно расположенными гранитными блоками (некоторые весили до 80 тонн) больше похожи на компоненты электрического генератора, чем на погребальную камеру.\u003c/p\u003e\n\u003cp\u003eАнализ инженера Кристофера Данна в книге \u003cem\u003eЭнергетическая установка Гизы\u003c/em\u003e представляет подробный технический анализ, утверждая, что Великая пирамида функционировала как связанный осциллятор — устройство, которое преобразовывало вибрационную энергию Земли в микроволновое излучение. Так называемая \"Палата Царя\" содержит гранитные блоки с высоким содержанием кварца (что является пьезоэлектрическим), а \"Палата Королевы\" содержит каналы, покрытые солью, которые могли переносить химические растворы для производства водорода.\u003c/p\u003e\n\u003cp\u003eНедавнее открытие большой полости над Большой галереей с использованием мюонной томографии только углубило тайну. Что было в той пустоте? Официальные археологи не имеют объяснения. Но если пирамида была энергетическим устройством, полость могла бы разместить компонент, который был удален — украден — теми, кто стремился монополизировать технологию.\u003c/p\u003e\n\u003ch3 id=\"технология-собора\"\u003eТехнология собора\u003c/h3\u003e\n\u003cp\u003eВеликие соборы средневековой Европы, традиционно приписываемые набожности католической церкви, включают архитектурные и акустические характеристики, которые предполагают технологическую цель, далеко выходящую за рамки одного богослужения. Шпили, которые напоминают антенны; трубные органы, которые генерируют определенные частоты; цветные витражи, которые фильтруют свет в определенные длины волн; и подземные крипты, которые часто расположены над подземными источниками воды — все эти особенности согласуются со зданием, разработанным для сбора и передачи энергии.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые контролировали многие из лучших соборов Европы, знали бы об этом. Их орден поддерживал крупнейшую частную коллекцию научных инструментов в мире, и их обсерватории были одними из самых продвинутых в свое время. Знание было всегда там — оно было просто скрыто от публики.\u003c/p\u003e\n\u003cp\u003eКак \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/99-Buried_Cities_Underground.mp4\"\u003eПохороненные города подземелья\u003c/a\u003e исследует, многие из этих соборных структур были найдены частично похороненными, их нижние уровни затоплены грязью и наносами в образце, согласующемся с глобальным событием сброса.\u003c/p\u003e\n\u003ch2 id=\"война-против-человеческого-знания\"\u003eВойна против человеческого знания\u003c/h2\u003e\n\u003ch3 id=\"библиотеки-сожжены-записи-уничтожены\"\u003eБиблиотеки сожжены, записи уничтожены\u003c/h3\u003e\n\u003cp\u003eРазрушение Библиотеки Александрии — величайшего хранилища знаний древнего мира — это самый известный акт подавления информации, но это далеко не единственный. Испанские конкистадоры, действуя под руководством иезуитов, сожгли подавляющее большинство мезоамериканских кодексов. Из тысяч книг майя, которые когда-то существовали, выжили только четыре. Ацтекские и инкские записи страдали аналогично.\u003c/p\u003e\n\u003cp\u003eВ Китае иезуиты получили доступ к имперскому двору и его архивам. Что они нашли там — и что они отправили обратно в Ватикан — остается в значительной степени неизвестным. Что мы знаем, так это то, что китайское технологическое развитие, которое было на века впереди Европы, таинственно застопорилось во время и после периода иезуитского влияния.\u003c/p\u003e\n\u003cp\u003eЭтот образец — иезуиты прибывают, собирают знание, технологическое развитие останавливается — повторяется во всех цивилизациях, которых достигал орден. Это не совпадение. Это стратегия, которая была выполнена с военной точностью более 450 лет.\u003c/p\u003e\n\u003ch3 id=\"современная-машина-подавления\"\u003eСовременная машина подавления\u003c/h3\u003e\n\u003cp\u003eСегодня подавление технологии продолжается через сложную сеть патентных бюро, систем классификации и разведывательных агентств. Управление по патентам и товарным знакам Соединенных Штатов выдало более 5000 приказов секретности в соответствии с Законом о секретности изобретений 1951 года, эффективно классифицируя изобретения, считающиеся угрозой \"национальной безопасности\". Сколько из этих секретных патентов связаны со свободной энергией, антигравитацией или другими парадигмальными технологиями? Публика не имеет права знать.\u003c/p\u003e\n\u003cp\u003eРазведывательные агентства, которые обеспечивают это подавление — CIA, NSA и их международные коллеги — все являются прямыми потомками разведывательных сетей, установленных иезуитским орденом. Основатель CIA Аллен Даллес был образован в иезуитских учреждениях. Образец иезуитского проникновения в разведку и структуры власти, задокументированный в \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолических конфиденциальных сведениях: раскрытые постыдные секреты иезуитов\u003c/a\u003e, не является случайностью, а вековой стратегией контроля.\u003c/p\u003e\n\u003cp\u003eПредсмертный опыт Говарда Питтмана раскрыл демоническую иерархию, которая зеркалит земные структуры власти, которые мы видим сегодня. Демоны, которые управляют вторым небом — сфера между физическим миром и тронным залом Бога — работают через обман и подавление. Их цель, как описал Питтман, — держать человечество в невежестве, зависимости и поклонении \"самому себе\" вместо Бога. Подавление технологии свободной энергии идеально служит этой цели: оно держит человечество в зависимости от систем, управляемых элитой, и гарантирует, что знание о том, что действительно возможно, остается скрытым. Смотрите его свидетельство: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о предсмертном опыте Говарда Питтмана\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля дальнейших исследований, расследования на \u003ca href=\"https://agent131711.substack.com\"\u003eSubstack Agent131711\u003c/a\u003e предоставляют обширно задокументированные доказательства технологического подавления и исторических манипуляций.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eТвердь, Земля, Основание — Библейская космология\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eЗемля и твердь — что действительно говорит Писание\u00
