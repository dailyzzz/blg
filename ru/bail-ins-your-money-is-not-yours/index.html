тение. Писание определило механизм тысячи лет до того, как первый центральный банк открыл двери. Когда вы депонируете деньги в банк, вы верите, что вы сохраняете ваше богатство в безопасном хранилище. На самом деле вы одолжаете ваши деньги корпорации — и в момент, когда эта корпорация лицо неплатежеспособности, ваш депозит становится его имуществом.\u003c/p\u003e\n\u003cp\u003eЭто не заговор. Это договорное право. Транзакция, которую вы верили был сохранением, всегда была кредитом, и заимствующий написал правила, чтобы гарантировать, что он никогда не должен вам платить.\u003c/p\u003e\n\u003cp\u003eДревний образец мощных эксплуатирующих уязвимых через финансовую манипуляцию бежит через все Писание. От менял денег в храме к торговцам Вавилона в Откровении, финансовая система всегда служила как инструмент контроля для тех, кто ею владеет. Трек из альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/20-The_Great_Exchange.mp4\"\u003eВеликий обмен\u003c/a\u003e говорит к этому фундаментальному обману — обмену, где то, что вы верили вам обладал, никогда не было действительно вашим.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кипр-синий-март-2013\"\u003eКипр Синий: март 2013\u003c/h2\u003e\n\u003cp\u003e16 марта 2013 года люди на Кипре проснулись, чтобы открыть, что их правительство, в координации с Европейским центральным банком, Европейской комиссией и Международным валютным фондом, согласилось конфисковать порцию каждого банковского депозита в стране.\u003c/p\u003e\n\u003cp\u003eСчеты, держащие свыше 100 000 евро в Банке Кипра потеряли приблизительно 47,5% их депозитов. Вкладчики Laiki Bank выше страховочного порога потеряли почти все.\u003c/p\u003e\n\u003cp\u003eБанкоматы были отключены. Банковские переводы были заморожены. Контроли капитала были наложены, которые предотвращали граждан перемещении их собственных денег из страны. Люди, которые потратили десятилетия, экономя для выхода на пенсию, наблюдали почти половину своих сбережений исчезновения через ночь — не через рыночные потери, не через плохие инвестиции, но через государственный указ.\u003c/p\u003e\n\u003cp\u003eОфициальный термин был \"спасительные покупки.\" Вместо спасания неудачных банков с налогоплательщиком деньги (спасание), власти спасали их внутрь — используя депозитный фонд для рекапитализации неплатежеспособных учреждений. Вкладчики не были спрошены. Они не были предупреждены. Им было сказано после факта, что их депозиты были конвертированы в банковский капитал — акции в учреждениях, которые уже доказали себя неспособными управлять деньгами ответственно.\u003c/p\u003e\n\u003cp\u003eМеждународное финансовое учреждение не осудило это действие. Оно праздновало его. Кипр спасительные покупки были объявлены \"шаблоном\" для будущих банковских разрешений. Джероен Дийселбело, затем-президент Евро группе, явно указал, что модель Кипра будет использоваться снова.\u003c/p\u003e\n\u003cp\u003eПрецедент был установлен. Сценарий был написан. И законодательство, чтобы позволить это глобально, было уже в движении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"юридическая-реальность-вы-необеспеченный-кредитор\"\u003eЮридическая реальность: вы необеспеченный кредитор\u003c/h2\u003e\n\u003cp\u003eБольшинство людей верят, что их банковский депозит является их имуществом, удерживаемым в доверии банком. Это верование юридически неправильно.\u003c/p\u003e\n\u003cp\u003eКогда вы депонируете деньги в банк, вы входите в кредиторское отношение. Банк становится владельцем фондов. Вы становитесь кредитором — кем-то, кто должен деньги банком.\u003c/p\u003e\n\u003cp\u003eКонкретно, вы становитесь \u003cstrong\u003eнеобеспеченным кредитором\u003c/strong\u003e, означая вы имеете не обеспечение, поддерживающее вашу претензию. Если банк терпит неудачу, вы стоите в очереди позади:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eЗащищенных кредиторов\u003c/li\u003e\n\u003cli\u003eПроизводных контрагентов\u003c/li\u003e\n\u003cli\u003eДержателей облигаций\u003c/li\u003e\n\u003cli\u003eОперативных расходов\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТолько после рассчета всех этих претензий вкладчики видят пенни.\u003c/p\u003e\n\u003cp\u003eЭто не скрытое положение, похороненное в мелком печатном. Это фундаментальная юридическая структура банкинга в каждой западной стране. Верховный суд США установил этот принцип в 1800х. Британское общее право поддерживало его на века.\u003c/p\u003e\n\u003cp\u003eКогда банк идет неплатежеспособный, претензии вкладчика подчиняются претензиям защищенных кредиторов и производных контрагентов — и производный рынок, как исследуется в \u003ca href=\"/derivatives-weapons-mass-destruction/?lang=ru\"\u003eПроизводные: оружие массового финансового разрушения\u003c/a\u003e, во много раз превышает базу депозита каждого банка на земле.\u003c/p\u003e\n\u003cp\u003eВ спасительных покупках, депозитные фонды конвертируются в банковский капитал. Вы не получаете ваши наличные обратно. Вы получаете акции в неудачном банке. Ценность этих акций определена разрешением авторитета — не вами, не рынком, но регуляторами, которые не смогли предотвратить банковский крах в первом месте.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"доdd-frank-американская-рамка-спасительных-покупок\"\u003eДоdd-Frank: американская рамка спасительных покупок\u003c/h2\u003e\n\u003cp\u003eЗакон Dodd-Frank о реформе Уолл-Стрит и защите потребителей 2010 года был продан американской публике как гарантия от еще одного кризиса стиля 2008 года. На самом деле, название II из Dodd-Frank — \"Власть упорядоченной ликвидации\" — установила юридическую рамку для спасительных покупок в Соединенных Штатах.\u003c/p\u003e\n\u003cp\u003eПод названием II, Федеральная корпорация страхования депозитов (FDIC) имеет авторитет захватить неудачное \"системно важное финансовое учреждение\" и реструктурировать его. Эта реструктура может включать конвертацию необеспеченных обязательств — включая незастрахованные депозиты — в капитал.\u003c/p\u003e\n\u003cp\u003eFDIC и Банк Англии совместно опубликовали документ в декабре 2012 под названием \"Разрешение глобально активных, системно важных, финансовых учреждений\", которое явно описало стратегию спасительных покупок для обеих стран.\u003c/p\u003e\n\u003cp\u003eДокумент описывает \"единую точку входа\" стратегию разрешения, где:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eХолдинг-компания неудачного банка помещена в получение\u003c/li\u003e\n\u003cli\u003eЕго необеспеченные обязательства написаны вниз или конвертированы в капитал\u003c/li\u003e\n\u003cli\u003eВкладчики выше лимита страхования FDIC 250 000 долларов явно включены в пул обязательств, подлежащих конверсии\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eНо даже 250 000 долларов страхование FDIC имеет пределы, которые большинство вкладчиков не понимают. Фонд страхования депозитов FDIC удерживал приблизительно 128 миллиардов в 2023 году — против всего застрахованного депозитов свыше 10 триллионов.\u003c/p\u003e\n\u003cp\u003eЕсли несколько больших банков терпят неудачу одновременно — что ровно то, что системные кризисы производят — фонд FDIC недостаточен многими порядками. FDIC может заимствовать от казначейства, но в подлинном системном кризисе, политическая и финансовая воля, чтобы сделать вкладчиков целым далеко гарантирована.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"рамка-g20-политика-глобального-спасительных-покупок\"\u003eРамка G20: политика глобального спасительных покупок\u003c/h2\u003e\n\u003cp\u003eЭксперимент на Кипре не остался изолированный кейс изучения. В ноябре 2014 года, G20 наций формально приняла Совет финансовой стабильности \"Ключевые атрибуты эффективных режимов разрешения финансовых учреждений.\"\u003c/p\u003e\n\u003cp\u003eЭтот документ устанавливает спасительные покупки как стандартный механизм разрешения для неудачных банков через все G20 наций.\u003c/p\u003e\n\u003cp\u003eРамка требует каждую участвующую страну реализовать законодательство, позволяющее:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКонвертацию необеспеченных обязательств (включая депозиты) в капитал\u003c/li\u003e\n\u003cli\u003eНаписание вниз требований кредитора без согласия кредитора\u003c/li\u003e\n\u003cli\u003eТрансфер активов и обязательств для мостить учреждения\u003c/li\u003e\n\u003cli\u003eНаложение временных окончаний на ранние права прекращения\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКанада реализовала свой режим спасительных покупок через 2016 закон о бюджетной реализации. Европейский союз принял директиву восстановления и разрешения банков (BRRD), которая явно включает спасительные покупки как инструмент разрешения. Япония, Австралия и другие G20 наций следовали примеру.\u003c/p\u003e\n\u003cp\u003eСпасительные покупки — это не возможность. Это политика. Это закон. Это план.\u003c/p\u003e\n\u003cp\u003eЧто рамка G20 означает на практике, что в следующий раз большой банк — или несколько больших банков — лицо неплатежеспособности, ответ не будет быть 2008 модель налогоплательщиков финансировало спасания. Ответ будет вкладчик финансировали спасительные покупки.\u003c/p\u003e\n\u003cp\u003eВаши сбережения будут использоваться, чтобы рекапитализировать учреждение, которое потеряло ваши деньги.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"триггер-производных\"\u003eТриггер производных\u003c/h2\u003e\n\u003cp\u003eМеханизм наиболее вероятно, чтобы вызвать системный спасительный покупок событие — производный рынок. Как исследуется в \u003ca href=\"/derivatives-weapons-mass-destruction/?lang=ru\"\u003eПроизводные: оружие массового финансового разрушения\u003c/a\u003e, номинальная ценность из стоящих производных контрактов превышает 1,2 квадриллион — грубо 13 раз глобальный GDP.\u003c/p\u003e\n\u003cp\u003eПять самых больших США банков один раз держат производное воздействие, которое карлик их общие активы. JPMorgan Chase один раз удерживает выше 54 триллионов номинального производного воздействия против приблизительно 3,7 триллионов общих активов.\u003c/p\u003e\n\u003cp\u003eКогда производный контрагент терпит неудачу, каскадный эффект может отнести вниз несколько учреждений одновременно. Это ровно то, что произошло в 2008 году, когда неудача Lehman Brothers вызвала цепную реакцию через рынок обмена кредитного риска.\u003c/p\u003e\n\u003cp\u003eНо в 2008 году, правительства спасали банки с деньгами налогоплательщика. Рамка спасительных покупок гарантирует, что в следующий раз, они будут использовать ваши депозиты вместо.\u003c/p\u003e\n\u003cp\u003eПод рамкой разрешения, производные контрагенты пользуются \"безопасными гаванью\" положениями, которые дают им приоритет над вкладчиками. Это означает, что когда банк терпит неудачу:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eПроизводные требования рассчитаны сначала\u003c/li\u003e\n\u003cli\u003eЧто остается доступным для вкладчиков\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eУчитывая, что производное воздействие значительно превышает базы депозита, математический результат ясен: в системном производном отказе, вкладчики получают ничего, или закройте это.\u003c/p\u003e\n\u003cp\u003eСистема была разработана так, что самые спекулятивные, опасные и дестабилизирующие финансовые инструменты — производные — защищены, пока самые мундане и существенные — сбережения депозитов — пожертвованы.\u003c/p\u003e\n\u003cp\u003eЭто не несчастье. Это архитектура.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"cbdc-endgame\"\u003eCBDC Endgame\u003c/h2\u003e\n\u003cp\u003eРамка спасительных покупок должна быть понята в связи с толчком к центральному банку цифровым валютам, как задокументировано в \u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eCBDC цепи: программируемые деньги, которые контролируют вас\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eОтстранение физического наличного удаляет последний маршрут отступления для вкладчиков, которые иначе могли бы выводить свои фонды перед спасительными покупками, которые может быть выполнено.\u003c/p\u003e\n\u003cp\u003eНа Кипре, правительство было вынужено наложить контроли капитала и отключить банкоматы, чтобы предотвратить рейды банка. Это было беспорядочно, разрушающе и политически дорого.\u003c/p\u003e\n\u003cp\u003eВ полностью цифровой денежной системе, процесс бесшумный:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСчеты могут быть заморожены с нажатием клавиши\u003c/li\u003e\n\u003cli\u003eОтступления могут быть заблокированы незаметно\u003c/li\u003e\n\u003cli\u003eСпасительные покупки могут быть выполнены до того, как вкладчики даже реализуют, что происходит\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCBDC завершает архитектуру спасительных покупок путем отстранения возможности физического отступления. Когда все деньги цифровые и удерживаются в банковской системе, система имеет полный контроль над вашими фондами во всех временах.\u003c/p\u003e\n\u003cp\u003eСпасительные покупки не являются риском в мире CBDC — это особенность. Программируемая природа цифровой валюты означает ваш остаток может быть отрегулирован, уменьшен или конфискован без вашего согласия и без любого физического действия требуемого.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-страхование-депозитов-действительно-означает\"\u003eЧто страхование депозитов действительно означает\u003c/h2\u003e\n\u003cp\u003eКонцепция страхования депозитов — FDIC в Соединенных Штатах, FSCS в Соединенном Королевстве, CDIC в Канаде — обеспечивает чувство ложной безопасности, которое позволяет архитектуре спасительных покупок функционировать без общественного сопротивления.\u003c/p\u003e\n\u003cp\u003eСтрахование депозитов было создано после великого расстройства, чтобы предотвратить банковские бежавства путем уверения вкладчиков, что их фонды были \"гарантированы правительством\" и поэтому неуязвимы. Психологический эффект был огромно успешен.\u003c/p\u003e\n\u003cp\u003eБольшинство людей верят их депозиты \"гарантированы правительством\" и поэтому неуязвимы. Это верование — основание, на котором лежит архитектура спасительных покупок.\u003c/p\u003e\n\u003cp\u003eНо фонды страхования депозитов — фракция всех застрахованных депозитов:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eФонд FDIC представляет приблизительно \u003cstrong\u003e1,27% застрахованных депозитов\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eЭто означает система работает только так долго как банк отказывает изолированные, управляемые и нечастые\u003c/li\u003e\n\u003cli\u003eВ системном кризисе — несколько больших банков терпящих неудачу одновременно — фонд страхования округляется ошибка\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПравительство может печатать деньги, чтобы покрыть недостаток, но это вызывает инфляцию, которая приносит реальную ценность депозитов также эффективно как прямая конфискация.\u003c/p\u003e\n\u003cp\u003eСтрахование депозитов не является гарантией. Это трюк уверенности — один, который держит вкладчиков спокойным, пока архитектура спасительных покупок построена вокруг них.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"исторический-образец\"\u003eИсторический образец\u003c/h2\u003e\n\u003cp\u003eМодель спасительных покупок не возникла из ничто. Это последняя итерация образца, который расширяет через всю финансовую историю:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДревний Рим.\u003c/strong\u003e Императоры обесценили валюту — сокращение содержание серебра монет — финансировать военные расходы. Граждане, которые удерживали монеты, видели их покупательную власть конфискована через обесценение.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСредневековая Европа.\u003c/strong\u003e Короли захватили богатство Рыцарей Templar, самое мощное финансовое учреждение их эпохи, через координированные аресты и конфискацию в 1307 году.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВеликое расстройство.\u003c/strong\u003e Исполнительный приказ 6102 (1933) требовал американские граждане сдать их золото Федеральному резервному банку на 20,67 долларов за унцию. После конфискации, правительство переоценивало золото на 35 долларов за унцию —69% девальвация валюты.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКипр 2013.\u003c/strong\u003e Вкладчик фонды изъяты, чтобы рекапитализировать неудачные банки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИндия 2016.\u003c/strong\u003e 86% валюты дематериализировано через ночь, принудив держателей наличного в цифровую банковскую систему.\u003c/p\u003e\n\u003cp\u003eКаждый эпизод следует тем же образцом: система лицо кризиса своего собственного создания, и разрешение финансирована путем конфискации богатства обычных людей.\u003c/p\u003e\n\u003cp\u003eРамка спасительных покупок не является инновацией. Это институционализация этого древнего образца — формализация воровства через закон.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Не собирайте себе сокровищ на земле, где моль и ржа разрушают и где воры взламывают и крадут; но собирайте себе сокровища на небе, где ни моль ни ржа не разрушают и где воры не взламывают и не крадут.\" — Матфея 6:19-20\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПредупреждение Христа было не просто духовным советом о приоритетах. Это было практическое заявление о природе земного богатства. Системы, построенные падшими людьми, будут всегда, в конце концов, конфисковать то, что они держат.\u003c/p\u003e\n\u003cp\u003eСокровище, хранящееся в хранилищах человеческих учреждений, никогда не является действительно безопасным, потому что сами учреждения служат интересы, которые не ваши. Рамка спасительных покупок — просто последняя итерация образца столь же старый как египетские зерновые магазины под фараоном — централизованное хранилище богатства, которое становится централизованной конфискацией богатства, когда система требует это.\u003c/p\u003e\n\u003cp\u003eДуховный урок — не то, что деньги не имеют значение. Это то, что размещение вашей безопасности в системах, разработанных и управляемых теми, кто не отвечает перед Богом, это акт неправильно размещенной веры.\u003c/p\u003e\n\u003cp\u003eВкладчик, который доверяет FDIC, помещен вера в учреждение. Христианин, который доверяет в обеспечение Бога, помещен вера в провайдер.\u003c/p\u003e\n\u003cp\u003eКогда спасительные покупки прибывают — и это будет прибывать — вопрос не сколько вы имел в банке. Вопрос в где ваше истинное сокровище было сохранено.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о предсмертном опыте Говарда Питтмана — предупреждение об окончательных временах, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические конфиденциальные сведения: раскрытые постыдные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eУбийство и фармакея — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/229-Digital_Dollar_Dragnet.mp4\"\u003eЦифровой сетевой анализ доллара\u003c/a\u003e — цифровая валютная ловушка\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/161-CBDC_Chains.mp4\"\u003eЦепи CBDC\u003c/a\u003e — программируемые деньги и финансовый контроль\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/great-taking-financial-asset-seizure/?lang=ru\"\u003eБольшое отнятие: как они будут захватывать ваши финансовые активы\u003c/a\u003e — юридическая рамка для изъятия ценных бумаг и финансовых активов вне банковских депозитов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eЦепи CBDC: программируемые деньги, которые контролируют вас\u003c/a\u003e — как центральный банк цифровой валютный завершает финансовую контрольную сетку\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eДеньги в вашем банковском счете — не ваши. Это никогда не было. Юридическая рамка говорит так, планы разрешения подтверждают это, и прецедент Кипра доказал это. Когда следующий финансовый кризис прибывает — и производный временная бомба гарантирует это будет — ваши депозиты — обозначенная жертва. Богатые господства над бедным, и система, которую они построили, гарантирует это остается таким образом. Магазин ваше сокровище, где никакие спасительные покупки не могут достичь. Хранилища людей будут опустошены. Обещания Бога не будут.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/finance/\",\"className\":\"category-badge\",\"children\":\"finance\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Спасительные покупки: ваши деньги не ваши\"}],[\"
