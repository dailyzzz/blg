 для чрезвычайных ситуаций общественного здравоохранения, приказов правительства или институциональной политики. Когда государство издает политику, которая приводит к смерти тех, которых оно поклялось защищать — пожилых, уязвимых, беззащитных — моральный вес этой заповеди падает на каждого официального лица, которое разработало, реализовало и защищало эту политику.\u003c/p\u003e\n\u003cp\u003eКак выявляет трек Confliction \"Проклятие змея\" (The Serpent's Curse), проклятие работает через системы, которые трансформируют защитников в predators — системы, в которых учреждения, доверенные с заботой уязвимых, становятся инструментами их разрушения.\u003c/p\u003e\n\u003cp\u003eПолитика COVID-19 больницы Нью-Йорка направила размещение COVID-положительных пациентов в дома престарелых — учреждения, жилые наиболее уязвимые население для болезни. Результат был катастрофическим смертным припаиванием среди пожилых. Республиканцы в палате требуют ответственности за то, что может быть одним из наиболее последствиальных отказов политики в американской истории.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"директива-дома-престарелых-нью-йорка\"\u003eДиректива дома престарелых Нью-Йорка\u003c/h2\u003e\n\u003cp\u003e25 марта 2020 года Департамент здравоохранения штата Нью-Йорк выдал директиву, требующую домам престарелых принять пациентов, которые тестировались положительно на COVID-19 или подозревались в наличии COVID-19. Директива указана: \"Никакой житель не должна быть отказана в повторном поступлении или поступлении в дом престарелых исключительно на основе подтвержденного или подозреваемого диагноза COVID-19.\"\u003c/p\u003e\n\u003cp\u003eДиректива была издана под руководством администрации губернатора Andrew Cuomo, которая оправдала политику как необходимую для сохранения больничной емкости. Больницы лечили пациентов COVID-19 и нуждались в кроватях. Дома престарелых, так рассуждение шло, были надлежащей обстановкой для пациентов, которые были стабильными достаточно, чтобы оставить больницу, но еще не очищены от вируса.\u003c/p\u003e\n\u003cp\u003eПоследствие было предсказуемым и предсказанным. Медицинские эксперты предупредили, что размещение COVID-положительных пациентов в домах престарелых — закрытые окружающие среды, жилые пожилые жители с несколькими comorbidities и ослабленными иммунными системами — вызвало бы массовую смерть. Они были права.\u003c/p\u003e\n\u003cp\u003eОценивается 15,000 или больше жителей дома престарелых в Нью-Йорке умер от COVID-19 в течение первого года пандемии. Фактическое число остается spited, потому что администрация Cuomo позже была обнаружена, чтобы undercounted дома престарелых смерти, скольку до 50%, исключая жителей, которые были переданы в больницы перед умиранием из count \"дом престарелых смерти.\"\u003c/p\u003e\n\u003cp\u003eKaren Kingston проанализировала дом престарелых бедствие в The Kingston Report: \"Директива дома престарелых была не политической ошибкой. Это была политика, которая была предсказуемой в ее последствиях, предупреждена медицинскими профессионалами, реализована над возражениями и затем скрыта, когда те последствия материализовались. Вопрос не в том, создают ли официальные лица ошибку — вопрос в том, совершили ли они преступление.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"укрытие\"\u003eУкрытие\u003c/h2\u003e\n\u003cp\u003eАдминистрация Cuomo не просто реализовала смертельную политику — она скрыла результаты. Офис генерального прокурора штата Нью-Йорк выдал доклад в январе 2021, обнаружив, что администрация Cuomo undercounted COVID-19 смерти среди жителей дома престарелых приблизительно 50%.\u003c/p\u003e\n\u003cp\u003eUndercounts была не случайной. Это было достигнуто путем исключения из дома престарелых смертельной счета любого жителя, который был перемещен из дома престарелых в больницу перед умиранием. По этому методу бухгалтерского учета, житель дома престарелых, который заключил COVID-19 в доме престарелых, был перемещен в больницу и умер в больнице, не был учтен как смерть дома престарелых — хотя инфекция была приобретена в доме престарелых как прямой результат политики размещения.\u003c/p\u003e\n\u003cp\u003eЭта манипуляция бухгалтерского учета служила политической цели: она скрыла масштаб бедствия и защитила губернатора от ответственности. Cuomo использовал искусственно низкие номера смерти дома престарелых, чтобы спорить, что его политика была эффективной и написать книгу, праздничной его лидерства пандемии.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"расследование-конгресса\"\u003eРасследование конгресса\u003c/h2\u003e\n\u003cp\u003eРеспубликанцы в палате начали формальное расследование в политику COVID-19 дома престарелых Нью-Йорка. Расследование ищет:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДокументы:\u003c/strong\u003e Все коммуникации между кабинетом губернатора, Департаментом здравоохранения штата Нью-Йорк, администраторами дома престарелых и федеральными агентствами, связанными с директивой размещения дома престарелых.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСвидетельство:\u003c/strong\u003e Свидетельское показание под присягой от государственных должностных лиц, вовлеченных в создание, реализацию и сокрытие политики дома престарелых.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДанные:\u003c/strong\u003e Точные, неманипулируемые данные на смерти дома престарелых, включая жителей, которые были переданы в больницы перед умиранием.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОтветственность:\u003c/strong\u003e Идентификация лиц, ответственных за директиву, undercounts и любое препятствие предыдущим расследованиям.\u003c/p\u003e\n\u003cp\u003eРасследование сталкивается с значительными правовыми и политическими препятствиями. Официальные лица штата Нью-Йорк исторически сопротивлялись федеральному надзору политики здравоохранения штата, ссылаясь на federalism и государственный суверенитет. Однако федеральная юрисдикция установлена ​​использованием федерального финансирования Medicaid — дома престарелых, получающие платежи Medicaid, подлежат федеральному надзору, и неправильное управление учреждениями, финансируемыми Medicaid, создает федеральную ответственность.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"национальный-образец\"\u003eНациональный образец\u003c/h2\u003e\n\u003cp\u003eНью-Йорк не был один. По крайней мере пять штатов — Нью-Йорк, Нью-Джерси, Мичиган, Пенсильвания и Калифорния — реализовали подобные директивы размещения дома престарелых в течение ранних месяцев пандемии. Каждый штат испытал повышенные смертные припаивания дома престарелых. Объединенный смертельный припайание по этим штатам представляет значительную долю коэффициента U.S. COVID-19 смерти в 2020.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческое-измерение\"\u003eПророческое измерение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Проклята рука, которая сторожит брата своего; все люди скажут: аминь. Проклята рука, которая ослепляет слепого; все люди скажут: аминь.\" — Второзаконие 27:17-18\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПисание размещает специальное проклятие на тех, кто использует уязвимых — тех, кто удаляет слепых из безопасности, кто лишает беззащитных защиты, кто использует их авторитет причинить вред тем, кто не может сопротивляться. Жители дома престарелых Нью-Йорка были среди наиболее уязвимых людей в американском обществе — пожилые, infirm, зависимые от институциональной помощи, неспособные выступать за себя или избежать опасности, помещенной в их в центре.\u003c/p\u003e\n\u003cp\u003eОфициальные лица, которые направили COVID-положительных пациентов в их дома, одержимые авторитетом государства. Официальные лица, которые скрыли смертельный припайание, одержимые авторитетом данных. Ни один авторитет не выдержит перед судом Бога.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"предупреждение-из-1-царств-8\"\u003eПредупреждение из 1 Царств 8\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: слушайся голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отзывается в каждом правительственном коридоре сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил его точно, что произойдет — его сыновей возьмут на войну, его дочерей в услужение, его поля и виноградники отберут, десятину всего конфискуют. Они выбрали человеческое правительство вместо царства Божьего, и тирания последовала точно так, как было обещано. Ничего не изменилось. Современная политическая система — два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной скрытой структуре власти. Голосование за ту или другую сторону — это выбор, какое крыло будет махать дальше, пока птица летит в том же направлении. Реальная власть никогда не была на избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eРасследование Республиканцев Палаты — записи слушания Конгресса и документация повестки\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — анализ Karen Kingston директив дома престарелых, многогосударственной координации и манипуляции данных\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eГенеральный прокурор Нью-Йорка — Доклад на undercounting смерти дома престарелых\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eДепартамент здравоохранения Нью-Йорка — 25 марта 2020 директива\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eИсход 20:13, Второзаконие 27:17-18 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — программы правительства, обращающие с уязвимыми популяциями как расходные\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e — коррупция учреждения, скрывающая последствия решений политики\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zz
