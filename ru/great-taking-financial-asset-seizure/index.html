исывают нечестивых как тех, кто берет взаймы без намерения возвращать — кто берет то, что не его и структурирует договоренности, чтобы убедиться, что они никогда не должны возвращать это. Великое захватывание, как задокументировано исследователем Дэвидом Роджерсом Веббом, раскрывает, что этот древний образец был кодифицирован в современное право. Через десятилетия тихих правовых изменений финансовая система была реструктурирована так, что ценные бумаги, которые вы верите, что владеете — ваши акции, облигации, паевые инвестиционные фонды, пенсионные счета — больше не являются юридически вашими. Вы держите \"право\" на них, и в финансовом кризисе это право подчинено претензиям обеспеченных кредиторов. Ваши активы уже были заложены в залог за долги, которые вы никогда не согласились гарантировать.\u003c/p\u003e\n\u003cp\u003eЭто не спекуляция. Это устав. Правовая база была построена на протяжении десятилетий, протестирована в суде и гармонизирована во всех юрисдикциях. Захватывание еще не произошло, но механизм полностью завершен. Трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e освещает эту скрытую реальность — огонь, который горит невидимо, опасность, которая существует в темноте, куда немногие смотрят, разрушение, которое подготавливается в секрете перед тем, как оно появляется в свет.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дэвид-роджерс-вебб-исследователь\"\u003eДэвид Роджерс Вебб: исследователь\u003c/h2\u003e\n\u003cp\u003eДэвид Роджерс Вебб — бывший менеджер хедж-фонда и инсайдер финансовой промышленности, который потратил десятилетия, работая в глобальной финансовой системе, прежде чем обратить свой опыт на исследование ее архитектуры. Его книга и документальный фильм, оба озаглавленные \"Великое захватывание\", представляют детальный правовой и исторический анализ того, как владение ценными бумагами было систематически подорвано.\u003c/p\u003e\n\u003cp\u003eУчетные данные Вебба не принадлежат аутсайдеру, глядящему вовнутрь. Он управлял деньгами на самых высоких уровнях. Он понимал производные, системы клиринга и право о ценных бумагах изнутри. Его работа основана не на предположении — она основана на тщательном исследовании правовых текстов, пересмотров UCC, нормативных изменений и структуры современной системы удержания ценных бумаг.\u003c/p\u003e\n\u003cp\u003eЕго центральный тезис разрушителен в его простоте: правовые изменения, которые были реализованы за последние пятьдесят лет, преобразовали владение ценными бумагами в подчиненное требование — \"право\", которое уступает претензиям обеспеченных кредиторов. В случае системного финансового краха обеспеченные кредиторы (в основном контрагенты производных инструментов и крупные финансовые учреждения) будут иметь первый иск на все ценные бумаги, включая те, что находятся на вашем счете брокера, вашем 401(k) и вашем IRA.\u003c/p\u003e\n\u003ch2 id=\"революция-статей-ucc-8\"\u003eРеволюция статей UCC 8\u003c/h2\u003e\n\u003cp\u003eМеханизм Великого захватывания коренится в изменениях статьи 8 Единообразного коммерческого кодекса (UCC) — органа закона, который управляет коммерческими сделками в Соединенных Штатах и был гармонизирован на международном уровне через похожие базы.\u003c/p\u003e\n\u003cp\u003eДо пересмотров, когда вы покупали акцию или облигацию, вы держали прямой имущественный интерес в этой ценной бумаге. Вы были владельцем в том же правовом смысле, что и владеете своим домом или своим автомобилем. Ваш брокер держал безопасность от вас, но владение было вашим — прямое имущественное право, которое не могло быть отнято без надлежащего судебного разбирательства.\u003c/p\u003e\n\u003cp\u003eПересмотренная статья 8, принятая в 1990-х годах, вввела новую категорию: \"право на ценные бумаги\". В соответствии с этой базой, когда вы покупаете ценную бумагу через брокера, вы не получаете прямой имущественный интерес. Вместо этого вы получаете \"право\" — претензию на вашего брокера за стоимость ценной бумаги. Брокер, в свою очередь, держит ценную бумагу (или право на нее) в Депозитарно-трастовой компании (DTC), центральном клиринговом доме для практически всех ценных бумаг в Соединенных Штатах.\u003c/p\u003e\n\u003cp\u003eРазличие между владением и правом юридически критично. Владелец недвижимости имеет прямую претензию на саму недвижимость. Держатель права имеет претензию на посредника — и эта претензия подчинена претензиям обеспеченных кредиторов посредника. Если посредник потерпит неудачу, держатель права стоит позади обеспеченных кредиторов в очереди банкротства.\u003c/p\u003e\n\u003ch2 id=\"депозитарно-трастовая-компания\"\u003eДепозитарно-трастовая компания\u003c/h2\u003e\n\u003cp\u003eДепозитарно-трастовая компания (DTC) — это учреждение, которое держит практически все публично торгуемые ценные бумаги в Соединенных Штатах. Когда вы покупаете акции через вашего брокера, акции не регистрируются на ваше имя. Они зарегистрированы в имени \"Cede \u0026#x26; Co.\" — уполномоченного имени DTC. Ваш брокер имеет право от DTC. Вы имеете право от вашего брокера. Фактическое владение — прямое имущественное право — принадлежит Cede \u0026#x26; Co.\u003c/p\u003e\n\u003cp\u003eЭта структура была реализована якобы для эффективности. Перемещение физических сертификатов акций между сторонами с каждой сделкой было громоздким и медленным. DTC централизовала удержание ценных бумаг, позволяя электронному расчету. Но эффективность пришла ценой, которая никогда не была объяснена инвесторам: передача владения от отдельных инвесторов централизованному учреждению.\u003c/p\u003e\n\u003cp\u003eТы не владелец твоих акций. Cede \u0026#x26; Co. является. Ты держишь цепь прав — претензию на вашего брокера, который держит претензию на DTC, которая держит фактические ценные бумаги. В системе, работающей нормально, это различие невидимо. В системном кризисе это становится разницей между наличием активов и их отсутствием.\u003c/p\u003e\n\u003ch2 id=\"переклассификация-твои-активы-их-залог\"\u003eПереклассификация: твои активы, их залог\u003c/h2\u003e\n\u003cp\u003eСтруктура прав позволяет практику, называемой переклассификацией — использование активов клиента в качестве залога для собственных заимствований брокера и торговой деятельности. Когда ваш брокер держит ваши ценные бумаги как права, а не как прямую собственность, он может юридически заложить эти ценные бумаги в качестве залога для собственных позиций производных инструментов, маржинальных кредитов и других финансовых обязательств.\u003c/p\u003e\n\u003cp\u003eЭто не маргинальная практика. Это стандартная операционная процедура глобальной финансовой системы. Соглашения брокера-дилера — мелкий шрифт, который вы принимаете при открытии счета брокера — типически включают положения, позволяющие брокеру переклассифицировать ваши ценные бумаги. Ваши акции используются для поддержки ставок, которые вы никогда не делали, на рынках, о которых вы никогда не слышали, с контрагентами, которых вы никогда не узнаете.\u003c/p\u003e\n\u003cp\u003eКогда брокер потерпит неудачу — и в системном кризисе несколько брокеров потерпят неудачу — обеспеченные кредиторы, которые держат ваши переклассифицированные ценные бумаги в качестве залога, имеют первый иск. Ваше право подчинено. Активы, которые вы думали, что владеете, будут использованы для расчета обязательств брокера, и вы получите то, что остается — что в системном краахе будет ничем.\u003c/p\u003e\n\u003ch2 id=\"безопасная-гавань-юридический-щит\"\u003eБезопасная гавань: юридический щит\u003c/h2\u003e\n\u003cp\u003eОснова усиливается положениями \"безопасной гавани\" в законе о банкротстве, которые защищают контрагентов производных инструментов от нормального процесса разбирательства о банкротстве. В соответствии с этими положениями контрагенты производных инструментов могут немедленно захватить залог — без ожидания одобрения суда о банкротстве, без \"автоматического отстранения\", которое обычно защищает активы в банкротстве.\u003c/p\u003e\n\u003cp\u003eЭто означает, что в случае банковского или брокерского краха контрагенты производных инструментов захватят свой залог — включая ваши переклассифицированные ценные бумаги — до того, как процесс банкротства даже начнется. К моменту, когда суд рассмотрит вашу претензию права, активы будут ушли. Юридически и необратимо ушли.\u003c/p\u003e\n\u003cp\u003eВебб задокументировал, как эти положения безопасной гавани были расширены на протяжении десятилетий посредством законодательства, включая Закон о предотвращении пренебрежения банкротством и защите потребителей 2005 года — принятый, по иронии судьбы, всего за три года до кризиса производных инструментов 2008 года, который продемонстрировал ровно то, насколько опасными были эти инструменты.\u003c/p\u003e\n\u003ch2 id=\"международная-гармонизация\"\u003eМеждународная гармонизация\u003c/h2\u003e\n\u003cp\u003eВеликое захватывание — это не американский феномен. Правовая база была гармонизирована по юрисдикциям посредством международных соглашений и модельных законов. Директива ЕС о завершенности расчетов, Директива о финансовом залоге и Гаагская конвенция о праве, применимом к определенным правам в отношении ценных бумаг, удерживаемых у посредника, все устанавливают похожие основы, которые подчиняют держателей прав обеспеченным кредиторам.\u003c/p\u003e\n\u003cp\u003eЭта гармонизация гарантирует, что Великое захватывание может работать глобально. Ценные бумаги, удерживаемые в любом крупном финансовом рынке — Нью-Йорк, Лондон, Франкфурт, Токио, Гонконг — подвергаются той же структуре прав и той же подчиненности обеспеченным кредиторам. Нет покупок юрисдикций. Правовая база универсальна.\u003c/p\u003e\n\u003cp\u003eГармонизация не была случайной. Она была согласована через международные органы, включая BIS, IOSCO (Международную организацию комиссий по ценным бумагам) и UNIDROIT (Международный институт унификации частного права). Учреждения, которые согласовали глобальное развитие CBDC, — это те же учреждения, которые согласовали правовую базу для захвата активов. Согласованность повестки дня не вызывает сомнений.\u003c/p\u003e\n\u003ch2 id=\"сценарий-триггера\"\u003eСценарий триггера\u003c/h2\u003e\n\u003cp\u003eВебб описывает конкретный сценарий, в котором Великое захватывание будет выполнено:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eКризис, управляемый производными инструментами, запускает отказ нескольких крупных финансовых учреждений одновременно — как почти произошло в 2008 году и как задокументировано в \u003ca href=\"/derivatives-weapons-mass-destruction/?lang=ru\"\u003eПроизводные: оружие массового финансового разрушения\u003c/a\u003e.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eПоложения безопасной гавани позволяют контрагентам производных инструментов немедленно захватить залог — включая переклассифицированные ценные бумаги клиента — без авторизации суда.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eОставшиеся ценные бумаги клиента, удерживаемые в DTC, подвергаются претензиям обеспеченных кредиторов банков-неудачников и клиринговых учреждений.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eДержатели прав (отдельные инвесторы, пенсионные фонды, пенсионные счета) находят, что их \"активы\" были использованы для расчета обязательств, которые они никогда не авторизовали.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eБаза bail-in — детально раскрыта в \u003ca href=\"/bail-ins-your-money-is-not-yours/?lang=ru\"\u003eBail-Ins: Ваши деньги не ваши\u003c/a\u003e — преобразует оставшиеся требования депозиторов и кредиторов в акции в реструктурированных учреждениях.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eСистема CBDC — описано в \u003ca href=\"/cbdc-chains-programmable-money/?lang=ru\"\u003eCBDC Chains: Программируемые деньги, которые вас контролируют\u003c/a\u003e — развернута как замещающая финансовая инфраструктура, с прямым контролем центрального банка над всеми деньгами.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eПоследовательность не спекулятивна. Каждый компонент существует в праве и нормативно сегодня. Сценарий требует только триггер — системный отказ производных инструментов — для приведения в движение всей последовательности.\u003c/p\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003cp\u003eРабота Вебба не просто диагностическая — она предназначена для провоцирования действия. Его рекомендации включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПрямую регистрацию.\u003c/strong\u003e Удаление ваших ценных бумаг из цепи прав путем запроса прямой регистрации (DRS) через агента передачи каждой компании, чьи акции вы владеете. Напрямую зарегистрированные акции удерживаются на ваше имя, а не в имени Cede \u0026#x26; Co., и не подлежат структуре прав.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФизическое владение.\u003c/strong\u003e Для облигаций и других инструментов, запрос физических сертификатов, где доступно. Физическое владение устанавливает прямые имущественные права.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗаконодательное действие.\u003c/strong\u003e Требование от государственных и федеральных законодателей отменить изменения статьи 8 UCC и восстановить прямые имущественные права для держателей ценных бумаг.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОсведомленность.\u003c/strong\u003e Великое захватывание зависит от неясности. Правовые изменения были сделаны тихо, на протяжении десятилетий, без общественной осведомленности или дебатов. Самая важная защита — это понимание — знание того, что было сделано, и требование, чтобы это было отменено.\u003c/p\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Вор приходит только, чтобы украсть, убить и уничтожить; Я пришел, чтобы у них была жизнь, и чтобы у них была ее в полноте.\" — Иоанна 10:10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВор не объявляет себя. Он приходит тихо, в темноте, когда семья спит. Великое захватывание было построено ровно так — не через драматический захват, а через тихой пересмотр правовых текстов, которые большинство людей никогда не читает и которые еще меньше понимают. Имущественные права, которые поколения инвесторов предполагали, что они владеют, были заменены на подчиненные права посредством изменений настолько технических, что они полностью избежали общественного внимания. Вор уже был в доме. Он уже заменил замки. Он просто ждет правильного момента, чтобы закрыть дверь позади себя.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"найти-больше-информации\"\u003eНайти больше информации\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/229-Digital_Dollar_Dragnet.mp4\"\u003
