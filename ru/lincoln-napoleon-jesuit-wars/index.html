овал верующих терпеть работы тьмы. Он не советовал приспособление, диалог или мирное сосуществование со злом. Он приказал разоблачение. Обличайте их. Заставьте свет. Назовите тьму тем, что это является. Обязанность христианина — не просто избегать зла, но разоблачать его — вытягивать его из теней в свет, где он может быть виден, идентифицирован и переопределен.\u003c/p\u003e\n\u003cp\u003eДва из самых мощных лидеров в современной истории подчинились этому приказу, независимо от того, знали они это или нет. Авраам Линкольн, шестнадцатый президент Соединенных Штатов и Наполеон Бонапарт, Император Франции, оба определили Общество Иисуса как скрытую силу позади войн, революций и убийств, которые сформировали их эру. Они пришли из разных наций, разных столетий и разных политических традиций. Они согласились практически ни на что. Но на идентичности врага, действующего в тенях, они говорили с одним голосом.\u003c/p\u003e\n\u003cp\u003eДокументальный фильм \u003cem\u003eCatholic Confidential\u003c/em\u003e компилирует их свидетельство рядом со свидетельством других свидетелей, которые достигли тот же вывод независимо. Конвергенция этих независимых свидетелей — люди, которые не имели связи друг с другом, не имели общей программы, не имели общей предвзятости — представляет доказательство экстраординарного веса. Когда французский император и американский президент, разделенные полувеком, называют одного врага, используя почти идентичный язык, рациональный ответ — это не скептицизм, но внимание.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eOne Nation Under Blackmail — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eЛожь обманщика — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"война-линкольна-иезуиты-и-американская-гражданская-война\"\u003eВойна Линкольна: иезуиты и американская гражданская война\u003c/h2\u003e\n\u003ch3 id=\"обвинение-президента\"\u003eОбвинение президента\u003c/h3\u003e\n\u003cp\u003eАвраам Линкольн не просто предложил участие иезуитов в гражданской войне. Он заявил это как вопрос факта, с авторитетом президента, который имел доступ к наиболее всеобъемлющей разведке, доступной любому лицу в Америке:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Эта война, американская гражданская война, была бы невозможна без зловещего влияния иезуитов. Мы обязаны папскому правлению, что мы теперь видим нашу землю покрасневшей кровью ее благородных сынов.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eГражданская война убила более 600 000 американцев — больше, чем все другие американские войны в сочетании до двадцатого века. Линкольн приписал эту катастрофу не рабству в одиночку, не политическому несогласию, не экономической конкуренции между Севером и Югом, но \"зловещему влиянию иезуитов\". Он считал \"папское правление\" — папскую систему и его иезуитский инструмент — ответственным за кровь, которая покрасила американскую почву.\u003c/p\u003e\n\u003cp\u003eЭто не язык случайного подозрения. Это формальное обвинение президента Соединенных Штатов, сделанное во время наиболее опустошительной войны в американской истории, определяющей конкретную организацию как силу, которая сделала войну возможной. У Линкольна был доступ к военной разведке, дипломатической корреспонденции и отчетам контрразведки. Его обвинение было не основано на предубеждении. Это было основано на доказательстве.\u003c/p\u003e\n\u003ch3 id=\"конфедеративная-связь\"\u003eКонфедеративная связь\u003c/h3\u003e\n\u003cp\u003eЛинкольн был конкретен о механизме иезуитского влияния на Конфедерацию:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Ни Джефф Дэвис, ни кто-либо из ведущих людей конфедерации не осмелились бы атаковать север, если бы они не полагались на обещание иезуитов.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eДжефферсон Дэвис и конфедеративное руководство, согласно Линкольну, не действовали независимо. Они полагались на обещания от иезуитов — обещания поддержки, обещания европейского вмешательства, обещания ресурсов и помощи. Конфедерация не вела войну по своей инициативе. Это вело войну, потому что иезуиты поощряли это, поддерживали это и обещали это поддержка это нужно было, чтобы преуспевать.\u003c/p\u003e\n\u003cp\u003eИсторические доказательства поддерживают оценку Линкольна. Конфедерация отчаянно искала европейское признание и вмешательство. Католические монархии Европы — Франция под Наполеоном III и Австрия под Габсбургами, обе глубоко под влиянием иезуитских советников — были наиболее сочувственны конфедеративной причине. Наполеон III действительно установил католического императора, Максимилиана, в Мексике во время гражданской войны, создавая католическую монархию на американской южной границе. Это было не совпадением. Это было координацией.\u003c/p\u003e\n\u003ch3 id=\"иммиграция-агентов\"\u003eИммиграция агентов\u003c/h3\u003e\n\u003cp\u003eЛинкольн понимал более широкий контекст иезуитской стратегии в Америке:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Протестанты обоих Северных и Южных, безусловно, объединятся, чтобы истребить священников и иезуитов, если они смогли узнать, как священники, монахини и монахи, которые ежедневно приземляют на наших берегах, под видом проповеди их религии, не являются ничем, кроме эмиссаров Папы, Наполеона III и других деспотов Европы, чтобы подорвать наши учреждения, отчужживать сердца нашего народа от нашей конституции и наших законов, разрушить наши школы и подготовить царствование анархии.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЛинкольн описывает скрытое вторжение. \"Священники, монахини и монахи,\" прибывающие в Америку, не были в основном миссионеры. Они были \"эмиссарами\" — агентами папы, Наполеона III и европейского деспотизма. Их миссия не проповедовать евангелие, а \"подорвать наши учреждения,\" \"отчужживать сердца нашего народа от нашей конституции,\" \"разрушить наши школы\" и \"подготовить царствование анархии.\"\u003c/p\u003e\n\u003cp\u003eКаждый элемент этого описания был выполнен. Американские учреждения были подорваны — систематически, изнутри, на протяжении поколений. Конституция была прогрессивно переинтерпретирована, чтобы означать что-то, что ее творцы бы не признали. Система государственного образования, которая была разработана для производства информированных граждан, способных к самоуправлению, была преобразована в систему, которая производит соответствующих потребителей, неспособных к критическому мышлению. И анархия, которую предсказал Линкольн — социальная дезинтеграция, культурный крах, потеря общих ценностей и общей цели — это определяющая реальность современного американского опыта.\u003c/p\u003e\n\u003ch3 id=\"предсказанное-убийство\"\u003eПредсказанное убийство\u003c/h3\u003e\n\u003cp\u003eОсознание Линкольна о личной опасности, в которой он находился, было постоянным и конкретным:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Новые проекты убийства почти каждый день обнаружены, сопровождаемые такими дикими обстоятельствами, что они приносят на память мне резню Святого Варфоломея и порохового участка.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eСсылка на святого Варфоломея — резня французских протестантов 1572 года, организованная католическими силами — и порохового участка — иезуитского заговора 1605 года, чтобы взорвать английский парламент — раскрывает понимание Линкольна, что угрозы против него не были случайными, а часть исторического образца. Иезуиты имели столетнюю историю убийства лидеров, которые противостояли им. Линкольн видел себя как следующую цель в этом образце.\u003c/p\u003e\n\u003cp\u003eЕго оценка иезуитского характера подтвердила это понимание:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Я знаю, что иезуиты никогда не забывают, ни не отказываются.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eСемь слов, которые служат его собственным эпитафом. Иезуиты никогда не забывают цель. Они никогда не отказываются от миссии. Линкольн определил их публично как силу позади гражданской войны. Он назвал их стратегию. Он предупредил американский народ. И он знал — с уверенностью человека, который понимал его врагов, — что они никогда не прекратили попытку его молчания.\u003c/p\u003e\n\u003cp\u003eНа 14 апреля 1865 года они преуспели. Авраам Линкольн был застрелен в театре Ford Джоном Уилксом Бутом. Официальное повествование рассматривает убийство как акт южного сочувствующего. Свидетельство Линкольна — свидетельство убитого человека — определяет другого спонсора.\u003c/p\u003e\n\u003ch2 id=\"анализ-наполеона-самый-абсолютный-из-деспотизмов\"\u003eАнализ Наполеона: \"самый абсолютный из деспотизмов\"\u003c/h2\u003e\n\u003ch3 id=\"военная-оценка-императора\"\u003eВоенная оценка императора\u003c/h3\u003e\n\u003cp\u003eНаполеон Бонапарт проанализировал иезуитов не как богослова, а как военный стратег — человек, который понимал власть, организацию и механики завоевания лучше, чем почти кто-либо в истории:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Jesuitism — это самый абсолютный из деспотизмов и в то же время величайший и наиболее огромный из оскорблений.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eНаполеон встретился с деспотизмом в каждой форме. Он боролся против монархий, республик и империй. Он свергнул французский ancien режим и создал свою собственную империю. Он видел каждую форму политической власти, которую Европа могла производить. И он пришел к выводу, что Jesuitism был \"самый абсолютный из деспотизмов\" — более абсолютный, чем любая монархия, более полный, чем любая диктатура, более полный, чем любая политическая система, с которой он встречался.\u003c/p\u003e\n\u003cp\u003eСлово \"оскорбление\" одинаково значительно. Jesuitism не просто деспотизм. Это \"величайший и наиболее огромный из оскорблений\" — оскорбление религии, оскорбление доверия, оскорбление человеческой потребности в Боге. Иезуиты используют наиболее священное измерение человеческого опыта — желание значения, спасения, связи с божественным — как инструмент земной власти. Это не просто политическая тирания. Это духовная тирания — наихудшая форма оскорбления, потому что она портит самую глубокую часть человеческой души.\u003c/p\u003e\n\u003ch3 id=\"генерал-выше-суверена\"\u003eГенерал выше суверена\u003c/h3\u003e\n\u003cp\u003eНаполеон определил конкретный механизм иезуитского политического контроля:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Генерал иезуитов настаивает на том, чтобы быть хозяином суверена.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЭто одно предложение объясняет иезуитскую связь с каждым правительством в истории. Иезуиты не стремятся заменить суверена. Они стремятся овладеть сувереном. Король остается на его троне. Президент остается в его офисе. Премьер-министр остается в его палате. Но выше каждого из них стоит иезуитский генерал — невидимый, безымянный, избранный и неподотчетный — направляющий решения, которые суверен верит его собственными.\u003c/p\u003e\n\u003cp\u003eНаполеон понимал это, потому что он испытал это. Несмотря на его огромную личную мощь, несмотря на его военный гений, несмотря на его способность переделать карту Европы в его воле, Наполеон нашел иезуитское влияние силой он не мог полностью контролировать или устранить. Иезуиты были подавлены папой в 1773 году — до восстания Наполеона — но они выжили в России и продолжили действовать через фронт организацией и связанными сетями на протяжении империи Наполеона.\u003c/p\u003e\n\u003ch3 id=\"доктрина-заслуживающего-преступления\"\u003eДоктрина заслуживающего преступления\u003c/h3\u003e\n\u003cp\u003eНаполеон определил моральную основу, которая делает иезуитскую систему таким опасной:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Каждый акт, каждое преступление, однако отвратительно, является заслуживающей работой, если совершено в интересе Общества иезуитов или по приказу генерала.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЭто доктрина, которая преобразует религиозный орден в криминальную организацию неограниченного масштаба. Когда генерал приказывает убийству, убийство становится \"заслуживающей работой.\" Когда генерал приказывает измене, измена становится актом послушания Богу. Когда генерал приказывает разрушению нации, разрушение становится священным приношением. Нет преступления столь отвратительно, что его не может быть санкционировано приказом генерала.\u003c/p\u003e\n\u003cp\u003eЭта доктрина объясняет иезуитское участие в убийствах, войнах, революциях и кампаниях дестабилизации на протяжении их истории. Агенты, которые проводят эти операции, не беспокойны совести, потому что их совесть была заменена послушанием. Они не испытывают вины, потому что вина требует независимого морального суждения, и независимое суждение было упразднено. Они совершают бесчеловечность с спокойной уверенностью мужчин, выполняющих религиозный долг — потому что это в точности то, что они верят, что они делают.\u003c/p\u003e\n\u003ch2 id=\"paolo-sarpi-чума-мира\"\u003ePaolo Sarpi: \"чума мира\"\u003c/h2\u003e\n\u003ch3 id=\"обвинение-венецианского-ученого\"\u003eОбвинение венецианского ученого\u003c/h3\u003e\n\u003cp\u003ePaolo Sarpi, великий венецианский ученый и богослов шестнадцатого и семнадцатого веков, обеспечил один из наиболее всеобъемлющих обвинений иезуитской системы:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Они общественная чума и чума мира. Из иезуитских колледжей, там никогда не посылается ученик послушный его отцу, преданный своей стране, верный его князю. Каждый вид порока находит его покровительство в них.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eОценка Sarpi поражает сердце иезуитского образовательного проекта. Иезуитские колледжи — которые были среди лучших образовательных учреждений в Европе — не производили хороших граждан. Они производили иезуитских агентов. Ученик, который вошел в иезуитский колледж послушный его отцу, оставленный послушный Обществу. Ученик, который вошел преданный его стране, оставленный преданный иезуитской миссии. Ученик, который вошел верный его князю, оставленный верный генералу.\u003c/p\u003e\n\u003cp\u003eФраза \"каждый вид порока находит его покровительство в них\" является осуждающим резюме морального последствия иезуитской системы. Когда послушание заменяет совесть, когда приказ генерала заменяет закон Бога, когда любое преступление становится заслуживающим на приказе высшего — то не есть порок, который не является покровительствуемым, нет греха, который не санкционирован, нет зла, которое не благословлено учреждением.\u003c/p\u003e\n\u003ch2 id=\"генерал-харрис-на-стратегии-убийства\"\u003eГенерал Харрис на стратегии убийства\u003c/h2\u003e\n\u003ch3 id=\"убийство-как-иезуитская-политика\"\u003eУбийство как иезуитская политика\u003c/h3\u003e\n\u003cp\u003eГенерал Харрис обеспечил конкретную оценку иезуитской роли в убийстве Линкольна:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Кажется, что иезуиты имели в виду с начала войны, чтобы найти случай для того, чтобы отнести [убийство] г-на Авраама Линкольна. Любимая политика иезуитов — это политика убийства.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\"Любимая политика\" — не случайный курорт, не исключительная мера, но одобренный метод. Убийство — предпочтительный инструмент иезуитов политических изменений. Когда лидер противостоит иезуитским интересам, первый вариант не является переговорами, не является компромиссом, не является политическим давлением — это убийство. Иезуиты убивают своих врагов. Это не спекуляция. Это оценка военного профессионала, который изучил свои методы.\u003c/p\u003e\n\u003cp\u003eHarрис помещает решение убить Линкольна в \"начало войны\" — не как ответ на конфедеративный поражение, а как часть оригинального плана войны. Линкольн был ориентирован не потому, что юг был потерян, но потому, что Линкольн выигрывал — и потому что его победа раскрыла бы иезуитскую роль в начале войны. Убийство было не местью. Это было управление ущерба.\u003c/p\u003e\n\u003ch2 id=\"чарльз-chiniquy-пророчество-исполнено\"\u003eЧарльз Chiniquy: пророчество исполнено\u003c/h2\u003e\n\u003ch3 id=\"священник-который-предупредил-линкольна\"\u003eСвященник, который предупредил Линкольна\u003c/h3\u003e\n\u003cp\u003eЧарльз Chiniquy был католическим священником, который оставил церковь и стал одним из наиболее громких критиков иезуитской власти в Америке. Его личные отношения с Авраамом Линкольном — кого он знал до того, как Линкольн стал президентом — дал ему уникальный доступ к мышлению Линкольна об иезуитской угрозе. Chiniquy записал слова Линкольна и добавил свою собственную пророческую оценку:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"День очень близок, когда иезуиты будут управлять своей страной, от великолепного Белого дома в Вашингтоне до скромнейшего гражданского и военного отдела этой обширной республики.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЭто пророчество, сделанное в девятнадцатом веке, описывает двадцать первый век с неудобной точностью. Иезуитски-образованные люди занимают должности на каждом уровне американского правительства — от Белого дома (несколько президентов были иезуитски-образованы или иезуитски-влияны) к \"скромнейшему гражданскому и военному отделу\". Иезуитская образовательная сеть произвела класс управления, который, сознательно или бессознательно, служит иезуитской программе.\u003c/p\u003e\n\u003cp\u003eПредупреждение Chiniquy не было о отдаленном будущем. Он сказал \"день очень близок.\" И он был прав. В пределах поколения его предупреждения, иезуитские учреждения были установлены в каждом большом американском городе. В пределах двух поколений, иезуитски-образованные люди занимали должности значительной мощи. В пределах трех поколений, иезуитское влияние в американском правительстве, образовании, средствах и культуре было столь всепроникающим, что оно было невидимо — часть фонового шума американской жизни, не заметная, потому что она была везде.\u003c/p\u003e\n\u003ch2 id=\"папа-клемент-xiv-папа-который-платил-цену\"\u003eПапа Клемент XIV: папа, который платил цену\u003c/h2\u003e\n\u003ch3 id=\"подавление-1773\"\u003eПодавление 1773\u003c/h3\u003e\n\u003cp\u003eПодавление иезуитского ордена папой Клементом XIV в 1773 году является одно из самых значительных событий в современной истории. Папа — верховный орган католической церкви, человек, иезуиты были теоретически клявшись подчинявться — пришел к выводу, что Общество Иисуса было таким опасным, что оно должно быть полностью распущено.\u003c/p\u003e\n\u003cp\u003eБулла \u003cem\u003eDominus ac Redemptor\u003c/em\u003e была продукт лет давления от католических монархов Европы. Португалия изгнала иезуитов в 1759 году. Франция изгнала их в 1764 году. Испания изгнала их в 1767 году. Каждое основное католическое королевство пришло к выводу, независимо, что иезуиты были угрозой национальному суверенитету и общественному порядку. Клемент XIV, под огромным дипломатическим давлением, наконец согласился.\u003c/p\u003e\n\u003cp\u003eЕго оценка была предусмотрительной: \u003cem\u003e\"Подавление достигнуто. Я не раскаиваюсь в этом ... Но это подавление будет моей смертью.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eНа 22 сентября 1774 года Клемент XIV был мертв. Быстрое разложение его тела — отличительная черта отравления в эту эру — указала на несправедливость. Папа, который подавил иезуитов, был убит организацией он подавил.\u003c/p\u003e\n\u003ch3 id=\"восстановление-и-святой-альянс\"\u003eВосстановление и Святой альянс\u003c/h3\u003e\n\u003cp\u003eИезуитский орден был восстановлен папой Пием VII в 1814 году — сорок один год после его подавления. Восстановление пришло в результате наполеоновых войн, во время периода политического переустройства, которые иезуиты мастерски использовали.\u003c/p\u003e\n\u003cp\u003eСвятой альянс 1815, сформированный Россией, Австрией и Пруссией после поражения Наполеона, был якобы пактом для поддержания христианских принципов в европейском управлении. На самом деле, это был механизм для подавления демократических движений и поддержания консервативного порядка, который служил иезуитским интересам. Альянс обязал своих подписчиков противостоять революции, демократии и популярному суверенитету — ровно принципы, которые угрожали иезуитскому контролю.\u003c/p\u003e\n\u003cp\u003eПодавление длилось только сорок один год. Во время того времени, иезуиты выжили в России под защитой Екатерины Великой, поддерживали свои сети через фронт организацией и терпеливо ждали политического момента, который позволит их восстановление. Когда этот момент пришел, они возвращались — сильнее, мудрее и более определенный, чем когда-либо.\u003c/p\u003e\n\u003ch2 id=\"адам-weishaupt-и-связь-illuminati\"\u003eАдам Weishaupt и связь Illuminati\u003c/h2\u003e\n\u003ch3 id=\"иезуитский-философ-который-основал-illuminati\"\u003eИезуитский философ, который основал Illuminati\u003c/h3\u003e\n\u003cp\u003eАдам Weishaupt, основатель баварского Illuminati в 1776, был бывший иезуитский студент и профессор канонического права в Иезуитском Университете Ingolstadt. Его основание Illuminati не было разрывом с иезуитской системой. Это было расширение это — применение иезуитских методов секретности, иерархии и проникновения к светской организации с явно политическими целями.\u003c/p\u003e\n\u003cp\u003eИсторический отчет подтверждает соединение:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Степень мощи, к которой представители Общества Иисуса были в состоянии достичь в Баварии была почти абсолютной.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eWeishaupt вырос в Баварии, где иезуитская мощь была \"почти абсолютной.\" Он был образован иезуитами. Он преподавал в иезуитском университете. Он впитал иезуитские методы — клеточная структура, строгая иерархия, абсолютное послушание, невидимое проникновение существующих учреждений. Когда он основал Illuminati, он просто адаптировал эти методы к новой организации с новым историей крышки.\u003c/p\u003e\n\u003cp\u003eСтруктура Illuminati была зеркальным изображением иезуитской системы: степени инициирования, скрытого руководства, компартментализированной информации, использование фронт организацией, проникновение существующих учреждений (Масонские ложи, университеты, правительства), и культивирование личностей в позициях мощи. Weishaupt даже описал его методы в языке, который отзывается Loyola инструкциями.\u003c/p\u003e\n\u003cp\u003eСоединение между иезуитами и Illuminati — это не теория заговора. Это вопрос задокументированного исторического факта. Человек, который основал Illuminati был продуктом иезуитской системы. Методы он использовал были иезуитскими методами. Целями он преследовал — свержение существующих органов власти и установление нового порядка — были целями, которые служили иезуитской программе универсального доминиона.\u003c/p\u003e\n\u003ch2 id=\"конвергенция-свидетельства\"\u003eКонвергенция свидетельства\u003c/h2\u003e\n\u003ch3 id=\"два-лидера-один-враг\"\u003eДва лидера, один враг\u003c/h3\u003e\n\u003cp\u003eЛинкольн и Наполеон жили в разных столетиях, возглавили разные нации, столкнулись с различными проблемами и держали различные политические философии. Линкольн был демократическим республиканцем, который верил в популярный суверенитет. Наполеон был имперским автократом, который верил в его собственный судьбу. Они согласились практически ничего — кроме идентичности врага, действующего в тенях.\u003c/p\u003e\n\u003cp\u003eОба назвали иезуитов. Оба описали же методы — проникновение, манипуляция, поджог разделения, использование убийства. Оба признали, что иезуитская угроза была не просто политической, но экзистенциальной — угрозой к основаниям цивилизации самой. И оба заплатили цену за их честность — Линкольн с его жизнью, Наполеон с его империей и в конечном итоге его свободой.\u003c/p\u003e\n\u003cp\u003eКонвергенция их свидетельства — это доказательство, которое не может быть отклонено как предубеждение, паранойя или политическое удобство. Это были самые мощные люди их соответствующих эр. Они имели доступ к лучшей разведке доступной. Они не имели мотива для фабрикации обвинений против организации, которую большинство людей никогда не слышали. Их свидетельство стоит как предупреждение через столетия — предупреждение, что работы тьмы, описанные Павлом в Ефесянам 5:11, реальны, они организованы, и они должны быть обличены.\u003c/p\u003e\n\u003ch3 id=\"обязанность-разоблачить\"\u003eОбязанность разоблачить\u003c/h3\u003e\n\u003cp\u003eПриказ Павла в Ефесянам 5:11 — это не опциональный. \"Не имейте общение с бесплодными делами тьмы, но скорее обличайте их.\" Христианин командуется разоблачить тьму — не приспосабливать его, не диалогировать с ним, не делать мир с ним. Линкольн и Наполеон подчинились этому приказу, независимо от того, знали они это или нет. Они обличали работы тьмы. Они назвали врага. Они заставили свет.\u003c/p\u003e\n\u003cp\u003eВопрос для нашего поколения — будем ли мы делать то же самое — или мы будем продолжать традицию умышленного невежества, которое позволило иезуитской системе работать без проблемы почти пять столетий.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/151 ati-1666-part1/?lang=ru\"\u003eThe Jews, Jesus, and the Illuminati of 1666 Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pope-deal-devil-1786-part3/?lang=ru\"\u003eThe Pope's Deal With the Devil Part 3\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eФранцузский император и американский президент. Человек, который завоевал Европу и человек, который сохранил республику. Католик по культуре и протестант по убеждению. Они разделили ничего — кроме правды. Оба видели ту же скрытую руку. Оба назвали то же скрытое врага. Оба описали те же скрытые методы. Наполеон потерял его империю. Линкольн потерял его жизнь. Враг, которого они назвали, никогда не был приведен к правосудию, никогда не был удержан подотчетный, и никогда не было остановлено. Это работает сегодня с больше мощи, больше добраться и больше сложности, чем либо один человек мог иметь воображение. Единственное, что изменилось, — это то, что меньше людей готовы сказать то, что Линкольн и Наполеон сказали — потому что цена правды только выросла, так как они заплатили это.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/history/\",\"className\":\"category-badge\",\"children\":\"history\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Линкольн и Наполеон оба назвали одного врага — иезуитов\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Авраам Линкольн обвинил иезуитов в гражданской войне. Наполеон
