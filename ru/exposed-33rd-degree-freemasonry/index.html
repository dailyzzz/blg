u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e33-я степень Scottish Rite из freemasonry - Sovereign Grand Inspector General - представляет публично признаны apex наиболее широко практиковали Masonic система в мире. Knight Commander из Court из Honour (KCCH), честь conferred на тех, кто был готов для 33-й степени, служит как финальный фильтр через который candidates проходят перед entering innermost круг Masonic полномочия. Together, эти distinctions определяют elite из elite - индивиды, кто possess полное знание из Masonic система истинной целей и кто упражняют наибольшие полномочия в пределах его глобальной сети.\u003c/p\u003e\n\u003cp\u003eHoward Pittman near-death опыт раскрыл spiritual иерархию precise организации - каждый уровень possessing больше полномочия и больше знания, чем уровень ниже это. 33-я степень система зеркала это демоническую иерархию с remarkable точностью. Lower-degree Mason кто верит он служит Бога его веры открывает, в highest уровне, что он был служа different deity всецело. By время этот revelation происходит, Mason был тщательно conditioned - через годы progressive initiation, увеличивающие commitment и углубляющиеся involvement - что принятие значительно вероятнее, чем rejection.\u003c/p\u003e\n\u003cp\u003eJesuit порядок отношение к highest уровнях freemasonry глубочайший secret обе организации. Catholic Confidential раскрывает что иезуиты работают \"скрытно\" через каждое учреждение они infiltrate и Scottish Rite - несмотря на Catholic церковь публичное осуждение freemasonry - был penetrated Jesuit operatives начиная с по крайней мере eighteenth век. Napoleon оценка что иезуиты' целью power находит его ultimate выражение в 33-й степени, где Jesuit-influenced теология и Masonic organizational власть сходятся. Треки \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e раскрывают spiritual силы это работает в apex Masonic пирамиды.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"понимание-степени-структуры\"\u003eПонимание степени структуры\u003c/h2\u003e\n\u003ch3 id=\"три-тела-scottish-rite\"\u003eТри тела Scottish Rite\u003c/h3\u003e\n\u003cp\u003eScottish Rite из freemasonry организовано в три principal органы, каждый управляя range степеней:\u003c/p\u003e\n\u003cp\u003eLodgte из Совершенствование управляет 4-й через 14-й степени, что elaborate на темы Craft freemasonry (первые три степени) и развить candidate понимание Masonic философии через lens Hebrew храма традиции и легенда Hiram Abiff.\u003c/p\u003e\n\u003cp\u003eChapter Rose Croix управляет 15-й через 18-й степени, culminating в Rose Croix степени discussed в Part 1 этой серии. Эти степени вводить явный Christological символизм - reinterpreted в пределах Masonic рамки - и отметить transition из philosophical freemasonry мистический freemasonry.\u003c/p\u003e\n\u003cp\u003eConsistory управляет 19-й через 32-й степени, which progressively раскрывать political, военные и философские измерения Masonic система. 32-я степень - Master Royal Secret - носит candidate к пороге система innermost круга. \"Royal Secret\" к которому эта степень alludes является culmination знания progressively раскрыто через всех preceding степеней.\u003c/p\u003e\n\u003cp\u003e33-я степень существует вне этой трёх-body структуры. Это не earned через normal progression, но conferred invitation - distinction что делает это fundamentally отличается из всех других степеней. В то время как любой Master Mason в хорошо standing может petition для Scottish Rite степеней и, с persistence, предвидение через 32-я степень, 33-я степень доступна только к выбранным Supreme Council. Этот selection процесс финальный фильтр, гарантирующий что только те, кто demonstrated полное выравнение с система истинные целей допущены к highest уровню.\u003c/p\u003e\n\u003ch3 id=\"kcch-финальный-фильтр\"\u003eKCCH: Финальный фильтр\u003c/h3\u003e\n\u003cp\u003eKnight Commander Court из Honour это distinction что предшествует 33-я степень в selection процесс. Mason кто получает KCCH был identified Supreme Council как candidate для eventual elevation 33-я степень, хотя не все KCCH получатели в конце концов получают честь. KCCH служит как probationary период во время какого candidate commitment, discretion и выравнение с система целей evaluated.\u003c/p\u003e\n\u003cp\u003eKCCH designation самостоятельно is signal в пределах Masonic сетки. Mason кто носит KCCH jewel - красный крест с teutonic крест в его centre - identified инициаты как кто-то, кто был выбран highest уровень система. Эта идентификация позволяет KCCH получателю участвовать в conversations, отношения и действия что закрыты к lower-degree Masons, предоставляя taste доступ и влияние что 33-я степень будет полностью разблокировать.\u003c/p\u003e\n\u003cp\u003eSelection критерии для KCCH не публично disclosed. Supreme Council evaluation процесс conducted секретно и факторы that определяют selection - за пределами публично stated критерии service Rite и к сообществу - известны только к те, кто участвуют selection. Эта секретность гарантирует что критерии служат система истинные цели, вместо её публичного имиджа.\u003c/p\u003e\n\u003ch2 id=\"33-я-степень-раскрыта\"\u003e33-я степень раскрыта\u003c/h2\u003e\n\u003ch3 id=\"что-самая-высокая-степень-содержит\"\u003eЧто самая высокая степень содержит\u003c/h3\u003e\n\u003cp\u003e33-я степень ceremony - Sovereign Grand Inspector General степень - conducted в приватном by members Supreme Council. Ceremony содержание, в то время как variations опубликованы by бывший члены и investigators, guarded by тот же оати секретности что бинд все Masonic степени, с дополнительным весом из being система наиболее священное ceremony.\u003c/p\u003e\n\u003cp\u003eCeremony involves conferral полномочия - 33-я степень Mason invested с власти управлять Rite в пределах его jurisdiction, участвовать в selection будущего 33-й степени получателей и доступ система deepest знания. Философское содержание степень, как описано теми, кто задокументировали it, involves явное revelation доктрины что только hinted в lower степени.\u003c/p\u003e\n\u003cp\u003eНаиболее significant эти revelations concerns identity божества served Masonic система. В lower степени, божество identified как \"Great Architect из Universe\" - generic концепция compatible с любым monotheistic традиции. В 33-й степени, согласно multiple свидетели, божество более specifically identified. Albert Pike опубликованные работы provide рамки: Masonic божество is принцип свет - не Christian Бог, но light-bearer, Lucifer, understood не as дьявол Christian теология, но как bringer мудрости и illumination кто был unjustly vilified jealous Богом.\u003c/p\u003e\n\u003cp\u003eЭто revelation culmination progressive disclosure что characterizes весь degree система. Lower-degree Mason кто верит он служит Бога его веры открывает, в highest уровне, что он был служа different deity entirely. By время это revelation происходит, Mason был так thoroughly conditioned - через годы progressive initiation, увеличивающиеся commitment и углубляющиеся involvement - что принятие значительно более likely, чем rejection.\u003c/p\u003e\n\u003ch3 id=\"власть-33-й-степени\"\u003eВласть 33-й степени\u003c/h3\u003e\n\u003cp\u003eПолномочия conferred 33-я степень не просто ceremonial - это operational. 33-й степень Masons занимать positions влияния по всему political, финансовые, военные, intelligence и религиозные establishments каждой Western нации. Их Masonic соединения предоставляют parallel полномочия структура что работает alongside - и часто supersedes - формальные полномочия учреждений они служат.\u003c/p\u003e\n\u003cp\u003eMason 33-я степень служа как судья носит скамью обязательство его Masonic brethren что supersedes его обязательство закону. Mason 33-я степень служа в правительстве носит его офис преданность Masonic через весь Western мир.\u003c/p\u003e\n\u003cp\u003eJesuit superior Tamburini хвастовство - \"Из этой палаты я правлю не только Paris, но и China, не только China, но всей мир, без кого-либо знающий как это управляется\" - описывает operational реальность этого координирования. \"Chamber\" из которого мир управляется это не одиночная комната, но сеть chambers - Jesuit и Masonic - из которого coordinated полномочия потоки каждое учреждение в каждой нации.\u003c/p\u003e\n\u003ch2 id=\"духовная-реальность-позади-степеней\"\u003eДуховная реальность позади степеней\u003c/h2\u003e\n\u003ch3 id=\"что-33-на-самом-деле-имеет-в-виду\"\u003eЧто 33 на самом деле имеет в виду\u003c/h3\u003e\n\u003cp\u003eЧисло 33 носит profound значение в пределах Christian и occult традиций. Христос был 33 годов старый в его crucifixion и resurrection. Scottish Rite использование 33 степеней не случайно - это represent deliberate appropriation числа ассоциированного с Христос ultimate sacrifice, repurposed представлять Masonic система альтернативный путь к spiritual трансформация.\u003c/p\u003e\n\u003cp\u003eВ Christian понимании, 33 представляет completion Христос земной миссии - fulfillment Бога план для redemption человечества через sacrifice. В Masonic понимании, 33 представляет completion initiate путешествие - attainment highest знания и полное полномочия в пределах система. Appropriation deliberат: Masonic система предлагает альтернативный \"33\" - альтернативный completion, альтернативный redemption, альтернативный divinity - что компетирует с и в конце концов отклоняет Christian одна.\u003c/p\u003e\n\u003cp\u003eHoward Pittman свидетельство о counterfeit операции второй heaven применяет precisely к этому appropriation. Демонический иерархия создаёт counterfeits каждой divine реальности - counterfeit поклонение, counterfeit спасение, counterfeit полномочия. 33-я степень это counterfeit completion - требование что initiatory путешествие Masonic система accomplishes что Христос sacrifice accomplished, предоставляя divinity через знание, вместо через grace, и redemption через работает, вместо через веру.\u003c/p\u003e\n\u003ch3 id=\"финальный-секрет\"\u003eФинальный секрет\u003c/h3\u003e\n\u003cp\u003eФинальный секрет 33-й степени не piece информации - это state существа. 33-я степень Mason, прошедший через каждый уровень initiation, приняв каждый progressive revelation и demonstrated полное commitment система, understand достигнуть форма illumination что transcends обычное человеческое сознание. Это illumination Masonic эквивалент спасения - attainment spiritual государство что помещает initiate за пределами moral категорий что правило обычное человечество.\u003c/p\u003e\n\u003cp\u003eЭто Luciferian доктрина в его полное выражение: требование что initiated человеческое существо, через acquisition скрытого знания и практика prescribed ритуалов, достигает state spiritual трансценденции что делает их, в essence, бог. \"Вы будете как боги, знающие добро и зло\" - змей обещание в Eden это 33-я степень финальное revelation.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e трассирует это обещание к его origin - rebellion ангельских существ кто верили они могли transcend их сотворённый статус и достичь equality с Богом. 33-я степень Mason, достигающий apex initiatory система, это offered то же обещание что fallen ангелы приняли - и столкнулись те же последствия. Illumination предложенный 33-й степени не divine свет; это \"свет\" Lucifer, что на самом деле deepest тьма masquerading как brilliance.\u003c/p\u003e\n\u003ch2 id=\"выбор\"\u003eВыбор\u003c/h2\u003e\n\u003ch3 id=\"что-это-имеет-в-виду-для-вас\"\u003eЧто это имеет в виду для вас\u003c/h3\u003e\n\u003cp\u003eExposure 33-й степени и KCCH freemasonry не academic упражнение - это revelation с direct последствиями для каждого человеческого существа. Система exposed в этой серии - из Sabbatean ересь 1
