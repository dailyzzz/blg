ote\u003e\n\u003cp\u003eБиблия определяет заговор на высочайших уровнях земной власти — цари и правители берут совет вместе против Господа. Это не метафора; это описание реальности. Мир управляется не избранными должностными лицами, демократическими учреждениями и конституционными рамками, которых учат общественность уважать. Он управляется сетью тайных обществ, банковских династий и религиозных орденов, которые работают за кулисами, используя правительства, военные и средства массовой информации как инструменты своей воли.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов сидит на вершине этой пирамиды власти. Микеланджело Тамбурини, 14-й Генеральный Верховный Генерал, заявил откровенно: \u003cem\u003e\"Из этой палаты я управляю не только Парижем, но и Китаем, не только Китаем, но и всем миром.\"\u003c/em\u003e Это была не высокомерие; это было точное описание системы глобального контроля иезуитов — системы, построенной за века через инфильтрацию, убийство, финансовую манипуляцию и неустанное подавление правды. Иезуиты, сатанисты и католическая церковь образуют внутренний круг. Тайные общества — масоны, Skull and Bones, Bohemian Grove, Совет по международным отношениям — образуют внешние круги. И в центре всего этого сидит сам Сатана, князь этого мира, чьи агенты столь же реальны, как воздух, которым мы дышим.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e определяет этих готовых слуг тьмы, и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e напоминает нам, что заговор начался не на земле, а на небе, с восстанием Люцифера и ангелов, которые последовали за ним.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"внутренний-круг-орден-иезуитов\"\u003eВнутренний круг: Орден иезуитов\u003c/h2\u003e\n\u003ch3 id=\"черный-папа\"\u003eЧерный Папа\u003c/h3\u003e\n\u003cp\u003eГенеральный Верховный Генерал Общества Иисуса — обычно известный как \"Черный Папа\" из-за черной сутаны, которую он носит, в отличие от белого одеяния Папы Рима — возможно, самый мощный человек в мире. В отличие от Папы, который является публичной фигурой, подлежащей медийному контролю, Генеральный Верховный работает в почти полной секретности. Его личность известна, но его деятельность — нет.\u003c/p\u003e\n\u003cp\u003eНынешний Генеральный Верховный, Артуро Соса, венесуэльский иезуит, занял должность в 2016 году. Как его предшественники, Соса контролирует глобальную сеть приблизительно 15 000 членов иезуитов, работающих в более чем 100 странах. Эта сеть включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУниверситеты\u003c/strong\u003e: более 100 иезуитских университетов во всем мире, включая Georgetown (самый старый католический университет в Америке и центр обучения для ЦРУ), Fordham, Boston College, Loyola (в нескольких городах) и десятки других.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eШколы\u003c/strong\u003e: более 2500 иезуитских школ, обучающих миллионы студентов во всем мире.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСМИ\u003c/strong\u003e: иезуитские публикации, сети вещания и цифровые платформы, которые формируют общественное мнение во всем мире.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбсерватории\u003c/strong\u003e: Ватиканская обсерватория, управляемая иезуитами, проводит астрономические исследования и контролирует информацию о космосе.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"клятва-иезуитов\"\u003eКлятва иезуитов\u003c/h3\u003e\n\u003cp\u003eКрайняя присяга иезуитов, занесенная в Конгрессный отчет в 1913 году, раскрывает истинную природу ордена:\u003c/p\u003e\n\u003cp\u003e\"Я дополнительно обещаю и объявляю, что я, когда представится возможность, буду вести безжалостную войну, скрытно и открыто, против всех еретиков... что я пощадю ни возраст, ни пол, ни условие... Я буду вешать, тратить, кипятить, освежевать, задушить и хоронить заживо этих пресловутых еретиков.\"\u003c/p\u003e\n\u003cp\u003eЭта присяга — принимается ли ее подлинность как буквальная или как резюме задокументированного поведения ордена — точно описывает методологию работы иезуитов: полная война, любыми средствами, против любого врага, без милосердия.\u003c/p\u003e\n\u003ch2 id=\"финансовый-круг-банковские-династии\"\u003eФинансовый круг: Банковские династии\u003c/h2\u003e\n\u003ch3 id=\"сеть-ротшильдов\"\u003eСеть Ротшильдов\u003c/h3\u003e\n\u003cp\u003eБанковская династия Ротшильдов, основанная Майером Амшелем Ротшильдом во Франкфурте в конце 18-го века, служила основным финансовым рычагом Ватикана более 200 лет. Ротшильды создали банки в пяти европейских столицах — Лондоне, Париже, Франкфурте, Вене и Неаполе — создав финансовую сеть, которая работала через национальные границы и выше национальных законов.\u003c/p\u003e\n\u003cp\u003eСвязь Ротшильдов с Ватиканом задокументирована и неоспорима. Они служили официальными банкирами Ватикана по крайней мере с 1820-х годов, управляя инвестициями Церкви, обращая с ее финансовыми операциями и предоставляя капитал для иезуитских операций во всем мире.\u003c/p\u003e\n\u003cp\u003eВлияние семьи Ротшильдов распространяется на каждый основной центральный банк в мире. Bank of England, Federal Reserve, European Central Bank и Bank for International Settlements (центральный банк центральных банков) — все часть финансовой архитектуры, которую сеть Ротшильдов строила в течение двух столетий.\u003c/p\u003e\n\u003ch2 id=\"круг-тайных-обществ\"\u003eКруг тайных обществ\u003c/h2\u003e\n\u003ch3 id=\"skull-and-bones\"\u003eSkull and Bones\u003c/h3\u003e\n\u003cp\u003eОрден Skull and Bones, основанный в Йельском университете в 1832 году, — самое пресловутое американское тайное общество. Его членство читается как реестр американского истеблишмента: президенты (как Джордж Г.В. Буш, так и Джордж В. Буш), сенаторы, директоры ЦРУ, судьи Верховного суда и промышленные магнаты.\u003c/p\u003e\n\u003cp\u003eSkull and Bones была основана Уильямом Хантингтоном Расселом и Альфонсо Тафтом (отцом президента Уильяма Говарда Тафта) после путешествия Расселя в Германию, где он, как сообщается, был инициирован в немецкое тайное общество с иезуитскими связями. Ритуалы ордена, которые включают мок-смерть и воскрешение, поклонение черепу и клятвы абсолютной верности, согласуются с находящимися под влиянием иезуитов эзотерическими традициями континентальных европейских тайных обществ.\u003c/p\u003e\n\u003ch2 id=\"интеграция-с-распознаванием-лиц-и-cctv\"\u003eИнтеграция с распознаванием лиц и CCTV\u003c/h2\u003e\n\u003cp\u003eПредсказывающее полицейское хозяйство не работает в изоляции. Это один узел в расширяющейся сети наблюдения, которая включает видеонаблюдение лиц и CCTV в городах, отслеживание через системы распознавания номерных знаков и другие средства полного слежения за населением.\u003c/p\u003e\n\u003cp\u003eСистема преобразует пассивные камеры в активные охотничьи инструменты, позволяя алгоритмам предсказывающей полиции идентифицировать \"высокорисковых\" людей и развертывать в реальном времени на их местоположение через лицевое распознавание.\u003c/p\u003e\n\u003ch2 id=\"суд-принадлежит-только-богу\"\u003eСуд принадлежит только Богу\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Не мстите сами, братия, но дайте место гневу, ибо написано: \"Мне отмщение, Я воздам, говорит Господь\".\" — Римляне 12:19\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПисание проводит линию, которую ни одна человеческая учреждение — и уж тем более ни один алгоритм — не имеет право пересекать. Суд сердца, суд намерения, суд того, что человек \u003cem\u003eбудет\u003c/em\u003e делать — этот авторитет принадлежит Богу и только Богу.\u003c/p\u003e\n\u003cp\u003eБиблейский случай неоспорим... Только Бог ищет сердце. Только Бог может осудить перед деянием с совершенным знанием и совершенным состраданием одновременно.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n
