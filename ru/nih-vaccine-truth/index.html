cp\u003eНациональные Институты Здравоохранения - крупнейшее биомедицинское исследовательское агентство в мире с годовым бюджетом, превышающим 45 миллиардов долларов - знали в течение десятилетий, что вакцины несут риски значительно больше того, что сказано общественности. Внутренние документы, похороненные исследования и свидетельства разоблачителей раскрывают паттерн преднамеренного скрывания, который составляет одну из величайших аферы в истории общественного здравоохранения.\u003c/p\u003e\n\u003cp\u003eNIH - это не нейтральное научное учреждение. Это государственное агентство с глубокими финансовыми связями с фармацевтической промышленностью, институциональными стимулами для продвижения вакцинации и бюрократической культурой, которая наказывает инакомыслие и награждает соответствие. Истина о вакцинах была не потеряна - она была похоронена, преднамеренно, людьми, которые знали, что они делали и почему.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был сказан во время его NDE, что 97,5% христиан были не в состоянии в их ходьбе. Они никогда не сделали \"Иисуса Господом\". Они служили \"самому\". NIH служит себе - своему бюджету, своей репутации, своему институциональному выживанию - и в этом служит фармацевтической промышленности, которая финансирует большую часть его исследований, укомплектовывает его консультативные комитеты и нанимает его бывших должностных лиц.\u003c/p\u003e\n\u003cp\u003eПроникновение иезуитов \"скрытое с хитростью\" распространяется на каждое учреждение, которое управляет человеческой жизнью. \"Абсолютная власть\" Наполеона, \"вечное проклятие\" Адамса, управление Тамбулини \"половины мира\" - эти описывают реальность институционального контроля, который NIH представляет. Документальный фильм Католический Конфиденциально раскрыл, как слепое послушание и \"каждый вид порока\" характеризуют метод Иезуитов. NIH работает на тех же принципах.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-nih-знал--и-когда-они-это-знали\"\u003eЧто NIH Знал — и Когда Они Это Знали\u003c/h2\u003e\n\u003ch3 id=\"заражение-sv40\"\u003eЗаражение SV40\u003c/h3\u003e\n\u003cp\u003eМежду 1955 и 1963 годами, по оценкам, 98 миллионов американцев получили вакцины против полиомиелита, заражённые Simian Virus 40 (SV40), вирусом, обнаруженным в клетках почек обезьян, используемых для производства вакцины. NIH знал о заражении уже в 1960 году.\u003c/p\u003e\n\u003cp\u003eSV40 - это известный онкогенный вирус - он вызывает рак в лабораторных животных. Исследования нашли SV40 DNA в раковых заболеваниях человека, включая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eОпухоли мозга (мезотелиомы)\u003c/li\u003e\n\u003cli\u003eРаковые заболевания костей (остеосаркомы)\u003c/li\u003e\n\u003cli\u003eЛимфомы\u003c/li\u003e\n\u003cli\u003eРаковые заболевания лёгких\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОтвет NIH на это заражение не был предупредить общественность, не было отозвать заражённые вакцины и не было расследовать потенциальную связь рака. Вместо этого они:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eТихо перешли на производство вакцины без SV40\u003c/li\u003e\n\u003cli\u003eПодавили исследования, связывающие SV40 с раком человека\u003c/li\u003e\n\u003cli\u003eФинансировали исследования, разработанные, чтобы не найти связь между SV40 и раком\u003c/li\u003e\n\u003cli\u003eПозволили заражённой вакцине использоваться, пока существующие запасы не были истощены\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eДевяносто восемь миллионов американцев были инъецированы вирусом, вызывающим рак, и NIH скрыл это. Это не спекуляция - это задокументировано в конгрессовском свидетельстве, внутренних коммуникациях NIH и рецензируемых исследованиях, которые основное медицинское учреждение потратило десятилетия, пытаясь дискредитировать.\u003c/p\u003e\n\u003ch3 id=\"конференция-simpsonwood\"\u003eКонференция Simpsonwood\u003c/h3\u003e\n\u003cp\u003eВ июне 2000 года CDC созвал тайное совещание в Конференц-центре Simpsonwood в Norcross, Грузия. Совещание привело вместе 52 участников из CDC, FDA, NIH, производителей вакцин и ВОЗ для обсуждения исследования эпидемиолога CDC Томаса Верстраетена.\u003c/p\u003e\n\u003cp\u003eИсследование Верстраетена, используя Vaccine Safety Datalink (базу данных миллионов медицинских записей детей), нашло статистически значительную связь между вакцинами, содержащими тимеросаль, и неврологическими нарушениями, включая аутизм.\u003c/p\u003e\n\u003cp\u003eСтенограммы Simpsonwood - полученные через Закон о Свободе Информации - раскрывают, что участники были более озабочены защитой программы вакцинации, чем защитой детей:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eУчастники обсудили, как \u003cstrong\u003eманипулировать данные\u003c/strong\u003e, чтобы устранить связь\u003c/li\u003e\n\u003cli\u003eОни обсудили \u003cstrong\u003eюридические последствия\u003c/strong\u003e находок\u003c/li\u003e\n\u003cli\u003eОни обсудили, как \u003cstrong\u003eпредотвратить доступ данных\u003c/strong\u003e независимыми исследователями\u003c/li\u003e\n\u003cli\u003eОдин участник заявил, что он не хотел бы дать вакцины, содержащие тимеросаль, своему собственному внуку\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПосле совещания исследование Верстраетена было переработано - используя различные статистические методы и различные наборы данных - до связь между тимеросалью и аутизмом исчезла. Окончательная опубликованная версия не показала связь. Оригинальные данные, показывающие связь, не были сделаны открытыми.\u003c/p\u003e\n\u003ch3 id=\"признание-томпсона\"\u003eПризнание Томпсона\u003c/h3\u003e\n\u003cp\u003eВ 2014 году старший учёный CDC Уильям Томпсон связался с журналистом и исследователем Брайаном Хукером и признался, что CDC совершил научное мошенничество в знаковом исследовании 2004 года о вакцине MMR и аутизме.\u003c/p\u003e\n\u003cp\u003eТомпсон заявил, что авторы исследования нашли статистически значительную связь между ранней вакцинацией MMR и аутизмом у афроамериканских мальчиков. Вместо того, чтобы сообщить эти находки, авторы:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eВстретились в конференц-комнате\u003c/li\u003e\n\u003cli\u003eПринесли соответствующие распечатки данных\u003c/li\u003e\n\u003cli\u003eБросили их в \u003cstrong\u003eмусорное ведро\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eПереанализировали данные без подгруппы, которая показала связь\u003c/li\u003e\n\u003cli\u003eОпубликовали мошеннические результаты\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТомпсон сохранил копии оригинальных документов и передал их Конгрессмену Биллу Поси. Несмотря на признание Томпсона и документарные свидетельства мошенничества, не было проведено расследование, ни один исследователь не был дисциплинирован, и мошеннические исследования остаются в опубликованной литературе.\u003c/p\u003e\n\u003ch2 id=\"финансовые-конфликты\"\u003eФинансовые Конфликты\u003c/h2\u003e\n\u003ch3 id=\"роялти-учёных-nih\"\u003eРоялти Учёных NIH\u003c/h3\u003e\n\u003cp\u003eРасследование 2005 года Associated Press раскрыло, что учёные NIH собирали выплаты роялти от фармацевтических компаний за продукты, которые они помогли разработать - включая вакцины. Расследование нашло:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eУчёные NIH получили \u003cstrong\u003e8,9 миллионов долларов\u003c/strong\u003e в роялти между 1991 и 2002\u003c/li\u003e\n\u003cli\u003eОтдельные учёные получили до \u003cstrong\u003e150 000 долларов в год\u003c/strong\u003e от компаний, продукты которых они оценивали\u003c/li\u003e\n\u003cli\u003eВыплаты роялти \u003cstrong\u003eне были раскрыты\u003c/strong\u003e общественности или консультативным комитетам, которые оценивали продукты\u003c/li\u003e\n\u003cli\u003eРуководство NIH активно сопротивлялось требованиям раскрытия\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто означает, что учёные NIH, которые сидели в консультативных комитетах, рекомендуя вакцины, одновременно получали платежи от компаний, которые производили эти вакцины. Конфликт интересов настолько вопиющий, что он дисквалифицировал бы судью, журналиста или практически любого другого профессионала - но в NIH это было стандартной рабочей процедурой.\u003c/p\u003e\n\u003ch3 id=\"вращающаяся-дверь\"\u003eВращающаяся Дверь\u003c/h3\u003e\n\u003cp\u003eВращающаяся дверь между NIH, CDC, FDA и фармацевтической промышленностью гарантирует, что агентства, задачей которых является регулирование вакцин, контролируются отраслью, которую они должны регулировать:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eДжули Гербердинг\u003c/strong\u003e, директор CDC во время мошенничества Томпсона, левая работа, чтобы стать президентом отдела вакцин Merck\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСкотт Готтлиб\u003c/strong\u003e, комиссар FDA, имел обширные связи с фармацевтической промышленностью до и после своего пребывания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭнтони Фаучи\u003c/strong\u003e, директор NIH/NIAID в течение 38 лет, наблюдал миллиарды грантов фармацевтическим компаниям при помощи установления политики вакцинации\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПаттерн неоспорим: государственные должностные лица устанавливают политику, которая приносит пользу фармацевтическим компаниям, затем покидают правительство для работы с этими компаниями. Это не государственное служение - это корпоративный захват.\u003c/p\u003e\n\u003ch2 id=\"подавленные-исследования\"\u003eПодавленные Исследования\u003c/h2\u003e\n\u003ch3 id=\"исследования-которые-исчезли\"\u003eИсследования, Которые Исчезли\u003c/h3\u003e\n\u003cp\u003eНа протяжении десятилетий многочисленные исследования, показывающие риски вакцин, были подавлены, отозваны, недофинансированы или просто игнорированы:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИсследования, связывающие вакцины с \u003cstrong\u003eаутоиммунными расстройствами\u003c/strong\u003e, были недофинансированы\u003c/li\u003e\n\u003cli\u003eИсследования, показывающие \u003cstrong\u003eтоксичность алюминиевых адъювантов\u003c/strong\u003e, были атакованы и маргинализированы\u003c/li\u003e\n\u003cli\u003eИсследования, документирующие \u003cstrong\u003eвирусное выделение вакцинного штамма\u003c/strong\u003e, были подавлены\u003c/li\u003e\n\u003cli\u003eИсследования, связывающие \u003cstrong\u003eдетские вакцины с хроническим заболеванием\u003c/strong\u003e, были высмеяны\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПодавление систематическое. Это работает через контроль финансирования (не финансируйте исследования, которые могут произвести нежелательные результаты), манипуляцию рецензирования (отвергните статьи, которые угрожают консенсусу) и уничтожение карьеры (разрушьте исследователей, которые опубликуют неудобные результаты).\u003c/p\u003e\n\u003ch3 id=\"суд-по-вакцинам\"\u003eСуд по Вакцинам\u003c/h3\u003e\n\u003cp\u003eНациональный Закон о Травме от Детской Вакцины 1986 года создал Программу Компенсации Травм от Вакцин (VICP) - специальный суд, который рассматривает претензии о травмах от вакцин. Этот суд выплатил более \u003cstrong\u003e4,7 миллиарда долларов\u003c/strong\u003e компенсации лицам, травмированным вакцинами.\u003c/p\u003e\n\u003cp\u003eСуществование Суда по Вакцинам - это само по себе признание, что вакцины вызывают травмы. Если вакцины были столь безопасны, как утверждается, никакой специальный суд не был бы необходим. Создание суда - который одновременно защищает производителей вакцин от исков - раскрывает приоритеты правительства: защитить программу вакцин и её производителей, компенсировать раненых тихо и сохранить общественное доверие.\u003c/p\u003e\n\u003ch2 id=\"духовная-война\"\u003eДуховная Война\u003c/h2\u003e\n\u003ch3 id=\"nih-как-ложная-власть\"\u003eNIH как Ложная Власть\u003c/h3\u003e\n\u003cp\u003eГоварду Питтману было показано, что демонические силы работают через учреждения, которые претендуют на власть, которую они не имеют. NIH претендует на авторитет определения, что безопасно для вашего тела - авторитет, который принадлежит вам, вашему врачу (в консультации с вами) и в конечном итоге Богу.\u003c/p\u003e\n\u003cp\u003eКогда NIH объявляет вакцину \"безопасной и эффективной\", эти слова несут духовный вес. Они создают реальность, которую миллиарды людей принимают на веру. Но Питтман был сказан, что 95% служат \"самому\" - и NIH служит своему институциональному интересу выше всего.\u003c/p\u003e\n\u003cp\u003eИезуиты совершенствовали искусство институциональной власти. Их университеты, их больницы, их издательства - все существуют, чтобы установить и сохранить авторитет ордена. NIH работает на той же модели: его авторитет самоссылочный, саморазвивающийся и разработанный, чтобы быть неопровержимым.\u003c/p\u003e\n\u003cp\u003eВыход - такой же, как он всегда был: квестион авторитет, экзамен доказательство, ищи истину и доверяй Богу, а не учреждениям, которые повторно демонстрировали готовность обманывать.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e -- обширная документация мошенничества вакцины NIH\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство NDE Говарда Питтмана\u003c/a\u003e -- духовная война и ложная институциональная власть\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолический Конфиденциально: Позорные Секреты Иезуитов Разоблачены\u003c/a\u003e -- модель иезуитского институционального контроля\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедецид и Фармакея — Колдовство Современной Медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в Подвале Ватикана Может Вас Шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eСтенограммы Конференции Simpsonwood (FOIA)\u003c/li\u003e\n\u003cli\u003eПризнание разоблачителя CDC Уильяма Томпсона\u003c/li\u003e\n\u003cli\u003eДокументация заражения SV40 и конгрессовское свидетельство\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, Пока Читаете\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eВакцина Зверя\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eМедицина Рокфеллера\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/487-Mark_Of_The_Nanobot.mp4\"\u003eМаркировка Наноботов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь Обманщиков\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте Дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/satanic-science-smallpox-vaccine/?lang=ru\"\u003eСатаническая Наука: Ужасающая Истина за Вакциной Оспы\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/viruses-first-appear-military-bases/?lang=ru\"\u003eПочему Вирусы Всегда Сначала Появляются на Военных Базах\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/big-pharma-bloodlust-torture/?lang=ru\"\u003eBig Pharma's BLOODLUST: Скрытая История Медицинских Пыток\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eNIH знал. Они знали о заражении, травмах, смертях. Они знали и похоронили это - потому что программа вакцин была важнее детей, которых она ранила. Истина, которую они похоронили, восстанавливается. Никакое учреждение, как бы оно ни было мощно, не может держать истину под землёй вечно. \"Ибо нет ничего тайного, что не было бы открыто.\"\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Истина о Вакцинах NIH, Которую Они Похоронили Десятилетия Назад\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"NIH имеет внутренние документы, показывающие опасности вакцин, которые они никогда не разделяли с общественностью. Десятилетия похороненной истины о безопасности вакцин всплывают сейчас.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-12-01T10:00:00Z\",\"children\":\"1 декабря 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"NIH\",{\"href\":\"/ru/tag/NIH/\",\"className\":\"tag-p
