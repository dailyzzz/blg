ям мира, а не по Христу.\"\u003c/em\u003e — Колоссянам 2:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eАмериканская система здравоохранения не стала монстром, которым она является сегодня, по случайности. Она была умышленно захвачена, переделана и применена идеологическими силами, которых большинство американцев никогда не учили распознавать. Коммунистическая инфильтрация американских учреждений — документированная в конгрессных расследованиях, отступившими агентами и рассекреченными разведывательными файлами — расширилась глубоко в медицинскую профессию. И один из наиболее раскрывающих маркеров этой инфильтрации — рутинная практика младенческого обрезания.\u003c/p\u003e\n\u003cp\u003eВ Америке сегодня, приблизительно 55-60% новорождённых мужчин обрезаны — медицинская процедура, выполняемая без согласия пациента, без медицинской необходимости и без любого доверенного свидетельства преимущества. Соединённые Штаты — практически единственная среди развитых наций в этой практике. Ни одна европейская страна рутинно обрезает младенцев. Никакая азиатская страна не делает. Никакая южноамериканская страна не делает. Вопрос, который требует ответ, — почему Америка делает?\u003c/p\u003e\n\u003cp\u003eОтвет отслеживает вспять к коммунистическому захвату американской медицины — захвату, который использовал идеологическую подрывную деятельность, захват учреждения и разрушение традиционных ценностей для переделания наиболее интимных аспектов человеческой жизни.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман был сказано во время его близкой смертельной опасности, что 97,5% христиан были неудачными, что они \"никогда не сделали Иисуса Господом,\" что они служили себе. Медицинское учреждение, которое калечит младенческих мальчиков, служит себе — его идеологии, его доходам, его власти. Ефесянам 6:12 предупреждает нас, что битва — \"против принципальностей, против сил, против владетелей тьмы этого мира.\" Индустрия обрезания — одна такая принципальность.\u003c/p\u003e\n\u003cp\u003eНаполеон признал орден иезуитов \"военной организацией\", преследующей \"абсолютную власть.\" Документальный фильм \"Catholic Confidential\" раскрывает их инфильтрацию \"замаскированную хитростью.\" Коммунистическая инфильтрация американской медицины следовала той же рецепте: терпеливая, систематическая, невидимая для тех, кто не обучен её видеть.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"коммунистическая-инфильтрация-американских-учреждений\"\u003eКоммунистическая инфильтрация американских учреждений\u003c/h2\u003e\n\u003ch3 id=\"конгрессный-рекорд\"\u003eКонгрессный рекорд\u003c/h3\u003e\n\u003cp\u003eВ 1963 году, конгрессмен Альберт Герлонг Младший прочитал в конгрессный рекорд список 45 коммунистических целей для Америки, вывлеченный из книги Клеона Скоусена \u003cem\u003eThe Naked Communist\u003c/em\u003e. Среди этих целей:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЦель #3\u003c/strong\u003e: \"Разработать иллюзию, что полное разоружение США будет демонстрацией моральной силы.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦель #17\u003c/strong\u003e: \"Получить контроль школ. Используйте их как ленты передачи для социализма и текущей коммунистической пропаганды.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦель #29\u003c/strong\u003e: \"Скомпрометировать американскую конституцию, называя её неадекватной, старомодной, неиспользованной современным потребностям.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦель #32\u003c/strong\u003e: \"Поддерживайте любое социалистическое движение, чтобы дать централизованный контроль над какой-либо частью культуры — образование, социальные агентства, программы благополучия, клиники психического здоровья и т.д.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦель #38\u003c/strong\u003e: \"Передавайте некоторые полномочия ареста от полиции к социальным агентствам.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦель #39\u003c/strong\u003e: \"Доминируйте психиатрическую профессию и используйте законы психического здоровья как средство получить принудительный контроль над теми, кто противится коммунистическим целям.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦель #40\u003c/strong\u003e: \"Скомпрометируйте семью как учреждение.\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦель #41\u003c/strong\u003e: \"Подчеркивайте необходимость воспитывать детей вдали от негативного влияния родителей.\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eМедицинское учреждение было основной целью. Контролируя медицину, коммунистические-влиятельные сети получили власть определяять нормальность и отклонение, предписывать и запрещать поведения и физически изменять тела граждан без их согласия.\u003c/p\u003e\n\u003ch3 id=\"роквефеллер-коммунистическая-связь\"\u003eРоквефеллер-коммунистическая связь\u003c/h3\u003e\n\u003cp\u003eОтношение семьи Роквефеллер с коммунистическими и социалистическими движениями обширно документировано. Фонд Роквефеллера финансировал советских связанных исследователей. Чейс Манхэттен Банк, финансовое учреждение Роквефеллера, была одним из первых американских банков открыть филиалы в Советском Союзе. Давид Рокфеллер открыто похвалил коммунистическую революцию Мао.\u003c/p\u003e\n\u003cp\u003eЭто была не идеологическая путаница. Династия Роквефеллера — как орден иезуитов — превосходит обычные политические категории. Их цель — контроль, и они финансируют любые движения, которые продвигают эту цель. Упор коммунизма на централизованный государственный контроль над каждым аспектом жизни — включая тело — идеально совпадал с видением Роквефеллера медицины.\u003c/p\u003e\n\u003cp\u003eДоклад Флекснера 1910 года, финансируемый Роквефеллером и Карнеги, централизовал медицинское образование и разрушил альтернативные лечебные традиции. Это была коммунистическая стратегия, применённая к медицине: исключить конкуренцию, централизовать власть и сделать население зависимым от единственной, одобренной государством системы.\u003c/p\u003e\n\u003ch2 id=\"история-американского-обрезания\"\u003eИстория американского обрезания\u003c/h2\u003e\n\u003ch3 id=\"не-иудейская-или-христианская-практика\"\u003eНе иудейская или христианская практика\u003c/h3\u003e\n\u003cp\u003eЧастое неправильное понимание — что американское обрезание происходит из иудейско-христианской религиозной традиции. Это неправда. Христианство явно отвергло обрезание как требование для верующих (Галатам 5:6, Деяния 15). Подавляющее большинство христианских наций — Европа, Южная Америка, большинство Азии — не практикуют рутинное младенческое обрезание.\u003c/p\u003e\n\u003cp\u003eАмериканское обрезание имеет полностью светские истоки. Оно было пропагандировано в конце 19-го века медицинскими профессионалами, которые верили, что оно будет предотвращать мастурбацию — практику, которую викторианские врачи считали причиной безумия, эпилепсии и морального вырождения.\u003c/p\u003e\n\u003ch3 id=\"повестка-дня-против-удовольствия\"\u003eПовестка дня против удовольствия\u003c/h3\u003e\n\u003cp\u003eД-р Джон Харви Келлог — да, человек магната зерновых — был одним из самых видных сторонников обрезания как лечения мастурбации. В его книге 1888 года \u003cem\u003eTreatment for Self-Abuse and Its Effects\u003c/em\u003e, Келлог написал:\u003c/p\u003e\n\u003cp\u003e\"Операция должна быть выполнена хирургом без администрирования анестезии, поскольку краткая боль, сопровождающая операцию, будет иметь здоровый эффект на разум, особенно если она будет связана с идеей наказания.\"\u003c/p\u003e\n\u003cp\u003eЭто не медицина. Это ритуализированное наказание младенческих мальчиков за поведение, которое они не совершили и не могут совершить. Это злоупотребление, одетое в медицинский язык — то же самое инверсия добра и зла, которая характеризует сатанинские операции на протяжении истории.\u003c/p\u003e\n\u003ch3 id=\"медикализация-увечья\"\u003eМедикализация увечья\u003c/h3\u003e\n\u003cp\u003eК началу 20-го века, анти-мастурбационное основание стало опасно устаревшим. Медицинское учреждение нуждалось в новых обоснованиях для обрезания. В течение десятилетий, вращающаяся серия медицинских претензий была выдвинута:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e1900s-1930s\u003c/strong\u003e: Предотвращает мастурбацию и моральное вырождение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1940s-1950s\u003c/strong\u003e: Предотвращает рак пениса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1960s-1970s\u003c/strong\u003e: Улучшает гигиену\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1980s-1990s\u003c/strong\u003e: Предотвращает инфекции мочевого пути\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e2000s-настоящее\u003c/strong\u003e: Предотвращает передачу ВИЧ\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждая претензия была в конечном итоге опровергнута или показана, чтобы быть сильно преувеличенной, только чтобы быть заменённой новой претензией. Этот паттерн — сдвигающиеся обоснования для неизменной практики — раскрывает, что практика движима не свидетельством, а чем-то ещё совсем.\u003c/p\u003e\n\u003ch2 id=\"разведывательно-фармацевтический-nexus\"\u003eРазведывательно-фармацевтический nexus\u003c/h2\u003e\n\u003ch3 id=\"разрушение-семейной-единицы\"\u003eРазрушение семейной единицы\u003c/h3\u003e\n\u003cp\u003eОдна из основных целей коммунизма — разрушение семейной единицы. Когда новорождённый мальчик отделён от его матери и подвергнут хирургическому генитальному изменению в течение часов рождения, связь матери-ребёнка разорвана в её наиболее уязвимый момент. Младенец испытывает чрезвычайную боль и травму, которые исследования показали влияют неврологическое развитие, восприятие боли и доверие.\u003c/p\u003e\n\u003cp\u003eМать, которая инстинктивно хочет защитить своего младенца, сказана медицинскими властями, что процедура — \"рутинная,\" \"полезная\" и \"ничего не волнуется.\" Она обучена переопределять её материнские инстинкты и дефер к институциональной власти — что-то как раз то, что коммунистические системы требуют.\u003c/p\u003e\n\u003ch3 id=\"исследования-боли-которые-они-похоронили\"\u003eИсследования боли, которые они похоронили\u003c/h3\u003e\n\u003cp\u003eДо 1990-х годов, многие обрезания были выполнены вообще без какой-либо анестезии, основанные на медицинской претензии, что новорождённые \"не чувствуют боли.\" Эта претензия была не просто неправильна — она была чудовищна. Новорождённые имеют полностью развитую нервную систему и испытают боль остро. Исследования измеряющие уровни кортизола, частоту сердца и плачущие паттерны в обрезанных младенцах показали уровни физиологического стресса сравнимые с пыткой.\u003c/p\u003e\n\u003cp\u003eГотовность медицинского учреждения применять неанестезирную хирургию на беспомощных младенцах — в то время отрицая, что эти младенцы чувствуют боль — раскрывает глубокое разъединение от базовой человеческой сочувствии. Это разъединение характеристично для систем, которые были захвачены идеологическими силами, которые видят человеческих существ как ресурсы, которые управляются, а не как души, которые должны быть дорожены.\u003c/p\u003e\n\u003ch3 id=\"прибыль-над-людьми\"\u003eПрибыль над людьми\u003c/h3\u003e\n\u003cp\u003eОбрезание производит миллиарды долларов ежегодно для американской системы здравоохранения:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eХирургические сборы\u003c/strong\u003e: каждое обрезание производит $200-$600 в прямых хирургических зарядах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОсложнения\u003c/strong\u003e: осложнения обрезания производят дополнительный медицинский доход через исправительные процедуры, лечение инфекции и срочную помощь\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСбор крайней плоти\u003c/strong\u003e: крайние плоти младенцев собраны и проданы биотехнологическим компаниям для использования в косметических продуктах, кожных трансплантатах и материалах исследования. Компании как SkinMedica (теперь принадлежащая Allergan) используют крайние плоти младенца-происхождение фибробластов в антивозрастных кремах, которые продают за сотни долларов за банку.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eФакт, что младенческие части тела собраны и проданы за косметические продукты, должен быть национальным скандалом. Вместо этого, это рутинная деловая практика, скрытая у всех на виду — точно как иезуитский метод действует: инфильтрация \"замаскирована хитростью.\"\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"ритуал-крови-или-медицинская-процедура\"\u003eРитуал крови или медицинская процедура?\u003c/h3\u003e\n\u003cp\u003eУдаление крайней плоти новорождённого мужчины включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПролитие невинной крови\u003c/li\u003e\n\u003cli\u003eИзменение творения Бога без согласия субъекта\u003c/li\u003e\n\u003cli\u003eПрименение чрезвычайной боли к беспомощному существу\u003c/li\u003e\n\u003cli\u003eРазобщение чувствительной ткани в наиболее интимной части тела\u003c/li\u003e\n\u003cli\u003eСбор и товаризацию человеческого мяса\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЕсли эти элементы были описаны без медицинского контекста, большинство людей признали бы их как характеристики ритуала крови. Медикализация обрезания предоставляет покрытие для того, что, в его ядре, является ритуалистической практикой с глубоко тревожащими духовными последствиями.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман был показано, что демонические силы действуют через системы, которые кажутся доброкачественными. 97,5%, которые терпят неудачу в их духовной прогулке, терпят неудачу именно потому, что они не могут видеть духовную реальность позади физического фасада. Больничная операционная выглядит чистой, стерильной и научной. Но духовное измерение того, что происходит, когда невинная кровь пролита без согласия, не видимо физическому глазу.\u003c/p\u003e\n\u003ch3 id=\"вопрос-завета\"\u003eВопрос завета\u003c/h3\u003e\n\u003cp\u003eХристиане, которые поддерживают обрезание, часто цитируют старый завет завета. Но новый завет в Христе явно превосходит требование для физического обрезания. Павел писал в Галатам 5:2: \"Вот, я, Павел, говорю вам: если вы обрезываетесь, Христос не принесёт вам пользы.\" Обрезание, которое имеет значение в новом завете, — это обрезание сердца (Римляне 2:29) — духовная трансформация, не физическое увечье.\u003c/p\u003e\n\u003cp\u003eИезуиты, мастера библейской манипуляции, давно использовали выборочные отрывки библии для оправдания практик, которые служат их институциональным целям. Использование Старого завета обрезания для оправдания младенческого генитального разрезания в христианской нации — идеальный пример этой манипуляции.\u003c/p\u003e\n\u003ch2 id=\"взгляд-вперёд-на-часть-2\"\u003eВзгляд вперёд на Часть 2\u003c/h2\u003e\n\u003cp\u003eВ Части 2 мы исследуем конкретные медицинские претензии, используемые для оправдания обрезания, опровергаем каждую с клиническими свидетельствами, изучим психологическое воздействие на обрезанных мужчин и отслеживаем институциональные сети, которые держат эту практику укреплённой в американской медицине несмотря на отсутствие медицинского обоснования.\u003c/p\u003e\n\u003cp\u003eКоммунистический захват американской медицины — это не просто об обрезании — это о систематическом захвате каждого учреждения, которое формирует человеческую жизнь, от рождения до смерти. Обрезание — просто наиболее видимый маркер этого захвата, потому что это применено к самым уязвимым членам общества в наиболее уязвимый момент их жизней.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследование коррупции медицинской системы и истории обрезания\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — духовная война и демонические системы\u003c/li\u003e\n\u003cli\
