вал трон Израиля, люди пришли к нему и просили облегчить тяжкое бремя, которое его отец Соломон наложил на них. Ровоам консультировался с старейшинами, которые советовали ему служить людям. Он отверг их совет. Он консультировался со своими молодыми советниками, которые сказали ему сделать бремя тяжелее. Он следовал советам молодых людей, объявил, что его мизинец толще, чем чресла его отца, и пообещал добавить скорпионов к бичам.\u003c/p\u003e\n\u003cp\u003eКоролевство разделилось надвое. Десять колен ушли под Иеровоамом, и только Иуда и Вениамин остались верны Ровоаму. Король, отвергший совет мудрых и удвоивший тиранию, потерял большинство своего королевства.\u003c/p\u003e\n\u003cp\u003eКак раскрывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e, маскировка врага наиболее эффективна - претензия на мораль - претензия на защиту людей при их угнетении, настаивание на следовании \"науке\" при подавлении учёных, которые не согласны.\u003c/p\u003e\n\u003cp\u003eГэвин Ньюсом выбрал противостояние обновлённому руководству CDC. Он выбрал сделать бремя тяжелее. И большинство американцев выбрали другой путь.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"противостояние-ньюсома\"\u003eПротивостояние Ньюсома\u003c/h2\u003e\n\u003cp\u003eГубернатор Калифорнии Гэвин Ньюсом объявил, что штат Калифорния не будет следовать обновлённому руководству CDC по вакцинации COVID-19 и протоколам общественного здравоохранения. Вместо этого Калифорния сохранит существующую политику - политику, которая отражает рекомендации CDC до реформы и предпочитаемый подход фармацевтической промышленности к общественному здравоохранению.\u003c/p\u003e\n\u003cp\u003eПротивостояние Ньюсома охватывает несколько конкретных областей политики:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРекомендации по вакцинации:\u003c/strong\u003e Хотя реформированный CDC обновил своё руководство, отражая новые данные безопасности и анализы риска-пользы, Калифорния продолжает следовать предыдущим рекомендациям, сохраняя агрессивное продвижение вакцинации для всех возрастных групп.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТребования вакцинации в школе:\u003c/strong\u003e Калифорния поддерживает строгие требования вакцинации для поступления в школу, включая положения, которые были расширены во время пандемии COVID-19.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМандаты для работников здравоохранения:\u003c/strong\u003e Калифорния продолжает применять требования вакцинации для работников здравоохранения на государственных учреждениях.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСообщения общественного здравоохранения:\u003c/strong\u003e Департамент общественного здравоохранения Калифорнии продолжает продвигать вакцинацию COVID-19, используя сообщения, которые отражают позиции CDC до реформы, включая характеристики обновлённого федерального руководства как \"политически мотивированного\".\u003c/p\u003e\n\u003ch3 id=\"политический-расчёт\"\u003eПолитический Расчёт\u003c/h3\u003e\n\u003cp\u003eПротивостояние Ньюсома, в его основе, - это политический расчёт. Фармацевтическая промышленность Калифорнии - расположенная в биотехнологических коридорах Сан-Франциско, Сан-Диего и Лос-Анджелеса - представляет один из крупнейших экономических секторов штата и одну из наиболее значительных избирательных групп губернатора.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report (karenkingston.substack.com), что руководство Калифорнии имеет самые глубокие финансовые связи с фармацевтической промышленностью любого государственного правительства. \"Калифорния противостоит CDC не для защиты общественного здравоохранения\", писала Кингстон. \"Это противостояние CDC для защиты фармацевтических доходов. Биотехнологическая промышленность штата - Gilead, Amgen, Genentech, Illumina и дюжина более мелких фирм - зависит от нормативно-правовой базы, которая продвигает фармацевтические продукты без вопросов их безопасности. Противостояние Ньюсома - это служба его донорам, а не его избирателям.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-американцы-действительно-думают\"\u003eЧто американцы Действительно Думают\u003c/h2\u003e\n\u003cp\u003eНаиболее значительное измерение противостояния Ньюсома заключается в том, что оно противоречит выраженным взглядам американской общественности. Данные опросов последовательно показывают, что большинство американцев теперь поддерживают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРеформу федеральных органов здравоохранения:\u003c/strong\u003e Более 60% американцев полагают, что CDC, FDA и NIH нуждаются в фундаментальной реформе для решения конфликтов интересов и восстановления общественного доверия.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПрозрачность в данных безопасности вакцин:\u003c/strong\u003e Более 70% американцев полагают, что все данные клинических испытаний вакцин должны быть открыто доступны, включая данные, которые фармацевтические компании стремились держать в тайне.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонец вакцинному мандатам:\u003c/strong\u003e Более 55% американцев противостоят правительству или работодателю вакцинному мандатам, резкое изменение от периода пандемии, когда узкие большинства их поддерживали.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРасследование происхождения COVID-19:\u003c/strong\u003e Более 65% американцев полагают, что федеральное правительство должно полностью расследовать происхождение COVID-19, включая возможность утечки лаборатории.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОтветственность фармацевтических компаний:\u003c/strong\u003e Более 50% американцев полагают, что фармацевтические компании должны столкнуться с юридической ответственностью за травмы вакцины COVID-19, включая модификацию щита ответственности PREP Act.\u003c/p\u003e\n\u003cp\u003eЭти цифры представляют сейсмический сдвиг в американском общественном мнении. Во время пика пандемии CDC был одним из наиболее доверяемых учреждений в американской общественной жизни. Сегодня доверие к CDC рухнуло до исторических низких - и общественность подавляющим большинством поддерживает реформы, которые Ньюсом противостоит.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"конфликт-штата-против-федерального\"\u003eКонфликт Штата против Федерального\u003c/h2\u003e\n\u003cp\u003eПротивостояние Ньюсома устанавливает конституционный конфликт между государственной и федеральной органами здравоохранения. В соответствии с Десятой поправкой штаты сохраняют широкие полномочия полиции над общественным здравоохранением в своих границах. Однако Предложение о верховенстве устанавливает, что федеральный закон - и действия федеральных органов, работающих в соответствии с федеральным законодательством - отменяет конфликтующий государственный закон.\u003c/p\u003e\n\u003cp\u003eРазрешение этого конфликта зависит от конкретных вовлечённых механизмов. Рекомендации CDC не являются, сами по себе, юридически обязательными. Они становятся обязательными, когда их принимают государственные законодательства, государственные органы здравоохранения или когда они связаны с условиями федерального финансирования. Если федеральное правительство обусловит федеральное финансирование здравоохранения (Medicaid, Medicare, CHIP) соответствием обновлённому руководству CDC, Калифорния столкнется с выбором между противостоянием и потерей миллиардов в федеральном финансировании здравоохранения.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eОснователи Иллюминати\u003c/a\u003e документирует, как напряжение между федеральной и государственной властью было особенностью американской системы с её начала - и как это напряжение систематически использовалось мощными интересами для сохранения контроля независимо от того, на каком уровне правительства они работают.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"государство-фармакеи\"\u003eГосударство Фармакеи\u003c/h2\u003e\n\u003cp\u003eОтношение Калифорнии к фармацевтической промышленности выходит за рамки нормальных моделей политических пожертвований и лоббирования. Штат стал, по сути, филиалом фармацевтической промышленности:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSB 277 (2015):\u003c/strong\u003e Калифорния устранила исключение личного убеждения для детской вакцинации, став одним из самых строгих штатов мандата вакцинации в стране. Счёт был выступлением государственного сенатора Ричарда Пана, врача, который получил значительные взносы в избирательные кампании от фармацевтических компаний.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAB 2098 (2022):\u003c/strong\u003e Калифорния приняла закон, обозначающий распространение \"дезинформации\" о COVID-19 лицензированными врачами как \"непрофессиональное поведение\", подлежащее дисциплинарным действиям, включая отзыв лицензии. Закон позже был заблокирован федеральным судом как вероятное нарушение Первой поправки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSB 866 (2022):\u003c/strong\u003e Калифорния позволила несовершеннолетним в возрасте 12 лет и старше согласиться на вакцинацию без разрешения родителей, удалив один из последних защитных механизмов между фармацевтическими компаниями и детьми.\u003c/p\u003e\n\u003cp\u003eКингстон характеризовала Калифорнию как \"Государство Фармакеи\" - юрисдикцию, в которой интересы фармацевтической промышленности были настолько тщательно встроены в законодательную, нормативную и политическую инфраструктуру, что государственное правительство функционирует как механизм применения фармацевтических препаратов, а не как орган общественного здравоохранения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческий-параллель\"\u003eПророческий Параллель\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ибо ты говоришь: 'я богат, разбогател и ни в чем не нуждаюсь'; а не знаешь, что ты несчастен, жалок, беден, слеп и наг.\" — Откровение 3:17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЦерковь в Лаодикии верила, что она процветающая и не нуждалась ни в чём. Христос объявил её жалкой, несчастной, бедной, слепой и голой. Разрыв между самовосприятием и реальностью был полным.\u003c/p\u003e\n\u003cp\u003eКалифорния под руководством Ньюсома представляет себя лидером нации в науке, общественном здравоохранении и прогрессивном управлении. Но реальность - штат, захваченный фармацевтическими интересами, управляемый политиками, финансируемыми этими интересами, и применяющий политику, которая приоритизирует фармацевтический доход над здоровьем и свободой его граждан.\u003c/p\u003e\n\u003cp\u003eБольшинство американцев видят это ясно. Ньюсом - нет - или выбирает нет.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всём, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отзывается через все коридоры правительства сегодня. Когда Израиль потребовал царя, как другие народы, Бог предупредил их точно, что произойдёт - их сыновья взяты на войну, их дочери на службу, их поля и виноградники захвачены, десятина всего отобрана. Они выбрали человеческое правительство над правлением Бога, и тирания следовала точно, как предсказано. Ничего не изменилось. Современная политическая система - два крыла одной птицы - левое и правое, республиканцы и демократы - все служат одной и той же скрытой структуре власти. Голосование за обе стороны - это выбор, какое крыло хлопает дальше, пока птица летит в том же направлении. Реальная власть никогда не была на любом бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eОфис Губернатора Калифорнии - объявления о политике и исполнительные действия\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) - анализ Карен Кингстон о связях фармацевтической промышленности Калифорнии, захвате законодательства и анализе политики уровня штата\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eДанные опросов - общественное мнение о реформе CDC, вакцинных мандатах и фармацевтической ответственности\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSB 277, AB 2098, SB 866 - записи Законодательной Ассамблеи Калифорнии\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eПритчи 14:12, Откровение 3:17 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против Земных Царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство NDE Говарда Питтмана — Предупреждение Конца Времён\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолический Конфиденциально: Позорные Секреты Иезуитов Разоблачены\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в Подвале Ватикана Может Вас Шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.c
