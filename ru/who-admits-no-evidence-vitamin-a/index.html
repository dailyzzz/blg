ка сего, против духов злобы поднебесных.\"\u003c/em\u003e — Ефесян 6:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВедётся война за вашу душу, и она выходит далеко за пределы того, что большинство людей может воспринимать. Поле боя — не просто политическое или социальное — это духовное. Каждый слой обмана, от фармацевтической промышленности к глобальным организациям здравоохранения, которые управляют нашими телами, восходит к древнему плану, оркестрированному тайными обществами, сатанистскими сетями и иезуитским орденом, который инфильтровал каждое учреждение на Земле.\u003c/p\u003e\n\u003cp\u003eКак Говард Питтман раскрыл во время своего близкого опыта смерти, существуют три неба, и второе небо правит демоническими силами, организующимися против человечества. Питтман узнал, что 97,5% христиан были отвергнуты не потому, что им не хватало веры, а потому, что они \"никогда не делали Иисуса своим Господом\" их жизней. Они служили себе. Девяносто пять процентов всех исповедующих христиан, ему было сказано, служат себе, а не Богу. Витаминная промышленность, империя пищевых добавок, весь аппарат медицины Рокфеллеров — всё это предназначено для того, чтобы вы служили себе, доверяя человеческим решениям, а не Создателю.\u003c/p\u003e\n\u003cp\u003eНаполеон Бонапарт однажды сказал об иезуитах: \"Иезуиты — это военная организация, а не религиозный орден. Их главный — генерал армии, а не просто отец-аббат монастыря. И цель этой организации — власть — власть в её наиболее деспотическом упражнении — абсолютная власть, универсальная власть, власть для контроля мира волей одного человека.\" Джон Адамс написал: \"Если когда-либо была группа людей, которые заслужили вечное проклятие на земле и в аду, это является Обществом Лойолы.\" Обман проходит глубоко. Даже папа Климент XIV, который попытался подавить иезуитов в 1773 году, был отравлен за свои усилия. Генерал Тамбулини хвастался: \"Я управляю половиной мира из этой комнаты.\"\u003c/p\u003e\n\u003cp\u003eМиф витамина — это один маленький поток в этой обширной паутине обмана.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"тихое-признание-воз\"\u003eТихое признание ВОЗ\u003c/h2\u003e\n\u003cp\u003eВ движении, которое должно было сделать заголовки по всему миру, но вместо этого было похоронено под слоями институционального молчания, Всемирная организация здравоохранения опубликовала выводы, признающие, что существует \u003cstrong\u003eотсутствие твёрдых доказательств\u003c/strong\u003e, что добавки витамина А обеспечивают преимущества для здоровья, долгое время им приписываемые. Это не заявление от альтернативного блога о здоровье. Это поступает из самой организации, которая на протяжении десятилетий продвигала программы добавок витамина А во всём развивающемся мире.\u003c/p\u003e\n\u003ch3 id=\"что-документы-действительно-говорят\"\u003eЧто документы действительно говорят\u003c/h3\u003e\n\u003cp\u003eСобственные систематические обзоры ВОЗ раскрывают потрясающий недостаток доказательств. Исследования, которые когда-то были цитированы как основополагающие для программ добавок витамина А, были переоценены и признаны содержащими значительные методологические дефекты. Контрольные группы были неадекватными. Смешивающие переменные были проигнорированы. Размеры выборок были манипулированы. И всё же миллиарды долларов были направлены в программы витамина А на основе этой неустойчивой науки.\u003c/p\u003e\n\u003cp\u003eОригинальные исследования 1980-х и 1990-х годов, которые запустили глобальную кампанию витамина А, были финансированы — и это не должно удивлять никого — организациями с прямыми связями с Фондом Рокфеллера и фармацевтической промышленностью. Тот же Фонд Рокфеллера, который создал современную аллопатическую медицину, который финансировал отчёт Флекснера 1910 года, который уничтожил практики естественного исцеления и гомеопатию в Америке, который превратил медицину в машину выписывания лекарств.\u003c/p\u003e\n\u003ch3 id=\"витаминная-машина-рокфеллера\"\u003eВитаминная машина Рокфеллера\u003c/h3\u003e\n\u003cp\u003eЧтобы понять, как витамин А стал глобальным мандатом здравоохранения, вы должны понять медицинскую империю Рокфеллера. В начале 20-го века Джон Д. Рокфеллер и его сотрудники осознали, что побочные продукты нефти могли быть синтезированы в соединения, которые имитировали природные вещества. Нефтехимическая промышленность и фармацевтическая промышленность стали одной и той же. Витамины — синтетические витамины — стали многомиллиардной промышленностью практически в ночь.\u003c/p\u003e\n\u003cp\u003eСхема была элегантна в её зле. Сначала уничтожьте общественное понимание реального питания. Затем замените цельное питание изолированными синтетическими соединениями, произведёнными в лабораториях. Затем создавайте глобальные организации здравоохранения для продвижения этих синтетических соединений на население во всём мире, особенно в развивающемся мире, где люди не могли легко оспаривать науку.\u003c/p\u003e\n\u003cp\u003eРука иезуитов в этом неуловима. Католическая церковь, через свою обширную сеть миссий и благотворительных организаций, стала одним из основных каналов распределения для программ добавок витаминов в Африке, Азии и Южной Америке. Иезуитская клятва, как раскрыто в документальном фильме Католическое конфиденциально, говорит об инфильтрации \"замаскированной хитростью\" — встраивании агентов внутри каждого учреждения, каждого благотворительного усилия, каждого добра работать и поворачивать их в направлении служения силе Рима.\u003c/p\u003e\n\u003ch3 id=\"наука-которая-не-существует\"\u003eНаука, которая не существует\u003c/h3\u003e\n\u003cp\u003eДавайте быть конкретными о том, что доказательства действительно показывают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсследования смертности\u003c/strong\u003e: Знаковые исследования Непала и Индонезии 1990-х годов, которые утверждали, что витамин А снизил смертность детей на 23-34%, были оспорены последующими мета-анализами. Когда исследователи контролировали смешивающие факторы — улучшенную санитарию, лучшее общее питание, доступ к чистой воде — эффект витамина А исчез.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКорь и витамин А\u003c/strong\u003e: ВОЗ сама признала, что доказательства, связывающие добавки витамина А с пониженной тяжестью кори, являются \"низкого качества.\" Исследования были проведены в популяциях с тяжёлым недоедением, где любые калорийные добавки показали бы пользу. Приписывание выгоды конкретно витамину А было научным обманом руки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКсерофтальмия (ночная слепота)\u003c/strong\u003e: это состояние наиболее часто связано с дефицитом витамина А. Однако исторические медицинские тексты с эры до-Рокфеллера лечили ночную слепоту цельными продуктами — печенью, сливочным маслом, яйцами, кодовой печенью в её целой форме — не с изолированными добавками ретинола. Состояние было понято как признак общего пищевого дефицита, а не конкретной нехватки витамина А.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУтверждения о функции иммунитета\u003c/strong\u003e: идея о том, что витамин А \"стимулирует иммунную систему\", построена на той же мошеннической основе, что и сам миф об иммунной системе (который мы рассматриваем в отдельной статье). Реакция организма на питание холистична, а не механистична. Изоляция одного соединения и утверждение, что оно \"поднимает\" систему, которая не функционирует так, как нам рассказывали, — это мошенничество, наложенное на мошенничество.\u003c/p\u003e\n\u003ch2 id=\"бизнес-синтетических-витаминов\"\u003eБизнес синтетических витаминов\u003c/h2\u003e\n\u003ch3 id=\"следуйте-деньгам\"\u003eСледуйте деньгам\u003c/h3\u003e\n\u003cp\u003eГлобальная индустрия витаминов и добавок стоит более 150 миллиардов долларов в год. Одни добавки витамина А представляют миллиарды доходов. Компании, которые производят эти добавки — BASF, DSM, Lonza — это химические корпорации с глубокими связями с фармацевтической промышленностью. BASF, например, является крупнейшей химической компанией в мире и когда-то была частью IG Farben, немецкого химического конгломерата, который производил Zyklon B и финансировал программы нацистских исследований.\u003c/p\u003e\n\u003cp\u003eЭто не совпадение. Это продолжение. Те же сети, те же кровные линии, те же тайные общества, которые финансировали программы евгеники в начале 20-го века, продолжают управлять аппаратом глобального здравоохранения сегодня. Иезуиты, действующие через свою сеть католических университетов, больниц и благотворительных организаций, обеспечивают моральное прикрытие. Фармацевтические компании обеспечивают продукты. ВОЗ обеспечивает мандат. И люди платят — своими деньгами, их здоровьем и в конечном счёте их душами.\u003c/p\u003e\n\u003ch3 id=\"как-синтетические-витамины-отличаются-от-цельных-продуктов\"\u003eКак синтетические витамины отличаются от цельных продуктов\u003c/h3\u003e\n\u003cp\u003eСинтетический витамин А (ретинил пальмитат, ретинил ацетат) производится из нефтехимикатов. Он имеет поверхностное молекулярное сходство с ретинолом, обнаруженным в животных продуктах, но тело обрабатывает его по-другому. Синтетический витамин А накапливается в печени и может достигать токсичных уровней гораздо более легко, чем пищевой ретинол. Исследования связали высокодозированное дополнение синтетического витамина А с:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПовышенный риск переломов бедра\u003c/li\u003e\n\u003cli\u003eПовреждение печени\u003c/li\u003e\n\u003cli\u003eРождение дефектов при приёме во время беременности\u003c/li\u003e\n\u003cli\u003eУвеличенная смертность у курильщиков (в сочетании с добавками бета-каротина)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВОЗ знает это. Фармацевтическая промышленность знает это. И всё же программы добавок продолжаются, потому что программы никогда не были о здоровье. Они были о контроле, прибыли и медленном отравлении популяций, которые элита рассматривает как расходный материал.\u003c/p\u003e\n\u003ch3 id=\"духовное-измерение-пищевого-обмана\"\u003eДуховное измерение пищевого обмана\u003c/h3\u003e\n\u003cp\u003eГовард Питтман был показан во время его НСО, что демонические силы организуют в иерархиях, и что их основное оружие — обман. Демоны не нуждаются в том, чтобы обладать каждым человеком — им просто нужно построить системы лживых систем настолько всепроникающих, что люди добровольно подчиняются им. Витаминная промышленность — одна такая система.\u003c/p\u003e\n\u003cp\u003eКогда вы принимаете синтетический витамин, вы помещаете свою веру в построенную человеком систему, а не в божественное провидение через цельные, естественные продукты. Это именно тот вид поведения, служащего себе, который описал Питтман — 95%, кто служит \"себе\", а не Богу. Полка с добавками в вашей местной аптеке — это храм самополагания, вера в то, что человеческая химия может улучшить творение Бога.\u003c/p\u003e\n\u003cp\u003eИезуитский орден понимал этот принцип столетия назад. Игнатий Лойолы построил Общество Иисуса как военную организацию, разработанную для инфильтрации и контроля каждого аспекта человеческой жизни — образование, медицину, правительство, религию. Миф витамина — это просто один фронт в этой вековой войне.\u003c/p\u003e\n\u003ch2 id=\"глобальные-программы-добавок-воз\"\u003eГлобальные программы добавок ВОЗ\u003c/h2\u003e\n\u003ch3 id=\"unicef-и-капсула-витамина-а\"\u003eUNICEF и капсула витамина А\u003c/h3\u003e\n\u003cp\u003eС 1990-х годов UNICEF распределила более 10 миллиардов капсул витамина А детям в развивающихся странах. Программа стоит сотни миллионов долларов ежегодно. И всё же, как собственные обзоры ВОЗ теперь признают, основа доказательств разваливается.\u003c/p\u003e\n\u003cp\u003eЗадайте себе: если доказательства не поддерживают программу, почему программа продолжается? Ответ — это один и тот же ответ, который вы найдёте позади каждого институционального мошенничества — деньги, власть и духовная слепота, которая проистекает из служения плану Сатаны, а не истине Бога.\u003c/p\u003e\n\u003cp\u003eДокументальный фильм Католическое конфиденциально раскрывает, что иезуитская клятва требует абсолютного послушания — род слепого послушания, который позволяет целым организациям perpetrate мошенничество без какого-либо отдельного человека, чувствующего ответственность. \"Любые виды пороков\" разрешены в служении целям ордена. Если отравление детей синтетическими химикатами продвигает повестку дня контроля, то это не только разрешено, но требуется.\u003c/p\u003e\n\u003ch3 id=\"связь-фонда-гейтса\"\u003eСвязь Фонда Гейтса\u003c/h3\u003e\n\u003cp\u003eФонд Билла и Мелинды Гейтс интенсивно инвестировал в программы добавок витамина А, разработку Золотого риса и схемы биофортификации. Гейтс — чей отец служил в правлении Planned Parenthood, чья семья имеет глубокие связи с движением евгеники — представляет эти программы как филантропию. Но образец неуловим: каждое \"здоровье\" вмешательство, продвинутое глобальной элитой, служит двойной цели прибыли и контроля населения.\u003c/p\u003e\n\u003cp\u003eЗолотой рис, генетически модифицированный для производства бета-каротина, был продвинут как решение для дефицита витамина А в Азии. Миллиарды были потрачены на разработку и продвижение. Но исследования показали, что Золотой рис обеспечил незначительную пищевую выгоду, и реальные показатели принятия в реальном мире были плохими. Проект преуспел не в кормлении людей, а в нормализации генетической модификации продовольствия — что было истинной целью всё время.\u003c/p\u003e\n\u003ch2 id=\"что-они-не-хотят-чтобы-вы-знали-о-реальном-питании\"\u003eЧто они не хотят, чтобы вы знали о реальном питании\u003c/h2\u003e\n\u003ch3 id=\"понимание-до-рокфеллера\"\u003eПонимание до Рокфеллера\u003c/h3\u003e\n\u003cp\u003eПрежде чем отчёт Флекснера Фонда Рокфеллера уничтожил традиционную медицину в Америке, врачи понимали питание холистически. Они не изолировали отдельные соединения и не назначали их в виде таблеток. Они понимали, что человеческое тело было разработано Богом для получения питания из цельных продуктов — продуктов, которые содержат не просто витамины, а кофакторы, ферменты и живую энергию, которые синтетические добавки не могут воспроизводить.\u003c/p\u003e\n\u003cp\u003eТрадиционные культуры по всему миру поддерживали отличное здоровье без каких-либо знаний о \"витамине А\" как изолированном соединении. Они ели органы мяса, сливочное масло, яйца, ферментированные продукты и цельные зёрна. Они ели в соответствии с сезонами и в соответствии с мудростью, передаваемой через поколения. Эта мудрость была систематически уничтожена машиной медицины Рокфеллера, которой нужны люди, зависимые от фармацевтических продуктов, а не от божественного провидения через природу.\u003c/p\u003e\n\u003ch3 id=\"связь-теории-terrain-versus-germ\"\u003eСвязь теории Terrain versus Germ\u003c/h3\u003e\n\u003cp\u003eМиф витамина интимно связан с мошенничеством теории микробов. Оба построены на одном редукционистском, механистическом взгляде на человеческое тело — взгляд, который видит тело как машину, которая может быть отремонтирована с химическими входами, а не как живой храм Святого Духа, который процветает, когда питается в соответствии с замыслом Бога.\u003c/p\u003e\n\u003cp\u003eТеория terrain Антуана Бечама — которая утверждала, что здоровье внутренней среды тела определяет болезнь, а не внешние захватчики — была подавлена в пользу теории микробов Луи Пастера. Почему? Потому что теория микробов прибыльна. Если болезнь вызвана микробами, вам нужны лекарства, чтобы убить микробов, вакцины, чтобы предотвратить их, и витамины, чтобы \"поднять\" иммунную систему, которая их борется. Каждый элемент этой модели производит доход для фармацевтической промышленности.\u003c/p\u003e\n\u003cp\u003eТеория Terrain производит ничего, кроме здоровых людей — и здоровые люди не прибыльны.\u003c/p\u003e\n\u003ch2 id=\"более-глубокая-повестка-дня\"\u003eБолее глубокая повестка дня\u003c/h2\u003e\n\u003ch3 id=\"codex-alimentarius-и-контроль-питания\"\u003eCodex Alimentarius и контроль питания\u003c/h3\u003e\n\u003cp\u003eКомиссия Codex Alimentarius, установленная совместно ВОЗ и Продовольственной и сельскохозяйственной организацией, устанавливает международные стандарты для безопасности пищи и питания. Под видом \"гармонизации\", Codex была использована для ограничения доступа к высокодозированным добавкам, запрета утверждений о натуральном здоровье и криминализации традиционных методов исцеления.\u003c/p\u003e\n\u003cp\u003eЭто эндгейм: мир, где каждый аспект человеческого питания контролируется международными организациями, управляемыми невыбранными бюрократами, связанными с фармацевтической промышленностью, иезуитским орденом и тайными обществами, которые направляли человеческую цивилизацию в течение столетий.\u003c/p\u003e\n\u003cp\u003eСлова, которые мы говорим, имеют духовную силу, как Питтман был показан во время его НСО. Когда ВОЗ объявляет, что витамин А \"существенен\" и что добавки \"спасают жизни\", эти слова создают реальность, которую миллиарды людей принимают без вопроса. Ложь становится истиной в умах обманутых. И обманутые, служившие себе, а не Богу, продолжают покупать добавки, финансировать программы и perpetrate мошенничество.\u003c/p\u003e\n\u003ch3 id=\"что-вы-можете-делать\"\u003eЧто вы можете делать\u003c/h3\u003e\n\u003cp\u003eПервый шаг всегда одинаков: признайте обман. Понимать, что учреждения, которым вас учили доверять — ВОЗ, CDC, NIH, медицинское учреждение — это не то, чем они кажутся. Они — инструменты контроля, wielded силами, которые были в войне с человечеством с падения Люцифера.\u003c/p\u003e\n\u003cp\u003eВторой шаг — вернуться к божественному провидению. Ешьте цельные продукты. Ищите традиционную мудрость. Отклоните синтетические заменители, которые фармацевтическая промышленность предлагает вместо реального питания. Ваше тело — храм, и оно заслуживает лучше, чем нефтепроизводные химикаты, маркетируемые как \"здоровье\".\u003c/p\u003e\n\u003cp\u003eТретий шаг — ищите истину — во всех вещах, но особенно в вопросах здоровья и медицины. Истина доступна тем, кто её ищет, но это требует усилий, discernment и мужества, чтобы отклонить повествование консенсуса.\u003c/p\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eРекомендации ВОЗ по добавкам витамина А и систематические обзоры\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eSubstack агента131711\u003c/a\u003e — обширное исследование медицины Рокфеллера и пищевого мошенничества\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство ОБЕ Говарда Питтмана\u003c/a\u003e — первостепенное описание духовной сферы и демонических иерархий\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическое конфиденциально: раскрытые позорные иезуитские тайны\u003c/a\u003e — документальный фильм, exposing иезуитской клятвы и тактики инфильтрации\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и фармакея — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может находиться в подвале Ватикана может шокировать вас!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eОтчёт Флекснера (1910) — документ, который уничтожил естественную медицину в Америке\u003c/li\u003e\n\u003cli\u003eИсторические записи программ медицинской филантропии Фонда Рокфеллера\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eМедицина Рокфеллеров\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eВакцина зверя\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/41-Shedding_Proof.mp4\"\u003eДоказательство ролика\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь обманщиков\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуй-далее\"\u003eИсследуй далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/history-vitamin-discoveries/?lang=ru\"\u003eТревожная история так называемых открытий витаминов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/immune-system-hoax/?lang=ru\"\u003eМОШЕННИЧЕСТВО ИММУННОЙ СИСТЕМЫ: что они никогда вам не сказали\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/satanic-science-smallpox-vaccine/?lang=ru\"\u003eСатанинская наука: ужасающая правда позади вакцины оспы\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eИстина не находится в бутылке на полке аптеки. Её находят в Слове Бога и в цельных продуктах, которые Он обеспечил для нашего питания. Витаминная машина Рокфеллера была построена для замены божественного провидения корпоративной прибыльностью. Сойдите с конвейера. Ищите истину. Ищите Бога.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex
