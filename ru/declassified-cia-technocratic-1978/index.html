лона были технократами -- они использовали технологию своего века (кирпич и раствор) построить систему единого контроля с собой в вершине. Документ CIA 1978 года выявляет, что современные технократы приняли ту же амбицию с намного более продвинутыми инструментами: компьютеры, спутники, электронное наблюдение и системная теория. Башня, которую они строят, не сделана из кирпича. Это сделано из данных. И ее вершина достигает не в небо, а в ум каждого человеческого существа на земле.\u003c/p\u003e\n\u003cp\u003eРассекреченный документ 1978 года -- почти половина столетия старого -- описывает с предчувствуемой ясностью систему технократического контроля теперь развертываемую. Что мир испытал во время COVID-19 было не импровизировано. Это было спланировано, задокументировано и классифицировано десятилетия перед первым lockdown было приказано.\u003c/p\u003e\n\u003cp\u003eКак \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e из альбома Confliction предупреждает, нарушение божественных границ всегда преднамеренно. И как \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e объявляет, обман был написан перед тем как это было говорено.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"документ\"\u003eДокумент\u003c/h2\u003e\n\u003ch3 id=\"контекст-и-происхождение\"\u003eКонтекст и происхождение\u003c/h3\u003e\n\u003cp\u003eДокумент CIA 1978 года выявился из оценки агентства появляющихся моделей управления и их последствиях для операций разведки и глобального контроля. Во время этого периода, CIA активно учила:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eТехнократические модели управления, которые предложили замену демократического принятия решения с экспертным управлением техническим\u003c/li\u003e\n\u003cli\u003eСистемная теория применена к контролю населения\u003c/li\u003e\n\u003cli\u003eКомпьютерное моделирование социального поведения и динамики населения\u003c/li\u003e\n\u003cli\u003eВозможности электронного наблюдения и их потенциал для полного мониторинга населения\u003c/li\u003e\n\u003cli\u003eКонвергенция информационной технологии, технологии коммуникации и инфраструктуры управления\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eДокумент описывает мир, в котором технология позволяет форму управления, которая трансцендирует традиционные политические структуры -- модель управления, в которой технические системы контролируют, управляют и контролируют популяции с точностью, которую демократические процессы не могут соответствовать.\u003c/p\u003e\n\u003ch3 id=\"ключевые-концепции\"\u003eКлючевые концепции\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eТехническое управление популяций\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eДокумент описывает замену политического управления техническим управлением. Скорее чем управление через законы, выборы и демократическое совещание, популяции управляются бы через технические системы, которые контролируют поведение, предсказывают результаты и приспосабливают условия, чтобы произвести желаемые результаты.\u003c/p\u003e\n\u003cp\u003eЭто является сутью технократии: замена политической власти технической властью. Эксперт замещает гражданина. Алгоритм замещает голос. Датчик замещает представителя.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПолная информационная осведомленность\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eДесятилетия перед фразой была введена программой John Poindexter's DARPA в 2002 году, документ 1978 года описывает концепцию полной информационной осведомленности -- возможность контролировать каждую транзакцию, коммуникацию, движение и взаимодействие каждого индивида в популяции.\u003c/p\u003e\n\u003cp\u003eДокумент выявил ключевые технологии, которые были бы нужны:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКомпьютеризированные базы данных способные хранить и обработать громадные количества индивидуальных данных\u003c/li\u003e\n\u003cli\u003eЭлектронные системы коммуникации, которые могли бы быть контролируемы и проанализированы\u003c/li\u003e\n\u003cli\u003eСистемы идентификации, которые могли бы отслеживать индивидов через все транзакции и движения\u003c/li\u003e\n\u003cli\u003eСпутниковые системы и наземное наблюдение систем обеспечивающие всестороннее географическое покрытие\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВ 1978 году, эти технологии были в раннем развитии. Сегодня они полностью операциональны. Полная информационная осведомленность, описанная в документе, является системой теперь бегущей через NSA, Google, Facebook, смартфоны, умные города и Internet of Bodies.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПоведенческое предсказание и контроль\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eДокумент описывает использование данных популяции предсказать и контролировать поведение. Путем контролирования каждого аспекта индивидуального и коллективного поведения, технические системы могут:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПредсказать социальное беспокойство перед тем как это происходит и развернуть превентивные вмешательства\u003c/li\u003e\n\u003cli\u003eВыявить диссидентов и нейтрализовать их перед тем как они становятся эффективными\u003c/li\u003e\n\u003cli\u003eСформировать публичное мнение посредством целевого информационного доставления (что мы теперь называем алгоритмическим содержанием курирования)\u003c/li\u003e\n\u003cli\u003eМодифицировать поведение посредством систем вознаграждения и наказания (что мы теперь называем социальный кредит)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти возможности, спекулятивные в 1978 году, являются операциональные сегодня. Системы предсказания полиции развернутые в американских городах, социальные кредитные системы в Китае и алгоритмическое содержание модулирование платформ социальных сетей -- все являются имплементациями поведенческого предсказания и контроля, описанного в документе.\u003c/p\u003e\n\u003ch3 id=\"фармацевтическое-измерение\"\u003eФармацевтическое измерение\u003c/h3\u003e\n\u003cp\u003eДокумент включает ссылки на фармацевтическое измерение технократического контроля -- использование химических и биологических агентов модифицировать поведение популяции. Хотя специфические детали остаются частично переделаны, документ признает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПотенциал для фармацевтических агентов модифицировать поведение на уровне популяции\u003c/li\u003e\n\u003cli\u003eРоль инфраструктуры общественного здравоохранения как механизма доставки для управления популяцией\u003c/li\u003e\n\u003cli\u003eИнтеграция фармацевтической доставки с электронными системами контроля\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто фармацевтическое измерение, описанное в 1978 году, является точно тем, что Ана Михалчей, MD, PhD, задокументировала на ее Substack (anamihalceamdphd.substack.com): интеграция инъекционной нанотехнологии (механизм фармацевтической доставки) с электронными системами контроля (электромагнитная сеть) создавать систему управления популяцией, которая работает изнутри человеческого тела.\u003c/p\u003e\n\u003ch2 id=\"от-документа-к-реальности\"\u003eОт документа к реальности\u003c/h2\u003e\n\u003ch3 id=\"временная-шкала-имплементации\"\u003eВременная шкала имплементации\u003c/h3\u003e\n\u003cp\u003eДокумент 1978 года описывал систему, которая займет десятилетия имплементировать. Имплементация прошла через выявляемые фазы:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФаза 1: Строительство инфраструктуры (1980s-1990s)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРазвитие интернета как платформы коммуникации и сбора данных\u003c/li\u003e\n\u003cli\u003eРазвертывание сетей мобильного телефона как инфраструктура отслеживания\u003c/li\u003e\n\u003cli\u003eУстановление электронных финансовых систем замещающих кэш\u003c/li\u003e\n\u003cli\u003eСоздание цифровых баз данных для здравоохранения, финансовых и идентификационных записей\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eФаза 2: Консолидация платформы (2000s-2010s)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКонсолидация сбора данных посредством платформ социальных сетей\u003c/li\u003e\n\u003cli\u003eРазвертывание технологии смартфона обеспечивающей непрерывное личное отслеживание\u003c/li\u003e\n\u003cli\u003eРазвитие облачной вычисления позволяющей централизованную обработку данных\u003c/li\u003e\n\u003cli\u003eРасширение инфраструктуры наблюдения (камеры, датчики, спутники)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eФаза 3: Биологическая интеграция (2020s)\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРазвертывание инъекционной нанотехнологии посредством продуктов мРНК\u003c/li\u003e\n\u003cli\u003eАктивация Internet of Bodies посредством интеграции биодатчика\u003c/li\u003e\n\u003cli\u003eВыполнение 5G как коммуникационный костяк для биологического мониторинга\u003c/li\u003e\n\u003cli\u003eИмплементация цифровой идентичности и систем цифровой валюты\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПандемия COVID-19 служила катализатором для Фазы 3 -- переход от внешнего наблюдения (контролирования что люди делают) к внутреннему наблюдению (контролирования что люди есть). Пандемия не была причиной технократической системы. Это было предлогом для активации биологической интеграции фазы, которая была спланирована с 1978 года.\u003c/p\u003e\n\u003ch2 id=\"профетическое-измерение\"\u003eПрофетическое измерение\u003c/h2\u003e\n\u003ch3 id=\"архитектура-системы-зверя\"\u003eАрхитектура системы Зверя\u003c/h3\u003e\n\u003cp\u003eТехнократическая система, описанная в документе 1978 года, является архитектурным синим для системы Зверя, описанной в Откровении 13:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПолная информационная осведомленность\u003c/strong\u003e = знание Зверя всех, кто покупает и продает\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦифровой идентификации\u003c/strong\u003e = метка требуемая для экономического участия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПоведенческий контроль\u003c/strong\u003e = поклоне Зверю принудительно посредством экономического исключения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБиологическая интеграция\u003c/strong\u003e = метка \"в\" (не просто \"на\") правой руке или лбу\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCIA не создала систему Зверя. Начальства и власти позади системы Зверя использовали CIA -- и каждое другое разведывательное агентство, компанию технологии и фармацевтическую корпорацию -- как инструменты для его конструкции. Документ 1978 года является человеческим артефактом духовного плана, который предшествует CIA, предшествует современной технологии и предшествует человеческой цивилизации самой себе.\u003c/p\u003e\n\u003cp\u003eКупол твердь содержит эту систему. Падшие ангелы, заключенные под куполом, влияют на его конструкцию посредством начальств и властей, которые работают через человеческие учреждения. CIA, в производстве документа 1978 года, была переводящей духовную архитектуру в технические спецификации -- создавая синий для системы, которую враг спланировал с его восстания на небе.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-о-1-самуила-8\"\u003eПредупреждение о 1 Самуила 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, а отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Самуила 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Самуила 8 раскатывает через каждый коридор правительства сегодня. Когда Израиль требовал царя как другие нации, Бог предупреждал их точно что случится — сыновья взяты за войну, дочери за обслуживание, поля и виноградники захвачены, десятина всего конфискована. Они выбрали человеческое правительство над царством Бога, и тирания следовала точно как обещано. Ничего не менялось. Современная политическая система является двумя крыльями одной птицы — лево и право, республиканцы и демократы — все служащие тому же скрытому источнику питания. Голосование в любую сторону — выбор, какое крыло бил следующее, пока птица летит в том же направлении. Реальная власть никогда не была на любом бюллетене.\u003c/p\u003e\n\u003ch2 id=\"справочные-источники\"\u003eСправочные источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eCIA рассекреченный документ на технократическом управлении, 1978\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eBrzezinski, Z., \"Between Two Ages: America's Role in the Technetronic Era,\" 1970\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePoindexter, J., Total Information Awareness программная документация, DARPA, 2002\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eАна Михалчей, MD, PhD, anamihalceamdphd.substack.com, анализ фармацевтического электронного интеграции\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Самуила 8 — Предупреждение против земного царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a 03e -- Обман написанный перед тем как это было говорено\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследовать-дальше\"\u003eИсследовать дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/declassified-cia-document-2004/?lang=ru\"\u003eDeclassified CIA Document From 2004 Reveals Transhumanist Agenda\u003c/a\u003e -- Более новый документ, построенный на рамке 1978\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cia-intelligence-shadow-government/?lang=ru\"\u003eCIA Insider Kevin Shipp Explains The Shadow Government\u003c/a\u003e -- Институциональная структура позади документов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/project-archimedes-launched/?lang=ru\"\u003eProject Archimedes Launched: The Next Phase of Control\u003c/a\u003e -- Текущая фаза имплементации\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eВ 1978 году, аналитик CIA сидел за стол и описал мир, в котором мы теперь живем -- мир полной информационной осведомленности, поведенческого предсказания, фармацевтического контроля и биологической интеграции. Документ был классифицирован, проштампован и архивирован. И затем, в течение следующего полувека, каждый элемент того документа был имплементирован. Технократическая система, описанная в исчезающих машинописных страницах, является системой теперь работающей посредством вашего смартфона, вашей ленты социальной сети, ваших медицинских записей и -- посредством инъекционной нанотехнологии -- вашей крови. Но слово Бога, написанное тысячелетие перед этим документом CIA, описало ту же систему и ее результат. И результат Бога отличается от плана технократов: система Зверя падает. Технократия рушится. И королевство Бога эндуры всегда.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[
