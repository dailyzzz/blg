/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБог создал атмосферу — твердь — как божественно упорядоченную систему, отделяющую воды выше от вод ниже. Небо не было случайностью космической химии. Это был преднамеренный акт творения, предназначенный для поддержания жизни, регулирования климата и отражения славы своего Творца. Небеса проповедают славу Бога, и твердь показывает дело рук Его (Псалом 19:1).\u003c/p\u003e\n\u003cp\u003eЧто происходит, когда люди решают, что атмосферный дизайн Бога недостаточен? Что происходит, когда правительства и корпорации берут на себя задачу модифицировать небо — распылять атмосферу металлическими частицами, засевать облака химикатами, блокировать солнечный свет, который Бог установил для поддержания всех живых существ? Что происходит, это геоинженерия — преднамеренная, крупномасштабная манипуляция климатической системой Земли, проводимая без знания или согласия населения ниже.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/23-The_Sun_and_the_Moon.mp4\"\u003eThe Sun and the Moon\u003c/a\u003e напоминает нам, солнце и луна были помещены в небеса Богом для знаков, времён года, дней и лет — для управления самой жизнью. Затемнить солнце искусственными аэрозолями — вмешиваться в самые светила, которые Бог установил. Это не наука. Это предположение в космическом масштабе.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"от-теории-заговора-к-политике-правительства\"\u003eОт \"Теории заговора\" к политике правительства\u003c/h2\u003e\n\u003cp\u003eДесятилетиями тот, кто предполагал, что стойкие белые следы, оставленные самолётами в небе, были чем-то иным, чем нормальная конденсация — что они могли содержать химические или металлические вещества, намеренно распыляемые в атмосферу — был отклонён как теоретик заговора. Термин \"химиотрассы\" рассматривался как маркер иррациональности, социальный сигнал, что говорящий отбыл уважаемый дискурс.\u003c/p\u003e\n\u003cp\u003eЗатем терминология изменилась. Слово \"геоинженерия\" вошло в основной научный и политический дискурс. И внезапно, концепция, которая была осмеяна как теория заговора, обсуждалась на слушаниях в Конгрессе, опубликована в рецензируемых журналах и предложена как серьёзный ответ на изменение климата.\u003c/p\u003e\n\u003cp\u003eВ 2009 году Royal Society опубликовала знаковый отчёт под названием \"Geoengineering the Climate: Science, Governance, and Uncertainty\", который явно обсудил инъекцию стратосферного аэрозоля (SAI) — рассеивание отражающих частиц в верхней атмосфере для снижения входящего солнечного излучения. Отчёт признал осуществимость концепции и рекомендовал дальнейшие исследования.\u003c/p\u003e\n\u003cp\u003eВ 2017 году американское правительство финансировало Программу исследования геоинженерии солнца Гарварда, возглавляемую профессорами Дэвидом Кейтом и Фрэнком Кеутшем. Стратифицированный контролируемый эксперимент возмущения (SCoPEx) программы предложил выпустить частицы карбоната кальция в стратосферу для изучения их эффектов на солнечное излучение. Эксперимент был предназначен для проверки в малом масштабе той же концепции, о которой \"теоретики заговора химиотрасс\" предупреждали годами.\u003c/p\u003e\n\u003cp\u003eВ 2020 году Национальные академии науки, инженерии и медицины опубликовали отчёт, рекомендующий, чтобы Соединённые Штаты инвестировали в программу исследования геоинженерии солнца, включая инъекцию стратосферного аэрозоля. Отчёт рекомендовал первоначальное инвестирование в размере 100-200 миллионов долларов в течение пяти лет.\u003c/p\u003e\n\u003cp\u003eКонцепция, которая была теорией заговора в 2005 году, стала финансируемой правительством программой исследований к 2020 году. Вопрос не в том, предлагается ли атмосферная модификация. Вопрос в том, уже ли она внедрена — и доказательства указывают, что она была оперативна намного дольше, чем официальная шкала времени признаёт.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-они-распыляют-доказательства-в-воде-и-почве\"\u003eЧто они распыляют: доказательства в воде и почве\u003c/h2\u003e\n\u003cp\u003eНезависимый лабораторный анализ образцов дождевой воды, снега, почвы и поверхностной воды со всего мира неоднократно обнаружил повышенные концентрации металлических элементов, совместимых с известными предложениями геоинженерии и несовместимых с естественными фоновыми уровнями.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАлюминий:\u003c/strong\u003e Образцы дождевой воды из нескольких местоположений показали концентрации алюминия, намного превышающие нормальные фоновые уровни. На горе Шаста, Калифорния, образцы, собранные исследователем Фрэнсисом Мангелсом, показали уровни алюминия в снежной массе в концентрациях, на порядки выше исторических норм. Оксид алюминия — основной компонент, предложенный для программ инъекции стратосферного аэрозоля.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБарий:\u003c/strong\u003e Повышенные уровни бария были обнаружены в образцах дождевой воды, почвы и поверхностной воды во всей Северной Америке и Европе. Барийные соли используются в засеве облаков и были предложены как компоненты программ атмосферной модификации. Барий не имеет естественного источника, который объяснил бы обнаруженные концентрации в образцах дождевой воды, собранных в нетронутых окружающих средах, далеко от промышленных источников.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтронций:\u003c/strong\u003e Стронций, ещё один металл без естественного воздушного источника в обнаруженных концентрациях, был найден вместе с алюминием и барием в образцах дождевой и почвенной воды. Постоянное сосуществование этих трёх металлов — алюминия, бария и стронция — в образцах атмосферного осадка совпадает с составом, предложенным в нескольких патентах геоинженерии и предложениях исследования.\u003c/p\u003e\n\u003cp\u003eДокументальный фильм \u003cem\u003eWhat in the World Are They Spraying?\u003c/em\u003e (2010) и его продолжение \u003cem\u003eWhy in the World Are They Spraying?\u003c/em\u003e (2012) представили результаты лабораторных тестов из нескольких независимых лабораторий, подтверждающих присутствие этих металлов в образцах окружающей среды. Последующее независимое тестирование учёными-гражданами, организациями по окружающей среде и озабоченными исследователями по всему миру подтвердило эти находки.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"засев-облаков-признанная-программа\"\u003eЗасев облаков: признанная программа\u003c/h2\u003e\n\u003cp\u003eПока инъекция стратосферного аэрозоля остаётся официально в \"исследовательской\" фазе, засев облаков — рассеивание веществ в облака для модификации осадков — практиковалась более семидесяти лет и признаётся правительствами во всём мире.\u003c/p\u003e\n\u003cp\u003eЗасев облаков был впервые разработан исследователями General Electric Винсентом Шефером и Бернардом Фоннегутом в 1940-х годах. Метод включает рассеивание йодида серебра, йодида калия или других нуклеирующих средств в облака для содействия формированию кристаллов льда, которые затем вырастают в осадки. Метод используется для смягчения засухи, улучшения снежного покрова, подавления града и рассеивания тумана.\u003c/p\u003e\n\u003cp\u003eСегодня программы засева облаков работают в более чем 50 странах, включая Соединённые Штаты, Китай, Россию, Объединённые Арабские Эмираты, Индию и Австралию. В Соединённых Штатах программы засева облаков работают в нескольких западных штатах, включая Вайоминг, Колорадо, Юту, Айдахо и Калифорнию, в первую очередь нацеленные на увеличение снежного покрова в горных водоразделах.\u003c/p\u003e\n\u003cp\u003eПрограмма модификации погоды Китая — крупнейшая в мире. Администрация метеорологии Китая нанимает более 35 000 работников, которые работают с флотом самолётов и наземной артиллерией для засева облаков по всей стране. Китай признал расходование миллиардов долларов на модификацию погоды, и его программа получила признание за — и обвинена в — изменении моделей осадков по большим частям Азии.\u003c/p\u003e\n\u003cp\u003eНациональный центр метеорологии ОАЭ работает обширную программу засева облаков на Аравийском полуострове, используя как самолёты, так и наземные генераторы. Программа получила признание за увеличение количества осадков в пустынной стране на до 30%.\u003c/p\u003e\n\u003cp\u003eСуществование и масштаб этих признанных программ засева облаков разрушают утверждение, что атмосферная модификация является всего лишь теоретической. Правительства по всему миру активно модифицируют модели осадков через преднамеренное рассеивание химикатов в атмосфере. Вопрос не в том, происходит ли модификация атмосферы — это какие вещества распыляются, в каких количествах и каковы их эффекты на здоровье человека, экологические системы и глобальный климат.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"патенты-чертёж-для-атмосферного-распыления\"\u003eПатенты: Чертёж для атмосферного распыления\u003c/h2\u003e\n\u003cp\u003eУправление по патентам и товарным знакам США содержит многочисленные патенты, описывающие методы и композиции для модификации атмосферы, которые совпадают с феноменами, наблюдаемыми исследователями химиотрасс:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПатент США 5,003,186 (1991):\u003c/strong\u003e \"Stratospheric Welsbach Seeding for Reduction of Global Warming\" — описывает метод снижения глобального потепления путём распыления частиц металлических оксидов (включая оксид алюминия) в стратосфере для отражения входящего солнечного излучения. Патент конкретно описывает рассеивание самолётом на высоте.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПатент США 6,315,213 (2001):\u003c/strong\u003e \"Method of Modifying Weather\" — описывает метод модификации погоды путём распыления композиции из металлических частиц в атмосферу используя самолёты.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПатент США 5,104,069 (1992):\u003c/strong\u003e \"Apparatus and Method for Ejecting Matter from an Aircraft\" — описывает систему для рассеивания частиц из самолётов на высоте.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПатент США 3,813,875 (1974):\u003c/strong\u003e \"Rocket Having Barium Release System to Create Ion Clouds in the Upper Atmosphere\" — описывает систему ракет для выпуска бария в верхнюю атмосферу.\u003c/p\u003e\n\u003cp\u003eЭти патенты не доказывают, что описанные системы в настоящее время оперативны. Но они доказывают, что технология была разработана, запатентована и предназначена для внедрения. Они предоставляют технический чертёж для ровно того типа атмосферного распыления, о котором миллионы людей по всему миру сообщают наблюдение.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"эффекты-здоровья-что-падает-с-неба\"\u003eЭффекты здоровья: что падает с неба\u003c/h2\u003e\n\u003cp\u003eПоследствия модификации атмосферы для здоровья глубоки и в основном не изучены. Если металлы, обнаруженные в образцах окружающей среды — алюминий, барий и стронций — действительно распыляются в атмосферу через программы геоинженерии, то всё население под зоной распыления подвергается хроническому воздействию без знания или согласия.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАлюминий\u003c/strong\u003e — известный нейротоксин. Хроническое воздействие алюминия связано с болезнью Альцгеймера, болезнью Паркинсона и другими нейродегенеративными состояниями. Алюминий вмешивается в несколько биологических процессов, включая функцию фермента, клеточную сигнализацию и целостность гемато-энцефалического барьера. Резкое увеличение нейродегенеративного заболевания в течение последних нескольких десятилетий коррелирует временно с периодом, в течение которого уровни алюминия в атмосфере повышались.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБарий\u003c/strong\u003e токсичен для сердечно-сосудистой и нервной систем. Воздействие бария может вызвать гипертензию, сердечные аритмии, дыхательный стресс и желудочно-кишечный ущерб. Хроническое низкоуровневое воздействие бария — того, которое было бы результатом постоянного атмосферного осадка — может накапливаться в костях и мягких тканях с течением времени.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтронций\u003c/strong\u003e накапливается в костях и может вытеснять кальций, приводящий к ослаблению скелета и повышенному риску переломов. Радиоактивный стронций-90, продукт деления ядерного оружия и реакторов, — известный канцероген, который концентрируется в костной ткани.\u003c/p\u003e\n\u003cp\u003eСовместный эффект хронического воздействия всех трёх металлов — через вдыхание атмосферных аэрозолей, потребление загрязнённой воды и проглатывание пищи, выращенной в загрязнённой почве — представляет беспрецедентный эксперимент в области здоровья окружающей среды, проводимый на всём населении без информированного согласия.\u003c/p\u003e\n\u003cp\u003eКак исследуется в нашей статье о \u003ca href=\"/weather-warfare-weaponized-climate/?lang=ru\"\u003eWeather Warfare: The Weaponization of Climate\u003c/a\u003e, модификация атмосферы — не просто инструмент управления климатом — это платформа оружия с военными приложениями, задокументированная в государственных записях.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"экологическое-воздействие-смерть-почвы\"\u003eЭкологическое воздействие: Смерть почвы\u003c/h2\u003e\n\u003cp\u003eЭкологические последствия отложения атмосферных металлов выходят далеко за пределы здоровья человека. Металлы, падающие с неба, накапливаются в почвах, поверхностных водах и экосистемах с разрушительными эффектами:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИзменение pH почвы:\u003c/strong\u003e Отложение оксида алюминия увеличивает кислотность почвы, нарушая деликатный химический баланс, поддерживающий рост растений и почвенную микробиологию. Многие виды растений не могут переносить токсичность алюминия, и повышенные уровни почвенного алюминия были связаны с упадком лесов в нескольких регионах.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗагрязнение водных экосистем:\u003c/strong\u003e Сток алюминия из загрязнённых почв в ручьи, реки и озёра токсичен для водной жизни. Алюминий особенно токсичен для рыб при низком pH, вызывающий повреждение жабер, дыхательный отказ и смерть. Повышенные уровни алюминия были задокументированы в водных путях рядом с областями, сообщающими о тяжёлой воздушной деятельности.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарушение опылителя:\u003c/strong\u003e Влияние атмосферных металлов на популяции опылителей — в частности, медоносных пчёл — не было адекватно изучено, но корреляция между деятельностью модификации атмосферы и упадком опылителя заслуживает расследования. Как задокументировано в нашей статье о \u003ca href=\"/bee-colony-collapse-food-chain/?lang=ru\"\u003eBee Colony Collapse\u003c/a\u003e, упад популяций опылителей угрожает всей пищевой цепи.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСниженный фотосинтез:\u003c/strong\u003e Преднамеренное снижение входящего солнечного излучения — заявленная цель инъекции стратосферного аэрозоля — прямо снижает энергию, доступную для фотосинтеза. Это означает сниженный рост растений, сниженный урожай культур и снижена фиксация углерода — самый процесс, который естественно удаляет углекислый газ из атмосферы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"gwen-башни-и-электромагнитная-связь\"\u003eGWEN Башни и электромагнитная связь\u003c/h2\u003e\n\u003cp\u003eГеоинженерия не работает в изоляции. Как подробно в нашей статье о \u003ca href=\"/gwen-towers-not-5g/?lang=ru\"\u003eGWEN Towers\u003c/a\u003e, металлические частицы, распыляемые через программы атмосферного распыления, могут служить двойной цели: не только отражать солнечное излучение, но и улучшать проводимость атмосферы для электромагнитной передачи.\u003c/p\u003e\n\u003cp\u003eРассеивание металлических наночастиц в атмосферу создаёт проводящую среду, которая может взаимодействовать с электромагнитными частотами, передаваемыми из наземных антенных систем, включая инфраструктуру башни GWEN (Ground Wave Emergency Network). Это электромагнитно-аэрозольное взаимодействие может служить несколькими целями, включая сверхгоризонтную связь, модификацию погоды через электромагнитный нагрев атмосферных слоёв и создание ионизированной атмосферной среды для передовых военных приложений.\u003c/p\u003e\n\u003cp\u003eПересечение геоинженерии и электромагнитной технологии представляет конвергенцию возможностей, которая значительно превосходит публично признанную цель любой программы по отдельности. Небо трансформируется из пассивной естественной системы в активную технологическую платформу — электромагнитный холст, на который военные и гражданские агентства могут проектировать власть, модифицировать погоду и манипулировать окружающей средой в континентальном масштабе.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-небеса-возвещают-его-славу\"\u003eБиблейское размышление: Небеса возвещают Его славу\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Небеса возвещают славу Божию, и о делах рук Его вещает твердь. День дню передаёт речь, и ночь ночи открывает знание.\" — Псалом 19:1-2\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНебеса были созданы, чтобы возвещать славу Бога. Твердь была создана, чтобы отображать Его дело рук. День и ночь небо говорит — коммуницируя мудрость, красоту и суверенность Творца всем, кто смотрит вверх.\u003c/p\u003e\n\u003cp\u003eЧто происходит, когда небо затемнено? Что происходит, когда небеса наполнены не славой Бога, но металлическими частицами человеческой амбиции? Что происходит, когда голубое небо, которое объявляло Его славу, заменено мутной белой завесой искусственного аэрозоля? Речь небес заглушена. Дело твёрди скрыто. Ежедневная проповедь творения — проповедь, которая не требует перевода, не проповедника, не текста — подавлена самыми людьми, которые утверждают, что спасают планету.\u003c/p\u003e\n\u003cp\u003eГеоинженерия — это не просто экологическая озабоченность. Это духовное нападение на свидетельство творения. Заполнить небо металлическими частицами — положить вуаль на лицо дела Бога. Это приглушить голос небес. Это объявить, если не словом, то делом, что человеческая технология может улучшить — или должна заменить — атмосферную систему, которую Творец дизайнировал и назвал хорошей.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/293-Arrows_In_The_Sky.mp4\"\u003eArrows In The Sky\u003c/a\u003e — Что они распыляют в небесах выше\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/351-Broken_Weather.mp4\"\u003eBroken Weather\u003c/a\u003e — Модификация погоды и геоинженерия\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучи-дальше\"\u003eИзучи дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/weather-warfare-weaponized-climate/?lang=ru\"\u003eWeather Warfare: The Weaponization of Climate\u003c/a\u003e — Как модификация атмосферы пересекается с возможностями военной войны с погодой\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/gwen-towers-not-5g/?lang=ru\"\u003eGWEN Towers\u003c/a\u003e — Наземная электромагнитная инфраструктура, которая может взаимодействовать с атмосферными металлическими частицами\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eНебеса возвещают славу Бога — когда они могут быть видны. Когда небо белое от аэрозоля, когда голубой скрыт за дымкой алюминия и бария, когда солнце затемнено частицами, которые люди разбросали в твёрди, которую создал Бог, объявление смягчено. Но оно не замолчано. За дымкой, над распылением, за пределами досягаемости человеческой технологии, небеса продолжают возвещать. Слава Бога не зависит от нашей способности её видеть. Твердь по-прежнему показывает Его дело рук — для тех, кто имеет очи видеть сквозь вуаль, которую человек положил на лицо творения. Посмотри вверх. Посмотри мимо распыления. Небеса по-прежнему говорят.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/science/\",\"className\":\"category-badge\",\"children\":\"science\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Геоинженерия: что они распыляют в наших небесах\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Инъекция стратосферного аэрозоля, засев облаков и программы атмосферной модифика
