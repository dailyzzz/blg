 упали, Бог не бросил их. Он дал одежды из кожи — божественное покрытие, акт жертвенного обеспечения, требующий пролития крови. Эти одежды не были синтетическими. Они не были произведены в лаборатории. Они пришли из руки самого Бога, сформированные из естественного творения, которое он уже объявил \"очень хорошим\".\u003c/p\u003e\n\u003cp\u003eВот образец: Бог обеспечивает через природу. Он поместил исцеление в растения, минералы, корни и листья земли, которую он создал. Бытие записывает сад, а не аптеку. Травы, несущие семя, были даны для пищи и медицины с самого начала. Тысячи лет человечество это понимало. Каждая древняя цивилизация — иврит, египетская, китайская, греческая, индийская — построила свои традиции исцеления на ботанических, минеральных и диетических обеспечениях, встроенных в созданный порядок.\u003c/p\u003e\n\u003cp\u003eЗатем пришла медицина Рокфеллера.\u003c/p\u003e\n\u003cp\u003eЗа одно поколение божественные кожаные одежды были сорваны и заменены пластиковыми одеждами — синтетическими фармацевтикой на основе нефти, разработанными не для исцеления, а для управления симптомами, создания зависимости и генерирования вечной прибыли. То, что Бог предоставил бесплатно в саду, система Рокфеллера запатентовала, монополизировала и продала человечеству по разорительной стоимости.\u003c/p\u003e\n\u003cp\u003eТрек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/71-The_Garments_of_Skin.mp4\"\u003eThe Garments of Skin\u003c/a\u003e исследует глубокую разницу между божественным обеспечением и синтетической заменой. Бог покрыл Адама и Еву чем-то реальным, чем-то, что стоило жизнь, чем-то, уходящим корнями в созданный порядок. Фармацевтическая система покрывает человечество чем-то искусственным — производными нефти, одетыми в медицину — и называет это прогрессом. Но образец раскрывает истину: когда человек заменяет то, что Бог предоставил, своей собственной синтетической имитацией, результат — это не исцеление, а рабство.\u003c/p\u003e\n\u003cp\u003eЭто история того, как эта замена произошла — не случайно, а по дизайну.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"до-доклада-флекснера-как-американская-медицина-действительно-выглядела\"\u003eДо доклада Флекснера: Как американская медицина действительно выглядела\u003c/h2\u003e\n\u003cp\u003eПопулярный нарратив сегодня состоит в том, что медицина до двадцатого века была примитивной, опасной и ненаучной — хаотический пейзаж шарлатанов и продавцов змеиного масла, который требовал твёрдую руку современной институциональной науки, чтобы привести порядок. Этот нарратив — ложь, тщательно сконструированная самыми людьми, которые извлекали выгоду из разрушения того, что было раньше.\u003c/p\u003e\n\u003cp\u003eВ конце 1800s и начале 1900s американская медицина была резко плюралистичной. Несколько традиций исцеления сосуществовали, конкурировали и служили миллионам пациентов.\u003c/p\u003e\n\u003ch3 id=\"эклектическая-медицина\"\u003eЭклектическая медицина\u003c/h3\u003e\n\u003cp\u003eЭклектическое медицинское движение, основанное в 1830s, объединило лучшее из растительной медицины с условными практиками. Эклектические врачи использовали растительные средства, подтверждённые через клинический опыт, отвергали вредные практики, как дозирование ртутью и избыточное кровопускание, которые \"обычные\" врачи ещё использовали, и сосредотачивались на поддержке собственной способности тела к исцелению. К 1900 году было более двадцати эклектических медицинских колледжей по США, выпускающих тысячи врачей, которые практиковали то, что сегодня называется интегративной медициной.\u003c/p\u003e\n\u003ch3 id=\"гомеопатия\"\u003eГомеопатия\u003c/h3\u003e\n\u003cp\u003eГомеопатическая медицина, разработанная Самуэлем Ганеманом в конце восемнадцатого века, стала чрезвычайно популярна в Америке. К 1900 году было двадцать два гомеопатических медицинских школы, более сотни гомеопатических больниц и более тысячи гомеопатических аптек в США. Гомеопатические врачи имели заметно лучшие результаты во время холеры и жёлтой лихорадки эпидемий девятнадцатого века — документированный факт, который привел в ярость условное медицинское учреждение.\u003c/p\u003e\n\u003ch3 id=\"травна-и-ботаническая-медицина\"\u003eТравна и ботаническая медицина\u003c/h3\u003e\n\u003cp\u003eТравничество было самой старой медицинской традицией в истории человечества и остаётся основной формой здравоохранения для большинства американцев, особенно в сельских областях. Знание медицинских растений было передано через семьи, сообщества, акушерок и народных целителей. Это не было невежеством — это было тысячами лет накопленного эмпирического знания о том, какие растения лечили какие условия. Многие из наиболее эффективных фармацевтических препаратов двадцатого века в конечном итоге были получены из самых растений, которые эти традиции использовали на протяжении столетий.\u003c/p\u003e\n\u003ch3 id=\"натуропатия-и-питательная-медицина\"\u003eНатуропатия и питательная медицина\u003c/h3\u003e\n\u003cp\u003eНатуропатические традиции подчёркивали диету, гидротерапию, физические упражнения, чистый воздух, солнечный свет и врождённый интеллект исцеления тела. Бенедикт Ласт, отец американской натуропатии, установил школы и клиники, которые учили всестороннюю систему естественного исцеления. Эти практикующие понимали то, что современная медицина только сейчас переоткрывает: питание — это основание здоровья, и большинство хронического заболевания начинается с питательного дефицита и токсического воздействия.\u003c/p\u003e\n\u003ch3 id=\"ключевой-пункт\"\u003eКлючевой пункт\u003c/h3\u003e\n\u003cp\u003eЭто не были маргинальные движения. Они были основными медицинскими традициями с их собственными колледжами, больницами, лицензионными советами, профессиональными журналами и миллионами удовлетворённых пациентов. Во многих случаях их результаты были превосходны по сравнению с \"обычной\" аллопатической медициной, которая в то время всё ещё использовала практики, как ртутная обработка, арсеновые соединения и героическое кровопускание.\u003c/p\u003e\n\u003cp\u003eЭтот плюралистичный медицинский пейзаж — разнообразный, конкурентный, в значительной степени доступный и укоренённый в естественной терапевтике — был миром, который Джон Д. Рокфеллер, Эндрю Карнеги и Американская медицинская ассоциация установили уничтожить.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"доклад-флекснера-чертёж-медицинской-монополии\"\u003eДоклад Флекснера: Чертёж медицинской монополии\u003c/h2\u003e\n\u003cp\u003eВ 1910 году Авраам Флекснер — учитель школы из Луисвилля, Кентукки, без медицинской степени и без медицинского опыта — опубликовал доклад, который переформирует весь пейзаж американской медицины. Доклад, официально озаглавленный \u003cem\u003eMedical Education in the United States and Canada\u003c/em\u003e, был заказан Фондом Карнеги для Продвижения Обучения, с основным финансированием и стратегическим направлением от Фонда Рокфеллера.\u003c/p\u003e\n\u003cp\u003eФлекснер посетил 155 медицинских школ по всей Северной Америке в течение восемнадцати месяцев и заключил, что огромное большинство были подстандартны. Его доклад рекомендовал закрыть большинство из них и консолидировать медицинское образование в небольшое число университетских учреждений, которые следовали \"немецкой модели\" — ориентированный на исследование, основанный на лаборатории подход, сосредоточенный на фармакологии, хирургии и патологии.\u003c/p\u003e\n\u003ch3 id=\"что-доклад-действительно-сделал\"\u003eЧто доклад действительно сделал\u003c/h3\u003e\n\u003cp\u003eНа поверхности, доклад Флекснера казался разумным призывом к более высоким стандартам в медицинском образовании. Некоторые школы действительно были плохо оборудованы. Но истинная функция доклада была не улучшение качества — это был захват рынка. Результаты говорят сами за себя:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eИз 155 медицинских школ, работающих в 1910, менее половины пережили следующие двадцать лет.\u003c/strong\u003e К 1935 числу было сокращено до 66.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКаждый единственный гомеопатический медицинский колледж был закрыт.\u003c/strong\u003e Все двадцать два из них. Вся медицинская традиция с более чем столетием практики в Америке была стёрта в течение одного поколения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВсе кроме двух эклектических медицинских колледжей были закрыты.\u003c/strong\u003e Эти два пережили только кратко перед тем как также закрыться.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНатуропатические, травные и питательные медицинские программы были дефинансированы и отказаны в аккредитации.\u003c/strong\u003e Без аккредитации, они не могли получить финансирование. Без финансирования, они не могли работать. Без выпускников, они не могли распространять своё знание.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМедицинские школы, которые обучали чёрных врачей, были почти полностью устранены.\u003c/strong\u003e Из семи чёрных медицинских школ, работающих в 1910, только два — Университет Ховарда и Медицинский колледж Мехарри — пережили Флекснерское избиение. Это имело разрушительные последствия для доступа к здравоохранению в чёрных сообществах для поколений.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЖенские медицинские колледжи были подобно опустошены.\u003c/strong\u003e Немногие женские медицинские школы, которые существовали, были закрыты или поглощены, сокращая женское представление в медицине на десятилетия.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eШколы, которые пережили, были те, которые приняли модель Рокфеллера-Карнеги: исследовательские университеты, которые учили фармацевтическую и хирургическую медицину и получали огромные пожертвования от Фондов Рокфеллера и Карнеги. Johns Hopkins — которого Флекснер ставил как золотой стандарт — получил самые большие медицинские пожертвования Рокфеллера в истории.\u003c/p\u003e\n\u003ch3 id=\"следуйте-за-деньгами\"\u003eСледуйте за деньгами\u003c/h3\u003e\n\u003cp\u003eСовет общего образования Фонда Рокфеллера, установленный в 1903, вылил свыше 100 миллионов долларов (эквивалент миллиардам сегодня) в медицинские школы, которые согласились с новой моделью. Школы, которые приняли деньги, переструктурировали свои учебные планы около фармацевтического вмешательства. Школы, которые отказали деньги — или которые учили конкурирующие модальности — потеряли аккредитацию и закрыли.\u003c/p\u003e\n\u003cp\u003eЭто не было благотворительностью. Это был управляемый рычагом выкуп всей профессии.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eИзучите истинную историю.\u003c/strong\u003e Нарратив, что современная фармацевтическая медицина представляет вершину научного достижения, — это производная история, финансируемая тем же интересам, которые от этого извлекают выгоду. Изучите пред-Флекснерские медицинские традиции. Прочитайте оригинальный доклад Флекснера. Следуйте за деньгами.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВосстановите питательную медицину.\u003c/strong\u003e Изучите свойства исцеления целых пищ, трав и минералов. Ресурсы, предоставляемые практическими рекомендациями, служат начальные точки.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПоддержите практикующих вне монополии.\u003c/strong\u003e Натуропатические врачи, травники, функциональные медицинские практикующие и питательные терапевты несут вперёд традиции исцеления, которые система Рокфеллера попыталась стереть.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eСтавьте под сомнение каждый рецепт.\u003c/strong\u003e Спросьте, есть ли лежащая в основании условия питательная, диетическая или образ жизни причина. Спросьте, есть ли не-фармацевтические вмешательства, поддерживаемые доказательствами. Требуйте информированного согласия.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВозвращайтесь в сад.\u003c/strong\u003e Выращивайте пищу. Научитесь идентифицировать медицинские растения. Учите ваших детей, что исцеление приходит из земли, которую создал Бог, а не из нефтяной индустрии, которая ищет его заменить.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство опыта клинической смерти Говарда Питтмана — Предупреждение о конце времени\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические тайны: Выявленные позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и Фармакея — Колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/191-Rockefeller_Medicine.mp4\"\u003eRockefelle
