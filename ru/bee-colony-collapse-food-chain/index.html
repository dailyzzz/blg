еть жизни, в которой каждое существо служит определенной цели. Пчела была не случайной мыслью в творении - она была краеугольным камнем. Примерно одна треть каждого куска пищи, которую вы едите, существует благодаря опылению пчелой. Миндаль, яблоки, черника, вишня, авокадо, огурцы, лук и десятки других культур полностью или существенно зависят от опыления пчелами.\u003c/p\u003e\n\u003cp\u003eКогда пчелы исчезают, пищевая цепь не просто ослабляется - она разрушается. А то, что происходит с пчелами по всему миру, не является тайной. Это следствие корпоративной жадности, химического загрязнения и нормативной системы, которая защищает прибыль в ущерб творению.\u003c/p\u003e\n\u003cp\u003eКак отражает альбом Confliction на треке \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/11-The_Tree_of_Life.mp4\"\u003eThe Tree of Life\u003c/a\u003e, изобилие, которое Бог посадил в земле, было предназначено для того, чтобы поддерживать всех живых существ в гармонии. То, что мы видим при синдроме разрушения колоний, - это систематический демонтаж этой гармонии, отравление самих существ, которые Бог повелел содержать сад живым.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-синдром-разрушения-колоний\"\u003eЧто такое синдром разрушения колоний?\u003c/h2\u003e\n\u003cp\u003eСиндром разрушения колоний (CCD) - это явление, при котором большинство рабочих пчел в колонии исчезают, оставляя позади матку, достаточно пищи и несколько пчел-кормилиц для ухода за оставшимися незрелыми пчелами. Рабочие просто исчезают - они не возвращаются в улей, и их тела редко находят. Это происходит так, как будто они забывают, как вернуться домой, теряют смысл своего существования и умирают одни в полях, которые они когда-то обслуживали.\u003c/p\u003e\n\u003cp\u003eТермин был впервые введен в 2006 году, когда американские пчеловоды сообщили о потере от 30% до 90% своих ульев за одну зиму. Но явление формировалось годами. Между 1947 и 2008 годами количество управляемых пчелиных колоний в Соединенных Штатах сократилось с 6 миллионов до 2,4 миллионов - снижение на 60%, которое резко ускорилось в 2000-х годах.\u003c/p\u003e\n\u003cp\u003eК 2013 году кризис распространился глобально. Европейские пчеловоды сообщили о катастрофических потерях. Фермеры, выращивающие яблоки и груши в провинции Сычуань в Китае, вручную опыляли деревья, потому что пчел больше не было. Австралия, когда-то считавшаяся убежищем из-за географической изоляции, начала сообщать о потерях колоний по мере расширения использования неоникотиноидов.\u003c/p\u003e\n\u003cp\u003eЭто не локальная проблема. Это глобальная биологическая чрезвычайная ситуация - и основная причина была выявлена, задокументирована и намеренно скрыта корпорациями, ответственными за это.\u003c/p\u003e\n\u003cp\u003eАльберт Эйнштейн широко известен высказыванием: \"Если пчела исчезнет с лица земли, человеку останется только четыре года жизни.\" Дебатируется, действительно ли Эйнштейн это сказал, но лежащая в основе биология не подлежит сомнению. Без опылителей сельскохозяйственная система, которая кормит человечество, коллапсирует в течение одного поколения.\u003c/p\u003e\n\u003cp\u003eПрограмма окружающей среды ООН издала доклад в 2011 году, предупредив, что снижение числа опылителей представляет \"одну из наиболее серьезных угроз безопасности пищевых запасов\" в мире. Кризис не исчез с момента этого предупреждения. Он ускорился.\u003c/p\u003e\n\u003cp\u003eСимптомы CCD отличаются от других причин отказа колонии. При нормальном зимнем отмирании мертвые пчелы находятся в улье и вокруг него. При CCD пчелы просто исчезают. Улей сохраняет запасы пищи, которые другие пчелы и вредители неохотно берут - что предполагает наличие химического загрязнения, которое даже падальщики-насекомые избегают. Матка продолжает откладывать яйца, и оставшиеся пчелы-кормилицы пытаются поддерживать потомство, но без рабочей силы для добычи пищи колония медленно голодает.\u003c/p\u003e\n\u003cp\u003eИсследователи первоначально рассматривали множество причин - вирусы, паразиты (особенно клещ Varroa destructor), питательный стресс и потерю среды обитания. Хотя все эти факторы способствуют снижению здоровья пчел, научные доказательства все больше указывают на один доминирующий фактор, который вызывает прямую смертность и ослабляет способность пчел противостоять другим стрессам: пестициды из класса неоникотиноидов.\u003c/p\u003e\n\u003ch2 id=\"неоникотиноиды-химическое-вещество-убивающее-пчел\"\u003eНеоникотиноиды: химическое вещество, убивающее пчел\u003c/h2\u003e\n\u003cp\u003eНеоникотиноиды - это класс синтетических инсектицидов, полученных из никотина. Они были введены в 1990-х годах компанией Bayer CropScience и быстро стали наиболее широко используемыми инсектицидами в мире. В отличие от традиционных пестицидов, которые распыляются на поверхность растений, неоникотиноиды являются системными - они впитываются в каждую часть растения, включая пыльцу и нектар, которые собирают пчелы.\u003c/p\u003e\n\u003cp\u003eЭто означает, что пчелам не нужно напрямую распыляться, чтобы быть отравленными. Каждый цветок, который они посещают на обработанной неоникотиноидом культуре, доставляет дозу нейротоксина. Пчелы несут эту загрязненную пыльцу и нектар обратно в улей, где они скармливаются личинкам и хранятся в качестве пищи, создавая непрерывный цикл воздействия, который отравляет всю колонию.\u003c/p\u003e\n\u003cp\u003eОсновные неоникотиноиды, замешанные в снижении численности пчел, - это имидаклоприд, клотианидин и тиаметоксам. Исследование, опубликованное в журнале Science в 2012 году, показало, что даже субдетальные дозы этих химических веществ нарушают навигацию пчел, память и коммуникацию - именно те способности, которые позволяют пчелам находить цветы, возвращаться в улей и выполнять \"танец колебаний\", который направляет других пчел к источникам пищи.\u003c/p\u003e\n\u003cp\u003eПчела, которая не может ориентироваться, - это пчела, которая не может выжить, а колония дезориентированных пчел - это колония, которая коллапсирует.\u003c/p\u003e\n\u003cp\u003eЗнаковое исследование Европейского управления по безопасности пищевых продуктов (EFSA) в 2013 году пришло к выводу, что неоникотиноиды представляют \"неприемлемый риск\" для пчел. Европейский союз ответил, введя частичный запрет на три неоникотиноида в 2013 году, расширенный до почти полного наружного запрета в 2018 году.\u003c/p\u003e\n\u003cp\u003eСоединенные Штаты, под давлением лоббирования Bayer и Syngenta, не предприняли сравнимых действий. EPA продолжал одобрять использование неоникотиноидов, ссылаясь на \"недостаточные доказательства\" - вывод, противоречащий внутренней оценке собственных ученых EPA, утекший в 2010 году, который признавал риски.\u003c/p\u003e\n\u003cp\u003eМасштаб загрязнения неоникотиноидами огромен. Исследование 2017 года, опубликованное в журнале Science и анализирующее образцы меда со всего мира, выявило загрязнение неоникотиноидами в 75% всех протестированных образцов. Химические вещества не ограничиваются обработанными полями. Они сохраняются в почве в течение многих лет, загрязняют водные пути через сток и распространяются по пищевой цепи намного дальше, чем их предполагаемые цели.\u003c/p\u003e\n\u003cp\u003eОдно семя, покрытое неоникотиноидом, может содержать достаточно активного ингредиента, чтобы убить более 80 000 пчел. Когда миллионы покрытых семян посажены на миллионы акров, совокупная доза, доставляемая в окружающую среду, измеряется тысячами тонн чистого нейротоксина, выпускаемого в биосферу каждый вегетационный период.\u003c/p\u003e\n\u003ch2 id=\"monsanto-bayer-и-корпоративное-прикрытие\"\u003eMonsanto, Bayer и корпоративное прикрытие\u003c/h2\u003e\n\u003cp\u003eВ 2018 году Bayer приобрела Monsanto за 63 миллиарда долларов, создав крупнейшую в мире компанию по производству агрохимии. Это слияние объединило производителя наиболее широко используемого гербицида в мире (глифосат/Roundup) с производителем наиболее широко используемого класса инсектицидов (неоникотиноидов). Объединенная сущность теперь контролировала империю химикатов, которая одновременно отравляла почву, пищу и опылителей.\u003c/p\u003e\n\u003cp\u003eЗащита Bayer неоникотиноидов следует тому же сценарию, который Monsanto использовала для защиты глифосата: финансирование благоприятных исследований, нападение на независимых исследователей, захват нормативных агентств и отрицание науки до тех пор, пока иски не станут слишком дорогостоящими для борьбы.\u003c/p\u003e\n\u003cp\u003eВнутренние документы Bayer, раскрытые в ходе судебного разбирательства, показали, что компания осознавала риски, которые неоникотиноиды представляют для пчел, за годы до того, как разразился публичный кризис.\u003c/p\u003e\n\u003cp\u003eКомпания финансировала исследования, разработанные для получения благоприятных результатов - исследования, которые тестировали воздействие неоникотиноидов на нереалистичных низких уровнях в контролируемых лабораторных условиях, которые не имели никакого сходства с полевым воздействием, и в временных рамках, слишком короткие для захвата хронических эффектов.\u003c/p\u003e\n\u003cp\u003eКогда независимые исследователи давали результаты, противоречащие корпоративному нарративу, Bayer развернула сеть финансируемых промышленностью академиков, PR-фирм и лоббирующих организаций для дискредитации их.\u003c/p\u003e\n\u003cp\u003eДоктор Хенк Теннекес, голландский токсиколог, опубликовавший исследование, демонстрирующее, что неоникотиноиды вызывают необратимое повреждение нервной системы пчелы при любой уровне дозировки - что нет безопасного порога, - подвергался профессиональным преследованиям и попыткам подавления его работы. Его выводы, опубликованные в \"The Systemic Insecticides: A Disaster in the Making\", были проигнорированы нормативными агентствами, которые вместо этого полагались на оценки безопасности, финансируемые Bayer.\u003c/p\u003e\n\u003cp\u003eИстория о лоббировании рассказывает сама за себя. Между 2006 и 2020 годами Bayer, Syngenta и BASF потратили более 70 миллионов долларов на лоббирование Конгресса США по вопросам, связанным с пестицидами. CropLife America, торговая группа промышленности, представляющая производителей неоникотиноидов, развернула армию лоббистов, чтобы противостоять любым ограничениям на использование неоникотиноидов.\u003c/p\u003e\n\u003cp\u003eКонтраст с Европейским союзом поучителен. ЕС применил принцип предосторожности - ограничение неоникотиноидов на основе доказательств риска даже до установления абсолютного доказательства причинности. Соединенные Штаты применили предпочитаемый промышленностью стандарт - требование доказательств вне всяких сомнений перед принятием мер, стандарт, разработанный для бесконечной задержки регулирования, пока ущерб продолжается.\u003c/p\u003e\n\u003cp\u003eРезультат: популяции пчел в Европе показали признаки стабилизации в районах, где использование неоникотиноидов было ограничено. Популяции пчел в США продолжают сокращаться.\u003c/p\u003e\n\u003cp\u003eВращающаяся дверь между промышленностью и регулированием так же активна в политике пестицидов, как и в фармацевтической политике. Бывшие чиновники EPA присоединяются к компаниям агрохимии. Бывшие промышленные ученые присоединяются к EPA. Результатом является нормативная система, которая функционирует как расширение промышленности, которую она должна контролировать.\u003c/p\u003e\n\u003ch2 id=\"кризис-опыления-и-продовольственное-снабжение\"\u003eКризис опыления и продовольственное снабжение\u003c/h2\u003e\n\u003cp\u003eЦифры рассказывают историю того, что происходит, когда опылители исчезают. По данным Продовольственной и сельскохозяйственной организации Объединенных Наций, 75% мировых продовольственных культур в той или иной степени зависят от животного опыления, главным образом пчелами. Экономическая стоимость услуг опыления, предоставляемых пчелами, оценивается в 235-577 миллиардов долларов в год во всем мире.\u003c/p\u003e\n\u003cp\u003eТолько в Соединенных Штатах медоносные пчелы опыляют примерно 15 миллиардов долларов культур ежегодно. Калифорнийская индустрия миндаля - 6-миллиардный годовой урожай - полностью зависит от опыления медоносными пчелами.\u003c/p\u003e\n\u003cp\u003eКаждый февраль примерно две трети всех управляемых пчелиных колоний в Соединенных Штатах перевозятся грузовиками в Центральную долину Калифорнии для опыления миндальных садов. Эта миграция сама по себе является симптомом кризиса: местных популяций пчел больше нет достаточно для опыления региональных культур, поэтому пчелы должны быть перевезены через страну, как сезонные сельскохозяйственные рабочие.\u003c/p\u003e\n\u003cp\u003eСтресс этой миграции - приходится в пути, воздействие новых болезней, истощение питательных веществ от монокультурного опыления (миндальные сады обеспечивают единственный источник пыльцы) и химическое воздействие в садах - еще больше ослабляет колонии. Многие не выживают в течение сезона.\u003c/p\u003e\n\u003cp\u003eПотеря популяций диких пчел еще более тревожна, чем снижение численности управляемых медоносных пчел. Исследование 2019 года, опубликованное в журнале Biological Conservation, обнаружило, что более 40% видов насекомых во всем мире сокращаются, и одна треть классифицируется как находящаяся под угрозой исчезновения. Дикие пчелы, включающие более 20 000 видов и часто являющиеся более эффективными опылителями, чем управляемые медоносные пчелы, исчезают с темпами, не имеющими прецедента в научной истории.\u003c/p\u003e\n\u003cp\u003eБез опылителей человеческая диета сокращается до опыляемых ветром зерновых и самоопыляющихся культур. Фрукты, овощи, орехи и семена - продукты, которые обеспечивают витамины, минералы и антиоксиданты, необходимые для здоровья человека, - исчезают.\u003c/p\u003e\n\u003cp\u003eКофе, какао и ваниль - три из наиболее экономически и культурно значимых культур в мире - все зависят от опыления. Потеря опылителей устранит не только сельскохозяйственные основные продукты, но и всю культурную ткань пищи, которую человеческие цивилизации строили на протяжении тысячелетий.\u003c/p\u003e\n\u003cp\u003eТо, что остается, - это диета из пшеницы, кукурузы и риса: те же дешевые, питательно истощенные зерна, которые индустриальная продовольственная система уже пропагандирует как основу питания человека.\u003c/p\u003e\n\u003ch2 id=\"роботизированные-пчелы-корпоративное-решение\"\u003eРоботизированные пчелы: корпоративное решение\u003c/h2\u003e\n\u003cp\u003eВместо того чтобы решить проблему химического отравления, убивающего пчел, корпорации и их союзные исследовательские учреждения предложили характерно антиутопическое решение: заменить пчел роботами.\u003c/p\u003e\n\u003cp\u003eWalmart подал патент в 2018 году на автономных роботизированных пчел - дронов, предназначенных для опыления культур без необходимости в живых опылителях. Институт Wyss Гарварда разработал \"RoboBees\", крошечных летающих роботов, предназначенных для выполнения функций опыления. Национальный институт передовых промышленных наук и технологий Японии создал дроны размером с насекомое с конским волосом и ионным гелем для сбора и отложения пыльцы.\u003c/p\u003e\n\u003cp\u003eЭто корпоративная логика экологического разрушения: отравить естественную систему, а затем продать искусственную замену. Это тот же паттерн, наблюдаемый во всех областях индустриального захвата - уничтожить естественный иммунитет и продать вакцины, истощить естественную почву и продать синтетическое удобрение, исключить естественную пищу и продать обработанные заменители.\u003c/p\u003e\n\u003cp\u003eСозданный порядок систематически заменяется изготовленным порядком, который принадлежит, запатентован и контролируется одними и теми же сущностями, которые уничтожили то, что было раньше.\u003c/p\u003e\n\u003cp\u003eИдея, что роботический дрон может заменить экологическую функцию пчелы, выявляет глубокое незнание - или намеренное пренебрежение - сложности творения. Одна пчелиная колония выполняет миллионы событий опыления за сезон, ориентируясь по солнцу, общаясь через химические сигналы и танец, адаптируясь к погоде и доступности цветов в реальном времени.\u003c/p\u003e\n\u003cp\u003eПчела не просто механизм доставки пыльцы. Это живой участник экосистемы ошеломляющей сложности - система, разработанная Создателем, чья мудрость делает человеческую инженерию похожей на грубую имитацию.\u003c/p\u003e\n\u003cp\u003eКроме того, стоимость замены опыления пчелами технологией будет астрономической. Услуги опыления, которые пчелы предоставляют бесплатно, будут стоить сотни миллиардов долларов в год, если бы они выполнялись машинами. Корпорации, предлагающие роботизированных пчел, не решают проблему. Они создают рынок - заменяя бесплатное естественное обслуживание платным технологическим, финансируемым той же сельскохозяйственной системой, которая убила пчел.\u003c/p\u003e\n\u003ch2 id=\"более-широкий-экологический-коллапс\"\u003eБолее широкий экологический коллапс\u003c/h2\u003e\n\u003cp\u003eКоллапс пчелиных колоний не происходит изолированно. Это одно проявление более широкого экологического кризиса, вызванного химическим загрязнением окружающей среды. Те же неоникотиноиды, которые убивают пчел, также убивают бабочек, мотыльков, жуков, стрекоз и других насекомых, которые формируют основу наземных пищевых цепей.\u003c/p\u003e\n\u003cp\u003eИсследование 2017 года в Германии выявило, что биомасса летающих насекомых сократилась на 76% за 27 лет - находка настолько тревожная, что исследователи описали это как \"экологический армагеддон\".\u003c/p\u003e\n\u003cp\u003eПтицы, зависящие от насекомых в пищу, также сокращаются параллельно. Исследование 2019 года, опубликованное в журнале Science, показало, что Северная Америка потеряла почти 3 миллиарда птиц - 29% от общей популяции птиц - с 1970 года. Виды, питающиеся насекомыми, понесли наибольшие потери.\u003c/p\u003e\n\u003cp\u003eСвязь между химическим уничтожением насекомых и коллапсом популяций птиц не является спекулятивной - это задокументированная цепь экологической причины и следствия.\u003c/p\u003e\n\u003cp\u003eОкеаны переживают свой собственный параллельный кризис. Паттерн идентичен: промышленные химикаты насыщают естественные системы, биологические популяции коллапсируют, корпоративные интересы отрицают ответственность, а нормативные агентства служат загрязнителям, а не общественности.\u003c/p\u003e\n\u003cp\u003eМежду тем, сама почва - основа наземной жизни - лишается биологической активности, которая делает ее плодородной. Глифосат убивает почвенные микроорганизмы. Неоникотиноиды убивают почвенных насекомых. Синтетические удобрения заменяют биологический цикл питания химической зависимостью.\u003c/p\u003e\n\u003cp\u003eРезультатом является мертвая земля, которая может производить пищу только с увеличивающимся количеством химических вводов - спираль смерти, которая приносит пользу никому, кроме компаний по производству химикатов.\u003c/p\u003e\n\u003cp\u003eВодные экосистемы особенно уязвимы. Неоникотиноиды очень растворимы в воде и сохраняются в водной среде в течение месяцев. Исследование 2019 года в журнале Science of the Total Environment выявило загрязнение неоникотиноидами в 90% протестированных потоков в сельскохозяйственных регионах Соединенных Штатов. Обнаруженные концентрации были достаточны для убийства водных беспозвоночных - ручейников, ручейников и мошек, которые формируют основу пресноводных пищевых цепей и обеспечивают пищу рыб, амфибий и птиц.\u003c/p\u003e\n\u003ch2 id=\"генетическое-измерение\"\u003eГенетическое измерение\u003c/h2\u003e\n\u003cp\u003eСвязь между ГМО-земледелием и коллапсом пчелиных колоний заслуживает особого внимания. Генетически модифицированные культуры сконструированы для работы в сочетании с определенными химическими режимами. Культуры Roundup Ready требуют глифосата. Культуры Bt производят свой собственный инсектицид. Обе технологии увеличивают химическую нагрузку на опылителей.\u003c/p\u003e\n\u003cp\u003eКультуры Bt - кукуруза, хлопок и соя, сконструированные для производства токсина Bacillus thuringiensis - были озвучены как снижение использования инсектицидов, потому что само растение убивает целевые насекомые. Но токсин Bt не является селективным.\u003c/p\u003e\n\u003cp\u003eИсследование, опубликованное в журнале Ecotoxicology, показало, что токсин Bt нарушает обучение и память у медоносных пчел, снижая их эффективность сбора пищи. Пыльца из кукурузы Bt, переносимая ветром в прилегающие районы дикой флоры, подвергает пчел воздействию токсина, с которым они никогда не были предназначены встречаться.\u003c/p\u003e\n\u003cp\u003eНакопление химического воздействия - неоникотиноиды из обработки семян, глифосат из применения гербицидов, токсин Bt из генетически модифицированной пыльцы, фунгициды, адъюванты и поверхностно-активные вещества - создает токсический коктейль, чьи комбинированные эффекты намного больше, чем любой единичный химикат, тестировавшийся изолированно.\u003c/p\u003e\n\u003cp\u003eНормативные агентства тестируют химикаты индивидуально. Пчелы встречаются с ними одновременно. Разрыв между нормативным тестированием и реальным воздействием - это разрыв, в котором колонии коллапсируют и виды исчезают.\u003c/p\u003e\n\u003cp\u003eИсследование, опубликованное в журнале PLOS ONE в 2013 году, показало, что комбинация неоникотиноидов и фунгицидов была резко более токсичной для пчел, чем либо один химикат - синергетический эффект, который ни одна нормативная оценка не рассматривала. Подобная синергетическая токсичность была задокументирована между неоникотиноидами и глифосатом. Пчелы умирают не от единичного химиката. Они умирают от химической системы - системы, разработанной корпорациями, которые тестируют свои продукты индивидуально и отрекаются ответственности за комбинированные эффекты.\u003c/p\u003e\n\u003ch2 id=\"свидетельство-пчеловодов\"\u003eСвидетельство пчеловодов\u003c/h2\u003e\n\u003cp\u003eЧеловеческая стоимость коллапса колоний часто упускается из виду. Коммерческие пчеловоды в Соединенных Штатах теряют 30-50% своих колоний каждый год с 2006 года. Многие разорились. Те, кто выжил, делают это путем разделения выживших ульев, закупки новых маток и траты тысяч долларов на лечение паразитов и болезней, к которым ослабленные химически пчелы все больше уязвимы.\u003c/p\u003e\n\u003cp\u003eДэйв Хакенберг, пенсильванский пчеловод, который первым сообщил о CCD в 2006 году, наблюдал крах своей отрасли. \"У нас было 4000 пчеловодов в Соединенных Штатах, которые содержали 50 или более ульев,\" сказал он исследователям. \"Теперь мы примерно на 1500. Это не снижение. Это вымирание.\"\u003c/p\u003e\n\u003cp\u003eЕжегодное обследование Bee Informed Partnership отслеживало потери зимних колоний в среднем более 35% каждый год с начала мониторинга - потери, которые исторически считались катастрофическими на уровне 15%. Пчеловоды бегут все быстрее и быстрее просто для поддержания численности колоний, заменяя потерянные колонии такими темпами, что маскируют лежащий в основе биологический кризис.\u003c/p\u003e\n\u003cp\u003eПчелы что-то нам говорят. Вопрос в том, есть ли у нас воля слушать - или корпорации по производству химикатов, которые получают прибыль от их разрушения, продолжат диктовать условия разговора.\u003c/p\u003e\n\u003ch2 id=\"экономическая-эксплуатация-опыления\"\u003eЭкономическая эксплуатация опыления\u003c/h2\u003e\n\u003cp\u003eСнижение популяций дикой и управляемой пчел преобразовало опыление из бесплатной экологической услуги в платную коммерческую операцию - операцию, которая становится все более прибыльной для немногих и разрушительной для многих.\u003c/p\u003e\n\u003cp\u003eСборы за коммерческое опыление резко выросли по мере снижения популяций пчел. Производители миндаля Калифорнии теперь платят 200-250 долларов за колонию за услуги опыления - цена, которая более чем утроилась с начала CCD. Общая стоимость аренды пчел только для урожая миндаля в Калифорнии теперь превышает 400 миллионов долларов за сезон.\u003c/p\u003e\n\u003cp\u003eЭта стоимость передается потребителям через более высокие цены на продукты. Но пчеловоды, которые обеспечивают услугу, не извлекают пропорциональную пользу. Стресс мигрирующего опыления - вывоз ульев на тысячи миль, подвергаемые новым болезням и химическим окружающей среде, - ускоряет потери колоний. Многие коммерческие пчеловоды тратят доход от опыления на замену пчел и лечение, работая на беговой дорожке, которая производит доход без прибыли.\u003c/p\u003e\n\u003cp\u003eПобедители - это компании агрохимии, чьи продукты создали кризис, и индустрии товарных культур, чьи монокультуры требуют коммерческого опыления. Проигравшие - пчеловоды, потребители и экосистема.\u003c/p\u003e\n\u003cp\u003eМежду тем рынок меда был испорчен мошенничеством. Расследование 2011 года Food Safety News выявило, что 76% меда, продаваемого в американских магазинах, были ультрафильтрованы для удаления всей пыльцы - что делает невозможным определение географического происхождения меда и маскирует фальсификацию дешевым кукурузным сиропом или рисовым сиропом.\u003c/p\u003e\n\u003cp\u003eБольшая часть этого поддельного меда была обнаружена из Китая, который производит мед настолько загрязненный антибиотиками и тяжелыми металлами, что был запрещен Европейским союзом. Для обхода тарифов, китайский мед часто перегружается через третьи страны, такие как Индия, Вьетнам и Малайзия, переэтикетируется и продается на американском рынке по ценам, с которыми законные пчеловоды не могут конкурировать.\u003c/p\u003e\n\u003cp\u003eПчелиная экономика разрушена на каждом уровне: опылители умирают, пчеловоды борются, мед поддельный, и корпорации, ответственные за кризис, инвестируют в роботизированные замены. Система, которую Бог разработал для работы свободно - пчелы, опыляющие цветы, цветы, производящие фрукты, фрукты, питающие человечество - была захвачена, деградирована и монетизирована на каждом этапе.\u003c/p\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003cp\u003eКризис опыления не является абстрактным. Это влияет на каждого человека, который ест пищу. И хотя системные изменения требуют политического и нормативного действия, которое лобби агрохимии эффективно заблокировало, индивидуальное действие остается значимым.\u003c/p\u003e\n\u003cp\u003eПосадка садов, удобных для опылителей - даже небольшие участки местных полевых цветов, трав и цветущих растений - обеспечивает критическую среду обитания и источники пищи для местных популяций пчел. Избегание растений и семян, обработанных неоникотиноидами (часто продаваемых без маркировки в садовых центрах), предотвращает потребителей от невольного отравления пчел, которых они намереваются помочь.\u003c/p\u003e\n\u003cp\u003eПоддержка местных пчеловодов покупкой сырого нефильтрованного меда непосредственно из источника поддерживает инфраструктуру пчеловодства, от которой зависит коммерческое земледелие. Выбор органической продукции, когда это возможно, уменьшает спрос на интенсивное по химии земледелие, которое приводит к снижению численности опылителей.\u003c/p\u003e\n\u003cp\u003eЗащита запретов на неоникотиноиды, восстановления среды обитания опылителей и регенеративных сельскохозяйственных практик решает основные причины, а не просто лечит симптомы.\u003c/p\u003e\n\u003cp\u003eПчелы не могут защищать себя. Эта ответственность падает на тех, кто понимает, что поставлено на карту - это ничто иное, как продовольственное снабжение всего мира.\u003c/p\u003e\n\u003cp\u003eКаждый приусадебный сад с растениями, удобными для опылителей, - это убежище. Каждая банка местного меда - это голос за пчеловодческую экономику. Каждая органическая покупка - отклонение химической системы, которая убивает опылителей. Действия малы. Совокупный эффект - выживание.\u003c/p\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Не два ли воробья продаются за ассарий? и ни один из них не упадет на землю без ведома Отца вашего.\" - Матфей 10:29\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЕсли Бог замечает падение одного воробья, что Он видит, когда миллиарды Его существ систематически отравляются для корпоративной прибыли? Писание ясно: творение принадлежит Богу, а не Monsanto или Bayer. Земля и все, что в ней, были созданы Его рукой и доверены человечеству не как владельцы, а как распорядители.\u003c/p\u003e\n\u003cp\u003eТо, что агрохимическая промышленность сделала пчелам - и насекомым, птицам, почве и воде - это не просто экологическая проблема. Это нарушение созданного порядка, осквернение работы рук Бога.\u003c/p\u003e\n\u003cp\u003eПророки предупреждали, что земля будет скорбеть из-за нечестия тех, кто в ней живет. Осия видел это. Иоиль видел это. Иеремия видел это. Скорбь, которую они описали, не была метафорической - она была экологической.\u003c/p\u003e\n\u003cp\u003eКогда человечество отказывается от своего распорядительства творением в пользу эксплуатации, само творение разрушается. Пчелы исчезают. Почва умирает. Воды отравляются. И люди, которые зависят от этих систем - все люди везде - страдают последствия.\u003c/p\u003e\n\u003cp\u003eЭто не экологизм. Это теология. Земля принадлежит Господу, и полнота ее. Те, кто разрушает ее, будут отвечать за то, что они сделали.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"дополнительная-информация\"\u003eДополнительная информация\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/135-Food_Price_Shadow_Industry.mp4\"\u003eFood Price Shadow Industry\u003c/a\u003e — Скрытые силы, контролирующие производство продовольствия\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/gmo-genetic-modification-food/?lang=ru\"\u003eGMO: Генетическая модификация вашего запаса продовольствия\u003c/a\u003e — Как генетически модифицированные культуры и их химические партнеры уничтожают опылителей и пищевую цепь\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/ocean-pollution-marine-crisis/?lang=ru\"\u003eOcean Pollution: Морской кризис, о котором никто не говорит\u003c/a\u003e — Параллельный экологический коллапс, разворачивающийся в мировых океанах\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/soil-depletion-mineral-crisis/?lang=ru\"\u003eSoil Depletion: Минеральный кризис под нашими ногами\u003c/a\u003e — Как промышленное земледелие убивает землю, которая поддерживает всю наземную жизнь\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eКогда упадет последняя пчела, последний цветок останется неопыленным, последний плод останется неразвитым, и пищевая цепь, которую Бог разработал для поддержания жизни на земле, развалится. Синдром разрушения колоний - не тайна - это преступление. Корпорации, которые производят яды, знают, что они делают. Регуляторы, которые их одобряют, знают, что они позволяют. И творение, которое
