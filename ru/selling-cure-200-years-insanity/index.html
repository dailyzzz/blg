через ложное знание — это не современное явление. Это стара, как первая ложь змея: \"нет, не умрете\" (Бытие 3:4). С момента, когда враг убедил Еву, что непослушание принесет мудрость, а не смерть, шаблон был установлен — упакуйте яд как лекарство, продавайте смерть как излечение и оборачивайте разрушение в язык исцеления.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e захватывает эту древнюю ложь с опустошающей ясностью. Змей не объявляет себя разрушителем. Он приходит как просветитель, тот, кто предлагает запретное знание — знание, которое убивает. Это паттерн современной медицины в одном предложении. В течение двухсот лет медицинское установление предлагало человечеству лекарства, которые уродливят, лечения, которые отравляют, и вмешательства, которые создают зависимость. И на каждом этапе те, кто ставил под сомнение лекарство, были названы невежественными, опасными или безумными.\u003c/p\u003e\n\u003cp\u003eКак раскрывает трек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e, архитектура ложи всегда одинакова: представьте ложь с властью, наказывайте тех, кто сопротивляется, и вознаграждайте тех, кто подчиняется. Двести лет медицинской истории — это двести лет этого цикла на повторе — с затратой, измеренной в миллионах жизней.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"эра-ртути-когда-яд-был-рецептом\"\u003eЭра ртути: Когда яд был рецептом\u003c/h2\u003e\n\u003ch3 id=\"героическая-медицина-и-её-жертвы\"\u003eГероическая медицина и её жертвы\u003c/h3\u003e\n\u003cp\u003eВ конце 1700-х годов и на протяжении 1800-х годов западная медицина работала под философией, называемой \"героической медициной\". Предпосылка была жестоко простой: болезнь была вызвана дисбалансом в организме, и роль врача была агрессивно очищать эти дисбалансы любыми доступными средствами. Чем более драматичным было вмешательство, тем более \"героической\" была медицина.\u003c/p\u003e\n\u003cp\u003eОсновными инструментами героической медицины были ртуть (вводимая как каломель), кровопускание, вздутие вызывающие вещества и соединения мышьяка. Каломель — хлорид ртути — был прописан практически для всего: лихорадок, инфекций, пищеварительных жалоб, сифилиса, боли при прорезывании зубов у младенцев и общего недомогания. Врачи применяли его в дозах, которые считались бы уголовными по любому современному токсикологическому стандарту.\u003c/p\u003e\n\u003cp\u003eЭффекты отравления ртутью были хорошо задокументированы даже в то время: обильное слюноотделение (пациенты производили кварты слюны в день), расшатывание и потеря зубов, гангренозное разрушение челюстной кости, почечная недостаточность, неврологическое повреждение и смерть. Но эти эффекты были интерпретированы врачами не как доказательство отравления, а как доказательство того, что лекарство \"работало\" — что организм был очищен от болезни. Чем больше пациент болел от лечения, тем более агрессивно применялось лечение.\u003c/p\u003e\n\u003cp\u003eЭто не древняя история в смысле, который большинство людей воображает. Каломель на основе ртути была наиболее часто назначаемым лекарством в Америке на протяжении более века. Она была дана солдатам гражданской войны, детям с простудой, беременным женщинам и пожилым людям. Это была аспирин её эры — повсеместная, бесспорная и летальная.\u003c/p\u003e\n\u003ch3 id=\"структура-прибыли\"\u003eСтруктура прибыли\u003c/h3\u003e\n\u003cp\u003eЧто сделало ртутную медицину такой стойкой, была не её эффективность — её не было — а её экономика. Ртуть была дешева в производстве, легко производилась в форме пилюль и порошка и создавала цикл зависимости, который гарантировал повторение покупателей. Пациент, дозированный ртутью, становился больнее, что требовало большего лечения, что создавало больше симптомов, что требовало больше ртути. Врач, который прописывал каломель, никогда не кончался у пациентов, потому что само лекарство производило следующий раунд болезни.\u003c/p\u003e\n\u003cp\u003eЭто фундаментальная модель ведения бизнеса западной медицины, и она никогда не изменялась. Конкретные яды чередуются — ртуть уступила место радиации, радиация к химиотерапии, химиотерапия к иммуносупрессантам, иммуносупрессанты к инъекциям mRNA — но структура идентична: продавайте лечение, которое создает потребность в большем лечении.\u003c/p\u003e\n\u003cp\u003eКак задокументировано на Substack Agent131711 (agent131711.substack.com), история медицинских \"лекарств\" — это история ятрогенного — вызванного врачом — заболевания. Лечение создает состояние, которое требует следующего лечения. Это не некомпетентность. Это архитектура.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"радиационная-революция-от-x-лучей-к-фабрикам-рака\"\u003eРадиационная революция: От X-лучей к фабрикам рака\u003c/h2\u003e\n\u003ch3 id=\"радиевое-увлечение\"\u003eРадиевое увлечение\u003c/h3\u003e\n\u003cp\u003eКогда Вильгельм Рентген открыл X-лучи в 1895 году, медицинское установление ответило тем же паттерном, которое оно повторяло бы для каждого последующего технологического открытия: немедленное, бесспорное принятие, сопровождаемое десятилетиями отрицания, когда вред стал неоспоримым.\u003c/p\u003e\n\u003cp\u003eВ течение месяцев после открытия рентгеновские аппараты появились в обувных магазинах, карнавальных аттракционах и медицинских офисах по всей Америке и Европе. Врачи использовали их для исследования всего: от переломов костей до проблем с пищеварением, подвергая пациентов и себя массивным дозам ионизирующего излучения без защитного оборудования и без понимания кумулятивных эффектов.\u003c/p\u003e\n\u003cp\u003eРадиевое увлечение, которое последовало, было еще более разрушительным. После того, как Мария Кюри выделила радий в 1898 году, предприниматели немедленно начали маркетировать продукты, насыщенные радием, как тонизирующие средства здоровья. Радиевая вода, радиевые суппозитории, радиевая зубная паста, радиевый крем для лица, линованные радием питьевые фляги — все продавались как чудо-лекарства. Логика была циклической: радий был новым, новое было научным, научное было хорошим, поэтому радий был хорошим для вас.\u003c/p\u003e\n\u003cp\u003eЕбен Байерс, богатый американский светский человек, выпил приблизительно 1400 бутылок радиевой воды между 1927 и 1931 годами по совету своего врача. Когда он умер в 1932 году, его кости разлагались, его челюсть была удалена, а его череп был наполнен отверстиями. Заголовок Wall Street Journal гласил: \"The Radium Water Worked Fine Until His Jaw Came Off\" (\"Радиевая вода хорошо работала, пока его челюсть не отвалилась\").\u003c/p\u003e\n\u003ch3 id=\"радиотерапия-современная-ртуть\"\u003eРадиотерапия: Современная ртуть\u003c/h3\u003e\n\u003cp\u003eПараллель с ртутной медициной точна. Радиотерапия для рака работает по той же логике героической медицины: взорвите организм токсичным агентом, наблюдайте разрушение и интерпретируйте разрушение как доказательство исцеления. Современная радиотерапия повреждает ДНК как раковых, так и здоровых клеток, подавляет иммунную систему, вызывает вторичные раки и производит каскад побочных эффектов, которые требуют дополнительного фармацевтического вмешательства.\u003c/p\u003e\n\u003cp\u003eСобственные данные Национального института рака показывают, что радиотерапия увеличивает риск вторичных раков на 10-20% в зависимости от типа и местоположения. Пациенты, леченные радиацией при лимфоме Ходжкина, например, имеют значительно повышенный риск рака груди, рака легких и рака щитовидной железы на протяжении остатка их жизней. Лечение от рака создает больше рака. Лекарство продает следующую болезнь.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e документирует, как эта система была намеренно построена — не эволюционировала случайно, а была разработана финансовыми интересами, которые понимали потенциал прибыли системы здравоохранения, построенной на постоянном лечении, а не на фактическом исцелении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"парадигма-вакцины-продажа-профилактики-болезней-которые-уже-исчезали\"\u003eПарадигма вакцины: Продажа профилактики болезней, которые уже исчезали\u003c/h2\u003e\n\u003ch3 id=\"великое-скрытие-санитарии\"\u003eВеликое скрытие санитарии\u003c/h3\u003e\n\u003cp\u003eОдин из наиболее стойких мифов в медицинской истории заключается в том, что вакцины покорили великие инфекционные болезни XIX и XX веков. Исторический отчет рассказывает радикально другую историю.\u003c/p\u003e\n\u003cp\u003eУровни смертности от кори, скарлатины, тифа, коклюша и дифтерии снизились на 90-99% до того, как были введены вакцины против этих болезней. Снижение было вызвано улучшением санитарии, систем чистой воды, питания и условий жизни — не медицинским вмешательством. Диаграммы общеизвестны. Данные даже не оспариваются основными эпидемиологами. То, что оспаривается — с ожесточением — это интерпретация.\u003c/p\u003e\n\u003cp\u003eМедицинское установление берет кредит за окончательный процент снижения, приписывая его программам вакцинации, введенным после того, как болезни уже были в значительной степени покорены инфраструктурой общественного здравоохранения. Это эквивалентно пожарнику, прибывающему после того, как здание сгорело, распыляющему золу и требующему кредит за тушение пожара.\u003c/p\u003e\n\u003cp\u003eКак тщательно задокументировано на Substack Agent131711 (agent131711.substack.com), программы вакцинации были введены не для спасения жизней — жизни уже спасались чистой водой и надлежащими системами канализации. Программы были введены для установления парадигмы медицинского вмешательства, которая будет генерировать постоянный доход и институциональную власть. Если болезни побеждены санитарией, врачи и фармацевтические компании неуместны. Если болезни побеждены вакцинами, врачи и фармацевтические компании незаменимы.\u003c/p\u003e\n\u003ch3 id=\"захват-рокфеллера\"\u003eЗахват Рокфеллера\u003c/h3\u003e\n\u003cp\u003eТрансформация американской медицины из разнообразной экосистемы традиций исцеления в фармацевтическую монополию не произошла органически. Она была разработана конкретными финансовыми интересами — прежде всего семьей Рокфеллеров — через отчет Флекснера 1910 года.\u003c/p\u003e\n\u003cp\u003eАбраам Флекснер, финансируемый Фондом Карнеги и Институтом Рокфеллера, объездил каждую медицинскую школу в Северной Америке и выпустил отчет, который привел к закрытию более половины всех медицинских школ в стране. Школы, которые выжили, были те, которые приняли фармацевтическую, аллопатическую модель — модель, которая лечила болезнь лекарствами и операциями, а не питанием, травами, гомеопатией или другими непатентуемыми подходами.\u003c/p\u003e\n\u003cp\u003eСемья Рокфеллера имела прямой финансовый интерес в этом результате. Они контролировали Standard Oil, который производил петрохимическую основу материалов, из которых синтезируются фармацевтические препараты. Исключив конкурирующие медицинские философии и установив лекарственную медицину как единственную легитимную форму здравоохранения, они создали очень благодарный рынок своих петрохимических продуктов.\u003c/p\u003e\n\u003cp\u003eЭто не теория заговора. Отчет Флекснера — это общественный документ. Источники финансирования задокументированы. Закрытие медицинских школ — исторический факт. Одновременный контроль семьи Рокфеллеров над нефтяными компаниями и фармацевтическими компаниями — это вопрос корпоративного учета. Единственное, что преобразует это из исторического анализа в \"теорию заговора\", — это акт соединения точек — что именно то, что система разработана, чтобы предотвратить.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"химиотерапевтический-обман\"\u003eХимиотерапевтический обман\u003c/h2\u003e\n\u003ch3 id=\"от-горчичного-газа-к-медицине\"\u003eОт горчичного газа к медицине\u003c/h3\u003e\n\u003cp\u003eХимиотерапия — использование цитотоксических химических веществ для лечения рака — возникла из исследований горчичного газа Первой мировой войны. Наблюдая, что солдаты, подвергшиеся воздействию горчичного газа, испытали разрушение своего костного мозга и лимфатических систем, исследователи в Йельском университете начали экспериментировать с производными азотистого горчичного газа как методы лечения лимфомы в 1940-х годах.\u003c/p\u003e\n\u003cp\u003eПрогрессирование стоит того, чтобы остановиться: химическое оружие, разработанное, чтобы убивать солдат на поле боя, было переделано как медицинское лечение. Механизм действия не изменился. Химиотерапия убивает клетки — все клетки, не только раковые. Она разрушает иммунную систему, повреждает пищеварительный тракт, вызывает отказ органов, вызывает вторичные раки и производит страдание, которое многие пациенты описывают как хуже, чем сама болезнь.\u003c/p\u003e\n\u003cp\u003eПятилетняя статистика выживаемости при химиотерапии мрачна. Знаковое исследование 2004 года, опубликованное в Clinical Oncology Морганом, Уордом и Бартоном, проанализировало вклад химиотерапии в пятилетние показатели выживаемости в 22 основных типах рака в Австралии и Соединенных Штатах. Результат: химиотерапия способствовала только 2,1% к пятилетней выживаемости в Австралии и 2,3% в Соединенных Штатах. Для большинства типов рака вклад был менее 1%.\u003c/p\u003e\n\u003cp\u003eОднако химиотерапия остается многомиллиардной промышленностью. Средняя стоимость курса химиотерапии в Соединенных Штатах варьируется от 10000 до более 200000 долларов. Онкологи — уникально среди медицинских специалистов — получают прибыль непосредственно от лекарств, которые они прописывают, покупая агенты химиотерапии оптом и вводя их с повышением. Эта структура прибыли, известная как \"химиотерапевтическое послабление\", создает прямый финансовый стимул для рецепта химиотерапии независимо от её вероятности пользы.\u003c/p\u003e\n\u003ch3 id=\"индустрия-рака\"\u003eИндустрия рака\u003c/h3\u003e\n\u003cp\u003e\"Война с раком\", объявленная президентом Никсоном в 1971 году, потребила более 500 миллиардов долларов исследовательского финансирования. Показатели рака не снизились. Возрастная скорректированная заболеваемость раком увеличилась с 1971 года. Пятилетние улучшения выживаемости, которые объявляются раковой промышленностью, в значительной степени являются артефактами более раннего обнаружения (смещение времени поиска) и переклассификации состояний как рака, которые ранее не были бы диагностированы как таковые (переодиагностика).\u003c/p\u003e\n\u003cp\u003eРаковая промышленность не получает прибыль от лечения рака. Она получает прибыль от лечения рака. Различие не семантическое — это вся бизнес-модель. Вылеченный пациент — это потерянный клиент. Пациент в постоянном лечении — хирургия, химиотерапия, радиация, иммунотерапия, последующие сканирования, лечение вторичного рака — это поток доходов, который может продолжаться годами или десятилетиями.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eEngineering Contagion\u003c/a\u003e исследует, как сама болезнь разработана — не просто лечится, но создается — как механизм контроля и прибыли.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"психиатрический-фармацевтический-комплекс\"\u003eПсихиатрический фармацевтический комплекс\u003c/h2\u003e\n\u003ch3 id=\"изобретение-болезней-для-продажи-наркотиков\"\u003eИзобретение болезней для продажи наркотиков\u003c/h3\u003e\n\u003cp\u003eДиагностическое и статистическое руководство психических расстройств (DSM) — библия психиатрического диагноза — содержало 106 расстройств в его первом издании (1952). К DSM-5 (2013) оно содержало более 300. Количество психических расстройств не утроилось потому, что человеческая психология стала в три раза более сложной. Оно утроилось потому, что фармацевтической промышленности нужны были новые рынки.\u003c/p\u003e\n\u003cp\u003eПроцесс, посредством которого психическое расстройство входит в DSM, не научный в каком-либо значимом смысле. Это политический. Комитеты психиатров — большинство из которых имеют финансовые отношения с фармацевтическими компаниями — голосуют о том, должно ли предложенное расстройство быть включено. Нет анализа крови, нет мозгового сканирования, нет объективного биологического маркера для подавляющего большинства психиатрических диагнозов. Они создаются консенсусом комитета и подтверждаются существованием лекарства, которое их лечит.\u003c/p\u003e\n\u003cp\u003eСоздание \"социального тревожного расстройства\" — это тематическое исследование. До конца 1990-х годов застенчивость была чертой личности. SmithKline Beecham (теперь GlaxoSmithKline) финансировал кампанию, чтобы переделать застенчивость как медицинское состояние — социальное тревожное расстройство — и одновременно продвигал их SSRI, Паксил, как лечение. Кампания была спектакулярно успешной. Миллионы людей, которые ранее были бы описаны как застенчивые, интровертированные или зарезервированные, были переклассифицированы как психически больные и помещены на фармацевтическое лекарство.\u003c/p\u003e\n\u003cp\u003eЭтот паттерн повторился для ADHD, биполярного расстройства у детей, предменструального дисфорического расстройства, расстройства пищевого поведения с перееданием и десятков других состояний, которые были либо редкими диагнозами, либо вообще не существовали как медицинские категории до того, как фармацевтической промышленности нужно было им существовать.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"паттерн-никогда-не-изменяется\"\u003eПаттерн никогда не изменяется\u003c/h2\u003e\n\u003ch3 id=\"два-века-одной-и-той-же-лжи\"\u003eДва века одной и той же лжи\u003c/h3\u003e\n\u003cp\u003eКонкретные яды изменяются. Ртуть уступает место радиации. Радиация уступает место химиотерапии. Химиотерапия уступает место технологии mRNA. Но структура неизменна:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВводить лечение, которое создает зависимость.\u003c/strong\u003e Лечение не должно излечивать — оно должно управлять, подавлять или создавать новые симптомы, которые требуют дальнейшего лечения.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eУстановить институциональную власть.\u003c/strong\u003e Лечение должно быть одобрено kredentialed экспертами, регулирующими органами и академическими учреждениями, которые получают финансирование от компаний, продающих лечение.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПодавить альтернативы.\u003c/strong\u003e Любая модель лечения, которая угрожает модели доходов — питание, голодание, травяная медицина, детоксикация, молитва — должны быть маргинализированы, высмеяны или криминализированы.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eНаказать несогласие.\u003c/strong\u003e Врачи, которые ставят под сомнение парадигму, теряют свои лицензии. Исследователи, которые публикуют противоречивые данные, теряют свое финансирование. Пациенты, которые отказываются от лечения, названы неподходящими, небрежными или психически больными.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПовторение.\u003c/strong\u003e Когда текущее лечение становится слишком очевидно вредным для защиты, введите новое лечение, которое следует тому же паттерну, утверждайте, что оно представляет \"прогресс\", и начните цикл снова.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭто не система, которая иногда совершает ошибки. Это система, которая функционирует точно так же, как разработана. Дизайн — это не здоровье. Дизайн — это контроль — финансовый контроль через постоянную зависимость, социальный контроль через институциональную власть и духовный контроль через замену божественного исцеления на фармацевтические подделки человека.\u003c/p\u003e\n\u003cp\u003eКак объявляет трек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eVaccine Of The Beast\u003c/a\u003e, конечная точка этой траектории — это не просто коммерческая — это духовная. Фармацевтическая система (греческое слово \"pharmakeia\" буквально означает волшебство) строится к сходимости медицины и технологии, которая предложит человечеству окончательное \"лекарство\" — то, которое требует передачи вашей биологической автономии, вашей генетической идентичности и в конечном итоге вашей души.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"путь-вперед\"\u003eПуть вперед\u003c/h2\u003e\n\u003cp\u003eРешение двухсот лет медицинского безумия — это не лучшая медицина. Это отказ от предпосылки, что человеческое здоровье — это продукт, который можно продать. Человеческое тело было разработано его Создателем с необычайной способностью к самоисцелению — способностью, которая систематически подорвана самой системой, которая претендует на её поддержку.\u003c/p\u003e\n\u003cp\u003eПисание обеспечивает основу: \"Выше всего, желаю, чтобы ты был здоров, так же как здорова твоя душа\" (3 Иоанна 1:2). Здоровье начинается с души. Когда душа выровнена со своим Создателем, тело следует. Когда душа захватывается системами зависимости и страха, тело деградирует — и медицинская система находится там, чтобы получить прибыль от каждого этапа этой деградации.\u003c/p\u003e\n\u003cp\u003eИсследование, скомпилированное Agent131711 на Substack (agent131711.substack.com), обеспечивает документальное доказательство. Писание обеспечивает основу. Выбор — как это всегда было — ваш.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e — Намеренное построение медицинской системы, разработанной для прибыли, не исцеления\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eVaccine Of The Beast\u003c/a\u003e — Духовная конечная точка фармацевтического контроля над человеческим телом\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eEngineering Contagion\u003c/a\u003e — Как болезнь производится как механизм власти и прибыли\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The
