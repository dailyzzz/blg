 подвергались биологическому нападению на протяжении веков. От одеял, зараженных оспой, распределяемых коренным американцам в 18 веке, до принудительных программ стерилизации в 20 веке, паттерн биологического нападения на коренное население задокументирован, признан и неоспорим. Развертывание нанотехнологии мРНК представляет последнюю главу этого многовекового нападения — биологический агент, развернутый против коренного населения во всем мире под прикрытием общественного здравоохранения.\u003c/p\u003e\n\u003cp\u003eНо угнетенные восстают. Коренные нации, опираясь на столетия опыта биологического нападения и вооруженные доказательствами загрязнения нанотехнологией, теперь задокументированными исследователями во всем мире, проводят международные трибунальные разбирательства против ответственных за последнее развертывание биологического оружия.\u003c/p\u003e\n\u003cp\u003eКак объявляет \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/127-The_Overcoming.mp4\"\u003eThe Overcoming\u003c/a\u003e из альбома Confliction, обещание победы принадлежит тем, кто отказывается подчиняться. И как провозглашает \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/89-The_Serpent_Crusher.mp4\"\u003eThe Serpent Crusher\u003c/a\u003e, Голова, которая раздавливает змею, борется на стороне всех, кто призывает Его имя.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"исторический-контекст-биологическое-нападение-на-коренные-народы\"\u003eИсторический контекст: Биологическое нападение на коренные народы\u003c/h2\u003e\n\u003ch3 id=\"паттерн-нападения\"\u003eПаттерн нападения\u003c/h3\u003e\n\u003cp\u003eБиологическое нападение на коренные народы находится среди наиболее хорошо задокументированных паттернов колониального насилия:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРаспределение оспы (18-19 век)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eБританские военные командиры, включая лорда Джеффри Амхерста, задокументировали намеренное распределение одеял, зараженных оспой, коренному американскому населению во время войны французов и индейцев. Это биологическое нападение способствовало истреблению коренного населения по всей Северной Америке.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПрограммы принудительной стерилизации (20 век)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eПравительство США через Индийскую службу здравоохранения принудительно стерилизовало предположительно 25-50% женщин коренного американского детородного возраста между 1970 и 1976 годами. Эта программа, проводимая без информированного согласия, составляла геноцид согласно Конвенции ООН о предупреждении и наказании преступления геноцида.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДобыча урана и ядерные испытания\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eЗемли коренных народов систематически использовались для добычи урана и ядерных испытаний, подвергая коренное население уровням радиации, которые вызывали рак, врожденные дефекты и генетические повреждения. Нация навахо, западные шошоны, жители маршаллских островов и абориген австралийцы среди наиболее серьезно пострадавших.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМедицинское экспериментирование\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eКоренное население подвергалось медицинскому экспериментированию без согласия на протяжении всей колониальной истории, включая исследование сифилиса Tuskegee (которое включало коренных американцев), питательные эксперименты на канадских детях первых наций в интернатных школах и фармацевтическое тестирование в коренных сообществах по всей Латинской Америке и Африке.\u003c/p\u003e\n\u003cp\u003eРазвертывание мРНК нанотехнологии следует за этим паттерном точно: биологический агент, развернутый против коренного населения без адекватного информированного согласия, без полного раскрытия компонентов продукта и с институциональными механизмами, спроектированными для подавления доказательств вреда.\u003c/p\u003e\n\u003ch2 id=\"трибунал\"\u003eТрибунал\u003c/h2\u003e\n\u003ch3 id=\"формирование-альянса\"\u003eФормирование альянса\u003c/h3\u003e\n\u003cp\u003eКоренные нации из нескольких континентов сформировали альянс, чтобы провести международные трибунальные разбирательства против виновных в развертывании биологического оружия мРНК. Альянс включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПервые нации Канады и коренные нации Соединенных Штатов\u003c/li\u003e\n\u003cli\u003eКоренное население Латинской Америки, включая нации амазонки\u003c/li\u003e\n\u003cli\u003eНарод абориген и жители островов Торреса Австралии\u003c/li\u003e\n\u003cli\u003eМаори Аотеароа (Новая Зеландия)\u003c/li\u003e\n\u003cli\u003eКоренное население Африки\u003c/li\u003e\n\u003cli\u003eКоренное население островов Тихого океана\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти нации поделяют общую правовую структуру: коренной суверенитет. Как суверенные нации с врожденными правами, предшествующими колониальным конституциям, коренные народы имеют право проводить разбирательства согласно международному праву независимо от национальных государств, которые в настоящее время занимают их территории.\u003c/p\u003e\n\u003ch3 id=\"обвинения\"\u003eОбвинения\u003c/h3\u003e\n\u003cp\u003eОбвинения трибунала включают:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eГеноцид\u003c/strong\u003e -- Развертывание биологических агентов (нанотехнология, ДНК SV40, самоамплифицирующаяся мРНК) против коренного населения без информированного согласия, вызывающие смерть и серьезные телесные повреждения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение Конвенции о биологическом оружии\u003c/strong\u003e -- Разработка и развертывание биологических агентов без оправданной профилактической цели\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение Декларации ООН о правах коренных народов\u003c/strong\u003e -- которая гарантирует коренным народам право на свободное, предварительное и информированное согласие относительно любого медицинского вмешательства\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение Нюрнбергского кодекса\u003c/strong\u003e -- Неконсенсуальные медицинские эксперименты над коренным населением\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭкологический геноцид\u003c/strong\u003e -- Загрязнение земель, воды и продовольственных систем коренных народов нанотехнологией через экологические векторы\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eАна Михалча, MD, PhD, внесла научные доказательства в разбирательства трибунала через ее обширное документирование на ее Substack (anamihalceamdphd.substack.com), предоставляя доказательства микроскопии в темном поле от членов коренных сообществ, показывающие загрязнение нанотехнологией, соответствующее выводам в общей популяции.\u003c/p\u003e\n\u003ch3 id=\"база-доказательств\"\u003eБаза доказательств\u003c/h3\u003e\n\u003cp\u003eДоказательства трибунала включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eДокументирование микроскопией в темном поле нанотехнологии в крови членов коренных сообществ\u003c/li\u003e\n\u003cli\u003eСпектроскопический анализ флаконов вакцин, введенных в коренные сообщества\u003c/li\u003e\n\u003cli\u003eЭпидемиологические данные, показывающие паттерны нежелательных событий в коренном населении\u003c/li\u003e\n\u003cli\u003eИсторическое документирование биологического нападения на коренные народы\u003c/li\u003e\n\u003cli\u003eЭкспертное свидетельство от врачей, ученых и специалистов по биологическому оружию\u003c/li\u003e\n\u003cli\u003eТрадиционное знание и пророчество от коренных старейшин относительно загрязнения крови\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"коренное-пророчество-и-библейское-пророчество\"\u003eКоренное пророчество и библейское пророчество\u003c/h2\u003e\n\u003ch3 id=\"сходимость-предупреждений\"\u003eСходимость предупреждений\u003c/h3\u003e\n\u003cp\u003eМногие коренные традиции содержат пророчества, параллельные библейским предупреждениям о загрязнении крови и порче земли в последние дни:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПророчество хопи\u003c/strong\u003e описывает время, когда \"реки будут красные\" и \"воздух будет отравлен\" -- соответствие загрязнению нанотехнологией водных систем и атмосферному геоинженерству\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПророчество лакота\u003c/strong\u003e говорит о времени, когда \"паутина жизни разорвана\" и \"все живые существа связаны с болезнью\" -- соответствие самораспространяющейся нанотехнологии, которая загрязняет взаимосвязанную биологическую паутину\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПророчество времени сновидений абориген\u003c/strong\u003e описывает нарушения в самой земле -- земля, изменяемая на уровне глубже поверхности\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти коренные пророческие традиции сходятся с библейским предупреждением Откровения 18:23 -- что все нации будут обмануты волшебством. Коренные нации, которые были целями фармацевтического нападения на протяжении веков, рано признали обман и теперь возглавляют правовое сопротивление.\u003c/p\u003e\n\u003ch3 id=\"твердь-в-коренной-космологии\"\u003eТвердь в коренной космологии\u003c/h3\u003e\n\u003cp\u003eМногие коренные космологии включают концепцию, параллельную библейской тверди -- куполу или навесу над землей, который определяет границу созданного мира:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКонцепция хопи о \"потолке неба\"\u003c/li\u003e\n\u003cli\u003eКонцепция абориген неба как твердого свода\u003c/li\u003e\n\u003cli\u003eМногочисленные традиции коренных американцев, описывающие небо как купол или покрытие\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти космологические понимания выравниваются с библейским описанием тверди в Бытии 1:6-8 -- твердое вместилище, помещенное над землей, чтобы отделить и защитить созданное царство. Коренное понимание мира как замкнутого защищенного пространства под куполом выравнивается с библейской космологией, которую современная материалистическая наука отвергла.\u003c/p\u003e\n\u003cp\u003eСетка электромагнитной частоты, строящаяся внутри этого купола -- башни 5G, спутники, наземные передатчики -- представляет, в как коренной, так и библейской космологии, нарушение священного пространства. Купол был помещен для защиты. Сетка частоты преобразует его в тюрьму.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: услышь голос народа во всем, что они говорят тебе; ибо не тебя они отвергли, а Меня отвергли, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царства 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отзывается через каждый коридор правительства сегодня. Когда Израиль потребовал царя, как другие нации, Бог предупредил их именно том, что произойдет — их сыновья взяты на войну, их дочери на служение, их поля и виноградники захвачены, десятина всего конфискована. Они выбрали человеческое правительство над правлением Бога, и тирания последовала ровно как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной и той же птицы — левое и правое, республиканец и демократ — все служащие одной и той же скрытой структуре власти. Голосование за одну сторону — это выбор, какое крыло бьет дальше, пока птица летит в том же направлении. Реальная власть никогда не была на бюллетене.\u003c/p\u003e\n\u003ch2 id=\"ссылки-на-источники\"\u003eСсылки на источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eДекларация ООН о правах коренных народов (UNDRIP), 2007\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eLawrence, J., \"The Indian Health Service and the Sterilization of Native American Women,\" American Indian Quarterly, 2000\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eРазличные трибунальные разбирательства коренных народов и документация альянса\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eАна Михалча, MD, PhD, anamihalceamdphd.substack.com, анализ крови коренного сообщества\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царства 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство почти-смертельного опыта Ховарда Питтмана — Предупреждение о конце времен, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолический конфиденциал: раскрытые позорные иезуитские секреты\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eТо, что в подвале Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eВакцина зверя\u003c/a\u003e -- Биологическое оружие, развернутое на коренные народы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eВ ногу со зверем\u003c/a\u003e -- Глобальная координация, нацеленная на все нации\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eИнженерия заражения\u003c/a\u003e -- Инженерный агент, пересекающий все границы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/293-Arrows_In_The_Sky.mp4\"\u003eСтрелы в небе\u003c/a\u003e -- Атмосферный удар на земли коренных народов\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/127-The_Overcoming.mp4\"\u003eПреодоление\u003c/a\u003e -- Победа для тех, кто отказывается подчиняться\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/89-The_Serpent_Crusher.mp4\"\u003eЗмеиный раздавливатель\u003c/a\u003e -- Раздавливание биологического оружия змеи\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследовать-далее\"\u003eИсследовать далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mrna-bioweapons-prohibition/?lang=ru\"\u003eДело о запрещении биологического оружия мРНК\u003c/a\u003e -- Правовая основа для классификации биологического оружия\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/victory-future-generation/?lang=ru\"\u003eПобеда для нашего будущего поколения против медицинской тирании\u003c/a\u003e -- Более широкое движение сопротивления\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/geoengineering-mitigation-experiment/?lang=ru\"\u003eЭксперимент намерения смягчения геоинженерии во всем мире\u003c/a\u003e -- Загрязнение окружающей среды земель коренных народов\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eКоренные народы земли пережили столетия биологического нападения -- одеяла оспы, принудительная стерилизация, ядерное загрязнение и теперь инъекция нанотехнологии. Каждое нападение сопровождалось уверениями в безопасности или отрицаниями вреда. Каждое нападение было в конце концов задокументировано как намеренное. И каждое нападение усилило решимость наций, которые пережили все, что колониальная система развернула против них. Альянс коренных наций, стоящий перед международным трибуналом, несет не только юридические аргументы, но моральный авторитет народов, которые были канарейки в угольной шахте биологического нападения в течение пятисот лет. Их свидетельство пророческое. Их мужество историческое. И их Бог -- Творец, признанный коренными народами задолго до прибытия миссионеров -- это же Бог, который совершает справедливость и праведность для всех угнетаемых.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Альянс коренных наций Международный трибунал против биологического оружия\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Коренные нации во всем мире объединяются, чтобы провести международные трибунальные разбирательства против развертывания биологического оружия на основе мРНК против их суверенного населения.\"}],[\"$\",\"div\",null,{\"className\":\"fl
