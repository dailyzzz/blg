" href="https://blog.zzzdaily.com/ru/trump-bans-gain-of-function/"/><link rel="alternate" hrefLang="es" href="https://blog.zzzdaily.com/es/trump-bans-gain-of-function/"/><meta property="og:title" content="Исполнительный приказ Трампа запрещает исследование усиления функций"/><meta property="og:description" content="Президент Трамп подписывает исполнительный приказ, запрещающий исследование усиления функций, нацелен на программы биологического оружия, замаскированные подготовкой общественного здоровья в течение десятилетий."/><meta property="og:url" content="https://blog.zzzdaily.com/ru/trump-bans-gain-of-function/"/><meta property="og:site_name" content="ZZZ Daily Blog"/><meta property="og:locale" content="ru_RU"/><meta property="og:image" content="https://blog.zzzdaily.com/images/articles/trump-bans-gain-of-function.png"/><meta property="og:image:width" content="1200"/><meta property="og:image:height" content="630"/><meta property="og:image:alt" content="Исполнительный приказ Трампа запрещает исследование усиления функций"/><meta property="og:image:type" content="image/png"/><meta property="og:type" content="article"/><meta name="twitter:card" content="summary_large_image"/><meta name="twitter:site" content="@zzzdaily"/><meta name="twitter:creator" content="@zzzdaily"/><meta name="twitter:title" content="Исполнительный приказ Трампа запрещает исследование усиления функций"/><meta name="twitter:description" content="Президент Трамп подписывает исполнительный приказ, запрещающий исследование усиления функций, нацелен на программы биологического оружия, замаскированные подготовкой общественного здоровья в течение десятилетий."/><meta name="twitter:image" content="https://blog.zzzdaily.com/images/articles/trump-bans-gain-of-function.png"/><script>(function(){var t=localStorage.getItem('zzzdaily-blog-theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</sc отопа, Писание записывает, что земля была заполнена насилием и что воображение человеческого сердца было \"только зло непрерывно\". Еврейское слово для \"воображение\" — \u003cem\u003eyetser\u003c/em\u003e — относится к формирующейся цели позади творения, намерению, которое предшествует акту. Нечестивость, которая вызвала суд Божий, не была просто плохое поведение — оно было намеренным, систематическим и творческим. Человек использовал его дано-Богом способность для изобретения для конструирования инструментов разрушения.\u003c/p\u003e\n\u003cp\u003eКак раскрывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e, Книга Еноха записывает, что Наблюдатели — падшие ангелы, которые спустились на земля — учила человечество запретному знанию: создание оружия, смешивание веществ и манипуляция естественного порядка. Исследование усиления функций -- современное выражение этой древней передачи — намеренное улучшение патогенов для того чтобы сделать их более передаваемыми, более вирулентными и более летальными. Это оружение творения самого.\u003c/p\u003e\n\u003cp\u003eПрезидент Трамп подписал исполнительный приказ, запрещающий это исследование. Но вопрос, который Писание разновидности, есть ли определение человека нарушить границы Бога может быть содержано исполнительным указом — или является ли суд, который следует, уже в движении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-исследование-усиления-функций\"\u003eЧто такое исследование усиления функций?\u003c/h2\u003e\n\u003cp\u003eИсследование усиления функций (GOF) относится к научным экспериментам, которые намеренно изменяют организм — обычно вирус — для того чтобы дать ему новые или улучшенные способности. Эти способности включают увеличенную передачу между видами (особенно от животных к людям), улучшенную вирулентность (способность вызвать более тяжёлое заболевание), сопротивление существующим лечениям или вакцинам и способность избежать защиты иммунной системы.\u003c/p\u003e\n\u003cp\u003eЗаявленное оправдание для исследования GOF -- это \"подготовка к пандемии\". Сторонники утверждают, что инженеринг опасных патогенов в лаборатории, учёные могут изучить их заранее и разработать контрмеры прежде, чем пандемия возникает в природе. Логика является предварительной: создайте угрозу в управляемой окружающей среде, так чтобы вы могли подготовиться прежде, чем оно появляется в природе.\u003c/p\u003e\n\u003cp\u003eКритики — включая многих старших вирологов, экспертов безопасности биоматериалов и аналитиков национальной безопасности — утверждали, что исследование GOF создаёт точно угрозы, которые это утверждает предотвращать. Каждый патоген, инженерный в лаборатории, представляет потенциальную пандемию, ожидающую побега. И несчастьем лаборатории не гипотетические — они задокументированы и повторяющиеся.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон документировала в The Kingston Report (karenkingston.substack.com), что различие между \"оборонительным\" исследованием защиты биоматериалов и \"наступательным\" разработкой биологического оружия в основном семантическое. \"Когда вы инженер вирус чтобы быть более передаваемым и более летальным, вы создали биологическое оружие,\" Кингстон заявила. \"Факт что вы называете это 'подготовкой к пандемии' не изменяет что это есть. Продукт такой же. Опасность такая же. Только различие это ярлык.\"\u003c/p\u003e\n\u003ch3 id=\"связь-ухани\"\u003eСвязь Ухани\u003c/h3\u003e\n\u003cp\u003eНаиболее последовательное исследование усиления функций в современной истории было проведено в Институте вирусологии Уханя (WIV) в Ухане, Китае — город, где COVID-19 сначала появился в позднем 2019.\u003c/p\u003e\n\u003cp\u003eПрограмма исследования коронавируса WIV была финансирована отчасти U.S. Национальных институтов здоровья через гранты, направленные через Компанию EcoHealth Alliance, основанная в Нью-Йорке, возглавляемая Питером Дазаком. Между 2014 и 2019, EcoHealth Alliance получила приблизительно $3.75 миллиона в финансировании NIH, часть которого была субпередана WIV для исследования коронавируса, которое включало эксперименты усиления функций на летучемышиных коронавирусах.\u003c/p\u003e\n\u003cp\u003eДоктор Энтони Фаучи, как директор NIAID, наблюдал за подразделением NIH, которое финансировало EcoHealth Alliance. Когда вопросил под присягой перед Конгрессом о том, финансировал ли NIH исследование усиления функций в WIV, Фаучи первоначально отрицал это. Он позже признал финансирование, но оспорил характеристику исследования как усиления функций — семантическое различие, которое опиралось на узкое определение GOF, которое исключило тип экспериментов, фактически проведённых.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u003c/a\u003e документирует военные истории программ подготовки к пандемии и их соединение с исследованием защиты биоматериалов, которое мутит линию между защитой и оружением.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"исполнительный-приказ\"\u003eИсполнительный приказ\u003c/h2\u003e\n\u003cp\u003eИсполнительный приказ президента Трампа представляет наиболее масштабное федеральное действие против исследования усиления функций в U.S. истории. Приказ:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗапрещает все федерально финансируемые исследования усиления функций\u003c/strong\u003e — определено как исследование, которое увеличивает передаваемость, вирулентность или способность избежать иммунной системы патогенов с потенциалом пандемии. Это запрещение применяется ко всем федеральным учреждениям, включая NIH, NIAID, BARDA, DARPA и Министерство обороны.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗапрещает использование федеральных фондов для исследования GOF, проведённого иностранными учреждениями\u003c/strong\u003e — закрытие лазейки, которое позволило NIH финансировать исследование GOF в Институте вирусологии Уханя через промежуточные организации как EcoHealth Alliance.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТребует комплексный аудит\u003c/strong\u003e всех федерально финансируемых программ исследования, которые могут включать компоненты GOF, с результатами, которые будут доложены Конгрессу в пределах 180 дней.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУстанавливает уголовные наказания\u003c/strong\u003e для федеральных должностных лиц, которые одобрят, финансируют или упростят исследование GOF в нарушение приказа — значительное увеличение от предыдущей политики, которая опиралась на добровольное соответствие и институциональное самоотчётность.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОтзывает рамку 2017 P3CO\u003c/strong\u003e (Потенциальная пандемия патоген попечение и надзор), которая была предыдущей политикой, управляющей исследованием увеличенного патогена. Рамка P3CO была широко критикована как неадекватная, поскольку она опиралась на совет обзора без полномочий принуждения и позволили исключения для исследования, сочтённого, чтобы иметь \"допустимое\" соотношение риска-выгоды.\u003c/p\u003e\n\u003ch3 id=\"история-неудачных-мораториумов\"\u003eИстория неудачных мораториумов\u003c/h3\u003e\n\u003cp\u003eЭто не первая попытка ограничить исследование усиления функций. В октябре 2014, администрация Обамы наложила мораторий на федеральное финансирование исследования GOF, вовлекающего грипп, SARS и MERS вирусы. Мораторий был вызван серией инцидентов лаборатории — включая случайную отправку живых спорами от лаборатории DoD и открытие забытых образцов оспы в учреждении NIH.\u003c/p\u003e\n\u003cp\u003eОднако мораторий включал широкие исключения, и некоторое исследование GOF продолжилось в соответствии с \"grandfather\" положениями, которые позволили текущим экспериментам продолжиться. В декабре 2017, администрация Трампа первого срока подняла мораторий и заменила его рамкой P3CO — та же рамка теперь отозванная этим исполнительным приказом.\u003c/p\u003e\n\u003cp\u003eКингстон задокументировала, что во время 2014-2017 мораториума, исследование GOF продолжилось через множественные каналы: через положения исключения, через переклассификацию исследования, чтобы избежать определения GOF и через морской финансирование исследования в иностранных лабораториях — включая Институт вирусологии Уханя.\u003c/p\u003e\n\u003cp\u003e\"Мораторий был упражнением в связях с общественностью, не нормативным действием,\" Кингстон написала. \"Исследование никогда не прекращалось. Это было переименовано, переклассифицировано и перелокировано. Те же учёные, те же потоки финансирования, те же учреждения продолжили ту же работу под различными названиями. 2014 мораторий доказал, что добровольные ограничения на исследование усиления функций не работают.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"измерение-биологического-оружия\"\u003eИзмерение биологического оружия\u003c/h2\u003e\n\u003cp\u003eКонвенция биологического оружия (BWC), подписанная в 1972 и одобренная Соединёнными Штатами, запрещает разработку, производство и хранение биологического оружия. Однако BWC включает исключение для \"профилактических, защитных или других мирных целей\" — исключение, которое эффективно позволяет любому биологическому исследованию, которое может быть характеризовано как оборонительное.\u003c/p\u003e\n\u003cp\u003eЭто исключение было использовано в течение десятилетий. Соединённые Штаты поддерживает обширную инфраструктуру исследования защиты биоматериалов — охватывающую Fort Detrick (Институт научных исследований инфекционных заболеваний медицины армии U.S.), CDC, DARPA, BARDA и десятки университетских и приватных лабораторий — которая проводит исследование на опасных патогенах в aegis \"оборонительной подготовки\".\u003c/p\u003e\n\u003cp\u003eЛиния между оборонительным и наступательным биологическим исследованием, в практике, не-экзистентна. Инженерирование более передаваемого вируса, чтобы изучить её функционально идентична инженерирование более передаваемого вируса, чтобы оружие это. Патоген не знает намерение его создателя. Это не ведет себя по-другому, потому что лаборатория, которая создала её, подала исследование в соответствии с \"подготовкой к пандемии\", чем в соответствии с \"разработкой биологического оружия\".\u003c/p\u003e\n\u003cp\u003eКингстон соединила эту институциональную реальность к более широкому паттерну сговора правительства-фармацевтического: \"Учреждение защиты биоматериалов и фармацевтическая промышленность — две стороны той же монеты. Лаборатории защиты биоматериалов создают угрозы. Фармацевтические компании продают контрмеры. Оба финансируются тем же правительством, штатом той же вращающейся персонала и защищены тем же правовыми рамками. Это не общественное здоровье. Это промышленность — промышленность, которая прибыль от создания и управления биологическими угрозами.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"духовное-измерение-запретное-знание\"\u003eДуховное измерение: запретное знание\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И повелел Господь Бог человеку, говоря: от всякого дерева в саду ты будешь есть, а от дерева познания добра и зла не ешь, ибо в день, в который ты вкусишь от него, смертью умрёшь.\" — Бытие 2:16-17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЗапрещение древа знания не было произвольным. Это была граница — ограничение, помещённое на человеческое честолюбие Творцом, кто понял что произойдёт, когда существа, сделанные в Его образе, получили доступ к знанию они не были спроектированы, чтобы ответственно применить.\u003c/p\u003e\n\u003cp\u003eИсследование усиления функций -- древо знания в лаборатории биобезопасности уровня 4. Это приобретение знания, которое несёт в его пределах семена смерти — знание, которое, однажды полученное, не может быть un-получено и которое помещает в человеческие руки власть разрушить не только индивидов или нации, но вид самого.\u003c/p\u003e\n\u003cp\u003eИсполнительный приказ, запрещающий исследование GOF, попытка перестроить ограду вокруг дерева. Но Писание учит, что ограда была нарушена в Эдеме и каждое поколение с тех пор преследовал новые способы достичь запретный фрукт.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/155-Cyber_Polygon_Prophecy.mp4\"\u003eCyber Polygon Prophecy\u003c/a\u003e документирует паттерн смоделированных катастроф, которые предшествуют реальным — паттерн, который расширяется от моделирования пандемии к моделированию кибератак, каждый один репетирующий следующий кризис, который будет использован, чтобы оправдать расширенный авторитет правительства и контроль населения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-сэмюэля-8\"\u003eПредупреждение 1 Сэмюэля 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всём, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Сэмюэля 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Сэмюэля 8 отзывается через каждый коридор правительства сегодня. Когда Израиль потребовал царя, как другие нации, Бог предупредил их точно что произойдёт — их сыновья взяты для войны, их дочери для услуги, их поля и виноградники захвачены, десятая часть всего конфискована. Они выбрали человеческое правительство над реймом Бога, и тирания последовала точно, как обещано. Ничего не изменилось. Современная политическая система две крылья того же птицы — левый и правый, республиканец и демократ — все служащие той же скрытой степени структуры мощности. Голосование для одной стороны выбирающие, какое крыло хлопает далее, тогда как птица летит в том же направлении. Реальная мощь никогда не была на каком-нибудь бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eИсполнительный приказ на запрещение исследования усиления функций — WhiteHouse.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Документация Карен Кингстон исследования GOF финансирования, соединения WIV, анализ индустрии защиты биоматериалов и критика нормативной рамки\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eПроследитель гранта NIH — финансирование EcoHealth Alliance в Институт вирусологии Уханя\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eКонвенция биологического оружия (1972) — Управление дезармирования Объединённых наций\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eРамка P3CO — архивы HHS.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eБытие 2:16-17, Бытие 6:5 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Сэмюэля 8 — Предупреждение против земных королей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство близости к смерти Ховарда Питтмана — предупреждение о конце времён\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u
