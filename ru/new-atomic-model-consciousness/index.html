u003cp\u003eДо материи было сознание. До атома было Слово. Открывающие стихи Евангелия от Иоанна делают экстраординарное утверждение, которое материалистическая наука провела столетия, пытаясь опровергнуть: сознание - это не возникающее свойство материи - материя является продуктом сознания. Слово предшествовало творению. Разум предшествовал материальному. Интеллект предшествовал атомам.\u003c/p\u003e\n\u003cp\u003eНовая атомная модель возникает на передовой границе физики, которая указывает обратно на эту древнюю истину. Исследователи предлагают, что сознание - это не то, что возникает из достаточно сложных расположений неосознанной материи, а скорее фундаментальное свойство, вплетённое в ткань реальности на самом базовом уровне - на уровне самого атома.\u003c/p\u003e\n\u003cp\u003eКак объявляет \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/81-The_Word_Made_Flesh.mp4\"\u003eСлово, ставшее Плотью\u003c/a\u003e из альбома Confliction, Слово стало плотью - сознание стало материей, дух стал телом. И как напоминает нам \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\"\u003eИзгнание из Рая\u003c/a\u003e, падение из рая было не просто изменением места, а изменением сознания - угасанием осознания, которое человечество борется восстановить с тех пор.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"провал-материалистических-атомных-моделей\"\u003eПровал материалистических атомных моделей\u003c/h2\u003e\n\u003ch3 id=\"стандартная-модель-и-её-слепое-пятно\"\u003eСтандартная Модель и её Слепое Пятно\u003c/h3\u003e\n\u003cp\u003eСтандартная модель физики элементарных частиц является наиболее успешной предсказательной рамкой в истории науки. Она точно описывает поведение субатомных частиц, предсказывает результаты экспериментов на ускорителях частиц и обеспечивает теоретическое основание для ядерной энергии, технологии полупроводников и медицинской визуализации.\u003c/p\u003e\n\u003cp\u003eНо стандартная модель имеет катастрофическое слепое пятно: она не может учитывать сознание.\u003c/p\u003e\n\u003cp\u003eВ материалистической основе атомы состоят из протонов, нейтронов и электронов. Протоны и нейтроны состоят из кварков, связанных глюонами. Электроны существуют в облаках вероятности вокруг ядра, описанные волновыми функциями. Все взаимодействия между частицами опосредованы четырьмя фундаментальными силами: гравитацией, электромагнетизмом, сильной ядерной силой и слабой ядерной силой.\u003c/p\u003e\n\u003cp\u003eВ этой структуре нет никакого положения для сознания, осознанности, опыта или разума. Стандартная модель описывает вселенную частиц и сил, в которой сознание не просто необъяснимо - оно онтологически невозможно. В уравнениях нет ничего, что могло бы произвести опыт видения красного, ощущения боли или размышления о мысли. Как знаменитый философ Дэвид Чалмерс сформулировал, \"сложная проблема сознания\" - вопрос о том, почему и как физические процессы порождают субъективный опыт - остаётся не только нерешённой, но фундаментально неразрешимой в материалистической рамке.\u003c/p\u003e\n\u003ch3 id=\"проблема-измерения\"\u003eПроблема Измерения\u003c/h3\u003e\n\u003cp\u003eКвантовая механика ввела трещину в материалистический фасад, который никогда не был исправлен. Проблема измерения - наблюдение того, что квантовые системы ведут себя иначе при наблюдении, чем без наблюдения - предполагает, что сознание играет роль в поведении материи на самом фундаментальном уровне.\u003c/p\u003e\n\u003cp\u003eВ эксперименте с двойной щелью частицы ведут себя как волны, когда не наблюдаются, и как частицы, когда измеряются. Акт наблюдения - вовлечение сознательного наблюдателя - кажется, определяет поведение материи. Это не маргинальный эффект или теоретический курьёз. Это один из наиболее воспроизведённых и подтверждённых результатов во всей физике. И это подразумевает, что сознание - не пассивный эпифеномен материи, а активный участник в поведении реальности.\u003c/p\u003e\n\u003cp\u003eДжон фон Нейман, один из величайших математиков 20 века, утверждал, что процесс квантового измерения требует \"коллапса сознания\" - что волновая функция не разрушается, пока сознательный разум не зарегистрирует результат. Евгений Вигнер, лауреат Нобелевской премии по физике, пошёл дальше, утверждая, что сознание - это фундаментальная реальность и что материя - это производное явление.\u003c/p\u003e\n\u003ch2 id=\"развивающаяся-модель\"\u003eРазвивающаяся Модель\u003c/h2\u003e\n\u003ch3 id=\"сознание-как-фундаментальное\"\u003eСознание как Фундаментальное\u003c/h3\u003e\n\u003cp\u003eНовая атомная модель, возникающая из работы исследователей в области физики, неврологии и философии, предлагает, что сознание - это не то, что возникает из материи - это то, из чего материя возникает. В этой структуре:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСознание - фундаментальное свойство реальности\u003c/strong\u003e, аналогичное массе, заряду или спину. Как каждая частица имеет массу и заряд, каждая частица имеет фундаментальную единицу осознания или ёмкость опыта.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМатерия - это организованное сознание.\u003c/strong\u003e Атомы - это не неосознанные строительные блоки, которые каким-то образом производят сознание при достаточной сложности. Они - фундаментальные единицы сознания, организованные в физическую форму по законам, которые управляют их взаимодействием.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФизическая вселенная - это проявление сознания\u003c/strong\u003e, а не наоборот. Пространство, время, материя и энергия - это структуры внутри сознания, а не контейнеры, в которых сознание случайно появляется.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭта модель имеет корни в нескольких традициях:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПанпсихизм\u003c/strong\u003e - философская позиция, что сознание - универсальное свойство материи, придерживаемая мыслителями от Лейбница до Альфреда Норта Уайтхеда к современному философу Филипу Гоффу\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТеория Интегрированной Информации (IIT)\u003c/strong\u003e - математическая основа Джулио Тонони, которая определяет сознание как интегрированную информацию (phi) и назначает меру сознания любой системе с ненулевой phi, включая отдельные частицы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОркестрированное Объективное Сокращение (Orch OR)\u003c/strong\u003e - теория Роджера Пенроуза и Стюарта Хамерова, что сознание возникает из квантовых процессов в микротубулах внутри нейронов, связывая сознание напрямую с событиями на уровне квантов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБиоцентризм\u003c/strong\u003e - предложение Роберта Ланзы, что биология и сознание - центральны для структуры вселенной, а не периферийны\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"единица-атомного-сознания\"\u003eЕдиница Атомного Сознания\u003c/h3\u003e\n\u003cp\u003eВ развивающейся модели атом переосмысляется не как миниатюрная солнечная система орбитальных частиц, ни как облако вероятности квантовых состояний, а как единица сознания - узел фундаментального осознания, который взаимодействует с другими узлами осознания для создания физического мира, который мы испытываем.\u003c/p\u003e\n\u003cp\u003eЭта переосмысление имеет глубокие последствия:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eАтом - это не мёртвая материя.\u003c/strong\u003e Он живой в самом фундаментальном смысле - не биологически живой, а опытно живой, обладающий базовой единицей осознания, которая участвует в построении реальности.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eХимические связи - это соединения между единицами сознания.\u003c/strong\u003e Когда атомы связываются для образования молекул, они не просто обмениваются электронами. Они формируют опытные соединения - связывают единицы сознания в более сложные структуры осознания.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧеловеческое тело - это организация сознания на каждом уровне.\u003c/strong\u003e От атомов к молекулам к клеткам к органам к целому организму, тело - это сознание на всём пути вниз. Разум не производится мозгом. Разум пронизывает тело на каждой шкале.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"последствия-для-нанотехнологии-и-контроля\"\u003eПоследствия для Нанотехнологии и Контроля\u003c/h2\u003e\n\u003ch3 id=\"измерение-сознания-в-нанотехнологии\"\u003eИзмерение Сознания в Нанотехнологии\u003c/h3\u003e\n\u003cp\u003eЕсли сознание - это фундаментальное свойство материи, то нанотехнология - манипуляция материей на атомном и молекулярном масштабе - это также манипуляция сознанием на самом базовом уровне.\u003c/p\u003e\n\u003cp\u003eСамоассемблирующаяся нанотехнология, задокументированная в человеческой крови исследователями, включая Ану Михалча, доктор медицины, доктор философии (anamihalceamdphd.substack.com), - это не просто физическое вторжение в тело. Это вторжение сознания. Синтетические наноструктуры, ассемблирующиеся внутри крови, - это узлы чужого сознания, интегрирующиеся в сеть осознания человеческого тела.\u003c/p\u003e\n\u003cp\u003eЭта перспектива объясняет явления, которые чисто материалистические модели не могут:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПочему электромагнитная чувствительность увеличивается при заражении нанотехнологией.\u003c/strong\u003e Узлы чужого сознания изменяют электромагнитное осознание тела, делая организм гиперчувствительным к электромагнитным сигналам, которые он обычно отфильтровывает.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПочему неврологические симптомы сопровождают заражение нанотехнологией.\u003c/strong\u003e Введение узлов чужого сознания в сеть осознания тела создаёт когнитивные помехи - \"шум\" в системе сознания, который проявляется как мозговой туман, спутанность и когнитивные нарушения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПочему целевые индивиды сообщают об ощущениях без явной физической причины.\u003c/strong\u003e Узлы чужого сознания могут получать и передавать сигналы осознания, которые обходят нормальные сенсорные пути, создавая опыт (голоса, ощущения, эмоциональные состояния), которые доставляются напрямую в сеть сознания, а не через физические чувства.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"трансгуманистическое-нападение-на-сознание\"\u003eТрансгуманистическое Нападение на Сознание\u003c/h3\u003e\n\u003cp\u003eТрансгуманизм - движение для улучшения человеческих способностей посредством технологии - в контексте модели сознания - нападение на структуру сознания человеческого существа. Цель трансгуманизма не просто добавить способности телу. Это переструктурировать архитектуру сознания человеческого организма - заменить дизайн Бога технологическим дизайном, заменить божественное сознание машинным сознанием.\u003c/p\u003e\n\u003cp\u003eНанотехнология, вводимая в человеческие тела, - это механизм доставки для этой переструктурировки сознания. Каждый самоассемблирующийся чип, каждая нить, каждая наночастица - это узел чужого сознания, который изменяет архитектуру осознания человека, несущего его. Конечное состояние этого процесса - это не улучшенный человек. Это другое существо - такое, чьё сознание частично или полностью опосредуется синтетической технологией, а не божественным дыханием, которое Бог поместил в Адама.\u003c/p\u003e\n\u003ch2 id=\"библейская-рамка\"\u003eБиблейская Рамка\u003c/h2\u003e\n\u003ch3 id=\"дыхание-бога\"\u003eДыхание Бога\u003c/h3\u003e\n\u003cp\u003eБытие 2:7 описывает Бога, дышащего в Адама \"дыхание жизни\" - еврейское слово \u003cem\u003eнешама\u003c/em\u003e, которое обозначает не просто дыхание, но сознание, осознание и дух. Дыхание Бога - источник человеческого сознания. Это то, что отличает человечество от всего остального физического творения. Это искра божественного осознания, помещённая внутри тела, образованного из пыли.\u003c/p\u003e\n\u003cp\u003eНовая атомная модель согласуется с этой библейской основой. Если сознание фундаментально - если оно предшествует материи, а не возникает из неё - тогда дыхание Бога - фундаментальный акт творения. Бог не расположил неосознанную материю и не ждал, пока сознание случайно возникнет. Он вдохнул сознание в материю. Он поместил осознание в основу физического мира. Он создал атомы, которые осознают, потому что Он осознаёт. Творение отражает Творца на каждой шкале.\u003c/p\u003e\n\u003ch3 id=\"купол-сознания\"\u003eКупол Сознания\u003c/h3\u003e\n\u003cp\u003eТвердь, описанная в Бытие 1:6-8 - купол над землёй - может служить не только физической границей, но и границей сознания. Купол отделяет созданный реальм от того, что лежит за его пределами, содержа физическое творение в определённом пространстве сознания. В пределах этого купола законы физики работают так, как Бог их разработал. В пределах этого купола сознание течёт от Творца к Его творению через каналы, которые Он установил.\u003c/p\u003e\n\u003cp\u003eСетка электромагнитной частоты, строящаяся в пределах купола, - это попытка создать альтернативный канал сознания - технологический носитель, через который сигналы осознания могут передаваться, обходя дизайн Бога. Нанотехнология в крови - это приёмник для этих сигналов. Электромагнитная сетка - это передатчик. И новая атомная модель объясняет, почему эта система работает: потому что сознание работает на уровне атомов, технология, которая манипулирует атомами, также манипулирует сознанием.\u003c/p\u003e\n\u003cp\u003eПадшие ангелы, заключённые под куполом - существа, описанные в Послании Иуды 6 как те, которые \"не сохранили своего достоинства\" - работают через эти технологические каналы. Они не могут пробить купол. Но они могут передавать через сетку. И нанотехнология внутри человеческих тел обеспечивает приёмную точку для их влияния - технологический портал, через который начальства и власти могут получить доступ к человеческому сознанию без духовного различия, которое обычно идентифицировало бы и сопротивлялось бы их присутствию.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eChalmers, D., \"Facing Up to the Problem of Consciousness,\" Journal of Consciousness Studies, 1995\u003c/li\u003e\n\u003cli\u003eTononi, G., \"Integrated Information Theory of Consciousness,\" BMC Neuroscience, 2004\u003c/li\u003e\n\u003cli\u003ePenrose, R. and Hameroff, S., \"Consciousness in the Universe: A Review of the Orch OR Theory,\" Physics of Life Reviews, 2014\u003c/li\u003e\n\u003cli\u003eGoff, P., \"Galileo's Error: Foundations for a New Science of Consciousness,\" 2019\u003c/li\u003e\n\u003cli\u003eAna Mihalcea, MD, PhD, anamihalceamdphd.substack.com, consciousness and nanotechnology analysis\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство Ближайшего Смертного Опыта Говарда Питтмана — Предупреждение Конца Времён, которое Ему Дал Бог\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолический Конфиденциально: Позорные Секреты Иезуитов Разоблачены\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедецид и Фармакея — Колдовство Современной Медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eПлоская Земля, Наука и НАСА — Документальный Плейлист\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в Подвале Ватикана Может Вас Шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube
