Это центральная идея романа Л. Фрэнка Баума 1900 года и его культовой экранизации 1939 года — идея столь подрывная, столь откровенная, столь опасная для властной структуры, что её пришлось замаскировать под детскую сказку. Волшебник Страны Оз — это не волшебная сказка. Это чертёж для понимания того, как на самом деле работает мир: через страх, иллюзию и систематическое подавление врождённой силы человека.\u003c/p\u003e\n\u003cp\u003eХауард Питтман во время своего околосмертного опыта видел за занавесом духовного царства. Три небеса. Демоническая иерархия во втором. 97,5% христиан отвергнуто — они \"никогда не делали Меня Господом\". Питтман видел человека за занавесом: обширную, организованную систему обмана, работающую через страх, иерархию и иллюзию подавляющей мощи. Волшебник Страны Оз описывает эту же систему в аллегорических терминах.\u003c/p\u003e\n\u003cp\u003eИезуиты — это волшебники реального мира. Военная организация Лойолы, обладающая \"абсолютной мощью\" Наполеона. \"Вечное проклятие\" Адамса. Тамбурини, управляющий \"всем миром\" из-за занавеса — буквально, из одной комнаты. Климент XIV был отравлен, когда отодвинул занавес. \u003cem\u003eCatholic Confidential\u003c/em\u003e раскрывает метод: инфильтрация \"скрытая хитростью\", слепое повиновение, \"всякого рода порок\". Иезуиты действуют точно так же, как волшебник: проецируют устрашающую мощь, скрывая свою истинную природу за занавесом институциональной власти.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eЛожь обманщика — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПроклятие Змея — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"жёлтая-кирпичная-дорога-путь-золота\"\u003eЖёлтая кирпичная дорога: путь золота\u003c/h2\u003e\n\u003ch3 id=\"следуя-за-деньгами\"\u003eСледуя за деньгами\u003c/h3\u003e\n\u003cp\u003eДороти говорят следовать по Жёлтой кирпичной дороге, чтобы достичь Изумрудного города. Жёлтые кирпичи — это золотые кирпичи. Дорога к власти в реальном мире вымощена золотом — деньгами, финансами, контролем над валютой. Л. Фрэнк Баум написал \u003cem\u003eЧудесного волшебника Страны Оз\u003c/em\u003e в период интенсивных дебатов о золотом стандарте в Америке, и многие учёные интерпретировали историю как монетарную аллегорию.\u003c/p\u003e\n\u003cp\u003eИзумрудный город зелёный — цвет денег, цвет банкноты Федерального резерва. Чтобы войти, посетители должны надеть зелёные очки, которые заставляют всё казаться изумрудного цвета. Это наиболее мощная метафора в истории: иллюзия ценности поддерживается, заставляя всех смотреть на мир через один и тот же объектив. Снимите очки — и город становится обычным. Уберите программирование — и финансовая система раскрывается как мошенничество.\u003c/p\u003e\n\u003cp\u003eСвязь иезуитов с глобальными финансами глубока. Банковские семьи, создавшие систему Федерального резерва, имеют документированные связи с сетями иезуитского образования. Финансовая система — которая держит население в долговом рабстве через ипотеки (договоры о смерти), кредитные карты и студенческие кредиты — это Жёлтая кирпичная дорога. Она обещает освобождение. Она доставляет к городу волшебника.\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует на Substack (agent131711.substack.com), как финансовая система функционирует как механизм контроля, извлекая труд из населения, одновременно направляя богатство в учреждения, управляющие системой. Жёлтая кирпичная дорога не ведёт к свободе. Она ведёт к волшебнику — а волшебник — обманщик.\u003c/p\u003e\n\u003ch3 id=\"серебряные-туфли\"\u003eСеребряные туфли\u003c/h3\u003e\n\u003cp\u003eВ оригинальном романе Баума туфли Дороти серебристые, а не рубиновые. Это важно в монетарной аллегории: золото и серебро были двумя металлами в центре дискуссии о валюте. Серебряные туфли — представляющие серебряный стандарт, деньги народа — имели силу доставить Дороти домой в любой момент. Но она этого не знала.\u003c/p\u003e\n\u003cp\u003eЭто центральное откровение: у вас уже есть сила. Система — волшебник, иезуиты, финансовая архитектура, институциональная церковь — зависит от того, что вы этого не знаете. Пока вы следуете Жёлтой кирпичной дороге, ища спасения от волшебника, вы остаётесь под контролем. В момент, когда вы посмотрите вниз на свои собственные ноги, чара будет сломана.\u003c/p\u003e\n\u003ch2 id=\"четыре-спутника-что-отнимает-система\"\u003eЧетыре спутника: что отнимает система\u003c/h2\u003e\n\u003ch3 id=\"пугало-разум\"\u003eПугало: разум\u003c/h3\u003e\n\u003cp\u003eПугало верит, что у него нет мозга. Он ищет интеллект у волшебника. Но на протяжении всего путешествия Пугало — самый разумный член группы — решает проблемы, придумывает планы, мыслит творчески. У него всегда был мозг. Он просто в это не верил.\u003c/p\u003e\n\u003cp\u003eСистема образования — разработанная в значительной степени иезуитами через их \u003cem\u003eRatio Studiorum\u003c/em\u003e — производит Пугал. Она учит людей верить, что они не могут думать без учётных данных, без степеней, без институциональной валидации. Академическая шапочка (куб Сатурна, как обсуждалось в части 4 серии о Сатурне) венчает выпускника как официального мыслителя — подразумевая, что до выпуска мышление было неавторизировано.\u003c/p\u003e\n\u003cp\u003eОпыт Хауарда Питтмана раскрывает, что духовный разбор — высшая форма интеллекта — не требует институционального диплома. 97,5% отвергнутых прошли через систему. У них были дипломы, доктрины, деноминационные принадлежности. Ничего из этого не имело значения. Имело значение, могли ли они думать самостоятельно — могли ли они различать истину от институционального фабрикования, которое их окружало.\u003c/p\u003e\n\u003ch3 id=\"жестяной-дровосек-сердце\"\u003eЖестяной дровосек: сердце\u003c/h3\u003e\n\u003cp\u003eЖестяной дровосек верит, что у него нет сердца. Он ищет эмоции у волшебника. Но на протяжении всего путешествия Жестяной дровосек — самый сострадательный член группы — плачет о раздавленных жуках, скорбит о поваленных деревьях, глубоко заботится о своих спутниках. У него всегда было сердце.\u003c/p\u003e\n\u003cp\u003eИндустриальная система — кабинка, фабрика, корпоративная иерархия — производит Жестяных дровосеков. Она лишает людей эмоциональной связи, сводя их к функциональным единицам в продуктивной машине. Иезуиты, с их акцентом на институциональное повиновение над личным чувством, создали шаблон для этого бесчеловечия. Орден требует, чтобы члены подавляли личные эмоции в пользу институциональной верности — слепое повиновение, которое преодолевает сердце.\u003c/p\u003e\n\u003ch3 id=\"трусливый-лев-мужество\"\u003eТрусливый лев: мужество\u003c/h3\u003e\n\u003cp\u003eЛев верит, что у него нет мужества. Он ищет смелость у волшебника. Но на протяжении всего путешествия Лев встречает каждую опасность, защищает своих спутников и настойчив несмотря на его страх. У него всегда было мужество.\u003c/p\u003e\n\u003cp\u003eСистема страха — терроризм, пандемия, экономический крах, климатическая катастрофа, вечное проклятие — производит Трусливых львов. Она убеждает население, что оно не может встретить мир без защиты учреждения. Правительство, военные, церковь, корпорация — все они представляют себя как необходимые щиты против ужасного мира. Без них вы беспомощны. С ними вы безопасны. Это иллюзия Льва.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eCatholic Confidential\u003c/em\u003e раскрывает, как иезуиты используют страх намеренно: страх перед адом, страх перед отлучением от церкви, страх перед социальным остракизмом. Эти страхи — не естественные. Они фабрикованы — инструменты контроля, разработанные, чтобы держать население в зависимости от учреждения.\u003c/p\u003e\n\u003ch3 id=\"дороти-душа\"\u003eДороти: душа\u003c/h3\u003e\n\u003cp\u003eДороти хочет идти домой. Она верит, что волшебник может её туда доставить. Но волшебник не может. Только Дороти может доставить себя домой, используя силу, которой она уже обладает — серебряные туфли на её собственных ногах.\u003c/p\u003e\n\u003cp\u003eДороти олицетворяет человеческую душу, пойманную в Оз (материальный мир), ищущую освобождения от внешней власти (волшебник/учреждение/система Сатурна). Её путешествие учит её, что сила всегда была в ней — что ей никогда не нужны были волшебник, дорога или Изумрудный город. Ей нужно было только признать свою собственную способность и действовать на её основе.\u003c/p\u003e\n\u003cp\u003eЭто послание, которое иезуиты, тайные общества и система Сатурна не могут терпеть. Если люди поймут, что они уже обладают всем, что им нужно — что никакое учреждение, никакой обряд, никакая иерархия не нужны для духовного освобождения — вся система контроля рухнет. Волшебник будет разоблачен как маленький человечек за занавесом. Изумрудный город потеряет свой зелёный оттенок. И население щёлкнет каблуками и пойдёт домой.\u003c/p\u003e\n\u003ch2 id=\"ведьма-машина-страха\"\u003eВедьма: машина страха\u003c/h2\u003e\n\u003ch3 id=\"злая-ведьма-запада\"\u003eЗлая ведьма Запада\u003c/h3\u003e\n\u003cp\u003eВедьма олицетворяет сам страх — оружие, которое власть использует для поддержания контроля. Она командует летающими обезьянами (агентами наблюдения), контролирует армию (военную силу) и терроризирует землю из своего замка (учреждение). Её сила кажется подавляющей.\u003c/p\u003e\n\u003cp\u003eНо её слабость — вода. Она тает, когда Дороти бросает на неё воду. Вода в писаниях олицетворяет истину, очищение, слово Божье. Машина страха, какой бы ужасной она ни казалась, растворяется, когда применяется истина. Иезуиты боятся истину больше, чем любое другое оружие. Вся их операция — инфильтрация, хитрость, слепое повиновение, порок — существует, потому что истина её уничтожит.\u003c/p\u003e\n\u003cp\u003eХауард Питтман узнал, что демоническая иерархия работает через страх. Демоны, которых он видел во втором небе, использовали страх как основной инструмент — страх смерти, страх потери, страх неизвестного. Но Питтман также узнал, что эти демоны не имеют власти над теми, кто стоит в истине. Ведьма тает. Демоны бегут. Волшебник разоблачён.\u003c/p\u003e\n\u003ch3 id=\"торнадо-великий-перезагрузка\"\u003eТорнадо: великий перезагрузка\u003c/h3\u003e\n\u003cp\u003eДороти приезжает в Оз через торнадо — насильственное нарушение, которое отрывает её от нормальной жизни и сбрасывает в странную, контролируемую среду. Это параллельно великим потрясениям — войны, пандемии, экономические крахи — которые власть организует для переформатирования общества.\u003c/p\u003e\n\u003cp\u003eТорнадо — не случайность. Это инструмент. Каждая великая перезагрузка — каждая революция, каждый ответ на пандемию, каждое экономическое переструктурирование — служит, чтобы отреобать население от его корней и сбросить его в новую среду, где правила другие и сила волшебника кажется необходимой. Иезуиты организуют эти перезагрузки веками, от Тридцатилетней войны до Французской революции до событий, которые формируют наш настоящий момент.\u003c/p\u003e\n\u003ch2 id=\"человек-за-занавесом\"\u003eЧеловек за занавесом\u003c/h2\u003e\n\u003ch3 id=\"раскрытие-и-его-последствия\"\u003eРаскрытие и его последствия\u003c/h3\u003e\n\u003cp\u003eКогда Тото отодвигает занавес, волшебник раскрывается как обычный человек, управляющий сложной машиной иллюзии. Его сила никогда не была реальной. Она была спроецирована — усилена технологией, поддерживаема страхом и зависима от того, чтобы никто не смотрел слишком внимательно.\u003c/p\u003e\n\u003cp\u003eЭто реальность каждого учреждения, претендующего на сверхъестественную власть: Ватикан, тайные общества, разведывательные агентства, финансовая система. За занавесом находятся люди — обычные, ошибочные, смертные люди — управляющие машинами иллюзии. Власть иезуитов не сверхъестественна. Она организационна, финансова и психологична. Она впечатляет, но она не божественна. И как сила волшебника, она испаряется в момент, когда достаточно много людей видят сквозь неё.\u003c/p\u003e\n\u003cp\u003eРабота Agent131711 на Substack посвящена отодвиганию занавеса в сторону — раскрытию обычных людей за необычными иллюзиями. Каждая статья, каждое расследование, каждая задокументированная связь между видимым и скрытым — это потягивание за занавес. И каждый человек, который читает, понимает и делится этой информацией — ещё один Тото, отодвигающий занавес немного дальше.\u003c/p\u003e\n\u003ch2 id=\"сила-которая-у-вас-уже-есть\"\u003eСила, которая у вас уже есть\u003c/h2\u003e\n\u003ch3 id=\"щёлкая-каблуками\"\u003eЩёлкая каблуками\u003c/h3\u003e\n\u003cp\u003eВолшебник Страны Оз заканчивается откровением: Дороти всегда имела силу идти домой. Ей нужно было только щёлкнуть каблуками три раза и произнести слова. Сила была в ней всегда.\u003c/p\u003e\n\u003cp\u003eЭто не просто литературный приём. Это духовная истина. Сила разорвать оковы системы Сатурна, иезуитской матрицы, финансовой тюрьмы, машины страха — эта сила живёт в каждом человеке. Это сила истины, разбора и отказа участвовать в иллюзиях.\u003c/p\u003e\n\u003cp\u003eЕфесянам 6:12 описывает битву: не против плоти и крови, но против начальств и властей. Оружие — духовное — истина, вера, слово Божье. Не институциональное слово. Не иезуитское слово. Живое слово, которое существует вне учреждений, вне текстов, вне занавеса человеческой власти.\u003c/p\u003e\n\u003cp\u003eХауард Питтман вернулся с той стороны с простым сообщением: просыпайтесь. Перестаньте служить себе. Перестаньте доверять волшебнику. Щёлкните каблуками. Идите домой.\u003c/p\u003e\n\u003cp\u003e97,5% никогда не щёлкали. Они остались в Оз, следуя Жёлтой кирпичной дороге, нося зелёные очки, верив обещаниям волшебника. Не делайте их ошибку. Сила — ваша. Она всегда была.\u003c/p\u003e\n\u
