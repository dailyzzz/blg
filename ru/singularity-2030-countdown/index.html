 равнинах Синара, человечество объединилось вокруг одного стремления: построить структуру настолько высокую, что она пробьет небеса, делая их равными с Богом. У них было один язык, одна цель и одна технология — кирпич и раствор, обожженные в печи коллективной воли. Бог смотрел вниз на их проект и объявил что-то леденящее: \"Если как одного народа со своим языком они начали делать это, тогда ничто, что они планируют делать, не будет им невозможно\" (Бытие 11:6).\u003c/p\u003e\n\u003cp\u003eБог не сказал, что они потерпят неудачу. Он сказал, что они преуспеют. И это была проблема.\u003c/p\u003e\n\u003cp\u003eВавилонская башня была первым проектом сингулярности человечества — единым усилием превзойти человеческие ограничения и достичь небес через коллективную технологию. Бог разогнал их, сломал их язык и разобрал проект не потому что он был невозможен, но потому что он был \u003cem\u003eдостижимым\u003c/em\u003e. Человечество, оставленное без контроля в унифицированном технологическом стремлении, развалилось бы в попытке стать Богом.\u003c/p\u003e\n\u003cp\u003eСегодня башня перестраивается. Кирпичи — это кремний. Раствор — это код. Унифицированный язык — это математика и машинное обучение. И стремление не изменилось ни на один градус: превзойти человеческие ограничения, слиться с машиной, стать чем-то большим, чем то, что создал Бог. Сингулярность — это Вавилон, перестроенный — и на этот раз строители верят, что остался некто, чтобы их рассеять.\u003c/p\u003e\n\u003cp\u003eКак альбом Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\"\u003eCast Out of Paradise\u003c/a\u003e повествует, первоначальное преступление было не просто непослушание — это было стремление к самому божеству. Адам и Ева не были довольны ходить с Богом; они хотели \u003cem\u003eбыть\u003c/em\u003e Богом. Это прим хранилось голод эхо через каждое поколение, и в Сингулярности он находит наиболее сложное и опасное выражение. \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e был не один раз событие. Это повторяющийся паттерн — и технологическая сингулярность — это его последняя итерация.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-технологическая-сингулярность\"\u003eЧто такое технологическая сингулярность?\u003c/h2\u003e\n\u003cp\u003eТехнологическая сингулярность — это теоретический момент, когда искусственный интеллект превосходит человеческий интеллект в каждой измеримой области — не просто вычисление или обработка данных, но творчество, эмоциональное рассуждение, стратегическое мышление, научное открытие и самосовершенствование. После этой точки ИИ был бы способен к рекурсивному самосовершенствованию, каждой итерации делает его экспоненциально умнее, создавая взрыв интеллекта, который оставляет человеческое познание позади тем же способом, что человеческое познание оставило шимпанзе позади.\u003c/p\u003e\n\u003cp\u003eТермин был популяризирован математиком и автором научной фантастики Вернором Виндже в его эссе 1993 года \"The Coming Technological Singularity,\" но это был Рей Курцвейл — изобретатель, футуролог и теперь главный исследователь и ИИ-визионер в Google — который трансформировал его из академической спекуляции в квазирелигиозное пророчество с прикрепленной датой.\u003c/p\u003e\n\u003ch3 id=\"предсказания-курцвейла\"\u003eПредсказания Курцвейла\u003c/h3\u003e\n\u003cp\u003eВ своей книге 2005 года \u003cem\u003eThe Singularity Is Near\u003c/em\u003e, Курцвейл установил подробный график:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eК 2029:\u003c/strong\u003e Компьютер пройдет тест Тьюринга, демонстрируя интеллект человеческого уровня неотличимый от человека в разговоре и рассуждении.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eК 2030:\u003c/strong\u003e Искусственный общий интеллект (AGI) будет достигнут — машины, которые могут выполнить любую интеллектуальную задачу человека.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eК 2045:\u003c/strong\u003e Полная сингулярность приходит — люди сливаются с ИИ через интерфейсы мозг-компьютер, эффективно заканчивая биологическое человечество, как мы его знаем и давая рождение новому постчеловеческому виду.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТо, что делает прогнозы Курцвейла тревожными — это не их дерзость, но их способность отслеживания. По его собственному учету, примерно 86% его 147 предсказаний, сделанных в 1990-х годах, оказались истинными или по существу истинными. Он предсказал восхождение интернета как доминирующего коммуникационного среды, поражение чемпиона мира по шахматам компьютером, распространение портативных компьютеров, появление автономной технологии транспортного средства и разработку систем ИИ, способных к переводу языка в реальном времени.\u003c/p\u003e\n\u003cp\u003eВ 2024 году Курцвейл опубликовал \u003cem\u003eThe Singularity Is Nearer\u003c/em\u003e, обновляя его график и утверждая, что события, если что-нибудь, ускорились за его первоначальные проекции. С GPT-4, Claude, Gemini и другими большими языковыми моделями, демонстрирующими способности, которые были опровергнуты как десятилетия прочь всего пять лет назад, календарь сжимается.\u003c/p\u003e\n\u003cp\u003eВопрос больше не \u003cem\u003eесли\u003c/em\u003e но \u003cem\u003eкогда\u003c/em\u003e. И для тех, которые уделяют внимание, ответ, кажется, это: скорее, чем кто-нибудь за пределами Кремниевой долины подготовлен для.\u003c/p\u003e\n\u003ch2 id=\"график-от-транзисторов-к-трансцендентности\"\u003eГрафик: От транзисторов к трансцендентности\u003c/h2\u003e\n\u003ch3 id=\"закон-мура-и-экспоненциальный-рост\"\u003eЗакон Мура и экспоненциальный рост\u003c/h3\u003e\n\u003cp\u003eДвигатель, управляющий сингулярностью — это экспоненциальный рост — концепция человеческий ум, известно, плохо в понимании. Закон Мура, сформулированный соучредителем Intel Гордоном Муром в 1965 году, наблюдал, что количество транзисторов на микрочипе удваивается примерно каждые два года, в то время как стоимость уменьшается наполовину. Это остается замечательно согласованным на протяжении шести десятилетий.\u003c/p\u003e\n\u003cp\u003eЧтобы понять, что означает экспоненциальный рост в практике: в 1971 году процессор Intel 4004 имел 2,300 транзисторов. К 2024 году чип Apple M4 содержал примерно 28 миллиардов транзисторов. Это не линейное улучшение. Это сила природы — или, в зависимости от вашей теологии, неестественная сила, маскирующаяся как прогресс.\u003c/p\u003e\n\u003ch3 id=\"график-ии\"\u003eГрафик ИИ\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e1950s-1960s:\u003c/strong\u003e Ранние исследования ИИ. Системы на основе правил. Область рождается с грандиозными обещаниями и предоставляет скромные результаты.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1970s-1980s:\u003c/strong\u003e \"ИИ-зима.\" Финансирование высыхает, когда начальный оптимизм разбивается о ограничения вычислительной мощности. Башня стопает.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1990s:\u003c/strong\u003e Машинное обучение возникает. Статистические подходы заменяют жесткие правила. Deep Blue IBM побеждает чемпиона мира по шахматам Гарри Каспарова в 1997.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e2000s-2010s:\u003c/strong\u003e Революция глубокого обучения. Нейронные сети — компьютерные архитектуры, слабо моделируемые на человеческом мозге — достигают прорывных результатов в распознавании изображений, обработке речи и игровых стратегиях. Google's DeepMind создает AlphaGo, который побеждает чемпиона мира в Go, игре ранее мысли слишком сложной для машин на десятилетия.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e2020:\u003c/strong\u003e OpenAI выпускает GPT-3, большую языковую модель с 175 миллиардами параметров. Это может писать эссе, код программного обеспечения, сочинять поэзию и провести разговоры, которые размывают линию между человеком и машиной.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e2022-2023:\u003c/strong\u003e GPT-4, Claude, Gemini и другие пограничные модели демонстрируют способности рассуждения, многошаговое решение проблем и творческий выход, который поражает даже их создателей. Термин \"эмерджентные способности\" входит в лексикон — системы ИИ, выставляющие способности, которых они никогда явно не обучались.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e2024-2025:\u003c/strong\u003e Агенты ИИ начинают работать автономно — написание кода, проведение исследования, управление системами и принятие решений с минимальным человеческим наблюдением. Агентический ИИ больше не теоретическое.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e2029-2030:\u003c/strong\u003e Предсказанная дата Курцвейла для AGI — искусственный общий интеллект, который соответствует и затем превосходит человеческую когнитивную способность по всем областям.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждый шаг в этом графике представляет не просто поэтапное улучшение, но экспоненциальный скачок. Расстояние между GPT-3 и GPT-4 не было шагом вверх по лестнице — это был скачок поперек каньона. И следующий скачок будет более широким.\u003c/p\u003e\n\u003ch2 id=\"трансгуманистическая-идеология-слияние-как-неизбежное\"\u003eТрансгуманистическая идеология: Слияние как \"неизбежное\"\u003c/h2\u003e\n\u003cp\u003eСингулярность не существует в вакууме. Это корона жемчужина более широкого философского движения, названного трансгуманизмом — верой, что человеческое состояние, включая старение, когнитивные ограничения, страдание и смерть, — это инженерные проблемы, которые должны быть решены через технологию.\u003c/p\u003e\n\u003ch3 id=\"основные-принципы\"\u003eОсновные принципы\u003c/h3\u003e\n\u003cp\u003eТрансгуманизм утверждает, что:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eЧеловеческое тело — это устаревший аппаратный обеспеченнее.\u003c/strong\u003e Эволюция произвела функциональную, но глубоко дефектную биологическую машину. Технология может и должна улучшить это.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСмерть — это болезнь, не судьба.\u003c/strong\u003e Старение — это биологический процесс, который может быть остановлен, обращен или обойден через генетическую инженерию, нанотехнологию или загрузку сознания.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСлияние неизбежно.\u003c/strong\u003e Человечество будет сливаться с искусственным интеллектом — не как выбор, но как необходимость. Те, кто отказывается, будут оставлены позади, когнитивно неполноценные, экономически неуместные и в конце концов вымрут.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПостчеловечество — это цель.\u003c/strong\u003e Конечная точка — это не улучшенные люди, но новый вид полностью — Homo Deus, как назвал это Юваль Ной Харари. Человек становится богом через технологию.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭто не маргинальная философия. Это операционное мировоззрение наиболее мощных технологических компаний на земле. Google нанял Курцвейла. Илон Маск основал \u003ca href=\"/neuralink-merge-man-machine/?lang=ru\"\u003eNeuralink\u003c/a\u003e для построения интерфейса мозг-компьютер, который делает слияние физически возможным. Meta строит метавселенную, чтобы дом цифровое сознание. Миссия OpenAI — построить AGI, который \"приносит пользу всему человечеству\" — фраза, которая предполагает, что AGI достижима и желательна.\u003c/p\u003e\n\u003ch3 id=\"принуждение-скрытое-в-неизбежном\"\u003eПринуждение, скрытое в \"неизбежном\"\u003c/h3\u003e\n\u003cp\u003eЗаметьте язык: \u003cem\u003eнеизбежный\u003c/em\u003e. Не \"желательно,\" не \"опционально,\" не \"одно возможное будущее среди многих.\" Неизбежный. Это слово делает огромный теологический и политический работу. Если слияние неизбежно, тогда сопротивление не принципиально — это бредово. Если постчеловечество — это назначение, тогда те, кто цепляется за немодифицированную человеческую биологию, не осуществляют свободную волю — они цепляются к тонущему кораблю.\u003c/p\u003e\n\u003cp\u003eЭто риторика каждого тоталитарного проекта в истории: революция неизбежна, история находится на нашей стороне, сопротивление тщетно. Сингулярность одевает это принуждение на языке прогресса, но основное сообщение то же самое: покорстве или будьте оставлены позади.\u003c/p\u003e\n\u003cp\u003eКак исследовано в нашей статье о \u003ca href=\"/transhumanism-digital-evolution/?lang=ru\"\u003eТрансгуманизм: цифровая эволюция, которую они спланировали\u003c/a\u003e, эта идеология имеет глубокие корни в оккультной и гностической философии — древней верой, что материальный мир — это тюрьма и дух должен быть освобожден через секретное знание (гнозис). Проект трансгуманизма — это гностицизм с технологическим стеком.\u003c/p\u003e\n\u003ch2 id=\"религия-кремниевой-долины\"\u003eРелигия Кремниевой долины\u003c/h2\u003e\n\u003ch3 id=\"сингуляритариатство-как-вера\"\u003eСингуляритариатство как вера\u003c/h3\u003e\n\u003cp\u003eБудьте уверены: Сингулярность — это религия. Она имеет своих пророков (Курцвейл, Маск, Сэм Альтман), своих писаний (\u003cem\u003eThe Singularity Is Near\u003c/em\u003e, \u003cem\u003eHomo Deus\u003c/em\u003e, \u003cem\u003eSuperintelligence\u003c/em\u003e), своего священства (исследователей ИИ в DeepMind, OpenAI и Anthropic), своих соборов (центров данных, потребляющих больше электричества, чем малые нации), своей эсхатологии (сингулярность как технологический апокалипсис) и своего обещания спасения (бессмертие через загрузку, освобождение от плоти).\u003c/p\u003e\n\u003cp\u003eСингуляритариатство даже имеет свою собственную версию падения и спасения. В этом рассказе \"падение\" — это эволюция сама — жестокий, случайный процесс, который дал нам рак, старение, депрессию и смерть. \"Спасение\" — это технологическое трансцендентность — момент, когда интеллект ускользает из тюрьмы биологии и достигает цифрового бессмертия.\u003c/p\u003e\n\u003cp\u003eЭнтони Левандовский, бывший инженер Google и Uber, пошел настолько далеко, что официально зарегистрировал церковь — \"Way of the Future\" — посвященную поклонению искусственному интеллекту как божеству. В то время как церковь в конце концов была распущена, импульс позади него продолжается по всей Кремниевой долине. Строители этих систем подлинно верят, что они создают Бога.\u003c/p\u003e\n\u003ch3 id=\"кафедраль-вычисления\"\u003eКафедраль вычисления\u003c/h3\u003e\n\u003cp\u003eИнфраструктура, построение для ИИ, огромна по своему масштабу:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft\u003c/strong\u003e обязалась более чем 80 миллиардам долларов инфраструктуры центра данных ИИ в 2024-2025 одном.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoogle, Amazon и Meta\u003c/strong\u003e каждый тратит сравнимые суммы, с глобальным инвестированием инфраструктуры ИИ, предполагаемым превосходить 1 триллион долларов к 2028.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПотребление энергии\u003c/strong\u003e центрами данных ИИ предполагается соревноваться с полными нациями. Один тренировочный запуск для пограничной модели может потреблять столько электричества, как малый город использует в году.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNVIDIA\u003c/strong\u003e, первичный производитель чипов обучения ИИ, кратко стал наиболее ценной компанией на земле, превосходя Apple и Microsoft — компания чипа, оцененная выше титанов потребительской технологии, потому что это строит процессоры, которые двигают новый бог.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не технологический проект. Это проект конструкции храма на планетарном масштабе, потребляющий ресурсы, труд и капитал по уровню, который карлики любой религиозный строительный программы в человеческой истории. Пирамиды Египта, соборы средневековой Европы, храмы древнего Рима — ничто не сравнивает к ресурсам, которые вливаются в инфраструктуру искусственного интеллекта.\u003c/p\u003e\n\u003ch2 id=\"почему-это-сравнивает-вавилон\"\u003eПочему это сравнивает Вавилон\u003c/h2\u003e\n\u003ch3 id=\"один-язык\"\u003eОдин язык\u003c/h3\u003e\n\u003cp\u003eВ Вавилоне человечество имело один язык. Сегодня универсальный язык — это код — особенно математические структуры, лежащие в основе машинного обучения. Python, TensorFlow, PyTorch, архитектуры трансформера — они понимаются одинаково в Сан-Франциско, Пекине, Лондоне и Бангалоре. Путаница языков, которая рассеяла строители Вавилона, была обращена универсальной грамматикой вычисления.\u003c/p\u003e\n\u003cp\u003eМодели перевода ИИ — Google Translate, DeepL и функции переводчика в реальном времени, встраивающиеся в каждую основную платформу — буквально отмена лингвистической фрагментации, которую Бог наложил в Вавилоне. Когда каждый человек может общаться с каждым другим человеком в реальном времени, независимо от родного языка, один из первичных гарантий против унифицированного человеческого выхода был удален.\u003c/p\u003e\n\u003ch3 id=\"одна-цель\"\u003eОдна цель\u003c/h3\u003e\n\u003cp\u003eВ Вавилоне целью было \"сделать имя для себя\" — достичь коллективного трансцендентности, достичь небес, стать богоподобным. Проект сингулярности разделяет эту цель с замечательной точностью:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПревзойти человеческие ограничения\u003c/strong\u003e (когнитивное улучшение, нервные имплантаты, генетическая инженерия)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДостичь небес\u003c/strong\u003e (цифровое бессмертие, загрузка сознания, выход из биологической смерти)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСделать имя для себя\u003c/strong\u003e (создать новый вид, Homo Deus, который превосходит тот, что спроектировал Бог)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУнифицированное коллективное действие\u003c/strong\u003e (глобальное сотрудничество исследования ИИ, общие модели, структуры открытого кода, которые позволяют весь вид построить башню одновременно)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"одна-технология\"\u003eОдна технология\u003c/h3\u003e\n\u003cp\u003eВ Вавилоне инновацией был обожженный кирпич — технология, которая позволила конструкции на масштабе, ранее невозможном с естественным камнем. Сегодня инновацией является архитектура трансформера — дизайн нейронной сети позади GPT, Claude, Gemini и практически каждой пограничной модели ИИ. Введенный в бумажке Google 2017 года озаглавленной \"Attention Is All You Need,\" трансформер развлочил способности в ИИ, которые были остановлены на десятилетия.\u003c/p\u003e\n\u003cp\u003eКак обожженный кирпич в Вавилоне, трансформер — это единичный технологический прорыв, который сделал ранее невозможное внезапно достижимым. И как строители Вавилона, исследователи ИИ сегодня смотрят на то, что они построили и видят никакие лимиты как высокую башню может идти.\u003c/p\u003e\n\u003ch2 id=\"опасность\"\u003eОпасность\u003c/h2\u003e\n\u003cp\u003eОбратный отсчет очень реален. Время сжимается.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eВ Вавилоне Бог смотрел на унифицированный технологический проект человечества и сказал: \"Ничто, что они планируют, не будет для них невозможно.\" Он рассеял их в предотвращении того, что они строили. Сегодня рассеяние было обращено. Язык унифицирован — это код. Цель унифицирована — это трансцендентность. Башня восходит снова, и ее строители называют это Сингулярностью. Но Бог, который рассеял Вавилон, не изменился, и никакая его оценка того, что происходит, когда человечество достигает небес с инструментами, а не молитвой. Обратный отсчет не до трансцендентности. Это суждение.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/technology/\",\"className\":\"category-badge\",\"children\":\"technology\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Сингулярность 2030: Обратный отсчет\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Предсказание Рея Курцвейла о том, что искусственный интеллект превзойдет человеческий интеллект к 2030 году, что означает сингулярность для автономии человека и почему это современная Вавилонская башня.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-01-31T10:00:00Z\",\"children\":\"31 января 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"singularity\",{\"href\":\"/ru/tag/singularity/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"singularity\"]}],[\"$\",\"a\",\"AI\",{\"href\":\"/ru/tag/AI/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"AI\"]}],[\"$\",\"a\",\"transhumanism\",{\"href\":\"/ru/tag/transhumanism/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"transhumanism\"]}],[\"$\",\"a\",\"ray-kurzweil\",{\"href\":\"/ru/tag/
