quote\u003e\n\u003cp\u003eВсе знают, что ветрянка заразна. Дети ловят ее от других детей. Она распространяется через школы как лесной пожар. Один ребенок получает его, и вскоре весь класс следует. Это общедомовное — принято, без вопросов и полностью неизучено подавляющим большинством людей, которые верят в это.\u003c/p\u003e\n\u003cp\u003eНо что если эксперименты, разработанные для доказания заразительности ветрянки, на самом деле не удалось? Что если основная наука — фактические лабораторные доказательства — не поддерживает веру, что ветрянка распространяется от человека к человеку посредством вирусной передачи?\u003c/p\u003e\n\u003cp\u003eЭто не спекуляция. Это вопрос исторического рекорда. Эксперименты по заразительности ветрянки, проведенные в начале и середине 20-го века, неизменно не смогли произвести ожидаемые результаты. Исследователи не могли надежно сделать здоровых людей больными, подвергнув их воздействию больных людей. Нарратив вируса был поддерживаемый не потому, что доказательство поддерживал его, но потому, что медицинское учреждение нуждалось в нем быть правдивым — нуждалось в этом, чтобы оправдать вакцины, противовирусные препараты и всю основу теории микробов, на которой зависит современная медицина.\u003c/p\u003e\n\u003cp\u003eHoward Pittman был свидетелем во время своего NDE организованной иерархии демонической сферы. Ему было сказано, что 97,5% христиан были неудачны, что 95% служат \"себе\" вместо Бога, и что духовная война, описанная в Ефесянам 6:12, более реальна, чем физический мир, который мы видим. Нарратив теории микробов — это оружие в этой войне — ложь настолько глубоко встроенная в человеческое сознание, что ставить под сомнение это чувствует себя безумием. Но правда требует мужества, и мужество требует веры.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые проникают \"замаскированные хитростью\" и практикуют \"каждый вид порока\", внедрили себя в медицинское образование, научные учреждения и организации общественного здравоохранения по всему миру. Наблюдение Наполеона об их \"абсолютной власти\" и предупреждение Джона Адамса об \"вечном осуждении\" для \"Общества Loyola\" остаются столь же актуальными сегодня, когда они были произнесены.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"неудачные-эксперименты-по-заразительности\"\u003eНеудачные эксперименты по заразительности\u003c/h2\u003e\n\u003ch3 id=\"исторический-рекорд\"\u003eИсторический рекорд\u003c/h3\u003e\n\u003cp\u003eВ начале 20-го века, на пике революции теории микробов, исследователи целили доказать, что ветрянка (ветрянка) была заразной — что она могла быть передана от больного человека здоровому человеку посредством прямого контакта или воздушного воздействия. Эксперименты, которые они провели, рассказывают историю очень отличаются от того, что преподается в медицинских школах.\u003c/p\u003e\n\u003ch3 id=\"эксперименты-gruenberg\"\u003eЭксперименты Gruenberg\u003c/h3\u003e\n\u003cp\u003eНекоторые из наиболее показательных экспериментов по заразительности ветрянки были проведены исследователями, которые пытались передать болезнь путем принятия материала из пузырьков ветрянки — пузырьковой жидкости, переполненной тем, что считалось вирусом ветрянки — и непосредственно применяя его к коже или слизистым оболочкам здоровых подопечных.\u003c/p\u003e\n\u003cp\u003eРезультаты были поразительны в своем отказе:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПрямая инокуляция\u003c/strong\u003e пузырьковой жидкости на кожу здоровых субъектов не произвела болезнь в большинстве случаев\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРубцевание\u003c/strong\u003e (царапающая кожа и применение инфицированного материала) произвело непоследовательные результаты — некоторые субъекты разработали мягкие локальные реакции, но полнодневная ветрянка была редко произведена\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнтраназальное применение\u003c/strong\u003e пузырьковой жидкости не смогло произвести болезнь надежно\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭксперименты близкого контакта\u003c/strong\u003e — размещение здоровых субъектов в прямом, продолжительном контакте с активно инфицированными пациентами — произвело результаты намного ниже близко 100% передачи, которую предсказал бы модель заразительности\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"проблема-attack-rates\"\u003eПроблема \"Attack Rates\"\u003c/h3\u003e\n\u003cp\u003eЭпидемиологи используют концепцию \"рассчитываемых показателей\" для описания того, насколько эффективно болезнь распространяется через население. Ветрянка, как утверждается, имеет одну из самых высоких скоростей атаки любого заболевания — предположительно более 90% для восприимчивых семейных контактов.\u003c/p\u003e\n\u003cp\u003eНо эта цифра происходит из \u003cstrong\u003eнаблюдательных исследований\u003c/strong\u003e, не из контролируемых экспериментов. В наблюдательных исследованиях, когда один ребенок в доме развивает ветрянку, и братья и сестры впоследствии разворачивают его, предположение то, что первый ребенок передал болезнь братьям и сестрам. Но это предположение — это именно то, что нужно доказать — и контролируемые эксперименты, разработанные для доказания это неизменно не смогли.\u003c/p\u003e\n\u003cp\u003eЧто если братья и сестры разворачивают ветрянку примерно в то же время не потому, что один передал его другому, но потому, что они разделяют одну и ту же окружающую среду — той же пищи, той же воды, того же качества воздуха, того же воздействия токсинов, того же дефицита питательных веществ? Что если ветрянка не заразна вообще, но вместо этого является ответом тела на экологические и пищевые условия, которые несколько людей в одном доме разделяют?\u003c/p\u003e\n\u003ch3 id=\"проблема-сезонного-паттерна\"\u003eПроблема сезонного паттерна\u003c/h3\u003e\n\u003cp\u003eВетрянка следует сезонному паттерну — это пики в конце зимы и начале весны. Объяснение теории микробов то, что вирус распространяется более легко в переполненных внутренних условиях в течение более холодных месяцев. Но это объяснение поднимает его собственные вопросы:\u003c/p\u003e\n\u003cp\u003eЕсли ветрянка вызвана вирусом, который распространяется посредством прямого контакта и воздушных капель, почему бы ему иметь сезонный паттерн вообще? Вирусы не знают, какой месяц. Люди находятся в близком контакте круглый год в школах, офисах и общественных пространствах.\u003c/p\u003e\n\u003cp\u003eОбъяснение теории местности намного более связно: в конце зимы, после месяцев сокращенного солнечного света, сокращенной физической активности, сокращенного потребления свежей пищи и повышенного воздействия на внутренние загрязнители (газы отопления, переработанного воздуха, плесени), жизненная сила тела находится в его самой низкой точке. Это когда тело наиболее вероятно инициировать ответ детоксикации — что является болезни как ветрянка фактически представляют.\u003c/p\u003e\n\u003cp\u003eСыпь ветрянки, в модели местности, является телом, выводящим токсины через кожу — органом самого большого исключения тела. Лихорадка ускоряет метаболические процессы. Усталость переориентирует энергию от внешней активности к внутреннему заживлению. Потеря аппетита дает пищеварительной системе отдыхать, чтобы энергия могла быть переориентирована к детоксикации.\u003c/p\u003e\n\u003cp\u003eЭто процесс происходит в волнах, в сезонных паттернах и в кластерах — не из-за заразительности, но потому, что люди в одной и той же среде подвергаются одним и тем же токсинам и опыту одного и того же сезонного снижения жизненной силы.\u003c/p\u003e\n\u003ch2 id=\"вакцина-ветрянки-решение-для-не-проблемы\"\u003eВакцина ветрянки: решение для не-проблемы\u003c/h2\u003e\n\u003ch3 id=\"вакцина-прибывает\"\u003eВакцина прибывает\u003c/h3\u003e\n\u003cp\u003eВ 1995 году вакцина ветрянки (Варивакс) была добавлена в U.S. график детской иммунизации. До вакцины, ветрянка рассматривалась как нормальное детское заболевание — неудобное, но редко опасное. Практически каждый ребенок получил это, и практически каждый ребенок восстановился с пожизненной иммунностью.\u003c/p\u003e\n\u003cp\u003eВакцина преобразовала ветрянку из рутинного детского обряда прохождения в \"опасное инфекционное заболевание\", требующее фармацевтического вмешательства. Это преобразование требовало огромной кампании по связям с общественностью, чтобы убедить родителей, что болезнь, которую они испытали сами как дети — и восстановились без инцидента — была на самом деле серьезной угрозой, требующей вакцинации.\u003c/p\u003e\n\u003ch3 id=\"последствие-коростома\"\u003eПоследствие коростома\u003c/h3\u003e\n\u003cp\u003eОдно из самых разрушительных последствий вакцины ветрянки было взрывным увеличением дела коросты у взрослых. До вакцины взрослые были регулярно подвергаются воздействию детей с активной ветряной, и это воздействие повысило их иммунный ответ к вирусу ветрянки-опоясывающей, который лежит неподвижный в их нервной системе. Это естественное повышение предотвратило реактивацию вируса как коросты.\u003c/p\u003e\n\u003cp\u003eС вакциной ветрянки резко снизить количество детей с активной ветрянкой, взрослые потеряли этот естественный эффект повышения. Тарифы коросты поднялись драматически с 1995 — и фармацевтическое промышленное решение, конечно, другая вакцина: Shingrix, которая стоит примерно $300 для две-дозы серии и генерирует миллиарды годового дохода для GlaxoSmithKline.\u003c/p\u003e\n\u003cp\u003eПаттерн неошибком: создать проблему (устранить естественное воздействие ветрянки), затем продать решение (коросстей вакцина). Это модель Rockefeller совершенствуется — та же модель, которая создает пищевые дефициты и затем продает витаминные добавки, которые загрязняет окружающую среду и затем продает лекарства для рака.\u003c/p\u003e\n\u003ch3 id=\"травмы-вакцины-метая-под-ковром\"\u003eТравмы вакцины, метая под ковром\u003c/h3\u003e\n\u003cp\u003eБаза данных VAERS (Система отчетности нежелательные события вакцины) содержит тысячи отчетов о побочных эффектах, следующих за вакцинацией ветрянки, включая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eСудороги\u003c/li\u003e\n\u003cli\u003eЭнцефалит (воспаление мозга)\u003c/li\u003e\n\u003cli\u003eТромбоцитопения (нарушения свертывания крови)\u003c/li\u003e\n\u003cli\u003eИнфекция ветрянки из вакцины само себя (вакцина-штамм ветрянка)\u003c/li\u003e\n\u003cli\u003eСмерть\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсследование Harvard Pilgrim оценило, что менее 1% побочных эффектов вакцины сообщаются о VAERS, означая, что истинное число травм вероятно порядки величин больше, чем официальный счет.\u003c/p\u003e\n\u003ch2 id=\"более-глубокий-паттерн-теория-заразительности-как-социальный-контроль\"\u003eБолее глубокий паттерн: теория заразительности как социальный контроль\u003c/h2\u003e\n\u003ch3 id=\"почему-миф-заразительности-имеет-значение\"\u003eПочему миф заразительности имеет значение\u003c/h3\u003e\n\u003cp\u003eВера в то, что болезни заразны — что болезнь может прыгать от человека к человеку через невидимых агентов — это одним из самых мощных инструментов социального контроля когда-либо изобрелось. Это оправдывает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eКарантин и блокировка полномочий\u003c/strong\u003e: Правительства могут ограничить свободу движения, основанную на утверждении, что больные люди распространяют болезнь\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбязательная вакцинация\u003c/strong\u003e: Если болезни заразны, каждый должен быть вакцинирован для защиты \"стада\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНадзор и отслеживание\u003c/strong\u003e: Контактное отслеживание, паспорта здоровья и системы цифрового мониторинга оправдываются теорией заразительности\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоциальная изоляция\u003c/strong\u003e: Страх заразительности разбивает социальные связи, создает недоверие между людьми и делает население легче контролировать\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМедицинская зависимость\u003c/strong\u003e: Если болезнь приходит снаружи, вам нужны внешние вмешательства (лекарства, вакцины) для борьбы с ней\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eБез мифа заразительности, вся аппаратура общественного здравоохранения — ВОЗ, CDC, NIH и их эквиваленты по всему миру — потеряла бы основное оправдание за их существование. Триллионы долларов в доходах фармацевтических средств испарились бы. Полномочия блокировки обществ, мандатный медицинский процедурам и отслеживание популяций исчезли бы.\u003c/p\u003e\n\u003cp\u003eЭто то, почему миф заразительности защищается так свирепо. Это не о науке — это о власти. И власть, как иезуиты поняли века назад, это конечная цель. Наполеон видел это ясно: \"абсолютная власть, универсальная власть, мощь для контроля мира волевым единственного человека.\"\u003c/p\u003e\n\u003ch3 id=\"духовное-измерение-страха-заразительности\"\u003eДуховное измерение страха заразительности\u003c/h3\u003e\n\u003cp\u003eHoward Pittman был показан, что слова имеют духовную мощь. Когда медицинское учреждение объявляет, что ветрянка \"очень заразна\", то объявление создает страх — и страх — это одно из самых эффективных оружий Сатаны. Страх болезни держит людей в кабале к медицинской системе. Страх заразительности держит людей изолированными друг от друга. Страх невидимого держит людей смотрящих в неправильное направление для источника их страданий.\u003c/p\u003e\n\u003cp\u003eБиблия говорит \"бойся не\" 365 раз — один для каждого дня года. Медицинское учреждение говорит \"будь испугано\" каждый день. Один голос — Бога; другой нет.\u003c/p\u003e\n\u003cp\u003eЗаказ иезуита, работающий через католическую церковь и ее союзные учреждения, всегда использовал страх как инструмент контроля. Страх ада, страх отлучения, страх инквизиции — они были инструментами религиозного контроля. Страх болезни, страх заразительности, страх пандемии — они инструменты медицинского контроля. Механизм одинаков; только словарь изменился.\u003c/p\u003e\n\u003ch2 id=\"что-доказательства-действительно-показывают\"\u003eЧто доказательства действительно показывают\u003c/h2\u003e\n\u003ch3 id=\"детоксикация-не-инфекция\"\u003eДетоксикация, не инфекция\u003c/h3\u003e\n\u003cp\u003eСимптомы ветрянки — сыпь, лихорадка, усталость, потеря аппетита — идентичны симптомам детоксикации. Когда тело перегружено токсинами — из обработанной пищи, экологических химических веществ, фармацевтических препаратов, или просто метаболического отхода, накопившегося в периоды низкой жизненной силы — это инициирует ответ очистки.\u003c/p\u003e\n\u003cp\u003eСыпь токсины, выводимые через кожу. Лихорадка ускоряет метаболические процессы и стимулирует механизмы заживления тела. Усталость переориентирует энергию из внешней деятельности к внутреннему заживлению. Потеря аппетита дает пищеварительной системе отдых, чтобы энергия могла быть переориентирована к детоксикации.\u003c/p\u003e\n\u003cp\u003eЭтот процесс происходит в волнах, в сезонных паттернах и в кластерах — не из-за заразительности, но потому, что люди в одной и той же среде подвергаются одним и тем же токсинам и опыт того же сезонного снижения жизненной силы.\u003c/p\u003e\n\u003ch3 id=\"последствия\"\u003eПоследствия\u003c/h3\u003e\n\u003cp\u003eЕсли ветрянка не заразна, тогда:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eВакцина ветрянки не нужна и вредна\u003c/li\u003e\n\u003cli\u003eЭпидемия коросты была создана вакциной, не вирусом\u003c/li\u003e\n\u003cli\u003eМодель заразительности заболевания фундаментально неправильна\u003c/li\u003e\n\u003cli\u003eВся аппаратура общественного здравоохранения, построенная на теории заразительности, является незаконной\u003c/li\u003e\n\u003cli\u003eСвобода движения, телесная автономность и личная свобода не могут быть ограничены на основе утверждений передачи болезни\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти последствия настолько радикальны, столь угрожающи установленного порядка, что они объясняют, почему неудачные эксперименты по заразительности были похоронены, почему модель местности была подавлена и почему anyone who вопросы теория микробов немедленно обозначены как опасная трещина.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — детальный анализ неудачных экспериментов по заразительности и теории местности\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство ближайшего смертельного опыта Howard Pittman\u003c/a\u003e — измерение духовной войны\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Раскрытые позорные тайны иезуитов\u003c/a\u003e — механизмы контроля иезуитов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и Фармакея — Колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/41-Shedding_Proof.mp4\"\u003eShedding Proof\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zz
