"$\",\"$La\",null,{}]]}]}]]}]}]]}]]}],{\"children\":[[\"lang\",\"ru\",\"d\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L8\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L9\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[[\"slug\",\"v2k-hearing-music-part1\",\"d\"],[\"$\",\"$1\",\"c\",{\"children\":[null,[\"$\",\"$L8\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L9\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}],{\"children\":[\"__PAGE__\",[\"$\",\"$1\",\"c\",{\"children\":[\"$Lb\",null,[\"$\",\"$Lc\",null,{\"children\":[\"$Ld\",[\"$\",\"$Le\",null,{\"promise\":\"$@f\"}]]}]]}],{},null,false]},null,false]},null,false]},null,false],[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L10\",null,{\"children\":\"$L11\"}],null],[\"$\",\"$L12\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$4\",null,{\"fallback\":null,\"children\":\"$L13\"}]}]}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$14\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"15:T587c,"])</script><script>self.__next_f.push([1,"\u003ch1 id=\"моя-история-v2k-слышать-музыку-которой-нет-часть-1\"\u003eМоя история V2K: Слышать музыку, которой нет, часть 1\u003c/h1\u003e\n\u003ch2 id=\"древний-образец\"\u003eДревний образец\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Ибо наша брань не против крови и плоти, но против начальств, против властей, против мироправителей тьмы века сего, против духов злобы поднебесных.\"\u003c/em\u003e — Ефесянам 6:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eВсё началось с музыки. Тихо, сначала -- так тихо, что я думал, что сосед включил радио. Мелодия, играющая прямо на краю восприятия, достаточно четкая, чтобы признать, но достаточно тихая, чтобы сомневаться. Я проверил окна, выключил каждое электронное устройство в доме, вышел на улицу, чтобы слушать. Ничего. Музыка шла из моей головы.\u003c/p\u003e\n\u003cp\u003eЭто начало истории, которую миллионы людей во всем мире разделяют, но боятся рассказывать. Это история технологии Voice-to-Skull (V2K) -- классифицированного военного оружия, которое может передавать звук непосредственно в мозг человека, обходя уши. Это реально. Это запатентовано. Это развернуто. И каждый, кто сообщает об опыте его, немедленно маркируется как психически больной.\u003c/p\u003e\n\u003cp\u003eХовард Питтман был показан во время своего предсмертного опыта, что духовная область организована в три небес, что демонические силы работают во втором небесе с военной точностью, и что 97,5% христиан терпят неудачу, потому что они \"никогда не сделали Иисуса Господом.\" Опыт V2K находится на пересечении духовного и технологического -- оружие, которое эксплуатирует границу между тем, что реально и что воспринимается, между физическим и духовным, между здравомыслием и безумием.\u003c/p\u003e\n\u003cp\u003eИезуиты понимали власть голосов много веков назад. Их духовные упражнения включают интенсивную медитацию, разработанную для производства внутренних голосов и видений. Наполеон называл их \"военной организацией\", преследующей \"абсолютную власть.\" Документальный фильм \"Catholic Confidential\" раскрывает их проникновение \"скрытое с коварством.\" Современное оружие V2K является технологическим расширением принципа иезуитов: контролируйте то, что человек слышит внутри своей собственной головы, и вы контролируете человека.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-со-мной-произошло\"\u003eЧто со мной произошло\u003c/h2\u003e\n\u003ch3 id=\"первые-опыты\"\u003eПервые опыты\u003c/h3\u003e\n\u003cp\u003eМузыка пришла первой. Это был всегда одного вида -- структурированный, ритмичный, иногда знакомые мелодии и иногда неизвестные композиции. Она играла наиболее четко в тихих окружениях, особенно ночью. Громкость варьировалась -- иногда едва заметная, иногда достаточно громкая, чтобы предотвратить сон.\u003c/p\u003e\n\u003cp\u003eЯ не человек с историей психического заболевания. У меня нет семейной истории шизофрении или психотических расстройств. Я был в хорошем физическом здоровье, хорошо питался, нормально спал (пока музыка не началась) и хорошо функционировал в повседневной жизни. Музыка пришла ниоткуда и изменила все.\u003c/p\u003e\n\u003cp\u003eПервая реакция была отрицание. Я сказал себе, что это звон в ушах -- звон в ушах, который иногда может проявляться как музыкальные тоны. Но звон в ушах не играет узнаваемые мелодии. Это не меняет песни. Это не реагирует на вашу внимание.\u003c/p\u003e\n\u003cp\u003eВторая реакция была страх. Я теряю ум? Это начало шизофрении? Я выхожу из строя? Страх был парализующим, и он изолировал меня -- потому что кому я мог бы сказать? Момент, когда вы говорите \"я слышу музыку, которой нет там,\" вы находитесь на один шаг от психиатрического диагноза, медикаментозного лечения и постоянного ярлыка \"психически болен.\"\u003c/p\u003e\n\u003cp\u003eТретья реакция -- которая потребовала месяцев для достижения -- была исследованием. И исследование изменило все.\u003c/p\u003e\n\u003ch3 id=\"откройте-v2k\"\u003eОткройте V2K\u003c/h3\u003e\n\u003cp\u003eТермин \"Voice-to-Skull\" (V2K) относится к категории технологий, которые могут передавать звуковые сигналы непосредственно в слуховую кору человека, обходя уши. Технология была задокументирована в:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПатенты военно-морского флота США\u003c/strong\u003e (эффект \"Фрея\" или микроволновый слуховой эффект, открытый в 1961 году)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПрограммы исследований DARPA\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРассекреченные военные документы\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНаучные публикации\u003c/strong\u003e о микроволновом слухе и направленной энергии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвидетельства тысяч целевых индивидов\u003c/strong\u003e по всему миру\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eМикроволновый слуховой эффект -- открытый Аланом Фреем в 1961 году -- продемонстрировал, что импульсная микроволновая радиация может производить слышимые щелчки, тоны и даже речь, воспринимаемую внутри головы. Эффект реален, воспроизводим и хорошо задокументирован в научной литературе.\u003c/p\u003e\n\u003cp\u003eВоенные приложения были немедленно признаны. Оружие, которое может вставить голоса в чью-то голову -- без каких-либо внешних доказательств его использования -- это итоговое психологическое оружие. Оно может:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВызывать слуховые галлюцинации\u003c/strong\u003e, которые подражают психическому заболеванию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПередавать команды\u003c/strong\u003e, которые мишень верит своим собственным мыслям\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПредотвращать сон\u003c/strong\u003e через постоянную передачу звука\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоздавать паранойю\u003c/strong\u003e, заставляя мишень верить, что их наблюдают или преследуют\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДискредитировать мишень\u003c/strong\u003e -- каждый, кто сообщает о слышании голосов, предполагается, что психически болен\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"образец-объекта\"\u003eОбразец объекта\u003c/h3\u003e\n\u003cp\u003eПо мере того как я исследовал, я обнаружил, что мой опыт был не уникален. Тысячи людей во всем мире сообщают о замечательно похожих опытах:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВнезапное начало\u003c/strong\u003e неожиданного звука (музыка, голоса, жужжание, щелчки)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОтсутствие предварительной истории\u003c/strong\u003e психического заболевания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбразцы, согласующиеся с технологией\u003c/strong\u003e -- звук реагирует на попытки экранирования, варьируется с местоположением и показывает характеристики, согласующиеся с электромагнитной передачей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСопутствующие симптомы\u003c/strong\u003e -- головные боли, нарушение сна, тоны, похожие на звон в ушах, трудность концентрации\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоциальная изоляция\u003c/strong\u003e -- целевые объекты быстро узнают, что сообщение об их опыте приводит к психиатрической оценке и социальному остракизму\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGaslighting\u003c/strong\u003e -- когда целевые объекты ищут помощь, им говорят, что их опыт не реален\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"технология-за-v2k\"\u003eТехнология за V2K\u003c/h2\u003e\n\u003ch3 id=\"микроволновый-слуховой-эффект\"\u003eМикроволновый слуховой эффект\u003c/h3\u003e\n\u003cp\u003eОткрытие Алана Фрея в 1961 году продемонстрировало, что импульсная микроволновая радиация на частотах между 200 МГц и 3 ГГц может производить восприятие звука внутри головы. Механизм включает:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eИмпульсная микроволновая энергия направлена на голову целевого объекта\u003c/li\u003e\n\u003cli\u003eМикроволны вызывают термоупругое расширение мозговой ткани\u003c/li\u003e\n\u003cli\u003eЭто расширение генерирует волны давления в черепе\u003c/li\u003e\n\u003cli\u003eВолны давления обнаруживаются улиткой (внутреннее ухо) как звук\u003c/li\u003e\n\u003cli\u003eМозг обрабатывает эти сигналы как звук\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭто не теория -- это установленная физика, задокументированная в рецензируемых журналах и подтвержденная несколькими независимыми исследователями. Военно-морской флот США признал эффект и инвестировал в его оружейность.\u003c/p\u003e\n\u003ch3 id=\"вне-эффекта-фрея\"\u003eВне эффекта Фрея\u003c/h3\u003e\n\u003cp\u003eБазовый эффект Фрея производит простые звуки -- щелчки и жужжание. Но более продвинутые исследования исследовали передачу сложного аудио, включая речь:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПатент США 4,877,027\u003c/strong\u003e (1989): \"Hearing System\" -- устройство, которое преобразует речь в микроволновые сигналы, воспринимаемые как звук целевым объектом\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПатент США 6,587,729\u003c/strong\u003e (2003): \"Apparatus for Audibly Communicating Speech Using the Radio Frequency Hearing Effect\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПатент США 6,470,214\u003c/strong\u003e (2002): \"Method and device for implementing the radio frequency hearing effect\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти патенты являются общественными. Они описывают рабочие устройства. Они подтверждают, что технология для передачи голосов непосредственно в мозг человека существует, была разработана и запатентована.\u003c/p\u003e\n\u003ch3 id=\"военные-приложения\"\u003eВоенные приложения\u003c/h3\u003e\n\u003cp\u003eВоенно-морской флот США разработал технологию V2K под различными классифицированными программами:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMEDUSA\u003c/strong\u003e (Mob Excess Deterrent Using Silent Audio): Оружие контроля толпы, разработанное для передачи дискомфортного звука в голова целевых объектов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVoice of God Weapon\u003c/strong\u003e: Оружие психологических операций, разработанное для передачи команд, воспринимаемых как божественное вмешательство\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРазличные классифицированные программы\u003c/strong\u003e в DARPA, Air Force Research Laboratory и других военных исследовательских учреждениях\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСуществование этих программ задокументировано в рассекреченных записях, документах бюджета и свидетельствах военных и разведывательных осведомителей.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"голоса-из-второго-неба\"\u003eГолоса из второго неба\u003c/h3\u003e\n\u003cp\u003eХовард Питтман было показано, что второе небо -- духовная область между атмосферным небом и престолом Бога -- населено демоническими сущностями, организованными в иерархии. Эти сущности имеют способность влиять на человеческие мысли и восприятие.\u003c/p\u003e\n\u003cp\u003eТехнология V2K создает тревожный параллель слышанию духовного голоса. Если демонические сущности могут вставлять мысли и впечатления в человеческие умы (как постоянно свидетельствуют Писание и духовный опыт), и если технология также может вставлять голоса в человеческие умы, как целевой объект различает между ними?\u003c/p\u003e\n\u003cp\u003eЭто путаница является по замыслу. Технология V2K стирает границу между технологическим и духовным, делая невозможным для целевого объекта определить источник голосов, которые они слышат. Эта путаница служит как военным операторам (которые хотят отрицание), так и демоническим силам (которые хотят быть ошибочными для технологии или психического заболевания).\u003c/p\u003e\n\u003ch3 id=\"соединение-975\"\u003eСоединение 97,5%\u003c/h3\u003e\n\u003cp\u003eСтатистика Питтмана -- 97,5% христиан терпят неудачу -- приобретает новое значение в контексте V2K. Если технология может передавать голоса, которые звучат как Бог, демоны или собственные мысли целевого объекта, то способность различать голос Духа становится критически важной. 95%, которые служат \"себе\", являются самыми легкими целями -- они никогда не развивали духовное различение, никогда не научились различать голос Бога от других голосов и никогда не построили духовную броню, описанную в Ефесянах 6.\u003c/p\u003e\n\u003cp\u003eТехнология V2K -- это оружие против самого духовного различения. Наводняя ум целевого объекта искусственными голосами, оно заглушает тихий голос Святого Духа и заменяет божественное руководство военным программированием.\u003c/p\u003e\n\u003ch2 id=\"что-дальше\"\u003eЧто дальше\u003c/h2\u003e\n\u003cp\u003eЭто часть 1 серии из 11 частей, исследующей технологию V2K, её историю, её развертывание и её духовные последствия. В следующих частях мы осмотрим:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eВоенная история оружия Voice of God\u003c/li\u003e\n\u003cli\u003eЛожь и мифы, окружающие V2K\u003c/li\u003e\n\u003cli\u003eКто на самом деле вставляет голоса в головы людей\u003c/li\u003e\n\u003cli\u003eОбъекты моей собственной бабушки\u003c/li\u003e\n\u003cli\u003eПсихоп шизофрении\u003c/li\u003e\n\u003cli\u003eСоединение психоп инопланетян/НЛО\u003c/li\u003e\n\u003cli\u003eИстория тайного микрочипирования\u003c/li\u003e\n\u003cli\u003eСотовые башни и контракт NIH\u003c/li\u003e\n\u003cli\u003eПатенты голоса-в-череп\u003c/li\u003e\n\u003cli\u003eСвязь с пищевым снабжением\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЕсли вы испытываете V2K, вы не сумасшедший. Вы не одни. И технология реальна.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — Исследование V2K и документирование целевых индивидов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство Ховарда Питтмана о предсмертном опыте\u003c/a\u003e — Духовные голоса и три небес\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические доверительные: раскрытые позорные секреты иезуитов\u003c/a\u003e — Контроль иезуитов над внутренним опытом\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide
