 бы наружу\"\u003c/em\u003e (Лука 8:17, KJV). Погребённые здания, разбросанные по каждому обитаемому континенту, служат молчаливыми свидетелями истории, которую мощные учреждения тщательно стирали. Как трек Confliction \"Ложь обманщиков\" напоминает нам, сеть обмана уходит намного глубже, чем большинство осмеливается вообразить, и физические доказательства лежат под нашими самыми ногами.\u003c/p\u003e\n\u003cp\u003eПророк Исайя предупредил, что целые цивилизации будут низложены: \u003cem\u003e\"И ты будешь низложена, и будешь говорить из земли, и речь твоя будет гласиться из пыли\"\u003c/em\u003e (Исайя 29:4). Это не просто поэтический язык. По всему миру, величественные структуры, которые когда-то стояли высоко, теперь говорят из-под слоёв земли, осадка и официального отрицания. Как \"Первая тьма\" из альбома Confliction напоминает, что-то было скрыто в самых основаниях мира, который мы думаем, что знаем.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"введение-когда-земля-рассказывает-другую-историю\"\u003eВведение: когда земля рассказывает другую историю\u003c/h2\u003e\n\u003cp\u003eПрогулянитесь по любому крупному европейскому городу, и вы заметите что-то странное, если будете внимательны. Окна нижних этажей старых зданий частично или полностью ниже уровня улицы. Двери, которые когда-то служили главными входами, теперь ведут в подвалы. Украшенные фасады, которые явно были предназначены для восхищения с улицы, наполовину поглощены землёй. Официальное объяснение почти всегда одно и то же: \"уровень улицы поднялся,\" или \"здание уселось со временем,\" или какая-то вариация теории городского развития.\u003c/p\u003e\n\u003cp\u003eНо когда это явление появляется в Москве, Санкт-Петербурге, Эдинбурге, Портленде, Сиэтле, Риме, Стамбуле и сотнях других городов одновременно, удобные объяснения начинают рушиться. Какое \"городское развитие\" закопает первые этажи на нескольких континентах примерно в одно и то же историческое время? Какая сила природы или программа гражданского благоустройства могла бы ответить за метры и метры осадка, покрывающего здания, которые, по всем архитектурным доказательствам, были предназначены стоять полностью над землёй?\u003c/p\u003e\n\u003cp\u003eЭто вопросы, которые основные историки отказываются честно решать. И ответы, как обширно задокументировано исследователями, такими как Agent131711 на Substack (agent131711.substack.com), указывают на катастрофическое событие или серию событий, которые были систематически стёрты из исторического записи.\u003c/p\u003e\n\u003ch2 id=\"гипотеза-грязного-наводнения-больше-чем-просто-теория\"\u003eГипотеза грязного наводнения: больше, чем просто теория\u003c/h2\u003e\n\u003ch3 id=\"что-показывают-доказательства\"\u003eЧто показывают доказательства\u003c/h3\u003e\n\u003cp\u003eТермин \"грязное наводнение\" стал зонтиком для явления погребённой архитектуры, но реальность, вероятно, сложнее одного события. Доказательства предполагают массивные отложения прекрасного осадка, иногда смешанные с глиной, иногда с вулканоподобным материалом, покрывающие конструкции, которые явно были построены на полную высоту и предназначены для просмотра.\u003c/p\u003e\n\u003cp\u003eВ городе за городом образец повторяется. Когда проводятся раскопки для нового строительства, рабочие обнаруживают, что то, что все предполагали, было оригинальным нижним этажом, на самом деле второй или третий этаж. Ниже лежит дополнительная архитектура, полная окна, двери, декоративные элементы, и иногда целые комнаты, которые никогда не были предназначены быть подземными.\u003c/p\u003e\n\u003cp\u003eРассмотрим город Портленд, Орегон. Так называемые \"Shanghai Tunnels\" под городом представлены туристам как сеть подземных проходов, используемых для похищения матросов в 19-м веке. Но более внимательное исследование раскрывает что-то гораздо более интересное. Эти \"туннели\" включают комнаты с законченными стенами, правильными дверными проёмами и архитектурными деталями, которые не имеют смысла для быстро вырытой контрабандной сети. Они кажутся первыми этажами и подвалами зданий, которые когда-то стояли на гораздо более низком уровне улицы.\u003c/p\u003e\n\u003ch3 id=\"масштаб-явления\"\u003eМасштаб явления\u003c/h3\u003e\n\u003cp\u003eЧто делает явление погребённых зданий столь убедительным, так это его глобальный охват. Это не изолировано одному региону или одному геологическому контексту. Исследователи задокументировали частично погребённые конструкции на каждом обитаемом континенте:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eРоссия\u003c/strong\u003e: целые кварталы в городах, таких как Тобольск, Казань и Омск, показывают чёткие свидетельства погребённых первых этажей. В некоторых случаях здания были раскопаны, чтобы открыть два или более этажа ниже текущего уровня земли.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЕвропа\u003c/strong\u003e: от подземного города Эдинбурга к многоуровневой археологии Рима, образец ясен. Многие средневековые и ренессансные здания на всем континенте показывают признаки значительного погребения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСеверная Америка\u003c/strong\u003e: города по всем Соединённым Штатам, от восточного побережья к западу, содержат погребённую архитектуру. Явление особенно хорошо задокументировано в городах, которые испытали быструю \"переделку\" в конце 19-го века.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТурция и Ближний Восток\u003c/strong\u003e: Derinkuyu и другие подземные города в Каппадокии, хотя часто приписываются ранним христианам, ищущим убежище, отображают архитектурную сложность, которая поднимает серьёзные вопросы об их истинных происхождениях.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"официальные-объяснения-и-их-провалы\"\u003eОфициальные объяснения и их провалы\u003c/h2\u003e\n\u003ch3 id=\"защита-улица-поднявшаяся-по-уровню\"\u003eЗащита \"улица, поднявшаяся по уровню\"\u003c/h3\u003e\n\u003cp\u003eСамое распространённое официальное объяснение для погребённых зданий состоит в том, что города намеренно поднимали свои уровни улиц со временем. В некоторых случаях, как Сиэтл, это представлено как исторический факт. После Великого пожара Сиэтла 1889 года, город действительно поднял уровень улицы в некоторых областях. Но это объяснение лишь углубляет тайну, а не решает её.\u003c/p\u003e\n\u003cp\u003eЕсли вы поднимите уровень улицы города, вы эффективно закопаете первые этажи всех существующих зданий. Это чрезвычайно дорогой и нарушающий предприятие. Почему город за городом, в разных странах, говорящих на разных языках, под разными правительствами, все решили бы делать то же самое примерно в одно и то же историческое время? Стандартный ответ включает канализацию, предотвращение затопления или модернизацию. Но эти объяснения не объясняют единообразие явления по значительно отличающимся географическим и политическим контекстам.\u003c/p\u003e\n\u003ch3 id=\"теория-накопленного-мусора\"\u003eТеория \"накопленного мусора\"\u003c/h3\u003e\n\u003cp\u003eДругое объяснение предложено состоит в том, что столетия человеческой деятельности просто накапливают мусор, который постепенно поднимает уровень земли. Сломанная керамика, строительный отход, органический материал и пыль, как говорят, нарастают слой за слоем, пока бывшие нижние этажи становятся подвалами.\u003c/p\u003e\n\u003cp\u003eХотя есть некоторая истина в идее, что человеческое жилище создаёт слои обломков, частота накопления, наблюдаемая в археологических контекстах, обычно измеряется в сантиметрах в столетие, а не метров покрытия, найденные на многих погребённых зданиях. Здание, погребённое под двумя или тремя метрами осадка, потребовало бы тысячи лет постепенного накопления по этой модели, но многие погребённые структуры датируются периодами в хорошо в пределах последних нескольких столетий.\u003c/p\u003e\n\u003ch3 id=\"что-они-не-могут-объяснить\"\u003eЧто они не могут объяснить\u003c/h3\u003e\n\u003cp\u003eЧто не объясняет официальная теория адекватно — это консистенция самого осадка. Во многих местах, материал, покрывающий погребённые здания, поразительно однороден: прекрасное, глинистое вещество, которое не соответствует ожидаемому составу строительного мусора или естественного накопления почвы. Это выглядит, во многих случаях, гораздо больше, как эмблема, оставленная массивным событием, несущим воду, наводнением, переносящим огромные количества прекрасного осадка.\u003c/p\u003e\n\u003cp\u003eКнига Бытия, конечно, записывает просто такое событие. Хотя библейское потоп обычно помещается в далёком прошлом, физические доказательства погребённых зданий предполагают, что катастрофические события наводнения могли произойти более недавно, чем официальная шкала времени позволяет. Как Экклезиаст 1:9 говорит нам: \u003cem\u003e\"Что было, то и будет; и что делалось, то и будет делаться: и нет ничего нового под солнцем.\"\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"тематические-исследования-погребённой-архитектуры\"\u003eТематические исследования погребённой архитектуры\u003c/h2\u003e\n\u003ch3 id=\"кремль-тобольска-россия\"\u003eКремль Тобольска, Россия\u003c/h3\u003e\n\u003cp\u003eКремль Тобольска в Сибири — один из наиболее поразительных примеров погребённой архитектуры. Эта огромная каменная крепость, которая официально датируется концом 17-го и начало 18-го века, показывает безошибочные признаки значительного погребения. Окна, которые явно были предназначены для пропуска света и воздуха, теперь сидят на или ниже уровня земли. Лестницы спускаются к тому, что кажется погребёнными входами. Официальное объяснение приписывает это естественному урегулированию здания на мягкой сибирской почве, но образец слишком последователен и слишком распространён, чтобы быть объяснённым локализованными геологическими условиями.\u003c/p\u003e\n\u003ch3 id=\"подземный-город-эдинбурга\"\u003eПодземный город Эдинбурга\u003c/h3\u003e\n\u003cp\u003eПод улицами Эдинбурга, Шотландия, лежит обширная сеть камер, коридоров и комнат, известных как South Bridge Vaults. Построены в конце 18-го века как часть строительства South Bridge, эти пространства официально использовались для хранения и мастерских перед \"заброшением\" и запечатаванием. Но архитектурное качество этих подземных пространств намного превышает то, что можно было бы ожидать для простого хранилища. Сводчатые потолки, законченные стены и осторожная кладка предполагают, что они были оригинально над-земными или на уровне структурами, которые были впоследствии похоронены.\u003c/p\u003e\n\u003ch3 id=\"загадка-кафедрального-собора\"\u003eЗагадка кафедрального собора\u003c/h3\u003e\n\u003cp\u003eВозможно, самые провокационные примеры погребённой архитектуры включают церкви и соборы. По всей Европе и за её пределами, исследователи задокументировали многочисленные религиозные здания, чьи оригинальные нижние этажи теперь лежат метров под текущим уровнем улицы. В некоторых случаях, то, что туристы посещают как \"главный пол\" кафедрального собора, было фактически верхним этажом, с оригинальным нефом и святилищем похоронены под.\u003c/p\u003e\n\u003cp\u003eЭтот образец поднимает глубокие вопросы. Если эти здания были построены цивилизацией, которую нам говорили их построили, используя методы, которые нам говорили они использовали, почему они похоронены? Средневековые и ренессансные строители не были любителями. Они поняли основания, дренаж и стабильность земли. Они не проектировали величественные соборы с ожиданием того, что первый этаж будет поглощён землёй в течение нескольких столетий.\u003c/p\u003e\n\u003ch2 id=\"временная-шкала-сброса\"\u003eВременная шкала сброса\u003c/h2\u003e\n\u003ch3 id=\"что-произошло-и-когда\"\u003eЧто произошло и когда\u003c/h3\u003e\n\u003cp\u003eДоказательства погребённых зданий, взятые вместе с другими аномалиями в историческом записи, предполагают, что большое катастрофическое событие или серия событий произошла где-то между 17-м и 19-м веками. Это событие отложило огромные количества осадка по обширным областям, частично или полностью похоронив существующие структуры. Следуя этому событию, скоординированное усилие было сделано либо объяснить вдали повреждения, либо просто построить на верхней части погребённых остатков.\u003c/p\u003e\n\u003cp\u003eОбширное исследование Agent131711 на Substack (agent131711.substack.com) задокументировало многочисленные случаи, где официальное историческое повествование содержит промежутки, противоречия и невозможности, которые выравниваются с гипотезой преднамеренного прикрытия. Зданиям приписываются определённые строители, используя определённые методы на определённые даты, просто не соответствует физическим доказательствам.\u003c/p\u003e\n\u003ch3 id=\"повествование-переделки\"\u003eПовествование переделки\u003c/h3\u003e\n\u003cp\u003eОдин из наиболее подозрительных аспектов официальной истории — огромный объём \"переделки\", который якобы произошёл в 18-м и 19-м веках. Город за городом имеет официальную историю, которая включает катастрофические пожары, сопровождаемые быстрыми и впечатляющими кампаниями переделки. Чикаго, Сан-Франциско, Лондон, Москва и дюжины других крупных городов все испытали катастрофические пожары, сопровождаемые, кажется, чудесной реконструкцией.\u003c/p\u003e\n\u003cp\u003eНо что если некоторые из этих городов не были вообще \"переделаны\"? Что если они были раскопаны и переиспользованы? Погребённая архитектура предполагает, что во многих случаях, здания уже были там, покрыты осадком из катастрофического события. Повествование \"переделки\" тогда служило бы как удобное объяснение как эти структуры пришли к существованию, затемняя их истинное, до-катастрофы происхождения.\u003c/p\u003e\n\u003ch2 id=\"связь-тверди\"\u003eСвязь тверди\u003c/h2\u003e\n\u003cp\u003eБиблейский учёт сотворения описывает твердь, твёрдую куполообразную структуру, отделяющую воды выше небосвода от вод ниже (Бытие 1:6-8). Это не туманная, поэтическая метафора, которую современные богословы пытаются сделать. Еврейское слово \"raqia\" буквально означает что-то побито, избило, распространено фирму. Иов 37:18 спрашивает: \u003cem\u003e\"Не сделал ли Ты с ним небо, твёрдое, как литое зеркало?\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЕсли земля существует под твёрдой, куполообразной твердью, как Писание описывает, то катастрофические события наводнения, которые похоронили эти здания, берут на другой характер в целом. Вода, содержащая в замкнутой системе, ли от выше твердь или от \"источников великой глубины\" (Бытие 7:11), могла произвести ровно тип осадка, несущего наводнение, которое физические доказательства предполагают.\u003c/p\u003e\n\u003cp\u003eЭто понимание также связывает к более широкому образцу обмана, который характеризует современную эру. Те же учреждения, которые поддерживают сферу, вращающуюся через бесконечное пространство, — те, которые контролируют историческое повествование. Если они лгали о форме и природе земли, почему они говорили правду о его истории?\u003c/p\u003e\n\u003ch2 id=\"доказательства-они-не-могут-скрыть\"\u003eДоказательства они не могут скрыть\u003c/h2\u003e\n\u003ch3 id=\"фотографии-которые-противоречат-временной-шкале\"\u003eФотографии, которые противоречат временной шкале\u003c/h3\u003e\n\u003cp\u003eОдин из наиболее мощных категорий доказательства исходит из ранней фотографии. Фотографии с середины-к-позднему 19-му веку часто показывают здания в состояниях частичного погребения, которые трудны примирять с официальной временной шкалой. Здания якобы построены всего десятилетий ранее кажутся иметь их нижних этажей погруженными в почву. Улицы, которые якобы были \"подняты,\" показывают никакие признаки огромных инженерных проектов, которые такое предприятие потребовало бы.\u003c/p\u003e\n\u003ch3 id=\"археологические-открытия\"\u003eАрхеологические открытия\u003c/h3\u003e\n\u003cp\u003eНесмотря на лучшие усилия институциональных охранников ворот, археологические открытия продолжают раскрывать объём погребённой архитектуры. Каждый крупный проект строительства в старом городе рисков раскрытия доказательства, которое противоречит принятому повествованию. В большинстве случаев, такие открытия тихо задокументированы, приписаны какому-то невинному объяснению и забыты. Но совокупный вес этих открытий рассказывает историю, которая не может быть проигнорирована бесконечно.\u003c/p\u003e\n\u003ch3 id=\"архитектурные-доказательства\"\u003eАрхитектурные доказательства\u003c/h3\u003e\n\u003cp\u003eСами здания предоставляют, вероятно, самое сильное доказательство. Архитектурные элементы, которые были предназначены быть видимы с уровня улицы, теперь сидят под землёй. Декоративные фасады сталкиваются с твёрдой землёй. Окна, которые были предназначены пропустить свет, открываются на грязь. Это не несчастья строительства или естественного урегулирования. Они — подписи катастрофического события, сопровождаемого преднамеренным прикрытием.\u003c/p\u003e\n\u003ch2 id=\"почему-прикрытие\"\u003eПочему прикрытие?\u003c/h2\u003e\n\u003cp\u003eВопрос того, почему такое катастрофическое событие будет скрыто, — возможно, наиболее важный вопрос всех. Ответ, как много ответов в скрытой истории, приходит вниз к власти и контролю.\u003c/p\u003e\n\u003cp\u003eЦивилизация, которая не знает истинную историю, — цивилизация, которая может быть контролируема. Если население поняло, что великая и сложная цивилизация существовала перед текущей, что это было уничтожено катастрофическими событиями, и что текущая структура власти была построена на её руинах, вся рамка современного органа была бы названа в вопрос.\u003c/p\u003e\n\u003cp\u003eКак Притчи говорит нам: \u003cem\u003e\"Слава Божия скрывать вещь: но честь царей — исследовать вещь\"\u003c/em\u003e (Притчи 25:2). Погребённые здания — скрытая истина, скрытая в простой вид, ожидая тех с глазами видеть и мужество расследовать.\u003c/p\u003e\n\u003cp\u003eУчреждения, которые контролируют историческое повествование, от университетов к музеям к агентствам правительства, имеют личный интерес в сохранении текущей версии событий. Допущение, что целые города были похоронены катастрофическим событием в пределах последних нескольких столетий, будет развязывать не просто историческую временную шкалу, но власть каждого учреждения, которое зависит от этой временной шкалы для его законности.\u003c/p\u003e\n\u003ch2 id=\"писательная-рамка\"\u003eПисательная рамка\u003c/h2\u003e\n\u003cp\u003eПисание предоставляет рамку для понимания не просто что произошло, но почему это имеет значение. Библия записывает множество случаев цивилизаций, разрушённых божественным судом: потоп Ноя, разрушение Содома и Гоморры, язвы Египта. В каждом случае, разрушение служило цели: суд нечестивости и сохранение остатка.\u003c/p\u003e\n\u003cp\u003eПогребённые здания могут представить доказательство подобного образца: великая цивилизация, низложенная катастрофическим судом, сопровождаемая новым порядком, построенным на его руинах. Архитекторы этого нового порядка, а не признавая истину, выбрали выдумать историю, которая служила их интересам и затемняла их происхождения.\u003c/p\u003e\n\u003cp\u003eПоскольку мы приближаемся к то, что много верят быть концом текущей эры, истина появляется из земли, буквально и образно. Погребённые здания говорят, справедливо как Исайя пророчествовал, от пыли. И их свидетельство противоречит всему, что нам было говорено.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eЭта статья опирается на исследование первоначально опубликованное Agent131711 на Substack (agent131711.substack.com), а также первичные исходные документы, фотографические доказательства и архитектурный анализ. Явление погребённой архитектуры представляет один из наиболее значительных и недостаточно исследованных аномалий в историческом записи.\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о близком столкновении с смертью Говарда Питтмана — предупреждение о конце времён, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/121-The_Mud_Flood_Cover_Up.mp4\"\u003eThe Mud Flood Cover Up\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.z
