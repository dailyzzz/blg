их человек - это не современное изобретение. Фараон контролировал Египет. Навуходоносор управлял Вавилоном. Цезарь управлял Римом. В каждом случае небольшой класс элиты решал власть над огромными популяциями, контролируя коммерцию, информацию и механизм состояния. То, что отличает современную технологическую олигархию, - это не сосредоточение власти - это древний - а природа власти, которую они держат. Это не короли с армиями. Это технологи с платформами - строители цифровой инфраструктуры, через которую проводится современная жизнь, современная торговля трансактируется, современная коммуникация передаётся и современное наблюдение администрируется.\u003c/p\u003e\n\u003cp\u003ePayPal Mafia - неофициальная сеть основателей и ранних сотрудников PayPal, которые пошли на создание или лидирование одних из самых мощных компаний технологии в мире - представляет самый ясный пример того, как небольшая группа лиц, объединённых общей опытом и общей философией, может придти, чтобы выполнять непропорциональное влияние на управление, экономике и информационном окружении целой планеты.\u003c/p\u003e\n\u003cp\u003eКак провозглашает трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/13-The_Word_of_God.mp4\"\u003eСлово Бога\u003c/a\u003e, окончательный авторитет не принадлежит тем, кто строит платформы, но к Тому, кто говорил вселенную в существование. Технологическая олигархия командует алгоритмами. Бог командует реальностью. Отличие станет кажущимся в его полноте.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"история-происхождения-paypal-и-сеть\"\u003eИстория Происхождения: PayPal и Сеть\u003c/h2\u003e\n\u003cp\u003ePayPal была основана в декабре 1998 как Confinity Питером Тиэлем, Люком Носеком и Максом Левхиным. В марте 2000 года она объединилась с X.com, интернет-банком, основанным Илоном Маском. После борьбы за власть, Тиэль стал CEO. PayPal вошла в общественность в феврале 2002 и была приобретена eBay в октябре 2002 за 1,5 миллиарда долларов.\u003c/p\u003e\n\u003cp\u003eВыход PayPal сделал многомиллионеров его основателей и ранних сотрудников. Что более важно, он создал сеть - группу лиц с общей опытом, общим богатством, общими соединениями и общей убеждением, что технология может и должна переделать мир. Эта сеть пошла на основание, фонд или лидирование компаний, которые коллективно контролируют значительные доли глобальной техническую инфраструктуру:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПитер Тиэль\u003c/strong\u003e — Со-основатель PayPal. Основал Palantir Technologies (2003), аналитическую и наблюдательную компанию, которая стала первичным контрактором для ЦРУ, АНБ, ФБР и американского военного. Первый внешний инвестор Facebook (2004). Со-основал Founders Fund, фирму венчурного капитала, которая инвестировала в SpaceX, Airbnb, Stripe и десятки других технологических компаний. Служил на борту Facebook (Meta) до 2022.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИлон Маск\u003c/strong\u003e — Со-основатель PayPal (через объединение X.com). Основал SpaceX (2002), доминирующую приватную компанию запуска. Привёл Tesla (как председатель с 2004, CEO с 2008) к доминированию в рынке электрических транспортных средств. Приобрёл Twitter в 2022, переименовав его X. Основал Neuralink (интерфейсы мозг-компьютер), The Boring Company (подземные транспортные) и xAI (искусственный интеллект). По капитализации рынка и личному богатству, Маск в моменты был самым богатым человеком в человеческой истории.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРейд Хоффман\u003c/strong\u003e — Ранний руководящий PayPal. Со-основал LinkedIn (2002), крупнейшую профессиональную сеть мира (приобретена Microsoft за 26,2 миллиарда долларов в 2016). Член борта Microsoft. Главный инвестор в многочисленные технологические компании через Greylock Partners.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЧад Хурли, Стив Чен и Джоуд Карим\u003c/strong\u003e — Сотрудники PayPal, которые со-основали YouTube (2005), доминирующую видеоплатформу мира (приобретена Google за 1,65 миллиарда долларов в 2006). YouTube обрабатывает более 500 часов видео загрузков в минуту и является первичным источником информации для сотен миллионов людей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДжереми Стоппельман и Рассель Саймонс\u003c/strong\u003e — Сотрудники PayPal, которые со-основали Yelp (2004), доминирующую платформу обзора локального бизнеса.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДэвид Сакс\u003c/strong\u003e — PayPal COO. Со-основал Yammer (энергосистемная социальная сеть, приобретена Microsoft за 1,2 миллиарда долларов). Основал Craft Ventures. Служил в администрации Трампа как Белый Дом AI и Crypto Czar.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКейт Рабойс\u003c/strong\u003e — Руководитель PayPal. Служил как COO Square (теперь Block), исполнитель в LinkedIn, партнер инвестиций в Founders Fund и Khosla Ventures. Со-основал Opendoor.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКен Хауэрі\u003c/strong\u003e — Со-основатель PayPal. Со-основал Founders Fund с Тиэлем. Служил как американский посланник Швеции под Трампом.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРойлоф Ботха\u003c/strong\u003e — PayPal CFO. Управляющий партнёр у Sequoia Capital, одной из наиболее влиятельных фирм венчурного капитала в мире.\u003c/p\u003e\n\u003cp\u003ePayPal Mafia - это не просто группа успешных предпринимателей. Это сеть, которая коллективно контролирует или значительно влияет: доминирующую компанию электрических транспортных средств (Tesla), доминирующую приватную компанию космоса (SpaceX), доминирующую профессиональную социальную сеть (LinkedIn), доминирующую видеоплатформу (YouTube), главную платформу социальных средств (X/Twitter), наиболее мощную компанию наблюдения аналитики (Palantir), передовое разработке интерфейса мозг-компьютер (Neuralink) и массивные портфели венчурного капитала, которые финансируют следующее поколение технологических компаний.\u003c/p\u003e\n\u003cp\u003eЭто не конкурентивный рынок. Это сеть - и члены сети разделяют философские обязательства, политические альянсы и отношения бизнеса, которые концентрируют власть далеко за то, что какая-либо отдельная компания представляет.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"palantir-видящий-камень\"\u003ePalantir: Видящий Камень\u003c/h2\u003e\n\u003cp\u003eИз всех сотворений PayPal Mafia, Palantir Technologies наиболее прямо служит архитектуре наблюдения и контроля. Основана Питером Тиэлем, Алексом Карпом, Джо Лонсдейлем, Стивеном Кохеном и Натаном Гэттинглсом в 2003 году, имя Palantir происходит из \"видящих камней\" в \"Властелине Кольцо\" Дж.Р.Р. Tolkien - объекты, которые позволили своим пользователям видеть через большие расстояния и наблюдать события в любом месте мира.\u003c/p\u003e\n\u003cp\u003eЛитературное ссылка подходит. Программная платформа Palantir объединяет данные из несовместимых источников - баз данных, систем наблюдения, записей коммуникаций, финансовых операций, социальных средств и любого другого источника данных - в единую аналитическую основу. Платформа позволяет её пользователям идентифицировать паттерны, соединения и отношения через массивные наборы данных, которые были бы невидимы человеческим аналитикам.\u003c/p\u003e\n\u003cp\u003eНачальное финансирование Palantir пришло от In-Q-Tel - венчурного капитала ЦРУ. Первым главным клиентом компании была разведывательная сообщество, и его программное обеспечение было инструментальным в антитеррористических операциях ЦРУ. Платформа Gotham платформ используется ЦРУ, АНБ, ФБР, DHS, армией США, ВВС, Военно-морским флотом, морскими пехотинцами и командованием специального операций. Её платформа Foundry используется корпоративными клиентами, включая Airbus, BP, Fiat Chrysler и многие компании здравоохранения.\u003c/p\u003e\n\u003cp\u003eРоль компании в правительстве наблюдение экстраординарна. Программное обеспечение Palantir использовалось ICE (Иммиграционной и таможенной деятельностью) для отслеживания и местоположения недокументированных иммигрантов. Оно использовалось АНБ для анализа метаданных коммуникаций. Оно использовалось полицейскими отделениями для предсказательного полицинга - идентификации лиц как потенциальных преступников, прежде чем они совершили преступления, основанные на паттернах данных.\u003c/p\u003e\n\u003cp\u003ePalantir вошли в общественность в 2020 при оценке примерно 22 миллиарда долларов. К 2024 году его капитализация рынка превысила 60 миллиардов долларов. Сотворение Тиэля стало одной из наиболее ценных технологических компаний в мире - и его ценность полностью происходит из его ёмкости для включения наблюдения, анализа и контроля в масштабах, которые были ранее невозможны.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"илон-маск-наиболее-мощный-неизбранный-человек\"\u003eИлон Маск: Наиболее Мощный Неизбранный Человек\u003c/h2\u003e\n\u003cp\u003eНакопление Маска власти через множественные домены - транспортные (Tesla), космос (SpaceX), связь (Starlink), социальные средства (X/Twitter), интерфейсы мозг-компьютер (Neuralink), искусственный интеллект (xAI), подземная инфраструктура (The Boring Company) и энергия (Tesla Powerwall, Solar City) - представляет сосредоточение технологической власти в одном человеке, которое не имеет исторического прецедента.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSpaceX и Starlink.\u003c/strong\u003e SpaceX является доминирующим поставщиком запуска для NASA и американского военного. Его созвездие спутника Starlink - более 5000 спутников, обеспечивающих глобальное покрытие интернета - является первая приватная глобальная сеть коммуникаций. Starlink было развёрнуто в Украине во время конфликта России-Украины, обеспечивая важную инфраструктуру коммуникаций. Решение включить или отключить Starlink в зоне конфликта - это геополитическое решение - и то решение покоится с одним человеком. Ни один приватный гражданин в истории не контролировал глобальную инфраструктуру коммуникаций с военным значением.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNeuralink.\u003c/strong\u003e Компания интерфейса мозг-компьютер Маска получила одобрение FDA для человеческих испытаний в 2023 году и имплантировала её первый человеческий чип в январе 2024 года. Миссия Neuralink заявлена должна включить \"симбиоз между людьми и искусственным интеллектом\" - прямое соединение человеческого мозга к цифровым сетям. Последствия для наблюдения, контроля и изменения человеческого сознания находятся за расчётом.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eX/Twitter.\u003c/strong\u003e Приобретение Маском Twitter за 44 миллиарда долларов в 2022 дало ему контроль одной из наиболее влиятельных платформ коммуникаций мира. Его следующие решения - переустановка запретанных счётов, выпуск Twitter Files, настройки политики модерации контента, реализации алгоритмических изменений - продемонстрировали экстраординарную власть, что собственность платформы предоставляет информационному окружению.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнтегрирование правительства.\u003c/strong\u003e Отношение Маска с американским правительством под администрацией Трампа включило возглавляющие Отдел Государственной Эффективности (DOGE), давая ему влияние по федеральным расходам, государственной технологии и бюрократической реформе. Контракты SpaceX с NASA и Департаментом обороны создают финансовые зависимости между правительством и компаниями Маска. Субсидии Tesla электрического транспортного средства, нормативно-правовой путь Neuralink и контракты запуска SpaceX все требуют сотрудничества правительства - создавая взаимный рычаг между Маском и государством.\u003c/p\u003e\n\u003cp\u003eВопрос - это не то, благодетелен ли Маск или вреден. Вопрос - это то, должен ли какой-либо человек держать это сосредоточение власти - над коммуникациями, транспортом, доступом космоса, разработке AI, технологии нейрального интерфейса и государственной эффективности - независимо от их намерений. Ответ, из конституциональной и библейской перспективы, - нет. \"Не полагайтесь на принцев\" применяется к технологическим принцам столь конечно, как к политическим.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"идеология-технологический-либертариализм-и-трансгуманизм\"\u003eИдеология: Технологический Либертариализм и Трансгуманизм\u003c/h2\u003e\n\u003cp\u003ePayPal Mafia разделяет философскую основу, которая объединяет либертарианскую экономику с трансгуманистской амбицией. Эта идеология, сформулированная наиболее явно Тиэлем и Маском, владеет, что:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТехнология - первичный водитель человеческого прогресса.\u003c/strong\u003e Не Бог, не сообщество, не моральное развитие - технология. Решение каждой человеческой проблемы - это технологическое решение. Болезнь решена биотехнологией. Смерть решена жизненными расширениями. Бедность решена экономическими платформами. Одиночество решено социальными сетями. Смысл решен интерфейсами мозг-компьютер, которые оптимизируют нейротрансмиттерные уровни.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравительство - препятствие прогрессу.\u003c/strong\u003e Традиционное управление - демократическое, медленное, ограниченное конституцией и согласием - помешает технологическому преобразованию, которое олигархи предвидят. Тиэль написал: \"я больше не полагаю, что свобода и демократия совместимы.\" Это не случайное примечание. Это философская позиция: демократический процесс - это слишком медленный и слишком послушный общественному мнению для реализации трансформативных изменений, которые технология делает возможными. Поэтому демократия должна быть обойдена - через технологические платформы, работающие выше национального управления, через приватные компании, которые доставляют государственные услуги без государственной подотчётности и через сосредоточение власти принятия решения в руках тех, кто понимает технологию.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЧеловечество - переходный вид.\u003c/strong\u003e Трансгуманистический элемент идеологии PayPal Mafia содержит, что биологическое человечество - это предварительный этап в эволюционном процессе, которое кульминирует в объединении людей с технологией. Neuralink Маска, инвестирования Тиэля в исследование расширения жизни и более широкое Silicon Valley преследование искусственного генерального интеллекта - все исходят из предположения, что человечество как в настоящее время составлено - это неполное - и что технология завершит то, что биология не может.\u003c/p\u003e\n\u003cp\u003eЭто показание змеи в цифровой форме: \"Ye shall быть как боги.\" Не через духовное преобразование, не через моральное развитие, не через отношение с Создателем - но через технологическое расширение. Видение техно-олигархии фундаментально люцифер: возвышение человеческой способности за её созданные ограничения через применение знания, полученного вне Божьей признанной основы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"капитализм-наблюдения-бизнес-модель\"\u003eКапитализм Наблюдения: Бизнес-Модель\u003c/h2\u003e\n\u003cp\u003ePayPal Mafia компании не просто продают продукты. Они извлекают данные. Эти данные - о поведении, предпочтениях, отношениях, движениях, покупках, коммуникациях и психологических состояниях - является сырьем того, что гарвардский профессор Шошана Зубофф вызывает \"капитализм наблюдения\": экономическая система, в которой человеческий опыт добывается для данных, данные обрабатываются в предсказания поведения и предсказания продаются тем, кто желает изменить поведение.\u003c/p\u003e\n\u003cp\u003eКаждое взаимодействие с продуктом PayPal Mafia генерирует данные:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTesla\u003c/strong\u003e знает, где вы управляете, как быстро, какую музыку вы играете, что вы говорите в машине (через микрофоны) и что происходит вокруг машины (через камеры). Транспортные средства Tesla - это мобильные платформы наблюдения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSpaceX/Starlink\u003c/strong\u003e маршруты трафик интернета через спутники, контролируемые Маском. Потенциал для наблюдения коммуникаций неотделим от инфраструктуры.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eX/Twitter\u003c/strong\u003e знает, что вы читаете, что вы разделяете, что вы нравитесь, кого вы следуете и что вы говорите. Платформа профилирует пользователей психологически и продаёт профили рекламодателям.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLinkedIn\u003c/strong\u003e знает вашу профессиональную историю, вашу навык, вашу сеть, вашу карьеру аспирации и вашу профессиональную коммуникацию.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eYouTube\u003c/strong\u003e знает, что вы смотрите, как долго вы смотрите, что вы ищете и какое содержание вы создаёте. Его рекомендательный алгоритм — который определяет, что более 2 миллиардов пользователей видят — формирует восприятие на масштабе, неувязанном никакой пропагандой в истории.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePalantir\u003c/strong\u003e объединяет все этот данные - и больше - в аналитические основы, которые включают правительство и корпоративные клиенты, чтобы мониторить, предсказать и изменить человеческое поведение.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eМодель капитализма наблюдения означает, что компании PayPal Mafia - это не просто компании. Они - операции извлечения данных, чьи продукты - психологические профили миллиардов человеческих существ. Пользователи - это не клиенты. Они - сырье.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"слияние-правительства-технологии\"\u003eСлияние Правительства-Технологии\u003c/h2\u003e\n\u003cp\u003eРазличие между государственной компанией и технологией - между государством и приватным сектором - растворилось в пределах домена PayPal Mafia. Слияние работает в обоих направлениях:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТехнология к правительству.\u003c/strong\u003e Члены PayPal Mafia и связи держат государственные позиции: David Sacks как Белый дом AI и Crypto Czar, Ken Howery как американский посланник, Маск возглавляет DOGE. Венчурные капиталовские инвестиции сети формируют, какие технологии получают финансирование и какие - нет — решения с последствиями политики, которые соперничают с теми, кто государственных агентств.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравительство к технологии.\u003c/strong\u003e SpaceX получает миллиарды в контрактах правительства. Бизнес-модель Palantir зависит от контрактов разведывательного правительства. Tesla выполняет из государственных субсидий электрического транспортного средства и нормативно-правовой основы. Финансовая жизнеспособность компаний переплетена с государственной политикой - создавая стимулы к формованию той политики через лоббирование, взносы кампании и вращающуюся дверь между промышленностью и государством.\u003c/p\u003e\n\u003cp\u003eЭто - не влияние лоббистов, толкающих благоприятное законодательство. Это - структурное слияние технологической способности и государственной власти — создание государственно-приватной системы управления, в которой решения о коммуникациях, транспортации, наблюдении и разработке AI делаются ни избранными должностными лицами ни по силам рынка, но по сети физических лиц, которые работают через обе домены одновременно.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-отражение-строители-которые-забыли-основание\"\u003eБиблейское Отражение: Строители, Которые Забыли Основание\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Если Господь не созидает дома, то напрасно трудятся строящие его; если Господь не охраняет города, то напрасно бодрствует охраняющий его.\" — Psalm 127:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003ePayPal Mafia строила чудесные вещи - платформы, которые соединяют миллиарды, транспортные средства, которые преобразуют транспортировку, ракеты, которые достигают орбиты, спутники, которые охватывают земной шар. Но Писание спрашивает другой вопрос, чем \"Что вы построили?\" Это спрашивает \"На каком основании?\" Дом, построенный без Божьего основания — невзирая на его впечатляющую архитектуру — построен напрасно.\u003c/p\u003e\n\u003cp\u003eТехнологическая олигархия строит на основании человеческой способности, человеческого интеллекта и человеческой амбиции. Она строит в сторону видения человечества, которое требует никакого Бога — человечество увеличено технологией, соединённое сетями, управляемое алгоритмами и превосходящее его биологические ограничения через инженерию. Это — Башня Вавилон переостроена с лучшими материалами — та же амбиция, та же гордость, то же отказа признать, что человеческая способность имеет ограничения, которые — это не проблемы быть исправленными, но границы быть уважаемыми.\u003c/p\u003e\n\u003cp\u003eСосредоточение власти в руках горстку — невзирая на как блестяще, невзирая на то, как инновационно — это структура, которую Писание последовательно идентифицирует как опасный. \"Сердце царя в руке Господа, как потоки воды; Он направляет его, куда Ему угодно\" (Притчи 21:1). Бог излучает сердца правителей. Но технологические олигархи строят системы разработанные быть за Божьим управлением — автономным AI, глобальными сетями, интерфейсы мозг-компьютер, которые обходят душу. Они строят не просто платформы, но подделанное королевство — технологическое господство, которое стремится заменить господство, которое Бог дал человечество над землёй с господством, что несколько людей оказывают над всеми другими людьми через технологию.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство NDE Говарда Питтмана — Предупреждение Конца Времён, которое Ему Дал Бог\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолический Конфиденциально: Позорные Секреты Иезуитов Разоблачены\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедецид и Фармакея — Колдовство Современной Медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в Подвале Ватикана Может Вас Шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, Пока Читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/159-PayPal_Mafia_Blues.mp4\"\u003ePayPal Mafia Blues\u003c/a\u003e — Истоки олигархии технологии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/157-Palantir_Panopticon.mp4\"\u003ePalantir Panopticon\u003c/a\u003e — Империя капитализма наблюдения\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте Дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/deep-state-permanent-government/?lang=ru\"\u003eГлубинное Государство: Постоянное Правительство Америки\u003c/a\u003e — Как способность наблюдения олигархии технологии объединяется с инфраструктурой контроля постоянного правительства\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/censorship-industrial-complex/?lang=ru\"\u003eЦензурный Промышленный Комплекс: Как Свободное Словоговорение Умерло\u003c/a\u003e — Как собственность платформы переводит в контроль информации в масштабе, что правительство цензура наедине никогда не могла достичь\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eСтроители Вавилона были объединены амбицией. PayPal Mafia объединяется сетью. Оба стремились построить системы, которые концентрировали бы власть, превосходили человеческие ограничения и пот
