ому лучше было бы, если бы повесили ему мельничный жернов на шею и потопили его в глубине морской.\"\u003c/em\u003e Нет неоднозначности в этом предупреждении — те, кто вредит детям, столкнутся с самым суровым судом.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003cem\u003eCain and Abel\u003c/em\u003e напоминает нам, что насилие над невинными присутствует с ранних дней человеческой истории. Убийство Каином своего брата Авеля установило образец могущественного, уничтожающего уязвимое из ревности, алчности и зла. Сети, которые мы исследуем в этой статье, представляют наследие Каина в полном масштабе — системы, предназначенные для эксплуатации наиболее уязвимых ради выгоды наиболее могущественных.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eThe Enemy Within\u003c/em\u003e говорит о реальности, что развращение не всегда приходит извне — оно проникает в учреждения, которые должны защищать. Когда сами агентства, ответственные за национальную безопасность, становятся инструментами эксплуатации детей, мы видим исполнение Исаии 5:20: \u003cem\u003e\"Горе тем, которые называют зло добром, и добро злом, которые тьму полагают светом и свет тьмою.\"\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пересечение-разведки-и-эксплуатации\"\u003eПересечение разведки и эксплуатации\u003c/h2\u003e\n\u003ch3 id=\"за-фасадом-playboy\"\u003eЗа фасадом Playboy\u003c/h3\u003e\n\u003cp\u003eВ Части 1 мы установили, что особняк Playboy служил связанной с ЦРУ операцией наблюдения и медовой ловушки. В этом выпуске мы сталкиваемся с более тёмным измерением — документально подтвёрнными связями между сетью Playboy и организованными кольцами педофилов, служившими целям разведки.\u003c/p\u003e\n\u003cp\u003eЛогика, хотя отвратительна, стратегически когерентна. Если сексуальный компромисс взрослых создает контролируемые активы, то компромисс физических лиц через вовлечение с несовершеннолетними создает активы, которые полностью и абсолютно контролируемы. Политик, поймавший во внебрачном романе, сталкивается с смущением. Политик, пойманный в эксплуатации детей, сталкивается с уголовным преследованием, социальным уничтожением и возможным насилием со стороны общественности. Рычаг давления абсолютен.\u003c/p\u003e\n\u003cp\u003eИсследования, собранные на Substack Agent131711 (agent131711.substack.com), документировали, как эта эскалация от медовых ловушек для взрослых к детской эксплуатации не была аберрацией, а преднамеренной операционной стратегией. Разведывательное сообщество рано признало, что наиболее надежной формой шантажа является наиболее табуированная форма компромисса.\u003c/p\u003e\n\u003ch3 id=\"дело-крейга-спенса\"\u003eДело Крейга Спенса\u003c/h3\u003e\n\u003cp\u003eОдин из наиболее документированных пересечений операций разведки и педофильных сетей затрагивал Крейга Спенса, лоббиста Вашингтона и политического деятеля. В 1989 году Washington Times опубликовала серию взрывных статей, раскрывающих, что Спенс управлял кольцом мальчиков, поставляющих несовершеннолетних видным вашингтонским фигурам, включая должностных лиц Белого дома.\u003c/p\u003e\n\u003cp\u003eСпенс открыто хвастался своими связями с ЦРУ и утверждал, что его операции служили целям разведки. Он проводил позднечные туры Белого дома для своих ассоциированных и их несовершеннолетних спутников — факт, подтвёрнный журналами Секретной службы, которые позже были получены следователями.\u003c/p\u003e\n\u003cp\u003eРасследование было систематически подавлено. Спенс был найден мёртв в номере отеля в Бостоне в ноябре 1989 года, официально признано самоубийством. Записка, которую он оставил, судя по всему, гласила: \"Спросите себя, кто действительно убил меня\". Дела против его клиентов были отклонены, следователи переведены, и история исчезла из освещения в основных СМИ в течение недель.\u003c/p\u003e\n\u003ch3 id=\"прикрытие-franklin\"\u003eПрикрытие Franklin\u003c/h3\u003e\n\u003cp\u003eСкандал с кредитным союзом Franklin в Омахе, Небраска, представляет, возможно, наиболее тщательно задокументированный случай связанной с правительством педофильной сети в американской истории. Лоуренс Кинг, глава кредитного союза Franklin и восходящая республиканская политическая фигура, был обвинён в управлении кольцом детской проституции, обслуживавшим влиятельных политических деятелей в Вашингтоне.\u003c/p\u003e\n\u003cp\u003eНесколько жертв предоставили последовательные, подробные описания транспортировки в Вашингтон на вечеринки, где они подвергались сексуальному насилию видными политиками, бизнесменами и военными деятелями. Жертвы назвали конкретные лица, описали конкретные места и предоставили детали, которые были независимо подтверждены.\u003c/p\u003e\n\u003cp\u003eБывший сенатор штата Небраска Джон ДеКемп тщательно задокументировал дело в своей книге \"The Franklin Cover-Up\". ДеКемп, украшенный ветеран Вьетнама и бывший сотрудник ЦРУ, описал систематическое усилие подавить расследование:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eГлавный следователь, Гэри Карадори, погиб в загадочной авиакатастрофе при перевозке доказательств обратно в Небраску.\u003c/li\u003e\n\u003cli\u003eЖертвы, дающие показания, были привлечены к ответственности за лжесвидетельство, а не их насильники за преступления.\u003c/li\u003e\n\u003cli\u003eРасследование ФБР было направлено должностными лицами, которые сами были названы жертвами.\u003c/li\u003e\n\u003cli\u003eДокументальный фильм, произведённый для канала Discovery — \"Conspiracy of Silence\" — был снят с трансляции в последний момент, и копии были приказаны уничтожить.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСвязи между сетью Franklin и разведывательным сообществом были обширны. Кинг имел задокументированные отношения с фигурами, связанными с ЦРУ, и операции сети несли признаки управляемой разведкой системы компромисса.\u003c/p\u003e\n\u003ch2 id=\"связь-playboy\"\u003eСвязь Playboy\u003c/h2\u003e\n\u003ch3 id=\"общие-сети-и-общий-персонал\"\u003eОбщие сети и общий персонал\u003c/h3\u003e\n\u003cp\u003eСвязи между операцией Playboy и педофильными сетями были не только тематическими — они включали общий персонал, общие методы и общую институциональную защиту. Несколько людей, работавших в орбите Playboy, впоследствии были связаны с расследованиями детской эксплуатации.\u003c/p\u003e\n\u003cp\u003eПодробное исследование на Substack Agent131711 раскрывает, что списки гостей особняка Playboy значительно пересекались с именами, появившимися в нескольких расследованиях педофильных сетей. Это пересечение не было случайным — оно отражало общую операционную инфраструктуру, служившую нескольким целям разведки.\u003c/p\u003e\n\u003cp\u003eОсобняк служил начальной точкой компромисса — местом, где цели могли быть введены в всё более компрометирующие ситуации. Те, кто доказал готовность пересечь определённые линии, затем были переведены в более экстремальные формы компромисса, включая участие с несовершеннолетними. Этот процесс эскалации гарантировал, что наиболее послушные и контролируемые активы были выявлены и развиты.\u003c/p\u003e\n\u003ch3 id=\"роль-сетей-поставок\"\u003eРоль сетей поставок\u003c/h3\u003e\n\u003cp\u003eЗа каждой операцией медовой ловушки стоит сеть поставок — люди и организации, ответственные за поставку жертв. В случае связанных с Playboy операций эти сети черпали из уязвимых групп населения: беглецы, дети в приёмных семьях, дети в учреждениях и несовершеннолетние из обнищённых общин.\u003c/p\u003e\n\u003cp\u003eСети поставок работали через серию посредников, которые отделяли контролёров разведки от прямого участия. Модельные агентства, скауты талантов, молодёжные организации и даже агентства по защите детей были инфильтрированы или сопровождены для обеспечения доступа к уязвимым молодым людям.\u003c/p\u003e\n\u003cp\u003eДети, вошедшие в эти сети, были систематически приговорены через процесс, который начинался с подарков, внимания и кажущейся заботы, затем эскалировался к наркотизации, сексуальной эксплуатации и контролю через травму. Те, кто выжил и попытался говорить, были дискредитированы, преследованы или устранены.\u003c/p\u003e\n\u003ch2 id=\"защитная-инфраструктура\"\u003eЗащитная инфраструктура\u003c/h2\u003e\n\u003ch3 id=\"как-сети-пережили-разоблачение\"\u003eКак сети пережили разоблачение\u003c/h3\u003e\n\u003cp\u003eВозможно, наиболее тревожный аспект связанных с правительством педофильных сетей — это не их существование, а их стойкость. Несмотря на множественные расследования, показания свидетелей и даже освещение в основных СМИ, эти сети последовательно пережили разоблачение и продолжили работу.\u003c/p\u003e\n\u003cp\u003eЗащитная инфраструктура включает несколько переплетающихся элементов:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКомпромисс правоохранения:\u003c/strong\u003e Ключевые позиции в агентствах федерального правоохранения занимают люди, которые сами скомпрометированы или служат интересам операторов сети. Расследования, угрожающие разоблачению сетей, перенаправляются, урезаются бюджеты или классифицируются по причинам национальной безопасности.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСудебная защита:\u003c/strong\u003e Судьи, являющиеся частью системы компромисса, гарантируют, что дела против операторов сети отклоняются, что ордера на обыск отрицаются и что свидетели перемен сталкиваются с правовыми последствиями, а не их обвинители.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодавление средств массовой информации:\u003c/strong\u003e Та же инфраструктура контроля средств массовой информации, установленная через Operation Mockingbird, гарантирует, что истории, разоблачающие педофильные сети, получают минимальное освещение, изображаются как теории заговора или похоронены под конкурирующими информационными циклами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПолитическая защита:\u003c/strong\u003e Компрометированные политики на всех уровнях правительства используют своё влияние для защиты сетей, которые их контролируют. Это создаёт саморазвивающуюся систему, в которой люди, которые должны расследовать эти преступления, вместо этого их прикрывают.\u003c/p\u003e\n\u003ch3 id=\"классификация-национальной-безопасности\"\u003eКлассификация национальной безопасности\u003c/h3\u003e\n\u003cp\u003eОдин из самых мощных инструментов, используемых для защиты педофильных сетей, — это система классификации. Когда расследования начинают раскрывать связи разведки, доказательства классифицируются по причинам национальной безопасности. Это не позволяет следователям, прокурорам и общественности получить доступ к документации, необходимой для преследования дел.\u003c/p\u003e\n\u003cp\u003eАргумент всегда один и тот же: раскрытие этих операций скомпрометирует источники и методы разведки, угрожая национальной безопасности. На практике единственная \"национальная безопасность\", защищаемая, — это безопасность самой системы шантажа.\u003c/p\u003e\n\u003cp\u003eЭто злоупотребление системой классификации было задокументировано при слушаниях комитета Церкви, расследованиях Iran-Contra и многочисленных других случаях, когда разведывательные агентства использовали секретность для сокрытия незаконной деятельности. Паттерн последователен: уголовное поведение скрывается за щитом национальной безопасности, и тот, кто подвергает сомнению эту секретность, обвиняется в угрозе нации.\u003c/p\u003e\n\u003ch2 id=\"связь-kinsey\"\u003eСвязь Kinsey\u003c/h2\u003e\n\u003ch3 id=\"нормализация-немыслимого\"\u003eНормализация немыслимого\u003c/h3\u003e\n\u003cp\u003eИнтеллектуальная основа, которая позволила толерировать связанные с правительством педофильные сети, была установлена десятилетиями раньше через работу Альфреда Kinsey. Как задокументировано в нашем освещении развращения Kinsey, исследование Kinsey — финансируемое Rockefeller Foundation и принятое разведывательным сообществом — систематически работало над нормализацией контакта взрослого с ребёнком.\u003c/p\u003e\n\u003cp\u003e\"Sexual Behavior in the Human Male\" Kinsey (1948) включал данные, которые могли быть получены только посредством систематического полового насилия над детьми, включая младенцев. Таблицы данных, документирующие \"оргазмические ответы\" детей в возрасте от пяти месяцев, представляют уголовное доказательство организованного детского насилия, проводимого под прикрытием академических исследований.\u003c/p\u003e\n\u003cp\u003eИнтерес разведывательного сообщества к работе Kinsey был не академическим. Его исследование предоставило псевдонаучную основу для систем эксплуатации, разрабатывавшихся одновременно. Если контакт между взрослым и ребёнком мог быть представлен как естественный и даже благотворный, то эксплуатация детей в операциях разведки могла быть рационализирована, и участники могли быть уверены, что они не причиняют настоящий вред.\u003c/p\u003e\n\u003cp\u003eЭта кампания нормализации продолжалась через сам журнал Playboy, который публиковал статьи и интервью, продвигающие находки Kinsey и выступающие за ослабление законов о возрасте согласия. Журнал служил культурным вектором самой идеологии, которая позволяла сетям эксплуатации работать с молчаливого одобрения культурной элиты.\u003c/p\u003e\n\u003ch2 id=\"задокументированные-случаи-и-паттерны\"\u003eЗадокументированные случаи и паттерны\u003c/h2\u003e\n\u003ch3 id=\"последовательная-методология\"\u003eПоследовательная методология\u003c/h3\u003e\n\u003cp\u003eВо многих расследованиях, охватывающих несколько десятилетий, последовательная методология появляется в том, как работают связанные с правительством педофильные сети:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВербовка:\u003c/strong\u003e Дети выявляются через учреждения, служащие уязвимым группам — системы опеки, групповые дома, учреждения по содержанию в ЮИД и обнищённые сообщества.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПриручение:\u003c/strong\u003e Выбранные дети постепенно вводятся в сексуальные ситуации через процесс дарения подарков, построения доверия, наркотизации и эскалирующегося насилия.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eРазвёртывание:\u003c/strong\u003e Приученные дети становятся доступны для целевых лиц в контролируемых местоположениях — вечеринках, ретритах и частных собраниях, где оборудование наблюдения фиксирует компрометирующую деятельность.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eКонтроль:\u003c/strong\u003e Полученные видеозаписи и документация используются для гарантии пожизненного соответствия компрометированных лиц, которые затем служат интересам контролёров сети.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eУтилизация:\u003c/strong\u003e Дети, пережившие свою полезность, ставшие слишком старыми, развившие проблемы с наркотиками или угрожающие разоблачить сеть, отбрасываются, помещаются в учреждения, заключаются в тюрьму или устраняются.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭта методология была задокументирована в деле Franklin, деле Spence, деле Finders (рассмотренном отдельной статьей в этой серии) и многочисленных других расследованиях, которые были систематически подавлены.\u003c/p\u003e\n\u003ch3 id=\"свидетельства-выживших\"\u003eСвидетельства выживших\u003c/h3\u003e\n\u003cp\u003eПоказания выживших предоставляют наиболее убедительное доказательство операций этих сетей. Несмотря на агрессивные усилия по дискредитации и молчанию, многочисленные выжившие предоставили подробные, последовательные описания, которые коррелируют друг с другом и совпадают с независимо задокументированными доказательствами.\u003c/p\u003e\n\u003cp\u003eОбщие элементы в показаниях выживших включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eТранспортировку в Вашингтон, Нью-Йорк и другие центры власти для \"вечеринок\", посещаемых узнаваемыми политическими и деловыми фигурами\u003c/li\u003e\n\u003cli\u003eПрисутствие военного и разведывательного персонала на событиях эксплуатации\u003c/li\u003e\n\u003cli\u003eИспользование наркотиков, предназначенных для недееспособности жертв и нарушения памяти\u003c/li\u003e\n\u003cli\u003eКинопроизводство и фотографирование насилия для последующего использования\u003c/li\u003e\n\u003cli\u003eУгрозы насилия и смерти в отношении жертв и их семей в случае разговора\u003c/li\u003e\n\u003cli\u003eУчастие сотрудников правоохранения как как участников, так и защитников\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПоследовательность этих описаний между различными жертвами, различными периодами времени и различными географическими местоположениями предоставляет мощное коррелятивное доказательство того, что систематическая организованная сеть работала десятилетиями.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"ритуальные-элементы\"\u003eРитуальные элементы\u003c/h3\u003e\n\u003cp\u003eМножество выживших описали ритуальные элементы в насилии, которое они испытали — элементы, которые соединяют сети эксплуатации с оккультными практиками. Хотя основной анализ обычно отклоняет эти описания, библейское мировоззрение предоставляет основу для их понимания.\u003c/p\u003e\n\u003cp\u003eЕфесяне 6:12 напоминает нам: \u003cem\u003e\"Ибо наша брань не против крови и плоти, но против начальств, против властей, против мироправителей тьмы века сего, против духов злобы поднебесных.\"\u003c/em\u003e Эксплуатация детей — не просто преступление — это духовное оскорбление, служащее целям противника.\u003c/p\u003e\n\u003cp\u003eСвязь между операциями разведки, педофильными сетями и оккультными практиками не случайна. Она отражает духовную реальность, которая управляет этими системами — реальность, которую Писание описывает ясно и которую современный мир был обусловлен отклонять.\u003c/p\u003e\n\u003cp\u003eПод куполом твёрдого неба, где падшие ангелы остаются в заточении до их назначенного времени (тема, исследуемая через многочисленные пророческие источники), эти сети служат земными проявлениями духовного зла. Эксплуатация невинности — это приношение властям, которые большинство отказываются признавать существующими.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eДля полной документации случаев, обсуждаемых в этой статье, включая государственные документы, судебные записи и показания выживших, см. архив исследований на Substack Agent131711 (agent131711.substack.com). Пророческий контекст для понимания духовных измерений институционального детского насилия исследуется на блоге пророчеств The Master's Voice.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушай голоса народа во всём, что они говорят тебе; ибо не тебя они отвергли, а отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 раздаётся в каждом коридоре правительства сегодня. Когда Израиль требовал царя, как у других народов, Бог предупредил их, что произойдёт в точности — их сыновья взяты на войну, их дочери на службу, их поля и виноградники захвачены, десятина всего конфискована. Они выбрали человеческое правительство над царством Бога, и тирания следовала в точности, как предсказано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — слева и справа, республиканец и демократ — всё служит одной скрытой силе. Голосование за одну сторону — это выбор того, какое крыло взмахнёт следующим, пока птица летит в том же направлении. Реальная власть никогда не была на бюллетене.\u003c/p\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-D
