003cp\u003eРабство не было отменено. Оно было переклассифицировано. Цепи больше не из железа — они финансовые. Плантация больше не поле — это экономика. Хозяин больше не человек с кнутом — это система налогообложения, долга и денежного контроля, которая извлекает труд 330 миллионов американцев, сохраняя иллюзию свободы.\u003c/p\u003e\n\u003cp\u003eПредсмертный опыт Говарда Питтмана показал, что духовное закабаление проявляется через материальные системы. Три неба. Демоническая иерархия. 97,5% отвергнуты. 95% занимаются само-служением. Каждое слово судится (Матфея 12:36-37). Американская налоговая система - одна из самых изощренных систем закабаления в истории — система, которая берет вашу работу, ваше время, вашу жизненную энергию, говоря вам, что вы свободны.\u003c/p\u003e\n\u003cp\u003eИезуиты — военная организация Лойолы, \"абсолютная власть\" Наполеона, Тамбурини, управлявший \"всем миром\" — разработали институциональные рамки, через которые работает современное финансовое закабаление. \u003cem\u003eКатолические конфиденциальные сведения\u003c/em\u003e раскрывают проникновение, \"скрытое хитростью\", слепое послушание, \"каждый вид порока\". Американская финансовая система работает по тем же принципам: невидимая власть (Федеральный резервный банк), обязательное соответствие (IRS) и ликвидация альтернатив (война с наличностью, регулирование крипто).\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eИзгнаны из рая — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМаскировка сатаны — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"современная-плантация\"\u003eСовременная плантация\u003c/h2\u003e\n\u003ch3 id=\"общее-налоговое-бремя\"\u003eОбщее налоговое бремя\u003c/h3\u003e\n\u003cp\u003eФедеральный подоходный налог — только начало. Общее налоговое бремя для среднего американца включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eФедеральный подоходный налог (10-37%)\u003c/li\u003e\n\u003cli\u003eНалог штата (0-13,3%)\u003c/li\u003e\n\u003cli\u003eСоциальное страхование и налог Medicare (7,65% сотрудник, плюс 7,65% работодатель)\u003c/li\u003e\n\u003cli\u003eНалог на имущество (варьируется по месту расположения)\u003c/li\u003e\n\u003cli\u003eНалог с продаж (0-10,25%)\u003c/li\u003e\n\u003cli\u003eНалог на топливо, регистрация транспортных средств, платежи за проезд\u003c/li\u003e\n\u003cli\u003eНалог на прирост капитала, налог на имущество, налог на подарки\u003c/li\u003e\n\u003cli\u003eСкрытые налоги, встроенные в цену товаров (корпоративные налоги, затраты на соответствие нормативам, тарифы)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКогда все эти налоги объединены, средний американский рабочий платит 40-60 процентов своего общего дохода в виде налогов. Это означает, что из каждого 8-часового рабочего дня 3-5 часов отрабатываются на правительство. Это не преувеличение. Это математика.\u003c/p\u003e\n\u003cp\u003eНалоговый фонд рассчитывает \"День налоговой свободы\" — дату, когда средний американец заработал достаточно, чтобы заплатить свое общее годовое налоговое бремя. В последние годы эта дата приходится на середину апреля — начало мая. Это означает, что американцы работают почти четыре месяца каждый год только для уплаты налогов — уровень извлечения, превышающий феодальную десятину, налог фараона и библейское определение тирании.\u003c/p\u003e\n\u003ch3 id=\"долговая-цепь\"\u003eДолговая цепь\u003c/h3\u003e\n\u003cp\u003eНалогообложение - только половина уравнения закабаления. Другая половина - долг. Среднее американское домохозяйство несет примерно 100 000 долларов долга — ипотека, студенческие кредиты, кредитные карты, автокредиты. Этот долг обслуживается доходом после уплаты налогов, что означает, что американский рабочий сначала платит 40-60 процентов своего дохода правительству, а затем обслуживает долг тем, что остается.\u003c/p\u003e\n\u003cp\u003eСлово \"ипотека\" происходит от старофранцузского \u003cem\u003emort gage\u003c/em\u003e — буквально \"клятва смертью\". Каждый платеж по ипотеке - это дань обязанности смертью, ежемесячный взнос в финансовую систему, которая претендует на право собственности на крышу над вашей головой. Пропустите достаточно платежей, и система заберет крышу. Вы не владеете своим домом. Вы его арендуете у банка. И вы платите аренду доходом, который уже был обложен налогом.\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует на Substack (agent131711.substack.com) то, как долговая система разработана, чтобы быть неизбежной. Студенческие кредиты, которые не могут быть погашены в результате банкротства, гарантируют, что самые молодые рабочие начинают экономику уже в закабалении. Сроки ипотеки в 30 лет гарантируют, что владельцы домов проводят наиболее производительные десятилетия своей жизни, обслуживая обязательство смертью. Процентные ставки по кредитным картам 20-30 процентов гарантируют, что потребительский долг растет быстрее, чем его можно погасить.\u003c/p\u003e\n\u003cp\u003eКомбинированный эффект налогообложения и долга — полное финансовое закабаление. Американский рабочий не свободен. Они долговой крепостной — современный раб, цепи которого невидимы, но закабаление абсолютно.\u003c/p\u003e\n\u003ch3 id=\"иллюзия-зарплаты\"\u003eИллюзия зарплаты\u003c/h3\u003e\n\u003cp\u003eЗарплата создает иллюзию компенсации. Вы работаете, получаете деньги, тратите их. Это выглядит как справедливый обмен. Но посмотрите на цикл более внимательно:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eВы работаете 8 часов.\u003c/li\u003e\n\u003cli\u003eПравительство берет 3-5 часов работы в виде налогов (удерживаемых до того, как вы это увидите).\u003c/li\u003e\n\u003cli\u003eВы получаете остаток.\u003c/li\u003e\n\u003cli\u003eВы платите обслуживание долга (ипотека, студенческие кредиты, автоплатеж) — еще 1-2 часа работы.\u003c/li\u003e\n\u003cli\u003eВы платите налог с продаж, налог на топливо и встроенные налоги на все, что вы покупаете — еще полчаса работы.\u003c/li\u003e\n\u003cli\u003eВам остается 1-3 часа из вашего 8-часового дня для свободного распоряжения.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭто не свобода. Это система, разработанная для извлечения максимального труда при предоставлении минимальной автономии. Владелец плантации предоставлял рабам пищу, кров и одежду. Современная система требует, чтобы вы покупали эти вещи сами — у корпораций, которые также извлекают ваш труд через занятость — создавая замкнутый цикл, в котором рабочий является одновременно производителем и потребителем, а система извлекает выгоду на каждом этапе.\u003c/p\u003e\n\u003ch2 id=\"архитекторы-закабаления\"\u003eАрхитекторы закабаления\u003c/h2\u003e\n\u003ch3 id=\"революция-1913-года\"\u003eРеволюция 1913 года\u003c/h3\u003e\n\u003cp\u003e1913 была год, когда американская финансовая свобода умерла. В этом единственном году Конгресс принял как Закон о Федеральном резервном банке, так и 16-ю поправку (подоходный налог). Эти два закона создали инфраструктуру современного финансового закабаления:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФедеральный резервный банк\u003c/strong\u003e создает деньги через долг. Каждый доллар в обращении - это долговой инструмент — одолженный в существование Федеральным резервным банком, с процентом, который может быть выплачен только большим количеством долларов, которые также должны быть одолжены. Это создает математически неизбежный долговой спираль: общий долг всегда превышает общую денежную массу, потому что деньги для выплаты процентов никогда не были созданы.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПодоходный налог\u003c/strong\u003e обеспечивает доход для обслуживания этого долга. Без подоходного налога правительство не смогло бы платить проценты по своим кредитам Федерального резервного банка. Без Федерального резервного банка подоходный налог не имел бы смысла. Две системы разработаны для работы вместе — и они были созданы в один год, одним Конгрессом, под влиянием одних и тех же банковских интересов.\u003c/p\u003e\n\u003cp\u003eСвязь иезуитов с этими событиями работает через их образовательные и консультационные сети. Советники, подготовленные иезуитами, населяли администрацию Вильсона, которая подписала оба закона. Иезуитские университеты обучали экономистов, которые разработали систему Федерального резервного банка. \u003cem\u003eКатолические конфиденциальные сведения\u003c/em\u003e раскрывают, как иезуитское проникновение, \"скрытое хитростью\", распространяется на каждое правительство и каждое учреждение — и создание системы Федерального резервного банка - один из самых последовательных примеров.\u003c/p\u003e\n\u003ch3 id=\"номер-социального-страхования-ваш-идентификационный-номер-раба\"\u003eНомер социального страхования: ваш идентификационный номер раба\u003c/h3\u003e\n\u003cp\u003eКаждому американцу присваивается номер социального страхования при рождении. Этот номер требуется для работы, банковского дела, кредита, налогообложения и практически любой другой экономической деятельности. Без него вы не можете законно участвовать в экономике.\u003c/p\u003e\n\u003cp\u003eНомер социального страхования - это, по сути, идентификационный номер раба. Он отслеживает вашу работу, ваш доход, ваши налоговые платежи, вашу финансовую деятельность и вашу соответствие системе. Это число, по которому система знает вас — не как личность, а как единицу, генерирующую доход.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был сказано, что духовная сфера знает вас по вашим отношениям с Богом — по тому, сделали ли вы Христа Господом. Материальная система знает вас по вашему номеру социального страхования — по вашей продуктивности, вашему соответствию, вашему вкладу в поток доходов. Это две разные системы, работающие на двух разных принципах. Одна ищет вашу душу. Другая ищет вашу работу. Трагедия в том, что большинство людей добровольно дают свою работу, никогда не обеспечивая своей душой.\u003c/p\u003e\n\u003ch2 id=\"разбить-цепи\"\u003eРазбить цепи\u003c/h2\u003e\n\u003ch3 id=\"как-выглядит-настоящая-свобода\"\u003eКак выглядит настоящая свобода\u003c/h3\u003e\n\u003cp\u003eНастоящая финансовая свобода - это не богатство. Это отсутствие закабаления — состояние, когда вы ничего не должны никому, производите то, что вам нужно, и живите независимо от систем, разработанных для извлечения вашей жизненной силы.\u003c/p\u003e\n\u003cp\u003eПрактические шаги к финансовой свободе включают:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eЛиквидация долга\u003c/strong\u003e: Погасьте весь долг, начиная с наиболее высокой процентной ставки. Каждый погашенный долг - это разорванная цепь.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСнижение налогового давления\u003c/strong\u003e: Законно минимизируйте налоговое бремя через самозанятость, вычеты и стратегическое планирование.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПостроение самодостаточности\u003c/strong\u003e: Выращивайте еду, производите энергию, сокращайте потребление. Каждая потребность, удовлетворенная вне системы, - это потребность, которую система не может взять в заложники.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОтказаться от цикла потребления\u003c/strong\u003e: Рождественские траты, цикл обновления, покупки статуса — все это механизмы Сатурна для того, чтобы держать вас в долгах.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eУзкий путь — это путь без долгов. Это путь, который не полагается на систему для пропитания, который не отдает кесарю то, что не принадлежит кесарю, и который признает разницу между требованием правительства на вашу работу и требованием Бога на вашу душу.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\
