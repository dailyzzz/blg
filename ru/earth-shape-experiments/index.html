писал: \u003cem\u003e\"Это Он, Который восседает над кругом земли, и обитатели её — как саранча; Он распростёр небеса, как тонкую ткань, и распял их, как шатёр для жилья\"\u003c/em\u003e (Исаия 40:22). Еврейское слово, используемое здесь, \"чуг\", относится к плоскому кругу — не сфере. Иов 37:18 добавляет: \u003cem\u003e\"Можешь ли ты, как Он, распространить небеса, твёрдые, как зеркало из литого металла?\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eАльбом Confliction захватывает эту древнюю напряженность между раскрытой истиной и человеческим восстанием в треках, таких как \u003cem\u003eThe First Darkness\u003c/em\u003e и \u003cem\u003eThe Bright Nature\u003c/em\u003e. До того, как современное научное учреждение переписало космологию, культуры по всему миру описывали неподвижную плоскость, покрытую куполом — твердью непроницаемого, стеклоподобного материала. Это понимание исчезло не потому, что оно было опровергнуто; оно исчезло потому, что оно было подавлено.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"почему-это-важно-сейчас\"\u003eПочему это важно сейчас\u003c/h2\u003e\n\u003cp\u003eВ классах по всему миру детей учат единой модели земли: вращающейся сфере, мчащейся через бесконечное пространство со скоростью тысяч миль в час. Эта модель представлена не как теория, а как неоспоримый факт. Однако когда независимые исследователи проводят собственные эксперименты — используя лазеры, камеры и простое наблюдение — результаты часто противоречат тому, что нам сказали.\u003c/p\u003e\n\u003cp\u003eЭта статья подробно изучает несколько из этих экспериментов, опираясь на исследования, собранные Agent131711 на Substack (agent131711.substack.com). Это не граничные теоретические эксперименты. Это повторяемые, наблюдаемые тесты, которые любой может выполнить с правильным оборудованием. Вопрос не в том, верите ли вы, что Земля плоска или круглой — вопрос в том, были ли вы когда-либо допущены к изучению доказательств самостоятельно.\u003c/p\u003e\n\u003ch2 id=\"эксперимент-bedford-level\"\u003eЭксперимент Bedford Level\u003c/h2\u003e\n\u003ch3 id=\"оригинальный-тест\"\u003eОригинальный тест\u003c/h3\u003e\n\u003cp\u003eОдин из самых известных экспериментов о форме земли в истории проводился в 1838 году вдоль реки Олд-Бедфорд в Норфолке, Англия. Самуэль Бирли Роботам вошёл в реку и использовал телескоп, чтобы наблюдать за лодкой с флагом, прикреплённым к мачте, когда она путешествовала на шесть миль вдоль прямого, спокойного канала.\u003c/p\u003e\n\u003cp\u003eСогласно модели сферы, поверхность земли изгибается примерно на 8 дюймов на квадрат мили. На расстоянии шести миль лодка должна была исчезнуть ниже примерно 24 футов кривизны. Вместо этого Роботам наблюдал всю лодку, мачту и флаг на протяжении всех шести миль. Не было обнаружено кривизны.\u003c/p\u003e\n\u003ch3 id=\"современные-повторения\"\u003eСовременные повторения\u003c/h3\u003e\n\u003cp\u003eЭтот эксперимент был повторён много раз с современным оборудованием. В начале 2000-х годов исследователи использовали мощные лазеры над телами спокойной воды для измерения отклонения. На расстояниях в 10, 20 и даже 30 миль лазерные лучи оставались уровневыми и видимыми — что-то, что должно быть физически невозможно на сфере с указанным радиусом 3 959 миль.\u003c/p\u003e\n\u003cp\u003eКритики утверждают, что атмосферная рефракция объясняет эти результаты. Однако степень рефракции, требуемая, чтобы согнуть свет совершенно вдоль предполагаемой кривизны, последовательно, при различных атмосферных условиях, сама была бы чрезвычайным утверждением, требующим чрезвычайных доказательств. Объяснение рефракции часто вызывается, но редко демонстрируется с математической строгостью, которую оно требует.\u003c/p\u003e\n\u003ch2 id=\"наблюдение-skyline-чикаго\"\u003eНаблюдение skyline Чикаго\u003c/h2\u003e\n\u003ch3 id=\"что-должно-быть-невозможным\"\u003eЧто должно быть невозможным\u003c/h3\u003e\n\u003cp\u003eС противоположного берега озера Мичиган, примерно в 60 милях, горизонт Чикаго был сфотографирован с потрясающей ясностью из мест, где, согласно модели сферы, он должен быть полностью скрыт ниже горизонта. На 60 милях ожидаемое падение из-за кривизны было бы примерно 2 400 футов — намного выше любого здания в Чикаго.\u003c/p\u003e\n\u003cp\u003eОднако фотографы захватили эти изображения повторно, при различных атмосферных условиях, часто в прохладном вечернем воздухе, когда объяснение \"superior mirage\" наименее правдоподобно. Как задокументировано в исследованиях Agent131711 на Substack (agent131711.substack.com), эти наблюдения не являются изолированными аномалиями. Они представляют рисунок, который оспаривает основное утверждение изогнутой поверхности.\u003c/p\u003e\n\u003ch3 id=\"защита-миража\"\u003eЗащита \"миража\"\u003c/h3\u003e\n\u003cp\u003eОсновная наука обычно отклоняет эти наблюдения как \"superior mirages\" — явление, где слои воздуха при различных температурах изгибают свет, чтобы создать изображение чего-то, что технически ниже линии видимости. Хотя мирали — это реальные оптические явления, объяснение требует все более специфических условий, которые удобно появляются каждый раз, когда наблюдение противоречит модели.\u003c/p\u003e\n\u003cp\u003eПодлинный мираж значительно искажает изображения. Он не производит кристально чистое, архитектурно точное воспроизведение всего горизонта города. Когда вы можете определить отдельные здания, окна и структурные детали с расстояния 60 миль, объяснение миража напрягает доверие.\u003c/p\u003e\n\u003ch2 id=\"лазерные-тесты-через-замёрзшие-озёра\"\u003eЛазерные тесты через замёрзшие озёра\u003c/h2\u003e\n\u003ch3 id=\"установка\"\u003eУстановка\u003c/h3\u003e\n\u003cp\u003eНезависимые экспериментаторы проводили лазерные тесты через замёрзшие озёра зимой, когда воздух холодный, сухой и относительно однородный по температуре — условия, которые минимизируют возможность атмосферной рефракции. Используя промышленные лазеры, установленные на известных высотах, исследователи измеряли положение луча на различных расстояниях.\u003c/p\u003e\n\u003ch3 id=\"результаты\"\u003eРезультаты\u003c/h3\u003e\n\u003cp\u003eНа расстояниях от 5 до 15 миль лазерный луч последовательно прибывает на ожидаемую высоту — ту же высоту, на которой он был испущен. На сфере луч должен прибыть прогрессивно выше, когда поверхность изгибается вдали под ним, или он должен полностью пропустить цель, когда цель падает ниже кривизны.\u003c/p\u003e\n\u003cp\u003eЭти эксперименты, задокументированные видеодоказательством и точными измерениями, не показывают обнаружимой кривизны. Поверхность замёрзшего озера ведёт себя как плоская плоскость на этих расстояниях.\u003c/p\u003e\n\u003ch2 id=\"поддержка-финиша-1-царств-8\"\u003eПоддержка финиша 1 Царств 8\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всём, что он говорит тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 звучит в коридорах каждого правительства сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их ровно о том, что произойдёт — их сыновей возьмут на войну, их дочерей на служение, их поля и виноградники отберут, десятину всего конфискуют. Они выбрали человеческое правление над царством Бога, и тирания последовала ровно, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной скрытой структуре власти. Голосование за одну из сторон — это выбор того, какое крыло взмахнёт далее, пока птица летит в том же направлении. Настоящая власть никогда не была в избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/95-Flat_Earth_Experiments.mp4\"\u003eFlat Earth Experiments\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/77-The_Dome_Above.mp4\"\u003eThe Dome Above\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/475-Dome_Dwellers_Awakening.mp4\"\u003eDome Dwellers Awakening\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/481-Fake_Stars_Real_Chains.mp4\"\u003eFake Stars Real Chains\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/05-The_First_Darkness.mp4\"\u003eThe First Darkness\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/23-The_Sun_and_the_Moon.mp4\"\u003eThe Sun and the Moon\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследовать-далее\"\u003eИсследовать далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/untold-story-christmas-part1/?lang=ru\"\u003eThe Untold Story of CHRISTMAS: Part 1\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/wizard-oz-power-of-fear/?lang=ru\"\u003eThe Wizard of Oz and the Power of Fear\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/questioning-religion-part1/?lang=ru\"\u003eQuestioning My Religion: A Personal Journey — Part 1\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eИстина не боится исследования. Если модель сферы верна, она должна выдержать каждый тест, каждый вопрос, каждый эксперимент, брошенный в неё. Тот факт, что её оспаривание встречается с высмеиванием, а не с доказательством, должен рассказать вам всё, что вам нужно знать. Смотрите вверх. Смотрите наружу. И задайте вопрос, который они не хотят, чтобы вы задавали: а что если всё, что вам преподавали о месте, где вы живёте, ошибочно?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"cla
