не грубой силой. Это была \u003cem\u003eложная предпосылка\u003c/em\u003e. Он не переделал Адама и Еву — он предложил им единственную поражённую отправную точку, и всё, что последовало, было построено на этой порче. Примите ложь, и каждое решение, которое вы принимаете впоследствии, отравлено у корня.\u003c/p\u003e\n\u003cp\u003eЭто то, что захватывает трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eПреступление\u003c/a\u003e — момент принятия ложной основы. Не момент очевидного разрушения, а тихий момент перед ним, когда неправильная предпосылка принимается как истина, и вся траектория человеческой истории изгибается соответственно.\u003c/p\u003e\n\u003cp\u003eТеория микробов — это ложная предпосылка для современной медицины.\u003c/p\u003e\n\u003cp\u003eВ середине девятнадцатого века два французских учёных предложили конкурирующие объяснения болезни. Один сказал, что невидимые микробы вторгаются в тело извне, вызывая болезнь, — и решение состояло в том, чтобы идентифицировать и убить эти микробы. Другой сказал, что внутреннее состояние тела определяет, разовьётся ли болезнь, — и решение состояло в том, чтобы поддерживать здоровую внутреннюю среду.\u003c/p\u003e\n\u003cp\u003eПервое объяснение, теория микробов, стало неоспариваемой основой западной медицины. На основе целой империи фармацевтических препаратов, вакцин, антибиотиков и противовирусных лекарств была построена. Второе объяснение, теория местности, было закопано, потому что оно угрожало каждому доллару, который эта империя будет генерировать.\u003c/p\u003e\n\u003cp\u003eПримите неправильную предпосылку, и всё, что строится на её основе, служит неправильному хозяину.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пастер-против-бешана-дебат-который-был-стёрт\"\u003eПастер против Бешана: дебат, который был стёрт\u003c/h2\u003e\n\u003cp\u003eЛуи Пастер (1822-1895) — одна из самых прославленных фигур в истории науки. Каждый ребёнок узнаёт его имя. Ему приписывают теорию микробов болезни, пастеризацию и фундаментальный вклад в вакцинацию. Больницы, институты и улицы по всему миру носят его имя.\u003c/p\u003e\n\u003cp\u003eАнтуан Бешан (1816-1908) практически неизвестен. Он был современником Пастера, профессором медицинской химии и фармации в Университете Монпелье, а позже профессором в Университете Лилля и деканом факультета медицины католического университета Лилля. Он имел несколько докторских степеней и опубликовал обширные работы на протяжении карьеры, которая длилась более полувека.\u003c/p\u003e\n\u003cp\u003eБешан предположил, что крошечные организмы, которых он называл \u003cem\u003eмикрозимы\u003c/em\u003e — что мы можем сегодня сравнить с микроорганизмами или клеточными компонентами — присутствуют во всех живых клетках и могут изменять форму и функцию в зависимости от состояния тела. Когда внутренняя местность тела была здоровой, эти микрозимы выполняли обычные клеточные функции. Когда местность становилась токсичной, кислой или истощённой питательными веществами, эти же микрозимы превращались в патогенные бактерии и вирусы.\u003c/p\u003e\n\u003cp\u003eВ модели Бешана болезнь не была вторжением извне. Это была трансформация изнутри, вызванная детериоризацией внутренней среды тела.\u003c/p\u003e\n\u003cp\u003eМодель Пастера была противоположной. Микробы были фиксированными, неизменяющимися видами, которые атаковали тело из внешней среды. Каждая болезнь имела специфическую микробную причину, и решение состояло в том, чтобы идентифицировать и уничтожить этот микроб — через антисептики, вакцины и позже антибиотики.\u003c/p\u003e\n\u003cp\u003eНаучный дебат между этими двумя мужчинами был ожесточённым во время их жизни. Но у Пастера было то, чего не было у Бешана: политические связи, институциональная поддержка и модель, которая могла быть монетизирована. К тому времени, когда оба мужчины умерли, теория микробов Пастера стала медицинской ортодоксией, а теория местности Бешана была выметена на свалку истории.\u003c/p\u003e\n\u003ch3 id=\"признание-пастера-на-смертном-одре\"\u003eПризнание Пастера на смертном одре\u003c/h3\u003e\n\u003cp\u003eИсторические отчёты, переданные через несколько источников, включая собственных ассоциатов Пастера, свидетельствуют, что на смертном одре Пастер якобы сказал: \u003cstrong\u003e\"Le microbe n'est rien, le terrain est tout\"\u003c/strong\u003e — \u003cem\u003e\"Микроб — это ничто, местность — это всё.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eПроизносил ли Пастер эти точные слова в свои последние часы, обсуждается. Неоспоримо то, что в конце карьеры приватные лабораторные записи Пастера — которые оставались запечатанными почти на столетие после его смерти и наконец были изучены историком Джеральдом Гейзоном в его работе 1995 года \u003cem\u003eПриватная наука Луи Пастера\u003c/em\u003e — выявили значительные расхождения между его публичными претензиями и его приватными экспериментальными результатами. Гейзон задокументировал случаи, когда Пастер неправильно представил свои методы, взял кредит на идеи, которые не были его собственными, и приватно признал ограничения в его теории микробов, которые он никогда публично не уступал.\u003c/p\u003e\n\u003cp\u003eДругими словами, даже основатель теории микробов сомневался в теории микробов. Но к тому времени фундамент был заложен, учреждения были построены, и слишком много денег было в игре, чтобы пересмотреть.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-утверждает-теория-микробов\"\u003eЧто утверждает теория микробов\u003c/h2\u003e\n\u003cp\u003eТеория микробов, как она практикуется в современной медицине, основывается на нескольких основных утверждениях:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eСпецифические микроорганизмы вызывают специфические болезни.\u003c/strong\u003e Каждая болезнь вызывается отдельным патогеном — бактерией, вирусом, грибом или паразитом.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭти микроорганизмы вторгаются в тело из внешней среды.\u003c/strong\u003e Болезнь — это принципиально процесс снаружи внутрь.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМикроорганизм должен быть изолирован, идентифицирован и уничтожен.\u003c/strong\u003e Лечение означает нацеливание на патоген с помощью препаратов, вакцин или противомикробных агентов.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗдоровый человек может быть поражен болезнью только при контакте с патогеном.\u003c/strong\u003e Простое присутствие микроба достаточно, чтобы вызвать болезнь.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПрофилактика требует либо избегания микроба, либо предварительного вооружения иммунной системы против него посредством вакцинации.\u003c/strong\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭта модель элегантна по своей простоте: один микроб, одна болезнь, один препарат. Она также чрезвычайно прибыльна. Каждая болезнь становится возможностью разработки продукта. Каждый патоген становится рынком.\u003c/p\u003e\n\u003ch2 id=\"что-утверждает-теория-местности\"\u003eЧто утверждает теория местности\u003c/h2\u003e\n\u003cp\u003eТеория местности, сформулированная Бешаном и позже расширенная натуропатами и холистическими практиками, предлагает принципиально другую структуру:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eВнутреннее состояние тела — его pH, статус питания, нагрузка токсинами, оксигенация и эмоциональное состояние — определяет, разовьётся ли болезнь.\u003c/strong\u003e Местность является первичной.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМикроорганизмы присутствуют везде, всё время.\u003c/strong\u003e Мы постоянно окружены и населены бактериями, грибами и вирусными частицами. Вызовут ли они болезнь, зависит от состояния хозяина, а не от присутствия микроба.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМикроорганизмы могут изменять форму (плеоморфизм)\u003c/strong\u003e в зависимости от среды, которую они населяют. Безвредный микроб в здоровом теле может стать патогенным в токсичном теле.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБолезнь — это попытка тела очистить себя.\u003c/strong\u003e Симптомы, такие как лихорадка, слизь, диарея и воспаление, — это не болезнь, они являются процессом детоксификации тела.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПрофилактика и исцеление приходят от поддержания здоровой местности\u003c/strong\u003e — правильное питание, чистая вода, достаточный отдых, эмоциональное благополучие, солнечный свет и избегание токсинов.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eПри теории местности вопрос не в \"Какой микроб вы поймали?\", а в \"Каково состояние вашего тела, которое позволило развиться болезни?\" Ответы на этот вопрос — плохая диета, экологические токсины, стресс, дефицит питания, недостаток сна — не требуют фармацевтических решений. Они требуют изменений образа жизни.\u003c/p\u003e\n\u003cp\u003eИ вот в чём проблема. Изменения образа жизни не могут быть запатентованы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"постулаты-коха-стандарт-который-теория-микробов-не-может-удовлетворить\"\u003eПостулаты Коха: стандарт, который теория микробов не может удовлетворить\u003c/h2\u003e\n\u003cp\u003eРоберт Кох, немецкий врач, который работал рядом с основой теории микробов, установил четыре постулата в 1890 году, которые были предназначены для определённого доказательства того, что специфический микроорганизм вызывает специфическую болезнь:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eМикроорганизм должен быть найден в изобилии во всех организмах, страдающих болезнью, но не в здоровых организмах.\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМикроорганизм должен быть изолирован из поражённого организма и выращен в чистой культуре.\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВыращенный микроорганизм должен вызвать болезнь при введении в здоровый организм.\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМикроорганизм должен быть переизолирован из инокулированного, заболевшего экспериментального хозяина и идентифицирован как идентичный первоначальному специфическому возбудителю.\u003c/strong\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭти постулаты были разумны для своего времени и могли быть применены с некоторым успехом к определённым бактериальным инфекциям. Но вот критическая точка, которую современная вирусология не хочет, чтобы вы слишком внимательно рассмотрели: \u003cstrong\u003eни один вирус никогда полностью не удовлетворял постулатам Коха.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eВирусы не могут быть выращены в \"чистой культуре\" так, как бактерии могут. Они требуют живых хозяйских клеток для репликации, что означает, что любая вирусная \"изоляция\" фактически выполняется в культуре клеток, содержащей животные клетки, антибиотики, противогрибковые агенты, фетальную бычью сыворотку и другие вещества. То, что называется \"изоляцией\" в вирусологии, было бы считаться контаминацией в любой другой ветви науки.\u003c/p\u003e\n\u003cp\u003eКогда методология для доказательства того, что специфический вирус вызывает специфическую болезнь, никогда не была строго выполнена, вся основа вирусной болезни — и многомиллиардная индустрия вакцин и противовирусных препаратов, построенная на ней — опирается на недоказанное допущение, представленное как установленная наука.\u003c/p\u003e\n\u003ch3 id=\"проблема-теста-пцр\"\u003eПроблема теста ПЦР\u003c/h3\u003e\n\u003cp\u003eТест полимеразной цепной реакции (ПЦР), который стал всемирно известен во время эры COVID-19, амплифицирует генетический материал до обнаруживаемых уровней. Его изобретатель Кэри Муллис — лауреат Нобелевской премии по химии за разработку технологии — неоднократно и публично заявлял, что ПЦР \u003cstrong\u003eникогда не была разработана для использования в качестве инструмента диагностики инфекционного заболевания.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eМуллис объяснил, что ПЦР может найти почти всё у кого угодно, если вы амплифицируете цикли достаточно высоко. Он обнаруживает генетические последовательности — фрагменты генетического материала — а не живые, инфекционные вирусы. Запуск теста при 35-45 циклах, как это было стандартной практикой во время пандемии COVID-19, может дать положительные результаты из мёртвых вирусных фрагментов, остаточного генетического материала или даже перекрёстно-реактивных последовательностей из других коронавирусов или клеточного мусора.\u003c/p\u003e\n\u003cp\u003eТест, который не может отличить живой, инфекционный патоген от мёртвого генетического фрагмента, не диагностирует болезнь. Он производит случаи.\u003c/p\u003e\n\u003cp\u003eЭто не незначительная техническая придирка. Весь глобальный ответ на пандемию — блокировки, мандаты масок, мандаты вакцины, разрушение малых предприятий, изоляция пожилых, закрытие церквей — был оправдан числом случаев, сгенерированным тестом, который его собственный изобретатель сказал, что не должен быть использован для этой цели.\u003c/p\u003e\n\u003cp\u003eКогда инструмент диагностики сломан, всё, что построено на его результатах, построено на песке.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"почему-рокфеллеровская-медицина-выбрала-теорию-микробов\"\u003eПочему рокфеллеровская медицина выбрала теорию микробов\u003c/h2\u003e\n\u003cp\u003eЧтобы понять, почему теория микробов была принята как основа современной медицины, в то время как теория местности была отброшена, вы должны проследить деньги.\u003c/p\u003e\n\u003cp\u003eКак обширно задокументировано в нашей статье о \u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eРокфеллеровской медицине\u003c/a\u003e, трансформация американской медицины из разнообразного ландшафта способов исцеления — фитотерапия, гомеопатия, натуропатия, хиропрактика, акушерство — в фармацевтическую монокультуру была не органической научной эволюцией. Это был корпоративный захват.\u003c/p\u003e\n\u003cp\u003eВ 1910 году Доклад Флекснера, финансируемый Фондом Карнеги при поддержке Джона Д. Рокфеллера, оценил каждую медицинскую школу в Соединённых Штатах и Канаде. Рекомендации отчёта привели к закрытию почти половины всех медицинских школ, особенно тех, которые преподавали гомеопатию, натуропатию, эклектическую медицину и другие модали, которые не полагались на фармацевтические препараты.\u003c/p\u003e\n\u003cp\u003eШколы, которые выжили, были теми, которые приняли учебную программу, сосредоточенную на фармацевтическом вмешательстве, — что требовало, как свою философскую основу, теорию микробов. Если болезнь вызывается специфическими микробами, то решение — специфические препараты. Если решение — специфические препараты, то медицинское образование должно обучать врачей прописывать эти препараты. Если врачи прописывают эти препараты, то фармацевтические компании имеют гарантированный и постоянно расширяющийся рынок.\u003c/p\u003e\n\u003cp\u003eРокфеллер — который сделал своё состояние в нефти — признал, что фармацевтические препараты были получены из нефтепродуктов. Контролируя медицинское образование, он мог создать самовоспроизводящуюся систему: обучить врачей прописывать препараты, изготовленные из нефтепродуктов, маргинализировать любой способ исцеления, который не требовал этих препаратов, и заблокировать спрос на столетие.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТеория микробов была выбрана не потому, что она была научно превосходнее. Она была выбрана потому, что она была коммерчески превосходнее.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eТеория местности — враг фармацевтической прибыли, потому что её предписания бесплатны: чистая вода, целые продукты, солнечный свет, отдых, эмоциональный мир, сообщество и цель. Вы не можете запатентовать солнечный свет. Вы не можете поместить чистую воду в таблетку. Вы не можете взимать ежемесячную подписку за хороший ночной сон.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"современные-доказательства-поддерживающие-местность\"\u003eСовременные доказательства, поддерживающие местность\u003c/h2\u003e\n\u003cp\u003eИронично, что самые передовые исследования в современной медицине тихо подтверждают основные принципы теории местности, хотя ни один основной исследователь не осмелился бы использовать то имя.\u003c/p\u003e\n\u003ch3 id=\"революция-микробиома\"\u003eРеволюция микробиома\u003c/h3\u003e\n\u003cp\u003eПроект Human Microbiome Project, запущенный национальными институтами здравоохранения, раскрыл, что человеческое тело содержит приблизительно \u003cstrong\u003e38 триллионов микроорганизмов\u003c/strong\u003e — примерно равное количество человеческих клеток. Эти бактерии, грибы и вирусы не являются захватчиками. Они являются неотъемлемыми компонентами человеческого здоровья.\u003c/p\u003e\n\u003cp\u003eИсследования теперь показывают, что микробиом влияет на:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eФункция иммунной системы\u003c/strong\u003e — до 70-80% иммунной системы находится в кишечнике\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПсихическое здоровье\u003c/strong\u003e — оси кишечник-мозг связывает кишечную микробиоту с настроением, тревогой и депрессией\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМетаболическое здоровье\u003c/strong\u003e — кишечные бактерии влияют на вес, чувствительность инсулина и воспаление\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСопротивление болезни\u003c/strong\u003e — разнообразный, здоровый микробиом защищает от патогенной инфекции\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто теория местности, выраженная на современном научном языке. Внутренняя среда — местность кишечника — определяет результаты здоровья. Когда местность здорова (разнообразный микробиом, поддерживаемый целыми продуктами, клетчаткой и ферментированными продуктами), тело сопротивляется болезни. Когда местность повреждена (обработанной пищей, антибиотиками, стрессом и экологическими токсинами), болезнь процветает.\u003c/p\u003e\n\u003cp\u003eСобственные исследования фармацевтической промышленности доказывают, что Бешан был прав, даже когда она продолжает строить на основе Пастера.\u003c/p\u003e\n\u003ch3 id=\"эпигенетика\"\u003eЭпигенетика\u003c/h3\u003e\n\u003cp\u003eОбласть эпигенетики продемонстрировала, что экспрессия генов — какие гены включены или выключены — определяется не самими генами, а \u003cstrong\u003eокружением\u003c/strong\u003e вокруг ДНК. Диета, стресс, воздействие токсинов, сон, упражнения и даже эмоциональные состояния могут изменять экспрессию генов без изменения лежащей в основе последовательности ДНК.\u003c/p\u003e\n\u003cp\u003eЭто, опять же, теория местности на молекулярном уровне. Внутренняя среда определяет результат. Два человека могут нести одну и ту же генетическую предрасположенность к болезни, но является ли этот ген активированным, зависит от местности — всей совокупности их образа жизни, питания и воздействия окружающей среды.\u003c/p\u003e\n\u003ch3 id=\"эффект-плацебо\"\u003eЭффект плацебо\u003c/h3\u003e\n\u003cp\u003eЭффект плацебо — в котором пациенты улучшаются от лечения, которое не содержит активного ингредиента — остаётся одним из наиболее надёжных и воспроизводимых выводов во всех медицинских исследованиях. В клинических испытаниях плацебо регулярно производят измеримые физиологические изменения: снижение боли, улучшенные маркеры иммунитета и даже уменьшение опухоли.\u003c/p\u003e\n\u003cp\u003eЕсли болезнь была чисто функцией внешних патогенов, эффект плацебо был бы невозможен. Тот факт, что вера, ожидание и эмоциональное состояние могут измеримо изменять результаты здоровья, является прямым подтверждением настояния модели местности на том, что внутреннее состояние хозяина является первичным определяющим фактором здоровья.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"тело-как-божественно-созданная-экосистема\"\u003eТело как божественно созданная экосистема\u003c/h2\u003e\n\u003cp\u003eПисание не использует язык теории микробов. Оно не описывает невидимые микробы, вторгающиеся в тело извне и требующие фармацевтического вмешательства. Вместо этого библейская картина человеческого тела — это \u003cstrong\u003eбожественно сконструированная, самоисцеляющаяся экосистема\u003c/strong\u003e — храм, а не машина.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Разве не знаете, что тела ваши — храм Святого Духа, который в вас, а не ваш ли он?\" — 1 Коринфянам 6:19\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eХрам — это не случайность случайной мутации. Это задуманный дизайн — созданный, упорядоченный и поддерживаемый его Создателем. Иммунная система, микробиом, пути детоксификации печени и почек, воспалительный ответ, механизм лихорадки — это не дизайнерские недостатки, которые должны быть переопределены фармацевтиками. Они являются божественно спроектированными системами защиты и ремонта.\u003c/p\u003e\n\u003cp\u003eКогда Писание говорит, что тело — храм, оно подразумевает, что тело имеет \u003cstrong\u003eспроектированную способность к здоровью\u003c/strong\u003e — если храм почитается и поддерживается согласно инструкциям его Создателя. Чистая пища, чистая вода, отдых в субботу, сообщество с другими верующими, молитва, эмоциональная честность, избегание половой безнравственности и веществ, которые осквернять — это наставления местности.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Мой возлюбленный! Молюсь, чтобы во всём благословился ты и здравствовал, как благоденствует душа твоя.\" — 3 Иоанна 1:2\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eОтметьте связь: физическое здоровье связано с состоянием души. Местность — это не просто физическое — это духовное, эмоциональное и реляционное. Вот почему модель фармацевтики так последовательно терпит неудачу. Она рассматривает тело как машину, которую нужно исправить химическими вводами, пока игнорирует духовную и эмоциональную местность, которую Писание определяет как фундаментальную для здоровья.\u003c/p\u003e\n\u003cp\u003eПсалом 139:14 объявляет: \"Благодарю Тебя потому, что я дивно устроен; дивны дела Твои, и душа моя вполне сознаёт это.\" Тело было \u003cem\u003eдивно сделано\u003c/em\u003e — спроектировано, чтобы функционировать, исцеляться, защищать себя. Предпосылка, что эта божественно созданная система принципиально беспомощна против невидимых захватчиков без фармацевтического спасения, — это не просто плохая наука. Это теологическая ошибка — отрицание компетентности Создателя.\u003c/p\u003e\n\u003cp\u003eСтратегия змея была всегда подорвать уверенность в дизайне Бога. В Саду он предложил, что инструкции Бога были недостаточны, что что-то большее было необходимо. Теория микробов следует тому же паттерну: дизайн Бога для человеческого тела недостаточен; фармацевтическое вмешательство необходимо, чтобы спасить вас от враждебного мира микробов.\u003c/p\u003e\n\u003cp\u003eТеория местности, несмотря на её научные ограничения, по крайней мере начинает с правильной предпосылки: тело было спроектировано, чтобы быть хорошо, когда его внутренняя среда правильно поддерживается. Это не отказ от всех лекарств — это отказ от лжи о том, что здоровье приходит в шприце или таблетке, а не от почитания дизайна Того, кто вас создал.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"фундамент-определяет-здание\"\u003eФундамент определяет здание\u003c/h2\u003e\n\u003cp\u003eКаждое медицинское решение, которое вы принимаете, вытекает из того, какой фундамент вы принимаете.\u003c/p\u003e\n\u003cp\u003eЕсли вы принимаете теорию микробов, вы будете бояться невидимого мира микробов, зависеть от фармацевтических компаний для защиты и подчиняться постоянно расширяющемуся расписанию вакцин, антибиотиков и противовирусных препаратов, которые лечат симптомы, пока игнорируют местность, которая их произвела.\u003c/p\u003e\n\u003cp\u003eЕсли вы принимаете теорию местности, вы возьмёте на себя ответственность за вашу внутреннюю среду — что вы едите, что пьёте, как вы спите, как вы управляете стрессом, какие токсины вы избегаете — и вы поймёте, что симптомы тела не враги, которых нужно подавить, а сигналы к которым нужно услышать.\u003c/p\u003e\n\u003cp\u003eВыбор между этими двумя основами не является просто академическим. Это определяет, являетесь ли вы пациентом — пассивным, зависимым, ожидающим следующего фармацевтического решения — или опекуном храма, который Бог вам дал.\u003c/p\u003e\n\u003cp\u003eЗмей предложил ложную предпосылку в Саду, и когда она была принята, всё, что последовало, было повреждено. Теория микробов — ложная предпосылка, и фармацевтическая империя, построенная на ней, повредила саму медицину — превратив исцеление в промышленность, пациентов в потребителей, и дизайн Бога в проблему, которую могут решить только человеческие химикаты.\u003c/p\u003e\n\u003cp\u003eМикроб — это ничто. Местность — это всё. И местность была спроектирована Создателем, который не делает ошибок.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u0
