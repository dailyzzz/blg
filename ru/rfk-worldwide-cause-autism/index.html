не и не препятствуйте им, ибо таковых есть Царствие Божие». — Марк 10:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКогда детей приносили к Иисусу, ученики пытались их отвернуть. Они думали, что время Мастера слишком важно, Его миссия слишком велика для забот о детях. Иисус упрекнул их. Он заявил, что Царство Божие принадлежит детям — и что любой, кто препятствует детям прийти к Нему, сталкивается с Его неудовольствием.\u003c/p\u003e\n\u003cp\u003eКак показывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e, проклятие змея нацелено на самых уязвимых — а дети являются самыми уязвимыми из всех. Эпидемия неврологической травмы среди детей — это не загадка, которая не поддается расследованию. Это преступление, которое было защищено от расследования институтами, которые должны были расследовать его десятилетия назад.\u003c/p\u003e\n\u003cp\u003eРФК-младший объявил о всемирных усилиях по определению причины аутизма. Впервые в истории федеральный чиновник с полномочиями и волей требует ответа на вопрос, который медицинский истеблишмент отказывался задавать.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"эпидемия-аутизма\"\u003eЭпидемия аутизма\u003c/h2\u003e\n\u003cp\u003eВ 1970 году распространенность расстройства аутистического спектра (РАС) в Соединенных Штатах оценивалась примерно в 1 на 10 000 детей. К 2000 году она выросла до 1 на 150. К 2010 году — 1 на 68. К 2020 году — 1 на 36. Последние оценки CDC предполагают, что показатель теперь может превышать 1 на 30 детей.\u003c/p\u003e\n\u003cp\u003eЭто не постепенное увеличение. Это экспоненциальный взрыв — более чем 300-кратное увеличение за пять десятилетий. Никакое генетическое изменение не может произвести 300-кратное увеличение распространенности за два поколения. Причина является экологической — что-то в окружающей среде американских детей резко изменилось с 1970 года, и это изменение производит неврологическую травму в эпидемическом масштабе.\u003c/p\u003e\n\u003cp\u003eОтвет медицинского истеблишмента на эту эпидемию состоял в том, чтобы отрицать ее существование, приписывать ее «лучшей диагностике» и отказываться расследовать экологические причины. CDC, который отвечает за мониторинг распространенности аутизма, одновременно:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eДокументировал растущие показатели\u003c/li\u003e\n\u003cli\u003eОтказывался проводить сравнительные исследования вакцинированных и невакцинированных детей\u003c/li\u003e\n\u003cli\u003eФинансировал исследования, сосредоточенные на генетических факторах, а не на экологических воздействиях\u003c/li\u003e\n\u003cli\u003eАктивно подавлял исследования, связывающие экологические воздействия с аутизмом\u003c/li\u003e\n\u003cli\u003eХарактеризовал любого, кто ставит под сомнение экологические причины, как «антинаучного»\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report (karenkingston.substack.com): «Отказ изучать экологические причины аутизма — это величайший научный скандал в современной истории. У нас есть 300-кратное увеличение неврологического состояния, затрагивающего детей. CDC знает, что показатель растет. CDC отказывается изучать, почему. Единственное логическое объяснение этого отказа — что агентство уже знает — или подозревает — что ответ подразумевает продукты, которые оно рекомендует, отрасли, которые оно защищает, или политики, которые оно реализовало».\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"расследование\"\u003eРасследование\u003c/h2\u003e\n\u003cp\u003eВсемирное расследование РФК-младшего будет преследовать несколько направлений запроса одновременно:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСравнения вакцинированных и невакцинированных:\u003c/strong\u003e Исследование, которое CDC отказывался проводить десятилетиями — комплексное сравнение результатов для здоровья, включая показатели аутизма, между полностью вакцинированными и полностью невакцинированными детьми.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАнализ временной корреляции:\u003c/strong\u003e Детальный анализ корреляции между расширением графика детских прививок, введением конкретных вакцин и ускорением распространенности аутизма.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОценка экологических токсинов:\u003c/strong\u003e Расследование кумулятивного эффекта экологических воздействий — включая пестициды, тяжелые металлы, пищевые добавки, эндокринные разрушители и фармацевтические остатки — на нейроразвитие.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИсследование алюминиевого адъюванта:\u003c/strong\u003e Изучение неврологических эффектов алюминиевых адъювантов, используемых в детских вакцинах, которые задокументировано накапливаются в мозговой ткани.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМеждународные сравнения:\u003c/strong\u003e Сравнение показателей аутизма в странах с различными графиками вакцинации, экологическими регуляциями и диетическими моделями для идентификации коррелирующих факторов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАнализ регрессии:\u003c/strong\u003e Расследование «регрессивного аутизма» — случаев, в которых дети развиваются нормально, а затем теряют языковые, социальные и когнитивные способности — включая временную близость к экологическим воздействиям.\u003c/p\u003e\n\u003cp\u003eРасследование будет проводиться через международные партнерства с исследовательскими институтами, независимыми от финансирования фармацевтической промышленности — критическое различие, поскольку большинство исследований аутизма, проведенных в Соединенных Штатах, финансировалось институтами со связями с фармацевтической промышленностью.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"информатор-cdc\"\u003eИнформатор CDC\u003c/h2\u003e\n\u003cp\u003eВ 2014 году д-р Уильям Томпсон, старший ученый CDC, раскрыл Конгрессу, что он и его коллеги в CDC совершили мошенничество в исследовании 2004 года, изучающем связь между вакциной MMR и аутизмом.\u003c/p\u003e\n\u003cp\u003eТомпсон утверждал, что авторы исследования — включая его самого — идентифицировали статистически значимую ассоциацию между вакциной MMR и аутизмом у афроамериканских мальчиков. Вместо того чтобы сообщить это открытие, Томпсон утверждал, авторы встретились и согласились исключить данные, которые произвели ассоциацию. Томпсон утверждал, что ему было приказано уничтожить документы, связанные с оригинальным анализом, хотя он сохранил копии.\u003c/p\u003e\n\u003cp\u003eУтверждения Томпсона никогда не расследовались CDC. Его не вызывали для дачи показаний перед Конгрессом, несмотря на то, что он предложил сделать это под присягой. Оригинальное исследование остается в литературе, неисправленное. Данные, которые описал Томпсон, никогда не были независимо рассмотрены.\u003c/p\u003e\n\u003cp\u003eРасследование РФК-младшего будет включать обзор утверждений Томпсона и оригинальных данных — потенциально предоставляя первый независимый анализ исследования, которое CDC предположительно манипулировал.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческий-императив\"\u003eПророческий императив\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«А кто соблазнит одного из малых сих, верующих в Меня, тому лучше было бы, если бы повесили ему мельничный жернов на шею и потопили его во глубине морской». — Матфей 18:6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПредупреждение о мельничном жернове — это самое суровое суждение, которое Иисус произносит в Евангелиях. Оно зарезервировано для тех, кто вредит детям — кто оскорбляет, заставляет спотыкаться или травмирует малых, доверенных их заботе.\u003c/p\u003e\n\u003cp\u003eЕсли эпидемия аутизма вызвана экологическими факторами, которые институты идентифицировали, но отказались решать — потому что их решение подразумевало бы продукты, которые они рекомендуют, отрасли, которые они защищают, или политики, которые они реализовали, — тогда мельничный жернов висит над каждым чиновником, который знал, каждым исследователем, которого заставили молчать, и каждым институтом, который выбрал доход вместо неврологической целостности поколения детей.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/91-The_Kinsey_Corruption.mp4\"\u003eThe Kinsey Corruption\u003c/a\u003e документирует, как развращенная наука, нацеленная на детей, становится институциональной политикой — как мошенническое исследование внедряется в регулирующие рамки и защищается институтами, которые зависят от него. Прикрытие аутизма, если оно существует, следует той же схеме.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e«И сказал Господь Самуилу: послушай голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтоб Я не царствовал над ними»\u003c/em\u003e. — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (Синодальный перевод)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 эхом звучит через каждый правительственный коридор сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их, что именно произойдет — их сыновья будут взяты на войну, их дочери на службу, их поля и виноградники захвачены, десятина со всего конфискована. Они выбрали человеческое правительство над царствованием Бога, и тирания последовала точно, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной и той же скрытой структуре власти. Голосование за любую сторону — это выбор, какое крыло взмахнет следующим, пока птица летит в том же направлении. Реальная власть никогда не была ни в одном избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eHHS — объявление о расследовании аутизма РФК-младшим\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — анализ Карен Кингстон эпидемиологии аутизма, подавления исследований CDC и документация воздействия экологических токсинов\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eДанные о распространенности аутизма CDC — Сводки наблюдения MMWR\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eИнформатор CDC Уильям Томпсон — документы раскрытия Конгрессу\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eМарк 10:13-14, Матфей 18:6 (Синодальный перевод)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (Синодальный перевод)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о предсмертном опыте Говарда Питтмана — Предупреждение о конце времен, данное ему Богом\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: раскрытые прискорбные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/91-The_Kinsey_Corruption.mp4\"\u003eThe Kinsey Corruption\u003c/a\u003e — Развращенная наука, нацеленная на детей, внедренная в институциональную политику\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — Правительственные программы с нераскрытыми неврологическими эффектами на население\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/109-Biometric_Beast_System.mp4\"\u003eBiometric Beast System\u003c/a\u003e — Система, которая мандатирует продукты под расследованием\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (Пещера сокровищ):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e — Проклятие, нацеленное на самых уязвимых\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers' Lies\u003c/a\u003e — Институциональное отрицание, защищающее отрасли, которые могли вызвать эпидемию\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eCDC обновляет государственное возмещение за детские вакцины\u003c/a\u003e — Реструктуризация финансовых стимулов графика вакцинации\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eCDC откладывает заседание консультативного комитета по вакцинам\u003c/a\u003e — Реформирование комитета, который устанавливает график под расследованием\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eCDC прекращает рекомендовать добавление фтора в питьевую воду\u003c/a\u003e — Решение экологических нейротоксинов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eHHS объявляет о трансформации здравоохранения MAHA\u003c/a\u003e — Комплексная рамка реформы\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОдин из тридцати детей. В триста раз выше показателя пятидесяти лет назад. И ни одного федерального расследования почему — до сих пор. Медицинский истеблишмент называет это «лучшей диагностикой». Писание называет это тем, что это есть: нападение на малых. РФК-младший запустил расследование, которое CDC отказывался проводить. Вопрос, на который он ответит — что вызывает неврологическое опустошение поколения американских детей — подавлялся, отклонялся и высмеивался десятилетиями. «Пустите детей приходить ко Мне» — дети приходят, и они приносят с собой доказательства того, что было сделано с ними. Мельничный жернов ждет тех, кто знал и ничего не сделал.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"РФК-младший объявляет о всемирных усилиях по определению причины аутизма\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(-
