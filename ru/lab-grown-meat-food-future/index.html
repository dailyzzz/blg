 есть мясо. Это было не случайностью или уступкой — это было божественным провидением. Животные, которых создал Бог, были даны человечеству как пища, чтобы быть поднято на земле, питаемые травой, и потреблены с благодарностью.\u003c/p\u003e\n\u003cp\u003eВ течение тысячелетий эти расположения поддерживали цивилизации. Животные ели то, что производила земля. Люди ели животных. Цикл был полным, естественным и учрежденным.\u003c/p\u003e\n\u003cp\u003eТеперь новый класс технологов и миллиардеров решил, что расположение Бога недостаточно — что животное должно быть исключено из уравнения и заменено клетками, растущими в стальных биореакторах, питаемыми синтетическими питательными веществами и продаваемыми как \"мясо\" в население, которое обучают принимать искусственное как эквивалент реальному.\u003c/p\u003e\n\u003cp\u003eТрек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/45-The_Strange_Land.mp4\"\u003eThe Strange Land\u003c/a\u003e говорит об ссылке народа Бога в мире, который заменил естественное на спроектированное, созданное на производство. Мясо, выращиваемое в лаборатории, является продуктом Странной Земли — места, где пища больше не выращивается, а производится, где питание больше не является даром от Бога, а является продуктом корпоративной биотехнологии.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-мясо-выращиваемое-в-лаборатории\"\u003eЧто такое мясо, выращиваемое в лаборатории?\u003c/h2\u003e\n\u003cp\u003eМясо, выращиваемое в лаборатории — также называемое культивированным мясом, мясом на основе клеток или культивированным мясом — производится путем извлечения мышечных клеток из живого животного, их помещения в биореактор и подачи им питательного среда, которая вызывает умножение клеток.\u003c/p\u003e\n\u003cp\u003eРезультат — масса животной мышечной ткани, которая никогда не была частью живого, дышащего животного. Он никогда не пасся на траве, никогда не видел солнца, никогда не участвовал в экологическом цикле, который определяет естественное животноводство.\u003c/p\u003e\n\u003cp\u003eЭто мясо без жизни — белок, произведенный в промышленном учреждении, неотличимом от фармацевтического завода.\u003c/p\u003e\n\u003cp\u003eСама терминология — это маркетинговое поле боя. Промышленность протестировала и отклонила многочисленные названия — \"мясо в пробирке,\" \"чистое мясо,\" \"синтетическое мясо\" — прежде чем остановиться на \"культивированном мясе,\" термине, выбранном через потребительское исследование для вызова образов сельского хозяйства, а не лабораторий. Язык намеренный. Если потребители ассоциировали продукт с тем, что это на самом деле — клетки, растущие в стальном чане, — спрос был бы минимален. Вся маркетинговая стратегия зависит от затемнения реальности производственного процесса.\u003c/p\u003e\n\u003cp\u003eПервый бургер, выращенный в лаборатории, был произведен доктором Марком Постом в Маастрихтском университете в 2013 году по стоимости примерно 330 000 долларов. Событие было поставлено как медиа-спектакль, финансируемый сооснователем Google Сергеем Брином, и представлено миру как доказательство того, что будущее пищи прибыло.\u003c/p\u003e\n\u003cp\u003eБургер был серым, безвкусным и требовал свежесока и шафрана, чтобы приблизиться к цвету и вкусу настоящего мяса. Критики пищи, которые пробовали его, описали его как \"близким к мясу\", но ему не хватало глубины, текстуры и удовлетворения настоящего.\u003c/p\u003e\n\u003cp\u003eС тех пор десятки компаний вошли в пространство культивированного мяса, поддерживаемые миллиардами в венчурном капитале. Ведущие компании промышленности включают Upside Foods (ранее Memphis Meats), Eat Just (которая производит культивированную курицу под брендом GOOD Meat), Mosa Meat и Aleph Farms.\u003c/p\u003e\n\u003cp\u003eВ июне 2023 года USDA предоставила свои первые одобрения за продажу мяса, выращенного в лаборатории, Upside Foods и GOOD Meat, отмечая начало коммерческой доступности в Соединенных Штатах.\u003c/p\u003e\n\u003cp\u003eНо фанфар был встречен тихой коммерческой неудачей. К 2024 году Upside Foods уволила значительные части своей рабочей силы. Стоимость производства оставалась порядками выше, чем обычное мясо. Обещание паритета цен — когда-то прогнозируемое на 2025 год — было отодвинуто неопределенно в будущее.\u003c/p\u003e\n\u003ch2 id=\"связь-билла-гейтса\"\u003eСвязь Билла Гейтса\u003c/h2\u003e\n\u003cp\u003eБилл Гейтс — это не просто сторонник мяса, выращенного в лаборатории. Он один из его самых агрессивных инвесторов и сторонников. Через свой личный инвестиционный портфель и Фонд Гейтса, Гейтс финансировал множество компаний культивированного мяса, включая Upside Foods, Ginkgo Bioworks и Impossible Foods (которая производит альтернативы на растительной основе).\u003c/p\u003e\n\u003cp\u003eВ своей книге 2021 года \"How to Avoid a Climate Disaster\" Гейтс явно призвал все развитые страны перейти на 100% синтетическое говядину, заявив: \"Я действительно думаю, что все богатые страны должны перейти на 100% синтетическую говядину.\"\u003c/p\u003e\n\u003cp\u003eГейтс одновременно стал крупнейшим частным владельцем сельскохозяйственной земли в Соединенных Штатах, приобретая примерно 270 000 акров в 19 штатах.\u003c/p\u003e\n\u003cp\u003eПарадокс намеренный: Гейтс инвестирует в технологию, которая заменит традиционное животноводство, в то время как приобретает землю, на которой в настоящее время происходит традиционное сельское хозяйство. Когда мясо, выращиваемое в лаборатории, вытесняет реальное мясо, сельскохозяйственная земля становится доступной для других целей — или просто остается под контролем Гейтса, консолидированной у независимых фермеров, которые больше не могут конкурировать.\u003c/p\u003e\n\u003cp\u003eЭто образец каждого технологического разрушения, разработанного классом миллиардеров: разрушить существующую систему, владеть заменой и извлекать прибыль из переходного периода.\u003c/p\u003e\n\u003cp\u003eЭто произошло с программным обеспечением (Microsoft), вакцинами (влияние Фонда Гейтса на глобальную политику здравоохранения), образованием (инициатива Common Core Фонда Гейтса) и теперь пищей.\u003c/p\u003e\n\u003cp\u003eОбщая нить — контроль — не улучшение человеческой жизни, а концентрация власти над системами, от которых зависит человеческая жизнь.\u003c/p\u003e\n\u003cp\u003eГейтс — не одиночка. Венчурные капиталовые фирмы, включая SoftBank, Temasek (суверенный фонд богатства Сингапура) и Breakthrough Energy Ventures (еще один фонд, связанный с Гейтсом), вливали миллиарды в культивированное мясо и альтернативные компании белков. Всемирный экономический форум видно содействует альтернативному белку в своей программе \"Great Reset\". Конвергенция миллиардного капитала, государственной политики и глобальных органов управления вокруг мяса, выращиваемого в лаборатории, является не органическим развитием рынка. Это скоординированная программа.\u003c/p\u003e\n\u003ch2 id=\"неизвестности-здоровья\"\u003eНеизвестности здоровья\u003c/h2\u003e\n\u003cp\u003eМясо, выращиваемое в лаборатории, никогда не подвергалось долгосрочным исследованиям кормления человека. Никто не знает, что происходит с человеческим телом, когда оно потребляет белок, культивированный на клетке, в течение лет или десятилетий.\u003c/p\u003e\n\u003cp\u003eНормативные одобрения, предоставленные USDA и FDA, были основаны на краткосрочных оценках безопасности, предоставленные компаниями, ищущими одобрение — той же моделью регулирования, которая одобрила ГМО, аспартам и каждый другой новый пищевой добавок, который позже был признан вредным.\u003c/p\u003e\n\u003cp\u003eСам процесс производства вызывает серьезные вопросы. Клетки культивированного мяса выращиваются в питательной среде, называемой \"сывороткой роста.\" Первоначально эта сыворотка была сывороткой плода крупного рогатого скота (FBS) — извлеченная из крови неродившихся телят, извлеченных из забитых беременных коров.\u003c/p\u003e\n\u003cp\u003eПромышленность попыталась разработать синтетические альтернативы FBS, но точный состав этих собственнических сыворотки роста не раскрывается публично. Какие химические вещества, гормоны, факторы роста и синтетические соединения используются для умножения животных клеток в биореакторе? Общественность не знает, потому что компании не требуются раскрывать свои собственнические процессы.\u003c/p\u003e\n\u003cp\u003eИсследователи рака отметили, что процесс заставления клеток быстро размножаться вне тела — основная технология культивированного мяса — функционально идентичен процессу растущего рака.\u003c/p\u003e\n\u003cp\u003eНормальные клетки имеют пределы для сколько раз они могут разделяться. Для производства мяса в масштабе, компании культивированного мяса должны использовать клетки, которые были бессмертны — генетически модифицированы, чтобы разделить неопределенно, обходя нормальный контроль клеток, который предотвращает неконтролируемый рост.\u003c/p\u003e\n\u003cp\u003eВопрос о том, представляет ли потребление бессмертных линий клеток онкологический риск для людей, не был изучен. Это даже не было адекватно задано.\u003c/p\u003e\n\u003cp\u003eКроме того, мясо, выращиваемое в лаборатории, требует антибиотиков для предотвращения бактериального загрязнения в биореакторах. Использование антибиотиков в производстве пищи уже является основным фактором устойчивости к противомикробным препаратам — одна из самых серьезных угроз общественному здравоохранению двадцать первого века.\u003c/p\u003e\n\u003cp\u003eПроизводство культивированного мяса может требовать еще более строгого использования антибиотиков, чем традиционное животноводство, потому что одно событие загрязнения в биореакторе может разрушить целую производственную партию.\u003c/p\u003e\n\u003cp\u003eПищевой профиль мяса, выращенного в лаборатории, также вопрос. Реальное мясо от животных на пастбище содержит не просто белок, но жирорастворимые витамины (A, D, E, K2), конъюгированную линолевую кислоту (CLA), омега-3 жирные кислоты, гемовое железо, цинк, B12, креатин, карнозин и десятки других соединений, которые существуют в животной ткани, потому что животное ело траву, впитывало солнце и участвовало в живой экосистеме. Мясо, выращиваемое в лаборатории, содержит мышечные клетки, питаемые синтетическими питательными веществами в стальном баке. Предположение, что эти два продукта питательно эквивалентны, — это то же предположение, которое привело к мошенничеству \"существенной эквивалентности\", одобрившему ГМО.\u003c/p\u003e\n\u003ch2 id=\"экологический-обман\"\u003eЭкологический обман\u003c/h2\u003e\n\u003cp\u003eОсновной маркетинговый аргумент в пользу мяса, выращиваемого в лаборатории, — экологическая устойчивость. Сторонники утверждают, что культивированное мясо производит меньше выбросов парниковых газов, использует меньше земли и требует меньше воды, чем традиционное животноводство.\u003c/p\u003e\n\u003cp\u003eЭти утверждения повторяются в освещении СМИ как установленные факты. Они, в лучшем случае, недоказанные прогнозы, основанные на гипотетических производственных сценариях, которые еще не существуют в масштабе.\u003c/p\u003e\n\u003cp\u003eИсследование 2023 года из Калифорнийского университета, Дэвис, опубликованное в журнале Environmental Science and Technology, обнаружило, что экологическое воздействие мяса, выращиваемого в лаборатории, может быть значительно хуже, чем производство обычной говядины.\u003c/p\u003e\n\u003cp\u003eИсследование анализировало требования энергии фармацевтических средств культивирования клеток и обнаружило, что углеродный след культивированного мяса может быть в 4-25 раз больше, чем обычная говядина, в зависимости от источника энергии, используемого для питания производственных объектов.\u003c/p\u003e\n\u003cp\u003eИнтенсивность энергии культивированного мяса огромна. Биореакторы должны поддерживаться при точных температурах. Ростовые среды должны быть произведены, стерилизованы и непрерывно заменены. Весь производственный цепь требует стерильности фармацевтического уровня — стандарта производства, который на много порядков более энергоемок, чем поднимание крупного рогатого скота на травяном поле.\u003c/p\u003e\n\u003cp\u003eРомантический образ гладких, чистых биореакторов, заменяющих грязные откормочные площадки, скрывает реальность, что энергия, химия и инфраструктурные требования промышленного культивирования клеток могут быть далеко более экологически разрушительными, чем традиционное сельское хозяйство, которое оно претендует заменить.\u003c/p\u003e\n\u003cp\u003eВодный след одинаково проблематичен. Производство мяса, выращиваемого в лаборатории, требует ультрачистой воды — воды, которая была очищена до фармацевтических стандартов, процесс, который сам по себе потребляет значительную энергию и производит химические отходы. Утверждение, что культивированное мясо использует меньше воды, чем обычная говядина, полагается на сравнения с промышленным откормом животных, не с системами на основе пастбища, где скот пьет естественно доступную воду, и их отходы возвращают питательные вещества на пастбище.\u003c/p\u003e\n\u003cp\u003eОтходы, производимые объектами культивированного мяса — потраченные ростовые среды, загрязненные партии, химические вещества стерилизации — классифицируются как фармацевтические отходы, не сельскохозяйственные отходы. Безопасное их размещение дорого и энергоемко. Корова производит навоз, который удобряет поле. Биореактор производит опасные отходы, которые должны быть обработаны в специализированном объекте.\u003c/p\u003e\n\u003cp\u003eМежду тем, экологический аргумент против традиционного сельского хозяйства игнорирует регенеративное сельское хозяйство — методы сельского хозяйства, которые используют управляемый выпас для построения почвы, секвестирования углерода, восстановления экосистем пастбище и производства питательных плотных продуктов без синтетических входов.\u003c/p\u003e\n\u003cp\u003eРегенеративное сельское хозяйство — это не теоретическая концепция. Это практикуется успешно на миллионах акров по всему миру. Но он не генерирует венчурные капиталовые возвраты, его невозможно запатентовать, и он не концентрирует контроль пищевого снабжения в руках нескольких корпораций.\u003c/p\u003e\n\u003cp\u003eТак что он игнорируется в повествовании мяса, выращиваемого в лаборатории, которое представляет выбор как бинарное: промышленные откормочные площадки или биореакторы. Регенеративная альтернатива стирается из разговора.\u003c/p\u003e\n\u003ch2 id=\"программа-белков-насекомых\"\u003eПрограмма белков насекомых\u003c/h2\u003e\n\u003cp\u003eМясо, выращиваемое в лаборатории, — не единственный синтетический белок, продвигаемый теми же интересами. Белок насекомых — производный от сверчков, мучных червей и черных личинок мух — позиционируется как еще одна \"устойчивая\" замена для традиционного животного белка.\u003c/p\u003e\n\u003cp\u003eЕвропейский союз одобрил домашних сверчков, желтых мучных червей и более мелких мучных червей для потребления человеком в 2023 году. Компании, включая Ynsect (которая привлекла 372 миллиона долларов в венчурном капитале) и Protix, строят промышленные фермы по содержанию насекомых, способные производить тысячи тонн белка насекомого ежегодно.\u003c/p\u003e\n\u003cp\u003eВсемирный экономический форум агрессивно продвигает потребление насекомых как решение изменения климата и продовольственной безопасности. Статьи на веб-сайте WEF объявили, что \"нам нужно поговорить о едении насекомых\" и что \"преимущества насекомых как пищи хорошо установлены.\"\u003c/p\u003e\n\u003cp\u003eОбщая нить, связывающая мясо, выращиваемое в лаборатории, белок насекомых и заменители на растительной основе, — это устранение традиционного животноводства и его замена корпоративно контролируемым производством белка. Независимо от того, поступает ли белок из биореактора, фермы по содержанию насекомых или завода по обработке сои, результат одинаков: фермер исключен, животное исключено, и корпорация контролирует пищу.\u003c/p\u003e\n\u003cp\u003eПрограмма белков насекомых продвигается с особой скоростью в развивающихся странах, где организации международного развития, финансируемые Фондом Гейтса и Мировым банком, продвигают разведение насекомых как \"устойчивое средство к существованию\" для мелких фермеров.\u003c/p\u003e\n\u003cp\u003eЛогика раскрывает: фермеры натурального хозяйства, которые когда-то разводили крупный рогатый скот, коз и кур — традиционные источники белка, которые на протяжении тысячелетий поддерживали сообщества, — поощряются поднимать сверчков и черных личинок мух вместо. Переход перемещает сельское хозяйство из системы, которая производит питательно плотный животный белок в систему, которая производит новый продукт белка с неизвестными долгосрочными последствиями для здоровья, в основном для экспорта в западные рынки.\u003c/p\u003e\n\u003cp\u003eФермеры получают часть значения. Корпорации, которые обрабатывают, упаковывают и продвигают белок насекомого, получают прибыль. Образец отражает каждое другое корпоративное разрушение традиционных пищевых систем: устранить существующую систему, вводить замену, захватить цепь стоимости и оставить производителя зависимым от новой системы.\u003c/p\u003e\n\u003ch2 id=\"война-на-традиционный-сельскохозяйства\"\u003eВойна на традиционный сельскохозяйства\u003c/h2\u003e\n\u003cp\u003eМясо, выращиваемое в лаборатории, не разрабатывается в вакууме. Это разрабатывается в контексте систематической кампании по устранению традиционного животноводства.\u003c/p\u003e\n\u003cp\u003eНормативные давления, экологические мандаты и углеродный налог развертываются, чтобы сделать традиционное сельское хозяйство экономически нежизнеспособным — особенно для небольших и независимых фермеров, которые не могут поглотить расходы соответствия.\u003c/p\u003e\n\u003cp\u003eВ Нидерландах политика сокращения азота правительства направлена на тысячи ферм для закрытия, с заявленной целью сокращения выбросов сельскохозяйственного азота на 50%. Нидерландские фермеры — некоторые из которых работали на одной и той же земле в течение поколений — сказано, что их фермы должны быть захвачены или закрыты.\u003c/p\u003e\n\u003cp\u003eНидерланды — второй по величине сельскохозяйственный экспортер в мире, и разрушение его сельскохозяйственного сектора создало бы массивные сбои в пищевых поставках, удобно увеличивая спрос на промышленные альтернативы, которые компании, финансируемые Гейтсом, производят.\u003c/p\u003e\n\u003cp\u003eАналогичные политики появляются по всей Европе, Канаде и Новой Зеландии. Ирландия предложила истребление 200 000 молочных коров для выполнения целей климата. Канада применила целевые показатели сокращения азотных удобрений, которые угрожают урожайности культур.\u003c/p\u003e\n\u003cp\u003eОбразец последователен: используйте экологическое регулирование для разрушения традиционного сельского хозяйства, затем заполните зазор корпоративно контролируемыми альтернативами — мясом, выращенным в лаборатории, белком насекомых, заменителями на растительной основе и другими продуктами, которые могут быть произведены, запатентованы и проданы в масштабе теми же интересами, которые лоббировали за нормативные акты.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в нашей статье на \u003ca href=\"/processed-food-addiction-design/?lang=ru\"\u003eProcessed Food: Engineered for Addiction\u003c/a\u003e, пищевая промышленность имеет десятилетия опыта замены натуральных продуктов спроектированными заменителями — и заставляет потребителей предпочитать замену.\u003c/p\u003e\n\u003cp\u003eМясо, выращиваемое в лаборатории, — это следующая итерация этой стратегии: заменить провидение Бога на человеческое изобретение и убедить публику, что замена превосходит.\u003c/p\u003e\n\u003ch2 id=\"программа-контроля\"\u003eПрограмма контроля\u003c/h2\u003e\n\u003cp\u003eПо своей сути, мясо, выращиваемое в лаборатории, — это контроль. Когда пища выращивается на фермах миллионами независимых фермеров, пищевое снабжение децентрализовано и устойчиво к централизованному контролю.\u003c/p\u003e\n\u003cp\u003eКогда пища производится на биореакторах горстью корпораций, пищевое снабжение централизовано и подчиняется тем же механизмам контроля, которые управляют любым промышленным продуктом — ценообразование, доступ, нормирование и обусловленность.\u003c/p\u003e\n\u003cp\u003eМир, который зависит от мяса, выращиваемого в лаборатории, для его белка, — это мир, который зависит от корпораций, которые его производят. Если эти корпорации решат повысить цены, потребители не имеют альтернативы. Если эти корпорации находятся под давлением правительств, чтобы ограничить доступ — возможно, через систему социальных кредитов, требование цифровой идентификации или схему углеродного нормирования — потребители подчиняются или голодают.\u003c/p\u003e\n\u003cp\u003eФерма не может быть отключена переключателем. Биореактор может.\u003c/p\u003e\n\u003cp\u003eЭто связывает непосредственно с более широкой программой контроля пищи, задокументированной в нашей статье на \u003ca href=\"/gmo-genetic-modification-food/?lang=ru\"\u003eGMO: The Genetic Modification of Your Food Supply\u003c/a\u003e. Те же силы, которые запатентовали семена, отравили почву и сделали фермеров зависимыми от входов корпоративных химических веществ, теперь разрабатывают следующий этап: полное устранение фермера и замена сельского хозяйства производством.\u003c/p\u003e\n\u003cp\u003eЦель никогда не была накормить мир. Цель всегда была владеть пищевым снабжением.\u003c/p\u003e\n\u003ch2 id=\"нормативный-быстро-траке\"\u003eНормативный быстро-траке\u003c/h2\u003e\n\u003cp\u003eСкорость, с которой мясо, выращиваемое в лаборатории, получило нормативное одобрение в Соединенных Штатах, раскрывает влияние интересов позади.\u003c/p\u003e\n\u003cp\u003eUSDA и FDA совместно надзирают культивированное мясо в соответствии с системой, установленной в 2019 году. FDA пересматривает сбор клеток, банковскую ячейку и процессы роста клеток. USDA надзирает уборку, обработку, упаковку и маркировку.\u003c/p\u003e\n\u003cp\u003eЭтот двух-агентский системой был разработан для того, чтобы казаться строгим, обеспечивая минимальный нормативный контроль необходимый. Требуются долгосрочные исследования кормления. Не требовались независимые оценки безопасности. Компании, ищущие одобрение, предоставили свои собственные данные безопасности — та же модель самосертификации, которая позволила ГМО в пищевое снабжение без независимого тестирования.\u003c/p\u003e\n\u003cp\u003eТребования маркировки особенно выявляющий. USDA одобрил термин \"ячейка-культивированная\" для продуктов, выращенных в лаборатории — термин, специально выбранный для избежания слов \"лаб,\" \"искусственное,\" или \"синтетическое,\" которые могли бы отсадить потребителей.\u003c/p\u003e\n\u003cp\u003eПромышленность агрессивно лоббировала против термина \"выращенный в лаборатории,\" утверждая, что это было \"уничижительное.\" Что уничижительное об точном описании того, откуда продукт? Ответ состоит в том, что точный язык дал бы потребителям информацию, которую они нуждаются, чтобы сделать осведомленные выборы — и осведомленные выборы не находятся в интересах промышленности.\u003c/p\u003e\n\u003cp\u003eНесколько штатов боролись спиной. Алабама, Флорида и Аризона введены в закон запрета продажи мяса, выращиваемого в лаборатории, в пределах их границ. Италия стала первой европейской страной для полного запрета культивированного мяса в 2023 году, с премьер-министром Джорджией Мелони, объявляя, что Италия будет защищать свое пищевое наследство и \"естественную пищу.\"\u003c/p\u003e\n\u003cp\u003eЭти законодательные действия раскрывают глубину общественного неудовольствия с технологией — и степень, до которой его сторонники должны полагаться на нормативный захват, а не на спрос потребителя для того, чтобы привести свои продукты на рынок.\u003c/p\u003e\n\u003ch2 id=\"психологическое-обусловливание\"\u003eПсихологическое обусловливание\u003c/h2\u003e\n\u003cp\u003eПродвижение мяса, выращиваемого в лаборатории, белка насекомых и альтернатив на растительной основе сопровождается сложной кампанией психологического обусловливания — усилием переделать общественное отношение к пище, которое было десятилетиями в изготовлении.\u003c/p\u003e\n\u003cp\u003eДвижение прав животных — финансируемое отчасти теми же фондами, которые инвестируют в альтернативные белки — потратило годы на культивирование нравственной тревоги по потреблению мяса. Документальные фильмы, кампании социальных СМИ и одобрения знаменитостей создали культурную окружающую среду, в которой едение мяса все больше ассоциируется с виной, экологическим разрушением и этическим отказом.\u003c/p\u003e\n\u003cp\u003eЭтот нравственный основы служит коммерческим интересам промышленности альтернативного белка идеально. Если потребители могут быть сделаны чувствовать себя виновно при едении реального мяса, они становятся восприимчивыми к альтернативам — независимо от того, здоровее ли эти альтернативы, безопаснее или более устойчивы.\u003c/p\u003e\n\u003cp\u003eОбусловливание расширяется к детям. Школьные учебные планы все чаще продвигают диеты на растительной основе и альтернативные белки. Повествование, что \"мясо плохо для планеты,\" представлено как установленный факт в образовательных материалах, финансируемых организациями с прямыми финансовыми связями к промышленности альтернативного белка.\u003c/p\u003e\n\u003cp\u003eЦель генерационна. Взрослые, которые выросли едением реального мяса, могли сопротивляться переходу. Их дети — поднято на диете вины, пропаганды и обработанных продуктов на растительной основе — могут.\u003c/p\u003e\n\u003ch2 id=\"библейское-отражение\"\u003eБиблейское отражение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ибо всякая скотина в лесу Мне принадлежит, и крупный скот на тысячах холмов. Я знаю всех птиц на горах, и звери полевые предо Мною.\" — Псалом 50:10-11\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКрупный рогатый скот принадлежит Богу. Зверей поля он же. Он создал их, поддерживает их и дал их человечеству как провидение. Промышленность мяса, выращиваемого в лаборатории, не признает это. Это рассматривает животное как проблему, которая будет исключена, естественную пищевую цепь как неэффективность, подлежащая оптимизации, и весь созданный порядок как сырье для корпоративного переизобретения.\u003c/p\u003e\n\u003cp\u003eНо дизайн Бога не неэффективен. Корова, которая пасется на траве, преобразует солнечный свет в белок процессом, столь элегантным, что никакой биореактор не может его воспроизвести. Пастбище, на котором пасется корова, строит почву, секвестирует углерод, поддерживает биоразнообразие и производит пищу — все одновременно, все устойчиво, все свободно.\u003c/p\u003e\n\u003cp\u003eЛаборатория заменяет это энергоемким, химическим-зависимым, корпоративно контролируемым производством и называет это прогрессом.\u003c/p\u003e\n\u003cp\u003eДух позади мяса, выращиваемого в лаборатории, — это то же самое, что построило Башню Вавилона — вера, что человеческая технология может улучшить божественный дизайн, что то, что создал Бог, может быть превосходная тем, что человек спроектировал.\u003c/p\u003e\n\u003cp\u003eЭто гордость цивилизации, которая забыла, кто обеспечивает его пищу, и верит, что может самостоятельно производить свою собственную питание независимо от Создателя. История ясна о том, что происходит с башнями, построенными на том основании.\u003c/p\u003e\n\u003cp\u003eБог не дал человечество биореактор. Он дал крупного рогатого скота, овец, коз, рыб и птиц. Он дал луга, реки, леса и сложную паутину жизни, которая преобразует солнечный свет в питание через процессы, настолько сложные, что величайшие корпорации биотехнологии на земле не могут их воспроизвести.\u003c/p\u003e\n\u003cp\u003eВыбор между реальным мясом и мясом, выращиваемым в лаборатории, — это не просто пищевой выбор. Это выбор между двумя цивилизациями — одной, которая доверяет провидению Создателя, и одной, которая доверяет человеческой технологии. Одна производит изобилие через смирение перед природой. Другое обещает эффективность через контроль над природой. Только один накормил человечество в течение десяти тысяч лет. Другой еще не произвел коммерчески жизнеспособный продукт.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/135-Food_Price_Shadow_Industry.mp4\"\u003eFood Price Shadow Industry\u003c/a\u003e — спроектированное будущее пищи\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/61-Synthetic_Biology.mp4\"\u003eSynthetic Biology\u003c/a\u003e — синтетическая пища и синтетическая жизнь\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/processed-food-addiction-design/?lang=ru\"\u003eProcessed Food: Engineered for Addiction\u003c/a\u003e — Как пищевая промышленность спроектирует искусственные заменители для реальной пищи\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/gmo-genetic-modification-food/?lang=ru\"\u003eGMO: The Genetic Modification of Your Food Supply\u003c/a\u003e — Захват корпорацией семенного снабжения, который способствовал пути для пищи, выращенной в лаборатории\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eБог дал человечеству крупный рогатый скот, овец, коз, рыб и птиц — живые существа, которые ят живую траву под живым солнцем и производят живую пищу. Лаборатория дает человечеству клетки в чане, умножается химикатов в реакторе, собственный корпорацией и продается как будущее. Один провидение. Другой контрафакт. Вопрос не в том, может ли мясо, выращиваемое в лаборатории, заменить реальное мясо. Вопрос в том, примет ли человечество замену — и что это будет означать, когда корпорации, которые контролируют биореакторы, будут контролировать белок снабжение всего мира. То, что Бог создал, не может быть улучшено. То, что человек производит, всегда, в конце концов, раскрывается как низкие. Крупный рогатый скот на тысячах холмов еще его. Клетки в биореакторе принадлежат Билла Гейтса.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/food-environment/\",\"className\":\"category-badge\",\"children\":\"food-environment\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Мясо, выращиваемое в лаборатории: будущее пищи или ее конец?\"}],[\"$\",\"p\",null,{\"st
