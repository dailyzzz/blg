удешь питаться от неё все дни жизни твоей.\" — Бытие 3:17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКогда Бог поддерживал израильтян в пустыне, Он дал им манну — хлеб с неба, чистое провидение из рук Творца. Она появлялась каждое утро на земле, нетронутая человеческой промышленностью, незагрязненная коммерцией, не требующая обработки, никаких добавок, никаких цепи поставок. Это была еда в ее исходном дизайне: пропитание, которое кормило без отравления.\u003c/p\u003e\n\u003cp\u003eПосле падения земля сама была проклята. Провидение стало трудом. Но даже в проклятии земля все еще приносила пищу, которая поддерживала жизнь — несовершенную, требующую пота, но не умышленно токсичную. То, с чем мы сталкиваемся сегодня, намного хуже, чем проклятие шипов и тернов. Продовольственное снабжение сегодня не просто падаль — это \u003cstrong\u003eспроектировано для вреда\u003c/strong\u003e. Загрязнение — это не несчастье природы, а следствие промышленных систем, которые приоритизируют прибыль над человеческой жизнью, систем, которые преднамеренно позволяют свинцу, мышьяку, ртути и кадмию течь в еду, которую матери кормят своих младенцев.\u003c/p\u003e\n\u003cp\u003eКак исследует трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/43-Hunger_and_Thirst.mp4\"\u003eHunger and Thirst\u003c/a\u003e, существует разрушительная инверсия в работе: провидение Бога против отравленного провидения. Бог, который пролил манну с неба, смотрит, как корпорации проливают тяжелые металлы в детскую смесь. Контраст не тонкий. Это духовное мерзость, одетое в одобренную FDA упаковку.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"масштабы-загрязнения-что-раскрывает-независимое-тестирование\"\u003eМасштабы загрязнения: Что раскрывает независимое тестирование\u003c/h2\u003e\n\u003cp\u003eИстинный масштаб загрязнения тяжелыми металлами в американском продовольственном снабжении был задокументирован не FDA или USDA — агентства, назначенные защищать общественное здоровье — а независимыми лабораториями, следователями журналистики и Подкомитетами Конгресса, которые вынудили данные в открытие.\u003c/p\u003e\n\u003ch3 id=\"consumer-reports-десятилетия-находок\"\u003eConsumer Reports: десятилетия находок\u003c/h3\u003e\n\u003cp\u003eConsumer Reports провел некоторые из самых строгих независимых тестирований загрязнения тяжелыми металлами в продуктах питания, доступные общественности. Их находки поражают как в масштабе, так и в согласованности:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eРис и продукты на основе риса\u003c/strong\u003e постоянно тестируют высокие уровни неорганического мышьяка. Исследование Consumer Reports 2012 года обнаружило измеримые уровни мышьяка в каждом из 223 образцов риса протестированных, включая белый рис, коричневый рис, органический рис и детские каши на основе риса. Дополнительное тестирование в 2014 году и снова в 2022 году подтвердило, что уровни не имели значительного снижения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТемный шоколад\u003c/strong\u003e тестирование в 2022 году раскрыло, что 23 из 28 темных шоколадных батончиков протестированных содержали тревожные уровни свинца, кадмия или оба. Бренды, проданные как премиум, органический и справедливая торговля, не были освобождены — некоторые из худших нарушителей несли самые добродетельные ярлыки.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФруктовые соки\u003c/strong\u003e — в частности, яблочные и виноградные соки — протестировали положительные результаты на свинец, мышьяк и кадмий на уровнях Consumer Reports пришел к выводу, были небезопасны для детей, которые пьют их регулярно. Исследование 2019 года обнаружило измеримые тяжелые металлы в каждом из 45 соков протестированных, по крупным брендам.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПротеиновые порошки\u003c/strong\u003e были обнаружены содержащими свинец, мышьяк, кадмий и ртуть. Исследование Clean Label Project 2018 года протестировало 134 продукта протеинового порошка от 52 брендов и обнаружило, что 75% содержали измеримый свинец, в то время как 74% содержали кадмий. Протеиновые порошки на растительной основе — проданные как самый здоровый вариант — постоянно протестировали хуже, чем альтернативы на основе сыворотки.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"clean-label-project-скрытые-токсины\"\u003eClean Label Project: скрытые токсины\u003c/h3\u003e\n\u003cp\u003eClean Label Project, некоммерческая организация, которая проводит независимое тестирование потребительских продуктов, опубликовала некоторые из наиболее тревожных данных по загрязнению тяжелыми металлами в продуктах питания:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eДетская смесь и детская еда\u003c/strong\u003e тестирование раскрыло, что многие продукты, проданные специфически для младенцев, содержали обнаруживаемые уровни свинца, мышьяка, кадмия и ртути. Продукты, помеченные \"органический\", не были значительно чище — в некоторых случаях они протестировали хуже, чем обычные альтернативы.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДетская смесь\u003c/strong\u003e бренды, которые родители доверяют неявно, были обнаружены содержащими измеримые уровни промышленных загрязнителей, которые не имеют безопасного порогового значения в развивающихся младенцах. Тестирование Clean Label Project в более чем 500 детских продуктов и детских смесей обнаружило тяжелые металлы в подавляющем большинстве.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСуперпродовольственные порошки\u003c/strong\u003e — зеленые порошки, смеси грибов и адаптативные смеси, продаваемые по премиум-цены в магазинах здоровой пищи — были обнаружены содержащими повышенные уровни свинца и кадмия, вероятно, поглощены из загрязненной почвы.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"др-ана-михалча-мышьяк-ртуть-и-свинец-в-детских-смесях\"\u003eДр. Ана Михалча: мышьяк, ртуть и свинец в детских смесях\u003c/h3\u003e\n\u003cp\u003eДр. Ана Михалча, исследователь и врач, который задокументировал загрязнение по продовольственному и фармацевтическому снабжению, привлекла внимание к критическим находкам, появляющимся из программ тестирования штата. Ее документация \"Инициатива Флориды находит мышьяк, ртуть, свинец в детских смесях\" выделяет, как целевые программы тестирования штата подтвердили то, что независимые лаборатории были предупреждением о годы: детские смеси — единственный источник питания для миллионов младенцев — содержат измеримые количества тяжелых металлов, известных, чтобы вызвать необратимое неврологическое повреждение в развивающихся мозгах.\u003c/p\u003e\n\u003cp\u003eТо, что делает работу Михалчи особенно значительной, — это контекст, который она предоставляет. Это не следы количества от естественного варьирования минералов. Это уровни, которые при потреблении ежедневно младенцами на протяжении месяцев и лет, накапливают дозам, которые исследование на основе рецензирования связала с сниженным IQ, нарушениями поведения и задержками развития. Младенцы, которые потребляют эти смеси, не имеют выбора в этом вопросе, не имеют способности согласиться и не имеют способности детоксифицировать эти металлы из их развивающихся тел.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"отчет-конгресса-компании-детской-пищи-знали\"\u003eОтчет Конгресса: компании детской пищи знали\u003c/h2\u003e\n\u003cp\u003eВ феврале 2021 года Подкомитет Палаты представителей по экономической и потребительской политике выпустил отчет под названием \u003cstrong\u003e\"Детские продукты загрязнены опасными уровнями мышьяка, свинца, кадмия и ртути.\"\u003c/strong\u003e Отчет был основан на внутренних документах, полученных от крупных производителей детской пищи, и его находки были разрушительными:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNurture (HappyBABY)\u003c/strong\u003e продала продукты, которые протестировали столь высокие как 641 ppb (части на миллиард) свинца — более чем в шесть раз выше, чем предлагаемый FDA лимит для бутилированной воды.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBeech-Nut\u003c/strong\u003e использовала ингредиенты с уровнями мышьяка в 913,4 ppb и уровнями свинца в 886,9 ppb.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHain (Earth's Best Organic)\u003c/strong\u003e продала продукты со свинцом уровни в 352 ppb и мышьяк в 129 ppb.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGerber\u003c/strong\u003e сообщила, что более чем две трети его готовых детских продуктов питания содержали тревожные уровни по крайней мере одного тяжелого металла.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНаиболее осуждающее раскрытие в отчете Конгресса не был уровнями загрязнения самим — это было, что \u003cstrong\u003eкомпании знали\u003c/strong\u003e. Внутренние документы тестирования показали, что производители были осведомлены их продукты содержали повышенные уровни тяжелых металлов и продолжали их продавать. В некоторых случаях компании установили свои собственные внутренние стандарты для приемлемого загрязнения — и затем превышали даже эти само-импозиреванные лимиты при продолжении продажи продуктов.\u003c/p\u003e\n\u003cp\u003eТри крупных компании детской пищи — Walmart (Parent's Choice), Sprout Organic Foods и Campbell's (Plum Organics) — \u003cstrong\u003eотказали сотрудничать\u003c/strong\u003e с исследованием Конгресса полностью, отказываясь предоставить внутренние данные тестирования.\u003c/p\u003e\n\u003cp\u003eВывод подкомитета был явным: \"FDA не установил максимальные уровни для тяжелых металлов в детской пище, и компании эксплуатируют результирующую пустоту.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"тяжелые-металлы-в-рисе-проблема-мышьяка\"\u003eТяжелые металлы в рисе: Проблема мышьяка\u003c/h2\u003e\n\u003cp\u003eРис занимает уникальное положение в разговоре о тяжелых металлах из-за его биологии. Рис растет в затопленных паддиях, и рисовое растение является необычайно эффективным в поглощении неорганического мышьяка из обоих почвы и воды. Это значит, что даже рис, выращиваемый в относительно чистых условиях, поглощает более мышьяка, чем большинство других урожаев.\u003c/p\u003e\n\u003cp\u003eНо проблема является усложненной историей. Большинство земли растущей риса в американском юге — в частности, в Арканзасе, Луизиане, Миссисипи и Техасе — ранее использовалось для выращивания хлопка, где свинцовые арсенатные пестициды были применены тяжело на протяжении десятилетий. Те остатки мышьяка остаются в почве сегодня и поглощаются рисовыми растениями, выращиваемыми в этих же полях.\u003c/p\u003e\n\u003cp\u003eПоследствия являются широко распространенными:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eДетские каши на основе риса\u003c/strong\u003e типично являются первой твердой едой, даной американским младенцам. Собственное тестирование FDA обнаружило, что детские каши на основе риса содержат, в среднем, более высокие уровни неорганического мышьяка, чем любая другая категория протестированной еды.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРисовое молоко, рисовая мука, рисовый сироп и закуски на основе риса\u003c/strong\u003e переносят загрязнение в тысячи продуктов, многие из которых проданы детям.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКоричневый рис\u003c/strong\u003e постоянно тестирует более высокие уровни мышьяка, чем белый рис, потому что мышьяк концентрируется в слое отруби — именно та часть, которая делает коричневый рис \"более здоровым\" по обычным питательным стандартам.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОрганический рис\u003c/strong\u003e не предлагает значительной защиты против загрязнения мышьяком, потому что мышьяк приходит из почвы и воды, не от применения пестицидов.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFDA знала о мышьяке в рисе больше чем десятилетие. В 2016 году агентство предложила необязательный уровень руководства в 100 ppb для неорганического мышьяка в детских рисовых кашах. По состоянию на 2025 год это руководство остается ровно то — руководство. Это не подлежит обязательному исполнению, и это применяет только к детским рисовым кашам, не к рисовым продуктам потребляемым детьми и взрослыми.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"темный-шоколад-свинец-и-кадмий\"\u003eТемный шоколад: свинец и кадмий\u003c/h2\u003e\n\u003cp\u003eВ декабре 2022 года Consumer Reports опубликовала результаты тестирования в 28 темных шоколадных батончиков, которые посылали ударные волны через комиссию здоровой пищи. Темный шоколад — широко продвигаемый для его содержания антиоксидантов и кардиоваскулярных преимуществ — был обнаружен содержащим значительные уровни свинца и кадмия.\u003c/p\u003e\n\u003cp\u003eИз 28 батончиков протестированных:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e23 батонча\u003c/strong\u003e (82%) содержали свинец, кадмий или оба на уровнях, превышающих то, что Consumer Reports рассматривал как безопасное для ежедневного потребления.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПять батончиков\u003c/strong\u003e превышили Калифорнийский уровень максимально допустимой дозы предложения 65 (MADL) для самого свинца.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗагрязнение кадмием\u003c/strong\u003e казалось, произойти главным образом из какао завода поглощение кадмия из вулканических почв в западной Африке и южной Америке, где какао выращивается.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗагрязнение свинцом\u003c/strong\u003e казалось, произойти главным образом \u003cstrong\u003eпосле урожая\u003c/strong\u003e, во время процесса брожения и сушки, когда какао бобы распространены в открытом воздухе и подвергнуты атмосферному отложению — включая свинец от промышленного загрязнения и, как мы обсудим, из металлических частиц, рассеянных программами геоинжинирования.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЗатронутые бренды включали Hershey's, Godiva, Lindt, Trader Joe's, Hu, Endangered Species и Theo — охватывание полного спектра от массового рынка к премиум артисанальному шоколаду.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"нормативный-отказ-неадекватные-пороги-и-захваченное-регулирование\"\u003eНормативный отказ: неадекватные пороги и захваченное регулирование\u003c/h2\u003e\n\u003cp\u003eПодход FDA к тяжелым металлам в продовольствии может быть суммирован в одном слове: \u003cstrong\u003eнебрежность\u003c/strong\u003e.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСвинец в еде:\u003c/strong\u003e FDA предложила (не требуемые) уровни действия для свинца в детской пище в 10-20 ppb, в зависимости от категории пищи. Для взрослой пищи практически нет применяемых федеральных стандартов. Для контекста, уровень действия EPA для свинца в питьевой воде составляет 15 ppb — и многие ученые утверждают даже это слишком высоко.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМышьяк в еде:\u003c/strong\u003e FDA предложила необязательное руководство в 100 ppb для неорганического мышьяка в детских рисовых кашах. Для мышьяка в яблочном соке руководство составляет 10 ppb. Для большинства других продуктов нет стандарта вообще.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКадмий в еде:\u003c/strong\u003e FDA не имеет установленных лимитов для кадмия в еде в Соединенных Штатах.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРтуть в еде:\u003c/strong\u003e Вне советов на потреблении рыбы, FDA не имеет применяемых лимитов для ртути в не-морепродуктовых продуктах.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСравните это с европейским союзом, который установил применяемые максимальные лимиты для свинца, кадмия и мышьяка по широкому диапазону категорий продуктов питания с 2006 года, с регулярными пересмотрами для понижения этих лимитов, как новое исследование появляется.\u003c/p\u003e\n\u003cp\u003eВопрос состоит не в том, осведомлена ли FDA о проблеме — Конгресс отчеты, независимое тестирование и собственные данные агентства делают невежество невозможно. Вопрос \u003cstrong\u003eпочему FDA позволяет этому продолжаться\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в нашей статье по \u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eRockefeller Medicine\u003c/a\u003e, американский нормативный аппарат не существует для защиты общественности. Он существует для управления восприятием общественности безопасности при служении коммерческим интересам отраслей, которые он номинально регулирует. Вращающаяся дверь FDA с фармацевтической и продовольственной отраслей, его полагание на финансируемые отраслью исследования безопасности и его непротиворечивый образец установления необязательного \"руководства\", а не применяемых стандартов, не ошибки в системе — это система, работающая точно как спроектировано.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"защита-и-детоксикация-что-может-быть-сделано\"\u003eЗащита и детоксикация: Что может быть сделано\u003c/h2\u003e\n\u003cp\u003eНакопление тяжелых металлов в теле не является необратимым. Хелирование терапия и целевые протоколы детоксикации могут уменьшить тяжелое металлическое бремя тела, хотя процесс требует знания, дисциплины и в некоторых случаях медицинского контроля.\u003c/p\u003e\n\u003ch3 id=\"стратегии-диеты\"\u003eСтратегии диеты\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eМинимизируйте потребление риса\u003c/strong\u003e, в частности для младенцев и молодых детей. Когда рис потребляется, промойте тщательно и варите в избыточной воде (6:1 воды к рисовому соотношению), сливая избыток — это может уменьшить мышьяковое содержание на до 60%.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVariousGrain источники.\u003c/strong\u003e Квиноа, просо, гречиха и овсы обычно тестируют более низкие уровни для тяжелых металлов, чем рис.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВыберите протеиновые порошки тщательно.\u003c/strong\u003e Продукты третьей-стороны протестированные с опубликованными сертификатами тяжелого металла (NSF, Informed Sport) предлагают больше прозрачности.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОграничьте потребление темного шоколада\u003c/strong\u003e или ищите бренды, которые публикуют результаты тестирования тяжелого металла третьей-стороны.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВыращивайте вашу собственную еду\u003c/strong\u003e где возможно, используя протестированную почву и источники чистой воды. Как наша статья на \u003ca href=\"/organic-farming-under-attack/?lang=ru\"\u003eOrganic Farming Under Attack\u003c/a\u003e задокументирует, даже это становится все более трудным — но это остается одним из наиболее прямых путей для уменьшения воздействия.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФильтр вашу воду.\u003c/strong\u003e Системы обратного осмоса удаляют тяжелые металлы, которые углеродные фильтры пропускают. Посмотрите нашу статью на \u003ca href=\"/tap-water-contaminants-truth/?lang=ru\"\u003eTap Water Contaminants\u003c/a\u003e для детального руководства фильтрации.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eДля полного подхода для уменьшения токсичного бремени, посмотрите нашу статью на \u003ca href=\"/detox-protocols-comprehensive-guide/?lang=ru\"\u003eDetox Protocols\u003c/a\u003e.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"духовное-измерение-провидение-и-отравленное-провидение\"\u003eДуховное измерение: провидение и отравленное провидение\u003c/h2\u003e\n\u003cp\u003eЗагрязнение тяжелыми металлами продовольственного снабжения — это не просто кризис общественного здоровья — это духовная инверсия.\u003c/p\u003e\n\u003cp\u003eВ писаниях еда последовательно представлена как выражение провидения Бога и ухода. Бог кормил Адама и Еву в саду. Он ливал манну с неба для Израиля. Иисус умножил булочки и рыб для толпы. Он объявил себя \"хлебом жизни\" (Иоанна 6:35). Он учил своих учеников молиться, \"Дай нам сегодня наш ежедневный хлеб\" (Матфей 6:11). На последней вечере он сломал хлеб и сказал, \"Это мое тело, дано за вас\" (Лука 22:19).\u003c/p\u003e\n\u003cp\u003eЕда, в библейской основе, является священной. Это как Бог поддерживает физическую жизнь, как он демонстрирует верность, как он общается со своим народом.\u003c/p\u003e\n\u003cp\u003eЧто это значит, тогда, когда продовольственное снабжение сама становится вектором вреда? Когда хлеб, который должен поддерживать жизнь, доставляет свинец в развивающиеся мозги? Когда рисовая каша, которая должна питать младенца, несет мышьяк в ткани, которые все еще формируют? Когда шоколад, проданный как здоровая еда, накапливает кадмий в почках тех, кто потребляет это?\u003c/p\u003e\n\u003cp\u003eЭто значит, что провидение сама была скоррумпирована — не проклятием Бытия 3, а преднамеренными выборами людей, которые ценят прибыль над человеческой жизнью. Это Исав продажи его рождения для чаши похлебки, перевернутой: корпорации продажи отравленной похлебки и зовут это рождением питания.\u003c/p\u003e\n\u003cp\u003eКак наша статья на \u003ca href=\"/glyphosate-food-supply-poison/?lang=ru\"\u003eGlyphosate in the Food Supply\u003c/a\u003e задокументирует, тяжелые металлы являются только одним слоем загрязнения. Глифосат, микропластики, остатки мРНК, растительные масла семян и синтетические добавки формируют перекрывающуюся матрицу токсинов, которые никакой единый потребительский выбор не может полностью смягчить — потому что никакой единый нормативный орган не спроектирован для защиты вас. Они спроектированы, как исследуется в \u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eRockefeller Medicine\u003c/a\u003e, управлять болезнью — не предотвращайте это. Больные популяции являются прибыльными популяциями.\u003c/p\u003e\n\u003ch2 id=\"найти-больше-информации\"\u003eНайти больше информации\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: 3e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/43-Hunger_and_Thirst.mp4\"\u003eHunger and Thirst\u003c/a\u003e — Чистое провидение Бога против отравленного провидения падших миров\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/edta-chelation-heavy-metal-detox/?lang=ru\"\u003eEDTA Chelation and Heavy Metal Detox\u003c/a\u003e — как терапия хелирования удаляет накопленные тяжелые металлы из тела\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/glyphosate-food-supply-poison/?lang=ru\"\u003eGlyphosate in the Food Supply\u003c/a\u003e — Гербицид, загрязняющий почти каждую продовольственную категорию и его разрушительные эффекты здоровья\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eRockefeller Medicine and Captured Healthcare\u003c/a\u003e — Почему нормативные агентства, которые должны защищать вас, служат отраслям, которые отравляют вас\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/detox-protocols-comprehensive-guide/?lang=ru\"\u003eDetox Protocols: A Comprehensive Guide\u003c/a\u003e — Практические стратегии для уменьшения вашего токсичного бремени по всем категориям воздействия\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eБог ливал манну с неба — чистую, незагрязненную, достаточную для каждого дня. Он не добавлял свинец. Он не переводил это с мышьяком. Он не позволил кадмию накапливаться в почках детей, которых он поддерживал через пустыню. Манна была провидением в его чистейшей форме, потому что это персонаж Бога. То, что падает с неба сегодня, то, что растет из загрязненной почвы, то, что корпорации упаковывают и продают как питание — это провидение в его наиболее коррумпированной форме. И это не несчастье. Вопрос для каждого родителя, каждого потребителя, каждой души, которая все еще молится \"дай нам сегодня наш ежедневный хлеб\" это
