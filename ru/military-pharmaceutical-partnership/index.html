и, описанные в Ефесянам, — это духовные доспехи — пояс истины, кираса праведности, щит веры. Это доспехи, разработанные для защиты души против духовного нападения. Но военно-фармацевтический комплекс создал различные доспехи — те, которые защищают корпоративные прибыли против общественной подотчётности, защищают экспериментальные продукты от нормативного контроля и изолируют архитекторов исследования биооружий от последствий их действий.\u003c/p\u003e\n\u003cp\u003eСлияние военных и фармацевтических учреждений — это не недавнее развитие. Это отношение, которое простирается более чем на столетие, от вакцинации компании армии против брюшного тифа начала 1900-х до программы вакцины сибиреязвенной 1990-х до COVID-19 контрмер 2020. В каждом случае военные служили одновременно как тестовая площадка и как механизм обеспечения для фармацевтических продуктов, которые гражданское население может иначе отвергнуть. Солдаты, связанные приказами и лишённые права отказаться, становились первыми субъектами экспериментальных медицинских вмешательств, которые позже развёртывались публике в целом.\u003c/p\u003e\n\u003cp\u003eКак объявляет альбом Confliction трек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/101-Fight_of_Faith.mp4\"\u003eFight of Faith\u003c/a\u003e, боевые действия реальны — но оружия — это не те, которые предлагаются военно-промышленным комплексом. Боевые действия веры требуют различения признавать, когда системы люди выдают себя за защиту, пока служа инструментами контроля.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"операция-warp-speed-военная-операция-с-самого-начала\"\u003eОперация Warp Speed: военная операция с самого начала\u003c/h2\u003e\n\u003cp\u003e\"Операция Warp Speed\" (OWS) была объявлена в мае 2020 года как государственно-частное партнёрство для ускорения развития, производства и распределения вакцин COVID-19. Это было представлено публике как героический научный подвиг. Что не было широко понято в то время — и всё ещё не широко понято — это то, что \"Операция Warp Speed\" была фундаментально военной операцией, не инициативой общественного здоровья.\u003c/p\u003e\n\u003cp\u003eОрганизационная диаграмма OWS, полученная через запросы Закона о свободе информации, раскрывает, что Министерство обороны занимало центральную позицию команды. Программа была возглавляема генерал Густав Перна, четырёхзвёздочный генерал армии, и совместно возглавляема доктором Монсефом Слауи, бывшим руководителем GlaxoSmithKline. Участие Министерства обороны было не периферийной поддержкой — это была оперативная команда.\u003c/p\u003e\n\u003cp\u003eOWS была размещена в Министерстве обороны, не в Министерстве здравоохранения и людских услуг. Контракты для развития вакцины были управляемы авторитетом биомедицинского продвинутого исследования и развития Министерства обороны (BARDA) и Агентством передовых исследовательских проектов обороны (DARPA), не FDA или CDC. Логистика распределения была управляемы военными. И критически, правовая рамка, управляющая вакцинами, была военной рамкой: другая трансакционная власть.\u003c/p\u003e\n\u003cp\u003eЭто различие критически важно. Под нормальной фармацевтической нормативностью, развитие лекарства и вакцины следует определённому пути: доклинические тестирования, фаза I, II и III клинических тестирований, рецензирование FDA, одобрение и наблюдение постмаркета. Каждый шаг включает определённые требования безопасности, положения о информированном согласии и нормативные контрольные точки. Под властью другой трансакции, эти требования могут быть обойдены.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"другая-трансакционная-власть-нормативный-чёрный-дыра\"\u003eДругая трансакционная власть: нормативный чёрный дыра\u003c/h2\u003e\n\u003cp\u003eДругая трансакционная власть (OTA) — это правовой механизм, который позволяет Министерству обороны заключать контракты, которые исключены из федеральных нормативов на закупки, которые нормально управляют государственным заключением контракта. Первоначально созданное в 1958 году, чтобы дать NASA гибкость в заключении контракта с частным сектором, OTA было расширено на Министерство обороны в 1989 году и использовалось со возрастающей частотой с начала 2000-х.\u003c/p\u003e\n\u003cp\u003eПод контрактами OTA, нормальные правила не применяются. Там нет требования для конкурентных ставок. Там нет требования для соответствия федеральному нормативу на закупку (FAR). Нет требования для детализированного отчёта, аудита и положений надзора, которые управляют стандартными государственными контрактами. И критически, продукты, разработанные под контрактами OTA, могут не быть подчинены тем же нормативным требованиям — включая стандарты клинических тестирований и положения об информированном согласии — которые применяются к продуктам, разработанным через нормальный фармацевтический путь одобрения.\u003c/p\u003e\n\u003cp\u003eВакцины COVID-19 были разработаны под контрактами OTA. Контракт Pfizer с Министерством обороны (номер контракта W15QKN-16-9-1002, управляемый через Advanced Technology International) был структурирован как соглашение OTA. Контракт Moderna был аналогично структурирован через BARDA, используя OTA органов власти. Это означает, что вакцины были правовым образом классифицированы не как фармацевтические продукты, подвергающиеся клинической разработке, но как военные контрмеры, закупляемые Министерством обороны.\u003c/p\u003e\n\u003cp\u003eАдвокат Саша Латыпова и исследователь Кэтрин Ватт задокументировали широко, что эта правовая классификация имеет глубокие последствия. Если вакцины COVID-19 — это военные контрмеры, а не фармацевтические продукты, то роль FDA в процессе была не нормативным одобрением, а нормативным театром — внешность гражданского надзора, расслоенного на военной программе закупки, которая уже определила результат.\u003c/p\u003e\n\u003cp\u003eЭто объяснило бы несколько иначе озадачивающих аспектов поведения FDA на протяжении процесса авторизации вакцины: беспрецедентная скорость обзора, приёмлемость усечённых данных клинических тестирований, отказ созывать полные встречи консультативного комитета и агрессивное подавление сигналов безопасности, которые нормально запустили бы нормативное действие.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вакцина-сибиреязвенной-прототип-для-принудительной-военной-вакцинации\"\u003eВакцина Сибиреязвенной: прототип для принудительной военной вакцинации\u003c/h2\u003e\n\u003cp\u003eМандат на вакцину COVID-19 для военного персонала был не без прецедента. Программа вакцинации против сибиреязвы конца 1990-х и 2000-х служит как прототип для подхода военно-фармацевтического партнёрства к принудительной вакцинации.\u003c/p\u003e\n\u003cp\u003eВ 1998 году Министерство обороны началось обязательная вакцинация всего военного персонала, используя Adsorbed Anthrax Vaccine (AVA), производимую BioPort Corporation (позже переименованной в Emergent BioSolutions). Вакцина была FDA-лицензирована в 1970 году для различной цели — профессиональное воздействие в вовлечённых рабочих по шерсти — и никогда не была протестирована или одобрена для предполагаемого военными использования: защита против вооружённого сибиреязвенного возбудителя, доставленного как аэрозоль.\u003c/p\u003e\n\u003cp\u003eПрограмма была осложнена проблемами безопасности с самого начала. Члены рабочего персонала сообщали высокие показатели побочных реакций, включая аутоиммунные расстройства, хроническую усталость, боль в суставах, неврологические симптомы и репродуктивные проблемы. Множество членов рабочего персонала, которые отказались вакцины, были судимы по военному суду. Сотни были административно рассчитаны. Пилоты резигнировали свои комиссии, скорее чем представить себя вакцинации. Противоречие стало настолько интенсивным, что федеральный суд разрешил в 2004 году, что мандат на обязательную вакцинацию был незаконен, находя, что FDA неправомочно одобрила вакцину для предполагаемого военными использования.\u003c/p\u003e\n\u003cp\u003eНесмотря на постановление суда, военные возобновили программу после того, как FDA выпустила новое одобрение. BioPort/Emergent BioSolutions продолжали получать сотни миллионов долларов в государственных контрактах, несмотря на проблемы производства настолько серьёзные, что механизм компании был многократно указан FDA для неудач контроля качества.\u003c/p\u003e\n\u003cp\u003eПрограмма вакцинации против сибиреязвы установила шаблон, который был бы использован две декады позже для COVID-19: мандат на обязательную военную вакцинацию на адекватно протестированной вакцине, производимой компанией с задокументированными проблемами качества, введён военному персоналу, который не мог отказаться без столкновения с разрушением карьеры — всё под правовой рамкой, которая защищала и производителя, и правительство от ответственности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вращающаяся-дверь-от-пентагона-к-pharma-и-обратно\"\u003eВращающаяся дверь: от Пентагона к Pharma и обратно\u003c/h2\u003e\n\u003cp\u003eВоенно-фармацевтическое партнёрство поддерживается вращающейся дверью, через которую персонал беспрепятственно движется между Министерством обороны, нормативными органами и фармацевтических корпораций. Эта вращающаяся дверь обеспечивает, что те же люди, которые финансируют, разрабатывают, регулируют и прибыль от фармацевтических продуктов, поддерживают непрерывное влияние во всех учреждениях.\u003c/p\u003e\n\u003cp\u003eДоктор Монсеф Слауи, совместный лидер \"Операции Warp Speed\", был бывшим председателем глобальных вакцин в GlaxoSmithKline, где он контролировал развитие множества вакцин. Он удерживал $12,4 миллиона в бирже GSK во время его назначения OWS — конфликт интереса, который был адресован не дивестицией, но этическим освобождением.\u003c/p\u003e\n\u003cp\u003eПолковник Мат Хепберн, менеджер программы DARPA, который управлял программами биологического исследования, включая работу на имплантируемых биосенсорах, движался между DARPA и миром фармацевтической разработки с лёгкостью. Биозащитный директорат Национального совета безопасности был укомплектован люди с узами к фармацевтическим и биотехнологическим компаниям. Старшее руководство FDA обычно включает людей, которые ранее работали для фармацевтических компаний, которыми они назначены на регулирование — и которые возвращаются к тем компаниям после их государственного обслуживания.\u003c/p\u003e\n\u003cp\u003eЭта вращающаяся дверь расширяется к Конгрессу, где члены, которые сидят на комитетах, надзирающих фармацевтическую нормативность и оборонные ассигнования, получают существенные взносы кампании из и фармацевтической промышленности и оборонных подрядчиков. Аппарат лоббирования огромен: фармацевтическая промышленность тратит больше на лоббирование, чем любой другой сектор в экономике США, и оборонные подрядчики постоянно находятся в числе лучших десяти.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"barda-и-биозащитный-промышленный-комплекс\"\u003eBARDA и биозащитный промышленный комплекс\u003c/h2\u003e\n\u003cp\u003eАвторитет Биомедицинского Продвинутого Исследования и Развития (BARDA), создан в 2006 году, служит как основной интерфейс между Министерством здравоохранения и людских услуг и фармацевтической промышленностью для биозащитных связанных медицинских контрмер. Миссия BARDA — разработка и закупка вакцин, терапевтик и диагностик для противодействия химическим, биологическим, радиологическим и ядерным угрозам.\u003c/p\u003e\n\u003cp\u003eBARDA работает с бюджетом миллиардов долларов и наградила контракты каждой крупной фармацевтической компании, как хорошо как многие меньшие фирмы биотехнологии. Эти контракты часто награждены под ускоренным органами власти, которые обходят нормальное конкурентное ставка и процессы надзора. Результатом является система, в которой фармацевтические компании гарантированны клиентов — правительство США — и гарантированный доход, независимо от того, функционируют ли их продукты или когда-либо используются.\u003c/p\u003e\n\u003cp\u003eСтратегический национальный запас, управляемый BARDA, содержит миллиарды долларов в фармацевтических продуктах, включая вакцины и терапевтики для сибиреязвы, натуральной оспы, ботулизма и других биологических угроз. Большая часть этого запаса истекла и была замещена многократно, генерируя текущие потоки доходов производителям, даже в отсутствие любой действительной биологической атаки.\u003c/p\u003e\n\u003cp\u003eАкт PREP (Акт о готовности и готовности к ЧС), принят в 2005 году, предоставляет почти полную защиту ответственности для производителей медицинских контрмер на протяжении объявленных чрезвычайных ситуаций общественного здоровья. Под Актом PREP, производители вакцин не могут быть поданы иск на повреждение, вызванное их продуктами — даже если те повреждения результаты дефектов производства, небрежности или мошенничества. Только исход для повреждённых людей — это Программа компенсации повреждения контрмер (CICP), которая имеет задокументированную историю отрицания подавляющего большинства требований.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"солдаты-как-тестовые-субъекты-история-военного-медицинского-экспериментирования\"\u003eСолдаты как тестовые субъекты: история военного медицинского экспериментирования\u003c/h2\u003e\n\u003cp\u003eИспользование военного персонала как субъектов для медицинского экспериментирования имеет длинную и беспокойную историю, которая расширяется далеко за пределы программы вакцинации против сибиреязвы.\u003c/p\u003e\n\u003cp\u003eНа протяжении Второй мировой войны, военные США провели экспериментирование горчичного газа на тысячах членов рабочего персонала, подвергая их к волдырям химических агентов в газовых камерах и на открытой коже. Много этих экспериментирований были проведены на меньшинстве членов рабочего персонала. Экспериментирования были классифицированы за десятилетия, и ветераны, которые страдали от хронических эффектов здоровья, были отрицаемы выгод инвалидности, потому что они не могли обсуждать их классифицированное воздействие.\u003c/p\u003e\n\u003cp\u003eНа протяжении 1950-х и 1960-х, армия США провела \"Операцию Whitecoat\", в которой Seventh-Day Adventist возражающих на основании совести, служащих как некомбатантный военный персонал, были использованы как тестовые субъекты для биологического оружия исследования в Форт Детрике. Хотя официально охарактеризовано как добровольное, \"волонтёры\" были солдатами, находящимися под военным командованием, которые встретили подразумеваемое давление участвовать.\u003c/p\u003e\n\u003cp\u003eПроект 112/SHAD (Shipboard Hazard and Defense), проведённый между 1962 и 1973, включал тестирование биологических и химических боевых агентов на военном персонале, часто без их знания. Тысячи членов рабочего персонала были подвергнуты агентами, включая нервный газ VX, зарин и биологические имитаторы на протяжении тестирований, проведённых на кораблях, самолётах и в различных местоположениях в Соединённых Штатах и за границей.\u003c/p\u003e\n\u003cp\u003eВакцины сибиреязвы и ботулинум токсоида Войны в Персидском заливе, введённые членам рабочего персонала на протяжении войны в Персидском заливе 1991 года, были связаны множеством исследователей к созвездию симптомов, известных как болезнь войны в Персидском заливе — хроническое мультисимптомное состояние, влияющее приблизительно 250000 ветеранов войны в Персидском заливе. Несмотря на десятилетия исследования, Министерство обороны было неохотно в признании роли экспериментальной вакцины в причинении этого состояния.\u003c/p\u003e\n\u003cp\u003eКак наша статья на \u003ca href=\"/bioweapons-gain-of-function/?lang=ru\"\u003eБиооружиях и Gain-of-Function\u003c/a\u003e документирует, военные программы биологического исследования всегда существовали в пересечении защиты и наступления, защиты и экспериментирования — и военный персонал постоянно служил неведущими субъектами того экспериментирования.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"мандат-covid-и-боевая-готовность\"\u003eМандат COVID и боевая готовность\u003c/h2\u003e\n\u003cp\u003eМандат на вакцину COVID-19 Министерства обороны, выпущенный в августе 2021 года секретарём обороны Lloyd Austin, требовал, чтобы всё активного-долга военный персонал был вакцинирован. Мандат был расширен к резервам и национальной гвардии членам как хорошо.\u003c/p\u003e\n\u003cp\u003eЧлены рабочего персонала, которые отказались вакцины, встретили диапазон наказаний: отказ в продвижении, отказ в переобслуживании, административное разделение, выписание под менее чем почётные условия и в некоторых случаях, судебные разбирательства военного суда. К времени, когда мандат был отозван в январе 2023 года — следуя действию Конгресса в 2023 национальном законе об авторизации обороны — более 8000 членов рабочего персонала были выписаны за отказ вакцины.\u003c/p\u003e\n\u003cp\u003eПоследствия боевой готовности были значительны. Много из выписанного членов рабочего персонала были опытные люди в критических специальностях — пилоты, силы специального назначения, аналитики разведки, медицинский персонал — чьему мастерству было трудно или невозможно заменить. Мандат эффективно наказал наиболее независимо мыслящих и медицински информированных членов рабочего персонала, создавая эффект выборки, который вознаграждал соответствие по критическому мышлению.\u003c/p\u003e\n\u003cp\u003eИронично не была потеряна наблюдателем: военный истеблишмент, который гордится производством независимой, решительной лидеров, выписал тысячи тех лидеров за изготовление независимого, информированного медицинского решения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-истинный-командир\"\u003eБиблейское размышление: истинный командир\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Ибо Господь — наш судия, Господь — наш законодатель, Господь — наш царь; Он спасёт нас.\" — Исаия 33:22\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПисание признаёт три функции управления — судебные, законодательные и исполнительные — и атрибутирует все три Богу в одиночку. Когда земные учреждения утверждают авторитет командовать, что входит в человеческое тело, они утверждают авторитет, который принадлежит Богу в одиночку. Тело — это храм святого Духа, и решение о том, что входит в тот храм, — это решение совести, не военного команды.\u003c/p\u003e\n\u003cp\u003eВоенно-фармацевтическое партнёрство представляет слияние двух самых мощных земных учреждений — силу принуждения и силу лекарственного лечения — в один аппарат, который может мандатировать экспериментальные вмешательства без значащего согласия, подотчётности или исчисления. Это не защита. Это доминирование. И Бог, который выпустил Даниила из берлоги льва и трёх еврейских детей из огненной печи, не потерял Его силу выпустить тех, кто отказывается подчиниться эдиктам людей, когда те эдикты нарушают команды Бога.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u
