и плоды их не будут оканчиваться; каждый месяц будут приносить новые плоды, потому что вода их течет из святилища; и плоды их будут для пищи, а листья их для врачевания.\" — Иезекииль 47:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБог разработал медицину в создание. До того, как были фармацевтические компании, до того, как были патенты, до того, как была единственная лаборатория, Создатель встроил молекулы исцеления в растения, грибки, минералы и биохимические пути самого человеческого тела. Листья деревьев предназначены для медицины -- не как поэтическая метафора, а как техническое описание от Архитектора жизни. Каждая молекула, которая нужна телу для исцеления, уже существует в создании. Его не нужно синтезировать в лаборатории. Ему не нужен номер патента. Ему не нужно одобрение FDA. Ему было одобрено Богом, когда Он его сделал.\u003c/p\u003e\n\u003cp\u003eФармацевтическая промышленность не хочет, чтобы вы это знали. Вылеченный пациент -- потерянный клиент. Естественная молекула, которая не может быть запатентована, представляет угрозу для бизнес-модели, построенной на синтетических химических веществах, которые генерируют повторяющийся доход. Подавление естественных противораковых молекул -- это не теория заговора -- это бизнес-стратегия, и это был рабочий принцип медицины Рокфеллера с момента его создания в начале 20-го века.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e говорит о правде, которая прорывается сквозь тьму -- и правда о естественных противораковых молекулах пробивается несмотря на все усилия подавить ее. \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/97-Rivers_of_Living_Water.mp4\"\u003eRivers of Living Water\u003c/a\u003e указывает на источник всего исцеления -- Бога, который разработал молекулы и тела, которые они исцеляют.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"машина-подавления\"\u003eМашина подавления\u003c/h2\u003e\n\u003cp\u003eПрежде чем рассматривать сами молекулы, важно понять систему, которая их подавляет.\u003c/p\u003e\n\u003ch3 id=\"проблема-патента\"\u003eПроблема патента\u003c/h3\u003e\n\u003cp\u003eФармацевтическая промышленность построена на патентах. Патент предоставляет исключительные права производства и продажи примерно на 20 лет, в течение которых держатель патента может взимать все, что будет терпеть рынок. Разработка нового фармацевтического препарата стоит в среднем $1-2 миллиарда (по оценкам промышленности), и компании должны возместить это инвестирование плюс генерировать прибыль в течение окна патента.\u003c/p\u003e\n\u003cp\u003eЕстественные молекулы -- вещества, которые существуют в природе -- не могут быть запатентованы. Вы не можете запатентовать куркумин. Вы не можете запатентовать фенбендазол. Вы не можете запатентовать витамин D. Поскольку эти вещества встречаются в природе, они выходят за рамки системы патентов, что означает, что ни одна компания не может добиться исключительных прав на их продажу, что означает, что ни одна компания не может взимать премиальные цены, что означает, что ни одна компания не будет инвестировать $1-2 миллиарда в клинические испытания, чтобы доказать их эффективность.\u003c/p\u003e\n\u003cp\u003eЭто то, почему наиболее мощные противораковые молекулы на земле никогда не будут \"одобрены\" FDA для лечения рака. Не потому, что они не работают -- а потому, что никто не может получить прибыль от их одобрения в масштабе, необходимом для оправдания инвестирования.\u003c/p\u003e\n\u003ch3 id=\"регуляторный-захват\"\u003eРегуляторный захват\u003c/h3\u003e\n\u003cp\u003eFDA является захватанным регулятором. Его финансирование существенно поступает от фармацевтической промышленности через пошлины пользователей (Закон о пошлинах пользователей за рецептурные препараты). Его консультативные комитеты населены людьми с обширными связями фармацевтической промышленности. Его процесс одобрения предназначен для запатентованных фармацевтических продуктов, а не естественных веществ. Вся нормативная структура построена, чтобы направить медицинскую практику к фармацевтическим продуктам и от естественных альтернатив.\u003c/p\u003e\n\u003cp\u003eАна Михалча, доктор медицины, доктор наук, задокументировала на своем Substack (\u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e) более широкий образец фармацевтического захвата -- система, в которой каждый аспект медицины, от финансирования исследований до рекомендаций клинической практики, контролируется промышленностью, чья модель прибыли зависит от продолжающейся болезни населения, которому она служит.\u003c/p\u003e\n\u003ch2 id=\"молекулы\"\u003eМолекулы\u003c/h2\u003e\n\u003ch3 id=\"фенбендазол\"\u003eФенбендазол\u003c/h3\u003e\n\u003cp\u003eФенбендазол -- это бензимидазол антгельминтик -- препарат, используемый для лечения паразитарных инфекций глистов у животных. Он безопасно используется в ветеринарной медицине на протяжении десятилетий. То, что привлекло его к общественному вниманию, был случай Джо Типпенса, пациента с терминальным раком легкого, которому было сказано, что у него есть три месяца жизни. Типпенс начал принимать фенбендазол на основе совета ветеринара -- и его рак перешел в полную ремиссию.\u003c/p\u003e\n\u003cp\u003eНаучная основа для противораковой активности фенбендазола включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение микротрубочек\u003c/strong\u003e -- фенбендазол нарушает сборку микротрубочек, которые необходимы для деления клеток. Раковые клетки, которые быстро делятся, непропорционально подвергаются воздействию.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСтабилизация P53\u003c/strong\u003e -- было показано, что фенбендазол стабилизирует белок супрессора опухоли p53, одного из первичных механизмов противодействия раку тела. Когда p53 функционален, он запускает апоптоз (запрограммированную гибель клеток) в поврежденных или раковых клетках.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнгибирование усвоения глюкозы\u003c/strong\u003e -- раковые клетки сильно зависят от глюкозы для энергии (эффект Варбурга). Фенбендазол вмешивается в усвоение глюкозы в раковых клетках, лишая их основного топлива.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАнтиангиогенные эффекты\u003c/strong\u003e -- фенбендазол может препятствовать формированию новых кровеносных сосудов, которые опухолям нужны для роста (ангиогенез).\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсследования, рецензируемые в научных журналах из учреждений, включая Johns Hopkins, подтвердили противораковую активность фенбендазола в клеточных культурах и моделях на животных. Клинические испытания на людях не проводились -- не потому, что доказательства недостаточны для их оправдания, а потому, что ни одна фармацевтическая компания не финансирует испытания генерического ветеринарного препарата, который стоит пенни за дозу.\u003c/p\u003e\n\u003ch3 id=\"ивермектин\"\u003eИвермектин\u003c/h3\u003e\n\u003cp\u003eИвермектин, препарат, получивший Нобелевскую премию по борьбе с паразитами, продемонстрировал противораковую активность посредством множественных механизмов:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПротивопролиферативные эффекты\u003c/strong\u003e -- ивермектин препятствует пролиферации раковых клеток во множественных типах рака, включая рак груди, яичников, простаты, толстой кишки и лейкемию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИндукция апоптоза\u003c/strong\u003e -- ивермектин запускает запрограммированную гибель клеток в раковых клетках\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМодуляция аутофагии\u003c/strong\u003e -- ивермектин влияет на пути аутофагии, которые раковые клетки используют для выживания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИммуномодуляция\u003c/strong\u003e -- ивермектин может улучшить способность иммунной системы распознавать и атаковать раковые клетки\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнгибирование пути Wnt\u003c/strong\u003e -- ивермектин препятствует пути Wnt/бета-катенина, который дисрегулируется во многих раках\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eАгрессивное подавление ивермектина во время пандемии COVID-19 -- включая отказ аптек заполнять рецепты, санкции Совета медицинской палаты против назначающих врачей и кампании в СМИ, маркирующие его как \"конская паста\" -- служило множественным целям. Это устранило потенциальное лечение COVID-19, которое подорвало бы авторизацию использования в чрезвычайных ситуациях для вакцин. И это подавило осведомленность о молекуле с противораковыми свойствами, которая угрожает доходам фармацевтической промышленности от лечения рака.\u003c/p\u003e\n\u003ch3 id=\"куркумин\"\u003eКуркумин\u003c/h3\u003e\n\u003cp\u003eКуркумин, активное соединение в куркуме, был предметом более 12,000 рецензируемых исследований, документирующих противораковую активность посредством:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eИнгибирование NF-кB\u003c/strong\u003e -- куркумин подавляет NF-кB, главный регулятор воспалительных и способствующих раку путей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИндукция апоптоза\u003c/strong\u003e во множественных типах рака\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнгибирование ангиогенеза\u003c/strong\u003e -- предотвращение опухолей от развития кровоснабжения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнгибирование метастазирования\u003c/strong\u003e -- снижение способности раковых клеток распространяться\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eХимиочувствительность\u003c/strong\u003e -- делание раковых клеток более чувствительными к обычной химиотерапии при защите нормальных клеток\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭпигенетическая модуляция\u003c/strong\u003e -- куркумин влияет на экспрессию генов через эпигенетические механизмы, потенциально молчащие онкогены и активирующие супрессоры опухоли\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОсновное ограничение куркумина -- биодоступность -- он плохо абсорбируется из кишечника. Однако липосомальные формулировки, совместное введение пиперина и наноку куркумин подготовки драматически улучшили абсорбцию, делая достижимыми терапевтические уровни в крови через пероральное добавление.\u003c/p\u003e\n\u003ch3 id=\"витамин-d\"\u003eВитамин D\u003c/h3\u003e\n\u003cp\u003eВитамин D -- это не просто витамин -- это стероидный гормон-предшественник, который активирует более 2,000 генов в человеческом теле. Его противораковые свойства так хорошо задокументированы, что они трудно подавить полностью:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eИндукция дифференцировки\u003c/strong\u003e -- витамин D способствует зрелости клеток, направляя их от недифференцированного состояния, которое характеризует рак\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИндукция апоптоза\u003c/strong\u003e в раковых клетках\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПротивопролиферативные эффекты\u003c/strong\u003e во множественных типах рака\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИммунная модуляция\u003c/strong\u003e -- витамин D необходим для надлежащей функции иммунной системы, включая иммунный надзор, который идентифицирует и уничтожает раковые клетки\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАнтиангиогенные эффекты\u003c/strong\u003e -- ограничение кровоснабжения опухоли\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПопуляционные исследования последовательно показывают, что более высокие уровни витамина D связаны с более низким заболеваемостью раком и лучшим выживанием рака. Несмотря на это, основная онкология не проводит рутинно тестирование или добавление витамина D, и рекомендуемое суточное количество (600-800 МЕ) широко считается адекватным исследователями витамина D, которые рекомендуют уровни в крови 60-80 нг/мL -- уровни достижимы только с добавлением 5,000-10,000 МЕ ежедневно.\u003c/p\u003e\n\u003ch3 id=\"кверцетин\"\u003eКверцетин\u003c/h3\u003e\n\u003cp\u003eКверцетин, флавоноид, обнаруженный в луке, яблоках, ягодах и зеленом чае, продемонстрировал:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПротивопролиферативные эффекты на раковые клетки\u003c/li\u003e\n\u003cli\u003eИндукция апоптоза\u003c/li\u003e\n\u003cli\u003eИнгибирование ангиогенеза опухоли\u003c/li\u003e\n\u003cli\u003eПротивовоспалительные эффекты посредством множественных путей\u003c/li\u003e\n\u003cli\u003eАктивность цинкового ионофора -- облегчение проникновения цинка в клетки, где он препятствует вирусной репликации и поддерживает функцию иммунной системы\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"артемизинин\"\u003eАртемизинин\u003c/h3\u003e\n\u003cp\u003eАртемизинин, полученный из растения сладкая полынь (Artemisia annua), является получившей Нобелевскую премию противомалярийным веществом, которое показало избирательную токсичность к раковым клеткам. Раковые клетки накапливают железо с более высокими скоростями, чем нормальные клетки, и артемизинин реагирует с железом, чтобы производить свободные радикалы, которые избирательно уничтожают богатые железом раковые клетки, одновременно защищая нормальные клетки.\u003c/p\u003e\n\u003ch3 id=\"метиленовый-синий\"\u003eМетиленовый синий\u003c/h3\u003e\n\u003cp\u003eМетиленовый синий, один из самых старых фармацевтических соединений, все еще используемых в клинической практике, продемонстрировал:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПоддержку митохондрий -- улучшение производства клеточной энергии\u003c/li\u003e\n\u003cli\u003eПротивораковую активность через модуляцию пути митохондрий\u003c/li\u003e\n\u003cli\u003eНейропротективные эффекты\u003c/li\u003e\n\u003cli\u003eПротивомикробные свойства\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eДр. Михалча задокументировала благоприятные эффекты метиленового синего на качество крови под микроскопией темного поля, включая снижение самосборных нанолакированных структур и улучшение морфологии красных кровяных клеток.\u003c/p\u003e\n\u003ch2 id=\"инверсия-pharmakeia\"\u003eИнверсия Pharmakeia\u003c/h2\u003e\n\u003cp\u003eОткровение 18:23 предупреждает, что все народы были обмананы pharmakeia -- волшебством посредством фармацевтической манипуляции. Pharmakeia индустрии рака ограничена не вредными препаратами. Она распространяется на подавление молекул исцеления.\u003c/p\u003e\n\u003cp\u003eБог поместил противораковые молекулы в создание. Он их разработал. Он встроил их в растения, грибки и биохимические пути, которые человеческое тело может получить доступ через пищу и добавление. Фармацевтическая промышленность -- современное выражение pharmakeia -- инвертирует этот дизайн: она подавляет то, что Бог сделал свободно доступным и продает синтетические замены по огромной стоимости, которые часто причиняют больше вреда, чем болезнь, которую они утверждают, что лечат.\u003c/p\u003e\n\u003cp\u003eСредства химиотерапии являются, по дизайну, цитотоксичными -- они убивают клетки. Они убивают раковые клетки, но они также убивают здоровые клетки, повреждают иммунную систему и часто вызывают вторичные раки. Индустрия лечения рака генерирует более $200 миллиардов ежегодно во всем мире. Она не имеет финансового стимула для излечения рака. Она имеет каждый финансовый стимул управлять раком -- держать пациентов в лечении, покупать препараты, циклировать через протоколы, генерировать доход до их смерти.\u003c/p\u003e\n\u003cp\u003eЕстественные молекулы, перечисленные выше, угрожают этой всей бизнес-модели. Они дешевые. Они доступны. Они не могут быть запатентованы. И они работают посредством механизмов, которые поддерживают собственные противораковые системы тела, а не уничтожают их.\u003c/p\u003e\n\u003ch2 id=\"куполь-и-сад\"\u003eКуполь и сад\u003c/h2\u003e\n\u003cp\u003eПод небосводом -- куполом, который Бог поместил над населяемым миром -- каждая молекула исцеления существует. Бог посадил Сад Едема под этим куполом, и в этом Саду каждое дерево было приятно для взгляда и хорошо для пищи (Бытие 2:9). Молекулы исцеления создания существуют в пределах закрытой системы, которую Бог разработал. Они доступны. Они изобильны. Они являются частью первоначального дизайна.\u003c/p\u003e\n\u003cp\u003eПадшие ангелы, заключенные под этим куполом, работали сквозь человеческие системы, чтобы сделать исцеление недоступным. Не путем уничтожения растений -- они не могут переопределить создание Бога -- а путем строительства нормативной и экономической системы, которая делает естественное исцеление незаконным, стигматизированным или недоступным, в то время как направляет всю медицинскую практику сквозь фармацевтические каналы, которые они контролируют.\u003c/p\u003e\n\u003cp\u003eЭто большое заблуждение, применяемое к медицине: заблуждение, что исцеление происходит из лабораторий, а не из создания, из патентов, а не из Бога, из химических веществ, а не из листьев деревьев, которые были разработаны для медицины до основания мира.\u003c/p\u003e\n\u003ch2 id=\"ссылки-на-источники\"\u003eСсылки на источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eDogra N, et al. \"Fenbendazole acts as a moderate microtubule destabilizing agent and causes cancer cell death.\" Scientific Reports, 2018\u003c/li\u003e\n\u003cli\u003eАна Михалча, доктор медицины, доктор наук -- Исследование естественных вмешательств: \u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eJuarez M, et al. \"The multitargeted drug ivermectin: from an antiparasitic agent to a repositioned cancer drug.\" American Journal of Cancer Research, 2018\u003c/li\u003e\n\u003cli\u003eTomeh MA, et al. \"A Review of Curcumin and Its Derivatives as Anticancer Agents.\" International Journal of Molecular Sciences, 2019\u003c/li\u003e\n\u003cli\u003eThe Master's Voice Prophecy Blog: \u003ca href=\"https://themastersvoice.wordpress.com\"\u003ethemastersvoice.wordpress.com\u003c/a\u003e\u003c/li\u003e\n\u om/tracks/ru/107-Stem_Cell_Harvesting.mp4\"\u003eStem Cell Harvesting\u003c/a\u003e — Эксплуатация человеческой биологии для прибыли\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e — Правда, прорывающаяся сквозь тьму фармацевтического подавления\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/97-Rivers_of_Living_Water.mp4\"\u003eRivers of Living Water\u003c/a\u003e — Источник всего исцеления\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"дальнейшие-исследования\"\u003eДальнейшие исследования\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/statin-drugs-cholesterol-truth/?lang=ru\"\u003eStudy Verifies Cholesterol-Lowering Statin Drugs Are Dangerous\u003c/a\u003e — Еще один фармацевтический обман раскрыт\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/human-blood-destroyed-nanotech/?lang=ru\"\u003eHuman Blood Being Destroyed For Nanotechnology Integration\u003c/a\u003e — Фармацевтическое нападение на кровь\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/darkfield-microscopy-self-assembly/?lang=ru\"\u003eDarkfield Microscopy Shows Self Assembly Nanotechnology in Human Blood\u003c/a\u003e — Что фармацевтические продукты оставляют в крови\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eБог поместил медицину в сад. Он вплел противораковые молекулы в куркуму и полынь, в биохимические пути, активируемые солнечным светом, в соединения столь простые и доступные, что дитя могло бы их найти. Фармацевтическая промышленность -- современное выражение pharmakeia -- построила стену вокруг сада и сказала миру, что исцеление могло быть найдено только в его лабораториях, в его патентах, в его миллиардных продуктах, которые отравляют столь же часто, как исцеляют. Но стена рушится. Правда о фенбендазоле, ивермектине, куркумине, витамине D и дюжине других естественных молекул распространяется несмотря на все попытки удержать это. Листья деревьев для медицины. Бог сказал это. Исследование это подтверждает. И ни нормативный захват, ни подавление СМИ, ни фармацевтическое лоббирование не может отрицать то, что Создатель объявил в начале.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Естественные молекулы с противораковыми свойствами, которые они не хотят, чтобы вы знали\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Естественные молекулы с доказанными противораковыми свойствами, подавленные фармацевтической промышленностью, включая фенбендазол, ивермектин, куркумин и исследования витамина D.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-02-28T10:00:00Z\",\"children\":\"28 февраля 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"anti-cancer\",{\"href\":\"/ru/tag/anti-cancer/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"anti-cancer\"]}],[\"$\",\"a\",\"natural-molecules\",{\"href\":\"/ru/tag/natural-molecules/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"nat
