 Когда говорит он ложь, говорит свое, ибо он лжец и отец лжи.\"\u003c/em\u003e - Иоанн 8:44\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eСовременная медицина построена на лжах, и самой большой ложью из всех может быть туберкулез. Весь строй теории микробов - идея, что невидимые организмы вторгаются в тело и вызывают болезнь - был закреплен в научной ортодоксии через наррац туберкулеза. Объявление Робертом Кохом в 1882 году о том, что он открыл \"бациллу туберкулеза\", было провозглашено величайшим медицинским открытием столетия. Оно запустило революцию теории микробов, создало фармацевтическую промышленность в том виде, в котором мы ее знаем, и установило модель болезни, которая сохраняется до сегодняшнего дня.\u003c/p\u003e\n\u003cp\u003eНо что если Кох был неправ? Что если доказательства были подделаны, манипулированы или просто неправильно интерпретированы? Что если туберкулез - как и многие болезни, приписываемые микробам, - был фактически вызван ядовитыми условиями жизни промышленной цивилизации, а \"палочка\" была следствием, а не причиной?\u003c/p\u003e\n\u003cp\u003eВо время своего опыта близкой смерти Говард Питтман сказал, что духовное царство работает через иерархии обмана. Демоны не просто нападают - они создают сложные системы лжи, которые люди добровольно поддерживают. Теория микробов болезни - одна из таких систем. Она была построена в XIX веке, финансирована одними и теми же олигархическими семьями, которые позже создали империю медицины Рокфеллера, и поддерживается инерцией учреждения трехмиллиардной промышленности.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов, как заметил Наполеон, - это \"военная организация... абсолютная власть, универсальная власть\". Иезуиты инфильтрировали медицинское образование через свою сеть католических университетов и больниц. Документальный фильм \"Catholic Confidential\" раскрывает их клятву: инфильтрация \"скрытой хитростью\", слепое повиновение и \"всякие виды порока\", разрешенные в служении целям ордена. Ложь о туберкулезе - одно из их величайших достижений.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"роберт-кох-и-мошенничество-туберкулеза\"\u003eРоберт Кох и мошенничество туберкулеза\u003c/h2\u003e\n\u003ch3 id=\"объявление-1882-года\"\u003eОбъявление 1882 года\u003c/h3\u003e\n\u003cp\u003e24 марта 1882 года Роберт Кох представил свои находки Берлинскому физиологическому обществу, утверждая, что выявил Mycobacterium tuberculosis как причину туберкулеза. Объявление сразу же сделало Коха знаменитостью и до сих пор празднуется как ориентир в истории медицины. ВОЗ даже объявляет 24 марта \"Всемирным днем туберкулеза\".\u003c/p\u003e\n\u003cp\u003eНо доказательства Коха были намного слабее, чем предполагает мифология.\u003c/p\u003e\n\u003ch3 id=\"постулаты-коха---его-собственные-правила-которых-он-не-мог-следовать\"\u003eПостулаты Коха - его собственные правила, которых он не мог следовать\u003c/h3\u003e\n\u003cp\u003eСам Кох установил четыре критерия (известные как постулаты Коха), которые должны быть выполнены для доказательства того, что микроорганизм вызывает болезнь:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eМикроорганизм должен быть найден во всех случаях болезни\u003c/li\u003e\n\u003cli\u003eЕго необходимо выделить от хозяина и вырастить в чистой культуре\u003c/li\u003e\n\u003cli\u003eКультивированный микроорганизм должен вызвать болезнь при введении в здоровый организм\u003c/li\u003e\n\u003cli\u003eМикроорганизм должен быть переизолирован от нового хозяина и показан идентичным\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eКох \u003cstrong\u003eне выполнил свои собственные постулаты\u003c/strong\u003e для туберкулеза:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПостулат 1\u003c/strong\u003e: Палочка туберкулеза НЕ была обнаружена во всех случаях туберкулеза. Многие пациенты с диагностированным туберкулезом не показали никаких признаков палочки. Кох объяснил это, утверждая, что палочка присутствовала, но не поддавалась обнаружению - циклический аргумент, над которым посмеялся бы любой честный научный форум.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПостулат 3\u003c/strong\u003e: Когда Кох вводил культивированную палочку животным, результаты были непоследовательны. Некоторые животные развивали поражения; другие - нет. Животные, которые действительно развивали поражения, часто были уже в плохом здоровье - недоедающие, стрессованные, содержащиеся в ужасных условиях. Эксперименты Коха доказали, что ослабленные животные могут заболеть при введении инородного материала - не что специфическая палочка вызывает специфическую болезнь.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПостулат 4\u003c/strong\u003e: Переизолирование было непоследовательным и осложнено проблемами загрязнения, которые сам Кох признал, но отклонил.\u003c/p\u003e\n\u003ch3 id=\"мошенничество-туберкулина\"\u003eМошенничество туберкулина\u003c/h3\u003e\n\u003cp\u003eДоверие Коха должно было быть навсегда разрушено скандалом туберкулина. В 1890 году Кох объявил, что разработал \"туберкулин\" - вещество, которое могло бы вылечить туберкулез. Объявление вызвало всемирное волнение. Пациенты наводняли Берлин в поиске чудо-лекарства.\u003c/p\u003e\n\u003cp\u003eТуберкулин был бедствием. Не только он не вылечил туберкулез, но он активно навредил пациентам. Многие пациенты, получившие туберкулин, испытали серьезные реакции и ускоренное развитие болезни. Некоторые умерли прямо в результате лечения. Кох был повсеместно осужден, и расследование раскрыло, что у него были финансовые интересы в продукте туберкулина - он получал прибыль от продажи вещества, которое он пропагандировал как лекарство.\u003c/p\u003e\n\u003cp\u003eНесмотря на этот катастрофический отказ - отказ, который разрушил бы карьеру любого современного исследователя - первоначальное утверждение Коха о палочке туберкулеза никогда не было серьезно переоценено. Научный истеблишмент уже построил слишком много на основе объявления Коха 1882 года. Отступление означало бы сносить саму теорию микробов.\u003c/p\u003e\n\u003ch2 id=\"что-фактически-вызвало-туберкулез\"\u003eЧто фактически вызвало туберкулез\u003c/h2\u003e\n\u003ch3 id=\"теория-промышленного-отравления\"\u003eТеория промышленного отравления\u003c/h3\u003e\n\u003cp\u003eЭпидемии туберкулеза совпадали именно с индустриализацией. Болезнь была практически неизвестна в сельских популяциях, живущих традиционным образом жизни. Она взорвалась в перегруженных, загрязненных, голодающих городских центрах XIX века в Европе и Америке.\u003c/p\u003e\n\u003cp\u003eФактические условия, которые произвели туберкулез:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПерегруженное жилье\u003c/strong\u003e: Фабричные рабочие упакованы в многоквартирные дома без вентиляции, без солнечного света и без санитарии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПромышленное загрязнение\u003c/strong\u003e: Рабочие, дышащие углеводородной пылью, химическими парами и взвешенными частицами 12-16 часов в день\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНедоедание\u003c/strong\u003e: Диеты, состоящие из самой дешевой возможной пищи - белый хлеб, сахар, чай и иногда обрезки мяса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЯдовитая вода\u003c/strong\u003e: Водные источники, загрязненные промышленными отходами, сточными водами и тяжелыми металлами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИстощение\u003c/strong\u003e: 12-16-часовые рабочие дни, шесть или семь дней в неделю, без отдыха или времени для восстановления\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eХимическое воздействие\u003c/strong\u003e: Рабочие в конкретных отраслях - горнодобывающей, текстильной, металлообработке - имели намного более высокие показатели \"туберкулеза\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКогда эти условия улучшились - лучшее жилье, санитарию, питание, сокращенные рабочие часы - туберкулез снизился \u003cstrong\u003eдо\u003c/strong\u003e медицинского вмешательства. Уровень смертности от туберкулеза упал на более чем 90% между серединой 1800-х и введением антибиотиков в 1940-х годах. Лечение туберкулеза было не медициной - это было окончанием наихудших злоупотреблений промышленного капитализма.\u003c/p\u003e\n\u003ch3 id=\"объяснение-теории-терраина\"\u003eОбъяснение теории терраина\u003c/h3\u003e\n\u003cp\u003eАнтуан Бешан, современник и соперник Коха, утверждал, что болезнь была вызвана состоянием внутреннего терраина (среды) тела, а не внешними захватчиками. Бешан наблюдал, что микроорганизмы, найденные в больной ткани, были результатом болезни, а не причиной. Они появлялись как часть ответа тела на токсичные условия - как личинки появляются на гниющем мясе, но не вызывают гниение.\u003c/p\u003e\n\u003cp\u003eТеория терраина Бешана была подавлена, потому что она была неприбыльна. Если болезнь вызывается плохими условиями жизни, решение - социальная реформа - лучшая пища, более чистая вода, меньше загрязнения, гуманные рабочие условия. Эти решения не генерируют доход для фармацевтической промышленности. Теория микробов Коха, напротив, открывала дверь для бесконечного потока прибыльных продуктов: лекарства, вакцины, диагностические тесты, оборудование больниц и весь аппарат современной медицины.\u003c/p\u003e\n\u003cp\u003eФонд Рокфеллера понял это немедленно и вложил значительно в продвижение теории микробов и подавление теории терраина. Доклад Флекснера 1910 года завершил работу, закрыв каждую медицинскую школу, которая преподавала альтернативы аллопатической модели.\u003c/p\u003e\n\u003ch2 id=\"скандал-с-вакциной-бцж\"\u003eСкандал с вакциной БЦЖ\u003c/h2\u003e\n\u003ch3 id=\"вакцина-которая-не-работает\"\u003eВакцина, которая не работает\u003c/h3\u003e\n\u003cp\u003eВакцина БЦЖ (Bacillus Calmette-Guerin), введенная в 1921 году, якобы является основным оружием против туберкулеза. Это одна из наиболее широко вводимых вакцин в мире, вводимая более чем 100 миллионам детей ежегодно.\u003c/p\u003e\n\u003cp\u003eЕсть одна значительная проблема: \u003cstrong\u003eона не работает\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eСобственные данные ВОЗ показывают, что вакцина БЦЖ обеспечивает в лучшем случае непоследовательную защиту от легочного туберкулеза у взрослых. Масштабные испытания произвели дико различные результаты:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИспытание 1968 года в Чинглепуте, Индия - одно из крупнейших испытаний вакцины когда-либо проводимых, с более чем 360 000 участников - показало \u003cstrong\u003eнулевую защиту\u003c/strong\u003e. На самом деле, вакцинированная группа имела немного \u003cstrong\u003eвыше\u003c/strong\u003e показатели туберкулеза, чем невакцинированная группа.\u003c/li\u003e\n\u003cli\u003eИспытания в Великобритании показали умеренную защиту, но эти были проведены в популяциях с резко различными условиями жизни, чем в развивающемся мире, где ТБ наиболее распространен.\u003c/li\u003e\n\u003cli\u003eМетаанализ 1994 года пришел к выводу, что эффективность БЦЖ варьировалась от 0% до 80%, в зависимости от исследования - диапазон настолько широкий, чтобы быть бессмысленным.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНесмотря на эти доказательства, вакцина БЦЖ остается в Списке основных лекарств ВОЗ, и она продолжает вводиться миллиардам детей. Почему? Потому что промышленность вакцин - как индустрия витаминов, как фармацевтическая промышленность - существует не для продвижения здоровья, а для генерирования доходов и поддержания контроля.\u003c/p\u003e\n\u003ch3 id=\"катастрофа-любека\"\u003eКатастрофа Любека\u003c/h3\u003e\n\u003cp\u003eВ 1930 году в немецком городе Любек 72 младенца умерли после введения вакцины БЦЖ, загрязненной вирулентными бактериями туберкулеза. Катастрофа была приписана лабораторной ошибке - штамм вирулентного ТБ был случайно смешан со штаммом вакцины.\u003c/p\u003e\n\u003cp\u003eНо более глубокий вопрос никогда не задавался: почему 72 младенца получали инъекции живой бактериальной вакцины в первую очередь? Катастрофа Любека раскрыла фундаментальную безответственность науки о вакцинах - готовность экспериментировать над наиболее уязвимыми членами общества в преследование идеологических и коммерческих целей.\u003c/p\u003e\n\u003cp\u003eИезуитская клятва, как раскрыто в \"Catholic Confidential\", требует слепого повиновения целям ордена и разрешает \"всякие виды порока\" в их преследовании. Индустрия вакцин работает по такому же принципу: любой вред отдельным лицам приемлем, если он служит большей цели - и большей целью является не здоровье, а контроль.\u003c/p\u003e\n\u003ch2 id=\"современная-индустрия-тб\"\u003eСовременная индустрия ТБ\u003c/h2\u003e\n\u003ch3 id=\"устойчивость-к-лекарствам-искусственно-созданный-кризис\"\u003eУстойчивость к лекарствам: искусственно созданный кризис\u003c/h3\u003e\n\u003cp\u003eПоявление \"устойчивого к лекарствам\" и \"устойчивого к множественным лекарствам\" туберкулеза было использовано для оправдания миллиардов долларов в новое исследовательское финансирование, разработку новых лекарств и расширенные программы наблюдения. Но концепция устойчивости к лекарствам основана на том же неправильном фундаменте, что и сама теория микробов.\u003c/p\u003e\n\u003cp\u003eЕсли туберкулез не вызывается бактерией, а вызывается ядовитыми условиями жизни, то \"туберкулез, устойчивый к лекарствам\", просто туберкулез в популяциях, живущих в такой деградированной обстановке, что никакое лекарство не может преодолеть ущерб. \"Сопротивление\" не в бактерии - оно в невозможности лечить человека лекарствами в здоровье, пока он продолжает жить в бедности, дышать загрязненным воздухом, пить загрязненную воду и есть питательно пустую пищу.\u003c/p\u003e\n\u003ch3 id=\"тб-и-вич-двойной-миф\"\u003eТБ и ВИЧ: двойной миф\u003c/h3\u003e\n\u003cp\u003eУтверждение, что туберкулез и ВИЧ синергичны - что ВИЧ ослабляет иммунную систему, делая людей более восприимчивыми к ТБ, - построено на двух мошеннических предпосылках. Теория ВИЧ (которая является еще одной ложью для другой статьи) и теория микробов усиливают друг друга в циклическом цикле плохой науки. Люди в развивающихся странах, которые недоедают, перегружены работой и живут в ядовитых условиях, развивают симптомы, которые называются \"коинфекцией ТБ/ВИЧ\", и предлагаемое решение всегда одно и то же: больше лекарств, больше вакцин, больше зависимости от фармацевтической системы.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение\"\u003eДуховное измерение\u003c/h2\u003e\n\u003ch3 id=\"медицина-как-религия\"\u003eМедицина как религия\u003c/h3\u003e\n\u003cp\u003eСовременная медицина функционирует как религия. У нее есть священники (врачи), храмы (больницы), таинства (вакцины и лекарства), писания (рецензируемые журналы) и инквизиция (преследование инакомыслящих практиков). Как и все ложные религии, она требует неколебимой веры от своих последователей и жестоко наказывает ересь.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был рассказано во время его NDE, что слова имеют духовную силу и что духовное царство более реально, чем физическое. Когда медицинское учреждение объявляет, что туберкулез вызывается палочкой и может быть лечен только их лекарствами и вакцинами, эти слова создают духовное рабство. Миллиарды людей принимают этот нарратив на веру - не потому, что они исследовали доказательства, а потому, что они обучены доверять священникам медицинской религии.\u003c/p\u003e\n\u003cp\u003eЭто именно механизм иезуитского контроля. Общество Иисуса не нужно контролировать каждого человека - ему нужно только контролировать учреждения, которые формируют убеждения. Контролируйте университеты, и вы контролируете, что верят врачи. Контролируйте журналы, и вы контролируете, что читают врачи. Контролируйте финансирование, и вы контролируете, что изучают исследователи. Контролируйте ВОЗ, и вы контролируете политику здравоохранения каждой нации на земле.\u003c/p\u003e\n\u003ch3 id=\"путь-к-свободе\"\u003eПуть к свободе\u003c/h3\u003e\n\u003cp\u003eПуть к свободе начинается с вопроса. Ставьте вопрос теории микробов. Ставьте вопрос нарративу туберкулеза. Ставьте вопрос каждому фундаментальному предположению современной медицины. Не потому, что вопрос разрушительный, а потому, что истина может выдержать любой вопрос, а ложь не может.\u003c/p\u003e\n\u003cp\u003eИщите мудрость Господа во всех вопросах здоровья. Ваше тело - его храм, и он предоставил все необходимое для его питания и исцеления - в целых продуктах, чистой воде, солнечном свете, отдыхе и мире, превышающем понимание. Фармацевтическая система предлагает противоположность всем этим вещам: синтетические химикаты, загрязненная вода, помещение в доме, переутомление и тревога вечной болезни.\u003c/p\u003e\n\u003ch2 id=\"дополнительная-информация\"\u003eДополнительная информация\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследования теории микробов, теории терраина и мошенничества туберкулеза\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — духовная война позади институциональной дезинформации\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — иезуитская инфильтрация медицинских и научных учреждений\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eEngineering Contagion\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/41-Shedding_Proof.mp4\"\u003eShedding Proof\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/immune-system-hoax/?lang=ru\"\u003eTHE IMMUNE SYSTEM HOAX: Что они вам никогда не рассказывали\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/chickenpox-contagion-experiments/?lang=ru\"\u003eThe CHICKENPOX Contagion Experiments That Proved Nothing\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/satanic-science-smallpox-vaccine/?lang=ru\"\u003eSatanic Science: The Horrifying Truth Behind the Smallpox Vaccine\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eТуберкулез никогда не был тем, что они вам говорили. Это была бедность, загрязнение и отравление - переформатированное как инфекционная болезнь для оправдания создания медицинской промышленности, которая получает прибыль от человеческих страданий. Лечение всегда было чист
