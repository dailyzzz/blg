.\" — Бытие 3:4-5\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eОбещание змея никогда не изменилось. Оно только было переделано. В Эдеме ложь была завёрнута в плод. В наше время оно завёрнуто в исполнительные приказы, инициативы биотехнологии и мандаты общественного здоровья. U.S. правительство — через директивы финансирования, рамки политики и межагентскую координацию — позиционировало себя как ведущего институционального спонсора движения, которое стремится фундаментально изменить, что означает быть человеком. Это не теория заговора. Это опубликованная политика.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatans Disguise\u003c/a\u003e захватывает суть этого обмана: враг не объявляет себя. Он приходит облачённый в язык прогресса, здоровья, инноваций и национальной безопасности. И U.S. правительство стало его наиболее эффективным инструментом.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"исполнительный-приказ-14081-директива-биотехнологии\"\u003eИсполнительный приказ 14081: директива биотехнологии\u003c/h2\u003e\n\u003cp\u003e12 сентября 2022 года президент Байден подписал исполнительный приказ 14081, озаглавленный \"Advancing Biotechnology and Biomanufacturing Innovation for a Sustainable, Safe, and Secure American Bioeconomy\". Этот документ, в основном проигнорированный основными средствами массовой информации, — один из наиболее последовательных политических директив 21-го века.\u003c/p\u003e\n\u003ch3 id=\"что-это-говорит\"\u003eЧто это говорит\u003c/h3\u003e\n\u003cp\u003eИсполнительный приказ поручает всем федеральным агентствам скоординировать разработку и развёртывание биотехнологии по всем секторам американской жизни. Его заявленные цели включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПродвижение биотехнологии и биопроизводства для \"дальнейших социальных целей\"\u003c/li\u003e\n\u003cli\u003eИспользование биологических систем для производства \"пищевой и сельскохозяйственной инновации\"\u003c/li\u003e\n\u003cli\u003eРасширение \"биооснованных продуктов\" в промышленности\u003c/li\u003e\n\u003cli\u003eРазвитие \"технологий редактирования генов\" и \"синтетической биологии\"\u003c/li\u003e\n\u003cli\u003eПостроение \"биоэкономики\", в которой биологические процессы заменяют традиционное производство\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"что-это-означает\"\u003eЧто это означает\u003c/h3\u003e\n\u003cp\u003eРаздетый бюрократического языка, EO 14081 поручает U.S. правительству заменить естественные биологические системы — включая системы в человеческом теле — на инженерные альтернативы. Приказ явно упоминает редактирование генов, синтетическую биологию и биопроизводство как национальные приоритеты. Он требует развития \"генетических технологий\" для \"написания цепей для клеток\" и для \"программирования биологии\".\u003c/p\u003e\n\u003cp\u003eЭто язык трансгуманизма, внедрённый в президентскую политику. Правительство — это не просто разрешение модификации живых организмов — оно требует этого как национальной стратегической цели.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческий-контекст\"\u003eПророческий контекст\u003c/h2\u003e\n\u003ch3 id=\"инфраструктура-системы-зверя\"\u003eИнфраструктура системы Зверя\u003c/h3\u003e\n\u003cp\u003eОткровение 13 описывает систему полного контроля — экономического, биологического и духовного. Знак зверя помещён \"в\" правой руке или лбе, управляет участием в экономике и связан с поклонением зверю. Эта система требует:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eТехнология\u003c/strong\u003e для модификации человеческого тела на биологическом уровне\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнфраструктура\u003c/strong\u003e для отслеживания и мониторинга каждого человека\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЮридический авторитет\u003c/strong\u003e для мандатирования участия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНормативное одобрение\u003c/strong\u003e биологического компонента\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eU.S. правительство строит все четыре компонента одновременно. DARPA разрабатывает технологию. NSA и разведывательное сообщество строят инфраструктуру. Исполнительные приказы устанавливают юридический авторитет. FDA обеспечивает нормативное одобрение. Система зверя не приходит — она конструируется в реальном времени, идентифицируемыми агентствами, с опубликованными бюджетами.\u003c/p\u003e\n\u003ch3 id=\"башня-вавилонская-переделана\"\u003eБашня Вавилонская переделана\u003c/h3\u003e\n\u003cp\u003eБытие 11 записывает первый коллективный технологический проект человечества: Башня Вавилонскую. Её цель было \"дотянуться до небес\" — мост пропасти между человеческим и божественным. Ответ Бога было путаница их языка и рассеивание их по земле. Грех не было строительство, но стремление: человечество стремилось трансцендировать его созданные ограничения и достичь божественного статуса через технологию.\u003c/p\u003e\n\u003cp\u003eПовестка трансгуманизма — это Башня Вавилонскую переделана. Её цель идентична: трансцендировать человеческие ограничения через технологию. Чтобы стать \"как боги\". Чтобы преодолеть смерть, болезнь и границы человеческой биологии через инженерию, а не через Бога.\u003c/p\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/495-Tower_Of_Babel_2.mp4\"\u003eTower Of Babel 2\u003c/a\u003e делает эту связь явной: мы наблюдаем вторую попытку построить башню в небо, и она финансируется U.S. правительством.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-может-быть-сделано\"\u003eЧто может быть сделано\u003c/h2\u003e\n\u003ch3 id=\"осведомлённость-и-сопротивление\"\u003eОсведомлённость и сопротивление\u003c/h3\u003e\n\u003cp\u003eПервый шаг — это осведомлённость. Большинство американцев не имеют идеи, что их правительство активно финансирует переделку человеческого видов. Исполнительные приказы, бюджеты агентств и рамки политики опубликованы, но редко читаются. Средства массовой информации не покрывают их. Последствия никогда не обсуждаются.\u003c/p\u003e\n\u003cp\u003eВерующие должны образовать себя и других. Технологии разрабатываются, не нейтральные инструменты — они компоненты системы, которую Писание предупреждает будет использовано для порабощения человечества. Понимание специфики — программы, бюджеты, временные шкалы — является существенным для информированного сопротивления.\u003c/p\u003e\n\u003ch3 id=\"духовная-подготовка\"\u003eДуховная подготовка\u003c/h3\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/27-The_Promise_of_Salvation.mp4\"\u003eThe Promise of Salvation\u003c/a\u003e напоминает нам, что окончательная защита против повестки трансгуманизма — не политическая, а духовная. Обещание Бога искупить и восстановить тех, кто доверяет Ему, более мощно, чем любая технология. Правительство может стремиться переделать человеческое тело, но это не может коснуться человеческой душе — если не одного человека согласиться.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/215-Brain_Machine_Interface.mp4\"\u003eBrain Machine Interface\u003c/a\u003e — Слияние человеческого познания и машинного интеллекта\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/339-The_New_Man.mp4\"\u003eThe New Man\u003c/a\u003e — Постчеловеческое существо, инженерное политикой правительства\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/495-Tower_Of_Babel_2.mp4\"\u003eTower Of Babel 2\u003c/a\u003e — Вторая попытка трансцендировать человеческие ограничения\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/43-Singularity_2030.mp4\"\u003eSingularity 2030\u003c/a\u003e — Временная шкала конвергенции\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatans Disguise\u003c/a\u003e — Враг облачённый в язык прогресса\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e — Системы, работающие внутри учреждений и телес\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучи-дальше\"\u003eИзучи дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/darpa-synthetic-biology-budget/?lang=ru\"\u003eDARPA's $4.1 Billion Synthetic Biology Budget: Engineering Life as a Weapon\u0
