03cp\u003eКогда Бог призвал Гедеона разбить мадианитян, Он не дал ему большую армию. Он уменьшил её — с 32 000 до 10 000, а затем с 10 000 до 300. Стратегия Бога была не в сложении, а в вычитании. Раздутая армия была не активом — она была ответственностью. Победа требовала точности, а не массы.\u003c/p\u003e\n\u003cp\u003eКак провозглашает трек Confliction \"The Overcoming\", преодоление не требует численного превосходства — оно требует согласованности с целью. Федеральная бюрократия выросла не потому, что общественные интересы это требовали, а потому, что интересы учреждений это требовали. Каждое бюро, каждое отделение, каждый офис представляют работу, бюджеты и полномочия, за которые учреждение борется, чтобы сохранить, независимо от того, служат ли они общественности.\u003c/p\u003e\n\u003cp\u003eDOGE приехал с мечом Гедеона, сокращая раздутую армию до боевой готовности. Бюрократия называет это резнёй. Писание называет это подготовкой к победе.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"департамент-эффективности-правительства\"\u003eДепартамент эффективности правительства\u003c/h2\u003e\n\u003cp\u003eДепартамент эффективности правительства (DOGE), учреждённый при нынешней администрации, получил задачу выявить и устранить траты, мошенничество, избыточность и захватанные операции во всём федеральном правительстве. Его полномочия распространяются на каждое федеральное агентство, но его влияние на бюрократию здравоохранения было особенно драматичным.\u003c/p\u003e\n\u003cp\u003eОбзор DOGE HHS, CDC, FDA и NIH выявил:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИзбыточные должности:\u003c/strong\u003e Тысячи должностей, выполняющих перекрывающиеся функции во всех агентствах, отделениях и офисах — многие созданные во время пандемии COVID-19 в соответствии с полномочиями чрезвычайного найма и никогда не исключённые, когда чрезвычайная ситуация закончилась.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗахватанные операции:\u003c/strong\u003e Программы и офисы, основная функция которых состояла в обслуживании интересов фармацевтической промышленности, а не общественности, включая офисы связи с промышленностью, координаторов государственно-частного партнёрства и команды коммуникаций, функция которых в эпоху пандемии была координацией модерирования контента с платформами социальных сетей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРаздутое управление:\u003c/strong\u003e Соотношение управления к рабочим, превышающее эталоны частного сектора в два-четыре раза, с целыми слоями контрольно-надзорного персонала, руководящих функциями, требующими минимального надзора.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНеподотчётные расходы:\u003c/strong\u003e Программы грантов, контракты и межведомственные соглашения, лишённые адекватных показателей производительности, отчётности о результатах или финансовой подотчётности — включая миллиарды в расходы эпохи пандемии, которые никогда не были проверены.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон заметила в The Kingston Report (karenkingston.substack.com): \"Федеральная бюрократия здравоохранения не была построена для обслуживания общественности. Она была построена для обработки денег — денег налогоплательщиков, текущих к фармацевтическим компаниям, академическим учреждениям и государственным подрядчикам. Каждая должность, каждый офис, каждая программа существуют для облегчения потока этих денег. Когда вы исключаете должности, вы нарушаете поток. Вот почему бюрократия дерётся с такой яростью — не потому, что должности служат общественности, а потому, что они служат деньгам.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"масштаб-сокращений\"\u003eМасштаб сокращений\u003c/h2\u003e\n\u003cp\u003e\"День святого Валентина Резня\" DOGE — так названная медиа-компаниями в связи с её временем — привела к исключению тысяч федеральных должностей по HHS и его подчинённым агентствам. Сокращения нацеливались на:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eАдминистративные и управленческие должности, превышающие операционные требования\u003c/li\u003e\n\u003cli\u003eЧрезвычайные сотрудники эпохи пандемии, чьё оправдание в чрезвычайной ситуации истекло\u003c/li\u003e\n\u003cli\u003eДолжности в области коммуникаций и связей с общественностью, задействованные в координации модерирования контента социальных сетей\u003c/li\u003e\n\u003cli\u003eДолжности связи с промышленностью и государственно-частного партнёрства\u003c/li\u003e\n\u003cli\u003eДолжности управления грантами в программах, определённых для прекращения или реструктуризации\u003c/li\u003e\n\u003cli\u003eИзбыточные научные должности, выполняющие функции, дублирующиеся во всех агентствах\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсключённые должности представляют значительное сокращение федеральной рабочей силы здравоохранения, хотя точные цифры были предметом политических споров — DOGE сообщает о более высоких сокращениях, а затронутые агентства сообщают о более низких.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"иммунный-ответ-бюрократии\"\u003eИммунный ответ бюрократии\u003c/h2\u003e\n\u003cp\u003eОтвет федеральной бюрократии на сокращения DOGE следовал той же схеме, наблюдаемой в каждой предыдущей попытке сократить размер государства:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравовые вызовы:\u003c/strong\u003e Профсоюзы федеральных служащих и затронутые лица подали судебные иски, оспаривающие сокращения как нарушения федеральной защиты работников, Закона об административной процедуре и принципов системы заслуг.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАктивизация медиа:\u003c/strong\u003e Устаревшие медиа-компании опубликовали обширное освещение, оформляющее сокращения как нападение на инфраструктуру общественного здравоохранения, с интервью затронутых сотрудников и сочувственными портретами нарушенных государственных программ.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСопротивление Конгресса:\u003c/strong\u003e Члены Конгресса из районов со значительным федеральным занятостью внесли законодательство для восстановления исключённых должностей и ограничения полномочий DOGE по сокращению уровней федеральной рабочей силы.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПредупреждения саботажа:\u003c/strong\u003e Бывшие должностные лица и правозащитные организации предупредили, что сокращения скомпрометируют способность нации реагировать на будущие чрезвычайные ситуации в области здравоохранения — подразумевая, что любое сокращение бюрократической ёмкости представляет угрозу национальной безопасности.\u003c/p\u003e\n\u003cp\u003eТрек \"Total Information Awareness\" документирует, как федеральная бюрократия функционирует как самосохраняющийся организм — развёртывая юридическую, медийную, законодательную и институциональную защиту против любой угрозы своему размеру, масштабу или полномочиям.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческое-измерение\"\u003eПророческое измерение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И сказал Господь Гедеону: народа с тобою слишком много для того, чтобы Я предал мадианитян в руки их; как бы не вознесся Израиль предо Мною и не сказал: собственною рукою моею спасена я.\" — Судьи 7:2\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБог сократил армию Гедеона не потому, что меньше воинов было достаточно, а потому, что раздутая армия претендовала бы на честь победы. Принцип применяется к учреждениям: раздутая бюрократия претендует на честь результатов, которые она не произвела, и требует ресурсы для функций, которые она не выполняет. Сокращение до необходимой силы вынуждает честность — учреждение должно делать то, что оно претендует делать, с ресурсами, которые оно действительно нуждается, или его отказ становится видимым.\u003c/p\u003e\n\u003cp\u003eСокращения DOGE убирают бюрократическую подкладку, которая скрывала захватанные операции, функции, служащие промышленности, и институциональные траты, характеризующие докомунистическую бюрократию здравоохранения. То, что остаётся, должно либо выполнять свою заявленную миссию, либо признать, что это никогда не делало.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всём, что он говорит тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 звучит в коридорах каждого правительства сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их ровно о том, что произойдёт — их сыновей возьмут на войну, их дочерей на служение, их поля и виноградники отберут, десятину всего конфискуют. Они выбрали человеческое правление над царством Бога, и тирания последовала ровно, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной скрытой структуре власти. Голосование за одну из сторон — это выбор того, какое крыло взмахнёт далее, пока птица летит в том же направлении. Настоящая власть никогда не была в избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eDOGE — Отчёты о выводах обзора Департамента эффективности правительства и сокращении рабочей силы\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Анализ Карен Кингстон структуры федеральной бюрократии здравоохранения, захватанных операций и механизмов институционального самосохранения\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eHHS — Статистика рабочей силы и организационная структура\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eПрофсоюзы федеральных служащих — Подачи судебного вызова\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eСудьи 6-7 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eTotal Information Awareness\u003c/a\u003e — Самосохраняющийся организм федеральной бюрократии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/171-Great_Reset_Rising.mp4\"\u003eGreat Reset Rising\u003c/a\u003e — Институциональное сопротивление структурной реформе\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — Бюрократические системы, марширующие в синхронном самосохранении\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/127-The_Overcoming.mp4\"\u003eThe Overcoming\u003c/a\u003e — Победа через сокращение до необходимой силы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/101-Fight_of_Faith.mp4\"\u003eFight of Faith\u003c/a\u003e — Battaglia против закреплённых институциональных интересов\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследовать-далее\"\u003eИсследовать далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/rfk-cleans-house-cdc/?lang=ru\"\u003eRFK Jr. Cleans House at the CDC\u003c/a\u003e — Чистка персонала, которая предшествовала структурным сокращениям DOGE\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/cdc-gone-media-exodus/?lang=ru\"\u003eThe CDC is Gone: Media Reports Mass Exodus\u003c/a\u003e — Институциональный коллапс, следующий за реформой\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/trump-freezes-nih-grants/?lang=ru\"\u003eTrump Freezes NIH Approvals and Research Grants\u003c/a\u003e — Финансовая заморозка, сопровождавшая сокращения персонала\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/hhs-maha-transformation/?lang=ru\"\u003eHHS Announces MAHA Transformation of Healthcare\u003c/a\u003e — Видение, которое сокращения предназначены для активации\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eАрмия Гедеона была сокращена с 32 000 до 300 — и с 300 Бог освободил Израиль от мадианитян. Федеральная бюрократия здравоохранения была сокращена мечом DOGE, и бюрократия кричит, что нация беззащитна без своих раздутых рядов. Но раздутые ряды не защищали нацию во время COVID-19 — они требовали экспериментальные инъекции, цензурировали инакомыслящих врачей и служили фармацевтической промышленности, одновременно претендуя служить общественности. \"Не воинством и не силою, но Духом Моим, говорит Господь Саваоф\" (Захария 4:6). Здоровье нации не будет защищено бюрократической массой. Оно будет защищено — если вообще будет — согласованностью оставшихся учреждений с истиной, которой они были созданы служить.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"DOGE наносит День Святого Валентина Резню федеральной бюрократии\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Департамент эффективности правительства наносит сокрушительные удары по федеральной бюрократии здравоохранения, исключая тысячи должностей, связанных с захватом регулирования.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-21T10:00:00Z\",\"children\":\"21 мая 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-w
