од и царство на царство.\"\u003c/em\u003e — Матфей 24:6-7\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eХристос предупредил Своих учеников, что последние дни будут отмечены войнами и слухами о войнах -- не как случайные акты человеческого насилия, а как организованные события, движимые духовными силами, работающими за завесой физического мира. Первая мировая война не была вызвана убийством Эрцгерцога Франца Фердинанда, ни системами альянса, которые предположительно заблокировали Европу в автоматическом конфликте. Это было вызвано преднамеренным, рассчитанным действием ордена иезуитов и его сети тайных обществ, которому нужна была глобальная война для достижения того, что не могло быть достигнуто в мире: разрушение оставшихся протестантских монархий, исключение Оттоманского халифата, создание новых финансовых инструментов контроля и переформирование карты мира в соответствии с дизайном Ватикана.\u003c/p\u003e\n\u003cp\u003eИезуиты, основанные Игнатием Лойолой как военная организация, маскирующаяся как религиозный орден, работали над общей европейской войной со времени Конгресса Вены в 1815 году. Микеланджело Тамбурини, 14-й Superior General, похвалился, что из его камеры он управлял \"не только в Париже, но в Китае, не только в Китае, но во всем мире\". К 1914 году эта похвальба стала буквальной реальностью. Иезуиты контролировали службы разведки, банковские системы, дипломатические сети и тайные общества каждой главной европейской власти.\u003c/p\u003e\n\u003cp\u003eКак объявляет \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e, хозяева тьмы работают через человеческие учреждения -- армии, правительства, банки -- для достижения воли противника. И \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e раскрывает, что враг никогда не внешен; он сидит в тронном зале, заседании кабинета и главном штабе, направляя нации к разрушению, в то время как носит форму патриотизма.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"подлинные-причины-войны\"\u003eПодлинные причины войны\u003c/h2\u003e\n\u003ch3 id=\"список-целей-иезуитов\"\u003eСписок целей иезуитов\u003c/h3\u003e\n\u003cp\u003eЧтобы понять Первую мировую войну, нужно понимать то, что иезуиты хотели уничтожить:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. Германская империя\u003c/strong\u003e -- Протестантская Пруссия была врагом иезуитов со времени Реформации. Объединенная Германская империя, созданная в 1871 году, была самой могущественной протестантской нацией в мире. Ее разрушение было приоритетом иезуитов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e2. Австро-Венгерская империя\u003c/strong\u003e -- Несмотря на номинально католическую, Австро-Венгрия была многоэтническим государством, которое сопротивлялось иезуитской централизации. Династия Габсбургов периодически бросала вызов папской власти, и толерантность империи к разнообразным религиозным и этническим группам была препятствием монолитному контролю, который требовали иезуиты.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. Оттоманская империя\u003c/strong\u003e -- Оттоманский халифат контролировал святую землю, включая Иерусалим. Ватикан пытался отвоевать Иерусалим со времени крестовых походов, и разрушение Оттоманской империи было предпосылкой для установления ватикана-согласованного присутствия в Палестине.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e4. Российская империя\u003c/strong\u003e -- Ортодоксальная Россия была самым старым и непримиримым врагом иезуитов. Династия Романовых изгнала иезуитов несколько раз, и православное христианство России представляло соперника к римской католической власти. Большевистская революция 1917 года, которая разрушила династию Романовых и установила атеистический коммунизм, была иезуитским решением русской проблемы.\u003c/p\u003e\n\u003ch3 id=\"убийство-как-триггер\"\u003eУбийство как триггер\u003c/h3\u003e\n\u003cp\u003eУбийство Эрцгерцога Франца Фердинанда 28 июня 1914 года не было действием одинокого националиста. Гаврило Принцип, убийца, был членом Black Hand, сербского тайного общества со связями с военной разведкой. Black Hand, в свою очередь, была связана с более широкой сетью европейских тайных обществ, которые работали под верховной властью иезуитского ордена.\u003c/p\u003e\n\u003cp\u003eУбийство было операцией ложного флага -- тщательно спланированный триггер, разработанный для активации систем альянса и погружения Европы в войну. Иезуиты знали, что системы альянса, которые они помогли конструировать (посредством десятилетий дипломатической манипуляции), трансформировали бы локальный конфликт в глобальный. Все, что был нужен, был правильным огнем в правильном месте.\u003c/p\u003e\n\u003cp\u003eСараево было выбрано с осторожностью. Босния-Герцеговина, недавно аннексирована Австро-Венгрией, была точкой воспламенения, где славянский национализм, австрийский империализм и сербское стремление пересекались. Убийство гарантировало, что Австрия потребует удовлетворение от Сербии, что Россия мобилизуется в защиту Сербии, что Германия мобилизуется в защиту Австрии, и что Франция и Великобритания мобилизуются против Германии. Вся последовательность была столь же предсказуема, как линия домино -- и иезуиты потратили десятилетия, устанавливая домино.\u003c/p\u003e\n\u003ch2 id=\"скрытая-финансовая-архитектура\"\u003eСкрытая финансовая архитектура\u003c/h2\u003e\n\u003ch3 id=\"банки-позади-войны\"\u003eБанки позади войны\u003c/h3\u003e\n\u003cp\u003eВойны не ведут идеологией; они ведут деньгами. И деньги для Первой мировой войны пришли из той же банковской сети, которая инженеризировала Панику 1893 года, Панику 1907 года и создание Федеральной резервной системы в 1913 году.\u003c/p\u003e\n\u003cp\u003eЗакон о Федеральной резервной системе был принят 23 декабря 1913 года -- всего семь месяцев до начала Первой мировой войны. Это время не было совпадением. Федеральная резервная система дала банковской элите способность создавать деньги из ничего, давать ссуду правительствам под интерес и получать прибыль с обоих сторон предстоящего конфликта. Без Федеральной резервной системы, США не смогли бы финансировать свой ввод в войну -- и без американского финансирования, война закончилась бы в тупике к 1916 году.\u003c/p\u003e\n\u003cp\u003eКлючевые фигуры в этой финансовой архитектуре были:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eДж.П. Морган\u003c/strong\u003e, чей банк служил основным финансовым агентом для британского и французского правительств в Соединенных Штатах. Банк Моргана организовал миллиарды долларов в кредиты союзникам, гарантируя, что американские финансовые интересы были согласованы с победой союзников.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПол Варбург\u003c/strong\u003e, немецко-рожденный банкир, который был одним из главных архитекторов Федеральной резервной системы. Брат Варбурга Макс сидел на совете директоров Германского Reichsbank. Семья Варбург, таким образом, имела финансовые интересы с обеих сторон конфликта -- позицию, которая гарантировала прибыль независимо от результата.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eДжейкоб Шифф\u003c/strong\u003e, партнер в Kuhn, Loeb \u0026#x26; Co., который финансировал японскую войну против России в 1904-1905 годах и позже финансировал большевистскую революцию. Финансовая сеть Шиффа связала Wall Street к революционным движениям, которые разрушили бы Российскую империю изнутри.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВсе эти фигуры были связаны с более широкой сетью банковских семей -- Rothschilds, Barings, Warburgs, Schiffs -- которые служили в качестве финансового плеча Ватикана. Rothschilds были официальными банкирами Ватикана со времени 19-го века, и их глобальная сеть обеспечила инфраструктуру для финансирования глобальной войны.\u003c/p\u003e\n\u003ch3 id=\"федеральная-резервная-система-машина-войны\"\u003eФедеральная резервная система: машина войны\u003c/h3\u003e\n\u003cp\u003eСоздание Федеральной резервной системы в 1913 году было единственным наиболее важным предпосылком для Первой мировой войны. Без центрального банка, способного к созданию неограниченного кредита, правительство Соединенных Штатов не смогло бы:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКредит миллиардов долларов силам союзников перед американским входом в войну\u003c/li\u003e\n\u003cli\u003eФинансирование его собственного военного наращивания после входа в войну в 1917 году\u003c/li\u003e\n\u003cli\u003eВыдача Liberty Bonds, которые извлекли бы богатство из обычных американцев для финансирования войны\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eФедеральная резервная система была разработана банкирами, для банкиров, для служения интересам иезуит-контролируемой финансовой элиты. Ее создание в декабре 1913 года -- всего несколько месяцев перед началом войны, которая сделала это незаменяемым -- это один из наиболее прозрачных примеров предварительного планирования в современной истории.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/97-Income_Tax_Is_Slavery.mp4\"\u003eIncome Tax Is Slavery\u003c/a\u003e связывает Федеральную резервную систему к системе подоходного налога, установленной в тот же год -- 16-я поправка, ратифицированная в феврале 1913 года, дала правительству силу для прямого налогообложения доходов, предоставляя поток доходов для обслуживания долга, созданного созданием денег Федеральной резервной системой.\u003c/p\u003e\n\u003ch2 id=\"сеть-тайного-общества\"\u003eСеть тайного общества\u003c/h2\u003e\n\u003ch3 id=\"масонство-и-война\"\u003eМасонство и война\u003c/h3\u003e\n\u003cp\u003eМасонство сыграло центральную роль в дипломатических и военных решениях, которые привели к Первой мировой войне. Масонские ложи Европы служили каналами, посредством которых стратегия иезуитов была сообщена и скоординирована:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGrand Orient de France\u003c/strong\u003e, наиболее мощное масонское тело в континентальной Европе, было яростно антиклерикальным в его публичной позиции, но служило иезуитским интересам, продвигая светскую повестку дня, которая ослабила протестантские и православные учреждения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnited Grand Lodge of England\u003c/strong\u003e связала британскую аристократию к континентальной системе ложи и обеспечила социальную структуру, в которой дипломатические решения были неформально сделаны, вне взгляда парламентов и публики.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScottish Rite\u003c/strong\u003e ложи в Соединенных Штатах и Европе обеспечили иерархическую структуру, посредством которой наиболее чувствительные операции были спланированы и исполнены.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПерекрытие между членством масонского и политическим/военным лидерством в до-войне Европе было близко-полным. Короли, премьер-министры, генералы и адмиралы на всех сторонах конфликта были масонами, связанными клятвами секретности и взаимного обязательства, которые превосходили национальные лояльности. Так глобальная война могла быть спланирована, скоординирована и запущена без знания населения, которое боролось бы и умирало бы в нем.\u003c/p\u003e\n\u003cp\u003eКак раскрыло ближайшее смерти опыта Говарда Питтмана, духовная война, описанная в Ефесянам 6:12, работает через главные лидеров, полномочиям и правителям тьмы, которые управляют из второго неба. Система масонской ложи была -- и остается -- земным аналогом этой демонической иерархии: многоуровневая система власти, в которой каждый уровень знает только то, что уровень выше него выбирает раскрыть. Масон рядом не знает иезуитский контроль в вершине; он просто следует инструкциям и получает награды. Это структура, которая спланировала и исполнила Первую мировую войну. Посмотреть Свидетельство Питтмана: \u003ca href=\"
