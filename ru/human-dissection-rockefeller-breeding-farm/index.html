\u003eСемья Рокфеллеров не просто изменила американскую медицину — они изменили американское тело. Через евгенические программы, кампании принудительной стерилизации, учреждения по экспериментам на людях и то, что можно назвать только фермами для разведения, династия Рокфеллеров обращалась с людьми как со скотом, который нужно контролировать, выбраковывать и создавать в соответствии с их видением идеального общества.\u003c/p\u003e\n\u003cp\u003eЭто не теория заговора. Это задокументированная история — история, которая была систематически стерта из общественного сознания, потому что она раскрывает истинную природу сил, создавших современную медицину.\u003c/p\u003e\n\u003cp\u003eГоварду Питтману во время его околосмертного опыта было показано, что демоническое царство действует через сложный обман. Три неба — атмосферное, демоническое и божественное — представляют многослойную реальность, в которой ведется эта война. 97,5% христиан, которые терпели неудачу, «никогда не делали Иисуса Господом» своей жизни. Они служили себе — и евгеническое движение Рокфеллеров является высшим выражением самопоклонения: убеждение, что небольшая элита имеет право и знание определять, кто живет, кто умирает и кто размножается.\u003c/p\u003e\n\u003cp\u003eИезуиты, как заметил Наполеон, представляют собой «военную организацию», преследующую «абсолютную власть, всемирную власть». Джон Адамс предупреждал о «вечном проклятии» для «Общества Лойолы». Генерал Тамбулини управлял «половиной мира» из своей комнаты. Евгенические программы Рокфеллеров были применением этой абсолютной власти к самому фундаментальному аспекту человеческого существования: самому воспроизводству.\u003c/p\u003e\n\u003cp\u003eДокументальный фильм «Католические тайны» раскрывает приверженность иезуитов проникновению «скрытому хитростью» и разрешение «всех видов пороков». Вскрытие людей ради прибыли, принудительная стерилизация «негодных» и программы разведения «высших» — это пороки высшего порядка, и они были совершены учреждениями с глубокими иезуитскими связями.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"евгеническая-империя-рокфеллеров\"\u003eЕвгеническая Империя Рокфеллеров\u003c/h2\u003e\n\u003ch3 id=\"лаборатория-колд-спринг-харбор\"\u003eЛаборатория Колд-Спринг-Харбор\u003c/h3\u003e\n\u003cp\u003eВ 1904 году Чарльз Дэвенпорт — биолог с тесными связями с семьей Рокфеллеров — основал Станцию экспериментальной эволюции в Колд-Спринг-Харбор, Лонг-Айленд. Это учреждение, финансируемое деньгами Карнеги и Рокфеллера, стало штаб-квартирой американского евгенического движения.\u003c/p\u003e\n\u003cp\u003eКолд-Спринг-Харбор был не просто исследовательским учреждением. Это был командный центр общенациональной кампании по классификации людей по генетической «пригодности» и устранению тех, кто считался «негодным» через стерилизацию, институционализацию и ограничение иммиграции.\u003c/p\u003e\n\u003cp\u003eБюро евгенических записей, также в Колд-Спринг-Харбор, собирало семейные истории и генетические данные о миллионах американцев. Полевые работники были разосланы по всей стране для документирования генеалогических деревьев, выявляя лиц и семьи, считавшиеся генетически неполноценными. Эти данные использовались для поддержки законов о принудительной стерилизации в 32 штатах и для оправдания иммиграционных ограничений, нацеленных на южных и восточных европейцев, азиатов и африканцев.\u003c/p\u003e\n\u003ch3 id=\"фонд-рокфеллера-и-нацистская-евгеника\"\u003eФонд Рокфеллера и нацистская евгеника\u003c/h3\u003e\n\u003cp\u003eУчастие Фонда Рокфеллера в евгенике не остановилось на американских берегах. В 1920-х и 1930-х годах Фонд предоставил значительное финансирование немецким евгеническим учреждениям, включая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИнститут кайзера Вильгельма по антропологии, человеческой наследственности и евгенике — под руководством Ойгена Фишера, который позже стал нацистским расовым ученым\u003c/li\u003e\n\u003cli\u003eИнститут кайзера Вильгельма по психиатрии — который разработал многие теории и методы, позже использованные в нацистских программах уничтожения\u003c/li\u003e\n\u003cli\u003eСобственный исследовательский институт Йозефа Менгеле получил финансирование от Рокфеллера до того, как Менгеле стал «Ангелом Смерти» в Освенциме\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСвязь между американской евгеникой и нацистской Германией прямая, задокументированная и неоспоримая. Нацисты явно ссылались на американские евгенические законы как на вдохновение для своих собственных программ расовой чистоты. Нюрнбергские законы 1935 года были частично смоделированы по американским статутам принудительной стерилизации.\u003c/p\u003e\n\u003cp\u003eПосле войны евгеническое движение не закончилось — оно просто изменило свое название. «Евгеника» стала «генетикой». «Расовая гигиена» стала «общественным здравоохранением». «Программы разведения» стали «планированием семьи». Фонд Рокфеллера легко перешел от поддержки евгеники к поддержке организаций по контролю над населением, таких как Planned Parenthood и Совет по народонаселению.\u003c/p\u003e\n\u003ch2 id=\"вскрытие-людей-скрытая-история\"\u003eВскрытие людей: Скрытая история\u003c/h2\u003e\n\u003ch3 id=\"торговля-похищением-тел\"\u003eТорговля похищением тел\u003c/h3\u003e\n\u003cp\u003eИстория вскрытия людей в Америке гораздо темнее, чем думает большинство людей. В 19 веке спрос на трупы для медицинских школ намного превышал законное предложение. Это создало процветающий черный рынок человеческих тел, управляемый «людьми воскрешения», которые раскапывали свежие могилы и продавали тела медицинским школам.\u003c/p\u003e\n\u003cp\u003eМедицинские школы, финансируемые Рокфеллером, были среди основных потребителей этой торговли. Когда Доклад Флекснера 1910 года консолидировал медицинское образование в горстку элитных учреждений, спрос на трупы увеличился. Торговля похищением тел эволюционировала от ограбления могил к чему-то гораздо худшему: убийству уязвимых людей — бедных, бездомных, психически больных, меньшинств — ради их тел.\u003c/p\u003e\n\u003ch3 id=\"акты-об-анатомическом-даре\"\u003eАкты об анатомическом даре\u003c/h3\u003e\n\u003cp\u003eК середине 20 века торговля телами была легализована через серию Актов об анатомическом даре, которые позволили учреждениям забирать тела невостребованных умерших — людей, которые умерли в больницах, тюрьмах и психиатрических учреждениях без семьи, чтобы забрать их. На практике это означало, что тела беднейших и наиболее маргинализированных членов общества направлялись в медицинские школы и исследовательские учреждения.\u003c/p\u003e\n\u003cp\u003eЭтические последствия ошеломляющие. Люди, которые уже были в невыгодном положении в жизни — лишенные адекватного здравоохранения, питания и социальных услуг — имели свои тела, забранные теми самыми учреждениями, которые подвели их. Их плоть стала сырьем для медицинского образования, их органы — предметами исследований, их кости — экспонатами в анатомических музеях.\u003c/p\u003e\n\u003ch3 id=\"современная-торговля-телами\"\u003eСовременная торговля телами\u003c/h3\u003e\n\u003cp\u003eТорговля человеческими телами продолжается и сегодня, хотя она была отмыта через институциональные процессы. Такие компании, как Science Care и Bio-Renewables, действуют как «брокеры тел», приобретая пожертвованные тела и продавая их — или их части — медицинским школам, фармацевтическим компаниям и военно-исследовательским учреждениям.\u003c/p\u003e\n\u003cp\u003eРасследования выявили:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eТела, пожертвованные для медицинских исследований, продаваемые военным учреждениям для испытаний взрывов\u003c/li\u003e\n\u003cli\u003eЧасти тел, смешанные и распределенные от нескольких доноров без надлежащего отслеживания\u003c/li\u003e\n\u003cli\u003eТела, хранящиеся в антисанитарных условиях, сложенные в морозильниках и складах\u003c/li\u003e\n\u003cli\u003eСемьи, обманутые относительно того, как будут использоваться пожертвованные тела\u003c/li\u003e\n\u003cli\u003eПрибыльная перепродажа частей тел, которые, как семьи верили, пойдут на научные исследования\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто рокфеллеровская медицинская модель, доведенная до логического завершения: человеческое тело как товар, покупаемый и продаваемый учреждениями, которые рассматривают людей как сырье, а не как творения Бога.\u003c/p\u003e\n\u003ch2 id=\"программы-разведения\"\u003eПрограммы разведения\u003c/h2\u003e\n\u003ch3 id=\"конкурсы-лучших-семей\"\u003eКонкурсы лучших семей\u003c/h3\u003e\n\u003cp\u003eВ 1920-х и 1930-х годах американское евгеническое движение спонсировало конкурсы «Лучших семей» на государственных ярмарках по всей стране. Семьи оценивались по их физическим характеристикам, умственным способностям и семейным историям. Победители получали медали с надписью: «Да, у меня есть хорошее наследие».\u003c/p\u003e\n\u003cp\u003eЭти конкурсы не были невинным развлечением. Это были пропагандистские инструменты, предназначенные для нормализации идеи, что некоторые семьи генетически выше, а другие генетически ниже. Они создали общественный консенсус для евгенической политики, которая последовала: принудительная стерилизация, институционализация и ограничение иммиграции.\u003c/p\u003e\n\u003ch3 id=\"принудительная-стерилизация\"\u003eПринудительная стерилизация\u003c/h3\u003e\n\u003cp\u003eМежду 1907 и 1981 годами более 60 000 американцев были принудительно стерилизованы в соответствии с государственными евгеническими законами. Жертвами были непропорционально:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eБедные женщины, особенно цветные женщины\u003c/li\u003e\n\u003cli\u003eЗаключенные психиатрических учреждений\u003c/li\u003e\n\u003cli\u003eЗаключенные\u003c/li\u003e\n\u003cli\u003eЛюди с физическими или умственными недостатками\u003c/li\u003e\n\u003cli\u003eЛюди, считавшиеся «морально недостаточными» (что могло означать что угодно, от распущенности до бедности)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВерховный суд подтвердил принудительную стерилизацию в деле Бак против Белла 1927 года, в котором судья Оливер Венделл Холмс-младший позорно заявил: «Трех поколений идиотов достаточно». Кэрри Бак, истец, была молодой женщиной, которая была изнасилована племянником своей приемной семьи и институционализирована, чтобы скрыть изнасилование. Она не была умственно неполноценной — она была жертвой жестокого обращения.\u003c/p\u003e\n\u003cp\u003eПрограммы принудительной стерилизации проводились через ту же медицинскую инфраструктуру, которую Фонд Рокфеллера построил через Доклад Флекснера. Больницы, медицинские школы и государственные департаменты здравоохранения — все сформированные деньгами Рокфеллера и идеологией Рокфеллера — проводили стерилизации.\u003c/p\u003e\n\u003ch3 id=\"совет-по-народонаселению\"\u003eСовет по народонаселению\u003c/h3\u003e\n\u003cp\u003eВ 1952 году Джон Д. Рокфеллер III основал Совет по народонаселению, организацию, посвященную исследованиям и внедрению контроля над населением. Совет по народонаселению разработал и продвигал:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eВнутриматочные устройства (ВМС) для использования в развивающихся странах\u003c/li\u003e\n\u003cli\u003eГормональные контрацептивы\u003c/li\u003e\n\u003cli\u003eМетоды стерилизации для массового развертывания\u003c/li\u003e\n\u003cli\u003eПолитику контроля над населением, принятую правительствами по всему миру\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eРабота Совета по народонаселению представлялась как гуманитарная помощь — помощь женщинам в развивающихся странах в контроле их фертильности. Но лежащая в основе идеология была той же евгенической идеологией, которая двигала принудительную стерилизацию в Америке: убеждение, что определенные группы населения размножаются слишком много и должны контролироваться доброжелательной (западной, белой, богатой) элитой.\u003c/p\u003e\n\u003ch2 id=\"иезуитская-связь\"\u003eИезуитская связь\u003c/h2\u003e\n\u003ch3 id=\"католические-университеты-и-медицинские-исследования\"\u003eКатолические университеты и медицинские исследования\u003c/h3\u003e\n\u003cp\u003eУчреждения, управляемые иезуитами, играют значительную роль в американском медицинском образовании и исследованиях. Университет Джорджтауна, Университет Лойолы, Университет Фордхэма и десятки других иезуитских учреждений готовят врачей, проводят исследования и формируют медицинскую политику. Очевидное противоречие между заявленной оппозицией католической церкви к евгенике и участием ордена иезуитов в учреждениях, которые ее осуществляют, разрешается, когда вы понимаете иезуитский метод: проникновение «скрытое хитростью».\u003c/p\u003e\n\u003cp\u003eИезуиты не противостоят властной структуре — они проникают в нее и контролируют ее. Внедряя своих агентов в каждое учреждение, включая те, которые осуществляют евгенику под другими именами, они обеспечивают, что власть течет через каналы, которые они контролируют, независимо от морального характера выполняемой работы.\u003c/p\u003e\n\u003ch3 id=\"молчание-ватикана\"\u003eМолчание Ватикана\u003c/h3\u003e\n\u003cp\u003eРеакция Ватикана на евгеническое движение была заметно приглушенной. В то время как отдельные католические епископы выступали против принудительной стерилизации, институциональная Церковь — все больше контролируемая орденом иезуитов — не проводила устойчивую кампанию против евгеники. Энциклика Ватикана Casti Connubii 1930 года осудила евгенику в принципе, но на практике католические больницы и учреждения участвовали в медицинской системе, которая проводила евгеническую политику.\u003c/p\u003e\n\u003cp\u003eОтравление Папы Климента XIV после попытки подавить иезуитов в 1773 году демонстрирует цену противостояния ордену. Ватикан усвоил урок: приспособьтесь к иезуитам или заплатите цену.\u003c/p\u003e\n\u003ch2 id=\"духовная-реальность\"\u003eДуховная реальность\u003c/h2\u003e\n\u003ch3 id=\"играть-в-бога\"\u003eИграть в Бога\u003c/h3\u003e\n\u003cp\u003eЕвгеническое движение в своей основе является духовным восстанием против Бога. Оно предполагает, что люди имеют право определять, кто годен жить и размножаться — право, которое принадлежит только Богу. Оно обращается с людьми как с животными, которых нужно разводить, выбраковывать и контролировать — отрицая божественную искру, которая делает каждую человеческую жизнь священной.\u003c/p\u003e\n\u003cp\u003eГоварду Питтману было показано, что демоническая иерархия организована вокруг кражи душ. Евгеническое движение нацелено на тело — но при этом оно нацелено на храм души. Когда вы принудительно стерилизуете женщину, вы не просто изменяете ее тело — вы нарушаете ее божественное предназначение. Когда вы вскрываете человеческое тело ради прибыли, вы не просто режете плоть — вы оскверняете творение Бога.\u003c/p\u003e\n\u003cp\u003eПоказатель неудач 97,5%, который был показан Питтману, отражает мир, в котором подавляющее большинство людей передали свою моральную власть учреждениям, которые рассматривают их как товары. Фермы для разведения Рокфеллеров не были отклонением — они были логическим выражением мировоззрения, которое заменило Бога человеком, поклонение управлением, а любовь полезностью.\u003c/p\u003e\n\u003ch3 id=\"путь-вперед\"\u003eПуть вперед\u003c/h3\u003e\n\u003cp\u003eПонимания этой истории недостаточно. Мы также должны понимать, что силы, стоящие за ней, все еще активны. Евгеническое движение не закончилось — оно трансформировалось. Генная инженерия, технология CRISPR, мРНК-платформы и трансгуманистическая идеология — это современные выражения того же импульса: переделать творение Бога в соответствии со спецификациями человека.\u003c/p\u003e\n\u003cp\u003eЗащита от этого зла такая же, как и всегда: вера в Творца, благоговение перед Его замыслом и мужество сопротивляться учреждениям, которые заявляют власть над человеческой жизнью, принадлежащую только Богу.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследования по евгенике Рокфеллеров и истории медицинской системы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство НДЕ Говарда Питтмана\u003c/a\u003e — духовная война и демоническая иерархия\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические тайны: Разоблачение достойных порицания секретов иезуитов\u003c/a\u003e — иезуитское проникновение и институциональный контроль\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицина и Фармакея — Колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eЭдвин Блэк, \u003cem\u003eВойна против слабых: Евгеника и американская кампания по созданию высшей расы\u003c/em\u003e\u003c/li\u003e\n\u003cli\u003eАрхивы лаборатории Колд-Спринг-Харбор — документы Бюро евгенических записей\u003c/li\u003e\n\u003cli\u003eБак против Белла, 274 U.S. 200 (1927)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eМедицина Рокфеллера\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eВакцина зверя\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/61-Synthetic_Biology.mp4\"\u003eСинтетическая биология\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eПадшие ангелы\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/117-The_Burning_of_Sin.mp4\"\u003eСожжение греха\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/making-murderers-vivisection-schools/?lang=ru\"\u003eСоздание убийц: Секретные программы вивисекции в государственных школах\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/big-pharma-bloodlust-torture/?lang=ru\"\u003eЖАЖДА КРОВИ Big Pharma: Скрытая история медицинских пыток\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/blood-money-secrets-blood-donation/?lang=ru\"\u003eКровавые деньги: Темные тайны донорства крови\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eРокфеллеры построили не медицинскую систему — они построили систему управления людьми. Залы для вскрытия и фермы для разведения были не отклонениями, а особенностями. Ваше тело никогда не было их собственностью, а ваша кровная линия никогда не была их проектом. Вы принадлежите Богу. Помните об этом, и они потеряют власть над вами.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\
