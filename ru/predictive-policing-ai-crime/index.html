e\n\u003cp\u003eТолько Бог знает сердце. Только Бог может видеть намерения, захороненные под поверхностью человеческого действия, скрытые от каждой камеры, каждого алгоритма, каждого запроса базы данных. Это не просто теологическое заявление — это основополагающая граница между авторитетом Творца и достижением творения. Суд сердца, суд перед деянием, суд того, что человек \u003cem\u003eможет\u003c/em\u003e делать — это исключительная прерогатива Всемогущего, единственного Кто может взвешивать намерение и мотив с совершенной справедливостью и совершенным состраданием одновременно.\u003c/p\u003e\n\u003cp\u003eИскусственный интеллект претендует на эту прерогативу теперь. Системы прогнозирующей полиции, работающие в городах по всему земному шару, утверждают способность определить, кто совершит преступление до того, как будет совершено какое-либо преступление. Они претендуют видеть сердце через данные. Они претендуют судить будущее через алгоритмическую вероятность. Они претендуют на божественную прерогативу — и они упражняют ее без божественной мудрости, божественного состояния или божественной подотчетности.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/17-The_Cherub_at_the_Gate.mp4\"\u003eThe Cherub at the Gate\u003c/a\u003e изображает, после падения Бог поставил херувима и пламенный меч у ворот Эдема — суд у ворот, охраняющий порог между священным и мирским. Этот суд был только Бога. Теперь алгоритмы стоят у ворот современных городов, решая, кто может пройти и кто отмечен, кто свободен и кто подозревается — не по тому, что они сделали, но по тому, что машина рассчитывает, что они \u003cem\u003eмогут\u003c/em\u003e делать.\u003c/p\u003e\n\u003cp\u003eЭто дух до-преступления. И он работает сегодня.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-предсказательная-полиция\"\u003eЧто такое предсказательная полиция?\u003c/h2\u003e\n\u003cp\u003eПрогнозирующая полиция — это применение статистических и машинных алгоритмов обучения к полицейским данным — записи об арестах, доклады о преступлениях, географическое картирование, видеоленты наблюдения, деятельность в социальных сетях и демографическая информация — для прогноза, где произойдут преступления и, все больше, кто их совершит.\u003c/p\u003e\n\u003cp\u003eКонцепция раскол на два ветви:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПрогноз на основе места\u003c/strong\u003e целевые географические области. Алгоритмы определяют \"горячие точки\" — кварталы, перекрестки, кварталы — где преступление статистически вероятно произойти в заданный временной интервал. Полицейские ресурсы затем развертываются в эти места до того, как произойдет какое-либо преступление.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПрогноз на основе человека\u003c/strong\u003e целевые люди. Алгоритмы присваивают риск-баллы конкретным людям на основе их истории, связей, данных местоположения, поведения в социальных сетях и других факторов, отмечая их как вероятный совершить — или быть жертвой — будущих преступлений.\u003c/p\u003e\n\u003cp\u003eОбе ветви действуют. Обе финансируются налогоплательщиком. Обе переделывают правоохранительную деятельность по всему Западному миру и за его пределами.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"от-филипа-к-дика-к-реальности-концепция-до-преступления\"\u003eОт Филипа К. Дика к реальности: концепция до-преступления\u003c/h2\u003e\n\u003cp\u003eВ 1956 году Филип К. Дик опубликовал \"Отчет о меньшинстве\", рассказ, устанавливающийся в будущем, где три мутантных \"предсказания\" предвидят преступления до их совершения, позволяя \"до-преступной\" дивизии арестовать и заключить людей в тюрьму за убийства, которые они не совершили. Стивен Спилберг адаптировал историю в фильм 2002 года \u003cem\u003eMinority Report\u003c/em\u003e, звездящего Тома Круза, который изображал светлую антиутопию, где наблюдается каждый гражданин и до-преступные аресты рутинны.\u003c/p\u003e\n\u003cp\u003eИстория Дика была предупреждением. Фильм был предостерегающей сказкой. Но архитекторы предсказательного полицейского наблюдения смотрели на него как на инструкцию.\u003c/p\u003e\n\u003cp\u003eВ 2006 году, всего четыре года после выпуска фильма, Министерство внутренней безопасности запустило свою программу \"Future Attribute Screening Technology\" (FAST) — систему, разработанную для обнаружения \"враждебного намерения\" в человеках на аэропортах, пограничных переходах и публичных событиях, контролируя физиологические показатели: сердечный ритм, температура кожи, движение глаз, язык тела. FAST был экранированием до-преступления во всем, кроме имени.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство ближайшего смертельного опыта Говарда Питтмана — предупреждение об Конце времени, которое Бог дал ему\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: выявленные позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может находиться в подвале Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/157-Palantir_Panopticon.mp4\"\u003ePalantir Panopticon\u003c/a\u003e — Вседидящий аппарат наблюдения, построенный Силиконовой долиной и разведывательным сообществом\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/49-Smart_City_Prison-Surveillance_Grid_Complete.mp4\"\u003eSmart City Prison\u003c/a\u003e — Цифровые стены, закрывающиеся в городах будущего\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/45-One_Code_Word-AI_Turns_Evil.mp4\"\u003eOne Code Word\u003c/a\u003e — Когда одна команда может отключить все, что у вас есть\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/17-The_Cherub_at_the_Gate.mp4\"\u003eThe Cherub at the Gate\u003c/a\u003e — Суд у ворот: только Бог стоит как привратник между священным и мирским\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eТолько Бог ищет сердце. Только Бог судит перед деянием с совершенным знанием и совершенным состраданием. Когда алгоритм претендует на этот авторитет, он не становится Богом — он становится идолом. И система, которая поклоняется алгоритмическому суду, которая строит свою безопасность на до-преступных предсказаниях машины, откроет, что каждый строитель Вавилона в конечном итоге открывает: то, что они построили, чтобы достичь рая, только взяло их дальше от него.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/technology/\",\"className\":\"category-badge\",\"childre
