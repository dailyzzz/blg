03eБог написал исходный код человечества. Он создал каждую пару нуклеотидов, каждую спираль ДНК, каждую генетическую инструкцию, которая строит человеческое существо из единственной оплодотворённой клетки в тело, состоящее из 37 триллионов координированных клеток — каждая несущая полную копию оригинальной рукописи. ДНК не случайна. По любому честному анализу это наиболее сложная информационная система когда-либо встреченная — язык, написанный четырьмя химическими буквами (A, T, G, C), который кодирует полный чертеж живого человеческого существа.\u003c/p\u003e\n\u003cp\u003eCRISPR-Cas9 позволяет учёным открыть эту рукопись и переписать её.\u003c/p\u003e\n\u003cp\u003eПреступление в Саду Эдема не было просто поеданием плода. Это было стремление к знанию, превосходящему человеческий авторитет — захват того, что принадлежит только Богу. Как рассказывает трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eThe Transgression\u003c/a\u003e, этот образец превышения границ — оригинальный грех, воплощённый в каждом поколении. В Эдеме человечество тянулось к Древу Знания. Сегодня человечество тянется в сам геном — язык, который Бог использовал, чтобы говорить нам в существование — и предполагает редактировать работу Автора.\u003c/p\u003e\n\u003cp\u003eПлод изменился. Преступление не изменилось.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-crispr-cas9\"\u003eЧто такое CRISPR-Cas9?\u003c/h2\u003e\n\u003cp\u003eCRISPR расшифровывается как \u003cstrong\u003eClustered Regularly Interspaced Short Palindromic Repeats\u003c/strong\u003e — естественная система защиты от иммунитета, найденная в бактериях. Когда вирус атакует бактерию, бактерия захватывает небольшой кусок вирусной ДНК и хранит его в собственном геноме как молекулярное \"фото преступника\". Если тот же вирус атакует снова, бактерия производит направляющую РНК, которая соответствует хранящейся последовательности и направляет белок Cas9 — молекулярные ножницы — найти и вырезать соответствующую вирусную ДНК, уничтожая захватчика.\u003c/p\u003e\n\u003cp\u003eВ 2012 году Дженнифер Дудна и Эммануэль Шарпентье опубликовали знаковую статью, демонстрирующую, что эта бактериальная система защиты могла быть перепрограммирована. Разработав пользовательскую направляющую РНК, учёные могли направить белок Cas9 вырезать любую последовательность ДНК в любом организме — включая человеческие существа. Естественные механизмы восстановления клетки затем либо отключали вырезанный ген, либо, если предоставлен шаблон, вставляли новый генетический материал в место разреза.\u003c/p\u003e\n\u003cp\u003eПоследствия были немедленными и ошеломляющими:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВырезать болезнь-вызывающий ген\u003c/strong\u003e — удалить генетическую мутацию, которая вызывает серповидноклеточную болезнь, кистозный фиброз или болезнь Хантингтона\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВставить новый ген\u003c/strong\u003e — добавить генетические инструкции, которые организм первоначально не нёс\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМодифицировать существующий ген\u003c/strong\u003e — изменить конкретные буквы генетического кода, чтобы изменить функцию гена\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗаглушить ген\u003c/strong\u003e — отключить ген без удаления, выключив его как переключатель\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eДудна и Шарпентье получили Нобелевскую премию по химии в 2020 году. Меньше внимания было уделено признанию самой Дудны, что у неё были кошмары о технологии. В своей книге \u003cem\u003eA Crack in Creation\u003c/em\u003e она описала, как видела во сне, что её спросил Адольф Гитлер, чтобы объяснить CRISPR — кошмар, который преследовал её, потому что она понимала, возможно, лучше, чем кто-либо, евгенический потенциал того, что она выпустила.\u003c/p\u003e\n\u003cp\u003eОна была права, чтобы иметь кошмары.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"он-цзянькуй-и-crispr-дети\"\u003eОн Цзянькуй и CRISPR Дети\u003c/h2\u003e\n\u003cp\u003e25 ноября 2018 года китайский биофизик Хе Цзянькуй потрясил мир, объявив, что использовал CRISPR-Cas9 для редактирования эмбрионов двух девочек-близнецов — Лулу и Наны — перед их имплантацией в матку матери. Дети родились с модифицированными генами CCR5, изменение, которое Хе утверждал, сделает их устойчивыми к заражению ВИЧ.\u003c/p\u003e\n\u003cp\u003eМеждународное научное сообщество взорвалось возмущением. Хе Цзянькуй был приговорён к трём годам китайской тюрьмы за \"незаконную медицинскую практику\". Но возмущение скрыло несколько критических истин:\u003c/p\u003e\n\u003ch3 id=\"что-скрывало-возмущение\"\u003eЧто скрывало возмущение\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eХе Цзянькуй не работал в одиночку.\u003c/strong\u003e У него были связи с исследователями Стэнфордского университета и Райсского университета. Майкл Дим, профессор Райса, присутствовал во время процесса информированного согласия с родителями. Идея, что это был одинокий плохой учёный, действующий изолировано, — удобный вымысел.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eТехнология сработала.\u003c/strong\u003e Дети родились живы и, судя по сообщениям, здоровы. Какие бы этические линии ни пересекались, эксперимент продемонстрировал, что редактирование человеческой зародышевой линии — изменение ДНК, которая будет передана всем будущим поколениям — технически осуществимо прямо сейчас.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eТретий отредактированный CRISPR ребёнок родился в 2019 году.\u003c/strong\u003e Менее публичный, чем близнецы, третий ребёнок из отдельной беременности также родился с отредактированными генами. Мир едва заметил.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eВозмущение было о внешности, а не оппозиции.\u003c/strong\u003e Научное учреждение не осуждало \u003cem\u003eконцепцию\u003c/em\u003e редактирования человеческих эмбрионов — только преждевременное, несанкционированное исполнение. Несколько национальных академий и ВОЗ впоследствии опубликовали основы того, как редактирование зародышевой линии \u003cem\u003eдолжно\u003c/em\u003e быть сделано, а не аргументы о том, почему это \u003cem\u003eне должно\u003c/em\u003e быть сделано. Дверь, которую открыл Хе Цзянькуй, была никогда не закрыта. Она была институционализирована.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eБлизнецы, Лулу и Нана, живы сегодня — первые генетически инженерные человеческие существа в зарегистрированной истории. Их отредактированная ДНК будет унаследована их детьми и детьми их детей. Линия была пересечена, которая не может быть пересечена обратно.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"редактирование-зародышевой-линии-vs-редактирование-соматических-клеток-критическое-различие\"\u003eРедактирование зародышевой линии vs. редактирование соматических клеток: критическое различие\u003c/h2\u003e\n\u003cp\u003eЕсть два принципиально разных типа редактирования генов, и понимание различия является существенным для понимания ставок.\u003c/p\u003e\n\u003ch3 id=\"редактирование-соматических-клеток\"\u003eРедактирование соматических клеток\u003c/h3\u003e\n\u003cp\u003eРедактирование соматических генов изменяет ДНК в неотдельных клетках — клетках тела, которые не являются яйцами или спермой. Изменения, внесённые в соматические клетки, влияют только на отдельного пациента. Когда этот пациент умирает, генетические модификации умирают с ними.\u003c/p\u003e\n\u003cp\u003eЭто тип редактирования генов, в настоящее время используемый в клинических испытаниях для заболеваний, таких как серповидноклеточная болезнь (Casgevy, одобрено FDA в декабре 2023), определённые раки (CAR-T терапия) и унаследованная слепота. Это подлинные медицинские процедуры, и они представляют наиболее защищаемое применение CRISPR.\u003c/p\u003e\n\u003ch3 id=\"редактирование-зародышевой-линии\"\u003eРедактирование зародышевой линии\u003c/h3\u003e\n\u003cp\u003eРедактирование зародышевой линии изменяет ДНК в репродуктивных клетках — яйца, сперма или эмбрионы. Изменения, внесённые в зародышевую линию, постоянны и наследуемы. Каждый потомок отредактированного человека будет нести модификацию, потенциально навсегда.\u003c/p\u003e\n\u003cp\u003eЭто то, что сделал Хе Цзянькуй. Это то, к чему в конечном итоге стремится движение трансгуманизма. И это то, где библейские последствия становятся неизбежны.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И сотворил Бог человека по образу Своему, по образу Божию сотворил его; мужчину и женщину сотворил их.\" — Бытие 1:27\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eРедактирование зародышевой линии не просто лечит больного человека. Это переписывает шаблон. Это изменяет образ Бога, как кодируется в человеческом геноме — не для одного человека, а для всех потомков этого человека. Это в самом буквальном смысле редактирование работы Бога и создание этого редактирования постоянным.\u003c/p\u003e\n\u003cp\u003eРазличие между редактированием соматических клеток и редактированием зародышевой линии — это различие между лечением больного и переделкой человечества. Первое — это медицина. Второе — преступление.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"военные-приложения-программа-darpa-safe-genes\"\u003eВоенные приложения: программа DARPA Safe Genes\u003c/h2\u003e\n\u003cp\u003eЕсли редактирование генов было только о лечении болезней, Пентагон не имел бы интереса. Но DARPA — Агентство проектов оборонных передовых исследований — запустило программу \u003cstrong\u003eSafe Genes\u003c/strong\u003e в 2017 году, инвестируя 65 миллионов долларов в исследование редактирования генов в семи исследовательских командах.\u003c/p\u003e\n\u003cp\u003eЗаявленные цели Safe Genes включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eРазработка инструментов для контроля и обратного развития редактирования генов\u003c/strong\u003e — якобы для защиты от случайного или преднамеренного неправильного использования редактирования генов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоздание \"генетических противомер\"\u003c/strong\u003e для защиты от биологического оружия, которое использует технологию редактирования генов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИзучение приводов генов\u003c/strong\u003e — саморазмножающиеся генетические модификации, которые могут распространяться через всю дикую популяцию\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eНо, как документирует наша статья о \u003ca href=\"/darpa-dark-winter-military-origins/?lang=ru\"\u003eDARPA's Dark Winter\u003c/a\u003e, публичные оправдания DARPA всегда — это оборонительный фрейм для наступательных возможностей. Агентство, которое создало интернет, GPS и платформу технологии мРНК, не тратит десятки миллионов долларов на технологию исключительно в оборонительных целях.\u003c/p\u003e\n\u003cp\u003eВоенные последствия редактирования генов глубоки:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшенные солдаты\u003c/strong\u003e — CRISPR теоретически мог бы модифицировать солдат для повышения выносливости, устойчивости к боли, ускоренного заживления или устойчивости к биологическому и химическому оружию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭтнические биооружия\u003c/strong\u003e — как исследуется в нашей статье о \u003ca href=\"/bioweapons-gain-of-function/?lang=ru\"\u003eBioweapons and Gain-of-Function\u003c/a\u003e, редактирование генов может использоваться для создания патогенов, которые нацелены на конкретные этнические группы, основываясь на генетических маркерах. Сбор ВВС русских образцов ДНК, раскрытый в 2017 году, поднял сигналы тревоги об именно этой возможности\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПриводы генов как оружие\u003c/strong\u003e — привод генов теоретически мог быть выпущен, чтобы распространить вредную модификацию через продовольственное снабжение целевой популяции или векторы болезней\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eДокумент неоконсервативного аналитического центра от 2000 года \"Rebuilding America's Defenses\" от Project for the New American Century (PNAC) явно заявил, что \"продвинутые формы биологической войны, которые могут 'нацеливать' конкретные генотипы, могут преобразовать биологическую войну из области террора в политически полезный инструмент\". Это было написано два года до характеристики CRISPR и более чем за десятилетие до его разработки как инструмента редактирования. Намерение предшествовало технологии.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"евгеника-переделанная-от-насильственной-стерилизации-к-генетическому-совершенствованию\"\u003eЕвгеника, переделанная: От насильственной стерилизации к \"генетическому совершенствованию\"\u003c/h2\u003e\n\u003cp\u003eСлово \u003cem\u003eевгеника\u003c/em\u003e происходит от греческого \u003cem\u003eeugenes\u003c/em\u003e, означающего \"хорошо рождённый\". Движение евгеники в начале двадцатого века стремилось улучшить человеческую расу через селективное разведение — поощрение воспроизводства среди тех, кто считался генетически \"подходящим\" и его предотвращение среди тех, кто считался \"неподходящим\".\u003c/p\u003e\n\u003cp\u003eЭто не было маргинальным движением. Это была основная наука, поддерживаемая Институтом Карнеги, Rockefeller Foundation и ведущими университетами, включая Гарвард, Принстон и Стэнфорд. Соединённые Штаты насильственно стерилизовали более 60 000 американцев в соответствии с законами евгеники — практика, которая продолжалась до 1970-х годов. Программа евгеники нацистской Германии, которая кульминировалась в Холокосте, была прямо вдохновлена и смоделирована по американскому движению евгеники. Rockefeller Foundation финансировала Институт кайзера Вильгельма в Германии, где наставник Йозефа Менгеле, Отмар Фрейхер фон Фершуэр, проводил исследование расовой генетики.\u003c/p\u003e\n\u003cp\u003eПосле Второй мировой войны евгеника стала политически ядовитой. Слово исчезло из вежливого научного дискурса. Но идея никогда не умирала. Она просто изменила свой словарь:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЕвгеника\u003c/strong\u003e стала \u003cstrong\u003e\"генетическим консультированием\"\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСелективное разведение\u003c/strong\u003e стало \u003cstrong\u003e\"вспомогательной репродуктивной технологией\"\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстранение неподходящих\u003c/strong\u003e стало \u003cstrong\u003e\"предимплантационным генетическим диагностированием\"\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРасовое совершенствование\u003c/strong\u003e стало \u003cstrong\u003e\"генетическим совершенствованием\"\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГосподствующая раса\u003c/strong\u003e стала \u003cstrong\u003e\"дизайнерскими детьми\"\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCRISPR дал движению евгеники инструмент, который он ждал столетие, чтобы приобрести — возможность прямого редактирования человеческого генома, а не полаганию на медленный, ненадёжный процесс селективного разведения. Как задокументировано в нашей статье о \u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eRockefeller Medicine\u003c/a\u003e, то же самое институциональное происхождение, которое финансировало насильственную стерилизацию в 1920-х годах, теперь финансирует исследование генетического инженеринга в 2020-х годах.\u003c/p\u003e\n\u003cp\u003eУпаковка изменилась. Повестка дня не изменилась.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"трансгуманистская-связь\"\u003eТрансгуманистская связь\u003c/h2\u003e\n\u003cp\u003eТрансгуманизм — движение за трансцендентность биологических человеческих ограничений через технологию — видит CRISPR как один столп своей трансформационной повестки дня. Как исследуется в деталях в нашей статье о \u003ca href=\"/transhumanism-digital-evolution/?lang=ru\"\u003eTranshumanism: The Digital Evolution They Have Planned\u003c/a\u003e, трансгуманистическое видение включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eГенетическое совершенствование\u003c/strong\u003e через CRISPR — редактирование болезней, старения и в конечном итоге всех \"нежелательных\" признаков\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНеврологическое дополнение\u003c/strong\u003e через интерфейсы мозг-компьютер, такие как \u003ca href=\"/neuralink-merge-man-machine/?lang=ru\"\u003eNeuralink\u003c/a\u003e — слияние человеческого познания с искусственным интеллектом\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСинтетическая биология\u003c/strong\u003e — как подробно описано в \u003ca href=\"/synthetic-biology-rewriting-life/?lang=ru\"\u003eSynthetic Biology: Rewriting Life\u003c/a\u003e, создание полностью новых форм жизни с нуля\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЦифровое сознание\u003c/strong\u003e — загрузка человеческого ума на цифровые субстраты\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCRISPR занимает уникальную позицию в этой повестке дня, потому что он изменяет биологический фундамент, на котором строятся все остальные трансгуманистические технологии. Интерфейс мозг-компьютер подключается к биологическому мозгу. Генетическое инженеринг изменяет то, из чего этот мозг состоит, на самом фундаментальном уровне.\u003c/p\u003e\n\u003cp\u003eВсемирный экономический форум, который чемпионирует \"четвёртую промышленную революцию\", явно описал редактирование генов как ключевую технологию в его видении будущего. Клаус Шваб писал о \"слиянии технологий по физическим, цифровым и биологическим доменам\". CRISPR — это вклад биологического домена в это слияние.\u003c/p\u003e\n\u003cp\u003eТрансгуманист Джулиан Хаксли — брат Олдоса Хаксли, который написал \u003cem\u003eBrave New World\u003c/em\u003e — придумал термин \"трансгуманизм\" в 1957 году. Он был также первым генеральным директором ЮНЕСКО и президентом Британского общества евгеники. Генеалогия трансгуманизма и евгеники — это не просто идеологическая — это буквальная.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"сельскохозяйственное-редактирование-генов-другой-рубеж\"\u003eСельскохозяйственное редактирование генов: другой рубеж\u003c/h2\u003e\n\u003cp\u003eПока публичные дебаты сосредоточены на редактировании человеческих генов, тихая революция уже идёт хорошо в сельском хозяйстве.\u003c/p\u003e\n\u003ch3 id=\"приводы-генов\"\u003eПриводы генов\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eПривод генов\u003c/strong\u003e — это генетическая модификация, предназначенная для распространения через всю дикую популяцию. В отличие от нормального наследования, где ген имеет 50% шанс быть переданным потомству, привод генов копирует себя на обе хромосомы, гарантируя почти 100% наследование. Выпущенные в дикую природу, привод генов теоретически может изменить или устранить всю видов в течение нескольких поколений.\u003c/p\u003e\n\u003cp\u003eПриложения в настоящее время находятся в разработке включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУстранение комаров, несущих малярию\u003c/strong\u003e путём распространения гена, который вызывает бесплодие у самок, через популяции комаров Anopheles (проект Target Malaria, финансируемый Фондом Билла и Мелинды Гейтс)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстранение инвазивных видов\u003c/strong\u003e — инициатива Новой Зеландии \"Predator Free 2050\" исследовала приводы генов для уничтожения крыс и сумок\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМодификация сельскохозяйственных вредителей\u003c/strong\u003e — разрушение популяций вредителей распространением бесплодия или генов уязвимости\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭкологические последствия почти непостижимы. Устранение или фундаментальное изменение целой видов — даже вида комаров — каскадируется через каждую пищевую сеть, в которую эта видов участвует. Организмы, которые едят комаров, организмы, которые едят эти организмы, и так далее, все были бы затронуты способами, которые никакая модель не может предсказать.\u003c/p\u003e\n\u003ch3 id=\"культуры-отредактированные-crispr\"\u003eКультуры, отредактированные CRISPR\u003c/h3\u003e\n\u003cp\u003eКультуры, отредактированные генетически, уже в продовольственном снабжении. В отличие от традиционных ГМО (которые вставляют гены от других видов), культуры, отредактированные CRISPR, изменяют существующие гены в собственном геноме растения. Это различие позволило культурам, отредактированным генами, в основном обойти регуляторные основы, которые применяются к традиционным ГМО:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUSDA\u003c/strong\u003e выступил в 2018 году, что культуры, отредактированные генами, с удалениями (гены удалены или отключены) не требуют той же регуляции, как трансгенные ГМО\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЯпония\u003c/strong\u003e одобрила помидоры, отредактированные CRISPR, с улучшенным содержанием GABA для коммерческого продажи в 2021 году\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗакон о технологии генетики Великобритании 2023 года\u003c/strong\u003e явно освободил организмы, отредактированные генами, от регуляций ГМО\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eРегуляторный трюк иллюзиониста элегантен: переопределяя организмы, отредактированные генами, как отличные от генетически модифицированных организмов, правительства создали путь для отредактированных продуктов питания на рынок без маркировки, без долгосрочных исследований безопасности и без информированного согласия потребителей.\u003c/p\u003e\n\u003cp\u003eКак исследуется в нашей статье о \u003ca href=\"/seed-vault-control-food-future/?lang=ru\"\u003eSeed Vault: Control the Food Future\u003c/a\u003e, тот, кто контролирует генетический код продовольственного снабжения, контролирует продовольственное снабжение само. CRISPR делает этот контроль молекулярным.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"скользящий-уклон-не-является-ошибкой\"\u003eСкользящий уклон не является ошибкой\u003c/h2\u003e\n\u003cp\u003eКритики отклоняют озабоченность о дизайнерских детях и генетическом совершенствовании как \"ошибки скользящего уклона\". Но уклон не гипотетичен — он уже спускается, один тщательно оправданный шаг за раз.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 1: Лечение страшных болезней.\u003c/strong\u003e Никто не возражает против лечения серповидноклеточной болезни, кистозного фиброза или болезни Хантингтона. Это сострадательная точка входа — дверь, которая открывает все остальные двери.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 2: Предотвращение генетических болезней в эмбрионах.\u003c/strong\u003e Если мы можем лечить болезнь у живого пациента, почему не предотвращать это в эмбрионе? Предимплантационное генетическое диагностирование уже выбирает эмбрионы. CRISPR идёт дальше — редактируя их.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 3: Устранение предрасположенностей.\u003c/strong\u003e Почему остановиться на гарантированных болезнях? Почему не редактировать гены, связанные с повышенным риском рака, болезней сердца или болезни Альцгеймера? Граница между \"геном болезни\" и \"фактором риска\" растворяется.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 4: Улучшение нормальных признаков.\u003c/strong\u003e Если мы можем устранить гены болезни, мы также можем модифицировать гены для высоты, интеллекта, спортивных способностей или внешнего вида. Как только редактирование нормализируется для здоровья, та же технология — тот же белок Cas9, то же направляющее РНК — может быть перенаправлена на совершенствование.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eШаг 5: Создание оптимизированных людей.\u003c/strong\u003e Логический конечный пункт генетического совершенствования — это разработанный человек — человек, чей геном был всесторонне отредактирован для максимальной производительности. Это не научная фантастика. Техническая возможность собирается прямо сейчас. Только этические ограничения держат это, и эти ограничения систематически разрушаются.\u003c/p\u003e\n\u003cp\u003eКаждый шаг представлен как небольшое, разумное расширение предыдущего шага. Каждый шаг защищается на его собственные достоинства. Но совокупная траектория ведёт от лечения больного к проектированию видов — от медицины к евгенике, от исцеления к игре Бога.\u003c/p\u003e\n\u003cp\u003eЭто не ошибка. Это стратегия. И она работает.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейская-основа-редактирование-образа-бога\"\u003eБиблейская основа: редактирование образа Бога\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И сотворил Бог человека по образу Своему, по образу Божию сотворил его; мужчину и женщину сотворил их.\" — Бытие 1:27\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБиблия представляет людей как целенаправленные творения, созданные в образе Бога — \u003cem\u003eImago Dei\u003c/em\u003e. Это не просто теологическая абстракция. Это, согласно Писанию, определяющая характеристика человечества. Каждое человеческое существо несёт образ Творца в самом своём существе.\u003c/p\u003e\n\u003cp\u003eЕсли Бог кодировал этот образ в человеческий геном — если наша ДНК — это язык, на котором \u003cem\u003eImago Dei\u003c/em\u003e написана на биологическом уровне — то редактирование человеческого генома редактирует образ Бога.\u003c/p\u003e\n\u003cp\u003eЭто почему редактирование генов представляет категорию преступления, которая выходит за пределы других технологий. Компьютер совершенствует то, что люди \u003cem\u003eмогут делать\u003c/em\u003e. Протезная конечность совершенствует то, что человеческое тело \u003cem\u003eможет достичь\u003c/em\u003e. Но CRISPR изменяет, что человек \u003cem\u003eявляется\u003c/em\u003e — на самом фундаментальном уровне, в самом языке биологического творения.\u003c/p\u003e\n\u003cp\u003eОбразец повторяется сквозь Писание:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eБытие 3\u003c/strong\u003e — Человечество тянется к Древу Знания, стремясь \"быть как Бог, знающие добро и зло\". Следствие — изгнание из Рая.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБытие 6\u003c/strong\u003e — Наблюдатели, как описано в Книге Еноха и упоминается в Бытии, развращали человеческую генетику через запретный союз, производя Нефилимов. Ответ Бога был Потопом — уничтожением всей развращённой плоти. Как исследуется в нашей статье о \u003ca href=\"/fallen-angels-book-of-enoch/?lang=ru\"\u003eFallen Angels and the Book of Enoch\u003c/a\u003e, развращение человеческого генома было специфическим провокационным действием, требовавшим божественного суда.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБытие 11\u003c/strong\u003e — Человечество строит Башню Вавилонскую, объединённый технологический проект, чтобы \"достичь небеса\". Бог рассеивает их и путает их языки.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДан 2:43\u003c/strong\u003e — \"Будут ссоров меж собою в семене человеческом\" — криптический стих в пророчестве финального царства, который многие учёные интерпретируют как смешивание человеческого и не-человеческого генетического материала.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПаттерн последователен: когда человечество пытается изменить собственную природу или трансцендировать границы, установленные Богом, следует божественный суд. CRISPR представляет наиболее буквальную версию этого преступления в человеческой истории — прямое редактирование биологического кода, который Бог создал.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eПонять различие.\u003c/strong\u003e Соматическая генная терапия для лечения болезни у живого пациента категорически отличается от редактирования зародышевой линии, которое постоянно изменяет человеческий геном. Поддерживайте первое с разборчивостью. Противостойте второму с убеждением.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТребуйте прозрачность.\u003c/strong\u003e Культуры, отредактированные генами, входят на рынок без маркировки. Требуйте право знать, что было отредактировано в еде, которой вы кормите свою семью.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОтклоните переименование.\u003c/strong\u003e Когда вы слышите \"генетическое совершенствование\", признайте это как евгенику в новой одежде. Те же учреждения, та же идеология, то же назначение.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОхраняйте образ.\u003c/strong\u003e Бытие 1:27 — не поэзия. Это объявление того, что такое человечество. Редактирование этого образа — не прогресс — это преступление.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбучайте своих детей.\u003c/strong\u003e Эта технология будет нормализирована в их жизнях. Гарантируйте, что они понимают различие между исцелением и переделкой, между медициной и игрой Творца.\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003 arvesting.mp4\"\u003eStem Cell Harvesting\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/108-Stem_Cell_Harvesting-Alt.mp4\"\u003eStem Cell Harvesting (Alt)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучи-дальше\"\u003eИзучи дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/synthetic-biology-rewriting-life/?lang=ru\"\u003eSynthetic Biology: Rewriting Life\u003c/a\u003e — Как синтетическая биология создаёт полностью новые организмы и переписывает код существующих\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/transhumanism-digital-evolution/?lang=ru\"\u003eTranshumanism: The Digital Evolution They Have Planned\u003c/a\u003e — Полная идеология, управляющая слиянием биологии и технологии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/bioweapons-gain-of-function/?lang=ru\"\u003eBioweapons and Gain-of-Function\u003c/a\u003e — Оружизация биологических исследований и опасное пересечение редактирования генов и биологической войны\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/depopulation-agenda-documents/?lang=ru\"\u003eDepopulation Agenda: The Documents They Published\u003c/a\u003e — Институциональные планы по сокращению глобального населения и технологии, которые их делают возможными\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eБог написал человечество на языке четырёх букв — A, T, G, C — и объявил Его работу \"дивно устроен\". Теперь учёные держат молекулярные ножницы к этой рукописи, обещая исправить её \"ошибки\" и улучшить её дизайн. Но Автор жизни не делает ошибок. И те, кто предполагает переписать Его работу, должны помнить: каждый раз, когда человечество достигало за тем, что принадлежит только Богу, последствия были катастрофичны. Плод от Дерева Знания выглядел хорошо тоже. Змей обещал это сделает их мудрыми. Хорошо не закончилось тогда. Это не кончится хорошо сейчас.\u003c/em\u003e\u003c/p\u003e"])</s
