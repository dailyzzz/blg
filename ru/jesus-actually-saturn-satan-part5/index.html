света.\"\u003c/em\u003e — 2 Коринфянам 11:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЭто вопрос, который разделит тех, кто ищет истину, от тех, кто защищает комфорт. Это вопрос, на который организованная религия не хочет ответить, что духовенство не будет обращать, что деноминации потратили столетия, чтобы гарантировать никогда не достигает скамьи. Является ли Иисус, поклоняемый в институциональных церквях, Иисусом Писания — или это тщательно сконструированная подделка, фигура Сатурна-Сатаны, одетая в христианский язык?\u003c/p\u003e\n\u003cp\u003eГовард Питтман узнал ответ во время своего близкого опыта смерти. Когда 97,5 процента христиан были отвергнуты, сказано, что они \"никогда не делали меня Господом\", Питтман был показана разрушительная истина: Иисус этих людей поклонялся не Иисусом, который их судил. Они поклонялись версии, фасимиле, продукту учреждения. Питтман свидетельствовал, что 95 процентов служат \"себе\" — и \"себя\" они служат, это \"я\", сформированное системой церкви, а не Писанием.\u003c/p\u003e\n\u003cp\u003eИезуиты построили эту систему. Военная организация Лойолы, wielding napoleonic \"абсолютная мощь\", провела пять столетий, конструируя версию христианства, которая служит Сатурну во время говорения имени Христа. John Adams понял: \"вечное проклятие\" ожидает компанию Лойолы. Tamburini управлял \"всем миром\". И Clement XIV, который осмелился на вызов им, был отравлен.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМаскировка сатаны — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/27-The_Promise_of_Salvation.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eОбещание спасения — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"поддельный-христос\"\u003eПоддельный Христос\u003c/h2\u003e\n\u003ch3 id=\"чему-церкви-учат-в-сравнении-тому-чему-писание-учит\"\u003eЧему церкви учат в сравнении тому, чему Писание учит\u003c/h3\u003e\n\u003cp\u003eИнституциональная церковь представляет Иисуса, который комфортен, безопасен и подтверждающий. Этот Иисус хочет, чтобы вы посещали услуги, платили десятину свой доход, отмечали праздники и доверяли вашему пастору. Этот Иисус выглядит как культура, которая его почитает — европейский в европейских церквях, африканский в африканских церквях, азиатский в азиатских церквях. Этот Иисус продаётся на товарах, сокращен до автомобильных бампер-стикеров и вызывается на футбольных играх.\u003c/p\u003e\n\u003cp\u003eИисус Писания нет ничего из этого. Иисус Писания опрокинул столы в храме. Он назвал религиозных лидеров \"отбелённые гробницы\" и \"сыновья вашего отца дьявола\" (Иоанн 8:44). Он сказал путь к жизни узок и \"немногие найдут его\" (Матфей 7:14). Он требовал отказ семьи, богатства и себя. Он обещал преследование, страдание и смерть тем, кто следовал ему.\u003c/p\u003e\n\u003cp\u003eЭти две фигуры не могут быть одним и тем же человеком. Иисус церкви и Иисус Писания несовместимы. Один из них реален, и другой — конструкция — фигура Сатурна, носящая маску Иисуса.\u003c/p\u003e\n\u003ch3 id=\"бог-солнца-в-святилище\"\u003eБог солнца в святилище\u003c/h3\u003e\n\u003cp\u003eОбразология католической церкви выдаёт её происхождение. Монстранция — золотой сосуд, используемый для отображения освященного хоста — выглядит как солнечный взрыв. Хост сам является круглым диском — солнцем. Масса отмечается в воскресенье — день солнца. Площадь Святого Петра Ватикана включает египетский обелиск (солнечно-фаллический символ) в его центре, окружённую эллипсом, разработанным Bernini, чтобы представить путь солнца.\u003c/p\u003e\n\u003cp\u003eЭто не христианские символы. Это солнечные символы, и солнечный культ неразделим от культа Сатурна. Сатурн и Sol — дополнительные — отец и сын в языческом пантеоне, тёмный и лёгкий аспекты одной и той же космической мощи. Католическая церковь, под администрацией иезуитов, поклоняется обоим одновременно: Сатурну через свою кубическую символику, календарь и иерархию, и Sol через свою образность, архитектуру и литургическое время.\u003c/p\u003e\n\u003cp\u003eИсследование Agent131711 на Substack (agent131711.substack.com) документирует это двойное поклонение в подробности, показывая документ за документом, символ за символом, как исторический Иисус был заменён институциональным Христом — продукт столь же тщательно изготовленный как любой потребительский бренд, и служение той же конечной цели: урожай духовной энергии для субъектов, которые большинство людей верят, не существуют.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eNASA and Space — The Greatest Deception Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Подробный анализ языческих основании институциональной христианства\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — 97,5 процента отказ и различие между институциональным и подлинной верой\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — Иезуитская инфильтрация всех христианских конфессий\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/27-The_Promise_of_Salvation.mp4\"\u003eThe Promise of Salvation\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eThe Serpent's Curse\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/87-From_Darkness_Into_Light.mp4\"\u003eFrom Darkness Into Light\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/83-Ancient_Documents.mp4\"\u003eAncient
