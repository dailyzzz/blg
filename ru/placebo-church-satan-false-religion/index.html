03cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Не всякий, говорящий Мне: \"Господи! Господи!\", войдет в Царство Небесное, но исполняющий волю Отца Моего Небесного. Многие скажут Мне в тот день: \"Господи! Господи! мы ли не пророчествовали Твоим именем? и не Твоим ли именем бесов изгоняли? и не Твоим ли именем многие чудеса творили?\" И тогда объявлю им: \"Я никогда не знал вас; отойдите от Меня, делающие беззаконие\".\"\u003c/em\u003e — Матфей 7:21-23\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЭто самые ужасающие слова во всей Библии. Не потому, что они обращены к атеистам. Не потому, что они адресованы язычникам или ведьмам или открытым врагам Бога. Они обращены к людям, которые называли Иисуса \"Господом\". Люди, которые пророчествовали. Люди, которые изгоняли демонов. Люди, которые творили чудесные дела во Его имя. И Иисус говорит им: \"Я никогда не знал вас\".\u003c/p\u003e\n\u003cp\u003eГовард Питтман — баптистский пастор тридцать пять лет — ему было показано, как именно работает эта обман. Ему было показано механизм. Рецепт. Врач. Пациент. Таблетка. И название таблетки — \"Плацебо\".\u003c/p\u003e\n\u003cp\u003eСатана не боится церкви. Он управляет ей.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"определение-плацебо\"\u003eОпределение плацебо\u003c/h2\u003e\n\u003cp\u003eСловарь Вебстера определяет плацебо как \"лекарство, прописанное больше для психологического облегчения пациента, чем для его фактического воздействия на расстройство.\" Само слово происходит из латыни — \"я буду радовать.\" Плацебо разработано не для исцеления, а чтобы заставить пациента поверить, что он был исцелен. Лекарство является поддельным. Облегчение является реальным — но только в разуме. Болезнь остается. Пациент улыбается. И врач знает правду.\u003c/p\u003e\n\u003cp\u003eГовард Питтман понимал это определение. И когда Бог показал ему, что происходит с церковью — с миллиардами исповедующих христиан по всему миру — слово \"плацебо\" было единственным словом, которое подошло. Не метафорически. Точно.\u003c/p\u003e\n\u003ch3 id=\"рецепт-доктора-сатаны\"\u003eРецепт доктора Сатаны\u003c/h3\u003e\n\u003cp\u003eПредставьте себе кабинет врача. Пациент входит. Он болен — духовно болен, грехом болен, умирает внутри. Он знает, что что-то не так. Он чувствует груз вины, пустоту, страх смерти, расстояние от Бога. Он хочет лекарство. Он отчаянно нуждается в лекарстве.\u003c/p\u003e\n\u003cp\u003eВходит врач.\u003c/p\u003e\n\u003cp\u003eНо этот врач не заинтересован в исцелении пациента. Этот врач имеет одну цель: держать пациента больным, пока делает его верит, что он здоров. И врач зовется Сатана.\u003c/p\u003e\n\u003cp\u003eСатана — \"доктор Сатана\", как его описывает Питтман — осматривает пациента. Он берет заметку о симптомах. Он слушает жалобы. И затем он пишет рецепт. Рецепт выглядит законным. Он приходит на официальной бумаге. Он ссылается на реальные ингредиенты. Он звучит медицинском. Он звучит авторитетно.\u003c/p\u003e\n\u003cp\u003eРецепт гласит: \"Посещение церкви. По воскресеньям утром. Поют гимны. Говорят молитвы. Повторяют символы веры. Принимают Иисуса как Спасителя. Крестятся. Присоединяются к изучению Библии. Преподают в воскресной школе. Дают десятину. Добровольно. Рассказывают другим, что вы рожден заново\".\u003c/p\u003e\n\u003cp\u003eПациент заполняет рецепт. Он берет таблетку. И таблетка работает — не на болезнь, а на разум. Пациент чувствует себя лучше. Вина уменьшается. Страх уменьшается. Пустота замаскирована. Он выходит из офиса с улыбкой на лице, объявляя каждому, кого он встречает: \"Я был исцелен. Я рожден заново. Я спасен.\"\u003c/p\u003e\n\u003cp\u003eНо болезнь остается. Грех остается. Я остаюсь на троне. И врач это знает.\u003c/p\u003e\n\u003ch3 id=\"подслащенная-религия\"\u003eПодслащенная религия\u003c/h3\u003e\n\u003cp\u003eВот что Питтман ему показали. Вот плацебо. Это не атеизм. Это не язычество. Это не открытое восстание против Бога. Это грубое оружие. Сатана намного более изощренн, чем это.\u003c/p\u003e\n\u003cp\u003eПлацебо — подслащенная религия. Это христианство без креста. Это вера без капитуляции. Это исповедание без трансформации. Это форма благочестия — именно так, как Павел предупредил Тимофея — без силы этого.\u003c/p\u003e\n\u003cp\u003eСахарная оболочка облегчает проглатывание таблетки. Пациент не поперхивается. Он не сопротивляется. Он проглатывает охотно, с удовольствием, благодарно. И почему бы и нет? Это вкусно. Это приятно. Это ничего не стоит — никакой реальной жертвы, никакой реальной смерти себя, никакой реальной капитуляции трона.\u003c/p\u003e\n\u003cp\u003eГений Сатаны — это не создание религии, которая выглядит явно ложной. Его гений — создание религии, которая выглядит почти совершенно истинной. Плацебо содержит реальные ингредиенты — реальное писание, реальное поклонение, реальную общину, реальные эмоции. Но активный ингредиент — тот, который действительно исцелил бы болезнь — отсутствует. И этот отсутствующий ингредиент — полное господство. Полная капитуляция. Смерть себя.\u003c/p\u003e\n\u003ch2 id=\"христианин-только-исповедующий-ртом\"\u003eХристианин, только исповедующий ртом\u003c/h2\u003e\n\u003ch3 id=\"говоря-правильные-вещи\"\u003eГоворя правильные вещи\u003c/h3\u003e\n\u003cp\u003eГовард Питтман определил конкретный термин для миллиардов, попавших в этот обман: \"христиане, только исповедующие ртом\". Это не лицемеры в традиционном смысле. Это не люди, втайне живущие в явном грехе, притворяясь правдивыми. Многие из них искренни. Многие из них действительно верят, что спасены. Вот что делает плацебо таким эффективным.\u003c/p\u003e\n\u003cp\u003eХристианин, только исповедующий ртом, говорит все правильное. Он исповедует Иисуса как Господина. Он объявляет себя рожденным заново. Он цитирует писание. Он молится перед едой. Он рассказывает другим о своей вере. Его рот исповедует все, что исповедовал бы истинный христианин.\u003c/p\u003e\n\u003cp\u003eНо есть одно исключение. Один критический, смертельный, вечный исключение.\u003c/p\u003e\n\u003cp\u003eЕму никогда не будет позволено ЖИТЬ жизнь, которую он исповедует своим ртом.\u003c/p\u003e\n\u003cp\u003eЭто конструкция плацебо. Пациенту разрешено ГОВОРИТЬ что угодно. Он может говорить \"Иисус — Господь\" тысячу раз в день. Он может говорить \"Я рожден заново\" каждому человеку, которого он встречает. Он может говорить \"Я сдаюсь всем\" поющая в церкви в воскресенье утром. Сатана не заботится о том, что говорит пациент. Сатана заботится о том, что пациент делает — или точнее, что пациент НЕ делает.\u003c/p\u003e\n\u003cp\u003eХристианин, только исповедующий ртом, никогда не будет действительно капитулировать трон своей жизни перед Христом. Он никогда не будет действительно умирать для себя. Он никогда не будет действительно делать Иисуса Господом — не только Спасителем, но Господом. Он никогда не будет действительно позволяет Богу направлять его шаги, контролировать его желания, переделывать его волю, разобрать его комфорт и перестроить его с основания.\u003c/p\u003e\n\u003cp\u003eОн будет говорить все это. Он никогда не будет это делать.\u003c/p\u003e\n\u003ch3 id=\"одно-исключение\"\u003eОдно исключение\u003c/h3\u003e\n\u003cp\u003eЭто скрытая статья рецепта. Мелкий шрифт. Статья, которую пациент никогда не читает, потому что сахарная оболочка слишком сладкая, облегчение слишком непосредственное, комфорт слишком велик.\u003c/p\u003e\n\u003cp\u003eПлацебо Сатаны позволяет все, кроме одного — то, что имеет значение. Вы можете посещать церковь — каждое воскресенье, каждую среду, каждое возрождение, каждую конференцию. Вы можете петь — громко, страстно, со слезами, текущими по лицу. Вы можете молиться — длинные молитвы, красноречивые молитвы, молитвы, которые трогают целые общины. Вы можете преподавать — воскресную школу, изучение Библии, семинарские курсы. Вы можете проповедовать — с кафедр, с углов улиц, из телевизионных студий.\u003c/p\u003e\n\u003cp\u003eВы можете делать все это. Вы должны делать все это. Плацебо требует это. Форма благочестия требует деятельность. Чем занятнее пациент, тем более убежден он становится, что лекарство работает. Деятельность становится доказательством. Спешка становится доказательством. Пациент указывает на свой график и говорит: \"Посмотри на все, что я делаю для Бога. Конечно, я спасен.\"\u003c/p\u003e\n\u003cp\u003eНо одно — ЕДИНСТВЕННОЕ — что преобразовало бы плацебо в реальное лекарство, это то, что рецепт запрещает: подлинная, полная, безусловная капитуляция себя.\u003c/p\u003e\n\u003ch2 id=\"врач-должен-убедить-пациента\"\u003eВрач должен убедить пациента\u003c/h2\u003e\n\u003ch3 id=\"искусство-обмана\"\u003eИскусство обмана\u003c/h3\u003e\n\u003cp\u003eПиттман делает критическое наблюдение о том, как работает плацебо. Он говорит: \"Врач должен убедить пациента, что это реально.\"\u003c/p\u003e\n\u003cp\u003eЭто существенно. Плацебо работает только, если пациент верит, что это подлинное лекарство. Если пациент знает, что таблетка — это сахар, он не испытает облегчения. Обман должен быть полным. Пациент должен быть полностью убежден — в своем разуме, в своем сердце, в своих эмоциях — что то, что он получил, является подлинным делом.\u003c/p\u003e\n\u003cp\u003eСатана понимает это идеально. Он не раздает плацебо с подмигиванием и кивком. Он не говорит: \"Вот, возьми эту поддельную религию.\" Он представляет это с абсолютной искренностью. Он обертывает это в писание. Он доставляет это через кажущихся искренних пастырей, через эмоциональные служения поклонения, через изменяющие жизнь призывы к алтарю, через мощные свидетельства, через чудо-подобные опыты.\u003c/p\u003e\n\u003cp\u003eПациент должен уехать убежденным. И он это делает. Он продолжает свой веселый путь — точные слова Питтмана — объявляя, что он рожден заново. И он действительно в это верит. Он не лжет. Он не притворяется. Он был обманут так тщательно, что его убеждение абсолютно.\u003c/p\u003e\n\u003cp\u003eЭто то, что делает плацебо бесконечно более опасным, чем открытый атеизм или бессовестная ложная религия. Атеист знает, что не верит в Бога. Язычник знает, что поклоняется другим богам. Но христианин, только исповедующий ртом, верит — действительно, искренне, глубоко верит — что он принадлежит Христу. И он будет верить это все в путь к престолу Бога, где услышит слова: \"Я никогда не знал вас.\"\u003c/p\u003e\n\u003ch3 id=\"эмоциональный-подделка\"\u003eЭмоциональный подделка\u003c/h3\u003e\n\u003cp\u003eОдна из самых мощных ингредиентов плацебо — эмоция. Сатана знает, что люди приравнивают сильные чувства с подлинным духовным опытом. Если служба поклонения заставляет вас плакать, должно быть, Святой Дух. Если проповедь дает вам озноб, Бог должен говорить. Если призыв к алтарю наполняет вас теплотой, вы должны быть спасены.\u003c/p\u003e\n\u003cp\u003eНо эмоция не доказательство спасения. Эмоция — доказательство эмоции. Умелый музыкант может заставить целый зал плакать без единого слова писания. Одаренный оратор может производить дрожи с помощью ничего больше, чем вокальная интонация и время. Хорошо разработанная среда — освещение, музыка, толпа, ожидание — может генерировать чувства, которые неразличимы от подлинного духовного встречи.\u003c/p\u003e\n\u003cp\u003eПлацебо использует это. Он создает среды, насыщенные эмоциональными триггерами. Пациент берет таблетку, чувствует что-то мощное, и заключает: \"Это реально. Я встретил Бога. Я спасен.\" Эмоция становится доказательством. Чувство становится основой.\u003c/p\u003e\n\u003cp\u003eИ когда чувство исчезает — как это всегда делает — пациент возвращается для другой дозы. Другая служба. Другая конференция. Другое возрождение. Другой эмоциональный опыт, чтобы заверить его, что лекарство работает. Вот почему столько христиан живут на эмоциональной американской горке — вершина опыты, в которых сомневаюсь долины, за которыми следует еще один вершины опыта. Они зависят от плацебо. Им нужна следующая доза для поддержания иллюзии.\u003c/p\u003e\n\u003ch2 id=\"точное-лечение-которое-большинство-христиан-используют-сегодня\"\u003eТочное лечение, которое большинство христиан используют сегодня\u003c/h2\u003e\n\u003ch3 id=\"масштаб-обмана\"\u003eМасштаб обмана\u003c/h3\u003e\n\u003cp\u003eПиттман не обинует слова. Он говорит откровенно: \"Это точное лечение, которое большинство христиан, только исповедующих ртом, используют сегодня.\"\u003c/p\u003e\n\u003cp\u003eНе некоторые. Не несколько. Не маргинальная группа. БОЛЬШИНСТВО.\u003c/p\u003e\n\u003cp\u003eЭто совершенно согласуется с тем, что Бог показал Питтмену у престола — что 97,5% исповедующих христиан не спасены по-настоящему. Плацебо — это не незначительная проблема. Это не теологический нюанс. Это доминирующая форма христианства, практикуемая на земле сегодня. Подавляющее большинство людей, которые называют себя христианами, берут духовное плацебо, предписанное врагом их душ.\u003c/p\u003e\n\u003cp\u003eРассмотрим последствия. Миллиарды людей по всему земному шару идентифицируют себя как христиане. Они посещают услуги. Они празднуют праздники. Они отмечают жизненные события — рождения, браки, смерти — с религиозной церемонией. Они молятся. Они дают. Они служат. И по тому, что Бог раскрыл Говарду Питтману, почти все они обманены.\u003c/p\u003e\n\u003cp\u003eЦерковные здания переполнены. Скамьи заполнены. Предложения щедрые. Программы впечатляют. И почти ничего из этого не реально.\u003c/p\u003e\n\u003ch3 id=\"стратегия-полуправд\"\u003eСтратегия полуправд\u003c/h3\u003e\n\u003cp\u003eПлацебо Сатаны не опирается на откровенную ложь. Это опирается на полуправды — которые гораздо более опасны.\u003c/p\u003e\n\u003cp\u003eЛожь можно идентифицировать и отклонить. \"Нет Бога\" — ложь, которую многие люди сразу же признают. \"Библия — это выдумка\" — утверждение, которое рушится при честном расследовании. Это грубые оружия, и хотя они работают на некоторых, они не работают на многих.\u003c/p\u003e\n\u003cp\u003eНо полуправда? Полуправда почти невозможна обнаружить, потому что она содержит реальную правду. Это смешано. Реальная правда обеспечивает прикрытие для ложной части.\u003c/p\u003e\n\u003cp\u003e\"Примите Иисуса как вашего Спасителя, и вы будете спасены.\" Это полуправда. Истинная часть: Иисус — Спаситель. Вера в Него существенна. Ложная часть: пропуск. Иисус должен быть также ГОСПОДОМ. Не только Спаситель — Господь. Спаситель означает, что Он спасает вас. Господь означает, что Он правит вами. Плацебо предлагает спасение без правила. Он предлагает спасение без капитуляции. Он предлагает рай без креста.\u003c/p\u003e\n\u003cp\u003e\"Верьте в сердце и исповедуйте своим ртом.\" Это писание — Римляне 10:9. Но версия плацебо лишает его контекста. Что означает верить? Что означает исповедовать? Плацебо сводит веру к интеллектуальному согласию и исповедание к вербальному повторению. Но библейская вера — это доверие — полное, полное, меняющее жизнь доверие. И библейское исповедание — это не одноразовая вербальная формула. Это непрерывное объявление верности, которое управляет каждым аспектом жизни.\u003c/p\u003e\n\u003cp\u003eПолуправда проводит пациента через дверь. Он заставляет его проглотить таблетку. И как только проглотена, пациент защищает таблетку своей жизнью — потому что она содержит достаточно реальной правды, чтобы казаться законной.\u003c/p\u003e\n\u003ch2 id=\"власть-слов\"\u003eВласть слов\u003c/h2\u003e\n\u003ch3 id=\"каждое-ленивое-слово-рассмотрено\"\u003eКаждое ленивое слово рассмотрено\u003c/h3\u003e\n\u003cp\u003eИисус сказал что-то в Матфее 12:36-37, что большинство христиан пропускают без полного понимания его веса: \"Говорю вам, что за каждое праздное слово, какое скажут люди, дадут они ответ в день суда, ибо из избытка сердца говорят уста, и добрым человеком из доброго сокровища выносит добро; а злой человек из злого сокровища выносит зло.\"\u003c/p\u003e\n\u003cp\u003eКаждое ленивое слово. Не каждая проповедь. Не каждая молитва. Каждое слово. Включая ленивые — безрассудные, выбросьте строки, случайные объявления, непопулярные исповедания.\u003c/p\u003e\n\u003cp\u003eСлова имеют духовную силу. Это не метафора. Это духовный закон. Когда христианин, только исповедующий ртом, говорит \"Иисус — Господь\", но живет, как будто я — Господь, он не просто непоследователен. Он говорит слова, которые имеют вес в духовной сфере — слова, за которые он будет нести ответственность перед престолом Бога.\u003c/p\u003e\n\u003cp\u003eПлацебо учит людей говорить без жизни. Это учит их исповедовать без повиновения. Это тренирует целое поколение христиан использовать духовный язык как украшение — вербальные обои для жизней, которые в фундаментально не измененные.\u003c/p\u003e\n\u003ch3 id=\"разница-между-исповеданием-и-капитуляцией\"\u003eРазница между исповеданием и капитуляцией\u003c/h3\u003e\n\u003cp\u003eИсповедание говорит: \"Иисус — Господь.\"\nКапитуляция говорит: \"Иисус — Господь — моих денег, моего времени, моей карьеры, моих отношений, моих желаний, моих страхов, моего будущего, моего комфорта, моей репутации, моей очень жизни.\"\u003c/p\u003e\n\u003cp\u003eИсповедание стоит ничего.\nКапитуляция стоит всего.\u003c/p\u003e\n\u003cp\u003eПлацебо предлагает исповедание. Бог требует капитуляцию.\u003c/p\u003e\n\u003cp\u003eЭто не законничество. Это не спасение на основе работ. Это фундаментальная природа подлинной веры. Как писал Джеймс: \"Вера без дел мертва\" (Джеймса 2:26). Вера, которая не преобразует, не является верой вообще. Это согласие — интеллектуальное принятие набора предложений. И интеллектуальное согласие никогда никого не спасало.\u003c/p\u003e\n\u003cp\u003eХристианин, только исповедующий ртом, согласен, что Иисус — Господь. Капитулировавший христианин подчиняется Его господству. Разница бесконечна. Разрыв между ними — это разрыв между раем и адом. И плацебо предназначено для того, чтобы сделать этот разрыв невидимым.\u003c/p\u003e\n\u003ch2 id=\"освобождение-от-плацебо\"\u003eОсвобождение от плацебо\u003c/h2\u003e\n\u003ch3 id=\"диагностика\"\u003eДиагностика\u003c/h3\u003e\n\u003cp\u003eПервый шаг в освобождении от любого обмана — признание того, что вас обманули. И это самый сложный шаг из всех. Плацебо предназначено для предотвращения ровно этого признания. Пациент удобен. Симптомы были замаскированы. Эмоциональные опыты усиливают убеждение, что все в порядке.\u003c/p\u003e\n\u003cp\u003eНо правда остается: если я все еще на троне — если ВАШ желания, ВАШ комфорт, ВАШ планы, ВАШ предпочтения все еще управляют вашей жизнью — то плацебо все еще работает. Вы все еще берете таблетку. Рецепт не был заполнен подлинным лекарством.\u003c/p\u003e\n\u003cp\u003eСпросите себя: Моя вера ничего мне не стоила? Следование за Христом потребовало подлинной жертвы — не жертва посещения церкви в воскресенье (что стоит ничего, но час), но жертва моей воли? Я действительно капитулировал право управлять собственной жизнью?\u003c/p\u003e\n\u003cp\u003eЕсли ответ нет — если честный, болезненный, неукрашенный ответ нет — то плацебо работал ровно так, как разработан.\u003c/p\u003e\n\u003ch3 id=\"лечение\"\u003eЛечение\u003c/h3\u003e\n\u003cp\u003eЛечение для плацебо — это не больше религии. Это не лучшая церковь, лучший пастор, лучшая команда поклонения, лучшее изучение Библии. Лечение — это самое то, что плацебо было разработано для предотвращения: полная, абсолютная, безусловная капитуляция перед господством Иисуса Христа.\u003c/p\u003e\n\u003cp\u003eЭто означает, что шагаешь с трона. Это означает признание того, что ВЫ не Господь вашей жизни — что у вас нет права на собственные планы, собственный временной график, собственный комфорт, собственные предпочтения. Это означает, что все области вашей жизни — не только области, которые вы готовы отдать, но ВСЕ из них — подчиняются авторитету Христа.\u003c/p\u003e\n\u003cp\u003eВот что означает рождение заново. Не версия плацебо — реальная версия. Смерть себя. Воскрешение во Христе. Новое существо. Старое прошедшего. Все становится новым.\u003c/p\u003e\n\u003cp\u003eУзкие ворота. Дорога менее путешествовавших. Путь, который немногие находят.\u003c/p\u003e\n\u003cp\u003eИ 97,5% исповедующих христиан никогда не ходили по ней.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003eПЛАЦЕБО: Просни церковь! Говард Питтман\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: выявленные позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eСвидетельство бывшего поклонника Сатаны Джона Рамиреза\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсточник: Буклет \"Плацебо\" Говарда Питтмана, озеро Гамильтон лагерь Библии\u003c/p\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Disguise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Deceiver's Lies — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Enemy Within — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eFrom Darkness Into Light — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Transgression — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/97-percent-christians-rejected-god/?lang=ru\"\u003e97,5% отклонено: ужасающая статистика, которую Бог показал Говарду Питтмену\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/three-heavens-howard-pittman-nde/?lang=ru\"\u003eТри небес: что Говард Питтман видел, когда умер\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/mass-deletion-church-created-christianity/?lang=ru\"\u003eМассовое удаление: как церковь создала свою собственную версию христианства\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/demonic-hierarchy-satans-military/?lang=ru\"\u003eВоенная служба Сатаны: демонические иерархия, которую Говард Питтман видел\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eСвидетельство Говарда Питтмана — это не теологическое мнение. Это свидетельство очевидца — баптист-министр тридцать пять лет, который умер, стоял перед престолом Бога и был отправлен обратно с сообщением. Сообщение простое, разрушительное и срочное: церковь берет плацебо. Лекарство поддельно. Болезнь реальна. И врач, прописывающий его, — враг вашей души. Перестаньте брать таблетку. Капитулируйте трон. Прежде чем будет сл
