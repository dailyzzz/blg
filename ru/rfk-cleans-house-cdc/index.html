 повелел им убрать каждый жертвенник чужим богам, разрушить каждое высокое место и срубить каждый столб Ашеры. Это указание не было необязательным. Оно не было постепенным. Оно было тотальным и немедленным. Причина была ясна: люди, построившие эти жертвенники, внедрили коррупцию в саму инфраструктуру земли, и никакая реформа не могла быть успешной, пока эти структуры оставались стоять.\u003c/p\u003e\n\u003cp\u003eКак показывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e, самый опасный противник — это не тот, кто у ворот, а тот, кто уже внутри стен, носящий форму института, который он развратил. CDC был создан для защиты американского народа от болезней. Вместо этого он стал инструментом, через который управление болезнями было монетизировано, фармацевтические продукты были узаконены, а несогласные врачи были заглушены.\u003c/p\u003e\n\u003cp\u003eРФК-младший вошел в храм и начал опрокидывать столы менял. Вопрос в том, достаточно ли глубока чистка.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"cdc-история-захвата\"\u003eCDC: История захвата\u003c/h2\u003e\n\u003cp\u003eЦентры по контролю и профилактике заболеваний были созданы в 1946 году как Центр инфекционных болезней, изначально сосредоточенный на контроле малярии. В последующие десятилетия его миссия расширилась, охватив практически все аспекты общественного здравоохранения — от надзора за инфекционными заболеваниями до профилактики хронических заболеваний, охраны окружающей среды, профилактики травм и охраны труда.\u003c/p\u003e\n\u003cp\u003eСегодня бюджет CDC превышает 17 миллиардов долларов в год, и в нем работает более 12 000 человек. Он управляет Консультативным комитетом по практике иммунизации (ACIP), чьи рекомендации автоматически принимаются каждым штатом в союзе в качестве графика детских прививок. Когда ACIP рекомендует вакцину, она становится де-факто обязательной — школы требуют ее, страховка покрывает ее, а врачи, которые ставят ее под сомнение, рискуют получить профессиональные санкции.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон подробно задокументировала в The Kingston Report (karenkingston.substack.com), что регулирующая функция CDC структурно скомпрометирована ее финансовыми связями. Фонд CDC — некоммерческая организация, учрежденная Конгрессом, — получает прямое финансирование от фармацевтических компаний, включая Pfizer, Johnson \u0026#x26; Johnson, Merck и GlaxoSmithKline. Только в 2020-2021 финансовом году Фонд CDC получил более 250 миллионов долларов взносов, значительная часть которых поступила от фармацевтической и биотехнологической отраслей.\u003c/p\u003e\n\u003cp\u003eКингстон подробно описала вращающуюся дверь между CDC и фармацевтической промышленностью. Бывшие директора CDC перешли на руководящие должности в Merck (Джули Гербердинг, которая стала исполнительным вице-президентом Merck, а позже была назначена главным директором по работе с пациентами), а бывшие чиновники CDC регулярно переходят в фармацевтический консалтинг, лоббирование и консультативные роли. Трафик течет в обоих направлениях — руководители и консультанты фармацевтической промышленности ротируют на консультативные должности в CDC, неся свои корпоративные интересы через вращающуюся дверь.\u003c/p\u003e\n\u003cp\u003e«CDC не регулирует фармацевтическую промышленность», — заявила Кингстон. «Фармацевтическая промышленность регулирует CDC. Когда вы следуете за деньгами, вы обнаруживаете, что каждая важная точка принятия решений — какие вакцины рекомендуются, какие исследования финансируются, какие сигналы безопасности расследуются — восходит к финансовым отношениям, которые представляли бы собой уголовный конфликт интересов в любом другом контексте».\u003c/p\u003e\n\u003ch3 id=\"консультативный-комитет-по-вакцинам-промышленность-под-другим-названием\"\u003eКонсультативный комитет по вакцинам: промышленность под другим названием\u003c/h3\u003e\n\u003cp\u003eACIP — комитет, чьи рекомендации определяют, какие вакцины добавляются в детский график, — неоднократно документально зафиксирован как включающий членов с прямыми финансовыми связями с производителями, чьи продукты они голосуют за рекомендацию. Отчет Управления генерального инспектора 2009 года показал, что 97% членов ACIP имели по крайней мере один конфликт интересов, а 64% имели конфликты, специально связанные с вакцинами, за которые они голосовали.\u003c/p\u003e\n\u003cp\u003eЭти конфликты не были скрыты. Они были задокументированы, раскрыты и отменены. Система была разработана для разрешения конфликтов интересов, а не для их предотвращения. Механизм отказа обеспечивал, что лица, связанные с промышленностью, могли продолжать заседать в комитете и голосовать за продукты, производимые компаниями, которые им платили.\u003c/p\u003e\n\u003cp\u003eКогда ACIP голосует за добавление вакцины в детский график, решение имеет огромные финансовые последствия. Одна рекомендация ACIP может генерировать миллиарды долларов дохода для производителя вакцин, поскольку каждый ребенок в Америке становится потенциальным клиентом через требования школ. Члены комитета, которые принимают эти решения, согласно собственной документации OIG, финансово связаны с компаниями, которые выигрывают.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"чистка-начинается\"\u003eЧистка начинается\u003c/h2\u003e\n\u003cp\u003eРФК-младший, занимающий пост министра здравоохранения и социальных служб, инициировал систематическое увольнение должностных лиц руководства CDC, идентифицированных как имеющих прямые конфликты интересов с фармацевтической промышленностью, историю подавления данных о безопасности или участие в цензуре несогласных научных голосов во время пандемии COVID-19.\u003c/p\u003e\n\u003cp\u003eЧистка была направлена на старших должностных лиц в нескольких подразделениях, включая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНациональный центр иммунизации и респираторных заболеваний (NCIRD), который контролирует программу вакцинации от COVID-19 и график детских прививок\u003c/li\u003e\n\u003cli\u003eЦентр готовности и реагирования (CPR), который координировал ответ CDC на пандемию\u003c/li\u003e\n\u003cli\u003eУправление директора, которое определяет общую политику агентства и стратегию коммуникаций\u003c/li\u003e\n\u003cli\u003eОтдел продвижения качества здравоохранения (DHQP), который контролирует рекомендации по контролю инфекций, использованные для обоснования локдаунов, мандатов на маски и требований социального дистанцирования\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсточники в HHS подтвердили, что увольнения не были случайными переназначениями или ранними отставками, одетыми в реформу. Это были увольнения — прямое удаление персонала, идентифицированного через процесс внутренней проверки, который проверял финансовые раскрытия, записи коммуникаций и модели принятия решений во время реагирования на пандемию.\u003c/p\u003e\n\u003ch3 id=\"реакция\"\u003eРеакция\u003c/h3\u003e\n\u003cp\u003eИстеблишмент общественного здравоохранения ответил яростью. Бывшие чиновники CDC появились в кабельных новостных сетях, чтобы осудить чистку как «политическое вмешательство» в науку. Медицинские журналы опубликовали редакционные статьи, предупреждающие об «утечке мозгов» в ведущем агентстве общественного здравоохранения страны. Профессиональные ассоциации выпустили заявления, выражающие «глубокую озабоченность» за будущее инфраструктуры общественного здравоохранения.\u003c/p\u003e\n\u003cp\u003eЭти реакции следуют предсказуемой схеме. Когда захваченные институты сталкиваются с реформой, они представляют реформу как атаку на сам институт. Аргумент всегда один и тот же: институт слишком важен, чтобы быть привлеченным к ответственности. Его миссия слишком важна, чтобы его лидеры столкнулись с последствиями. Любая попытка удалить скомпрометированных чиновников переформулируется как нападение на науку, общественное здравоохранение или национальную безопасность.\u003c/p\u003e\n\u003cp\u003eНо миссия CDC — защита американского народа от болезней — была предана не чисткой РФК-младшего, а чиновниками, которых он удалил. Она была предана, когда агентство рекомендовало инъекции COVID-19 для детей, несмотря на отсутствие долгосрочных данных о безопасности. Она была предана, когда агентство подавляло варианты раннего лечения. Она была предана, когда агентство сотрудничало с компаниями социальных сетей для цензуры врачей, которые сообщали о неблагоприятных событиях. Она была предана, когда собственная система VAERS агентства собрала сотни тысяч отчетов о неблагоприятных событиях, и агентство не предприняло никаких публичных действий для их расследования.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"документация-карен-кингстон-о-коррупции-cdc\"\u003eДокументация Карен Кингстон о коррупции CDC\u003c/h2\u003e\n\u003cp\u003eИсследование Карен Кингстон, последовательно публикуемое в The Kingston Report, предоставило детальный, на уровне документов анализ коррупции CDC, который выходит за рамки общей критики захвата регулирования.\u003c/p\u003e\n\u003cp\u003eКингстон задокументировала, что CDC владел патентами на технологию, связанную с коронавирусом, — создавая прямой финансовый интерес в разработке и развертывании контрмер против коронавируса. Когда агентство, которое получает прибыль от лечения болезни, также служит регулирующим органом, контролирующим это лечение, конфликт не просто теоретический — он структурный.\u003c/p\u003e\n\u003cp\u003eКингстон далее задокументировала, что коммуникации CDC во время пандемии были скоординированы с фармацевтическими компаниями и платформами социальных сетей через то, что она называет «комплексом цензуры-промышленности». Внутренние коммуникации, полученные через запросы FOIA, показали, что чиновники CDC помечали определенные посты в социальных сетях для удаления, идентифицировали конкретных врачей и исследователей для действий по принуждению платформ и координировали стратегии обмена сообщениями с Белым домом, офисом главного хирурга и командами модерации контента Big Tech.\u003c/p\u003e\n\u003cp\u003e«CDC не функционировал как агентство общественного здравоохранения во время COVID-19», — написала Кингстон. «Он функционировал как отдел коммуникаций и принуждения фармацевтической промышленности. Его роль заключалась в продвижении продуктов, подавлении критиков и управлении нарративом. Все остальное — наука, данные, мониторинг безопасности — было подчинено этой функции».\u003c/p\u003e\n\u003ch3 id=\"скандал-с-графиком-детских-вакцин\"\u003eСкандал с графиком детских вакцин\u003c/h3\u003e\n\u003cp\u003eОдна из наиболее значимых областей коррупции CDC, задокументированная Кингстон и другими исследователями, связана с самим графиком детских вакцин. CDC в настоящее время рекомендует более 70 доз 16 различных вакцин к 18 годам, причем большинство из них вводится до шести лет. Этот график резко расширился за последние четыре десятилетия — в 1983 году CDC рекомендовал 24 дозы 7 вакцин к 18 годам.\u003c/p\u003e\n\u003cp\u003eНикогда не проводилось долгосрочное исследование, сравнивающее результаты для здоровья полностью вакцинированных детей с полностью невакцинированными детьми. CDC неоднократно отказывался проводить такое исследование, утверждая, что было бы «неэтично» оставлять детей невакцинированными. Это рассуждение является циклическим: агентство предполагает, что вакцины безопасны и полезны, и поэтому отказывается проводить исследование, которое проверило бы это предположение.\u003c/p\u003e\n\u003cp\u003eНезависимые исследователи, которые пытались провести такие сравнения, используя доступные данные, последовательно обнаружили, что у невакцинированных детей более низкие показатели хронических заболеваний, аутоиммунных состояний, аллергий, СДВГ, расстройства аутистического спектра и других состояний. CDC отклонил эти исследования, не проводя своих собственных.\u003c/p\u003e\n\u003cp\u003eРФК-младший сделал график детских вакцин центральным фокусом своих усилий по реформе. Его заявленная цель — не устранение вакцин, а подвергание их тем же строгим испытаниям безопасности, применяемым ко всем другим фармацевтическим продуктам, — включая долгосрочные, плацебо-контролируемые клинические испытания и полностью обоснованные исследования, сравнивающие вакцинированные и невакцинированные популяции.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"институциональные-руки-системы-зверя\"\u003eИнституциональные руки системы зверя\u003c/h2\u003e\n\u003cp\u003eТрек ZZZ Daily \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e документирует преемственность между историческими правительственными программами контроля населения и современными институциональными механизмами. CDC — один из таких механизмов — инструмент, который переводит цели фармацевтической промышленности в правительственную политику, правительственную политику в мандаты, а мандаты в подчинение всего населения.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/109-Biometric_Beast_System.mp4\"\u003eBiometric Beast System\u003c/a\u003e раскрывает архитектуру медицинского подчинения — системы, в которой институциональные рекомендации становятся требованиями, требования становятся условиями социального участия, а социальное участие становится зависимым от подчинения фармацевтическим продуктам.\u003c/p\u003e\n\u003cp\u003eCDC занимает критический узел в этой архитектуре. Это агентство, которое определяет, какие продукты рекомендуются, какие рекомендации становятся мандатами, и какие мандаты обеспечиваются через требования школ, условия трудоустройства и военные приказы. Когда этот узел захвачен промышленностью, которую он должен регулировать, вся система инвертируется — защита становится хищничеством, общественное здравоохранение становится доходом фармацевтических компаний, а агентство, ответственное за защиту населения, становится инструментом его эксплуатации.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейский-прецедент-для-институциональной-чистки\"\u003eБиблейский прецедент для институциональной чистки\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«И вошел Иисус в храм Божий и выгнал всех продающих и покупающих в храме, и опрокинул столы меновщиков и скамьи продающих голубей, и говорил им: написано, — дом Мой домом молитвы наречется; а вы сделали его вертепом разбойников». — Матфей 21:12-13\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eХристос не реформировал менял. Он не договаривался с ними. Он не формировал комитет для изучения их деловых практик. Он опрокинул их столы и выгнал их. Коррупция была тотальной, средство было тотальным, а власть, стоящая за средством, была абсолютной.\u003c/p\u003e\n\u003cp\u003eРФК-младший — не Христос. CDC — не Храм. Но образец поучителен. Когда институт, созданный для священной цели — защиты человеческой жизни, — был превращен в коммерческое предприятие, которое получает прибыль от страданий тех, кого он должен был защищать, постепенная реформа недостаточна. Столы должны быть опрокинуты.\u003c/p\u003e\n\u003cp\u003eВопрос, который остается, заключается в том, представляет ли эта чистка подлинную трансформацию федеральной политики здравоохранения или просто перетасовку персонала в системе, чьи структурные стимулы остаются неизменными. Если Фонд CDC продолжает принимать финансирование фармацевтической промышленности, если ACIP продолжает назначать членов с конфликтами производителей, если вращающаяся дверь между CDC и фармацевтическими советами директоров продолжает вращаться, — тогда чистка, какой бы драматичной она ни была, будет временной. Новые лица займут те же стулья, подвергаясь тем же давлениям, производя те же результаты.\u003c/p\u003e\n\u003cp\u003eИстинная реформа требует структурных изменений: устранение финансирования фармацевтической промышленности CDC и его фонду, запрет конфликтов промышленности в консультативных комитетах, прекращение вращающейся двери, восстановление ответственности для производителей вакцин и проведение долгосрочных исследований безопасности, которые агентство отказывалось проводить десятилетиями.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e«И сказал Господь Самуилу: послушай голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтоб Я не царствовал над ними»\u003c/em\u003e. — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (Синодальный перевод)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 эхом звучит через каждый правительственный коридор сегодня. Когда Израиль потребовал царя, как у других народов, Бог предупредил их, что именно произойдет — их сыновья будут взяты на войну, их дочери на службу, их поля и виноградники захвачены, десятина со всего конфискована. Они выбрали человеческое правительство над царствованием Бога, и тирания последовала точно, как было обещано. Ничего не изменилось. Современная политическая система — это два крыла одной птицы — левое и правое, республиканцы и демократы — все служат одной и той же скрытой структуре власти. Голосование за любую сторону — это выбор, какое крыло взмахнет следующим, пока птица летит в том же направлении. Реальная власть никогда не была ни в одном избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eOffice of Inspector General, HHS — «Программа этики CDC для специальных государственных служащих в федеральных консультативных комитетах» (2009)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — документация Карен Кингстон о финансовых конфликтах CDC, владении патентами и координации коммуникаций в эпоху пандемии\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eГодовые отчеты Фонда CDC — раскрытие финансовых спонсоров\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eПротоколы заседаний ACIP и записи финансовых раскрытий членов — CDC.gov\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eМатфей 21:12-13, Исаия 5:20 (Синодальный перевод)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (Синодальный перевод)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о предсмертном опыте Говарда Питтмана — Предупреждение о конце времен, данное ему Богом\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: раскрытые прискорбные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — Преемственность правительственных программ контроля населения через институциональные механизмы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/109-Biometric_Beast_System.mp4\"\u003eBiometric Beast System\u003c/a\u003e — Медицинское подчинение как шлюз к общественному участию\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eTotal Information Awareness\u003c/a\u003e — Как инфраструктура наблюдения отслеживает подчинение через каждый институт\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (Пещера сокровищ):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e — Противник внутри стен, носящий форму института, который он развратил\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e — Как коррупция носит маску авторитета и экспертизы\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eFDA только что отменило разрешения на экстренное использование для COVID-19\u003c/a\u003e — Прекращение правовой базы, которая обошла стандарты безопасности\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eРФК-младший искореняет руководителей CDC, связанных с Big Tech и ИИ\u003c/a\u003e — Более глубокие связи между захваченными агентствами здравоохранения и технологическими платформами\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eCDC исчез: СМИ сообщают о массовом исходе\u003c/a\u003e — Институциональный крах после чистки скомпрометированного руководства\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/?lang=ru\"\u003eHHS объявляет о трансформации здравоохранения MAHA\u003c/a\u003e — Более широкое видение реформы федеральной политики здравоохранения\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eCDC был создан для защиты. Он был захвачен для получения прибыли. Чистка началась, но древний образец учит, что удаление жрецов ложного жертвенника — это только первый шаг — сам жертвенник должен быть разрушен, а земля, на которой он стоял, должна быть посыпана солью. «И разрушите жертвенники их, и сокрушите столбы их, и сожгите огнем рощи их» (Второзаконие 12:3). Менялы были изгнаны из храма. Будет ли храм восстановлен для его первоначальной цели или просто вновь занят новыми торговцами, еще предстоит увидеть.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"РФК-младший проводит чистку в CDC\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"РФК-младший запускает масштабную чистку руководства CDC, увольняя чиновников, связанных с конфликтами интересов фармацевтической промышленности и захватом регулирования на протяжении десятилетий.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-05-04T10:00:0
