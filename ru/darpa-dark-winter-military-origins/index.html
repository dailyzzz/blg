blockquote\u003e\n\u003cp\u003eСилы врага никогда не были неорганизованной толпой. Писание описывает их как военную иерархию — начальства, власти, мироправители тьмы — организованные по рангам, действующие через слои власти и отсеком разделения. Враг прежде всего является стратегом. Он развертывает обман через структурированные цепи командования, каждый слой изолирован от других, каждый участник знает только свою маленькую часть намного большей операции.\u003c/p\u003e\n\u003cp\u003eDARPA — Агентство по перспективным оборонным исследовательским проектам — отражает эту архитектуру с жуткой точностью. Теневое агентство, финансирующее трансформирующие технологии через слои подрядчиков, субподрядчиков, университетских лабораторий и частных компаний, каждое разделено, каждое верит, что служит доброй цели. Исследователь, разрабатывающий механизмы доставки мРНК в университетской лаборатории, не знает военного применения. Инженер-программист, строящий алгоритм социальной сети, не знает, что он был посеян разведывательными деньгами. Потребитель, восхищающийся GPS-навигацией на своем телефоне, не знает, что использует систему целеуказания оружия, переоформленную для гражданского комфорта.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e дает ясно понять, оппозиция организована — дисциплинированная сила с единым повестка дня, исполняющая через иерархию и скрытность. DARPA является одним из его наиболее эффективных инструментов на материальной плоскости.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-darpa\"\u003eЧто такое DARPA?\u003c/h2\u003e\n\u003cp\u003eАгентство по перспективным оборонным исследовательским проектам было создано в 1958 году как прямой ответ на запуск Советским Союзом спутника Спутник, первого искусственного спутника. Соединенные Штаты были потрясены. Нация, которая считала себя технологически превосходящей, была побита в космос своим врагом холодной войны. Президент Эйзенхауэр основал ARPA (позже переименованную в DARPA) с единственным мандатом: \u003cstrong\u003eгарантировать, что Соединенные Штаты больше никогда не будут застигнуты врасплох технологическим сюрпризом.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eЭтот мандат никогда не менялся. Но то, что он произвел, является ошеломляющим по масштабам.\u003c/p\u003e\n\u003cp\u003eDARPA работает с бюджетом примерно в 4 миллиарда долларов в год — скромные по стандартам Пентагона, но развертываемые с необычайным рычагом. Агентство не строит оружие само. Вместо этого оно финансирует исследования в университетах, частных компаниях и национальных лабораториях, действуя как венчурный капитал для военно-промышленного комплекса. Оно определяет технологии двадцать-тридцать лет до того, как они станут мейнстримом, посеивает их развитие и затем передает их военным, разведывательным агентствам и в конечном итоге — частному сектору.\u003c/p\u003e\n\u003cp\u003eОрганизационная структура DARPA намеренно плоская и непрозрачна. Менеджерам программ дается широкая свобода и минимальный надзор. Проекты разделены. Финансирование течет через слои посредников. Результат — агентство, которое тихо сформировало современный мир больше, чем любая корпорация, правительственный департамент или компания технологии — оставаясь почти полностью неизвестным общественности.\u003c/p\u003e\n\u003ch3 id=\"ключевой-принцип\"\u003eКлючевой принцип\u003c/h3\u003e\n\u003cp\u003eОбразец всегда один и тот же: \u003cstrong\u003eвоенные разрабатывают это, разведка вооружает это, и затем частный сектор продает вам это обратно как потребительский продукт.\u003c/strong\u003e Ко времени, когда вы держите это в своей руке — ваш смартфон, ваш GPS, ваша лента социальной сети, ваша инъекция мРНК — она уже служила своей основной цели как инструмент войны, наблюдения или контроля.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"технологии-рожденные-из-darpa\"\u003eТехнологии, рожденные из DARPA\u003c/h2\u003e\n\u003cp\u003eСписок технологий, которые восходят своим происхождением к финансированию DARPA, — это не сборка периферийного военного гаджета. Это основа современной цивилизации.\u003c/p\u003e\n\u003ch3 id=\"arpanet-в-интернет\"\u003eARPANET в интернет\u003c/h3\u003e\n\u003cp\u003eВ 1969 году DARPA (тогда ARPA) создала ARPANET — компьютерную сеть, предназначенную для поддержания военных коммуникаций во время ядерной атаки. Сеть соединила четыре университетских узла и использовала технологию коммутации пакетов, которая стала бы основой современного интернета.\u003c/p\u003e\n\u003cp\u003eК 1990-м годам ARPANET эволюционировала в интернет. Всемирная паутина была построена на вершине этого. Каждое письмо, которое вы отправляете, каждый веб-сайт, который вы посещаете, каждая финансовая транзакция, которую вы проводите в режиме онлайн — все это работает на инфраструктуре, которая была разработана, во-первых и главным образом, как военная система коммуникации, построенная для выживания ядерной войны.\u003c/p\u003e\n\u003cp\u003eИнтернет был не изобретен предпринимателями Кремниевой долины в гаражах. Его изобрел Пентагон.\u003c/p\u003e\n\u003ch3 id=\"gps-глобальная-система-позиционирования\"\u003eGPS (Глобальная система позиционирования)\u003c/h3\u003e\n\u003cp\u003eGPS был разработан Министерством обороны США в 1970-х годах как система наведения оружия с высокой точностью. Созвездие из 24 спутников (теперь 31) было разработано для наведения ракет и бомб на их цели с точностью на уровне метра.\u003c/p\u003e\n\u003cp\u003eВ 1983 году, после того как Советский Союз сбил рейс Korean Air Lines 007 — который заблудился в советском воздушном пространстве частично из-за ошибки навигации — президент Рейган приказал сделать GPS доступной для гражданского использования. Но военные сохранили способность деградировать гражданский сигнал (Selective Availability) до 2000 года.\u003c/p\u003e\n\u003cp\u003eКаждое приложение вызова совместного использования, сервис доставки пищи, трекер фитнеса и система навигации на вашем телефоне использует систему целеуказания оружия, которую военные любезно позволили гражданам получить доступ — при этом сохраняя способность отключить ее, деградировать ее или подделать ее по своему усмотрению.\u003c/p\u003e\n\u003ch3 id=\"siri-alexa-и-распознавание-голоса\"\u003eSiri, Alexa и распознавание голоса\u003c/h3\u003e\n\u003cp\u003eSiri, голосовой помощник Apple, был прямым побочным продуктом проекта DARPA CALO (Cognitive Assistant that Learns and Organizes), самого крупного проекта искусственного интеллекта в истории США на момент его финансирования. CALO был разработан SRI International с финансированием DARPA в рамках программы PAL (Perceptive Agent that Learns), предназначенной для создания помощника AI для военного персонала.\u003c/p\u003e\n\u003cp\u003eSRI выделила технологию как коммерческий продукт. Apple приобрела ее в 2010 году. К 2011 году сотни миллионов людей говорили с военным проектом AI, не зная об этом.\u003c/p\u003e\n\u003cp\u003eТехнология распознавания голоса, лежащая в основе Amazon Alexa и Google Assistant, следовала аналогичным путям — академические исследования, финансируемые военными и разведывательными грантами, коммерциализированные для массового внедрения, создавая сеть постоянно слушающих устройств в домах по всему миру.\u003c/p\u003e\n\u003ch3 id=\"социальные-сети-и-информационная-война\"\u003eСоциальные сети и информационная война\u003c/h3\u003e\n\u003cp\u003eРаннее финансирование Facebook включало инвестиции от In-Q-Tel, венчурного капитального подразделения CIA. Google получал финансирование семян через программы с подключениями к разведывательному сообществу. Программа Total Information Awareness — инициатива DARPA после 11 сентября по наблюдению, которая была публично дефинансирована после возмущений в СМИ в 2003 году — не исчезла. Ее компоненты были разбросаны по секретным программам и, как документировано в нашей статье о \u003ca href=\"/total-information-awareness/?lang=ru\"\u003eTotal Information Awareness\u003c/a\u003e, тихо переработаны в частном секторе.\u003c/p\u003e\n\u003cp\u003eПлатформы социальных сетей — это не нейтральные инструменты коммуникации. Это платформы информационной войны, которые позволяют массовый сбор поведенческих данных, психологическое профилирование и контроль повествования — возможности, которые разведывательное сообщество развивало в течение десятилетий и миллиардов до того, как общественность когда-либо услышала слова \"социальные сети\".\u003c/p\u003e\n\u003ch3 id=\"технология-мрнк-и-moderna\"\u003eТехнология мРНК и Moderna\u003c/h3\u003e\n\u003cp\u003eЗдесь маршрут становится наиболее важным.\u003c/p\u003e\n\u003cp\u003eDARPA финансирует исследования мРНК и генетической медицины, по крайней мере, с 2011 года через свой Biological Technologies Office (BTO). Программа ADEPT агентства (Autonomous Diagnostics to Enable Prevention and Therapeutics) специально финансирует разработку контрмер на основе мРНК на медицинскую основу — быстрое развертывание генетических методов лечения биологических угроз.\u003c/p\u003e\n\u003cp\u003eModerna, основанная в 2010 году, получила значительное раннее финансирование от DARPA. В 2013 году DARPA присудила Moderna примерно 25 миллионов долларов на развитие терапевтики на основе мРНК в качестве медицинских контрмер против биологического оружия. Это не было раскрыто заметно во время развертывания 2020 года.\u003c/p\u003e\n\u003cp\u003eКогда пандемия пришла в 2020 году, платформа мРНК Moderna — разработанная с финансированием DARPA в целях военной биозащиты — была переориентирована как гражданский общественный продукт здравоохранения. Скорость развития, которая была представлена публике как \"чудо науки\", была в действительности активацией военной платформы, находившейся в разработке в течение почти десяти лет.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/images/articles/darpa-dark-winter-military-origins/img-1.jpg\" alt=\"Документирование Kingston относительно бюджета синтетической биологии DARPA в 4,1 миллиарда долларов и трубопровода от военного к потребителю\"\u003e\u003c/p\u003e\n\u003cp\u003eКарен Кингстон, аналитик биотехнологии и бывший инсайдер фармацевтической отрасли, обширно задокументировала эту связь на своем Substack (karenkingston.substack.com). Ее статья \"Crime Pays: DARPA's $4.1 Billion Synthetic Biology Budget\" детализирует чрезвычайный масштаб военных инвестиций в синтетическую биологию — инженерию живых организмов — и трубопровод, через который эти технологии переходят от секретных военных программ к \"здоровъю\" продуктам, ориентированным на потребителя.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"темная-зима-генеральная-репетиция\"\u003eТемная зима: Генеральная репетиция\u003c/h2\u003e\n\u003cp\u003e22-23 июня 2001 года — менее чем за три месяца до атак 11 сентября — группа старших государственных чиновников, военных лидеров и политических экспертов собралась на базе ВВС Эндрюс для настольного упражнения, названного \u003cstrong\u003eDark Winter\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eУпражнение моделировало скрытую атаку биологического оружия оспой на Соединенные Штаты. Сценарий начался с обнаружения случаев оспы в Оклахома-Сити, затем эскалировалась через распространение между штатами, крах системы больниц, нехватку вакцин, принуждение к карантину, дебаты о военном положении и в конечном итоге — распад конституционного управления.\u003c/p\u003e\n\u003ch3 id=\"участники\"\u003eУчастники\u003c/h3\u003e\n\u003cp\u003eDark Winter была разработана Johns Hopkins Center for Civilian Biodefense Strategies (теперь Johns Hopkins Center for Health Security — та же учреждение, которое позже будет принимать Event 201 в октябре 2019), Center for Strategic and International Studies (CSIS) и ANSER Institute for Homeland Security.\u003c/p\u003e\n\u003cp\u003eИгроков включали:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSam Nunn\u003c/strong\u003e — бывший сенатор США, исполняющий роль президента\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDavid Gergen\u003c/strong\u003e — советник президента четырем администрациям\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJames Woolsey\u003c/strong\u003e — бывший директор CIA\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFrank Keating\u003c/strong\u003e — тогдашний губернатор Оклахомы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTara O'Toole\u003c/strong\u003e — которая впоследствии станет Under Secretary for Science and Technology at Department of Homeland Security\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто были не академики, играющие в военные игры. Это были лица, принимающие решения, репетирующие протоколы управления биологической атакой.\u003c/p\u003e\n\u003ch3 id=\"находки\"\u003eНаходки\u003c/h3\u003e\n\u003cp\u003eВыводы Dark Winter были жесткими:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eСоединенные Штаты не имели надлежащего плана\u003c/strong\u003e ответить на атаку биологического оружия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГражданские свободы пришлось бы приостановить\u003c/strong\u003e — включая свободу движения, собрания и потенциально свободу прессы — для сдерживания биологической вспышки\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОбязательная вакцинация\u003c/strong\u003e требовалась бы, и сопротивление пришлось бы управлять юридическим и потенциально военным силой\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФедеральное правительство пришлось бы принять чрезвычайные полномочия\u003c/strong\u003e, эффективно приостановив нормальное конституционное управление\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКонтроль информации\u003c/strong\u003e был выявлен как критический — управление восприятием общественности и предотвращение \"дезинформации\" от подрывания соответствия\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭто звучит знакомо?\u003c/p\u003e\n\u003cp\u003eDark Winter была проведена в июне 2001 года. Три месяца спустя атаки сибирской язвы начались — письма, содержащие боевую сибирскую язву спорами, отправленные в офисы СМИ и сенаторам США. Атаки были в конечном итоге приписаны Брюсу Ивинсу, исследователю в U.S. Army Medical Research Institute of Infectious Diseases (USAMRIID) — правительственной лаборатории биозащиты. Атаки ускорили принятие PATRIOT Act, создание Департамента внутренней безопасности и массивное расширение финансирования биозащиты, которое в конечном итоге питало программы DARPA ADEPT и платформу мРНК Moderna.\u003c/p\u003e\n\u003cp\u003eКак детализировано в нашей статье о \u003ca href=\"/event-201-pandemic-blueprint/?lang=ru\"\u003eEvent 201: The Pandemic Blueprint That Came True\u003c/a\u003e, паттерн симуляции, предшествующей реальности, повторился в 2019 году, когда Johns Hopkins провела еще одно упражнение на столе по пандемии — на этот раз моделирующее новый коронавирус — за несколько недель до начала фактической пандемии.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/images/articles/darpa-dark-winter-military-origins/img-2.jpg\" alt=\"Are public health policies and synthetic biology now stranger than fiction?\"\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"darpas-биологические-программы\"\u003eDARPA's биологические программы\u003c/h2\u003e\n\u003cp\u003eИнвестиции DARPA в биологические технологии ускорились драматически с 2014 года, когда агентство установило свой \u003cstrong\u003eBiological Technologies Office (BTO)\u003c/strong\u003e как отдельное подразделение. Программы BTO читаются как каталог технологий, которые должны беспокоить любого, кто ценит телесную автономию.\u003c/p\u003e\n\u003ch3 id=\"adept-autonomous-diagnostics-to-enable-prevention-and-therapeutics\"\u003eADEPT (Autonomous Diagnostics to Enable Prevention and Therapeutics)\u003c/h3\u003e\n\u003cp\u003eЗапущенный в 2012 году, целью ADEPT является разработка быстрых медицинских контрмер против биологических угроз — включая \u003cstrong\u003eгенетические контрмеры\u003c/strong\u003e, которые могут быть разработаны и развернуты в течение дней от выявления нового патогена. Это программа, которая финансировала технологию платформы мРНК. Она рассматривает человеческое тело как биологическую машину, которая должна быть запрограммирована с генетическими инструкциями, доставляемыми через инъекционные платформы.\u003c/p\u003e\n\u003ch3 id=\"preempt-preventing-emerging-pathogenic-threats\"\u003ePREEMPT (PREventing EMerging Pathogenic Threats)\u003c/h3\u003e\n\u003cp\u003ePREEMPT нацелена на \u003cstrong\u003eпредотвращение событий вирусного пролива\u003c/strong\u003e — передачи вирусов от популяций животных к людям — путем вмешательства в популяции животных непосредственно. Программа финансирует исследования в \u003cstrong\u003eсамораспространяющихся вакцинах\u003c/strong\u003e — вакцинах, спроектированных для передачи от животного к животному (и потенциально от человека к человеку) без необходимости индивидуального введения.\u003c/p\u003e\n\u003cp\u003eПоследствия экстраординарны. Самораспространяющаяся вакцина полностью исключает информированное согласие. Вы не выбираете получить это. Это распространяется на вас — по замыслу.\u003c/p\u003e\n\u003ch3 id=\"n3-next-generation-nonsurgical-neurotechnology\"\u003eN3 (Next-Generation Nonsurgical Neurotechnology)\u003c/h3\u003e\n\u003cp\u003eN3 нацелена на разработку интерфейсов мозг-компьютер, которые \u003cstrong\u003eне требуют хирургического имплантирования\u003c/strong\u003e. Программа финансирует исследования внешних устройств, инъекционных нейронных интерфейсов и подходов на основе нанотехнологии, которые могут читать и писать в нейротканью без вскрытия черепа.\u003c/p\u003e\n\u003cp\u003eКак обсуждается в нашей статье о \u003ca href=\"/neuralink-merge-man-machine/?lang=ru\"\u003eNeuralink and the Race to Merge Man with Machine\u003c/a\u003e, хирургический подход Neuralink, возможно, уже устарел. Программа N3 DARPA разрабатывает интерфейсы, которые могли бы быть доставлены через инъекцию — неотличимые от медицинской процедуры — а не операция.\u003c/p\u003e\n\u003ch3 id=\"nesd-neural-engineering-system-design\"\u003eNESD (Neural Engineering System Design)\u003c/h3\u003e\n\u003cp\u003eЗапущенное в 2016 году — том же году, когда Илон Маск основал Neuralink — NESD нацелено на создание имплантируемого интерфейса мозга, способного общаться с \u003cstrong\u003eодин миллион нейронов одновременно\u003c/strong\u003e. Текущие коммерческие BCI общаются с тысячами. NESD представляет квантовый скачок в способности читать и писать в человеческий мозг в масштабе.\u003c/p\u003e\n\u003ch3 id=\"tnt-targeted-neuroplasticity-training\"\u003eTNT (Targeted Neuroplasticity Training)\u003c/h3\u003e\n\u003cp\u003eTNT использует нейральную стимуляцию — электрическую и химическую — чтобы \u003cstrong\u003eускорить обучение\u003c/strong\u003e в военном персонале. Путем стимулирования конкретных областей мозга во время обучения, программа нацелена на резкое сжатие времени, требуемого для приобретения сложных навыков, как беглость на иностранных языках, точность стрельбы или криптанализ.\u003c/p\u003e\n\u003cp\u003eГражданское применение очевидно: популяция, чьи способности обучения, поведение и когнитивные паттерны могут быть сформированы через целевую нейральную стимуляцию. Сегодня это ускорение военной подготовки. Завтра это оптимизирует производительность труда. День после этого, это управляет несогласием.\u003c/p\u003e\n\u003ch3 id=\"insect-allies\"\u003eInsect Allies\u003c/h3\u003e\n\u003cp\u003eВозможно, наиболее тревожная программа DARPA — это \u003cstrong\u003eInsect Allies\u003c/strong\u003e, которая использует генетически модифицированных насекомых для доставки спроектированных вирусов в культуры в сельскохозяйственных полях. Заявленная цель является оборонительной — защита американского земледелия от биологических угроз. Но коалиция европейских ученых опубликовала статью в \u003cem\u003eScience\u003c/em\u003e в 2018 году предупреждая, что Insect Allies — по определению \u003cstrong\u003eсистема доставки биологического оружия\u003c/strong\u003e. Технология для \"защиты\" культур с переносящими вирусы насекомыми неотличима от технологии для их разрушения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"трубопровод-от-военного-к-потребителю\"\u003eТрубопровод от военного к потребителю\u003c/h2\u003e\n\u003cp\u003eПередача военной технологии на потребительский рынок — это не несчастный случай или побочный продукт. Это система, работающая в соответствии с дизайном.\u003c/p\u003e\n\u003cp\u003eВот как это работает:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eDARPA определяет разрыв возможностей\u003c/strong\u003e — что-то, что военные нужны, но нет\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDARPA финансирует исследования\u003c/strong\u003e в университетах и частных компаниях, часто через посредников, которые закрывают военное соединение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТехнология созревает\u003c/strong\u003e в секретных или полусекретных окружениях в течение десяти-двадцати лет\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТехнология расстегивается\u003c/strong\u003e или передается частному сектору через компании-спин-офф, лицензионные соглашения или венчурный капитал разведывательного сообщества (In-Q-Tel)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧастный сектор маркирует это\u003c/strong\u003e как инновация, изобретение, прорыв — без упоминания военного происхождения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПотребители массово внедряют это\u003c/strong\u003e, строя свою жизнь вокруг технологии, разработанной для войны и наблюдения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДанные и инфраструктура, созданные потребительским внедрением\u003c/strong\u003e вспять потоков в военные и разведывательные сообщества, завершая цикл\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eСмартфон в вашем кармане — это наиболее успешная платформа сбора военной разведки, когда-либо развернутая. Он объединяет GPS-целеуказание (военные), связность интернета (военные), голосовой анализ AI (военные), видеонаблюдение камеры, биометрические датчики, мониторинг финансовых транзакций, картирование социального графика, алгоритмы предсказания поведения и постоянное отслеживание местоположения — все это завернуто в гладкий потребительский пакет, который люди добровольно носят везде, спят рядом и проверяют 150 раз в день.\u003c/p\u003e\n\u003cp\u003eНикакое разведывательное агентство в истории не смогло мечтать об аппарате наблюдения столь всеобъемлющим. И общественность платила за это сами — 1000 долларов за раз.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"программы-darpa-по-интерфейсам-мозг-компьютер\"\u003eПрограммы DARPA по интерфейсам мозг-компьютер\u003c/h2\u003e\n\u003cp\u003eКонвергенция программ нейротехнологии DARPA требует особого внимания, потому что она представляет последний рубеж передачи технологии от военного к потребителю — тот, который нацелен не на вашу локацию, не на вашу коммуникацию, не на ваши финансы, но на ваши мысли.\u003c/p\u003e\n\u003cp\u003eТри программы образуют ядро усилия:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNESD\u003c/strong\u003e разрабатывает оборудование — имплантируемые интерфейсы, способные общаться с одним миллион нейронов. \u003cstrong\u003eN3\u003c/strong\u003e разрабатывает механизм доставки — нехирургические методы доступа мозга, включая инъекционные технологии. \u003cstrong\u003eTNT\u003c/strong\u003e разрабатывает приложение — использование нейральной стимуляции для изменения обучения, поведения и познания.\u003c/p\u003e\n\u003cp\u003eВместе эти программы описывают полную систему для \u003cstrong\u003eчтения и записи в человеческий мозг без операции, в масштабе, через методы, которые могут быть замаскированы как рутинные медицинские процедуры.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eКогда Илон Маск основал Neuralink в 2016 году — том же году DARPA запустил NESD — он не был пионером на новой территории. Он был коммерциализацией технологии, которую военные разрабатывали больше десяти лет. Объявление Neuralink привлекло внимание общественности, освещение в СМИ и возбуждение потребителей к возможности, которую Пентагон тихо строил в секретных программах.\u003c/p\u003e\n\u003cp\u003eЭто трубопровод в работе. Военные разрабатывают это. Частный сектор прославляет это. Общественность требует это. И к тому времени, когда люди осознают, что они пригласили в свои черепа, инфраструктура контроля уже на месте.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вращающаяся-дверь\"\u003eВращающаяся дверь\u003c/h2\u003e\n\u003cp\u003eДвижение персонала между DARPA, Big Tech и Big Pharma — это не совпадение. Это стратегия кадров.\u003c/p\u003e\n\u003cp\u003eРассмотрите образец:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRegina Dugan\u003c/strong\u003e служила директором DARPA с 2009-2012, затем стала старшим руководителем \u003cstrong\u003eGoogle\u003c/strong\u003e, ведя подразделение Advanced Technology and Projects (ATAP) компании, затем переехала на \u003cstrong\u003eFacebook\u003c/strong\u003e для ведения их секретного подразделения Building 8 — который разрабатывал технологию интерфейса мозг-компьютер\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDan Kaufman\u003c/strong\u003e, директор DARPA's Information Innovation Office, уехал, чтобы стать \u003cstrong\u003eGoogle's\u003c/strong\u003e главой передовой технологии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAnthony Tether\u003c/strong\u003e, директор DARPA с 2001-2009, надзирал за взрывом наблюдения и биозащиты после 9/11, прежде чем вернуться в частный сектор\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVictoria Coleman\u003c/strong\u003e, бывший директор DARPA's Defense Sciences, переехала на \u003cstrong\u003eApple\u003c/strong\u003e в качестве VP инженерии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKaigham Gabriel\u003c/strong\u003e, бывший заместитель директора DARPA, стал президентом \u003cstrong\u003eCharles Stark Draper Laboratory\u003c/strong\u003e, основного оборонного подрядчика\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eФармацевтическая сторона не менее переплетена. Менеджеры программ DARPA переходят в биотехнологические компании. Руководители фармацевтической отрасли служат на консультативных советах по защите. BARDA (Biomedical Advanced Research and Development Authority) работает как мост между военной биозащитой и гражданским фармацевтическим распределением — то же самое BARDA, которое управляло финансированием и закупками продуктов мРНК во время пандемии.\u003c/p\u003e\n\u003cp\u003eЭто не вращающаяся дверь в традиционном смысле этого термина. Вращающаяся дверь подразумевает разделение между объектами — люди уезжают из одного и входят в другой. То, что существует между DARPA, Big Tech и Big Pharma, более точно описывается как \u003cstrong\u003eединый организм с множеством лиц\u003c/strong\u003e. Те же люди, те же повестки дня, те же технологии просто переходят между организационными метками в то время как программа продолжается прерывисто.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон обширно задокументировала эту динамику, показав, как инвестиции DARPA в синтетическую биологию текут через BARDA, через фармацевтические компании, через нормативный аппарат FDA и в человеческие тела — все управляется сетью чиновников, которые ротируют между агентствами, регуляторами и компаниями, которые они должны регулировать. Ее работа на karenkingston.substack.com прослеживает конкретные линии бюджета, номера контрактов и движения персонала, которые раскрывают военно-фармацевтический комплекс как единую операцию.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вопрос-в-41-миллиарда-долларов\"\u003eВопрос в 4,1 миллиарда долларов\u003c/h2\u003e\n\u003cp\u003eТолько бюджет синтетической биологии DARPA — деньги, выделенные на инженерию живых организмов — достиг 4,1 миллиарда долларов в недавних финансовых циклах. Чтобы поставить это в перспективу, один бюджет превышает всю биотехнологию исследований трат больше всех наций на земле.\u003c/p\u003e\n\u003cp\u003eЧто они строят с 4,1 миллиардом долларов в финансировании синтетической биологии?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСпроектированные организмы\u003c/strong\u003e способны производить материалы, топливо и фармацевтику\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСамораспространяющиеся биологические агенты\u003c/strong\u003e которые передаются через популяции без индивидуального введения\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБиологические системы наблюдения\u003c/strong\u003e используя спроектированные организмы как датчики окружающей среды\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТехнология gene drive\u003c/strong\u003e способна изменить или исключить целые виды в дикой природе\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСинтетические генные цепи\u003c/strong\u003e которые могут быть запрограммированы для активации при конкретных условиях внутри живых организмов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТехнология платформы мРНК\u003c/strong\u003e способна быстро производить генетические инструкции для инъекции в человеческие популяции\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не здравоохранение. Это инженерия жизни как военная возможность. Когда агентство, ответственное за создание интернета, GPS и голосового распознавания AI, обращает внимание на \u003cstrong\u003eпрограммирование биологии\u003c/strong\u003e, последствия не спекулятивны. Они являются следующей фазой того же трубопровода, который уже переформировал каждый аспект современного существования.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"законченный-образец\"\u003eЗаконченный образец\u003c/h2\u003e\n\u003cp\u003eОтступить достаточно далеко, и образец становится неошибаемым.\u003c/p\u003e\n\u003cp\u003eКаждая технология, которая определяет современную жизнь — как мы общаемся, как мы ориентируемся, как мы делаем покупки, как мы учимся, как мы лечимся медицински, как мы контролируемся — возникла в военных программах, разработанных для войны, разведывательного сбора и контроля населения.\u003c/p\u003e\n\u003cp\u003eИнтернет: военные коммуникации. GPS: целеуказание оружия. Социальные сети: информационная война. Смартфоны: платформы сбора разведки. Технология мРНК: контрмеры биозащиты. Интерфейсы мозг-компьютер: инструменты когнитивной войны. Самораспространяющиеся вакцины: системы доставки биологического оружия, переориентированные как меры общественного здравоохранения.\u003c/p\u003e\n\u003cp\u003eНикакое из этого не было построено служить вам. Это было построено служить интересам военно-промышленного комплекса, разведывательного сообщества и фармацевтико-оборонного аппарата. Вам было позволено использовать это — и используя это, вы стали одновременно потребителем и продуктом, генерируя данные, строя сетевые эффекты и создавая зависимости, которые делают систему неизбежной.\u003c/p\u003e\n\u003cp\u003eЭто то, как организованная оппозиция выглядит. Не хаос. Не случайность. Иерархия. Стратегия. Начальства, власти и мироправители тьмы действуют через слои разделения — каждый слой служит тому, который выше него, каждый участник верит, что служит благородной цели, полная картина видна только с вершины.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eПроследить происхождение.\u003c/strong\u003e Прежде чем вы приемлете любую технологию, исследуйте, откуда она пришла. Трубопровод от военного к потребителю хорошо задокументирован. Для чего это было первоначально построено?\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПонимать бизнес-модель.\u003c/strong\u003e Если продукт бесплатный, вы — продукт. Если продукт обязателен, вы — цель.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОхранять вашу биологию.\u003c/strong\u003e Ваше тело — это не платформа, которая должна быть запрограммирована. Отклоните предпосылку, что разработанные военными генетические технологии должны быть введены гражданским популяциям под баннером общественного здравоохранения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОхранять ваш ум.\u003c/strong\u003e То же агентство, которое построило интернет, теперь строит интерфейсы мозг-компьютер. Траектория понятна. Защитите вашу когнитивную суверенность так же ярко, как вы защищали бы свой дом.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПредупредите других.\u003c/strong\u003e Поделитесь этой информацией. Разделение работает только когда люди видят каждую технологию в изоляции. Соедините точки для тех, кто вокруг вас.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\
