имают вид служителей правды; но конец их будет по делам их.\"\u003c/em\u003e — 2 Коринфянам 11:14-15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eАпостол Павел предупредил раннюю церковь, что самое эффективное оружие противника — это не грубая сила, а маскировка. Сатана не появляется как рогатый монстр, требующий поклонения. Он появляется как ангел света — сияющий, убедительный, кажущийся святым. И его служители делают то же самое. Они преобразуются в служителей правды. Они носят одежды верных. Они говорят язык преданности. Они занимают кафедры, семинарии и высшие должности церкви. Их маскировка настолько совершенна, что только духовное различение может проникнуть сквозь неё.\u003c/p\u003e\n\u003cp\u003eВ 1534 году человек, названный Игнатием Лойолой, собрал шестерых спутников в крипте под церковью в Париже и основал то, что станет наиболее мощным религиозным орденом в истории — Общество иезуитов. На поверхности это было общество, посвящённое большей славе Бога. На практике, как раскрывает документальный фильм \u003cem\u003eCatholic Confidential\u003c/em\u003e, это была военная организация, посвящённая абсолютной мощи — мощи над людьми, над нациями, над всем миром. Инструкции, оставленные Лойолой и расширенные его преемниками, описывают систему инфильтрации, манипуляции и контроля настолько полную, что она заставляет каждое современное агентство разведки выглядеть любительским в сравнении.\u003c/p\u003e\n\u003cp\u003eАльбом Confliction захватывает эту духовную реальность. Наиболее опасные агенты противника — это не те, которые противостоят церкви извне, а те, которые инфильтрируют её изнутри, надевая маскировку праведности, служа полностью другому хозяину.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМаскировка сатаны — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eВраг внутри — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"человек-который-построил-машину\"\u003eЧеловек, который построил машину\u003c/h2\u003e\n\u003ch3 id=\"игнатий-лойола-боец-ставший-генералом\"\u003eИгнатий Лойола: Боец, ставший генералом\u003c/h3\u003e\n\u003cp\u003eИгнатий Лойола (1491-1556) был не теологом. Он был боцом. Родённый Inigo Lopez de Recalde в благородную баскскую семью, он провёл свою молодость как придворный и воин, посвящённый военной славе и романтическому завоеванию. В 1521 году пушечное ядро разбило его ногу во время Битвы Памплоны. Во время его долгого выздоровления он читал единственные доступные книги — жизнь Христа и сборник жизней святых — и испытал то, что он описал как духовное обращение.\u003c/p\u003e\n\u003cp\u003eНо обращение не стёрло боца. Оно переориентировало его. Где Лойола когда-то искал военной славы для испанской коронй, теперь он искал духовного завоевания для того, что он понимал как католическую церковь. Его \u003cem\u003eДуховные упражнения\u003c/em\u003e, написанные во время периода интенсивного аскетизма в пещере в Манреса, стали основной учебной программой для его нового общества. Эти упражнения были не просто молитвами или размышлениями. Это была систематическая программа психологического кондиционирования, разработанная для производства абсолютного послушания начальнику — форма духовного учебного центра, которая разрушила индивидуальную волю и перестроила её как инструмент организации.\u003c/p\u003e\n\u003cp\u003eОбщество иезуитов получило папское одобрение от папы Павла III в 1540 году, и Лойола стал его первым Генеральным главой. С начала структура была военной, а не монастырской. Члены не уходили в монастыри. Они были развёрнуты в мир — в суды, университеты, миссионерские территории и каждое учреждение, где мощь могла быть получена и влияние осуществлено. Иезуиты были, с их основания, армией в клерикальных одеждах.\u003c/p\u003e\n\u003ch3 id=\"инструкция-абсолютного-послушания\"\u003eИнструкция абсолютного послушания\u003c/h3\u003e\n\u003cp\u003eНаиболее раскрывающий аспект инструкций Лойолы — это его требование полного, безвопросного послушания. Его слова, сохранённые в Иезуитских конституциях и его письмах, экстраординарны в их абсолютизме:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Отставив всё личное суждение, мы всегда должны быть готовы принять это принцип: Я буду верить, что белое, которое я вижу, черно, если иерархическая церковь это определит.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЭто не метафора. Это не преувеличение. Это фундаментальный оперативный принцип наиболее мощного религиозного ордена в истории. От иезуита требуется верить — не просто говорить, но верить — что белое черно, если его начальник это приказывает. Личное суждение не просто обескураживается. Это отменяется. Индивидуальный ум полностью подчиняется организации. То, что говорит начальник, является реальностью. То, что церковь определяет, является истиной. Личное восприятие, разум, доказательства, совесть — всё подчинено команде авторитета.\u003c/p\u003e\n\u003cp\u003eЭтот принцип имеет глубокие последствия. Организация, чьи члены искренне верят, что белое черно, когда им это говорят, способна на всё. Нет моральных пределов, нет этических границ, нет преступления, которое не может быть совершено, когда индивидуальная совесть была полностью заменена институциональной командой. Убийство становится достойным. Обман становится долгом. Наиболее чудовищные акты становятся актами святости, когда начальник их объявляет.\u003c/p\u003e\n\u003ch3 id=\"perinde-ac-cadaver\"\u003ePerinde Ac Cadaver\u003c/h3\u003e\n\u003cp\u003eТребование Лойолы пошло дальше. Он требовал, чтобы его последователи были \"perinde ac cadaver\" — как труп. Труп не сопротивляется. Труп не вопрошает. Труп идёт туда, где его помещают, и делает, что с ним делают, без жалоб. Это был идеальный иезуит: человеческое существо, сведённое к послушанию мёртвого тела, одушевлённое только волей Генерального главы.\u003c/p\u003e\n\u003cp\u003eЭто не послушание ученика учителю. Это не послушание солдата офицеру. Это послушание раба хозяину — послушание настолько полное, что оно исключает саму концепцию индивидуального \"я\". Иезуит не служит Богу через осуществление своего Богом данного разума и совести. Он служит организации через аннулирование обоих.\u003c/p\u003e\n\u003ch2 id=\"инструкции-для-мировой-инфильтрации\"\u003eИнструкции для мировой инфильтрации\u003c/h2\u003e\n\u003ch3 id=\"завоевание-мощи-над-принцами\"\u003eЗавоевание мощи над принцами\u003c/h3\u003e\n\u003cp\u003eИезуитские инструкции, как раскрыто в \u003cem\u003eCatholic Confidential\u003c/em\u003e, описывают систематическую стратегию завоевания контроля над правящим классом. Это не неясные стремления. Это детальные оперативные директивы:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Завоюйте превосходство над принцами, дворянами и магистратами каждого места, чтобы они были готовы к нашему зову, даже чтобы пожертвовать своими ближайшими отношениями и наиболее интимными друзьями, когда мы скажем, что это для нашего интереса и преимущества.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЦель не просто влияние. Это абсолютный контроль — контроль настолько полный, что те, на кого влияют иезуиты, будут жертвовать своими собственными семьями по команде. Метод — систематическое культивирование: идентифицируйте мощных, завоюйте их доверие, станьте незаменимым, и затем используйте эту позицию для направления их действий. Принц верит, что он принимает свои собственные решения. В реальности каждое решение было сформировано иезуитом у его уха.\u003c/p\u003e\n\u003cp\u003eИнструкции продолжаются с директивой по управлению этим отношением:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Принцы и люди различия везде должны управляться всеми средствами, чтобы мы могли иметь их слух, и это легко обеспечит их сердца.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eСлух приходит первым. Затем сердце. Это точное описание психологической манипуляции — начните с того, чтобы стать доверенным советником, конфидентом, тем, чей совет ищется по каждому вопросу. Как только у вас есть слух, сердце следует естественно. Принц становится эмоционально зависимым от своего иезуитского советника. Он не может воображать принятие решения без консультации с человеком, который стал его наиболее доверенным другом. И этот человек служит не принцу, а Обществу.\u003c/p\u003e\n\u003ch3 id=\"стратегия-невидимой-замены\"\u003eСтратегия невидимой замены\u003c/h3\u003e\n\u003cp\u003eПожалуй, наиболее леденящая инструкция касается замены тех, кто умирает в позициях мощи:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Немедленно при смерти любого человека на должности, позаботьтесь о том, чтобы своевременно добыть какого-нибудь друга нашего общества, предпочитаемого на его место. Но это должно быть замаскировано таким хитростью и управлением, чтобы избежать малейшего подозрения в нашем намерении узурпировать мощь принца.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЭто стратегия невидимой инфильтрации. Когда позиция мощи становится вакантной — через смерть, отставку или удаление — иезуиты немедленно движутся, чтобы её заполнить своим собственным или сочувствующим. Но это делается с такой умелостью, что никто не подозревает, что замена — часть скоординированной кампании. Каждое индивидуальное назначение кажется естественным, даже удачным. Паттерн становится видимым только, когда вы отступаете и видите всю картину: позиция за позицией, учреждение за учреждением, заполняемые людьми, верными Обществу.\u003c/p\u003e\n\u003cp\u003eЭта стратегия объясняет, как иезуиты сохранили влияние на столетия. Они не открыто захватывают мощь. Они заполняют вакансии. Они заменяют вышедших на пенсию. Они наставляют восходящих. С течением времени каждое учреждение, которое имеет значение — каждый суд, каждый университет, каждая семинария, каждый государственный департамент — приходит под их влияние, не через революцию, но через терпеливую, невидимую замену.\u003c/p\u003e\n\u003ch2 id=\"когда-преступление-становится-добродетелью\"\u003eКогда преступление становится добродетелью\u003c/h2\u003e\n\u003ch3 id=\"доктрина-заслуженного-греха\"\u003eДоктрина заслуженного греха\u003c/h3\u003e\n\u003cp\u003eНаиболее тревожный элемент иезуитской системы — это доктрина, что любое преступление становится \"заслуженным\", если совершено для интереса Общества или по приказу Генерального главы. Это не умозаключение, нарисованное критиками. Это внутренняя логика системы, построенной на абсолютном послушании и аннулировании личного суждения.\u003c/p\u003e\n\u003cp\u003eЕсли индивидуальный иезуит не имеет права на личное суждение — если он должен верить, что белое черно, когда ему это говорят — тогда он не имеет основания для морального возражения к любой команде. Если Генеральный главнейший приказывает убийство, иезуит, который его выполняет, не совершает убийство. Он исполняет заслуженный акт послушания. Если Генеральный главнейший приказывает разрушение нации, иезуиты, которые его облегчают, не совершают государственную измену. Они служат большей славе Бога, как определено Обществом.\u003c/p\u003e\n\u003cp\u003eЭта доктрина трансформирует иезуитский орден в что-то уникальное в истории: организация, которая может приказать любое действие без морального предела, кадрирован людьми, которые были подготовлены, чтобы выполнить любую команду без морального колебания. Комбинация абсолютной авторитета на вершине и абсолютного послушания внизу создаёт инструмент мощи, который никакая светская организация никогда не совпадала.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n
