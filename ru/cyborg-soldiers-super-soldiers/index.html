 6:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНефилимы Бытия 6 были не обычными воинами. Они были сверхчеловеческими существами — потомством упавших ангелов, которые покинули свой должный доминион и взяли людей в жёны. Результирующие гибриды были \"сильными людьми древних времён, людьми славы\" — сущности необычайной физической силы, повышенной когнитивной способности и ужасающей боевой мощи. Они были, по каждому определению, которое у нас есть сегодня, суперсолдатами. Они доминировали доопотопный мир, и их насилие и коррупция были настолько экстремальны, что Бог уничтожил всю землю потопом, чтобы закончить их царство.\u003c/p\u003e\n\u003cp\u003eЭто был древний метод: запрещённый союз между ангельской и человеческой генетикой для производства воинов за пределами способности обычных мужчин.\u003c/p\u003e\n\u003cp\u003eСегодня метод изменился, но цель не. DARPA — наиболее продвинутое исследовательское плечо Пентагона — тратит миллиарды долларов на создание нового поколения Нефилимов. Не через сверхъестественный союз, но через технологию: экзоскелеты, которые умножают человеческую силу, нейральные имплантаты, которые ускоряют когнитивность, наркотики, которые устраняют сон и страх, и генетические модификации, которые переписывают биологический код живых солдат. Гибридный воин перестраивается в лабораториях и объектах оборонного подрядчика по всему миру.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e рассказывает, Наблюдатели спустились на гору Хермон и поклялись клятвой коррумпировать человечество. Они преподали людям искусства войны — изготовление оружия, изготовление щитов, производство мечей. Они дали человечеству технологию насилия. То, что DARPA делает сегодня, является продолжением того, что Наблюдатели начали. Инструменты эволюционировали из бронзы в биоэлектронику, но повестка дня идентична: создание воинов, которые превышают границы, которые Бог установил для человеческого тела.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"программы-суперсолдатов-darpa\"\u003eПрограммы суперсолдатов DARPA\u003c/h2\u003e\n\u003cp\u003eDefense Advanced Research Projects Agency была движком американской военной инновации с 1958 года. Он создал интернет, GPS, скрытые самолёты и технологию платформы mRNA. Но его наиболее амбициозный текущий портфель — систематическое увеличение боевого человека военных — программы, разработанные для толкания солдат за пределы границ естественной человеческой производительности.\u003c/p\u003e\n\u003ch3 id=\"воин-веб\"\u003eВоин Веб\u003c/h3\u003e\n\u003cp\u003eЗапущенный в 2011 году, программа Warrior Web DARPA целилась на разработку мягкого, лёгкого нижнего костюма, который бы уменьшил физическое бремя на солдатах. Современный пехотинец несёт 90 к 140 фунтов оборудования — броня тела, оружие, боеприпасы, снаряжение связи, батареи, вода и пища. Эта нагрузка вызывает травмы опорно-двигательного аппарата в уровне эпидемии: более 800 000 случаев травмы опорно-двигательного аппарата обрабатываются в системе военного здравоохранения ежегодно.\u003c/p\u003e\n\u003cp\u003eWarrior Web не был экзоскелетом в традиционном смысле научной фантастики. Это был костюм, соответствующий телу, встроенный с датчиками, микромоторами и биомеханическими актуаторами, которые обнаруживали движения солдата и предоставляли точно целевую физическую помощь. Цель была костюмом, который делал бы загруженного солдата ощущать, как если бы он не нёс никакую нагрузку — уменьшение травмы, расширение оперативной выносливости и позволение солдатам двигаться быстрее и сражаться дольше, чем любой неувеличенный человек.\u003c/p\u003e\n\u003cp\u003eПрограмма перешла в классифицированные следовать усилиям, которые остаются в значительной степени раскрыты общественности.\u003c/p\u003e\n\u003ch3 id=\"talos--костюм-железного-человека\"\u003eTALOS — Костюм Железного человека\u003c/h3\u003e\n\u003cp\u003eВ 2013 году U.S. Special Operations Command (SOCOM) запустила Тактический костюм легко оператора штурма, известный как TALOS — и публично прозванный \"костюм Железного человека\" официальными лицами военных, которые хотели генерировать волнение и финансирование.\u003c/p\u003e\n\u003cp\u003eTALOS был разработан как полного-телосложный питаемый экзоскелет, предоставляющий:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eБаллистическая защита\u003c/strong\u003e — жидкая броня, которая затвердела бы при ударе, останавливая пули и осколки\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУвеличенная сила и скорость\u003c/strong\u003e — питаемые суставы усиливают физический результат оператора\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВстроенные датчики\u003c/strong\u003e — физиологический контроль в реальном времени, ночное видение и дисплеи тактики главы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКлиматический контроль\u003c/strong\u003e — внутренние системы нагрева и охлаждения для работы в любом окружении\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМониторинг раны и лечение\u003c/strong\u003e — встроенные датчики раны, которые могут обнаружить травмы и автоматически применить соединения запечатывания раны\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКомандующий SOCOM адмирал William McRaven описал амбицию костюма в ясных терминах: \"Я хотел бы, чтобы это было реальностью когда-нибудь. Это было бы невероятно.\" Программа собрала вместе 56 корпораций, 16 государственных агентств, 13 университетов и 10 национальных лабораторий — мобилизация ресурсов, которая раскрывает, насколько серьёзно Пентагон берёт повестку дня суперсолдата.\u003c/p\u003e\n\u003cp\u003eTALOS была официально отложена в 2019 году, с военными заявляя, что технология не была готова для интеграции. Но компонентные технологии — питаемые экзоскелеты, жидкая броня, физиологический контроль и нейральные интерфейсы — всё продолжалось в отдельных классифицированных программах. TALOS была не отменена. Она была рассеяна в разделённые программы, более трудные для публики отслеживать.\u003c/p\u003e\n\u003ch3 id=\"внутренняя-броня\"\u003eВнутренняя броня\u003c/h3\u003e\n\u003cp\u003eКонцепция внутренней брони DARPA берёт увеличение под кожу. Скорее, чем внешние костюмы, внутренняя броня изучает биологические модификации, которые сделали бы тело солдата более устойчивым:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшенный иммунный ответ\u003c/strong\u003e — инженерия иммунных систем, которые могут сопротивляться биологическим и химическим оружиям\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУскоренное исцеление\u003c/strong\u003e — стимуляция механизмов естественной репарации тела для исцеления боевых ран в часах, скорее, чем неделях\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПодавление боли\u003c/strong\u003e — модификация путей боли, так чтобы солдаты могли продолжать сражаться через травмы, которые инвалидовали бы нормальных людей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТепловая толерантность\u003c/strong\u003e — расширение способности тела выдерживать экстремальную жару и холод\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не научная фантастика. Биологический офис технологий DARPA имеет ежегодный бюджет, превышающий $500 миллионов и финансирует дюжины программ, изучающих точно эти способности. Когда Пентагон говорит \"внутренняя броня,\" это означает превращение человеческого тела самого в платформу оружия — живую систему, переделанную для войны.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"гонка-экзоскелета\"\u003eГонка экзоскелета\u003c/h2\u003e\n\u003cp\u003eПока DARPA разрабатывает классифицированную границу, частные оборонные подрядчики строят и развёртывают военные экзоскелеты сегодня.\u003c/p\u003e\n\u003ch3 id=\"sarcos-robotics--guardian-xo\"\u003eSarcos Robotics — Guardian XO\u003c/h3\u003e\n\u003cp\u003eSarcos Robotics, теперь партнёр Palantir Technologies, разработал Guardian XO — экзоскелет полного тела, который позволяет единственному оператору поднять до 200 фунтов повторно без натяжения. Система питается батарией, потеря связи и разработана для военной логистики, строительства и поддержки боя. U.S. военные оценивали Guardian XO с 2020 для использования в операциях цепи питания, обращение с боеприпасами и ремонт боевого поля.\u003c/p\u003e\n\u003cp\u003eGuardian XO — публичная версия. То, что существует в классифицированных программах — и то, что Sarcos' военные контракты фактически определяют — расширяется в прямые приложения боя, которые не раскрыты в гражданской публике.\u003c/p\u003e\n\u003ch3 id=\"lockheed-martin-hulc\"\u003eLockheed Martin HULC\u003c/h3\u003e\n\u003cp\u003eУниверсальный грузоносец человека Lockheed Martin (HULC) — экзоскелет нижнего тела, который позволяет солдатам нести нагрузки 200-фунтов на скорости до 10 миль в час по грубой местности, с драматически сниженной метаболической стоимостью. Система использует гидравлические актуаторы, питаемые батареями литиевого полимера и разработана для ношения под стандартной броней тела и оборудованием.\u003c/p\u003e\n\u003cp\u003eHULC была разработана в партнёрстве с U.S. Army Natick Soldier Research Center и прошла экстенсивное полевое тестирование. Пока Lockheed Martin публично позиционировал HULC как инструмент логистики, дизайн систем явно боевой-ориентирован: он увеличивает ноги и нижнее тело, точно системы, необходимые для солдатов двигаться быстрее, нести более тяжёлое оружие и поддерживать оперативный темп над дольшими расстояниями, чем любой неувеличенный человек может поддерживать.\u003c/p\u003e\n\u003cp\u003eКонвергенция технологии экзоскелета с AI-управляемым предсказанием движения, интеграцией баллистической брони и встроенными системами оружия создаёт что-то, которое выглядит менее как инструмент и более как огдель брониров, неостановимые воины, описанные в древних текстах.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"нейральное-улучшение-переделка-мозга-воина\"\u003eНейральное улучшение: Переделка мозга воина\u003c/h2\u003e\n\u003cp\u003eФизическое увеличение — только половина программы. DARPA одинаково инвестирована в увеличение мозга солдата — делание воинов, которые думают быстрее, учитесь быстрее, боязнь менее и обрабатывают информацию на сверхчеловеческих скоростях.\u003c/p\u003e\n\u003ch3 id=\"трансчерепная-стимуляция-прямого-тока-tdcs\"\u003eТрансчерепная стимуляция прямого тока (tDCS)\u003c/h3\u003e\n\u003cp\u003eU.S. Air Force и DARPA проводили экстенсивное исследование трансчерепной прямой стимуляции тока — применение электрического тока низкого уровня к определённым областям мозга для улучшения когнитивной производительности. Исследования, проводимые в Air Force Research Laboratory, продемонстрировали, что tDCS могла:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУдвоить скорость обучения\u003c/strong\u003e сложных задач, как пилотирование дрона и идентификация угрозы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшить фокус и бдительность\u003c/strong\u003e во время расширённых операций\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСнизить время реакции\u003c/strong\u003e в принятии решения боя\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшить распознавание образца\u003c/strong\u003e — способность идентифицировать угрозы в сложных зрительных окружениях\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВ одном широко-сообщённом исследовании, снайперы, которые получили tDCS во время тренировки, улучшили скорость приобретения цели на фактор 2.3, сравненный с контрольной группой. Это не маргинальное улучшение. Это фундаментальный сдвиг в человеческой когнитивной производительности, достигнут посредством запуска электричества через мозг.\u003c/p\u003e\n\u003ch3 id=\"целевая-подготовка-нейропластичности-tnt-darpa\"\u003eЦелевая подготовка нейропластичности (TNT) DARPA\u003c/h3\u003e\n\u003cp\u003eПрограмма целевой подготовки нейропластичности, запущенная в 2017 году, берёт нейральное улучшение дальше. TNT использует стимуляцию периферического нерва — активирование определённых нервов в теле — чтобы спровоцировать освобождение нейрохимикалии, которые улучшают способность мозга формировать новые нейральные соединения. Цель — создание \"окна улучшенного обучения,\" во время которого солдаты могут приобрести новые умения — иностранные языки, кодовое нарушение, опытность, боевая тактика — при драматически ускоренных ставках.\u003c/p\u003e\n\u003cp\u003eTNT явно о создании воинов, которые могут учиться в днях, что обычно берёт месяцы или годы. Программа была протестирована в многократных военных инсталяциях и результаты были впечатляющие достаточно, чтобы генерировать следовать-на финансировании для классифицированных приложений.\u003c/p\u003e\n\u003ch3 id=\"интерфейсы-мозга-компьютера-для-боя\"\u003eИнтерфейсы мозга-компьютера для боя\u003c/h3\u003e\n\u003cp\u003eКак детально в нашей статье о \u003ca href=\"/neuralink-merge-man-machine/?lang=ru\"\u003eNeuralink и гонке для слияния человека с машиной\u003c/a\u003e, программа конструирования нейральной системы инженеров DARPA (NESD) и её программа следующего поколения несургических нейротехнологии (N3) разрабатывают интерфейсы мозга-компьютера, которые позволили бы солдатам контролировать системы оружия, дроны и снаряжение связи непосредственно с их мыслями.\u003c/p\u003e\n\u003cp\u003eСолдат с интерфейсом нейрала мог:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКонтролировать рой дронов с командами только мысли\u003c/li\u003e\n\u003cli\u003eПолучать тактическую разведку непосредственно в их зрительную кору — видя позиции врага, наложенные на их естественное видение\u003c/li\u003e\n\u003cli\u003eТихо общаться с членами группы через трансформацию мысли в текст или трансформацию мысли в мысль\u003c/li\u003e\n\u003cli\u003eОбрабатывать данные угрозы на скоростях, невозможные для неувеличенного мозга\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не будущая программа. DARPA финансировала эти способности с раннего 2000, и конвергенция технологии интерфейса нейрала с AI боевого поля создаёт боевика, который функционально гибрид человека и машины — киборг в каждом значимом смысле слова.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"фармакологическое-улучшение-химический-суперсолдат\"\u003eФармакологическое улучшение: Химический суперсолдат\u003c/h2\u003e\n\u003cp\u003eИспользование военными наркотиков для улучшения боевой производительности не новое — это один из самых старых программ увеличения в существовании.\u003c/p\u003e\n\u003ch3 id=\"исторический-рекорд\"\u003eИсторический рекорд\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВторая мировая война\u003c/strong\u003e — И союзные и силы Оси использовали амфетамины обширно. Wehrmacht распределял Pervitin (метамфетамин) миллионам немецких солдат. Американские и британские силы выпустили таблетки Benzedrine. Эти наркотики устранили усталость, подавили страх и увеличили агрессию.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВойна Вьетнама\u003c/strong\u003e — U.S. военные выпустили более 225 миллионов таблеток амфетамина в американские силы между 1966 и 1969 годами.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВойна в Персидском заливе и за пределами\u003c/strong\u003e — Модафинил (Provigil) заменил амфетамины как предпочитаемый агент бодрствования военных. Изначально разработанный для нарколепсии, модафинил позволяет солдатам оставаться бдительными и когнитивно функциональными для 40+ часов без сна, с значительно менее побочными эффектами, чем традиционные стимуляторы.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"текущие-фармакологические-программы\"\u003eТекущие фармакологические программы\u003c/h3\u003e\n\u003cp\u003eТекущая военная фармакология идёт далеко за пределы простых стимуляторов:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПодавление страха\u003c/strong\u003e — Исследование в пропранолол и экспериментальные соединения, которые могут блокировать формирование воспоминания страха, создавая солдат, которые буквально не могут испытывать дебилитирующие эффекты боевого стресса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстранение боли\u003c/strong\u003e — Развитие аналгетиков, которые подавляют восприятие боли без притупления когнитивной функции, позволяя раненым солдатам продолжать сражаться на полной способности\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМетаболическое улучшение\u003c/strong\u003e — Наркотики, которые заставляют тело сжигать жир более эффективно, уменьшая потребность в переоборудовании питания в расширённых операциях\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшение памяти\u003c/strong\u003e — Соединения, которые усиливают консолидацию памяти, позволяя солдатам вспомнить тренировку, карты и тактические данные с фотографической точностью\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМодуляция агрессии\u003c/strong\u003e — Фармацевтические инструменты, которые могут увеличить или уменьшить агрессию на команду, создавая солдат, которые переключаются между гипер-агрессивным режимом штурма и спокойным, точным стрелком в химическом сигнале\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПрограмма предотвращения возникающих угроз DARPA (PREEMPT) и её более полное портфельно биологической технологии включают разработку фармакологического агента, которая размывает линию между медициной и разработкой оружия. Как задокументировано в нашей статье о \u003ca href=\"/pharmakeia-sorcery-pharmaceuticals/?lang=ru\"\u003ePharmakeia: Sorcery в современном веке\u003c/a\u003e, греческое слово, переводимое как \"колдовство\" в Откровение 18:23, это \u003cem\u003epharmakeia\u003c/em\u003e — корень нашего слова \"аптека.\" Фармацевтическое преобразование воинов в что-то за пределами человеческого является, в наиболее буквальном библейском смысле, колдовством применено к войне.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"генетическая-модификация-переписание-днк-солдата\"\u003eГенетическая модификация: Переписание ДНК солдата\u003c/h2\u003e\n\u003cp\u003eНаиболее радикальная граница программы суперсолдата является генетической модификацией — использование технологий, как CRISPR-Cas9, для постоянного изменения ДНК живых солдат.\u003c/p\u003e\n\u003ch3 id=\"crispr-для-боя\"\u003eCRISPR для боя\u003c/h3\u003e\n\u003cp\u003eCRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) позволяет учёным отредактировать гены с беспрецедентной точностью. В военном контексте, CRISPR могла теоретически быть используется для:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшение плотности мускулов и силы\u003c/strong\u003e — модификация гена миостатина, который регулирует рост мышца, для создания солдат с естественно превосходящей физической силой\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУвеличение кислородно-несущей способности\u003c/strong\u003e — редактирование генов, связанных с производством эритроцита (подобный естественной мутации, найденной в элитных спортсменах выносливости), для создания солдат, которые могут работать на высоких высотах без деградации\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУскорение исцеления\u003c/strong\u003e — активирование путей регенеративного гена, которые спят в взрослых людях, но активны в развитии эмбриона\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУлучшение ночного видения\u003c/strong\u003e — модификация генов, связанных с родопсинным производством в сетчатке\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУстранение восприимчивости PTSD\u003c/strong\u003e — редактирование генов, связанных с ответом стресса и обработкой травмы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРасширение оперативной выносливости\u003c/strong\u003e — модификация метаболических генов для позволения солдатам функционировать эффективно на минимальной пище и сне\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПрограмма безопасных генов DARPA, запущенная в 2017 году, была официально разработана для разработки инструментов для контроля и обратного развёртывания генетических модификаций. Но существование программы для обратного редактирования гена в военном персонале предполагает существование программ, которые выполняют редактирование гена на военном персонале. Вы не строите лекарство, если болезнь не существует — или не создана целенаправленно.\u003c/p\u003e\n\u003cp\u003eКак изучено в нашей статье о \u003ca href=\"/gene-editing-crispr-humanity/?lang=ru\"\u003eРедактировании гена: CRISPR и переписание человечества\u003c/a\u003e, модификация человеческой ДНК пересекает линию, которую Писание рисует ясно. Бытие 1:27 говорит, что Бог создал человека в Его образе. Переписать тот образ на генетическом уровне — изменить фундаментальный код, который делает человека человеком — это повторение нарушения Наблюдателей, которые коррумпировали человеческую генетику перед потопом.\u003c/p\u003e\n\u003ch3 id=\"программа-китайского-генного-редактирования-солдата\"\u003eПрограмма китайского генного редактирования солдата\u003c/h3\u003e\n\u003cp\u003eВ 2019 году John Ratcliffe, тогда директор национальной разведки, публично заявил, что Китай проводил \"человеческое тестирование\" на членах Народной армии освобождения в преследовании разработки \"биологически улучшенных солдат.\" Западные официальные лица разведки подтвердили, что китайские военные учёные исследовали использование CRISPR для улучшения боевой производительности в действующих солдатах.\u003c/p\u003e\n\u003cp\u003eДоклады из U.S. разведки указывают, что программа Китая включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eРедактирование гена для улучшенной физической выносливости\u003c/strong\u003e — модификация метаболических путей для создания солдат, которые могут маршировать дольше, нести больше и восстановиться быстрее\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКогнитивное улучшение\u003c/strong\u003e — редактирование генов, связанных с памятью, скоростью обработки и принятием решения под стрессом\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМодификация толерантности боли\u003c/strong\u003e — изменение генов болевого рецептора для создания солдат, менее затронутых боевыми травмами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБиологическая устойчивость\u003c/strong\u003e — модификации гена, которые улучшают сопротивление к химическим и биологическим оружиям\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eГотовность Китая проводить генетические эксперименты на собственном военном персонале — необтяженный этическими рамками, которые номинально управляют западным исследованием — создаёт редактирование гена гонку. Если Китай развёртывает генетически улучшенных солдат, Пентагон будет утверждать, что U.S. должен делать то же самое или сталкиваться с стратегической неполноценностью. Это точно, как каждая гонка вооружений в истории эскалировала: другая сторона делает это, так что мы должны делать это также.\u003c/p\u003e\n\u003cp\u003eРезультат — мир, где обе сверхдержавы активно переписывают ДНК своих воинов — создание человеческих существ, которые на генетическом уровне больше не полностью естественны. Нефилимы были гибридами ангельской и человеческой генетики. Генно-отредактированный солдат — гибрид естественной и инженерной генетики. Метод изменился. Категория отвращения не.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"голос-мастера-ховеркрафты--абоминабельное-оружие-войны\"\u003eГолос мастера: Ховеркрафты — Абоминабельное оружие войны\u003c/h2\u003e\n\u003cp\u003eБлог пророчества Голоса мастера получил детальные пророческие слова, описывающие военные технологии последних дней. В пророчестве под названием \"Hovercrafts: Abominable Weapons of War,\" Господь описывает платформы оружия, которые комбинируют человеческие и машинные элементы в системы войны, настолько продвинутые и настолько ужасные, что они названы \"отвращениями.\"\u003c/p\u003e\n\u003cp\u003eПророчество описывает корабли и машины войны, которые работают с слиянием человеческого сознания и механических систем — солдат, которые подключены к своим платформам, которые становятся частью машины, которую они управляют. Это не метафора. Это точное описание программ интерфейса мозга-компьютера, систем оружия, связанных нейралом, и инициатив киборга-солдата, которые DARPA разрабатывает более двух декад.\u003c/p\u003e\n\u003cp\u003eСлово \"отвращение\" используется в Писании для вещей, которые нарушают созданный порядок настолько фундаментально, что они провоцируют суд Бога. Слияние человека и машины для целей войны — создание гибридных воинов, которые ни полностью человеческие, ни полностью механические — падает точно в эту категорию. Солдат, который подключен к экзоскелету, чей мозг взаимодействует с системой оружия, чья ДНК была модифицирована и чья нейрохимия фармацевтически изменена, больше не человеческое существо, которое Бог создал. Это что-то иное — что-то, что Писание называет отвращением.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"откровение-9-армия-саранчи\"\u003eОткровение 9: Армия саранчи\u003c/h2\u003e\n\u003cp\u003eКонвергенция всех этих технологий — экзоскелетов, нейральных интерфейсов, генетической модификации, фармакологического улучшения — производит что-то, которое звучит жутко знакомо читателям библейского пророчества.\u003c/p\u003e\n\u003cp\u003eОткровение 9:3-10 описывает армию, освобождённую в Пятой трубе суда:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И из дыма вышла саранча на землю. И дана была ей власть, как власть скорпионов земных... Вид саранчи был подобен виду коней, приготовленных на войну. На голове её было подобие венцов, похожих на золото. Лица её были как лица человеческие. Волосы у ней были как волосы женские. Зубы у ней были как у льва. На груди её были щиты, подобные щитам железным. И голос крыльев её был как голос многих колесниц и коней, бегущих на войну. И хвосты у ней были подобны скорпионам и жала в хвостах её.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eРассмотрите описание Иоанна сквозь линзу современного военного увеличения:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e\"Подобно лошадям, приготовленным на войну\"\u003c/strong\u003e — солдаты, улучшенные экзоскелетом, движущиеся на скоростях, невозможных для неувеличенных людей\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Венцы подобия золота\"\u003c/strong\u003e — продвинутые шлемы с встроенными дисплеями головы, нейральными интерфейсами и системами связи\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Лица как лица человеческие\"\u003c/strong\u003e — они человеческие, или были человеческие, но что-то о них достаточно отличается, что Иоанн примечает их лица специфично\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Щиты подобия щитов железных\"\u003c/strong\u003e — питаемая броня тела, жидкая броня, которая затвердевает при ударе, полное-телосложное экзоскелетное покрытие\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Голос крыльев как голос многих колесниц\"\u003c/strong\u003e — механический рёв питаемых экзоскелетов, систем движения, поддерживаемых реактивным двигателем или ховеркрафтов, описанных в пророчестве Голоса мастера\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Хвосты как скорпионы и жала\"\u003c/strong\u003e — встроенные системы оружия, вероятно направляемые системы энергии или системы доставки химического/биологического оружия, построены в костюм\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭтим воинам дана способность мучить людей в течение пяти месяцев, но не убить их (Откровение 9:5). Это означает способность неубийственного оружия — точно тип направляемой энергии, нейрологического нарушения и технологии, вызывающей боль, которую Пентагон разрабатывает для приложений контроля толпы и боя.\u003c/p\u003e\n\u003cp\u003eИоанн описывал, в языке, доступном к первому веку наблюдателю, что увеличенные киборг-солдаты выглядят как. Он не имел слово для \"экзоскелета\" или \"нейрального интерфейса\" или \"питаемой броне\". Он описал то, что он видел с словарём, который он имел — и то, что он описал совпадает, с беспокойной точностью, траекторией каждой программы, задокументированной в этой статье.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"линия-которая-не-может-быть-пересечена\"\u003eЛиния, которая не может быть пересечена\u003c/h2\u003e\n\u003cp\u003eПрограмма суперсолдата представляет что-то более глубокое, чем инициатива военной технологии. Это представляет попытку человечества превышать границы, которые Бог установил для человеческого тела и ума.\u003c/p\u003e\n\u003cp\u003eБытие 6 говорит нам что произойдёт в последний раз, когда существа сверхчеловеческой власти прошли землю: Бог уничтожил мир. Нефилимы были продуктом нарушения против созданного порядка — ангельских существ, пересекающих границу, которая никогда не была предназначена быть пересечённой, создавая гибриды, которые никогда не были предназначены существовать.\u003c/p\u003e\n\u003cp\u003eКиборг-солдат является технологическим Нефилимом. Улучшен за пределы естественной человеческой способности посредством машин, слитых с плотью, химикалии, которые отменяют естественную функцию мозга, электрическая стимуляция, которая переделывает нейральные пути и генетические модификации, которые изменяют образ Бога, написанный в человеческую ДНК — эти воины разработаны быть что-то иное, чем то, что Бог сделал.\u003c/p\u003e\n\u003cp\u003eГонка вооружений между Соединённых Штатов и Китая обеспечивает, что ни одна нация не добровольно остановится. Технология будет продолжать продвигаться. Солдаты будут продолжать быть модифицированы. И линия между человеческим и машиной, между естественным и инженером, между тем, что Бог создал и что человек переделал — та линия будет продолжать размываться, пока она не исчезнет целиком.\u003c/p\u003e\n\u003cp\u003eПисание говорит нам точно, где это приводит. Армии Откровения не метафоры. Они описания будущей военной реальности, которая разрабатывается прямо сейчас, в лабораториях, финансируемых оборонными бюджетами мира наиболее мощных наций. Армия саранчи Откровения 9 не фантазия — это спецификация программы.\u003c/p\u003e\n\u003cp\u003eВопрос не в том, будут ли эти воины построены. Они уже строятся. Вопрос в том, понимаете ли вы, что вы смотрите на развёртывание и признаёте ли вы древний образец повторяющимся: как это было в дни Ноя, так это будет в приход сына человеческого.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily изучают темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/39-Robot_Army_-_Tesla_Optimus_and_Figure_AI.mp4\"\u003eRobot Army\u003c/a\u003e — Автономные системы оружия и механизация войны\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u ave Planned\u003c/a\u003e — Идеология, движущая слиянием человечества и технологии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/nephilim-return-giants-genesis/?lang=ru\"\u003eThe Nephilim Return: Giants of Genesis\u003c/a\u003e — Древние гибридные воины и библейское пророчество их возврата\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eНефилимы были сильными людьми древних времён, людьми славы — гибридными воинами, родившимися из запрещённого пересечения между ангельским и человеческим. Программа суперсолдата DARPA строит то же воина через различный метод: машины, слитые с плотью, химикалии, пролитые в мозги, электричество, переделывающее нейральные пути и генетический код, переписанный человеческими руками. Метод новый. Отвращение древнее. И Бог, который уничтожил мир в первый раз эти существа прошли землю, не изменил своё умственное состояние о том, что они.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/technology/\",\"className\":\"category-badge\",\"children\":\"technology\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Киборг-солдаты: Программа суперсолдатов военных\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Программы DARPA и Пентагона для создания улучшенных солдат через экзоскелеты, нейральные имплантаты, генетическую модификацию и фармацевтическое увеличение — строительство сверхчеловеческих воинов библейского пророчества.\"}],[\"$\",\"div\",null,
