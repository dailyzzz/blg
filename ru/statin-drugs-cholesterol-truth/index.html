\n\u003cp\u003eЕсть категория обмана столь полного, столь институционально встроенного, что она инвертирует саму реальность. Она берет то, что организм нуждается — то, что Бог разработал в человеческую биологию для существенных целей — и называет это врагом. Она берет фармацевтический продукт, который повреждает организм на клеточном уровне, и называет его медициной. Она берет естественное вещество, которое защищает мозг, производит гормоны и сохраняет целостность каждой мембраны клетки в организме, и объявляет его маркером болезни, который должен быть подавлен любой ценой.\u003c/p\u003e\n\u003cp\u003eЭто — обман статина. Более четырех десятилетий фармацевтическая индустрия вела войну против холестерина — молекулы столь жизненно важной для человеческой жизни, что организм производит ее в каждой клетке, с печенью производящей примерно 80% общего холестерина независимо от пищевого поступления. Холестерин не токсин. Это не болезнь. Это строительный материал жизни. И препараты, разработанные для подавления его производства — статины — среди наиболее часто назначаемых лекарств в истории, генерирующие сотни миллиардов долларов в доход при систематическом повреждении тел людей, которые их принимают.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e говорит о свете истины, пробивающемся через тьму обмана — и ложь статина — это пещера тьмы, которая заключила в заточение сотни миллионов людей в фармацевтической зависимости, основанной на фальсифицированной науке. \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/93-The_Great_Exchange.mp4\"\u003eThe Great Exchange\u003c/a\u003e напоминает нам, что враг всегда предлагает обмен — здоровье за болезнь, истину за ложь, свободу за рабство — и статины — это точно такой обмен: обещание кардиальной защиты в обмен на разрушение организма изнутри.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"исследование-что-подтверждают-новые-исследования\"\u003eИсследование: Что подтверждают новые исследования\u003c/h2\u003e\n\u003cp\u003eНедавние исследования добавили к растущему объему доказательств того, что препараты статины несут серьезные, недообщаемые риски для здоровья, которые перевешивают их предполагаемые преимущества для подавляющего большинства людей, которые их принимают.\u003c/p\u003e\n\u003ch3 id=\"повреждение-мышц-миопатия-и-рабдомиолиз\"\u003eПовреждение мышц (миопатия и рабдомиолиз)\u003c/h3\u003e\n\u003cp\u003eСтатины работают путем ингибирования HMG-CoA редуктазы, фермента, необходимого для синтеза холестерина. Но этот же фермент необходим для производства Коэнзима Q10 (CoQ10) — молекулы, критической для производства энергии в митохондриях каждой клетки организма, особенно в мышечной ткани и сердце.\u003c/p\u003e\n\u003cp\u003eИсследования подтверждают, что использование статинов истощает уровни CoQ10 на до 40%, приводя к:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eМиалгия\u003c/strong\u003e (мышечная боль) — сообщается 10-25% пользователей статинов в клинической практике, намного превышая показатели, сообщаемые в финансируемых индустрией клинических испытаниях\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМиопатия\u003c/strong\u003e (мышечная слабость и дегенерация) — задокументированное повреждение скелетных мышц\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРабдомиолиз\u003c/strong\u003e — в серьезных случаях мышечная ткань разрушается и высвобождает миоглобин в кровоток, вызывая повреждение почек и потенциально смерть\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИрония разрушительна: препарат, назначенный для защиты сердца, истощает именно молекулу (CoQ10), которую сердечная мышца нуждается наиболее.\u003c/p\u003e\n\u003ch3 id=\"когнитивное-снижение\"\u003eКогнитивное снижение\u003c/h3\u003e\n\u003cp\u003eМозг содержит примерно 25% общего холестерина организма. Это наиболее холестерин-богатый орган в организме, потому что холестерин необходим для образования синапсов, поддержание оболочки миелина и функции нейротрансмиттера. Понижение производства холестерина статинами прямо влияет на функцию мозга.\u003c/p\u003e\n\u003cp\u003eИсследования задокументировали:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eНарушение памяти\u003c/strong\u003e — FDA добавила предупреждение о потере памяти и путанице в метки статинов в 2012 году, признание, вынужденное накоплением отчетов о неблагоприятных событиях\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКогнитивное снижение\u003c/strong\u003e — исследования продемонстрировали измеримые снижения когнитивной функции у пользователей статинов, особенно у пожилых взрослых\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУвеличенный риск деменции\u003c/strong\u003e — некоторые исследования предполагают, что долгосрочное использование статинов может увеличить риск нейродегенеративного заболевания путем лишения мозга холестерина, необходимого для поддержания нейронных соединений\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"риск-диабета\"\u003eРиск диабета\u003c/h3\u003e\n\u003cp\u003eКрупномасштабные исследования подтвердили, что использование статинов увеличивает риск развития диабета 2 типа на 9-46%, в зависимости от конкретного статина и дозы. Это означает, что препарат, назначенный для снижения риска сердечно-сосудистых заболеваний, одновременно увеличивает риск метаболического заболевания, которое само по себе является основным фактором риска сердечно-сосудистых заболеваний — фармакологический парадокс, который был бы комичным, если бы не убивал людей.\u003c/p\u003e\n\u003ch3 id=\"повреждение-печени\"\u003eПовреждение печени\u003c/h3\u003e\n\u003cp\u003eСтатины метаболизируются печенью — тем же органом, который производит холестерин, который препараты разработаны для подавления. Повышение ферментов печени (указывающее на клеточное повреждение) — признанный побочный эффект терапии статинов, и регулярный мониторинг функции печени рекомендуется для пользователей статинов. Препарат повреждает орган, который его обрабатывает.\u003c/p\u003e\n\u003ch2 id=\"холестериновый-миф\"\u003eХолестериновый миф\u003c/h2\u003e\n\u003cp\u003eВся парадигма статинов строится на \"гипотезе липидов\" — теории, что диетический и кровяной холестерин вызывает болезнь сердца путем отложения в стенках артерий. Эта теория, продвигаемая Анселем Кейсом, начиная с 1950-х годов и принята Американской ассоциацией сердца как институциональный догма, была прогрессивно разрушена независимым исследованием.\u003c/p\u003e\n\u003ch3 id=\"что-холестерин-на-самом-деле-делает\"\u003eЧто холестерин на самом деле делает\u003c/h3\u003e\n\u003cp\u003eХолестерин — это не токсин, подлежащий устранению. Это жизненно важная молекула с необходимыми функциями:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСтруктура мембраны клетки\u003c/strong\u003e — каждая клетка в организме требует холестерина для поддержания целостности мембраны и текучести\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПроизводство гормонов\u003c/strong\u003e — холестерин является предшественник молекулы для всех стероидных гормонов, включая тестостерон, эстроген, кортизол и витамин D\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСинтез желчной кислоты\u003c/strong\u003e — холестерин требуется для производства желчных кислот, которые переваривают пищевые жиры\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФункция мозга\u003c/strong\u003e — холестерин необходим для образования синапсов, функции нейротрансмиттера и производства миелина\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФункция иммунитета\u003c/strong\u003e — холестерин играет роль в сигнализации иммунных клеток и ответе организма на инфекцию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗаживление ран\u003c/strong\u003e — холестерин мобилизуется на участки повреждения ткани как часть процесса восстановления\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"истинная-причина-болезни-сердца\"\u003eИстинная причина болезни сердца\u003c/h3\u003e\n\u003cp\u003eРастущий консенсус среди независимых исследователей заключается в том, что болезнь сердца в основном вызвана воспалением — не уровнями холестерина. Артериальные бляшки образуются на участках воспалительного повреждения эндотелиальной выстилки кровеносных сосудов. Холестерин присутствует в бляшках не потому, что он вызвал повреждение, а потому, что организм отправил его туда для восстановления повреждения. Обвинение холестерина в болезни сердца подобно обвинению пожарных в пожарах, потому что они всегда найдены на месте происшествия.\u003c/p\u003e\n\u003cp\u003eИстинные движители сердечно-сосудистого воспаления включают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСеменные масла\u003c/strong\u003e (соевое, рапсовое, кукурузное, сафлоровое) богатые омега-6 жирными кислотами, способствующие воспалительной сигнализации\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРафинированный сахар и обработанные углеводы\u003c/strong\u003e, которые вызывают гликирование повреждения стенок кровеносных сосудов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eХронический стресс\u003c/strong\u003e и повышенный кортизол\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЗагрязнение окружающей среды\u003c/strong\u003e, включая тяжелые металлы и микропластики\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФармацевтические препараты\u003c/strong\u003e — включая, к сожалению, некоторые сами статины\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"pharmakeia-и-индустрия-статинов\"\u003ePharmakeia и индустрия статинов\u003c/h2\u003e\n\u003cp\u003eАна Михалеа, MD, PhD задокументировала на своем Substack (\u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e) разрушительные эффекты фармацевтических вмешательств на качество крови. Хотя ее первичный фокус — нанотехнологическое загрязнение, ее более широкая работа освещает фармацевтическую систему, которая рассматривает человеческое тело как рынок, а не как храм — продающую продукты, которые подавляют симптомы, одновременно вызывая новые болезни, требующие дополнительных продуктов.\u003c/p\u003e\n\u003cp\u003eИндустрия статинов совершенно воплощает эту модель:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eУбедить общественность, что естественное вещество (холестерин) опасно\u003c/li\u003e\n\u003cli\u003eПродать препарат для подавления этого вещества\u003c/li\u003e\n\u003cli\u003eКогда препарат вызывает новые проблемы (диабет, повреждение мышц, когнитивное снижение), продать дополнительные препараты для лечения этих проблем\u003c/li\u003e\n\u003cli\u003eНикогда не рассматривать истинные причины болезни сердца (воспаление от обработанной пищи, загрязнения окружающей среды и фармацевтического повреждения), потому что эти причины подразумевают саму индустрию\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭто — медицина Рокфеллера в её самой чистой форме — система, разработанная Джоном Д. Рокфеллером в начале XX века для замены естественного исцеления петролеум-производными фармацевтическими продуктами, захвата медицинского образования и создания постоянной зависимости от патентованных химических веществ. Статин — идеальный продукт Рокфеллера: он лечит произведенную болезнь с произведенным препаратом, который создает реальные болезни, требующие больше произведенных препаратов.\u003c/p\u003e\n\u003cp\u003eОткровение 18:23 объявляет, что фармакией — колдовством через фармацевтическую манипуляцию — все народы обольщены. Обман статина — одна из наиболее успешных операций фармакии в истории. Более 200 миллионов людей во всем мире принимают статины. Глобальный рынок превышает 15 миллиардов долларов в год. И обман столь полный, что врачи, которые ставят под вопрос гипотезу липидов, рискуют профессиональной цензурой.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение-фармацевтической-зависимости\"\u003eДуховное измерение фармацевтической зависимости\u003c/h2\u003e\n\u003cp\u003eКоррупция здоровья человека через фармацевтическую зависимость — это не просто коммерческое предприятие. Это духовная операция, проводимая под куполом твердей сущностями, которые работают над коррупцией человеческой биологии с момента Бытия 6.\u003c/p\u003e\n\u003cp\u003eКогда падшие ангелы — \"сыны Божьи\" из Бытия 6:2 — спустились и повредили человеческую плоть, они внедрили чужеродные элементы в творение Божье, которые там никогда не предполагались. Нефилимы — гибридные потомки этой коррупции — были мерзостью именно потому, что они смешивали то, что Бог отделил. Современная фармацевтическая система продолжает эту работу через химические, а не генетические средства: внедрение синтетических соединений в человеческое тело, которые нарушают биологические системы, которые Бог разработал.\u003c/p\u003e\n\u003cp\u003eСтатины не исцеляют. Они подавляют. Они ингибируют необходимый для жизни фермент, истощают необходимую для жизни молекулу, повреждают необходимые для жизни органы и создают новые болезни. Они анти-жизнь по дизайну, и они назначаются под видом здоровья — что и есть саме определение колдовства: вред, выданный за помощь, яд, выданный за лекарство, тьма, называемая светом.\u003c/p\u003e\n\u003cp\u003eВеликое заблуждение 2 Фессалоникийцам 2:9-12 не одиночное событие. Это всеобъемлющая инверсия реальности, в которой весь каркас понимания перевернут. Парадигма статина — одна грань этого заблуждения — система, в которой собственная молекула исцеления организма объявлена врагом, и синтетический яд объявлен спасителем.\u003c/p\u003e\n\u003ch2 id=\"что-делать-вместо-этого\"\u003eЧто делать вместо этого\u003c/h2\u003e\n\u003ch3 id=\"рассмотрение-истинных-причин\"\u003eРассмотрение истинных причин\u003c/h3\u003e\n\u003cp\u003eВместо подавления холестерина, подлинное сердечно-сосудистое здоровье достигается путем рассмотрения воспалительных процессов, которые повреждают кровеносные сосуды:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУстранить семенные масла\u003c/strong\u003e — заменить соевое, рапсовое, кукурузное и сафлоровое масло оливковым маслом, кокосовым маслом, сливочным маслом и животными жирами\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСнизить обработанный сахар\u003c/strong\u003e — минимизировать потребление рафинированных углеводов и добавленных сахаров\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЕсть целые продукты\u003c/strong\u003e — отдать приоритет плотным питательными веществами, необработанным продуктам, которые поддерживают, а не повреждают сердечно-сосудистую функцию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДополнять мудро\u003c/strong\u003e — CoQ10 (особенно если в настоящее время принимают статины), омега-3 жирные кислоты, магний и витамин K2 все поддерживают сердечно-сосудистое здоровье через механизмы, которые действительно рассматривают корневые причины\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"если-в-настоящее-время-принимают-статины\"\u003eЕсли в настоящее время принимают статины\u003c/h3\u003e\n\u003cp\u003eКто-либо в настоящее время принимающий статины не должен прекращать их прием резко без медицинского руководства. Однако поиск врача, который понимает ограничения гипотезы липидов и может направить безопасный переход от зависимости статина, настоятельно рекомендуется. Практикующие функциональную медицину и интегративные кардиологи более вероятно предоставят основанное на доказательствах руководство, которое приоритизирует подлинное здоровье над фармацевтическим соответствием.\u003c/p\u003e\n\u003ch3 id=\"дополнение-coq10\"\u003eДополнение CoQ10\u003c/h3\u003e\n\u003cp\u003eМинимально, кто-либо, принимающий статин, должен дополнять CoQ10 (убихинол форма предпочтительна) на 100-300mg ежедневно для нейтрализации истощения, вызванного препаратом. Что большинство назначающих врачей не рекомендуют это необходимое дополнение вместе с терапией статина, является само по себе доказательством системы, которая приоритизирует продажи препаратов над здоровьем пациентов.\u003c/p\u003e\n\u003ch2 id=\"ссылки-на-источники\"\u003eСсылки на источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eRavnskov U, et al. \"LDL-C does not cause cardiovascular disease: A comprehensive review of the current literature.\" Expert Review of Clinical Pharmacology, 2018\u003c/li\u003e\n\u003cli\u003eAna Mihalcea, MD, PhD — Research on pharmaceutical effects on blood: \u003ca href=\"https://anamihalceamdphd.substack.com\"\u003eanamihalceamdphd.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eDuBroff R, de Lorgeril M. \"Cholesterol confusion and statin controversy.\" World Journal of Cardiology, 2015\u003c/li\u003e\n\u003cli\u003eFDA Drug Safety Communication: \"Important safety label changes to cholesterol-lowering statin drugs\" (2012)\u003c/li\u003e\n\u003cli\u003eThe Master's Voice Prophecy Blog: \u003ca href=\"https://themastersvoice.wordpress.com\"\u003ethemastersvoice.wordpress.com\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство опыта близкого столкновения со смертью Хоуарда Питтмана — предупреждение об конце времен, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая тайна: раскрытие позорящих иезуитских секретов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и Фармакия — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eРокфеллеровская медицина\u003c/a\u003e — захваченная медицинская система, которая продает болезнь как лечение\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eВакцина зверя\u003c/a\u003e — фармацевтическое колдовство, обманывающее народы\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eИнженерирование заразы\u003c/a\u003e — инженерирование болезни через институциональные системы\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eОгонь в пещере\u003c/a\u003e — истина, пробивающаяся через тьму институционального обмана\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/93-The_Great_Exchange.mp4\"\u003eВеликий обмен\u003c/a\u003e — ложный обмен здоровья на фармацевтическую зависимость\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/natural-molecules-anti-cancer/?lang=ru\"\u003eЕстественные молекулы с противораковыми свойствами, которые они не хотят, чтобы вы знали\u003c/a\u003e — то, что организм действительно нуждается в сравнении с тем, что фарма продает\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/human-blood-destroyed-nanotech/?lang=ru\"\u003eЧеловеческая кровь, уничтожаемая для интеграции нанотехнологии\u003c/a\u003e — более широкое фармацевтическое нападение на целостность крови\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/darkfield-microscopy-self-assembly/?lang=ru\"\u003eТемнопольная микроскопия показывает самосборку нанотехнологии в человеческой крови\u003c/a\u003e — как выглядит фармацевтическое загрязнение под микроскопом\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОни взяли холестерин — молекулу, которую Бог вплел в ткань каждой клетки — и назвали её врагом. Они взяли препарат, который истощает энергию сердца, разрушает мышечную ткань и деградирует мозг, и назвали это лекарством. Исаия увидел эту инверсию три тысячи лет назад: горе тем, которые называют злое добром, и добро злом. Ложь статина — это не просто медицинская ошибка — это pharmakeia, колдовство, посредством которого все народы обольщены. Но организм, разработанный Богом, знает разницу между ядом и питанием, даже когда разум был обманут. И истина — как сам холестерин — не будет подавлена вечно. Она слишком необходима для жизни.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Исследование проверяет опасность препаратов статинов, снижающих холестерин\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"
