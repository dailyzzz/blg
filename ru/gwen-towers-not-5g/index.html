 работал по разным правилам. Сад был местом прямого общения, где невидимые силы были поняты, потому что они текли от Творца Себя. Но восток от Эдема, окружающая среда была наполнена силами и течениями, которые они больше не могли воспринимать или понимать. Сам воздух изменился. Земля реагировала по-другому. Невидимые силы двигались по миру вокруг них, и у них не было основы для понимания того, что происходило с ними или почему.\u003c/p\u003e\n\u003cp\u003eКак исследует трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/45-The_Strange_Land.mp4\"\u003eThe Strange Land\u003c/a\u003e, изгнание из Рая поместило человечество в среду, насыщенную невидимыми влияниями — силы, которые формировали их тела, их эмоции и их мысли без их знания или согласия. Странная земля была не просто незнакомой географией. Это было место, где невидимое могло действовать на видимое, где то, что вы не можете видеть, все еще может изменить то, что вы есть.\u003c/p\u003e\n\u003cp\u003eМы живем в той странной земле сегодня. И сеть GWEN — это одна из невидимых сил, заполняющих воздух вокруг вас — частоты, которые вы не можете услышать, волны, которые вы не можете видеть, и инфраструктура, истинная цель которой может быть совсем иной, чем вам сказано.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-был-gwen--официально\"\u003eЧто был GWEN — официально\u003c/h2\u003e\n\u003cp\u003eСеть наземной волны экстренной связи (GWEN) была системой командования и контроля связи, построенной ВВС Соединенных Штатов во время холодной войны. Заявленная цель была простой и, на поверхности, разумной: убедиться, что военная связь может выжить ядерной атаки.\u003c/p\u003e\n\u003cp\u003eПроблема, которую GWEN был разработан для решения, была реальной. Ядерный взрыв в верхней атмосфере создает электромагнитный импульс (EMP), который фритирует обычную электронику и нарушает высокочастотную радиосвязь. Вся команда ВВС США — способность общаться приказы запуска, координировать оборону и поддерживать цепь команды — зависела от инфраструктуры связи, которую один высокоалтитудный ядерный взрыв мог уничтожить.\u003c/p\u003e\n\u003cp\u003eРешение GWEN было работать на \u003cstrong\u003eчрезвычайно низких частотах (ELF)\u003c/strong\u003e — специфически в диапазоне 150-175 кГц — используя наземные волны, которые путешествуют вдоль поверхности земли, а не отскакивают от ионосферы. Эти наземные волны значительно более устойчивы к нарушению EMP. Каждая башня GWEN была разработана для трансляции в радиусе 200-300 миль, и сеть примерно 58 узлов реле будет покрывать континентальные Соединенные Штаты выжившей сеткой связи с низкой частотой.\u003c/p\u003e\n\u003ch3 id=\"официальные-спецификации\"\u003eОфициальные спецификации\u003c/h3\u003e\n\u003cp\u003eВ соответствии с рассекреченной документацией ВВС:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВысота башни:\u003c/strong\u003e Примерно 299 футов (чуть ниже порога 300 футов, который требует светильника препятствия для авиации, делая их менее видимыми)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСистема наземного излучения:\u003c/strong\u003e 300 медных проводов, излучающих от основания, похороненных на 12-18 дюймов в землю, распространяясь примерно на 330 футов во всех направлениях — создание огромного подземного массива антенны\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДиапазон частоты:\u003c/strong\u003e 150-175 кГц (низкая частота), с некоторыми системами, работающими в диапазоне UHF для целей реле\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВыходная мощность:\u003c/strong\u003e 1,000-2,000 ватт\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПокрытие:\u003c/strong\u003e Каждая башня покрывала радиус 200-300 миль; полная сеть из 58+ башен покрывала весь континентальный США\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПериод конструкции:\u003c/strong\u003e 1982-1992\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСистема похороненной медной проволоки критична для понимания. Каждая башня GWEN была не просто высокой антенной — она была видимой оконечностью подземного электромагнитного массива, который распространялся на сотни футов во всех направлениях. Башня была передатчиком. Земля сама стала антенной.\u003c/p\u003e\n\u003ch3 id=\"выведение-из-обслуживания\"\u003e\"Выведение из обслуживания\"\u003c/h3\u003e\n\u003cp\u003eВ 1994 году ВВС США объявили, что система GWEN была \u003cstrong\u003eвыведена из обслуживания\u003c/strong\u003e. Официальное объяснение было, что система была сделана излишней более новыми спутниковыми системами связи, специфически созвездием спутников Milstar, которое могло также выжить ядерную атаку.\u003c/p\u003e\n\u003cp\u003eСогласно официальной сказки, башни GWEN были отключены, и многие были переданы Береговой охране США для использования в их системе Nationwide Differential GPS (NDGPS), которая улучшила точность GPS для морской навигации. Некоторые башни были якобы демонтированы. Программа была завершена. Нечего здесь смотреть.\u003c/p\u003e\n\u003cp\u003eНо башни не исчезли. Подземные медные массивы никогда не были удалены. И инфраструктура никогда не была фактически разрушена — она была просто \u003cstrong\u003eпереназначена\u003c/strong\u003e.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"волны-elf-и-человеческий-мозг\"\u003eВолны ELF и человеческий мозг\u003c/h2\u003e\n\u003cp\u003eДля понимания того, почему GWEN имеет значение далеко за пределами военной связи, вы должны понимать, что волны чрезвычайно низкой частоты делают с биологическими системами — и конкретно, с человеческим мозгом.\u003c/p\u003e\n\u003cp\u003eЧеловеческий мозг работает на электрических импульсах. Каждая мысль, которую вы думаете, каждая эмоция, которую вы чувствуете, каждое воспоминание, которое вы вспоминаете, — это продукт электрических сигналов, стреляющих между нейронами на конкретных частотах. Эти частоты являются измеримыми и хорошо-задокументированными:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eДельта волны (0.5-4 Hz):\u003c/strong\u003e Глубокий сон, без сознания, потеря осознания тела\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТета волны (4-8 Hz):\u003c/strong\u003e Глубокая медитация, сонливость, легкий сон, мечты, гипнотическая suggestibility\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАльфа волны (8-13 Hz):\u003c/strong\u003e Расслабленное пробуждение, спокойное осознание, сниженное критическое мышление\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБета волны (13-30 Hz):\u003c/strong\u003e Активное мышление, фокусировка, бодрствование, тревога на более высоких диапазонах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГамма волны (30-100 Hz):\u003c/strong\u003e Более высокая когнитивная обработка, пиковое осознание, связующее сознание\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не фринджевая наука. Эти диапазоны частоты — основание клинической электроэнцефалографии (ЭЭГ), используемые в каждом отделении неврологии больницы в мире. Ваш мозг — это электрический орган, и он работает на конкретных, измеримых частотах.\u003c/p\u003e\n\u003cp\u003eВот критический факт: \u003cstrong\u003eволны ELF в диапазоне 1-30 Hz напрямую перекрывают частоты человеческого мозга.\u003c/strong\u003e И было неоднократно продемонстрировано как в военных, так и в академических исследованиях, что внешние электромагнитные поля в этих диапазонах частоты могут \u003cstrong\u003eзахватить\u003c/strong\u003e мозг — смысл они могут заставить мозг синхронизировать с внешней частотой, сдвигая рабочее состояние мозга без знания или согласия индивидуального.\u003c/p\u003e\n\u003ch3 id=\"наука-захватывания\"\u003eНаука захватывания\u003c/h3\u003e\n\u003cp\u003eЗахватывание мозговой волны — также называемое ответом с частотным следованием — это тенденция мозга к синхронизации своей доминирующей электрической частоты с внешним ритмичным стимулом. Это не теория. Это основание:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eТерапия бинауральных ударов\u003c/strong\u003e — клинически задокументировано для сдвига мозга состояет\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТрансчерепная магнитная стимуляция (TMS)\u003c/strong\u003e — одобрена FDA для лечения депрессии путем изменения электрических образцов мозга с внешними магнитными полями\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТрансчерепная прямая текущая стимуляция (tDCS)\u003c/strong\u003e — используется DARPA для ускорения обучения в военном персонале путем внешнего изменения электрической деятельности мозга\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЕсли врач может изменить ваше состояние мозга с локализованным магнитным устройством, прижатым к черепу, что сеть башен, транслирующих волны ELF по континенту, может сделать с населением в диапазоне?\u003c/p\u003e\n\u003cp\u003eДоктор Роберт О. Бекер, дважды номинированный для Нобелевской премии в медицине и пионер в исследовании биоэлектромагнетизма, задокументировал обширно, что чрезвычайно низкие частотные электромагнитные поля влияют на биологические системы на уровне клетки. Его исследование продемонстрировало, что поля ELF влияют на проницаемость мембраны клетки, поток кальциевых ионов, производство мелатонина и образцы нейронного стреляния. Его работа была прекращена финансирования после того, как он начал публиковать находки, которые противоречили позиции отрасли телекоммуникаций, что неионизирующее излучение биологически инертно.\u003c/p\u003e\n\u003cp\u003eДоктор Андрия Пухарич, военный финансируемый исследователь, который работал на эффектах ELF для американского правительства, определил конкретные частоты и их эффекты на человеческих субъектов:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e6.66 Hz\u003c/strong\u003e — вызывает депрессию, сниженную когнитивную функцию\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e7.83 Hz\u003c/strong\u003e — резонанс Шумана, земной естественный электромагнитный частоты — связан с благополучием, заземлением и здоровой функцией мозга\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e10.80 Hz\u003c/strong\u003e — вызывает буйное, агрессивное поведение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e11.30 Hz\u003c/strong\u003e — вызывает маниакальное, страданное поведение\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТочность этих находок поразительна. Мы не говорим о смутных \"плохих флюидах\". Мы говорим о конкретных частотах, которые производят конкретные, повторяемые, измеримые изменения в человеческом познании и поведении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"распределение-башен-gwen\"\u003eРаспределение башен GWEN\u003c/h2\u003e\n\u003cp\u003eРасположения башен GWEN не следуют образцу, который вы ожидали бы от чисто военной коммуникационной сети. В то время как официальная сеть 58-башней была разработана для избыточного географического покрытия континентального США, исследование задокументировано:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eКонцентрации башни \u003cstrong\u003eнепропорционально высоко близко к крупным центрам население\u003c/strong\u003e — намного более чем чистая выжившая военная реле сеть требовала бы\u003c/li\u003e\n\u003cli\u003eРазмещение башни сильно коррелирует с \u003cstrong\u003eкрупными расположениями водоносного слоя и линиями разлома\u003c/strong\u003e — геологические черты, которые являются проводниками и усилителями наземного волнового распространения\u003c/li\u003e\n\u003cli\u003eРасстояние между башнями оптимизируется не просто для сигнального реле, но для \u003cstrong\u003eперекрывающегося покрытия поля\u003c/strong\u003e — создание зон, где несколько сигналов башни пересекаются и объединяются\u003c/li\u003e\n\u003cli\u003eМногие сайты башни, которые были официально \"выведены из обслуживания\" в 1994 году, показывают доказательства \u003cstrong\u003eпостоянного поддержания и обновления инфраструктуры\u003c/strong\u003e, несовместимые с забытыми объектами\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОбразец ясен: имя меняется, история покрытия меняется, но инфраструктура сохраняется и расширяется. Сеть GWEN не была выведена из обслуживания. Она была \u003cstrong\u003eпереименована\u003c/strong\u003e.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"феномен-bluetooth-тел\"\u003eФеномен Bluetooth тел\u003c/h2\u003e\n\u003cp\u003eРазвитие, которое связывает напрямую к инфраструктуре GWEN и активации Smart Dust, — это феномен, задокументированный в статье о \u003ca href=\"/bluetooth-bodies-digital-signals/?lang=ru\"\u003eBluetooth Bodies: Digital Signals from Living People\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eИсследователи и независимые следователи по всему миру задокументировали, что многие люди — особенно те, кто получил определенные медицинские вмешательства, начинающиеся в 2021 году — испускают обнаруживаемые сигналы Bluetooth Low Energy (BLE). Эти сигналы отображаются как неопознанные MAC адреса на устройствах сканирования Bluetooth, и они излучаются из человеческих тел.\u003c/p\u003e\n\u003cp\u003eЕсли человеческое тело стало хозяином компонентов электроники нанас-масштаба — ли через инъекцию, инхаляцию, проглатывание или дермальное поглощение — то внешняя активация и коммуникационная инфраструктура требуется для питания, активации и сбора данных из этих компонентов.\u003c/p\u003e\n\u003cp\u003eСеть GWEN, переназначенная и расширенная под крышкой 5G постройки телекоммуникаций, предоставляет ровно такую инфраструктуру. Наземные волны ELF проникают здания, проходят через человеческую ткань и могут взаимодействовать с ответчиками нанас-масштаба на частотах, которые гражданские спектральные анализаторы не настроены обнаруживать.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-вы-не-можете-видеть-может-все-еще-изменить-то-что-вы-есть\"\u003eЧто вы не можете видеть, может все еще изменить то, что вы есть\u003c/h2\u003e\n\u003cp\u003eСеть башень GWEN заставляет нас противостоять неудобной правде: электромагнитная окружающая среда, которую мы живем в, не естественна, это не нейтрально, и это не полностью раскрыто.\u003c/p\u003e\n\u003cp\u003eМы погружены в частоты, которые мы не можем воспринимать. Некоторые из них несут наши телефонные звонки. Некоторые из них могут нести что-то совсем другое. Инфраструктура была построена военным, передана гражданским агентствам, \"выведена из обслуживания\" на бумаге, а затем перестроена под новыми именами с новыми историями покрытия. Подземные медные массивы все еще в земле. Башни все еще стоят. Частоты все еще трансляируются.\u003c/p\u003e\n\u003cp\u003eВопрос состоит не в том, существуют ли башни GWEN. Они делают. Вопрос состоит не в том, влияют ли волны ELF на человеческую биологию. Они явно делают. Вопрос состоит не в том, исследовало ли военное, использование электромагнитных частот для влияния на человеческое познание и поведение. Они исследовали обширно, и исследование задокументировано.\u003c/p\u003e\n\u003cp\u003eВопрос: \u003cstrong\u003eчто трансляируется прямо сейчас, и кто его контролирует?\u003c/strong\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"найти-больше-информации\"\u003eНайти больше информации\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/65-Smart_Dust_Everywhere-Military_Surveillance_Tech.mp4\"\u003eSmart Dust\u003c/a\u003e — Микроскопические частицы наблюдения, активируемые частотами вокруг нас\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/63-Bluetooth_Bodies-MAC_Address_Humans.mp4\"\u003eBluetooth Bodies\u003c/a\u003e — Сигналы, излучаемые человеческими телами и инфраструктура, которая их считывает\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/67-Hive_Mind-Cybernetic_Collective_Consciousness.mp4\"\u003eHive Mind\u003c/a\u003e — Электромагнитная сеть, связывающая биологические и цифровые системы в одну сетку\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/45-The_Strange_Land.mp4\"\u003eThe Strange Land\u003c/a\u003e — После Эдена, мир был наполнен невидимыми силами, человечество больше не могло воспринимать или понимать\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/five-g-activation-frequencies/?lang=ru\"\u003e5G Activation: What Frequencies Do to Living Cells\u003c/a\u003e — Задокументированные биологические эффекты радиочастотного излучения на человеческую ткань\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/smart-dust-surveillance-particles/?lang=ru\"\u003eSmart Dust: Surveillance Particles You Cannot See\u003c/a\u003e — Нанотехнология достаточно маленькая, чтобы вдохнуть, достаточно мощная, чтобы наблюдать\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/directed-energy-weapons-invisible-fire/?lang=ru\"\u003eDirected Energy Weapons: The Invisible Fire\u003c/a\u003e — Электромагнитное оружие, которое сгорает без пламени и убивает без пуль\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/weather-warfare-weaponized-climate/?lang=ru\"\u003eWeather Warfare: Weaponizing the Climate\u003c/a\u003e — Задокументированная история программ военной модификации погоды\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eСтранная земля восточнее Эдема была не просто незнакомой местности — это была окружающая среда, наполненная силами Адам и Ева не могли видеть, не могли назвать и не могли противостоять. Тысячи лет спустя, мы обитаем странную землю нашей собственной работы — покрытую частотами, которые мы не можем воспринимать, окруженные башнями, чья истинная цель скрыта под слоями за слоями официального переназначения и удобного выведения из обслуживания. То, что вы не можете видеть, может все еще изменить то, что вы есть. Воздух вокруг вас не пустой. Это никогда не было. И силы, которые наполняют его, не все трансляируют то, что они утверждают.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/technology/\",\"className\":\"category-badge\",\"children\":\"technology\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Башни GWEN: Что если они НЕ башни 5G?\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"
