3cp\u003eАпостол Павел предупреждал о ложных апостолах — людях, которые носили одежду Христа, служа противнику. Рыцари-тамплиеры, Бедные боевые товарищи Христа и Храма Соломона, являются историческим самым известным примером этого принципа. Основанные сразу после Первого крестового похода как защитники христианских паломников, Тамплиеры стали в течение десятилетий самой богатой, самой мощной и самой секретной организацией в средневековом мире — организацией, чьей истинной целью было не защита паломников, а накопление запрещенных знаний, оккультной власти и глобального финансового контроля.\u003c/p\u003e\n\u003cp\u003eИезуитский орден, который будет основан два века спустя после подавления Тамплиеров, был духовным преемником Тамплиеров. Игнатий Лойола изучал модель Тамплиеров и совершенствовал ее: где Тамплиеры были откровенны, иезуиты были тайны; где Тамплиеры были разрушены королём, иезуиты сделали себя незаменимыми для королей. Джон Адамс писал: \u003cem\u003e\"Если когда-либо было тело мужчин, которые заслуживали вечного проклятия на земле и в аду, это орден иезуитов.\"\u003c/em\u003e То же самое можно сказать о Тамплиерах — но проклятие Тамплиеров было временным. Иезуиты научились делать свое вечным.\u003c/p\u003e\n\u003cp\u003eКак рассказывает \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e, заговор начался с падения ангелов, которые принесли запрещенные знания на Землю. Тамплиеры восстановили это знание и использовали его для построения империи. \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e раскрывает, что величайшее обман — это то, что облекает зло в одежду святости — ровно то, что достигли Тамплиеры под своими белыми мантиями, украшенными красным крестом.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"основание-мифа\"\u003eОснование мифа\u003c/h2\u003e\n\u003ch3 id=\"девять-рыцарей-и-цель\"\u003eДевять рыцарей и цель\u003c/h3\u003e\n\u003cp\u003eОфициальная история рассказывает нам, что в 1119 году нашей эры французский рыцарь по имени Хью де Пейнс и восемь спутников представили себя королю Балдуину II Иерусалимского и предложили защищать христианских паломников на дорогах между портом Яффы и святым городом. Балдуин предоставил им квартиры в мечети Аль-Акса на Храмовой горе — прямо над руинами Храма Соломона.\u003c/p\u003e\n\u003cp\u003eЭта история, повторяемая в каждом учебнике истории, не выдерживает критики:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДевять рыцарей не могли защитить дорогу.\u003c/strong\u003e Маршрут от Яффы до Иерусалима составлял примерно 40 миль через враждебную территорию. Девять человек не могли эффективно патрулировать эту дорогу. Иерусалимское королевство имело постоянную армию для этой цели; девять дополнительных человек были бесполезны с военной точки зрения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТамплиеры не вербовали девять лет.\u003c/strong\u003e Если их миссия была защита дорог, им нужно было расширяться немедленно. Вместо этого они провели девять лет как закрытая группа из девяти человек, расположенная на Храмовой горе, делая — что? Единственное логичное объяснение состоит в том, что их истинная миссия была не защитой, а раскопками.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПатронаж Бернара Клервоского.\u003c/strong\u003e Главным покровителем Тамплиеров был Бернар Клервоский, самый мощный церковный деятель в Европе и основатель цистерцианского ордена. Поддержка Бернара преобразовала Тамплиеров из безвестности в известность практически в одночасье. Его трактат 1129 года \u003cem\u003eIn Praise of the New Knighthood\u003c/em\u003e (В похвалу новой рыцарства) предоставил богословское оправдание ордену и гарантировал папскую поддержку. Связь Бернара с Тамплиерами предполагает высокоуровневую церковную поддержку того, что рыцари делали на Храмовой горе.\u003c/p\u003e\n\u003ch3 id=\"совет-труа\"\u003eСовет Труа\u003c/h3\u003e\n\u003cp\u003eВ 1129 году Тамплиеры получили официальное признание на Совете Труа, председательствуемом папским легатом и присутствовавшим Бернаром Клервоским. Совет дал Тамплиерам формальный Устав (основанный на цистерцианском Уставе) и разрешил им получать пожертвования и вербовать членов.\u003c/p\u003e\n\u003cp\u003eХронология значительна: 1129 год был десять лет после основания Тамплиеров — точно период, который они провели на Храмовой горе без вербовки или проведения военных операций. Все, что они нашли в течение этих десяти лет, было достаточно ценным, чтобы заслужить поддержку самого мощного церковного деятеля в Европе и официальное признание папства.\u003c/p\u003e\n\u003ch2 id=\"возвышение-к-власти\"\u003eВозвышение к власти\u003c/h2\u003e\n\u003ch3 id=\"папские-привилегии\"\u003eПапские привилегии\u003c/h3\u003e\n\u003cp\u003eВ 1139 году папа Иннокентий II издал папскую буллу \u003cem\u003eOmne Datum Optimum\u003c/em\u003e, которая предоставила Тамплиерам необычные привилегии:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eИсключение из всех органов власти, кроме папы\u003c/strong\u003e — Тамплиеры ответствовали только папе, никакому королю, никакому епископу, никакой местной власти. Они были законом сами для себя.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОсвобождение от налогов\u003c/strong\u003e — Тамплиеры не платили налоги ни светской, ни духовной власти.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвобода собирать десятину\u003c/strong\u003e — Тамплиеры могли собирать свои собственные десятины и пожертвования без помех.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвобода строить свои собственные церкви\u003c/strong\u003e — Тамплиеры могли поклоняться в своих собственных учреждениях, независимых от местной епархии.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти привилегии сделали Тамплиеров наиболее независимой организацией в средневековом христианском мире. Они были, по сути, суверенной сущностью, действующей в (но не подчиняясь) королевствам Европы. Ни одна организация до или после не пользовалась таким всеобъемлющим юридическим иммунитетом — пока иезуитский орден не получил аналогичные привилегии от папы Павла III в 1540 году.\u003c/p\u003e\n\u003ch3 id=\"финансовая-империя\"\u003eФинансовая империя\u003c/h3\u003e\n\u003cp\u003eСо своими юридическими привилегиями, обеспеченными, Тамплиеры построили наиболее сложную финансовую сеть, которую мир когда-либо видел. К середине 13-го века, Тамплиеры:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eВладели более чем 870 замками, комендантствами и имениями по всей Европе и Святой Земле\u003c/li\u003e\n\u003cli\u003eУправляли финансовыми делами Французской короны и нескольких других монархий\u003c/li\u003e\n\u003cli\u003eУправляли международной системой денежных переводов, охватывающей известный мир\u003c/li\u003e\n\u003cli\u003eНанимали тысячи солдат, администраторов и рабочих\u003c/li\u003e\n\u003cli\u003eСодержали крупнейший частный флот в Средиземноморье\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eФинансовая система Тамплиеров была прототипом современной международной банковской деятельности. Их кредитные письма, их кредитные операции и услуги управления трастом создали инфраструктуру, которую позже будут строить банковские династии — Медичи, Фуггеры, Ротшильды. Современная банковская система является, в очень реальном смысле, изобретением Тамплиеров.\u003c/p\u003e\n\u003ch2 id=\"эзотерическое-измерение\"\u003eЭзотерическое измерение\u003c/h2\u003e\n\u003ch3 id=\"знание-соломона\"\u003eЗнание Соломона\u003c/h3\u003e\n\u003cp\u003eИмя Тамплиеров — Бедные боевые товарищи Христа и Храма Соломона — указывает на их эзотерическую цель. Соломон в еврейской, христианской и исламской традиции был не просто мудрым царем; он был магом, который командовал демонами, обладал сверхъестественными знаниями и построил Храм, используя методы, которые превосходили обычное человеческое мастерство.\u003c/p\u003e\n\u003cp\u003eРаскопки Тамплиеров под Храмовой горой были поиском знания Соломона — технология и эзотерическая мудрость, которые Соломон использовал для построения Храма, командования духами и накопления величайшего богатства в древнем мире. Книги, приписываемые Соломону — \u003cem\u003eKey of Solomon\u003c/em\u003e, \u003cem\u003eLesser Key of Solomon\u003c/em\u003e, \u003cem\u003eTestament of Solomon\u003c/em\u003e — описывают систему ритуальной магии, которая была хорошо известна в средневековых эзотерических кругах. Тамплиеры искали оригинальные источники этого знания.\u003c/p\u003e\n\u003ch3 id=\"священная-геометрия-в-архитектуре-тамплиеров\"\u003eСвященная геометрия в архитектуре Тамплиеров\u003c/h3\u003e\n\u003cp\u003eАрхитектурное наследие Тамплиеров раскрывает эзотерические знания, которыми они обладали. Церкви и комендантства Тамплиеров включают принципы священной геометрии, которые согласуются как с исламской геометрической традицией, так и с древними мистериями:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВосьмиугольные планы\u003c/strong\u003e — Восьмиугольник, который представляет переход между квадратом (Землей) и кругом (Небом), является центральным мотивом в архитектуре Тамплиеров.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПропорции золотого сечения\u003c/strong\u003e — Здания Тамплиеров включают золотое сечение (1:1.618) в их пропорциях, математическое соотношение, которое было известно в древнем мире, но в значительной степени забыто в средневековой Европе.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАкустические свойства\u003c/strong\u003e — Церкви Тамплиеров спроектированы для усиления и формирования звука конкретным образом, предполагая знание акустики, которое превышало средневековую европейскую норму.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭти архитектурные особенности предполагают, что Тамплиеры обладали техническими знаниями из традиции, более старой и более сложной, чем все, что было доступно в 12-веке Европе — знания, которые почти наверняка были получены во время их раскопок на Святой Земле.\u003c/p\u003e\n\u003ch2 id=\"арест-в-пятницу-13-го\"\u003eАрест в пятницу, 13-го\u003c/h2\u003e\n\u003ch3 id=\"падение-тамплиеров\"\u003eПадение Тамплиеров\u003c/h3\u003e\n\u003cp\u003eВ пятницу, 13 октября 1307 года, Тамплиеры были арестованы по всей Франции в скоординированной операции, которая дала нам суеверие о пятнице 13-го. Король Филипп IV приказал аресты, обвинив Тамплиеров в ереси, богохульстве и мужеложстве.\u003c/p\u003e\n\u003cp\u003eОбвинения, хотя и извлеченные под пытками, поразительно согласуются во всех сотнях признаний, взятых в различных местах разными инквизиторами:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eОтрицание Христа\u003c/strong\u003e — Посвященные должны были плевать на крест, отрицать Христа и топтать крест во время своей инициационной церемонии.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПоклонение Бафомету\u003c/strong\u003e — Тамплиеры предположительно поклонялись голове, называемой Бафометом — термину, этимология которого никогда не была удовлетворительно объяснена, но который был связан с исламским пророком Мухаммедом (Магометом), шифром Атбаша для Софии (мудрость) и различными демоническими сущностями.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРитуальные практики\u003c/strong\u003e — Согласно отчетам, инициационные ритуалы включали неприличные поцелуи (на рте, пупке и основании позвоночника) и поощрение гомосексуальных отношений.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eОтражали ли эти обвинения фактические практики Тамплиеров или были сфабрикованы инквизиторами Филиппа, остается спорным. Но согласованность признаний и задокументированные связи Тамплиеров с исламской и эзотерической традициями предполагают, что по крайней мере некоторые обвинения имели основание в действительности.\u003c/p\u003e\n\u003cp\u003eЗаговор Тамплиеров изменил мир, создав шаблон, который будет следовать каждое последующее тайное общество: накапливать запрещенные знания, построить финансовую империю, проникнуть в политическую власть и служить скрытому хозяину, представляя публичное лицо благочестия и служения. Иезуиты совершенствовали этот шаблон, и они работают его сегодня через католическую церковь, Ватиканский банк и глобальную сеть тайных обществ, которая ответствует Черному папе.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показан, что духовный царство работает через начальства и власти, которые используют человеческие организации как инструменты своей воли. Тамплиеры были одним таким инструментом; иезуиты — другой. Заговор не закончился в пятницу, 13, 1307 года — он просто изменил свое имя и продолжил свою миссию под знаменем Общества Иисуса. Смотрите: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля дополнительной документации см. \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e и \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во в
