ые слова, которых человеку нельзя пересказывать.\"\u003c/em\u003e — 2 Коринфянам 12:2-4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Потому что наша брань не против крови и плоти, но против начальств, против властей, против мироправителей тьмы века сего, против духов злобы поднебесных.\"\u003c/em\u003e — Эфесян 6:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eАпостол Павел говорил о \"третьем небе.\" Если есть третье, должны быть первое и второе. Павел написал эти слова почти две тысячи лет назад. Он описал порывистость — физически или духовно, он сам не знал — к месту, где он слышал вещи, которые не могли быть произнесены. Он испытал измерения реальности, которые человеческий язык не мог содержать.\u003c/p\u003e\n\u003cp\u003eПочти двадцать столетий спустя, 3 августа 1979 года, баптистский министр по имени Говард Питтман испытал то же путешествие. Но в отличие от Павла, Питтман получил разрешение говорить. Ему было дано разрешение — и команда — рассказать миру то, что он видел.\u003c/p\u003e\n\u003cp\u003eТри неба. Три измерения реальности, сложенные одно на другом, отделённые стенами, через которые плоть не может проникнуть. И во втором небе, область такой абсолютной тёмности, что она переопределила понимание Питтмана зла навсегда.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/77-The_Dome_Above.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Dome Above — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Fallen Angels — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"человек-на-столе\"\u003eЧеловек на столе\u003c/h2\u003e\n\u003ch3 id=\"жизнь-служения\"\u003eЖизнь служения\u003c/h3\u003e\n\u003cp\u003eДо рассмотрения того, что видел Питтман, важно понять, кто он был. Кредитоспособность имеет значение. Контекст имеет значение. И контекст жизни Говарда Питтмана делает его свидетельство невозможным отклонить как галлюцинацию слабого разума.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был баптистским священником тридцать пять лет. Не телепроповедник. Не проповедник процветания. Баптистский священник — укоренённый в консервативном, верующем Библию, традиционном протестантском христианстве. Он провел десятилетия на кафедре, в палате больницы, у могилы, в конторе консультирования. Он знал Библию наизусть. Он знал церковную политику. Он знал язык, ритуалы, ожидания и культуру институционального христианства.\u003c/p\u003e\n\u003cp\u003eПомимо церкви, он был отставным офицером Полицейского управления Нового Орлеана. NOPD. Одна из самых жёстких полицейских сил в одном из самых жёстких городов в Америке. Это не был человек, склонный к полётам фантазии или эмоциональному избытку. Это был человек, обученный наблюдать, анализировать, сообщать факты и выживать.\u003c/p\u003e\n\u003cp\u003eОн жил на ферме площадью шестьдесят один акр в Миссисипи. Он был женат. Он был установлен. Он был, по каждому измерению, обычным человеком, живущим обычной жизнью — необычный, то есть, пока его главная артерия не разорвалась и его тело начало умирать.\u003c/p\u003e\n\u003ch3 id=\"ночь-3-августа-1979-года\"\u003eНочь 3 августа 1979 года\u003c/h3\u003e\n\u003cp\u003eМедицинские факты прямолинейны. Главная артерия Говарда Питтмана разорвалась, вызывая опустошительное кровотечение. Внутреннее кровотечение — тип, который убивает быстро и эффективно. Он был доставлен в больницу и допущен в отделение интенсивной терапии около полуночи.\u003c/p\u003e\n\u003cp\u003eВ течение шести часов медицинский персонал работал, чтобы стабилизировать его. Мониторы пищали. IV линии работали. Медсёстры проверяли жизненные показатели. Врачи оценивали и переоценивали. И в шесть часов утра его жизненные показатели не прошли. Его тело умирало. Машины подтвердили то, что боялся медицинский коллектив.\u003c/p\u003e\n\u003cp\u003eСемичасовая хирургия последовала — отчаянная попытка восстановить повреждение и восстановить кровоток. Семь часов на операционном столе. Семь часов, в течение которых тело Говарда Питтмана колебалось между жизнью и смертью.\u003c/p\u003e\n\u003cp\u003eНо Питтман был не бессознательным. Он был не \"под.\" Он был где-то полностью иным.\u003c/p\u003e\n\u003ch3 id=\"странная-молитва\"\u003eСтранная молитва\u003c/h3\u003e\n\u003cp\u003eКогда его тело не прошло, Питтман молился. Но это не была молитва умирающего человека, умоляющего больше времени. Это не было \"Боже, пожалуйста исцели меня\" или \"Боже, пожалуйста позволь мне жить.\" Это была то, что Питтман сам описал как \"странная молитва.\"\u003c/p\u003e\n\u003cp\u003eОн молился появиться перед троном Бога.\u003c/p\u003e\n\u003cp\u003eРассмотрите дерзость этого запроса. Рассмотрите смелость. Умирающий человек, баптистский министр, который служил тридцать пять лет, который имел каждую причину верить, что он спасён, который имел каждую причину ожидать небо — этот человек молился не просто идти на небо, но стоять перед самым троном Бога.\u003c/p\u003e\n\u003cp\u003eИ Бог сказал да.\u003c/p\u003e\n\u003cp\u003eАнгел пришёл. Не метафорический ангел. Не символ. Не ощущение. Существо — фактическое, личное, сознательное существо — пришло и подняло дух Питтмана из его физического тела. И путешествие началось.\u003c/p\u003e\n\u003ch2 id=\"первое-небо\"\u003eПервое небо\u003c/h2\u003e\n\u003ch3 id=\"физический-мир\"\u003eФизический мир\u003c/h3\u003e\n\u003cp\u003eПервое небо, как Питтман его описал, — это физический мир. Материальная вселенная. Всё, что человеческие чувства могут воспринять — земля, небо, звёзды, планеты, воздух, которым мы дышим, земля, которой мы ходим. Это первое небо.\u003c/p\u003e\n\u003cp\u003eНо Питтман немедленно заметил кое-что, что изменило его понимание реальности. Когда его дух отделился от его тела, первое небо не стало менее реальным. Физический мир не стал более реальным. Произошло противоположное. Область духа была БОЛЕЕ реальна, чем физическая область. Материальный мир, который мы рассматриваем как высшую реальность, был выявлен как тень — тонкий, временный слой, натянутый на более глубокую, более постоянную, более вещественную реальность.\u003c/p\u003e\n\u003cp\u003eЭто идеально согласуется с утверждением Павла в 2 Коринфянам 4:18: \"Поскольку мы смотрим не на видимое, а на невидимое: ибо видимое временно, а невидимое вечно.\"\u003c/p\u003e\n\u003cp\u003eПервое небо временно. Это временная область. Видимая область. Область, которую большинство людей рассматривают как единственную реальность. Но Питтман, теперь освобождённый от своего физического тела, мог ясно видеть: первое небо менее реально из трёх. Это поверхность. Под ней — или выше её, или вокруг неё, или через неё — лежит что-то намного более вещественное.\u003c/p\u003e\n\u003ch3 id=\"природа-духового-путешествия\"\u003eПрирода духового путешествия\u003c/h3\u003e\n\u003cp\u003eОсвобождённый от его тела, Питтман открыл фундаментальные различия между физическим и духовным существованием. В физическом мире путешествие требует времени. Вы движетесь через пространство со скоростью, определённой ограничениями вашего тела или транспорта. Быстрее, чем вы можете идти, является ограничено физическим законом.\u003c/p\u003e\n\u003cp\u003eВ духовной области путешествие происходит со скоростью мышления. Вы думаете о местонахождении, и вы там. Нет путешествия в физическом смысле — нет расстояния для прикрытия, нет времени для прохождения. Мышление — это транспорт. Воля — это скорость. Ограничения физики не применяются.\u003c/p\u003e\n\u003cp\u003eКоммуникация была аналогично трансформирована. В физическом мире мы коммуницируем через вибрацию — голосовые связки вибрируют молекулы воздуха, которые путешествуют к барабанным перепонкам, которые переводят вибрацию в значение. Это медленно, неточно и подвержено неправильному пониманию. В духовной области коммуникация происходит через волны мышления — прямо, мгновенно, точно и полно. Не рот к уху, но разум к разуму. Мышление к мышлению. Значение передано без неловкости языка.\u003c/p\u003e\n\u003cp\u003eПиттман узнал, что человеческие существа не являются физическими существами, имеющими духовный опыт. Они являются духовными существами, имеющими физический опыт. Дух — это истинное я. Тело — это транспорт. И когда транспорт не работает, я продолжается — путешествуя со скоростью мышления, коммуницируя через волны мышления, существуя в реальности намного более яркой и вещественной, чем физический мир, который она оставила.\u003c/p\u003e\n\u003ch2 id=\"второе-небо\"\u003eВторое небо\u003c/h2\u003e\n\u003ch3 id=\"размерная-стена\"\u003eРазмерная стена\u003c/h3\u003e\n\u003cp\u003eМежду первым небом и вторым небом Питтман встретил то, что он описал как размерную стену — границу, отделяющую физическую область от духовной области. Эта стена не сделана из физического материала. Она не может быть видна физическими глазами. Она не может быть измерена физическими инструментами. Но она реальна — так же реальна как кирпичная стена, и намного более непроницаема.\u003c/p\u003e\n\u003cp\u003eПлоть не может пройти через эту стену. Никакое физическое тело, никакой физический объект, никакая физическая сила не может проникнуть размерный барьер между первым и вторым небами. Вот почему духовная область остаётся невидимой физическим чувствам. Вот почему учёные не могут обнаружить её инструментами. Вот почему материалисты отрицают её существование. Стена абсолютна. Разделение полно.\u003c/p\u003e\n\u003cp\u003eНо дух может пройти через. Дух Питтмана, освобождённый от его тела и сопровождаемый ангелом, прошёл через размерную стену так же легко как мышление. По другую сторону было второе небо.\u003c/p\u003e\n\u003ch3 id=\"область-сатаны\"\u003eОбласть Сатаны\u003c/h3\u003e\n\u003cp\u003eВторое небо — это область Сатаны. Его территория. Его трон комната. Штаб-квартира, из которой он командует своими силами и администрирует свою войну против человечества и против Бога.\u003c/p\u003e\n\u003cp\u003eПиттман был взят через эту область, и то, что он был свидетелем, отрицал всё, что он воображал о духовном мире за тридцать пять лет служения. Он имел проповеданный о Сатане. Он имел преподав о демонах. Он имел контролировал люди, которые утверждали быть под духовным нападением. Но ничто — абсолютно ничто — не имело подготовить его для реальности второго неба.\u003c/p\u003e\n\u003cp\u003eВторое небо — это не популярный христианский образ ада — огонь и сера и красно-одетые дьяволы с вилами. Это намного хуже, чем это. Это область организованного, дисциплинированного, военного зла. Демоны миллионами, организованные в иерархии, выполняющие специфические задачи с ужасающей эффективностью. Не хаос. Не анархия. Порядок. Жестокий, целенаправленный, неумолимый порядок.\u003c/p\u003e\n\u003cp\u003eКаждому демону назначена специфическая задача. Каждому демону назначена специфическая область авторитета. Каждый демон работает в цепи команды так же строга и дисциплинирована как любая военная структура на земле — более дисциплинирована, в действительности, чем любое человеческое войско, которое когда-либо существовало.\u003c/p\u003e\n\u003ch3 id=\"полное-отсутствие-любви\"\u003eПолное отсутствие любви\u003c/h3\u003e\n\u003cp\u003eНо наиболее разрушительное откровение второго неба не было его организацией. Это не было его размером. Это не было числом или силой демонов, которые его населяли. Наиболее разрушительное откровение было то, что отсутствовало.\u003c/p\u003e\n\u003cp\u003eЛюбовь.\u003c/p\u003e\n\u003cp\u003eВо втором небе любовь полностью отсутствует. Не уменьшена. Не искажена. Не развращена. Отсутствует. Нуль. Ничего. Ни одна частица, ни одна молекула, ни один атом любви существует где-либо в области Сатаны.\u003c/p\u003e\n\u003cp\u003eЭто почти невозможно для человеческого существа понять. Мы живём в мире, где любовь существует — неправильная, разбитая, часто скрученная, но присутствующая. Даже наиболее злой человеческое существо на земле живёт в окружающей среде, где любовь существует где-либо. Мать любит ребёнка. Друг любит друга. Собака любит своего хозяина. Любовь пронизывает первое небо в некоторой форме, даже в её наиболее деградированном состоянии.\u003c/p\u003e\n\u003cp\u003eНо во втором небе любовь полностью исчезла. Каждое взаимодействие, каждое общение, каждое отношение, каждая транзакция во втором небе происходит в полном отсутствии любви. Демоны не любят друг друга. Они не любят Сатану. Сатана не любит их. Нет привязанности, нет тепла, нет сострадания, нет сочувствия, нет нежности. Ничего.\u003c/p\u003e\n\u003cp\u003eИ все же — и это парадокс, который поразил Питтмана — они работают вместе с невероятной преданностью и рвением. Несмотря на полное отсутствие любви, силы Сатаны более организованы, более дисциплинированы, более заняты и более эффективны, чем церковь. Они выполняют свои задачи с преданностью, которая стыдит большинство христиан. Не из любви. Не из преданности. Из чистого, бесстрастного, вычисленного послушания их иерархии.\u003c/p\u003e\n\u003cp\u003eЭто должно ужасать каждого христианина, который думает, что любовь одной достаточно для выигрыша духовной войны. Враг работает без любви — и он выигрывает. Он выигрывает потому, что он организован, дисциплинирован и неумолим. Церковь, которая имеет любовь, проигрывает потому, что она дезорганизована, недисциплинирована и случайна.\u003c/p\u003e\n\u003ch2 id=\"третье-небо\"\u003eТретье небо\u003c/h2\u003e\n\u003ch3 id=\"трон-бога\"\u003eТрон Бога\u003c/h3\u003e\n\u003cp\u003eИз второго неба Питтман был взят в третье небо — жилище самого Бога. Область, где Создатель всех вещей сидит на своём троне. Место, которое Павел описал как \"рай,\" где он услышал \"неизречённые слова, которые человеку нельзя пересказывать.\"\u003c/p\u003e\n\u003cp\u003eРассказ Питтмана третьего неба, по его природе, ограничен. Человеческий разум не может полностью постичь то, что существует там. Человеческий язык не может адекватно это описать. Но то, что Питтман испытал, было местом абсолютной силы, абсолютного авторитета, абсолютной святости и — в резком контрасте со вторым небом — абсолютной любви.\u003c/p\u003e\n\u003cp\u003eЕсли второе небо определено полным отсутствием любви, третье небо определено её полным присутствием. Любовь не просто присутствует в третьем небе. Любовь ЯВЛЯЕТСЯ третьим небом. Это атмосфера. Вещество. Фундамент. Всё, что существует там, существует в рамках любви и потому что любовь.\u003c/p\u003e\n\u003cp\u003eКонтраст между вторым и третьим небами — это контраст между Сатаной и Богом, между восстанием и послушанием, между смертью и жизнью, между отсутствием любви и её ошеломляющим, потребляющим, неописанным присутствием.\u003c/p\u003e\n\u003ch3 id=\"перед-троном\"\u003eПеред троном\u003c/h3\u003e\n\u003cp\u003eИменно здесь, перед троном Бога, Питтман получил сообщение, которое ему было отослано, чтобы доставить. Разрушительная статистика: 97,5 процентов исповедующих христиан отклонено. Главная причина: служение себе. Диагноз: церковь принимает плацебо. Назначение: пробудись.\u003c/p\u003e\n\u003cp\u003eНо это было также здесь, что Питтман понял, почему сообщение было так срочно. Стоя в присутствии абсолютной святости, он мог ясно видеть, что самообман выглядит как с перспективы Бога. Из первого неба — из скамьи, из кафедры, из паркинга церкви — плацебо выглядит убедительно. Форма благочестия впечатляющая. Слова звучат правильно. Деятельности кажутся продуктивны.\u003c/p\u003e\n\u003cp\u003eНо из трона ничего не имеет значения. Из трона, только одно имеет значение: находится ли Христос на троне вашей жизни, или находится я? И ответ, для 97,5 процентов, — это я.\u003c/p\u003e\n\u003ch2 id=\"законы-духовной-области\"\u003eЗаконы духовной области\u003c/h2\u003e\n\u003ch3 id=\"дух-превосходит-плоть\"\u003eДух превосходит плоть\u003c/h3\u003e\n\u003cp\u003eПутешествие Питтмана через три неба выявило фундаментальные законы, которые управляют духовной областью — законы так же абсолютны и неправителимы как законы физики, которые управляют материальным миром.\u003c/p\u003e\n\u003cp\u003eПервый закон: дух выше плоти. Духовная область более реальна, более постоянна, более вещественна и более мощна, чем физическая область. Когда есть конфликт между духом и плотью, дух преобладает. Всегда. Без исключения.\u003c/p\u003e\n\u003cp\u003eЭто имеет огромные последствия. Это означает, что физические решения не могут решить духовные проблемы. Медицина не может исцелить болезнь, коренащуюся духом. Терапия не может разрешить конфликт, коренящийся духом. Образование не может преодолеть обман, коренящийся духом. Материальный мир подчинён духовному миру, и затрагивая материальное, пока игнорируя духовное, — затрагивает симптом, пока игнорируя болезнь.\u003c/p\u003e\n\u003ch3 id=\"коммуникация-через-мышление\"\u003eКоммуникация через мышление\u003c/h3\u003e\n\u003cp\u003eВторой закон: коммуникация в духовной области через мышление, не через физический звук. Это означает, что каждое мышление услышано. Каждое намерение видимо. Каждый мотив выставлен. В физическом мире мы можем скрыть наши мысли позади наших слов. Мы можем сказать одно и думать другое. Мы можем представить фасад. В духовной области фасад разорван. Мышление прозрачно.\u003c/p\u003e\n\u003cp\u003eВот почему Писание говорит, что Бог \"исследует сердца\" (Римлян 8:27). Не потому, что он подозрителен, а потому, что духовная область работает на мышлении. В его области, мышление ЯВЛЯЕТСЯ коммуникацией. Нет разделения между тем, что вы думаете и что вы говорите. Что означает, что рот-исповедующего христианина фундаментального стратегии — говорить правильные вещи, пока думаю и жил по-другому — раскрывается как полностью бесплодная в духовной области.\u003c/p\u003e\n\u003ch3 id=\"размерное-разделение\"\u003eРазмерное разделение\u003c/h3\u003e\n\u003cp\u003eТретий закон: небеса разделены размерными стенами, через которые плоть не может проникнуть. Это означает, что духовная область не далеко. Это не в отдалённой галактике или отдельной вселенной. Это здесь — именно здесь, занимая то же пространство, сосуществующее с физическим миром. Но размерная стена делает его невидимым и недоступным для физических чувств.\u003c/p\u003e\n\u003cp\u003eВот почему вы не можете видеть демонов глазами или услышать ангелов с ушами (при обычных обстоятельствах). Не потому, что они далеко. Потому, что они находятся по другую сторону размерной стены, через которую ваша плоть не может проникнуть. Они здесь. Прямо здесь. В этой комнате. Вокруг вашего стула. Вокруг вашей кровати. Вокруг вашего рабочего места. Второе небо не где-то ещё. Это везде — отделено от вашего восприятия стеной, которую может пересечь только дух.\u003c/p\u003e\n\u003ch3 id=\"душа-принадлежит-духу\"\u003eДуша принадлежит духу\u003c/h3\u003e\n\u003cp\u003eЧетвёртый закон: человеческая душа принадлежит духу, не телу. В отличие от животных, чьё сознание привязано к их физической форме, человеческие существа — это духовные существа, обитающие временно в плоти. Тело — это транспорт. Дух — это водитель. Когда тело умирает, дух продолжается. Душа — личность, сознание, \"вы\" — идёт с духом, не с телом.\u003c/p\u003e\n\u003cp\u003eЭто то, что произошло Питтману. Когда его тело не прошло на операционном столе, его дух — его истинное я — продолжился. Он был всё ещё Говард Питтман. Он все ещё имел свои воспоминания, его личность, его осознание. Он имел просто оставить транспорт. И в оставлении транспорта, он открыл, что дорога — духовная область — была намного более обширна, намного более реальна, и намного более последовательна, чем всё, что транспорт позволил бы ему видеть.\u003c/p\u003e\n\u003ch2 id=\"последствия-для-живущих\"\u003eПоследствия для живущих\u003c/h2\u003e\n\u003ch3 id=\"мы-не-одни\"\u003eМы не одни\u003c/h3\u003e\n\u003cp\u003eНаиболее немедленное следствие свидетельства Питтмана — это то, что мы не одни. Когда-либо. Духовная область присутствует — всегда присутствует, везде присутствует. Второе небо, со своей демонической иерархией, действует прямо сейчас, в этой комнате, вокруг вас. Демоны выполняют задачи. Ангелы стоят в охране. Война происходит. Это не метафора. Это не теологическое воздержание. Это присутствующая, активная, текущая реальность.\u003c/p\u003e\n\u003cp\u003eЭто меняет всё. Это меняет, как вы молитесь. Это меняет, как вы думаете. Это меняет, как вы живёте. Если духовная область так реальна, как говорит Питтман — более реальна, чем физическое — то игнорирование её — наиболее опасное, что человеческое существо может делать. И всё же это именно то, что большинство христиан делают. Они живут как практические материалисты, признавая духовную область в теории в воскресенье утром и игнорируя её на практике в остальную часть недели.\u003c/p\u003e\n\u003ch3 id=\"война-реальна\"\u003eВойна реальна\u003c/h3\u003e\n\u003cp\u003eЭфесян 6:12 не является метафорой. \"Ибо наша брань не против крови и плоти, но против начальств, против властей, против мироправителей тьмы века сего, против духов злобы поднебесных.\" Павел написал это, потому что это буквально верно. И Питтман видел это собственными глазами.\u003c/p\u003e\n\u003cp\u003eВойна между Богом и Сатаной, между силами третьего неба и силами второго неба, ведётся прямо сейчас. И первичное поле боя — это человеческое сердце. Тронный зал. Кто сидит на троне? Христос или я? Этот вопрос — то, что каждое назначение демона разработано, чтобы влиять, каждое ангельское вмешательство отправляется, чтобы защитить, и каждый момент каждой жизни вращается вокруг.\u003c/p\u003e\n\u003cp\u003eПлацебо-церковь не преподав войну. Она преподав удобство. Это преподав благословение. Это преподав чувство хорошо о чувстве хорошо. И между тем, силы второго неба организованы, дисциплинированы, назначены и неумолимы. Они никогда не отдыхают. Они никогда не берут воскресенье. Они никогда не объявляют перемирие.\u003c/p\u003e\n\u003ch3 id=\"любовь-это-оружие\"\u003eЛюбовь это оружие\u003c/h3\u003e\n\u003cp\u003eПолное отсутствие любви во втором небе не просто описательная деталь. Это стратегическое откровение. Любовь — это одно, что Сатана не имеет и не может воспроизвести. Это одно оружие в арсенале, у которого враг не имеет защиты. Не эмоция. Не сентиментальность. Подлинная, самопожертвующаяся, несущаяся кросс, отражающая-Христа любовь.\u003c/p\u003e\n\u003cp\u003eВот почему величайшее командование — любовь. Не потому, что Бог сентиментален. Потому, что любовь — это фундаментальная сила третьего неба — сила, которая держит всё вместе, сила, которая побеждает всё, что она касается, сила, что второе небо не имеет ответа.\u003c/p\u003e\n\u003cp\u003eИ это то, что делает плацебо таким опасным. Он заменяет подлинную любовь эмоцией. Он заменяет чувства для жертвы. Он предлагает опыт любви без стоимости любви. И в этом, он разоружает церковь её единого оружия.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSource: Howard Pittman's \u003cem\u003ePlacebo\u003c/em\u003e booklet, Lake Hamilton Bible Camp\u003c/p\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/77-The_Dome_Above.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Dome Above — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo con
