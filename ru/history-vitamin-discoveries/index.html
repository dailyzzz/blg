14-15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИстория открытий витаминов читается как героический нарратив научного прогресса — блестящие исследователи раскрывают секреты питания, спасают миллионы от болезней дефицитности, продвигают человеческое знание. Но снимите мифологию, и то, что вы найдете под ней, — это тщательно оркестрованная кампания обмана, протянувшаяся более века, финансируемая теми же олигархическими семьями, которые создали фармацевтическую промышленность, и служащая той же древней повестке контроля, которая определила орден иезуитов с тех пор, как Игнатий Лойола основал его как военную организацию в 1540 году.\u003c/p\u003e\n\u003cp\u003eВо время своего опыта близкой смерти Howard Pittman был показан, что второе небо наполнено демоническими сущностями, организующимися против человечества. Он узнал, что эти сущности работают через обман — не через сырую власть, но через ложь, столь глубоко встроенные в человеческую культуру, что люди принимают их как неподвергаемую сомнению истину. Нарратив о витаминах — это одна такая ложь. Она так глубоко вплетена в наше понимание здоровья, что оспаривать ее чувствует себя оспаривая саму реальность. Но это точно то, на что демоны рассчитывают.\u003c/p\u003e\n\u003cp\u003eДокументальный фильм Catholic Confidential разоблачил, как иезуитская присяга требует проникновения \"завуалированной хитростью\" в каждое учреждение. Иезуиты и их союзные тайные общества не просто проникли в Церковь — они проникли в науку, медицину и образование. Они создали рамки, через которые мы понимаем собственные тела, и эти рамки предназначены не для исцеления, а для порабощения.\u003c/p\u003e\n\u003cp\u003eНаполеон признал эту силу: \"Иезуиты — это военная организация... абсолютная власть, универсальная власть, власть контролировать мир волей одного человека.\" John Adams предупредил об \"вечной дамнации\" для этого \"Общества Лойолы.\" И генерал Тамбулини похвалился: \"Я управляю половиной мира из этой комнаты.\" Нарратив о витаминах управляется из той же комнаты.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"официальная-история-против-скрытой-правды\"\u003eОфициальная история против скрытой правды\u003c/h2\u003e\n\u003ch3 id=\"традиционная-временная-шкала\"\u003eТрадиционная временная шкала\u003c/h3\u003e\n\u003cp\u003eТрадиционная история витаминов следует аккуратной, вдохновляющей временной шкале:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e1747\u003c/strong\u003e: James Lind открывает, что цитрусовые лечат цингу\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1897\u003c/strong\u003e: Christiaan Eijkman связывает берибери с диетой\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1912\u003c/strong\u003e: Casimir Funk чеканит термин \"витамин\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1913\u003c/strong\u003e: Elmer McCollum открывает \"Растворимый в жире фактор A\" (Витамин A)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1920s-1940s\u003c/strong\u003e: Быстрое открытие витаминов B, C, D, E, K и их подтипов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1930s-1950s\u003c/strong\u003e: Нобелевские премии присуждаются за исследования витаминов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e1950s-present\u003c/strong\u003e: Программы массового дополнения запущены по всему миру\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто убедительный нарратив. Это также фундаментально нечестно.\u003c/p\u003e\n\u003ch3 id=\"что-на-самом-деле-произошло\"\u003eЧто на самом деле произошло\u003c/h3\u003e\n\u003cp\u003eИстория \"открытий\" витаминов — это не история чистого научного исследования. Это история промышленной химии, ищущей прибыльные приложения, Рокфеллер-финансируемых учреждений, создающих новые рынки для продуктов на основе нефти, и глобальной элиты, проектирующей зависимость от синтетических веществ, которые заменяют целостное питание, которое Бог разработал для людей.\u003c/p\u003e\n\u003ch4 id=\"роль-фонда-рокфеллера\"\u003eРоль Фонда Рокфеллера\u003c/h4\u003e\n\u003cp\u003eElmer McCollum, человек, получивший признание за открытие витамина A в Йельском университете, а позже в Johns Hopkins, проводил свои исследования с финансированием, которое напрямую проследить к Фонду Рокфеллера. Сам Johns Hopkins был учреждением, финансируемым Рокфеллером. Интерес Фонда Рокфеллера в питании был не благотворительным — он был стратегическим. Идентифицируя отдельные химические соединения в пище и затем синтезируя их в лабораториях, Фонд создал полностью новую промышленность.\u003c/p\u003e\n\u003cp\u003eДоклад Flexner 1910 года, финансируемый Фондом Карнеги с поддержкой Рокфеллера, уже разрушил гомеопатические и натуропатические медицинские школы по всей Америке. \"Открытия\" витаминов, которые последовали, были конструктивной фазой этого проекта демонтажа. Разрушив традиционные понимания питания и здоровья, машина Рокфеллера построила новую парадигму — парадигму, основанную на изолированных химических соединениях, патентуемых процессах и постоянной зависимости.\u003c/p\u003e\n\u003ch4 id=\"миф-casimir-funk-и-витамина\"\u003eМиф Casimir Funk и \"Витамина\"\u003c/h4\u003e\n\u003cp\u003eCasimir Funk, который чеканил термин \"витамин\" (позже сокращено до \"витамин\") в 1912 году, работал в Lister Institute в Лондоне. Его теория была, что болезни как берибери, цинга, пеллагра и рахит были вызваны дефицитностью определенных химических соединений в диете. Эта теория — модель \"дефицитной болезни\" — стала основой современной науки о питании.\u003c/p\u003e\n\u003cp\u003eНо модель Funk содержала фундаментальный дефект, который никогда не был исправлен, потому что исправление его разрушило бы триллионную промышленность. Дефект в этом: \u003cstrong\u003eболезни, приписываемые дефицитностям витаминов, вызваны плохим в целом питанием и токсическими условиями окружающей среды, а не отсутствием определенных изолированных соединений.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eБерибери, например, появился в популяциях, которые ели отполированный белый рис — рис, лишенный его отруби, зародыша и большей части его пищевой ценности. Решение было не брать таблетку витамина B1. Решение было есть целый рис, или еще лучше, разнообразную диету целых продуктов. Но промышленное решение — прибыльное решение — было подрезать пищу, затем продать назад недостающие питательные вещества как добавки.\u003c/p\u003e\n\u003cp\u003eЭто модель Рокфеллера в миниатюре: создать проблему, затем продать решение.\u003c/p\u003e\n\u003ch3 id=\"заводская-нобелевской-премии\"\u003eЗаводская Нобелевской премии\u003c/h3\u003e\n\u003cp\u003eМежду 1929 и 1964 годами многочисленные Нобелевские премии были присуждены за исследования, связанные с витаминами. Нобелевская премия придала мгновенный кредит парадигме витаминов, делая ее практически неуязвимой для критики. Но сама Нобелевская премия не является беспристрастным арбитром истины, на который она претендует быть.\u003c/p\u003e\n\u003cp\u003eКомитет Нобелевской премии имеет глубокие связи со шведскими банкирующимися семьями, европейской королевской семьей и той же сетью тайных обществ, в которой работают иезуиты. Сам Alfred Nobel сделал свое состояние из динамита — из разрушения. Премии, носящие его имя, служат функции охранника: они возвышают определенные нарративы и определенных исследователей, при этом гарантируя, что инакомыслящие голоса маргинализированы.\u003c/p\u003e\n\u003cp\u003eРассмотрим, что Linus Pauling, который выиграл Нобелевскую премию по химии, потратил последние десятилетия своей карьеры, выступая за мегадозовую терапию витамина C — позицию, которая была высмеяна медицинским истеблишментом, несмотря на учетные данные Pauling. Истеблишмент использует Нобелевскую премию как оружие: он награждает тех, кто строит парадигму, и наказывает тех, кто ей угрожает, даже если угроза исходит от товарища лауреата.\u003c/p\u003e\n\u003ch2 id=\"химическая-реальность-синтетических-витаминов\"\u003eХимическая реальность синтетических витаминов\u003c/h2\u003e\n\u003ch3 id=\"что-синтетические-витамины-на-самом-деле\"\u003eЧто синтетические витамины на самом деле\u003c/h3\u003e\n\u003cp\u003eБольшинство людей, принимающих витаминные добавки, понятия не имеют, что они на самом деле принимают. Синтетические витамины не извлекаются из продуктов. Они производятся из промышленных химических веществ:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eВитамин A (пальмитат ретинила)\u003c/strong\u003e: Синтезирован из метанола, лесного спирта, или получен из нефти\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВитамин B1 (мононитрат тиамина)\u003c/strong\u003e: Произведен из производных каменного угля и соляной кислоты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВитамин B12 (цианокобаламин)\u003c/strong\u003e: Содержит молекулу цианида; производится через бактериальную ферментацию в промышленных резервуарах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВитамин C (аскорбиновая кислота)\u003c/strong\u003e: Производится из кукурузного сиропа через многошаговый химический процесс; не то же самое, что комплекс витамина C, найденный в целых продуктах\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВитамин D2 (эргокальциферол)\u003c/strong\u003e: Создан путем облучения грибного вещества ультрафиолетовым светом\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВитамин E (dl-alpha-tocopherol)\u003c/strong\u003e: Синтетическая форма, сделанная из нефти; префикс \"dl\" указывает, что это рацемическая смесь, содержащая формы, которые тело не может использовать\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не продукты. Они являются промышленными химическими веществами, производимыми в тех же типах учреждений, которые производят пестициды, пластики и фармацевтические препараты. Они делят цепочки поставок, материнские компании и корпоративные залы заседаний с самими промышленностями, которые отравляют нашу еду, воду и воздух.\u003c/p\u003e\n\u003ch3 id=\"различие-целого-продукта\"\u003eРазличие целого продукта\u003c/h3\u003e\n\u003cp\u003eВ целых продуктах, соединения, которые мы называем \"витаминами\", существуют в сложной матрице кофакторов, ферментов, микроэлементов и других синергетических соединений. Витамин C в апельсине сопровождается биофлавоноидами, гесперидином, рутином и десятками других соединений, которые работают вместе. Аскорбиновая кислота в таблетке — это изолированный фрагмент — как удаление рулевого колеса из автомобиля и называние его транспортом.\u003c/p\u003e\n\u003cp\u003eТело признает различие. Исследования показали, что биодоступность питательных веществ из целых продуктов далеко превышает синтетические добавки. Тело впитывает, использует и получает выгоду от питательных веществ из продуктов питания способами, которые он просто не может из изолированных химических веществ.\u003c/p\u003e\n\u003cp\u003eНо эта правда разрушительна для промышленности в 150 миллиардов долларов, поэтому она подавляется, высмеяется и хоронится под лавиной финансируемых промышленностью исследований, которые \"доказывают\", что синтетические витамины эквивалентны питанию из целых продуктов.\u003c/p\u003e\n\u003ch2 id=\"духовная-архитектура-обмана\"\u003eДуховная архитектура обмана\u003c/h2\u003e\n\u003ch3 id=\"почему-питание-важно-духовно\"\u003eПочему питание важно духовно\u003c/h3\u003e\n\u003cp\u003eВаше тело — это храм Святого Духа (1 Коринфянам 6:19). Как вы питаете этот храм — это не просто решение о здоровье — это духовное. Силы, выстроившиеся против человечества, понимают это, вот почему они инвестировали так много в коррупцию нашего понимания питания.\u003c/p\u003e\n\u003cp\u003eHoward Pittman узнал во время своего NDE, что 97.5% христиан терпели неудачу в своем хождении. Духовная война, описанная в Эфесянах 6:12 — против начальств, властей и духовной злобы в высоких местах — проявляется в физическом мире через системы обмана. Витаминная промышленность — это одна такая система. Она учит людей доверять синтетическим химическим веществам вместо Божьего провидения. Она заменяет замысел Творца имитацией создания.\u003c/p\u003e\n\u003cp\u003eИезуиты, как выявлено в документальном фильме Catholic Confidential, практикуют \"каждый вид порока\" в служении целям своего ордена. Отравление тела, утверждая, что питает его, — это именно тот вид инверсии, который характеризует сатанические операции. Добро становится злом; яд становится медициной; синтетические химические вещества становятся \"необходимыми питательными веществами.\"\u003c/p\u003e\n\u003ch3 id=\"алхимическая-связь\"\u003eАлхимическая связь\u003c/h3\u003e\n\u003cp\u003eИстория исследования витаминов — это, во многих отношениях, продолжение алхимической традиции. Алхимики стремились трансмутировать основные металлы в золото — создать что-то ценное из ничего ценного через секретное знание и химические процессы. Витаминная промышленность делает то же самое: она трансмутирует побочные продукты нефти и производные каменного угля в \"необходимые питательные вещества\", которые командуют премиальными ценами.\u003c/p\u003e\n\u003cp\u003eАлхимия всегда была оккультной практикой, уходящей в Герметическую философию и Гностические убеждения, что человек может совершенствовать природу через скрытое знание. Розенкрейцеры, Масоны и иезуиты все сохранили алхимические традиции. Современная фармацевтическая промышленность — это прямой потомок этих традиций — Великая работа алхимии была просто индустриализирована.\u003c/p\u003e\n\u003ch2 id=\"мошенничество-с-дефицитной-болезнью\"\u003eМошенничество с дефицитной болезнью\u003c/h2\u003e\n\u003ch3 id=\"цинга-миф-основания\"\u003eЦинга: миф основания\u003c/h3\u003e\n\u003cp\u003eИстория цинги — это краеугольный камень витаминного нарратива: матросы, лишенные свежих фруктов и овощей, развили ужасающую болезнь, и витамин C был лекарством. Но фактическая история сложнее — и более раскрывающая.\u003c/p\u003e\n\u003cp\u003eЗнаменитый эксперимент James Lind 1747 года на HMS Salisbury действительно показал, что цитрусовые фрукты помогают пациентам с цингой. Но Lind никогда не утверждал, что открыл определенное химическое соединение. Он просто наблюдал, что определенные продукты помогали, а другие нет. Прыжок от \"ешьте свежие фрукты\" к \"принимайте таблетки аскорбиновой кислоты\" был сделан свыше 150 лет спустя, и это не было сделано врачами, ищущими помочь пациентам, а химиками, ищущими создать продукты.\u003c/p\u003e\n\u003cp\u003eБолее того, цинга появилась в основном в популяциях, ледяных просто ужасных диет в целом — матросы, едящие хардтак и соленую свинину месяцы напролет, тюремные популяции, едящие тонкую кашу, промышленные рабочие, едящие дешевейшую возможную еду. Эти популяции были дефицитны не только в \"витамине C\", а во всем. Привязывание их болезни к одному недостающему соединению было редукционистской фикцией, которая служила промышленным целям.\u003c/p\u003e\n\u003ch3 id=\"пеллагра-болезнь-бедности-переброшена\"\u003eПеллагра: болезнь бедности переброшена\u003c/h3\u003e\n\u003cp\u003eПеллагра — болезнь, характеризуемая дерматитом, диареей, слабоумием и смертью — была эпидемией на американском Юге в начале 20-го века. Она в конце концов была приписана ниацину (витамину B3) дефицитности. Но реальная причина пеллагры была бедностью: южные издольщики и рабочие на заводах ели диету, состоящую почти полностью из кукурузной муки, патоки и жира, потому что это все, что они могли себе позволить.\u003c/p\u003e\n\u003cp\u003e\"Открытие\", что ниацин лечит пеллагру, позволило истеблишменту медикализовать социальную проблему. Вместо адреса раздавливающей бедности и эксплуатации, которые вызвали болезнь, они просто обогатили муку синтетическим ниацином и объявили победу. Бедность продолжилась. Эксплуатация продолжилась. Но смущающая болезнь исчезла, и витаминная промышленность получила еще один рассказ успеха.\u003c/p\u003e\n\u003ch3 id=\"рахит-солнечный-свет-не-добавки\"\u003eРахит: солнечный свет, не добавки\u003c/h3\u003e\n\u003cp\u003eРахит — болезнь деформации костей у детей — была приписана дефицитности витамина D. Но рахит был подавляющим образом болезнью индустриализации: дети, работающие на фабриках и живущие в темных городских трущобах, развивали его на эпидемическом уровне. Дети, жившие в сельских районах с доступом к солнечному свету, редко развивали его.\u003c/p\u003e\n\u003cp\u003eРешение было солнечное освещение и жизнь на открытом воздухе. Промышленное решение было обогащение молока витамином D — процесс, позволивший молочной промышленности маркировать иначе снижающийся продукт как необходимый для здоровья детей. Еще раз социальная проблема (детский труд, городская бедность, промышленная эксплуатация) была переброшена как дефицитность питания и решена синтетическим добавлением.\u003c/p\u003e\n\u003ch2 id=\"современный-витаминно-промышленный-комплекс\"\u003eСовременный витаминно-промышленный комплекс\u003c/h2\u003e\n\u003ch3 id=\"кто-получает-прибыль\"\u003eКто получает прибыль\u003c/h3\u003e\n\u003cp\u003eГлобальный рынок витаминов доминируется горсткой химических компаний:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDSM\u003c/strong\u003e (Dutch State Mines) — первоначально угольная компания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBASF\u003c/strong\u003e — самая крупная химическая компания в мире, раньше часть IG Farben\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLonza\u003c/strong\u003e — швейцарская химическая и биотехнологическая компания\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eZhejiang Medicine\u003c/strong\u003e и \u003cstrong\u003eCSPC Pharmaceutical\u003c/strong\u003e — китайские компании, теперь производящие большинство мировых синтетических витаминов\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭто не компании здравоохранения. Это химические компании, которые идентифицировали прибыльный рынок и захватили его. Сырые материалы для синтетических витаминов — это нефтехимические вещества, производные каменного угля и генетически модифицированные организмы. Процессы производства — это промышленные химические операции, неразличимые от тех, что производят пластики и пестициды.\u003c/p\u003e\n\u003ch3 id=\"нормативный-захват\"\u003eНормативный захват\u003c/h3\u003e\n\u003cp\u003eFDA, EFSA (Европейская агентство по безопасности пищевых продуктов) и другие нормативные органы были полностью захвачены витаминной промышленностью. Вращающаяся дверь между промышленностью и регулированием гарантирует, что синтетические витамины никогда не подвергаются серьезным вопросам. Dietary Supplement Health and Education Act 1994 (DSHEA) — часто праздновались защитники добавок — на самом деле служила защите промышленности от вида строгого тестирования, который разоблачил бы неэффективность и опасность синтетических витаминов.\u003c/p\u003e\n\u003ch2 id=\"что-выглядит-как-реальное-питание\"\u003eЧто выглядит как реальное питание\u003c/h2\u003e\n\u003cp\u003eБог разработал человеческое тело, чтобы быть питаемым целыми продуктами: мясо органов, сырое молоко, ферментированные продукты, овощи, фрукты, травы и чистую воду. Никакая синтетическая добавка не может воспроизвести сложность реальной пищи. Витаминная промышленность существует не потому, что людям нужны добавки, а потому что пищевая промышленность разрушила питательное качество еды, создавая очень дефицитности, которые витаминная промышленность претендует решить.\u003c/p\u003e\n\u003cp\u003eЭто модель Рокфеллера снова: создать проблему, продать решение. Разрушить пищу, продать добавки. Отравить тело, продать препараты. Это один и тот же образец, повторяющийся бесконечно, и он служит одному и тому же хозяину — отцу лжи, работающему через его наиболее эффективных земных агентов: иезуитов, тайных обществ и корпоративных олигархов, которые контролируют глобальный аппарат здравоохранения.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — подробное исследование системы Рокфеллера медицинской и мошенничества питания\u003c/li\u003e\n\u003cli\u003e\u
