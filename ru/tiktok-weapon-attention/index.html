и. Наиболее эффективное оружие противника — не прямое нападение, а отвлечение — вытягивание внимания от того, что имеет значение, к чему развлекает, от истины к спектаклю, от сопротивления к потреблению. TikTok — это наиболее эффективное оружие отвлеченности внимания когда-либо развёрнутое против гражданского населения. С более чем 1,5 миллиардами активных пользователей ежемесячно — большинством под 30 — она захватила больше человеческого внимания, чем какая-либо платформа в истории, доставляя контент в формате, специфически разработанном, чтобы захватить неврологические системы вознаграждения и сделать пользователей неспособными к устойчивому мышлению.\u003c/p\u003e\n\u003cp\u003eПредупреждение Петра быть трезвым и бодрствовать не было о спирте. Это было о ментальной ясности — способности воспринимать реальность точно и отвечать на угрозы надлежащим образом. TikTok систематически уничтожает обе способности. Его пользователи не являются ни трезвыми (их дофаминовые системы захвачены), ни бодрствующими (их пролеты внимания разбиты). Лев не должна рычать, когда его добыча уже прокручивает. Трек из альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e описывает противника, который работает не снаружи, но внутри — враг, которого вы несёте в кармане, оружие, которое вы добровольно размещаете в руках своих детей.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"китайская-операция-разведки\"\u003eКитайская операция разведки\u003c/h2\u003e\n\u003cp\u003eTikTok владеется ByteDance, китайской технологической компанией, базирующейся в Пекине. ByteDance работает согласно китайскому праву, которое требует, чтобы все китайские компании сотрудничали с китайскими агентствами разведки по запросу. Китайский закон о национальной разведке 2017 года гласит: \"Любая организация или гражданин должны поддерживать, помогать и сотрудничать с работой разведки государства.\"\u003c/p\u003e\n\u003cp\u003eЭто означает, что данные, собранные TikTok — и алгоритм, который контролирует то, что видят 1,5 миллиарда людей — легально доступны для китайских служб разведки. Это не спекуляция. Это статут.\u003c/p\u003e\n\u003cp\u003eДанные, которые TikTok собирает, включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eБиометрические данные\u003c/strong\u003e — геометрия лица, звуковые паттерны, динамика нажатия клавиш\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДанные устройства\u003c/strong\u003e — идентификаторы аппаратного обеспечения, операционная система, установленные приложения, уровень батареи, информация о сети\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДанные местоположения\u003c/strong\u003e — GPS координаты, IP адреса, часовой пояс\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПоведенческие данные\u003c/strong\u003e — что вы смотрите, как долго вы смотрите, что вы пропускаете, что вы делитесь, что вы ищете, что вы создаёте\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДанные контента\u003c/strong\u003e — видео, которые вы создаёте, сообщения, которые вы отправляете, комментарии, которые вы размещаете\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДанные контактов\u003c/strong\u003e — контакты телефона, социальные соединения\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭтот профиль данных более полный, чем то, что большинство агентств разведки могло бы собрать через традиционное наблюдение. И TikTok собирает его добровольно — пользователи предоставляют его в обмен на доступ к бесконечному потоку коротких видео.\u003c/p\u003e\n\u003cp\u003eБывший директор ФБР Кристофер Рэй сказал перед Конгрессом, что TikTok представляет проблемы национальной безопасности и что китайское правительство может использовать данные TikTok для операций разведки, операций влияния и целевого определения индивидуумов. Проблемы привели к предложенным и принятым запретам или вынужденным продажам в Соединённых Штатах, Индии и других странах — хотя запреты были непоследовательно приведены в исполнение, и приложение продолжает работать в большинстве рынков.\u003c/p\u003e\n\u003ch2 id=\"алгоритм-точное-нацеливание-внимания\"\u003eАлгоритм: Точное нацеливание внимания\u003c/h2\u003e\n\u003cp\u003eАлгоритм TikTok широко рассматривается как наиболее передовая система рекомендации контента когда-либо развёрнута. Его эффективность в захвате и удержании внимания пользователя превосходит Netflix, YouTube, Instagram и каждую другую платформу.\u003c/p\u003e\n\u003cp\u003eСила алгоритма вытекает из нескольких характеристик:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСпособность холодного старта.\u003c/strong\u003e TikTok может профилировать нового пользователя в течение минут. Анализируя ответы на первые несколько десятков видео, показанных — время наблюдения, повторы, пропуски, лайки, поделиться — алгоритм строит точный поведенческий профиль быстрее, чем любой конкурент. В течение часа первого использования TikTok знает, что захватывает ваше внимание, какие эмоции вы отвечаете и какой контент будет держать вас прокручивающими.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГранулированный анализ контента.\u003c/strong\u003e AI TikTok анализирует каждый элемент каждого видео: визуальный контент, звуковой контент, текстовые наложения, хэштеги, музыка, лица, объекты, параметры и эмоциональный тон. Это позволяет точное сопоставление между характеристиками контента и паттернами ответа пользователя.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМикро-цикли обратной связи.\u003c/strong\u003e Краткий формат видео (15-60 секунд, до 10 минут) генерирует поведенческие данные с необычайной скоростью. За время, когда пользователь Netflix смотрит один эпизод, пользователь TikTok генерировал отзывы на десятки или сотни предметов контента. Это ускоряет цикл обучения алгоритма на порядки величины.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПолноэкранное погружение.\u003c/strong\u003e TikTok представляет одно видео за раз, наполняя весь экран. Нет боковой панели, нет панели поиска, нет отвлечения. Весь визуальный поле пользователя потребляется алгоритмически выбранным контентом. Этот формат максимизирует участие, устраняя конкурирующие стимулы.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБесконечный прокрутка без усилия.\u003c/strong\u003e Один взмах доставляет следующее видео. Нет поиска. Нет выбора. Нет решения. Алгоритм решает. Пользователь потребляет. Трение между желанием и удовлетворением сокращается до минимума физически возможного — движение большого пальца.\u003c/p\u003e\n\u003ch2 id=\"катастрофа-пролёта-внимания\"\u003eКатастрофа пролёта внимания\u003c/h2\u003e\n\u003cp\u003eИсследование эффекта TikTok на пролёты внимания тревожно:\u003c/p\u003e\n\u003cp\u003eИсследование 2022 года, опубликованное в журнале \"Зависимость\", нашло, что тяжёлое использование TikTok было связано со сниженным пролётом внимания, повышенной импульсивностью и уменьшенной рабочей памятью — когнитивными ресурсами, необходимыми для устойчивого мышления, сложного решения проблем и критического анализа.\u003c/p\u003e\n\u003cp\u003eДоктор Глория Марк, исследователь в Калифорнийском университете, Ирвин, задокументировала, что средний пролёт внимания на экране упал с 2,5 минут в 2004 году до 47 секунд в 2023 году. Краткий формат видео TikTok и эксплуатирует и ускоряет этот упадок. Пользователи, кондиционируемые 15-секундным контентом, не могут поддерживать внимание на протяжении 10-минутного видео, не говоря уже книги, лекции или сложного аргумента.\u003c/p\u003e\n\u003cp\u003eРазрушение пролёта внимания — это не побочный эффект. Это механизм. Население, которое не может поддерживать внимание более 47 секунд, не может:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eЧитать Писание (которое требует устойчивого отражения)\u003c/li\u003e\n\u003cli\u003eАнализировать сложные аргументы (которые требуют последовательного рассуждения)\u003c/li\u003e\n\u003cli\u003eОбнаруживать пропаганду (которая требует сравнения претензий против доказательства)\u003c/li\u003e\n\u003cli\u003eПланировать для будущего (которое требует удержания нескольких переменных в разуме)\u003c/li\u003e\n\u003cli\u003eСопротивляться манипуляции (которое требует когнитивной выносливости)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTikTok не просто отвлекает. Он деградирует когнитивную способность, которая была бы требуема, чтобы распознать и сопротивляться отвлеченности. Это оружие, которое разоружает своих целей.\u003c/p\u003e\n\u003ch2 id=\"целевой-подход-молодёжи\"\u003eЦелевой подход молодёжи\u003c/h2\u003e\n\u003cp\u003eПервичная база пользователей TikTok — это молодые люди: приблизительно 60% пользователей находятся между 16 и 24 годами. Платформа преднамеренно разработана, чтобы обращаться к психологии подростков:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФормирование идентичности.\u003c/strong\u003e Подростки находятся в процессе формирования своих идентичностей. TikTok предоставляет шаблоны идентичности через тренды, вызовы и культурные категории. Молодые пользователи принимают идентичности, определённые TikTok — поведенческие паттерны, язык, эстетику и ценности — скорее, чем развивают идентичность через подлинный опыт и отношение.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСоциальная валидация.\u003c/strong\u003e Метрики лайков, акций и последователей TikTok предоставляют количественную социальную валидацию — особенность, которая использует подростковую потребность в одобрении сверстника. Метрики создают иерархию, где ценность измеряется в участии, кондиционируя молодых людей выполнять для алгоритмического одобрения, скорее, чем развивать подлинную самооценку.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСексуальный контент.\u003c/strong\u003e Несмотря на политику контента, алгоритм TikTok часто выставляет молодых пользователей к сексуально предполагаемому и явному контенту. Поисковая система платформы, оптимизированная для участия, естественно усиливает контент с сексуальными элементами, потому что такой контент генерирует самый сильный биологический ответ — и поэтому самые длинные времена просмотра.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДавление тренда.\u003c/strong\u003e TikTok \"вызовы\" создают социальное давление, чтобы выполнить потенциально опасные деятельности. Но за пределами физических опасностей, культура тренда создает когнитивное соответствие — население молодых людей, которые думают, одеваются, говорят и ведут себя согласно алгоритмически амплифицированным тренде, скорее, чем индивидуальным убеждениям.\u003c/p\u003e\n\u003cp\u003eСравнение с Китаем раскрывает. Китайская версия TikTok — Douyin — имеет различные политики контента для китайских пользователей. Китайские пользователи под 14 ограничены 40 минутами в день и могут получить доступ только к \"отобранному образовательному контенту\" между 6 утра и 10 вечера. Версия, экспортируемая на Запад, не имеет таких ограничений. Оружие указано наружу.\u003c/p\u003e\n\u003ch2 id=\"захват-дофамина\"\u003eЗахват дофамина\u003c/h2\u003e\n\u003cp\u003eTikTok использует дофаминовую систему более агрессивно, чем любая предыдущая технология:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНепредсказуемые вознаграждения.\u003c/strong\u003e Каждый взмах доставляет неизвестный контент — это может быть смешным, шокирующим, красивым или скучным. Непредсказуемость создает всплески дофамина, связанные с предчувствием, проезжающие компульсивное прокручивание независимо от качества контента.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБыстрый цикл новизны.\u003c/strong\u003e Каждые 15-60 секунд TikTok доставляет полностью новый стимул. Схемы поиска новизны мозга активируются непрерывно, поддерживая повышенные уровни дофамина, которые создают состояния эйфорного участия, неотличимые от индуцированных веществом высоты.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСигналы социального вознаграждения.\u003c/strong\u003e Лайки, комментарии, акции и числа последователей активируют те же пути нейронального вознаграждения, как социальная связь. Создатели TikTok испытывают алгоритмическое социальное одобрение как подлинное социальное соединение — подмена, которая истощает реальные навыки отношения, пока питает вознаграждающую систему мозга синтетическими сигналами.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСимптомы отмены.\u003c/strong\u003e Пользователи, которые пытаются снизить использование TikTok, сообщают о тревоге, раздражительности, непереносимости скуки и компульсивной проверке телефонов — поведенческих подписи отмены из зависимого вещества. Платформа спроектировала химическую зависимость через доставку контента.\u003c/p\u003e\n\u003ch2 id=\"связь-когнитивной-войны\"\u003eСвязь когнитивной войны\u003c/h2\u003e\n\u003cp\u003eTikTok — это система доставки когнитивной войны, как оформлено в \u003ca href=\"/cognitive-warfare-battleground/?lang=ru\"\u003eКогнитивная война: ваш разум — поле боя\u003c/a\u003e. Разработана ли она как умышленное китайское оружие разведки или просто как система, максимизирующая прибыль внимания, эффект идентичен: систематическая дегради когнитивной способности западной молодёжи.\u003c/p\u003e\n\u003cp\u003eПоколение, выращенное на TikTok, — это поколение, которое не может думать критически, не может поддерживать внимание, не может различать между спроектированными повествованиями и подлинной истиной, и не может сопротивляться методам манипуляции эмоциями, которые когнитивная война использует. TikTok не должна доставлять пропаганду прямо. Это просто уничтожает когнитивную защиту, которая позволяла бы пользователям распознавать и сопротивляться пропаганде из любого источника.\u003c/p\u003e\n\u003cp\u003eЛандшафт алгоритма потока, описанный в \u003ca href=\"/streaming-algorithm-mind-prison/?lang=ru\"\u003eПотоковые алгоритмы: тюрьма разума, которую вы выбрали\u003c/a\u003e, находит свое наиболее экстремальное выражение в TikTok — платформе, которая уменьшила единицу потребления контента с часов (Netflix) на минут (YouTube) на секунды (TikTok), и с каждым сокращением далее деградирует когнитивную способность пользователей.\u003c/p\u003e\n\u003ch2 id=\"библейское-размышление\"\u003eБиблейское размышление\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Итак, смотрите, как поступаете; не как неразумные, но как мудрые, дорожа временем, потому что дни лукавы.\" — Эфесян 5:16\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИнструкция Павла \"дорожить временем\" признает, что время — ограниченный ресурс под нападением от зла. Каждый час, проведённый прокручивание TikTok, — это час, не проведённый в молитве, не проведённый в Писании, не проведённый в подлинном человеческом отношении, не проведённый в виде устойчивого размышления, которое развивает мудрость и различие. Дни лукавы — и оружие того зла включает платформу, разработанную, чтобы потребить время, которое может быть дорожено, рассеять внимание, которое может быть сосредоточенным, и деградировать разум, который может быть обновлён.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e
