о тесны врата и узок путь, ведущие в жизнь, и немногие находят их.\"\u003c/em\u003e — Матфея 7:13-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Подвизайтесь войти сквозь тесные врата, ибо, сказываю вам, многие поищут войти, и не возмогут.\"\u003c/em\u003e — Луки 13:24\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИисус использовал два слова, которые большинство христиан пропускают. \"Немногие\" и \"многие\". Немногие находят узкий путь. Многие выбирают широкий путь к погибели. Многие будут пытаться войти и не смогут. Это не двусмысленные слова. Они точны. И они описывают соотношение, которое должно ужаснуть каждого человека, легкомысленно заявляющего, что он спасён.\u003c/p\u003e\n\u003cp\u003eГовард Питтман не теоретизировал об этом соотношении. Ему его показали. Стоя перед престолом Бога 3 августа 1979 года, после того как его физическое тело отказало на операционном столе, Бог дал ему число. Не притчу. Не метафору. Число: 97,5 процента. Девяносто семь с половиной процентов всех исповедующих христиан — отвергнуты.\u003c/p\u003e\n\u003cp\u003eУзкие врата не узкие в том смысле, как представляет себе большинство людей. Они почти наглухо закрыты.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПреступление — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eИз тьмы в свет — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"3-августа-1979-года\"\u003e3 августа 1979 года\u003c/h2\u003e\n\u003ch3 id=\"человек\"\u003eЧеловек\u003c/h3\u003e\n\u003cp\u003eГовард Питтман не был случайным верующим. Он не был номинальным христианином, который посещал церковь на Пасху и Рождество. Он был баптистским пастором — рукоположённым, активным, преданным — в течение тридцати пяти лет. Три с половиной десятилетия проповедей, изучений Библии, пастырских визитов, молитвенных собраний, похорон, свадеб, крещений и консультаций. Он посвятил всю свою взрослую жизнь служению.\u003c/p\u003e\n\u003cp\u003eПомимо служения, он был офицером полиции Нового Орлеана на пенсии — человеком, который ходил по улицам одного из самых опасных городов Америки и выжил. Он жил на ферме площадью шестьдесят один акр в Миссисипи. Он был крепким, практичным, опытным и глубоко укоренённым в институциональной церкви.\u003c/p\u003e\n\u003cp\u003eЭто важно, потому что свидетельство Питтмана нельзя отвергнуть как бред маргинального верующего или неустойчивой личности. Он был само определение христианина истеблишмента. Укоренённый. Уважаемый. Надёжный. И всё, что он думал, что знает о христианстве, должно было быть разрушено.\u003c/p\u003e\n\u003ch3 id=\"смерть\"\u003eСмерть\u003c/h3\u003e\n\u003cp\u003eДетали физического кризиса Питтмана медицински задокументированы. Его главная артерия разорвалась — катастрофическое внутреннее кровоизлияние, которое привело к разрушительной потере крови. Его срочно доставили в больницу и поместили в отделение интенсивной терапии около полуночи. В течение нескольких часов медицинская бригада боролась за его стабилизацию. К шести утра его жизненные показатели отказали. Последовала семичасовая операция.\u003c/p\u003e\n\u003cp\u003eВо время этого кризиса, пока его физическое тело лежало на операционном столе, Говард Питтман произнёс то, что он позже описал как \"странную молитву\". Он попросил Бога позволить ему предстать перед Его престолом. Это была не случайная просьба. Это был умирающий человек, ветеран служения, делающий конкретное прошение в свои последние моменты.\u003c/p\u003e\n\u003cp\u003eИ Бог исполнил это.\u003c/p\u003e\n\u003ch3 id=\"путешествие\"\u003eПутешествие\u003c/h3\u003e\n\u003cp\u003eАнгел пришёл и поднял дух Питтмана из его физического тела. Его подняли вверх — через первое небо (физическая область), через второе небо (владения Сатаны и его демонов) и в третье небо, обитель самого Бога.\u003c/p\u003e\n\u003cp\u003eСамо путешествие раскрыло реальности, с которыми Питтман никогда не сталкивался за тридцать пять лет служения. Духовная область не была неясным, облачным, символическим местом. Она была более реальной, чем физический мир. Общение происходило через мысль — не через рот и уши, а через прямую передачу мыслей. Путешествие происходило со скоростью мысли. Размерные стены разделяли области, и плоть не могла пройти через них.\u003c/p\u003e\n\u003cp\u003eНо ни одно из этих откровений не сравнилось с тем, что ему показали у престола.\u003c/p\u003e\n\u003ch2 id=\"число\"\u003eЧисло\u003c/h2\u003e\n\u003ch3 id=\"что-раскрыл-бог\"\u003eЧто раскрыл Бог\u003c/h3\u003e\n\u003cp\u003eСтоя перед престолом Бога — Творца вселенной, Альфы и Омеги, Начала и Конца — Говарду Питтману было дано послание. И центральным элементом этого послания была статистика настолько разрушительная, что она преследует каждого, кто слышал её с тех пор.\u003c/p\u003e\n\u003cp\u003eБог показал ему, что из всех людей на земле, которые исповедуют себя христианами — которые называют себя верующими, которые посещают церковь, которые заявляют о спасении, которые объявляют Иисуса своим Спасителем — только 2,5 процента действительно спасены.\u003c/p\u003e\n\u003cp\u003e97,5 процента отвергнуты.\u003c/p\u003e\n\u003cp\u003eПусть это число осядет. Пусть оно проникнет в комфортные предположения. Пусть оно разрушит беззаботную уверенность.\u003c/p\u003e\n\u003cp\u003eЕсли в церкви тысяча членов, согласно тому, что Бог показал Питтману, только двадцать пять из них действительно спасены. Девятьсот семьдесят пять принимают плацебо. Они произносят слова. Они выполняют ритуалы. Они верят, что они спасены. И они не спасены.\u003c/p\u003e\n\u003cp\u003eЕсли на земле примерно 2,4 миллиарда исповедующих христиан, это означает, что примерно 2,34 миллиарда из них обмануты. Они христиане, исповедующие устами — исповедующие губами, но никогда не сдающиеся своими жизнями. И только около 60 миллионов по всему миру действительно прошли через узкие врата.\u003c/p\u003e\n\u003ch3 id=\"коренной-грех-служение-себе\"\u003eКоренной грех: служение себе\u003c/h3\u003e\n\u003cp\u003eБог не просто дал Питтману число. Он показал ему причину. Коренную причину. Единственное разрушительное объяснение того, почему 97,5 процента терпят неудачу.\u003c/p\u003e\n\u003cp\u003eОтвет в двух словах: служение себе.\u003c/p\u003e\n\u003cp\u003eДевяносто пять процентов исповедующих христиан — подавляющее большинство — служат себе. Не Сатане. Не миру каким-либо очевидным образом. Себе. Своим собственным желаниям. Своему собственному комфорту. Своим собственным планам. Своим собственным предпочтениям. Своей собственной воле.\u003c/p\u003e\n\u003cp\u003eЭто коренной грех. Не убийство. Не прелюбодеяние. Не кража. Ни один из драматических грехов, против которых церковь любит проповедовать. Коренной грех — это \"я\". \"Я\", которое сидит на престоле, где должен сидеть только Христос. \"Я\", которое говорит \"Господи, Господи\", сохраняя абсолютный контроль над своей собственной жизнью.\u003c/p\u003e\n\u003cp\u003eОни сделали Иисуса Спасителем. Они никогда не делали Его Господом.\u003c/p\u003e\n\u003cp\u003eЭто различие — это всё. Спаситель означает \"спаси меня\". Господь означает \"правь мною\". Спаситель означает \"спаси меня от ада\". Господь означает \"возьми мою жизнь — всю её — и делай с ней, что захочешь\". Спаситель ничего не стоит. Господь стоит всего.\u003c/p\u003e\n\u003cp\u003eРецепт плацебо предлагает первое без требования второго. И 95 процентов исповедующих христиан проглотили это.\u003c/p\u003e\n\u003ch2 id=\"разница-между-исповеданием-и-обладанием\"\u003eРазница между исповеданием и обладанием\u003c/h2\u003e\n\u003ch3 id=\"уста-которые-исповедуют\"\u003eУста, которые исповедуют\u003c/h3\u003e\n\u003cp\u003eСлова имеют силу. Сам Иисус так сказал. В Матфея 12:36-37 Он объявил: \"Говорю же вам, что за всякое праздное слово, какое скажут люди, дадут они ответ в день суда: ибо от слов своих оправдаешься, и от слов своих осудишься\".\u003c/p\u003e\n\u003cp\u003eЗа каждое праздное слово. За каждое небрежное заявление. За каждое необдуманное исповедание. За каждое \"хвала Господу\", произнесённое по привычке, а не из подлинного поклонения. За каждое \"я благословлён\", предложенное как социальная валюта, а не подлинное свидетельство. За каждое \"Иисус мой Господь\", произнесённое устами, которые принадлежат жизни, которая никогда не подчинялась Его господству.\u003c/p\u003e\n\u003cp\u003eСлова не нейтральны. В духовной области слова имеют вес. Они создают реальность. Они устанавливают заветы. Они открывают двери. И они осуждают.\u003c/p\u003e\n\u003cp\u003eХристианин, исповедующий устами, использует духовный язык как обои — украшая жизнь, которая в корне не изменена. Он говорит \"рождён свыше\", но никогда не умирал. Он говорит \"новое творение\", но старое творение всё ещё управляет шоу. Он говорит \"сдался\", но не сдал ничего, кроме часа в воскресенье утром.\u003c/p\u003e\n\u003cp\u003eИ за каждое из этих слов будет дан отчёт. Не в каком-то неясном, будущем, теоретическом смысле. Буквально. Конкретно. Перед престолом. За каждое слово.\u003c/p\u003e\n\u003ch3 id=\"жизнь-которая-доказывает\"\u003eЖизнь, которая доказывает\u003c/h3\u003e\n\u003cp\u003eРазница между верой, исповедуемой устами, и подлинным спасением не сложна. Это не вопрос теологической изощрённости или доктринальной точности. Это вопрос плода.\u003c/p\u003e\n\u003cp\u003eИисус сказал это ясно: \"По плодам их узнаете их\" (Матфея 7:16). Не по их словам. Не по их посещаемости. Не по их эмоциональным переживаниям. По их плодам.\u003c/p\u003e\n\u003cp\u003eКакой плод производит жизнь, когда \"я\" на престоле? Плод самообслуживания. Плод комфортного христианства. Плод веры, которая ничего не стоит и ничего не меняет. Плод религиозной деятельности, которая служит эго — репутации, социальному положению, самооценке \"хорошего христианина\".\u003c/p\u003e\n\u003cp\u003eКакой плод производит жизнь, когда Христос на престоле? Плод жертвы. Плод повиновения, которое причиняет боль. Плод решений, которые не имеют смысла для естественного разума — давать, когда ты не можешь себе этого позволить, прощать, когда у тебя есть полное право держать обиду, подчиняться, когда каждое волокно твоей плоти кричит сопротивляться, идти туда, куда Он посылает, когда ты предпочёл бы остаться.\u003c/p\u003e\n\u003cp\u003eПервая жизнь обычна. Вторая редка. И соотношение между ними 97,5 к 2,5.\u003c/p\u003e\n\u003ch2 id=\"почему-95-процентов-служат-себе\"\u003eПочему 95 процентов служат себе\u003c/h2\u003e\n\u003ch3 id=\"тронный-зал-сердца\"\u003eТронный зал сердца\u003c/h3\u003e\n\u003cp\u003eУ каждого человека есть тронный зал в его сердце. Кто-то сидит на этом престоле. Либо \"я\" сидит там, либо Христос сидит там. Третьего варианта нет. Нет общего престола. Нет соглашения о разделении власти.\u003c/p\u003e\n\u003cp\u003eЦерковь плацебо учит версии христианства, которая позволяет \"я\" оставаться на престоле, добавляя Иисуса в кабинет. \"Примите Иисуса как своего Спасителя\" — это формула, и насколько это правильно, это правда. Но это неполно. Фатально неполно. Потому что принятие Иисуса как Спасителя не требует удаления \"я\" с престола. Это просто добавляет ещё один титул в администрацию.\u003c/p\u003e\n\u003cp\u003eПодлинное Евангелие требует чего-то гораздо более радикального. Оно требует отречения. Оно требует, чтобы \"я\" ушло — полностью, навсегда, безоговорочно — и чтобы Христос занял престол. Не как советник. Не как консультант. Не как соправитель. Как Господь. Абсолютный, полный, неоспоримый Господь.\u003c/p\u003e\n\u003cp\u003eЭто то, чего 95 процентов исповедующих христиан никогда не делали. Они добавили Иисуса в свои жизни, не вычитая себя. Они приняли Его спасение, не подчинившись Его господству. Они получили дар, не заплатив цену.\u003c/p\u003e\n\u003cp\u003eА цена — это всё. Иисус не мог быть яснее: \"Если кто хочет идти за Мною, отвергнись себя, и возьми крест свой, и следуй за Мною. Ибо кто хочет душу свою сберечь, тот потеряет её, а кто потеряет душу свою ради Меня, тот обретёт её\" (Матфея 16:24-25).\u003c/p\u003e\n\u003cp\u003eОтвергнись себя. Возьми крест свой. Потеряй свою жизнь. Это не предложения. Это не необязательные дополнения для супер-духовных. Это вступительные требования для узких врат. И 97,5 процента исповедующих христиан никогда им не соответствовали.\u003c/p\u003e\n\u003ch3 id=\"комфортный-обман\"\u003eКомфортный обман\u003c/h3\u003e\n\u003cp\u003eПочему так много терпят неудачу? Потому что плацебо комфортно. \"Я\" на престоле комфортно. Вы можете сохранить свои планы. Вы можете поддерживать свой образ жизни. Вы можете следовать своим желаниям. Вы можете определять свои собственные условия взаимодействия с Богом.\u003c/p\u003e\n\u003cp\u003eПодлинное Евангелие не комфортно. Это распятие. Вы прибиты к кресту — ваши желания, ваши амбиции, ваши предпочтения, ваши права, ваша воля. Всё это умирает. И из этой смерти возникает что-то новое. Но смерть приходит первой. Всегда смерть приходит первой.\u003c/p\u003e\n\u003cp\u003eСовременная церковь в значительной степени отказалась от языка смерти. Вместо этого она говорит о благословении, процветании, цели, исполнении, судьбе, прорыве. Это не злые слова. Некоторые из них описывают подлинные духовные реальности. Но они были отделены от креста. Они предлагаются без предварительного условия смерти. А без смерти нет воскресения. Без креста нет короны.\u003c/p\u003e\n\u003cp\u003e95 процентов научили пропускать крест. Они идут прямо от греха к спасению, от вины к благодати, от призыва к алтарю к обильной жизни — никогда не проходя через смерть. Им сказали, что они могут иметь воскресение без распятия. И они поверили этому. Потому что плацебо очень, очень убедительно.\u003c/p\u003e\n\u003ch2 id=\"узкие-врата-в-цифрах\"\u003eУзкие врата в цифрах\u003c/h2\u003e\n\u003ch3 id=\"немногие-находят-их\"\u003eНемногие находят их\u003c/h3\u003e\n\u003cp\u003eИисус сказал \"немногие\". Не \"значительное меньшинство\". Не \"менее половины\". Немногие. Греческое слово — \u003cem\u003eoligoi\u003c/em\u003e — небольшое число. Крошечное число. И свидетельство Питтмана ставит число на \"немногие\": 2,5 процента.\u003c/p\u003e\n\u003cp\u003eЭто согласуется со всем образцом Писания. Ной и его семья — восемь человек из всего населения земли. Лот и его дочери — три человека из двух городов. Израильтяне, которые вошли в Обетованную землю — два человека (Иисус Навин и Халев) из примерно 600 000, которые покинули Египет. Армия Гедеона — 300 из 32 000.\u003c/p\u003e\n\u003cp\u003eБог всегда работал с остатками. Малыми числами. Крошечными меньшинствами. Образец последователен от Бытия до Откровения. И образец говорит: большинство тех, кто заявляет, что принадлежит Богу, на самом деле не принадлежат Ему.\u003c/p\u003e\n\u003cp\u003eЭто не популярное послание. Оно не заполняет церкви. Оно не продаёт книги. Оно не генерирует десятину. И именно поэтому церковь плацебо избегает его. Церковь плацебо проповедует широкие врата — достаточно широкие для всех, кто говорит правильные слова, посещает правильные службы и выписывает правильные чеки. Подлинное Евангелие проповедует узкие врата — настолько узкие, что вы не можете пройти через них, неся \"я\".\u003c/p\u003e\n\u003ch3 id=\"подвизайтесь-войти\"\u003eПодвизайтесь войти\u003c/h3\u003e\n\u003cp\u003eВ Луки 13:24 Иисус использует слово, которое церковь плацебо почти исключила из своего словаря: \"подвизайтесь\". Греческое слово — \u003cem\u003eagonizomai\u003c/em\u003e — от которого мы получаем \"агония\". Оно означает бороться, сражаться, напрягаться до предела. Это слово, используемое для описания спортсмена в соревновании, солдата в битве, борца в поединке.\u003c/p\u003e\n\u003cp\u003e\"Подвизайтесь войти сквозь тесные врата\". Мучайтесь, чтобы войти. Пробивайтесь. Это не случайная прогулка через открытую дверь. Это война. Это борьба. Это самое интенсивное усилие, которое может приложить человек — направленное не на заработок спасения (что невозможно), а на сдачу себя (что требуется).\u003c/p\u003e\n\u003cp\u003eЦерковь плацебо учит, что спасение легко. \"Просто примите Иисуса\". \"Просто верьте\". \"Просто произнесите молитву\". И в одном смысле благодать ЕСТЬ бесплатная. Но войти в узкие врата нелегко. Это требует смерти той самой вещи, которая делает широкий путь комфортным: \"я\". А \"я\" не умирает легко. \"Я\" борется. \"Я\" торгуется. \"Я\" идёт на компромиссы. \"Я\" находит тысячу способов остаться на престоле, кажась отрёкшимся.\u003c/p\u003e\n\u003cp\u003eВот почему Иисус говорит подвизаться. Потому что битва против себя — это самая тяжёлая битва, которую когда-либо будет вести человек. Это сложнее, чем бросить зависимость. Сложнее, чем вынести преследование. Сложнее, чем встретить смерть. Потому что \"я\" — это ВЫ. И умереть для себя — это конечная агония.\u003c/p\u003e\n\u003ch2 id=\"послание-бога-к-церкви\"\u003eПослание Бога к церкви\u003c/h2\u003e\n\u003ch3 id=\"церковь-обманута\"\u003eЦерковь обманута\u003c/h3\u003e\n\u003cp\u003eПослание, которое Бог дал Говарду Питтману принести обратно к церкви, не сложно. Оно не требует семинарского образования, чтобы понять. Его можно резюмировать четырьмя словами: ЦЕРКОВЬ ОБМАНУТА.\u003c/p\u003e\n\u003cp\u003eНе мир. Церковь. Не язычники. Христиане. Не атеисты. Верующие. Обман не внешний. Он внутренний. Враг не снаружи ворот. Он внутри ворот. Он выписывает лекарства из-за кафедры. Он вводит плацебо через команду поклонения, учебную программу воскресной школы, руководство по изучению малой группы и бестселлер христианской книги.\u003c/p\u003e\n\u003cp\u003eБог показал Питтману, что 97,5 процента исповедующих христиан не спасены по-настоящему. Это не мнение Питтмана. Это не его теологическая интерпретация. Это то, что Бог показал ему у престола. И послание было ясным: скажи им. Скажи церкви. Скажи 97,5 процентам. Разбуди их. Подними тревогу.\u003c/p\u003e\n\u003ch3 id=\"срочность\"\u003eСрочность\u003c/h3\u003e\n\u003cp\u003eПочему Бог отправил Питтмана обратно? Он мог оставить его. Питтман молился, чтобы предстать перед престолом, и Бог исполнил просьбу. Почему не позволить ему остаться?\u003c/p\u003e\n\u003cp\u003eПотому что у Бога есть послание для живых. И послание срочное. Не срочное в случайном смысле \"вам, вероятно, следует заняться этим\". Срочное в вечном смысле. Срочное, потому что миллиарды людей идут к престолу, веря, что они спасены — а они не спасены. Срочное, потому что плацебо работает. Пациенты убеждены. Обман почти полный.\u003c/p\u003e\n\u003cp\u003eИ часы тикают. Каждый день люди умирают. Каждый день люди стоят перед престолом. И каждый день, согласно соотношению, которое раскрыл Бог, 97,5 процента исповедующих христиан, которые умирают, слышат слова, которые ни один человек не должен когда-либо слышать: \"Я никогда не знал вас\".\u003c/p\u003e\n\u003cp\u003eЭто не теология. Это не деноминационный спор. Это свидетельство человека, который умер, стоял перед Богом, получил послание и был отправлен обратно, чтобы доставить его. И послание: ПРОСНИТЕСЬ.\u003c/p\u003e\n\u003ch3 id=\"что-должно-измениться\"\u003eЧто должно измениться\u003c/h3\u003e\n\u003cp\u003eОтвет на это послание не сложен, но он дорогостоящий. Он требует того, что плацебо предотвращало всё время:\u003c/p\u003e\n\u003cp\u003eВо-первых: Честное самоисследование. Не поверхностное самоисследование \"хожу ли я в церковь?\". Глубокое, болезненное, честное исследование тронного зала. Кто сидит на престоле вашей жизни? Чьи желания управляют вашими решениями? Чей комфорт определяет ваш курс? Если ответ \"я\", то плацебо работает.\u003c/p\u003e\n\u003cp\u003eВо-вторых: Подлинное покаяние. Не эмоциональное покаяние у алтаря, которое исчезает к понедельнику утром. Покаяние — \u003cem\u003emetanoia\u003c/em\u003e — означает полное изменение ума. Фундаментальную переориентацию. Поворот на 180 градусов от себя к Богу. Такое покаяние — это не событие. Это образ жизни. Это ежедневное умирание для себя и ежедневное воскресение во Христе.\u003c/p\u003e\n\u003cp\u003eВ-третьих: Абсолютная сдача. Не частичная сдача. Не \"я отдам Богу эту область, но сохраню ту область для себя\". Не \"я сдамся, когда будет удобно\". Абсолютная, полная, безоговорочная, постоянная сдача престола. Христос как Господь — не только на словах, но в каждом решении, каждом желании, каждом направлении вашей жизни.\u003c/p\u003e\n\u003cp\u003eЭто узкие врата. Это 2,5 процента. Это то, что немногие находят.\u003c/p\u003e\n\u003cp\u003eИ если 97,5 процента исповедующих христиан не нашли этого, то вопрос, который должен задать каждый читатель, не \"спасены ли они?\", а \"спасён ли я?\"\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003eПЛАЦЕБО: Проснись, церковь! Говард Питтман\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: раскрытые прискорбные иезуитские секреты\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eБывший поклонник Сатаны Джон Рамирес Свидетельство\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсточник: брошюра Говарда Питтмана \u003cem\u003eПлацебо\u003c/em\u003e, Lake Hamilton Bible Camp\u003c/p\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте пока читаете\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПреступление — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/87-From_Darkness_Into_Light.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eИз тьмы в свет — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/95-The_Valley_of_Death.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eДолина смерти — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/101-Fight_of_Faith.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eБорьба веры — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/89-Metaphors_or_Reality.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМетафоры или реальность — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/placebo-church-satan-false-religion/?lang=ru\"\u003eЦерковь плацебо: как Сатана вводит ложную религию миллиардам\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/three-heavens-howard-pittman-nde/?lang=ru\"\u003eТри неба: что увидел Говард Питтман, когда умер\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/demonic-hierarchy-satans-military/?lang=ru\"\u003eАрмия Сатаны: демоническая иерархия, свидетелем которой был Говард Питтман\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/demon-possession-sovereign-will/?lang=ru\"\u003eЕдинственное, что демоны не могут нарушить: ваша суверенная воля\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eСвидетельство Говарда Питтмана ставит число на слова Христа. \"Немногие находят их\". Насколько немногие? Два с половиной процента. Это не мнение. Это не теология. Это то, что человек, который стоял перед престолом Бога, был уполномочен принести обратно живым. Вопрос не в том, точно ли число. Вопрос в том, находитесь ли вы среди 2,5 процента — или 97,5 процента, которые услышат самые ужасающие слова, когда-либо произнесённые: \"Я никогда не знал вас\".\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"97,5% отвергнуты: Ужасающая статистика, которую Бог показал Говарду Питтману\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Бог показал Говарду Питтману, что 97,5% исповедующих христиан не спасены по-настоящему. Узкие врата уже, чем кто-либо представлял.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2026-01-03T10:00:00Z\",\"children\":\"3 января 2026 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"97 percent\",{\"href\":\"/ru/tag/97 percent/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"97 percent\"]}],[\"$\",\"a\",\"rejected\",{\"href\":\"/ru/tag/rejected/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"rejected\"]}],[\"$\",\"a\",\"narrow gate\",{\"href\":\"/ru/tag/narrow gate/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"narrow
