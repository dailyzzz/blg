е просто приказала убить Навуфея. Она написала письма от имени царя, запечатала их царской печатью, указала ложным свидетелям давать показания против него и организовала судебное разбирательство, которое осудило невинного человека к смерти — все для того, чтобы захватить его виноградник для коронки. Убийство было совершено через закон. Мошенничество было узаконено до того, как оно было совершено.\u003c/p\u003e\n\u003cp\u003eКак раскрывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers' Lies\u003c/a\u003e, наиболее изощренные обманы совершаются не вне закона — они совершаются через него. Правовая архитектура, которая позволила программе вакцинации COVID-19, была построена заранее, размещена в законодательстве и активирована, когда объявленное чрезвычайное положение обеспечило оправдание. Вопрос в том, является ли конструкция этой архитектуры — и ее использование для совершения того, что иначе было бы мошенничеством, — сама по себе преступлением.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"правовая-архитектура-государственно-фармацевтического-сговора\"\u003eПравовая архитектура государственно-фармацевтического сговора\u003c/h2\u003e\n\u003cp\u003eПартнерство между американским правительством и фармацевтическими компаниями во время COVID-19 функционировало в рамках правовой базы, специально разработанной для освобождения обеих сторон от ответственности:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПолномочия по другим соглашениям (OTA):\u003c/strong\u003e Вакцины COVID-19 закупались в соответствии с контрактами OTA — контрактами военных закупок, которые освобождают продукты от стандартных фармацевтических правил FDA, Федерального регламента по закупкам и требований контроля качества.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазрешение на экстренное использование (EUA):\u003c/strong\u003e Продукты были авторизованы в соответствии с разделом 564 Федерального закона о продуктах питания, лекарствах и косметике, который требует только, чтобы продукт \"мог быть эффективным\" — а не доказано безопасным или эффективным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗакон PREP:\u003c/strong\u003e Производители, дистрибьюторы и администраторы были защищены от гражданской ответственности в соответствии с Законом PREP, который предоставляет всеобъемлющий иммунитет для рассматриваемых контрмер во время объявленных чрезвычайных ситуаций.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбъявление о чрезвычайной ситуации в области общественного здравоохранения:\u003c/strong\u003e Объявление главного секретаря HHS о чрезвычайной ситуации в области общественного здравоохранения активировало всю базу — запустив полномочия EUA, иммунитет PREP и чрезвычайное финансирование.\u003c/p\u003e\n\u003cp\u003eКаждый элемент этой базы был принят в закон до того, как COVID-19 существовал. Вместе они создали правовой путь, по которому экспериментальные продукты могли быть разработаны, авторизованы, развернуты для всего населения и защищены от ответственности — все в рамках действующего закона.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report (karenkingston.substack.com): \"Вопрос состоит не в том, совершило ли правительство мошенничество с биофармой. Вопрос в том, была ли правовая база специально разработана для получения того, что иначе было бы мошенничеством — и если да, является ли сама конструкция этой базы уголовным заговором.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"элементы-мошенничества\"\u003eЭлементы мошенничества\u003c/h2\u003e\n\u003cp\u003eВ соответствии с федеральным законом мошенничество требует: (1) существенного искажения фактов, (2) сделанного намеренно или небрежно, (3) с намерением обмануть, (4) на основании которого жертва полагалась, (5) причинившего убытки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСущественное искажение:\u003c/strong\u003e Вакцины COVID-19 были представлены как \"безопасные и эффективные\". Клинические испытания, на основании которых было сделано это представление, были неполными (разработаны для проведения до 2023 года, авторизованы в 2020 году), контрольная группа была уничтожена (исключая долгосрочные сравнительные данные), и сигналы безопасности были подавлены (отчеты VAERS не расследованы, данные о побочных эффектах не раскрыты общественности).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗнание:\u003c/strong\u003e Документы, выпущенные по FOIA, демонстрируют, что чиновники FDA и ученые Pfizer были осведомлены о данных безопасности — включая данные о биораспределении, показывающие, что продукт распространился по всему телу — которые не были переданы общественности или администраторам здравоохранения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНамерение обмануть:\u003c/strong\u003e Попытка FDA запечатать данные клинических испытаний на 75 лет демонстрирует понимание сокрытия. Систематическое подавление альтернативных методов лечения — необходимое для сохранения требования \"отсутствие адекватной альтернативы\" для EUA — демонстрирует намерение сохранить базу авторизации независимо от появляющихся доказательств.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПолагание:\u003c/strong\u003e Сотни миллионов американцев полагались на представление \"безопасный и эффективный\" при принятии решения о вакцинации. Работодатели, университеты и военные командиры полагались на это для введения обязательств.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУбытки:\u003c/strong\u003e Документы VAERS показывают сотни тысяч побочных эффектов, включая смерти, постоянные инвалидности и госпитализации.\u003c/p\u003e\n\u003cp\u003eКаждый элемент мошенничества удовлетворен задокументированной записью. Вопрос в том, служит ли правовая база, которая авторизовала проведение, в качестве защиты — и может ли правовая база, разработанная для получения мошенничества, сама по себе составлять мошенничество.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"защита-подрядчика-правительства\"\u003eЗащита подрядчика правительства\u003c/h2\u003e\n\u003cp\u003eПравительство, вероятно, будет ссылаться на \"защиту подрядчика правительства\" — правовую доктрину, которая держит подрядчиков, выполняющих работу по направлению правительства в соответствии со спецификациями правительства, ответственными за вред, вызванный продуктами, которые они производят в соответствии со спецификациями правительства.\u003c/p\u003e\n\u003cp\u003eЭта защита была установлена в \u003cem\u003eBoyle v. United Technologies Corp.\u003c/em\u003e (1988), в которой Верховный суд постановил, что военные подрядчики освобождены от деликтной ответственности штата за продукты, разработанные в соответствии со спецификациями правительства.\u003c/p\u003e\n\u003cp\u003eОднако защита подрядчика правительства имеет пределы. Она не применяется, когда подрядчик:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПредоставляет ложную информацию правительству\u003c/li\u003e\n\u003cli\u003eСкрывает известные риски от правительства\u003c/li\u003e\n\u003cli\u003eНе соответствует спецификациям правительства\u003c/li\u003e\n\u003cli\u003eСовершает мошенничество при получении государственного контракта\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЕсли Pfizer предоставила ложные данные клинических испытаний FDA — как утверждается разоблачителем Брук Джексон и задокументировано через раскрытые FOIA несоответствия — защита подрядчика правительства не будет применяться, потому что защита требует, чтобы подрядчик предоставил точную информацию правительству.\u003c/p\u003e\n\u003cp\u003eНо если само правительство было соучастником мошенничества — если чиновники FDA знали, что данные были неадекватны и авторизовали продукт в любом случае — то как подрядчик, так и правительство потенциально несут ответственность, и ни один не может ссылаться на другого в качестве щита.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"проблема-суверенного-иммунитета\"\u003eПроблема суверенного иммунитета\u003c/h2\u003e\n\u003cp\u003eАмериканское правительство пользуется суверенным иммунитетом — правовым принципом, что суверен не может быть привлечен к суду без его согласия. Закон о деликтных исках федерального правительства (FTCA) отказывает от суверенного иммунитета в ограниченных обстоятельствах, но исключение дискреционной функции сохраняет иммунитет для решений правительства, связанных с осуществлением политического суждения.\u003c/p\u003e\n\u003cp\u003eРешение FDA авторизовать вакцины COVID-19 в соответствии с EUA, вероятно, будет охарактеризовано как дискреционная функция — политическое суждение, связанное с балансировкой рисков и преимуществ во время чрезвычайной ситуации в области общественного здравоохранения. В соответствии с исключением дискреционной функции правительство будет защищено от деликтной ответственности за это решение независимо от его последствий.\u003c/p\u003e\n\u003cp\u003eЭто создает правовой \"никто не владеет\" — производитель ссылается на указание правительства в качестве защиты, правительство ссылается на суверенный иммунитет в качестве защиты, и пострадавший человек не имеет правового средства правовой защиты против либо.\u003c/p\u003e\n\u003cp\u003eКингстон определила это как основную цель правовой архитектуры: \"Система была разработана для создания зоны нулевой ответственности. Производитель указывает на правительство. Правительство указывает на суверенный иммунитет. PREP закрывает альтернативный путь. CICP отклоняет претензии. Результатом является система, в которой миллиарды доз экспериментального продукта могут быть введены глобальному населению без какого-либо участия, несущего правовую ответственность за последствия. Это не зазор в законе. Это замысел закона.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческое-суждение\"\u003eПророческое суждение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Горе тем, которые принимают неправедные указы и записывают мучительства, которые они установили.\" — Исаия 10:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПророк Исаия произносит горе на тех, кто пишет неправедные законы — кто использует механизм законодательства для создания баз для несправедливости. Правовая архитектура, которая защищала программу вакцинации COVID-19 от ответственности, была именно такой декларацией — написана заранее, размещена в законе и активирована для позволения развертывания продуктов, которые не были доказаны безопасными, для населения, которое не было правдиво проинформировано, в условиях, которые делали справедливость невозможной.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всем, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отражается через каждый коридор правительства сегодня. Когда Израиль потребовал царя, подобно другим народам, Бог предупредил их точно о том, что произойдет — их сыновья взяты на войну, их дочери на работу, их поля и виноградники захвачены, десятина всего конфискована. Они выбрали человеческое правительство над царством Божиим, и тирания последовала точно как обещано. Ничего не изменилось. Современная политическая система — два крыла одной птицы — слева и справа, республиканцы и демократы — все служат одной скрытой силовой структуре. Голосование за одну из сторон — это выбор того, какое крыло взмахнет дальше, пока птица летит в том же направлении. Реальная власть никогда не была на каком-либо избирательном бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eФедеральные законы о мошенничестве — 18 U.S.C. Разделы 1001, 1341, 1343, 371\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Анализ правовой базы Карен Кингстон OTA контрактов, EUA авторизации, иммунитета PREP и архитектуры ответственности государства-фармы\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eBoyle v. United Technologies Corp., 487 U.S. 500 (1988)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eФедеральный закон об исках за правонарушения — 28 U.S.C. Разделы 2671-2680\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eПсалом 94:20, Исаия 10:1 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 — Предупреждение против земных царей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"найти-больше-информации\"\u003eНайти больше информации\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Product 03c/a\u003e — Отказ правовой системы преследовать дело\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/florida-criminal-charges-pfizer/?lang=ru\"\u003eHow Florida Residents Can Bring Criminal Charges Against Pfizer\u003c/a\u003e — Государственные пути, обходящие федеральный иммунитет\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/doctors-vacate-prep-act/?lang=ru\"\u003eOver 100,000 Doctors Pave Way to Vacate PREP Act Immunity\u003c/a\u003e — Вызов медицинского сообщества к основе ответственности\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eИезавель написала письма. Она запечатала их царской печатью. Она указала ложным свидетелям. Она работала полностью в рамках правовой базы своей власти. И Бог привлек ее к ответственности — не за нарушение закона, а за использование закона как инструмента убийства. Правовая архитектура, которая позволила программе вакцинации COVID-19, была построена с той же точностью — каждый закон, каждое исполнительное полномочие, каждый щит ответственности, разработанные для получения того, что иначе было бы криминальным. Вопрос состоит не в том, был ли это законно. Вопрос состоит в том, является ли система, разработанная для узаконения мошенничества, сама по себе величайшим мошенничеством из всех. \"Горе тем, кто зло называет добром, и добро называет зло\" (Исаия 5:20). Закон называет это авторизованным. Бог называет это тем, что оно есть.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"font
