ященное Писание командует нам покупать её любой ценой и никогда не отпускать её. Однако история медицины, как преподаётся в современных школах, университетах и средах, не истина, полученная — это истина, проданная. Продано наивысшему предложателю. Продано фундаменту Rockefeller, который финансировал переписывание. Продано фармацевтической промышленности, которая извлекает прибыль из переписанной версии. И продано общественности, которой было учено верить, что текущая медицинская система представляет триумф науки над суеверием, когда на самом деле она представляет триумф монополии над конкуренцией.\u003c/p\u003e\n\u003cp\u003eИстинная история медицины — это история подавления, искажения и преднамеренного стирания. Это история того, как эффективные естественные терапии были обозначены как шарлатанство, как конкурирующие научные теории были молчали, как неудобные лекарства были закопаны и как весь нарратив болезни и исцеления был переписан для служения финансовым интересам нефтяной империи. Понимание этой истории не просто академическое упражнение — это акт духовного освобождения, потому что ложь, которую мы верим о наших телах, формируют ложь, которые мы принимаем о всём остальном.\u003c/p\u003e\n\u003cp\u003eТрек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e раскрывает, что обман — первичное оружие врага. Первая ложь была сказана в саду: \"Вы не умрёте\". Современная медицинская ложь рассказана в лаборатории: \"Только наши продукты могут исцелить вас.\" Обе ложь служат тому же хозяину и обе приводят к той же кабале.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"монополия-теории-микроба-как-одна-теория-стала-единственной-теорией\"\u003eМонополия теории микроба: как одна теория стала единственной теорией\u003c/h2\u003e\n\u003cp\u003eОснование современной фармацевтической медицины покоится на теории микроба — идея, что специфические микроорганизмы вызывают специфические болезни, и что первичная стратегия для лечения болезни убить, нейтрализовать или вакцинировать против тех микроорганизмов. Эта теория, приписываемая в основном Луи Пастеру и Роберту Коху в позднем девятнадцатом веке, представляется в каждом медицинском учебнике как установленный научный факт — основание, на котором вся современная медицина построена.\u003c/p\u003e\n\u003cp\u003eТо, что те учебники не упоминают, является тем, что теория микроба была всегда оспариваема. Это не была единственная научная структура для понимания болезни, и было существенное доказательство, что она была неполная, вводящая в заблуждение или откровенно неправильная в значительных отношениях.\u003c/p\u003e\n\u003cp\u003eAntoine Bechamp, современник Пастеура и более сделанный учёный несколькими мерами, предложил альтернативную структуру, названную теорией местности (или pleomorphism). Bechamp наблюдал, что микроорганизмы в теле изменили свою форму и функцию в зависимости от внутренней среды — \"местность\" — хозяина. Когда местность была здорова, эти организмы выполняли благотворные функции. Когда местность была компрометирована плохой питанием, токсичностью или стрессом, они преобразовались в патогенные формы.\u003c/p\u003e\n\u003cp\u003eЭто было фундаментально другое понимание болезни. Теория микроба говорит: микроб вызывает болезнь; убить микроб чтобы вылечить болезнь. Теория местности говорит: условие тела определяет, проявляет ли болезнь; восстановить местность восстановить здоровье. Практические следствия огромны: теория микроба приводит к фармацевтикалам, вакцинам и антисептикам. Теория местности приводит к питанию, детоксикации и медицине образа жизни.\u003c/p\u003e\n\u003cp\u003eПобеда Пастеура над Bechamp не была научной победой — это была политическая и экономическая. Теория микроба была более коммерчески полезной. Если болезнь вызвана специфическим микробом, то решение специфический продукт — лекарство, вакцина, дезинфицирующее средство. Каждый микроб представляет новый рынок. Теория местности, в контрасте, приводит к решениям, которые не могут быть запатентованы: чистая пища, чистая вода, надлежащая санитария, адекватная питания. Теория микроба создала индустрию. Теория местности угрожала ей.\u003c/p\u003e\n\u003cp\u003eСогласно множественным исторически счетам, сам Пастер признал на смертном одре, что Bechamp был правильный: \"Микроб ничто; местность всё.\" Независимо от того, произошла ли эта специфическая исповедь смертного одра, как именно сообщается, научное доказательство всё более поддерживает перспективу местности. Человеческий микробиом — триллион микроорганизмов, которые обитают в теле — теперь понимается как существенный здоровью, не собрание потенциальных врагов, подлежащих искоренения антибиотиками.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"санитария-не-вакцины-что-фактически-поразило-инфекционную-болезнь\"\u003eСанитария, не вакцины: что фактически поразило инфекционную болезнь\u003c/h2\u003e\n\u003cp\u003eЦентральная часть мифологической истории современной медицины — утверждение, что вакцины завоевали великие инфекционные болезни девятнадцатого и двадцатого веков. Оспа, полиомиелит, корь, коклюш, дифтерия — нарратив держит, что эти болезни были помещены под контроль через героическое развитие и массовое развёртывание вакцин.\u003c/p\u003e\n\u003cp\u003eИсторические данные рассказывают другую историю. Уровни смертности от практически всех основных инфекционных болезней были в крутом отказе задолго до введения вакцин. Этот отказ соответствует не с кампаниями вакцинации, но с улучшениями в санитарии, чистой воде, питании и условиях жизни.\u003c/p\u003e\n\u003cp\u003eРассмотрите данные для кори в Соединённых Штатах. Уровень смертности от кори отклонился приблизительно на 98% между 1900 и 1963 — годом, когда вакцина кори была введена. Тот же паттерн держит для скарлатины, которая отклонилась близко нуля без любой вакцины когда-либо разрабатываемой. Тиф, холера и дизентерия были завоеваны не фармацевтическим вмешательством, но чистой инфраструктурой воды и лечением сточных вод. Туберкулёз смертность отклонилась на более чем 90% перед введением антибиотиков или BCG вакцины.\u003c/p\u003e\n\u003cp\u003eБританский эпидемиолог Томас McKowen задокументировал этот паттерн экстенсивно в его ориентирном труде \u003cem\u003eThe Role of Medicine\u003c/em\u003e (1976), демонстрирующий что драматический отказ в инфекционной болезни смертность в развитом мире был приписан улучшено питание, санитарию и жизненные стандарты — не медицинским вмешательствам. McKowen анализ был подтвержден последующими исследователями, но это остаётся практически неизвестным общественности, которая продолжает верить, что вакцины и антибиотики спасли мир от инфекционной болезни.\u003c/p\u003e\n\u003cp\u003eЭто не сказать, что улучшения санитарии имели связь с теорией микроба — они сделали. Но критическое указание состоит в том, что практические вмешательства, которые фактически уменьшили болезнь, были окружающей и пищевой, не фармацевтической. Фармацевтическая промышленность присвоила кредит для революции общественного здоровья, которая была выполнена инженерами гражданского строительства, рабочами санитарии и фермерами — и затем использовала присвоенный кредит продать век стоящего фармацевтического продукта.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"подавление-естественных-лекарств-паттерн-разрушения\"\u003eПодавление естественных лекарств: паттерн разрушения\u003c/h2\u003e\n\u003cp\u003eПо всему двадцатому веку, исследователи и врачи, которые развили эффективные не-фармацевтические лечения, были систематически нападены, дискредитованы, судимы и разрушены. Паттерн настолько последователен, что он не может быть приписан совпадению. Это ожидаемое поведение монополии, защищающей её маркировать долю.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRoyal Raymond Rife\u003c/strong\u003e развил подход, основанный на частоте для разрушения патогенов в 1930s. Его исследование было первоначально торжествовано — банкет в его честь посетили видные врачи и учёные. Но когда Rife отказался продать его технологию медицинскому учреждению по их условиям, его лаборатория была обезличена, его оборудование было конфисковано и его сотрудники были угрожаемы потерей лицензии. Огонь уничтожил его лабораторию, и много его исследования было потеряно. Rife умер в безвестности в 1971.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHarry Hoxsey\u003c/strong\u003e управлял раковыми клиниками, которые лечили десятки тысяч пациентов с травяной формулой. Когда президент AMA Морис Fishbein попытался купить формулу и Hoxsey отказал, Fishbein запустил кампанию, продолжающуюся десятилетия, чтобы разрушить его. Hoxsey был арестован более чем 100 времён по обвинениям практики медицины без лицензии. Его клиники были совершены рейдом федеральными маршалами. Он был в конце концов принудить перейти его практику к Tijuana, Мексика, где его клиника продолжает работать и сегодня.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMax Gerson\u003c/strong\u003e, немецко-американский врач, развил пищевую терапию для рака и других дегенеративных болезней, которые произвели задокументированные ремиссии. Его подход — основан на органическом соке, детоксикации и пищевом добавлении — был нападен AMA и американским раковым обществом. Gerson был выслан из нью-йоркского медицинского общества и его применения для финансирования исследования были систематически отрицаемы. Он умер в 1959, и его работа была переносима его дочерью Charlotte Gerson.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStanislaw Burzynski\u003c/strong\u003e развил терапию antineoplaston для рака в его клинике в Houston, Texas. FDA провело четыре больших расследования жюри против Burzynski во время двух десятилетий, пытаясь судить его для лечения пациентов с не-одобренной терапией. Несмотря на победы оправданиями и зависшими присяжными, юридическое нападение проводило два десятилетия его жизни и миллионов долларов в легальных комиссионных — эффективно ограничивая его способность проводить более далёкое исследование.\u003c/p\u003e\n\u003cp\u003eПаттерн неоспорим: развить эффективное не-фармацевтическое лечение, отказаться продать его фармацевтической промышленности, и лицо систематическое институциональное разрушение. Это не поведение научного сообщества ищущего истину. Это поведение картеля, защищающего его доход.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"rockefeller-переписывание-как-нарратив-был-произведён\"\u003eRockefeller переписывание: как нарратив был произведён\u003c/h2\u003e\n\u003cp\u003eКак задокументировано экстенсивно в нашей статье на \u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eRockefeller Medicine: How Healthcare Was Captured\u003c/a\u003e, фундамент Rockefeller не просто переформировал медицинскую практику — это переписало медицинскую историю. Фундаменты, которые финансировали отчёт Flexner, также финансировали медицинские школы, учебники, научные журналы и профессиональные организации, которые определили какая версия медицинской истории была бы учена будущих поколений.\u003c/p\u003e\n\u003cp\u003eПереписанная история следует простой дуге: перед медициной Rockefeller, там было невежество и суеверие. После медицины Rockefeller, там была наука и прогресс. Этот нарратив стирает совершенные медицинские традиции — гомеопатию, электическую медицину, натуропатию, Ayurveda, традиционную китайскую медицину — которые имели служено человечеству в течение веков или тысячелетий. Это уменьшает тысячи лет накопленного эмпирического знания к \"народным средствам\" и \"шарлатанству,\" в то время как возвышая столетний нефтяной основанный фармацевтический модель к статусу вечной научной истины.\u003c/p\u003e\n\u003cp\u003eУчебники не упоминают, что фундамент Rockefeller финансировал их создание. Журналы не раскрывают, что доходы Rockefeller поддерживают учреждения, которые публикуют их. Лицензировать советы не признают, что их стандарты аккредитации были разработаны, чтобы исключить конкуренцию, не гарантировать качество. История представлена как объективная, когда это, на самом деле, корпоративный нарратив — письменный победителями экономической войны против конкурирующих медицинских традиций.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кейс-изучения-пеллагра-производство-истории\"\u003eКейс изучения Пеллагра: производство истории\u003c/h2\u003e\n\u003cp\u003eИстория пеллагры предоставляет идеальное кейс изучение в как медицинская история произведена, чтобы служить институциональные интересы. Пеллагра — болезнь, вызванная недостаточностью ниацина (витамин B3), характеризована дерматитом, диареей, деменцией и смертью. В ранний двадцатый век, пеллагра была эпидемией в американском Юге, убивая тысячи ежегодно.\u003c/p\u003e\n\u003cp\u003eМедицинское учреждение дня — обязанное теории микроба — настоялось, что пеллагра была инфекционной болезнью, вызванной неизвестным микроорганизмом. Это заключение выровнялось с преобладающей научной парадигмой и коммерческие интересы, которые парадигма служила: если пеллагра была инфекционной, решение было бы фармацевтическим продуктом. Если это было пищевое, решение было бы улучшено питание — и там нет маргины прибыли в улучшено питание.\u003c/p\u003e\n\u003cp\u003eДр. Joseph Goldberger из U.S. Public Health Service продемонстрировал через жёсткое экспериментирование, что пеллагра была болезнью недостаточности диеты. Он показал, что изменения в диете одних могли оба предотвратить и вылечить состояние. Он провел эксперименты на себе — вводя кровь от пациентов пеллагры и проглатывая материал из их повреждений — доказать, что болезнь не была заразна. Доказательство было подавляющим и неопровергаемо.\u003c/p\u003e\n\u003cp\u003eОднако медицинское учреждение сопротивлялось его выводам в течение лет. Врачи Южной части, в частности, отказались принять, что пеллагра была вызвана плохой диетой, наложенной sharecropping экономикой, потому что признание пищевой причины имело бы недвусмысленное экономическую систему, которая поддержала их сообщества. Гер-теория учреждение сопротивлялось, потому что приняв пищевое объяснение для основной болезни имело бы подорвано фундаментальную парадигму на которой фармацевтическая медицина была построена.\u003c/p\u003e\n\u003cp\u003eGoldberger умер в 1929 без получения признания он заслужил. Пеллагра продолжила убить тысячи в течение лет после причина и лекарство были известны. Медицинское учреждение обязательство теории микроба — и экономические интересы, которые обязательство служил — буквально убило людей, отложив принятие доказано пищевого лекарства.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"благодарности-и-справки\"\u003eБлагодарности и справки\u003c/h2\u003e\n\u003cp\u003eТруды классическх и современных медицинских реформаторов, которые раскрыли подавленные истины о здоровье, питании и исцелении документированы в полной библиотеке публикаций, доступных через множество интернет-ресурсы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/129-Rockefeller_Medicine.mp4\"\u003eRockefeller Medicine\u003c/a\u003e — Как медицинская история была захвачена и переписана\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/107-Stem_Cell_Harvesting.mp4\"\u003eStem Cell Harvesting\u003c/a\u003e — Тёмная сторона современной медицины\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучите-дальше\"\u003eИзучите дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/rockefeller-medicine-captured-healthcare/?lang=ru\"\u003eRockefeller Medicine: How Healthcare Was Captured\u003c/a\u003e — Задокументированный чертёж для как фундамент Rockefeller захватил контроль над американской медициной\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/two-hundred-years-insanity-medicine/?lang=ru\"\u003e200 Years of Insanity: The Dark History of Modern Medicine\u003c/a\u003e — Полная хронология медицинских атрокостиев, которые переписанная история скрывает\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eИстина о медицинской истории — это не история прогресса от тьмы к свету. Это история кражи — кража исцеления знания, накопленного в течение тысячелетиях, кража медицинских традиций, которые служили миллиардам, кража истины, что Бог встроил в творение себе: что земля, которую он сделал, содержит всё необходимое для человеческого здоровья. Что было украдено может быть осуждено. Что было подавлено может быть переоткрыто. Что было переписано может быть исправлено. Но сначала, вы должны быть готовы разучиться ложь — и это требует мужества признавать, что история вы были учены была написана не учёными ищущими истину, но корпорациями ищущими прибыль.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg
