ockquote\u003e\n\u003cp\u003eПосле Падения Бог поставил херувима у врат Эдема. Пламенный меч обращался во все стороны, наблюдая, охраняя, обеспечивая, чтобы падшее человечество не могло вернуться, чтобы взять от дерева жизни в своём испорченном состоянии. Это была божественная слежка для божественной цели — святая граница, установленная суверенным Творцом, который знал, что неограниченный доступ к силе в руках падших принесёт только разрушение.\u003c/p\u003e\n\u003cp\u003ePalantir Technologies — это корпоративная подделка этого херувима. Она наблюдает за всем, обращаясь во все стороны, охраняя не дерево жизни, а интересы разведывательных агентств, военных командований и политического класса. Это всевидящее око, построенное не Богом, а людьми, которые стремятся к богоподобному всеведению — и которые продают это всеведение тому, кто больше заплатит.\u003c/p\u003e\n\u003cp\u003eКак иллюстрирует трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/17-The_Cherub_at_the_Gate.mp4\"\u003eХерувим у врат\u003c/a\u003e, разница между божественной слежкой и корпоративной слежкой — это разница между отцом, наблюдающим за своими детьми, и надзирателем, контролирующим своих заключённых. Один защищает. Другой контролирует. Palantir — это око надзирателя.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-такое-palantir\"\u003eЧто такое Palantir?\u003c/h2\u003e\n\u003cp\u003ePalantir Technologies была основана в 2003 году Питером Тилем, Алексом Карпом, Джо Лонсдейлом, Стивеном Коэном и Натаном Геттингсом. Компания базируется в Денвере, Колорадо, и по состоянию на 2024 год имеет рыночную капитализацию, превышающую $50 миллиардов. Её единственный продукт — слежка — способность поглощать, интегрировать и анализировать все формы данных, которые существуют о людях, и представлять эти данные таким образом, что тотальная осведомлённость становится не просто возможной, но лёгкой.\u003c/p\u003e\n\u003cp\u003eНазвание говорит вам всё. Palantir названа в честь \u003cem\u003epalantiri\u003c/em\u003e — «видящих камней» из «Властелина колец» Дж. Р. Р. Толкина. В мифологии Толкина palantiri были хрустальными сферами, которые позволяли их пользователям видеть на огромных расстояниях, наблюдать события далеко, и общаться разумом к разуму с другими пользователями palantir. Они были созданы эльфами для благородных целей — но в конечном итоге были испорчены и превращены в инструменты врага.\u003c/p\u003e\n\u003cp\u003eТолкин, преданный католик, который встроил глубокие теологические истины в свою фантастику, понимал то, что основатели Силиконовой долины, по-видимому, упустили — или, возможно, поняли слишком хорошо: \u003cstrong\u003epalantiri испортили своих пользователей\u003c/strong\u003e. Саруман Белый, самый мощный волшебник в Средиземье, был соблазнён и сломлен, глядя в свой palantir. Видящий камень показывал ему только то, что Саурон хотел, чтобы он видел, медленно превращая союзника добра в слугу зла. Денетор, Наместник Гондора, был доведён до безумия и самоубийства видениями, которые раскрывал его palantir, видениями, тщательно курируемыми Тёмным Лордом для создания отчаяния.\u003c/p\u003e\n\u003cp\u003eПитер Тиль назвал свою компанию слежки в честь этих испорченных камней. Намеревался ли он предупреждение или полностью упустил его, имя пророческое.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"венчурное-плечо-цру\"\u003eВенчурное плечо ЦРУ\u003c/h2\u003e\n\u003cp\u003ePalantir не возникла из гаража. Она возникла из Центрального разведывательного управления.\u003c/p\u003e\n\u003cp\u003eВ 1999 году ЦРУ учредило \u003cstrong\u003eIn-Q-Tel\u003c/strong\u003e, венчурную компанию с единственной миссией: идентифицировать, финансировать и разрабатывать возникающие технологии, которые могут служить разведывательному сообществу. «Q» — это ссылка на вымышленного квартирмейстера из Джеймса Бонда — изготовителя гаджетов, который оснащает шпиона передовыми инструментами. In-Q-Tel была реальной версией, за исключением того, что вместо оснащения одного шпиона она оснащала весь разведывательный аппарат США.\u003c/p\u003e\n\u003cp\u003eIn-Q-Tel предоставила Palantir самое раннее и самое критическое финансирование — примерно \u003cstrong\u003e$2 миллиона стартового капитала\u003c/strong\u003e в 2004-2005 годах, в то время когда у Palantir не было коммерческих клиентов и жизнеспособного продукта вне разведывательных приложений. Это была не пассивная инвестиция. ЦРУ было \u003cstrong\u003eпервым и единственным клиентом\u003c/strong\u003e Palantir в течение первых трёх лет её существования. Разведывательное сообщество не просто финансировало Palantir — оно \u003cstrong\u003eразработало требования Palantir\u003c/strong\u003e, сформировало её архитектуру и служило её испытательным полигоном.\u003c/p\u003e\n\u003cp\u003eКак публично заявил бывший директор ЦРУ Джордж Тенет, величайшим провалом разведывательного сообщества до 11 сентября 2001 года была его неспособность «соединить точки» — интегрировать данные из нескольких агентств, баз данных и платформ сбора в когерентную картину. У ЦРУ была сигнальная разведка, у ФБР были уголовные записи, у АНБ были перехваты коммуникаций, у иммиграционных органов были визовые записи — но ни одна система не могла собрать всё это вместе. Palantir была построена, чтобы быть этой системой.\u003c/p\u003e\n\u003cp\u003eДоговорённость была взаимовыгодной таким образом, который должен встревожить любого, кто понимает последствия. ЦРУ получило платформу слежки более мощную, чем что-либо, что оно могло построить внутри. Palantir получила что-то ещё более ценное: \u003cstrong\u003eдоступ к самым чувствительным данным на Земле\u003c/strong\u003e как свой испытательный полигон, плюс неявное одобрение самого мощного разведывательного агентства в истории.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"palantir-gotham-око-разведывательного-сообщества\"\u003ePalantir Gotham: око разведывательного сообщества\u003c/h2\u003e\n\u003cp\u003eОсновной разведывательный продукт Palantir называется \u003cstrong\u003ePalantir Gotham\u003c/strong\u003e — названный с характерной грандиозностью Силиконовой долины в честь вымышленного города, за которым наблюдает Бэтмен из своей пещеры, полной экранов. Gotham — это платформа, используемая ЦРУ, АНБ, DIA, ФБР и многочисленными другими трёхбуквенными агентствами, а также командованием специальных операций военных и боевыми командованиями по всему миру.\u003c/p\u003e\n\u003cp\u003eТо, что делает Gotham, концептуально просто, но операционно беспрецедентно: она \u003cstrong\u003eинтегрирует каждый источник данных в единую доступную для поиска и анализа платформу\u003c/strong\u003e. Это означает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eФинансовые записи\u003c/strong\u003e — банковские транзакции, денежные переводы, движения криптовалюты, покупки по кредитным картам, налоговые декларации\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМетаданные коммуникаций и контент\u003c/strong\u003e — телефонные записи, заголовки электронной почты, публикации в социальных сетях, данные приложений обмена сообщениями, журналы VOIP\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБиометрические данные\u003c/strong\u003e — базы данных распознавания лиц, записи отпечатков пальцев, сканирования радужной оболочки, анализ походки, отпечатки голоса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДанные местоположения\u003c/strong\u003e — журналы вышек сотовой связи, координаты GPS, считыватели номерных знаков, списки авиапассажиров, регистрации в отелях, записи пунктов взимания платы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКартирование социальных сетей\u003c/strong\u003e — кто кого знает, кто кому звонит, кто кому отправляет электронную почту, кто с кем сфотографирован, кто разделяет финансовые отношения с кем\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРазведка открытых источников\u003c/strong\u003e — новостные статьи, профили социальных сетей, публичные записи, судебные документы, записи о собственности, корпоративные документы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСекретная разведка\u003c/strong\u003e — сигнальная разведка от АНБ, человеческая разведка от офицеров ЦРУ, спутниковые снимки от NRO и сбор сигналов от военных операций\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВсе эти данные — ранее изолированные в десятках агентств, баз данных и уровней классификации — поглощаются в единую онтологию Gotham. Аналитик может сесть за терминал и в течение секунд извлечь всё, что известно о любом индивиде на Земле: где они были, с кем они разговаривали, что они покупали, кто их связи, как выглядят их ежедневные паттерны и что предсказывают алгоритмы, что они сделают дальше.\u003c/p\u003e\n\u003cp\u003eЭто не поисковая система. Это \u003cstrong\u003eдвигатель всеведения\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eСобственные маркетинговые материалы Palantir описывают Gotham как обеспечивающую аналитикам «идентифицировать паттерны в сложных наборах данных» и «обнаруживать ранее скрытые связи». На практике это означает, что один запрос может раскрыть, что человек купил билет на самолёт в один конец (финансовые данные), позвонил известному связанному лица, представляющего интерес (данные коммуникаций), был сфотографирован в конкретном месте (распознавание лиц), опубликовал конкретное настроение в социальных сетях (разведка открытых источников) и имеет паттерн путешествий, соответствующий предоперационному наблюдению (поведенческая аналитика) — всё в течение времени, которое требуется для набора имени.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"palantir-foundry-принесение-слежки-в-частный-сектор\"\u003ePalantir Foundry: принесение слежки в частный сектор\u003c/h2\u003e\n\u003cp\u003eЕсли Gotham — это военно-разведывательный продукт, \u003cstrong\u003ePalantir Foundry\u003c/strong\u003e — это его корпоративный близнец. Foundry берёт ту же архитектуру интеграции и анализа данных, разработанную для ЦРУ, и переупаковывает её для корпораций, больниц и правительственных агентств вне разведывательного сообщества.\u003c/p\u003e\n\u003cp\u003eСписок клиентов Foundry читается как реестр институциональной власти:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eНациональная служба здравоохранения Великобритании (NHS)\u003c/strong\u003e — Palantir выиграла контракт на интеграцию медицинских записей пациентов по всей NHS, давая ей доступ к медицинским данным примерно 56 миллионов людей. Контракт был первоначально присуждён во время COVID-19 как «экстренная» мера и впоследствии был сделан постоянным, несмотря на значительное общественное противостояние от защитников приватности и медицинских профессионалов.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКрупные фармацевтические компании\u003c/strong\u003e — использующие Foundry для интеграции данных клинических испытаний, логистики цепи поставок и данных исходов пациентов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭнергетические компании\u003c/strong\u003e — интегрирующие геологические данные, производственные записи и рыночную аналитику\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eФинансовые учреждения\u003c/strong\u003e — обнаружение мошенничества, мониторинг соблюдения и анализ поведения клиентов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАрмия США\u003c/strong\u003e — через программу Vantage армии, Foundry управляет кадровыми записями, данными готовности и логистикой для всей армии США\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСообщение ясно: архитектура слежки, построенная для ЦРУ, теперь доступна любому, кто может себе её позволить. Та же система, которая отслеживает террористов, может отслеживать пациентов, сотрудников, клиентов и граждан. Единственная разница — лейбл на контракте.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"программа-тотальной-информационной-осведомлённости-которая-никогда-не-умерла\"\u003eПрограмма тотальной информационной осведомлённости, которая никогда не умерла\u003c/h2\u003e\n\u003cp\u003eВ 2002 году Агентство передовых оборонных исследовательских проектов Пентагона (DARPA) запустило программу \u003cstrong\u003eTotal Information Awareness (TIA)\u003c/strong\u003e под руководством адмирала Джона Пойндекстера, который был осуждён (позже отменено по технической причине) за свою роль в деле Иран-Контрас. Заявленная цель TIA была захватывающей дух в своих амбициях: создать единую систему слежки, которая будет \u003cstrong\u003eсобирать и анализировать всю доступную информацию о каждом человеке\u003c/strong\u003e — финансовые транзакции, коммуникации, путешествия, медицинские записи, образование и многое другое — чтобы идентифицировать потенциальные угрозы до того, как они материализуются.\u003c/p\u003e\n\u003cp\u003eОригинальный логотип программы изображал всевидящее око пирамиды Иллюминатов, бросающее свой взгляд на весь земной шар, с латинским девизом \u003cem\u003eScientia est Potentia\u003c/em\u003e — «Знание — сила». Символизм был настолько дерзким, что даже собственная PR-команда Пентагона в конечном итоге заставила редизайн.\u003c/p\u003e\n\u003cp\u003eКогда Конгресс узнал полный масштаб TIA в 2003 году, общественный резонанс был достаточно яростным, чтобы заставить его официальное дефинансирование. Программа была «закрыта». DARPA было сказано остановиться.\u003c/p\u003e\n\u003cp\u003eНо TIA не умерла. Она \u003cstrong\u003eметастазировала\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eКак обширно задокументировали следственные журналисты и информаторы разведывательного сообщества, компонентные программы TIA были просто \u003cstrong\u003eперераспределены по разведывательному сообществу\u003c/strong\u003e под разными именами и разными бюджетами. АНБ поглотило компоненты слежки за коммуникациями. ФБР взяло элементы внутреннего майнинга данных. Департамент внутренней безопасности интегрировал модули отслеживания путешествий и иммиграции.\u003c/p\u003e\n\u003cp\u003eИ Palantir — финансируемая In-Q-Tel ЦРУ, построенная по спецификациям разведывательного сообщества и получившая доступ к самым всеобъемлющим потокам данных в существовании — стала \u003cstrong\u003eкоммерческой реализацией\u003c/strong\u003e всего, что TIA была разработана быть. Каждая способность, которую Конгресс проголосовал закрыть в 2003 году, теперь операционна, не как правительственная программа, подлежащая надзору Конгресса, а как \u003cstrong\u003eчастная компания\u003c/strong\u003e, подлежащая только своим акционерам и своим контрактам.\u003c/p\u003e\n\u003cp\u003eКак подробно документирует наша статья о \u003ca href=\"/total-information-awareness/?lang=ru\"\u003eТотальная информационная осведомлённость: программа, которая никогда не умерла\u003c/a\u003e, закономерность всегда одна и та же: публичные программы, которые вызывают возмущение, «закрываются», затем тихо восстанавливаются через подрядчиков частного сектора, которые защищены от запросов FOIA, запросов Конгресса и общественной подотчётности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ice-полиция-и-аппарат-внутренней-слежки\"\u003eICE, полиция и аппарат внутренней слежки\u003c/h2\u003e\n\u003cp\u003eОхват Palantir простирается далеко за пределы внешней разведки. Её самые противоречивые внутренние применения включают:\u003c/p\u003e\n\u003ch3 id=\"иммиграция-и-таможенное-правоприменение-ice\"\u003eИммиграция и таможенное правоприменение (ICE)\u003c/h3\u003e\n\u003cp\u003ePalantir построила и управляет \u003cstrong\u003eсистемой управления следственными делами ICE (ICM)\u003c/strong\u003e, платформой, которая интегрирует данные из DEA, ATF, ФБР и многочисленных других федеральных агентств для создания всеобъемлющих профилей индивидов, нацеленных для иммиграционного правоприменения. Система может картировать семейные отношения индивида, историю занятости, иммиграционный статус, известные связи, телефонные записи и активность в социальных сетях — создавая то, что иммиграционные адвокаты описали как «цифровое досье» на миллионы людей.\u003c/p\u003e\n\u003cp\u003eДокументы, полученные через запросы FOIA и следственную журналистику, раскрыли, что ICM позволяет агентам строить дела не только против индивидов, подозреваемых в криминальной активности, но против их \u003cstrong\u003eцелых социальных сетей\u003c/strong\u003e — членов семьи, друзей, работодателей и любого, кто имел контакт с ними. Мать, звонящая своему депортированному сыну, создаёт точку данных. Друг, переводящий деньги, создаёт связь. Кузен, публикующий в социальных сетях, создаёт зацепку.\u003c/p\u003e\n\u003ch3 id=\"полицейские-департаменты\"\u003eПолицейские департаменты\u003c/h3\u003e\n\u003cp\u003ePalantir имеет контракты с полицейскими департаментами в \u003cstrong\u003eЛос-Анджелесе, Нью-Йорке, Новом Орлеане, Чикаго\u003c/strong\u003e и многочисленных других городах. Система Palantir LAPD интегрирует записи арестов, карты полевых интервью, данные автоматических считывателей номерных знаков и мониторинг социальных сетей в \u003cstrong\u003eплатформу прогнозирования полицейской деятельности\u003c/strong\u003e, которая генерирует списки индивидов, считающихся вероятными для совершения преступлений — до того, как любое преступление было совершено.\u003c/p\u003e\n\u003cp\u003eПолицейский департамент Нового Орлеана тайно использовал технологию Palantir более шести лет без информирования городского совета, общественности или даже большинства офицеров в департаменте. Программа была раскрыта только через следственную журналистику. Когда столкнулись, городские чиновники заявили, что не знали, что технология использовалась.\u003c/p\u003e\n\u003cp\u003eЭто суть паноптикума — система слежки настолько всепроникающая, что те, кто наблюдается, даже не знают, что наблюдатели существуют, и те, кто у номинальной власти, не знают, какие инструменты развёртываются от их имени.\u003c/p\u003e\n\u003ch3 id=\"военные-и-применения-на-поле-боя\"\u003eВоенные и применения на поле боя\u003c/h3\u003e\n\u003cp\u003eВоенные контракты Palantir включают предоставление платформ интеграции данных для \u003cstrong\u003eКомандования специальных операций США (SOCOM)\u003c/strong\u003e, \u003cstrong\u003eКомандования разведки и безопасности армии (INSCOM)\u003c/strong\u003e и сил коалиции в Афганистане и Ираке. В контекстах поля боя технология Palantir использовалась для интеграции сигнальной разведки, кадров с дронов, отчётов информаторов и биометрических данных для идентификации и локализации целей — целей, которые затем убиваются дроновыми ударами, рейдами спецопераций или традиционными военными действиями.\u003c/p\u003e\n\u003cp\u003eСистема была инструментальной в том, что военные называют \u003cstrong\u003e«цепью убийства»\u003c/strong\u003e — процессе идентификации, локализации, отслеживания, нацеливания, взаимодействия и оценки человеческой цели. Интеграция данных Palantir сокращает эту цепь от дней или недель до часов или минут. Представляет ли это эффективность или индустриализацию убийства, зависит от вашей моральной структуры.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"связь-с-мафией-paypal\"\u003eСвязь с мафией PayPal\u003c/h2\u003e\n\u003cp\u003eПитер Тиль не пришёл к Palantir в вакууме. Он пришёл через сеть отношений, которая составляет одну из самых мощных концентраций технологической и финансовой силы в истории человечества: \u003cstrong\u003eмафия PayPal\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eВ конце 1990-х годов группа предпринимателей в PayPal — онлайновой платёжной компании — построила алгоритмы обнаружения мошенничества, которые обеспечили безопасную цифровую торговлю. Когда eBay приобрёл PayPal в 2002 году за $1,5 миллиарда, команда основателей рассеялась и продолжила создавать или контролировать поразительный массив компаний:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eПитер Тиль\u003c/strong\u003e — со-основал PayPal, затем основал Palantir Technologies и был первым внешним инвестором в Facebook (теперь Meta), купив 10,2% акций за $500,000 в 2004 году\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИлон Маск\u003c/strong\u003e — со-основал PayPal (через слияние X.com), затем создал Tesla, SpaceX, Neuralink и xAI\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРид Хоффман\u003c/strong\u003e — со-основал LinkedIn, теперь одну из крупнейших профессиональных сетей и репозиториев данных в мире\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМакс Левчин\u003c/strong\u003e — основал Affirm (потребительское кредитование) и Glow (отслеживание фертильности)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧад Херли, Стив Чен, Джавед Карим\u003c/strong\u003e — основали YouTube, крупнейшую видеоплатформу в мире\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДжереми Стоппельман\u003c/strong\u003e — основал Yelp, отслеживая местоположения потребителей и обзоры бизнеса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДэвид Сакс\u003c/strong\u003e — стал CEO Yammer, позже инвестировал в многочисленные технологические компании, теперь служит в администрации Трампа как царь ИИ и крипто\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКит Рабуа\u003c/strong\u003e — ключевая фигура в LinkedIn, Square и Khosla Ventures\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКен Хоуэри\u003c/strong\u003e — со-основал Founders Fund с Тилем, служил послом США в Швеции\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКак документирует наша статья о \u003ca href=\"/paypal-mafia-tech-oligarchy/?lang=ru\"\u003eМафия PayPal: технологическая олигархия, которая управляет миром\u003c/a\u003e, эта единая группа индивидов — которые все знали друг друга, финансировали друг друга и служили в советах друг друга — продолжила строить инфраструктуру, которая контролирует цифровые платежи, социальные сети, видеоконтент, профессиональную идентичность, искусственный интеллект, космические коммуникации, нейронные интерфейсы и слежку разведывательного сообщества.\u003c/p\u003e\n\u003cp\u003eНить, соединяющая PayPal с Palantir, не просто биографическая — она \u003cstrong\u003eтехнологическая\u003c/strong\u003e. Ключевая инновация PayPal была её система обнаружения мошенничества: алгоритмы, которые анализировали паттерны транзакций в реальном времени для идентификации подозрительного поведения. Palantir взяла те же принципы распознавания паттернов и применила их не к финансовым транзакциям, а к \u003cstrong\u003eчеловеческому поведению\u003c/strong\u003e в его целостности. Та же технология, которая помечала мошенническую транзакцию кредитной карты, теперь помечает «подозрительный» телефонный звонок, паттерн путешествий или публикацию в социальных сетях.\u003c/p\u003e\n\u003cp\u003eИ ранняя инвестиция Тиля в Facebook не была случайной. Facebook стал \u003cstrong\u003eкрупнейшей добровольной базой данных слежки в истории человечества\u003c/strong\u003e — миллиарды людей загружают свои фотографии, перечисляют свои отношения, делятся своими местоположениями, выражают свои политические взгляды и документируют свою ежедневную жизнь в формате, идеально разработанном для алгоритмического анализа. То, что Тиль одновременно инвестировал в платформу, которая собирает данные (Facebook), и платформу, которая их анализирует (Palantir), — это либо самое замечательное совпадение в истории технологии, либо в точности то, чем оно кажется.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"предупреждение-толкина\"\u003eПредупреждение Толкина\u003c/h2\u003e\n\u003cp\u003eДж. Р. Р. Толкин был филологом, медиевистом и человеком, который лично был свидетелем индустриализированного ужаса Первой мировой войны. Его фантастика была не эскапизмом — это была теологическая и моральная структура, выраженная через миф. \u003cem\u003ePalantiri\u003c/em\u003e Средиземья не были произвольными сюжетными устройствами. Они воплощали конкретное предупреждение о природе всеведущего зрения.\u003c/p\u003e\n\u003cp\u003eВо «Властелине колец» palantiri имели три критических свойства:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОни показывали истину, но не всю истину.\u003c/strong\u003e Денетор видел армии Саурона, собирающиеся — это было реально. Но palantir не показал ему силы добра, также собирающиеся, внутренние конфликты внутри Мордора или слабый шанс, несомый двумя хоббитами на Гору Судьбы. Он видел только то, что создавало отчаяние. Видящий камень дал ему данные, но лишил его контекста, мудрости и надежды.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eИми можно было манипулировать сильнейшей волей.\u003c/strong\u003e Саурон контролировал то, что видели другие пользователи palantir, потому что его воля была сильнейшей в сети. В системе слежки сильнейшая воля — это та, которая контролирует алгоритмы — та, которая решает, какие паттерны «подозрительны», какие связи «значимы», какие индивиды «угрозы». Кто программирует онтологию, программирует мировоззрение. Данные могут быть объективными, но структура, через которую они интерпретируются, никогда не является.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОни испортили своих пользователей.\u003c/strong\u003e Саруман начинал как самый мудрый из волшебников, которому было поручено противостоять Саурону. Через palantir он стал слугой Саурона, веря себя партнёром Саурона. Денетор начинал как благородный наместник, защищающий свой народ. Через palantir он стал параноидальным тираном, который сжёг себя заживо. Инструмент зрения стал инструментом разрушения — не потому что инструмент неисправен, а потому что \u003cstrong\u003eакт всеведущей слежки по своей сути испорчен\u003c/strong\u003e.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eЭто не вымышленное предупреждение. Это задокументированная реальность каждого аппарата слежки в истории. Штази испортило Восточную Германию. COINTELPRO испортило ФБР. Программы массовой слежки АНБ, раскрытые Эдвардом Сноуденом, испортили всю концепцию конституционного управления. И Palantir — самая мощная платформа интеграции слежки, когда-либо построенная — испорчает отношения между гражданином и государством, между индивидом и институцией, между наблюдаемым и наблюдателями.\u003c/p\u003e\n\u003cp\u003eПитер Тиль либо понял предупреждение Толкина и выбрал иронию, либо он понял его и выбрал вызов. Ни одна интерпретация не утешает.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"паноптикум-реализован\"\u003eПаноптикум реализован\u003c/h2\u003e\n\u003cp\u003eВ 1791 году философ Джереми Бентам разработал \u003cstrong\u003eПаноптикум\u003c/strong\u003e — тюремную архитектуру, в которой один надзиратель мог наблюдать всех заключённых без того, чтобы заключённые могли сказать, наблюдали ли за ними в любой данный момент. Гениальность дизайна была не в самой слежке, а в \u003cstrong\u003eнеопределённости\u003c/strong\u003e: потому что заключённые никогда не могли знать, наблюдали ли за ними, им приходилось \u003cstrong\u003eпредполагать, что за ними всегда наблюдают\u003c/strong\u003e, и изменять своё поведение соответственно. Паноптикуму не нужно было действительно наблюдать за всеми всё время. Ему только нужно было, чтобы заключённые верили, что он может.\u003c/p\u003e\n\u003cp\u003eФранцузский философ Мишель Фуко позже использовал Паноптикум как метафору для современного общества — системы, где просто возможность слежки производит самоцензуру, конформизм и послушание без необходимости открытой силы.\u003c/p\u003e\n\u003cp\u003ePalantir сделала Паноптикум буквальным. Это больше не метафора или архитектурная концепция. Это программная платформа с контрактами по всему западному миру. Неопределённость, на которую полагался Бентам, ушла — заменённая системой, которая действительно может наблюдать за всеми всё время, интегрируя каждый источник данных в единую доступную для поиска платформу, доступную разведывательным агентствам, правоохранительным органам, иммиграционным органам, военным командованиям и корпорациям.\u003c/p\u003e\n\u003cp\u003eМодификация поведения, которую Бентам теоретизировал, а Фуко описал, теперь операционная реальность для любого, кто понимает, что делает Palantir. Вы модифицируете то, что публикуете онлайн, потому что это мониторится. Вы дважды думаете перед тем, как позвонить определённым людям, потому что метаданные собираются. Вы колеблетесь перед тем, как посетить определённые события, потому что камеры распознавания лиц запишут ваше присутствие. Вы цензурируете свои собственные мысли прежде, чем они станут речью, потому что вы знаете — не подозреваете, а \u003cstrong\u003eзнаете\u003c/strong\u003e — что инфраструктура для соединения каждой точки уже существует.\u003c/p\u003e\n\u003cp\u003eЭто не свобода. Это архитектура контроля, замаскированная как архитектура безопасности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eПонимайте систему.\u003c/strong\u003e Palantir — не абстрактная концепция. Это конкретная компания с конкретными контрактами, которые влияют на вашу ежедневную жизнь. Данные, которые она интегрирует, включают ваши.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТребуйте прозрачности.\u003c/strong\u003e Многие муниципалитеты используют Palantir без публичного знания или одобрения совета. Требуйте, чтобы ваше местное правительство раскрывало свои контракты слежки.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМинимизируйте ваш след данных.\u003c/strong\u003e Каждая цифровая транзакция, публикация в социальных сетях и пинг местоположения смартфона кормит систему. Сокращайте то, что вы её кормите, не из паранойи, а из принципа.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСопротивляйтесь нормализации.\u003c/strong\u003e Величайшая победа любой системы слежки — когда население перестаёт её ставить под вопрос. Откажитесь принимать тотальную слежку как цену безопасности.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПомните источник истинного зрения.\u003c/strong\u003e Притчи 15:3 говорит нам: «Очи Господни на всяком месте: они видят злых и добрых». Только Бог имеет право и мудрость видеть все вещи. Каждая человеческая попытка захватить всеведение производит испорченность, потому что падшие существа никогда не были разработаны нести этот вес.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки от ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/157-Palantir_Panopticon.mp4\"\u003ePalantir Panopticon\u003c/a\u003e — Всевидящее око корпоративной слежки и разведывательного сообщества\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/159-PayPal_Mafia_Blues.mp4\"\u003eБлюз мафии PayPal\u003c/a\u003e — Технологическая олигархия, которая контролирует цифровую инфраструктуру современной жизни\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eОдна нация под шантажом\u003c/a\u003e — Как слежка обеспечивает контроль через скомпрометированные системы\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (Пещера сокровищ):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/17-The_Cherub_at_the_Gate.mp4\"\u003eХерувим у врат\u003c/a\u003e — Божественная слежка у врат Эдема против корпоративной подделки, которая наблюдает без мудрости или милосердия\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eТотальная информационная осведомлённость\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/212-Total_Information_Awareness-Alt.mp4\"\u003eТотальная информационная осведомлённость (Alt)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/243-Cybereason_CIA.mp4\"\u003eCybereason CIA\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/244-Cybereason_CIA-Alt.mp4\"\u003eCybereason CIA (Alt)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучите-дальше\"\u003eИзучите дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/paypal-mafia-tech-oligarchy/?lang=ru\"\u003eМафия PayPal: технологическая олигархия, которая управляет миром\u003c/a\u003e — Сеть основателей, которые построили цифровую инфраструктуру капитализма слежки\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/darpa-dark-winter-military-origins/?lang=ru\"\u003eТёмная зима DARPA: военное происхождение всего\u003c/a\u003e — Как исследовательские программы Пентагона становятся коммерческими технологиями, которые изменяют общество\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/epstein-island-blackmail-network/?lang=ru\"\u003eСеть шантажа острова Эпштейна\u003c/a\u003e — Пересечение слежки, компрометации и элитного контроля\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/total-information-awareness/?lang=ru\"\u003eТотальная информационная осведомлённость: программа, которая никогда не умерла\u003c/a\u003e — Как Конгресс убил программу слежки, которая просто изменила своё имя и продолжила\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eБог поставил херувима у врат Эдема охранять путь к дереву жизни — божественная слежка с божественной целью, защищающая человечество от последствий его собственной падшей природы. Palantir Technologies ставит алгоритм у врат каждой базы данных в западном мире, не охраняя ничего священного, не защищая ничьей души, служа только воле тех, кто платит за привилегию всеведущего зрения. Толкин предупредил нас, что видящие камни испортят своих пользователей. Предупреждение было проигнорировано. Камень активен. И око, как всегда, наблюдает.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/technology/\",\"className\":\"category-badge\",\"children\":\"technology\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Palantir Panopticon: видящий камень тотальной слежки\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Как Palantir Technologies Питера Тиля стал всевидящим оком разведывательного
