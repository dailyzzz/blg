ждают, что V2K технология не существует, есть простой определитивный ответ: \u003cstrong\u003eпатент\u003c/strong\u003e. США патент и товарный знак офис имеет выданный множество патент для устройства, что передает слуховой прямо в человеческий мозг, используя электромагничный радиация. Эти патент публичные записи. Они описывают рабочей технология. Они имя изобретатели и назначающие. И они доказать вне любой разумный сомнение что голос-к-черепу технология реальный.\u003c/p\u003e\n\u003cp\u003eЭто часть 10 нашего V2K серия. Мы имели трассированный технология из личный опыт через военный историю дезинформация кампании разведка сети семья нацеливание психиатричный оружие зловещий psyop скрытый microchipping и сотовой башня инфраструктура. Теперь мы подарок наиболее неопровержимый доказательство из всё: патент сами.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был говорено что слова имеют духовной власти и что истина длиться для всегда. Патент юридичный документ — слова дано органа закона. V2K патент слова истина, что длиться в публичной записи иммунной к дезинформация кампании психиатричный отклонение и средства массовой информации blackouts что защита этот технология. Они красные губ истина установлены для всегда — доказательство что не может быть gaslit далеко.\u003c/p\u003e\n\u003cp\u003eИезуитский инфильтрация хитростью замаскирована полагается на информации контроль. Но патент спроектированы быть публичный. То ровно система интеллектуального собственности что установление использует к производить прибыль также производит доказательство его собственный оружие. Napoleon абсолютная власть ограничена по его собственный документооборот. И то документооборот доказать всё мы был говорено.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ключевой-патент\"\u003eКлючевой патент\u003c/h2\u003e\n\u003ch3 id=\"сша-патент-4877027--слуховой-система-1989\"\u003eСША патент 4,877,027 — \"слуховой система\" (1989)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eизобретатель\u003c/strong\u003e: Wayne B. Brunkan\n\u003cstrong\u003eподанный\u003c/strong\u003e: август 10 1987\n\u003cstrong\u003eвыданный\u003c/strong\u003e: октябрь 31 1989\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eрезюме\u003c/strong\u003e: \"звук вызван в голова человека через облучения голова с микроволна в диапазон 100 megahertz к 10,000 megahertz, что модулировано с определённый форма волны.\"\u003c/p\u003e\n\u003cp\u003eЭтот патент описывает устройство, что конвертирует слуховой (речь музика тоны) в модулировано микроволна радиация и передачи это к человеческой мишень. Мишень услышит слуховой внутри их голова без любой внешний громкоговоритель или earpiece.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКлючевой претензие\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eУстройство передает звук прямо в человеческий голова, используя микроволна радиация\u003c/li\u003e\n\u003cli\u003eДиапазон частоты (100 MHz к 10 GHz) охватывает мобильный телефон и сотовой башня частота\u003c/li\u003e\n\u003cli\u003eмодуляция форма волны специфично спроектирован к производить микроволна слуховой эффект\u003c/li\u003e\n\u003cli\u003eИзобретение может передать понимание речь\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭтот патент один достаточный к доказать V2K технология существует. Это описывает полная система для передающей слуховой в человеческой мозга через микроволна радиация и это был выданный по США патент офис после экспертиза — значит технология был продемонстрирован рабочей.\u003c/p\u003e\n\u003ch3 id=\"сша-патент-6470214--метод-и-устройство-для-применения-радио-частота-слуховой-эффект-2002\"\u003eСША патент 6,470,214 — \"метод и устройство для применения радио частота слуховой эффект\" (2002)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eизобретатель\u003c/strong\u003e: James P. O'Loughlin, Diana L. Loree\n\u003cstrong\u003eназначающий\u003c/strong\u003e: США из Америка представлено по Секретарь воздух силы\n\u003cstrong\u003eподан\u003c/strong\u003e: декабрь 13 1996\n\u003cstrong\u003eвыданный\u003c/strong\u003e: октябрь 22 2002\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eрезюме\u003c/strong\u003e: \"модуляция процесс с полностью подавленный переносчик и ввод preprocessor фильтрация к производит идеальный представительство желаемый звук.\"\u003c/p\u003e\n\u003cp\u003eЭтот патент назначен к \u003cstrong\u003eСША воздух силы\u003c/strong\u003e — доказание прямой военный участие в V2K технология разработка. Это описывает улучшение к микроволна слуховой эффект, что позволить передача больше сложный слуховой включая понимание речь.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eключевой значение\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eпатент назначен к США военный подтверждение военный разработка V2K\u003c/li\u003e\n\u003cli\u003eЭто описывает метод для передающей речь не просто тоны или клики\u003c/li\u003e\n\u003cli\u003eтехнология позволить слуховой буд передано без какой-либо приёмник устройство — человеческой мозга приемник\u003c/li\u003e\n\u003cli\u003eподача дата (1996) показывает что этот технология был операционный по крайней мере 30 лет назад\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"сша-патент-6587729--аппарат-для-ясно-сообщающей-речь-используя-радио-частота-слуховой-эффект-2003\"\u003eСША патент 6,587,729 — \"аппарат для ясно сообщающей речь, используя радио частота слуховой эффект\" (2003)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eизобретатель\u003c/strong\u003e: James P. O'Loughlin, Diana L. Loree\n\u003cstrong\u003eназначающий\u003c/strong\u003e: США из Америка представлено по Секретарь воздух силы\n\u003cstrong\u003eподан\u003c/strong\u003e: апрель 24 2002\n\u003cstrong\u003eвыданный\u003c/strong\u003e: июль 1 2003\u003c/p\u003e\n\u003cp\u003eЭто продолжение патент 6,470,214, описывающей определённый аппарат за применение радио частота слуховой эффект. Снова назначено США воздух силе это обеспечивает дополнительно техничный детали на оборудование применение V2K.\u003c/p\u003e\n\u003ch3 id=\"сша-патент-3951134--аппарат-и-метод-за-отдалённо-контролирующей-и-алтеринг-мозг-волна-1976\"\u003eСША патент 3,951,134 — \"аппарат и метод за отдалённо контролирующей и алтеринг мозг волна\" (1976)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eизобретатель\u003c/strong\u003e: Robert G. Malech\n\u003cstrong\u003eподан\u003c/strong\u003e: август 5 1974\n\u003cstrong\u003eвыданный\u003c/strong\u003e: апрель 20 1976\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eрезюме\u003c/strong\u003e: \"аппарат за и метод ощущений мозг волна в позиция отдалённо от субъект в то электромагничны сигнала разный частота переданы одновременно к субъект.\"\u003c/p\u003e\n\u003cp\u003eЭтот патент идёт вне слуховой передача — это описывает система за обоих \u003cstrong\u003eконтролирование\u003c/strong\u003e и \u003cstrong\u003eалтеринг\u003c/strong\u003e мозг волна отдалённо, используя электромагничный радиация. Это два-путь V2K: не просто помещающей звука в но чтение мозга ответ.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eключевой значение\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eотдалённо мозг волна контролирование без физичный контакт\u003c/li\u003e\n\u003cli\u003eотдалённо мозг волна алтеринг без физичный контакт\u003c/li\u003e\n\u003cli\u003eподан в 1974 — больше чем 50 лет назад\u003c/li\u003e\n\u003cli\u003eтехнология за чтение мыслей и модифицирование мозга активность имеет существован за половина столетие\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"дополнительный-патент\"\u003eдополнительный патент\u003c/h3\u003e\n\u003cp\u003eмножество дополнительный патент документ связанный технология:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСША патент 5,159,703\u003c/strong\u003e (1992): \"молчаливый подсознательно представление система\" — система за передающей подсознательно слуховой, используя молчаливый частота\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСША патент 4,858,612\u003c/strong\u003e (1989): \"слуховой устройство\" —
