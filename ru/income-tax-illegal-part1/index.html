kquote\u003e\n\u003cp\u003eИисуса спросили о налогах и он ответил, что интерпретировался две тысячи лет. Но рассмотрите полное значение: отдайте кесарю то, что принадлежит кесарю. Что если ваш труд — работа ваших рук, продукт вашего ума, время вашей жизни — не принадлежит кесарю? Что если налог на прибыль — не просто чрезмерен, но фундаментально незаконен?\u003c/p\u003e\n\u003cp\u003eNDE Ховарда Питтмана выявил системы рабства, действующие через материальный мир. Три небес. Демонической иерархии. 97,5% отказ. 95% саморегулирование. Каждое слово судит (Матфей 12:36-37). Налог на прибыль — одна из материальных систем рабства, через которую начальства Ефесянам 6:12 извлекают человеческую энергию — не метафорически, а буквально. Ваш труд — это ваша жизненная сила. Налог на прибыль берет часть этой жизненной силы и перенаправляет ее в институциональную систему.\u003c/p\u003e\n\u003cp\u003eИезуиты — военная организация Лойолы, \"абсолютная власть\" Наполеона, Тамбурини, управляющий \"всем миром\" — всегда понимали, что финансовый контроль — это наиболее эффективная форма управления. \u003cem\u003eКатолический конфиденциал\u003c/em\u003e раскрывает инфильтрацию \"прикрытую хитростью\", слепое повиновение, \"всякий вид порока\". Система налогообложения доходов работает по тем же принципам: невидимая власть (IRS), обязательное соответствие и устранение инакомыслящих.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМаскировка сатаны — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eЛожь обманщика — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"правовые-аргументы\"\u003eПравовые аргументы\u003c/h2\u003e\n\u003ch3 id=\"вопрос-16-й-поправки\"\u003eВопрос 16-й поправки\u003c/h3\u003e\n\u003cp\u003e16-я поправка к Конституции США, ратифицированная в 1913 году, является правовой основой для федерального налога на прибыль. Она гласит: \"Конгресс имеет право устанавливать и собирать налоги на доходы из любого источника без распределения между штатами\".\u003c/p\u003e\n\u003cp\u003eПравовые аргументы против налога на прибыль сосредоточены на нескольких требованиях:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНарушения при ратификации\u003c/strong\u003e: Исследователь Билл Бенсон потратил годы на изучение документов ратификации всех 48 штатов, существовавших в 1913 году. Он задокументировал многочисленные нарушения — штаты, которые изменили текст, штаты, чьи законодательные органы не достигли необходимого большинства, штаты, где процесс ратификации был процедурно ошибочным. Его книга \u003cem\u003eЗакон, который никогда не был\u003c/em\u003e аргументирует, что 16-я поправка никогда не была законно ратифицирована.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДобровольное соответствие\u003c/strong\u003e: IRS использовала фразу \"добровольное соответствие\" для описания налоговой системы. Протестующие налоги аргументируют, что этот язык указывает на то, что налог на прибыль является добровольным, а не обязательным. Суды последовательно отвергали эту интерпретацию, но сам язык красноречивый.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОпределение дохода\u003c/strong\u003e: Некоторые правоведы утверждают, что \"доход\" как определено в 16-й поправке означает корпоративную прибыль, а не индивидуальные заработки. Верховный суд в \u003cem\u003eEisner v. Macomber\u003c/em\u003e (1920) определил доход как \"прибыль, полученную от капитала, от труда или от обоих вместе\" — но это определение было расширено последующими решениями на охват практически всей экономической деятельности.\u003c/p\u003e\n\u003cp\u003eЭти аргументы не добились успеха в суде. Правовая система, которая сама является частью институциональной структуры, последовательно постановила в пользу налога на прибыль. Но неудача правовых аргументов не доказывает их отсутствие заслуг. Это доказывает, что система защищает себя.\u003c/p\u003e\n\u003cp\u003eАгент131711 документирует на Substack (agent131711.substack.com) связи между налогом на прибыль, системой Федерального резерва и банковскими семьями, которые инженизировали обе. 16-я поправка и Федеральный закон о резерве были оба приняты в 1913 году — в том же году, в том же Конгрессе. Это не совпадение. Налог на прибыль обеспечивает доходный поток, который обслуживает долг, созданный фракционным резервным кредитованием Федерального резерва. Без налога на прибыль система Федерального резерва рушится. Без Федерального резерва налог на прибыль не имеет цели.\u003c/p\u003e\n\u003ch3 id=\"связь-федерального-резерва\"\u003eСвязь Федерального резерва\u003c/h3\u003e\n\u003cp\u003eФедеральный резерв — не правительственное агентство. Это частный банковский картель, который создает деньги через долг. Когда правительству нужны деньги, оно заимствует у Федерального резерва, который создает деньги из ничего и взимает проценты. Налог на прибыль существует в основном, чтобы платить проценты по этому долгу.\u003c/p\u003e\n\u003cp\u003eЭто означает, что налог на прибыль не финансирует дороги, школы или больницы. Это финансирует выплату процентов частным банкирам. Ваш труд, извлеченный через налогообложение, перенаправляется частным владельцам системы Федерального резерва — системы, созданной в 1913 году через процесс, который включал секретные встречи на острове Джекилл, Джорджия, на которых присутствовали представители банковских интересов Моргана, Рокфеллера и Ротшильда.\u003c/p\u003e\n\u003cp\u003eСвязь иезуитов с этими банковскими семьями задокументирована, но редко обсуждается. Советники, обученные иезуитами, заполняли советы директоров крупных банков, Федерального резерва и Казначейства на протяжении более века. Финансовая система, которая извлекает ваш труд через налог на прибыль, был спроектирован, отчасти, люди, обученные в иезуитских учреждениях — люди, которые выучили иезуитский метод управления: невидимая власть, захват учреждения и извлечение соответствия через системы, которые выглядят законными, но служат скрытым мастерам.\u003c/p\u003e\n\u003ch2 id=\"нравственный-аргумент\"\u003eНравственный аргумент\u003c/h2\u003e\n\u003ch3 id=\"налогообложение-как-рабство\"\u003eНалогообложение как рабство\u003c/h3\u003e\n\u003cp\u003eМоральный аргумент против налога на прибыль простой: если бы другой человек заявил бы право на 30% вашего дохода путем силы, вы бы назвали это грабежом. Если бы они заявили право на 30% вашего труда, вы бы назвали это рабством. Единственная разница между правительством и грабителем — претензия правительства на законность — претензия, которая зависит от согласия управляемых.\u003c/p\u003e\n\u003cp\u003eНо дали ли вы согласие? Вы подписали контракт согласия платить налог на прибыль? Вам был дан выбор? Теория общественного договора — идея, что живя в обществе, вы неявно согласны с его правилами — это философическая конструкция, а не юридическое соглашение. Вы были рождены в систему, которую вы не создавали, воспитаны для принятия правил, которые вы не написали, и облагались налогами на труд, к которому вы не добровольно обязались.\u003c/p\u003e\n\u003cp\u003eОткровение Ховарда Питтмана о том, что 95% служат \"себе\", применимо к институциональному \"я\", а также к личному \"я\". Правительство служит своим собственным институциональным интересам — сохранению, расширению, контролю — и налог на прибыль является его основным топливом. 97,5%, которые были отвергнуты, доверяли институциональным системам без изучения. Налог на прибыль — одна из таких систем — принятой без вопроса населением, обученным с детства соблюдать.\u003c/p\u003e\n\u003ch3 id=\"библейская-перспектива\"\u003eБиблейская перспектива\u003c/h3\u003e\n\u003cp\u003eБиблия касается налогообложения в нескольких контекстах. Налогообложение Иосифом Египта (Бытие 47:24) взяло 20% — и это было представлено как тяжелое бремя. Пророк Самуил предупредил Израиль, что король возьмет десятую часть их урожая и их слуг, и объявил: \"воскричите в тот день из-за вашего царя\" (1 Царства 8:18).\u003c/p\u003e\n\u003cp\u003eСовременный налог на прибыль, в сочетании с государственными налогами, налогами на имущество, налогами с продаж и нормативными сборами, берет 40-60% от общего дохода большинства американцев. Это не 10% десятины, которую установил Бог. Это не даже 20%, которого потребовал фараон. Это уровень извлечения, который Библия описывает как тиранию — то самое, что Самуил предупредил, произойдет, когда люди выбрали царя над Богом.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые служили советниками королям и министрам на протяжении веков, помогли спроектировать современное налоговое государство. Их влияние на финансовую политику, задокументированное на протяжении веков политической истории, способствовало системе, которая извлекает больше у населения, чем любой фараон когда-либо осмеливался требовать.\u003c/p\u003e\n\u003ch2 id=\"что-вам-нужно-знать\"\u003eЧто вам нужно знать\u003c/h2\u003e\n\u003ch3 id=\"уязвимость-системы\"\u003eУязвимость системы\u003c/h3\u003e\n\u003cp\u003eСистема налогообложения доходов зависит от соответствия — конкретно, от страха, который порождает несоответствие. IRS обеспечивает соответствие через штрафы, налоговые удержания, сборы, удержания заработной платы и уголовное преследование. Эти инструменты создают климат страха, который гарантирует, что большинство людей платят без вопросов к законности системы.\u003c/p\u003e\n\u003cp\u003eНо система более хрупка, чем кажется. Если значительная часть населения одновременно ставила бы под сомнение законность системы, требовала доказательства юридического обязательства и организовывалась политически, чтобы реформировать или отменить налог на прибыль, система столкнулась бы с кризисом, который она не предназначена обрабатывать.\u003c/p\u003e\n\u003cp\u003eВот почему тема подавляется. Освещение в СМИ о сопротивлении налогам единообразно отрицательно. Протестующие налоги описываются как чудаки, преступники или теоретики заговора. Правовая система наказывает их строго — не потому, что их аргументы легкомысленны, а потому что их пример опасен. Население, которое ставит под сомнение налог на прибыль, — это население, которое может ставить под сомнение всё остальное.\u003c/p\u003e\n\u003cp\u003eИ это именно суть. Узкий путь требует сомнения во всём — каждом учреждении, каждой традиции, каждой системе, которая претендует на власть над вашей жизнью и трудом. Налог на прибыль — одна из таких систем. Во второй части мы рассмотрим, как налогообложение стало рабством и как выглядит американская рабская империя изнутри.\u003c/p\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eТо, что в подвале Ватикана, может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSubstack Agent131711\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Расследование системы налога на прибыль и связей Федерального резерва\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСвидетельство NDE Ховарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/
