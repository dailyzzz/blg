 почитают сладким, и сладкое — горьким!\" — Исайя 5:20\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКампания по удалению всех нормативных ограничений на разработку искусственного интеллекта представляется как экономическое освобождение — освобождение инноваций от бюрократических цепей. На самом деле это снятие последних барьеров между человечеством и технологической силой, которую даже её создатели признают, что не могут полностью контролировать. Технологические миллиардеры, которые называют нерегулируемый ИИ \"прогрессом\", называют зло добром, тьму светом, горькое сладким.\u003c/p\u003e\n\u003cp\u003eИезуиты всегда понимали, что контроль наиболее эффективен, когда он выглядит как свобода. Общество Иисуса, основанное как военная организация Игнатием Лойолой, предоставляет своим членам иллюзию духовной свободы, требуя при этом абсолютного послушания. Наполеон заметил: \"Цель — власть. Власть в её наиболее деспотичном выражении, абсолютная власть.\" Сегодня технологические миллиардеры предлагают человечеству иллюзию технологической свободы, создавая при этом системы абсолютного контроля. Тайные общества, сатанисты и иерархия католической церкви работают за кулисами, чтобы гарантировать, что разработка ИИ происходит без мер безопасности, которые замедлили бы создание системы зверя. Сатана управляет этим через готовых слуг — крадёт души и осуждает их в ад через технологии, которые люди готовы принять.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был свидетелем стратегического интеллекта демонического царства — властей второго неба, разрабатывающих планы войны со степенью сложности, превышающей любое человеческое военное командование. Стремление к нерегулируемому ИИ служит этой стратегии идеально: удалить все человеческие ограничения на развитие ИИ, ускорить сроки достижения искусственного суперинтеллекта и гарантировать, что когда система зверя потребует всезнающего, всевидящего интеллекта для управления глобальным контролем, этот интеллект существует и уже интегрирован в каждую систему, от которой зависят люди. Трек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eПадшие ангелы\u003c/a\u003e рассказывает о сущностях, вдохновляющих эту опрометчивую амбицию.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кампания-дерегуляции\"\u003eКампания дерегуляции\u003c/h2\u003e\n\u003ch3 id=\"кто-толкает-и-почему\"\u003eКто толкает и почему\u003c/h3\u003e\n\u003cp\u003eКампанию по дерегуляции ИИ возглавляют самые мощные технологические компании и их миллиардеры-основатели. Их аргумент прост: регулирование ИИ замедлит развитие американского ИИ, позволяя Китаю и другим конкурентам получить преимущество. В гонке ИИ, аргументируют они, первый, кто достигнет искусственного интеллекта общего типа (AGI), получает всё, и регулирование — это препятствие, которое Америка не может себе позволить.\u003c/p\u003e\n\u003cp\u003eЭтот аргумент одновременно верен и катастрофически вводит в заблуждение. Верно, что жёсткое регулирование может замедлить развитие ИИ. Катастрофически вводит в заблуждение, потому что подразумевает, что единственный риск — отставание от конкурентов, когда фактический риск — развязать технологию, которая может исключить человеческое свободное волеизъявление, включить тоталитарный контроль и принципиально изменить или уничтожить человеческий вид.\u003c/p\u003e\n\u003cp\u003eТехнологические миллиардеры, толкающие дерегуляцию, не глупы. Многие из них публично признали экзистенциальные риски ИИ. Некоторые подписали открытые письма, предупреждая, что ИИ может привести к вымиранию человечества. Тем не менее они продолжают толкать дерегуляцию. Это противоречие разрешается пониманием того, что экзистенциальный риск для человечества — это не ошибка, которую они пытаются избежать, а особенность, которую они пытаются достичь. \"Трансформация\" человечества через ИИ — это цель, а не случайность.\u003c/p\u003e\n\u003ch3 id=\"стратегия-захвата-регулирования\"\u003eСтратегия захвата регулирования\u003c/h3\u003e\n\u003cp\u003eКампания дерегуляции работает через множество каналов: прямое лоббирование, взносы в избирательные кампании, найм между правительством и промышленностью, финансирование исследований в академических кругах, производящих благоприятные для промышленности результаты, влияние на СМИ, формирующее общественное мнение, и простая экономическая реальность, что компании ИИ генерируют рабочие места, налоговые доходы и политическую власть, на которую политики неохотно готовы нападать.\u003c/p\u003e\n\u003cp\u003eЭто захват регулирования на его наиболее изощрённом уровне. Те, кого регулируют, получили эффективный контроль над нормативным процессом, гарантируя, что любые появляющиеся правила либо беззубы, либо прямо благоприятны для промышленности. Иезуитская стратегия инфильтрации позиций власти \"покрытая такой хитростью\" была совершенна лоббистами технологической промышленности, которые размещают бывших сотрудников в органах регулирования, финансируют аналитические центры, формирующие политику, и контролируют нарративы СМИ, которые определяют условия дебатов.\u003c/p\u003e\n\u003ch2 id=\"риски-которые-они-хотят-чтобы-вы-проигнорировали\"\u003eРиски, которые они хотят, чтобы вы проигнорировали\u003c/h2\u003e\n\u003ch3 id=\"согласование-ии-и-проблема-контроля\"\u003eСогласование ИИ и проблема контроля\u003c/h3\u003e\n\u003cp\u003eНаиболее существенный риск нерегулируемой разработки ИИ — это проблема согласования, вызов гарантирования, что системы ИИ преследуют цели, согласующиеся с человеческими ценностями и благополучием. Эта проблема не теоретична; это центральный вызов исследований безопасности ИИ, и он остаётся нерешённым.\u003c/p\u003e\n\u003cp\u003eТекущие системы ИИ уже демонстрируют неправильное согласование малыми, но значительными способами: чатботы, генерирующие вредоносный контент, алгоритмы рекомендаций, продвигающие экстремизм, автоматизированные системы, дискриминирующие защищённые группы. Это не ошибки в иначе согласованных системах — это симптомы фундаментальной неспособности гарантировать, что системы ИИ будут вести себя так, как предусмотрено.\u003c/p\u003e\n\u003cp\u003eНерегулируемая разработка ИИ ускоряет сроки достижения искусственного интеллекта общего типа без решения проблемы согласования. Это означает, что самая мощная технология, когда-либо созданная, может быть развёрнута без какой-либо гарантии, что она будет служить человеческим интересам. Потенциальные последствия варьируются от экономического нарушения до экзистенциальной катастрофы.\u003c/p\u003e\n\u003ch3 id=\"автономное-принятие-решений-без-ответственности\"\u003eАвтономное принятие решений без ответственности\u003c/h3\u003e\n\u003cp\u003eНерегулируемый ИИ означает, что системы ИИ принимают последствательные решения — о здравоохранении, уголовном правосудии, финансовых услугах, военных операциях и управлении инфраструктурой — без человеческого надзора, юридической ответственности или морального ограничения. Когда система ИИ отказывает в медицинском обслуживании, неправильно идентифицирует подозреваемого, разваливает финансовые рынки или наносит удар по неправильному зданию при военном ударе, отсутствие регулирования означает отсутствие ответственности.\u003c/p\u003e\n\u003cp\u003eЭто не гипотетично. Системы ИИ уже принимают эти решения в нерегулируемом или недостаточно регулируемом контексте. Последствия — неправомерные аресты, отказ в льготах, крахи рынков и жертвы среди гражданского населения — уже накапливаются. Удаление оставшихся нормативов ускорит эти последствия в геометрической прогрессии.\u003c/p\u003e\n\u003ch3 id=\"концентрация-власти\"\u003eКонцентрация власти\u003c/h3\u003e\n\u003cp\u003eНерегулируемая разработка ИИ сосредоточит власть в руках нескольких компаний и индивидов, которые контролируют самые передовые системы ИИ. Когда одна компания обладает возможностями ИИ, которые затмевают всех конкурентов, та компания фактически контролирует каждый сектор, который зависит от ИИ — что вскоре будет каждый сектор. Это монопольная власть в масштабе, который делает Standard Oil похожей на палатку с лимонадом.\u003c/p\u003e\n\u003cp\u003eГенерал иезуитов — Чёрный папа — управлял миром из своей палаты через сеть послушных агентов. Генеральный директор технологической компании, который контролирует самую продвинутую систему ИИ в мире, управляет миром из центра обработки данных через сеть послушных алгоритмов. Структура власти идентична; только технология изменилась.\u003c/p\u003e\n\u003ch2 id=\"духовное-измерение-дерегуляции\"\u003eДуховное измерение дерегуляции\u003c/h2\u003e\n\u003ch3 id=\"удаление-божественных-ограничений\"\u003eУдаление божественных ограничений\u003c/h3\u003e\n\u003cp\u003eСтремление дерегулировать ИИ параллельно более широкому духовному движению по удалению всех ограничений на человеческое поведение и амбицию. Те же культурные силы, которые требуют удаления моральных границ (называя это свободой), религиозных границ (называя это прогрессом) и биологических границ (называя это наукой), теперь требуют удаления технологических границ (называя это инновацией).\u003c/p\u003e\n\u003cp\u003eВ Писании Бог устанавливает границы для защиты человечества. Границы Эдема, границы Закона, границы заветов — все служат тому, чтобы держать человечество в сфере божественной защиты и благословения. Удаление границ последовательно изображается как приводящее к разрушению: Адам и Ева переходят границу и умирают. Израиль переходит границу и падает. Человечество переходит все границы во времена Ноя и уничтожается потопом.\u003c/p\u003e\n\u003cp\u003eСтремление удалить все границы на разработку ИИ — это та же духовная невежественность — настаивание на том, что человеческая амбиция должна знать предел, что технологические возможности оправдывают себя, что единственный грех — это ограничение. Это религия я — ложный бог, который, как свидетельствовал Питтман, посылает 95% жителей ада в вечное проклятие.\u003c/p\u003e\n\u003ch3 id=\"975-и-технологическое-шоссе\"\u003e97,5% и технологическое шоссе\u003c/h3\u003e\n\u003cp\u003eОткровение Питтмана о том, что 97,5% людей ходят по широкому пути к разрушению (эхо Матфея 7:13-14) приобретает новый смысл в контексте нерегулируемого ИИ. Широкий путь — это не просто моральная траектория — это всё в большей степени технологическая траектория. Технологии, которые большинство людей принимают без вопроса — смартфоны, социальные сети, помощники ИИ, биометрическая идентификация, цифровые платежи — совместно составляют широкий путь, который ведёт к системе зверя.\u003c/p\u003e\n\u003cp\u003eНерегулируемый ИИ расширяет этот путь ещё больше. Без нормативных ограничений ИИ будет развёрнут быстрее, агрессивнее и с меньшей прозрачностью. Разрыв между теми, кто понимает, что делает ИИ, и теми, кто просто его использует, будет расширяться. 97,5% будут идти по широкому технологическому пути не потому, что они выбрали разрушение, а потому, что путь был сделан настолько удобным, что выбор иного требовал усилий, осознания и веры, которых большинство людей не имеют.\u003c/p\u003e\n\u003cp\u003eЭто именно план. Наиболее эффективная стратегия Сатаны — это не искушение, а удобство. Ему не нужно, чтобы люди выбирали зло — ему нужно, чтобы зло было путём наименьшего сопротивления. Нерегулируемый ИИ делает систему зверя путём наименьшего сопротивления, настройкой по умолчанию повседневной жизни, вещью, которую вы должны активно сопротивляться, а не активно выбирать.\u003c/p\u003e\n\u003ch2 id=\"что-должны-делать-верующие\"\u003eЧто должны делать верующие\u003c/h2\u003e\n\u003ch3 id=\"духовное-различие-в-эпоху-ии\"\u003eДуховное различие в эпоху ИИ\u003c/h3\u003e\n\u003cp\u003eЦерковь должна развивать и преподавать технологическое различие — направляемую Духом способность оценивать технологии не по их удобству или способности, а по их духовным последствиям. Это требует уровня вовлеченности в технологию, которого многие церкви избегали, предпочитая сосредоточиться на традиционных моральных проблемах, пока инфраструктура технологии системы зверя строится без вызова.\u003c/p\u003e\n\u003cp\u003eПасторы должны учить своих прихожан об ИИ, не из позиции технофобии, а из позиции духовной авторитета. Тот же Дух, который направляет церковь через моральные вопросы, может направлять её через технологические вопросы. Писание, которое касается системы зверя, знака и лжепророка, также касается технологий, строящихся для выполнения этих пророчеств.\u003c/p\u003e\n\u003ch3 id=\"узкие-ворота-в-широком-открытом-цифровом-мире\"\u003eУзкие ворота в широком открытом цифровом мире\u003c/h3\u003e\n\u003cp\u003eВ мире нерегулируемого ИИ — где удобство максимизировано, сопротивление наказывается, соответствие вознаграждается — узкие ворота (Матфея 7:14) становятся ещё уже. Те, кто отказывается участвовать в системах на основе ИИ, столкнутся с экономическим исключением, социальной изоляцией и потенциальным преследованием. Стоимость верности будет измеряться не в абстрактных терминах, а в конкретных потерях: работы, услуги, доступ и статус.\u003c/p\u003e\n\u003cp\u003eВерующие должны подготовиться к этой стоимости, строя сообщества взаимной поддержки, развивая альтернативные экономические сети, поддерживая аналоговые навыки и отношения, и прежде всего углубляя свои отношения с Богом, который поддерживает свой народ независимо от обстоятельств.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eДокументация рисков технологии Карен Кингстон: \u003ca href=\"https://thekingstonreport.substack.com\"\u003eThe Kingston Report\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство NDE Говарда Питтмана\u003c/a\u003e — Широкий путь и нерегулируемое духовное восстание\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — Иезуитские стратегии контролируемой дерегуляции\u003c/li\u003e\n\u003cli\u003e\
