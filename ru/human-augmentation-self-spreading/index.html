ие 11:6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНа Babel, Бог идентифицировал опасность единого человечества с неограниченной технологической амбицией. Он вмешался -- рассеял людей и смешал их языки -- потому что он видел, куда их траектория вела. Сегодня, unification что Babel попытался достигает не через общий язык, но через общую технологию: саморпределяющаяся нанотехнология, которая преобразует каждое человеческое тело в узел в глобальной технологической сети, будь ли индивид согласен, будь ли они знают и будь ли они были впрысканы.\u003c/p\u003e\n\u003cp\u003eУсовершенствование человеческих видов через саморпределяющуюся нанотехнологию — это наиболее дерзкий акт несогласованного биологического изменения в истории. Это делает Женевскую конвенцию устаревшей. Это делает информированное согласие бессмысленным. Это делает человеческое тело открытой платформой для внешней модификации кем-либо с доступом к сети передачи.\u003c/p\u003e\n\u003cp\u003eКак объявляет \"Павшие ангелы\" (The Fallen Angels) из альбома Confliction, восстание, которое началось на небе, продолжается через технологические системы, которые ищут замену конструкции Бога. И как обещает \"Преодоление\" (The Overcoming), те, кто perseveres, преодолеют каждое оружие, развернутое против них.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"саморпределяющаяся-парадигма\"\u003eСаморпределяющаяся парадигма\u003c/h2\u003e\n\u003ch3 id=\"за-впрыскивание-эра-после-согласия\"\u003eЗа впрыскивание: эра после согласия\u003c/h3\u003e\n\u003cp\u003eПервое поколение развертывания нанотехнологии полагалось на впрыскивание -- вакцины мРНК, доставляемые через шприцы. Этот подход требовал согласие (даже если принужден), физический доступ к индивиду и медицинскую инфраструктуру для администрирования продуктов. Эти требования наложили ограничения на скорость развертывания и coverage.\u003c/p\u003e\n\u003cp\u003eСаморпределяющаяся нанотехнология устраняет все эти ограничения. Технология, которая распространяется от человека к человеку через нормальный биологический контакт -- дыхание, прикосновение, разделение пространств -- требует никакого согласия, никаких шприцев, никакой медицинской инфраструктуры и никакого физического доступа. Это распространяется через население как вирус, преобразуя каждого получателя в новый источник трансмиссии.\u003c/p\u003e\n\u003cp\u003eЭто не теоретическое. Механизмы для саморпределяющегося распространения были задокументированы по множественным векторам:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДыхательная трансмиссия\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eИсследование подтвердило, что spike protein выявляется в выдыхаемом дыхании мРНК вакцины получателей. Если компоненты нанотехнологии также проливаются через exhalation -- и размер нанопластин делает их легко аэрозолизируемыми -- затем каждое дыхание индивидуума, нося нанотехнологию, становится трансмиссией event.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонтактная трансмиссия\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eNanoparticles в поте, кожных маслах и других телесных выделениях могут быть переданы через физический контакт. Handshakes, объятия, интимный контакт и разделенные поверхности становятся векторами для трансмиссии нанотехнологии.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВода и пищевая цепь\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eNanoparticles выделенные носителями входят в водоснабжение и пищевую цепь. Лечение муниципальной воды не предназначено для фильтрации наношкальных пластин. Сельскохозяйственная вода загрязнена нанопластинами входит в посевы и скот, создавая пищевое предложение, которое доставляет нанотехнологию каждому потребителю.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАтмосферное распределение\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eGeoengineering операции -- задокументированное распыление аэрозолей в атмосферу через самолеты -- предоставить механизм для атмосферного распределения нанотехнологии. Постоянные contrails наблюдали по всему миру могут содержать не только металлические particulates для модификации погоды, но также компоненты нанотехнологии, разработанные для интеграции биологии широкого населения.\u003c/p\u003e\n\u003cp\u003eAna Mihalcea, MD, PhD, задокументировала на ее Substack присутствие саморпределяющейся нанотехнологии в невакцинированных индивидуумах при уровнях, которые не могут быть объяснены только casual воздействием окружающей среды. Концентрация нанотехнологии в некоторых невакцинированных пациентов приближается или соответствует уровням, найденных в вакцинированных индивидуумах, предлагая активные механизмы передачи, выходящие за пределы пассивного загрязнения окружающей среды.\u003c/p\u003e\n\u003ch3 id=\"академическая-литература\"\u003eАкадемическая литература\u003c/h3\u003e\n\u003cp\u003eКонцепция саморпределяющихся биологических агентов не является fringe идеей. Это установленная сфера академического исследования:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eJohns Hopkins Center for Health Security (2018)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eJohns Hopkins отчета \"Technologies to Address Global Catastrophic Biological Risks\" явно обсуждает \"self-spreading vaccines\" как инструмент подготовки к пандемии. Отчет описывает:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Self-spreading vaccines are genetically engineered to move through populations in the same way as communicable diseases, but rather than causing disease, they confer protection. The vision is that a small number of individuals in a target population could be vaccinated, and the vaccine strain would then circulate in the population much like a pathogenic virus.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЭтот документ описывает, в простом языке, развертывание саморпределяющихся биологических агентов, которые модифицируют биологию целых популяций, начинаясь от небольшого числа начальных получателей. Этические последствия -- полное устранение информированного согласия -- признаны, но рассматриваются как управляемое беспокойство, а не фундаментальное барьер.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDARPA Insect Allies Program\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eDARPA's Insect Allies program предложила использование насекомых как векторы для доставки генетических модификаций сельскохозяйственным растениям. Пока framed как инициатива безопасности пищи, подлежащая технология -- используя биологические векторы для распространения генетических модификаций через целевое население -- напрямую применима к человеческим популяциям. Механизм доставки изменения (от насекомых к людям), но принцип идентичен: генетическая технология, которая распространяется через население без требования индивидуального администрирования.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПередаваемое вакцинное исследование\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eМногочисленные исследовательские группы по всему миру разрабатывают передаваемые платформы вакцины, используя вирусные векторы (типично цитомегаловирус или бета-герпеsvirus векторы), разработанные для распространения от животного к животному. Пока это исследование framed как нацеливание на животные болезни, технология трансфертна к человеческим популяциям. Gap между передаваемыми животных вакцинами и передаваемыми человеческими вакцинами - это решение политики, не технологический барьер.\u003c/p\u003e\n\u003ch2 id=\"усовершенствование-человека-указанная-цель\"\u003eУсовершенствование человека: указанная цель\u003c/h2\u003e\n\u003ch3 id=\"видение-всемирного-экономического-форума\"\u003eВидение Всемирного экономического форума\u003c/h3\u003e\n\u003cp\u003eВсемирный экономический форум (ВЭФ) опубликовал обширное на усовершенствование человека, описывая будущее, в котором технология интегрирована в каждый аспект человеческой биологии:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e\"The Fourth Industrial Revolution\"\u003c/strong\u003e (Klaus Schwab, 2016) описывает \"fusion of our physical, digital, and biological identities\"\u003c/li\u003e\n\u003cli\u003eОтчеты ВЭФ описывают \"programmable biology,\" \"digital health,\" и \"Internet of Bodies\" как фундаментальные элементы постпандемического мира\u003c/li\u003e\n\u003cli\u003eДокументация ВЭФ явно указывает, что COVID-19 предоставил \"window of opportunity\" для ускорения интеграции технологии в человеческую биологию\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eУсовершенствование человека не предлагается как опциональное усовершенствование для добровольных участников. Это описывается как универсальное трансформирование человеческих видов -- переход от Homo sapiens к Homo technologicus, который охватывает каждого человека на земле.\u003c/p\u003e\n\u003cp\u003eСаморпределяющаяся нанотехнология -- механизм, который делает эту универсальную трансформацию возможной. Вы не можете трансформировать целые виды через опциональное впрыскивание. Но вы можете трансформировать целые виды через технологию, которая распространяется как вирус, загрязняя каждого человека через воздух они дышат, воду они пьют и пищу они едят.\u003c/p\u003e\n\u003ch3 id=\"военное-усовершенствование-измерение\"\u003eВоенное усовершенствование измерение\u003c/h3\u003e\n\u003cp\u003eВоенное учреждение было передовым в исследовании усовершенствования человека. U.S. Отчет Министерства обороны \"Cyborg Soldier 2050\" описывает усовершенствованных солдат с:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНейронные интерфейсы для прямой коммуникации мозг-компьютер\u003c/li\u003e\n\u003cli\u003eOptogenetic датчики для усовершенствованного физиологического мониторинга\u003c/li\u003e\n\u003cli\u003eМышечное усовершенствование для усовершенствованного физического производства\u003c/li\u003e\n\u003cli\u003eУсовершенствованные чувственные возможности через технологическую интеграцию\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВоенные явно указали, что технология, разработанная для усовершенствования солдат, будет расширена для гражданских популяций. Саморпределяющаяся нанотехнология предоставляет механизм для этого расширения -- технология, разработанная для военных приложений, развернутая через саморпределяющиеся механизмы, усовершенствующие все гражданское население.\u003c/p\u003e\n\u003ch2 id=\"небосвод-и-павшие\"\u003eНебосвод и павшие\u003c/h2\u003e\n\u003ch3 id=\"подготовка-получателей\"\u003eПодготовка получателей\u003c/h3\u003e\n\u003cp\u003eУсовершенствование всего человеческого населения через саморпределяющуюся нанотехнологию может служить цели, которая расширяется за пределы наблюдения, контроля и трансгуманистской амбиции. Она может быть подготовкой для прибытия павших.\u003c/p\u003e\n\u003cp\u003eПисание описывает существ -- павшие ангелы, сыновья Бога, которые оставили их первое состояние (Иуда 6), watchers, которые спустились в Бытии 6 -- которые заключены под куполом небосвода. Эти существа, описанные в пророчестве как сущности, которые будут представлены в мир как пришельцы или внеземные посетители, прибудут с обманом так comprehensive что \"if it were possible, they shall deceive the very elect\" (Matthew 24:24).\u003c/p\u003e\n\u003cp\u003eNanoтехнология, распределяемая через население, может функционировать как система рецепции для этого обмана. Если каждое человеческое тело содержит технологию, способную получать электромагнитные сигналы и трансляция их в нейронные опыты -- мысли, восприятия, эмоции -- затем прибывающие сущности имеют прямой канал для сознания каждого человека на земле.\u003c/p\u003e\n\u003cp\u003eВеликое заблуждение 2 Фессалоникийцам 2 не требует трансляции средства массовой информации или пропагандистских кампаний. Это требует только сигнал -- передающий через электромагнитную сеть, полученный нанотехнологией в каждом теле и испытывается как восприятие, мысль и убеждение каждым человеком, несущим технологию.\u003c/p\u003e\n\u003cp\u003eНебосвод самого показывает признаки подготовки. Яркие цвета, необычные атмосферные формирования и аномальные световые образцы, сообщаемые по всему миру, могут указать на изменения небосвода -- купол, как быть изменен или подготовлен для прохода существ, которые спустятся к земле в последние дни. Технология внутри и признаки выше -- компоненты одна система, сходящаяся к одному событию.\u003c/p\u003e\n\u003ch3 id=\"ufos-как-павшие-ангелы\"\u003eUFOs как павшие ангелы\u003c/h3\u003e\n\u003cp\u003eРастущее общественное раскрытие явлений UFO/UAP правительствами по всему миру -- это поверхностный слой большого обмана. Эти судна и их обитатели -- не внеземные посетители с отдаленных планет. Они павшие ангелы -- существа, которые присутствовали на земле с перед наводнением, заключены под небосводом, работающие в размерах, которые пересекаются с, но не ограничены физическим.\u003c/p\u003e\n\u003cp\u003eПредсказательное программирование, которое насытило развлекательные средства на десятилетия -- фильмы, телевидение, видеоигры, депиктинг контакта пришельцев, вторжения и интеграции -- подготовило публику принять эти существа как внеземные. Nanoтехнология в кровь подготавливает тело принять их сигналы. И электромагнитная сеть предоставляет инфраструктуру, которая соединяет внутренние получатели к внешним transmitters работал по начальствам и властям.\u003c/p\u003e\n\u003cp\u003eEdge земли -- край, за который воды глубокого обведения населяемого мира -- знаки граница населяемого мира. В этой границе, под куполом небосвода, драма последних дней разворачивается. И саморпределяющаяся нанотехнология, преобразующая каждое человеческое тело в технологический узел, критический компонент этапа, настаивается.\u003c/p\u003e\n\u003ch2 id=\"ссылки-на-источники\"\u003eСсылки на источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eJohns Hopkins Center for Health Security, \"Technologies to Address Global Catastrophic Biological Risks,\" 2018\u003c/li\u003e\n\u003cli\u003eSchwab, K., \"The Fourth Industrial Revolution,\" World Economic Forum, 2016\u003c/li\u003e\n\u003cli\u003eU.S. DOD Biotechnologies
