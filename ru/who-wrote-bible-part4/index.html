сказали, что Библия — это Слово Бога — вдохновённое, безошибочное и авторитетное. Вам не сказали, кто действительно писал это, когда они писали это, почему они писали это, или кто решил, какие тексты будут включены, а какие исключены. Это не незначительные детали. Они — основание, на котором покоится ваша вся вера — или рушится.\u003c/p\u003e\n\u003cp\u003eВидение Говарда Питтмана его OBE раскрыло, что духовная сфера функционирует на истине, а не на традиции. 97,5 процента христиан, отвергнутых при смерти, доверяли версии истины учреждения, а не ищут истину сами. Питтман узнал, что 95 процентов служат \"себе\" и что каждое слово несёт духовный вес (Матфей 12:36-37). Если слова Библии были написаны, отредактированы и отобраны мужчинами с институциональными повестками дня, духовный вес этих слов зависит от того, передают ли они подлинную истину или институциональное изобретение.\u003c/p\u003e\n\u003cp\u003eИезуиты — военная организация Лойолы \"абсолютной власти\" (Наполеон), \"вечного проклятия\" (Адамс), глобального управления (Тамбулини) — были наиболее агрессивными привратниками Библии. \u003cem\u003eКатолическое конфиденциально\u003c/em\u003e раскрывает их инфильтрирование \"замаскированное хитростью\", слепое послушание и \"любые виды порока\". Эти люди определили, что вы читаете, когда открываете вашу Библию. Климент XIV был отравлен за пересечение их. Какой шанс был у текста?\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/35-The_Tree_of_Life.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eДерево жизни — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/23-The_Sun_and_the_Moon.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eСолнце и луна — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"традиционные-претензии\"\u003eТрадиционные претензии\u003c/h2\u003e\n\u003ch3 id=\"что-учреждение-преподает\"\u003eЧто учреждение преподает\u003c/h3\u003e\n\u003cp\u003eТрадиционное преподавание просто: Моисей написал первые пять книг (Пятикнижие). Давид написал Псалмы. Соломон писал Притчи, Экклезиаст и Песня Песней. Пророки писали пророческие книги. Матфей, Марк, Лука и Иоанн писали Евангелия, носящие их имена. Павел написал тринадцать посланий. И всё это было \"вдохновлено\" Богом — человеческие авторы были сосудами, через которые божественная истина текла.\u003c/p\u003e\n\u003cp\u003eЭто преподавание удобно для учреждения. Это размещает власть Библии за пределы вопроса — если Бог написал это, кто ты такой, чтобы сомневаться в этом? Это также даёт учреждению исключительное право толковать это — если текст божественный, только обученное духовенство может правильно его понимать.\u003c/p\u003e\n\u003cp\u003eОба претензия служат институциональной власти. Оба должны быть исследованы.\u003c/p\u003e\n\u003ch3 id=\"что-раскрывает-стипендия\"\u003eЧто раскрывает стипендия\u003c/h3\u003e\n\u003cp\u003eСовременная библейская стипендия — не атеистические полемики, но основное академическое исследование, большая часть которого проводится верующими христианами — продемонстрировала, что традиционные претензии авторства в значительной степени неподдержанны.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Pentateuch\u003c/strong\u003e: Моисей не писал первые пять книг Библии. Документная гипотеза, разработанная в течение двух столетий стипендии, определяет по крайней мере четыре отдельных исходных документа (J, E, D и P), переплетённых вместе более поздними редакторами. Эти источники датируются приблизительно 950 BCE к 500 BCE — сотни лет отдельно. Окончательное редактирование произошло после вавилонского изгнания, по крайней мере 800 лет после того, как Моисей якобы жил.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gospels\u003c/strong\u003e: четыре Евангелия безымянны. Имена Матфей, Марк, Лука и Иоанн были назначены им во втором столетии. Никакие из Евангелий не определяют их авторов внутренне. Древнейшее Евангелие, Марк, было написано приблизительно 70 AD — 40 лет после Иисуса — кем-то, кто не был очевидцем. Матфей и Лука скопировали экстенсивно от Марка и от другого потерянного источника, вызванного \"Q.\" Иоанн был написан последним и отличается драматически от других трёх.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПавловские письма\u003c/strong\u003e: из тринадцати писем, приписанных Павлу, основная стипендия рассматривает только семь как подлинно Павловские (Римлянам, 1 и 2 Коринфяне, Галатам, Филипияне, 1 Фессалоникийцам и Филимону). Оставшихся шесть рассматриваются как pseudepigraphical — написанные более поздними авторами, используя имя Павла, общую практику в древнем мире.\u003c/p\u003e\n\u003cp\u003eИсследование Substack агента131711 (agent131711.substack.com) документирует, как эти находки стипендии были систематически подавлены от генерального христианского выхода. Семинарии преподают их для пасторов, которые затем выбирают не делиться ими с прихожанами. Результат — огромный информационный промежуток между тем, что духовенство знает и что верующие люди верят.\u003c/p\u003e\n\u003ch2 id=\"процесс-редактирования\"\u003eПроцесс редактирования\u003c/h2\u003e\n\u003ch3 id=\"писцы-и-изменения\"\u003eПисцы и изменения\u003c/h3\u003e\n\u003cp\u003eБиблия была передана рукой копирования в течение более чем тысячи лет перед печатным станком. В течение этого периода писцы вводили тысячи изменений — некоторые случайные, некоторые преднамеренные. Исследование Барта Эрмана задокументировало более чем 400,000 текстовых вариантов среди существующих рукописей Нового завета. Большинство несущественны (ошибки правописания, порядок слов), но некоторые существенны:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Johannine Comma (1 Иоанн 5:7-8)\u003c/strong\u003e: явное высказывание троичного \"Ибо трое свидетельствуют на небесах: Отец, Слово и Святой Дух, и эти три суть одно\" не появляются в любой греческой рукописи перед 16-м столетием. Это было добавлено писцами для поддержки учения о троице. Современные переводы удаляют это, но версия король Джеймса — используемая миллионами — всё ещё включает это.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЖенщина, захвачена в прелюбодеянии (Иоанн 7:53-8:11)\u003c/strong\u003e: эта знаменитая история не в древнейших рукописях Иоанна. Это было добавлено писцами, вероятно, в 5-м столетии. Это прекрасная история, но она не была частью оригинального текста.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMark's Ending (Марк 16:9-20)\u003c/strong\u003e: как обсуждается в части 3, оригинальный конец Марка останавливается на 16:8. Явления воскресения в Марке были добавлены более поздними писцами, которые были неудобны с оригинальным внезапным концом.\u003c/p\u003e\n\u003cp\u003eЭто не оспариваемые точки. Они — консенсус текстовой стипендии, подтверждённой исследованием древнейших рукописей. Библия, которую вы держите, была отредактирована человеческими руками в течение столетий, и некоторые из тех редактирований изменили теологическое содержание текста.\u003c/p\u003e\n\u003ch3 id=\"the-jesuit-vulgate\"\u003eThe Jesuit Vulgate\u003c/h3\u003e\n\u003cp\u003eОфициальная Библия католической церкви в течение более чем тысячелетия была латинская Vulgate, переведённая Jerome в позднее 4-е столетие. Jerome сам заметил сложности перевода и редактирования выбора в его письмах. Vulgate стала стандартом посредством институциональной власти, а не посредством доказанной точности.\u003c/p\u003e\n\u003cp\u003eИезуиты, после Реформации, чемпионовали Vulgate против протестантских переводов. Совет Trent (1546), интенсивно повлиян иезуитами, объявил Vulgate, чтобы быть \"подлинным\" — означающий это была авторитетная версия для доктрины и практики. Это был политический решение, а не учёный. Это гарантировало, что католическая церковь контролировала текст писания и, через неё, верования верных.\u003c/p\u003e\n\u003cp\u003eКогда более поздние стипендия продемонстрировала, что Vulgate содержал ошибки — неправильные переводы, добавления, пропуски — учреждение сопротивлялось корректировке. Истина текста была менее важна, чем власть учреждения, которое контролировало его. Это иезуитский метод, задокументированный в \u003cem\u003eКатолическое конфиденциально\u003c/em\u003e: слепое послушание к институциональной власти, независимо от доказательств.\u003c/p\u003e\n\u003ch2 id=\"канон-кто-решал\"\u003eКанон: кто решал?\u003c/h2\u003e\n\u003ch3 id=\"процесс-выбора\"\u003eПроцесс выбора\u003c/h3\u003e\n\u003cp\u003eКанон Нового завета — 27 книг, которые составляют христианскую Библию — не был установлен Иисусом, апостолами или божественным постановлением. Это была установлено серией церковных советов в течение нескольких столетий, посредством дебата, переговоров и политического давления.\u003c/p\u003e\n\u003cp\u003eПервый список, совпадающий с современным 27-книжным Новым заветом, появляется в пасхальном письме Афанасия 367 AD — более чем 300 лет после Иисуса. Советы Hippo (393 AD) и Carthage (397 AD) ратифицировали этот выбор. Но процесс был contentious. Книги, которые некоторые сообщества рассматривали как писание — Shepherd of Hermas, Didache, Epistle of Barnabas, 1 Clement — были исключены. Книги, которые некоторые сообщества отклонили — Revelation, 2 Peter, Jude, 2 и 3 Иоанн — были включены.\u003c/p\u003e\n\u003cp\u003eКритерия для включения не были четко определены. Общие руководства включали apostolic происхождение, orthodoxy, широко распространённое использование и edification. Но эти критерия были применены inconsistently: Hebrews была включена несмотря на неопределённое авторство; Revelation была включена несмотря на широко распространённую раннюю оппозицию; 2 Peter была включена несмотря на near-universal учёное соглашение, что это pseudepigraphical.\u003c/p\u003e\n\u003ch3 id=\"политическое-не-божественное\"\u003eполитическое, не божественное\u003c/h3\u003e\n\u003cp\u003eКанон был собран мужчинами с политическими повестками дня. Constantine, кто convened Совет Nicaea в 325 AD, не был теологом — он был императором, ищущим унифицировать его империю под одной религией. Епископы, которые посетили эти советы, были политиками столько же как пасторы, борясь за влияние, защищая предпочтённые тексты их сообществ и подделывая компромиссы.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показан, что духовная сфера функционирует на истине, а не на институциональном компромиссе. Если канон был собран посредством политических переговоров, он может содержать истину — но его власть покоится на человеческом решении, не божественной команде. Учреждение потратило столетия papering над этим фактом, представляя канон как divinely guidedly в то время как suppressing грязный, политический реальность его создания.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые пришли позже, унаследовали этот канон и защищали его с их характерной ferocity. Любой вызов канону был вызовом институциональной власти, и институциональная власть была основным продуктом иезуитов. Их университеты, их семинарии, их издательские дома — всё служит поддерживать канон как un-questionable основание, несмотря на исторические доказательства, что его создание было полностью человеческим.\u003c/p\u003e\n\u003ch2 id=\"потерянные-книги\"\u003eПотерянные книги\u003c/h2\u003e\n\u003ch3 id=\"что-было-исключено\"\u003eЧто было исключено\u003c/h3\u003e\n\u003cp\u003eТексты исключены из канона столь же раскрывающи как тексты включены. Nag Hammadi библиотека, открытая в Egypte в 1945 году, содержит десятки ранних христианских текстов, которые были систематически подавлены институциональной церковью:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gospel of Thomas\u003c/strong\u003e: собрание 114 высказываний, приписанных Иисусу, подчеркивающее прямое знание Бога, а не институциональное mediation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gospel of Philip\u003c/strong\u003e: исследует концепцию священного брака и духовной трансформации способами, которые вызывают orthodoxy.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Gospel of Truth\u003c/strong\u003e: текст Valentinian, представляющий радикально другое понимание создания, падения и спасения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Apocryphon of John\u003c/strong\u003e: детальный cosmological текст, описывающий происхождение материального мира как продукт fallen deity.\u003c/p\u003e\n\u003cp\u003eЭти тексты не были отвергнуты, потому что они были доказаны ложными. Они были отвергнуты, потому что они подорвали институциональную власть. Gospel of Thomas, например, требует никакой церкви, никакого священника, никакого таинства — только individual's прямой encounter с истиной. Это невыносимо для учреждения, которое выводит свою власть из будучи необходимым intermediary между Богом и человечеством.\u003c/p\u003e\n\u003cp\u003eИсследование Substack агента131711 отслеживает подавление этих текстов к той же институциональной логике, которая управляет иезуитами: контролируют повествование, контролируют популяцию. Определяя что является и не является \"писанием,\" учреждение определяет что является и не является возможно для Бога сказать. Это ultimate власть — власть положить слова в рот Бога и silences любой текст, который противоречит тем словам.\u003c/p\u003e\n\u003ch2 id=\"последствия-для-веры\"\u003eПоследствия для веры\u003c/h2\u003e\n\u003ch3 id=\"библия-не-является-тем-что-вам-сказали\"\u003eБиблия не является тем, что вам сказали\u003c/h3\u003e\n\u003cp\u003eЭто не означает, что Библия бесполезна. Многие из её текстов передают глубокую духовную истину. Но это означает, что Библия не является тем, что учреждение рассказало вам — единое, unified, divinely authored документ, которое упало с неба intact.\u003c/p\u003e\n\u003cp\u003eЭто собрание текстов, написанных множественных авторов в течение столетий, отредактированного писцами, выбранного советами, защищённого учреждениями и переданного через процесс, который вводил тысячи изменений. Это содержит подлинную мудрость рядом с политической теологией, подлинное духовное внимание рядом с институциональной пропагандой.\u003c/p\u003e\n\u003cp\u003eЧестный читатель признаёт всё это и читает accordingly: тестирование всего, держась за что хорошо, и отвергая поднять человеческие институциональные решения к уровню божественной команды.\u003c/p\u003e\n\u003ch3 id=\"что-опыт-pittman-говорит-нам\"\u003eЧто опыт Pittman говорит нам\u003c/h3\u003e\n\u003cp\u003eВидение Говарда Питтмана OBE подтверждает, что духовная реальность существует и что большинство христиан обманываются. Обман не обязательно в самом тексте, но в рамке учреждение построило вокруг текста — рамка, которая говорит \"не ставить под сомнение,\" \"не исследовать,\" \"доверять учреждению.\"\u003c/p\u003e\n\u003cp\u003eБиблия командует opposite: доказывают все вещи. Ищите писания ежедневно. Тестируйте духов. Учреждение, построенное на Библии, противоречит Библии. Этот парадокс — ключ к пониманию всей системы — и к прерыванию её.\u003c/p\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может находиться в подвале Ватикана может шокировать вас!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSubstack агента131711\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — исследование авторства Библии, формирования канона и подавленных текстов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВидение ОБЕ Говарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСмотрите на YouTube\u003c/a\u003e — духовная реальность против институциональной религии\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКатолическое конфиденциально: раскрытые позорные иезуитские тайны\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eСмотрите на YouTube\u003c/a\u003e — иезуитский контроль писания и теологического повествования\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/35-The_Tree_of_Life.mp4\"\u003eДерево жизни\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/23-The_Sun_and_the_Moon.mp4\"\u003eСолнце и луна\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/15-From_Dust_to_Glory.mp4\"\u003eFrom Dust to Glory\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/83-Ancient_Documents.mp4\"\u003eДревние документы\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily
