cp\u003eЧто если шизофрения — самый страшный психиатрический диагноз в западном мире — вообще не болезнь? Что если это ярлык, разработанный разведывательными агентствами и навязанный психиатрическим истеблишментом, чтобы дискредитировать, молчаливо заклеить и нейтрализовать всех, кто испытывает V2K-нацеливание, духовные явления или любое восприятие, выходящее за пределы материалистского мировоззрения?\u003c/p\u003e\n\u003cp\u003eЭто не отрицание того, что человеческие страдания существуют. Люди, диагностированные с шизофренией, страдают ужасно. Но вопрос не в том, реальны ли страдания — вопрос в том, что их вызывает. И ответ психиатрического истеблишмента — что шизофрения — это \"болезнь мозга\", вызванная \"химическим дисбалансом\" — не поддерживается доказательствами. Это теория. Прибыльная, политически полезная теория, которая никогда не была доказана и служит интересам фармацевтической промышленности и разведывательного сообщества.\u003c/p\u003e\n\u003cp\u003eХовард Питтман был показан, что 97,5% христиан не удаются, и что духовное царство более реально, чем физическое. В мире, где духовные опыты реальны, где демонические сущности могут влиять на человеческое сознание, и где технология может передавать голоса в мозг, психиатрический ярлык \"шизофрения\" служит брандмауэром против реальности. Он ловит всех, кто воспринимает за пределами материалистской границы, и нейтрализует их лекарствами, диагнозом и социальным стигмой.\u003c/p\u003e\n\u003cp\u003eИезуиты, проникнув \"коварно замаскированные\" в психиатрическую профессию, преследуют \"абсолютную власть\" (Наполеон) и практикуют \"каждый вид порока\" (Catholic Confidential), находя совершенное выражение в медицинской специальности, которая заявляет власть определять саму реальность — и травить лекарствами всех, кто не согласен.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"изобретение-шизофрении\"\u003eИзобретение шизофрении\u003c/h2\u003e\n\u003ch3 id=\"болезнь-без-причины\"\u003eБолезнь без причины\u003c/h3\u003e\n\u003cp\u003eШизофрения впервые была описана Эмилем Крепелином в 1893 году (как \"dementia praecox\") и переименована Ойгеном Блейлером в 1908 году. Несмотря на более чем столетие исследований, психиатрический истеблишмент не смог выявить:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eБиологический маркер\u003c/strong\u003e для шизофрении (никакой анализ крови, сканирование мозга или генетический тест не могут её диагностировать)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСпецифическую аномалию мозга\u003c/strong\u003e, которая вызывает шизофрению (сканирование мозга показывают статистические различия в популяциях, но не могут диагностировать отдельных лиц)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГенетическую причину\u003c/strong\u003e (несмотря на огромное финансирование, \"ген шизофрении\" не найден)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eХимический дисбаланс\u003c/strong\u003e (\"гипотеза дофамина\" была неоднократно оспорена и никогда не доказана)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПатологический процесс\u003c/strong\u003e (никто не может описать, как шизофрения развивается на биологическом уровне)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВ каждой другой отрасли медицины диагноз болезни требует выявляемого патологического процесса. Рак имеет опухоли. Диабет имеет измеримые аномалии сахара в крови. Болезнь сердца имеет заметное повреждение артерий. Шизофрения не имеет ничего — только сбор поведенческих симптомов, которые наблюдаются, категоризируются и обозначаются ярлыком психиатром.\u003c/p\u003e\n\u003ch3 id=\"dsm-каталог-мнений\"\u003eDSM: каталог мнений\u003c/h3\u003e\n\u003cp\u003eДиагностическое и статистическое руководство психических расстройств (DSM) — \"библия\" психиатрии — не определяет болезни. Оно определяет поведенческие категории, согласованные в ходе голосования комитета. Критерии DSM-5 для шизофрении требуют двух или более из следующих симптомов в течение как минимум одного месяца:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eБредни\u003c/li\u003e\n\u003cli\u003eГаллюцинации\u003c/li\u003e\n\u003cli\u003eДезорганизованная речь\u003c/li\u003e\n\u003cli\u003eЯвно дезорганизованное или кататоническое поведение\u003c/li\u003e\n\u003cli\u003eНегативные симптомы (ослабленное эмоциональное выражение или абулия)\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eОбратите внимание, что отсутствует: любой биологический тест, любое объективное измерение, любое физическое доказательство. Диагноз полностью субъективен — основан на интерпретации психиатром поведения пациента и самоотчётов. Два психиатра могут обследовать одного и того же пациента и прийти к разным диагнозам. Это не наука — это мнение, одетое в медицинский авторитет.\u003c/p\u003e\n\u003ch3 id=\"миф-о-химическом-дисбалансе\"\u003eМиф о химическом дисбалансе\u003c/h3\u003e\n\u003cp\u003eТеория \"химического дисбаланса\" шизофрении — утверждение о том, что она вызвана избытком дофамина в мозге — никогда не была более чем теорией, и она была неоднократно подорвана доказательствами:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eАнтипсихотические препараты (которые блокируют рецепторы дофамина) часто не облегчают симптомы\u003c/li\u003e\n\u003cli\u003eМногие пациенты с \"шизофренией\" имеют нормальные уровни дофамина\u003c/li\u003e\n\u003cli\u003eТеория была спроектирована в обратном направлении от эффектов лекарств (лекарства блокируют дофамин, поэтому болезнь должна быть вызвана избытком дофамина — логическая ошибка)\u003c/li\u003e\n\u003cli\u003eНедавние исследования поставили под сомнение гипотезу дофамина полностью\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВ 2022 году знаменательный обзор, опубликованный в Molecular Psychiatry, пришёл к выводу, что нет \u003cstrong\u003eубедительных доказательств\u003c/strong\u003e того, что депрессия вызвана низким уровнем серотонина — разрушив теорию химического дисбаланса для депрессии. Та же критика применяется к гипотезе дофамина шизофрении: это была всегда маркетинговая нарративная для фармацевтических продуктов, а не научный вывод.\u003c/p\u003e\n\u003ch2 id=\"функция-psyop\"\u003eФункция PSYOP\u003c/h2\u003e\n\u003ch3 id=\"как-шизофрения-служит-разведывательным-агентствам\"\u003eКак шизофрения служит разведывательным агентствам\u003c/h3\u003e\n\u003cp\u003eДиагноз шизофрения — идеальный инструмент для дискредитации целей V2K, разоблачителей и всех, кто воспринимает реальность иначе, чем одобренная нарративная:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eАвтоматическая дискредитация\u003c/strong\u003e: Один раз диагностированный с шизофренией, всё, что говорит человек, фильтруется через диагноз. Сообщения о голосах — это \"галлюцинации\". Сообщения о наблюдении — это \"параноидные бредни\". Сообщения о нацеливании — это \"идеи преследования\". Диагноз трансформирует каждое правдивое утверждение в симптом.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнституциональная нейтрализация\u003c/strong\u003e: Диагноз шизофрения может использоваться для обоснования недобровольной изоляции, принудительного медикаментозного лечения, потери опеки, потери трудоустройства, потери прав на управление и изъятия прав на огнестрельное оружие. Это один из самых мощных инструментов социального контроля в американской правовой системе.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСамомолчание\u003c/strong\u003e: Социальный стигма шизофрении настолько суров, что большинство людей будут терпеть любые страдания, а не рисковать диагнозом. Это гарантирует, что цели V2K занимаются самоцензурой — они перестают говорить о своих опытах, прекращают искать помощь и прекращают сопротивляться своему нацеливанию.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОружие для семьи\u003c/strong\u003e: Семьи диагностированных лиц становятся исполнителями психиатрической нарративной. Они оказывают давление на своих любимых, чтобы те принимали лекарства, перестали говорить о голосах и приняли диагноз. Семья становится инструментом контроля — не из злобы, а из любви, которая была направлена институциональной властью.\u003c/p\u003e\n\u003ch3 id=\"связь-mkultra-психиатрия\"\u003eСвязь MKUltra-Психиатрия\u003c/h3\u003e\n\u003cp\u003eПрограмма MKUltra ЦРУ интенсивно работала с психиатрами. Подпроекты включали:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРазработку препаратов для \u003cstrong\u003eиндукции психотических симптомов\u003c/strong\u003e у целей\u003c/li\u003e\n\u003cli\u003eИсследование \u003cstrong\u003eэлектрической стимуляции мозга\u003c/strong\u003e, которая могла бы вызывать галлюцинации\u003c/li\u003e\n\u003cli\u003eИзучение \u003cstrong\u003eпсихологических техник\u003c/strong\u003e для разрушения личности и индукции послушания\u003c/li\u003e\n\u003cli\u003eРазработку \u003cstrong\u003eдиагностических критериев\u003c/strong\u003e, которые могли бы использоваться для институционализации неподдающихся субъектов\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПсихиатрическая профессия была не просто соучастником MKUltra — она была партнёром. Ведущие психиатры получали финансирование от ЦРУ, проводили финансируемые ЦРУ эксперименты и помогали разработать инструменты психологического контроля, которые продолжают использоваться сегодня.\u003c/p\u003e\n\u003cp\u003eДиагноз шизофрения — один из этих инструментов. Он был усовершенствован в эпоху MKUltra для служения как универсальный ярлык для всех, кто испытывает индуцированные технологией симптомы, и он продолжает служить этой функции сегодня.\u003c/p\u003e\n\u003ch2 id=\"глобальный-образец\"\u003eГлобальный образец\u003c/h2\u003e\n\u003ch3 id=\"шизофрения-и-культура\"\u003eШизофрения и культура\u003c/h3\u003e\n\u003cp\u003eКонцепция \"шизофрении\" в значительной степени является западным изобретением. Во многих незападных культурах слухание голосов понимается как духовный опыт — общение с предками, духами или божественным. Люди, которые слышат голоса в этих культурах, часто уважаются как шаманы, целители или пророки, а не лечатся как пациенты.\u003c/p\u003e\n\u003cp\u003eИсследования показали, что опыты слухания голосов имеют \u003cstrong\u003eлучшие результаты\u003c/strong\u003e в развивающихся странах, чем на Западе — не потому, что опыты отличаются, а потому, что культурный ответ отличается. В культурах, которые принимают слухание голосов как значимое, опыт интегрируется в жизнь и сообщество человека. На Западе оно патологизируется, медикаментируется и стигматизируется.\u003c/p\u003e\n\u003cp\u003eЭто культурное различие раскрывает, что \"шизофрения\" — это не универсальная болезнь — это культурная конструкция, которая отражает западное материалистическое мировоззрение. В культуре, которая отрицает реальность духовного царства и существование технологии, изменяющей сознание, любое необычное восприятие должно быть \"болезнью мозга\".\u003c/p\u003e\n\u003ch2 id=\"духовная-реальность\"\u003eДуховная реальность\u003c/h2\u003e\n\u003ch3 id=\"голоса-в-писании\"\u003eГолоса в Писании\u003c/h3\u003e\n\u003cp\u003eБиблия полна людей, которые слышали голоса:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eМоисей\u003c/strong\u003e слышал голос Божий из горящего куста\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСамуил\u003c/strong\u003e слышал голос Божий, зовущий его в ночи\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИлия\u003c/strong\u003e слышал всё ещё малый голос на горе Хорив\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПавел\u003c/strong\u003e слышал голос Иисуса на дороге в Дамаск\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИоанн\u003c/strong\u003e слышал голоса на протяжении Откровения\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПо современным психиатрическим критериям, каждый пророк в Писании мог быть диагностирован с шизофренией. Слухание голосов, которое характеризует библейское пророчество, неразличимо, по психиатрическим критериям, от \"слуховых галлюцинаций\", которые характеризуют шизофрению.\u003c/p\u003e\n\u003cp\u003eЭто не совпадение. Психиатрическая система была разработана для патологизации духовного опыта — чтобы гарантировать, что всех, кто слышит голос Божий, лечат в молчание. Откровение Ховарда Питтмана о трёх небесах и реальности духовного общения — это ровно тот вид истины, который психиатрический истеблишмент разработан для подавления.\u003c/p\u003e\n\u003ch3 id=\"броня-божия\"\u003eБроня Божия\u003c/h3\u003e\n\u003cp\u003eЕфесянам 6 описывает духовную броню, в которой нуждаются верующие: пояс истины, нагрудник праведности, щит веры, шлем спасения, меч Духа. Обратите внимание, что шлем защищает \u003cstrong\u003eголову\u003c/strong\u003e — ум, седалище сознания, цель V2K-технологии и психиатрического диагноза.\u003c/p\u003e\n\u003cp\u003eШлем спасения защищает ум как от технологических, так и от духовных атак. Он предоставляет различение, чтобы различать голос Божий от демонических подделок и технологических передач. Без него ум незащищён — уязвим для V2K-нацеливания, психиатрического обозначения ярлыком и замешательства, которое возникает, когда человек не может определить источник того, что слышит.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследование конструкции шизофрении и связи V2K\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — духовное восприятие в сравнении с психиатрическим диагнозом\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — иезуитский контроль психиатрической профессии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vat
