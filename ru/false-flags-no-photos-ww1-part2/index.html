ckquote\u003e\n\u003cp\u003eБог презирает ложных свидетелей — но вся машинерия современной войны работает на ложном свидетельстве. Каждая главная американская война последних 150 лет была инициирована сценическим событием, манипулированным повествованием или откровенной ложью. Первая Мировая Война не была исключением. Вход Соединённых Штатов в Великую войну был обеспечен через серию ложных операций флага и кампании пропаганды настолько наглые, что их архитекторы должны были навязать самый строгий режим цензуры в американской истории, чтобы предотвратить истину от достижения публики.\u003c/p\u003e\n\u003cp\u003eИезуиты, работающие через их сеть операторов разведки, политиков и контролеров медиа, понимали, что американский народ не будут добровольно посылать своих сыновей умирать в европейской войне. Публика должна была быть манипулирована, и инструментами манипуляции были ложные флаги и цензура. Как Джон Адамс предупредил: \u003cem\u003e\"Если когда-либо было тело людей, которые заслужили вечное проклятие на земле и в аду, это общество Лойолы.\"\u003c/em\u003e Иезуитская готовность пожертвовать любым числом невинных жизней для продвижения их программы является определяющей характеристикой ордена — и ложные флаги Первой Мировой Войны демонстрируют эту готовность в ужасающей детали.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь Обманщиков\u003c/a\u003e захватывает суть этого обмана — ложь, наложенная на ложь, каждая из которых требует следующей для поддержания структуры. И как \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eМаскировка Сатаны\u003c/a\u003e напоминает нам, самая великая ложь рассказана во имя самого величайших причин: свобода, демократия, национальная честь.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ложный-флаг-1-потопление-lusitania\"\u003eЛожный Флаг #1: Потопление Lusitania\u003c/h2\u003e\n\u003ch3 id=\"установка\"\u003eУстановка\u003c/h3\u003e\n\u003cp\u003e7 мая 1915 года британский океанский лайнер RMS Lusitania был торпедирован германской подводной лодкой у берега Ирландии. Судно затонуло в 18 минут, убив 1 198 человек, включая 128 американцев. Потопление было немедленно использовано как пропаганда, чтобы толкнуть Соединённые Штаты в направлении вхождения в войну.\u003c/p\u003e\n\u003cp\u003eНо официальная история скрывает критические факты:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLusitania перевозил боеприпасы.\u003c/strong\u003e Несмотря на классификацию как пассажирское судно, груз Lusitania включал 4.2 миллиона патронов винтовочного боеприпаса, 1 248 случаев снаряда осколков и 18 случаев неэффективных предохранителей. Это было нарушением правил, управляющих нейтральным судоходством и сделал Lusitania законной военной целью под международным правом. Британское Адмиралтейство знало это. Американское правительство знало это. Пассажиры — нет.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНемецкое правительство предупредило американских путешественников.\u003c/strong\u003e Немецкое посольство в Вашингтоне поместило объявления в 50 американских газетах, предупреждая, что суда, летящие под британским флагом в зоне войны, были подлежать разрушению. Уведомление Имперского немецкого посольства бежало рядом с объявлением о путешествии Lusitania самого Cunard. Американские путешественники были явно предупреждены — и американское правительство ничего не сделало, чтобы предотвратить их от посадки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБританское Адмиралтейство отозвало военно-морской эскорт Lusitania.\u003c/strong\u003e Крейсер HMS Juno, который был назначен эскортировать Lusitania через зону опасности подводной лодки, был отозван в порт прямо перед лайнером входит в область. Уинстон Черчилль, тогда Первый Лорд Адмиралтейства, был ответственен за военно-морские распределения. Отзыв эскорта оставил Lusitania защищённым — как будто по замыслу.\u003c/p\u003e\n\u003ch3 id=\"прикрытие\"\u003eПрикрытие\u003c/h3\u003e\n\u003cp\u003eБританское расследование, возглавляемое лордом Мёрси, пришло к выводу, что Lusitania не перевозил контрабанду и что немецкая атака была спровоцирована. Лорд Мёрси, после доставления своих выводов, вышел из государственной службы и, как сообщается, сказал другу: \"Дело Lusitania было чертовски грязным делом.\"\u003c/p\u003e\n\u003cp\u003eИстина о грузе Lusitania была подавлена в течение десятилетий. Только в 2008 году, когда водолазы обнаружили боеприпасы в обломках, была полная степень обмана подтверждена. Но к тому моменту ложь служила своей цели: потопление Lusitania сместило американское общественное мнение в направлении вмешательства, устанавливая сцену для вхождения США в войну два года позже.\u003c/p\u003e\n\u003ch2 id=\"ложный-флаг-2-телеграмма-zimmermania\"\u003eЛожный Флаг #2: Телеграмма Zimmermania\u003c/h2\u003e\n\u003ch3 id=\"перехват\"\u003eПерехват\u003c/h3\u003e\n\u003cp\u003eВ январе 1917 года британская разведка перехватила телеграмму от немецкого министра иностранных дел Артура Циммермана немецкому послу в Мексике. Телеграмма предложила немецко-мексиканский союз в случае американского вхождения в войну: Германия будет поддерживать Мексику в восстановлении Техаса, Нью-Мексико и Аризоны из Соединённых Штатов.\u003c/p\u003e\n\u003cp\u003eТелеграмма Zimmermania была представлена американской публике как доказательство немецкой враждебности — прямую угрозу американской территории. Президент Вильсон, кто переизбран в 1916 году на лозунге \"Он Держал Нас Из Войны,\" использовал телеграмму, чтобы оправдать реверс его позиции и запрос в Конгресс для декларации войны.\u003c/p\u003e\n\u003ch3 id=\"вопросы-никто-не-спросил\"\u003eВопросы Никто Не Спросил\u003c/h3\u003e\n\u003cp\u003eНесколько аспектов телеграммы Zimmermania никогда не были адекватно объяснены:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКак британская разведка перехватила это?\u003c/strong\u003e Телеграмма была отправлена через безопасные дипломатические каналы, включая кабель, который прошёл через станцию релей, управляемую Соединёнными Штатами. Британский перехват этого кабеля предполагает либо, что британцы постукивали американские коммуникации (враждебный акт против нейтральной нации), либо, что американцы разрешили перехват (указание переднего знания и сотрудничества).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПочему Zimmermania подтвердил его подлинность?\u003c/strong\u003e Когда столкнулся, Zimmermania признал, что телеграмма была подлинной — странное решение для дипломата, пойманного в потенциально войну-запускающем скандале. Некоторые исследователи предполагают, что Zimmermania был двойным агентом, или что ему было поручено подтвердить телеграмму силами, которые хотели, чтобы Соединённые Штаты входили в войну.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКто был прибыльным?\u003c/strong\u003e Телеграмма Zimmermania обеспечена точно предлогом, что партия войны в Вашингтоне требовала. Его синхронизация — раскрытая для публики просто недели перед Вильсоном просил Конгресс за декларацию войны — была подозрительно совершенной. Британцы, кто отчаянно пытался привести Америку в войну с 1914 года, имели самый очевидный мотив либо для подделки либо для облегчения телеграммы's \"открытие.\"\u003c/p\u003e\n\u003ch2 id=\"ложный-флаг-3-декларация-неограниченной-войны-подводных-лодок\"\u003eЛожный Флаг #3: Декларация Неограниченной Войны Подводных Лодок\u003c/h2\u003e\n\u003ch3 id=\"немецкое-решение\"\u003eНемецкое \"Решение\"\u003c/h3\u003e\n\u003cp\u003eВ феврале 1917 года Германия объявила, что она возобновит неограниченную войну подводных лодок — атаки любого судна, включая нейтральное судоходство, в воды вокруг Британии и Франции. Это решение, которое практически гарантировало американский вход в войну, была представлена историками как отчаянная немецкая азартная игра.\u003c/p\u003e\n\u003cp\u003eНо решение делает нет стратегический смысл с немецкой перспективы. Германия знала, что неограниченная война подводных лодок привела бы Соединённые Штаты в войну — результат, который обрекал бы уже натянутое немецкое военное усилие. Немецкий высокий командующий не был глупым; они поняли последствия.\u003c/p\u003e\n\u003cp\u003eТак почему они сделали это решение?\u003c/p\u003e\n\u003cp\u003eОтвет лежит в инфильтрации немецкого правительства иезуитскими связанными агентами. Немецкая служба разведки, Abteilung IIb, была пробита операторами, связанными с сетью разведки Ватикана. Ключевые решения — включая возобновление неограниченной войны подводных лодок — были влияны советниками, чья истинная верность была не Германии, но более широкому иезуитскому плану для выхода войны.\u003c/p\u003e\n\u003cp\u003eИезуитский план требовал американского вхождения в войну, чтобы гарантировать союзнический победу — и более важно, чтобы обеспечить, что Америка будет полным участником в постоянном урегулировании. Без американского вовлечения, иезуиты не могли переоформировать карту мира согласно их замыслу. Неограниченное \"решение\" войны подводных лодок было механизмом, через который иезуиты, работающие через их агентов в немецком правительстве, обеспечили, что Америка присоединилась бы к войне.\u003c/p\u003e\n\u003ch2 id=\"политика-без-фотографий\"\u003eПолитика Без Фотографий\u003c/h2\u003e\n\u003ch3 id=\"полный-информационный-контроль\"\u003eПолный Информационный Контроль\u003c/h3\u003e\n\u003cp\u003eПервая Мировая Война была первой войной, в которой правительства комбатант навязали всеобъемлющую цензуру на фотографическую документацию. На Западном Фронте фотография солдатом была запрещена. Журналисты были первоначально полностью запрещены от линий фронта, и когда корреспонденты были в конце концов разрешены ограниченный доступ, их отчёты и фотографии была предметом строгой военной цензуры.\u003c/p\u003e\n\u003cp\u003eОфициальное объяснение этой цензуры было \"оперативная безопасность\" — потребность предотвратить враг от приобретения разведки через опубликованные фотографии. Но реальная цель была намного более зловещей: предотвратить публику от видения истинной природы войны.\u003c/p\u003e\n\u003ch3 id=\"что-они-скрывали\"\u003eЧто Они Скрывали\u003c/h3\u003e\n\u003cp\u003eФотографии, которые сделали выживать — часто взятые в неподчинении приказам, контрабандно вынесены солдатами, или выпущены годы после войны — раскрывают конфликт, который носит мало сходства к героическому повествованию, представленному пропагандистами:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eТраншеи\u003c/strong\u003e, которые выглядели ничего как чистые, организованные позиции, изображённые в официальных фотографиях, но вместо этого как грязные, полные трупов канавы, где люди жили в условиях, хуже чем какая-либо тюрьма.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЖертвы\u003c/strong\u003e в масштабе, который испытывал непонимание — целые батальоны вытерты в минутах во время тщетных атак на оборонённые позиции.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГазовые атаки\u003c/strong\u003e, которые оставили солдат слепых, задыхающихся и умирающих в агонии — атаки, которые нарушили каждый принцип цивилизованной войны и которые были использованы обеими сторонами несмотря на официальные отрицания.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЖертвы Shell Shock\u003c/strong\u003e — люди, восстановленные к дрожащей, нечленораздельной поломке из-за неустанной бомбардировки — кто затем был судим в суде и иногда расстрелян за \"трусость.\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЕсли американская публика была видена эти образы перед Конгрессом голосовал на декларации войны, там была бы нет декларация. Ложные флаги были бы недостаточны без цензуры, чтобы предотвратить публику от понимания того, что они просили поддержать.\u003c/p\u003e\n\u003ch3 id=\"машинерия-пропаганды\"\u003eМашинерия Пропаганды\u003c/h3\u003e\n\u003cp\u003eНа месте истины, правительства всех комбатант нации замещённая пропаганда. В Соединённых Штатах, Комитет на Публичной Информации (Комитет Creel), установленный президентом Вильсоном в апреле 1917 года, стал самым сложным пропагандистским аппаратом мир когда-либо видел.\u003c/p\u003e\n\u003cp\u003eКомитет Creel нанимал художников, писателей, кинематографистов и спикеров, чтобы создать повествование войны, которое не носило никакого отношения к реальности. Немецкие солдаты были изображены как монстры, размахивающие штыком. Союзническая причина была обрамлена как крестовый поход для демократии и свободы. Экономические мотивации позади войны — банковские интересы, контракты вооружения, территориальные амбиции — были похоронены под потоком патриотического образа.\u003c/p\u003e\n\u003cp\u003eЭта машинерия пропаганды была прямым предком современного контроля медиа. Методы развитые Комитетом Creel — манипуляция эмоциональных, демонизация врага, подавление диссидентских голосов — всё ещё в использовании сегодня. Эдвард Бернейс, кто работал за Комитет Creel, ходил, чтобы написать \u003cem\u003eПропаганда\u003c/em\u003e (1928), основополагающий текст современных общественных отношений, в котором он открыто описал как \"умная манипуляция организованных привычек и мнений масс\" был ключ к управлению демократическими обществами.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Никогда не Закончилась\u003c/a\u003e отслеживает родословную из пропаганды Первой Мировой Войны через MKUltra к программам современного контроля ума.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана подчеркивает, что слова являются духовными (Матфея 12:36-37). Пропаганда Первой Мировой Войны была не просто политической коммуникацией — это была форма духовной войны, используя слова и образы, чтобы обманывать миллионы в поддержке войны, которая служила программе Сатаны разрушения. 97.5% кто ходят широкую дорогу к разрушению (Матфея 7:13-14) включают тех, кто принимают ложь пропагандиста без различия. Часы: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство NDE Говарда Питтмана\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля подробной документации ложных флагов Первой Мировой Войны, смотрите \u003ca href=\"https://agent131711.substack.com\"\u003eSubstack Agent131711\u003c/a\u003e и \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические Секреты: Раскрытые Отвратительные Тайны Иезуитов\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте Больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто Может Быть в Подвале Ватикана Может Вас Шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте Во Время Чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Никогда не Закончилась\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/127-Operation_Midnight_Climax.mp4\"\u003eОперация Полночь Климакс\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/97-Income_Tax_Is_Slavery.mp4\"\u003eПодоходный Налог Это Рабство\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь Обманщиков\u003c/a\u003e\u003c/li\
