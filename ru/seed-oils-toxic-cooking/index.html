, укрепляющий сердце человека.\" — Псалом 104:14-15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКогда Писание говорит о масле, оно говорит о оливковом масле — выжатом из плодов оливкового дерева, пище, питавшей человечество более шести тысяч лет. Оливковое масло было настолько центральным для древнего мира, что оно использовалось не только для приготовления пищи, но для помазания, исцеления и поклонения. Это был символ благословения и обеспечения Бога.\u003c/p\u003e\n\u003cp\u003eМасла, которые доминируют в современном продовольствии — рапс, соевое, подсолнечное, кукурузное и хлопковое — ничего не имеют общего с оливковым маслом Писания. Они являются промышленными продуктами, извлечёнными через химические растворители, дезодорированными для маскировки их порчи и выпущенными на рынок как \"полезные для сердца\" тем же питательным установлением, которое сказало вам, что сливочное масло — это яд, а маргарин — лекарство.\u003c/p\u003e\n\u003cp\u003eТрек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/71-The_Garments_of_Skin.mp4\"\u003eThe Garments of Skin\u003c/a\u003e говорит о покрытии, которое Бог предоставил после Падения — обеспечении, сделанном из того, что было реальным, что было естественным, что пришло из созданного порядка. Масла семян, которые заменили традиционные жиры, противоположны: синтетические покрытия, которые обещают здоровье, доставляя болезнь, произведённые подделки, которые выглядят как еда, но функционируют как яд в человеческом теле.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"история-промышленных-масел-семян\"\u003eИстория промышленных масел семян\u003c/h2\u003e\n\u003cp\u003eВ течение тысячелетий люди готовили с животными жирами (сало, талл, сливочное масло) и фруктовыми маслами (оливковое, кокосовое, пальмовое). Эти жиры были получены через простые механические процессы: прессование оливок, вытапливание животного жира, сбивание сливок.\u003c/p\u003e\n\u003cp\u003eОни не требовали промышленной инфраструктуры, химической обработки и дезодорирования. Они были стабильны при температурах приготовления, богаты жирорастворимыми витаминами и неотъемлемы для рационов каждой традиционной культуры на земле.\u003c/p\u003e\n\u003cp\u003eРеволюция масла семян началась в начале двадцатого века с изобретением гидрогенизации — промышленного процесса принудительного прохождения газового водорода через жидкие растительные масла при высоких температурах в присутствии металлического катализатора (обычно никеля), чтобы сделать их твёрдыми при комнатной температуре.\u003c/p\u003e\n\u003cp\u003eВ 1911 году компания Procter \u0026#x26; Gamble представила Crisco, гидрогенизированное хлопковое масло, выпущенное на рынок как современная, чистая альтернатива животному салу. Crisco был первым промышленно обработанным кулинарным жиром для входа в американские кухни, и его маркетинговая кампания — которая позиционировала животные жиры как старомодные и нездоровые — установила шаблон для каждой кампании масла семян, которая последовала.\u003c/p\u003e\n\u003cp\u003eХлопковое масло не было едой. Хлопок не является пищевой культурой, и хлопковое масло было первоначально промышленным отходом, используемым для производства мыла и машинного смазочного масла.\u003c/p\u003e\n\u003cp\u003eРешение выпустить его на рынок как кулинарное масло требовало массивной кампании связей с общественностью, чтобы убедить потребителей, что промышленный побочный продукт является подходящей заменой для масла и сала. Procter \u0026#x26; Gamble преуспели — и шаблон был установлен для промышленности, которая потратит следующее столетие на убеждение общественности, что промышленные масла были более здоровы, чем традиционные жиры, которые люди ели с начала времён.\u003c/p\u003e\n\u003cp\u003eСоевое масло вошло в американское продовольствие во время Второй мировой войны, когда традиционные источники жиров были редки. После войны соевая промышленность агрессивно лоббировала сохранение своей доли рынка, финансируя исследования, которые продвигали растительные масла и демонизировали животные жиры.\u003c/p\u003e\n\u003cp\u003eРапсовое масло — полученное из рапса, растения, исторически используемого для промышленной смазки — было введено в 1970-е годы после того, как канадские исследователи размножили низкоэруциновый сорт и дали ему благоприятное для потребителя имя (Canola = Canadian Oil, Low Acid).\u003c/p\u003e\n\u003cp\u003eСегодня соевое масло является наиболее потребляемым маслом в Соединённых Штатах, составляя приблизительно 60% всего потребления растительного масла. Американцы сейчас потребляют более 80 фунтов растительных масел на человека в год — увеличение более чем на 300% с 1970 года.\u003c/p\u003e\n\u003cp\u003eМасштаб этой трансформации рациона питания трудно осмыслить. На протяжении всей истории человечества — сотен тысяч лет — люди потребляли минимальные количества омега-6 полиненасыщенных жиров. Человеческое тело развилось на рационе, в котором основные жиры были насыщены и мононенасыщены, из источников животных и фруктовых масел. За один век промышленная продовольственная система фундаментально изменила состав жиров человеческого рациона — и вместе с ним состав жиров каждой клеточной мембраны в человеческом теле.\u003c/p\u003e\n\u003cp\u003eЭто не постепенный сдвиг в рационе питания. Это радикальный биохимический эксперимент, проведённый на всём население без согласия, без долгосрочных данных безопасности и без какого-либо механизма для обращения вспять.\u003c/p\u003e\n\u003ch2 id=\"как-производятся-масла-семян\"\u003eКак производятся масла семян\u003c/h2\u003e\n\u003cp\u003eПроцесс производства масла семян раскрывает, почему они фундаментально отличаются от традиционных жиров. Семена и зёрна не отдают свои масла легко — в отличие от оливок или кокоса, которые могут быть спрессованы, чтобы высвободить масло через простую механическую силу, извлечение масла из соевых бобов, семян рапса или кукурузы требует промышленного химического процесса:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭтап 1: Извлечение растворителем.\u003c/strong\u003e Семена измельчаются и затем омываются гексаном, нефтепроизводным химическим растворителем, классифицированным как нейротоксин и загрязнитель воздуха EPA. Гексан растворяет масло из материала семени. Хотя промышленность утверждает, что гексан удаляется при последующей обработке, независимое тестирование обнаружило остатки гексана в коммерчески доступных маслах семян.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭтап 2: Дегуммирование.\u003c/strong\u003e Сырое масло обрабатывается фосфорной или лимонной кислотой для удаления фосфолипидов и других соединений, которые вызывают мутность. Этот процесс также удаляет некоторые естественные происходящие питательные вещества и антиоксиданты.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭтап 3: Нейтрализация.\u003c/strong\u003e Масло обрабатывается гидроксидом натрия (щёлок) для удаления свободных жирных кислот, которые вызывают непритяжательные вкусы и уменьшают срок годности.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭтап 4: Отбеливание.\u003c/strong\u003e Масло пропускается через отбеливающую глину для удаления пигментов, которые дают ему цвет. Этот процесс также удаляет каротиноиды и хлорофилл — естественные соединения, которые имеют антиоксидантные свойства.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭтап 5: Дезодорирование.\u003c/strong\u003e Масло нагревается до температур между 400-500 градусами Фаренгейта и подвергается дистилляции паром для удаления летучих соединений, которые производят неприятные запахи и вкусы.\u003c/p\u003e\n\u003cp\u003eБез дезодорирования большинство масел семян пахли и пробовали бы порчу — потому что они порчены. Процесс дезодорирования маскирует окислительный ущерб, который уже произошёл, создавая продукт, который выглядит свежим, но уже деградирован на молекулярном уровне.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭтап 6: Химическое консервирование.\u003c/strong\u003e Синтетические антиоксиданты, такие как BHT (бутилированный гидрокситолуол) и BHA (бутилированный гидроксианизол), добавляются для предотвращения дальнейшего окисления при хранении.\u003c/p\u003e\n\u003cp\u003eРезультатом является продукт, который подвергся экстремальной тепле, химическим растворителям, едким щелочам, отбеливающим агентам и дезодорированию — продукт настолько далёкий от его первоначального ботанического источника, что называние его \"естественным\" или \"растительным\" маслом является упражнением в маркетинговой фикции.\u003c/p\u003e\n\u003cp\u003eВы не пили бы гексан, не ели бы отбеливающую глину и не потребляли бы щёлок. Но когда эти химические вещества используются для производства масла, которым вы готовите, они невидимы — скрыты позади метки, которая говорит \"полезное для сердца растительное масло\".\u003c/p\u003e\n\u003ch2 id=\"омега-6-воспаление-бомба\"\u003eОмега-6 воспаление бомба\u003c/h2\u003e\n\u003cp\u003eНаиболее значительная проблема здоровья с маслами семян — это их экстремальная концентрация омега-6 полиненасыщенных жирных кислот (PUFA), особенно линолевой кислоты.\u003c/p\u003e\n\u003cp\u003eЧеловеческому телу требуются как омега-6, так и омега-3 жирные кислоты, но в сбалансированном соотношении — исторически оценивается между 1:1 и 4:1 (омега-6 к омега-3). Современный западный рацион питания, насыщенный маслами семян, доставляет соотношение примерно 20:1 к 25:1.\u003c/p\u003e\n\u003cp\u003eЭтот дисбаланс не незначительный. Омега-6 жирные кислоты — предшественники про-воспалительных эйкозаноидов — сигнальных молекул, которые содействуют воспалению, свёртыванию крови и вазоконстрикции.\u003c/p\u003e\n\u003cp\u003eОмега-3 жирные кислоты — предшественники противовоспалительных эйкозаноидов. Когда потребление омега-6 массивно превосходит потребление омега-3, тело входит в состояние хронического системного воспаления — основное состояние, которое вызывает болезнь сердца, рак, болезнь Альцгеймера, аутоиммунные расстройства, артрит, астму и практически каждую хроническую болезнь, которая преследует современную цивилизацию.\u003c/p\u003e\n\u003cp\u003eИсследование 2016 года, опубликованное в British Medical Journal, восстановило данные из Minnesota Coronary Experiment (1968-1973), рандомизированного контролируемого испытания, которое заменило насыщенный жир на линолевую кислоту (первичную омега-6 в маслах семян) в рационах 9 423 участников.\u003c/p\u003e\n\u003cp\u003eВосстановленные данные — которые были подавлены более 40 лет — показали, что группа, потребляющая больше линолевой кислоты, имела более высокие показатели смерти от болезни сердца, не ниже. Для каждого снижения на 30 mg/dL в сывороточном холестерине (предполагаемая преимущество потребления масла семян), было 22% увеличение риска смерти.\u003c/p\u003e\n\u003cp\u003eАналогично, Sydney Diet Heart Study (1966-1973) обнаружил, что участники, которые заменили насыщенный жир на богатое омега-6 масло сафлора, имели значительно более высокие показатели смерти от всех причин и от сердечнососудистых заболеваний по сравнению с контрольной группой.\u003c/p\u003e\n\u003cp\u003eЭто не наблюдательные исследования с запутанными переменными. Это рандомизированные контролируемые испытания — золотой стандарт научных доказательств — и они демонстрируют, что замена традиционных жиров маслами семян убивает людей.\u003c/p\u003e\n\u003cp\u003eД-р Крис Кнобб, офтальмолог, который изучил историческую эпидемиологию потребления масла семян, представил данные, показывающие, что введение масла семян в продовольствие различных наций последовательно предшествует появлению эпидемий хронических заболеваний приблизительно на 20-30 лет.\u003c/p\u003e\n\u003cp\u003eВ Соединённых Штатах потребление соевого масла увеличилось более чем в 1000 раз между 1909 и 1999 годами. Эпидемии хронических заболеваний, которые теперь определяют американское здоровье, следовали той же экспоненциальной траектории.\u003c/p\u003e\n\u003cp\u003eКнобб задокументировал, что дегенерация жёлтого пятна — ведущая причина слепоты в развитом мире — была практически неизвестна перед введением масла семян в продовольствие. Первое клиническое описание болезни появилось в 1930 году, ровно когда потребление масла семян начало свой экспоненциальный рост. Сегодня дегенерация жёлтого пятна воздействует на более 11 миллионов американцев. Корреляция между потреблением масла семян и дегенерацией сетчатки — один из самых сильных эпидемиологических образцов в пищевой науке.\u003c/p\u003e\n\u003cp\u003eТот же образец держится для рака, аутоиммунного заболевания и нейродегенеративных состояний. В каждом случае введение масла семян в рацион питания популяции предшествует появлению воспалительных хронических болезней одно-два поколения — время, требуемое для накопления омега-6 жирных кислот в ткани, изменению состава клеточной мембраны и производству хронического воспаления, которое вызывает болезнь.\u003c/p\u003e\n\u003ch2 id=\"окисление-скрытая-опасность\"\u003eОкисление: скрытая опасность\u003c/h2\u003e\n\u003cp\u003eПолиненасыщенные жирные кислоты химически нестабильны. Их молекулярная структура содержит множественные двойные связи, которые очень уязвимы к окислению — химической реакции с кислородом, которая производит токсичные соединения, включая альдегиды, липидные пероксиды и конечные продукты передовой гликолизации (AGEs).\u003c/p\u003e\n\u003cp\u003eКогда масла семян нагреваются для приготовления, это окисление ускоряется драматически, производя каскад вредных соединений, которые поглощаются в еду и потребляются едоком.\u003c/p\u003e\n\u003cp\u003eИсследование 2019 года, опубликованное в Acta Scientific Nutritional Health, обнаружило, что нагревание масла семян до стандартных температур приготовления произвело концентрации альдегидов в 20 раз выше пределов безопасности, рекомендованных Всемирной организацией здравоохранения.\u003c/p\u003e\n\u003cp\u003eАльдегиды известны тем, что вызывают повреждение ДНК, содействуют раку, ускоряют старение и содействуют нейродегенеративной болезни. Каждый раз, когда вы едите еду, приготовленную в масле семян — из ресторана быстрого питания, семейной кухни или \"здорового\" салата с заправкой на основе масла рапса — вы потребляете эти соединения.\u003c/p\u003e\n\u003cp\u003eПроблема окисления простирается дальше приготовления. Масла семян начинают окисляться с момента их производства. Экстремальная тепло и химическая обработка, включённые в их производство, инициируют окисление перед тем, как бутылка попадёт в магазин.\u003c/p\u003e\n\u003cp\u003eК тому времени, когда потребитель открывает бутылку рапса или соевого масла, значительный окислительный ущерб уже произошёл — замаскирован дезодорирующим процессом, который удаляет запах порчи, не обращая вспять химическую деградацию.\u003c/p\u003e\n\u003cp\u003eДаже в теле, хранимые омега-6 PUFA продолжают окисляться. Эти жиры встраиваются в клеточные мембраны по всему телу, где они подвергаются постоянному окислительному ущербу.\u003c/p\u003e\n\u003cp\u003eРезультатом является дисфункция клетки на каждом уровне — от митохондрий, которые производят клеточную энергию, к эндотелию, который выстилает кровеносные сосуды, к нейронам, которые составляют мозг.\u003c/p\u003e\n\u003cp\u003eЧеловеческое тело буквально построено из жиров, которые оно потребляет, и когда эти жиры окислительно повреждены маслами семян, тело построено с дефектными материалами.\u003c/p\u003e\n\u003cp\u003eИсследование показало, что линолевая кислота, хранимая в жировой ткани, увеличилась драматически у американцев на протяжении последнего столетия — от приблизительно 2-3% жирных кислот жировой ткани к более чем 20%. Тело буквально насыщено жиром, который окисляется, воспаляется и деградирует функцию клетки. Это не питательное вещество. Это медленнодействующий яд, который был встроен в структуру почти каждой клетки в современном человеческом теле.\u003c/p\u003e\n\u003ch2 id=\"покрытие-как-масла-семян-стали-полезными-для-сердца\"\u003eПокрытие: как масла семян стали \"полезными для сердца\"\u003c/h2\u003e\n\u003cp\u003eМаркетинг масла семян как \"полезного для сердца\" построен на той же мошеннической основе, как и сама пищевая пирамида, как задокументировано в нашей статье о \u003ca href=\"/food-pyramid-lie-decades/?lang=ru\"\u003eThe Food Pyramid Lie: Decades of Dietary Deception\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eАмериканская ассоциация сердца (AHA), самый влиятельный голос в рекомендациях по здоровью сердца, содействовала маслам семян и демонизировала насыщенные жиры на протяжении более шести десятилетий.\u003c/p\u003e\n\u003cp\u003eТо, что общественность не знает, состоит в том, что AHA получает миллионы долларов ежегодно от производителей масла семян. Программа сертификации \"Проверка сердца\" AHA — логотип сердца на пищевых продуктах, указывающий одобрение AHA — взимает плату у компаний за сертификацию.\u003c/p\u003e\n\u003cp\u003eПродукты, сертифицированные как \"полезные для сердца\" AHA, включают масло рапса, соевое масло и маргарин, в то время как традиционные жиры, такие как масло и кокосовое масло, явно предупреждаются.\u003c/p\u003e\n\u003cp\u003eВ 2017 году AHA издала президентский консультативный документ специально атакующий кокосовое масло, заявляя, что оно \"не имеет никаких известных положительных действенных эффектов\" и должно быть избегнуто.\u003c/p\u003e\n\u003cp\u003eКонсультативный документ был широко освещён в СМИ и привел к значительному снижению продаж кокосового масла. То, что было не широко сообщено, состоит в том, что ведущий автор консультативного документа получал финансирование от промышленности масла рапса, и что рекомендация AHA была основана на той же гипотезе рациона-сердца, которую Анцель Кейс построил на мошеннических данных в 1960-х годах.\u003c/p\u003e\n\u003cp\u003eПрограмма \"Проверка сердца\" AHA — это не научная оценка. Это платная сертификация, которая стоит компаниям между $1,000 и $7,500 за продукт в год. Сахаром-наполненные каши, обработанные фруктовые соки и продукты на основе масла семян несут логотип сердца AHA — в то время как кокосовое масло, масло травоядных и животные жиры — нет. Логотип не указывает здоровье. Он указывает платёж.\u003c/p\u003e\n\u003cp\u003eРезультатом является потребительское окружение, в котором самые вредные масла несут институциональное одобрение, в то время как самые здоровые жиры несут институциональное осуждение. Общественность доверяет AHA, потому что она представляет себя как научный орган. Но её финансовая зависимость от промышленности масла семян и переработанных пищевых продуктов делает её маркетинговой рукой, а не научным органом.\u003c/p\u003e\n\u003cp\u003eПромышленность переработанных пищевых продуктов зависит от масла семян, потому что они дешевы, стабильны при хранении и без вкуса (после дезодорирования). Как задокументировано в нашей статье о \u003ca href=\"/processed-food-addiction-design/?lang=ru\"\u003eProcessed Food: Engineered for Addiction\u003c/a\u003e, масла семян — это невидимый субстрат практически каждого упакованного пищевого продукта — от печенья к чипсам к замороженным обедам к детской смеси.\u003c/p\u003e\n\u003cp\u003eЗамена их более здоровыми альтернативами повысила бы затраты и снизила бы прибыль. Метка \"полезная для сердца\" — это не наука. Это маркетинг — разработанный для защиты цепи снабжения многомиллиардного компонента от потребительского противодействия.\u003c/p\u003e\n\u003ch2 id=\"масла-семян-в-детской-смеси\"\u003eМасла семян в детской смеси\u003c/h2\u003e\n\u003cp\u003eВозможно, самое тревожное применение масла семян — это их присутствие в детской смеси. Подавляющее большинство коммерческих детских смесей содержит соевое масло, подсолнечное масло, пальмовое масло или масло рапса как основные источники жиров.\u003c/p\u003e\n\u003cp\u003eМозги младенцев быстро развиваются в течение первых лет жизни, и жиры, которые они потребляют, прямо встраиваются в их развивающуюся нервную ткань.\u003c/p\u003e\n\u003cp\u003eЧеловеческое грудное молоко содержит приблизительно 1% линолевой кислоты. Коммерческая детская смесь может содержать 15-25% линолевой кислоты — нагрузка омега-6, которая значительно выше того, что природа предназначила для развивающегося мозга.\u003c/p\u003e\n\u003cp\u003eДолгосрочные последствия кормления младенцев воспалительными маслами семян в течение самого критического периода развития мозга не были адекватно изучены. Но корреляция между ростом детской смеси на основе масла семян и ростом детской аллергии, астмы, экземы, ADHD и аутизма достаточно поразительна, чтобы гарантировать исследование — исследование, в котором промышленность смеси не имеет интереса к финансированию.\u003c/p\u003e\n\u003ch2 id=\"побег-из-ловушки-масла-семян\"\u003eПобег из ловушки масла семян\u003c/h2\u003e\n\u003cp\u003eИзбегание масла семян в современном пищевом окружении чрезвычайно трудно. Они находятся в практически каждом ресторане, каждом упакованном пищевом продукте, каждой пекарне и каждом салатном соусе.\u003c/p\u003e\n\u003cp\u003eЧтение этикеток помогает, но масла семян указаны под многими названиями: растительное масло, масло рапса, соевое масло, подсолнечное масло, масло сафлора, кукурузное масло, масло хлопка, масло винограда и масло рисовых отрубей.\u003c/p\u003e\n\u003cp\u003eДаже продукты, обозначенные как \"оливковое масло\", могут быть фальшивыми с маслами семян — исследование UC Davis 2010 года обнаружило, что 69% импортированного оливкового масла, обозначенного как \"extra virgin\", не смогли встретить химические стандарты для этого сорта, с многими содержащими смеси масла семян.\u003c/p\u003e\n\u003cp\u003eПуть вперёд — возврат к жирам, которые Бог создал и человечество потребляло в течение тысячелетий: extra virgin оливковое масло (проверенные источники), кокосовое масло, масло от травоядных коров, ghee, сало от выпаса свиней и tallow от травоядного крупного скота.\u003c/p\u003e\n\u003cp\u003eЭти жиры стабильны при температурах приготовления, богаты жирорастворимыми витаминами (A, D, E, K) и противовоспалительны, а не про-воспалительны. Они также более насыщают, что означает, что тело естественно ест меньше — противоположность того, что запроектированы делать продукты, содержащие масло семян.\u003c/p\u003e\n\u003ch2 id=\"проблема-ресторана\"\u003eПроблема ресторана\u003c/h2\u003e\n\u003cp\u003eИзбегание масла семян дома возможно с дисциплиной и знанием. Избегание их в ресторанах практически невозможно.\u003c/p\u003e\n\u003cp\u003eПодавляющее большинство ресторанов — от цепей быстрого питания к ресторанам высокой кухни — готовят с маслами семян. Масло рапса, соевое масло и смеси \"растительного масла\" — это стандартные кулинарные жиры в коммерческих кухнях, потому что они дешевы, стабильны при хранении и производят последовательный продукт.\u003c/p\u003e\n\u003cp\u003eОдин приём пищи в типичном ресторане может доставить больше линолевой кислоты, чем неделя домашних обедов, приготовленных с традиционными жирами. Картофель-фри, жаркое перемешиванием, салатный соус, хлеб (часто запечённый с соевым маслом), десерт — каждый элемент ресторанного приёма пищи вероятно готовится с или содержит масла семян.\u003c/p\u003e\n\u003cp\u003eДаже рестораны, которые рекламируют \"оливковое масло\" приготовление, часто используют смеси оливкового масла, которые содержат масло рапса или сои, или используют подлинное оливковое масло для закончить, в то время как готовя с маслами семян при высоких температурах.\u003c/p\u003e\n\u003cp\u003eРезультатом состоит в том, что американцы, которые едят в ресторане часто — и средний американец едит приблизительно 5,9 ресторанных приёмов пищи в неделю — потребляют количества окисленных омега-6 жирных кислот, которые переполняют любой здоровый выбор, который они делают дома.\u003c/p\u003e\n\u003cp\u003eРесторанная промышленность не имеет стимула для изменения. Масла семян — это самые дешевые кулинарные жиры доступны. Переключение на масло, tallow или оливковое масло значительно увеличило бы затраты на еду. Без потребительского спроса для изменения — спроса, который требует потребительского осведомления о проблеме — промышленность будет продолжить готовку с самыми дешевыми, наиболее воспалительными маслами доступны.\u003c/p\u003e\n\u003ch2 id=\"кожа-и-связь-клеточной-мембраны\"\u003eКожа и связь клеточной мембраны\u003c/h2\u003e\n\u003cp\u003eУщерб, вызванный маслами семян, простирается дальше внутреннего воспаления к самой структуре человеческих клеток.\u003c/p\u003e\n\u003cp\u003eКлеточные мембраны состоят из жирных кислот. Типы жиров, которые вы потребляете, прямо определяют состав каждой клеточной мембраны в вашем теле. Когда рацион богат насыщенными и мононенасыщенными жирами — как традиционные рационы были — клеточные мембраны стабильны, жидки и функциональны.\u003c/p\u003e\n\u003cp\u003eКогда рацион насыщен полиненасыщенными омега-6 жирными кислотами из масла семян, клеточные мембраны становятся нестабильны и уязвимы к окислительному ущербу. Это воздействует на каждую функцию клетки: транспорт питательного вещества, удаление отходов, чувствительность рецептора и коммуникация клеток.\u003c/p\u003e\n\u003cp\u003eКожа — самый большой орган тела — особенно воздействуется. Дерматологи отметили, что рост кожных состояний, включающих прыщи, экзему, псориаз и преждевременное старение, коррелирует с увеличением потребления масла семян.\u003c/p\u003e\n\u003cp\u003eИсследование показало, что метаболиты линолевой кислоты — особенно окисленные метаболиты линолевой кислоты (OXLAMs) — это наиболее обильные окисленные жирные кислоты в человеческой коже и повышены в воспалительных кожных состояниях.\u003c/p\u003e\n\u003cp\u003eИсследование 2018 года, опубликованное в Journal of Lipid Research, обнаружило, что потребление линолевой кислоты в рационе прямо воздействует на содержание линолевой кислоты в коже и производство про-воспалительных метаболитов. Подтекст прямая: масла, которые вы едите, становятся маслами в вашей коже, и когда эти масла воспалительны, ваша кожа воспаляется.\u003c/p\u003e\n\u003cp\u003eЭпидемия кожной болезни в западных популяциях — воздействующая приблизительно на 85% подростков (сами прыщи) и миллионы взрослых — это не проблема гигиены или генетическая неизбежность. Это диетическая проблема, и первичным диетическим возбудителем является омега-6-богатое масло семян, которое проникло в каждый аспект современного пищевого снабжения.\u003c/p\u003e\n\u003ch2 id=\"библейское-отражение\"\u003eБиблейское отражение\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Есть ли в Галааде бальзам? Есть ли там врач? Почему же не произошло исцеление дочери народа моего?\" — Иеремия 8:22\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eБальзам Галаада был естественной смолой — маслом, выжатым из бальзамического дерева, известным во всём древнем мире своей целебной способностью. Обеспечение Бога для исцеления, как и его обеспечение для еды, пришло из того, что Он создал — из плодов дерева, масла оливы, жира животного.\u003c/p\u003e\n\u003cp\u003eМасла семян, которые теперь насыщают продовольствие, не являются бальзамом. Они ранены. Они не исцеляют — они воспаляют, окисляют и деградируют каждую клетку, которую они трогают.\u003c/p\u003e\n\u003cp\u003eПророк спросил почему не было исцеления для раны его народа. Ответ, тогда и сегодня, состоит в том, что народ отвергает то, что Бог предоставил и обратился к альтернативам, которые не могли спасать.\u003c/p\u003e\n\u003cp\u003eПромышленность масла семян предлагает \"полезные для сердца\" масла, которые вызывают болезнь сердца. Питательный установление предлагает диетические руководства, которые производят ожирение. Система, которая заявляет исцелять — это система, которая ранит. И бальзам — реальное масло, реальный жир, реальная еда — сидит проигнорированный, пока подделка потребляется и народ погибает.\u003c/p\u003e\n\u003cp\u003eОливковое дерево берёт годы, чтобы созреть. Оно несёт плод в его сезон. Оно не может быть спешено, не может быть промышленляно, не может быть уменьшено к химической формуле. Оливковый пресс работает медленно, прессуя плод, пока золотое масло потекёт — чистое, неочищенное, живое с соединениями, которые защищают тело, питают мозг и поддерживают сердце.\u003c/p\u003e\n\u003cp\u003eЗавод масла семян работает быстро. Оно извлекает то, что природа никогда не предназначала отдать, используя химические вещества, которые никогда не должны трогать еду, при температурах, которые разрушают то, что малое питание семена содержали. Скорость. Объём. Прибыль. Это её ценности — и они — ценности цивилизации, которая торговала оливковым прессом за химический завод и благословение за проклятие.\u003c/p\u003e\n\u003cp\u003eВозврат к реальному маслу — это возврат к реальной жизни. Оно начинается с простого акта чтения этикетки, задавания вопроса и выбора масла, которое Бог создал, над маслом, которое промышленность произвела.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/135-Food_Price_Shadow_Industry.mp4\"\u003eFood Price Shadow Industry\u003c/a\u003e — Токсичная промышленность масла раскрыта\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/food-pyramid-lie-decades/?lang=ru\"\u003eThe Food Pyramid Lie: Decades of Dietary Deception\u003c/a\u003e — Мошеннический пищевой центр науки, который объявил масла семян здоровыми и традиционные жиры опасными\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/processed-food-addiction-design/?lang=ru\"\u003eProcessed Food: Engineered for Addiction\u003c/a\u003e — Как масла семян стали невидимым субстратом каждого наркотического пищевого продукта\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eМасло, которое Бог создал, пришло из оливкового пресса — раздавлено, разделено и чистое. Масло, которое промышленность создала, пришло из химического завода — гексан-извлечено, отбелено, дезодорировано и деградировано перед тем, как оно достигло бутылку. Одно исцеляет. Другое вредит. Одно — обеспечение. Другое — прибыль. И вся цивилизация готовит, ест и умирает с неправильным маслом в её еде, в её клетках и в её детях, потому что учреждения, которым она доверяла, продали подделку как лекарство. Бальзам Галаада всё ещё существует. Оно растёт на деревьях, не в заводах. И исцеление, которое оно предлагает, начинается с простого акта отвержения того, что система предоставляет и возврата к тому, что Создатель создал.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/food-
