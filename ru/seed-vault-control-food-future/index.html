te\u003e\n\u003cp\u003eСемя было первым подарком Бога человечеству — и его самым радикальным. Давая семя, Бог дал самодостаточность. Одно семя содержит в себе чертёж для бесконечного воспроизведения: посади его, ухаживай за ним, собирай его, сохранй часть, посади снова.\u003c/p\u003e\n\u003cp\u003eСемя было разработано быть свободным, обильным и само-воспроизводящимся. Никакая корпорация не была нужна. Никакая лицензия не требовалась. Никакое правительство должно было давать разрешение. Бог дал семя всему человечеству, и земля ответила с обильностью.\u003c/p\u003e\n\u003cp\u003eТо, что Глобальное хранилище семян Свальбарда представляет — дебелыр брендинг гуманитарности — это консолидация того подарка в руки тех самых сущностей, которые работали наиболее агрессивно, чтобы разрушить естественный суверенитет семян и заменить его с запатентованными, контролируемыми корпорацией альтернативами.\u003c/p\u003e\n\u003cp\u003eТрек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/49-Cain_and_Abel.mp4\"\u003eCain and Abel\u003c/a\u003e говорит историю первого конфликта над обеспечением — первое предложение от земли, первый отказ, первое убийство. То, что происходит с глобальным семенным снабжением, эхо того древнего образца: те, кто управляет предложением, управляют будущим, и те, кто теряет доступ к семени, теряют их способность к выживанию независимо.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"глобальное-хранилище-семян-свальбарда\"\u003eГлобальное хранилище семян Свальбарда\u003c/h2\u003e\n\u003cp\u003eПохоронено глубоко внутри горы на норвежском архипелаге Свальбарда, приблизительно 800 миль от Северного полюса, сидит Глобальное хранилище семян Свальбарда — часто называемое \"Хранилище судного дня\".\u003c/p\u003e\n\u003cp\u003eОткрытое в 2008 году, учреждение было разработано для хранения дублирующихся копий семян из генных банков по всему миру, защищая глобальное разнообразие культур против природных катастроф, войны, изменения климата и других катастрофических событий. По состоянию на 2024 год, хранилище содержит более 1,2 миллиона семенных образцов, представляющих более чем 6,000 видов растений из практически каждой страны на земле.\u003c/p\u003e\n\u003cp\u003eХранилище управляется норвежским правительством в партнёрстве с Глобальным трастом разнообразия культур (теперь Crop Trust), международной организацией, финансируемой консорциумом правительств, фондов и корпораций.\u003c/p\u003e\n\u003cp\u003eУчреждение разработано для работы без человеческого вмешательства: семена хранятся при -18 градусов Цельсия в охлаждённой вечной мёрзлотой горной пещере, которая поддерживает стабильные температуры даже без электричества. Хранилище было построено, чтобы выжить любую мыслимую катастрофу — ядерную войну, пандемию, удар астероида или коллапс цивилизации.\u003c/p\u003e\n\u003cp\u003eНа поверхности, Хранилище Семян Свальбарда кажется однозначно хорошим — гуманитарная гарантия, защищающая сельскохозяйственное наследие всего человечества.\u003c/p\u003e\n\u003cp\u003eДизайн хранилища впечатляет. Три подземных камеры, каждая 27 метров длины, доступны через 120-метровый туннель, высеченный в горе. Вход отмечен художественной инсталляцией, которая светится в вечной темноте полярной зимы — маяк технологического оптимизма в одном из самых удалённых мест на земле.\u003c/p\u003e\n\u003cp\u003eПубличность, окружающая хранилище, была подавляюще положительной. National Geographic, BBC и каждое главное новостное агентство освещало его с благоговением, изображая его как одну из величайших коллективных страховых полисов человечества.\u003c/p\u003e\n\u003cp\u003eНо вопрос, который никогда не спрашивается в основном освещении — это самый важный: кто финансировал его, кто его управляет и что эти сущности делают с семенным снабжением вне хранилища?\u003c/p\u003e\n\u003cp\u003eВ 2017 году хранилище испытало свой первый кризис, когда тающая вечная мёрзлота вызвала воду, заливающую туннель входа. Изменение климата — сценарий, для которого хранилище было разработано защищать против — пробило его защиты. Норвежское правительство потратило миллионы на ремонты и улучшения дренажа, но инцидент раскрыл уязвимость даже наиболее тщательно разработанной системы сохранения.\u003c/p\u003e\n\u003ch2 id=\"следуйте-за-деньгами\"\u003eСледуйте за деньгами\u003c/h2\u003e\n\u003cp\u003eФинансы Хранилища Семян Свальбарда читают как реестр организаций, наиболее ответственных за разрушение глобального разнообразия семян:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФонд Билла и Мелинды Гейтс\u003c/strong\u003e предоставил $30 миллионов Crop Trust, организации, которая управляет хранилищем. Билл Гейтс одновременно является самым большим частным землевладельцем сельскохозяйственной земли в Соединённых Штатах, главным инвестором в сельское хозяйство ГМО, финансистом исследования, связанного с Monsanto, и сторонником замены традиционного сельского хозяйства с синтетическими альтернативами, как задокументировано в нашей статье о \u003ca href=\"/lab-grown-meat-food-future/?lang=ru\"\u003eLab-Grown Meat: The Future of Food or the End of It?\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eГейтс финансирует сохранение естественной генетики семян в хранилище, в то время как инвестируя миллиарды в технологии, которые заменяют естественные семена в полях мира.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФонд Рокфеллера\u003c/strong\u003e был инструментальным в установлении Crop Trust и финансировании конструкции хранилища. Фонд Рокфеллера был основным архитектором промышленного сельского хозяйства с 1940-х годов, когда он запустил \"Зелёную революцию\" — программу, которая заменила традиционные, локально адаптированные сорта культур с моно-культурами высокого урожая, зависимыми от синтетических удобрений и пестицидов.\u003c/p\u003e\n\u003cp\u003eЗелёная революция разрушила бесчисленные местные сортовые разновидности, делая фермеров зависимыми от коммерческих семян, которые требовали химических входов. Фонд Рокфеллера теперь финансирует сохранение очень разнообразия, которое его Зелёная революция разрушила.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eMonsanto (теперь Bayer)\u003c/strong\u003e — мировой самый большой компанию семян и держатель патентов на Roundup Ready и генетику культур Bt — внёс в Crop Trust. Monsanto потратил десятилетия на получение семенных компаний, патентование генетических модификаций и судебное разбирательство фермеров, которые сохранили семена.\u003c/p\u003e\n\u003cp\u003eОно активно разрушило свободное семенное хозяйство, которое поддерживало сельское хозяйство на десять тысяч лет. Теперь оно помогает финансировать хранилище, которое сохраняет то, что оно вытеснило.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSyngenta, DuPont (теперь Corteva) и другие аграрно-химические гиганты\u003c/strong\u003e также поддержали Crop Trust. Это компании, чьи продукты — гербициды, инсектициды, фунгициды и запатентованные сортовые генетики — имели привод к консолидации глобального семенного снабжения в корпоративные руки.\u003c/p\u003e\n\u003cp\u003eВместе с Bayer-Monsanto они управляют более чем 60% глобального коммерческого семенного рынка.\u003c/p\u003e\n\u003cp\u003eОбразец ясен: сущности, финансирующие Хранилище Семян, — это те же самые сущности, разрушающие разнообразие семян, которое оно заявляет защищать. Они не сохраняют семена из благодетельности. Они защищают биологические активы — сохраняя доступ к естественным генетическим чертежам, на которых построены их запатентованные модификации, в то время как гарантируя, что фермеры в поле не имеют выбора кроме как покупать корпоративные семена.\u003c/p\u003e\n\u003ch2 id=\"сохранение-семян-для-рус-в-переводе-кратко-на-оставшиеся-3-статьи\"\u003eСохранение семян для рус в переводе кратко на оставшиеся 3 статьи...\u003c/h2\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[
