 лица и события связаны через финансовые, организационные или операционные связи, те связи рассказывают историю, которую официальный нарратив может не включать. Часть 3 расследования PULSE прослеживает неожиданные связи - связи между нападающим, индустрией безопасности, разведслужбой и институциональной сетью, которая управляла событием и его последствиями.\u003c/p\u003e\n\u003cp\u003eNDE Говарда Питтмана выявило связанную иерархию обмана. Три неба. Демонические сущности организованы в рангах, назначаны территориям и функциям, координаны в цели. Связи в событии PULSE зеркалируют эту иерархию: сущности, которые появляются независимо, но служат объединённой цели.\u003c/p\u003e\n\u003cp\u003eИезуиты - мастера институциональной связи. Военная организация Лойолы. \"Абсолютная власть\" Наполеона. Тамбурини правил \"всем миром\" от одной комнаты через сеть агентов, размещённых в каждом учреждении. \u003cem\u003eCatholic Confidential\u003c/em\u003e выявляет инфильтрацию \"скрытую хитростью\".\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"связь-g4s\"\u003eСвязь G4S\u003c/h2\u003e\n\u003ch3 id=\"крупнейшая-компания-безопасности-в-мире\"\u003eКрупнейшая компания безопасности в мире\u003c/h3\u003e\n\u003cp\u003eОмар Матин был нанят G4S - один из крупнейших компаний частной безопасности в мире. На момент события PULSE, G4S нанял более 600,000 людей во всём мире и провёл контракты с государственными учреждениями, военными установками, ядерными объектами и критической инфраструктурой в десятках стран.\u003c/p\u003e\n\u003cp\u003eG4S - это не просто компания безопасности. Это компонент национального аппарата безопасности - частная сущность, которая выполняет функции, традиционно зарезервированные для государственных учреждений. Её контракты включают транспорт заключённых, задержание иммиграции, безопасность военной базы и защиту классифицированных объектов. Компания работает в пространстве между частным предприятием и функцией государства.\u003c/p\u003e\n\u003cp\u003eНанимание Матина в G4S дало ему разрешение безопасности, доступ к подготовке огнестрельного оружия и знакомство с протоколами безопасности - все из которых, согласно официальному нарративу, он использовал в атаке PULSE.\u003c/p\u003e\n\u003cp\u003eAgent131711 задокументирует на Substack (agent131711.substack.com) более широкий образец сотрудников компании безопасности в высокопрофильных событиях. Этот образец не доказывает координацию, но это демонстрирует, что индустрия безопасности производит лица с подготовкой, доступом и операционным знанием, требуемым для событий.\u003c/p\u003e\n\u003ch3 id=\"интерфейс-разведслужбы\"\u003eИнтерфейс разведслужбы\u003c/h3\u003e\n\u003cp\u003eИндустрия частной безопасности не отделена от разведслужбы. Это его коммерческое расширение. Бывшие офицеры CIA, FBI, NSA и военного разведки населяют лидерство компаний, как G4S, Booz Allen Hamilton, SAIC и Palantir.\u003c/p\u003e\n\u003cp\u003eВращающаяся дверь между правительством разведслужбой и частной безопасностью означает, что компании, как G4S, интегрированы в разведслужбу экосистему.\u003c/p\u003e\n\u003ch2 id=\"вопрос-информатора\"\u003eВопрос информатора\u003c/h2\u003e\n\u003ch3 id=\"сеть-информатора-fbi\"\u003eСеть информатора FBI\u003c/h3\u003e\n\u003cp\u003eFBI работает самую большую домашнюю сеть разведслужбы в Америке, нанимая оценённых 15,000 конфиденциальных информаторов в любое данное время. Эти информаторы встроены в сообщества, организации и сети.\u003c/p\u003e\n\u003ch3 id=\"образец\"\u003eОбразец\u003c/h3\u003e\n\u003cp\u003eОбразец - одного-стрелка нанятого компанией безопасности государства-соединения, исследованного FBI дважды, проведя разрешение безопасности и работающего в городе, пропитанном разведслужбой и оборонной инфраструктурой.\u003c/p\u003e\n\u003cp\u003eЭто образец задокументирован в других случаях, где информатор сети пересекал высокопрофильные события.\u003c/p\u003e\n\u003ch2 id=\"что-связи-раскрывают\"\u003eЧто связи раскрывают\u003c/h2\u003e\n\u003cp\u003eСвязи выявляют образец: институциональное окружение, в котором мощные учреждения получили выгоду от результатов события. Когда учреждения получают выгоду от событий, возможность, что эти учреждения повлияли на те события, должна быть исследована.\u003c/p\u003e\n\u003cp\u003eРасследование продолжается в части 4, где мы определяем две самые большие ошибки в расследовании PULSE.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNDE свидетельство Говарда Питтмана\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eсмотреть на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКатолический конфиденциально\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eсмотреть на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\"\u003eПроклятие змей\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛожь обманщиков\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучите-дальше\"\u003eИзучите дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/pulse-never-seen-part2/?lang=ru\"\u003ePULSE: что вы никогда не видели Часть 2\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pulse-biggest-mistakes-part4/?lang=ru\"\u003e2 САМЫЕ БОЛЬШИЕ ОШИБКИ в расследовании PULSE Часть 4\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eСвязи выявляют вопросы. Когда нападающий работал для компании безопасности государства-соединения, был исследован FBI и работал в городе, пропитанном разведслужбой инфраструктурой - эти связи требуют расследование, не предположение.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/media/\",\"className\":\"category-badge\",\"children\":\"media\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Неожиданные связи: расследование PULSE Часть 3\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Часть 3 открывает неожиданные связи в расследовании PULSE. Проследите иезуитские-образцы связи между фирмами безопасности и разведслужбой.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-06-02T10:00:00Z\",\"children\":\"2 июня 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"pulse\",{\"href\":\"/ru/tag/pulse/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"pulse\"]}],[\"$\",\"a\",\"connections\",{\"href\":\"/ru/tag/connections/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"connections\"]}],[\"$\",\"a\",\"intelligence\",{\"href\":\"/ru/tag/intelligence/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"intelligence\"]}],[\"$\",\"a\",\"security\",{\"href\":\"/ru/tag/security/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"security\"]}],[\"$\",\
