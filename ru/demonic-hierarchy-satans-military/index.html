 желаний! вникни в слова, которые я скажу тебе, и стань прямо на ноги твои; ибо к тебе я послан ныне... Но князь царства Персидского стоял против меня двадцать один день; но вот, Михаил, один из первых князей, пришёл помочь мне, и я остался там при царях Персидских.\"\u003c/em\u003e — Даниила 10:10-13\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Потому что наша брань не против крови и плоти, но против начальств, против властей, против мироправителей тьмы века сего, против духов злобы поднебесных.\"\u003c/em\u003e — Ефесянам 6:12\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДаниил молился. Бог ответил немедленно. Но ангел, несущий ответ, был задержан на двадцать один день — три полных недели — демоническим князем, назначенным на территорию Персии. Не случайным демоном. Князем. Территориальным правителем с достаточной силой, чтобы заблокировать ангела Божьего на двадцать один день. Потребовался Михаил — один из главных князей небес — чтобы прорваться.\u003c/p\u003e\n\u003cp\u003eЭто не был хаотический бой. Это было организованное сопротивление. Территориальная власть. Военная структура. Цепь командования. Это была война между двумя организованными армиями, и демоническая сторона имела князя — территориального командира — достаточно мощного, чтобы вступить в бой с небесным посланником в течение трёх недель.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был взят в эту зону войны. И то, что он увидел, подтвердило каждое слово, написанное Даниилом — и намного превзошло его.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eСатанинские воинства — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПроклятие змея — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"военная-структура\"\u003eВоенная структура\u003c/h2\u003e\n\u003ch3 id=\"не-хаос--порядок\"\u003eНе хаос — порядок\u003c/h3\u003e\n\u003cp\u003eСамое распространённое заблуждение христиан о царстве сатаны заключается в том, что оно хаотично. Популярное воображение представляет ад как беспорядочную яму кричащих демонов и случайных мучений. Художники изображали его как анархию. Фильмы показывают его как безумие. Средний прихожанин, если его спросить, вероятно, описал бы демоническое царство как нечто дикое, неукрощённое и неорганизованное.\u003c/p\u003e\n\u003cp\u003eГовард Питтман обнаружил противоположное.\u003c/p\u003e\n\u003cp\u003eЦарство сатаны — самая организованная, дисциплинированная и эффективная военная операция в существовании. Более дисциплинированная, чем римские легионы. Более организованная, чем прусская армия. Более эффективная, чем любые силы специального назначения, которые когда-либо действовали на земле. У каждого демона есть ранг. У каждого демона есть назначение. У каждого демона есть цепь командования. Каждый демон точно знает, что он должен делать, когда он должен это делать и кому он отвечает.\u003c/p\u003e\n\u003cp\u003eЭто военная структура. Чистая, жёсткая, непреклонная военная структура. И армия, которой она командует, насчитывает миллионы — возможно, миллиарды — демонических существ, каждое из которых является специалистом, каждое действует в своей назначенной сфере власти, каждое отвечает иерархии над ним.\u003c/p\u003e\n\u003ch3 id=\"система-князей-и-начальств\"\u003eСистема князей и начальств\u003c/h3\u003e\n\u003cp\u003eСилы сатаны действуют по территориальной системе. Так же, как ангел Гавриил был задержан \"князем царства Персидского\", каждая территория на земле — каждая нация, каждый регион, каждый город, каждый район — находится под надзором демонического начальства. Князя. Территориального командира, которому сатана дал власть действовать от его имени над конкретной географической областью.\u003c/p\u003e\n\u003cp\u003eЭто не теория. Это то, что Павел описал в Ефесянам 6:12 — \"начальства\" и \"власти\". Это не абстрактные богословские концепции. Это ранги. Военные ранги. Начальства — территориальные правители. Власти — силы под их командованием. Мироправители тьмы века сего — оперативные командиры. Духи злобы поднебесные описывают местоположение их штаб-квартиры — второе небо.\u003c/p\u003e\n\u003cp\u003eСатана даёт власть этим князьям действовать от его имени. Они правят своими территориями с абсолютной властью под общим командованием сатаны. Они координируются с другими начальствами. Они отчитываются по цепи командования. Они развёртывают свои силы согласно стратегическим целям, установленным самим сатаной.\u003c/p\u003e\n\u003cp\u003eВот почему духовная война отличается от региона к региону. Вот почему определённые грехи более распространены в определённых областях. Вот почему конкретные города имеют конкретные духовные атмосферы. Начальство, назначенное на эту территорию, формирует духовную среду согласно своему конкретному назначению и специальности.\u003c/p\u003e\n\u003ch2 id=\"пять-уровней-демонов\"\u003eПять уровней демонов\u003c/h2\u003e\n\u003ch3 id=\"первый-уровень-воюющие-демоны\"\u003eПервый уровень: воюющие демоны\u003c/h3\u003e\n\u003cp\u003eНа вершине иерархии — высший ранг среди демонических сил, свидетелем которых был Питтман — находятся воюющие демоны. Это элита. Силы специального назначения. Ударные войска армии сатаны.\u003c/p\u003e\n\u003cp\u003eПиттман описал их как восьмифутовых гигантов. Не метафорически. Восемь футов в высоту. Они выглядели как мускулистые красивые бронзовые солдаты — мощные, внушительные, ужасающие своим присутствием. Они двигались по второму небу группами, путешествуя вместе как подразделения. И когда они двигались, всё остальное уступало дорогу. Каждый другой демон — независимо от ранга или назначения — расчищал путь, когда проходили воюющие демоны.\u003c/p\u003e\n\u003cp\u003eЭто демоны, которые напрямую участвуют в духовной войне высокого уровня. Они те, кто направлен противостоять ангельским силам. Они те, кто назначен на самые критические стратегические операции — битвы, которые определяют судьбу наций, ход истории, духовное направление целых цивилизаций.\u003c/p\u003e\n\u003cp\u003eИх внешность — красивая, бронзовая, похожая на солдата — сама по себе значима. Это не гротескные создания из ужасающей фантастики. Это воины. Они выглядят как воины. Они ведут себя как воины. И их боятся даже их собственный вид.\u003c/p\u003e\n\u003cp\u003eКогда появляется воюющий демон, меньшие демоны рассеиваются. Не из-за неприязни или страха нападения от своих. Из уважения к рангу. Из признания власти. Военная дисциплина настолько полная, что низшие ранги инстинктивно подчиняются высшим, так же как рядовые вытягиваются по стойке \"смирно\", когда проходит генерал.\u003c/p\u003e\n\u003ch3 id=\"второй-уровень-демоны-в-человеческой-форме\"\u003eВторой уровень: демоны в человеческой форме\u003c/h3\u003e\n\u003cp\u003eВторой уровень состоит из демонов, которые принимают человеческую форму. Эти демоны выглядят как люди — неотличимые, для неподготовленных глаз, от реальных людей. Они ходят среди людей. Они взаимодействуют с людьми. Они влияют на людей, выглядя как один из них.\u003c/p\u003e\n\u003cp\u003eЭтими демонами руководят специалисты в самых разрушительных человеческих грехах: жадность, ненависть, похоть и раздор. Это командиры дивизий — демоны, чьи специальности определяют оперативные категории этого уровня. Под демоном жадности действуют все демоны, чьи назначения связаны с финансовыми манипуляциями, материализмом, алчностью и поклонением богатству. Под демоном ненависти действуют демоны расизма, горечи, непрощения и войны. Под демоном похоти действуют демоны сексуального извращения, порнографии, прелюбодеяния и всех форм сексуального греха. Под демоном раздора действуют демоны разделения, конфликта, сплетен, клеветы и распрей.\u003c/p\u003e\n\u003cp\u003eЭтот второй уровень занимает второе место командования в иерархии сатаны. Они оперативные командиры — те, кто переводит стратегические цели сатаны в тактические операции среди человеческого населения. Они мост между духовным миром и физическим миром, действующие в человеческой форме, чтобы получить близость к своим целям.\u003c/p\u003e\n\u003cp\u003eИх способность выглядеть как люди — их основное оружие. Они могут войти в комнату, на рабочее место, в церковь, в семью — и никто не подозревает, что демонический разум стоит среди них. Они могут шептать предложения, разжигать эмоции, насаждать идеи и инженерить ситуации, всё время выглядя как обычный человек.\u003c/p\u003e\n\u003ch3 id=\"третий-уровень-демоны-смешанной-формы\"\u003eТретий уровень: демоны смешанной формы\u003c/h3\u003e\n\u003cp\u003eТретий уровень, пожалуй, самый тревожный для человеческой чувствительности. Это демоны смешанной формы — существа, которые выглядят как гибриды полулюдей-полуживотных. Часть человека, часть создания. Химеры духовного мира.\u003c/p\u003e\n\u003cp\u003eЭти демоны специализируются в тёмных искусствах. Колдовстве. Волшебстве. Оккультизме. Они демоны за каждой доской Уиджа, каждым спиритическим сеансом, каждой палаткой гадалки, каждым хрустальным шаром, каждым раскладом карт Таро. Они силы, которые питают оккультизм во всех его формах.\u003c/p\u003e\n\u003cp\u003eИх специальности включают страх, саморазрушение и имитацию призраков и духов умерших. Эта последняя специальность особенно значима. Когда медиум утверждает, что контактирует с мёртвыми — когда спиритический сеанс производит \"дух\", который говорит голосом бабушки и знает секреты бабушки — это не бабушка. Это демон третьего уровня, специалист по имитации, подражающий умершим, чтобы обмануть живых.\u003c/p\u003e\n\u003cp\u003eВот почему Библия запрещает некромантию — общение с мёртвыми (Второзаконие 18:10-12). Не потому, что это не \"работает\", а потому что это работает. Оно производит результаты. Оно генерирует переживания, которые кажутся подлинными. Но источник не умерший любимый человек. Источник — демон, чья специальность — олицетворение — существо смешанной формы, которое наблюдало за умершим годами и может воспроизвести его манеры, речевые шаблоны, воспоминания, личность.\u003c/p\u003e\n\u003cp\u003eЖертвы этих демонов включают тех, кто пойман в ловушку страха — иррационального, парализующего, контролирующего жизнь страха. Тех, кто побуждается к саморазрушению — порезам, суицидальным мыслям, расстройствам питания, самоповреждению во всех его формах. И тех, кто соблазнён в оккультизм — полагая, что они получают доступ к духовной истине, когда на самом деле получают доступ к демоническому обману.\u003c/p\u003e\n\u003ch3 id=\"четвёртый-уровень-нечеловеческие-демоны\"\u003eЧетвёртый уровень: нечеловеческие демоны\u003c/h3\u003e\n\u003cp\u003eЧетвёртый уровень самый отвратительный. Эти демоны не имеют человеческой формы вообще. Они напоминают животных — некоторые узнаваемые, некоторые неизвестные земной таксономии. Они демоны самых насильственных и ужасающих грехов: убийства, жестокости, садизма и резни.\u003c/p\u003e\n\u003cp\u003eПиттман описал их как настолько отвратительных, что они вызывают тошноту у тех, кто их видит. Их внешность соответствует их функции — они воплощение самых гнусных и разрушительных импульсов в существовании. Они демоны за массовыми убийствами, геноцидом, пытками и каждой формой насилия, которая превосходит то, что человеческий разум может постичь.\u003c/p\u003e\n\u003cp\u003eЭти демоны презираются даже своими товарищами. Другие уровни избегают их. Они прячутся в стороне, отдельно от основного тела демонической армии. Не потому что они непослушны — они следуют цепи командования, как каждый другой демон. Но потому что их природа настолько отвратительна, настолько по сути отвратительна, что даже демоны без любви предпочитают держаться на расстоянии.\u003c/p\u003e\n\u003cp\u003eЭто значимо. В царстве, полностью лишённом любви, где нет привязанности или тепла, эти демоны всё ещё считаются отвратительными. Порог, требуемый для отвращения у существа без любви, невообразимо высок. И эти демоны четвёртого уровня превышают его. Как бы они ни выглядели, что бы они ни воплощали, это настолько фундаментально оскорбительно для самого существования, что даже демоны — существа без любви, без сострадания, без красоты — не могут выносить близость к ним.\u003c/p\u003e\n\u003cp\u003eТем не менее они служат. У них есть свои назначения. Они выполняют их с той же дисциплинированной послушностью, что и каждый другой уровень. Когда требуется убийство, когда резня — цель, когда максимальное насилие и жестокость — тактическая задача, эти демоны развёртываются. И результаты написаны на страницах человеческой истории кровью.\u003c/p\u003e\n\u003ch3 id=\"пятый-уровень-таинственная-группа\"\u003eПятый уровень: таинственная группа\u003c/h3\u003e\n\u003cp\u003eПятый уровень самый загадочный. Питтман описал их как таинственную группу — анонимную, безымянную, намеренно скрытую. Их определяющая характеристика в том, что их сила заключается в том, чтобы оставаться неизвестными. Никто не знает, как они выглядят. Никто не знает их имён. Никто не знает их конкретных форм. Они тени внутри теневого мира.\u003c/p\u003e\n\u003cp\u003eЭта анонимность — их оружие. Они самые трудные для противостояния, потому что их нельзя идентифицировать. Демон, которого можно назвать, может быть адресован. Демон, которого можно категоризировать, может быть предвиден. Но демон, который остаётся вечно неизвестным — который скрывает свою идентичность, свою форму, свою специальность, само своё существование — не может быть эффективно противопоставлен.\u003c/p\u003e\n\u003cp\u003eЭти таинственные демоны имеют одну уникальную привилегию, которой не обладает ни один другой уровень: они единственные демоны, которым позволено овладевать маленькими детьми. Все другие уровни ограничены действием против тех, кто достиг или превысил возраст ответственности. Но пятый уровень может нацеливаться на самых маленьких, самых невинных, самых беззащитных людей на земле.\u003c/p\u003e\n\u003cp\u003eОни также могут имитировать физические состояния — особенно эпилепсию. Когда человек страдает от припадков, которые не имеют явной медицинской причины, демоны пятого уровня могут быть источником. Они производят симптомы, которые физически неотличимы от неврологических расстройств, заставляя врачей лечить духовное состояние физическим лекарством.\u003c/p\u003e\n\u003cp\u003eЭто самый пугающий уровень, потому что он раскрывает глубину стратегии сатаны. Пятый уровень действует в полной темноте, нацеливается на самых уязвимых, имитирует самые запутывающие состояния и делает всё это, никогда не будучи идентифицированным. Они призрачные оперативники демонической военной машины — невидимые, безымянные и смертоносные.\u003c/p\u003e\n\u003ch2 id=\"один-демон-одна-специальность\"\u003eОдин демон, одна специальность\u003c/h2\u003e\n\u003ch3 id=\"никаких-врачей-общей-практики\"\u003eНикаких врачей общей практики\u003c/h3\u003e\n\u003cp\u003eОдно из наиболее тактически значимых откровений из свидетельства Питтмана заключается в том, что у каждого демона ОДНА специальность. В армии сатаны нет врачей общей практики. Каждый демон — специалист — обученный, назначенный и развёрнутый в одной конкретной области греха, одной конкретной форме атаки, одном конкретном типе обмана.\u003c/p\u003e\n\u003cp\u003eДемон похоти занимается только похотью. Демон жадности занимается только жадностью. Демон страха занимается только страхом. Они не проходят перекрёстное обучение. Они не многозадачны. Они не балуются другими специальностями. Они абсолютные специалисты в своей назначенной области, и в этой области у них тысячи лет опыта, наблюдения и усовершенствования.\u003c/p\u003e\n\u003cp\u003eЭта специализация делает их настолько эффективными. Демон похоти изучает человеческую сексуальность с Эдемского сада. Он знает каждую уязвимость, каждый триггер, каждый паттерн искушения, который производит результаты. Он искушал миллионы людей на протяжении тысячелетий и усовершенствовал свои техники с каждым из них. Он, в своей специальности, самый опытный и эффективный оперативник в существовании.\u003c/p\u003e\n\u003cp\u003eЭто означает, что когда христианин сталкивается с искушением, он не сталкивается со случайной, обобщённой духовной силой. Он сталкивается со специалистом — экспертом в этом конкретном грехе, развёрнутом специально против него, с техниками, усовершенствованными за тысячи лет против миллионов целей.\u003c/p\u003e\n\u003ch3 id=\"стратегическое-развёртывание\"\u003eСтратегическое развёртывание\u003c/h3\u003e\n\u003cp\u003eСпециализация демонов создаёт модель стратегического развёртывания. Когда сатана хочет разрушить брак, он не посылает одного демона. Он посылает команду — демона похоти для атаки сексуальной верности, демона раздора для генерации конфликта, демона жадности для создания финансового давления, демона горечи для предотвращения прощения. Каждый специалист атакует со своего назначенного угла. Цель — брак — сталкивается с координированной, многовекторной атакой от специалистов, которые разрушают браки с тех пор, как брак был изобретён.\u003c/p\u003e\n\u003cp\u003eКогда сатана хочет нейтрализовать церковь, применяется та же модель. Демоны раздора для создания разделения среди прихожан. Демоны жадности для коррумпирования руководства. Демоны похоти для компрометации пастора. Демоны гордости для раздувания эго. Демоны обмана для введения ложной доктрины. Каждый специалист работает в своей назначенной области, все координируются через иерархию, все служат одной стратегической цели.\u003c/p\u003e\n\u003cp\u003eВот почему духовная война настолько трудна. Это не одна битва. Это много одновременных битв, ведущихся на многих фронтах многими специалистами. Христианин, который признаёт только одну атаку — кто адресует только демона похоти, например, игнорируя демона раздора — выигрывает одну битву, но проигрывает войну. Координированная атака врага требует всеобъемлющей защиты.\u003c/p\u003e\n\u003ch2 id=\"лояльность-без-любви\"\u003eЛояльность без любви\u003c/h2\u003e\n\u003ch3 id=\"невозможный-парадокс\"\u003eНевозможный парадокс\u003c/h3\u003e\n\u003cp\u003eВозможно, наиболее психологически тревожный аспект демонической иерархии — парадокс лояльности без любви. Во втором небе любовь не существует. Точка. Нет привязанности между демонами. Нет тепла между сатаной и его силами. Нет товарищества, дружбы, взаимной заботы, эмоциональной связи какого-либо рода.\u003c/p\u003e\n\u003cp\u003eИ тем не менее лояльность абсолютна.\u003c/p\u003e\n\u003cp\u003eДемоны повинуются своим командирам без колебаний. Они выполняют свои назначения без жалоб. Они работают неустанно, беспощадно и с фокусом и преданностью, которые посрамили бы любую человеческую организацию. Они сотрудничают между уровнями, координируются между территориями и поддерживают свою иерархическую дисциплину на протяжении тысячелетий — всё без единой частицы любви, чтобы мотивировать их.\u003c/p\u003e\n\u003cp\u003eКак это возможно? В человеческом мире лояльность почти всегда укоренена в любви, уважении или взаимной выгоде. Солдаты сражаются за свою страну, потому что любят её. Сотрудники работают для своих компаний, потому что ценят компенсацию. Друзья помогают друзьям, потому что заботятся друг о друге. Любовь — в какой-то форме — топливо, которое движет человеческим сотрудничеством.\u003c/p\u003e\n\u003cp\u003eНо демоны не имеют такого топлива. Они действуют на чём-то совершенно другом. Страх, возможно. Послушание силе. Признание того, что иерархия — единственная структура, которая даёт им цель. Каков бы ни был механизм, он производит результаты, которые превышают всё, что когда-либо производила человеческая любовь.\u003c/p\u003e\n\u003cp\u003eЭто военный урок, который церкви отчаянно нужно усвоить. Силы врага, действующие без любви, более организованы, более дисциплинированы и более эффективны, чем силы церкви, которые теоретически действуют с самой мощной силой во вселенной — любовью Божьей. Если демоны без любви могут достичь этого уровня координации, какое оправдание у церкви для её дезорганизации, её внутренних распрей, её разделения и её неэффективности?\u003c/p\u003e\n\u003ch3 id=\"рвение-без-привязанности\"\u003eРвение без привязанности\u003c/h3\u003e\n\u003cp\u003eРвение демонов ужасно наблюдать. Они не делают перерывов. Они не вызываются на больничный. У них нет выходных дней. Они не ставят под вопрос свои назначения. Они не обсуждают стратегию со своими командирами. Они не проводят собрания комитетов, чтобы решить, должна ли операция продолжаться.\u003c/p\u003e\n\u003cp\u003eОни исполняют. Немедленно, полностью, без оговорок.\u003c/p\u003e\n\u003cp\u003eКогда воюющий демон направлен на территорию, он идёт. Когда демон в человеческой форме назначен на цель, он вступает в бой. Когда демону смешанной формы приказано произвести наваждение, он выполняет. Машина работает без трения, без колебаний, без того рода бюрократической инерции, которая парализует человеческие организации.\u003c/p\u003e\n\u003cp\u003eСравните это со средней церковью. Встречи для обсуждения встреч. Комитеты для надзора за комитетами. Дебаты о цвете ковра, пока души теряются. Бюджетные споры, пока враг развёртывается. Церковь действует на долю своего потенциала, искалеченная именно тем видом организационной дисфункции, которую демоническая армия полностью устранила.\u003c/p\u003e\n\u003ch2 id=\"структура-власти\"\u003eСтруктура власти\u003c/h2\u003e\n\u003ch3 id=\"сатана-даёт-власть\"\u003eСатана даёт власть\u003c/h3\u003e\n\u003cp\u003eВ демонической иерархии власть течёт вниз от сатаны. Он главнокомандующий. Под ним князья и начальства — территориальные правители. Под ними различные уровни демонов, каждый со своими внутренними рангами и цепями командования.\u003c/p\u003e\n\u003cp\u003eСатана даёт власть своим князьям действовать от его имени. Это система делегированной власти — похожая на то, как король даёт власть губернаторам, которые правят провинциями от его имени. Губернатор не обладает присущей властью. Его власть заимствована, делегирована, зависит от продолжающегося одобрения короля. Но на своей территории губернатор действует с полным весом власти короля.\u003c/p\u003e\n\u003cp\u003eДемонические князья действуют таким же образом. У них нет независимой власти. Их власть — власть сатаны, делегированная им для конкретных целей на конкретных территориях. Они правят своими доменами от имени сатаны, развёртывают свои силы согласно стратегическим целям сатаны и поддерживают порядок через делегированную силу сатаны.\u003c/p\u003e\n\u003cp\u003eВот почему власть Иисуса над демонами абсолютна. Иисус не обладает делегированной властью. Он обладает присущей властью — властью Творца над творением, властью Бога над всем, что существует. Когда Иисус командует демону, у демона нет выбора, кроме как повиноваться. Не потому что Иисус превосходит демона по рангу в общей иерархии. Потому что Иисус существует вне иерархии полностью. Он Тот, Кто сделал иерархию возможной — и Он может разобрать её словом.\u003c/p\u003e\n\u003ch3 id=\"власть-христианина\"\u003eВласть христианина\u003c/h3\u003e\n\u003cp\u003eЭто приводит нас к самому важному тактическому откровению в свидетельстве Питтмана: все дети Божьи имеют власть над всеми демонами. Не над некоторыми. Не над слабыми. Не над низшими уровнями. Над всеми. Включая воюющих демонов. Включая начальства. Включая таинственный пятый уровень.\u003c/p\u003e\n\u003cp\u003eНо — и это критическая оговорка — эффективность этой власти основана на вере и знании христианина. Христианин, который не знает, что имеет власть, не может осуществить её. Христианин, который сомневается в своей власти, обнаружит её неэффективной. Христианин, который осуществляет власть без подлинной веры, подобен солдату, держащему оружие, которое он не знает, как использовать.\u003c/p\u003e\n\u003cp\u003eВот почему знание важно. Вот почему понимание демонической иерархии важно. Вот почему Питтман был отправлен назад с этой информацией. Церковь не может сражаться с врагом, которого она не понимает. Она не может осуществить власть, о которой не знает, что обладает. Она не может развернуть оружие, которое никогда не обучалась использовать.\u003c/p\u003e\n\u003cp\u003eВраг знает церковь. Церковь не знает врага. И этот разрыв в знаниях — величайшее тактическое преимущество, которым обладает сатана.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсточник: буклет Говарда Питтмана \u003cem\u003ePlacebo\u003c/em\u003e, Bible Camp на озере Гамильтон\u003c/p\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eСатанинские воинства — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/07-The_Serpents_Curse.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПроклятие змея — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПадшие ангелы — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/83-Ancient_Documents.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eДревние документы — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/111-The_Final_Day.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПоследний день — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/101-Fight_of_Faith.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eБорьба веры — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/three-heavens-howard-pittman-nde/?lang=ru\"\u003eТри неба: что увидел Говард Питтман, когда умер\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/demon-possession-sovereign-will/?lang=ru\"\u003eЕдинственное, что демоны не могут нарушить: ваша суверенная воля\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/placebo-church-satan-false-religion/?lang=ru\"\u003eЦерковь-плацебо: как сатана управляет ложной религией для миллиардов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/mass-deletion-church-created-christianity/?lang=ru\"\u003eМассовое удаление: как церковь создала свою собственную версию христианства\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eГовард Питтман не воображал демоническую иерархию. Он стал свидетелем её. Пять уровней. Миллионы специалистов. Воюющие гиганты. Инфильтраторы в человеческой форме. Оккультисты-гибриды животных. Нечеловеческие монстры убийства и резни. И таинственная безымянная группа, которая охотится на самых молодых и наиболее уязвимых. Все организованы. Все дисциплинированы. Все действуют с ревностной лояльностью в царстве, полностью лишённом любви. Армия реальна. Война реальна. И церковь — дезорганизованная, отвлечённая и обманутая — проигрывает. Не потому что враг сильнее. Потому что церковь не знает, что она сражается.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/origins/\",\"className\":\"category-badge\",\"children\":\"origins\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Военные силы сатаны: демоническая иерархия, свидетелем которой был Говард Питтман\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Говард Питтман стал свидетелем пяти уровней демонов во втором небе — военная иерархия, более дисциплинированная, чем любая армия на земле.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2026-01-05T10:00:00Z\",\"children\":\"5 января 2026 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"demonic hierarchy\",{\"href\":\"/ru/tag/demonic hierarchy/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"demonic hierarchy\"]}],[\"$\",\"a\",\"spiritual warfare\",{\"href\":\"/ru/tag/spiritual warfare/\",\"className\":\"tag-pill\",\"children\":[\"#\",\"spiritual warfare\"]}],[\"$\",\"a\",\"demons\",{\"href\":\"/ru/tag/demons/
