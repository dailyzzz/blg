kquote\u003e\n\u003cp\u003eИстория вакцины против оспы — это основополагающий миф современной медицины. Это история, которая подтверждает каждую вакцину, которая последовала, каждое фармацевтическое вмешательство, каждый мандат общественного здравоохранения. История заходит вот так: Эдвард Дженнер обнаружил, что дойные мастера, которые заразились коровьей оспой, были невосприимчивы к оспе, он тестировал его теорию, прививая мальчика материалом коровьей оспы, мальчик стал невосприимчив, и вакцинация была рождена — спасая миллионы жизней и в конечном итоге уничтожая оспу с лица земли.\u003c/p\u003e\n\u003cp\u003eЭто красивая история. Это также полна лжи, упущений и искажений настолько глубоких, что истинная история читается как ужасный роман, написанный садистом. Истинная история вакцины против оспы связана с инъекцией детей животным гноем, широко распространённой смерти и болезни, вызванной самой вакциной, намеренным подавлением доказательств, показывающих, что вакцина была неэффективна и опасна, и прикрытием, разработанным медицинскими и политическими учреждениями с глубокими связями с иезуитским орденом и тайными обществами.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показано три небеса и сказано, что 97,5% христиан были отвергнуты. История вакцины против оспы — это один из лжей, который держит их отвергнутыми — ложный чудо, который заменяет веру в Бога верой в медицину, и доверие божественному исцелению зависимостью от фармацевтических продуктов. Ефесянам 6:12 описывает войну \"против начальств, против властей\" — и нарратив оспы — это начальство медицинского царства, неоспоримая догма, которая требует веру и наказывает ересь.\u003c/p\u003e\n\u003cp\u003eИезуиты' \"абсолютная власть\" (Наполеон), их \"вечное проклятие\" (Адамс), их управление \"половиной мира\" (Тамбурини) — всё находит выражение в мандате вакцины. Фильм \"Католические тайны\" показывает их инфильтрацию \"скрытой хитростью\" и их готовность практиковать \"любой вид порока\". Инъекция детей с заражённым животным материалом, в то время как утверждая защитить их, — это порок наивысшего порядка.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"истинный-эдвард-дженнер\"\u003eИстинный Эдвард Дженнер\u003c/h2\u003e\n\u003ch3 id=\"не-врач-не-учёный\"\u003eНе врач, не учёный\u003c/h3\u003e\n\u003cp\u003eЭдвард Дженнер не был обученным врачом в современном смысле. Он получил свою медицинскую степень от Университета Святого Эндрюса в Шотландии — степень, купленная за 15 гиней, без экзамена, без посещения лекций и без клинического опыта. Это было, по стандартам его собственного времени, купленное полномочие.\u003c/p\u003e\n\u003cp\u003eДженнер был натуралистом и деревенским хирургом. Его интерес к коровьей оспе и оспе был основан на местном фольклоре — народной вере, что дойные мастера, которые заразились коровьей оспой, были невосприимчивы к оспе. Он не провёл строгое научное расследование. Он собрал анекдоты, провёл горстку сырых экспериментов и опубликовал свои находки в самостоятельно опубликованном памфлете после того как Королевское общество отклонило его газету.\u003c/p\u003e\n\u003ch3 id=\"эксперимент-на-джеймсе-фиппсе\"\u003eЭксперимент на Джеймсе Фиппсе\u003c/h3\u003e\n\u003cp\u003e14 мая 1796 года Дженнер взял материал из поражения коровьей оспы на руке дойной мастера по имени Сара Нелмс и царапал его в руку восьмилетнего мальчика по имени Джеймс Фиппс — сына садовода Дженнера. Позже он прививал Фиппса материалом оспы, чтобы тестировать, был ли мальчик невосприимчив.\u003c/p\u003e\n\u003cp\u003eЭтот эксперимент был проведён:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНа \u003cstrong\u003eребёнке\u003c/strong\u003e, который не мог дать информированное согласие\u003c/li\u003e\n\u003cli\u003eМужчиной с \u003cstrong\u003eкупленной медицинской степенью\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eИспользуя \u003cstrong\u003eзаражённый животный материал\u003c/strong\u003e, соскребанный из человеческого поражения\u003c/li\u003e\n\u003cli\u003eБез какого-либо понимания \u003cstrong\u003eтеории микробов\u003c/strong\u003e, вирусологии или иммунологии\u003c/li\u003e\n\u003cli\u003eБез \u003cstrong\u003eэтического надзора\u003c/strong\u003e, без экспертной оценки и без протоколов безопасности\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПо современным стандартам медицинской этики, этот эксперимент считался бы уголовным. По стандартам своего собственного времени, это было рассмотрено как безрассудное многими современниками Дженнера. Но нарратив, который он произвёл — героический доктор, спасающий человечество от чумы — был слишком полезен, чтобы быть поставленным под сомнение.\u003c/p\u003e\n\u003ch3 id=\"что-дженнер-не-рассказал-вам\"\u003eЧто Дженнер не рассказал вам\u003c/h3\u003e\n\u003cp\u003eСлучаи вакцинации Дженнера были избирательны и вводящий в заблуждение:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНесколько его оригинальных субъектов вакцинации \u003cstrong\u003eзаразились оспой\u003c/strong\u003e несмотря на вакцинацию\u003c/li\u003e\n\u003cli\u003eЕго собственный сын, Эдвард Дженнер-младший, был вакцинирован и пострадал от \u003cstrong\u003eхронических проблем со здоровьем\u003c/strong\u003e на всей его короткой жизни (он умер в возрасте 21)\u003c/li\u003e\n\u003cli\u003eДженнер признал, что вакцинация коровьей оспы \u003cstrong\u003eне обеспечивала постоянный иммунитет\u003c/strong\u003e — разрушительное признание, которое подорвало его всю теорию\u003c/li\u003e\n\u003cli\u003eСлучаи \"коровьей оспы\", используемые для вакцинации, могли фактически быть \u003cstrong\u003eлошадиным жиром\u003c/strong\u003e (конской оспой) — совсем другое заболевание, вызывающее вопросы о том, что было фактически инъецировано в пациентов\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"ужасы-вакцинации-19-века\"\u003eУжасы вакцинации 19 века\u003c/h2\u003e\n\u003ch3 id=\"вакцинация-от-руки-к-руке\"\u003eВакцинация от руки к руке\u003c/h3\u003e\n\u003cp\u003eВ десятилетиях после работы Дженнера, вакцинация была распространена через технику \"от руки к руке\": материал из поражения вакцинированного человека был соскребан и привит в следующего человека рук. Это создало цепь передачи, которая распространяла не только материал вакцины, но любое кровяное заболевание, присутствующее в цепи.\u003c/p\u003e\n\u003cp\u003eРезультатом была широко распространённая передача:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eСифилиса\u003c/strong\u003e: Документированные случаи передачи сифилиса через вакцинацию были сообщены на протяжении 19 века\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eТуберкулёза\u003c/strong\u003e: Материал вакцины, загрязнённый туберкулёзными бактериями, вызвал вспышки\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРожи\u003c/strong\u003e: Бактериальная кожная инфекция, распространяющаяся через загрязненный материал вакцины\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСепсиса\u003c/strong\u003e: Кровяное отравление от нестерильных процедур вакцинации убило бесчисленное количество\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЦелые семьи заразились сифилисом через вакцинацию. Дети развили мокнущие, некротические поражения на местах вакцинации. Смерть от передаваемых вакциной инфекций была достаточно распространена, что медицинская литература периода полна случаевых докладов.\u003c/p\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПонимайте историю.\u003c/strong\u003e Нарратив, что вакцинация избавила мир от оспы, — это самое мощное оружие в прикрытии современной вакцины. Но истинная история — это одна об экспериментах на людях, плохой науке и подавлении доказательств.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eТребуйте полное раскрытие.\u003c/strong\u003e Требуйте информированного согласия. Требуйте доступа к полным данным безопасности. Требуйте выплат за травмы вакцины.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЗащитите своих детей.\u003c/strong\u003e Сохраняйте настороженность против мандатов. Знайте риски. Делайте осознанные выборы.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — подробная история вакцинации против оспы и её отказов\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство опыта клинической смерти Говарда Питтмана\u003c/a\u003e — духовные измерения медицинского обмана\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические тайны: Выявленные позорные секреты иезуитов\u003c/a\u003e — Иезуитское участие в глобальных программах вакцинации\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и Фармакея — Колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/255-Vaccine_Of_The_Beast.mp4\"\u003eVaccine Of The Beast\u003c/a\u
