3eФармацевтическая промышленность представляет себя как величайший союзник человечества - спасающая жизни, излечивающая болезни, продвигающая человеческие знания. Но позади этого благодетельного фасада кроется история медицинских пыток настолько обширная, настолько систематическая и настолько постоянная, что составляет одно из величайших преступлений в человеческой истории.\u003c/p\u003e\n\u003cp\u003eОт экспериментов по сифилису в Tuskegee до программ контроля разума MKUltra, от принудительной стерилизации до несогласованного тестирования лекарств на заключенных, сиротах и умственно отсталых людях, фармацевтическо-медицинский комплекс рассматривал человеческих существ как лабораторных животных более века. И эксперименты не прекращались. Они просто становились более изощренными, более скрытыми и более глобальными.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показано во время его NDE, что второе небо организовано демоническими иерархиями, чьим основным оружием является обман. Величайшим обманом медицинского учреждения является его образ: белый халат, стерильная лаборатория, обещание исцеления. Позади этого образа, как был сказано Питтману, 97,5% христиан терпят поражение, потому что они \"никогда не сделали Иисуса Господом\" - они служат себе. И фармацевтическая промышленность - это предельное самослужение учреждение: оно создает болезнь, получает прибыль от страданий и пытает уязвимых в преследовании все больших прибылей.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"каталог-ужасов\"\u003eКаталог ужасов\u003c/h2\u003e\n\u003ch3 id=\"эксперимент-сифилиса-в-tuskegee-1932-1972\"\u003eЭксперимент сифилиса в Tuskegee (1932-1972)\u003c/h3\u003e\n\u003cp\u003eВ течение 40 лет служба общественного здравоохранения США проводила эксперимент на 600 черных мужчин в округе Мейкон, Алабама. Мужчинам было сказано, что они получают бесплатное здравоохранение для \"плохой крови\". На самом деле:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e399 мужчин с сифилисом\u003c/strong\u003e были намеренно оставлены без лечения, чтобы исследователи могли изучать развитие болезни\u003c/li\u003e\n\u003cli\u003eИм \u003cstrong\u003eникогда не сказали\u003c/strong\u003e, что у них был сифилис\u003c/li\u003e\n\u003cli\u003eИм были даны \u003cstrong\u003eплацебо вместо лечения\u003c/strong\u003e, даже после того как пенициллин стал стандартным лекарством в 1940-х годах\u003c/li\u003e\n\u003cli\u003eИм активно \u003cstrong\u003eпрепятствовали получать лечение\u003c/strong\u003e из других источников\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПо крайней мере 128 мужчин умерли\u003c/strong\u003e от сифилиса или его осложнений\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e40 жен\u003c/strong\u003e были инфицированы сифилисом\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e19 детей\u003c/strong\u003e родились с врожденным сифилисом\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eЭксперимент проводился не рогатыми учеными. Его проводило правительство Соединенных Штатов, контролируемое CDC и опубликованное в рецензируемых медицинских журналах. Медицинское учреждение знало об этом и ничего не делало в течение четырех десятилетий.\u003c/p\u003e\n\u003ch3 id=\"гватемальские-эксперименты-по-сифилису-1946-1948\"\u003eГватемальские эксперименты по сифилису (1946-1948)\u003c/h3\u003e\n\u003cp\u003eВ параллельной атрокости, исследователи правительства США намеренно инфицировали сотни гватемальцев - заключенных, психических пациентов, военных и секс-работниц - сифилисом и гонореей без их согласия. Эксперименты финансировались NIH и проводились тем же доктором Джоном Катлером, который был вовлечен в эксперимент Tuskegee.\u003c/p\u003e\n\u003cp\u003eМетоды включали:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПрямую инокуляцию с бактериями сифилиса\u003c/li\u003e\n\u003cli\u003eНанимание инфицированных секс-работниц для полового контакта с заключенными\u003c/li\u003e\n\u003cli\u003eНанесение инфицированного материала на глаза, рты и гениталии субъектов\u003c/li\u003e\n\u003cli\u003eСоскабливание кожи и нанесение жидкости, содержащей сифилис\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПо крайней мере 83 субъекта умерли. Эксперименты были скрыты более 60 лет, пока историк Сьюзан Рэверби не обнаружила их в архивных записях в 2010 году.\u003c/p\u003e\n\u003ch3 id=\"mkultra-и-контроль-разума-1953-1973\"\u003eMKUltra и контроль разума (1953-1973)\u003c/h3\u003e\n\u003cp\u003eПрограмма MKUltra ЦРУ проводила эксперименты по контролю разума на тысячах неосознающих субъектов, используя:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLSD и другие галлюциногенные наркотики\u003c/strong\u003e, вводимые без согласия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭлектросудорожная терапия\u003c/strong\u003e при экстремальных напряжениях\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСенсорная депривация\u003c/strong\u003e на продолжительные периоды\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГипноз\u003c/strong\u003e и \u003cstrong\u003eпсихологическую манипуляцию\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eВызванные наркотиками комы\u003c/strong\u003e, длящиеся недели или месяцы\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСубъектами были заключенные, психические пациенты, наркоманы, секс-работницы и члены общей публики, которые были тайно отравлены. По крайней мере один субъект - Фрэнк Олсон, исследователь ЦРУ, - умер после введения LSD без его знания. (ЦРУ утверждает, что он выпрыгнул из окна; его семья верит, что он был убит.)\u003c/p\u003e\n\u003cp\u003eПрограмма MKUltra была напрямую связана с фармацевтической промышленностью через:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eEli Lilly\u003c/strong\u003e: предоставила LSD для экспериментов ЦРУ\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSandoz Laboratories\u003c/strong\u003e (теперь Novartis): оригинальный производитель LSD\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАкадемические учреждения\u003c/strong\u003e: Гарвард, Стэнфорд, Колумбия и десятки других университетов участвовали в исследовании MKUltra, финансируемом через фронт-организации ЦРУ\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"operation-paperclip-scientists\"\u003eOperation Paperclip Scientists\u003c/h3\u003e\n\u003cp\u003eПосле Второй мировой войны правительство США набрало нацистских ученых через Operation Paperclip. Эти ученые - многие из которых проводили ужасные эксперименты на заключенных концентрационных лагерей - были даны новые личности и помещены в американские военные, медицинские и разведывательные учреждения.\u003c/p\u003e\n\u003cp\u003eНацистские эксперименты включали:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eЭксперименты с гипотермией\u003c/strong\u003e: погружение заключенных в ледяную воду для изучения холодного воздействия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭксперименты на высоте\u003c/strong\u003e: помещение заключенных в камеры низкого давления для имитации экстремальной высоты\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭксперименты с инфекционной болезнью\u003c/strong\u003e: намеренное инфицирование заключенных малярией, тифом и другими болезнями\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭксперименты с сульфаниламидом\u003c/strong\u003e: нанесение ранений заключенным и их инфицирование для тестирования антибиотиков\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭксперименты костей, мышц и нервов\u003c/strong\u003e: хирургическое удаление костей, мышц и нервов у заключенных\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eУченые, которые проводили эти эксперименты, были поглощены американским медико-военным комплексом, где их опыт был применен к новым программам человеческой экспериментации.\u003c/p\u003e\n\u003ch3 id=\"willowbrook-state-school-1963-1966\"\u003eWillowbrook State School (1963-1966)\u003c/h3\u003e\n\u003cp\u003eВ Willowbrook State School для умственно отсталых детей на Статене-Айленде, Нью-Йорк, исследователь Саул Крюгман намеренно инфицировал детей гепатитом, кормя их экстрактами стула от инфицированных пациентов. Эксперименты были оправданы как предоставление \"естественного иммунитета\" - но дети, которые не могли дать согласие, были использованы как подопытные кролики.\u003c/p\u003e\n\u003cp\u003eРодители были принуждены зачислять своих детей в эксперименты, им было сказано, что школа полна и что допуск был доступен только через программу исследования гепатита. Это производимое искусственное дефицит вынудило родителей выбирать между оставлением своих отсталых детей без ухода или подвергая их намеренному инфицированию.\u003c/p\u003e\n\u003ch3 id=\"эксперименты-holmesburg-prison-1951-1974\"\u003eЭксперименты Holmesburg Prison (1951-1974)\u003c/h3\u003e\n\u003cp\u003eВ тюрьме Holmesburg в Филадельфии дерматолог Альберт Кligman (который позже разработал Retin-A и заработал миллионы) проводил эксперименты на заключенных, используя:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eРадиоактивные изотопы\u003c/li\u003e\n\u003cli\u003eДиоксин (компонент Agent Orange)\u003c/li\u003e\n\u003cli\u003eРазличные фармацевтические соединения\u003c/li\u003e\n\u003cli\u003eХимикаты, повреждающие кожу\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКligman описал свой первый визит в Holmesburg: \"Все, что я видел перед собой, это акры кожи. Это было похоже на фермера, видящего поле в первый раз.\" Это суть фармацевтического мышления, сконденсированного в его сущность: человеческие существа как сырой материал, их страдание как возможность.\u003c/p\u003e\n\u003ch2 id=\"современные-эксперименты\"\u003eСовременные эксперименты\u003c/h2\u003e\n\u003ch3 id=\"клинические-испытания-в-развивающихся-странах\"\u003eКлинические испытания в развивающихся странах\u003c/h3\u003e\n\u003cp\u003eФармацевтическая промышленность все чаще перемещает свои клинические испытания в развивающиеся страны, где:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНормативный надзор слабее\u003c/li\u003e\n\u003cli\u003eПациенты отчаяны в любом медицинском уходе\u003c/li\u003e\n\u003cli\u003eСтандарты информированного согласия ниже\u003c/li\u003e\n\u003cli\u003eЮридическая ответственность минимальна\u003c/li\u003e\n\u003cli\u003eСубъекты стоят доли того, что они бы в Соединенных Штатах\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eСтраны, такие как Индия, Нигерия, Кения, Бразилия и Филиппины, стали испытательными площадками для фармацевтических продуктов. В 1996 году Pfizer тестировала экспериментальный антибиотик (Trovan) на детях во время эпидемии менингита в Кано, Нигерия. Одиннадцать детей умерли, и десятки были инвалидизированы. Pfizer проводила испытание без надлежащего информированного согласия и без нормативного утверждения нигерийских властей.\u003c/p\u003e\n\u003ch3 id=\"текущий-эксперимент\"\u003eТекущий эксперимент\u003c/h3\u003e\n\u003cp\u003eОбращение фармацевтической промышленности с глобальным населением как экспериментальными субъектами не прекратилось - оно было нормализовано. Маркетинг новых лекарств, расширение графиков вакцинации, медикализация нормальных человеческих условий - все это представляет текущие эксперименты, проводимые на популяции, которая обучена доверять хорошим намерениям фармацевтической промышленности.\u003c/p\u003e\n\u003ch2 id=\"духовная-архитектура-медицинских-пыток\"\u003eДуховная архитектура медицинских пыток\u003c/h2\u003e\n\u003ch3 id=\"почему-они-это-делают\"\u003eПочему они это делают\u003c/h3\u003e\n\u003cp\u003eВопрос, который преследует каждого информированного человека: как они могут это делать? Как образованные, аккредитованные, уважаемые профессионалы могут намеренно вредить невинным людям?\u003c/p\u003e\n\u003cp\u003eОтвет дает NDE Говарда Питтмана: духовное царство реально, и силы, работающие там, организованы для кражи, убийства и разрушения. Мужчины и женщины, которые проводят эти эксперименты, не просто следуют приказам или преследуют прибыль - они служат, сознательно или бессознательно, духовной иерархии, которая противостоит Богу и ненавидит его творение.\u003c/p\u003e\n\u003cp\u003e95% служащих \"себе\" - цифра Питтмана - включает исследователей, которые подавляют свою совесть для карьерного продвижения, руководителей, которые одобряют эксперименты, которые они знают, причинят вред, и регуляторов, которые смотрят в другую сторону, потому что система их платит, чтобы это делать. Они никогда не сделали Иисуса Господом. Они служат себе - и, служа себе, они служат начальствам и властям Ефесян 6:12.\u003c/p\u003e\n\u003ch3 id=\"план-иезуитов\"\u003eПлан иезуитов\u003c/h3\u003e\n\u003cp\u003eОрден иезуитов предоставляет организационный шаблон для этого зла. Слепое повиновение. Абсолютная иерархия. Подавление индивидуальной совести в пользу институциональных целей. \"Всякие виды порока\", разрешенные в служении целям ордена. Это характеристики ордена иезуитов, и это характеристики фармацевтической промышленности.\u003c/p\u003e\n\u003cp\u003eКлятва иезуитов требует, чтобы агенты инфильтрировали каждое учреждение \"скрытой хитростью\". Фармацевтическая промышленность инфильтрировала каждое учреждение, управляющее здоровьем человека: FDA, CDC, NIH, ВОЗ, медицинские школы, больницы и страховые компании. Инфильтрация полная. Контроль абсолютный. И эксперименты продолжаются.\u003c/p\u003e\n\u003ch2 id=\"дополнительная-информация\"\u003eДополнительная информация\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — обширная документация преступлений фармацевтической промышленности\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — духовные силы позади институционального зла\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — иезуитский метод, применяемый к институциональному контролю\u003c/li\u003e\n\u003cli\u003e\u003ca href
