ли изгнаны из Храма, потому что десятины были отвлечены, он не просто восстановил десятины. Он противостоял должностным лицам, которые позволили отвлечение, очистил камеры и установил новый надзор. Деньги были неправильно распределены — не внешним врагам, но внутренней коррупцией. Те же фонды, означенные поддерживать дом Бога, были переориентированы служить приватным интересам.\u003c/p\u003e\n\u003cp\u003eКак раскрывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e, запретное знание всегда несёт цену — и цена всегда платится теми, кто не выбирал его преследовать. Система гранта исследования NIH потратила десятилетия направляя деньги налогоплательщика в программы исследования, которые продвинули интересы промышленности фармацевтических, тогда как пренебрегаете фундаментальными вопросами о общественном здоровье, что агентство было создано ответить.\u003c/p\u003e\n\u003cp\u003eЗаморозка наступила. Десятины были остановлены. И должностные лица, которые отвлекли их, спрашивают почему.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"машина-гранта-nih\"\u003eМашина гранта NIH\u003c/h2\u003e\n\u003cp\u003eНациональные институты здоровья это наиболее большой публичный финансиер биомедицинского исследования в мире, с годовым бюджетом превышающим $47 миллиардов. Подавляющее большинство этого бюджета — приблизительно $32 миллиардов — распределено через гранты исследования университетам, медицинским школам, учреждениям исследования и отдельным учёным по всей стране и вокруг мира.\u003c/p\u003e\n\u003cp\u003eСистема гранта NIH формирует американское биомедицинское исследование в его целостности. Темы исследования, которые получают финансирование NIH, преследуются. Темы, которые не получают финансирование NIH, отказано. Учёные, которые выравнивают их исследование с приоритетами NIH, получают финансирование, пребывание должности и престиж. Учёные, которые преследуют вопросы за пределами приоритетов NIH, сталкиваются с стагнацией карьеры.\u003c/p\u003e\n\u003cp\u003eЭта система даёт NIH — и подставкой, должностные лица, которые контролируют приоритеты финансирования NIH — эффективную власть вето над направлением американской биомедицинской науки. Если NIH решает, что вопрос не должен быть изучен, не будет изучен. Если NIH решает, что подход исследования должен быть приоритизирован, это будет приоритизировано. Агентство не просто финансирует науку — это направляет её.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report (karenkingston.substack.com), что приоритеты финансирования NIH были систематически выравнены с интересами промышленности фармацевтических: \"NIH не финансирует исследование, которое угрожает фармацевтическому доходу. Это не финансирует сравнительные исследования вакцинированных vs. невакцинированных популяций. Это не финансирует исследование в естественный иммунитет. Это не финансирует расследования в коренные причины хронического заболевания, которое могло бы вовлечь фармацевтические продукты. Это финансирует исследование, которое поддерживает разработку, маркетинг и развёртывание фармацевтических продуктов — потому что должностные лица, которые устанавливают приоритеты финансирования, соединены с промышленностью, которая выигрывает от них.\"\u003c/p\u003e\n\u003ch3 id=\"проблема-роялти\"\u003eПроблема роялти\u003c/h3\u003e\n\u003cp\u003eКритический и неподчёркиваемый аспект коррупции NIH -- это система роялти. Учёные NIH — включая те в лидерских позициях, которые влияют на решения финансирования — право получать персональные платежи роялти от фармацевтических компаний, которые коммерциализируют технологии развитые с поддержкой NIH.\u003c/p\u003e\n\u003cp\u003eМежду 2010 и 2020, учёные NIH получили оценённую $350 миллионов в платежах роялти от фармацевтических и биотехнологических компаний. Эти платежи были сделаны отдельным учёным — не агентству — и не были публично раскрыты до принудительной FOIA судебной тяжбы.\u003c/p\u003e\n\u003cp\u003eКонфликт интереса потрясающий. Учёные NIH, которые получают роялти от фармацевтических компаний, те же учёные, которые:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eУстанавливают приоритеты финансирования исследования\u003c/li\u003e\n\u003cli\u003eРассматривают применение гранта от других исследователей\u003c/li\u003e\n\u003cli\u003eСлужат на рекомендательных комитетах, которые влияют на политику препарата и вакцины\u003c/li\u003e\n\u003cli\u003eДелают решения о том, какие вопросы исследования не стоит преследовать\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eУчёный, получающий персональные роялти от Moderna, имеет финансовый интерес в исследовании, которое поддерживает продукты Moderna — и финансовый стимул противодействия финансировать исследование, которое могло бы вопрос им.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"заморозка\"\u003eЗаморозка\u003c/h2\u003e\n\u003cp\u003eЗаморозка президента Трампа на утверждениях гранта NIH и финансировании исследования останавливает поток деньги налогоплательщика через систему, которая задокументирована работать с распространённых конфликтов интереса и неадекватного надзора. Заморозка охватывает:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eНовые утверждения гранта:\u003c/strong\u003e Нет новых грантов исследования NIH будут утверждены во время периода заморозки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбновления гранта:\u003c/strong\u003e Существующие гранты не будут возобновлены до комплексного рассмотрения приоритетов финансирования NIH и политик конфликта-интереса завершено.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВнутреннее исследование:\u003c/strong\u003e Исследование, проведённое в собственных лабораториях NIH, предмет рассмотрения для выравнивания с переформированными приоритетами агентства.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМеждународные гранты:\u003c/strong\u003e Финансирование NIH, текущее к международным учреждениям исследования — включая учреждения, вовлечённые в исследование усиления функций — морозиться в ожидании рассмотрения.\u003c/p\u003e\n\u003cp\u003eЗаморозка не затрагивает гранты, которые уже были распределены или исследование, которое в настоящее время проводится в соответствии с существующим финансированием. Это затрагивает трубопровод — следующий раунд грантов, обновления и утверждения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"ответ\"\u003eОтвет\u003c/h2\u003e\n\u003cp\u003eНаучное учреждение реагировало с беспрецедентной тревогой. Администраторы университета предупредить закрытия лаборатории. Руководители отделения предупредить отпускания исследователя. Научные журналы публикуют редакционные статьи чтение \"политизации науки\". Нобелевские лауреаты подписывают открытые письма требующие восстановления финансирования.\u003c/p\u003e\n\u003cp\u003eНо тревога выборочна. То же научное учреждение, которое теперь требует восстановления финансирования налогоплательщика:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНе поднимало тревогу, когда приоритеты финансирования NIH были выравнены с интересами промышленности фармацевтических\u003c/li\u003e\n\u003cli\u003eНе требовало прозрачности, когда учёные NIH получили сотни миллионов в персональных роялти от компаний они были предполагаться наблюдать\u003c/li\u003e\n\u003cli\u003eНе выразили возражение, когда финансирование NIH поддержало разработку продуктов развёрнутых в соответствии с Чрезвычайным авторизацией использования без завершённых клинических испытаний\u003c/li\u003e\n\u003cli\u003eНе протестировали, когда финансирование NIH было использовано поддержать исследование усиления функций в иностранных лабораториях\u003c/li\u003e\n\u003cli\u003eНе требовало ответственности, когда NIH подавило исследование раннего лечения, которое угрожало структуре EUA\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u003c/a\u003e документирует, как потоки финансирования, соединяющие федеральные учреждения, подрядчиков защиты и фармацевтические компании, создают самоустойчивую экосистему, в которой те же деньги, циклирующие через те же учреждения, производящие те же результаты, независимо от публичного интереса.\u003c/p\u003e\n\u003cp\u003eКингстон заметила: \"Научное учреждение не встревожено, потому что исследование остановится. Это встревожено, потому что деньги остановятся. Система гранта NIH не просто механизм финансирования — это система покровительства. Университеты зависят от косвенных платежей стоимости NIH (косвенная стоимость), которые финансируют их администрацию, их здания и их расширение. Исследователи зависят от грантов NIH для их зарплат, их сроков имущества и их престижа. Заморозка угрожает не научному прогрессу, но институциональному доходу.\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческая-линза\"\u003eПророческая линза\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Будет ли человек обкрадывать Бога? Но вы обкрадываете Меня и говорите: \"в чём мы обкрадываем Тебя?\" В десятинах и приношениях.\" — Малахия 3:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eNIH был создан служить американцам — использовать деньги налогоплательщика продвинуть знание, которое защищает и улучшает человеческое здоровье. Вместо этого, агентство служило фармацевтической промышленности — используя деньги налогоплательщика разработать продукты, которые генерируют приватный прибыль, пока оставляя публика нести расходы и последствия.\u003c/p\u003e\n\u003cp\u003eЭто форма кражи. Десятины американцев — их налоговые доллары — были предложены для цели здоровья. Они были отвлечены к цели прибыли. Заморозка попытка восстановить оригинальную цель приношения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-сэмюэля-8\"\u003eПредупреждение 1 Сэмюэля 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всём, что они говорят тебе; ибо не тебя они отвергли, но отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Сэмюэля 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Сэмюэля 8 отзывается через каждый коридор правительства сегодня. Когда Израиль потребовал царя, как другие нации, Бог предупредил их точно что произойдёт — их сыновья взяты для войны, их дочери для услуги, их поля и виноградники захвачены, десятая часть всего конфискована. Они выбрали человеческое правительство над реймом Бога и тирания последовала точно, как обещано. Ничего не изменилось. Современная политическая система две крылья того же птицы — левый и правый, республиканец и демократ — все служащие той же скрытой степени структуры мощности. Голосование для одной стороны выбирающие, какое крыло хлопает далее, тогда как птица летит в том же направлении. Реальная мощь никогда не была на каком-нибудь бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eNIH.gov — Бюджет, документация программы гранта и финансовая статистика\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) — Анализ Карен Кингстон конфликтов финансирования NIH, документация платежа роялти и захват учреждения через систему гранта\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eOpen The Books — Раскрытия платежа роялти NIH, полученные через FOIA\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eОфис внешреннего исследования NIH — Политики управления грантом\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eЛюк 16:10, Малахия 3:8 (KJV)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Сэмюэля 8 — Предупреждение против земных королей (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство близости к смерти Ховарда Питтмана — предупреждение о конце времён\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u003c/a\u003e — Федеральные потоки финансирования, соединяющие учреждения и промышленность\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/171-Great_Reset_Rising.mp4\"\u003eGreat Reset Rising\u003c/a\u003e — Институциональная экосистема угрожала реформой\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/
