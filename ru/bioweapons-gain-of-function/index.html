ote\u003e\n\u003cp\u003eЧумы, записанные в Священных Писаниях, были инструментами божественного суда, wielded рукой Бога против врагов Его народа. От десяти казней Египетских к чуме, поразившей Израиль после переписи Давида, болезнь в библейском рекорде служит суверенной цели. Но что происходит, когда люди присваивают себе силу чумы — когда лаборатории заменяют руку Бога рукой военно-промышленного комплекса, и патогены инженированы не по божественному декрету, но по государственному контракту?\u003c/p\u003e\n\u003cp\u003eСоздание биологического оружия — по своей сути акт глубокого духовного восстания. Это люди, захватывающие силу чумы — одного из четырёх всадников Откровения — и пытающиеся ездить на ней для геополитического преимущества. Инженеры исследования получения функций — не просто учёные; они современные колдуны, манипулирующие строительными блоками жизни способами, которые Священные Писания явно предостерегают. Границы между видами, между естественным и неестественным, были установлены Богом в Бытии. Нарушить эти границы умышленно — взять вирус, который заражает летучих мышей, и инженировать его для заражения людей — это повторить преступление, которое принесло суд над древним миром.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"fort-detrick-штаб-биологического-оружия-америки\"\u003eFort Detrick: штаб биологического оружия Америки\u003c/h2\u003e\n\u003cp\u003eИстория современного биооружия начинается в Fort Detrick, установке армии США в Фредерике, Мэриленде, которая служила центром программы биологического войны Америки с 1943 года. Первоначально установлен как Camp Detrick во время Второй мировой войны, объект был создан для разработки наступательного биологического оружия в ответ на разведку, что Япония и Германия преследовали свои собственные программы биооружия.\u003c/p\u003e\n\u003cp\u003eНа протяжении 1940-х и 1950-х годов учёные Fort Detrick вооружили сибирскую язву, бруцеллу, туляремию, венесуэльский конский энцефалит и десятки других патогенов. Программа была обширной: на её пике Fort Detrick нанимал тысячи учёных и техников, работающих в нескольких лабораториях, посвящённых производству, хранению и доставке биологических агентов, способных вызывать массовые жертвы.\u003c/p\u003e\n\u003cp\u003eВ 1969 году президент Ричард Никсон подписал исполнительный приказ, официально прекращающий американскую программу наступательного биологического оружия. Существующие запасы были предположительно уничтожены между 1971 и 1972 годами, и Fort Detrick был остановлен для преобразования в оборонительное исследовательское учреждение под вновь созданным Армейским институтом медицинских исследований инфекционных заболеваний США (USAMRIID). Конвенция о биологическом оружии (BWC) 1972 года, ратифицированная Соединёнными Штатами в 1975 году, запретила разработку, производство и накопление биологического оружия.\u003c/p\u003e\n\u003cp\u003eНо линия между \"наступательным\" и \"оборонительным\" биологическим исследованием — это различие без разницы. Оборонительное исследование требует работы с тем же патогенами, теми же техниками улучшения и теми же механизмами доставки, как и наступательное исследование. Единственная разница — заявленное намерение — и намерение невидимо микроскопу. Fort Detrick никогда не прекращал работу с самыми опасными патогенами мира. Он просто изменил канцелярию.\u003c/p\u003e\n\u003cp\u003eВ августе 2019 года самые защищённые лаборатории Fort Detrick были внезапно закрыты CDC следуя \"биобезопасности lapses\" с вовлечением обращения с опасными патогенами. Конкретная природа этих lapses была классифицирована. Закрытие произошло всего несколько месяцев до первых зарегистрированных случаев COVID-19 — совпадение, которое вызвало значительное тщательное рассмотрение от исследователей во всём мире, включая формальные дипломатические запросы от правительства Китая.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"получение-функций-наука-делающая-патогены-более-опасными\"\u003eПолучение функций: наука, делающая патогены более опасными\u003c/h2\u003e\n\u003cp\u003eИсследование получения функций — это практика умышленного улучшения трансмиссивности, вирулентности или диапазона хоста патогенов. На простом языке, это означает взять вирус, который опасен, и сделать его более опасным — инженировать его для распространения быстрее, убийства более эффективно, или прыжка от животных к людям.\u003c/p\u003e\n\u003cp\u003eЗаявленное обоснование для этого исследования — подготовка к пандемии. Сторонники утверждают, что, понимая, как патоген может стать более опасным, учёные могут развить меры противодействия — вакцины, терапевтики, системы надзора — до того, как естественная пандемия произойдёт. Это аргумент, продвинутый вирологами, такими как Dr. Ralph Baric Университета Северной Каролины и Dr. Peter Daszak EcoHealth Alliance, оба из которых получили обширное федеральное финансирование для исследования получения функций на коронавирусах.\u003c/p\u003e\n\u003cp\u003eКонтраргумент разрушителен в его простоте: если вы инженируете патогены, которые ещё не существуют в природе, вы не подготавливаетесь к естественной пандемии — вы создаёте условия для неестественной. Вы производите самую угрозу, которую вы утверждаете защищаете против. И если этот инженированный патоген убегает из лаборатории — через несчастный случай, пренебрежение, или намерение — вы не предотвращали пандемию. Вы вызвали одну.\u003c/p\u003e\n\u003cp\u003eЭто не гипотетическая проблема. Утечки лаборатории — не редкие события. Расследование 2014 года USA Today выявило более 100 биобезопасности инцидентов в американских лабораториях в предыдущем десятилетии, включая случайное воздействие на сибирскую язву, птичий грипп и оспу. Вспышка H1N1 гриппа 1977 года широко считается произошедшей из утечки лаборатории. Вирус SARS убежал из китайских лабораторий по крайней мере четыре документированных раза между 2003 и 2004 годами.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"трубопровод-wuhan-chapel-hill-как-американские-деньги-построили-китайскую-биолабораторию\"\u003eТрубопровод Wuhan-Chapel Hill: как американские деньги построили китайскую биолабораторию\u003c/h2\u003e\n\u003cp\u003eСоединение между американским исследованием получения функций и Wuhan Institute of Virology (WIV) — это не теория заговора. Это документированный путь финансирования, который работает через базы данных федеральных грантов, опубликованные научные работы и свидетельство самих исследователей.\u003c/p\u003e\n\u003cp\u003eDr. Ralph Baric, исследователь коронавируса в Chapel Hill университета Северной Каролины, — один из передовых мировых экспертов в инженерии коронавирусов для повышения их трансмиссивности и патогенности. В документе 2015 года, опубликованном в \u003cem\u003eNature Medicine\u003c/em\u003e, Baric и Dr. Zhengli Shi Wuhan Institute of Virology описали их создание химерного коронавируса — синтетического вируса, объединяющего белок спайка коронавируса летучей мыши (SHC014) с позвоночником SARS-подобного вируса, адаптированного для мышей. Этот инженированный вирус был показан быть способным заражать человеческие дыхательные клетки.\u003c/p\u003e\n\u003cp\u003eДокумент признал финансирование от National Institutes of Health (NIH), конкретно от National Institute of Allergy and Infectious Diseases (NIAID) — дивизии возглавляемой Dr. Anthony Fauci. Он также признал поддержку из EcoHealth Alliance, некоммерческой организации возглавляемой Dr. Peter Daszak, которая служила главным проводником для направления американских налогоплательщиков долларов в Wuhan Institute of Virology.\u003c/p\u003e\n\u003cp\u003eМежду 2014 и 2019 годами EcoHealth Alliance получила приблизительно 3.7 миллиона долларов в финансировании NIH грантов под номером гранта R01AI110964, значительная часть которых была подконтрактована Wuhan Institute of Virology. Заявленной целью было изучение коронавирусов летучей мыши в Китае. Но исследование, проведённое под этим грантом, включало эксперименты получения функций на коронавирусах — точно тип исследования, который мораль 2014 должна была остановить.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"духовное-отражение-чума-ходящая-в-тьме\"\u003eДуховное отражение: чума, ходящая в тьме\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Не убойся ужаса в ночи, ни стрелы, летящей днём, ни язвы, ходящей во мраке, ни истребления, действующего в полдень.\" — Псалом 91:5-6\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПсалмопевец говорит о чуме, которая ходит во мраке — невидимой, молчаливой, движущейся через невидимую сферу. В древнем мире чума была понята как духовная сила, wielded божественным авторитетом. Казни Египетские не появились из лаборатории. Они пришли из руки Бога.\u003c/p\u003e\n\u003cp\u003eНо есть другой вид чумы — та, которая ходит в тьме классифицированных лабораторий, военных контрактов и редактированных предложений грантов. Это чума человеческой инженерии, рождённая не из божественного суда, а из человеческой амбиции. Она ходит в тьме секретности, скрытой от надзора Конгресса, защищённой от общественного тщательного рассмотрения, и финансируемой самыми налогоплательщиками, которых она подвергает опасности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/179-Engineering_Contagion.mp4\"\u003eEngineering Contagion\u003c/a\u003e — Инженерия биологических угроз\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/61-Synthetic_Biology.mp4\"\u003eSynthetic Biology\u003c/a\u003e — Технология платформы биооружия\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u003c/a\u003e — Военная биозащита и её последствия\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/military-pharmaceutical-partnership/?lang=ru\"\u003eThe Military-Pharmaceutical Partnership\u003c/a\u003e — Как Министерство обороны и фармацевтические корпорации объединились в единый биозащитно-промышленный комплекс\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/event-201-pandemic-blueprint/?lang=ru\"\u003eEvent 201: The Pandemic Blueprint\u003c/a\u003e — Упражнение на столе, которое репетировало каждый элемент ответа на пандемию неделями до появления COVID-19\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/darpa-dark-winter-military-origins/?lang=ru\"\u003eDARPA Dark Winter and Military Origins\u003c/a\u003e — Военные симуляции, которые предшествовали реальным биологическим событиям с жуткой точностью\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eЧумы Египетские были инструментами божественного освобождения — акты Бога, предназначенные для освобождения Его народа от рабства. Чумы современной эры — инструменты человеческого контроля — акты людей, предназначенные для наложения новой рабства на нации. Когда человек берёт силу чумы и wielding её для геополитического преимущества, он не становится Богом. Он становится фараоном. И Бог, который освободил Израиль из руки фараона, не изменился.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/health/\",\"className\":\"category-badge\",\"children\":\"health\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Биооружие и получение функций: инженерия следующей чумы\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Документированная история исследования получения функций, от программы биологического оружия Fort Detrick к Wuhan Institute of Virology, раскрывает многолетний конвейер, где военные органы финансируют инженерию наддозированных патогенов под видом подготовки к пандемии. DARPA, NIH и EcoHealth Alliance формируют триаду, которая отдала на аутсорс американское исследование биооружия иностранным лабораториям.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-01-06T10:00:00Z\",\"children\":\"6 января 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"bioweapons\",{\"href\":\"/ru/tag/bioweapons/\",
