quote\u003e\n\u003cp\u003eКогда Лот медлил в Содоме, ангелы схватили его за руку и вытащили из города. Команда была не подлежащей обсуждению. Город был развращен сверх реформирования, и любой, кто остался, разделил бы его суд. Уход был не отказом -- это была выживание.\u003c/p\u003e\n\u003cp\u003eКак раскрывает трек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e, армии противника организуют себя в иерархии -- местные, региональные, национальные и глобальные. Всемирная организация здравоохранения представляет глобальный уровень управления здравоохранением -- наднациональный орган, который координирует реакцию на пандемию, устанавливает стандарты политики здравоохранения и стремится к авторитету на основе договора, чтобы отменить суверенитет отдельных наций.\u003c/p\u003e\n\u003cp\u003eСоединенные Штаты вышли. Вопрос заключается в том, полный ли выход -- или щупальца глобального управления здравоохранением настолько глубоко внедрились в американские учреждения, чтобы их можно было перерезать исполнительным действием.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"воз-история-захватанного-авторитета\"\u003eВОЗ: история захватанного авторитета\u003c/h2\u003e\n\u003cp\u003eВсемирная организация здравоохранения была учреждена в 1948 году как специализированное учреждение Организации Объединенных Наций, уполномоченное направлять и координировать международную работу в области здравоохранения. Его первоначальный мандат -- профилактика и контроль эпидемических болезней, улучшение питания, жилищных условий и санитарии, а также продвижение исследований здравоохранения.\u003c/p\u003e\n\u003cp\u003eНа протяжении последующих десятилетий роль ВОЗ расширилась от координирования к авторитету. Международные медицинские правила (IHR), впервые принятые в 1969 году и существенно переработанные в 2005 году, дали Генеральному директору ВОЗ полномочия объявлять Чрезвычайную ситуацию в области здравоохранения с международным значением (ЧСЗМ) -- объявление, которое активирует предварительно согласованные протоколы реагирования во всех государствах-членах.\u003c/p\u003e\n\u003cp\u003eВо время пандемии COVID-19 объявление ЧСЗМ ВОЗ активировало глобальную рамку реагирования, которая привела к синхронизированным блокировкам, закрытию границ, мандатам на вакцинацию и режимам цензуры в десятках стран. Скорость и однородность реагирования продемонстрировали, что авторитет ВОЗ был не просто консультативным -- он был оперативным.\u003c/p\u003e\n\u003cp\u003eКарен Кингстон задокументировала в The Kingston Report (karenkingston.substack.com), что авторитет ВОЗ во время COVID-19 простирался на подавление научного инакомыслия. \"Позиции ВОЗ по масочным, блокировкам, естественному иммунитету и раннему лечению были приняты платформами социальных сетей в качестве стандарта, по которому измерялась 'дезинформация',\" написала Кингстон. \"Любая научная позиция, которая противоречила ВОЗ -- даже позиции, которые позже оказались правильными -- была подвергнута цензуре. ВОЗ не просто координировала здравоохранение. Она контролировала информационную среду.\"\u003c/p\u003e\n\u003ch3 id=\"договор-о-пандемии\"\u003eДоговор о пандемии\u003c/h3\u003e\n\u003cp\u003eНаиболее значительная угроза, создаваемая ВОЗ, -- это не ее прошлое использование авторитета, а его будущее расширение. ВОЗ ведет переговоры о Договоре о пандемии (формально \"соглашение ВОЗ, конвенция или другой международный инструмент о профилактике пандемии, готовности и реагировании\"), который бы:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПредоставил Генеральному директору ВОЗ обязывающий авторитет объявлять чрезвычайные ситуации в области пандемии и направлять ответы государств-членов\u003c/li\u003e\n\u003cli\u003eУстановил глобальную сеть наблюдения за угрозами пандемии, включая авторитет доступа к национальным данным здравоохранения\u003c/li\u003e\n\u003cli\u003eСоздал механизмы справедливого распределения медицинских контрмер, включая авторитет направлять распределение вакцин и терапевтических средств, произведенных государствами-членами\u003c/li\u003e\n\u003cli\u003eРеализовал наблюдение \"One Health\", интегрирующее здравоохранение человека, здравоохранение животных и мониторинг окружающей среды в единую глобальную систему\u003c/li\u003e\n\u003cli\u003eУстановил механизмы финансирования, требующие от государств-членов вносить процент своих бюджетов здравоохранения на подготовку к пандемии ВОЗ\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПредложенный договор трансформировал бы ВОЗ из координирующего органа в управляющий орган -- с юридическим полномочием направлять внутреннюю политику здравоохранения суверенных наций во время объявленных чрезвычайных ситуаций. Учитывая, что Генеральный директор ВОЗ имеет единственный авторитет объявлять ЧСЗМ, это фактически предоставляет одному неизбранному должностному лицу власть активировать обязывающие международные обязательства для государств-членов.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"выход\"\u003eВыход\u003c/h2\u003e\n\u003cp\u003eВыход Соединенных Штатов из ВОЗ разрывает членство нации в организации, прекращает ее финансовые взносы (США были крупнейшим финансировщиком ВОЗ, вносившим примерно 700 миллионов долларов в год) и удаляет Соединенные Штаты из переговорной рамки для Договора о пандемии.\u003c/p\u003e\n\u003cp\u003eВыход был осуществлен посредством исполнительного действия президента, следуя прецеденту, установленному уведомлением о выходе администрации Трампа первого срока в 2020 году (которое было отменено администрацией Байдена в первый день своего пребывания в должности).\u003c/p\u003e\n\u003cp\u003eПоследствия далеко идущие:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФинансовые:\u003c/strong\u003e Потеря годовых взносов Соединенных Штатов в 700 миллионов долларов представляет примерно 15% от общего бюджета ВОЗ. Это заставит ВОЗ сократить операции, искать альтернативное финансирование (вероятно, от Фонда Билла и Мелинды Гейтс, который уже является вторым по величине финансировщиком ВОЗ), или и то, и другое.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПолитические:\u003c/strong\u003e Выход удаляет Соединенные Штаты из переговоров о Договоре о пандемии, обеспечивая, что договор -- если он будет принят -- не будет связывать Соединенные Штаты. Однако другие страны, которые остаются сторонами договора, могут реализовать его положения, создавая рамку глобального управления здравоохранением, которая работает наряду, но не через Соединенные Штаты.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОперативные:\u003c/strong\u003e Выход удаляет Соединенные Штаты из сетей наблюдения ВОЗ за болезнями, соглашений об обмене данными и скоординированных рамок реагирования. Это создает как риски (сокращенный доступ к международной разведке о болезнях), так и преимущества (свобода от директив ВОЗ, которые могут конфликтовать с национальной политикой здравоохранения).\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"система-зверя-на-глобальном-уровне\"\u003eСистема Зверя на глобальном уровне\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И поклонятся ему все жители земли, которых имена не написаны в книге жизни у Агнца, закланного от создания мира.\" — Откровение 13:8\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДоговор о пандемии ВОЗ представляет глобальный уровень системы Зверя, описанной в Откровении 13 -- систему, в которой единственный орган власти имеет господство над \"всеми племенами и языками и народами\" (Откровение 13:7). Положения договора предоставляют наднациональной организации обязывающий авторитет над политикой здравоохранения суверенных наций, направляемой одним должностным лицом, чей авторитет не может быть оспорен гражданами любого государства-члена.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e задокументировать, как \"Сценарии для будущего технологии и международного развития\" Фонда Рокфеллера 2010 года описали сценарий \"Lock Step\", в котором пандемия позволила правительствам по всему миру навязывать авторитарные контроли, которые население принимало и которые сохранялись задолго после окончания пандемии. Реакция ВОЗ на пандемию COVID-19 последовала этому сценарию с замечательной точностью.\u003c/p\u003e\n\u003cp\u003eВыход США из ВОЗ удаляет нацию из этой архитектуры глобального управления. Но архитектура продолжает быть построена -- и оставшиеся 193 государства-члена остаются подчиненными ее авторитету.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всем, что он говорит тебе; ибо не тебя они отвергли, но Меня отвергли, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (КЖВ)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отражается через каждый коридор правительства сегодня. Когда Израиль потребовал царя, как и другие народы, Бог предупредил их точно, что произойдет -- их сыновья взяты на войну, их дочери на служение, их поля и виноградники отняты, десятая часть всего конфискована. Они выбрали человеческое правление вместо Божьего царства, и тирания последовала точно, как было обещано. Ничего не изменилось. Современная политическая система -- два крыла одной птицы -- левое и правое, республиканцы и демократы -- все служат одной скрытой структуре власти. Голосование за любую сторону -- это выбор того, какое крыло будет хлопать следующим, пока птица летит в одном направлении. Истинная власть никогда не была на бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eWhiteHouse.gov -- Исполнительное действие по выходу из ВОЗ\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe Kingston Report (karenkingston.substack.com) -- Анализ Карен Кингстон структуры авторитета ВОЗ, положений Договора о пандемии и последствий глобального управления здравоохранением\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eВОЗ -- Международные медицинские правила (2005 г.) и документы переговоров о Договоре о пандемии\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eФонд Рокфеллера -- \"Сценарии для будущего технологии и международного развития\" (2010 г.)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eОткровение 18:4, Откровение 13:7-8 (КЖВ)\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 -- Предупреждение против земных царей (КЖВ)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство Ховарда Питтмана о предсмертном опыте -- Предупреждение об конце времени, которое дал ему Бог\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические доверительные: раскрытые позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — Глобальное управление, следующее сценарию Rockefeller Lock Step\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/171-Great_Reset_Rising.mp4\"\u003eGreat Reset Rising\u003c/a\u003e — Строительство наднациональных структур управления\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/165-Event_201_Came_True.mp4\"\u003eEvent 201 Came True\u003c/a\u003e — Роль ВОЗ в симуляции пандемии, которая стала реальностью\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction (The Cave of Treasures):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eSatan's Hosts\u003c/a\u003e — Глобальная иерархия авторитета противника\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e — Наднациональные силы, работающие вне ответственности человека\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/trump-obliterates-who-h5n1/?lang=ru\"\u003eTrump Obliterates WHO Plans for H5N1 Pandemic\u003c/a\u003e — Отказ от следующей повести о пандемии ВОЗ\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/trump-bans-gain-of-function/?lang=ru\"\u003eTrump Executive Order Bans Gain-of-Function Research\u003c/a\u003e — Закрытие внутреннего конвейера исследований\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/trump-blow-bird-flu-surveillance/?lang=ru\"\u003eTrump Delivers Shocking Blow to Bird Flu Surveillance Program\u003c/a\u003e — Демонтаж инфраструктуры наблюдения, согласованной ВОЗ\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/hhs-maha-transformation/?lang=ru\"\u003eHHS Announces MAHA Transformation of Healthcare\u003c/a\u003e — Национальная альтернатива глобальному управлению здравоохранением\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eКоманда \"выйти из нее\" -- это не предложение. Это императив -- вызванный признанием того, что участие в развращенной системе делает участника соучастником в его коррупции. Соединенные Штаты вышли из ВОЗ. Ангелы схватили нацию за руку и вытащили ее из города. Будет ли она оглядываться -- вернется ли, когда политические ветры переменятся, когда объявляется следующая пандемия, когда давление соответствия глобальному управлению здравоохранением становится неодолимым -- будет определять, является ли выход спасением или просто задержкой. \"Помните жену Лота\" (Лука 17:32). Она оглянулась и была потеряна.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Соединенные Штаты выходят из Всемирной организации здравоохранения\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.
