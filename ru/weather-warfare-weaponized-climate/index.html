рные ветры — это не случайные атмосферные явления — это инструменты божественной воли, исполняющие цели Создателя. Казни египетские включали град и тьму. Илия вызвал огонь с неба. Потоп Ноя был судом воды и ветра. По всему библейскому рекорду погода wielded рукой Бога для Его целей.\u003c/p\u003e\n\u003cp\u003eКогда люди присваивают себе власть контролировать погоду, они претендуют на власть, которую Писание приписывает только Богу. Война за погоду не просто военная стратегия — это духовное предположение космических пропорций. Люди, которые сеют облака, нагревают ионосферу и направляют штормы, не просто манипулируют атмосферой. Они узурпируют божественный prerogative, претендуя на доминирование над самыми силами, которые Бог объявил Своими инструментами.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/117-The_Burning_of_Sin.mp4\"\u003eГорение греха\u003c/a\u003e вызывает, огонь с неба всегда был связан с божественным судом. Когда люди создают огонь с неба через направленную энергию или засухи через манипуляцию погоды, они создают подделку божественной власти — имитацию суверенитета, который служит не справедливости, а военному доминированию.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"операция-попай-первая-признанная-война-за-погоду\"\u003eОперация Попай: первая признанная война за погоду\u003c/h2\u003e\n\u003cp\u003eПервым подтвёрнённым военным использованием модификации погоды как оружия войны была операция Попай, проводимая ВВС США во время войны во Вьетнаме между 1967 и 1972 годами. Операция включала посев облаков над тропой Хо Ши Мина и другими стратегическими областями Лаоса, Камбоджи и Вьетнама с использованием йодида серебра и йодида свинца, распределяемых из самолётов WC-130.\u003c/p\u003e\n\u003cp\u003eЦель была продлить сезон муссонов, увеличить выпадение осадков на 30% или более, смягчить поверхность дорог, вызвать оползни, вымывать переходы рек и в целом нарушить линии снабжения северного Вьетнама вдоль тропы Хо Ши Мина. Девиз операции был \"делай грязь, не войну\" — фраза, которая скрывала серьёзность программы, которая использовала саму погоду как инструмент военной стратегии.\u003c/p\u003e\n\u003cp\u003eОперация Попай была классифицирована и проводилась без знания Конгресса или американской общественности. Когда журналист Джек Андерсон раскрыл программу в 1971 году, раскрытие способствовало принятию Конвенции об изменении окружающей среды (ENMOD) в 1977 году — международного договора, который запрещает военное использование методов изменения окружающей среды. Соединённые Штаты подписали и ратифицировали конвенцию ENMOD.\u003c/p\u003e\n\u003cp\u003eНо договор содержит критическую лазейку: он запрещает \"враждебное\" использование модификации окружающей среды, но не запрещает исследования и разработки в \"мирных\" целях. Это различие — идентичное лазейке \"наступательное против оборонительного\" в биологическом оружейном праве — означает, что нации могут разрабатывать, тестировать и поддерживать способность модификации погоды бесконечно, пока они утверждают, что исследование предназначено для мирных целей. Способность вести войну за погоду может быть разработана под видом климатических исследований, и переход от исследования к оружию требует ничего больше, чем изменение заявленного намерения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"haarp-ионосферный-нагреватель\"\u003eHAARP: ионосферный нагреватель\u003c/h2\u003e\n\u003cp\u003eПрограмма высокочастотного активного аурального исследования (HAARP), расположенная в Гакона, на Аляске, является наиболее мощным ионосферным нагревательным объектом в мире. Построённый между 1993 и 2007 годами стоимостью более 300 миллионов долларов, HAARP состоит из 180 высокочастотных антенн, способных передавать 3,6 мегаватт электромагнитной энергии в ионосферу — электрически заряженный слой атмосферы, который существует между приблизительно 60 и 600 километрами над поверхностью Земли.\u003c/p\u003e\n\u003cp\u003eЗаявленная цель HAARP — базовое ионосферное исследование — изучение свойств ионосферы для приложений в коммуникации и наблюдении. Но способности объекта выходят далеко за рамки академического исследования, и его военное происхождение (он был финансирован ВВС США, ВМС США и DARPA) указывают на основной интерес к военным приложениям.\u003c/p\u003e\n\u003cp\u003eОбъект HAARP может нагревать локализованную область ионосферы, сосредоточивая интенсивную электромагнитную энергию в определённый регион. Это нагревание может изменять электрические свойства ионосферы, создавать искусственные ионосферные зеркала, которые отражают радиоволны, и потенциально влиять на картины погоды, изменяя поведение струйного потока и других атмосферных явлений.\u003c/p\u003e\n\u003cp\u003eDr. Ник Бегич и журналист Джин Мэннинг, в своей книге 1995 года \u003cem\u003eAngels Don't Play This HAARP\u003c/em\u003e, задокументировали потенциальные приложения объекта, включая: модификацию картин погоды через ионосферное нагревание, нарушение коммуникаций на больших площадях, создание искусственных электромагнитных явлений и потенциальное использование как системы оружия, способной влиять на определённые географические регионы.\u003c/p\u003e\n\u003cp\u003eЕвропейский парламент, в резолюции 1999 года, назвал HAARP системой вооружения, которая нарушила международное право и требовал, чтобы HAARP и аналогичные объекты были подвергнуты международному контролю. Резолюция конкретно заявила, что \"HAARP является проектом, о котором публика практически полностью не в курсе, и это нужно исправить.\" Забота Европейского парламента была проигнорирована Соединёнными Штатами.\u003c/p\u003e\n\u003cp\u003eВ 2014 году HAARP был передан от военного к гражданскому управлению под Университетом Аляски Фэрбенкс. Эта передача была представлена как доказательство, что HAARP является чисто научным объектом. Но передача не исключила способности объекта — она просто изменила институциональный ярлык на входной двери.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"патенты-и-программы-модификации-погоды\"\u003eПатенты и программы модификации погоды\u003c/h2\u003e\n\u003cp\u003eТехнология для модификации погоды выходит далеко за пределы HAARP. Всеобъемлющее множество патентов, исследовательских программ и операционных развёртываний задокументирует разработку нескольких методологий модификации погоды:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПосев облаков:\u003c/strong\u003e Как задокументировано в нашей статье о \u003ca href=\"/geoengineering-chemtrails-sky/?lang=ru\"\u003eGeoengineering\u003c/a\u003e, программы посева облаков функционируют более чем в 50 странах, используя йодид серебра, йодид калия, сухой лёд и другие вещества нуклеации для модификации картин осадков. Технология зрелая, широко развёрнута и способна увеличивать, уменьшать или перенаправлять осадки на больших площадях.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИоносферное нагревание:\u003c/strong\u003e Помимо HAARP, ионосферные нагревательные объекты существуют в нескольких странах, включая объект ионосферного нагревания Sura в России, объект EISCAT в Норвегии и обсерваторию Arecibo в Пуэрто-Рико (прежде чем её рухнул в 2020 году). Эти объекты могут изменять электромагнитные свойства ионосферы, с потенциальными каскадными эффектами на погоду и атмосферные условия.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭлектромагнитные патенты модификации погоды:\u003c/strong\u003e Офис патентов США содержит многочисленные патенты, описывающие электромагнитные методы для модификации погоды:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПатент США 4,686,605 (1987): \"Метод и оборудование для изменения региона в атмосфере, ионосфере и/или магнитосфере Земли\" — отнесён к Бернарду Истланду, физику, чья работа сформировала теоретическую основу для HAARP.\u003c/li\u003e\n\u003cli\u003eПатент США 6,315,213 (2001): \"Метод модификации погоды\" — описывает распространение металлических частиц для поглощения электромагнитной энергии и изменения картин погоды.\u003c/li\u003e\n\u003cli\u003eПатент США 20100072297 (2010): \"Устройство контроля ураганов и торнадо\" — описывает метод для снижения интенсивности ураганов и торнадо, используя электромагнитную энергию.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eМодификация погоды на основе лазера:\u003c/strong\u003e Исследование, проведённое в учреждениях, включая Университет Женевы и Freie Universität Berlin, продемонстрировало, что высокомощные лазеры могут вызвать конденсацию, создавать образование кристаллов льда и потенциально вызывать молнию — открывая возможность модификации погоды на основе лазера в определённых географических местоположениях.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"военная-доктрина-владение-погодой-к-2025-году\"\u003eВоенная доктрина: \"Владение погодой к 2025 году\"\u003c/h2\u003e\n\u003cp\u003eВ 1996 году ВВС Соединённых Штатов опубликовали исследовательскую работу под названием \"Погода как множитель силы: Владение погодой в 2025 году.\" Работа была подготовлена Air University как часть директивы от начальника штаба ВВС для изучения концепций и технологий, которые позволят Соединённым Штатам \"остаться доминирующей аэрокосмической и космической силой в будущем.\"\u003c/p\u003e\n\u003cp\u003eБумага явно обсуждала военные преимущества модификации погоды, включая:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eУсиление штормов:\u003c/strong\u003e использование посева облаков и других методов для интенсификации штормов над вражеской территорией, нарушение военных операций, коммуникаций и линий снабжения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eОтрицание осадков:\u003c/strong\u003e вызывание условий засухи на вражеской территории для повреждения сельского хозяйства, сокращения водоснабжения и создания гуманитарных кризисов.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eГенерация тумана и облаков:\u003c/strong\u003e создание затемняющих условий для обеспечения покрытия для дружественных операций или отрицания разведки враждебным силам.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМодификация космической погоды:\u003c/strong\u003e манипулирование ионосфере для нарушения или ухудшения спутниковых коммуникаций врага, навигации GPS и систем радара.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eВывод бумаги заявил: \"В 2025 году ВВС США могут 'владеть погодой', капитализируя на появляющихся технологиях и сосредотачивая разработку этих технологий на приложениях ведения войны.\" Это не теория заговора. Это исследовательская работа ВВС США, доступная через Информационный центр оборонной технической информации, который явно описывает разработку погоды как системы вооружения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"манипуляция-ураганом-направление-штормы\"\u003eМанипуляция ураганом: направление штормы\u003c/h2\u003e\n\u003cp\u003eВозможность направления или модификации ураганов была предметом военных и гражданских исследований с 1960-х годов. Project Stormfury, проводимый американским правительством между 1962 и 1983 годами, попытался ослабить ураганы путём посева их йодидом серебра для нарушения их внутренней структуры.\u003c/p\u003e\n\u003cp\u003eХотя результаты Project Stormfury официально были получены как неопределённые, программа продемонстрировала, что вмешательство человека могло изменять поведение ураганов — и оно установило базу институционального знания и техническую инфраструктуру для будущих исследований модификации ураганов.\u003c/p\u003e\n\u003cp\u003eВопрос о том, достигли ли современные способности модификации ураганов прогресс за пределы того, что было достигнуто в Project Stormfury, невозможно ответить с определённостью, потому что последующие исследования были классифицированы. Но сходство технологии посева облаков, способности ионосферного нагревания и передовой атмосферной моделирования предполагает, что способность влиять на интенсивность, траекторию и поведение ураганов находится в пределах досяга текущей технологии.\u003c/p\u003e\n\u003cp\u003eКогда ураганы удаляют с подозрительной точностью — разрушающие определённые сообщества, прибывающие в политически удобные моменты или интенсивные с необычной быстротой — существование технологии модификации погоды преобразует то, что могло бы быть иначе отклонено как стихийное бедствие в вопрос человеческого действия. Не каждый необычный шторм является доказательством войны за погоду. Но документально подтверждённое существование технологии модификации погоды означает, что возможность не может быть рефлекторно отклонена.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"договор-enmod-закон-который-они-написали-чтобы-нарушить\"\u003eДоговор ENMOD: закон, который они написали, чтобы нарушить\u003c/h2\u003e\n\u003cp\u003eКонвенция об изменении окружающей среды (ENMOD), открытая для подписания в 1977 году и вступившая в силу в 1978 году, запрещает военное или враждебное использование методов модификации окружающей среды, которые имеют \"широко распространённые, долгосрочные или тяжёлые\" эффекты. Договор был прямым ответом на операцию Попай и возрастающее признание, что технология модификации погоды представляла угрозу международной безопасности.\u003c/p\u003e\n\u003cp\u003eДоговор был подписан и ратифицирован 78 нациями, включая Соединённые Штаты, Россию и Соединённое Королевство. Но его механизмы правоприменения практически отсутствуют. Нет международного органа мониторинга, нет системы верификации и нет штрафа за нарушение. Договор полностью опирается на самодокументирование и добросовестное соответствие — структура, которая доказала себя абсолютно неадекватной для контроля технологий вооружения на протяжении истории.\u003c/p\u003e\n\u003cp\u003eКроме того, язык договора тщательно сконструирован для допуска максимально возможной исследовательской деятельности. Запрет применяется только к \"военному или любому другому враждебному использованию\" — оставляя открытой возможность разработки технологии модификации погоды для \"мирных\" или \"научных\" целей. Поскольку одна и та же технология, используемая для \"мирной\" модификации погоды, может быть переведена на враждебное использование в любой момент, запрет договора практически бессмыслен.\u003c/p\u003e\n\u003cp\u003eСуществование самого договора ENMOD является доказательством того, что война за погоду реальна. Нации не договариваются о международных договорах для запрета технологий, которые не существуют. Договор ENMOD был составлен, потому что нации мира признали, что технология модификации погоды достигла точки, где она представляла подлинную угрозу международному миру и безопасности. Сорок восемь лет спустя технология продвинулась огромно — и договор остаётся неподкреплённым.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"направленная-энергия-и-погода-сходимость\"\u003eНаправленная энергия и погода: сходимость\u003c/h2\u003e\n\u003cp\u003eКак задокументировано в нашей статье о \u003ca href=\"/directed-energy-weapons-invisible-fire/?lang=ru\"\u003eОружии направленной энергии\u003c/a\u003e, технология направленной энергии — включая высокомощные микроволновые системы, лазеры и пучки частиц — имеет потенциальные приложения в модификации погоды, которые отличаются от традиционного посева облаков и ионосферного нагревания.\u003c/p\u003e\n\u003cp\u003eСистемы направленной энергии могут доставлять огромные количества энергии к определённым атмосферным целям с точностью и скоростью. Эта способность открывает возможность нагревания атмосферных слоёв, запуска конвективной деятельности, модификации картин ветра и потенциально влияния на формирование и поведение систем погоды в определённых местоположениях.\u003c/p\u003e\n\u003cp\u003eСходимость технологии направленной энергии, аэрозолей geoengineering, ионосферных нагревателей и передовой атмосферной моделирования создаёт люк способности модификации погоды, которая далеко превышает любую отдельную технологию в изоляции. Атмосферные металлические аэрозоли, описанные в нашей статье о \u003ca href=\"/geoengineering-chemtrails-sky/?lang=ru\"\u003eGeoengineering\u003c/a\u003e, могут служить проводящей средой для доставки электромагнитной энергии, в то время как инфраструктура башни GWEN, описанная в нашей статье о \u003ca href=\"/gwen-towers-not-5g/?lang=ru\"\u003eБашнях GWEN\u003c/a\u003e, может обеспечить наземную способность электромагнитной передачи, требуемую для взаимодействия с модифицированной атмосферой.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-размышление-кто-командует-штормом\"\u003eБиблейское размышление: кто командует штормом?\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И Он встал, и запретил ветру, и сказал морю: умолкни, перестань. И ветер утих, и сделалось великое затишье. И сказал им: что вы так боязливы? как у вас нет веры?\" — Марк 4:39-40\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКогда Иисус стоял в лодке и приказал шторму прекратиться, ученики спросили в удивлении: \"Что это? Повелевает ветру и морю, и они повинуются Ему?\" Ответ в том, что это не был человек вообще — это был Создатель ветра и моря, упражняющий доминирование над своей собственной творением.\u003c/p\u003e\n\u003cp\u003eВоенные люди, которые стремятся \"владеть погодой\", пытаются упражнять доминирование, которое им не принадлежит. Они претендуют на власть командовать штормами, направлять осадки, манипулировать атмосферой — власти, которые Писание приписывает только Богу. \"Он возносит пары с концов земли; молнии для дождя делает Он; из сокровищницы Своей выводит ветер\" (Псалом 135:7).\u003c/p\u003e\n\u003cp\u003eВоенные люди за погодой современного военно-промышленного комплекса не командуют штормами по власти Создателя. Они манипулируют атмосферной химией через технологию — принципиально различное упражнение, которое может производить краткосрочное тактическое преимущество, но не может воспроизводить суверенитет Того, кто создал ветер и море. Вопрос для каждого поколения — тот же вопрос, задаваемый в лодке: Какой вид человека командует штормом? Ответ остаётся одинаковым: только Тот, кто его создал.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнай-больше\"\u003eУзнай больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о ближайшем опыте смерти Говарда Питтмана — предупреждение о конце времён, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическое конфиденциально: раскрытые позорные иезуитские тайны\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и фармакея — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может находиться в подвале Ватикана может шокировать вас!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушай-пока-читаешь\"\u003eСлушай, пока читаешь\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/351-Broken_Weather.mp4\"\u003eРазбитая погода\u003c/a\u003e — Война за погоду и вооружённый климат\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/293-Arrows_In_The_Sky.mp4\"\u003eСтрелы в небе\u003c/a\u003e — Что стреляется в наши небеса\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/305-Fire_From_The_Sky.mp4\"\u003eОгонь с неба\u003c/a\u003e — Направленная энергия и оружие для погоды\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуй-далее\"\u003eИсследуй далее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/geoengineering-chemtrails-sky/?lang=ru\"\u003eGeoengineering: что они распыляют в наших небесах\u003c/a\u003e — Программы атмосферных аэрозолей, которые могут обеспечивать проводящую среду для доставки электромагнитной энергии при модификации погоды\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/directed-energy-weapons-invisible-fire/?lang=ru\"\u003eОружие направленной энергии\u003c/a\u003e — технология направленной энергии, которая пересекается со способностями модификации погоды\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/gwen-towers-not-5g/?lang=ru\"\u003eБашни GWEN\u003c/a\u003e — наземная электромагнитная инфраструктура, которая может взаимодействовать с программами модификации атмосферы\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОгонь, град, снег и ветер бурный исполняют Его слово — не слово генералов, не слово DARPA, не слово ВВС. Погода — инструмент Бога, развёрнутый для Его целей, в соответствии с Его суверенитетом. Те, кто стремится владеть погодой, стремятся владеть тем, что принадлежит Богу. Они сеют облака, нагревают ионосферу и патентуют технологию манипуляции атмосферой — но они не командуют штормом. Шторм командует собой по слову его Создателя. И когда ученики были испуганы, и ветер выл, и волны разбивались, там стоял Тот, кто говорил три слова и молчание неба: Мир. Будь. Спокойно. Никакой ионосферный нагреватель. Никакой йодид серебра. Никакая электромагнитная частота. Только голос Создателя. И ветер утихомирился, и было великое затишье.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/science/\",\"className\":\"category-badge\",\"children\":\"science\"}],false
