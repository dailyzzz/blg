 ее -- видимо для тех, кто имеет глаза видеть. Она названа \"тайной\", потому что её истинная идентичность скрыта за слоями обмана, богатства и власти. Она названа \"Вавилоном\", потому что она продолжает духовное наследие исходного Вавилона -- города, построенного в неповиновении Богу, башни, возведенной, чтобы достичь небес через человеческие усилия, системы, которая объединила человечество под единой мятежной властью. Она -- \"мать блудниц\", потому что каждая ложная религиозная система, каждое отступившее учреждение, каждая духовная проституция на земле ведет свою родословную от неё.\u003c/p\u003e\n\u003cp\u003eОткровение 17-18 предоставляет наиболее детальное описание любого субъекта в пророческом Писании. Великая блудница описана с экономическими, религиозными, политическими, географическими и духовными характеристиками столь конкретными, что идентификация должна быть возможна -- и все же она остается наиболее обсуждаемой идентичностью в библейской пророчеству. Этот дебат сам по себе часть тайны. Блудница не хочет быть идентифицирована. Её власть зависит от того, чтобы оставаться скрытой.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/117-The_Burning_of_Sin.mp4\"\u003eThe Burning of Sin\u003c/a\u003e говорит о неизбежном суде, ожидающем Мистического Вавилона. Она, которая сделала все народы пьяными от её вина, сама будет потреблена огнём. Сжигание -- это не метафора. Это полное, внезапное и необратимое -- и те, кто извлекал выгоду из неё, будут стоять на расстоянии, наблюдая, как дым поднимается, плачущие не о своих грехах, а о потерянном богатстве.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"профиль-двадцать-идентифицирующих-характеристик\"\u003eПрофиль: двадцать идентифицирующих характеристик\u003c/h2\u003e\n\u003cp\u003eОткровение 17-18 предоставляет по крайней мере двадцать конкретных характеристик Мистического Вавилона. Любое предложенное идентификация должно учесть все из них -- не просто несколько, не просто удобные, но все:\u003c/p\u003e\n\u003ch3 id=\"религиозные-характеристики\"\u003eРелигиозные характеристики\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна -- блудница\u003c/strong\u003e (17:1) -- Она отвергла свой заветный договор с Богом и вошла в недозволенные духовные союзы с миром.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна сидит на многих водах\u003c/strong\u003e (17:1) -- Воды -- это \"народы, и множества, и нации, и языки\" (17:15). Она осуществляет влияние над разнообразными популяциями по всему миру.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЦари земли совершили прелюбодеяние с ней\u003c/strong\u003e (17:2) -- Политические лидеры находятся в союзе с ней, участвуя в её ложной духовной системе.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна пьяна от крови святых\u003c/strong\u003e (17:6) -- Она преследовала и убивала истинных последователей Бога на протяжении истории.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна -- \"мать блудниц и мерзостей\"\u003c/strong\u003e (17:5) -- Она -- источник, из которого ложные религии и отвратительные практики происходят.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна имеет золотую чашу, полную мерзостей\u003c/strong\u003e (17:4) -- Она преподносит свои коррупции в красивой, привлекательной упаковке.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"политические-характеристики\"\u003eПолитические характеристики\u003c/h3\u003e\n\u003col start=\"7\"\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна сидит на звере с семью головами и десятью рогами\u003c/strong\u003e (17:3) -- Она едет на звере системы, используя его политическую власть, но отличается от него.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eСемь голов -- семь гор\u003c/strong\u003e (17:9) -- Она географически связана с семью холмами или горами.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна царствует над царями земли\u003c/strong\u003e (17:18) -- Она осуществляет власть над политическими правителями.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eДесять рогов будут ненавидеть её и уничтожить её\u003c/strong\u003e (17:16) -- Политические власти, на которых она ездит, в конце повернутся против неё и уничтожат её.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"экономические-характеристики\"\u003eЭкономические характеристики\u003c/h3\u003e\n\u003col start=\"11\"\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна облачена в пурпур и малиновое, золото и драгоценности\u003c/strong\u003e (17:4, 18:16) -- Она выставляет чрезвычайное богатство.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eКупцы земли разбогатели от неё\u003c/strong\u003e (18:3) -- Она -- центр глобальной коммерческой империи.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна торгует любой роскошью\u003c/strong\u003e (18:12-13) -- золото, серебро, драгоценные камни, тонкий лен, шёлк, слоновая кость, специи, вино, масло, тонкая мука, крупный рогатый скот, овцы, кони, колесницы -- и \"рабы, и души людей\" (18:13).\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЕё уничтожение разрушает глобальную коммерцию\u003c/strong\u003e (18:11, 18:17-19) -- Когда она падает, вся глобальная экономика оплакивает, потому что их поток доходов разрушен.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"характеристики-суда\"\u003eХарактеристики суда\u003c/h3\u003e\n\u003col start=\"15\"\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна уничтожена в один час\u003c/strong\u003e (18:10, 17, 19) -- Её уничтожение внезапно и катастрофично.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна сожжена огнём\u003c/strong\u003e (17:16, 18:8) -- Её уничтожение включает огонь.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОна брошена как камень в море\u003c/strong\u003e (18:21) -- Её уничтожение полное и постоянное, никогда не восстанет.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЕё суд от Бога\u003c/strong\u003e (18:8, 18:20) -- \"Бог помянул беззакония её.\"\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eНебо радуется её уничтожению\u003c/strong\u003e (18:20, 19:1-3) -- \"Радуйтесь о ней, небо и святые апостолы и пророки; потому что Бог судом воздал вам суд её.\"\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eБожьему народу приказано выйти из неё\u003c/strong\u003e (18:4) -- \"Выйди из неё, народ Мой, чтобы не быть причастником грехов её и не быть подвергнутым язвам её.\"\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2 id=\"кандидаты-исторические-интерпретации\"\u003eКандидаты: исторические интерпретации\u003c/h2\u003e\n\u003cp\u003eМножество идентификаций были предложены в церковной истории. Каждая должна быть оценена против полного профиля:\u003c/p\u003e\n\u003ch3 id=\"древний-рим\"\u003eДревний Рим\u003c/h3\u003e\n\u003cp\u003eОтцы ранней церкви -- включая Тертуллиана, Иринея и Ипполита -- идентифицировали Вавилон с Римом. \"Семь гор\" (17:9) соответствуют знаменитым семи холмам Рима. Рим был \"пьян от крови святых\" через века преследования. Императоры Рима совершили духовное прелюбодеяние через поклонение императору. Пурпур и малиновое римской императорской одежды соответствуют одежде блудницы.\u003c/p\u003e\n\u003cp\u003eОднако древний Рим как политический субъект упал в 476 году н.э. Если Мистический Вавилон -- это единственно древний Рим, то пророчество уже исполнено -- но катастрофическое, внезапное уничтожение, описанное в Откровении 18, не соответствует постепенному упадку Рима на протяжении столетий.\u003c/p\u003e\n\u003ch3 id=\"ватикан--римская-католическая-церковь\"\u003eВатикан / Римская католическая церковь\u003c/h3\u003e\n\u003cp\u003eПротестантские реформаторы -- Лютер, Кальвин, Нокс, Цвингли и другие -- идентифицировали Мистический Вавилон с Римской католической церковью и папством. Ватикан сидит на семи холмах. Одежды церкви -- пурпур и малиновое. Золотая чаша -- литургический предмет. Учреждение имеет обширную историю преследования инакомыслящих -- Инквизиция, Крестовые походы, преследование вальденсов, альбигойцев, гугенотов и ранних протестантов. Церковь осуществляла политическую власть над царями Европы более тысячелетия.\u003c/p\u003e\n\u003cp\u003eЭта идентификация учитывает множество характеристик -- религиозные, политические и преследовательные элементы особенно. Огромное богатство Ватикана, его глобальное влияние на 1.3 миллиарда католиков, его дипломатические отношения с почти каждой нацией и его уникальный статус как религиозного учреждения и суверенного государства все подходят к профилю.\u003c/p\u003e\n\u003ch3 id=\"глобальная-финансовая-система\"\u003eГлобальная финансовая система\u003c/h3\u003e\n\u003cp\u003eНекоторые современные интерпретаторы идентифицируют Мистический Вавилон с глобальной финансовой системой -- центрированной на учреждениях как Федеральный резерв, Банк международных расчётов, Уолл-Стрит, Город Лондона и сеть МВФ/Всемирного банка. Эта идентификация учитывает экономические характеристики: купцы, разбогатевшие, торговля любой роскошью, крах глобальной коммерции при её уничтожении.\u003c/p\u003e\n\u003ch3 id=\"америка--нью-йорк\"\u003eАмерика / Нью-Йорк\u003c/h3\u003e\n\u003cp\u003eНекоторые учены пророчества идентифицируют Вавилон с Соединёнными Штатами или конкретно с Нью-Йорком. Америка -- доминирующая экономическая и культурная власть мира. Нью-Йорк -- центр глобальных финансов (Уолл-Стрит), глобальных средств, глобальной моды и Организации Объединенных Наций. Статуя свободы держит факел (огонь) и была смоделирована по древним фигурам богинь. Культурный экспорт Америки -- Голливуд, как исследуется в \u003ca href=\"/hollywood-occult-machine/?lang=ru\"\u003eHollywood: The Occult Machine\u003c/a\u003e -- сделал все народы \"пьяными\" от её культуры.\u003c/p\u003e\n\u003ch3 id=\"композитная-интерпретация\"\u003eКомпозитная интерпретация\u003c/h3\u003e\n\u003cp\u003eВозможно, наиболее всеобъемлющая интерпретация признает Мистический Вавилон как систему, а не одиночный субъект -- композит, который включает религиозные, экономические и политические измерения. Она -- \"мать блудниц\" -- означая, что она рождает множественные выражения её коррупции через множественные учреждения, нации и эры. Ватикан, глобальная финансовая система, американская культурная гегемония и более широкая вавилонская оккультная традиция могут быть все выражениями одной духовной реальности: контрфакт царство врага, работающий через все учреждения, которые служат его цели в каждом поколении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"торговля-душами-людей\"\u003eТорговля душами людей\u003c/h2\u003e\n\u003cp\u003eНаиболее ужасная деталь в экономическом инвентаре Откровения 18 -- последний предмет в списке:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И корица, и ароматы, и мази, и ладан, и вино, и масло, и тонкая мука, и пшеница, и скот, и овцы, и кони, и колесницы, и рабы, и души людей.\" -- Откровение 18:13\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eГреческий текст списывает \u003cem\u003eсоматы\u003c/em\u003e (тела) и \u003cem\u003eпсихе антропон\u003c/em\u003e (души людей) как раздельные товары. Мистический Вавилон торгует не просто в физических рабах, но в душах -- наиболее ценном товаре во вселенной, рассматриваемом как товар.\u003c/p\u003e\n\u003cp\u003eЭто духовная реальность позади каждой системы, которая захватывает, контролирует и товаризирует человеческие существа:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eИндустрия торговли людьми -- оценивается в $150 миллиардов ежегодно\u003c/li\u003e\n\u003cli\u003eФармацевтическая промышленность -- торговля здоровьем за прибыль, держание популяций зависимыми\u003c/li\u003e\n\u003cli\u003eИндустрия развлечений -- захват внимания, формирование желания, продажа зависимости\u003c/li\u003e\n\u003cli\u003eТехнологическая индустрия -- сбор данных (цифровых отражений души) и продажа её\u003c/li\u003e\n\u003cli\u003eОбразовательная индустрия -- формирование умов согласно системе одобренной доктрине\u003c/li\u003e\n\u003cli\u003eВоенно-промышленный комплекс -- торговля человеческими жизнями за геополитическое преимущество\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКак исследуется в \u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eThe Great Reset: The Fourth Industrial Revolution\u003c/a\u003e, возникающая глобальная система рассматривает человеческие существа как ресурсы, которые должны быть управляемы, оптимизированы и контролируемы. Цифровая идентичность уменьшает личностей на данные. Социальный кредит уменьшает характер на оценку. CBDC уменьшает экономическое участие на соответствие. Душа -- образ Бога в каждом человеке -- товаризирована, квантифицирована и торговлена.\u003c/p\u003e\n\u003cp\u003eТорговля Мистического Вавилона в душах не исторична. Она -- настоящая. Она -- бизнес-модель современного мира.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"падение-в-один-час\"\u003eПадение: в один час\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Потому что в один час такое богатство разорилось.\" -- Откровение 18:17\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eТрижды в Откровении 18 уничтожение Вавилона описано как происходящее \"в один час\" (стихи 10, 17, 19). Это катастрофично, внезапно и полно. Это не постепенный упадок. Это не медленное падение. Это уничтожение -- столь внезапное, что те, кто извлекал выгоду из её системы, могут только наблюдать на расстоянии, не в силах вмешаться.\u003c/p\u003e\n\u003cp\u003eСкорость уничтожения предполагает либо сверхъестественный акт (прямой Божественный суд), ядерное событие, или каскадирующееся системное падение -- или некоторую комбинацию. В глобально взаимосвязанной финансовой системе, крах центрального узла мог бы каскадироваться через каждое связанное учреждение в часы или минуты. Ядерная атака на главный финансовый центр могла бы совершить физическое уничтожение в секундах. Скоординированная кибер-атака могла бы отключить цифровую инфраструктуру, на которую современная цивилизация зависит, в минуты.\u003c/p\u003e\n\u003cp\u003eРеакция купцов просветляет: они плачут не об потерянных человеческих жизнях, но о коммерческом доходе, разрушенном. \"Увы, увы, град великий, где разбогатели все, имеющие корабли на море, от богатства его! Ибо в один час запустел.\" (18:19). Их плач -- экономический, не моральный. Они горюют потерю прибыли, не потерю душ. Это раскрывает истинную природу отношений Мистического Вавилона: они -- трансакционные, не относительные. Она была любима за то, что она предоставляла, не за то, кем она была. И когда предоставление прекращается, любовь прекращается с ней.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"выйди-из-неё-мой-народ\"\u003eВыйди из неё, мой народ\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И услышал я иной голос с неба, говорящий: выйди из неё, народ Мой, чтобы не быть причастником грехов её и не быть подвергнутым язвам её.\" -- Откровение 18:4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЭто среди наиболее срочных приказов во всём Писании. Бог имеет людей внутри Мистического Вавилона -- истинных верующих, которые запутаны в её системах, участвующих в её коммерции, находящихся под влиянием её культуры и в опасности разделения в её суде. Приказ -- выйти -- разделиться, распутаться, извлечь себя из системы до того, как её разрушение упадёт.\u003c/p\u003e\n\u003cp\u003eВыход из Вавилона -- это не просто географическое переселение. Это духовное, экономическое, культурное и психологическое разделение от системы, которую представляет Мистический Вавилон:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eДуховное разделение:\u003c/strong\u003e Отвергни ложные религиозные системы, которые ведут свои корни к вавилонской мистической религии -- смешивание язычества с христианством, замену ритуала на отношения, возвышение традиции над Писанием.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eЭкономическое разделение:\u003c/strong\u003e Снизь зависимость от глобальной финансовой системы. Развивай местные экономики, общественные сети, самодостаточность в производстве пищи и альтернативные средства обмена, которые не требуют участие в инфраструктуре зверя.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eКультурное разделение:\u003c/strong\u003e Отвергни ценности, которые Вавилон экспортирует -- материализм, половую аморальность, развлекательную зависимость, поклонение знаменитостям, нормализацию оккультного, и товаризацию человеческой жизни.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eИнформационное разделение:\u003c/strong\u003e Отвергни СМИ Вавилона -- контроль повествования, пропаганду, изготовленное согласие, алгоритмическую манипуляцию восприятия.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПриказ срочен, потому что разрушение внезапно. Не будет постепенного предупреждения, не будет времени переходить, не будет возможности последней минуты извлечения. Те, кто ждёт, пока увидит дым, будут ждать слишком долго.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вечный-суд\"\u003eВечный суд\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Радуйтесь о ней, небо и святые апостолы и пророки; потому что Бог судом воздал вам суд её.\" -- Откровение 18:20\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eНебо воспевает уничтожение Мистического Вавилона. Это не жестокость. Это справедливость. Система, которая торговала в душах людей, которая была пьяна от крови святых, которая сделала все народы пьяными от её духовного прелюбодеяния и которая обогащала себя через каждую форму эксплуатации -- эта система судится, и небо отвечает поклонением:\u003c/p\u003e\n\u003cp\u003e\"Аллилуия! Спасение и слава и честь и сила Господу Богу нашему! Ибо истинны и праведны суды Его: ибо Он судил великую блудницу, которая развратила землю любодеянием своим, и взыскал кровь рабов Своих от руки её.\" -- Откровение 19:1-2\u003c/p\u003e\n\u003cp\u003eСуд постоянен. \"И один мощный ангел поднял камень, подобный большому жернову, и бросил в море, говоря: с таким стремлением будет повергнут Вавилон, великий город, и уже не будет найден.\" (Откровение 18:21). Найден более не. Музыка останавливается. Коммерция останавливается. Развлечение останавливается. Эксплуатация останавливается. Постоянно.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/287-The_Beast_Is_Here.mp4\"\u003eThe Beast Is Here\u003c/a\u003e -- Империя системы зверя\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e -- Империя конца времён в согласованности\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/hollywood-occult-machine/?lang=ru\"\u003eHollywood: The Occult Machine\u003c/a\u003e -- Культурное направление влияния Мистического Вавилона\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eThe Great Reset: The Fourth Industrial Revolution\u003c/a\u003e -- Экономическое перестраивание, служащее финальной форме Вавилона\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eОна сидит на семи горах, облачена в пурпур и малиновое, держит золотую чашу, полную мерзостей. Она сделала нации пьяными. Она обогатила купцов. Она убила святых. Она торговала в душах людей. И она не знает, что её суд написан, её час определён и её огонь уже зажжён. Мистический Вавилон -- это не загадка, чтобы быть решённой для интеллектуального удовлетворения. Она -- система, чтобы быть избегаемой для духовного выживания. \"Выйди из неё, мой народ.\" Это не предложение. Это приказ с трона небес -- произнесённый тем же Богом, который дождём огня на Содом, потопом древний мир и будет сжигать Мистический Вавилон с огнём, который никакая страховка не покроет и никакие усилия восстановления не обратят. Она будет найдена более не. Купцы будут плакать. Небо будет радоваться. И дым её сжигания будет подниматься навеки -- памятник суду Бога, кто помнит каждую душу, которой она торговала, каждого святого, которого она убила и каждую нацию, которую
