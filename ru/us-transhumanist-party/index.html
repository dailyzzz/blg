ему.\" -- Исаия 14:12-14\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eЖелание превзойти человеческие ограничения и стать как Бог -- это не современная философия. Это первородный грех. Это падение Люцифера. Это искушение в Эдеме. И теперь это зарегистрированная политическая партия в Соединенных Штатах Америки. Партия трансгуманистов США внесла амбицию Люцифера в американскую политическую систему, выступая за технологическую трансформацию человечества в нечто сверхчеловеческое -- нечто постчеловеческое -- нечто, что заменяет Божий замысел на инженерное совершенствование.\u003c/p\u003e\n\u003cp\u003eДвижение политического постгуманизма не скрывает свою повестку дня. Оно открыто заявляет то, что разведывательные агентства, фармацевтические компании и программы военных исследований преследуют скрыто: фундаментальное изменение человеческого вида благодаря технологии.\u003c/p\u003e\n\u003cp\u003eКак объявляет \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e из альбома Confliction, желание подняться выше своей назначенной станции -- это отличительная характеристика восстания. И как напоминает нам \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\"\u003eCast Out of Paradise\u003c/a\u003e, последствия схватывания за божественность через запрещенные средства -- это изгнание, коррупция и смерть.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"партия-трансгуманистов-сша\"\u003eПартия трансгуманистов США\u003c/h2\u003e\n\u003ch3 id=\"платформа-и-цели\"\u003eПлатформа и цели\u003c/h3\u003e\n\u003cp\u003eПартия трансгуманистов США, основанная в 2014 году Золтаном Истваном, -- это политическая партия, которая явно выступает за:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРадикальное продление жизни\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eУстранение смерти через технологические средства, включая генетическую модификацию, трансплантацию органов, загрузку мозга и наномедицинское восстановление клеток. Партия рассматривает биологическую смерть как проблему, которую нужно решить, а не как предназначенный аспект человеческого состояния.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЧеловеческое увеличение\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eСовершенствование физических и когнитивных способностей человека благодаря:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eНейронные имплантаты для когнитивного совершенствования\u003c/li\u003e\n\u003cli\u003eГенетическая модификация для физического совершенствования\u003c/li\u003e\n\u003cli\u003eНанотехнология для восстановления клеток и совершенствования\u003c/li\u003e\n\u003cli\u003eКибернетическое интегрирование для сенсорного и физического совершенствования\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eМорфологическая свобода\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eПраво изменять свое тело любым желаемым способом, включая изменение на нечеловеческие формы. Это включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eМодификацию пола (которую партия поддерживает как подмножество более широких морфологических прав)\u003c/li\u003e\n\u003cli\u003eМодификацию вида (право добавлять нечеловеческие черты)\u003c/li\u003e\n\u003cli\u003eКибернетическую модификацию (право заменять биологические компоненты на технологические)\u003c/li\u003e\n\u003cli\u003eЦифровое воплощение (право загружать сознание в цифровые системы)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eТехнологические права\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eУстановление правовых рамок, которые признают:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eПраво систем ИИ на юридическое лицо\u003c/li\u003e\n\u003cli\u003eПраво на когнитивное совершенствование без ограничений\u003c/li\u003e\n\u003cli\u003eПраво на генетическую модификацию без нормативных барьеров\u003c/li\u003e\n\u003cli\u003eПраво на технологическое бессмертие\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"политическая-стратегия\"\u003eПолитическая стратегия\u003c/h3\u003e\n\u003cp\u003eТрансгуманистическая политическая стратегия работает на нескольких уровнях:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭлекторальная политика\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eТрансгуманистические кандидаты баллотировались на посты президента, губернатора и местных должностей, используя кампании как платформы для продвижения трансгуманистических идей. Хотя электоральный успех был ограничен, кампании генерируют медиа-освещение, которое нормализует трансгуманистические концепции.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗащита политики\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eПартия выступает за конкретные изменения политики:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eУвеличение государственного финансирования исследований долголетия\u003c/li\u003e\n\u003cli\u003eДерегулирование генетической модификации и нанотехнологии\u003c/li\u003e\n\u003cli\u003eПравовое признание цифровых личностей и прав ИИ\u003c/li\u003e\n\u003cli\u003eУниверсальный доступ к технологии увеличения\u003c/li\u003e\n\u003cli\u003eУстранение нормативных актов, которые ограничивают человеческие эксперименты\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eКультурное влияние\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eТрансгуманистические идеи продвигаются через развлекательные СМИ, журналистику о технологиях, академические конференции и культуру Кремниевой долины. Нормализация трансгуманистических концепций в популярной культуре -- через фильмы, телевидение, видеоигры и социальные сети -- это предсказательное программирование, которое подготавливает население к принятию того, что партия отстаивает политически.\u003c/p\u003e\n\u003ch2 id=\"духовный-анализ\"\u003eДуховный анализ\u003c/h2\u003e\n\u003ch3 id=\"люциферианский-шаблон\"\u003eЛюциферианский шаблон\u003c/h3\u003e\n\u003cp\u003eТрансгуманистическая платформа следует люциферианскому шаблону, описанному в Исаии 14, с точностью:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e\"Взойду на небо\"\u003c/strong\u003e = технология продления жизни и бессмертия\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Вознесу престол мой выше звезд Божиих\"\u003c/strong\u003e = когнитивное совершенствование сверх естественных пределов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Сяду на горе в сонме богов\"\u003c/strong\u003e = политическая власть для навязывания трансгуманистических политик\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Взойду выше облаков\"\u003c/strong\u003e = превосхождение физических ограничений\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e\"Уподоблюсь Всевышнему\"\u003c/strong\u003e = явная цель трансгуманизма: стать подобным богу через технологию\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПартия трансгуманистов преследует не просто политические цели. Она преследует духовную цель первоначального восстания: заменить Божий замысел на самоопределенную эволюцию, достичь божественности через технологию, а не через отношения с Творцом.\u003c/p\u003e\n\u003ch3 id=\"повторение-бытия-6\"\u003eПовторение Бытия 6\u003c/h3\u003e\n\u003cp\u003eТрансгуманистическая повестка дня -- это политическое формализирование коррупции Бытия 6. В Бытии 6 сыны Божии пересекли границу между сверхъестественным и естественным, производя гибридные существа (Нефилимы), которые были мерзостью Творцу. Трансгуманизм пересекает границу между человеческим и технологическим, производя гибридные существа (киборги, улучшенные люди, цифровые умы), которые нарушают образ Божий.\u003c/p\u003e\n\u003cp\u003eПолитическая легитимизация этого пересечения через зарегистрированную политическую партию представляет нормализацию того, что Бог судил потопом. Партия трансгуманистов просит общественность проголосовать за свою собственную генетическую, биологическую и духовную коррупцию -- демократически одобрить повестку дня Бытия 6.\u003c/p\u003e\n\u003cp\u003eАна Михалча, доктор медицины, доктор наук, задокументировала на своем Substack (anamihalceamdphd.substack.com), как нанотехнология, теперь обнаруженная в человеческой крови, -- это тайная реализация трансгуманистической повестки дня, которую Партия трансгуманистов США отстаивает открыто. То, что партия преследует через политические каналы, уже достигается через фармацевтические каналы -- без согласия или знания населения, которое трансформируется.\u003c/p\u003e\n\u003ch3 id=\"купол-и-обман\"\u003eКупол и обман\u003c/h3\u003e\n\u003cp\u003eТрансгуманистический сон о колонизации космоса, цифровом бессмертии и эволюционном превосхождении сталкивается с реальностью тверди -- куполом, который Бог поместил над землей в Бытии 1:6-8. Под этим куполом человечество существует в своем назначенном месте. Падшие ангелы заключены под этим куполом. И трансгуманистический сон об убежище в сознание, чтобы избежать тела, по духовным терминам, -- это сон об избежании купола -- о превосхождении границ, которые Бог установил на творении.\u003c/p\u003e\n\u003cp\u003eНо купол держит. Твердь остается. И трансгуманист, мечтающий загрузить сознание, чтобы избежать тела, все еще живет под куполом, на пластине земли, в границах, которые Бог установил на творении. Никакое количество нанотехнологии, генетической модификации или цифровой загрузки не может пробить твердь. Единственный путь через купол -- путь, который Бог предопределил: смерть и воскресение через Иисуса Христа. Каждый другой путь -- это иллюзия -- обман, продвигаемый падшими существами, которые сами заключены под куполом, который они не могут избежать.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-царств-8\"\u003eПредупреждение 1 Царств 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушайся голоса народа во всем, что он говорит тебе; ибо не тебя они отвергли, но Меня отвергли, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8:7 (КЖВ)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Царств 8 отражается через каждый коридор правительства сегодня. Когда Израиль потребовал царя, как и другие народы, Бог предупредил их точно, что произойдет -- их сыновья взяты на войну, их дочери на служение, их поля и виноградники отняты, десятая часть всего конфискована. Они выбрали человеческое правление вместо Божьего царства, и тирания последовала точно, как было обещано. Ничего не изменилось. Современная политическая система -- два крыла одной птицы -- левое и правое, республиканцы и демократы -- все служат одной скрытой структуре власти. Голосование за любую сторону -- это выбор того, какое крыло будет хлопать следующим, пока птица летит в одном направлении. Истинная власть никогда не была на бюллетене.\u003c/p\u003e\n\u003ch2 id=\"справочные-источники\"\u003eСправочные источники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eДокументы платформы и политики Партии трансгуманистов США\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eIstvan, Z., \"The Transhumanist Wager,\" 2013\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMore, M. and Vita-More, N., \"The Transhumanist Reader,\" 2013\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eАна Михалча, доктор медицины, доктор наук, anamihalceamdphd.substack.com, скрытый трансгуманизм через нанотехнологию\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Царств 8 -- Предупреждение против земных царей (КЖВ)\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство Ховарда Питтмана о предсмертном опыте -- Предупреждение об конце времени, которое дал ему Бог\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические доверительные: раскрытые позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/339-The_New_Man.mp4\"\u003eThe New Man\u003c/a\u003e -- Трансгуманистический редизайн человечества\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/447-Modded_Humans.mp4\"\u003eModded Humans\u003c/a\u003e -- Улучшенный человек как политическая цель\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/489-Nephilim_Nanobots.mp4\"\u003eNephilim Nanobots\u003c/a\u003e -- Образец Бытия 6 в нанотехнологии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/487-Mark_Of_The_Nanobot.mp4\"\u003eMark Of The Nanobot\u003c/a\u003e -- Система технологических меток\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e -- Восстание, движущее трансгуманизм\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\"\u003eCast Out of Paradise\u003c/a\u003e -- Последствия схватывания за божественность\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/cyborg-dawn-military-augmentation/?lang=ru\"\u003eCyborg Dawn: Military Use Of Human Augmentation Technology\u003c/a\u003e -- Военная реализация трансгуманистических целей\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/europeans-augmentation-mandatory/?lang=ru\"\u003eEuropeans Beware: Human Augmentation Becoming Mandatory\u003c/a\u003e -- Обязательная реализация трансгуманистической технологии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/beast-land-transhumanism-synthetic/?lang=ru\"\u003eThe BEAST of the LAND: Transhumanism and Synthetic Futures\u003c/a\u003e -- Конечное состояние трансгуманистической повестки дня\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eЖелание быть подобным Богу через запрещенные средства -- это не политическая платформа. Это первородный грех. Партия трансгуманистов США формализировала люциферианскую амбицию в зарегистрированную политическую организацию, полную кандидатов, политик и пожертвований кампании. Они просят избирателей одобрить то, что Бог судил потопом. Они просят общественность финансировать то, что падшие ангелы учили до потопа. Они просят человечество проголосовать за свою собственную трансформацию в нечто, что больше не сделано по образу Божьему. Но образ Божий не подлежит голосованию. Он не изменяется законодательством. Он не улучшается технологией. Он дан Творцом, поддерживается Духом и совершен только благодаря трансформации, которую обеспечивает Христос -- трансформация не генома, а сердца.\u003c/em\u003e\u003c/p\u003e"])<
