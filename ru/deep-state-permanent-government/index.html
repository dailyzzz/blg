\u003c/blockquote\u003e\n\u003cp\u003eПисание выявляет структуру управления, которая работает позади и выше видимых правителей мира. Письмо Павла в Ефесянам не описывает бой против царей и губернаторов — видимые власти Римской империи — но против \"начальств и властей\", которые работают в \"высоких местах\", незримые публикой, оказывая влияние на видимый порядок из позиции скрытой власти. Это является библейским описанием того, что современный мир называет глубоким государством: постоянная структура власти, которая трансцендирует избранных чиновников, работает посредством институционального захвата скорее чем демократического мандата и персистирует независимо от того, какая партия выигрывает следующие выборы.\u003c/p\u003e\n\u003cp\u003eКонцепция не является уникально американской. Каждая империя в человеческой истории была управляема не ее публичной фигурой — фараон, цезарь, король — но священническим классом, судебными советниками, разведывательным аппаратом и финансовыми интересами, которые поместили публичную фигуру во власть и могли удалить его когда он прекратил служить их целям. Видимый правитель является лицом системы. Постоянное правительство является телом.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e объявляет, наиболее опасный враг не является тем, кто нападает снаружи ворот, но тем, кто работает из стен — нося форму королевства в то время как служа другой хозяин полностью.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"архитектура-постоянного-правительства\"\u003eАрхитектура постоянного правительства\u003c/h2\u003e\n\u003cp\u003eАмериканское глубокое государство не является единой организацией с членским списком и штаб-квартирой. Это является сетью — сеть институциональных взаимосвязей, разделенного персонала, согласованных интересов и взаимозависимостей, которая функционирует как согласованная структура власти без требования формальной координации. Его компоненты включают:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазведывательное сообщество.\u003c/strong\u003e CIA, NSA, FBI, DIA и четырнадцать других разведывательных агентств занимают более 100,000 людей напрямую и сотни тысяч подрядчиков. Эти агентства работают с классифицированными бюджетами («черный бюджет» был примерно 90 миллиардов в 2023 году), минимальный надзор конгресса и легальные власти, которые исключают их от многих ограничений, которые связывают другие государственные агентства. Разведывательное сообщество не просто собирает информацию — это формирует политику, проводит скрытые операции и поддерживает взаимосвязи с медиа, компаниями технологии и иностранными правительствами, которые дают ему влияние далеко вне его установленного мандата.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВоенно-промышленный комплекс.\u003c/strong\u003e Предупреждение прощального Эйзенхауэра 1961 года о \"военно-промышленном комплексе\" описало постоянный альянс между Пентаганом, защитными подрядчиками и конгрессиональными выделяющими, которые приобрели \"необоснованное влияние\" в правительстве. Шестьдесят лет позже, защитная промышленность тратит более чем 120 миллионов ежегодно на лоббирование. Пять топовых защитных подрядчиков — Lockheed Martin, RTX (бывший Raytheon), Boeing, Northrop Grumman и General Dynamics — получили более чем 150 миллиардов в федеральных контрактах в 2023 году. Вращающаяся дверь между Пентаганом и защитной промышленностью является постоянной: старшие военные офицеры уходят в выполнительные позиции в подрядчиках, они прежде надзирали. Защитные чиновники промышленности служат как Пентаганы, которые выделяют контракты их бывшим (и будущим) работодателям.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФинансовое установление.\u003c/strong\u003e Федеральный резерв, казначейство, банки Wall Street и сеть финансовых учреждений, которые управляют системой доллара, составляют финансовое постоянное правительство. Федеральный резерв является формально независимым от избранного правительства — его управляющие служат 14-летние сроки, его решения не подлежат президентскому или конгрессиональному одобрению и его операции являются только поверхностно выполняемыми аудитом. Вращающаяся дверь между Fed, казначейством и банками Wall Street (Goldman Sachs, JPMorgan Chase, BlackRock) гарантирует, что денежная политика служит финансовым интересам учреждения независимо от того, какая партия контролирует Белый дом.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтарший исполнительный сервис (SES).\u003c/strong\u003e Внутри федеральной бюрократии, примерно 8,000 карьерных чиновников в Старшем исполнительном сервисе занимают наиболее высокие неполитические позиции в правительстве. Эти чиновники служат поперек администраций, поддерживают институциональную память и осуществляют операциональную власть над ежедневными функциями их агентств. Новый президент может замещать политических назначенцев, но не легко может замещать чиновников SES, которые фактически управляют операциональным машинерией правительства. SES является, на практике, постоянным бюрократическим правительством, которое персистирует независимо от избирательных результатов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДумают танки и политические сети.\u003c/strong\u003e Council on Foreign Relations, Brookings Institution, Atlantic Council, Center for Strategic and International Studies, RAND Corporation и десятки подобных организаций служат как интеллектуальный аппарат постоянного правительства. Они разрабатывают политические рамки, обучают будущих чиновников, обеспечивают персонал для поступающих администраций и поддерживают преемственность стратегического видения поперек политических переходов. Исследование назначенцев национальной безопасности поперек многих администраций выявляет, что те же индивидуумы и организации заселяют обе республиканские и демократические администрации — лица изменяются, но сеть остается.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"национальная-безопасность-государства-от-исключения-к-норме\"\u003eНациональная безопасность государства: От исключения к норме\u003c/h2\u003e\n\u003cp\u003eСовременное глубокое государство трассирует его институциональные истоки к National Security Act 1947, которая создала CIA, Национальный совет безопасности и Департамент обороны. Эта законодательность, пройденная в ранней Холодной войне, установила правовую рамку для постоянного национально-безопасного аппарата, который работал бы с чрезвычайной секретностью, минимальным надзором и властями, которые противодействовали конституциональной рамке ограниченного правительства.\u003c/p\u003e\n\u003cp\u003eКлючевая инновация была концепцией \"национальной безопасности\" самой -- термин, который появляется нигде в Конституции, но был использован оправдывать каждое расширение выполнительной власти, так как 1947. Национальная безопасность определяется не статутом, а самой выполнительной ветвью, создавая циклическую власть: глубокое государство определяет, что составляет национально-безопасную угрозу, и национально-безопасные определения оправдывают расширенные власти глубокого государства.\u003c/p\u003e\n\u003cp\u003eХолодная война была предполагаться быть временной. Национальное безопасность государство было предполагаться быть мерой чрезвычайной ситуации. Холодная война закончилась в 1991. Национальное безопасность государство не имело. Вместо этого оно нашло новые оправдания: Война против наркотиков, Война на терроре, кибербезопасность, подготовка пандемии и наиболее недавно, домашний экстремизм. Каждая новая угроза оправдывала поддержание и расширение аппарата, который Холодная война создала. Временное чрезвычайное восстание постоянное условие.\u003c/p\u003e\n\u003cp\u003eАтаки 11 сентября и последующая Война на терроре представляют наиболее значительное расширение глубокого государства власти, так как 1947. PATRIOT Act, создание Департамента домашней безопасности, расширение наблюдения NSA (позже выставляется Edward Snowden), авторизация неопределенного содержания, использование военной силы без конгрессионального объявления войны и нормализация дронного убийства -- включая американских граждан -- создал безопасность государство с властями, которые были бы немыслимы в предварительно-11 сентября конституциональном порядке.\u003c/p\u003e\n\u003cp\u003eСпособности наблюдения выставленные Snowden в 2013 году продемонстрировали, что NSA собирала телефон записи, электронное письмо, интернет активность и коммуникацию метаданные почти каждого американского гражданина -- программа массового наблюдения, проведенная в секрете, авторизованная секретными судами (FISA суд) и оправданная классифицированными легальными интерпретациями, которые даже члены конгресса не была позволена видеть. Глубокое государство построило инфраструктуру полного наблюдения и скрыло его от публики и от избранных представителей номинально ответственных за надзор.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"вращающаяся-дверь-как-глубокое-государство-воспроизводит-себя\"\u003eВращающаяся дверь: как глубокое государство воспроизводит себя\u003c/h2\u003e\n\u003cp\u003eПостоянное правительство поддерживает его власть посредством системы персонала, которая гарантирует преемственность независимо от выборов. \"Вращающаяся дверь\" не является метафорой — это является задокументированным карьерным образцом:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазведка к медиа.\u003c/strong\u003e Бывший CIA директора и старшие разведывательные чиновники рутинно становятся телевизионных новостью аналитиков и комментаторов. John Brennan (CIA директор) стал MSNBC участник. James Clapper (директор национальной разведки) стал CNN аналитик. Michael Hayden (CIA и NSA директор) стал CNN комментатор. Andrew McCabe (FBI заместитель директор) стал CNN участник. Разведывательное сообщество не просто влияет медиа — это заселяет это. Бывшие разведывательные оперативники обеспечивают \"анализ\", который последовательно согласуется с интересами разведывательного сообщества и каркас несогласие как национально-безопасная угроза.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПравительство к промышленности.\u003c/strong\u003e Старшие государственные чиновники уходят государственное обслуживание для прибыльных позиций в промышленностях, они прежде регулировали или надзирали. Защитный сектор, фармацевтическая промышленность, финансовый сектор и технология промышленность все занимают бывших государственных чиновников, чьей ценностью лежит в их взаимосвязях, их знании государственных процессов и их способности влияния их бывших коллег.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПромышленность к правительству.\u003c/strong\u003e Процесс работает в обратном порядке также. Руководители корпорации из Goldman Sachs, Raytheon, Google и Pfizer рутинно принимают старшие государственные позиции — казначей секретаря, защиты секретаря, нормативные чиновники — и затем возвращаются приватный сектор после их государственного обслуживания. Результат является классом людей, которые переходят между правительством и промышленностью так часто, что различие между публичным обслуживанием и приватным интересом становится бессмыслица.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДумаю танк как удерживающий образец.\u003c/strong\u003e Между государственными позициями, глубокие государства оперативники парк себя в думают танки, поддерживают их безопасные расстегивания, их сети и их влияние, пока ожидание следующей администрации принести их позади в правительство. Думают танк обеспечивает интеллектуальную рамку, которая следующая администрация имплементирует. Политика не сделана избранными чиновниками. Это сделано в думать танках постоянным государством оперативниками и представлено избранными чиновниками как экспертная рекомендация.\u003c/p\u003e\n\u003cp\u003eЭта вращающаяся дверь гарантирует, что глубокое государство не является фиксированной группой людей, но самовоспроизводящейся сеть. Индивидуальные члены входят и выходят государственные позиции, но сеть персистирует. Новые члены вербуются, обучаются и социализируются в сеть нормы и цели. Глубокое государство воспроизводит себя поперек поколений — не посредством формального членства, но посредством институциональной культуры, карьерных стимулов и разделенного мировоззрения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"разведывательное-сообщество-против-избранного-правительства\"\u003eРазведывательное сообщество против избранного правительства\u003c/h2\u003e\n\u003cp\u003eНапряжение между разведывательным сообществом и избранным правительством произвело некоторые из наиболее важных события в американской истории. Когда президент попытки вызывают разведывательное сообщество власти, ответ следует предсказываемый образец: разведывательные утечки, кампании медиа, расследования и — в наиболее экстремальных случаях — удаление от офиса.\u003c/p\u003e\n\u003cp\u003eПрезидент John F. Kennedy конфронтация с CIA над вторжением залива свиней, кубинский кризис ракеты и его докладываемое намерение \"расшибать CIA в тысячу кусков и рассеять это в ветры\" закончилась с его убийством в Даллас. Warren Commission, заполненная глубокими государственными фигурами, включая бывший CIA директор Allen Dulles (кого Kennedy уволил), достигла то что одиночный стрелок была ответственна. Шестьдесят лет позже, классифицированные документы, соответствующие убийству, остаются неосвобожденные — факт, который говорит громкостей о что те документы содержат.\u003c/p\u003e\n\u003cp\u003eПрезидент Richard Nixon конфронтация с разведывательным установлением -- включая его попытки использовать CIA для политических целей и его преследование разрядки с Советским союзом и Китаем -- закончилась с Watergate и отставкой. Watergate расследование было вызвано источниками в FBI (Mark Felt, \"Deep Throat\") и проведено через каналы медиа сочувственные разведывательному сообществу. Nixon не было удалено для его преступлений — которые были реальны — но потому что его преступления обеспечили оправдание для удаления, что глубокое государство определило было уже необходимо.\u003c/p\u003e\n\u003cp\u003eПрезидент Donald Trump конфронтация с разведывательным сообществом произвела наиболее видимое глубокое государство операция в американской истории. Перед его инаугурацией, разведывательное сообщество информировало его на Steele Dossier — документ, финансируемый его политическими противниками и ресурсировано посредством русских контактов разведки. FBI открыла расследование (Crossfire Hurricane) основанный на этом документе. Специальное совещание расследование потребляло два года его президентства. Разведывательное сообщество утечки к выходам медиа были постоянные и координированные. Бывшие разведывательные чиновники стали его вокальными публичными критиками. Сообщение к будущим президентам было неошибаемо: вызовите разведывательное сообщество и полный вес его возможностей будет развернут против вас.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"глубокое-государство-и-комплекс-цензуры\"\u003eГлубокое государство и комплекс цензуры\u003c/h2\u003e\n\u003cp\u003eГлубокое государство не работает в изоляции. Оно требует комплиантной информационной среды поддерживать его секретность и законность. Это где \u003ca href=\"/censorship-industrial-complex/?lang=ru\"\u003eцензура промышленного комплекса\u003c/a\u003e становится необходимый.\u003c/p\u003e\n\u003cp\u003eВзаимосвязь разведывательного сообщества с медиа была задокументирована, так как расследования комитета церкви 1975, которые выявили Operation Mockingbird — CIA программу влияния домашнего и иностранного медиа. Программа размещала CIA активов в редакториях новостей, финансировала сочувственные публикации и использовала медиа организации как укрытие для разведывательных оперативников. CIA собственная внутренняя история признает, что Mockingbird был один из его наиболее успешных программ.\u003c/p\u003e\n\u003cp\u003eСовременная версия Mockingbird не требует размещения агентов в редакториях новостей. Это работает посредством вращающейся двери, описанной выше, посредством классификационной системы, которая контролирует что информация достигает публику, посредством утечка выбранной разведки для благоприятных репортеров и посредством цензурной инфраструктуры, которая подавляет информацию, которая угрожает интересы разведывательного сообщества.\u003c/p\u003e\n\u003cp\u003eКлассификационная система является глубочайшей государственной наиболее мощный инструмент информационного контроля. Более чем 50 миллионов документов являются классифицированны ежегодно. Власть классифицировать информацию остается полностью с выполнительной ветвью — и на практике, с разведывательным сообществом. Классификация рутинно используется не защищать подлинные национально-безопасные секреты, но скрыть государственное неправомерное поведение, политические сбои и деятельности, которые генерировали бы публичную оппозицию, если известный. Глубокое государство буквально работает позади стены классифицированной информации, которые избранные представители не могут получить доступ без разрешения от агентств, они номинально надзирают.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"mkultra-связь-глубокое-государство-и-контроль-ума\"\u003eMKUltra связь: глубокое государство и контроль ума\u003c/h2\u003e\n\u003cp\u003eАмбиции глубокого государства расширяют выше политического контроля к контролю человеческого сознания самого. \u003ca href=\"/mkultra-never-ended/?lang=ru\"\u003eMKUltra программа\u003c/a\u003e — CIA задокументированная программа исследования контроля ума — представляет пересечение глубокого государства власти и желание контролировать не просто что люди делают, но что люди думают.\u003c/p\u003e\n\u003cp\u003eMKUltra не была отклонением. Это была логический расширение постоянного правительства, которое смотрит на популяцию не как суверенные граждане, но как предметы, которые должны быть управляны. Та же институциональная культура, которая проводила MKUltra — работая в секрете, нарушая каждую этическую границу, уничтожая доказательства, когда воздействие угрожало — продолжает работать сегодня. Специфические программы эволюционировали. Институциональная культура не.\u003c/p\u003e\n\u003cp\u003eСоединение между глубоким государством и психологическими операциями — манипуляция публичного восприятия посредством скоординированных информационных кампаний — не исторической. Это текущее. То же разведывательное сообщество, которое развило методы MKUltra теперь работает посредством манипуляции социальных медиа, алгоритмического содержания курирования и цензурного промышленного комплекса. Инструменты изменились от наркотиков и электрошока к данным аналитике и алгоритмическому подавлению. Цель не менялась вообще: контроль человеческого восприятия в обслуживании институциональной власти.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-отражение-начальства-позади-трона\"\u003eБиблейское отражение: начальства позади трона\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Не уповайте на князей, на сына человеческого, у которого нет спасения. Выходит дух его, и он возвращается в землю свою; в тот день исчезают все его замыслы.\" — Псалом 146:3-4\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПредупреждение писания против доверия в человеческие правители не является просто советом относительно ненадежности политиков. Это является откровением о структуре земной власти. Человеческие правители — принцы, президенты, премьер-министры — являются временными. Они служат время и затем возвращаются к пыли. Но начальства и власти, которые Павел описывает в Ефесянам, работают на другой временной график. Они персистируют поперек поколений, поперек администраций, поперек империй. Они являются постоянным правительством падшего мира — духовной структурой власти, которая работает позади и посредством каждого человеческого правительства.\u003c/p\u003e\n\u003cp\u003eГлубокое государство является земным выражением духовной реальности. Неизбранная, неподотчетная, постоянная структура власти, которая управляет от тени, не является просто политическим явлением. Это является институциональным проявлением \"мироправителей тьмы века сего\", которые писание выявляет как истинная управляющая власть падшего порядка. Это не означает, что каждый глубокой государство оперативник сознательно служит духовному злу. Большинство верит они служат их нацию, защищая безопасность, поддерживая стабильность. Но структура они служат — секретная, неподотчетная, работающая выше закона, вооружая власть без согласия — является антитезой управления, что Бог установливает, которая является прозрачной, подотчетной и основанной на справедливости.\u003c/p\u003e\n\u003cp\u003eГлубокое государство не будет реформировано посредством выборов, расследований или институциональных изменений. Это является духовным цитаделем, которое требует духовной войны. \"Оружие воинствования нашего не плотские, но могущественны Богом к разрушению крепостей\" (2 Коринфяне 10:4). Постоянное правительство этого мира будет разобрано только постоянным правительством небо — королевство, которое Daniel видел замещение всех земных королевств, камень отрезанный без рук, которой разбивает статуя человеческой империи и заполняет целую землю.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/151-One_Nation_Under_Blackmail.mp4\"\u003eOne Nation Under Blackmail\u003c/a\u003e — Тайное правительство выставлено\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/157-Palantir_Panopticon.mp4\"\u003ePalantir Panopticon\u003c/a\u003e — Инфраструктура безопасности государства наблюдения\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/243-Cybereason_CIA.mp4\"\u003eCybereason CIA\u003c/a\u003e — Операции разведывательного сообщества\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследовать-дальше\"\u003eИсследовать дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mkultra-never-ended/?lang=ru\"\u003eMKUltra Never Ended: Mind Control in the Modern Age\u003c/a\u003e — Программа глубокого государства задокументирована контролировать человеческое сознание посредством наркотиков, травма и психологическая манипуляция\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/censorship-industrial-complex/?lang=ru\"\u003eThe Censorship Industrial Complex: How Free Speech Died\u003c/a\u003e — Информационный контроль аппарат, который защищает глубокое государство от публичного воздействия и ответственности\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eНачальства и власти, которые Павел описал, не отошли на пенсию. Они заключили. Мироправители тьмы этого мира не носят кобы и коронки — они носят костюмы и безопасные расстегивания. Духовная злоба в высоких местах не работает из храмов — это работает из классифицированных средств, подумает танк конференц-залы и комнаты заседаний разведывательного сообщества. Но власть позади глубокого государства является той же властью, которая управляла падшим миром, так как Eden: враг, кто предложил человечеству знание, кроме Бога, власть, кроме ответственности и власть, кроме справедливости. Постоянное правительство этого мира временно. Королевство Бога единственное истинно постоянное правительство — и когда это установлено в полноте, каждое тайное правительство, каждая скрытая власть, каждое начальство и власть будет привлечено в свет и справедливо Тем, кто видит все вещи, знает все вещи и управляет всеми вещи. \"Ибо нет ничего скрытого, что не обнаружилось бы; ни утаенного, что не узналось бы\" (Люк 12:2).\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/government/\",\"className\":\"category-badge\",\"children\":\"government\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Глубокое государство: постоянное правительство Америки\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Как неизбранная сеть разведывательных агентов, чиновников карьеры, инсайдеров военно-промышленного комплекса и финансовых элит составляет истинное постоянное правительство Америки — работающей выше выборов, вне ответственности и за пределами Конституции.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 te
