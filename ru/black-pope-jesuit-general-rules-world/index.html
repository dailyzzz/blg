3cp\u003eКнига Откровения описывает систему власти, характеризуемую тайной — скрытой властью, скрытой личностью, секретным авторитетом. Женщина, сидящая на звере, не является прозрачной институцией, работающей в свете дня. Она — Тайный Вавилон — система, чья истинная природа известна только тем, кто может прочитать имя, написанное на её челе. Для всех остальных она — просто мощная институция, возможно, даже благодетельная. Тайна состоит в том, что её реальная власть, её реальная цель и её реальный хозяин скрыты позади фасада религии, традиции и авторитета.\u003c/p\u003e\n\u003cp\u003eПочти пять столетий католическая церковь имела двух пап. Один носит белое и сидит на троне в базилике Святого Петра, видимый миру, приветствующий паломников, издающий энциклики и выполняющий церемонии веры. Другой носит чёрное и сидит в палате штаб-квартиры иезуитов, невидимый миру, издающий приказы, повинующиеся без вопроса, направляющие сеть оперативников, которая охватывает каждую нацию на земле. Белый Папа — публичное лицо католической власти. Чёрный Папа — генеральный верховный Общества Иисуса — скрытая реальность.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"tamburini-я-управляю-не-только-парижу-но-китаю\"\u003eTamburini: \"я управляю не только Парижу, но Китаю\"\u003c/h2\u003e\n\u003ch3 id=\"генерал-который-признал-всё\"\u003eГенерал, который признал всё\u003c/h3\u003e\n\u003cp\u003eMichelangelo Tamburini служил четырнадцатым генеральным верховным Общества Иисуса с 1706 по 1730 годы. Он был одним из самых долгоживущих генералов в истории иезуитов, и во время его пребывания орден иезуитов достиг зенита своего глобального влияния. Из его палаты в Риме Tamburini направлял операции иезуитов на каждом населённом континенте — от дворов Европы к миссиям Китая, от плантаций Южной Америки к торговым постам Индии.\u003c/p\u003e\n\u003cp\u003eИ Tamburini, в момент необычной искренности, признал охват его власти:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Видишь, сэр, из этой палаты я управляю не только Парижу, но Китаю, не только Китаю, но всему миру, без кого-либо, чтобы знать, как я это делаю.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eЭто не хвастовство мегаломана. Это факт описание бюрократической реальности.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"general-harris-реальный-потенциальный-глава-иерархии\"\u003eGeneral Harris: \"Реальный потенциальный глава иерархии\"\u003c/h2\u003e\n\u003ch3 id=\"оценка-военного-аналитика\"\u003eОценка военного аналитика\u003c/h3\u003e\n\u003cp\u003eGeneral Harris, писав с аналитической точностью военного профессионала, предоставил одно из самых всеобъемлющих описаний отношения между Белым Папой и Чёрным Папой:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Организация римско-католической иерархии — это полная военная деспотия, которой папа — остенсивный главой. Чёрный Папа — глава ордена иезуитов и называется генерал. Он не только имеет команду своего ордена, но направляет и контролирует общую политику римско-католической церкви. Он — власть позади трона и реальный потенциальный глава иерархии.\"\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"find-out-more\"\u003eFind Out More\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"listen-while-you-read\"\u003eListen While You Read\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eSatan's Hosts — from the Confliction album\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eTotal Information Awareness — from the ZZZ Daily album\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"explore-further\"\u003eExplore Further\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/jesuit-oath-obedience-unto-death/?lang=ru\"\u003eThe Jesuit Oath: \"I Will Believe White Is Black If the Church Defines It\"\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/presidents-warned-jesuits-danger/?lang=ru\"\u003eEvery President Who Warned About Jesuits Was Ignored — Or Killed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/pope-deal-devil-1786-part3/?lang=ru\"\u003eThe Pope's Deal With the Devil Part 3\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eИз одной палаты в Риме человек в чёрном управляет миром. Он не появляется на телевидении. Он не держит пресс-конференции. Он не баллотируется на должность. Его имя неизвестно подавляющему большинству населения мира. И всё же — согласно свидетельству его собственных предшественников, анализу военных профессионалов, наблюдениям историков и пониманиям романистов — он командует большей властью, чем любой король, любой президент, любой премьер-министр на земле.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/history/\",\"className\":\"category-badge\",\"children\":\"history\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron
