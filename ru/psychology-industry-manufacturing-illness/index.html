 каждому по путям его и по плодам дел его.\" — Иеремия 17:9-10\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПисание объявляет, что только Бог может по-настоящему знать человеческое сердце. Только Господь ищет глубины человеческого сознания, понимает истинную природу человеческого страдания и может обеспечить истинное исцеление для раненой души. Однако современная психологическая индустрия позиционировала себя как арбитр человеческого разума - определяя, что нормально, а что патологично, что здоровье, а что болезнь, какие мысли приемлемы, а какие требуют химического вмешательства.\u003c/p\u003e\n\u003cp\u003eИндустрия, которая претендует на понимание человеческого разума, фактически индустриализировала его. Она взяла весь спектр человеческого эмоционального опыта - горе, тревогу, беспокойство, неповиновение, застенчивость, печаль, эксцентричность - и преобразовала каждое в учтённый диагноз с соответствующим фармацевтическим продуктом. DSM (Диагностическое и статистическое руководство психических расстройств) - это не научный документ. Это каталог - меню продуктов для фармацевтической промышленности, перечисляющее условия, которые оправдывают рецепты, которые генерируют доход, который финансирует исследования, которые создают новые условия, которые оправдывают новые рецепты.\u003c/p\u003e\n\u003cp\u003eКак трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eВраг внутри\u003c/a\u003e исследует, наиболее опасный враг - это тот, кто работает изнутри - из внутри учреждений, которые утверждают защищать нас, из внутри систем, которые утверждают исцелять нас, из внутри умов, которых учили не доверять их собственным естественным реакциям и подчиняться химическому управлению.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"dsm-история-расширения\"\u003eDSM: история расширения\u003c/h2\u003e\n\u003cp\u003eДиагностическое и статистическое руководство психических расстройств, опубликованное Американской психиатрической ассоциацией (APA), является фундаментальным документом современной психиатрии. Оно определяет, что представляет собой психическое расстройство, устанавливает критерии диагностики и определяет, какие условия имеют право на возмещение страховки и фармацевтическое лечение. Его влияние на психическое здравоохранение абсолютно: если условие не находится в DSM, оно практически не существует как излечиваемое психическое заболевание.\u003c/p\u003e\n\u003cp\u003eТраектория DSM рассказывает историю индустрии в неустанном расширении:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDSM-I (1952):\u003c/strong\u003e 106 диагнозов. Созданы в первую очередь для статистического отслеживания Администрацией ветеранов и федеральными больницами. Психические расстройства были широко категоризированы и поняты в основном через психоаналитический каркас, который подчёркивал разговорную терапию и исследование бессознательных процессов.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDSM-II (1968):\u003c/strong\u003e 182 диагноза. Расширенные категории и уточнённые определения, но всё ещё в основном ориентированные на психодинамические и социальные модели психического расстройства.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDSM-III (1980):\u003c/strong\u003e 265 диагнозов. Это издание представляло революционное преобразование. Под руководством Роберта Спитцера DSM-III отказался от психоаналитического каркаса и принял \"медицинскую модель\", которая рассматривала психические расстройства как биологические болезни, аналогичные физическим заболеваниям. Это было издание, которое открыло дверь фармацевтическому лечению как основному вмешательству для психического расстройства.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDSM-IV (1994):\u003c/strong\u003e 297 диагнозов. Дальнейшее расширение, с увеличивающейся специфичностью в диагностических критериях, которые позволили более широкое применение к большим сегментам популяции.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDSM-5 (2013):\u003c/strong\u003e Более 300 диагнозов. Самое спорное издание до сих пор, с изменениями, которые критики утверждали, будут патологизировать нормальное горе, детские истерики, повседневную забывчивость и переедание.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТраектория неоспорима: с каждым изданием DSM расширяет границы психического заболевания, охватывая всё больше и больше нормального человеческого опыта. То, что считалось нормальной эмоциональной реакцией в 1952 году, сейчас является диагностируемым психическим расстройством, требующим фармацевтического лечения. Граница между здоровьем и болезнью была переместила устойчиво в одном направлении - направлении большего количества диагнозов, большего количества рецептов и большего количества доходов.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"захват-фармацевтической-промышленностью-психиатрии\"\u003eЗахват фармацевтической промышленностью психиатрии\u003c/h2\u003e\n\u003cp\u003eПреобразование DSM-III из психоаналитического в биологический каркас было не просто интеллектуальным сдвигом. Это был корпоративный захват. Принятие \"медицинской модели\" - идеи, что психические расстройства являются биологическими болезнями мозга, вызванными химическими дисбалансами - преобразовало психиатрию из профессии, ориентированной на разговорную терапию и человеческое понимание, в профессию, ориентированную на фармацевтический рецепт.\u003c/p\u003e\n\u003cp\u003eТеория \"химического дисбаланса\" психического заболевания - идея, что депрессия вызывается низким серотонином, шизофрения избыточным дофамином, ADHD недостаточным норэпинефрином - никогда не была доказана. Это была гипотеза, которая стала маркетинговым нарративом. В 2022 году комплексный обзор зонтика, опубликованный в \u003cem\u003eMolecular Psychiatry\u003c/em\u003e Moncrieff и другими, пришли к выводу, что \"теория серотонина депрессии не поддерживается доказательствами\". После десятилетий того, как эта теория была представлена пациентам как установленный научный факт - основание, на котором миллионы были предписаны SSRI - тщательный анализ доказательств не обнаружил постоянной поддержки.\u003c/p\u003e\n\u003cp\u003eОднако фармацевтическая промышленность построила многомиллиардный рынок на этой недоказанной гипотезе. SSRI (селективные ингибиторы обратного захвата серотонина) - включая Prozac, Zoloft, Paxil, Lexapro и Celexa - стали одними из наиболее назначаемых лекарств в истории. Более 70 миллионов американцев в настоящее время принимают антидепрессанты. Фармацевтическая промышленность не просто отреагировала на диагностированную эпидемию депрессии. Она создала диагностический каркас, который определил эпидемию, финансировала исследования, которые поддерживали теорию химического дисбаланса, и продавала препараты, которые были представлены как решение.\u003c/p\u003e\n\u003cp\u003eФинансовые отношения между психиатрической профессией и фармацевтической промышленностью обширны и хорошо задокументированы. Исследование 2006 года Cosgrove и других, опубликованное в \u003cem\u003ePsychotherapy and Psychosomatics\u003c/em\u003e, обнаружило, что 56% членов рабочей группы DSM-IV имели финансовые связи с фармацевтической промышленностью. Для определённых диагностических категорий - расстройства настроения, психотические расстройства - 100% членов панели имели связи промышленности. Люди, определяющие психическое заболевание, были оплачены компаниями, которые получают прибыль от этих определений.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"детство-наиболее-прибыльный-рубеж\"\u003eДетство: наиболее прибыльный рубеж\u003c/h2\u003e\n\u003cp\u003eНаиболее беспокойное расширение психиатрической диагностики нацелено на детей. Диагностика и фармацевтическое лечение детей при психических расстройствах взорвалось в течение последних трёх десятилетий, создавая поколение, которое было лекарством с раннего детства.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eADHD (синдром дефицита внимания с гиперактивностью):\u003c/strong\u003e Диагностика ADHD у американских детей увеличилась более чем на 40% с 2003 года. Примерно 6,1 миллиона детей в Соединённых Штатах был диагностирован ADHD, и большинство лечится стимулирующими препаратами - амфетаминовыми препаратами (Adderall) и метилфенидатными препаратами (Ritalin, Concerta). Это контролируемые вещества Catalana II, в той же нормативной категории как кокаин и метамфетамин, вводимые детям в возрасте от двух лет.\u003c/p\u003e\n\u003cp\u003eДиагностические критерии для ADHD включают: \"часто вертится или постукивает руками или ногами\", \"часто вставает с места в ситуациях, когда оставаться на месте ожидается\", \"часто неспособен играть или заниматься досугом спокойно\" и \"часто чрезмерно разговаривает\". Эти критерии описывают нормальное детское поведение. Преобразование нормальной детской энергии, любопытства и беспокойства в диагностируемое психическое расстройство, требующее контролируемых стимулирующих препаратов Ката II, является одним из наиболее вопиющих примеров того, как психологическая индустрия производит искусственное заболевание.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДетское биполярное расстройство:\u003c/strong\u003e Диагностика биполярного расстройства у детей увеличилась в 40 раз между 1994 и 2003 годами, в основном управляемая защитой д-ра Джозефа Бидермана из Гарвардской медицинской школы. Бидерман получал миллионы долларов в консультационных комиссиях от фармацевтических компаний, включая Johnson \u0026#x26; Johnson, которая производила антипсихотический препарат Risperdal - препарат, всё чаще назначаемый детям, диагностированным с биполярным расстройством. Конгрессовое расследование выявило, что Бидерман не раскрыл полный объём своих платежей промышленности, и его исследование впоследствии было изучено на предмет конфликтов интересов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОппозиционно-вызывающее расстройство (ODD):\u003c/strong\u003e DSM включает диагноз для детей, которые отображают \"образец сердитого/раздражённого настроения, аргументирующего/вызывающего поведения или мстительности\". Простые слова: дети, которые говорят взрослым, спорят с авторитетными фигурами и становятся сердитыми. Это теперь диагностируемое психическое расстройство. И как только диагностировано, это открывает дверь фармацевтическому лечению - потому что каждый диагноз - это шлюз рецепту.\u003c/p\u003e\n\u003cp\u003eКак задокументировано в нашей статье о \u003ca href=\"/education-system-indoctrination/?lang=ru\"\u003eИндоктринация образовательной системы\u003c/a\u003e, образовательная система работает в тандеме с психиатрической индустрией: дети, которые не соответствуют ожиданиям поведения класса, направляются на психологическую оценку, диагностируются с расстройствами, которые патологизируют их неконформность, и размещаются на фармацевтических схемах, которые обеспечивают соответствие через химические средства.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"индустрия-горя-патологизация-нормального-человеческого-опыта\"\u003eИндустрия горя: патологизация нормального человеческого опыта\u003c/h2\u003e\n\u003cp\u003eВозможно, наиболее показательное изменение в DSM-5 было исключение \"исключения горевания\" для большого депрессивного расстройства. Согласно предыдущим изданиям DSM, человек, испытывающий депрессивные симптомы после смерти близкого человека, не был диагностирован с большим депрессивным расстройством, если симптомы были совместимы с нормальным горем и длились менее двух месяцев. Горе было признано нормальной человеческой реакцией, не болезнью.\u003c/p\u003e\n\u003cp\u003eDSM-5 исключило это исключение. Согласно текущим критериям, человек, демонстрирующий депрессивные симптомы, так как несколько как две недели после смерти близкого человека, может быть диагностирован с большим депрессивным расстройством и предписана антидепрессанты. Нормальное горе - глубоко человеческий опыт скорбления о потере - теперь фармацевтический рынок.\u003c/p\u003e\n\u003cp\u003eПоследствия ошеломляющи. Каждый человек, который теряет близкого человека - каждая вдова, каждый сирота, каждый родитель, который хоронит ребёнка - теперь потенциальный клиент для фармацевтической промышленности. DSM преобразовал один из наиболее универсальных и глубоко человеческих опытов в учтённый диагноз. И лечение - это не комфорт, община, духовный совет или прохождение времени - это химическое вещество, которое изменяет нейрохимию мозга и может само производить зависимость.\u003c/p\u003e\n\u003cp\u003eАллен Франсис, председатель рабочей группы DSM-IV, публично выступал против изменений в DSM-5, предупреждая, что новое издание \"медикализирует нормальность\" и \"обратит нашу текущую диагностическую инфляцию в диагностическую гиперинфляцию\". Франсис признал, что даже DSM-IV способствовал \"ложным эпидемиям\" ADHD, аутизма и детского биполярного расстройства через чрезмерно широкие диагностические критерии. Его предупреждения были проигнорированы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"кризис-репликации-научная-неудача-психологии\"\u003eКризис репликации: научная неудача психологии\u003c/h2\u003e\n\u003cp\u003eНаучная достоверность психологии была дополнительно подорвана кризисом репликации - открытием, что большинство опубликованной психологической исследований не может быть независимо воспроизведено. В 2015 году Открытое сотрудничество науки опубликовало знаковое исследование в \u003cem\u003eScience\u003c/em\u003e, пытаясь воспроизвести 100 психологических исследований, опубликованных в ведущих рецензируемых журналах. Только 36% репликаций произвели статистически значимые результаты, совместимые с оригинальными выводами.\u003c/p\u003e\n\u003cp\u003eЭто означает, что большинство психологических исследований - исследований, которые информируют диагностические критерии, протоколы лечения и фармацевтические рецепты - может быть ненадёжным. Последствия для миллионов людей, диагностированных и лечили на основе этого исследования, глубоки: их диагнозы могут быть основаны на науке, которая не реплицируется, их лечение может быть основано на исследованиях, чьи выводы поддельны, и их жизни могут быть изменены фармацевтическими вмешательствами, оправданными недёжным доказательством.\u003c/p\u003e\n\u003cp\u003eКризис репликации - это не незначительное методологическое беспокойство. Он ставит под сомнение весь эмпирический фундамент современной психологии. Если исследование не реплицируется, то диагностические категории, полученные из этого исследования, не эмпирически обоснованы. И если диагностические категории не эмпирически обоснованы, то фармацевтические лечения, предписанные для этих категорий, не имеют действительного научного основания.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"наследие-mk-ultra-психология-как-контроль\"\u003eНаследие MK-Ultra: психология как контроль\u003c/h2\u003e\n\u003cp\u003eОтношения между психологией и правительственным контролем не заканчились формальным прекращением MK-Ultra в 1973 году. Методы, разработанные посредством десятилетий финансируемого ЦРУ психологического исследования - включая поведенческое обусловливание, травму-основанную манипуляцию и фармакологический контроль - были интегрированы в институциональную практику способами, которые редко признаются.\u003c/p\u003e\n\u003cp\u003eАмериканская психологическая ассоциация (APA) была прямо вовлечена в проектирование и реализацию программы усиленных методов допроса (EIT) ЦРУ. Отчёт Hoffman 2015 года, заказанный самой АПА, обнаружил, что официальные лица АПА сговорились с Министерством защиты и ЦРУ, чтобы гарантировать, что этические рекомендации АПА были достаточно гибкими, чтобы позволить участие психолога в насильственных программах допроса в заливе Гуантанамо и других местах задержания. Доклад задокументировал \"беспокойный\" образец координации между АПА и государственными учреждениями для защиты участия психолога в пытках.\u003c/p\u003e\n\u003cp\u003eКак исследовано в нашей статье о \u003ca href=\"/mkultra-never-ended/?lang=ru\"\u003eMKUltra никогда не закончилась\u003c/a\u003e, принципы MK-Ultra - использование препаратов, травмы и психологической манипуляции для контроля человеческого поведения - не исчезли. Они были нормализированы, коммерциализированы и распределены через психиатрическую фармацевтическую систему. Ребёнок, лекарствопринимающий в соответствии класса, скорбящая вдова, лекарствопринимающая в эмоциональную плоскость, и тревожный взрослый, химически седирующий вместо того, чтобы помочь понять источник своей тревоги - все являются получателями того же фундаментального принципа: химический контроль над разумом.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библейское-отражение-душа-которую-может-исцелить-только-бог\"\u003eБиблейское отражение: душа, которую может исцелить только Бог\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Он исцеляет сокрушённых сердцем и врачует раны их.\" — Псалом 147:3\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИндустрия психологии позиционировала себя как целитель разбитых сердец и раненых душ. Но Писание назначает эту роль исключительно Богу. Псалмист не говорит, что фармацевтические компании исцеляют огорчённых сердцем. Он не говорит, что DSM определяет их разбитость. Он не говорит, что SSRI вяжут их раны. Он говорит, что Бог исцеляет. Бог вяжет. Бог восстанавливает.\u003c/p\u003e\n\u003cp\u003eЭто не отказ от истинного психического страдания. Депрессия реальна. Тревога реальна. Травма реальна. Но современная индустрия психологии не исцеляет эти условия - она управляет ими фармацевтически, в то время как оставляя коренные причины нелечёнными. Разбитое сердце остаётся разбитым; оно просто лекарствопринимается в оцепенение. Рана остаётся открытой; она просто покрыта химической повязкой, которая маскирует боль без содействия заживлению.\u003c/p\u003e\n\u003cp\u003eБиблейская модель ухода за душой - молитва, община, исповедь, покаяние, поклонение, чтение писания и вселение святого духа - обращаются к коренным причинам психического расстройства: отделение от Бога, бремя греха, раны падшего мира и тоска по восстановлению, которое может удовлетворить только Создатель. Фармацевтическая модель обращается к симптомам, игнорируя душу. Она лекарствопринимает разбитое сердце без исцеления его. Она вяжет рану без восстановления её.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о близком опыте смерти Говарда Питтмана — предупреждение о конце времён\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолический конфиденциально: раскрытие позорных тайн иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и фармакея — колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eПравда о жизни на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/115-Psychology_Industry_Hoax.mp4\"\u003eПсихология индустрии обман\u003c/a\u003e — производство психического заболевания для прибыли\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra никогда не закончилась\u003c/a\u003e — вооружение психологии\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"изучите-дальше\"\u003eИзучите дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/mkultra-never-ended/?lang=ru\"\u003eMKUltra никогда не закончилась\u003c/a\u003e — программа психологического контроля ЦРУ была не прекращена; её принципы были коммерциализированы через психиатрическую фармацевтическую индустрию\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/education-system-indoctrination/?lang=ru\"\u003eИндоктринация образовательной системы\u003c/a\u003e — как образовательная система и психиатрическая индустрия сотрудничают для патологизации неконформности и обеспечения соответствия посредством лекарственного средства\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eГосподь ищет сердце. Индустрия психологии каталогизирует его, диагностирует его и лекарствопринимает его. Один стремится исцелить; другой стремится управлять. Один обращается к душе; другой обращается к симптомам. Один предлагает свободу; другой предлагает зависимость. DSM выросла с 106 диагнозов на более чем 300, патологизируя горе, детскую энергию, неповиновение и застенчивость - преобразуя весь спектр человеческого опыта в фармацевтические рынки. Но целитель разбитых сердец не изменился. Его диагноз - грех и отделение. Его рецепт - благодать и восстановление. Его лечение не имеет побочных эффектов, не имеет зависимости, не имеет кризиса репликации и не имеет конфликта интересов. Он исцеляет сокрушённых сердцем и врачует раны их. Никакой код DSM не требуется.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/catego
