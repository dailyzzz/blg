ь, говорит свое, ибо он лжец и отец лжи.\"\u003c/em\u003e — Иоанн 8:44\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДьявол не лжет грубо. Он лжет с точностью, с юридической изощренностью, с правдоподобным отрицанием. Он лжет, говоря частичную правду, переопределяя слова, создавая системы, в которых обман не просто разрешен, но легализован. Правительства и корпорации усовершенствовали это искусство — искусство лгать, технически не лгая, обманывать, сохраняя юридическую защиту, что каждое произнесенное ими слово было \"правдой\".\u003c/p\u003e\n\u003cp\u003eОколосмертный опыт Говарда Питтмана раскрыл, что каждое слово несет духовный вес. Матфея 12:36-37 предупреждает, что \"за всякое праздное слово, какое скажут люди, дадут они ответ в день суда\". Это относится к тщательно составленным словам пресс-релизов, точно сформулированным отрицаниям политиков и юридически проверенным заявлениям корпораций — все они предназначены для обмана, оставаясь технически защитимыми.\u003c/p\u003e\n\u003cp\u003eИезуиты усовершенствовали правдивый обман веками, прежде чем современные правительства и корпорации приняли его. Их доктрина мысленной оговорки — идея, что можно говорить частичную правду, удерживая остальное, если существует достаточная причина — является теологическим основанием современной институциональной лжи. \u003cem\u003eCatholic Confidential\u003c/em\u003e раскрывает инфильтрацию \"облаченную в хитрость\". Хитрость лингвистическая — способность сказать одно, а иметь в виду другое, казаться правдивым, практикуя обман.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eЛожь обманщика — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМаскировка сатаны — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"техники-легальной-лжи\"\u003eТехники легальной лжи\u003c/h2\u003e\n\u003ch3 id=\"мысленная-оговорка-иезуитское-основание\"\u003eМысленная оговорка: Иезуитское основание\u003c/h3\u003e\n\u003cp\u003eИезуитская доктрина мысленной оговорки, разработанная в 16 и 17 веках, утверждает, что можно произносить заявление, которое буквально истинно в одном смысле, будучи обманчивым в другом, при условии, что человек \"оставляет\" истинное значение мысленно. Например, иезуит, на которого спросили \"Вы иезуит?\", мог ответить \"Нет\", мысленно добавляя \"...в том смысле, который вы имеете в виду\" — означая, что он не тот тип иезуита, которого представляет себе спрашивающий.\u003c/p\u003e\n\u003cp\u003eЭта доктрина была спорной даже внутри Католической церкви. \u003cem\u003eПровинциальные письма\u003c/em\u003e Паскаля (1656-57) атаковали ее как институционализированную ложь. Но доктрина выжила, потому что служила институциональной власти — она позволяла иезуитским агентам проникать на враждебные территории, обманывать допрашивающих и поддерживать прикрытия, технически никогда не \"лгая\".\u003c/p\u003e\n\u003cp\u003eСовременные правительства и корпорации постоянно практикуют мысленную оговорку:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\"Этот продукт \u003cstrong\u003eнатуральный\u003c/strong\u003e\" (мысленно оставляя: \"...в том смысле, что все, что существует, является частью природы\")\u003c/li\u003e\n\u003cli\u003e\"Мы \u003cstrong\u003eне продаем\u003c/strong\u003e ваши данные\" (мысленно оставляя: \"...мы делимся ими с партнерами, которые нас компенсируют\")\u003c/li\u003e\n\u003cli\u003e\"Нет \u003cstrong\u003eдоказательств\u003c/strong\u003e вреда\" (мысленно оставляя: \"...потому что мы не искали никаких\")\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждое заявление технически истинно в узком смысле, будучи фундаментально обманчивым в своем предполагаемом значении. Это иезуитская доктрина мысленной оговорки, примененная в промышленном масштабе.\u003c/p\u003e\n\u003ch3 id=\"регуляторное-двуязычие\"\u003eРегуляторное двуязычие\u003c/h3\u003e\n\u003cp\u003eРегулирующие агентства говорят на языке, предназначенном для затуманивания, а не прояснения:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Общепризнанно безопасно\" (GRAS)\u003c/strong\u003e: Эта классификация FDA означает, что вещество не было доказано опасным к удовлетворению FDA. Это не означает, что вещество было доказано безопасным. Большинство веществ GRAS никогда не тестировались независимо на долгосрочные последствия для здоровья.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Незначительный риск\"\u003c/strong\u003e: Фраза, используемая регулирующими агентствами для описания приемлемых уровней загрязнения. Это не означает \"нет риска\". Это означает, что риск был сочтен приемлемым — регуляторами, которые могут иметь финансовые связи с отраслями, которые они регулируют.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Добровольное соблюдение\"\u003c/strong\u003e: Термин IRS для налоговой системы. Это не означает, что соблюдение добровольно. Это означает, что налогоплательщики должны сами рассчитывать и сообщать свои налоги — и будут наказаны, если не справятся.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Усиленные методы допроса\"\u003c/strong\u003e: Термин ЦРУ для пыток. Слова технически точны — допрос, безусловно, \"усилен\" — скрывая реальность того, что они описывают.\u003c/p\u003e\n\u003cp\u003eAgent131711 документирует на Substack (agent131711.substack.com), как регуляторное двуязычие служит институциональным интересам, создавая языковой барьер между публикой и реальностью того, что делают институты. Публика читает \"безопасно\" и верит, что продукт безопасен. Регулятор написал \"безопасно\", зная, что это означает \"еще не доказано опасным\". Разрыв между этими значениями — это место, где действует правдивый обман.\u003c/p\u003e\n\u003ch3 id=\"ловушка-мелкого-шрифта\"\u003eЛовушка мелкого шрифта\u003c/h3\u003e\n\u003cp\u003eКаждый потребительский контракт — каждое соглашение об условиях обслуживания, каждая политика конфиденциальности, каждая страховая полиса, каждое ипотечное соглашение — это шедевр правдивого обмана. Важная информация похоронена в тысячах слов плотного юридического языка, который средний потребитель не может понять и не читает.\u003c/p\u003e\n\u003cp\u003eИсследование 2020 года показало, что среднему американцу потребовалось бы 76 рабочих дней в год, чтобы прочитать все политики конфиденциальности, с которыми он сталкивается онлайн. Никто их не читает. Все соглашаются с ними. И компании, которые их пишут, знают это — они разрабатывают документы так, чтобы они были нечитаемыми, содержа при этом пункты, с которыми потребитель никогда бы сознательно не согласился.\u003c/p\u003e\n\u003cp\u003eЭто не провал коммуникации. Это стратегия обмана — скрытие обязательств, отказов и разрешений в языке, предназначенном для предотвращения понимания. Потребитель \"соглашается\" без понимания, а корпорация использует это согласие, чтобы оправдать все, что намеревалась делать с самого начала.\u003c/p\u003e\n\u003ch3 id=\"статистические-манипуляции\"\u003eСтатистические манипуляции\u003c/h3\u003e\n\u003cp\u003eПравительства и корпорации регулярно манипулируют статистикой для создания правдивых обманов:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтатистика безработицы\u003c/strong\u003e исключает \"обескураженных работников\" — людей, которые перестали искать работу. Истинный уровень безработицы постоянно выше, чем сообщаемый показатель, но цифра правительства \"правдива\" в пределах своего узкого определения.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтатистика инфляции\u003c/strong\u003e исключает волатильные категории (еда, энергия), когда это подходит нарративу. \"Базовая инфляция\" — число, обычно сообщаемое — опускает категории, которые больше всего влияют на обычных потребителей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСтатистика преступности\u003c/strong\u003e манипулируется переклассификацией правонарушений, изменением требований к отчетности и исключением категорий. Город может сообщать о \"снижении преступности\", в то время как фактическая преступная деятельность увеличивается, просто изменив способ подсчета преступлений.\u003c/p\u003e\n\u003cp\u003eКаждая из этих статистик технически точна в рамках выбранных определений. Каждая фундаментально обманчива в своих реальных последствиях. Это правдивый обман на политическом уровне — числа, которые лгут, будучи математически корректными.\u003c/p\u003e\n\u003ch2 id=\"духовный-вес-легальной-лжи\"\u003eДуховный вес легальной лжи\u003c/h2\u003e\n\u003ch3 id=\"каждое-слово-имеет-значение\"\u003eКаждое слово имеет значение\u003c/h3\u003e\n\u003cp\u003eМатфея 12:36-37: \"Говорю же вам, что за всякое праздное слово, какое скажут люди, дадут они ответ в день суда. Ибо от слов своих оправдаешься, и от слов своих осудишься.\"\u003c/p\u003e\n\u003cp\u003eЭтот отрывок не освобождает слова, которые \"технически истинны\". Он не освобождает слова, составленные юристами для поддержания правдоподобного отрицания. Он не освобождает корпоративные пресс-релизы, правительственные заявления или регуляторные классификации. Каждое слово несет вес — и слова, предназначенные для обмана, казаясь правдивыми, несут самый тяжелый вес из всех, потому что они сочетают грех обмана с грехом гордыни: верой, что лингвистическая хитрость может избежать божественного суда.\u003c/p\u003e\n\u003cp\u003e97,5 процента Говарда Питтмана включали людей, которые произносили \"правдивые\" слова — которые говорили \"Господь, Господь\", в то время как их сердца служили себе. Их слова были технически религиозными, но фундаментально обманчивыми. Они обманывали себя. И духовное царство, которое действует на основе реальности, а не технических деталей, не было обмануто.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые изобрели мысленную оговорку и усовершенствовали институциональный обман, столкнутся с этим же судом. Их инфильтрация \"облаченная в хитрость\" — это расширенное упражнение в правдивом обмане — казаться чем-то, чем они не являются, произносить слова, которые скрывают, а не раскрывают, практиковать \"все виды порока\", исповедуя добродетель. Каждое слово будет взвешено. Каждая оговорка будет разоблачена. Каждая хитрость будет обнажена.\u003c/p\u003e\n\u003ch2 id=\"защита-себя\"\u003eЗащита себя\u003c/h2\u003e\n\u003ch3 id=\"распознавание-паттернов\"\u003eРаспознавание паттернов\u003c/h3\u003e\n\u003cp\u003eПервая защита от правдивого обмана — распознавание его паттернов:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eСледите за оговорками\u003c/strong\u003e: \"Обычно\", \"типично\", \"может\", \"могло бы\" — эти слова превращают определенные заявления в оговорки.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЧитайте мелкий шрифт\u003c/strong\u003e: Если вы с чем-то соглашаетесь, читайте каждое слово.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСтавьте под вопрос статистику\u003c/strong\u003e: Спрашивайте, что включено и что исключено. Спрашивайте определения.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНе доверяйте эвфемизмам\u003c/strong\u003e: Когда язык смягчается, обман усиливается.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСледуйте за деньгами\u003c/strong\u003e: Спрашивайте, кто выигрывает от того, что заявление интерпретируется одним способом, а не другим.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИщите первоисточники\u003c/strong\u003e: Не доверяйте резюме, заголовкам или пресс-релизам. Читайте оригинальные документы.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eУзкий путь — это путь лингвистической честности — говорить прямо, слушать внимательно и отказываться принимать поверхностное значение слов, созданных для обмана. В мире, где правительства, корпорации и религиозные институты усовершенствовали искусство легальной лжи, способность слышать то, что не говорится, — это самый ценный навык, который вы можете развить.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Analysis of institutional deception and doublespeak\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTube\u003c/a\u003e — Every word weighed in the spiritual realm\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eWatch on YouTube\u003c/a\u003e — The Jesuit doctrine of mental reservation and institutional deception\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceiver's Lies\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_
