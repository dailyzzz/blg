\"\u003c/em\u003e — Лука 11:52\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eХристианство не развивалось естественно. Это было спроектировано. Версия, практикуемая миллиардами сегодня, не оригинальная — это то, что остаётся после веков систематического удаления. Тексты были сожжены. Сообщества были уничтожены. Верующие были пыточены и убиты. И когда дым рассеялся, только одна версия выжила: версия, которая служила учреждению.\u003c/p\u003e\n\u003cp\u003eБлизкое к смерти переживание Говарда Питтмана раскрыло последствия. Три небеса. Демоническая иерархия во втором. 97,5 процента христиан отвергнуто. \"Никогда не сделали Меня Господом.\" Девяносто пять процентов служат \"себе.\" Каждое слово судить (Матфей 12:36-37). Если христианство, которое люди практиковали, была намеренно сконструированная версия — версия, спроектированная учреждением, чтобы служить учреждению — то отвержение делает совершенный смысл. Они следовали религии, построенной людьми, не Богом.\u003c/p\u003e\n\u003cp\u003eИезуиты совершили процесс удаления. Лойола военная организация, стремящаяся Наполеона к \"абсолютной власти.\" Adams к \"вечному осуждению.\" Тамбулини управляющий \"всему миру.\" Клемент XIV отравленный. \u003cem\u003eCatholic Confidential\u003c/em\u003e раскрывает метод: инфильтрация \"облачённая в хитрость,\" слепое послушание, \"каждый вид порока.\" Иезуиты не просто защищали институциональную версию христианства. Они удалили альтернативы.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"удалённые-тексты\"\u003eУдалённые тексты\u003c/h2\u003e\n\u003ch3 id=\"что-мы-потеряли\"\u003eЧто мы потеряли\u003c/h3\u003e\n\u003cp\u003eИнституциональная церковь не просто исключила тексты из канона. Это уничтожила их. Целые библиотеки были сожжены. Рукописи были конфискованы и потеряны. Сообщества, которые сохранили альтернативные тексты, были объявлены еретическими и уничтожены. Масштаб удаления поражающий.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБиблиотека Александрии\u003c/strong\u003e: Величайшая библиотека древнего мира была уничтожена в течение нескольких веков. Христианские толпы, вдохновленные епископом Теофилом и позже епископом Кириллом, целевые языческие и неортодоксальные тексты. Сераператорий, последний основной репозиторий библиотеки, был уничтожен в 391 AD христианской толпой. Знания древнего мира — включая ранние христианские тексты, которые не соответствовали появляющейся ортодоксии — были потеряны навсегда.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГностические библиотеки\u003c/strong\u003e: Пока открытие 1945 в Наг Хаммади, гностические тексты были известны только через полемику их противников — отцы церкви, которые цитировали их только, чтобы опровергнуть их. Институциональная церковь столь полностью уничтожила гностическую литературу, что целые теологические системы были известны только через искажённую линзу их врагов.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКанон Маркиона\u003c/strong\u003e: Сбор Маркионом писем Павла и его отредактированный Лука был систематически уничтожен. Мы знаем то, что он содержал, только через ответ Тертуллиана. Первый христианский канон — первая попытка определить священное писание — была удалена учреждением, которое утверждало право сделать это определение.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDidache\u003c/strong\u003e: Этот ранний христианский справочник практики, возможно, датируемый первым веком, был потерян в течение тысячи лет, пока его переоткрытие в 1873. Он представляет форму христианства, сосредоточённую на этической практике, чем доктринальной вере — версия, которая учреждение нашло неудобное.\u003c/p\u003e\n\u003cp\u003eAgent131711's Substack (agent131711.substack.com) задокументирует полный масштаб этого удаления, показав, что то, что мы называем \"христианством\" сегодня, не оригинальное, но выживший — версия, которая учреждение разрешило жить после убийства всех альтернатив.\u003c/p\u003e\n\u003ch3 id=\"что-мы-почти-потеряли\"\u003eЧто мы почти потеряли\u003c/h3\u003e\n\u003cp\u003eНекоторые тексты выжили, несмотря на попытки учреждения:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКнига Еноха\u003c/strong\u003e: Цитируется в Jude, известная ранним христианам, исключённая из западного канона. Она выжила только, потому что эфиопская церковь сохранила её. Её детальные описания падших ангелов, смотрящих и структуры небес не подходили институциональной структуре.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМёртвые море свитков\u003c/strong\u003e: Скрытые в пещерах близко Qumran около 70 AD, эти тексты были сохранены случайностью — сухим климатом пустыни и запечатанными сосудами, которые их содержали. Их открытие в 1947 раскрыло иудаизм намного более разнообразный, чем институциональная версия предполагаемая.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБиблиотека Наг Хаммади\u003c/strong\u003e: Закопана в запечатанном сосуде в египетской пустыне, вероятно около того времени, когда институциональная церковь уничтожала гностические тексты в другом месте. Их выживание было случайностью. Попытка учреждения стереть их почти выполнена.\u003c/p\u003e\n\u003cp\u003eЭти выживания — случаи географии и климата. Они представляют крошечную фракцию того, что было потеряно. На каждый текст, который выжил, десятки — возможно сотни — были уничтожены. Удаление учреждением не частичное. Это было полное.\u003c/p\u003e\n\u003ch2 id=\"удалённые-верования\"\u003eУдалённые верования\u003c/h2\u003e\n\u003ch3 id=\"реинкарнация\"\u003eРеинкарнация\u003c/h3\u003e\n\u003cp\u003eРанние христиане имели разнообразные представления о судьбе души. Некоторые — включая, согласно нескольким отцам церкви, Origen of Alexandria, одного из самых блестящих ранних теологов — верили в предсуществование душ и возможность множественных жизней.\u003c/p\u003e\n\u003cp\u003eВторой совет Константинополя (553 AD) осудил учения Origen, включая (по более позднему толкованию) концепцию реинкарнации. Император Юстиниан созвал этот совет специально для подавления влияния Origen. Папа того времени, Vigilius, первоначально отказался присутствовать и позже сотрудничал только под имперским давлением.\u003c/p\u003e\n\u003cp\u003eУдаление реинкарнации из христианской теологии имело огромные последствия. Если души имеют один шанс, роль учреждения становится существенной — только учреждение может гарантировать вы делаете правильный выбор. Если души имеют множественные возможности, срочность учреждения уменьшается. Удаление служило учреждению, не истине.\u003c/p\u003e\n\u003ch3 id=\"прямое-знание-бога\"\u003eПрямое знание Бога\u003c/h3\u003e\n\u003cp\u003eГностические традиции подчёркивали \u003cem\u003egnosis\u003c/em\u003e — прямое, экспериментальное знание Бога, которое требовал никакого посредника. Это самая опасная идея для любого учреждения, потому что это делает учреждение ненужным. Если вы можете знать Бога прямо, вы не нуждаетесь в священнике, церкви, таинстве или десятине.\u003c/p\u003e\n\u003cp\u003eИнституциональная церковь объявила гнозис еретическим и уничтожила сообщества, которые это практиковали. Это заменило прямое знание с верой — в частности, верой в учение учреждения. Вам не нужно было испытать Бога самого. Вам нужно верить в то, что церковь сказала вам о Боге. Этот сдвиг от опыта к вере — основание институционального христианства.\u003c/p\u003e\n\u003cp\u003eИезуиты совершили этот сдвиг. Их образовательная система тренирует верующих принять институциональную доктрину, чем ищут прямой опыт. Их духовные упражнения — Loyola славится \u003cem\u003eExercitia Spiritualia\u003c/em\u003e — видят предложить личный духовный опыт, но фактически направляют этот опыт через институциональные структуры, гарантируя, что всё, что человек встречает, интерпретируется согласно иезуитской теологии.\u003c/p\u003e\n\u003ch3 id=\"божественное-женское\"\u003eБожественное женское\u003c/h3\u003e\n\u003cp\u003eРаннее христианство включало женское образность для Бога и выдающиеся роли для женщин. Евангелие Марии представляет Марию Магдалину как привилегированного ученика, который получил специальные учения. Евангелие Филипа описывает её как компаньона Иисуса (точное значение оспаривается, но интимность ясна). Письма Павла упомянут женщин дьячков, пророчиц и учителей.\u003c/p\u003e\n\u003cp\u003eИнституциональная церковь систематически удалила женское из её теологии и практики. Женщины были исключены из лидерства. Божественное женское было подавлено. Мария Магдалина была переиображена как реформированная проститутка (традиция без библейского основания, изобретённая папой Грегори I в 591 AD). Результат был мужским учреждением поклонением мужским Богом через мужские ритуалы — удаление половины божественного изображения.\u003c/p\u003e\n\u003cp\u003eИезуиты, мужской порядок, продолжил это подавление. Их образовательные учреждения были мужскими только в течение веков. Их теология подчёркивала послушание, иерархию и власть — мужские архетипы, которые отражают намеренно неполное понимание божественного.\u003c/p\u003e\n\u003ch2 id=\"удалённые-сообщества\"\u003eУдалённые сообщества\u003c/h2\u003e\n\u003ch3 id=\"человеческая-цена\"\u003eЧеловеческая цена\u003c/h3\u003e\n\u003cp\u003eМассовое удаление было не просто литературным. Это было человеческое. Сообщества, которые практиковали альтернативные формы христианства, были уничтожены через насилие:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКатари\u003c/strong\u003e: Дуалистическое движение христианства в южной Франции, объявленное еретическим в 12-м веке. Папа Иннокентий III запустил крестовый поход Альбигносов против них в 1209. Осада Безье произвела резню примерно 20,000 человек. Папский легат Арнауд Амалриш, как говорят, сказал: \"Убей их всех. Бог будет знать его собственных.\" Сообщество катара было эффективно стерто.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВальдоносцы\u003c/strong\u003e: Основан Петром Вальдо в 12-м веке, вальдоносцы подчеркивали бедность, чтение священного писания и путевых проповедей. Они были преследуемы в течение веков. Пиедмонт Пасха 1655 видел католические войска резню тысячи Вальдоносцев, мужчин, женщин и детей.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГуситы\u003c/strong\u003e: Последователи Яна Хуса, сожжённые на кольях в 1415, несмотря на обещание безопасного проведения. Гуситские войны (1419-1434) были ответом католической церкви на движение, которое оспаривало папскую власть и требовало священного писания в общем языке.\u003c/p\u003e\n\u003cp\u003eКаждое из этих удаления удалило версию христианства, которая оспаривала монополию учреждения. Катари отвергли материальный мир (угрожая материальной власти учреждения). Вальдоносцы читали священное писание для себя (угрожая монополии интерпретации учреждения). Гуситы оспаривали папскую власть прямо. Все были уничтожены.\u003c/p\u003e\n\u003cp\u003eОткровение Говарда Питтмана, что 97,5 процента христиан отвергнут, предполагает, что версия христианства, которая выжила удаления — институциональная версия — может быть точно неправильная версия. Удалённые версии, которые подчеркивали прямой опыт, грамотность священного писания и вызов власти, могли быть ближе к истине. Но мы никогда не узнаем, потому что учреждение их уничтожило.\u003c/p\u003e\n\u003ch2 id=\"продолжающееся-удаление\"\u003eПродолжающееся удаление\u003c/h2\u003e\n\u003ch3 id=\"современное-подавление\"\u003eСовременное подавление\u003c/h3\u003e\n\u003cp\u003eМассовое удаление не просто исторический. Это продолжается сегодня, через более тонкие методы:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСеминарское образование\u003c/strong\u003e: Пасторы учат исторический-критический стипендия, которая раскрывает человеческое строительство Библии — но они учат также не разделить это с собраниями. Удаление стипендии знания от скамейки систематическое.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eУправление средами\u003c/strong\u003e: Альтернативные перспективы на христианство маргинализованы в основных средах. Документальные фильмы истории канала на раннем христианстве тщательно сбалансированы, чтобы избежать оспаривания институциональных нарративов. Платформы социальных средств подавляют содержание, которое сомневается в религиозной ортодоксии.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСоциальное давление\u003c/strong\u003e: Сомнение в институциональном христианстве приводит к социальной изоляции, конфликту семьи и потере сообщества. Это социальное давление служит той же функции как Инквизиция — это наказывает неповиновение и применяет соответствие.\u003c/p\u003e\n\u003cp\u003eИезуиты продолжают действовать через все из этих каналов. Их университеты производят стипендиатов. Их выпускники населяют средства. Их учреждения формируют социальные нормы, которые применяют соответствие. Массовое удаление продолжается, каждый день, через тысячу каналов, которые большинство людей никогда не видят.\u003c/p\u003e\n\u003ch2 id=\"путь-вперед\"\u003eПуть вперед\u003c/h2\u003e\n\u003ch3 id=\"восстановление-не-отвержение\"\u003eВосстановление, не отвержение\u003c/h3\u003e\n\u003cp\u003eНадлежащий ответ на массовое удаление — не отвержение христианства, но восстановление того, что удалили. Тексты, которые выжили — библиотека Наг Хаммади, Мёртвые море свитков, Книга Еноха, Didache — предложение окна в разнообразное, живое, многогранное движение, которое учреждение уменьшило до единственного, контролируемого нарратива.\u003c/p\u003e\n\u003cp\u003eЧтение этих текстов рядом с каноническим Библией раскрывает рicher, более сложное, более вызывающее христианство, чем учреждение разрешает. Это раскрывает веру, которая требует прямого участия, чем пассивной веры, личного опыта, чем институционального посредничества и честного расследования, чем слепого послушания.\u003c/p\u003e\n\u003cp\u003eСообщение Говарда Питтмана ясно: институциональная версия терпит неудачу. 97,5 процента отвержения. 95 процентов саморслужба. Массовое удаление создало христианство, которое производит эти результаты — христианство ритуала без реальности, веры без опыта, традиции без истины.\u003c/p\u003e\n\u003cp\u003eУдалённые версии могут держать ключи к узкому пути. Учреждение их уничтожило, потому что они угрожали его власти. Этот очень факт предполагает они содержали что-то подлинное — что-то стоило восстановить, изучить и жить.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JKdRtRr3O-I\"\u003eThe Firmament, The Earth, The Foundation — Biblical Cosmology\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I5ZN289jjDo\"\u003eThe Earth and the Firmament — What Scripture Really Says\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eFlat Earth, Science, and NASA — Documentary Playlist\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAgent131711 Substack\u003c/strong\u003e: \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e — Полный масштаб массового удаления церкви, задокументированный\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHoward Pittman NDE Testimony\u003c/strong\u003e: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eWatch on YouTub
