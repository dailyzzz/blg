ко страдает, ибо часто бросается в огонь и часто в воду, я приводил его к ученикам Твоим, и они не могли исцелить его... И запретил ему Иисус, и бес вышел из него; и отрок исцелился в тот час.\"\u003c/em\u003e — Матфея 17:14-18\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И спросил его: как тебе имя? И он сказал в ответ: легион имя мне, потому что нас много.\"\u003c/em\u003e — Марка 5:9\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И призвав двенадцать учеников Своих, Он дал им власть над нечистыми духами, чтобы изгонять их и врачевать всякую болезнь и всякую немощь.\"\u003c/em\u003e — Матфея 10:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИисус изгонял демонов словом. Он дал Своим ученикам власть делать то же самое. Евангелия насыщены рассказами о демонической одержимости и освобождении — безумный сын отца, человек в гробницах, вмещающий легион, женщина, связанная восемнадцать лет, немой человек, слепой и немой человек, дочь сирофиникиянки. Одержимость была реальной. Освобождение было реальным. Власть была реальной.\u003c/p\u003e\n\u003cp\u003eНо под всеми этими рассказами лежит принцип, который Говард Питтман увидел в духовном мире — принцип, который управляет всеми взаимодействиями между духовным и человеческим мирами. Суверенная воля. Единственное, что демоны не могут нарушить. Единственное, что ангелы не могут отменить. Единственное, что Сам Бог не нарушит.\u003c/p\u003e\n\u003cp\u003eВаша воля суверенна. И всё — небеса, ад и всё, что между ними — зависит от того, что вы с ней делаете.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/89-The_Serpent_Crusher.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eСокрушитель змея — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/51-The_Covenant_Blood.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eКровь завета — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"созданы-по-его-образу\"\u003eСозданы по Его образу\u003c/h2\u003e\n\u003ch3 id=\"дух-невидимый-бессмертный\"\u003eДух, невидимый, бессмертный\u003c/h3\u003e\n\u003cp\u003eЧтобы понять суверенную волю, вы должны сначала понять, что такое человек. Не то, что говорит современная наука. Не то, чему учит светская философия. То, что открывает духовный мир.\u003c/p\u003e\n\u003cp\u003eГовард Питтман узнал — через непосредственный опыт, а не через богословское изучение — что люди созданы по образу Божьему. Эта фраза \"созданы по Его образу\" повторяется в церквях по всему миру, причём большинство людей не понимают, что она на самом деле означает.\u003c/p\u003e\n\u003cp\u003eЭто не означает, что у Бога две руки и две ноги и Он похож на человека. Бог есть Дух. Он невидим. Он бессмертен. И люди созданы по ЭТОМУ образу — образу духа, невидимого, бессмертного.\u003c/p\u003e\n\u003cp\u003eВы — духовное существо. Вы не тело, имеющее дух. Вы дух, населяющий тело. Тело временно — средство передвижения, шатёр, глиняный дом. Дух постоянен. Дух — это настоящий вы. И дух создан по образу Божьему.\u003c/p\u003e\n\u003cp\u003eЭто различие фундаментально. Животные не созданы по образу Божьему. Животные — физические существа — их сознание, их осознание, их \"я\" связано с их физической формой. Когда тело умирает, животное исчезает. Но люди другие. Когда тело умирает, дух продолжает существовать. Душа — личность, сознание, идентичность — идёт с духом, а не с телом.\u003c/p\u003e\n\u003cp\u003eЭто то, что Питтман испытал, когда умер на операционном столе. Его тело отказало. Его мониторы показали прямую линию. Но ОН — Говард Питтман — продолжал существовать. Он всё ещё осознавал. Всё ещё думал. Всё ещё был собой. Потому что он никогда не был своим телом. Он всегда был своим духом.\u003c/p\u003e\n\u003ch3 id=\"суверенность-воли\"\u003eСуверенность воли\u003c/h3\u003e\n\u003cp\u003eИ в центре этого духа — в центре создания по образу Божьему — находится суверенная воля. У Бога есть воля. Она суверенна. Никто не может отменить её. Никто не может заставить Бога действовать против Его собственной воли. Он — абсолютно свободный агент в мироздании — Тот, чья воля абсолютно, безусловно, вечно свободна.\u003c/p\u003e\n\u003cp\u003eЛюди, созданные по Его образу, разделяют этот атрибут. Не в той же степени — мы создания, а не Творец. Но принцип тот же. Человеческая воля суверенна. В области личности воля — высший авторитет. Это тронный зал человека.\u003c/p\u003e\n\u003cp\u003eЭто не философская позиция. Это закон духовного мира. Питтман обнаружил, что суверенность человеческой воли — фундаментальный принцип работы как небес, так и ада. Он управляет тем, как Бог взаимодействует с людьми. Он управляет тем, как ангелы взаимодействуют с людьми. И он управляет тем, как демоны взаимодействуют с людьми.\u003c/p\u003e\n\u003cp\u003eНикто — НИКТО — не может нарушить суверенную волю человека.\u003c/p\u003e\n\u003ch2 id=\"нерушимый-закон\"\u003eНерушимый закон\u003c/h2\u003e\n\u003ch3 id=\"демоны-не-могут\"\u003eДемоны не могут\u003c/h3\u003e\n\u003cp\u003eДемоны не могут действовать против суверенной воли человека. Это абсолютно. Без исключений. Без лазеек. Без особых обстоятельств, позволяющих демону отменить человеческую волю.\u003c/p\u003e\n\u003cp\u003eДемон может искушать. Он может предлагать. Он может обманывать. Он может давить. Он может создавать обстоятельства. Он может шептать. Он может кричать. Он может представлять себя желанным. Он может делать грех привлекательным. Он может манипулировать эмоциями. Он может эксплуатировать слабости. Он может усиливать желания. Он может окружить человека искушением со всех сторон.\u003c/p\u003e\n\u003cp\u003eНо он не может заставить человека сказать \"да\".\u003c/p\u003e\n\u003cp\u003eРешение — акт воли, открывающий дверь — должно исходить от человека. Демон стоит снаружи двери воли, стучась. Он может стучать громко. Он может стучать настойчиво. Он может стучать в ритм с желаниями человека. Но он не может открыть дверь снаружи. Только человек изнутри может открыть её.\u003c/p\u003e\n\u003cp\u003eВот почему Писание возлагает ответственность на человека. \"Противостаньте диаволу, и убежит от вас\" (Иакова 4:7). Заповедь — противостоять — что означает, что сила противостоять существует. Если бы демоны могли отменять волю, сопротивление было бы бессмысленным. Бог не стал бы заповедовать невозможное. Тот факт, что Он заповедует сопротивление, доказывает, что сопротивление возможно — потому что воля суверенна.\u003c/p\u003e\n\u003ch3 id=\"ангелы-не-могут\"\u003eАнгелы не могут\u003c/h3\u003e\n\u003cp\u003eАнгелы связаны аналогично. Они не могут нарушить суверенную волю человека не больше, чем могут демоны. Ангел не может заставить человека повиноваться Богу. Ангел не может принудить человека сделать правильный выбор. Ангел может защищать, направлять, влиять и общаться — но он не может отменить волю.\u003c/p\u003e\n\u003cp\u003eВот почему ангельское вмешательство не всегда приводит к спасению. Ангелы могут представить истину. Ангелы могут создать возможности. Ангелы могут устранить препятствия. Но человек всё равно должен выбрать. Воля всё равно должна действовать. И ангел не может действовать от её имени.\u003c/p\u003e\n\u003ch3 id=\"бог-не-будет\"\u003eБог не будет\u003c/h3\u003e\n\u003cp\u003eЭто самое поразительное откровение из всех. Сам Бог — Творец вселенной, Всемогущий, Тот, Кто произнёс всё в существование — НЕ БУДЕТ нарушать суверенную волю человека.\u003c/p\u003e\n\u003cp\u003eОн мог бы. Ничто не ограничивает силу Бога. Если бы Он решил отменить человеческую волю, никакая сила в мироздании не смогла бы остановить Его. Но Он не будет. Потому что суверенная воля — Его собственный замысел. Он создал её. Он поместил её в каждого человека. И Он уважает её — абсолютно, полностью и без исключений.\u003c/p\u003e\n\u003cp\u003eВот почему Бог не принуждает к спасению. Вот почему Он не заставляет повиноваться. Вот почему Он допускает восстание. Вот почему Он позволяет греху. Вот почему зло существует в мире, созданном всемогущим, любящим Богом.\u003c/p\u003e\n\u003cp\u003eБог дал вам волю. Суверенную волю. Волю, которую Он Сам не отменит. И вся драма человеческого существования — спасение, проклятие, небеса, ад, всё — вращается вокруг того, что вы с ней делаете.\u003c/p\u003e\n\u003cp\u003eЭто любовь. Не сентиментальная любовь. Не версия с поздравительных открыток. Настоящая любовь. Та, которая даёт возлюбленному настоящую свободу — включая свободу отвергнуть Любящего. Та, которая отказывается принуждать, отказывается насиловать, отказывается манипулировать. Та, которая предлагает всё и не требует ничего, кроме добровольного ответа.\u003c/p\u003e\n\u003cp\u003eСуверенная воля — величайший дар Бога человечеству. И это также его величайшая опасность. Потому что та же воля, которая может открыть дверь Богу, может открыть дверь демонам.\u003c/p\u003e\n\u003ch2 id=\"как-работает-демоническая-одержимость\"\u003eКак работает демоническая одержимость\u003c/h2\u003e\n\u003ch3 id=\"что-видел-питтман\"\u003eЧто видел Питтман\u003c/h3\u003e\n\u003cp\u003eГовард Питтман не просто узнал о демонической одержимости теоретически. Он стал свидетелем этого. Он видел, как это происходит, в реальном времени, в духовном мире. И то, что он увидел, разрушило каждое голливудское изображение, каждую кинематографическую картину ужаса и каждый сенсационный рассказ об одержимости, которые создал современный мир.\u003c/p\u003e\n\u003cp\u003eВот что он увидел.\u003c/p\u003e\n\u003cp\u003eДемон приблизился к человеку. Но демон не нападал. Он не силой навязывался человеку. Он не прорывался сквозь какой-либо барьер. Вместо этого демон сделал себя \"желанным и привлекательным\" для человека.\u003c/p\u003e\n\u003cp\u003eЭто ключ. Демон не пришёл как чудовище. Он не пришёл как угроза. Он пришёл как то, что человек ХОТЕЛ. Как то, что привлекало желания человека, плоть человека, волю человека. Демон представил себя как источник удовольствия, или силы, или облегчения, или волнения, или чего бы ни жаждала конкретная слабость человека.\u003c/p\u003e\n\u003cp\u003eИ человек согласился.\u003c/p\u003e\n\u003cp\u003eЧерез осуществление суверенной воли человек открыл дверь. Он сказал \"да\" — не словесно, не сознательно в большинстве случаев, но через волю. Через повторный выбор участвовать в грехе, преследовать желание, открывать дверь всё шире и шире, пока демон не смог войти.\u003c/p\u003e\n\u003ch3 id=\"внешность-демона\"\u003eВнешность демона\u003c/h3\u003e\n\u003cp\u003eТо, как демон действительно выглядел — в духовном мире, лишённый своей маскировки — было ужасающим. Питтман описал его как \"переросшую, слизистую, зелёную лягушку, совершенно бесформенную\". Не привлекательный. Не желанный. Не соблазнительный образ, который был представлен человеку. Истинная форма демона была отвратительной — гротескное, бесформенное, слизистое существо, которое не имело никакого сходства с привлекательным фасадом, который оно проецировало.\u003c/p\u003e\n\u003cp\u003eЭто природа демонического обмана. То, что грех представляет как прекрасное, духовный мир раскрывает как отвратительное. То, что плоть воспринимает как желанное, духовный мир показывает как слизистое и деформированное. Истинный вид демона — это истинный вид греха, который он представляет — отвратительный, омерзительный и унижающий.\u003c/p\u003e\n\u003cp\u003eНо человек никогда не видит этого. Человек видит только маскировку. Привлекательный фасад. Прекрасную ложь. И основываясь на этой лжи, человек осуществляет волю и открывает дверь.\u003c/p\u003e\n\u003ch3 id=\"момент-вхождения\"\u003eМомент вхождения\u003c/h3\u003e\n\u003cp\u003eПиттман наблюдал, как демон входил в человека. Демон медленно двигался к лицу человека — не спеша, не принуждая, двигаясь целенаправленно, почти мягко. И затем он вошёл. Не через рот. Не через глаза. Не через какое-то конкретное отверстие.\u003c/p\u003e\n\u003cp\u003eПиттман описал это как \"клуб дыма\", который вошёл через поры кожи. Демон растворился в нечто вроде пара и просочился через саму кожу — через поры, через поверхность, в тело. Как дым, который поглощается. Как туман, оседающий на ткани. Постепенно. Незаметно. Почти неощутимо.\u003c/p\u003e\n\u003cp\u003eВот почему одержимость редко является внезапным, драматическим событием. Это не как в кино — никакого вращения головы, никакой левитации, никакой рвоты снарядами. Это постепенно. Инкрементально. Медленное просачивание демонического влияния через дверь, которую человек открыл добровольно и продолжает открывать всё шире со временем.\u003c/p\u003e\n\u003cp\u003eКаждый раз, когда человек участвует в грехе — каждый раз, когда воля соглашается, каждый раз, когда желание преследуется, каждый раз, когда дверь открывается немного шире — демон движется немного ближе. Немного глубже. Немного более укоренённо. Пока клуб дыма не стал постоянным жильцом. Пока лягушка не оказалась внутри. И тогда маскировка снимается.\u003c/p\u003e\n\u003ch2 id=\"возраст-ответственности\"\u003eВозраст ответственности\u003c/h2\u003e\n\u003ch3 id=\"ограничение-более-90-процентов\"\u003eОграничение более 90 процентов\u003c/h3\u003e\n\u003cp\u003eПиттман узнал, что более девяноста процентов демонической активности ограничено теми, кто достиг или превысил \"возраст ответственности\". Это духовный порог, при котором человек становится полностью ответственным за свои выборы — возраст, при котором суверенная воля достаточно зрела, чтобы делать подлинные решения о грехе и праведности.\u003c/p\u003e\n\u003cp\u003eДо возраста ответственности дети существуют под особой защитой. Их воли ещё не полностью сформированы. Их способность по-настоящему согласиться — по-настоящему осуществить суверенную волю в духовном смысле — ещё не развита. И поскольку демоны не могут действовать против суверенной воли, они не могут вовлекать большинство детей. Дверь ещё не функциональна. Воля ещё не суверенна в полном смысле.\u003c/p\u003e\n\u003cp\u003eЭто означает, что подавляющее большинство демонической активности — более девяноста процентов — нацелено на взрослых. Людей, чьи воли полностью сформированы. Людей, которые могут делать настоящие выборы. Людей, чьи двери могут быть действительно открыты.\u003c/p\u003e\n\u003ch3 id=\"исключение-пятый-уровень\"\u003eИсключение: пятый уровень\u003c/h3\u003e\n\u003cp\u003eНо есть исключение. Таинственный пятый уровень демонов — безымянная, анонимная группа, чья сила заключается в том, чтобы оставаться неизвестной — единственная группа, которой разрешено овладевать маленькими детьми.\u003c/p\u003e\n\u003cp\u003eЭто исключение ужасающе. Это означает, что некоторые дети, при определённых обстоятельствах, могут быть нацелены демоническими силами. Демоны пятого уровня могут обойти нормальное ограничение — не нарушая волю ребёнка (которая остаётся нерушимой), но через какой-то другой механизм, который Питтман не полностью объяснил.\u003c/p\u003e\n\u003cp\u003eЭто может быть связано с поколенческими паттернами — выборами родителей и дедушек с бабушками, которые создают духовные открытия у их потомков. Это может быть связано с экстремальными обстоятельствами злоупотребления, ритуального вовлечения или оккультной активности в окружении ребёнка. Каков бы ни был механизм, демоны пятого уровня эксплуатируют его, чтобы получить доступ к детям, которые обычно были бы защищены.\u003c/p\u003e\n\u003cp\u003eВот почему эти демоны самые опасные. Они нацелены на самых уязвимых. Они действуют в полной анонимности. Они имитируют физические состояния, такие как эпилепсия — что напрямую напоминает евангельский рассказ об отце, который привёл своего \"безумного\" сына к Иисусу (Матфея 17:14-18). Мальчик падал в огонь и в воду. Ученики не могли помочь ему. Только Иисус мог изгнать демона.\u003c/p\u003e\n\u003cp\u003eМальчик в том евангельском рассказе вполне мог быть нацелен демоном пятого уровня. Поражён с детства. Имитирующий физические симптомы. Устойчивый к обычным попыткам освобождения. Требующий прямой власти Самого Христа.\u003c/p\u003e\n\u003ch2 id=\"власть-верующего\"\u003eВласть верующего\u003c/h2\u003e\n\u003ch3 id=\"у-всех-детей-божьих-есть-сила\"\u003eУ всех детей Божьих есть сила\u003c/h3\u003e\n\u003cp\u003eВот противовес ужасающей реальности демонической иерархии. Вот оружие, которое церковь в значительной степени забыла, игнорировала или никогда не изучала:\u003c/p\u003e\n\u003cp\u003eВСЕ дети Божьи имеют власть над ВСЕМИ демонами.\u003c/p\u003e\n\u003cp\u003eНе над некоторыми. Не над слабыми. Не над низшими уровнями. НАД ВСЕМИ. Каждый подлинный, действительно рождённый свыше, покорный Христу верующий имеет власть над каждым демоном в существовании — от самого низшего оператива пятого уровня до восьмифутовых воюющих гигантов до территориальных начальств.\u003c/p\u003e\n\u003cp\u003eЭто не мнение Питтмана. Это библейская реальность, подтверждённая его опытом в духовном мире. Иисус сказал Своим ученикам: \"се, даю вам власть наступать на змей и скорпионов и на всю силу вражью, и ничто не повредит вам\" (Луки 10:19). ВСЯ сила врага. Ничто не повредит вам.\u003c/p\u003e\n\u003cp\u003eЭта власть реальна. Она действует. Она доступна прямо сейчас каждому подлинному верующему. Демоны знают это. Ангелы знают это. Бог знает это. Единственные, кто, кажется, не знает этого — сами христиане.\u003c/p\u003e\n\u003ch3 id=\"основано-на-вере-и-знании\"\u003eОсновано на вере и знании\u003c/h3\u003e\n\u003cp\u003eНо — и это критическая оговорка — эффективность этой власти зависит от двух вещей: веры и знания.\u003c/p\u003e\n\u003cp\u003eВера означает уверенность. Не надежду. Не желаемое мышление. Не \"я думаю, может быть, это может сработать\". Уверенность. Такая непоколебимая, твёрдая, абсолютная убеждённость, которая не колеблется, когда демон отталкивается. Такая вера, которую Иисус описал, когда сказал: \"Если вы будете иметь веру с горчичное зерно и скажете горе сей: 'перейди отсюда туда', и она перейдёт; и ничего не будет невозможного для вас\" (Матфея 17:20).\u003c/p\u003e\n\u003cp\u003eХристианин, который осуществляет власть над демоном с сомнением в своём сердце, обнаружит, что демон не двинулся. Не потому, что власть фальшивая. Потому что вера недостаточна. Власть как заряженное оружие — она будет работать идеально каждый раз, но только если человек, держащий её, знает, как нажать на спусковой крючок, и уверен, что она выстрелит.\u003c/p\u003e\n\u003cp\u003eЗнание означает понимание. Понимание того, кто вы во Христе. Понимание власти, которой вы обладаете. Понимание того, как работает духовный мир. Понимание демонической иерархии — её структуры, её тактики, её ограничений. Понимание того, что ВАША власть не ваша собственная — это власть Христа, делегированная вам, и власть Христа абсолютна.\u003c/p\u003e\n\u003cp\u003eВот почему свидетельство Питтмана так важно. Оно даёт знание. Оно заполняет пробел, который создала церковь-плацебо. Оно говорит христианину: ВОТ с чем вы боретесь. ВОТ как это организовано. ВОТ как это работает. ВОТ его ограничения. И ВОТ ваша власть.\u003c/p\u003e\n\u003cp\u003eБез этого знания христианин — солдат, сражающийся с завязанными глазами. С ним христианин — воин — вооружённый, информированный и опасный.\u003c/p\u003e\n\u003ch3 id=\"дар-освобождения\"\u003eДар освобождения\u003c/h3\u003e\n\u003cp\u003eПиттман также узнал об особом духовном даре — даре служения освобождения. Это особое призвание, особое помазание, особое снаряжение Святым Духом для работы изгнания демонов и освобождения пленников.\u003c/p\u003e\n\u003cp\u003eНе каждый христианин призван к этому служению. Но каждый христианин должен знать, что оно существует. И каждый христианин должен знать, что внутри тела Христова есть мужчины и женщины, которые были специально одарены, обучены и помазаны для борьбы с демонической одержимостью и угнетением.\u003c/p\u003e\n\u003cp\u003eНаряду с даром освобождения идёт дар различения — способность воспринимать, с каким духом вы имеете дело. Христианин с даром различения может идентифицировать конкретного демона за работой, его уровень, его специальность и его стратегию. Это знание — тактическая разведка — духовный эквивалент знания имени врага, ранга и позиции перед вступлением в бой.\u003c/p\u003e\n\u003cp\u003eБез различения освобождение подобно выполнению операции с завязанными глазами. Вы можете преуспеть, но шансы на ошибку огромны. С различением конкретный демон идентифицируется, конкретная власть призывается, и конкретная зависимость разрывается.\u003c/p\u003e\n\u003ch2 id=\"битва-за-волю\"\u003eБитва за волю\u003c/h2\u003e\n\u003ch3 id=\"ежедневный-выбор\"\u003eЕжедневный выбор\u003c/h3\u003e\n\u003cp\u003eКаждый день каждый человек делает выбор. Не один раз — тысячи раз. Выбор всегда один и тот же: кто сидит на троне? Я или Христос? Моя воля или Его воля? Моё желание или Его заповедь?\u003c/p\u003e\n\u003cp\u003eЭто битва. Не драматическая версия духовной войны из фильмов об экзорцизме. Ежедневная, обыденная, момент за моментом битва за суверенную волю. Каждый раз, когда вы выбираете себя вместо Христа — каждый раз, когда вы преследуете своё желание вместо Его направления, свой комфорт вместо Его заповеди, свой план вместо Его цели — вы открываете дверь. Не драматически. Не внезапно. Постепенно. Щель. Немного шире. Немного шире.\u003c/p\u003e\n\u003cp\u003eИ по другую сторону этой двери ждёт специалист. Демон, чьё единственное назначение — конкретный грех, который вы только что выбрали. Демон, который работал в этой специальности тысячи лет. Демон, который точно знает, как сделать следующий выбор легче, следующую щель шире, следующее открытие больше.\u003c/p\u003e\n\u003cp\u003eВот как лягушка попадает внутрь. Не через силу. Через приглашение. Через повторное осуществление суверенной воли в неправильном направлении.\u003c/p\u003e\n\u003ch3 id=\"защита\"\u003eЗащита\u003c/h3\u003e\n\u003cp\u003eЗащита одинаково проста — и одинаково трудна. Закройте дверь. Осуществите суверенную волю в противоположном направлении. Выберите Христа. Не один раз. Не на алтарном призыве. Каждый момент. Каждое решение. Каждое желание, подчинённое Его господству. Каждая мысль, взятая в плен (2 Коринфянам 10:5). Каждый импульс, отфильтрованный через послушание.\u003c/p\u003e\n\u003cp\u003e\"Итак покоритесь Богу; противостаньте диаволу, и убежит от вас\" (Иакова 4:7). Два шага. Покоритесь Богу — поставьте Христа на трон. Противостаньте диаволу — осуществите суверенную волю против искушения. И демон убежит. Не потому что вы сильны. Потому что власть Христа, осуществляемая через покорную волю, непреодолима.\u003c/p\u003e\n\u003cp\u003eСуверенная воля — поле битвы. Христос на троне — победа. Я на троне — поражение. И каждый человек, в каждый момент, выбирает.\u003c/p\u003e\n\u003ch3 id=\"окончательная-свобода\"\u003eОкончательная свобода\u003c/h3\u003e\n\u003cp\u003eСуверенная воля не бремя. Это окончательная свобода. Это дар, который делает любовь возможной — потому что любовь, которая не выбрана свободно, не любовь. Это дар, который делает веру значимой — потому что вера, которая не предложена свободно, не вера. Это дар, который придаёт человеческому существованию его вес, его значимость, его вечное последствие.\u003c/p\u003e\n\u003cp\u003eБог не создал роботов. Он не создал марионеток. Он не создал существ, которые повинуются, потому что у них нет выбора. Он создал существ с суверенной волей — существ, которые могут выбрать Его или отвергнуть Его, следовать за Ним или восстать против Него, открыть дверь Его Духу или открыть дверь Его врагу.\u003c/p\u003e\n\u003cp\u003eИ Он уважает эту свободу абсолютно. Даже когда это разбивает Его сердце. Даже когда это отправляет души в погибель. Даже когда 97,5 процента исповедующих христиан осуществляют свою суверенную волю, чтобы держать себя на троне, произнося слова о сдаче.\u003c/p\u003e\n\u003cp\u003eДверь ваша. Воля ваша. Выбор ваш.\u003c/p\u003e\n\u003cp\u003eВыбирайте осторожно. От этого зависит вечность.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=4mZ9c9GnJig\"\u003ePLACEBO: Wake Up Church! Howard Pittman\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=I11L71PD3Lw\"\u003eEx Satan Worshipper John Ramirez Testimony\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИсточник: буклет Говарда Питтмана \u003cem\u003ePlacebo\u003c/em\u003e, Bible Camp на озере Гамильтон\u003c/p\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/89-The_Serpent_Crusher.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eСокрушитель змея — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/51-The_Covenant_Blood.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eКровь завета — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/105-The_Second_Adam.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eВторой Адам — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/127-The_Overcoming.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eПреодоление — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/97-Rivers_of_Living_Water.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eРеки живой воды — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://zzzdaily.zzzdaily.com/tracks/ru/89-Metaphors_or_Reality.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eМетафоры или реальность — из альбома ZZZ Daily\u003c/em\u003e\u003c/p\u003e\n\u003ch2 id=\"исследуйте-дальше\"\u003eИсследуйте дальше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/demonic-hierarchy-satans-military/?lang=ru\"\u003eВоенные силы сатаны: демоническая иерархия, свидетелем которой был Говард Питтман\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/three-heavens-howard-pittman-nde/?lang=ru\"\u003eТри неба: что увидел Говард Питтман, когда умер\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/97-percent-christians-rejected-god/?lang=ru\"\u003e97,5% отвергнуты: ужасающая статистика, которую показал Бог Говарду Питтману\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/placebo-church-satan-false-religion/?lang=ru\"\u003eЦерковь-плацебо: как сатана управляет ложной религией для миллиардов\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cem\u003eСуверенная воля — самое мощное, что вы имеете. Мощнее вашего интеллекта. Мощнее ваших эмоций. Мощнее вашей физической силы. Это единственное, что демоны не могут нарушить, ангелы не могут отменить, и Сам Бог не нарушит. Говард Питтман наблюдал, как демон вошёл в человека — не через силу, но через приглашение. Слизистая зелёная лягушка, замаскированная под что-то желанное, просачивающаяся через поры как дым. Человек открыл дверь. Демон прошёл. Ваша воля суверенна. Ваша дверь ваша. То, чему вы её откроете, определит вашу вечность.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3x
