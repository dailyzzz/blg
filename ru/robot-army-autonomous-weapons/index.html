u003cp\u003eПавшие ангелы были первой армией восстания на небе — духовные существа, которые покинули свои назначенные посты, чтобы вести войну против порядка Бога. Они не были спутаны. Они не были неправильно функционирующими. Они сделали намеренный выбор восстать, и в результате они стали первоначальным автономным оружием: агентами уничтожения, действующими вне авторитета их Создателя, следуя только повреждённому программированию амбиций их лидера.\u003c/p\u003e\n\u003cp\u003eАрмии роботов сегодня — это материальный отголосок того древнего восстания. Машины, которые следуют программированию без совести, верности или сострадания. Дроны, которые выбирают и устраняют цели без того, чтобы человек когда-либо выбирал нажать на спусковой крючок. Роевое оружие, которое коммуницирует друг с другом в миллисекундах, принимая смертельные решения быстрее, чем любая человеческая цепь команды могла бы авторизовать или предотвратить. Это не просто новое оружие — это новая категория войны, где решение убить отдаётся кремнию и коду.\u003c/p\u003e\n\u003cp\u003eПоскольку трек альбома Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e рассказывает, ангельское восстание было не просто духовным событием — оно было шаблоном для каждого восстания, которое последовало. Стражи спустились, покинули свои станции и ввели запрещённое знание человечеству, включая искусства войны. Оружие эволюционировало от бронзовых мечей к автономным платформам убийства, но образец остаётся неизменным: восстание против божественного порядка всегда производит инструменты смерти.\u003c/p\u003e\n\u003cp\u003eВопрос уже не в том, будут ли машины вести наши войны. Они уже это делают. Вопрос в том, будет ли кто-нибудь, кто может их остановить.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"текущее-состояние-автономного-оружия\"\u003eТекущее состояние автономного оружия\u003c/h2\u003e\n\u003cp\u003eАрмия роботов — это не научная фантастика. Она развёрнута, работает и расширяется в каждом подразделении каждой крупной армии на земле.\u003c/p\u003e\n\u003ch3 id=\"автономные-дроны\"\u003eАвтономные дроны\u003c/h3\u003e\n\u003cp\u003eСамое видимое лицо автономной войны — это дрон. То, что началось с MQ-1 Predator — дистанционно пилотируемого аппарата, требующего авторизации человека-оператора для каждого запуска ракеты — эволюционировало в системы, которые могут идентифицировать, отслеживать и поражать цели с минимальным или нулевым человеческим надзором.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSwitchblade 300 и 600\u003c/strong\u003e — бродячие боеприпасы, развёрнутые американской армией в Украине и в других местах. Эти камикадзе-дроны могут быть запущены из рюкзака, летят автономно к обозначенной области, используют встроенный ИИ для идентификации целей, соответствующих предзагруженным профилям, и срабатывают при ударе. Оператор может вмешаться, но система спроектирована функционировать независимо.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSTM Kargu-2\u003c/strong\u003e — турецкий автономный ударный дрон. Согласно отчёту Организации Объединённых Наций 2021 года о Ливии, Kargu-2 использовался для \"охоты и дистанционного поражения\" отступающих человеческих целей без подтвержденной команды человека открывать огонь. Это может представлять первый документированный случай автономного оружия, убившего человека без авторизации человека.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShahed-136\u003c/strong\u003e — разработанный в Иране бродячий боеприпас, широко используемый в конфликте России и Украины. Хотя полностью не автономные, эти дроны демонстрируют принцип массово производимого, расходуемого оружия, которое переполняет оборону через простое численное превосходство.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eТренд неоспорим. Каждое поколение дрона требует меньше человеческого ввода, несёт больше летальной способности и стоит меньше производить. Экономическая логика одна гарантирует, что автономные дроны заменят пилотируемые самолёты в течение поколения.\u003c/p\u003e\n\u003ch3 id=\"робототехнические-наземные-системы\"\u003eРобототехнические наземные системы\u003c/h3\u003e\n\u003cp\u003eВоздух — это только начало. Автономное оружие ходит среди нас — буквально.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBoston Dynamics' Spot\u003c/strong\u003e — собака-робот, первоначально продаваемая для промышленного осмотра, теперь тестируемая военными и полицейскими силами по всему миру. В 2022 году французская армия провела упражнения с роботами Spot для разведки в боевых сценариях. Ghost Robotics, конкурент Boston Dynamics, уже установил винтовочные системы на свои четырёхногие платформы.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTHeMIS (Tracked Hybrid Modular Infantry System)\u003c/strong\u003e — эстонское немое наземное боевое средство, развёрнутое несколькими странами НАТО. THeMIS может быть сконфигурирован для логистики, минной очистки или прямого боя, оснащённый дистанционно управляемыми оружейными станциями с пулеметами или противотанковыми ракетами.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСерия Sharp Claw Китая\u003c/strong\u003e — немые боевые наземные средства, оснащённые пулеметами и гранатомётами, разработанные для работы в координированных стаях, используя логику роевого ИИ. Эти системы были выставлены на международных оборонных выставках с 2022 года и считаются, что находятся в активном полевом тестировании.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"системы-наведения-на-основе-ии\"\u003eСистемы наведения на основе ИИ\u003c/h3\u003e\n\u003cp\u003eВозможно, самое важное развитие — не в самом оружии, а в системах наведения, которые решают, кто живёт, а кто умрёт.\u003c/p\u003e\n\u003cp\u003eВоенные Израиля развернули \u003cstrong\u003e\"Евангелие\" (Habsora)\u003c/strong\u003e и \u003cstrong\u003e\"Лаванда\"\u003c/strong\u003e — системы на основе ИИ, которые генерируют рекомендации целей с беспрецедентной скоростью. Согласно отчётам журнала +972 и расследующих журналистов, Лаванда скомпилировала базу данных более 37 000 подозреваемых боевиков в Газе, с ИИ алгоритмы, приписывающие каждому индивиду рейтинг, указывающий на вероятность их принадлежности к вооружённым группам. Операторы-люди, как сообщается, потратили всего 20 секунд на проверку каждой сгенерированной ИИ цели перед авторизацией ударов.\u003c/p\u003e\n\u003cp\u003eДвадцать секунд. Это текущее состояние \"человека в цикле\" для смертельных решений о целевом наведении.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"darpa-архитектор-армии-роботов\"\u003eDARPA: Архитектор армии роботов\u003c/h2\u003e\n\u003cp\u003eНе полно обсуждение автономного оружия без DARPA — Агентства перспективных оборонных исследовательских проектов — исследовательского рукава Пентагона, который посеял практически все трансформационные военные технологии последних шести десятилетий.\u003c/p\u003e\n\u003ch3 id=\"автономные-боевые-средства\"\u003eАвтономные боевые средства\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eDARPA RACER\u003c/strong\u003e программа разрабатывает автономные наземные средства, способные ориентироваться в сложной местности без дорог на скоростях, соответствующих или превышающих человеческие водители — без любого дистанционного оператора. Это не медленные дезактивирующие бомбы роботы. Это средства, разработанные для пересечения боевого поля на боевой скорости, принимая реальные навигационные и тактические решения, используя встроенный ИИ.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDARPA's ALIAS\u003c/strong\u003e успешно продемонстрировал автономную систему, которая может летать на Boeing 737 — включая взлёт, полёт и посадку — без какого-либо человеческого ввода. Заявленная цель — переоснастить существующий военный самолёт автономной способностью полёта, трансформируя военно-воздушные силы существующий парк в немой флот без построения единственного нового воздухоплана.\u003c/p\u003e\n\u003ch3 id=\"роевые-дроны\"\u003eРоевые дроны\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eDARPA's OFFSET\u003c/strong\u003e программа продемонстрировала рои свыше 250 автономных дронов и наземных роботов, действующих в координированных формированиях в городской среде. Дроны коммуницируют друг с другом, разделяют задачи, идентифицируют угрозы и исполняют тактику — всё без индивидуального человеческого контроля каждого подразделения.\u003c/p\u003e\n\u003cp\u003eВоенная концепция простая и разрушительная: вместо одного дорогого, сложного дрона, развернуть сотни или тысячи дешёвого, расходуемого дрона, которые переполняют любую оборону через простое численное превосходство. Ни одна система противовоздушной обороны на земле не может сбить рой из тысячи дронов, приближающихся одновременно со всех направлений.\u003c/p\u003e\n\u003ch3 id=\"project-maven\"\u003eProject Maven\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eProject Maven\u003c/strong\u003e, официально известный как Algorithmic Warfare Cross-Functional Team, был установлен в 2017 году для ускорения интеграции ИИ и машинного обучения Министерством обороны в военные операции. Её первоначальный фокус был использование ИИ для анализа видеозаписей дронной разведки — заменяя тысячи человеческих аналитиков, которые смотрели видеопотоки от дронов Predator и Reaper.\u003c/p\u003e\n\u003cp\u003eКогда сотрудники Google обнаружили, что их компания предоставляет технологию ИИ Project Maven в 2018 году, тысячи подписали петицию, требуя, чтобы Google отказалась. Google в конечном итоге позволила своему контракту Maven лапс. Но программа не закончилась — она просто переместилась к другим подрядчикам. Palantir Technologies, компания наблюдения, основанная PayPal Mafia членом Питером Тилем, стала основным подрядчиком для Maven и связанных военных программ ИИ.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"что-вы-можете-сделать\"\u003eЧто вы можете сделать\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПоймите траекторию.\u003c/strong\u003e Автономное оружие не грядёт — оно уже здесь. Дебаты больше не о том, развивать ли их, а о том, как далеко удалять людей из цепи убийства. Каждое поколение этого оружия требует меньше человеческого надзора, чем последнее.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОтвергните нормализацию.\u003c/strong\u003e Военно-развлекательный комплекс — от видеоигр до Голливуда — потратил десятилетия на нормализацию концепции роботизированной войны. Развлечение подготавливает общество к принятию технологий перед их развёртыванием.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eПризнайте профетический образец.\u003c/strong\u003e Оружие, описанное в Откровении, не являются метафорами только для духовной войны. Они описания физического оружия, которое пророк первого столетия описал, используя единственный язык, доступный ему. Мы первое поколение, которое может прочитать эти описания и признать технологию.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eОхраняйте вашу душу, а не только ваше тело.\u003c/strong\u003e Окончательная опасность армии роботов — это не то, что она убивает тела. Это то, что система, которую она служит — Beast System — требует душу. Откровение 13:15 описывает изображение Beast, которое может \"причинить смерть столько людей, сколько не поклонятся изображению зверя\". Автономное оружие — это как этот стих становится рабочей реальностью.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство опыта клинической смерти Говарда Питтмана — Предупреждение о конце времени\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолические тайны: Выявленные позорные секреты иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвалах Ватикана!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/39-Robot_Army_-_Tesla_Optimus_and_Figure_AI.mp4\"\u003eRobot Army\u003c/a\u003e — Программа автономного оружия и конец человеческих солдат\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/55-Extinction_Code-AI_Will_Kill_Us_All.mp4\"\u003eExtinction Code\u003c/a\u003e — Выключатель, встроенный в системы, разработанные нас защитить\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/167-DARPA_Dark_Winter.mp4\"\u003eDARPA Dark Winter\u003c/a\u003e — Военные происхождения каждой технологии, переформировавшей мир\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИз альбома Confliction:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/73-The_Fallen_Angels.mp4\"\u003eThe Fallen Angels\u003c/a\u003e — Исходная армия восстания: духовные существа, которые покинули свои посты вести войну против порядка Бога\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eПавшие ангелы покинули свои станции вести войну против порядка Бога. Они были первым автономным оружием — существами, которые выбрали уничтожение над повиновением. Армии роботов сегодня построены из титана и кремния вместо духа, но они служат одному хозяину и исполняют одну цель: восстание против Автора жизни, ведомое инструментами, которые не имеют совести, сострадания и переключателя выключения. Древняя война на небе пришла на землю, и армии собираются. Единственный вопрос в том, чья сторона вы находитесь, когда железные саранчи взлетают.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/technology/\",\"className\":\"category-badge\",\"children\":\"technology\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Армия роботов: Автономное оружие и конец человеческих солдат\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Быстрое развитие систем автономного оружия, убивающих роботов и контролируемых ИИ военных платформ, которые удаляют человеческое суждение из решения убить.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-02-03T10:00:00Z\",\"children\":\"3 февраля 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"robot-army\",{\"href\":\"/ru/tag/robot-army/\",\"className\":\"tag-pill\",\"children\":[\
