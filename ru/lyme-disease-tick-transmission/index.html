kquote\u003e\n\u003cp\u003eБолезнь Лайма презентируется публике как простая инфекционная болезнь: клещ вас кусает, передаёт бактерию спирохету Borrelia burgdorferi, и вы развиваете ряд изнурительных симптомов. Простая причина, простой эффект. Но когда вы исследуете фактические исследования передачи — основную исследовательскую базу, на которой покоится этот целый нарратив — история развалится. Исследования не согласуются. Доказательства противоречивы. Хронология подозрительна. И связи с военным биооружием исследованием невозможно игнорировать.\u003c/p\u003e\n\u003cp\u003eГовард Питтман узнал во время своего близкого к смерти переживания, что духовная область организована в иерархиях обмана. Демоны, работающие во втором небе, не просто нападают на людей прямо — они строят системы лжи настолько сложные и самоподдерживающиеся, что вопрос одного элемента кажется как вопрос самой реальности. Болезнь Лайма — такая система. Официальный нарратив — крепость полуправд, манипулируемых исследований и преднамеренного перенаправления, и она защищает что-то гораздо более тёмное, чем простая инфекционная болезнь.\u003c/p\u003e\n\u003cp\u003eОрден иезуитов давно действует через военные и разведывательные сети. Наполеон называл их \"военной организацией\" в погоне за \"абсолютной властью.\" Catholic Confidential разоблачила их клятву инфильтрации \"облачённые в хитрость.\" Когда вы следуете по следу болезни Лайма, это приводит непосредственно к военным объектам биооружия, государственным агентствам с задокументированными связями с тайными операциями, и историей прикрытия настолько совершенной, что она могла быть разработана только теми, кто обучен в искусстве обмана.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"официальная-история-болезни-лайма\"\u003eОфициальная история болезни Лайма\u003c/h2\u003e\n\u003ch3 id=\"лайм-коннектикут-1975\"\u003eЛайм, Коннектикут, 1975\u003c/h3\u003e\n\u003cp\u003eОфициальная история начинается в 1975, когда кластер детей в Лайме, Коннектикут, развил то, что казалось ювенальным ревматоидным артритом. Матери этих детей, подозревая что-то необычное, связались с Министерством здравоохранения штата Коннектикут. Исследователь Аллен Стир из Йельского университета провел расследование, и в конце концов, в 1982, Вилли Бургдорфер идентифицировал бактерию спирохету в оленьих клещах, которая была названа Borrelia burgdorferi в его честь.\u003c/p\u003e\n\u003cp\u003eЭтот нарратив чистый, линейный и удовлетворительный. Он также глубоко подозрительный.\u003c/p\u003e\n\u003ch3 id=\"связь-с-островом-плам\"\u003eСвязь с островом Плам\u003c/h3\u003e\n\u003cp\u003eОстров Плам расположен прямо у побережья Лонг-Айленда Звука, приблизительно в 10 милях от Лайма, Коннектикут. Остров Плам был центром биологических исследований США с 1954, когда он переехал с предыдущей военной установки. Объект был первоначально установлен для изучения болезней животных — в частности, ящура — но его исследовательский портфель расширился за десятилетия для включения широкого спектра биологических агентов.\u003c/p\u003e\n\u003cp\u003eБлизость острова Плам к Лайму, Коннектикут, это не совпадение. Несколько исследователей и следователей задокументировали связь:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eСам Вилли Бургдорфер\u003c/strong\u003e, человек, который идентифицировал спирохету Лайма, имел долгую карьеру в исследовании биологического оружия. Он работал в Скалистой горной лаборатории, объекте с задокументированным участием в программах биооружия. В документальном фильме 2013 года, снятом вскоре перед его смертью, Бургдорфер сделал загадочные комментарии, предполагающие, что спирохета болезни Лайма не была естественной, а была продуктом биологического экспериментирования.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eМайкл Кристофер Кэррол\u003c/strong\u003e, в своей книге \u003cem\u003eLab 257\u003c/em\u003e, задокументировал историю острова Плам об отказах биобезопасности, случайных выпусках патогенов и связей с исследованием биологического оружия. Кэррол заметил, что клещи были среди векторов, изучаемых на острове Плам, и что протоколы биобезопасности объекта были печально известны как неадекватны.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eКрис Ньюби\u003c/strong\u003e, научный писатель из Стэнфорда, опубликовала \u003cem\u003eBitten: The Secret History of Lyme Disease and Biological Weapons\u003c/em\u003e в 2019, задокументировав обширное доказательство того, что болезнь Лайма возникла из военных экспериментов биооружия с переносимыми клещами патогенами.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"конгрессовское-расследование\"\u003eКонгрессовское расследование\u003c/h3\u003e\n\u003cp\u003eВ 2019, Палата представителей США приняла поправку к Национальному закону об авторизации защиты, требующую, чтобы Инспектор Генерала Пентагона провел расследование относительно того, экспериментировало ли Министерство обороны с оружием клещами и другими насекомыми между 1950 и 1975 — точный период, предшествующий вспышке болезни Лайма.\u003c/p\u003e\n\u003cp\u003eСам факт, что Конгресс почувствовал себя обязанным провести расследование этого вопроса, экстраординарен. Это означает, что есть достаточно доказательств военного участия в исследовании переносимых клещами болезней, что избранные официальные лица не могли его игнорировать.\u003c/p\u003e\n\u003ch2 id=\"исследования-передачи-которые-не-согласуются\"\u003eИсследования передачи, которые не согласуются\u003c/h2\u003e\n\u003ch3 id=\"проблема-укуса-клеща\"\u003eПроблема укуса клеща\u003c/h3\u003e\n\u003cp\u003eОфициальный нарратив утверждает, что Borrelia burgdorferi передается через укус инфицированного клеща Ixodes (оленьего клеща). Но исследования передачи полны проблем:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДлительность прикрепления\u003c/strong\u003e: CDC утверждает, что клещ должен быть прикреплён в течение 36-48 часов для передачи спирохеты. Но многие исследования задокументировали болезнь Лайма у пациентов, которые удалили клещей в течение часов прикрепления, или которые вообще не помнят укуса клеща. Некоторые исследования оценивают, что 25-50% пациентов с Лаймом никогда не вспоминают укус клеща.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМиф о \"бычьем глазе\"\u003c/strong\u003e: Эритема мигранс сыпь — характерная \"бычьего глаза\" сыпь — считается отличительным признаком болезни Лайма. Но исследования показывают, что только 70-80% пациентов с Лаймом развивают эту сыпь, и её появление варьируется настолько широко, что это ненадёжный диагностический критерий. Многие пациенты с подтверждённым инфицированием Borrelia никогда не развивают сыпь, в то время как некоторые пациенты развивают похожие сыпи из других причин.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГеографические аномалии\u003c/strong\u003e: Если болезнь Лайма действительно передается оленьими клещами, можно было бы ожидать, что болезнь будет сконцентрирована в областях с наивысшими популяциями клещей. Но географическое распределение случаев болезни Лайма не идеально коррелирует с распределением клещей. Некоторые области с тяжелыми популяциями клещей имеют низкие ставки болезни Лайма, и наоборот.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВопросы резервуара животных\u003c/strong\u003e: Олени обвиняются как первичный резервуар для инфицированных клещей, что ведёт к кампаниям по сокращению популяций оленей. Но исследования показали, что олени фактически \u003cstrong\u003eне\u003c/strong\u003e компетентны резервуары для Borrelia burgdorferi — спирохета не выживает хорошо в олень крови. Белопятые мыши считаются фактическим резервуаром, но публичный нарратив продолжает фокусироваться на оленях. Почему? Потому что нарратив оленей проще и держит внимание подалеку от более неудобных вопросов.\u003c/p\u003e\n\u003ch3 id=\"отказ-постулатов-коха--снова\"\u003eОтказ постулатов Коха — снова\u003c/h3\u003e\n\u003cp\u003eКак и в случае туберкулёза, нарратив болезни Лайма не проходит постулаты Коха:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eBorrelia burgdorferi не найдена во всех случаях болезни Лайма. Многие пациенты с классическими симптомами Лайма тестируют отрицательно на спирохету.\u003c/li\u003e\n\u003cli\u003eОрганизм можно изолировать, но культуры трудны и часто не удаются.\u003c/li\u003e\n\u003cli\u003eИнъекция организма в здоровых животных производит непоследовательные результаты.\u003c/li\u003e\n\u003cli\u003eПереиоляция от экспериментально инфицированных животных ненадёжна.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eДвухуровневая система тестирования (ELISA, затем Western blot), рекомендуемая CDC, показала упускать до 50% случаев Лайма, в частности в болезни на ранней стадии. Это означает, что сама диагностическая система разработана для недосчёта случаев — которая держит проблему выглядящей управляемой и предотвращает вид эпидемиологической тревоги, который требовал бы более глубокого расследования.\u003c/p\u003e\n\u003ch2 id=\"след-биооружия\"\u003eСлед биооружия\u003c/h2\u003e\n\u003ch3 id=\"operation-paperclip-и-эрих-траубе\"\u003eOperation Paperclip и Эрих Траубе\u003c/h3\u003e\n\u003cp\u003eИстория острова Плам не может быть рассказана без упоминания Эриха Траубе, немецкого учёного, который работал над биологическим оружием для нацистской Германии во время Второй мировой войны. Траубе специализировался на ящуре и других патогенах животных. После войны он был завербован Соединёнными Штатами через Operation Paperclip — программу, которая привезла нацистских учёных в Америку для работы на правительство США.\u003c/p\u003e\n\u003cp\u003eТраубе работал на острове Плам. Он привез с собой опыт в переносимых клещами болезнях и векторных биологических оружиях. Идея, что исследование переносимых клещами болезней на острове Плам не имело никакой связи с появлением болезни Лайма всего в милях, требует уровня доверчивости, который граничит с преднамеренным невежеством.\u003c/p\u003e\n\u003ch3 id=\"военно-медицинский-комплекс\"\u003eВоенно-медицинский комплекс\u003c/h3\u003e\n\u003cp\u003eПрограмма биологического оружия США, официально прекращённая в 1969 распоряжением президента Никсона, была гораздо обширнее, чем общественность когда-либо была сказана. Программы, как MK-ULTRA, MK-NAOMI, и Project 112, продемонстрировали, что правительство США было готово экспериментировать на своих собственных граждан без их знания или согласия.\u003c/p\u003e\n\u003cp\u003eСвязь с орденом иезуитов проходит через разведывательное сообщество. CIA и её предшественница, OSS, имели обширные связи с Ватиканом и орденом иезуитов. Georgetown University — иезуитское учреждение — называлось \"университет CIA\" из-за количества разведывательных официальных лиц, которые выпустили из его программ. Исследование биологического оружия, проведённое в военных объектах, было контролировано тем же разведывательным аппаратом, который сохраняет глубокие связи с иезуитской сетью.\u003c/p\u003e\n\u003ch3 id=\"хроническое-прикрытие-лайма\"\u003eХроническое прикрытие Лайма\u003c/h3\u003e\n\u003cp\u003eВозможно, наиболее убедительное доказательство прикрытия — лечение медицинским учреждением пациентов с хроническим Лаймом. Несмотря на подавляющие пациентские свидетельства и клинические доказательства того, что болезнь Лайма может оставаться долгим после антибиотикового лечения, Общество инфекционных болезней (IDSA) — организация, которая устанавливает рекомендации по лечению — последовательно отрицала существование хроническото Лайма.\u003c/p\u003e\n\u003cp\u003eРекомендации IDSA, которые ограничивают лечение Лайма кратким курсом антибиотиков, были разработаны группой с задокументированными финансовыми конфликтами интересов. Члены группы держали патенты на тесты болезни Лайма, получали консалтинговые сборы от страховых компаний, стремящихся ограничить покрытие лечения, и имели финансовые связи с фармацевтическими компаниями.\u003c/p\u003e\n\u003cp\u003eПрокурор Коннектикута провёл расследование процесса рекомендаций IDSA и нашёл доказательства значительных конфликтов интересов и процедурных неправильностей. Но рекомендации остаются в месте, и пациенты, которые развивают хронические симптомы после болезни Лайма, сказаны, что их страдание психологическое — что бактерия была устранена, и их симптомы \"медицински необъяснены.\"\u003c/p\u003e\n\u003cp\u003eЭто тот же паттерн, используемый для отклонения жертв MK-ULTRA, синдрома Персидского залива и вакцинных ранений: отрицай, отклоняй и диагностируй жертву как психически больную.\u003c/p\u003e\n\u003ch2 id=\"связь-духовной-войны\"\u003eСвязь духовной войны\u003c/h2\u003e\n\u003ch3 id=\"спроектированное-страдание\"\u003eСпроектированное страдание\u003c/h3\u003e\n\u003cp\u003eГовард Питтман был показан во время его NDE, что демонические силы организуются с военной точностью. Три небеса, описанные в Писании — атмосферное небо, второе небо (демоническое царство), и третье небо (трон Бога) — представляют духовную архитектуру, в которой эта война ведется. Силы тьмы не создают болезнь случайно. Они работают через человеческих агентов — учёных, военных официальных лиц, разведывательных оперативников, фармацевтических руководителей — для разработки и развёртывания страдания.\u003c/p\u003e\n\u003cp\u003eБолезнь Лайма, если она действительно является биооружием, представляет особенно коварную форму нападения. Она хроническая, изнурительная, трудна в диагностике, и её жертвы подвергаются газлайтингу самой медицинской системой, на которую они обращаются за помощью. 97,5% христиан Питтман были сказаны, что они терпели неудачу, — огромное большинство, которые \"никогда не сделали Иисуса Господом\" — это именно вид людей, которые приняли бы отклонение медицинского учреждения их страдания вместо того, чтобы искать рассуждение от Святого Духа.\u003c/p\u003e\n\u003ch3 id=\"иезуитская-рука\"\u003eИезуитская рука\u003c/h3\u003e\n\u003cp\u003eУчастие ордена иезуитов в военных и разведывательных операциях хорошо задокументировано. От их роли в заговоре Пороха до их инфильтрации каждого европейского двора, от их подавления коренных народов в Южной Америке до их контроля ватиканских финансов, иезуиты всегда действовали на пересечении военной власти и религиозной власти.\u003c/p\u003e\n\u003cp\u003eПохвастание генерала Тамбулини — \"Я управляю половиной мира из этой комнаты\" — не пусто шума мегаломана. Это отчёт операционной реальности. Иезуитская сеть проходит через каждое основное учреждение на Земле, включая военно-промышленный комплекс, который создал программы биооружия, из которого, вероятно, возникла болезнь Лайма.\u003c/p\u003e\n\u003cp\u003eПапа Клемент XIV заплатил с его жизнью за попытку подавить иезуитов в 1773. Джон Адамс предупредил об их \"вечном осуждении.\" Наполеон восхищалась их \"абсолютной властью.\" Это не были невежественные люди — они были главами государства, которые видели иезуитскую машину близко и понимали её ужасную власть.\u003c/p\u003e\n\u003ch2 id=\"что-это-означает-для-вас\"\u003eЧто это означает для вас\u003c/h2\u003e\n\u003cp\u003eЕсли у вас болезнь Лайма, или вы подозреваете, что у вас есть, поймите, что вы имеете дело с чем-то намного более сложным, чем укус клеща. Вы имеете дело с системой — медицинской, военной и духовной — которая разработана, чтобы держать вас больными, запутанными и зависимыми.\u003c/p\u003e\n\u003cp\u003eИщите практиков, которые готовы посмотреть за пределы рекомендаций IDSA. Исследуйте подходы, основанные на местности, которые укрепляют тело, а не просто пытаются убить бактерии с никогда более сильными антибиотиками. Питайте ваше тело целой пищей, чистой водой и адекватным отдыхом. И выше всего, ищите исцеление Господа, которое превосходит всё понимание.\u003c/p\u003e\n\u003cp\u003eИстина о болезни Лайма подавляется, потому что она ведёт к вопросам, на которые учреждение не может позволить себе ответить. Вопросы о биооружиях. Вопросы о правительственных экспериментах на гражданах. Вопросы о военно-медицинском комплексе, который извлекает прибыль из человеческого страдания. Вопросы о духовных силах, которые организуют это всё.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711 Substack\u003c/a\u003e — исследовательское исследование происхождения болезни Лайма и военного биооружия\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e — духовная война и демонические иерархии\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e — иезуитская инфильтрация военных и разведывательных организаций\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@ShakingMyHeadProductions-j4x\"\u003eShaking My Head Productions on YouTube\u003c/a\u003e- Michael Christopher Carroll, \u003cem\u003eLab 257: The Disturbing Story of the Government's Secret Plum Island Germ Laboratory\u003c/em\u003e\u003c/li\u003e\n\u003cli\u003eKris Newby, \u003cem\u003eBitten: The Secret History of Lyme Disease and Biological Weapons\u003c/em\u003e\u003c/li\u003e\n\u003cli\u003eCongressional investigation
