его — это история человека, который приобрел весь мир — богатство, власть, политическую династию — методами настолько коррумпированными, настолько безжалостными и настолько глубоко связанными со структурой власти иезуитов-католиков, что его наследие должно служить предупреждением, а не вдохновением. Тем не менее семья Кеннеди почитается в американской культуре как политическая королевская семья, их скандалы прощены, их преступления забыты, их связи с иезуитами игнорируются.\u003c/p\u003e\n\u003cp\u003eДжозеф П. Кеннеди-старший был продуктом бостонского ирландско-католического истеблишмента — истеблишмента, контролируемого орденом иезуитов через Бостонский колледж, Святой Крест и сеть католических приходов и политических организаций, которые доминировали в политике Массачусетса. Иезуиты формировали мировоззрение Кеннеди, связывали его с финансовыми сетями, которые он будет эксплуатировать, и защищали его от последствий его действий. Как предупреждал Наполеон, иезуиты — это «военная организация, а не религиозный орден... цель — власть». Кеннеди был их агентом в мире американских финансов и политики.\u003c/p\u003e\n\u003cp\u003eКак показывает \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e, противник облачается в респектабельность — в семейные ценности, в общественное служение, в благотворительность. И \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/67-The_Enemy_Within.mp4\"\u003eThe Enemy Within\u003c/a\u003e напоминает нам, что самый опасный враг — это тот, кто представляет себя другом народа, грабя его.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"состояние-от-бутлегерства\"\u003eСостояние от бутлегерства\u003c/h2\u003e\n\u003ch3 id=\"сухой-закон-и-католическая-связь\"\u003eСухой закон и католическая связь\u003c/h3\u003e\n\u003cp\u003eСухой закон (1920-1933) был одним из самых прибыльных периодов в американской криминальной истории — и Джозеф Кеннеди был в его центре. Хотя точный характер и масштабы операций Кеннеди по бутлегерству остаются предметом дебатов (семья потратила десятилетия на подавление доказательств), множество надежных источников подтверждают, что Кеннеди импортировал и распространял нелегальный алкоголь в огромных масштабах в 1920-е годы.\u003c/p\u003e\n\u003cp\u003eСвязи Кеннеди с алкоголем были установлены задолго до Сухого закона. Его отец, П. Дж. Кеннеди, был владельцем бостонского салуна и политическим боссом с глубокими связями с ирландским католическим подпольем. Когда начался Сухой закон, Джозеф Кеннеди был уникально позиционирован для эксплуатации ситуации: у него были семейные связи с торговлей алкоголем, финансовые ресурсы для организации крупномасштабных операций контрабанды и политическую защиту для работы безнаказанно.\u003c/p\u003e\n\u003cp\u003eСвязь между Сухим законом и католической церковью редко обсуждается, но критически важна. Движение за трезвость, которое привело к Сухому закону, было подавляюще протестантским и во многих своих проявлениях явно антикатолическим. Католические иммигранты — ирландцы, итальянцы, немцы — непропорционально становились мишенями принуждения к соблюдению Сухого закона. Тем не менее католический истеблишмент получил огромные прибыли от Сухого закона через контролируемые им сети бутлегерства.\u003c/p\u003e\n\u003cp\u003eЭто классическая иезуитская стратегия: создать конфликт, позиционировать себя по обе стороны и получить прибыль независимо от исхода. Иезуиты поддерживали Сухой закон через свое влияние на прогрессивное движение (которое значительно пересекалось с движением за трезвость), одновременно получая прибыль от нелегальной торговли алкоголем через свою католическую сеть. Джозеф Кеннеди был точкой контакта для этой операции на Северо-Востоке.\u003c/p\u003e\n\u003ch3 id=\"неожиданная-прибыль-от-лицензирования-алкоголя\"\u003eНеожиданная прибыль от лицензирования алкоголя\u003c/h3\u003e\n\u003cp\u003eКогда Сухой закон закончился в 1933 году, Кеннеди был позиционирован, чтобы снова получить прибыль. Он уже обеспечил эксклюзивные лицензии на импорт для шотландского виски и британского джина — лицензии, которые он получил через свои связи с британским истеблишментом (включая, по слухам, Уинстона Черчилля). Эти лицензии, предоставленные до официальной отмены Сухого закона, гарантировали, что Кеннеди будет доминировать на легальном рынке алкоголя с первого дня.\u003c/p\u003e\n\u003cp\u003eКомпания, которую основал Кеннеди, Somerset Importers, стала одним из крупнейших дистрибьюторов алкоголя в Соединенных Штатах. Состояние, которое Кеннеди сделал на легальных продажах алкоголя, затмило все, что он заработал на бутлегерстве, — и все это стало возможным благодаря предварительному знанию об отмене Сухого закона, знанию, которое было доступно только политически связанной элите.\u003c/p\u003e\n\u003ch2 id=\"манипуляции-на-уолл-стрит\"\u003eМанипуляции на Уолл-стрит\u003c/h2\u003e\n\u003ch3 id=\"инсайдерская-торговля-и-пулы\"\u003eИнсайдерская торговля и пулы\u003c/h3\u003e\n\u003cp\u003eВ 1920-е годы Джозеф Кеннеди стал одним из самых успешных операторов на фондовом рынке в Америке — методами, которые сегодня считались бы преступными. Кеннеди участвовал в «пулах акций» — координированных операциях, в которых группа инсайдеров искусственно раздувала цену акции, привлекала внешних инвесторов, а затем продавала на пике, оставляя внешних инвесторов с бесполезными акциями.\u003c/p\u003e\n\u003cp\u003eСамая известная операция с пулом Кеннеди касалась акций Yellow Cab Company. Работая с группой инсайдеров, Кеннеди манипулировал ценой акций путем координированной покупки, размещенных новостных историй и ложных подсказок для внешних инвесторов. Когда цена достигла целевого уровня, пул продал, заработав миллионы, в то время как внешние инвесторы были уничтожены.\u003c/p\u003e\n\u003cp\u003eЭти операции были совершенно законными в 1920-е годы — не было законов против инсайдерской торговли или манипулирования рынком. Но они были морально непростительными, и они непосредственно способствовали спекулятивному пузырю, который привел к краху 1929 года. Кеннеди, который вышел с рынка перед крахом (по слухам, после того, как мальчик-чистильщик обуви предложил ему советы по акциям, что Кеннеди воспринял как знак перегрева рынка), вышел из Депрессии богаче, чем когда-либо, в то время как миллионы американцев потеряли все.\u003c/p\u003e\n\u003ch3 id=\"sec-лиса-охраняющая-курятник\"\u003eSEC: Лиса, охраняющая курятник\u003c/h3\u003e\n\u003cp\u003eВ 1934 году президент Франклин Рузвельт назначил Джозефа Кеннеди первым председателем Комиссии по ценным бумагам и биржам — агентства, созданного для регулирования именно тех практик, которые сделали Кеннеди богатым. Рузвельт, как сообщается, оправдал назначение, сказав: «Пусть вор ловит вора».\u003c/p\u003e\n\u003cp\u003eНазначение Кеннеди в SEC было высшим выражением иезуитской стратегии инфильтрации. Поместив инсайдерского трейдера во главе регулирования инсайдерской торговли, финансовая элита гарантировала, что новые правила будут разработаны для устранения их конкуренции, сохраняя при этом их собственную способность получать прибыль. Кеннеди занимал пост председателя SEC чуть более года, в течение которого он установил основу регулирования ценных бумаг, которая остается в основном неизменной сегодня — основу, которая регулирует мелких операторов, оставляя крупнейших игроков нетронутыми.\u003c/p\u003e\n\u003ch2 id=\"политическая-династия\"\u003eПолитическая династия\u003c/h2\u003e\n\u003ch3 id=\"посол-в-британии\"\u003eПосол в Британии\u003c/h3\u003e\n\u003cp\u003eВ 1938 году Рузвельт назначил Кеннеди послом в Великобритании. Кеннеди использовал эту должность для продвижения своих собственных финансовых интересов, политических амбиций своей семьи и повестки дня католического истеблишмента.\u003c/p\u003e\n\u003cp\u003eПосольство Кеннеди было отмечено его симпатией к нацистской Германии и его оппозицией к вступлению Америки во Вторую мировую войну. Изоляционизм Кеннеди не был обусловлен пацифизмом; он был обусловлен его финансовыми интересами. Кеннеди имел инвестиции в Германии и видел нацистское правительство как бастион против коммунизма — который, несмотря на финансирование той же банковской сетью, которая финансировала иезуитов, тем не менее был конкурирующим центром власти, который угрожал католическим интересам в Европе.\u003c/p\u003e\n\u003cp\u003eОтзыв Кеннеди из Лондона в 1940 году, после того как он публично предсказал, что «демократия закончена в Англии», завершил его дипломатическую карьеру, но не его политические амбиции. Он просто перенес эти амбиции на своих сыновей — сначала на Джо-младшего (который был убит во Второй мировой войне), затем на Джона, Роберта и Эдварда.\u003c/p\u003e\n\u003ch3 id=\"конвейер-иезуитского-образования\"\u003eКонвейер иезуитского образования\u003c/h3\u003e\n\u003cp\u003eСвязь семьи Кеннеди с орденом иезуитов была не случайной; она была структурной. Сыновья Кеннеди получили образование в учреждениях, связанных с иезуитами:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eДжон Ф. Кеннеди\u003c/strong\u003e посещал Choate (элитную подготовительную школу со связями с иезуитами) и Гарвард (который, хотя и не иезуитский, был глубоко связан с сетями власти, контролируемыми иезуитами).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eРоберт Ф. Кеннеди\u003c/strong\u003e посещал Milton Academy и Гарвард, следуя тому же конвейеру власти.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЭдвард Кеннеди\u003c/strong\u003e посещал Гарвард и юридическую школу Университета Вирджинии.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eИезуитская образовательная система служила конвейером, через который династия Кеннеди была обучена, связана и запущена в американскую политическую жизнь. Католическая идентичность династии была не просто культурной — она была операционной, связывая Кеннеди с глобальной сетью католической власти, которую контролировали иезуиты.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e прослеживает связи тайных обществ, которые формировали американские политические династии с самого начала, и \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/105-Freemason_Jesters.mp4\"\u003eFreemason Jesters\u003c/a\u003e раскрывает, как элита насмехается над публикой, которую утверждает, что служит.\u003c/p\u003e\n\u003ch2 id=\"наследие-грабежа\"\u003eНаследие грабежа\u003c/h2\u003e\n\u003ch3 id=\"что-забрал-кеннеди\"\u003eЧто забрал Кеннеди\u003c/h3\u003e\n\u003cp\u003eБогатство Джозефа П. Кеннеди — оцененное в 300-400 миллионов долларов на момент его смерти (эквивалент нескольких миллиардов сегодня) — было извлечено из американского народа через:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eБутлегерство\u003c/strong\u003e во время Сухого закона\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМанипулирование акциями\u003c/strong\u003e в 1920-е годы\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПредварительное знание\u003c/strong\u003e регулирующих изменений и изменений политики\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПолитические связи\u003c/strong\u003e, которые предоставляли эксклюзивные деловые возможности\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eИнсайдерский доступ\u003c/strong\u003e к информации, недоступной обычным гражданам\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eКаждый доллар состояния Кеннеди представляет доллар, взятый у кого-то еще — фермера, который потерял свои сбережения в манипулируемой акции, владельца малого бизнеса, который был подрезан монополией Кеннеди на импорт алкоголя, налогоплательщика, который финансировал правительственные программы, которые эксплуатировала семья Кеннеди.\u003c/p\u003e\n\u003ch3 id=\"династия-продолжается\"\u003eДинастия продолжается\u003c/h3\u003e\n\u003cp\u003eБогатство и политическая власть семьи Кеннеди сохранялись на протяжении четырех поколений. Семья продолжает занимать политические должности, контролировать благотворительные фонды и влиять на американскую политику. Мифология «Камелота» — идеализированного президентства Кеннеди — продолжает очаровывать американскую публику, скрывая коррумпированные основы, на которых была построена династия.\u003c/p\u003e\n\u003cp\u003eРоберт Ф. Кеннеди-младший, внук Джозефа П. Кеннеди-старшего, несет фамилию и наследие семьи в новое поколение. Несет ли он связи семьи со структурой власти иезуитов-католиков — это вопрос, который каждый информированный гражданин должен задать.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана, что «вы называете меня Господом, но вы никогда не делали меня Господом», применяется непосредственно к политическим династиям, таким как Кеннеди, которые представляют себя как государственные служащие, служа своим собственным интересам и интересам структуры власти, которая их создала. 95% обитателей ада, которые служат «себе», включают тех, кто строит династии на эксплуатации своих сограждан. Смотрите: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство о предсмертном опыте Говарда Питтмана\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля дальнейшего исследования см. \u003ca href=\"https://agent131711.substack.com\"\u003eSubstack Agent131711\u003c/a\u003e и \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eКатолическая конфиденциальность: раскрытые прискорбные секреты иезуитов\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca hr
