 труб. Число совершенства. В частях 1-6 мы проследили культ Сатурна от его древних истоков через его символы, его имена, его архитектуру, его институциональных хранителей и его доктрину Чёрного Солнца. Теперь, в этой финальной главе, мы раскрываем эндшпиль: Новый мировой порядок — это не политический проект. Это духовный проект. И Рождество — фестиваль Сатурна, который празднуют миллиарды людей каждый год — является одним из его основных инструментов.\u003c/p\u003e\n\u003cp\u003eБлизкая смертельная опасность Хоуарда Питтмана показала ему три неба и демоническую иерархию, действующую с военной точностью. Уровень отказа 97,5%. 95% тех, кто служит \"я\". Духовный вес каждого слова (Матфей 12:36-37). Эти откровения — не абстрактная теология. Они описывают операционную систему духовной войны, которую Новый мировой порядок разработан, чтобы выиграть — для неправильной стороны.\u003c/p\u003e\n\u003cp\u003eИезуиты — архитекторы. Военная организация Лойолы, \"абсолютная власть\" Наполеона, \"вечное проклятие\" Адамса, глобальное управление Тамбурини, отравление Климента XIV — это не исторические сноски. Это резюме организации, которая строит Новый мировой порядок, используя Рождество, в том числе в качестве оружия массового духовного уничтожения.\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/01-Cast_Out_of_Paradise.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eCast Out of Paradise — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003cvideo controls\u003e\n  \u003csource src=\"https://confliction.zzzdaily.com/tracks/ru/35-The_Tree_of_Life.mp4\" type=\"video/mp4\"\u003e\n\u003c/video\u003e\n\u003cp\u003e\u003cem\u003eThe Tree of Life — из альбома Confliction\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"новый-мировой-порядок-духовная-архитектура\"\u003eНовый мировой порядок: духовная архитектура\u003c/h2\u003e\n\u003ch3 id=\"вне-политики\"\u003eВне политики\u003c/h3\u003e\n\u003cp\u003eНовый мировой порядок обычно обсуждается в политических терминах: единое мировое правительство, глобальная валюта, цифровое наблюдение, контроль над населением. Это реальные компоненты, но они — видимая структура — экзотерический слой. За ними скрывается эзотерическая цель: установление царства Сатурна на земле, полная духовная тюрьма, в которой человечество навсегда отделено от Бога.\u003c/p\u003e\n\u003cp\u003eФраза \"Новый мировой порядок\" использовалась политиками от Г.Г. Уэллса до Джорджа Х.У. Буша. Но концепция предшествует современной политике на тысячелетия. Это древняя мечта школ мистерий: мир, управляемый просвещённым меньшинством, обслуживаемый невежественным большинством, организованный по оккультным принципам и посвящённый поклонению скрытому богу — Сатурну, Чёрному Солнцу, Люциферу, какое бы имя ни выбрали посвящённые.\u003c/p\u003e\n\u003cp\u003eИезуиты, как показано в \u003cem\u003eCatholic Confidential\u003c/em\u003e, — наиболее эффективная организация когда-либо созданная для этой цели. Их инфильтрация \"замаскирована хитростью\", их слепое повиновение, их готовность практиковать \"каждый вид порока\" — это не недостатки. Это особенности организации, созданной для построения глобальной структуры власти внутри каждого существующего учреждения. Agent131711 документирует на Substack (agent131711.substack.com), как эта инфильтрация преуспела за пределами того, что большинство людей может себе представить.\u003c/p\u003e\n\u003ch3 id=\"рождество-как-программирование-нмп\"\u003eРождество как программирование НМП\u003c/h3\u003e\n\u003cp\u003eРождество — это не просто праздник. Это событие программирования — годовая переориентация духовной ориентации населения. Каждый декабрь миллиарды людей одновременно совершают одинаковые ритуалы, говорят одинаковые слова, потребляют одинаковые медиа и направляют свою энергию на одинаковые символы. Это крупнейший скоординированный ритуал на земле.\u003c/p\u003e\n\u003cp\u003eРассмотрим, что достигает программирование Рождества:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eМатериализм\u003c/strong\u003e: Население обучают приравнивать любовь к потреблению. Мерой привязанности становится ценовой ярлык. Это служит Сатурну — богу материального — и служит финансовой системе, которая держит население в долговой кабале.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПослушание\u003c/strong\u003e: Те, кто ставит под сомнение Рождество, наказываются социально. Система требует участия и наказывает несогласие. Это подготавливает население к главному требованию Нового мирового порядка: полное подчинение.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЛожное поклонение\u003c/strong\u003e: Обёртывая ритуалы Сатурна в христианский словарь, Рождество гарантирует, что даже религиозный сегмент населения поклоняется ложно. Уровень отказа 97,5%, который видел Питтман, в значительной степени является результатом этого ложного поклонения — поколений христиан, которые верили, что чтят Христа, а на самом деле служили Сатурну.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазрушение семьи\u003c/strong\u003e: Несмотря на его риторику единства, Рождество — один из самых стрессовых периодов года. Депрессия, тревога, семейные конфликты, финансовое напряжение и самоубийства всё возрастают в праздничный сезон. Сатурн пожирает своих детей, и Рождество — его ежегодный пир.\u003c/p\u003e\n\u003ch2 id=\"календарь-контроля\"\u003eКалендарь контроля\u003c/h2\u003e\n\u003ch3 id=\"григорианская-сетка\"\u003eГригорианская сетка\u003c/h3\u003e\n\u003cp\u003eКалендарь, который использует мир, — это григорианский календарь, реализованный в 1582 году папой Григорием XIII. Астрономические расчёты были выполнены математиком-иезуитом Кристофером Клавиусом. Иезуиты разработали сетку времени, которая управляет глобальной торговлей, правительством, образованием и религией.\u003c/p\u003e\n\u003cp\u003eЭто не второстепенный момент. Время — фундаментальный организующий принцип человеческой жизни. Кто управляет календарём, управляет ритмом цивилизации. Григорианский календарь размещает христианские праздники — все из которых, как мы продемонстрировали, переделанные языческие фестивали — в структурные узлы года. Рождество якорирует зиму. Пасха якорирует весну. Сам календарь является инструментом Сатурна, отмечающим цикл времени, который Сатурн управляет.\u003c/p\u003e\n\u003cp\u003eНовый мировой порядок не может функционировать без синхронизированного времени. Глобальные финансы, глобальная коммуникация, глобальное управление — все требуют универсального календаря. Иезуиты предоставили его, и они вложили свою духовную повестку в его структуру. Каждый раз, когда вы проверяете дату, вы ориентируетесь в иезуитской сетке.\u003c/p\u003e\n\u003ch3 id=\"годовой-сброс\"\u003eГодовой сброс\u003c/h3\u003e\n\u003cp\u003eДень Новых годов — 1 января — падает на неделю после Рождества. Это годовой сброс: население, истощённое циклом потребления Рождества, начинает новый год в долгу, истощённым и делая \"резолюции\" (форма клятвы, привязка Сатурну). Цикл затем повторяется: работа, чтобы восстановиться после Рождества, расходы на подготовку к следующему.\u003c/p\u003e\n\u003cp\u003eЭтот годовой сброс держит население в постоянном состоянии выживания в настоящем, неспособном отступить и увидеть схему. Исследование Agent131711 показывает, как этот цикл усиливается медиа (которые бомбят население рождественским контентом два месяца в году), коммерцией (которая начинает рождественские распродажи всё раньше каждый год) и социальным давлением (которое делает выход всё более сложным).\u003c/p\u003e\n\u003cp\u003eНовый мировой порядок не должен навязываться силой. Он собирается через ритуал, календарь, коммерцию и социальное давление — инструменты, которые иезуиты совершенствовали пять веков. Рождество — главный ритуал, годовое событие калибровки, которое держит население согласованным с системой Сатурна.\u003c/p\u003e\n\u003ch2 id=\"конвергенция-технологии\"\u003eКонвергенция технологии\u003c/h2\u003e\n\u003ch3 id=\"умное-наблюдение-и-сезон-праздников\"\u003eУмное наблюдение и сезон праздников\u003c/h3\u003e\n\u003cp\u003eТехнологическая инфраструктура Нового мирового порядка строится у всех на виду, и Рождество — один из его основных периодов развёртывания. Умные динамики (всегда слушают), умные телевизоры (всегда наблюдают), умные игрушки (устройства сбора данных, подарённые детям) — это подарки, которые заполняют кубы под ёлкой Сатурна.\u003c/p\u003e\n\u003cp\u003eКаждый год список рождественских подарков становится более технологичным, более связанным, более способным к наблюдению. Население охотно устанавливает собственные устройства мониторинга, платит за них долгом и празднует транзакцию как выражение любви. Это гений Сатурна: делать тюремное заключение похожим на праздник.\u003c/p\u003e\n\u003cp\u003eИезуитская стратегия инфильтрации \"замаскирована хитростью\" нашла своё совершенное выражение в потребительской технологии. Устройства не объявляют себя инструментами наблюдения. Они объявляют себя удобствами, развлечениями, соединениями. Это троянские кони цифровой эпохи, и Рождество — их система годовой доставки.\u003c/p\u003e\n\u003ch3 id=\"цифровая-валюта-и-рождественские-траты\"\u003eЦифровая валюта и рождественские траты\u003c/h3\u003e\n\u003cp\u003eСтремление к центральным банковским цифровым валютам (CBDC) найдёт один из своих самых сильных катализаторов в цикле рождественских расходов. Когда наличные деньги будут отменены и все транзакции будут цифровыми, каждая рождественская покупка будет отслеживаться, анализироваться и контролироваться. Правительство будет знать, что вы купили, где, когда и для кого. Диссидентов можно исключить из экономики нажатием кнопки.\u003c/p\u003e\n\u003cp\u003eЭто финансовый размер Нового мирового порядка, и Рождество — его испытательная площадка. Население уже было обучено тратить сверх своих средств в праздничный сезон. Переход от кредитных карт к CBDC просто завершает цикл контроля — от добровольного долга к обязательному цифровому наблюдению каждой транзакции.\u003c/p\u003e\n\u003cp\u003eХоуард Питтман был показан, что духовное царство и материальное царство тесно связаны. Каждая материальная система — финансовая, технологическая, коммерческая — имеет духовное измерение. Система CBDC — это не просто экономическое инновация. Это духовная технология: система полного материального контроля, которая зеркалит полный духовный контроль, который система Сатурна строила тысячелетиями.\u003c/p\u003e\n\u003ch2 id=\"эндшпиль\"\u003eЭндшпиль\u003c/h2\u003e\n\u003ch3 id=\"единая-мировая-религия\"\u003eЕдиная мировая религия\u003c/h3\u003e\n\u003cp\u003eНовый мировой порядок требует единую мировую религию — универсальный духовный каркас, который объединяет население под единой системой поклонения. Рождество уже служит прототипом. Его празднуют по всем христианским конфессиям, по всем светским культурам, через национальные границы. Это самый универсальный ритуал на земле, объединяющий католиков, протестантов, атеистов и потребителей в совместном участии.\u003c/p\u003e\n\u003cp\u003eЕдиная мировая религия не будет выглядеть как любая существующая религия. Она будет выглядеть как праздник — инклюзивная, радостная, коммерчески активная, социально обязательная. Она почтит никакое конкретное божество, но будет включать элементы всех традиций (как Рождество уже делает). Она будет требовать участия и наказывать несогласие (как Рождество уже делает). Она будет служить Сатурну, никогда не называя его имени (как Рождество уже делает).\u003c/p\u003e\n\u003cp\u003eИезуиты подготавливали это слияние веков. Их миссии по всему миру не просто обращали коренное население в католицизм — они поглощали коренные практики в католическую базу, создавая региональные вариации одной и той же универсальной системы. Это модель единой мировой религии: местный вкус, глобальная структура, Сатурн в ядре.\u003c/p\u003e\n\u003ch3 id=\"единое-мировое-правительство\"\u003eЕдиное мировое правительство\u003c/h3\u003e\n\u003cp\u003eПолитическое измерение Нового мирового порядка — единое мировое правительство — неразделимо от его духовного измерения. Организация Объединённых Наций, Всемирный экономический форум, Международный валютный фонд — это видимые структуры. За ними те же семьи, общества и ордены, которые управляли из тени веками, продолжают управлять.\u003c/p\u003e\n\u003cp\u003eРождество служит единому мировому правительству, обучая население синхронизированному ритуальному поведению. Каждый декабрь миллиарды людей делают одинаковые вещи одновременно по одному и тому же календарю. Это поведенческая инфраструктура глобального управления: население, привыкшее к синхронизированному действию, направляемое медиа, мотивированное потреблением и наказываемое за несоответствие.\u003c/p\u003e\n\u003cp\u003eИезуиты построили эту инфраструктуру. Календарь им принадлежит. Система образования, которая тренирует послушание, им принадлежит. Медиа, которые производят консенсус, сформированы их выпускниками. Политический класс, который реализует политику, образован в их университетах. Единое мировое правительство — это не будущее. Оно уже здесь, в эмбриональной форме, и Рождество — одно из его сердцебиений.\u003c/p\u003e\n\u003ch2 id=\"финальный-выбор\"\u003eФинальный выбор\u003c/h2\u003e\n\u003ch3 id=\"что-видел-питтман\"\u003eЧто видел Питтман\u003c/h3\u003e\n\u003cp\u003eХоуард Питтман вернулся из своего НДП с простым, разрушительным сообщением: почти все обмануты. 97,5%, которые были отклонены, верили, что были спасены. Они посещали церкви, праздновали праздники, говорили правильные слова. Но их слова, о которых Матфей 12:36-37 предупреждает, будут судимы, были сформированы системой, разработанной для предотвращения подлинного духовного соединения.\u003c/p\u003e\n\u003cp\u003eРождество — это годовой праздник этого обмана. Это момент, когда система Сатурна наиболее видима, наиболее участлива, наиболее обязательна. И это момент, когда выбор наиболее ясен: участвовать в системе или выйти из неё и искать истину, которую система была разработана, чтобы скрыть.\u003c/p\u003e\n\u003ch3 id=\"разрывание-цикла\"\u003eРазрывание цикла\u003c/h3\u003e\n\u003cp\u003eРазрывание рождественского цикла — это не безрадостность. Это честность. Это признание того, что традиции, которые мы совершаем, имеют истоки и цели, которые были скрыты от нас, что учреждения, которые пропагандируют эти традиции, имеют повестки дня, которые служат чему-то другому, чем Бог, и что духовные последствия неосознанного ритуального участия реальны и вечны.\u003c/p\u003e\n\u003cp\u003eУзкий путь — путь, который немногие находят — требует этой честности. Это требует готовности быть другим, быть поставленным под вопрос, быть остракизированным. Это требует признания того, что удобство и истина часто противостоят, и что выбор удобства — это выбор широкого пути, который ведёт к разрушению.\u003c/p\u003e\n\u003cp\u003eНовый мировой порядок — это кульминация системы Сатурна — финальное, полное заключение человечества в материальную клетку, освещённую Чёрным Солнцем и поддерживаемую иезуитской военной машиной. Рождество — его годовая репетиция, его событие калибровки населения, его массовый ритуал бессознательного подчинения.\u003c/p\u003e\n\u003cp\u003eВы можете участвовать. Или вы можете проснуться.\u003c/p\u003e\n\u003cp\u003eСерия завершена. Доказательства представлены. Выбор, как это было всегда, остаётся за вами.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=8udts8Un4m4\u0026#x26;list=PLm6Vq0bTTCDj8fuDVfqcytiuxbVj_Lyq4\"\u003eПлоская Земля, наука и НАСА — Документальный плейлист\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ZR296RWS0yM\u0026#x26;list=PLm6Vq0bTTCDiPIX2ItdQTQGX7mXQXBxoV\"\u003eНАСА и космос — величайший плейлист документального кино обмана\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v
