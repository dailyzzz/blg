 течение большей части последних двух тысяч лет \"короли востока\" были загадкой — неясной фразой, которую теологи могли только спекулировать. Восток, относительно Израиля, был обширный и фрагментарный. Никакая восточная мощь с парфянской империи не представляла надежную военную угрозу ближневосточному. Идея массивной восточной армии, марширующей в направлении Евфрата, казалась фантастичной, останком древних опасений по поводу персидских вторжений.\u003c/p\u003e\n\u003cp\u003eЗатем Китай поднялся.\u003c/p\u003e\n\u003cp\u003eВ менее чем четыре десятилетия Китай преобразовался из нищего аграрного государства во вторую по величине экономику мира, крупнейшую производственную базу мира, крупнейшую стоящую армию мира и наиболее продвинутое государство цифровой надзора в истории человека. Он построил инициативу пояса и дороги, охватывающей 140 стран. Он разработал гиперзвуковые ракеты, системы оружия искусственного интеллекта и темно-голубой флот, способный проецировать мощь через океаны. Он установил систему социального кредита — наиболее полный прототип системы зверя когда-либо реализованный.\u003c/p\u003e\n\u003cp\u003eТрек Confliction \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/111-The_Final_Day.mp4\"\u003eThe Final Day\u003c/a\u003e говорит о завершении всех пророческих временных линий. Короли востока — это не метафора. Они геополитическая реальность, и дорога к Евфрату дорога — буквально и образно — китайскими проектами инфраструктуры, простирающимися от Пекина к средиземному морю.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"евфрат-высыхает\"\u003eЕвфрат высыхает\u003c/h2\u003e\n\u003cp\u003eПророчество Откровения 16:12 указывает, что реки Евфрат высохнет для подготовки пути королей востока. В течение века это казалось символичным. Евфрат был одной из великих рек древнего мира — граница империй, жизненная кровь Месопотамии, один из четырех рек, вытекающих из Эдема (Бытие 2:14).\u003c/p\u003e\n\u003cp\u003eЕвфрат теперь буквально высыхает.\u003c/p\u003e\n\u003cp\u003eПроект турецкой юго-восточной Анатолии (GAP) построил 22 плотины и 19 гидроэлектростанции на реках Евфрат и Тигр. Только плотина Atatürk, завершенная в 1990, сократила нижний поток до 40 процентов. Ирак и Сирия — страны нижних потоков — опыт катастрофического дефицита воды в результате.\u003c/p\u003e\n\u003cp\u003eК 2023 году спутниковые изображения показали обширные участки Евфрата, сокращенные к тонкой. Иракские фермеры, которые зависели от реки в течение тысячелетий, брошены их земли. Болота южного Ирака — когда-то пышные водно-болотные угодья, которые некоторые ученые считают местоположением Сада Эдема — высыхали в потрескавшуюся пустыню. Отчеты Организации Объединенных Наций задокументировали гуманитарный кризис, вызванный потерей Евфрата.\u003c/p\u003e\n\u003cp\u003eКлиматические паттерны усугубили инженерию. Сокращенные осадки через бассейн Тигра-Евфрата, в сочетании с восходящей плотиной, создали ситуацию, когда полное высыхание частей Евфрата не является пророческим будущим, но настоящим наблюдаемым фактом. Река, которая когда-то определяла восточную границу Римской империи — и какой пророчество говорит должна высохнуть для восточных армий, чтобы пересечь — исчезает.\u003c/p\u003e\n\u003cp\u003eЭто не интерпретация. Это гидрология. И она выстраивается точно с текстом, написанным почти две тысячи лет назад.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"военная-трансформация-китая\"\u003eВоенная трансформация Китая\u003c/h2\u003e\n\u003cp\u003eАрмия народного освобождения (PLA) — это самая крупная военная сила на земле, примерно 2 миллиона активных сотрудников и приблизительно 600 000 резервных войск. Но числа одни не описывают трансформацию, которую Китай потерпел. PLA 21-го века — это технологически изощренная сила, предназначенная для глобальной проекции мощи.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРасширение флота.\u003c/strong\u003e Китай теперь работает самый крупный военно-морской флот по количеству корпуса, обгоняя Соединенные Штаты. Он запустил три авианосца, с четвертым в конструкции. Его разрушители Type 055 считаются среди наиболее способных боевых кораблей на плаву. Его подводный флот включает атомные ракеты, несущие подводные лодки, способные поражать любой объект на земле.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТехнология ракеты.\u003c/strong\u003e Межконтинентальная баллистическая ракета DF-41 Китая имеет диапазон 15 000 километров и несет независимо нацеливаемые повторные входные транспортные средства (MIRVs). Его гиперзвуковой планирующий аппарат DF-17 может избегать всех существующих систем защиты от ракет. Его DF-21D \"убийца авианосца\" противокорабельная баллистическая ракета угрожает фундаменту американской проекции морской мощи.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБоевая AI.\u003c/strong\u003e Китай объявил о своем намерении быть мировым лидером в искусственном интеллекте к 2030. Его программы военного AI включают автономные роботы дрона, AI-управляемые системы нацеливания, алгоритмическое принятие решений для военных операций и платформы прогностической разведки. Стратегическая поддержка сил PLA интегрирует кибер, электронные и космические боевые возможности под одним командованием — структура, разработанная для конфликта в информационную эпоху.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПространственные возможности.\u003c/strong\u003e Китай работает систему навигации спутника Beidou (его альтернатива GPS), продемонстрировал противоспутниковые оружие и поддерживает активную космическую станцию. Контроль пространства — это контроль коммуникаций, надзора и точного нацеливания — предпосылки современного военного доминирования.\u003c/p\u003e\n\u003cp\u003eЭто не нация, подготавливающаяся к защите. Это нация, подготавливающаяся к проекции мощи в масштабе, который соответствует пророческому описанию восточной силы, способной маршировать армии в направлении ближневостока.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пояс-и-дорога-подготовка-пути\"\u003eПояс и дорога: подготовка пути\u003c/h2\u003e\n\u003cp\u003eОткровение 16:12 говорит, что путь королей востока должна быть \"подготовлена\". Греческое слово это \u003cem\u003ehetoimazo\u003c/em\u003e — сделать готовым, подготовить, построить. Образность — это дорога, построенная, препятствие удаляемое, путь в Клиренсе.\u003c/p\u003e\n\u003cp\u003eИнициатива пояса и дороги Китая (BRI) — это крупнейший проект инфраструктуры в истории человечества. Запущенный в 2013 году, он охватывает более 140 стран через Азию, Африку, Европу и ближний Восток. Это включает:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eКитайский коридор экономики Пакистана (CPEC)\u003c/strong\u003e — сеть 62 миллиардов долларов дорог, железных дорог и трубопроводов, соединяющих западный Китай с аравийским морем через Пакистан.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eКитайский коридор экономики центральной Азии-западной Азии\u003c/strong\u003e — соединение Китая через Казахстан, Узбекистан, Туркменистан и Иран к Турции и средиземному морю.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eНовый евразийский мост земли\u003c/strong\u003e — железнодорожные связи из Китая в Европу через Россию и Центральную Азию.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eУдобства портала\u003c/strong\u003e — Китай построил или приобрел операционный контроль портов на Sri Lanka (Hambantota), Pakistan (Gwadar), Djibouti, Greece (Piraeus) и дюжины других мест.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBRI в самом буквальном смысле подготавливает путь из востока на запад. Дороги, железные дороги, портала и трубопровода создают логистическую инфраструктуру, необходимую для движения армий, не просто товаров. Военные стратеги отметили, что каждый коридор BRI имеет двойное использование способности — что перемещает коммерческие товары в мирное время может переместить военное оборудование в военное время.\u003c/p\u003e\n\u003cp\u003eДорога из Пекина в Евфрат строится китайским бетоном, китайской сталью и китайским финансированием. Путь подготавливается. Пророчество не требует сверхъестественного вмешательства для полнения. Он требует только того, что строительство продолжается — и он продолжает ежедневно.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"социальный-кредитный-план\"\u003eСоциальный кредитный план\u003c/h2\u003e\n\u003cp\u003eСистема социального кредита Китая является наиболее продвинутым прототипом системы зверя когда-либо развернута, и его последствия распространяются далеко за границы Китая. Как изучено в \u003ca href=\"/social-credit-western-world/?lang=ru\"\u003eSocial Credit in the Western World\u003c/a\u003e, принципы, проверяемые в Китае, принимаются — под различными названиями — западными правительствами и корпорациями.\u003c/p\u003e\n\u003cp\u003eКитайская система интегрирует:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eФинансовое поведение\u003c/strong\u003e — история кредитов, схемы платежей, привычки расходов\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eСоциальное поведение\u003c/strong\u003e — активность онлайн, социальные связи, общественное поведение\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПолитическое поведение\u003c/strong\u003e — соответствие правительственным директивам, идеологическое соответствие\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eЮридическое поведение\u003c/strong\u003e — история преступлений, нарушения трафика, судебные решения\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eГраждане с низкими показателями социального кредита столкнуться с последствиями, включая: ограничения путешествий (миллионы были запрещены от покупки авиакомпании и железнодорожных билетов), снижение доступа к образованию для своих детей, публичный позор через черные списки, ограниченные скорости интернета и исключение из правительственных должностей.\u003c/p\u003e\n\u003cp\u003eСистема насаживается через инфраструктуру надзора, которая включает более 600 миллионов камер — более одного на каждых двух граждан — оборудованных с лицом признание питаемой AI. Камеры дополняются цифровым мониторингом всей активности онлайн, финансовых трансакций и социальных связей.\u003c/p\u003e\n\u003cp\u003eТо, что Китай построил, является функционирующей моделью Откровения 13:17 — система, где участие в обществе зависит от соответствия правящему органу. \"Марка\" в Китае не является физическим имплантатом (пока) но цифровым баллом, связанным с цифровой личностью. Принцип идентичен: соответствие или быть исключенным.\u003c/p\u003e\n\u003cp\u003eЗначимость для пророчества двойной. Первое, Китай демонстрирует, что система зверя технически возможна — это работает в масштабе 1,4 миллиарда людей. Второе, модель Китая изучается и адаптируется по всему миру. Короли востока не только подготавливают военный путь. Они демонстрируют модель управления, которую система Antichrist примет глобально.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"200-миллионов-число-больше-невозможное\"\u003e200 миллионов: число больше невозможное\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И число войск конного было два тма тма; и я слышал число их.\" — Откровение 9:16\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДвести миллионов. Когда John записал этот номер в первом веке, все население земли было приблизительно 300 миллионов. Армия 200 миллионов была немыслима — число настолько огромное, что это могло быть только сверхъественное.\u003c/p\u003e\n\u003cp\u003eНаселение Китая составляет 1,4 миллиарда. Население Индии — 1,4 миллиарда. Объединенное население восточной и южной Азии превышает 4 миллиарда людей. Мобилизация военных, проводящие из этой базы популяции, может, впервые в истории человечества, поле армией 200 миллионов — не как сверхъественное событие, а как демографическую возможность.\u003c/p\u003e\n\u003cp\u003eСистема военного резерва Китая, в сочетании с его силами милиции и его способностью призвать из популяции 1,4 миллиарда, дает ему теоретическую способность мобилизации, которая затмит что-нибудь в истории человечества. Если союз с другими восточными нациями — Индия, Северная Корея, Пакистан, Индонезия или другие, нарисованные в коалицию — объединенный военный потенциал Востока достигает точно масштабу, который Откровение описывает.\u003c/p\u003e\n\u003cp\u003eЭто не означает, что армия 200 миллионов марширует на ногах, как древние армии. Современная война ведется с ракетами, дронами, кибер-оружием и космическими активами. Но пророческий номер — когда-то отклонено как невозможно большой — сейчас просто амбициозный. Демографическая, промышленная и технологическая база, чтобы поле такую ​​силу существует впервые в истории, и она существует на Востоке.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"альянс-brics-и-новый-мировой-порядок\"\u003eАльянс BRICS и новый мировой порядок\u003c/h2\u003e\n\u003cp\u003eКитай не стоит в одиночку. Альянс BRICS — Бразилия, Россия, Индия, Китай, Южная Африка, плюс недавние дополнения Египта, Эфиопии, Ирана, Саудовской Аравии и Объединенных арабских эмиратов — представляет собой преднамеренный вызов западному доминированному мировому порядку. Как изучено в \u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eThe Great Reset: The Fourth Industrial Revolution\u003c/a\u003e, переформирование глобальных структур мощи ускорение.\u003c/p\u003e\n\u003cp\u003eBRICS коллективно представляет:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eБолее 40% населения мира\u003c/li\u003e\n\u003cli\u003eБолее 35% глобального ВВП (паритет покупательной способности)\u003c/li\u003e\n\u003cli\u003eКрупные производители энергии (Россия, Саудовская Аравия, UAE, Иран)\u003c/li\u003e\n\u003cli\u003eГосударства ядерного оружия (Россия, Китай, Индия)\u003c/li\u003e\n\u003cli\u003eКрупнейшая в мире армия по персоналу (Китай)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eАльянс разрабатывает альтернативу западной финансовой инфраструктуре: банк разработки BRICS, предложения для общей валюты или системы урегулирования, обходящей доллар США, и торговые соглашения, номинированные в местных валютах. Движение де-долларизации представляет наиболее значительный вызов американскому финансовому господству с 1944 года.\u003c/p\u003e\n\u003cp\u003eПророчески это имеет значение, потому что Откровение описывает многополярный конфликт — не единственное глобальное правительство, правящее без противодействия, но конкурирующие мощи, соперничающие для доминирования в конце времен. Короли востока не являются субъектами зверя — они соперники. Они маршируют в направлении Армагеддона не в подчинении, а в соревновании, нарисованные драконом в конфликт, который потребляет мир.\u003c/p\u003e\n\u003cp\u003eАльянс BRICS создает точно вид восточного блока мощи, который Откровение описывает: независимым западного контроля, военно мощным, экономически значительным и географически позиционированным, чтобы двигаться в направлении ближневостока через точно коридоры, которые инициатива пояса и дороги строит.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"собрание-в-армагеддоне\"\u003eСобрание в Армагеддоне\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И собрал их на место, называемое по-еврейски Армагедон.\" — Откровение 16:16\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДолина Jezreel в северном Израиле — Har Megiddo, Armagedon — это широкая, плоская равнина, которая служила поле битвы в течение тысячелетий. Фараон Thutmose III боролся там. Canaanites боролись израильтян там. Napoleon назвал это \"наиболее естественным полем битвы всей земли.\" Это где Писание говорит финальная битва произойдет.\u003c/p\u003e\n\u003cp\u003eЛогистика движения восточных армий в это местоположение требует точно то, что строится: инфраструктура, соединяющая восточную Азию в ближний Восток, удаление препятствия Евфрата, структуры альянса, которые унитирают восточные нации, и военные возможности, которые позволяют проекцию мощи через континенты.\u003c/p\u003e\n\u003cp\u003eКаждый элемент находится в процессе. Дороги строятся. Река высыхает. Альянсы образуют. Оружие развернуто. Стадион установлен — не исключительно сверхъественной манипуляцией, но видимым, задокументированным действиями наций, преследующих свои собственные амбиции, незнающий, что они полнят сценарий, написанный до основания мира.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"пророческие-часы\"\u003eПророческие часы\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И цари земные, и вельможи, и богатые, и тысяченачальники, и сильные, и всякий раб, и всякий свободный скрывались в пещерах и в скалах гор.\" — Откровение 6:15\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eКонвергенция возвышения Китая, высыхания Евфрата, строительства пояса и дороги, переориентации BRICS и прототипа социального кредита не является совпадением. Это конвергенция — множественные пророческие потоки, приходящие вместе одновременно способом, который никогда не произошел прежде в истории.\u003c/p\u003e\n\u003cp\u003eПредыдущие поколения могли читать Откровение 16 и чудесный. Это поколение читает и смотрит. Короли востока не являются теологической абстракцией. Они на вечерних новостях. Евфрат не является символическим препятствием. Это высыхающая река, задокументированная спутниками. Путь не подготавливается метафорически. Он дорога с асфальтом и сталью.\u003c/p\u003e\n\u003cp\u003eПророческие часы не выбивают в направлении этих событий. Это уже достигло их. Вопрос больше не \"будут ли эти пророчества выполнены?\" но \"сколько времени остается до они достигают их кульминации?\"\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнать-больше\"\u003eУзнать больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eСвидетельство ближайшего смертельного опыта Говарда Питтмана — предупреждение о конце времени, которое Бог ему дал\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Раскрытые позорные тайны иезуитов\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eМедицид и Фармакея — Колдовство современной медицины\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто может быть в подвале Ватикана может вас шокировать!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV на YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-во-время-чтения\"\u003eСлушайте во время чтения\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы этой статьи:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/285-Lockstep_With_The_Beast.mp4\"\u003eLockstep With The Beast\u003c/a\u003e — глобальная мощь движение в концерте\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/287-The_Beast_Is_Here.mp4\"\u003eThe Beast Is Here\u003c/a\u003e — инфраструктура системы зверя\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"узнать-подробнее\"\u003eУзнать подробнее\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/great-reset-fourth-industrial-revolution/?lang=ru\"\u003eThe Great Reset: The Fourth Industrial Revolution\u003c/a\u003e — глобальное переструктурирование, которое устанавливает стадион для пророческого полнения\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/social-credit-western-world/?lang=ru\"\u003eSocial Credit in the Western World\u003c/a\u003e — как модель контроля Китая принимается глобально\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eКороли востока восходят. Река высыхает. Дорога строится. Альянсы образуют. То, что John видел на острове Patmos две тысячи лет назад, разворачивается на страницах газет сегодня. Китай не знает, что он выполняет пророчество. Нации BRICS не знают, что они собирают коалицию, описанную в Откровении. Инженеры, строящие пояс и дорогу, не знают, что они подготавливают путь, описанный в главе 16. Но Тот, кто продиктовал пророчество John знает. Он видит формирование армий. Он видит высыхание реки. Он видит дорогу, построенную. И Он уже написал финальную главу — не в коде, но в ясном языке: \"Сии вступят в брань с Агнцем, и Агнец победит их, ибо Он есть Господь господствующих и Царь царствующих\" (Откровение 17:14).\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"b:[[\"$\",\"div\",null,{\"className\":\"lg:flex lg:gap-10\",\"children\":[[\"$\",\"article\",null,{\"className\":\"flex-1 min-w-0 max-w-3xl\",\"children\":[[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"div\",null,{\"className\":\"flex gap-2 mb-3 flex-wrap\",\"children\":[[\"$\",\"a\",null,{\"href\":\"/ru/category/prophecy/\",\"className\":\"category-badge\",\"children\":\"prophecy\"}],false]}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-3\",\"style\":{\"fontFamily\":\"'Orbitron', sans-serif\",\"color\":\"var(--text-heading)\"},\"children\":\"Китай и короли востока: библейское пророчество разворачивается\"}],[\"$\",\"p\",null,{\"style\":{\"color\":\"var(--text-secondary)\",\"fontSize\":\"1.05rem\",\"lineHeight\":1.7},\"children\":\"Пророчество Откровения 'королей востока' и возвышение Китая как сверхдержавы. Высыхание Евфрата и собрание восточных армий указывают на события, теперь разворачивающиеся на мировой сцене.\"}],[\"$\",\"div\",null,{\"className\":\"flex gap-4 mt-3 text-sm\",\"style\":{\"color\":\"var(--text-muted)\"},\"children\":[[\"$\",\"time\",null,{\"dateTime\":\"2025-01-15T10:00:00Z\",\"children\":\"15 января 2025 г.\"}],[\"$\",\"span\",null,{\"children\":\"zzzdaily-team\"}]]}],[\"$\",\"div\",null,{\"className\":\"flex flex-wrap gap-1 mt-3\",\"children\":[[\"$\",\"a\",\"china\",{\"href\":\"/ru/tag/china/\",\"className\":\"tag-pill\",\"children\":[\"
