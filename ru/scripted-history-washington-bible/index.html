e — Псалом 127:1\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eПсалом 127 предупреждает, что если Господь не создаст дом, строители работают напрасно. Соединённые Штаты Америки были созданы не Господом — они были созданы масонами, используя масонские ритуалы, масонскую символику и масонскую Библию. Основание Америки не является христианским; оно является масонским. И позади масонского основания лежит иезуитская архитектура, которая спроектировала всю систему.\u003c/p\u003e\n\u003cp\u003eИнаугурация Джорджа Вашингтона 30 апреля 1789 года была не демократической церемонией — она была масонским освящением. Библия, на которой Вашингтон клялся, не была семейной или церковной Библией; это была Библия масонской Ложи Св. Иоанна №1 в Нью-Йорке. Эта единственная деталь, скрывающаяся на виду более двух столетий, раскрывает истинную природу американского основания: масонский ритуал, написанный от начала до конца, предназначенный для освящения новой нации не Богу, но Великому Архитектору Вселенной — масонскому божеству, который не является Богом Библии.\u003c/p\u003e\n\u003cp\u003eИезуиты, контролировавшие европейское масонство через баварское просветительство и шотландский обряд, спроектировали американскую систему как инструмент для своей глобальной повестки дня. Наполеон предупреждал: \u003cem\u003e\"Иезуиты — это военная организация, а не религиозный орден... целью является власть.\"\u003c/em\u003e Тамбурини управлял \"всем миром\" из своей комнаты. Американский \"эксперимент демократии\" был не экспериментом — это было развёртывание, и Библия Вашингтона было его освящением.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/09-Satans_Disguise.mp4\"\u003eSatan's Disguise\u003c/a\u003e раскрывает, что величайший обман — это обман, одетый в символы святости. И \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eThe Deceivers Lies\u003c/a\u003e предупреждает, что ложь обманщика вплетена в самое основание наций.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"библия-вашингтона\"\u003eБиблия Вашингтона\u003c/h2\u003e\n\u003ch3 id=\"масонская-присяга\"\u003eМасонская присяга\u003c/h3\u003e\n\u003cp\u003e30 апреля 1789 года Джордж Вашингтон стоял на балконе Федерального здания в Нью-Йорке, чтобы принять присягу в качестве первого Президента Соединённых Штатов. Библия, на которой он положил свою руку, была выбрана не случайно — это была алтарная Библия Ложи Св. Иоанна №1, Древние йоркские масоны, одна из самых древних масонских лож в Америке.\u003c/p\u003e\n\u003cp\u003eЭтот факт не оспаривается основными историками — он просто никогда не обсуждается в его полном значении. Самая важная присяга в американской истории — присяга, которая установила прецедент для каждой последующей президентской инаугурации — была дана на масонской Библии. Церемония была посещена масонскими официалами. Библия была открыта на определённой странице (Бытие 49:13, \"Завулон будет жить при гавани морской\"), и после присяги Вашингтон, как сообщается, поцеловал Библию в соответствии с масонским ритуалом.\u003c/p\u003e\n\u003cp\u003eБиблия Вашингтона использовалась в последующих инаугурациях — Уорреном Г. Хардингом (1921), Дуайтом Д. Эйзенхауэром (1953), Джимми Картером (1977) и Джорджем Х.В. Бушем (1989) — все они имели масонские связи. Библия рассматривается как священное сокровище американской демократии, но на самом деле это священное сокровище американского масонства — и это различие имеет огромное значение.\u003c/p\u003e\n\u003ch3 id=\"масонский-бог\"\u003eМасонский Бог\u003c/h3\u003e\n\u003cp\u003eМасонство относится к Богу как к \"Великому Архитектору Вселенной\" (GAOTU) — намеренно размытому титулу, предназначенному для охвата всех религиозных традиций. Масоны обязаны верить в \"Высшее Существо\", но не обязаны отождествлять это существо с Богом какой-либо конкретной религии. Это означает, что масонское божество, по дизайну, не является Богом Библии — это универсалистская концепция, совместимая с христианством, исламом, индуизмом и даже люциферианством.\u003c/p\u003e\n\u003cp\u003eАльберт Пайк, Великий Командор Шотландского обряда (Южной юрисдикции) и самый влиятельный масонский философ 19 века, написал в \u003cem\u003eMorals and Dogma\u003c/em\u003e: \"Люцифер, Светоноситель! Странное и таинственное имя, чтобы дать Духу Тьмы! Люцифер, Сын Утра! Это ли он, который несёт свет... Не сомневайся!\"\u003c/p\u003e\n\u003cp\u003eКогда Вашингтон клялся на масонской Библии, он клялся не Богу Авраама, Исаака и Иакова. Он клялся Великому Архитектору — божеству, личность которого на высших уровнях масонского посвящения раскрывается как Люцифер.\u003c/p\u003e\n\u003ch2 id=\"масонские-отцы-основатели\"\u003eМасонские Отцы-основатели\u003c/h2\u003e\n\u003ch3 id=\"членство-в-ложе\"\u003eЧленство в Ложе\u003c/h3\u003e\n\u003cp\u003eПерекрытие между американскими Отцами-основателями и масонством почти полное:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eДжордж Вашингтон\u003c/strong\u003e — Мастер-масон, Почтенный мастер Александровской Ложи №22\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eБенджамин Франклин\u003c/strong\u003e — Великий мастер Великой ложи Пенсильвании\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДжон Хэнкок\u003c/strong\u003e — Член Ложи Св. Андрея, Бостон\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eПол Ревир\u003c/strong\u003e — Великий мастер Великой ложи Массачусетса\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eДжон Пол Джонс\u003c/strong\u003e — Член Ложи Св. Бернара, Нант, Франция\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eМаркиз де Лафайет\u003c/strong\u003e — Член нескольких французских и американских лож\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eАлександр Гамильтон\u003c/strong\u003e — Связь с масонскими ложами в Нью-Йорке\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eПо крайней мере 13 из 39 подписантов Конституции были подтверждёнными масонами, и многие другие предположительно были членами. Конституционный конвент 1787 года был, в многих отношениях, масонским конвентом — посещённым братьями по ложе, которые разделяли клятвы, ритуалы и повинности, которые превосходили их общественные политические различия.\u003c/p\u003e\n\u003ch3 id=\"масонский-дизайн-вашингтона-округ-колумбия\"\u003eМасонский дизайн Вашингтона, округ Колумбия\u003c/h3\u003e\n\u003cp\u003eСтолица Соединённых Штатов была разработана в соответствии с масонскими принципами французским инженером Пьером Шарлем Л'Энфаном с глубокими масонскими связями. Планировка города включает:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eПентаграмма\u003c/strong\u003e — Если смотреть сверху, улицы Вашингтона, округ Колумбия, образуют пентаграмму (пятиконечную звезду), центрированную на Белом доме. Пентаграмма — один из самых важных символов как в масонской, так и в оккультной традиции.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКвадрат и компас\u003c/strong\u003e — Расположение Капитолия, Белого дома и Мемориала Джефферсона образует масонский квадрат и компас, если смотреть сверху.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eОбелиск\u003c/strong\u003e — Монумент Вашингтона, обелиск высотой в 555 футов, является самым выдающимся фаллическим символом в мире. Обелиск — это древний египетский символ, связанный с богом солнца Ра (или в эзотерической традиции — Люцифером). Его размещение в центре столицы нации не является случайным.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСова\u003c/strong\u003e — Видна в планировке улиц вокруг здания Капитолия, сова — символ, связанный с Минервой (мудростью) в римской традиции и с Молохом в библейской традиции — тем же Молохом, чей истукан сжигается в Богемском гроте.\u003c/p\u003e\n\u003ch3 id=\"ритуалы-укладки-краеугольного-камня\"\u003eРитуалы укладки краеугольного камня\u003c/h3\u003e\n\u003cp\u003eКраеугольный камень Капитолия Соединённых Штатов был заложен 18 сентября 1793 года в полной масонской церемонии, возглавляемой Джорджем Вашингтоном в его качестве Великого мастера. Вашингтон носил свой масонский фартук (подарок от Маркизы де Лафайет), и церемония включала традиционные масонские элементы: применение кукурузы, вина и масла на краеугольный камень, использование масонских инструментов (квадрат, уровень, отвес) и масонские молитвы.\u003c/p\u003e\n\u003cp\u003eЭтот ритуал был не просто символическим — это было освящение. В масонской традиции укладка краеугольного камня с масонским ритуалом освящает здание (и, расширительно, учреждение, которое оно размещает) Великому Архитектору. Капитолий Соединённых Штатов — средоточие американского правительства — буквально был освящён масонскому божеству через ритуал, выполненный первым Президентом в его качестве масонского Великого мастера.\u003c/p\u003e\n\u003ch2 id=\"конституция-как-масонский-документ\"\u003eКонституция как масонский документ\u003c/h2\u003e\n\u003ch3 id=\"конституционный-дизайн\"\u003eКонституционный дизайн\u003c/h3\u003e\n\u003cp\u003eКонституция Соединённых Штатов, прославляемая как основание американской свободы, была спроектирована масонами в соответствии с масонскими принципами:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eРазделение властей\u003c/strong\u003e — Разделение правительства на три ветви (исполнительная, законодательная, судебная) зеркалит масонскую триаду Мудрости, Силы и Красоты — три столпа, которые поддерживают масонскую ложу.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСистема сдержек и противовесов\u003c/strong\u003e — Система сдержек и противовесов, которая предотвращает любой одной ветви от осуществления абсолютной власти, отражает масонский принцип равновесия — баланс противостоящих сил, которые масонство учит, является секретом вселенной.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eБилль о правах\u003c/strong\u003e — Первые десять поправок, которые гарантируют индивидуальные свободы, отражают масонские ценности личной свободы и религиозной терпимости. Но эти свободы даны документом — что означает, что они могут быть отозваны документом. Масонская Конституция дарует свободы одной рукой и оставляет власть их отобрать другой рукой.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/145-Constitution_Constitutor_Trap.mp4\"\u003eConstitution Constitutor Trap\u003c/a\u003e раскрывает, как правовая структура Конституции была разработана, чтобы казаться защищающей индивидуальную свободу, а на самом деле создавать систему контроля, и \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e документирует секретные общества связей, которые сформировали документ.\u003c/p\u003e\n\u003ch2 id=\"иезуитская-рука\"\u003eИезуитская рука\u003c/h2\u003e\n\u003ch3 id=\"масонство-как-иезуитский-инструмент\"\u003eМасонство как иезуитский инструмент\u003c/h3\u003e\n\u003cp\u003eОтношения между масонством и иезуитским орденом сложные, но в конечном итоге иерархические: иезуиты контролируют масонство на его высших уровнях.\u003c/p\u003e\n\u003cp\u003eБаварское просветительство, основанное Адамом Вейсгауптом 1 мая 1776 года (в тот же год, что и американская Декларация независимости — совпадение?), было явно спроектировано для проникновения и контроля масонства. Вейсгаупт был бывшим иезуитом, который использовал иезуитские организационные методы для создания ордена внутри ордена: Просветительство работало внутри масонской системы лож, управляя ею изнутри, в то время как рядовые масоны остаались неосведомлены о паразитической организации, которая прикрепилась к их братству.\u003c/p\u003e\n\u003cp\u003eШотландский обряд масонства, содержащий 33 степени масонского посвящения и являющийся самым мощным масонским органом в мире, был реорганизован в ранних 19 веке под влиянием иезуитских связанных оперативников. Философская система Шотландского обряда, разработанная Альбертом Пайком, сильно заимствует из каббалистических, герметических и розенкрейцеровских традиций — всё из которых культивировалось и сохранялось иезуитским орденом.\u003c/p\u003e\n\u003cp\u003eАмериканское основание было, таким образом, иезуитской операцией, выполненной через масонские инструменты и освящённой масонской Библией. Нация, которая заявляет о себе как \"под Богом\", на самом деле находится под Великим Архитектором — и Великий Архитектор, как Пайк раскрыл, является Люцифером.\u003c/p\u003e\n\u003cp\u003eХовард Питтман был показан во время своего опыта при близкой смерти, что демоническая иерархия действует через учреждения, которым человечество доверяет — правительства, церкви и системы, которые они создают. Американская система, построенная на масонских фундаментах и освящённая масонскому божеству, является одним таким учреждением. Откровение Питтмана, что \"вы называете Меня Господом, но вы никогда не сделали Меня Господом\", применяется к нации, которая заявляет о себе как \"под Богом\", в то время как поклоняется на алтаре масонского универсализма. Смотрите: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля дальнейшей документации смотрите \u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e и \u003ca href=\"https://agent131711.substack.com\"\u003eAgent131711's Substack\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eGreat Mountain Ministry on YouTube\u003c/a\u003e\u003c/li\u003e\n
