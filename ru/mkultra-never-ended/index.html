го мира — это не совершенно посредством грубой силы. Это совершено посредством манипуляции восприятия — изменение того, что люди верят они видят, знают и понимают. От первого обольщения змея в Эдене противник специализировался в манипуляции ума: предоставление лжи как истины, рабства как свободы и смерти как просвещения. Методы эволюционировали от шепчущейся сортировки к индустриальным программам психологической манипуляции, но объект никогда не изменялся: завоевание человеческого сознания.\u003c/p\u003e\n\u003cp\u003eMKUltra — задокументированная программа контроля над умом ЦРУ — представляет современную институционализацию этой древней амбиции. Это не было отклонение. Это был логический продукт структуры силы, которая видит человеческий ум не как священный, но как территория для завоевания, не как образ Божий, но как систему для программирования.\u003c/p\u003e\n\u003cp\u003eКак альбом Confliction трек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/33-The_Fire_in_the_Cave.mp4\"\u003eThe Fire in the Cave\u003c/a\u003e вызывает, тьма противник культивирует не просто физический, но психический — манипуляция восприятия настолько завершённая, что плен не знает они плен, программируемый не знает они программируемы и обольщённый верит они просвещены.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"mkultra-задокументированный-реестр\"\u003eMKUltra: задокументированный реестр\u003c/h2\u003e\n\u003cp\u003eПроект MKUltra был официально установлен в 1953 году директором ЦРУ Allen Dulles, хотя его корни расширяются к \"Операции Paperclip\" — программе после-Второй мировой войны, которая принесла более 1600 нацистских учёных, включая исследователей контроля над умом, к Соединённым Штатам. Программа была управляемы доктором Sidney Gottlieb и работала посредством Управления научной разведки ЦРУ.\u003c/p\u003e\n\u003cp\u003eMKUltra охватила 149 задокументированных подпроектов через 80 учреждений, включая университеты (Harvard, Stanford, Columbia, McGill), больницы, тюрьмы, фармацевтические компании и фронт организации. Заявленная цель программы была развитие методов для допрашивания, модификации поведения и психологической войны. Её действительный объём был далеко более широкий: систематическое исследование каждого метода человеческого контроля над умом, которое наука могла разработать.\u003c/p\u003e\n\u003cp\u003eЗадокументированные методы MKUltra включили:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eВведение LSD и психоактивных наркотиков.\u003c/strong\u003e Субъекты были даны LSD, мескалин, барбитураты, амфетамины и другие наркотики — часто без их знания или согласия. ЦРУ закупила весь мировой поставка LSD в начале 1950-х. \"Операция Midnight Climax\" установила финансируемые ЦРУ притоны в Сан-Франциско и Нью-Йорке, где неведущие субъекты были дозированы с LSD и наблюдались через одностороннее зеркала.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСенсорная депривация и изоляция.\u003c/strong\u003e Доктор Donald Ewen Cameron в Аллане меморивскому институте McGill University провела эксперименты, в которых пациенты были размещены в сенсорной депривации в течение недель, подчинены продленному сну (наркотик-вызванный комы длящихся месяцы) и принужденный слушать повторяющиеся аудиосообщения на 500000 повторений. Cameron назвал это \"психическим драйвом\" — стирание существующей личности и его замещение программированным поведением.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭлектрошок и травма-базированное кондиционирование.\u003c/strong\u003e Субъекты были введены массивные электрошоковые обработки — далеко за пределами терапевтических уровней — для вызова амнезии и психологического разделения. Травма произведла психологическое состояние, в котором субъект был восприимчив к переналадке. Пациенты Cameron потерпели постоянное повреждение мозга, потерю памяти и психологическое разрушение.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eГипноз и гипнотическое программирование.\u003c/strong\u003e MKUltra инвестировала значительно в исследование гипноза, исследуя создание \"кандидата Manchurian\" — люди программируемые, которые могли быть даны гипнотические инструкции, проводить их и иметь никакую сознательную память совершения так. Рассекреченные документы подтверждают, что ЦРУ достигла значительные результаты в гипнотическом программировании, включая способность создания дополнительных личностей, которые могли быть запущены определёнными стимула.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eДетское экспериментирование.\u003c/strong\u003e Самые беспокойные подпроекты MKUltra включили дети. Канадские выжившие Cameron экспериментов Montreal включили несовершеннолетних. Задокументированные программы в школах мальчиков и orphanages использовали детей как тестовые субъекты. Полный объём детского экспериментирования в MKUltra остаётся неизвестный, потому что директор ЦРУ Richard Helms приказал разрушение всех MKUltra файлов в 1973.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"прикрытие-и-история-прикрытия\"\u003eПрикрытие и история прикрытия\u003c/h2\u003e\n\u003cp\u003eВ 1973, следуя скандалу Watergate и более широкого политического кризиса угрожающего сообществу разведки, директор ЦРУ Richard Helms приказал разрушение всех записей MKUltra. Приказ был в значительной мере успешный — приблизительно 20000 документов выжили только потому, что они были неправильно подано в финансовых записях ЦРУ и избежали приказа разрушения.\u003c/p\u003e\n\u003cp\u003eЭти выжившие документы стали основой для слушаний 1977 года Сената, возглавляемые Сенатор Frank Church (Комитет Church) и последующие расследования Сенатор Ted Kennedy подкомитета. Слушания произвели потрясающее показание и общественное возмущение — но расследование было фундаментально ограничено разрушением доказательства. Что было раскрыто было разрушительным. Что был разрушен может был значительно хуже.\u003c/p\u003e\n\u003cp\u003eОфициальный нарратив, принятый по основным средствам массовой информации и государственных учреждений, является, что MKUltra заканчивался в 1973. Программа была разоблачена, общественность была ужасна, реформы были внедрены и ЦРУ выучила её урок. Этот нарратив удобен. Это также явно ложно.\u003c/p\u003e\n\u003cp\u003eВыжившие документы раскрывают, что MKUltra достигла значительные результаты в методах контроля над умом. ЦРУ инвестировала более $25 миллионов (эквивалент более $200 миллионов сегодня) в течение двух десятилетий исследования. Учреждения разведки не отпускают успешные программы. Они классифицируют их более глубоко, передают их различным институциональным домам и продолжают их под различными названиями с улучшенной операционной безопасностью.\u003c/p\u003e\n\u003cp\u003eДоказательство, что исследование контроля над умом продолжалось после 1973 включает:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eИнституциональная непрерывность.\u003c/strong\u003e Персонал, подрядчики, академические учреждения и исследовательские программы, которые составили MKUltra, не исчезли в 1973. Они продолжали их работу под различными программными названиями, различными потоками финансирования и более глубокими уровнями классификации. Люди, кто провела исследование MKUltra, продолжали их карьеры в академии, частном сектора и сообществе разведки.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eТехнологическое продвижение.\u003c/strong\u003e Методы доступные для контроля над умом расширили огромно с 1973. Неурология, психофармакология, электромагнитная стимуляция, optogenetics, AI-управляемая поведенческая модификация и манипуляция социальных медиа предоставляют способности, которая MKUltra исследователи могли только мечтать. Идея, что сообщество разведки разработал эти способности и затем выбрал не применять их к целям контроля над умом это преследовало в течение двадцати лет отказывает институциональной логике.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЗадокументированные программы-преемника.\u003c/strong\u003e MKSEARCH, MKNAOMI, Проект OFTEN и другие программы управляемые contemporaneously с или преуспели MKUltra. Глубокое государство постоянное правительство не отменяет программы, которые производят результаты. Это переименует их, переклассифицирует их и продолжит их.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"проект-monarch-система-программирования-на-основе-травмы\"\u003eПроект Monarch: Система программирования на основе травмы\u003c/h2\u003e\n\u003cp\u003eПроект Monarch — названный после Бабочки Монарх, ссылка к многопоколенческой природе программирования — описана выжившими и исследователями как подпрограмма MKUltra, которая разработала контроль над умом на основе травмы к его самому крайнему применению: систематическое создание люди с множественными диссоциированными личностными состояниями, каждый программируемый для определённых функций.\u003c/p\u003e\n\u003cp\u003eПрограммирование на основе травмы эксплуатирует естественный ответ мозга к экстремальной травме: диссоциация. Когда человек опыты травма за пределами их психологической способности процесса, ум создаёт диссоциативный барьер — амнестический стена, которая отделяет травматический опыт от сознательного осведомления. Это задокументированное неврологическое явление, наблюдаемое в жертвах тяжелого злоупотребления и классифицированное в DSM как расстройство диссоциативной идентичности (DID).\u003c/p\u003e\n\u003cp\u003eПрограммирование Monarch предполагается систематизировать этот процесс: подчинение детей контролируемо, эскалирующей травме для намеренного наведения диссоциации, затем доступ к диссоциированным состояниям для программирования определённых поведений, умений и ответов. Результатом является человек с множественными личностными состояниями, каждый содержащий различное программирование, различные умения и различные памяти — всё контролируемое обработчиками, которые используют определённые триггеры (слова, символы, звуки) для доступа к желаемому личностному состоянию.\u003c/p\u003e\n\u003cp\u003eДоказательство для Проекта Monarch в первую очередь показательное — счета выживших, которые описывают их опыты в последовательном и определённом деталях. Критики отвергают эти счета как fabricated или как симптомы то же самое психическое болезнь они описывают. Сторонники отмечают последовательность деталей через выживших, которые нет контакта друг с другом, специфичность протоколов программирования описанных и задокументированную готовность ЦРУ для проведения в точности этого типа экспериментирования под MKUltra.\u003c/p\u003e\n\u003cp\u003eНезависимо от того, существует ли определённая программа названная \"Monarch\" под тем именем, методы описанные — травма-базированная диссоциация, создание дополнительной личности, программированное поведение, запущенное — хорошо-задокументированы в MKUltra реестр и последовательны с способностями, которые десятилетия ума контроля исследование ожидали бы производить.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"современная-эволюция-из-химической-к-цифровой\"\u003eСовременная эволюция: из химической к цифровой\u003c/h2\u003e\n\u003cp\u003eПринципы MKUltra не были отпущены. Они были цифризованы. Методы, которые требовали индивидуальное введение — наркотики, электрошок, гипноз, сенсорная депривация — были заменены методами, которые работают в масштабе:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eСоциальные медиа как поведенческое кондиционирование.\u003c/strong\u003e Бесконечный прокрутка, переменный график усиления (случайные награды, которые максимизируют ответ дофамина), система уведомления, алгоритмический курирование содержания — это не случайные особенности дизайна социальных медиа. Они — инструменты поведенческого инженерства, разработанные психологами и нейробиологами, которые обусловливают поведение пользователя через те же принципы операционного кондиционирования, которые исследователи MKUltra изучили.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eКонтроль алгоритмического нарратива.\u003c/strong\u003e MKUltra стремилась контролировать то, что люди мыслили. Алгоритмы социальных медиа контролируют, что популяции мыслят — определяя, какую информацию они встречают. Алгоритм не нуждается поместить наркотики в вашу воду. Это помещает содержание в вашу подачу. Эффект на восприятие подобен: реальность сформирована не тем, что существует, но тем, что вам показано.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAI-управляемое психологическое профилирование.\u003c/strong\u003e Скандал Cambridge Analytica 2018 раскрыл, что данные Facebook могли использоваться для постройки психологических профилей миллионов пользователей и нацеливания их с содержанием, разработанным манипулировать их вер и поведение. Эта способность — психологическая манипуляция в масштабе через управляемое данными нацеливание — это массовое производство того, что MKUltra попыталось индивидуально. Методы — различные. Объект — идентичный.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eЭлектромагнитное и неврологическое исследование.\u003c/strong\u003e Исследовательские программы DARPA — включая интерфейсы мозг-компьютер, трансмозговая магнитная стимуляция, optogenetics и синтетическая биология — продолжают неврологическое исследование, которое MKUltra инициировал. Эти программы работают с той же комбинацией классифицированных бюджетов, ограниченного надзора и институциональной секретности, которая охарактеризовала MKUltra. Только различие — что технология — шестьдесят лет более продвинутая.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eФармацевтическое поведенческое модификация.\u003c/strong\u003e Массовое назначение психотропных наркотиков — SSRI, бензодиазепины, антипсихотики, стимуланты — к гражданским популяциям составляет химическую поведенческую модификацию в масштабе, который MKUltra исследователи никогда не достигли. Над 37 миллионами американцев берут антидепрессанты. Над 6 миллионами детей назначены стимуланты для ADHD. Фармацевтическая индустрия имеет совершённо и со прибылью то, что MKUltra попыталась тайно — массовое введение психоактивных химических веществ для изменения поведения.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"отражение-библейское-возобновленные-умы-освобождённое-сознание\"\u003eОтражение Библейское: возобновленные умы, освобождённое сознание\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"И не подстраивайтесь под мир сей, но преобразуйтесь обновлением ума вашего, чтобы вам познавать, в чём состоит добрая, угодная и совершенная воля Божия.\" — Романы 12:2\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eИнструкция Paul к Романам — это прямая контр-программа к каждой форме контроля над умом, древний и современный. Мир подстраивается — это прессует ум в его форму через образование, средства массовой информации, социальное давление и, в его самой крайней форме, через намеренную психологическую манипуляцию. Слово Божий преобразует — это возобновляет ум от внутри, восстанавливая способность для независимого мышления, которое конформизм разрушает.\u003c/p\u003e\n\u003cp\u003eВозобновленный ум — это ум, который не может быть программируемым. Не потому что это интеллектуально превосходно, но потому что это якорировано в истине, которая переходит каждый нарратив, иммунный к манипуляции, которая работает через страх, потому что это основано в любви, которая выливает страх и стойкую к конформизму, потому что это было преобразовано силой больше чем какая-либо человеческая система.\u003c/p\u003e\n\u003cp\u003eMKUltra стремилась контролировать ум через внешнюю силу. Святой Дух преобразует ум через внутреннее возобновление. Программы конкурируют за то же самое территорию — человеческое сознание — но они работают оппонентными методами. MKUltra использует травму. Дух использует истину. MKUltra создаёт диссоциацию. Дух создаёт интеграцию. MKUltra программирует послушание через страх. Дух производит послушание через любовь.\u003c/p\u003e\n\u003cp\u003eБоевые действия за ум реальны. Это задокументировано. Это идущее. И это имеет резолюция: \"Ибо не дал нам Бог духа страха, но духа силы, любви и здравомыслия\" (2 Timothy 1:7). Здравомыслие — ум, который целый, интегрированный, функционирующий, как Бог разработал — является окончательной защитой против каждой формы контроля над умом, происходит ли из ЦРУ лаборатории или алгоритма социальных медиа.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman Near-Death Experience Testimony — End Time Warning God Gave Him\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=wKNnezELbfs\"\u003eMedicide and Pharmakeia — The Sorcery of Modern Medicine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eWhat's In The Vatican Basement May Shock You!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@theylivetruth\"\u003eThey Live Truth on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/@Truthavision\"\u003eODD TV on YouTube\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"слушайте-пока-читаете\"\u003eСлушайте, пока читаете\u003c/h2\u003e\n\u003cp\u003eЭти треки из ZZZ Daily исследуют темы в этой статье:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/103-MKUltra_Never_Ended.mp4\"\u003eMKUltra Never Ended\u003c/a\u003e — Контроль над умом в современном веке\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/127-Operation_Midnight_Climax.mp4\"\u003eOperation Midnight Climax\u003c/a\u003e — Тайные операции ЦРУ разоблачены\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/115-Psychology_Industry_Hoax.mp4\"\u003ePsychology Industry Hoax\u003c/a\u003e — Оружие психологии\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"исследуйте-глубже\"\u003eИсследуйте глубже\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/deep-state-permanent-government/?lang=ru\"\u003eThe Deep State: America's Permanent Government\u003c/a\u003e — Институциональная структура, которая создала, управляемо и продолжает наследство MKUltra\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/hollywood-occult-machine/?lang=ru\"\u003eThe Hollywood Occult Machine\u003c/a\u003e — Задокументированная связь индустрии развлечения к операциям разведки и программированию контроля над умом\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/psychology-industry-manufacturing-illness/?lang=ru\"\u003eThe Psychology Industry: Manufacturing Illness\u003c/a\u003e — Как психическое здоровье учреждение, которое вышло из исследования MKUltra, теперь администрирует химическую поведенческую модификацию в масштабе популяции\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eЦРУ потратила десятилетия и сотни миллионов долларов пытаясь контролировать человеческий ум. Змей совершил это в Эдене с единственным предложением: \"Вы будете как боги.\" Самая мощная техника контроля над умом когда-либо развёртывается не наркотик, не электрод, не алгоритм. Это ложь — ложь, которая обещает освобождение, пока поставляя рабство, что обещает знание, пока поставляя слепоту, что обещает божественность, пока поставляя смерть. MKUltra была индустриализация техники змея: систематическое применение обмана и травмы для завоевания человеческого сознания. Но ум, который был возобновлён Словом Божьим, не может завоеваться любой программой — потому что истина, которая освобождает, больше чем ложь, которая порабощает и Дух, который возобновляет, более мощный, чем система, которая программирует. \"Итак, если Сын освободит вас, то истинно свободны будете вы\" (John 8:32). Это обещание не имеет дату истечения. Эта свобода не имеет кода отмены. Эта истина не имеет контр-программу.\u003c/em\u003e\u003c
