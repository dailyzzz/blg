u003c/blockquote\u003e\n\u003cp\u003eАпостол Павел предупредил нас, что величайшее оружие сатаны — это маскировка. Противник не появляется в рогах и пламени — он появляется как герой, освободитель, исследователь. Ни одна фигура в западной истории не лучше воплощает этот принцип, чем Христофор Колумб, человек, прославленный как величайший исследователь в истории человечества, служащий в действительности орудием разрушения, порабощения и сатанинского завоевания.\u003c/p\u003e\n\u003cp\u003eКатолическая церковь канонизировала Колумба как \"Слугу Божьего\" в 1882 году, начав процесс, который однажды может сделать этого массового убийцу святым. Это не удивительно, когда вы понимаете, что церковь служила земным рычагом сатанинской структуры власти со времён её коррупции инфильтраторами веков назад. Иезуиты, основанные Игнатием Лойолой как военная организация для накопления абсолютной власти, давно контролировали аппарат повествования церкви. Наполеон предупредил: \u003cem\u003e\"Иезуиты — это военная организация, а не религиозный орден... цель — власть.\"\u003c/em\u003e Колумб был ранним прототипом иезуитского агента — военного оперативника в религиозной одежде, держащего крест в одной руке и меч в другой.\u003c/p\u003e\n\u003cp\u003eКак \u003cem\u003eThe Deceivers Lies\u003c/em\u003e делает ясным, вся структура западного героизма построена на обмане. Колумб не \"открыл\" ничего — он был отправлен в миссию силами, которые уже точно знали, что лежит через Атлантику. И трек \u003cem\u003eSatan's Hosts\u003c/em\u003e напоминает нам, что темная хозяйка действует через готовых человеческих агентов, которые обменивают свои души на мирскую власть и славу.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"человек-за-мифом\"\u003eЧеловек за мифом\u003c/h2\u003e\n\u003ch3 id=\"истинное-происхождение-колумба\"\u003eИстинное происхождение Колумба\u003c/h3\u003e\n\u003cp\u003eХристофор Колумб, преподаваемый в американских школах, — это выдумка. Реальный Кристобаль Колон (его настоящее имя) был не скромным сыном генуэзского ткача, мечтавшим о плавании на запад. Множество линий доказательств предполагают, что он был членом низшей дворянской семьи со связями в тайные сети, охватывающие Средиземноморье.\u003c/p\u003e\n\u003cp\u003eИсследование историка Мануэля Розы, опубликованное в \u003cem\u003eColumbus: The Untold Story\u003c/em\u003e, представляет доказательства того, что Колумб был португальским дворянином — возможно, сыном польского короля — который был обучен навигации и картографии лучшими умами португальского двора. Его брак с Филипой Мониз Перестрелло связал его напрямую с Рыцарями Христа, португальской организацией-преемником Ордена тамплиеров.\u003c/p\u003e\n\u003cp\u003eРыцари Христа были наследниками флота тамплиеров, сокровища тамплиеров и, что наиболее важно, карт тамплиеров — карт, которые показали земли через Атлантику, которые посещались кораблями тамплиеров задолго до 1492 года. Колумб не плыл в неизвестность. Он плыл с картами, с знанием и с миссией, которая не имела ничего общего с \"открытием\" и всё с завоеванием.\u003c/p\u003e\n\u003ch3 id=\"связь-тамплиеров-с-ватиканом\"\u003eСвязь тамплиеров с Ватиканом\u003c/h3\u003e\n\u003cp\u003eКрасные кресты на парусах кораблей Колумба были не универсальными христианскими символами — они были специфичным крестом пате Рыцарей тамплиеров и их организации-преемнице, Рыцарях Христа. Это не оспаривается историками; это просто никогда не обсуждается. Паруса Нины, Пинты и Санта-Марии несли символ тайной военной организации, которая была официально подавлена папой Климентом V в 1312 году, но просто переорганизовалась под новыми именами.\u003c/p\u003e\n\u003cp\u003eОтношения Ватикана с организациями-наследниками тамплиеров были сложными, но стратегически целенаправленными. Хотя церковь официально уничтожила тамплиеров (под давлением короля Филиппа IV Франции, который был должен тамплиерам огромные суммы), знание и ресурсы ордена были слишком ценны, чтобы потеряться. Рыцари Христа в Португалии, Рыцари Мальты и позже иезуитский орден все наследовали разные аспекты наследия тамплиеров — и все служили главной цели Ватикана: глобальному господству.\u003c/p\u003e\n\u003cp\u003eПутешествие Колумба было финансировано испанской короной, но истинная поддержка исходила от сети финансистов и членов тайного общества, которые точно понимали ставки. \"Новый мир\" был не новым вообще — он был известным количеством, и его завоевание было спланировано десятилетиями, если не веками.\u003c/p\u003e\n\u003ch2 id=\"зверства-которые-не-учат\"\u003eЗверства, которые не учат\u003c/h2\u003e\n\u003ch3 id=\"порабощение-таино\"\u003eПорабощение таино\u003c/h3\u003e\n\u003cp\u003eЖурналы Колумба и рассказы его современников рисуют картину чудовищной жестокости, которая делает его продолжающееся празднование как героя актом коллективного безумия — или коллективного контроля сознания.\u003c/p\u003e\n\u003cp\u003eПрибыв в Карибское море, Колумб сразу заметил мягкость, щедрость и отсутствие оружия у народа таино. В своём дневнике он писал: \"Они станут хорошими слугами... С пятьюдесятью людьми мы можем подчинить их всех и заставить их делать то, что мы хотим.\" Это была не наблюдение исследователя; это была оценка военного оперативника, рассчитывающего стоимость завоевания.\u003c/p\u003e\n\u003cp\u003eВ течение двух лет после прибытия Колумба система энкомьенда была установлена — система принудительного труда, которая во всём, кроме названия, была рабством. Мужчины таино работали до смерти в золотых шахтах. Женщины были распределены между испанскими колонистами. Дети были отняты из семей. Те, кто сопротивлялся, были пытаны, калечены или убиты в качестве примеров.\u003c/p\u003e\n\u003cp\u003eБартоломе де лас Касас, современный священник, ставший свидетелем зверств, написал: \"Такие бесчеловечности и варварства были совершены при мне, что ни один век не может сравниться. Мои глаза видели эти акты, настолько чуждые человеческой природе, что я трепещу, когда пишу.\"\u003c/p\u003e\n\u003ch3 id=\"геноцид-в-цифрах\"\u003eГеноцид в цифрах\u003c/h3\u003e\n\u003cp\u003eКогда Колумб прибыл в 1492 году, население таино Гаити оценивалось от 250 000 до нескольких миллионов (оценки широко варьируются). К 1514 году испанская перепись записала только 32 000 таино. К 1542 году осталось едва 200. Это не колонизация; это истребление — проведённое под знаменем Христа и властью папы.\u003c/p\u003e\n\u003cp\u003eКолумб лично контролировал систему налогов, которая требовала от каждого таино старше 14 лет доставить полный ястребиный колокольчик золотой пыли каждые три месяца. Те, кто не выполнили, имели ампутированные руки и оставлены истекать кровью. Брат Колумба Бартоломе, который служил губернатором в его отсутствие, был одинаково жестоким. Вся операция была машиной извлечения и смерти, санкционированной папскими буллами, предоставившими Испании господство над любыми землями, которые уже не принадлежали христианскому правителю.\u003c/p\u003e\n\u003cp\u003eПапская булла \u003cem\u003eInter Caetera\u003c/em\u003e, выданная папой Александром VI в 1493 году, предоставила Испании все земли западнее линии, проведённой через Атлантику. Этот единственный документ — выданный папой, известным своей коррупцией, убийством и предполагаемыми сатанинскими ритуалами — стал юридической основой для веков геноцида, рабства и эксплуатации по всей Америке.\u003c/p\u003e\n\u003ch3 id=\"секс-торговля\"\u003eСекс-торговля\u003c/h3\u003e\n\u003cp\u003eСреди наименее обсуждаемых аспектов наследия Колумба — систематическое сексуальное насилие, которое сопровождало завоевание. Сам Колумб писал в письме другу: \"Сто кастиллано легко получены за женщину, как за ферму, и это очень обще, и есть много торговцев, которые ходят в поиске девочек; те от девяти до десяти теперь в спросе.\"\u003c/p\u003e\n\u003cp\u003eЭто прямая цитата из человека, которого Америка чествует федеральным праздником. Колумб был не просто завоевателем; он был торговцем детьми. И система, которую он установил — в которой коренные женщины и девочки были товаром для купли, продажи и отбрасывания — продолжалась веками под надзором католической церкви.\u003c/p\u003e\n\u003ch2 id=\"миссия-тайного-общества\"\u003eМиссия тайного общества\u003c/h2\u003e\n\u003ch3 id=\"что-колумб-действительно-искал\"\u003eЧто Колумб действительно искал\u003c/h3\u003e\n\u003cp\u003eЗолото было заявленной целью, но доказательства предполагают, что Колумб искал что-то намного более ценное: остатки развитой доколумбовой цивилизации. Тамплиеры, которые почти наверняка достигли Америки до Колумба (как свидетельствует Ньюпортская башня в Род-Айленде, Рунический камень Кенсингтона в Миннесоте и символы тамплиеров, вырезанные на камне по всей Новой Англии), сообщили о существовании хитрых культур с передовыми знаниями.\u003c/p\u003e\n\u003cp\u003eПозднейшие путешествия Колумба сосредоточивались навязчиво на материке Центральной и Южной Америки — именно в регионах, где процветали наиболее развитые доколумбовы цивилизации. Он не искал торговый маршрут в Индию; он искал храмы, библиотеки и технологию цивилизации, которую сеть тамплиеров отслеживала веками.\u003c/p\u003e\n\u003cp\u003eИезуиты, которые последовали Колумбу в Америку, продолжили эту миссию. Они систематически уничтожили письменные записи цивилизаций Мезоамерики, находясь в частном копировании всего ценного для архивов Ватикана. Сжигание кодексов майя было не актом религиозного фанатизма; это была операция разведки, разработанная для обеспечения того, что знание предыдущей цивилизации будет монополизировано церковью.\u003c/p\u003e\n\u003ch3 id=\"линия-крови-колумба\"\u003eЛиния крови Колумба\u003c/h3\u003e\n\u003cp\u003eСемья Колумба поддерживала свою власть и привилегию веками после его смерти. Его потомки стали одними из самых богатых и влиятельных семей испанской империи. Герцогство Веракруа, предоставленное наследникам Колумба, сохраняется по сей день. Это не наследие скромного исследователя; это награда за успешную военную операцию.\u003c/p\u003e\n\u003cp\u003eГерб семьи Колумба, предоставленный испанской короной, содержит символы, которые исследователи связали с каббалистической и тамплиерской традициями. Якоря, острова и львы на щите соответствуют алхимическим и эзотерическим символам, которые были бы значимы для посвящённых в тайные общества, но невидимы для неосвящённой публики.\u003c/p\u003e\n\u003ch2 id=\"праздник-обмана\"\u003eПраздник обмана\u003c/h2\u003e\n\u003ch3 id=\"день-колумба-как-массовое-программирование\"\u003eДень Колумба как массовое программирование\u003c/h3\u003e\n\u003cp\u003eУстановление Дня Колумба как федерального праздника в 1937 году было кульминацией десятилетней кампании Рыцарей Колумба — католической братской организации, основанной в 1882 году, которая служит одним из важнейших инструментов влияния Ватикана в Соединённых Штатах.\u003c/p\u003e\n\u003cp\u003eРыцари Колумба лоббировали законодательные органы штатов, финансировали памятники и статуи Колумба и пропагандировали санитарную версию истории Колумба в школах по всей Америке. Их цель была не просто почтить итальяно-американское наследие (хотя это было общественным оправданием); это было закладывать мифологию Колумба настолько глубоко в американскую культуру, что её никогда нельзя было бы ставить под вопрос.\u003c/p\u003e\n\u003cp\u003eЭто стандартный метод, описанный в \u003cem\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/em\u003e: инфильтрировать хитростью, заменить истину повествованием общества и гарантировать, что любой вызов повествованию отклоняется как экстремизм или теория заговора. Иезуитская стратегия \"я поверю, что белое, которое я вижу, чёрно, если иерархическая церковь так это определяет\" не ограничена духовенством — это программирование, установленное в каждом школьнике, который учится праздновать Колумба как героя.\u003c/p\u003e\n\u003ch3 id=\"продолжающееся-скрывание\"\u003eПродолжающееся скрывание\u003c/h3\u003e\n\u003cp\u003eДаже когда общественное понимание зверств Колумба выросло, сопротивление удалению его праздника и памятников было жестким. Почему? Потому что Колумб — это не просто историческая фигура — это символ всей системы обмана, которая лежит в основе западной цивилизации. Признать, что Колумб был чудовищем, — это признать, что система, которая создала, финансировала и чествовала его, чудовищна. И эта система — ватиканская, иезуитская, сеть тайных обществ — не может позволить такого признания.\u003c/p\u003e\n\u003cp\u003eСвидетельство Хоуарда Питтмана о трёх небесах — физическом царстве, демоническом правительстве и тронном зале Бога — учит, что 95% обитателей ада служат \"я\" — ложному богу эго и амбиций. Колумб был воплощением этого принципа: человек, который служил своей амбиции, амбиции своих хозяев и амбиции сатаны, задрапированный в символы Христа. Как учил Питтман, Бог сказал ему: \"Вы зовёте меня Господом, но вы никогда не делали меня Господом.\" Колумб называл себя слугой Христа, служа Князю тьмы. Посмотрите полное свидетельство Питтмана: \u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eДля глубокого исследования сетей тайных обществ, стоящих за \"открытием\" Америки, исследуйте \u003ca href=\"https://agent131711.substack.com\"\u003eSubstack Agent131711\u003c/a\u003e, который опубликовал обширную документацию связей тамплиеров и Ватикана, которые финансировали завоевание Америки.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/125-Illuminati_Founding_Fathers.mp4\"\u003eIlluminati Founding Fathers\u003c/a\u003e дополнительно раскрывает, как миссия тайного общества, которую начал Колумб, была продолжена людьми, которые основали Соединённые Штаты.\u003c/p\u003e\n\u003ch2 id=\"узнайте-больше\"\u003eУзнайте больше\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=B29Nq9ID4uE\"\u003eЧто находится в подвале Ватикана может вас потрясти!\u003c/a\u003e\u003c/li\u003e\n\u003cli\u0
