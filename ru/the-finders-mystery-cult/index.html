о \"Искателей\" представляет одно из наиболее разрушительных пересечений деятельности культа, эксплуатации детей и государственной защиты в американской истории. То, что началось как рутинный контакт правоохранения с неопрятными детьми в парке, привело следователей в лабиринт связей разведки, международных сетей торговли и прикрытие, которое достигло высочайших уровней федерального правительства. Дело иллюстрирует с жестокой ясностью методы, которыми власти и силы Эфесян 6:12 работают через человеческие учреждения, чтобы эксплуатировать наиболее уязвимых.\u003c/p\u003e\n\u003cp\u003eГовард Питтман был показан, что демоны работают с ужасающей организационной точностью. Каждому демону назначена задача, и каждая задача служит более крупной стратегической цели. Культ Искателей работал именно с этой точностью — видимо хаотичная группа, которая была на самом деле тесно организованной операцией, связанной с сетями разведки, охватывающими несколько стран. Откровение Питтмана о том, что 97,5% человечества ходит по широкому пути к разрушению, приобретает специфическое значение, когда мы рассматриваем, сколько детей было поглощено сетями, такими как Искатели, в то время как учреждения, призванные защищать их, смотрели в другую сторону — или активно облегчали эксплуатацию.\u003c/p\u003e\n\u003cp\u003eИезуитская модель работы через фасадные организации, поддержания строгой внутренней иерархии при представлении доброкачественного внешнего образа, находит точное выражение в Искателях. \"Catholic Confidential\" описывает, как иезуиты работают \"покрытые хитростью\", и Искатели были ничем, если не хитры — группа, которая казалась эксцентричной коммуной, функционируя как что-то намного более зловещее. Треки \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/31-Satans_Hosts.mp4\"\u003eХозяева Сатаны\u003c/a\u003e и \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/59-The_Deceivers_Lies.mp4\"\u003eЛживость Обманщиков\u003c/a\u003e раскрывают духовную архитектуру обмана, которая позволяет таким операциям.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"инцидент-в-таллахассе\"\u003eИнцидент в Таллахассе\u003c/h2\u003e\n\u003ch3 id=\"два-мужчины-и-шесть-детей\"\u003eДва мужчины и шесть детей\u003c/h3\u003e\n\u003cp\u003e4 февраля 1987 года двух хорошо одетых мужчин нашли в парке в Таллахассе, Флорида, с шестью неопрятными грязными детьми в возрасте от двух до семи лет. Дети показывали признаки пренебрежения — они были плохо одеты, голодны и казались незнакомыми с основной гигиеной. Некоторые показывали признаки возможного сексуального насилия. Мужчины, идентифицированные как Майкл Хулихан и Дуглас Аммерман, не смогли адекватно объяснить свои отношения с детьми или почему дети находились в таком состоянии.\u003c/p\u003e\n\u003cp\u003eПолиция Таллахассе взяла мужчин в исправку и начала расследование. Первоначальные запросы выявили, что мужчины были связаны с группой под названием \"Искатели\", базирующейся в Вашингтоне, округ Колумбия. Группе руководил человек по имени Марион Дэвид Петти, который имел обширные связи с сообществом разведки. Матери детей были идентифицированы как члены сообщества Искателей, но обстоятельства передачи детей Хулихану и Аммерману вызвали серьёзные опасения по поводу возможной торговли.\u003c/p\u003e\n\u003ch3 id=\"начало-расследования\"\u003eНачало расследования\u003c/h3\u003e\n\u003cp\u003eПолиция Таллахассе и служба таможни США инициировали расследование, которое быстро встретило необычное сопротивление. Агент таможни Рамон Мартинес подал подробный отчёт, документирующий выводы расследования и, более критически, препятствия, с которыми оно сталкивалось. Его отчёт, классифицированный на десятилетия, был в конечном итоге освобождён через запросы Закона о свободе информации и подтвердил то, что подозревали следователи: Искатели были связаны с Центральным управлением разведки, и расследование было остановлено на этих основаниях.\u003c/p\u003e\n\u003cp\u003eОтчёт Мартинеза описал открытие подробных инструкций по получению детей, включая нацеливание женщин в определённых местах, и документов, касающихся международных путешествий с детьми. Расследование выявило связи с имуществом в нескольких штатах и международных местах. Масштаб операции намного превышал всё, что можно было приписать простой коммуне или альтернативной группе образа жизни.\u003c/p\u003e\n\u003ch2 id=\"склад-в-вашингтоне-округ-колумбия\"\u003eСклад в Вашингтоне, округ Колумбия\u003c/h2\u003e\n\u003ch3 id=\"что-нашли-следователи\"\u003eЧто нашли следователи\u003c/h3\u003e\n\u003cp\u003eКогда следователи выполняли ордеры поиска на имущество Искателей в Вашингтоне, они обнаружили материалы, которые трансформировали расследование из потенциального дела о пренебрежении в что-то намного более разрушительное. Среди найденных предметов были:\u003c/p\u003e\n\u003cp\u003eПодробные записи международных путешествий с участием детей в несколько стран. Фотографии взрослых и детей, участвующих в том, что казалось ритуальной деятельностью, включая жертву животных. Компьютерные записи, содержащие подробные инструкции по отбору и управлению детьми. Документы, указывающие на связи со школами, центрами дневного ухода и международными организациями. Переписка, предполагающая координацию с сущностями в нескольких странах.\u003c/p\u003e\n\u003cp\u003eСклад содержал файловые шкафы, полные документов, организованных по теме, включая папки, помеченные названиями различных операций. Уровень документации был несовместим с неформальной коммуной — он был совместим с организованной операцией разведки, ведущей подробные записи своей деятельности.\u003c/p\u003e\n\u003ch3 id=\"отчёт-таможни\"\u003eОтчёт таможни\u003c/h3\u003e\n\u003cp\u003eОтчёт таможни Рамона Мартинеза, поданный 7 февраля 1987 и впоследствии классифицированный, описал то, что нашли следователи, и что произошло дальше. Согласно отчёту, расследование происходило нормально через каналы правоохранения до тех пор, пока не была идентифицирована связь с ЦРУ. В этот момент дело было передано из Службы таможни США в ФБР — и фактически прекращено.\u003c/p\u003e\n\u003cp\u003eМартинез написал, что ему сказали, что дело было \"внутренним делом ЦРУ\" и что ФБР будет рассматривать его с этого момента. \"Рассмотрение\" ФБР состояло из закрытия расследования без судебного преследования. Дети были возвращены в сообщество Искателей. Никаких обвинений не было предъявлено против взрослых членов группы. Доказательства, собранные следователями Таможни, были классифицированы и запечатаны.\u003c/p\u003e\n\u003cp\u003eПаттерн был идентичен каждому другому расследованию, которое встретило сети эксплуатации, связанные с разведкой: первоначальное открытие, быстрое эскалирование, идентификация связей разведки, передача скомпрометированному агентству и прекращение. Трек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/127-Operation_Midnight_Climax.mp4\"\u003eOperation Midnight Climax\u003c/a\u003e документирует, как ЦРУ исторически использовало человеческую эксплуатацию в качестве инструмента операции, и дело Искателей продемонстрировало, что эта методология распространялась на эксплуатацию детей.\u003c/p\u003e\n\u003ch2 id=\"марион-дэвид-петти-человек-за-кулисами\"\u003eМарион Дэвид Петти: Человек за кулисами\u003c/h2\u003e\n\u003ch3 id=\"связи-разведки\"\u003eСвязи разведки\u003c/h3\u003e\n\u003cp\u003eМарион Дэвид Петти, основатель и лидер Искателей, имел фон разведки, который тянулся на десятилетия. Его связи с ЦРУ и военной разведкой не оспаривались — даже его жена, которая работала на ЦРУ, признала связи разведки семьи. Сам Петти описал его группу в терминах, которые размывали линию между социальным экспериментом и операцией разведки.\u003c/p\u003e\n\u003cp\u003eОтец Петти имел связи разведки, и сам Петти был вовлечен с организациями, смежными разведке, начиная с 1950-х годов. Имущество Искателей включали ферму в сельской Виргинии, где члены жили в коммуне и дети воспитывались вне обычных структур. Местоположение фермы, её изоляция и её организованные мероприятия по безопасности были более совместимы с учреждением разведки, чем с коммуной хиппи.\u003c/p\u003e\n\u003cp\u003eСтиль лидерства Петти отражал иезуитскую модель управления. Он осуществлял абсолютный авторитет над сообществом Искателей, при этом поддерживая преднамеренно эксцентричный публичный облик. Членам были назначены задачи, путешествия и деятельность согласно директивам Петти. Ресурсы группы — несколько имущества в Вашингтоне и Виргинии, обширные способности международного путешествия, изощрённое оборудование связи — превышали то, что любая подлинная коммуна могла поддерживать.\u003c/p\u003e\n\u003ch3 id=\"структура-культа\"\u003eСтруктура культа\u003c/h3\u003e\n\u003cp\u003eИскатели работали как структурированная организация со ясной иерархией, назначенными ролями и философией, которая явно отвергала обычную мораль. Дети внутри группы не воспитывались своими биологическими родителями, но рассматривались как коммунальное имущество — воспитываемые в соответствии с принципами, установленными Петти. Это разделение детей от родительских связей характерно для программирования культа и совместимо с методами кондиционирования, используемыми в программах контроля над умом, связанных с разведкой.\u003c/p\u003e\n\u003cp\u003eБывшие члены описывали группу, которая контролировала каждый аспект жизни членов — их работу, их отношения, их финансы и их детей. Этот полный контроль — это отличительная черта как деструктивных культов, так и операций разведки, и в Искателях двое были неразличимы. Иезуитское требование слепого послушания, задокументированное в \"Catholic Confidential\", нашло своё светское выражение в требовании Искателей абсолютной покорности авторитету Петти.\u003c/p\u003e\n\u003ch2 id=\"рассекреченные-документы-что-знало-правительство\"\u003eРассекреченные документы: Что знало правительство\u003c/h2\u003e\n\u003ch3 id=\"выпуск-2019-года\"\u003eВыпуск 2019 года\u003c/h3\u003e\n\u003cp\u003eВ 2019 году ФБР выпустило значительный набор документов, связанных с Искателями, через Хранилище ФБР. Эти документы, всего сотни страниц, подтвердили большую часть того, что следователи и исследователи предполагали на протяжении десятилетий: что Искатели были связаны с операциями разведки, что дети внутри группы подвергались насилию, и что расследование было преднамеренно подавлено.\u003c/p\u003e\n\u003cp\u003eОсвобождённые документы включали полицейские отчёты, отчёты таможни, внутренние меморандумы ФБР и резюме следствия, которые нарисовали картину группы, работающей с защитой сообщества разведки. Фотографии, восстановленные во время поисков, показали детей в разрушительных ситуациях. Документы описали ритуалы, вовлекающие животных и детей. Переписка выявила связи с международными организациями и иностранными правительствами.\u003c/p\u003e\n\u003cp\u003eВыпуск этих документов десятилетиями после событий, которые они описывали, подтвердил паттерн, который духовно освещает свидетельство Говарда Питтмана: истина подавляется не постоянно, а стратегически, освобождается, когда больше не может угрожать оперативным сетям, которые она выявила бы. Демоны, которых видел Питтман, работают на временных шкалах, которые намного превышают человеческое восприятие — десятилетия подавления — это просто тактические задержки в войне, которая охватывает тысячелетия.\u003c/p\u003e\n\u003ch3 id=\"что-осталось-переработанным\"\u003eЧто осталось переработанным\u003c/h3\u003e\n\u003cp\u003eНесмотря на выпуск 2019 года, значительные части документов Искателей остались переработанными. Имена персонала ЦРУ, связанного с группой, специфические операционные детали и информация о международных связях были замазаны. Сами переработки рассказали историю — они определили области, которые оставались достаточно чувствительными, чтобы защитить даже десятилетия спустя после закрытия расследования.\u003c/p\u003e\n\u003cp\u003eИзбирательная природа выпуска — достаточно, чтобы подтвердить широкие контуры истории, защищая специфические личности и операции — характерна для управления документами сообщества разведки. Информация освобождается, когда она служит цели (часто для дефузировки нарастающего давления за полное раскрытие) и удерживается, когда она угрожает текущим операциям или живым оперативам. Трек \u003ca href=\"https://zzzdaily.zzzdaily.com/tracks/ru/211-Total_Information_Awareness.mp4\"\u003eTotal Information Awareness\u003c/a\u003e исследует, как информация сама по себе овладевается теми, кто контролирует её поток.\u003c/p\u003e\n\u003ch2 id=\"международное-измерение\"\u003eМеждународное измерение\u003c/h2\u003e\n\u003ch3 id=\"глобальная-сеть\"\u003eГлобальная сеть\u003c/h3\u003e\n\u003cp\u003eОперации Искателей не были ограничены Соединёнными Штатами. Документы выявили связи с операциями в нескольких странах, включая путешествие в Китай, Гонконг, Японию и различные европейские нации. Глобальный охват группы был несовместим с её публичным профилем как маленькой группы и полностью совместим с её фактической природой как операции, связанной с разведкой.\u003c/p\u003e\n\u003cp\u003eМеждународное измерение дела Искателей параллелизирует глобальный охват других сетей эксплуатации, связанных с разведкой. Та же инфраструктура, которая позволяет агентствам разведки работать через национальные границы — дипломатическое прикрытие, безопасная связь, международные финансовые сети и кооперативные отношения с иностранными службами разведки — позволяет сетям эксплуатации, которые работают рядом с ними.\u003c/p\u003e\n\u003cp\u003eГлобальное присутствие иезуитского ордена обеспечивает организационный шаблон для этих сетей. Работая в каждой стране на земле, поддерживая связь и координацию через национальные границы и осуществляя авторитет, который превосходит светское управление, иезуитский ордер продемонстрировал столетия назад, что глобальные операции могли проводиться из единого центра авторитета. Тамбурини хвастался управлением \"не только Парижа, но и Китая\" описал оперативную способность, которую современные агентства разведки репликировали — и что сети эксплуатации эксплуатировали.\u003c/p\u003e\n\u003ch3 id=\"механизм-защиты\"\u003eМеханизм защиты\u003c/h3\u003e\n\u003cp\u003eДело Искателей продемонстрировало, что защита сетей эксплуатации, связанных с разведкой, работает на международном уровне. Когда следователи в Таллахассе пытались преследовать дело, они встретили не только внутреннее препятствие, но и международные барьеры. Информация о деятельности группы за границей была классифицирована согласно положениям национальной безопасности, и кооперация с иностранным правоохранением была заблокирована вмешательством сообщества разведки.\u003c/p\u003e\n\u003cp\u003eЭтот механизм международной защиты гарантирует, что ни один национальный слой расследования полностью не может выявить глобальную сеть. Доказательства, собранные в одной стране, классифицируются в другой. Свидетели, которые пересекают границы, могут быть усмирены разными агентствами в разных юрисдикциях. Компартментализация, которая характеризует операции разведки — доступ по необходимости, классифицированные программы, межведомственные барьеры — также защищает сети эксплуатации, предотвращая любого единственного следователя или агентства от собрания полной картины.\u003c/p\u003e\n\u003ch2 id=\"дети-забытые-жертвы\"\u003eДети: забытые жертвы\u003c/h2\u003e\n\u003ch3 id=\"что-с-ними-произошло\"\u003eЧто с ними произошло\u003c/h3\u003e\n\u003cp\u003eНаиболее разрушительный аспект дела Искателей — это то, что произошло — или не произошло — после закрытия расследования. Дети, найденные в Таллахассе, были возвращены в сообщество Искателей. Никакая проверка благополучия не была предписана. Никакой текущий мониторинг не был установлен. Дети, которых следователи верили были подвергнуты насилию, были переданы обратно группе, которая их насиловала, с благословением федерального правительства.\u003c/p\u003e\n\u003cp\u003eСудьба этих детей и других, связанных с Искателями, остаётся во многом неизвестной. Некоторые бывшие члены выступили с рассказами о своём опыте, но секретность группы и отказ правительства исследовать гарантировали, что полный масштаб того, что произошло с детьми внутри Искателей, никогда не был задокументирован.\u003c/p\u003e\n\u003cp\u003eЭтот результат — возврат детей к их обидчикам с одобрением правительства — представляет самый полный возможный отказ каждого учреждения, разработанного для защиты детей. Правоохранение идентифицировало насилие. Суды имели юрисдикцию. Социальные услуги имели мандат. И каждое учреждение терпело неудачу, потому что сообщество разведки объявило вопрос своим собственным. Дети были пожертвованы на алтарь национальной безопасности — или, более точно, на алтарь сетей, которые скрываются за национальной безопасностью.\u003c/p\u003e\n\u003ch3 id=\"духовное-значение\"\u003eДуховное значение\u003c/h3\u003e\n\u003cp\u003eЖертва детей — это не просто преступление — это духовный акт. На протяжении Писания жертва детей ложным богам представляет самую экстремальную форму отступничества. Современная версия этой жертвы — проводимая не на каменных алтарях, а в складах, безопасных домах и защищённых правительством учреждениях — несёт тот же духовный вес. Каждый оскорбляемый ребёнок, каждая разрушенная невиность, каждая исковерканная жизнь представляет транзакцию в духовной экономике второго неба.\u003c/p\u003e\n\u003cp\u003eСвидетельство Говарда Питтмана ясно показывает, что духовная область записывает всё. Демоны, назначенные для операций, таких как Искатели, не просто наблюдают — они участвуют, они придают силу, и они питаются страданием, произведённым. Человеческие операторы могут не полностью понимать духовные измерения их деятельности, но демоническая иерархия, которая направляет эту деятельность, понимает совершенно. Разрушение невиности — это их валюта, и операции, такие как Искатели, — это их банки.\u003c/p\u003e\n\u003cp\u003eТрек \u003ca href=\"https://confliction.zzzdaily.com/tracks/ru/47-The_Transgression.mp4\"\u003eПреступление\u003c/a\u003e прослеживает происхождение этой духовной коррупции — первое преступление, которое ввело зло в созданный порядок и установило паттерн восстания против Бога, который каждый последующий акт зла следует. Дело Искателей — это не изолированный инцидент; это одно проявление преступления, которое разворачивалось с начала человеческой истории.\u003c/p\u003e\n\u003ch2 id=\"почему-это-важно-сейчас\"\u003eПочему это важно сейчас\u003c/h2\u003e\n\u003ch3 id=\"паттерн-продолжается\"\u003eПаттерн продолжается\u003c/h3\u003e\n\u003cp\u003eДело Искателей — это не просто историческая любопытство. Паттерны, которые оно раскрыло — сети эксплуатации, связанные с разведкой, подавление правительством расследований, ритуальное насилие над детьми, торговля детьми, защищённая классификациями национальной безопасности — продолжают работать. Дело Джеффри Эпштейна, которое появилось десятилетиями позже, демонстрировало идентичные черты: связи разведки, международный масштаб, защита оператора на протяжении десятилетий и в конечном счёте раскрытие, которое было тщательно управляемо для защиты сети, пока жертвовалось физическое лицо.\u003c/p\u003e\n\u003cp\u003eПонимание Искателей является существенным для понимания настоящего, потому что инфраструктура, которая защищала Искателей, не была демонтирована. Она эволюционировала, адаптировалась к новым технологиям и новым политическим окружающим средам, но её фундаментальная природа остаётся неизменной. Власти и силы, которые придали силу Искателям, — это те же власти и силы, которые придают силу их преемникам.\u003c/p\u003e\n\u003cp\u003eПредупреждение Джона Адамса об иезуитах — что они \"заслужили вечное осуждение на земле и в аду\" — применяется не просто к религиозному ордену, но ко всей системе контроля, которая работает через обман, эксплуатацию и коррупцию учреждений. Искатели были одним узлом в той системе. Понимание их освещает целое.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"предупреждение-1-самуила-8\"\u003eПредупреждение 1 Самуила 8\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"И сказал Господь Самуилу: послушай голоса народа во всём, что они говорят тебе; ибо они отвергли не тебя, а отвергли Меня, чтобы Я не царствовал над ними.\"\u003c/em\u003e — \u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Самуила 8:7 (KJV)\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eДревнее предупреждение 1 Самуила 8 разносится через каждый коридор правительства сегодня. Когда Израиль потребовал царя, как и другие нации, Бог предупредил их точно о том, что произойдёт — их сыновья, взятые для войны, их дочери для служения, их поля и виноградники захвачены, десятая часть всего конфискована. Они выбрали человеческое правительство над царством Бога, и тирания последовала именно как обещано. Ничто не изменилось. Современная политическая система — это два крыла одной птицы — слева и справа, республиканцы и демократы — все служат одной и той же скрытой силовой структуре. Голосование за любую сторону — это выбор, какое крыло хлопает далее, пока птица летит в одном направлении. Реальная власть никогда не была на бюллетене.\u003c/p\u003e\n\u003ch2 id=\"источники\"\u003eИсточники\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eAgent131711, \"The Finders Exposed,\" \u003ca href=\"https://agent131711.substack.com\"\u003eagent131711.substack.com\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=EbVGx67pF9o\"\u003eHoward Pittman NDE Testimony\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=ypRb8Z3dMRs\"\u003eCatholic Confidential: Deplorable Jesuit Secrets Revealed\u003c/a\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://www.biblegateway.com/passage/?search=1%20Samuel%208\u0026#x26;version=KJV\"\u003e1 Samuel 8 — The Warning Against Earthly Kings (KJV)\
